- fmt: '# Writing Your First Test


    The first thing that you need to write a test is a block of code to test. Use
    the following block of code:


    ```

    class TemperatureCalculator {

    def fromCelsiusToFahrenheit(temperature: Float) =

    (temperature * 1.8) + 32

    }

    ```


    Now you can check if your logic is okay or not by creating an instance of the
    class and passing different values.


    ```

    scala> val calculator = TemperatureCalculator()

    scala> calculator.fromCelsiusToFahrenheit(0)

    val res4: Double = 32.0

    scala> calculator.fromCelsiusToFahrenheit(20)

    val res5: Double = 68.0

    ```


    It’s time to translate these manual tests to something more automatic using ScalaTest.
    To do this, you need to create a class in the same package but in the directory
    `src/test/scala` with the name `TemperatureCalculatorTest` and the class needs
    to extend from `AnyFlatSpec`. The class name and the package name are only suggestions
    because languages like Java/Kotlin follow the same pattern, so you can consider
    this as a standard in the industry. The following code translates in a basic way
    the previous test that you did manually:


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    class TemperatureCalculatorTests extends AnyFlatSpec {

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" in {

    val calculator = TemperatureCalculator()

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    it should "return a temperature of 68 Fahrenheit when the Celsius is 20" in {

    val calculator = TemperatureCalculator()

    assert(calculator.fromCelsiusToFahrenheit(20) == 68)

    }

    }

    ```


    As you can see, the structure of the test is simple because each test starts with
    the words "it should" followed by a string with the description of what the test
    validates. Inside the declaration you invoke the different methods that you need
    in order to validate the logic and use the `assert` method to check if some condition
    is true or not.


    If you run the command `sbt test` in the console, the result will be the following:


    ```

    $ sbt test

    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)

    [info] loading settings for project helloworld-build from assembly.sbt ...

    [info] compiling 1 Scala source to /home/scala/helloworld/target/scala-3.0.1/test-classes
    ...

    [info] TemperatureCalculatorTests:

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0

    [info] - should return a temperature of 68 Fahrenheit when the Celsius is 20

    [info] Run completed in 343 milliseconds.

    [info] Total number of tests run: 2

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 2, failed 0, canceled 0, ignored 0, pending 0

    [info] All tests passed.

    [success] Total time: 6 s, completed Oct 3, 2021, 9:20:32 PM

    ```


    You’ve created a new instance of the class `TemperatureCalculator` in each test,
    which does not make sense because the class is stateless. This means it is not
    saving anything; it’s just receiving a parameter and returning the result without
    saving it anywhere. To solve this problem of duplicate code, there are several
    approaches. One is to instantiate the class outside the test. This approach is
    an option when you don’t need to execute a block of code before running a test.


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" in {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    }

    ```


    ## Ignoring the Execution of the Test


    Everything looks fine with your test but from time to time you may need to ignore
    the execution of one of them or an entire class of tests for different motives.
    For that reason, ScalaTest provides a different mechanism for each situation.
    Let’s start with the simplest situation: ignoring or disabling one of the tests.


    To do this, you need to replace the words "it" or "in" with "ignore" in each test
    that you want to be ignored. The following code shows the previous test with the
    new keyword:


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    ignore should "return a temperature of 32.0 Fahrenheit when the Celsius is 0"
    in {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    it should "return a temperature of 68.0 Fahrenheit when the Celsius is 20" in
    {

    assert(calculator.fromCelsiusToFahrenheit(20) == 68.0)

    }

    }

    ```


    When you run the command to check if the tests are successful, you will see the
    following result:


    ```

    $ sbt test

    [info] TemperatureCalculatorTests:

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0
    !!! IGNORED !!!

    [info] - should return a temperature of 68.0 Fahrenheit when the Celsius is 20

    [info] Run completed in 499 milliseconds.

    [info] Total number of tests run: 1

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 1, failed 0, canceled 0, ignored 1, pending 0

    [info] All tests passed.

    [success] Total time: 7 s, completed Oct 3, 2021, 10:02:45 PM

    ```


    Another case is when you need to ignore the entire class with all the tests. To
    do this, add the annotation `@Ignore` in the declaration of the class.


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest.Ignore

    @Ignore

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    ......

    }

    ```'
