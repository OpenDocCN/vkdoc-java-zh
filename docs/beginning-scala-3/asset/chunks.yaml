    ```


    ### Inheritance


    Inheritances are a common way to refer tk when you extend the functionality from
    another class or trait. Scala, like Java, does not support multiple inheritances
    but you can extend from multiple traits. In Java, you can implement multiple interfaces.


    The way to extend from another class is by using the keyword `extends` followed
    by the name of the class.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |      protected def isWorking() : Boolean = if bulb >0 then true else false

    |     def turnOn() : Unit = if this.isWorking() then print("Turn on the back lights")
    else print("It''s impossible to turn on the lights")

    scala> class BackLight(bulb: Int, status: Boolean) extends Light(bulb, status)

    scala> val backLight = BackLight(75, true)

    scala> backLight.turnOn()

    Turn on the lights

    ```


    As you saw in previous sections, you define the behavior and override in the subclass
    using the keyword `override`.


    ```

    scala> class BackLight(bulb: Int, status: Boolean) extends Light(bulb, status):

    |     override def turnOn(): Unit = if this.isWorking() then print("Turn on the
    back lights") else print("It''s impossible to turn on the back lights")

    scala> val backLight = BackLight(75, true)

    scala> backLight.turnOn()

    Turn on the back lights

    ```


    In some cases, you want to override the entire logic. Perhaps you want to extend
    the functionality of the principal class. The correct way to invoke the logic
    in the main class is by using the keyword `super` followed by the name of the
    method to invoke.


    ```

    scala> class BackLight(bulb: Int, status: Boolean) extends Light(bulb, status):

    |     override def turnOn(): Unit =

    |         super.turnOn()

    |         if this.isWorking() then print("Turn on the back lights") else print("It''s
    impossible to turn on the back lights")

    scala> val backLight = BackLight(75, true)

    scala> backLight.turnOn()

    Turn on the lights Turn on the back lights

    ```


    ### Inner Classes


    Scala and Java let you define inner classes (a class inside another class). The
    main difference from Java is that in Scala the inner classes are accessible from
    the outside. Each instance of a class can contain an instance of the inner classes.
    For example, create a class that contains a playlist of books you want to read.
    Each playlist has a name and a list of books.


    ```

    scala> class Playlist(var name : String):

    |    var books : List[Book] = Nil

    |    def addBook(book : Book) : Unit =

    |        books = book :: books

    |    class Book(var name : String, var isbn : String)

    scala> val playlist = Playlist("Horror")

    scala> playlist.addBook(playlist.Book("ET", "sdsd"))

    scala> print(playlist.books.size)


    ```


    Note that you can only pass to the method `addBook` that `books` creates using
    the same instance of the class `Playlist`**.** If you use another instance, an
    exception will appear on your console.


    ### Value Classes


    Scala provides a way to decrease possible problems that can occur when a class,
    method, or object receives multiple parameters because it can be easy to make
    a mistake in the order of them. You can think of a value class as a wrapper that
    contains one and only one parameter, and the compiler will help you check that
    your methods receive only this type. If you have some experience with Java, you
    can think of this type of class as an *Integer*, which is a wrapper of *int* but
    adds some methods.


    Here are some examples of a value class:


    *   Imagine that you have a phone number as a string and you need to have the
    string but you also need the ability to decompose the number into the country
    code or area code or number.


    *   Imagine that you have the ISBN of a book with a prefix (“I-”) and you need
    to remove this special character.


    Let’s take the last example and put it in the class `Book` in the wrong order
    and see what happens.


    ```

    scala> class Book(val name : String, val isbn : String)

    scala> val book = Book("ISBN", "NAME")

    ```


    As you can see, nothing happens if you make a mistake. Now it’s time to define
    your first value class, which contains the ISBN with one method that removes the
    prefix.


    ```

    scala> class ISBNumber(val isbn: String) extends AnyVal:

    |     def shortNumber = isbn.replace("I-", "")

    scala> print(ISBNumber("I-122345").shortNumber)


    ```


    You have a value class but you don’t modify your `Book` class, so now let’s introduce
    the modifications and try to instantiate the class and pass two strings.


    ```

    scala> class Book(val name : String, val isbn : ISBNumber)

    scala> val book = Book("ISBN", "NAME")

    1 |val book = Book("ISBN", "NAME")

    |                        ^^^^^^

    |                        Found:    ("NAME" : String)

    |                        Required: ISBNumber

    ```


    When you try to create a new instance of the class with the new definition, an
    exception appears, but if you create it using the new type, everything works and
    you can access the internal methods.


    ```

    scala> val book = Book("NAME", ISBNumber("I-TEST"))

    scala> print(book.isbn.shortNumber)

    TEST

    ```


    There are some constraints when creating value classes:


    *   They need to be extended from `AnyVal.`


    *   They can only have one parameter and can’t be declared using `val`. If you
    are using `var` or indicate nothing, Scala will show you an exception.


    *   You can’t define an inner class inside.


    *   You can’t define variables in the class. You can only define methods that
    can contain variables.


    *   They can’t be extended by another class.


    *   You can’t define a method named `hashcode` or `equals`***.***'
