    Table [2-3](#328789_3_En_2_Chapter.xhtml#Tab3) lists some methods that you can
    use in a `String`, plus descriptions and examples.


    **Table 2-3** Other Methods Available in the `String` Class


    | Method | Description | Example |

    | --- | --- | --- |

    | `charAt` | Returns the value of one particular position | `scala> val commonString
    = "Test"scala> print(commonString.charAt(3))  t` |

    | `indexOf` | Returns the index of a character. If it does not exist, it returns
    -1. | `scala> val commonString = "Test"scala> print(commonString.indexOf("s"))  2`
    |

    | `toLowerCase` | Converts all characters into lowercase | `scala> val commonString
    = "Test"scala> print(commonString.toLowerCase)                                     test`
    |

    | `toUpperCase` | Converts all characters into upper case | `scala> val commonString
    = "Test"scala> print(commonString.toUpperCase)                                  TEST`
    |


    ### Date


    The `Date` type is not directly available to use in Scala without importing anything.
    To use it, you need to import the different classes related to the manipulation
    of dates that are available in Java. Since Java 11, a lot of common problems with
    the use and manipulation of dates can be solved without including any external
    dependency, such as adding or subtracting days from one particular date. Before
    doing anything, you need to import the class associated with the type of data
    that you want to use.


    ```

    scala> import java.util.Date;

    scala> val actualDate =  Date()

    val actualDate: java.util.Date = Sun Jun 13 19:59:11 ART 2021

    ```


    In the case of the class `Date`, several methods are deprecated in version 11
    of Java. This means that in future versions of the JDK they will disappear. For
    more information, check out the official documentation on the Oracle webpage^([^(22)](#fn22)).


    Table [2-4](#328789_3_En_2_Chapter.xhtml#Tab4) contains alternatives to `Date`.


    **Table 2-4** Different Classes That Contain Some Format of the Date


    | *Class* | *Description* |

    | --- | --- |

    | `LocalDate` | A date (day, month, and year) without anything related to the
    time |

    | `LocalTime` | A time (hour, minute, seconds) that does not contain references
    to a particular date |

    | `LocalDateTime` | A combination of the two previous classes |

    | `Period` | To represent a period of time |

    | `ZoneId` | Defines the different time zones |

    | `Instant` | Represents a point in time expressed in nanoseconds |


    As a recommendation, use `LocalDateTime` or `LocalDate` instead of `Date` because
    they offer a lot of methods. Some methods are static in these classes. For example,
    to instantiate a new date, you have the static method `now()`.


    ```

    scala> import java.time.LocalDateTime

    scala> val actualDate = LocalDateTime.now()

    val actualDate: java.time.LocalDateTime = 2021-06-13T20:12:49.342185

    ```


    Say you want to subtract ten days from the actual date. `LocalDateTime` provides
    a specific method to remove days, months, years, and all the different segments
    related to the time.


    ```

    scala> actualDate.minusDays(10)

    val res2: java.time.LocalDateTime = 2021-06-03T20:12:49.342185

    ```


    The same situation happens when you want to add something to a particular date.
    You have the same structure of names as in the case of subtracting but change
    the word `minusXX` to `plusXX`.


    ```

    scala> actualDate.plusMonths(1)

    val res3: java.time.LocalDateTime = 2021-07-13T20:12:49.342185

    ```


    To see more information about all of the methods of `LocalDateTime`, please go
    to [`https://docs.oracle.com/en/java/javase/11/docs/api/java.base/java/time/LocalDateTime.html`](https://docs.oracle.com/en/java/javase/11/docs/api/java.base/java/time/LocalDateTime.html).


    #### Format


    As you saw in the previous section, the classes related to dates contain a lot
    of methods but don’t directly include a way to format the value into a readable
    format for humans. To solve this particular problem, you can use the class `DateTimeFormatter`,
    which lets you specify any possible format, such as only showing the day and month
    of one date.


    ```

    scala> import java.time.LocalDateTime

    scala> val actualDate = LocalDateTime.now()

    scala> import java.time.format.DateTimeFormatter

    scala> val formatter = DateTimeFormatter.ofPattern("dd/MM")

    scala> actualDate.format(formatter)

    val res0: String = 13/06

    ```


    Table [2-5](#328789_3_En_2_Chapter.xhtml#Tab5) shows the most common values that
    you can use in the method `ofPattern` in the `DateTimeFormatter`.


    **Table 2-5** Symbols to Specify the Format of a Date


    | *Symbol* | *Description* | *Example* |

    | --- | --- | --- |

    | Y | Year | yyyy = 2004 ; yy = 04 |

    | D | Day of year | 189 |

    | M | Month of year | MM = 07 ; M = 7 |

    | D | Day of month | 10 |

    | E | Day of week | Tue; Tuesday; T |

    | H | Clock hour of am pm (1-12) | 11 |

    | H | Hour of day (0-23) | 18 |

    | M | Minute of hour | 45 |

    | S | Second of minute | 20 |

    | A | Millisecond of day | 1234 |

    | N | Nanosecond of second | 123454321 |

    | V | Time zone ID | America/Buenos_Aires; Z; –03:00 |

    | Z | Time zone name | Pacific Standard Time; PST |

    | Z | Zone offset | +0100; –0300; –05:00; |


    ### Arrays


    An array is a common structure that contains several elements from the same type
    (such as `Int`, `Double`, `Float`, and `Date`) and has an index (which means the
    position of the element). You always need to define the size of an array and you
    have two alternatives:


    *   Declaring the size without any value inside:


    ```

    scala> var names = Array[String](3)

    var names: Array[String] = Array(null, null, null)

    ```


    *   Inferring the size by the number of elements that it receives:


    ```

    scala> var names = Array("John", "Anna", "Isabel")

    var names: Array[String] = Array(John, Anna, Isabel)

    ```


    There are some operations that you can do with an array:


    *   If you know the index, you can directly access the position that contains
    the value.


    ```

    scala> print(names(0))

    John

    ```


    *   If you try to set one element in a position that does not exist in the array,
    an exception will appear.


    ```

    scala> names(4) = "Francesca"

    java.lang.ArrayIndexOutOfBoundsException: Index 4 out of bounds for length 3

    ... 28 elided

    ```


    *   You can find the size of the array using the `size`/`length` methods.


    ```

    scala> names.length

    val res0: Int = 3

    ```


    *   You can combine two different arrays into a new one.


    ```

    scala> var italianNames = Array("Pietro", "Giovanni", "Renzo")

    scala> var argentinanNames = Array("Martin", "Luis", "Jorge")

    scala> argentinanNames.concat(italianNames)

    val res0: Array[String] = Array(Martin, Luis, Jorge, Pietro, Giovanni, Renzo)

    ```


    *   You can iterate in the reverse order.


    ```

    scala> var italianNames = Array("Pietro", "Giovanni", "Renzo")

    scala> italianNames.reverse

    val res15: Array[String] = Array(Renzo, Giovanni, Pietro)

    ```


    *   You can filter for a specific value and create a new array.


    ```

    scala> var names = Array("John", "Anna", "Isabel")

    scala> name.filter(_ == "John")

    val res0: Array[String] = Array(John)

    ```'
