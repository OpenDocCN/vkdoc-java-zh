- fmt: '### Visibility of the Fields


    In the previous section, you saw one example of passing parameters to the constructor
    in the definition of the class. Scala uses the field modifiers to define which
    methods need to create them. You can see the meaning of each of them in Table
    [3-3](#328789_3_En_3_Chapter.xhtml#Tab3).


    **Table 3-3** Different Field Modifiers


    | Type | Description | Example |

    | --- | --- | --- |

    | `val` | This means that you can only access the information in the fields, so
    Scala only creates the `get` method. | `scala> class Book(val name : String, val
    isbn : String)// defined class Book` |

    | `var` | In this case, Scala assumes the fields can be accessed and modified
    by anyone so it creates the methods `set` and `get`. | `scala> class Book(var
    name : String, var isbn : String)// defined class Book` |

    | `non defined` | When you don’t indicate which type is the field, Scala assumes
    that no one can access the fields, only the methods of the class. | `scala> class
    Book(name : String, isbn : String)// defined class Book` |


    These concepts and examples are great but how can you access them? This depends
    on the way you declare your parameters in the constructors. In the case of `var`/`val`,
    you can access them using the name of the instance and the parameter.


    ```

    scala> class Book(var name : String, var isbn : String)

    scala> val book = Book("ET", "S2323")

    scala> print(book.name)

    ET

    ```


    The only case where you can assign a new value to a parameter is when you declared
    it as `var` so Scala creates a `set` method to modify the stored value.


    ```

    scala> class Book(var name : String, var isbn : String)

    scala> val book = Book("ET", "S2323")

    scala> print(book.name)

    ET

    scala> book.name = "ET II"

    scala> print(book.name)

    ET II

    ```


    ### Auxiliary Constructors


    Scala lets you create extra constructors where you define which parameters receive
    but in all cases you need to indicate what to do with the parameters that receive
    tk. The best approach to this problem is to invoke the primary constructor, which
    receives all of the parameters and puts a default value in the parameters that
    the constructor does not receive.


    The way to do make this happen is simple. You need to create a method named `def
    this` and add the parameters that you want.


    ```

    scala> class Book(var name : String, var isbn : String):

    |     def this(name : String) =

    |         this(name, "default")

    |

    |     def this() =

    |         this("", "default")

    ```


    Using the auxiliary’s constructors is not complex. You need to create an instance
    of the class and pass only the parameters that you want. Scala checks for the
    correct constructor to invoke.


    ```

    scala> val bookOne = Book("ET")

    scala> print(bookOne.isbn)

    default

    ```


    ### Providing Default Values


    Defining an auxiliary constructor is a good way to reduce possible problems when
    someone does not indicate all of the parameters but there is an alternative. You
    can put a default value in some or all the parameters so when someone does not
    specify the value, Scala uses the default value. This reduces the risk of something
    going wrong.


    It’s simple to implement this. After the definition of each type of parameter,
    add `=` with the value.


    ```

    scala> class Light(val bulb: Int = 75)

    scala> var light = Light()

    scala> print(light.bulb)

    ```


    ### Private Constructor


    It’s very uncommon to see a private constructor in the code of an application
    but it’s possible. You can create a primary constructor as private so no one can
    create an instance. There are two uses of this approach: to create a class that
    only has constants or to combine it with an object to create a Singleton of the
    class. The way to do it is simple. Just add the access modifier `private` after
    the name of the class.


    ```

    scala> class Light private ()

    scala> val light = Light()//This will happen when you try to instantiate

    1 |val light = Light()

    |            ^^^^^

    |            method apply cannot be accessed as a member of Light.type from module
    class rs$line$6$.

    ```


    ### Methods


    Methods are the way to assign behaviors to your classes. Of course, when you create
    a class that only stores values, behind the scenes it creates certain methods
    to access the information, but the idea is to show you how to create explicit
    methods in your classes.


    Each method starts with the keyword `def` followed by the name, the parameters
    that it receives, and optionally the return type.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |   def isWorking() : Boolean = if bulb >0 then true else false

    scala> val light = Light(75, true)

    scala> println(light.isWorking())

    true

    ```


    As you saw in previous sections, you can add access modifiers to restrict the
    possibility of accessing certain methods.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |   private def isWorking() : Boolean = if bulb >0 then true else false

    scala> val light = Light(75, true)

    scala> println(light.isWorking())

    1 |println(light.isWorking())

    |        ^^^^^^^^^^^^^^^

    |        method isWorking cannot be accessed as a member of (light : Light) from
    module class rs$line$15$.

    ```


    #### Order


    There is no constraint related to the order of methods and access modifiers but
    try to group all methods with the same modifiers in one part of the class. This
    will help you understand which ones are accessible outside the class. A possible
    approach that most Java developers follow is all private methods first, followed
    by the protected ones, and then the public ones.


    #### Invoking Methods


    To invoke a method internally in a class, you need to use the keyword `this` followed
    by the name of the method with the parameters. This is optional and in most cases
    is not necessary because the compiler infers which method you are calling but
    it is a good practice because it reduces the complexity in the code for other
    developers.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |     private def isWorking() : Boolean = if bulb >0 then true else false

    |     def turnOn() : Unit = if this.isWorking() then print("Turn on the lights")
    else print("It''s impossible to turn on the lights")

    scala> var light = Light(75, true)

    scala> light.turnOn()

    Turn on the lights

    ```


    #### Override Default Methods


    Scala, like Java, gives you a set of default methods in each class that contain
    the default implementation but in some cases, it is necessary to override them
    to get a certain behavior.


    ##### toString


    This method could give you some information about the values that exist in the
    class but, by default, most classes only give some information about the position
    of the memory that hold the class.


    ```

    scala> class Light(val bulb: Int, val status: Boolean)

    scala> val light = Light(75, true)

    val light: Light = Light@4196a44a

    scala> println(light)

    rs$line$24$Light@4196a44a

    ```


    To get a method that gives valuable information, you need to override the method.
    The way to do this is to add the keyword `override` and the logic of the method.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |   override def toString() : String = s"The bulb has a potency of $bulb and the
    status is $status"

    scala> val light = Light(75, true)

    scala> println(light)

    The bulb has a potency of 75 and the status is true

    ```'
