- fmt: '通过这种方式，你已经对复杂关系进行了建模。你以一种 Java 无法实现的方式对事物进行了建模。Scala 的组合规则是非常强大的工具，可用于定义复杂的类层次结构，以及指定组合类的规则和向方法传递参数的规则。通过这种方式，你可以确保`charityRun`方法只能使用有效参数调用，而不是在运行时测试参数正确性，并在参数不正确时抛出异常。这种增强的建模灵活性结合更强的类型安全性，为架构师提供了另一种帮助开发者编写正确代码的工具。


    ### 方法名冲突


    使用特质（trait）时一切看起来都很棒，但如果你从两个包含相同方法的不同特质进行扩展，会发生什么呢？为了通过一个示例了解这个问题，让我们创建两个特质：


    ```

    scala> trait TraitOne:

    |     def text = "One"

    // defined trait TraitOne

    scala> trait TraitTwo:

    |     def text = "Two"

    // defined trait TraitTwo

    ```


    现在，创建一个同时扩展这两个特质的类，看看会发生什么。


    ```

    scala> class Concrete extends TraitOne with TraitTwo

    1 |class Concrete extends TraitOne with TraitTwo

    |      ^

    |      class Concrete inherits conflicting members:

    |        method text in trait TraitOne of type => String  and

    |        method text in trait TraitTwo of type => String

    |      (Note: this can be resolved by declaring an override in class Concrete.)

    ```


    控制台中出现的错误试图解释，编译器无法决定使用哪个方法实现。有几种方法可以解决这个问题。其中之一是重写该方法并定义其行为。


    ```

    scala> class Concrete extends TraitOne with TraitTwo:

    |     override def text = "Class"

    // defined class Concrete

    ```


    这个解决方案可以编译通过，但你丢失了两个特质中方法的行为。为了解决这个问题，你可以创建新方法，使用`super`调用特质中的方法。


    ```

    scala> class Concrete extends TraitOne with TraitTwo:

    |     override def text = "Class"

    |     def textOne = super[TraitOne].text

    |     def textTwo = super[TraitTwo].text

    // defined class Concrete

    ```


    现在看看当你创建`Concrete`类的实例时会发生什么。


    ```

    scala> val con = Concrete()

    val con: Concrete = Concrete@269bf0ac

    scala> con.text

    val res0: String = Class

    scala> con.textOne

    val res1: String = One

    scala> con.textTwo

    val res2: String = Two

    ```


    最后一点说明：只有当两个特质的方法具有相同的名称、参数和返回类型时，才会出现此问题。如果其中某些方面不同，问题就不会出现，因为编译器会检测到它们是不同的方法。


    ### 限制特质的使用


    有时当你创建某个特质时，你希望它只在特定情况下使用。为了解决这个问题，有两种不同的方法：一种限制对扩展自另一个类的类/特质的访问，另一种是类/特质拥有一个特定方法。


    #### 按类限制访问


    这种限制类型的思路是，只有包含某些特质的类/特质才能使用它。让我们通过一个具体示例来理解这个概念。


    ```

    scala> trait Engine:

    |     val enable = true

    // defined trait Engine

    scala> trait Vehicle:

    |     this: Engine => def drive = println("driving")

    // defined trait Vehicle

    ```


    在这个示例中，所有扩展自该特质的类/特质都需要扩展`Engine`。否则，会出现异常。


    ```

    scala> class Car extends Vehicle

    1 |class Car extends Vehicle

    |      ^

    |      illegal inheritance: self type Car of class Car does not conform to self
    type Engine

    |      of parent trait Vehicle

    ```


    如果你修改`Car`类的先前定义，使其同时扩展`Vehicle`和`Engine`，一切就正常了。


    ```

    scala> class Car extends Vehicle, Engine

    // defined class Car

    ```


    这种限制类型出现在“使用特质作为混入（Mixin）”一节的示例中。


    #### 按方法限制访问


    让我们看看如何将使用限制在拥有特定方法的类/特质上。首先，创建一个包含该方法定义的特质。


    ```

    scala> trait Vehicle:

    |     this: {def drive(): Unit} => println("drive")

    ```


    现在创建一个名为`Car`但不包含`drive`方法的类，看看会发生什么。


    ```

    scala> class Car extends Vehicle:

    |     def notDrive(): Unit = println("drive")

    1 |class Car extends Vehicle:

    |      ^

    |      illegal inheritance: self type Car of class Car does not conform to self
    type Object{drive(): Unit}

    |      of parent trait Vehicle

    ```


    如果你定义的方法与特质中出现的方法具有相同的结构，一切就正常了。


    ```

    scala> class Car extends Vehicle:

    |     def drive(): Unit = println("drive")

    // defined class Car

    ```


    ### 类型参数或类型成员


    特质提供了一种编写代码的方式，你可以将其用于任何泛型类型，或用于满足某一条件的特定类型。一个实际的例子是，假设你想要打印所有组件的状态。以下示例展示了如何实现：


    ```

    scala> class Component:

    |     override def toString = "enable"

    |

    | trait Status[A]:

    |     def status(a: A): Unit = println(a.toString)

    |

    | class Screen extends Status[Component]

    ```


    在这个示例中，`Screen`类定义了哪些类型支持打印状态。让我们看看调用该方法时会发生什么：


    ```

    scala> val screen = Screen()

    val screen: Screen = Screen@61dd1c3d

    scala> val component = Component()

    val component: Component = enable

    scala> screen.status(component)

    enable

    ```


    ### 向特质传递参数


    Scala 3 允许你像抽象类一样在构造函数中传递参数，因此你可以将参数从具体类传递到特质。


    ```

    scala> trait Vehicle(val model: String):

    |      override def toString = s"model: $model"

    |

    | class Car(override val model:String) extends Vehicle(model):

    |      override def toString = "car''s " + super.toString()

    // defined trait Vehicle

    // defined class Car

    ```


    现在，如果你使用任意值创建`Car`类的实例，你就可以从该类中使用保存在特质构造函数中的值。


    ```

    scala> val car = Car("C4")

    scala> println(car.toString())

    car''s model: C4

    ```'
  raw: 'In this way, you’ve modeled complex relationships. You’ve modeled things in
    a way that you cannot do with Java. Scala’s compositional rules are very powerful
    tools for defining complex class hierarchies and for specifying the rules for
    composing classes as well as the rules for passing parameters into methods. In
    this way, you can make sure that the `charityRun` method can only be called with
    valid parameters rather than testing for parameter correctness at runtime and
    throwing an exception if the parameter is not correct. This increased modeling
    flexibility combined with enhanced type safety gives the architect another tool
    to help developers write correct code.


    ### Conflicts of Method Names


    Everything looks great using traits, but what happens if you extend from two different
    traits that contain the same method? To see this problem with one example, let’s
    create two traits:


    ```

    scala> trait TraitOne:

    |     def text = "One"

    // defined trait TraitOne

    scala> trait TraitTwo:

    |     def text = "Two"

    // defined trait TraitTwo

    ```


    Now, create a class that extends from both traits and sees what happens.


    ```

    scala> class Concrete extends TraitOne with TraitTwo

    1 |class Concrete extends TraitOne with TraitTwo

    |      ^

    |      class Concrete inherits conflicting members:

    |        method text in trait TraitOne of type => String  and

    |        method text in trait TraitTwo of type => String

    |      (Note: this can be resolved by declaring an override in class Concrete.)

    ```


    The error that appears in the console tries to explain that the compiler can’t
    decide which implementation of the method to use. There are ways to solve this
    problem. One of them is to override the method and define the behavior.


    ```

    scala> class Concrete extends TraitOne with TraitTwo:

    |     override def text = "Class"

    // defined class Concrete

    ```


    This solution compiles, but you lose the behavior of the methods that exist in
    both traits. To solve this problem, you can create new methods that call the methods
    of the traits using `super`.


    ```

    scala> class Concrete extends TraitOne with TraitTwo:

    |     override def text = "Class"

    |     def textOne = super[TraitOne].text

    |     def textTwo = super[TraitTwo].text

    // defined class Concrete

    ```


    Now see what happens when you create an instance of the `Concrete` class.


    ```

    scala> val con = Concrete()

    val con: Concrete = Concrete@269bf0ac

    scala> con.text

    val res0: String = Class

    scala> con.textOne

    val res1: String = One

    scala> con.textTwo

    val res2: String = Two

    ```


    One last comment: This problem only occurs when the methods of both traits have
    the same name, parameters, and return. If some of them are different, the problem
    won’t appear because the compiler detects that they are different methods.


    ### Limiting the Use of a Trait


    Sometimes when you create a certain trait, you want it to only be used in a specific
    situation. To solve this problem, there are two different approaches: one limits
    access to the class/trait that extends from another one, and the other option
    is where the class/trait has a specific method.


    #### Limiting Access by Class


    The idea of this type of limitation is that only the class/trait that contains
    certain traits can use it. Let’s see this concept with a concrete example.


    ```

    scala> trait Engine:

    |     val enable = true

    // defined trait Engine

    scala> trait Vehicle:

    |     this: Engine => def drive = println("driving")

    // defined trait Vehicle

    ```


    In the example, all classes/traits that extend from this trait need to extend
    to `Engine` . If not, an exception appears.


    ```

    scala> class Car extends Vehicle

    1 |class Car extends Vehicle

    |      ^

    |      illegal inheritance: self type Car of class Car does not conform to self
    type Engine

    |      of parent trait Vehicle

    ```


    If you modify the previous definition of the class `Car` and extend from `Vehicle`
    and `Engine`, everything works fine.


    ```

    scala> class Car extends Vehicle, Engine

    // defined class Car

    ```


    This type of limitation appears in the examples in the section “Using Traits as
    Mixins.”


    #### Limiting Access by Method


    Let’s see the way to limit the use to only classes/traits that have a particular
    method. First, create a trait with the definition of the method.


    ```

    scala> trait Vehicle:

    |     this: {def drive(): Unit} => println("drive")

    ```


    Now create a class named `Car` that does not contain the method `drive` to see
    what happens.


    ```

    scala> class Car extends Vehicle:

    |     def notDrive(): Unit = println("drive")

    1 |class Car extends Vehicle:

    |      ^

    |      illegal inheritance: self type Car of class Car does not conform to self
    type Object{drive(): Unit}

    |      of parent trait Vehicle

    ```


    If you define the method with the same structure that appears in the trait, everything
    works.


    ```

    scala> class Car extends Vehicle:

    |     def drive(): Unit = println("drive")

    // defined class Car

    ```


    ### Type Parameters or Type Members


    Traits offers a way to write code that you can use in any generic type or with
    certain types that cover one condition. A practical example of this is to imagine
    that you want to print the status of all components. The following example shows
    how you can do it:


    ```

    scala> class Component:

    |     override def toString = "enable"

    |

    | trait Status[A]:

    |     def status(a: A): Unit = println(a.toString)

    |

    | class Screen extends Status[Component]

    ```


    In the example, the `Screen` class defines which types support the status to print
    the status. Let’s see what happens when you invoke the method:


    ```

    scala> val screen = Screen()

    val screen: Screen = Screen@61dd1c3d

    scala> val component = Component()

    val component: Component = enable

    scala> screen.status(component)

    enable

    ```


    ### Passing Parameters on Traits


    Scala 3 lets you pass parameters in the constructor like an abstract class, so
    you can pass parameters from the concrete class to a trait.


    ```

    scala> trait Vehicle(val model: String):

    |      override def toString = s"model: $model"

    |

    | class Car(override val model:String) extends Vehicle(model):

    |      override def toString = "car''s " + super.toString()

    // defined trait Vehicle

    // defined class Car

    ```


    Now if you create an instance of the class `Car` with any value, you can use the
    value that saves it in the constructor of the trait from the class.


    ```

    scala> val car = Car("C4")

    scala> println(car.toString())

    car''s model: C4

    ```'
