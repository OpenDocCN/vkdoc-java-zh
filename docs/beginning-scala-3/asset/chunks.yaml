  trans: '

    ### 变型


    变型定义了参数化类型的继承关系，它揭示了例如 `Set[String]` 是否是 `Set[AnyRef]` 的子类型。像 `class Set[+A]`
    这样的声明意味着 `Set` 是由类型 `A` 参数化的。其中的 `+` 被称为变型注解。


    变型是一个重要且具有挑战性的概念。它定义了参数化类型可以作为参数传递的规则。在本章开头，我们展示了将 `String[]`（Java 表示法）传递给一个期望
    `Object[]` 的方法是如何引发问题的。Java 允许你将某个类型的数组传递给一个期望其超类数组的方法。这被称为协变。表面上看，这非常合理。如果你能将一个
    `String` 传递给一个期望 `Object` 的方法，为什么不能将一个 `Array[String]`（Scala 表示法）传递给一个期望 `Array[Object]`
    的方法呢？因为 `Array` 是可变的；它除了可读之外还可写，所以一个接受 `Array[Object]` 的方法可能会通过插入一些无法插入到 `Array[String]`
    中的内容来修改该 `Array`。


    为类型参数定义类型变型，可以让你控制参数化类型如何传递给方法。变型有三种形式：不变、协变和逆变。类型参数可以单独标记为协变或逆变，默认情况下是不变。在 Scala
    中，变型通过在类型参数前使用 `+` 和 `-` 符号来定义。


    #### 协变类型参数


    协变类型参数通过在类型参数前加上 `+` 来指定。协变类型对于只读容器非常有用。Scala 的 `List` 被定义为 `List[+T]`，这意味着它在类型
    `T` 上是协变的。`List` 是协变的，因为如果你将一个 `List[String]` 传递给一个期望 `List[Any]` 的方法，那么 `List`
    中的每个元素都满足它是 `Any` 的要求，并且你无法更改 `List` 的内容。图 8-2 非常清晰地展示了协变，例如，如果 `S` 继承自 `T`，那么
    `Class[S]` 继承自 `Class[T]`。


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig2_HTML.png](img/328789_3_En_8_Fig2_HTML.png)


    图 8-2


    Scala 中的协变


    提示


    协变：如果 `S` 继承自 `T`，那么 `Class[S]` 继承自 `Class[T]`。


    让我们定义一个不可变类 `Getable`。一旦创建了 `Getable` 的实例，它就不能改变，因此你可以将其类型 `T` 标记为协变。


    ```

    scala> class Getable+T

    defined class Getable

    ```


    让我们定义一个接受 `Getable[Any]` 的方法。


    ```

    scala> def get(in: Getable[Any]) =

    |      println("It''s "+in.data)

    def get(in: Getable[Any]): Unit

    ```


    这里你定义了一个 `Getable[String]` 的实例：


    ```

    scala> val gs = Getable("String")

    gs: Getable[java.lang.String] = Getable@10a69f0

    ```


    你可以用 `gs` 调用 `get`。


    ```

    scala> get(gs)

    It''s String

    ```


    让我们尝试同样的例子，但将一个 `Getable[java.lang.Double]` 传递给一个期望 `Getable[Number]` 的方法。


    ```

    scala> def getNum(in: Getable[Number]) = in.data.intValue

    getNum: (Getable[java.lang.Number])Int

    scala> def gd = Getable(java.lang.Double.valueOf(33.3))

    gd: Getable[java.lang.Double]

    scala> getNum(gd)

    res7: Int = 33

    ```


    是的，协变按你期望的方式工作。你可以使只读类成为协变的。这意味着逆变适用于只写类。


    #### 逆变类型参数


    那么，如果协变允许你将 `List[String]` 传递给一个期望 `List[Any]` 的方法，逆变又有什么用处呢？逆变表示如果 `S` 继承自 `T`，那么
    `Class[T]` 继承自 `Class[S]`，如图 8-3 所示。


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig3_HTML.png](img/328789_3_En_8_Fig3_HTML.png)


    图 8-3


    Scala 中的逆变


    提示


    逆变：如果 `S` 继承自 `T`，那么 `Class[T]` 继承自 `Class[S]`。


    让我们先看一个只写类 `Putable`。


    ```

    scala> class Putable[-T]:

    |     def put(in: T) =

    |         println("Putting "+in)

    |

    // defined class Putable

    ```


    接下来，让我们定义一个接受 `Putable[String]` 的方法。


    ```

    scala> def writeOnly(in: Putable[String])=

    |     in.put("Hello")

    def writeOnly(in: Putable[String]): Unit

    ```


    然后声明一个 `Putable[AnyRef]` 的实例。


    ```

    scala> val p = Putable[AnyRef]

    val p: Putable[AnyRef] = Putable@fb79241

    ```


    如果你尝试调用 `writeOnly` 会发生什么？


    ```

    scala> writeOnly(p)

    Putting Hello

    ```


    好的，你可以用一个 `Putable[AnyRef]` 来调用一个期望 `Putable[String]` 的方法，因为你保证会用 `String`（它是
    `AnyRef` 的子类）来调用 `put` 方法。单独来看，这并不特别有价值，但如果你有一个类，它对输入进行处理并产生输出，那么逆变的价值就显而易见了。


    转换的输入是逆变的。用一个 `String` 去调用一个期望至少是 `AnyRef` 的东西是合法且有效的。但返回值可以是协变的，因为你期望得到一个数字，所以如果你得到一个
    `Integer`（`Numbers` 的子类），也是可以的。让我们看看它是如何工作的。你定义了一个 `DS`，它具有逆变类型 `In` 和协变类型 `Out`。


    ```

    scala> trait DS[-In, +Out]:

    |     def apply(i: In): Out

    |

    // defined trait DS

    ```


    让我们创建一个能将 `Any` 转换为 `Int` 的实例。


    ```

    scala>  val t1 = new DS[Any, Int]{def apply(i: Any) = i.toString.toInt}

    val t1: DS[Any, Int] = anon$1@430aae8e

    ```


    之后，创建一个调用该 trait 的 apply 方法的方法：


    ```

    scala> def check(in: DS[String, Any]) = in("333")

    def check(in: DS[String, Any]): Any

    ```


    然后用 `t1` 调用 `check`。


    ```

    scala> check(t1)

    res14: Any = 333

    ```

    '
- fmt: '### Invariant Parameter Types


    In Scala, `Array[T]` is invariant. This means that you can only pass an `Array[String]`
    to `foo(a: Array[String])` and that you can only pass an `Array[Object]` to `bar(a:
    Array[Object])`. Figure [8-4](#328789_3_En_8_Chapter.xhtml#Fig4) gives a clear
    picture of invariant parameter types.


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig4_HTML.png](images/328789_3_En_8_Chapter/328789_3_En_8_Fig4_HTML.png)


    Figure 8-4


     Invariance in Scala


    This ensures that what is read from or written to the array is something of the
    correct type. So, for anything that’s mutable, the type parameter should be invariant.
    You do this by doing nothing with the type parameter. So, let’s define an invariant
    class.


    ```

    class Holder[T](var data: T)

    ```


    The class holds data of type `T`. Let’s write a method.


    ```

    scala> def add(in: Holder[Int])= in.data = in.data + 1

    def add(in: Holder[Int]): Unit

    scala> val h = Holder(0)

    val h: Holder[Int] = Holder(0)

    scala> add(h)

    scala> h.data

    val res1: Int = 1

    ```


    Because the `add` method expects an `Int` to come out of `Holder` and puts an
    `Int` back into `Holder`, the type of `Holder` must be invariant. This does not
    mean that invariant containers lose their ability to hold subclasses of their
    declared type. `Holder[Number]` can contain a `Double`, and an `Array[Object]`
    can contain `String`, `Integer`, and so on. Let’s put a `Double` into `Holder[Number]`:


    ```

    scala> val nh = Holder[Number](33.3d)

    val nh: Holder[Number] = Holder(33.3)

    ```


    Now define a method that rounds the number.


    ```

    scala> def round(in: Holder[Number]) =

    |     in.data = in.data.intValue

    def round(in: Holder[Number]): Unit

    ```


    Call the `round` method and let’s see what you get out the other side.


    ```

    scala> round(nh)

    scala> nh.data

    res16: java.lang.Number = 33

    ```


    You put in a `Number` and got back a `Number`. What’s the underlying class for
    `Number`?


    ```

    scala> nh.data.getClass

    res17: java.lang.Class[_] = class java.lang.Integer

    ```


    An `Integer` is a subclass of `Number`, so you can put an `Integer` or a `Double`
    into `Holder[Number]`. You reserve the ability to use class hierarchies with invariant
    type parameters. Let’s finally see what happens when you try to pass a `Holder[Double]`
    into `round`.


    ```

    scala>  val dh = Holder(33.3d)

    val dh: Holder[Double] = Holder(33.3)

    scala> round(dh)

    -- Error:

    1 |round(dh)

    |      ^^

    |      Found:    (dh : Holder[Double])

    |      Required: Holder[Number]

    ```


    So, invariant type parameters protect you when you have mutable data structures
    such as arrays.


    ### Rules of Variance


    So, you’ve successfully defined and used an invariant type. The invariant type
    was mutable, so it both returned and was called with a particular type. You created
    a covariant type that was an immutable holder of a value. Finally, you created
    a transformer that had contravariant input and covariant output. Wait, that sounds
    like a function. That’s right, Scala’s `FunctionN` traits have contravariant parameters
    and covariant results. This leads us to the simple rules of variance:


    *   Mutable containers should be invariant.

    *   Immutable containers should be covariant.

    *   Inputs to transformations should be contravariant, and outputs from transformations
    should be covariant.


    ## Type Bounds


    When defining a parameterized type, bounds allow you to place restrictions on
    type parameters. Thus, a bounded type is restricted to a specific type or its
    derived type.


    ### Upper Type Bounds


    An upper bound type is restricted to a specific type or one of its derived types.
    Scala provides the upper bound relation operator (`<:`), which you can use to
    specify an upper bound for a type.


    The type parameter `A <: AnyRef` means any type `A` that is a subtype of `AnyRef`.
    The `<:` operator signifies that the type to the left of the `<:` operator must
    be a subtype of the type to the right of the `<:` operator. Moreover, the type
    on the left of the `<:` operator could be the same type as the right of the `<:`
    operator.


    The type parameter `A <: AnyRef` means that the type to the left of the `<:` operator
    must be derived from the type to the right of the `<:` operator or the type to
    the left of the `<:` operator could be the same type as the right of the `<:`
    operator. In other words, the upper type bounds (and, as we will explain in the
    next section, lower type bounds) restrict the allowed types that can be used for
    a type parameter when instantiating a type from a parameterized type, as illustrated
    in the following code.


    ```

    Trait Test:

    def test[A <: AnyRef]: Unit

    ```


    In the code above, the upper type bound says that any type used for parameter
    `A` must be a subtype of `AnyRef`.


    The upper type bound is different from type variance in that type variance determines
    how actual types of the type are related, for example how the actual types `List[AnyRef]`
    and `List[String]` of the type `List` are related. Let’s explore this with examples.


    Define an `Employee` class hierarchy.


    ```

    scala> class Employee (val name: String)

    defined class Employee

    scala> class Internal (name: String) extends Employee(name)

    defined class Internal

    scala> class FreeLancer(name: String) extends Employee(name)

    defined class FreeLancer

    scala> class Customer (name: String)

    defined class Customer

    ```


    Now define a function that takes a parameter with an upper bound.


    ```

    scala> def employeeName [A <: Employee](emp: A) = println(emp.name)

    def employeeName[A <: Employee](emp: A): Unit

    ```


    Now test the `employeeName`.


    ```

    scala> employeeName (Internal("Paul"))

    Paul

    ```


    Now test with `FreeLancer`.


    ```

    scala> employeeName (FreeLancer("John"))

    John

    ```


    Now test with the `Customer` class.


    ```

    scala> employeeName(Customer("Peter"))

    -- Error:

    1 |employeeName(Customer("Peter"))

    |             ^^^^^^^^^^^^^^^^^

    |             Found:    Customer

    |             Required: Employee

    |

    |             The following import might make progress towards fixing the problem:

    |

    |               import collection.Searching.search

    ```


    As you can see, because of the upper bound restriction, this code does not compile,
    as the `Customer` class is not a subtype of `Employee`.


    ### Lower Type Bounds


    A lower bound type is restricted to a specific type of its supertype. The type
    selected must be equal to or a supertype of the lower bound restriction. The following
    defines a lower type bound:


    ```

    class A{

    type B >: List[Int]

    def someMethod(a : B) = a

    }

    ```


    You define `type B` inside `class A` to have a lower bound of `List[Int]`. You
    instantiate a variable `st` as a subtype of `A` as shown here:


    ```

    scala> val st = A { type B = Traversable[Int] }

    val st: A{B = Iterable[Int]} = anon$1@3ef3f661

    ```


    You can call some method with a `Set` class. This is because `Set`, even if not
    a supertype of the `List` class, is a subtype of `Traversable`.


    ## Extension Methods


    Scala 2 lets you add new methods to some types using the keyword `implicit`, but
    in Scala 3, this feature has had modifications and now requires using two different
    keywords like `using`/`given`.


    The following sections explain both approaches of the same feature. This is important
    because you may see Scala 2 code in some projects.'
