    # 14. Scala Best Practices


    Thanks for hanging in and reading all this way. You’ve covered a lot of ground.
    You’ve explored the Scala language and developed a collection of idioms for building
    applications using Scala. You know how Scala can be used by different team members
    in different ways. You’ve seen how Scala allows you to compose fine-grained pieces
    of code into complex systems that work well together.


    But no technology is an island. No matter how good Scala is in the abstract, it’s
    only valuable if it can help your organization produce better and more maintainable
    code, faster. The good news is that Scala compiles down to JVM bytecode and works
    great with existing Java libraries. If you’re working at a Java shop, the cost
    of using Scala on some projects is minimal. You can test Scala with your existing
    Java test tools. You can store compiled Scala code in JAR and WAR files, so it
    looks and feels to the rest of your organization like what they’re used to: Java
    bytecode. The operational characteristic of Scala code on web servers is indistinguishable
    from the operational characteristics of Java code.


    Scala is not just a programming language; it is a new way of thinking and reasoning
    about programming. It will take you time to design code that fits into Scala paradigms
    and to discover and devise paradigms of your own. So, write that Java-style code
    in Scala and then apply the idioms and see how your code changes and how your
    thought patterns emerge. The first step is to recognize the functional style and
    the immediately obvious differences between imperative and functional styles.


    ## General Best Practices


    As you read in the different chapters of this book, Scala 3.x.x introduces a lot
    of modifications to reduce the complexity of the language and help developers
    understand the code in a simple way.


    The following are some rules that apply to everything in the new version of Scala:


    - Reduce the use of `;`, `()`, and `{}`. As you remember, there is no constraint
    in using them in Scala 3, but it could be confusing when someone on your team
    does not include them in the code.


    - Write simple functions that don’t return an exception. Instead of an exception,
    return something like `Option`, `Try`, or `Either`.


    - Use immutable fields using `val`. This practice reduces the risk of possible
    problems with concurrency.


    - Don’t allow null values in your variables. Use `Option`.


    - Create a big number of unit tests in your application using ScalaTest^([^(85)](#fn85)).
    You can use other frameworks like `Junit`^([^(86)](#fn86)) from Java^([^(87)](#fn87))
    if you feel more comfortable with the format of writing test. Also, add some tools
    to know the coverage of your test. `SonarQube`^([^(88)](#fn88)) is a good choice.


    - Check if the dependencies that you want to add in `SBT`^([^(89)](#fn89)) are
    compatible with the latest version of Scala 2.13.x or Scala 3.


    The following sections explain these best practices in more detail.


    ## Recognizing the Functional Style


    Scala supports both functional and imperative styles of programming. If you come
    from an imperative background, that is, if you are a Java programmer, Scala also
    allows you to program in an imperative style, but it encourages a functional approach.
    The functional style of programming enables you to write concise and less error-prone
    code. However, programming in the functional style can prove to be a daunting
    task for a Java programmer. This section gives a few pointers for programming
    in the functional style. The first and foremost step is to recognize the difference
    between the imperative and functional styles in code.


    A quick way to distinguish between functional and imperative styles is that `vars`
    signify an imperative style and using `vals` is more akin to a functional approach.
    Therefore, transitioning from an imperative to a functional style means your program
    should be free of `vars`.


    ```

    val strArray = Array("Vishal Layka", "David Pollak")

    ```


    If you want to print the contents of the array shown above, and if you were a
    Java programmer before you moved to Scala, you might write the `while` loop akin
    to the `while` loop shown here:


    ```

    def print(strArray: Array[String]): Unit =

    var i = 0

    while (i < strArray.length) {

    println(strArray (i))

    i += 1

    }

    ```


    The above code uses a `var` and is therefore in the imperative style. When you
    run the code in the REPL, you get the following output:


    ```

    scala> print(strArray)

    Vishal Layka

    David Pollak

    ```


    You can transform this bit of code into a more functional style by first getting
    rid of the `var`, as shown here:


    ```

    def print(strArray: Array[String]): Unit = {

    strArray.foreach(println)

    }

    ```


    As you can see, the refactored functional code is much clearer, more concise,
    and less error-prone than the original imperative code above. This last example
    is more functional but not purely functional.'
