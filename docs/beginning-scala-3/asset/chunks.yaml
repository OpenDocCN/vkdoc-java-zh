    \ null 进行检查的 if/else 代码块数量。\n\n以下示例接收一个字符串并尝试将其转换为 Int：\n\n```\nscala> def transformToInt(number:String)\
    \ : Option[Int] =\n|     try\n|        Some(Integer.parseInt(number))\n|     catch\n\
    |        case e: NumberFormatException => None\ndef transformToInt(number: String):\
    \ Option[Int]\n```\n\n现在看看当你向函数传递一个正确的值时会发生什么：\n\n```\nscala> transformToInt(\"\
    1\")\nval res1: Option[Int] = Some(1)\n```\n\n让我们看看如果你传入一个非数字的内容：\n\n*   **Try/Success/Failure**：这三个类与前面提到的具有相同的概念，但有一些特性，比如\
    \ `Failure` 包含导致错误的异常，而 `Try` 提供了一种简单的方法来捕获函数中所有可能的异常。\n\n```\nscala> transformToInt(\"\
    a\")\nval res0: Option[Int] = None\n```\n\n```\nscala> import scala.util.{Try,\
    \ Success, Failure}\nscala> def transformToInt(number: String): Try[Int] = Try(Integer.parseInt(number))\n\
    def makeInt(number: String): util.Try[Int]\n```\n\n现在看看当你向函数传递一个正确的值时会发生什么：\n\n\
    ```\nscala> transformToInt(\"1\")\nval res2: util.Try[Int] = Success(1)\n```\n\
    \n让我们看看如果你传入一个非数字的内容：\n\n```\nscala> transformToInt(\"s\")\nval res3: util.Try[Int]\
    \ = Failure(java.lang.NumberFormatException: For input string: \"s\")\n```\n\n\
    ## 尾调用与尾调用优化\n\n递归函数可能会调用自身。递归在函数式编程中扮演着至关重要的角色，因为它提供了一种使用可变数据遍历数据结构的方法，因为每个函数调用都有自己的栈来存储函数参数。递归的一个经典示例可以在\
    \ `factorial` 的实现中看到，如下所示：\n\n```\nscala> def factorial(number:Int) : Int = {\n\
    |     if (number == 1)\n|        return 1\n|     number * factorial (number -\
    \ 1)\n| }\nfactorial: (number: Int)Int\n```\n\n你可以像这样调用这个函数：\n\n```\nscala> println(factorial(3))\n\
    \n```\n\n使用递归函数的一个相关问题是，调用递归函数次数过多会导致栈溢出错误。Scala 编译器可以使用尾递归来优化递归函数，这样递归调用就不会耗尽所有栈空间，因此不会遇到栈溢出错误。尾递归是一种特定类型的递归，当函数在其最终操作中调用自身时发生。对于经过尾递归优化的函数，递归调用不会创建新的栈，而是使用当前函数的栈。只有最后一条语句是递归调用的函数才能被\
    \ Scala 编译器优化为尾递归。\n\n接下来是使用尾调用递归计算的 `factorial` 实现。为了便于尾调用优化，Scala 提供了一个注解，用于标记一个函数以进行尾递归优化。如果一个函数被标记了尾递归函数注解，但无法进行尾递归优化，则在编译时会导致错误。要标记一个函数以进行尾递归优化，请在函数定义之前添加\
    \ `@annotation.tailrec`。\n\n现在，用 `@annotation.tailrec` 标记前面展示的 `factorial` 函数，以指示\
    \ Scala 编译器此函数必须进行尾递归优化，并且如果带注解的函数无法进行尾递归优化，编译器应将其视为错误。\n\n```\nscala> @annotation.tailrec\n\
    | def factorial(number:Int) : Int = {\n|     if (number == 1)\n|        return\
    \ 1\n|     number * factorial (number - 1)\n| }\n<console>:12: error: could not\
    \ optimize @tailrec annotated method factorial: it contains a recursive call not\
    \ in tail position\nnumber * factorial (number - 1)\n              ^\n```\n\n\
    如你所见，Scala 编译器抛出了一个错误。`factorial` 方法无法被优化，因为递归调用不是函数中的最后一条语句；factorial 调用自身，然后对结果执行乘法运算，所以实际上，乘法是函数中的最后一条语句，而不是递归调用。如果函数调用自身的结果用于除直接返回值之外的任何用途，则该函数无法进行尾递归优化。\n\
    \n标记了 `@annotation.tailrec` 的 `factorial` 方法只有在递归成为最终操作时才能成功编译。因此，你需要在调用 `factorial`\
    \ 方法之前执行乘法运算，为此你使用累加器参数来保存正在进行的计算。这个参数在递归调用之前通过乘法进行计算。这样，递归就成了最终操作。\n\n```\nscala>\
    \ @annotation.tailrec\n| def factorial(accumulator: Int, number: Int) : Int =\
    \ {\n|   if(number == 1)\n|     return accumulator\n|   factorial(number * accumulator,\
    \ number - 1)\n| }\nfactorial: (accumulator: Int, number: Int)Int\n```\n\n成功编译保证了该函数将使用尾递归进行优化，这样每次后续调用都不会添加新的栈帧。\n\
    \n```\nscala> println(factorial(1,3))\n\n```\n"
- fmt: '# Call-by-Name, Call-by-Value, and General Laziness


    In Java programs, when you call a method with parameters, the value of the parameters
    is calculated before the method is called. Thus, in


    ```

    foo(1 + 1, "A String".length());

    ```


    the expressions `1 + 1` and `"A String".length()` are both evaluated before the
    call to `foo` is made. This is usually what you want. However, there are some
    cases when you want parameters to be optionally evaluated or repeatedly evaluated.
    In these cases, Scala provides the call-by-name mechanism. There’s no syntactic
    difference to the caller for call-by-name parameters.


    The first use of call-by-name is passing an expression that takes a long time
    to evaluate that may not be evaluated. The second use for call-by-name is a situation
    where you want to evaluate the expression many times in the target method, such
    as if you want to evaluate an expression until some condition is met. That condition
    could be until the expression returns `false` or until the expression returns
    `null`.


    The first example for call-by-name is the logging example. It’s computationally
    costly to calculate log messages simply to discard them if the message is not
    going to be logged. This is very common in Java code.


    ```

    if (logger.level().intValue() >= INFO.intValue()) {

    logger.log(INFO, "The value is "+value);

    }

    ```


    In this code, you must push the decision to evaluate `logger.log(INFO, "The value
    is "+value);` into the place where you call `logger`. This means you need to wrap
    the call to `logger` in an `if` statement. It’s much better from a coding perspective
    if the cost of evaluating the String to be logged is incurred only if the String
    is going to be logged and if the current log level is known to and tested by the
    code inside `logger` rather than in the call to `logger`. Call-by-name gives you
    the ability to delay the evaluation of the String to log only if that String will
    be logged.


    In Scala, you can define a `log` method that takes the thing to log as call-by-name:


    ```

    def log(level: Level, msg: => String) =

    if (logger.level.intValue >= level.intValue) logger.log(level, msg)

    ```


    And you call this code:


    ```

    log(INFO, "The value is "+ value)

    ```


    The Scala version passes `"The value is "+ value` as a function that is evaluated
    each time it is accessed in the `log` method. The `log` method will access it
    only if the `log` message is going to be printed. Your code is cleaner because
    you don’t have to repeatedly test the log level, but it performs as well as the
    previous Java code that has the inline test. To make something call-by-name, just
    put `=>` before the type. So, `foo(s: String)` is call-by-value, and `foo(s: =>
    String)` is call-by-name.


    You may be wondering how the code can perform as well if a function object is
    being created and handed off to the `log` method. In the JVM, the cost of creating
    an object that never escapes the current thread and is very short-lived is zero
    or very near zero. The JVM may also inline the `log` method such that the test
    is performed without an actual method call. The result is that your code will
    run as quickly with the Scala code as it will with the Java code that has the
    repeated test for the log level. For example, you could collect all Strings returned
    from an expression until you encounter a `null`.


    ```

    def allStrings(expr: => String): List[String] = expr match {

    case null => Nil

    case s => s :: allStrings(expr)

    }

    ```


    You can test this method.


    ```

    scala> import java.io._

    import java.io._

    scala> val br = new BufferedReader(new FileReader("foo.txt"))

    br: java.io.BufferedReader = jaferedReva.io.Bufader@2bfa91

    scala> allStrings(br.readLine)

    res0: List[String] = List(import scala.xml._, , object Morg {,...)

    ```


    Each time the call-by-name parameter, `expr`, is accessed, it is applied. If it
    is passed as a parameter that is also call-by-name, it will be passed without
    evaluation. In the previous code, your pattern matches against the application
    of `expr`. If it’s `null`, it returns an empty List, a `Nil`. If it’s not `null`,
    it returns a List that is the current String and the result of `allStrings(expr)`.


    # Functional Structures


    Scala offers structures to solve particular problems. Some of these structures
    exist in other languages like Java or C++. This section is a little introduction
    to the meaning of each of them, but the following chapters offer more in-depth
    coverage.


    ## Sequence


    A sequence in Scala are a very general interface for different data structures
    with a defined order. Some examples that you can consider a sequence of elements
    are Lists, Arrays, Vectors, or Ranges, which contain certain methods like `apply`,
    `iterator`, and `length`.


    ```

    scala> val elements: Seq[Int] = Seq(1,2,3,4,5)

    val elements: Seq[Int] = List(1, 2, 3, 4, 5)

    ```


    The following are some examples of what you can do using different methods:


    ```

    scala> println(elements.reverse) // Invert the order of the sequence

    List(5, 4, 3, 2, 1)

    scala> println(elements(1)) // Obtain the value of the second position


    scala> println(elements.sorted) //Sort all the elements

    List(1, 2, 3, 4, 5)

    ```


    When you use this type of structure, the big-O is O(N), in the worst case where
    N is the number of elements.


    To add elements in this type of structure, one possible approach is to create
    the variable as mutable using the keyword `var`.


    ```

    var elements: Seq[Int] = List(1, 2, 3, 4, 5)

    scala> elements = elements.appended(6)

    elements: Seq[Int] = List(1, 2, 3, 4, 5, 6)

    ```


    ## Maps


    Maps are collections used to save information using a key and a value associated
    to it. You can think of the key as the index or the id in a database to find a
    particular row and the value as the information that is connected with the key.


    ```

    scala> val movies: Map[String, String] = Map()

    val movies: Map[String, String] = Map()

    ```


    There are some ways to add information to a Map:


    *   Using `->` to indicate that in the left part is the key and the right is the
    value.


    *   Using parentheses and commas to separate the different rows in a Map.


    ```

    scala> val movies: Map[String, String] = Map("ET" -> "Science fiction", "Saw"
    -> "Horror")

    val movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)

    ```


    *   Using `+` to add a new key value in an existing Map .


    ```

    scala> val movies: Map[String, String] = Map(("ET", "Science fiction"), ("Saw",
    "Horror"))

    val movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)

    ```


    ```

    scala> movies + ("Rocky IV" -> "Action")

    val res6: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror, Rocky
    IV -> Action)

    ```


    The main problem with this approach is you create a new variable with the original
    information and the new information. This is not a problem because in the previous
    chapter you saw that the idea of Scala is to create immutable variables most of
    the time but imagine that you for some reason add an element in the same Map.
    The correct way to do it is


    ```

    scala> var movies: Map[String, String] = Map("ET" -> "Science fiction", "Saw"
    -> "Horror")

    var movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)

    scala> movies += ("Rocky IV" -> "Drama")

    ```


    Note that if you add the same key two times but with different values in the Map,
    only one key will exist with the last value.


    ```

    scala> val movies: Map[String, String] = Map("ET" -> "Science fiction", "Saw"
    -> "Horror", "Saw" -> "Drama")

    val movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Drama)

    ```


    One last thing: If you need to remove an element from the Map, you can use `-`
    or the method `removed` and the name of the key .


    ```

    scala> var movies: Map[String, String] = Map("ET" -> "Science fiction", "Saw"
    -> "Horror")

    var movies: Map[String, String] = Map(ET -> Science fiction, Saw -> Horror)

    scala> movies -= ("ET")

    scala> println(movies)

    Map(Saw -> Horror)

    scala> movies = movies.removed("Saw")

    movies: Map[String, String] = Map()

    ```'
