  trans: "\n### 创建 Hello World 项目\n\n现在你已经了解了一些常用命令，是时候创建你的第一个项目来实际体验 SBT 了。你可以使用简单的\
    \ SBT 命令创建项目，也可以使用 Giter8 上提供的项目骨架。Giter8 为最常见的应用程序（Spark、Akka、Play、Scala Native\
    \ 等）提供了骨架。如果你想了解可用的模板，请访问官方文档^(⁶⁴)。\n\n要创建一个仅包含“hello world”的简单项目，你可以使用 Giter8\
    \ 提供的同名模板。为此，打开终端并输入命令 `sbt new` 加上模板名称。\n\n```\n$ sbt new scala/hello-world.g8\n\
    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n[info] set current project\
    \ to new (in build file:/tmp/sbt_8076aba/new/)\nA template to demonstrate a minimal\
    \ Scala application\nname [Hello World template]: helloWorld\n```\n\n执行此命令后，你会在机器上看到一个名为\
    \ `helloWorld` 的目录，其中包含所有配置和 `Main` 类。如果你打开位于 `src/main/scala` 中的 `Main.scala`\
    \ 文件，你将看到类似以下内容：\n\n```\nobject Main extends App {\nprintln(\"Hello, World!\"\
    )\n}\n```\n\n如果你想运行此应用程序，需要在根目录下执行命令 `sbt run`，结果将显示在同一个控制台中。\n\n```\n$ sbt run\n\
    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n[info] loading project definition\
    \ from /home/helloworld/project\n[info] loading settings for project helloworld\
    \ from build.sbt ...\n[info] set current project to hello-world (in build file:/home/helloworld/)\n\
    [info] running Main\nHello, World!\n[success] Total time: 1 s, completed Sep 19,\
    \ 2021, 11:32:55 PM\n```\n\n你可以在交互模式下执行不同的命令，该模式提供了一个命令提示符，具有诸如 Tab 补全和历史记录等功能。\n\
    \n```\n$ sbt\n[info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n[info] loading\
    \ project definition from /home/scala/helloworld/project\n[info] loading settings\
    \ for project helloworld from build.sbt ...\n[info] set current project to hello-world\
    \ (in build file:/home/scala/helloworld/)\n[info] sbt server started at local:///home/.sbt/1.0/server/e383aa762cd5b7c5e9f6/sock\n\
    [info] started sbt server\nsbt:hello-world>\n```\n\n交互模式会记住你之前输入的内容（历史记录），即使你退出\
    \ SBT 并重新启动也是如此。当你在 SBT 提示符下输入 `!` 时，SBT 会列出所有历史命令，如下所示：\n\n```\nsbt:hello-world>\
    \ !\nHistory commands:\n!!    Execute the last command again\n!:    Show all previous\
    \ commands\n!:n        Show the last n commands\n!n    Execute the command with\
    \ index n, as shown by the !: command\n!-n    Execute the nth command before this\
    \ one\n!string    Execute the most recent command starting with 'string'\n!?string\
    \    Execute the most recent command containing 'string'\n```\n\nSBT 允许你通过在 SBT\
    \ 命令行上执行一个简单命令来动态更改 Scala 版本。\n\n```\nsbt:hello-world> ++3.0.0!\n[info] Forcing\
    \ Scala version to 3.0.0 on all projects.\n[info] Reapplying settings...\n[info]\
    \ set current project to hello-world (in build file:/home/scala/helloworld/)\n\
    ```\n\n### 项目结构\n\n目录结构与 Maven 项目非常相似。如果你检查上一节中创建的项目根目录的树状结构，你将看到类似以下内容：\n\n```\n\
    $ tree .\n./\n├── build.sbt\n├── project\n│   ├── build.properties\n│   └── target\n\
    ├── src\n│   └── main\n│       └── scala\n│           └── Main.scala\n└── target\n\
    ├── global-logging\n└── task-temp-directory\n```\n\n如果你想添加一些 Java 类，它们将出现在 `main`\
    \ 目录下的 `java` 目录中。此外，你还可以拥有包含 Scala 或 Java 测试的文件夹，以及包含项目资源的另一个文件夹，如下所示：\n\n```\n\
    ./\n├── build.sbt\n├── project\n│   ├── build.properties\n│   └── target\n├──\
    \ src\n│   ├── main\n│   │    ├── java\n│   │    ├── resources\n│   │    └── scala\n\
    │   └── test\n│        ├── java\n│        ├── resources\n│        └── scala└──\
    \ target\n```\n\n#### build.sbt\n\n`build.sbt` 文件包含项目的配置，遵循键/值模式，因此要定义 Scala 版本，你需要使用\
    \ `scala version := \"3.0.0\"`。\n\n```\nscalaVersion := \"3.0.0\" // 1\nname :=\
    \ \"hello-world\" // 2\norganization := \"ch.epfl.scala\" // 3\nversion := \"\
    1.0\" // 4\nlibraryDependencies += \"org.scala-lang.modules\" %% \"scala-parser-combinators\"\
    \ % \"1.1.2\" // 5\n```\n\n让我们解释一下 `build.sbt` 的每个部分：\n\n*   1：此设置是必需的，因为它指定了项目中使用的\
    \ Scala 版本。\n\n*   2：指项目的名称。它类似于 Maven 中的 artifactId。\n\n*   3：这是将同一公司或公司内部不同项目分组的方式。你可以将此属性视为\
    \ Maven 中的 groupId。\n\n*   4：这是应用程序的版本。\n\n*   5：此部分包含项目使用的所有依赖项。你可以像上面那样定义它，或者当你有多个依赖项时，将其定义为\
    \ `Seq` 依赖项。\n\n```\nlibraryDependencies ++= Seq(\n\"org.scala-lang.modules\"\
    \ %% \"scala-parser-combinators\" % \"1.1.2\"\n)\n```\n\n如果你想更改项目名称或 `build.sbt`\
    \ 的某些属性，可以在终端中使用 `set` 命令进行操作。\n\n```\nsbt:hello-world> set name := \"hello world\"\
    \n[info] Defining name\n[info] The new value will be used by Compile / compileEarly,\
    \ Compile / doc / scalacOptions and 9 others.\n[info] Run `last` for details.\n\
    [info] Reapplying settings...\n[info] set current project to hello world (in build\
    \ file:/home/scala/helloworld/)\n```\n\n引入更改后，你需要在命令行中使用 `session save` 命令进行保存。\n\
    \n```\nsbt:hello world> session save\n[info] Reapplying settings...\n[info] set\
    \ current project to hello world (in build file:/home/scala/helloworld/)\n[warn]\
    \ build source files have changed\n[warn] modified files:\n[warn]   /home/scala/helloworld/build.sbt\n\
    [warn] Apply these changes by running `reload`.\n[warn] Automatically reload the\
    \ build when source changes are detected by setting `Global / onChangedBuildSource\
    \ := ReloadOnSourceChanges`.\n[warn] Disable this warning by setting `Global /\
    \ onChangedBuildSource := IgnoreSourceChanges`.\n```\n\n#### 项目文件夹\n\n此文件夹包含在\
    \ SBT 中运行项目所需的所有内容。每个目录或文件最相关的信息如下：\n\n*   `build.properties` 包含有关 SBT 版本的所有信息。\n\
    \n*   `plugins.sbt` 是可选的，取决于你是否在 SBT 中启用了插件。\n\n*   `target` 包含 SBT 生成的所有源代码。\n\
    \n```\nsbt.version=1.5.5\n```\n\n#### Src 文件夹\n\n此目录具有与 Maven 仓库相同的结构，包含运行应用程序所需的所有源代码和资源。某些文件夹是可选的，其他是必需的。以下是关于不同文件夹的简要说明：\n\
    \n*   `main` **（必需）：** 此文件夹包含所有源代码和资源。\n    *   `scala` **（必需）：** 包含所有文件，这些文件可能位于不同的包中，也可能不位于不同的包中，其中包含应用程序的代码。\n\
    \n    *   `java` **（可选）：** 包含用 Java 开发的所有文件。你可以导入 Scala 类，正如你在前几章中看到的那样。\n\n \
    \   *   `resources` **（可选）：** 包含不同格式的文件，这些文件可以在应用程序中使用。\n\n*   `test` **（可选）：**\
    \ 此文件夹包含应用程序的所有测试。\n    *   `scala` **（可选）：** 包含 Scala 类的所有测试。\n\n    *   `java`\
    \ **（可选）：** 包含 Java 类的所有测试。\n\n    *   `resources` **（可选）：** 包含不同格式的文件，这些文件可以在应用程序中使用。\n"
- fmt: '# Build Definition


    As mentioned, a build tool requires you to define the project configuration and
    dependencies in an artifact called a build definition.


    In SBT, there are three types of build definitions:


    * `.sbt` build definition

    * `.scala` build definition

    * Combination of `.scala` and `.sbt` build definitions


    As you learned earlier, the base directory of your hello world project, the `helloworld`
    directory, is made up of the build definition `.sbt` file. In addition to the
    `.sbt` file, there may also be build definitions such as a `.scala` file located
    in the `project/` subdirectory of the base directory.


    In version 0.13.7 of SBT, you were required to separate the setting expression
    by blank lines. You could not write an `.sbt` file as shown in the following example
    because it wouldn’t compile because of the absence of blank lines:


    ```

    name := "hello-world"

    version := "1.0"

    scalaVersion := "2.10.x"

    ```


    This restriction does not exist from SBT 0.13.7 but we mentioned it because you
    may find yourself in situations where older versions of SBT are still being used
    with newer versions of Scala, and in such cases the build file without the blank
    lines won’t compile.


    In SBT, keys are defined for different purposes. A key can be grouped into one
    of the categories listed in Table 11-2.


    Table 11-2 Ways to Group Keys in SBT


    | Key | Description |

    | --- | --- |

    | Setting key | When you define the key as a Setting key, the value of the key
    is computed on loading the project. |

    | Task key | When you define the key as a Task key, the value of the key is recomputed
    each time it is executed. |

    | Input key | When you define the key as an Input key, the value of the key takes
    command-line arguments as input. |


    The Setting keys provide build configuration. The keys such as `name`, `version`,
    and `scalaVersion` that you saw in the code above are Setting keys. You will look
    at two other useful types of setting keys, `libraryDependencies` and `resolvers`
    keys, in the following section.


    The Task keys, as the name suggests, are geared toward tasks such as `clean`,
    `compile`, `test`, and so on.


    Note


    Because a Task key is computed on each execution, a Setting key cannot depend
    on a Task key. Trying to do so will throw an error.


    The Input keys are the keys that have command-line arguments. An example of an
    input key is the `run` key. The `run` key is used to run a `main` class with command-line
    arguments. If no arguments are provided, a blank string is used. You execute without
    any arguments when you run the hello world project.


    Note


    Each key can have more than one value, but in different context called scopes.
    In a given scope, a key has only one value.


    In the following section, you will learn about the Setting keys called `libraryDependencies`
    key and `resolvers` key.


    # LibraryDependencies and Resolvers


    In previous sections, you read that a part in the `build.sbt` contains the list
    of the different libraries that use the project. The `libraryDependencies` key
    is used to declare managed dependencies and the `resolvers` key is used to provide
    additional resource URIs for automatically managed dependencies. As mentioned,
    SBT uses Coursier (previous versions of SBT use Apache Ivy) to implement managed
    dependencies. You should list your dependencies in the setting `libraryDependencies`.
    You can declare the dependencies as shown here:


    ```

    libraryDependencies += groupID % artifactID % revision

    ```


    In the code above, `groupId`, `artifactId`, and `revision` are strings. This way
    of declaring dependencies is similar to doing so in Maven, which is shown here:


    ```

    org.scalatest

    scalatest_3

    3.2.9

    ```


    Now imagine that some of the dependencies are applicable in one particular scope
    of the application, such as the test dependency in the code above needs to be
    available only on test. The following code shows how you can restrict the use
    of one dependency to a particular scope:


    ```

    libraryDependencies += groupID % artifactID % revision % configuration

    ```


    This is the Maven version:


    ```

    org.scalatest

    scalatest_3

    3.2.9

    test

    ```


    The operator `+=` appends to the existing value. You can also use another operator,
    `++=`, which appends the sequence of values to the existing value.


    ```

    libraryDependencies ++= Seq(

    groupID % artifactID % revision,

    groupID % otherID % otherRevision

    )

    ```


    If you want to use the library dependency that is not in one of the default repositories,
    you need to add a resolver to help Coursier locate it. In order to provide the
    location of a repository, use the following syntax:


    ```

    resolvers += name at location

    ```


    Here `name` is the String name of the repository and `location` is the String
    location of the repository. The following shows how to add the additional repository:


    ```

    resolvers += "Sonatype OSS Snapshots" at https://oss.sonatype.org/content/repositories/snapshots

    ```


    You add the sonatypeoss snapshots repository, which is located at the given URL.


    One last thing to consider: Some libraries are compiled in Scala 2.13, so if you
    want to use them in Scala 3, you need to use `cross(CrossVersion.for3Use2_13)`.
    Take into consideration that the libraries need to be compiled at least with version
    2.13 or up; if not, this approach will not work. This code shows how you can do
    it with one dependency:


    ```

    libraryDependencies ++= Seq(

    ("org.querki" % "jquery-facade" % "2.0").cross(CrossVersion.for3Use2_13)

    )

    ```


    # Plugins


    A plugin is an artifact that extends the build definition, usually by adding new
    settings. In order to declare this plugin dependency, you need to pass the plugin’s
    module ID to `addSbtPlugin` as shown below.


    Next, you’ll see how to use an assembly plugin using the hello world project you
    created earlier. You can obtain the SBT assembly plugin’s module ID from the GitHub
    repository. This plugin helps create the jar of the application.


    First, create an `assembly.sbt` file for the plugin in the helloworld project
    directory:


    ```

    addSbtPlugin("com.eed3si9n" % "sbt-assembly" % "1.1.0")

    ```


    Then enter the SBT console and type `assembly`. If everything works, you will
    see something like this:


    ```

    sbt:hello world> assembly

    [info] Strategy ''discard'' was applied to a file (Run the task at debug level
    to see details)

    [info] Strategy ''rename'' was applied to 2 files (Run the task at debug level
    to see details)

    [success] Total time: 2 s, completed Sep 20, 2021, 4:43:04 PM

    ```


    Now, package your code. To see the location of the jar file, you need to execute
    another command, which is `show assembly`.


    ```

    sbt:hello world> show assembly

    [info] Strategy ''discard'' was applied to a file (Run the task at debug level
    to see details)

    [info] Assembly up to date: /home/scala/helloworld/target/scala-3.0.1/hello world-assembly-1.0.jar

    [info] /home/scala/helloworld/target/scala-3.0.1/hello world-assembly-1.0.jar

    [success] Total time: 0 s, completed Sep 20, 2021, 4:45:29 PM

    ```


    One last thing: If you want to change the name of your assembly, you need to introduce
    the following line in your `build.sbt`:


    ```

    assemblyJarName := "beginning-scala-1.0.jar"

    ```


    One chapter is not enough to list all the features of SBT; it deserves a book
    of its own. For a detailed treatment on SBT, we recommend you go through the reference
    manual of SBT at [`www.scala-sbt.org/release/docs/`](http://www.scala-sbt.org/release/docs/).
    This chapter did provide a brief introduction to SBT, and now you know enough
    use it to build a web application in the next chapter.'
