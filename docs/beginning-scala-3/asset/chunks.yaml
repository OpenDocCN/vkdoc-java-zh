    scala>

    ```


    ### Installing SBT


    [SBT](https://www.scala-sbt.org/)^([^(16)](#fn16)) is the de facto build tool
    to use Scala on your machine. This tool needs at least JDK 8 to work, but if you
    install JDK 11 on your machine, you will not have any problems. You will see more
    details about the things you can do with this tool in Chapter [11](#328789_3_En_11_Chapter.xhtml),
    so for now just focus on installing it.


    There are some different ways to install this tool depending on your operating
    system:


    *   For Mac OS/Linux, you can use [brew](https://brew.sh/), which is a tool to
    install/update different things.


    *   For Windows platforms, you can download the MSI installer from the [official
    page](https://www.scala-sbt.org/download.html)^([^(17)](#fn17)).


    ```

    ➜  ~ brew install sbt

    ```


    After you’ve finished with the installation of the SBT, check if everything is
    installed on your system. To this, run the following command:


    ```

    ➜  ~ sbt --version

    sbt version in this project: 1.5.2

    sbt script version: 1.5.2

    ```


    SBT lets you run a specific part of your application, considering the version
    of Scala that you previously configured.


    ```

    ➜  ~ sbt

    [info] welcome to sbt 1.5.2 (Homebrew Java 16.0.1)

    [info] loading global plugins from /Users/user/.sbt/1.0/plugins

    [info] loading project definition from /Users/user/project

    [info] set current project to codigo (in build file:/Users/user/)

    [info] sbt server started at local:///Users/user/.sbt/1.0/server/b5ec50d5e016a82e5659/sock

    [info] started sbt server

    sbt:user> console

    scala>

    ```


    ### Installing the IDE


    There are some IDEs that add support for Scala 3\. Each has several pros/cons,
    which are out of the scope of this book. Two options are [IntelliJ](https://www.jetbrains.com/idea/)^([^(18)](#fn18))
    or [Visual Studio Code](https://code.visualstudio.com/)^([^(19)](#fn19)), which
    introduced support a long time ago when the first milestone appeared and fixed
    some problems with the plugins to validate the syntax.


    You can see the instructions to install both IDEs on their official pages, which
    mention the minimum resources and operating system options. In both cases, support
    for Scala is not enabled by default, so you need to install it by doing the following
    step, depending on the IDE:


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig2_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig2_HTML.png)


    Figure 1-2


    The different IntelliJ plugins available for installation


    *   **IntelliJ**: Go to IntelliJ IDEA ➤ Preferences ➤ Plugins and find and install
    Scala (see Figure [1-2](#328789_3_En_1_Chapter.xhtml#Fig2)).


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig3_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig3_HTML.png)


    Figure 1-3


    The Scala plugin, which introduces support for version 3.x.x


    *   **Visual Studio Code:** Go to Code ➤ Preferences ➤ Extensions, and find and
    install Scala Metals, which offers support for Scala 2 and 3 (see Figure [1-3](#328789_3_En_1_Chapter.xhtml#Fig3)).


    If you use these IDEs, check if you have the latest version because some of the
    plugins/extensions do not work well with old versions.


    ## Running Code Examples


    After finishing the installation of all the tools related to Scala, you can run
    some fragments of the code without opening an IDE by using the REPL (Read Eval
    Print Loop), which is the command line of Scala.


    ### Using an IDE


    Using an IDE is the best way to develop in any language, and Scala is no exception
    to this rule. A good way to create a project agnostic of the IDE that you choose
    to use is to create a project using [SBT](https://www.scala-sbt.org/), which you
    installed in the previous section.


    SBT has a specific command to create a project that uses Scala 3, which is different
    from the common command to create any Scala project. The following command will
    create a project with the latest version of Scala 3:


    ```

    ➜  ~ sbt new scala/scala3.g8

    ```


    After the execution of this command, you’ll see a lot of logs that show you the
    steps. Some part of the process will ask you the name of the project.


    ```

    [info] welcome to sbt 1.5.2 (Homebrew Java 16.0.1)

    [info] loading global plugins from /Users/user/.sbt/1.0/plugins

    [info] set current project to new (in build file:/private/var/folders/2b/kp4ljsm95ds2n78p6b77ppbw9f_rkf/T/sbt_155ffd12/new/)

    A template to demonstrate a minimal Scala 3 application

    name [Scala 3 Project Template]: scala3-test

    Template applied in /Users/user/./scala3-test

    ```


    If everything finishes without error, you can access the directory and see something
    like this:


    ```

    ➜  ~ scala3-test ls

    README.md build.sbt project   src       target

    ```


    With the project created using SBT, you can import it into your preferred IDE
    (IntelliJ or Visual Studio Code), and when the compilation of the files finishes,
    you can run it.


    The following is the output to run `Main.scala` in Visual Studio Code but the
    same happens if you run it in IntelliJ:


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Figa_HTML.gif](images/328789_3_En_1_Chapter/328789_3_En_1_Figa_HTML.gif)


    ### Manually Using the REPL


    To use the REPL, you need to open your console and type the following command:


    ```

    ➜  ~ scala

    scala>

    ```


    A possible use of the REPL is to do little experiments when you don’t want to
    create an entire class or project to test them.'
