  raw: '#### Givens and Imports


    As you read in the previous section, one of the restrictions of the use of `given`
    sentences is the need to be in the same scope. Scala 3 offers a way to import
    and include in the same scope.


    ```

    object A:

    val name = "0"

    def hello(s: String) = s"$s, hello from $name"

    class A1

    class A2

    class A3

    given a1: A1 = A1()

    given a2: A2 = A2()

    given a3: A3 = A3()

    ```


    Let’s see some possible ways to import the `given` sentences:


    ```

    import A.{given _} // Imports ONLY the givens

    import A.{given a1} // Imports explicitly a1

    import A.{given _, _} // Imports everything in A

    import A._ // Imports everything EXCEPT the givens

    import A.*       // Imports everything EXCEPT the givens

    import A.given   // Imports ONLY the givens

    ```


    Using this type of import, you can declare in an explicit way which things you
    need to use in your classes or objects.


    #### Using Clauses


    In Scala, it is not necessary to explicitly pass parameters to a method. In previous
    version of Scala, this functionality is connected directly with `implicit` , but
    in Scala 3.x.x, the same functionality has a new keyword named `using`.


    To explain this concept well, let’s create some types of order.


    ```

    trait Ord[T]:

    def compare(x: T, y: T): Int

    extension (x: T) def  (y: T) = compare(x, y) > 0

    given intOrd: Ord[Int] with

    def compare(x: Int, y: Int) =

    if x  y then +1 else 0

    given listOrd[T](using ord: Ord[T]): Ord[List[T]] with

    def compare(xs: List[T], ys: List[T]): Int = (xs, ys) match

    case (Nil, Nil) => 0

    case (Nil, _) => -1

    case (_, Nil) => +1

    case (x :: xs1, y :: ys1) =>

    val fst = ord.compare(x, y)

    if fst != 0 then fst else compare(xs1, ys1)

    ```


    Now create a method that receives numbers and, depending on the type of order,
    obtains the maximum value.


    ```

    def max[T](x: T, y: T)(using ord: Ord[T]): T =

    if ord.compare(x, y) < 0 then y else x

    ```


    As you can see, your method receives two parameters of the same type and does
    not use a specific type of `Ord`, which you can define when you invoke another
    part of the code.


    ```

    scala> max(1, 9)(using intOrd)

    val res8: Int = 9

    scala> max(List(2,5, 1), List(1,2,3))(using listOrd)

    val res11: List[Int] = List(2, 5, 1)

    ```


    ## Summary


    In this chapter, you learned Scala’s rules about variance, type bounds, and `given`/`using`
    classes.


    # 9. Scala and Java Interoperability


    This chapter describes how Scala is translated to Java and the use of Java annotations
    in the Scala framework. The goal of this chapter is to show you how easily you
    can integrate Scala with Java. You’ll also learn how Scala annotations help in
    integration, such as when generating JavaBean-style getters and setters.


    ## Scala at a Glance


    One of the main design goals of Scala is to run on a JVM and provide interoperability
    with Java. The need for Scala and Java interoperability arises when you want to
    use existing Java libraries or frameworks. Scala code is often used in tandem
    with large Java programs and frameworks. Even though integration with Java is
    easy for the most part, we encourage you to use pure Scala as much as possible.
    When you are working with a Java library or framework, first try to find something
    equivalent in Scala. Use Java if there’s no equivalent Scala library available.


    Scala is compiled to Java bytecodes, and you can use tools like Java class file
    disassembler `javap` to disassemble bytecodes generated by the Scala compiler.
    By running on a JVM you can take advantage of all the frameworks and tools built
    into other JVM languages. In most cases, Scala features are translated into Java
    features so that Scala can easily integrate with Java. However, some Scala features
    don’t directly map to Java, and in such a case, you have to learn how to handle
    features that are available in Java but not in Scala. The features that are available
    in Java but not in Scala are static members and checked exceptions. An example
    of a Scala feature that is not available in Java is traits. If you are using Java
    from Scala, you have to deal with mutability, exceptions, and nulls that are interdicted
    in the Scala world. Because Scala works seamlessly with Java, most of the time
    you can combine the languages without worrying too much.


    Note that the Long Term Support (LTS) version of Java at the time of writing is
    11, which means new features could appear in new versions of Java which are compatible
    in some way with Scala.


    ## Translating Java Classes to Scala Classes


    The interoperability between Scala classes and Java classes makes it straightforward
    to replace or extend an existing Java class with a Scala class. The following
    code shows a `class` declaration in Java.


    ```

    public class Book {}

    ```


    Here is the Scala code:


    ```

    class Book

    ```


    As you learned in Chapter [3](#328789_3_En_3_Chapter.xhtml), you don’t need braces
    when there’s no content and everything is public in Scala by default.


    Now define a Java class with a constructor that binds instance variables with
    accessors.


    ```

    public class Book {

    private final int isbn;

    private final String title;

    public Book(int isbn, String title) {

    this.isbn = isbn;

    this.title = title;

    }

    public int getIsbn() {

    return isbn;

    }

    public String getTitle() {

    return title;

    }

    }

    ```


    As you can see, the constructor binds the instance variables `isbn` and `title`
    with accessors `getIsbn` and `getTitle`. Let’s see the Scala equivalent.


    ```

    class Book(val isbn: Int, val title: String)

    ```


    In version 14 or up in Java, records make an appearance, which reduce a lot this
    code, making it similar to the code in Scala. The only thing you need to consider
    is that the record can’t be extended in any way.


    ```

    public record Book (int isbn, String title) {}

    ```


    As you can see in the Scala code above, adding `val` makes the constructor arguments
    bind to a field of the same name. The following code shows the Java class `NonFiction`
    with a constructor that calls the superclass:


    ```

    public class NonFiction extends Book {

    public NonFiction(int isbn, String title) {

    super(isbn, title);

    }

    }

    ```


    Here is the Scala equivalent:


    ```

    class NonFiction (isbn: Int, title: String) extends Book(isbn, title)

    ```


    As you can see, the primary constructor goes in the declaration. What about the
    multiple constructors? You will see them in the section that follows. Let’s compare
    the mutable and immutable instance variables in Java and Scala. This code illustrates
    the mutable instance variable in Java:


    ```

    public class Book {

    private String title = "Beginning Scala";

    public String getTitle() {

    return title;

    }

    public void setTitle(String t) {

    title = t;

    }

    }

    ```


    This code illustrates the Scala equivalent:


    ```

    class Book:

    var  title = "Beginning Scala"

    ```


    As you can see, just writing `var` in the class body defines a mutable field.
    Now let’s see the immutable instance variables in Java and Scala. This code illustrates
    an immutable instance variable in Java:


    ```

    public class Book {

    private final int isbn = 999;

    public int getIsbn() {

    return isbn;

    }

    }

    ```


    This code illustrates the Scala equivalent:


    ```

    class Book:

    val isbn = 999

    ```


    As you may have noticed, `isbn` is also the name of an accessor method.


    ### Translating Java Imports into Scala Imports


    Imports in both languages are similar; they only change some parts of the syntax.
    Scala introduces a feature that lets you only import specific classes of one package
    using braces, like other popular languages like Kotlin.


    Java imports from different packages:


    ```

    import com.modA.ClassA;

    import com.modB.ClassB1;

    import com.modB.ClassB2;

    import com.modC.*;

    ```


    The Scala equivalent:


    ```

    import com.modA.ClassA;

    import com.modB.{ClassB1, ClassB2} // You can stack multiple imports from the
    same package in braces.

    import com.modC._ // Underscore in Scala imports is equivalent of * in Java imports.

    ```'
