    关于作者 关于技术审校者


    # 1. 开始使用 Scala


    Scala 并不是你在大学里学到的那些流行语言之一，因此大多数人甚至不知道它的存在。然而，使用它有许多好处或理由。Scala 诞生时是一种特性相对较少的语言，但其理念是简单清晰地做事。因此，大多数对
    Scala 有所了解的开发者将其用于不同的项目，其中一些人还合作创建了最新版本的 Scala。

    '
- fmt: "# Why Use Scala?\n\nScala is a language that any developer can use for a variety\
    \ of purposes, from simple to complex applications, because it offers a mixed\
    \ paradigm, a simple and elegant syntax to declare variables or to use the different\
    \ features which not appears in other languages. Let’s see some of the reasons\
    \ to use Scala:\n\n- Scala is a simple, clear, and expressive language with the\
    \ idea of reducing the complexity of some operations, such as creating variables.\n\
    \n  **Variables in Java**\n\n  ```\n  private int number = 4;\n  private int otherNumber\
    \ = 2;\n  ```\n\n  **Variables in Scala**\n\n  ```\n  val number = 4 //One alternative\
    \ to declare a variable\n  val otherNumber:Int = 2 //Another alternative to do\
    \ the same\n  ```\n\n  When it comes to declaring classes, the differences between\
    \ these two languages grow:\n\n  **Class in Java**\n\n  ```\n  public class Person\
    \ {\n  private String name;\n  private String passport;\n  public Person(String\
    \ name, String passport) {\n  this.name = name;\n  this.passport = passport;\n\
    \  }\n  }\n  ```\n\n  **Class in Scala**\n\n  ```\n  class Person(name:String,\
    \ passport:String)\n  ```\n\n  In Java, there is a [library](https://projectlombok.org/)^([¹](#fn1))\
    \ called Lombok that helps reduce the number of lines of code in the POJO objects\
    \ that automatically generate `set`, `get`, `toString`, or `equals` methods. You\
    \ need to add this library in your code to obtain these benefits. In Scala, these\
    \ benefits exist without adding any library.\n\n- Connected with the last point,\
    \ Scala has a lightweight syntax. For that reason, most of the keywords that exist\
    \ in other languages (such as `continue` or `break` in Java) do not exist in Scala.\
    \ Also, in Scala it’s optional to use a keyword like `new` to instantiate an object,\
    \ so you can use it or not.\n\n- Scala has some of the best practices that other\
    \ languages have, like immutability in the variables, anonymous functions, pattern\
    \ matching, and more.\n\n- Scala is a multi-paradigm language because it combines\
    \ an object-oriented language with a functional language so you can create objects\
    \ that receive functions. This characteristic has existed for a long time and\
    \ is a key difference from other languages. For example, Scala has a lot of methods\
    \ to iterate and filter collections before Java 8.\n\n- Scala uses the JVM (Java\
    \ Virtual Machine) to exploit all the benefits of the improvements in the performance\
    \ of each new version. Also, you can interact with libraries of other languages\
    \ that use JVM, such as Java.\n\n- Recently, Scala started offering the possibility\
    \ of using [GraalVM](https://www.graalvm.org/)^([²](#fn2)) or [Scala Native](https://scala-native.readthedocs.io/en/latest/)^([³](#fn3)),\
    \ which improves performance in compilation, the use of memory, and the time to\
    \ start Scala applications. In the case that you want to use Scala Native, you\
    \ need to use version 2.11.x or up which includes Scala 3. You can see a complete\
    \ benchmark about the difference between each alternative in an article on Medium^([⁴](#fn4)).\n\
    \n- Scala has a great number of libraries to reduce the time to do certain operations\
    \ like iterate using a `for` loop. Also, the Scala community has grown a lot since\
    \ the first version and now offers many conferences and talks ([`https://scala-lang.org/events/`](https://scala-lang.org/events/)\
    \ lists some of them) about complex problems that you can solve using Scala.\n\
    \n## Migrating to Scala 3\n\nDevelopers who have experience using the previous\
    \ version of Scala (2.x.x), which has several books and tutorials that explain\
    \ all the features, may feel uncomfortable migrating to a new version because\
    \ it introduces a lot of features and deprecates others. So why migrate to Scala\
    \ 3? To answer this question, consider the following benefits of this new version:\n\
    \n- One of the most important features of this new version is the compilation\
    \ time. As said by Martin Odersky at ScalaCon, “The compilation time is 3000 lines/second.”\
    \ (It might be longer the first time you compile your code; these things depend\
    \ on how many libraries you have in your project.)\n\n- Several new features simplify\
    \ the life of the developer. Here are some of them:\n  - **Optional braces/parentheses**:\
    \ This one of the most requested features for the new version. The idea is simply\
    \ to reduce the complexity of the code by removing the braces or parentheses in\
    \ all declarations, but you need to help the compiler by using the correct indentation\
    \ (similar to Python).\n\n    In the following example, you can see an `if/else`\
    \ in both versions:\n\n    **Scala 2**\n\n    ```\n    val number = 1\n    val\
    \ isZero = if (number == 1) { true } else { false }\n    ```\n\n    **Scala 3**\n\
    \n    ```\n    val number = 1\n    val isZero = if number == 1 then true else\
    \ false\n    ```\n\n    Another example of this feature is the case of the `for`\
    \ loop:\n\n    **Scala 2**\n\n    ```\n    val a = 0\n    for( a <- 1 to 10) {\n\
    \    println( \"Value of a: \" + a )\n    }\n    ```\n\n    **Scala 3**\n\n  \
    \  ```\n    val a = 0\n    for a <- 1 to 10 do println( \"Value of a: \" + a )\n\
    \    ```\n\n  - **Enumerations**: Most developers who use Java know the concept\
    \ of enumeration because it helps to have an object that contains all possible\
    \ values for one particular object.\n\n    ```\n    enum Color:\n    case RED,\
    \ YELLOW, GREEN;\n    ```\n\n    This enum not only lets you define possible values,\
    \ but you also have different methods to simplify the use of this type of object,\
    \ such as obtaining the correct value of the enum from a String.\n\n  - **Implicits**:\
    \ This feature went through a redesign in Scala 3 to simplify the use. For this\
    \ reason, there are new keywords, `given` and `using`, to replace the old version.\n\
    \n  - **Intersection and union types**: The intersection type lets you combine\
    \ different types in one. The order of the types is not important because they\
    \ always produce the same result. You can see something similar in Java when you\
    \ have a class that implements multiple interfaces. In the case of the union type,\
    \ it accepts two different types without any problem, such as a method that has\
    \ a param, a String, or an Int (`String | Int`). You can send any of these types,\
    \ and your method needs to have the logic to do something different in both cases.\n\
    \n    ```\n    val color = Color.valueOf(\"BLUE\")\n    ```\n\n- Retro compatibility\
    \ with the latest version of Scala, 2.x.x. The idea of Scala 3.x.x is to include\
    \ the binaries of Scala 2 so that the transition from one version to another becomes\
    \ a complex task so you can have parts of the code with an old version and parts\
    \ with the new version. The official page offers a [complete guide](https://docs.scala-lang.org/scala3/guides/migration/tutorial-intro.html)^([⁵](#fn5))\
    \ to do this migration and shares some common problems that you may run into during\
    \ the migration from one version to another. Also, there is a video^([⁶](#fn6))\
    \ that covers most of the migration guide in a way that could be better."
  raw: "## Why Use Scala?\n\nScala is a language that any developer can use for a\
    \ variety of purposes, from simple to complex applications, because it offers\
    \ a mixed paradigm, a simple and elegant syntax to declare variables or to use\
    \ the different  features which not appears in other languages. Let’s see some\
    \ of the reasons to use Scala:\n\n*   Scala is a simple, clear, and expressive\
    \ language with the idea of reducing the complexity of some operations, such as\
    \ creating variables.\n\n    **Variables in Java**\n\n    ```\n    private int\
    \ number = 4;\n    private int otherNumber = 2;\n    ```\n\n    **Variables in\
    \ Scala**\n\n    ```\n    val number = 4 //One alternative to declare a variable\n\
    \    val otherNumber:Int = 2 //Another alternative to do the same\n    ```\n\n\
    \    When it comes to declaring classes, the differences between these two languages\
    \ grow:\n\n    **Class in Java**\n\n    ```\n    public class Person {\n    private\
    \ String name;\n    private String passport;\n    public Person(String name, String\
    \ passport) {\n    this.name = name;\n    this.passport = passport;\n    }\n \
    \   }\n    ```\n\n    **Class in Scala**\n\n```\nclass Person(name:String, passport:String)\n\
    ```\n\nIn Java, there is a [library](https://projectlombok.org/)^([¹](#fn1)) called\
    \ Lombok that helps reduce the number of lines of code in the POJO objects that\
    \ automatically generate `set`, `get`, `toString`, or `equals` methods. You need\
    \ to add this library in your code to obtain these benefits. In Scala, these benefits\
    \ exist without adding any library.\n\n*   Connected with the last point, Scala\
    \ has a lightweight syntax. For that reason, most of the keywords that exist in\
    \ other languages (such as `continue` or `break` in Java) do not exist in Scala.\
    \ Also, in Scala it’s optional to use a keyword like `new` to instantiate an object,\
    \ so you can use it or not.\n\n*   Scala has some of the best practices that other\
    \ languages have, like immutability in the variables, anonymous functions, pattern\
    \ matching, and more.\n\n*   Scala is a multi-paradigm language because it combines\
    \ an object-oriented language with a functional language so you can create objects\
    \ that receive functions. This characteristic has existed for a long time and\
    \ is a key difference from other languages. For example, Scala has a lot of methods\
    \ to iterate and filter collections before Java 8.\n\n*   Scala uses the JVM (Java\
    \ Virtual Machine) to exploit all the benefits of the improvements in the performance\
    \ of each new version. Also, you can interact with libraries of other languages\
    \ that use JVM, such as Java.\n\n*   Recently, Scala started offering the possibility\
    \ of using [GraalVM](https://www.graalvm.org/)^([²](#fn2)) or [Scala Native](https://scala-native.readthedocs.io/en/latest/)^([³](#fn3)),\
    \ which improves performance in compilation, the use of memory, and the time to\
    \ start Scala applications. In the case that you want to use Scala Native, you\
    \ need to use version 2.11.x or up which includes Scala 3\\. You can see a complete\
    \ benchmark about the difference between each alternative in an article on Medium^([⁴](#fn4)).\n\
    \n*   Scala has a great number of libraries to reduce the time to do certain operations\
    \ like iterate using a `for` loop. Also, the Scala community has grown a lot since\
    \ the first version and now offers many conferences and talks ([`https://scala-lang.org/events/`](https://scala-lang.org/events/)\
    \ lists some of them) about complex problems that you can solve using Scala.\n\
    \n## Migrating to Scala 3\n\nDevelopers who have experience using the previous\
    \ version of Scala (2.x.x), which has several books and tutorials that explain\
    \ all the features, may feel uncomfortable migrating to a new version because\
    \ it introduces a lot of features and deprecates others. So why migrate to Scala\
    \ 3? To answer this question, consider the following benefits of this new version:\n\
    \n*   One of the most important features of this new version is the compilation\
    \ time. As said by Martin Odersky at ScalaCon, “The compilation time is 3000 lines/second.”\
    \ (It might be longer the first time you compile your code; these things depend\
    \ on how many libraries you have in your project.)\n\n*   Several new features\
    \ simplify the life of the developer. Here are some of them:\n    *   **Optional**\
    \ **braces/parentheses** : This one of the most requested features for the new\
    \ version. The idea is simply to reduce the complexity of the code by removing\
    \ the braces or parentheses in all declarations, but you need to help the compiler\
    \ by using the correct indentation (similar to Python).\n\n        In the following\
    \ example, you can see an `if/else` in both versions:\n\n        **Scala 2**\n\
    \n        ```\n        val number = 1\n        val isZero = if (number == 1) {\
    \ true } else { false }\n        ```\n\n        **Scala 3**\n\n        ```\n \
    \       val number = 1\n        val isZero = if number == 1 then true else false\n\
    \        ```\n\n        Another example of this feature is the case of the `for`\
    \ loop:\n\n        **Scala 2**\n\n        ```\n        val a = 0\n        for(\
    \ a <- 1 to 10) {\n        println( \"Value of a: \" + a )\n        }\n      \
    \  ```\n\n        **Scala 3**\n\n        ```\n        val a = 0\n        for a\
    \ <- 1 to 10 do println( \"Value of a: \" + a )\n        ```\n\n    *   **Enumerations**\
    \ **:** Most developers who use Java know the concept of enumeration because it\
    \ helps to have an object that contains all possible values for one particular\
    \ object.\n\n        ```\n        enum Color:\n        case RED, YELLOW, GREEN;\n\
    \        ```\n\n        This enum not only lets you define possible values, but\
    \ you also have different methods to simplify the use of this type of object,\
    \ such as obtaining the correct value of the enum from a String.\n\n    *   **Implicits**\
    \ **:** This feature went through a redesign in Scala 3 to simplify the use. For\
    \ this reason, there are new keywords, `given` and `using`**,** to replace the\
    \ old version.\n\n    *   **Intersection and union types** **:** The intersection\
    \ type lets you combine different types in one. The order of the types is not\
    \ important because they always produce the same result. You can see something\
    \ similar in Java when you have a class that implements multiple interfaces. In\
    \ the case of the union type, it accepts two different types without any problem,\
    \ such as a method that has a param, a String, or an Int (String | Int). You can\
    \ send any of these types, and your method needs to have the logic to do something\
    \ different in both cases.\n\n    ```\n    val color = Color.valueOf(\"BLUE\"\
    )\n    ```\n\n*   Retro compatibility with the latest version of Scala, 2.x.x.\
    \ The idea of Scala 3.x.x is to include the binaries of Scala 2 so that the transition\
    \ from one version to another becomes a complex task so you can have parts of\
    \ the code with an old version and parts with the new version. The official page\
    \ offers a [complete guide](https://docs.scala-lang.org/scala3/guides/migration/tutorial-intro.html)^([⁵](#fn5))\
    \ to do this migration and shares some common problems that you may run into during\
    \ the migration from one version to another. Also, there is a video^([⁶](#fn6))\
    \ that covers most of the migration guide in a way that could be better."
  trans: "\n## 为何选择 Scala？\n\nScala 是一门任何开发者都能用于多种用途的语言，从简单到复杂的应用皆可胜任。它提供了混合范式，以及简洁优雅的语法来声明变量或使用其他语言不具备的特性。让我们来看看使用\
    \ Scala 的一些理由：\n\n*   Scala 是一门简单、清晰且富有表现力的语言，其理念在于降低某些操作（例如创建变量）的复杂性。\n\n   \
    \ **Java 中的变量**\n\n    ```\n    private int number = 4;\n    private int otherNumber\
    \ = 2;\n    ```\n\n    **Scala 中的变量**\n\n    ```\n    val number = 4 //声明变量的一种方式\n\
    \    val otherNumber:Int = 2 //实现相同目的的另一种方式\n    ```\n\n    在声明类时，这两种语言之间的差异更大：\n\
    \n    **Java 中的类**\n\n    ```\n    public class Person {\n    private String name;\n\
    \    private String passport;\n    public Person(String name, String passport)\
    \ {\n    this.name = name;\n    this.passport = passport;\n    }\n    }\n    ```\n\
    \n    **Scala 中的类**\n\n    ```\n    class Person(name:String, passport:String)\n\
    \    ```\n\n    在 Java 中，有一个名为 Lombok 的[库](https://projectlombok.org/)^(¹)，它有助于减少\
    \ POJO 对象中的代码行数，能自动生成 `set`、`get`、`toString` 或 `equals` 方法。你需要在代码中添加这个库才能获得这些好处。而在\
    \ Scala 中，无需添加任何库即可拥有这些特性。\n\n*   承接上一点，Scala 拥有轻量级的语法。因此，其他语言中存在的大多数关键字（例如 Java\
    \ 中的 `continue` 或 `break`）在 Scala 中并不存在。此外，在 Scala 中，像 `new` 这样的关键字用于实例化对象是可选的，你可以使用也可以不使用。\n\
    \n*   Scala 具备其他语言中的一些最佳实践，例如变量的不可变性、匿名函数、模式匹配等等。\n\n*   Scala 是一门多范式语言，因为它结合了面向对象语言和函数式语言，因此你可以创建接收函数的对象。这一特性由来已久，并且是与其他语言的关键区别。例如，在\
    \ Java 8 之前，Scala 就已经拥有许多用于迭代和过滤集合的方法。\n\n*   Scala 利用 JVM（Java 虚拟机）来充分利用每个新版本在性能改进方面的所有优势。此外，你还可以与使用\
    \ JVM 的其他语言（如 Java）的库进行交互。\n\n*   最近，Scala 开始提供使用 [GraalVM](https://www.graalvm.org/)^(²)\
    \ 或 [Scala Native](https://scala-native.readthedocs.io/en/latest/)^(³) 的可能性，这提高了编译性能、内存使用效率以及\
    \ Scala 应用程序的启动时间。如果你想使用 Scala Native，你需要使用 2.11.x 或更高版本（包括 Scala 3）。你可以在 Medium\
    \ 上的一篇文章^(⁴)中看到关于每种方案之间差异的完整基准测试。\n\n*   Scala 拥有大量的库，可以减少执行某些操作（如使用 `for` 循环进行迭代）的时间。此外，自第一个版本以来，Scala\
    \ 社区已经发展壮大，现在提供了许多会议和讲座（[`https://scala-lang.org/events/`](https://scala-lang.org/events/)\
    \ 列出了其中一些），讨论你可以使用 Scala 解决的复杂问题。\n\n## 迁移到 Scala 3\n\n有使用 Scala 先前版本（2.x.x）经验的开发者，可能会对迁移到新版本感到不适，因为新版本引入了许多特性并弃用了其他特性，而关于旧版本已有许多书籍和教程解释了所有功能。那么，为什么要迁移到\
    \ Scala 3？要回答这个问题，请考虑这个新版本的以下优点：\n\n*   这个新版本最重要的特性之一是编译时间。正如 Martin Odersky 在\
    \ ScalaCon 上所说，“编译时间是 3000 行/秒。”（首次编译代码时可能会更长；这取决于你的项目中有多少库。）\n\n*   几个新特性简化了开发者的工作。以下是其中一些：\n\
    \    *   **可选花括号/圆括号**：这是新版本中最受期待的特性之一。其理念很简单，即通过移除所有声明中的花括号或圆括号来降低代码的复杂性，但你需要使用正确的缩进来帮助编译器（类似于\
    \ Python）。\n\n        在下面的例子中，你可以看到两个版本中的 `if/else`：\n\n        **Scala 2**\n\n\
    \        ```\n        val number = 1\n        val isZero = if (number == 1) {\
    \ true } else { false }\n        ```\n\n        **Scala 3**\n\n        ```\n \
    \       val number = 1\n        val isZero = if number == 1 then true else false\n\
    \        ```\n\n        此特性的另一个例子是 `for` 循环：\n\n        **Scala 2**\n\n      \
    \  ```\n        val a = 0\n        for( a <- 1 to 10) {\n        println( \"Value\
    \ of a: \" + a )\n        }\n        ```\n\n        **Scala 3**\n\n        ```\n\
    \        val a = 0\n        for a <- 1 to 10 do println( \"Value of a: \" + a\
    \ )\n        ```\n\n    *   **枚举**：大多数使用 Java 的开发者都了解枚举的概念，因为它有助于创建一个包含某个特定对象所有可能值的对象。\n\
    \n        ```\n        enum Color:\n        case RED, YELLOW, GREEN;\n       \
    \ ```\n\n        这个枚举不仅允许你定义可能的值，还提供了不同的方法来简化此类对象的使用，例如从字符串中获取枚举的正确值。\n\n    *\
    \   **隐式（Implicits）**：此特性在 Scala 3 中经过了重新设计以简化使用。因此，引入了新的关键字 `given` 和 `using`\
    \ 来替代旧版本。\n\n    *   **交集类型与联合类型**：交集类型允许你将不同类型组合成一个。类型的顺序并不重要，因为它们总是产生相同的结果。在\
    \ Java 中，当一个类实现多个接口时，你可以看到类似的情况。对于联合类型，它可以毫无问题地接受两种不同的类型，例如一个方法有一个参数，可以是字符串或整数（String\
    \ | Int）。你可以发送其中任何一种类型，你的方法需要包含逻辑来对这两种情况执行不同的操作。\n\n    ```\n    val color = Color.valueOf(\"\
    BLUE\")\n    ```\n\n*   与 Scala 最新版本 2.x.x 的向后兼容性。Scala 3.x.x 的理念是包含 Scala 2 的二进制文件，以便从一个版本到另一个版本的过渡变得复杂，这样你可以让部分代码使用旧版本，部分代码使用新版本。官方页面提供了一个[完整指南](https://docs.scala-lang.org/scala3/guides/migration/tutorial-intro.html)^(⁵)来进行此迁移，并分享了一些在从一个版本迁移到另一个版本时可能遇到的常见问题。此外，还有一个视频^(⁶)以更易懂的方式涵盖了大部分迁移指南。\n"
- fmt: "# History\n\nAlthough you may not have heard much, or indeed anything, about\
    \ `Scala`, this language has existed for a long time. The design of the language\
    \ started in 2001 at [École Polytechnique Fédérale de Lausanne](https://www.epfl.ch/en/)\
    \ (EPFL) by Martin Odersky, but the first version was launched in 2003. Since\
    \ that year it has grown in the number of developers that use it for different\
    \ things.\n\nMartin Odersky offered several courses on different platforms and\
    \ took part in some conferences with the idea of letting more people know all\
    \ the benefits of `Scala`.\n\nIn 2006, a new version of `Scala` (2.0) was released.\
    \ It included features like rewriting the compiler, supporting generics from Java,\
    \ and others. Over the next 15 years, updates only included extra features or\
    \ bug fixing but nothing big enough to merit an increase to version 3.0. Regardless,\
    \ `Scala` continued to grow in popularity, and some companies started to use it,\
    \ like Twitter, which moved some parts of its back end from Ruby to `Scala`. The\
    \ New York Times uses it in parts of its system with `Akka` and `Play Framework`,\
    \ and certain teams at Apple, Google, and Walmart use `Scala` as part of their\
    \ backend platform.\n\nIn 2012, a new version was launched, with the idea to include\
    \ many features, simplify the syntax (some which appears in version 2.x.x), and\
    \ improve the performance of the compiler. `Scala 3.0.0` was launched on May 14,\
    \ 2021, and 100 contributors collaborated on the new features.\n\nSome considerations\
    \ about this new version:\n\n* Some considerations related with the compilation.\n\
    \  * The current speed is more or less 3000 lines/second, but the first time you\
    \ compile, it could take longer. After that, the velocity of compilation increases\
    \ because `Scala 3.0` has a very aggressive mechanism of caching.\n  * The velocity\
    \ of compilation will decrease if you have several external libraries, which generate\
    \ a lot of code behind the scenes.\n* You can consider `Scala 3.0` as a new language\
    \ because it introduces a lot of changes related to new features and some features\
    \ from version 2.0 have been removed or will be deprecated in the following versions.\n\
    * You don’t need to migrate everything from `Scala 2.x.x` to `Scala 3.x.x` because\
    \ the latest version uses the binaries of `Scala 2.13`.\n* Most of the features\
    \ provided by different contributors generated a lot of discussions about the\
    \ best approach.\n* In 2020, Martin Odersky, with the rest of the contributors,\
    \ decided to launch a survey to find out which features are the most exciting\
    \ for developers. The results showed that enums, unions/intersections, and opaque\
    \ types are the most relevant for developers.\n\nFigure 1-1 shows a brief summary\
    \ of the timeline of `Scala`’s evolution, with an emphasis on the steps towards\
    \ the latest version (`Scala 3.0`).\n\n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig1_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig1_HTML.png)\n\
    \nFigure 1-1\n\nThe evolution of `Scala`\n\n## Installing Scala Tools\n\nBefore\
    \ you start to read this book and try the different topics that appear, you need\
    \ to install some tools for `Scala` to work.\n\n### Installing Java JDK\n\nThe\
    \ first thing that you need to install before starting to try something in `Scala`\
    \ is the Java JDK. You may be thinking *“Why do I need to install the JDK? This\
    \ is something of Java and I want to develop applications in `Scala`.”* The answer\
    \ to this question is because `Scala` uses JVM, as do many other languages like\
    \ Java, Kotlin, Groovy, and Clojure.\n\nThere are alternatives to the JDK:\n\n\
    * **OracleJDK**: This version was free until Java 11. After this version you can\
    \ use it for development/test environments, but you need to pay a license to use\
    \ it in production. This version of the JDK offers the most recent patches of\
    \ bugs and new features because Oracle is the owner of the language.\n* **OpenJDK**:\
    \ When Oracle bought Sun Microsystems, it created this as an open-source alternative\
    \ that all developers can use in any environment without restrictions. The main\
    \ problem with this version is the patches take time to appear in non-critical\
    \ cases.\n* **Others**: There are many alternatives to JDK. AWS (Amazon Web Services)\
    \ has Amazon Corretto, which extends from OpenJDK and optimizes the performance\
    \ of applications in the environments of this cloud provider.\n\nIn this book,\
    \ we use **OpenJDK** but you can choose any alternative that you want. There are\
    \ many ways to install the JDK depending on the operating system:\n\n* For Mac\
    \ OS/Linux, you can use `brew`, which is a tool to install/update different things.\n\
    * For Windows platforms, you have two possibilities:\n  * The first option is\
    \ to install `brew` and run the same command as Mac OS/Linux.\n  * The second\
    \ option is to install AdoptOpenJDK, which lets you download OpenJDK for different\
    \ platforms. In the case of Windows, you can download a MSI file, which makes\
    \ the installation so easy.\n\n```\n➜  ~ brew install openjdk\n```\n\nAfter finishing\
    \ the installation of the JDK, check if the version of Java is available on your\
    \ system. To do this, type the following:\n\n```\n➜  ~ java -version\nOpenJDK\
    \ version \"11.0.9.1\" 2020-11-04\nOpenJDK Runtime Environment AdoptOpenJDK (build\
    \ 11.0.9.1+1)\nOpenJDK 64-Bit Server VM AdoptOpenJDK (build 11.0.9.1+1, mixed\
    \ mode)\n```\n\n`Scala 3` works with JDK 8 or 11, but in future versions of this\
    \ language support for JDK 8 will disappear and the minimum will become 11. For\
    \ that reason, it is recommended that you install JDK 11 or up. Also, JDK 11 offers\
    \ improvements related to performance, such as changing the default garbage collector\
    \ to G1, which reduces the pause times in general.\n\nLast but not least, if you\
    \ have installed SBT, the minimum version that supports `Scala 3.x.x` is SBT 1.5.0.\n\
    \n### Installing Scala\n\nThere are a lot of ways to install `Scala` on your machine\
    \ depending on your preferences. Some include the installation of the JDK, `Scala`,\
    \ and SBT. The following two methods let you use the command line of `Scala`,\
    \ but if you want to use it exclusively in your IDE, you can skip this step and\
    \ install only the SBT, which is a tool to create and compile `Scala` projects.\n\
    \n#### Using Brew\n\nYou can use `brew` as an option to install the compiler of\
    \ `Scala` because it has support on Mac/Linux. You can now use it on Windows too\
    \ with some extra steps to install it. To install `Scala`, run the following command:\n\
    \n```\n➜  ~ brew install lampepfl/brew/dotty\n```\n\nAfter finishing with the\
    \ installation, check if `Scala` is installed on your system. To do this, run\
    \ the following command:\n\n```\n➜  ~ scala -version\nScala compiler version 3.0.0\
    \ -- Copyright 2002-2021, LAMP/EPFL\n```"
  raw: "## History\n\nAlthough you may not have heard much, or indeed anything, about\
    \ Scala, this language has existed for a long time. The design of the language\
    \ started in 2001 at [École Polytechnique Fédérale de Lausanne](https://www.epfl.ch/en/)^([⁷](#fn7))\
    \ (EPFL) by Martin Odersky, but the first version was launched in 2003\\. Since\
    \ that year it has grown in the number of developers that use it for different\
    \ things.\n\nMartin Odersky offered several courses on different platforms and\
    \ took part in some conferences with the idea of letting more people know all\
    \ the benefits of Scala.\n\nIn 2006, a new version of Scala (2.0) was released.\
    \ It included features like rewriting the compiler, supporting generics from Java,\
    \ and others. Over the next 15 years, updates only included extra features or\
    \ bug fixing but nothing big enough to merit an increase to version 3.0\\. Regardless,\
    \ Scala continued to grow in popularity, and some companies started to use it,\
    \ like Twitter, which moved some parts of its back end from Ruby to Scala. The\
    \ New York Times uses it in parts of its system with Akka and Play Framework,\
    \ and certain teams at Apple, Google, and Walmart use Scala as part of their backend\
    \ platform.\n\nIn 2012, a new version was launched, with the idea to include many\
    \ features, simplify the syntax (some which appears in version 2.x.x), and improve\
    \ the performance of the compiler. Scala 3.0.0 was launched on May 14, 2021, and\
    \ 100 contributors collaborated on the new features.\n\nSome considerations about\
    \ this new version:\n\n*   Some considerations related with the compilation.\n\
    \    *   The current speed is more or less 3000 lines/second, but the first time\
    \ you compile, it could take longer. After that, the velocity of compilation increases\
    \ because Scala 3.0 has a very aggressive mechanism of caching.\n\n    *   The\
    \ velocity of compilation will decrease if you have several external libraries,\
    \ which generate a lot of code behind the scenes.\n\n*   You can consider Scala\
    \ 3.0 as a new language because it introduces a lot of changes related to new\
    \ features and some features from version 2.0 have been removed or will be deprecated\
    \ in the following versions.\n\n*   You don’t need to migrate everything from\
    \ Scala 2.x.x to Scala 3.x.x because the latest version uses the binaries of Scala\
    \ 2.13.\n\n*   Most of the features provided by different contributors generated\
    \ a lot of discussions about the best approach.\n\n*   In 2020, Martin Odersky,\
    \ with the rest of the contributors, decided to launch a survey to find out which\
    \ features are the most exciting for developers. The results showed that enums,\
    \ unions/intersections, and opaque types are the most relevant for developers.\n\
    \nFigure [1-1](#328789_3_En_1_Chapter.xhtml#Fig1) shows a brief summary of the\
    \ timeline of Scala’s evolution, with an emphasis on the steps towards the latest\
    \ version (Scala 3.0).\n\n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig1_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig1_HTML.png)\n\
    \nFigure 1-1\n\nThe evolution of Scala\n\n## Installing Scala Tools\n\nBefore\
    \ you start to read this book and try the different topics that appear, you need\
    \ to install some tools for Scala to work.\n\n### Installing Java JDK\n\nThe first\
    \ thing that you need to install before starting to try something in Scala is\
    \ the Java JDK. You may be thinking *“Why do I need to install the JDK? This is\
    \ something of Java and I want to develop applications in Scala.”* The answer\
    \ to this question is because Scala uses JVM, as do many other languages like\
    \ Java, Kotlin, Groovy, and Clojure.\n\nThere are alternatives to the JDK:\n\n\
    *   [**OracleJDK**](https://www.oracle.com/java/technologies/)^([⁸](#fn8))**:**\
    \ This version was free until Java 11\\. After this version you can use it for\
    \ development/test environments, but you need to pay a license to use it in production.\
    \ This version of the JDK offers the most recent patches of bugs and new features\
    \ because Oracle is the owner of the language.\n\n*   [**OpenJDK**](https://openjdk.java.net/)^([⁹](#fn9))**:**\
    \ When Oracle bought Sun Microsystems, it created this as an open-source alternative\
    \ that all developers can use in any environment without restrictions. The main\
    \ problem with this version is the patches take time to appear in non-critical\
    \ cases.\n\n*   **Others:** There are many alternatives to JDK. AWS (Amazon Web\
    \ Services) has [Amazon Corretto](https://aws.amazon.com/corretto/%253Fnc1%253Dh_ls)^([^(10)](#fn10)),\
    \ which extends from OpenJDK and optimizes the performance of applications in\
    \ the environments of this cloud provider.\n\nIn this book, we use **OpenJDK**\
    \ but you can choose any alternative that you want**.** There are many ways to\
    \ install the JDK depending on the operating system:\n\n*   For Mac OS/Linux,\
    \ you can use [brew](https://brew.sh/), which is a tool to install/update different\
    \ things.\n\n*   For Windows platforms, you have two possibilities:\n    *   The\
    \ first option is to install [brew](https://brew.sh/)^([^(11)](#fn11)) and run\
    \ the same command as Mac OS/Linux.\n\n    *   The second option is to install\
    \ [AdoptOpenJDK](https://adoptopenjdk.net/releases.html)^([^(12)](#fn12)), which\
    \ lets you download OpenJDK for different platforms. In the case of Windows, you\
    \ can download a MSI file, which makes the installation so easy.\n\n```\n➜  ~\
    \ brew install openjdk\n```\n\nAfter finishing the installation of the JDK, check\
    \ if the version of Java is available on your system. To do this, type the following:\n\
    \n```\n➜  ~ java -version\nOpenJDK version \"11.0.9.1\" 2020-11-04\nOpenJDK Runtime\
    \ Environment AdoptOpenJDK (build 11.0.9.1+1)\nOpenJDK 64-Bit Server VM AdoptOpenJDK\
    \ (build 11.0.9.1+1, mixed mode)\n```\n\nScala 3 works with JDK 8 or 11, but in\
    \ future versions of this language support for JDK 8 will disappear and the minimum\
    \ will become 11\\. For that reason, it is recommended that you install JDK 11\
    \ or up. Also, JDK 11 offers improvements related to performance, such as changing\
    \ the default garbage collector to [G1](https://openjdk.java.net/jeps/248)^([^(13)](#fn13)),\
    \ which reduces the pause times in general.\n\nLast but not least, if you have\
    \ installed SBT, the minimum version that supports Scala 3.x.x is SBT 1.5.0.\n\
    \n### Installing Scala\n\nThere are a lot of ways to install Scala on your machine\
    \ depending on your preferences. Some include the installation of the JDK, Scala,\
    \ and SBT. The following two methods let you use the command line of Scala, but\
    \ if you want to use it exclusively in your IDE, you can skip this step and install\
    \ only the SBT, which is a tool to create and compile Scala projects.\n\n####\
    \ Using Brew\n\nYou can use [brew](https://brew.sh/) as an option to install the\
    \ compiler of Scala because it has support on Mac/Linux. You can now use it on\
    \ Windows too with some extra steps to install it. To install Scala, run the following\
    \ command:\n\n```\n➜  ~ brew install lampepfl/brew/dotty\n```\n\nAfter finishing\
    \ with the installation, check if Scala is installed on your system. To do this,\
    \ run the following command:\n\n```\n➜  ~ scala -version\nScala compiler version\
    \ 3.0.0 -- Copyright 2002-2021, LAMP/EPFL\n```"
  trans: "\n## 历史\n\n虽然你可能对 Scala 了解不多，甚至一无所知，但这门语言已经存在了很长时间。该语言的设计始于 2001 年，由 Martin\
    \ Odersky 在[洛桑联邦理工学院](https://www.epfl.ch/en/)^(⁷) (EPFL) 发起，但第一个版本于 2003 年发布。自那一年起，使用它进行不同开发的开发者数量不断增长。\n\
    \nMartin Odersky 在不同平台上提供了多门课程，并参加了一些会议，旨在让更多人了解 Scala 的所有优势。\n\n2006 年，Scala\
    \ 的新版本（2.0）发布。它包含了一些特性，例如重写编译器、支持来自 Java 的泛型等。在接下来的 15 年里，更新仅包括添加额外功能或修复错误，但没有足够重大的变化值得将版本提升到\
    \ 3.0。尽管如此，Scala 的受欢迎程度持续增长，一些公司开始使用它，例如 Twitter，将其部分后端从 Ruby 迁移到了 Scala。《纽约时报》在其部分系统中结合使用了\
    \ Akka 和 Play Framework，而 Apple、Google 和 Walmart 的某些团队也将 Scala 作为其后端平台的一部分。\n\n\
    2012 年，发布了一个新版本，旨在包含许多特性、简化语法（其中一些出现在 2.x.x 版本中）并提高编译器的性能。Scala 3.0.0 于 2021 年\
    \ 5 月 14 日发布，共有 100 名贡献者协作完成了新特性。\n\n关于这个新版本的一些考虑：\n\n*   一些与编译相关的考虑。\n    * \
    \  当前速度大约为 3000 行/秒，但首次编译时可能需要更长时间。之后，编译速度会提高，因为 Scala 3.0 具有非常激进的缓存机制。\n\n  \
    \  *   如果你有多个外部库，编译速度会降低，因为这些库会在后台生成大量代码。\n\n*   你可以将 Scala 3.0 视为一门新语言，因为它引入了许多与新特性相关的更改，并且版本\
    \ 2.0 中的一些特性已被移除或将在后续版本中弃用。\n\n*   你不需要将所有内容从 Scala 2.x.x 迁移到 Scala 3.x.x，因为最新版本使用了\
    \ Scala 2.13 的二进制文件。\n\n*   不同贡献者提供的大多数特性都引发了关于最佳方法的许多讨论。\n\n*   2020 年，Martin\
    \ Odersky 与其他贡献者决定发起一项调查，以了解哪些特性最令开发者兴奋。结果显示，枚举、联合/交集类型和不透明类型对开发者来说最为重要。\n\n图\
    \ 1-1 简要总结了 Scala 演进的时间线，重点突出了迈向最新版本（Scala 3.0）的步骤。\n\n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig1_HTML.png](img/328789_3_En_1_Fig1_HTML.png)\n\
    \n图 1-1\n\nScala 的演进\n\n## 安装 Scala 工具\n\n在开始阅读本书并尝试书中出现的不同主题之前，你需要安装一些 Scala\
    \ 运行所需的工具。\n\n### 安装 Java JDK\n\n在开始尝试 Scala 之前，你需要安装的第一件事是 Java JDK。你可能会想 *“为什么我需要安装\
    \ JDK？这是 Java 的东西，而我想用 Scala 开发应用程序。”* 这个问题的答案是，因为 Scala 使用 JVM，就像许多其他语言如 Java、Kotlin、Groovy\
    \ 和 Clojure 一样。\n\nJDK 有一些替代方案：\n\n*   [**OracleJDK**](https://www.oracle.com/java/technologies/)^(⁸)**：**\
    \ 此版本在 Java 11 之前是免费的。在此版本之后，你可以将其用于开发/测试环境，但需要付费购买许可证才能在生产环境中使用。此版本的 JDK 提供最新的错误补丁和新特性，因为\
    \ Oracle 是该语言的所有者。\n\n*   [**OpenJDK**](https://openjdk.java.net/)^(⁹)**：** 当\
    \ Oracle 收购 Sun Microsystems 时，它创建了这个开源替代方案，所有开发者都可以在任何环境中无限制地使用。此版本的主要问题是，在非关键情况下，补丁的发布需要时间。\n\
    \n*   **其他：** JDK 还有许多其他替代方案。AWS（亚马逊云服务）提供了 [Amazon Corretto](https://aws.amazon.com/corretto/%253Fnc1%253Dh_ls)^(¹⁰)，它基于\
    \ OpenJDK 扩展，并优化了应用程序在该云提供商环境中的性能。\n\n在本书中，我们使用 **OpenJDK**，但你可以选择任何你想要的替代方案**。**\
    \ 根据操作系统的不同，有多种安装 JDK 的方法：\n\n*   对于 Mac OS/Linux，你可以使用 [brew](https://brew.sh/)，这是一个用于安装/更新各种软件的工具。\n\
    \n*   对于 Windows 平台，你有两种选择：\n    *   第一种选择是安装 [brew](https://brew.sh/)^(¹¹) 并运行与\
    \ Mac OS/Linux 相同的命令。\n\n    *   第二种选择是安装 [AdoptOpenJDK](https://adoptopenjdk.net/releases.html)^(¹²)，它允许你为不同平台下载\
    \ OpenJDK。对于 Windows，你可以下载一个 MSI 文件，这使得安装非常容易。\n\n```\n➜  ~ brew install openjdk\n\
    ```\n\n完成 JDK 安装后，检查你的系统上是否已有 Java 版本。为此，请键入以下命令：\n\n```\n➜  ~ java -version\n\
    OpenJDK version \"11.0.9.1\" 2020-11-04\nOpenJDK Runtime Environment AdoptOpenJDK\
    \ (build 11.0.9.1+1)\nOpenJDK 64-Bit Server VM AdoptOpenJDK (build 11.0.9.1+1,\
    \ mixed mode)\n```\n\nScala 3 适用于 JDK 8 或 11，但在该语言的未来版本中，对 JDK 8 的支持将消失，最低要求将变为\
    \ 11。因此，建议你安装 JDK 11 或更高版本。此外，JDK 11 提供了与性能相关的改进，例如将默认垃圾回收器更改为 [G1](https://openjdk.java.net/jeps/248)^(¹³)，这通常会减少暂停时间。\n\
    \n最后但同样重要的是，如果你已安装 SBT，支持 Scala 3.x.x 的最低 SBT 版本是 1.5.0。\n\n### 安装 Scala\n\n根据你的偏好，在你的机器上安装\
    \ Scala 的方法有很多种。有些方法包括安装 JDK、Scala 和 SBT。以下两种方法允许你使用 Scala 的命令行，但如果你只想在 IDE 中使用它，可以跳过此步骤，仅安装\
    \ SBT，这是一个用于创建和编译 Scala 项目的工具。\n\n#### 使用 Brew\n\n你可以使用 [brew](https://brew.sh/)\
    \ 作为安装 Scala 编译器的选项，因为它支持 Mac/Linux。现在你也可以在 Windows 上使用它，但需要一些额外的步骤来安装。要安装 Scala，请运行以下命令：\n\
    \n```\n➜  ~ brew install lampepfl/brew/dotty\n```\n\n安装完成后，检查 Scala 是否已安装在你的系统上。为此，请运行以下命令：\n\
    \n```\n➜  ~ scala -version\nScala compiler version 3.0.0 -- Copyright 2002-2021,\
    \ LAMP/EPFL\n```\n"
- fmt: '#### Using Coursier


    As an alternative to installing using [brew](https://brew.sh/), you can use [Coursier](https://get-coursier.io/)^([(14)](#fn14)),
    which is a dependency resolver of Scala libraries. This tool helps you install
    the things required to use Scala 3, but one of the problems of using this tool
    is all the commands related to the console change a little.


    To install this tool, follow the steps on this [page](https://get-coursier.io/docs/cli-installation)^([(15)](#fn15)),
    which explain how to do it depending on your operating system. You can also install
    this tool using [brew](https://brew.sh/).


    When you finish installing Coursier on your system, run the following commands:


    ```

    ➜  ~ cs setup

    ➜  ~ cs install scala3-repl

    ➜  ~ cs install scala3-compiler

    ```


    After finishing the installation, check if Scala is installed on your system.
    To do this, run the following command, which opens the console with the REPL of
    Scala 3:


    ```

    ➜  ~ cs launch scala3-repl

    scala>

    ```


    ### Installing SBT


    [SBT](https://www.scala-sbt.org/)^([(16)](#fn16)) is the de facto build tool to
    use Scala on your machine. This tool needs at least JDK 8 to work, but if you
    install JDK 11 on your machine, you will not have any problems. You will see more
    details about the things you can do with this tool in Chapter [11](#328789_3_En_11_Chapter.xhtml),
    so for now just focus on installing it.


    There are some different ways to install this tool depending on your operating
    system:


    *   For Mac OS/Linux, you can use [brew](https://brew.sh/), which is a tool to
    install/update different things.

    *   For Windows platforms, you can download the MSI installer from the [official
    page](https://www.scala-sbt.org/download.html)^([(17)](#fn17)).


    ```

    ➜  ~ brew install sbt

    ```


    After you’ve finished with the installation of the SBT, check if everything is
    installed on your system. To do this, run the following command:


    ```

    ➜  ~ sbt --version

    sbt version in this project: 1.5.2

    sbt script version: 1.5.2

    ```


    SBT lets you run a specific part of your application, considering the version
    of Scala that you previously configured.


    ```

    ➜  ~ sbt

    [info] welcome to sbt 1.5.2 (Homebrew Java 16.0.1)

    [info] loading global plugins from /Users/user/.sbt/1.0/plugins

    [info] loading project definition from /Users/user/project

    [info] set current project to codigo (in build file:/Users/user/)

    [info] sbt server started at local:///Users/user/.sbt/1.0/server/b5ec50d5e016a82e5659/sock

    [info] started sbt server

    sbt:user> console

    scala>

    ```


    ### Installing the IDE


    There are some IDEs that add support for Scala 3. Each has several pros/cons,
    which are out of the scope of this book. Two options are [IntelliJ](https://www.jetbrains.com/idea/)^([(18)](#fn18))
    or [Visual Studio Code](https://code.visualstudio.com/)^([(19)](#fn19)), which
    introduced support a long time ago when the first milestone appeared and fixed
    some problems with the plugins to validate the syntax.


    You can see the instructions to install both IDEs on their official pages, which
    mention the minimum resources and operating system options. In both cases, support
    for Scala is not enabled by default, so you need to install it by doing the following
    step, depending on the IDE:


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig2_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig2_HTML.png)


    Figure 1-2


    The different IntelliJ plugins available for installation


    *   **IntelliJ**: Go to IntelliJ IDEA ➤ Preferences ➤ Plugins and find and install
    Scala (see Figure [1-2](#328789_3_En_1_Chapter.xhtml#Fig2)).


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig3_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig3_HTML.png)


    Figure 1-3


    The Scala plugin, which introduces support for version 3.x.x


    *   **Visual Studio Code:** Go to Code ➤ Preferences ➤ Extensions, and find and
    install Scala Metals, which offers support for Scala 2 and 3 (see Figure [1-3](#328789_3_En_1_Chapter.xhtml#Fig3)).


    If you use these IDEs, check if you have the latest version because some of the
    plugins/extensions do not work well with old versions.


    ## Running Code Examples


    After finishing the installation of all the tools related to Scala, you can run
    some fragments of the code without opening an IDE by using the REPL (Read Eval
    Print Loop), which is the command line of Scala.


    ### Using an IDE


    Using an IDE is the best way to develop in any language, and Scala is no exception
    to this rule. A good way to create a project agnostic of the IDE that you choose
    to use is to create a project using [SBT](https://www.scala-sbt.org/), which you
    installed in the previous section.


    SBT has a specific command to create a project that uses Scala 3, which is different
    from the common command to create any Scala project. The following command will
    create a project with the latest version of Scala 3:


    ```

    ➜  ~ sbt new scala/scala3.g8

    ```


    After the execution of this command, you’ll see a lot of logs that show you the
    steps. Some part of the process will ask you the name of the project.


    ```

    [info] welcome to sbt 1.5.2 (Homebrew Java 16.0.1)

    [info] loading global plugins from /Users/user/.sbt/1.0/plugins

    [info] set current project to new (in build file:/private/var/folders/2b/kp4ljsm95ds2n78p6b77ppbw9f_rkf/T/sbt_155ffd12/new/)

    A template to demonstrate a minimal Scala 3 application

    name [Scala 3 Project Template]: scala3-test

    Template applied in /Users/user/./scala3-test

    ```


    If everything finishes without error, you can access the directory and see something
    like this:


    ```

    ➜  ~ scala3-test ls

    README.md build.sbt project   src       target

    ```


    With the project created using SBT, you can import it into your preferred IDE
    (IntelliJ or Visual Studio Code), and when the compilation of the files finishes,
    you can run it.


    The following is the output to run `Main.scala` in Visual Studio Code but the
    same happens if you run it in IntelliJ:


    ![../images/328789_3_En_1_Chapter/328789_3_En_1_Figa_HTML.gif](images/328789_3_En_1_Chapter/328789_3_En_1_Figa_HTML.gif)


    ### Manually Using the REPL


    To use the REPL, you need to open your console and type the following command:


    ```

    ➜  ~ scala

    scala>

    ```


    A possible use of the REPL is to do little experiments when you don’t want to
    create an entire class or project to test them.'
