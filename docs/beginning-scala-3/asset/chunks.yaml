    ## Introduction


    When you learn common programming languages like C++, Java, Python, or C#, you
    notice that they all have basically the same structure for defining variables,
    control (`for`/`while`), and objects. The semantics change because you cannot
    define a class or variable using the same word in all languages, but the concept
    does not change, so for any developer, it’s easy to learn another language. It’s
    almost like having a mind map that enables you to use your existing knowledge
    to do something differently. Scala is not an exception to this mind map and these
    common structures. The main difference with this language is that it supports
    both functional and object-oriented programming paradigms. Understanding that
    both can exist in the same language is the most difficult part for some developers.
    See Figure [1](#328789_3_En_BookFrontmatter_OnlinePDF.xhtml#Fige).


    ![../images/328789_3_En_BookFrontmatter_Figf_HTML.png](images/328789_3_En_BookFrontmatter_Figf_HTML.png)


    Figure 1 Differences in syntax


    Scala is not just another language that tries to do the same things differently.
    The spirit or philosophy of this language is to maintain code cleanly and simply.
    Don’t feel bad if you don’t understand at the beginning. Most developers coming
    from other languages take time to assimilate because it’s not the same as popular
    languages like Java, Python, or C#. Scala is not for a specific situation. In
    particular, you can use it to create different things like libraries or applications
    (web or microservices) and data streaming using Akka. A friendly approach when
    you don’t have a lot of experience in Scala but do have experience developing
    applications in other languages is to create something small to interact with
    other components. In this way, you can grow your skills with Scala. See Figure
    [2](#328789_3_En_BookFrontmatter_OnlinePDF.xhtml#Figf).


    ![../images/328789_3_En_BookFrontmatter_Figg_HTML.jpg](images/328789_3_En_BookFrontmatter_Figg_HTML.jpg)


    Figure 2 Applications


    There are some external tools for solving specific problems with your system which
    are developed with Scala, but you can use them in some Java applications. The
    following are some of these tools:


    *   [Gatling](https://gatling.io/) is an open-source tool to do load tests. This
    tool is used as an alternative to JMeter but one of the benefits is that you create
    tests that can run in the test step of your pipeline.

    *   [Akka](https://akka.io/) is a toolkit runtime that simplifies the construction
    of concurrent and distributed applications.


    ### Who This Book Is For


    This book is for folks with some programming background in any language who want
    to know more about the benefits of functional programming and Scala in particular.
    Take into consideration that if you have experience in another language, the differences
    between that language and Scala are not trivial; you can’t just translate the
    syntaxes from one language to another. You need to understand some concepts that
    are not the same in languages like Java, C#, or C++.


    Also, this book updates the knowledge that some Scala developers have from previous
    versions because Scala 3 introduces a lot of extra features and changes from Scala
    2.


    ### Prerequisites


    You should have the Java JDK 11 or higher installed on your machine and Scala
    3.0.0 or higher. Scala 3.0.0 works with Java JDK 8 but future versions may not
    be supported (however, there is no specific timeline). Martin Odersky said at
    the Scala Days of 2020 conference that he recommended using the latest LTS Java
    version, which is 11.


    ### How This Book Is Structured


    This book is structured in four blocks:


    *   The first block of chapters ([1](#328789_3_En_1_Chapter.xhtml)-[3](#328789_3_En_3_Chapter.xhtml))
    gives you a basic understanding of the Scala syntax.

    *   The second block of chapters ([4](#328789_3_En_4_Chapter.xhtml)-[8](#328789_3_En_8_Chapter.xhtml))
    offers a basic tour of some of the key features like functions, pattern matching,
    collections, and traits.

    *   The third block of chapters ([9](#328789_3_En_9_Chapter.xhtml)-[10](#328789_3_En_10_Chapter.xhtml))
    gives a brief overview of the interoperability between Java and Scala.

    *   The fourth block of chapters ([11](#328789_3_En_11_Chapter.xhtml)-[14](#328789_3_En_14_Chapter.xhtml))
    demonstrates how to use a build tool like SBT to create an application (web or
    REST), best practices, and how to test your code.


    ### Source Code


    You can download all the source code used in this book from `github.com/apress/beginning-scala-3`.


    ## Acknowledgments


    I would like to thank my family members and friends for their encouragement and
    support during the process of this book:


    *   My wife, Gisela, was always patient when I spent long hours at my computer
    desk working on this book.

    *   My little daughter, Francesca, helped me relax when I was writing each chapter.

    *   My friends, German Canale and Julian Delley, always trusted me to write a
    book and supported me when I felt bad.


    I would especially like to thank Orlando Méndez for his guidance, which helped
    improve the quality of this book.


    My sincere thanks to the wonderful team at Apress for their support during the
    development of this book. Thanks to Mark Powers for providing excellent support
    and Jim Markham for his valuable editorial feedback. And, last but not least,
    thanks to Steve Anglin for giving me the opportunity to work on the latest edition
    of this book.


    > —Andres Sacco


