    `List`（以及`Seq`）中的`map`方法基于一个函数转换集合中的每个元素。例如，假设你有一个`List[String]`，并希望将其全部转换为小写。


    ```

    scala> List("A", "Cat").map(s => s.toLowerCase)

    val res29: List[java.lang.String] = List(a, cat)

    ```


    你可以简化函数，使代码读起来像这样：


    ```

    scala> List("A", "Cat").map(_.toLowerCase)

    val res30: List[java.lang.String] = List(a, cat)

    ```


    返回集合中的元素数量与原始集合中的元素数量相同，但类型可能不同。如果传递给`map`的函数返回不同的类型，那么结果集合就是该函数返回类型的集合。例如，你可以获取一个`List[String]`并计算每个`String`的长度，这将得到一个`List[Int]`：


    ```

    scala> List("A", "Cat").map(_.length)

    val res31: List[Int] = List(1, 3)

    ```


    `map`提供了一种非常强大且统一的方式，将数据从一种类型转换为另一种类型。你可以将字符串转换为小写、转换为它们长度的列表，还可以从复杂对象的集合中提取数据。例如，如果你有一个数据库查询，返回类型为`Person`的记录，该类型定义了一个`first`方法，返回包含该人名字的`String`，你可以创建一个包含列表中所有人名字的`List`。


    ```

    scala> trait Person {def first: String}

    // defined trait Person

    scala> val d = new Person {def first = "David" }

    scala> val e = new Person {def first = "Elwood"}

    scala> val a = new Person {def first = "Archer"}

    scala> List(a, d, e).map(_.first)

    val res35: List[String] = List(Archer, David, Elwood)

    ```


    或者，如果你正在编写一个Web应用，你可以创建一个包含列表中每个`Person`名字的`<li>`（一个HTML列表元素）。


    ```

    scala> List(a,d,e).map(n =>"<li>" + {n.first} + "</li>")

    val res21: List[String] = List(<li>Archer</li>, <li>David</li>, <li>Elwood</li>)

    ```


    你可以组合这些操作。让我们更新`Person`特质：


    ```

    trait Person:

    def first: String

    def valid: Boolean

    ```


    现在你可以编写代码来查找所有有效的`Person`记录并返回名字。


    ```

    def validPeople(in: List[Person]) =

    in.filter(_.valid).map(_.first)

    ```


    #### Reduxio


    Scala 还有其他用于常见集合操作的抽象。`reduceLeft`允许你对集合中相邻的元素执行操作，其中第一次操作的结果会输入到下一次操作中。例如，如果你想在`List[Int]`中找到最大的数字：


    ```

    scala> List(8, 6, 22, 2).reduceLeft(_ max _)

    val res50: Int = 22

    ```


    在这种情况下，`reduceLeft`接受8和6，并将它们输入到你的函数中，该函数返回这两个数字的最大值：8。接下来，`reduceLeft`将8（上一次迭代的输出）和22输入到函数中，得到22。接着，`reduceLeft`将22和2输入到函数中，得到22。因为没有更多元素了，`reduceLeft`返回22。


    你可以使用`reduceLeft`来找到最长的单词。


    ```

    scala> List("moose", "cow", "A", "Cat").

    reduceLeft((a, b) => if a.length > b.length then a else b)

    val res41: java.lang.String = moose

    ```


    因为Scala的`if`表达式类似于Java的三元运算符，所以前面代码中的`if`在`a`比`b`长时返回`a`。你也可以找到最短的单词。


    ```

    scala> List("moose", "cow", "A", "Cat").

    reduceLeft((a, b) => if a.length < b.length then a else b)

    val res42: java.lang.String = A

    ```


    `reduceLeft`在空列表（`Nil`）上会抛出异常。这是正确的行为，因为无法对空列表中的元素应用该函数——空列表没有元素。


    `foldLeft`与`reduceLeft`类似，但它从一个初始值开始。函数的返回类型以及`foldLeft`的返回类型必须与初始值的类型相同。第一个例子是对`List[Int]`求和：


    ```

    scala> List(1,2,3,4).foldLeft(0) (_ + _)

    val res43: Int = 10

    ```


    在这个例子中，初始值是0。它的类型是`Int`。`foldLeft`将初始值和列表的第一个元素1输入到函数中，返回1。接下来，`foldLeft`将1（上一次迭代的结果）和2（下一个元素）输入到函数中，得到3。这个过程继续，最终生成`List[Int]`的总和：10。你可以用同样的方式生成列表的乘积。


    ```

    scala> List(1,2,3,4).foldLeft(1) (_ * _)

    val res44: Int = 24

    ```


    但是因为`foldLeft`的返回类型是初始值的类型，而不是列表的类型，所以你可以计算`List[String]`的总长度。


    ```

    scala> List("b", "a", "elwood", "archer").foldLeft(0)(_ + _.length)

    val res51: Int = 14

    ```


    有时你需要同时处理多个集合。例如，假设你想生成从1到3的数字的乘积列表。


    ```

    scala> val n = (1 to 3).toList

    val n: List[Int] = List(1, 2, 3)

    scala> n.map(i => n.map(j => i * j))

    val res53: List[List[Int]] = List(List(1, 2, 3), List(2, 4, 6), List(3, 6, 9))

    ```


    你有了嵌套的`map`调用，这会产生一个`List[List[Int]]`。在某些情况下，这可能是你想要的。在其他情况下，你希望结果在一个单一的`List[Int]`中。为了嵌套`map`操作但展平嵌套操作的结果，你可以使用`flatMap`方法。


    ```

    scala> n.flatMap(i => n.map(j => i * j))

    val res58: List[Int] = List(1, 2, 3, 2, 4, 6, 3, 6, 9)

    ```'
  raw: '#### Transformation


    The `map` method in List (and Seq) transforms each element of a collection based
    on a function. For example, say you have a `List[String]` and want to convert
    it to all lowercase.


    ```

    scala> List("A", "Cat").map(s => s.toLowerCase)

    val res29: List[java.lang.String] = List(a, cat)

    ```


    You can shorten the function so the code reads


    ```

    scala> List("A", "Cat").map(_.toLowerCase)

    val res30: List[java.lang.String] = List(a, cat)

    ```


    The number of elements in the returned collection is the same as the number of
    elements in the original collection, but the types may be different. If the function
    passed into `map` returns a different type, then the resulting collection is a
    collection of the type returned from the function. For example, you can take a
    `List[String]` and calculate the length of each String, which will result in a
    `List[Int]`:


    ```

    scala> List("A", "Cat").map(_.length)

    val res31: List[Int] = List(1, 3)

    ```


    `map` provides a very powerful and uniform way to transform data from one type
    to another. You can transform your Strings to lowercase, to a List of their length,
    and you can extract data from a collection of complex objects. For example, if
    you have a database query that returns records of type `Person` defined as having
    a first method that returns a String containing the person’s first name, you can
    create a List of the first names of the people in the List.


    ```

    scala> trait Person {def first: String}

    // defined trait Person

    scala> val d = new Person {def first = "David" }

    scala> val e = new Person {def first = "Elwood"}

    scala> val a = new Person {def first = "Archer"}

    scala> List(a, d, e).map(_.first)

    val res35: List[String] = List(Archer, David, Elwood)

    ```


    Or, if you’re writing a web app, you can create an `<li>` (an HTML list element)
    containing the first name of each `Person` in your List.


    ```

    scala> List(a,d,e).map(n =>"" + {n.first} + "")

    val res21: List[String] = List(Archer, David, Elwood)

    ```


    You can combine the operations. Let’s update the `Person` trait:


    ```

    trait Person:

    def first: String

    def valid: Boolean

    ```


    Now you can write code to find all the valid `Person` records and return the first
    names.


    *def validPeople(in: List[Person])=*


    ```

    in.filter(_.valid).map(_.first)

    ```


    #### Reduxio


    Scala has other abstractions for common collections operations. `reduceLeft` allows
    you to perform an operation on adjacent elements of the collection where the result
    of the first operation is fed into the next operation. For example, if you want
    to find the biggest number in a `List[Int]`:


    ```

    scala> List(8, 6, 22, 2).reduceLeft(_ max _)

    val res50: Int = 22

    ```


    In this case, `reduceLeft` takes 8 and 6, and feeds them into your function, which
    returns the maximum value of the two numbers: 8\. Next, `reduceLeft` feeds 8 (the
    output of the last iteration) and 22 into the function, resulting in 22\. Next,
    reduceLeft feeds 22 and 2 into the function, resulting in 22\. Because there are
    no more elements, `reduceLeft` returns 22.


    You can use `reduceLeft` to find the longest word.


    ```

    scala> List("moose", "cow", "A", "Cat").

    reduceLeft((a, b) => if a.length > b.length then a else b)

    val res41: java.lang.String = moose

    ```


    Because Scala’s `if` expression works like Java’s ternary operator, the `if` in
    the previous code returns `a` if it’s longer than `b`. You can also find the shortest
    word.


    ```

    scala> List("moose", "cow", "A", "Cat").

    reduceLeft((a, b) => if a.length < b.length then a else b)

    val res42: java.lang.String = A

    ```


    `reduceLeft` throws an exception on a Nil (empty) List. This is correct behavior
    as there is no way to apply the function on the members of the List as a Nil List
    has no elements.


    `foldLeft` is similar to `reduceLeft`, but it starts with a seed value. The return
    type of the function and the return type of `foldLeft` must be the same type as
    the seed. The first example is summing up `List[Int]`:


    ```

    scala> List(1,2,3,4).foldLeft(0) (_ + _)

    val res43: Int = 10

    ```


    In this case, the seed value is 0\. Its type is `Int`. `foldLeft` feeds the seed
    and the first element of the List, 1, into the function, which returns 1\. Next,
    `foldLeft` feeds 1 (the result of the previous iteration) and 2 (the next element)
    into the function, resulting in 3\. The process continues, and the sum of the
    `List[Int]` is generated: 10\. You can generate the product of the List the same
    way.


    ```

    scala> List(1,2,3,4).foldLeft(1) (_ * _)

    val res44: Int = 24

    ```


    But because the return type of `foldLeft` is the type of the seed, not the type
    of the List, you can figure out the total length of a `List[String]`.


    ```

    scala> List("b", "a", "elwood", "archer").foldLeft(0)(_ + _.length)

    val res51: Int = 14

    ```


    Sometimes you need to work with more than one collection at a time. For example,
    say you want to generate the List of products of the numbers from 1 to 3.


    ```

    scala> val n = (1 to 3).toList

    val n: List[Int] = List(1, 2, 3)

    scala> n.map(i => n.map(j => i * j))

    val res53: List[List[Int]] = List(List(1, 2, 3), List(2, 4, 6), List(3, 6, 9))

    ```


    You have nested `map` invocations, and this results in a `List[List[Int]]`. In
    some cases, this may be what you want. In other cases, you want the results in
    a single `List[Int]`. In order to nest the `map` operations but flatten the results
    of nested operations, you use the `flatMap` method .


    ```

    scala> n.flatMap(i => n.map(j => i * j))

    val res58: List[Int] = List(1, 2, 3, 2, 4, 6, 3, 6, 9)

    ```'
