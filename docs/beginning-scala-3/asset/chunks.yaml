  raw: '# 11. Simple Build Tool


    During the different chapters of this book, you’ve mostly used the REPL to run
    the blocks of code and check the results. The command line is great because if
    you want to test something, it’s not necessary to open an IDE or create a project.
    When you need to create something more complex, the REPL is the worst alternative,
    so there are other tools that you can use to compile and run your application.


    As you know, software development includes many activities such as compiling the
    source code, executing different types of tests^([^(52)](#fn52)), and packaging
    the code into a file that can be deployed into different environments like development
    or production. Imagine compiling all the classes manually and later creating a
    package to deploy. This would take too much time, so you need to use a tool that
    does all this hard work for you!


    Many tools handle all the activities related to the cycle of one application.
    Figure [11-1](#328789_3_En_11_Chapter.xhtml#Fig1) shows a quick overview of the
    popular build tools in a timeline. Make^([^(53)](#fn53)) is atypical in this list,
    but it was included because it pioneered build automation. All the build tools
    except Make in Figure [11-1](#328789_3_En_11_Chapter.xhtml#Fig1) are popular in
    the JVM landscape.


    ![../images/328789_3_En_11_Chapter/328789_3_En_11_Fig1_HTML.png](images/328789_3_En_11_Chapter/328789_3_En_11_Fig1_HTML.png)


    Figure 11-1


    Timeline of build tools


    As mentioned, Make pioneered build automation and allowed dependency management
    from the outset. Make remains widely used, especially in Unix.


    Apache Ant^([^(54)](#fn54)) is similar to Make but is implemented in the Java
    language. Unlike Make, it uses XML to describe the build process and its dependencies.
    It necessitates the Java platform and befits building Java projects. Contrary
    to Ant, Maven^([^(55)](#fn55)) allows convention over configuration for the build
    procedure by providing sensible default behavior for projects.


    Note


    Convention over configuration (CoC) refers to, in general, a development approach
    centered on conventions. It enables developers to specify and configure only the
    unconventional aspects of the development.


    Apache Ivy^([^(56)](#fn56)) is a dependency manager. It is a subproject of the
    Apache Ant project and helps to resolve project dependencies.


    Note


    Apache Ivy competes to a large extent with Apache Maven, which also manages dependencies.
    However, Maven is a complete build tool, whereas Ivy focuses purely on managing
    dependencies.


    Gradle^([^(57)](#fn57)) builds upon Apache Ant and Apache Maven and uses a Groovy-based
    domain-specific language (DSL) to declare the project configuration instead of
    XML. Gradle is the standard build tool for Kotlin and some projects in Java.


    Although you can use Ant and Maven to build your Scala projects, SBT^([^(58)](#fn58))
    is the standard build tool for Scala applications. Like Maven, SBT uses the same
    directory structure and convention over the configuration approach and Apache
    Ivy for handling dependency management.


    In essence, the build automation automates all the steps in the build process
    with build tools like Ant, Maven, Ivy, Gradle, or SBT, and the best practice is
    to run the build continuously. This process is known as continuous integration.
    Several tools offer continuous integration, such as Hudson^([^(59)](#fn59)) and
    Jenkins^([^(60)](#fn60)).


    ## Getting Started with SBT


    In this section, you will see a brief overview of SBT and all the things you can
    do with this tool.


    ### Why SBT?


    As you read in the previous section, many tools help you build a project in different
    ways, but one of them, SBT, is the default standard in Scala. There are alternatives,
    like Mill^([^(61)](#fn61)), but it’s not used very extensively in the community
    at the time of writing.


    SBT has some interesting features that are important to mention:


    *   Depending on the size of the project, it does not require configuration (or
    just a little).


    *   It supports combined or mixed Scala/Java projects.


    *   It offers good integration with the most common IDEs like IntelliJ and VS
    Code.


    *   It has support with Coursier^([^(62)](#fn62)), which is a tool that manages
    dependencies in projects.


    *   It supports multiple subprojects.


    *   It has integration and support for the most common libraries for testing in
    Scala.


    *   You can run parallel tasks or in batch mode.


    ### Installing SBT


    Chapter [1](#328789_3_En_1_Chapter.xhtml) covered installation instructions for
    different tools related to Scala and one of them was SBT.


    Here are ways to install this tool depending on your operating system:


    *   For Mac OS/Linux, you can use [brew](https://brew.sh/), which is a tool to
    install/update different things.


    *   For Windows platforms, you can download the MSI installer from the [official
    page](https://www.scala-sbt.org/download.html) at [`www.scala-sbt.org/download.html`](http://www.scala-sbt.org/download.html).


    ```

    ➔  ~ brew install sbt

    ```


    After finishing the installation of the SBT, check if everything is installed
    in your system. To this, run the following command:


    ```

    ➔  ~ sbt --version

    sbt version in this project: 1.5.2

    sbt script version: 1.5.2

    ```


    Note that version 1.5.0 of SBT introduces support for Scala 3.0.0 so you need
    to install or update SBT to at least this version.


    ### General Commands


    SBT has many commands for executing different types of actions. To run any of
    these commands, you need to be in the root directory of your project. Table [11-1](#328789_3_En_11_Chapter.xhtml#Tab1)
    lists some of the most important commands in SBT.


    Table 11-1


    Commands in SBT


    | *Command* | *Description* |

    | --- | --- |

    | `about` | Provides general information about the version of SBT and Scala on
    your machine |

    | `clean` | Removes the files that are generated with SBT |

    | `compile` | Compiles the different files that exist in the directories `src/main/scala`
    and `src/main/java` |

    | `console` | Opens a REPL with the configurations of your project including all
    dependencies |

    | `help` | Shows all commands that are available to run on SBT. Also, you can
    ask for one command and obtain the information about which parameters support
    it. |

    | `Test` | Compiles and runs tests |


    The official documentation^([^(63)](#fn63)) on the SBT web site offers detailed
    information about all commands.'
  trans: '

    # 11. 简单构建工具


    在本书的不同章节中，你主要使用 REPL 来运行代码块并检查结果。命令行很棒，因为如果你想测试某些内容，无需打开 IDE 或创建项目。当你需要创建更复杂的内容时，REPL
    是最差的选择，因此还有其他工具可用于编译和运行你的应用程序。


    如你所知，软件开发包含许多活动，例如编译源代码、执行不同类型的测试^(⁵²)，以及将代码打包成可部署到开发或生产等不同环境的文件。想象一下手动编译所有类，然后创建包进行部署。这会花费太多时间，因此你需要一个工具来为你完成所有这些繁重的工作！


    许多工具处理与一个应用程序生命周期相关的所有活动。图 11-1 以时间线的形式快速概述了流行的构建工具。Make^(⁵³) 在此列表中有些特殊，但它被包含在内是因为它开创了构建自动化。图
    11-1 中除 Make 之外的所有构建工具在 JVM 领域都很流行。


    ![../images/328789_3_En_11_Chapter/328789_3_En_11_Fig1_HTML.png](img/328789_3_En_11_Fig1_HTML.png)


    图 11-1


    构建工具时间线


    如前所述，Make 开创了构建自动化，并从一开始就支持依赖管理。Make 至今仍被广泛使用，尤其是在 Unix 系统中。


    Apache Ant^(⁵⁴) 与 Make 类似，但使用 Java 语言实现。与 Make 不同，它使用 XML 来描述构建过程及其依赖关系。它需要 Java
    平台，并且适合构建 Java 项目。与 Ant 相反，Maven^(⁵⁵) 通过为项目提供合理的默认行为，在构建过程中实现了约定优于配置。


    注意


    约定优于配置 (CoC) 通常指的是一种以约定为中心的开发方法。它使开发人员只需指定和配置开发中非常规的方面。


    Apache Ivy^(⁵⁶) 是一个依赖管理器。它是 Apache Ant 项目的一个子项目，有助于解决项目依赖关系。


    注意


    Apache Ivy 在很大程度上与同样管理依赖关系的 Apache Maven 存在竞争关系。然而，Maven 是一个完整的构建工具，而 Ivy 则纯粹专注于管理依赖关系。


    Gradle^(⁵⁷) 建立在 Apache Ant 和 Apache Maven 之上，并使用基于 Groovy 的领域特定语言 (DSL) 来声明项目配置，而不是
    XML。Gradle 是 Kotlin 和一些 Java 项目的标准构建工具。


    虽然你可以使用 Ant 和 Maven 来构建你的 Scala 项目，但 SBT^(⁵⁸) 是 Scala 应用程序的标准构建工具。与 Maven 一样，SBT
    使用相同的目录结构和约定优于配置的方法，并使用 Apache Ivy 来处理依赖管理。


    本质上，构建自动化使用 Ant、Maven、Ivy、Gradle 或 SBT 等构建工具自动执行构建过程中的所有步骤，最佳实践是持续运行构建。这个过程被称为持续集成。有几种工具提供持续集成，例如
    Hudson^(⁵⁹) 和 Jenkins^(⁶⁰)。


    ## SBT 入门


    在本节中，你将简要了解 SBT 以及你可以使用此工具完成的所有事情。


    ### 为什么选择 SBT？


    正如你在上一节中读到的，有许多工具可以帮助你以不同方式构建项目，但其中之一 SBT 是 Scala 中的默认标准。也有其他选择，例如 Mill^(⁶¹)，但在撰写本文时，它在社区中并未被广泛使用。


    SBT 有一些值得提及的有趣特性：


    *   根据项目大小，它不需要配置（或只需少量配置）。

    *   它支持组合或混合的 Scala/Java 项目。

    *   它与最常见的 IDE（如 IntelliJ 和 VS Code）具有良好的集成。

    *   它支持 Coursier^(⁶²)，这是一个管理项目依赖关系的工具。

    *   它支持多个子项目。

    *   它集成并支持 Scala 中最常见的测试库。

    *   你可以并行运行任务或以批处理模式运行。


    ### 安装 SBT


    第 1 章介绍了与 Scala 相关的不同工具的安装说明，其中之一就是 SBT。


    以下是取决于你的操作系统安装此工具的方法：


    *   对于 Mac OS/Linux，你可以使用 [brew](https://brew.sh/)，这是一个用于安装/更新各种内容的工具。

    *   对于 Windows 平台，你可以从[官方页面](https://www.scala-sbt.org/download.html)（[`www.scala-sbt.org/download.html`](http://www.scala-sbt.org/download.html)）下载
    MSI 安装程序。


    ```

    ➔  ~ brew install sbt

    ```


    完成 SBT 安装后，检查所有内容是否已安装在你的系统中。为此，请运行以下命令：


    ```

    ➔  ~ sbt --version

    sbt version in this project: 1.5.2

    sbt script version: 1.5.2

    ```


    请注意，SBT 1.5.0 版本引入了对 Scala 3.0.0 的支持，因此你需要安装或更新 SBT 至少到此版本。


    ### 常用命令


    SBT 有许多用于执行不同类型操作的命令。要运行这些命令中的任何一个，你需要位于项目的根目录中。表 11-1 列出了 SBT 中一些最重要的命令。


    表 11-1


    SBT 中的命令


    | *命令* | *描述* |

    | --- | --- |

    | `about` | 提供有关你机器上 SBT 和 Scala 版本的一般信息 |

    | `clean` | 删除由 SBT 生成的文件 |

    | `compile` | 编译 `src/main/scala` 和 `src/main/java` 目录中的不同文件 |

    | `console` | 使用项目的配置（包括所有依赖项）打开一个 REPL |

    | `help` | 显示所有可在 SBT 上运行的命令。此外，你可以查询一个命令并获取关于它支持哪些参数的信息。 |

    | `Test` | 编译并运行测试 |


    SBT 网站上的官方文档^(⁶³)提供了关于所有命令的详细信息。

    '
- fmt: "### Creating a Hello World Project\n\nNow that you know some of the common\
    \ commands, it is time to create your first project to see SBT in action. You\
    \ can create a project using the simple SBT commands or you can use the skeletons\
    \ that exist on Giter8. Giter8 provides a skeleton for the most common applications\
    \ (Spark, Akka, Play, Scala Native, and many more). If you want to know the available\
    \ templates, please visit the official documentation^([^(64)](#fn64)).\n\nTo create\
    \ a simple project that only has “hello world,” you can use the template with\
    \ the same name offered by Giter8. To do this, open a terminal and write the command\
    \ `sbt new` with the name of the template.\n\n```\n$ sbt new scala/hello-world.g8\n\
    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n[info] set current project\
    \ to new (in build file:/tmp/sbt_8076aba/new/)\nA template to demonstrate a minimal\
    \ Scala application\nname [Hello World template]: helloWorld\n```\n\nAfter you\
    \ execute this command, you’ll see a directory named `helloWorld` on your machine\
    \ with all the configurations and the `Main` class. If you open the file `Main.scala`\
    \ that exists in `src/main/scala`, you will see something like this:\n\n```\n\
    object Main extends App {\nprintln(\"Hello, World!\")\n}\n```\n\nIf you want to\
    \ run this application, you need to execute the command `sbt run` in the root\
    \ directory and the result will appear in the same console.\n\n```\n$ sbt run\n\
    [info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n[info] loading project definition\
    \ from /home/helloworld/project\n[info] loading settings for project helloworld\
    \ from build.sbt ...\n[info] set current project to hello-world (in build file:/home/helloworld/)\n\
    [info] running Main\nHello, World!\n[success] Total time: 1 s, completed Sep 19,\
    \ 2021, 11:32:55 PM\n```\n\nYou can execute different commands in the interactive\
    \ mode, which provides a command prompt with features such as tab completion and\
    \ history.\n\n```\n$ sbt\n[info] welcome to sbt 1.5.5 (Homebrew Java 11.0.12)\n\
    [info] loading project definition from /home/scala/helloworld/project\n[info]\
    \ loading settings for project helloworld from build.sbt ...\n[info] set current\
    \ project to hello-world (in build file:/home/scala/helloworld/)\n[info] sbt server\
    \ started at local:///home/.sbt/1.0/server/e383aa762cd5b7c5e9f6/sock\n[info] started\
    \ sbt server\nsbt:hello-world>\n```\n\nInteractive mode remembers what you typed\
    \ previously (history), even if you exit SBT and restart it. SBT lists all the\
    \ history commands when you type `!` at the SBT prompt, as shown here:\n\n```\n\
    sbt:hello-world> !\nHistory commands:\n!!    Execute the last command again\n\
    !:    Show all previous commands\n!:n        Show the last n commands\n!n    Execute\
    \ the command with index n, as shown by the !: command\n!-n    Execute the nth\
    \ command before this one\n!string    Execute the most recent command starting\
    \ with 'string'\n!?string    Execute the most recent command containing 'string'\n\
    ```\n\nSBT lets you dynamically change the version of Scala with a simple command\
    \ on the command line of SBT.\n\n```\nsbt:hello-world> ++3.0.0!\n[info] Forcing\
    \ Scala version to 3.0.0 on all projects.\n[info] Reapplying settings...\n[info]\
    \ set current project to hello-world (in build file:/home/scala/helloworld/)\n\
    ```\n\n### Project Structure\n\nThe structure of directories is very similar to\
    \ Maven projects. If you check the tree of the root directory of the project that\
    \ you created in the previous section, you will see something like this:\n\n```\n\
    $ tree .\n./\n├── build.sbt\n├── project\n│   ├── build.properties\n│   └── target\n\
    ├── src\n│   └── main\n│       └── scala\n│           └── Main.scala\n└── target\n\
    ├── global-logging\n└── task-temp-directory\n```\n\nIf you want to add some Java\
    \ classes, they will appear in a `java` directory in the `main` directory. Also,\
    \ you can have folders with tests in Scala or Java and another one with the resources\
    \ of the project, like so:\n\n```\n./\n├── build.sbt\n├── project\n│   ├── build.properties\n\
    │   └── target\n├── src\n│   ├── main\n│   │    ├── java\n│   │    ├── resources\n\
    │   │    └── scala\n│   └── test\n│        ├── java\n│        ├── resources\n\
    │        └── scala└── target\n```\n\n#### build.sbt\n\nThe `build.sbt` file contains\
    \ the configuration of the project following the pattern of key/value, so to define\
    \ the version of Scala you need to use `scalaVersion := \"3.0.0\"`.\n\n```\nscalaVersion\
    \ := \"3.0.0\" // 1\nname := \"hello-world\" // 2\norganization := \"ch.epfl.scala\"\
    \ // 3\nversion := \"1.0\" // 4\nlibraryDependencies += \"org.scala-lang.modules\"\
    \ %% \"scala-parser-combinators\" % \"1.1.2\" // 5\n```\n\nLet’s explain each\
    \ of parts of `build.sbt`:\n\n*   1: This setting is mandatory because it specifies\
    \ which version of Scala is used in the project.\n*   2: Refers to the name of\
    \ the project. It’s like the `artifactId` in Maven.\n*   3: It’s the way to group\
    \ different projects of the same company or part of the company. You can think\
    \ of this attribute like the `groupId` in Maven.\n*   4: It’s the version of the\
    \ application.\n*   5: This section contains all the dependencies that the project\
    \ uses. You can define it as shown above or you can define it as a `Seq` of dependencies\
    \ when you have more than one.\n\n```\nlibraryDependencies ++= Seq(\n\"org.scala-lang.modules\"\
    \ %% \"scala-parser-combinators\" % \"1.1.2\"\n)\n```\n\nIf you want to change\
    \ the name or the project or some of the attributes of the `build.sbt`, you can\
    \ do it in the terminal using the command `set`.\n\n```\nsbt:hello-world> set\
    \ name := \"hello world\"\n[info] Defining name\n[info] The new value will be\
    \ used by Compile / compileEarly, Compile / doc / scalacOptions and 9 others.\n\
    [info] Run `last` for details.\n[info] Reapplying settings...\n[info] set current\
    \ project to hello world (in build file:/home/scala/helloworld/)\n```\n\nAfter\
    \ introducing the changes, you need to save using the command `session save` on\
    \ the command line.\n\n```\nsbt:hello world> session save\n[info] Reapplying settings...\n\
    [info] set current project to hello world (in build file:/home/scala/helloworld/)\n\
    [warn] build source files have changed\n[warn] modified files:\n[warn]   /home/scala/helloworld/build.sbt\n\
    [warn] Apply these changes by running `reload`.\n[warn] Automatically reload the\
    \ build when source changes are detected by setting `Global / onChangedBuildSource\
    \ := ReloadOnSourceChanges`.\n[warn] Disable this warning by setting `Global /\
    \ onChangedBuildSource := IgnoreSourceChanges`.\n```\n\n#### Project Folder\n\n\
    This folder contains all the necessary things to run the project in SBT. The most\
    \ relevant information of each directory or file is the following:\n\n*   `build.properties`\
    \ contains all the information about the version of SBT.\n*   `plugins.sbt` is\
    \ optional and depends on if you have plugins enabled in SBT or not.\n*   `target`\
    \ contains all the source code generated by SBT.\n\n```\nsbt.version=1.5.5\n```\n\
    \n#### Src Folder\n\nThis directory has the same structure as the Maven repository,\
    \ containing all the source code and the resources necessary to run the application.\
    \ Some folders are optional and others are required. Here’s a little explanation\
    \ about the different folders:\n\n*   `main` **(required):** This folder contains\
    \ all the sources and resources.\n    *   `scala` **(required):** Contains all\
    \ the files separated or not in different packages with the code of the application.\n\
    \    *   `java` **(optional):** Contains all the files developed in Java. You\
    \ can import Scala classes, as you saw in the previous chapters.\n    *   `resources`\
    \ **(optional):** It has files in different formats that can be used in the application.\n\
    *   `test` **(optional):** This folder contains all the tests of the application.\n\
    \    *   `scala` **(optional):** Contains all the tests of the Scala classes.\n\
    \    *   `java` **(optional):** Contains all the tests of the Java classes.\n\
    \    *   `resources` **(optional):** Has files in different formats that can be\
    \ used in the application."
