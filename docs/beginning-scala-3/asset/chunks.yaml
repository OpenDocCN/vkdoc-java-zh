- fmt: '# Opaque Types


    Scala 3 offers a new feature called opaque types. They let you create a certain
    type of abstraction without any overhead. This means that you can create a type
    that from outside appears like a new type. You can use this type as a parameter
    in a method or an `if/else` condition.


    This feature is similar to value classes. The main difference is that you can
    internally use the opaque type or the real type. You can create an opaque type
    in a class or an object, but if you create it inside an object, you can use or
    reference it in any part of the code because you take advantage of the object,
    instead of in the case of a class where you can only see the opaque type when
    you instantiate it.


    To see this feature in action, create an object that contains the domain id and
    a method that translates the common types into opaque types.


    ```

    object DomainIds:

    opaque type BookId = Int

    object BookId:

    def apply(id: Int): BookId = id

    ```


    In this case, the `apply` method is executed as a “constructor” on a class so
    you can invoke a `BookId` and pass a number and return an opaque type with the
    value. To use this opaque type, you can create a `main` method and import all
    domain ids.


    ```

    @main def main =

    //Import the domain objects.

    import DomainIds._

    val bookId = BookId(1)

    print(bookId)

    ```


    Everything looks fine, but what happens if you want to extract the value of this
    `BookId`? By default, you don’t have any methods but you can modify the code to
    include an extension that receives a `BookId` and returns the `Int`.


    ```

    object DomainIds:

    opaque type BookId = Int

    object BookId:

    def apply(id: Int): BookId = id

    extension (bookId: BookId)

    def value: Int = bookId

    ```


    Now change the `main` method to compare elements and print the result.


    ```

    @main def main =

    //Import the domain objects.

    import DomainIds._

    val bookId = BookId(1)

    print(bookId.value == 1)

    ```


    You can also define it inside a class and use it as the return type. This particular
    use is called an opaque type member. The following example shows how to implement
    it:


    ```

    class Book (val name : String, val isbn : String)

    class BookService:

    opaque type BookId = Int

    def getIdByName(name: String) : BookId = 1

    ```


    To run the example, use the command `load` to access these new types that appear
    in one file.


    ```

    scala> :load MyApp.scala

    scala> val bookService = BookService()

    scala> bookService.getIdByName("sad")

    val res0: bookService.BookId = 1

    ```


    These are the main considerations for using opaque types:


    - They offer an easy way to define new types.

    - They don’t support pattern matching.

    - They don’t have the default methods implemented, like `equals`, `hashcode`,
    and `toString`.


    ## Export Clauses


    Export clauses appear in Scala 3 and let you expose a method inside another class
    or object as part of another. Sometimes you have a class that contains another
    class, like a composition of classes, and if you want to expose one method or
    class, you need to create a specific method. With this approach, you can create
    some kind of inheritance for some methods.


    In the following example, `BookService` has an instance of the repository to obtain
    information about a book.


    ```

    class Book (val name : String, val isbn : String)

    class BookRepository:

    def getBook() = new Book("test", "test")

    class BookService:

    private val bookRepository = new BookRepository()

    export bookRepository.getBook //Use export to expose the method

    ```


    As you can see, if you want to expose a method of the repository, you need to
    create a specific method. However, you can use an export clause in the service,
    so for the rest of the world the method `getBook` appears as part of `BookService`.
    Note that you won’t create an instance of a repository in all cases. There are
    other mechanisms to instantiate safely, but for this example it works well. To
    check if everything works, you can create a `main` method and call the method
    `getBook`.


    ```

    @main def main =

    val bookService = BookService()

    val book = bookService.getBook()

    print(book.name)

    ```


    There are some rules to consider when creating an export clauses:


    - All exports are final so any subtype cannot override the logic.

    - You cannot expose a constructor.

    - You can exclude some methods, so if the repository has an `apply` method and
    you want to exclude, you need to change the actual line for `export bookRepository.{*,
    apply => _}.`


    ## Summary


    In this chapter, you saw how different aspects of OOP and Scala reduce code complexity
    or improve performance. Most of these concepts are connected in some way with
    the next chapter, which describes the different aspects of functional programming.
    The following are the highlights of this chapter:


    - In OOP, you need to follow four principles: abstraction, encapsulation, inheritance,
    and polymorphism.

    - OOP has a structure to represent its principles: classes, enums, traits, and
    objects.

    - Classes are a structure that represents a model of a real solution for a problem
    and contains all the logic inside including methods and fields.

    - The package separates or groups the classes, enum, and traits in some way, which
    helps to prevent collisions of names.

    - Opaque types offer a way to create new types simply and reduce the possible
    complexity of the code.

    - Export clauses let you expose methods that exist in another class as part of
    the actual class.

    - An object is a representation of something that only has an instance, like a
    Singleton. You can use an object to contain methods to parse a String or create
    a connection to a database.


