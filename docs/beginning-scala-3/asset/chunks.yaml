    ### 元组


    你是否曾编写过返回两个或三个值的方法？让我们编写一个方法，它接收一个 `List[Double]`，并返回一个包含计数、总和以及平方和的三元素元组，即 `Tuple3[Int,
    Double, Double]`：


    ```

    scala> def sumSq(in: List[Double]): (Int, Double, Double) =

    |     in.foldLeft((0, 0d, 0d))((t, v) => (t._1 + 1, t._2 + v, t._3 + v * v))

    def sumSq(in: List[Double]): (Int, Double, Double)

    ```


    `sumSq` 方法接收一个 `List[Double]` 作为输入，并返回一个 `Tuple3[Int, Double, Double]`。编译器会将 `(Int,
    Double, Double)` 解糖为 `Tuple3[Int, Double, Double]`。编译器会将括号中的元素集合视为一个元组。你使用 `(0,
    0d, 0d)` 作为 `foldLeft` 的初始值，编译器会将其转换为一个 `Tuple3[Int, Double, Double]`。该函数接收两个参数：`t`
    和 `v`。`t` 是一个 `Tuple3`，`v` 是一个 `Double`。该函数通过将元组的第一个元素加 1、第二个元素加上 `v`、第三个元素加上
    `v` 的平方，返回一个新的 `Tuple3`。利用 Scala 的模式匹配，你可以让代码更具可读性：


    ```

    scala> def sumSq(in: List[Double]) : (Int, Double, Double) =

    |     in.foldLeft((0, 0d, 0d)){

    |      case ((cnt, sum, sq), v) => (cnt + 1, sum + v, sq + v * v)}

    def sumSq(in: List[Double]): (Int, Double, Double)

    ```


    你可以使用多种语法创建元组。以下示例展示了如何在 Scala 2.12 或更低版本中声明元组，以防你打开一个包含旧代码的项目：


    ```

    scala> Tuple2(1,2) == Pair(1,2) // 仅在 Scala 2.12 或更低版本中有效

    scala> Pair(1,2) == (1,2)

    scala> (1,2) == 1 -> 2

    ```


    最后一个示例 `1 -> 2` 是一种特别有用且语法优雅的传递键值对的方式。键值对在代码中非常常见，包括用于创建 `Map` 的名称/值对。


    ### Map[K, V]


    `Map` 是一个键/值对的集合。任何值都可以根据其键来检索。键在 `Map` 中是唯一的，但值不必唯一。在 Java 中，`Hashtable` 和 `HashMap`
    是常见的 `Map` 类。Scala 默认的 `Map` 类是不可变的。这意味着你可以将一个 `Map` 实例传递给另一个线程，而该线程无需同步即可访问该
    `Map`。Scala 不可变 `Map` 的性能与 Java 的 `HashMap` 性能难以区分。


    你可以像这样创建一个 `Map`：


    ```

    scala> var p = Map(1 -> "David", 9 -> "Elwood")

    var p: Map[Int,String] = Map(1 -> David, 9 -> Elwood)

    ```


    你通过将一组 `Pair[Int, String]` 传递给 `Map` 对象的 `apply` 方法来创建一个新的 `Map`。注意这里使用了 `var
    p` 而不是 `val p`。这是因为 `Map` 是不可变的，所以当你修改 `Map` 的内容时，必须将新的 `Map` 重新赋值给 `p`。


    你可以向 `Map` 中添加一个元素。


    ```

    scala> p + (8 -> "Archer")

    val res20: Map[Int, String] = Map(1 -> David, 9 -> Elwood, 8 -> Archer)

    ```


    但你并没有改变这个不可变的 `Map`。


    ```

    scala> p

    val res21: Map[Int, String] = Map(1 -> David, 9 -> Elwood)

    ```


    为了更新 `p`，你必须将新的 `Map` 重新赋值给 `p`。


    ```

    scala> p = p + (8 -> "Archer")

    p: Map[Int, String] = Map(1 -> David, 9 -> Elwood, 8 -> Archer)

    ```


    或者


    ```

    scala> p += (8 -> "Archer")

    ```


    你可以看到 `p` 已被更新。


    ```

    scala> p

    res7: Map[Int,String] = Map(1 -> David, 9 -> Elwood, 8 -> Archer)

    ```


    你可以从 `Map` 中获取元素。


    ```

    scala> p(9)

    res12: String = Elwood

    ```


    当你请求一个不存在的元素时会发生什么？


    ```

    scala> p(88)

    java.util.NoSuchElementException: key not found: 88

    ```


    这非常不方便。如果你试图获取一个不在 `Map` 中的元素，你会得到一个异常。这有点令人不安。到目前为止，你在 Scala 中还没有看到太多会抛出异常的情况，但这在逻辑上是合理的。如果你请求一个不存在的东西，那是一种异常情况。Java
    的 `Map` 类通过返回 null 来处理这种情况，但这有两个缺点。首先，你必须对每次 `Map` 访问的结果进行空值测试。其次，这意味着你不能在 `Map`
    中存储 null。Scala 有一种更友好、更温和的机制来处理这种情况。`Map` 的 `get()` 方法返回一个包含结果的 `Option`（`Some`
    或 `None`）：


    ```

    scala> p.get(88)

    val res10: Option[String] = None

    scala> p.get(9)

    val res11: Option[String] = Some(Elwood)

    ```


    如果未找到键，你可以返回一个默认值。


    ```

    scala> p.getOrElse(99, "Nobody")

    val res55: String = Nobody

    scala> p.getOrElse(1, "Nobody")

    val res56: String = David

    ```


    你还可以将 `flatMap` 与 `Options` 结合使用，来查找所有键在 1 到 5 之间的值。


    ```

    scala> 1 to 5 flatMap(p.get)

    val res28: IndexedSeq[String] = Vector(David)

    ```


    在这个例子中，你创建了一个从 1 到 5 的数字范围。你对该集合应用 `flatMap`，并传入一个函数 `p.get`。“等等，”你说，“`p.get`
    不是一个函数，而是一个方法，但我没有包含参数。”Scala 非常酷，因为如果它期望一个具有特定类型参数的函数，而你传入了一个接受这些参数的方法，Scala
    会将这个缺少参数的方法提升为一个函数，正如你在第 2 章中关于函数与方法区别的解释中所看到的。你将在下一小节中探索 `Options`。


    让我们继续探索 `Map`。你可以从 `Map` 中移除元素。


    ```

    scala> p -= 9

    scala> p

    res20: Map[Int,String] = Map(1 -> David, 8 -> Archer)

    ```


    你可以测试 `Map` 是否包含某个特定的键。


    ```

    scala> p.contains(1)

    res21: Boolean = true

    ```


    你可以对值的集合使用 `reduceLeft` 来找到最大的字符串。


    ```

    scala> p.values.reduceLeft((a, b) => if a > b then a else b)

    res23: java.lang.String = David

    ```


    你可以测试是否有任何值包含字母“z”。


    ```

    scala> p.values.exists(_.contains("z"))

    res28: Boolean = false

    ```


    你还可以使用 `++` 方法向 `Map` 中添加一组元素。


    ```

    scala> p ++= List(5 -> "Cat", 6 -> "Dog")

    scala> p

    val res39: Map[Int,String] = Map(1 -> David, 8 -> Archer, 5 -> Cat, 6 -> Dog)

    ```


    并且你可以使用 `–` 方法移除一组键。


    ```

    scala> p --= List(8, 6)

    scala> p

    val res40: Map[Int, String] = Map(1 -> David, 5 -> Cat)

    ```


    Maps 是 Scala 集合，拥有集合操作方法。这意味着你可以使用包括 `map`、`filter` 和 `foldLeft` 在内的方法。使用 Java
    不可变集合的一个棘手之处在于，在遍历集合的同时移除元素。在我的代码中，我必须为要移除的键创建一个累加器，遍历集合，找到所有要移除的键，然后遍历这些键的集合，并将它们从原集合中移除。不仅如此，我还经常忘记
    `Hashtable` 有多么脆弱，不可避免地忘记这个顺序，从而遇到一些讨厌的运行时错误。在 Scala 中，这要容易得多。有一种更简单的方法可以从 `Map`
    中移除不需要的元素。


    ```

    def removeInvalid(in: Map[Int, Person]) =

    in.filter(kv => kv._2.valid)

    ```


    很酷，对吧？`Map` 有一个 `filter` 方法，其工作方式与 List 的 `filter` 方法完全相同。`kv` 变量是一个表示键/值对的键值对。`filter`
    方法通过调用该函数来测试每个键/值对，并构建一个仅包含通过过滤测试的元素的新 `Map`。

