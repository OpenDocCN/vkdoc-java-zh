    \ files.\n-classpath            Specify where to find user class files.\nDefault:\
    \ ..\n-color                Colored output\nDefault: always.\nChoices: always,\
    \ never.\n-d                    Destination for generated classfiles.\na long\
    \ list of options...\n```\n\nWhen the compilation process ends, you can run the\
    \ code using the command `scala` with the name of the file:\n\n```\n➜ ~ scala\
    \ Color.scala\nBLUE\n```\n\nCheck that your code works fine. It’s a good idea\
    \ to see what happens in the directory where your file exists. If you execute\
    \ the `ls` command, you will see a list of files that contain all the compiled\
    \ code:\n\n```\n➜ ~ ls\nColor$$anon$1.class  Color$package$.class\nColor$package.tasty\
    \  Color.scala\nmain.class           Color$.class         Color$package.class\
    \  Color.class          Color.tasty          main.tasty\n```\n\nSay you want to\
    \ know the final format of your code. In previous sections, you read that Scala\
    \ uses JVM to run the code. For that reason, you can use the command `javap` to\
    \ decompile and see the final format of your file.\n\n```\n➜  ~ javap Color\n\
    Compiled from \"Color.scala\"\npublic abstract class Color extends java.lang.Enum\
    \ implements scala.reflect.Enum {\npublic static final Color RED;\npublic static\
    \ final Color BLUE;\npublic static final Color GREEN;\npublic static Color fromOrdinal(int);\n\
    public static Color valueOf(java.lang.String);\npublic static Color[] values();\n\
    public Color(java.lang.String, int);\npublic scala.collection.Iterator productIterator();\n\
    public java.lang.String productPrefix();\npublic java.lang.String productElementName(int);\n\
    public scala.collection.Iterator productElementNames();\n}\n```\n\nAs you can\
    \ see, the only methods that appear in the console with this command are `public`.\
    \ If you want to see the `private` methods too, add the option `-private`.\n\n\
    ```\n➜  ~ javap -private Color\n```\n\nNote\n\nBehind the scenes, each IDE invokes\
    \ the compiler and does the same operation on all files. Obviously you don’t see\
    \ this kind of magic in the console or any place in your IDE, but it is a good\
    \ way to validate or see what is happening with a very strange case.\n\n### Online\
    \ Tools\n\nOther online tools offer the same functionality of running fragments\
    \ of code without having Scala on your machine. For example, [Scastie](https://scastie.scala-lang.org/)^([^(20)](#fn20))\
    \ lets you switch between multiple versions of Scala to test your code. Also,\
    \ Scastie lets you share your code with anyone or embed it in a webpage. See Figure\
    \ [1-4](#328789_3_En_1_Chapter.xhtml#Fig4).\n\n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig4_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig4_HTML.png)\n\
    \nFigure 1-4\n\nThe Scastie web page, which has a simple interface\n\nAnother\
    \ option to run Scala code is [ScalaFiddle](https://scalafiddle.io/)^([^(21)](#fn21)),\
    \ which offers a lot of libraries. The main problem with this tool is that it\
    \ works with version 2.x.x. See Figure [1-5](#328789_3_En_1_Chapter.xhtml#Fig5).\n\
    \n![../images/328789_3_En_1_Chapter/328789_3_En_1_Fig5_HTML.png](images/328789_3_En_1_Chapter/328789_3_En_1_Fig5_HTML.png)\n\
    \nFigure 1-5\n\nScalaFiddle offers several libraries\n\n## Summary\n\nThis chapter\
    \ offered a brief overview of some of the benefits of using Scala in your applications\
    \ and why it is important to migrate to the new version of this language. You\
    \ learned how to configure your environment to use Scala on your machine with\
    \ the recommended versions of the JDK and some possible alternatives of an IDE.\n\
    \nMost of the topics that appear in this chapter appear in the following chapters\
    \ with a lot of details and some good practices.\n\nFootnotes [1](#328789_3_En_1_Chapter.xhtml#Fn1_source)\
