- fmt: "# What Is Functional Programming?\n\nWhen someone encounters the term *functional\
    \ programming*, they may think that it is something that appeared recently, but\
    \ the truth is some languages implemented this idea in the past. Most of these\
    \ languages are not very popular nowadays.\n\nOne example of an old functional\
    \ language is `Lisp`, which was born in 1958. Another example is `Haskell`, which\
    \ appeared in 1990. These languages were very popular in academic settings but\
    \ most developers did not use them in their professional life. This does not mean\
    \ that the paradigm was bad or difficult to understand. Sometimes some languages\
    \ or paradigms find new importance in a different era. Imagine that someone in\
    \ the 1990s wanted you to create the entire back end of an application using JavaScript.\
    \ You might have considered that person as crazy because JavaScript at that time\
    \ was used to do certain validations or effects in HTML. Today, JavaScript is\
    \ used on many platforms to create microservices using `NodeJs` and other technologies.\n\
    \nTo answer the question that appears in the title of this section, there are\
    \ many definitions of this paradigm but one summarizes the entire idea in a simple\
    \ way:\n\n> *Functional code is characterized by one thing: the absence of side\
    \ effects. It doesn’t rely on data outside the current function, and it doesn’t\
    \ change data that exists outside the current function. Every other “functional”\
    \ thing can be derived from this property. Use it as a guide rope as you learn.*\n\
    > \n> Mary Rose Cook\n\nAnother writer of many books about functional programming\
    \ said:\n\n> *Functional programming is a way of writing software applications\
    \ using only pure functions and immutable values.*\n> \n> Alvin Alexander\n\n\
    Both definitions have something in common. They mention the importance of immutability\
    \ because it removes all the problems of coordinating the concurrency or sharing\
    \ access to certain variables. Of course, you can create variables using the keyword\
    \ `var` but the essence or spirit of the paradigm is to use `tk` inside the functions.\
    \ When you pass parameters to a function, you can’t change the values inside,\
    \ following the principle of immutability. Instead, you need to create a new variable\
    \ and return the value.\n\nTo see immutability with an example, let’s create a\
    \ function that removes the prefix in one string. First, try to reassign the result\
    \ of the operation to the same variable and see what happens.\n\n```\nscala> def\
    \ removePreffix(name : String) =\n|     name = name.replace('T', ' ')\n|\n2 |\
    \    name = name.replace('T', ' ')\n|    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^\n|    Reassignment\
    \ to val name\n```\n\nThe correct way to follow the principle of immutability\
    \ is something like this:\n\n```\nscala> def removePreffix(name : String) =\n\
    |     name.replace('T', ' ')\ndef removePreffix(name: String): String\n```\n\n\
    This means that the function takes one string, replaces the prefix, and returns\
    \ a new value without changing the value of the original parameter.\n\n## Pure\
    \ Functions\n\nIn mathematics, functions are nothing short of pure, in that they\
    \ lack side effects. Consider the classic functions in `(x)`:\n\n```\ny = sin(x)\n\
    ```\n\nRegardless of how many times `sin(x)` gets called, `sin(x)` does not modify\
    \ the state of the variable. Such a function is called a pure function and is\
    \ oblivious to the context.\n\nNow, sometimes your function doesn’t just do mathematical\
    \ operations, so the following are rules for making a pure function:\n\n* They\
    \ are functions that do not modify the value of the parameters; instead, they\
    \ return a new value with the result.\n* They are functions that do not modify\
    \ the context of the application.\n* They only depend on the parameters that the\
    \ function receives. They don’t access external resources like databases, files,\
    \ or other applications using the network.\n\n## Side Effects\n\nFollowing the\
    \ definition of a pure function, side effects refer to the idea that the execution\
    \ of a function does not affect the rest of the application or external resources\
    \ like a database. Imagine that you have a function which, depending on the parameters\
    \ it receives, throws an exception or calls another function that is not pure.\
    \ These are examples of side effects that can affect parts of your application.\n\
    \n## Referential Transparency\n\nAn expression is referentially transparent if\
    \ it can be substituted by its resulting value, without changing the behavior\
    \ of the program, regardless of where the expression is used in the program. For\
    \ instance, you can assign the expression of two immutable variables `x` and `y`\
    \ to a third variable `z`, like this:\n\n```\nval z = x + y\n```\n\nSo anywhere\
    \ the expression `x + y` is used throughout the given scope of your program, you\
    \ can substitute it with `z` within that scope without affecting the result of\
    \ the program. As stated, functional programming gives you the right foundation\
    \ to think about concurrency. The three keystones of this foundation are referential\
    \ transparency, higher-order function, and immutable value. Understanding these\
    \ key elements is crucial to understanding functional programming. In functional\
    \ programming, a pure function with one or more input parameters does not mutate\
    \ the input parameters and always returns the same value for the same input.\n\
    \n> **Note**\n> \n> A pure function is referentially transparent and has no side\
    \ effects.\n\nA pure function is free of side effects. However, a function that\
    \ never causes side effects would be useless. A language that does not sanction\
    \ side effects would be useless, as input and output are essentially the ramifications\
    \ of side effects.\n\nWe have introduced enough theory for you to begin to explore\
    \ Scala functions. In Chapter 2, you learned the basic syntax of Scala functions\
    \ and how you can declare, define, and call functions. Before continuing with\
    \ the sections that follow in this chapter, we recommend you skim through the\
    \ Scala functions introduced in Chapter 2.\n\nNow we will get started with a basic\
    \ functional construct in Scala: the function literal."
  raw: "## What Is Functional Programming?\n\nWhen someone encounters the term *functional\
    \ programming*, they may think that it is something that appeared recently, but\
    \ the truth is some languages implemented this idea in the past. Most of these\
    \ languages are not very popular nowadays.\n\nOne example of an old functional\
    \ language is Lisp, which was born in 1958\\. Another example is Haskell, which\
    \ appeared in 1990\\. These languages were very popular in academic settings but\
    \ most developers did not use them in their professional life. This does not mean\
    \ that the paradigm was bad or difficult to understand. Sometimes some languages\
    \ or paradigms find new importance in a different era. Imagine that someone in\
    \ the 1990s wanted you to create the entire back end of an application using JavaScript.\
    \ You might have considered that person as crazy because JavaScript at that time\
    \ was used to do certain validations or effects in HTML. Today, JavaScript is\
    \ used on many platforms to create microservices using NodeJs^([^(25)](#fn25))\
    \ and other technologies.\n\nTo answer the question that appears in the title\
    \ of this section, there are many definitions of this paradigm but one summarizes\
    \ the entire idea in a simple way:\n\n> *Functional code is characterized by one\
    \ thing: the absence of side effects. It doesn’t rely on data outside the current\
    \ function, and it doesn’t change data that exists outside the current function.\
    \ Every other “functional” thing can be derived from this property. Use it as\
    \ a guide rope as you learn.*\n> \n> Mary Rose Cook\n\nAnother writer of many\
    \ books about functional programming said:\n\n> *Functional programming is a way\
    \ of writing software applications using only pure functions and immutable values.*\n\
    > \n> Alvin Alexander\n\nBoth definitions have something in common. They mention\
    \ the importance of immutability because it removes all the problems of coordinating\
    \ the concurrency or sharing access to certain variables. Of course, you can create\
    \ variables using the keyword `var` but the essence or spirit of the paradigm\
    \ is to use tk inside the functions. When you pass parameters to a function, you\
    \ can’t change the values inside, following the principle of immutability. Instead,\
    \ you need to create a new variable and return the value.\n\nTo see immutability\
    \ with an example, let’s create a function that removes the prefix in one string.\
    \ First, try to reassign the result of the operation to the same variable and\
    \ see what happens.\n\n```\nscala> def removePreffix(name : String) =\n|     name\
    \ = name.replace('T', ' ')\n|\n2 |    name = name.replace('T', ' ')\n|    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^\n\
    |    Reassignment to val name\n```\n\nThe correct way to follow the principle\
    \ of immutability is something like this:\n\n```\nscala> def removePreffix(name\
    \ : String) =\n|     name.replace('T', ' ')\ndef removePreffix(name: String):\
    \ String\n```\n\nThis means that the function takes one string, replaces the prefix,\
    \ and returns a new value without changing the value of the original parameter.\n\
    \n### Pure Functions\n\nIn mathematics, functions are nothing short of pure, in\
    \ that they lack side effects. Consider the classic functions in `(x)`:\n\n```\n\
    y = sin(x)\n```\n\nRegardless of how many times `sin(x)` gets called, `sin(x)`\
    \ does not modify the state of the variable. Such a function is called a pure\
    \ function and is oblivious to the context.\n\nNow, sometimes your function doesn’t\
    \ just do mathematical operations, so the following are rules for making a pure\
    \ function:\n\n*   They are functions that do not modify the value of the parameters;\
    \ instead, they return a new value with the result.\n\n*   They are functions\
    \ that do not modify the context of the application.\n\n*   They only depend on\
    \ the parameters that the function receives. They don’t access external resources\
    \ like databases, files, or other applications using the network.\n\n### Side\
    \ Effects\n\nFollowing the definition of a pure function, side effects refer to\
    \ the idea that the execution of a function does not affect the rest of the application\
    \ or external resources like a database. Imagine that you have a function which,\
    \ depending on the parameters it receives, throws an exception or calls another\
    \ function that is not pure. These are examples of side effects that can affect\
    \ parts of your application.\n\n### Referential Transparency\n\nAn expression\
    \ is referentially transparent if it can be substituted by its resulting value,\
    \ without changing the behavior of the program, regardless of where the expression\
    \ is used in the program. For instance, you can assign the expression of two immutable\
    \ variables `x` and `y` to a third variable `z`, like this:\n\n```\nval z = x\
    \ + y\n```\n\nSo anywhere the expression `x + y` is used throughout the given\
    \ scope of your program, you can substitute it with `z` within that scope without\
    \ affecting the result of the program. As stated, functional programming gives\
    \ you the right foundation to think about concurrency. The three keystones of\
    \ this foundation are referential transparency, higher-order function, and immutable\
    \ value. Understanding these key elements is crucial to understanding functional\
    \ programming. In functional programming, a pure function with one or more input\
    \ parameters does not mutate the input parameters and always returns the same\
    \ value for the same input.\n\nNote\n\nA pure function is referentially transparent\
    \ and has no side effects.\n\nA pure function is free of side effects. However,\
    \ a function that never causes side effects would be useless. A language that\
    \ does not sanction side effects would be useless, as input and output are essentially\
    \ the ramifications of side effects.\n\nWe have introduced enough theory for you\
    \ to begin to explore Scala functions. In Chapter [2](#328789_3_En_2_Chapter.xhtml),\
    \ you learned the basic syntax of Scala functions and how you can declare, define,\
    \ and call functions. Before continuing with the sections that follow in this\
    \ chapter, we recommend you skim through the Scala functions introduced in Chapter\
    \ [2](#328789_3_En_2_Chapter.xhtml).\n\nNow we will get started with a basic functional\
    \ construct in Scala: the function literal."
  trans: "\n## 什么是函数式编程？\n\n当人们初次接触*函数式编程*这个术语时，可能会认为它是最近才出现的新事物，但事实上，一些语言在过去就已经实现了这一理念。如今，这些语言大多已不再流行。\n\
    \n早期函数式语言的一个例子是 Lisp，它诞生于 1958 年。另一个例子是 Haskell，出现于 1990 年。这些语言在学术领域非常流行，但大多数开发者在职业生涯中并未使用它们。这并不意味着这种范式不好或难以理解。有时，某些语言或范式会在不同的时代找到新的重要性。想象一下，如果有人在\
    \ 20 世纪 90 年代要求你使用 JavaScript 构建整个应用的后端，你可能会觉得那个人疯了，因为当时的 JavaScript 仅用于在 HTML\
    \ 中执行某些验证或特效。而今天，JavaScript 已被广泛应用于多个平台，借助 NodeJs^(²⁵) 和其他技术来创建微服务。\n\n为了回答本节标题提出的问题，关于这种范式有许多定义，但其中一种定义以简单的方式概括了整个理念：\n\
    \n> *函数式代码的特点只有一个：没有副作用。它不依赖当前函数外部的数据，也不会改变当前函数外部的数据。所有其他“函数式”的特性都可以从这个属性推导出来。请将其作为你学习过程中的指引。*\n\
    > \n> 玛丽·罗斯·库克\n\n另一位撰写过多本函数式编程书籍的作者说道：\n\n> *函数式编程是一种仅使用纯函数和不可变值来编写软件应用程序的方式。*\n\
    > \n> 阿尔文·亚历山大\n\n这两个定义有共同之处。它们都提到了不可变性的重要性，因为它消除了协调并发或共享访问某些变量所带来的所有问题。当然，你可以使用关键字\
    \ `var` 创建变量，但这种范式的本质或精神是在函数内部使用不可变值。当你向函数传递参数时，你不能改变其内部的值，这遵循了不可变性的原则。相反，你需要创建一个新变量并返回该值。\n\
    \n为了通过示例理解不可变性，让我们创建一个函数，用于移除字符串中的前缀。首先，尝试将操作的结果重新赋值给同一个变量，看看会发生什么。\n\n```\nscala>\
    \ def removePreffix(name : String) =\n|     name = name.replace('T', ' ')\n|\n\
    2 |    name = name.replace('T', ' ')\n|    ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^\n|  \
    \  Reassignment to val name\n```\n\n遵循不可变性原则的正确方式如下：\n\n```\nscala> def removePreffix(name\
    \ : String) =\n|     name.replace('T', ' ')\ndef removePreffix(name: String):\
    \ String\n```\n\n这意味着该函数接收一个字符串，替换前缀，并返回一个新值，而不改变原始参数的值。\n\n### 纯函数\n\n在数学中，函数都是纯的，因为它们没有副作用。考虑经典的函数\
    \ `(x)`：\n\n```\ny = sin(x)\n```\n\n无论 `sin(x)` 被调用多少次，`sin(x)` 都不会修改变量的状态。这样的函数被称为纯函数，并且与上下文无关。\n\
    \n有时，你的函数不仅仅执行数学运算，因此以下是创建纯函数的规则：\n\n*   它们是不修改参数值的函数；相反，它们会返回一个包含结果的新值。\n*  \
    \ 它们是不修改应用程序上下文的函数。\n*   它们仅依赖于函数接收的参数。它们不会访问外部资源，例如数据库、文件或通过网络访问的其他应用程序。\n\n\
    ### 副作用\n\n根据纯函数的定义，副作用指的是函数执行不会影响应用程序的其他部分或外部资源（如数据库）这一概念。想象一下，你有一个函数，根据它接收的参数，可能会抛出异常或调用另一个非纯函数。这些都是可能影响应用程序某些部分的副作用的例子。\n\
    \n### 引用透明性\n\n如果一个表达式可以用其结果值替换，而不改变程序的行为，无论该表达式在程序中的何处使用，那么这个表达式就是引用透明的。例如，你可以将两个不可变变量\
    \ `x` 和 `y` 的表达式赋值给第三个变量 `z`，如下所示：\n\n```\nval z = x + y\n```\n\n因此，在程序的给定作用域内，任何使用表达式\
    \ `x + y` 的地方，你都可以在该作用域内用 `z` 替换它，而不会影响程序的结果。如前所述，函数式编程为你思考并发问题提供了正确的基础。这个基础的三个基石是引用透明性、高阶函数和不可变值。理解这些关键要素对于理解函数式编程至关重要。在函数式编程中，一个具有一个或多个输入参数的纯函数不会改变输入参数，并且对于相同的输入总是返回相同的值。\n\
    \n注意\n\n纯函数是引用透明的，并且没有副作用。\n\n纯函数没有副作用。然而，一个从不引起副作用的函数将毫无用处。一个不允许副作用存在的语言也将毫无用处，因为输入和输出本质上就是副作用的产物。\n\
    \n我们已经介绍了足够的理论，让你可以开始探索 Scala 函数。在第 2 章中，你学习了 Scala 函数的基本语法，以及如何声明、定义和调用函数。在继续学习本章后续内容之前，我们建议你快速浏览一下第\
    \ 2 章中介绍的 Scala 函数。\n\n现在，我们将开始学习 Scala 中的一个基本函数式结构：函数字面量。\n"
- fmt: "# Expression-Oriented Programming\n\nIn expression-oriented programming, every\
    \ statement is an expression. To understand EOP, you have to understand the difference\
    \ between a statement and an expression. A statement executes code but does not\
    \ return any value, for example:\n\n```\ncustomer.computeDiscount()\n```\n\nAn\
    \ expression returns a value. Expressions are blocks of code that evaluate to\
    \ a value.\n\n```\nval discount = computeDiscount(customer)\n```\n\n**Note:**\
    \ An expression-oriented programming language is a programming language where\
    \ every construct is an expression and thus evaluates to a value.\n\nIn Scala,\
    \ the following expression returns a result:\n\n```\nscala> 2 + 2\nres0: Int =\
    \ 4\n```\n\nThe strength of expression-oriented programming is more discernible\
    \ from an `if/else` expression, which also returns a value in Scala.\n\n```\n\
    val test = if (3 > 2) \"true\" else \"false\"\n```\n\nThis `if` clause checks\
    \ a conditional expression and returns one expression or another, depending on\
    \ the value of the conditional expression. An `if` block in Java does not evaluate\
    \ a value. The code illustrated here is illegal in Java, in contrast to Scala,\
    \ because the `if` clause in Java is a statement, not an expression.\n\n```\n\
    boolean test = if (3 > 2) \"true\" else \"false\"\n```\n\nTo accomplish the same\
    \ effect shown in the Scala `if` clause, you must use the `?:` syntax in Java,\
    \ as illustrated here:\n\n```\nboolean test = 3 > 2 ? true : false ;\n```\n\n\
    In Java, there is a difference between `if` and `?:` where `if` is a statement\
    \ while `?:` is an expression. The `if` clause in Scala is much more like `?:`\
    \ in Java than the `if` clause in Java. Scala has unified the concept of `?:`\
    \ with its `if` blocks and so Scala doesn’t have a `?:` syntax.\n\n**Note:** As\
    \ mentioned, every construct in Scala is an expression where the order in which\
    \ operations occur is of no importance and therefore these expressions can be\
    \ executed in any order. This simple concept has a deep implication in concurrency\
    \ in multicore programming where you can execute expressions in parallel.\n\n\
    ## Functions, Lambdas, and Closures\n\nSome of these terms do not exist in the\
    \ previous versions of Scala or change meaning in this version, so before going\
    \ more in depth, you need to understand the basic idea of each term.\n\n- **Function**:\
    \ This operation can have a name where the code is not evaluated until it’s called\
    \ for someone. This operation may or may not have variables. The following is\
    \ an example of a function that calculates the area:\n\n- **Lambda**: This is\
    \ an anonymous function that may or may not have variables in the definition.\n\
    \n```\nscala> def calculateArea(height: Int, width: Int) = height*width\ndef calculateArea(height:\
    \ Int, width: Int): Int\n```\n\n```\n(height: Int, width: Int) => height*width\n\
    ```\n\nLanguages like Java or Python use the term *lambda function*, but in Scala,\
    \ most developers use the terms *anonymous function* or *function literal* to\
    \ describe the idea of lambda.\n\n- **Closure**: This is a function, anonymous\
    \ or named, which use one or more free variables to return a new value. The idea\
    \ of free variables is to have variables in the scope of the function and it’s\
    \ not necessary passing to the function as parameters.\n\n```\nscala> var count\
    \ = 0\nscala> val incrementCount = (number:Int) => count + number\nscala> incrementCount(1)\n\
    val res1: Int = 1\n```\n\n### Function Literal/Anonymous Function\n\nA literal\
    \ is the simplest form of an expression. A literal is a notation for representing\
    \ a fixed value in the source code. Almost all programming languages have notations\
    \ for atomic values such as integers, floating-point numbers, strings, and so\
    \ on. Literals are often used to initialize variables. In the following, `1` is\
    \ an integer literal:\n\n```\nint x = 1;\n```\n\nScala allows you to express functions\
    \ as literals. Function literals allow you to have an expression of a function\
    \ type that you can write in a short format without declaring a name for it. A\
    \ function type could be one of the following:\n\n- The type of a variable or\
    \ parameter to which a function can be assigned\n- An argument of a higher-order\
    \ function, which you will see in detail in Chapter [10](#328789_3_En_10_Chapter.xhtml),\
    \ taking a function parameter\n- The result type of higher-order function returning\
    \ a function\n\nThe syntax for a function literal starts with a parenthesized,\
    \ comma−separated list of arguments followed by an arrow and the body of the function.\
    \ A function literal is also called an *anonymous function*, that is, a function\
    \ without any name specified with the function literal syntax. Consider an `add`\
    \ function:\n\n```\nval add = (x: Int, y: Int) => x + y\n```\n\nUsing the function\
    \ literal, you can define the `add` function as illustrated here:\n\n```\n(x:\
    \ Int, y: Int) => x + y\n```\n\nA function literal is instantiated into an object\
    \ called a function value. A function value is a function object, and you can\
    \ invoke the function object in the same manner as you invoke any other function.\
    \ The function object extends one of the `FunctionN` traits, such as `Function0`,\
    \ `Function1`, and so on up to `Function22`. Depending on the number of arguments\
    \ in the function, the corresponding `FunctionN` trait is chosen by the compiler.\
    \ For a function with two arguments, the compiler will elect `Function2` as the\
    \ underlying type. For a function with three arguments, the compiler will choose\
    \ `Function3`; for a function with four arguments, `Function4`; and so on.\n\n\
    Because the function value is an object, it can be stored in a variable and it\
    \ can be invoked using parentheses in the function call, as illustrated here:\n\
    \n```\nscala> val add = (a: Int, b: Int) => a + b\nadd: (Int, Int) => Int = \n\
    scala> add(1, 2)\nres0: Int = 3\n```\n\nThe invocation of this function is converted\
    \ to a call to the `apply` method of the function class instance, which is assigned\
    \ to the variable.\n\nFrom these kinds of function literals, the Scala compiler\
    \ generates a function object that mixes in one of the `FunctionN` traits. So\
    \ the left side of the `→` becomes the parameter list and the right side becomes\
    \ the implementation of the `apply` method. Every function that you define in\
    \ Scala becomes an instance of an implementation that features a certain `FunctionN`\
    \ trait ranging from `Function1` up to `Function22`.\n\nNow, to take a deeper\
    \ look into `Function` traits, you first write a function that calculates the\
    \ area of a rectangle as illustrated here:\n\n```\nval areaOfRectangle:(Int, Int)\
    \ => Int = (width:Int, height:Int) => width*height\n```\n\nWhen you run this function\
    \ in REPL, you will see that the compiler elects and chooses the `Function2` trait\
    \ for this function. Why? Because there are two arguments to this function.\n\n\
    ```\nscala> val areaOfRectangle:(Int, Int) => Int = (width:Int, height:Int) =>\
    \ width*height\nareaOfRectangle: (Int, Int) => Int = = Lambda$1475/0x0000000801215040@712594f4\n\
    ```\n\nYou can invoke this function as seen here:\n\n```\nscala> areaOfRectangle(5,3)\n\
    res0: Int = 15\n```\n\nNow, let’s look at traits in Scala. `Function2` in the\
    \ Scala package looks like this:\n\n```\ntrait Function2[-T1, -T2, +R] extends\
    \ AnyRef {\n...\nabstract def apply( v1 :T1, v2 :T2 ) : R\n...\n}\n```\n\nThis\
    \ shows only the `apply` method. The two type parameters, `T1` and `T2`, in the\
    \ `apply` method take the type of the arguments, while the type parameter `R`\
    \ represents the function’s return type."
