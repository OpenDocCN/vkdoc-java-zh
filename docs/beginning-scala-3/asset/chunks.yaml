  raw: '### Testing Data Types


    Let’s write a method that tests an incoming Object to see whether it’s a String,
    an Integer, or something else. Depending on what type it is, different actions
    will be performed as illustrated in the following example:


    ```

    def test2(in: Any) =

    in match

    case s: String => "String, length "+s.length

    case i: Int if i > 0 => "Natural Int"

    case i: Int => "Another Int"

    case a: AnyRef => a.getClass.getName

    case _ => "null"

    ```


    The first line tests for a String. If it is a String, the parameter is cast into
    a String and assigned to the `s` variable, and the expression on the right of
    the => is returned. Note that if the parameter is null, it will not match any
    pattern that compares to a type. On the next line, the parameter is tested as
    an Int. If it is an Int, the parameter is cast to an Int, assigned to `i`, and
    the guard is tested. If the Int is a natural number (greater than zero), “Natural
    Int” will be returned. In this way, Scala pattern matching replaces Java’s test/cast
    paradigm. Now to fully appreciate the power of pattern matching in Scala, let’s
    see the Java equivalent of the previous block of code:


    ```

    public String test2(Object in) {

    if (in == null) {

    return "null";

    }

    if (in instanceof String) {

    String s = (String) in;

    return "String, length " + s.length();

    }

    if (in instanceof Integer) {

    int i = ((Integer) in).intValue();

    if (i > 0) {

    return "Natural Int";

    }

    return "Another Int";

    }

    return in.getClass().getName();

    }

    ```


    In the Java equivalent code of the previous code, there is a separation between
    the instance of test and the casting operation. This often results in bugs when
    a block of test/cast code is copied and pasted. There’s no compiler check that
    the instance of test matches the cast, and it’s not uncommon to have a mismatch
    between the test and the cast in Java code that’s been copied and pasted. The
    same code in Scala is shorter, and there’s no explicit casting. Pattern matching
    is a powerful way to avoid explicit casting.


    ### Pattern Matching in Lists


    Scala’s pattern matching can also be applied to Lists. Scala’s List collection
    is implemented as a linked list where the head of the list is called a cons cell.


    Note


    The naming of the cons cell traces its roots back to Lisp and came from the act
    of constructing a list. One constructs a list by linking a cons cell to the head
    of the list.


    It contains a reference to its contents and another reference to the tail of the
    list, which may be another cons cell or the Nil object. Lists are immutable, so
    the same tail can be shared by many different heads. In Scala, the cons cell is
    represented by the `::` case class. Perhaps you have just said, “Ah hah!”


    Creating a List in Scala is as simple as this:


    ```

    1 :: Nil

    ```


    `::` is the name of the method and the name of a case class. By keeping the creation
    method, `::`, and the case class name the same, you can construct and pattern
    match Lists in a syntactically pleasing way. And as you’ve just seen, case classes
    can be used in pattern matching to either compare or extract values. This holds
    for Lists as well and leads to some very pleasing syntax.


    You construct a List with


    ```

    scala> val x = 1

    x: Int = 1

    scala> val rest = List(2,3,4)

    rest: List[Int] = List(2, 3, 4)

    scala> val list = x :: rest

    val list: List[Int] = List(1, 2, 3, 4)

    scala> def printNumbers(list : List[Int]) : Unit =

    list match

    case head :: tail => println(head); printNumbers(head)

    case Nil => println("")

    def printNumbers(list: List[Int]): Unit

    scala> printNumbers(list)


    ```


    Then you can extract the `head (x)` and `tail (rest)` of the List in pattern matching.


    ### Pattern Matching and Lists


    Pattern matching and Lists go hand in hand. You can start off using pattern matching
    to sum up all the odd `Ints` in a `List[Int]`.


    ```

    def sumOdd(in: List[Int]): Int =

    in match

    case Nil => 0

    case x :: rest if x % 2 == 1 => x + sumOdd(rest)

    case _ :: rest => sumOdd(rest)

    ```


    If the List is empty, Nil, then you return 0\. The next case extracts the first
    element from the List and tests to see whether it’s odd. If it is, you add it
    to the sum of the rest of the odd numbers in the List. The default case is to
    ignore the first element of the List (a match with the _ wildcard) and return
    the sum of the odd numbers in the rest of the List.


    Extracting the head of a List is useful, but when pattern matching against a List,
    you can match against any number of elements in the List. In the following example,
    you replace any number of contiguous identical items with just one instance of
    that item:


    ```

    def noPairs[T](in: List[T]): List[T] =

    in match

    case Nil => Nil

    case a :: b :: rest if a == b => noPairs(a :: rest)

    // the first two elements in the list are the same, so we''ll

    // call noPairs with a List that excludes the duplicate element

    case a :: rest => a :: noPairs(rest)

    // return a List of the first element followed by noPairs

    // run on the rest of the List

    ```


    Let’s run the code and see whether it does what you expect:


    ```

    scala> noPairs(List(1,2,3,3,3,4,1,1))

    res6: List[Int] = List(1, 2, 3, 4, 1)

    ```


    Pattern matching can match against constants as well as extract information. Say
    you have a `List[String]` and you want to implement a rule that says that you
    discard the element preceding the “ignore” String. In this case, you use pattern
    matching to test as well as extract:


    ```

    def ignore(in: List[String]): List[String] =

    in match

    case Nil => Nil

    case _ :: "ignore" :: rest => ignore(rest)

    // If the second element in the List is "ignore" then return the ignore

    // method run on the balance of the List

    case x :: rest => x :: ignore(rest)

    // return a List created with the first element of the List plus the

    // value of applying the ignore method to the rest of the List

    ```


    You’ve seen how to use pattern matching and Lists with extraction and equality
    testing. You can also use the class test/cast mechanism to find all the Strings
    in a `List[Any]`.


    ```

    def getStrings(in: List[Any]): List[String] =

    in match

    case Nil => Nil

    case (s: String) :: rest => s :: getStrings(rest)

    case _ :: rest => getStrings(rest)

    ```


    However, the paradigmatic way of filtering a `List[Any]` into a List of a particular
    type is by using a pattern as a function. You’ll see this in the “Pattern Matching
    as Functions” section.


    In this section, you’ve explored how to do pattern matching. You’ve seen extraction
    and pattern matching with Lists. It may seem that a List is a special construct
    in Scala, but there’s nothing special about a List in Scala.


    ## Compiler Optimization


    Since Scala 2.x.x, there has been a way to optimize the pattern matching expression
    with the annotation `@switch`. When the annotation is present, the compiler checks
    if the expression is valid or not to introduce some optimizations. Behind the
    scenes, this annotation tells the compiler to not transform a simple conditional
    expression (`if/else`). Instead, the compiler tries to become a branch table that
    is faster than the other expressions.


    ```

    scala> import scala.annotation.switch //You need to import this annotation

    scala> def printNum(int : Int) =

    (int: @switch) match //You indicate to Scala to use the optimization

    case 0 => println("Zero")

    case 1 => println("One")

    case _ => if int > 0 then println("More than one") else println("Less than zero")

    def printNum(int: Int): Unit

    scala> printNum(3)

    More than one

    ```


    Everything works fine with this new annotation but behind the scenes, this code
    is transformed into two different structures depending on the type of case. The
    structures are called tableswitch and lookupswitch.^([^(26)](#fn26))'
