- fmt: '### Traits and Class Hierarchies


    One of the big challenges with developing a class hierarchy when you are constrained
    by single inheritance is figuring out what things should be base classes and where
    things should go in the class hierarchy. If you’re modeling living things, how
    do you model things with legs when that can include any animal? Should there be
    `LeggedAnimals` and `LeglessAnimals`? But then, how do you deal with `Mammals`
    and `Reptiles`? Maybe you can make `HasLegs` an interface, but then you can give
    a `Plant` a leg. Scala to the rescue.


    You’ve already seen that traits can implement methods. Additionally, traits can
    have rules about what kind of classes and other traits they can be mixed into.
    Further, you can declare method parameters that are a consolidation of types,
    such as:


    ```

    def foo(bar: Baz with Blarg with FruitBat)

    ```


    Only instances of classes that extend `Baz`, `Blarg`, and `FruitBat` may be passed
    into this method.


    ```

    abstract class LivingThing

    abstract class Plant extends LivingThing

    abstract class Fungus extends LivingThing

    abstract class Animal extends LivingThing

    ```


    Good so far. A `LivingThing` must be a plant, fungus, or animal. But, what about
    legs? Who can have legs?


    ```

    trait HasLegs extends Animal:

    def walk() = println("Walking")

    ```


    The `HasLegs` trait extends `Animal`. But `Animal` is a class, so what does it
    mean for a trait to extend a class? It means that the compiler will only let you
    mix `HasLegs` into something that subclasses from `Animal`. Thus, you’ve defined
    that only animals have legs, but any type of animal can have legs. It’s the same
    for `HasWings`.


    ```

    trait HasWings extends Animal:

    def flap() = println("Flap Flap")

    ```


    But only things with wings can fly. This is a different notation. You define the
    rules of the self type with this: `HasWings =>`. The compiler flags an error if
    this trait is not mixed into a class that also extends `HasWings`. So, you can
    use self types to define the rules for what classes a given trait can be mixed
    into.^([^(34)](#fn34))


    ```

    trait Flies:

    this: HasWings => def fly()  = println("I''m flying")

    ```


    And Birds have wings and legs:


    ```

    abstract class Bird extends Animal with HasWings with HasLegs

    ```


    One little comment before you continue: You can use the keyword `with` or the
    comma to concatenate more than one trait. They work in the same way.


    ```

    abstract class Bird extends Animal, HasWings, HasLegs

    ```


    Let’s define a couple of different `Bird`s:


    ```

    class Robin extends Bird with Flies

    class Ostrich extends Bird

    ```


    All mammals have a `bodyTemperature`.


    ```

    abstract class Mammal extends Animal:

    def bodyTemperature: Double

    ```


    Some animals know their name, and if they do, they respond to their name.


    ```

    trait KnowsName extends Animal:

    def name: String

    ```


    So, in the following code, a `Dog` is a `Mammal` that has legs and knows (responds
    to) its name.


    ```

    class Dog(val name: String) extends Mammal with HasLegs with KnowsName:

    def bodyTemperature: Double = 99.3

    ```


    Some cats and children are known as mammals that know their names but sometimes
    ignore their names.


    ```

    trait IgnoresName:

    this: KnowsName => def ignoreName(when: String): Boolean

    def currentName(when: String): Option[String] =

    if ignoreName(when) then None else Some(name)

    ```


    Now you can define a `Cat` class that has legs, knows its name, and ignores its
    name except at dinner time.


    ```

    class Cat(val name: String) extends Mammal with HasLegs with KnowsName with IgnoresName:

    def ignoreName(when: String) =

    when match

    case "Dinner" => false

    case _ => true

    def bodyTemperature: Double = 99.5

    ```


    Some `Animals` can be `Athletes`, and `Runners` are `Athletes` with legs:


    ```

    trait Athlete extends Animal

    ```


    Here is a `Runner` trait:


    ```

    trait Runner:

    this: Athlete with HasLegs => def run() = println("I''m running")

    ```


    A `Person` is a `Mammal` with legs and knows its name:


    ```

    class Person(val name: String) extends Mammal with HasLegs with KnowsName:

    def bodyTemperature: Double = 98.6

    ```


    A `Biker` is a `Person` but may only be added to an `Athlete`:


    ```

    trait Biker extends Person:

    this: Athlete=> def ride() = println("I''m riding my bike")

    ```


    And finally, let’s define some `Genders`.


    ```

    trait Gender

    trait Male extends Gender

    trait Female extends Gender

    ```


    You’ve defined a complex hierarchy of classes and traits. Let’s see what you can
    do with these classes. First, let’s try to create a `Dog` that’s also a `Biker`:


    ```

    scala> val bikerDog = new Dog("biker") with Athlete with Biker

    -- Error:

    1 |val bikerDog = new Dog("biker") with Athlete with Biker

    |                               ^^^^^

    |                               illegal trait inheritance: superclass Dog does
    not derive from trait Biker''s superclass Person

    ```


    Cool, the compiler enforced your rule about `Biker`s needing to be `Person`s .
    Let’s create some valid `LivingThings`. Please note that you can combine different
    traits as part of the object creation. So, `archer` is an instance of a class
    that is a subclass of `Dog` that implements `Athlete`, `Runner`, and `Male`. The
    Scala compiler automatically creates this new, anonymous class for you.


    ```

    scala> val archer = new Dog("archer") with Athlete with Runner with Male

    archer: Dog with Athlete with Runner with Male = $anon$1@18bbc98

    scala> val dpp = new Person("David") with Athlete with Biker with Male

    dpp: Person with Athlete with Biker with Male = $anon$1@7b5617

    scala> val john = new Person("John") with Athlete with Runner with Male

    john: Person with Athlete with Runner with Male = $anon$1@cd927d

    scala> val annette = new Person("Annette") with Athlete with Runner with Female

    annette: Person with Athlete with Runner with Female = $anon$1@1ec41c0

    ```


    You’ve got a bunch of `Animal`s. Let’s see what you can do with them.


    ```

    scala> def goBiking(b: Biker) = println(b.name + " is biking")

    goBiking: (Biker)Unit

    scala> goBiking(dpp)

    David is biking

    ```


    What happens if you try to send `Annette` on a bike ride?


    ```

    scala> goBiking(annette)

    -- Error:

    1 |goBiking(annette)

    |         ^^^^^^^

    |         Found:    (annette : Person & Athlete & (Runner & Female))

    |         Required: Biker

    ```


    This makes sense. The method requires a `Biker`, and `Annette` is not a `Biker`.
    However, just as you can compose a class out of traits, you can require that a
    class implement more than one trait in order to be the parameter to a method.


    ```

    scala> def charityRun(r: Person with Runner) = r.run()

    charityRun: (Person with Runner)Unit

    ```


    The `charityRun` method can only be called with a parameter that is a subclass
    of `Person` and also implements the `Runner` trait.


    ```

    scala> charityRun(annette)

    I''m running

    ```


    What if you try to call the method with a `Runner` that is not a `Person`?


    ```

    scala> charityRun(archer)

    :7: error: type mismatch;

    found     : Dog with Athlete with Runner with Male

    required  : Person with Runner

    charityRun(archer)

    ```


    You can define the parameter in terms of traits. The `womensRun` method may only
    be called with a parameter that’s both a `Runner` and a `Female`.


    ```

    scala> def womensRun(r: Runner with Female) = r.run()

    womensRun: (Runner with Female)Unit

    scala> womensRun(annette)

    I''m running

    scala> val madeline = new Cat("Madeline") with Athlete with Runner with Female

    madeline: Cat with Athlete with Runner with Female = $anon$1@11dde0c

    scala> womensRun(madeline)

    I''m running

    ```'
