    ```


    `scala.collection.immutable` 包中的集合对所有人来说都保证是不可变的。这样的集合在创建后永远不会改变。这意味着在不同时间点访问同一个集合值，总会得到具有相同元素的集合。


    ### 不可变集合


    图 [6-3](#328789_3_En_6_Chapter.xhtml#Fig3) 展示了 `scala.collection.immutable` 包中的
