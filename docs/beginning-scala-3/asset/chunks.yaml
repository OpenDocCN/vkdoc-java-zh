  trans: '

    ## 聚焦不可变性


    在 Java 中，可变性是默认行为。除非变量被标记为 `final`，否则它们就是可变的。JavaBean 拥有 getter 和 setter 方法。Java
    中的数据结构被实例化、设置值，然后传递给其他方法。请尝试在你的 Scala 代码中改变这种范式。


    首先要做的是默认使用不可变集合类。如果你选择使用可变集合类，请在代码中添加注释说明选择它的原因。有些情况下使用可变集合是合理的。例如，在构建 `List`
    的方法中，使用 `ListBuffer` 效率更高，但不要返回 `ListBuffer`，而应返回 `List`。这就像在 Java 中使用 `StringBuilder`
    但最终返回一个 `String` 一样。因此，默认使用不可变集合，使用可变数据结构时需附上理由。


    默认使用 `val`，只有在有充分理由并通过注释说明的情况下才使用 `var`。在你的方法中，除非会造成显著的性能损失，否则应使用 `val`。在方法中使用
    `val` 通常会引导你进行递归思考。以下代码展示了一个从 `BufferedReader` 中读取所有行的可变实现方法：


    ```

    def read1(in: java.io.BufferedReader): List[String] =

    var ret: List[String] = Nil

    var line = in.readLine

    while(line!=null)

    ret ::= line

    line = in.readLine

    ret.reverse

    ```


    这段代码可读性不错，但使用了几个 `var`。让我们重写这段代码，不使用 `var`，看看如何利用尾递归来实现 `while` 循环：


    ```

    def read2(in: java.io.BufferedReader): List[String] =

    val ret: List[String] = Nil

    doRead(in, ret)

    def doRead(in: java.io.BufferedReader, acc: List[String]):List[String] =

    in.readLine match

    case null => acc

    case s => doRead(in, s :: acc)

    doRead(in, Nil).reverse

    ```


    看，没有 `var` 了。你定义了 `doRead` 方法，它读取一行输入。如果该行为 null，则返回累积的 `List`。如果该行非 null，则使用累积的
    `List` 调用 `doRead`。由于 `doRead` 位于 `read2` 的作用域内，它可以访问 `read2` 的所有变量。`doRead` 在最后一行调用自身，这是一个尾调用。Scala
    编译器会将尾调用优化为 `while` 循环，因此无论读取多少行，都只会创建一个栈帧。`read2` 的最后一行以 `Nil` 作为累加器的初始值调用 `doRead`。


    在代码中使用 `val` 会促使你思考替代性的、不可变的、函数式的代码。这个小例子表明，移除 `var` 会引发重构。重构会带来新的编码模式。新的编码模式会改变你的编码方式。这种编码方式的转变会产生更具变革性的代码，这些代码缺陷更少，更易于维护。


    ## 保持方法简短


    如果你保持方法简短，那么当你或其他人查看代码时，每个方法中的逻辑就会更加清晰。看看你是否能用一行代码实现方法。如果不行，再看看是否能用一条语句实现。让我们看看如何将之前的代码改写成单条语句。


    ```

    def readLines(in:java.io.BufferedReader, acc:List[String]): List[String] =

    in.readLine match

    case null => acc

    case s => readLines(in,s :: acc)

    def read3(in: java.io.BufferedReader): List[String] =

    readLines(in,Nil).reverse

    ```


    当你编写 Scala 代码时，尽量让方法体不包含花括号。如果你无法以这种方式编写代码，你就必须向自己证明为什么你的方法应该超过一条语句。保持方法简短可以让你将单一逻辑封装在一个方法中，并让方法之间相互构建。这也能让你轻松理解方法中的逻辑。


    ## 使用 Option 替代空值检查


    使用 `Option` 的第一个好处显而易见：避免空指针异常。你永远不应该从方法中返回 null：永远、永远、永远不要。如果你调用的 Java 库可能因为输入问题返回
    null 或抛出异常，请将它们转换为 `Option`。你在将字符串解析为整数时已经这样做过。模式很简单：不要使用 null。


    当你编写代码时，请从代码中禁止 null。对于未初始化的实例变量，要么分配一个非 null 的默认值，要么如果存在变量在初始化之前可能被使用的代码路径，则使用
    `Option`，并将默认值设为 `None`。如果对于合法的输入，方法无法返回任何逻辑值，那么返回类型应为 `Option`。永远不应该在 `Option`
    上调用 `get` 方法。相反，应该使用 `map/flatMap`、`for` 推导式或模式匹配来解包 `Option`。


    第二个好处则更为微妙。使用 `Option` 以及映射 `Option` 的转换特性，会带来一种不同的代码风格。这种风格更具转换性，更具函数式特性。反复使用不可变数据结构会让你的思维转向函数式编程。你应该熟悉
    Java 中的空指针异常。例如，考虑以下 Java 方法：


    ```

    public Integer computeArea() { ... }

    ```


    这个 `computeArea` 方法，正如你所料，返回 `Int` 类型的面积，但它可能返回 null，而且仅通过查看方法签名你无法判断它是否会返回 null。正因为如此，Java
    方法的调用者不得不在代码中添加空值检查，如果调用者运气好，该方法实际上从未返回 null，那么这些空值检查只会让调用者的代码变得臃肿。Scala 通过彻底消除
    null 来解决这个问题，并为可选值（即可能存在也可能不存在的值）提供了一种新类型，通过 `Option` 类来实现。以下是你如何在 Scala 中编写一个可能返回值也可能不返回值的
    `computeArea` 方法：


    ```

    def computeArea: Option[Int] = { ... }

    ```


    `computeArea` 方法的返回类型是 `Option[Int]`，仅通过查看这个返回类型，`computeArea` 方法的调用者就会知道它可能不会总是返回一个
    `Int`。为了完整说明，`computeArea` 方法使用 `Some` 和 `None` 类型来决定返回什么，例如，在 `computeArea` 方法的一个实现片段示例中：


    ```

    computeArea match

    case Some(area) => ...

    case None => ...

    ```


    以这种方式使用的 `Option`、`Some` 和 `None` 是 Scala 独特特性的一部分。这就是 Scala 成为一流语言的原因。这也意味着，当一个
    Scala 函数总是返回一个值时，其返回类型不是 `Option` 类型，而是该方法返回的对象的类型。如果 Scala 函数从不返回 null，那么 Scala
    中为什么会有 Null 类型呢？我们在此稍作停顿，让你思考一下答案。很好，回答正确。Scala 支持 Null 类型是为了与 Java 兼容。`None`
    是 `Some` 的对应物，在你使用 Scala 的 `Option` 类来帮助避免空引用时使用。


    正如你在前几章中读到的，`Option` 的概念存在于不同的语言中，只是名称不同。在 Java 中，相同的概念被称为 `Optional`，大多数开发者使用它来减少
    `NullPointerException`。

    '
- fmt: '# Refactor Mercilessly


    In the beginning, you can write your Scala code as you would your Java code. It’s
    a great place to start. Then, start applying the idioms you learned in the previous
    sections in this chapter. Start with the imperative code.


    ```

    def validByAge(in: List[Person]): List[String] =

    var valid: List[Person] = Nil

    for (p <- in)

    if (p.valid) valid = p :: valid

    def localSortFunction(a: Person, b: Person) = a.age < b.age

    val people = valid.sort(localSortFunction _)

    var ret: List[String] = Nil

    for (p <- people)

    ret = ret ::: List(p.first)

    return ret

    ```


    Turn your `vars` into `vals`, as illustrated here:


    ```

    def validByAge(in: List[Person]): List[String] =

    val valid:ListBuffer[Person] = new ListBuffer // displaced mutability

    for(p<- in)

    if (p.valid) valid += p

    def localSortFunction(a: Person, b:Person) = a.age < b.age then 1 else 0

    val people = valid.toList.sort(localSortFunction)

    val ret:ListBuffer[String] = new ListBuffer

    for(p<- people)

    ret += p.first

    ret.toList

    ```


    Turn your mutable data structures into immutable data structures.


    ```

    def validByAge(in: List[Person]): List[String] =

    val valid = for (p<- in if p.valid) yield p

    def localSortFunction(a: Person,b:Person) = a.age < b.age

    val people = valid.sort(localSortFunction _)

    for(p<- people) yield p.first

    ```


    Make your method into a single statement.


    ```

    def validByAge(in: List[Person]): List[String] =

    in.filter(_.valid).sort(_.age < _.age).map(_.first)

    ```


    While you can argue that this is too terse, you can refactor it another way.


    ```

    def filterValid(in: List[Person]) = in.filter(p=> p.valid)

    def sortPeopleByAge(in: List[Person]) = in.sort(_.age < _.age)

    def validByAge(in: List[Person]): List[String] = (filterValid_ andThen sortPeopleByAge_)(in).map(_.name)

    ```


    Regardless of the refactoring choices you make, the business logic of your code
    is a lot more visible. The refactoring also moves you toward thinking about the
    transformations in your code rather than the looping constructs in your code.


    ## Composing Functions and Classes


    In the previous example, you composed `filterValid` and `sortPeopleByAge` into
    a single function. This function is the same as shown here:


    ```

    (in: List[Person]) =>sortPeopleByAge(filterValid(in))

    ```


    However, the composition of the two functions results in code that reads like
    what it does. You started by turning your methods into single statements. This
    makes testing easier and makes the code more readable. Next, you composed a new
    function by chaining together the two functions. Functional composition is a later
    stage Scala-ism, but it results naturally from making methods into single statements.


    In Chapter [7](#328789_3_En_7_Chapter.xhtml), you explored how Scala’s traits
    can be composed into powerful, flexible classes that are more type-safe than Java
    classes. As you evolve your Scala coding skills and begin to refactor classes
    rather than methods, start looking for common methods across your interfaces and
    traits. Move methods from concrete classes into traits. Soon, you’ll likely find
    that many of your classes have little in them other than the logic that is specific
    to that class and the `vals` that are needed to evaluate that logic. Once you
    reach this level in your coding, you will likely find that your traits are polymorphic,
    that your traits represent logic that can be applied to a contained type, and
    then you can feel secure that your mind has completely warped into thinking Scala.


    Once you’re thinking Scala or thinking that you’re thinking Scala, you might want
    to take the next advanced steps toward the goals of best practices.


    ## Summary


    Designing and building complex computer software is a serious business. Our livelihoods,
    and increasingly our whole society, depend on the stability and flexibility of
    our interconnected computer systems. Our cars and our banks and our grocery stores
    and our hospitals and our police departments all work better because they are
    interconnected by computer systems. Those systems run on the software we write.


    If you want more information about this interesting topic, we suggest checking
    the sites of effective Scala^([^(90)](#fn90)) or the Scala Style Guide^([^(91)](#fn91)).


    We hope you have enjoyed the journey and are already thinking about new ways to
    reason about designing software and writing code. We want to end this journey
    by talking a bit about architecture.


    Architecture is very important in overall system performance and team performance.
    Scala has a lot of the tools that allow for much better architectural decisions.
    It’s kind of a *Zen and the Art of Motorcycle Maintenance* thing; you use the
    patterns that your language and its libraries make easiest. Scala makes it easier
    than Java or Ruby^([^(92)](#fn92)) for coders to implement architecturally solid
    designs.'
