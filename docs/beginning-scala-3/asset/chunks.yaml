    def compare(other: TimeSpan) = millis compare other.millis

    ```


    然后你定义一个伴生对象，其中包含一个隐式方法，用于将 `TimeSpan` 转换为 `Long`。如果存在一个与类同名的对象，则该对象被视为伴生对象。如果在伴生对象中定义了任何隐式转换，那么在需要转换该类的实例时，就会用到这些转换。你在伴生对象中定义了一个从
    `TimeSpan` 到 `Long` 的隐式转换。这导致当 `TimeSpan` 被赋值给 `Long` 变量或作为需要 `Long` 类型的参数传递时，`TimeSpan`
    实例会自动转换为 `Long`。


    ```

    //Scala 3 格式

    object TimeSpan:

    given tsToMillis: Conversion[TimeSpan, Long] = in => in.millis

    //Scala 2 格式

    object TimeSpan {

    implicit def tsToMillis(in: TimeSpan): Long = in.millis

    }

    ```


    你可以使用简单的语法定义 `TimeSpan` 实例，例如 3 天。时间段可以通过 `later` 和 `ago` 方法转换为 `Date`。但是，如果能将
    `TimeSpan` 的加法和减法添加到 `Date` 实例中，将会很有帮助。使用隐式转换可以非常简单地实现这一点。首先，你定义一个 `DateMath`
    类，它包含接受 `TimeSpan` 作为参数的 `+` 和 `-` 方法。


    ```

    class DateMath(d: Date):

    def +(ts: TimeSpan) = Date(d.getTime + ts.millis)

    def -(ts: TimeSpan) = Date(d.getTime - ts.millis)

    ```


    接下来你定义隐式转换。


    ```

    //Scala 3 格式

    given dateToDM: Conversion[Date, DateMath] = in => DateMath(in)

    //Scala 2 格式

    implicit def dateToDM(d: Date) = new DateMath(d)

    ```


    写完大约 50 行代码后，让我们看看它是如何工作的。


    ```

    scala> import TimeHelpers._

    import TimeHelpers._

    scala> 1.days

    val res0: TimeHelpers.TimeSpan = TimeSpan(86400000)

    scala> 5.days + 2.hours

    val res1: TimeHelpers.TimeSpan = TimeSpan(439200000)

    scala> (5.days + 2.hours).later

    val res2: java.util.Date = Fri Nov 12 19:19:57 ART 2021

    scala> import java.util.Date

    import java.util.Date

    scala> val lng: Long = 7.days + 2.hours + 4.minutes

    lng: Long = 612240000

    ```


    因此，你为时间段定义了一个不错的 DSL，并且它在必要时会自动转换为 `Long`。你看到了 Scala 的隐式转换如何产生非常简单和简洁的 DSL。选择隐式转换和设计领域特定语言需要时间、思考和斟酌。接下来是对外部
    DSL 的简要介绍。


    ## 外部 DSL


    外部 DSL 构建其语言处理基础设施：解析器、词法分析器和处理逻辑。你需要定义语法（例如巴科斯-诺尔范式^(⁴⁹) (BNF)）。也就是说，你需要定义所有成功解析含义或脚本所适用的规则。内部
    DSL 可以免费从底层宿主语言获得此基础设施，但对于外部 DSL，你需要从头开始构建它们。在 Scala 中，解析器组合子是一个接近 BNF 语法定义的概念，并且在编写外部
    DSL 时可以提供非常简洁优雅的代码。这个解析器组合子模块不是 Scala 标准库的一部分，但它为社区维护^(⁵⁰)。外部 DSL 拥有独立的词法分析、解析、解释、编译和代码生成基础设施。当你为外部
    DSL 编写解析器时，你可以使用诸如 Antlr^(⁵¹) 之类的解析器生成工具。Scala 自带了一个解析器组合子库，因此你不必实现自己的语言基础设施。


    ## 总结


    Scala 的解析器组合子库展示了 Scala 语法的灵活性、隐式转换的实用性以及函数式组合的强大功能。解析器组合子是领域特定语言的一个绝佳示例。其领域是解析文本，其语法几乎与
    BNF 一一对应。这个库还让你对可以使用 Scala 创建的那种领域特定语言有了一些了解。Scala 编译器中没有专门针对解析器组合子库的内容；它仅仅是一个库。在实际层面上，使用单一语言
    Scala 来定义解析器，而不是使用像 ANTLR 这样的工具，意味着你和你的团队使用单一语言来描述你的系统。这意味着你的大脑用 Scala 思考。这意味着你用单一语言编辑代码，并利用该语言的类型安全性。


