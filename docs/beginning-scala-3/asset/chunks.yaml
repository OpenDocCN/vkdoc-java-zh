    # 7. Traits and Enums


    In this chapter, you will learn two of the most useful features of Scala. These
    features exist in other languages that use the JVM, like Java or Kotlin—not with
    the same name but with the same concept behind the scenes.


    One of them is traits. Traits function as interfaces in the Java universe and
    help you construct reusable parts of a program and deal with the tribulations
    of multiple inheritances, sidestepping the disadvantages of single inheritance
    by means of mixing compositions.


    The second concept is enumerations (enums), which help you encapsulate in one
    place all possible values of a specific type. For example, a level of logging
    could have five possible values: INFO, WARN, DEBUG, ERROR, and FATAL. Also, enums
    provide a way to create methods with the idea of interacting with the values.


    One thing to mention: These features are not entirely new in the latest version
    of Scala. Both exist in the previous version with a lot of differences. The most
    relevant case is enums, which is like a new way to do things with the idea of
    simplifying the use for the developers.


    ## Traits


    A *trait* provides code reusability in Scala by encapsulating the method and state,
    and then offering the possibility of mixing them into classes, thus allowing code
    reuse. In this way, a class can be mixed in with a myriad of traits, unlike inheritance
    where each class is allowed to inherit from just one superclass. Moreover, other
    than using the keyword `trait` , a trait definition resembles a class definition,
    as shown here:


    ```

    scala> trait Gliding:

    |     def java () =

    |         println("gliding")

    // defined trait Gliding

    ```


    This trait named `Gliding` does not declare a superclass, so like a class, it
    has the default superclass of `AnyRef`. The `Gliding` trait is a simple example
    but adequate way to show how traits work.


    The following are some of the things you can do with a trait:


    *   Have concrete abstract fields or methods


    *   Create a constructor that receives certain parameters


    *   Combine or extend different traits


    *   Restrict or limit which classes can use it


    You can think of a trait as similar to an interface in Java where you can define
    a certain default behavior. In Java 8 or previous versions, this is not possible
    to do, and one class can extend from multiple interfaces to have multiple inheritances.


    Table [7-1](#328789_3_En_7_Chapter.xhtml#Tab1) shows the same block of code in
    the different languages that use the JVM.


    Table 7-1


    Different Ways to Express the Idea of a Trait


    | *Language* | *Example* |

    | --- | --- |

    | Java | `interface Gliding {    default void gliding() {        System.out.println("gliding");    }}`
    |

    | Kotlin | `internal interface Gliding {   fun gliding() {       println("gliding")   }}`
    |

    | Scala | `trait Gliding:    def gliding () =        println("gliding")` |


    Everything looks fine but how can you use this trait in a class and invoke one
    of the methods? This is how:


    ```

    scala> class ConcreteClass extends Gliding

    // defined class ConcreteClass

    scala> val instance = ConcreteClass()

    val instance: ConcreteClass = ConcreteClass@78e043e4

    scala> instance.gliding()

    gliding

    ```'
