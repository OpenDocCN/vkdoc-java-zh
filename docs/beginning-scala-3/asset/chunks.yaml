  raw: '## Java Interfaces and Scala Traits


    A Java class can’t extend a Scala trait that has implemented methods (see Chapter
    [7](#328789_3_En_7_Chapter.xhtml) for more detail about traits). To understand
    the problem, let’s first look at a regular Java interface.


    ```

    public interface Book {

    public boolean isBestSeller();

    }

    ```


    The Scala equivalent is as follows:


    ```

    trait Book:

    def isBestSeller: Boolean

    ```


    As you can see, `isBestSeller` is an abstract method. In Scala, methods are denoted
    with a `def` keyword. But `isBestSeller` in the Scala code is an abstract method.
    How do you represent the abstract method in Scala? In Scala, if there is no `=`
    assignment, then methods denoted with a `def` keyword or functions denoted with
    a `val` keyword are abstract. For example, let’s look at a Java method that returns
    some value.


    ```

    public String someMethod(int arg1, boolean arg2) {

    return "voila";

    }

    ```


    The Scala equivalent is shown here.


    ```

    def someMethod(arg1: Int, arg2: Boolean): String = "voila"

    ```


    As you can see, `=` denotes the implementation.


    Now let’s look at an abstract Java method.


    ```

    abstract int doTheMath(int i);

    ```


    Here is the Scala equivalent of an abstract Java method `doStuff`:


    ```

    def doTheMath(i: Int): Int

    ```


    Note


    If there’s no definition provided with `=,` then it’s automatically abstract.


    Now let’s go back to the original problem. A Java class can’t extend a Scala trait
    that has implemented methods. So if you are trying to use a Scala trait (that
    has implemented methods in it) from Java, you will run into a problem. To demonstrate
    the problem, first create a trait with a simple implemented method named `add`.


    ```

    trait Computation:

    def add(a: Int, b: Int) = a + b

    ```


    You’ve written a Scala trait with implemented methods and need to be able to use
    an `add` method from a Java application, shown here:


    ```

    public class DoTheMath {

    public static void main(String[] args) {

    DoTheMath d = new DoTheMath();

    // do the math here

    }

    }

    ```


    The type `Computation` cannot be the superclass of Java class `DoTheMath` simply
    because a superclass in Java must be a class; that is, the Java class `DoTheMath`
    cannot use the `extend` keyword to extend `Computation`. Moreover, the Java class
    `DoTheMath` cannot implement the trait `Computation` because in Java you implement
    interfaces, and the trait `Computation` has an implemented behavior, so `Computation`
    is not a like a regular Java interface. To be able to use the implemented method
    `add` of a Scala trait `Computation` from the Java class `DoTheMath`, you must
    wrap the trait `Computation` in a Scala class. This code shows a Scala class that
    wraps the trait `Computation`:


    ```

    class JavaInteroperableComputation implements Computation

    ```


    Now the Java class `DoTheMath` can extend the Scala `JavaInteroperableComputation`
    class and access the `add` method.


    ```

    public class DoTheMath extends JavaInteroperableComputation {

    public static void main(String[] args) {

    DoTheMath d = new DoTheMath();

    d.add(3,1);

    }

    }

    ```


    Note


    Wrap your Scala traits with implemented behavior in the Scala class for its Java
    callers.


    ## Java Static Members and Scala Objects


    Java code often refers to the `static` keyword to implement a Singleton object,
    as shown here:


    ```

    public class Book{

    private static Book book;

    private Book() {}

    public static synchronized Book getInstance() {

    if (book == null) {

    book = new Book();

    }

    return book;

    }

    }

    ```


    There is no such thing as `static` in Scala. In Java, `static` does not belong
    to an object, can’t be inherited, and doesn’t participate in polymorphism, thus
    `static`s aren’t object-oriented. Scala, on the other hand, is purely object-oriented.
    Scala does not support `static`, but instead provides the notion of an object
    in place of the class declaration. If you need to refactor the above Java code
    into Scala, simply use the object declaration instead of a class, as shown here:


    ```

    object Book

    ```


    Scala objects give you an extra advantage in that they can also extend interfaces
    and traits. Scala provides a special syntax that gives you a Singleton for free,
    without all the syntax involved in declaring it (see the Java code above). But
    what if you want to mix static and instance members? In Java, you can do this
    like so:


    ```

    public class Book {

    public String getCategory() {

    return "Non-Fiction";

    }

    public static Book createBook() {

    return new Book();

    }

    }

    ```


    In addition to the notion of an object, Scala provides the notion of a companion
    object, which consists of an object that cohabitates with a class of the same
    name in the same package and file. For more information about companion objects,
    see Chapter [3](#328789_3_En_3_Chapter.xhtml). The companion object enables storing
    of static methods, and from this, you have full access to the classes’ members,
    including private ones. Scala allows you to declare both an object and a class
    of the same name, placing the static members in the object and the instance members
    in the class. The Scala equivalent of the Java code just above is the following:


    ```

    class Book:

    def getCategory() = " Non-Fiction"

    object Book:

    def createBook() = Book()

    ```


    ## Handling Exceptions


    You can define the Scala method shown here without declaring that it throws an
    exception:


    ```

    class SomeClass:

    def aScalaMethod() =

    throw new Exception("Exception")

    ```


    This method can then be called from Java as shown here:


    ```

    public static void main(String[] args) {

    SomeClass s = new SomeClass();

    s.aScalaMethod();

    }

    ```


    However, when the Java developer calls `aScalaMethod`, the uncaught exception
    causes the Java method to fail:


    ```

    [error] (run-main) java.lang.Exception: Exception!

    java.lang.Exception: Exception!

    at SomeClass.aScalaMethod

    ```


    If you don’t mark the `aScalaMethod` method with the `@throws` annotation , a
    Java developer can call it without using a `try/catch` block in their method or
    declaring that their method throws an exception.


    For the Java callers of your Scala methods, add the `@throws` annotation to your
    Scala methods so they will know which methods can throw exceptions and what exceptions
    they throw. For example, this code shows how to add the `@throws` annotation to
    let callers know that the `aScalaMethod` method can throw an exception.


    ```

    class SomeClass:

    @throws(classOf[Exception])

    def aScalaMethod() =

    throw new Exception("Exception")

    ```


    Your annotated Scala method works just like a Java method that throws an exception.
    If you attempt to call `aScalaMethod` from a Java class without wrapping it in
    a `try/catch` block, or declaring that your Java method throws an exception, the
    compiler (or your IDE) will throw an error.


    In your Java code, you write a `try/catch` block, as usual, to handle the exception.


    ```

    SomeClass = new SomeClass();

    try {

    s.aScalaMethod();

    } catch (Exception e) {

    System.err.println("Caught the exception.");

    e.printStackTrace();

    }

    ```'
