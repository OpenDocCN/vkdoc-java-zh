    |     println(nullType.toString)

    | catch

    |     case e: NullPointerException => println("Exception")

    | finally

    |     println("Execute the last part of the block")

    Exception

    Execute the last part of the block

    ```


    `finally` 块的一个常见用途是关闭某些资源，例如文件或与数据库的连接。


    ## 注释


    Scala 中的注释与 Java 或 C++ 等其他语言非常相似。你有两种创建注释的方式：


    *   **多行注释：** 使用 `/*` 开始包含注释的块，使用 `*/` 结束该块。在此块内，你可以使用任意多行文本来解释某些内容。


    *   **单行注释：** 使用 `//` 开始注释。请注意，使用这种类型的注释，你只能在一行内放置描述。


    ```

    /*

    我决定将此值定义为 1，因为我想测试某个方法的部分逻辑。

    */

    val number = 1

    ```


    ```

    val number = 1 // 我将此值定义为 1 以测试逻辑

    ```


    在类/方法/变量的名称已经很清晰的情况下，没有必要添加注释来解释该代码块的含义。相反，当逻辑非常复杂，或者你出于某些特定原因添加了硬编码的类/方法/变量时，请为以后会接触到这段代码的任何开发者添加一个非常详细的注释。


    ## 在不使用 REPL 的情况下运行代码


    当你使用 REPL 时，一切看起来都很好，但在某些情况下，这样做过于复杂。因此，另一种方法是创建一个扩展名为 `.scala` 的文件。你可以使用你最喜欢的
    IDE 来执行此操作。之后，你需要创建一个 `@main` 对象，它将运行你应用程序的所有逻辑。你可以将此概念视为 Java 中的 `main` 方法，大多数开发者将其作为第一步来学习，或者使用像
    Spring Boot 这样的框架来运行应用程序。


    ```

    @main def main() =

    //在这里你可以放置所有代码

    print("Main method")

    ```


    这段代码与 Scala 的早期版本略有不同，在早期版本中，你需要定义一个继承自 `App` 的 `object`。


    ```

    object MyApp extends App {

    println("Main method")

    }

    ```


    如果你想使用控制台运行文件中的代码，你需要先编译该文件，然后运行代码。


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala

    Main method

    ```


    如果你想传递一些参数来改变应用程序的行为，你需要修改你的 `main` 以接收参数，参数之间用逗号分隔。


    ```

    @main def main(message: String, second_message: String) =

    //在这里你可以放置所有代码

    print(message)

    print(second_message)

    ```


    要运行这段代码并传递参数，过程与前面的示例类似，但你需要添加参数的值，这些值之间用一个空格分隔，并且顺序与它们在 `main` 中出现的顺序相同。


    ```

    ~ scalac MyApp.scala

    ~ scala MyApp.scala "hello"

    Hello

    ```

    '
- fmt: '# Keywords


    Each language has a certain number of exclusive keywords to indicate some kind
    of instruction. You cannot use most of them as a name of a variable or class.
    The list in Table [2-8](#328789_3_En_2_Chapter.xhtml#Tab8) gives you an overview
    of some keywords. Most of them appear in this chapter and the following chapters.


    **Table 2-8** Important Keywords in Scala


    | Word | Description |

    | --- | --- |

    | `abstract` | Makes a method or class abstract, which means that you cannot instantiate
    directly; you need to use a concrete class. |

    | `case` | Each of the possible options of one match block. Also used to declare
    a concrete case when you have an abstract class. |

    | `catch` | To catch an exception that appears in the `try` block and do something
    |

    | `class` | Defines a new class that can contain methods and variables |

    | `def` | Starts the declaration of a method |

    | `do` | An alternative way to iterate a collection or range |

    | `else` | Connected with the keyword `if`. When the condition is false, this
    block of code is executed. |

    | `end` | Used to indicate the end of one particular block, such as in one `if/else`
    |

    | `Enum` | Exclusively used to declare an enumeration |

    | `extends` | Indicates that the class or trait has a supertype |

    | `false` | One of the possible values of a Boolean variable |

    | `final` | You can use this word to indicate that one class/method/variable cannot
    be overridden. |

    | `finally` | This block of code is connected with the `try/catch` block and is
    always executed after the execution of the logic of the try/catch operation. |

    | `for` | Declares the beginning of an iteration |

    | `given` | Declares a block of code eligible to be used in another part. It is
    connected with the keyword `using`. |

    | `if` | Starts the declaration of a conditional block |

    | `implicit` | Refers to the old way of declaring and using the keywords `given`
    and `using` |

    | `import` | Used to include in the actual scope of one or more methods or classes
    |

    | `lazy` | Used to defer the evaluation of a variable |

    | `match` | Means a block of code with multiple alternatives depending on one
    value. You can see this as `switch` in other languages like Java or C++. |

    | `new` | Creates a new instance of a class. The use of this word is optional
    in Scala 3 |

    | `null` | Used to indicate that one variable does not have a specific value |

    | `object` | To declare a class that has only one instance. You can think of this
    as a Singleton. |

    | `override` | You can use this keyword to override a method that is not marked
    as final. |

    | `package` | Declares the name of one package which contains some classes/enum/files
    |

    | `private` | Restricts the visibility of the declaration. Only the logic in the
    same class can access it directly. |

    | `protected` | Restricts the visibility of a declaration. Only the logic in the
    same class or subclasses can access it directly. |

    | `return` | To indicate the return of a method |

    | `super` | Refers to a method or part of the logic that exists in the superclass
    |

    | `then` | In the `if` structure, this keyword replaces the curly braces {} and
    is executed only when the condition is true. |

    | `this` | Refers to using a method or variable declared in the same class |

    | `throw` | Throws an exception |

    | `trait` | Indicates the declaration as an abstract type. You can see this keyword
    as an equivalent of *interfaces* in Java. |

    | `true` | One of the possible values of a Boolean variable |

    | `try` | Declares the beginning of a block that can produce an exception during
    the execution |

    | `using` | It’s an alternative for implicit clauses. |

    | `val` | Declares a variable as immutable and just read-only. |

    | `var` | Declares a variable as mutable, so you can read or write in this variable.
    |

    | `while` | This is another way to iterate a collection or range of values. |

    | `with` | Used to include a specific *trait* |

    | `=` | Used to assign the values in one variable |

    | `@` | Marks the beginning of one annotation |


    # Summary


    In this chapter, you learned how to define and use the common structures and variables
    of Scala. These aspects are the keys to understanding the rest of the book because
    most of them appear in different chapters to explain a particular feature. The
    following are some of the most important points from this chapter:


    *   You can create variables as read-only with the keyword `val`. If you want
    to create a variable that needs to modify the content, use `var`.

    *   Strings are several characters that reside in one place. This type offers
    you a great number of methods to manipulate the value in different ways.

    *   Using the classes provided by Java, you can manipulate dates using different
    formats and with different levels of precision.

    *   `Array` and `List` are two ways to create a structure that contains a number
    of elements, all of the same type.

    *   `if/else` expressions are ideal for creating branching in your code depending
    on one or more conditions. If the number of `if/else` expressions becomes complex,
    consider using `match` expressions.

    *   There are different ways to iterate an array or collection, such as `for`
    or `while` loops. In the case of a `while` loop, the condition to validate the
    loop in some moment needs to be false.

    *   `Try/catch` blocks are ideal to mitigate problems associated with any exception
    that can appear in your code.

    *   Comments are a great way to give more detail about a block of complex code.
    There are two types of comments: multiline or single line.

    *   When you have complex blocks of code or an entire application, you need to
    use `@main` to execute the code.


    Footnotes [1](#328789_3_En_2_Chapter.xhtml#Fn1_source)


    # 3. Object-Oriented Modeling


    Many languages offer different ways to model using structures to represent the
    solution to a particular problem in the real world. With Scala, you can use two
    methods of modelling: object-oriented programming (OOP) and functional programming
    (FP). They share some structures with different meanings but the idea is to define
    attributes and behavior. As you read in the previous chapter, languages like Java,
    JavaScript, Python, C++, C#, Ruby, and PHP use OOP as the default modelling option
    or paradigm.'
