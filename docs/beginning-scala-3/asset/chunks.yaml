- fmt: '# Packages and Imports


    Packages are used to contain in one place all the logic related to one module
    or certain types of logic, such as classes with database access. This is ideal
    for preventing possible collisions with names of classes because the package name
    is the differentiator. You can think of these concepts in this way: the name of
    the class is like the first name of a person because it could be someone else
    with the same name but the package declaration is like your surname so the combination
    of these things is different in each class.


    To do this, you need to use the keyword `package` followed by the name of the
    package. As a good practice, don’t use an underscore (`_`) or any special character.


    ```

    package com.behindcodeline.model

    class Book(var name : String, var isbn : String)

    ```


    You cannot use this type of feature in the REPL because it is not possible. The
    only way to do this is to create a class in your IDE or a file and compile it
    in the console. In previous sections, you saw the use of the annotation `@main`.
    This is a good alternative to test this type of feature.


    ```

    @main def main =

    val book = Book("ET", "test")

    println(book.name)

    ```


    Now that you can define packages to import them, you need to use the keyword `import`
    with the entire name of the package, such as `com.behindcodeline.model.Book`.
    This is valid for the classes that you create and for the classes that exist in
    any library of Scala or Java.


    ## Multiple Imports


    When you have more than one class from the same package, you have three ways to
    import them:


    *   Import all classes of the package.


    ```

    import java.util.*

    ```


    This is not recommended because many of the classes may be unnecessary.


    *   Do one import per line.


    ```

    import java.util.LinkedList

    import java.util.Date

    ```


    This approach makes more sense because you only import the classes that you need
    but it looks bad if you have several classes from the same package.


    *   Do one import with multiple classes.


    ```

    import java.util.{LinkedList, Date}

    ```


    This approach is the best way to reduce the number of code lines in your application.
    Many developers know this approach as an *import selector clause*; it exists in
    a library of JavaScript named React.


    ### Exclude Class


    Everything looks great but say you don’t want to use a specific class. Scala is
    different from Java because it provides an easy way to do this.


    ```

    import java.util.{ArrayList => _}

    ```


    With this import, when anyone who instantiates a class of the type `ArrayList`
    will receive an error.


    ```

    scala> import java.util.{ArrayList => _}

    scala> val list = ArrayList()

    1 |val list = ArrayList()

    |           ^^^^^^^^^

    |           Not found: ArrayList

    ```


    ## Objects


    The first time you heard the word “object,” you might have thought it was an instance
    of a class. This is true in languages like Java or C++, but in Scala it has a
    different meaning. You can think of an object as an instance of a class, but it
    also means that you can create a Singleton with static methods that you can access
    without creating an instance. To create a unique instance, you need to use the
    keyword `object` followed by the name and the logic inside, in the same way as
    in the classes.


    A simple example that most developers who use Scala 2 use when they start programming
    is the `main` method, which runs the entire application.


    ```

    object MyApp extends App { //Only one instance of the application run

    println("Main method")

    }

    ```


    ### Defining Singletons


    In the previous section, you saw a simple example, but imagine that you want to
    have something that contains methods with the common logic that you need to use
    across the entire application. In Java, you can create a class with static methods
    and with a private constructor so you can’t instantiate many times, but in Scala,
    it is simpler. Let’s create an object that creates a new file in a directory and
    prints a message.


    ```

    scala> object FileUtil:

    |     def create(directory : String, name : String) : Unit =

    |         println(s"File $name created in the directory $directory")

    // defined object FileUtil

    scala> FileUtil.create("/test/", "test.txt")

    File test.txt created in the directory /test/

    ```


    You can see that after defining the object you can invoke a method directly without
    creating an instance. Another example of the use of objects is to create custom
    methods to parse a string or validate if it is empty.


    ### Companion Objects


    In Java, you can have a class with static methods or attributes like constants
    and use it from outside or inside the class, but in Scala, this is not possible
    in the same way. Scale offers the companion object instead. A companion object
    is when you create an object and a class in the same file with the same name and
    you can refer to the same name without any problem with the compiler.


    To see how this feature works, first create a file named `Book.scala` and enter
    the following code:


    ```

    class Book(val name : String, val isbn : String)

    object Book:

    val PREFFIX = "I-"

    ```


    After that, you can create a new file with the `main` method, or you can use the
    REPL but first you need to compile the file in the console and then import it
    in the REPL using `:load`.


    ```

    scala> :load Book.scala

    // defined class Book

    // defined object Book

    scala> val book = Book("ET", Book.PREFFIX + "Test")

    scala> print(book.isbn)

    I-Test

    ```


    One important thing with the companion object is that both object and class can
    directly access private fields or methods without any restriction because the
    compiler considers them as one object. However, another class or object cannot
    access the private methods or fields.


    ### Static Factory


    If you want to have the creation of one class in one place, the best way to do
    so is to transform the constructor to `private` and create a particular method
    in the object that receives some parameters invoke to the private constructor
    and return the new instance of the class.


    A possible use of this type of feature is to validate the parameters before creating
    an instance and, if something is wrong, return an exception.


    ```

    class Book private (val name : String, val isbn : String)

    object Book:

    val PREFFIX = "I-"

    def apply(name : String, isbn : String) = new Book(name, isbn)

    ```


    To use this new way of instantiating a class, you need to do the following:


    ```

    scala> :load Book.scala

    // defined class Book

    // defined object Book

    scala> val book = Book.apply("name", "isbn")

    val book: Book = Book@4fa5cc73

    ```'
