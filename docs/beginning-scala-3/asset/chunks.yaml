    ## 类


    正如你在上一节所读到的，类是一种蓝图，你可以在其中将特定值存储在字段/属性中，并定义方法的特定行为。使用这种类型结构的唯一限制是，你需要定义一个在 JVM
    内存位置中分配的实例，以便在应用程序的各个部分中引用它。


    要定义一个类，你需要使用关键字 `class` 后跟名称。一个好的实践是使用驼峰命名法，这意味着名称中的每个单词的首字母都需要大写。更多信息，请查看官方文档^(²³)。此外，不要在名称的任何部分使用下划线
    (_)。（这些实践与 Java 相同。）表 3-1 列出了一些不佳的名称选项。


    **表 3-1**


    **不佳的类名示例**


    | 类名 | 错误还是正确？ |

    | --- | --- |

    | `_light` | 错误 |

    | `Light` | 错误 |

    | `AbstractLight` | 正确 |

    | `abstract_light` | 错误 |

    | `Abstractlight` | 错误 |


    现在是时候创建你的第一个类了。在这个例子中，创建一个没有任何内部逻辑的类。


    ```

    scala> class Book //定义一个只有构造函数的空类

    // defined class Book

    ```


    查看创建类时发生的情况的一个好方法是反编译它。为此，创建一个名为 `Book.scala` 的文件，并将类的声明放入其中。之后，使用命令 `scalac Book.scala`
    编译该类，编译器将创建文件 `Book.class` ***，*** 你可以使用命令 `javap -c Book.class`*** 对其进行反编译。***


    ```

    $ javap -c  Book.class

    Compiled from "Book.scala"

    public class Book {

    public Book();

    Code:

    0: aload_0

    1: invokespecial #9          // Method java/lang/Object."":()V

    4: return

    ```


    如你所见，类内部没有构造函数、方法或变量，只有定义。现在你已经创建了第一个类，但你需要实例化它才能使用。有两种方法可以做到这一点，但在 Scala 3 中，第二种是最佳选择。


    | Scala 2 | Scala 3 |

    | --- | --- |

    | `scala> val book = new Book()val book: Book = Book@50a7c72b` | `scala> val book
    = Book()val book: Book = Book@50a7c72b` |


    关于创建类实例的最后一点：如果你没有将新类赋值给任何变量，编译器会分配一个名称。


    ```

    scala> Book()

    val res0: Book = Book@bf2aa32

    ```


    ### 字段


    字段是一种变量类型，允许你存储与某个类实例相关的特定值。有效的类型是任何继承自 `Any` 的类型，因此你可以存储自定义对象的状态或像字符串这样的简单值。


    在 Scala 中声明字段的方法非常简单。你只需要指明变量类型并指定名称，同时添加变量是否可变（`var` 或 `val`）。


    ```

    scala> class Book():

    |   var quantity = 0

    // defined class Book

    ```


    在以这种方式声明变量之前，你需要考虑一些事情。如果你没有明确指示该变量具有受限访问权限，任何人都可以修改该值，你可能会失去控制。当然，很多情况下，变量可以被直接访问是合理的，但要注意还有其他选项。


    延续前面的思路，三个访问控制修饰符为你提供了对字段的不同访问级别，如表 3-2 所示。


    **表 3-2**


    **访问控制修饰符**


    | *修饰符* | *描述* | *示例* |

    | --- | --- | --- |

    | `private` | 使用此修饰符，只有类中的方法可以访问字段，但你可以创建一个自定义方法来返回值。 | `scala> class Book():   &#124;   private
    var quantity = 0// defined class Book` |

    | `protected` | 使用此修饰符，只有类中的方法和继承自该类的类可以访问该值。 | `scala> class Book():   &#124;   protected
    var quantity = 0// defined class Book` |

    | `public` | 任何人都可以访问和修改存储在字段中的值。 | `scala> class Book():   &#124;   public var
    quantity = 0// defined class Book` |

    | `无` | 在这种情况下，等同于 public。 | `scala> class Book():   &#124;   var quantity = 0//
    defined class Book` |


    当你在类内部创建字段时，请使用能定义字段含义的名称，例如 *salary* 或 *quantity*。使用像 *a*、*b* 和 *aux* 这样的名称作为字段名并不是好的实践，因为其他开发者很难理解这些字段的含义，并且会降低代码的可维护性。


    ### 构造函数


    构造函数是一种在你实例化类的同时向类传递参数的方式。与 Java 等其他语言（构造函数出现在类体中）的主要区别在于，Scala 为你提供了在类定义中声明所有参数的优势，并且它们在内部成为构造函数。另一件需要考虑的事情是，如果类没有参数，Scala
    不会创建特定的构造函数；它会使用默认构造函数。


    构造函数组合了几件事，你需要理解它们的工作原理：它接受你定义的参数，在类中创建字段，用相同的名称赋值变量，并且你可以在内部添加一些逻辑。要创建一个构造函数，你需要逐个传递参数，用逗号分隔。


    ```

    scala> class Book(val name : String, val isbn : String)

    // defined class Book

    ```


    与上一节一样，你可以通过将这行代码保存到文件中，编译它，然后执行命令 `javap -c Book.class` * 来反编译代码。*


    ```

    public class Book {

    public Book(java.lang.String, java.lang.String);

    Code:

    0: aload_0

    1: aload_1

    2: putfield      #12         // Field name:Ljava/lang/String;

    5: aload_0

    6: aload_2

    7: putfield      #14         // Field isbn:Ljava/lang/String;

    10: aload_0

    11: invokespecial #17         // Method java/lang/Object."":()V

    14: return

    public java.lang.String name();

    Code:

    0: aload_0

    1: getfield      #12                // Field name:Ljava/lang/String;

    4: areturn

    public java.lang.String isbn();

    Code:

    0: aload_0

    1: getfield      #14                // Field isbn:Ljava/lang/String;

    4: areturn

    }

    ```


    你可以看到，这比前几节的代码要多。这是因为 Scala 使用参数的修饰符来确定是否为每个属性创建 `set/get` 方法。

