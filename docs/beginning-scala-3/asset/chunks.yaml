- fmt: '# 8. Scala Type System


    The two fundamental design considerations of a programming language are static
    versus dynamic typing and strong versus weak typing. Types in a programming language
    are checked at compile time and can be inferred by a compiler. Scala is a strong
    and statically typed language with a unified type system.


    In static typing, a variable is bound to a particular type. In dynamic typing,
    the type is bound to the value instead of the variable. Scala and Java are statically
    typed languages, whereas JavaScript, Python, Groovy, and Ruby are dynamically
    typed languages.


    If a type is static and strongly typed, every variable must have a definite type.
    If a type is dynamic and strongly typed, every value must have a definite type.
    However, in the case of weak typing, a definite type is not defined. Scala, Java,
    and Ruby are principally strongly typed languages. Some languages, such as C and
    Perl, are weakly typed.


    Scala is the best of both worlds, in that it feels like a dynamically typed language,
    because of type inference, and at the same time, it gives you all the benefits
    of static typing in terms of an advanced object model and an advanced type system.


    This chapter explores ideas such as which type parameters should be covariant,
    contravariant, or invariant under subtyping, using `implicit` judiciously, and
    so forth.


    ## Unified Type System


    Scala has a unified type system, enclosed by the type `Any` at the top of the
    hierarchy and the type `Nothing` at the bottom of the hierarchy, as illustrated
    in Figure 8-1. All Scala types inherit from `Any`. The subtypes of `Any` are `AnyVal`
    (value types, such as `Int` and `Boolean`) and `AnyRef` (reference types, as in
    Java). As you can see in Figure 8-1, the primitive types of Java are enclosed
    under `AnyVal` and, unlike Java, you can define your own `AnyVal`. And also unlike
    Java, Scala does not have wrapper types, such as `Integer`, to be distinguished
    from primitive types, such as `int`.


    ![../images/328789_3_En_8_Chapter/328789_3_En_8_Fig1_HTML.png](images/328789_3_En_8_Chapter/328789_3_En_8_Fig1_HTML.png)


    Figure 8-1 Unified object model


    As you can see in Figure 8-1, `Any` is a supertype of both `AnyRef` and `AnyVal`.
    `AnyRef` corresponds to `java.lang.Object` and is the supertype of all objects.
    `AnyVal`, on the other hand, represents the value, such as `int` and other JVM
    primitives. Because of this hierarchy, it becomes possible to define methods that
    take `Any`, thus being compatible with both `scala.Int` instances as well as `java.lang.String`,
    as shown here:


    ```

    scala> import scala.collection.mutable.ListBuffer

    import scala.collection.mutable.ListBuffer

    scala> val list = ListBuffer[Any]()

    list: scala.collection.mutable.ListBuffer[Any] = ListBuffer()

    scala> val x= 2

    x: Int = 2

    scala> list += x

    res12: list.type = ListBuffer(2)

    scala> class Book

    defined class Book

    scala> list += new Book()

    res13: list.type = ListBuffer(2, Book@15e8485)

    ```


    You can limit a method to only be able to work on Value types, as seen here:


    ```

    def test(int: AnyVal) = ()

    test(5)

    test(5.12)

    test(new Object)

    ```


    In this code, `test(5)` takes an `Int` that extends `AnyVal`, and `test(5.12)`
    takes a `Double` that also extends `AnyVal`. `test(new Object)` takes an `Object`
    that extends `AnyRef`. Refer to Figure 8-1. `test(new Object)` fails to compile.


    ```

    scala> def test(int: AnyVal) = ()

    test: (int: AnyVal)Unit

    scala> test(5)

    scala> test(5.12)

    scala> test(new Object)

    :9: error: type mismatch;

    -- Error:

    1 |test(new Object)

    |     ^^^^^^^^^^

    |the result of an implicit conversion must be more specific than AnyVal

    ```


    The idea is that this method will only take Value classes, be it `Int` or your
    own Value type. This implies that Java code is not as type-safe as Scala code.
    You’re probably thinking, “But Java is a statically typed language. Doesn’t it
    give me all the safety that Scala does?” The answer is no. Take a look at the
    following code and spot the problem:


    ```

    public class Bad {

    public static void main(String[] argv) {

    Object[] a = argv;

    a[0] = new Object();

    }

    }

    ```


    This is legal Java code, and here’s what happens when you run the code:


    ```

    > java Bad Hello

    Exception in thread "main" java.lang.ArrayStoreException: java.lang.Object

    at Bad.main(Bad.java:4)

    ```


    Java allows you to assign a `String[]` to `Object[]` because a `String` is a subclass
    of `Object`, so if the array was read-only, the assignment would make sense. However,
    the array can be modified. The modification demonstrated shows one of Java’s “type-unsafety”
    features. We’ll discuss why this happened and the complex topic of invariant,
    covariant, and contravariant types later in this chapter. Let’s start looking
    at how Scala makes the architect’s job easier and also makes the coder’s job easier.


    ## Type Parameterization


    Scala’s parameterized types are similar to generics in Java. If you are familiar
    with Java or C#, you might already have some understanding of parameterized types.
    Scala’s parametrized types provide the same features as Java generics, but with
    extended functionalities.


    Note


    Classes and traits that take type parameters are called generic; the types they
    generate are called parameterized types.


    One straightforward syntactical difference is that Scala uses square brackets
    (`[...]`), while Java uses angle brackets (`<...>`). For example, a list of strings
    would be declared as shown here:


    ```

    val list : List[String] = List("A", "B", "C")

    ```


    Scala allows angle brackets to be used in the method name. So, to avoid ambiguities,
    Scala uses square brackets for parameterized types.


    Types in Scala are used to define classes, abstract classes, traits, objects,
    and functions. Type parameterization lets you make them generic. As an example,
    `Set` can be defined as generic in the following manner: `Set[T]`. However, unlike
    Java which allows raw types, in Scala you are required to specify type parameters.
    That is to say, `Set[T]` is a trait but not a type because it takes a type parameter.


    As a result, you cannot create variables of type `Set`.


    ```

    scala> def test(s: Set) ={}

    -- Error:

    1 |def test(s: Set) ={}

    |            ^^^

    |            Missing type parameter for Set

    ```


    Instead, trait `Set` enables you to specify parameterized types, such as `Set[String]`,
    `Set[Int]`, or `Set[AnyRef]`.


    ```

    scala> def test(s: Set[AnyRef]) = {}

    def test(s: Set[AnyRef]): Unit

    ```


    For example, trait `Set` defines a generic set where the specific sets are `Set[Int]`
    and `Set[String]` and so forth. Thus, `Set` is a trait and `Set[String]` is a
    type. The `Set` is a generic trait.


    Note


    In Scala, `List`, `Set`, and so on can also be referred to as type constructors
    because they are used to create specific types. You can construct a type by specifying
    a type parameter. For example, `List` is the type constructor for `List[String]`
    and `List[String]` is a type. While Java allows raw types, Scala requires that
    you specify type parameters and does not allow you to use just a `List` in the
    place of a type, as it’s expecting a real type — not a type constructor.


    In light of inheritance, type parameters raise an important question regarding
    whether `Set[String]` should be considered a subtype of `Set[AnyRef]`. That is,
    if `S` is a subtype of type `T`, then should `Set[S]` be considered a subtype
    of `Set[T]`? Next, you will learn a generic type concept that defines the inheritance
    relation and answers the aforementioned question.'
