    DSLs are focused on a domain or problem and can be of an external or internal
    type. An external DSL defines a new language with its custom grammar and parser
    combinator. An internal DSL defines a new language as well but within the syntactical
    boundaries of another language. No custom parser is necessary for internal DSLs.
    Instead, they are parsed just like any other code written in the language. Interest
    in DSLs has surged recently, driven in part by the Ruby^([^(43)](#fn43)) and Groovy^([^(44)](#fn44))
    communities because they are very easy to implement in these languages. Ant^([^(45)](#fn45)),
    which uses XML, is an example of an external DSL. Gant^([^(46)](#fn46)), on the
    other hand, uses Groovy to solve the same problem and is an example of an internal
    DSL. Groovy with its metaprogramming^([^(47)](#fn47)) capabilities and flexible
    syntax is better suited to designing and implementing internal DSLs. As an illustration,
    using Groovy’s optional parameters and MOP^([^(48)](#fn48)), you can turn this
    code that only a programmer can love


    ```

    println this.class.getResourceAsStream(''readme.txt'').getText()

    ```


    into


    ```

    write ''readme.txt''.contents()

    ```


    You do not have to be a Groovy programmer to notice that with the second option,
    even a non-programmer has a chance of understanding the intent of the code. As
    you’ll see, Scala provides excellent support for the creation of internal and
    external DSLs.


    A DSL is usually useful to simplify the interaction with a system by application
    to a small, particular domain. A DSL can be targeted to programmers by providing
    a simplified API to communicate with a system, or it may concern business users
    who might understand a domain well enough to create some scripts but are not programmers
    and could have difficulty dealing with a general-purpose programming language.
    You can think of a DSL like a program that you write once and introduce modifications
    over time for people who understand the idea or the problem that the DSL solves.


    A DSL offers two ways for abstractions:


    1.  Limiting the vocabulary that you can use because it is related to the terms
    or words that are connected with the problem.


    2.  Offers the developers a certain level of abstractions about the structures
    or some little details about one particular language.


    There are some cons to using DSLs:


    *   They are complex to create because the techniques to create them are not very
    simple and require some effort at the beginning.


    *   It’s not simple to maintain where the domain changes.


    *   It’s difficult to hide details of errors for the users.


    Regarding the structure of a DSL, a DSL has three principles:


    1.  The artifacts that are connected in some way with the problem domain. A DSL
    needs to provide a level of abstraction of the artifacts but needs to provide
    the mechanism to connect the artifacts with the vocabulary.


    2.  The vocabulary is one of the most important things in a DSL because it establishes
    a way to understand the problem that the DSL is trying to solve.


    3.  A DSL script is the interface for the domain users and does not need to have
    complexity in the implementation.


    An internal DSL is easy to create because it does not need anything in particular.
    You can write it using simple code. In contrast, external DSLs need to create
    grammar and parsers.


    ## Internal DSLs


    Internal DSLs are most often embedded in a host language with the addition of
    syntactic sugar through tricks and special constructs of the language. Many of
    these languages support a meta-object protocol that you can use to implement dynamic
    behaviors onto your DSL. Most of these languages are dynamically typed, such as
    Ruby and Groovy. Groovy was used as a host language for the DSL in the example
    at the beginning of the chapter. Statically typed languages, such as Scala, offer
    abstraction capabilities to model your DSL.


    Some of the features of Scala that make it a host language for an internal DSL
    are


    *   Implicit conversions


    *   Scala’s advanced type system


    *   Currying


    *   Infix and postfix operator notations


    *   Syntactic sugar


    *   Dynamic method invocation


    *   Flexible rules for names


    For example, you can omit the parentheses and dot for any method that takes a
    single parameter, as shown:


    ```

    map.get("key") is equivalent to map get "key"

    ```


    In this section, you will learn how to build an internal DSL using Scala as a
    host language. Implicit conversion (see Chapter [8](#328789_3_En_8_Chapter.xhtml))
    gets you halfway to adding methods to a final class. The second half of the journey
    is that the Scala compiler looks at a possible implicit conversion from the type
    you have to a type with the method that you’re invoking. The Scala compiler inserts
    code to call the implicit conversion and then calls the method on the resulting
    instance. The ability to add new methods to existing classes has a lot of value
    for making code more readable and expressive. More importantly, implicit conversions
    make it possible to define DSLs in Scala. As a library producer, you can create
    syntactically pleasing ways to express concepts in a type-safe way. Wouldn’t it
    be nice to express a period as 3 days or 15 seconds? That would make code a lot
    more readable than `(3L * 24L * 3600L * 1000L)`. Wouldn’t it be great to set a
    timeout or a trigger within 2 hours? Let’s define a library using implicit conversions
    and then break it down.


    ```

    import java.util.Date

    import scala.language.implicitConversions

    object TimeHelpers:

    case class TimeSpanBuilder(val len: Long):

    def seconds = TimeSpan(TimeHelpers.seconds(len))

    def second = seconds

    def minutes = TimeSpan(TimeHelpers.minutes(len))

    def minute = minutes

    def hours = TimeSpan(TimeHelpers.hours(len))

    def hour = hours

    def days = TimeSpan(TimeHelpers.days(len))

    def day = days

    def weeks = TimeSpan(TimeHelpers.weeks(len))

    def week = weeks

    def seconds(in: Long): Long = in * 1000L

    def minutes(in: Long): Long = seconds(in) * 60L

    def hours(in: Long): Long = minutes(in) * 60L

    def days(in: Long): Long = hours(in) * 24L

    def weeks(in: Long): Long = days(in) * 7L

    given longToTimeSpanBuilder: Conversion[Long,TimeSpanBuilder] = in => TimeSpanBuilder(in)

    given intToTimeSpanBuilder: Conversion[Int,TimeSpanBuilder] = in => TimeSpanBuilder(in)

    def millis = System.currentTimeMillis

    case class TimeSpan(millis: Long) extends Ordered[TimeSpan]:

    def later = new Date(millis + TimeHelpers.millis)

    def ago = new Date(TimeHelpers.millis - millis)

    def +(in: TimeSpan) = TimeSpan(this.millis + in.millis)

    def -(in: TimeSpan) = TimeSpan(this.millis - in.millis)

    def compare(other: TimeSpan) = millis compare other.millis

    object TimeSpan:

    given tsToMillis: Conversion[TimeSpan, Long] = in => in.millis

    class DateMath(d: Date):

    def +(ts: TimeSpan) = Date(d.getTime + ts.millis)

    def -(ts: TimeSpan) = Date(d.getTime - ts.millis)

    given dateToDM: Conversion[Date, DateMath] = in => DateMath(in)

    ```


    You import `java.util.Date` because you’re going to make use of it.


    ```

    import java.util.Date

    ```


    You then define a class that takes a `Long` as a parameter and has a series of
    methods that convert the `Long` into a `TimeSpanBuilder` represented by the length.'
