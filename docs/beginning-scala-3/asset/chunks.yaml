- fmt: '### Sets


    A set is a structure that contains unordered elements, like a `List`. The main
    difference is that this structure only contains values, no duplicates.


    ```

    scala> val countries: Set[String] = Set()

    val countries: Set[String] = Set()

    ```


    There are some ways to add information to a set:


    * In the constructor, separated by commas.

    * Using `+` to add a new value in an existing set.


    ```

    scala> val countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    val countries: Set[String]

    ```


    ```

    scala> countries + ("Russia")

    val res10: Set[String] = HashSet(Spain, Russia, Italy, France, Germany)

    ```


    With this approach, the same as with `Map`, each time you add an element using
    `+`, you create a new instance of a set with all the values. A possible approach
    to modify the actual values of the set is to create the variables as mutable and
    use `+=` to add a new element to the existing set.


    ```

    scala> var countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    var countries: Set[String] = Set(Italy, Spain, France, Germany)

    scala> countries += ("Russia")

    scala> print(countries)

    HashSet(Spain, Russia, Italy, France, Germany)

    ```


    When you change the values that a set contains, Scala changes the type of structure
    to a concrete class like `HashSet`.


    To remove an existing value in the set, you can use `-` and the value to remove
    it. If the value does not exist, nothing happens.


    ```

    scala> var countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    scala> countries -= ("Italy")

    scala> print(countries)

    HashSet(Spain, France, Germany)

    ```


    ### Tuples


    Scala provides a structure named tuple to save information that has different
    types. You can think a tuple as a custom object but without defining all the attributes.


    For example, let’s create a tuple that contains certain information about a movie.


    ```

    scala> val moviesReproductions = Tuple2("ET", 2)

    val moviesReproductions: (String, Int) = (ET,2)

    ```


    To access the value of one position, you only need to indicate the position.


    ```

    scala> moviesReproductions._1

    val res19: String = ET

    ```


    If you put the values in the wrong order, you can change them using the method
    `swap`.


    ```

    scala> moviesReproductions.swap

    val res20: (Int, String) = (2,ET)

    ```


    The tuple can support multiple elements, not just two. If you type `tuple` and
    press the Tab button, many options appear.


    ```

    scala> Tuple

    Tuple     Tuple10   Tuple12   Tuple14   Tuple16   Tuple18   Tuple2    Tuple21   Tuple3    Tuple5    Tuple7    Tuple9

    Tuple1    Tuple11   Tuple13   Tuple15   Tuple17   Tuple19   Tuple20   Tuple22   Tuple4    Tuple6    Tuple8

    ```


    ### Options


    As you read in the section "Functional Error Handling," `Option`s help developers
    reduce the condition that checks if something is null or not. This is a great
    way to prevent null pointer exceptions that appear to check if a variable is null
    or not.


    This structure, which appears in Scala 2.13.x, has several things in common with
    the class `Optional`, which appears in Java 8.


    This structure is used in operations like `map`, `flatMap`, and `filter`, which
    you will see in detail in the next section. There are some structures like `Map`s
    that return an `Option` in some methods like `get`.


    ```

    scala> val movies = Map("ET" -> "Science fiction")

    val movies: Map[String, String] = Map(ET -> Science fiction)

    ```


    The following is the behavior when you try to obtain the value of something that
    exists and does not exist in a `Map`:


    ```

    scala> movies.get("ET")

    val res1: Option[String] = Some(Science fiction)

    scala> movies.get("ET II")

    val res2: Option[String] = None

    ```


    #### Instantiating


    To instantiate an `Option` type there are some different alternatives:


    * Using `Option` and passing the value. With this approach, the compiler checks
    if the value is null or not and creates the correct class.

    * Define the result using `Some` or `None`. With this approach, you eliminate
    one step because the compiler assigns to the variable the class that you indicate.


    ```

    scala> val instantiateOption : Option[Int] =  Option(1)

    val instantiateOption: Option[Int] = Some(1)

    ```


    ```

    scala> val instantiateOption : Option[Int] =  None

    val instantiateOption: Option[Int] = None

    scala> val instantiateOption : Option[Int] =  Some(1)

    val instantiateOption: Option[Int] = Some(1)

    ```


    #### Chained Methods


    Say you have a method that returns an `Option` with `None` but you need your logic
    to always have a value or do something. An `Option` provides a method named `orElse`,
    which is executed only when it has a `None` value.


    ```

    scala> def returnNoneFunction() : Option[String] = None

    def returnNoneFunction(): Option[String]

    scala> def returnSomeFunction() : Option[String] = Some("Your logic works")

    def returnSomeFunction(): Option[String]

    scala> val obtainInformation = returnNoneFunction() orElse returnSomeFunction()

    val obtainInformation: Option[String] = Some(Your logic works)

    ```


    ## Functional Operations


    Scala, like many other languages, lets you use a set of operations with the collections.


    ### Traversing


    Traversing is the most common operation in the collection of elements because
    you can iterate all elements of the collection to do a specific operation.


    ```

    scala> val countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    scala> countries.foreach(println)

    Italy

    Spain

    France

    Germany

    ```


    ### Mapping


    The `Map` structure is very useful when you need to iterate each element and create
    an output, which can be the same type or not.


    Let’s imagine that you need to iterate a set of countries and calculate the length
    of each of them.


    ```

    scala> val countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    scala> val nameSize = countries.map(country => (country, country.length))

    val nameSize: Set[(String, Int)] = Set((Italy,5), (Spain,5), (France,6), (Germany,7))

    ```


    Another possibility is to concatenate to the actual value a suffix.


    ```

    scala> println(countries.map(_ + " - Europe"))

    Set(Italy - Europe, Spain - Europe, France - Europe, Germany - Europe)

    ```


    ### Filtering


    Filtering is one of the most important operations because it lets you iterate,
    filter the elements, and return a new structure only with the elements that return
    `true`.


    ```

    scala> val countries: Set[String] = Set("Italy", "Spain", "France", "Germany")

    scala> countries.filter(country=>country.startsWith("I"))

    val res21: Set[String] = Set(Italy)

    ```


    You can combine all operations to reduce the complexity of your code, such as
    filtering the countries that start with `I` and printing the result.


    ```

    scala> countries.filter(country=>country.startsWith("I")).foreach(println)

    Italy

    ```


    This section is just an overview of all the operations you can do. You will see
    more details in the following chapters.


    ## Summary


    You saw Scala functions in action in Chapter [2](#328789_3_En_2_Chapter.xhtml)
    when you declared, defined, and called functions. As a continuation to the brief
    introduction in Chapter [2](#328789_3_En_2_Chapter.xhtml), this chapter provided
    a detailed treatment of functional programming in Scala, introducing several functional
    constructs. In the next chapter, you will learn pattern matching with Scala.


    Footnotes [1](#328789_3_En_4_Chapter.xhtml#Fn1_source)'
