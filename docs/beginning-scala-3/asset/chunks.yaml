- fmt: '# 6. Scala Collections


    The collections class in Scala is a high-performance and type-parameterized framework
    with support for mutable and immutable type hierarchies. These distinct and independent
    mutable and immutable type hierarchies make switching between mutable and immutable
    implementations much simpler. Scala’s object-oriented collections also support
    functional higher-order operations such as `map`, `filter`, and `reduce`, which
    let you use expression-oriented programming in collections. You can access and
    use the entire Java Collections library from your Scala code because Scala is
    a JVM language, but this is not recommended because higher-order operations are
    not available with the Java Collections library. Scala has a rich collection library.
    This chapter gives you a tour of the most used collection types and operations,
    showing just the types you will use most frequently. The goal of this chapter
    is to guide you through the myriad options to find the solutions you need.


    One thing to take into consideration is that Scala 3 has not introduced a lot
    of changes in this topic since the latest version of Scala 2, which is 2.13. However,
    some of the features that are deprecated in version 2.13 are removed in version
    3.x.x.


    **Note:** If you have an application that uses a version previous to Scala 2.13
    and you want to migrate to Scala 3, the most recommended approach is to migrate
    first to version 2.13 or up and solve all the possible problems or conflicts and
    later migrate to Scala 3.x.x.^([(32)](#fn32))


    ## Scala Collection Hierarchy


    Most `collection` classes needed by client code exist in three different packages,
    which appear in Table 6-1. In this section, you will explore the three main packages
    of the collection framework and see how to use the general and most prevalent
    features.


    **Table 6-1.** Packages That Contain All Things Related to the Scala Collection


    | Package | Description |

    | --- | --- |

    | `scala.collection` | This package defines all the traits or objects that will
    be extended for the rest of the packages. |

    | `scala.collection.immutable` | This package defines most of the collections
    that are immutable so you can change the values inside. |

    | `scala.collection.mutable` | This package contains all the collections that
    can modify the values that have one instance of an object inside. |


    There are other packages that cover specific situations. Table 6-2 shows some
    of them.


    **Table 6-2.** Packages for Specific Situations


    | Package | Description |

    | --- | --- |

    | `scala.collection.concurrent` | This package contains only two things: a `Map`
    trait and a `TrieMap`, which has lock access to the operations. |

    | `scala.collection.convert` | This package defines the types to wrap Scala to
    Java collections and vice versa. |

    | `scala.collection.generic` | This package defines things that are reusable in
    the entire collection package. |

    | `scala.collection.parallel` | This package contains versions of the collection
    that support parallelism. |


    ### The `scala.collection` Package


    This package is composed of all high-level abstract classes or traits, which generally
    have mutable as well as immutable implementations. Figure 6-1 shows the collections
    in package `scala.collection`.


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig1_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig1_HTML.png)


    **Figure 6-1.** `scala.collection` package


    The types in the `scala.collection` package shown in Figure 6-1 are implemented
    in two different ways in the Scala libraries based on whether the implementations
    are immutable or mutable. To keep these different implementations separate, there
    are packages called `scala.collection.immutable` and `scala.collection.mutable`.


    **Note:** All types in the `scala.collections` package are implemented in different
    ways in the Scala libraries based on whether the implementations are immutable
    or mutable. To keep these different implementations separate, there are packages
    called `scala.collection.immutable` and `scala.collection.mutable`.


    #### Sequences


    Sequences store a number of different values in a specific order. Because the
    elements are ordered, you can ask for the first element, second element, and so
    on.


    As shown in Figure 6-1, sequences branch off into two main categories: indexed
    sequences and linear sequences. By default, `Seq` creates a `List`, as shown here:


    ```

    scala> val x = Seq(1,2,3)

    val x: Seq[Int] = List(1, 2, 3)

    ```


    By default, `IndexedSeq` creates a `Vector`, as shown here:


    ```

    scala> val x = IndexedSeq(1,2,3)

    val x: IndexedSeq[Int] = Vector(1, 2, 3)

    ```


    This type of collection contains the default methods listed in Table 6-3.


    **Table 6-3.** Common Methods of Sequences


    | Method | Description | Example |

    | --- | --- | --- |

    | `head` | Returns the first element of the collection | `scala> x.head val res48:
    Int = 1` |

    | `tail` | Returns an iterable that contains all the elements without the first
    element | `scala> x.tail val res50: Seq[Int] = List(2, 3)` |

    | `isEmpty` | Returns a Boolean expression where the value is true when the `Set`
    is empty | `scala> x.isEmpty val res47: Boolean = false` |

    | `contains` | Returns a Boolean expression where the value is true when the element
    exists in the collection | `scala> x.contains(2) val res53: Boolean = true` |

    | `length` | Returns an `Int` with the number of elements that contain the collection
    | `scala> x.length val res52: Int = 3` |

    | `reverse` | Return a new collection with the inverse order of the elements |
    `scala> x.reverse val res51: Seq[Int] = List(3, 2, 1)` |


    #### Sets


    A Scala `Set` is a collection of unique elements. The common `Set` classes are
    shown in Figure 6-1. By default, `Set` creates an immutable `Set`, as shown here:


    ```

    scala> val x = Set(1,2,3)

    val x: Set[Int] = Set(1, 2, 3)

    ```


    **Note:** While the `collection.immutable` package is automatically added to the
    current namespace in Scala, the `collection.mutable` package is not.


    This type of collection contains the default methods shown in Table 6-4.


    **Table 6-4.** Common Methods in a Set


    | Method | Description | Example |

    | --- | --- | --- |

    | `head` | Returns the first element of the collection | `scala> x.head val res48:
    Int = 1` |

    | `tail` | Returns an iterable that contains all the elements without the first
    element | `scala> x.tail val res50: Set[Int] = Set(2, 3)` |

    | `isEmpty` | Returns a Boolean expression where the value is true when the `Set`
    is empty | `scala> x.isEmpty val res47: Boolean = false` |'
