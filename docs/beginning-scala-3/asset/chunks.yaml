    # 12. Creating Web Applications


    During this book, you have read about all the features that Scala offers for doing
    different things using structures, classes, and other elements, but as of yet
    you don’t know how to combine these things in one place. As you can imagine, developers
    don’t run different blocks of code using the REPL or the IDE. You need to combine
    them into one or more applications that do something like expose a set of endpoints
    in a REST application or a set of web pages of an e-commerce site.


    In languages like Java, most developers use frameworks^([^(66)](#fn66)) like Spring
    Boot, JSF, and Vaadin, which offer more or less the same set of features to create
    an application. Scala offers a different set of frameworks to create applications.
    The only exception is Vaadin, which has a particular version for Java and another
    one for Scala. In this particular case, the best approach is not to try to use
    the frameworks that exist on Java because not use all the potential of Scala related
    to the performance and the compilation time.


    In this chapter, you will learn more about the previous versions of architectures
    for creating applications and the new model, which encourages the creation of
    multiple applications, each with one specific proposal.


    ## Architecture Types


    A lot of things have changed since the second version of this book was written.
    At that time, most applications were big boxes that contained a lot of functionalities
    using the same block of libraries and sharing the block of code. Nowadays most
    of those applications are known as monoliths (Figure 12-1), which, for different
    motives related to the architecture and the velocity of introducing changes, are
    now discouraged.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig1_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig1_HTML.png)


    Figure 12-1: One big application that contains all the logic


    Let’s imagine a travel platform that offers different options of flights where
    you can obtain information from different providers and add some percentage of
    markup, with these functionalities all in the same place. Figure 12-2 presents
    some of the benefits and drawbacks of this approach.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig2_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig2_HTML.png)


    Figure 12-2: Benefits and drawbacks of using monoliths


    This type of application contained everything including the web pages and all
    the logic of one system. This architecture is not connected exclusively with Scala;
    this situation happened in many other languages like Java with the use of JSF/Vaadin/ZK.


    Nowadays most developers know about microservices and the benefits of using them,
    but in 2014 when Martin Fowler^([^(67)](#fn67)) wrote articles about this topic,
    some people looked at it as an utopian idea that had a lot of cons compared with
    the monolithic solution. This view changed some years ago for different reasons.
    One of them is connected directly with the emergence of containers, because they
    reduce the problems and complexity of deploying an application in different environments
    using different languages. Docker is one of the most known and extended implementations
    of containers.


    In Figure 12-3, you can see the previous example after the migration to different
    microservices.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig3_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig3_HTML.png)


    Figure 12-3: A monolithic application split into microservices


    It’s not in the scope of this book to explain everything about microservices,
    but Figure 12-4 shows a summary of the benefits and drawbacks.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig4_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig4_HTML.png)


    Figure 12-4: Benefits and drawbacks of using microservices


    Now let’s see some concrete examples of frameworks for creating these applications
    using Scala. Table 12-1 shows most of the common frameworks. There are many more
    frameworks, but some of them are not updated or do not cover the latest version
    of Scala 3.


    Table 12-1: Scala Frameworks and Libraries'
