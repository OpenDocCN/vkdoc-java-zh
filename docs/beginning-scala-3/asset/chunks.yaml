    第一行测试是否为字符串。如果是字符串，参数会被转换为字符串并赋值给变量 `s`，然后返回 `=>` 右侧的表达式。请注意，如果参数为 null，它将不会匹配任何与类型比较的模式。在下一行，参数被测试是否为整数。如果是整数，参数会被转换为整数并赋值给
    `i`，然后测试守卫条件。如果该整数是自然数（大于零），则返回“Natural Int”。通过这种方式，Scala 的模式匹配取代了 Java 的测试/转换范式。现在，为了充分理解
    Scala 中模式匹配的强大之处，让我们看看前面代码块的 Java 等价实现：


    ```

    public String test2(Object in) {

    if (in == null) {

    return "null";

    }

    if (in instanceof String) {

    String s = (String) in;

    return "String, length " + s.length();

    }

    if (in instanceof Integer) {

    int i = ((Integer) in).intValue();

    if (i > 0) {

    return "Natural Int";

    }

    return "Another Int";

    }

    return in.getClass().getName();

    }

    ```


    在前面的 Java 等价代码中，类型测试和转换操作是分离的。当复制粘贴测试/转换代码块时，这常常会导致错误。编译器不会检查类型测试是否与转换匹配，在复制粘贴的
    Java 代码中，测试和转换不匹配的情况并不少见。而 Scala 中的相同代码更简短，并且没有显式转换。模式匹配是避免显式转换的强大方式。


    ### 列表中的模式匹配


    Scala 的模式匹配也可以应用于列表。Scala 的 `List` 集合实现为链表，其中列表的头部称为 cons 单元。


    注意


    cons 单元的命名源于 Lisp，源自构建列表的操作。通过将一个 cons 单元链接到列表的头部来构建列表。


    它包含一个指向其内容的引用，以及另一个指向列表尾部的引用，尾部可能是另一个 cons 单元或 `Nil` 对象。列表是不可变的，因此同一个尾部可以被多个不同的头部共享。在
    Scala 中，cons 单元由 `::` 样例类表示。也许你刚刚已经恍然大悟：“啊哈！”


    在 Scala 中创建列表非常简单：


    ```

    1 :: Nil

    ```


    `::` 既是方法的名称，也是样例类的名称。通过保持创建方法 `::` 和样例类名称相同，你可以以一种语法上令人愉悦的方式构建列表并进行模式匹配。正如你刚刚所见，样例类可以在模式匹配中用于比较或提取值。这也适用于列表，并带来一些非常优雅的语法。


    你可以这样构建一个列表：


    ```

    scala> val x = 1

    x: Int = 1

    scala> val rest = List(2,3,4)

    rest: List[Int] = List(2, 3, 4)

    scala> val list = x :: rest

    val list: List[Int] = List(1, 2, 3, 4)

    scala> def printNumbers(list : List[Int]) : Unit =

    list match

    case head :: tail => println(head); printNumbers(head)

    case Nil => println("")

    def printNumbers(list: List[Int]): Unit

    scala> printNumbers(list)


    ```


    然后你可以在模式匹配中提取列表的 `head (x)` 和 `tail (rest)`。


    ### 模式匹配与列表


    模式匹配和列表是相辅相成的。你可以从使用模式匹配对 `List[Int]` 中的所有奇数整数求和开始。


    ```

    def sumOdd(in: List[Int]): Int =

    in match

    case Nil => 0

    case x :: rest if x % 2 == 1 => x + sumOdd(rest)

    case _ :: rest => sumOdd(rest)

    ```


    如果列表为空（`Nil`），则返回 0。下一个 case 从列表中提取第一个元素，并测试它是否为奇数。如果是，则将其与列表中剩余奇数的和相加。默认 case
    是忽略列表的第一个元素（使用 `_` 通配符匹配），并返回列表中剩余奇数的和。


    提取列表的头部很有用，但在对列表进行模式匹配时，你可以匹配列表中的任意数量的元素。在下面的示例中，你将任意数量的连续相同项替换为该单项的一个实例：


    ```

    def noPairsT: List[T] =

    in match

    case Nil => Nil

    case a :: b :: rest if a == b => noPairs(a :: rest)

    // 列表中的前两个元素相同，因此我们将

    // 调用 noPairs，传入一个排除了重复元素的列表

    case a :: rest => a :: noPairs(rest)

    // 返回一个由第一个元素和 noPairs

    // 应用于列表剩余部分的结果组成的列表

    ```


    让我们运行代码，看看它是否按预期工作：


    ```

    scala> noPairs(List(1,2,3,3,3,4,1,1))

    res6: List[Int] = List(1, 2, 3, 4, 1)

    ```


    模式匹配既可以匹配常量，也可以提取信息。假设你有一个 `List[String]`，并且想要实现一条规则：丢弃“ignore”字符串前面的元素。在这种情况下，你同时使用模式匹配进行测试和提取：


    ```

    def ignore(in: List[String]): List[String] =

    in match

    case Nil => Nil

    case _ :: "ignore" :: rest => ignore(rest)

    // 如果列表中的第二个元素是 "ignore"，则返回

    // 对列表剩余部分应用 ignore 方法的结果

    case x :: rest => x :: ignore(rest)

    // 返回一个由列表的第一个元素加上

    // 对列表剩余部分应用 ignore 方法的结果组成的列表

    ```


    你已经了解了如何使用模式匹配和列表进行提取和相等性测试。你还可以使用类测试/转换机制来查找 `List[Any]` 中的所有字符串。


    ```

    def getStrings(in: List[Any]): List[String] =

    in match

    case Nil => Nil

    case (s: String) :: rest => s :: getStrings(rest)

    case _ :: rest => getStrings(rest)

    ```


    然而，将 `List[Any]` 过滤为特定类型列表的范式方法是使用模式作为函数。你将在“作为函数的模式匹配”一节中看到这一点。


    在本节中，你探索了如何进行模式匹配。你了解了列表的提取和模式匹配。列表在 Scala 中可能看起来是一种特殊的构造，但实际上 Scala 中的列表并没有什么特殊之处。


    ## 编译器优化


    从 Scala 2.x.x 开始，有一种方法可以使用注解 `@switch` 来优化模式匹配表达式。当存在该注解时，编译器会检查表达式是否有效，以便引入一些优化。在幕后，这个注解告诉编译器不要转换简单的条件表达式（`if/else`）。相反，编译器会尝试生成一个分支表，这比其他表达式更快。


    ```

    scala> import scala.annotation.switch //你需要导入这个注解

    scala> def printNum(int : Int) =

    (int: @switch) match //你指示 Scala 使用优化

    case 0 => println("Zero")

    case 1 => println("One")

    case _ => if int > 0 then println("More than one") else println("Less than zero")

    def printNum(int: Int): Unit

    scala> printNum(3)

    More than one

    ```


    使用这个新注解一切正常，但在幕后，这段代码会根据 case 的类型被转换为两种不同的结构。这些结构被称为 `tableswitch` 和 `lookupswitch`。^(²⁶)

    '
- fmt: '### Tableswitch


    Most of the time the compiler uses `tableswitch` when the values are contiguous
    or there is a little gap between the different values. This approach has an O(1)
    so you can directly access the block of code connected with one specific key;
    this happens because the value is used as an index.


    ```

    import scala.annotation.switch

    def print(int : Int) =

    (int: @switch) match

    case 0 => println("Zero")

    case 1 => println("One")

    case 2 => println("Two")

    case 3 => println("Three")

    case 4 => println("Four")

    case _ => println("More than four")

    ```


    ### Lookupswitch


    When the values are not contiguous and there’s a big gap between the different
    values of the structure, `lookupswitch` is used. The compiler sorts all the keys,
    and when someone tries to obtain the logic of one case, the compiler does a binary
    search. For that reason, the complexity of the algorithm is O(log n).


    ```

    import scala.annotation.switch

    def print(letter : Char) =

    (letter: @switch) match

    case ''A'' => println("Animal")

    case ''B'' => println("Bank")

    case ''D'' => println("Dance")

    case ''E'' => println("Elephant")

    case _ => println("Is not a letter")

    ```


    ### Considerations


    You need to consider some things when you include this annotation in your code:


    * The pattern matching needs to have more than two cases. If you don’t have more
    than two cases, the code compiles but the performance benefit is not included.

    * The value of the different cases needs to be literals, not reference values,
    because it is the only way that the compiler knows which structure it needs to
    use (`tableswitch` or `lookupswitch`).

    * The different cases don’t need to contain any conditions like the ones shown
    above.


    ## Pattern Matching with the Matchable Trait


    Scala 3 introduces the trait `Matchable`. Remember that a trait is like an interface
    in another language and it controls the ability to do pattern matching. This new
    trait does not have members in version 3.0.x of Scala, but the idea of the developers
    that are in charge of introducing new features on Scala is to add this particular
    feature which is more or less similar to that the last version of Java.


    The classes `AnyVal` and `AnyRef` extend from two different things now, `Any`
    and `Matchable`.


    ```

    abstract class Any:

    def isInstanceOf

    def getClass

    //and more methods.

    trait Matchable extends Any

    class AnyVal extends Any, Matchable

    class AnyRef extends Any, Matchable

    ```


    Now imagine that you need to create a method that receives a sequence of elements
    and, depending on the type of element, you will do something in particular. The
    way to do this is to indicate that your method will receive something (`T` does
    not indicate a particular type) which is `Matchable` (use `<:` to indicate that
    the type extends from `Matchable`).


    ```

    scala> val seq = Seq("one", 2, 3.5)

    val seq: Seq[Matchable] = List(one, 2, 3.5)

    scala> def check [T  println(s"Int $i")

    case s: String => println(s"String $s")

    case f: Float => println(s"Float $f")

    case other => println(s"Other $other")

    }

    def check[T  check(seq)

    String one

    Int 2

    Other 3.5

    ```


    ## Pattern Matching and Case Classes


    Case classes are classes that get `toString`, `hashCode`, and `equals` methods
    automatically. It turns out that they also get properties and extractors, which
    you will see in Chapter 8. Case classes also have properties and can be constructed
    without using the `new` keyword.


    Let’s define a `case` class.


    ```

    case class Person(name: String, age: Int, valid: Boolean)

    ```


    Let’s create an instance of `Person`.


    ```

    scala> val p = Person("David", 45, true)

    p: Person = Person(David,45,true)

    ```


    You may use `new` to create a `Person` as well.


    ```

    scala> val m = new Person("Martin", 44, true)

    m: Person = Person(Martin,44,true)

    ```


    Each of the `Person` instances has properties that correspond to the constructor
    parameters.


    ```

    scala> p.name

    res0: String = David

    scala> p.age

    res1: Int = 45

    scala> p.valid

    res2: Boolean = true

    ```


    By default, the properties are read-only, and the `case` class is immutable.


    ```

    scala> p.name = "Fred"

    :7: error: reassignment to val

    p.name = "Fred"

    ```


    You can also make properties mutable.


    ```

    scala> case class MPerson(var name: String, var age: Int)

    defined class MPerson

    scala> val mp = MPerson("Jorge", 24)

    mp: MPerson = MPerson(Jorge,24)

    scala> mp.age = 25

    scala> mp

    res3: MPerson = MPerson(Jorge,25)

    ```


    So far, this is just some syntactic sugar. How, you ask, does it work with pattern
    matching?


    Pattern matching against `case` classes is syntactically pleasing and very powerful.
    You can match against your `Person` class, and you get the extractors for free.


    ```

    def older(p: Person): Option[String] =

    p match

    case Person(name, age, true) if age > 35 => Some(name)

    case _ => None

    ```


    Your method matches against instances of `Person`. If the valid field is true,
    the age is extracted and compared against a guard. If the guard succeeds, the
    person’s name is returned; otherwise, `None` is returned. Let’s try it out:


    ```

    scala> older(p)

    res4: Option[String] = Some(David)

    scala> older(Person("Fred", 73, false))

    res5: Option[String] = None

    scala> older(Person("Jorge", 24, true))

    res6: Option[String]

    ```


    ### Nested Pattern Matching in Case Classes


    With previous versions of Scala, you could create `case` classes that contained
    other `case` classes and you could use pattern matching, but in the latest version
    of Scala (2.13.1), this feature was deprecated and removed. The following code
    shows what happens when you try to create a `case` class that extends from another:


    ```

    scala> case class MarriedPerson(override val name: String,

    override val age: Int,

    override val valid: Boolean,

    spouse: Person) extends Person(name, age, valid)

    1 |case class MarriedPerson(override val name: String,

    ^

    Cannot extend sealed class Person in a different source file

    4 |spouse: Person) extends Person(name, age, valid)

    ^^^^^^^^^^^^^^^^^^^^^^^^

    case class MarriedPerson has case ancestor class Person, but case-to-case inheritance
    is prohibited.

    To overcome this limitation, use extractors to pattern match on non-leaf nodes
    .

    ```'
