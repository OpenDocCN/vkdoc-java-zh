    ### Application Flow


    Now it’s time to understand how the flow of a Play Framework application works,
    from a request originated from a browser to a tool to generate the response, which
    could be HTML or JSON in the case of the REST API. Look at Figure [12-6](#328789_3_En_12_Chapter.xhtml#Fig6)
    to understand the different layers in the application.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig6_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig6_HTML.png)


    Figure 12-6


    MVC in Play Framework


    The request flow in the MVC architecture illustrated in Figure [12-6](#328789_3_En_12_Chapter.xhtml#Fig6)
    constitutes following:


    *   The router intermediates the HTTP request and determines the action defined
    in the controller to process this request.


    *   The controller listens for HTTP requests, extracts appropriate data from the
    requests, and applies changes to the model. Also, the controller renders a template
    file to generate the view.


    *   The result of the action method is finally sent as an HTTP response.


    #### Router


    The router is the main entry point of the web application through the `conf/routes`
    file, which defines the routes required by the application. Each route comprises
    an HTTP method and a URI pattern. A call to an action method is associated with
    the URI. `Conf/routes` is the configuration file used by the built-in component
    called Router that translates each incoming HTTP request to an action call.


    Note


    The HTTP method can be any of the valid methods supported by HTTP (GET, POST,
    PUT, DELETE, and HEAD).


    The router is responsible for mediating and translating an incoming HTTP request
    to an action. The web application sees the HTTP request as an event made up of
    the request path, including the query string and the HTTP method (e.g., GET, POST,
    etc.). Routes are defined in the `conf/routes` file. This file is compiled, and
    if there are any errors, you see them in your browser directly without recompiling
    your code or restarting the server. When the route file is modified, it is automatically
    reloaded. This feature is called hot reloading.


    If you open the file that contains the different routes of the application, you
    will see something like the following:


    ```

    # An example controller showing a sample home page

    GET     /                           controllers.HomeController.index()

    # Map static resources from the /public folder to the /assets URL path

    GET     /assets/*file               controllers.Assets.versioned(path="/public",
    file: Asset)

    ```


    As you can see, the declaration of a route is simple. You need to indicate the
    HTTP method with the route and which controller takes the request to generate
    the response.


    Now, if you write a URL that is not defined in the routes file, you will see an
    exception like in Figure [12-7](#328789_3_En_12_Chapter.xhtml#Fig7) in the browser
    or the tool that you use to consume the REST API like Postman^([^(75)](#fn75))
    or Insomnia^([^(76)](#fn76)).


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig7_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig7_HTML.png)


    Figure 12-7


    An exception that shows Play Framework can’t access the route


    #### Controller


    The controller responds to requests, processes them, and invokes changes on the
    model. A controller in Play Framework is an object in Scala that extends the Controller
    type. This Controller type is provided in the `play.api.mvc` package . A Controller
    in Play Framework comprises a function called an action to process the request
    parameters and produces a result to be sent to the client. Controllers are, by
    default, defined in the `controllers` package under the source root, the `app`
    folder. A `Controller` in Java is a class and comprises a public, static method
    called an action.


    Note


    A controller is a type that extends a Controller provided in the `play.api.mvc`
    package.


    #### Model


    The model is the domain-specific representation of the information (in the form
    of data structures and operations) on which the application operates. The most
    commonly used object for such representation is the JavaBean. However, the JavaBean
    leads to plenty of boilerplate code. Play Framework reduces this boilerplate code
    by generating the getters and setters for you by means of byte-code enhancement.
    The model objects might contain persistence artifacts, such as JPA annotations
    if they need to be saved into persistent storage.


    #### View


    In a Java EE−based web application, the view is usually developed using JSP. That
    is, the view in JavaEE−based web applications consists of JSP elements and template
    text. Since Play is not Java EE−centric, the view comprises a template that contains
    a mix of HTML and Scala code. In Play 1, the templates were based on Groovy, but
    starting with Play 2, templates are Scala-based. Using Play 2 you can develop
    both Java- and Scala-based web applications and the templates are exactly the
    same.


    Note


    In Play 1, the templates were based on Groovy, but starting from Play 2, templates
    are Scala-based.


    If you create a REST API, the view component does not exist in your application
    because the controller will generate the response in a JSON format.


    ### Rest Application


    You have created an application that contains a default route and HTML, but most
    microservices or applications delegate all the things related to the front end
    to other technologies like React, Angular, Vue, and NodeJS, so in this chapter
    you will create an API.'
