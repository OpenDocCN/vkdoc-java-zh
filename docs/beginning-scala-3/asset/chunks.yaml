    This method allows you to compare two different instances and check if they are
    the same or not. The default behavior of this method compares the position of
    the memory, so in many cases this is not useful so you need to override the default
    method. You need to put the keyword `override` before the entire declaration of
    the method.


    Note that the `equal` method receives the parameter `Any` so you need to validate
    before doing something that is the correct type. A good way to do it is to use
    `match`.


    ```

    scala> class Light(val bulb: Int, val status: Boolean):

    |     override def equals(that: Any): Boolean =

    |         that match

    |             case that: Light => that.isInstanceOf[Light] && this.bulb == that.bulb
    && this.status == that.status

    |             case _ => false

    // defined class Light

    ```


    After declaring the new method `equals` , you can create two instances of the
    class and assign the same values and see what happens when you try to compare
    them.


    ```

    scala> val lightOne = Light(75, true)

    scala> val lightTwo = Light(75, true)

    scala> lightOne == lightTwo

