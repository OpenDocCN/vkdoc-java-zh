- fmt: '### Defining the Endpoints


    To begin building an API, you will create an object that represents the model.
    You will create the classic ToDoList, which has a model like this class:


    ```

    case class TodoListItem(id: Long, description: String, isItDone: Boolean)

    ```


    Next, you define the model that you use in the different endpoints. And it’s time
    to create your first endpoint, which obtains the information of one `TodoListItem`.
    The following code shows the new route that you need to add in the routes file:


    ```

    GET   /todo/:id     controllers.TodoListController.getById(id: Long)

    ```


    Now it is time to create a controller, which contains the method to obtain the
    information of one element in particular. To do this, create a class named `TodoListController`
    in the folder `controller` with the code that follows:


    ```

    package controllers

    import javax.inject._

    import models.{TodoListItem}

    import play.api.libs.json._

    import play.api.mvc.{Action, AnyContent, BaseController, ControllerComponents}

    import scala.collection.mutable

    @Singleton

    class TodoListController @Inject()(val controllerComponents: ControllerComponents)
    extends BaseController {

    // Create a list of elements to simulate the information

    private val todoList = new mutable.ListBuffer[TodoListItem]()

    todoList += TodoListItem(1, "Beginning Scala", true)

    implicit val todoListJson = Json.format[TodoListItem]

    def getById(itemId: Long) = Action {

    val foundItem = todoList.find(_.id == itemId)

    foundItem match {

    case Some(item) => Ok(Json.toJson(item))

    case None => NotFound

    }

    }

    }

    ```


    You now have the controller and the logic, which if the element exists, returns
    the information, but if doesn’t exist, it returns an HTTP Status 404. To check
    if everything works, just open your browser or your preferred tool for doing requests
    and type `http://localhost:9000/todo/1`.


    ```

    {

    "id": 1,

    "description": "Beginning Scala",

    "isItDone": true

    }

    ```


    If you introduce an element that does not exist, you will see something like Figure
    [12-8](#328789_3_En_12_Chapter.xhtml#Fig8).


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig8_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig8_HTML.png)


    Figure 12-8


    Result of a request for a non-existent element


    The actions in the controllers can return several types of results, one per each
    HTTP Status. Table [12-3](#328789_3_En_12_Chapter.xhtml#Tab3) shows a brief summary
    of the most used methods; you can find the entire list on the official site of
    Play Framework^([^(77)](#fn77)).


    Table 12-3


    Commonly Used Results


    | *Result* | *Description* |

    | --- | --- |

    | `BadRequest` | Generates a 400 BAD_REQUEST result |

    | `InternalServerError` | Generates a 500 INTERNAL_SERVER_ERROR result |

    | `NotFound` | Generates a 404 NOT_FOUND result |

    | `Ok` | Generates a 200 OK result |

    | `Redirect` | Generates a simple redirect result |


    ### Layers in the Application


    As you can imagine, it is not a good practice to have all the logic in the controllers
    because there is no way to share the same logic across different endpoints. If
    you use Spring Boot in any of your Java applications, there are some concepts
    about the distribution of different layers of the logic.


    The way to define a structure of layers depends on many things and there is no
    standard way to define all the layers. For example, Figure [12-9](#328789_3_En_12_Chapter.xhtml#Fig9)
    shows a possible approach to defining layers in a Spring Boot application where
    most of the layers you can use in your Play Framework application.


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig9_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig9_HTML.png)


    Figure 12-9


    Distribution of layers in a Spring Boot application


    Table [12-4](#328789_3_En_12_Chapter.xhtml#Tab4) lists a little information about
    what is contained in each layer.


    Table 12-4


    Details About Each Layer in a Web Application


    | *Layer* | *Description* | *Packages* | *Example* |

    | --- | --- | --- | --- |

    | Controllers | Contains all the endpoints of the microservices | `*.controller`
    | `UserController` |

    | Resources | Contains all documentation about the microservices, like the definition
    of the endpoints and Swagger | `*.controller.documentation` | `UserResources`
    |

    | Request/Response | Location of the Data Transfer Object (DTO) that is used across
    the different layers | `*.dto.request`, `*.dto.response` | `UserRequest`, `UserResponse`
    |

    | Services | Contains all the definitions of the services and the implementation
    | `*.service`, `*.service.impl` | `IUserService`, `UserService` |

    | Validators | Contains all the logic to validate a request of a DTO | `*.validator`
    | `UserValidator` |

    | Repositories | Contains the definition for using interfaces and in some cases
    contains the specification to do a particular query | `*.repository`, `*.repository.impl`
    | `UserRepository` |

    | Connectors | Contains all the communications to external microservices or systems
    | `*.connector` | `UserConnector` |

    | Connector Configuration | Contains all the configurations related with connectors
    to external services | `*.connector.configuration` | `UserConnectorConfiguration`
    |

    | Helpers | All the classes that help in different things in the entire microservices
    | `*.helper` | `UserHelper` |

    | Configuration | All the logic to configure different aspects of the microservices
    (e.g., format of the response, ports) | `*.configuration` | `DatabaseConfiguration`
    |

    | Exceptions | Contains all the exceptions that each microservice can throw during
    the execution of a request | `*.exception` | `ApiException` |

    | Model | Contains all the entities with access to the databases | `*.model` |
    `User` (no prefix/suffix) |

    | Enums | All the enums used across the different layers | `*.enums` | No prefix/suffix
    |

    | Data Transfer Object (DTO) | The DTO used across the different layers | `*.dto`
    | `UserDTO` |


    This is one possible approach. There are others, like hexagonal architecture^([^(78)](#fn78))
    or onion architecture^([^(79)](#fn79)). You need to analyze each possible approach,
    considering the tradeoffs of implementing each on your microservices.


    To see all these concepts with a concrete example, let’s create a `TodoListService`
    in the folder `service` that contains the logic of getting one item by id. The
    following code contains all the logic of this new service.


    ```

    package service

    import javax.inject._

    import models.{TodoListItem}

    import scala.collection.mutable

    class TodoListService @Inject() () {

    private val todoList = new mutable.ListBuffer[TodoListItem]()

    todoList += TodoListItem(1, "Beginning Scala", true)

    def getById(itemId: Long) =

    todoList.find(_.id == itemId)

    }

    ```


    Now it’s time to modify the old controller to call your new service. The following
    code contains the redefinition of the controller using the service:


    ```

    package controllers

    import javax.inject._

    import models.{TodoListItem}

    import play.api.libs.json._

    import play.api.mvc.{Action, AnyContent, BaseController, ControllerComponents}

    import scala.collection.mutable

    import service.{TodoListService}

    @Singleton

    class TodoListController @Inject() (todoListService: TodoListService) (val controllerComponents:
    ControllerComponents) extends BaseController {

    def getById(itemId: Long) = Action {

    val foundItem = todoListService.getById(itemId)

    foundItem match {

    case Some(item) => Ok(Json.toJson(foundItem))

    case None => NotFound

    }

    }

    }

    ```'
