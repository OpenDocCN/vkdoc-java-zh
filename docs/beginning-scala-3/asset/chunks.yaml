- fmt: '# Other Ways of Declaring the Test


    As you know, there are many ways to write your test. One of them is using `FlatSpec`,
    which you saw in previous chapters, but there is another way which is relevant.
    The syntax in all cases is more or less the same but there are little differences.
    Let’s see some of these ways to write tests using the previous code.


    - Using `FunSuite` you don’t have any keyword in the declaration. You just use
    the word `test` and inside declare a string that expresses the idea of the test.
    This approach is very familiar for Java and JUnit developers, when you declare
    a method and include a `@DisplayName` that explains in detail the idea of the
    test.


    ```

    import org.scalatest.funsuite.AnyFunSuite

    class TemperatureCalculatorTests extends AnyFunSuite {

    val calculator = TemperatureCalculator()

    test("A calculate should return a temperature of 32.0 Fahrenheit when the Celsius
    is 0") {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    test("A calculate should return a temperature of 68.0 Fahrenheit when the Celsius
    is 20") {

    assert(calculator.fromCelsiusToFahrenheit(20) == 68.0)

    }

    }

    ```


    As you can see in the code below, the output when you execute the test is more
    or less the same as with `FlatSpec`.


    - Using `FunSpec` is a mix of the previous ways to write a test. You use the keyword
    `describe` to create a way to group the different types of tests that are connected
    in some way, but if you change a parameter, you get different results.


    ```

    $ sbt test

    [info] TemperatureCalculatorTests:

    [info] - A calculate should return a temperature of 32.0 Fahrenheit when the Celsius
    is 0

    [info] - A calculate should return a temperature of 68 Fahrenheit when the Celsius
    is 20

    [info] Run completed in 315 milliseconds.

    [info] Total number of tests run: 2

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 2, failed 0, canceled 0, ignored 0, pending 0

    [info] All tests passed.

    ```


    ```

    import org.scalatest.funspec.AnyFunSpec

    class TemperatureCalculatorTests extends AnyFunSpec {

    val calculator = TemperatureCalculator()

    describe("A calculate ") {

    it("should return a temperature of 32.0 Fahrenheit when the Celsius is 0") {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    it("should return a temperature of 68.0 Fahrenheit when the Celsius is 20") {

    assert(calculator.fromCelsiusToFahrenheit(20) == 68.0)

    }

    }

    }

    ```


    As you can see, the output when you execute the test is more or less the same
    as the `FlatSpec` but each line where you include in the `describe` keyword appears
    as a level.


    ```

    $ sbt test

    [info] TemperatureCalculatorTests:

    [info] A calculate

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0

    [info] - should return a temperature of 68.0 Fahrenheit when the Celsius is 20

    [info] Run completed in 312 milliseconds.

    [info] Total number of tests run: 2

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 2, failed 0, canceled 0, ignored 0, pending 0

    [info] All tests passed.

    ```


    One last comment about these styles of tests: All of them are included in the
    default library that you included in the first section of the chapter, but if
    you only want to include the dependency of one of these styles and exclude the
    rest, you can do it. The following code shows how to include only the dependency
    of `scalatest-funsuite`.


    ```

    libraryDependencies += "org.scalatest" %% "scalatest-funsuite" % "3.2.10" % "test"

    ```


    # Using Matchers to Validate Results


    ScalaTest uses matchers to validate if the results are correct or not. Matchers
    are a way to declare the conditions to validate in a more readability way for
    humans. It’s similar to BDD.


    Before using matchers, you need to include them in your test class. If you are
    not sure which matchers you will use, include all of them using `_`. Here is the
    entire package of matchers:


    ```

    import org.scalatest.matchers.should.Matchers._

    ```


    Now let’s translate the previous validation with `assert` to matchers with the
    use of `shouldBe`.


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest.matchers.should.Matchers._

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" in {

    val result = calculator.fromCelsiusToFahrenheit(0)

    result shouldBe 32.0

    }

    }

    ```


    As you can see, this way of validating if the result is correct or not is simple
    to understand. It’s not a unique way to check the result; matchers offer different
    ways to do the same. The following code shows you different ways to do the same
    validation. The main difference is the complexity and the time to compile the
    conditions, but you can start following the spirit of Scala by using the method
    you consider the simplest.


    ```

    result shouldBe 32.0

    result should be (32.0)

    result should equal (32.0)

    result shouldEqual 32.0

    result should === (32.0)

    ```


    There are matchers to cover most common cases of validations. It’s not just to
    check if the result is equal to a certain value. For example, the following code
    checks if one of the elements is in a `List`:


    ```

    it should "list contain one of the elements" in {

    val result = List(1, 2, 3, 4, 5)

    result should contain oneOf (5, 7, 9)

    }

    ```


    ## Tagging Your Test


    Imagine you have different classes or methods that are part of a big functionality
    and you want to check if everything related with that functionality still works
    fine after you introduce some modifications. You have options:


    - Run all the tests and check if the test connected with the functionality is
    still working. The main constraint with this approach is you spend a lot of time
    remembering which classes or tests have some relationship to your modifications.


    - Have a class that contains all the tests of the same functionality. This approach
    has a big problem in that you have tests from different classes in one file, so
    you can’t know in a simple way which classes are tested.


    - Use some way to group the different tests without modifying the structure that
    has a class of test per each class that exists in the code.


    The last approach is the best way to solve the problem. ScalaTest lets you add
    tags to your tests and run only the test that has a particular tag. To do this,
    you need to create a custom tag and assign it to different tests. The following
    code shows how to define a custom tag. As a recommendation, create a package in
    the source of your test with the different tags that you will create because it
    is an easy way to identify all the tags that exist.


    ```

    import org.scalatest.Tag

    object CustomTag extends Tag("CustomTag")

    ```


    After you define your custom tags, you need to mark which test uses the tag. To
    do this, use the keyword `taggedAs(NameOfTag)` in the definition of the test.
    This code shows how to mark one of the tests from the previous section with the
    `CustomTag`:


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest.matchers.should.Matchers._

    import org.scalatest.Tag

    object CustomTag extends Tag("CustomTag")

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" taggedAs(CustomTag)
    in {

    val result = calculator.fromCelsiusToFahrenheit(0)

    result shouldBe 32.0

    }

    // Test without tags

    // ....

    }

    ```


    To run only the test that contains a specific tag, you only need to indicate to
    SBT with a simple command.


    ```

    $ sbt "testOnly -- -n CustomTag"

    [info] TemperatureCalculatorTests:

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0

    [info] Run completed in 366 milliseconds.

    [info] Total number of tests run: 1

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 1, failed 0, canceled 0, ignored 0, pending 0

    ```'
  raw: '## Other Ways of Declaring the Test


    As you know, there are many ways to write your test. One of them is using FlatSpec,
    which you saw in previous chapters, but there is another way which is relevant.
    The syntax in all cases is more or less the same but there are little differences.
    Let’s see some of these ways to write tests using the previous code.


    *   Using FunSuite you don’t have any keyword in the declaration. You just use
    the word `test` and inside declare a string that expresses the idea of the test.
    This approach is very familiar for Java and Junit developers, when you declare
    a method and include a `@DisplayName` that explains in detail the idea of the
    test.


    ```

    import org.scalatest.funsuite.AnyFunSuite

    class TemperatureCalculatorTests extends AnyFunSuite {

    val calculator = TemperatureCalculator()

    test("A calculate should return a temperature of 32.0 Fahrenheit when the Celsius
    is 0") {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    test("A calculate should return a temperature of 68.0 Fahrenheit when the Celsius
    is 20") {

    assert(calculator.fromCelsiusToFahrenheit(20) == 68.0)

    }

    }

    ```


    As you can see in the code below, the output when you execute the test is more
    or less the same as with FlatSpec.


    *   Using FunSpec is a mix of the previous ways to write a test. You use the keyword
    `describe` to create a way to group the different types of tests that are connected
    in some way, but if you change a parameter, you get different results.


    ```

    $ sbt test

    [info] TemperatureCalculatorTests:

    [info] - A calculate should return a temperature of 32.0 Fahrenheit when the Celsius
    is 0

    [info] - A calculate should return a temperature of 68 Fahrenheit when the Celsius
    is 20

    [info] Run completed in 315 milliseconds.

    [info] Total number of tests run: 2

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 2, failed 0, canceled 0, ignored 0, pending 0

    [info] All tests passed.

    ```


    ```

    import org.scalatest.funspec.AnyFunSpec

    class TemperatureCalculatorTests extends AnyFunSpec {

    val calculator = TemperatureCalculator()

    describe("A calculate ") {

    it("should return a temperature of 32.0 Fahrenheit when the Celsius is 0") {

    assert(calculator.fromCelsiusToFahrenheit(0) == 32.0)

    }

    it("should return a temperature of 68.0 Fahrenheit when the Celsius is 20") {

    assert(calculator.fromCelsiusToFahrenheit(20) == 68.0)

    }

    }

    }

    ```


    As you can see, the output when you execute the test is more or less the same
    as the FlatSpec but each line where you include in the `describe` keyword appears
    as a level.


    ```

    $ sbt test

    [info] TemperatureCalculatorTests:

    [info] A calculate

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0

    [info] - should return a temperature of 68.0 Fahrenheit when the Celsius is 20

    [info] Run completed in 312 milliseconds.

    [info] Total number of tests run: 2

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 2, failed 0, canceled 0, ignored 0, pending 0

    [info] All tests passed.

    ```


    One last comment about these styles of tests: All of them are included in the
    default library that you included in the first section of the chapter, but if
    you only want to include the dependency of one of these styles and exclude the
    rest, you can do it. The following code shows how to include only the dependency
    of `scalatest-funsite` .


    ```

    libraryDependencies += "org.scalatest" %% "scalatest-funsuite" % "3.2.10" % "test"

    ```


    ## Using Matchers to Validate Results


    ScalaTest uses matchers to validate if the results are correct or not. Matchers
    are a way to declare the conditions to validate in a more readability way for
    humans. It’s similar to BDD.


    Before using matchers, you need to include them in your test class. If you are
    not sure which matchers you will use, include all of them using _. Here is the
    entire package of matchers:


    ```

    import org.scalatest.matchers.should.Matchers._

    ```


    Now let’s translate the previous validation with `assert` to matchers with the
    use of `shouldBe`.


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest.matchers.should.Matchers._

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" in {

    val result = calculator.fromCelsiusToFahrenheit(0)

    result shouldBe 32.0

    }

    }

    ```


    As you can see, this way of validating if the result is correct or not is simple
    to understand. It’s not a unique way to check the result; matchers offer different
    ways to do the same. The following code shows you different ways to do the same
    validation. The main difference is the complexity and the time to compile the
    conditions, but you can start following the spirit of Scala by using the method
    you consider the simplest.


    ```

    result shouldBe 32.0

    result should be (32.0)

    result should equal (32.0)

    result shouldEqual 32.0

    result should === (32.0)

    ```


    There are matchers to cover most common cases of validations. It’s not just to
    check if the result is equal to a certain value. For example, the following code
    checks if one of the elements is in a List:


    ```

    it should "list contain one of the elements" in {

    val result = List(1, 2, 3, 4, 5)

    result should contain oneOf (5, 7, 9)

    }

    ```


    ### Tagging Your Test


    Imagine you have different classes or methods that are part of a big functionality
    and you want to check if everything related with that functionality still works
    fine after you introduce some modifications. You have options:


    *   Run all the tests and check if the test connected with the functionality is
    still working. The main constraint with this approach is you spend a lot of time
    remembering which classes or tests have some relationship to your modifications.


    *   Have a class that contains all the tests of the same functionality. This approach
    has a big problem in that you have tests from different classes in one file, so
    you can’t know in a simple way which classes are tested.


    *   Use some way to group the different tests without modifying the structure
    that has a class of test per each class that exists in the code.


    The last approach is the best way to solve the problem. ScalaTest lets you add
    tags to your tests and run only the test that has a particular tag. To do this,
    you need to create a custom tag and assign it to different tests. The following
    code shows how to define a custom tag. As a recommendation, create a package in
    the source of your test with the different tags that you will create because it
    is an easy way to identify all the tags that exist.


    ```

    import org.scalatest.Tag

    object CustomTag extends Tag("CustomTag")

    ```


    After you define your custom tags, you need to mark which test uses the tag. To
    do this, use the keyword `taggedAs(NameOfTag)` in the definition of the test.
    This code shows how to mark one of the tests from the previous section with the
    `CustomTag`**:**


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest.matchers.should.Matchers._

    import org.scalatest.Tag

    object CustomTag extends Tag("CustomTag")

    class TemperatureCalculatorTests extends AnyFlatSpec {

    val calculator = TemperatureCalculator()

    it should "return a temperature of 32.0 Fahrenheit when the Celsius is 0" taggedAs(CustomTag)
    in {

    val result = calculator.fromCelsiusToFahrenheit(0)

    result shouldBe 32.0

    }

    // Test without tags

    // ....

    }

    ```


    To run only the test that contains a specific tag, you only need to indicate to
    SBT with a simple command.


    ```

    $ sbt "testOnly -- -n CustomTag"

    [info] TemperatureCalculatorTests:

    [info] - should return a temperature of 32.0 Fahrenheit when the Celsius is 0

    [info] Run completed in 366 milliseconds.

    [info] Total number of tests run: 1

    [info] Suites: completed 1, aborted 0

    [info] Tests: succeeded 1, failed 0, canceled 0, ignored 0, pending 0

    ```'
