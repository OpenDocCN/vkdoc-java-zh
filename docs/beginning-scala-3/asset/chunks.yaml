  raw: '## Writing Pure Functions


    So far, you refactored the print method above, which was in imperative style,
    to the example that followed, which is functional but not purely functional, because
    it causes side effects. For example, it prints the output to the output stream.
    The functional equivalent will be a more defining method that manipulates the
    passed `args` for printing. For example, it formats it, but does not print it
    and returns the formatted string for printing, as shown here:


    ```

    def formatArgs(strArray: Array[String]) = strArray.mkString(":")

    ```


    Note


    If a function’s result type is Unit, the function has side effects.


    Now the function is purely functional; that is, it causes no side effects affected
    by `var`. The `mkString` method is defined on collections that are meant to return
    a string that result from calling `toString` on each element. You can call `mkString`
    on any iterable collection.


    The overridden `toString` method is used to return the string representation of
    an object, as shown here:


    ```

    val x = List("x", "y", "z")

    println(x.mkString(" : "))

    ```


    You get the following output:


    ```

    scala> val x = List("x", "y", "z")

    x: List[String] = List(x, y, z)

    scala> println(x.mkString(" : "))

    x : y : z

    ```


    The function with no side effects doesn’t print anything, like the `print` method
    in the more functional example did. You can pass the result of `formatArgs` to
    `println` to print the output shown here:


    ```

    println(formatArgs(strArray))

    ```


    You can run this in the REPL:


    ```

    scala> val strArray = Array("Vishal Layka", "David Pollak")

    strArray: Array[String] = Array(Vishal Layka, David Pollak)

    scala> def formatArgs(strArray: Array[String]) = strArray.mkString(":")

    formatArgs: (strArray: Array[String])String

    scala> println(formatArgs(strArray))

    Vishal Layka:David Pollak

    ```


    That said, the essential useful feature of a program is to cause side effects;
    otherwise, it has no real application. Creating methods that do not cause side
    effects encourages you to minimize the code that would cause side effects, thus
    leading you to design robust programs.


    Writing pure functions is not simple in the beginning because this concept is
    not popular or is impossible to do in other languages that use JVM. Some advice:
    Start writing pure functions simply to understand the concept. After that, generalize
    this concept in all the functions you can.


    ## Leveraging Type Inferencing


    Scala is a statically typed language. In a statically typed language, the values
    and the variables have types. Also, Scala is a type-inferred language, which means
    you do not have to write the boilerplate code because the boilerplate code is
    inferred by Scala. This type inference is a feature of a dynamic type language.
    In this manner, Scala merges the best of the two worlds.


    Note


    In a dynamic typed system, unlike static typing, only values have types; variables
    do not have types.


    Let’s create an array of `Maps` to illustrate how type inferencing works.


    ```

    val books = Array(

    Map("title" -> "Beginning Scala", "publisher" -> "Apress"),

    Map("title" -> "Beginning Java", "publisher" -> "Apress")

    )

    ```


    If you run this Scala code in the REPL, you’ll see the following output:


    ```

    scala> val books = Array(

    |     Map("title" -> "Beginning Scala", "publisher" -> "Apress"),

    |     Map("title" -> "Beginning Java", "publisher" -> "Apress")

    | )

    val books: Array[Map[String, String]] = Array(Map(title -> Beginning Scala, publisher
    -> Apress), Map(title -> Beginning Java, publisher -> Apress))

    ```


    Note that only the array and `Maps` were specified, not their types. As you can
    see in the output in REPL, the Scala compiler inferred the types of the array
    and the `Map`. In this way, you could let the type inferencer determine the type
    for you, which can help you trim a lot of ceremonious code, thus keeping the code
    clean and lean and central to the business logic.


    Tip


    Let the type inferencer determine the type; this helps you trim ceremonious code.


    This concept is not strange if you recently used Kotlin or Java 14 because they
    offer something similar.


    ## Think Expressions


    As you learned in Chapter [4](#328789_3_En_4_Chapter.xhtml), expressions evaluate
    to a value, so there’s no need for a return statement. In Java, a return statement
    is commonplace, as shown here:


    ```

    def phoneBanking(key: Int) : String = {

    var result : String = _

    key match {

    case 1 => result = "Banking service"

    case 2 => result = "Credit cards"

    case _ => result = "Speak to the customer executive"

    }

    return result

    }

    ```


    As you can see, the final result is stored in a `result` variable. The code, while
    flowing through a pattern match, assigns strings to the `result` variable. To
    improve this code, you need to follow an expression-oriented approach, which is
    explained in detail in Chapter [4](#328789_3_En_4_Chapter.xhtml). This can be
    done in the following way:


    *   As mentioned, the first and foremost way to adopt a functional style is to
    use `val` instead of `var`. You first change the `result` variable to a `val`.


    *   Instead of assigning through the case statements, use the last expression
    of the case statement for assigning the result.


    Here is the code refactored to an expression-oriented pattern match:


    ```

    def phoneBanking (key: Int) : String =

    val result = key match

    case 1 => "Banking service"

    case 2 => "Credit cards"

    case 3 => "Speak to the customer executive"

    return result

    ```


    This code looks a lot more concise, but it can still be improved. You can remove
    the intermediate `result` variable altogether from the `phoneBanking` method .
    Here is the purely expression-oriented style:


    ```

    def phoneBanking (key: Int) : String = key match

    case 1 => "Banking service"

    case 2 => "Credit cards"

    case 3 => "Speak to the customer executive"

    ```


    It follows the expression-oriented approach. You can run the code in the REPL
    as shown:


    ```

    scala> phoneBanking (3)

    res8: String = Speak to the customer executive

    ```


    Note


    The key to using expressions is realizing that there’s no need for a return statement.


    Try to apply this concept not only in match expressions. You can apply this idea
    in `try/catch` expressions when something happens. Try to capture the exception
    to do something like log the error and after that provide a possible value (None/Some)
    for the method.'
