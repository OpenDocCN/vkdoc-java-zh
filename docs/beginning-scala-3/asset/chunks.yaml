- fmt: '### Lists


    Lists are similar to arrays because both can only contain elements of the same
    type, but there are some important differences:


    - The first difference is that Lists are immutable, so when you add or remove
    an element, a new List is created with the new size and all the elements are copied
    from one List to another. Also, connected with this difference, you cannot change
    the value of any position.

    - The second difference is that all Lists are LinkedLists, so each position has
    a pointer to the next element.


    You can declare a List using any of the alternatives that appear in the Array
    section. If you create an empty List and start to add elements, a new List is
    created each time. As a recommendation, every time that you can create the List
    with all the elements, do it.


    ```

    scala> val italianNames = List("Pietro", "Giovanni", "Renzo")

    val italianNames: List[String] = List(Pietro, Giovanni, Renzo)

    ```


    There is an alternative way to declare the elements without using the keyword
    `List` but the compiler will infer the type and created.


    ```

    scala> val italianNames = "Pietro" :: "Giovanni" :: "Renzo" :: Nil

    val italianNames: List[String] = List(Pietro, Giovanni, Renzo)

    ```


    As in the case of an Array, a List has some methods to interact with the contents
    of the List and obtain more information. See Table [2-6](#328789_3_En_2_Chapter.xhtml#Tab6).


    **Table 2-6** Methods to Obtain Different Elements of a List


    | Method | Description | Example |

    | --- | --- | --- |

    | `head` | Returns the first element | `scala> italianNames.headval res0: String
    = Pietro` |

    | `tail` | Returns the last element | `scala> italianNames.tailval res0: String
    = Renzo` |

    | `isEmpty` | Returns a Boolean with the value of true if the list is empty |
    `scala> italianNames.isEmptyval res0: Boolean = false` |

    | `reverse` | Returns a list in the inverse order | `scala> italianNames.reverseval
    res0: List[String] = List(Renzo, Giovanni, Pietro)` |

    | `contains` | Iterates the List and checks if a value exists | `scala> italianNames.contains("Pietro")val
    res0: Boolean = true` |


    ### Null


    `Null` is a subtype of the `AnyRef` types, including custom classes, to save any
    null references. This type does not contain methods or fields. If you try to invoke
    any method from `Any`, you will receive an exception.


    ```

    scala> val nullType = null

    val nullType: Null = null

    scala> nullType.toString

    java.lang.NullPointerException

    ... 28 elided

    ```


    ### Nothing


    `Nothing` is a subtype of all the other types (`AnyVal` and `AnyRef`), and you
    can use it to provide a compatible return type for operations that produce abnormal
    termination, such as methods that throw an exception.


    ## Functions


    Functions can appear in any place in the source file, and you can assign them
    inside a variable. These are two of the main differences from the methods that
    are similar but only exist inside the classes. The way to declare a function is
    by using the keyword `def` followed by the name and the parentheses.


    ```

    scala> def printSomething() = println("Hello")

    def printSomething(): Unit

    scala> printSomething()

    Hello

    ```


    As you can see, after declaring the function, the way to call it is by using the
    name with the parentheses. Now let’s change the example to receive a parameter
    and print it. You can do this by adding the definition of the function in the
    name and the type of variable that the function receives.


    ```

    scala> def printSomething(s:String) = println(s)

    def printSomething(s: String): Unit

    scala> printSomething("Hello everyone!!!")

    Hello everyone!!!

    ```


    Also, functions can support multiple parameters separated by commas.


    ```

    scala> def printSomething(s:String, name:String) = println(s.concat(" ").concat(name))

    def printSomething(s: String, name: String): Unit

    scala> printSomething("Hello", "Martin")

    Hello Martin

    ```


    Functions can return the result of some operation. In this case, it is not necessary
    to indicate the type of value to return.


    ```

    scala> def concatValues(s:String, name:String) = s.concat(" ").concat(name)

    def concatValues(s: String, name: String): String

    scala> concatValues("Hello", "Martin")

    val res0: String = Hello Martin

    ```


    ## Control Structures


    Scala, like many other languages, provides some way to control the flow of the
    application. This feature is important for handling decisions or iterating elements.
    The following are some of the control structures: `if/then/else` expressions,
    `for` loops, `while` loops, `try/catch/finally` blocks, and match expressions.


    ### if/then/else Expressions


    These expressions are used to branch the logic in different parts depending on
    if the condition is true or not.


    ```

    scala> val age = 18

    scala> if age > 18 then

    |     println("You can have a driver license")

    | else

    |     println("You need authorization from your parents")

    |

    You need authorization for your parents

    ```


    The syntax of this expression has changed since Scala 2, and it introduces the
    keyword `then` to indicate what the code needs to do if the condition is true.
    Also, the parentheses and the braces disappear. The following is the previous
    block of code but with the syntax of Scala 2:


    ```

    scala> if (age > 18) {

    |     println("You can have a driver license")

    | } else {

    |     println("You need authorization from your parents")

    | }

    ```


    You won’t always have just one condition to solve a problem. Perhaps you need
    to validate different scenarios; you can use a new `if` block next to the `else`
    to add a new condition.


    ```

    scala> val age = 16

    scala> if age > 18 then

    |     println("You can have a driver license")

    | else if age > 16 && age < 18 then

    |     println("You need authorization from your parents")

    | else

    |     println("You can''t drive")

    You need authorization for your parents

    ```


    The conditional operators that you see in the previous blocks of code are valid
    not just for the case of `if` expressions. You can use them in `for/while` loops
    and in other places that accept the use of conditions. For that reason, it’s important
    that you know the most important operators. See Table [2-7](#328789_3_En_2_Chapter.xhtml#Tab7).


    **Table 2-7** Operators for Using if/else Structures


    | Operator | Operation | Example |

    | --- | --- | --- |

    | `&&` | And | `scala> val age = 16scala> println(age > 10 && age < 18)           true`
    |

    | `&#124;&#124;` | Or | `scala> val age = 16scala> println(age > 10 &#124;&#124;
    age < 16)                             true` |

    | `>` | Greater than | `scala> val age = 16scala> println(age > 16)                                       false`
    |

    | `>=` | Greater than or equal to | `scala> val age = 16scala> println(age >=
    16)                                      true` |

    | `<` | Less than | `scala> val age = 16scala> println(age < 16)                                     false`
    |

    | `<=` | Less than or equal to | `scala> val age = 16scala> println(age <= 16)                                     true`
    |

    | `==` | Equal to | `scala> val age = 16scala> println(age == 16)                                     true`
    |

    | `!=` | Not equal to | `scala> val age = 16scala> println(age != 19)              true`
