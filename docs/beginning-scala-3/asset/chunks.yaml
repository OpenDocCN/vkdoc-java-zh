    Let’s now see how to translate multiple constructors while refactoring a Java
    class to a Scala class. For instance, take the `Book` Java class shown here:


    ```

    public class Book {

    private Integer isbn;

    private String title;

    public Book(Integer isbn) {

    this.isbn = isbn;

    }

    public Book(Integer isbn, String title) {

    this.isbn = isbn;

    this.title = title;

    }

    public Integer getIsbn() {

    return isbn;

    }

    public void setIsbn(Integer isbn) {

    this.isbn = isbn;

    }

    public String getTitle() {

    return title;

    }

    public void setTitle(String title) {

    this.title = title;

    }

    }

    ```


    As you can see, the `Book` Java class has two constructors, one that takes `ISBN`
    as the parameter and the other that takes `ISBN` and `title` as the parameters.
    The `Book` Java class also has getters and setters for `title` and `ISBN`. Now
    let’s refactor the `Book` Java class into a Scala class with `class` parameters
    and create an instance.


    ```

    class Book ( var isbn: Int, var title: String)

    ```


    You can try this code in the REPL:


    ```

    scala> class Book (var isbn: Int, var title: String)

    defined class Book

    scala> val book = new Book(999, "Beginning Scala") book: Book = Book@10ddb0e

    ```


    However, a constructor that takes only a single parameter, `title`, does not exist
    in the Scala definition. For example, if you create the `Book` instance with a
    constructor that takes a single `title` parameter, you will get an error in the
    REPL:


    ```

    scala> new Book("Beginning Java")

    1 |new Book("Beginning Java")

    |         ^^^^^^^^^^^^^^^^

    |         Found:    ("Beginning Java" : String)

    |         Required: Int

    ```


    To complete your refactoring of the Java class, you need an extra constructor.


    ```

    class Book (var isbn: Int, var title: String):

    def this(title: String) = this(0, title)

    ```


    Is this code comprehensible to you? As you may recall, any auxiliary constructor
    must immediately call another `this(...)` constructor and call the primary constructor
    to make sure all the parameters are initialized. You learned about auxiliary constructors
