- fmt: '### Scala 2 Implicit Class


    Using types, especially when type inferencing makes them invisible, is simple
    and doesn’t take a lot of thought away from the task at hand. Well-defined types
    and type interactions will stay out of the library consumer’s way but will guard
    against program errors.


    You’ve seen a little bit of stuff so far that looks like magic. The `String` class
    seems to have grown methods:


    ```

    scala> "Hello".toList

    res0: List[Char] = List(H, e, l, l, o)

    ```


    You may be wondering how a Java class that is final could have additional methods
    on it. Well, Scala has a feature called an implicit conversion. If you have an
    instance of a particular type, and you need another type, and there’s an implicit
    conversion in scope, Scala will call the implicit method to perform the conversion.
    For example, some date-related methods take `Long` and some take `java.util.Date`.
    It’s useful to have conversions between the two. Let’s create a method that calculates
    the number of days based on a `Long` containing a millisecond count.


    ```

    scala> def millisToDays(in: Long): Int = (in / (1000L * 3600L * 24L)).toInt

    ```


    You can calculate the number of days by passing a `Long` to the method.


    ```

    scala> millisToDays(5949440999L)

    res3: Int = 68

    ```


    Let’s try to pass a `Date` to the method.


    ```

    scala> import java.util.Date

    import java.util.Date

    scala> millisToDays(Date().getTime())

    val res2: Int = 18931

    ```


    But sometimes it’s valuable to convert between one type and another. We are used
    to the conversion in some contexts: `Int` ➤ `Long`, `Int` ➤ `Double`, and so on.
    Let’s define a method that will automatically be called when you need the conversion.


    ```

    scala> import scala.language.implicitConversions

    scala> implicit def dateToLong(d: Date):Long = d.getTime

    def dateToLong(d: java.util.Date): Long

    ```


    And this allows you to call `millisToDays` with a `Date` instance.


    ```

    scala> millisToDays(Date())

    val res3: Int = 18931

    ```


    You may think that implicit conversions are dangerous and reduce type safety.
    In some cases, this is true. You should be very careful with them, and their use
    should be an explicit design choice. However, sometimes implicit conversions (e.g.,
    `Int` ➤ `Long`) are very valuable, such as when you have a method that takes a
    parameter that must be a `Long`.


    ```

    scala> def m2[T  m2(33.toLong)

    res8: Int = 0

    ```


    What is the scope of implicit? The Scala compiler considers an implicit in the
    current scope if:


    - The implicit is defined in the current class or in a superclass.

    - The implicit is defined in a traitor super trait or is mixed into the current
    class or a superclass.

    - The implicit is defined on the companion object of the current target class.

    - The implicit is available on an object that has been imported into the current
    scope.


    When designing libraries, be careful about defining implicits and make sure they
    are in as narrow a scope as is reasonable. When consuming libraries, make sure
    the implicits defined in the objects are narrow enough and are not going to cause
    problems such as getting stuff from every `Option`.


    Implicit conversions are powerful tools and potentially very dangerous. We mean
    wicked dangerous. Back in the day, we put the following implicit into a library:


    ```

    implicit def oToT[T](in: Option[T]): T = in.get

    ```


    This was convenient, very convenient. We no longer had to test `Options`. We just
    passed them around, and they were converted from an `Option` to their underlying
    type. And when we removed the implicit, we had 150 code changes to make. That
    was 150 latent defects. Using implicits to convert to a class that has a particular
    method is a good reason. There’s very little likelihood of damage.


    ```

    scala> implicit def oToT[T](in: Option[T]): T = in.get

    def oToT[T](in: Option[T]): T

    ```


    Until Scala 2.10, implicit conversion was handled by implicit `def` methods that
    took the original instance and returned a new instance of the desired type. Implicit
    methods have been supplanted by implicit classes, which provide a safer and more
    limited scope for converting existing instances.


    Scala 2.10 introduced a new feature called implicit classes. An implicit class
    is a class marked with the `implicit` keyword. This keyword makes the class’s
    primary constructor available for implicit conversions when the class is in scope.


    To create an implicit class, simply place the `implicit` keyword in front of an
    appropriate class. Here’s an example:


    ```

    scala> object Helper:

    |    implicit class Greeting(val x: Int):

    |        def greet = "Hello " + x

    |

    // defined object Helper

    ```


    To use this class, just import it into the scope and call the `greet` method.


    ```

    scala> import Helper._

    scala> println(3.greet)

    Hello 3

    ```


    For an implicit class to work, its name must be in scope and unambiguous, like
    any other implicit value or conversion.


    Implicit classes have the following restrictions:


    - They must be defined inside another trait/class/object.


    ```

    object Helpers:

    implicit class RichInt(x: Int) // OK!

    implicit class RichDouble(x: Double) // WRONG!

    ```


    - They may only take one non-implicit argument in their constructor.


    ```

    implicit class RichDate(date: java.util.Date) // OK!

    implicit class Indexer[T](collecton: Seq[T], index: Int) // WRONG!

    implicit class Indexer[T](collection: Seq[T])(implicit index: Index) // OK!

    ```


    While it’s possible to create an implicit class with more than one non-implicit
    argument, such classes aren’t used during implicit lookup.


    - There may not be any method, member, or object in scope with the same name as
    the implicit class. This means an implicit class cannot be a case class.


    ```

    object Bar

    implicit class Bar(x: Int) // WRONG!

    val x = 5

    implicit class x(y: Int) // WRONG!

    implicit case class Baz(x: Int) // WRONG!

    ```


    ### Scala 3 Given/Using Clauses


    As you read at the beginning of this section, the feature of `implicit` introduces
    some changes in Scala 3 which differ from the previous version. In the following
    sections, you will see some of them.


    #### Implicit Conversions


    This feature reduces the complexity, but it does not disappear completely. Let’s
    see an example that takes a `Double` and converts it into a new type.


    ```

    scala> import scala.language.implicitConversions

    |

    | case class Euros(amount: Double):

    |     override def toString = f"$$$amount%.2f"

    |

    | given Conversion[Double,Euros] = d => Euros(d)

    // defined case class Euros

    lazy val given_Conversion_Double_Euros: Conversion[Double, Euros]

    scala> given_Conversion_Double_Euros(3)

    val res7: Euros = $3.00

    ```


    Take into consideration that you can create more than one implicit conversion
    using `given`. One last thing: You can continue using the mechanism of `implicit`
    at least in version 3.0.1 but consider migrating these functionalities to the
    new version of the feature because Scala will deprecate some functionalities that
    are not supported in the latest version.


    There are some considerations when using this feature:


    - You can’t chain the use of `given` to transform into something intermediate.
    You can only convert from one type to another one.

    - You can only use the conversion declared in the same scope.'
