    # 4. Functional Programming


    In the non-fiction work *Old Times on the Mississippi*, Mark Twain wrote, “When
    I was a boy of 14, my father was so ignorant I could hardly stand to have the
    old man around. But when I was 21, I was astonished at how much the old man had
    learned in seven years.” Functional programming is the old man who comes to the
    rescue when writing robust concurrent software. Functional programming treats
    computation as the evaluation of mathematical functions and avoids state and mutable
    data. It is a declarative programming paradigm, in which programming is done with
    expressions. The imperative style of programming emphasizes a sequence of operations
    characterized by iteration with loops, mutating data in place, and methods with
    side effects where the order of side effects is critical for the right effect.
    The basic constructs in an imperative language, such as Java, are imperative statements
    that change the state of a program, as illustrated here:


    ```

    x = x + 1

    ```


    The functional style of programming emphasizes the results, characterized by passing
    function values into looping methods, immutable data, and methods with no side
    effects where the order in which operations occur is of no importance. In a functional
    language such as Scala, the basic constructs are declarative, as seen here, and
    there are no side effects:


    ```

    f(int x){return x + 1}

    ```


    In a functional language, the computation proceeds primarily by evaluation expressions.
    As a language that supports functional programming, Scala encourages an expression-oriented
    programming (EOP) model.


    Martin Odersky, the creator of Scala, said the essence of the language is a fusion
    of functional and object-oriented programming in a typed setting: functions for
    the logic and objects for the modularity. For this reason, you need to understand
    both paradigms to use all the power of this language.'
