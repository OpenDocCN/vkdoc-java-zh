    a `TimeSpan` into a `Long`. If there is an object with the same name as a class,
    that object is considered a companion object. If there are any implicit conversions
    defined in the companion object, they will be consulted if an instance of the
    class needs to be converted. You define an implicit conversion from `TimeSpan`
    to `Long` in the companion object. This results in `TimeSpan` instances being
    automatically converted to `Long` if the `TimeSpan` is assigned to a `Long` variable
