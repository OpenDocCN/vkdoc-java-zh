    Figure 2-1


    Hierarchy of types in Scala


    In the following sections, you will see the definitions and some operations that
    support each of them. Just to clarify, on the right side of the figure appears
    “All java.*/ scala.* ref types.” This means objects like collections (e.g., List
    and Map), Optional, String, Date, and others. You’ll explore these objects in
    more detail in future chapters.


    #### Any, AnyVal, and AnyRef Types


    `Any` is an abstract class and the root class in the Scala hierarchy, so all classes
    directly or indirectly inherit from it. You can think of this class as the `Object`
    class in Java. From this root class, there are two subclasses, `AnyVal` and `AnyRef`,
    which contain all the classes that you can use in Scala for different purposes.
    `AnyVal` contains all the types that contain a value, such as Double or Int, which
    is a final abstract class that extends from `AnyVal`. `AnyRef` contains references
    to non-value Scala classes and is user defined.


    ### Numeric Types


    The numeric types in Scala are represented by Byte, Short, Int, Long, and Char,
    which are known as integral numbers because you can use an integer to represent
    the value. The types Double and Float are constituted and are not related directly
    to the previous types.


    #### Types and Range


    Table [2-1](#328789_3_En_2_Chapter.xhtml#Tab1) shows the different types and the
    range of values that each of them supports.


    Table 2-1


    Types and Their Value Ranges


    | Numeric type | Description | Range |

    | --- | --- | --- |

    | Char | 16-bit unsigned value | 0 to 65,535 |

    | Byte | 8-bit signed value | -128 to 127 |

    | Short | 16-bit signed value | -32,768 to 32,767 |

    | Int | 32-bit signed value | -2,147,483,648 to 2,147,483,647 |

    | Long | 64-bit signed value | -2^(63) to 2^(621) |

    | Float | 32-bit single precision | 1.40129846432481707e-45 to 3.40282346638528860e+38
    |

    | Double | 64-bit double precision | 4.94065645841246544e-324d to 1.79769313486231570e+308d
    |


    You don’t need to memorize the ranges because Scala provides methods to obtain
    this information. If you write the numeric type and invoke the methods `MinValue`
    or `MaxValue` , you can obtain the values.


    ```

    scala> Int.MinValue

    val res0: Int = -2147483648

    scala> Int.MaxValue

    val res1: Int = 2147483647

    ```'
