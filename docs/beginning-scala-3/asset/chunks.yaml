    # 6. Scala 集合


    Scala 中的集合类是一个高性能且类型参数化的框架，支持可变和不可变类型层次结构。这些独立且不同的可变与不可变类型层次结构，使得在可变与不可变实现之间切换变得简单得多。Scala
    的面向对象集合还支持函数式高阶操作，例如 `map`、`filter` 和 `reduce`，这让你可以在集合中使用面向表达式的编程。由于 Scala 是一种
    JVM 语言，你可以从 Scala 代码中访问并使用整个 Java 集合库，但这并不推荐，因为 Java 集合库不提供高阶操作。Scala 拥有一个丰富的集合库。本章将带你了解最常用的集合类型和操作，仅展示你最常使用的类型。本章的目标是引导你穿越众多选项，找到你需要的解决方案。


    需要考虑的一点是，自 Scala 2 的最新版本 2.13 以来，Scala 3 在这个主题上并没有引入太多变化。然而，在 2.13 版本中已弃用的某些特性在
    3.x.x 版本中被移除了。


    注意


    如果你的应用程序使用的 Scala 版本低于 2.13，并且你想迁移到 Scala 3，最推荐的方法是先迁移到 2.13 或更高版本，解决所有可能的问题或冲突，然后再迁移到
    Scala 3.x.x。^((32))


    ## Scala 集合层次结构


    客户端代码所需的大多数 `collection` 类存在于三个不同的包中，如表 6-1 所示。在本节中，你将探索集合框架的三个主要包，并了解如何使用通用且最流行的特性。


    表 6-1


    包含所有与 Scala 集合相关内容的包


    | *包* | *描述* |

    | --- | --- |

    | `scala.collection` | 此包定义了所有将被其余包扩展的特质或对象。 |

    | `scala.collection.immutable` | 此包定义了大多数不可变的集合，因此你可以更改其中的值。 |

    | `scala.collection.mutable` | 此包包含所有可以修改内部对象实例值的集合。 |


    还有其他包涵盖了特定情况。表 6-2 展示了其中一些。


    表 6-2


    用于特定情况的包


    | *包* | *描述* |

    | --- | --- |

    | `scala.collection.concurrent` | 此包仅包含两个东西：一个 `Map` 特质和一个 `TrieMap`，后者对操作具有锁访问权限。
    |

    | `scala.collection.convert` | 此包定义了用于包装 Scala 到 Java 集合以及反之亦然的类型。 |

    | `scala.collection.generic` | 此包定义了在整个集合包中可重用的内容。 |

    | `scala.collection.parallel` | 此包包含支持并行性的集合版本。 |


    ### scala.collection 包


    此包由所有高级抽象类或特质组成，它们通常同时具有可变和不可变的实现。图 6-1 展示了 `scala.collection` 包中的集合。


