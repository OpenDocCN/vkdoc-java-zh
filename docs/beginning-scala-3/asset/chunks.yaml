- fmt: '### The `scala.collection.mutable` package


    As the name implies, this package includes collections that are mutable. The `scala.collection.mutable`
    package is the most extensive of the three packages. It is worth scanning through
    the API to look at the various types in this package and to see how they are used.
    By default, Scala always picks immutable collections. For instance, if you just
    write `Set` without any prefix or without having imported `Set` from somewhere,
    you get an immutable `Set`, and if you write `iterable` you get an immutable iterable
    collection, because these are the default bindings imported from the Scala package.
    To get the mutable default versions, you need to write explicitly `collection.mutable.Set`
    or `collection.mutable.Iterable`.


    **Note**


    A useful convention if you want to use both mutable and immutable versions of
    collections is to import just the `package collection.mutable`.


    `import scala.collection.mutable`


    Then a word like `Set` without a prefix still refers to an immutable collection,
    whereas `mutable.Set` refers to the mutable counterpart.


    Now let’s look at mutable `Seq`s, `Set`s, and `Map`s. It is worth noting that
    we will go through only partial implementations. The `scala.collection.mutable`
    package is extensive, and it is worth going through the Scala docs for a detailed
    treatment.


    Figures [6-5](#328789_3_En_6_Chapter.xhtml#Fig5), [6-6](#328789_3_En_6_Chapter.xhtml#Fig6),
    and [6-7](#328789_3_En_6_Chapter.xhtml#Fig7) illustrate the objects that contain
    the `scala.collection.mutable` package.


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig7_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig7_HTML.png)


    Figure 6-7


    Mutable Map


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig6_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig6_HTML.png)


    Figure 6-6


    Mutable Set


    ![../images/328789_3_En_6_Chapter/328789_3_En_6_Fig5_HTML.png](images/328789_3_En_6_Chapter/328789_3_En_6_Fig5_HTML.png)


    Figure 6-5


    Mutable Seq


    As you can see, one of the main differences from the `scala.collection` package
    in Figure [6-1](#328789_3_En_6_Chapter.xhtml#Fig1) is the `Buffer` type. Let’s
    look at that now.


    The `Buffer` type is implicitly mutable. There is no immutable `Buffer`. There
    are several subtypes of `Buffer` in the Scala libraries. The two most significant
    ones are `ArrayBuffer` and `ListBuffer`. You can create a `buffer` as shown here:


    ```

    scala> val buffer = scala.collection.mutable.Buffer(1,2,3)

    val buffer: scala.collection.mutable.Buffer[Int] = ArrayBuffer(1, 2, 3)

    ```


    A mutable `Seq` is created as an `ArrayBuffer`.


    ```

    scala> val x = scala.collection.mutable.Seq(1,2,3)

    val x: scala.collection.mutable.Seq[Int] = ArrayBuffer(1, 2, 3)

    ```


    A mutable `LinearSeq` is created as `MutableList`.


    ```

    scala> val x = scala.collection.LinearSeq(1,2,3)

    val x: scala.collection.LinearSeq[Int] = List(1, 2, 3)

    ```


    A mutable `IndexedSeq` creates an `ArrayBuffer`.


    ```

    scala> val x = scala.collection.mutable.IndexedSeq(1,2,3)

    val x: scala.collection.mutable.IndexedSeq[Int] = ArrayBuffer(1, 2, 3)

    ```


    You can use a mutable `Set` as shown here:


    ```

    scala> val m = scala.collection.mutable.Set(1,2,3)

    val m: scala.collection.mutable.Set[Int] = Set(1, 2, 3)

    ```


    A mutable `SortedSet` creates a `TreeSet`.


    ```

    scala> val m = scala.collection.mutable.SortedSet(1,2,3)

    val m: scala.collection.mutable.SortedSet[Int] = TreeSet(1, 2, 3)

    ```


    You can use a mutable `BitSet` as shown here:


    ```

    scala> val m = scala.collection.mutable.BitSet(1,2,3)

    val m: scala.collection.mutable.BitSet = BitSet(1, 2, 3)

    ```


    You can use a mutable `Map` as shown here:


    ```

    scala> val m = collection.mutable.Map(1 -> "a", 2 -> "b")

    val m: scala.collection.mutable.Map[Int,String] = Map(2 -> b, 1 -> a)

    ```


    The idea of this section was to give you an overview of the Scala collection hierarchy.
    You learned that there are three basic types named `Seq`, `Set`, and `Map`, which
    are then implemented in mutable and immutable packages. Now you will look at the
    immutable and mutable collection classes.


    ## Using Immutable Collection Classes


    Scala has a wide variety of collections classes. Collections are containers of
    things. Those containers can be sequenced, linear sets of items as shown in the
    following code snippets.


    A `List`:


    ```

    scala> val x = List(1,2,3,4)

    val x: List[Int] = List(1, 2, 3, 4)

    ```


    Filtering through a `List`:


    ```

    scala> x.filter(a => a % 2 == 0)

    val res14: List[Int] = List(2, 4)

    scala> x

    val res15: List[Int] = List(1, 2, 3, 4)

    ```


    They may be indexed items where the index is a zero-based `Int` (such as an `Array`)
    or any other type (such as a `Map`) as illustrated here.


    Creating an `Array`:


    ```

    scala> val a = Array(1,2,3)

    val a: Array[Int] = Array(1, 2, 3)

    scala> a(1)

    val res16: Int = 2

    ```


    Creating a `Map`:


    ```

    scala> val m = Map("one" -> 1, "two" -> 2, "three" -> 3)

    val m: Map[String,Int] = Map(one -> 1, two -> 2, three ->3)

    scala> m("two")

    val res17: Int = 2

    ```


    The collections may have an arbitrary number of elements or be bounded to zero
    or one element (such as an `Option`). Collections may be strict or lazy.


    Lazy collections have elements that may not consume memory until they are accessed
    (such as a `Range`). Let’s create a `Range`.


    ```

    scala> 0 to 10

    val res1: scala.collection.immutable.Range.Inclusive = Range 0 to 10

    ```


    The nifty thing about `Ranges` is that the actual elements in the `Range` are
    not instantiated until they are accessed. So you can create a `Range` for all
    positive integers but take only the first five elements. This code runs without
    consuming many gigabytes of RAM because only the elements that are needed are
    created.


    Using `Range` as lazy collection:


    ```

    scala> (1 to Integer.MAX_VALUE - 1).take(5)

    val res2: Range = Range 1 to 5

    ```


    Collections may be mutable (the contents of the reference can change) or immutable
    (the thing that the reference refers to is never changed). Note that immutable
    collections may contain mutable items.'
