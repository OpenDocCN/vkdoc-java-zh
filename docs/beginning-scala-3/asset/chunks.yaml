- fmt: '# Mutable Collections


    The `List`, `Set`, and `Map` immutable collections we are familiar with cannot
    be changed after they have been created. They can, however, be transformed into
    new collections. For example, you can create an immutable map and then transform
    it by removing one mapping and adding another.


    ```

    scala> val immutableMap = Map(1 -> "a", 2 -> "b", 3 -> "c")

    val immutableMap: Map[Int,String] = Map(1 -> a, 2 -> b, 3 -> c)

    scala> val newMap = immutableMap - 1 + (4 -> "d")

    val newMap: Map[Int,String] = Map(2 -> b, 3 -> c, 4 -> d)

    ```


    Removing `"a"` and adding `"d"` gives you a different collection, while the original
    collection of `immutableMap` remains the same.


    ```

    scala> println(newMap)

    Map(2 -> b, 3 -> c, 4 -> d)

    scala> println(immutableMap)

    Map(1 -> a, 2 -> b, 3 -> c)

    ```


    What you end up with is a completely new collection stored in `newMap`. The original
    collection, `immutableMap`, remains untouched.


    However, there are times when you do want mutable data, such as when creating
    a mutable data structure that is only used within a function.


    You can create mutable collections directly from immutable collections. The `List`,
    `Map`, and `Set` immutable collections can all be converted to the mutable `collection.mutable.Buffer`
    type with the `toBuffer` method. Here is an example of converting an immutable
    map to a mutable one and then changing it back:


    ```

    scala> val m = Map(1->"a", 2 -> "b")

    val m: Map[Int,String] = Map(1 -> a, 2 -> b)

    scala> val b = m.toBuffer

    val b: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a), (2,b))

    ```


    The `map`, containing key-value pairs, is now a sequence of tuples. You can now
    add a new entry.


    ```

    scala> b += (3 ->"c")

    val res35: scala.collection.mutable.Buffer[(Int, String)] = ArrayBuffer((1,a),
    (2,b), (3,c))

    ```


    After adding a new entry, you can change the `buffer` to `map` again.


    ```

    scala> val newMap = b.toMap

    val newMap: Map[Int,String] = Map(1 -> a, 2 -> b, 3 -> c)

    ```


    The `buffer` methods `toList` and `toSet` can be used in addition to `toMap` to
    convert a buffer to an immutable collection. The most straightforward way to modify
    collections is with a mutable collection type. You will look at some mutable collection
    classes in the following sections.


    ## Mutable ArrayBuffer


    The `ArrayBuffer` is a collection that contains elements of the same type where
    you can change the size of the structure without changing the values.


    Creating an `ArrayBuffer`:


    ```

    scala> import scala.collection.mutable.ArrayBuffer

    scala> val ints = ArrayBuffer[Int]()

    val ints: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer()

    ```


    Adding elements to the `ArrayBuffer`:


    ```

    scala> ints ++= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1)

    ```


    Adding multiple elements to the `ArrayBuffer`:


    ```

    scala> ints ++= List(2,3,4)

    val res1: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(1, 2, 3, 4)

    ```


    Removing elements from the `ArrayBuffer`:


    ```

    scala> ints -= 1

    val res0: scala.collection.mutable.ArrayBuffer[Int] = ArrayBuffer(2,3,4)

    ```


    ## Mutable Queue


    A queue is a first-in, first-out (FIFO) data structure. Scala offers both an immutable
    queue and mutable queue. You can create an empty, mutable queue of any data type.
    This code shows a mutable queue for int:


    ```

    scala> import scala.collection.mutable.Queue

    scala> var ints = Queue[Int]()

    var ints: scala.collection.mutable.Queue[Int] = Queue()

    ```


    Note


    While the `collection.immutable` package is automatically added to the current
    namespace in Scala, the `collection.mutable` package is not. When creating mutable
    collections, make sure to include the full package name for the type.


    Once you have a mutable queue, you can add elements to it using `+=`, `++=`, and
    `enqueue`, as shown in these examples.


    Adding elements to the queue:


    ```

    scala> ints ++= 1

    val res36: scala.collection.mutable.Queue[Int] = Queue(1)

    ```


    Adding multiple elements to the queue:


    ```

    scala> ints += (2, 3) //This is deprecated in Scala 2.13.0

    res47: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3)

    ```


    Using `enqueue`:


    ```

    scala> ints.enqueue(4)

    val res49: scala.collection.mutable.Queue[Int] = Queue(1, 2, 3, 4)

    ```


    Because a queue is a FIFO, you typically remove elements from the head of the
    queue, one element at a time, using `dequeue`.


    ```

    scala> ints.dequeue

    res50: Int = 1

    scala> ints

    res51: scala.collection.mutable.Queue[Int] = Queue(2, 3, 4)

    ```


    A `Queue` is a collection class that extends from `Iterable` and `Traversable`,
    so it has all the usual collection methods, including `foreach`, `map`, and so
    on.


    ## Mutable Stack


    A stack is a last-in, first-out (LIFO) data structure. Scala has both immutable
    and mutable versions of a stack. The following examples demonstrate how to use
    the mutable `Stack` class.


    Creating an empty, mutable stack of the int data type:


    ```

    scala> import scala.collection.mutable.Stack

    scala> var ints = Stack[Int]()

    val ints: scala.collection.mutable.Stack[Int] = Stack()

    ```


    You can also populate a stack with initial elements when you create it.


    ```

    scala> val ints = Stack(1, 2, 3)

    val ints: scala.collection.mutable.Stack[Int] = Stack(1, 2, 3)

    ```


    You can now push elements onto the stack with `push`.


    ```

    scala> ints.push(4)

    val res41: ints.type = Stack(4, 1, 2, 3)

    ```


    Creating a stack:


    ```

    scala> ints.push(5, 6 ,7)

    val res42: ints.type = Stack(7, 6, 5, 4, 1, 2, 3)

    ```


    To take elements off the stack, pop them off the top of the stack.


    ```

    scala> val lastele = ints.pop

    val lastele: Int = 7

    ```


    With this, we complete the discussion of mutable collections and this chapter.
    The Scala collections framework is broad, rather than deep, and deserves a book
    of its own. Nevertheless, this chapter showed you how to use a variety of Scala’s
    collection types.'
