    \ one or more free variables to return a new value. The idea of free variables\
    \ is to have variables in the scope of the function and it’s not necessary passing\
    \ to the function as parameters.\n\n```\nscala> var count = 0\nscala> val incrementCount\
    \ = (number:Int) => count + number\nscala> incrementCount(1)\nval res1: Int =\
    \ 1\n```\n\n### Function Literal/Anonymous Function\n\nA literal is the simplest\
    \ form of an expression. A literal is a notation for representing a fixed value\
    \ in the source code. Almost all programming languages have notations for atomic\
    \ values such as integers, floating-point numbers, strings, and so on. Literals\
    \ are often used to initialize variables. In the following, 1 is an integer literal:\n\
    \n```\nint x = 1;\n```\n\nScala allows you to express functions as literals. Function\
    \ literals allow you to have an expression of a function type that you can write\
    \ in a short format without declaring a name for it. A function type could be\
    \ one of the following:\n\n*   The type of a variable or parameter to which a\
    \ function can be assigned\n\n*   An argument of a higher-order function, which\
    \ you will see in detail in Chapter [10](#328789_3_En_10_Chapter.xhtml), taking\
    \ a function parameter\n\n*   The result type of higher-order function returning\
    \ a function\n\nThe syntax for a function literal starts with a parenthesized,\
    \ comma−separated list of arguments followed by an arrow and the body of the function.\
    \ A function literal is also called an *anonymous function* , that is, a function\
    \ without any name specified with the function literal syntax. Consider an `add`\
    \ function :\n\n```\nval add = (x: Int, y: Int) => x + y\n```\n\nUsing the function\
    \ literal, you can define the `add` function as illustrated here:\n\n```\n(x:\
    \ Int, y: Int) => x + y\n```\n\nA function literal is instantiated into an object\
    \ called a function value. A function value is a function object, and you can\
    \ invoke the function object in the same manner as you invoke any other function.\
    \ The function object extends one of the FunctionN traits, such as Function0,\
    \ Function1, and so on up to Function22\\. Depending on the number of arguments\
    \ in the function, the corresponding FunctionN trait is chosen by the compiler.\
    \ For a function with two arguments, the compiler will elect Function2 as the\
    \ underlying type. For a function with three arguments, the compiler will choose\
    \ Function3; for a function with four arguments, Function4; and so on.\n\nBecause\
    \ the function value is an object, it can be stored in a variable and it can be\
    \ invoked using parentheses in the function call, as illustrated here:\n\n```\n\
    scala> val add = (a: Int, b: Int) => a + b\nadd: (Int, Int) => Int = \nscala>\
    \ add(1, 2)\nres0: Int = 3\n```\n\nThe invocation of this function is converted\
    \ to a call to the apply method of the function class instance, which is assigned\
    \ to the variable.\n\nFrom these kinds of function literals, the Scala compiler\
    \ generates a function object that mixes in one of the FunctionN traits. So the\
    \ left side of the → becomes the parameter list and the right side becomes the\
    \ implementation of the apply method. Every function that you define in Scala\
    \ becomes an instance of an implementation that features a certain FunctionN trait\
    \ ranging from Function1 up to Function22.\n\nNow, to take a deeper look into\
    \ Function traits, you first write a function that calculates the area of a rectangle\
    \ as illustrated here:\n\n```\nval areaOfRectangle:(Int, Int) => Int = (width:Int,\
    \ height:Int) => width*height\n```\n\nWhen you run this function in REPL, you\
    \ will see that the compiler elects and chooses the Function2 trait for this function.\
    \ Why? Because there are two arguments to this function.\n\n```\nscala> val areaOfRectangle:(Int,\
    \ Int) => Int = (width:Int, height:Int) => width*height\nareaOfRectangle: (Int,\
    \ Int) => Int = = Lambda$1475/0x0000000801215040@712594f4\n```\n\nYou can invoke\
    \ this function as seen here:\n\n```\nscala> areaOfRectangle(5,3)\nres0: Int =\
    \ 15\n```\n\nNow, let’s look at traits in Scala. Function2 in the Scala package\
    \ looks like this:\n\n```\ntrait Function2[-T1, -T2, +R] extends AnyRef {\n...\n\
    abstract def apply( v1 :T1, v2 :T2 ) : R\n...\n}\n```\n\nThis shows only the `apply`\
    \ method . The two type parameters, `T1` and `T2`, in the `apply` method take\
    \ the type of the arguments, while the type parameter `R` represents the function’s\
    \ return type."
  trans: "\n## 面向表达式的编程\n\n在面向表达式的编程中，每条语句都是一个表达式。要理解 EOP，你必须先理解语句和表达式之间的区别。语句会执行代码，但不返回任何值，例如：\n\
    \n```\ncustomer.computeDiscount()\n```\n\n表达式会返回一个值。表达式是能够求值为一个值的代码块。\n\n```\n\
    val discount = computeDiscount(customer)\n```\n\n注意\n\n面向表达式的编程语言是一种编程语言，其中每个结构都是表达式，因此都能求值为一个值。\n\
    \n在 Scala 中，以下表达式会返回一个结果：\n\n```\nscala> 2 + 2\nres0: Int = 4\n```\n\n面向表达式编程的优势在\
    \ `if/else` 表达式中更为明显，它在 Scala 中也会返回一个值。\n\n```\nval test = if (3 > 2) \"true\"\
    \ else \"false\"\n```\n\n这个 `if` 子句检查一个条件表达式，并根据条件表达式的值返回一个或另一个表达式。Java 中的 `if`\
    \ 块不会求值出一个值。与 Scala 相反，此处展示的代码在 Java 中是非法的，因为 Java 中的 `if` 子句是一个语句，而不是一个表达式。\n\
    \n```\nboolean test = if (3 > 2) \"true\" else \"false\"\n```\n\n要实现在 Scala `if`\
    \ 子句中展示的相同效果，你必须在 Java 中使用 `?:` 语法，如下所示：\n\n```\nboolean test = 3 > 2 ? true :\
    \ false ;\n```\n\n在 Java 中，`if` 和 `?:` 之间存在区别，`if` 是一个语句，而 `?:` 是一个表达式。Scala 中的\
    \ `if` 子句更像 Java 中的 `?:`，而不是 Java 中的 `if` 子句。Scala 将 `?:` 的概念与其 `if` 块统一了起来，因此\
    \ Scala 没有 `?:` 语法。\n\n注意\n\n如前所述，Scala 中的每个结构都是表达式，其中操作执行的顺序无关紧要，因此这些表达式可以按任意顺序执行。这个简单的概念对多核编程中的并发有着深远的影响，因为你可以并行执行表达式。\n\
    \n## 函数、Lambda 和闭包\n\n其中一些术语在 Scala 的早期版本中并不存在，或者在此版本中含义发生了变化，因此在深入探讨之前，你需要理解每个术语的基本概念。\n\
    \n*   **函数**：此操作可以有一个名称，其代码在被人调用之前不会被执行。此操作可能有变量，也可能没有。以下是一个计算面积的函数示例：\n\n*  \
    \ **Lambda**：这是一个匿名函数，在定义中可能有变量，也可能没有。\n\n```\nscala> def calculateArea(height:\
    \ Int, width: Int) = height*width\ndef calculateArea(height: Int, width: Int):\
    \ Int\n```\n\n```\n(height: Int, width: Int) => height*width\n```\n\n像 Java 或\
    \ Python 这样的语言使用术语 *lambda 函数*，但在 Scala 中，大多数开发者使用术语 *匿名函数* 或 *函数字面量* 来描述 lambda\
    \ 的概念。\n\n*   **闭包**：这是一个函数，可以是匿名的或命名的，它使用一个或多个自由变量来返回一个新值。自由变量的概念是指变量存在于函数的作用域内，而不必作为参数传递给函数。\n\
    \n```\nscala> var count = 0\nscala> val incrementCount = (number:Int) => count\
    \ + number\nscala> incrementCount(1)\nval res1: Int = 1\n```\n\n### 函数字面量/匿名函数\n\
    \n字面量是表达式的最简单形式。字面量是在源代码中表示固定值的一种表示法。几乎所有编程语言都有表示原子值的表示法，例如整数、浮点数、字符串等。字面量通常用于初始化变量。在下面的例子中，1\
    \ 是一个整数字面量：\n\n```\nint x = 1;\n```\n\nScala 允许你将函数表示为字面量。函数字面量允许你以简短的形式编写函数类型的表达式，而无需为其声明名称。函数类型可以是以下之一：\n\
    \n*   可以分配函数的变量或参数的类型\n*   高阶函数的参数（你将在第 10 章中详细了解），该参数接受一个函数参数\n*   返回函数的高阶函数的结果类型\n\
    \n函数字面量的语法以括号括起来的、逗号分隔的参数列表开始，后跟一个箭头和函数体。函数字面量也称为*匿名函数*，即使用函数字面量语法指定的没有名称的函数。考虑一个\
    \ `add` 函数：\n\n```\nval add = (x: Int, y: Int) => x + y\n```\n\n使用函数字面量，你可以像这样定义\
    \ `add` 函数：\n\n```\n(x: Int, y: Int) => x + y\n```\n\n函数字面量被实例化为一个称为函数值的对象。函数值是一个函数对象，你可以像调用任何其他函数一样调用该函数对象。函数对象扩展了某个\
    \ FunctionN 特质，例如 Function0、Function1，一直到 Function22。根据函数中参数的数量，编译器会选择相应的 FunctionN\
    \ 特质。对于有两个参数的函数，编译器会选择 Function2 作为底层类型。对于有三个参数的函数，编译器会选择 Function3；对于有四个参数的函数，选择\
    \ Function4；依此类推。\n\n因为函数值是一个对象，它可以存储在变量中，并且可以在函数调用中使用括号来调用它，如下所示：\n\n```\nscala>\
    \ val add = (a: Int, b: Int) => a + b\nadd: (Int, Int) => Int = \nscala> add(1,\
    \ 2)\nres0: Int = 3\n```\n\n此函数的调用被转换为对分配给该变量的函数类实例的 apply 方法的调用。\n\n从这类函数字面量中，Scala\
    \ 编译器会生成一个混合了某个 FunctionN 特质的函数对象。因此，`=>` 的左侧成为参数列表，右侧成为 apply 方法的实现。你在 Scala\
    \ 中定义的每个函数都成为一个实现了某个特定 FunctionN 特质（范围从 Function1 到 Function22）的实例。\n\n现在，为了更深入地了解\
    \ Function 特质，你首先编写一个计算矩形面积的函数，如下所示：\n\n```\nval areaOfRectangle:(Int, Int) =>\
    \ Int = (width:Int, height:Int) => width*height\n```\n\n当你在 REPL 中运行此函数时，你会看到编译器为此函数选择并选定了\
    \ Function2 特质。为什么？因为这个函数有两个参数。\n\n```\nscala> val areaOfRectangle:(Int, Int)\
    \ => Int = (width:Int, height:Int) => width*height\nareaOfRectangle: (Int, Int)\
    \ => Int = = Lambda$1475/0x0000000801215040@712594f4\n```\n\n你可以像这样调用此函数：\n\n\
    ```\nscala> areaOfRectangle(5,3)\nres0: Int = 15\n```\n\n现在，让我们看看 Scala 中的特质。Scala\
    \ 包中的 Function2 看起来像这样：\n\n```\ntrait Function2[-T1, -T2, +R] extends AnyRef {\n\
    ...\nabstract def apply( v1 :T1, v2 :T2 ) : R\n...\n}\n```\n\n这里只展示了 `apply` 方法。`apply`\
    \ 方法中的两个类型参数 `T1` 和 `T2` 接受参数的类型，而类型参数 `R` 表示函数的返回类型。\n"
- fmt: "对于你在 Scala 中定义的每个函数，编译器都会生成一个适当的 `Function` trait 的实例，其类型参数会根据给定的参数类型和函数的返回类型进行参数化。\n\
    \n在之前定义的 `areaOfRectangle` 函数中，`areaOfRectangle` 函数的类型是：\n\n```\n(Int, Int) =>\
    \ Int\n```\n\n这与下面展示的内容相同：\n\n```\nFunction2[Int,Int,Int]\n```\n\n因此，你可以像这样定义你的\
    \ `add` 函数：\n\n```\nval areaOfRectangle: Function2[Int,Int,Int] = (width:Int,\
    \ height:Int) => { width*height }\n```\n\n你可以在 REPL 中测试，如下所示：\n\n```\nscala> val\
    \ areaOfRectangle: Function2[Int,Int,Int] = (width:Int, height:Int) => { width*height\
    \ }\nval areaOfRectangle: (Int, Int) => Int = Lambda$1502/0x0000000801228040@61c0fb12\n\
    ```\n\n现在，你可以显式地调用给定函数的 `apply` 方法，如下所示：\n\n```\nareaOfRectangle.apply(5,3)\n\
    ```\n\n你可以在 REPL 中测试，如下所示：\n\n```\nscala> val area = areaOfRectangle.apply(5,3)\n\
    area: Int = 15\n```\n\n你可以更进一步，通过实现一个适当的 `Function` trait 并定义其必需的 `apply` 方法来定义一个函数。让我们为\
    \ `areaOfRectangle` 函数这样做：\n\n```\nval areaOfRectangle :(Int, Int) => Int = new\
    \ Function2[Int, Int, Int]{\n  def apply(width:Int, height:Int):Int = width*height\n\
    }\n```\n\n你可以在 REPL 中测试，如下所示：\n\n```\nscala> areaOfRectangle(5,3)\nres18: Int\
    \ = 15\n```\n\n现在你已经学习了函数值和函数类型，接下来你将看到如何使用函数字面量将其传递给接受函数的方法或将其赋值给变量。我们将在下一节详细讨论这一点。\n\
    \n### 一等函数和高阶函数\n\nScala 将函数式范式与面向对象范式完美融合的关键因素之一是函数是对象。在函数式编程中，函数是一等公民。一等函数是可以：\n\
    \n1.  赋值给变量，\n2.  作为参数传递给其他函数，\n3.  作为值从其他函数返回。\n\n在要点 2 中强调的接受函数作为参数的函数，以及在要点\
    \ 3 中强调的返回函数的函数，被称为**高阶函数**。在接下来的章节中，你将学习一等函数的所有三个方面。\n\n> **注意**\n> 在函数式编程中，函数是一等公民，这意味着函数可以赋值给变量，函数可以传递给其他函数，并且函数可以作为值从其他函数返回。而接受函数作为参数或返回函数的函数，被称为高阶函数。\n\
    \n#### 函数作为变量\n\n就像你在 OOP 中传递 `String`、`Int` 和其他变量一样，你可以像传递变量一样传递函数。你可以像上一节看到的那样定义一个函数字面量，然后将该字面量赋值给一个变量。以下代码定义了一个函数字面量，它接受一个\
    \ `Int` 参数并返回一个值，该值是传入的 `Int` 的两倍：\n\n```\n(i: Int) => { i * 2 }\n```\n\n现在你可以将该函数字面量赋值给一个变量。\n\
    \n```\nscala> val doubler = (i: Int) => { i * 2 }\nval doubler: Int => Int = Lambda$1503/0x0000000801229040@689eab53\n\
    ```\n\n变量 `doubler` 是一个函数实例，被称为函数值。现在你可以像下面这样调用 `doubler`：\n\n```\nscala> doubler(2)\n\
    res25: Int = 4\n```\n\n在底层，`doubler` 是 `Function1` trait 的一个实例，该 trait 定义了一个接受一个参数的函数。在实现方面，`doubler`\
    \ 是使用关键字 `val` 创建并赋值给变量的函数。要将 `doubler` 定义为方法而不是函数，你必须在类中定义 `doubler` 方法，并使用关键字\
    \ `def` 来定义方法。\n\n除了调用 `doubler` 之外，你还可以将其传递给任何接受函数参数的函数（或方法）。我们将在下一节讨论这一点。\n\n\
    #### 函数作为参数\n\n你可以创建一个接受函数作为参数的函数或方法。为此，首先定义一个接受函数作为参数的方法。\n\n```\nscala> def\
    \ operation(functionparam:(Int, Int) => Int) =  println(functionparam(4,4))\n\
    def operation(functionparam: (Int, Int) => Int): Unit\n```\n\n`operation` 方法接受一个名为\
    \ `functionparam` 的参数，该参数是一个函数。`functionparam` 函数接受两个 `Int` 并返回一个 `Int`。`operation`\
    \ 方法返回一个 `Unit`，表示 `operation` 方法不返回任何内容。\n\n接下来，定义一个与预期签名匹配的函数。下面的 `add` 函数匹配该签名，因为它接受两个\
    \ `Int` 参数并返回一个 `Int`：\n\n```\nval add = (x: Int, y:Int) => { x + y }\n```\n\n\
    现在你可以将 `add` 函数传递给 `operation` 方法。\n\n```\nscala> operation(add)\n```\n\n任何匹配此签名的函数都可以传递给\
    \ `operation` 方法。让我们定义两个名为 `subtract` 和 `multiply` 的新函数，它们接受两个 `Int` 并返回一个 `Int`。\n\
    \n```\nval subtract = (x: Int, y:Int) => { x - y }\nval multiply = (x: Int, y:Int)\
    \ => { x*y }\n```\n\n现在你可以将这些函数传递给 `operation` 方法。\n\n```\nscala> operation(subtract)\n\
    \nscala> operation(multiply)\n```\n\n#### 返回函数\n\n你可以从一个函数或方法中返回一个函数。为此，首先定义一个匿名函数。以下代码声明了一个匿名函数，它接受一个\
    \ `String` 参数并返回一个 `String`：\n\n```\n(name: String) => { \"hello\" + \" \" + name\
    \ }\n```\n\n现在定义一个方法，该方法返回你刚刚定义的匿名函数。\n\n```\ndef greeting() = (name: String)\
    \ => {\"hello\" + \" \" + name}\n```\n\n在 `=` 符号的左侧，你有一个普通的方法声明。\n\n```\ndef greeting()\n\
    ```\n\n在 `=` 的右侧是一个函数字面量（一个匿名函数）。\n\n```\nscala> def greeting() = (name: String)\
    \ => {\"hello\" + \" \" + name}\ngreeting: ()String => String\n```\n\n现在你可以将 `greeting()`\
    \ 赋值给一个变量。\n\n```\nscala> val greet= greeting()\nval greet: String => String =\
    \ Lambda$1261/0x000000080114c840@769b0752\n```\n\n`greet` 函数现在等同于你的匿名函数 `(name:\
    \ String) => {\"hello\" + \" \" + name}`。因为匿名函数接受一个 `String` 参数 `name`，所以你可以传递一个名字给它。\n\
    \n```\nscala> greet(\"Reader\")\nres0: String = hello Reader\n```\n\n### 闭包\n\n\
    闭包是一个函数，其返回值依赖于在该函数外部声明的一个或多个变量的值。考虑以下 `multiplier` 函数：\n\n```\nval multiplier\
    \ = (x:Int) => x * 3\n```\n\n在 `multiplier` 函数中，`y` 是函数体中使用的变量。`x` 被定义为函数的参数。现在让我们像下面这样修改\
    \ `multiplier` 函数：\n\n```\nval multiplier = (x: Int) => x * y\n```\n\n因为 `x` 是函数的形式参数，每次调用\
    \ `multiplier` 时它都会被绑定到一个新值。然而，`y` 不是形式参数。让我们进一步修改 `multiplier` 函数，如下所示：\n\n```\n\
    var y = 3\nval multiplier = (x: Int) => x * y\n```\n\n现在 `y` 引用了函数外部但在封闭作用域内的一个变量。\n\
    \n```\nscala> var y = 3\ny: Int = 3\nscala> val multiplier = (x: Int) => x * y\n\
    multiplier: Int => Int = \n```\n\n现在你可以像下面这样调用 `multiplier` 函数：\n\n```\nscala>\
    \ multiplier(3)\nres37: Int = 9\n```\n\n`multiplier` 函数引用了 `y`，并且每次调用时都会读取其当前值。Scala\
    \ 编译器会创建一个闭包，该闭包包含了封闭作用域中的变量。"
  raw: "For every function that you define in Scala, the compiler will come up with\
    \ an instance of the appropriate Function trait, where the type parameters are\
    \ parameterized with the given types of the arguments and the return type of the\
    \ function.\n\nIn the `areaOfRectangle` function defined earlier, the type of\
    \ `areaOfRectangle` function is\n\n```\n(Int, Int)  =>Int\n```\n\nThis is the\
    \ same as illustrated here:\n\n```\nFunction2[Int,Int,Int]\n```\n\nSo you could\
    \ have defined your add function this way:\n\n```\nval areaOfRectangle:  Function2[Int,Int,Int]\
    \  = (width:Int, height:Int) => { width*height }\n```\n\nYou can test this in\
    \ the REPL as seen here:\n\n```\nscala> val areaOfRectangle:  Function2[Int,Int,Int]\
    \  = (width:Int, height:Int) => { width*height }\nval areaOfRectangle: (Int, Int)\
    \ => Int = Lambda$1502/0x0000000801228040@61c0fb12\n```\n\nNow you can explicitly\
    \ call the method to apply on a given function as illustrated:\n\n```\nareaOfRectangle.apply(5,3)\n\
    ```\n\nYou can test this in the REPL as illustrated here:\n\n```\nscala> val area\
    \ = areaOfRectangle.apply(5,3)\narea: Int = 15\n```\n\nYou can go a step further\
    \ and define a function by implementing an appropriate Function trait and define\
    \ its required `apply` method. Let’s do this for the `areaOfRectangle` function\
    \ :\n\n```\nval areaOfRectangle :(Int, Int) => Int = new Function2[Int, Int, Int]{\n\
    def apply(width:Int, height:Int):Int = width*height\n}\n```\n\nYou can test this\
    \ in the REPL as seen here:\n\n```\nscala> areaOfRectangle(5,3)\nres18: Int =\
    \ 15\n```\n\nNow that you have learned function values and function types, you\
    \ will see how to use a function literal to pass it into a method that takes a\
    \ function or assigns it to a variable. We will discuss this in detail in the\
    \ following section.\n\n### First-Class Functions and Higher-Order Functions\n\
    \nOne of the key factors in Scala that beautifully blends the functional paradigm\
    \ with the object-oriented paradigm is that functions are objects. In functional\
    \ programming, functions are first-class citizens. A first-class function is a\
    \ function that can be\n\n1.  Assigned to variables,\n\n2.  Passed as an argument\
    \ to the other function, and\n\n3.  Returned as values from the other function.\n\
    \nThe other function emphasized in point 2 that takes a function as an argument\
    \ and the other function emphasized in point 3 that returns a function are called\
    \ higher-order functions . In the sections that follow, you will learn about all\
    \ three aspects of a first-class function.\n\nNote\n\nIn functional programming,\
    \ functions are first-class citizens, meaning functions can be assigned to variables,\
    \ functions can be passed to other functions, and functions can be returned as\
    \ values from other functions. And such functions, which take functions as arguments\
    \ or return a function, are called higher-order functions.\n\n#### Functions as\
    \ Variables\n\nJust as you pass Strings, Ints, and other variables around in OOP,\
    \ you can pass a function around like a variable. You can define a function literal\
    \ as you saw in the previous section, and then assign that literal to a variable.\
    \ The following code defines a function literal that takes an `Int` parameter\
    \ and returns a value that is twice the amount of the `Int` that is passed in:\n\
    \n```\n(i: Int) => { i * 2 }\n```\n\nYou can now assign that function literal\
    \ to a variable.\n\n```\nscala> val doubler = (i: Int) => { i * 2 }\nval doubler:\
    \ Int => Int = Lambda$1503/0x0000000801229040@689eab53\n```\n\nThe variable `doubler`\
    \ is an instance of a function, known as a function value. You can now invoke\
    \ `doubler` as illustrated here:\n\n```\nscala> doubler(2)\nres25: Int = 4\n```\n\
    \nUnder the hood, `doubler` is an instance of the function1 trait, which defines\
    \ a function that takes one argument. In terms of implementation, `doubler` is\
    \ a function created using the keyword `val` and assigned to a variable. To define\
    \ `doubler` as a method instead of as a function, you must define the `doubler`\
    \ method in a class and use the keyword `def` to define a method.\n\nBeyond just\
    \ invoking `doubler` , you can also pass it to any function (or method) that takes\
    \ a function parameter. We will discuss this in the following section.\n\n####\
    \ Functions as Parameters\n\nYou can create a function or a method that takes\
    \ a function as a parameter. For this, first define a method that takes a function\
    \ as a parameter.\n\n```\nscala> def operation(functionparam:(Int, Int) => Int)\
    \ =  println(functionparam(4,4))\ndef operation(functionparam: (Int, Int) => Int):\
    \ Unit\n```\n\nThe `operation` method takes one parameter named `functionparam`,\
    \ which is a function. The `functionparam` function takes two `Int`s and returns\
    \ an `Int`. The `operation` method returns a `Unit` that indicates that the `operation`\
    \ method returns nothing.\n\nNext, define a function that matches the expected\
    \ signature. The following `add` function matches that signature because it takes\
    \ two `Int` arguments and returns an `Int`:\n\n```\nval add = (x: Int, y:Int)\
    \ => { x + y }\n```\n\nNow you can pass an `add` function into the `operation`\
    \ method.\n\n```\nscala> operation(add)\n\n```\n\nAny function that matches this\
    \ signature can be passed into the `operation` method. Let’s define two new functions\
    \ named `subtract` and `multiply` that take two `Int`s and return an `Int`.\n\n\
    ```\nval subtract = (x: Int, y:Int) => { x - y }\nval multiply = (x: Int, y:Int)\
    \ => { x*y }\n```\n\nNow you can pass these functions into your `operation` method.\n\
    \n```\nscala > operation(subtract)\n\nscala> operation(multiply)\n\n```\n\n####\
    \ Returning a Function\n\nYou can return a function from a function or method.\
    \ In order to do this, first define an anonymous function. The following code\
    \ declares an anonymous function that takes a String argument and returns a String:\n\
    \n```\n(name: String) => { \"hello\" + \" \" + name }\n```\n\nNow define a method\
    \ that returns the anonymous function that you just defined.\n\n```\ndef greeting()\
    \ = (name: String) => {\"hello\" + \" \" + name}\n```\n\nOn the left side of the\
    \ = symbol you have a normal method declaration.\n\n```\ndef greeting()\n```\n\
    \nOn the right side of the = is a function literal (an anonymous function).\n\n\
    ```\nscala> def greeting() = (name: String) => {\"hello\" + \" \" + name}\ngreeting:\
    \ ()String => String\n```\n\nNow you can assign `greeting()` to a variable.\n\n\
    ```\nscala>  val greet= greeting()\nval greet: String => String = Lambda$1261/0x000000080114c840@769b0752\n\
    ```\n\nThe `greet` function is now equivalent to your anonymous function `(name:\
    \ String) => {\"hello\" + \" \" + name}`. Because the anonymous function takes\
    \ a String parameter name, you can pass it a name.\n\n```\nscala> greet(\"Reader\"\
    )\nres0: String = hello Reader\n```\n\n### Closure\n\nA closure is a function\
    \ whose return value depends on the value of one or more variables declared outside\
    \ this function. Consider the following `multiplier` function:\n\n```\nval multiplier\
    \ = (x:Int) => x * 3\n```\n\nIn the `multiplier` function, `y` is the variable\
    \ used in the function body. `x` is defined as a parameter to the function. Now\
    \ let’s modify the multiplier function as illustrated here:\n\n```\nval multiplier\
    \ = (x: Int) => x * y\n```\n\nBecause `x` is a formal parameter to the function,\
    \ it is bound to a new value each time `multiplier` is called. However, `y` is\
    \ not a formal parameter. Let’s further modify the multiplier function as illustrated:\n\
    \n```\nvar y = 3\nval multiplier = (x: Int) => x * y\n```\n\nNow `y` has a reference\
    \ to a variable outside the function but in the enclosing scope.\n\n```\nscala>\
    \ var y = 3\ny: Int = 3\nscala> val multiplier = (x: Int) => x * y\nmultiplier:\
    \ Int => Int = \n```\n\nNow you can invoke the `multiplier` function as illustrated\
    \ here:\n\n```\nscala> multiplier(3)\nres37: Int = 9\n```\n\nThe `multiplier`\
    \ function references `y` and reads its current value each time. The Scala compiler\
    \ creates a closure (closes over) that encompasses the variable in the enclosing\
    \ scope."
  trans: "\n对于你在 Scala 中定义的每个函数，编译器都会生成一个对应 Function 特质的实例，其类型参数会根据函数的参数类型和返回类型进行参数化。\n\
    \n在之前定义的 `areaOfRectangle` 函数中，`areaOfRectangle` 函数的类型是：\n\n```\n(Int, Int) =>\
    \ Int\n```\n\n这与下面展示的写法相同：\n\n```\nFunction2[Int,Int,Int]\n```\n\n因此，你也可以这样定义你的\
    \ add 函数：\n\n```\nval areaOfRectangle: Function2[Int,Int,Int] = (width:Int, height:Int)\
    \ => { width*height }\n```\n\n你可以在 REPL 中测试，如下所示：\n\n```\nscala> val areaOfRectangle:\
    \ Function2[Int,Int,Int] = (width:Int, height:Int) => { width*height }\nval areaOfRectangle:\
    \ (Int, Int) => Int = Lambda$1502/0x0000000801228040@61c0fb12\n```\n\n现在，你可以显式调用\
    \ `apply` 方法来作用于给定的函数，如下所示：\n\n```\nareaOfRectangle.apply(5,3)\n```\n\n你可以在 REPL\
    \ 中测试，如下所示：\n\n```\nscala> val area = areaOfRectangle.apply(5,3)\narea: Int =\
    \ 15\n```\n\n你可以更进一步，通过实现一个合适的 Function 特质并定义其所需的 `apply` 方法来定义一个函数。让我们为 `areaOfRectangle`\
    \ 函数实现这一点：\n\n```\nval areaOfRectangle :(Int, Int) => Int = new Function2[Int,\
    \ Int, Int]{\ndef apply(width:Int, height:Int):Int = width*height\n}\n```\n\n\
    你可以在 REPL 中测试，如下所示：\n\n```\nscala> areaOfRectangle(5,3)\nres18: Int = 15\n```\n\
    \n现在你已经学习了函数值和函数类型，接下来你将看到如何使用函数字面量将其传递给接受函数的方法或将其赋值给变量。我们将在下一节详细讨论这一点。\n\n###\
    \ 一等函数与高阶函数\n\nScala 能够将函数式范式与面向对象范式完美融合的关键因素之一，就是函数也是对象。在函数式编程中，函数是一等公民。一等函数可以：\n\
    \n1.  赋值给变量，\n2.  作为参数传递给其他函数，\n3.  作为值从其他函数返回。\n\n第 2 点中强调的接受函数作为参数的函数，以及第 3\
    \ 点中强调的返回函数的函数，被称为**高阶函数**。在接下来的章节中，你将学习一等函数的全部三个方面。\n\n注意\n\n在函数式编程中，函数是一等公民，这意味着函数可以赋值给变量，可以传递给其他函数，也可以作为值从其他函数返回。而这类接受函数作为参数或返回函数的函数，被称为高阶函数。\n\
    \n#### 函数作为变量\n\n就像在面向对象编程中传递字符串、整数和其他变量一样，你也可以像传递变量一样传递函数。你可以像上一节那样定义一个函数字面量，然后将其赋值给一个变量。以下代码定义了一个函数字面量，它接受一个\
    \ `Int` 参数，并返回该 `Int` 的两倍值：\n\n```\n(i: Int) => { i * 2 }\n```\n\n现在你可以将该函数字面量赋值给一个变量。\n\
    \n```\nscala> val doubler = (i: Int) => { i * 2 }\nval doubler: Int => Int = Lambda$1503/0x0000000801229040@689eab53\n\
    ```\n\n变量 `doubler` 是一个函数实例，被称为函数值。现在你可以像下面这样调用 `doubler`：\n\n```\nscala> doubler(2)\n\
    res25: Int = 4\n```\n\n在底层，`doubler` 是 Function1 特质的一个实例，该特质定义了一个接受一个参数的函数。在实现层面，`doubler`\
    \ 是使用关键字 `val` 创建并赋值给变量的函数。要将 `doubler` 定义为方法而非函数，你必须在类中定义 `doubler` 方法，并使用关键字\
    \ `def` 来定义方法。\n\n除了调用 `doubler`，你还可以将其传递给任何接受函数参数的函数（或方法）。我们将在下一节讨论这一点。\n\n####\
    \ 函数作为参数\n\n你可以创建一个接受函数作为参数的函数或方法。为此，首先定义一个接受函数作为参数的方法。\n\n```\nscala> def operation(functionparam:(Int,\
    \ Int) => Int) =  println(functionparam(4,4))\ndef operation(functionparam: (Int,\
    \ Int) => Int): Unit\n```\n\n`operation` 方法接受一个名为 `functionparam` 的参数，该参数是一个函数。`functionparam`\
    \ 函数接受两个 `Int` 并返回一个 `Int`。`operation` 方法返回 `Unit`，表示该方法不返回任何值。\n\n接下来，定义一个与预期签名匹配的函数。下面的\
    \ `add` 函数匹配该签名，因为它接受两个 `Int` 参数并返回一个 `Int`：\n\n```\nval add = (x: Int, y:Int)\
    \ => { x + y }\n```\n\n现在你可以将 `add` 函数传递给 `operation` 方法。\n\n```\nscala> operation(add)\n\
    \n```\n\n任何匹配此签名的函数都可以传递给 `operation` 方法。让我们定义两个新函数，分别名为 `subtract` 和 `multiply`，它们接受两个\
    \ `Int` 并返回一个 `Int`。\n\n```\nval subtract = (x: Int, y:Int) => { x - y }\nval\
    \ multiply = (x: Int, y:Int) => { x*y }\n```\n\n现在你可以将这些函数传递给 `operation` 方法。\n\
    \n```\nscala > operation(subtract)\n\nscala> operation(multiply)\n\n```\n\n####\
    \ 返回函数\n\n你可以从一个函数或方法中返回一个函数。为此，首先定义一个匿名函数。以下代码声明了一个匿名函数，它接受一个 String 参数并返回一个\
    \ String：\n\n```\n(name: String) => { \"hello\" + \" \" + name }\n```\n\n现在定义一个方法，返回你刚刚定义的匿名函数。\n\
    \n```\ndef greeting() = (name: String) => {\"hello\" + \" \" + name}\n```\n\n\
    在 `=` 符号的左侧，是一个普通的方法声明。\n\n```\ndef greeting()\n```\n\n在 `=` 的右侧，是一个函数字面量（一个匿名函数）。\n\
    \n```\nscala> def greeting() = (name: String) => {\"hello\" + \" \" + name}\n\
    greeting: ()String => String\n```\n\n现在你可以将 `greeting()` 赋值给一个变量。\n\n```\nscala>\
    \  val greet= greeting()\nval greet: String => String = Lambda$1261/0x000000080114c840@769b0752\n\
    ```\n\n`greet` 函数现在等同于你的匿名函数 `(name: String) => {\"hello\" + \" \" + name}`。由于匿名函数接受一个\
    \ String 参数 name，你可以向其传递一个名字。\n\n```\nscala> greet(\"Reader\")\nres0: String =\
    \ hello Reader\n```\n\n### 闭包\n\n闭包是一个函数，其返回值依赖于在该函数外部声明的一个或多个变量的值。考虑以下 `multiplier`\
    \ 函数：\n\n```\nval multiplier = (x:Int) => x * 3\n```\n\n在 `multiplier` 函数中，`y`\
    \ 是函数体中使用的变量。`x` 被定义为函数的参数。现在让我们像下面这样修改 `multiplier` 函数：\n\n```\nval multiplier\
    \ = (x: Int) => x * y\n```\n\n由于 `x` 是函数的形式参数，每次调用 `multiplier` 时它都会被绑定到一个新值。然而，`y`\
    \ 并不是形式参数。让我们进一步修改 `multiplier` 函数，如下所示：\n\n```\nvar y = 3\nval multiplier = (x:\
    \ Int) => x * y\n```\n\n现在 `y` 引用了函数外部但在封闭作用域内的一个变量。\n\n```\nscala> var y = 3\n\
    y: Int = 3\nscala> val multiplier = (x: Int) => x * y\nmultiplier: Int => Int\
    \ = \n```\n\n现在你可以像下面这样调用 `multiplier` 函数：\n\n```\nscala> multiplier(3)\nres37:\
    \ Int = 9\n```\n\n`multiplier` 函数引用了 `y`，并在每次调用时读取其当前值。Scala 编译器会创建一个闭包，将封闭作用域中的该变量包含进来。\n"
- fmt: "# Partially Applied Functions\n\nIn functional programming languages, when\
    \ you call a function that has parameters, you are said to be applying the function\
    \ to the parameters. When all parameters are passed to the function, you have\
    \ fully applied the function to all the parameters.\n\nA simple `add` function:\n\
    \n```\nscala> val add = (x: Int, y: Int) => x + y\nadd: (Int, Int) => Int = \n\
    ```\n\n`<function2>` indicates it is a function of two parameters.\n\n```\nscala>\
    \ add(1,2)\nres01: Int = 3\n```\n\nBut when you give only a subset of the parameters\
    \ to the function, the result of the expression is a partially applied function.\n\
    \n```\nval partiallyAdd = add(1, _:Int)\n```\n\nBecause you haven’t provided a\
    \ value for the second parameter, the variable `partiallyAdd` is a partially applied\
    \ function. You can see this in the REPL.\n\n```\nscala> val partiallyAdd = add(1,\
    \ _:Int)\npartiallyAdd: Int => Int = \n```\n\nThe output in the REPL shows that\
    \ `partiallyAdd` is a function that implements the `Function1` trait. Implementing\
    \ a `Function1` trait indicates that the `partiallyAdd` function takes one argument.\
    \ When you give `partiallyAdd` an `Int` value 2, you get the sum of the `Int`\
    \ number passed into the `add` and `partiallyAdd` functions:\n\n```\nscala> partiallyAdd(2)\n\
    res02: Int = 3\n```\n\nThe first argument, 1, was passed into the original `add`\
    \ function and the new function named `partiallyAdd` was created, which is a partially\
    \ applied function. Then the second argument, 2, was passed into `partiallyAdd`.\
    \ When you provide all the parameters, the original function is executed, yielding\
    \ the result.\n\n## Curried Functions\n\nCurrying converts a function with multiple\
    \ parameters, creating a chain of functions, each expecting a single parameter.\n\
    \nLet’s look at a simple `add` function that adds two `Int` parameters, `a` and\
    \ `b`, as illustrated here:\n\n```\nscala> val add = (x: Int, y: Int) => x + y\n\
    add: (Int, Int) => Int = \nscala> add(3,3)\nres38: Int = 6\n```\n\nIn Scala, curried\
    \ functions are defined with multiple parameter lists, as follows:\n\n```\ndef\
    \ add(x: Int)(y: Int) = x + y\n```\n\nYou can also use the following syntax to\
    \ define a curried function:\n\n```\ndef add(x: Int) = (y: Int) => x + y\n```\n\
    \nAs you can see, instead of one list of two `Int` parameters, you apply the curried\
    \ `add` function to two lists of one `Int` parameter. Thus, the curried `add`\
    \ function looks like this:\n\n```\nscala> def curriedAdd(a: Int)(b: Int) = a\
    \ + b\ncurriedAdd: (a: Int)(b: Int)Int\nscala> curriedAdd(2)(2)\nres1: Int = 4\n\
    ```\n\nYou could define more than two parameters on a curried function. Your `add`\
    \ function that takes two arguments is transformed into its curried equivalent.\n\
    \n## Function Compositions\n\nIn functional programming, you can compose functions\
    \ from other functions, such a `tan(x) = sin(x)/cos(x)`. An implication of composability\
    \ is that functions can be treated as values. So far, you’ve created simple functions\
    \ and manipulated the function instances. However, you can also build functions\
    \ from other functions. The `functionalTo` composition provides the basis for\
    \ a lot of cool things in Scala, including the parser combinator, which you will\
    \ explore in Chapter [8](#328789_3_En_8_Chapter.xhtml). But for now, let’s see\
    \ the difference between interpreting a series of commands and “compiling” a function\
    \ that interprets them. First, let’s define the grammar. We have expressions,\
    \ which can be constant values or named variables. Expressions can also be the\
    \ addition or multiplication of other expressions. Here’s a collection of case\
    \ classes that describes the grammar (recall that we covered case classes in Chapter\
    \ [3](#328789_3_En_3_Chapter.xhtml)):\n\n```\nsealed trait Expr\ncase class Add(left:\
    \ Expr, right: Expr) extends Expr\ncase class Mul(left: Expr, right: Expr) extends\
    \ Expr\ncase class Val(value: Int) extends Expr\ncase class Var(name: String)\
    \ extends Expr\n```\n\nWe can build expressions like `1 + 1`, `Add(Val(1), Val(1))`,\
    \ `3 * (1 + 1)`, `Mul(Val(3), Add(Val(1), Val(1)))`, and `a * 11`, `Mul(Var(\"\
    a\"), Val(11))`.\n\nYou can evaluate an expression by interpreting the expression.\n\
    \n```\ndef calc(expr: Expr, vars: Map[String, Int]): Int = expr match {\ncase\
    \ Add(left, right) => calc(left, vars) + calc(right, vars)\ncase Mul(left, right)\
    \ => calc(left, vars) * calc(right, vars)\ncase Val(v) => v\ncase Var(name) =>\
    \ vars(name)\n}\n```\n\nLet’s look at how this method works. `expr` is the expression\
    \ to evaluate, and `vars` is a `Map` that contains the variables. You use pattern\
    \ matching, which you will see in the next chapter, to determine what to do based\
    \ on the case class. If `expr` is an `Add`, you extract the left and right parameters,\
    \ which are themselves `Exprs`. You call `calc` to calculate the value of the\
    \ left and right parameters and add the results. If `expr` is `Mul`, you do the\
    \ same thing (except you multiply things rather than add them). If `expr` is `Val`,\
    \ you simply extract the value and return it. If `expr` is `Var`, you extract\
    \ the name and return the lookup of the name in the `vars` `Map`. You can turn\
    \ this from a method call into a function. Having a function allows you to pass\
    \ around the logic that the expression represents. It also means that you don’t\
    \ have to interpret the tree of `Exprs` each time. Let’s see how to compose a\
    \ function based on the `Expr`.\n\n```\ndef buildCalc(expr: Expr): Map[String,\
    \ Int] => Int = expr match {\ncase Add(left, right) =>\nval lf = buildCalc(left)\n\
    val rf = buildCalc(right)\nm => lf(m) + rf(m)\ncase Mul(left, right) =>\nval lf\
    \ = buildCalc(left)\nval rf = buildCalc(right)\nm => lf(m) * rf(m)\ncase Val(v)\
    \ => m => v\ncase Var(name) => m => m(name)\n}\n```\n\nThe `buildCalc` method\
    \ returns a function that can be passed to other functions. Also, the JVM can\
    \ optimize the composed functions so that they perform better than the interpreted\
    \ version. The performance of the composed function is better because there is\
    \ no overhead associated with pattern matching each element. The function is evaluated\
    \ by repeatedly calling the function’s `apply` method. Thus, the cost of each\
    \ node is one or two method dispatches rather than the cost of the pattern matching.\
    \ Let’s turn to other ways that functions can help improve performance and readability."
