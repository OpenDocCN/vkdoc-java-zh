    good practice is to use camel case for the names, which means that each word of
    the name needs to have the first letter in a capital case. For more information,
    you can check the official documentation^([^(23)](#fn23)). Also, don’t use an
    underscore (_) in any part of the name. (These practices are the same in Java.)
    Table [3-1](#328789_3_En_3_Chapter.xhtml#Tab1) lists bad options for a name.


    Table 3-1


    Examples of Poor Class Names


    | Class name | Wrong or correct? |

    | --- | --- |

    | `_light` | Wrong |

    | `Light` | Wrong |

    | `AbstractLight` | Correct |

    | `abstract_light` | Wrong |

    | `Abstractlight` | Wrong |


    Now it’s time to create your first class. For this example, create a class without
    any logic inside.


    ```

    scala> class Book //Define a empty class only with constructor

    // defined class Book

    ```


    A good way to see what happens when you create a class is to decompile it. To
    do this, create a file named `Book.scala` and put the declaration of the class
    in it. After that, compile the class using the command `scalac Book.scala` and
    the compiler will create the file `Book.class` ***,*** which you can decompile
    using the command `javap -c Book.class`***.***


    ```

    $ javap -c  Book.class

    Compiled from "Book.scala"

    public class Book {

    public Book();

    Code:

    0: aload_0

    1: invokespecial #9          // Method java/lang/Object."":()V

    4: return

    ```


    As you can see, there are no constructors, methods, or variables inside the class,
    just the definition. Now you’ve created your first class, but you need to instantiate
    it to use it. There two ways to do so, but the second is the best option in Scala
    3 .


    | Scala 2 | Scala 3 |

    | --- | --- |

    | `scala> val book = new Book()val book: Book = Book@50a7c72b` | `scala> val book
    = Book()val book: Book = Book@50a7c72b` |


    One last thing with creating an instance of a class: If you don’t assign the new
    class in any variable, the compiler will assign a name.


    ```

    scala> Book()

    val res0: Book = Book@bf2aa32

    ```


    ### Fields


    Fields are a type of variable that let you store certain values related to one
    instance of a class. Valid types are anything that extends from `Any`, so you
    can store the status of custom objects or simple values like Strings.


    The way to declare a field in Scala is very simple. You only need to indicate
    the type of variable with a name and add if the variable is immutable or not (`var`
    or `val`).


    ```

    scala> class Book():

    |   var quantity = 0

    // defined class Book

    ```


    You need to consider something before declaring a variable in this way. If you
    don’t explicitly indicate that the variable has restricted access, anyone can
    modify the value and you can lose control. Of course, many cases justify that
    a variable can be accessed directly but be aware that there are other options.


    To continue with the previous idea, three access control modifiers give you a
    different level of access to the fields, as shown in Table [3-2](#328789_3_En_3_Chapter.xhtml#Tab2).


    Table 3-2


    Access Control Modifiers


    | *Modifier* | *Description* | *Example* |

    | --- | --- | --- |

    | `private` | With this the modifier, only the methods in the class can access
    the fields but you can create a custom method to return the value. | `scala> class
    Book():   &#124;   private var quantity = 0// defined class Book` |

    | `protected` | With this modifier, only the methods in the class and the class
    that extends from this one can access the value. | `scala> class Book():   &#124;   protected
    var quantity = 0// defined class Book` |

    | `public` | Anyone can access and modify the values stored in the fields. | `scala>
    class Book():   &#124;   public var quantity = 0// defined class Book` |

    | `Nothing` | In this case, it is the same as public. | `scala> class Book():   &#124;   var
    quantity = 0// defined class Book` |


    When you create fields inside a class, use a name that defines the meaning of
    the field, such as *salary* or *quantity*. It is not a good practice to have fields
    with names like *a*, *b*, and *aux* because it is difficult for other developers
    to understand the meaning of those fields and it decreases the maintainability
    of the code.


    ### Constructors


    A constructor is a way to send parameters to your class at the same moment that
    you instantiate them. The main difference from other languages like Java, where
    the constructor appears in the body of the class, is that Scala gives you the
    advantage of declaring all parameters in the same definition of the class and
    internally they become the constructors. Another thing to consider is that if
    the class does not have parameters, Scala does not create a specific constructor;
    it uses the default constructor.


    The constructor does a combination of things that you need to consider in order
    to understand how it works: it accepts the parameters that you define, creates
    fields in the class, assigns the values of the variables with the same name, and
    you can add some logic inside. To create a constructor, you need to pass the parameters
    one by one, separated by a comma.


    ```

    scala> class Book(val name : String, val isbn : String)

    // defined class Book

    ```


    As in the previous section, you can decompile the code by saving this line in
    a file, compiling it, and executing the command `javap -c Book.class` *.*


    ```

    public class Book {

    public Book(java.lang.String, java.lang.String);

    Code:

    0: aload_0

    1: aload_1

    2: putfield      #12         // Field name:Ljava/lang/String;

    5: aload_0

    6: aload_2

    7: putfield      #14         // Field isbn:Ljava/lang/String;

    10: aload_0

    11: invokespecial #17         // Method java/lang/Object."":()V

    14: return

    public java.lang.String name();

    Code:

    0: aload_0

    1: getfield      #12                // Field name:Ljava/lang/String;

    4: areturn

    public java.lang.String isbn();

    Code:

    0: aload_0

    1: getfield      #14                // Field isbn:Ljava/lang/String;

    4: areturn

    }

    ```


    You can see that this is more code than in the previous sections. This is because
    Scala uses the modifier of the parameters to determine if it is necessary to create
    `set/get` methods for each attribute.'
