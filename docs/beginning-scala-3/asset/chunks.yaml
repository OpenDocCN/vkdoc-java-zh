- fmt: '# Before and After Methods


    As you know, there are many cases where before and after the execution of a test
    case you need to prepare something. You may need to initialize variables with
    specific values or create a file. Frameworks like `Junit` in Java let you use
    methods after/before the execution of each test or the entire set of tests of
    the class.


    To implement these features, just extend from `BeforeAndAfter` and create the
    `before` or `after` method.


    ```

    import org.scalatest.flatspec.AnyFlatSpec

    import org.scalatest._

    class StringBuilderTests extends AnyFlatSpec with BeforeAndAfter {

    val builder = StringBuilder()

    before {

    builder.append("Scala 3")

    }

    after {

    builder.delete(0, builder.length)

    }

    it should "append to the default string" in {

    builder.append(" introduce a lot of features")

    assert(builder.toString === "Scala 3 introduce a lot of features")

    }

    }

    ```


    # Summary


    In this chapter, you learned how to create different tests to validate if the
    code that you created works well or not. This is crucial because it reduces the
    risk of deploying a block of code with bugs to production. Also, you need to consider
    the coverage of code that your tests check.


