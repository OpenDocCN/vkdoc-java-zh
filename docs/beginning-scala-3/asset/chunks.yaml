    You define the `TimeSpan` class that represents a period. You can do math with
    other `TimeSpan`s or convert this `TimeSpan` into a `Date` by calling the `later`
    or `ago` methods. `TimeSpan` extends the `Ordered` trait so that you can compare
    and sort `TimeSpan`s.


    ```scala

