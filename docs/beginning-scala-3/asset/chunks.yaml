- fmt: "# Java Optional and Scala Option\n\nJava, like many other languages, introduces\
    \ a mechanism to reduce problems associated with null values. The name of this\
    \ mechanism is `Optional`. Scala has the same concept but with the name of `Option`.\n\
    \nScala provides a converter to transform the response of a block of code in Java\
    \ that uses `Optional` to `Option` because, as you read in the first chapters\
    \ of this book, the types are not exactly the same in both languages (for example,\
    \ in Java, you can use `Integer` or `int`, but in Scala, you can just use `Int`).\n\
    \nDeclaring an `Optional` value in Java is like doing it in Scala. Here is the\
    \ Java code:\n\n```\nimport java.util.Optional;\npublic class JBook {\npublic\
    \ Optional calculatePrice() {\nreturn Optional.empty();\n}\npublic Optional getName()\
    \ {\nreturn Optional.of(\"IT\");\n}\n}\n```\n\nHere is the Scala code:\n\n```\n\
    class SBook:\ndef calculatePrice(): Option[Integer] = None\ndef getName(): Option[String]\
    \ = Option(\"IT\")\n```\n\nAs you can see, the syntaxes are more or less the same.\
    \ The next step is to use an `Optional` value in Scala and transform it to an\
    \ `Option` value, which is the correct type to use.\n\nNow let’s see how you can\
    \ use and transform from `Optional` to `Option` in Scala.\n\n```\nimport java.util.Optional\n\
    import scala.jdk.javaapi.OptionConverters\nval optionalPrice = Optional.of(1)\
    \ //Optional(1)\nval optionPrice = OptionConverters.toScala(optionalPrice) //Some(1)\n\
    val optionName = Some(\"Beginning Scala\") //Some\nval optionalName = OptionConverters.toJava(optionName)//Optional\n\
    ```\n\nAs you can see, the way to transform made easy by using a special converter\
    \ that exists in Scala. The inverse process is more or less the same. Let’s modify\
    \ this example to return `Option` instead of `Optional`.\n\n```\nimport java.util.Optional;\n\
    import scala.jdk.javaapi.OptionConverters;\npublic class JBook {\npublic Option\
    \ calculatePrice() {\nreturn OptionConverters.toScala(Optional.empty());\n}\n\
    public Option getName() {\nreturn OptionConverters.toScala(Optional.of(\"IT\"\
    ));\n}\n}\n```\n\n## Use Java Collections in Scala\n\nIn Chapter [6](#328789_3_En_6_Chapter.xhtml),\
    \ you read a lot about collections in Scala and how to improve the performance\
    \ instead of the same collections of Java, but these reasons do not reduce the\
    \ chance that you can use Java collections in Scala, or vice versa, to zero.\n\
    \nScala provides a set of classes and methods that convert from one collection\
    \ to another of different languages. The following code shows how to create a\
    \ `Seq` in Scala and transform it into a Java object:\n\n```\nscala> import scala.jdk.javaapi.CollectionConverters\n\
    scala> val seq = Seq(1,2,3)\nval seq: Seq[Int] = List(1, 2, 3)\nscala> val list\
    \ = CollectionConverters.asJava(seq)\nval list: java.util.List[Int] = [1, 2, 3]\n\
    ```\n\nNow do it in an inverse way in Scala. This code shows how from a Java collection\
    \ you can create a Scala collection. You create an `ArrayList` and transform it\
    \ to a `Buffer`.\n\n```\nscala> import scala.jdk.javaapi.CollectionConverters\n\
    scala> import java.util.List\nscala> import java.util.ArrayList\nscala> val javaObject\
    \ = java.util.ArrayList(java.util.List.of(1,2,3))\nscala> val scalaObject = CollectionConverters.asScala(javaObject)\n\
    val scalaObject: scala.collection.mutable.Buffer[Int] = Buffer(1, 2, 3)\n```\n\
    \nYou can use the same converter to do the same operations in your Java applications,\
    \ but first, you need to understand the equivalence between the collections of\
    \ Java and Scala. Table [9-1](#328789_3_En_9_Chapter.xhtml#Tab1) shows you the\
    \ correlations between the languages.\n\n**Table 9-1** Correlations Between the\
    \ Different Collections\n\n| *Scala* | *Java* |\n| --- | --- |\n| `scala.collection.Iterable`\
    \ | `java.lang.Iterable` |\n| `scala.collection.Iterator` | `java.util.Iterator`\
    \ |\n| `scala.collection.mutable.Buffer` | `java.util.List` |\n| `scala.collection.mutable.Set`\
    \ | `java.util.Set` |\n| `scala.collection.mutable.Map` | `java.util.Map` |\n\
    | `scala.collection.concurrent.Map` | `java.util.concurrent.ConcurrentMap` |\n\
    \nTake into consideration that if you want to use Scala code in a Java project,\
    \ you need to include one dependency that provides all the methods and the classes\
    \ to use it. The following code shows the correct dependency to include (check\
    \ the version noted and update it if necessary in your code).\n\n```\n<dependency>\n\
    \    <groupId>org.scala-lang</groupId>\n    <artifactId>scala3-library_3</artifactId>\n\
    \    <version>3.0.2</version>\n</dependency>\n```\n\n## Summary\n\nThis chapter\
    \ showed how Scala is translated to Java, which is especially important if you\
    \ call Scala code from Java. You learned that in most cases, Scala features are\
    \ translated to Java features so that Scala can easily integrate with Java. You\
    \ learned how to handle features that are available in Java but not in Scala,\
    \ such as static members and checked exceptions, and how to use Scala features\
    \ such as traits in Java code. You also learned how Scala annotations help in\
    \ integration, such as by generating JavaBean-style `get` and `set`. Scala code\
    \ is often used in tandem with large Java programs and frameworks.\n\n# DSL and\
    \ Parser Combinator\n\nA domain-specific language (DSL) is a special-purpose language\
    \ designed to express solutions to problems that belong to a particular problem\
    \ domain. DSLs have an advantage over a general-purpose language such as Scala\
    \ and Java. Unfortunately, these general-purpose languages have drawbacks. For\
    \ example, if you want to execute a task on a database, then it is necessary to\
    \ write a computer program to execute this task using a general-purpose language.\
    \ However, a DSL could be used to perform several such tasks on a database. And\
    \ this is why some experts regard SQL as a DSL. The scope of this chapter is to\
    \ introduce you to the world of DSLs and how they interact with Scala.\n\nSome\
    \ well-known examples of DSLs include ErlangOTP^([^(35)](#fn35)), HTML, SQL, Verilog^([^(36)](#fn36)),\
    \ Mathematica^([^(37)](#fn37)), YACC^([^(38)](#fn38)), Xpath^([^(39)](#fn39)),\
    \ CSS^([^(40)](#fn40)), YAML^([^(41)](#fn41)), MATLAB^([^(42)](#fn42)), and ANT."
  raw: '## Java Optional and Scala Option


    Java, like many other languages, introduces a mechanism to reduce problems associated
    with null values. The name of this mechanism is `Optional` . Scala has the same
    concept but with the name of `Option`.


    Scala provides a converter to transform the response of a block of code in Java
    that uses `Optional` to `Option` because, as you read in the first chapters of
    this book, the types are not exactly the same in both languages (for example,
    in Java, you can use Integer or int, but in Scala, you can just use Int).


    Declaring an `Optional` value in Java is like doing it in Scala. Here is the Java
    code:


    ```

    import java.util.Optional;

    public class JBook {

    public Optional calculatePrice() {

    return Optional.empty();

    }

    public Optional getName() {

    return Optional.of("IT");

    }

    }

    ```


    Here is the Scala code:


    ```

    class SBook:

    def calculatePrice(): Option[Integer] = None

    def getName(): Option[String] = Option("IT")

    ```


    As you can see, the syntaxes are more or less the same. The next step is to use
    an `Optional` value in Scala and transform it to an `Option` value, which is the
    correct type to use.


    Now let’s see how you can use and transform from `Optional` to `Option` in Scala.


    ```

    import java.util.Optional

    import scala.jdk.javaapi.OptionConverters

    val optionalPrice = Optional.of(1) //Optional(1)

    val optionPrice = OptionConverters.toScala(optionalPrice) //Some(1)

    val optionName = Some("Beginning Scala") //Some

    val optionalName = OptionConverters.toJava(optionName)//Optional

    ```


    As you can see, the way to transform made easy by using a special converter that
    exists in Scala. The inverse process is more or less the same. Let’s modify this
    example to return `Option` instead of `Optional`.


    ```

    import java.util.Optional;

    import scala.jdk.javaapi.OptionConverters;

    public class JBook {

    public Option calculatePrice() {

    return OptionConverters.toScala(Optional.empty());

    }

    public Option getName() {

    return OptionConverters.toScala(Optional.of("IT"));

    }

    }

    ```


    ## Use Java Collections in Scala


    In Chapter [6](#328789_3_En_6_Chapter.xhtml), you read a lot about collections
    in Scala and how to improve the performance instead of the same collections of
    Java, but these reasons do not reduce the chance that you can use Java collections
    in Scala, or vice versa, to zero.


    Scala provides a set of classes and methods that convert from one collection to
    another of different languages. The following code shows how to create a `Seq`
    in Scala and transform it into a Java object:


    ```

    scala> import scala.jdk.javaapi.CollectionConverters

    scala> val seq = Seq(1,2,3)

    val seq: Seq[Int] = List(1, 2, 3)

    scala> val list = CollectionConverters.asJava(seq)

    val list: java.util.List[Int] = [1, 2, 3]

    ```


    Now do it in an inverse way in Scala. This code shows how from a Java collection
    you can create a Scala collection. You create a `ArrayLIst` and transforming it
    to a `Buffer`.


    ```

    scala> import scala.jdk.javaapi.CollectionConverters

    scala> import java.util.List

    scala> import java.util.ArrayList

    scala> val javaObject = java.util.ArrayList(java.util.List.of(1,2,3))

