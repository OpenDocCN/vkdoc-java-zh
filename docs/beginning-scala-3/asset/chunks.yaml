    def later = new Date(millis + TimeHelpers.millis)

    def ago = new Date(TimeHelpers.millis - millis)

    def +(in: TimeSpan) = TimeSpan(this.millis + in.millis)

    def -(in: TimeSpan) = TimeSpan(this.millis - in.millis)

    def compare(other: TimeSpan) = millis compare other.millis

    ```


