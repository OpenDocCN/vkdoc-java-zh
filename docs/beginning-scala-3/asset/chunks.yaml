    ## 应用程序流程


    现在，是时候了解 Play Framework 应用程序的流程是如何工作的了，从浏览器发起的请求到生成响应的工具（对于 REST API，响应可能是 HTML
    或 JSON）。请查看图 [12-6](#328789_3_En_12_Chapter.xhtml#Fig6) 以了解应用程序中的不同层。


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig6_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig6_HTML.png)


    **图 12-6** Play Framework 中的 MVC


    图 [12-6](#328789_3_En_12_Chapter.xhtml#Fig6) 所示的 MVC 架构中的请求流程包括以下内容：


    - 路由器中介 HTTP 请求，并确定控制器中定义的处理此请求的动作。

    - 控制器监听 HTTP 请求，从请求中提取适当的数据，并对模型应用更改。此外，控制器渲染模板文件以生成视图。

    - 动作方法的结果最终作为 HTTP 响应发送。


    ### 路由器


    路由器是 Web 应用程序的主要入口点，通过 `conf/routes` 文件定义应用程序所需的路由。每个路由包含一个 HTTP 方法和一个 URI 模式。对动作方法的调用与
    URI 相关联。`conf/routes` 是内置组件 Router 使用的配置文件，该组件将每个传入的 HTTP 请求转换为动作调用。


    > **注意**：HTTP 方法可以是 HTTP 支持的任何有效方法（GET、POST、PUT、DELETE 和 HEAD）。


    路由器负责中介和转换传入的 HTTP 请求为动作。Web 应用程序将 HTTP 请求视为一个事件，该事件由请求路径（包括查询字符串）和 HTTP 方法（例如
    GET、POST 等）组成。路由在 `conf/routes` 文件中定义。此文件会被编译，如果存在任何错误，您可以直接在浏览器中看到它们，而无需重新编译代码或重启服务器。当路由文件被修改时，它会自动重新加载。此功能称为热重载。


    如果您打开包含应用程序不同路由的文件，您将看到类似以下内容：


    ```

    # An example controller showing a sample home page

    GET     /                           controllers.HomeController.index()

    # Map static resources from the /public folder to the /assets URL path

    GET     /assets/*file               controllers.Assets.versioned(path="/public",
    file: Asset)

    ```


    如您所见，路由的声明很简单。您需要指定 HTTP 方法、路由以及哪个控制器接收请求以生成响应。


    现在，如果您编写一个在路由文件中未定义的 URL，您将在浏览器或用于消费 REST API 的工具（如 Postman^([75](#fn75)) 或 Insomnia^([76](#fn76))）中看到类似图
    [12-7](#328789_3_En_12_Chapter.xhtml#Fig7) 的异常。


    ![../images/328789_3_En_12_Chapter/328789_3_En_12_Fig7_HTML.png](images/328789_3_En_12_Chapter/328789_3_En_12_Fig7_HTML.png)


    **图 12-7** 显示 Play Framework 无法访问路由的异常


    ### 控制器


    控制器响应请求，处理它们，并调用对模型的更改。Play Framework 中的控制器是一个扩展 `Controller` 类型的 Scala 对象。此 `Controller`
    类型在 `play.api.mvc` 包中提供。Play Framework 中的控制器包含一个称为动作的函数，用于处理请求参数并生成要发送给客户端的结果。默认情况下，控制器在源根目录下的
    `controllers` 包中定义，即 `app` 文件夹。Java 中的 `Controller` 是一个类，包含一个称为动作的公共静态方法。


    > **注意**：控制器是一种类型，它扩展了 `play.api.mvc` 包中提供的 `Controller`。


    ### 模型


    模型是应用程序操作的信息（以数据结构和操作的形式）的领域特定表示。最常用于此类表示的对象是 JavaBean。然而，JavaBean 会导致大量样板代码。Play
    Framework 通过字节码增强为您生成 getter 和 setter，从而减少了这种样板代码。模型对象可能包含持久化构件，例如如果需要保存到持久化存储中，则包含
    JPA 注解。


    ### 视图


    在基于 Java EE 的 Web 应用程序中，视图通常使用 JSP 开发。也就是说，基于 Java EE 的 Web 应用程序中的视图由 JSP 元素和模板文本组成。由于
    Play 并非以 Java EE 为中心，因此视图包含一个混合了 HTML 和 Scala 代码的模板。在 Play 1 中，模板基于 Groovy，但从
    Play 2 开始，模板基于 Scala。使用 Play 2，您可以开发基于 Java 和 Scala 的 Web 应用程序，并且模板完全相同。


    > **注意**：在 Play 1 中，模板基于 Groovy，但从 Play 2 开始，模板基于 Scala。


    如果您创建一个 REST API，则您的应用程序中不存在视图组件，因为控制器将以 JSON 格式生成响应。


