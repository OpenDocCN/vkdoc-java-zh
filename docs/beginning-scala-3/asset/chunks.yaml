- fmt: '# 5. Pattern Matching


    So far, you’ve explored some of the basic functional cornerstones of Scala: immutable
    data types and the passing of functions as parameters. The third cornerstone of
    functional programming is pattern matching. Pattern matching provides a powerful
    tool for declaring business logic in a concise and maintainable way. Scala blends
    traditional functional programming pattern matching with object-oriented concepts
    to provide a very powerful mechanism for writing programs. In this chapter, you’re
    going to explore the basics of pattern matching. Then you’re going to see how
    Scala’s case classes bridge object-oriented data encapsulation and function decomposition.
    Next, you’ll see how Scala’s pattern-matching constructs become functions that
    can be passed around and composed. Let’s look at a simple example first.


    ## Basic Pattern Matching


    Pattern matching allows you to make a programmatic choice between multiple conditions,
    such as if Boolean `x` is true, print a “true” message, and if `x` is false, print
    a “false” message. However, don’t let this simple example beguile you into underestimating
    the true power of Scala’s pattern matching. Scala’s pattern matching allows your
    cases to be far more complex than merely a case of whether `x` is true or false.
    In Scala, your cases can include types, wildcards, sequences, regular expressions,
    and so forth.


    ```

    scala> def printNum(int: Int) =

    int match

    case 0 => println("Zero")

    case 1 => println("One")

    case _ => println("more than one")

    def printNum(int: Int): Unit

    ```


    Now execute the object with different parameters and check what happens with the
    results.


    ```

    scala> printNum(0)

    Zero

    scala> printNum(1)

    One

    scala> printNum(2)

    more than one

    ```


    As you can see, there are no big ideas in the previous block of code. It just
    prints *zero*, *one*, or *more than one*. However, notice the last case with the
    underscore (`_`) wildcard. It matches anything not defined in the cases above
    it, so it serves the same purpose as the `default` keyword in Java and C# switch
    statements. If you are unfamiliar with the switch statement in Java or C#, don’t
    worry. It just means that if you try to put a `case _` before any other case clauses,
    the compiler will throw an unreachable code error on the next clause, as shown
    in the example below, because nothing will get past the `case _` clause so `case
    _` serves as a default.


    ```

    scala> def printNum(int: Int) =

    int match

    case _ => println("more than one")

    case 0 => println("Zero")

    case 1 => println("One")

    ```


    When you try to create that object, some errors appear in your console.


    ```

    def printNum(int: Int): Unit

    4         case 0 => println("Zero")

    ^

    Unreachable case

    5         case 1 => println("One")

    ^

    Unreachable case

    ^

    ```


    Now see what happens in following code when your pattern matching does not have
    a default value and you pass a value that does not have a case:


    ```

    scala> def printNum(int: Int) =

    int match

    case 0 => println("Zero")

    case 1 => println("One")

    scala> printNum(2)

    scala.MatchError: 2 (of class java.lang.Integer)

    at rs$line$9$.printNum(rs$line$9:4)

    ... 28 elided

    ```


    Scala not only offers `_` to define the default behavior in a pattern matching
    expression, but you can also use any other word that does the same. Look the example
    below with the use of `default` instead of `_`:


    ```

    scala> def printNum(int: Int) =

    int match

    case 0 => println("Zero")

    case 1 => println("One")

    case default => println("more than one")

    def printNum(int: Int): Unit

    scala> printNum(2)

    more than one

    ```


    Pattern matching, at its core, is a complex set of `if/else` expressions that
    lets you select from several alternatives. At first glance, if we are allowed
    to unabashedly assume that you are from a Java background, pattern matching looks
    a lot like Java’s switch statement, but you will notice several key differences
    in even Java’s simplest case. Let’s analyze this by writing one example using
    both Scala’s pattern matching and Java’s switch statement. The following block
    illustrates an example of calculating Fibonacci numbers:


    ```

    scala> def fibonacci(in: Int): Int =

    in match

    case 0 => 0

    case 1 => 1

    case n => fibonacci(n - 1) + fibonacci(n - 2)

    def fibonacci(in: Int): Int

    ```


    Let’s write the same code in Java:


    ```

    public int fibonacci(int in) {

    switch (in) {

    case 0:

    return 0;

    case 1:

    return 1;

    default:

    return fibonacci(in - 1) + fibonacci(in - 2);

    }

    }

    ```


    You will notice the following differences between the two examples:


    *   There’s no `break` statement between cases in Scala, whereas you need to `break`
    or `return` at the end of the case in Java.

    *   The last case in Scala assigns the default value to the variable `n`. Pattern
    matching in Scala is also an expression that returns a value.


    We just pointed out several key differences in the Fibonacci example written using
    both Scala’s pattern matching and Java’s switch statement. Take into consideration
    that the latest version of Java has some features that Scala has offered since
    version 2.12.x.


    We will now show that it gets even better with Scala’s pattern matching by modifying
    the above code.


    Scala allows guards to be placed in patterns to test particular conditions that
    cannot be tested in the pattern declaration itself. Thus, you can write your Fibonacci
    calculator to return 0 if a negative number is passed in, like so:


    ```

    def fib2(in: Int): Int =

    in match

    case n if n <= 0 => 0

    case 1 => 1

    case n => fib2(n - 1) + fib2(n - 2)

    ```


    `case n if n <= 0 => 0` is the first test in the pattern. The test extracts the
    value into the variable `n` and tests `n` to see whether it’s zero or negative
    and returns 0 in that case. Guards are very helpful as the amount of logic gets
    more complex. Note that the case statements are evaluated in the order that they
    appear in the code. Thus, `case n if n <= 0 =>` is tested before `case n =>`.
    Under the hood, the compiler may optimize the pattern and minimize the number
    of tests, cache test results, and even cache guard results.


    One last thing to consider is that you can have multiple values with the same
    behavior, so you don’t need to define much time the same block of code. Instead,
    you can combine all the logic in one case using `|`. Check the following block
    of code, which has a behavior when receiving -1 or -2:


    ```

    scala> def printNum(int: Int) =

    int match

    case 0 => println("Zero")

    case 1 => println("One")

    case -1 | -2 => println("less than zero")

    case _ => println("more than one")

    scala> printNum(-2)

    less than zero

    ```


    ### Matching Any Type


    Let’s consider a list of any type of element, containing a `String`, a `Double`,
    an `Int`, and a `Char`:


    ```

    val anyList = List(1, "A", 2, 2.5, ''a'')

    ```


    You decide to let the user know of the `Int`, `String`, and `Double` type from
    the `List` using the following code:


    ```

    scala> for (m <- anyList) {

    m match

    case i: Int => println("Integer: " + i)

    case s: String => println("String: " + s)

    case f: Double => println("Double: " + f)

    case other => println("other: " + other)

    }

    ```


    In the console of the REPL appears something like this:


    ```

    Integer: 1

    String: A

    Integer: 2

    Double: 2.5

    other: a

    ```


    This code has deep implications, as you will learn in the section that follows.'
