  # 9. MmgCore API 简介


  本书的第二部分包含对游戏引擎运行时代码的全面回顾。这些代码同时存在于 Java 和 C# 中，并包含在主项目的 MmgCore 包（如果你使用 C#，则为命名空间）下。MmgCore
  API 负责处理命令行参数、处理游戏引擎配置文件、创建游戏窗口、路由输入、管理游戏屏幕等等。


  在许多游戏引擎实现中，都有一个“播放器”设计用于运行编译后的游戏代码。在我们的实现中，运行时代码作为编译后游戏的一部分被包含在内。这是通过将游戏引擎的所有核心功能包含在
  MmgCore API 中来实现的。因此，创建的任何游戏都将包含所有运行时代码，这允许你根据需要对其进行控制和定制。最终，我认为让运行时代码更易获取并成为游戏的一部分是更好的决定。


  ## 运行时 API 概述


  在我们进行详细的代码审查之前，让我们先谈谈 MmgCore API。这个 API 在 C#/MonoGame 和 Java/Swing 实现之间存在最多的差异。尽管两个
  API 在功能上是等价的，但我想讨论一下这两个实现之间的一些主要区别。


  两个实现之间的一个主要区别是 `MainFrame` 类在 C# 实现中不存在。这是因为 Java 实现使用 Swing 来驱动游戏的窗口，并且存在一个框架（frame）的概念来容纳游戏面板。在
  C# 实现中，没有主框架，该功能已移入一个混合游戏面板类中。


  你会发现两个实现都存在等效的方法，并且相同的代码只是位于略有不同的位置。无论如何，在 C# 中跟进应该仍然非常容易。我应该提到的另一个实现差异是，在 C# 版本中，某些操作无法在线程上执行。这是因为这些操作需要访问图形上下文，而图形上下文不是线程安全的。在
  C# 版本中，使用一组旨在将工作从子线程移动到主线程的类来克服此限制。


  我想提到的下一个区别是，单元测试也需要访问图形上下文。为了克服这个限制，单元测试通过命令行参数从主游戏线程执行。测试输出被转储到标准输出。


  不同的操作系统之间，当然还有 C# 和 Java 实现之间，可能存在不同的键盘代码。为了克服这个限制，有一个全局标志可以启用键码转换方法。你可以使用此方法创建一组统一的键盘代码。该设置可以在
  `GameSettings` 类中找到，特别是 `INPUT_NORMALIZE_KEY_CODE` 字段。


  类似地，系统字体在不同的操作系统以及游戏引擎的 C# 和 Java 版本之间渲染略有不同。大多数情况下，你应该使用图像作为文本，而不是 `MmgFont` 对象；但无论如何，有一个全局标志可以打开字体位置调整方法。此方法允许你在平台之间标准化字体定位。该标志可以在
  MmgBase API 的 `MmgPen` 类中找到，特别是 `FONT_NORMALIZE_POSITION` 字段。


  我应该提到的最后一个主要区别是字体。在 Java 中，字体可以动态调整大小，你可以根据需要创建不同大小的字体。在 C# 版本中，字体必须提前准备好。为了克服 C#
  实现中的这一差异，我们加载了从 1 号到 50 号的默认字体，并为游戏引擎设置了 50 号的最大字体大小。


  我们可以通过预加载所有可能使用的字体来模拟 Java 版本即时创建新字体的能力。通过这种方式，我们克服了两个实现之间的技术差异。在本书中，我们将主要遵循 Java
  代码，但你应该能够毫不费力地在 C# 中跟进。以下是本书这部分将涵盖的类的总结。


