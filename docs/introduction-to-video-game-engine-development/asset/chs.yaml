- "# 1. MmgBase API 简介\n\n本书第一部分全面回顾了一个用 Java 和 C#编写的 2D 游戏引擎。两种实现均随本书提供，并附有完整的代码文档、137\
  \ 个用于验证 API 功能的单元测试、一个演示关键游戏引擎特性的示例程序，以及两个完整的游戏——您将在我的些许帮助下自行构建。然而，就像任何优秀的电视烹饪节目一样，每个游戏也附带一份完成的副本，以便您可以对照预期结果进行工作。\n\
  \n![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig1_HTML.jpg](img/508392_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\nNetBeans IDE 安装 1\n\n随附的游戏引擎包含两个 API：一个低级 API，包含许多游戏构建工具，如精灵、声音、容器、游戏屏幕、UI\
  \ 小部件、事件处理程序等；以及一个中级 API，负责启动游戏并加载设置和资源。通过这种方式，游戏引擎被表达为一个软件开发工具包，包含两个核心 API，并附带大量示例和文档。\n\
  \n您可能想知道这个游戏引擎需要什么样的播放器以及它的要求是什么，但这个游戏引擎不使用播放器。相反，游戏与引擎代码一起编译，因此您制作的每个游戏都是游戏引擎运行时代码和游戏引擎类的完整副本。这使您能够完全控制并全面查看驱动引擎的代码。\n\
  \n通过本书的学习，您将了解游戏引擎是如何构建的，并且您将能够访问一个需要 NetBeans 的 Java/Swing 实现和一个需要 Visual Studio\
  \ 的 C#/MonoGame 实现。Java 版本使用带有 OpenGL 加速的 Swing，可在任何运行 Java 的平台上运行——Windows、Mac\
  \ OSX、Linux 等。\n\nC#版本运行在 SDL（Simple DirectMedia Layer）上，并使用 OpenGL 和 OpenAL。通过能够探索一个\
  \ 2D 游戏引擎在多个平台上的实现，您将获得构建和使用游戏引擎的宝贵经验和知识。当您审阅本书并比较跨平台实现时，API 抽象和通用 2D 游戏引擎设计的复杂性将变得显而易见。\n\
  \nMonoGame 是一个免费、开源的游戏开发技术，基于微软已停用的 XNA SDK。社区在复活该软件方面做了出色的工作，并利用最新的工具和技术使 MonoGame\
  \ 能够在以下平台上运行：\n\n*   Windows\n\n*   Mac\n\n*   Linux\n\n*   Android\n\n*   iOS\n\
  \n*   PlayStation 4\n\n*   PlayStation Vita\n\n*   Xbox One\n\n*   Nintendo Switch\n\
  \n*   Google Stadia\n\n来源：[`https://docs.monogame.net/articles/platforms/0_platforms.html`](https://docs.monogame.net/articles/platforms/0_platforms.html)\n\
  \n无论您的编码经验或首选平台如何，您都可以选择使用 Java 或 C#代码库。您将能够用您的新游戏瞄准多个不同的平台，更重要的是，您将能够直接控制游戏引擎中的每一行代码。这真是令人兴奋。让我们开始吧！\n\
  \n\n## 游戏引擎 SDK 概述\n\n在详细审视各个类与示例代码之前，我们先来聊聊 MmgGameApi。通常，当我提到 MmgGameApi 时，指的是\
  \ Java 和 C# 两种实现。事实上，底层 API 的实现约有 95% 是相同的。只有到了中层 API，才会出现较大的差异。\n\n话虽如此，C#/MonoGame\
  \ 的实现比 Java/Swing 的实现效率更高。这与游戏引擎代码本身无关，而完全取决于两种实现所使用的框架。C#/MonoGame 实现是为游戏而构建的，因此整体运行速度比\
  \ Java/Swing 实现更快。不过，两者都是实现你的下一款 2D 游戏的可行方案。\n\n我们来聊聊 MmgGameApiJava 项目的包。这些包与 MmgGameApiCs\
  \ 项目的命名空间相对应。你会看到很多特性，无论是在编程语言本身还是在 API 实现中，从实现角度来看可能完全不同，但在功能上是等价的。\n\n## 包/命名空间\n\
  \n1.  net.middlemind.MmgGameApiJava.MmgBase\n\n    net.middlemind.MmgGameApiCs.MmgBase\n\
  \n    这是游戏引擎 SDK 中最底层的 API。它位于底层框架技术之上。对于 Java 项目，它接入的是 Java Swing 和 AWT API。对于\
  \ C# 项目，它接入的是使用 OpenGL 和 OpenAL 的 MonoGame API。\n\n2.  net.middlemind.MmgGameApiJava.MmgCore\n\
  \n    net.middlemind.MmgGameApiCs.MmgCore\n\n    这是游戏引擎 SDK 中的中层 API。它位于底层 API（MmgBase）和实际游戏实现之间。它负责处理诸如设置应用程序窗口和绘制表面、加载资源以及处理输入等任务。它还处理基于\
  \ XML 的配置、事件以及更健壮的游戏屏幕。\n\n3.  net.middlemind.MmgGameApiJava.MmgTestSpace\n\n  \
  \  net.middlemind.MmgGameApiCs.MmgTestSpace\n\n    这个包代表应用程序层，实际上并不是 SDK API。它是一个包含运行时代码的\
  \ SDK 实现示例。执行此应用程序时，它会演示如何使用 MmgBase 和 MmgCore API 中的类。\n\n那么，接下来，让我们从最底层的 API（MmgBase\
  \ API）开始进行代码审查。我们将按逻辑顺序介绍关键类。这将让你扎实地理解事物是如何运作的，以及一个通用游戏引擎从代码、类及其交互的角度是如何设计和构建的。最后，我们将在每个类的审查结束时，通过一个使用该类的演示来结束，为你提供一个坚实的基础。\n\
  \n我们在本文中将要介绍的类大致分为以下几类。\n\n### 基础类\n\n*   MmgObj\n\n*   MmgColor\n\n*   MmgRect\n\
  \n*   MmgFont\n\n*   MmgSound\n\n*   MmgPen\n\n*   MmgVector2\n\n*   MmgBmp\n\n\
  ### 辅助类\n\n*   MmgApiUtils\n\n*   MmgHelper\n\n*   MmgScreenData\n\n*   MmgFontData\n\
  \n*   MmgDebug\n\n*   MmgBmpScaler\n\n*   MmgMediaTracker\n\n### 高级类\n\n*   Mmg9Slice\n\
  \n*   MmgContainer\n\n*   MmgLabelValuePair\n\n*   MmgLoadingBar\n\n*   MmgSprite\n\
  \n*   MmgDrawableBmpSet\n\n### 控件类\n\n*   MmgTextField\n\n*   MmgTextBlock\n\n*\
  \   MmgScrollVert\n\n*   MmgScrollHor\n\n*   MmgScrollHorVert\n\n*   MmgMenuContainer\n\
  \n*   MmgMenuItem\n\n### 屏幕类\n\n*   MmgSplashScreen\n\n*   MmgLoadingScreen\n\n\
  *   MmgGameScreen\n\n### 动画类\n\n*   MmgPulse\n\n*   MmgPosTween\n\n*   MmgSizeTween\n\
  \n### 其他类\n\n*   MmgCfgFileEntry\n\n*   MmgEvent\n\n*   MmgEventHandler\n\n市面上有很多用于创建游戏的强大工具。其中许多工具要求你学习一门编程语言、一个框架\
  \ API、游戏创作软件、游戏引擎 API 以及一个用于编写代码的 IDE。这对初学者来说可能是一个艰巨的挑战。\n\n本书希望通过从代码层面向你展示 2D 游戏引擎的工作原理，让你的电子游戏创作之旅变得精彩。通过让你接触游戏引擎的两种不同实现，如果你选择用两种语言审查代码，你将获得使用两种\
  \ IDE 的经验。利用这里提供的工具，你将能够构建自己的游戏，并积累直接用代码编写游戏的宝贵经验。\n\n虽然你在这里获得的一些知识将特定于某个代码库，但其中大部分将是通用的、广泛的知识，你可以将其应用于未来的项目和游戏开发经验中。\n\
  \n## 设置你的环境\n\n本书附带的代码有两种形式：Java 和 C#。话虽如此，本书主要遵循 Java 代码。所有的方法分解都是在审查 Java 代码时完成的。但是，有一个完整的\
  \ C# 游戏引擎实现，并且 MmgBase API 在两个引擎版本之间非常相似。\n\n如果你愿意，可以跟随 C# 项目，但由于行号差异，你需要多做一点工作。我建议先跟随\
  \ Java 代码，在完全吸收 Java 代码后再查看 C# 代码。这应该会让你更注意到两种实现之间的差异，而非相似之处。\n\n接下来的部分将向你展示如何设置环境，以便在\
  \ NetBeans（针对 Java 项目）和 Visual Studio（针对 C# 项目）中查看相关项目。\n\n\n\n## 安装 NetBeans IDE\n\
