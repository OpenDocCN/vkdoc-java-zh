  \ 项目已设置并配置完成。我们可以开始编码了！\n\n\n\n## 新建项目：C#/Visual Studio IDE\n\n在本节中，我们将回顾使用您刚刚了解的游戏引擎\
  \ API，在 C# 中创建一个全新游戏开发项目所需的步骤。我们将概述该游戏引擎 C# 版本的创建流程。\n\n接下来，您需要打开一个终端程序。有关如何找到适用于您特定操作系统的终端程序，请参考互联网上的详细信息。在终端中，运行以下命令以确保您已安装\
  \ MonoGame 项目模板。同样，关于如何设置 C#/MonoGame 环境的更多信息，请参考第 1 章：\n\n```\ndotnet new -i MonoGame.Templates.CSharp::3.8.0.1641\n\
  ```\n\n完成后，导航到您存放 Visual Studio 项目的目录。该文件夹中应包含 `MmgGameApiCS` 项目。运行以下命令，为“PongClone”游戏创建一个新的\
  \ MonoGame 开发项目：\n\n```\ndotnet new mgdesktopgl –o PongClone\n```\n\n命令运行完毕后，您的\
  \ Visual Studio 项目目录中应出现一个名为“PongClone”的新项目文件夹。在接下来的几个步骤中，我们将致力于正确配置游戏项目。首先，让我们获取游戏资源文件夹的副本并将其添加到项目中。\n\
  \n使用您偏好的文件夹导航工具，找到并打开 Visual Studio 项目目录中的“MmgGameApiCs”文件夹。找到其中的“cfg”文件夹并打开。您应该会看到一个名为“asset_src”的文件夹；打开它，找到名为“pong_clone_resources”的文件夹。打开该目录，复制其中的“cfg”文件夹。\n\
  \n现在，导航到您刚刚创建的“PongClone”项目文件夹。将“cfg”目录粘贴到项目的根文件夹中。接下来，我们必须配置“PongClone”项目，并向其中添加一些库，以便我们能够访问游戏引擎\
  \ API。在下一步中，我们必须确保游戏引擎项目已构建完成，这样我们才能引用生成的 .Net 库。\n\n为此，请打开“MmgGameApiCs”项目；加载完成后，从\
  \ IDE 菜单中选择“生成”，然后选择“重新生成”。让项目进行编译，并确保在 IDE 的“生成输出”视图中看到成功的生成结果。现在我们有了一个可以引用的库，请关闭“MmgGameApiCs”项目，然后打开您刚刚创建的“PongClone”项目。\n\
  \n加载完成后，右键单击“解决方案”视图中的“依赖项”文件夹，然后从上下文菜单中选择“添加引用...”。在“引用”弹出窗口中，单击“.Net 程序集”选项卡，然后单击“浏览...”按钮。导航到\
  \ Visual Studio 项目目录中的“MmgGameApiCs”文件夹。找到以下文件并将其添加到项目的引用中。单击“确定”按钮关闭“引用”弹出窗口：\n\
  \n```\n./MmgGameApiCs/bin/Debug/netcoreapp3.1/MmgGameApiCs.dll\n```\n\n您的项目“引用”弹出窗口应类似于以下截图。\n\
  \n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg](img/508392_1_En_16_Fig5_HTML.jpg)\n\
  \n图 16-5\n\nC# 项目设置 1\n\n在开始编码之前，我们还需要向项目添加几个 NuGet 包。从 IDE 菜单中选择“项目”，然后单击“管理 NuGet\
  \ 包...”选项。当“管理 NuGet 包”弹出窗口加载完成后，使用弹出窗口右上角的搜索栏搜索包“MonoGame.Framework.Content.Pipeline”。\n\
  \n在左侧列表中查找该包，并勾选该包条目旁边的复选框。接下来，搜索名为“MSTest.TestFramework”的包。也勾选该包列表旁边的复选框，然后单击弹出窗口右下角的“添加包”按钮。接受任何带有许可提示的弹出对话框，这些包将被安装并准备就绪。\n\
  \n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg](img/508392_1_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6\n\nC# 项目设置 2\n\n在开始编码之前，我们还有最后一件事要做：添加 MonoGame 内容资源文件。该内容文件包含 C# 版本游戏引擎使用的\
  \ 1-50 号字体的字体数据。回想一下，C# 版本使用这些字体数据来模拟 Java 版本更流畅的字体功能。\n\n使用您选择的文件系统导航工具，找到并打开“MmgGameApiCs”项目文件夹。复制“Content”文件夹，并将其粘贴到“PongClone”项目文件夹的根目录中。如有必要，覆盖当前的“Content”文件夹，并在文件夹复制完成后在\
  \ Visual Studio 中打开该项目。\n\n项目加载完成后，展开“解决方案”视图中列出的“Content”文件夹。右键单击名为“Content.mgcb”的文件，然后选择“打开方式...”选项。单击名为“mgcb-editor”的条目。这将在特殊的编辑应用程序中打开内容数据库。\n\
  \n找到程序按钮栏中从右数第三个的“重新生成”按钮。单击它，并验证内容是否正确编译。项目已配置完毕，准备就绪。我们有一些编码工作要做了！\n\n\n\n## 设置核心代码：C#\
  \ 与 Java\n\n现在我们已经设置并配置好了游戏项目，是时候开始编码了。在本节中，我们将设置游戏项目的核心代码。我会确保提及 C# 游戏引擎实现的具体细节，直到某个特定节点。这将是我重点关注的这两个项目之间的最后一个主要差异。\n\
  \n从那个节点开始，所有代码都将与我们在本书第 1 和第 2 部分中回顾的 MmgBase 和 MmgCore 库中的 API 代码非常相似。你唯一会遇到的真正差异源于这两种编程语言的根本不同。正如我所提到的，在本节中，我们将设置\
  \ PongClone 游戏的核心代码。下面列出了我们将要处理的文件，分别对应 Java 和 C# 版本的游戏引擎：\n\nJava 版本\n\n*   PongClone.java\n\
  \n*   MainFrame.java\n\n*   GamePanel.java\n\nC# 版本\n\n*   PongClone.cs\n\n*   GamePanel.cs\n\
  \n我们需要为项目代码创建一个新包。右键点击项目，选择“添加…”，然后选择“新建包”。将新包命名为“game.jam.PongClone”。请注意前面列出的文件中的细微差别。你知道这是为什么吗？回想一下我们对\
  \ MmgCore API 的回顾，C# 实现不需要 `MainFrame` 类，因为底层框架的实现方式不同。\n\n我们将添加到项目的第一个类是静态主类。碰巧我们已经有一个设置好并可以使用的静态主类。从游戏引擎项目的\
  \ MmgCore 库中复制 `MmgApiGame` 类。将文件粘贴到 PongClone 项目中，并重命名文件和类，使它们都命名为 PongClone。文件中有一处对\
  \ `MmgGameApi` 类的引用。搜索它并将其替换为 `PongClone` 类的名称。\n\n确保更新 `ENGINE_CONFIG_FILE` 字段，使其具有以下值：“../cfg/engine_config_mmg_pong_clone.xml”，这是我们游戏特定的引擎配置文件。你还需要打开引擎配置文件，并将\
  \ `NAME` 条目的值从 `MmgPongClone` 改为 `PongClone`。现在你的新游戏已连接到正确的引擎配置文件和资源目录，所有这些都命名为“PongClone”。确保在编译\
  \ C# 或 Java 版本后重新生成项目。这将确保创建一个项目输出目录。\n\n如果你同时打开了两个项目，可以在 NetBeans IDE 中自动执行此重构操作。如果是这样，你可以选择使用“重构粘贴”选项，它会自动为你重命名类。在\
  \ `PongClone.java` 类的顶部，其他导入列表下方添加以下导入语句：\n\n```\nimport net.middlemind.MmgGameApiJava.MmgCore.*;\n\
  ```\n\n这将导入我们需要的所有 MmgCore API 类。在 PongClone 项目的 C# 版本中，你需要在粘贴 `MmgApiGame.cs` 文件的副本之前，从项目中删除\
  \ `Game1.cs` 和 `Program.cs` 文件。向项目添加以下文件夹：“src/game/jam/PongClone”。我们将在这里存放类文件，它大致模仿了\
  \ Java 版本的包结构。你需要重构文件名。右键点击新文件，选择“重命名…”选项。将文件和类重命名为“PongClone”。\n\n你可以通过打开文件并选择类名来重构类名；右键点击它，从上下文菜单中选择“重命名…”选项。输入名称“PongClone”并按回车。你需要在文件顶部当前列表的底部添加以下库引用：\n\
