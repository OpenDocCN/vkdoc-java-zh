- '# 2. 基类


  在本章中，你将回顾 MmgBase API 的基类：


  *   MmgObj

  *   MmgColor

  *   MmgRect

  *   MmgFont

  *   MmgSound

  *   MmgPen

  *   MmgVector2

  *   MmgBmp


  类将按照以下标准审查步骤进行审查。如果某个类在特定步骤中没有需要审查的内容，则该步骤将在审查过程中被省略：


  *   静态类成员

