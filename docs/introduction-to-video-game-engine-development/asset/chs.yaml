  ## 基类：MmgFont


  `MmgFont` 类用于封装框架的字体类。字体主要通过 `MmgFontData` 类的便捷静态方法创建。应始终优先使用 `MmgFontData` 类，因为它会根据屏幕的当前缩放比例（如果有）自动缩放字体大小。这有助于确保游戏可以放大或缩小尺寸，同时仍能保持游戏屏幕对象（包括
  `MmgFont` 对象）的位置和大小。


  `MmgFont` 类是我们遇到的第一个继承自 `MmgObj` 类的类。因此，它内置了对位置和尺寸的支持，并且在接入游戏引擎的绘制例程时，会接收更新和绘制方法的调用。另请注意，由于严格的
  API 设计模式，`MmgFont` 类支持克隆、类型化克隆和比较功能。这还不错。


  ### 枚举


  `MmgFont` 类有一个相关的枚举需要我们回顾。`FontType` 枚举被 `MmgFont` 类用于描述该类所代表的字体样式。例如，如果加载了粗体字体，则将使用粗体
  `FontType`。需要注意的是，字体类型并不驱动字体的渲染方式；它仅仅描述所加载的字体。




