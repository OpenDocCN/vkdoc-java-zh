  C# 实现不支持在单个库文件中使用多个静态 main 入口点。默认的静态 main 是来自 MmgCore 库的 `MmgCentralMain` 类。这个静态
  main 增加了指定要启动哪个其他 main 类的功能。你将在以下命令示例中看到添加的命令行参数。


