  前两个静态类方法用于将作为参数传入的类配置数据写出。第一个 `WriteClassConfigFile` 方法接受一个字符串和一个数据数组作为参数。该数组包含
  `MmgCfgFileEntry` 对象。类配置文件是一个文本文件，其中包含键值对形式的数据。这些数据可用于在类的资源加载过程中动态配置类的字段。


  当与游戏屏幕结合使用时，这尤其有用，因为它允许你通过数据驱动的方式来布局游戏屏幕。通过这种方式，你可以通过修改类配置文件来测试游戏屏幕布局的更改，而无需重新编译游戏。


  需要说明的是，当通过调用这些方法来写入类配置文件时，注释和数据的原始顺序可能会丢失。每个 `MmgCfgFileEntry` 实例中的数据都会被写入类配置文件。配置文件中的每个键值对都由一个
  `MmgCfgFileEntry` 实例表示。


  `WriteClassConfigFile` 方法的第二个实现类似，不同之处在于它接收的数据形式是 `Hashtable`（如果你查看的是 C# 实现，则为 `Dictionary`），而不是数组。该数据结构的键会按字母顺序排序，然后像第一个版本的方法一样将数据写出。现在，让我们看看另一面——类配置读取方法。


  接下来我们要介绍的类配置辅助方法是 `ReadClassConfigFile` 方法。该方法解析指定的类配置文本文件，并将键值对作为 `MmgCfgFileEntry`
  条目存储在一个 `Hashtable` 中。类配置读取方法内置了检测和加载特定屏幕分辨率类配置文件的支持。


  如果存在特定于屏幕分辨率的类配置文件，这允许你根据当前游戏屏幕大小自动加载数据。如果没有，我们会尝试打开最初指定的文件。如果找到了要读取的类配置文件，我们会打开它并逐行迭代。类配置文件中的注释以
  `#` 字符为前缀。在解析文件时，这些行会被忽略。




  从类配置文件中读取的数据可以是两种类型之一：数值型或字母数字型。要表示数字，请在键和值之间使用“=”字符。要表示字符串，请在键和值之间使用“->”。数值可以作为整数、浮点数或双精度浮点数进行检索。以下列表显示了一个简单类配置文件的内容。


