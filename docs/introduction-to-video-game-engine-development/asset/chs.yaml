  第一组字段是窗口字段。它们包含一个 `MainFrame` 对象和一个 `GamePanel` 对象。如果你在跟进 C# 代码，会注意到那里只有一个 `GamePanel`
  字段。C#/MonoGame 实现的游戏引擎没有对应的 `MainFrame` 类。该功能已合并到 `GamePanel` 类中。下一组字段用于控制游戏的帧率。


  在 Java 版本的游戏引擎中，一个工作线程负责每隔几毫秒运行一帧，具体取决于你设置的每秒帧数。这就是 `fr`（`RunFrameRate`）字段的用途。C#
  版本的游戏引擎运行在 MonoGame 之上，它比 Java Swing 更适合构建游戏，因此帧率由 MonoGame 库内部控制。我们只需设置所需的帧率，其余部分由库自动处理。


  `Thread` 实例 `t` 在 Java 实现中用于在独立线程中运行帧率工作器。`FPS` 字段保存当前所需的帧率。游戏引擎会尝试达到此帧率，但在所有情况下并非都能实现。这很大程度上取决于你使用的游戏引擎版本、你制作的游戏类型及其要求。不要将帧率设置得过高，以免导致系统问题。所以不要设置
  1000 的帧率！


  在窗口模式下运行且 IDE 正在运行时，建议使用保守的帧率。这样会生成更少的日志，占用更少的资源，同时仍能让你充分测试和调试游戏。话虽如此，如果你有特殊的帧率要求，应该使用最大数量的对象测试游戏，看看它能跑多快。


  Java 版本的引擎最好只在 30 帧或更低的帧率下使用。我通常以 18–24 FPS 进行开发。对于我制作的许多游戏来说，根本不需要 60 FPS。它们不是那种类型的游戏。C#/MonoGame
  版本的引擎应该能够轻松达到 60 FPS。如果你将游戏改为全屏模式运行，还会看到更大的改进。我认为 Java 版本没有与全屏模式等效的功能，能让你获得作为唯一活动程序的效率优势。这是因为在
  Java 中，你只能假装处于全屏模式，而实际上只是将视口最大化。


  下一组字段定义了尺寸。这些字段描述了游戏窗口各个方面的尺寸。窗口尺寸描述了游戏运行的外部操作系统窗口的尺寸。面板尺寸控制窗口内容的大小。在大多数情况下，面板和窗口的大小应该相同。最后，游戏有自己的一组尺寸。这些尺寸应该适合面板和窗口内部，但如果不符合，引擎会尝试缩放游戏尺寸以适应。



  这在测试不同屏幕尺寸的游戏时非常有用，可以直观感受其外观和运行效果，但你应该预先配置好尺寸，使游戏无需缩放。最后两个字段与游戏引擎定制有关。提供给游戏的命令行参数存储在
  `ARGS` 字段中。你可以使用 CLI 参数来修改游戏尺寸等设置。


  最后一个条目是用于处理配置设置的游戏引擎配置文件。这可以通过 CLI 参数进行修改，因此你可以从游戏启动命令驱动游戏引擎设置。这让你能够以数据驱动、动态的方式运行自定义游戏设置。接下来，让我们看看静态类方法。


