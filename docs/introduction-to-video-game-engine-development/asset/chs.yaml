  上面列出的前两个静态类字段是游戏面板和屏幕的宽度与高度的默认值。接下来的两个类字段保存了关于游戏期望尺寸的数据，即 `gameWidth` 和 `gameHeight`。`gameLeft`
  和 `gameTop` 这两个静态类字段起初可能看起来有点奇怪。


  通常你会期望它们都为零，但在我们的案例中，游戏引擎能够显示一个包含帧率信息和一些变量调试的开发标题栏。这会将游戏面板向下推，因此我们需要能够设置面板的偏移量。这组字段中的最后两个是
  `screenWidth` 和 `screenHeight` 条目。


  请注意，游戏屏幕只有尺寸数据，而屏幕的可渲染区域（即游戏面板）则拥有尺寸和位置数据。你认为这是为什么？这是因为屏幕的可渲染区域可能比窗口本身要小，因此游戏面板将在偏移量
  `gameLeft` 和 `gameTop` 处进行渲染。


  ```

  private static double scaleX;

  private static double scaleY;

  private static boolean scaleXOn;

  private static boolean scaleYOn;

  private static MmgVector2 scaleVec = MmgVector2.GetUnitVec();

  private static MmgVector2 posVec;

