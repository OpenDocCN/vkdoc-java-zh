  学习本书提供的游戏引擎软件的最佳方式是跟随 Java 或 C# 进行实践。然而，C# 中的行号与本文中审查的 Java 代码不会完全匹配。建议你先跟随 Java
  学习以理解代码，然后再查看 C# 版本，这样你就能了解如何从 API 类中抽象出框架级别的类，以及代码的哪些部分是以不同但功能等效的方式实现的。


  ## 基类：MmgObj


  `MmgObj` 类是游戏引擎中所有可绘制对象的基础。你在屏幕上看到的一切都以某种方式实现了这个类。这是强大的游戏创建工具中的一个常见主题。你会发现，在任何游戏引擎中，都有一组类构成了引擎其余部分所依赖的基础。在许多情况下，有一个类对于游戏引擎的渲染例程至关重要。这就是那个类。它包含了游戏引擎在屏幕上绘制对象所需的主要属性集，并构成了
  API 中所有可绘制对象的基础。


  ### 类字段


  我们将审查的第一组类字段如下所示。


  ```

  public MmgVector2 pos;

  public int w;

  public int h;

  public boolean isVisible;

  public MmgColor color;

