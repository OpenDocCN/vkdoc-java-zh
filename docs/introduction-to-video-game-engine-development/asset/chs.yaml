  `MmgColor`类用于封装框架的颜色类，并为 API 提供颜色支持。这是游戏引擎中非常常见的设置，你经常会看到对颜色、位置和大小进行建模的集中式类。遵循使用便捷静态类方法的主题，`MmgColor`类提供了许多此类方法以便快速访问颜色。


