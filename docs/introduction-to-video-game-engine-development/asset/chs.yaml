  MmgScreenData 静态类成员 4

  ```


  我们要审查的前两个静态方法 `CalculateLeft` 和 `CalculateTop` 各只有一行代码，它们作为游戏配置过程的一部分，用于设置 `gameLeft`
  和 `gameTop` 类字段。下一个方法 `CalculateScaleAndOffset` 也是配置过程的一部分，用于准备 X 轴和 Y 轴上的任何缩放。如果不需要缩放，我们将
  `scaleX` 和 `scaleY` 类字段设置为 1.0 或 100%。这意味着不需要进行缩放。


  如果确实需要进行一些缩放，我们必须决定是支持 X 轴缩放、Y 轴缩放，还是两者都支持。在我们的案例中，该方法被锁定为同时使用 X 轴和 Y 轴。这会导致首先调用
  `CalculateScaleX` 方法，然后在必要时调用 `CalculateScaleY` 方法。接下来要审查的两个方法 `CalculateScaleX`
  和 `CalculateScaleY`，用于检测正确调整游戏面板大小所需的缩放值。


  这些方法执行一系列循环迭代。在每次迭代中，都会执行一次新的缩放测试，并检查缩放结果是否尽可能接近整数。它通过微小的增量来调整缩放量来实现这一点。因为我们不知道是否能够找到合适的缩放值，所以我们需要另一种方式来跳出
  while 循环。在这种情况下，如果循环迭代次数达到 panic 变量的值（设置为 5000），循环就会退出。


  循环完成后，`prctDiffX` 变量用于设置多个静态类字段。我们在这里尝试进行的缩放是均匀的，因此即使我们只处理 X 轴，最终也会缩放 X 轴和 Y 轴。`scaleX`
  和 `scaleY` 都被设置为新确定的缩放值。


  如果在水平缩放之后，垂直尺寸仍然有问题，那么我们会调用 `CalculateScaleY` 方法来确定现在要使用的最佳缩放值，该方法也会考虑当前的缩放结果。`CalculateScaleX`
  和 `CalculateScaleY` 方法非常相似，因此我们在此不再赘述。请确保你阅读并理解了这些方法。这里的目标不是拥有一个健壮的游戏屏幕缩放实现；而只是提供一种简单直接的方法，将游戏面板适配到游戏窗口的尺寸内。


  请注意，这个类旨在集中保存关于游戏面板和窗口尺寸的数据，以及关于屏幕当前缩放的信息。如果你还记得，我们在 `MmgHelper` 类中遇到了图像缩放调用，这些调用使用了这里确定的缩放值。这是一个安全的操作，因为默认期望是缩放是均匀的。while
  循环只是试图确定一个能产生接近整数值的缩放值，以便图像缩放平滑。


  我们需要审查的最后一组方法是 `GetGameRight` 和 `GetGameBottom` 方法。这些方法用于根据游戏面板的尺寸和当前偏移量来计算其右侧和底部的位置。请花点时间审查我们在这里没有机会涵盖的任何方法。


