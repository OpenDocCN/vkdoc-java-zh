  ## 高级类：MmgContainer


  `MmgContainer` 类，顾名思义，是一个包含 `MmgObj` 实例的容器。这包括扩展了 `MmgObj` 类的对象。你可以开始看到我们迄今为止构建的通用游戏引擎的强大之处。例如，一个
  `MmgContainer` 可以容纳绘制游戏信息 HUD 所需的所有 `MmgBmp` 对象。然后，你可以通过将容器对象的 `isVisible` 字段设置为
  false 来使整个图像集不可见。


  `MmgContainer` 类旨在容纳其他对象，但它对其子对象没有尺寸或位置的概念。它确实扩展了 `MmgObj` 类，因此你可以为容器分配尺寸和位置，以帮助为容器的使用增加结构。注意，这些设置不会影响容器内容的绘制方式。




  ### 静态类成员


  有一个静态类字段我想快速讨论一下。`INITIAL_SIZE` 静态类字段用于控制 `MmgContainer` 内部数据结构的初始大小。如果你的游戏需要包含大量对象的容器，你可能需要增加此字段的值。


  ### 枚举


  `MmgContainer` 类有两个重要的枚举需要我们介绍。首先是 `ChildAction` 枚举。此枚举用于定义对子对象集合执行的操作类型。它有两个值：`STAMP`
  和 `UNSTAMP`，用于告知 `UpdateAllChildren` 方法如何处理子对象。标记（Stamp）一个子对象会将该容器标记为父级，并将 `hasParent`
  字段设置为 true。取消标记（Unstamp）一个子对象则会逆转此过程，清除父级关系，并将 `hasParent` 设置为 false。


  第二个对该类很重要的枚举是 `RenderMode` 枚举。此枚举控制类如何渲染自身。它有两个值：`RENDER_ALWAYS` 和 `RENDER_ONLY_WHEN_DIRTY`。如果渲染模式设置为始终渲染，那么容器类将始终调用其子对象的更新方法。如果模式设置为仅在脏时渲染，则仅当类字段
  `isDirty` 设置为 true 时，容器才会更新其子对象。


  ### 类字段


  我们只需要讨论两个相关的类字段。


  ```

  private ArrayList container;

  private boolean isDirty;

  private RenderMode mode = RenderMode.RENDER_ALWAYS;

  清单 5-6

  MmgContainer 类字段 1

  ```


  第一个字段是类的内部数据结构。所有子对象都存储在这里。请注意，该容器被设计为接受 `MmgObj` 实例。这包括所有继承自 `MmgObj` 类的类。下一个字段
  `isDirty` 很重要。如果此字段为 true，则容器被标记为脏。在这种情况下，在下一次更新调用时，该类将更新其每个子对象。控制此字段非常重要。


  仅允许在发生更改时更新子对象将使你的游戏更高效。在子对象不断变化的情况下，需要将 `isDirty` 字段设置为 false，以强制子对象从游戏引擎的绘制例程接收更新调用。请记住，游戏引擎的绘制例程始于当前游戏屏幕所插入的游戏面板类。


  这会导致游戏屏幕接收更新和绘制方法调用，进而意味着其子对象也会接收更新和绘制方法调用。如果某个子对象是一个容器，那么对于该容器的所有子对象，此过程会再重复一次。前面列出的最后一个条目是
  `mode` 字段。此字段控制容器是每次更新调用时自动更新其所有子对象，还是仅在 `isDirty` 标志设置为 true 时才更新。


