  在本章中，我们深入探讨了 MmgCore API 的事件和事件处理程序。我们了解了 `ScreenSplash` 类如何使用通用事件与 `GamePanel`\
  \ 类通信，告知其该切换屏幕了。我们在 `ScreenLoading` 类中看到了类似的实现，它使用自己的资源加载完成通用事件。\n\n我们还了解了如何使用加载资源消息事件向\
  \ `ScreenLoading` 类发送关于游戏资源加载进度的信息，以及游戏屏幕如何触发自己的事件来告知 `GamePanel` 加载过程已完成并切换到主菜单状态。\n\
  \n这些事件和事件处理程序的细节非常重要。你应该了解默认游戏屏幕是如何连接到 `GamePanel` 的，并且应该理解可供你使用的不同类型的事件系统。让我们看一下本章涵盖的\
  \ MmgCore API 类的总结：\n\n*   **GenericEventMessage**：一个 MmgCore API 类，用于表示与游戏状态关联的通用事件。此类为\
  \ API 提供通用事件支持。\n\n*   **GenericEventHandler**：一个 MmgCore API 接口，实现该接口以支持接收来自已注册源的通用事件。此接口为\
  \ API 提供通用事件处理支持。\n\n*   **LoadResourceUpdateMessage**：一个 MmgCore API 消息，用于向已注册的事件处理程序发送关于资源加载过程的信息。此类为\
  \ API 提供资源加载事件消息支持。\n\n*   **LoadResourceUpdateHandler**：一个 MmgCore API 接口，实现该接口以支持接收加载资源更新事件。此接口为\
  \ API 提供加载资源更新事件处理支持。\n\n*   **HandleMainMenuEvent**：一个 MmgCore API 类，用于支持菜单系统事件。当菜单项被选中时，菜单系统会触发这些事件。事件由类（而非接口）处理。此类为\
  \ API 提供基本的菜单支持。\n\n在本章审查的类中，有一些非常微妙但重要的点。其中一个要点是，你可以利用事件来促进游戏屏幕之间以及游戏屏幕与游戏面板之间的通信。使用本章概述的事件系统和不同技术，你将能够创建自己的事件来管理游戏状态——这是任何游戏的关键方面。\n\
  \n另一个主要要点，我想说的是，习惯使用事件和事件处理程序。你会一次又一次地遇到事件，从一个游戏引擎到另一个游戏引擎，因此在自己的游戏中积累使用它们的经验是件好事。此外，你将在学习何时使用事件方面获得宝贵的经验。你的游戏中不应该有太多事件。事件保留用于跨类通信，即用户操作要求游戏屏幕请求游戏面板为其执行某些操作。遵循这条一般经验法则，但要意识到总有例外情况。\n\
  \n# 13. 资源加载\n\n资源加载和访问是任何游戏引擎最重要的方面之一。没有图像很难制作 2D 游戏。在本章中，我们将详细讨论游戏引擎用于加载资源的运行时代码。你将看到如何显式地、全局地或通过特定于游戏的资源文件夹访问声音和图像。\n\
  \n在接下来的章节中，我们将回顾资源加载过程以及用于加载资源以在游戏屏幕中使用的确切代码。在本章中，我们将审查以下类和主题：\n\n*   RunResourceLoad\n\
  \n*   主题：访问显式资源\n\n*   主题：访问自动加载资源\n\n*   主题：访问游戏特定资源\n\n## 资源加载：RunResourceLoad\n\
  \n`RunResourceLoad` 类设计为在其自己的线程中运行，用于将游戏资源（如声音和图像）加载到游戏引擎的资源缓存中。资源缓存由 MmgBase API\
  \ 的 `MmgMediaTracker` 类管理。在开始类审查之前，让我们先看一下 `RunResourceLoad` 类的 Java 和 C# 类定义。\n\
  \n```\n//Java 实现\npublic class RunResourceLoad implements Runnable { ... }\n//C#\
  \ 实现\npublic class RunResourceLoad { ... }\n代码清单 13-1\nRunResourceLoad 类介绍 1\n```\n\
  \n请注意，Java 版本的类实现了 `Runnable` 接口。这是一个框架级别的接口，用于在单独的线程中执行类的功能。别担心。C# 实现中存在相同的线程功能，只是实现方式略有不同，因为没有使用等效的\
  \ `Runnable` 接口。我只是想在开始类审查之前指出这个细微的差别。\n\n\n\n### 类字段\n\n`RunResourceLoad` 类包含几个与资源加载过程相关的类字段。让我们来看一下！\n\
  \n```\npublic boolean readResult;\npublic boolean readComplete;\npublic int readPos;\n\
  public int readLen;\npublic int loadMultiplier = 1000;\npublic LoadResourceUpdateHandler\
  \ update;\npublic long slowDown;\npublic boolean exitLoad;\n清单 13-2\nRunResourceLoad\
  \ 类字段 1\n```\n\n前面列出的前两个字段用于报告资源加载操作的结果。如果在资源处理操作期间加载了任何声音或图像，`readResult` 字段将保存为\
  \ true。如果整个加载过程已完成，`readComplete` 字段将设置为 true。`readPos` 和 `readLen` 字段分别跟踪资源加载过程中的当前位置和要加载的文件总数。\n\
  \n`loadMultiplier` 字段用于人为地增加我们正在处理的数字的大小。这样做只是为了在需要加载的资源非常少时，帮助计算进度百分比。`slowDown`\
  \ 字段用于通过向操作中添加一个小的耗时环节来人为地减慢加载过程。当你只有少量资源需要加载，并且想验证加载条是否正常工作，这会非常有帮助。添加一个减速值可以让你更容易地看到进度条。\n\
  \n### `支持方法详情`\n\n`RunResourceLoad` 类的支持方法按与其对应字段相同的顺序列在下面的组中。\n\n```\npublic boolean\
  \ GetReadResult() { ... }\npublic boolean GetReadComplete() { ... }\npublic int\
  \ GetPos() { ... }\npublic int GetLen() { ... }\npublic void SetUpdateHandler(LoadResourceUpdateHandler\
  \ Update) { ... }\npublic long GetSlowDown() { ... }\npublic void SetSlowDown(long\
  \ l) { ... }\npublic void StopLoad() { ... }\n清单 13-3\nRunResourceLoad 支持方法详情 1\n\
  ```\n\n前四个支持方法只是其关联类字段的 get 方法。紧随其后的是 `SetUpdateHandler` 方法。它用于设置类的 `update` 字段。`slowDown`\
  \ 字段有一对 get 和 set 方法，然后是 `StopLoad` 方法。`StopLoad` 方法将强制资源加载过程在下一个循环迭代时退出。\n\n###\
  \ `主方法详情`\n\n`RunResourceLoad` 类有两个我想回顾的主方法。\n\n```\npublic RunResourceLoad() {\
  \ ... }\npublic void run() { ... }\n清单 13-4\nRunResourceLoad 主方法详情 1\n```\n\n第一个条目是类的构造函数。它不接受任何参数，并准备好类以供立即使用。上面列出的第二个方法是资源加载过程的核心。此方法由\
  \ `Runnable` 接口定义，并作为线程启动过程的一部分被调用。但是，如果需要，你也可以直接调用该方法。\n\n### 演示：RunResourceLoad\
  \ 类\n\n对于 `RunResourceLoad` 类的演示部分，我们将查看声音和图像资源加载过程——具体来说，是识别要加载的目标资源文件的部分。声音和图像的步骤是相同的，因此我将在下面仅详细说明图像加载步骤。\n\
  \n```\n01 adld = new File(GameSettings.AUTO_IMAGE_LOAD_DIR);\n02 if(adld.exists())\
  \ {\n03     srcFiles = adld.listFiles();\n04     clnFiles = new ArrayList();\n\n\
