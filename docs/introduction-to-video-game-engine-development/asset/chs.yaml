  `PrepBuffers` 方法将画布缓冲策略设置为使用两个缓冲区，即双缓冲。该方法还负责准备用于绘制游戏面板的 `background` 和 `backgroundGraphics`
  字段。`GetCanvas` 方法返回 `GamePanel` 的画布字段，而 `GetBuffer` 方法则从画布中获取下一个活动缓冲区。


  `UpdateScreen` 方法会触发画布的双缓冲翻转，并创建一个新缓冲区。`UpdateGame` 方法运行游戏引擎绘制例程中的更新调用。这会导致当前游戏画面的
  `MmgUpdate` 方法在每个游戏帧被调用。最后但同样重要的是，`RenderGame` 方法负责构建游戏帧并将其绘制到画布上。这会导致当前画面的 `MmgDraw`
  方法在每个帧被调用。


  接下来要审视的方法是类的构造函数。只有一个构造函数，所以你得接受它。它被设计为接入静态主类，并在 `MainFrame` 初始化后被调用。它接收主框架的引用以及一些尺寸和偏移信息作为参数。此构造函数将创建一个可供使用的新类实例。


  `SwitchGameState` 方法是 `GamePanel` 类中用于切换游戏状态及后续游戏画面的默认方法。该方法负责清理上一个游戏状态。这会导致上一个游戏画面的
  `UnloadResources` 方法被调用。完成后，下一个游戏画面会通过调用其 `LoadResources` 方法进行准备。随后它成为当前画面，并主动绘制到游戏窗口中。


  我们要审视的最后一个方法是 `HandleGenericEvent` 方法。该方法处理来自启动画面和加载画面类的通用事件。启动画面类在其显示时间结束时发送一个事件。加载画面类在加载过程完成时发送一个事件。游戏面板类通过将游戏状态更改为游戏加载序列中的下一个状态来响应这些事件。主菜单是启动过程中的最后一个状态。


