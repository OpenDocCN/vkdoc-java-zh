  ## 章节总结


  在本章中，我们完成了对 MmgCore API 运行时类的回顾。这些类可以说是代表了“执行代码”，即准备和执行游戏的代码。再次强调，我们选择将运行时代码（来自源代码）作为游戏项目设置的一部分包含在内。这使你可以完全控制游戏的启动过程。


  我们了解了静态 main 入口点如何使用 `MainFrame` 类准备游戏窗口——在 C# 版本中，`GamePanel` 类负责处理此任务——并将 `GamePanel`
  类附加到窗口的可绘制空间。我们回顾了游戏引擎的核心，即 `GamePanel` 类，它连接了 MmgCore API 和 MmgBase API，并管理所有游戏屏幕。让我们看看本章要点的总结：


  *   MmgApiGame：一个 MmgCore API 类，用于运行一个模板化的、基础的游戏。该游戏将经历启动过程，显示启动画面和加载屏幕，最后进入主菜单。


  *   MainFrame：一个 MmgCore API 类，负责在 Java 实现的游戏引擎中为游戏创建窗口框架。


  *   GamePanel：一个 MmgCore API 类，是游戏引擎的核心。此类负责将输入路由到当前游戏屏幕、管理游戏屏幕等。这是 MmgCore API
  中通过不同游戏屏幕连接到 MmgBase API 的关键点。


  *   主题：启动游戏：在本主题部分，我们学习了如何通过控制台从命令行界面启动游戏。我们涵盖了可以运行的不同默认应用程序，以及如何为 Java 和 C# 实现运行它们。


  至此，你应该对整体情况有所了解。MmgBase API 的结构和 MmgCore API 的主要方面已经向你详细说明。花些时间思考这些库及其结构——底层 API
  如何为类的克隆、比较和互操作性提供大量支持，而中层 API MmgCore 则主要包含运行游戏引擎特定方面的单一、高度专业化的类。请特别注意 `GamePanel`
  类及其绘制和更新例程。确保你理解这两个 API 是如何连接的。这里有一个提示：探索 `currentScreen` 类字段。


