  ## 高级类：MmgLoadingBar


  `MmgLoadingBar` 类是一个高级类，它使用 `MmgBmp` 对象来创建一个新的加载条。加载条由 `MmgLoadingScreen` 类用作资源加载过程的一部分。您可能会发现加载条不仅在游戏启动过程中有用，而且作为
  UI 元素也很有用。例如，您可以将此类用作生命条或充能计量器。


  ### 类字段


  `MmgLoadingBar` 的类字段如下所列。只有七个字段，它们用于保存前景图像、背景图像、定位以及加载条填充属性。


  ```

