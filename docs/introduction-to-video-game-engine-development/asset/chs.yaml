  方法会从文本字段字符串的末尾移除一个字符。请注意，`ProcessKeyClick` 和 `DeleteChar` 方法在退出前都会将 `isDirty` 标志设置为
  true。这组中的最后一个方法是 `Prep` 方法。`Prep` 方法负责设置九宫格背景图像、字体和光标计时。它负责为类的使用做好准备。


  最后一组方法是标准的主要方法，我们在此不再赘述。到目前为止，您已经多次见过这些方法：标准游戏引擎绘制例程的更新和绘制方法，分别是 `MmgUpdate` 和 `MmgDraw`，以及一个用于确定对象相等性的
