  和 `scaleY` 静态类字段将保存实现此目的所需的缩放值。


  `scaleXOn` 和 `scaleYOn` 静态类字段是布尔标志，指示是否需要在 X 轴和/或 Y 轴上进行缩放。最后，`scaleVec` 和 `posVec`
  静态类字段是便捷字段，用于保存 X 和 Y 坐标的缩放和位置数据。


