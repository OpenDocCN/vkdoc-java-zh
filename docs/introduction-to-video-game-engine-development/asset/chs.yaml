  ## 游戏屏幕类：MmgGameScreen


  `MmgGameScreen` 类是 `MmgSplashScreen` 和 `MmgLoadingScreen` 的超类。与闪屏和加载屏幕非常相似，`MmgGameScreen`
  类是游戏屏幕的一种松散实现，提供了许多功能，但只需要实现很少的功能。这为您提供了最佳的灵活性设置。


