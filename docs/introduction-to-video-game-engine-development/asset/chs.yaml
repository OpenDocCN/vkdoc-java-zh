  上面列出了我们需要查看的第二组类字段。`font` 字段用于在文本字段中渲染文本。你可以使用 `MmgFont` 的类字段来指定字体大小、类型和颜色。`fontHeight`
  字段用于文本的垂直居中计算。文本会尝试在背景图像的高度内居中显示。


  `isDirty` 标志是一个布尔值，用于控制类是否在下一个游戏帧中运行某些更新代码。我们不希望类在更新调用期间进行不必要的工作，因此我们使用这个布尔标志来控制所做的工作量。有了这个功能，类只会在光标闪烁或其他事件导致需要更新时，才运行其更新计算。


  接下来的两个字段控制是否启用最大长度错误，以及在触发错误事件之前可以在文本字段中输入多少个字符。`padding` 字段用于微调字体在文本字段背景图像中的位置。`textFieldString`
  类用于保存文本字段所代表的实际字符串值，而不仅仅是文本字段显示中可见的文本。


