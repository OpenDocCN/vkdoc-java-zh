  ## 动画类：MmgPositionTween/MmgSizeTween


  `MmgPositionTween` 类是另一个动画类，其工作方式与我们刚刚介绍的 `MmgPulse` 类略有不同。`MmgPulse` 类实际上只是通过调用类的更新方法来更新一个
  `MmgVector2` 对象。因此，这个类不像我们目前介绍过的许多可绘制类那样工作。


  `MmgPulse` 类更像一个生成器，按需生成动画中的下一个向量供你使用。而 `MmgPositionTween` 类则扩展了 `MmgObj` 类，是可绘制对象集合中的一员。`MmgPositionTween`
  类旨在在指定的时间内将一个对象从起始位置移动到结束位置。


  `MmgSizeTween` 类与位置补间类非常相似，区别在于它不是调整对象的位置，而是改变对象的大小。这两个类非常相似，具有几乎完全相同的结构、字段和方法，只是
  `MmgSizeTween` 类在其方法命名上略有不同。


  请务必查看 MmgTestSpace 库中的大小补间示例屏幕 `ScreenTestMmgSizeTween` 类。你会发现代码非常熟悉，只是稍作调整以处理大小调整而非位置重设。


