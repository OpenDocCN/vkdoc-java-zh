  请记住，`GameSettings` 类中的任何一个静态字段都可以在运行时通过游戏引擎配置文件进行设置。第一个条目 `INPUT_NORMALIZE_KEY_CODE`
  用于开启对键盘输入代码规范化的支持。启用此选项后，所有键盘输入都将通过一个规范化方法进行处理，你可以在该方法中添加支持以调整键盘输入代码。内置的规范化调用是 MmgBase
  API 中 `MmgHelper` 类的 `NormalizeKeyCode` 方法。


  接下来的两个字段 `LOAD_NATIVE_LIBRARIES` 和 `RUN_OS_SPECIFIC_CODE`，在游戏的静态主类中作为启动过程的一部分使用。如果启用了
