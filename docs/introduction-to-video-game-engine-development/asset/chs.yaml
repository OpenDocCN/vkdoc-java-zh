  \ `MmgHelper` 类的 `GetBasicCachedBmp` 方法（第 5 行）。此方法负责将图像加载到缓存中（如果它尚不存在）。\n\n## 主题：访问显式资源\n\
  \n在本主题部分，我们将回顾手动访问资源的细节。你可能想知道，当资源被加载到游戏的资源缓存中供我们使用时，为什么还需要直接访问它们。\n\n想想在加载屏幕之前显示的游戏屏幕。它们也需要访问资源，但不能依赖引擎的缓存。在这种情况下，我们必须手动将资源加载到游戏屏幕中。以下代码片段演示了直接访问资源。\n\
  \n```\nMmgHelper.GetBasicBmp(\"../cfg/drawable/popup_window_base.png\");\nMmgHelper.GetBasicSound(\"\
  ../cfg/playable/jump1.wav\");\n清单 13-7\n主题：访问显式资源 1\n```\n\n在上面的简短示例中，我们正在进行直接资源加载。这里唯一的要求是资源必须存在。下一节是对这种资源访问方法的轻微变体。\n\
  \n\n\n## 主题：访问自动加载资源\n\n我们将研究用于加载放置在自动加载目录中的资源的代码。回顾一下，声音和图像资源都有三个层级：显式资源、自动加载资源和游戏特定资源。可以将自动加载资源视为属于游戏引擎，例如游戏引擎项目中包含的默认图像和默认声音。\n\
  \n```\nMmgHelper.GetBasicBmp(GameSettings.IMAGE_LOAD_DIR + \"file_name.png\");\n\
  MmgHelper.GetBasicSound(GameSettings.SOUND_LOAD_DIR + \"file_name.png\");\n清单 13-8\n\
  主题：访问自动加载资源 1\n```\n\n虽然这个示例与第一个主题部分非常相似，但我想讨论一些细微但重要的点。首先我想指出的是游戏设置类中存储的路径值。这里有一个隐藏的约定：路径变量\
  \ `IMAGE_LOAD_DIR` 以路径分隔符结尾。因此，在使用时，你只需附加文件名即可。请确保你了解并一致地使用资源路径。\n\n前两个示例演示了直接资源加载。关于直接资源的惯例是将它们放置在相应资源文件夹的根目录下。例如，直接图像资源应放置在可绘制文件夹的根目录下。同样，声音资源放置在可播放文件夹的根目录下。接下来的示例演示了访问缓存资源。这些资源位于**可绘制**和**可播放**文件夹中的\
  \ **auto_load** 目录中。\n\n```\nMmgHelper.GetBasicCachedBmp(GameSettings.IMAGE_LOAD_DIR\
  \ + \"file_name.png\", \"file_name.png\");\nMmgHelper.GetBasicCachedBmp(\"file_name.png\"\
  );\nMmgHelper.GetBasicCachedSound(GameSettings.SOUND_LOAD_DIR + \"file_name.png\"\
  , \"file_name.wav\");\nMmgHelper.GetBasicCachedSound(\"file_name.wav\");\n清单 13-9\n\
  主题：访问自动加载资源 2\n```\n\n在前面的代码示例中，第一个条目会加载一个资源，如果该资源尚不存在，则将其存储在游戏引擎的资源缓存中。它还会返回新的图像资源以供使用。下一个方法条目仅会在缓存图像资源存在时将其取出使用。声音资源也具有相同的功能，并在前面列出。\n\
  \n## 主题：访问游戏特定资源\n\n让我们来看看游戏特定资源的访问调用。游戏特定文件夹位于**可绘制**和**可播放**文件夹的根目录下，与 **auto_load**\
  \ 目录和直接加载资源相邻。资源系统的这方面工作方式有一个细微差别。让我们看看来自 MmgCore API 的 `MmgApiGame` 类的 `main` 方法中的几行代码。\n\
  \n```\nGameSettings.PROGRAM_IMAGE_LOAD_DIR += GameSettings.NAME;\nGameSettings.PROGRAM_SOUND_LOAD_DIR\
