  第一组字段描述了视口，即滚动面板中呈现滚动条和可见面板的静态部分。这些字段使用 `MmgRect` 对象以及描述每个对象宽度的 `viewPortWidth`
  和 `scrollPaneWidth` 字段来描述其位置和尺寸。需要注意的是，某些类字段仅用于描述，不会以任何方式改变对象。随着经验的积累，您会逐渐理解其工作原理；目前，我们专注于介绍基础知识。


  第二组字段描述了滚动面板的滚动条按钮。在水平滚动面板中，有一个滚动条位于滚动面板窗口下方。该滚动条有两个侧边按钮和一个中心按钮。左右按钮是可用的，但中心滑块不可用，因为滚动面板类尚未实现鼠标拖拽支持。有一个字段
  `scrollBarLeftRightButtonWidth` 用于描述左右滚动条按钮的宽度，另一个字段 `scrollBarCenterButtonWidth`
  用于描述中心按钮的宽度。您可以使用 `scrollBarCenterButtonColor` 字段更改中心按钮的颜色，并且所有三个按钮都有对应的 `MmgBmp`
  按钮和 `MmgRect` 条目。


  我还应该提到，这个类使用了一些默认资源。这些资源被视为游戏引擎运行时的一部分，并作为自动加载目录的一部分加载。这应该为您如何为自己的游戏自定义滚动面板资源提供了可靠的指导。




  我们要查看的第三组字段是滚动条显示字段。这些字段用于控制滚动条的显示方式。其中唯一值得直接提及的两个字段是 `intervalX` 字段和 `isDirty`
  字段。`intervalX` 类字段控制每次单击按钮时滚动条的移动量。`isDirty` 类字段通过限制更新方法仅在类被标记为“脏”时运行，来防止类执行过多工作。请注意你如何使用这个字段；如果你的滚动面板没有更新，你可能需要将该对象标记为“脏”。


  最后一组字段是类事件。事件对象已经准备就绪；它们只需要设置一个目标事件处理器即可投入使用。至此，我们对类字段的回顾就结束了。接下来，我们将看看该类的支持方法。


