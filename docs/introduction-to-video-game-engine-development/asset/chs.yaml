  下一组字段非常重要。这组字段包含了游戏状态管理功能。该组中的第一个字段为你提供了一个数据结构，你可以用它来跟踪正在使用的游戏屏幕。你可以选择不使用这个数据结构，但如果你觉得合适，它就在那里供你使用。`currentScreen`
  字段表示当前活动的游戏屏幕，它接收游戏面板接收到的所有输入，并接入游戏引擎的更新和绘制调用。


  接下来的两个字段，`gameState` 和 `prevGameState`，用于跟踪游戏面板类的当前和上一个游戏状态。这样做的原因是，在下一个游戏屏幕接管之前，可以清理上一个游戏屏幕并释放其资源。最后一组类字段属于类的绘制例程。`MmgPen`
  实例 `p` 用于通过 `backgroundGraphics` 框架绘制类在 `background` 图像上进行绘制。


  `canvas` 字段用于保存一个框架级别的类，该类代表窗口的可绘制区域。`strategy` 字段用于配置框架的绘制过程，使其包含对画布的双缓冲。这意味着在内部，`canvas`
  将支持两个绘制表面。一个表面正在显示，而另一个代表下一帧游戏画面的表面正在被绘制。


  当第二帧准备就绪时，两个表面会进行翻转，然后重复该过程。正如我之前提到的，`background` 和 `backgroundGraphics` 用于将游戏绘制到一个表面上，然后使用
  `graphics` 字段将该游戏帧绘制到窗口的画布上。最后但同样重要的是，`updateTick` 字段作为更新调用的一部分使用。它记录更新调用被执行的次数。这对应于游戏已显示的帧数。我们还没完。还有另一组类字段等着我们查看。在我们深入查看它们之前，先看看下面分组中列出的字段。




