  接下来是游戏屏幕。我们决定不使用数据结构来存储游戏屏幕，而是为此实现所支持的屏幕创建类字段。此示例游戏运行时显示启动屏幕、加载屏幕和主菜单屏幕。`MmgScreenData`
  和 `MmgFontData` 实例（即 `screenData` 和 `fontData`）应该让你感到熟悉，因为你在本书第一部分中已经了解过它们。这些字段对于访问引擎的屏幕和字体运行时数据非常有用。


  最后一组字段与手柄支持有关。游戏引擎支持两种类型的手柄。在 Java 版本中，通过 jInput 库支持传统的 USB 手柄；在 C# 版本中，则通过 MonoGame
  原生支持。另一种类型的手柄仅在 Linux 操作系统上受支持。此实现允许你使用单板计算机上的 GPIO 引脚，通过面包板、一些按钮和跳线来创建手柄。然后你可以使用
  GPIO 手柄来控制游戏。我不会在文本中详细讨论手柄或 GPIO 支持，但我鼓励你尝试使用这些类。


  手柄集线器用于读取手柄状态并将输入转换为按钮信息。然后，这些数据由手柄集线器运行器处理，该运行器以一定间隔轮询手柄以获取数据。线程 `gpadTr` 用于在独立于主游戏线程的单独线程中运行手柄处理代码。代码块中的最后三个字段与我们刚刚讨论的手柄字段完全相同，只是它们被设计为与
  Linux 文件系统和 GPIO 接口配合使用。


