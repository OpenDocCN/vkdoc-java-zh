  方法则包含更多实质内容。注意，我们通过直接调用精灵和位置补间的更新方法，强制它们每帧都进行更新。这确保了动画更新在每一帧都能发生。


  上述代码片段中的最后一个方法是 `MmgHandleEvent` 方法。该方法被配置为接收来自位置补间类的起始和结束事件。注意，当它接收到结束事件时，会反向重启位置补间动画，从结束位置移动到起始位置（第
  6-8 行）。类似地，当接收到起始事件时，该方法会再次重置位置补间（第 11-13 行）。这确保了位置补间能够无限期地持续运行。这也是该类事件的一个很好的小示例。


  ## 章节总结


  在本章中，我们完成了对 MmgBase API 动画类的回顾。我们介绍的类展示了两种不同类型的基于类的动画。`MmgPulse` 类体现了一种“放手式”方法，该类仅负责对数值进行动画处理，然后将这些数值应用于屏幕上的对象。


  `MmgPositionTween` 和 `MmgSizeTween` 类是对象动画“亲力亲为”方法的示例。这些类属于可绘制对象集的一部分，并处理其自身的所有绘制和更新逻辑。


  *   MmgPulse：一个 API 类，用于通过随时间变化来对数值进行动画处理。生成的数值序列可用于驱动对象位置动画等。


  *   MmgPositionTween/MmgSizeTween：一个 API 类，用于随时间对对象进行动画处理，通过调整其位置（对于 MmgPositionTween
  类）或调整其大小（对于 MmgSizeTween 类）来实现。


  我们回顾的动画类展示了高级复杂类如何交互以创建新的、令人兴奋的功能。例如，在 `MmgPositionTween` 类的示例代码中，我们使用 `MmgSprite`
  对象作为位置补间的主体；因此，我们最终得到了一个动画（位置补间）对另一个动画（精灵对象）进行动画处理的效果。


  停下来思考一下我们为什么能够做到这一点。游戏引擎的设计使得类之间可以轻松协作。我们还看到了使用这些新的、复杂的动画类是多么简单。我们所要做的就是将它们添加到当前屏幕的可绘制对象列表中，并确保在需要时每帧都调用它们的更新方法。就是这么简单。


  # 8. 游戏屏幕类


  在本章中，我们将回顾 MmgBase API 的游戏屏幕类。这些是更高级、更具体的游戏屏幕实现的基类。共有三个类，一个用于启动画面，一个用于加载画面，一个用于支持菜单系统的通用屏幕。


  这些类非常重要，因为它们是 MmgBase API 与 MmgCore API 交互的连接点。游戏面板类负责发送当前游戏屏幕的更新和绘制方法调用，以及输入方法调用。当前游戏屏幕是
  `MmgGameScreen` 类的一个实例：


  *   MmgSplashScreen


  *   MmgLoadingScreen


  *   MmgGameScreen




  ## 游戏画面类：MmgSplashScreen


  `MmgSplashScreen` 类为创建游戏启动画面提供了基础。该画面设计为显示数秒，随后触发一个事件，该事件应由游戏面板类捕获，并通过将状态切换至加载画面来响应。


  需要说明的是，此类继承自 `MmgGameScreen` 类并实现了 `MmgUpdateHandler` 接口，以便该类能够接收来自启动画面计时器的更新事件。`MmgGameScreen`
  类继承自 `MmgObj` 类，因此即使在这一层级，游戏画面也属于可绘制对象集合的一部分，并被专门配置为接入游戏面板类，以便以所需的帧率绘制当前游戏画面。


