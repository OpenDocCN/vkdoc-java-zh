  \n\n\n## 章节总结\n\n在本章中，我们了解了 MmgCore API 的屏幕类。虽然这些类基于 MmgBase API 中的类，但它们已扩展以支持 MmgBase\
  \ API 所不具备的功能。例如，我们介绍的每个游戏屏幕都有一些共同点。其中之一是 `gameState` 和 `owner` 类字段。这些字段是屏幕接入 MmgCore\
  \ API 的 `GamePanel` 类所必需的。\n\n我们还花了一点时间回顾了 `RunFrameRate` 类，该类负责驱动游戏引擎的绘制例程，进而控制\
  \ Java 版本游戏引擎的帧率。\n\n*   RunFrameRate：一个 MmgCore API 类，负责运行游戏引擎的绘制例程。该类负责强制执行 Java\
  \ 版本游戏引擎的帧率。\n\n*   ScreenSplash：MmgSplashScreen 类的一个 MmgCore API 实现，它了解 GameStates\
  \ 和 GamePanel 类，并且可以接入 GamePanel 类的屏幕管理系统。\n\n*   ScreenLoading：MmgLoadingScreen\
  \ 类的一个 MmgCore API 实现，它了解 GameStates 和 GamePanel 类，并且可以接入 GamePanel 类的屏幕管理系统。\n\n\
  *   ScreenMainMenu：MmgGameScreen 类的一个 MmgCore API 实现，它了解 GameStates 和 GamePanel\
  \ 类，并且可以接入 GamePanel 类的屏幕管理。\n\n*   Screen：MmgCore API 的 Screen 类与其他游戏屏幕类类似，但略有不同，因为它被设计用作主游戏屏幕。\n\
  \n如果你觉得对 MmgCore 的游戏屏幕类掌握得还不够好，请不要气馁。首先，整个游戏引擎项目中有大量的示例。我建议花些时间查看其中的一些示例。请记住，超类（如果你使用\
  \ C# 则是基类）提供的功能可能并不显而易见。\n\n确保你花点时间追踪用于驱动游戏屏幕的类。了解超类（C# 中的基类）的功能以及它将如何与你扩展的类进行交互。在处理重写方法或依赖于超类功能的方法时，请牢记这一点。\n\
  \n# 第 3 部分\n\n# 15. 游戏构建简介\n\n欢迎阅读本书的第 3 部分。如果你已经读到这里，那么你已经是游戏引擎复杂细节方面的专家了，是时候将这些知识付诸实践了。在本部分中，我们将从头开始构建两个游戏。这将是一段激动人心的旅程。我们将从游戏大纲完全从零开始，然后分阶段添加功能，直到完成最终产品。\n\
  \n我们将创建的第一个游戏叫做 PongClone，顾名思义，它是经典视频游戏 Pong 的克隆版。PongClone 游戏的构建将让你初步体验游戏开发。你将亲身了解启动并运行一个游戏项目是多么快速和容易。借助\
  \ MmgBase 和 MmgCore API 的强大功能，你只需几个类就能创建一个功能丰富的游戏。\n\n通过这个项目，你将获得宝贵的经验，包括设置游戏项目、处理用户输入、动画图形、处理单人及双人游戏等等。对于第二个游戏构建，我们将创建一个稍微复杂一些的游戏，DungeonTrap。在\
  \ DungeonTrap 中，你控制一个被困在魔法地牢中的角色，抵御一波又一波的敌人。\n\n我希望这些项目能引起你的兴趣。这里的主要目标是获得仅使用 IDE\
  \ 和本书第 1 和第 2 部分中介绍的游戏引擎来构建游戏的经验。在这些游戏构建过程中，我不会专注于游戏引擎特定的主题，并且我会尽量避开本书前几部分中使用的较为刻板的类回顾格式。\n\
  \n我们将明确地专注于游戏本身。如果你发现某段代码不熟悉，请花点时间阅读关于该类的资料以及项目附带的示例代码。我们将在以下章节中概述这两个游戏项目的细节。我们将从\
  \ PongClone 游戏开始。\n\n## PongClone 游戏大纲\n\n如果我们打算坐在电脑前编写一个游戏，我们最好对要做什么有个概念。最好的方法是将游戏的功能列在一个清单中。这为你的游戏开发提供了一个起点。简单的游戏可能只需要几个要点，你就可以开始编写代码了。\n\
  \n更复杂的游戏则需要大量的规划，你才能安心地开始开发。我希望有一个经验法则可以传授给你，以便你更好地判断对于一个给定的游戏，多少规划是足够的。简单的事实是，你需要在拥有一些游戏开发经验后，随着时间的推移，自己培养这种直觉。话不多说，让我们来看看第一个游戏的大纲。\n\
  \n### PongClone 通用游戏规格\n\n*   通用描述：PongClone 游戏由两名玩家组成，每人一个球拍，分别位于屏幕的左边缘或右边缘。玩家们竞争，让游戏球越过对手的球拍从而得分。第一个得到七分的玩家获胜。\n\
  \n*   玩家数量：游戏应支持一名或两名玩家。\n\n*   获胜条件：第一个得到七分的玩家。\n\n*   失败条件：对手在你之前得到七分。\n\n*  \
  \ 游戏屏幕：\n    *   启动画面\n\n    *   加载画面\n\n    *   主菜单画面\n\n    *   游戏画面\n\n*   游戏画面详情：\n\
  \    *   启动画面：一个带有 Logo 的启动画面，显示几秒钟。\n\n    *   加载画面：一个带有 Logo 和加载条的加载画面。\n\n  \
  \  *   主菜单画面：一个菜单画面，包含标题、副标题、单人游戏、双人游戏、退出游戏菜单选项以及一个版本号功能。\n\n    *   游戏画面：一个游戏画面，带有一个具有倒计时功能的说明子画面。游戏还应支持退出游戏子画面、游戏结束画面、玩家得分，以及在单人模式下支持\
  \ AI 对手。\n\n*   游戏输入详情：\n    *   玩家一输入：键盘上下箭头键\n\n    *   玩家二输入：键盘按键、鼠标输入\n\n以上就是我们对\
  \ PongClone 游戏的大纲。仔细查看规格列表的细节，并思考可以使用哪些游戏引擎功能来满足不同的游戏需求。\n\n## DungeonTrap 游戏大纲\n\
  \n我们在本书这一部分要构建的第二个游戏是 DungeonTrap。这个游戏比你要开始的 PongClone 游戏稍微复杂一些。即便如此，游戏规格也不应过于详细。这个游戏构建的章节是独立的，可以从本书的\
  \ GitHub 仓库下载。\n\n例如，我会提到游戏需要随机掉落物品，但我不会具体列出它们是什么，尽管我对要实现什么有很好的想法。我这样做的理由是，物品掉落的功能几乎完全相同，所以目前我真的不需要指定一个具体的物品列表。随着你积累更多构建游戏的经验，你将学会如何把握这条微妙的界限。\n\
  \n\n\n### 地牢陷阱 通用游戏规格\n\n*   **总体描述**：地牢陷阱游戏包含一名或两名被困在地牢密室中的玩家，敌人会分阶段一波波涌入房间。玩家使用武器、道具和物品击退敌人浪潮，并收集积分。随着敌人被击败，会随机掉落物品供玩家拾取。击败所有敌人浪潮即可逃离地牢陷阱！\n\
  \n*   **玩家数量**：游戏应支持一名或两名玩家。\n\n*   **获胜条件**：存活过十波敌人。\n\n*   **失败条件**：受到敌人的致命伤害。\n\
  \n*   **游戏界面**：\n    *   启动画面\n    *   加载画面\n    *   主菜单画面\n    *   游戏画面\n\n*  \
  \ **游戏画面详情**：\n    *   **启动画面**：显示一个带有标志的启动画面，持续几秒钟。\n    *   **加载画面**：显示一个带有标志和加载进度条的加载画面。\n\
  \    *   **主菜单画面**：一个包含标题、副标题、单人模式、双人模式、退出游戏菜单选项以及版本号功能的菜单画面。\n    *   **游戏画面**：一个包含带有倒计时功能的说明子画面的游戏画面。游戏还应支持退出游戏子画面、游戏结束画面、玩家状态\
  \ HUD 以及 AI 对手。\n\n*   **游戏输入详情**：\n    *   **玩家一输入**：使用键盘上的上、下、左、右方向键以及 A 键和 B\
  \ 键进行输入。\n    *   **玩家二输入**：使用四个模拟方向键的键盘按键以及 A/B 输入。\n\n请注意，尽管这个游戏显然比之前的游戏复杂得多，但大纲并没有比之前长太多。我认为这正是一个优秀游戏大纲的体现。我们不会试图解决任何实现问题或指定任何深入细节——只提供高层概念。最后一点想法：不要害怕偏离最初的计划。制作游戏充满挑战，面对任何足够有挑战性的经历，你最终都必须适应并克服困难。\n\
  \n## 游戏资源\n\n说到游戏资源，我已经为你准备好了。我会提供一套基础资源，包括音效、图片和类配置文件。本文的主要焦点是仅使用 IDE 和游戏引擎，通过代码来构建游戏。因此，我不会要求你为我们在此创建的游戏编辑或创建资源。话虽如此，图片和音效是大多数游戏不可或缺的组成部分。\n\
  \n开始思考获取游戏资源的不同方式吧。你可以在网上搜索提供游戏资源的网站，自己创建资源，或者与朋友合作。如果你不是艺术家，也不要气馁。相信我，有很多选择在等着你。\n\
  \n我还想提一下，本书这部分内容的每一章都附带了示例游戏项目。你可以打开并查看对应章节游戏的完整实现。这些章节项目包含在游戏引擎的主项目中。这可以帮助你解决代码中的错误，所以请务必记住这一点。至此，我们已到达本引言部分的结尾。祝你编码愉快！\n\
  \n# 16. PongClone 项目设置\n\n在开始本章之前，我想列出一些通用的项目说明，以确保你能正确设置并快速解决最常见的问题。说明如下：\n\nJava：\n\
  \n1.  游戏项目应在项目的“运行”设置中，将工作目录配置为“./dist”。\n\nJava 和 C#：\n\n1.  静态主类的 `ENGINE_CONFIG_FILE`\
  \ 字段应指向游戏项目“cfg”目录中的配置文件，路径相对于项目的工作目录。\n\n2.  游戏引擎配置文件应有一个 `NAME` 条目，其值与关联的项目及该项目的资源文件夹名称相同。\n\
  \n3.  要关闭游戏手柄 1 的输入，请在游戏引擎配置文件中添加以下行：\n\n在本章中，我将引导你使用 Java 或 C# 设置一个新的游戏开发项目。你可以将本章作为两个版本游戏引擎的参考。我们还将准备游戏的资源，包括图片、音效以及游戏画面用于数据驱动定制的类配置文件。\n\
  \n我们将分步骤进行项目开发。本章代表我们的第一步。因为我们希望在开发步骤结束时得到可运行的功能，所以我将开发过程设计为：你在每章结束时都能得到一个可以编译和运行的程序。需要说明的是，在现实世界中可能并非总是如此。\n\
  \n有时你会努力实现某个功能，但项目可能无法编译或正常运行。这完全正常。不要认为电子游戏开发总是像我们这里构建的游戏那样一清二楚。我想花点时间提一下在基于 OSX\
  \ 的电脑上操作时的两个注意事项。第一件事是，在尝试加载和运行游戏项目时，你可能会在 NetBeans IDE 中遇到安全异常。\n\n我收到的错误信息大致是说文件“libjnidispatch-440.jnilib”导致了“无法打开，因为无法验证开发者”的错误。打开你的\
  \ Mac 系统偏好设置，进入安全与隐私部分。你会注意到，当在 IDE 中遇到该错误时，会弹出一个应用程序安全例外条目。请为 IDE 以及运行游戏进行测试时都接受该安全例外。调整之后，这些消息就会停止出现。\n\
  \n你可能会遇到的第二个问题与 OSX 键盘按键的上下文菜单有关。当你按住一个键几秒钟时，这个菜单就会弹出。它允许你选择带有不同语言重音符号的按键版本。请上网搜索如何针对你的\
  \ OSX 版本开启和关闭此功能。在测试游戏之前，请务必将其**关闭**，否则在游戏过程中，当上下文菜单被触发但并未实际显示时，你可能会无意中锁定某个键盘按键。\n\
  \n\n\n## 新建项目：Java/NetBeans IDE\n\n在本节中，我们将回顾使用您刚刚了解的游戏引擎 API 在 Java 中创建一个全新游戏开发项目所需的步骤。首先，我们将概述\
  \ Java 版本游戏引擎的创建流程；然后，我们将了解 C# 版本的流程。启动 NetBeans IDE，让我们开始工作吧！请确保在 IDE 中打开了 `MmgGameApiJava`\
  \ 项目。\n\n完成后，从应用程序菜单中选择“文件 ➤ 新建项目...”，并在您存放 NetBeans 项目的目录中创建一个新项目。从“新建项目”弹出窗口中选择“Java\
  \ with Ant”类别。从“项目”列表中，选择“Java 应用程序”选项，然后单击“下一步 >”按钮。\n\n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig1_HTML.jpg](img/508392_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1\n\nJava 项目设置 1\n\n将“项目名称”字段设置为“PongClone”。确保“项目位置”和“项目文件夹”字段的值正确。保持“使用专用文件夹存储库”和“创建主类”选项未选中，如下图所示，然后单击“完成”按钮。\n\
  \n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig2_HTML.jpg](img/508392_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2\n\nJava 项目设置 2\n\n现在，您的项目列表中应该有一个名为 PongClone 的新空项目。接下来，我们需要进行一些项目配置。右键单击您的新项目，然后选择“属性”选项。您应该会看到一个“项目属性”弹出窗口，左侧是类别列表，右侧是类别详细信息。选择“构建”类别下的“打包”选项。\n\
  \n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig3_HTML.jpg](img/508392_1_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3\n\nJava 项目设置 3\n\n确保项目的“JAR 文件”设置为“dist/PongClone.jar”。确保在项目的“运行”设置下，工作目录设置为“./dist/”。同时，确保如上所示选中了“编译后构建\
  \ JAR”和“复制依赖库”选项。现在我们需要设置项目资源。如果尚未加载，您需要加载 `MmgGameApiJava` 项目。单击项目列表旁边的“文件”选项卡。如果在那里看不到它，您也可以通过单击“窗口”菜单选项并选择“文件”条目来访问文件视图。\n\
  \n打开 `MmgGameApiJava` 文件夹，找到其中名为“cfg”的文件夹。打开“cfg”目录，找到“asset_src”文件夹。在此文件夹中，应该有一个名为“pong_clone_resources”的文件夹。打开它，找到里面名为“cfg”的文件夹。复制此文件夹并将其粘贴到\
  \ PongClone 游戏项目文件夹的根目录中。您的新游戏项目现在拥有了一套完整的、可供使用的资源。\n\n我们即将开始编写一些代码，但首先还有一些事情需要处理。我们需要整理好项目的库。首先，让我们添加对游戏引擎\
  \ API 的引用。再次打开 PongClone 项目的属性弹出窗口。这次，从左侧的类别列表中选择“库”类别。在“编译”选项卡下，找到“类路径”部分，如下所示。\n\
  \n![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig4_HTML.jpg](img/508392_1_En_16_Fig4_HTML.jpg)\n\
  \n图 16-4\n\nJava 项目设置 4\n\n单击“+”按钮，然后选择“添加项目”选项。从列表中选择“MmgGameApiJava”项目，您现在应该会在“类路径”部分下看到该游戏引擎项目。关闭“项目属性”弹出窗口。重新打开“文件”视图。再次找到游戏引擎项目文件夹并打开它。您应该会在项目的根目录中看到一个名为“lib”的文件夹。\n\
  \n复制该文件夹，然后返回上一级目录到项目列表。找到“PongClone”文件夹，并将“lib”文件夹粘贴到项目的根目录中。我们只需要再注册两个库，项目配置就完成了。再次打开\
  \ PongClone 项目的属性弹出窗口。选择“库”类别，并找到“类路径”部分。\n\n单击“+”按钮，然后选择“添加 JAR/文件夹”选项。导航到 PongClone\
