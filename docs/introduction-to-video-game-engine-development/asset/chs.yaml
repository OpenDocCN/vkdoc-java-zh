  示例游戏屏幕位于 MmgTestSpace 包（如果你使用 C#，则为命名空间）的 `ScreenTestMmgObj` 类中。请注意，方法行号是相对于该方法而言的，而不是整个文件。`LoadResources`
  方法被所有示例游戏屏幕使用，负责初始化游戏屏幕使用的可绘制对象。在第 3 行，我们确保屏幕处于暂停状态，这样它就不会在未完全初始化时尝试绘制自身。屏幕可绘制空间的宽度、高度和位置是根据
  `MmgScreenData` 类的计算值设置的。`MmgScreenData` 类根据窗口尺寸和所需的游戏面板尺寸确定适当的缩放比例，第 4–6 行。


  此游戏屏幕的 `title` 在第 8–12 行设置。请注意，标题的字体由 `MmgFontData` 类维护。此类与 `MmgScreenData` 类类似，它根据屏幕当前的缩放设置处理字体大小的缩放。请注意缩放功能。这个
  2D 游戏 API 旨在某些方面自动调整大小，其中两个方面是屏幕尺寸和字体大小。


  文本在第 9 行设置，在第 10 行我们看到使用了 `MmgHelper` 类。到目前为止，我们已经看到许多静态支持类派上了用场。`MmgHelper` 类是另一个方便的支持类，它方便地提供了对对象定位方法的访问。接下来，在第
  11 行，我们稍微调整了定位，将标题向下移动了缩放后的 30 像素。`ScaleValue` 方法是一个易于访问的静态方法，它会根据屏幕的缩放设置来缩放一个数值。


  每个字面距离、位置或大小值都应通过 `MmgHelper` 类的 `ScaleValue` 方法传递。这将确保你的游戏可以在不同的分辨率下运行，并且所有定位、字体和屏幕尺寸都会自动调整以适应当前分辨率。该代码块的最后一行，第
  12 行，将 `title` 的 `MmgFont` 实例添加到屏幕的可绘制对象集合中。因为我们为此游戏屏幕扩展了 `MmgGameScreen` 类，所以我们拥有该类的一些内置功能。




  接下来，在第 14 至 18 行，我们准备了要在当前屏幕上显示的`MmgObj`对象的尺寸。在第 14 行，我们设置了内边距；同样，我们确保对数值进行了缩放。第
  15 行将`MmgObj`的期望宽度存储在`objW`变量中。初始化它的公式简单地计算了三个由内边距值分隔并居中于屏幕的方框的宽度。在第 16 行，期望高度`objH`被设置为`ScaleValue`的
  150。然后在第 17 和 18 行，计算了`MmgObj`实例的`Y`坐标。居中的高度考虑了内边距和所用标签字体的高度。


  最后，`Y`坐标增加了屏幕的 Y 偏移量。这样做是为了防止屏幕的`Y`坐标不为零。变量`objX`被设置为内边距变量的值，因为当`MmgObj`在屏幕上定位时，这将是`X`坐标的起始值。在第
  20 至 23 行的代码块中，我们实例化了一个新的`MmgObj`并设置了它的位置和大小。


  请注意，我们没有通过`AddObj`方法将`MmgObj`实例添加到屏幕的可绘制对象集合中。你能猜到为什么吗？这是因为`MmgObj`类默认没有任何可绘制的内容。我们通过让`MmgDraw`方法在示例游戏屏幕中显式绘制对象实例来解决这个问题，该方法直接调用`MmgPen`类的`DrawRect`方法，该方法接受一个`MmgObj`参数，并使用它在屏幕上绘制一个与对象位置和大小相同的矩形。


