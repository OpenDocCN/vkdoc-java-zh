    ## Other Classes: MmgEventHandler


    The `MmgEventHandler` is an interface that a class can implement so that it can
    handle certain `MmgEvent` objects. The `MmgEventHandler` class is implemented
    as an interface so that any class can implement it and register to handle events.


    ### Class Review


    Because the `MmgEventHandler` interface does not have the same features as a regular
    class, we’ll just print out the code and talk about it directly.


    ```

    1 public interface MmgEventHandler {

    2     public void MmgHandleEvent(MmgEvent e);

    3 }

    Listing 4-11

    MmgEventHandler Class Review 1

    ```


    The `MmgEventHandler` interface defines one method signature, `MmgHandleEvent`.
    When a class implements the interface, it must define the `MmgHandleEvent` method
    and in doing so can receive registered events. It’s really that simple.


    ### Demonstration: MmgEventHandler Class


    For this class’ demonstration, we’ll take a look at three snippets of code that
    show you how to set up an `MmgEvent` and handler.


    ```

    //MmgScrollVert

    01 public void SetEventHandler(MmgEventHandler e) {

    02     clickScreen.SetTargetEventHandler(e);

    03     clickUp.SetTargetEventHandler(e);

    04     clickDown.SetTargetEventHandler(e);

    05 }

    //ScreenTestMmgScrollVert.LoadResources

    01 scrollVert = new MmgScrollVert(vPort, sPane, sBarColor, sBarSldrColor, sBarWidth,
    sBarSldrHeight, interval);

    02 scrollVert.SetIsVisible(true);

    03 scrollVert.SetWidth(sWidth + scrollVert.GetScrollBarWidth());

    04 scrollVert.SetHeight(sHeight);

    05 scrollVert.SetEventHandler(this);

    //ScreenTestMmgScrollVert

    01 public void MmgHandleEvent(MmgEvent e) {

    02     if(e.GetEventId() == MmgScrollVert.SCROLL_VERT_CLICK_EVENT_ID || e.GetEventId()
    == MmgScrollHor.SCROLL_HOR_CLICK_EVENT_ID || e.GetEventId() == MmgScrollHorVert.SCROLL_BOTH_CLICK_EVENT_ID)
    {

    03         MmgVector2 v2 = (MmgVector2)e.GetExtra();

    04         event.SetText("Event: Id: " + e.GetEventId() + " Type: " + e.GetEventType()
    + " Pos: " + v2.ApiToString() + " Msg: " + e.GetMessage() + " " + System.currentTimeMillis());


    06     } else {

    07         event.SetText("Event: Id: " + e.GetEventId() + " Type: " + e.GetEventType()
    + " Msg: " + e.GetMessage() + " " + System.currentTimeMillis());


    09     }


    11     MmgHelper.CenterHor(event);

    12 }

    Listing 4-12

    MmgEventHandler Class Demonstration 1

    ```


    The first snippet of code listed in the preceding shows the `SetEventHandler`
    method of the `MmgScrollVert` class. This method is used to register event handlers
    for the different events supported by the class. Notice that each event supported
    by the class has its event handler set, lines 2–4. The next snippet of code is
    from the `ScreenTestMmgScrollVert` class’ `LoadResources` method from the MmgTestSpace
    library. In this code block, a new instance of the `MmgScrollVert` class is initialized.
    Notice that on line 5 the event handler for the scroll pane widget is set to the
    game screen.


    That brings us to the last piece of the puzzle – the event handler method from
    the game screen class, `ScreenTestMmgScrollVert`. On line 2, we check to see if
    the event received is an event we can process by looking at the `id` and `type`
    fields of the received object. If we can process the event, an `MmgVector2` object
    is cast from the `extra` field, line 3. In this case, we use the click information
    to update an `MmgFont` instance’s text.


    ## Chapter Conclusion


    In this chapter, we completed a review of the “other” classes. The classes we
    covered are very useful, and I’ll summarize them as follows:


    *   `MmgCfgFileEntry`: A class that models a line of data in a class config file.
    This class is used to store data from a class config file line and use it to set
    up a game screen.

    *   `MmgEvent`: A general event class that provides basic event support to the
    API.

    *   `MmgEventHandler`: An event handler interface. This interface is used to set
    up an event handler to receive registered events. When used in combination with
    the `MmgEvent` class, the two classes constitute a simple event system.


    There is subtle power in these classes. Take a minute to think about the event
    system configuration. Notice how general it is. Like most of the functionality
    we’re building up to support the game engine, we have a generalized event system
    that you can use in your next game. When working with events, be sure not to abuse
    them. Think about using events when one class needs to notify another class about
    something that happened. Use that as a guide when implementing events.'
