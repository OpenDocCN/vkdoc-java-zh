    The first group of main methods to review consists of two constructors. The first
    constructor takes arguments for the background image, font, width, height, padding,
    and display character length. The arguments are used to set class fields. Even
    though this constructor does not set a text value for the class, the `Prep` method
    is called to configure the text field and position the child objects.


    The next constructor listed is a specialized class constructor we’ve seen before.
    This constructor takes an `MmgTextField` as an argument and uses it to create
    a new, unique copy of the object. This constructor supports the class’ cloning
    functionality. The `Clone` and `CloneTyped` methods are used to create new, unique
    copies of this class. The methods use the specialized constructor, as we’ve seen
    previously, and return either a cast `MmgObj` instance or an `MmgTextField` instance,
    respectively.


    The third group of methods, text field management methods, starts with the input
    handler, the `ProcessKeyClick` method. This method updates the `textFieldString`
    field and checks to see if the max length constraint is on and if it has been
    triggered. If so, the max length event will be fired. The `DeleteChar` method
    will remove a character from the end of the text field’s string. Note that the
    `ProcessKeyClick` and `DeleteChar` methods both set the `isDirty` flag to true
    before they exit. The last method in this group is the `Prep` method. The `Prep`
    method is responsible for setting up the nine-slice background image, the font,
    and the cursor timing. It prepares the class for use.


    The last group of methods are standard main methods that we won’t go over again
    here. You’ve seen these methods a number of times by now: standard game engine
    drawing routine update and draw methods, `MmgUpdate` and `MmgDraw`, respectively,
    and an API-level comparison method `ApiEquals`, for determining object equality.
    I should mention that the update method is responsible for powering the text field’s
    cursor.


    If you use the text field in a more manual way, outside the game screen’s list
    of drawable objects, you’ll need to explicitly call the class’ `MmgUpdate` method
    in the screen’s update method if you want the cursor to blink.


    ### Demonstration: MmgTextField Class


    The following demonstration code is from the `LoadResources` method of the `ScreenTestMmgTextField`
    class from the MmgTestSpace library. The two methods that follow the initial code
    snippet are from the same class. These methods show the keyboard input processing
    and the API event handling. Let’s jump into some code!


    ```

    //ScreenTestMmgTextField.LoadResources

    01 int width = MmgHelper.ScaleValue(256);

    02 int height = MmgHelper.ScaleValue(64);

    ...

    03 bground = MmgHelper.GetBasicCachedBmp("popup_window_base.png");

    04 txtField = new MmgTextField(bground, MmgFontData.CreateDefaultMmgFontLg(),
    width, height, 12, 15);

    05 MmgHelper.CenterHorAndVert(txtField);

    06 txtField.SetMaxLengthOn(true);

    07 txtField.SetEventHandler(this);

    08 txtField.SetY(txtField.GetY() - MmgHelper.ScaleValue(30));

    09 AddObj(txtField);

    //ScreenTestMmgTextField.ProcessKeyClick

    01 public boolean ProcessKeyClick(char c, int code) {

    02     if(Character.isLetterOrDigit(c)) {

    03         txtField.ProcessKeyClick(c, code);

    04     } else if(code == 8) {

    05         txtField.DeleteChar();

    06     }

    07     txtFieldText.SetText("Text Field Text: " + txtField.GetTextFieldString());

    08     MmgHelper.CenterHor(txtFieldText);

    09     return true;

    10 }

    //ScreenTestMmgTextField.MmgHandleEvent

    01 public void MmgHandleEvent(MmgEvent e) {

    02     MmgHelper.wr("ScreenTestMsgTextField.HandleMmgEvent: Msg: " + e.GetMessage()
    + " Id: " + e.GetEventId());

    03     if(e.GetMessage() != null && e.GetMessage().equals("error_max_length")
    == true) {

    04         txtFieldMaxLenError.SetText("Max Len Error Current Time MS: " + System.currentTimeMillis());

    05         MmgHelper.CenterHor(txtFieldMaxLenError);

    06     }

    07 }

