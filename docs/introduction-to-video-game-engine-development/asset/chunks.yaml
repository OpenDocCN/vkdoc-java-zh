- fmt: '### Main Method Details


    The main method details for this particular class consist of constructors.


    ```

    public MmgScreenData() { ... }

    public MmgScreenData(int w, int h) { ... }

    public MmgScreenData(int ScreenWidth, int ScreenHeight, int GameWidth, int GameHeight)
    { ... }

    Listing 3-17

    MmgScreenData Main Method Details 1

    ```


    The first constructor we’ll look at takes no arguments and is used to prepare
    the class’ static fields. Because the `MmgScreenData` class is primarily a static
    helper class, it mainly exposes static methods and fields that hold data about
    the game’s dimensions, position, and scaling. Notice that each constructor overload
    attempts to set the static class fields to provided argument values, when available.
    If not, default values are used instead of calculated values.


    The proper way to use this class is to provide the game panel and window dimensions
    to the overloaded constructor. This results in static class fields being set and
    the `CalculateScaleAndOffset` static class method being called. Take notice that
    the other constructors listed don’t call the scaling calculation method because
    default values are used instead.


    ### Demonstration: MmgScreenData Class


    The `MmgScreenData` class is a centralized helper class, and as such it is used
    a lot by other classes.


    ```

    screenData = new MmgScreenData(winWidth, winHeight, GamePanel.GAME_WIDTH, GamePanel.GAME_HEIGHT);

    Listing 3-18

    MmgScreenData Class Demonstration 1

    ```


    The preceding line of code is from the MmgCore package’s `GamePanel` class. This
    line is really important to the game engine and demonstrates how the `MmgScreenData`
    class is prepared. All static class fields and methods should work just fine once
    the class is instantiated and properly configured.


    ## Helper Classes: MmgFontData


    The `MmgFontData` class is designed to hold data about fonts, styles, and sizes.
    Its main focus is to provide easy access to `MmgFont` instances configured with
    different styles and sizes. The `MmgFontData` class follows, to a certain extent,
    the design and implementation of the `MmgScreenData` class in that although the
    class is used as a static helper class, it still requires preparation before it
    can be used. However, once the class is properly initialized, it provides access
    to a variety of different `MmgFont` instances.


    ### Static Class Members


    The `MmgFontData` class has a number of static class members. We’ll begin this
    section of the class review with the static class fields listed in the following.


    ```

    public static String DEFAULT_FONT_FAMILY = Font.SERIF;

    public static int DEFAULT_FONT_TYPE = Font.PLAIN;

    private static int fontSize = 18;

    private static int targetPixelHeight = 22;

    private static int targetPixelHeightScaled = 22;

    Listing 3-19

    MmgFontData Static Class Members 1

    ```


    The first set of static class fields listed in the preceding prepares default
    values for some important font metrics. The first two entries listed set default
    values for the font family and type. The next three fields are used to store font
    size information. They are initialized to values that define a reasonable, normal-sized
    font.


    The `fontSize` field is defaulted to 18, and the `targetPixelHeight` and `targetPixelHeightScaled`
    class fields are defaulted to 22. These two fields will be used to synchronize
    the font height, in pixels, with information from the `MmgScreenData` class. This
    is done so font sizes automatically scale with the screen.


    The second set of static class fields is used to set up default instances of the
    framework’s font class and the `MmgFont` class. There are also static class fields
    that hold default instances of the `MmgFont` class in normal, bold, and italic
    font styles.


    These class instances are based on the framework font instances `fontNorm`, `fontBold`,
    and `fontItalic`. There are a number of methods for working with framework fonts
    and `MmgFont` objects, specifically for creating different font sizes and styles.


    ```

    public static Font CreateDefaultBoldFont(int sz) { ... }

    public static Font CreateDefaultBoldFontLg() { ... }

    public static Font CreateDefaultBoldFontSm() { ... }

    Listing 3-20

    MmgFontData Static Class Members 2

    ```


    The set of methods listed in the preceding are used to instantiate a new framework
    font object of a specific type and size. I’ve only listed a few of them here.
    These methods have a name similar to `CreateDefaultBoldFont` and return a framework
    `Font` instance. Notice that all the methods that take a size argument check to
    make sure the font size is not larger than the maximum allowed font size of 50.


    These methods are designed to work with the default font family and either a specified
    font size and style or the default font size and style. Keep in mind they are
    used to create framework font objects. Next, we’ll see how we can create `MmgFont`
    objects.


    ```

    public static MmgFont CreateDefaultBoldMmgFont(int sz) { ... }

    public static MmgFont CreateDefaultBoldMmgFontLg() { ... }

    public static MmgFont CreateDefaultBoldMmgFontSm() { ... }

    public static void CalculateScale() { ... }

    Listing 3-21

    MmgFontData Static Class Members 3

    ```


    The next set of static methods should be immediately familiar. For each method
    that returned a framework font object, in the previous set of methods we’ve reviewed,
    there is a corresponding method that returns a new `MmgFont` object. As you can
    see, there is a lot of flexibility as to how you can set up a font. I recommend
    sticking with the default values at first until you get the hang of things. The
    remaining class methods are get and set methods for the static class fields we
    reviewed earlier. I won’t list them here, but take a moment to review them on
    your own and understand exactly how they work.


    The last method we’ll review in this section is the `CalculateScale` method. This
    method is very similar to the scale calculation methods found in the `MmgScreenData`
    class. Ultimately, we’re going to measure the pixel height of the `MmgFont` instance
    and adjust its size until the font’s height matches the scaled target pixel height.
    If the font height is off, the font point size is adjusted by 1 until a good font
    size is found or the maximum number of iterations has been reached.


    All of the default font static fields are updated to reflect the new font size.
    In this way, the game engine can synchronize the scaling of the screen through
    the `MmgScreenData` class, fonts through the `MmgFontData` class, and image resources
    through the use of the `MmgHelper` class’ loading methods.


    ### Main Method Details


    The only main method we have to review for this class is the class constructor.
    Much like the `MmgScreenData` class, the `MmgFontData` class requires an instantiation
    before the class can configure itself and be available for use to the API. What
    is more, the `MmgFontData` class configuration has to occur after the `MmgScreenData`
    class because it relies on scaling values calculated by the `MmgScreenData` class.


    The class constructor is a pass-through to call the static configuration methods.
    You don’t have to use the class this way. You could just call the static methods
    directly, but I tend to use the constructor and keep a reference to the `MmgFontData`
    class around at a high level in the code.'
