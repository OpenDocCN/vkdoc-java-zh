    ## 动态设置：DatConstantsEntry 类


    游戏引擎能够从 XML 文件中加载值到特定类的静态字段中。你能想到我们为何要将此功能限制在静态类字段上吗？使用静态字段所需的初始化工作更少，因为被更新的字段可以通过静态方式直接访问，无需进行类初始化。


    这使我们能够通过设置和配置文件，以数据驱动的方式配置游戏引擎和游戏本身。我们可以为一个游戏创建多个配置文件，也可以为多个游戏创建多个配置文件。这完全取决于你。`DatConstantsEntry`
    类旨在保存游戏引擎配置文件中的单行数据。


    引擎还允许你将配置文件指定为默认命令行参数之一。如果你在游戏启动命令的末尾添加文本 `ENGINE_CONFIG_FILE=` 后跟一个有效的配置文件，就可以在运行时动态设置引擎使用的配置文件。如果对游戏启动命令感到陌生，可以随时翻回第
    10 章复习一下。


    动态修改游戏设置的能力是一个非常强大的工具，但请务必小心。当你通过配置文件覆盖设置时，在查看甚至测试代码时可能并未意识到这一点。这可能会让你困惑，为什么你通过代码设置的值没有生效。请记得检查所有可能设置值的方式，包括配置文件。


    ### 类字段


    `DatConstantsEntry` 类的字段用于描述要存储到目标静态字段中的值。让我们来看一下！


    ```

    public String key;

    public String val;

    public String type;

    public String from;

    代码清单 11-1

    DatConstantsEntry 类字段 1

    ```


    `key` 字段不仅是存储数据条目的键，它还是存储数据的目标字段的确切名称。你必须确保字段类型与你要存储的数据类型相匹配。`val` 字段是目标字段将要存储的值的字符串表示形式。在设置目标字段值的过程中，该字符串会被相应地转换。


    `type` 字段用于描述 `val` 字段中保存的数据类型。`type` 字段可以设置为 `int`、`float`、`double`、`short`、`string`
    或 `bool`。再次强调，请确保目标字段与要存储的数据类型兼容。列表中的最后一个条目是 `from` 字段。此字段应设置为静态字段所属的目标类，该静态字段的名称存储在
    `key` 字段中。


    ### 主要方法详情


    该类的主要方法都是构造函数。共有三个构造函数，如下所列。在我们回顾它们之前，请务必先看一下。


    ```

    public DatConstantsEntry(String k, String v) { ... }

    public DatConstantsEntry(String k, String v, String t) { ... }

    public DatConstantsEntry(String k, String v, String t, String f) { ... }

    代码清单 11-2

    DatConstantsEntry 主要方法详情 1

    ```


    我按照复杂度递增的顺序排列了这些构造函数。需要说明的是，当没有提供参数值时，该类默认将 `type` 字段设置为 `int`，将 `from` 字段设置为
    `GameSettings` 类。考虑到这一点，前两个构造函数只是初始化 `GameSettings` 配置文件条目的快捷方式。列出的最后一个构造函数可能是你最常用的。这个条目允许你直接通过构造函数参数来指定每个字段。


    `DatConstantsEntry` 类的介绍到此结束。接下来，我们将详细审视这个类。通常我会在此处过渡到演示部分，但我们在配置文件导入过程中会再次遇到
    `DatConstantsEntry` 类，因此我们将转而深入回顾配置文件的格式。


    ### 深入解析：DatConstantsEntry


    首先，让我们回顾一下游戏引擎配置文件通常存储的位置。当然，你可以在游戏启动参数中指定这些文件的自定义路径。游戏引擎项目中包含了一些默认的游戏引擎配置文件供你参考。


    游戏项目设置的常规结构应在项目根目录下包含一个名为 **cfg** 的配置文件夹。以下是一个展示 **cfg** 文件夹设置的简单示意图。


    ```

    MmgGameApiJava

    |-> cfg (资源和配置目录)

    |-> class_config (类配置文件)

    |-> playable (音频资源)

    |-> auto_load (全局音频资源)

    |-> sound1.wav

    |-> MmgTestSpace (项目特定音频资源)

    |-> jump2.wav

    |-> drawable (图像资源)

    |-> auto_load (全局图像资源)

    |-> a_btn.png

    |-> MmgTestSpace (项目特定图像资源)

    |-> b_btn.png

    |-> engine_config.xml (直接路径游戏引擎配置)

    |-> engine_config_mmg_test_space.xml

    |-> engine_config_mmg_dungeon_trap.xml

    代码清单 11-3

    深入解析 DatConstantsEntry 1

    ```


    要加载的默认游戏引擎配置文件在静态主类的 `ENGINE_CONFIG_FILE` 字段中指定。默认值为文件 **engine_config.xml**。你可以在
    IDE 中打开配置文件查看，但我会在此处打印一个简短的示例。


    ```


    代码清单 11-4

    深入解析 DatConstantsEntry 2

    ```


    你可以使用这个 XML 文件 **engine_config.xml** 作为模板，为你的下一个游戏创建新文件。文件的第一行是标准的 XML 头部。第二个条目定义了使用的主标签，即
    `engineconfig` 标签。你必须为此标签指定一个版本号作为属性。


    你能想到为什么这是一个好主意吗？通过使用这个属性，你可以指定一个版本号，从而允许你在未来创建新的 XML 配置文件格式。只要你有唯一的版本号，就可以利用该信息来更改解析
    XML 文件的代码。通过这种设置，你可以让你的游戏配置面向未来。


    第 3 到 6 行包含了实际的配置信息。XML 标签与 `DatConstantsEntry` 类的字段完美匹配，你可以看到加载过程的一部分就是将 XML
    条目简单地转换为 `DatConstantsEntry` 对象列表。


    ## 动态设置：GameSettingsImporter 类


    `GameSettingsImporter` 类负责解析游戏引擎配置文件，并根据配置文件中的 `entry` 标签生成一个 `DatConstantsEntry`
    对象数组。让我们来看一些代码！


    ### 类字段


    这个类只有两个字段需要我们关注，如下所示。


    ```

    public Hashtable values;

    public String version;

    代码清单 11-5

    GameSettingsImporter 类字段 1

    ```


    第一个字段是一个用于保存配置文件条目的数据结构。请注意，这是一个键值对结构。此处的键将是关联的 `DatConstantsEntry` 对象的 `key`
    字段。在 C# 版本中，这个字段会是 `Dictionary` 对象而不是 `Hashtable`。下一个字段是配置文件的版本号。我们在之前介绍配置文件的
    `engineconfig` 标签时已经遇到过这个值。


    ### 支持方法详情


    `GameSettingsImporter` 类有两组 get 和 set 方法，如下所示。


    ```

    public Hashtable GetValues() { ... }

    public void SetValues(Hashtable v) { ... }

    public String GetVersion() { ... }

    public void SetVersion(String v) { ... }

    代码清单 11-6

    GameSettingsImporter 支持方法详情 1

    ```


    第一组支持方法让你能够访问已加载的值。第二组方法让你能够访问引擎配置文件的版本号。

