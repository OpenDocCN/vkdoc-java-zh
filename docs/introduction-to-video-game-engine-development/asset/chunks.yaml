    ## 安装 NetBeans IDE


    在本节中，你需要联网下载一份 IDE 以及本书配套的项目文件。联网并准备就绪后，打开你常用的浏览器，访问 NetBeans IDE 主站点 [`http://netbeans.org`](http://netbeans.org)。


    找到下载链接，它会将你导向一个包含近期 IDE 版本的列表。向下滚动，直到看到列表中最新的 LTS（长期支持）版本。在撰写本文时，最新的 LTS 版本是 12.1。下载并安装该软件。在
    NetBeans IDE 安装期间，请访问此 URL [`http://www.apress.com/source-code`](http://www.apress.com/source-code)，下载游戏引擎项目的
    Java 版本压缩包。


    项目文件下载完成后，解压缩，然后将其移动到你的 Java 项目目录中。如果你是新手，还没有项目目录，可以在你习惯存放文档的位置创建一个新文件夹。当 IDE
    安装完成，并且项目文件已解压并移动到目标位置后，启动 NetBeans IDE。从菜单中选择“文件 ➤ 打开项目...”。找到你刚刚下载并解压的项目文件夹的位置。


    项目加载完成后，我们需要检查几项内容。右键单击 `MmgGameApiJava` 项目，然后选择**属性**条目。项目设置窗口将弹出。在窗口左侧的类别列表中选择**打包**选项。你应该确保你的项目选项设置如下面的截图所示。


