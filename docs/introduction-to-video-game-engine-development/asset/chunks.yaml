    ## Game Screens: ScreenMainMenu


    The `ScreenMainMenu` class extends the MmgBase API’s `MmgGameScreen` class. This
    class provides a main menu screen that is aware of the game state and game panel
    aspects of the MmgCore API. You’ll notice some similarities between this screen
    and the previous two game screens we’ve reviewed.


    ### Class Fields


    This class’ fields are a mix of some standard fields we’ve seen before and a set
    of fields that power the screen’s menu system. I’ve separated the fields into
    the two groups listed in the following code snippet.


    ```

    //Standard fields

    public GameStates state;

    public GamePanel owner;

    public Hashtable classConfig;

    //Menu system fields

    public MmgBmp menuTitle;

    public MmgBmp menuSubTitle;

    public MmgBmp menuStartGame;

