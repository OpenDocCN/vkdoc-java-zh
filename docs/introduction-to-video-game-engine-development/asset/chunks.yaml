    public GamePanel GetGamePanel() { ... }

    //Redraw method

    public void Redraw() { ... }

    Listing 10-5

    MainFrame Support Method Details 1

    ```


    The support methods listed in the preceding follow the same order and grouping
    as their associated class fields we reviewed earlier. There is nothing really
    to cover here. These methods just provide access to the different class fields.
    There is one new method, the `Redraw` method. This method can be used to force
    the game panel to redraw itself.


    ### Main Method Details


    The `MainFrame` class has a modest set of main methods. Even though the class
    is important in the game’s startup process, it’s really just connecting the game
    panel’s canvas to the window frame. Due to this, there aren’t any very complex
    main methods. Let’s take a look at the ones we have listed in the following set.


    ```

    //Constructors

    public MainFrame(int WinWidth, int WinHeight) { ... }

    public MainFrame(int WinWidth, int WinHeight, int PanWidth, int PanHeight, int
    GameWidth, int GameHeight) { ... }

    //Main methods

    public void SetFrameRate(long fr, long rfr) { ... }

    public void InitComponents() { ... }

    Listing 10-6

    MainFrame Main Method Details 1

    ```


    The first two entries listed in the preceding are class constructors. The first
    constructor seems a bit underpowered, but it actually comes in handy when you’re
    working with a game that’s not in development and you can set the game panel and
    window to the same dimensions. The second constructor is probably the one you’ll
    use most often as it gives you more granular control over the game panel and window
    sizes.


    The next method has a very misleading name. This method doesn’t actually set the
    frame rate. It sets the frame rate debugging text in the development header that
    is displayed if the `MmgHelper` field, `LOGGING_ON`, is set to true. The last
    entry is the `InitComponents` method. We saw this method get called from the static
    main class. It’s responsible for reinforcing the window settings and registering
    the on-close event handler. That concludes our review of the `MainFrame` class.
    Up next, we’ll take an in-depth look at a particular block of code from this class.


    ### In Depth: MainFrame


    The in-depth code review for the `MainFrame` class comes from the class’ `InitComponents`
    method. Let’s take a look at some code!


    ```

    01 add(pnlGame.GetCanvas());


    03 pnlGame.GetCanvas().setFocusable(true);

    04 pnlGame.GetCanvas().requestFocus();

    05 pnlGame.GetCanvas().requestFocusInWindow();


    07 setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    08 addWindowListener(new WindowListener() {

    09     public void windowClosing(WindowEvent e) {

    10         try {

    11             MmgHelper.wr("MainFrame: WindowClosing");

    12             GamePanel.PAUSE = true;

    13             GamePanel.EXIT = true;

    14             RunFrameRate.PAUSE = true;

    15             RunFrameRate.RUNNING = false;

    16         } catch (Exception ex) {

    17             MmgHelper.wrErr(ex);

    18         }

    19         dispose();

    20     }


    22     ...


    24 });

    Listing 10-7

    MainFrame in Depth 1

    ```


    The first line of code is very important. This is where the canvas, the surface
    the game is drawn on, is set as the current window’s active canvas. On lines 3–5,
    the window properties are reinforced. The on-close event type is set on line 7.
    This tells the window class that it should exit the game when the window is closed.
    The on-close event handler is registered on line 8.


    The handler is defined in-line as an anonymous class. You’ll notice that the `windowClosing`
    method is defined, and this is where we’ll put any game closing code. Take a look
    at the functional equivalent of the on-close event handler from the C# version
    of the engine listed in the following code snippet.


    ```

    01 try

    02 {

    03     MmgHelper.wr("GamePanel: WindowClosing");

    04     GamePanel.PAUSE = true;

    05     GamePanel.EXIT = true;

    06     Dispose();

    07     Environment.Exit(0);

    08 }

    09 catch (Exception ex)

    10 {

    11     MmgHelper.wrErr(ex);

    12 }

    Listing 10-8

    MainFrame in Depth 2

    ```


    This snippet of code is from the C# project’s `GamePanel` class in the MmgCore
    namespace, specifically the `windowClosing` method. We created and named that
    method to match the naming found in the Java version. This method is registered
    as the program’s exit handler. Notice that the same code exists, almost line for
    line, in the C# version as in the Java version. Also, note that all of the MmgBase
    API code is exactly the same.


    ## Static Main Entry Point: GamePanel


    The `GamePanel` class is the last of the static main classes for us to review.
    This class is very important. It’s the connection point between the input and
    game screens. It’s the connection point between the MmgCore API and the MmgBase
    API, and it provides the game engine drawing routines that power all the example
    screens we looked at in Part 1 of this text.


    ### Static Class Members


    The class’ static members are listed in the following loosely grouped by the comment
    header.


    ```

    //Game controls

    public static boolean EXIT = false;

    public static boolean PAUSE = false;

    //Game dimensions

    public static int GAME_HEIGHT = 416;

    public static int GAME_WIDTH = 854;

    //Development HUD

    public static String FPS = "Drawing FPS: 0000 Actual FPS: 00";

    public static String VAR1 = "** EMPTY **";

    public static String VAR2 = "** EMPTY **";

    //General fields

    public static GameType GAME_TYPE = GameType.GAME_NEW;

    public static Hashtable VARS = new Hashtable();

    Listing 10-9

    GamePanel Static Class Members 1

    ```


    The `EXIT` and `PAUSE` fields are used to control the game’s execution. The `EXIT`
    field doesn’t cause the game to exit; it indicates the game is exiting. The game
    dimensions are stored in static fields. These are used in creating the game’s
    drawing surface. The next set of static fields only come into play if the `MmgHelper`
    class’ `LOGGING_ON` flag is set to true. If so, then there is a header drawn at
    the top of the game window.


    Note, you must set the window dimensions to include space for the development
    header if you plan to use it. The header will draw every frame and give you information
    about the current frame rate. There are also two variables that are displayed.
    You can use these variables to display debugging information during game play.


    The last two fields are general fields. The `GAME_TYPE` field is used to indicate
    the type of game that is running. The `VARS` static field can be used to hold
    global data that can be easily accessed from anywhere in your game.'
