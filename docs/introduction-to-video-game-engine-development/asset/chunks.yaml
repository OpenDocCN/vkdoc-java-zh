    从那个节点开始，所有代码都将与我们在本书第 1 和第 2 部分中回顾的 MmgBase 和 MmgCore 库中的 API 代码非常相似。你唯一会遇到的真正差异源于这两种编程语言的根本不同。正如我所提到的，在本节中，我们将设置
