    ### 主要方法详情


    `MmgLabelValuePair` 类的主要方法包括构造函数、克隆方法以及绘制和类准备方法。下面需要审查的方法列表中只有三个构造函数，但该类实际上还有更多方法。请务必通读并理解它们的工作原理。


    ```

    public MmgLabelValuePair() { ... }

    public MmgLabelValuePair(MmgFont fontLbl, MmgFont fontVal) { ... }

    public MmgLabelValuePair(MmgLabelValuePair obj) { ... }

    public MmgObj Clone() { ... }

    public MmgLabelValuePair CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    代码清单 5-13

    MmgLabelValuePair 主要方法详情 1

    ```


    第一个构造函数不接受任何参数，并为标签和值字体以及内边距和尺寸设置默认值。此构造函数不会为 `MmgFont` 实例设置任何文本值。在调用 `Reset`
    方法之前，类的尺寸被设置为零。`Reset` 方法将计算对象的尺寸，并根据标签和值字体的大小调整其位置。


    上面列出的第二个构造函数接受两个 `MmgFont` 参数，一个用于 `label`，一个用于 `value`。这可能是最常见的用例，即传入已配置好文本、样式和大小的
    `MmgFont` 对象。列出的最后一个构造函数应该看起来很熟悉。这是一个专门的构造函数，它接受一个 `MmgLabelValuePair` 对象作为参数，并使用它来创建该对象的一个新的、唯一的副本。


    接下来是类的克隆方法。`Clone` 和 `CloneTyped` 方法，正如我们之前所见，使用专门的构造函数创建一个新对象，并将其返回为强制转换为 `MmgObj`
    对象或作为 `MmgLabelValuePair` 实例。列表中的下一个方法是 `Reset` 方法。此方法对类的功能非常重要。它被设计为在更改标签 `MmgFont`、值
    `MmgFont` 或对象位置的任何支持方法之后调用。最后但同样重要的是，`MmgDraw` 方法负责将标签和值绘制到屏幕上，作为游戏引擎绘制例程的一部分。


    ### 演示：MmgLabelValuePair 类


    下面列出的示例代码片段来自 MmgTestSpace 包（在 C# 中为命名空间）中 `ScreenTestMmgLabelValuePair` 类的 `LoadResources`
    方法。该演示向您展示如何正确初始化一个 `MmgLabelValuePair` 对象。


    ```

    01 labelFont = MmgFontData.CreateDefaultBoldMmgFontLg();

    02 labelFont.SetMmgColor(MmgColor.GetGrayWolf());

    03 labelFont.SetText("Label1:");


    05 valueFont = MmgFontData.CreateDefaultBoldMmgFontSm();

    06 valueFont.SetMmgColor(MmgColor.GetBlueGray());

    07 valueFont.SetText("Value1");


    09 lvPair1 = new MmgLabelValuePair(labelFont, valueFont);

    10 MmgHelper.CenterHorAndVert(lvPair1);

    11 lvPair1.SetY(lvPair1.GetY() - MmgHelper.ScaleValue(30));

    12 AddObj(lvPair1);

    代码清单 5-14

    MmgLabelValuePair 类演示 1

    ```


    在第一个代码块中，使用第 2 行和第 3 行指定的文本和颜色创建了一个新的 `MmgFont` 对象。请注意，在第 1 行，大字体实例是通过 `MmgHelper`
    类的静态辅助方法创建的。第二个代码块（第 5-7 行）创建并配置了值 `MmgFont` 实例。最后一个代码块（第 9-12 行）展示了使用我们刚刚创建的两个
    `MmgFont` 对象实例化一个新的 `MmgLabelValuePair` 对象。


    请注意，我们只需要调用带有标签和值对象的构造函数。正如我们之前所见，构造函数通过内部调用 `Reset` 方法来负责准备类。在接下来的两行代码（第 10 行和第
    11 行）中，对象在水平和垂直方向上居中，然后通过调用 `AddObj` 方法添加到游戏引擎的绘制例程中。


    ## 高级类：MmgLoadingBar


    `MmgLoadingBar` 类是一个高级类，它使用 `MmgBmp` 对象来创建一个新的加载条。加载条由 `MmgLoadingScreen` 类用作资源加载过程的一部分。您可能会发现加载条不仅在游戏启动过程中有用，而且作为
    UI 元素也很有用。例如，您可以将此类用作生命条或充能计量器。


    ### 类字段


    `MmgLoadingBar` 的类字段如下所列。只有七个字段，它们用于保存前景图像、背景图像、定位以及加载条填充属性。


    ```

    //加载条图像

    private MmgBmp loadingBarBack;

    private MmgBmp loadingBarFront;

    //内边距方法

    private int xPadding;

    private int yPadding;

    //加载条填充方法

    private float fillAmt;

    private int fillHeight;

    private int fillWidth;

    代码清单 5-15

    MmgLoadingBar 类字段 1

    ```


    第一个类字段 `loadingBarBack` 用于绘制加载条的背景图像。在大多数情况下，您会希望为加载条的背景图像使用纯色。此图像将被调整大小以指示加载进度、生命值或充能条等级。接下来的类字段
    `loadingBarFront` 也是一个 `MmgBmp` 对象；它用作加载条的前景。这是覆盖实际条的图像。它通常是一个矩形或药丸形状的图像，中心被挖空，以便背景、进度条图像可见。


    第二组类字段用于为 `loadingBarBack` 图像的位置提供内边距调整。您可以调整 `xPadding` 和 `yPadding`，使加载条很好地适配
    `loadingBarFront` 图像的挖空窗口。最后一组字段用于描述用于调整 `loadingBarBack` 图像大小以匹配加载条进度的高度、宽度和填充量。`fillAmt`
    字段保存一个范围从 0.0 到 1.0 的值。此值用于计算 `loadingBarBack` 图像的适当宽度。通过这种方式，图像的宽度反映了存储在 `fillAmt`
    类字段中的进度百分比。

    '
- fmt: '### Support Method Details


    The support methods for the `MmgLoadingBar` class listed in the following allow
    you to control the background and foreground images, control the fill image’s
    size and padding, and reposition the loading bar.


    ```

    //Loading bar back methods

    public MmgBmp GetLoadingBarFront() { ... }

    public void SetLoadingBarFront(MmgBmp f) { ... }

    public MmgBmp GetLoadingBarBack() { ... }

    public void SetLoadingBarBack(MmgBmp b) { ... }

    //Loading bar fill methods

    public float GetFillAmt() { ... }

    public void SetFillAmt(float f) { ... }

    public int GetFillWidth() { ... }

    public void SetFillWidth(int w) { ... }

    public int GetFillHeight() { ... }

    public void SetFillHeight(int h) { ... }

    //Padding methods

    public int GetPaddingY() { ... }

    public void SetPaddingY(int py) { ... }

    public int GetPaddingX() { ... }

    public void SetPaddingX(int px) { ... }

    //Positioning methods

    public void SetPosition(MmgVector2 pos) { ... }

    public void SetPosition(int x, int y) { ... }

    public void SetX(int inX) { ... }

    public void SetY(int inY) { ... }

    Listing 5-16

    MmgLoadingBar Support Method Details 1

    ```


    The first set of support methods provide access to the background and foreground
    images. I should mention that the fill amount, scaling value, is cleared when
    the `SetLoadingBarBack` method is called. This is done to ensure that there isn’t
    any scaling applied to the background image. In general, the loading bar class
    will control the scaling of the background image.


    The second set of methods provide access to the `fillAmt`, `fillWidth`, and `fillHeight`
    fields. The `fillWidth` and `fillHeight` fields describe the dimensions of the
    loading bar foreground image’s cut-out. The `fillAmt`, the percentage complete,
    is multiplied by the `fillWidth` field to determine how wide the background image
    should be. The third set of methods are just simple get and set methods for the
    class’ padding fields.


    The final set of support methods listed in the preceding help you reposition the
    loading bar on the screen. Because this is an advanced class, it has multiple
    internal objects that are drawn to the screen. This poses a challenge when trying
    to reposition the object because we have to reposition multiple objects and often
    have to recalculate their relative positioning.


    The main method for overcoming this complication is to override the set position
    and set coordinate methods. This gives us an abstraction point where we can run
    code to handle issues like this. In this case, when the object’s position is changed
    using these methods, we can update the base class, background image, and foreground
    image positions all at once.


    ### Main Method Details


    The main methods listed in the following are class constructors, cloning methods,
    and the game engine draw method. Notice that the cloning functionality is present
    and that this class extends the `MmgObj` class, which makes it a member of the
    set of drawable objects.


    ```

    public MmgLoadingBar() { ... }

    public MmgLoadingBar(MmgLoadingBar obj) { ... }

    public MmgLoadingBar(MmgBmp LoadingBarBack, MmgBmp LoadingBarFront) { ... }

    public MmgObj Clone() { ... }

    public MmgLoadingBar CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 5-17

    MmgLoadingBar Main Method Details 1

    ```


    The first set of main methods to review begins, as we expect, with a set of class
    constructors. The base constructor takes no arguments and initializes the class
    with some placeholder values. This constructor does not put the class into a state
    that is fit for use. You’ll need to call some support methods to configure the
    class properly.


    The next constructor is a specialized constructor that takes an `MmgLoadingBar`
    instance as an argument and uses it to create a new, unique `MmgLoadingBar` object.
    The remaining constructor takes two `MmgBmp` arguments. It follows almost the
    same implementation as that of the constructor we just reviewed, save that this
    constructor overload sets the loading bar front and back images from the provided
    arguments.


    The next set of main methods to review are the class’ cloning methods. As we’ve
    seen before, there are two types of cloning method. The first, `Clone`, will create
    a new, unique copy of this class and return it cast up to the super class, `MmgObj`.
    The second cloning method, `CloneTyped`, performs the same actions but doesn’t
    cast the returned object so the method returns an `MmgLoadingBar` instance.


    The last method we have left to review is the `MmgDraw` method. Note that the
    method draws the back image first and that it sets the color as well as the source
    and destination drawing rectangles needed to scale the image on each game frame.
    The source and destination rectangles are used to scale the background image to
    the proper size with regard to the foreground image and the `fillAmt` field.


    ### Demonstration: MmgLoadingBar Class


    The example code used to demonstrate the `MmgLoadingBar` class in action is from
    the `ScreenLoading` class of the MmgBase library. These snippets demonstrate setting
    up the `MmgLoadingBar` class and show how to use event-driven data on the progress
    of the resource load.


    ```

    01 key = "imgLoadingBar";

    02 if(classConfig.containsKey(key)) {

    03     file = classConfig.get(key).str;

    04 } else {

    05     file = "loading_bar.png";

    06 }


    08 tB = MmgHelper.GetBasicBmp(GameSettings.IMAGE_LOAD_DIR + file);


    10 key = "imgLoadingBarFill";

