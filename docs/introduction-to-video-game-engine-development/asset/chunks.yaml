- fmt: '# 5. Advanced Classes


    In this chapter, you’ll review the advanced classes of the MmgBase API.


    Advanced classes are a general group of classes that use multiple base classes
    to create more powerful tools. We’ll look at the following classes during this
    chapter’s review:


    - `Mmg9Slice`

    - `MmgContainer`

    - `MmgLabelValuePair`

    - `MmgLoadingBar`

    - `MmgSprite`

    - `MmgDrawableBmpSet`


    ## Advanced Classes: Mmg9Slice


    The `Mmg9Slice` class is a more advanced class than we’ve previously seen. This
    class is designed to slice an `MmgBmp` image in nine locations so that the image
    can be resized without distortion. Mainly this feature is used for rectangular
    images like buttons, frames, and window backgrounds. The image is sliced and resized
    so that the corners are maintained and the straight edges between corners are
    scaled to meet the resizing requirements.


    ### Class Fields


    The `Mmg9Slice` has a few class fields, listed in the following group. We’ll review
    these next.


    ```

    private int offset;

    private MmgBmp src;

    private MmgBmp dest;

    Listing 5-1

    Mmg9Slice Class Fields 1

    ```


    There are only three fields we need to review for this class. The first field
    is the `offset` field. This field is used in the image slicing process. Essentially
    the value of the `offset` field is the position from the nearest corner where
    the image will be sliced. This slicing approach preserves the corner, preventing
    stretching and distortion during scaling. The next field, `dest`, is an `MmgBmp`
    that will hold the resulting scaled image.


    ### Support Method Details


    The `Mmg9Slice` class has a few support methods we’ll review here. It’s important
    to mention that you need to have experience using these methods when working with
    more advanced classes. They might not have the result that you expect. For instance,
    altering the `src` field won’t change the destination field unless the object
    is reinitialized.


    ```

    public void SetOffset(int i) { ... }

    public int GetOffset() { ... }

    public void SetSrc(MmgBmp b) { ... }

    public MmgBmp GetSrc() { ... }

    public void SetDest(MmgBmp b) { ... }

    public MmgBmp GetDest() { ... }

    Listing 5-2

    Mmg9Slice Support Method Details 1

    ```


    The support methods we have to review are get and set methods for the class fields
    we reviewed earlier. These methods are straightforward, so I won’t cover them
    in any detail here. Make sure to look them over and make sure you understand their
    use.


    ### Main Method Details


    The `Mmg9Slice` class has a set of main methods that include constructors, class
    preparation, cloning, and comparison.


    ```

    public Mmg9Slice(int Offset, MmgBmp Src, int w, int h) { ... }

    public Mmg9Slice(int Offset, MmgBmp Src, int w, int h, MmgVector2 Pos) { ... }

    public Mmg9Slice(Mmg9Slice obj) { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 5-3

    Mmg9slice Main Method Details 1

    ```


    The first set of main methods to review begins with three constructors and the
    `MmgDraw` method. Notice that the first two constructors are essentially the same,
    save that the second constructor takes an `MmgVector2` position argument. The
    offset, source image, width, and height are set before the destination image is
    created. Once the destination image is ready, the position and visibility are
    set. The first two constructor overloads use this pattern.


    The `Mmg9Slice` class supports cloning functionality. As such, there is a specialized
    constructor that takes an `Mmg9Slice` object as an argument. This constructor
    follows the same general pattern as the first two except that all values come
    from the argument object. The last method in this set is the `MmgDraw` method.
    This method is simple and just draws the resized, destination image if visible.


    ```

    public MmgObj Clone() { ... }

    public Mmg9Slice CloneTyped() { ... }

    public boolean ApiEquals(Mmg9Slice obj) { ... }

    public void DrawDest() { ... }

    Listing 5-4

    Mmg9Slice Main Method Details 2

    ```


    The second set of main methods begins with the `Clone` method. Notice how the
    `Clone` method uses the constructor overload that takes an `Mmg9Slice` object
    to create a new, unique copy. The first `Clone` method returns an `MmgObj` as
    argument. The second version of the `Clone` method, `CloneTyped`, returns an `Mmg9Slice`
    object. The `ApiEquals` method is an API-level comparison method for testing equality
    between two `Mmg9Slice` instances.


    The last method we have to review is the `DrawDest` method. This method is responsible
    for performing the nine-slice operation on the source image. If you change certain
    class fields, you will need to rerun this method to update the destination image.
    Keep that in mind when working with this class.


    ### Demonstration: Mmg9Slice Class


    This code example is from the `LoadResources` method of the `ScreenTestMmg9Slice`
    class. Because the `Mmg9Slice` class is more advanced than previous classes, we
    need to load up an image resource to use as a source `MmgBmp` image. Make sure
    you follow along by running the example application and viewing this demonstration
    screen.


    ```

    01 bground = MmgHelper.GetBasicCachedBmp("popup_window_base.png");

    02 MmgHelper.CenterHorAndVert(bground);

    03 bground.SetX(bground.GetX() - MmgHelper.ScaleValue(200));

    04 bground.SetY(bground.GetY() - MmgHelper.ScaleValue(32));

    05 AddObj(bground);


    07 bgroundLabel = MmgFontData.CreateDefaultBoldMmgFontLg();

    08 bgroundLabel.SetText("Original MmgBmp");

    09 bgroundLabel.SetPosition(bground.GetPosition().Clone());

    10 bgroundLabel.SetY(bgroundLabel.GetY() - bgroundLabel.GetHeight());

    11 AddObj(bgroundLabel);


    13 menuBground = new Mmg9Slice(MmgHelper.ScaleValue(16), bground, width, height);

    14 menuBground.SetPosition(MmgVector2.GetOriginVec());

    15 menuBground.SetWidth(width);

    16 menuBground.SetHeight(height);

    17 MmgHelper.CenterHorAndVert(menuBground);

    18 menuBground.SetX(menuBground.GetX() + MmgHelper.ScaleValue(200));

    19 menuBground.SetY(menuBground.GetY() + MmgHelper.ScaleValue(36));

    20 AddObj(menuBground);

    Listing 5-5

    Mmg9Slice Class Demonstration 1

    ```


    In the example snippet listed in the preceding, the source image is loaded on
    lines 1–5. The `MmgBmp` image instance is loaded from a call to the `GetBasicCachedBmp`
    method with the file name as the image resource key. This will pull the specified
    image from the resource cache if it exists. This particular image is part of the
    default image set so it is always loaded and ready to use. On line 13, a new `Mmg9Slice`
    object is created using the source image, `bground`, and specifying a new width
    and height to scale the source image to.


    Notice that on lines 15 and 16, the dimensions of the `Mmg9Slice` object are reinforced.
    The object is added to the list of drawable objects for the current example game
    screen on line 20; this plugs the nine-slice object into the default drawing routine.
    That’s all it takes to use an `Mmg9Slice` class to resize a popup window’s background
    image and display it on the screen.


    ## Advanced Classes: MmgContainer


    The `MmgContainer` class is, as its name suggests, a container that holds `MmgObj`
    instances. This includes objects that extend the `MmgObj` class. You can start
    to see the power of the general game engine we’ve built thus far. For instance,
    an `MmgContainer` could hold all the `MmgBmp` objects needed to draw a game’s
    information HUD. Then you could make the entire set of images invisible by setting
    the `isVisible` field to false on the container object.


    The `MmgContainer` class is designed to hold other objects, but it does not have
    a concept of dimension or position with regard to its children. It does extend
    the `MmgObj` class, so you can assign the container dimensions and a position
    to help add structure to the container’s use. Note, these settings don’t affect
    how the container’s contents are drawn.'
