- fmt: '# Game Screen Classes: `MmgSplashScreen`


    The `MmgSplashScreen` class provides a foundation for creating game splash screens.
    The screen is designed to display for a few seconds; then it fires an event that
    should be caught by the game panel class, which should respond by changing states
    to the loading screen.


    I should mention that this class extends the `MmgGameScreen` class and implements
    the `MmgUpdateHandler` so that the class can receive update events from the splash
    screen timer. The `MmgGameScreen` class extends the `MmgObj` class, so even at
    this level, the game screen is part of the set of drawable objects and is specially
    configured to plug into the game panel class to facilitate drawing the current
    game screen at the desired frame rate.


    ## Static Class Members


    The class has only one static class field listed as follows.


    ```

    public static int DEFAULT_DISPLAY_TIME_MS = 3000;

    Listing 8-1

    MmgSplashScreen Static Class Members 1

    ```


    This field controls the amount of time, in milliseconds, that the splash screen
    will display.


    ## Class Fields


    The `MmgSplashScreen` class has two class fields for us to review.


    ```

    private int displayTime;

    private MmgUpdateHandler update;

    Listing 8-2

    MmgSplashScreen Class Fields 1

    ```


    The first field listed, `displayTime`, holds the number of milliseconds to display
    the splash screen before firing an event indicating the display period is over.
    The second class field, `update`, is the handler designed to receive and process
    update events.


    ## Support Method Details


    The `MmgSplashScreen` support methods are very simple and direct. There are two
    sets of get and set methods I’ve listed in the following group in the same order
    as their corresponding class fields.


    ```

    public int GetDisplayTime() { ... }

    public void SetDisplayTime(int i) { ... }

    public MmgUpdateHandler GetUpdateHandler() { ... }

    public void SetUpdateHandler(MmgUpdateHandler Update) { ... }

    Listing 8-3

    MmgSplashScreen Support Method Details 1

    ```


    These methods are very direct, so I won’t cover them in any detail here. Let’s
    move on to the class’ main methods.


    ## Main Method Details


    The main methods we have to review for the `MmgSplashScreen` class are listed
    in the following grouping. These are standard main methods we’ve seen before during
    the API review. One method that stands out, however, is the `MmgHandleUpdate`
    method. This method is designed to receive an event from the timer thread and
    pass it onto the game panel so that the next game screen can be displayed.


    ```

    //Constructors

    public MmgSplashScreen() { ... }

    public MmgSplashScreen(int DisplayTime) { ... }

    public MmgSplashScreen(MmgSplashScreen obj) { ... }

    //Cloning methods

    public MmgObj Clone() { ... }

    public MmgSplashScreen CloneTyped() { ... }

    //Event handler method

    public void MmgHandleUpdate(Object obj) { ... }

    //General main methods

    public void MmgDraw(MmgPen p) { ... }

    public boolean ApiEquals(MmgSplashScreen obj) { ... }

    Listing 8-4

    MmgSplashScreen Main Method Details 1

    ```


    The first two constructors use the default display time and a user-specified display
    time, respectively. They will create a bare-bones class that displays default
    images and is ready for use. The third constructor is a specialized constructor
    that takes an `MmgSplashScreen` object as an argument and uses it to create a
    new, unique copy of the class.


    The cloning methods follow the standard pattern of providing a basic clone method
    and a clone method that returns an `MmgSplashScreen` type. The `MmgHandleUpdate`
    method receives an event from the splash screen timing class and then fires an
    event that gets sent to the game panel class where it should trigger a game screen
    change from the splash screen to the loading screen.


    The last two methods listed in the preceding are standard main methods `MmgDraw`
    and `ApiEquals`. The draw method is called as part of the game engine’s default
    drawing routine. The `ApiEquals` method is an API-level comparison method that
    compares two `MmgSplashScreen` objects for equality.


    ## Demonstration: `MmgSplashScreen` Class


    For the `MmgSplashScreen` class’ demonstration section, we’ll take a look at the
    MmgCore API’s implementation of the `ScreenSplash` class that extends the MmgBase
    API’s `MmgSplashScreen` class. This should give us a good example of the class
    in use.


    This is the first time we’ll do a class review as part of a demonstration section.
    Just to be clear, the following subsections are for the `ScreenSplash` class of
    the MmgCore API.


    ### Demo Review: Static Class Members


    The MmgCore API’s `ScreenSplash` class has one static class field listed in the
    following.


    ```

    public static int EVENT_DISPLAY_COMPLETE = 0;

    Listing 8-5

    Demo Review: ScreenSplash Static Class Members 1

    ```


    The `EVENT_DISPLAY_COMPLETE` field is used to mark an event to indicate the splash
    screen is done displaying.


    ### Demo Review: Class Fields


    The `ScreenSplash`''s fields are listed in the following. There are four fields
    for us to review. Remember, this class extends the `MmgGameScreen` class, so it
    picks up a lot of functionality from that class for free.


    ```

    public GameStates state;

    public GenericEventHandler handler;

    public GamePanel owner;

    public Hashtable classConfig;

    Listing 8-6

    Demo Review: ScreenSplash Class Fields 1

    ```


    The first field listed holds the game state associated with the splash screen.
    Because the `ScreenSplash` implementation is more concrete, it’s actually used
    in an application; it has fields that help associate the game screen with an identifying
    value. The second class field is an event handler that is used to process MmgBase
    API’s generic events. This event handler will receive an event indicating the
    splash screen is done displaying.


    The third field, `owner`, is an instance of the `GamePanel` class and is meant
    to indicate the game panel that holds the game screen. The game panel class is
    part of the MmgCore API; it’s not a class we’ve reviewed thus far. The final entry
    in the preceding list is the `classConfig` field, which is used to store any class
    config data available. The config file is loaded as part of the class’ load resources
    method. The values found, if any, are used to adjust how the game screen is displayed.


    ### Demo Review: Support Method Details


    The `ScreenSplash` class’ support methods are listed in the following group. There
    are only three methods for us to review.


    ```

    public void SetGenericEventHandler(GenericEventHandler Handler) { ... }

    public GenericEventHandler GetGenericEventHandler() { ... }

    public GameStates GetGameState() { ... }

    Listing 8-7

    Demo Review: ScreenSplash Support Method Details 1

    ```


    The first two methods listed are basic get and set methods that give you access
    to the class’ handler field. This field is used to send events to the specified
    `handler` when the display time for the game screen is up. The final support method
    listed simply returns the `gameState` associated with the screen.'
