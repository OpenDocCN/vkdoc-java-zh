  trans: '

    ### 静态类成员


    `MmgHelper` 类包含以下几个静态类字段。这些字段用作布尔标志，用于控制日志记录和资源缓存功能。


    ```

    public static boolean LOGGING = true;

    public static boolean BMP_CACHE_ON = true;

    public static boolean SND_CACHE_ON = true;

    private static Random rando = new Random(System.currentTimeMillis());

    代码清单 3-3

    MmgHelper 静态类成员 1

    ```


    上述静态类字段中的第一个条目是 `LOGGING` 字段。这是一个布尔标志，类似于我们在 `MmgApiUtils` 类中看到的那样。该标志控制此类的日志输出，可用于关闭所有日志记录。如你所见，API
    支持几种不同的日志通道。起初这看起来可能有些冗余，但实际上，当你希望为特定信息设置独立的日志通道时，它会非常有用。


    上述列表中的接下来两个静态类字段分别控制图像和声音资源的缓存。如果这些布尔标志设置为 `false`，那么通常会被存储在缓存中的资源将不会被缓存。列表中的最后一个条目是一个随机数生成器，它使用当前时间（以毫秒为单位）进行初始化。这应该能为随机数生成器提供一个良好的动态种子。你可以在需要访问随机数时随时使用
    `rando` 字段。接下来，让我们看看一些静态类方法。


    ```

    public static boolean WriteClassConfigFile(String file, MmgCfgFileEntry[] data)
    { ... }

    public static boolean WriteClassConfigFile(String file, Hashtable data) { ...
    }

    public static Hashtable ReadClassConfigFile(String file) { ... }

    public static Hashtable ReadClassConfigFile(String file) { ... }

    代码清单 3-4

    MmgHelper 静态类成员 2

    ```


    前两个静态类方法用于将作为参数传入的类配置数据写出。第一个 `WriteClassConfigFile` 方法接受一个字符串和一个数据数组作为参数。该数组包含
    `MmgCfgFileEntry` 对象。类配置文件是一个文本文件，其中包含键值对形式的数据。这些数据可用于在类的资源加载过程中动态配置类的字段。


    当与游戏屏幕结合使用时，这尤其有用，因为它允许你通过数据驱动的方式来布局游戏屏幕。通过这种方式，你可以通过修改类配置文件来测试游戏屏幕布局的更改，而无需重新编译游戏。


    需要说明的是，当通过调用这些方法来写入类配置文件时，注释和数据的原始顺序可能会丢失。每个 `MmgCfgFileEntry` 实例中的数据都会被写入类配置文件。配置文件中的每个键值对都由一个
    `MmgCfgFileEntry` 实例表示。


    `WriteClassConfigFile` 方法的第二个实现类似，不同之处在于它接收的数据形式是 `Hashtable`（如果你查看的是 C# 实现，则为
    `Dictionary`），而不是数组。该数据结构的键会按字母顺序排序，然后像第一个版本的方法一样将数据写出。现在，让我们看看另一面——类配置读取方法。


    接下来我们要介绍的类配置辅助方法是 `ReadClassConfigFile` 方法。该方法解析指定的类配置文本文件，并将键值对作为 `MmgCfgFileEntry`
    条目存储在一个 `Hashtable` 中。类配置读取方法内置了检测和加载特定屏幕分辨率类配置文件的支持。


    如果存在特定于屏幕分辨率的类配置文件，这允许你根据当前游戏屏幕大小自动加载数据。如果没有，我们会尝试打开最初指定的文件。如果找到了要读取的类配置文件，我们会打开它并逐行迭代。类配置文件中的注释以
    `#` 字符为前缀。在解析文件时，这些行会被忽略。

    '
- fmt: 'The data read in from the class config file can be one of two types, numeric
    or alphanumeric. To denote a number, use the `=` character in between the key
    and value. To denote a string, use a `->` in between the key and value. Numeric
    values can be retrieved as integers, floats, or doubles. The following listing
    shows the contents of a simple class config file.


    ```

    1 bmpLogo->logo_large.jpg

    2 splashScreenDisplayTimeMs=2000.0

    3 splashLogoScale=1.0

    4 #splashLogoOffsetX=0

    5 #splashLogoOffsetY=0

    6 #splashLogoPosX=0

    7 #splashLogoPosY=0

    Listing 3-5

    MmgHelper Static Class Members 3

    ```


    Notice that a different key-value pair separator is used when the data represented
    is a string, line 1, than when it is numeric, lines 2 and 3. Let’s move on to
    the next few methods to review. Up next, we have a pair of `CreateDrawableBitmapSet`
    methods. These helper methods are used to create a set of objects, framework and
    `MmgBase` API objects, that are all configured for drawing onto a new `MmgBmp`
    instance.


    The first version of the method takes dimensions, width and height, and a Boolean
    transparency indicator as arguments. The second `CreateDrawableBmpSet` method
    is actually an extension of the first. This version takes an additional color
    argument that is then used to fill the new image.


    ```

    public static MmgBmp CreateFilledBmp(int width, int height, MmgColor color) {
    ... }

    public static int AbsDistance(int x1, int x2, int y1, int y2) { ... }

    public static int GetRandomInt(int exclusiveUpperBound) { ... }

    public static void ListCacheEntries() { ... }

    public static MmgDrawableBmpSet CreateDrawableBmpSet(int width, int height, boolean
    alpha) { ... }

    public static MmgDrawableBmpSet CreateDrawableBmpSet(int width, int height, boolean
    alpha, MmgColor color) { ... }

    Listing 3-6

    MmgHelper Static Class Members 4

    ```


    The next set of helper methods we have to cover are a bit of a random bunch. Let’s
    get to it, shall we? The first method is the `CreateFilledBmp` method. The `CreateFilledBmp`
    method continues from the previous set of methods reviewed. The method calls the
    version of the `CreateDrawableBmpSet` method that takes a color argument. The
    resulting `MmgDrawableBmpSet` is discarded, save for the `MmgBmp` instance, `img`,
    of the set. This implementation allows you to just grab the image you need and
    discard the rest of the set. It is very useful for quickly creating color tiles.


    The `AbsDistance` method is a helper method that returns an absolute distance
    calculated from two pairs of coordinates, `x1`, `y1` and `x2`, `y2`. The `GetRandomInt`
    method uses the `rando` static class field we reviewed earlier. It returns a new
    random number between 0 and the `exclusiveUpperBound`. Obviously, the range excludes
    the upper bound. The next method to look at is the `ListCacheEntries` method,
    listed in the preceding. This method is used to report the contents of the resource
    caches including image and sound resources.


    The next set of static methods we’re going to cover are positioning methods, and
    they are extremely useful. You’ll see these methods in use all over the `MmgBase`
    API.


    ```

    public static MmgObj CenterHor(MmgObj obj) { ... }

    public static MmgObj CenterHorAndBot(MmgObj obj) { ... }

    public static MmgObj CenterHorAndMid(MmgObj obj) { ... }

    public static MmgObj CenterHorAndTop(MmgObj obj) { ... }

    public static MmgObj CenterHorAndVert(MmgObj obj) { ... }

    Listing 3-7

    MmgHelper Static Class Members 5

    ```


    The next set of helper methods to review are all about centering objects. The
    first method listed in the preceding, `CenterHor`, centers the given `MmgObj`
    instance horizontally. Note that these methods take `MmgObj` arguments. That means
    these methods rely on fields of the `MmgObj` class and screen dimension data from
    the `MmgScreenData` class. You’ll find that you can easily use them to position
    any drawable object, since any drawable object extends the `MmgObj` class. The
    power of a general model can be seen in how useful these positioning methods are.


    The `CenterHorAndBot` method centers the object horizontally and positions the
    object at the bottom of the screen. The `CenterHorAndMid` method is just an alias
    for the `CenterHorAndVert` method, and it places the object at the center of the
    screen both horizontally and vertically. The `CenterHorAndTop` is similar to the
    other methods except that it positions the object at the screen’s horizontal center
    and at the top of the screen. The last method listed in the preceding, `CenterHorAndVert`,
    will center the `MmgObj` instance both horizontally and vertically. Keep these
    methods in mind; they will come in handy time and time again.


    ```

    public static MmgBmp GetBasicBmp(String src) { ... }

    public static MmgSound GetBasicSound(String src) { ... }

    public static MmgMenuItem GetBasicMenuItem(MmgEventHandler handler, String name,
    int eventId, int eventType, MmgBmp img) { ... }

    Listing 3-8

    MmgHelper Static Class Members 6

    ```


    The next set of helper methods to cover are a bit sorted but mainly have to do
    with resource loading. These helper methods provide high-level code in a convenient,
    encapsulated way. You should always use the game engine’s resource loading system,
    and you should always use resource loading methods that store data in the resource
    cache.


    The first helper method, `GetBasicBmp`, is an image resource loading method that
    takes a file path string as an argument. This method is very useful on game screens
    that display before the resource load completes because you can point directly
    to an image resource on the file system.


    The next method in the set is a helper method that is used with the menu system
    built into the API. The `GetBasicMenuItem` method is a convenience method that
    prepares a new `MmgMenuItem` instance in a quick and uniform way. The next method
    to review is used to load sound resources, `GetBasicSound`.


    This method is similar to the `GetBasicBmp` method we just reviewed. Both are
    basic resource loading methods. Be sure you read over and understand how these
    resource loading methods work. There are a couple of different methods that can
    be used; so make sure you understand which methods use the resource cache, which
    methods scale the loaded image, and what different arguments they require.


    ```

    public static MmgBmp GetBasicCachedBmp(String path, String imgId) { ... }

    public static MmgBmp GetBasicCachedBmp(byte[] data, String imgId) { ... }

    public static MmgBmp GetBasicCachedBmp(String imgId) { ... }

    public static MmgSound GetBasicCachedSound(String path, String sndId) { ... }

    public static MmgSound GetBasicCachedSound(byte[] data, String sndId) { ... }

    public static MmgSound GetBasicCachedSound(String sndId) { ... }

    public static MmgBmp GetImageCacheBmp(Image b) { ... }

    public static int ScaleValue(int val) { ... }

    public static float ScaleValue(float val) { ... }

    public static float ScaleValue(double val) { ... }

    Listing 3-9

    MmgHelper Static Class Members 7

    ```


    The next set of static helper methods we’ll review deal mostly with loading resources
    from the image or sound resource cache. The first method in the list, `GetBasicCachedBmp`,
    takes a string argument with the path to the image resource and a string argument
    that represents the key for the associated image data. If the `imgId` exists,
    then the image associated with that entry is retrieved from the cache and returned.


    If no entry can be found in the image cache, the image is loaded from the file
    using the `GetBasicBmp` method. The resulting image is added to the image cache
    using the provided `imgId` as the key. Note that if image caching is turned off,
    the image is loaded from the file every time the method is called. Obviously,
    enabling caching makes resource loading much more efficient.'
