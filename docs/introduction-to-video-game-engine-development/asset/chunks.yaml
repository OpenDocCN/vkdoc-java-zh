- fmt: "# Chapter Conclusion\n\nIn this chapter, we took a look at the `MmgCore` API’s\
    \ screen classes. Although these classes are based on classes from the `MmgBase`\
    \ API, they have been extended to support functionality that the `MmgBase` API\
    \ isn’t aware of. For instance, each game screen we’ve covered has a few things\
    \ in common. One of those things is the `gameState` and `owner` class fields.\
    \ These fields are necessary for the screen to plug into the `MmgCore` API’s `GamePanel`\
    \ class.\n\nWe also took a moment to review the `RunFrameRate` class, which is\
    \ responsible for driving the game engine’s drawing routine and subsequently the\
    \ frame rate in the Java version of the game engine.\n\n- `RunFrameRate`: An `MmgCore`\
    \ API class that is responsible for running the game engine’s drawing routine.\
    \ This class is responsible for enforcing the frame rate for the Java version\
    \ of the game engine.\n- `ScreenSplash`: An `MmgCore` API implementation of the\
    \ `MmgSplashScreen` class that is aware of both `GameStates` and `GamePanel` classes\
    \ and can plug into the `GamePanel` class’ screen management system.\n- `ScreenLoading`:\
    \ An `MmgCore` API implementation of the `MmgLoadingScreen` class that is aware\
    \ of both `GameStates` and `GamePanel` classes and can plug into the `GamePanel`\
    \ class’ screen management system.\n- `ScreenMainMenu`: An `MmgCore` API implementation\
    \ of the `MmgGameScreen` class that is aware of both `GameStates` and `GamePanel`\
    \ classes and can plug into the `GamePanel` class’ screen management.\n- `Screen`:\
    \ The `MmgCore` API’s `Screen` class is similar to other game screen classes but\
    \ is slightly different in that it’s designed to be used as a main game screen.\n\
    \nDon’t be discouraged if you don’t quite feel like you have a handle on the `MmgCore`’s\
    \ game screen classes. First, there are literally a ton of examples throughout\
    \ the game engine project. I would take some time to look at a few of them. Keep\
    \ in mind that functionality presented by the super class, or base class if you’re\
    \ following along in C#, may not be readily apparent.\n\nMake sure you take a\
    \ moment to trace through the classes you are using to power your game screens.\
    \ Be aware of how the super class, base class in C#, functions and how it will\
    \ interact with your extended classes. Keep this in mind when you’re working with\
    \ overridden methods or methods that rely on super class functionality.\n\n# Part\
    \ 3\n\n# 15. Game Build Introduction\n\nWelcome to Part 3 of this text. If you’ve\
    \ made it this far, then you’re an expert at the intricate details of the game\
    \ engine, and it’s time to put that knowledge to use. In this part of the text,\
    \ we’re going to build two games from the ground up. This will be an exciting\
    \ journey. We’ll start literally from scratch with an outline of the game. Then\
    \ we’ll add functionality in phases until we have a finished product.\n\nThe first\
    \ game that we’ll create is called `PongClone`, and as the name would suggest,\
    \ it’s a clone of the classic video game Pong. The `PongClone` game build will\
    \ get your feet wet with game development. You’ll learn first-hand how quickly\
    \ and easily you can get a game project up and running. With the power of the\
    \ `MmgBase` and `MmgCore` APIs at your fingertips, you can create a feature-filled\
    \ game with just a few classes.\n\nWith this project, you’ll gain invaluable experience\
    \ setting up game projects, handling user input, animating graphics, working with\
    \ one- and two-player games, and much more. For the second game build, we’ll create\
    \ a slightly more intricate game, `DungeonTrap`. In `DungeonTrap`, you control\
    \ a character stuck in an enchanted dungeon vault fighting off waves of bad guys.\n\
    \nI hope these projects sound interesting to you. The main goal here is to gain\
    \ experience building games using only the IDE and the game engine reviewed in\
    \ Parts 1 and 2 of this text. I won’t focus on game engine–specific topics during\
    \ these game builds, and I’ll try to stay away from the more rigid class review\
    \ format I’ve used in the previous parts of the book.\n\nWe’ll focus explicitly\
    \ on the game. If you find a piece of code to be unfamiliar, take a moment to\
    \ read over the material on that class and the example code provided with the\
    \ project. We’ll outline the details of our two game projects in the following\
    \ sections. We’ll start with the `PongClone` game.\n\n## PongClone Game Outline\n\
    \nIf we’re going to sit down in front of the computer and write a game, we’d better\
    \ have some idea of what we’re trying to do. The best way to do that is to outline\
    \ the features of the game in a list. This gives you a starting point in your\
    \ game development. Simple games may only require a few bullet points before you\
    \ can start writing your code.\n\nMore complex games will require a lot of planning\
    \ before you can comfortably begin development. I wish there was a rule of thumb\
    \ that I can impart upon you so you can better decide how much planning is adequate\
    \ for a given game. The simple fact is that you’ll have to develop this instinct\
    \ on your own, over time, after you have a few games under your belt. With that,\
    \ let’s take a look at the first game’s outline.\n\n### PongClone General Game\
    \ Specifications\n\n- General Description: The `PongClone` game consists of two\
    \ players, each with a paddle positioned at the left or right edge of the screen.\
    \ The players compete to get the game ball past their opponent’s paddle scoring\
    \ a point. The first player to score seven points wins.\n- Number of Players:\
    \ The game should support one or two players.\n- Win Condition: First player to\
    \ score seven points.\n- Lose Condition: Opponent scores seven points before you\
    \ can.\n- Game Screens:\n  - Splash screen\n  - Loading screen\n  - Main menu\
    \ screen\n  - Game screen\n- Game Screen Details:\n  - Splash Screen: A splash\
    \ screen with a logo that displays for a few seconds.\n  - Loading Screen: A loading\
    \ screen with a logo and a loading bar.\n  - Main Menu Screen: A menu screen with\
    \ title, subtitle, one player, two players, exit game menu options, and a version\
    \ number feature.\n  - Game Screen: A game screen with an instructions sub-screen\
    \ that has a countdown feature. The game should also support a game exit sub-screen,\
    \ a game over screen, player scores, and an AI opponent when in one-player mode.\n\
    - Game Input Details:\n  - Player One Input: Up and down keyboard arrow keys\n\
    \  - Player Two Input: Keyboard keys, mouse input\n\nThat concludes our outline\
    \ for the `PongClone` game. Look over the details of the specification list and\
    \ think about what game engine features can be used to address the different game\
    \ requirements.\n\n## DungeonTrap Game Outline\n\nThe second game we’ll build\
    \ in this part of the text is `DungeonTrap`. This game is a bit more complex than\
    \ the `PongClone` game you’ll start with. Even so, the game specification should\
    \ not be overly detailed. The chapters for this game build are independent and\
    \ available as a download from the book’s GitHub repository.\n\nFor instance,\
    \ I’ll mention the game’s requirement for random item drops, but I won’t specifically\
    \ list what they are even though I have a good idea of what I want to implement.\
    \ My reasoning here is that the item drops will function almost identically, so\
    \ I don’t really need to specify a concrete list of items at this point in time.\
    \ This is a fine line you’ll learn how to walk as you get more experience building\
    \ games."
