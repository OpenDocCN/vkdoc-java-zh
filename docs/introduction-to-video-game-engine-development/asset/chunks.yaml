    The first two fields listed in the preceding are used to report the result of
    resource load operations. The `readResult` field holds a true value if any sound
    or image was loaded during the resource processing operation. The `readComplete`
    field is set to true if the entire load process has finished. The `readPos` and
    `readLen` fields track the current position in the resource loading process and
    the total number of files to load, respectively.


    The `loadMultiplier` field is used to artificially increase the sizes of the numbers
    we’re working with. All this does is help with the progress percentage in the
    case that there are very few resources to load. The `slowDown` field is used to
    artificially slow down the loading process by adding a small time sink into the
    operations. This helps greatly when you only have a few resources to load and
    you want to verify your loading bar is working correctly. Adding in a slowdown
    value makes it so you can see the progress bar a lot easier.


