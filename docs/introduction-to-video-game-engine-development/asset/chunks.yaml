    同样，这段代码应该在我们回顾 MmgCore API 时非常熟悉。将前面显示的代码添加到你的 `GamePanel` 类中，然后保存并构建你的项目。确保你处理了任何拼写错误或
    bug。我们将运行项目，看看效果如何。要运行项目的 Java 版本，只需右键点击游戏项目的静态主类，然后选择“运行”。你应该会在几秒钟内看到一个窗口弹出，其中运行着你的游戏。


    如果你使用的是 C# 进行学习，那么你需要从终端窗口运行游戏。打开你最喜欢的终端，导航到游戏的根目录。确保你在 Visual Studio 中通过点击“构建”并从
    IDE 菜单中选择“重新生成所有”来构建你的游戏。然后你应该会在项目目录中看到以下文件夹：


    ```

    /bin/Debug/netcoreapp3.1/PongClone.dll

    ```


    运行以下命令来启动你的游戏：


    ```

    cd /bin/Debug/netcoreapp3.1/

    dotnet PongClone.dll

    ```


    根据你的操作系统和编程语言选择，你应该会看到类似于下面显示的图像。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig7_HTML.jpg](img/508392_1_En_16_Fig7_HTML.jpg)


    图 16-7


    PongClone 游戏 1


    哇，我们有了一个很好的开端。三个小类（如果你用 C# 学习则是两个），我们的项目现在支持一个启动画面、一个加载画面和一个默认的主菜单画面。还不错！请记住，这是一个正在开发中的项目；所以如果你足够努力，或者哪怕只是尝试一下，你可能会找到让它崩溃的方法。别担心，我们才刚刚开始我们的游戏项目。


    # 17. PongClone 主菜单画面


    在本章中，我们将通过向游戏添加一个自定义的主菜单画面来进一步推进项目。我们将连接主菜单并确保其功能正常。让我们先来看看主菜单画面以及我们需要做些什么来设置它。


    以下过程应该适用于项目的 Java 和 C# 版本。创建一个新类并将其命名为“ScreenMainMenu”。我们希望这个类继承 MmgCore API 的
    `ScreenMainMenu` 类。请记住，当我们定义本地 `ScreenMainMenu` 类的工作方式时，我们将能够访问该功能。因为该画面的默认实现包含以下功能——标题、副标题、单人游戏、游戏开始、游戏退出、页脚和版本号——所以我们不必太担心它们。


