  trans: '

    # 2. 基类


    在本章中，你将回顾 MmgBase API 的基类：


    *   MmgObj

    *   MmgColor

    *   MmgRect

    *   MmgFont

    *   MmgSound

    *   MmgPen

    *   MmgVector2

    *   MmgBmp


    类将按照以下标准审查步骤进行审查。如果某个类在特定步骤中没有需要审查的内容，则该步骤将在审查过程中被省略：


    *   静态类成员

    *   枚举

    *   类字段

    *   支持方法详情

    *   主方法详情


    学习本书提供的游戏引擎软件的最佳方式是跟随 Java 或 C# 进行实践。然而，C# 中的行号与本文中审查的 Java 代码不会完全匹配。建议你先跟随 Java
    学习以理解代码，然后再查看 C# 版本，这样你就能了解如何从 API 类中抽象出框架级别的类，以及代码的哪些部分是以不同但功能等效的方式实现的。


    ## 基类：MmgObj


    `MmgObj` 类是游戏引擎中所有可绘制对象的基础。你在屏幕上看到的一切都以某种方式实现了这个类。这是强大的游戏创建工具中的一个常见主题。你会发现，在任何游戏引擎中，都有一组类构成了引擎其余部分所依赖的基础。在许多情况下，有一个类对于游戏引擎的渲染例程至关重要。这就是那个类。它包含了游戏引擎在屏幕上绘制对象所需的主要属性集，并构成了
    API 中所有可绘制对象的基础。


    ### 类字段


    我们将审查的第一组类字段如下所示。


    ```

    public MmgVector2 pos;

    public int w;

    public int h;

    public boolean isVisible;

    public MmgColor color;

    代码清单 2-1

    MmgObj 类字段 1

    ```


    因为我们正在审查一个 2D 游戏引擎的基类，所以我们应该期望看到有助于我们在屏幕上绘制 2D 图像的类字段。在审查 API 中的不同类时，请牢记这个概念。将我们审查的类视为模型，并尝试想出不同的方法将它们组合在一起来创建游戏的各个方面。


    `pos` 字段是 `MmgVector2` 类的一个实例，用于存储 `MmgObj` 在屏幕上的当前位置。为了在 2D 空间中做到这一点，我们需要跟踪 X
    和 Y 坐标，这正是 `MmgVector2` 类帮助我们做到的。`w` 和 `h` 类字段用于定义 `MmgObj` 的尺寸，即宽度和高度。这定义了一个矩形，该
    `MmgObj` 实例在屏幕上绘制时会使用这个矩形。


    请注意，仅凭三个类字段，我们就已经涵盖了几乎所有 2D 绘制的核心需求。当然，我们还没有讨论形状和图像，但所有这些事物至少有两个共同属性：位置和尺寸。下一个类字段
    `isVisible` 用于控制此 `MmgObj` 是否绘制在屏幕上。`color` 字段是 `MmgColor` 类的一个实例，用于表示此对象的颜色，尽管并非所有对象在绘制时都会使用颜色属性。


    这里我想提一个设计要点。请注意，我们本可以直接在 API 中使用框架类。为什么要引入一个 API 级别的类来处理它呢？通过使用 API 级别的类来包装框架级别的类，我们引入了一个抽象层，这使我们能够转换框架类的特性，使其更好地与
    API 对齐。


    ```

    private String version = "1.0.8";

    public boolean hasParent;

    public MmgObj parent;

    public String name;

    public String mmgUid;

    代码清单 2-2

    MmgObj 类字段 2

    ```


    上面列出的下一组类字段以一个用于存储版本号的私有字符串开始。该版本号代表当前的 API 版本代码。接下来的两个类字段 `hasParent` 和 `parent`
    用于跟踪此 `MmgObj` 实例是否属于另一个 `MmgObj` 实例，如果是，则属于哪一个。


    `name` 字段用于为此 `MmgObj` 实例赋予一个唯一名称，可用于区分对象或对象类型。最后，`mmgUid` 是一个可用于存储唯一标识符的类字段。同样，这在跟踪和区分游戏对象时会很有帮助。


    ### 支持方法详情


    我们不会详细讨论简单的支持方法。我们只是想了解有哪些功能可用，以便我们能够形成对该类如何运作以及如何使用它的概念。要审查的第一组支持方法如下所示。


    ```

