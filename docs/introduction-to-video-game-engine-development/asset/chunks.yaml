    17         }


    19         if (objects != null) {

    20             objects.MmgDraw(p);

    21         }


    23         if (menuOn == true) {

    24             DrawMenu(p);

    25         }


    27         if (foreground != null) {

    28             foreground.MmgDraw(p);

    29         }

    30     }

    31 }

    清单 2-34

    MmgPen 类演示 1

    ```


    上面列出的 `MmgDraw` 方法来自 MmgBase API 的 `MmgGameScreen` 类。当你在示例屏幕类中看到父类的 `MmgDraw`
    方法被调用时，实际调用的就是这个方法。在 C# 版本中，该方法会调用基类的 `MmgDraw` 方法。这是内置于游戏引擎中的绘制例程的一个示例，负责在屏幕上绘制不同类型的对象。


    这个特定的实现支持绘制背景图像、页眉、页脚、屏幕消息、一组可绘制对象、菜单和前景图像。`MmgGameScreen` 类的 `MmgDraw` 方法由源自
    MmgCore API 中 `GamePanel` 类的游戏引擎绘制例程调用。


    ## 基类：MmgVector2


    `MmgVector2` 类用于为游戏引擎绘制的对象建模位置信息。当然，向量类还有其他用途，但这是其主要用途。该类通常用于表示具有 X 和/或 Y 分量的数据。例如，`MmgVector2`
    对象可用于保存 X、Y 缩放数据或 X、Y 偏移数据，最常见的用途是保存 X、Y 位置数据。


    `MmgVector2` 类不扩展 `MmgObj` 类，因此它不属于 API 类的可绘制子集。但是，它确实以与之前看到的类相同的方式实现了克隆、比较和字符串表示。另一个需要注意的设计细节是，`MmgVector2`
    类被设计为灵活的，允许对向量的 X 和 Y 分量使用浮点数、双精度浮点数或整数值。


    ### 静态类成员


    有两个静态类方法我想快速回顾一下。第一个静态类成员是 `GetOriginVec` 方法。此方法用于返回一个新的、唯一的 `MmgVector2` 实例，该实例指向原点
    (0,0)。类似地，下一个静态方法 `GetUnitVec` 返回一个新的、唯一的实例，该实例指向单位向量 (1,1)。


    ### 类字段


    `MmgVector2` 类只有一个值得一提的类字段。你是不是希望所有类都这么简单？我们唯一需要审查的类字段是一个名为 `vec` 的双精度浮点数数组。该数组将初始化为长度为
    2，表示 X 和 Y 分量。该类被设计为保存整数、浮点数或双精度浮点数对。在大多数情况下，并且出于所有与绘制相关的目的，使用整数值最有意义，因为屏幕坐标始终是整数值。


    ### 支持方法详解


    `MmgVector2` 类有许多 get 和 set 支持方法。这些简单的方法非常重要，因为它们定义了与 `MmgVector2` 类的交互方式，该交互使用整数、浮点数或双精度浮点数。这为你决定如何使用该类提供了很大的灵活性。


    ```

    public double[] GetVector() { ... }

    public void SetVector(double[] v) { ... }

    public int GetX() { ... }

    public void SetX(int x) { ... }

    public float GetXFloat() { ... }

    public void SetX(float x) { ... }

    public double GetXDouble() { ... }

    public void SetX(double x) { ... }

    清单 2-35

    MmgVector2 支持方法详解 1

    ```


    上面列出的前两个条目是该类向量数组的 get 和 set 方法。这让你可以使用双精度浮点数数组快速轻松地设置向量对象的值。接下来的六个方法都是 X 和 Y
    分量值的 get 和 set 方法。在每种情况下，get 方法都设计为以特定的数据类型返回 X 分量值。该类支持 X 分量值的双精度浮点数、浮点数和整数表示。


    类似地，你可以使用接受所需类型（双精度浮点数、浮点数或整数）参数的 set 方法版本来设置 X 分量值。这两种方法协同工作，创建了三种与 X 分量值交互的不同方式。下一组支持方法为
    Y 分量值提供了类似的功能。


    ```

    public int GetY() { ... }

    public void SetY(int y { ... }

    public float GetYFloat() { ... }

    public void SetY(float y) { ... }

    public double GetYDouble() { ... }

    public void SetY(double y) { ... }

    清单 2-36

    MmgVector2 支持方法详解 2

    ```


