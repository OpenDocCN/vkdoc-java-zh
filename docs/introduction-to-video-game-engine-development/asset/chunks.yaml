    any drawable object, since any drawable object extends the `MmgObj` class. The
    power of a general model can be seen in how useful these positioning methods are.


    The `CenterHorAndBot` method centers the object horizontally and positions the
    object at the bottom of the screen. The `CenterHorAndMid` method is just an alias
    for the `CenterHorAndVert` method, and it places the object at the center of the
    screen both horizontally and vertically. The `CenterHorAndTop` is similar to the
    other methods except that it positions the object at the screen’s horizontal center
    and at the top of the screen. The last method listed in the preceding, `CenterHorAndVert`,
    will center the `MmgObj` instance both horizontally and vertically. Keep these
    methods in mind; they will come in handy time and time again.


