- fmt: '### Demonstration: `MmgScrollHor` Class


    The example code listed in the following code block is from the `LoadResources`
    method of the `ScreenTestMmgScrollHor` class in the `MmgTestSpace` library. Be
    sure to run the example application and view this test screen to see the class
    in action.


    ```

    01 dBmpSetScrollPane = MmgHelper.CreateDrawableBmpSet(hund4, hund2, false, MmgColor.GetBlack());

    02 dBmpSetScrollPane.graphics.setColor(Color.RED);

    03 dBmpSetScrollPane.graphics.fillRect(0, 0, hund4 / 4, hund2);

    04 dBmpSetScrollPane.graphics.setColor(Color.BLUE);

    05 dBmpSetScrollPane.graphics.fillRect(hund4 / 4, 0, hund4 / 4, hund2);

    06 dBmpSetScrollPane.graphics.setColor(Color.GREEN);

    07 dBmpSetScrollPane.graphics.fillRect(hund4 / 2, 0, hund4 / 4, hund2);


    09 dBmpSetViewPort = MmgHelper.CreateDrawableBmpSet(hund2, hund2, false, MmgColor.GetBlack());

    10 dBmpSetViewPort.graphics.setColor(Color.LIGHT_GRAY);

    11 dBmpSetViewPort.graphics.fillRect(0, 0, hund2, hund2);


    13 vPort = dBmpSetViewPort.img;

    14 sPane = dBmpSetScrollPane.img;


    16 sBarColor = MmgColor.GetLightGray();

    17 sBarSldrColor = MmgColor.GetGray();

    18 sBarWidth = MmgHelper.ScaleValue(15);

    19 sBarSldrHeight = MmgHelper.ScaleValue(30);

    20 interval = 10;


    22 scrollHor = new MmgScrollHor(vPort, sPane, sBarColor, sBarSldrColor, sBarWidth,
    sBarSldrHeight, interval);

    23 scrollHor.SetIsVisible(true);

    24 scrollHor.SetWidth(sWidth);

    25 scrollHor.SetHeight(sHeight + scrollHor.GetScrollBarHeight());

    26 scrollHor.SetEventHandler(this);

    27 MmgScrollHor.SHOW_CONTROL_BOUNDING_BOX = true;

    28 MmgHelper.CenterHorAndVert(scrollHor);

    29 AddObj(scrollHor);

    Listing 6-18

    MmgScrollHor Class Demonstration 1

    ```


    The preceding snippet of code is from the `LoadResources` method of the `ScreenTestMmgScrollHor`
    class. Let’s take a look at some code! The first few lines of code, 1–7, are there
    to create a scroll pane `MmgBmp` object that is the same height as the view port
    but is much wider. The scroll pane image is filled with different color rectangles
    so we can easily see that the pane is moving.


    Similarly, the view port `MmgBmp` is created on line 9 and filled with a light
    gray color, on lines 10 and 11. That takes care of prepping the scroll pane and
    view port objects to be used with the `MmgScrollHor` instance. On lines 13 and
    14, we make a local variable point to the `MmgBmp` image portion of the `MmgDrawableBmpSet`
    we used to create the view port and scroll pane. The remaining colors and dimensions
    for constructing the scroll view are initialized on lines 16–20. The `MmgScrollHor`
    object is initialized on line 22, and its visibility is set on line 23. The dimensions
    are set on lines 24 and 25.


    Take a moment to notice that the scroll view height includes the scroll bar height.
    On line 26, the event handler is set to the game screen. Finally, on lines 27–29,
    the bounding box display flag is set to true. The scroll view is centered horizontally
    and vertically, and it’s added to the game screen’s set of drawable objects via
    a call to the `AddObj` method on line 29.


    ```

    01 public boolean ProcessDpadRelease(int dir) {

    02     MmgHelper.wr("ScreenTestMmgScrollHor.ProcessDpadRelease: " + dir);

    03     scrollHor.ProcessDpadRelease(dir);

    04     isDirty = true;

    05     return true;

    06 }

    01 public boolean ProcessMouseClick(int x, int y) {

    02     MmgHelper.wr("ScreenTestMmgScrollHor.ProcessScreenClick");

    03     scrollHor.ProcessScreenClick(x, y);

    04     isDirty = true;

    05     return true;

    06 }

    01 public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    {

    02     lret = false;


    04     if (pause == false && isVisible == true) {

    05         if (isDirty == true) {

    06            super.GetObjects().SetIsDirty(true);


    08             if (super.MmgUpdate(updateTick, currentTimeMs, msSinceLastFrame)
    == true) {

    09                 lret = true;

    10             }

    11         }

    12     }


    14     return lret;

    15 }

    Listing 6-19

    MmgScrollHor Class Demonstration 2

    ```


    We know that the scroll view widget gets updated by input from the directional
    keys and mouse, so we should expect to see the `MmgUpdate` method of the `ScreenTestMmgScrollHor`
    support calling the update method of its child objects. The first method in the
    preceding snippet is the `ProcessDpadRelease` method. It passes input from the
    game screen to the scroll pane and marks the screen as dirty to force an update
    call. The next method to review, `ProcessMouseClick`, works in the same way as
    the directional keys method. It sends mouse click events to the scroll pane for
    processing.


    The last method in the snippet of code is the `ScreenTestMmgScrollHor` class’
    `MmgUpdate` method. At first glance, we don’t see any update calls being made
    on the scroll view object. If the screen is not paused and is visible, we then
    check to see if the local `isDirty` flag is set to true. If so, we call a super
    class method, `GetObjects`, which returns all the game screen’s child objects.


    The call to `SetIsDirty` with a true argument sets all child objects to have an
    `isDirty` flag set to true. Then, on line 8, the `MmgUpdate` method of the super
    class is called. This will ensure that all child objects get their update methods
    called including the `MmgScrollHor` object.


    ## Widget Classes: `MmgMenuContainer`


    The `MmgMenuContainer` class is a widget class that works in conjunction with
    the `MmgGameScreen` and `MmgMenuItem` classes. It’s not exactly like previous
    widgets we’ve reviewed. Those widgets were very much self-contained, UI-based
    widgets. The `MmgMenuContainer` is designed to share some responsibility with
    the game screen that’s displaying the menu and the `MmgMenuItem` instances.


    ### Class Fields


    The `MmgMenuContainer` class has only one class field we need to worry about.


    ```

    private ArrayList container;

    Listing 6-20

    MmgMenuContainer Class Fields 1

    ```


    The `container` field holds all the menu items displayed by this container object.


    ### Support Method Details


    The `MmgMenuContainer` class comes equipped with a set of support methods that
    let you interact with the data it contains. I’ve listed the methods in the following
    grouping. Take a look at them before we review them.


    ```

    //Data control methods

    public void Add(MmgMenuItem obj) { ... }

    public void Remove(MmgMenuItem obj) { ... }

    public void Clear() { ... }

    public int GetCount() { ... }

    //Data access methods

    public MmgMenuItem[] GetArray() { ... }

    public ArrayList GetContainer() { ... }

    public void SetContainer(ArrayList aTmp) { ... }

    Listing 6-21

    MmgMenuContainer Support Method Details 1

    ```


    The class methods are outlined in the preceding in two groups. The first group
    gives you control of the class’ data. You can add and remove items to and from
    the container and clear the container using these methods. The `GetCount` method
    returns a count of the number of children in the container. The second group of
    methods gives you access to the container’s data. You can get an array representation
    of the child objects using the `GetArray` method, or you can interact with the
    `container` field using the two get and set methods listed.'
