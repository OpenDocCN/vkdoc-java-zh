    代码清单 2-4

    MmgObj 支持方法详情 2


    用于 `X` 和 `Y` 坐标的 get 和 set 方法用于直接与 X 和 Y 坐标值交互。如果你频繁更新 `MmgObj` 的位置，则不应使用这些方法，而应存储对通过调用
    `GetPosition` 返回的位置向量的引用。这将为你节省许多方法调用，特别是当代码作为更新或绘制例程的一部分运行时。


    我想讨论的最后两个方法用于管理对象父级成员关系。两个 `MmgObj` 实例可以通过使用 `parent` 和 `hasParent` 类字段相互关联。此功能在
    API 中使用不多——主要用在作为子对象容器的类中。但是，你可以利用此功能在你的游戏对象之间创建不同的关系。需要注意的是，指示存在父级的类字段和实际的父级是独立工作的，因此必须小心地相应设置这两个类字段。

