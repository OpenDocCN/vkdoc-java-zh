  raw: '## Advanced Classes: MmgSprite


    The `MmgSprite` class is an advanced class that models a sprite image. A sprite
    in 2D game development is a multiframe 2D image that animates as it’s drawn. As
    such, the `MmgSprite` class is designed to handle an array of `MmgBmp` objects
    that represent the frames of the sprite object.


    ### Static Class Members


    The `MmgSprite` class has three static class fields for us to take a look at,
    listed in the following set.


    ```

    public static int DEFAULT_MS_PER_FRAME = 100;

    public static int MMG_SPRITE_FRAME_CHANGE = 0;

    public static int MMG_SPRITE_FRAME_CHANGE_TYPE = 0;

    Listing 5-19

    MmgSprite Static Class Members 1

    ```


    The first field is the default value for the number of milliseconds to wait on
    each frame of the sprite animation. Now, 100 ms is a fairly long time to wait
    when it comes to 2D image animations, but this is a default value and is set to
    be slow, so you don’t miss any frames. The remaining two static class fields are
    ID values used during sprite animation frame change events.


    ### Class Fields


    The first set of class fields for us to look at are listed in the following group.
    These fields control advanced rendering of each frame, hold the frames of the
    animation, and track the start and stop frames of the sprite animation.


    ```

    private MmgVector2 origin;

    private MmgVector2 scaling;

    private MmgRect srcRect;

    private MmgRect dstRect;

    private MmgBmp[] b;

    private float rotation;

    private int frameStart;

    private int frameStop;

    Listing 5-20

    MmgSprite Class Fields 1

    ```


    The preceding first entry contains fields that are used in frame scaling and rotation
    operations. The `origin` field is an `MmgVector2` object that stores the coordinates
    of the center point to be used for rotation transformations. Similarly, the `scaling`,
    `srcRect`, and `dstRect` class fields are used in animation frame scaling transformations.
    You guessed it. The `MmgSprite` class has the ability to scale or rotate any sprite
    frame on the fly.


    The actual animation frames are stored in the `MmgBmp` array class field `b`.
    The `rotation` field is used to store a rotation angle in degrees to be used during
    image rotation. The next two class fields are deceptively powerful. Using the
    `frameStart` and `frameStop` fields, you can animate over only a section of the
    sprite’s frames. This last point is really important. You can have animations
    that only run over a subset of the sprite’s frames.


    ```

    private long frameTime = -1;

    private long prevFrameTime = -1;

    private int frameIdx;

    private long msPerFrame;

    private boolean simpleRendering;

    private MmgEventHandler onFrameChange;

    private boolean timerOnly;

    private MmgEvent frameChange = new MmgEvent(null, "frame_changed", MmgSprite.MMG_SPRITE_FRAME_CHANGE,
    MmgSprite.MMG_SPRITE_FRAME_CHANGE_TYPE, null, null);

    Listing 5-21

    MmgSprite Class Fields 2

    ```


    The second set of class fields starts with two time-tracking fields, `frameTime`
    and `prevFrameTime`. These fields are used to measure frame duration. The `frameIdx`
    field tracks the current frame by its array index. The `msPerFrame` field is used
    to determine how long to stay on each animation frame. The `simpleRendering` Boolean
    flag is used to force simple `MmgBmp` rendering making the draw method more efficient
    by performing fewer operations.


    In this case, there are fewer checks to determine which drawing routine to use.
    The `onFrameChange` field is an event handler that triggers when the frame being
    rendered changes. The `timerOnly` Boolean flag will cause the timing mechanism
    that tracks frame changes to work as a timer for the current frame only. The frame
    index doesn’t increment in this case. Lastly, the `frameChange` event is the event
    template for handling frame change events.


    ### Support Method Details


    The classes we’re reviewing are becoming more and more complex. As such, we sometimes
    encounter long lists of get and set methods. I’ll try and break the methods up
    into groups that make sense. Let’s take a look at the first set of methods to
    review, listed in the following group.


    ```

    //Frame timing methods

    public long GetFrameTime() { ... }

    public void SetFrameTime(long l) { ... }

    public long GetPrevFrameTime() { ... }

    public void SetPrevFrameTime(long l) { ... }

    public long GetMsPerFrame() { ... ]

    public void SetMsPerFrame(long f) { ... }

    //Frame event methods

    public void SetFrameChangeEventId(int i) { ... }

    public MmgEventHandler GetOnFrameChange() { ... }

    public void SetOnFrameChange(MmgEventHandler e) { ... }

    //Frame methods

    public boolean GetSimpleRendering() { ... }

    public void SetSimpleRendering(boolean s) { ... }

    public boolean GetTimerOnly() { ... }

    public void SetTimerOnly(boolean b) { ... }

    public MmgBmp GetCurrentFrame() { ... }

    public void SetCurrentFrame(MmgBmp bmp) { ... }

    public MmgBmp[] GetBmpArray()  { ... }

    public void SetBmpArray(MmgBmp[] d)  { ... }

    Listing 5-22

    MmgSprite Support Method Details 1

    ```


    The first set of methods for us to review are the support methods that handle
    frame timing. There are get and set methods for setting the current frame time,
    the previous frame time, and the number of milliseconds to wait before changing
    frames. The second set of methods allow access to the class’ events. You can customize
    the ID of the event fired when the animation’s frame changes. The next two methods
    in the set allow you to access the event handler for the class’ on frame change
    event.


    The last set of support methods listed in the preceding provide you with the capability
    to control the sprite’s animation frames and rendering. The first two methods,
    `GetSimpleRendering` and `SetSimpleRendering`, give you access to the simple rendering
    field. If set to true, the class will only use basic rendering on the sprite animation’s
    frames. The next two methods listed are access methods for the `timerOnly` field.
    If the `timerOnly` flag is set to true, the timing mechanism that tracks frame
    changes will work as a timer for the current frame only. The animation frame doesn’t
    automatically increment in this case.


    The remaining four methods allow you to get or set the current animation frame
    and to access the `MmgBmp` array that controls the sprite class’ frames. Setting
    the `MmgBmp` array will cause the sprite object’s dimensions and the frame indexes
    to be reset.


    ```

    //Frame rendering methods

    public MmgRect GetSrcRect()  { ... }

    public void SetSrcRect(MmgRect r)  { ... }

    public MmgRect GetDstRect()  { ... }

    public void SetDstRect(MmgRect r)  { ... }

    public float GetRotation()  { ... }

    public void SetRotation(float r)  { ... }

    public MmgVector2 GetOrigin()  { ... }

    public void SetOrigin(MmgVector2 v)  { ... }

    public MmgVector2 GetScaling()  { ... }

    public void SetScaling(MmgVector2 v)  { ... }

    //Frame index methods

    public boolean IsFrameNull(int i)  { ... }

    public int GetFrameIdx()  { ... }

    public void SetFrameIdx(int f)  { ... }

    public int GetFrameStart()  { ... }

    public void SetFrameStart(int f)  { ... }

    public int GetFrameStop()  { ... }

    public void SetFrameStop(int f)  { ... }

    Listing 5-23

    MmgSprite Support Method Details 2

    ```


    The next block of methods for us to look at consists of two sets, frame rendering
    methods and frame index methods. The frame rendering methods give you access to
    all of the advanced rendering fields necessary to support scaling and/or rotation
    of the `MmgSprite`’s current frame. The frame index methods are simple get and
    set methods for the class’ animation frame index fields. You can control the current
    frame index and the animation’s start and stop frame indexes using these methods.
    That brings us to the conclusion of the `MmgSprite` class’ support method review.
    Up next, we’ll take a look at the class’ main methods.'
  trans: '

    ## 高级类：MmgSprite


    `MmgSprite` 类是一个用于建模精灵图像的高级类。在 2D 游戏开发中，精灵是一种多帧 2D 图像，在绘制时会呈现动画效果。因此，`MmgSprite`
    类被设计用于处理一个 `MmgBmp` 对象数组，这些对象代表了精灵对象的各个帧。


    ### 静态类成员


    `MmgSprite` 类有三个静态类字段供我们查看，如下所示。


    ```

    public static int DEFAULT_MS_PER_FRAME = 100;

    public static int MMG_SPRITE_FRAME_CHANGE = 0;

    public static int MMG_SPRITE_FRAME_CHANGE_TYPE = 0;

    Listing 5-19

    MmgSprite 静态类成员 1

    ```


    第一个字段是精灵动画每一帧等待毫秒数的默认值。对于 2D 图像动画来说，100 毫秒是相当长的一段时间，但这是一个默认值，并且设置得较慢，这样你就不会错过任何帧。其余两个静态类字段是在精灵动画帧变化事件中使用的
    ID 值。


    ### 类字段


    我们要查看的第一组类字段如下所示。这些字段控制每一帧的高级渲染，保存动画的帧，并跟踪精灵动画的起始帧和结束帧。


    ```

    private MmgVector2 origin;

    private MmgVector2 scaling;

    private MmgRect srcRect;

    private MmgRect dstRect;

    private MmgBmp[] b;

    private float rotation;

    private int frameStart;

    private int frameStop;

    Listing 5-20

    MmgSprite 类字段 1

    ```


    上述第一个条目包含用于帧缩放和旋转操作的字段。`origin` 字段是一个 `MmgVector2` 对象，用于存储旋转变换时使用的中心点坐标。类似地，`scaling`、`srcRect`
    和 `dstRect` 类字段用于动画帧的缩放变换。你猜对了。`MmgSprite` 类能够动态缩放或旋转任何精灵帧。


    实际的动画帧存储在 `MmgBmp` 数组类字段 `b` 中。`rotation` 字段用于存储一个以度为单位的旋转角度，供图像旋转时使用。接下来的两个类字段看似简单，实则功能强大。使用
    `frameStart` 和 `frameStop` 字段，你可以仅对精灵帧的一部分进行动画处理。最后这一点非常重要。你可以让动画仅运行在精灵帧的一个子集上。


    ```

    private long frameTime = -1;

    private long prevFrameTime = -1;

    private int frameIdx;

    private long msPerFrame;

    private boolean simpleRendering;

    private MmgEventHandler onFrameChange;

    private boolean timerOnly;

    private MmgEvent frameChange = new MmgEvent(null, "frame_changed", MmgSprite.MMG_SPRITE_FRAME_CHANGE,
    MmgSprite.MMG_SPRITE_FRAME_CHANGE_TYPE, null, null);

    Listing 5-21

    MmgSprite 类字段 2

    ```


    第二组类字段以两个时间跟踪字段 `frameTime` 和 `prevFrameTime` 开头。这些字段用于测量帧的持续时间。`frameIdx` 字段通过数组索引跟踪当前帧。`msPerFrame`
    字段用于确定在每个动画帧上停留的时间。`simpleRendering` 布尔标志用于强制进行简单的 `MmgBmp` 渲染，通过执行更少的操作来提高绘制方法的效率。


    在这种情况下，用于确定使用哪个绘制例程的检查会更少。`onFrameChange` 字段是一个事件处理器，当正在渲染的帧发生变化时触发。`timerOnly`
    布尔标志会使跟踪帧变化的计时机制仅作为当前帧的计时器工作。在这种情况下，帧索引不会递增。最后，`frameChange` 事件是用于处理帧变化事件的事件模板。


    ### 支持方法详解


    我们正在审查的类变得越来越复杂。因此，我们有时会遇到很长的 get 和 set 方法列表。我会尝试将这些方法分成有意义的组。让我们看看下面列出的第一组方法。


    ```

    //帧计时方法

    public long GetFrameTime() { ... }

    public void SetFrameTime(long l) { ... }

    public long GetPrevFrameTime() { ... }

    public void SetPrevFrameTime(long l) { ... }

    public long GetMsPerFrame() { ... ]

    public void SetMsPerFrame(long f) { ... }

    //帧事件方法

    public void SetFrameChangeEventId(int i) { ... }

    public MmgEventHandler GetOnFrameChange() { ... }

    public void SetOnFrameChange(MmgEventHandler e) { ... }

    //帧方法

    public boolean GetSimpleRendering() { ... }

    public void SetSimpleRendering(boolean s) { ... }

    public boolean GetTimerOnly() { ... }

    public void SetTimerOnly(boolean b) { ... }

    public MmgBmp GetCurrentFrame() { ... }

    public void SetCurrentFrame(MmgBmp bmp) { ... }

    public MmgBmp[] GetBmpArray()  { ... }

    public void SetBmpArray(MmgBmp[] d)  { ... }

    Listing 5-22

    MmgSprite 支持方法详解 1

    ```


    我们要审查的第一组方法是处理帧计时的支持方法。这里有用于设置当前帧时间、上一帧时间以及更改帧前等待毫秒数的 get 和 set 方法。第二组方法允许访问类的事件。你可以自定义动画帧更改时触发的事件的
    ID。该组中的接下来两个方法允许你访问类中帧变化事件的事件处理器。


    上面列出的最后一组支持方法使你能够控制精灵的动画帧和渲染。前两个方法 `GetSimpleRendering` 和 `SetSimpleRendering`
    让你可以访问简单渲染字段。如果设置为 true，该类将仅对精灵动画的帧使用基本渲染。接下来列出的两个方法是 `timerOnly` 字段的访问方法。如果 `timerOnly`
    标志设置为 true，跟踪帧变化的计时机制将仅作为当前帧的计时器工作。在这种情况下，动画帧不会自动递增。


    剩下的四个方法允许你获取或设置当前动画帧，并访问控制精灵类帧的 `MmgBmp` 数组。设置 `MmgBmp` 数组将导致精灵对象的尺寸和帧索引被重置。


    ```

    //帧渲染方法

    public MmgRect GetSrcRect()  { ... }

    public void SetSrcRect(MmgRect r)  { ... }

    public MmgRect GetDstRect()  { ... }

    public void SetDstRect(MmgRect r)  { ... }

    public float GetRotation()  { ... }

    public void SetRotation(float r)  { ... }

    public MmgVector2 GetOrigin()  { ... }

    public void SetOrigin(MmgVector2 v)  { ... }

    public MmgVector2 GetScaling()  { ... }

    public void SetScaling(MmgVector2 v)  { ... }

    //帧索引方法

    public boolean IsFrameNull(int i)  { ... }

    public int GetFrameIdx()  { ... }

    public void SetFrameIdx(int f)  { ... }

    public int GetFrameStart()  { ... }

    public void SetFrameStart(int f)  { ... }

    public int GetFrameStop()  { ... }

    public void SetFrameStop(int f)  { ... }

    Listing 5-23

    MmgSprite 支持方法详解 2

    ```


    我们要查看的下一组方法由两部分组成：帧渲染方法和帧索引方法。帧渲染方法让你可以访问所有必要的高级渲染字段，以支持 `MmgSprite` 当前帧的缩放和/或旋转。帧索引方法是该类动画帧索引字段的简单
    get 和 set 方法。你可以使用这些方法控制当前帧索引以及动画的起始和结束帧索引。至此，我们对 `MmgSprite` 类支持方法的审查就结束了。接下来，我们将查看该类的主要方法。

    '
- fmt: '### Main Method Details


    The class’ main methods are listed in the following in three groups. There are
    the usual class constructors; this `MmgSprite` class has more constructors than
    those we have listed here. Please take the time to review and understand them
    before moving on. We’ll also review cloning, comparison, and rendering methods
    here.


    ```

    //Class constructors

    public MmgSprite(MmgBmp[] t, MmgVector2 Position) { ... }

    public MmgSprite(MmgBmp[] t) { ... }

    public MmgSprite(MmgSprite obj) { ... }

    //Cloning methods

    public MmgObj Clone() { ... }

    public MmgSprite CloneTyped() { ... }

    //Draw, update, and comparison methods

    public void MmgDraw(MmgPen p) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public boolean ApiEquals(MmgSprite obj) { ... }

    Listing 5-24

    MmgSprite Main Method Details 1

    ```


    The first set of methods we’ll look at are the class’ constructors. The first
    entry takes an array of `MmgBmp` objects representing the sprite’s animation frames
    and an `MmgVector2` object that holds the current position of the frames. This
    constructor will set the animation frames and position the sprite. The second
    constructor is similar, but it only takes animation frames as an argument. Last
    but not least, the specialized constructor takes an `MmgSprite` object as an argument
    and uses it to create a new, unique, class instance.


    The next set of methods are cloning methods. We’ve seen this implementation many
    times before, so I won’t go into too much detail here. The two cloning methods
    use the specialized constructor to create a new, unique copy of the class and
    return it cast to the specified class type. The last set of main methods to review
    are also methods we’ve seen before. The game engine’s default drawing routine
    will call the class’ update and draw methods.


    The update method is responsible for handling timing, animating the frames, and
    events, firing an event when the frame changes. The class’ drawing method can
    handle more advanced rendering features if enabled or just a simple direct rendering
    of the sprite’s current animation frame. The last entry in the set is the `ApiEquals`
    method. This is an API-level method used to compare two `MmgSprite` objects for
    equality.


    ### Demonstration: MmgSprite Class


    The demonstration code listed in the following is from the `LoadResources` method
    of the `ScreenTestMmgSprite` class. Also listed are the game engine drawing routine
    methods for the game screen class'' `MmgUpdate` and `MmgDraw` methods.


    ```

    //ScreenTestMmgSprite.LoadResources

    01 frame1 = MmgHelper.GetBasicCachedBmp("soldier_frame_1.png");

    02 frame1 = MmgBmpScaler.ScaleMmgBmp(frame1, 2.0f, true);

    03 MmgHelper.CenterHorAndVert(frame1);


    05 frame2 = MmgHelper.GetBasicCachedBmp("soldier_frame_2.png");

    06 frame2 = MmgBmpScaler.ScaleMmgBmp(frame2, 2.0f, true);

    07 MmgHelper.CenterHorAndVert(frame2);


    09 frame3 = MmgHelper.GetBasicCachedBmp("soldier_frame_3.png");

    10 frame3 = MmgBmpScaler.ScaleMmgBmp(frame3, 2.0f, true);

    11 MmgHelper.CenterHorAndVert(frame3);


    13 frames1 = new MmgBmp[4];

    14 frames1[0] = frame1;

    15 frames1[1] = frame2;

    16 frames1[2] = frame3;

    17 frames1[3] = frame2;


    19 frames2 = new MmgBmp[4];

    20 frames2[0] = frame1.CloneTyped();

    21 frames2[1] = frame2.CloneTyped();

    22 frames2[2] = frame3.CloneTyped();

    23 frames2[3] = frame2.CloneTyped();


    25 MmgVector2 tmpPos = frame1.GetPosition().Clone();

    26 tmpPos.SetY(tmpPos.GetY() - MmgHelper.ScaleValue(30));

    27 sprite1 = new MmgSprite(frames1, tmpPos);

    28 sprite1.SetMsPerFrame(200l);

    29 AddObj(sprite1);

    //Game engine drawing routine

    01 public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    {

    02     lret = false;


    04     if (pause == false && isVisible == true) {

    05         //always run this update

    06         sprite1.MmgUpdate(updateTick, currentTimeMs, msSinceLastFrame);

    07         sprite2.MmgUpdate(updateTick, currentTimeMs, msSinceLastFrame);

    08     }


    10     return lret;

    11 }

    01 public void MmgDraw(MmgPen p) {

    02     if (pause == false && isVisible == true) {

    03         super.MmgDraw(p);

    04     }

    05 }

    Listing 5-25

    MmgSprite Class Demonstration 1

    ```


    The first snippet of code on lines 1–23 of the `LoadResources` method shows us
    how to configure a simple `MmgSprite` object and draw it to the screen. On lines
    1–3, an animation frame is loaded from the key, “soldier_frame_1.png”. You can
    tell that this is a cached image resource because it’s being loaded by key only.
    Most likely, this image was auto loaded from the test application’s project resource
    folder.


    The image is scaled up a bit on line 2, and its position is centered, line 3.
    The same steps are performed for two more animation frames so that we have a total
    of three frames loaded. On line 13, an array of `MmgBmp` objects is instantiated
    to hold the frames we just loaded. Now the nature of the animation is such that
    we don’t want to go from frame 3 to frame 1; we want to return to frame 2 first.
    As such, we create an array of length 4 and store the frames in the correct order.
    On lines 25 and 26, we prepare the position of the `MmgSprite` object.


    Look carefully at the positioning code. Notice that we clone the position used
    by `frame1` and adjust it down slightly – about 15 pixels. A new `MmgSprite` object
    is created on line 27 using the `MmgBmp` array, frames, and position. Note that
    the frames have a different position than the sprite object. Recall the animation
    frames are drawn at the position of the sprite.


    On line 28, the frame time is set to a large number, 200 ms, so that it can be
    easily observed. Because the `MmgSprite` class extends the `MmgObj` class, it
    can be added to the game screen’s set of drawable objects with a call to `AddObj`.
    The next section of code to review in this demonstration snippet is the `MmgUpdate`
    method. Notice that on lines 6 and 7 the update methods of the sprite object are
    called if the game screen is visible and is not paused. This example code shows
    us how to update other objects in the update method and how to make more complex
    classes update themselves. Lastly, the `MmgDraw` method shows us that the sprite
    object is drawn via the default drawing routine just like any other `MmgObj` on
    the screen.


    ## Advanced Classes: MmgDrawableBmpSet


    The `MmgDrawableBmpSet` class is used to create a set of framework and `MmgBase`
    API classes that are preconfigured to work together. The classes are set up such
    that the `MmgPen` object draws on the `MmgBmp` object. The framework classes that
    support this functionality are included as part of the `MmgDrawableBmpSet` object’s
    fields.


    For the most part, the C# implementation of the game engine is very similar to
    the Java implementation. The API is identical, but the implementation differs
    naturally due to the differing frameworks they’re based on.


    ### Class Fields


    In the following, I’ve listed the Java and C# versions of the `MmgDrawableBmpSet`
    class. You can use these classes as a reminder of how the framework classes align.
    A Java `BufferedImage` roughly equates to C#’s `RenderTarget2D`. Similarly, the
    Java `Graphics2D` class is roughly equivalent to C#’s `SpriteBatch` class.


    ```

    public RenderTarget2D buffImg;

    public SpriteBatch graphics;

    public MmgPen p;

    public MmgBmp img;

    Listing 5-27

    MmgDrawableBmpSet Class Fields C#

    ```


    ```

    public BufferedImage buffImg;

    public Graphics2D graphics;

    public MmgPen p;

    public MmgBmp img;

    Listing 5-26

    MmgDrawableBmpSet Class Fields Java

    ```


    The first field, `buffImg`, is used to hold a framework implementation of a drawable
    image. The `graphics` field is a framework class that draws on surfaces including
    images. The API-level classes are used as fields to support the class’ ability
    to draw on the target `MmgBmp` image, `img`, using the `MmgPen` field, `p`.'
