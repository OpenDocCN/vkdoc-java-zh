    ## Chapter Conclusion


    在本章中，我们完成了对 MmgBase API 的 widget 类的回顾。我们涵盖的类具有复杂的实现和高级功能。请注意，无论类变得多么复杂，只要它扩展了`MmgObj`类，我们仍然可以将其直接插入游戏屏幕并使其工作。这就是游戏引擎开始展现其强大之处。让我们看看刚刚回顾的类的总结：


    *   `MmgTextField`：一个用于表示用户可以输入文本的文本字段的 API 类。

    *   `MmgTextBlock`：一个用于表示多页文本块的 API 类。

    *   `MmgScrollHor`/`MmgScrollVert`/`MmgScrollHorVert`：一组用于表示可滚动窗格的 API 类。

    *   `MmgMenuContainer`：一个用于表示菜单系统的 API 类。该类作为其菜单系统的一部分插入到`MmgGameScreen`类中。

    *   `MmgMenuItem`：由`MmgMenuContainer`类使用的菜单项类。


    我们工具库的能力正在呈指数级增长。现在我们刚刚添加了一系列 UI 小部件，你可以在游戏的菜单系统或游戏 HUD 中使用它们。我们没有定义一个复杂的图形 API，但我们定义了一系列可绘制对象，它们的行为类似于自包含的
    UI 小部件。这里有足够的内容来创建可靠的菜单、游戏设置屏幕等。我希望你能看到我们正在使用的设计的灵活性和强大之处。在构建下一个游戏时，请记住这些类。


    # 7. Animation Classes


    在本章中，我们将回顾一组动画类，它们可用于为你的下一个游戏的某些元素提供基本的动画支持。`MmgPositionTween`类尤其是一个高级实现，它考虑了子对象、时间、绘制和定位。这个类需要插入到游戏引擎的绘制例程中，并接收更新调用以在动画期间保持正确的时间：


    *   `MmgPulse`

    *   `MmgPositionTween`/`MmgSizeTween`


    ## Animation Classes: MmgPulse


    `MmgPulse`类为简单动画提供支持。它专门设计用于脉冲式动画，或者返回到动画起点并重复的动画。脉冲动画的一个很好的例子是火炬，它从暗淡到明亮再回到暗淡地闪烁。


    我应该提到，这个类没有扩展`MmgObj`类，因此它不属于可绘制对象的集合。这个类不会被绘制到屏幕上。相反，`MmgPulse`类会更新一个`MmgVector2`对象，该对象可以是对活动对象位置的引用，也可以用于驱动对象的属性。'
