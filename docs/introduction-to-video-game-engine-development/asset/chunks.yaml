- fmt: '# PongClone: Register ScreenGame


    Now that the game’s main game screen class is complete, we need to link it into
    the `GamePanel` class so that the player can start a one- or two-player game and
    the main game screen will display and run properly. Open up your game project’s
    `GamePanel` class and add the following field to the class:


    ```

    public ScreenGame screenGame;

    ```


    You’ll also need to add the following line of code to the class’ constructor:


    ```

    screenGame = new ScreenGame(GameStates.MAIN_GAME, this);

    ```


    To connect the game screen into the `GamePanel`’s known states, we need to add
    the following code to the cleanup section of the `SwitchGameState` method.


    ```

    01 else if (prevGameState == GameStates.MAIN_GAME_1P || prevGameState == GameStates.MAIN_GAME)

    02 {

    03     MmgHelper.wr("Hiding MAIN GAME 1P screen.");

    04     screenGame.Pause();

    05     screenGame.SetIsVisible(false);

    06     screenGame.UnloadResources();


    08 }

    09 else if (prevGameState == GameStates.MAIN_GAME_2P)

    10 {

    11     MmgHelper.wr("Hiding MAIN GAME 2P screen.");

    12     screenGame.Pause();

    13     screenGame.SetIsVisible(false);

    14     screenGame.UnloadResources();


    16 }

    Listing 18-17

    GamePanel Screen Registration 1

    ```


    We’re almost there. We still need to add the game state preparation code that’s
    responsible for getting the main game screen ready to display. Notice that the
    code is designed to work with one-player or two-player game states.


    ```

    01 else if (gameState == GameStates.MAIN_GAME_1P || gameState == GameStates.MAIN_GAME)

    02 {

    03     MmgHelper.wr("Showing MAIN GAME 1P screen.");

    04     screenGame.SetGameType(GameType.GAME_ONE_PLAYER);

    05     screenGame.LoadResources();

    06     screenGame.UnPause();

    07     screenGame.SetIsVisible(true);

    08     currentScreen = screenGame;


    10 }

    11 else if (gameState == GameStates.MAIN_GAME_2P)

    12 {

    13     MmgHelper.wr("Showing MAIN GAME 2P screen.");

    14     screenGame.SetGameType(GameType.GAME_TWO_PLAYER);

    15     screenGame.LoadResources();

    16     screenGame.UnPause();

    17     screenGame.SetIsVisible(true);

    18     currentScreen = screenGame;


    20 }

    Listing 18-18

    GamePanel Screen Registration 2

    ```


    Add the two code snippets listed in the preceding to the `SwitchGameState` method
    of the `GamePanel` class as instructed. Now the new game screen class is fully
    wired into the `GamePanel` and subsequently the game. Save your files, address
    any errors, and compile your PongClone game project. If you run into any issues,
    take a look at the code in the “Chapter15_CompleteVersion” package included in
    the game engine’s main project. Now let’s run the game!


    If you’ve been following along in C#, then compile the project and open up a terminal
    program. Navigate to your project’s directory and find the local copy of “PongClone.dll.”
    This file should reside in the following folder in the root directory of the PongClone
    project:


    ```

    ./bin/Debug/netcoreapp3.1/PongClone.dll

    ```


    Navigate to the root directory of your project and run the following command to
    launch your game:


    ```

    dotnet ./bin/Debug/netcoreapp3.1/PongClone.dll

    ```


    If you’ve been following along in Java, then you only need to run the project
    from the IDE. If you’ve implemented everything correctly, then you should be able
    to run your project by right-clicking the `PongClone.java` class and selecting
    “Run File” from the context menu. You can also select the IDE’s “Run” menu option
    and choose the “Run Project” context menu option. Make sure that the project listed
    in the context menu command is your PongClone project.


    ![../images/508392_1_En_18_Chapter/508392_1_En_18_Fig1_HTML.jpg](images/508392_1_En_18_Chapter/508392_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    PongClone Game 1


    Take a moment to let it soak in. Congratulations! You’ve just written your first
    game with the Mmg game engine! Take a moment to think about the complexity of
    your code when compared to the complexity of the resulting game. I must say not
    bad for a couple of classes and a few lines of code. Don’t go away just yet. We
    have another game build to work on next, DungeonTrap.


    # Conclusion


    Congratulations! If you’ve made it this far and have completed Parts 1, 2, and
    3 of this text, then you’ve accomplished no small feat. I’d like to take a few
    moments to step back and look at what we’ve managed to accomplish together over
    the course of this text.


    ## Accomplishments


    The first major accomplishment we’ve achieved is the introduction to, and detailed
    explanation of a fairly robust, 2D game engine API. We worked literally from the
    ground up reviewing each game engine class in turn as we completed our review
    of the MmgBase API. During this review, we got to witness the power of a well-designed
    super class, or base class if you’re following along in C#, in the `MmgObj` class.


    We also saw first-hand how to design and build not only a 2D game engine API but
    any advanced API really. The examples of consistent naming conventions, globally
    supported features like cloning and comparison, and well-documented code are foundational
    to any good API and any good software development project.


    The second major accomplishment we’ve achieved together through this text is the
    detailed review of the MmgCore API. We saw how to separate the MmgBase API features
    from the MmgCore API’s application-level features like user input, screen management,
    and the main drawing loop. We also learned how to launch our games and demo the
    MmgBase API functionality through the use of the MmgTestScreens API’s example
    application.


    Last but not least, we applied literally everything we learned to build two games,
    PongClone and DungeonTrap, from the ground up. With PongClone, we started from
    an empty project. We pulled in our API code to create a game that we could launch
    and play with just a few class files. The DungeonTrap game build is available
    as an additional download from the book’s GitHub repository. I highly recommend
    that you download and complete the DungeonTrap game.


    For the DungeonTrap game, we got to build out a complex class hierarchy that properly
    encapsulated and exposed functionality from super classes to child classes. We
    managed to review over 40 classes and complete the game in just a few chapters.
    Take a moment for yourself and enjoy what you’ve accomplished. I’d like to acknowledge
    the artists and websites I used for resources in some of the book’s projects.


    ## Where You Go From Here


    So now that you’ve completed this book and you have some game engine and 2D game
    building experience, you might be wondering, *Where can I go from here?* Obviously,
    this question depends a lot on you, but I can certainly make some suggestions.


    ### Add to the PongClone Game


    Take the time to customize the PongClone game. You can add new game features like
    multi-ball, super-speed, larger paddles, you name it. You could also modify the
    game to support different modes. Think about different win conditions or a penalty
    shot mode. It’s really up to you.


    ### Add to the DungeonTrap Game


    You could spend a little bit of time working on customizing your DungeonTrap game.
    For instance, there are items like the bomb and the treasure chest that exist
    but aren’t implemented in the game. Similarly, there are unused weapons, the axe
    and the sword, and the ability for enemy characters to use weapons. All of these
    could be used to customize and refine the game. At the very least, you should
    be sure to adjust the level, enemy wave, parameters to make the game a little
    more playable.


    ### Add to the Game Engine API


    You could add new functionality to the game engine project, either at the MmgBase
    API level where you could define more widgets and tools to use or at the MmgCore
    API level where you could create game screens that are specialized for side scrolling
    games or 2D top-down shooters. The sky is the limit really.'
