    fields. The method following that group is the `SetUpdateHandler` method. It’s
    used to set the class’ `update` field. The `slowDown` field has a pair of get
    and set methods followed by the `StopLoad` method. The `StopLoad` method will
    force the resource loading process to exit on the next loop iteration.


