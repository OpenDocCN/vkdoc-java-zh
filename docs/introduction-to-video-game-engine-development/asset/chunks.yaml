  raw: '## Topic: Accessing Auto Load Resources


    We’re going to take a look at the code used to load resources that were placed
    in the auto load directory. Recall that there are three levels of resources for
    both sounds and images: explicit resources, auto load resources, and game-specific
    resources. Think of the auto load resources as belonging to the game engine, for
    instance, default images and default sounds that are included with the game engine’s
    project.


    ```

    MmgHelper.GetBasicBmp(GameSettings.IMAGE_LOAD_DIR + "file_name.png");

    MmgHelper.GetBasicSound(GameSettings.SOUND_LOAD_DIR + "file_name.png");

    Listing 13-8

    Topic: Accessing Auto Load Resources 1

    ```


    While this example is very similar to the first topic section, there are some
    subtle but important points I want to discuss. The first thing I’d like to point
    out is the path value stored in the game settings class. There is a hidden agreement
    here that the path variable, `IMAGE_LOAD_DIR`, ends with a path separation character.
    Thus, when used, you need only append the file name. Make sure you are aware of
    and consistent with how you use your resource paths.


    The previous two examples demonstrate direct resource loading. The precedent with
    regard to direct resources is to place them at the root of the corresponding resource
    folder. For instance, a direct image resource should be placed in the root of
    the drawable folder. Similarly, the sound resource is placed in the root of the
    playable folder. The next examples demonstrate accessing cached resources. These
    resources reside in **auto_load** directories in the **drawable** and **playable**
    folders.


    ```

    MmgHelper.GetBasicCachedBmp(GameSettings.IMAGE_LOAD_DIR + "file_name.png", "file_name.png");

    MmgHelper.GetBasicCachedBmp("file_name.png");

    MmgHelper.GetBasicCachedSound(GameSettings.SOUND_LOAD_DIR + "file_name.png", "file_name.wav");

    MmgHelper.GetBasicCachedSound("file_name.wav");

    Listing 13-9

    Topic: Accessing Auto Load Resources 2

    ```


    In the code example listed in the preceding, the first entry loads a resource
    and stores it in the game engine’s resource cache if it doesn’t already exist.
    It also returns the new image resource for use. The next method entry will only
    pull a cached image resource for use if it exists. The same functionality exists
    for sound resources and is also listed in the preceding.


    ## Topic: Accessing Game-Specific Resources


    Let’s take a look at the game-specific resource access calls. The game-specific
    folder exists in the root of the **drawable** and **playable** folders next to
    the **auto_load** directory and direct load resources. There is a nuance as to
    how this aspect of the resource system works. Let’s take a look at a few lines
    of code from the `MmgApiGame` class’ `main` method from the MmgCore API.


    ```

    GameSettings.PROGRAM_IMAGE_LOAD_DIR += GameSettings.NAME;

    GameSettings.PROGRAM_SOUND_LOAD_DIR += GameSettings.NAME;

    Listing 13-10

    Topic: Accessing Game-Specific Resources 1

    ```


    The code listed in the preceding is default functionality built into the template
    static main class. The thing you need to be aware of is that the game’s name,
    `GameSettings.NAME`, must be a valid folder name and the game-specific resource
    folder must match. Once that is taken care of, the game resources in the program-specific
    resource folder will be loaded as part of the game’s startup process.


    ```

    MmgHelper.GetBasicCachedBmp("game_file_name.png");

    MmgHelper.GetBasicCachedSound("game_file_name.wav");

    Listing 13-11

    Topic: Accessing Game-Specific Resources 2

    ```


    The two lines of code listed in the preceding demonstrate how to access resources
    loaded from the game-specific resource folder. The process is the same as with
    the auto load resources. That concludes our review of the different ways you can
    access game resources.


    ## Chapter Conclusion


    In this chapter, we took a moment to talk about an important aspect of the game
    engine, resource loading and resource access. You will encounter this topic when
    working with any game engine. There are all kinds of approaches to handling game
    resources.


    Some engines will load resources into an intermediate format and preprocess the
    resources during the editing phase of the game. Our engine is designed to work
    directly off of the file system, hopefully making the use of game sounds and images
    quick and easy. Let me summarize the classes and topics we’ve reviewed in this
    chapter:


    *   RunResourceLoad: An MmgCore API class that is responsible for scanning the
    auto load and game-specific directories listed in the GameSettings file. A set
    of target files to load is created as a result of the scan. The individual files
    are processed and loaded into the game engine’s image and sound resource caches.


    *   Topic: Accessing Explicit Resources: A demonstration of how to access sound
    and image resources directly with just a file path.


    *   Topic: Accessing Auto Load Resources: A demonstration of how to access sound
    and image resources that have been processed as an auto load resource.


    *   Topic: Accessing Game-Specific Resources: A demonstration of how to access
    sound and image resources that have been processed as a game-specific resource.


    This chapter was a short but important chapter. We covered all the different ways
    you can access resources and use them in your game screens. Notice the flexibility
    in accessing resources; there are a few different ways for you to do things, which
    is always beneficial when designing a new game. I hope you have a good understanding
    of how the engine handles loading resources of different types and have the ability
    to access them from different screens in your games.


    # 14. Game Screens


    The focus of this chapter is to review and understand how the MmgCore API’s game
    screen and frame rate classes work with the `GamePanel` class to drive the game
    engine’s drawing routine. We’ll also want to review some subtle details about
    the set of game screens that have been implemented in the MmgCore API.


    These game screens are more concrete in their implementation than those we encountered
    in the MmgBase API and are designed to plug into the engine’s game panel class.
    A summary of the classes covered in this chapter is as follows:


    *   RunFrameRate


    *   ScreenSplash


    *   ScreenLoading


    *   ScreenMainMenu


    *   Screen


    ## Game Screens: RunFrameRate


    The `RunFrameRate` class is only used by the Java version of the game engine.
    The `RunFrameRate` class is designed to, as one might expect, drive the engine’s
    frame rate. Because the C# version of the engine sits on top of the MonoGame API,
    the frame rate control is built into that framework’s `Game` class.


    In that case, you can adjust the frame rate by simply setting a class field, `TargetElapsedTime`.
    It’s important for us to understand frame rates and how threading is used to drive
    the Java version of the game engine’s drawing routine and subsequently the game’s
    frame rate. Let’s jump into some code!'
