  trans: '

    ### 静态类成员


    `MmgSound` 类有一些静态类成员供我们查看。


    ```

    private static int ID_SRC = 0;

    public static float MMG_SOUND_GLOBAL_VOLUME = 0.65f;public static float SetVolume(float
    f) { ... }

    清单 2-19

    MmgSound 静态类成员 1

    ```


    第一个类字段是一个私有字段 `ID_SRC`，它作为类构造函数的一部分，用于为该类的实例设置唯一 ID。前面列出的下一个静态类字段是 `volume` 字段。它用于设置所有
    `MmgSound` 实例的音量。在每次调用声音的播放方法时，在声音播放之前都会检查全局音量。


    最后一个要查看的静态类成员是 `SetVolume` 方法。此方法用于在应用最小值和最大值约束的同时更新全局音量值。`SetVolume` 方法返回它刚刚更新的音量字段的值。这确保了方法调用者知晓应用于音量值的任何音量范围约束。


    ### 类字段


    `MmgSound` 类有一些类字段，用于支持声音资源、音量和播放速率，供我们讨论。


    ```

    private int id;

    private String idStr;

    private Clip sound;

    private float usedVolume;

    private float range;

    清单 2-20

    MmgSound 类字段 1

    ```


    当创建 `MmgSound` 对象时，`id` 字段会被赋予一个唯一值。`idStr` 字段类似，只是它保存了 `id` 字段的字符串表示形式。`sound`
    字段是框架声音类的一个实例。在游戏引擎的 Java 实现中，框架的声音类是 `Clip` 类。


    `usedVolume` 类字段存储应用于声音的音量。如果在设置 `usedVolume` 之后静态类字段 `volume` 发生变化，声音的音量将在下次播放时自动更新。前面列出的字段集合中的最后一项是私有类字段
    `range`。此字段用于在向当前声音应用新音量时描述音量范围。


    ```

    private float gain;

    private FloatControl vol;

    private float currentVolume;

    private float currentRate;

    清单 2-21

    MmgSound 类字段 2

    ```


    私有类字段 `gain` 是一个计算出的调整值，用于改变声音的音量。`FloatControl` 实例 `vol` 是一个特定于 Java 的实现，用于设置声音的音量和速率。它是一个用于管理声音剪辑属性的控制类。


    ### 支持方法详解


    让我们看看第一组支持方法。


    ```

    public void ApplyVolume() { ... }

    public void ApplyRate(float rate) { ... }

    public float GetCurrentRate() { ... }

    public float GetCurrentVolume() { ... }

    public String GetIdStr() { ... }

    清单 2-22

    MmgSound 支持方法详解 1

    ```


    `ApplyVolume` 支持方法用于更新 `sound` 和 `usedVolume` 类字段的音量。该方法使用 Java 框架类，根据可用的音量范围和全局音量值来设置声音剪辑的增益。`currentVolume`
    类字段也由此方法更新，以反映所使用的音量。


    下一个要查看的支持方法是 `ApplyRate` 方法。此方法用于设置声音的播放速率（如果支持的话）。采样率不像音量那样由全局静态值控制。每个 `MmgSound`
    实例都可以有自己的播放速率。此方法还会更新 `currentRate` 字段。如您所见，`currentVolume` 和 `currentRate` 字段是描述性的，并且反映了声音对象所使用的值。


    接下来的两个支持方法 `GetCurrentRate` 和 `GetCurrentVolume` 只是简单的 get 方法，返回其关联字段的当前值。这组方法中的最后一项是
    `GetIdStr` 方法。此方法返回 `idStr` 字段的值，该字段是类 `id` 字段的字符串表示形式。


    ```

    public int GetId() { ... }

    private void SetId() { ... }

    public Clip GetSound() { ... }

    public void SetSound(Clip snd) { ... }

    清单 2-23

    MmgSound 支持方法详解 2

    ```


    `GetId` 方法是典型的字段访问方法；然而，`SetId` 方法并非典型的 set 方法。`SetId` 方法是私有的，它在类内部用于为每个新类实例的
    `id` 字段赋值。剩下的两个支持方法提供了对 `sound` 字段的访问，允许您设置或获取 `MmgSound` 类所包装的框架类。


    ### 主要方法详解


    我们将从下面列出的构造函数开始对 `MmgSound` 类的主要方法进行回顾。


    ```

    public MmgSound(Clip se) { ... }

    public MmgSound(MmgSound obj) { ... }

    public MmgSound Clone() { ... }

    清单 2-24

    MmgSound 主要方法详解 1

    ```


    第一个构造函数接受一个框架声音类作为参数。在 Java 实现中，这是 `Clip` 类。在 C# 实现中，使用 `SoundEffect` 类。通过调用 `ApplyVolume`
    方法，将全局音量应用于新的声音实例。构造函数还调用 `SetId` 方法，为新的类实例赋予唯一标识。列出的第二个构造函数是一个专用构造函数，它接受一个 `MmgSound`
    实例作为参数，并利用它从现有对象创建一个新的、唯一的 `MmgSound` 对象。


    ```

    public void Play() { ... }

    public void Play(int loop, float rate) { ... }

    public void Stop() { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgSound obj) { ... }

    清单 2-25

    MmgSound 主要方法详解 2

    ```


    该类提供了两种播放声音资源的方式。第一种方式（如上所列）不接受任何参数，是一种直接播放声音的方式。声音会被重置以进行播放，并且配置为不循环。此方法用于快速播放音效和不需要循环的较短声音。


    第二个 `Play` 方法接受两个参数，可用于在播放声音之前设置循环次数和播放速率。此方法对于播放背景音乐等持续时间较长的声音非常方便。请注意，我们设置了声音播放的循环次数，这意味着声音将完整播放那么多次，然后停止。


    最后一个要回顾的主要方法是 `Stop` 方法。在方法返回之前，声音会停止，并且音量会与全局值同步。请注意，两个播放方法和停止方法都确保声音对象的音量与全局音量匹配。这是有道理的，因为在游戏中，我们可能有许多不同的声音正在播放或可供播放。该类被配置为自动使所有声音对象实例与全局音量保持同步。


    我想讨论的另外两个主要方法是 `ApiToString` 方法和 `ApiEquals` 方法。我们之前都见过这两个方法，但我将在此处再次简要介绍它们。`ApiToString`
    方法用于创建 `MmgSound` 类的字符串表示形式。该方法在调试和日志记录场景中非常有用。`ApiEquals` 方法用于比较两个 `MmgSound`
    实例并确定它们是否相等。

    '
- fmt: '### Demonstration: `MmgSound` Class


    In this section, we’ll demonstrate use of the `MmgSound` class by looking at specific
    methods of the `ScreenTestMmgSound` class from the `MmgTestSpace` package, or
    namespace in C#. This demonstration uses input events, so I’ll cover some input
    handling basics here as well. There is also some sound playback, so we’ll cover
    a little resource loading too.


    ```

    01 sound1 = MmgHelper.GetBasicCachedSound("jump1.wav");

    02 sound2 = MmgHelper.GetBasicCachedSound("jump2.wav");


    04 soundLabel1 = MmgFontData.CreateDefaultBoldMmgFontLg();

    05 soundLabel1.SetText("MmgSound Example");

    06 MmgHelper.CenterHorAndVert(soundLabel1);

    07 soundLabel1.SetY(soundLabel1.GetY() - MmgHelper.ScaleValue(20));

    08 AddObj(soundLabel1);


    10 soundLabel2 = MmgFontData.CreateDefaultBoldMmgFontLg();

    11 soundLabel2.SetText("Press Enter or Space to Play a Sound");

    12 MmgHelper.CenterHorAndVert(soundLabel2);

    13 soundLabel2.SetY(soundLabel2.GetY() + MmgHelper.ScaleValue(20));

    14 AddObj(soundLabel2);

    Listing 2-26

    MmgSound Class Demonstration 1

    ```


    The `LoadResuorces` method is very similar to previous versions we’ve reviewed.
    On lines 1 and 2, we have some resource preparation code that sets the `sound1`
    and `sound2` class fields. Notice that the fields are set using the static method
    `GetBasicCachedSound` of the `MmgHelper` class. There are a few ways resources
    can be loaded into the game using the API. For the most part, resource loading
    is a higher-level action to be performed by the game implementation’s `MmgCore`
    library.


    However, with the way the `MmgBase` API is structured, images and sounds can be
    loaded automatically based on where the game is running and what the game is named
    in the code and settings. In this case, the `MmgTestScreens` application is run
    out of the `MmgTestSpace` package. In the case of the C# implementation, the `MmgGameApiCs`
    project has a similar `MmgTestScreens` class in the `MmgTestSpace` namespace.
    The Java project has the following directory structure:


    ```

    MmgGameApiJava

    |-> src (Source Code Directory)

    |-> dist (Executable Directory)

    |-> cfg (Resource and Configuration Directory)

    |-> playable

    |-> MmgTestSpace

    |-> jump2.wav

    |-> auto_load

    |-> jump1.wav

    Listing 2-27

    MmgGameApiJava Project Directory Structure

    ```


    As the game starts up, code from the `MmgCore` API, essentially the game engine
    runtime, checks to see if some default folders exist in the project directory.
    Because the Java version of the project was developed in the NetBeans IDE, we
    have the IDE project configured to compile to the `dist` folder. If there is a
    directory named `cfg` in the same directory as the `dist` folder, it is treated
    as the configuration directory and is scanned for subfolders and files.


    One such special subfolder is the `playable` folder found in the `cfg` directory
    of the project. Notice the `MmgTestSpace` and `auto_load` subfolders. If a subfolder
    is found that has the same name as the project’s `NAME` static field, found in
    the game’s `GameSettings` class, that folder is scanned for audio files. Any audio
    files found are loaded into the game engine’s audio resource cache by file name.


    To demonstrate playing the sound, we tap into the input handling methods that
    are called by the `GamePanel` class for the current game screen. This will be
    covered in more detail during the `MmgCore` API review. The `ProcessKeyClick`
    method is fired when a keyboard key is pressed. It is passed a character and an
    integer representation of the keyboard key. In this case, pressing Enter or the
    space bar will play a sound. We can use the character representation to check
    for Enter `"\n"` or space `" "`. When the Enter key is pressed, `sound1` is played;
    and when the space bar is pressed, `sound2` is played.


    ## Base Classes: `MmgPen`


    The `MmgPen` class wraps the framework’s drawing class. In the Java/Swing implementation,
    the `MmgPen` class wraps the `Graphics` class. In the C#/MonoGame implementation,
    the `MmgPen` class wraps the `SpriteBatch` class. The `MmgPen` class provides
    drawing support to the `MmgBase` API and allows for drawing images, text, and
    rectangles to the screen.


    The `MmgPen` class is designed to be flexible and allow the user to call the drawing
    method that best suits the needs of the given situation. You''ll notice that this
    class does not present the same cloning and comparison functionality as other
    classes we’ve seen. Why do you think this is? It has to do with how the `MmgPen`
    class is used. It is always used in a data-driven way, drawing the specified object.
    Therefore, it has almost no internal state and nothing that requires cloning.
    As such, the class has no cloning methods.


    ### Static Class Members


    The first class field for us to review, `FONT_NORMALIZE_POSITION`, is a special
    flag that when enabled alters the way fonts are rendered. If the field is set
    to `true`, then the `MmgPen` class will call the `NormalizeFontPosition` method
    for the X and Y coordinates of its position. This allows the developer to adjust
    the render position of fonts based on the type and size of the font. This comes
    in handy when you are trying to normalize the way fonts are positioned between
    different fonts on different platforms.


    The next entry, `ADV_RENDER_HINTS`, is a Boolean flag that when enabled, on the
    Java version of the game engine, forces the game engine to configure several rendering
    settings. The C# implementation has the same capabilities but doesn’t have to
    run any code. It’s ready for games out of the box. The hints provide some indication
    of how to handle certain 2D rendering events like scaling and rotating 2D images.
    The remaining static field, `TRANSPARENT`, is a convenient way to access the transparent
    color value. This can come in handy with certain games and certain drawing scenarios.


    ```

    public static Image CreateColorTile(int w, int h, MmgColor c) { ... }

    public static Image RotateImageStatic(int width, int height, Image img, int angle,
    int originX, int originY) { ... }

    public static Image ScaleImageStatic(Image img, MmgVector2 scale) { ... }

    public static Image ScaleImageStatic(Image img, double scaleX, double scaleY)
    { ... }

    Listing 2-28

    MmgPen Static Class Members 3

    ```


    The `CreateColorTile` static method uses framework classes to create an image,
    a colored square, with the specified dimensions.


    The `RotateImageStatic` method is a static method that rotates an image by the
    specified angle in degrees. The method still requires proper image dimensions
    and a rotation origin be configured. Notice that if either `originX` or `originY`
    is set to `-1`, the method calculates the origin of rotation as the center of
    the image. A copy of the original image is drawn to the new buffered image while
    applying the rotation transform.


    The first `ScaleImageStatic` method has a convenient overload that takes an `MmgVector2`
    argument to define the horizontal and vertical scaling. The second `ScaleImageStatic`
    method takes three arguments, an image and a scale value for each coordinate,
    X and Y. The new image’s dimensions are based on the scaling values passed in
    as arguments.'
