  trans: '

    ### 演示：MmgGameScreen 类


    由于 `MmgGameScreen` 类是 C# 中所有 MmgBase API 屏幕类和所有 MmgCore 屏幕类的超类（基类），我建议将 `MmgSplashScreen`、`MmgLoadingScreen`
    及其各自的演示部分作为 `MmgGameScreen` 类实际应用的可靠示例。


    ## 章节总结


    在本章中，我们完成了对 MmgBase API 游戏屏幕类的回顾。这些类代表了 MmgBase API 中功能的顶峰。这些类也代表了 MmgBase API
    中通过游戏面板类与 MmgCore API 直接交互的功能点。


    请记住，这些类与 MmgBase API 中的许多类一样，定义得比较松散。这意味着你很可能需要扩展它们的功能并调整类，使其符合你的设计目标。在这种情况下，我们看到了
    MmgCore API 的 `ScreenSplash` 和 `ScreenLoading` 类作为游戏屏幕具体实现的示例。让我们看一下我们回顾过的类的总结：


    *   **MmgSplashScreen**：一个用于表示游戏启动画面的 API 类。此类设计用于在触发结束事件前显示几秒钟的 Logo。


    *   **MmgLoadingScreen**：一个用于表示游戏加载画面的 API 类。此类定义松散，不强制规定资源加载结构。


    *   **MmgGameScreen**：一个用于表示游戏屏幕的 API 类，就像你在任何 2D 视频游戏中看到的那样。此类具有许多可以关闭以简化其渲染的功能。


    既然我们已经完成了对引擎 MmgBase API 中所有主要类的回顾，你应该开始看到游戏引擎的结构了。这些类构成了一套工具集，旨在围绕 `MmgObj` 类工作，促进
    API 中可绘制类集合的高级交互。我们已经看到，在保持直接插入游戏引擎绘制例程的能力的同时，向 API 添加新功能是多么容易。


    我应该提一下，在首次实现新的游戏屏幕时，你需要小心谨慎。请务必理解你的游戏屏幕底层类如何处理更新和绘制调用。某些屏幕类可能设计为仅在 `isDirty` 字段设置为
    true 时才更新。某些对象和屏幕要求类在每一帧都进行更新，所以要注意这一点，否则你最终会挠头不解，为什么你的对象没有动画效果。


    # 第二部分。


    # 9. MmgCore API 简介


    本书的第二部分包含对游戏引擎运行时代码的全面回顾。这些代码同时存在于 Java 和 C# 中，并包含在主项目的 MmgCore 包（如果你使用 C#，则为命名空间）下。MmgCore
    API 负责处理命令行参数、处理游戏引擎配置文件、创建游戏窗口、路由输入、管理游戏屏幕等等。


    在许多游戏引擎实现中，都有一个“播放器”设计用于运行编译后的游戏代码。在我们的实现中，运行时代码作为编译后游戏的一部分被包含在内。这是通过将游戏引擎的所有核心功能包含在
    MmgCore API 中来实现的。因此，创建的任何游戏都将包含所有运行时代码，这允许你根据需要对其进行控制和定制。最终，我认为让运行时代码更易获取并成为游戏的一部分是更好的决定。


    ## 运行时 API 概述


    在我们进行详细的代码审查之前，让我们先谈谈 MmgCore API。这个 API 在 C#/MonoGame 和 Java/Swing 实现之间存在最多的差异。尽管两个
    API 在功能上是等价的，但我想讨论一下这两个实现之间的一些主要区别。


    两个实现之间的一个主要区别是 `MainFrame` 类在 C# 实现中不存在。这是因为 Java 实现使用 Swing 来驱动游戏的窗口，并且存在一个框架（frame）的概念来容纳游戏面板。在
    C# 实现中，没有主框架，该功能已移入一个混合游戏面板类中。


    你会发现两个实现都存在等效的方法，并且相同的代码只是位于略有不同的位置。无论如何，在 C# 中跟进应该仍然非常容易。我应该提到的另一个实现差异是，在 C#
    版本中，某些操作无法在线程上执行。这是因为这些操作需要访问图形上下文，而图形上下文不是线程安全的。在 C# 版本中，使用一组旨在将工作从子线程移动到主线程的类来克服此限制。


    我想提到的下一个区别是，单元测试也需要访问图形上下文。为了克服这个限制，单元测试通过命令行参数从主游戏线程执行。测试输出被转储到标准输出。


    不同的操作系统之间，当然还有 C# 和 Java 实现之间，可能存在不同的键盘代码。为了克服这个限制，有一个全局标志可以启用键码转换方法。你可以使用此方法创建一组统一的键盘代码。该设置可以在
    `GameSettings` 类中找到，特别是 `INPUT_NORMALIZE_KEY_CODE` 字段。


    类似地，系统字体在不同的操作系统以及游戏引擎的 C# 和 Java 版本之间渲染略有不同。大多数情况下，你应该使用图像作为文本，而不是 `MmgFont`
    对象；但无论如何，有一个全局标志可以打开字体位置调整方法。此方法允许你在平台之间标准化字体定位。该标志可以在 MmgBase API 的 `MmgPen`
    类中找到，特别是 `FONT_NORMALIZE_POSITION` 字段。


    我应该提到的最后一个主要区别是字体。在 Java 中，字体可以动态调整大小，你可以根据需要创建不同大小的字体。在 C# 版本中，字体必须提前准备好。为了克服
    C# 实现中的这一差异，我们加载了从 1 号到 50 号的默认字体，并为游戏引擎设置了 50 号的最大字体大小。


    我们可以通过预加载所有可能使用的字体来模拟 Java 版本即时创建新字体的能力。通过这种方式，我们克服了两个实现之间的技术差异。在本书中，我们将主要遵循 Java
    代码，但你应该能够毫不费力地在 C# 中跟进。以下是本书这部分将涵盖的类的总结。


    ### 游戏引擎设置


    *   DatConstantsEntry


    *   DatExternalStrings


    *   GameSettings


    *   GameSettingsImporter


    ### 游戏资源加载类


    *   RunResourceLoad


    *   GenericEventHandler


    *   GenericEventMessage


    *   LoadResourceUpdateHandler


    *   LoadResourceUpdateMessage


    ### 游戏屏幕/工作线程


    *   RunFrameRate


    *   Screen


    *   ScreenMainMenu


    *   ScreenSplash


    *   ScreenLoading


    *   HandleMainMenuEvent


    ### 静态入口点/窗口类


    *   MmgApiGame


    *   MainFrame


    *   GamePanel


    完成这部分游戏引擎的回顾将让你看到全貌。你将能够在代码中准确地看到 MmgCore API 在何处将工作移交给 MmgBase API。你将获得理解如何定制游戏引擎以及配置资源目录以支持多个项目的经验。一旦你完成了本书的这一部分，你就可以开始构建一些游戏了！

    '
- fmt: '# 10. Static Main Entry Point


    Now that you’ve reviewed the lower-level `MmgBase` API and you’re adept at how
    the different classes work together to support aspects of game development, you’re
    ready to take a look at the runtime API. The runtime API, `MmgCore`, is responsible
    for setting up the game’s environment and resources. During this chapter, we’ll
    review the following classes and topics:


    - `MmgApiGame`

    - `MainFrame`

    - `GamePanel`

    - Topic: Launching a Game


    ## Static Main Entry Point: `MmgApiGame`


    The `MmgApiGame` class is the entry point into your game. This is the code that
    is executed when your game is launched. This class, included in the `MmgCore`
    API, is an example of a game’s fully configured static main entry point. This
    placeholder class won’t run an actual game, but it will perform all the resource
    and configuration loading steps that an actual game would.


    This class is designed to receive command-line arguments, set up the game’s panel
    and window, and process game engine config files. A lot of work is done in this
    part of the game’s code. We can use this class as a template for a game’s static
    main entry point. Let’s take a look at some code!


    ### Static Class Members


    The `MmgApiGame` class has some important static class fields I’ve listed in the
    following grouping. As I’ve mentioned before, everything in this class is static,
    which makes sense because it’s the static entry point. Take a look at the following
    fields before we get into the review process.


    ```

    //Windowing fields

    public static MainFrame mf;

    public static GamePanel pnlGame;

    //Frame rate fields

    public static RunFrameRate fr;

    public static Thread t;

    public static long FPS = 16l;

    //Window dimensions

    public static int WIN_WIDTH = 858;

    public static int WIN_HEIGHT = 600;

    public static int PANEL_WIDTH = 854;

    public static int PANEL_HEIGHT = 596;

    public static int GAME_WIDTH = 854;

    public static int GAME_HEIGHT = 416;

    //Arguments and config

    public static String[] ARGS = null;

    public static String ENGINE_CONFIG_FILE = "../cfg/engine_config.xml";

    ```


    *Listing 10-1* `MmgApiGame` Static Class Members 1


    The first group of fields are the windowing fields. They contain a `MainFrame`
    object and a `GamePanel` object. If you are following along with the C# code,
    you’ll notice there is only a `GamePanel` field. The C#/MonoGame implementation
    of the game engine does not have an equivalent `MainFrame` class. That functionality
    has been merged into the `GamePanel` class. The next group of fields are used
    to control the game’s frame rate.


    In the Java version of the game, a worker thread is responsible for running a
    game frame every few milliseconds, depending on the frames per second you have
    set. That is what the `fr`, `RunFrameRate`, field is used for. The C# version
    of the game engine runs on top of `MonoGame`, which is much more suited for building
    games than Java Swing, so the frame rate is controlled internally by the `MonoGame`
    library. We only have to set the desired rate, and the rest is taken care of for
    us.


    The `Thread` instance, `t`, is used in the Java implementation to run the frame
    rate worker in its own thread. The `FPS` field holds the current, desired frame
    rate. The game engine will attempt to achieve this frame rate, but it’s not possible
    in all cases. It will depend heavily on the version of the game engine you’re
    working with and the type of game you’re making and its requirements. You don’t
    want to set the frame rate so high that you cause issues with the system. So don’t
    put in a frame rate of 1000!


    When working in windowed mode and while an IDE is running, you’ll want to use
    a conservative frame rate. It will generate fewer logs, take fewer resources,
    and still give you enough to accurately test and debug your game. That being said,
    if you have some exceptional frame rate requirements, you should test your game
    with the maximum number of objects and see how fast it runs.


    The Java version of the engine should really only be used at around 30 frames
    or fewer. I develop with 18–24 FPS. For many of the games I make, I don’t need
    60 FPS at all. It’s just not that kind of game. The C#/MonoGame version of the
    engine should be able to reach 60 FPS easily. You’ll see even more improvement
    if you alter your game to run in full-screen mode. I don’t think that the Java
    version has an equivalence to full-screen mode that also gives you the efficiency
    benefit of being the only program that is active. This is because in Java you
    can only pretend to be in full-screen mode when in actuality you have just maximized
    the view port.


    The next group of fields define the dimensions. These fields describe the dimensions
    of each aspect of the game’s windowing. The window dimensions describe the outer,
    OS-driven window the game runs in. The panel dimensions control the size of the
    window’s contents. In most cases, the panel and the window should be the same
    size. Finally, the game has its own set of dimensions. These should fit inside
    the panel and window, but if they don’t, the engine will try to scale the game
    dimensions so they do.'
