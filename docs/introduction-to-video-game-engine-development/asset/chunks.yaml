- fmt: 'One of the in-game features mentioned in the game’s general specifications
    is an exit prompt. This feature can also be used to pause the game play. The fields
    listed in the preceding are used to define this feature. The first few field entries
    are used to position and draw the exit prompt. The last few entries are used to
    track mouse input and the game’s screen position.


    ```

    private MmgBmp paddleLeft;

    private MmgBmp paddleRight;

    private MmgVector2 paddle1Pos;

    private MmgVector2 paddle2Pos;

    private int paddle1MovePerFrame = GetSpeedPerFrame(400);

    private boolean paddle1MoveUp = false;

    private boolean paddle1MoveDown = false;

    private int paddle2MovePerFrame = GetSpeedPerFrame(400);

    private boolean paddle2MoveUp = false;

    private boolean paddle2MoveDown = false;

    Listing 18-6

    ScreenGame Class Fields 4

    ```


    There are a few game features that aren’t explicitly listed in the game’s general
    specifications. Some features are implicitly defined as part of the game’s description
    or in the description of other game features. The preceding fields are used to
    define the players’ paddles. Notice that there are class fields for the paddle
    images and positions. These are used to render the paddles at specific positions
    on the screen as the players move them. The next three class fields describe the
    movement of paddle 1. Similarly, the remaining fields are used to describe the
    movement of paddle 2.


    I’d like to take a moment to talk about the paddle 1 and 2 move-per-frame class
    fields. Notice that the value of the fields is the result of a static method call,
    `GetSpeedPerFrame`, that calculates how much the paddle moves on any given frame.
    This technique is important because it ensures that the paddle movement is locked
    to the frame rate. This means the game will run at just about the same speed even
    if the game’s frame rate changes. This is a very important detail you should keep
    in mind when working with movement in your games.


    ```

    private MmgSound bounceNorm;

    private MmgSound bounceSuper;

    private MmgBmp bground;

    private MmgBmp ball;

    private MmgVector2 ballPos;

    private int ballMovePerFrameMin = GetSpeedPerFrame(150);

    private int ballMovePerFrameMax = GetSpeedPerFrame(425);

    private int ballDirX = 1;

    private int ballDirY = 1;

    private int ballMovePerFrameX = 0;

    private int ballMovePerFrameY = 0;

    private Random rand;

    private int ballNewX;

    private int ballNewY;

    private boolean bounced = false;

    private boolean infiniteBounce = false;

    Listing 18-7

    ScreenGame Class Fields 5

    ```


    The block of class fields listed in the preceding are fields that manage how the
    ball moves on the game board and in response to bouncing off of a player’s paddle
    or the game screen walls. The first two fields listed are used to play a sound
    when the ball bounces. A different sound is played depending on the ball’s speed.
    The next two fields, `bground` and `ball`, are the images drawn during game play
    for those game features.


    The `ballPos` field is an `MmgVector2` object that represents the position of
    the ball. The following two entries, `ballMovePerFrameMin` and `ballMovePerFrameMax`,
    are set up similarly to the paddle’s movement fields. Note that they’re also locked
    to the game’s frame rate. The `ballDirX` and `ballDirY` fields are used to track
    the ball’s direction of movement. We need to have class fields that keep track
    of what the ball’s current speed is; `ballMovePerFrameX` and `ballMovePerFrameY`
    take care of that for us.


    The `rand` field is used to generate any random values we need in the game. For
    instance, the `rand` field is used to generate the ball’s initial direction of
    movement. The last four entries are used to calculate the ball’s next position
    and if it bounced or not. Lastly, the `infiniteBounce` field is used to allow
    the ball to bounce around the screen indefinitely. This is a great tool for debugging
    the game’s physics.


    ```

    private int scoreGameWin = 7;

    private MmgFont scoreLeft;

    private int scorePlayerLeft = 0;

    private MmgFont scoreRight;

    private int scorePlayerRight = 0;

    private int aiMaxSpeed = 425;

    Listing 18-8

    ScreenGame Class Fields 6

    ```


    We’re almost done working through the class’ fields. We have only two sets of
    fields left to add to our class and a few more game specifications that have to
    be addressed. We’ll need a way to keep track of the player’s score for one thing.
    The fields listed in the preceding will track the player’s scores as integer values,
    `scorePlayerLeft` and `scorePlayerRight`, and the string representation of the
    scores is handled by the `scoreLeft` and `scoreRight` fields. The preceding last
    entry, `aiMaxSpeed`, is used to regulate the maximum speed of the AI player’s
    paddle.


    ```

    private MmgFont exit;

    private MmgBmp exitBground;

    private MmgFont txtGoal;

    private MmgFont txtDirecP1;

    private MmgFont txtDirecP2;

    private MmgFont txtGameOver1;

    private MmgFont txtGameOver2;

    private int padding = MmgHelper.ScaleValue(4);

    Listing 18-9

    ScreenGame Class Fields 7

    ```


    The last set of class fields for us to look at are listed in the preceding. The
    `exit` and `exitBground` fields are used to display the exit prompt. The next
    few fields, `txtGoal`, `txtDirectP1`, `txtDirectP2`, `txtGameOver1`, and `txtGameOver2`,
    are used to present information in the game start and game end sub-screens. The
    game’s rules are displayed on the game start sub-screen, while the game’s results
    are reported on the game over sub-screen.


    That completes all the class fields we’ll need for this game screen. Make sure
    to carefully add them to your `ScreenGame` class. Address any errors that pop
    up. Once everything’s settled and error-free, make sure all your work is saved.
    Note that there may be errors that you can’t address until you implement more
    of the game class’ code. Don’t worry about these. Take care of any syntax errors
    and other errors you can address.'
