- fmt: '# PongClone: ScreenGame Support Methods


    We’re going to outline the class methods next. It’s good practice to try and plan
    out your class’ functionality before you actually sit down to code. This is something
    most people don’t do; and to be honest, the experienced coders out there actually
    do this almost subconsciously, but they still do it. I use pen and paper sometimes
    with more complex classes or vague ideas I’m trying to bring to code.


    ```

