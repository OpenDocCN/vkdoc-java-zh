- fmt: '### Static Class Member


    There is one static class field I’d like to discuss quickly. The `INITIAL_SIZE`
    static class field is used to control the initial sizing of the `MmgContainer`’s
    internal data structure. If your game requires having containers with lots of
    objects, you may want to increase the value of this field.


    ### Enumerations


    The `MmgContainer` class has two important enumerations we need to cover. First
    is the `ChildAction` enumeration. This enumeration is used to define the type
    of action performed on the set of child objects. It has two values, `STAMP` and
    `UNSTAMP`, and is used to tell the `UpdateAllChildren` method how to process the
    child objects. Stamping a child object marks this container as the parent and
    sets the `hasParent` field to true. Unstamping a child reverses this and clears
    parent membership, setting `hasParent` to false.


    The second enumeration that is important to the class is the `RenderMode` enumeration.
    This enumeration controls how the class renders itself. It has two values, `RENDER_ALWAYS`
    and `RENDER_ONLY_WHEN_DIRTY`. If the render mode is set to always, then the container
    class will always call the update method of its child objects. If the mode is
    set to render only when dirty, the container will only update its child objects
    if the class field `isDirty` is set to true.


    ### Class Fields


    There are only two pertinent class fields that we should discuss.


    ```

    private ArrayList container;

    private boolean isDirty;

    private RenderMode mode = RenderMode.RENDER_ALWAYS;

    Listing 5-6

    MmgContainer Class Fields 1

    ```


    The first field is the class’ internal data structure. This is where all the child
    objects are stored. Notice the container is designed to take `MmgObj` instances.
    This includes all classes that extend the `MmgObj` class. The next field, `isDirty`,
    is an important one. If this field is true, then the container is marked as being
    dirty. In this case, on the next update call, the class will update each of its
    children. It’s important to control this field.


    Only allowing the children to update when something has changed will make your
    game more efficient. In the case where a child object is constantly changing,
    the `isDirty` field will need to be set to false to force the child objects to
    receive an update call from the game engine’s drawing routine. Remember the game
    engine drawing routine starts in the game panel class that the current game screen
    plugs into.


    This causes the game screen to receive update and draw method calls, which in
    turn means its child objects receive update and draw method calls. In the case
    where a child object is a container, this process repeats one more time for all
    the container’s child objects. The preceding last entry is the `mode` field. This
    field controls whether the container automatically updates all its child objects
    every update call or only when the `isDirty` flag is set to true.


    ### Support Method Details


    Let’s take a look at the `MmgContainer` class’ support methods. These methods
    allow us to access and manage the class’ child objects.


    ```

    //Add objects

    public void Add(MmgObj obj) { ... }

    public void AddAt(int idx, MmgObj obj) { ... }

    //Remove Objects

    public void Remove(MmgObj obj) { ... }

    public MmgObj RemoveAt(int idx) { ... }

    //Access objects

    public int GetCount() { ... }

    public MmgObj[] GetArray() { ... }

    public MmgObj GetAt(int idx) { ... }

    public MmgObj GetChildAt(int idx) { ... }

    public MmgVector2 GetChildPosAbsolute(int idx) { ... }

    public MmgVector2 GetChildPosRelative(int idx) { ... }

    //Clean array of objects

    public void Clear() { ... }

    public void Reset() { ... }

    Listing 5-7

    MmgContainer Support Method Details 1

    ```


    The first set of methods listed in the preceding provide management capabilities
    to the `MmgContainer` class. The first two methods allow you to add a new object
    to the container. You can add the object to the end of the current list of objects
    or insert the object into a specific position in the list of objects. The next
    two methods allow you to remove objects from the container.


    In the “Access objects” section of the main methods listed in the preceding group,
    you have methods that allow you to get the total count of child objects, `GetCount`.
    The `GetArray` method returns an array representation of the child objects. The
    `GetAt` and `GetChildAt` methods are overloaded and provide the same functionality,
    returning a child object, at the specified index, from the container. The next
    two methods `GetChildPosAbsolute` and `GetChildPosRelative` are used to return
    child objects from the container and adjust their positioning to be relative to
    the container or relative to the game panel.


    Lastly, we have two methods that are used to reset the container’s contents. The
    two methods perform similar tasks, but there are some subtle differences between
    them. The `Clear` method unstamps all child objects before clearing the container’s
    contents. The `Reset` method is similar, but it doesn’t unstamp its child objects
    and it doesn’t clear the current container; it instantiates a new data structure.
    These are subtle but important differences you should keep in mind when using
    this class.


    ```

    public ArrayList GetContainer() { ... }

    public void SetContainer(ArrayList aTmp) { ... }

    public void SetIsDirty(boolean b) { ... }

    public boolean GetIsDirty() { ... }

    public void SetMode(RenderMode m) { ... }

    public RenderMode GetMode() { ... }

    Listing 5-8

    MmgContainer Support Method Details 2

    ```


    The second set of support methods for us to review are just standard get and set
    methods for the class’ fields. Be mindful when adjusting fields if the object
    is being used by the game engine’s drawing routine. You can end up with exceptions
    or unexpected screen rendering if you aren’t careful.


    ### Main Method Details


    The main methods we have to review consist of constructors, child-parent association,
    and update and draw methods.


    ```

    //Constructors

    public MmgContainer() { ... }

    public MmgContainer(MmgContainer obj) { ... }

    public MmgContainer(ArrayList objects) { ... }

    //Parent-Child association

    private void StampChild(MmgObj obj) { ... }

    private void UnstampChild(MmgObj obj) { ... }

    private void UpdateAllChildren(ChildAction act) { ... }

    //Drawing routine

    public void MmgDraw(MmgPen p) { ... }

    public boolean MmgUpdate(int updateTicks, long currentTimeMs, long msSinceLastFrame)
    { ... }

    Listing 5-9

    MmgContainer Main Method Details 1

    ```


    The first set of main methods for us to review are the class’ constructors. The
    first constructor creates a new empty `MmgContainer` object with the container
    data structure set to the default initial size. The second constructor listed
    is a specialized constructor used in the class’ cloning functionality. It creates
    a new container object from an existing one. It will also make a clone of all
    of its child objects as part of the cloning process.


    The last constructor listed takes a data structure of child objects used to initialize
    its contents. Note that this constructor doesn’t stamp the child objects. Managing
    parent/child relationships is going to be your responsibility. The game engine
    doesn’t enforce any default behavior in this regard.


    The next three methods are used to manage the parent/child relationship of the
    container and its children. The `StampChild` and `UnstampChild` methods are used
    to set the child object’s parent as the container or to remove that association.
    The `UpdateAllChildren` method takes a `ChildAction` instance as an argument and
    will run the `StampChild` or `UnstampChild` method for each child object. That
    brings us to the end of the main method review. Up next, we’ll take a look at
    some example code demonstrating how to use the `MmgContainer` class.'
