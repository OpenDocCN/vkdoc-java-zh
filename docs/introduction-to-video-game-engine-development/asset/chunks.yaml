    The next set of static helper methods we’ll review deal mostly with loading resources
    from the image or sound resource cache. The first method in the list, `GetBasicCachedBmp`,
    takes a string argument with the path to the image resource and a string argument
    that represents the key for the associated image data. If the `imgId` exists,
    then the image associated with that entry is retrieved from the cache and returned.


    If no entry can be found in the image cache, the image is loaded from the file
    using the `GetBasicBmp` method. The resulting image is added to the image cache
    using the provided `imgId` as the key. Note that if image caching is turned off,
    the image is loaded from the file every time the method is called. Obviously,
    enabling caching makes resource loading much more efficient.'
