    ## Widget Classes: MmgMenuItem


    The `MmgMenuItem` class is used by the `MmgMenuContainer` class as the menu items
    that are displayed by the container. The `MmgMenuItem` class has support for different
    states, normal, selected, and inactive. The class also has support for playing
    a sound when the menu item is the currently selected item.


