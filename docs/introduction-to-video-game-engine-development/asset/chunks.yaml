    ## Chapter Conclusion


    在本章中，我们深入探讨了MmgCore API的事件和事件处理器。我们学习了`ScreenSplash`类如何使用通用事件与`GamePanel`类通信，告知其切换屏幕的时机。我们在`ScreenLoading`类中看到了类似的实现，它使用自己的资源加载完成通用事件。


    我们还了解了如何使用加载资源消息事件向`ScreenLoading`类发送关于游戏资源加载进度的信息，以及游戏屏幕如何触发自己的事件来告知`GamePanel`加载过程已完成并切换到主菜单状态。


    这些事件和事件处理器的细节非常重要。您应该了解默认游戏屏幕是如何连接到`GamePanel`的，并且理解可供您使用的不同类型的事件系统。让我们看一下本章涵盖的MmgCore
    API类的总结：


    *   `GenericEventMessage`：一个MmgCore API类，用于表示与游戏状态关联的通用事件。该类为API提供通用事件支持。

    *   `GenericEventHandler`：一个MmgCore API接口，实现该接口以支持接收来自已注册源的通用事件。该接口为API提供通用事件处理支持。

    *   `LoadResourceUpdateMessage`：一个MmgCore API消息，用于向已注册的事件处理器发送关于资源加载过程的信息。该类为API提供资源加载事件消息支持。

    *   `LoadResourceUpdateHandler`：一个MmgCore API接口，实现该接口以支持接收加载资源更新事件。该接口为API提供加载资源更新事件处理支持。

    *   `HandleMainMenuEvent`：一个MmgCore API类，用于支持菜单系统事件。这些事件在菜单项被选中时由菜单系统触发。事件由类处理而非接口。该类为API提供基本的菜单支持。


    在本章审查的类中，有一些非常微妙但重要的点。其中一个收获是您可以使用事件来促进游戏屏幕之间以及游戏屏幕与游戏面板之间的通信。使用本章概述的事件系统和不同技术，您将能够创建自己的事件来管理游戏状态——这是任何游戏的关键方面。


    另一个主要收获，我想说的是，习惯使用事件和事件处理器。您会一次又一次地遇到事件，从一个游戏引擎到另一个游戏引擎，因此在您自己的游戏中积累使用它们的经验是很好的。此外，您将获得宝贵的经验，学习何时使用事件。您的游戏中不应该有太多事件。事件保留用于跨类通信，即用户操作要求游戏屏幕请求游戏面板为其执行某些操作。遵循这个一般经验法则，但要意识到总有例外。


    # 13. Resource Loading


    资源加载和访问是任何游戏引擎最重要的方面之一。没有图像很难制作2D游戏。在本章中，我们将详细讨论游戏引擎用于加载资源的运行时代码。您将看到如何显式地、全局地或通过特定于游戏的资源文件夹访问声音和图像。


    在接下来的章节中，我们将回顾资源加载过程以及用于加载资源以供游戏屏幕使用的确切代码。在本章中，我们将审查以下类和主题：


    *   `RunResourceLoad`

    *   主题：访问显式资源

    *   主题：访问自动加载资源

    *   主题：访问游戏特定资源


    ## Resource Loading: RunResourceLoad


    `RunResourceLoad`类设计为在其自己的线程中运行，用于将游戏资源（如声音和图像）加载到游戏引擎的资源缓存中。资源缓存由MmgBase API的`MmgMediaTracker`类管理。在开始类审查之前，让我们看一下`RunResourceLoad`类的Java和C#类定义。


