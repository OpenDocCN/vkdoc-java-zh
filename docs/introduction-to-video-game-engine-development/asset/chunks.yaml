    ```


    The last remaining methods to review are the `ApiEquals` method and the class’
    drawing method, `MmgDraw`. The `ApiEquals` method compares certain class properties
    of two class instances and makes a determination about the equality of those class
    instances. The last main method left to review is the `MmgDraw` method. We’ve
    seen this method before; it’s used by the `MmgPen` class as part of the underlying
    drawing routine. Note that the drawing mode controls which `MmgPen` drawing method
    is used. The reason for this functionality is efficiency. If we want to draw a
    simple `MmgBmp` instance, then we don’t want to worry about configuring the scaling,
    rotation, and origin fields.


    In this case, we would set the drawing mode to `DRAW_BMP_BASIC`. This will force
    efficient, simple, `MmgBmp` rendering. For more complex drawing that requires
    rotation, scaling, or source and destination rectangles, use the `DRAW_MODE_FULL`
    setting. The `DRAW_BMP_BASIC_CACHE` setting should be avoided unless you are an
    advanced user.


