- fmt: '### Static Class Members


    The `GameSettings` class is essentially a bank of static fields. There are a number
    of default fields used by the game engine that we’ll review next.


    ```

    //Game engine options

    public static boolean INPUT_NORMALIZE_KEY_CODE = false;

    public static String TARGET_GAME_SETTINGS_XML_VERSION = "1.0";

    public static boolean LOAD_NATIVE_LIBRARIES = false;

    public static boolean RUN_OS_SPECIFIC_CODE = true;

    public static boolean DEVELOPMENT_MODE_ON = true;

    //Game engine paths

    public static String IMAGE_LOAD_DIR = "../cfg/drawable/";

    public static String SOUND_LOAD_DIR = "../cfg/playable/";

    public static String PROGRAM_IMAGE_LOAD_DIR = "../cfg/drawable/";

    public static String PROGRAM_SOUND_LOAD_DIR = "../cfg/playable/";

    public static String AUTO_IMAGE_LOAD_DIR = "../cfg/drawable/auto_load/";

    public static String AUTO_SOUND_LOAD_DIR = "../cfg/playable/auto_load/";

    public static String CLASS_CONFIG_DIR = "../cfg/class_config/";

    //Game and developer information

    public static String NAME = "Unknown";

    public static String VERSION = "0.0.0";

    public static String DEVELOPER_COMPANY = "Unknown";

    public static String TITLE = "Unknown";

    Listing 11-13

    GameSettings Static Class Members 1

    ```


    Remember, any one of the `GameSettings` class’ static fields can be set at runtime
    using a game engine config file. The first entry, `INPUT_NORMALIZE_KEY_CODE`,
    turns on support for normalizing keyboard input codes. Enabling this will pipe
    all keyboard input through a normalization method where you can add support to
    adjust the keyboard input codes. The built-in normalization call is the `NormalizeKeyCode`
    method of the `MmgHelper` class from the MmgBase API.


    The next two fields, `LOAD_NATIVE_LIBRARIES` and `RUN_OS_SPECIFIC_CODE`, are used
    in the game’s static main class as part of the startup process. If the `LOAD_NATIVE_LIBRARIES`
    option is enabled, the engine will attempt to load gamepad drivers for the current
    operating system.


    I should mention that there’s no need to load gamepad drivers in the C# version
    of the engine. The C# implementation has gamepad support built in. Similarly,
    the `RUN_OS_SPECIFIC_CODE` field, if enabled, will turn on OS-specific code execution
    in the static main class. You have to add some code to run of course, but it will
    now be enabled in the engine. The development mode field is used to turn on developer
    and version information in the game window’s title if enabled.


    The next block of fields are the game engine’s resource paths. The engine will
    be configured to look in the default location, based on the version of the engine,
    for resources. Look over them and make sure you understand what the paths are
    used for. The last set of fields provides information about the developer and
    version of the game. Make sure that the `NAME` field matches the name of the game-specific
    resource folders. The engine won’t be able to find the folders otherwise.


    By default, there are a number of input definitions in the `GameSettings` class.
    The next set of fields we’ll look at define the dpad input IDs for the keyboard.
    There are also definitions for dpad input for other devices like GPIO and USB
    gamepads. These are the ID values that are passed along to the game screen when
    a device’s dpad input is activated.


    ```

    public static int SRC_KEYBOARD = 0;

    public static int DOWN_KEYBOARD = 0;

    public static int UP_KEYBOARD = 1;

    public static int LEFT_KEYBOARD = 2;

    public static int RIGHT_KEYBOARD = 3;

    Listing 11-14

    GameSettings Static Class Members 2

    ```


    These fields provide unique identifiers for dpad input coming from the keyboard.
    Along with the dpad input definitions, there are also default values for processing
    other GPIO and USB gamepad input. Look over these fields and think about how they
    might be used. We won’t cover gamepad input here, but it’s good to have some idea
    about how it works.


    ### Demonstration: GameSettings Class


    The `GameSettings` class is ubiquitous throughout the MmgCore API. The following
    snippet of example code is from the `GamePanel` class’ input registration found
    in the class constructor. Recall that the `GamePanel` is responsible for managing
    game screens and input among other things.


    ```

    1 if(GameSettings.INPUT_NORMALIZE_KEY_CODE) {

    2     ProcessKeyClick(e.getKeyChar(), MmgHelper.NormalizeKeyCode(e.getKeyChar(),
    e.getKeyCode(), e.getExtendedKeyCode(), "java"));

    3 } else {

    4     ProcessKeyClick(e.getKeyChar(), e.getExtendedKeyCode());

    5 }

    Listing 11-15

    GameSettings Class Demonstration 1

    ```


    The demonstration code listed in the preceding snippet shows us how the `GameSettings`
    class is used throughout the API to enable certain features. In this case, we’re
    looking at the keyboard code normalization feature. If this setting is enabled,
    the `ProcessKeyClick` method is called with filtered key codes, line 2. If the
    option is not enabled, the normal input processing is used, line 4.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgCore API’s dynamic settings capabilities.
    Let’s take a step back for a moment and try to look at the big picture. In the
    MmgBase API, we encountered very structured classes that were designed for interoperability.
    They supported features like cloning and comparison.


    In the MmgCore API, we’re encountering classes of a different nature. These classes
    are very specialized in nature, and as such there really isn’t much use for functionality
    like cloning and comparison. This is because very often there is only one instance
    of the class being used. What we’re seeing is that the MmgBase API benefits from
    being a generally defined API without much direct functionality expressed. On
    the other hand, the MmgCore API benefits from being a specifically defined API
    with much direct functionality expressed like windowing, resource loading, dynamic
    settings, and so on.


    The functionality we’ve covered here is the engine’s ability to provide settings
    data to the game. We’ve seen that you can provide command-line arguments that
    drive some of the game’s settings like dimensions and frame rate. We’ve seen that
    you can specify a game engine config file either as a default or a dynamic option
    provided as a command-line argument. Lastly, we’ve seen the ability to manage
    game strings through the use of the `DatExternalStrings` class, and we’ve looked
    at the engine’s central settings class, `GameSettings`. Let’s summarize the classes
    we’ve reviewed in this chapter:


    *   `DatConstantsEntry`: An API class designed to model one row of data in a game
    engine config XML file.

    *   `GameSettingsImporter`: An API class used to parse and load a game engine
    config XML file.

    *   `DatExternalStrings`: An API class used to load and store strings based on
    a language code. Provides centralized string management for the API.

    *   `GameSettings`: The game engine’s central settings class. This is where all
    the default game settings and options are stored. You can also use this class
    to store your own game-specific settings.


    The ability to data drive aspects of your game is a powerful one. This is a feature
    that you’ll see in other game engines and is integral to game development. Data-driven
    settings are used all the time to configure input, network connections, game variables,
    and more. It takes experience to know when certain values in your game should
    be driven by config files. Don’t worry. You’ll get that experience and more building
    games with this engine, and you can take that knowledge and apply it to the next
    set of tools you’ll use in your game development journey.'
