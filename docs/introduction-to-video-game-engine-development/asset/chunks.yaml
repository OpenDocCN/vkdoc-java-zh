- fmt: '### Demonstration: `MmgColor` Class


    In this demonstration of the `MmgColor` class, we’ll use the `ScreenTestMmgColor`
    screen as the basis of our example. You can find this class in the `MmgTestSpace`
    package, or namespace if you are following along in C#. Due to the repetition
    of code in the `LoadResources` method, I’ll only list the pertinent lines in the
    following code block.


    ```

    01 public void LoadResources() {

    02     MmgHelper.wr("ScreenTestMmgColor.LoadResources");

    03     pause = true;

    04     SetHeight(MmgScreenData.GetGameHeight());

    05     SetWidth(MmgScreenData.GetGameWidth());

    06     SetPosition(MmgScreenData.GetPosition());


    08     title = MmgFontData.CreateDefaultBoldMmgFontLg();

    09     title.SetText("");

    10     MmgHelper.CenterHorAndTop(title);

    11     title.SetY(title.GetY() + MmgHelper.ScaleValue(30));

    12     AddObj(title);


    14     int yDiff = MmgHelper.ScaleValue(40);

    15     int yStrt = GetY() + MmgHelper.ScaleValue(140);

    16     int xLeft = MmgHelper.ScaleValue(200);

    17     int i = 0;


    19     color1Label = MmgFontData.CreateDefaultBoldMmgFontLg();

    20     color1Label.SetMmgColor(MmgColor.GetBlueGray());

    21     color1Label.SetText("Color: BlueGray");

    22     color1Label.SetX(xLeft);

    23     color1Label.SetY(yStrt + (yDiff * i));

    24     AddObj(color1Label);

    25     i++;

    Listing 2-9

    MmgColor Class Demonstration 1

    ```


    The `LoadResources` method starts off in much the same way as the previous example
    game screen. A debug line is printed indicating which screen is loading resources,
    the `pause` flag is set to true, and the screen’s dimensions and position are
    set based on values from the `MmgScreenData` class. You’ll notice that all `LoadResources`
    methods in the example application are structured the same way and include very
    similar lines of code.


    This is a good coding habit. Similar code is easier to read and understand. If
    you direct your attention to lines 8–12 in the code block listed in the preceding,
    you’ll see standard `title` initialization code, customized for this particular
    screen, but similar to all example game screens. Notice that the `title` object
    is added to the screen using the `AddObj` method. If you look at the code on lines
    14–17, you’ll see the initialization of the positioning variables. Note that any
    literal numeric values are passed through the `ScaleValue` method. This ensures
    positioning values will scale with the screen.


    Because all of the `MmgColor` examples are very similar, we’ll only review one
    block of code, starting on line 19. We set the font using the `MmgFontData` class,
    which handles scaling the font based on the current screen scaling. On line 20,
    the actual example of setting the font’s color can be seen. In this case, we’re
    using the static helper method of the `MmgColor` class, the `GetBlueGray` method
    specifically.


    The font entry will be drawn on the screen using this color. On line 21, we set
    the label font’s text to the name of the color used. The positioning of the font
    entry is calculated based on the local variables we mentioned earlier. Line 24
    is necessary to add the font to the game screen’s list of drawable objects; and
    lastly, we increment a local variable, `i`, so the next font entry is drawn just
    below the current one. Be sure to check out this example game screen using the
    example application provided.


    ## Base Classes: `MmgRect`


    The `MmgRect` class is used to represent a simple rectangle in the MmgBase API.
    The rectangle class can be drawn to the screen to show size and position, it can
    be used in calculations like collision detection, and it can be used as a UI element
    such as a border or divider.


    ### Static Class Members


    The `MmgRect` class has one static class member, the `GetUnitRect` method. The
    `GetUnitRect` method is a convenient way to create a standardized `MmgRect` instance.
    The method creates a new `MmgRect` instance positioned at 0,0 and with dimensions
    both equal to 1.


    ### Class Fields


    The `MmgRect` class has only one class field we need to cover. The `rect` field
    is an instance of the framework’s rectangle class. The `MmgRect` class wraps this
    framework and provides standardized rectangle support to the API.


    ### Support Method Details


    The first set of support methods to review are as follows.


    ```

    public int GetLeft () { ... }

    public int GetTop() { ... }

    public int GetRight() { return ( ... }

    public int GetBottom() { ... }

    public int GetWidth() { ... }

    public void SetWidth(int w){ ... }

    public int GetHeight() { ... }

    public void SetHeight(int h){ ... }

    public Rectangle GetRect() { ... }

    public void SetRect(Rectangle r) { ... }

    Listing 2-10

    MmgRect Support Method Details 1

    ```


    The methods listed in the preceding are get and set methods that allow access
    to their associated class fields. The last two methods in the set allow access
    to the framework’s rectangle class. While we want to limit interaction with the
    framework classes as much as possible by keeping them centralized and encapsulated
    within classes, we can’t ignore that we are using them and do need to access them
    from time to time. With this in mind, you’ll notice that we provide access to
    framework classes where it makes sense.'
