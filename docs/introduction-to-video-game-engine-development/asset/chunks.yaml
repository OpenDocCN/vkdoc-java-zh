- fmt: '### Static Class Members


    There are only two static class members for us to review. I’ll list them here.


    ```

    public static String NEW_LINE = "[b]";

    public static boolean SHOW_CONTROL_BGROUND_STORY_BOUNDING_BOX = false;

    Listing 6-7

    MmgTextBlock Static Class Members 1

    ```


    The first field is the `NEW_LINE` string. This field holds the string encoding
    used to mark a new line in the class’ source text. The second static class field
    is a Boolean flag that indicates if a bounding box should be drawn around the
    `MmgTextBlock` object. Using this Boolean can really help when positioning your
    text block.


    ### Class Fields


    The first set of fields to review are listed in the following. These fields control
    aspects of the text rendering.


    ```

    private int STARTING_LINE_COUNT = 20;

    private int STARTING_TXT_COUNT = 100;

    private MmgColor cl;

    private int height;

    private int lineHeight;

    Listing 6-8

    MmgTextBlock Class Fields 1

    ```


    The first two fields are private and are used to initialize the arrays used to
    store lines of words, as well as for storing the words themselves. The `MmgColor`
    field, `cl`, is used to color the text in the text block. The next two fields
    track the text block’s height and the line height for the current `MmgFont`.


    ```

    private ArrayList lines;

    private int paddingY;

    private int paddingX;

    private int pages;

    private Font paint;

    private ArrayList txt;

    private int width;

    private int words;

    Listing 6-9

    MmgTextBlock Class Fields 2

    ```


    The second set of class fields to review are listed in the preceding group. The
    first is an `ArrayList`, or a `List` if you’re following along in C#. The lines
    represented are the available preformatted lines of text that fit in the current
    text block. Think of these as a pool of lines that can be displayed. Each page
    in a series has the same available lines to fill with text. The next two class
    fields, `paddingX` and `paddingY`, are for fine-tuning the positioning. The `pages`
    field holds the number of pages it takes to display the parsed text.


    The `Font` object `paint` is used in rendering text in the text block. The next
    class field is also an `ArrayList` of type `MmgFont` objects. This data structure
    is filled up with available lines of text from the `lines` class field. Lastly,
    we have the `width` of the text block and the number of words that were found
    when parsing the provided text.


    ### Support Method Details


    The `MmgTextBlock` class has a laundry list of support methods. I’ve listed them
    in the following set. I’ve broken down the methods into four groups. Take a look
    at each group before we move on to talk about each method.


    ```

    //Font control methods

    public MmgColor GetColor() { ... }

    public void SetColor(MmgColor Cl) { ... }

    public Font GetSpriteFont() { ... }

    public void SetSpriteFont(Font p) { ... }

    public int GetLineHeight() { ... }

    public void SetLineHeight(int l) { ... }

    //Text block drawing methods

    public int GetHeight() { ... }

    public void SetHeight(int h) { ... }

    public int GetWidth() { ... }

    public void SetWidth(int w) { ... }

    public int GetPaddingX() { ... }

    public void SetPaddingX(int p) { ... }

    public int GetPaddingY() { ... }

    public void SetPaddingY(int p) { ... }

    //Text block statistics methods

    public int GetLineCount() { ... }

    public int GetPageCount() { ... }

    public int GetUsedLineCount() { ... }

    public int GetLinesInBox() { ... }

    public int GetPages() { ... }

    public void SetPages(int p) { ... }

    public int GetWordCount() { ... }

    public void SetWordCount(int i) { ... }

    //Text block data methods

    public ArrayList GetLines() { ... }

    public void SetLines(ArrayList a) { ... }

    public ArrayList GetTxt() { ... }

    public void SetTxt(ArrayList a) { ... }

    public MmgFont GetText(int i) { ... }

    public void SetText(int i, MmgFont f) { ... }

    Listing 6-10

    MmgTextBlock Support Method Details 1

    ```


    The first group of methods let you control how the font is drawn in the text block.
    You can access the color and the framework font class used to create the `MmgFont`
    objects the class uses to draw the text. The last two methods let you control
    the line height. This field is used to space out the lines in the text block.


    The second group of methods control how the text block is drawn: the position
    of the objects, the dimensions it uses to format the text, and the padding values
    used to fine-tune how the text is displayed inside the text block. The third group
    of methods provide statistics about the text that was parsed and the way the text
    is formatted inside the text block.


    The `GetLineCount` method returns the number of lines that fit inside the text
    block. The `GetPageCount` method returns the number of pages the text takes up
    when displayed using the current text block dimensions and calculated number of
    lines. The `GetUsedLineCount` method returns the number of lines used to display
    text on the current page. The `GetLinesInBox` method may seem redundant, but it’s
    the lower-level method used to calculate the number of lines in the box.


    The next two methods give you access to the `pages` field, and the final two methods
    give you access to the number of words parsed from the provided text. The last
    group of methods lets you get and set the data that is generated by the class.
    These methods are self-explanatory and seldom used, so I won’t go into great detail
    over them here. Read through them and make sure you understand them.


    ```

    //Constructors

    public MmgTextBlock() { ... }

    public MmgTextBlock(MmgTextBlock obj) { ... }

    //Cloning methods

    public MmgObj Clone() { ... }

    public MmgTextBlock CloneTyped() { ... }

    //Text preparation methods

    public void PrepLinesInBox(int len) { ... }

    public void PrepLinesInBox() { ... }

    public void PrepPage(int page) { ... }

    public void PrepTextSplit(String text, Font typeFace, int fontSize, int width,
    FontType fontType) { ... }

    //Data reset method

    public void Reset() { ... }

    //Drawing and comparison methods

    public void MmgDraw(MmgPen p) { ... }

    public boolean ApiEquals(MmgTextBlock obj) { ... }

    Listing 6-11

    MmgTextBlock Main Method Details 1

    ```


    The first group of main methods we’ll look at are the class’ constructors. The
    first constructor takes no arguments and puts the class in a state that is ready
    to be configured but not quite ready to be drawn to the screen. Due to the complexity
    of this class, you’ll have to run some preparation methods by hand. The second
    constructor is the specialized constructor we know and love. It powers the class’
    cloning functionality.


    The second group of main methods are the cloning methods. We’ve covered these
    enough times that I think we can safely move past them. Read over them on your
    own and make sure you understand them. Third, the text preparation methods are
    by far the most important in the class. They prepare the provided text for display
    and control what page of text is displayed in the case of a multi-page text block.


    The `PrepLinesInBox` methods will reset the entries in the `txt` data structure.
    Remember that data structure is used to hold the available lines of text that
    can be displayed. The `PrepPage` method loads up the `txt` data structure with
    the next set of available preformatted lines. This is what constitutes a page
    in terms of the text block. If there are more lines to display, then the next
    page can be loaded into view.


    The `Reset` method clears the class’ data structures, and the remaining methods
    are game engine methods that we’ve seen before, so I won’t go over them again
    here.'
