    在构建 PongClone 游戏时，请记住这一点。你随时可以打开相关游戏引擎项目中的本章项目，并检查类头部。接下来，我们将查看`ScreenGame`类的字段。花点时间向你的项目添加一个新类，并输入前面列出的类头部。请务必将类和相应的文件命名为“ScreenGame”，如示例所示。


    ```

    private enum NumberState {

