    # 10. 静态主入口点


    现在你已经了解了底层的 MmgBase API，并熟练掌握了不同类如何协同工作以支持游戏开发的各个方面，接下来可以开始学习运行时 API 了。运行时 API（MmgCore）负责设置游戏的环境和资源。在本章中，我们将介绍以下类和主题：


    *   MmgApiGame

    *   MainFrame

    *   GamePanel

    *   主题：启动游戏


    ## 静态主入口点：MmgApiGame


    `MmgApiGame` 类是游戏的入口点。这是游戏启动时执行的代码。该类包含在 MmgCore API 中，是一个完全配置好的游戏静态主入口点示例。这个占位类不会运行实际的游戏，但会执行实际游戏所需的所有资源和配置加载步骤。


    该类设计用于接收命令行参数、设置游戏面板和窗口，以及处理游戏引擎配置文件。游戏代码的这一部分做了大量工作。我们可以将此类用作游戏静态主入口点的模板。让我们来看一些代码！


    ### 静态类成员


    `MmgApiGame` 类有一些重要的静态类字段，我在下面的分组中列出。正如我之前提到的，这个类中的所有内容都是静态的，这很合理，因为它是静态入口点。在开始审查过程之前，先看看以下字段。


    ```

    //窗口字段

    public static MainFrame mf;

    public static GamePanel pnlGame;

    //帧率字段

    public static RunFrameRate fr;

    public static Thread t;

    public static long FPS = 16l;

    //窗口尺寸

    public static int WIN_WIDTH = 858;

    public static int WIN_HEIGHT = 600;

    public static int PANEL_WIDTH = 854;

    public static int PANEL_HEIGHT = 596;

    public static int GAME_WIDTH = 854;

    public static int GAME_HEIGHT = 416;

    //参数和配置

    public static String[] ARGS = null;

    public static String ENGINE_CONFIG_FILE = "../cfg/engine_config.xml";

    列表 10-1

    MmgApiGame 静态类成员 1

    ```


    第一组字段是窗口字段。它们包含一个 `MainFrame` 对象和一个 `GamePanel` 对象。如果你在跟进 C# 代码，会注意到那里只有一个 `GamePanel`
    字段。C#/MonoGame 实现的游戏引擎没有对应的 `MainFrame` 类。该功能已合并到 `GamePanel` 类中。下一组字段用于控制游戏的帧率。


    在 Java 版本的游戏引擎中，一个工作线程负责每隔几毫秒运行一帧，具体取决于你设置的每秒帧数。这就是 `fr`（`RunFrameRate`）字段的用途。C#
    版本的游戏引擎运行在 MonoGame 之上，它比 Java Swing 更适合构建游戏，因此帧率由 MonoGame 库内部控制。我们只需设置所需的帧率，其余部分由库自动处理。


    `Thread` 实例 `t` 在 Java 实现中用于在独立线程中运行帧率工作器。`FPS` 字段保存当前所需的帧率。游戏引擎会尝试达到此帧率，但在所有情况下并非都能实现。这很大程度上取决于你使用的游戏引擎版本、你制作的游戏类型及其要求。不要将帧率设置得过高，以免导致系统问题。所以不要设置
    1000 的帧率！


    在窗口模式下运行且 IDE 正在运行时，建议使用保守的帧率。这样会生成更少的日志，占用更少的资源，同时仍能让你充分测试和调试游戏。话虽如此，如果你有特殊的帧率要求，应该使用最大数量的对象测试游戏，看看它能跑多快。


    Java 版本的引擎最好只在 30 帧或更低的帧率下使用。我通常以 18–24 FPS 进行开发。对于我制作的许多游戏来说，根本不需要 60 FPS。它们不是那种类型的游戏。C#/MonoGame
    版本的引擎应该能够轻松达到 60 FPS。如果你将游戏改为全屏模式运行，还会看到更大的改进。我认为 Java 版本没有与全屏模式等效的功能，能让你获得作为唯一活动程序的效率优势。这是因为在
    Java 中，你只能假装处于全屏模式，而实际上只是将视口最大化。


    下一组字段定义了尺寸。这些字段描述了游戏窗口各个方面的尺寸。窗口尺寸描述了游戏运行的外部操作系统窗口的尺寸。面板尺寸控制窗口内容的大小。在大多数情况下，面板和窗口的大小应该相同。最后，游戏有自己的一组尺寸。这些尺寸应该适合面板和窗口内部，但如果不符合，引擎会尝试缩放游戏尺寸以适应。'
- fmt: 'This can come in handy for testing a game with different screen sizes to get
    a feel for how it looks and runs, but you should have your dimensions configured
    such that the game does not need to be scaled. The last two fields have to do
    with game engine customization. The command-line arguments provided to the game
    are stored in the `ARGS` field. You can use the CLI arguments to alter the game’s
    dimensions among other things.


    The last entry is the game engine config file to process for configuration settings.
    This can be altered by a CLI argument so you can drive the game engine settings
    from the game’s launch command. This lets you run custom game settings in a data-driven,
    dynamic fashion. Next, let’s take a look at the static class methods.


    ```

    //Entry Point

    public static final void main(String[] args) { ... }

    //Config Methods

    public static String ArrayHasEntryLike(String v, String[] s) { ... }

    public static void SetField(DatConstantsEntry ent, Field f) throws Exception {
    ... }

    //OS Support Methods

    public static void RunOsSpecificCode() { ... }

    public static void LoadNativeLibraries() { ... }

    public static boolean isWindows(String OS) { ... }

    public static boolean isMac(String OS) { ... }

    public static boolean isUnix(String OS) { ... }

    public static boolean isSolaris(String OS) { ... }

    Listing 10-2

    MmgApiGame Static Class Members 2

    ```


    The first method listed is the static main entry point. It runs the following
    sequence of steps as the start of the runtime process:


    1.  Run OS-specific code – if enabled.

    2.  Load native libraries – if enabled.

    3.  Process command-line arguments.

    4.  Process the engine config file.

    5.  Initialize the main frame.

    6.  Initialize the game panel.

    7.  Start the frame rate worker thread.


    The C# implementation runs the following sequence of steps that are just a little
    bit different:


    1.  Run OS-specific code – if enabled.

    2.  Load native libraries – if enabled.

    3.  Process command-line arguments.

    4.  Process the engine config file.

    5.  Initialize the game panel.


    The `ArrayHasEntryLike` method is used to find entries in the list of command-line
    arguments. The engine supports the following CLI-driven properties out of the
    box:


    *   `WIN_WIDTH`

    *   `WIN_HEIGHT`

    *   `PANEL_WIDTH`

    *   `PANEL_HEIGHT`

    *   `FPS`

    *   `ENGINE_CONFIG_FILE`


    You can easily add your own entries for your game’s specific needs. The `SetField`
    method is used in game engine config file processing. As the file is processed,
    it will set the specified static field values in the specified class. The game
    engine supports the `GameSettings`, `MmgHelper`, and `MmgApiGame` classes out
    of the box. Again, you can add support for any game-specific classes you need.


    The last group of methods are the OS support methods. These are used to determine
    which operating system the game is running on and to either run OS-specific code
    or to load the OS-specific libraries for gamepad support. The C# implementation
    does not require native library support because it has built-in gamepad support.


    ## In Depth: MmgApiGame


    The MmgCore API is a higher-level API than the MmgBase API we reviewed in Part
    1. As such, the classes in this library are so specialized that they are often
    only used once. Sometimes it’s difficult to show a demonstration of a class in
    use when it’s only used in one place.


    Instead of the usual demonstration section, we’ll do an “in depth” section where
    we’ll cover an aspect of the class we’re reviewing in depth. The following snippet
    of code is from the end of the `MainApiGame` class’ `main` method.


    ```

    01 mf = new MainFrame(WIN_WIDTH, WIN_HEIGHT, PANEL_WIDTH, PANEL_HEIGHT, GAME_WIDTH,
    GAME_HEIGHT);

    02 pnlGame = new GamePanel(mf, PANEL_WIDTH, PANEL_HEIGHT, (WIN_WIDTH - PANEL_WIDTH)
    / 2, (WIN_HEIGHT - PANEL_HEIGHT) / 2, GAME_WIDTH, GAME_HEIGHT);

    03 mf.SetGamePanel(pnlGame);

    04 mf.InitComponents();

    05 fr = new RunFrameRate(mf, FPS);


    07 mf.setSize(WIN_WIDTH, WIN_HEIGHT);

    08 mf.setResizable(false);

    09 mf.setVisible(true);

    10 mf.setName(GameSettings.NAME);


    12 if (GameSettings.DEVELOPMENT_MODE_ON == false) {

    13     mf.setTitle(GameSettings.TITLE);

    14 } else {

    15     mf.setTitle(GameSettings.TITLE + " - " + GameSettings.DEVELOPER_COMPANY
    + " (" + GameSettings.VERSION + ")");

    16 }


    18 mf.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    19 mf.GetGamePanel().PrepBuffers();

    20 t = new Thread(fr);

    21 t.start();

    Listing 10-3

    MmgApiGame in Depth 1

    ```


    The first two lines of code show the initialization of the `MainFrame` and the
    `GamePanel` classes. On lines 3-4, the main frame sets the game panel and initializes
    its components. The `RunFrameRate` field, `fr`, is initialized on line 5. The
    window’s dimensions and certain class properties are set on lines 7–10. If the
    development mode flag is set to true, then the title is configured to have a little
    bit more information about the game than usual.


    The `MainFrame` is responsible for handling the close of the game, and to do so,
    we set the type of exit operation the window should use. The code on line 18 configures
    the main frame to exit if the window is closed. The game panel’s drawing surfaces,
    buffers, are prepared on line 19; and the frame rate thread is started on lines
    20 and 21. At this point, the game is up and running, and the first game screen
    is rendering.


    ## Static Main Entry Point: MainFrame


    The `MainFrame` class extends the Java framework’s `JPanel` class and is responsible
    for creating the window that the game runs in. The `MainFrame` class handles the
    game close event. You might need to add code to this class to handle special closing
    tasks for your game. The closing event is registered in the `InitComponents` method.
    This class is also responsible for adding the canvas created by the `GamePanel`
    class to the window to be actively rendered.


    ### Class Fields


    The `MainFrame` class has a number of fields listed in the following grouping.
    The fields roughly fall into the groups they are listed under.


    ```

    //Dimensions

    public final int winWidth;

    public final int winHeight;

    public final int panelWidth;

    public final int panelHeight;

    public final int gameWidth;

    public final int gameHeight;

    //Offsets

    public final int myX;

    public final int myY;

    //Game panel

    public GamePanel pnlGame;

    Listing 10-4

    MainFrame Class Fields 1

    ```


    The first group of fields are dimensions passed in from the static main class.
    These fields hold copies of the values configured when the game starts up. Two
    new fields are listed in the Offsets group. The `myX` and `myY` fields are used
    to track the offset of the game panel inside the window.


    The last field, `pnlGame`, is an instance of the `GamePanel` class and is responsible
    for presenting a canvas that is drawn in the `MainFrame`. If you’re following
    along in C#, then you won’t see the same structure. You’ll only see the `GamePanel`
    class handling the same responsibilities that the `MainFrame` and `GamePanel`
    classes from the Java implementation do.'
