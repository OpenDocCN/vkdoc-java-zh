- fmt: '# Advanced Classes: `MmgSprite`


    The `MmgSprite` class is an advanced class that models a sprite image. A sprite
    in 2D game development is a multiframe 2D image that animates as it’s drawn. As
    such, the `MmgSprite` class is designed to handle an array of `MmgBmp` objects
    that represent the frames of the sprite object.


    ## Static Class Members


    The `MmgSprite` class has three static class fields for us to take a look at,
    listed in the following set.


    ```

    public static int DEFAULT_MS_PER_FRAME = 100;

    public static int MMG_SPRITE_FRAME_CHANGE = 0;

    public static int MMG_SPRITE_FRAME_CHANGE_TYPE = 0;

    Listing 5-19

    MmgSprite Static Class Members 1

    ```


    The first field is the default value for the number of milliseconds to wait on
    each frame of the sprite animation. Now, 100 ms is a fairly long time to wait
    when it comes to 2D image animations, but this is a default value and is set to
    be slow, so you don’t miss any frames. The remaining two static class fields are
    ID values used during sprite animation frame change events.


    ## Class Fields


    The first set of class fields for us to look at are listed in the following group.
    These fields control advanced rendering of each frame, hold the frames of the
    animation, and track the start and stop frames of the sprite animation.


    ```

    private MmgVector2 origin;

    private MmgVector2 scaling;

    private MmgRect srcRect;

    private MmgRect dstRect;

    private MmgBmp[] b;

    private float rotation;

    private int frameStart;

    private int frameStop;

    Listing 5-20

    MmgSprite Class Fields 1

    ```


    The preceding first entry contains fields that are used in frame scaling and rotation
    operations. The `origin` field is an `MmgVector2` object that stores the coordinates
    of the center point to be used for rotation transformations. Similarly, the `scaling`,
    `srcRect`, and `dstRect` class fields are used in animation frame scaling transformations.
    You guessed it. The `MmgSprite` class has the ability to scale or rotate any sprite
    frame on the fly.


    The actual animation frames are stored in the `MmgBmp` array class field `b`.
    The `rotation` field is used to store a rotation angle in degrees to be used during
    image rotation. The next two class fields are deceptively powerful. Using the
    `frameStart` and `frameStop` fields, you can animate over only a section of the
    sprite’s frames. This last point is really important. You can have animations
    that only run over a subset of the sprite’s frames.


    ```

    private long frameTime = -1;

    private long prevFrameTime = -1;

    private int frameIdx;

    private long msPerFrame;

    private boolean simpleRendering;

    private MmgEventHandler onFrameChange;

    private boolean timerOnly;

    private MmgEvent frameChange = new MmgEvent(null, "frame_changed", MmgSprite.MMG_SPRITE_FRAME_CHANGE,
    MmgSprite.MMG_SPRITE_FRAME_CHANGE_TYPE, null, null);

    Listing 5-21

    MmgSprite Class Fields 2

    ```


    The second set of class fields starts with two time-tracking fields, `frameTime`
    and `prevFrameTime`. These fields are used to measure frame duration. The `frameIdx`
    field tracks the current frame by its array index. The `msPerFrame` field is used
    to determine how long to stay on each animation frame. The `simpleRendering` Boolean
    flag is used to force simple `MmgBmp` rendering making the draw method more efficient
    by performing fewer operations.


    In this case, there are fewer checks to determine which drawing routine to use.
    The `onFrameChange` field is an event handler that triggers when the frame being
    rendered changes. The `timerOnly` Boolean flag will cause the timing mechanism
    that tracks frame changes to work as a timer for the current frame only. The frame
    index doesn’t increment in this case. Lastly, the `frameChange` event is the event
    template for handling frame change events.


    ## Support Method Details


    The classes we’re reviewing are becoming more and more complex. As such, we sometimes
    encounter long lists of get and set methods. I’ll try and break the methods up
    into groups that make sense. Let’s take a look at the first set of methods to
    review, listed in the following group.


    ```

    //Frame timing methods

    public long GetFrameTime() { ... }

    public void SetFrameTime(long l) { ... }

    public long GetPrevFrameTime() { ... }

    public void SetPrevFrameTime(long l) { ... }

    public long GetMsPerFrame() { ... ]

    public void SetMsPerFrame(long f) { ... }

    //Frame event methods

    public void SetFrameChangeEventId(int i) { ... }

    public MmgEventHandler GetOnFrameChange() { ... }

    public void SetOnFrameChange(MmgEventHandler e) { ... }

    //Frame methods

    public boolean GetSimpleRendering() { ... }

    public void SetSimpleRendering(boolean s) { ... }

    public boolean GetTimerOnly() { ... }

    public void SetTimerOnly(boolean b) { ... }

    public MmgBmp GetCurrentFrame() { ... }

    public void SetCurrentFrame(MmgBmp bmp) { ... }

    public MmgBmp[] GetBmpArray()  { ... }

    public void SetBmpArray(MmgBmp[] d)  { ... }

    Listing 5-22

    MmgSprite Support Method Details 1

    ```


    The first set of methods for us to review are the support methods that handle
    frame timing. There are get and set methods for setting the current frame time,
    the previous frame time, and the number of milliseconds to wait before changing
    frames. The second set of methods allow access to the class’ events. You can customize
    the ID of the event fired when the animation’s frame changes. The next two methods
    in the set allow you to access the event handler for the class’ on frame change
    event.


    The last set of support methods listed in the preceding provide you with the capability
    to control the sprite’s animation frames and rendering. The first two methods,
    `GetSimpleRendering` and `SetSimpleRendering`, give you access to the simple rendering
    field. If set to true, the class will only use basic rendering on the sprite animation’s
    frames. The next two methods listed are access methods for the `timerOnly` field.
    If the `timerOnly` flag is set to true, the timing mechanism that tracks frame
    changes will work as a timer for the current frame only. The animation frame doesn’t
    automatically increment in this case.


    The remaining four methods allow you to get or set the current animation frame
    and to access the `MmgBmp` array that controls the sprite class’ frames. Setting
    the `MmgBmp` array will cause the sprite object’s dimensions and the frame indexes
    to be reset.


    ```

    //Frame rendering methods

    public MmgRect GetSrcRect()  { ... }

    public void SetSrcRect(MmgRect r)  { ... }

    public MmgRect GetDstRect()  { ... }

    public void SetDstRect(MmgRect r)  { ... }

    public float GetRotation()  { ... }

    public void SetRotation(float r)  { ... }

    public MmgVector2 GetOrigin()  { ... }

    public void SetOrigin(MmgVector2 v)  { ... }

    public MmgVector2 GetScaling()  { ... }

    public void SetScaling(MmgVector2 v)  { ... }

    //Frame index methods

    public boolean IsFrameNull(int i)  { ... }

    public int GetFrameIdx()  { ... }

    public void SetFrameIdx(int f)  { ... }

