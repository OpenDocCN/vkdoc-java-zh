- fmt: '### Enumerations


    Next up, you guessed it, enumerations. There are two very important enumerations
    for us to review listed in the following code block.


    ```

    01 public enum GameStates {

    02     LOADING,

    03     BLANK,

    04     SPLASH,

    05     MAIN_MENU,

    06     ABOUT,

    07     HELP_MENU,

    08     HELP_PROLOGUE,

    09     HELP_ITEM_DESC,


    11     ...


    13     GAME_SCREEN_39,

    14     GAME_SCREEN_40

    15 }

    01 public enum GameType {

    02     GAME_NEW,

    03     GAME_CONTINUE,

    04     GAME_ONE_PLAYER,

    05     GAME_TWO_PLAYER,

    06     GAME_NETWORK_TWO_PLAYER,

    07     GAME_NETWORK_TWO_PLAYER_P1,

    08     GAME_NETWORK_TWO_PLAYER_P2,

    09     GAME_NETWORK_TWO_PLAYER_LEFT,

    10     GAME_NETWORK_TWO_PLAYER_RIGHT

    11 }

    Listing 10-10

    GamePanel Enumerations 1

    ```


    Now the `GamePanel` class has a number of responsibilities. It really is the heart
    of the game engine. One of those responsibilities is to manage the game screens.
    There should be one game screen class for each screen in your game, roughly speaking.
    The class is designed to associate game screens with a `GameState` value. To facilitate
    its use, there are a number of default game states in the first enumeration and
    up to 40 generic game states that can be used for anything.


    Feel free to expand the entries in this enumeration to accommodate your next game.
    The second enumeration is of equal importance. It describes the type of game that’s
    running. There are a few default values to indicate single player, two players,
    and different network games. If you’re just making a simple single-player game,
    try to still use this enumeration. You never know when you might want to go back
    and add network support someday.


    ### Class Fields


    As one might expect, a class of this importance is going to have a decent number
    of class fields and usually a long list of support methods. The `GamePanel` class
    is no exception. Take a look at the first block of class fields for us to review
    listed in the following grouping.


    ```

    //Game positioning

    public MainFrame mf;

    public int winWidth;

    public int winHeight;

    public int myX;

    public int myY;

    //Scaled game positioning

    public double scale = 1.0;

    public int sWinWidth;

    public int sWinHeight;

    public int sMyX;

    public int sMyY;

    //Game state management

    public Hashtable gameScreens;

    public MmgGameScreen currentScreen;

    public GameStates prevGameState;

    public GameStates gameState;

    //Game drawing

    public MmgPen p;

    public Canvas canvas;

    public BufferStrategy strategy;

    public BufferedImage background;

    public Graphics2D backgroundGraphics;

    public Graphics2D graphics;

    public int updateTick = 0;

    Listing 10-11

    GamePanel Class Fields 1

    ```


    The first group of fields contains a reference to the main frame. You can consider
    the main frame to be like a parent class to the game panel class. The next four
    entries are used to track the game’s dimensions and the game panel’s offset. The
    following group of fields are very similar, but these are applied when the game
    panel needs to be scaled to fit inside the window’s frame.


    The next group of fields are very important. This group contains game state management
    functionality. The first field in the group provides you with a data structure
    that you can use to track the game screens you’re using. You can choose not to
    use this data structure, but it’s there for you to use if you see fit. The `currentScreen`
    field represents the active game screen and receives all input the game panel
    receives and is plugged into the game engine’s update and draw calls.


    The next two fields, `gameState` and `prevGameState`, are used to track the current
    and previous game states of the game panel class. The reason for this is so that
    the previous game screen can be cleaned up, resources released, before the next
    game screen takes over. The last group of class fields are part of the class’
    drawing routine. The `MmgPen` instance, `p`, is used to draw on the `background`
    image via the `backgroundGraphics` framework drawing class.


    The `canvas` field is used to hold a framework-level class that represents the
    window’s drawable area. The `strategy` field is used to configure the framework’s
    drawing process to include double buffering the canvas. This means that internally
    the `canvas` will support two drawing surfaces. One surface is being displayed,
    while the other, representing the next game frame, is being drawn.


    When the second frame is ready, the two surfaces are flipped, and the process
    is repeated. As I mentioned in the preceding, the `background` and `backgroundGraphics`
    are used to draw the game onto a surface, and the `graphics` field is then used
    to draw that game frame onto the window’s canvas. Last but not least, the `updateTick`
    field is used as part of the update call. It keeps track of how many times the
    update call has been made. This corresponds with the number of frames the game
    has displayed. We’re not out of the woods yet. There is another set of class fields
    for us to look at. Take a look at the fields listed in the following grouping
    before we delve into their review.'
