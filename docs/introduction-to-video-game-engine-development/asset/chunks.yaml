  trans: '

    # 12. 事件处理器


    在本章中，我们将回顾 MmgCore API 中定义的所有事件处理器。我们将介绍的新事件处理器包括通用事件、资源加载事件和主菜单事件。我们还将研究以接口和类形式实现的事件处理器。本章将审查的类如下所列：


    *   GenericEventMessage


    *   GenericEventHandler


    *   LoadResourceUpdateMessage


    *   LoadResourceUpdateHandler


    *   HandleMainMenuEvent


    ## 事件处理器：GenericEventMessage


    `GenericEventMessage` 类是一个新的事件类，旨在与 MmgCore API 协同工作。现在你可能会想，既然 MmgBase API 已经有一个
    MmgEvent 类，为什么我们还需要一个新的事件类？在这个特定案例中，有一个充分的理由：`GenericEventMessage` 被设计为与 MmgCore
    API 的类协同工作，稍后你将看到这一点。


    ### 类字段


    `GenericEventMessage` 类非常简洁。我们只需审查三个类字段，如下所示。


    ```

    public int id;

    public Object payload;

    public GameStates gameState;

    列表 12-1

    GenericEventMessage 类字段 1

    ```


    列出的第一个字段是 `id` 字段。这个整数用于标识所发送的 `GenericEventMessage` 的类型。请注意，定义事件并为其分配唯一 ID 最终是你的责任。列表中的第二个字段是
    `payload`。`payload` 字段是框架 `Object` 类的一个实例，如果你使用 C# 则是 `object` 类型。


    `payload` 字段本质上是通用的，可以容纳你需要包含在事件中的任何对象。你可以使用此字段向事件消息添加数据。前面列出的最后一个字段是 `gameState`
    字段。我们在之前审查 `GamePanel` 类时已经遇到过 `GameStates` 枚举。


    它们用于跟踪游戏屏幕并将其分配给唯一的游戏状态。MmgBase API 实际上没有游戏状态的概念。它实际上也没有游戏的概念。它只是一组通用的、强大的游戏构建类。只有当我们接触到
    MmgCore API 时，游戏和游戏状态的概念才被明确定义。


    正因如此，创建一个新的、与游戏引擎这一层级对象和概念协同工作的 MmgCore API 事件类才更有意义。接下来，我们将查看该类的支持方法。


    ### 支持方法详情


    `GenericEventMessage` 类只有少数几个类字段，因此我们预计会看到数量合理的支持方法需要审查。


    ```

    public int GetId() { ... }

    public Object GetPayload() { ... }

    public GameStates GetGameState() { ... }

    列表 12-2

    GenericEventMessage 支持方法详情 1

    ```


    上面列出的支持方法非常直接，因此我不会过多赘述。列出的每个方法都提供了对关联类字段的 get 访问。


    ### 主要方法详情


    我们只需要查看一个主要方法，即下面列出的类构造函数。


    ```

    public GenericEventMessage(int Id, Object Payload, GameStates GameState) { ...
    }

    列表 12-3

    GenericEventMessage 主要方法详情 1

    ```


    这是我们需要审查的唯一主要方法。它是一个类构造函数，将类的字段设置为相应的参数。


    ### 演示：GenericEventMessage 类


    本演示部分的代码片段来自 `GamePanel` 类的 `HandleGenericEvent` 方法。首先，让我们快速看一下该类的定义。


    ```

    public class GamePanel implements GenericEventHandler, GamePadSimple { ... }

    列表 12-4

    GenericEventMessage 类演示 1

    ```


    注意，该类实现了 `GenericEventHandler` 接口。这意味着该类可以注册为事件处理器并接收 `GenericEventMessage` 事件。让我们看看同一个类在
    C# 版本的游戏引擎中是如何定义的。


    ```

    public class GamePanel : Game, GenericEventHandler, GamePadSimple { ... }

    列表 12-5

    GenericEventMessage 类演示 2

    ```


    它们看起来几乎完全相同。C# 版本也实现了 `GenericEventHandler` 接口，只是语法与 Java 版本略有不同。现在让我们将注意力转向 MmgCore
    API 中 `GamePanel` 类的 `HandleGenericEvent` 方法。我在下面详细列出了该方法。


    ```

    01 public void HandleGenericEvent(GenericEventMessage obj) {

    02     if (obj != null) {

    03         if (obj.GetGameState() == GameStates.LOADING) {

    04             if (obj.GetId() == ScreenLoading.EVENT_LOAD_COMPLETE) {

    05                DatExternalStrings.LOAD_EXT_STRINGS();

    06                SwitchGameState(GameStates.MAIN_MENU);

    07             }

    08         } else if (obj.GetGameState() == GameStates.SPLASH) {

    09             if (obj.GetId() == ScreenSplash.EVENT_DISPLAY_COMPLETE) {

    10                SwitchGameState(GameStates.LOADING);

    11             }

    12         }

    13     }

    14 }

    列表 12-6

    GenericEventMessage 类演示 3

    ```


    作为一个实现了 `GenericEventHandler` 接口的类，它必须定义 `HandleGenericEvent` 方法。处理通用事件的代码应放置在此方法中。请注意，该事件处理器被设置为处理与
    `LOADING` 或 `SPLASH` 游戏状态相关联的事件。如果事件（即 `obj` 参数）不为 null，我们首先检查其游戏状态，然后开始处理消息。


    接下来，我们检查事件的 `id` 字段，以确定我们正在处理的具体事件类型。如果事件是 `EVENT_LOAD_COMPLETE` 事件，那么我们通过调用 `DatExternalStrings`
    类的 `LOAD_EXT_STRINGS` 静态方法来加载游戏字符串，如第 5 行所示。在随后的代码行中，游戏状态被更改为主菜单。


    类似地，`SPLASH` 游戏状态的 `EVENT_DISPLAY_COMPLETE` 事件会导致状态更改为 `MAIN_MENU`。请记住，从 `GamePanel`
    类的审查中可知，`GameStates` 和游戏屏幕是紧密相连的。


    ## 事件处理器：GenericEventHandler


    `GenericEventHandler` 是作为接口实现的，因此我们将一次性审查其完整代码。


    ```

    1 public interface GenericEventHandler {

    2    public void HandleGenericEvent(GenericEventMessage obj);

    3 }

    列表 12-7

    GenericEventHandler 类审查 1

    ```


    `GenericEventHandler` 接口非常简单。任何实现该接口的类都必须声明一个与列出的 `HandleGenericEvent` 方法具有相同签名的类方法。我们在之前的类审查中，查看
    `GamePanel` 类的 `HandleGenericEvent` 方法时已经看到了这一点。

