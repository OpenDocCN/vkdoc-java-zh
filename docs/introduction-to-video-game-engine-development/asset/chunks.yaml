    ```

    1 if (handler != null) {

    2     handler.HandleGenericEvent(new GenericEventMessage(ScreenLoading.EVENT_LOAD_COMPLETE,
    null, GetGameState()));

    3 }

    Listing 12-10

    GenericEventHandler Class Review 3

    ```


    In a similar fashion to the way it’s handled by the `ScreenSplash` class, the
    `ScreenLoading` class calls the `HandleGenericEvent` method and passes it a `GenericEventMessage`
    with an `EVENT_LOAD_COMPLETE` event ID to process.


    ## Event Handlers: `LoadResourceUpdateMessage`


    The `LoadResourceUpdateMessage` class is used to send resource loading events
    to a target `LoadResourceMessage` handler. Events of this type are used to convey
    information about the progress of the resource load.


    ### Class Fields


    The `LoadResourceUpdateMessage` class has two class fields for us to review listed
    in the following.


    ```

    public int pos;

    public int len;

    Listing 12-11

    LoadResourceUpdateMessage Class Fields 1

    ```


    The first field listed is the `pos` field. This field indicates the current position
    of the resource load in terms of how many files have been loaded out of the total
    number of files to load. The `len` field represents the total number of resource
    files to load.


    ### Support Method Details


    The `LoadResourceUpdateMessage` has two sets of get and set methods for us to
    review.


    ```

    public int GetPos() { ... }

    public void SetPos(int Pos) { ... }

    public int GetLen() { ... }

    public void SetLen(int Len) { ... }

    Listing 12-12

    LoadResourceUpdateMessage Support Method Details 1

    ```


    These are basic get and set methods that allow access to the class’ fields. There’s
    not much more to it than that. Let’s take a look at the class constructor next.


    ### Main Method Details


    There is only one main method for us to review, the class constructor.


    ```

    public LoadResourceUpdateMessage(int Pos, int Len) { ... }

    Listing 12-13

    LoadResourceUpdateMessage Main Method Details 1

    ```


    The constructor is very basic and assigns argument values to each class field.


    ### Demonstration: `LoadResourceUpdateMessage` Class


    For the demonstration section of the `LoadResourceUpdateMessage` class, we’ll
    take a look at the event handler that receives this type of event. The example
    code for this section is from the `ScreenLoading` class’ `HandleUpdate` method
    from the MmgCore API. Let’s take a look at some code.


    ```

    01 public void HandleUpdate(LoadResourceUpdateMessage obj) {

    02     if (obj != null) {

    03         float prct = (float) obj.GetPos() / (float) obj.GetLen();


    05         if (GetLoadingBar() != null) {

    06             GetLoadingBar().SetFillAmt(prct);

    07         }


    09         if (GetLoadComplete() == true) {

    10             if (handler != null) {

    11                 handler.HandleGenericEvent(new GenericEventMessage(ScreenLoading.EVENT_LOAD_COMPLETE,
    null, GetGameState()));

    12             }

    13         }

    14     }

    15 }

    Listing 12-14

    LoadResourceUpdateMessage Class Demonstration 1

    ```


    This method receives events from the `RunResourceLoad` class as it loads sounds
    and images into the engine’s resource cache. If the event, `obj`, is not null,
    then we calculate the resource load’s progress on line 3. If the loading bar is
    defined, we update the percentage complete. On lines 9–11, if the resource load
    is complete, a generic event is fired indicating it''s time to change game states.
    We’ll take a look at the source of these events when we review the `LoadResourceUpdateHandler`
    class next.


    ## Event Handlers: `LoadResourceUpdateHandler`


    The `LoadResourceUpdateHandler` is implemented as an interface, and we can list
    the entire interface right here. Let’s take a look at some code!


    ```

    1 public interface LoadResourceUpdateHandler {

    2     public void HandleUpdate(LoadResourceUpdateMessage obj);

    3 }

    Listing 12-15

    LoadResourceUpdateHandler Class Review

    ```


    This interface is very similar to the `GenericEventHandler` interface. It’s very
    simple in nature. Any class that implements the interface must define a `HandleUpdate`
    method and can receive `LoadResourceUpdateMessage` events if the class is registered
    to do so.


    ### Demonstration: `LoadResourceUpdateHandler` Class


    The snippet of example code listed in the following is from the `RunResourceLoad`
    class’ `run` method from the MmgCore API. The code is part of the resource loading
    process run on a separate thread by the game’s loading screen.


    ```

    01 MmgHelper.GetBasicCachedBmp(adFiles.get(i).getPath(), adFiles.get(i).getName());

    02 readPos = i * loadMultiplier;


    04 if (update != null) {

    05     update.HandleUpdate(new LoadResourceUpdateMessage(readPos, readLen));

    06 }


    08 try {

    09     Thread.sleep(slowDown);

    10 } catch (Exception e) {

    11     MmgHelper.wrErr(e);

    12 }


    14 if(exitLoad) {

    15     break;

    16 }

    Listing 12-16

    LoadResourceUpdateHandler Class Demonstration 1

    ```


    Because this snippet of code is part of the resource loading process, the first
    line of code loads the target resource file into the engine’s resource cache.
    The current loading progress is calculated on line 2. Note that the read position
    is artificially increased by the `loadMultiplier` field.


    This is done to make sure the calculations work with very few resources. A new
    `LoadResourceUpdateMessage` event is created and sent to the registered event
    handler if one exists on line 5. If the `exitLoad` field is set to true, we exit
    the loading process.


    ## Event Handlers: `HandleMainMenuEvent`


    The `HandleMainMenuEvent` class is used to represent a main menu event action.
    Instances of this class are generated when the user selects a main menu option.


    ### Static Class Members


    The class’ static fields are used to define some default main menu events. You
    don’t have to use these event IDs; you can create your own set to accommodate
    your needs. Let’s take a look at the static fields listed in the following.


    ```

    public static int MAIN_MENU_EVENT_TYPE = 0;

    public static int MAIN_MENU_EVENT_START_GAME = 0;

    public static int MAIN_MENU_EVENT_SETTINGS = 1;

    public static int MAIN_MENU_EVENT_ABOUT = 2;

    public static int MAIN_MENU_EVENT_HELP = 3;

    public static int MAIN_MENU_EVENT_EXIT_GAME = 4;

    public static int MAIN_MENU_EVENT_START_GAME_1P = 5;

    public static int MAIN_MENU_EVENT_START_GAME_2P = 6;

    Listing 12-17

    HandleMainMenuEvent Static Class Members 1

    ```


    The first static field listed in the preceding is a type value for main menu events.
    The next seven entries are default event IDs for a default set of menu items.
    These defaults should serve you well for most of your games as the options presented
    are very standard. Let’s take a look at the class fields next.'
