- fmt: '### Class Fields


    The first set of class fields listed in the following group are used to control
    the start and stop limits, the direction, and the rate of change of the pulse.
    Take a look at the fields listed. We’ll review them in just a bit.


    ```

    private MmgVector2 adjScaling;

    private MmgVector2 baseLineScaling;

    private double change;

    private double changePerMs;

    private int direction; //growing or shrinking, 1 or -1

    Listing 7-1

    MmgPulse Class Fields 1

    ```


    The first field listed, `adjScaling`, represents the apex of the pulse or the
    point at which the pulse starts returning to its starting point. The second field,
    `baseLineScaling`, represents the starting point of the pulse. The `change` field
    represents the total change that must occur. It’s easiest to think of the pulse
    as a distance from a start point and the change as the total distance that must
    be covered by the pulse. That makes the `changePerMs` field the rate of change
    for the pulse and the `direction` field, you guessed it, the direction of the
    pulse.


    ```

    private long timeDiff;

    private long timeFlip;

    private long timeStart;

    private long timeTotal;

    Listing 7-2

    MmgPulse Class Fields 2

    ```


    The second set of class fields has four entries for us to review. These fields
    deal mostly with the timing involved in the pulse animation. The first entry,
    `timeDiff`, tracks the time difference in milliseconds between the current time
    and the value held by the `timeStart` class field. The next entry, `timeFlip`,
    tracks how much time into the animation it takes for the direction of the pulse
    to change. The `timeStart` class field marks the starting time, in milliseconds,
    that the pulse animation began. The `timeTotal` class field holds the total amount
    of time the animation takes, also in milliseconds.


    ### Support Method Details


    The `MmgPulse` class has support methods that allow access to most of the class’
    fields. The only field we reviewed that doesn’t have get and set methods is the
    `timeDiff` field because it is calculated on the fly as part of the object’s update
    method calls. I’ve ordered the support methods to match the order of the class
    fields we just reviewed.


    ```

    public MmgVector2 GetAdjScaling() { ... }

    public void SetAdjScaling(MmgVector2 v) { ... }

    public MmgVector2 GetBaseLineScaling() { ... }

    public void SetBaseLineScaling(MmgVector2 v) { ... }

    public double GetChange() { ... }

    public void SetChange(double c) { ... }

    public double GetChangePerMs() { ... }

    public void SetChangePerMs(double d) { ... }

    public long GetTimeFlip() { ... }

    public void SetTimeFlip(long l) { ... }

    public long GetTimeStart() { ... }

    public void SetTimeStart(long l) { ... }

    public long GetTimeTotal() { ... }

    public void SetTimeTotal(long l) { ... }

    Listing 7-3

    MmgPulse Support Method Details 1

    ```


    Because these are just simple get and set methods, I won’t go into any detail
    reviewing them. As with any class, it may not be clear just exactly how to use
    the methods properly. The best approach is to start from the demonstration code,
    establish a baseline of functionality, and then experiment until you understand
    how the class’ fields and methods should be used.


    ### Main Method Details


    The main methods we have to review for the `MmgPulse` class are listed in the
    following. They are very straightforward. These are standard main methods we’ve
    seen before during the API review.


    ```

    public MmgPulse(int startDir, long totalMs, double chng, MmgVector2 blS) { ...
    }

    public MmgPulse(MmgPulse obj) { ... }

    public MmgPulse Clone() { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgPulse obj) { ... }

    Listing 7-4

    MmgPulse Main Method Details 1

    ```


    The first two methods listed in the preceding are class constructors as you might
    expect. The first constructor takes arguments for all the major class fields.
    Each argument is used to initialize its associated field. This constructor creates
    a new `MmgPulse` object that is ready to use given the current arguments. You
    should make sure you understand how the pulse class works before experimenting
    with more exotic pulse parameters.


    The second constructor listed is a specialized constructor that is used to create
    a new, unique copy of an existing `MmgPulse` object. This method powers the class’
    cloning functionality, the `Clone` method. Last but not least, there are two API-level
    methods for representing the class as a string and comparing two `MmgPulse` objects.
    These methods are also very direct, so I won’t go into any detail about them here.
    Make sure to look over the main methods and understand how they work.'
