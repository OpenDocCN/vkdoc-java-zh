    *Listing 18-14 ScreenGame Main Methods 1*


    The two main methods listed in the preceding are the `MmgDraw` method and the
    `ResetGame` method. Notice how deceptively simple the `MmgDraw` method looks.
    Don’t be deceived. We’re leveraging a lot of code from the classes we’re extending.
    Add these two methods to your `ScreenGame` class, and let’s get ready to look
    at the brain of the entire game, the `DrawScreen` method.


    Recall from our review of the `Screen` class that it’s designed more for game
    screens with lots of animations; thus, the `DrawScreen` method is automatically
    called by the super class, or base class in C#. That means all our game logic
    will either reside in or be called from the `DrawScreen` method. Because of the
    importance of this method, we’re going to cover the material by building it up
    from a skeleton of the method. I’ll list the skeleton in the following code block.


    ```java

    @Override

    001 public void DrawScreen() {

    002     //ran each game frame

    003     pause = true;

    004     switch(state) {

    005         case NONE:

    006             break;

    007         case SHOW_GAME_EXIT:

    008             break;

    009         case SHOW_COUNT_DOWN_IN_GAME:

    010         case SHOW_COUNT_DOWN:

    011             switch(numberState) {

    012                 case NONE:

    013                     break;

    014                 case NUMBER_1:

    015                     ...

    016                 case NUMBER_2:

    017                     ...

    018                 case NUMBER_3:

    019                     ...

