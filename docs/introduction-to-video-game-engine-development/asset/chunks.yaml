    ### 类字段


    下面列出的第一组类字段用于控制脉冲的起始与停止限制、方向以及变化速率。请查看所列出的字段，稍后我们将逐一进行说明。


    ```

    private MmgVector2 adjScaling;

    private MmgVector2 baseLineScaling;

    private double change;

    private double changePerMs;

    private int direction; // 增长或收缩，1 或 -1

    清单 7-1

    MmgPulse 类字段 1

    ```


    列出的第一个字段 `adjScaling` 代表脉冲的顶点，即脉冲开始返回起点的位置。第二个字段 `baseLineScaling` 代表脉冲的起点。`change`
    字段表示必须发生的总变化量。将脉冲理解为从起点出发的一段距离，而 `change` 则是脉冲必须覆盖的总距离，这样理解最为简单。由此，`changePerMs`
    字段就是脉冲的变化速率，而 `direction` 字段，你猜对了，就是脉冲的方向。


    ```

    private long timeDiff;

    private long timeFlip;

    private long timeStart;

    private long timeTotal;

    清单 7-2

    MmgPulse 类字段 2

    ```


    第二组类字段包含四个条目供我们查看。这些字段主要处理脉冲动画中的时间相关逻辑。第一个条目 `timeDiff` 跟踪当前时间与 `timeStart` 类字段所保存值之间的时间差（以毫秒为单位）。下一个条目
    `timeFlip` 跟踪动画进行到多长时间时脉冲方向会发生改变。`timeStart` 类字段标记脉冲动画开始的起始时间（以毫秒为单位）。`timeTotal`
    类字段保存动画持续的总时间（同样以毫秒为单位）。


    ### 支持方法详情


    `MmgPulse` 类提供了支持方法，允许访问该类的大部分字段。我们审查过的字段中，唯一没有 get 和 set 方法的是 `timeDiff` 字段，因为它是在对象更新方法调用过程中动态计算的。我将支持方法的顺序与我们刚刚审查的类字段顺序保持一致。


    ```

