    In demonstrating the `MmgFontData` class, we’ll take a look at how the class is
    initialized in the MmgCore API as part of the game’s startup code.


    ```

    01 screenData = new MmgScreenData(winWidth, winHeight, GamePanel.GAME_WIDTH, GamePanel.GAME_HEIGHT);

    02 MmgHelper.wr("");

    03 MmgHelper.wr("--- MmgScreenData ---");

    04 MmgHelper.wr(MmgScreenData.ApiToString());


    06 fontData = new MmgFontData();

    07 MmgHelper.wr("");

    08 MmgHelper.wr("--- MmgFontData ---");

    09 MmgHelper.wr(MmgFontData.ApiToString());

    10 debugFont = MmgFontData.CreateDefaultFontSm();

    11 mmgDebugFont = new MmgFont(debugFont, "Test", 0, 0, MmgColor.GetWhite());

    Listing 3-22

    MmgFontData Class Demonstration 1

    ```


    The code snippet listed in the preceding is from the MmgCore API’s `GamePanel`
    class, specifically the class constructor. As you can see on line 1, the `MmgScreenData`
    class is initialized with the game dimensions passed in from the static main entry
    point. Notice that simply initializing the class is all we need to do to prep
    it.


    On line 6, the `MmgFontData` class is initialized; and as we just mentioned, the
    class constructor calls the scaling calculation method and gets our font sizes
    all prepped. On line 9, debugging information about the current font metrics is
    displayed. Take a moment to look at these debugging lines when you’re building
    your games. They can really help you track down little issues with the game dimensions
    and font sizes. One example of how you can use the class to create new fonts can
    be found on lines 10 and 11.


    ## Helper Classes: `MmgDebug`


    The `MmgDebug` class is similar to the `MmgApiUtils` class in that it is an easy-access
    class that provides logging features. Again, we’ve seen similar functionality
    in the `MmgApiUtils` and `MmgHelper` classes. So why do we need another logging
    helper class? Well, in this case, having multiple logging classes is not the worst
    thing; it’s even kind of helpful. The idea here is that you can use the different
    logging classes to provide output from different parts of your game independently
    from one another.


    ### Static Class Members


    The `MmgDebug` class has only two static fields for us to review.


    ```

    public static boolean DEBUGGING_ON = true;

    public static String appName = "MmgApi.MmgDebug";

    Listing 3-23

    MmgDebug Static Class Member 1

    ```


    The first entry listed in the preceding, `DEBUGGING_ON`, is used to control the
    logging generated by this class. Similar to other logging classes, you can turn
    off all logging generated by setting this field to false. The second entry listed
    is a log prefix. Use this to insert a string before each log entry generated.
    Up next, we’ll take a look at some static class methods.


    ```

    public static void wr(String s)

    public static void wr(String key, String s)

    public static void wrTs(String s)

    Listing 3-24

    MmgDebug Static Class Member 2

    ```


    There are three simple logging methods we have to cover listed in the preceding.
    They differ slightly from previous logging methods we’ve reviewed in that these
    methods prefix the log with a key. The first method, `wr`, uses the default prefix
    text, while the overloaded version of the method takes both a prefix string and
    text to log. Lastly, the `wrTs` method includes a timestamp in the logged text.
    This can be very helpful when tracing bugs that have to do with timing and animation.


    ## Helper Classes: `MmgBmpScaler`


    The `MmgBmpScaler` class is another static helper class that is structured in
    a similar fashion to some of the helper classes we’ve already looked at. The main
    use of this class is to transform images by resizing or rotating them. All of
    the class’ functionality can be accessed via static methods without having to
    create a class instance.


    ### Static Class Members


    The `MmgBmpScaler` class has a few static class methods that we’ll review next.


    ```

    01 public static MmgBmp ScaleMmgBmpToGameScreen(MmgBmp subj, boolean alpha) {
    ... }

    public static MmgBmp ScaleMmgBmpToGameScreen(MmgBmp subj, boolean alpha) { ...
    }

    public static MmgBmp ScaleMmgBmp(MmgBmp subj, MmgVector2 newSize, boolean alpha)
    { ... }

    public static MmgBmp ScaleMmgBmp(MmgBmp subj, boolean useScreenDataScaleX, boolean
    alpha) { ... }

    public static MmgBmp ScaleMmgBmp(MmgBmp subj, double scale, boolean alpha) { ...
    }

    public static MmgBmp RotateMmgBmp(MmgBmp subj, int angle, boolean alpha) { ...
    }

    Listing 3-25

    MmgBmpScaler Static Class Member 1

    ```


    The set of methods we’ll review first contains the `MmgBmp` scaling methods. The
    first method listed in the preceding, `ScaleMmgBmpToGameScreen`, is designed to
    scale an `MmgBmp` image to match the screen’s scaling, if any. The next entry
    is the `ScaleMmgBmp` method. It takes an `MmgBmp`, an `MmgVector2`, and a Boolean
    as arguments. This method is almost identical to the previously reviewed method.
    The only difference is that the dimensions of the new image are determined by
    the passed-in `MmgVector2` instance.


    There are two more versions of the `ScaleMmgBmp` method. These versions provide
    you with different ways to define how the image is scaled. In one overloaded version
    of the method, you can specify either the X or Y axis as the source of the scaling
    percentage. And in the other method entry, you can scale the specified image by
    a set scaling amount. This class gives you a lot of flexibility with regard to
    resizing images. Let’s take a look at the last remaining method in the class,
    which can be used for image rotation transformations.


    The last method left for us to review in the `MmgBmpScaler` class has nothing
    to do with image scaling. Instead, we have another type of image transformation
    method, rotation. The `RotateMmgBmp` static class method has a similar setup to
    the scaling methods we just reviewed but is designed to provide image rotation
    functionality.


    ### Demonstration: `MmgBmpScaler` Class


    The demonstration code listed in the following can be found in the `LoadResources`
    method of the `ScreenTestMmgBmp` class in the MmgTestSpace package, or namespace
    if you are following along in C#.


    ```

    1 bmpScaled = MmgBmpScaler.ScaleMmgBmp(bmpCache, 1.50, true);

    2 bmpScaled.SetPosition(MmgHelper.ScaleValue(213), GetY() + MmgHelper.ScaleValue(330));

    3 AddObj(bmpScaled);


    5 bmpRotate = MmgBmpScaler.RotateMmgBmp(bmpCache, 90, true);

    6 bmpRotate.SetPosition(MmgHelper.ScaleValue(645), GetY() + MmgHelper.ScaleValue(330));

    7 AddObj(bmpRotate);

    Listing 3-26

    MmgBmpScaler Class Demonstration 1

    ```


    The example code listed in the preceding uses the methods we just reviewed to
    create a scaled and rotated version of an `MmgBmp` object. The first entry in
    the code, lines 1–3, is used to create a new version of an existing image that
    is scaled 150%. The second block of code, lines 5–7, is an example of using the
    `MmgBmpScaler` class to rotate an `MmgBmp` object by 90 degrees.


