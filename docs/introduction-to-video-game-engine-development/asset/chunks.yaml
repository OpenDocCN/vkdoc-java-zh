    ```


    前面列出的前两个字段用于报告资源加载操作的结果。`readResult`字段在资源处理操作期间加载了任何声音或图像时保存`true`值。`readComplete`字段在整个加载过程完成时设置为`true`。`readPos`和`readLen`字段分别跟踪资源加载过程中的当前位置和要加载的文件总数。


    `loadMultiplier`字段用于人为增加我们正在处理的数字的大小。这样做是为了在要加载的资源非常少时帮助计算进度百分比。`slowDown`字段用于通过向操作中添加一个小的时间消耗来人为减慢加载过程。当你只有少量资源要加载，并且想要验证加载条是否正常工作时，这非常有帮助。添加一个减速值可以让你更容易看到进度条。


