    The next set of helper methods to cover are a bit sorted but mainly have to do
    with resource loading. These helper methods provide high-level code in a convenient,
    encapsulated way. You should always use the game engine’s resource loading system,
    and you should always use resource loading methods that store data in the resource
    cache.


    The first helper method, `GetBasicBmp`, is an image resource loading method that
    takes a file path string as an argument. This method is very useful on game screens
    that display before the resource load completes because you can point directly
    to an image resource on the file system.


    The next method in the set is a helper method that is used with the menu system
    built into the API. The `GetBasicMenuItem` method is a convenience method that
    prepares a new `MmgMenuItem` instance in a quick and uniform way. The next method
    to review is used to load sound resources, `GetBasicSound`.


    This method is similar to the `GetBasicBmp` method we just reviewed. Both are
    basic resource loading methods. Be sure you read over and understand how these
    resource loading methods work. There are a couple of different methods that can
    be used; so make sure you understand which methods use the resource cache, which
    methods scale the loaded image, and what different arguments they require.


