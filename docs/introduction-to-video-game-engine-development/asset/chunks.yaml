  trans: '

    ### 类字段


    `MmgFont` 类中供我们查看的字段列在下方。


    ```

    private Font font;

    private String text;

    private final FontRenderContext frc;

    private int fontSize = -1;

    private FontType fontType = FontType.NONE;

    清单 2-15

    MmgFont 类字段 1

    ```


    上面列出的第一个字段是框架字体类。在 C# 版本的 `MmgFont` 中，框架字体类是 `SpriteFont` 类。`MmgFont` 类封装了底层框架类，并为
    MmgBase API 提供了标准功能。`text` 类字段保存了将由 `MmgFont` 实例显示的文本。接下来列出的字段是一个框架类，用于描述渲染字体的内部方法。这可以用来获取适合渲染字体的矩形尺寸。准确了解字体渲染字符串的尺寸，使我们能够将文本正确定位在屏幕上。


    花点时间思考一下 C# 实现和 `SpriteFont` 框架类。为什么在 `MmgFont` 类和 API 方面，一切仍然以相同的方式工作？这是因为 API
    使用的字体功能是由 `MmgFont` 类定义的，并且在游戏引擎的任何移植版本中都是相同的。`MmgFont` 类的职责是使用可用的框架类提供其类定义的功能。剩下的两个类字段
    `fontSize` 和 `fontType` 是描述性字段，应准确反映该类加载的字体类型。


    ### 支持方法详情


    第一组供我们查看的支持方法列在下方。


    ```

    public String GetText() { ... }

    public void SetText(String s) { ... }

    public FontType GetFontType() { ... }

    public void SetFontType(FontType ft) { ... }

    public void SetFontSize(int sz) { ... }

    public int GetFontSize() { ... }

    public void SetFont(Font tf) { ... }

    public Font GetFont() { ... }

    清单 2-16

    MmgFont 支持方法详情 1


    ```


    我们将讨论的前两个支持方法是 `text` 类字段的 get 和 set 方法。`GetText` 方法仅返回文本值。然而，`SetText` 方法不仅更新文本，还会更新字体的尺寸。尺寸计算的结果相当准确，但你会注意到定位字体时可能会感觉有点别扭。这是因为字体实际上是从指定位置的垂直中心开始绘制的。在游戏屏幕上处理字体时请考虑到这一点。


    `SetFontSize` 方法与我们目前看到的一些支持方法略有不同。它会在调用时调整字体大小。相应地，`GetFontSize` 方法从实际字体中返回大小值。`fontSize`
    字段会随字体大小的调整而更新。该字段在设置时会覆盖字体的大小。所有重要的类字段都有 get 和 set 方法。请确保熟悉它们。


    ### 主要方法详情


    首先，我们将查看类的构造函数。实际上，构造函数比我们这里列出的要多几个；但在很多方面它们是多余的，因此我们只关注列出的这些。


    ```

    public MmgFont() { ... }

    public MmgFont(MmgObj obj) { ... }

    public MmgFont(Font tf, int fontSize, FontType fontType) { ... }

    public MmgFont(MmgFont obj) { ... }

    public MmgObj Clone() { ... }

    public MmgFont CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    public boolean ApiEquals(MmgFont obj) { ... }

    清单 2-17

    MmgFont 主要方法详情 1

    ```


    我想讨论的第一个构造函数接受三个参数：一个字体、一个字体大小和一个字体类型。该构造函数使用默认值或参数值初始化每个类字段。请注意，字体大小参数并不设置字体大小，它代表字体大小。上面列出的另一个构造函数是类克隆方法使用的专用构造函数。它接受一个
    `MmgFont` 对象作为参数。


    我们之前遇到过这种类型的构造函数实现。这是贯穿 MmgBase API 的一种强化设计模式，与克隆紧密相关。在大多数情况下，任何属于其他 API 类的类字段都需要被克隆，以防止新对象实例与其所基于的实例之间共享引用。所有基本数据类型都可以直接设置。


    接下来要讨论的两个主要方法是克隆方法。你会反复看到这两个特定的类方法：`Clone` 和 `CloneTyped`。请注意，我们通过一致地实现某些类功能，在
    API 层面创建了可靠的能力。我们本可以选择使用接口来实现相同的功能。那会创建更结构化的实现，但在构建游戏引擎时，我们更看重灵活性而非僵化的结构。


    当对象通过传递给 `AddObj` 方法而成为游戏屏幕可绘制对象列表的一部分时，游戏引擎的绘制例程会调用 `MmgDraw` 方法。你也可以通过直接在 `MmgDraw`
    方法中添加代码来绘制自定义的对象组合。`ApiEquals` 方法我们之前见过。在这种情况下，如果两个对象具有相同的字体和文本，`ApiEquals` 方法返回
    true。


    ### 演示：MmgFont 类


    在本节中，我们将通过查看 MmgTestSpace 包中 `ScreenTestMmgFont` 类的特定方法来演示 `MmgFont` 类的使用。此屏幕上显示了许多字体示例；我们只查看其中的一部分。请务必运行示例应用程序并实际查看这个示例游戏屏幕。


    ```

    01     fontBoldLg = MmgFontData.CreateDefaultBoldMmgFontLg();

    02     fontBoldLg.SetText("Font Bold Large");

    03     fontBoldLg.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 1));

    04     fontBoldLg.SetX(y);

    05     AddObj(fontBoldLg);


    07     fontBoldMd = MmgFontData.CreateDefaultBoldMmgFont(title.GetFontSize() -
    MmgHelper.ScaleValue(2));

    08     fontBoldMd.SetText("Font Bold Medium");

    09     fontBoldMd.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 2));

    10     fontBoldMd.SetX(y);

    11     AddObj(fontBoldMd);


    13     fontBoldSm = MmgFontData.CreateDefaultBoldMmgFontSm();

    14     fontBoldSm.SetText("Font Bold Small");

    15     fontBoldSm.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 3));

    16     fontBoldSm.SetX(y);

    17     AddObj(fontBoldSm);

    清单 2-18

    MmgFont 类演示 1

    ```


    我们的回顾从第 1 行的代码开始。这是一个加载缩放后的大号粗体字体并设置其位置的示例。请注意，在第 5 行，扩展了 `MmgObj` 类的 `MmgFont`
    对象通过调用 `AddObj` 方法被添加到游戏屏幕的默认绘制例程中。第 7–11 行和第 13–17 行的其余代码块执行与我们刚刚回顾的代码相同的操作，只是使用了不同大小的字体。请务必花点时间查看不同的字体条目，这样你就能了解如何在游戏中创建和使用不同的字体。


    ## 基类：MmgSound


    `MmgSound` 类用于封装框架的声音类，并为 MmgBase API 提供音频支持。`MmgSound` 类负责播放音效和背景音乐。它与其他类略有不同，因为它是一种资源，但不是可绘制资源。`MmgSound`
    类被设计为使用静态的全局音量值。代码中还确保了每个 `MmgSound` 实例都有一个唯一的 ID 值。该类具有克隆、字符串表示和比较功能。

    '
- fmt: '### Static Class Members


    The `MmgSound` class has some static class members for us to review.


    ```

    private static int ID_SRC = 0;

    public static float MMG_SOUND_GLOBAL_VOLUME = 0.65f;

    public static float SetVolume(float f) { ... }

    ```


    *Listing 2-19 MmgSound Static Class Members 1*


    The first class field is a private field, `ID_SRC`, and it is used as part of
    the class constructor to set a unique ID for that instance of the class. The next
    static class field listed in the preceding is the `volume` field. It is used to
    set the volume of all `MmgSound` instances. The global volume is checked on each
    call to the sound’s play method right before the sound is played.


    The last static class member to review is the `SetVolume` method. This method
    is used to update the global volume value while applying a minimum and a maximum
    constraint. The `SetVolume` method returns the value of the `volume` field that
    it just updated. This ensures that the method caller is aware of any volume range
    constraints applied to the volume’s value.


    ### Class Fields


    The `MmgSound` class has a few class fields that support sound resources, volume,
    and playback rate for us to discuss.


    ```

    private int id;

    private String idStr;

    private Clip sound;

    private float usedVolume;

    private float range;

    ```


    *Listing 2-20 MmgSound Class Fields 1*


    The `id` field gets stamped with a unique value when the `MmgSound` object is
    created. The `idStr` field is similar except that it holds a string representation
    of the `id` field. The `sound` field is an instance of the framework’s sound class.
    In the Java implementation of the game engine, the framework’s sound class is
    the `Clip` class.


    The `usedVolume` class field stores the volume applied to the sound. If the static
    class field, `volume`, changes after `usedVolume` is set, the volume of the sound
    will be automatically updated the next time it’s played. The last entry in the
    set of fields listed in the preceding is the private class field `range`. This
    field is used to describe a volume range when applying a new volume to the current
    sound.


    ```

    private float gain;

    private FloatControl vol;

    private float currentVolume;

    private float currentRate;

    ```


    *Listing 2-21 MmgSound Class Fields 2*


    The private class field `gain` is a calculated adjustment used to alter the sound’s
    volume. The `FloatControl` instance `vol` is a Java-specific implementation used
    to set the volume and rate of the sound. It is a control class used to manage
    attributes of the sound clip.


    ### Support Method Details


    Let’s take a look at the first set of support methods to review.


    ```

    public void ApplyVolume() { ... }

    public void ApplyRate(float rate) { ... }

    public float GetCurrentRate() { ... }

    public float GetCurrentVolume() { ... }

    public String GetIdStr() { ... }

    ```


    *Listing 2-22 MmgSound Support Method Details 1*


    The `ApplyVolume` support method is used to update the volume of the `sound` and
    the `usedVolume` class field. The method uses Java framework classes to set the
    gain of the sound clip based on the available volume range and the global volume
    value. The `currentVolume` class field is also updated by this method to reflect
    the volume used.


    The next support method to review is the `ApplyRate` method. This method is used
    to set the playback rate of the sound if it’s supported. The sample rate is not
    controlled by a global static value like the way the volume is controlled. Each
    `MmgSound` instance can have its own playback rate. This method also updates the
    `currentRate` field. As you can see, the `currentVolume` and `currentRate` fields
    are descriptive and shadow the values used by the sound object.


    The next two support methods, `GetCurrentRate` and `GetCurrentVolume`, are just
    simple get methods that return the current value of their associated fields. The
    last entry in this set of methods is the `GetIdStr` method. This method returns
    the value of the `idStr` field, which is a string representation of the class’
    `id` field.


    ```

    public int GetId() { ... }

    private void SetId() { ... }

    public Clip GetSound() { ... }

    public void SetSound(Clip snd) { ... }

    ```


    *Listing 2-23 MmgSound Support Method Details 2*


    The `GetId` method is your typical field access method; however, the `SetId` method
    is not your typical set method. The `SetId` method is private, and it’s used internally
    by the class to assign a value to the `id` field of each new class instance. The
    remaining two support methods provide access to the `sound` field allowing you
    to set or get the framework class that the `MmgSound` class wraps.


    ### Main Method Details


    We’ll begin the `MmgSound` class main method review with the constructors listed
    in the following group.


    ```

    public MmgSound(Clip se) { ... }

    public MmgSound(MmgSound obj) { ... }

    public MmgSound Clone() { ... }

    ```


    *Listing 2-24 MmgSound Main Method Details 1*


    The first constructor takes a framework sound class as an argument. In the Java
    implementation, this is the `Clip` class. In the C# implementation, the `SoundEffect`
    class is used. The global volume is applied to the new sound instance via the
    `ApplyVolume` method call. The constructor also calls the `SetId` method giving
    the new class instance a unique identity. The second constructor listed is a specialized
    constructor that takes an `MmgSound` instance as an argument and uses it to create
    a new, unique `MmgSound` object from the existing one.


    ```

    public void Play() { ... }

    public void Play(int loop, float rate) { ... }

    public void Stop() { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgSound obj) { ... }

    ```


    *Listing 2-25 MmgSound Main Method Details 2*


    The class provides two ways to play the sound resource. The first way, listed
    in the preceding, takes no arguments and is a direct way to play a sound. The
    sound is reset for playback, and it is configured not to loop. This method is
    for quickly playing sound effects and shorter sounds that don’t need looping.


    The second `Play` method takes two arguments and can be used to set the loop count
    and the playback rate before playing the sound. This method is convenient for
    longer-duration sounds like background music. Notice that we set the loop number
    for the sound’s playback, meaning the sound will play in full that many times
    before stopping.


    The final main method left to review is the `Stop` method. The sound is stopped,
    and the volume is synced to the global value before the method returns. Notice
    that both play methods and the stop method all ensure that the sound object’s
    volume matches the global volume. It makes sense because in a game we could have
    a number of different sounds playing and available to play. The class is configured
    to automatically keep all sound object instances synchronized to the global volume.


    The remaining two main methods I’d like to discuss are the `ApiToString` method
    and the `ApiEquals` method. We’ve seen both of these methods before, but I’ll
    briefly cover them again here. The `ApiToString` method is used to create a string
    representation of the `MmgSound` class. The method is useful in debugging and
    logging situations. The `ApiEquals` method is used to compare two `MmgSound` instances
    and determine their equality.'
