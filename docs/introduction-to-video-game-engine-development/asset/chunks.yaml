- fmt: '### Main Method Details


    The `GamePanel` class has a few main methods, listed in the following grouping,
    that we should discuss.


    ```

    //Rendering methods

    public void PrepBuffers() { ... }

    public BufferedImage create(int width, int height, boolean alpha) { ... }

    public Canvas GetCanvas() { ... }

    public Graphics2D GetBuffer() { ... }

    public boolean UpdateScreen() { ... }

    public void UpdateGame() { ... }

    public void RenderGame() { ... }

    //Assorted main methods

    public GamePanel(MainFrame Mf, int WinWidth, int WinHeight, int X, int Y, int
    GameWidth, int GameHeight) { ... }

    public void SwitchGameState(GameStates g) { ... }

    public void HandleGenericEvent(GenericEventMessage obj) { ... }

    Listing 10-15

    GamePanel Main Method Details 1

    ```


    The `PrepBuffers` method sets the canvas buffer strategy to use two buffers, hence
    double buffering. The method also prepares the `background` and `backgroundGraphics`
    fields used in drawing the game panel. The `GetCanvas` method returns the `GamePanel`’s
    canvas field, and the `GetBuffer` method gets the next active buffer from the
    canvas.


    The `UpdateScreen` method causes the canvas’ double buffer to flip and a new buffer
    to be created. The `UpdateGame` method runs the update call of the game engine’s
    drawing routine. This results in the current game screen’s `MmgUpdate` method
    being called each game frame. Last but not least, the `RenderGame` method is responsible
    for getting the game frame built and drawing it on the canvas. This results in
    the current screen’s `MmgDraw` method being called each frame.


    The next method up for review is the class constructor. There is only one constructor,
    so you’ll have to live with it. It’s designed to plug into the static main class
    and be called after the `MainFrame` is initialized. It takes a reference to the
    main frame and some dimension and offset information as arguments. This constructor
    will create a new class instance that is ready to use.


    The `SwitchGameState` method is the default method for changing game states and
    subsequently game screens in the `GamePanel` class. This method is responsible
    for cleaning up the previous game state. This results in the previous game screen’s
    `UnloadResources` method being called. Once that’s done, the next game screen
    is prepped with a call to its `LoadResources` method. It then becomes the current
    screen and is actively drawn to the game’s window.


    The last method for us to review is the `HandleGenericEvent` method. This method
    handles generic events from the splash screen and loading screen classes. The
    splash screen class sends an event when its display time is up. The loading screen
    class sends an event when the loading process is complete. The game panel class
    reacts to these events by changing game states to the next state in the game loading
    sequence. The main menu is the last state in the startup process.


    ### In Depth: GamePanel


    For this class’ in-depth review section, we’ll be taking a look at a snippet of
    code from the `RenderGame` method. Take a look at the following listing.


    ```

    01     p.SetGraphics(g);

    02     p.SetAdvRenderHints();

    03     currentScreen.MmgDraw(p);


    05     if (MmgHelper.LOGGING == true) {

    06         tmpF = g.getFont();

    07         g.setFont(debugFont);

    08         g.setColor(debugColor);

    09         g.drawString(GamePanel.FPS, 15, 15);

    10         g.drawString("Var1: " + GamePanel.VAR1, 15, 35);

    11         g.drawString("Var2: " + GamePanel.VAR2, 15, 55);

    12         g.setFont(tmpF);

    13     }

    14 }


    16 //draws a scaled version of the state of the background buffer to the screen
    buffer if scaling is enabled

    17 if (scale != 1.0) {

    18     bg.drawImage(background, sMyX, sMyY, sWinWidth, sWinHeight, 0, 0, winWidth,
    winHeight, null);

    19 } else {

    20     bg.drawImage(background, myX, myY, null);

    21 }

    Listing 10-16

    GamePanel in Depth 1

    ```


    This little piece of innocuous code is actually the core of the game engine’s
    drawing routine. The first two lines of code set up the `MmgPen` field, `p`, to
    draw on a target surface, `g`. Remember `g` is the surface that will hold one
    game frame and is rendered by the current game screen. Advanced render hints are
    set, and the screen is drawn on line 3. The block of code from lines 5 to 13 is
    the debugging header that is drawn if the game has logging turned on. This header
    displays the game’s frame rate as well as two variables for debugging purposes.


    In this example, the graphics object `g` is set to draw on the `background` image.
    This is the surface that will hold the game’s next frame. Notice that on lines
    17–21, the image is drawn to the canvas, using the framework’s pen class, `bg`.
    Notice that because we’re drawing on an internal surface, the `background` image,
    we have implemented a triple buffering system for the game’s rendering engine.
    The game frame rendered by the current screen is then passed on to the canvas’
    internal double buffer.


