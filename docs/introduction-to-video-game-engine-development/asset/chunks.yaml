    ### 演示：MmgHelper 类


    `MmgHelper` 类包含大量强大且便捷的功能。要为我们回顾的每组方法编写示例，需要花费大量时间。此示例来自 MmgTestSpace 包（如果你使用
    C# 则称为命名空间）的 `ScreenTestMmgColor` 类。


    ```

    1 title.SetY(title.GetY() + MmgHelper.ScaleValue(30));

    2 AddObj(title);


    4 int yDiff = MmgHelper.ScaleValue(40);

    5 int yStrt = GetY() + MmgHelper.ScaleValue(140);

    清单 3-11

    MmgHelper 类演示 1

    ```


    第一段演示代码展示了可能是最重要的方法之一 `ScaleValue` 的使用。此示例展示了如何使用 `ScaleValue` 方法来包装用于定位可绘制对象的常量值。第
    4 行和第 5 行所示的第二种用例是在实例化用于定位、缩放和调整对象大小的变量时使用该方法。


    ```

    1 title = MmgFontData.CreateDefaultBoldMmgFontLg();

    2 title.SetText("");

    3 MmgHelper.CenterHorAndTop(title);

    4 title.SetY(title.GetY() + MmgHelper.ScaleValue(30));

    清单 3-12

    MmgHelper 类演示 2

    ```


    在下一段演示代码中，我们可以看到如何使用 `MmgHelper` 类的定位方法。在此示例中，`title` 在水平方向上居中并放置在游戏屏幕的顶部。这里的一个微妙之处在于调用
    `CenterHorAndTop` 方法后如何调整位置。后续代码行通过将 `title` 向下移动几个像素来略微调整定位。


    这是一个非常重要的类，具有许多功能和特性。请务必花时间回顾并理解我们未在此处涵盖的类方法。


    ## 辅助类：MmgScreenData


    `MmgScreenData` 类旨在保存有关游戏显示上下文的数据。例如，此类保存有关所需游戏面板和窗口尺寸的重要数据。此类是 MmgBase API 的一个关键特性，并在许多需要考虑屏幕尺寸的地方使用。

