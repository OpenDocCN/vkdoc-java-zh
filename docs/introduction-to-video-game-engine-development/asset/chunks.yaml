    22 if (tB != null && tB1 != null) {

    23     lb = new MmgLoadingBar(tB1, tB);

    24     lb.SetMmgColor(null);

    25     lb.SetWidth(tB.GetWidth() - MmgHelper.ScaleValue(10));

