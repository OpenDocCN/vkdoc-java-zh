    ## 游戏屏幕：ScreenMainMenu


    `ScreenMainMenu` 类扩展了 MmgBase API 的 `MmgGameScreen` 类。该类提供了一个主菜单屏幕，该屏幕能够感知 MmgCore
    API 的游戏状态和游戏面板方面。你会注意到这个屏幕与我们之前审查过的两个游戏屏幕有一些相似之处。


    ### 类字段


    该类的字段混合了我们之前见过的一些标准字段，以及一组驱动屏幕菜单系统的字段。我将这些字段分为以下代码片段中列出的两组。


    ```

    //标准字段

    public GameStates state;

    public GamePanel owner;

    public Hashtable classConfig;

    //菜单系统字段

    public MmgBmp menuTitle;

    public MmgBmp menuSubTitle;

    public MmgBmp menuStartGame;

    public MmgBmp menuExitGame;

    public MmgBmp menuFooterUrl;

    public MmgBmp menuCursor;

    public MmgMenuContainer menu;

    public MmgSound menuSound;

    public MmgFont version;

    public HandleMainMenuEvent handleMenuEvent = null;

    代码清单 14-24

    ScreenMainMenu 类字段 1

    ```


    第一组类字段是我们在本章中之前见过的一些标准字段。`state` 和 `owner` 字段用于将屏幕与游戏面板和游戏状态值关联起来。第三个条目 `classConfig`
    用于保存在运行时加载的类配置数据（如果有的话）。


    第二组字段用于驱动屏幕的菜单系统。前五个字段是 `MmgBmp` 图像对象，用于表示主菜单的五个视觉元素。这些元素分别是标题、副标题、开始游戏选项、退出游戏选项和页脚。`menuCursor`
    字段也是一个 `MmgBmp` 图像，用于绘制菜单系统的光标。


    `MmgMenuContainer` 字段 `menu` 用于保存基于菜单组前五个字段的菜单项。`menuSound` 字段保存一个音效，当菜单项被选中时会播放该音效。`version`
    字段是另一个视觉元素，用于在菜单屏幕的左下角显示版本字符串。列出的最后一个条目 `handleMenuEvent` 是一个类字段，为菜单系统提供事件处理。


    ### 支持方法详情


    `ScreenMainMenu` 类有一小组支持方法供我们审查。让我们来看一下！


    ```

    public GameStates GetGameState() { ... }

    public boolean GetIsDirty() { ... }

    public void SetIsDirty(boolean b) { ... }

    public void DrawScreen() { ... }

    代码清单 14-25

    ScreenMainMenu 支持方法详情 1

    ```


    `GetGameState` 方法返回分配给游戏屏幕的游戏状态值。接下来的两个方法是该类 `isDirty` 字段的 get 和 set 方法。该字段用于启用类的
    `MmgUpdate` 方法在下一个游戏帧中运行。最后一个要审查的方法是 `DrawScreen` 方法。该方法作为类更新调用的一部分被调用；它通常响应用户输入而重绘屏幕。


    ### 主要方法详情


    该类的主要方法包括构造函数、输入方法、资源管理方法以及作为游戏引擎绘制例程一部分的绘制方法。


    ```

    public ScreenMainMenu(GameStates State, GamePanel Owner) { ... }

    public boolean ProcessAClick(int src) { ... }

    public boolean ProcessDpadRelease(int dir) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public void MmgDraw(MmgPen p) { ... }

    代码清单 14-26

    ScreenMainMenu 主要方法详情 1

    ```


    第一个条目，正如所料，是一个类构造函数。该构造函数接受我们在 `ScreenSplash` 和 `ScreenLoading` 类审查中见过的相同参数。构造函数期望一个游戏状态和一个游戏面板作为参数。接下来列出的两个主要方法是输入处理器
    `ProcessAClick` 和 `ProcessDpadRelease`。


    这些方法被定义并连接到屏幕的菜单系统中。`ProcessAClick` 输入处理器主要用于检测何时选中了一个菜单选项。`ProcessDpadRelease`
    输入处理器主要用于处理方向键输入，并使用它来在菜单中移动光标。


    接下来的两个方法是屏幕资源管理方法 `LoadResources` 和 `UnloadResources`。`LoadResources` 方法准备屏幕的所有资源，使该类准备好进行显示。`UnloadResources`
    方法则逆转此过程，释放该类的所有资源。


    最后但同样重要的是，我们拥有熟悉且喜爱的 `MmgUpdate` 和 `MmgDraw` 方法。`MmgUpdate` 方法响应游戏引擎绘制例程的更新调用，并负责准备屏幕的菜单系统。`MmgDraw`
    方法将屏幕渲染到显示器上。

