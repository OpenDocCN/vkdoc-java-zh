    ```


    The use of the class constructor shows us how the `ScreenSplash` class is initialized.
    Notice that it takes a game state and a game panel for arguments. The second line
    of code registers the `GamePanel` class as the splash screen’s generic event handler.
    This means that the game panel can receive certain events from the splash screen
    class. The next snippet of code is from the `GamePanel` class’ `SwitchGameState`
    method.


    ```

    1 } else if (prevGameState == GameStates.SPLASH) {

    2     MmgHelper.wr("Hiding SPLASH screen.");

    3     screenSplash.Pause();

    4     screenSplash.SetIsVisible(false);

    5     screenSplash.UnloadResources();

    6 }

    Listing 14-15

    ScreenSplash Class Demonstration 2

    ```


    In this snippet, the `GamePanel`’s `prevGameState` field is used to clean up the
    previous game state before changing to the new state. Note that the game screen
    is paused and hidden and its resources released all as part of deactivating the
    screen.


    ```

    1 } else if (gameState == GameStates.SPLASH) {

    2     MmgHelper.wr("Showing SPLASH screen.");

    3     screenSplash.LoadResources();

    4     screenSplash.UnPause();

    5     screenSplash.SetIsVisible(true);

    6     screenSplash.StartDisplay();

    7     currentScreen = screenSplash;

    8 }

    Listing 14-16

    ScreenSplash Class Demonstration 3

    ```


    The final snippet of demonstration code is also from the `SwitchGameState` method.
    This code shows how the splash screen is activated for display. Notice the order
    in which the screen’s methods are called. First, the screen’s resources are loaded.
    Then the screen is unpaused and made visible. A screen-specific method, `StartDisplay`,
    is called to start the splash screen’s internal timer. The final line of code
    is very important. This line sets the game screen as the active game screen for
    the `GamePanel` class, line 7.


    ## Game Screens: `ScreenLoading`


    The `ScreenLoading` class is similar to the `ScreenSplash` class in that they
    are both concrete implementations of an `MmgBase` class. In this case, the `ScreenLoading`
    class extends the `MmgLoadingScreen` class. The `ScreenLoading` class extends
    its super class adding support for game screens and game panels.


    ### Static Class Members


    The `ScreenLoading` class has one static class member just like its splash screen
    counterpart.


    ```

    public static int EVENT_LOAD_COMPLETE = 0;

    Listing 14-17

    ScreenLoading Static Class Members 1

    ```


    In the same fashion as the `ScreenSplash` class, the `ScreenLoading` class’ static
    field is used as an event ID that marks an event object as indicating the screen
    is done loading resources.


    ### Class Fields


    Some of the class fields listed in the following snippet should be familiar from
    our review of the `MmgLoadingScreen` and `RunResourceLoad` classes.


    ```

    public RunResourceLoad datLoad;

    public GameStates state;

    public GenericEventHandler handler;

    public GamePanel owner;

    public long slowDown;

    public Hashtable classConfig;

    Listing 14-18

    ScreenLoading Class Fields 1

    ```


    The `datLoad` field is responsible for running the resource load in a new thread.
    The `state` field is the game state this game screen is associated with. Next,
    the `handler` field receives any generic events generated by the `ScreenLoading`
    class. Lastly, the `owner` field is the `GamePanel` object this screen belongs
    to.


    The `slowDown` field that follows should look familiar. This value is used to
    artificially sleep the resource loading thread so that the loading screen’s progress
    bar is easier to see during small resource loads. The last entry is the `classConfig`
    field. This field is used to hold class config file data if any exists.


    ### Support Method Details


    The `ScreenLoading` class has a number of support methods that give you access
    to pertinent class fields, start and stop the resource load, and set up the generic
    event handler. Let’s take a look!


    ```

    public RunResourceLoad GetLoader() { ... }

    public void SetLoader(RunResourceLoad DatLoad) { ... }

    public boolean GetLoadComplete() { ... }

    public boolean GetLoadResult() { ... }

    public GameStates GetGameState() { ... }

    public GenericEventHandler GetGenericEventHandler() { ... }

    public void SetGenericEventHandler(GenericEventHandler Handler) { ... }

    public long GetSlowDown() { ... }

    public void SetSlowDown(long l) { ... }

    public boolean GetResourceFileData() { ... }

    public void StartDatLoad() { ... }

    public void StopDatLoad() { ... }

    Listing 14-19

    ScreenLoading Support Method Details 1

    ```


    I’ve listed the support methods in the preceding in roughly the same order as
    the class fields previously reviewed. The first two entries are get and set methods
    for the `datLoad` field. The `GetLoadComplete` and `GetLoadResults` methods provide
    access to resource load status information. We’ve seen the `GetGameState` method
    before. It provides access to the screen’s game state value. The next four methods
    are two get and set pairs for the `handler` and `slowDown` fields, respectively.


    The `GetResourceFileData` method’s only purpose is to determine if there are any
    resources to load. It doesn’t perform any advanced scans; it’s just looking for
    at least one resource to load. The last two methods are responsible for starting
    and stopping the resource load process, the `StartDatLoad` and `StopDatLoad` methods.
    Keep an eye out for those two methods in the class’ demonstration section.


    ### Main Method Details


    The `ScreenLoading` class has a standard set of main methods for us to look at,
    listed in the following group.


    ```

    public ScreenLoading(MmgLoadingBar LoadingBar, float lBarOff, GameStates State,
    GamePanel Owner) { ... }

    public ScreenLoading(GameStates State, GamePanel Owner) { ... }

    public void HandleUpdate(LoadResourceUpdateMessage obj) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 14-20

    ScreenLoading Main Method Details 1

    ```


    The first constructor listed lets you set the loading bar’s positioning offset.
    Remember these fields from our review of the `MmgLoadingScreen` class. It also
    takes arguments for the game state and the game panel this game screen belongs
    to. The second constructor listed is an abridged version that doesn’t take any
    loading bar arguments. You’ll be expected to set them on your own before you use
    the class.


    The `HandleUpdate` main method is used to process resource load update events.
    These are used to set the values of the loading bar. The next two entries we’ve
    seen a few times before. The `LoadResources` method sets up all the class’ resources
    so it’s ready to be displayed. The `UnloadResources` method releases all class
    resources. The last entry is the `MmgDraw` method, which is called by the `GamePanel`
    class as part of the engine’s drawing routine. The `MmgDraw` method renders the
    game screen to the display.'
