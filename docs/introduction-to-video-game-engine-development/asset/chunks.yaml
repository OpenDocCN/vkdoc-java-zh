    ## 辅助类：MmgDebug


    `MmgDebug` 类与 `MmgApiUtils` 类类似，都是一个提供日志记录功能的便捷访问类。同样，我们在 `MmgApiUtils` 和 `MmgHelper`
    类中也见过类似的功能。那么，为什么我们还需要另一个日志记录辅助类呢？嗯，在这种情况下，拥有多个日志记录类并非最糟糕的事情；它甚至还有点用处。这里的想法是，你可以使用不同的日志记录类，独立地为游戏的不同部分提供输出。


    ### 静态类成员


    `MmgDebug` 类只有两个静态字段需要我们查看。


