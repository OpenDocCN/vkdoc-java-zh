    ```

    public MmgVector2() { ... }

    public MmgVector2(MmgVector2 v) { ... }

    public MmgVector2(double[] v) { ... }

    public MmgVector2(double x, double y) { ... }

    public MmgVector2(float x, float y) { ... }

    public MmgVector2(int x, int y) { ... }

    public MmgVector2 Clone() { ... }

    public MmgVector2 CloneFloat() { ... }

    public MmgVector2 CloneDouble() { ... }

    public MmgVector2 CloneInt() { ... }

    清单 2-37

    MmgVector2 主要方法详解 1

    ```


    上面列出的构造函数演示了对使用整数、浮点数和双精度浮点数初始化类的支持。针对列出的每种情况都有一个构造函数，甚至还有一些未在此列出的构造函数。接下来我们要审查的一组主要方法是克隆方法。虽然每个克隆方法都返回一个
    `MmgVector2` 实例，但每个方法都略有不同。例如，在所有类型显式克隆方法 `CloneInt`、`CloneFloat` 和 `CloneDouble`
    中，都会使用转换为指定数据类型的值来创建一个新的对象实例。通用的 `Clone` 方法会创建一个新的对象实例，但使用分量值的数组条目来实现。


    最后剩下要审查的一组主要方法包含 `ApiToString` 和 `ApiEquals` 方法。`ApiToString` 方法是一个 API 级别的方法，用于将给定的
    `MmgVector2` 实例表示为字符串。它只是将 X 和 Y 分量值作为双精度浮点数打印在对象的字符串描述中。`ApiEquals` 方法类似于我们之前看到的
    API 比较方法。它是 MmgBase API 用于比较类实例的 API 级别方法。


    ### 演示：MmgVector2 类


    并没有专门针对 `MmgVector2` 类的示例游戏画面，但该类在 MmgTestSpace 库中的每一个示例游戏画面上都被使用。让我们看看使用 `MmgVector2`
    类的一种方式。


    ```

    1 pause = true;

    2 SetHeight(MmgScreenData.GetGameHeight());

    3 SetWidth(MmgScreenData.GetGameWidth());

    4 SetPosition(MmgScreenData.GetPosition());

    清单 2-38

    MmgVector2 类演示 1

    ```


    在 MmgTestSpace 库中任何游戏画面的 `LoadResources` 方法中，都可以找到上面列出的代码。第 4 行的 `SetPosition`
    方法用于将游戏画面定位到 `MmgScreenData` 类指定的正确偏移量。偏移量信息存储为 `MmgVector2` 实例，因为它具有 X 和 Y 分量值。

