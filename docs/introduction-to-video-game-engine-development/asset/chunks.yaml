    ### Class Fields


    The `MmgVector2` class has only one class field to speak of. Don’t you wish they
    were all this simple? The only class field for us to review is an array of doubles
    named `vec`. This array will be initialized to a length of two, representing X
    and Y components. The class is designed to hold either an integer, float, or double
    pair of values. In most cases, and for all drawing-related purposes, using integer
    values makes the most sense because the screen coordinates will always be integer
    values.


    ### Support Method Details


    The `MmgVector2` class has a number of get and set support methods. These simple
    methods are really important because they define an interaction with the `MmgVector2`
    class that uses integers, floats, or doubles. This gives you a lot of flexibility
    in how you decide to use the class.


    ```

    public double[] GetVector() { ... }

    public void SetVector(double[] v) { ... }

    public int GetX() { ... }

    public void SetX(int x) { ... }

    public float GetXFloat() { ... }

    public void SetX(float x) { ... }

    public double GetXDouble() { ... }

    public void SetX(double x) { ... }

    Listing 2-35

    MmgVector2 Support Method Details 1

    ```


    The first two entries listed in the preceding are get and set methods for the
    class’ vector array. This lets you quickly and easily set a vector object’s value
    using an array of doubles. The next six methods are all get and set methods for
    the X and Y component values. In each case, the get method is designed to return
    the X component value in a specific data type. The class supports double, float,
    and integer representations of the X component value.


    Similarly, you can set the X component value using a version of the set method
    that takes an argument of the desired type, double, float, or integer. Both types
    of methods work together to create three distinct ways to interact with the X
    component’s value. The next set of support methods provide similar functionality
    for the Y component value.


    ```

    public int GetY() { ... }

    public void SetY(int y { ... }

    public float GetYFloat() { ... }

    public void SetY(float y) { ... }

    public double GetYDouble() { ... }

    public void SetY(double y) { ... }

    Listing 2-36

    MmgVector2 Support Method Details 2

    ```


    This concludes the “Support Method Details” section of the class review. Up next,
    we’ll look at some of the class’ main methods.


    ### Main Method Details


    This section of the `MmgVector2` class starts with a set of constructors that
    demonstrate the flexibility of the class.


    ```

    public MmgVector2() { ... }

    public MmgVector2(MmgVector2 v) { ... }

    public MmgVector2(double[] v) { ... }

    public MmgVector2(double x, double y) { ... }

    public MmgVector2(float x, float y) { ... }

    public MmgVector2(int x, int y) { ... }

    public MmgVector2 Clone() { ... }

    public MmgVector2 CloneFloat() { ... }

    public MmgVector2 CloneDouble() { ... }

    public MmgVector2 CloneInt() { ... }

    Listing 2-37

    MmgVector2 Main Method Details 1

    ```


    The constructors listed in the preceding demonstrate support for initializing
    the class with integers, floats, and doubles. There is a constructor for each
    case listed and even a few more that aren’t listed here. The next set of main
    methods for us to review are cloning methods. While each cloning method returns
    an `MmgVector2` instance, each method is a little unique. For instance, in all
    of the type-explicit cloning methods, `CloneInt`, `CloneFloat`, and `CloneDouble`,
    a new object instance is created using values cast to the specified data type.
    The generic `Clone` method creates a new object instance but uses the array entries
    for the component values to do so.


    The final set of main methods left to review contains the `ApiToString` and `ApiEquals`
    methods. The `ApiToString` method is an API-level method for representing the
    given `MmgVector2` instance as a string. It simply reports the X and Y component
    values as doubles printed in a string description of the object. The `ApiEquals`
    method is like the previous API comparison methods we’ve seen. It’s an API-level
    method used by the MmgBase API for comparing class instances.


    ### Demonstration: MmgVector2 Class


    There isn’t an example game screen just for the `MmgVector2` class specifically,
    but the class is used on every single example game screen in the MmgTestSpace
    library. Let’s take a look at one way the `MmgVector2` class is used.


    ```

    1 pause = true;

    2 SetHeight(MmgScreenData.GetGameHeight());

    3 SetWidth(MmgScreenData.GetGameWidth());

    4 SetPosition(MmgScreenData.GetPosition());

    Listing 2-38

    MmgVector2 Class Demonstration 1

    ```


    In the `LoadResources` method of any game screen in the MmgTestSpace library,
    the code listed in the preceding can be found. The `SetPosition` method, line
    4, is used to position the game screen to the correct offsets specified by the
    `MmgScreenData` class. The offset information is stored as an `MmgVector2` instance
    because it has X and Y component values.'
