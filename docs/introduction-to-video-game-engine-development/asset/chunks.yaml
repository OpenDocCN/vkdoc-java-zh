- fmt: '### Static Class Members


    The `MmgScreenData` static class members we’ll review start with a set of class
    fields that describe the game’s dimensions.


    ```

    public static int DEFAULT_WIDTH = 1024;

    public static int DEFAULT_HEIGHT = 768;

    private static int gameWidth;

    private static int gameHeight;

    private static int gameLeft;

    private static int gameTop;

    private static int screenWidth;

    private static int screenHeight;

    Listing 3-13

    MmgScreenData Static Class Members 1

    ```


    The first two static class fields listed in the preceding are default values for
    the width and height of the game panel and screen. The next two class fields hold
    data about the desired dimensions of the game, `gameWidth` and `gameHeight`. The
    `gameLeft` and `gameTop` static class fields may seem a little odd at first.


    Normally you would expect them to both always be zero, but in our case, the game
    engine has the ability to display a development header with frame rate information
    and some variable debugging. This pushes down the game’s panel, so we need the
    ability to set the panel’s offset. The last two fields in the set are the `screenWidth`
    and `screenHeight` entries.


    Note that the game screen only has dimension data, while the renderable area of
    the screen, the game panel, has dimension and position data. Why do you think
    that is? This is because the renderable area of the screen may be smaller than
    the window itself and so the game panel would be rendered at offset `gameLeft`
    and `gameTop`.


    ```

    private static double scaleX;

    private static double scaleY;

    private static boolean scaleXOn;

    private static boolean scaleYOn;

    private static MmgVector2 scaleVec = MmgVector2.GetUnitVec();

    private static MmgVector2 posVec;

    Listing 3-14

    MmgScreenData Static Class Members 2

    ```


    The next set of static class fields begins with two scaling fields. The `scaleX`
    and `scaleY` fields hold data about the scaling needed to present the game panel
    inside the dimensions of the game window. For instance, if the desired game dimensions
    are larger than the game window, the game dimensions will be scaled down to fit,
    centered, inside the game window. The `scaleX` and `scaleY` static class fields
    will hold the scaling values needed to accomplish this.


    The `scaleXOn` and `scaleYOn` static class fields are Boolean flags indicating
    that scaling is required on the X and/or the Y axis. Lastly, the `scaleVec` and
    `posVec` static class fields are convenience fields that hold scaling and position
    data for the X and Y coordinates.


    ```

    private static int origGameWidth;

    private static int origGameHeight;

    GRAPHICS_CONFIG = GraphicsEnvironment.getLocalGraphicsEnvironment().getDefaultScreenDevice().getDefaultConfiguration();

    public static ScalingMode scalingMode = ScalingMode.AXIS_X_AND_Y;

    Listing 3-15

    MmgScreenData Static Class Members 3

    ```


    The last set of static class fields is listed in the preceding. The first two
    entries are fields that track the initially specified game dimensions. If the
    game needs to be scaled to fit inside the game window, then these fields will
    have the original game dimensions. The `GRAPHICS_CONFIG` static class field is
    an important one; it holds information about the current graphics context.


    In other words, it holds information about the current graphics capabilities like
    screen dimensions, bit depth of each pixel, and so on. The final entry in the
    list of fields in the preceding is the `scalingMode` class field. This field is
    used to track what type of scaling was used to adjust the game panel. Next, we’ll
    take a look at some of the `MmgScreenData` class’ static methods.


    ```

    private static void CalculateLeft() { ... }

    private static void CalculateTop() { ... }

    public static void CalculateScaleAndOffset() { ... }

    private static void CalculateScaleX(boolean agg) { ... }

    private static void CalculateScaleY(boolean agg) { ... }

    Listing 3-16

    MmgScreenData Static Class Members 4

    ```


    The first two static methods for us to review, `CalculateLeft` and `CalculateTop`,
    have only one line each, and they are used as part of the game configuration process
    to set the `gameLeft` and `gameTop` class fields. The next method, `CalculateScaleAndOffset`,
    is also part of the configuration process and is used to prepare any scaling on
    the X and Y axes. If scaling is not needed, we set the `scaleX` and `scaleY` class
    fields to 1.0 or 100%. This means that no scaling is necessary.


    If we do need to do some scaling, we have to decide if we should support X axis
    scaling, Y axis scaling, or both. In our case, the method is locked to using both
    the X and Y axes. This causes the `CalculateScaleX` method to get called first
    and `CalculateScaleY` to get called subsequently if necessary. The next two methods
    up for review, `CalculateScaleX` and `CalculateScaleY`, are used to detect the
    necessary scaling value to correctly resize the game panel.


    These methods perform a series of loop iterations. In each iteration, a new scaling
    test is performed and checked to see that the scaling results are as close to
    an integer as possible. It does this by making tiny increments in the scaling
    amount. Because we don’t know if we’ll be able to find an adequate scaling value,
    we need another way to escape the while loop. In this case, if the number of loop
    iterations reaches the value of the panic variable, which is set to 5000, the
    loop exits.


    Once the loop is complete, the `prctDiffX` variable is used to set a number of
    static class fields. The scaling we’re trying to do here is uniform, so we end
    up scaling both the X and Y axes even though we’re only working with the X axis.
    Both `scaleX` and `scaleY` are set to the newly determined scaling value.


    If, after horizontal scaling is performed, the vertical size is still an issue,
    we then call the `CalculateScaleY` method to determine the best scaling value
    to use that now, also, takes into account the current scaling results. The `CalculateScaleX`
    and `CalculateScaleY` methods are very similar, so we won’t cover it again here.
    Make sure you read and understand these methods. The goal here isn’t to have a
    robust game screen scaling implementation; it’s just to have a simple, direct
    way to fit the game panel into the game window’s dimensions.


    Take note that this class is meant to hold centralized data about the dimensions
    of the game panel and window as well as information about the current scaling
    of the screen. If you recall, we encountered image scaling calls in the `MmgHelper`
    class that used the scaling values determined here. This is a safe operation because
    the default expectation is that the scaling is uniform. The while loop is simply
    trying to determine a scaling value that results in near-integer values, so image
    scaling is smooth.


    The last set of methods we have to review are the `GetGameRight` and `GetGameBottom`
    methods. These methods are used to calculate the right and bottom positions of
    the game panel based on its dimensions and current offset. Take a moment to review
    any methods we didn’t get a chance to cover here.


    ### Enumerations


    The `MmgScreenData` class has one associated enumeration for us to review. The
    `ScalingMode` enumeration is used to describe the type of scaling that was determined
    to be necessary by the `MmgScreenData` class. A value from this enumeration is
    used to set the `scalingMode` class field.'
