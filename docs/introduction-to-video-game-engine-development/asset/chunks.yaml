- fmt: '### Demonstration: `MmgGameScreen` Class


    Because the `MmgGameScreen` class is the super class, base class in C#, of all
    MmgBase API screen classes and all MmgCore screen classes, I recommend going over
    the `MmgSplashScreen`, `MmgLoadingScreen`, and their respective demonstration
    sections as a solid example of the `MmgGameScreen` class in use.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s game screen classes.
    These classes represent the apex of functionality in the MmgBase API. The classes
    also represent the point of functionality in the MmgBase API that interacts directly
    with the MmgCore API via the game panel class.


    Keep in mind that these classes, like many of the classes in the MmgBase API,
    are loosely defined. This means you’ll most likely have to extend their functionality
    and adjust the class so that it works with your design goals. In this case, we
    saw the MmgCore API’s `ScreenSplash` and `ScreenLoading` classes as examples of
    a concrete implementation of the game screens. Let’s take a look at a summary
    of the classes we’ve reviewed:


    - `MmgSplashScreen`: An API class for representing a game’s splash screen. This
    class is designed to display a logo for a few seconds before firing a finishing
    event.

    - `MmgLoadingScreen`: An API class for representing a game’s loading screen. This
    class is loosely defined and doesn’t enforce a resource loading structure.

    - `MmgGameScreen`: An API class for representing a game screen as you would see
    on any 2D video game. This class has a number of features that can be turned off
    to simplify its rendering.


    You should start to see the structure of the game engine now that we’ve finished
    reviewing all the major classes in the engine’s MmgBase API. These classes constitute
    a set of tools designed to work around the `MmgObj` class facilitating the advanced
    interaction of the API’s set of drawable classes. We’ve seen how easy it is to
    add new functionality to the API while still maintaining the ability to plug directly
    into the game engine’s drawing routine.


    I should mention that you will want to be careful when implementing a new game
    screen for the first time. Be sure to understand how your game screen’s underlying
    class handles update and draw calls. Some screen classes may be designed to only
    update when the `isDirty` field is set to true. Some objects and screens require
    the class to update on every frame, so be aware of this, or you’ll end up scratching
    your head wondering why your objects aren’t animating.


    # Part 2


    # 9. MmgCore API Introduction


    Part 2 of this book contains a comprehensive review of the game engine’s runtime
    code. This code exists in both Java and C# and is included in the main project
    under the MmgCore package, or namespace if you’re following along in C#. The MmgCore
    API is responsible for handling command-line arguments, processing game engine
    config files, creating the game’s window, routing input, managing game screens,
    and much, much more.


    In many game engine implementations, there is a “player” designed to run the compiled
    game code. In our implementation, the runtime code is included as part of the
    compiled game. This is done by including all of the core functionality of the
    game engine in the MmgCore API. Thus, any game created will include all of the
    runtime code, and that allows you to control it and customize it as needed. In
    the end, I think it was the better decision to make the runtime code more available
    and part of the game.


    ## Runtime API Overview


    Before we get into a detailed code review, let’s talk a little bit about the MmgCore
    API. This API has the most differences between the C#/MonoGame and the Java/Swing
    implementations. Although both APIs are functionally equivalent, there are a few
    major differences between the two implementations I’d like to discuss.


    One major difference between the two implementations is that the `MainFrame` class
    doesn’t exist in the C# implementation. This is because the Java implementation
    uses Swing to drive the windowing for the game and there is a concept of a frame
    to hold the game panel. In the C# implementation, there is no main frame, and
    that functionality has been moved into a hybrid game panel class.


    You’ll find that equivalent methods exist for both implementations and that the
    same code exists just in a slightly different location. In any case, it should
    still be very easy to follow along in C#. Another difference between the implementations
    I should mention is that in the C# version certain actions cannot be performed
    on a thread. This is because the actions require access to the graphics context,
    which is not thread-safe. In the C# version, a set of classes, designed to move
    the work from the child thread to the main thread, are used to overcome this limitation.


    The next difference I’d like to mention is that the unit tests also need access
    to the graphics context. To overcome this limitation, the unit tests are executed
    from the main game thread via a command-line argument. The test output is dumped
    to standard output.


    There is potential for having different keyboard codes between different operating
    systems and certainly between the C# and Java implementations. To overcome this
    limitation, there is a global flag that enables a key code conversion method to
    be called. You can use this method to create a uniform set of keyboard codes.
    The setting can be found in the `GameSettings` class, specifically the `INPUT_NORMALIZE_KEY_CODE`
    field.


    Similarly, the system fonts render a little bit differently across operating systems
    and between the C# and Java versions of the game engine. For the most part, you
    should be using images for your text and not `MmgFont` objects; but in any case,
    there is a global flag to turn on a font position adjustment method. This method
    will allow you to normalize font positioning between platforms. The flag can be
    found in the `MmgPen` class of the MmgBase API, specifically the `FONT_NORMALIZE_POSITION`
    field.


    The last major difference I should mention are the fonts. In Java, fonts can be
    resized on the fly, and you can create different sized fonts as you see fit. In
    the C# version, the fonts have to be prepared ahead of time. To overcome this
    difference in the C# implementation, we load up default fonts from size 1 to size
    50 and set a maximum font size of 50 for the game engine.


    We can mimic the Java version’s ability to create a new font instantly by preloading
    all the fonts that can be used. In this way, we overcome the technological differences
    between the two implementations. In this book, we’ll mainly follow the Java code,
    but you should be able to follow along in C# without too much trouble. The following
    is a summary of the classes we’ll cover in this part of the book.


    ### Game Engine Settings


    - `DatConstantsEntry`

    - `DatExternalStrings`

    - `GameSettings`

    - `GameSettingsImporter`


    ### Game Resource Loading Classes


    - `RunResourceLoad`

    - `GenericEventHandler`

    - `GenericEventMessage`

    - `LoadResourceUpdateHandler`

    - `LoadResourceUpdateMessage`


    ### Game Screens/Worker Threads


    - `RunFrameRate`

    - `Screen`

    - `ScreenMainMenu`

    - `ScreenSplash`

    - `ScreenLoading`

    - `HandleMainMenuEvent`


    ### Static Entry Point/Windowing Classes


    - `MmgApiGame`

    - `MainFrame`

    - `GamePanel`


    Completing this part of the game engine review will give you the full picture.
    You’ll be able to see in the code exactly where the MmgCore API hands off the
    work to the MmgBase API. You’ll gain experience understanding how to customize
    the game engine and configure the resource directories to support multiple projects.
    Once you’re done with this part of the text, you’ll be ready to build some games!'
  raw: '### Demonstration: MmgGameScreen Class


    Because the `MmgGameScreen` class is the super class, base class in C#, of all
    MmgBase API screen classes and all MmgCore screen classes, I recommend going over
    the `MmgSplashScreen`, `MmgLoadingScreen,` and their respective demonstration
    sections as a solid example of the `MmgGameScreen` class in use.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s game screen classes.
    These classes represent the apex of functionality in the MmgBase API. The classes
    also represent the point of functionality in the MmgBase API that interacts directly
    with the MmgCore API via the game panel class.


    Keep in mind that these classes, like many of the classes in the MmgBase API,
    are loosely defined. This means you’ll most likely have to extend their functionality
    and adjust the class so that it works with your design goals. In this case, we
    saw the MmgCore API’s `ScreenSplash` and `ScreenLoading` classes as examples of
    a concrete implementation of the game screens. Let’s take a look at a summary
    of the classes we’ve reviewed:


    *   MmgSplashScreen: An API class for representing a game’s splash screen. This
    class is designed to display a logo for a few seconds before firing a finishing
    event.


    *   MmgLoadingScreen: An API class for representing a game’s loading screen. This
    class is loosely defined and doesn’t enforce a resource loading structure.


    *   MmgGameScreen: An API class for representing a game screen as you would see
    on any 2D video game. This class has a number of features that can be turned off
    to simplify its rendering.


    You should start to see the structure of the game engine now that we’ve finished
    reviewing all the major classes in the engine’s MmgBase API. These classes constitute
    a set of tools designed to work around the `MmgObj` class facilitating the advanced
    interaction of the API’s set of drawable classes. We’ve seen how easy it is to
    add new functionality to the API while still maintaining the ability to plug directly
    into the game engine’s drawing routine.


    I should mention that you will want to be careful when implementing a new game
    screen for the first time. Be sure to understand how your game screen’s underlying
    class handles update and draw calls. Some screen classes may be designed to only
    update when the `isDirty` field is set to true. Some objects and screens require
    the class to update on every frame, so be aware of this, or you’ll end up scratching
    your head wondering why your objects aren’t animating.


    # Part 2.


    # 9. MmgCore API Introduction


    Part 2 of this book contains a comprehensive review of the game engine’s runtime
    code. This code exists in both Java and C# and is included in the main project
    under the MmgCore package, or namespace if you’re following along in C#. The MmgCore
    API is responsible for handling command-line arguments, processing game engine
    config files, creating the game’s window, routing input, managing game screens,
    and much, much more.


    In many game engine implementations, there is a “player” designed to run the compiled
    game code. In our implementation, the runtime code is included as part of the
    compiled game. This is done by including all of the core functionality of the
    game engine in the MmgCore API. Thus, any game created will include all of the
    runtime code, and that allows you to control it and customize it as needed. In
    the end, I think it was the better decision to make the runtime code more available
    and part of the game.


