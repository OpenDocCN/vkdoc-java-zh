- fmt: '### Main Method Details


    The class’ main methods start with a review of some of the available constructors.


    ```

    public MmgRect() { ... }

    public MmgRect(MmgRect obj) { ... }

    public MmgRect(int left, int top, int bottom, int right) { ... }

    Listing 2-11

    MmgRect Main Method Details 1

    ```


    The first constructor listed takes no arguments and creates a new `MmgRect` instance
    with height and width set to 1 and positioned at 0,0. The second constructor is
    a specialized constructor that creates a new `MmgRect` instance from an existing
    one. The last constructor listed in the preceding takes more granular data, left,
    top, bottom, right, values and uses them to create a new `MmgRect` object instance.


    ```

    public void ShiftRect(int shiftLeftRight, int shiftUpDown) { ... }

    public MmgRect ToShiftedRect(int shiftLeftRight, int shiftUpDown) { ... }

    public MmgRect Clone() { ... }

    Listing 2-12

    MmgRect Class Main Method Details 2

    ```


    The next two main methods we’ll cover help you shift the rectangle object in different
    ways. The `ShiftRect` method shifts the current object instance in the left-right
    and up-down directions by the amounts specified in the method arguments. The next
    main method, `ToShiftedRect`, is similar; but it doesn’t alter the current object
    instance. Instead, it creates and returns a new rectangle at the shifted position
    specified by the method arguments. These are convenient methods to use when you
    want to slightly adjust a rectangle or create a new one based on an existing instance.


    The last method in the set is the `Clone` method. We’ve come across this method
    before. The `MmgBase` API supports cloning functionality across all classes where
    it makes sense. All cloning methods make use of the specialized class constructor.


    ```

    public int GetDiffX(MmgRect inRect, int direction, boolean opposite, boolean left2right)
    { ... }

    public int GetDiffX(int x, int direction, boolean opposite) { ... }

    public int GetDiffY(MmgRect inRect, int direction, boolean opposite, boolean left2right)
    { ... }

    public int GetDiffY(int y, int direction, boolean opposite) { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgRect obj) { ... }

    Listing 2-13

    MmgRect Main Method Details 3

    ```


    The `GetDiffX` methods are a set of main methods that quickly calculate the horizontal
    difference between two `MmgRect` objects. Using the method parameters for the
    first `GetDiffX` method, the entry that takes four arguments, you can compare
    rectangles using the left or right coordinate. You can also specify which object
    is used first in the comparison and the direction of the comparison itself. This
    gives you a lot of power on how to compare two rectangles. This method takes some
    experience. Take your time with it before you use it in your game.


    The second `GetDiffX` method, the entry that takes three arguments, can be used
    to compare the current rectangle with an X coordinate. You can specify the rectangle
    coordinate you want to compare things with and the direction, left or right. You
    can also override the actual comparison by using the `opposite` argument. Again,
    this method takes some experience. Give yourself some time using it before you
    employ it in your game.


    The next two main methods I want to mention are the `GetDiffY` methods. They are
    very similar to the methods we just reviewed. They perform the same operations
    except they are designed to work with Y coordinates and the up and down directions.
    I won’t cover them in any detail here because they are so similar, but I recommend
    taking the time to look them over and make sure you understand how they work.


    The last two main methods to review with regard to the `MmgRect` class are the
    `ApiToString` and `ApiEquals` methods. The `ApiToString` method is used to create
    a string representation of the `MmgRect` class. This is an API-level method for
    representing a class instance as a string. The `ApiEquals` method is an API-level
    comparison method. It defines equality as two `MmgRect` instances having the same
    position and dimensions.


    ### Demonstration: MmgRect Class


    In this section, we’ll demonstrate use of the `MmgRect` class by looking at a
    few lines of code from the `ScreenTestMmgRect` class of the `MmgTestSpace` package,
    or namespace if you are following along in C#. We’ve seen a few `LoadResources`
    method reviews by now, so we’ll skip over some of the common code and focus on
    the class-specific lines. Make sure to view this example screen in the example
    application.


    ```

    01     rect1 = new MmgRect(MmgHelper.ScaleValue(100), MmgHelper.ScaleValue(190),
    MmgHelper.ScaleValue(190) + GetHeight()/4, GetWidth() - MmgHelper.ScaleValue(100));

    02     rect2 = new MmgRect(MmgHelper.ScaleValue(100), MmgHelper.ScaleValue(210)
    + GetHeight()/4, MmgHelper.ScaleValue(210) + GetHeight()/4 + GetHeight()/4, GetWidth()
    - MmgHelper.ScaleValue(100));

    03     rect3 = new MmgRect(MmgHelper.ScaleValue(90), MmgHelper.ScaleValue(180),
    MmgHelper.ScaleValue(90) + GetHeight()/2 + GetHeight()/4 + MmgHelper.ScaleValue(28),
    GetWidth() - MmgHelper.ScaleValue(90));

    Listing 2-14

    MmgRect Class Demonstration 1

    ```


    In this example screen’s `LoadResources` method, focus your attention on lines
    1–3. These lines initialize and configure three `MmgRect` instances. Keep in mind
    that the `MmgRect` class does not extend the `MmgObj` class. This means that the
    `MmgRect` is not directly drawable by the game engine drawing routine. There is,
    however, support in the `MmgPen` class for drawing `MmgRect` instances. In this
    way, the `MmgRect` class sits on the fence between calculations and rendering.


    ## Base Classes: MmgFont


    The `MmgFont` class is used to wrap the framework’s font class. Fonts are mainly
    created with the `MmgFontData` class’ convenient, static methods. The `MmgFontData`
    class should always be used first, because it automatically scales font sizes
    based on the screen’s current scaling, if any. This helps ensure that games can
    be scaled up or down in size and still maintain the positioning and size of game
    screen objects, including `MmgFont` objects.


    The `MmgFont` class is the first class we’ve encountered that extends the `MmgObj`
    class. As such, it has built-in support for position and dimensions and receives
    update and drawing method calls when plugged into the game engine’s drawing routine.
    Also note, because of a strict API design pattern, the `MmgFont` class supports
    cloning, typed cloning, and comparison functionality. Not too bad.


    ### Enumerations


    The `MmgFont` class has one associated enumeration that is important for us to
    review. The `FontType` enumeration is used by the `MmgFont` class to describe
    the style of font the class represents. For instance, if a bold font is loaded
    up, then the bold `FontType` would be used. It’s important to note that the font
    type does not drive the way the font is rendered; it merely describes the font
    that is loaded.'
