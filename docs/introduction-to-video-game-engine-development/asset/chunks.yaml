- fmt: '### Static Class Members


    The first set of static class members for us to review consists of three static
    class fields.


    ```

    public static Hashtable cacheBmp = new Hashtable();

    public static Hashtable cacheSound = new Hashtable();

    public static boolean REMOVE_EXISTING = true;

    Listing 3-27

    MmgMediaTracker Static Class Members 1

    ```


    The first two entries listed in the preceding are data structures that store data
    in key-value pairs. If you are following along with the C# version of the code,
    you’ll notice that the framework class for this type of data structure is the
    `Dictionary` class. In the Java implementation of the game engine, the framework
    class for this type of data is the `Hashtable`.


    The two data structures act as resource caches with the ability to store image
    data in the `cacheBmp` field and sound data in the `cacheSound` field. Recall
    that the `MmgHelper` class has a number of methods that interact with the `MmgMediaTracker`
    class’ caches. This is an example of how API classes are designed to work together
    but also provide functionality independently. The `REMOVE_EXISTING` Boolean flag
    is used to indicate if we should clean a resource cache before adding to it.


    ```

    public static void CacheImage(String key, Image val) { ... }

    public static void CacheSound(String key, Clip val) { ... }

    public static boolean HasBmpKey(String key) { ... }

    public static boolean HasSoundKey(String key) { ... }

    public static boolean HasBmpValue(Image img) { ... }

    public static boolean HasSoundValue(Clip snd) { ... }

    public static boolean RemoveBmpByKey(String key) { ... }

    public static boolean RemoveBmpByKeyValue(String key, Image img) { ... }

    public static boolean RemoveSoundByKey(String key) { ... }

    public static boolean RemoveSoundByKeyValue(String key, Clip snd) { ... }

    Listing 3-28

    MmgMediaTracker Static Class Members 2

    ```


    The first set of methods for us to review allow you to store images and sounds
    in independent caches, query the size of a cache, and retrieve resources from
    either cache. Note that deleting a cache entry before adding it to the cache is
    controlled by the `REMOVE_EXISTING` static class field in both the `CacheImage`
    and `CacheSound` methods.


    The next set of methods to review are simple utility methods that check if a key
    exists in either the image or sound cache. You can also check to see if a value
    exists in either cache. These methods are very helpful when interacting with the
    `MmgMediaTracker`’s caches. Make sure you read and understand how these methods
    are used.


    The last set of static class methods listed in the preceding are cache removal
    methods for image and sound resources. You can remove items by key or by key and
    value. That rounds out the available methods giving you the ability to easily
    add, remove, and query for cached resources. That’s pretty much everything you
    need to manage a resource cache! Let’s take a look at some example code.


    ### Demonstration: MmgMediaTracker Class


    The snippet of demonstration code listed in the following is the `GetBasicCachedSound`
    method from the `MmgHelper` class.


    ```

    01 public static MmgSound GetBasicCachedSound(String path, String sndId) {

    02     MmgSound lval = null;

    03     if (SND_CACHE_ON == true) {

    04         if (MmgMediaTracker.HasSoundKey(sndId) == true) {

    05             lval = new MmgSound(MmgMediaTracker.GetSoundValue(sndId));

    06         } else {

    07             lval = MmgHelper.GetBasicSound(path);

    08             MmgMediaTracker.CacheSound(sndId, lval.GetSound());

    09         }

    10     } else {

    11         lval = MmgHelper.GetBasicSound(path);

    12     }

    13     return lval;

    14 }

    Listing 3-29

    MmgMediaTracker Class Demonstration 1

    ```


    The `MmgMediaTracker` class is used by the auto loading functionality contained
    in the MmgCore library. One example of its use is in the `GetBasicCachedSound`
    method. Notice how easy it is to connect static helper classes to create even
    more useful methods. We have essentially created an interface in code for working
    with the cache. Can you think of some other interfaces we’ve defined through different
    classes? Well, a simple logging interface might be one answer. I’ll let you ponder
    the question and see if you can come up with any more.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s helper classes. If
    you stop and think about the code we’ve reviewed in this chapter, the one thing
    that should stand out the most is the idea of easy-access classes with static
    methods providing high-level, encapsulated functionality.


    The classes we’ve reviewed here are very different from the base classes we covered
    in Chapter [1](#508392_1_En_1_Chapter.xhtml). These classes aren’t directly part
    of the game engine in a foundational sense. They are, however, very high-level,
    easy-to-use classes that help with a lot of tasks necessary in game development.
    For instance, the API as we’ve covered it now has fully integrated resource loading
    and retrieval using the MmgCore application-level code and the `MmgMediaTracker`
    and `MmgHelper` classes.


    I want to step back from the code we’ve looked at and work on developing the larger
    picture. We’re working on defining the classes necessary to support a general
    2D game engine. In doing so, we’ve covered the following classes:


    *   `MmgApiUtils`: A helper class that provides logging support with centralized
    logging control.

    *   `MmgHelper`: A very important support class that provides static methods that
    help with positioning objects, logging, loading resources, class config file reading/writing,
    creating drawable image surfaces, rectangle collision, and value scaling. The
    list says it all.

    *   `MmgScreenData`: A helper class that provides information about the game panel
    and window dimensions. Provides support for scaling the game panel to fit within
    the dimensions of the game screen.

    *   `MmgFontData`: A helper class that provides support for scaling the font to
    match the screen’s scaling, if any. It also has a number of static methods that
    provide access to different preconfigured fonts. This class is very useful to
    say the least.

    *   `MmgDebug`: A helper class that provides logging support that is tied to the
    `MmgApiUtils` logging creating a two-layer logging system with independent logging
    controls.

    *   `MmgBmpScaler`: A helper class that provides support for scaling and rotating
    images.

    *   `MmgMediaTracker`: A very important part of the game engine that is responsible
    for caching game resources.


    We’ve seen our tool chest increase in size dramatically. We now have a set of
    classes that multiply the capabilities defined by the game engine’s base classes
    outlined in Chapter [1](#508392_1_En_1_Chapter.xhtml). For instance, we have the
    foundation of a resource management system that is easy to use from any class
    in a game. We have helper classes that load resources for us, position objects,
    and much, much more.


    One other thing you should notice is that we’re still missing an overall structure.
    I’ll remind you to be patient. We won’t be able to see the entire picture until
    Part 2 when we review the MmgCore library. The main take-away should be that we
    have a good set of tools for making a game at this point. In upcoming chapters,
    we define more powerful tools that use multiple API classes in different ways
    to solve problems like sprite loading and animation.


    # 4. Other Classes


    In this chapter, you’ll review the “other” classes of the MmgBase API. These are
    classes that don’t quite fit into your typical categories, so we gave them their
    own. We’ll look at the following classes during this review:


    *   `MmgCfgFileEntry`

    *   `MmgEvent`

    *   `MmgEventHandler`'
