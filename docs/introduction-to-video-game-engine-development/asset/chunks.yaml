    # PongClone Main Menu Screen


    In this chapter, we’ll move the project even further along by adding a custom
    main menu screen to the game. We’ll wire up the main menu and make sure it’s functional.
    Let’s start things off by taking a look at the main menu screen and what we need
    to do to get it set up.


    The following process should work fine with both the Java and C# versions of the
    project. Create a new class and name it `ScreenMainMenu`. We want this class to
    extend the MmgCore API’s `ScreenMainMenu` class. Keep in mind that we’ll have
    access to that functionality as we define how our local `ScreenMainMenu` class
    works. Because the screen’s default implementation includes the following features
    – title, subtitle, single player, game start, game exit, footer, and version number
    – we won’t have to worry too much about them.


    ## PongClone: ScreenMainMenu Code Review


    Let’s take a look at our game’s general specification list and see if we’re missing
    anything. One thing that stands out to me is that the game is defined as supporting
    both one- and two-player modes. However, the default main menu screen only has
    an option for starting a single-player game. We’ll have to adjust things a bit.
    I’ll start by listing the class headers in the following code snippet. You may
    need to add an import/using statement for the `GamePanel` class’ `GameStates`
    enumeration. The IDE should detect this error and provide a solution automatically.
    You can also just explicitly reference the `GameStates` enumeration.


    ```

    //Java lib references and class header

    import net.middlemind.MmgGameApiJava.MmgBase.*;

    import net.middlemind.MmgGameApiJava.MmgCore.*;

    public class ScreenMainMenu extends net.middlemind.MmgGameApiJava.MmgCore.ScreenMainMenu
    {

    //C# lib references and class header

    using net.middlemind.MmgGameApiCs.MmgBase;

    using net.middlemind.MmgGameApiCs.MmgCore;

    public class ScreenMainMenu : net.middlemind.MmgGameApiCs.MmgCore.ScreenMainMenu
    {

    //Class outline

    private MmgBmp menuStartGame1P;

    private MmgBmp menuStartGame2P;

    private boolean lret;

