    The `MmgGameScreen` class has a laundry list of support methods. I’ve listed them
    in the following grouping and in the same order as their corresponding class fields.
    New methods that don’t associate to a class field have been inserted where appropriate.
    Take a look at the methods in the following listing and make sure you understand
    them.


    ```

    //Render control methods

    public boolean IsReady() { ... }

    public void SetReady(boolean b) { ... }

    public void Pause() { ... }

    public void UnPause() { ... }

    public boolean IsPaused() { ... }

