  trans: '

    ## 新建项目：Java/NetBeans IDE


    在本节中，我们将回顾使用您刚刚了解的游戏引擎 API 在 Java 中创建一个全新游戏开发项目所需的步骤。首先，我们将概述 Java 版本游戏引擎的创建流程；然后，我们将了解
    C# 版本的流程。启动 NetBeans IDE，让我们开始工作吧！请确保在 IDE 中打开了 `MmgGameApiJava` 项目。


    完成后，从应用程序菜单中选择“文件 ➤ 新建项目...”，并在您存放 NetBeans 项目的目录中创建一个新项目。从“新建项目”弹出窗口中选择“Java
    with Ant”类别。从“项目”列表中，选择“Java 应用程序”选项，然后单击“下一步 >”按钮。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig1_HTML.jpg](img/508392_1_En_16_Fig1_HTML.jpg)


    图 16-1


    Java 项目设置 1


    将“项目名称”字段设置为“PongClone”。确保“项目位置”和“项目文件夹”字段的值正确。保持“使用专用文件夹存储库”和“创建主类”选项未选中，如下图所示，然后单击“完成”按钮。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig2_HTML.jpg](img/508392_1_En_16_Fig2_HTML.jpg)


    图 16-2


    Java 项目设置 2


    现在，您的项目列表中应该有一个名为 PongClone 的新空项目。接下来，我们需要进行一些项目配置。右键单击您的新项目，然后选择“属性”选项。您应该会看到一个“项目属性”弹出窗口，左侧是类别列表，右侧是类别详细信息。选择“构建”类别下的“打包”选项。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig3_HTML.jpg](img/508392_1_En_16_Fig3_HTML.jpg)


    图 16-3


    Java 项目设置 3


    确保项目的“JAR 文件”设置为“dist/PongClone.jar”。确保在项目的“运行”设置下，工作目录设置为“./dist/”。同时，确保如上所示选中了“编译后构建
    JAR”和“复制依赖库”选项。现在我们需要设置项目资源。如果尚未加载，您需要加载 `MmgGameApiJava` 项目。单击项目列表旁边的“文件”选项卡。如果在那里看不到它，您也可以通过单击“窗口”菜单选项并选择“文件”条目来访问文件视图。


    打开 `MmgGameApiJava` 文件夹，找到其中名为“cfg”的文件夹。打开“cfg”目录，找到“asset_src”文件夹。在此文件夹中，应该有一个名为“pong_clone_resources”的文件夹。打开它，找到里面名为“cfg”的文件夹。复制此文件夹并将其粘贴到
    PongClone 游戏项目文件夹的根目录中。您的新游戏项目现在拥有了一套完整的、可供使用的资源。


    我们即将开始编写一些代码，但首先还有一些事情需要处理。我们需要整理好项目的库。首先，让我们添加对游戏引擎 API 的引用。再次打开 PongClone 项目的属性弹出窗口。这次，从左侧的类别列表中选择“库”类别。在“编译”选项卡下，找到“类路径”部分，如下所示。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig4_HTML.jpg](img/508392_1_En_16_Fig4_HTML.jpg)


    图 16-4


    Java 项目设置 4


    单击“+”按钮，然后选择“添加项目”选项。从列表中选择“MmgGameApiJava”项目，您现在应该会在“类路径”部分下看到该游戏引擎项目。关闭“项目属性”弹出窗口。重新打开“文件”视图。再次找到游戏引擎项目文件夹并打开它。您应该会在项目的根目录中看到一个名为“lib”的文件夹。


    复制该文件夹，然后返回上一级目录到项目列表。找到“PongClone”文件夹，并将“lib”文件夹粘贴到项目的根目录中。我们只需要再注册两个库，项目配置就完成了。再次打开
    PongClone 项目的属性弹出窗口。选择“库”类别，并找到“类路径”部分。


    单击“+”按钮，然后选择“添加 JAR/文件夹”选项。导航到 PongClone 项目文件夹，并打开您刚刚粘贴进去的“libs”目录。找到并打开“jinput”文件夹，选择文件“jinput-2.0.9.jar”；单击“选择”按钮，然后单击“确定”按钮。重复此过程，但这次找到并打开“junit_4”文件夹，选择“junit-4.12.jar”文件。单击“选择”按钮，然后单击“确定”按钮。就这样。PongClone
    项目已设置并配置完成。我们可以开始编码了！

    '
- fmt: '# Setting Up a New Project: C#/Visual Studio IDE


    In this section, we’ll review the steps necessary to create a brand-new game development
    project, in C#, that uses the game engine API you just finished reviewing. We’ll
    outline the process for the C# version of the game engine.


    You’ll need to open up a terminal program for this next part. Please refer to
    the Internet for details on finding the terminal program for your particular operating
    system. At the terminal, run the following command to ensure that you have the
    MonoGame project templates installed. Again, refer to Chapter [1](#508392_1_En_1_Chapter.xhtml)
    for more information on how to set up the C#/MonoGame environment:


    ```

    dotnet new -i MonoGame.Templates.CSharp::3.8.0.1641

    ```


    Once that is done, navigate to the directory where you keep your Visual Studio
    projects. You should have the `MmgGameApiCS` project in this folder. Run the following
    command to create a new MonoGame development project for the “PongClone” game:


    ```

    dotnet new mgdesktopgl –o PongClone

    ```


    When the command is done running, you should have a new project folder in your
    Visual Studio project directory named “PongClone.” In the next few steps, we’ll
    be working on getting the game project properly configured. First off, let’s get
    a copy of the game’s resource folder and add it to the project.


    Using your preferred folder navigator, locate and open the `MmgGameApiCs` folder
    in your Visual Studio project directory. Find the `cfg` folder inside and open
    it. You should see a folder named `asset_src`; open it and locate the folder named
    `pong_clone_resources`. Open that directory and copy the `cfg` folder inside.


    Now, navigate to the `PongClone` project folder you just created. Paste the `cfg`
    directory into the project’s root folder. Next up, we have to configure the `PongClone`
    project and add some libraries to it that give us access to the game engine API.
    For this next part, we must make sure that the game engine project has been built
    so we can reference the resulting .Net library.


    To do this, open the `MmgGameApiCs` project; and once it’s done loading, select
    “Build” from the IDE’s menu and then choose “Rebuild.” Allow the project to compile
    and make sure that you see successful build results in the IDE’s “Build Output”
    view. Now that we have a library to reference, close the `MmgGameApiCs` project
    and open the `PongClone` project you just created.


    When it’s done loading, right-click the `Dependencies` folder in the “Solution”
    view and select “Add Reference …” from the context menu. From the “References”
    popup, click the “.Net Assembly” tab and click the “Browse …” button. Navigate
    to the `MmgGameApiCs` folder in your Visual Studio project directory. Find the
    following file and add it to your project’s references. Click the “Ok” button
    to close the “References” popup:


    ```

    ./MmgGameApiCs/bin/Debug/netcoreapp3.1/MmgGameApiCs.dll

    ```


    Your project “References” popup should look like the following screenshot.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg)


    Figure 16-5


    C# Project Setup 1


    We have a few NuGet packages to add to our project before we can start coding.
    Select “Project” from the IDE menu and click the “Manage NuGet Packages …” option.
    When the “Manage NuGet Packages” popup is done loading, search for the package
    `MonoGame.Framework.Content.Pipeline` by using the search bar in the top right-hand
    corner of the popup.


    Look for the package in the list on the left and check the box next to the package
    entry. Next, search for the package named `MSTest.TestFramework`. Check the box
    next to that package listing as well and click the “Add Package” button in the
    bottom right-hand corner of the popup. Accept any popup dialogs with licensing
    prompts, and the packages will be installed and ready to go.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg)


    Figure 16-6


    C# Project Setup 2


    There’s one last thing for us to do before we can start coding: add the MonoGame
    content resource file. The content file contains font data for font sizes 1–50
    that the C# version of the game engine uses. Recall that the C# version uses this
    font data to emulate the more fluid font functionality of the Java version.


    Using the file system navigator of your choice, locate and open the `MmgGameApiCs`
    project folder. Copy the `Content` folder and paste it into the root of the `PongClone`
    project folder. Overwrite the current `Content` folder, if necessary, and open
    the project in Visual Studio when the folder is done copying.


    Once the project is done loading, expand the `Content` folder listed in the “Solution”
    view. Right-click the file named `Content.mgcb` and select the “Open With …” option.
    Click the entry named `mgcb-editor`. This will open the content database in a
    special editing application.


    Find the “Rebuild” button, third from the right in the program’s button bar. Click
    it and verify that the content compiles correctly. The project is configured and
    ready. We’ve got some coding to do!'
  raw: '## Setting Up a New Project: C#/Visual Studio IDE


    In this section, we’ll review the steps necessary to create a brand-new game development
    project, in C#, that uses the game engine API you just finished reviewing. We’ll
    outline the process for the C# version of the game engine.


    You’ll need to open up a terminal program for this next part. Please refer to
    the Internet for details on finding the terminal program for your particular operating
    system. At the terminal, run the following command to ensure that you have the
    MonoGame project templates installed. Again, refer to Chapter [1](#508392_1_En_1_Chapter.xhtml)
    for more information on how to set up the C#/MonoGame environment:


    ```

    dotnet new -i MonoGame.Templates.CSharp::3.8.0.1641

    ```


    Once that is done, navigate to the directory where you keep your Visual Studio
    projects. You should have the MmgGameApiCS project in this folder. Run the following
    command to create a new MonoGame development project for the “PongClone” game:


    ```

    dotnet new mgdesktopgl –o PongClone

    ```


    When the command is done running, you should have a new project folder in your
    Visual Studio project directory named “PongClone.” In the next few steps, we’ll
    be working on getting the game project properly configured. First off, let’s get
    a copy of the game’s resource folder and add it to the project.


    Using your preferred folder navigator, locate and open the “MmgGameApiCs” folder
    in your Visual Studio project directory. Find the “cfg” folder inside and open
    it. You should see a folder named “asset_src”; open it and locate the folder named
    “pong_clone_resources.” Open that directory and copy the “cfg” folder inside.


    Now, navigate to the “PongClone” project folder you just created. Paste the “cfg”
    directory into the project’s root folder. Next up, we have to configure the “PongClone”
    project and add some libraries to it that give us access to the game engine API.
    For this next part, we must make sure that the game engine project has been built
    so we can reference the resulting .Net library.


    To do this, open the “MmgGameApiCs” project; and once it’s done loading, select
    “Build” from the IDE’s menu and then choose “Rebuild.” Allow the project to compile
    and make sure that you see successful build results in the IDE’s “Build Output”
    view. Now that we have a library to reference, close the “MmgGameApiCs” project
    and open the “PongClone” project you just created.


    When it’s done loading, right-click the “Dependencies” folder in the “Solution”
    view and select “Add Reference …” from the context menu. From the “References”
    popup, click the “.Net Assembly” tab and click the “Browse …” button. Navigate
    to the “MmgGameApiCs” folder in your Visual Studio project directory. Find the
    following file and add it to your project’s references. Click the “Ok” button
    to close the “References” popup:


    ```

    ./MmgGameApiCs/bin/Debug/netcoreapp3.1/MmgGameApiCs.dll

    ```


    Your project “References” popup should look like the following screenshot.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg)


    Figure 16-5


    C# Project Setup 1


    We have a few NuGet packages to add to our project before we can start coding.
    Select “Project” from the IDE menu and click the “Manage NuGet Packages …” option.
    When the “Manage NuGet Packages” popup is done loading, search for the package
    “MonoGame.Framework.Content.Pipeline” by using the search bar in the top right-hand
    corner of the popup.


    Look for the package in the list on the left and check the box next to the package
    entry. Next, search for the package named “MSTest.TestFramework.” Check the box
    next to that package listing as well and click the “Add Package” button in the
    bottom right-hand corner of the popup. Accept any popup dialogs with licensing
    prompts, and the packages will be installed and ready to go.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg)


    Figure 16-6


    C# Project Setup 2


    There’s one last thing for us to do before we can start coding: add the MonoGame
    content resource file. The content file contains font data for font sizes 1–50
    that the C# version of the game engine uses. Recall that the C# version uses this
    font data to emulate the more fluid font functionality of the Java version.


    Using the file system navigator of your choice, locate and open the “MmgGameApiCs”
    project folder. Copy the “Content” folder and paste it into the root of the “PongClone”
    project folder. Overwrite the current “Content” folder, if necessary, and open
    the project in Visual Studio when the folder is done copying.


    Once the project is done loading, expand the “Content” folder listed in the “Solution”
    view. Right-click the file named “Content.mgcb” and select the “Open With …” option.
    Click the entry named “mgcb-editor.” This will open the content database in a
    special editing application.


    Find the “Rebuild” button, third from the right in the program’s button bar. Click
    it and verify that the content compiles correctly. The project is configured and
    ready. We’ve got some coding to do!'
  trans: '

    ## 新建项目：C#/Visual Studio IDE


    在本节中，我们将回顾使用您刚刚了解的游戏引擎 API，在 C# 中创建一个全新游戏开发项目所需的步骤。我们将概述该游戏引擎 C# 版本的创建流程。


    接下来，您需要打开一个终端程序。有关如何找到适用于您特定操作系统的终端程序，请参考互联网上的详细信息。在终端中，运行以下命令以确保您已安装 MonoGame
    项目模板。同样，关于如何设置 C#/MonoGame 环境的更多信息，请参考第 1 章：


    ```

    dotnet new -i MonoGame.Templates.CSharp::3.8.0.1641

    ```


    完成后，导航到您存放 Visual Studio 项目的目录。该文件夹中应包含 `MmgGameApiCS` 项目。运行以下命令，为“PongClone”游戏创建一个新的
    MonoGame 开发项目：


    ```

    dotnet new mgdesktopgl –o PongClone

    ```


    命令运行完毕后，您的 Visual Studio 项目目录中应出现一个名为“PongClone”的新项目文件夹。在接下来的几个步骤中，我们将致力于正确配置游戏项目。首先，让我们获取游戏资源文件夹的副本并将其添加到项目中。


    使用您偏好的文件夹导航工具，找到并打开 Visual Studio 项目目录中的“MmgGameApiCs”文件夹。找到其中的“cfg”文件夹并打开。您应该会看到一个名为“asset_src”的文件夹；打开它，找到名为“pong_clone_resources”的文件夹。打开该目录，复制其中的“cfg”文件夹。


    现在，导航到您刚刚创建的“PongClone”项目文件夹。将“cfg”目录粘贴到项目的根文件夹中。接下来，我们必须配置“PongClone”项目，并向其中添加一些库，以便我们能够访问游戏引擎
    API。在下一步中，我们必须确保游戏引擎项目已构建完成，这样我们才能引用生成的 .Net 库。


    为此，请打开“MmgGameApiCs”项目；加载完成后，从 IDE 菜单中选择“生成”，然后选择“重新生成”。让项目进行编译，并确保在 IDE 的“生成输出”视图中看到成功的生成结果。现在我们有了一个可以引用的库，请关闭“MmgGameApiCs”项目，然后打开您刚刚创建的“PongClone”项目。


    加载完成后，右键单击“解决方案”视图中的“依赖项”文件夹，然后从上下文菜单中选择“添加引用...”。在“引用”弹出窗口中，单击“.Net 程序集”选项卡，然后单击“浏览...”按钮。导航到
    Visual Studio 项目目录中的“MmgGameApiCs”文件夹。找到以下文件并将其添加到项目的引用中。单击“确定”按钮关闭“引用”弹出窗口：


    ```

    ./MmgGameApiCs/bin/Debug/netcoreapp3.1/MmgGameApiCs.dll

    ```


    您的项目“引用”弹出窗口应类似于以下截图。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig5_HTML.jpg](img/508392_1_En_16_Fig5_HTML.jpg)


    图 16-5


    C# 项目设置 1


    在开始编码之前，我们还需要向项目添加几个 NuGet 包。从 IDE 菜单中选择“项目”，然后单击“管理 NuGet 包...”选项。当“管理 NuGet
    包”弹出窗口加载完成后，使用弹出窗口右上角的搜索栏搜索包“MonoGame.Framework.Content.Pipeline”。


    在左侧列表中查找该包，并勾选该包条目旁边的复选框。接下来，搜索名为“MSTest.TestFramework”的包。也勾选该包列表旁边的复选框，然后单击弹出窗口右下角的“添加包”按钮。接受任何带有许可提示的弹出对话框，这些包将被安装并准备就绪。


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig6_HTML.jpg](img/508392_1_En_16_Fig6_HTML.jpg)


    图 16-6


    C# 项目设置 2


    在开始编码之前，我们还有最后一件事要做：添加 MonoGame 内容资源文件。该内容文件包含 C# 版本游戏引擎使用的 1-50 号字体的字体数据。回想一下，C#
    版本使用这些字体数据来模拟 Java 版本更流畅的字体功能。


    使用您选择的文件系统导航工具，找到并打开“MmgGameApiCs”项目文件夹。复制“Content”文件夹，并将其粘贴到“PongClone”项目文件夹的根目录中。如有必要，覆盖当前的“Content”文件夹，并在文件夹复制完成后在
    Visual Studio 中打开该项目。


    项目加载完成后，展开“解决方案”视图中列出的“Content”文件夹。右键单击名为“Content.mgcb”的文件，然后选择“打开方式...”选项。单击名为“mgcb-editor”的条目。这将在特殊的编辑应用程序中打开内容数据库。


    找到程序按钮栏中从右数第三个的“重新生成”按钮。单击它，并验证内容是否正确编译。项目已配置完毕，准备就绪。我们有一些编码工作要做了！

