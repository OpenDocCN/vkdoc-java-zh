- fmt: '### Static Class Members


    There are two static class fields for us to review. These entries are used to
    control the frame rate thread and its main execution loop.


    ```

    public static boolean PAUSE = false;

    public static boolean RUNNING = true;

    Listing 14-1

    RunFrameRate Static Class Members 1

    ```


    The first field listed in the preceding is the `PAUSE` field. This field is used
    to prevent the class’ main execution loop from redrawing the current game screen.
    The `RUNNING` field controls the class’ main loop. If this field is set to false,
    the frame rate thread will exit immediately. Let’s move on to the class’ static
    methods next.


    ```

    public static boolean IsPaused() { ... }

    public static void Pause() { ... }

    public static void UnPause() { ... }

    public static void StartRunning() { ... }

    public static void StopRunning() { ... }

    Listing 14-2

    RunFrameRate Static Class Members 2

    ```


    The static methods are listed in the preceding in the same order as their associated
    class fields. The methods are self-explanatory for the most part. The `IsPaused`
    method provides static get access to the `PAUSE` field. The next two entries provide
    static control methods for pausing or unpausing the main loop. Similarly, the
    `StartRunning` and `StopRunning` entries provide static control methods for starting
    and stopping the main execution loop and subsequently the engine’s drawing routine.


    ### Class Fields


    There are a number of class fields for us to look at. They deal mainly with measuring
    frame timing. I’ve broken them up into two groups and listed the first group in
    the following.


    ```

    public final MainFrame mf;

    public final long tFps;

    public final long tFrameTime;

    public long aFps;

    public long rFps;

    Listing 14-3

    RunFrameRate Class Fields 1

    ```


    The first class field listed is a reference to the game’s `MainFrame` object,
    `mf`. The following entry, `tFps`, represents the target frames per second the
    game is set to run at. The `tFrameTime` field is the target frame time in milliseconds.
    This value is calculated from the target frames per second. If you set your game
    to run at 30 frames per second, FPS, then a new frame will be drawn to the screen
    every 33.3 milliseconds.


    This means that you have that much time to prepare the game’s next frame. This
    small amount of time may seem like hardly enough time to do anything, but believe
    me it’s a lot of time. Not only can you draw the next game frame in this amount
    of time but you can also run all necessary update calls.


    The next two fields provide measurements about how the game is running. The first
    such field, `aFps`, indicates the frame rate the game would run at if it wasn’t
    being throttled to the target FPS. This essentially shows you how fast your game
    would run if it was running at full speed. The following field, `rFps`, represents
    the real frame rate; and its value shows you how close to the target FPS your
    game is running.


    ```

    public long frameStart;

    public long frameStop;

    public long frameTime;

    public long frameTimeDiff;

    Listing 14-4

    RunFrameRate Class Fields 2

    ```


    The next group of class fields are also used in frame timing calculations. As
    you can see, this class is mainly concerned with running the game at a consistent
    frame rate. The `frameStart` and `frameStop` fields mark the beginning and end
    times of the current frame.


    The `frameTime` field holds the calculated total time it took to process the frame.
    The last entry, `frameTimeDiff`, measures the difference in milliseconds between
    how much time the frame took to process and the amount of time allotted for a
    given game frame. If there’s any time left over, we sleep the thread for that
    amount of time before starting on the next frame.


    ### Support Method Details


    The `RunFrameRate` class has only two support methods for us to look at.


    ```

    public long GetActualFrameRate() { ... }

    public long GetTargetFrameRate() { ... }

    Listing 14-5

    RunFrameRate Support Method Details 1

    ```


    The two methods listed in the preceding are simply access methods for the `tFps`
    and `aFps` fields, respectively.


    ### Main Method Details


    There are two main methods for us to cover listed in the following.


    ```

    public RunFrameRate(MainFrame Mf, long Fps) { ... }

    public void run() { ... }

    Listing 14-6

    RunFrameRate Main Method Details 1

    ```


    The `mf` and `tFps` fields are set from the class’ constructor arguments. The
    `tFrameTime` is calculated and set based on the target FPS provided. The run method
    is where all the work is done. This method is called as part of the Java framework’s
    `Runnable` interface. The run method gets called automatically as part of starting
    a new thread. That’s it, short and sweet. The class is ready to use.'
