    前几行代码（第 1–6 行）用于从本地类配置对象加载加载条前景图像的位置。如果未找到类配置键，则使用默认资源。图像在第 8 行加载。接下来的代码块（第 10–15
    行）执行与我们刚刚回顾的代码类似的功能，但针对的是加载条的背景图像。


    回想一下，我们打算缩放加载条的背景图像，为此我们需要确保图像支持缩放。为了确保图像可以调整大小，我们将绘制模式设置为 `DRAW_BMP_FULL`，以便在渲染
    `MmgBmp` 图像时可以考虑源矩形和目标矩形，第 17–20 行。


    接下来的代码行（第 22–32 行）详细说明了正确设置 `MmgLoadingBar` 对象以供使用的方法。请注意，构造函数用于设置加载条的背景和前景图像。颜色设置为
