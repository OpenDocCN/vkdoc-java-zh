- fmt: '### Demonstration: `RunFrameRate` Class


    For the `RunFrameRate` demonstration section, we’ll take a look at three snippets
    of code. The first snippet is from the `MmgCore` API’s `MmgApiGame` class at the
    bottom of the `main` method.


    ```

    1 fr = new RunFrameRate(mf, FPS);

    Listing 14-7

    RunFrameRate Class Demonstration 1

    ```


    In the line of code listed in the preceding, we are shown the initialization of
    the `RunFrameRate` class. It takes a `MainFrame` object and a frame rate as arguments.
    The `FPS` variable shown in the preceding is a class field that can be adjusted
    by command-line arguments and game engine config files.


    ```

    1 t = new Thread(fr);

    2 t.start();

    Listing 14-8

    RunFrameRate Class Demonstration 2

    ```


    In the next snippet of code, also from the `MmgApiGame` class’ `main` method,
    the frame rate thread is started. This starts the game engine’s drawing routine
    and calls the `RunFrameRate` class’ `run` method.


    ```

    01 while (RunFrameRate.RUNNING == true) {

    02     frameStart = System.currentTimeMillis();


    04     if (RunFrameRate.PAUSE == false) {

    05         mf.Redraw();

    06     }


    08     frameStop = System.currentTimeMillis();

    09     frameTime = (frameStop - frameStart) + 1;

    10     aFps = (1000 / frameTime);


    12     frameTimeDiff = tFrameTime - frameTime;

    13     if (frameTimeDiff > 0) {

    14         try {

    15             Thread.sleep((int) frameTimeDiff);

    16         } catch (Exception e) {

    17             MmgHelper.wrErr(e);

    18         }

    19     }


    21     frameStop = System.currentTimeMillis();

    22     frameTime = (frameStop - frameStart) + 1;

    23     rFps = (1000 / frameTime);

    24     mf.SetFrameRate(aFps, rFps);

    25 }

    Listing 14-9

    RunFrameRate Class Demonstration 3

    ```


    Notice on the preceding first line that the class’ main execution loop only executes
    if the `RUNNING` field is set to `true`. The `RunFrameRate` class is started through
    the use of the Java framework’s `Thread` class, shown in the previous snippet.
    This causes the `RunFrameRate` class’ `run` method to execute in a new thread.
    On line 2, the `frameStart` field is updated with the current time. This value
    will be used to determine how much time this frame takes to process.


    The `if` statement on lines 4–6 checks to see if the `RunFrameRate` class is paused
    or not. If the class is paused, then no work is done on this frame, and the main
    loop carries on as normal. The value of `frameStop` is updated on line 8, and
    the total time to process the frame is calculated on line 9. Why do you think
    we update the calculated time and add one millisecond? Think about the phrase
    “calculated frame time.” One issue that stands out is we might end up with a frame
    time of zero milliseconds.


    This would cause a divide by zero exception on line 10, and we simply can’t have
    that. By adding one millisecond to the `frameTime`, we essentially set the floor
    for the timing to one instead of zero. Subsequently on line 10, the value of the
    actual frame rate field, `aFps`, is calculated. As you can see, the value reflects
    only the time it took to draw the current frame.


    The block of code on lines 12–19 sleeps the current thread for the excess time
    on this game frame. For instance, if we want the game to run at 30 FPS, then we
    have 33 milliseconds to draw the current frame, including running update calls.
    If it only takes us 20 milliseconds to do all of that work, then we have to sleep
    the thread for 13 milliseconds. That’s what this code does. The code on lines
    21–23 updates the `frameStop` field and calculates a new runtime FPS. This time
    the measurement is taken after the frame is created, and the thread is slept for
    a few milliseconds.


    What this means is that this calculation is the real frame rate, or the frame
    rate experienced by the player. Lastly, on line 24, a call to `SetFrameRate` updates
    the debug header with fresh frame rate statistics.


    ## Game Screens: `ScreenSplash`


    The `ScreenSplash` class is the concrete implementation of the `MmgSplashScreen`
    class. What I mean by concrete implementation is that the general class, `MmgSplashScreen`,
    has its generic functionality extended to plug into the runtime code – specifically,
    the `GamePanel` class. Let’s see how it’s done!


    ### Static Class Members


    There is only one static class member to look at listed in the following line
    of code.


    ```

    public static int EVENT_DISPLAY_COMPLETE = 0;

    Listing 14-10

    ScreenSplash Static Class Members 1

    ```


    This static field is used as an event ID that marks an event object as indicating
    that the splash screen’s display time is up.


    ### Class Fields


    The `ScreenSplash` class has four fields for us to review.


    ```

    public GameStates state;

    public GenericEventHandler handler;

    public GamePanel owner;

    public Hashtable classConfig;

    Listing 14-11

    ScreenSplash Class Fields 1

    ```


    The first field, `state`, is used to represent what game state this game screen
    is associated with. The `handler` field receives any generic events generated
    by this class. Subsequently, the `owner` field represents the `GamePanel` object
    that this game screen belongs to. Lastly, the `classConfig` data structure is
    used to hold config file data that drives runtime screen customization.


    ### Support Method Details


    The class support methods, listed in the following, provide access to pertinent
    class fields.


    ```

    public GameStates GetGameState() { ... }

    public GenericEventHandler GetGenericEventHandler() { ... }

    public void SetGenericEventHandler(GenericEventHandler Handler) { ... }

    Listing 14-12

    ScreenSplash Support Method Details 1

    ```


    I’ve listed the support methods in the same order as their corresponding class
    fields. The methods are straightforward, so I won’t cover them in any detail here.
    The first entry provides access to the `gameState` field, while the next two are
    get and set methods for the `handler` field. Let’s move on to review the class’
    main methods.


    ### Main Method Details


    The class’ main methods handle `MmgSplashScreen` events, drawing the screen, and
    loading or unloading screen resources.


    ```

    public ScreenSplash(GameStates State, GamePanel Owner) { ... }

    public void MmgDraw(MmgPen p) { ... }

    public void MmgHandleUpdate(Object obj) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    Listing 14-13

    ScreenSplash Main Method Details 1

    ```


    The first entry, as we expect, is a class constructor. The constructor takes a
    game state and a game panel as arguments. The `MmgDraw` method is one we’ve seen
    before during the `MmgBase` API review in Part 1 of this text. This method hasn’t
    come up too much during our review of the `MmgCore` API. The reason for this is
    that only `MmgCore` game screens plug into the `GamePanel` class for display.
    As such, these are the only API classes where we’ll encounter the `MmgUpdate`
    and `MmgDraw` methods.


    The following method, `MmgHandleUpdate`, is used to respond to the `MmgSplashScreen`’s
    internal timer that controls how long the screen displays for. The last two methods
    are used to load and unload all of the resources used by this game screen.'
