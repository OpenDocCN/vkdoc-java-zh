    **Listing 18-11** ScreenGame Support Methods 1


    The first two methods listed are get and set methods for the `gameType` class
    field. Add these methods to your `ScreenGame` class. The `SetState` method is
    used a lot like the `SwitchGameState` method from the `GamePanel` class. This
    method is long, and although it’s listed here so you can type it up by hand, feel
    free to just copy and paste the code from the chapter’s completed project found
    in the associated game engine’s project folder.


    Whatever path you choose, make sure you read over and understand what the code
    is doing. Basically, the code is based on the screen’s internal state. Different
    `MmgObj`-based fields are set to visible or not visible depending on that state.
    Pay special attention to what screen features are being turned on or off and for
    what game state. The `SetScoreLeftText` and `SetScoreRightText` methods are used
    to update the left and right scores presented to the player by the `MmgFont` object
    fields `scoreLeft` and `scoreRight`.


    The last method entry is very important. The `GetSpeedPerFrame` static method
    is used to calculate a speed per frame value based on the provided movement speed.
    Make sure that you add the methods listed in the preceding to your `ScreenGame`
    class and take care of any errors that may come up. Please refer to the completed
    chapter project, if necessary, to resolve any issues.


