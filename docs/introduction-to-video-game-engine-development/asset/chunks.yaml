    //Development header drawing

    public Font debugFont;

    public Color debugColor = Color.WHITE;

    private MmgFont mmgDebugFont = null;

    //Other

    public int lastX;

    public int lastY;

    public long lastKeyPressEvent = -1;

    public int mouseOffsetX = 0;

    public int mouseOffsetY = 0;

    public static GameType GAME_TYPE = GameType.GAME_NEW;

    //Game screens

    public ScreenSplash screenSplash;

    public ScreenLoading screenLoading;

    public ScreenMainMenu screenMainMenu;

    //Game engine context data

    public MmgScreenData screenData;

    public MmgFontData fontData;

    //Gamepad support

    public GamePadHub gamePadHub;

    public GamePadHubRunner gamePadRunner;

    public Thread gpadTr;

    public GpioHub gpioHub;

    public GpioHubRunner gpioRunner;

    public Thread gpioTr;

    Listing 10-12

    GamePanel Class Fields 2

    ```


    When the logging on flag in the `MmgHelper` class is set to true, the engine will
    add a special debugging header above the game panel. The `debugFont`, `mmgDebugFont`,
    and `debugColor` class fields are used to draw the debugging text in the development
    header. The `lastX` and `lastY` fields are used to track the mouse’s last recorded
    X and Y coordinates.


    This information can be used to determine mouse drag-and-drop operations among
    other things. The `lastKeyPressEvent` field records the last time a keyboard key
    was pressed. The mouse offset fields give you the ability to fine-tune the mouse
    cursor by adding an X or Y offset to its positioning. The `GAME_TYPE` field holds
    a value indicating what type of game is running: one player, two players, networked,
    local, and so on.


    The game screens are coming up next. We decided not to use the data structure
    for storing the game screens and just made a class field for the screens that
    this implementation supports. The splash, loading, and main menu screens are displayed
    by this example game runtime. The `MmgScreenData` and `MmgFontData` instances,
    `screenData` and `fontData`, should be familiar to you from their review in Part
    1 of this text. These fields are useful for accessing the engine’s screen and
    font runtime data.


    The last group of fields have to do with gamepad support. The game engine supports
    two types of gamepads. A traditional USB gamepad is supported in the Java version
    via jInput libraries and in the C# version natively in MonoGame. Another type
    of gamepad is supported on the Linux operating system only. This implementation
    allows you to use GPIO pins on a single-board computer to create a gamepad using
    a breadboard, some buttons, and some jumper cables. You can then control your
    game using the GPIO gamepad. I won’t cover gamepad or GPIO support in any detail
    in the text but I encourage you to experiment with the classes.


    The gamepad hub is used to read the gamepad state and convert the input to button
    information. This data is then processed by the gamepad hub runner, which polls
    the gamepad for data at an interval. The thread `gpadTr` is used to run the gamepad
    processing code in a separate thread as opposed to the main game thread. The last
    three fields in the block are exactly the same as the gamepad fields we just discussed
    except these are designed to work with the Linux file system and the GPIO interface.


    ## Support Method Details


    Because the `GamePanel` class has such a large number of support methods, I’ve
    decided to break out the input processing methods into their own section. Let’s
    begin the review by covering the support methods listed in the following set.


    ```

    //Support methods

    public Hashtable GetGameScreens() { ... }

    public void SetGameScreens(Hashtable GameScreens) { ... }

    public MmgGameScreen GetCurrentScreen() { ... }

    public void SetCurrentScreen(MmgGameScreen CurrentScreen) { ... }

    public int GetWinWidth() { ... }

    public int GetWinHeight() { ... }

    public int GetX() { ... }

    public int GetY() { ... }

    Listing 10-13

    GamePanel Support Method Details 1

    ```


    The first four entries are get and set methods for the `gameScreens` and `currentScreen`
    fields, respectively. The next two methods provide access to the window’s dimensions,
    while the `GetX` and `GetY` methods provide access to the game panel’s X and Y
    offsets.


    ## Input Method Details


    There are so many input handling methods that I decided to, once again, give them
    a section of their own. They are self-explanatory, so I won’t talk about them
    in any detail. As you read through them, think about using them in your next game.


    ```

    //Mouse move methods

    public void ProcessMouseMove(int x, int y) { ... }

    //Mouse button methods

    public void ProcessMousePress(int x, int y, int btnIndex) { ... }

    public void ProcessMouseRelease(int x, int y, int btnIndex) { ... }

    public void ProcessMouseClick(int x, int y, int btnIndex) { ... }

    //A button methods

    public void ProcessAPress(int src) { ... }

    public void ProcessARelease(int src) { ... }

    public void ProcessAClick(int src) { ... }

    //B button methods

    public void ProcessBPress(int src) { ... }

    public void ProcessBRelease(int src) { ... }

    public void ProcessBClick(int src) { ... }

    //Keyboard key methods

    public void ProcessKeyPress(char c, int code) { ... }

    public void ProcessKeyRelease(char c, int code) { ... }

    public void ProcessKeyClick(char c, int code) { ... }

    //D-Pad input

    public void ProcessDpadPress(int dir) { ... }

    public void ProcessDpadRelease(int dir) { ... }

    public void ProcessDpadClick(int dir) { ... }

    //Debug method

    public void ProcessDebugClick() { ... }

    Listing 10-14

    GamePanel Input Method Details 1

    ```


    The only method I’d like to talk about is the `ProcessDebugClick` method. This
    method is mapped to the keyboard’s “D” key by default, and if pressed it will
    call the game screen’s `ProcessDebugClick` method. This is a great place to enter
    in some debugging code that prints information to standard output.'
