    引言


    本书首先关注的是 2D 游戏引擎的设计与开发。文中的示例和代码均来自该游戏引擎的 Java 实现，但本书也包含了用 Java 和 C#编写的功能等效的引擎实现。两种编程语言的
    API 级代码非常相似，因此如果您愿意，用 C#跟进学习也会非常容易。


    本书将从类级别出发，逐一介绍游戏引擎的每个组成部分，并附有解释和演示。当您通过本书审阅代码时，您将开始看到驱动引擎的设计模式的结构。正是这些模式，或者说类之间的交互，赋予了游戏引擎生命力。正是这些模式使软件成为引擎，而非游戏的实现。


    本书分为三个部分。第一部分（第 1 章至第 8 章）回顾了支持引擎并定义其功能的所有基类。在第二部分（第 9 章至第 14 章）中，我们深入探讨应用程序级代码。我们再次逐类审查负责加载资源、游戏设置、准备游戏窗口和绘图表面，以及映射来自不同输入源的用户输入的代码。最后，在第三部分中，我们将应用所学知识，仅使用本书中审查过的代码和一个
    IDE（集成开发环境）从头开始构建游戏。


    游戏开发世界广阔而复杂。如果您有兴趣构建下一款伟大的游戏，那么您需要具备使用高级游戏开发工具的经验。学习这些工具至少可以说是一项艰巨的任务。您将需要学习至少两个复杂的软件、至少一个复杂的
    API，以及至少一门编程语言。


    本书旨在通过提供一个可供详细审查的示例实现，让您在代码层面获得构建和使用游戏引擎的经验。本书将让您获得使用 IDE（集成开发环境）、复杂跨平台 API（Java
    和 C#中的游戏引擎 API）、游戏引擎设计模式以及使用书中介绍的游戏引擎构建游戏的经验。通过阅读本书，您将能够直接用代码制作自己的游戏，并为迎接游戏开发职业生涯中的下一个挑战做好准备。


    致谢


    我想借此机会感谢我的妻子 Katia，忍受我日复一日地在书桌前写作和编码。爱你，bbg:-*。


    关于作者 关于技术审校者


    # 第一部分


    # 1. MmgBase API 简介


    本书第一部分全面回顾了一个用 Java 和 C#编写的 2D 游戏引擎。两种实现均随本书提供，并附有完整的代码文档、137 个用于验证 API 功能的单元测试、一个演示关键游戏引擎特性的示例程序，以及两个完整的游戏——您将在我的些许帮助下自行构建。然而，就像任何优秀的电视烹饪节目一样，每个游戏也附带一份完成的副本，以便您可以对照预期结果进行工作。


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig1_HTML.jpg](img/508392_1_En_1_Fig1_HTML.jpg)


    图 1-1


    NetBeans IDE 安装 1


    随附的游戏引擎包含两个 API：一个低级 API，包含许多游戏构建工具，如精灵、声音、容器、游戏屏幕、UI 小部件、事件处理程序等；以及一个中级 API，负责启动游戏并加载设置和资源。通过这种方式，游戏引擎被表达为一个软件开发工具包，包含两个核心
    API，并附带大量示例和文档。


    您可能想知道这个游戏引擎需要什么样的播放器以及它的要求是什么，但这个游戏引擎不使用播放器。相反，游戏与引擎代码一起编译，因此您制作的每个游戏都是游戏引擎运行时代码和游戏引擎类的完整副本。这使您能够完全控制并全面查看驱动引擎的代码。


    通过本书的学习，您将了解游戏引擎是如何构建的，并且您将能够访问一个需要 NetBeans 的 Java/Swing 实现和一个需要 Visual Studio
    的 C#/MonoGame 实现。Java 版本使用带有 OpenGL 加速的 Swing，可在任何运行 Java 的平台上运行——Windows、Mac
    OSX、Linux 等。


    C#版本运行在 SDL（Simple DirectMedia Layer）上，并使用 OpenGL 和 OpenAL。通过能够探索一个 2D 游戏引擎在多个平台上的实现，您将获得构建和使用游戏引擎的宝贵经验和知识。当您审阅本书并比较跨平台实现时，API
    抽象和通用 2D 游戏引擎设计的复杂性将变得显而易见。


    MonoGame 是一个免费、开源的游戏开发技术，基于微软已停用的 XNA SDK。社区在复活该软件方面做了出色的工作，并利用最新的工具和技术使 MonoGame
    能够在以下平台上运行：


    *   Windows


    *   Mac


    *   Linux


    *   Android


    *   iOS


    *   PlayStation 4


    *   PlayStation Vita


    *   Xbox One


    *   Nintendo Switch


    *   Google Stadia


    来源：[`https://docs.monogame.net/articles/platforms/0_platforms.html`](https://docs.monogame.net/articles/platforms/0_platforms.html)


    无论您的编码经验或首选平台如何，您都可以选择使用 Java 或 C#代码库。您将能够用您的新游戏瞄准多个不同的平台，更重要的是，您将能够直接控制游戏引擎中的每一行代码。这真是令人兴奋。让我们开始吧！'
- fmt: "# Game Engine SDK Overview\n\nBefore we get into a detailed review of the\
    \ classes and example code, let’s talk a little bit about the `MmgGameApi`. In\
    \ general, when I mention the `MmgGameApi`, I’m talking about both the Java and\
    \ C# implementations. In fact, the low-level API implementations are about 95%\
    \ the same. It’s only when you get to the mid-level API that larger differences\
    \ occur.\n\nThat being said, the C#/MonoGame implementation is more efficient\
    \ than the Java/Swing implementation. It has nothing to do with the game engine\
    \ code and everything to do with the frameworks the two different implementations\
    \ use. The C#/MonoGame implementation is built for gaming, so it runs faster overall\
    \ than the Java/Swing implementation. Both are still viable solutions for implementing\
    \ your next 2D game.\n\nLet’s talk a little bit about the `MmgGameApiJava` project’s\
    \ packages. These align with the `MmgGameApiCs` project’s namespaces. You’re going\
    \ to see a lot of features, both in the programming languages themselves and in\
    \ the API implementation, that are completely different from an implementation\
    \ standpoint but functionally equivalent.\n\n## Packages/Namespaces\n\n1. `net.middlemind.MmgGameApiJava.MmgBase`\
    \  \n   `net.middlemind.MmgGameApiCs.MmgBase`  \n   This is the lowest-level API\
    \ in the game engine SDK. It sits on top of the underlying framework technology.\
    \ For the Java project, it plugs into the Java Swing and AWT APIs. For the C#\
    \ project, it plugs into MonoGame APIs that use OpenGL and OpenAL.\n\n2. `net.middlemind.MmgGameApiJava.MmgCore`\
    \  \n   `net.middlemind.MmgGameApiCs.MmgCore`  \n   This is the mid-level API\
    \ in the game engine SDK. It sits between the low-level API, `MmgBase`, and the\
    \ actual game implementation. It handles tasks like setting up the application\
    \ window and drawing surfaces, loading resources, and processing input. It also\
    \ handles XML-driven configuration, events, and more robust game screens.\n\n\
    3. `net.middlemind.MmgGameApiJava.MmgTestSpace`  \n   `net.middlemind.MmgGameApiCs.MmgTestSpace`\
    \  \n   This package represents the application level and really isn’t an SDK\
    \ API. It is an example of an implementation of the SDK with runtime code included.\
    \ This application, when executed, demonstrates how to use classes from the `MmgBase`\
    \ and `MmgCore` APIs.\n\nSo, with that, let’s begin our code review with the lowest-level\
    \ API, the `MmgBase` API. We’ll cover key classes in a logical order. This will\
    \ give you a solid understanding of how things work, how a general game engine\
    \ is designed and structured from the point of view of code, classes and their\
    \ interactions. Lastly, we’ll conclude each class review with a demonstration\
    \ of the class in use giving you a solid foundation from which to build.\n\nThe\
    \ classes we’ll cover in this text are loosely organized into the following categories.\n\
    \n### Base Classes\n\n* `MmgObj`\n* `MmgColor`\n* `MmgRect`\n* `MmgFont`\n* `MmgSound`\n\
    * `MmgPen`\n* `MmgVector2`\n* `MmgBmp`\n\n### Helper Classes\n\n* `MmgApiUtils`\n\
    * `MmgHelper`\n* `MmgScreenData`\n* `MmgFontData`\n* `MmgDebug`\n* `MmgBmpScaler`\n\
    * `MmgMediaTracker`\n\n### Advanced Classes\n\n* `Mmg9Slice`\n* `MmgContainer`\n\
    * `MmgLabelValuePair`\n* `MmgLoadingBar`\n* `MmgSprite`\n* `MmgDrawableBmpSet`\n\
    \n### Widget Classes\n\n* `MmgTextField`\n* `MmgTextBlock`\n* `MmgScrollVert`\n\
    * `MmgScrollHor`\n* `MmgScrollHorVert`\n* `MmgMenuContainer`\n* `MmgMenuItem`\n\
    \n### Screen Classes\n\n* `MmgSplashScreen`\n* `MmgLoadingScreen`\n* `MmgGameScreen`\n\
    \n### Animation Classes\n\n* `MmgPulse`\n* `MmgPosTween`\n* `MmgSizeTween`\n\n\
    ### Other Classes\n\n* `MmgCfgFileEntry`\n* `MmgEvent`\n* `MmgEventHandler`\n\n\
    There are a lot of powerful tools for creating games out there. Many of them will\
    \ require you to learn a programming language, a framework API, game creation\
    \ software, the game engine API, and an IDE to write the code in. This can pose\
    \ a daunting challenge for a beginner.\n\nThis book hopes to make your journey\
    \ into the universe of video game creation a great one by showing you how a 2D\
    \ game engine works from the code up. Giving you access to two different implementations\
    \ of the game engine, you’ll gain experience using two IDEs, if you choose to\
    \ review the code in both languages. With the tools available to you here, you’ll\
    \ build your own games and gain invaluable experience writing games directly in\
    \ code.\n\nWhile some of the knowledge you gain here will be specific to one codebase,\
    \ much of it will be general, broad knowledge you can apply to future projects\
    \ and game development experiences.\n\n## Setting Up Your Environment\n\nThe code\
    \ that accompanies this book comes in two flavors, Java and C#. That being said,\
    \ this book mainly follows the Java code. All the method breakdowns are done while\
    \ reviewing the Java code. However, there is a complete C# implementation of the\
    \ game engine, and the `MmgBase` API is very similar between both engine versions.\n\
    \nYou can follow along with the C# project if you like though you’ll have to do\
    \ a little bit more work due to the line number differences. I recommend following\
    \ along in Java first and then viewing the C# code once you have finished absorbing\
    \ the Java code. This should make you notice the differences between the two implementations\
    \ more than the similarities.\n\nThe next sections will show you how to set up\
    \ your environment for viewing the associated projects in NetBeans for the Java\
    \ project and Visual Studio for the C# project."
  raw: "## Game Engine SDK Overview\n\nBefore we get into a detailed review of the\
    \ classes and example code, let’s talk a little bit about the MmgGameApi. In general,\
    \ when I mention the MmgGameApi, I’m talking about both the Java and C# implementations.\
    \ In fact, the low-level API implementations are about 95% the same. It’s only\
    \ when you get to the mid-level API that larger differences occur.\n\nThat being\
    \ said, the C#/MonoGame implementation is more efficient than the Java/Swing implementation.\
    \ It has nothing to do with the game engine code and everything to do with the\
    \ frameworks the two different implementations use. The C#/MonoGame implementation\
    \ is built for gaming, so it runs faster overall than the Java/Swing implementation.\
    \ Both are still viable solutions for implementing your next 2D game.\n\nLet’s\
    \ talk a little bit about the MmgGameApiJava project’s packages. These align with\
    \ the MmgGameApiCs project’s namespaces. You’re going to see a lot of features,\
    \ both in the programming languages themselves and in the API implementation,\
    \ that are completely different from an implementation standpoint but functionally\
    \ equivalent.\n\n## Packages/Namespaces\n\n1.  net.middlemind.MmgGameApiJava.MmgBase\n\
    \n    net.middlemind.MmgGameApiCs.MmgBase\n\n    This is the lowest-level API\
    \ in the game engine SDK. It sits on top of the underlying framework technology.\
    \ For the Java project, it plugs into the Java Swing and AWT APIs. For the C#\
    \ project, it plugs into MonoGame APIs that use OpenGL and OpenAL.\n\n2.  net.middlemind.MmgGameApiJava.MmgCore\n\
    \n    net.middlemind.MmgGameApiCs.MmgCore\n\n    This is the mid-level API in\
    \ the game engine SDK. It sits between the low-level API, MmgBase, and the actual\
    \ game implementation. It handles tasks like setting up the application window\
    \ and drawing surfaces, loading resources, and processing input. It also handles\
    \ XML-driven configuration, events, and more robust game screens.\n\n3.  net.middlemind.MmgGameApiJava.MmgTestSpace\n\
    \n    net.middlemindMmgGameApiCs.MmgTestSpace\n\n    This package represents the\
    \ application level and really isn’t an SDK API. It is an example of an implementation\
    \ of the SDK with runtime code included. This application, when executed, demonstrates\
    \ how to use classes from the MmgBase and MmgCore APIs.\n\nSo, with that, let’s\
    \ begin our code review with the lowest-level API, the MmgBase API. We’ll cover\
    \ key classes in a logical order. This will give you a solid understanding of\
    \ how things work, how a general game engine is designed and structured from the\
    \ point of view of code, classes and their interactions. Lastly, we’ll conclude\
    \ each class review with a demonstration of the class in use giving you a solid\
    \ foundation from which to build.\n\nThe classes we’ll cover in this text are\
    \ loosely organized into the following categories.\n\n### Base Classes\n\n*  \
    \ MmgObj\n\n*   MmgColor\n\n*   MmgRect\n\n*   MmgFont\n\n*   MmgSound\n\n*  \
    \ MmgPen\n\n*   MmgVector2\n\n*   MmgBmp\n\n### Helper Classes\n\n*   MmgApiUtils\n\
    \n*   MmgHelper\n\n*   MmgScreenData\n\n*   MmgFontData\n\n*   MmgDebug\n\n* \
    \  MmgBmpScaler\n\n*   MmgMediaTracker\n\n### Advanced Classes\n\n*   Mmg9Slice\n\
    \n*   MmgContainer\n\n*   MmgLabelValuePair\n\n*   MmgLoadingBar\n\n*   MmgSprite\n\
    \n*   MmgDrawableBmpSet\n\n### Widget Classes\n\n*   MmgTextField\n\n*   MmgTextBlock\n\
    \n*   MmgScrollVert\n\n*   MmgScrollHor\n\n*   MmgScrollHorVert\n\n*   MmgMenuContainer\n\
    \n*   MmgMenuItem\n\n### Screen Classes\n\n*   MmgSplashScreen\n\n*   MmgLoadingScreen\n\
    \n*   MmgGameScreen\n\n### Animation Classes\n\n*   MmgPulse\n\n*   MmgPosTween\n\
    \n*   MmgSizeTween\n\n### Other Classes\n\n*   MmgCfgFileEntry\n\n*   MmgEvent\n\
    \n*   MmgEventHandler\n\nThere are a lot of powerful tools for creating games\
    \ out there. Many of them will require you to learn a programming language, a\
    \ framework API, game creation software, the game engine API, and an IDE to write\
    \ the code in. This can pose a daunting challenge for a beginner.\n\nThis book\
    \ hopes to make your journey into the universe of video game creation a great\
    \ one by showing you how a 2D game engine works from the code up. Giving you access\
    \ to two different implementations of the game engine, you’ll gain experience\
    \ using two IDEs, if you choose to review the code in both languages. With the\
    \ tools available to you here, you’ll build your own games and gain invaluable\
    \ experience writing games directly in code.\n\nWhile some of the knowledge you\
    \ gain here will be specific to one codebase, much of it will be general, broad\
    \ knowledge you can apply to future projects and game development experiences.\n\
    \n## Setting Up Your Environment\n\nThe code that accompanies this book comes\
    \ in two flavors, Java and C#. That being said, this book mainly follows the Java\
    \ code. All the method breakdowns are done while reviewing the Java code. However,\
    \ there is a complete C# implementation of the game engine, and the MmgBase API\
    \ is very similar between both engine versions.\n\nYou can follow along with the\
    \ C# project if you like though you’ll have to do a little bit more work due to\
    \ the line number differences. I recommend following along in Java first and then\
    \ viewing the C# code once you have finished absorbing the Java code. This should\
    \ make you notice the differences between the two implementations more than the\
    \ similarities.\n\nThe next sections will show you how to set up your environment\
    \ for viewing the associated projects in NetBeans for the Java project and Visual\
    \ Studio for the C# project."
  trans: "\n## 游戏引擎 SDK 概述\n\n在详细审视各个类与示例代码之前，我们先来聊聊 MmgGameApi。通常，当我提到 MmgGameApi\
    \ 时，指的是 Java 和 C# 两种实现。事实上，底层 API 的实现约有 95% 是相同的。只有到了中层 API，才会出现较大的差异。\n\n话虽如此，C#/MonoGame\
    \ 的实现比 Java/Swing 的实现效率更高。这与游戏引擎代码本身无关，而完全取决于两种实现所使用的框架。C#/MonoGame 实现是为游戏而构建的，因此整体运行速度比\
    \ Java/Swing 实现更快。不过，两者都是实现你的下一款 2D 游戏的可行方案。\n\n我们来聊聊 MmgGameApiJava 项目的包。这些包与\
    \ MmgGameApiCs 项目的命名空间相对应。你会看到很多特性，无论是在编程语言本身还是在 API 实现中，从实现角度来看可能完全不同，但在功能上是等价的。\n\
    \n## 包/命名空间\n\n1.  net.middlemind.MmgGameApiJava.MmgBase\n\n    net.middlemind.MmgGameApiCs.MmgBase\n\
    \n    这是游戏引擎 SDK 中最底层的 API。它位于底层框架技术之上。对于 Java 项目，它接入的是 Java Swing 和 AWT API。对于\
    \ C# 项目，它接入的是使用 OpenGL 和 OpenAL 的 MonoGame API。\n\n2.  net.middlemind.MmgGameApiJava.MmgCore\n\
    \n    net.middlemind.MmgGameApiCs.MmgCore\n\n    这是游戏引擎 SDK 中的中层 API。它位于底层 API（MmgBase）和实际游戏实现之间。它负责处理诸如设置应用程序窗口和绘制表面、加载资源以及处理输入等任务。它还处理基于\
    \ XML 的配置、事件以及更健壮的游戏屏幕。\n\n3.  net.middlemind.MmgGameApiJava.MmgTestSpace\n\n\
    \    net.middlemind.MmgGameApiCs.MmgTestSpace\n\n    这个包代表应用程序层，实际上并不是 SDK API。它是一个包含运行时代码的\
    \ SDK 实现示例。执行此应用程序时，它会演示如何使用 MmgBase 和 MmgCore API 中的类。\n\n那么，接下来，让我们从最底层的 API（MmgBase\
    \ API）开始进行代码审查。我们将按逻辑顺序介绍关键类。这将让你扎实地理解事物是如何运作的，以及一个通用游戏引擎从代码、类及其交互的角度是如何设计和构建的。最后，我们将在每个类的审查结束时，通过一个使用该类的演示来结束，为你提供一个坚实的基础。\n\
    \n我们在本文中将要介绍的类大致分为以下几类。\n\n### 基础类\n\n*   MmgObj\n\n*   MmgColor\n\n*   MmgRect\n\
    \n*   MmgFont\n\n*   MmgSound\n\n*   MmgPen\n\n*   MmgVector2\n\n*   MmgBmp\n\n\
    ### 辅助类\n\n*   MmgApiUtils\n\n*   MmgHelper\n\n*   MmgScreenData\n\n*   MmgFontData\n\
    \n*   MmgDebug\n\n*   MmgBmpScaler\n\n*   MmgMediaTracker\n\n### 高级类\n\n*   Mmg9Slice\n\
    \n*   MmgContainer\n\n*   MmgLabelValuePair\n\n*   MmgLoadingBar\n\n*   MmgSprite\n\
    \n*   MmgDrawableBmpSet\n\n### 控件类\n\n*   MmgTextField\n\n*   MmgTextBlock\n\n\
    *   MmgScrollVert\n\n*   MmgScrollHor\n\n*   MmgScrollHorVert\n\n*   MmgMenuContainer\n\
    \n*   MmgMenuItem\n\n### 屏幕类\n\n*   MmgSplashScreen\n\n*   MmgLoadingScreen\n\n\
    *   MmgGameScreen\n\n### 动画类\n\n*   MmgPulse\n\n*   MmgPosTween\n\n*   MmgSizeTween\n\
    \n### 其他类\n\n*   MmgCfgFileEntry\n\n*   MmgEvent\n\n*   MmgEventHandler\n\n市面上有很多用于创建游戏的强大工具。其中许多工具要求你学习一门编程语言、一个框架\
    \ API、游戏创作软件、游戏引擎 API 以及一个用于编写代码的 IDE。这对初学者来说可能是一个艰巨的挑战。\n\n本书希望通过从代码层面向你展示 2D\
    \ 游戏引擎的工作原理，让你的电子游戏创作之旅变得精彩。通过让你接触游戏引擎的两种不同实现，如果你选择用两种语言审查代码，你将获得使用两种 IDE 的经验。利用这里提供的工具，你将能够构建自己的游戏，并积累直接用代码编写游戏的宝贵经验。\n\
    \n虽然你在这里获得的一些知识将特定于某个代码库，但其中大部分将是通用的、广泛的知识，你可以将其应用于未来的项目和游戏开发经验中。\n\n## 设置你的环境\n\
    \n本书附带的代码有两种形式：Java 和 C#。话虽如此，本书主要遵循 Java 代码。所有的方法分解都是在审查 Java 代码时完成的。但是，有一个完整的\
    \ C# 游戏引擎实现，并且 MmgBase API 在两个引擎版本之间非常相似。\n\n如果你愿意，可以跟随 C# 项目，但由于行号差异，你需要多做一点工作。我建议先跟随\
    \ Java 代码，在完全吸收 Java 代码后再查看 C# 代码。这应该会让你更注意到两种实现之间的差异，而非相似之处。\n\n接下来的部分将向你展示如何设置环境，以便在\
    \ NetBeans（针对 Java 项目）和 Visual Studio（针对 C# 项目）中查看相关项目。\n"
- fmt: '# Installing the NetBeans IDE


    For this section, you’ll need Internet access to download a copy of the IDE and
    the project that is associated with this book. Once you’re online and settled,
    navigate your favorite browser to the NetBeans IDE main site, [`http://netbeans.org`](http://netbeans.org).


    Locate the downloads link. This will direct you to a list of recent versions of
    the IDE. Scroll down until you see the latest LTS, long-term support, entry in
    the list. At the time of this writing, the latest LTS version is 12.1. Download
    and install the software. While the NetBeans IDE is installing, go to this URL,
    [`http://www.apress.com/source-code`](http://www.apress.com/source-code), and
    download the zip file for the Java version of the game engine project.


    When the project file is done downloading, decompress it, and then move it to
    the location of your Java projects. If you are new to this and don’t have a place,
    create a new folder in the location where you like to keep your documents. Once
    the IDE is finished installing and the project file is unzipped and moved to the
    desired location, launch the NetBeans IDE. Select “File ➤ Open Project…” from
    the menu. Find the location of the project folder you just downloaded and unzipped.


    When the project is done loading, we need to check a few things. Right-click the
    `MmgGameApiJava` project and select the **Properties** entry. The project settings
    window will pop up. Select the **Packaging** option from the list of sections
    on the left-hand side of the window. You should make sure your project has the
    options set as shown in the following screenshot.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig2_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    NetBeans IDE Install 2


    Make sure that the **JAR File** field at the top of the screen starts with the
    `dist` folder. Once that’s done, click the **Run** entry on the left-hand list
    of categories. We’re going to make sure that the proper runtime settings are in
    place.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig3_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    NetBeans IDE Install 3


    With regard to the runtime settings, you’re going to want to make sure that the
    main class is set; choose the `MmgTestScreens` class of the `MmgTestSpace` package.
    The Arguments field can be left blank, or you can experiment with different FPS
    settings. It’s best to work with a frame rate between 15 and 60 FPS. Notice the
    path that is highlighted in blue in the preceding image. This is the path to the
    native libraries on my development environment.


    You should change that path to the equivalent folder in your environment. That
    will enable native OS library support for the game engine project. Before you
    can run anything, we should make sure the project can compile. Right-click the
    project in the list and select the **Clean and Build** option.


    After the project compiles, you should familiarize yourself with how to run the
    example game screens project. Find the `MmgTestSpace` package in the `MmgGameApiJava`
    project’s package list. Locate the `MmgTestScreens` file, right-click it, and
    select **Run File**. Give the application a few seconds to load up. After a short
    wait, you should see something similar to the screenshot shown in the following.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig4_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    NetBeans IDE Install 4


    This concludes the NetBeans IDE installation and configuration process. If you
    want to use the C# version of the game engine, check out the next section.


    # Installing the Visual Studio IDE


    For this section, you’ll need Internet access to download a copy of the IDE and
    the C# version of the project that is associated with this book. Because the C#
    version of the game engine requires the Visual Studio IDE, some Linux users may
    not have access to Visual Studio. Please follow along by viewing the source code
    using your favorite text editor. For Mac and Windows users, once you’re online
    and settled, navigate your favorite browser to the Visual Studio IDE main site,
    [`https://visualstudio.microsoft.com/`](https://visualstudio.microsoft.com/).
    Locate the links for your operating system and then download and install the IDE.
    Once Visual Studio is done installing, open up a command prompt; type `cmd.exe`
    in the Windows search bar. Run the following commands in the command prompt.


    ```

    dotnet tool install -g dotnet-mgcb

    dotnet tool install -g dotnet-mgcb-editor

    mgcb-editor –register

    Listing 1-1

    Visual Studio IDE Install 1dotnet new -i MonoGame.Templates.CSharp::3.8.0.1641

    ```


    Open the game engine project for Visual Studio, and you should be greeted by the
    following screen.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig5_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Visual Studio IDE Install 2


    Double-check that the NuGet packages have all been installed.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig6_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Visual Studio IDE Install 3


    Expand the **Content** folder and select the `Content.mgcb` file. Right-click
    it and select **Open With** from the menu options. Select the **MGCB** editor
    as shown in the following and open the content file.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig7_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Visual Studio IDE Install 4


    When the content editor window opens, click the **Rebuild** icon on the top right-hand
    side of the editor icon bar. Wait for the editor to finish compiling the content.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig8_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Visual Studio IDE Install 5


    Rebuild the `MmgGameApiCs` project. You may encounter the following error code
    during this process:


    ```

    Error MSB3073 any\mgcb.dll /quiet exited with code 1.

    ```


    Double-click the error message to open the file with the offending line of code.
    Locate and comment out the command executed after the code comment “Execute MGCB
    from the project directory so we use the correct manifest.” We can just run the
    compile step on our own when the content changes, which should not be often. You
    should now be able to clean and build the project. If you navigate to the project
    directory and find the `bin` folder, you can run the following command to execute
    the example application:


    ```

    C:\visualstudio_projects\MmgGameApiCs\MmgGameApiCs\bin\Debug\netcoreapp3.1>dotnet
    ./MmgGameApiCs.dll example

    ```


    You’ll have to adjust the path you use to match your environment. You should see
    the following application launch after a few seconds.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig9_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Visual Studio IDE Install 6


    That brings us to the conclusion of this chapter. You should now be able to set
    up and run the game engine in either Java or C# or both!'
