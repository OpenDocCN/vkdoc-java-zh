    这在测试不同屏幕尺寸的游戏时非常有用，可以直观感受其外观和运行效果，但你应该预先配置好尺寸，使游戏无需缩放。最后两个字段与游戏引擎定制有关。提供给游戏的命令行参数存储在
    `ARGS` 字段中。你可以使用 CLI 参数来修改游戏尺寸等设置。


    最后一个条目是用于处理配置设置的游戏引擎配置文件。这可以通过 CLI 参数进行修改，因此你可以从游戏启动命令驱动游戏引擎设置。这让你能够以数据驱动、动态的方式运行自定义游戏设置。接下来，让我们看看静态类方法。


    ```

    //入口点

    public static final void main(String[] args) { ... }

    //配置方法

    public static String ArrayHasEntryLike(String v, String[] s) { ... }

    public static void SetField(DatConstantsEntry ent, Field f) throws Exception {
    ... }

    //操作系统支持方法

    public static void RunOsSpecificCode() { ... }

    public static void LoadNativeLibraries() { ... }

    public static boolean isWindows(String OS) { ... }

    public static boolean isMac(String OS) { ... }

    public static boolean isUnix(String OS) { ... }

    public static boolean isSolaris(String OS) { ... }

    清单 10-2

    MmgApiGame 静态类成员 2

    ```


    列出的第一个方法是静态主入口点。它作为运行时进程的起点，执行以下步骤序列：


    1.  运行操作系统特定代码（如果启用）。

    2.  加载原生库（如果启用）。

    3.  处理命令行参数。

    4.  处理引擎配置文件。

    5.  初始化主窗口。

    6.  初始化游戏面板。

    7.  启动帧率工作线程。


    C# 实现运行以下略有不同的步骤序列：


    1.  运行操作系统特定代码（如果启用）。

    2.  加载原生库（如果启用）。

    3.  处理命令行参数。

    4.  处理引擎配置文件。

    5.  初始化游戏面板。


    `ArrayHasEntryLike` 方法用于在命令行参数列表中查找条目。引擎开箱即支持以下 CLI 驱动的属性：


    *   `WIN_WIDTH`

    *   `WIN_HEIGHT`

    *   `PANEL_WIDTH`

    *   `PANEL_HEIGHT`

    *   `FPS`

    *   `ENGINE_CONFIG_FILE`


    你可以根据游戏的特定需求轻松添加自己的条目。`SetField` 方法用于处理游戏引擎配置文件。在处理文件时，它会在指定类中设置指定的静态字段值。游戏引擎开箱即支持
    `GameSettings`、`MmgHelper` 和 `MmgApiGame` 类。同样，你可以根据需要添加对任何游戏特定类的支持。


    最后一组方法是操作系统支持方法。这些方法用于确定游戏运行在哪个操作系统上，并执行操作系统特定代码或加载用于手柄支持的操作系统特定库。C# 实现不需要原生库支持，因为它内置了手柄支持。


    ### 深入解析：MmgApiGame


    MmgCore API 是一个比我们在第 1 部分中回顾的 MmgBase API 更高级别的 API。因此，该库中的类非常专业化，通常只使用一次。有时，当一个类只在一个地方使用时，很难展示其使用示例。


    与通常的演示部分不同，我们将进行一个“深入解析”部分，深入介绍我们正在审查的类的一个方面。以下代码片段来自 `MainApiGame` 类的 `main`
    方法的末尾。


    ```

    01 mf = new MainFrame(WIN_WIDTH, WIN_HEIGHT, PANEL_WIDTH, PANEL_HEIGHT, GAME_WIDTH,
    GAME_HEIGHT);

    02 pnlGame = new GamePanel(mf, PANEL_WIDTH, PANEL_HEIGHT, (WIN_WIDTH - PANEL_WIDTH)
    / 2, (WIN_HEIGHT - PANEL_HEIGHT) / 2, GAME_WIDTH, GAME_HEIGHT);

    03 mf.SetGamePanel(pnlGame);

    04 mf.InitComponents();

    05 fr = new RunFrameRate(mf, FPS);


    07 mf.setSize(WIN_WIDTH, WIN_HEIGHT);

    08 mf.setResizable(false);

    09 mf.setVisible(true);

    10 mf.setName(GameSettings.NAME);


    12 if (GameSettings.DEVELOPMENT_MODE_ON == false) {

    13     mf.setTitle(GameSettings.TITLE);

    14 } else {

    15     mf.setTitle(GameSettings.TITLE + " - " + GameSettings.DEVELOPER_COMPANY
    + " (" + GameSettings.VERSION + ")");

    16 }


    18 mf.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);

    19 mf.GetGamePanel().PrepBuffers();

    20 t = new Thread(fr);

    21 t.start();

    清单 10-3

    MmgApiGame 深入解析 1

    ```


    代码的前两行展示了 `MainFrame` 和 `GamePanel` 类的初始化。在第 3-4 行，主窗口设置了游戏面板并初始化了其组件。`RunFrameRate`
    字段 `fr` 在第 5 行初始化。窗口的尺寸和某些类属性在第 7-10 行设置。如果开发模式标志设置为 true，则标题会配置为包含比平时更多的游戏信息。


    `MainFrame` 负责处理游戏关闭事件，为此，我们设置了窗口应使用的退出操作类型。第 18 行的代码将主窗口配置为在窗口关闭时退出。游戏面板的绘图表面（缓冲区）在第
    19 行准备就绪；帧率线程在第 20 和 21 行启动。此时，游戏已启动并运行，第一个游戏画面正在渲染。


    ## 静态主入口点：MainFrame


    `MainFrame` 类扩展了 Java 框架的 `JPanel` 类，负责创建游戏运行的窗口。`MainFrame` 类处理游戏关闭事件。你可能需要为此类添加代码，以处理游戏的特殊关闭任务。关闭事件在
    `InitComponents` 方法中注册。此类还负责将由 `GamePanel` 类创建的画布添加到窗口中进行主动渲染。


    ### 类字段


    `MainFrame` 类具有以下分组中列出的多个字段。这些字段大致属于它们所列出的组。


    ```

    //尺寸

    public final int winWidth;

    public final int winHeight;

    public final int panelWidth;

    public final int panelHeight;

    public final int gameWidth;

    public final int gameHeight;

    //偏移量

    public final int myX;

    public final int myY;

    //游戏面板

    public GamePanel pnlGame;

    清单 10-4

    MainFrame 类字段 1


    第一组字段是从静态主类传入的尺寸。这些字段保存了游戏启动时配置的值的副本。偏移量组中列出了两个新字段。`myX` 和 `myY` 字段用于跟踪游戏面板在窗口内的偏移量。


    最后一个字段 `pnlGame` 是 `GamePanel` 类的一个实例，负责呈现一个在 `MainFrame` 中绘制的画布。如果你使用的是 C#，则不会看到相同的结构。你只会看到
    `GamePanel` 类处理与 Java 实现中的 `MainFrame` 和 `GamePanel` 类相同的职责。

