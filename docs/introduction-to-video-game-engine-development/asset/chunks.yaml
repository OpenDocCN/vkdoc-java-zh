- fmt: '### Demonstration: `MmgContainer` Class


    The example code for this demonstration section comes from the `LoadResources`
    method of the `ScreenTestMmgContainer` class in the `MmgTestSpace` package, or
    namespace in C#. Let’s take a look at some code!


    ```

    01 frame2 = MmgHelper.GetBasicCachedBmp("soldier_frame_2.png");

    02 frame2 = MmgBmpScaler.ScaleMmgBmp(frame2, 2.0f, true);

    03 MmgHelper.CenterHorAndVert(frame2);

    04 frame2.SetY(frame2.GetY() - 0);


    06 frame3 = MmgHelper.GetBasicCachedBmp("soldier_frame_3.png");

    07 frame3 = MmgBmpScaler.ScaleMmgBmp(frame3, 2.0f, true);

    08 MmgHelper.CenterHorAndVert(frame3);

    09 frame3.SetY(frame2.GetY() + MmgHelper.ScaleValue(80));


    11 holder = new MmgContainer();

    12 holder.Add(frame2);

    13 holder.Add(frame3);

    14 holder.SetWidth(frame1.GetWidth());

    15 holder.SetHeight(MmgHelper.ScaleValue(160));

    16 MmgHelper.CenterHorAndVert(holder);

    17 AddObj(holder);

    Listing 5-10

    MmgContainer Class Demonstration 1

    ```


    The first two sections of code, lines 1–4 and lines 6–9, load up two images, animation
    frames, using the image resource cache. Each frame is scaled and positioned to
    align vertically in the center of the screen. The third section of code shows
    the initialization of an `MmgContainer` object that adds the `frame1` and `frame2`
    variables as child objects.


    Notice that even though the `MmgContainer` itself doesn’t display on the screen,
    we make sure to set the container dimensions on lines 14 and 15. The container
    is added to the game engine’s drawing routine on line 17. This ensures the container’s
    children are drawn to the screen via the `MmgContainer` class’ `MmgDraw` method.


    ## Advanced Classes: `MmgLabelValuePair`


    The `MmgLabelValuePair` class is used to hold label and value text for display
    on game screens. Think settings entries, game options, and in-game HUD. The class
    provides a quick way to set up fonts, text, and positioning for the label and
    value text displayed.


    ### Static Class Members


    The only static class member we have to review is an X axis positioning value,
    `DEFAULT_PADDING_X`. This is the default value to use for padding the space between
    the label and value text. There are no pertinent enumerations to review for this
    class, so we’ll skip that section of the review process and move on to the class’
    field review.


    ### Class Fields


    There are only four class fields for us to review with regard to the `MmgLabelValuePair`
    class. I’ve listed them in the following group.


    ```

    private MmgFont lbl;

    private MmgFont val;

    private int paddingX;

    private boolean skipReset;

    Listing 5-11

    MmgLabelValuePair Class Fields 1

    ```


    The first field in the list is an `MmgFont` instance that is used to display the
    label text. The second field is also an `MmgFont` instance, and it’s used to display
    the value text of the label-value pair. The `paddingX` field is used to hold a
    horizontal padding value so that the label and value text have some separation
    between them. The last field in the set is a Boolean flag used to indicate that
    we should skip repositioning the label and value objects.


    The class will automatically prep itself after certain class fields are changed.
    We don’t always want the class to prep itself. We can control this aspect of the
    class using the `skipReset` field. If set to false, it will skip the automatic
    class preparation step. Keep in mind you should make sure the class is properly
    prepared before using it in your game screen.


    ### Support Method Details


    The `MmgLabelValuePair` class has support methods that help you control different
    aspects of the class and how it displays on the screen.


    ```

    //Value methods

    public MmgFont GetValue() { ... }

    public void SetValue(MmgFont ft) { ... }

    public String GetValueText() { ... }

    public void SetValueText(String s) { ... }

    public Font GetValueFont() { ... }

    public void SetValueFont(Font ft) { ... }

    //Font methods

    public MmgFont GetLabel() { ... }

    public void SetLabel(MmgFont ft) { ... }

    public String GetLabelText() { ... }

    public void SetLabelText(String s) { ... }

    public Font GetLabelFont() { ... }

    public void SetLabelFont(Font ft) { ... }

    //Attribute methods

    public void SetFontSize(int sz) { ... }

    public int GetFontSize() { ... }

    public void SetMmgColor(MmgColor c) { ... }

    public boolean GetSkipReset() { ... }

    public void SetSkipReset(boolean b) { ... }

    //Positioning

    public void SetPosition(MmgVector2 v) { ... }

    public void SetPosition(int x, int y) { ... }

    public void SetX(int x) { ... }

    public void SetY(int y) { ... }

    public int GetPaddingX() { ... }

    public void SetPaddingX(int p) { ... }

    //Other Methods

    private void Reset() { ... }

    Listing 5-12

    MmgLabelValuePair Support Method Details 1

    ```


    The first set of support methods listed in the preceding helps you manage the
    `value` field. You can access the `value` field using get and set methods. You
    can also specify the text to be displayed and the font to be used. The same set
    of methods exist for the class’ `label` field. This gives you a great amount of
    control over the text and fonts used to render the class.


    The next set of methods allow you to control attributes of both the `label` and
    `value` fields. You can use the `GetFontSize` method to pull the font size of
    the `label`. Because the `label` and `value` fields are independent of each other,
    you could potentially have two different font sizes set. The `GetFontSize` method
    won’t try to make a determination of which font size to use, `label` or `value`;
    it will always return the `label`’s font size.


    The `SetFontSize` method is similar in nature. You can use this method to update
    the font size of both the label and value objects. This method, and many other
    methods that change the properties of the `label` and `value`, will attempt to
    prep the class and align the text for display. If you don’t want the class preparation
    step to run, set the `skipReset` class field to true before calling the support
    method.


    The next method in this set is the `SetMmgColor` method. While this may seem to
    be a simple set method, it’s not. This method will set the color attributes of
    the container and the `label` and `value` fields. The last set of methods listed
    in the preceding is for positioning the `MmgLabelValuePair` class either by setting
    its location, adjusting the horizontal offset, or resetting the positioning of
    the label and value objects.


    The positioning methods, `SetPosition`, `SetX`, and `SetY`, are used to adjust
    the position of the label-value pair. Note that using these methods will only
    update the label object. The positioning methods will call the class’ `Reset`
    method once the label’s position is set. The `Reset` method will take care of
    aligning the `label` and `value` text. If you don’t want the class to prep automatically,
    make sure to set the `skipReset` field to true. Always remember to call the `Reset`
    method when you’re done modifying the class if it doesn’t run automatically.'
