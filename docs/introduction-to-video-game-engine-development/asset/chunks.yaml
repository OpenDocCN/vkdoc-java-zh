    ```


    The first group of class fields are some standard fields we’ve seen before in
    this chapter. The `state` and `owner` fields are there to associate the screen
    with a game panel and game state value. The third entry, `classConfig`, is there
    to hold class config data, if any, loaded up at runtime.


    The second set of fields are there to power the screen’s menu system. The first
    five fields are `MmgBmp`, image objects, used to represent five visual elements
    of the main menu. Those elements are the title, subtitle, start game option, exit
    game option, and footer. The `menuCursor` field is also an `MmgBmp` image used
    to draw the menu system’s cursor.


    The `MmgMenuContainer` field `menu` is used to hold the menu items that are based
    on the first five fields of the menu group. The `menuSound` field holds a sound
    effect that will be played if a menu item is selected. The `version` field is
    another visual element that displays a version string on the lower left-hand side
    of the menu screen. The final entry listed, `handleMenuEvent`, is a class field
    that provides event handling to the menu system.


