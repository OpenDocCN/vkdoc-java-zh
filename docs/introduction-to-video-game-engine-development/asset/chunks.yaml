- fmt: '#### Demo Review: Main Method Details


    The class’ main methods are listed in the following. These methods should look
    similar to some of the methods we’ve encountered during the demonstration sections
    of the `MmgBase` API review.


    ```

    public ScreenSplash(GameStates State, GamePanel Owner) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    public void MmgHandleUpdate(Object obj) { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 8-8

    Demo Review: ScreenSplash Main Method Details 1

    ```


    The class constructor defines the screen’s game state and the game panel that
    the screen belongs to. The `LoadResources` method is used to prepare the resources
    used by the game screen before it’s drawn. The `UnloadResources` method is used
    to clear the class’ loaded resources.


    The `MmgHandleUpdate` class is used to handle update events from the splash screen’s
    timer. Lastly, the `MmgDraw` method is used to draw the game screen. I should
    mention that the `MmgGameScreen` class extends the `MmgObj` class. So even at
    this level, the `MmgObj` class is driving the underlying functionality.


    This class demonstrates extending a general `MmgBase` API class and customizing
    it for use in an application or game. During the customization, the class becomes
    more concrete and less general as it plugs into the existing application infrastructure.


    ## Game Screen Classes: MmgLoadingScreen


    The `MmgLoadingScreen` class is another high-level class in the `MmgBase` API.
    The class is used to run the game engine’s default resource loading process. Much
    like the `MmgSplashScreen` class that extends the `MmgGameScreen` class and provides
    a loose implementation of a splash screen, the `MmgLoadingScreen` class also extends
    the `MmgGameScreen` class and provides a loose implementation of a loading screen.


    I describe the implementation as loose only because the class hasn’t been plugged
    into a runtime environment, so it’s left somewhat open as to how the class can
    be used. When we cover an implementation example of this class in the demonstration
    section, you’ll see a more concrete implementation of the screen that is designed
    to plug into the game engine’s default runtime.


    ### Class Fields


    The `MmgLoadingScreen` class has two fields for use to review.


    ```

    private MmgLoadingBar loadingBar;

    private float loadingBarOffsetBottom = 0.10f;

    Listing 8-9

    MmgLoadingScreen Class Fields 1

    ```


    The first field is a loading bar class instance that will be used to indicate
    the progress of the game’s resource load. The second field listed is used to adjust
    the position of the loading bar by a percentage of the loading screen’s height.


    ### Support Method Details


    The `MmgLoadingScreen`’s support methods provide access to the class’ fields.
    You can get and set the loading bar and get access to the loading bar offset value.


    ```

    public MmgLoadingBar GetLoadingBar() { ... }

    public void SetLoadingBar(MmgLoadingBar lb, float lBarOff) { ... }

    public float GetLoadingBarOffsetBottom() { ... }

    Listing 8-10

    MmgLoadingScreen Support Method Details 1

    ```


    The support methods are very simple and direct, so I won’t go into any more detail
    about them here. Make sure to look them over and understand how they’re used.


    ### Main Method Details


    The class’ main methods comprise a standard assortment of constructors, cloning
    methods, and general main methods. Many of these methods should look familiar
    from the previous class reviews we have done.


    ```

    //Constructors

    public MmgLoadingScreen() { ... }

    public MmgLoadingScreen(MmgLoadingBar LoadingBar, float lBarOff) { ... }

    public MmgLoadingScreen(MmgLoadingScreen obj) { ... }

    //Cloning methods

    public MmgObj Clone() { ... }

    public MmgLoadingScreen CloneTyped() { ... }

    //General main methods

    public void MmgDraw(MmgPen p) { ... }

    public boolean ApiEquals(MmgLoadingScreen obj) { ... }

    Listing 8-11

    MmgLoadingScreen Main Method Details 1

    ```


    The first constructor takes no arguments and creates a new instance of the class
    that is not ready for use. Some further customizations regarding the loading bar
    are required. Fortunately, there is a second constructor option that takes a loading
    bar and a positioning offset as arguments. This constructor creates a new class
    instance that is ready to use.


    The third constructor listed is a specialized constructor that takes an `MmgLoadingScreen`
    object as an argument and uses it to create a new, unique copy of the object.
    The next two methods, cloning methods, provide class cloning functionality. These
    methods use the specialized constructor to create a copy of the current class
    and then return that copy cast to the specified type.


    Last but not least are the draw method, `MmgDraw`, and the comparison method,
    `ApiEquals`. The draw method is called as part of the game engine’s default drawing
    routine, as we’ve seen before. The `ApiEquals` method is an API-level comparison
    method used to check for equality between two `MmgLoadingScreen` instances.


    ### Demonstration: MmgLoadingScreen Class


    For the `MmgLoadingScreen` class’ demonstration section, we’ll take a look at
    the `MmgCore` API’s implementation of the `ScreenLoading` class that extends the
    `MmgBase` API’s `MmgLoadingScreen` class. This will give us a great example of
    the class in use. Just to be clear, the following subsections are for the review
    of the `ScreenLoading` class from the `MmgCore` API.


    #### Demo Review: Static Class Members


    Similarly to the `ScreenSplash` class, the `MmgCore` API’s `ScreenLoading` class
    has one static field for us to cover.


    ```

    public static int EVENT_LOAD_COMPLETE = 0;

    Listing 8-12

    Demo Review: ScreenLoading Static Class Members 1

    ```


    The `EVENT_LOAD_COMPLETE` field is used to indicate in an event that the resource
    load has finished. The event is meant to be processed by the game panel class
    causing it to change the current screen from the loading screen to the main menu
    screen.


    #### Demo Review: Class Fields


    The `ScreenLoading` class has a few class fields that it uses to extend the functionality
    of the super class, the `MmgLoadingScreen` class, to perform an actual resource
    load.


    ```

    public GameStates state;

    public GamePanel owner;

    public long slowDown;

    public RunResourceLoad datLoad;

    public GenericEventHandler handler;

    public Hashtable classConfig;

    Listing 8-13

    Demo Review: ScreenLoading Class Fields 1

    ```


    The `state` and `owner` fields are set by the class constructor and are used to
    create the association between the game screen and the game panel class. The `slowDown`
    field is used to add a delay, in milliseconds, to the resource loading process.
    This can be helpful when you’re only loading a few resources but want to see the
    loading progress.


    The `datLoad` field is an instance of the `RunResourceLoad` class, and it’s used
    to run the resource load on its own thread. The `handler` field is a generic event
    handler, and it’s used to send a resource load complete event to the game panel
    class so that it can respond by changing game screens to the main menu. The `ScreenLoading`
    class implements the `LoadResourceUpdateHandler` interface.


    This means that the class receives updates on the progress of the resource load
    and uses that data to set the loading bar’s value. The last entry listed in the
    preceding is the `classConfig` field. This is a private class field used to hold
    config file data if any is found. The data is used to customize the display of
    the game screen.'
