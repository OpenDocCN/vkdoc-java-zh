    ```


    The preceding snippet starts off with the code needed to prepare a new text field
    for display. The desired dimensions are calculated on lines 1 and 2. The background
    source image, used in the creation of an `Mmg9Slice` object, is loaded on line
    3 with a call to the `MmgHelper` class’ `GetBasicCachedBmp` method. Lines 4–9
    handle creating and configuring the `MmgTextField` class.


    The constructor is called on line 4 with the background image, width, height,
    and other arguments being passed in to set the class fields. The text field object
    is centered on line 5, and on lines 6 and 7, the max length error detection is
    turned on and an event is registered to be handled by the `MmgTextField` class.
    The new object is added to the game screen’s list of drawable objects on line
    9.


    The `ScreenTestMmgTextField` class has input events mapped from the application’s
    core code to event handler methods in the `MmgCore` package''s `GamePanel` class,
    or namespace if you’re following along in C#. The `GamePanel` class forwards the
    events onto the current game screen. In this case, the `ScreenTestMmgTextField`
    class receives them and after some internal logic calls the `MmgTextField` class’
    `ProcessKeyClick` or `DeleteChar` method depending on what key was pressed.


    If the pressed key is an alphanumeric character, then it''s sent to the text field
    object’s `ProcessKeyClick` method. If the pressed key is the Backspace key, then
    the object''s `DeleteChar` method is called. In the next snippet of code, the
    `MmgHandleEvent` method is listed. This method responds to events coming from
    the text field we created in the first code snippet. In this case, since we have
    only one event, we don’t check for the event ID and type. We simply check the
    event’s message and make a note of the event by displaying it on the game screen.


    ## Widget Classes: MmgTextBlock


    The `MmgTextBlock` class is used to display larger blocks of text like paragraphs
    of a story or parts of a dialog. The `MmgTextBlock` class will parse a string
    of text and break it up into a series of strings that display correctly in the
    dimensions of the `MmgTextBlock` object. This class is used to break a large amount
    of text into multiple pages of properly formatted text.


    I would like to take a moment to point out that up until, roughly this chapter,
    most classes required very small amounts of configuration. Some classes would
    implement a preparation method internally and automatically call it when certain
    fields changed, some would call the preparation method at the end of the constructor,
    and others would require you to call the proper method at the proper time. This
    class is the latter type of class.


    The last thing I should mention is that the `MmgTextBlock` class extends the `MmgObj`
    class, so it’s a part of the set of drawable objects. Think about this for a minute.
    So were the text field and the label-value pair and the `MmgBmp` image and the
    `MmgFont`-based text class. The game engine really doesn’t care which class it’s
    processing. They all look like `MmgObj` classes to the engine’s drawing routine.'
