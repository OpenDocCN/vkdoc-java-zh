    class. Up next, we’ll take a look at how strings are managed in the game engine.


    ## Dynamic Settings: DatExternalStrings


    The `DatExternalStrings` class is used to hold your game’s strings. Instead of
    hard coding them in-line with your game classes, you can enter them into this
    class for easy access throughout your game. The class is designed to use static
    fields and methods. You simply add in an ID for a string and then add the code
    to load your string to the class’ preparation method.


    ### Static Class Members


    All of the `DatExternalStrings` class members are static. Let’s take a look at
    the static fields first.


    ```

    public static Hashtable EXT = new Hashtable();

    public static int EXT_TALK_TREEFOLK_NO_CONVO = 0;

    public static int EXT_TALK_TREEFOLK_CONVO = 1;

    public static int EXT_TALK_PIGGY_NO_CONVO = 2;

    public static String DEFAULT_LANGUAGE = "en";

    Listing 11-9

    DatExternalStrings Static Class Members 1

    ```


    The first field listed in the preceding, `EXT`, is the data structure that holds
    all of the class’ strings. This field is a default part of the class. The next
    three fields are examples of added fields that are used as unique string identifiers.
    To use a string managed by this class, just use the ID field as the key to pull
    an associated string value.


    The last entry listed in the preceding is the default language code. This code
    can be any value you want really. The main purpose here is to provide a value
    to drive loading different strings based on the language code provided. Let’s
    move on to the static class methods next.


    ```

    public static void LOAD_EXT_STRINGS() { ... }

    public static void LOAD_EXT_STRINGS(String langCode) { ... }

    Listing 11-10

    DatExternalStrings Static Class Members 2

    ```


    The methods listed in the preceding are used to prep the class for use by loading
    up a set of strings based on the user-defined IDs and strings. The first entry
    listed in the preceding, `LOAD_EXT_STRINGS`, takes no arguments and uses the default
    language code to load up the configured string data. The second entry performs
    the same operation except you can provide a language code as a method argument.
    You can use this system to add multilanguage support to your game.


    ### Demonstration: DatExternalStrings Class


    The example code for the `DatExternalStrings` class comes from the class’ `LOAD_EXT_STRINGS`
    method.


    ```

    1 if (EXT.contains(EXT_TALK_NOBODY_HERE) == false) {

    2     EXT.put(EXT_TALK_NOBODY_HERE, "There''s nobody here to talk to.");

    3 }

    Listing 11-11

    DatExternalStrings Class Demonstration 1

    ```


    The code listed in the preceding demonstrates how to load new strings into the
    external strings class. Note that we check to see if a particular entry exists
    before adding the ID and string value to the class’ list of strings.


    ```

    1 DatExternalStrings.EXT.get(DatExternalStrings.STRING_ID);

    Listing 11-12

    DatExternalStrings Class Demonstration 2

    ```


    The next short snippet of code listed in the preceding is an example of using
    the `DatExternalStrings` class to access a loaded string value. Notice that all
    we’re doing is utilizing static class members to specify which string we want
    to access.


    ## Dynamic Settings: GameSettings


    The `GameSettings` class is another static value class similar to the `DatExternalStrings`
    class we just reviewed. It''s mainly used to hold values that configure the game
    engine and as a place for user-defined fields that control how the game plays.
    Remember, you can set values for the static fields of this class using the built-in
    game engine config file support.'
