    ## 章节总结


    在本章中，我们详细回顾了游戏引擎 MmgBase API 的基础类。如果你仔细审视我们介绍过的这些类，你会发现你几乎已经拥有了开始制作游戏所需的一切。这并非偶然。我们在此回顾的这些基础类是游戏引擎设计和实现的基石。


    我想从我们看过的代码中抽身出来，着手构建更宏观的图景。我们正在努力定义驱动通用 2D 游戏引擎所需的类。在此过程中，我们介绍了以下类：


    *   **MmgObj**：C#中整个 MmgBase API 的超类或基类。对具有位置、尺寸和颜色的 2D 空间中的对象进行建模。

    *   **MmgColor**：用于表示颜色的 API 类。

    *   **MmgRect**：用于表示具有位置和尺寸的矩形的 API 类。

    *   **MmgFont**：扩展了`MmgObj`类的 API 类，用于在绘制到屏幕时表示字体渲染的文本。

    *   **MmgSound**：为 MmgBase API 表示声音资源的 API 类。

    *   **MmgPen**：处理 API 所有绘图的 API 类。

    *   **MmgVector2**：对双精度、浮点或整数精度的双分量向量进行建模的 API 类，用于 API 定位支持。

    *   **MmgBmp**：扩展了`MmgObj`类的 API 类，用于表示 API 的图像。


    你可能会注意到，虽然我们介绍了很多代码，但 API 中并没有出现一个我们可以看到的全面结构或能力。直到你开始在第 2 部分中回顾 MmgCore API，并看到所有内容如何整合在一起时，你才会开始看到你所寻找的结构。


    话虽如此，这是有原因的。我们正在回顾驱动游戏引擎的代码，而不是游戏本身。这意味着这些代码本质上是通用的。类之间没有很多硬性连接。存在很多潜在连接，但没有什么是强制性的。这是因为我们正在回顾一个在屏幕上绘制图像的通用
    2D 游戏引擎的代码。它不关心绘制是如何发生的——单屏、滚动屏幕、等距视角还是俯视视角。引擎只关心如何尽可能快地将当前可绘制对象集合绘制到屏幕上。


    这就是游戏引擎相对于单个游戏的优势所在。它被设计成一个 2D 可绘制对象的通用处理器，而不是一个特定的处理器。在接下来的章节中，我们将介绍更多 MmgBase
    API 的内容，你将开始看到类之间越来越多可能存在的连接，这些连接可以用于创建你下一个游戏的不同方面。


    # 3. 辅助类


    在本章中，你将回顾 MmgBase API 的辅助类。辅助类通常易于初始化，使用静态方法来暴露功能，并为 API 的不同特性提供支持。在本章回顾中，我们将遇到以下类：


    *   MmgApiUtils

    *   MmgHelper

    *   MmgScreenData

    *   MmgFontData

    *   MmgDebug

    *   MmgBmpScaler

    *   MmgMediaTracker


    ## 辅助类：MmgApiUtils


    `MmgApiUtils`类是一个简单的辅助类，为 MmgBase API 提供集中的日志记录支持。`MmgApiUtils`类被实现为一个便捷的辅助类，因此它只有静态类成员需要回顾。


    ### 静态类成员


    `logging`类字段用于控制类的输出。如果该布尔字段设置为 false，则不生成任何日志。该字段是一个公共字段，可以从游戏引擎配置文件中设置。这允许你以数据驱动的方式，在游戏不再处于开发阶段时关闭日志记录。接下来，我们将看看该类的静态方法。


    ```

    public static void wr(String s) { ... }

    public static void wrErr(Exception e) { ... }

    public static void wrErr(String s) { ... }

    清单 3-1

    MmgApiUtils 静态类成员 1

    ```


    我们要介绍的第一个方法`wr`为 API 提供基本的日志记录支持。它只接受一个字符串作为参数，如果日志记录已启用，则将其写入标准输出。接下来要回顾的两个方法`wrErr`旨在帮助记录错误消息。


    第一个`wrErr`方法接受一个`Exception`实例作为参数，并使用该对象将异常信息打印到标准错误输出。该方法会打印出异常的消息，并遍历堆栈跟踪，打印出每个条目的信息。第二个`wrErr`方法接受一个字符串参数，并将其打印到标准错误输出。


    ### 演示：MmgApiUtils 类


    `MmgApiUtils`类主要用作一级日志记录类。可以在`MmgDebug`类中找到其用法示例。让我们看一些代码！


    ```

    1 public static void wr(String key, String s) {

    2     if (DEBUGGING_ON == true) {

    3         MmgApiUtils.wr(key + ": " + s);

    4     }

    5 }

    清单 3-2

    MmgApiUtils 类演示 1

    ```


    上面列出的方法是一个二级日志记录方法，因为它有自己的日志控制字段，并且调用了`MmgApiUtils`类的方法。这意味着可以在此级别关闭日志记录，例如，针对所有游戏屏幕日志记录；也可以在`MmgApiUtils`级别关闭，例如，针对所有
    MmgCore 应用程序日志记录。


    至此，我们完成了对`MmgApiUtils`类的回顾。我希望你不要忽视这个类的重要性，不仅在于其简单直接的日志记录能力，还在于它作为新的 API 级代码的中心点，将使你的下一个游戏项目编写起来更加容易。


    ## 辅助类：MmgHelper


    `MmgHelper`类是一个辅助类，通过静态方法为 MmgBase API 提供高级功能。这个类提供了定位方法、资源缓存管理方法、日志记录方法、图像变换方法等等。`MmgHelper`类是一个至关重要的类，它在游戏开发的许多不同方面提供帮助。

    '
- fmt: '### Static Class Members


    The `MmgHelper` class has a few static class fields listed in the following. The
    fields are used as Boolean flags that control logging and resource caching functionality.


    ```

    public static boolean LOGGING = true;

    public static boolean BMP_CACHE_ON = true;

    public static boolean SND_CACHE_ON = true;

    private static Random rando = new Random(System.currentTimeMillis());

    Listing 3-3

    MmgHelper Static Class Members 1

    ```


    The first entry in the static class fields listed in the preceding is the `LOGGING`
    field. This is a Boolean flag similar to what we’ve seen in the `MmgApiUtils`
    class. The flag controls the logging output of this class and can be used to turn
    off all logging. As you’ve seen, there are a few different logging channels supported
    by the API. This may seem redundant at first, but it actually comes in handy when
    you want separate logging channels for certain information.


    The next two static class fields listed in the preceding control the resource
    cache for image and sound resources, respectively. If these Boolean flags are
    set to `false`, then resources that would normally be stored in a cache won’t
    be. The last entry in the list is a random number generator that is initialized
    with the current time in milliseconds. That should provide a good, dynamic seed
    for the random number generator. You can use the `rando` field any time you need
    access to a random number. Let’s move on and take a look at some static class
    methods.


    ```

    public static boolean WriteClassConfigFile(String file, MmgCfgFileEntry[] data)
    { ... }

    public static boolean WriteClassConfigFile(String file, Hashtable data) { ...
    }

    public static Hashtable ReadClassConfigFile(String file) { ... }

    public static Hashtable ReadClassConfigFile(String file) { ... }

    Listing 3-4

    MmgHelper Static Class Members 2

    ```


    The first two static class methods are used to write out class configuration data
    passed into them as an argument. The first `WriteClassConfigFile` method takes
    a string and an array of data as arguments. The array contains `MmgCfgFileEntry`
    objects. A class config file is a text file that contains data in the form of
    key-value pairs. The data can be used to configure the fields of a class dynamically
    as part of the class’ resource loading process.


    This is particularly useful when combined with game screens because it allows
    you to data drive the layout of the game screen. In this way, you can test changes
    to a game screen’s layout by altering the class config file without having to
    recompile the game.


    I should mention that when a class config file is written with a call to these
    methods, comments and the original order of the data may be lost. The data in
    each `MmgCfgFileEntry` instance is written to the class config file. Each key-value
    pair in the config file is represented by an `MmgCfgFileEntry` instance.


    The second implementation of the `WriteClassConfigFile` method is similar except
    that it receives data in the form of a `Hashtable`, or `Dictionary` if you’re
    looking at the C# implementation, instead of an array. The data structure’s keys
    are sorted alphabetically, and the data is written out just like in the first
    version of the method. Now let’s take a look at the other side of the coin, the
    class config read method.


    The next class config helper method we’ll review is the `ReadClassConfigFile`
    method. This method parses the specified class config text file and stores the
    key-value pairs as `MmgCfgFileEntry` entries in a `Hashtable`. The class config
    read method has built-in support for detecting and loading screen resolution–specific
    class config files.


    This allows you to automatically load data based on the current game screen size
    if a screen resolution–specific class config file exists. If not, we try to open
    the originally specified file. If we have found a class config file to read, we
    open it and iterate over the lines. Comments in a class config file are prefixed
    with the `#` character. These lines are ignored when parsing the file.'
