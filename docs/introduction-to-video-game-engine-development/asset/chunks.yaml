    ## Chapter Conclusion


    In this chapter, we completed a very detailed review of the base classes of the
    game engine’s MmgBase API. If you take a close look at the classes we’ve covered,
    you can see that you almost have enough there to start making a game. That’s not
    by accident. The base classes we’ve reviewed here are foundational to the game
    engine’s design and implementation.


    I want to step back from the code we’ve looked at and work on developing the larger
    picture. We’re working on defining the classes necessary to power a general 2D
    game engine. In doing so, we’ve covered the following classes:


    - `MmgObj`: Super class, or base class in C#, of the entire MmgBase API. Models
    an object in 2D space that has position, dimensions, and color.

    - `MmgColor`: An API class for representing color.

    - `MmgRect`: An API class for representing a rectangle with position and dimensions.

    - `MmgFont`: An API class that extends the `MmgObj` class and is used to represent
    font-rendered text when drawn to the screen.

    - `MmgSound`: An API class that represents a sound resource for the MmgBase API.

    - `MmgPen`: An API class that handles all drawing for the API.

    - `MmgVector2`: An API class that models a two-component vector of double, float,
    or integer precision for API positioning support.

    - `MmgBmp`: An API class that extends the `MmgObj` class and is used to represent
    images for the API.


    You may notice that while we’ve covered a lot of code, there isn’t really a comprehensive
    structure or capability arising in the API that we can see. You won’t start to
    see the structure you’re looking for until you begin to review the MmgCore API
    in Part 2 and you see how everything ties together.


    That being said, there is a reason for this. We’re reviewing the code that powers
    a game engine, not a game. What that means is that the code is general in nature.
    There aren’t a lot of hardwired connections between classes. There are a lot of
    potential connections, but nothing that is enforced. This is because we’re reviewing
    the code for a general 2D game engine that draws images on the screen. It doesn’t
    care how that happens, single screen, scrolling screen, isometric, or top-down.
    All the engine is concerned with is drawing the current set of drawable objects
    to the screen as quickly as possible.


    That is the power that a game engine has over a single game. It’s designed to
    be a general processor of 2D drawable objects as opposed to a specific processor
    of 2D drawable objects. In the coming chapters, we’ll cover more of the MmgBase
    API, and you’ll begin to see more and more connections between classes that could
    exist to create different aspects of your next game.


    # 3. Helper Classes


    In this chapter, you’ll review the helper classes of the MmgBase API. Helper classes
    are usually simple to initialize, use static methods to expose functionality,
    and provide support for different features of the API. We’ll encounter the following
    classes during this review:


    - `MmgApiUtils`

    - `MmgHelper`

    - `MmgScreenData`

    - `MmgFontData`

    - `MmgDebug`

    - `MmgBmpScaler`

    - `MmgMediaTracker`


    ## Helper Classes: MmgApiUtils


    The `MmgApiUtils` class is a simple helper class that provides centralized logging
    support for the MmgBase API. The `MmgApiUtils` class was implemented to be a convenient
    helper class, and as such it only has static class members to review.


    ### Static Class Members


    The `logging` class field is used to control the output of the class. If the Boolean
    field is set to false, no logs are generated. The field is a public field that
    can be set from a game engine config file. This allows you to turn off logging
    when the game is no longer in development, in a data-driven way. Next, we’ll take
    a look at the class’ static methods.


    ```

    public static void wr(String s) { ... }

    public static void wrErr(Exception e) { ... }

    public static void wrErr(String s) { ... }

    Listing 3-1

    MmgApiUtils Static Class Members 1

    ```


    The first method we’ll cover, `wr`, provides basic logging support for the API.
    It takes only a string as an argument and, if logging is enabled, writes it to
    standard output. The next two methods to review, `wrErr`, are designed to help
    log error messages.


    The first `wrErr` method takes an `Exception` instance as an argument and uses
    the object to print information about the exception to standard error. The method
    will print out the exception’s message and loop over the stack trace printing
    out information about each entry. The second `wrErr` method takes a string argument
    and prints it to standard error.


    ### Demonstration: MmgApiUtils Class


    The `MmgApiUtils` class is used mainly as a level 1 logging class. An example
    of its usage can be found in the `MmgDebug` class. Let’s take a look at some code!


    ```

    1 public static void wr(String key, String s) {

    2     if (DEBUGGING_ON == true) {

    3         MmgApiUtils.wr(key + ": " + s);

    4     }

    5 }

    Listing 3-2

    MmgApiUtils Class Demonstration 1

    ```


    The method listed in the preceding is a level 2 logging method because it has
    its own logging control field and it calls methods from the `MmgApiUtils` class.
    This means that the logging can be turned off at this level for, say, all game
    screen logging and at the `MmgApiUtils` level, say, for all MmgCore application
    logging.


    That completes our review of the `MmgApiUtils` class. I hope you don’t overlook
    the importance of the class not only in its simple and direct logging capability
    but also as a center point for new API-level code that will make your next game
    project that much easier to write.


    ## Helper Classes: MmgHelper


    The `MmgHelper` class is a helper class that provides high-level functionality
    to the MmgBase API via static methods. This class provides positioning methods,
    resource cache management methods, logging methods, image transformation methods,
    and more. The `MmgHelper` class is a vital class that provides assistance in many
    different aspects of game development.'
