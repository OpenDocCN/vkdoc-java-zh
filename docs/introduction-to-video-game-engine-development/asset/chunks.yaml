    图 1-2


    NetBeans IDE 安装 2


    确保屏幕顶部的 **JAR 文件**字段以 **dist** 文件夹开头。完成后，点击左侧类别列表中的**运行**条目。我们将确保正确的运行时设置已就位。


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig3_HTML.jpg](img/508392_1_En_1_Fig3_HTML.jpg)


    图 1-3


    NetBeans IDE 安装 3


    关于运行时设置，你需要确保主类已设置；选择 `MmgTestSpace` 包中的 `MmgTestScreens` 类。参数字段可以留空，或者你可以尝试不同的
    FPS 设置。最好使用 15 到 60 FPS 之间的帧率。注意上图中以蓝色高亮显示的路径。这是我开发环境中本地库的路径。


    你应该将该路径更改为你环境中对应的文件夹。这将为游戏引擎项目启用原生操作系统库支持。在运行任何内容之前，我们应该确保项目可以编译。右键单击列表中的项目，然后选择**清理并构建**选项。


    项目编译完成后，你应该熟悉如何运行示例游戏屏幕项目。在 `MmgGameApiJava` 项目的包列表中找到 `MmgTestSpace` 包。找到 `MmgTestScreens`
