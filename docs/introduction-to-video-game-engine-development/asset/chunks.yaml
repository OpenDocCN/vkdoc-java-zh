  trans: '

    ### 静态类成员


    我们将要审查的 `MmgScreenData` 静态类成员，首先是一组描述游戏尺寸的类字段。


    ```

    public static int DEFAULT_WIDTH = 1024;

    public static int DEFAULT_HEIGHT = 768;

    private static int gameWidth;

    private static int gameHeight;

    private static int gameLeft;

    private static int gameTop;

    private static int screenWidth;

    private static int screenHeight;

    清单 3-13

    MmgScreenData 静态类成员 1

    ```


    上面列出的前两个静态类字段是游戏面板和屏幕的宽度与高度的默认值。接下来的两个类字段保存了关于游戏期望尺寸的数据，即 `gameWidth` 和 `gameHeight`。`gameLeft`
    和 `gameTop` 这两个静态类字段起初可能看起来有点奇怪。


    通常你会期望它们都为零，但在我们的案例中，游戏引擎能够显示一个包含帧率信息和一些变量调试的开发标题栏。这会将游戏面板向下推，因此我们需要能够设置面板的偏移量。这组字段中的最后两个是
    `screenWidth` 和 `screenHeight` 条目。


    请注意，游戏屏幕只有尺寸数据，而屏幕的可渲染区域（即游戏面板）则拥有尺寸和位置数据。你认为这是为什么？这是因为屏幕的可渲染区域可能比窗口本身要小，因此游戏面板将在偏移量
    `gameLeft` 和 `gameTop` 处进行渲染。


    ```

    private static double scaleX;

    private static double scaleY;

    private static boolean scaleXOn;

    private static boolean scaleYOn;

    private static MmgVector2 scaleVec = MmgVector2.GetUnitVec();

    private static MmgVector2 posVec;

    清单 3-14

    MmgScreenData 静态类成员 2

    ```


    下一组静态类字段以两个缩放字段开始。`scaleX` 和 `scaleY` 字段保存了将游戏面板呈现到游戏窗口尺寸内所需的缩放数据。例如，如果期望的游戏尺寸大于游戏窗口，游戏尺寸将被缩小以适应并居中显示在游戏窗口内。`scaleX`
    和 `scaleY` 静态类字段将保存实现此目的所需的缩放值。


    `scaleXOn` 和 `scaleYOn` 静态类字段是布尔标志，指示是否需要在 X 轴和/或 Y 轴上进行缩放。最后，`scaleVec` 和 `posVec`
    静态类字段是便捷字段，用于保存 X 和 Y 坐标的缩放和位置数据。


    ```

    private static int origGameWidth;

    private static int origGameHeight;

    GRAPHICS_CONFIG = GraphicsEnvironment.getLocalGraphicsEnvironment().getDefaultScreenDevice().getDefaultConfiguration();

    public static ScalingMode scalingMode = ScalingMode.AXIS_X_AND_Y;

    清单 3-15

    MmgScreenData 静态类成员 3

    ```


    最后一组静态类字段如上所示。前两个条目是跟踪最初指定的游戏尺寸的字段。如果游戏需要缩放以适应游戏窗口，那么这些字段将保存原始的游戏尺寸。`GRAPHICS_CONFIG`
    静态类字段是一个重要的字段；它保存了当前图形上下文的信息。


    换句话说，它保存了当前图形能力的信息，比如屏幕尺寸、每个像素的位深度等等。上面字段列表中的最后一个条目是 `scalingMode` 类字段。此字段用于跟踪用于调整游戏面板的缩放类型。接下来，我们将看看
    `MmgScreenData` 类的一些静态方法。


    ```

    private static void CalculateLeft() { ... }

    private static void CalculateTop() { ... }

    public static void CalculateScaleAndOffset() { ... }

    private static void CalculateScaleX(boolean agg) { ... }

    private static void CalculateScaleY(boolean agg) { ... }

    清单 3-16

    MmgScreenData 静态类成员 4

    ```


    我们要审查的前两个静态方法 `CalculateLeft` 和 `CalculateTop` 各只有一行代码，它们作为游戏配置过程的一部分，用于设置 `gameLeft`
    和 `gameTop` 类字段。下一个方法 `CalculateScaleAndOffset` 也是配置过程的一部分，用于准备 X 轴和 Y 轴上的任何缩放。如果不需要缩放，我们将
    `scaleX` 和 `scaleY` 类字段设置为 1.0 或 100%。这意味着不需要进行缩放。


    如果确实需要进行一些缩放，我们必须决定是支持 X 轴缩放、Y 轴缩放，还是两者都支持。在我们的案例中，该方法被锁定为同时使用 X 轴和 Y 轴。这会导致首先调用
    `CalculateScaleX` 方法，然后在必要时调用 `CalculateScaleY` 方法。接下来要审查的两个方法 `CalculateScaleX`
    和 `CalculateScaleY`，用于检测正确调整游戏面板大小所需的缩放值。


    这些方法执行一系列循环迭代。在每次迭代中，都会执行一次新的缩放测试，并检查缩放结果是否尽可能接近整数。它通过微小的增量来调整缩放量来实现这一点。因为我们不知道是否能够找到合适的缩放值，所以我们需要另一种方式来跳出
    while 循环。在这种情况下，如果循环迭代次数达到 panic 变量的值（设置为 5000），循环就会退出。


    循环完成后，`prctDiffX` 变量用于设置多个静态类字段。我们在这里尝试进行的缩放是均匀的，因此即使我们只处理 X 轴，最终也会缩放 X 轴和 Y 轴。`scaleX`
    和 `scaleY` 都被设置为新确定的缩放值。


    如果在水平缩放之后，垂直尺寸仍然有问题，那么我们会调用 `CalculateScaleY` 方法来确定现在要使用的最佳缩放值，该方法也会考虑当前的缩放结果。`CalculateScaleX`
    和 `CalculateScaleY` 方法非常相似，因此我们在此不再赘述。请确保你阅读并理解了这些方法。这里的目标不是拥有一个健壮的游戏屏幕缩放实现；而只是提供一种简单直接的方法，将游戏面板适配到游戏窗口的尺寸内。


    请注意，这个类旨在集中保存关于游戏面板和窗口尺寸的数据，以及关于屏幕当前缩放的信息。如果你还记得，我们在 `MmgHelper` 类中遇到了图像缩放调用，这些调用使用了这里确定的缩放值。这是一个安全的操作，因为默认期望是缩放是均匀的。while
    循环只是试图确定一个能产生接近整数值的缩放值，以便图像缩放平滑。


    我们需要审查的最后一组方法是 `GetGameRight` 和 `GetGameBottom` 方法。这些方法用于根据游戏面板的尺寸和当前偏移量来计算其右侧和底部的位置。请花点时间审查我们在这里没有机会涵盖的任何方法。


    ### 枚举


    `MmgScreenData` 类有一个相关的枚举需要我们审查。`ScalingMode` 枚举用于描述由 `MmgScreenData` 类确定为必要的缩放类型。此枚举中的一个值用于设置
    `scalingMode` 类字段。

