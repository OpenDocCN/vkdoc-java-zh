    我们要查看的第一组方法是类的背景图像方法。这些是 get 和 set 方法，允许你访问背景的源图像以及保存了调整大小后的背景源的 `Mmg9Slice` 实例。


    第二组支持方法允许你访问控制文本字段字体渲染方式的类字段。这些是用于字体、字体高度以及用于微调字体位置的填充（padding）的 get 和 set 方法。关于这一组，我只想谈谈
    `isDirty` 字段的 get 和 set 方法。通常，你应该让类自己管理其脏标志，但如果你想强制类在下一次调用 `MmgDraw` 之前更新自身，那么可以将
    `isDirty` 字段设置为 true。


    上面列出的第三组方法允许你与小部件的文本进行交互。前两个方法 `GetDisplayChars` 和 `SetDisplayChars` 允许你设置文本字段一次可以显示的字符数。类存储的实际文本可以通过
