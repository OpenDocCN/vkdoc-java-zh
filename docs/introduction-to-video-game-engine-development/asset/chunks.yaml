    The `ScreenLoading` class’ demonstration starts with a code snippet from the `GamePanel`
    class’ constructor.


    ```

    1 screenLoading = new ScreenLoading(GameStates.LOADING, this);

    2 screenLoading.SetGenericEventHandler(this);

    3 screenLoading.SetSlowDown(500);

    Listing 14-21

    ScreenLoading Class Demonstration 1

    ```


    The use of the class constructor demonstrates how the `ScreenLoading` class is
    initialized. Notice that it takes a game state and a game panel for arguments.
    The second line of code registers the `GamePanel` as the class’ generic event
    handler. This means that the game panel can receive certain events from the loading
    screen. On line 3, the loading class’ `slowDown` field is set. This will add a
    time sink into the loading process making it take longer. The next snippet of
    code is from the `GamePanel` class’ `SwitchGameState` method.


    ```

    1 } else if (prevGameState == GameStates.LOADING) {

    2    MmgHelper.wr("Hiding LOADING screen.");

    3    screenLoading.Pause();

    4    screenLoading.SetIsVisible(false);

    5    screenLoading.UnloadResources();

    6 }

    Listing 14-22

    ScreenLoading Class Demonstration 2

    ```


    In the snippet of code listed in the preceding, the `GamePanel`’s `prevGameState`
    field is used to clean up the game screen associated with the previous game state
    before switching to the new game state. Note than when the game screen is deactivated,
    the screen is paused and hidden and its resources released.


    ```

    1 } else if (gameState == GameStates.LOADING) {

    2     MmgHelper.wr("Showing LOADING screen.");

    3     screenLoading.LoadResources();

    4     screenLoading.UnPause();

    5     screenLoading.SetIsVisible(true);

    6     screenLoading.StartDatLoad();

    7     currentScreen = screenLoading;

    8 }

    Listing 14-23

    ScreenLoading Class Demonstration 3

    ```


    The final snippet of demonstration code is also from the `SwitchGameState` method.
    This code shows you how the loading screen is activated for display. Note that
    the order in which the loading screen’s methods are called is important. First,
    the screen’s resources are loaded. The screen is unpaused and made visible. A
    screen-specific method, `StartDatLoad`, is called to start the resource load.
    The final line of code is important. This line sets the game screen as the active
    screen.


    ## Game Screens: `ScreenMainMenu`


    The `ScreenMainMenu` class extends the MmgBase API’s `MmgGameScreen` class. This
    class provides a main menu screen that is aware of the game state and game panel
    aspects of the MmgCore API. You’ll notice some similarities between this screen
    and the previous two game screens we’ve reviewed.


    ### Class Fields


    This class’ fields are a mix of some standard fields we’ve seen before and a set
    of fields that power the screen’s menu system. I’ve separated the fields into
    the two groups listed in the following code snippet.


    ```

    //Standard fields

    public GameStates state;

    public GamePanel owner;

    public Hashtable classConfig;

    //Menu system fields

    public MmgBmp menuTitle;

    public MmgBmp menuSubTitle;

    public MmgBmp menuStartGame;

    public MmgBmp menuExitGame;

    public MmgBmp menuFooterUrl;

    public MmgBmp menuCursor;

    public MmgMenuContainer menu;

    public MmgSound menuSound;

    public MmgFont version;

    public HandleMainMenuEvent handleMenuEvent = null;

    Listing 14-24

    ScreenMainMenu Class Fields 1

    ```


    The first group of class fields are some standard fields we’ve seen before in
    this chapter. The `state` and `owner` fields are there to associate the screen
    with a game panel and game state value. The third entry, `classConfig`, is there
    to hold class config data, if any, loaded up at runtime.


    The second set of fields are there to power the screen’s menu system. The first
    five fields are `MmgBmp`, image objects, used to represent five visual elements
    of the main menu. Those elements are the title, subtitle, start game option, exit
    game option, and footer. The `menuCursor` field is also an `MmgBmp` image used
    to draw the menu system’s cursor.


    The `MmgMenuContainer` field `menu` is used to hold the menu items that are based
    on the first five fields of the menu group. The `menuSound` field holds a sound
    effect that will be played if a menu item is selected. The `version` field is
    another visual element that displays a version string on the lower left-hand side
    of the menu screen. The final entry listed, `handleMenuEvent`, is a class field
    that provides event handling to the menu system.


    ### Support Method Details


    The `ScreenMainMenu` class has a small set of support methods for us to review.
    Let’s take a look!


    ```

    public GameStates GetGameState() { ... }

    public boolean GetIsDirty() { ... }

    public void SetIsDirty(boolean b) { ... }

    public void DrawScreen() { ... }

    Listing 14-25

    ScreenMainMenu Support Method Details 1

    ```


    The `GetGameState` method returns the game state value assigned to the game screen.
