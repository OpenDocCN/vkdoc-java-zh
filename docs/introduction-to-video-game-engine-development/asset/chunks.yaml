    The first set of support methods I’d like to discuss are related to the resource
    load process. Take a moment to look over the following methods.


    ```

    public RunResourceLoad GetLoader() { ... }

    public void SetLoader(RunResourceLoad DatLoad) { ... }

    public long GetSlowDown() { ... }

    public void SetSlowDown(long l) { ... }

    public boolean GetLoadResult() { ... }

    public boolean GetLoadComplete() { ... }

    Listing 8-14

    Demo Review: ScreenLoading Support Method Details 1

    ```


    The preceding first two entries give you access to the resource loader. This class
    is meant to be run in a separate thread. The following two methods are the access
    methods for the `slowDown` field. The last two methods are used to return information
    about the loading process. The `GetLoadResult` method returns a Boolean indicator
    regarding the last read operation’s result. The `GetLoadComplete` method returns
    true if the resource loading process has completed.


    ```

    public GameStates GetGameState() { ... }

    public GenericEventHandler GetGenericEventHandler() { ... }

    public void SetGenericEventHandler(GenericEventHandler Handler) { ... }

    Listing 8-15

    Demo Review: ScreenLoading Support Method Details 2

    ```


    The next support method to discuss is the `GetGameState` method. This method returns
    the game state that the game screen is associated with. The game panel class uses
    the game state values to track the different game screens in a game or application.


    #### Demo Review: Main Method Details


    The `ScreenLoading` class has the following main methods.


    ```

    //Constructors

    public ScreenLoading(MmgLoadingBar LoadingBar, float lBarOff, GameStates State,
    GamePanel Owner) { ... }

    public ScreenLoading(GameStates State, GamePanel Owner) { ... }

    //Class prep/clean methods

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    //Resource loading methods

    public boolean GetResourceFileData() { ... }

    public void StartDatLoad() { ... }

    public void StopDatLoad() { ... }

    //General main methods

    public void HandleUpdate(LoadResourceUpdateMessage obj) { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 8-16

    Demo Review: ScreenLoading Main Method Details 1

    ```


    The first constructor listed takes a full set of arguments and uses them to initialize
    pertinent class fields. This constructor will create a new `ScreenLoading` class
    that is ready to use. The second constructor listed takes fewer arguments and
    only sets the `gameState` and `owner` fields.


    The class has the same preparation method as every game screen class we’ve reviewed
    thus far, the `LoadResources` method. This method is used to prepare the screen
    for use. The `UnloadResources` method should be the reverse of the `LoadResources`
    method and clean out any resources that were loaded.


    The next group of main methods listed in the preceding are the loading methods.
    These methods are involved with the resource loading process. The `GetResourceFileData`
    method returns true if there are some resources to load. The `StartDatLoad` method
    begins the resource loading process by starting the threaded loading class, `datLoad`.
    Similarly, the `StopDatLoad` method stops the resource loading process.


    The last two methods to review are the `HandleUpdate` method and the `MmgDraw`
    method. The `HandleUpdate` method is configured to receive update events from
    the resource loading process. When the method detects that the resource load has
    completed, it will send a generic event to the registered generic event handler.


    This should be the game panel class. The final entry in the preceding set is the
    `MmgDraw` method. This is a standard method implementation that just calls the
    super class, base class in C#, to ensure default drawing functionality is used.
    That concludes the class’ main method review. Up next, we’ll take a look at the
    `MmgGameScreen` class.


    ## Game Screen Classes: MmgGameScreen


    The `MmgGameScreen` class is the super class of the `MmgSplashScreen` and the
    `MmgLoadingScreen`. Much like the splash and loading screens, the `MmgGameScreen`
    class is a loose implementation of a game screen offering a lot of features but
    requiring few to be implemented. This gives you the best setup with regard to
    flexibility.


    The `MmgGameScreen` class is a subclass of the `MmgObj` class. In this way, all
    of the game screen classes in the MmgBase API are also `MmgObj` instances. They
    are all part of the set of drawable objects. The screen classes represent the
    apex level of class functionality in the MmgBase API. These classes are at the
    top of the rendering chain in this API. But take a moment to think about them
    and how we use them. They are really just like any other `MmgObj`-based class
    we’ve worked with.


    ### Class Fields


    The `MmgGameScreen` class is the core game screen class of the MmgBase API. The
    class has a number of fields listed in the following in groups.


    ```

    //Render control fields

    public boolean pause;

    public boolean ready;

    //Screen feature fields

    private MmgContainer objects;

    private MmgObj background;

    private MmgObj foreground;

    private MmgObj header;

    private MmgObj footer;

    private MmgObj message;

    //Menu fields

    private MmgMenuContainer menu;

    private MmgObj leftCursor;

    private MmgObj rightCursor;

    private int menuIdx;

    private int menuStart;

    private int menuStop;

    private int menuCursorLeftOffsetX;

    private int menuCursorLeftOffsetY;

    private int menuCursorRightOffsetX;

    private int menuCursorRightOffsetY;

    private boolean menuOn;

    //Event field

    private MmgUpdateHandler updateHandler;

    Listing 8-17

    MmgGameScreen Class Fields 1

    ```


    Because there are such a large number of fields, we are going to have a large
    number of support methods to review. I’ll try and shorten the review of the class
    fields and support methods when possible. The first group of fields are for controlling
    the rendering of the class. Screens that are paused or not ready won’t be rendered
    or updated unless coded to specifically do so.


    The second group of fields contains all of the drawable features of the screen
    that aren’t directly associated with the menu. As you can see, there are placeholders
    for a number of different features of the game screen. You can choose not to use
    any of these and set them to null.


    The third group of fields are the menu fields. The first entry is the menu container,
    `menu`. The next two entries can be used to set a left- and right-hand-side menu
    cursor. You can choose to implement just one side if you want. You should implement
    at least one of them though so the user can easily see where they are in the menu
    system.


    The `menuIdx`, `menuStart`, and `menuStop` fields are used to control which menu
    items are active in the current menu. The next four entries are for fine-tuning
    the positioning of the menu cursors, and lastly a Boolean flag controls if the
    menu is on or off. If you aren’t implementing a menu, set this Boolean to false
    and make sure the `menu` field is null. The last field in the list is an update
    event handler for processing update events like those from the splash or loading
    screen. The class’ `update` method is used to send events to the handler specified
    by this field.'
