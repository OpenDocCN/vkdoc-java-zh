    30     lb.SetFillHeight(tB.GetHeight() - MmgHelper.ScaleValue(10));

    31     lb.SetFillWidth(tB.GetWidth() - MmgHelper.ScaleValue(12));

    32     super.SetLoadingBar(lb, lbOffSet);

    代码清单 5-18

