    The first group of methods for us to review are the class’ background image methods.
    These are get and set methods that allow you to access the background’s source
    image as well as the prepared `Mmg9Slice` instance that holds the resized background
    source.


    The second group of support methods allows you to access the class fields that
    control the way the text field’s font is rendered. These are get and set methods
    for the font, the font height, and the padding used to fine-tune the font’s position.
    The only set of methods I’d like to talk about with regard to this group are the
    get and set methods for the `isDirty` field. In general, you should let the class
    manage its dirty flag by itself, but if you want to force the class to update
    itself before the next call to `MmgDraw`, then set the `isDirty` field to true.


    The third group of methods listed in the preceding allow you to interact with
    the widget’s text. The first two methods, `GetDisplayChars` and `SetDisplayChars`,
    allow you to set the number of characters that the text field can display at one
    time. The actual text stored by the class can be accessed via the `GetTextFieldString`
    and `SetTextFieldString` methods. The next three sets of get and set methods are
    all designed to allow you to turn on max length detection. You can turn on the
    feature, set the maximum allowed string length for the text field, and set the
    event that is fired when the max length condition is triggered and all from these
    six support methods.'
