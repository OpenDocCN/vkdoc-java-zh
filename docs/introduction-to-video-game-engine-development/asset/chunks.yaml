    public void SetParentEventHandler(MmgEventHandler e) { ... }

    public MmgEventHandler GetParentEventHandler() { ... }

    public void SetTargetEventHandler(MmgEventHandler e) { ... }

    public MmgEventHandler GetTargetEventHandler() { ... }

    public String GetMessage() { ... }

    public void SetMessage(String s) { ... }

    public int GetEventId() { ... }

    public void SetEventId(int s) { ... }

    public int GetEventType() { ... }

    public void SetEventType(int s) { ... }

    public Object GetExtra() { ... }

    public void SetExtra(Object obj) { ... }

    清单 4-7

    MmgEvent 支持方法详情 1

    ```


    上面列出的支持方法只是针对各个类字段的简单 get 和 set 方法。这里我不打算详细讲解，但请务必仔细查看并确保理解它们。


    ### 主要方法详情


    `MmgEvent` 类有几个主要方法值得我们关注。


    ```

    public MmgEvent(MmgEventHandler ParentHandler, String Msg, int Id, int Type, MmgEventHandler
    TargetHandler, Object Ex) { ... }

    public void Fire() { ... }

    public String ApiToString() { ... }

    清单 4-8

    MmgEvent 主要方法详情 1

    ```


    上面列表中的第一个方法是类的构造函数。它接收该类每个相关字段的参数。请注意，如果你不打算使用某个字段，则无需为每个参数都提供对象。例如，如果你没有事件层级结构，则可以将
    `ParentHandler` 参数设置为 null。


    接下来我们要看的两个主要方法是 `Fire` 和 `ApiToString` 方法。当 `MmgEvent` 应该被触发时，会调用 `Fire` 方法。如果定义了
    `targetHandler`，则会调用它，并将当前的 `MmgEvent` 对象作为参数传递。`ApiToString` 方法返回事件的字符串表示形式。


    ### 演示：MmgEvent 类


    作为 `MmgEvent` 类的演示，我们将看看如何创建和触发一个事件。


    ```

    1 private MmgEvent clickScreen = new MmgEvent(null, "vert_click_screen", MmgScrollVert.SCROLL_VERT_CLICK_EVENT_ID,
    MmgScrollVert.SCROLL_VERT_CLICK_EVENT_TYPE, null, null);

    清单 4-9

    MmgEvent 类演示 1

    ```


    第一行示例代码向我们展示了如何实例化一个新的 `MmgEvent` 对象。这行代码来自 MmgBase 包（或 C# 中的命名空间）中 `MmgScrollVert`
    类的字段部分。请注意，父处理器、目标处理器和先前事件字段都设置为 null。在此示例中，我们正在使用正确的 `id` 和 `type` 准备事件，但尚未指定事件处理器。在这种情况下，事件处理器会在稍后配置
    `MmgScrollVert` 类时设置。


    ```

    1 if(clickScreen != null) {

    2     clickScreen.SetExtra(new MmgVector2(x, y));

    3     clickScreen.Fire();

    4 }

    清单 4-10

    MmgEvent 类演示 2

    ```


    在第二个示例代码片段中，我们可以看到如何正确触发 `MmgScrollVert` 类的点击屏幕事件。作为对接收鼠标点击事件的响应，如果定义了 `clickScreen`
    字段，它将被触发。请注意使用 `extra` 字段来存储事件相关信息。在此例中，我们随点击事件一起发送屏幕点击坐标，作为一个 `MmgVector2` 对象。


    ## 其他类：MmgEventHandler


    `MmgEventHandler` 是一个接口，类可以实现它，以便能够处理特定的 `MmgEvent` 对象。`MmgEventHandler` 类被实现为接口，这样任何类都可以实现它并注册以处理事件。


    ### 类回顾


    由于 `MmgEventHandler` 接口不具备常规类的所有特性，我们直接打印出代码并进行讨论。


    ```

    1 public interface MmgEventHandler {

    2     public void MmgHandleEvent(MmgEvent e);

    3 }

    清单 4-11

    MmgEventHandler 类回顾 1

    ```


    `MmgEventHandler` 接口定义了一个方法签名 `MmgHandleEvent`。当一个类实现该接口时，它必须定义 `MmgHandleEvent`
    方法，从而能够接收已注册的事件。就是这么简单。


    ### 演示：MmgEventHandler 类


    对于这个类的演示，我们将查看三段代码片段，它们展示了如何设置一个 `MmgEvent` 和处理器。


    ```

    //MmgScrollVert

    01 public void SetEventHandler(MmgEventHandler e) {

    02     clickScreen.SetTargetEventHandler(e);

    03     clickUp.SetTargetEventHandler(e);

    04     clickDown.SetTargetEventHandler(e);

    05 }

    //ScreenTestMmgScrollVert.LoadResources

    01 scrollVert = new MmgScrollVert(vPort, sPane, sBarColor, sBarSldrColor, sBarWidth,
    sBarSldrHeight, interval);

    02 scrollVert.SetIsVisible(true);

    03 scrollVert.SetWidth(sWidth + scrollVert.GetScrollBarWidth());

    04 scrollVert.SetHeight(sHeight);

    05 scrollVert.SetEventHandler(this);

    //ScreenTestMmgScrollVert

    01 public void MmgHandleEvent(MmgEvent e) {

    02     if(e.GetEventId() == MmgScrollVert.SCROLL_VERT_CLICK_EVENT_ID || e.GetEventId()
    == MmgScrollHor.SCROLL_HOR_CLICK_EVENT_ID || e.GetEventId() == MmgScrollHorVert.SCROLL_BOTH_CLICK_EVENT_ID)
    {

    03         MmgVector2 v2 = (MmgVector2)e.GetExtra();

    04         event.SetText("Event: Id: " + e.GetEventId() + " Type: " + e.GetEventType()
    + " Pos: " + v2.ApiToString() + " Msg: " + e.GetMessage() + " " + System.currentTimeMillis());


    06     } else {

    07         event.SetText("Event: Id: " + e.GetEventId() + " Type: " + e.GetEventType()
    + " Msg: " + e.GetMessage() + " " + System.currentTimeMillis());


    09     }


    11     MmgHelper.CenterHor(event);

    12 }

    清单 4-12

    MmgEventHandler 类演示 1

    ```


    上面列出的第一个代码片段展示了 `MmgScrollVert` 类的 `SetEventHandler` 方法。此方法用于为该类支持的不同事件注册事件处理器。请注意，该类支持的每个事件都设置了其事件处理器，第
    2-4 行。下一个代码片段来自 MmgTestSpace 库中 `ScreenTestMmgScrollVert` 类的 `LoadResources` 方法。在此代码块中，初始化了
    `MmgScrollVert` 类的一个新实例。请注意，在第 5 行，滚动面板小部件的事件处理器被设置为游戏屏幕。


    这就引出了最后一部分——来自游戏屏幕类 `ScreenTestMmgScrollVert` 的事件处理器方法。在第 2 行，我们通过检查接收到的对象的 `id`
    和 `type` 字段来判断接收的事件是否是我们能够处理的事件。如果我们可以处理该事件，则从 `extra` 字段中强制转换出一个 `MmgVector2`
    对象，第 3 行。在此例中，我们使用点击信息来更新一个 `MmgFont` 实例的文本。


    ## 章节总结


    在本章中，我们完成了对“其他”类的回顾。我们介绍的这些类非常有用，总结如下：


    *   MmgCfgFileEntry：一个对类配置文件中的一行数据进行建模的类。此类用于存储来自类配置文件行的数据，并用于设置游戏屏幕。


    *   MmgEvent：一个通用的事件类，为 API 提供基本的事件支持。


    *   MmgEventHandler：一个事件处理器接口。此接口用于设置事件处理器以接收已注册的事件。当与 MmgEvent 类结合使用时，这两个类构成了一个简单的事件系统。


    这些类蕴含着微妙的力量。花点时间思考一下事件系统的配置。注意它是多么通用。就像我们为支持游戏引擎而构建的大多数功能一样，我们拥有一个通用的事件系统，你可以在下一个游戏中使用它。在处理事件时，请确保不要滥用它们。当一个类需要通知另一个类发生了某事时，考虑使用事件。将此作为实现事件时的指导原则。

