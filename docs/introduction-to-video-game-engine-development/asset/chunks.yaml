    Listing 5-23

    MmgSprite Support Method Details 2

    ```


    The next block of methods for us to look at consists of two sets, frame rendering
    methods and frame index methods. The frame rendering methods give you access to
    all of the advanced rendering fields necessary to support scaling and/or rotation
