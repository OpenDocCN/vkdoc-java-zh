    *Listing 18-12 ScreenGame Input Methods 1*


    Take the time to add the input methods listed in the preceding to the `ScreenGame`
    class. The first two methods handle A and B button input. This input is used to
    interact with the exit game and game over sub-screens. Notice that in the `ProcessAClick`
    method, the game panel is used to change the current game state. This is used
    to exit the game. Notice on line 8 of the `ProcessBClick` method that it’s the
    game screen’s state that is changed causing the exit popup to display.


    I should mention that the `ProcessDebugClick` method can be used to toggle some
    useful debugging settings. Take a moment to review the method and understand how
    it works. Basically, pressing the debug key, D key, once turns on a one-point
    win condition in the game. This is used to speed up testing game ending states.
    Pressing it a second time will turn on infinite bounce as well. Now the game can’t
    be won because the ball will bounce around infinitely. Lastly, if you press the
    key a third time, the original settings will be restored.


    There are four keyboard-driven input methods for you to add to the class. The
    `ProcessKeyPress` and `ProcessKeyRelease` methods are designed to support input
    from the X and S keys. The keys are used to move the paddle up and down, respectively.
    Similarly, the `ProcessDpadPress` and `ProcessDpadRelease` methods are used to
    process directional pad input from the keyboard, a GPIO gamepad, and a USB gamepad.


    The game supports a decent number of control options. Speaking of which, the mouse
    is also supported as a source of input. Take a look at the `ProcessMouseMove`
    method. If the game type is two players, then the mouse can be used to move the
    second player’s paddle. Look over how the input methods are structured. Do you
    notice anything? For the most part, we don’t handle any update code in our input
    handlers.


    Notice how each input method analyzes the input data and then sets class fields
    to track what’s happening with the user input. We then process this info in the
    class’ update method, `DrawScreen`. Recall that the `DrawScreen` method is automatically
    called by the super class, or base class in C#, the MmgCore API’s `Screen` class.


    This class is designed to work with frequent animations, so the `DrawScreen` method
    is already plugged into the game engine’s drawing routine, the `MmgDraw` and `MmgUpdate`
    methods, for us. Take your time to add these methods to your `ScreenGame` class.
    Be sure to save your work, but don’t worry if you have errors. We’re still working
    on things. We’ll focus on the main method group next.


