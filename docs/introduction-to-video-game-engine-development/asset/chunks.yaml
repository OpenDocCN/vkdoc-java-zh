    refer to the Java/Swing framework class `Image`. Either pair of methods will update
    the class’ image field.


    ```

    public MmgRect GetSrcRect() { ... }

    public void SetSrcRect(MmgRect r) { ... }

    public MmgRect GetDstRect() { ... }

    public void SetDstRect(MmgRect r) { ... }

    public float GetRotation() { ... }

    public void SetRotation(float r) { ... }

    Listing 2-42

    MmgBmp Support Method Details 2

    ```


    The second set of support methods we have to review are also get and set methods
    for key class fields. They are direct and simple. Read them over and make sure
    you understand them.


    ```

    public MmgVector2 GetOrigin() { ... }

    public void SetOrigin(MmgVector2 v) { ... }

    public MmgVector2 GetScaling() { ... }

    public void SetScaling(MmgVector2 v) { ... }

    public int GetHeight() { ... }

    public int GetWidth() { ... }

    Listing 2-43

    MmgBmp Support Method Details 3

    ```


    The third and final set of support methods, listed in the preceding, allow access
    to the origin and scaling vectors. Because rotation can be performed around different
    points, changing the resulting transformation, you have to specify what coordinates
    you want to use as the center of rotation. The `scaling` field is an `MmgVector2`
    instance that holds floating-point values describing how much to scale an image
    in the X and Y directions.


    Because the `MmgBmp` class has support for on-the-fly transformations, the class
    supports handling scaled image dimensions. Things can get a little complicated
    when working with images that are transformed as part of the drawing routine.
    I highly recommend preparing the image, applying transformations, and then saving
    a copy of the resulting image for future use.'
