    ## Chapter Conclusion


    In this chapter, we took a deep dive into the MmgCore API events and event handlers.
    We learned how the `ScreenSplash` class used generic events to communicate to
    the `GamePanel` class that it was time to change screens. We saw a similar implementation
    in the `ScreenLoading` class with its own resource load complete generic event.


    We also got to see how the load resource message events were used to send information
    to the `ScreenLoading` class about the progress of the game’s resource load and
    how the game screen fired off an event of its own to tell the `GamePanel` the
    load process was complete and to change states to the main menu.


    The details of these events and event handlers are important. You should know
    how the default game screens are wired up to the `GamePanel,` and you should understand
    the different types of event systems at your disposal. Let’s take a look at a
    summary of the MmgCore API classes covered in this chapter:


    *   GenericEventMessage: An MmgCore API class used to represent a generic event
    with the event associated to a game state. This class provides generic event support
    to the API.


    *   GenericEventHandler: An MmgCore API interface that is implemented to support
    receiving generic events from registered sources. This interface provides generic
    event handling support to the API.


    *   LoadResourceUpdateMessage: An MmgCore API message that is used to send information
    about a resource loading process to a registered event handler. This class provides
    resource loading event message support to the API.


    *   LoadResourceUpdateHandler: An MmgCore API interface that is implemented to
    support receiving load resource update events. This interface provides load resource
    update event handling support to the API.


    *   HandleMainMenuEvent: An MmgCore API class used to support menu system events.
    These events are fired by the menu system when a menu item is selected. The events
    are processed by a class and not an interface. This class provides basic menu
    support to the API.


    There are some very subtle but important points in the classes we reviewed during
    this chapter. One take-away is the way you can use events to facilitate inter–game
    screen and game screen-to-game panel communication. Using the event systems and
    the different techniques outlined in this chapter, you will be able to create
    your own events to manage game states – a key aspect of any game.


    The other main take-away, I would say, is just getting used to working with events
    and event handlers. You will encounter events time and time again, from game engine
    to game engine, so it’s good to get experience working with them in your own games.
    Furthermore, you’ll gain invaluable experience learning when to use events. There
    shouldn’t be many events in your game. Events are reserved for cross-class communication
    where a user action requires that a game screen ask the game panel to do something
    for it. Follow this general rule of thumb but realize there are always exceptions.


    # 13. Resource Loading


    Resource loading and access is one of the most important aspects of any game engine.
    It’s difficult to make a 2D game without any images. In this chapter, we’ll cover,
    in detail, the game engine’s runtime code for loading resources. You’ll see how
    sounds and images are accessed explicitly, globally, or through game-specific
    resource folders.


    In the upcoming sections, we’ll review the resource loading process and the exact
    code to load resources for use in your game screens. In this chapter, we’ll review
    the following classes and topics:


    *   RunResourceLoad


    *   Topic: Accessing Explicit Resources


    *   Topic: Accessing Auto Load Resources


    *   Topic: Accessing Game-Specific Resources


    ## Resource Loading: RunResourceLoad


    The `RunResourceLoad` class is designed to run in its own thread and is used to
    load game resources, like sounds and images, into the game engine’s resource cache.
    The resource cache is governed by the MmgBase API’s `MmgMediaTracker` class. Before
    we get into the class review, let’s take a look at the Java and C# class definitions
    for the `RunResourceLoad` class.


    ```

    //Java implementation

    public class RunResourceLoad implements Runnable { ... }

    //C# implementation

    public class RunResourceLoad { ... }

    Listing 13-1

    RunResourceLoad Class Intro 1

    ```


    Notice that the Java version of the class implements the `Runnable` interface.
    This is a framework-level interface that is used to execute the class’ functionality
    in a separate thread. Don’t worry. The same threading functionality exists in
    the C# implementation. It’s just gone about slightly differently as there is no
    equivalent `Runnable` interface used. I just wanted to point out this slight difference
    before we began the class review.'
