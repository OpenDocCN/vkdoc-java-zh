  raw: '### Class Fields


    The `MmgPen` class has a few important class fields for us to cover. Let’s look
    at some code!


    ```

    private Graphics pen;

    private Color color;

    private boolean cacheOn;

    Listing 2-29

    MmgPen Class Fields 1

    ```


    The first field in the set is an instance of the `Graphics` class. The `Graphics`
    object, `pen`, is the framework class that the `MmgPen` class wraps. The next
    field, `color`, is the framework class for representing colors. Be mindful how
    you use this class field; it may not reflect the color that is being used by the
    pen. I’ll cover this in more detail when we review the `MmgPen` class’ methods.


    The last class field in this set has a bit of a story to it. The MmgBase API,
    at one time, had a focus on being able to draw scaled images on the fly. To help
    speed this up, the `MmgPen` class had special support added to it so that certain
    image drawing methods would cache an image that was scaled or rotated on the fly
    so the same transformations wouldn’t have to be performed again.


    There is even special support in the `MmgBmp` class for accessing the scaled and
    unscaled image dimensions. As it turns out, this is not the best practice for
    a 2D game. If you are planning to do on-the-fly scaling and rotation, think about
    setting up the images you need ahead of time during resource loading. This way
    they are already in memory and the work is only done once. The `cacheOn` field
    should remain false unless you are experimenting with the image transform cache.


    ### Support Method Details


    The first set of support methods we’ll review here are your standard get and set
    support methods.


    ```

    public boolean GetCacheOn() { ... }

    public void SetCacheOn(boolean b) { ... }

    public boolean IsEmptyColor(Color c) { ... }

    public Graphics GetSpriteBatch() { ... }

    public void SetSpriteBatch(Graphics sp) { ... }

    public Graphics GetGraphics() { ... }

    public void SetGraphics(Graphics sp) { ... }

    public Color GetColor() { ... }

    public void SetColor(Color c) { ... }

    public Color GetGraphicsColor() { ... }

    public void SetGraphicsColor(Color c) { ... }

    Listing 2-30

    MmgPen Support Method Details 2

    ```


    The first two methods to discuss are get and set methods for the `cacheOn` class
    field. We recommend leaving the `MmgPen`’s caching system off unless you’re very
    experienced with the API. The next method, `IsEmptyColor`, just checks to see
    if the color argument is null or not returning a Boolean value indicating the
    result.


    The next two support methods, `GetSpriteBatch` and `SetSpriteBatch`, have a bit
    of history to them. These two methods entered into the API during a port to Microsoft’s
    XNA framework. The methods are essentially the same as the `GetGraphics` and `SetGraphics`
    methods. They act as a pass-through to the sprite batch methods. They’re also
    named to reflect the drawing class in the Java implementation of the API. The
    `GetColor` and `SetColor` methods allow you access to the class’ `color` field.
    Note, these methods do not change the current color of the pen. In order to do
    that, you need to use the `GetGraphicsColor` and `SetGraphicsColor` methods. They
    will adjust the color directly on the pen.


    ```

    public Image ScaleImage(Image img, double scaleX, double scaleY) { ... }

    public Image RotateImage(int width, int height, Image img, int angle, int originX,
    int originY) { ... }

    Listing 2-31

    MmgPen Support Method Details 2

    ```


    Notice that the two support methods, listed in the preceding set, act as a nonstatic
    pass-through to the class’ static method. This is implemented for convenience
    to allow access to scaling and rotation methods from nonstatic class methods.
    The last group of support methods we have to review are the drawing methods. There
    are many more methods than those covered here; however, in the interest of efficiency,
    we won’t cover every method and instead focus on a few key examples.


    ```

    public void DrawText(MmgFont f, MmgVector2 pos) { ... }

    public void DrawBmpBasic(String idStr, MmgVector2 position) { ... }

    public void DrawBmpFromCache(MmgBmp b) { ... }

    public void DrawBmp(MmgBmp b) { ... }

    public void DrawRect(MmgObj obj) { ... }

    public void DrawRect(MmgRect r) { ... }

    public void DrawRect(int x, int y, int w, int h) { ... }

    Listing 2-32

    MmgPen Support Method Details 3

    ```


    The first method in the set of drawing methods listed in the preceding is the
    `DrawText` method. This method is overloaded, but we’ll focus on the version that
    takes an `MmgFont` instance and an `MmgVector2` instance as arguments. If the
    `FONT_NORMALIZE_POSITION` flag is set to true, then the text is drawn using adjusted
    positioning; otherwise, it is drawn using the specified coordinate values. The
    method resets the original color and font of the pen before returning. This is
    something you should make a habit of doing.


    The next method to cover is the `DrawBmpBasic` method. This method is designed
    to be a simple image drawing method that doesn’t perform transformations or complex
    logic of any kind. Up next, the `DrawBmpFromCache` method is a pass-through to
    the `DrawBmpBasic` method we just looked at. Notice that the `MmgBmp` instance’s
    ID string is used to locate the desired image in the resource cache.


    This method is a slightly more concise way to draw an image from the image cache
    if the `MmgBmp` instance has the correct ID and position set. The last method
    in the set is a generic `MmgBmp` drawing method, `DrawBmp`. Note that this method
    calls a more complicated version of the `DrawBmp` class that uses rendering options
    like origin, scaling, and rotation.


    ### Main Method Details


    We’ll begin the main method review section by looking at some class constructors.


    ```

    public MmgPen(Graphics p) { ... }

    public MmgPen(Graphics p, Color c) { ... }

    Listing 2-33

    MmgPen Main Method Details 1

    ```


    The two constructors I want to review are straightforward. The first constructor
    takes a `Graphics` object as an argument and uses it to set the pen class field.
    The next constructor, listed in the preceding, takes a `Graphics` object and a
    `Color` object as arguments. Note that the color argument is not used to change
    the graphics object’s color field. It is only used to update the `MmgPen`’s color
    field. In both constructors, the `cacheOn` class field is set to false. Remember,
    we don’t activate that feature unless we explicitly want to experiment with it.'
