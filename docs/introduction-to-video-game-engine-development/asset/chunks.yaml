    the pulse animation controls the position of the image and moves it back and forth
    from the starting position to the ending position repeating the process over and
    over again.


    ## Animation Classes: `MmgPositionTween`/`MmgSizeTween`


    The `MmgPositionTween` class is another animation class that works a bit differently
    than the `MmgPulse` class we’ve just reviewed. The `MmgPulse` class really only
    updates an `MmgVector2` object via a call to the class’ update method. In this
    way, the class doesn’t act like many of the drawable classes we’ve reviewed thus
    far.


    The `MmgPulse` class acts more like a generator, generating the next vector in
    the animation for use as you see fit. The `MmgPositionTween` class, on the other
    hand, extends the `MmgObj` class and is a member of the drawable set of objects.
    The `MmgPositionTween` class is designed to move an object from a starting position
    to an ending position in a specified amount of time.


    The `MmgSizeTween` class is very similar to the position tween class except that
    instead of adjusting an object’s position, it alters the object’s size. These
    classes are very similar and have almost the exact same structure, fields, and
    methods, save that the `MmgSizeTween` class uses a slightly different naming convention
    for its methods.


    Make sure you check out the size tween example screen, `ScreenTestMmgSizeTween`
    class in the MmgTestSpace library. You’ll find the code to be very familiar just
    slightly adjusted to handle resizing as opposed to repositioning.


    ### Static Class Members


    The `MmgPositionTween` class has four static class members listed in the following.
    These fields are used to describe the class'' event IDs and types.


    ```

    public static int MMG_POSITION_TWEEN_REACH_FINISH = 0;

    public static int MMG_POSITION_TWEEN_REACH_START = 1;

    public static int MMG_POSITION_TWEEN_REACH_FINISH_TYPE = 0;

    public static int MMG_POSITION_TWEEN_REACH_START_TYPE = 1;

    Listing 7-7

    MmgPositionTween Static Class Members 1

    ```


    The preceding field listings are event ID and type values for the class’ reach
    start and reach finish events. The `MmgPositionTween` class supports firing an
    event when the object is at the start and end of the animation.'
