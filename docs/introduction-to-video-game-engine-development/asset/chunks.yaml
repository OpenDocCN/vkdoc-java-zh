    and go over the C# setup process again.


    Inside the **bin\Debug\netcoreapp3.1** folder is where the compiled version of
    the game is created. In order to start a game, we need to know how to run some
    command-line interface, console, commands. In Windows, you should use the command
    program, **cmd.exe**. You can find this program on the Start menu or search for
    **cmd** in the run bar.


    For other platforms, you’ll just need to open up a terminal. If you don’t know
    how to do this, simply search the Internet for some instructions on how to open
    up a terminal window for your particular operating system. Once you have a terminal
    window open, we’ll want to verify the C# runtime environment is set up correctly.
    Run the following command in the console window:


    ```

    dotnet -–version

    ```


    If you get a message indicating that the DotNet program could not be found, then
    we’ll have to make sure that DotNet is on the system’s path environment variable.
    In Windows, you will see the following message if DotNet cannot be found. You
    will see a similar message on Mac OSX and Linux:


    ```

    ''dotnet'' is not recognized as an internal or external command, operable program
    or batch file.

    ```


    If this is the case, you’ll want to visit the following link or search the Internet
    for “add dotnet to your path” and look at one of the top results:


    [`https://docs.microsoft.com/en-us/dotnet/core/tools/troubleshoot-usage-issues`](https://docs.microsoft.com/en-us/dotnet/core/tools/troubleshoot-usage-issues)


    If everything is up and running properly, then you’ll see a rather unceremonious
