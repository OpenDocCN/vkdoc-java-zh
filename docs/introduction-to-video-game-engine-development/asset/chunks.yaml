  trans: "\n### 地牢陷阱 通用游戏规格\n\n*   **总体描述**：地牢陷阱游戏包含一名或两名被困在地牢密室中的玩家，敌人会分阶段一波波涌入房间。玩家使用武器、道具和物品击退敌人浪潮，并收集积分。随着敌人被击败，会随机掉落物品供玩家拾取。击败所有敌人浪潮即可逃离地牢陷阱！\n\
    \n*   **玩家数量**：游戏应支持一名或两名玩家。\n\n*   **获胜条件**：存活过十波敌人。\n\n*   **失败条件**：受到敌人的致命伤害。\n\
    \n*   **游戏界面**：\n    *   启动画面\n    *   加载画面\n    *   主菜单画面\n    *   游戏画面\n\n*\
    \   **游戏画面详情**：\n    *   **启动画面**：显示一个带有标志的启动画面，持续几秒钟。\n    *   **加载画面**：显示一个带有标志和加载进度条的加载画面。\n\
    \    *   **主菜单画面**：一个包含标题、副标题、单人模式、双人模式、退出游戏菜单选项以及版本号功能的菜单画面。\n    *   **游戏画面**：一个包含带有倒计时功能的说明子画面的游戏画面。游戏还应支持退出游戏子画面、游戏结束画面、玩家状态\
    \ HUD 以及 AI 对手。\n\n*   **游戏输入详情**：\n    *   **玩家一输入**：使用键盘上的上、下、左、右方向键以及 A 键和\
    \ B 键进行输入。\n    *   **玩家二输入**：使用四个模拟方向键的键盘按键以及 A/B 输入。\n\n请注意，尽管这个游戏显然比之前的游戏复杂得多，但大纲并没有比之前长太多。我认为这正是一个优秀游戏大纲的体现。我们不会试图解决任何实现问题或指定任何深入细节——只提供高层概念。最后一点想法：不要害怕偏离最初的计划。制作游戏充满挑战，面对任何足够有挑战性的经历，你最终都必须适应并克服困难。\n\
    \n## 游戏资源\n\n说到游戏资源，我已经为你准备好了。我会提供一套基础资源，包括音效、图片和类配置文件。本文的主要焦点是仅使用 IDE 和游戏引擎，通过代码来构建游戏。因此，我不会要求你为我们在此创建的游戏编辑或创建资源。话虽如此，图片和音效是大多数游戏不可或缺的组成部分。\n\
    \n开始思考获取游戏资源的不同方式吧。你可以在网上搜索提供游戏资源的网站，自己创建资源，或者与朋友合作。如果你不是艺术家，也不要气馁。相信我，有很多选择在等着你。\n\
    \n我还想提一下，本书这部分内容的每一章都附带了示例游戏项目。你可以打开并查看对应章节游戏的完整实现。这些章节项目包含在游戏引擎的主项目中。这可以帮助你解决代码中的错误，所以请务必记住这一点。至此，我们已到达本引言部分的结尾。祝你编码愉快！\n\
    \n# 16. PongClone 项目设置\n\n在开始本章之前，我想列出一些通用的项目说明，以确保你能正确设置并快速解决最常见的问题。说明如下：\n\n\
    Java：\n\n1.  游戏项目应在项目的“运行”设置中，将工作目录配置为“./dist”。\n\nJava 和 C#：\n\n1.  静态主类的 `ENGINE_CONFIG_FILE`\
    \ 字段应指向游戏项目“cfg”目录中的配置文件，路径相对于项目的工作目录。\n\n2.  游戏引擎配置文件应有一个 `NAME` 条目，其值与关联的项目及该项目的资源文件夹名称相同。\n\
    \n3.  要关闭游戏手柄 1 的输入，请在游戏引擎配置文件中添加以下行：\n\n在本章中，我将引导你使用 Java 或 C# 设置一个新的游戏开发项目。你可以将本章作为两个版本游戏引擎的参考。我们还将准备游戏的资源，包括图片、音效以及游戏画面用于数据驱动定制的类配置文件。\n\
    \n我们将分步骤进行项目开发。本章代表我们的第一步。因为我们希望在开发步骤结束时得到可运行的功能，所以我将开发过程设计为：你在每章结束时都能得到一个可以编译和运行的程序。需要说明的是，在现实世界中可能并非总是如此。\n\
    \n有时你会努力实现某个功能，但项目可能无法编译或正常运行。这完全正常。不要认为电子游戏开发总是像我们这里构建的游戏那样一清二楚。我想花点时间提一下在基于\
    \ OSX 的电脑上操作时的两个注意事项。第一件事是，在尝试加载和运行游戏项目时，你可能会在 NetBeans IDE 中遇到安全异常。\n\n我收到的错误信息大致是说文件“libjnidispatch-440.jnilib”导致了“无法打开，因为无法验证开发者”的错误。打开你的\
    \ Mac 系统偏好设置，进入安全与隐私部分。你会注意到，当在 IDE 中遇到该错误时，会弹出一个应用程序安全例外条目。请为 IDE 以及运行游戏进行测试时都接受该安全例外。调整之后，这些消息就会停止出现。\n\
    \n你可能会遇到的第二个问题与 OSX 键盘按键的上下文菜单有关。当你按住一个键几秒钟时，这个菜单就会弹出。它允许你选择带有不同语言重音符号的按键版本。请上网搜索如何针对你的\
    \ OSX 版本开启和关闭此功能。在测试游戏之前，请务必将其**关闭**，否则在游戏过程中，当上下文菜单被触发但并未实际显示时，你可能会无意中锁定某个键盘按键。\n"
- fmt: '# Setting Up a New Project: Java/NetBeans IDE


    In this section, we’ll review the steps necessary to create a brand-new game development
    project, in Java, that uses the game engine API you just finished reviewing. First
    up, we’ll outline the process for the Java version of the game engine; then we’ll
    take a look at the process for C#. Fire up the NetBeans IDE, and let’s get to
    work! Make sure you have the `MmgGameApiJava` project opened in the IDE.


    Once that is done, select “File ➤ New Project …” from the application menu and
    create a new project in the directory where you keep your NetBeans projects. Select
    the “Java with Ant” category from the “New Project” popup. From the “Projects”
    list, select the “Java Application” option and click the “Next >” button.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig1_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig1_HTML.jpg)


    Figure 16-1


    Java Project Setup 1


    Set the “Project Name” field to “PongClone.” Make sure that the “Project Location”
    and “Project Folder” fields have the correct values. Keep the “Use Dedicated Folder
    for Storing Libraries” and “Create Main Class” options unchecked, as shown in
    the following image, and then click the “Finish” button.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig2_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Java Project Setup 2


    You should now have a new empty project in your list of projects named `PongClone`.
    We’ll have to do a little bit of project configuration next. Right-click your
    new project and select the “Properties” option. You should see a “Project Properties”
    popup with a list of categories on the left-hand side and category specifics on
    the right. Select the “Packaging” option under the “Build” category.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig3_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig3_HTML.jpg)


    Figure 16-3


    Java Project Setup 3


    Make sure that your project’s “JAR File” is set to `dist/PongClone.jar`. Make
    sure your project has the working directory set to `./dist/` under the project’s
    “Run” settings. Also, make sure the “Build JAR after Compiling” and “Copy Dependent
    Libraries” options are checked as shown in the preceding. Now we need to set up
    our project resources. You’ll need to have the `MmgGameApiJava` project loaded
    if it hasn’t been already. Click the “Files” tab next the project listing. If
    you don’t see it there, you can also access the Files view by clicking the “Window”
    menu option and selecting the “Files” entry.


    Open the `MmgGameApiJava` folder and locate a folder inside named `cfg`. Open
    the `cfg` directory and locate the `asset_src` folder. In this folder, there should
    be a folder called `pong_clone_resources`. Open it and find the folder inside
    named `cfg`. Copy this folder and paste it into the root of the `PongClone` game’s
    project folder. Your new game project now has a full set of resources ready to
    use.


    We’re just about ready to start writing some code, but there’re still a few things
    we must attend to first. We’ll need to get our project’s libraries sorted out.
    First, let’s add a reference to the game engine API. Open up the `PongClone` project’s
    properties popup again. This time, select the “Libraries” category from the left-hand
    side’s list of categories. Under the “Compile” tab, locate the “Classpath” section
    as shown in the following.


    ![../images/508392_1_En_16_Chapter/508392_1_En_16_Fig4_HTML.jpg](images/508392_1_En_16_Chapter/508392_1_En_16_Fig4_HTML.jpg)


    Figure 16-4


    Java Project Setup 4


    Click the “+” button and select the “Add project” option. Choose the `MmgGameApiJava`
    project from the list, and you should now see the game engine project listed under
    the “Classpath” section. Close the Project Properties popup. Reopen the “Files”
    view. Find the game engine project folder again and open it. You should see a
    folder named `lib` in the project’s root directory.


    Copy the folder and go back one directory to the project listing. Find the `PongClone`
    folder and paste the `lib` folder into the project’s root directory. We have just
    two more libraries to register, and the project configuration is done. Open the
    `PongClone` project’s properties popup again. Select the “Libraries” category
    and find the “Classpath” section.


    Click the “+” button and select the “Add JAR/Folder” option. Navigate to the `PongClone`
    project folder and open the `libs` directory you just pasted there. Find and open
    the `jinput` folder and select the file `jinput-2.0.9.jar`; click the “Choose”
    button and then click the “Ok” button. Repeat the process except this time find
    and open the `junit_4` folder and select the `junit-4.12.jar` file. Click the
    “Choose” button and then click the “Ok” button. That’s it. The `PongClone` project
    is set up and configured. We’re ready to code!'
