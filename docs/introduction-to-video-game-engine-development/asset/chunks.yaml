    We’ll begin the `MmgObj` main method review with the methods listed in the following
    set.


    ```

    public MmgObj(MmgVector2 v2, int W, int H, boolean isv, MmgColor c, String n,
    String i) { ... }

    public MmgObj(MmgObj obj) { ... }

    public MmgObj Clone() { ... }

    public MmgObj CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgObj obj) { ... }

    ```


    *Listing 2-5: MmgObj Main Method Details 1*


    The first `MmgObj` constructor we’ll review takes seven arguments and sets class
    fields to an initial value using either a default or argument value. Take note
    that the position is set by instantiating a new `MmgVector2` class instance with
    the passed-in `X` and `Y` coordinates as arguments. Also, note that this constructor
    sets the `hasParent` Boolean to false and the `parent` field to null. This is
    a straightforward constructor. The next constructor we’ll review is a little bit
    different.


    The second `MmgObj` constructor takes an `MmgObj` instance as an argument. This
    is a specialized constructor that creates a new class instance based on the passed-in
    object. Almost all API objects are cloned to prevent shared references between
    the new object and the object it was based on.


    The next set of main methods to review starts with the cloning methods. The implementation
    seems to be a little odd in that both the `Clone` and `CloneTyped` methods return
    a new `MmgObj` instance. This was a design decision to make cloning functionality
    standard across the API. For classes that extend the `MmgObj` class, the `Clone`
    method returns a new `MmgObj` instance, and the `CloneTyped` method returns a
    new instance of the extended class. In this case, the typed class is also `MmgObj`,
    so both methods return the same type of object. Typed cloning is only supported
    here for completeness.


    The `MmgUpdate` method is part of the game engine drawing routine. The drawing
    routine consists of a set of standard methods that are called a certain number
    of times a second to maintain the desired frame rate. The `updateTick` argument
    is an index of the number of times the update method was called. In other words,
    if you run your game at 60 frames per second, then the `updateTick` argument will
    increase by roughly 60 each second.


    The next method argument, `currentTimeMs`, is the time, in milliseconds, that
    the method was called. The last argument of the method, `msSinceLastFrame`, is
    the number of milliseconds since the last update method call. These arguments
    can be used to support timing control during game frames. Think of any temporary
    image change in any game. Timing is used to control that behavior. You can measure
    duration of time by storing the start time of the event and taking a measurement
    at the stop time of the event.


    You could also aggregate the `msSinceLastFrame` value each update call and use
    that to measure how much time an event is taking. The next method to review, `MmgDraw`,
    is another drawing routine method. This method is passed an `MmgPen` object that
    wraps the framework drawing classes. The `MmgDraw` method is called by the drawing
    routine every game frame and always right after the update method call.


    The `ApiToString` method is an API convention for providing a string representation
    of the class. The last main method we need to review for the `MmgObj` class is
    the `ApiEquals` method. Again, this is a convention that is carried throughout
    this API along with the `ApiToString` and cloning conventions. This method provides
    an API-level equality test.


    ### Demonstration: MmgObj Class


    The demonstration code review will not include a detailed review of the application
    and game screens used. A detailed review of this code can be found in Part 2 of
    this book where the MmgCore API is covered. We will however cover the pertinent
    blocks of code of the example game screen that demonstrates use of the `MmgObj`
    class. I recommend you run the example application to see the code you’re reviewing
    in action.


    ```

    01 public void LoadResources() {

    02    MmgHelper.wr("ScreenTestMmgObj.LoadResources");

    03    pause = true;

    04    SetHeight(MmgScreenData.GetGameHeight());

    05    SetWidth(MmgScreenData.GetGameWidth());

    06    SetPosition(MmgScreenData.GetPosition());


    08    title = MmgFontData.CreateDefaultBoldMmgFontLg();

    09    title.SetText("");

    10    MmgHelper.CenterHorAndTop(title);

    11    title.SetY(title.GetY() + MmgHelper.ScaleValue(30));

    12    AddObj(title);


    14    int padding = MmgHelper.ScaleValue(20);

    15    int objW = (GetWidth() - (padding * 4)) / 3;

    16    int objH = MmgHelper.ScaleValue(150);

    17    int objY = (GetHeight() - (objH + padding + MmgHelper.ScaleValue(10))) /
    2 + GetY();

    18    int objX = padding;


    20    obj1 = new MmgObj();

    21    obj1.SetPosition(objX, objY);

    22    obj1.SetWidth(objW);

    23    obj1.SetHeight(objH);

    ```


    *Listing 2-6: MmgObj Class Demonstration 1*


    The example game screen is located in the `ScreenTestMmgObj` class of the MmgTestSpace
    package, or namespace if you’re using C#. Notice that the method line numbers
    are relative to the method, not the entire file. The `LoadResources` method is
    used by all example game screens and is responsible for initializing the drawable
    objects used by the game screen. On line 3, we make sure the screen is paused
    so it doesn’t try to draw itself when not fully initialized. The width, height,
    and position of the screen’s drawable space are set from the `MmgScreenData` class’
    calculated values. The `MmgScreenData` class determines the proper scaling based
    on the window’s dimensions and the desired game panel dimensions, lines 4–6.


    The `title` for this game screen is set on lines 8–12. Notice that the font for
    the title is maintained by the class `MmgFontData`. This class is similar to the
    `MmgScreenData` class in that it handles scaling font sizes based on the screen’s
    current scaling setup. Take notice of the scaling features. This 2D game API is
    meant to be automatically resizable in certain aspects, and two of those aspects
    are the screen size and the font size.


    The text is set on line 9, and on line 10 we see the `MmgHelper` class in use.
    Thus far, we’ve seen a number of static support classes come in handy. The `MmgHelper`
    class is another handy support class that conveniently provides access to object
    positioning methods. Next, on line 11, we adjust the positioning slightly and
    move the title down by a scaled 30 pixels. The `ScaleValue` method is an easy-access
    static method that will scale a number based on the screen’s scaling setup.


    Every literal distance, position, or size value should be passed through the `MmgHelper`
    class’ `ScaleValue` method. This will ensure your game can be run at different
    resolutions and all positioning, font, and screen dimensions will automatically
    be adjusted to accommodate the current resolution. The last line in that code
    block, line 12, adds the title `MmgFont` instance to the screen’s collection of
    drawable objects. Because we extended the `MmgGameScreen` class for this game
    screen, we have some built-in functionality from that class.'
