    清单 2-41

    MmgBmp 支持方法详解 1

    ```


    这里有一些来自该类原始 XNA 实现的遗留代码。你会注意到有两种方式可以与 `image` 类字段交互。`GetTexture2D` 和 `SetTexture2D`
    这对方法指的是 C#/MonoGame 框架类 `Texture2D`，而 `GetImage` 和 `SetImage` 方法指的是 Java/Swing
    框架类 `Image`。任一对方法都会更新类的图像字段。


