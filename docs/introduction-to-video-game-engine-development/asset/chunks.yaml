    ## 游戏屏幕类：MmgLoadingScreen


    `MmgLoadingScreen` 类是 MmgBase API 中的另一个高级类。该类用于运行游戏引擎的默认资源加载过程。与 `MmgSplashScreen`
    类类似，`MmgSplashScreen` 类扩展了 `MmgGameScreen` 类并提供了启动屏幕的松散实现，而 `MmgLoadingScreen`
    类也扩展了 `MmgGameScreen` 类，并提供了加载屏幕的松散实现。


    我之所以将实现描述为松散，仅仅是因为该类尚未接入运行时环境，因此其使用方式在一定程度上是开放的。当我们在演示部分介绍该类的实现示例时，您将看到一个更具体的屏幕实现，该实现旨在接入游戏引擎的默认运行时。


