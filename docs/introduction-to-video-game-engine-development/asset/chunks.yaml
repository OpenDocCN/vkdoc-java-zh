    image. The source rectangle is the top-left square, one-half the width and height.
    The destination is a new image with the same dimensions, so the `srcRect` and
    the `dstRect` are the same. On line 4, using the `MmgPen` instance, `p`, the top-left
    square is drawn onto the new image, `img`. The position of the image is adjusted,
    and it’s added into the default drawing routine, lines 6–8.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s advanced classes.
    The classes we covered are starting to use base classes in new combinations to
    solve different problems. We have a bunch of new tools in our toolbox. Let’s take
    a look at a summary of them:


    *   Mmg9Slice: A scaling class that uses a nine-slice technique to resize rectangular
    images, UI frames, borders, and other images without distortion.


    *   MmgContainer: An API class for representing a group of MmgObj instances for
    the API.


    *   MmgLabelValuePair: A UI class that displays text in a label and value pair
    format. Provides more advanced text support geared toward game HUDs and other
    game stats UI.


    *   MmgLoadingBar: An API class for representing a loading bar or progress for
    the API.


    *   MmgSprite: An advanced class that uses an array of MmgBmp objects to create
    an animated 2D game object for the API.


    *   MmgDrawableBmpSet: An advanced class that contains a set of fields needed
    to draw on a new MmgBmp object. The class contains all the framework and API-level
    classes to accomplish the configuration.


    These classes are starting to show the emergence that occurs when you start adding
    layers of functionality on top of a solid foundation of classes. We have access
    to some very powerful functionality in the classes we’ve reviewed here. Be sure
    to include them when you’re planning out your next great game.


    # 6. Widget Classes


    In this chapter, we’ll review the UI widget classes of the MmgBase API. These
    are advanced classes similar to those we’ve reviewed before, but they are designed
    to work as part of a game menu, a settings screen, or other types of configuration
    screen. These classes greatly simplify the work needed to get a game screen that
    takes user input up and running. They also provide solid support for scroll panes
    and large text blocks:


    *   MmgTextField


    *   MmgTextBlock


    *   MmgScrollVert/MmgScrollHor/MmgScrollHorVert


    *   MmgMenuContainer


    *   MmgMenuItem


    ## Widget Classes: MmgTextField


    The `MmgTextField` class is part of the group of UI widget classes. It’s a simple
    text field widget much like you might see on a web form. The class is designed
    to provide basic support for reading in values from the user.


