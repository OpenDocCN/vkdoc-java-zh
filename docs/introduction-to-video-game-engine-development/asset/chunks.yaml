    public static String ENGINE_CONFIG_FILE = "../cfg/engine_config.xml";

    Listing 10-1

    MmgApiGame Static Class Members 1

    ```


    The first group of fields are the windowing fields. They contain a `MainFrame`
    object and a `GamePanel` object. If you are following along with the C# code,
    you’ll notice there is only a `GamePanel` field. The C#/MonoGame implementation
    of the game engine does not have an equivalent `MainFrame` class. That functionality
    has been merged into the `GamePanel` class. The next group of fields are used
    to control the game’s frame rate.


    In the Java version of the game, a worker thread is responsible for running a
    game frame every few milliseconds, depending on the frames per second you have
    set. That is what the `fr`, `RunFrameRate`, field is used for. The C# version
    of the game engine runs on top of MonoGame, which is much more suited for building
    games than Java Swing, so the frame rate is controlled internally by the MonoGame
    library. We only have to set the desired rate, and the rest is taken care of for
    us.


    The `Thread` instance, `t`, is used in the Java implementation to run the frame
    rate worker in its own thread. The `FPS` field holds the current, desired frame
    rate. The game engine will attempt to achieve this frame rate, but it’s not possible
    in all cases. It will depend heavily on the version of the game engine you’re
    working with and the type of game you’re making and its requirements. You don’t
    want to set the frame rate so high that you cause issues with the system. So don’t
    put in a frame rate of 1000!


    When working in windowed mode and while an IDE is running, you’ll want to use
    a conservative frame rate. It will generate fewer logs, take fewer resources,
    and still give you enough to accurately test and debug your game. That being said,
    if you have some exceptional frame rate requirements, you should test your game
    with the maximum number of objects and see how fast it runs.


    The Java version of the engine should really only be used at around 30 frames
    or fewer. I develop with 18–24 FPS. For many of the games I make, I don’t need
    60 FPS at all. It’s just not that kind of game. The C#/MonoGame version of the
    engine should be able to reach 60 FPS easily. You’ll see even more improvement
    if you alter your game to run in full-screen mode. I don’t think that the Java
    version has an equivalence to full-screen mode that also gives you the efficiency
    benefit of being the only program that is active. This is because in Java you
    can only pretend to be in full-screen mode when in actuality you have just maximized
    the view port.


    The next group of fields define the dimensions. These fields describe the dimensions
    of each aspect of the game’s windowing. The window dimensions describe the outer,
    OS-driven window the game runs in. The panel dimensions control the size of the
    window’s contents. In most cases, the panel and the window should be the same
    size. Finally, the game has its own set of dimensions. These should fit inside
    the panel and window, but if they don’t, the engine will try to scale the game
    dimensions so they do.'
