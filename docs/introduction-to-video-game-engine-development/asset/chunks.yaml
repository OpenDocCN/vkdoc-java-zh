- fmt: '### Class Fields


    Let’s take a look at the `MmgPositionTween` class’ fields. I’ve listed the first
    set of fields for us to review in the following section.


    ```

    private boolean atFinish;

    private boolean atStart;

    private boolean dirStartToFinish;

    private MmgVector2 finishPosition;

    private MmgVector2 startPosition;

    private boolean moving;

    private long msStartMove;

    private float msTimeToMove;

    Listing 7-8

    MmgPositionTween Class Fields 1

    ```


    The first set of class fields for us to review starts with the `atFinish` field.
    This field is a Boolean flag indicating if the animation has reached the finish
    position. Similarly, the `atStart` field indicates if the animation is at the
    starting position. The next field, `dirStartToFinish`, is another Boolean flag
    that is true when the animation is running forward, from start to finish, and
    false when the animation is running in reverse.


    The `finish` and `start` position fields are just what they seem. The `moving`
    Boolean flag is set to true when the animation is active and the object is moving.
    The `msStartMove` field holds the animation’s starting time, and the `msTimeToMove`
    field holds the total amount of time the animation has to complete.


    ```

    private MmgEventHandler onReachFinish;

    private MmgEventHandler onReachStart;

    private MmgVector2 pixelDistToMove;

    private float pixelsPerMsToMoveX;

    private float pixelsPerMsToMoveY;

    private MmgObj subj;

    private MmgEvent reachFinish = new MmgEvent(null, "reach_finish", MmgPositionTween.MMG_POSITION_TWEEN_REACH_FINISH,
    MmgPositionTween.MMG_POSITION_TWEEN_REACH_FINISH_TYPE, null, null);

    private MmgEvent reachStart = new MmgEvent(null, "reach_start", MmgPositionTween.MMG_POSITION_TWEEN_REACH_START,
    MmgPositionTween.MMG_POSITION_TWEEN_REACH_START_TYPE, null, null);

    Listing 7-9

    MmgPositionTween Class Fields 2

    ```


    The second set of class fields for us to review is listed in the preceding. The
    first two fields are event handlers. The class supports `onReachFinish` and `onReachStart`
    event handlers. The next entry, `pixelDistToMove`, is a vector representing the
    difference between the finish and the start positions. This vector represents
    the pixel distance that the subject has to move during the animation.


    We break down this info further and determine the `pixelsPerMsToMoveX` and `pixelsPerMsToMoveY`.
    These two fields track the distance that must be moved on each axis. The subject
    of the class you’ll notice is an `MmgObj` instance. This means that the position
    tween will work with any of the drawable objects in the MmgBase API. Now that’s
    pretty powerful stuff.


    Templates for the `reachFinish` and `reachStart` events are the last two class
    fields. These events are just about ready to go except they need to have a target
    event handler set.


    ### Support Method Details


    The `MmgPositionTween` class’ support methods are just get and set methods for
    the class’ fields. Nothing crazy going on here. I’ve taken the time to list the
    methods in the same order as the class fields we just reviewed.


    ```

    public boolean GetAtFinish() { ... }

    public void SetAtFinish(boolean b) { ... }

    public boolean GetAtStart() { ... }

    public void SetAtStart(boolean b) { ... }

    public boolean GetDirStartToFinish() { ... }

    public void SetDirStartToFinish(boolean b) { ... }

    public MmgVector2 GetFinishPosition() { ... }

    public void SetFinishPosition(MmgVector2 v) { ... }

    public MmgVector2 GetStartPosition() { ... }

    public void SetStartPosition(MmgVector2 v) { ... }

    public boolean GetMoving() { ... }

    public void SetMoving(boolean b) { ... }

    public long GetMsStartMove() { ... }

    public void SetMsStartMove(long l) { ... }

    public float GetMsTimeToMove() { ... }

    public void SetMsTimeToMove(float i) { ... }

    public MmgEventHandler GetOnReachFinish() { ... }

    public void SetOnReachFinish(MmgEventHandler o) { ... }

    public MmgEventHandler GetOnReachStart() { ... }

    public void SetOnReachStart(MmgEventHandler o) { ... }

    public MmgVector2 GetPixelDistToMove() { ... }

    public void SetPixelDistToMove(MmgVector2 v) { ... }

    public float GetPixelsPerMsToMoveX() { ... }

    public void SetPixelsPerMsToMoveX(float i) { ... }

    public float GetPixelsPerMsToMoveY() { ... }

    public void SetPixelsPerMsToMoveY(float i) { ... }

    public int GetFinishEventId() { ... }

    public void SetFinishEventId(int i) { ... }

    public int GetStartEventId() { ... }

    public void SetStartEventId(int i) { ... }

    public MmgObj GetSubj() { ... }

    public void SetSubj(MmgObj b) { ... }

    Listing 7-10

    MmgPositionTween Support Method Details 1

    ```


    Again, these are basic get and set methods. Notice that you don’t have direct
    access to the class’ events. You can however set their target event handler and
    event IDs. There are a lot of methods here. Don’t feel pressured to understand
    how all of them work in the context of using the class. Focus on just getting
    a feel for what the class offers. You’ll get the details down later on after some
    practice with the code.


    ### Main Method Details


    The class’ main methods are listed as follows. We have a pretty standard set of
    constructors and cloning, comparison, and drawing routine methods. These should
    all look familiar to you by now. You should have a solid idea of how each method
    is used just based on its type and name.


    ```

    public MmgPositionTween(MmgObj subj, float msTimeToMove, MmgVector2 startPos,
    MmgVector2 finishPos) { ... }

    public MmgPositionTween(MmgPositionTween obj) { ... }

    public MmgObj Clone() { ... }

    public MmgPositionTween CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public boolean ApiEquals(MmgPositionTween obj) { ... }

    Listing 7-11

    MmgPositionTween Main Method Details 1

    ```


    The first entry is the class’ default constructor. You can use this to create
    a new instance of the class configured and ready to use. The second constructor
    is the specialized constructor we’ve come to know and love. This constructor takes
    an `MmgPositionTween` instance as an argument and uses it to create a new, unique
    copy of the object. The cloning methods create a new, unique copy of the class
    using the specialized constructor.


    The `MmgUpdate` and `MmgDraw` methods take responsibility for updating and drawing
    the animation. The `MmgDraw` method is very simple; it just draws the subject
    on the screen at its specified position. The `MmgUpdate` method is a bit more
    complicated and needs to be called each frame in order for the animation to work
    properly. This method updates the position of the subject based on the number
    of pixels that the object needs to move each frame on the X and Y axes. The `ApiEquals`
    method provides API-level comparison between two `MmgPositionTween` objects.'
