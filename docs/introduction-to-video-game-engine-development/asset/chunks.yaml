- fmt: '# Other Classes: `MmgCfgFileEntry`


    The `MmgCfgFileEntry` class is used to hold data when reading and writing config
    files. It’s a small class, but I think it’s important to review it because class
    config automation is such a useful feature when setting up game screens. The `MmgCfgFileEntry`
    class is designed to hold numeric or string data in the form of key-value pairs
    loaded from a special text file, a class config file.


    ## Enumerations


    There is one enumeration that is associated with the `MmgCfgFileEntry` class,
    the `CfgEntryType` enumeration. It has three different values, `TYPE_DOUBLE`,
    `TYPE_STRING`, and `NONE`. The first two values are used to indicate the type
    of data stored in the config entry. The `NONE` value is used to indicate an uninitialized
    state.


    ## Class Fields


    The `MmgCfgFileEntry` has a few descriptive fields I’ve listed in the following.


    ```

    public CfgEntryType cfgType = CfgEntryType.NONE;

    public Double number;

    public String str;

    public String name;

    Listing 4-1

    MmgCfgFileEntry Class Fields 1

    ```


    The first entry is an instance of the `CfgEntryType` enumeration we just reviewed.
    It is used to keep track of the type of data that is stored in this object. The
    next two class fields, `number` and `str`, are used to hold the actual data read
    in from the class config file. The last field is the `name` field. It’s used to
    store the key string associated with the line of data in the class config file.


    ## Support Method Details


    Due to the simple nature of the class, there aren’t any get and set support methods.
    That gives us only two methods to review.


    ```

    public String ApiToString() { ... }

    public int compare(MmgCfgFileEntry o1, MmgCfgFileEntry o2) { ... }

    Listing 4-2

    MmgCfgFileEntry Support Method Details 1

    ```


    The first of the two entries for us to review is an API-to-string method. We’ve
    come across this before, so I won’t spend more time on it here. The `compare`
    method is a framework comparison method used to sort the config file entries before
    writing them.


    ## Main Method Details


    The `MmgCfgFileEntry` class has some standard main methods for us to review.


    ```

    public MmgCfgFileEntry() { ... }

    public MmgCfgFileEntry(MmgCfgFileEntry obj) { ... }

    public MmgCfgFileEntry Clone() { ... }

    public boolean ApiEquals(MmgCfgFileEntry obj) { ... }

    Listing 4-3

    MmgCfgFileEntry Main Method Details 1

    ```


    The first main method is a simple constructor that takes no arguments. This is
    very useful for quickly instantiating an object and then configuring it later
    on. The second constructor is a specialized constructor that takes an `MmgCfgFileEntry`
    as an argument and uses it to create a new, unique, class instance.


    The `Clone` method is used to make a new unique copy of the class. It uses the
    specialized constructor to do this. The last entry in the preceding list is the
    `ApiEquals` method, which is an API-level comparison method. That wraps up the
    main methods I wanted to review. Let’s take a look at the class in action!


    ## Demonstration: `MmgCfgFileEntry` Class


    The snippet of example code listed in the following shows the `MmgCfgFileEntry`
    class in use as part of a class config implementation.


    ```

    01 classConfig = MmgHelper.ReadClassConfigFile(GameSettings.CLASS_CONFIG_DIR +
    "screen_splash.txt");

    ...

    02 key = "splashScreenDisplayTimeMs";

    03 if(classConfig.containsKey(key)) {

    04 super.SetDisplayTime(classConfig.get(key).number.intValue());

    05 }


    07 key = "bmpLogo";

    08 if(classConfig.containsKey(key)) {

    09     file = classConfig.get(key).str;

    10 } else {

    11     file = "logo_large.jpg";

    12 }

    Listing 4-4

    MmgCfgFileEntry Class Demonstration 1

    ```


    The code snippet listed in the preceding is from the `LoadResources` method of
    the `SplashScreen` class from the MmgTestSpace library. The first line of code
    demonstrates loading a class config file. On lines 2–5, we can see how to access
    the data from a config file entry. Note that we know ahead of time what type of
    data to expect for the given key. On line 4, the display time field is set based
    on the config file entry’s numeric value.


    The next block of example code on lines 7–12 demonstrates using a config file
    entry object to retrieve a string value. Notice on line 9 the config file entry
    object is located by its key and the `str` field is used. That completes the demonstration
    code I wanted to review for this class.


    # Other Classes: `MmgEvent`


    The `MmgEvent` class and its counterpart, the `MmgEventHandler` class, create
    a generic event handling system that you can use to send and receive events. We’ll
    cover the `MmgEventHandler` class after this class review. The `MmgEvent` class
    has a simple implementation. The only thing I should mention is that there are
    some preset event IDs for handling menu navigation.


    ## Static Class Members


    The `MmgEvent` class has a number of class fields that are default static values
    for different events. These presets were mainly designed to be used with a menu
    system allowing the user to move around to the different menu options.


    ```

    public static int EVENT_ID_UP = 0;

    public static int EVENT_ID_DOWN = 1;

    public static int EVENT_ID_LEFT = 2;

    public static int EVENT_ID_RIGHT = 3;

    public static int EVENT_ID_ENTER = 4;

    public static int EVENT_ID_SPACE = 5;

    public static int EVENT_ID_BACK = 6;

    public static int EVENT_ID_ESC = 7;

    Listing 4-5

    MmgEvent Static Class Members 1

    ```


    The static class fields of the `MmgEvent` class are preset event IDs meant to
    represent keyboard or gamepad input. An input can be mapped to one of these static
    IDs indicating directional pad input, enter or space bar input, or back or escape
    input.


    It’s important to note that the event ID is really only important in the context
    of the event and the event handler. You could choose to use the preset IDs to
    indicate something entirely different than a keyboard event. It’s really up to
    you.


    ## Class Fields


    The class fields listed in the following define the payload for the event and
    the handler for the event. The `MmgEvent` class is implemented in a general way
    allowing you the flexibility to use it however you want.


    ```

    private MmgEventHandler parentHandler;

    private String message;

    private int id;

    private int type;

    private MmgEventHandler targetHandler;

    private Object extra;

    private MmgEvent prevEvent;

    Listing 4-6

    MmgEvent Class Fields 1

    ```


    The `MmgEvent` class supports different associations between events and event
    handlers. The first field can be used to assign a parent event handler. You can
    ignore this or use it to create parent-child events. The next class field is the
    `message` field. This can optionally be used to add information about the event
    or event payload data if the string data type is useful. The next two class fields,
    `id` and `type`, are used to identify and respond to the event when being processed
    by the event handler. The `id` and `type` combination should be unique for a given
    event and event handler setup.


    The `targetHandler` field is the handler that receives the event when it triggers.
    The `extra` field is an event payload that can be used to store objects and data
    associated with the event. Last but not least, we have the `prevEvent` field,
    which is an instance of the `MmgEvent` class. This field can be used to store
    a reference to a previous event. You can use this feature to create chains of
    events.'
