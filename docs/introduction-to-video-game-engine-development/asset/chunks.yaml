    ## PongClone：注册游戏画面


    现在游戏的主游戏画面类已经完成，我们需要将其链接到 `GamePanel` 类中，以便玩家可以开始单人游戏或双人游戏，并且主游戏画面能够正常显示和运行。打开游戏项目中的
    `GamePanel` 类，并向该类添加以下字段：


    ```

    public ScreenGame screenGame;

    ```


    你还需要在类的构造函数中添加以下代码行：


    ```

    screenGame = new ScreenGame(GameStates.MAIN_GAME, this);

    ```


    为了将游戏画面连接到 `GamePanel` 的已知状态，我们需要在 `SwitchGameState` 方法的清理部分添加以下代码。


    ```

    01 else if (prevGameState == GameStates.MAIN_GAME_1P || prevGameState == GameStates.MAIN_GAME)

    02 {

    03     MmgHelper.wr("正在隐藏主游戏单人画面。");

    04     screenGame.Pause();

    05     screenGame.SetIsVisible(false);

    06     screenGame.UnloadResources();


    08 }

    09 else if (prevGameState == GameStates.MAIN_GAME_2P)

    10 {

    11     MmgHelper.wr("正在隐藏主游戏双人画面。");

    12     screenGame.Pause();

    13     screenGame.SetIsVisible(false);

    14     screenGame.UnloadResources();


    16 }

    代码清单 18-17

    GamePanel 画面注册 1

    ```


    我们快完成了。我们还需要添加游戏状态准备代码，负责让主游戏画面准备好显示。请注意，这段代码设计用于支持单人游戏或双人游戏状态。


    ```

    01 else if (gameState == GameStates.MAIN_GAME_1P || gameState == GameStates.MAIN_GAME)

    02 {

    03     MmgHelper.wr("正在显示主游戏单人画面。");

    04     screenGame.SetGameType(GameType.GAME_ONE_PLAYER);

    05     screenGame.LoadResources();

    06     screenGame.UnPause();

    07     screenGame.SetIsVisible(true);

    08     currentScreen = screenGame;


    10 }

    11 else if (gameState == GameStates.MAIN_GAME_2P)

    12 {

    13     MmgHelper.wr("正在显示主游戏双人画面。");

    14     screenGame.SetGameType(GameType.GAME_TWO_PLAYER);

    15     screenGame.LoadResources();

    16     screenGame.UnPause();

    17     screenGame.SetIsVisible(true);

    18     currentScreen = screenGame;


    20 }

    代码清单 18-18

    GamePanel 画面注册 2

    ```


    按照指示，将上述两个代码片段添加到 `GamePanel` 类的 `SwitchGameState` 方法中。现在，新的游戏画面类已完全集成到 `GamePanel`
    中，进而集成到游戏中。保存文件，处理所有错误，并编译你的 PongClone 游戏项目。如果遇到任何问题，请查看游戏引擎主项目中包含的“Chapter15_CompleteVersion”包中的代码。现在，让我们运行游戏！


    如果你一直使用 C# 进行开发，那么请编译项目并打开一个终端程序。导航到你的项目目录，找到本地的“PongClone.dll”文件。该文件应位于 PongClone
    项目根目录的以下文件夹中：


    ```

    ./bin/Debug/netcoreapp3.1/PongClone.dll

    ```


    导航到项目的根目录，并运行以下命令来启动你的游戏：


    ```

    dotnet ./bin/Debug/netcoreapp3.1/PongClone.dll

    ```


    如果你一直使用 Java 进行开发，那么你只需要从 IDE 运行项目即可。如果你正确实现了所有内容，那么你应该能够通过右键单击 `PongClone.java`
    类并从上下文菜单中选择“运行文件”来运行项目。你也可以选择 IDE 的“运行”菜单选项，然后选择“运行项目”上下文菜单选项。请确保上下文菜单命令中列出的项目是你的
    PongClone 项目。


    ![../images/508392_1_En_18_Chapter/508392_1_En_18_Fig1_HTML.jpg](img/508392_1_En_18_Fig1_HTML.jpg)


    图 18-1


    PongClone 游戏 1


    花点时间消化一下。恭喜你！你刚刚使用 Mmg 游戏引擎编写了你的第一个游戏！花点时间思考一下你的代码复杂度与最终游戏复杂度的对比。我必须说，对于几个类和几行代码来说，这已经相当不错了。先别走。我们接下来还要构建另一个游戏，DungeonTrap。


    # 19. 结论


    恭喜你！如果你已经读到这里，并且完成了本书的第 1、2 和 3 部分，那么你已经完成了一项了不起的成就。我想花点时间回顾一下，看看我们在本书中共同完成了什么。


    ## 成就


    我们取得的第一个主要成就是介绍并详细解释了一个相当健壮的 2D 游戏引擎 API。我们实际上是从零开始，逐一回顾每个游戏引擎类，完成了对 MmgBase API
    的审查。在这次审查中，我们见证了设计良好的超类（如果你使用 C# 进行开发，则称为基类）`MmgObj` 类的强大之处。


    我们还亲眼目睹了如何设计和构建不仅是 2D 游戏引擎 API，实际上是任何高级 API。一致的命名约定示例、全局支持的功能（如克隆和比较）以及文档完善的代码，都是任何优秀
    API 和任何优秀软件开发项目的基础。


    我们通过本书共同取得的第二个主要成就是对 MmgCore API 的详细审查。我们看到了如何将 MmgBase API 的功能与 MmgCore API 的应用层功能（如用户输入、画面管理和主绘制循环）分离开来。我们还学习了如何通过使用
    MmgTestScreens API 的示例应用程序来启动我们的游戏并演示 MmgBase API 的功能。


    最后但同样重要的是，我们应用了所学的一切，从零开始构建了两个游戏：PongClone 和 DungeonTrap。对于 PongClone，我们从空项目开始。我们引入了
    API 代码，仅用几个类文件就创建了一个可以启动和游玩的游戏。DungeonTrap 游戏构建版本可作为额外下载内容，从本书的 GitHub 仓库获取。我强烈建议你下载并完成
    DungeonTrap 游戏。


    对于 DungeonTrap 游戏，我们构建了一个复杂的类层次结构，该结构正确地封装并从超类向子类暴露了功能。我们成功地在短短几章内审查了超过 40 个类并完成了游戏。花点时间为自己庆祝一下，享受你所取得的成就。在此，我要感谢为本书某些项目提供资源的艺术家和网站。


    ## 下一步去向何方


    那么，既然你已经完成了本书，并且拥有了一些游戏引擎和 2D 游戏构建经验，你可能会想，*我接下来可以去哪里？* 显然，这个问题很大程度上取决于你自己，但我当然可以给出一些建议。


    ### 扩展 PongClone 游戏


    花点时间自定义 PongClone 游戏。你可以添加新的游戏功能，比如多球、超高速、更大的球拍，等等。你也可以修改游戏以支持不同的模式。考虑不同的获胜条件或罚球模式。这完全取决于你。


    ### 扩展 DungeonTrap 游戏


    你可以花点时间自定义你的 DungeonTrap 游戏。例如，游戏中存在炸弹和宝箱等物品，但尚未实现。同样，还有一些未使用的武器（斧头和剑），以及敌人角色使用武器的能力。所有这些都可以用来自定义和完善游戏。至少，你应该确保调整关卡、敌波次和参数，使游戏更具可玩性。


    ### 扩展游戏引擎 API


    你可以为游戏引擎项目添加新功能，无论是在 MmgBase API 层面（你可以定义更多的小部件和工具来使用），还是在 MmgCore API 层面（你可以创建专门用于横向卷轴游戏或
    2D 俯视角射击游戏的游戏画面）。潜力无限，真的。

    '
- fmt: '### Learn Cross-Platform Coding


    You can utilize this text’s included projects to learn a new programming language,
    `Java` or `C#`, or to gain experience with cross-platform API design and implementation.
    Because you have so much experience working with the game engine’s API-level code,
    you’ll be able to see the cross-platform design decisions and programming language–driven
    differences more readily. I highly recommend setting aside some time to review
    the cross-platform aspects of the included game engine projects.


    ### Build More Games and Have Fun


    Last but not least, you could simply build more games and just have fun. After
    all, what’s the point in learning about 2D game engine design and implementation
    if you can’t just have fun and build a few games.


    ## Saying Goodbye


    I sincerely hope that you enjoyed this book and that you derived some modicum
    of joy, knowledge, wisdom, and/or experience from it. Happy coding!'
