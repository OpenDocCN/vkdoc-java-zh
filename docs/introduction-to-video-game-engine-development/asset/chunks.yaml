    The `MmgContainer` class is designed to hold other objects, but it does not have
    a concept of dimension or position with regard to its children. It does extend
    the `MmgObj` class, so you can assign the container dimensions and a position
    to help add structure to the container’s use. Note, these settings don’t affect
    how the container’s contents are drawn.'
