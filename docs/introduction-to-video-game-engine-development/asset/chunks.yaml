    ## 基类：MmgBmp


    `MmgBmp` 类是我们需要回顾的最后一个基类。它扩展了 `MmgObj` 类，并且是可绘制类子集的一个成员。每次你在屏幕上看到图像时，都会用到 `MmgBmp`
    实例。`MmgBmp` 类有一些我特别想谈谈的设计细节。它有一个绘图模式特性。这个特性只应在你清楚自己在做什么时使用；否则，请使用默认模式。该特性的作用是控制
    `MmgBmp` 类如何使用 `MmgPen` 类中的绘图方法。


    基本的默认模式效率最高，并且使用的方法调用最少。完整模式效率略低于基本模式，但它支持更多的方法调用，因此支持更多的绘图功能。例如，在设置 `MmgLoadingBar`
    类实例时，你需要提供一个用于填充加载条的背景图像。该图像必须将其绘图模式设置为完整模式，以便利用一些更高级的图像渲染技术。


    最后，还有一种缓存模式。此模式利用图像资源缓存来获取对绘制在指定位置的图像的引用。`MmgBmp` 类还支持克隆、比较和字符串表示，正如我们在许多其他 API
    类中看到的那样。


    ### 静态类成员


    `MmgBmp` 类有一个静态类成员需要我们回顾。它类似于我们在 `MmgSound` 类中看到的一个类字段。你能猜到是哪个吗？猜不到？是 `ID_SRC`
    字段。`ID_SRC` 静态类字段用于为每个新的 `MmgBmp` 实例分配一个唯一的 ID。每个新的 `MmgBmp` 实例的 `id` 字段都会被设置为
    `ID_SRC` 静态类字段的值。然后 `ID_SRC` 字段会递增，以便为下一个对象实例做好准备。


    ### 枚举


    `MmgBmp` 类有一个枚举需要介绍。`MmgBmpDrawMode` 枚举用于控制在调用类的 `MmgDraw` 方法时如何绘制 `MmgBmp` 类。在大多数情况下，最简单且最高效的策略是使用
    `DRAW_BMP_BASIC` 绘图模式。


    ### 类字段


    `MmgBmp` 类的字段封装了执行不同绘图操作（如缩放和旋转）所需的值。


    ```

    private MmgVector2 origin;

    private MmgVector2 scaling;

    private MmgRect srcRect;

    private MmgRect dstRect;

    private Image b;

    清单 2-39

    MmgBmp 类字段 1

    ```


    第一组需要回顾的类字段用于保存给定 `MmgBmp` 图像的绘图信息。需要指出的是，`MmgPen` 类在绘制图像时可能不会使用这些信息。这取决于用于绘制图像对象的方法。例如，使用默认绘图模式
    `DRAW_BMP_BASIC` 会导致调用 `MmgPen` 类的 `DrawBmpBasic` 方法。


    正如你在该方法中看到的，绘制图像时只考虑了位置信息。这意味着什么？这意味着 `MmgBmp` 类的设计注重简洁和效率。通常，我们不应该频繁地执行图像变换，因此
    API 的设计预期是大多数图像绘制操作都是基本的。


    这也意味着，如果你想执行更高级的图像绘制，例如考虑旋转和缩放等变换，你需要确保使用了正确的 `MmgPen` 绘图方法。在规划游戏时，请务必考虑使用更高级技术绘制图像的复杂性。再次强调，如果可能的话，在资源加载期间一次性执行图像变换，总比在多个游戏帧中执行要好。


    关于前面列出的字段，`origin` 向量用于描述图像的旋转原点。`scaling` 向量用于描述 X 和 Y 方向的缩放值。接下来的两个类字段 `srcRect`
    和 `dstRect` 用于描述源和目标绘图矩形。


    ```

    private float rotation;

    private String idStr;

    private int id;

    public MmgBmpDrawMode DRAW_MODE = MmgBmpDrawMode.DRAW_BMP_BASIC;

    清单 2-40

    MmgBmp 类字段 2

    ```


    接下来要回顾的一组类字段以一些图像变换信息开始，即 `rotation` 角度。接下来的两个字段类似于我们在 `MmgSound` 类中看到的。`id` 和
    `idStr` 类字段是在创建类实例时分配给它的唯一标识符。这些 ID 字段是缓存系统的一部分。在你对绘图例程有足够经验之前，我不建议调整此功能。最后，`DRAW_MODE`
    字段用于调整 `MmgBmp` 类的 `MmgDraw` 方法如何与 `MmgPen` 参数交互，正如我们之前详细说明的那样。


    ### 支持方法详解


    第一组支持方法以框架图像类的 get 和 set 方法开始。


    ```

