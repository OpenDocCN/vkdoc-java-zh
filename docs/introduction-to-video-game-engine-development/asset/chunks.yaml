    public void DrawScreen() { ... }

    @Override

    public void UnloadResources() { ... }

    @Override

    public GameStates GetGameState() { ... }

    @Override

    public boolean GetIsDirty() { ... }

    @Override

    public void SetIsDirty(boolean b) { ... }

    public void MakeDirty() { ... }

    @Override

    public void MmgDraw(MmgPen p) { ... }

    @Override

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    Listing 17-1

    ScreenMainMenu Class Code 1

    ```


    The methods outlined in the preceding should be familiar to you from our review
    of the MmgCore API’s game screen classes. We’re going to be methodically building
    up this class over the next few pages. Let’s start with the class’ constructor,
    shall we? Again, I won’t be addressing the slight differences between the Java
    and C# versions.


    We’ll stick to working with the Java code in the text. If you run into trouble
    following along in either Java or C#, then please check the example project in
