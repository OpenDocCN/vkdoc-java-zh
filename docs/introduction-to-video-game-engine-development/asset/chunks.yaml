  trans: '

    ### 演示：RunFrameRate 类


    在 `RunFrameRate` 演示部分，我们将查看三段代码片段。第一段代码来自 MmgCore API 的 `MmgApiGame` 类，位于 `main`
    方法的末尾。


    ```

    1 fr = new RunFrameRate(mf, FPS);

    代码清单 14-7

    RunFrameRate 类演示 1

    ```


    在上述代码行中，我们看到了 `RunFrameRate` 类的初始化过程。它接受一个 `MainFrame` 对象和一个帧率作为参数。上面显示的 `FPS`
    变量是一个类字段，可以通过命令行参数和游戏引擎配置文件进行调整。


    ```

    1 t = new Thread(fr);

    2 t.start();

    代码清单 14-8

    RunFrameRate 类演示 2

    ```


    在下一个代码片段中，同样来自 `MmgApiGame` 类的 `main` 方法，帧率线程被启动。这会启动游戏引擎的绘制例程，并调用 `RunFrameRate`
    类的 `run` 方法。


    ```

    01 while (RunFrameRate.RUNNING == true) {

    02     frameStart = System.currentTimeMillis();


    04     if (RunFrameRate.PAUSE == false) {

    05         mf.Redraw();

    06     }


    08     frameStop = System.currentTimeMillis();

    09     frameTime = (frameStop - frameStart) + 1;

    10     aFps = (1000 / frameTime);


    12     frameTimeDiff = tFrameTime - frameTime;

    13     if (frameTimeDiff > 0) {

    14         try {

    15             Thread.sleep((int) frameTimeDiff);

    16         } catch (Exception e) {

    17             MmgHelper.wrErr(e);

    18         }

    19     }


    21     frameStop = System.currentTimeMillis();

    22     frameTime = (frameStop - frameStart) + 1;

    23     rFps = (1000 / frameTime);

    24     mf.SetFrameRate(aFps, rFps);

    25 }

    代码清单 14-9

    RunFrameRate 类演示 3

    ```


    请注意，在上面的第一行中，类的**主执行循环**仅在 `RUNNING` 字段设置为 `true` 时才会执行。`RunFrameRate` 类是通过使用
    Java 框架的 `Thread` 类启动的，如上一个代码片段所示。这会导致 `RunFrameRate` 类的 `run` 方法在一个新线程中执行。在第
    2 行，`frameStart` 字段被更新为当前时间。该值将用于确定处理这一帧所需的时间。


    第 4–6 行的 `if` 语句检查 `RunFrameRate` 类是否处于暂停状态。如果类被暂停，则此帧不执行任何工作，主循环照常继续。`frameStop`
    的值在第 8 行更新，处理该帧的总时间在第 9 行计算。你认为我们为什么要更新计算时间并增加一毫秒？思考一下“计算帧时间”这个说法。一个突出的问题是，我们最终可能会得到零毫秒的帧时间。


    这会导致第 10 行出现除零异常，我们绝对不能允许这种情况发生。通过给 `frameTime` 增加一毫秒，我们实际上将计时下限设为一而不是零。随后在第 10
    行，计算了实际帧率字段 `aFps` 的值。如你所见，该值仅反映了绘制当前帧所花费的时间。


    第 12–19 行的代码块让当前线程休眠，以消耗此游戏帧的额外时间。例如，如果我们希望游戏以 30 FPS 运行，那么我们有 33 毫秒来绘制当前帧，包括运行更新调用。如果完成所有这些工作只需要
    20 毫秒，那么我们必须让线程休眠 13 毫秒。这就是这段代码的作用。第 21–23 行的代码更新了 `frameStop` 字段，并计算了一个新的运行时
    FPS。这次测量是在帧创建之后、线程休眠几毫秒之后进行的。


    这意味着这个计算结果是**实际帧率**，也就是玩家体验到的帧率。最后，在第 24 行，调用 `SetFrameRate` 用最新的帧率统计数据更新调试标题。


    ## 游戏屏幕：ScreenSplash


    `ScreenSplash` 类是 `MmgSplashScreen` 类的具体实现。我所说的具体实现是指，通用类 `MmgSplashScreen` 的通用功能被扩展，以接入运行时代码——具体来说是
    `GamePanel` 类。让我们看看它是如何实现的！


    ### 静态类成员


    只有一个静态类成员需要查看，如下代码行所示。


    ```

    public static int EVENT_DISPLAY_COMPLETE = 0;

    代码清单 14-10

    ScreenSplash 静态类成员 1

    ```


    这个静态字段用作事件 ID，标记一个事件对象，表示启动画面的显示时间已到。


    ### 类字段


    `ScreenSplash` 类有四个字段供我们查看。


    ```

    public GameStates state;

    public GenericEventHandler handler;

    public GamePanel owner;

    public Hashtable classConfig;

    代码清单 14-11

    ScreenSplash 类字段 1

    ```


    第一个字段 `state` 用于表示此游戏屏幕关联的游戏状态。`handler` 字段接收此类生成的任何通用事件。随后，`owner` 字段表示此游戏屏幕所属的
    `GamePanel` 对象。最后，`classConfig` 数据结构用于保存驱动运行时屏幕自定义的配置文件数据。


    ### 支持方法详情


    下面列出的类支持方法提供了对相关类字段的访问。


    ```

    public GameStates GetGameState() { ... }

    public GenericEventHandler GetGenericEventHandler() { ... }

    public void SetGenericEventHandler(GenericEventHandler Handler) { ... }

    代码清单 14-12

    ScreenSplash 支持方法详情 1

    ```


    我按照相应类字段的顺序列出了支持方法。这些方法很直接，因此我不会在此详细讨论。第一个条目提供了对 `gameState` 字段的访问，而接下来的两个是 `handler`
    字段的 get 和 set 方法。让我们继续查看类的主要方法。


    ### 主要方法详情


    类的主要方法处理 `MmgSplashScreen` 事件、绘制屏幕以及加载或卸载屏幕资源。


    ```

    public ScreenSplash(GameStates State, GamePanel Owner) { ... }

    public void MmgDraw(MmgPen p) { ... }

    public void MmgHandleUpdate(Object obj) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    代码清单 14-13

    ScreenSplash 主要方法详情 1

    ```


    第一个条目，正如我们所料，是一个类构造函数。构造函数接受一个游戏状态和一个游戏面板作为参数。`MmgDraw` 方法是我们之前在本书第一部分 MmgBase
    API 回顾中见过的。在我们回顾 MmgCore API 的过程中，这个方法出现得不多。原因是只有 MmgCore 游戏屏幕会接入 `GamePanel`
    类进行显示。因此，这些是我们会遇到 `MmgUpdate` 和 `MmgDraw` 方法的唯一 API 类。


    接下来的方法 `MmgHandleUpdate` 用于响应 `MmgSplashScreen` 的内部计时器，该计时器控制屏幕的显示时长。最后两个方法用于加载和卸载此游戏屏幕使用的所有资源。

