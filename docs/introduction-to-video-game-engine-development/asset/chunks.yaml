- fmt: '# Base Classes: MmgBmp


    The `MmgBmp` class is the last base class we have to review. It extends the `MmgObj`
    class and is a member of the subset of drawable classes. Every time you see an
    image on the screen, an `MmgBmp` instance is being used. The `MmgBmp` class has
    some particular design details I’d like to talk about. The `MmgBmp` class has
    a drawing mode feature. This should only be used if you know what you’re doing;
    if not, use the default mode. What this feature does is it controls how the `MmgBmp`
    class uses drawing methods from the `MmgPen` class.


    The basic, default mode is the most efficient and uses the fewest method calls.
    The full mode is slightly less efficient than the basic mode, but it supports
    more method calls, so more drawing features are supported. For instance, when
    setting up an `MmgLoadingBar` class instance, you need to provide a background
    image that will be used to fill the loading bar. This image must have its draw
    mode set to full so that it can take advantage of some more advanced image rendering
    techniques.


    Lastly, there is a cached mode. This mode utilizes the image resource cache to
    pull a reference to the image that is drawn at the specified position. The `MmgBmp`
    class also supports cloning, comparison, and string representation as we’ve seen
    in many other API classes.


    ## Static Class Members


    The `MmgBmp` class has one static class member for us to review. It’s similar
    to a class field we saw in the `MmgSound` class. Can you guess which one? Give
    up? The `ID_SRC` field. The `ID_SRC` static class field is used to give each new
    `MmgBmp` instance a unique ID. Each new `MmgBmp` instance gets its `id` field
    set to the value of the `ID_SRC` static class field. Then the `ID_SRC` field is
    incremented so it’s ready for the next object instance.


    ## Enumerations


    The `MmgBmp` class has one enumeration to cover. The `MmgBmpDrawMode` enumeration
    is used to control how the `MmgBmp` class is drawn when the class’ `MmgDraw` method
    is called. The simplest and most efficient strategy in most cases is to use the
    `DRAW_BMP_BASIC` drawing mode.


    ## Class Fields


    The `MmgBmp` class fields wrap the values necessary to perform different drawing
    operations like scaling and rotation.


    ```

    private MmgVector2 origin;

    private MmgVector2 scaling;

    private MmgRect srcRect;

    private MmgRect dstRect;

    private Image b;

    Listing 2-39

    MmgBmp Class Fields 1

    ```


    The first set of class fields to review are used to hold drawing information for
    the given `MmgBmp` image. It’s important to mention that this information might
    not be used by the `MmgPen` class when drawing the image. It depends on what method
    is used to draw the image object. For instance, using the default drawing mode,
    `DRAW_BMP_BASIC`, results in a call to the `MmgPen` class’ `DrawBmpBasic` method.


    As you can see in the method, only the position information is taken into consideration
    when drawing the image. What does this mean? This means that the `MmgBmp` class
    is set up for simplicity and efficiency. In general, we shouldn’t really be performing
    image transformations that often, so the API is set up expecting most image drawing
    operations to be basic.


    This also means if you want to do more advanced image drawing that takes into
    account transformations like rotation and scaling, you’ll need to make sure that
    the correct `MmgPen` drawing method is used. Be sure to take the complexity of
    drawing images using more advanced techniques into consideration when planning
    your game. Again, it’s always better to perform image transformations during resource
    loading once, rather than over multiple game frames, if possible.


    With regard to the fields listed in the preceding, the `origin` vector is used
    to describe the image’s rotation origin. The `scaling` vector is used to describe
    scaling values in the X and Y directions. The next two class fields, `srcRect`
    and `dstRect`, are used to describe a source and destination drawing rectangle.


    ```

    private float rotation;

    private String idStr;

    private int id;

    public MmgBmpDrawMode DRAW_MODE = MmgBmpDrawMode.DRAW_BMP_BASIC;

    Listing 2-40

    MmgBmp Class Fields 2

    ```


    The next set of class fields for us to review starts off with some image transformation
    information, the `rotation` angle. The next two fields are like those we’ve seen
    in the `MmgSound` class. The `id` and `idStr` class fields are unique identifiers
    assigned to the class instance when it’s created. The ID fields are part of the
    caching system. I wouldn’t recommend adjusting this functionality until you have
    enough experience working with the drawing routine. Lastly, the `DRAW_MODE` field
    is used to adjust how the `MmgBmp` class’ `MmgDraw` method interacts with the
    `MmgPen` argument as we’ve detailed earlier.


    ## Support Method Details


    The first set of support methods begins with get and set methods for the framework’s
    image class.


    ```

    public Image GetTexture2D() { ... }

    public void SetTexture2D(Image d) { ... }

    public Image GetImage() { ... }

    public void SetImage(Image d) { ... }

    Listing 2-41

    MmgBmp Support Method Details 1

    ```


    There is a bit of legacy code in here from the original XNA implementation of
    this class. You’ll notice that there are two ways to interface with the `image`
    class field. The `GetTexture2D` and `SetTexture2D` pair of methods refers to the
    C#/MonoGame framework class `Texture2D`, while the `GetImage` and `SetImage` methods
    refer to the Java/Swing framework class `Image`. Either pair of methods will update
    the class’ image field.


    ```

    public MmgRect GetSrcRect() { ... }

    public void SetSrcRect(MmgRect r) { ... }

    public MmgRect GetDstRect() { ... }

    public void SetDstRect(MmgRect r) { ... }

    public float GetRotation() { ... }

    public void SetRotation(float r) { ... }

    Listing 2-42

    MmgBmp Support Method Details 2

    ```


    The second set of support methods we have to review are also get and set methods
    for key class fields. They are direct and simple. Read them over and make sure
    you understand them.


    ```

    public MmgVector2 GetOrigin() { ... }

    public void SetOrigin(MmgVector2 v) { ... }

    public MmgVector2 GetScaling() { ... }

    public void SetScaling(MmgVector2 v) { ... }

    public int GetHeight() { ... }

    public int GetWidth() { ... }

    Listing 2-43

    MmgBmp Support Method Details 3

    ```


    The third and final set of support methods, listed in the preceding, allow access
    to the origin and scaling vectors. Because rotation can be performed around different
    points, changing the resulting transformation, you have to specify what coordinates
    you want to use as the center of rotation. The `scaling` field is an `MmgVector2`
    instance that holds floating-point values describing how much to scale an image
    in the X and Y directions.


    Because the `MmgBmp` class has support for on-the-fly transformations, the class
    supports handling scaled image dimensions. Things can get a little complicated
    when working with images that are transformed as part of the drawing routine.
    I highly recommend preparing the image, applying transformations, and then saving
    a copy of the resulting image for future use.'
