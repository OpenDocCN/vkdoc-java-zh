    \ First player to score seven points.\n\n*   Lose Condition: Opponent scores seven\
    \ points before you can.\n\n*   Game Screens:\n    *   Splash screen\n\n    *\
    \   Loading screen\n\n    *   Main menu screen\n\n    *   Game screen\n\n*   Game\
    \ Screen Details:\n    *   Splash Screen: A splash screen with a logo that displays\
    \ for a few seconds.\n\n    *   Loading Screen: A loading screen with a logo and\
    \ a loading bar.\n\n    *   Main Menu Screen: A menu screen with title, subtitle,\
    \ one player, two players, exit game menu options, and a version number feature.\n\
    \n    *   Game Screen: A game screen with an instructions sub-screen that has\
    \ a countdown feature. The game should also support a game exit sub-screen, a\
    \ game over screen, player scores, and an AI opponent when in one-player mode.\n\
    \n*   Game Input Details:\n    *   Player One Input: Up and down keyboard arrow\
    \ keys\n\n    *   Player Two Input: Keyboard keys, mouse input\n\nThat concludes\
    \ our outline for the PongClone game. Look over the details of the specification\
    \ list and think about what game engine features can be used to address the different\
    \ game requirements.\n\n## DungeonTrap Game Outline\n\nThe second game we’ll build\
    \ in this part of the text is DungeonTrap . This game is a bit more complex than\
    \ the PongClone game you’ll start with. Even so, the game specification should\
    \ not be overly detailed. The chapters for this game build are independent and\
    \ available as a download from the book’s GitHub repository.\n\nFor instance,\
    \ I’ll mention the game’s requirement for random item drops, but I won’t specifically\
    \ list what they are even though I have a good idea of what I want to implement.\
    \ My reasoning here is that the item drops will function almost identically, so\
    \ I don’t really need to specify a concrete list of items at this point in time.\
    \ This is a fine line you’ll learn how to walk as you get more experience building\
    \ games."
  trans: "\n## 章节总结\n\n在本章中，我们了解了 MmgCore API 的屏幕类。虽然这些类基于 MmgBase API 中的类，但它们已扩展以支持\
    \ MmgBase API 所不具备的功能。例如，我们介绍的每个游戏屏幕都有一些共同点。其中之一是 `gameState` 和 `owner` 类字段。这些字段是屏幕接入\
    \ MmgCore API 的 `GamePanel` 类所必需的。\n\n我们还花了一点时间回顾了 `RunFrameRate` 类，该类负责驱动游戏引擎的绘制例程，进而控制\
    \ Java 版本游戏引擎的帧率。\n\n*   RunFrameRate：一个 MmgCore API 类，负责运行游戏引擎的绘制例程。该类负责强制执行\
    \ Java 版本游戏引擎的帧率。\n\n*   ScreenSplash：MmgSplashScreen 类的一个 MmgCore API 实现，它了解\
    \ GameStates 和 GamePanel 类，并且可以接入 GamePanel 类的屏幕管理系统。\n\n*   ScreenLoading：MmgLoadingScreen\
    \ 类的一个 MmgCore API 实现，它了解 GameStates 和 GamePanel 类，并且可以接入 GamePanel 类的屏幕管理系统。\n\
    \n*   ScreenMainMenu：MmgGameScreen 类的一个 MmgCore API 实现，它了解 GameStates 和 GamePanel\
    \ 类，并且可以接入 GamePanel 类的屏幕管理。\n\n*   Screen：MmgCore API 的 Screen 类与其他游戏屏幕类类似，但略有不同，因为它被设计用作主游戏屏幕。\n\
    \n如果你觉得对 MmgCore 的游戏屏幕类掌握得还不够好，请不要气馁。首先，整个游戏引擎项目中有大量的示例。我建议花些时间查看其中的一些示例。请记住，超类（如果你使用\
    \ C# 则是基类）提供的功能可能并不显而易见。\n\n确保你花点时间追踪用于驱动游戏屏幕的类。了解超类（C# 中的基类）的功能以及它将如何与你扩展的类进行交互。在处理重写方法或依赖于超类功能的方法时，请牢记这一点。\n\
    \n# 第 3 部分\n\n# 15. 游戏构建简介\n\n欢迎阅读本书的第 3 部分。如果你已经读到这里，那么你已经是游戏引擎复杂细节方面的专家了，是时候将这些知识付诸实践了。在本部分中，我们将从头开始构建两个游戏。这将是一段激动人心的旅程。我们将从游戏大纲完全从零开始，然后分阶段添加功能，直到完成最终产品。\n\
    \n我们将创建的第一个游戏叫做 PongClone，顾名思义，它是经典视频游戏 Pong 的克隆版。PongClone 游戏的构建将让你初步体验游戏开发。你将亲身了解启动并运行一个游戏项目是多么快速和容易。借助\
    \ MmgBase 和 MmgCore API 的强大功能，你只需几个类就能创建一个功能丰富的游戏。\n\n通过这个项目，你将获得宝贵的经验，包括设置游戏项目、处理用户输入、动画图形、处理单人及双人游戏等等。对于第二个游戏构建，我们将创建一个稍微复杂一些的游戏，DungeonTrap。在\
    \ DungeonTrap 中，你控制一个被困在魔法地牢中的角色，抵御一波又一波的敌人。\n\n我希望这些项目能引起你的兴趣。这里的主要目标是获得仅使用 IDE\
    \ 和本书第 1 和第 2 部分中介绍的游戏引擎来构建游戏的经验。在这些游戏构建过程中，我不会专注于游戏引擎特定的主题，并且我会尽量避开本书前几部分中使用的较为刻板的类回顾格式。\n\
    \n我们将明确地专注于游戏本身。如果你发现某段代码不熟悉，请花点时间阅读关于该类的资料以及项目附带的示例代码。我们将在以下章节中概述这两个游戏项目的细节。我们将从\
    \ PongClone 游戏开始。\n\n## PongClone 游戏大纲\n\n如果我们打算坐在电脑前编写一个游戏，我们最好对要做什么有个概念。最好的方法是将游戏的功能列在一个清单中。这为你的游戏开发提供了一个起点。简单的游戏可能只需要几个要点，你就可以开始编写代码了。\n\
    \n更复杂的游戏则需要大量的规划，你才能安心地开始开发。我希望有一个经验法则可以传授给你，以便你更好地判断对于一个给定的游戏，多少规划是足够的。简单的事实是，你需要在拥有一些游戏开发经验后，随着时间的推移，自己培养这种直觉。话不多说，让我们来看看第一个游戏的大纲。\n\
    \n### PongClone 通用游戏规格\n\n*   通用描述：PongClone 游戏由两名玩家组成，每人一个球拍，分别位于屏幕的左边缘或右边缘。玩家们竞争，让游戏球越过对手的球拍从而得分。第一个得到七分的玩家获胜。\n\
    \n*   玩家数量：游戏应支持一名或两名玩家。\n\n*   获胜条件：第一个得到七分的玩家。\n\n*   失败条件：对手在你之前得到七分。\n\n*\
    \   游戏屏幕：\n    *   启动画面\n\n    *   加载画面\n\n    *   主菜单画面\n\n    *   游戏画面\n\n*\
    \   游戏画面详情：\n    *   启动画面：一个带有 Logo 的启动画面，显示几秒钟。\n\n    *   加载画面：一个带有 Logo 和加载条的加载画面。\n\
    \n    *   主菜单画面：一个菜单画面，包含标题、副标题、单人游戏、双人游戏、退出游戏菜单选项以及一个版本号功能。\n\n    *   游戏画面：一个游戏画面，带有一个具有倒计时功能的说明子画面。游戏还应支持退出游戏子画面、游戏结束画面、玩家得分，以及在单人模式下支持\
    \ AI 对手。\n\n*   游戏输入详情：\n    *   玩家一输入：键盘上下箭头键\n\n    *   玩家二输入：键盘按键、鼠标输入\n\n\
    以上就是我们对 PongClone 游戏的大纲。仔细查看规格列表的细节，并思考可以使用哪些游戏引擎功能来满足不同的游戏需求。\n\n## DungeonTrap\
    \ 游戏大纲\n\n我们在本书这一部分要构建的第二个游戏是 DungeonTrap。这个游戏比你要开始的 PongClone 游戏稍微复杂一些。即便如此，游戏规格也不应过于详细。这个游戏构建的章节是独立的，可以从本书的\
    \ GitHub 仓库下载。\n\n例如，我会提到游戏需要随机掉落物品，但我不会具体列出它们是什么，尽管我对要实现什么有很好的想法。我这样做的理由是，物品掉落的功能几乎完全相同，所以目前我真的不需要指定一个具体的物品列表。随着你积累更多构建游戏的经验，你将学会如何把握这条微妙的界限。\n"
- fmt: "### DungeonTrap General Game Specifications\n\n- **General Description**:\
    \ The `DungeonTrap` game consists of one or two players trapped in a dungeon vault\
    \ where waves of enemies enter the room in stages. Players collect points as they\
    \ fight off the enemy hordes using weapons, items, and objects. As the enemies\
    \ are defeated, random items are dropped for the players to pick up. Defeat all\
    \ the enemy waves to escape the `DungeonTrap`!\n\n- **Number of Players**: The\
    \ game should support one or two players.\n\n- **Win Condition**: Survive ten\
    \ waves of enemies.\n\n- **Lose Condition**: Take lethal damage from enemies.\n\
    \n- **Game Screens**:\n    - Splash screen\n    - Loading screen\n    - Main menu\
    \ screen\n    - Game screen\n\n- **Game Screen Details**:\n    - **Splash Screen**:\
    \ A splash screen with a logo that displays for a few seconds.\n    - **Loading\
    \ Screen**: A loading screen with a logo and a loading bar.\n    - **Main Menu\
    \ Screen**: A menu screen with title, subtitle, one player, two players, exit\
    \ game menu options, and a version number feature.\n    - **Game Screen**: A game\
    \ screen with an instructions sub-screen that has a countdown feature. The game\
    \ should also support a game exit sub-screen, a game over screen, player stats\
    \ HUD, and AI opponents.\n\n- **Game Input Details**:\n    - **Player One Input**:\
    \ Up, down, left, and right keyboard arrow keys and `A` and `B` keys for input.\n\
    \    - **Player Two Input**: Four keyboard keys mimicking arrow keys and `A`/`B`\
    \ input.\n\nNotice that the outline isn’t too much longer than that of the previous\
    \ game even though the game is most certainly more complex. I think this is an\
    \ indication of a good game outline. We don’t try to solve any implementation\
    \ problems or specify any in-depth details – just high-level ideas. One last thought:\
    \ Don’t be afraid to stray from your initial plans. Building games is challenging,\
    \ and with any sufficiently challenging experience, you will ultimately have to\
    \ adapt to overcome the challenge.\n\n## Game Resources\n\nWhen it comes to game\
    \ resources, I have you covered. I’ll provide a base set of resources including\
    \ sounds, images, and class config files. The main focus of this text is to build\
    \ games in code, using only an IDE and a game engine. As such, I won’t require\
    \ you to edit or create resources for the games we create here. That being said,\
    \ images and sounds are integral aspects of most games.\n\nStart thinking about\
    \ different ways you can access resources for your game. You can search online\
    \ for sites that have game resources, create your own, or work with friends. Don’t\
    \ be discouraged if you’re not an artist. There’re a lot of options out there\
    \ for you. Trust me.\n\nI’d also like to mention that there are example game projects\
    \ for each chapter in this part of the book. You can open up and view the complete\
    \ implementation of the game for your specific chapter. The chapter projects are\
    \ included with the game engine’s main project. This can help you resolve bugs\
    \ in your code, so be sure to keep it in mind. And with that, we’ve reached the\
    \ conclusion of this intro. Happy coding!\n\n# 16. PongClone Project Setup\n\n\
    Before I begin the chapter I want to list some general project notes to help make\
    \ sure you have things setup correctly and can address the most common issues\
    \ quickly. The notes are as follows:\n\n**Java**:\n1. The game project should\
    \ be configured with a working directory set to `'./dist'` in the project’s `'Run'`\
    \ settings.\n\n**Java and C#**:\n1. The `ENGINE_CONFIG_FILE` field of the static\
    \ main class should point to the game project’s config file in the `'cfg'` directory\
    \ with a relative path from the project’s working directory.\n2. The game engine\
    \ config file should have a `NAME` entry with a value that is the same as its\
    \ associated project and that project’s resource folder.\n3. To turn off the gamepad\
    \ 1 input add this line to your game engine config file:\n\nIn this chapter, I\
    \ will walk you through setting up a new game development project in Java or C#.\
    \ You can use this chapter as a reference for both versions of the game engine.\
    \ We’ll also prepare the game’s resources including images, sounds, and class\
    \ config files used by the game screens for data-driven customization.\n\nWe’re\
    \ going to approach the project in steps. This chapter represents our first step.\
    \ Because we want something functional at the end of a development step, I’ve\
    \ designed the development process so that you’ll have a program that will compile\
    \ and run at the end of each chapter. I should mention that this might not be\
    \ the case in the real world.\n\nThere will be times where you’re working hard\
    \ to implement a feature and you’ll have a project that might not compile or work\
    \ properly. This is perfectly normal. Don’t think video game development is always\
    \ as cut and dried as the game builds we’re working on here. I want to take a\
    \ moment to mention two caveats with regard to following along on OSX-based computers.\
    \ The first thing is that you may encounter a security exception in the NetBeans\
    \ IDE when trying to load and run the game project.\n\nThe error message I get\
    \ says something about the file `\"libjnidispatch-440.jnilib\"` causing a `\"\
    cannot be opened because the developer cannot be verified\"` error. Open your\
    \ Mac’s system preferences and go to the security section. You’ll notice an application\
    \ security exception entry pops up when the error is encountered in the IDE. Accept\
    \ the security exception both for the IDE and when you run the game for testing.\
    \ The messages will stop appearing after that adjustment.\n\nThe second issue\
    \ you might run into has to do with the OSX keyboard key context menu. This menu\
    \ pops up when you hold a key down for a few seconds. It allows you to choose\
    \ different versions of a key with different language accent marks. Look up online\
    \ how to turn this feature on and off for your version of OSX. Make sure to turn\
    \ it **off** before testing your game, or you may lock one of the keyboard keys\
    \ inadvertently when the context menu is triggered, but doesn’t actually display,\
    \ during game play."
