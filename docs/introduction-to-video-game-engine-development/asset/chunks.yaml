    The first snippet of code on lines 1–23 of the `LoadResources` method shows us
    how to configure a simple `MmgSprite` object and draw it to the screen. On lines
    1–3, an animation frame is loaded from the key, “soldier_frame_1.png”. You can
    tell that this is a cached image resource because it’s being loaded by key only.
    Most likely, this image was auto loaded from the test application’s project resource
    folder.


    The image is scaled up a bit on line 2, and its position is centered, line 3\.
    The same steps are performed for two more animation frames so that we have a total
    of three frames loaded. On line 13, an array of `MmgBmp` objects is instantiated
    to hold the frames we just loaded. Now the nature of the animation is such that
    we don’t want to go from frame 3 to frame 1; we want to return to frame 2 first.
    As such, we create an array of length 4 and store the frames in the correct order.
    On lines 25 and 26, we prepare the position of the `MmgSprite` object.


    Look carefully at the positioning code. Notice that we clone the position used
    by `frame1` and adjust it down slightly – about 15 pixels. A new `MmgSprite` object
    is created on line 27 using the `MmgBmp` array, frames, and position. Note that
    the frames have a different position than the sprite object. Recall the animation
    frames are drawn at the position of the sprite.


    On line 28, the frame time is set to a large number, 200 ms, so that it can be
    easily observed. Because the `MmgSprite` class extends the `MmgObj` class, it
    can be added to the game screen’s set of drawable objects with a call to `AddObj`.
    The next section of code to review in this demonstration snippet is the `MmgUpdate`
    method. Notice that on lines 6 and 7 the update methods of the sprite object are
    called if the game screen is visible and is not paused. This example code shows
    us how to update other objects in the update method and how to make more complex
    classes update themselves. Lastly, the `MmgDraw` method shows us that the sprite
    object is drawn via the default drawing routine just like any other `MmgObj` on
    the screen.


    ## Advanced Classes: MmgDrawableBmpSet


    The `MmgDrawableBmpSet` class is used to create a set of framework and MmgBase
    API classes that are preconfigured to work together. The classes are set up such
    that the `MmgPen` object draws on the `MmgBmp` object. The framework classes that
    support this functionality are included as part of the `MmgDrawableBmpSet` object’s
    fields.


    For the most part, the C# implementation of the game engine is very similar to
    the Java implementation. The API is identical, but the implementation differs
    naturally due to the differing frameworks they’re based on.


    ### Class Fields


    In the following, I’ve listed the Java and C# versions of the `MmgDrawableBmpSet`
    class. You can use these classes as a reminder of how the framework classes align.
    A Java `BufferedImage` roughly equates to C#’s `RenderTarget2D`. Similarly, the
    Java `Graphics2D` class is roughly equivalent to C#’s `SpriteBatch` class.


    ```

    public RenderTarget2D buffImg;

    public SpriteBatch graphics;

    public MmgPen p;

    public MmgBmp img;

