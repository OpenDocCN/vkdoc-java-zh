  trans: '

    ### 演示：MmgSound 类


    在本节中，我们将通过查看 MmgTestSpace 包（在 C# 中为命名空间）中 `ScreenTestMmgSound` 类的特定方法，来演示 `MmgSound`
    类的使用。此演示使用了输入事件，因此我在这里也会介绍一些输入处理的基础知识。此外，还会涉及一些声音播放，所以我们也会简单介绍一下资源加载。


    ```

    01 sound1 = MmgHelper.GetBasicCachedSound("jump1.wav");

    02 sound2 = MmgHelper.GetBasicCachedSound("jump2.wav");


    04 soundLabel1 = MmgFontData.CreateDefaultBoldMmgFontLg();

    05 soundLabel1.SetText("MmgSound 示例");

    06 MmgHelper.CenterHorAndVert(soundLabel1);

    07 soundLabel1.SetY(soundLabel1.GetY() - MmgHelper.ScaleValue(20));

    08 AddObj(soundLabel1);


    10 soundLabel2 = MmgFontData.CreateDefaultBoldMmgFontLg();

    11 soundLabel2.SetText("按回车键或空格键播放声音");

    12 MmgHelper.CenterHorAndVert(soundLabel2);

    13 soundLabel2.SetY(soundLabel2.GetY() + MmgHelper.ScaleValue(20));

    14 AddObj(soundLabel2);

    清单 2-26

    MmgSound 类演示 1

    ```


    `LoadResuorces` 方法与我们之前看到的版本非常相似。在第 1 行和第 2 行，我们有一些资源准备代码，用于设置 `sound1` 和 `sound2`
    类字段。请注意，这些字段是使用 `MmgHelper` 类的静态方法 `GetBasicCachedSound` 设置的。使用该 API 有几种方式可以将资源加载到游戏中。在大多数情况下，资源加载是由游戏实现的
    MmgCore 库执行的高级操作。


    然而，根据 MmgBase API 的结构，图像和声音可以根据游戏运行的位置以及代码和设置中游戏的名称自动加载。在本例中，`MmgTestScreens`
    应用程序是从 MmgTestSpace 包中运行的。就 C# 实现而言，MmgGameApiCs 项目在 MmgTestSpace 命名空间中有一个类似的
    `MmgTestScreens` 类。Java 项目具有以下目录结构：


    ```

    MmgGameApiJava

    |-> src (源代码目录)

    |-> dist (可执行文件目录)

    |-> cfg (资源和配置目录)

    |-> playable

    |-> MmgTestSpace

    |-> jump2.wav

    |-> auto_load

    |-> jump1.wav

    清单 2-27

    MmgGameApiJava 项目目录结构

    ```


    当游戏启动时，来自 MmgCore API（本质上是游戏引擎运行时）的代码会检查项目目录中是否存在某些默认文件夹。由于该项目的 Java 版本是在 NetBeans
    IDE 中开发的，我们将 IDE 项目配置为编译到 `dist` 文件夹。如果在与 `dist` 文件夹相同的目录中存在名为 `cfg` 的目录，则该目录会被视为配置目录，并会扫描其中的子文件夹和文件。


    其中一个特殊的子文件夹是项目 `cfg` 目录中的 `playable` 文件夹。请注意其中的 `MmgTestSpace` 和 `auto_load` 子文件夹。如果找到一个与游戏
    `GameSettings` 类中的静态字段 `NAME` 同名的子文件夹，则会扫描该文件夹中的音频文件。任何找到的音频文件都会按文件名加载到游戏引擎的音频资源缓存中。


    为了演示播放声音，我们利用了由 `GamePanel` 类为当前游戏屏幕调用的输入处理方法。这将在 MmgCore API 审查期间更详细地介绍。当按下键盘按键时，会触发
    `ProcessKeyClick` 方法。该方法会接收到一个字符和一个表示键盘按键的整数值。在本例中，按下回车键或空格键会播放声音。我们可以使用字符表示来检查是回车键“\n”还是空格键“
    ”。当按下回车键时，播放 `sound1`；当按下空格键时，播放 `sound2`。


    ## 基类：MmgPen


    `MmgPen` 类封装了框架的绘图类。在 Java/Swing 实现中，`MmgPen` 类封装了 `Graphics` 类。在 C#/MonoGame
    实现中，`MmgPen` 类封装了 `SpriteBatch` 类。`MmgPen` 类为 MmgBase API 提供绘图支持，并允许将图像、文本和矩形绘制到屏幕上。


    `MmgPen` 类被设计为灵活的，允许用户调用最适合特定情况的绘图方法。你会注意到，这个类没有提供我们见过的其他类所具有的克隆和比较功能。你认为这是为什么？这与
    `MmgPen` 类的使用方式有关。它总是以数据驱动的方式使用，绘制指定的对象。因此，它几乎没有内部状态，也没有需要克隆的内容。因此，该类没有克隆方法。


    ### 静态类成员


    我们要审查的第一个类字段 `FONT_NORMALIZE_POSITION` 是一个特殊标志，启用后会改变字体的渲染方式。如果该字段设置为 true，那么
    `MmgPen` 类将对其位置的 X 和 Y 坐标调用 `NormalizeFontPosition` 方法。这允许开发者根据字体的类型和大小来调整字体的渲染位置。当你试图在不同平台的不同字体之间规范化字体的定位方式时，这会非常有用。


    下一个条目 `ADV_RENDER_HINTS` 是一个布尔标志，在 Java 版本的游戏引擎中启用时，会强制游戏引擎配置多个渲染设置。C# 实现具有相同的功能，但无需运行任何代码。它开箱即用，适合游戏开发。这些提示提供了一些关于如何处理某些
    2D 渲染事件（如缩放和旋转 2D 图像）的指示。剩下的静态字段 `TRANSPARENT` 是一种访问透明颜色值的便捷方式。这在某些游戏和某些绘图场景中会很有用。


    ```

    public static Image CreateColorTile(int w, int h, MmgColor c) { ... }

    public static Image RotateImageStatic(int width, int height, Image img, int angle,
    int originX, int originY) { ... }

    public static Image ScaleImageStatic(Image img, MmgVector2 scale) { ... }

    public static Image ScaleImageStatic(Image img, double scaleX, double scaleY)
    { ... }

    清单 2-28

    MmgPen 静态类成员 3

    ```


    `CreateColorTile` 静态方法使用框架类创建一个具有指定尺寸的图像，即一个彩色方块。


    `RotateImageStatic` 方法是一个静态方法，它按指定的角度（以度为单位）旋转图像。该方法仍然需要配置正确的图像尺寸和旋转原点。请注意，如果
    `originX` 或 `originY` 设置为 –1，该方法会将旋转原点计算为图像的中心。在应用旋转变换的同时，原始图像的副本会被绘制到新的缓冲图像上。


    第一个 `ScaleImageStatic` 方法有一个便捷的重载，它接受一个 `MmgVector2` 参数来定义水平和垂直缩放。第二个 `ScaleImageStatic`
    方法接受三个参数：一个图像以及每个坐标（X 和 Y）的缩放值。新图像的尺寸基于作为参数传入的缩放值。

    '
- fmt: '### Class Fields


    `MmgPen`类有几个重要的类字段需要我们介绍。让我们看一些代码！


    ```java

    private Graphics pen;

    private Color color;

    private boolean cacheOn;

    ```


    第一个字段是`Graphics`类的一个实例。`Graphics`对象`pen`是`MmgPen`类所包装的框架类。下一个字段`color`是用于表示颜色的框架类。请注意如何使用这个类字段；它可能不反映画笔当前使用的颜色。在回顾`MmgPen`类的方法时，我会更详细地介绍这一点。


    这组中的最后一个类字段有一段故事。`MmgBase` API 曾一度专注于能够即时绘制缩放图像。为了加速这一过程，`MmgPen`类添加了特殊支持，使得某些图像绘制方法会缓存即时缩放或旋转的图像，从而避免重复执行相同的变换。


    `MmgBmp`类中甚至有特殊支持用于访问缩放和未缩放的图像尺寸。事实证明，这对于2D游戏来说并非最佳实践。如果你计划进行即时缩放和旋转，请考虑在资源加载期间提前设置好所需的图像。这样它们就已经在内存中，并且该工作只执行一次。`cacheOn`字段应保持为`false`，除非你正在试验图像变换缓存。


    ### 支持方法详情


    我们将在这里回顾的第一组支持方法是标准的 get 和 set 支持方法。


    ```java

    public boolean GetCacheOn() { ... }

    public void SetCacheOn(boolean b) { ... }

    public boolean IsEmptyColor(Color c) { ... }

    public Graphics GetSpriteBatch() { ... }

    public void SetSpriteBatch(Graphics sp) { ... }

    public Graphics GetGraphics() { ... }

    public void SetGraphics(Graphics sp) { ... }

    public Color GetColor() { ... }

    public void SetColor(Color c) { ... }

    public Color GetGraphicsColor() { ... }

    public void SetGraphicsColor(Color c) { ... }

    ```


    首先要讨论的两个方法是`cacheOn`类字段的 get 和 set 方法。我们建议关闭`MmgPen`的缓存系统，除非你对 API 非常熟悉。下一个方法`IsEmptyColor`只是检查颜色参数是否为`null`，并返回一个布尔值指示结果。


    接下来的两个支持方法`GetSpriteBatch`和`SetSpriteBatch`有一些历史渊源。这两个方法是在移植到微软的 XNA 框架时引入 API
    的。它们本质上与`GetGraphics`和`SetGraphics`方法相同，作为精灵批处理方法的透传。它们的命名也反映了 API 在 Java 实现中的绘图类。`GetColor`和`SetColor`方法允许你访问类的`color`字段。注意，这些方法不会改变画笔的当前颜色。要做到这一点，你需要使用`GetGraphicsColor`和`SetGraphicsColor`方法。它们将直接调整画笔上的颜色。


    ```java

    public Image ScaleImage(Image img, double scaleX, double scaleY) { ... }

    public Image RotateImage(int width, int height, Image img, int angle, int originX,
    int originY) { ... }

    ```


    注意，前面列出的两个支持方法作为非静态透传，指向类的静态方法。这是为了方便实现，允许从非静态类方法访问缩放和旋转方法。我们要回顾的最后一组支持方法是绘图方法。这里涵盖的方法远不止这些；但为了效率，我们不会介绍每一个方法，而是聚焦于几个关键示例。


    ```java

    public void DrawText(MmgFont f, MmgVector2 pos) { ... }

    public void DrawBmpBasic(String idStr, MmgVector2 position) { ... }

    public void DrawBmpFromCache(MmgBmp b) { ... }

    public void DrawBmp(MmgBmp b) { ... }

    public void DrawRect(MmgObj obj) { ... }

    public void DrawRect(MmgRect r) { ... }

    public void DrawRect(int x, int y, int w, int h) { ... }

    ```


    前面列出的绘图方法组中的第一个方法是`DrawText`方法。这个方法被重载了，但我们将重点放在接受`MmgFont`实例和`MmgVector2`实例作为参数的版本上。如果`FONT_NORMALIZE_POSITION`标志被设置为`true`，则文本使用调整后的位置绘制；否则，使用指定的坐标值绘制。该方法在返回前会重置画笔的原始颜色和字体。这是你应该养成习惯的做法。


    接下来要介绍的方法是`DrawBmpBasic`方法。这个方法被设计成一个简单的图像绘制方法，不执行任何变换或复杂逻辑。接下来，`DrawBmpFromCache`方法是我们刚刚看过的`DrawBmpBasic`方法的透传。注意，`MmgBmp`实例的
    ID 字符串用于在资源缓存中定位所需的图像。


