    ### 主要方法详解


    我们将从以下集合中列出的方法开始，对 `MmgObj` 的主要方法进行回顾。


    ```

    public MmgObj(MmgVector2 v2, int W, int H, boolean isv, MmgColor c, String n,
    String i) { ... }

    public MmgObj(MmgObj obj) { ... }

    public MmgObj Clone() { ... }

    public MmgObj CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgObj obj) { ... }

    代码清单 2-5

    MmgObj 主要方法详解 1

    ```


    我们将回顾的第一个 `MmgObj` 构造函数接收七个参数，并使用默认值或参数值将类字段设置为初始值。请注意，位置是通过使用传入的 `X` 和 `Y` 坐标作为参数实例化一个新的
    `MmgVector2` 类实例来设置的。另外，请注意此构造函数将 `hasParent` 布尔值设置为 `false`，并将 `parent` 字段设置为
    `null`。这是一个直接的构造函数。我们将回顾的下一个构造函数则略有不同。


    第二个 `MmgObj` 构造函数接收一个 `MmgObj` 实例作为参数。这是一个专门的构造函数，它根据传入的对象创建一个新的类实例。几乎所有 API 对象都会被克隆，以防止新对象与其所基于的对象之间出现共享引用。


    接下来要回顾的一组主要方法从克隆方法开始。其实现看起来有点奇怪，因为 `Clone` 和 `CloneTyped` 方法都返回一个新的 `MmgObj` 实例。这是一个设计决策，旨在使克隆功能在整个
    API 中标准化。对于扩展了 `MmgObj` 类的类，`Clone` 方法返回一个新的 `MmgObj` 实例，而 `CloneTyped` 方法则返回扩展类的一个新实例。在这种情况下，类型化类也是
    `MmgObj`，因此两个方法返回相同类型的对象。此处支持类型化克隆仅出于完整性考虑。


    `MmgUpdate` 方法是游戏引擎绘制例程的一部分。绘制例程由一组标准方法组成，这些方法每秒被调用特定次数以维持所需的帧率。`updateTick` 参数是更新方法被调用次数的索引。换句话说，如果你以每秒
    60 帧的速度运行游戏，那么 `updateTick` 参数大约每秒会增加 60。


    下一个方法参数 `currentTimeMs` 是调用该方法时的时间（以毫秒为单位）。该方法的最后一个参数 `msSinceLastFrame` 是自上次更新方法调用以来经过的毫秒数。这些参数可用于支持游戏帧期间的计时控制。想想任何游戏中临时图像的变化。计时用于控制该行为。你可以通过存储事件的开始时间并在事件结束时进行测量来衡量持续时间。


    你也可以在每次更新调用时累加 `msSinceLastFrame` 值，并用它来衡量一个事件花费了多少时间。下一个要回顾的方法 `MmgDraw` 是另一个绘制例程方法。此方法接收一个封装了框架绘制类的
    `MmgPen` 对象。`MmgDraw` 方法在每个游戏帧由绘制例程调用，并且总是在更新方法调用之后立即调用。


    `ApiToString` 方法是 API 约定，用于提供类的字符串表示形式。我们需要为 `MmgObj` 类回顾的最后一个主要方法是 `ApiEquals`
    方法。同样，这是一个贯穿此 API 的约定，与 `ApiToString` 和克隆约定一起使用。此方法提供 API 级别的相等性测试。


    ### 演示：MmgObj 类


    演示代码回顾将不包括对所使用的应用程序和游戏屏幕的详细回顾。关于此代码的详细回顾可以在本书的第二部分找到，其中涵盖了 MmgCore API。然而，我们将涵盖演示
    `MmgObj` 类用法的示例游戏屏幕的相关代码块。我建议你运行示例应用程序，以查看你正在回顾的代码的实际运行情况。


    ```

    01 public void LoadResources() {

    02    MmgHelper.wr("ScreenTestMmgObj.LoadResources");

    03    pause = true;

