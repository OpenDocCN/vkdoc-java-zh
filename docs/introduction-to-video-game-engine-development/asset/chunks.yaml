    ### 演示：MmgColor 类


    在本演示中，我们将以 `ScreenTestMmgColor` 屏幕为基础，展示 `MmgColor` 类的用法。你可以在 MmgTestSpace 包（如果使用
    C# 则对应命名空间）中找到此类。由于 `LoadResources` 方法中存在重复代码，我将在以下代码块中仅列出相关行。


    ```

    01 public void LoadResources() {

    02     MmgHelper.wr("ScreenTestMmgColor.LoadResources");

    03     pause = true;

    04     SetHeight(MmgScreenData.GetGameHeight());

    05     SetWidth(MmgScreenData.GetGameWidth());

    06     SetPosition(MmgScreenData.GetPosition());


    08     title = MmgFontData.CreateDefaultBoldMmgFontLg();

    09     title.SetText("");

    10     MmgHelper.CenterHorAndTop(title);

    11     title.SetY(title.GetY() + MmgHelper.ScaleValue(30));

    12     AddObj(title);


    14     int yDiff = MmgHelper.ScaleValue(40);

    15     int yStrt = GetY() + MmgHelper.ScaleValue(140);

    16     int xLeft = MmgHelper.ScaleValue(200);

    17     int i = 0;


    19     color1Label = MmgFontData.CreateDefaultBoldMmgFontLg();

    20     color1Label.SetMmgColor(MmgColor.GetBlueGray());

    21     color1Label.SetText("Color: BlueGray");

    22     color1Label.SetX(xLeft);

    23     color1Label.SetY(yStrt + (yDiff * i));

    24     AddObj(color1Label);

    25     i++;

    清单 2-9

    MmgColor 类演示 1

    ```


    `LoadResources` 方法的开头与之前的示例游戏屏幕非常相似。它会打印一条调试信息，指明正在加载资源的屏幕，将 `pause` 标志设为 true，并根据
    `MmgScreenData` 类的值设置屏幕的尺寸和位置。你会注意到，示例应用程序中所有 `LoadResources` 方法的结构都相同，并且包含非常相似的代码行。


    这是一个良好的编码习惯。相似的代码更易于阅读和理解。请将注意力集中到前面代码块中的第 8–12 行，你会看到标准的 `title` 初始化代码，它针对此特定屏幕进行了定制，但与所有示例游戏屏幕类似。请注意，`title`
    对象是通过 `AddObj` 方法添加到屏幕中的。如果你查看第 14–17 行的代码，会看到定位变量的初始化。注意，所有字面数值都通过 `ScaleValue`
    方法进行处理。这确保了定位值会随屏幕缩放。


    由于所有 `MmgColor` 示例都非常相似，我们只从第 19 行开始审查一个代码块。我们使用 `MmgFontData` 类设置字体，该类会根据当前屏幕缩放比例处理字体的缩放。在第
    20 行，可以看到设置字体颜色的实际示例。这里，我们使用了 `MmgColor` 类的静态辅助方法，具体来说是 `GetBlueGray` 方法。


    字体条目将使用此颜色绘制在屏幕上。在第 21 行，我们将标签字体的文本设置为所使用的颜色名称。字体条目的定位基于我们之前提到的局部变量进行计算。第 24 行是必要的，用于将字体添加到游戏屏幕的可绘制对象列表中；最后，我们递增局部变量
    `i`，以便下一个字体条目绘制在当前条目下方。请务必使用提供的示例应用程序查看此示例游戏屏幕。


    ## 基类：MmgRect


    `MmgRect` 类用于表示 MmgBase API 中的一个简单矩形。该矩形类可以绘制到屏幕上以显示大小和位置，可用于碰撞检测等计算，也可用作 UI 元素，例如边框或分隔线。


    ### 静态类成员


    `MmgRect` 类有一个静态类成员，即 `GetUnitRect` 方法。`GetUnitRect` 方法是一种创建标准化 `MmgRect` 实例的便捷方式。该方法创建一个新的
    `MmgRect` 实例，其位置为 (0,0)，宽度和高度均为 1。


    ### 类字段


    `MmgRect` 类只有一个我们需要介绍的类字段。`rect` 字段是框架矩形类的一个实例。`MmgRect` 类封装了此框架，并为 API 提供标准化的矩形支持。


    ### 支持方法详情


    首先需要查看的支持方法如下。


    ```

    public int GetLeft () { ... }

    public int GetTop() { ... }

    public int GetRight() { return ( ... }

    public int GetBottom() { ... }

    public int GetWidth() { ... }

    public void SetWidth(int w){ ... }

    public int GetHeight() { ... }

    public void SetHeight(int h){ ... }

    public Rectangle GetRect() { ... }

    public void SetRect(Rectangle r) { ... }

    清单 2-10

    MmgRect 支持方法详情 1

    ```


    上面列出的方法是 get 和 set 方法，允许访问其关联的类字段。该集合中的最后两个方法允许访问框架的矩形类。虽然我们希望尽可能限制与框架类的交互，将它们集中封装在类中，但我们不能忽视我们正在使用它们，并且确实需要不时地访问它们。考虑到这一点，你会注意到我们在合理的地方提供了对框架类的访问。

