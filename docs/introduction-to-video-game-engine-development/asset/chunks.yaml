    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s widget classes. The
    classes we’ve covered have complex implementations and advanced functionality.
    Notice that no matter how complex the class gets, as long as it extends the `MmgObj`
    class, we can still just plug it into the game screen and it works. This is the
    power of the game engine starting to show itself. Let’s take a look at a summary
    of the classes we’ve just reviewed:


    *   MmgTextField: An API class for representing a text field a user can input
    text into.


    *   MmgTextBlock: An API class for representing a multipage text block.


    *   MmgScrollHor/MmgScrollVert/MmgScrollHorVert: A set of API classes for representing
    scrollable panes.


    *   MmgMenuContainer: An API class for representing a menu system. This class
    plugs into the MmgGameScreen class as part of its menu system.


    *   MmgMenuItem: The menu item class used by the MmgMenuContainer class.


    The power of our tool chest is increasing exponentially. Now we’ve just added
    a slew of UI widgets that you can use in your game’s menu system or the game HUD.
    We haven’t defined a complex graphics API, but we’ve defined a series of drawable
    objects that act like self-contained UI widgets. There’s enough here to create
    solid menus, game settings screens, and more. I hope you see the flexibility and
    power in the design we’re working with. Keep these classes in mind when you’re
    building your next game.


    # 7. Animation Classes


    In this chapter, we’ll review a set of animation classes that can be used to provide
    basic animation support for certain elements of your next game. The `MmgPositionTween`
    class in particular is an advanced implementation that takes into account child
    objects, timing, drawing, and positioning. This class needs to be plugged into
    the game engine’s drawing routine and receive update calls to maintain the correct
    timing during the animation:


    *   MmgPulse


    *   MmgPositionTween/MmgSizeTween


    ## Animation Classes: MmgPulse


    The `MmgPulse` class provides support for simple animations. It''s specifically
    designed for animations that pulse or return back to the start of the animation
    and repeat. A good example of a pulse animation would be a torch that flickers
    from dim to bright light and back again.


    I should mention that this class doesn’t extend the `MmgObj` class, so it’s not
    in the set of drawable objects. This class is not drawn to the screen. Instead,
    the `MmgPulse` class updates an `MmgVector2` object that can be a reference to
    an active object’s position, or it can be used to drive attributes of an object.'
