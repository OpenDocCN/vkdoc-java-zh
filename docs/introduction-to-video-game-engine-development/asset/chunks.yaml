    These fields help control how the scroll bar is displayed. The only two worth
    mentioning directly are the `intervalX` field and the `isDirty` field. The `intervalX`
    class field controls the amount the scroll bar moves on one button click. The
    `isDirty` class field prevents the class from doing too much work by restricting
    the update method to only run if the class is marked dirty. Keep your eye on how
    you use this field; if your scroll pane isn’t updating, you may need to mark the
    object as dirty.


    The final group of fields are class events. The event objects are already prepared;
    they just need to have a target event handler set and they are ready to go. That
    wraps up the review of the class fields. Next, we’ll take a look at the class’
    support methods.


