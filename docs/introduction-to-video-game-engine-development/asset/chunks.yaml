    ### 主要方法详情


    该类的主要方法首先回顾了一些可用的构造函数。


    ```

    public MmgRect() { ... }

    public MmgRect(MmgRect obj) { ... }

    public MmgRect(int left, int top, int bottom, int right) { ... }

    代码清单 2-11

    MmgRect 主要方法详情 1

    ```


    列出的第一个构造函数不接受任何参数，并创建一个新的 `MmgRect` 实例，其高度和宽度设置为 1，并位于 (0,0) 位置。第二个构造函数是一个专用构造函数，它根据现有实例创建一个新的
    `MmgRect` 实例。前面列出的最后一个构造函数接收更细粒度的数据，即 left、top、bottom、right 值，并使用它们创建一个新的 `MmgRect`
    对象实例。


    ```

    public void ShiftRect(int shiftLeftRight, int shiftUpDown) { ... }

    public MmgRect ToShiftedRect(int shiftLeftRight, int shiftUpDown) { ... }

    public MmgRect Clone() { ... }

    代码清单 2-12

    MmgRect 类主要方法详情 2

    ```


    接下来我们将介绍的两个主要方法可以帮助你以不同方式移动矩形对象。`ShiftRect` 方法根据方法参数中指定的数量，在左右和上下方向上移动当前对象实例。下一个主要方法
    `ToShiftedRect` 类似，但它不会改变当前对象实例。相反，它会根据方法参数指定的偏移位置创建并返回一个新的矩形。当你想要稍微调整一个矩形或基于现有实例创建一个新矩形时，这些方法非常方便。


    这组方法中的最后一个是 `Clone` 方法。我们之前遇到过这个方法。MmgBase API 在所有有意义的类中都支持克隆功能。所有克隆方法都使用了专用的类构造函数。


    ```

    public int GetDiffX(MmgRect inRect, int direction, boolean opposite, boolean left2right)
    { ... }

    public int GetDiffX(int x, int direction, boolean opposite) { ... }

    public int GetDiffY(MmgRect inRect, int direction, boolean opposite, boolean left2right)
    { ... }

    public int GetDiffY(int y, int direction, boolean opposite) { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgRect obj) { ... }

    代码清单 2-13

    MmgRect 主要方法详情 3

    ```


    `GetDiffX` 方法是一组主要方法，用于快速计算两个 `MmgRect` 对象之间的水平差异。使用第一个 `GetDiffX` 方法（即接受四个参数的条目）的参数，你可以使用左侧或右侧坐标来比较矩形。你还可以指定在比较中首先使用哪个对象以及比较本身的方向。这为你提供了比较两个矩形的强大能力。这个方法需要一些经验。在将其用于你的游戏之前，请花些时间熟悉它。


    第二个 `GetDiffX` 方法（即接受三个参数的条目）可用于将当前矩形与一个 X 坐标进行比较。你可以指定要比较的矩形坐标以及方向（左或右）。你还可以通过使用
    `opposite` 参数来覆盖实际的比较。同样，这个方法需要一些经验。在将其用于你的游戏之前，请给自己一些时间练习。


    接下来我想介绍的两个主要方法是 `GetDiffY` 方法。它们与我们刚刚回顾的方法非常相似。它们执行相同的操作，只是它们被设计用于处理 Y 坐标以及上下方向。由于它们非常相似，我在此不再赘述，但我建议你花时间仔细查看它们，并确保理解它们的工作原理。


    关于 `MmgRect` 类，最后要回顾的两个主要方法是 `ApiToString` 和 `ApiEquals` 方法。`ApiToString` 方法用于创建
    `MmgRect` 类的字符串表示形式。这是一种用于将类实例表示为字符串的 API 级别方法。`ApiEquals` 方法是一种 API 级别的比较方法。它将两个
    `MmgRect` 实例具有相同位置和尺寸定义为相等。


    ### 演示：MmgRect 类


    在本节中，我们将通过查看 MmgTestSpace 包（如果你使用 C# 则是命名空间）中 `ScreenTestMmgRect` 类的几行代码来演示 `MmgRect`
    类的使用。到目前为止，我们已经看过几次 `LoadResources` 方法的回顾，因此我们将跳过一些通用代码，专注于该类特有的代码行。请务必在示例应用程序中查看此示例屏幕。


    ```

    01     rect1 = new MmgRect(MmgHelper.ScaleValue(100), MmgHelper.ScaleValue(190),
    MmgHelper.ScaleValue(190) + GetHeight()/4, GetWidth() - MmgHelper.ScaleValue(100));

    02     rect2 = new MmgRect(MmgHelper.ScaleValue(100), MmgHelper.ScaleValue(210)
    + GetHeight()/4, MmgHelper.ScaleValue(210) + GetHeight()/4 + GetHeight()/4, GetWidth()
    - MmgHelper.ScaleValue(100));

    03     rect3 = new MmgRect(MmgHelper.ScaleValue(90), MmgHelper.ScaleValue(180),
    MmgHelper.ScaleValue(90) + GetHeight()/2 + GetHeight()/4 + MmgHelper.ScaleValue(28),
    GetWidth() - MmgHelper.ScaleValue(90));

    代码清单 2-14

    MmgRect 类演示 1

    ```


    在此示例屏幕的 `LoadResources` 方法中，请将注意力集中在第 1 到第 3 行。这些行初始化并配置了三个 `MmgRect` 实例。请记住，`MmgRect`
    类并未继承 `MmgObj` 类。这意味着 `MmgRect` 不能直接由游戏引擎的绘制例程绘制。但是，`MmgPen` 类中支持绘制 `MmgRect`
    实例。通过这种方式，`MmgRect` 类介于计算和渲染之间。


    ## 基类：MmgFont


    `MmgFont` 类用于封装框架的字体类。字体主要通过 `MmgFontData` 类的便捷静态方法创建。应始终优先使用 `MmgFontData` 类，因为它会根据屏幕的当前缩放比例（如果有）自动缩放字体大小。这有助于确保游戏可以放大或缩小尺寸，同时仍能保持游戏屏幕对象（包括
    `MmgFont` 对象）的位置和大小。


    `MmgFont` 类是我们遇到的第一个继承自 `MmgObj` 类的类。因此，它内置了对位置和尺寸的支持，并且在接入游戏引擎的绘制例程时，会接收更新和绘制方法的调用。另请注意，由于严格的
    API 设计模式，`MmgFont` 类支持克隆、类型化克隆和比较功能。这还不错。


    ### 枚举


    `MmgFont` 类有一个相关的枚举需要我们回顾。`FontType` 枚举被 `MmgFont` 类用于描述该类所代表的字体样式。例如，如果加载了粗体字体，则将使用粗体
    `FontType`。需要注意的是，字体类型并不驱动字体的渲染方式；它仅仅描述所加载的字体。

