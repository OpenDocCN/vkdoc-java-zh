- fmt: '# 2. Base Classes


    In this chapter, you’ll review the base classes of the MmgBase API:


    - `MmgObj`

    - `MmgColor`

    - `MmgRect`

    - `MmgFont`

    - `MmgSound`

    - `MmgPen`

    - `MmgVector2`

    - `MmgBmp`


    Classes are reviewed using the following standard review steps. If a class does
    not have anything to review for a particular step, the step will be omitted from
    the review process:


    - Static class members

    - Enumerations

    - Class fields

    - Support method details

    - Main method details


    The best way to learn the game engine software provided with this book is to follow
    along in Java or C#. However, the line numbers in C# will not match up perfectly
    with the Java code reviewed in this text. It is recommended you follow along in
    Java to get an understanding of the code and then look at it in C# so that you
    can see how to abstract framework-level classes from API classes and what aspects
    of the code are implemented in a different but functionally equivalent manner.


    ## Base Classes: MmgObj


    The `MmgObj` class is the basis of all drawable objects in the game engine. Everything
    that you see on the screen implements this class in some way. This is a common
    theme in powerful game creation tools. You’ll find that in any game engine, there
    are a set of classes that create a foundation that the rest of the engine is built
    on. In many cases, there is one class that is of primary importance with regard
    to the game engine’s rendering routine. This is that class. It holds the main
    set of attributes necessary for the game engine to draw objects on the screen
    and forms the basis of all drawable objects in the API.


    ### Class Fields


    The first set of class fields we’ll review are listed in the following.


    ```

    public MmgVector2 pos;

    public int w;

    public int h;

    public boolean isVisible;

    public MmgColor color;

    Listing 2-1

    MmgObj Class Fields 1

    ```


    Because we are reviewing the base classes for a 2D game engine, we should expect
    to see class fields that help us draw 2D images on the screen. Keep this concept
    in mind as we review different classes in the API. Think about the classes we
    review as models and try to come up with different ways they can be used together
    to create aspects of your game.


    The `pos` field is an instance of the `MmgVector2` class and is used to store
    the current position of the `MmgObj` on the screen. To do so for 2D space, we
    need to keep track of an X and a Y coordinate, which the `MmgVector2` class helps
    us do. The `w` and `h` class fields are used to define the dimensions, width and
    height, of the `MmgObj`. This defines a rectangle that this `MmgObj` instance
    uses when drawn on the screen.


    Note that with just three class fields, we’ve covered the core needs of just about
    all 2D drawing. Sure, we haven’t talked about shapes and images, but all of those
    things have at least two properties in common, position and dimension. The next
    class field, `isVisible`, is used to control if this `MmgObj` is drawn on the
    screen. The `color` field is an instance of the `MmgColor` class and is used to
    represent the color of this object, although not all objects use the color attribute
    when drawn.


    There is a design point I’d like to mention here. Notice that we could have just
    used the framework class directly in the API. Why introduce an API-level class
    to handle it? By using an API-level class to wrap the framework-level class, we
    introduce an abstraction layer that lets us translate features of the framework
    class, so they are better aligned with the API.


    ```

    private String version = "1.0.8";

    public boolean hasParent;

    public MmgObj parent;

    public String name;

    public String mmgUid;

    Listing 2-2

    MmgObj Class Fields 2

    ```


    The next set of class fields, listed in the preceding, starts with a private string
    that is used to store a version number. The version number represents the current
    API version code. The following two class fields, `hasParent` and `parent`, are
    used to track if this `MmgObj` instance belongs to another `MmgObj` instance and,
    if so, which one.


    The `name` field is used to give this `MmgObj` instance a unique name and can
    be used to differentiate objects or types of objects. Lastly, the `mmgUid` is
    a class field that can be used to store a unique identifier. Again, this can be
    helpful when tracking and differentiating game objects.


    ### Support Method Details


    We won’t go into detail when covering simple support methods. We just want to
    get an idea of what functionality is available so we can develop an idea of how
    the class functions and how it’s used. The first set of support methods to review
    is listed in the following.


    ```

    public String GetVersion() { ... }

    public boolean GetIsVisible() { ... }

    public void SetIsVisible(boolean bl) { ... }

    public int GetWidth() { ... }

    public void SetWidth(int W) { ... }

    public int GetHeight() { ... }

    public void SetHeight(int H) { ... }

    public void SetPosition(MmgVector2 v) { ... }

    public MmgVector2 GetPosition() { ... }

    public MmgColor GetMmgColor() { ... }

    public void SetMmgColor(MmgColor c) { ... }

    Listing 2-3

    MmgObj Support Method Details 1

    ```


    Notice that you can choose to access class fields via get and set class methods
    or by direct class field access. In cases where you know the instance of the `MmgObj`
    doesn’t have any advanced features that require using the class methods, you can
    use class fields and save some typing time. In general, I recommend using class
    methods and following good class encapsulation practices whenever possible.


    ```

    public void SetX(int inX) { ... }

    public int GetX() { ... }

    public void SetY(int inY) { ... }

    public int GetY() { ... }

    public String GetName() { ... }

    public void SetName(String n) { ... }

    public String GetId() { ... }

    public void SetId(String i) { ... }

    public boolean GetHasParent() { ... }

    public void SetHasParent(boolean b) { ... }

    public MmgObj GetParent() { ... }

    public void SetParent(MmgObj o) { ... }

    Listing 2-4

    MmgObj Support Method Details 2

    ```


    The get and set methods for the `X` and `Y` coordinates are used to interact with
    the X and Y coordinate values directly. If you are frequently updating the position
    of an `MmgObj`, you should not use these methods and instead store a reference
    to the position vector returned by a call to `GetPosition`. This will save you
    many method calls, especially if the code is running as part of the update or
    drawing routine.


    The last two methods I want to talk about are used to manage object parent membership.
    Two `MmgObj` instances can be related to each other by using the `parent` and
    `hasParent` class fields. This feature isn’t used too much in the API – mainly
    in classes that are containers of child objects. You can however utilize this
    functionality to create different relationships between your game objects. It
    is important to note that the class field that indicates there is a parent and
    the actual parent work independently of each other, so care must be taken to set
    both class fields accordingly.'
