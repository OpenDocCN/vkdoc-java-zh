    ### 主要方法详解


    `GamePanel` 类包含几个主要方法，按以下分组列出，值得我们探讨。


    ```

    //渲染方法

    public void PrepBuffers() { ... }

    public BufferedImage create(int width, int height, boolean alpha) { ... }

    public Canvas GetCanvas() { ... }

    public Graphics2D GetBuffer() { ... }

    public boolean UpdateScreen() { ... }

    public void UpdateGame() { ... }

    public void RenderGame() { ... }

    //其他主要方法

    public GamePanel(MainFrame Mf, int WinWidth, int WinHeight, int X, int Y, int
    GameWidth, int GameHeight) { ... }

    public void SwitchGameState(GameStates g) { ... }

    public void HandleGenericEvent(GenericEventMessage obj) { ... }

    代码清单 10-15

    GamePanel 主要方法详解 1

    ```


    `PrepBuffers` 方法将画布缓冲策略设置为使用两个缓冲区，即双缓冲。该方法还负责准备用于绘制游戏面板的 `background` 和 `backgroundGraphics`
    字段。`GetCanvas` 方法返回 `GamePanel` 的画布字段，而 `GetBuffer` 方法则从画布中获取下一个活动缓冲区。


    `UpdateScreen` 方法会触发画布的双缓冲翻转，并创建一个新缓冲区。`UpdateGame` 方法运行游戏引擎绘制例程中的更新调用。这会导致当前游戏画面的
    `MmgUpdate` 方法在每个游戏帧被调用。最后但同样重要的是，`RenderGame` 方法负责构建游戏帧并将其绘制到画布上。这会导致当前画面的 `MmgDraw`
    方法在每个帧被调用。


    接下来要审视的方法是类的构造函数。只有一个构造函数，所以你得接受它。它被设计为接入静态主类，并在 `MainFrame` 初始化后被调用。它接收主框架的引用以及一些尺寸和偏移信息作为参数。此构造函数将创建一个可供使用的新类实例。


    `SwitchGameState` 方法是 `GamePanel` 类中用于切换游戏状态及后续游戏画面的默认方法。该方法负责清理上一个游戏状态。这会导致上一个游戏画面的
    `UnloadResources` 方法被调用。完成后，下一个游戏画面会通过调用其 `LoadResources` 方法进行准备。随后它成为当前画面，并主动绘制到游戏窗口中。


    我们要审视的最后一个方法是 `HandleGenericEvent` 方法。该方法处理来自启动画面和加载画面类的通用事件。启动画面类在其显示时间结束时发送一个事件。加载画面类在加载过程完成时发送一个事件。游戏面板类通过将游戏状态更改为游戏加载序列中的下一个状态来响应这些事件。主菜单是启动过程中的最后一个状态。


    ### 深入剖析：GamePanel


    对于该类的深入剖析部分，我们将查看 `RenderGame` 方法中的一段代码。请看下面的代码清单。


    ```

    01     p.SetGraphics(g);

    02     p.SetAdvRenderHints();

    03     currentScreen.MmgDraw(p);


    05     if (MmgHelper.LOGGING == true) {

    06         tmpF = g.getFont();

    07         g.setFont(debugFont);

    08         g.setColor(debugColor);

    09         g.drawString(GamePanel.FPS, 15, 15);

    10         g.drawString("Var1: " + GamePanel.VAR1, 15, 35);

    11         g.drawString("Var2: " + GamePanel.VAR2, 15, 55);

    12         g.setFont(tmpF);

    13     }

    14 }


    16 //如果启用了缩放，则将背景缓冲区的状态缩放绘制到屏幕缓冲区

    17 if (scale != 1.0) {

    18     bg.drawImage(background, sMyX, sMyY, sWinWidth, sWinHeight, 0, 0, winWidth,
    winHeight, null);

    19 } else {

    20     bg.drawImage(background, myX, myY, null);

    21 }

    代码清单 10-16

    GamePanel 深入剖析 1

    ```


    这段看似无害的小代码实际上是游戏引擎绘制例程的核心。前两行代码设置了 `MmgPen` 字段 `p`，用于在目标表面 `g` 上绘制。请记住，`g` 是承载一个游戏帧的表面，并由当前游戏画面渲染。设置了高级渲染提示，并在第
    3 行绘制了画面。第 5 到 13 行的代码块是调试头部信息，如果游戏开启了日志记录，则会绘制该信息。这个头部信息显示游戏的帧率以及两个用于调试的变量。


    在此示例中，图形对象 `g` 被设置为在 `background` 图像上绘制。这是将承载游戏下一帧的表面。请注意，在第 17–21 行，图像使用框架的画笔类
    `bg` 绘制到画布上。注意，由于我们在内部表面（即 `background` 图像）上绘制，因此为游戏渲染引擎实现了一个三缓冲系统。由当前画面渲染的游戏帧随后被传递到画布的内部双缓冲区。


    ## 主题：启动游戏


    这是本书这一部分中我们遇到的第三个新的审视部分。我们在本章及之前的章节中已经见过“输入方法详解”和“深入剖析”部分。我想在这里介绍的新审视部分是“主题”审视部分。在这种类型的审视部分中，我们不会审视某个类或类的用法。相反，我们将审视一个更宏观的概念。在本例中，这个概念就是“启动游戏”。

    '
- fmt: '### Launching a Game: Java


    First, we’ll take a look at the Java game engine implementation and the different
    ways we can start a game. Navigate to the project folder you’ve been using for
    the NetBeans IDE. Find the `MmgGameApiJava` project and open that folder. There
    should be a `dist` folder in the main project folder.


    If not, open the IDE and right-click the project. Select the Clean and Build option
    and answer the following dialog such that the build is forced. You should now
    have a `dist` folder if your project is properly configured. If you still don’t
    see a folder, go back to Chapter [1](#508392_1_En_1_Chapter.xhtml) and go over
    the Java setup process again.


    Inside the `dist` folder is where the compiled version of the game is created.
    In order to start a game, we need to know how to run some command-line interface,
    console, commands. In Windows, you should use the command program, `cmd.exe`.
    You can find this program on the Start menu or search for `cmd` in the run bar.


    For other platforms, you’ll just need to open up a terminal. If you don’t know
    how to do this, simply search the Internet for some instructions on how to open
    up a terminal window for your particular operating system. Once you have a terminal
    window open, we’ll want to verify the Java runtime environment is set up correctly.
    Run the following command in the console window:


    ```

    java –version

    ```


    If you get a message indicating that the Java program could not be found, then
    we’ll have to make sure that Java is on the system’s path environment variable.
    In Windows, you will see the following message if Java cannot be found. You will
    see a similar message on Mac OSX and Linux:


    ```

    ''java'' is not recognized as an internal or external command, operable program
    or batch file.

    ```


    If this is the case, you’ll want to visit the following link or search the Internet
    for “add java to your path” and look at one of the top results:


    [`https://docs.oracle.com/javase/tutorial/essential/environment/paths.html`](https://docs.oracle.com/javase/tutorial/essential/environment/paths.html)


    If everything is up and running properly, then you’ll see a message similar to
    the one listed in the following instead of an error message:


    ```

    java version "12.0.1" 2019-04-16 Java(TM) SE Runtime Environment (build 12.0.1+12)
    Java HotSpot(TM) 64-Bit Server VM (build 12.0.1+12, mixed mode, sharing)

    ```


    The Java implementation supports multiple static main entry points in a single
    jar file. The default static main is the `MmgTestScreens` class from the `MmgTestSpace`
    library. This static main adds the ability to specify which test to launch. You’ll
    see the added command-line argument in the following examples.


    ### Execute the Default Static Main


    ```

    java -jar MmgGameApiJava.jar

    ```


    ### Execute the Default Static Main with Arguments


    ```

    java -jar MmgGameApiJava.jar FPS=30 TEST=1

    ```


    ### Execute the Default Static Main with Native Lib Path and Arguments


    ```

    java -Djava.library.path= C:\netbeans_projects\MmgGameApiJava\lib\jinput-platform\native-libs
    -jar MmgGameApiJava.jar FPS=30 TEST=1

    ```


    In the next two examples, we are specifying the static main class to run from
    the command line. Notice that in the second example, we are running the `MmgApiGame`
    static main through the `MmgCentralMain`. The reason for this is that the C# framework
    doesn’t allow there to be more than one static main entry point. To keep the two
    projects functionally equivalent, I’ve created an entry point that can be configured
    to run many different main classes.


    ### Execute Target Static Main with Arguments


    ```

    java –cp MmgGameApiJava.jar net.middlemind.MmgGameApiJava.MmgCore.MmgApiGame FPS=30

    ```


    ### Execute Central Main with Target Main and Args


    ```

    java –cp MmgGameApiJava.jar net.middlemind.MmgGameApiJava.MmgCore.MmgCentralMain
    mmgapigame FPS=15

    ```


    ### All MmgCentralMain Execution Commands


    ```

    //Executes the example application

    java MmgGameApiJava.jar mmgtestspace

    //Executes the bare bones static main

    java MmgGameApiJava.jar mmgapigame

    //Executes the PongClone Chapter 16 project

    java MmgGameApiJava.jar chapter16

    //Executes the PongClone Chapter 17 project

    java MmgGameApiJava.jar chapter17

    //Executes the PongClone Chapter 18 project

    java MmgGameApiJava.jar chapter18

    //Executes the DungeonTrap Chapter 20 project

    java MmgGameApiJava.jar chapter20

    //Executes the DungeonTrap Chapter 21 project

    java MmgGameApiJava.jar chapter21

    //Executes the DungeonTrap Chapter 22 project

    java MmgGameApiJava.jar chapter22

    //Executes the DungeonTrap Chapter 23 project

    java MmgGameApiJava.jar chapter23

    //Executes the DungeonTrap Chapter 23 demo project

    java MmgGameApiJava.jar chapter23_demoscreen

    //Executes the DungeonTrap Chapter 24 project phase 1

    java MmgGameApiJava.jar chapter24_phase1

    //Executes the DungeonTrap Chapter 24 project phase 2

    java MmgGameApiJava.jar chapter24_phase2

    //Executes the DungeonTrap Chapter 24 project phase 3

    java MmgGameApiJava.jar chapter24_phase3

    ```


    That concludes the review of how to launch a Java version of your game. Next up,
    we’ll take a look at how to launch your game using the C# version of the engine.
    I should mention that the compiled games look for the resource directory to be
    one directory up from where they are executed. So if we are running the game in
    the `dist` folder, the resources will be located in the `../cfg` directory.'
