    `PrepScrollPane` 方法，该方法负责重置滚动间隔以及用于将滚动面板绘制到视口显示矩形上的绘图表面。


    最后列出的两个方法是输入事件处理器。默认情况下，滚动面板配置为使用方向键向左、向右、向上和向下滚动，具体取决于你正在使用的是哪一个。你也可以点击按钮来移动滚动面板。当然，你也可以点击滚动面板并触发一个屏幕点击事件。

