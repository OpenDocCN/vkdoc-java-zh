    ## Game Screens: `Screen`


    The `Screen` class is very similar to the other game screens we’ve reviewed in
    this chapter. The previous classes, `ScreenSplash`, `ScreenLoading`, and `ScreenMainMenu`,
    were all specific game screens that are designed to function a certain way. The
    `Screen` class is a general game screen. There is no specific built-in functionality
    like a splash screen or loading bar to speak of.


    ### Class Fields


    The `Screen` class’ fields are very similar to those that we’ve seen before in
    this chapter. This is the last MmgCore game screen for us to review, so let’s
    jump into some code.


    ```

    public GameStates state;

    public GamePanel owner;

    public Hashtable classConfig;

    Listing 14-30

    Screen Class Fields 1

    ```


    The first two class fields are used to identify the `GameStates` value assigned
    to this game screen as well as the `GamePanel`, `owner`, that this game screen
    belongs to. The last field, `classConfig`, is used to hold class config data,
    if any exists. Class config files are processed at runtime. It’s up to you to
    implement the class config code as you see fit.


    ### Support Method Details


    The `Screen` class’ support methods are a familiar group we’ve come across before.


    ```

    public GameStates GetGameState() { ... }

    public boolean GetIsDirty() { ... }

    public void SetIsDirty(boolean b) { ... }

    public void DrawScreen() { ... }

    Listing 14-31

    Screen Support Method Details 1

    ```


    The first method listed returns the `Screen`’s associated game state value. The
    next two methods are a pair of get and set methods that allow you to access the
    screen’s `isDirty` flag. The `isDirty` flag controls if the screen’s `MmgUpdate`
    method executes on the next game frame. The last entry in the preceding list is
    the `DrawScreen` method. This method is responsible for updating the game screen
    and is called from the `MmgUpdate` method if the screen is marked as dirty.


    ### Main Method Details


    The `Screen` class’ main methods are a familiar group we’ve come across before.
    Let’s take a look at the class’ main methods.


    ```

    public Screen(GameStates State, GamePanel Owner) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    public void HandleGenericEvent(GenericEventMessage obj) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 14-32

    Screen Main Method Details 1

    ```


    The class constructor follows the same pattern we’ve seen with the `ScreenSplash`,
    `ScreenLoading`, and `ScreenMainMenu` classes. The `State` argument is the game
    state value associated with the game screen. The `LoadResources` and `UnloadResources`
    methods are responsible for preparing and releasing the screen’s resources. The
    `HandleGenericEvent` method is part of the class’ implementation of the `GenericEventHandler`
    interface, which requires that the method be defined.


    The `Screen` class is able to register for and process generic events. The last
    two methods shown in the preceding are the `MmgUpdate` and `MmgDraw` methods that
    are called as part of the game engine’s drawing routine. The `MmgUpdate` method
    is called first and is responsible for running the game screen’s update logic,
    if any. The `MmgDraw` method is responsible for rendering the game screen to the
    display.


    ### Demonstration: `Screen` Class


    The demonstration section for the `Screen` class is from the PongClone game project
    included with the game engine. Open the `ScreenGame` class of the `Chapter15_CompleteGame`
    package, or namespace if you’re following along in C#, and direct your attention
    to the class definition.


    ```

    public class ScreenGame extends Screen { ... }

    Listing 14-33

    Screen Class Demonstration 1

    ```


    You’ll notice from the class definition that the `ScreenGame` class extends the
    `Screen` class. The main thing to notice about the `Screen` class is that it doesn’t
    have any built-in functionality in the same way that the `ScreenSplash` and `ScreenMainMenu`
    classes did. The next snippet of code is from the MmgCore API’s `Screen` class,
    specifically the `MmgUpdate` method.


    ```

    01 if (pause == false && isVisible == true) {

    02     if (super.MmgUpdate(updateTick, currentTimeMs, msSinceLastFrame) == true)
    {

    03         lret = true;

    04     }


    06     if (isDirty == true) {

    07         lret = true;

    08         DrawScreen();

    09     }

    10 }

    Listing 14-34

    Screen Class Demonstration 2

    ```


    The `MmgUpdate` method only executes if the screen isn’t paused and currently
    is visible, line 1. The focus of the code snippet listed in the preceding is on
    line 8 where the `DrawScreen` call is made. If the `isDirty` flag is set to true,
    the screen will update on each game frame. This is the main difference between
    this game screen and the previous ones we reviewed in this chapter.


    The `Screen` class is configured to run updates on every game frame, so it’s perfect
    for a game screen that requires update calls for animation. That’s what the main
    purpose of the `Screen` class is, a starting point for animation-heavy game screens.'
