    *To Mamamama and Papi. I love you both very much.*


    ## Introduction


    This book is, first and foremost, about the design and development of a 2D game
    engine. The examples and code presented in this text are from the Java implementation
    of the game engine, but this book includes functionally equivalent implementations
    of the engine written in both Java and C#. The API-level code is very similar
    between the two programming languages, so it should be very easy to follow along
    in C# if you should desire to do so.


    This book will cover, at the class level, each piece of the game engine along
    with explanations and demonstrations. As you review the code through this text,
    you’ll begin to see the structure of the design patterns that power the engine.
    These patterns, or interactions of classes, are what give the game engine life.
    It’s what makes the software an engine as opposed to an implementation of a game.


    This book is broken down into three parts. Part 1 of the text, Chapters [1](#508392_1_En_1_Chapter.xhtml)–[8](#508392_1_En_8_Chapter.xhtml),
    reviews all the base classes that support the engine and define its capabilities.
    In Part 2 of the text, Chapters [9](#508392_1_En_9_Chapter.xhtml)–[14](#508392_1_En_14_Chapter.xhtml),
    we dive into the application-level code. We review, again class by class, the
    code responsible for loading resources, game settings, preparing the game’s window
    and drawing surfaces, and mapping user input from different input sources. Finally,
    in Part 3, we apply what we’ve learned and build games from the ground up using
    only the code we’ve reviewed in this text and an IDE (Integrated Development Environment).


    The game development world is a large and complex place. If you’re interested
    in building the next great games, then you need experience working with advanced
    game development tools. Learning these tools can be a daunting task to say the
    least. You’ll have to learn at least two complex pieces of software, at least
    one intricate API, and at least one programming language.


    This book is designed to give you experience building and working with game engines,
    at the code level, by providing an example implementation to review in detail.
    This book will give you experience working with IDEs (Integrated Development Environments),
    complex cross-platform APIs (Game engine APIs in Java and C#), game engine design
    patterns, and building games using the game engine introduced in the text. By
    the end of this book, you’ll be able to make your own games directly in code,
    and you’ll be poised to take on the next challenges in your game development career.


    ## Acknowledgments


    I’d like to take the time to acknowledge my wife, Katia, for putting up with me
    writing and coding at my desk for days on end. Love you, bbg:-*.


    ## About the Author About the Technical Reviewer


    # Part 1.


    # 1. MmgBase API Introduction


    Part 1 of this book contains a comprehensive review of a 2D game engine written
    in both Java and C#. Both implementations are included with this text along with
    full code documentation, 137 unit tests for verifying API functionality, an example
    program that demonstrates key game engine features, and two complete games that
    you will build on your own, with a little help from me. Like any good TV cooking
    show however, there is a finished copy of each game also included so you can work
    with the expected results.


    ![../images/508392_1_En_1_Chapter/508392_1_En_1_Fig1_HTML.jpg](images/508392_1_En_1_Chapter/508392_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    NetBeans IDE Install 1


    The included game engine contains two APIs: a low-level API that includes many
    game building tools like sprites, sounds, containers, game screens, UI widgets,
    event handlers, and much more and a mid-level API that handles launching the game
    and loading in settings and resources. In this way, the game engine is expressed
    as a software development kit containing two core APIs and including a number
    of examples and documentation.


    You may be wondering what sort of player this game engine needs and what are the
    requirements for it, but this game engine does not use a player. Instead, the
    game is compiled with the engine code built in so each game you make is a full
    copy of the game engine runtime code and game engine classes. This gives you full
    control and a full view of the code that powers the engine.


    Through the course of this book, you will see how the game engine is built, and
    you’ll have access to both a Java/Swing implementation that requires NetBeans
    and a C#/MonoGame implementation that requires Visual Studio. The Java version
    uses Swing with OpenGL acceleration and works on any platform that runs Java –
    Windows, Mac OSX, Linux, and so on.


    The C# version runs on SDL, Simple DirectMedia Layer, and uses OpenGL and OpenAL.
    By having the ability to explore the implementation of one 2D game engine on multiple
    platforms, you will gain invaluable experience and knowledge building and working
    with game engines. The intricacies of API abstraction and generalized 2D game
    engine design will become readily apparent to you as you review this book and
    compare the cross-platform implementations.


    MonoGame is a free, open source, game development technology that is based on
    the defunct XNA SDK from Microsoft. The community has done a wonderful job of
    resurrecting this software and utilizing the latest tools and technologies to
    get MonoGame to run on the following platforms:


    *   Windows

    *   Mac

    *   Linux

    *   Android

    *   iOS

    *   PlayStation 4

    *   PlayStation Vita

    *   Xbox One

    *   Nintendo Switch

    *   Google Stadia


    Source: [`https://docs.monogame.net/articles/platforms/0_platforms.html`](https://docs.monogame.net/articles/platforms/0_platforms.html)


    Whatever your coding experience or preferred platform, you’ll have a choice of
    which codebase to use, Java or C#. You’ll be able to target several different
    platforms with your new game, and what is more, you’ll have every line of code
    in the game engine under your direct control. Now that is exciting. Let’s get
    started!'
