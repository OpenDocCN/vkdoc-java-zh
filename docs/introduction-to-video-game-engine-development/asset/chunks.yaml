    `MmgTextField` 类处理的事件。新对象在第 9 行被添加到游戏屏幕的可绘制对象列表中。


    `ScreenTestMmgTextField` 类将输入事件从应用程序的核心代码映射到 `MmgCore` 包的 `GamePanel` 类中的事件处理方法，或者如果您在
    C# 中跟进，则是命名空间。`GamePanel` 类将这些事件转发到当前的游戏屏幕。在这种情况下，`ScreenTestMmgTextField` 类接收它们，并在一些内部逻辑之后，根据按下的键调用
    `MmgTextField` 类的 `ProcessKeyClick` 或 `DeleteChar` 方法。


    如果按下的键是字母数字字符，则将其发送到文本字段对象的 `ProcessKeyClick` 方法。如果按下的键是退格键，则调用该对象的 `DeleteChar`
    方法。在下一个代码片段中，列出了 `MmgHandleEvent` 方法。此方法响应来自我们在第一个代码片段中创建的文本字段的事件。在这种情况下，由于我们只有一个事件，我们不检查事件
    ID 和类型。我们只需检查事件的消息，并通过在游戏屏幕上显示它来记录该事件。


    ## 控件类：MmgTextBlock


    `MmgTextBlock` 类用于显示较大的文本块，例如故事段落或对话框的一部分。`MmgTextBlock` 类会解析一个文本字符串，并将其分解为一系列字符串，这些字符串能在
    `MmgTextBlock` 对象的尺寸内正确显示。此类用于将大量文本分解为多页格式正确的文本。


    我想花一点时间指出，直到本章左右，大多数类只需要非常少量的配置。有些类会在内部实现一个准备方法，并在某些字段更改时自动调用它；有些会在构造函数末尾调用准备方法；而另一些则需要您在适当的时间调用适当的方法。这个类属于后一种类型。


    最后我要提的是，`MmgTextBlock` 类扩展了 `MmgObj` 类，因此它是可绘制对象集合的一部分。请思考一下这一点。文本字段、标签-值对、`MmgBmp`
    图像以及基于 `MmgFont` 的文本类也是如此。游戏引擎实际上并不关心它正在处理哪个类。对于引擎的绘制例程来说，它们看起来都像是 `MmgObj` 类。

