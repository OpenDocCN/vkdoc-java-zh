- fmt: '# Setting Up Core Code: C# and Java


    Now that we’ve got our game project set up and configured, it’s time to start
    coding. We’re going to set up the game project’s core code in this section. I’ll
    make sure to mention the specifics of the C# game engine’s implementation up to
    a certain point. These will be the last major difference between the two projects
    that I’ll focus on.


    From that point on, all the code will be very similar API code from the `MmgBase`
    and `MmgCore` libraries we reviewed in Parts 1 and 2 of this text. The only real
    discrepancies that you’ll encounter are driven by fundamental differences in the
    two programming languages. As I’ve mentioned, in this section, we’ll be setting
    up the PongClone game’s core code. I’ve listed the files we’ll be working with,
    for both the Java and C# versions of the game engine, in the following:


    **Java version**


    * `PongClone.java`

    * `MainFrame.java`

    * `GamePanel.java`


    **C# version**


    * `PongClone.cs`

    * `GamePanel.cs`


    We’ll want to create a new package for the project code. Right-click the project
    and select “Add …”; then choose “New Package.” Name the new package `game.jam.PongClone`.
    Notice the slight difference in the files listed in the preceding. Do you know
    why this is? Recall from our review of the `MmgCore` API that the C# implementation
    doesn’t need a `MainFrame` class due to the underlying framework’s implementation.


    The first class we’ll add to the project is the static main class. It just so
    happens we have a static main class all set up and ready to use. Copy the `MmgApiGame`
    class from the game engine project’s `MmgCore` library. Paste the file into the
    PongClone project and rename the file and class so they are both named `PongClone`.
    There is one reference to the `MmgGameApi` class in the file. Search for it and
    replace it with the `PongClone` class’ name.


    Make sure to update the `ENGINE_CONFIG_FILE` field so that it has this value,
    `"../cfg/engine_config_mmg_pong_clone.xml"`, which is our game specific engine
    config file. You also have to open the engine config file and change the value
    of the `NAME` entry from `MmgPongClone` to `PongClone`. Now your new game is plugged
    into the proper engine config file and resource directories, all of which are
    named `PongClone`. Make sure to rebuild the project once it compiles for either
    C# or Java. This will ensure a project output directory is created.


    You can perform this refactoring operation automatically in the NetBeans IDE if
    you have both projects open. If so, you can choose to use the “Refactor Paste”
    option, which will take care of renaming the class for you. Add the following
    import to the top of the `PongClone.java` class below the other import listings:


    ```

    import net.middlemind.MmgGameApiJava.MmgCore.*;

    ```


    This will import all the `MmgCore` API classes we need. In the C# version of the
    PongClone project, you’ll need to delete the `Game1.cs` and `Program.cs` files
    from the project before pasting a copy of the `MmgApiGame.cs` file into the project.
    Add the following folders to the project: `src/game/jam/PongClone`. This is where
    we’ll keep our class files, and it loosely mimics the Java version’s packages.
    You’ll have to refactor the file name. Right-click the new file and select the
    “Rename …” option. Rename the file and the class to `PongClone`.


    You can refactor the class name by opening the file and selecting the class’ name;
    right-click it and select the “Rename …” option from the context menu. Type in
    the name `PongClone` and press Enter. You’ll have to add the following library
    reference to the top of the file at the bottom of the current list:


    ```

    using net.middlemind.MmgGameApiCs.MmgCore;

    ```


    The class’ header for the `PongClone.cs` class should look similar to the following
    snippet.


    ```

    1 namespace game.jam.PongClone {

    2 {

    3      public static class PongClone

    4      { ... }

    5 }

    Listing 16-1

    PongClone Class Definition 1

    ```


    Next up, we’ll make adjustments to the Java and C# projects. If you’re following
    along in Java, open up the NetBeans IDE and the PongClone project. Right-click
    the project and open the properties popup. Select the “Run” option from the categories
    list. Find the “Main Class” text field and click the “Browse …” button.


    Select the `PongClone` class as the default main class. The adjustment that is
    necessary for the C# version of the PongClone project is to open the `PongClone`
    class and change the name of the `AltMain` method to `Main`.


    Now that we have a foundation built, we can add a few more classes to move the
    project along. These classes are actually defined in the `MmgCore` API, but we
    want to extend those classes and define them locally so that we can have full
    control over the game’s code. The next class we’ll work on is the `MainFrame`
    class. Again, this only applies to the Java version of the game project.


    The C# version does not have an equivalent `MainFrame` class. The underlying framework’s
    implementation is such that only the `GamePanel` class is necessary. With regard
    to the Java version, however, we want to extend the `MmgCore` API’s `MainFrame`
    class and preserve its functionality. Create a new empty class in the PongClone
    project. It should reside in the same package and folder as the static main class.
    The class is concise, so I’ll list it here.


    ```

    01 public class MainFrame extends net.middlemind.MmgGameApiJava.MmgCore.MainFrame
    {


    03     public MainFrame(int WinWidth, int WinHeight, int PanWidth, int PanHeight,
    int GameWidth, int GameHeight) {

    04         super(WinWidth, WinHeight, PanWidth, PanHeight, GameWidth, GameHeight);

    05     }


    07     public MainFrame(int WinWidth, int WinHeight) {

    08         super(WinWidth, WinHeight);

    09     }

    10 }

    Listing 16-2

    MainFrame Java Setting Up Core Code 1

    ```


    Notice that I don’t import the `MmgCore` library in this class. If I did that,
    there would be two classes named `MainFrame` in the current scope, and that could
    get confusing. By not importing the library, it forces my references to be explicit.
    You can clearly see where I’m using the `MmgCore` API’s `MainFrame` class and
    where I’m not. Note that we define the same class constructors that exist in the
    API’s `MainFrame` class, and we use the `super` keyword to call the super class’
    constructor.


    What we’ve done here is bring the functionality of the `MmgCore` API’s `MainFrame`
    class into the current project’s package through class extension as shown in the
    preceding. That takes care of the second main step we needed to complete. The
    next class for us to work on is the `GamePanel` class.


    We’re going to be using a similar technique of extending super class functionality,
    or base class functionality if you’re following along in C#. By extending and
    customizing the `MmgCore` API’s `GamePanel` class, we can leverage all the existing
    code and add new, project-specific functionality at the same time.


    Taking a look at the game’s general specifications, I can see that I need to support
    four game screens. I know that the default `GamePanel` class has support for a
    splash screen, a loading screen, and a main menu screen. I also know that the
    splash and loading screens use generic events, from the `MmgCore` API, to indicate
    when the game state needs to change.


    Now if all that information seemed to be pulled out of thin air, it wasn’t. A
    lot of it was covered in Part 2 of this text. Remember I have the added benefit
    of hindsight so I can rattle off class features only because I’ve already done
    all the difficult work of figuring everything out ahead of time.


    I wanted to mention this because software development, and especially video game
    development, rarely goes as smoothly as the game builds we encounter in this text.
    So don’t be discouraged if you run into some rough patches during your game’s
    development. They are a perfectly natural occurrence.'
