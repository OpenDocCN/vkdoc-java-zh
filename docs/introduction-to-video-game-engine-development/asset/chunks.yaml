    ## 其他类：MmgCfgFileEntry


    `MmgCfgFileEntry` 类用于在读写配置文件时保存数据。它是一个小类，但我认为回顾它很重要，因为在设置游戏屏幕时，类配置自动化是一个非常实用的功能。`MmgCfgFileEntry`
    类旨在以键值对的形式保存从特殊文本文件（即类配置文件）中加载的数值或字符串数据。


    ### 枚举


    有一个与 `MmgCfgFileEntry` 类关联的枚举，即 `CfgEntryType` 枚举。它包含三个不同的值：`TYPE_DOUBLE`、`TYPE_STRING`
    和 `NONE`。前两个值用于指示配置条目中存储的数据类型。`NONE` 值用于指示未初始化的状态。


    ### 类字段


    `MmgCfgFileEntry` 有几个描述性字段，我已在下面列出。


