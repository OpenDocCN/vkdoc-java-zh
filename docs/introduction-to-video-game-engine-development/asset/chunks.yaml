    # 5. 高级类


    在本章中，你将回顾 MmgBase API 中的高级类。


    高级类是一组通用的类，它们利用多个基础类来创建更强大的工具。在本章的回顾中，我们将了解以下类：


    *   Mmg9Slice


    *   MmgContainer


    *   MmgLabelValuePair


    *   MmgLoadingBar


    *   MmgSprite


    *   MmgDrawableBmpSet


    ## 高级类：Mmg9Slice


    `Mmg9Slice` 类比我们之前见过的类更高级。该类旨在将 `MmgBmp` 图像分割成九个区域，以便图像可以在不失真的情况下调整大小。此功能主要用于矩形图像，如按钮、框架和窗口背景。图像被分割并调整大小，从而保持四个角不变，同时缩放角之间的直边以满足调整大小的要求。


    ### 类字段


    `Mmg9Slice` 有几个类字段，如下所示。我们接下来将回顾这些字段。


    ```

    private int offset;

    private MmgBmp src;

    private MmgBmp dest;

    清单 5-1

    Mmg9Slice 类字段 1

    ```


    对于这个类，我们只需要回顾三个字段。第一个字段是 `offset` 字段。此字段用于图像分割过程。本质上，`offset` 字段的值是图像将被分割的、距离最近角的偏移位置。这种分割方法保留了角，防止了缩放过程中的拉伸和变形。下一个字段
    `dest` 是一个 `MmgBmp`，它将保存最终缩放后的图像。


    ### 支持方法详情


    `Mmg9Slice` 类有几个支持方法，我们将在此处回顾。需要指出的是，在处理更高级的类时，你需要有使用这些方法的经验。它们可能不会产生你期望的结果。例如，修改
    `src` 字段不会改变目标字段，除非对象被重新初始化。


    ```

    public void SetOffset(int i) { ... }

    public int GetOffset() { ... }

    public void SetSrc(MmgBmp b) { ... }

    public MmgBmp GetSrc() { ... }

    public void SetDest(MmgBmp b) { ... }

    public MmgBmp GetDest() { ... }

    清单 5-2

    Mmg9Slice 支持方法详情 1

    ```


    我们需要回顾的支持方法是我们之前回顾过的类字段的 get 和 set 方法。这些方法很直接，因此我不会在此详细说明。请务必仔细查看它们，并确保理解它们的用法。


    ### 主要方法详情


    `Mmg9Slice` 类有一组主要方法，包括构造函数、类准备、克隆和比较。


    ```

    public Mmg9Slice(int Offset, MmgBmp Src, int w, int h) { ... }

    public Mmg9Slice(int Offset, MmgBmp Src, int w, int h, MmgVector2 Pos) { ... }

    public Mmg9Slice(Mmg9Slice obj) { ... }

    public void MmgDraw(MmgPen p) { ... }

    清单 5-3

    Mmg9Slice 主要方法详情 1


    需要回顾的第一组主要方法以三个构造函数和 `MmgDraw` 方法开始。注意，前两个构造函数基本相同，只是第二个构造函数接受一个 `MmgVector2`
    位置参数。在创建目标图像之前，会先设置偏移量、源图像、宽度和高度。一旦目标图像准备就绪，就会设置位置和可见性。前两个构造函数重载使用了这种模式。


    `Mmg9Slice` 类支持克隆功能。因此，有一个专门的构造函数，它接受一个 `Mmg9Slice` 对象作为参数。该构造函数遵循与前两个相同的一般模式，只是所有值都来自参数对象。这组方法中的最后一个方法是
    `MmgDraw` 方法。此方法很简单，如果可见，则绘制调整大小后的目标图像。


    ```

    public MmgObj Clone() { ... }

    public Mmg9Slice CloneTyped() { ... }

    public boolean ApiEquals(Mmg9Slice obj) { ... }

    public void DrawDest() { ... }

    清单 5-4

    Mmg9Slice 主要方法详情 2


    第二组主要方法以 Clone 方法开始。注意 `Clone` 方法如何使用接受 `Mmg9Slice` 对象的构造函数重载来创建一个新的、唯一的副本。第一个
    `Clone` 方法返回一个 `MmgObj` 作为参数。第二个版本的 Clone 方法 `CloneTyped` 返回一个 `Mmg9Slice` 对象。`ApiEquals`
    方法是一个 API 级别的比较方法，用于测试两个 `Mmg9Slice` 实例之间的相等性。


    我们需要回顾的最后一个方法是 `DrawDest` 方法。此方法负责对源图像执行九宫格切片操作。如果你更改了某些类字段，则需要重新运行此方法以更新目标图像。在使用此类时请记住这一点。


    ### 演示：Mmg9Slice 类


    此代码示例来自 `ScreenTestMmg9Slice` 类的 `LoadResources` 方法。由于 `Mmg9Slice` 类比之前的类更高级，我们需要加载一个图像资源作为源
    `MmgBmp` 图像。请务必通过运行示例应用程序并查看此演示屏幕来跟进。


    ```

    01 bground = MmgHelper.GetBasicCachedBmp("popup_window_base.png");

    02 MmgHelper.CenterHorAndVert(bground);

    03 bground.SetX(bground.GetX() - MmgHelper.ScaleValue(200));

    04 bground.SetY(bground.GetY() - MmgHelper.ScaleValue(32));

    05 AddObj(bground);


    07 bgroundLabel = MmgFontData.CreateDefaultBoldMmgFontLg();

    08 bgroundLabel.SetText("原始 MmgBmp");

    09 bgroundLabel.SetPosition(bground.GetPosition().Clone());

    10 bgroundLabel.SetY(bgroundLabel.GetY() - bgroundLabel.GetHeight());

    11 AddObj(bgroundLabel);


    13 menuBground = new Mmg9Slice(MmgHelper.ScaleValue(16), bground, width, height);

    14 menuBground.SetPosition(MmgVector2.GetOriginVec());

    15 menuBground.SetWidth(width);

    16 menuBground.SetHeight(height);

    17 MmgHelper.CenterHorAndVert(menuBground);

    18 menuBground.SetX(menuBground.GetX() + MmgHelper.ScaleValue(200));

    19 menuBground.SetY(menuBground.GetY() + MmgHelper.ScaleValue(36));

    20 AddObj(menuBground);

    清单 5-5

    Mmg9Slice 类演示 1


    在前面的示例代码片段中，源图像在第 1-5 行加载。`MmgBmp` 图像实例通过调用 `GetBasicCachedBmp` 方法并传入文件名作为图像资源键来加载。如果图像存在于资源缓存中，这将从缓存中拉取指定的图像。此特定图像是默认图像集的一部分，因此它始终被加载并可供使用。在第
    13 行，使用源图像 `bground` 创建了一个新的 `Mmg9Slice` 对象，并指定了新的宽度和高度来缩放源图像。


    注意，在第 15 和 16 行，`Mmg9Slice` 对象的尺寸被再次确认。该对象在第 20 行被添加到当前示例游戏屏幕的可绘制对象列表中；这将九宫格切片对象插入到默认的绘制例程中。这就是使用
    `Mmg9Slice` 类来调整弹出窗口背景图像大小并将其显示在屏幕上所需的全部操作。


    ## 高级类：MmgContainer


    `MmgContainer` 类，顾名思义，是一个包含 `MmgObj` 实例的容器。这包括扩展了 `MmgObj` 类的对象。你可以开始看到我们迄今为止构建的通用游戏引擎的强大之处。例如，一个
    `MmgContainer` 可以容纳绘制游戏信息 HUD 所需的所有 `MmgBmp` 对象。然后，你可以通过将容器对象的 `isVisible` 字段设置为
    false 来使整个图像集不可见。


    `MmgContainer` 类旨在容纳其他对象，但它对其子对象没有尺寸或位置的概念。它确实扩展了 `MmgObj` 类，因此你可以为容器分配尺寸和位置，以帮助为容器的使用增加结构。注意，这些设置不会影响容器内容的绘制方式。

