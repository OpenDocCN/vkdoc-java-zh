    MmgLabelValuePair 支持方法详情 1

    ```


    上面列出的第一组支持方法可帮助您管理 `value` 字段。您可以使用 get 和 set 方法访问 `value` 字段。您还可以指定要显示的文本和要使用的字体。类的
    `label` 字段也存在相同的一组方法。这使您可以对用于渲染类的文本和字体进行大量控制。


    下一组方法允许您控制 `label` 和 `value` 字段的属性。您可以使用 `GetFontSize` 方法来获取 `label` 的字体大小。由于
    `label` 和 `value` 字段彼此独立，因此您可能设置了两种不同的字体大小。`GetFontSize` 方法不会尝试决定使用哪种字体大小（`label`
    还是 `value`）；它总是返回 `label` 的字体大小。


    `SetFontSize` 方法性质类似。您可以使用此方法更新标签和值对象的字体大小。此方法以及许多其他更改 `label` 和 `value` 属性的方法，都会尝试准备该类并对齐文本以便显示。如果您不希望运行类准备步骤，请在调用支持方法之前将
    `skipReset` 类字段设置为 `true`。


    这组方法中的下一个方法是 `SetMmgColor` 方法。虽然这看起来像是一个简单的 set 方法，但事实并非如此。此方法将设置容器以及 `label`
    和 `value` 字段的颜色属性。上面列出的最后一组方法用于定位 `MmgLabelValuePair` 类，可以通过设置其位置、调整水平偏移或重置标签和值对象的定位来实现。


    定位方法 `SetPosition`、`SetX` 和 `SetY` 用于调整标签-值对的位置。请注意，使用这些方法只会更新标签对象。一旦设置了标签的位置，定位方法将调用类的
    `Reset` 方法。`Reset` 方法将负责对齐 `label` 和 `value` 文本。如果您不希望该类自动准备，请确保将 `skipReset`
    字段设置为 `true`。如果修改完类后它没有自动运行，请始终记得调用 `Reset` 方法。

