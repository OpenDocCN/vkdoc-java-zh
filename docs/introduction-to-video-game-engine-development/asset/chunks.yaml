    of the resource loading process. This method is defined by the `Runnable` interface
    and is called as part of the thread start process. You can, however, call the
    method directly yourself if need be.


    ### Demonstration: RunResourceLoad Class


    For the `RunResourceLoad` class’ demonstration section, we’ll take a look at the
    sound and image resource loading process – specifically, the part of the process
    where the target resource files to load are identified. The steps are identical
    for sounds and images, so I’ll only detail the image loading steps in the following.


