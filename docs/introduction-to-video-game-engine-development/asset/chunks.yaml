    by the class has its event handler set, lines 2–4\. The next snippet of code is
    from the `ScreenTestMmgScrollVert` class’ `LoadResources` method from the MmgTestSpace
    library. In this code block, a new instance of the `MmgScrollVert` class is initialized.
    Notice that on line 5 the event handler for the scroll pane widget is set to the
    game screen.


    That brings us to the last piece of the puzzle – the event handler method from
    the game screen class, `ScreenTestMmgScrollVert`. On line 2, we check to see if
    the event received is an event we can process by looking at the `id` and `type`
    fields of the received object. If we can process the event, an `MmgVector2` object
    is cast from the `extra` field, line 3. In this case, we use the click information
    to update an `MmgFont instance`’s text.


    ## Chapter Conclusion


    In this chapter, we completed a review of the “other” classes. The classes we
    covered are very useful, and I’ll summarize them as follows:


    *   MmgCfgFileEntry: A class that models a line of data in a class config file.
    This class is used to store data from a class config file line and use it to set
    up a game screen.


    *   MmgEvent: A general event class that provides basic event support to the API.


    *   MmgEventHandler: An event handler interface. This interface is used to set
    up an event handler to receive registered events. When used in combination with
    the MmgEvent class, the two classes constitute a simple event system.


    There is subtle power in these classes. Take a minute to think about the event
    system configuration. Notice how general it is. Like most of the functionality
    we’re building up to support the game engine, we have a generalized event system
    that you can use in your next game. When working with events, be sure not to abuse
    them. Think about using events when one class needs to notify another class about
    something that happened. Use that as a guide when implementing events.'
