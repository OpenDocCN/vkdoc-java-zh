    4 and 5, and the `MmgBmp` object is added to the game screen’s list of drawable
    objects on line 6.


    The next two blocks of code are very similar to the lines we just reviewed, lines
    8–11 and 12–16. In these blocks of code, two more images are loaded up and positioned,
