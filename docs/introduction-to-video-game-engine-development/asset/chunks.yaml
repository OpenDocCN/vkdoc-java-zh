- fmt: '### Demonstration: `MmgTextBlock` Class


    The demonstration code for this class is from the `LoadResources` method of the
    `ScreenTestMmgTextBlock` class in the `MmgTestSpace` package. Be sure to run the
    example application and view this game screen so you can see the class in action.


    ```

    01 txt = "Lorem ipsum dolor sit ...";


    03 MmgTextBlock.SHOW_CONTROL_BGROUND_STORY_BOUNDING_BOX = true;

    04 txtBlock = new MmgTextBlock();

    05 txtBlock.SetLineHeight(MmgFontData.GetTargetPixelHeightScaled() + MmgHelper.ScaleValue(5));

    06 txtBlock.SetHeight(MmgHelper.ScaleValue(300));

    07 txtBlock.SetWidth(MmgHelper.ScaleValue(400));

    08 txtBlock.SetPaddingX(MmgHelper.ScaleValue(txtBlock.GetPaddingX()));

    09 txtBlock.SetPaddingY(MmgHelper.ScaleValue(txtBlock.GetPaddingY()));

    10 txtBlock.PrepLinesInBox(txtBlock.GetLinesInBox());

    11 txtBlock.PrepTextSplit(txt, MmgFontData.GetFontNorm(), MmgFontData.GetFontSize(),
    MmgHelper.ScaleValue(375), FontType.NORMAL);

    12 txtBlock.SetColor(MmgColor.GetWhite());


    14 MmgHelper.CenterHorAndVert(txtBlock);

    15 txtBlock.PrepPage(0);


    17 //Must be done after the text split to set the position of each line of text.

    18 txtBlock.SetPosition(txtBlock.GetPosition());

    19 AddObj(txtBlock);

    Listing 6-12

    MmgTextBlock Class Demonstration 1

    ```


    The code snippet is fairly direct. The string to be parsed and displayed is initialized
    on line 1. It’s actually very long, so I cut it down here. We set the show bounding
    box flag to true so we can see the dimensions of the text block object. A default
    `MmgTextBlock` is created on line 4. The line height is set to the default font
    size’s height plus a padding factor, line 5.


    On lines 6–9, we have a series of calls that are made just to ensure the values
    have been properly scaled. The placeholders for lines of text inside the text
    block are initialized on line 10. The bulk of the work is done on line 11 with
    a call to the `PrepTextSplit` method. This call creates the entries for the preformatted
    lines of text. On line 12, the color of each placeholder line is set to the color
    white with a call to the `SetColor` method.


    The last two lines of code in the preceding snippet are very important. You must
    call the `SetPosition` method at least once to position the object, which forces
    the repositioning of all child objects including the placeholder lines of text
    that are displayed on the game screen. Lastly, you have to add the object to the
    game engine’s drawing routine with a call to the `AddObj` method.


    It should stand out to you how we are just passing in a very complex object and
    it will get rendered along with everything else. That is the power of the general
    game engine we’ve built. It’s very easy to add new and interesting classes into
    the drawable set of objects. I hope you’ll add some of your own.


    ## Widget Classes: Scroll Pane Classes


    The next class review will apply to a group of classes known as the scroll pane
    classes. These are the `MmgScrollHor`, `MmgScrollVert`, and `MmgScrollHorVert`
    classes of the MmgBase API. They all function very similarly, so I won’t cover
    each one individually. We’ll review the `MmgScrollHor` class, and you can take
    what you’ve learned about it and apply it to the other two scroll pane classes.


    ### Static Class Members


    There are a couple of static class fields for us to review. Take a look at the
    following listing before we review them.


    ```

    public static boolean SHOW_CONTROL_BOUNDING_BOX = false;

    public static int SCROLL_HOR_CLICK_EVENT_TYPE = 0;

    public static int SCROLL_HOR_CLICK_EVENT_ID = 3;

    public static int SCROLL_HOR_SCROLL_LEFT_EVENT_ID = 4;

    public static int SCROLL_HOR_SCROLL_RIGHT_EVENT_ID = 5;

    Listing 6-13

    MmgScrollHor Static Class Members 1

    ```


    The first entry controls the display of a bounding box that marks the dimensions
    of the scroll pane. This field controls all horizontal scroll panes, not just
    the one you’re working with. The next four fields are event ID and type entries
    used to describe the different events supported by the scroll pane. The `MmgScrollHor`
    scroll pane supports left and right scroll events and scroll pane click events.


    ### Class Fields


    The `MmgScrollHor` class is on the complex side, and as such it has a number of
    fields that allow you to control all sorts of different aspects of the class and
    its functionality. All that is well and good; but with a class this complex, you
    really want to start at a baseline, the demonstration code, and work from there
    making small changes until you understand exactly how the class functions. I’ve
    broken down the class fields into groups and listed them as follows.


    ```

    //Viewport and scrollpane fields

    private MmgBmp viewPort;

    private MmgRect viewPortRect;

    private int viewPortWidth;

    private MmgBmp scrollPane;

    private MmgRect scrollPaneRect;

    private int scrollPaneWidth;

    //Scroll bar button display fields

    private int scrollBarLeftRightButtonWidth;

    private MmgBmp scrollBarLeftButton;

    private MmgRect scrollBarLeftButtonRect;

    private MmgBmp scrollBarRightButton;

    private MmgRect scrollBarRightButtonRect;

    private MmgBmp scrollBarCenterButton;

    private MmgRect scrollBarCenterButtonRect;

    private MmgColor scrollBarCenterButtonColor;

    private int scrollBarCenterButtonWidth;

    //Scroll bar display fields

    private boolean scrollBarVisible = false;

    private MmgColor scrollBarColor;

    private int scrollBarHeight;

    private int intervalX;

    private double intervalPrctX;

    private int offsetXScrollBarCenterButton;

    private int offsetXScrollPane;

    private boolean isDirty;

    //Event fields

    private MmgEvent clickScreen = new MmgEvent(null, "hor_click_screen", MmgScrollHor.SCROLL_HOR_CLICK_EVENT_ID,
    MmgScrollHor.SCROLL_HOR_CLICK_EVENT_TYPE, null, null);

    private MmgEvent clickLeft = new MmgEvent(null, "hor_click_left", MmgScrollHor.SCROLL_HOR_SCROLL_LEFT_EVENT_ID,
    MmgScrollHor.SCROLL_HOR_CLICK_EVENT_TYPE, null, null);

    private MmgEvent clickRight = new MmgEvent(null, "hor_click_right", MmgScrollHor.SCROLL_HOR_SCROLL_RIGHT_EVENT_ID,
    MmgScrollHor.SCROLL_HOR_CLICK_EVENT_TYPE, null, null);

    Listing 6-14

    MmgScrollHor Class Fields 1

    ```


    The first group of fields describe the view port or the static portion of the
    scroll pane that presents scroll bars and a panel where the scroll pane is visible.
    These are fields describing its position and dimension using an `MmgRect` object
    and the `viewPortWidth` and `scrollPaneWidth` fields that describe the width of
    each object. It’s important to note that some class fields are merely descriptive
    and do not alter the object in any way. You’ll pick up on how things work with
    more experience; for now, we’ll focus on going over the basics.


    The second group of fields describe the scroll pane’s scroll bar buttons. In a
    horizontal scroll pane, there is one scroll bar that sits underneath the scroll
    pane’s window. That scroll bar has two side buttons and a center button. The left
    and right buttons are functional but the center slider is not as mouse drag support
    has not been implemented in the scroll pane classes. There is one field to describe
    both the left and right scroll bar buttons’ widths, `scrollBarLeftRightButtonWidth`,
    and one to describe the center button’s width, `scrollBarCenterButtonWidth`. You
    can alter the color of the center button using the `scrollBarCenterButtonColor`
    field, and there are `MmgBmp` button and `MmgRect` entries for all three buttons.


    I should also mention that this class uses a few default resources. These are
    resources that are considered part of the game engine’s runtime and load up as
    part of the auto load directories. This should give you a solid guide on how to
    customize the scroll pane resources for your own games.'
