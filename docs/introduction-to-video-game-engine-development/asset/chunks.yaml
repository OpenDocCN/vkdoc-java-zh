    of the file name as shown in the example. Lines 15 to 17 show you how to position
    the `MmgBmp` object and add it into the drawing routine.


    The next use of the `MmgBmp` class we’ll review loads an image into the image
    cache with the specified key, line 24. The key can be any string, but in this
    example, we stick to the auto loaded resource technique of using the file name.
    You can use this approach to load image resources directly from the file system
    and ensure that they are cached for future use.'
