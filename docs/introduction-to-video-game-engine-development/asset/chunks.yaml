- fmt: '# Dynamic Settings: `DatConstantsEntry`


    The game engine has the ability to load values from an XML file into the static
    fields of certain classes. Can you think of a reason why we might want to limit
    this to static class fields? Using static fields requires less initialization
    because the field being updated can be accessed statically with no class initialization.


    This allows us to data drive the setup of the game engine and the game, through
    the use of settings and config files. We can create multiple config files for
    one game or many config files for many games. It’s really up to you. The `DatConstantsEntry`
    class is designed to hold a single row of data from a game engine config file.


    The engine also lets you specify a config file as one of the default command-line
    arguments. If you add the text `ENGINE_CONFIG_FILE=` followed by a valid config
    file to the end of your game’s launch command, you can dynamically set the config
    file the engine uses at runtime. If the game’s launch commands seem unfamiliar,
    feel free to flip back to Chapter [10](#508392_1_En_10_Chapter.xhtml) for a refresher.


    The ability to dynamically alter game settings is a very powerful tool, but be
    careful. When you override settings via a config file, you may not be aware of
    this when looking at, or even testing, the code. This can leave you wondering
    why your code driven values aren’t being applied. Remember to check all the different
    ways a value can be set, including config files.


    ## Class Fields


    The `DatConstantsEntry` class’ fields are used to describe a value that is to
    be stored in a target static field. Let’s take a look!


    ```

    public String key;

    public String val;

    public String type;

    public String from;

    Listing 11-1

    DatConstantsEntry Class Fields 1

    ```


    The `key` field is not only the key by which the data entry is stored, but it’s
    also the exact name of the destination field that will hold the data. You must
    make sure that the field type and the data you’re attempting to store in it match
    up. The `val` field is a string representation of the value that will be stored
    in the target field. The string will be converted accordingly as part of the process
    used to set the target field’s value.


    The `type` field is used to describe the data held in the `val` field. The `type`
    field can be set to `int`, `float`, `double`, `short`, `string`, or `bool`. Again,
    make sure that the target field and the type of data being stored are compatible.
    The last entry in the list is the `from` field. This field should be set to the
    target class that the static field, the name of which is stored in the `key` field,
    belongs to.


    ## Main Method Details


    The class’ main methods are all constructors. There are three, listed in the following.
    Make sure to take a look at them before we review them.


    ```

    public DatConstantsEntry(String k, String v) { ... }

    public DatConstantsEntry(String k, String v, String t) { ... }

    public DatConstantsEntry(String k, String v, String t, String f) { ... }

    Listing 11-2

    DatConstantsEntry Main Method Details 1

    ```


    I’ve arranged the constructors in order of increasing complexity. I should mention
    that the class defaults the `type` field to `int` and the `from` field to the
    `GameSettings` class when there are no arguments to use for values. With that
    in mind, the first two constructors are just quicker ways to initialize a `GameSettings`
    config file entry. The last constructor listed is probably the one you’ll use
    the most. This entry lets you specify each field directly using constructor arguments.


    That concludes the `DatConstantsEntry` class review. Next, we’ll take a look at
    the class in detail. I would normally segue into a demonstration section here,
    but we’ll come across the `DatConstantsEntry` class again as part of the config
    file import process, so instead we’re going to do an in-depth review of the config
    file’s format.


    ## In Depth: `DatConstantsEntry`


    First, let’s review where the game engine config files are normally stored. Of
    course, you can specify your own path to these files as part of the game’s launch
    arguments. There are a few default game engine config files included in the game
    engine project for you to take a look at.


    The normal structure of a game project’s setup should include a config folder,
    `cfg`, on the root of the project. The following is a simple diagram showing the
    setup of the `cfg` folder.


    ```

    MmgGameApiJava

    |-> cfg (Resource and Configuration Directory)

    |-> class_config (Class Config Files)

    |-> playable (Audio Resources)

    |-> auto_load (Global Audio Resources)

    |-> sound1.wav

    |-> MmgTestSpace (Project Specific Audio Resources)

    |-> jump2.wav

    |-> drawable (Image Resources)

    |-> auto_load (Global Image Resources)

    |-> a_btn.png

    |-> MmgTestSpace (Project Specific Image Resources)

    |-> b_btn.png

    |-> engine_config.xml (Direct Path Game Engine Config)

    |-> engine_config_mmg_test_space.xml

    |-> engine_config_mmg_dungeon_trap.xml

    Listing 11-3

    DatConstantsEntry in Depth 1

    ```


    The default game engine config file to load is specified in the static main class’
    `ENGINE_CONFIG_FILE` field. This defaults to the file `engine_config.xml`. You
    can open the config file in your IDE for viewing, but I’ll print a short example
    of one here.


    ```

    Listing 11-4

    DatConstantsEntry in Depth 2

    ```


    You can use this XML file, `engine_config.xml`, as a template for starting a new
    file for your next game. The first line in the file is a standard XML header.
    The second entry defines the main tag used, the `engineconfig` tag. You must specify
    a version number as an attribute to this tag.


    Can you think of a reason why this would be a good idea? Using this attribute,
    you can specify a version number allowing you to create new XML config file formats
    in the future. As long as you have a unique version number, you can use that information
    to change the code that parses the XML file. With this setup, you can future-proof
    your game configurations.


    Lines 3–6 hold the actual configuration information. The XML tags match up perfectly
    with the `DatConstantsEntry` class’ fields, and you can see that part of the loading
    process involves simply converting the XML entries to a list of `DatConstantsEntry`
    objects.


    # Dynamic Settings: `GameSettingsImporter`


    The `GameSettingsImporter` class is responsible for parsing a game engine config
    file and generating an array of `DatConstantsEntry` objects based on the config
    file’s `entry` tags. Let’s review some code!


    ## Class Fields


    This class has only two fields, listed in the following group, for us to worry
    about.


    ```

    public Hashtable values;

    public String version;

    Listing 11-5

    GameSettingsImporter Class Fields 1

    ```


    The first field is a data structure used to hold the config file entries. Notice
    that the data structure is a key-value pair structure. The key in this case will
    be the `key` field of the associated `DatConstantsEntry` object. In the C# version,
    this field would be a `Dictionary` object instead of a `Hashtable`. The next field
    is the config file version. We’ve encountered this value earlier when we covered
    the config file’s `engineconfig` tag.


    ## Support Method Details


    The `GameSettingsImporter` class has two sets of get and set methods listed in
    the following group.


    ```

    public Hashtable GetValues() { ... }

    public void SetValues(Hashtable v) { ... }

    public String GetVersion() { ... }

    public void SetVersion(String v) { ... }

    Listing 11-6

    GameSettingsImporter Support Method Details 1

    ```


    The first set of support methods gives you access to the values that have been
    loaded up. The second set of methods gives you access to the version number of
    the engine config file.'
