- fmt: '### Main Method Details


    The main methods of the `MmgLabelValuePair` class include constructors, cloning
    methods, and drawing and class preparation methods. The list of methods to review
    in the following only has three constructors, but the class has a few more. Make
    sure to read them over and understand how they work.


    ```

    public MmgLabelValuePair() { ... }

    public MmgLabelValuePair(MmgFont fontLbl, MmgFont fontVal) { ... }

    public MmgLabelValuePair(MmgLabelValuePair obj) { ... }

    public MmgObj Clone() { ... }

    public MmgLabelValuePair CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    Listing 5-13

    MmgLabelValuePair Main Method Details 1

    ```


    The first constructor takes no arguments and sets default values for the label
    and value fonts as well as padding and dimensions. This constructor doesn’t set
    any text values for the `MmgFont` instances. The class dimensions are set to zero
    before a call to the `Reset` method. The `Reset` method will calculate the dimensions
    of the object and adjust the positioning of the label and value fonts based on
    their size.


    The second constructor listed in the preceding takes two `MmgFont` arguments,
    one for the `label` and one for the `value`. This is probably the most common
    use case, passing in prepared `MmgFont` objects with text, style, and size already
    configured. The last constructor listed should look familiar. This is the specialized
    constructor that takes an `MmgLabelValuePair` object as an argument and uses it
    to create a new, unique copy of the object.


    That brings us to the class’ cloning methods. The `Clone` and `CloneTyped` methods,
    as we’ve seen before, use the specialized constructor to create a new object and
    return it either casted to an `MmgObj` object or as an `MmgLabelValuePair` instance.
    The next method in the list is the `Reset` method. This method is very important
    to the class’ functionality. It’s designed to be called after any support method
    that changes the label `MmgFont`, value `MmgFont`, or the object’s position. Last
    but not least, the `MmgDraw` method is responsible for drawing the label and value
    to the screen as part of the game engine’s drawing routine.


    ### Demonstration: MmgLabelValuePair Class


    The snippet of example code listed in the following is from the `LoadResources`
    method of the `ScreenTestMmgLabelValuePair` class in the MmgTestSpace package,
    or namespace in C#. The demonstration shows you how to initialize an `MmgLabelValuePair`
    object properly.


    ```

    01 labelFont = MmgFontData.CreateDefaultBoldMmgFontLg();

    02 labelFont.SetMmgColor(MmgColor.GetGrayWolf());

    03 labelFont.SetText("Label1:");


    05 valueFont = MmgFontData.CreateDefaultBoldMmgFontSm();

    06 valueFont.SetMmgColor(MmgColor.GetBlueGray());

    07 valueFont.SetText("Value1");


    09 lvPair1 = new MmgLabelValuePair(labelFont, valueFont);

    10 MmgHelper.CenterHorAndVert(lvPair1);

    11 lvPair1.SetY(lvPair1.GetY() - MmgHelper.ScaleValue(30));

    12 AddObj(lvPair1);

    Listing 5-14

    MmgLabelValuePair Class Demonstration 1

    ```


    In the first block of code, a new `MmgFont` object is created with the text and
    color specified on lines 2 and 3. Notice that on line 1 the large font instance
    is created from a static helper method of the `MmgHelper` class. The second block
    of code, lines 5–7, creates and configures the value `MmgFont` instance. The last
    block of code, lines 9–12, shows the instantiation of a new `MmgLabelValuePair`
    object using the two `MmgFont` objects we just created.


    Notice that all we need to do is call the constructor with the label and value
    objects. As we’ve seen before, the constructor takes care of prepping the class
    via the inherent call to the `Reset` method. In the next two lines of code, lines
    10 and 11, the object is centered horizontally and positioned vertically before
    being added to the game engine’s drawing routine with a call to the `AddObj` method.


    ## Advanced Classes: MmgLoadingBar


    The `MmgLoadingBar` class is an advanced class that uses `MmgBmp` objects to create
    a new loading bar. The loading bar is used by the `MmgLoadingScreen` class as
    part of the resource loading process. You may find loading bars useful not only
    during the game’s startup process but as a UI element. For instance, you could
    use the class as a health bar or charge meter.


    ### Class Fields


    The `MmgLoadingBar`’s class fields are listed in the following. There are only
    seven fields, and they are used to hold a foreground image, a background image,
    positioning, and loading bar fill properties.


    ```

    //Loading bar images

    private MmgBmp loadingBarBack;

    private MmgBmp loadingBarFront;

    //Padding methods

    private int xPadding;

    private int yPadding;

    //Loading bar fill methods

    private float fillAmt;

    private int fillHeight;

    private int fillWidth;

    Listing 5-15

    MmgLoadingBar Class Fields 1

    ```


    The first class field, `loadingBarBack`, is used to draw the background image
    of the loading bar. In most cases, you’ll want to use a solid color for the loading
    bar’s back image. This image will be resized to indicate the loading progress,
    health, or charge bar level. The following class field, `loadingBarFront`, is
    also an `MmgBmp` object; and it’s used as the foreground of the loading bar. This
    is the image that covers the actual bar. It’s usually a rectangle- or pill-shaped
    image with the center cut out to allow for the background, progress bar, image
    to be visible.


    The second set of class fields are used to provide a padding adjustment to the
    position of the `loadingBarBack` image. You can adjust the `xPadding` and `yPadding`
    to get the loading bar to fit nicely in the cut-out window of the `loadingBarFront`
    image. The last set of fields are used to describe the height, width, and fill
    amount used to resize the `loadingBarBack` image to match the loading bar’s progress.
    The `fillAmt` field holds a value that ranges from 0.0 to 1.0. This value is used
    to calculate the proper width of the `loadingBarBack` image. In this way, the
    image’s width reflects the progress percentage stored in the `fillAmt` class field.'
