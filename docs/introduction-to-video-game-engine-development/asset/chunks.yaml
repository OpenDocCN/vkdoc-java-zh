- fmt: '# 12. Event Handlers


    In this chapter, we’re going to review all of the event handlers that are defined
    in the MmgCore API. The new event handlers we’ll cover are for generic, resource
    loading, and main menu events. We’ll also look at event handlers implemented as
    an interface and as a class. The classes we’ll review in this chapter are listed
    in the following:


    - `GenericEventMessage`

    - `GenericEventHandler`

    - `LoadResourceUpdateMessage`

    - `LoadResourceUpdateHandler`

    - `HandleMainMenuEvent`


    ## Event Handlers: `GenericEventMessage`


    The `GenericEventMessage` class is a new event class designed to work with the
    MmgCore API. Now you might be wondering why we need a new event class when the
    MmgBase API already has one, the `MmgEvent` class. There is a good reason for
    it in this particular case; the `GenericEventMessage` is designed to work with
    the classes of the MmgCore API, as you’ll see in just a bit.


    ### Class Fields


    The `GenericEventMessage` class is very concise. There are only three class fields
    for us to review, listed in the following group.


    ```

    public int id;

    public Object payload;

    public GameStates gameState;

    Listing 12-1

    GenericEventMessage Class Fields 1

    ```


    The first field listed is the `id` field. This integer is used to identify the
    type of `GenericEventMessage` being sent. Note that it’s ultimately your responsibility
    to define events and assign them unique IDs. The second field in the list is the
    `payload`. The `payload` field is an instance of the framework’s `Object` class,
    or `object` if you’re following along in C#.


    The `payload` field is designed to be general in nature and hold any object you
    need to include in the event. You can use this field to add data to the event
    message. The last field listed in the preceding is the `gameState` field. We’ve
    encountered the `GameStates` enumeration before during the `GamePanel` class’
    review.


    They are used to track game screens and assign them to a unique game state. The
    MmgBase API has no real concept of a game state. It has no real concept of a game
    really. It’s just a generalized set of powerful game-building classes. It’s not
    until we reach the MmgCore API that the concepts of a game and a game state are
    well defined.


    It’s for this reason that it makes more sense to create a new, MmgCore API, event
    class that’s designed to work with the objects and concepts at this level of the
    game engine. Next, we’ll take a look at the class’ support methods.


    ### Support Method Details


    The `GenericEventMessage` class has only a few class fields, so we should expect
    to see a reasonable number of support methods to review.


    ```

    public int GetId() { ... }

    public Object GetPayload() { ... }

    public GameStates GetGameState() { ... }

    Listing 12-2

    GenericEventMessage Support Method Details 1

    ```


    The support methods listed in the preceding are very direct, so I won’t go into
    too much detail about them. Each method listed provides get access to the associated
    class field.


    ### Main Method Details


    There is only one main method for us to look at, the class constructor listed
    in the following.


    ```

    public GenericEventMessage(int Id, Object Payload, GameStates GameState) { ...
    }

    Listing 12-3

    GenericEventMessage Main Method Details 1

    ```


    This is the only main method we have to review. It’s a class constructor that
    sets the class’ fields to the associated argument.


    ### Demonstration: `GenericEventMessage` Class


    The snippet of code for this demonstration section is from the `GamePanel` class’
    `HandleGenericEvent` method. First, let’s quickly take a look at the class’ definition.


    ```

    public class GamePanel implements GenericEventHandler, GamePadSimple { ... }

    Listing 12-4

    GenericEventMessage Class Demonstration 1

    ```


    Notice that the class implements the `GenericEventHandler` interface. This means
    that this class can register as an event handler and receive `GenericEventMessage`
    events. Let’s take a look at how the same class is defined in the C# version of
    the game engine.


    ```

    public class GamePanel : Game, GenericEventHandler, GamePadSimple { ... }

    Listing 12-5

    GenericEventMessage Class Demonstration 2

    ```


    They really do look almost exactly the same. The C# version also implements the
    `GenericEventHandler` interface just with slightly different syntax than the Java
    version. Let’s direct our attention to the `HandleGenericEvent` method of the
    `GamePanel` class from the MmgCore API. I’ve detailed the method in the following.


    ```

    01 public void HandleGenericEvent(GenericEventMessage obj) {

    02     if (obj != null) {

    03         if (obj.GetGameState() == GameStates.LOADING) {

    04             if (obj.GetId() == ScreenLoading.EVENT_LOAD_COMPLETE) {

    05                DatExternalStrings.LOAD_EXT_STRINGS();

    06                SwitchGameState(GameStates.MAIN_MENU);

    07             }

    08         } else if (obj.GetGameState() == GameStates.SPLASH) {

    09             if (obj.GetId() == ScreenSplash.EVENT_DISPLAY_COMPLETE) {

    10                SwitchGameState(GameStates.LOADING);

    11             }

    12         }

    13     }

    14 }

    Listing 12-6

    GenericEventMessage Class Demonstration 3

    ```


    As a class that implements the `GenericEventHandler` interface, it must define
    the `HandleGenericEvent` method. This method is where the code for handling generic
    events should be placed. Note that the event handler is set up to process events
    associated with either the `LOADING` or `SPLASH` game state. If the event, the
    `obj` argument, is not null, then we begin to process the message by first checking
    its game state.


    Next, we check the event’s `id` field to see exactly what type of event we’re
    handling. If the event is an `EVENT_LOAD_COMPLETE` event, then we load the game
    strings by calling the `DatExternalStrings` class’ `LOAD_EXT_STRINGS` static method,
    line 5. On the subsequent line of code, the game state is changed to the main
    menu.


    Similarly, the `SPLASH` game state’s `EVENT_DISPLAY_COMPLETE` event causes a state
    change to the `MAIN_MENU`. Remember from the `GamePanel` class’ review that `GameStates`
    and game screens are closely connected.


    ## Event Handlers: `GenericEventHandler`


    The `GenericEventHandler` is implemented as an interface, so we’ll review the
    entire listing in one shot.


    ```

    1 public interface GenericEventHandler {

    2    public void HandleGenericEvent(GenericEventMessage obj);

    3 }

    Listing 12-7

    GenericEventHandler Class Review 1

    ```


    The `GenericEventHandler` interface is very simple. Any class that implements
    the interface must also declare a class method with the same signature as the
    `HandleGenericEvent` method listed. We saw this in the previous class review when
    we looked at the `GamePanel` class’ `HandleGenericEvent` method.'
