    GameSettingsImporter Demonstration 1

    ```


    If a game engine config file is defined, we initialize a new `GameSettingsImporter`
    object on line 2. The XML file is parsed and loaded on line 3 with a call to the
    `ImportGameSettings` method. Notice that the result is stored in the local variable
    `r`. On line 7, if the config file load was successful, the number of entries
