    ## Base Classes: MmgColor


    The `MmgColor` class is used to wrap the framework’s color class and provide color
    support to the API. This is a very common setup in game engines, you will often
    see centralized classes that model color, position, and size. In following with
    the theme of using convenient static class methods, the `MmgColor` class provides
    a number of such methods for quick color access.


    ### Static Class Members


    The `MmgColor` class’ static class methods listed here demonstrate creating a
    new `MmgColor` instance using four different techniques.


    ```

    public static MmgColor GetYellow() { return new MmgColor(Color.YELLOW); }

    public static MmgColor GetLimeGreen() { return new MmgColor(Color.decode("#DAF7A6"));
    }

    public static MmgColor GetDecodedColor(String htmlColor){return new MmgColor(Color.decode(htmlColor));}

    public static MmgColor GetTransparent() { return new MmgColor(new Color(0f, 0f,
    0f, 1f)); }

    Listing 2-7

    MmgColor Static Class Members 1

    ```


    The first method listed in the preceding demonstrates creating a new `MmgColor`
    instance from the static colors available in the framework’s color class. The
    second method, `GetLimeGreen`, demonstrates creating a new `MmgColor` instance
    from a set HTML color code.


    Third, we have the `GetDecodeColor` method, which is an example of creating a
    new `MmgColor` instance from a user-specified HTML color code. Lastly, we have
    a static class method that creates a new `MmgColor` instance from a set of four
    floating-point numbers. The `GetTransparent` method specifies the transparent
    color by setting the red, green, blue, and alpha channels to 0.


    ### Class Fields


    The `MmgColor` class has only one field we need to worry about, `c`. This field
    is an instance of the framework’s color class. It is wrapped by the `MmgColor`
    class, which provides a standard way for the API to use colors.


    ### Support Method Details


    There are only two support methods to review in the `MmgColor` class. The class
    support methods, `GetColor` and `SetColor`, are just simple get and set methods
    for the color class’ `c` field.


    ### Main Method Details


    We’ll begin our main method review with the three constructors listed in the following
    set. They demonstrate creating a new `MmgColor` class with different arguments.


    ```

    public MmgColor() { ... }

    public MmgColor(MmgColor obj){ ... }

    public MmgColor(Color C) { ... }

    public MmgColor Clone() { ... }

    public String ApiToString() { ... }

    public boolean ApiEquals(MmgColor obj) { ... }

    Listing 2-8

    MmgColor Main Method Details 1

    ```


    The first class constructor takes no arguments and defaults to the color white.
    The second class constructor listed takes an `MmgColor` class instance as an argument
    and uses its stored color to create a new `MmgColor` instance. The third and final
    constructor listed in the preceding takes a framework color instance as an argument.
    This `color` object is then used to create a new `MmgColor` instance.


    The next main method to review is the `Clone` method. Take note that the `MmgColor`
    class does not extend the `MmgObj` class yet the ability to clone the class is
    available. The `Clone` method is very direct. It uses the specialized constructor
    we’ve reviewed to create a new instance of the `MmgColor` class with the same
    color. Lastly, the `ApiEquals` method provides a way to test for equality at the
    API level, and the ApiToString method is used to create a string representation
    of the object instance.'
