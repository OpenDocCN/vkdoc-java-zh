    ## Helper Classes: MmgScreenData


    The `MmgScreenData` class is designed to hold data about the game’s display context.
    For instance, this class holds important data about the desired game panel and
    window dimensions. This class is a key feature of the MmgBase API and is used
    in many places where screen dimensions are taken into consideration.'
