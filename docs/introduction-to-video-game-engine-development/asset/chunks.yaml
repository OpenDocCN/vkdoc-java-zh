    ScreenMainMenu 类演示 2

    ```


    与我们之前查看过的游戏屏幕一样，`screenMainMenu` 类被暂停、隐藏，并释放了其资源。请注意，用于表示主菜单屏幕的游戏状态是 `MAIN_MENU`
    状态。我想介绍此过程中的激活部分，因为你在游戏中的每个屏幕都会使用非常相似的代码。下一个代码片段演示了屏幕的激活代码。


    ```

    1 } else if (gameState == GameStates.MAIN_MENU) {

    2     MmgHelper.wr("正在显示 MAIN_MENU 屏幕。");

    3     screenMainMenu.LoadResources();

    4     screenMainMenu.UnPause();

    5     screenMainMenu.SetIsVisible(true);

    6     currentScreen = screenMainMenu;

    7 }

    代码清单 14-29

    ScreenMainMenu 类演示 3

    ```


    这段演示代码同样来自 `SwitchGameState` 方法，你应该熟悉这段代码。它向你展示了激活主菜单屏幕的正确流程。我想指出的是，`GamePanel`
    类中关于 `ScreenMainMenu` 的示例代码行数并不多。


    这是因为我们使用的许多功能都被 `ScreenMainMenu` 类的超类 `MmgGameScreen` 类所隐藏。这让我们可以轻松地将菜单屏幕插入到 `GamePanel`
    类中已有的系统设置中。


    ## 游戏屏幕：Screen


    `Screen` 类与我们本章中介绍的其他游戏屏幕非常相似。之前的类 `ScreenSplash`、`ScreenLoading` 和 `ScreenMainMenu`
    都是特定的游戏屏幕，它们被设计成以特定方式运行。而 `Screen` 类是一个通用的游戏屏幕。它没有像启动屏幕或加载条那样特定的内置功能。


    ### 类字段


    `Screen` 类的字段与我们本章之前看到的非常相似。这是我们要介绍的最后一个 MmgCore 游戏屏幕，所以让我们直接进入代码。


    ```

    public GameStates state;

    public GamePanel owner;

    public Hashtable classConfig;

    代码清单 14-30

    Screen 类字段 1

    ```


    前两个类字段用于标识分配给此游戏屏幕的 `GameStates` 值，以及此游戏屏幕所属的 `GamePanel`（`owner`）。最后一个字段 `classConfig`
    用于保存类配置数据（如果存在）。类配置文件在运行时处理。你可以根据自己的需要来实现类配置代码。


    ### 支持方法详情


    `Screen` 类的支持方法是我们之前遇到过的一组熟悉的方法。


    ```

    public GameStates GetGameState() { ... }

    public boolean GetIsDirty() { ... }

    public void SetIsDirty(boolean b) { ... }

    public void DrawScreen() { ... }

    代码清单 14-31

    Screen 支持方法详情 1

    ```


    列出的第一个方法返回 `Screen` 关联的游戏状态值。接下来的两个方法是一对 get 和 set 方法，允许你访问屏幕的 `isDirty` 标志。`isDirty`
    标志控制屏幕的 `MmgUpdate` 方法是否在下一个游戏帧执行。前面列表中的最后一项是 `DrawScreen` 方法。此方法负责更新游戏屏幕，如果屏幕被标记为脏，则会从
    `MmgUpdate` 方法中调用它。


    ### 主要方法详情


    `Screen` 类的主要方法是我们之前遇到过的一组熟悉的方法。让我们来看看该类的主要方法。


    ```

    public Screen(GameStates State, GamePanel Owner) { ... }

    public void LoadResources() { ... }

    public void UnloadResources() { ... }

    public void HandleGenericEvent(GenericEventMessage obj) { ... }

    public boolean MmgUpdate(int updateTick, long currentTimeMs, long msSinceLastFrame)
    { ... }

    public void MmgDraw(MmgPen p) { ... }

    代码清单 14-32

    Screen 主要方法详情 1

    ```


    类构造函数遵循我们之前在 `ScreenSplash`、`ScreenLoading` 和 `ScreenMainMenu` 类中看到的相同模式。`State`
    参数是与游戏屏幕关联的游戏状态值。`LoadResources` 和 `UnloadResources` 方法负责准备和释放屏幕的资源。`HandleGenericEvent`
    方法是该类实现 `GenericEventHandler` 接口的一部分，该接口要求定义此方法。


    `Screen` 类能够注册并处理通用事件。前面显示的最后两个方法是 `MmgUpdate` 和 `MmgDraw`，它们作为游戏引擎绘制例程的一部分被调用。`MmgUpdate`
    方法首先被调用，负责运行游戏屏幕的更新逻辑（如果有）。`MmgDraw` 方法负责将游戏屏幕渲染到显示器上。


    ### 演示：Screen 类


    `Screen` 类的演示部分来自游戏引擎附带的 PongClone 游戏项目。打开 `Chapter15_CompleteGame` 包（如果你使用 C#
    则是命名空间）中的 `ScreenGame` 类，并将注意力转向类定义。


    ```

    public class ScreenGame extends Screen { ... }

    代码清单 14-33

    Screen 类演示 1

    ```


    从类定义中你会注意到，`ScreenGame` 类继承了 `Screen` 类。关于 `Screen` 类，需要注意的主要一点是，它不像 `ScreenSplash`
    和 `ScreenMainMenu` 类那样具有任何内置功能。下一个代码片段来自 MmgCore API 的 `Screen` 类，具体是 `MmgUpdate`
    方法。


    ```

    01 if (pause == false && isVisible == true) {

    02     if (super.MmgUpdate(updateTick, currentTimeMs, msSinceLastFrame) == true)
    {

    03         lret = true;

    04     }


    06     if (isDirty == true) {

    07         lret = true;

    08         DrawScreen();

    09     }

    10 }

    代码清单 14-34

    Screen 类演示 2

    ```


    `MmgUpdate` 方法仅在屏幕未暂停且当前可见时执行，如第 1 行所示。前面列出的代码片段的重点在第 8 行，即调用 `DrawScreen` 的地方。如果
    `isDirty` 标志设置为 true，屏幕将在每个游戏帧更新。这是此游戏屏幕与我们本章中介绍的前几个屏幕之间的主要区别。


    `Screen` 类被配置为在每个游戏帧上运行更新，因此它非常适合需要更新调用来实现动画的游戏屏幕。这就是 `Screen` 类的主要用途——作为动画密集型游戏屏幕的起点。

