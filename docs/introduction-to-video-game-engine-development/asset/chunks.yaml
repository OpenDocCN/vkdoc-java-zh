    ### 枚举


    接下来，你猜对了，是枚举。在下面的代码块中列出了两个非常重要的枚举供我们查看。


    ```

    01 public enum GameStates {

    02     LOADING,

    03     BLANK,

    04     SPLASH,

    05     MAIN_MENU,

    06     ABOUT,

    07     HELP_MENU,

    08     HELP_PROLOGUE,

    09     HELP_ITEM_DESC,


    11     ...


    13     GAME_SCREEN_39,

    14     GAME_SCREEN_40

    15 }

    01 public enum GameType {

    02     GAME_NEW,

    03     GAME_CONTINUE,

    04     GAME_ONE_PLAYER,

    05     GAME_TWO_PLAYER,

    06     GAME_NETWORK_TWO_PLAYER,

    07     GAME_NETWORK_TWO_PLAYER_P1,

    08     GAME_NETWORK_TWO_PLAYER_P2,

    09     GAME_NETWORK_TWO_PLAYER_LEFT,

    10     GAME_NETWORK_TWO_PLAYER_RIGHT

    11 }

    代码清单 10-10

    GamePanel 枚举 1

    ```


    现在，`GamePanel` 类承担着多项职责。它实际上是游戏引擎的核心。其中一项职责是管理游戏屏幕。粗略来说，游戏中的每个屏幕都应该对应一个游戏屏幕类。该类旨在将游戏屏幕与
    `GameState` 值关联起来。为了方便使用，第一个枚举中包含了一些默认的游戏状态，以及多达 40 个可用于任何用途的通用游戏状态。


    你可以随意扩展此枚举中的条目，以适应你的下一个游戏。第二个枚举同样重要。它描述了正在运行的游戏类型。其中包含一些默认值，用于指示单人游戏、双人游戏以及不同的网络游戏。如果你只是在制作一个简单的单人游戏，也请尽量使用这个枚举。你永远不知道什么时候可能想回过头来添加网络支持。


    ### 类字段


    可以想见，一个如此重要的类会拥有相当数量的类字段，并且通常还会有一长串的支持方法。`GamePanel` 类也不例外。请看下面分组中列出的第一组类字段，供我们查看。


    ```

    //游戏定位

    public MainFrame mf;

    public int winWidth;

    public int winHeight;

    public int myX;

    public int myY;

    //缩放后的游戏定位

    public double scale = 1.0;

    public int sWinWidth;

    public int sWinHeight;

    public int sMyX;

    public int sMyY;

    //游戏状态管理

    public Hashtable gameScreens;

    public MmgGameScreen currentScreen;

    public GameStates prevGameState;

    public GameStates gameState;

    //游戏绘制

    public MmgPen p;

    public Canvas canvas;

    public BufferStrategy strategy;

    public BufferedImage background;

    public Graphics2D backgroundGraphics;

    public Graphics2D graphics;

    public int updateTick = 0;

    代码清单 10-11

    GamePanel 类字段 1

    ```


    第一组字段包含一个对主框架的引用。你可以将主框架视为游戏面板类的父类。接下来的四个条目用于跟踪游戏的尺寸和游戏面板的偏移量。下面的一组字段非常相似，但这些字段是在游戏面板需要缩放以适应窗口框架时应用的。


    下一组字段非常重要。这组字段包含了游戏状态管理功能。该组中的第一个字段为你提供了一个数据结构，你可以用它来跟踪正在使用的游戏屏幕。你可以选择不使用这个数据结构，但如果你觉得合适，它就在那里供你使用。`currentScreen`
    字段表示当前活动的游戏屏幕，它接收游戏面板接收到的所有输入，并接入游戏引擎的更新和绘制调用。


    接下来的两个字段，`gameState` 和 `prevGameState`，用于跟踪游戏面板类的当前和上一个游戏状态。这样做的原因是，在下一个游戏屏幕接管之前，可以清理上一个游戏屏幕并释放其资源。最后一组类字段属于类的绘制例程。`MmgPen`
    实例 `p` 用于通过 `backgroundGraphics` 框架绘制类在 `background` 图像上进行绘制。


    `canvas` 字段用于保存一个框架级别的类，该类代表窗口的可绘制区域。`strategy` 字段用于配置框架的绘制过程，使其包含对画布的双缓冲。这意味着在内部，`canvas`
    将支持两个绘制表面。一个表面正在显示，而另一个代表下一帧游戏画面的表面正在被绘制。


    当第二帧准备就绪时，两个表面会进行翻转，然后重复该过程。正如我之前提到的，`background` 和 `backgroundGraphics` 用于将游戏绘制到一个表面上，然后使用
    `graphics` 字段将该游戏帧绘制到窗口的画布上。最后但同样重要的是，`updateTick` 字段作为更新调用的一部分使用。它记录更新调用被执行的次数。这对应于游戏已显示的帧数。我们还没完。还有另一组类字段等着我们查看。在我们深入查看它们之前，先看看下面分组中列出的字段。

