    The `MmgTextField` class has a few class fields for us to review. The first set
    of fields is listed in the following. These are fields used to control how the
    text field is displayed and what event to fire when a max length error occurs.


    ```

    private Mmg9Slice bground;

    private MmgBmp bgroundSrc;

    private boolean cursorBlinkOn;

    private long cursorBlinkStart;

    private int displayChars;

    private MmgEvent errorMaxLength = new MmgEvent(null, "error_max_length", MmgTextField.TEXT_FIELD_MAX_LENGTH_ERROR_EVENT_ID,
    MmgTextField.TEXT_FIELD_MAX_LENGTH_ERROR_TYPE, null, null);

    Listing 6-2

    MmgTextField Class Fields 1

    ```


    The first class field is an `Mmg9Slice` object to use as the background border
    of the text field. The subsequent entry, `bgroundSrc`, is the image used as the
    source `MmgBmp` for the `Mmg9Slice` object. In other words, the `bgroundSrc` image
    is the image that will get sliced and resized to the desired text field dimensions.


    The next two fields control the cursor blink. The first field, `cursorBlinkOn`,
    determines if the cursor blinks at all, while the next entry, `cursorBlinkStart`,
    is used by the class to time the cursor blink rate. The `displayChars` entry determines
    how many characters the text field can display at one time. Lastly, we have the
    max length error template, `errorMaxLength`, already prepared and just about ready
    to use.


    ```

    private MmgFont font;

    private int fontHeight;

    private boolean isDirty;

    private int maxLength;

    private boolean maxLengthOn;

    private int padding;

    private String textFieldString = "";

    Listing 6-3

    MmgTextField Class Fields 2

    ```


    The second set of class fields for us to review is listed in the preceding. The
    `font` field is used to render the text in the `text` field. You can specify the
    font size, type, and color using the `MmgFont`’s class fields. The `fontHeight`
    field is used in the text’s vertical centering calculations. The text is attempted
    to be centered within the background image’s height.


    The `isDirty` flag is a Boolean that controls if the class runs certain update
    code on the next game frame. We don’t want the class working unnecessarily during
    the update calls, so we control the amount of work we do using this Boolean flag.
    Now with this capability, the class will only run its update calculations when
    the cursor blinks or other events cause a change that requires it to be updated.


    The next two fields control if the max length error is on and how many characters
    can be entered into the text field before the error event is triggered. The `padding`
    field is used to fine-tune the font’s position in the text field’s background
    image. The `textFieldString` class is used to hold the actual string value the
    text field represents, not just the text visible in the text field’s display.


    ### Support Method Details


    The `MmgTextField` class has support methods that fall into three general groups.
    There are background image methods, text field font-rendering methods, and text
    field text methods. As the classes we review become more complex, they tend to
    have more support methods to allow access to their fields. I’ll try to organize
    the methods for you when they start becoming too numerous.


    ```

