  trans: '

    ### 启动游戏：Java


    首先，我们来了解一下 Java 游戏引擎的实现以及启动游戏的不同方式。导航到你在 NetBeans IDE 中使用的项目文件夹。找到 `MmgGameApiJava`
    项目并打开该文件夹。主项目文件夹中应该有一个 **dist** 文件夹。


    如果没有，请打开 IDE 并右键单击项目。选择“清理并构建”选项，并在弹出的对话框中确认强制构建。如果项目配置正确，你现在应该会看到一个 **dist**
    文件夹。如果仍然没有看到该文件夹，请返回第 1 章，重新进行 Java 设置过程。


    **dist** 文件夹内是游戏编译版本的存放位置。为了启动游戏，我们需要知道如何运行一些命令行界面、控制台命令。在 Windows 中，你应该使用命令程序
    **cmd.exe**。你可以在“开始”菜单中找到该程序，或者在运行栏中搜索 **cmd**。


    对于其他平台，你只需要打开一个终端。如果你不知道如何操作，只需在互联网上搜索如何为你的特定操作系统打开终端窗口的说明。打开终端窗口后，我们需要验证 Java
    运行时环境是否正确设置。在控制台窗口中运行以下命令：


    ```

    java –version

    ```


    如果收到一条消息，提示找不到 Java 程序，那么我们必须确保 Java 已添加到系统的路径环境变量中。在 Windows 中，如果找不到 Java，你将看到以下消息。在
    Mac OSX 和 Linux 上，你会看到类似的消息：


    ```

    ''java'' 不是内部或外部命令，也不是可运行的程序或批处理文件。

    ```


    如果是这种情况，你需要访问以下链接，或在互联网上搜索“将 Java 添加到路径”，并查看排名靠前的结果之一：


    [`https://docs.oracle.com/javase/tutorial/essential/environment/paths.html`](https://docs.oracle.com/javase/tutorial/essential/environment/paths.html)


    如果一切正常运行，那么你将看到类似下面列出的消息，而不是错误消息：


    ```

    java version "12.0.1" 2019-04-16 Java(TM) SE Runtime Environment (build 12.0.1+12)
    Java HotSpot(TM) 64-Bit Server VM (build 12.0.1+12, mixed mode, sharing)

    ```


    Java 实现支持在单个 jar 文件中使用多个静态 main 入口点。默认的静态 main 是来自 `MmgTestSpace` 库的 `MmgTestScreens`
    类。这个静态 main 增加了指定启动哪个测试的功能。你将在以下示例中看到添加的命令行参数。


    ### 执行默认静态 Main


    ```

    java -jar MmgGameApiJava.jar

    ```


    ### 执行带参数的默认静态 Main


    ```

    java -jar MmgGameApiJava.jar FPS=30 TEST=1

    ```


    ### 执行带原生库路径和参数的默认静态 Main


    ```

    java -Djava.library.path= C:\netbeans_projects\MmgGameApiJava\lib\jinput-platform\native-libs
    -jar MmgGameApiJava.jar FPS=30 TEST=1

    ```


    在接下来的两个示例中，我们指定了要从命令行运行的静态 main 类。请注意，在第二个示例中，我们通过 `MmgCentralMain` 运行了 `MmgApiGame`
    静态 main。这样做的原因是 C# 框架不允许存在多个静态 main 入口点。为了保持两个项目在功能上等效，我创建了一个可以配置为运行许多不同 main
    类的入口点。


    ### 执行带参数的目标静态 Main


    ```

    java –cp MmgGameApiJava.jar net.middlemind.MmgGameApiJava.MmgCore.MmgApiGame FPS=30

    ```


    ### 执行带目标 Main 和参数的中心 Main


    ```

    java –cp MmgGameApiJava.jar net.middlemind.MmgGameApiJava.MmgCore.MmgCentralMain
    mmgapigame FPS=15

    ```


    ### 所有 MmgCentralMain 执行命令


    ```

    //执行示例应用程序

    java MmgGameApiJava.jar mmgtestspace

    //执行最简静态 main

    java MmgGameApiJava.jar mmgapigame

    //执行 PongClone 第 16 章项目

    java MmgGameApiJava.jar chapter16

    //执行 PongClone 第 17 章项目

    java MmgGameApiJava.jar chapter17

    //执行 PongClone 第 18 章项目

    java MmgGameApiJava.jar chapter18

    //执行 DungeonTrap 第 20 章项目

    java MmgGameApiJava.jar chapter20

    //执行 DungeonTrap 第 21 章项目

    java MmgGameApiJava.jar chapter21

    //执行 DungeonTrap 第 22 章项目

    java MmgGameApiJava.jar chapter22

    //执行 DungeonTrap 第 23 章项目

    java MmgGameApiJava.jar chapter23

    //执行 DungeonTrap 第 23 章演示项目

    java MmgGameApiJava.jar chapter23_demoscreen

    //执行 DungeonTrap 第 24 章项目阶段 1

    java MmgGameApiJava.jar chapter24_phase1

    //执行 DungeonTrap 第 24 章项目阶段 2

    java MmgGameApiJava.jar chapter24_phase2

    //执行 DungeonTrap 第 24 章项目阶段 3

    java MmgGameApiJava.jar chapter24_phase3

    ```


    至此，关于如何启动 Java 版本游戏的介绍就结束了。接下来，我们将了解如何使用 C# 版本的引擎启动你的游戏。我应该提一下，编译后的游戏会查找资源目录，该目录位于其执行目录的上一级。因此，如果我们在
    **dist** 文件夹中运行游戏，资源将位于 **../cfg** 目录中。

    '
- fmt: '### Launching a Game: C#


    Let''s take a look at the C# game engine implementation and the different ways
    we can start a game. Navigate to the project folder you’ve been using for the
    Visual Studio IDE. Find the `MmgGameApiCs` solution folder and the project folder
    with the same name; open that folder. You should see the following folder structure
    in that directory: `bin\Debug\netcoreapp3.1`.


    If not, open the IDE and right-click the project. Select the Rebuild option. You
    should now have the correct `bin` folder in your project’s main directory. If
    you still don’t see a folder, go back to the Chapter [1](#508392_1_En_1_Chapter.xhtml)
    and go over the C# setup process again.


    Inside the `bin\Debug\netcoreapp3.1` folder is where the compiled version of the
    game is created. In order to start a game, we need to know how to run some command-line
    interface, console, commands. In Windows, you should use the command program,
    `cmd.exe`. You can find this program on the Start menu or search for `cmd` in
    the run bar.


    For other platforms, you’ll just need to open up a terminal. If you don’t know
    how to do this, simply search the Internet for some instructions on how to open
    up a terminal window for your particular operating system. Once you have a terminal
    window open, we’ll want to verify the C# runtime environment is set up correctly.
    Run the following command in the console window:


    ```

    dotnet -–version

    ```


    If you get a message indicating that the DotNet program could not be found, then
    we’ll have to make sure that DotNet is on the system’s path environment variable.
    In Windows, you will see the following message if DotNet cannot be found. You
    will see a similar message on Mac OSX and Linux:


    ```

    ''dotnet'' is not recognized as an internal or external command, operable program
    or batch file.

    ```


    If this is the case, you’ll want to visit the following link or search the Internet
    for “add dotnet to your path” and look at one of the top results:


    [`https://docs.microsoft.com/en-us/dotnet/core/tools/troubleshoot-usage-issues`](https://docs.microsoft.com/en-us/dotnet/core/tools/troubleshoot-usage-issues)


    If everything is up and running properly, then you’ll see a rather unceremonious
    message similar to the one listed in the following instead of an error message:


    ```

    5.0.101

    ```


    The C# implementation does not support multiple static main entry points in a
    single library file. The default static main is the `MmgCentralMain` class from
    the MmgCore library. This static main adds the ability to specify which other
    main class to launch. You’ll see the added command-line argument in the following
    command examples.


    ### Execute the Default Static Main


    ```

    dotnet MmgGameApiCs.dll default

    ```


    ### Execute the Default Static Main with Arguments


    ```

    dotnet MmgGameApiCs.dll default FPS=30 TEST=1

    ```


    In the next two examples, we are specifying the static main class to run from
    the command line. The examples demonstrate running the template application, `MmgApiGame`,
    and the example application, `MmgTestScreens`.


    ### Execute Central Main with MmgTestScreens and Args


    ```

    dotnet MmgGameApiCs.dll mmgtestspace TEST=20

    ```


    ### Execute Central Main with MmgApiGame and Args


    ```

    dotnet MmgGameApiCs.dll mmgapigame FPS=15

    ```


    ### All MmgCentralMain Execution Commands


    ```

    //Executes the example application

    dotnet MmgGameApiCs.dll mmgtestspace

    //Executes the bare bones static main

    dotnet MmgGameApiCs.dll mmgapigame

    //Executes the PongClone Chapter 16 project

    dotnet MmgGameApiCs.dll chapter16

    //Executes the PongClone Chapter 17 project

    dotnet MmgGameApiCs.dll chapter17

    //Executes the PongClone Chapter 18 project

    dotnet MmgGameApiCs.dll chapter18

    //Executes the DungeonTrap Chapter 20 project

    dotnet MmgGameApiCs.dll chapter20

    //Executes the DungeonTrap Chapter 21 project

    dotnet MmgGameApiCs.dll chapter21

    //Executes the DungeonTrap Chapter 22 project

    dotnet MmgGameApiCs.dll chapter22

    //Executes the DungeonTrap Chapter 23 project

    dotnet MmgGameApiCs.dll chapter23

    //Executes the DungeonTrap Chapter 23 demo project

    dotnet MmgGameApiCs.dll chapter23_demoscreen

    //Executes the DungeonTrap Chapter 24 project phase 1

    dotnet MmgGameApiCs.dll chapter24_phase1

    //Executes the DungeonTrap Chapter 24 project phase 2

    dotnet MmgGameApiCs.dll chapter24_phase2

    //Executes the DungeonTrap Chapter 24 project phase 3

    dotnet MmgGameApiCs.dll chapter24_phase3

    ```


    That concludes the review of how to launch a C# version of your game. I should
    mention that the compiled games look for the resource directory to be three directories
    up from where they are executed. So if we are running the game in the `netcoreapp3.1`
    folder, the resources will be located in the `../../../cfg` directory. You can
    adjust this configuration in the `GameSettings` class.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgCore API’s runtime classes. These
    classes represent the “execution code” so to speak, the code that prepares and
    executes your game. Again, we chose to include the runtime code, from source,
    as part of your game project’s setup. This gives you complete control over the
    game’s launch process.


    We saw how the static main entry point prepared a game window using the `MainFrame`
    class – in the C# version, the `GamePanel` class handles this responsibility –
    and attached the `GamePanel` class to the window’s drawable space. We reviewed
    the heart of the game engine, the `GamePanel` class, which connects the MmgCore
    API to the MmgBase API and manages all game screens. Let’s take a look at a summary
    of the chapter’s main points:


    *   `MmgApiGame`: An MmgCore API class that runs a template, bare-bones, game.
    This game will run through the startup process showing a splash screen and displaying
    a loading screen before concluding on a main menu.


    *   `MainFrame`: An MmgCore API class that is responsible for creating the window
    frame for the game in the Java implementation of the game engine.


    *   `GamePanel`: An MmgCore API class that is the heart of the game engine. This
    class is responsible for routing input to the current game screen, managing game
    screens, and much more. This is the point in the MmgCore API where we connect
    to the MmgBase API via the different game screens.


    *   Topic: Launching a Game: In this topic section, we learned exactly how to
    launch our games from the command-line interface using a console. We covered the
    different, default, applications you can run and how to run them for both the
    Java and C# implementations.


    At this point in time, you should see the big picture. The structure of the MmgBase
    API and the main aspects of the MmgCore API have been detailed to you. Take some
    time to think about the libraries and their structure – how the lower-level API
    has lots of support for cloning, comparison, and interoperability of classes,
    while the mid-level API, MmgCore, has mainly single, highly specialized classes
    that run a specific aspect of the game engine. Pay special attention to the `GamePanel`
    class and its drawing and update routines. Make sure you understand how the two
    APIs are connected. Here’s a hint: explore the `currentScreen` class field.


    # 11. Dynamic Settings


    We’ve covered a fair amount of the game engine’s code up to this point in the
    text. Most of the classes have been tied closely to the engine’s models or runtime
    code. The next set of classes we’ll review show us how the game engine can pull
    in data from different sources to customize settings and game play.


    In the upcoming sections, we’ll review the structure and syntax of a game engine
    config file and detail the settings loading process so that you have complete
    control over how your game loads and processes dynamic data. The classes we’ll
    review in this chapter are as follows:


    *   `DatConstantsEntry`


    *   `GameSettingsImporter`


    *   `DatExternalStrings`


    *   `GameSettings`'
