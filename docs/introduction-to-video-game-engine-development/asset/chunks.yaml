    The first class constructor we’ll review is listed in the preceding group. It
    takes an `MmgObj` as an argument and uses it to initialize an empty `MmgBmp` instance.


    This is an example of a bare-bones constructor. The `MmgBmp` instance created
    by this constructor is not ready for use. You’ll have to set an image and double-check
    the dimensions at the very least. The next main method to review is a specialized
    constructor that takes an `MmgBmp` instance as an argument and uses it to create
    a new, unique copy of the object. Note that the `SetBmpId` method is called in
    every constructor, ensuring a unique ID for each class instance.


    The next set of main methods to review contains two class constructors that take
    framework class instances to set the image and related class fields. Let’s take
    a look at the constructor that takes only an `Image` instance as an argument.
    In the C# implementation, it would take a `Texture2D` instance as an argument.


    This constructor sets up a basic `MmgBmp` implementation to use with the game
    engine’s drawing routine. Make sure you review and understand the different `MmgBmp`
    constructors available to you. The next set of main methods to review include
    the class’ cloning methods. The ability to clone an `MmgBmp` instance is provided
    by the `Clone` and `CloneTyped` main methods.


    The `Clone` method returns a reference to the super class, base class in C#, of
    the `MmgBmp` class by casting the object instance before returning it. Similarly,
    the `CloneTyped` method returns an `MmgBmp` instance that is a clone of the current
    class. Notice that both cloning methods use the specialized constructor we reviewed
    earlier to create a new class instance to return.


    ```

    public boolean ApiEquals(MmgBmp obj) { ... }

    public void MmgDraw(MmgPen p) { ... }

