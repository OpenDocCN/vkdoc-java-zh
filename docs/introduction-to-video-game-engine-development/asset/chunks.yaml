- fmt: '### Class Fields


    The `MmgFont` class fields for us to review are listed in the following group.


    ```

    private Font font;

    private String text;

    private final FontRenderContext frc;

    private int fontSize = -1;

    private FontType fontType = FontType.NONE;

    Listing 2-15

    MmgFont Class Fields 1

    ```


    The first field listed in the preceding is the framework font class. In the C#
    version of `MmgFont`, the framework font class is the `SpriteFont` class. The
    `MmgFont` class wraps the underlying framework class and exposes a standard functionality
    for the MmgBase API. The `text` class field holds the text that is to be displayed
    by the `MmgFont` instance. The next field listed is a framework class used to
    describe the internal method used to render the font. This can be used to give
    us the dimensions of a rectangle that would fit the rendered font. Having accurate
    information on a font-rendered string’s dimensions allows us to properly position
    the text on the screen.


    Take a moment to think about the C# implementation and the `SpriteFont` framework
    class. Why does everything still work the same with regard to the `MmgFont` class
    and the API? This is because the font functionality that the API uses is defined
    by the `MmgFont` class and it’s the same in any port of the game engine. It’s
    the `MmgFont` class’ responsibility to provide the functionality defined by its
    class using the framework classes available. The remaining two class fields, `fontSize`
    and `fontType`, are descriptive fields that should accurately reflect the type
    of font loaded by the class.


    ### Support Method Details


    The first set of support methods for us to review are listed in the following.


    ```

    public String GetText() { ... }

    public void SetText(String s) { ... }

    public FontType GetFontType() { ... }

    public void SetFontType(FontType ft) { ... }

    public void SetFontSize(int sz) { ... }

    public int GetFontSize() { ... }

    public void SetFont(Font tf) { ... }

    public Font GetFont() { ... }

    Listing 2-16

    MmgFont Support Method Details 1

    ```


    The first two support methods we’ll discuss are the get and set methods for the
    `text` class field. The `GetText` method just returns the text value. The `SetText`
    method, however, not only updates the text; it also updates the dimensions of
    the font. The size calculation turns out to be pretty accurate, but you’ll notice
    positioning the font can feel a bit awkward. That’s because the font actually
    draws from the vertical center of the specified position. Take this into account
    when working with fonts on a game screen.


    The `SetFontSize` method is a bit different than some of the support methods we’ve
    seen thus far. It will resize the font when called. In turn, the `GetFontSize`
    method returns the size value from the actual font. The `fontSize` field is updated
    along with the resizing of the font. This field shadows the font’s size when it
    is set. There are get and set methods for all important class fields. Make sure
    you familiarize yourself with them.


    ### Main Method Details


    First, we’ll review the class constructors. Now, there are a few more constructors
    than the ones we’ll review here; but in many ways, they are redundant, so we’ll
    stick with those we have listed.


    ```

    public MmgFont() { ... }

    public MmgFont(MmgObj obj) { ... }

    public MmgFont(Font tf, int fontSize, FontType fontType) { ... }

    public MmgFont(MmgFont obj) { ... }

    public MmgObj Clone() { ... }

    public MmgFont CloneTyped() { ... }

    public void MmgDraw(MmgPen p) { ... }

    public boolean ApiEquals(MmgFont obj) { ... }

    Listing 2-17

    MmgFont Main Method Details 1

    ```


    The first constructor I want to review takes three arguments, a font, a font size,
    and a font type. The constructor initializes each class field with either a default
    or argument value. Note that the font size argument does not set the font size;
    it represents the font size. The other constructor listed in the preceding is
    the specialized constructor used by the class’ cloning methods. It takes an `MmgFont`
    object as an argument.


    We’ve come across this type of constructor implementation before. This is a reinforced
    design pattern throughout the MmgBase API closely tied to cloning. In most cases,
    any class fields that are other API classes will need to be cloned to prevent
    shared references between the new object instance and the instance it was based
    on. All basic data types can just be set directly.


    The next two main methods to talk about are cloning methods. You’ll see these
    two particular class methods, `Clone` and `CloneTyped`, over and over again. Notice
    how we’ve created a reliable capability at the API level by implementing certain
    class functionality consistently. We could have chosen to implement the same thing
    using interfaces. That would create a more structured implementation, but we really
    value flexibility over rigid structure when building a game engine.


    The `MmgDraw` method is called by the game engine’s drawing routine when the object
    is part of a game screen’s list of drawable objects by being passed to the `AddObj`
    method. You can also draw custom combinations of objects by adding code to the
    `MmgDraw` method directly. The `ApiEquals` method is something we’ve seen before.
    In this case, the `ApiEquals` method returns true if the two objects have the
    same font and text.


    ### Demonstration: MmgFont Class


    In this section, we’ll demonstrate use of the `MmgFont` class by looking at specific
    methods of the `ScreenTestMmgFont` class from the MmgTestSpace package. There
    are a lot of font examples displayed on this screen; we’ll only review a subset
    of them. Be sure to run the example application and view this example game screen
    in action.


    ```

    01     fontBoldLg = MmgFontData.CreateDefaultBoldMmgFontLg();

    02     fontBoldLg.SetText("Font Bold Large");

    03     fontBoldLg.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 1));

    04     fontBoldLg.SetX(y);

    05     AddObj(fontBoldLg);


    07     fontBoldMd = MmgFontData.CreateDefaultBoldMmgFont(title.GetFontSize() -
    MmgHelper.ScaleValue(2));

    08     fontBoldMd.SetText("Font Bold Medium");

    09     fontBoldMd.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 2));

    10     fontBoldMd.SetX(y);

    11     AddObj(fontBoldMd);


    13     fontBoldSm = MmgFontData.CreateDefaultBoldMmgFontSm();

    14     fontBoldSm.SetText("Font Bold Small");

    15     fontBoldSm.SetY(GetY() + MmgHelper.ScaleValue(15) + (y * 3));

    16     fontBoldSm.SetX(y);

    17     AddObj(fontBoldSm);

    Listing 2-18

    MmgFont Class Demonstration 1

    ```


    Our review begins with the code on line 1. This is an example of loading a scaled,
    large, bold, font and setting its position. Notice that on line 5 the `MmgFont`
    object, which extends the `MmgObj` class, is added to the game screen’s default
    drawing routine via a call to the `AddObj` method. The remaining code blocks on
    lines 7–11 and 13–17 perform the same operations as the code we’ve just reviewed
    except for using different sized fonts. Make sure you take a moment to look over
    the different font entries, so you have an idea of how to create and use different
    fonts in your game.


    ## Base Classes: MmgSound


    The `MmgSound` class is used to wrap the framework’s sound class and provides
    audio support to the MmgBase API. The `MmgSound` class is responsible for playing
    sound effects and background music. It''s a bit different than other classes in
    that it’s a resource but it isn’t a drawable resource. The `MmgSound` class is
    designed to use a static, global value for the volume. There is also code in place
    for making sure that each `MmgSound` instance has a unique ID value. The class
    has cloning, string representation, and comparison functionality.'
