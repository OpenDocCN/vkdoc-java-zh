    The next snippet of demonstration code for us to review are the `ScreenTestMmgPositionTween`
    class’ `MmgDraw, MmgUpdate`, and `MmgHandleEvent` methods. Notice how simple the
    `MmgDraw` method is. All the objects that are drawn to the screen are part of
    the screen’s list of drawable objects, so all the drawing is done for us, for
    free. The `MmgUpdate` method has a little more meat to it. Notice that we force
    the sprite and the position tween to update every frame by calling their update
    methods directly. This ensures that the animation updates happen on every frame.


    The last method in the snippet listed in the preceding is the `MmgHandleEvent`
    method. This method is configured to receive both start and finish events from
    the position tween class. Notice that when it receives a finish event, it restarts
    the position tween animation in reverse from the finish position to the start
    position, lines 6–8\. Similarly, when the start event is received, the method
    will reset the position tween again, lines 11–13\. This ensures the position tween
    keeps running indefinitely. It’s also a nice little example of the class’ events.


    ## Chapter Conclusion


    In this chapter, we completed a review of the MmgBase API’s animation classes.
    The classes we’ve covered demonstrate two different types of class-based animation.
    The `MmgPulse` class exemplified a hands-off approach in which the class was responsible
    only for animating numeric values that would then be applied to an on-screen object.


    The `MmgPositionTween` and `MmgSizeTween` classes are examples of a hands-on approach
    to object animation. These classes are part of the drawable set of objects and
    handle all their own drawing and updating logic.


    *   MmgPulse: An API class for animating a numeric value by changing it over time.
    The resulting series of values can be used to drive object position animations
    among others.


    *   MmgPositionTween/MmgSizeTween: An API class for animating an object over time
    by either adjusting its position, in the case of the MmgPositionTween class, or
    its size, in the case of the MmgSizeTween class.


    The animation classes we’ve reviewed demonstrate how high-level complex classes
    can interact to create new and exciting functionality. For instance, in the example
    code for the `MmgPositionTween` class, we used an `MmgSprite` object as the subject
    for the position tween; and as such we ended up with an animation, the position
    tween, animating another animation, the sprite object.


    Stop and think about why we’re able to do this. The game engine is designed such
    that classes can work together easily. We also saw how simple it was to use these
    new, complex, animation classes. All we had to do was add them to the current
    screen’s list of drawable objects and make sure their update method is called
    each frame if need be. It’s that easy.


    # 8. Game Screen Classes


    In this chapter, we’ll review the MmgBase API’s game screen classes. These are
    the base classes for more advanced and concrete game screen implementations. There
    are three classes, one for a splash screen, one for a loading screen, and one
    for a general screen that supports a menu system.


    These classes are very important because they are the connection point at which
    the MmgBase API interacts with the MmgCore API. The game panel class is responsible
    for sending the current game screen update and draw method calls as well as input
    method calls. The current game screen is an instance of the `MmgGameScreen` class:


    *   MmgSplashScreen


    *   MmgLoadingScreen


    *   MmgGameScreen'
