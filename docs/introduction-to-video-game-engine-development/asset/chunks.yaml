    The first set of methods we’ll look at are the class’ constructors. The first
    entry takes an array of `MmgBmp` objects representing the sprite’s animation frames
    and an `MmgVector2` object that holds the current position of the frames. This
    constructor will set the animation frames and position the sprite. The second
    constructor is similar, but it only takes animation frames as an argument. Last
    but not least, the specialized constructor takes an `MmgSprite` object as an argument
    and uses it to create a new, unique, class instance.


    The next set of methods are cloning methods. We’ve seen this implementation many
    times before, so I won’t go into too much detail here. The two cloning methods
    use the specialized constructor to create a new, unique copy of the class and
    return it cast to the specified class type. The last set of main methods to review
    are also methods we’ve seen before. The game engine’s default drawing routine
    will call the class’ update and draw methods.


    The update method is responsible for handling timing, animating the frames, and
    events, firing an event when the frame changes. The class’ drawing method can
    handle more advanced rendering features if enabled or just a simple direct rendering
    of the sprite’s current animation frame. The last entry in the set is the `ApiEquals`
    method. This is an API-level method used to compare two `MmgSprite` objects for
    equality.


