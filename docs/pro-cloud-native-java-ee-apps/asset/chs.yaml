  \ 3-8 所示。\n\n![](img/531256_1_En_3_Fig8_HTML.png)\n\n一张截图展示了 Insomnia 中的钱包 API 调用，其中包括带有地址的钱包、带有一些代码的预览以及带有一些代码的\
  \ JSON，分别用一、二、三表示。\n\n图 3-8\n\n在 Insomnia 中创建钱包 API 调用\n\n我们向资源`http://localhost:3001/wallet/api/wallets`（1）发起一个\
