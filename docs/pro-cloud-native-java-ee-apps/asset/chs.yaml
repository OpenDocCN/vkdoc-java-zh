  @Liveness 检查返回 DOWN 状态。需要注意的是，响应不一定按任何特定顺序返回。即使在代码中存活检查是在就绪检查之前声明的，对基础 /health 端点的调用也会先返回就绪检查的结果，然后才是存活检查的结果。


  ## 总结


  本章讨论了 Eclipse MicroProfile Health 规范。我们探讨了该规范与 Metrics 规范之间的区别。然后讨论了 Health API
  的结构。接着，我们研究了如何在 CDI API 的上下文中使用它。您应该能够使用 Health API 为您的云原生应用程序创建自定义的健康检查流程。


