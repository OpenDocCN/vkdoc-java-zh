- '# 1. Jakarta EE 与 MicroProfile 理论


  Jakarta EE（原 Java EE）是一套由社区开发的抽象规范，共同构成了一个用于开发端到端、多层企业级应用的平台。Jakarta EE 构建于 Java
  标准版之上，旨在提供一个稳定、可靠且供应商中立的平台，用于开发云原生应用。


  本章将讨论围绕 Java 企业级开发平台的一般理论。与 Java 企业版相关的术语包含大量可能不太清晰的技术词汇。本章将把 Java EE（现为 Jakarta
  EE）分解为其理论形式，以便在本章结束时，您能熟悉大量与 Java 企业版相关的术语。


  ## 什么是规范？


  Jakarta EE 由多个独立的规范组成，每个规范涵盖一个特定的 API，例如 Jakarta WebSocket，它负责提供一个 API，用于编写支持通过平台上的
  WebSocket 协议进行通信的应用。这些独立的规范被分组到给定 Jakarta EE 版本的单个“总括”规范中。例如，最新版本 Jakarta EE 10^(¹)
  是在总括规范 10 下发布的。


  规范是一份文档，概述了给定 API 集合的功能。该文档概述了在给定 API 的各种场景和调用下，预期行为应该是什么。规范本身可以被视为 API 的蓝图。Jakarta
  EE 规范的对应物是该规范的实现。由于规范仅说明 API 的期望和功能是什么，因此该规范的实现是在开发人员调用该规范中的任何给定 API 时，实际实现这些期望和功能的工作。


  规范及其相应的实现通常是分离的。对您作为开发人员而言，这意味着您可以简单地针对“抽象”规范（蓝图）进行编码，并使用不同的实现来运行您的代码。这意味着您可以自由选择适合您需求的实现，而无需重写代码。对于实现供应商而言，这意味着更多的竞争，并最终在基础规范之上实现更好、更快的创新。


  过去，各种（Java EE）规范版本是在 Java 社区流程（JCP^(²)）的 Java 规范请求（JSR）下发布的。JSR 是一个流程，任何感兴趣的人（个人或注册实体）向
  JCP 的项目管理办公室提交一份文档，提议开发一个新的规范或对现有规范进行重大修订。从规范文档的提议到最终发布和参考实现，整个过程都是 JSR 的一部分。


  作为一个总括 JSR，Java EE 本身有一个以 GlassFish 应用服务器形式存在的参考实现。该实现是作为其他总括规范实现基础的“参考”。多年来，已经出现了许多
  Java EE 完整实现，包括 WildFly、Open Liberty 和 Payara 等。


  从 Java EE 8 版本开始，规范流程与 GlassFish 项目一起从 JCP 转移到了 Eclipse 基金会。参考实现的概念也变更为兼容实现，以更好地反映对跨供应商中立性和兼容性的关注。然而，为了更好地理解
  Jakarta EE 是什么以及它是如何形成的，需要回顾一下 Java EE 版本的历史，以便更好地理解 Jakarta EE 作为当今平台的背景和目标，以及其发布流程与
  JCP 下的流程有何不同。


  ## Java EE 版本历史


  ### Java 2 平台企业版（J2EE 1.2）


  该平台的第一个版本于 1999 年 12 月 12 日发布，称为 Java 2 企业版，简称 J2EE。它以 1.2 版本的形式发布了该平台的初始规范。这个当时新颖的平台的关键特性之一是
  Enterprise JavaBeans 的概念。EJB API 旨在使将复杂业务逻辑封装在由专用运行时管理的组件中变得容易。该运行时为 EJB 组件提供了事务、安全性和可伸缩性等辅助服务。


  ### Java 2 平台企业版（J2EE 1.3）


  Java 企业平台的下一版本是 1.3，于 2001 年 9 月 24 日发布。它包含在总括 JSR 58 中。此版本的关键特性是引入了新的 Java 连接器架构（JCA）和
  Java 消息服务（JMS）API。EJB API 也得到了改进。


  ### Java 2 平台企业版（J2EE 1.4）


  该平台的下一版本 J2EE 1.4 于 2003 年 11 月 11 日发布。此版本包含在总括 JSR 151 中。此版本的关键特性是“遵循 Web 服务互操作性组织（WS-I）的基本概要
  1.0 文档，以实现可互操作的 Web 服务。”^(³)


  ### Java 平台企业版（Java EE）5


  该平台的下一版本经历了品牌重塑，从 Java 2 企业版更名为 Java 平台企业版。这本来是 J2EE 1.5，因此，自然就变成了重新命名的版本 Java EE
  5。此版本在总括 JSR 244 下发布，引入了 Java 注解，并于 2006 年 5 月 11 日发布。


  ### Java 平台企业版（Java EE）6


  Java EE 6 于 2009 年 12 月 10 日在总括 JSR 316 下发布。此版本是 Sun Microsystems 被 Oracle 收购前一年在其旗下的最后一个主要版本。其主要特性是引入了
  CDI 管理的安全性和 REST API。


  ### Java 平台企业版（Java EE）7


  在 Java EE 6 发布近四年后，Java EE 7 于 2013 年 5 月 28 日在总括 JSR 342 下发布。此版本引入了 WebSocket 和
  JSON 处理 API，并增强了 JSF API 中的 HTML5 支持。此版本也具有里程碑意义，因为它是 Oracle 收购 Sun Microsystems（迄今为止
  Java 平台的商标所有者）后的第一个主要 Java EE 版本。


  ### Java 平台企业版（Java EE）8


  在 Java EE 7 发布四年多后，Java EE 8 于 2017 年 8 月 31 日在总括 JSR 366 下发布。此版本的关键特性是 HTTP/2 和基于
  CDI 的安全性。Java EE 8 是一个非常重要的版本，部分原因是由于来自 Jakarta EE 大使（原 Java EE 守护者^(⁴)）等基层社区团体的巨大压力，迫使
  Oracle 完成了该版本的发布。这导致该版本的范围被缩减。




  ## 从 Java EE 到 Jakarta EE


  从前面按时间顺序发布的版本历史可以看出，每个版本之间的间隔年份越来越长，最终导致 Java EE 7 和 8 之间出现了超过四年的空白期。在像 Java 平台这样快节奏的生态系统中，版本之间间隔四年^(⁵)是一个巨大的鸿沟。这促使社区呼吁
  Oracle 明确其对企业级 Java 平台的意图，因为该平台是 Oracle 收购 Sun Microsystems 时继承而来的。在社区看来，Oracle
  似乎已经放弃了 Java EE。由于 Java EE 拥有广泛且深入的 API 集，甚至非 Java EE 产品也构建于此之上，因此 Java EE 的消亡对整个生态系统将是灾难性的。本质上，Java
  EE 构成了 Java 领域大部分企业级开发市场的基础。


  然而，在 2017 年晚些时候，在 Java EE 8 发布之后，Oracle 决定将 Java EE 平台转移到一个开源基金会，使其成为一个完全由社区驱动的开发平台。此次转移包括了
  Java EE 平台规范以及完整的测试兼容性工具包 (TCK)。在与 Java EE 的主要参与者 RedHat 和 IBM 协商后，Eclipse 基金会被选为
  Java EE 平台的新归属地。


  此时，Java EE 平台已有近二十年的历史，这意味着将如此庞大的平台从专有实体转移到开源基金会是一项艰巨的任务。一个值得注意的障碍涉及知识产权和商标权。为了使转移尽可能易于管理，该过程被分解为三个主要阶段^(⁷)，即：


  1.  转移 API 和实现代码

  2.  转移测试兼容性工具包 (TCK) 代码，制定新的规范流程

  3.  重构 API 包名，转移并更新规范文档


  ### 转移 API 和实现代码


  如前几节所述，Jakarta EE 由各个独立的规范组成，每个规范在转移到 Eclipse 基金会之前可能已经发布了 N 个版本。决定只将每个规范的最新发布版本转移到
  Eclipse 基金会。创建了顶级 Eclipse 项目 Eclipse Enterprise for Java (EE4J^(⁸))，并配有相应的 GitHub
  组织 eclipse-ee4j^(⁹)，作为这些规范及其实现的家园。


  在 Eclipse 基金会有了新家之后，转移的代码使用 Eclipse 基金会的服务器和基础设施进行构建，结果被暂存到一个 Maven 仓库，其 groupId
  从 javax.* 更改为 jakarta.*。这个 groupId 的更改意义重大，因为 Eclipse 基金会由于法律限制不能使用 javax 命名空间。从这些新的构件中，生成了参考实现（现在称为
  Eclipse GlassFish）的新构建，并在 Java EE 8 TCK 上运行。


  随着 Eclipse GlassFish 构建通过 TCK，它于 2019 年 1 月 29 日作为版本 5 发布。这个在 jakarta.* 包和 jakarta
  groupId 下的发布，在技术上仍然是 Java EE，因为它通过了 Java EE 8 认证。这仅标志着 Java EE 平台从 GitHub 上新的 Eclipse
  基金会 EE4J 项目发布，而不是从 Java EE 项目发布。另请注意，构成 Java EE 平台的各种规范的早期版本，均不由 Eclipse 基金会作为平台的一部分进行管理或维护。


  ### 转移测试兼容性工具包 (TCK) 代码，制定新的规范流程


  此阶段涉及转移 TCK，并从中为新的 Jakarta EE 版本规范构建新的二进制文件。此阶段还引入了新的 Jakarta EE 规范流程 (JESP)^(¹⁰)。新的
  JESP 本身采用了现有的 Eclipse 基金会规范流程 (EFSP) v1.2^(¹¹)，并做了一些修改。与 JESP 一起发布的还有 Eclipse 基金会技术兼容性工具包许可证^(¹²)。


  这两个法律框架共同指导着 Jakarta EE 规范的开发和兼容实现的发布，整个过程由 Eclipse 基金会端到端管理。新的 Jakarta EE 实现必须通过
  TCK，才能被认证为该平台的兼容实现，并有资格^(¹³)被列入 Eclipse 基金会的 Jakarta EE 下载页面^(¹⁴)。JESP 的目标是尽可能轻量级，鼓励采用“代码优先”的方法来开发平台，从而允许更多的实验和更快的迭代。


  请注意，在 Eclipse 基金会的背景下，我们一直使用术语“兼容实现”，而在此之前，在 JCP 的 Java EE 中，我们使用术语“参考实现”。这是因为在
  Eclipse 基金会，为了支持兼容实现，已经废除了“参考”实现的概念。目标是使认证过程尽可能简单快捷，并创造一个更公平的竞争环境，从而推动实现生态系统的创新。


  此过程的后续步骤包括更新各种 API 的 Javadoc，重新许可生成的 JAR 文件，并使用从新转移的 TCK 构建的二进制文件，针对 GlassFish 5.1
  版本进行测试。所有这些工作的结果是，Java EE 首次作为新转移的 Jakarta EE 版本 8 发布。此版本的正式发布日期是 2019 年 9 月 10
  日。请注意，Jakarta EE 8 的发布仍然使用 GlassFish 5.1 作为兼容实现。此外，此版本没有引入任何新的 API。这仅仅是“引擎盖下”的更改，标志着该平台在
  Eclipse 基金会管理下的首次完整发布。


  Java EE 向 Eclipse 基金会转移的这个阶段，还修订并重命名了各种 API，使其命名约定更加一致。例如，Java 持久化 API (JPA) 被重命名为
  Jakarta Persistence。用于容器的 Java 身份验证 SPI (JASPIC) 变成了 Jakarta Authentication，而其对应的用于容器的
  Java 授权契约 (JACC) 变成了 Jakarta Authorization。上下文和依赖注入 (CDI) API 变成了 Jakarta Contexts
  and Dependency Injection。这种简化的命名约定使得仅通过名称就能轻松掌握平台众多的 API。


  直到转移的这个阶段，要在该平台上开发应用程序，您需要使用图 1-1 中所示的依赖项。


  ![](img/531256_1_En_1_Fig1_HTML.jpg)


