  \n第 9 章将详细介绍如何使用 Eclipse MicroProfile Metrics API 暴露和显示各种度量指标。\n\n有了我们的资源方法，我们现在可以使用任何\
  \ REST 客户端向其发起一个示例 REST 调用。该客户端可以是 JWallet 中的另一个服务、一个 JavaScript 客户端、另一个用 Python\
