  }\npublic void setCurrency(String currency) {\nthis.currency = currency;\n}\n}\n\
  代码清单 3-27\nCreateWalletRequest 类\n```\n\n当我们通过 JAX-RS 运行时发起 REST 调用时，这两种类型分别被透明地转换成了\
  \ JSON 和从 JSON 转换回来。第 6 章将详细介绍 JAX-RS。现在，我们先来看一下`WalletService`上的`createWallet`方法，REST\
  \ 的`createWallet`资源方法将创建钱包的任务委托给了它，如代码清单 3-29 所示。\n\n```\n@Stateless\npublic class\
  \ WalletService {\n@Inject\nWalletRepository walletRepository;\n@Inject\nTransactionRepository\
  \ transactionRepository;\n@Inject\nRateService rateService;\npublic BalanceResponse\
  \ getBalance(final long walletId) {\nWallet wallet = walletRepository.findById(walletId);\n\
  BalanceResponseData data = new BalanceResponseData();\ndata.setWalletId(wallet.getId());\n\
