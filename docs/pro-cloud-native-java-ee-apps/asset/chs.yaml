- "# 6. 使用 Jakarta EE REST API 实现 REST\n\n表述性状态转移（REST）架构是一种用于现代应用的无状态、基于 HTTP 的通信标准。该架构最初由\
  \ Roy Fielding 博士在其博士论文中提出^(¹⁰⁶)，它已成为在不同语言和框架编写的应用之间实现简单、无状态、可预测、快速且基于表述的通信的事实标准。例如，使用\
  \ Python 的 Django 框架编写的应用可以拥有 REST 资源，这些资源可以被另一个使用 Java 和 Jakarta EE 编写的应用消费。同样，Jakarta\
  \ EE 应用也可以创建资源，供 C# 应用消费。\n\n消费 REST 资源的客户端并不总是外部应用。一个由微服务集合构成的单一应用，也会使用 REST 架构作为不同服务之间相互通信的方式。作为一种与平台无关的通信手段，HTTP\
  \ 协议允许 REST 资源的实现对客户端完全透明。\n\nJakarta RESTful Web Services 规范 ^(¹⁰⁷) 是在该平台上创建 REST\
  \ Web 服务的 Jakarta EE 标准。该规范定义了一系列接口和注解，用于结合其他 Jakarta EE 规范（如 Jakarta Contexts and\
  \ Dependency Injection）创建复杂的 Web 服务。\n\n本章将向您介绍 Jakarta RESTful Web Services 规范。您将学习如何使用该规范中非常简单的\
  \ API 结构创建不同类型的 Web 资源，以及它如何与其他 Jakarta EE 规范集成，形成一个用于开发现代应用的统一平台。\n\n本章还将介绍 Eclipse\
  \ MicroProfile REST 客户端，用于以类型安全的方式消费 REST 资源。学完本章后，您将掌握在 Jakarta EE 上创建 Web 服务以及使用\
  \ Eclipse MicroProfile Client 的坚实基础。\n\n## 建模 REST 服务\n\nREST Web 服务之所以被称为资源，是因为它们代表了应用资源。所代表的实际资源是特定于领域的。设计\
  \ REST Web 服务以向消费客户端暴露资源，需要根据可以对给定资源执行的操作来设计 Web 资源。由于 REST 架构基于 HTTP，资源被暴露为 HTTP\
  \ 路径。确定可以对资源执行哪些操作，可以明确这些操作可以在哪些 HTTP 路径上暴露。\n\n一旦确定了操作集及其对应的 HTTP 路径，就需要考虑应用数据格式。由于\
  \ HTTP 与语言无关，它可以用于以多种格式暴露资源，包括 JSON、XML 和纯文本。这一点很重要，因为不同的客户端可能希望以不同的格式获取相同的资源。然而，资源格式的问题正变得越来越不重要，因为\
  \ JSON 格式已成为 Web 的通用语言。因此，它通常是 HTTP 上暴露资源的默认格式。尽管如此，资源格式的问题仍然值得考虑，特别是当资源暴露给不同的客户端时。\n\
  \n在考虑了应用路径和数据格式之后，下一步是将 HTTP 方法^(¹⁰⁸)映射到已识别的路径。这一步需要将正确的 HTTP 方法映射到可以对相关资源执行的每个相应操作。\n\
  \n### 用户资源\n\n让我们为上一章关于 Jakarta Persistence 中详细讨论的 User 实体建模一个 REST 资源。对于我们的 User\
  \ 资源，我们希望允许客户端创建、更新、按 ID 查找用户、获取所有用户、搜索用户、查找具有特定总转换阈值的所有用户，最后删除用户。表 6-1 显示了映射到 HTTP\
  \ 路径及其对应 HTTP 方法的各种操作。\n\n表 6-1\n\n显示了 UserResource 的可能映射\n\n| 操作 | HTTP 路径 | 返回类型\
  \ | HTTP 方法 |\n| --- | --- | --- | --- |\n| 创建用户 | /users | 创建的用户 | POST |\n| 更新用户\
  \ | /users | 更新后的用户 | PUT |\n| 按 ID 查找用户 | /users/<userId> | 用户或异常 | GET |\n| 获取所有用户\
  \ | /users | 用户列表 | GET |\n| 搜索用户 | /users/search | 用户列表 | GET |\n| 按转换阈值查找用户 |\
  \ /users/<threshold> | 用户列表 | GET |\n| 删除用户 | /users | 空 | DELETE |\n\n该表显示了可以对用户资源执行的操作与相应的\
  \ HTTP 路径和方法之间的映射。命名资源方法需要遵循通用的良好 REST 实践。^(¹⁰⁹) 由于资源是通过 HTTP 标准（其本身与语言或平台无关）消费的，因此以直观、简单且一致的方式命名资源非常重要。表\
  \ 6-1 将作为本章剩余部分的讨论背景。\n\n## Jakarta REST 资源\n\n为了便于应用维护，REST 资源应以层次结构的方式组织。通常，应用会有一个基础路径，所有其他资源路径都相对于该路径进行访问。例如，来自\
  \ [`https://api.apilayer.com/currency_data`](https://api.apilayer.com/currency_data)\
  \ 的货币转换 API 将所有货币转换资源方法都托管在相对于 currency_data 路径的位置。这可以称为 apilayer.com 货币转换 API 的根应用路径或根资源。\n\
  \n### 根资源\n\n在 Jakarta REST 中，根资源被定义为 `jakarta.ws.rs.core.Application` 类的子类。清单 6-1\
  \ 显示了 jwallet 应用的根资源声明。\n\n```\n@ApplicationPath(\"api\")\npublic class RootResourceConfiguration\
  \ extends Application {\n}\n清单 6-1\n显示了根资源声明\n```\n\n根资源类被声明为 `Application` 类的子类。此类包含三个方法，可以重写它们以显式注册资源类、扩展和属性。大多数情况下，您不需要像清单\
  \ 6-1 那样重写这些方法。\n\n该类使用 `@ApplicationPath` 注解，并传递值 `\"api\"`。此注解定义了应用的根资源。应用中的所有资源都将通过基础路径或根路径\
  \ `/api` 进行访问。\n\n\n\n### Jakarta REST 资源\n\nJakarta REST 中的 REST 资源被定义为一个 Java\
  \ 类。该类将拥有一个与 HTTP 路径匹配的路径。然后，该类就被视为托管在该路径上。清单 6-2 介绍了 `UserResource`，用于实现表 6-1 中确定的各个资源。\n\
  \n```\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
  @Path(\"users\")\npublic class UserResource {\n@Inject\nUserService userService;\n\
  }\n清单 6-2\n展示了第一个 UserResource 类\n```\n\n`UserResource` 类是一个带有多个 Jakarta REST 注解的\
  \ POJO。这些注解将这个 POJO 转换为一个 REST HTTP 资源，尽管我们尚未添加任何资源方法。`@Consumes` 和 `@Produces`\
  \ 注解共同决定了资源类中的方法可以消费和产生的多用途互联网邮件扩展（MIME^(¹¹⁰)）媒体类型。由于 JSON 是 Web 和微服务应用程序中最流行的数据交换格式，因此常量\
  \ `MediaType.APPLICATION_JSON` 被传递给这两个注解。此常量是一个值为 `application/json` 的字符串。\n\n`@Path`\
  \ 注解被传递了值 `\"users\"`，指定该类托管在路径 `/api/users` 上。此注解接受一个值，该值表示被注解对象将托管在的 HTTP 资源路径。请记住，根路径或基本路径是通过\
  \ `RootResourceConfiguration` 上的 `@ApplicationPath` 设置为 `\"api\"` 的，如清单 6-1 所示。清单\
  \ 6-2 中展示的声明在路径 `/api/users` 上创建了一个资源，当客户端访问该路径时，将导致 Jakarta REST 运行时实例化一个 `UserResource`\
  \ 实例来处理该请求。\n\n运行时能够将 `/users` 映射到托管在基本路径 `/api` 下，因为在 `RootResourceConfiguration`\
  \ 中，`getClasses` 方法没有被重写。这意味着，默认情况下，所有资源类都将被扫描并作为子资源添加到这个根资源下。\n\n### HTTP 方法\n\n\
  有了资源类，我们就可以开始实现表 6-1 中所示的 HTTP 方法了。Jakarta REST 中的资源方法是一个 Java 方法，它带有任何必要的注解，这些注解指明了该\
  \ Java 方法响应的 HTTP 方法。有七个注解映射到用于创建资源方法的相应 HTTP 方法。它们是 `@POST`、`@GET`、`@PUT`、`@DELETE`、`@PATCH`、`@HEAD`\
  \ 和 `@OPTIONS`。\n\n#### @POST\n\n资源类方法上的 `@POST` 注解表示该方法响应 HTTP POST 请求。清单 6-3 展示了\
  \ `UserResource` 类中带有 `@POST` 注解的 `createUser` 方法。\n\n```\n@Consumes(MediaType.APPLICATION_JSON)\n\
  @Produces(MediaType.APPLICATION_JSON)\n@Path(\"users\")\npublic class UserResource\
  \ {\n@Inject\nUserService userService;\n@POST\npublic UserResponse createUser(CreateUserRequest\
  \ createUserRequest) {\nreturn userService.createUser(createUserRequest);\n}\n}\n\
  清单 6-3\n展示了 @POST 方法\n```\n\n`createUser` 方法带有 `@POST` 注解，意味着它响应 HTTP POST 请求。在没有显式\
  \ `@Path` 注解的情况下，此方法将托管在 `/api/users` 路径上。对该路径的 POST 请求将导致运行时调用 `UserResource` 类实例上的\
  \ `createUser` 方法。到目前为止，一切都是带有少量注解的纯 Java。该方法消费一个强类型的 Java 类 `CreateUserRequest`。\n\
  \n类级别的 `@Consumes` 注解意味着 `createUser` 方法消费 JSON。所谓消费 JSON，是指客户端将发布该方法所消费的 Java 类型的\
  \ JSON 表示形式，在本例中为 `CreateUserRequest`。当运行时将客户端请求匹配到此方法时，请求体（本例中为 JSON 字符串）将被传递给一个称为消息体读取器的构件。\n\
  \n##### 消息体读取器\n\n消息体读取器是参数化接口 `jakarta.ws.rs.ext.MessageBodyReader<T>` 的一个实例，它接收一个\
  \ `MediaType` 的 `InputStream` 并将其转换为 `T`，其中 `T` 是某种 Java 类型。每个消息体读取器都与一个单一的 `MediaType`\
  \ 相关联，它可以将其 `InputStream` 转换为 Java 类型。运行时附带了许多用于流行 `MediaType` 的消息体读取器。除非您想自定义转换过程，否则无需提供\
  \ `MessageBodyReader` 的实例。\n\n##### 消息体写入器\n\n消息体写入器与消息体读取器相反，它接收一个 Java 类型并将其转换为与其关联的\
  \ `MediaType` 所表示的类型。消息体写入器接收 Java 类型实例并将其写入返回给客户端的输出流。与消息体读取器类似，通常只有在需要对过程进行一些自定义时，您才会提供自己的自定义写入器实现。`createUser`\
  \ 方法返回的 `UserResponse` 对象同样会被转换为 JSON 并写入发送给客户端的响应输出流。\n\n清单 6-4 中所示的 HTTP 请求将由自动配置的消息体读取器自动映射到\
  \ `CreateUserRequest` Java 类型。\n\n```\nPOST http://localhost:3003/account/api/users\n\
  Content-Type: application/json\n{\n\"firstName\":\"John\",\n\"lastName\":\"Jakes\"\
  ,\n\"email\":\"a@b.com\",\n\"userRegion\":\"AFRICA\",\n\"birthDay\":\"08-02-1975\"\
  ,\n\"password\":\"_myStrong_pswd&^_I\"\n}\n清单 6-4\n展示了一个示例 POST 请求\n```\n\n请求体中的\
  \ JSON 将被映射到清单 6-5 中所示的 `CreateUserRequest`。\n\n```\npublic class CreateUserRequest\
  \ {\nprivate String firstName;\nprivate String lastName;\nprivate String email;\n\
  private LocalDate birthDay;\nprivate UserRegion userRegion;\nprivate String password;\n\
  }\n清单 6-5\n展示了 CreateUserRequest\n```\n\n资源方法的实际实现完全是业务特定的。REST 运行时会将请求体转换为方法参数并交给您处理。如清单\
  \ 6-3 中所声明的，如果客户端没有传递方法体或传递了空字符串，则方法参数将为 `null`。这意味着您必须对传递的值进行空值检查。为了防止这种情况，REST\
  \ 规范与 Jakarta Bean Validation 规范集成，以允许声明式验证。\n\n\n\n#### 验证资源\n\n正如上一章关于使用 Jakarta\
  \ Persistence 持久化数据所讨论的，Bean Validation API 是一组注解和接口，可用于将值约束为仅满足应用程序要求的值。为了防止客户端在创建用户时传递\
  \ null 或无效值，清单 6-6 展示了带有一些验证约束的 createUser 方法。\n\n```\n@Consumes(MediaType.APPLICATION_JSON)\n\
  @Produces(MediaType.APPLICATION_JSON)\n@Path(\"users\")\npublic class UserResource\
  \ {\n@Inject\nUserService userService;\n@POST\npublic UserResponse createUser(@NotNull\
  \ @Valid  CreateUserRequest createUserRequest) {\nreturn userService.createUser(createUserRequest);\n\
  }\n}\n清单 6-6\n展示了 Bean 验证\n```\n\n这两个约束注解 `@NotNull` 和 `@Valid` 将导致方法参数被验证。它首先会验证转换后的\
  \ POST 请求体不为 null。然后，它会对转换后的对象进行递归验证。在这种情况下，`CreateUserRequest` 上的所有约束验证都将被验证。只有在没有验证异常时，方法体才会被执行。如果因违反约束而导致验证异常，REST\
  \ 运行时会向客户端发送 HTTP 400（错误请求）。`CreateUserRequest` 及其验证约束如清单 6-7 所示。\n\n```\npublic\
  \ class CreateUserRequest {\n@NotEmpty\nprivate String firstName;\n@NotEmpty\nprivate\
  \ String lastName;\n@NotEmpty\n@Email\nprivate String email;\n@NotNull\n@Past\n\
  private LocalDate birthDay;\nprivate UserRegion userRegion;\n@NotEmpty\n@Size(min\
  \ = 8, max = 30)\nprivate String password;\n}\n清单 6-7\n展示了更新后的 CreateUserRequest\n\
  ```\n\n由于 `createUser` 方法没有像其类那样使用 `@Path` 注解显式声明任何资源路径，因此当向父路径 `/users`（由类上的 `@Path`\
  \ 注解声明）发送 POST 请求时，运行时将知道调用它。在一个没有显式 `@Path` 注解的类中，每种 HTTP 方法只允许存在一个。如果我们在同一个 `UserResource`\
  \ 类中声明另一个没有 `@Path` 注解的 `@POST` 方法，这将是一个错误。\n\n向 `/users` 路径发送一个包含有效数据的 POST 请求示例，如清单\
  \ 6-4 所示，将返回清单 6-8 中所示的 JSON 数据。\n\n```\nhttp://localhost:3003/account/api/users\n\
  HTTP/1.1 200 OK\nContent-Type: application/json\nContent-Language: en-US\nContent-Length:\
  \ 114\nDate: Fri, 26 Aug 2022 17:08:13 GMT\n{\n\"data\": {\n\"firstName\": \"John\"\
  ,\n\"lastName\": \"Jakes\",\n\"userId\": 5\n},\n\"response\": {\n\"responseCode\"\
  : \"0\",\n\"responseMessage\": \"OK\"\n}\n}\n清单 6-8\n展示了成功调用 /users 资源\n```\n\n\
  由 Jakarta REST 运行时生成的响应头包含有关响应的一些元数据。它告诉我们使用的 HTTP 版本、响应代码（在此次成功调用中为 200）。响应体中返回的\
  \ JSON 是 `createUser` 方法返回的 `UserResponse` 对象的表示。清单 6-9 展示了 `UserResponse` 对象。\n\
  \n```\npublic class UserResponse extends Response {\npublic static UserResponse\
  \ of(UserResponseData data) {\nUserResponse userResponse = new UserResponse();\n\
  userResponse.setData(data);\nreturn userResponse;\n}\n@Getter\n@Setter\npublic static\
  \ class UserResponseData {\nprivate Long userId;\nprivate String firstName;\nprivate\
  \ String lastName;\nprivate String username;\n}\n}\n清单 6-9\n展示了 UserResponse 类\n\
  ```\n\n使用清单 6-10 中所示的请求调用 `/users` 资源方法将导致 HTTP 响应代码 400，因为数据不正确。由于请求对象正在使用 `@Valid`\
  \ 和 `@NotNull` 注解进行验证，运行时将自动验证请求并返回适当的响应。\n\n```\nPOST http://localhost:3003/account/api/users\n\
  Content-Type: application/json\n{\n\"firstName\":\"John\",\n\"lastName\":\"Jakes\"\
  ,\n\"userRegion\":\"AFRICA\",\n\"birthDay\":\"08-02-1975\",\n\"password\":\"_myStrong_pswd&^_I\"\
  \n}\n清单 6-10\n使用错误数据调用 /users\n```\n\n请求数据缺少 `email` 字段，该字段在 `CreateUserRequest`\
  \ 中被注解为 `@NotEmpty`。上述调用导致如清单 6-11 所示的响应。\n\n```\nhttp://localhost:3003/account/api/users\n\
  HTTP/1.1 400 Bad Request\nContent-Type: text/plain;charset=UTF-8\nvalidation-exception:\
  \ true\nContent-Language: en-US\nContent-Length: 60\nConnection: Close\nDate: Fri,\
  \ 26 Aug 2022 17:35:41 GMT\n清单 6-11\n响应数据\n```\n\n这是自动完成的，只需要你使用相关的 Jakarta Bean\
  \ Validation 注解来注解你的字段。POST 方法不一定需要返回数据。`createUser` 方法也可以返回 void。资源方法返回什么是一个业务领域决策，需要根据具体情况进行判断。\n\
  \n#### @GET\n\n创建一个响应 HTTP GET 请求的方法需要用一个 `@GET` 注解来注解一个 Java 方法。在表 6-1 列出的资源方法列表中，有四个\
  \ GET 请求。其中三个返回用户集合。当不同的资源方法具有如此相似的返回类型时，这表明需要重构端点以简化它们。\n\n再次查看表 6-1，搜索用户和按总转换次数筛选用户的端点可以合并为一个。因此，搜索端点支持按总货币转换次数筛选或搜索用户。这样，搜索端点可以扩展，以便你可以基于谓词（如大于或等于、小于或等于等）按转换次数进行筛选。采用这种新方法，我们最终得到三个\
  \ GET 请求：一个用于按 ID 获取用户，一个用于获取所有用户，另一个用于搜索。清单 6-12 展示了为 `UserResource` 构建 GET 请求的首次尝试。\n\
  \n```\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
  @Path(\"users\")\npublic class UserResource{\n@Inject\nUserService userService;\n\
  @GET\n@Path(\"{userId}\")\npublic UserResponse getUser(@PathParam(\"userId\") Long\
  \ userId) {\nreturn userService.getUser(userId);\n}\n@GET\n@Path(\"search\")\npublic\
  \ List searchUsers(@NotNull @BeanParam UserSearchRequest userSearchRequest) {\n\
  return userService.searchUsers(userSearchRequest);\n}\n@GET\npublic List getAllUsers()\
  \ {\nreturn userService.getAllUsers();\n}\n}\n清单 6-12\n用户的 GET 请求\n```\n\n\n\n#####\
  \ @PathParam\n\n`getUser` 方法接受 `java.lang.Long` 类型参数。该参数使用 `@PathParam` 注解进行标注。传递给\
  \ `@PathParam` 注解的值与传递给该方法 `@Path` 注解的值相同。不过，`@Path` 注解的值被花括号括了起来。这是在 Jakarta REST\
  \ 中捕获资源路径或路径段中变量的一种方式。`{userId}` 是一个变量，在运行时将被替换为实际传递的值。`@PathParam` 会获取该值并将其注入到\
  \ `userId` 方法参数中。路径 `/api/users/1` 将与此方法匹配。\n\n路径参数不必只有一个。资源路径可以有 `/{param1}/{param2}/{param3}`\
  \ 或任何类似的组合。请记住，如果你两次使用同一个变量，则最后一次匹配的结果会生效。因此，如果你有 `/{same}/{same}`，并且使用 `@PathParam(\"\
  same\")` 注入变量，那么对于路径 `/foo/bazz`，所有 `@PathParam(\"same\")` 实例都将被注入值 `bazz`。在创建资源路径时请牢记这一点。`@Path`\
  \ 注解还支持使用正则表达式来限制可以作为路径传递的字符集。方法参数还可以通过 `@NotNull` 进一步约束。\n\n与 POST 方法类似，返回类型将自动编组为\
  \ JSON 表示形式，并以此形式返回给客户端。由于该类使用了 `@Produces(\"application/json\")` 注解，所有返回类型都将自动转换为\
  \ JSON。\n\n##### @BeanParam 和 @QueryParam\n\n`searchUsers` 资源方法位于 `/api/users/search`\
  \ 路径下。此方法接受一个 `UserSearchRequest` 对象，并返回一个 `UserResponses` 列表。该方法参数使用 `@BeanParam`\
  \ 注解，该注解用于将资源参数聚合到被注解的对象中。清单 6-13 展示了被注解的 `UserSearchRequest` 类。\n\n```\npublic\
  \ class UserSearchRequest implements Serializable {\n@QueryParam(\"firstName\")\n\
  private String firstName;\n@QueryParam(\"lastName\")\nprivate String lastName;\n\
  @QueryParam(\"totalConversions\")\nprivate BigDecimal totalConversions;\n@QueryParam(\"\
  conversionFilter\")\nprivate ConversionFilter conversionFilter = ConversionFilter.EQ;\n\
  @QueryParam(\"userType\")\nprivate UserType userType;\npublic enum ConversionFilter\
  \ {\nGT,\nGTE,\nLT,\nLTE,\nEQ,\nNEQ\n}\n}\n清单 6-13\nUserSearchRequest\n```\n\n`UserSearchRequest`\
  \ 类的字段使用了 `@QueryParam` 注解。此注解将传递的 HTTP 查询参数名称的值绑定到被注解的字段。它也可以像 `@PathParam` 一样用于方法参数。如清单\
  \ 6-13 中所用，当方法参数使用 `@BeanParam` 注解时，运行时将获取搜索资源的所有查询参数，并将它们注入到该类的一个实例中，然后将该实例传递给方法。\n\
  \n例如，HTTP GET 请求 `/api/users/search?firstName=Joe&conversionFilter=GTE` 将导致创建一个\
  \ `UserSearchRequest` 实例，并将 `firstName` 字段设置为 `Joe`，`conversionFilter` 字段设置为 `GTE`。`@BeanParam`\
  \ 是一个用于创建搜索类型资源的非常强大的注解，因为你可以将所有可能的查询参数抽象到一个对象中，就像我们在 `searchUsers` 方法中所做的那样，而不必使用许多方法参数。\n\
  \n在简单情况下，这个搜索资源应该足够了。但是，当返回一个列表时，数据集可能非常大，与其一次性全部返回，不如对客户端和服务器都更高效地进行分页。分页要求客户端能够传递一个限制（即每页返回的最大数据量）和一个偏移量。返回的信息还应包含关于搜索数据集的一些元数据，例如集合中的元素总数。清单\
  \ 6-14 展示了更新后的 `UserSearchRequest`，它为客户提供了分页选项。\n\n```\npublic class UserSearchRequest\
  \ implements Serializable {\n@QueryParam(\"firstName\")\nprivate String firstName;\n\
  @QueryParam(\"lastName\")\nprivate String lastName;\n@QueryParam(\"totalConversions\"\
  )\nprivate BigDecimal totalConversions;\n@QueryParam(\"conversionFilter\")\nprivate\
  \ ConversionFilter conversionFilter = ConversionFilter.EQ;\n@QueryParam(\"userType\"\
  )\nprivate UserType userType;\n@QueryParam(\"limit\")\n@DefaultValue(\"150\")\n\
  @Positive\nprivate Integer limit;\n@QueryParam(\"offset\")\n@DefaultValue(\"0\"\
  )\nprivate Integer offset;\npublic enum ConversionFilter {\nGT,\nGTE,\nLT,\nLTE,\n\
  EQ,\nNEQ\n}\n}\n清单 6-14\n更新后的 UserSearchRequest\n```\n\n\n\n##### @DefaultValue\n\
  \n`limit` 和 `offset` 字段也是查询参数，我们期望从请求中获取它们并注入到相应字段中。两个字段上的 `@DefaultValue` 在客户端未设置任何显式值时，会设置一个默认值。这意味着，如果没有将\
  \ `limit` 和 `offset` 值作为查询参数传递，实例化的类实例会将 `limit` 字段设置为 150，`offset` 字段设置为 0。`limit`\
  \ 字段还标注了 `@Positive`，这是一个 Bean 验证约束，用于将该字段的可能值限制为正整数。\n\n我们重构了 `UserSearchRequest`，但完全没有改动资源方法中的任何内容。这就是我们建议在处理查询参数时使用\
  \ `@BeanParam` 注解的原因。创建分页选项后，我们现在可以重构返回类型，使其也包含一些客户端在创建有意义的分页请求时使用的元数据。清单 6-15 展示了一个带有元数据的新参数化类\
  \ `SearchResult`。\n\n```\npublic class SearchResult implements Serializable {\n\
  private List searchResult = new ArrayList();\nprivate Long totalSize;\nprivate Long\
  \ offset;\nprivate Long limit;\n}\n清单 6-15\nSearchResult\n```\n\n`SearchResult`\
  \ 接受一个类型，并将该类型绑定到 `searchResult` 列表。该列表将包含实际的搜索结果。`totalSize` 字段指匹配搜索请求的总大小。`offset`\
  \ 和 `limit` 仅返回客户端传递的值（如果有的话）。利用这个新结构，我们可以重构 `searchUsers` 资源方法，使其返回一个类型为 `UserResponse`\
  \ 的 `SearchResult` 对象。清单 6-16 展示了更新后的资源方法。\n\n```\n@GET\n@Path(\"search\")\npublic\
  \ SearchResult searchUsers(@NotNull @BeanParam UserSearchRequest userSearchRequest)\
  \ {\nreturn userService.searchUsers(userSearchRequest);\n}\n清单 6-16\n更新后的 searchUsers\
  \ 资源方法\n```\n\n清单 6-17 展示了 `UserRepository` 中使用 Jakarta Persistence 规范的 Criteria\
  \ API 的完整搜索实现。正如前一章所讨论的，Criteria API 更适合此类应用搜索场景。\n\n```\npublic SearchResult searchUsers(final\
  \ UserSearchRequest searchRequest) {\nCriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();\n\
  CriteriaQuery query = criteriaBuilder.createQuery(User.class);\nRoot from = query.from(User.class);\n\
  final Set predicateSet = new HashSet();\nif (searchRequest.getFirstName() != null)\
  \ {\nPredicate firstName = criteriaBuilder.like(from.get(\"firstName\"), \"%\" +\
  \ searchRequest.getFirstName() + \"%\");\npredicateSet.add(firstName);\n}\nif (searchRequest.getLastName()\
  \ != null) {\nPredicate lastName = criteriaBuilder.like(from.get(\"lastName\"),\
  \ \"%\" + searchRequest.getLastName() + \"%\");\npredicateSet.add(lastName);\n}\n\
  if (searchRequest.getTotalConversions() != null) {\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.EQ) {\npredicateSet.add(criteriaBuilder.equal(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.GT) {\npredicateSet.add(criteriaBuilder.greaterThan(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.GTE) {\npredicateSet.add(criteriaBuilder.greaterThanOrEqualTo(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.LT) {\npredicateSet.add(criteriaBuilder.lessThan(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.LTE) {\npredicateSet.add(criteriaBuilder.lessThanOrEqualTo(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\nif (searchRequest.getConversionFilter()\
  \ == UserSearchRequest.ConversionFilter.NEQ) {\npredicateSet.add(criteriaBuilder.notEqual(from.get(\"\
  totalConversions\"),\nsearchRequest.getTotalConversions()));\n}\n}\nif (searchRequest.getUserType()\
  \ != null) {\nPredicate userType = criteriaBuilder.equal(from.get(\"userType\"),\
  \ searchRequest.getUserType());\npredicateSet.add(userType);\n}\nCriteriaQuery where\
  \ = query.select(from).where(predicateSet.toArray(new Predicate[] {}));\nTypedQuery\
  \ typedQuery = em.createQuery(where);\nif (searchRequest.getOffset() != null) {\n\
  typedQuery = typedQuery.setFirstResult(searchRequest.getOffset());\n}\nif (searchRequest.getLimit()\
  \ != null) {\ntypedQuery = typedQuery.setMaxResults(searchRequest.getLimit());\n\
  }\nList response =\ntypedQuery.getResultList().stream().map(UserService::toUserResponse).collect(Collectors.toList());\n\
  SearchResult searchResult = new SearchResult();\nsearchResult.setSearchResult(response);\n\
  CriteriaQuery countQuery = criteriaBuilder.createQuery(Long.class);\nRoot userCountRoot\
  \ = countQuery.from(User.class);\ncountQuery.select(criteriaBuilder.countDistinct(userCountRoot.get(\"\
  id\")))\n.where(predicateSet.toArray(new Predicate[] {}));\nLong count = em.createQuery(countQuery).getSingleResult();\n\
  searchResult.setTotalSize(count);\nsearchResult.setLimit(Long.valueOf(searchRequest.getLimit()));\n\
  searchResult.setOffset(searchResult.getOffset());\nreturn searchResult;\n}\n清单 6-17\n\
  使用 Criteria API 的搜索用户实现\n```\n\n正如前一章所讨论的，Criteria API 可能非常冗长且难以处理。然而，它是处理这类数据库查询的最佳工具。通常，你会将搜索实现查询分解为更小的方法。此处为了便于参考，将它们作为一个整体呈现。\n\
  \n实现了包含分页功能的搜索方法后，我们需要对最后一个 GET 方法做出架构决策。该方法仅返回系统中的所有用户。但我们真的需要它吗？由于搜索资源方法也返回类似的结果，我们可以决定移除最后一个\
  \ GET 方法，因为它几乎是多余的。你可以搜索用户集合，这将返回一个列表。拥有一个返回所有用户的端点也需要分页以获得更好的性能。由于这已在 `searchUsers`\
  \ 端点中实现，从架构角度来看，我们可以省略最终的 GET 方法。\n\n\n\n#### @PUT\n\n@PUT 方法用于创建或更新资源。通常的模式是使用\
  \ @POST 进行创建，使用 @PUT 进行更新。我们将遵循这一约定。因此，@PUT 用于更新用户。清单 6-18 展示了 UserResource 类中的\
  \ @PUT 方法。\n\n```\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
  @Path(\"users\")\npublic class UserResource {\n@Inject\nUserService userService;\n\
  @PUT\npublic UserResponse updateUser(@NotNull UpdateUserRequest updateUserRequest)\
  \ {\nreturn       userService.updateUser(updateUserRequest);\n}\n}\n清单 6-18\n@PUT\
  \ 方法\n```\n\n由于此方法没有显式声明任何 @Path 参数，它将托管在根路径 /users 下。对 /api/users 的 HTTP PUT 请求将匹配到此方法。方法参数使用了\
  \ @NotNull 注解，因为我们不希望客户端传递 null。但实际的 UpdateUserRequest 并未声明任何约束验证。清单 6-19 展示了 UpdateUserRequest。\n\
  \n```\npublic class UpdateUserRequest implements Serializable {\nprivate Long userId;\n\
  private String firstName;\nprivate String lastName;\n@JsonbDateFormat(\"dd-MM-yyyy\"\
  )\nprivate LocalDate birthDay;\nprivate CreateUserRequest.UserRegion userRegion;\n\
  }\n清单 6-19\nUpdateUserRequest\n```\n\n该类仅允许更新用户的选定字段。这是因为在应用程序开发中，你经常会遇到一些实体字段会影响应用程序的其他许多部分。例如，用户电子邮件可能链接到用户拥有的其他工件。允许临时更新此类字段可能会导致数据损坏。这些核心字段通常通过更复杂的方式更新，例如通过使用业务流程。这样，该字段被使用的所有其他位置都会一次性得到更新。这就是为什么从架构和业务角度来看，UpdateUserRequest\
  \ 只允许更新选定字段。\n\nbirthDay 字段上的 @JsonbDateFormat 注解用于设置传入值的日期格式。此注解来自 Jakarta JSON\
  \ Binding 规范^(¹¹¹)，这是一个用于在 JSON 和 Java 之间进行转换的 API。该规范是将响应类型编组为 JSON 的默认底层提供程序。该注解接受与\
  \ java.time 包中的 DateTimeFormatter 相同的日期格式。\n\n#### @DELETE\n\n@DELETE 方法用于创建一个响应\
  \ HTTP DELETE 方法的资源方法。与更新某些字段类似，删除资源是一个非常严肃的操作，必须以可控且经过深思熟虑的方式进行。在企业应用程序中，删除资源需要一个业务流程，以确保被删除资源所使用到的所有位置都得到妥善处理。然而，为了完整性起见，清单\
  \ 6-20 展示了一个 @DELETE 方法。\n\n```\n@DELETE\npublic void deleteUser(@NotNull @Positive\
  \ Long userId) {\nuserService.removeUser(userId);\n}\n清单 6-20\n@DELETE 方法\n```\n\
  \n### 响应对象\n\n到目前为止看到的资源方法都直接返回 Java 类型，然后这些类型被编组为 JSON。可以使用 `jakarta.ws.rs.core.Response`\
  \ 对象向客户端提供自定义元数据。清单 6-21 展示了重构后的 createUser 资源方法，它返回一个包含新创建实体路径的自定义 Response 对象。\n\
  \n```\n@POST\npublic Response createUser(@NotNull @Valid CreateUserRequest createUserRequest,\
  \ @Context UriInfo uriInfo) {\nUserResponse user = userService.createUser(createUserRequest);\n\
  URI uri = uriInfo.getAbsolutePathBuilder()\n.path(user.getData().getUserId().toString())\n\
  .build();\nreturn Response.created(uri).entity(user).build();\n}\n清单 6-21\n返回 Response\
  \ 对象\n```\n\ncreateUser 方法现在接受两个参数。第二个参数是 UriInfo，通过使用 @Context 注解注入到变量 uriInfo\
  \ 中。此注解用于将 Jakarta REST 工件注入到字段和方法参数中。UriInfo 接口包含用于获取当前请求 URI 信息的方法。createUser\
  \ 实现首先保存传入的用户，然后构建指向新创建用户位置的路径。\n\n回想一下表 6-1，我们将通过 ID 获取用户的路径设置为 /api/users/{userId}。URI\
  \ info 实例调用 getAbsolutePathBuilder 方法，该方法返回当前资源类的完整路径，然后将新创建的用户 ID 附加到该路径上。清单 6-22\
  \ 展示了当发出如清单 6-4 所示的 POST 请求时返回的响应。\n\n```\nhttp://localhost:3003/account/api/users\n\
  HTTP/1.1 201 Created\nContent-Type: application/json\nLocation: http://localhost:3003/account/api/users/1\n\
  Content-Language: en-US\nContent-Length: 114\nDate: Sat, 27 Aug 2022 00:07:22 GMT\n\
  {\n\"data\": {\n\"firstName\": \"John\",\n\"lastName\": \"Jakes\",\n\"userId\":\
  \ 1\n},\n\"response\": {\n\"responseCode\": \"0\",\n\"responseMessage\": \"OK\"\n\
  }\n}\n清单 6-22\n返回的自定义 Response 对象\n```\n\nLocation 头字段被设置为指向新创建用户的完整 URI。然后客户端可以导航该路径，从资源类加载新创建的用户。同样值得注意的是，在清单\
  \ 6-21 中，当 createUser 资源方法返回 UserResponse 时，HTTP 响应码是 200。但在清单 6-22 中，当返回 Response\
  \ 对象时，HTTP 响应码是 201。Response 类可用于创建返回给客户端的各种形式的自定义响应数据。\n\n\n\n## 异常映射器\n\n异常映射是\
  \ Jakarta REST 中用于将异常映射到客户端响应的一种机制。业务异常是向客户端发出信号，表明应用程序的正常执行出现了问题。向客户端传达异常消息的方式是通过使用异常映射器。当在清单\
  \ 6-10 中发出 POST 请求以创建用户时，服务器以 HTTP 状态码 400 响应，告知客户端请求有误。这条消息帮助不大。更好的体验是准确告知客户端传递的数据具体哪里有问题。这可以通过使用异常映射器来实现。\n\
  \n异常映射器是 `jakarta.ws.rs.ext.ExceptionMapper` 接口的一个实现。该接口接受一个 `Throwable` 类型，并在 `toResponse`\
  \ 方法中将其映射到一个 `Response` 对象。清单 6-23 展示了一个用于向客户端返回验证约束违反消息的异常映射器。\n\n```\n@Provider\n\
  public class ConstraintViolationExceptionMapper implements ExceptionMapper<ConstraintViolationException>\
  \ {\n    @Override\n    public Response toResponse(ConstraintViolationException\
  \ exception) {\n        StringBuilder builder = new StringBuilder();\n        for\
  \ (ConstraintViolation<?> cv : exception.getConstraintViolations()) {\n        \
  \    String path = cv.getPropertyPath().toString().split(\"\\\\.\")[2];\n      \
  \      builder.append(path).append(\" - \")\n                   .append(cv.getMessage()).append(\"\
  \\n\");\n        }\n        return  Response.status(Response.Status.BAD_REQUEST)\n\
  \                .entity(builder.toString())\n                .build();\n    }\n\
  }\n清单 6-23\n异常映射器\n```\n\n`ConstraintViolationExceptionMapper` 将 `jakarta.validation.ConstraintViolationException`\
  \ 异常映射到一个 `Response` 对象。当发生约束违反时，会抛出 `ConstraintViolationException`，其中包含一组发生的约束。每个约束对象都包含发生违反的字段名称。`toResponse`\
  \ 方法将这些信息映射成一个字符串，并将其设置为 `Response` 的实体。类上的 `@jakarta.ws.rs.ext.Provider` 注解将其注册为一个\
  \ Jakarta REST 构件，运行时将自动扫描并注册它。清单 6-24 展示了向 `createUser` 资源方法发送格式错误数据的调用响应。\n\n\
  ```\nHTTP/1.1 400 Bad Request\nContent-Type: application/json\nContent-Language:\
  \ en-US\nContent-Length: 55\nConnection: Close\nDate: Sat, 27 Aug 2022 00:46:22\
  \ GMT\nlastName - must not be empty\nemail - must not be empty\n清单 6-24\n映射后的响应\n\
  ```\n\n该请求省略了 `CreateUserRequest` 对象的 `email` 和 `lastName` 字段。这导致了验证异常的发生，并且 `ConstraintViolationException`\
  \ 通过我们注册的异常映射器被映射给了客户端。响应体显示了每个违反的字段以及相应的帮助信息。\n\n## Jakarta REST 客户端\n\nJakarta\
  \ REST 附带了一个用于发起 REST 调用的 HTTP 客户端。这个客户端是一个非常简单的结构，围绕 `jakarta.ws.rs.client.WebTarget`\
  \ 接口展开。`WebTarget` 通过其 URI 定位一个资源。通过调用 `jakarta.ws.rs.client.ClientBuilder` 类返回的\
  \ `jakarta.ws.rs.client.Client` 实例上的静态 `target` 方法，可以获得一个 `WebTarget`。清单 6-25 展示了在\
  \ account 模块的测试类中构建一个 `Client` 并使用它来定位资源以获取 `WebTarget` 的过程。\n\n```\npublic class\
  \ AbstractAccountIT {\n    protected static final WebTarget target;\n    protected\
  \ static final Client client;\n    static {\n        client = ClientBuilder.newClient();\n\
  \        target = client.target(\"http://localhost:3003/account/api\");\n    }\n\
  \    @AfterAll\n    protected static void cleanUp() {\n        if (client != null)\
  \ {\n            client.close();\n        }\n    }\n}\n清单 6-25\n获取一个 Client\n```\n\
  \n`ClientBuilder.newClient` 方法返回一个 `Client`。`Client` 是重量级对象，因此不应创建超过必要数量的实例。在前面的例子中，返回的实例被赋值给静态变量\
  \ `client`。然后调用 `target` 方法，传入要定位的完整基础资源路径，返回一个 `WebTarget` 实例，该实例被赋值给 `target`\
  \ 变量。实例化是在一个静态块中完成的，因为 `WebTarget` 和 `Client` 实例是静态的。仅此初始化就足以在所有调用中使用 `target`。\n\
  \n一切完成后，应关闭 `Client` 以防止资源泄漏。根据 API 文档，“`Client` 是管理客户端通信基础设施的重量级对象。`Client` 实例的初始化和销毁可能是一项相当昂贵的操作。”因此，我们在\
  \ JUnit 测试套件中带有 `@AfterAll` 注解的 `cleanUp` 方法中，在所有测试运行完毕后关闭 `Client` 实例。\n\n初始化 `WebTarget`\
  \ 后，可以通过指定目标资源的相对路径来发起 HTTP REST 调用。清单 6-26 分别展示了向 `/users` 和 `/users/{userId}`\
  \ 资源路径发起 POST 和 GET 请求。\n\n```\n@Test\nvoid createUser() {\n    UserResponse createdUser\
  \ = target.path(\"users\")\n            .request().post(Entity.json(createUserRequest),\
  \ UserResponse.class);\n    assertEquals(\"0\", createdUser.getResponse().getResponseCode());\n\
  \    assertEquals(\"OK\", createdUser.getResponse().getResponseMessage());\n   \
  \ // get created user\n    UserResponse userResponse = target.path(\"users/{userId}\"\
  )\n            .resolveTemplate(\"userId\", createdUser.getData().getUserId()).request()\n\
  \            .get(UserResponse.class);\n    assertEquals(\"0\", userResponse.getResponse().getResponseCode());\n\
  \    assertEquals(\"OK\", userResponse.getResponse().getResponseMessage());\n}\n\
  清单 6-26\n使用客户端发起调用\n```\n\n`WebTarget` 上的 `path` 方法返回另一个 `WebTarget` 实例，该实例解析为传递给\
  \ `client.target` 调用的原始路径（在清单 6-25 中）和这个新路径的组合。因此，清单 6-26 中的 `target.path(\"users\"\
  )` 调用将返回的 `WebTarget` 解析为 `http://localhost:3003/account/api/users`。然后，在隐式返回的 `WebTarget`\
  \ 实例上调用 `request` 方法，返回一个 `jakarta.ws.rs.client.SyncInvoker` 实例。该接口包含所有可以调用的 HTTP\
  \ 方法，用于发起实际的请求。\n\n清单 6-26 中调用的 `post` 方法传入了一个 `CreateUserRequest` 实例。该实例使用 `jakarta.ws.rs.client.Entity`\
  \ 类上的静态 `json` 方法转换为 JSON。传递给 `post` 方法的第二个参数是返回的响应应被转换成的类类型。根据表 6-1 中显示的资源路径，对\
  \ `/api/users` 资源的 POST 请求会返回创建的用户。`post` 调用的响应直接赋值给一个 `UserResponse` 变量，因为运行时会自动读取返回的实体并将其从\
  \ JSON 转换为具体的 Java 类型。\n\n第二个调用是对 `/api/users/{userId}` 端点的 GET 调用。该端点接受一个路径参数。`path`\
  \ 方法传入包含变量名的原始路径，然后通过 `resolveTemplate` 方法将其解析为用户的 ID。该方法接受要解析的变量名和要解析成的值。然后调用 `get`\
  \ 方法发起 HTTP GET 请求。返回的响应直接赋值给一个 Java 类型，因为 `get` 方法传入了一个类类型，响应的主体应被转换为该类型。\n\nJakarta\
  \ REST 客户端是一个功能丰富的 API，用于向 Web 资源发起各种形式的 HTTP 调用。你可以链式调用 `path` 方法并解析变量来创建复杂的资源路径。你也可以获取调用返回的原始\
  \ `jakarta.ws.rs.core.Response` 对象，以便在代码中使用。\n\n\n\n## MicroProfile REST 客户端\n\n\
  Eclipse MicroProfile REST 客户端规范^(¹¹²)提供了另一种以更类型安全的方式进行 REST 调用的方法。尽管上一节介绍的 Jakarta\
  \ REST 客户端能够完成任务，但有时会显得冗长且笨拙。MicroProfile REST 客户端是另一种在 Java 中消费 HTTP 资源的方式，无需处理创建客户端对象的底层工作。清单\
  \ 6-27 展示了一个完整的 MicroProfile REST 客户端声明，用于对外调用 apilayer.com 的货币转换服务。\n\n```\n@RegisterRestClient(baseUri\
  \ = BASE_URI)\n@ClientHeaderParam(name = \"apikey\", value = \"INSERT_API_KEY_FROM_SERVICE\"\
  )\n@Path(\"exchangerates_data\")\npublic interface ApiLayer {\nString NAME = \"\
  ApiLayer\";\nString BASE_URI = \"https://api.apilayer.com\";\n@GET\n@Path(\"convert\"\
  )\nApiLayerConvertResponse convertCurrency(@BeanParam ApiLayerConvertRequest apiLayerConvertRequest);\n\
  @GET\n@Path(\"list\")\nJsonObject getCurrencySymbols();\n}\n清单 6-27\nMicroProfile\
  \ 客户端\n```\n\n创建 REST 客户端需要描述要访问的资源。`ApiLayer` 接口声明了两个 HTTP GET 方法。第一个方法接受一个 `ApiLayerConvertRequest`\
  \ 对象，该对象使用 `@BeanParam` 注解，其中包含了 apilayer.com 货币服务所需的查询参数。这两个方法分别返回 `ApiLayerConvertResponse`\
  \ 和 `JsonObject`。第一个返回类型是特定于应用的对象，第二个 `JsonObject` 是 Jakarta JSON Processing API\
  \ 的一部分。\n\n该接口使用 `@RegisterRestClient(baseUri = BASE_URI)` 注解。这个注解是一个 MicroProfile\
  \ REST 客户端原型，将此接口标记为针对 `baseUri` 的 REST 客户端。使用此客户端的所有调用都将相对于 `baseUri` 传递的值进行，在此示例中为\
  \ [`https://api.apilayer.com`](https://api.apilayer.com)。`@ClientHeaderParam(name\
  \ = “apikey”, value = “API_KEY”)` 用于向出站请求添加 HTTP 头信息。由于在接口级别使用，通过此客户端发出的每个出站请求都将包含来自此注解的键值对作为头条目。对于前面的示例，每个请求的请求头中都将包含\
  \ `apiKey=“YOUR_API_KEY_FROM_API_LAYER”`。\n\n`@Path` 注解用于指定相对路径，在此客户端上调用的方法将相对于该路径进行。因此，在此客户端实例上调用的所有方法都将相对于\
  \ [`https://api.apilayer.com/exchangerates_data`](https://api.apilayer.com/exchangerates_data)\
  \ 进行。第一个 GET 方法将针对 [`https://api.apilayer.com/exchangerates_data/convert`](https://api.apilayer.com/exchangerates_data)\
  \ 调用，第二个方法将针对 [`https://api.apilayer.com/exchangerates_data/list`](https://api.apilayer.com/exchangerates_data)\
  \ 调用。声明好客户端后，使用它就像使用 `@Inject` 和 MicroProfile 特定的限定符 `@RestClient` 注入它一样简单。清单 6-28\
  \ 展示了在 `RateService` bean 中使用 `ApiLayer` REST 客户端的情况。\n\n```\n@ApplicationScoped\n\
  public class RateService {\n@Inject\n@RestClient\nApiLayer apiLayer;\nprivate ConvertCurrencyResponse\
  \ convert(final ConvertCurrencyRequest currencyRequest) {\nApiLayerConvertRequest\
  \ request = new ApiLayerConvertRequest();\nrequest.setFromCurrency(currencyRequest.getSourceCurrency());\n\
  request.setToCurrency(currencyRequest.getTargetCurrency());\nrequest.setAmount(currencyRequest.getAmount().toPlainString());\n\
  ApiLayerConvertResponse response = apiLayer.convertCurrency(request);\nConvertCurrencyResponseData\
  \ data = new ConvertCurrencyResponseData();\ndata.setCurrency(currencyRequest.getTargetCurrency());\n\
  data.setAmount(response.getResult());\ndata.setSource(ApiLayer.NAME);\nreturn ConvertCurrencyResponse.of(data);\n\
  }\n}\n清单 6-28\nREST 客户端的使用\n```\n\n要使用 REST 客户端，我们使用 `@Inject` 注入它，并使用 MicroProfile\
  \ REST 客户端 API 中的 `@RestClient` CDI 限定符对其进行限定。接口的实现将在运行时由底层的 REST 客户端实现提供。`convert`\
  \ 方法像调用任何其他 Java 实例一样，在注入的客户端上调用 `convertCurrency` 方法。该实现将负责创建实际的 HTTP 请求、调用目标资源、获取响应并将其转换为声明的\
  \ Java 类型。`ApiLayerConvertRequest` 和 `ApiLayerConvertResponse` 类分别如清单 6-29 和 6-30\
  \ 所示。\n\n```\npublic class ApiLayerConvertResponse {\nprivate boolean success;\n\
  private Info info;\nprivate LocalDate date;\nprivate BigDecimal result;\n@Getter\n\
  @Setter\npublic static class Info {\nprivate Long timestamp;\nprivate BigDecimal\
  \ rate;\n}\n}\n清单 6-30\nApiLayerConvertResponse\n```\n\n```\npublic class ApiLayerConvertRequest\
  \ {\n@QueryParam(\"from\")\nprivate String fromCurrency;\n@QueryParam(\"to\")\n\
  private String toCurrency;\n@QueryParam(\"amount\")\nprivate String amount;\n}\n\
  清单 6-29\nApiLayerConvertRequest\n```\n\n`ApiLayerConvertResponse` 是端点返回的 JSON 的\
  \ Java 表示。REST 客户端运行时负责自动将返回的 JSON 编组为 Java 表示。清单 6-31 显示了由 [`https://api.apilayer.com/exchangerates_data/convert`](https://api.apilayer.com/exchangerates_data)\
  \ 端点返回的示例 JSON。\n\n```\n{\n\"date\": \"2005-01-01\",\n\"historical\": true,\n\"\
  info\": {\n\"quote\": 0.51961,\n\"timestamp\": 1104623999\n},\n\"query\": {\n\"\
  amount\": 10,\n\"from\": \"USD\",\n\"to\": \"GBP\"\n},\n\"result\": 5.1961,\n\"\
  success\": true\n}\n清单 6-31\n示例返回数据\n```\n\n`ApiLayer` 接口中的 `getCurrencySymbols`\
  \ 端点返回一个 `JsonObject`。对于此端点，我们希望直接获取 JSON 数据以进行进一步处理。当在客户端实例上调用该方法时，REST 客户端运行时会将响应的\
  \ JSON 字符串表示转换为 `JsonObject`。MicroProfile REST 客户端 API 是在 Jakarta EE 应用程序中消费 REST\
  \ 资源的一种强大、直观且类型安全得多的方式。\n\n## 总结\n\n本章探讨了使用 Jakarta REST API 创建 RESTful Web 服务。我们研究了将领域资源建模为\
  \ HTTP 资源路径，接着使用 API 中的各种构造来创建这些资源，并学习了如何使用客户端 API 进行 REST 调用。我们还研究了 Eclipse MicroProfile\
  \ REST 客户端，并看到了使用该 API 消费 REST 资源是多么简单。您可以在相应的 Jakarta REST 和 Eclipse MicroProfile\
  \ REST 客户端规范中找到更多高级主题。它们都使用易于理解的语言编写，应作为您掌握高级用法的权威知识来源。\n\n脚注 1   2   3   4   5\
  \   6   7\n\n\n\n"
- '# 7. 管理配置


  每个应用程序在投入生产环境的过程中都会经历不同的阶段。从开发到测试，再到预发布，最后到生产，所有这些阶段都会针对各自的环境拥有不同的配置。例如，一个使用外部服务（如欺诈检测
  API）的应用，会根据其运行阶段为该服务设置不同的配置。另一个需要在批处理服务中导入数据的应用，也会根据其所在阶段，为导入哪些数据设置不同的配置。


  应用程序需要根据提供的某些配置值表现出不同的行为。如果这些配置值与应用程序捆绑在一起，那将非常繁琐，这意味着必须为每个阶段重新打包和部署应用程序。理想的情况是拥有一种机制，让开发者能够为不同的应用阶段定义不同的配置值，而无需重新打包和重新部署应用程序。


  这正是 Eclipse MicroProfile Config API 的设计目的。它是一个规范，能让你的应用程序透明地访问不同的配置源，而无需改动应用程序本身。因此，例如在前面提到的欺诈检测示例中，你可以为开发阶段设置一个虚拟
  URL，为测试和预发布阶段设置服务提供商提供的测试 URL，最后为生产阶段设置正式使用的 URL。


  Config 规范允许你以分层方式定义这些配置值，从而根据阶段自动返回正确的值。本章将介绍 Eclipse MicroProfile Config 规范。学完本章后，你将学会如何将
  Config API 集成到你的应用程序中，并使用它来外部化动态的应用程序配置值。


  ## 什么是 Config 规范？


  Eclipse MicroProfile Config 规范定义了一个用于管理应用程序配置的灵活系统。根据引言部分的示例，一个应用程序至少需要为所述阶段提供三种不同的配置。Config
  规范提供了以灵活直观的方式实现这一目标的构造。Config 规范包含三个核心部分，即：配置源、转换器和配置值。


  ## 配置源


  配置源就是配置的来源。如果应用程序请求某个配置值，例如 *foo*，Config 运行时将需要加载与属性键 *foo* 关联的值。定义配置键值对的地方就是配置源。配置源可以是任何东西或任何位置：数据库、系统属性、环境变量等。所有这些可能的配置属性来源都被
  Config 运行时抽象为一个 `ConfigSource`。


  你的应用程序通过 `ConfigSource` 抽象层以透明的方式与这些配置源交互。这样，应用程序就无需关心配置值的实际来源。这带来了灵活性，可以组合各种配置源，以满足即使是最复杂的应用程序需求。


  由于可能存在无数个配置源，因此需要一种方法来对源进行排序或确定优先级。例如，如果属性 `foo=someValue` 在多个配置源中都有定义，那么哪个配置源应该优先？


  为此，该规范提供了序数（ordinal）的概念。每个配置源都被分配一个序数值，该值决定了其优先级。序数较高的源比序数较低的源具有更高的优先级。因此，在前面的例子中，如果属性
  `foo=someValue` 在序数为 100 的配置源 A 中定义，而 `foo=thatValue` 在序数为 300 的配置源 B 中定义，那么调用获取属性
  foo 的值将返回 *thatValue*，因为其源具有更高的序数。如果多个 ConfigSource 恰好具有相同的序数，那么它们将按名称排序。


  Config 规范定义了三个默认的配置源及其默认序数值，如图 7-1 所示。


  图 7-1 展示了默认的配置源。


  ![](img/531256_1_En_7_Fig1_HTML.png)


  流程图展示了以下配置源的序数：系统属性；环境变量；以及 `META-INF/microprofile-config.properties`。


  图 7-1


  配置序数


  第一个源映射到调用 `System.getProperties()` 所得到的内容。第二个源是调用 `System.getenv()` 方法所得到的内容。第三个源，即
  `microprofile-config.properties` 文件，通常与应用程序捆绑在一起。该文件位于 resources 文件夹下的 `META-INF`
  文件夹中。


  Config 运行时从序数最高的配置源开始搜索配置属性，一直搜索到序数最低的源。在该搜索顺序中，第一个匹配项胜出。这样，你就可以在不同的配置源中为同一个属性定义不同的值。例如，在随应用程序一起提供的
  `microprofile-config.properties` 文件中定义属性 `foo=someValue`，并将同一个属性 `foo=thatValue`
  定义为系统属性，那么在运行时调用 foo 属性将返回 *thatValue*。这是因为它在具有更高序数的源中定义。




  ### 自定义配置源


  你的应用程序并不局限于三种默认配置源。例如，你可能正在与一个将应用程序所需的配置值存储在数据库中的遗留系统进行交互。你可以为应用程序定义一个数据库配置源，并将其注册到
  Config 运行时。它会像默认配置源一样被扫描和获取。清单 7-1 展示了 jwallet 的一个 DatabaseConfigSource 自定义配置源。


  ```

  public class DatabaseConfigSource implements ConfigSource {

  @Override

  public Set getPropertyNames() {

  return ConfigRepoManager.getPropertyNames();

  }

  @Override

  public String getValue(final String key) {

  return ConfigRepoManager.getPropertyValue(key);

  }

  @Override

  public String getName() {

  return this.getClass().getSimpleName();

  }

  @Override

  public int getOrdinal() {

  return 450;

  }

  }

  清单 7-1

  展示了 DatabaseConfigSource

  ```


  清单 7-1 展示了在 DatabaseConfigSource 类中声明的自定义配置源。该类首先实现了 ConfigSource 接口。前三个方法是从该接口总共五个方法中必须实现的方法。另外两个是可选的。DatabaseConfigSource
  是一个用于从数据库获取配置值的配置源。这些值可以由任何人或任何系统放入。DatabaseConfigSource 将其抽象为已实现的 ConfigSource
  视图。


  方法 getPropertyNames 返回在此配置源中找到的属性名称集合。getValue 方法返回与传入键关联的值。例如，传入键 foo 应返回与其关联的值。getName
  方法返回此配置源的名称，主要用于日志记录和调试目的。这是从 ConfigSource 接口需要重写的三个方法。


  getOrdinal 方法是一个可选方法，返回此配置源的序号。请记住，序号决定了配置源的优先级。如果此方法未被重写，将使用 ConfigSource 接口中定义的默认序号
  100。对于 DatabaseConfigSource，我们希望它成为搜索配置时的首选位置。因此，序号设置为 450，使其优先级高于三个默认配置源。


  ConfigRepoManager 是一个工具类，它实例化一个 dataSource 并使用 JDBC 查询数据库。对于此示例，我们假设有一个包含两个字段 PROPERTY_KEY
  和 PROPERTY_VALUE 的数据库表，分别对应配置键及其值。清单 7-2 展示了 ConfigRepoManager 工具类中的 getPropertyValue
  方法。


  ```

  public static String getPropertyValue(final String keyName) {

  try {

  final PreparedStatement query;

  try (final Connection connection = dataSource.getConnection()) {

  query = connection.prepareStatement("SELECT PROPERTY_VALUE FROM CUSTOM_CONFIGURATIONS
  WHERE PROPERTY_KEY = ?");}

  query.setString(1, keyName);

  final ResultSet propertyValue = query.executeQuery();

  if (propertyValue.next()) {

  return propertyValue.getString(1);

  }

  propertyValue.close();

  query.close();

  } catch (final SQLException e) {

  e.printStackTrace();

  }

  return null;

  }

  清单 7-2

  展示了 getPropertyValue 方法的实现

  ```


  清单 7-2 展示了 ConfigRepoManager 中的 getPropertyValue 方法，该方法使用 JDBC 根据传入的键从数据库中检索配置属性值。根据你目前从本书中学到的知识，你可能会疑惑为什么使用普通的
  JDBC 而不是 CDI 和 JPA。答案是 ConfigSource 不是一个 CDI bean。Config 运行时将其视为一个普通的 Java 对象。


  这是因为，当某个自定义配置源依赖于一个 bean，而该 bean 又反过来依赖该配置源获取配置时，将 ConfigSource 设为 CDI bean 可能会导致循环启动问题。为了防止此类问题发生的可能性，自定义
  ConfigSource 实现被当作 POJO 处理。


  实现了 ConfigSource 接口后，我们需要将该实现注册到 MicroProfile Config 运行时。为此，必须将 DatabaseConfigSource
  的完全限定类名添加到 `/META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`
  文件中。由于序号为 450，Config 运行时将首先尝试在新注册的自定义配置源中解析属性 foo（因为其序号为 450），然后才会依次检查系统属性、环境变量，最后是
  microprofile-config.properties 文件。


  ## 转换器


  Config 三要素中的第二个组件是转换器的概念。默认情况下，MicroProfile Config 运行时将所有配置视为 String/String 键值对。无论给定配置源中指定的值是什么类型，它都将作为
  String 加载。例如，配置属性 *rate.minimum=15* 在向 Config 运行时请求属性 *rate.minimum* 时，将被加载为字符串
  "15"。


  假设上述属性的目标 Java 字段类型是 BigDecimal，那么显然会出现问题，因为运行时将尝试分配不兼容的类型。解决方案是使用转换器。当加载与 *rate.minimum*
  关联的属性值时，Config 运行时将查看值将要设置到的目标字段类型，然后调用适当的转换器将加载的值转换为目标字段类型。


  因此，当加载 *rate.minimum* 时，将调用一个能够接收 String 并从中返回 BigDecimal 的转换器，并传入加载的字符串 "15"。然后，此转换器将返回一个值为
  15 的 BigDecimal。Config 规范提供了一些默认转换器以及创建自定义转换器的机制。默认转换器包括：


  *   boolean 和 java.lang.Boolean，true 的值（不区分大小写）为 "true"、"1"、"YES"、"Y"、"ON"。任何其他值都将被解释为
  false

  *   byte 和 java.lang.Byte

  *   short 和 java.lang.Short

  *   int 和 java.lang.Integer

  *   long 和 java.lang.Long

  *   float 和 java.lang.Float，使用点号 "." 分隔小数位

  *   double 和 java.lang.Double，使用点号 "." 分隔小数位

  *   char 和 java.lang.Character

  *   基于 Class.forName 结果的 java.lang.Class


  这些转换器具有默认的 jakarta.annotation.Priority 值为 1。优先级用于确定一组转换器的层级。针对同一类型的两个转换器将根据它们的 @Priority
  值进行排序。具有较高 @Priority 值的转换器比具有较低 @Priority 值的转换器具有更高的优先级。


  ### 自动转换器


  当给定目标 Java 类型没有默认或自定义转换器时，如果目标 Java 类型满足以下条件之一，Config 运行时将创建一个自动动态转换器：


  *   具有一个 public static T of(String) 方法

  *   具有一个 public static T valueOf(String) 方法

  *   具有一个带有 String 参数的 public 构造方法

  *   具有一个 public static T parse(CharSequence) 方法


  对于 *rate.minimum* 属性，运行时将代表我们创建一个自动转换器，因为目标 Java 类型 BigDecimal 具有一个 valueOf(String)
  方法。




  ### 自定义转换器


  如果你需要通过配置机制传递自定义类型，而现有的转换器都无法满足需求，你可以创建自己的自定义转换器并将其注册到 Config 运行时。清单 7-3 展示了针对 `ConvertCurrencyRequest`
  类型的自定义转换器。


  ```

  public class CurrencyRequestConverter implements Converter {

  @Override

  public ConvertCurrencyRequest convert(final String value) {

  if (value == null || value.isBlank()) {

  throw new NullPointerException("Value must not be null or empty string");

  }

  final String[] split = value.split(",");

  if (split.length != 3) {

  throw new IllegalArgumentException("The resulting array has less than 3 elements.");

  }

  return  ConvertCurrencyRequest

  .builder()

  .sourceCurrency(split[0])

  .targetCurrency(split[1])

  .amount(new BigDecimal(split[2])).build();

  }

  }

  清单 7-3

  展示了 ConvertCurrencyRequest 自定义转换器

  ```


  清单 7-3 展示了 `CurrencyRequestConverter`。一个自定义 Config 转换器需要实现参数化的 `org.eclipse.microprofile.config.spi.Converter<T>`，并传入该转换器将要转换的类型。规范要求，如果传入
  `null` 值进行转换，自定义转换器的实现必须抛出 `NullPointerException`。这在 `CurrencyRequestConverter`
  中的第一个检查中完成。


  然后，该实现使用预期的逗号分隔符将传入的字符串分割成一个数组。请记住，配置值是以原始字符串的形式传递的。因此，即使目标类型是自定义类型，传入的配置值也仅仅是目标类型字段值的逗号分隔列表。接着，自定义转换器会检查结果数组的长度是否为三，因为目标类（如清单
  7-4 所示）包含三个字段。


  ```

  public class ConvertCurrencyRequest {

  private String sourceCurrency;

  private String targetCurrency;

  private BigDecimal amount;

  }

  清单 7-4

  展示了目标 ConvertCurrencyRequest 类型

  ```


  然后，自定义转换器使用构建器模式构造一个 `ConvertCurrencyRequest`，传入从数组中提取的每个字段。这样，`ConvertCurrencyRequest`
  就可以作为配置值传递，并被自动读取以进行货币转换，而无需向应用程序发起 REST 调用。这特别适用于批处理作业以及与遗留应用程序的接口对接。


  例如，上述转换器可用于从由遗留 COBOL 应用程序填充的数据库中读取 `ConvertCurrencyRequest` 配置值。由于 jwallet 已经拥有一个自定义数据库配置源（清单
  7-2）以及现在的一个自定义转换器，该应用程序可用于与遗留应用程序对接，而无需进行大量重构。遗留应用程序将填充数据库，而 jwallet 将读取并转换货币。


  ## 配置值


  配置三要素中的第三个是实际的配置值。Config 规范的全部意义在于，将所有可能的应用程序配置值来源抽象成一个透明的、统一的视图，即配置源。使用这些配置源，你可以根据每个所需值的键来获取配置值。


  对于给定的配置 `*convert_request="USD,GHS,5"*`，有六种不同的方式可以使用 Config API 获取该配置值。此配置应映射到 `ConvertCurrencyRequest`
  类型。当给定属性请求没有值时会发生什么，这取决于检索方法。这些检索方法如下所示。


  ### Config Bean


  可以通过注入 `org.eclipse.microprofile.config.Config` bean 来检索配置值。此 bean 通过搜索所有可用的配置源来解析属性值。当同一属性在多个配置源中找到时，配置源的序号决定了返回哪个配置值。清单
  7-5 展示了使用 Config bean 检索属性 `*convert_request="USD,GHS,5"*`。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  Config config;

  public ConvertCurrencyResponse batchConvertWithConfig() {

  ConvertCurrencyRequest request = config.getValue("convert_request", ConvertCurrencyRequest.class);

  return convert(request);

  }

  }

  清单 7-5

  展示了用于检索配置值的 Config bean

  ```


  清单 7-5 展示了使用 Config bean 获取配置值。在 `batchConvertWithConfig` 方法中，对注入的 Config bean 调用了
  `getValue` 方法。此方法接受已配置属性的键（本例中为 `convert_request`）和目标类型。因为我们为 `ConvertCurrencyRequest`
  创建了自定义转换器，所以只需将其作为第二个参数类型传入即可。该方法返回一个代表已读取和转换后的属性的 `ConvertCurrencyRequest` 实例。如果与传入属性键关联的值解析为空字符串或
  `null`，则会抛出 `java.util.NoSuchElementException`。


  ### 目标类型的直接注入


  你可以使用 `@Inject` 和限定符直接注入目标类型，如清单 7-6 所示。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @ConfigProperty(name = "convert_request")

  ConvertCurrencyRequest convertCurrencyRequest;

  public ConvertCurrencyResponse batchConvertWithSimpleProperty() {

  return convert(convertCurrencyRequest);

  }

  }

  清单 7-6

  展示了预期配置值的直接注入

  ```


  清单 7-6 展示了使用 `@Inject` 和 `@ConfigProperty` 限定符直接注入 `ConvertCurrencyRequest`。此限定符接受两个参数：`name`
  和 `defaultValue`。如果省略 `name` 参数，则运行时将默认使用 `class_name.injection_point_name`，其中 `injection_point_name`
  是字段名或参数名，`class_name` 是被注入类的完全限定名。第二个参数是 `defaultValue`。


  `defaultValue` 参数充当最低优先级的配置源，因为当没有设置任何值时，它会成为回退值。如果像清单 7-6 中那样省略此参数，并且没有设置任何值，则会抛出部署异常，应用程序将无法部署。


  ### 可选注入


  可以通过注入可选类型来读取配置值。与清单 7-6 中直接注入目标类型不同，目标值可以包装在 `java.util.Optional<T>` 值中，如清单 7-7
  所示。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @ConfigProperty(name = "convert_request")

  Optional convertRequest;

  public ConvertCurrencyResponse batchConvert() {

  return convertRequest.map(this::convert).orElseGet(ConvertCurrencyResponse::new);

  }

  }

  清单 7-7

  展示了将配置值注入为 Optional 类型

  ```


  清单 7-7 展示了通过注入包装目标值的 `Optional` 类型来检索配置值。与直接注入类似，`Optional` 字段也使用相同的 `@ConfigProperty`
  注解进行标注。然而，作为 `Optional` 类型，如果与传入键（本例中为 `convert_request`）关联的值解析为空字符串或 `null`，则会返回一个空的
  `Optional`，而不是抛出 `DeploymentException`。也可以将默认值作为第二个参数传递给 `@ConfigProperty` 限定符。




  ### 提供者注入


  配置值可以通过注入 `jakarta.inject.Provider<T>` Bean 来获取。目标类型被包装在 Provider 接口中，并配合注解 `@Inject`
  和 `@ConfigProperty` 使用，如清单 7-8 所示。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @ConfigProperty(name = "convert_request")

  Provider currencyRequestProvider;

  public ConvertCurrencyResponse batchConvertWithProvider() {

  return convert(currencyRequestProvider.get());

  }

  }

  清单 7-8

  展示了使用 Provider 检索配置值

  ```


  清单 7-8 展示了使用 Provider 检索配置值。与往常一样，字段 `currencyRequestProvider` 使用了 `@Inject` 和 `@ConfigProperty`
  注解。这种构造与使用 `Optional<T>` 类似，不同之处在于，与 Optional 不同，在 `batchConvertWithProvider` 方法中调用
  `Provider#get` 将始终从底层配置中获取最新值。


  你之前看到的三种方式都只读取一次配置值。因此，如果底层配置源中的数据发生变化，通过前三种构造返回的值不会反映这些变化。然而，使用 `Provider<T>` 并像清单
  7-8 那样调用其 `get` 方法，将始终解析出底层配置源中的最新值。


  如果解析出的值为 `null` 或空字符串，调用 `Provider#get` 方法将抛出 `RuntimeException`。清单 7-8 没有显式传入 `defaultValue`，这意味着期望该值可用，如果不可用，则在
  `currencyRequestProvider` 字段上调用 `get` 时会抛出 `RuntimeException`。


  ### 供应者注入


  `java.util.Supplier<T>` 接口也可以用于通过注入读取配置值。清单 7-9 展示了使用 Supplier 接口检索配置值。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @ConfigProperty(name = "convert_request")

  Supplier convertCurrencyRequestSupplier;

  public ConvertCurrencyResponse batchConvertWithSupplier() {

  return convert(convertCurrencyRequestSupplier.get());

  }

  清单 7-9

  展示了 java.util.Supplier 接口的使用

  ```


  清单 7-9 展示了 Supplier 函数式接口的使用。与 `Provider<T>` 接口类似，Supplier 接口也使用 `@Inject` 和 `@ConfigProperty`
  限定符进行注入。同样与 `Provider<T>` 接口类似，在 `batchConvertWithSupplier` 方法中调用 `get` 将解析出底层配置源中的最新值。如果没有默认值，则意味着该值必须存在，否则将抛出
  `RuntimeException`。


  ### ConfigValue 元数据


  `org.eclipse.microprofile.config.ConfigValue` 接口也可以被注入并用于获取配置值。与之前讨论的其他构造不同，`ConfigValue`
  接口提供了获取 ConfigSource 名称、序号、原始配置值、属性名称和值的方法。除非你需要在运行时对配置源进行操作，否则很少会用到 `ConfigValue`。


  ## 总结


  Eclipse MicroProfile Config 规范是一组简单的 API 构造，可帮助你在运行时加载应用程序属性，而无需重新部署应用程序，也无需应用程序了解配置的实际底层来源。本章介绍了构成
  Config 规范的三个核心组件，即配置源、转换器和配置值。这三个组件共同为你提供了将应用程序与其属性解耦所需的一切。


  '
- '# 8. 使用容错 API 实现弹性


  现代云原生应用程序通常被构建为一组相互通信的微服务，通信方式多通过网络。此类应用程序的用户期望应用程序始终可用。然而，在应用程序实例运行期间，总会有许多可能出错的情况。


  网络可能不可用，数据库服务可能响应时间过长，应用程序可能一夜爆红导致并发用户激增，Web 服务可能离线，以及各种其他潜在问题。为了使应用程序能够经受住这些不可避免的故障，它需要具备容错性和弹性。


  Eclipse MicroProfile Fault Tolerance 规范提供了一系列声明式 API 构造，可用于创建容错且弹性的现代云原生应用程序。本章的目标是向你展示如何使用
  Eclipse MicroProfile Fault Tolerance API 为你的微服务添加重试策略、舱壁、断路器、超时和回退，将它们转变为更具弹性的云原生版本。


  ## 容错


  Fault Tolerance 规范提供了许多拦截器绑定，可以声明式地用于实现应用程序的容错。这些拦截器绑定可以单独使用，也可以相互组合使用。由于该规范基于 Jakarta
  Interceptors 规范构建，因此可以直接与 CDI Bean 一起使用。因此，所有现有的 CDI 服务都可以通过 Fault Tolerance 规范转变为容错组件。


  可用的容错拦截器绑定集合涵盖了创建弹性、容错应用程序的以下几个方面：


  *   回退


  *   超时


  *   重试策略


  *   断路器


  *   异步


  *   舱壁




  ### 回退机制


  `@Fallback` 拦截器绑定是一个方法级别的注解，它告知运行时环境：当被注解的方法抛出异常时，应回退到指定的方法。触发回退的异常类型可以自定义。也可以设置在抛出特定异常时跳过回退，即这些异常不会触发运行时调用回退方法。清单
  8-1 展示了包含两个方法（`calculateAmount` 和 `calculateAmountFallback`）的 `RateService` Bean。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @RestClient

  RateResource rateResource;

  @Fallback(fallbackMethod = "calculateAmountFallback")

  public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
  wallet) {

  ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

  convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

  convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

  convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

  ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

  return convertCurrencyResponse.getData().getAmount();

  }

  public BigDecimal calculateAmountFallback(TransactionRequest transactionsRequest,
  Wallet wallet) {

  return transactionsRequest.getAmount();

  }

  }

  清单 8-1

  包含回退方法的 RateService Bean

  ```


  清单 8-1 展示了 `RateService` 这个应用作用域的 Bean。它包含两个方法。第一个方法 `calculateAmount` 带有 `@Fallback`
  注解。该注解的参数 `fallbackMethod` 被设置为第二个方法的名字 `calculateAmountFallback`。在运行时，默认情况下，任何属于
  `java.lang.Throwable` 子类的异常被抛出时，都会导致运行时调用回退方法。回退方法必须与它所回退的方法具有相同的方法签名。


  `@Fallback` 注解也可以传入一个类，而不是使用 `fallbackMethod` 参数。传入的类必须是 `org.eclipse.microprofile.faulttolerance.FallbackHandler<T>`
  接口的实现。该接口的类型参数是它所回退的方法的返回类型。清单 8-2 展示了 `RateCalcFallback` 类中的 `FallbackHandler`
  实现。


  ```

  public class RateCalcFallback implements FallbackHandler {

  @Override

  public BigDecimal handle(final ExecutionContext context) {

  final TransactionRequest transactionRequest = (TransactionRequest) context.getParameters()[0];

  return transactionRequest.getAmount();

  }

  }

  清单 8-2

  展示 RateCalcFallback 处理器类

  ```


  清单 8-2 展示了实现 `FallbackHandler` 接口的 `RateCalcFallback` 类。该类接受一个 `BigDecimal` 类型参数，这是它所回退的方法的返回类型。该接口有一个名为
  `handle` 的单一方法，该方法接收一个 `org.eclipse.microprofile.faulttolerance.ExecutionContext`
  类型的参数。这个对象包含了关于触发回退的失败方法的元数据。


  如清单 8-2 所示，`handle` 方法的实现调用了传入的 `ExecutionContext` 对象的 `getParameters` 方法来获取方法的参数，选取第一个参数，并返回一个默认值。清单
  8-3 再次展示了 `RateService` Bean，但这次使用的是 `RateCalcFallback` 处理器，而不是类自身的方法。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @RestClient

  RateResource rateResource;

  @Fallback(RateCalcFallback.class)

  public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
  wallet) {

  ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

  convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

  convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

  convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

  ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

  return convertCurrencyResponse.getData().getAmount();

  }

  }

  清单 8-3

  展示使用 RateCalcHandler 回退处理器的 RateCalcService

  ```


  清单 8-3 展示了 `RateService` 的 `calculate` 方法使用 `RateCalcFallback` 类作为回退，而不是一个方法。在运行时，如果抛出异常，将自动创建一个非上下文实例的
  `RateCalcFallback`。`@Fallback` 注解还有另外两个参数，即 `applyOn` 和 `skipOn`。


  `applyOn` 接受一个异常数组，这些异常应触发回退机制。当为此参数指定一个值时，只有传入的异常类型被抛出时，才会导致回退方法被调用。省略此参数等同于传入
  `Throwable.class`。


  `skipOn` 参数也接受一个异常数组，但当这些异常被抛出时，会导致跳过回退方法。你可以使用此参数来防止当目标方法抛出业务异常（例如，自定义的验证异常）时调用回退方法。




  ### 超时


  @Timeout 注解用于设置超时时间，超过该时间后方法执行将被视为超时或截断。微服务应用通常会相互通信，并对外部服务进行调用。不能让单个方法执行占用不合理的时间，这一点非常重要。没有时间盒约束可能会导致巨额成本。


  @Timeout 注解接受两个参数：value 和 unit。value 指方法应超时的执行时长，默认值为 1000。unit 指 java.time.Duration.ChronoUnit，默认值为
  ChronoUnit.MILLIS。因此，默认情况下，使用 @Timeout 注解的方法如果在执行 1000 毫秒后仍未返回，将会超时。


  超时也可以与其他容错结构（如 @Fallback）一起使用。当一个方法同时被 @Timeout 和 @Fallback 注解时，如果该方法超时，将调用 fallback
  方法来返回降级值。清单 8-4 展示了 RateService 方法 calculateAmount 使用了 @Timeout 注解，并保留了默认的 1000
  毫秒超时设置。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @RestClient

  RateResource rateResource;

  @Fallback(RateCalcFallback.class)

  @Timeout

  public BigDecimal calculateAmount(final TransactionRequest transactionsRequest,
  final Wallet wallet) {

  ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

  convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

  convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

  convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

  ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

  return convertCurrencyResponse.getData().getAmount();

  }

  }

  清单 8-4

  展示了 RateService 使用 @Timeout 注解

  ```


  清单 8-4 展示了 RateService 在 calculateAmount 方法上使用了 @Timeout 注解。同时存在 @Fallback 和 @Timeout
  意味着，如果没有抛出异常，但方法在 1000 毫秒后仍未完成执行，运行时将使其超时，并调用 RateCalcFallback 处理器返回一个默认值。


  @Timeout 注解可以在类级别和方法级别使用。当在类级别使用时，该类中的所有方法都将根据类级别注解的配置超时。如果一个 Bean 同时在类级别和方法级别声明了该注解，则方法级别的注解优先于类级别的注解。


  ### 重试


  几乎所有现代应用都需要通过网络进行某种形式的调用。这种调用可能是对同一网络内的另一个服务，也可能是对应用部署网络之外的完全独立的调用。网络故障可能导致调用失败。在这种情况下，最好有一个能自动重试方法调用的机制。


  @Retry 注解用于在操作异常终止时再次调用相同的操作。可以自定义触发重试的异常类型，也可以指定应跳过的异常。清单 8-5 展示了 RateService Bean
  的 calculateAmount 方法带有 @Retry 注解。


  ```

  @ApplicationScoped

  public class RateService {

  @Inject

  @RestClient

  RateResource rateResource;

  @Fallback(RateCalcFallback.class)

  @Timeout

  @Retry

  public BigDecimal calculateAmount(TransactionRequest transactionsRequest,  Wallet
  wallet) {

  ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

  convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

  convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

  convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

  ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

  return convertCurrencyResponse.getData().getAmount();

  }

  }

  清单 8-5

  展示了在 RateService Bean 中使用 @Retry 注解

  ```


  清单 8-5 展示了 RateService Bean 的 calculateAmount 方法带有 @Retry 注解。照此配置，如果方法在执行过程中抛出异常，将会被重试。由于它与
  @Timeout 注解一起使用，如果方法因超时异常而超时，它也会被重试。默认情况下，最大重试次数为三次。如果三次重试后该方法仍然抛出异常，则将调用 @Fallback
  注解中传入的降级处理器。


  @Retry 注解有许多参数，你可以根据特定应用的需求自定义其行为。这些参数如表 8-1 所示。


  表 8-1


  @Retry 注解的参数


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | maxRetries | 最大重试次数 | 3 |

  | delay | 每次重试之间的延迟 | 0 |

  | delayUnit | 延迟单位 | ChronoUnit.MILLIS |

  | maxDuration | 执行重试的最大持续时间 | 180000 |

  | durationUnit | maxDuration 的持续时间单位 | ChronoUnit.MILLIS |

  | jitter | 重试延迟的随机变化 |   |

  | jitterDelayUnit | jitter 的单位 | ChronoUnit.MILLIS |

  | retryOn | 指定需要重试的失败类型 | Exception.class |

  | abortOn | 指定应中止重试的失败类型 | – |


  jitter 参数用于为重试延迟增加随机性。默认的 jitter 值为 200，这意味着每次重试之间的有效延迟将是 [delay - jitter, delay
  + jitter]。当 delay 默认值为 0 时，有效延迟最终为 -200 或 200。但是，负的有效延迟会被视为 0。因此，在没有设置 delay 值的情况下，有效延迟为
  200 毫秒。


  maxDuration 设置了整个重试过程的最大持续时间。设置最大持续时间至关重要，以避免陷入无限重试的情况。默认值为 180000 毫秒，这意味着整个重试持续时间将持续该时长，之后将由另一个容错注解接管。


  abortOn 参数用于指定当方法抛出某些异常时，将不会重试该方法。你可以使用此参数指定不应重试的自定义业务异常，例如验证异常。例如，如果方法客户端传入了无效值，并且方法抛出了验证异常，那么不重试该方法会更高效，因为异常的原因是可预见的，并且是业务流程的正常部分。


  @Retry 注解可以在类或方法上使用，如清单 8-5 所示。当在类上使用时，该类中的所有方法都将被重试。当同时在类和方法上使用时，对于该特定方法，方法上的注解优先于类级别的注解。


  ### 断路器


  断路器充当资源方法的守卫，如果满足预设条件，它会通过快速失败来防止该方法占用计算机资源。当对某个方法的调用持续失败时，该失败的方法可能会占用资源，并且在某些情况下，将故障级联到应用的其他组件。为了防止此类情况发生，使用断路器模式来守卫方法，并在达到预设的故障阈值时阻止调用到达该方法。断路器始终处于三种状态之一：关闭、打开、半开。




  #### 关闭状态


  当允许调用通过并到达受保护方法时，断路器处于关闭状态。这是断路器的正常状态。它会记录每次方法调用是否成功，并累计计数至预设值。当达到预设计数，且失败方法调用的比例超过预设的故障比率（相对于预设计数）时，断路器将转换到打开状态。


  #### 打开状态


  在打开状态下，对受保护方法的调用将立即失败，并抛出 `org.eclipse.microprofile.faulttolerance.exceptions.CircuitBreakerOpenException`
  异常。所有方法调用将持续抛出此异常，直到达到可配置的延迟时间，之后断路器将转换到半开状态。


  #### 半开状态


  在半开状态下，断路器允许通过可配置数量的试探性调用到达受保护方法。默认情况下，如果其中一次调用失败，断路器将回到打开状态。如果所有试探性执行都成功，断路器将转换到关闭状态。


  `@CircuitBreaker` 注解可用于为某个方法创建断路器。如果该注解用于类上，则类中的所有方法都将拥有断路器。如果同时用于类及其内部的方法，则方法级别的
  `@CircuitBreaker` 注解会覆盖该类级别注解对该方法的效果。清单 8-6 展示了在 `RateService` Bean 的 `convertCurrency`
  方法上使用的 `@CircuitBreaker` 注解。


  ```

  @ApplicationScoped

  public class RateService {

  @CircuitBreaker

  @Fallback(fallbackMethod = "convertCurrencyFallback")

  public ConvertCurrencyResponse convertCurrency(final ConvertCurrencyRequest convertCurrencyRequest)
  {

  return convert(convertCurrencyRequest);

  }

  }

  清单 8-6

  展示了在 RateService Bean 中使用的 @CircuitBreaker

  ```


  清单 8-6 展示了在 `RateService` Bean 的 `convertCurrency` 方法上使用的 `@CircuitBreaker` 方法。按此配置，断路器会将方法中抛出的所有
  `java.lang.Throwable` 类型异常视为故障，如果在连续 20 次请求中发生 10 次或更多故障，断路器将转换到打开状态。随后，断路器将在打开状态延迟
  5000 毫秒，然后转换到半开状态，在此期间，一次成功的调用将使其转换回关闭状态。


  `@CircuitBreaker` 注解的参数如表 8-2 所示。


  表 8-2

  展示 @CircuitBreaker 注解参数


  | 参数 | 描述 | 默认值 |

  | --- | --- | --- |

  | failOn | 被视为故障的异常 | Throwable.class |

  | skipOn | 不应被视为故障的异常 | – |

  | delay | 断路器应保持在打开状态的时长 | 5000 |

  | delayUnit | 延迟时间单位 | ChronoUnit.MILLIS |

  | requestVolumeThreshold | 滚动窗口内连续请求的总数 | 20 |

  | failureRatio | 相对于 requestVolumeThreshold 触发断路器打开的故障比率 | 0.50 |

  | successThreshold | 使断路器从半开状态转换到关闭状态所需的成功调用次数 | 1 |


  `@CircuitBreaker` 注解可以与其他容错注解一起使用。如清单 8-6 所示，它与 `@Fallback` 注解结合使用。在这种情况下，当断路器打开时，失败的调用将触发后备方法（此处为
  `convertCurrencyFallback`）的执行。


  ### 异步


  `@Asynchronous` 注解用于将方法转换为异步方法，该方法在与调用线程不同的独立线程上执行。被 `@Asynchronous` 注解的方法必须返回 `java.util.concurrent.CompletionStage`
  或 `java.util.concurrent.Future` 类型。为了最大化此注解与其他容错注解的配合使用，规范建议使用 `CompletionStage`
  作为返回类型。


  `@Asynchronous` 可以在类级别或方法级别使用。当在类级别使用时，该类中的所有方法都将异步执行。此注解不接收任何参数。如前所述，唯一的要求是方法返回
  `Future<T>` 或 `CompletionStage<T>`。清单 8-7 展示了 `RateService` 中一个使用了 `@Asynchronous`
  注解的异步方法 `convertCurrencyAsync`。


  ```

  @ApplicationScoped

  public class RateService {

  @Asynchronous

  @Retry

  public CompletionStage convertCurrencyAsync(

  final ConvertCurrencyRequest convertCurrencyRequest) {

  return CompletableFuture.completedFuture(convert(convertCurrencyRequest));

  }

  }

  清单 8-7

  展示了使用 @Asynchronous 的 RateService 方法 convertCurrencyAsync

  ```


  清单 8-7 展示了使用 `@Asynchronous` 和 `@Retry` 注解的 `RateService` 方法 `convertCurrencyAsync`。该方法返回一个包装了
  `ConvertCurrencyResponse` 对象的 `CompletionStage`。当此方法被调用时，将生成一个新线程来执行它。由于 `@Asynchronous`
  与 `@Retry` 一起使用，如果方法执行异常，重试将在生成的线程中进行。所有与 `@Asynchronous` 一起使用的其他容错拦截器也将在生成的线程中执行。


  如果 `@Asynchronous` 与 `@Fallback` 一起使用，则后备方法必须具有与原始方法相同的签名。也就是说，后备方法必须像其作为后备的方法一样，返回
  `Future<T>` 或 `CompletionStage<T>`。


  ### 舱壁


  `@Bulkhead` 注解是一种容错注解，用于限制可以同时访问给定方法实例的并发请求数。默认情况下，该注解允许应用程序有十个并发请求。根据注解的使用方式，您可以选择指定有多少请求可以在队列中等待。舱壁实现有两种主要风格，即信号量和线程池隔离。


  #### 信号量风格


  当非 `@Asynchronous` 方法被 `@Bulkhead` 注解时，即为信号量风格的舱壁。清单 8-8 展示了被 `@Bulkhead` 注解的 `RateService`
  的 `convertCurrency` 方法。


  ```

  @ApplicationScoped

  public class RateService {

  @CircuitBreaker

  @Fallback(fallbackMethod = "convertCurrencyFallback")

  @Bulkhead

  public ConvertCurrencyResponse convertCurrency(final ConvertCurrencyRequest convertCurrencyRequest)
  {

  return convert(convertCurrencyRequest);

  }

  }

  清单 8-8

  展示了在 RateService 中使用 @Bulkhead

  ```


  清单 8-8 展示了被 `@Bulkhead` 注解的 `RateService` 的 `convertCurrency` 方法。此舱壁使用属于信号量风格，因为被注解的方法不是异步的。按此配置，该方法一次只允许十个并发用户访问。如果并发用户数超过十个，将抛出
  `org.eclipse.microprofile.faulttolerance.exceptions.BulkheadException` 异常。在这种情况下，由于该注解与
  `@Fallback` 一起使用，如果抛出异常，将调用后备方法。可以通过设置注解的 `value` 参数来自定义并发用户数。




  #### 线程池风格


  当异步方法被 `@Bulkhead` 注解修饰时，即采用线程池风格的隔板模式。此风格还允许设置等待队列中可容纳的最大请求数。清单 8-9 展示了 RateService
  类中被 `@Bulkhead` 注解修饰的 `convertCurrencyAsync` 方法。


  ```

  @ApplicationScoped

  public class RateService {

  @Asynchronous

  @Retry

  @Bulkhead

  public CompletionStage convertCurrencyAsync(

  final ConvertCurrencyRequest convertCurrencyRequest) {

  return CompletableFuture.completedFuture(convert(convertCurrencyRequest));

  }

  }

  清单 8-9

  展示 RateService 中的线程池隔板

  ```


  在清单 8-9 中，`convertCurrencyAsync` 方法同时带有 `@Asynchronous` 和 `@Bulkhead` 注解。默认情况下，任何时刻该方法最多只允许十个并发请求，同时等待队列中最多可容纳十个请求。可以使用
  `waitingTaskQueue` 参数来设置等待队列的大小。


  如果请求无法加入队列，则会抛出 `org.eclipse.microprofile.faulttolerance.exceptions.BulkheadException`。如果在清单
  8-9 所示的方法中抛出了与隔板相关的异常，由于 `@Retry` 注解的存在，该方法调用将被重试。由于该方法未声明 fallback，如果重试周期完成后该方法仍然抛出异常，则该异常将直接抛给客户端。


  ## 使用 Config 配置容错


  Eclipse MicroProfile Fault Tolerance 规范与该项目的其他规范进行了集成。因此，前面讨论的六个容错注解可以通过使用 Config
  规范进行配置。容错注解的参数可以单独或全局覆盖。


  ### 单独覆盖


  你可以通过使用 Config API 的配置属性来覆盖单个容错注解。属性格式为 `<classname>/<methodname>/<annotation>/<parameter>`，其中
  classname 指完全限定类名，methodName 指带有容错注解的方法，annotation 指你想要设置或覆盖其参数的拦截器。


  例如，清单 8-9 中所示的 `@Retry` 注解可以通过配置属性进行配置，例如在 `microprofile-config.properties` 中配置为
  `com.example.jwallet.rate.rate.control.RateService/convertCurrencyAsync/Retry/maxRetries=5`。这会将
  RateService 中 `convertCurrencyAsync` 方法上的 `@Retry` 注解的 `maxRetries` 设置为 5。


  通过 Config 机制设置的容错参数会覆盖方法中传递的相同参数。此外，由于配置源优先级设置的序数算法，你可以为不同环境中的不同配置源中的同一方法定义不同的容错参数。


  ### 全局参数覆盖


  你也可以设置全局容错属性，这些属性将应用于给定类或整个应用程序中的所有容错拦截器。对于类级别覆盖，属性格式为 `<classname>/<annotation>/<parameter>`，与单独级别覆盖的区别在于类级别覆盖省略了方法名。例如，要将
  RateService 中所有 `@Retry` 注解的 `maxRetries` 设置为 8，我们可以传递属性 `com.example.jwallet.rate.rate.control.RateService/Retry/maxRetries=8`。


  容错参数也可以在应用程序级别覆盖。其属性格式为 `<annotation>/<parameter>`。仍然以 `@Retry` 为例，要将默认的应用程序级别 `maxRetries`
  设置为 10，我们可以设置属性 `Retry/maxRetries=10`。这会将 `maxRetries=10` 应用于应用程序中的所有 `@Retry` 注解。


  在优先级方面，最接近组件的配置优先。因此，单独的容错配置优先于类级别配置，而类级别配置又优先于应用程序级别配置。这样，你可以为应用程序的不同阶段定义复杂的容错拦截器参数。


  ## 总结


  本章讨论了 Eclipse MicroProfile Fault Tolerance 规范。我们了解了如何使用注解，通过 fallback、timeout、retry、circuit
  breaker、asynchronous 和 bulkhead 模式使方法更具弹性和容错性。本章还讨论了如何使用 Eclipse MicroProfile Config
  API 配置容错注解。


  '
- '# 9. 使用 Metrics 进行计数


  已部署的面向用户的应用需要被监控，以确保它们按预期交付。部署到复杂云托管环境中的云原生应用更需要被监控，因为任何与预设期望的意外偏差都可能意味着显著增加的托管费用。


  监控已部署的正在运行的应用的方式是使用应用指标。诸如方法被调用了多少次、给定方法返回需要多少秒等指标，都是不同类型的指标，可以深入了解应用的性能表现。


  Eclipse MicroProfile Metrics API 提供了一组 API 结构，用于暴露不同类型和种类的应用指标。使用此 API，你可以通过注解和
  Java API，以 OpenMetrics^(¹¹³) 格式暴露应用、实现运行时和 JVM 指标，这些指标可被 Prometheus 等监控应用消费。


  本章涵盖了 Jakarta EE 上下文中的 Metrics 规范。到本章结束时，你将能够使用 Metrics API 在你的云原生 Jakarta EE 应用中暴露不同类型的指标。


  ## 结构


  Eclipse MicroProfile Metrics 规范主要是一个元数据驱动的 API，用于在应用中暴露指标。你可以暴露的指标的范围和类型取决于应用需求。通过使用此
  API 暴露的所有指标都会自动托管在上下文路径 `/metrics` 下。


  对于本地开发，这通常是 `http://localhost:8080/metrics`；对于部署到 `foo.com` 的应用，指标将托管在 [`https://foo.com/metrics`](https://foo.com/metrics)。该规范定义了三个范围或类别的指标。分别是基础指标、应用指标和供应商特定指标。


  ### 基础指标


  基础指标是所有实现都必须提供的指标。这些指标暴露底层 JVM 和操作系统的信息。其中一些基础指标包括可用处理器、已用堆内存、最大堆内存和已提交堆内存等。基础指标下的一些指标可能是可选的，因为它们可能涉及特定的
  JVM 或操作系统版本。这些指标托管在路径 `/metrics/base` 下。


  ### 应用指标


  应用指标是你希望收集的关于应用的自定义指标集合。你可以使用注解或 Java API 来暴露这些指标。此类指标的示例包括给定方法执行所需的时间。这些指标可通过 `/metrics/application`
  访问。


  ### 供应商指标


  供应商指标是 Eclipse MicroProfile 规范的兼容实现在强制性的基础指标之上可选提供的自定义指标。供应商指标托管在 `/metrics/vendor`
  下。




  ## 指标数据格式


  默认情况下，当向 `/metrics` 资源发起 GET 请求时，返回的指标信息采用 OpenMetrics 文本格式。这是一种开放标准的指标格式，受到 Prometheus
  等众多监控应用程序的支持。


  然而，如果 HTTP 请求的 `Accept` 头部匹配 `application/json`，则相同的指标数据可以以 JSON 格式返回。如果请求的 `Accept`
  头部同时匹配 `application/json` 和 `text/plain`，或者未指定 `Accept` 头部，则数据将以默认的 OpenMetrics
  文本格式返回。


  ## 指标注册表


  指标注册表是一个注册表，其中包含所有可在 `/metrics` 资源下访问的指标及其元数据。对于基础（base）、应用程序（application）和供应商（vendor）这三个指标作用域，各自有一个共享的单例注册表。指标通过其指标
  ID（由名称和标签（如有）组成）在注册表中进行标识。可以将指标注册表视为每个作用域中指标的数据库。作为应用程序开发者，大多数时候注册表对您来说是透明的。但当您需要与之交互时，您应该知道它的存在。


  ## 使用指标


  在您的应用程序中，有两种方式可以使用 Metrics API。一种是通过注解，另一种是通过 Java API。选择哪种方式仅取决于应用程序需求和开发者偏好。注解是由
  CDI 运行时管理的拦截器绑定。因此，只有可代理的托管 Bean 才能使用注解来收集指标。


  ### 注解


  有六个用于创建不同类型指标的注解。它们是：


  *   `@Counted`


  *   `@ConcurrentGauge`


  *   `@Gauge`


  *   `@Metered`


  *   `@SimplyTimed`


  *   `@Timed`


  所有这些注解都有一些共同的参数。这些参数如表 9-1 所示。


  表 9-1


  展示通用的指标注解参数


  | 名称 | 类型 | 描述 | 可选/必需 |

  | --- | --- | --- | --- |

  | name | String | 设置指标的名称 | 可选。默认为被注解对象的名称 |

  | absolute | boolean | 如果为 true，则 name 用作指标的绝对名称。如果为 false，则在给定名称前添加包名和类名 | 可选。默认为
  false |

  | displayName | String | 用于元数据的人类可读名称 | 可选。默认为 null |

  | description | String | 指标的描述 | 可选。默认为 null |

  | unit | String | 特定指标的单位 | 可选。默认值各不相同 |

  | tags | String[] | 指标的“key=value”标签数组 | 可选。空数组 |


  #### @Counted


  `@Counted` 指标注解用于统计被注解的方法、构造函数或类型被调用或实例化的次数。此注解可用于方法、构造函数或类。如果在类级别使用，则该类中的所有方法都将被统计其调用次数。清单
  9-1 展示了 `RateResourceImpl` 类中的 `convertCurrency` 方法使用了 `@Counted` 注解，并传入了一些参数。


  ```

  @Consumes(MediaType.APPLICATION_JSON)

  @Produces(MediaType.APPLICATION_JSON)

  @Path("rates")

  public class RateResourceImpl {

  @Path("convert")

  @POST

  @Counted(name = "convert_currency",

  absolute = true,

  displayName = "Convert currency method",

  description = "Method to convert one currency to the other",

  tags = { "info=conversions", "type=meta" })

  ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){

  return rateService.convertCurrency(convertCurrencyRequest)

  };

  }

  清单 9-1

  展示了 @Counted 的使用

  ```


  清单 9-1 展示了在 `convertCurrency` 方法上使用的 `@Counted` 注解。它设置了 `name` 参数，并将 `absolute`
  设置为 `true`。这意味着将在注册表中注册的此指标的名称为 `convert_currency`。如果 `absolute` 未设置为 `true`，则指标名称将为
  包名 + 类名 + 传递给 `name` 参数的值。标签也被设置为一些特定于方法的信息。


  标签在指标中扮演着重要角色，因为在云原生环境中，已部署容器的编排由 Kubernetes 等引擎完成，应用程序运行时与主机之间的传统映射关系已不复存在。在指标上下文中，除了指标名称之外，标签还增加了用于标识指标的额外维度。


  当应用程序部署后，可以直接从 `/metrics/application/convert_currency` 访问被计数的指标。由于 `absolute` 参数设置为
  `true`，仅凭指标名称即可通过 REST 端点访问它。以 OpenMetrics 格式对此指标进行示例调用，将返回如清单 9-2 所示的结果。


  ```

  # TYPE application_convert_currency_total counter

  # HELP application_convert_currency_total Method to convert one currency to the
  other

  application_convert_currency_total{info="conversions",type="meta"} 75

  清单 9-2

  展示 @Counted 的示例指标

  ```


  清单 9-2 展示了直接从 `/metrics/application` 上下文路径访问 `@Counted` 注解时的结果。返回的数据带有 `TYPE` 和
  `HELP` 注释，分别显示指标的类型和描述。指标计数前带有 `application_` 前缀。这就是应用程序级指标与基础级和供应商级指标区分开来的方式。传递给
  `@Counted` 注解的标签也会作为完整指标 ID 的一部分返回。根据计数，`convertCurrency` 方法总共被调用了 75 次。




  #### @ConcurrentGauge


  此注解用于测量被注解方法或构造器的并发调用次数，或被注解类的实例化次数。其工作原理是：当进入被注解元素时，并发计数加一；退出时，并发计数减一。该指标用于测量被注解元素的并发调用数量。


  当用于类时，会为类的每个构造器和方法创建当前并发调用计数、前一分钟最大值和前一分钟最小值，并使用注解的名称和绝对字段值在指标注册表中进行注册。


  当用于方法时，会创建当前值、前一分钟最大值和前一分钟最小值的测量指标，并在指标注册表中注册。当用于构造器时，会为该构造器注册相同的测量指标。清单 9-3 展示了使用
  `@ConcurrentGauge` 注解的 `convertCurrency` 方法。


  ```

  @Consumes(MediaType.APPLICATION_JSON)

  @Produces(MediaType.APPLICATION_JSON)

  @Path("rates")

  public class RateResourceImpl {

  @Path("convert")

  @POST

  @ConcurrentGauge(name = "convert_currency_concurrent_gauge",

  absolute = true,

  description = "Method to convert one currency to the other",

  tags = { "convert=custom" }

  )

  ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){};

  }

  清单 9-3

  展示 convertCurrencyMethod 上的 @ConcurrentGauge

  ```


  清单 9-3 展示了使用 `@ConcurrentGauge` 注解的 `convertCurrency` 方法。其中设置了名称、绝对路径、描述以及一些自定义标签。可通过
  `/metrics/application/convert_currency_concurrent_gauge` 访问该指标。对默认文本格式的示例调用返回的数据如清单
  9-4 所示。


  ```

  # TYPE application_convert_currency_concurrent_gauge_current gauge

  # HELP application_convert_currency_concurrent_gauge_current Method to convert one
  currency to the other

  application_convert_currency_concurrent_gauge_current{convert="custom"} 0

  # TYPE application_convert_currency_concurrent_gauge_min gauge

  application_convert_currency_concurrent_gauge_min{convert="custom"} 0

  # TYPE application_convert_currency_concurrent_gauge_max gauge

  application_convert_currency_concurrent_gauge_max{convert="custom"} 1

  清单 9-4

  展示 @ConcurrentGauge 指标的结果

  ```


  #### @Gauge


  `@Gauge` 指标用于采样方法的返回值。该方法通常是一个业务方法，返回某种有意义的业务上下文值用于分析。Metrics 运行时会调用该方法，并将返回值赋值为该指标的值。`@Gauge`
  只能用于方法。


  例如，如果我们想采样 jwallet 中的货币转换次数，`@Gauge` 就是完美的指标。方法的返回值即为该指标的值。此指标只能与 `@ApplicationScoped`
  或 `@Singleton` CDI bean 一起使用，因为与其他非单例 bean 一起使用时，无法明确使用哪个 bean 实例来获取测量值。清单 9-5 展示了带有
  `countConversions` 测量方法的 `RateService` `@ApplicationScoped` bean。


  ```

  @ApplicationScoped

  public class RateService {

  @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
  = true)

  public int countConversions() {

  return ThreadLocalRandom.current().nextInt(250, 500 + 1);

  }

  }

  清单 9-5

  展示 @Gauge 的使用

  ```


  清单 9-5 展示了带有返回 int 类型的 `countConversions` 方法的 `RateService` 单例。当查询此指标时，运行时会调用此方法，并使用返回的方法值作为指标的值。通过名称，可以直接从路径
  `/metrics/application/convert_currency_gauge_count` 访问此指标。示例调用返回的数据如清单 9-6 所示。


  ```

  # TYPE application_convert_currency_gauge_count gauge

  application_convert_currency_gauge_count 474

  清单 9-6

  展示 @Gauge 指标的示例返回数据

  ```


  #### @Metered


  `@Metered` 注解是一个指标，用于跟踪被注解方法、构造器或类实例化的调用频率。它跟踪平均吞吐量以及一分钟、五分钟和十五分钟的指数加权移动平均吞吐量。默认的
  `MetricUnit` 是秒。`@Metered` 可用于类、方法或构造器。


  ```

  @Consumes(MediaType.APPLICATION_JSON)

  @Produces(MediaType.APPLICATION_JSON)

  @Path("rates")

  public class RateResourceImpl implements RateResource {

  @Inject

  RateService rateService;

  @Path("convert")

  @POST

  @Override

  @Metered(name = "convert_currency_meter", absolute = true)

  public ConvertCurrencyResponse convertCurrency(ConvertCurrencyRequest convertCurrencyRequest)
  {

  return rateService.convertCurrency(convertCurrencyRequest);

  }

  }

