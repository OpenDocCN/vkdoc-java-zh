  \ 提供的一个开源 Jakarta EE 兼容实现。它是你可以选择用来运行 Jakarta EE 应用程序的众多可用实现之一。这个插件允许我们通过 Maven\
  \ 运行应用程序，而无需手动设置服务器。另外两个插件分别是用于打包的 Maven war^(⁷¹) 插件和用于运行集成测试的 Maven failsafe 插件^(⁷²)。由于这些依赖项是在基础\
  \ POM 文件中声明的，因此它们对 `modules` 元素中声明的所有模块都可用。\n\n```\n\nio.openliberty.tools\nliberty-maven-plugin\n\
  3.5\n\n22.0.0.3\n\n${project.build.directory}/liberty/wlp/usr/shared/resources\n\
  \norg.apache.derby\nderby\n\norg.apache.maven.plugins\nmaven-war-plugin\n3.3.2\n\
  \norg.apache.maven.plugins\nmaven-failsafe-plugin\n3.0.0-M6\n\nintegration-test\n\
  verify\n\n清单 3-5\n根 pom.xml 的 JWallet 构建部分\n```\n\n`core` 模块的 POM 文件如清单 3-6 所示，内容非常精简，没有额外的依赖项，一个显著的例外是它被打包成\
  \ jar 文件。这是因为 `core` 模块将被其他三个模块依赖以提供通用功能，但它本身不是一个可部署的微服务，因此被打包成 jar 文件以包含在其他模块/微服务中。这个核心模块将充当编排模块，其他模块通过它进行相互通信。\n\
  \n```\n\n4.0.0\n\ncom.example\njwallet\n1.0-SNAPSHOT\n\njwallet.core\njar\ncore\n\
  \n清单 3-6\n核心模块 pom.xml\n```\n\n`account` 和 `rate` 微服务的 `pom.xml` 文件与 `wallet` 微服务的类似，如清单\
  \ 3-7 所示。它们非常精简，唯一的依赖项是 `core` 模块。任何特定于某个模块的依赖项都可以在该模块的 POM 文件中声明。另外请注意，它们的打包格式是\
  \ `war`。这意味着它们可以作为独立应用程序部署到应用服务器上。在我们的案例中，将使用 OpenLiberty 服务器来运行所有内容。\n\n```\n\n\
  4.0.0\n\ncom.example\njwallet\n1.0-SNAPSHOT\n\njwallet.wallet\nwar\n\n${project.groupId}\n\
  jwallet.core\n${project.version}\n\nwallet\n\n清单 3-7\n钱包模块 pom.xml\n```\n\n该应用程序被打包为一组容器镜像，可以通过\
  \ Docker、Docker Compose 和 Kubernetes 进行部署和管理。创建容器镜像的入口点是每个模块文件夹中的 `Dockerfile` 文件。钱包微服务的\
  \ `Dockerfile` 如清单 3-8 所示。\n\n```\nFROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi\n\
  COPY --chown=1001:0 src/main/liberty/config /config\nCOPY --chown=1001:0 src/main/liberty/derby-10.14.2.0.jar\
  \ /opt/ol/wlp/usr/shared/resources\nCOPY --chown=1001:0 target/*.war /config/apps\n\
  EXPOSE 3001\nRUN configure.sh\n清单 3-8\n钱包模块 Dockerfile\n```\n\n\n\n第 1 行定义我们的镜像基于一个\
  \ OpenLiberty 完整镜像，该镜像包含对 Jakarta EE 和 MicroProfile 的完整支持。第 3-5 行将 OpenLiberty 配置文件、Apache\
  \ Derby 嵌入式数据库 JDBC 驱动程序和我们的应用程序工件（.war）文件复制到创建的镜像中，以便在服务器启动时自动部署。第 7 行暴露应用程序预期监听的\
  \ 3001 端口。最后，第 9 行运行 OpenLiberty 的 configure.sh 文件，以预配置并激活所需功能。\n\n在根文件夹中，我们有一个\
  \ docker-compose.yaml 文件，作为使用 docker compose 运行应用程序的入口点，该文件声明了六个服务：wallet、rate 和\
  \ account 服务（对应应用程序的三个微服务），以及 jaeger、prometheus 和 grafana 服务。这些服务之间存在相互依赖关系。\n\n\
  wallet 服务基于 wallet 模块的 wallet 文件夹中的 Dockerfile 构建，并暴露 3001 端口，如清单 3-9 所示；rate 服务基于\
  \ rate 文件夹中的 Dockerfile 构建，并暴露 3002 端口，如清单 3-10 所示；account 服务基于 account 文件夹中的 Dockerfile\
  \ 构建，并暴露 3003 端口，如清单 3-11 所示。值得注意的是，这三个服务都进行了健康检查^(⁷³)。对每个服务都执行了一个简单的 curl 调用，指向默认的\
  \ Eclipse MicroProfile 健康检查端点。这用于告知 docker 容器已准备好开始接受请求。此外，还设置了一些环境变量来配置追踪代理，使其连接到我们的追踪服务器\
  \ Jaeger。\n\n```\naccount:\n  image: jwallet/account:latest\n  ports:\n    - \"\
  3003:3003\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n    JAEGER_AGENT_PORT:\
  \ 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM: 1\n  healthcheck:\n\
  \    test: curl --fail http://localhost:9080/health || exit 1\n  build:\n    context:\
  \ account\n    dockerfile: Dockerfile\n清单 3-11\nAccount docker compose 服务\n```\n\
  \n```\nrate:\n  image: jwallet/rate:latest\n  ports:\n    - \"3002:3002\"\n  environment:\n\
  \    JAEGER_AGENT_HOST: jaeger\n    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE:\
  \ const\n    JAEGER_SAMPLER_PARAM: 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health\
  \ || exit 1\n  build:\n    context: rate\n    dockerfile: Dockerfile\n清单 3-10\n\
  Rate docker compose 服务\n```\n\n```\nwallet:\n  image: jwallet/wallet:latest\n  ports:\n\
  \    - \"3001:3001\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n    JAEGER_AGENT_PORT:\
  \ 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM: 1\n  healthcheck:\n\
  \    test: curl --fail http://localhost:9080/health || exit 1\n  build:\n    context:\
  \ wallet\n    dockerfile: Dockerfile\n清单 3-9\nWallet docker compose 服务\n```\n\n\
  jaeger 服务基于从 Docker Hub 拉取的 jaeger docker 镜像。该服务声明了对 wallet、rate 和 account 服务的依赖，因此\
  \ docker compose 会在这些服务之后启动 jaeger 服务。由于 jaeger 是一个请求追踪应用程序，它需要有东西可以追踪。而 wallet\
  \ 容器作为根容器，是 jaeger 所依赖的容器之一，如清单 3-12 所示。\n\n```\njaeger:\n  image: docker.io/jaegertracing/all-in-one:1.31\n\
  \  ports:\n    - \"5775:5775/udp\"\n    - \"6831:6831/udp\"\n    - \"6832:6832/udp\"\
  \n    - \"5778:5778\"\n    - \"16686:16686\"\n    - \"14268:14268\"\n  depends_on:\n\
  \    - wallet\n    - rate\n    - account\n清单 3-12\nJaeger docker compose 服务\n```\n\
  \nprometheus 服务基于从 Docker Hub 拉取的 prometheus docker 镜像。该服务也声明了对 wallet、rate 和 account\
  \ 服务的依赖；在服务声明的卷部分，一份捆绑的 prometheus.yml 文件副本被捆绑到创建的容器中。该文件配置了 prometheus 将从 wallet、rate\
  \ 和 account 服务抓取指标的端点，以及其他相关配置，如抓取间隔，如清单 3-13 所示。\n\n```\nprometheus:\n  image:\
  \ docker.io/prom/prometheus:v2.34.0\n  volumes:\n    - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml\n\
  \  ports:\n    - \"9090:9090\"\n  depends_on:\n    - wallet\n    - rate\n    - account\n\
  清单 3-13\nPrometheus docker compose 服务\n```\n\n最后一个服务 grafana，基于从 Docker Hub 拉取的镜像，声明了对\
  \ prometheus 的依赖。grafana 和 prometheus 都是用于显示应用程序指标的应用程序。然而，grafana 是一个比 prometheus\
  \ 更用户友好、更可配置的监控应用程序。因此，可观测性领域的普遍做法是配置 grafana 来消费 prometheus 从应用程序抓取的指标。这样，你可以两全其美——prometheus\
  \ 擅长抓取指标，而 grafana 擅长显示它们。在服务声明的卷部分，利用 grafana 的预配置功能，捆绑了一些预配置仪表板的副本，如清单 3-14 所示。\n\
  \n```\ngrafana:\n  image: docker.io/grafana/grafana-oss:8.4.4\n  ports:\n    - \"\
  3000:3000\"\n  environment:\n    GF_AUTH_ANONYMOUS_ENABLED: 'true'\n  volumes:\n\
  \    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources\n\
  \    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards\n\
  \  depends_on:\n    - prometheus\n清单 3-14\nGrafana docker compose 服务\n```\n\n\n\n\
  ### 你好，世界！\n\n后续相关章节将详细介绍在 Docker 文件中声明的每个辅助服务。目前，我们已经了解了应用程序的搭建过程，在查看代码之前，让我们先运行传统的\
  \ hello world。由于应用程序被打包并作为 Docker 容器运行，根文件夹中的 `jwallet-cli.sh` 脚本是一个 shell 脚本，支持通过\
  \ Docker Compose 或 Kubernetes 启动和运行应用程序。各种支持的命令可通过 help 命令查看，如清单 3-15 所示。\n\n```\n\
  ~> ./jwallet-cli.sh help\nUsage:\njwallet-cli.sh \nCommands:\nbuild       : build\
  \ docker images\nup-compose : run jwallet on docker-compose\ndown-compose: stop\
  \ jwallet running on docker-compose\nup-kube    : run jwallet on kubernetes (using\
  \ k3d)\ndown-kube   : stop jwallet running on kubernetes (using k3d)\nListing 3-15\n\
  jwallet-cli.sh help command output\n```\n\n对于我们的 hello world，我们首先使用 build 命令构建镜像和所有内容，然后使用\
  \ up-compose 命令。初始构建各种镜像和应用程序工件可能需要一些时间，具体取决于您的网络和计算机速度。之后运行 up-compose 命令应该能让应用程序启动并运行。为方便参考，`README.md`\
  \ 文件汇总了访问应用程序各个服务的端点，如清单 3-16 所示。\n\n```\nRunning JWallet\n1\\. Docker compose\n\
  Requires\n- docker-compose\nStart / Stop\n- start ./jwallet-cli.sh up-compose\n\
  - stop ./jwallet-cli.sh down-compose\nAccess service\n- Wallet module http://localhost:3001/wallet\n\
  - Rate module http://localhost:3002/rate\n- Account module http://localhost:3003/account\n\
  - Jaeger tracing http://localhost:16686\n- Prometheus http://localhost:9090\n- Grafana\
  \ http://localhost:3000\nListing 3-16\nREADME.md entry for running and accessing\
  \ the JWallet service\n```\n\n访问钱包服务上的 Hello 端点，我们会收到一条消息，表明服务已启动并正在运行，如清单 3-17\
  \ 所示。对于 rate 和 account 服务也是如此，分别如清单 3-18 和 3-19 所示。\n\n```\n~> curl http://localhost:3003/account/api/hello\n\
  Hello account module\nListing 3-19\nAccessing the account service Hello endpoint\n\
  ```\n\n```\n~> curl http://localhost:3002/rate/api/hello\nHello rate module\nListing\
  \ 3-18\nAccessing the rate service Hello endpoint\n```\n\n```\n~> curl http://localhost:3001/wallet/api/hello\n\
  Hello wallet module\nListing 3-17\nAccessing the wallet service Hello endpoint\n\
  ```\n\n我们还可以通过查询微服务的健康检查端点来检查它们是否已启动并准备就绪。对于钱包微服务，调用 `http://localhost:3001/health`\
  \ 应能返回状态，如清单 3-20 所示。\n\n```\n~> curl http://localhost:3001/health\n{\n\"checks\"\
  : [\n{\n\"data\": {},\n\"name\": \"wallet-liveness\",\n\"status\": \"UP\"\n},\n\
  {\n\"data\": {},\n\"name\": \"wallet-readiness\",\n\"status\": \"UP\"\n}\n],\n\"\
  status\": \"UP\"\n}\nListing 3-20\nAccessing the wallet service health endpoint\n\
  ```\n\n对于 rate 服务，调用 `http://localhost:3002/health` 应能返回其健康状态，如清单 3-21 所示。\n\n```\n\
  ~> curl http://localhost:3002/health\n{\n\"checks\": [\n{\n\"data\": {},\n\"name\"\
  : \"rate-liveness\",\n\"status\": \"UP\"\n},\n{\n\"data\": {},\n\"name\": \"rate-readiness\"\
  ,\n\"status\": \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing 3-21\nAccessing the\
  \ rate service health endpoint\n```\n\n对于 account 服务，调用 `http://localhost:3003/health`\
  \ 同样应能返回 account 微服务的健康检查状态，如清单 3-22 所示。\n\n```\n~> curl http://localhost:3003/health\n\
  {\n\"checks\": [\n{\n\"data\": {},\n\"name\": \"account-liveness\",\n\"status\"\
  : \"UP\"\n},\n{\n\"data\": {},\n\"name\": \"account-readiness\",\n\"status\": \"\
  UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing 3-22\nAccessing the account service\
  \ health endpoint\n```\n\n### 应用程序架构概述\n\n微服务作为一种应用程序开发范式已广为人知并被理解。然而，对于如何实现它，并没有单一的定义。与单体应用（所有应用程序代码作为一个单元开发）形成鲜明对比的是，微服务并不适合这种直接的实现方式。一个微服务应用程序可以由物理上分离的服务组成，即应用程序的每个微服务在其自己的代码库中是一个独立的\
  \ Maven 项目，并且所有服务都通过某种编排工具（如 BPM）进行编排。^(⁷⁴)\n\n另一种方式可以是在一个公共代码库中开发一组独立的服务，每个服务作为项目中的一个模块。在特定应用程序中实现微服务的方式还有其他变体。无论选择哪种实现风格，微服务应用程序通常都应满足前一章讨论的微服务描述。\n\
  \n\n\n#### JWallet\n\nJWallet 是本书的参考应用程序，最初以一组微服务的形式开发，这些微服务位于一个公共项目中，每个服务都是该项目中的一个\
  \ Maven 模块。在后续章节中，我们将把该应用重构为物理上独立的服务，以实现另一种形式的微服务开发。表 3-1 展示了访问应用中各个服务的端点。\n\n表\
  \ 3-1\n\nJWallet 中的端点\n\n| 模块 | URL |\n| --- | --- |\n| Wallet | http://localhost:3001/wallet\
  \ |\n| Rate | http://localhost:3002/rate |\n| Account | http://localhost:3003/account\
  \ |\n| Jaeger | http://localhost:16686 |\n| Prometheus | http://localhost:9090 |\n\
  | Grafana | http://localhost:3000 |\n\n如前所述，该应用是一个 Maven 多模块应用。其主要用户界面是用于在指定钱包中创建和执行交易的各种端点。这些\
  \ REST 端点使用 Jakarta RESTful API (JAX-RS) 开发。应用的根入口点是 `CONTEXT_PATH/api` 端点。每个 JAX-RS\
  \ 应用都必须有一个根入口点，作为该应用所有 REST 端点的基路径。这个根 REST 端点在核心模块中声明，如代码清单 3-23 所示。\n\n```\n@ApplicationPath(\"\
  api\")\npublic class JaxrsConfigurations extends Application {\n}\n代码清单 3-23\nJAX-RS\
  \ 根入口点\n```\n\n第 1 行的注解 `@ApplicationPath(\"api\")` 告诉 JAX-RS 运行时，我们希望将该应用中的所有 REST\
  \ 端点托管在基路径 \"api\" 下。然后，`JaxrsConfigurations` 类继承了 JAX-RS API 中的 `Application` 类。有了这个配置，所有\
  \ REST 端点都可以作为 api 路径的子路径进行访问。例如，钱包服务的 hello 路径是 `http://localhost:3003/wallet/api/hello`。\n\
  \n钱包模块中的 hello 资源在 `HelloResource` 类中声明，如代码清单 3-24 所示。\n\n```\n@Path(\"hello\")\n\
  public class HelloResource {\n@GET\n@SimplyTimed\n@Traced\nString hello {\nreturn\
  \ \"Hello account module\";\n}\n}\n代码清单 3-24\nHello 端点\n```\n\nJAX-RS 资源以 Java 类的形式托管，资源端点则作为该类的方法托管。在前面的\
  \ `HelloResource` 示例中，第 1 行声明了该类及其包含的所有资源都托管在 `/hello` 路径下。`@Path` 注解来自 JAX-RS API。这意味着我们希望在该类中暴露的任何\
  \ REST 端点都将作为 `/hello` 路径的子路径进行访问。第 4 行使用 `@GET` 注解将第 6 行声明的 `hello` 方法定义为 HTTP\
  \ GET 方法。由于该方法没有定义其他路径，当访问 `/wallet/api/hello` 路径时，它将成为 JAX-RS 运行时调用的默认 GET 方法。\n\
  \n方法的返回类型是返回给客户端的值。在此示例中，当对 `/hello` 发起 GET 调用时，会返回简单的字符串消息 \"Hello wallet module\"\
  。JAX-RS 支持返回多种不同类型。由于 `HelloResource` 类没有明确指定它消费和产生的内容类型，运行时默认使用简单类型。稍后我们将看到如何声明给定\
  \ JAX-RS 资源消费和产生的 MIME^(⁷⁵) 类型。\n\n第 5 行还使用来自 Eclipse MicroProfile 指标 API 的 `@SimplyTimed`\
  \ 注解对 `hello` 方法进行了注解。此注解会跟踪方法调用的耗时和次数。只需用 `@SimplyTimed` 注解 `hello` 方法，MicroProfile\
  \ 运行时就会暴露一个用于跟踪该方法调用次数和每次调用时长的指标。暴露的指标可以被任意数量的应用程序消费。在 JWallet 的案例中，我们可以通过集成的 Prometheus（可通过\
  \ http://localhost:9090 访问）和 Grafana（可通过 http://localhost:3000 访问）可观测性应用查看这些指标，如图\
  \ 3-2 所示。\n\n![](img/531256_1_En_3_Fig2_HTML.png)\n\n一张截图展示了 JWallet Grafana 指标探索的条形图，条形图从\
  \ 17 小时 9 分 45 秒开始，到 17 小时 11 分 15 秒结束。\n\n图 3-2\n\nGrafana 指标探索器\n\n第 6 行还使用来自\
  \ Eclipse MicroProfile 指标 API 的 `@Traced` 注解对 `hello` 方法进行了注解。此注解会跟踪对服务的传入请求以及随后对其他服务的请求。\n\
  \n在我的示例部署中，钱包模块的 Hello 资源（可通过 http://localhost:3001/wallet 访问）已被调用了八次，每次调用都列在列表中，如图\
  \ 3-3（可通过 http://localhost:16686 访问）所示。点击其中一个调用会跳转到跟踪详情页面，如图 3-4 所示。\n\n![](img/531256_1_En_3_Fig4_HTML.png)\n\
  \n一张截图展示了 Jaeger 跟踪的跟踪详情，包括 jwallet 示例、标签和进程。\n\n图 3-4\n\nJaeger 跟踪 – 跟踪详情\n\n![](img/531256_1_En_3_Fig3_HTML.png)\n\
  \n一张截图展示了 Jaeger 跟踪的跟踪列表，包含八个跟踪，通过选择结果项比较跟踪，并包含钱包示例。\n\n图 3-3\n\nJaeger 跟踪 – 跟踪列表\n\
  \n其中一个被跟踪调用的详细列表显示了调用的日期和时间 (1)、被调用资源所在的服务及持续时间 (2)，以及被跟踪调用的一些详细信息，包括完整的资源端点 (3)。所有这些细节都由\
  \ MicroProfile 指标运行时处理。我们所要做的就是用 `@SimplyTimed` 声明我们的 hello 资源方法。第 6 章将详细介绍 Jakarta\
  \ RESTful Web Services API。现在，让我们先粗略地看一下 `WalletResource`。\n\nWallet 资源是应用的根入口点。它托管了用于创建、借记、贷记和查询钱包的各种方法。其声明如代码清单\
  \ 3-25 所示。\n\n```\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
  @Path(\"wallets\")\npublic class WalletResource {\n@Inject\nWalletService walletService;\n\
  ...\n}\n代码清单 3-25\n钱包模块端点\n```\n\nWallet 资源定义在 `WalletResource.java` 类中。第 1 行和第\
  \ 2 行使用 `@Consumes` 和 `@Produces` 注解分别声明该资源类的方法可以消费和产生的 MIME 类型。由于 JSON^(⁷⁶) 数据格式是\
  \ RESTful Web 服务最流行的格式，JWallet 中的所有资源端点都消费和产生 JSON 格式的数据。对于 `WalletResource`，传递给这两个注解的常量\
  \ `MediaType.APPLICATION_JSON` 告诉 JAX-RS 运行时，该类中声明的所有资源方法都消费和产生 JSON。这意味着客户端可以调用该类中的资源方法，并以\
  \ JSON 格式传入任何必要的数据。运行时将处理传入的 JSON 数据与相应 Java 类型之间的转换。返回类型也是如此。\n\n\n\n\n第 3 行声明该类托管在钱包资源路径下。与\
