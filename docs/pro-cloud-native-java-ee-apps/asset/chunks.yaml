  raw: '##### @DefaultValue


    The limit and offset fields are also query parameters that we expect to be grabbed
    from the request and injected into the respective fields. The @DefaultValue on
    both fields sets a default value in the absence of any explicit value set by the
    client. This means that if there is no limit and offset values passed as query
    parameters, the instantiated class instance will have the limit field set to 150
    and the offset field set to 0\. The limit field is also annotated @Positive, which
    is a bean validation constraint that constrains the possible values of the field
    to a positive integer .


    We have refactored the UserSearchRequest without changing anything in our resource
    method at all. This is why we recommend the use of the @BeanParam annotation when
    dealing with query parameters. With the paging option created, we can now refactor
    the returned type to also contain some metadata that the client uses in creating
    a meaningful paging request. Listing [6-15](#531256_1_En_6_Chapter.xhtml#PC15)
    shows a new parameterized class, SearchResult, with some metadata.


    ```

    public class SearchResult implements Serializable {

    private List searchResult = new ArrayList();

    private Long totalSize;

    private Long offset;

    private Long limit;

    }

    Listing 6-15

    SearchResult

    ```


    SearchResult takes a type and binds that type to the searchResult list. This list
    will contain the actual search result. The totalSize field refers to the total
    size of the matched search request. The offset and limit simply return what the
    client passed, if any. With this new construct, we can refactor the searchUsers
    resource method to return a SearchResult object typed to UserResponse. Listing
    [6-16](#531256_1_En_6_Chapter.xhtml#PC16) shows the updated resource method.


    ```

    @GET

    @Path("search")

    public SearchResult searchUsers(@NotNull @BeanParam UserSearchRequest userSearchRequest)
    {

    return userService.searchUsers(userSearchRequest);

    }

    Listing 6-16

    Updated searchUsers resource method

    ```


    Listing [6-17](#531256_1_En_6_Chapter.xhtml#PC17) shows the full search implementation
    in the UserRepository using the Criteria API of the Jakarta Persistence specification.
    As discussed in the previous chapter, the Criteria API is better suited to such
    application search cases .


    ```

    public SearchResult searchUsers(final UserSearchRequest searchRequest) {

    CriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();

    CriteriaQuery query = criteriaBuilder.createQuery(User.class);

    Root from = query.from(User.class);

    final Set predicateSet = new HashSet();

    if (searchRequest.getFirstName() != null) {

    Predicate firstName = criteriaBuilder.like(from.get("firstName"), "%" + searchRequest.getFirstName()
    + "%");

    predicateSet.add(firstName);

    }

    if (searchRequest.getLastName() != null) {

    Predicate lastName = criteriaBuilder.like(from.get("lastName"), "%" + searchRequest.getLastName()
    + "%");

    predicateSet.add(lastName);

    }

    if (searchRequest.getTotalConversions() != null) {

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.EQ)
    {

    predicateSet.add(criteriaBuilder.equal(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.GT)
    {

    predicateSet.add(criteriaBuilder.greaterThan(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.GTE)
    {

    predicateSet.add(criteriaBuilder.greaterThanOrEqualTo(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.LT)
    {

    predicateSet.add(criteriaBuilder.lessThan(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.LTE)
    {

    predicateSet.add(criteriaBuilder.lessThanOrEqualTo(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.NEQ)
    {

    predicateSet.add(criteriaBuilder.notEqual(from.get("totalConversions"),

    searchRequest.getTotalConversions()));

    }

    }

    if (searchRequest.getUserType() != null) {

    Predicate userType = criteriaBuilder.equal(from.get("userType"), searchRequest.getUserType());

    predicateSet.add(userType);

    }

    CriteriaQuery where = query.select(from).where(predicateSet.toArray(new Predicate[]
    {}));

    TypedQuery typedQuery = em.createQuery(where);

    if (searchRequest.getOffset() != null) {

    typedQuery = typedQuery.setFirstResult(searchRequest.getOffset());

    }

    if (searchRequest.getLimit() != null) {

    typedQuery = typedQuery.setMaxResults(searchRequest.getLimit());

    }

    List response =

    typedQuery.getResultList().stream().map(UserService::toUserResponse).collect(Collectors.toList());

    SearchResult searchResult = new SearchResult();

    searchResult.setSearchResult(response);

    CriteriaQuery countQuery = criteriaBuilder.createQuery(Long.class);

    Root userCountRoot = countQuery.from(User.class);

    countQuery.select(criteriaBuilder.countDistinct(userCountRoot.get("id")))

    .where(predicateSet.toArray(new Predicate[] {}));

    Long count = em.createQuery(countQuery).getSingleResult();

    searchResult.setTotalSize(count);

    searchResult.setLimit(Long.valueOf(searchRequest.getLimit()));

    searchResult.setOffset(searchResult.getOffset());

    return searchResult;

    }

    Listing 6-17

    Search user implementation with the Criteria API

    ```


    As discussed in the previous chapter, the Criteria API can be very verbose and
    unwieldy. However, it is the best tool for these kinds of database queries. You
    generally will break the search implementation query down into smaller methods.
    They are only reproduced here as one large body for ease of reference.


    With the search method implemented, complete with pagination, we need to make
    an architectural decision about the last GET method . This method simply returns
    all the users in the system. But do we really need it? As the search resource
    method also returns a similar result, we can decide to remove the last GET method
    because it is almost redundant. You can search for a collection of users which
    will return a list. Having an endpoint that returns all users will also require
    paging for better performance. Since this is already implemented in the searchUsers
    endpoint, we can omit the final GET method from an architectural point of view.'
