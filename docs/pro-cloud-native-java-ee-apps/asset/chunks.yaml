  trans: '

    ## CDI 装饰器


    CDI 装饰器允许将一个 Bean 包裹在另一个 Bean 内部，从而使包裹 Bean 能够改变被包裹 Bean 的行为。与允许你实现一组特定 Bean 所共有的横切关注点的拦截器不同，装饰器允许你改变特定
    Bean 方法的实现。因此，拦截器通常适用于多个 Bean，而装饰器则与单个 Bean 绑定，因为它们实现了与被装饰 Bean 相关的业务方法。例如，你可以使用装饰器来更改你不拥有的
    Bean 的功能。CDI 装饰器允许你在应用程序中实现装饰器设计模式。


    为了更好地理解它们，让我们看一个例子。欧盟的 GDPR^(⁹⁸) 法规要求所有欧盟居民使用的应用程序必须将其数据存储在欧盟境内的服务器上。为了满足这一要求，我们可以装饰
    `UserService` Bean，以实现这一自定义需求。首先，让我们通过引入一个接口来重构 `UserService`，如清单 4-37 所示。


    ```

    public interface UserFacade {

    UserResponse createUser(final CreateUserRequest createUserRequest);

    UserResponse getUser(final Long id);

    }

    清单 4-37

    展示了 UserFacade 接口

    ```


    清单 4-37 展示了包含两个方法（`createUser` 和 `getUser`）的 `UserFacade` 接口。该接口是一个业务接口，由 `UserService`
    实现，如清单 4-38 所示。


    ```

    @Action

    public class UserService implements UserFacade {

    @Inject

    UserRepository userRepository;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    User user = fromUserWrapper(createUserRequest);

    user = userRepository.save(user);

    UserResponse userResponse = getUser(user.getId());

    return userResponse;

    }

    @Override

    public UserResponse getUser(final Long userId) {

    final User user = userRepository.findById(userId);

    return toUserResponse(user);

    }

    }

    清单 4-38

    展示了 UserService 实现 UserFacade 接口

    ```


    清单 4-38 展示了实现 `UserFacade` 接口的 `UserService`。到目前为止，`UserService` 并没有什么特别之处。现在，为了通过重写
    `createUser` 方法为 `UserService` Bean 添加额外功能，清单 4-39 展示了 `UserService` 类的 `UserServiceDecorator`。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = getUser(user.getId());

    userResponseEvent.fire(userResponse);

    //userResponseEvent.fireAsync(userResponse);

    return UserService.toUserResponse(user);

    }

    return userService.createUser(createUserRequest);

    }

    }

    清单 4-39

    展示了“装饰”UserService 并重写 createUser 方法的 UserServiceDecorator

    ```


    清单 4-39 展示了 `UserServiceDecorator`。它使用了 `@Decorator` 注解。该注解指明此类是一个装饰器。它还使用了 `@Priority`
    注解。与关于拦截器的讨论类似，`@Priority` 是激活和排序装饰器的新方式。该装饰器实现了 `UserFacade` 接口，并被声明为抽象类。之所以是抽象类，是因为该类并未实现接口中的所有方法。


    这里有两个注入点——一个用于 `EntityManager`，另一个用于 `UserService`。`EntityManager` 注入点使用了 `@Database(MS_SQL)`
    限定符。我们实现此装饰器的目的是为了能够重写 `UserFacade` 接口上的 `createUser` 方法。目标是将欧盟的用户保存到托管在欧盟的 MS
    SQL Server 数据库中。因此，我们注入 `EntityManager`，并使用必要的限定符对其进行限定，以便注入连接到 MS SQL Server
    数据库的正确 `EntityManager` 实例。


    `UserService` 注入点使用了 `@Delegate` 注解。此字段被称为装饰器的委托注入点。这个 Bean 就是 `UserServiceDecorator`
    正在装饰的对象。对委托（此处为 `UserService`）的任何调用都将在装饰器上进行，装饰器可以直接在委托对象上调用方法。此字段告诉 CDI 容器 `UserServiceDecorator`
    正在装饰哪个 Bean。你可以限定委托注入点，以限制要装饰的 Bean 的类型。


    该装饰器实现了 `createUser` 方法。此方法是 `UserFacade` 接口上的两个方法之一。该实现检查要持久化的用户是否位于欧盟地区。如果是，则装饰器通过调用注入的
    `EntityManager` 的 `persist` 方法来执行实际的持久化操作。请记住，此 `EntityManager` 实例连接到一个将托管在欧盟的
    SQL Server。如果用户不在欧盟，则装饰器只需调用委托上的 `createUser` 方法。


    通过这种方式，我们为 `UserService` Bean 添加了一个自定义功能。持久化用户的过程并非横切关注点，而是实际的业务功能。为了扩展该功能，我们使用装饰器模式来扩展
    Bean 的功能，而无需更改其实现。通常情况下，你会发现自己使用装饰器来扩展不属于你应用程序的 Bean。通过使用生产者，你可以将这些类转换为 CDI Bean，然后使用装饰器来扩展它们的功能。


    像 `UserServiceDecorator` 这样的装饰器是一个 CDI Bean，因此，它的类型是其继承链上直至 `java.lang.Object`
    的所有类型。装饰器不能声明除 `@Dependent` 伪作用域之外的任何作用域。为装饰器指定任何其他作用域，容器在应用程序启动时都会将其视为定义错误。到目前为止，你已经了解了装饰器和拦截器如何分别帮助你实现横切关注点和向
    Bean 添加功能。接下来，让我们看看 CDI 中的事件。


    ## CDI 事件


    CDI 事件机制是一种允许应用程序组件发出任何类型的事件，并以类型安全、完全解耦的方式通知这些事件的一个或多个监听器的方法。事件的源与任何观察者或监听器之间不存在编译时依赖关系。观察者设计模式中的发布者-订阅者范式是
    CDI 事件的核心，它包含两个部分——事件对象和事件观察者。

    '
- fmt: '### The Event Object


    The event object is the payload of the event to be fired. Think of the payload
    as the data that will be passed to listeners of the event. It can be any valid
    Java type. In `jwallet`, we want to send an SMS to users who successfully sign
    up to the application. We could hard code this requirement into our `UserService`
    bean. However, that would mean we could get tied to a single implementation of
    the process of sending an SMS.


    A much cleaner way would be to fire an event of the type of user representation
    we have in the application. This way, the SMS implementation will be fully decoupled
    from the process of persisting users in the system. And we can add and remove
    message sending implementations at will without breaking the code. We could also
    add other messaging options like email, all as event listeners, or observers,
    still completely decoupled from the event source.


    To do this, we need an event object. This object will be passed to observers as
    the payload when the event is fired. The CDI container will map event observers
    to fired events based on the type of payload that the observers are observing.
    Listing [4](#531256_1_En_4_Chapter.xhtml#PC40)-40 shows the `Event` interface
    with a payload in the `UserServiceDecorator`.


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    }

    Listing 4-40

    showing an injection of the Event object in the UserServiceDecorator

    ```


