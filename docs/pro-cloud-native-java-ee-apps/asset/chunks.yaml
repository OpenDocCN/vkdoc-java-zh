    ## 组合健康检查


    到目前为止，我们看到的健康检查都是由独立的 Bean 实现的。然而，它们也可以组合起来，由单个 Bean 实现。在这种情况下，单个 HealthCheck
    Bean 将使用所有必需的健康检查限定符进行注解。这样的 HealthCheck 实现将用于解析其被注解的所有健康检查。清单 10-7 展示了一个针对 @Liveness、@Readiness
    和 @Startup 的单一健康检查实现。


    ```

    @ApplicationScoped

    @Liveness

    @Readiness

    @Startup

    public class HelloHealth implements HealthCheck {

    LocalDateTime upSince = LocalDateTime.now(ZoneOffset.UTC);

    @Inject

    ApiLayer apiLayer;

    @Override

    public HealthCheckResponse call() {

    JsonObject currencySymbols = apiLayer.getCurrencySymbols();

    boolean success = currencySymbols.getBoolean("success", false);

    return success

    ? HealthCheckResponse.named("rate-service")

    .withData("up_since", upSince.toString())

    .withData("rate_api_provider", "up")

    .up()

    .build()

    : HealthCheckResponse.down("rate-service");

    }

    }

    清单 10-7

    展示了一个单一的健康检查实现

    ```


    清单 10-7 展示了一个针对存活、就绪和启动的单一健康检查实现。对于此实现，会向应用程序的汇率服务提供商发起一个外部调用。我们唯一想要返回 UP 健康检查响应的情况是当外部服务提供商可用时。由于我们将汇率转换委托给了该服务，当我们依赖的外部提供商宕机时，将我们的应用程序投入服务意义不大。对
    /health、/health/live、/health/ready 和 /health/started 的调用都将路由到这个单一实现。对 /health
    的示例调用返回的数据如清单 10-8 所示。


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": "2022-08-14T17:59:26.592292658",

    "rate_api_provider": "up"

    },

    "name": "rate-service",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    清单 10-8

    展示了单一健康检查实现的数据

    ```


    ## 生成健康检查


    正如在 Jakarta 上下文和依赖注入章节（第 4 章）中所讨论的，生产者是一种用于创建 CDI Bean 的构造。由于 HealthCheck 是 CDI
    Bean，它们可以使用 CDI 生产者方法构造来生成。清单 10-9 展示了 WalletHealthCheckProducer Bean，它包含三个生产者方法，每个方法都带有一个针对存活、就绪和启动这三种健康检查的限定符。


    ```

    @ApplicationScoped

    public class WalletHealthCheckProducer {

    CountDownLatch readinessCountdown = new CountDownLatch(2);

    CountDownLatch startupCountdown = new CountDownLatch(5);

    @Inject

    @ConfigProperty(name = "free.memory.limit")

    Integer freeMemoryLimit;

    @Produces

    @Liveness

    HealthCheck livenessCheck() {

    String healthCheckName = "wallet-liveness-health-check";

    return () -> {

    long totalMemory = Runtime.getRuntime().totalMemory();

    long freeMemory = Runtime.getRuntime().freeMemory();

    boolean adequateMemory = (((float) freeMemory / totalMemory) * 100) > freeMemoryLimit;

    return adequateMemory ?

    HealthCheckResponse

    .builder()

    .name(healthCheckName)

    .up()

    .build() :

    HealthCheckResponse

    .named(healthCheckName)

    .down()

    .build();

    };

    }

    @Produces

    @Readiness

    HealthCheck readinessCheck() {

    return () -> {

    readinessCountdown.countDown();

    return readinessCountdown.getCount() == 0 ?

    HealthCheckResponse

    .up("wallet-liveness") :

    HealthCheckResponse

    .down("wallet-liveness");

    };

    }

    @Produces

    @Startup

    HealthCheck startupCheck() {

    return () -> {

    startupCountdown.countDown();

    return startupCountdown.getCount() == 0 ?

    HealthCheckResponse

    .up("wallet-started") :

    HealthCheckResponse

    .down("wallet-startup-failed");

    };

    }

    }

    清单 10-9

    展示了使用生产者方法创建 HealthCheck

    ```


    清单 10-9 展示了带有三个方法的 @ApplicationScoped WalletHealthCheckProducer。每个方法都使用 CDI @Produces
    注解和一个健康检查限定符进行注解。第一个方法是 @Liveness 检查，如果 JVM 中相对于总可用内存的空闲内存超过传入的配置值，则返回一个状态。在示例代码中，在
    microprofile-config.properties 中传入的 MicroProfile 配置值是 40。因此，如果 JVM 中的空闲内存超过 40%，则存活检查返回一个状态为
    UP 的 HealthCheckResponse 对象。否则，返回 DOWN 状态。


    第二个方法是 @Readiness 检查，它简单地倒数到 2 并返回 UP 状态。第三个方法是 @Startup 检查，它也倒数到 5，然后返回 UP 状态。清单
    10-10 展示了对此模块的 /health 端点进行示例调用时返回的数据。


    ```

    {

    "checks": [

    {

    "data": {},

    "name": "wallet-readiness",

    "status": "UP"

    },

    {

    "data": {},

    "name": "wallet-liveness-health-check",

    "status": "DOWN"

    },

    {

    "data": {},

    "name": "wallet-started",

    "status": "UP"

    }

    ],

    "status": "DOWN"

    }

    清单 10-10

    展示了为生成的健康检查返回的健康检查数据

    ```


    清单 10-10 展示了 jwallet 的 wallet 模块的 /health 探测的响应。在示例调用中，JVM 报告可用空闲内存小于总内存的 40%，导致
    @Liveness 检查返回 DOWN 状态。需要注意的是，响应不一定按任何特定顺序返回。即使在代码中存活检查是在就绪检查之前声明的，对基础 /health
    端点的调用也会先返回就绪检查的结果，然后才是存活检查的结果。


    ## 总结


    本章讨论了 Eclipse MicroProfile Health 规范。我们探讨了该规范与 Metrics 规范之间的区别。然后讨论了 Health API
    的结构。接着，我们研究了如何在 CDI API 的上下文中使用它。您应该能够使用 Health API 为您的云原生应用程序创建自定义的健康检查流程。


