    the MicroProfile Metrics API. The module also has its own unit and integration
    tests.


    The implementation of these resource methods can and, in general, should reuse
    the existing logic from the monolith. Migrating from a monolith to microservices
    will mostly center around the boundary and packaging of the application. Existing
    business logic should be reused as much as possible.


