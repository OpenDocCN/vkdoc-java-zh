    These two complement each other for when you need lightweight and heavyweight
    timing metrics.


    ### Injecting Metrics


    Apart from the use of annotations, you can also directly inject metrics of type
    meter, timer, counter, and histogram in your applications. You can inject metrics
    into fields, methods, and parameters using the @Metric annotation in combination
    with @Inject. The @Metric annotation supports all the metadata that the respective
    metrics support, such as name, description, and absolute values.'
  trans: '

    #### @SimplyTimed


    `@SimplyTimed`注解是一种度量指标，用于标记方法、构造函数或类为简单计时。所谓简单计时，即通过计时器追踪经过的时间时长和次数。它以纳秒为单位测量时长。清单
    9-9 展示了`RateResourceImpl`的`convertCurrency`方法使用了`@SimplyTimed`进行简单计时。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("rates")

    public class RateResourceImpl implements RateResource {

    @Inject

    RateService rateService;

    @Path("convert")

    @POST

    @Override

    @SimplyTimed(name = "convert_currency_simple_timer", absolute = true)

    public ConvertCurrencyResponse convertCurrency(ConvertCurrencyRequest convertCurrencyRequest)
    {

    return rateService.convertCurrency(convertCurrencyRequest);

    }

    }

