  trans: '

    正如我们之前提到的，当时的应用服务器市场尚处于萌芽阶段，分析师预测它将发展成为一个价值数十亿美元的产业。这促使众多供应商涌入市场。随着 J2EE 的发布，其中许多供应商都去申请了
    J2EE 认证。这些供应商包括 BEA Systems、Nokia、Compaq、IBM、Oracle、SAP、Sybase、Macromedia、Hitachi
    和 TIBCO Software。所有这些公司都提供了可以部署 J2EE 应用的应用服务器。这些服务器也都是专有的、本地部署的。值得注意的是，Sun 公司本身也有一款应用服务器，最初名为
    iPlanet，后来更名为 Sun ONE。然而，这个市场上的两大主导供应商是 IBM 的 WebSphere 和 BEA 的 WebLogic。


    还有一个新兴的开源项目，名为 Enterprise JavaBeans Open Source Software (EJB-OSS)，它实现了 J2EE 规范中的
    EJB 应用程序编程接口（API）。该项目逐步实现了该规范，但并未获得 J2EE 认证。该项目后来也改名为 JBoss。这款开源应用服务器在当时的企业环境中取得了重大进展。


    ## 单体架构


    当时主流的应用开发模型是单体架构。这种开发范式将应用构建成一个巨大的“捆绑包”，所有层和组件形成一个单一的、内聚的部署产物。这种范式有其优点和缺点。修改应用的任何部分都意味着需要重新部署整个应用。


    一个典型的 J2EE 应用会以 Web 应用归档（WAR）或企业应用归档（EAR）的形式部署。WAR 文件格式用于部署使用规范中 Web 概要文件开发的 J2EE
    应用。WAR 归档可以部署到 Servlet 容器或任何实现了更大 J2EE 规范中 Web 概要文件规范的运行时中。EAR 归档用于部署使用 J2EE 规范全系列功能开发的完整
    J2EE 应用。


    J2EE 平台非常适合开发单体应用。这主要是因为在该平台开发和发布之时，以及之后的多年里，单体架构是当时最主流、最流行的应用开发范式。因此，该平台的发展是为了满足使用这种范式开发软件的企业需求。


    单体应用开发架构的优点如下。


    ### 开发速度


    鉴于应用的每个组件都在一个单一的代码库中，让多个开发团队同时工作，实现不同的特性和功能是很简单的。加上像 Git 这样的版本控制系统，单体应用开发变得简单直接。


    ### 更易上手


    让新开发者加入一个使用单体架构的项目是很容易的。因为所有内容都统一在一个内聚的、单一的代码库中，新开发者很容易尽快上手并提高生产力。


    ### 简化测试


    由于所有内容都在一个单一的部署产物中，为任何给定单体应用的不同组件编写单元测试和集成测试通常更容易。


    ### 简化部署


    由于运行单体应用所需的一切都打包在一个单一的归档文件（WAR 或 EAR）中，部署相对简单：将生成的归档文件放入任何给定运行时的部署文件夹即可。


    ### 简化扩展


    由于部署模型更简单，所有内容都捆绑在一起，通过在不同服务器上运行多个副本，并使用负载均衡器将流量路由到这些副本，来扩展给定的单体应用相对简单。


    这些优点，以及其他一些因素，使得单体架构成为大多数企业的直接选择。可以以更可控的速度添加功能，可以扩展开发团队，并且应用本身可以轻松地通过新变更进行部署，所需工作量很小。


    ## 不断变化的开发格局


    然而，随着互联网连接设备的激增、软件消费从本地安装向云托管的普遍转变、像 Gmail 这样的 Web 应用的流行、第三方托管部署基础设施（例如 AWS）的兴起、REST
    架构的流行、API 生态系统的兴起、外包部署基础设施的成本日益降低、提供竞争性产品和服务的公司数量激增，以及世界日益互联，这些都意味着软件开发不能再像以前那样了。让我们粗略地看一下这些关键因素。


    ### 互联网连接设备的兴起


    从 21 世纪初开始，互联网的普遍流行以及互联网可访问性的普遍扩展，随之而来的是互联网连接设备的增加。像 BlackBerry 和 Nokia 这样的品牌开创了在手机上使用互联网的先河，而
    iPhone 的推出则极大地普及了“口袋里的互联网”这一概念。


    ### 软件消费的普遍转变


    互联网连接设备的兴起也标志着用户消费软件方式的改变。在计算的早期，软件被内置到计算机的硬件中。这种范式不断演变，直到连接设备兴起。互联网的天然特性意味着软件不一定非要安装在消费设备上才能使用。


    ### Web 应用的流行


    随着连接设备的兴起和软件消费模式的普遍转变，Web 应用也随之流行起来。像 Gmail 这样广受欢迎的应用开启了一个时代，Web 应用成为消费软件的默认方式。这一转变意义重大，因为它意味着企业需要转变其将软件交付给最终用户的方式。


    ### 第三方托管基础设施的兴起


    大约在上述几点发生的同时，第三方托管基础设施的兴起标志着成熟企业和初创企业应用开发的新时代。亚马逊云服务（AWS）的出现，以其提供的大规模云基础设施，意味着企业现在可以将创建、测试和持续部署应用所需的一切完全外包给外部服务提供商。因此，这必然导致了应用开发方式的转变。


    ### REST 架构的流行


    由 Roy Fielding 博士在其博士论文中首创的表述性状态转移架构^(⁵³)大约在这个时候开始流行起来。这种架构提出了一种方式，让应用可以通过可预测的接口（以端点的形式）来暴露和消费信息。


    ### API 生态系统的兴起


    API 生态系统也大约在这个时候开始蓬勃发展。在这个生态系统中，其他公司通过互联网以 API 的形式提供专业化服务，例如，一个用于管理货币汇率的 API 服务。企业现在可以将正交功能外包给专门从事该特定领域的第三方公司。所有这些都通过
    RESTful 端点来消费。


    ### 外包基础设施成本降低


    专门从事托管基础设施的公司的兴起意味着，将开发到部署所需的整个技术栈外包出去，通常比内部托管更便宜。

    '
- fmt: '### Boom in Competitive Firms


    The preceding listed factors all combined in one way or the other to give rise
    to the number of competitors in any given market. A larger pool of potential users,
    an almost equal level playing field for delivering software over the Internet,
    and relatively cheaper infrastructure hosting services all combined to create
    an even footing for more firms to enter into any given market.


    ## The Rise of Microservices


    The abovementioned points are all factors in one way or another that caused the
    software development industry to take another look at the way software was developed,
    tested, and deployed. Enterprises deployed their applications to servers that
    they principally owned and managed. Most had fully dedicated in-house teams that
    were responsible for managing the entire server stack needed for the full application
    development lifecycle. This meant that enterprises needed to concern themselves
    with procuring, installing, and managing server stacks for their applications.
    This proved quite expensive for smaller firms and startups.


    The advantages of the monolithic architecture also created other consequent challenges
    when a given application grew in size and complexity. A given application could
    grow so large and complex such that adding the most minute of change would require
    a lot of automated and manual tests to ensure there is no negative, unintended
    side effect. The simplest of changes also meant rerunning the entire application
    deployment pipeline. Because everything is in one bundle, the simplest of bugs
    could also bring down the entire application.


    As a result of varying combinations of all the factors mentioned so far, the software
    development industry started taking a look at another software development paradigm.
    This paradigm, called microservices, proposed a way of developing software that
    took all the preceding factors into consideration. This idea was inspired by the
    Unix philosophy of writing a full application by breaking it down into individually
    siloed units, all communicating through a well-established, predictable interface.


    The microservices paradigm proposes writing software by breaking it down into
    smaller services, where each service is responsible for a single function or feature
    of the overall application, with each service being independent of the other,
    and all services communicating over the HTTP protocol through RESTful endpoints.
    These services could be independently deployed and managed by orchestration services
    across a given cluster of servers. Also implicit in the microservices architecture
    is the fact that the application and the entire development process is carried
    out in the “cloud.”


    The microservices architecture became an instant hit, because it addressed a number
    of the pain points of very large monoliths. Among its advantages are as follows.


    ### Managing Complexity Through Decomposition


    Because each unit of the application is developed as a separate sub-application,
    it is relatively easier to manage the overall application development as it grows
    more complex.


    ### Easier to Maintain


    Because the overall application consists of individual, independent units, it
    is easy to add new features and fix bugs without the risk of breaking the entire
    application. Any problem in a given service is restricted to that service.


    ### Faster Development


    Because developers don’t need to have knowledge of the full application, it is
    relatively faster to develop using the microservices architecture because each
    development team will mostly need to know about the service they are working on.
    As a result, applications could be released faster.


    ### Scalability


    An application built through the microservices architecture can be scaled relatively
    easily because resources can be directed to scaling only those parts or services
    that need scaling.


    ### Resilience


    In a production environment, an application developed as a suite of microservices
    would not go down when one service goes down. It is also easier to build targeted
    resilience into services that are critical to the overall application.


    ### Easier Adoption of New Technologies


    The core feature of the microservices architecture of services exposing their
    features through RESTful interfaces means that the implementation of those features
    is completely separated from the client-facing interface. This means that individual
    services can adopt new technologies faster, only needing to deal with the implementation
    detail without necessarily affecting the client-facing interface.


    ## Cloud-Native Development


    Implicit in the microservices architecture is the concept of cloud-native application
    development. The Cloud Native Computing Foundation (CNCF) defines it as “Cloud
    native [are] technologies [that] empower organisations to build and run scalable
    applications in modern, dynamic environments such as public, private, and hybrid
    clouds. Containers, service meshes, microservices, immutable infrastructure, and
    declarative APIs exemplify this approach. These techniques enable loosely coupled
    systems that are resilient, manageable, and observable. Combined with robust automation,
    they allow engineers to make high-impact changes frequently and predictably with
    minimal toil.”


    The CNCF definition gives an overview of how modern software development is done.
    It aims at optimizing the entire development process to be as efficient as possible
    and to be able to deliver as much value to customers as possible. The cloud-native
    principles aim at helping enterprises manage the complexity of modern application
    development. In an era where any given application can be consumed by and through
    a myriad of devices and means, a set of adaptable patterns that increases the
    chances of a successful development process is needed.


    The idea behind cloud-native development is to be able to deliver resilient applications
    to customers faster and cheaper. As users demand more from applications, enterprises
    must find an efficient way of delivering value to users at reduced cost. Cloud-native
    development is a way for enterprises to realize an agile development process that
    results in resilient, healthy, secure, and reliable applications to users.


    Cloud-native applications rely on cloud service providers. As mentioned in the
    definition of the cloud native by the CNCF, there are three kinds of cloud services
    that an enterprise could make use of.


    ### Public Cloud


    A public cloud is a set of computing services that are managed by a third-party
    provider, with these services accessible via the Internet to different customers.
    A typical example is the general-purpose suite of compute services from Amazon
    Web Services (AWS).


    ### Private Cloud


    A private cloud refers to a set of computing services that are owned by a single
    enterprise, either managed by that enterprise in their own data center or by a
    third-party service provider for a fee. This was the dominant mode of application
    deployment before the popularity of cloud-hosted compute services. Enterprises
    would set up their own compute infrastructure, managed by in-house staff. There
    are now many third-party private cloud providers out there, such as AWS Virtual
    Private Cloud.


    ### Hybrid Cloud


    A hybrid cloud is a cross between a public and private cloud. It often provides
    much greater flexibility and options.


    ## The 12-Factor Application


    The 12-factor application is a widely accepted set of guidelines for developing
    cloud-native applications. It proposes factors that can help developers create
    applications that are highly optimized for cloud environments. These factors are
    as follows.'
