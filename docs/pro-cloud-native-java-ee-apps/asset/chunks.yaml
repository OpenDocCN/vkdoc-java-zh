  trans: '

    ### 单体架构的优势


    尽管微服务架构近年来兴起，但单体架构仍有其用武之地。因为与技术领域的所有事物一样，在某些情况下，它相对于微服务具有一些独特的优势。以下是单体架构的一些强项。


    #### 开发简单


    由于单体应用是一个单一单元的应用，因此开发起来通常要容易得多。所有部分都在同一个代码库中，开发、添加功能、重构和扩展应用都相对容易。新开发人员也容易上手项目，因为有一个单一的参考点。


    #### 测试更容易


    作为一个单一单元，为单体应用编写完整的端到端测试相对容易。由于应用的所有组成部分都在一个包中，编写自动化集成测试更加简单直接。


    #### 部署更容易


    由于整个应用被打包成一个单一的 WAR 文件，部署只需将此 WAR 文件放入运行时的部署文件夹即可。无论是打包成 Docker 容器还是使用传统的部署方法，部署一个单一的
    WAR 文件通常都很直接。


    #### 调试更容易


    调试单体应用相对容易，因为整个应用都在调试上下文中可用。跟踪执行流程到应用的不同部分以识别错误的源头，既简单又直接。


    #### 可复用性


    许多通用功能（如横切关注点）被反复开发和复用。由于所有内容都在一个地方，代码重复也更少。


    #### 易于添加新开发人员


    开发人员总是来来去去。单体架构允许新开发人员相对容易地加入应用开发团队。由于所有内容都在一个地方，熟悉代码库的认知负担较小。


    #### 应用演进更容易


    凭借统一的代码库和相对容易地引入新开发人员，单体应用通过添加新功能来演进是很容易的。


    #### 易于扩展


    水平扩展单体应用通常需要在不同的负载均衡器后面部署同一部署工件的多个副本。在这方面，当需要时，扩展既容易又便宜。


    ### 单体架构的挑战


    尽管单体架构拥有这些及其他优势，但它也带来了一些挑战，尤其是在应用复杂性增加时。以下是使用单体架构可能产生的一些挑战。


    #### 单点故障


    由于整个应用作为一个单一实例运行，一个组件中的问题可能导致整个应用宕机。例如，未关闭的文件读取器导致的内存溢出错误可能导致整个实例崩溃。


    #### 采用新技术缓慢


    由于整个应用是一个单一单元，采用新版本的库和 API 会慢得多，因为需要对每一个变更的影响评估进行仔细考量。这需要时间，并且可能代价高昂。


    #### 全面重新部署


    应用中的任何变更，无论大小，通常都需要重新部署整个工件。


    #### 复杂性增长


    在某个时刻，单体应用可能会变得过于庞大和复杂，以至于任何一个人都无法完全理解。这可能导致变更影响评估受损，从而产生可能未被完全理解的变更。


    ## 微服务


    ### 采用或迁移的考量


    尽管有其缺点，但单体架构在绝大多数应用中运行良好。与所有其他事物一样，在决定是否使用微服务架构时，始终需要考虑业务领域和上下文。以下是一些有助于确定是否需要使用微服务架构的指南。


    #### 应用洞察


    考虑微服务时，首要因素是当前运行的应用是否有足够的应用洞察。这可能包括对不同潜在瓶颈区域的详细了解、不同条件下的应用性能、哪些组件在特定时间段内导致了最多的故障，以及其他此类指标。这对于确定是否真的需要将应用拆分为不同的微服务非常重要。这些洞察将有助于了解应用应拆分为哪些组成微服务。它还有助于了解应用的哪个部分（如果有的话）需要独立于其他部分进行扩展。


    #### 技术知识的可用性


    需要考虑维护一组微服务所需的工程知识是否可用。由于每个微服务都是一个“迷你应用”，因此需要考虑是否有足够的工程知识来保持每个单元的运行。


    #### 新开发人员入职


    与单体应用不同，微服务应用将由不同的服务组成，每个服务都是一个独立的应用程序。需要考虑如何让新开发人员加入开发团队。如何让新加入者尽可能高效地工作，是一个值得考虑的问题。


    #### 部署成本


    与单体应用不同，微服务可能需要不同的部署服务器和平台。这需要从工程和财务角度进行考量，以确定相对于单体应用，任何边际部署成本是否值得。


    #### 牢记最终目标


    应理解微服务是达到目的的一种手段。这个目的可能因组织而异，但最终，它总是涉及使用应用程序为其用户提供某种形式的价值。因此，微服务只是实现这一目标的一种手段，不应成为焦点本身。除非使用微服务架构开发的边际收益超过其带来的好处，否则不应为了采用而采用。


    ### 迁移单体应用


    将单体应用迁移到微服务架构的过程是一个非常依赖领域的实践。然而，以下部分提供了一些通用指南，可以针对不同领域进行调整和定制。


    #### 单一职责原则


    每个微服务应负责应用的一个核心功能。每个服务的功能应能根据其名称和 REST 接口简单理解。由于每个微服务将通过 REST 端点暴露给其他模块，因此这些端点应能清晰地表明每个服务的功能。


    #### 围绕业务领域组织


    每个服务应围绕业务领域进行组织。例如，一个餐厅应用应分解为经营餐厅的不同核心方面——订单服务、计费服务、厨房服务等。各个服务的限界上下文应为业务领域。


    #### 为通用功能创建库


    常用的横切功能应抽象成一个库，打包成 JAR 文件，然后由需要这些功能的服务依赖。应通过抽象来最大限度地减少代码重复。

    '
- fmt: '#### Deployable Unit


    Each microservice should be a single deployable unit. Consequently, each service
    should be an application on its own, complete with its own suite of tests. Each
    service should have its own pipeline and CI/CD infrastructure. By deployable unit
    we mean each service should have its own build tool files (`pom.xml`, `build.gradle`
    files), ideally inheriting from a parent file that contains common libraries if
    applicable, and have its own runtime packaging files (`Containerfile`, `Dockerfile`,
    `docker-compose.yaml`, and a Kubernetes manifest descriptor). This is because
    each unit should be independently deployable as a container instance, manageable
    as a pod in a cluster.


    #### Communicate via REST


    All the services should be exposed for consumption through HTTP REST endpoints.
    Each application should separate the boundaries from the actual implementations
    of the REST endpoints. The client of each service should only know about the artifacts
    of the service exposed through the REST infrastructure of the service. No implementation
    detail should be exposed to consuming clients of a service. The default data exchange
    format should largely be based on JSON. Each REST resource should be secured,
    ideally through the MicroProfile JWT runtime.


    #### Separate Security Contexts


    Each service should have a separate security context. In Keycloak, each service
    should be a separate client in the application realm.^([^(121)](#fn121)) Each
    service should have its own set of roles and permissions.


    ### Sample Migrated Application


    With these and other guidelines, let us take a look at the wallet microservice
    of the project code for this book. The full application was originally a monolith
    that allows users to create a wallet of different currencies and get exchange
    rates for each wallet, with each transaction stored for each wallet.


    The wallet service handles a wallet and its transactions. The rate service handles
    the external call to the rate service using the MicroProfile REST Client. There
    are two external rate services configured, with one being a fallback service that
    should be automatically invoked should the primary service fail.


    This fallback feature is configured with the MicroProfile Fault Tolerance API.
    The account service layer handles the user account. It has a REST endpoint for
    creating accounts that will be invoked by a callback in Keycloak when a user creates
    an account. Breaking this application down in microservices, using the guidelines
    in the previous section, entails having at least three services – account, rate,
    and wallet.


    The wallet service is going to be the focal point of discussion for the migration.
    However, everything discussed about it pertains to the other two services. The
    root entry point is the `pom.xml` shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1).


    ```

    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.wallet

    war


    ${project.groupId}

    jwallet.core

    ${project.version}


    wallet


    Listing 14-1

    Wallet pom.xml

    ```


    The wallet service is one of three distinct microservices that showcase the breakdown
    of a monolith to constituent parts. The root pom file of the wallet service, as
    shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1), declares a parent
    pom file. This parent pom file that is partly shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1)
    declares all common dependencies for all microservices in the application. For
    instance, it declares the Jakarta EE and MicroProfile dependencies.


    The parent pom file is packaged as a Maven pom file that can be consumed or inherited
    by its children. The wallet root pom makes use of the parent to pull in the common
    dependencies. The use of the parent/child inheritance feature of the Maven build
    management tool allows us to keep the root pom file simple. Only a single dependency
    is declared here, which is to the core module.


    The core module allows us to abstract artifacts and functions that are common
    across all services into a single service. For instance, the `AbstractEntity`
    Jakarta Persistence parent entity class, the `AbstractEntityListener` class, and
    the CDI `@Action` stereotype are all declared in the core module. The abovementioned
    artifacts are all discussed in detail in their respective chapters. The wallet
    service is created as a single-unit Maven web application. As such, it has all
    the structures of a Maven project as shown in Figure [14-1](#531256_1_En_14_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_14_Chapter/531256_1_En_14_Fig1_HTML.jpg)


    A screenshot of a wallet service structure depicts 2 folders under the wallet.
    Dot m v n and s r c. Under s r c, are the folders main and test. The main contains
    4 subfolders.


    Figure 14-1


    Wallet service structure


    As a single-unit, packageable service, it has a `Dockerfile`, `docker-compose.yaml`
    file, and Kubernetes descriptor. The `Dockerfile` allows us to build this service
    as a Docker image that can be pushed to any Docker registry. Listing [14-2](#531256_1_En_14_Chapter.xhtml#PC2)
    shows the `Dockerfile`.


    ```

    FROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi

    COPY --chown=1001:0 src/main/liberty/config /config

    COPY --chown=1001:0 src/main/liberty/*.jar /opt/ol/wlp/usr/shared/resources/

    COPY --chown=1001:0 target/*.war /config/apps

    EXPOSE 3001

    RUN configure.sh

    CMD ["/opt/ol/wlp/bin/server", "debug", "defaultServer"]

    Listing 14-2

    Wallet service Dockerfile

    ```'
