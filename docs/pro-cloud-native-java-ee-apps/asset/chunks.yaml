- fmt: '# CDI Bean Types


    An injection point is any field or parameter that is expected to be instantiated
    by the CDI container. So, for instance, the `walletService` field annotated with
    `@Inject` as shown in Listing [4-4](#531256_1_En_4_Chapter.xhtml#PC4) is an injection
    point. The CDI container will inject a contextual instance of type `WalletService`
    into the variable `walletService`. But how will the CDI container be able to know
    the type to resolve a variable to for any given injection point? Obviously, we
    will need a way to tell the runtime the types of our CDI beans so it can correctly
    resolve each injectable field to its type.


    Technically, a CDI bean is any Java class that implements the `jakarta.enterprise.inject.spi.Bean<T>`^([^(90)](#fn90))
    interface. This interface represents a bean and defines everything the CDI container
    needs to manage instances of the bean. The `Bean` interface itself extends the
    `jakarta.enterprise.inject.spi.BeanAttributes<T>`^([^(91)](#fn91)) interface.
    This interface contains the following methods:


    * `getName()` – Get the EL name of a bean if `@Named` annotation has been used
    on the bean

    * `getQualifiers()` – Get the set of qualifiers of the bean

    * `getTypes()` – Get a set of bean types of the bean

    * `getScope()` – Get the scope of the bean

    * `getStereotypes()` – Get the set of stereotypes of the bean

    * `isAlternative()` – Boolean method that determines if the bean is an alternative
    or not


    These methods return relevant information that helps the CDI container resolve
    injection points to the right bean types. In addition, the `Bean` interface also
    contains the `create()` and `destroy()` methods which are called by the container
    to respectively create and destroy instances of a bean. In practice, you will
    not need to explicitly implement the `Bean` interface. CDI implementations can
    generate `Bean<T>` interface implementations from your beans on your behalf. Through
    implementation of the `Bean<T>` interface for your beans, the CDI container can
    resolve a bean type through its type, a combination of type and qualifiers, and
    by name (in expression language).


    ## Resolution by Type


    The type of any CDI bean is all superclasses of that bean up to `java.lang.Object`,
    all implemented interfaces, either directly or indirectly, and the class itself.
    Our `WalletService` bean, as an example, will have its types be `java.lang.Object`
    and `WalletService` because it doesn’t have any superclasses other than `Object`
    nor implements any interfaces. The `WalletResourceImpl` however (Listing [4-4](#531256_1_En_4_Chapter.xhtml#PC4))
    has three types: it is an `Object`, a `WalletResource`, and `WalletResourceImpl`.


    ## Resolution by Name and Qualifier


    Qualifiers in CDI are a way to label or qualify CDI components to further identify
    them to the CDI container. The `WalletResourceImpl.java` class as shown in Listing
    [4-4](#531256_1_En_4_Chapter.xhtml#PC4) implements the `WalletResource` interface.
    This means that we can have an injection point of type `WalletResource` as shown
    in Listing [4-5](#531256_1_En_4_Chapter.xhtml#PC5).


    ```

    public class HelloResourceImpl implements HelloResource {

    @Inject

    WalletResource walletResource;

    }

    Listing 4-5

    showing injecting into a field by interface type

    ```


    Listing [4-5](#531256_1_En_4_Chapter.xhtml#PC5) shows `HelloResourceImpl` declaring
    a dependency on `WalletResource` in the variable `walletResource`. `WalletResource`
    is an interface that is implemented by `WalletResourceImpl`. As interfaces can
    be implemented by more than one class, the injection point `walletResource` as
    declared in Listing [4-5](#531256_1_En_4_Chapter.xhtml#PC5) would need to be qualified,
    because the CDI container will not know at runtime which `WalletResource` implementation
    to inject into any given injection point of type `WalletResource`. We will come
    back to this when we talk about CDI Qualifiers in a bit.


    ## Resolution by Name


    The two previous bean resolution mechanisms, namely, resolution by type and by
    type and qualifier, are typesafe. The third way of resolving beans is by name.
    You can access instances of a given bean in string-based environments like the
    Jakarta EE platform’s Expression Language.^([^(92)](#fn92)) A bean can be resolved
    when accessed in EL by annotating it with the built-in qualifier `@Named`. Listing
    [4-6](#531256_1_En_4_Chapter.xhtml#PC6) shows the `WalletService` annotated with
    `@Named`.


    ```

    @Named

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    Listing 4-6

    showing the use of @Named to resolve the bean in EL

    ```


    Listing [4-6](#531256_1_En_4_Chapter.xhtml#PC6) shows the `WalletService` annotated
    with the `@Named` qualifier. With that qualifier in place, the `WalletService`
    can be accessed through an EL expression. By default, the `WalletService` can
    be accessed through the automatically available variable `walletService` in an
    EL expression like this: `#{walletService.someMethod()}`. When accessed this way,
    the CDI container will take care of creating an instance and injecting it into
    the variable.


    No matter what mechanism is used to resolve a bean instance, the CDI container
    will always create the right instance for the given field type. The technical
    term for the instances of beans created by the CDI container for satisfying injection
    points is contextual instances, which brings us to the question: What is a contextual
    instance?


    # CDI Beans and Contextual Instances


    In the previous section, we saw that a bean is a Java class that optionally has
    CDI metadata associated with it and can be used to satisfy injection points. A
    bean, then, is a source of instances used to satisfy dependency requests in your
    application. The instances of your bean created by the CDI container to satisfy
    injection points are technically called contextual instances.


    The `Bean<T>` interface that we saw in the previous section also extends the `Contextual<T>`
    interface. The `Contextual<T>`^([^(93)](#fn93)) interface is where the `Bean<T>`
    interface inherits the `create` and `destroy` methods from. Instances created
    from any bean implementing the `Bean<T>` interface are called contextual types.
    Since CDI runtimes generally create implementations of the `Bean<T>` interface
    on your behalf, you end up with contextual instances injected into your injection
    points.


    When you make a request for bean instances from the CDI container via the use
    of the `@Inject` annotation on an injection point, the container must ensure that
    the contextual instance returned to you is associated with the right scope. Bean
    instances are always associated with a scope. You can explicitly define which
    scope a bean should be associated with. If you do not explicitly define one for
    a given bean, the container will associate contextual instances of that bean with
    a default scope.'
  raw: '#### CDI Bean Types


    An injection point is any field or parameter that is expected to be instantiated
    by the CDI container. So, for instance, the walletService field annotated with
    @Inject as shown in Listing [4-4](#531256_1_En_4_Chapter.xhtml#PC4) is an injection
    point. The CDI container will inject a contextual instance of type WalletService
    into the variable walletService . But how will the CDI container be able to know
    the type to resolve a variable to for any given injection point? Obviously, we
    will need a way to tell the runtime the types of our CDI beans so it can correctly
    resolve each injectable field to its type.


    Technically, a CDI bean is any Java class that implements the jakarta.enterprise.inject.spi.Bean<T>^([^(90)](#fn90))
    interface. This interface represents a bean and defines everything the CDI container
    needs to manage instances of the bean. The Bean interface itself extends the jakarta.enterprise.inject.spi.BeanAttributes<T>^([^(91)](#fn91))
    interface. This interface contains the following methods :


    *   getName() – Get the EL name of a bean if @Named annotation has been used on
    the bean


    *   getQualifiers() – Get the set of qualifiers of the bean


    *   getTypes() – Get a set of bean types of the bean


    *   getScope() – Get the scope of the bean


    *   getStereotypes() – Get the set of stereotypes of the bean


    *   isAlternative() – Boolean method that determines if the bean is an alternative
    or not


    These methods return relevant information that helps the CDI container resolve
    injection points to the right bean types. In addition, the Bean interface also
    contains the create() and destroy() methods which are called by the container
    to respectively create and destroy instances of a bean. In practice, you will
    not need to explicitly implement the Bean interface. CDI implementations can generate
    Bean<T> interface implementations from your beans on your behalf. Through implementation
    of the Bean<T> interface for your beans, the CDI container can resolve a bean
    type through its type, a combination of type and qualifiers, and by name (in expression
    language).


    ##### Resolution by Type


    The type of any CDI bean is all superclasses of that bean up to java.lang.Object,
    all implemented interfaces, either directly or indirectly, and the class itself.
    Our WalletService bean, as an example, will have its types be java.lang.Object
    and WalletService because it doesn’t have any superclasses other than Object nor
    implements any interfaces. The WalletResourceImpl however (Listing [4-4](#531256_1_En_4_Chapter.xhtml#PC4))
    has three types: it is an Object, a WalletResource, and WalletResourceImpl.


    ##### Resolution by Name and Qualifier


