  raw: '### Fallback


    The @Fallback interceptor binding is a method-level annotation that tells the
    runtime to fall back on a designated method if the annotated method throws an
    exception. The type of exception that triggers the fallback can be customized.
    Specific exceptions can also be set to be skipped when thrown, that is, those
    methods will not trigger the runtime to invoke the fallback method. Listing [8-1](#531256_1_En_8_Chapter.xhtml#PC1)
    shows the RateService bean with two methods: calculateAmount and calculateAmountFallback.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(fallbackMethod = "calculateAmountFallback")

    public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
    wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    public BigDecimal calculateAmountFallback(TransactionRequest transactionsRequest,
    Wallet wallet) {

    return transactionsRequest.getAmount();

    }

    }

    Listing 8-1

    The RateService bean with a fallback method

    ```


    Listing [8-1](#531256_1_En_8_Chapter.xhtml#PC1) shows the RateService application–scoped
    bean. It has two methods. The first one, calculateAmount, has the @Fallback annotation.
    This annotation has the parameter fallbackMethod set to the name of the second
    method, calculateAmountFallback. At runtime, by default, any exception that is
    a subclass of java.lang.Throwable thrown will cause the runtime to invoke the
    fallback method. The fallback method must have the same method signature as the
    one it’s acting as a fallback for.


    The @Fallback annotation can also be passed a class instead of using the fallbackMethod
    parameter. The passed class must be an implementation of the org.eclipse.microprofile.faulttolerance.FallbackHandler<T>
    interface. This interface takes the type of the return type of the method for
    which it is acting as a fallback. Listing [8-2](#531256_1_En_8_Chapter.xhtml#PC2)
    shows a FallbackHandler implementation in the RateCalcFallback class.


    ```

    public class RateCalcFallback implements FallbackHandler {

    @Override

    public BigDecimal handle(final ExecutionContext context) {

    final TransactionRequest transactionRequest = (TransactionRequest) context.getParameters()[0];

    return transactionRequest.getAmount();

    }

    }

    Listing 8-2

    showing the RateCalcFallback handler class

    ```


    Listing [8-2](#531256_1_En_8_Chapter.xhtml#PC2) shows the RateCalcFallback class
    implementing the FallbackHandler interface. This class takes a BigDecimal value
    , which is the return type of the method it is acting as a fallback for. The interface
    has a single method named handle that gets passed an org.eclipse.microprofile.faulttolerance.ExecutionContext
    type. This object contains metadata about the failed method for which the fallback
    is kicking in.


    As shown in Listing [8-2](#531256_1_En_8_Chapter.xhtml#PC2), the handle method
    implementation calls the getParameters method on the passed ExecutionContext object
    to get the method’s parameters, pick the first one, and return a default value.
    Listing [8-3](#531256_1_En_8_Chapter.xhtml#PC3) shows the RateService bean again,
    but this time using the RateCalcFallback handler instead of a method in the class
    itself .


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(RateCalcFallback.class)

    public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
    wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    }

    Listing 8-3

    shows the RateCalcService using the RateCalcHandler fallback handler

    ```


    Listing [8-3](#531256_1_En_8_Chapter.xhtml#PC3) shows the RateService’s calculate
    method using the RateCalcFallback class as the fallback instead of a method. At
    runtime, a noncontextual instance of the RateCalcFallback will be automatically
    created if an exception gets thrown. The @Fallback annotation has two other parameters,
    namely, applyOn and skipOn.


    applyOn takes an array of exceptions that should trigger the fallback mechanism.
    When a value is specified for this parameter, then only the passed exception types,
    when thrown, will cause the fallback method to be invoked. Leaving this out is
    equal to passing in Throwable.class.


    The skipOn parameter also takes an array of exceptions, but these exceptions,
    when thrown, will cause the fallback method to be skipped. You can use this parameter
    to prevent the fallback method being called when the target method throws a business
    exception, for example, a custom validation exception.'
  trans: '

    ### 回退机制


    `@Fallback` 拦截器绑定是一个方法级别的注解，它告知运行时环境：当被注解的方法抛出异常时，应回退到指定的方法。触发回退的异常类型可以自定义。也可以设置在抛出特定异常时跳过回退，即这些异常不会触发运行时调用回退方法。清单
    8-1 展示了包含两个方法（`calculateAmount` 和 `calculateAmountFallback`）的 `RateService` Bean。


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(fallbackMethod = "calculateAmountFallback")

    public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
    wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    public BigDecimal calculateAmountFallback(TransactionRequest transactionsRequest,
    Wallet wallet) {

    return transactionsRequest.getAmount();

    }

    }

    清单 8-1

    包含回退方法的 RateService Bean

    ```


    清单 8-1 展示了 `RateService` 这个应用作用域的 Bean。它包含两个方法。第一个方法 `calculateAmount` 带有 `@Fallback`
    注解。该注解的参数 `fallbackMethod` 被设置为第二个方法的名字 `calculateAmountFallback`。在运行时，默认情况下，任何属于
    `java.lang.Throwable` 子类的异常被抛出时，都会导致运行时调用回退方法。回退方法必须与它所回退的方法具有相同的方法签名。


    `@Fallback` 注解也可以传入一个类，而不是使用 `fallbackMethod` 参数。传入的类必须是 `org.eclipse.microprofile.faulttolerance.FallbackHandler<T>`
    接口的实现。该接口的类型参数是它所回退的方法的返回类型。清单 8-2 展示了 `RateCalcFallback` 类中的 `FallbackHandler`
    实现。


    ```

    public class RateCalcFallback implements FallbackHandler {

    @Override

    public BigDecimal handle(final ExecutionContext context) {

    final TransactionRequest transactionRequest = (TransactionRequest) context.getParameters()[0];

    return transactionRequest.getAmount();

    }

    }

    清单 8-2

    展示 RateCalcFallback 处理器类

    ```


    清单 8-2 展示了实现 `FallbackHandler` 接口的 `RateCalcFallback` 类。该类接受一个 `BigDecimal` 类型参数，这是它所回退的方法的返回类型。该接口有一个名为
    `handle` 的单一方法，该方法接收一个 `org.eclipse.microprofile.faulttolerance.ExecutionContext`
    类型的参数。这个对象包含了关于触发回退的失败方法的元数据。


    如清单 8-2 所示，`handle` 方法的实现调用了传入的 `ExecutionContext` 对象的 `getParameters` 方法来获取方法的参数，选取第一个参数，并返回一个默认值。清单
    8-3 再次展示了 `RateService` Bean，但这次使用的是 `RateCalcFallback` 处理器，而不是类自身的方法。


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(RateCalcFallback.class)

    public BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet
    wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    }

    清单 8-3

    展示使用 RateCalcHandler 回退处理器的 RateCalcService

    ```


    清单 8-3 展示了 `RateService` 的 `calculate` 方法使用 `RateCalcFallback` 类作为回退，而不是一个方法。在运行时，如果抛出异常，将自动创建一个非上下文实例的
    `RateCalcFallback`。`@Fallback` 注解还有另外两个参数，即 `applyOn` 和 `skipOn`。


    `applyOn` 接受一个异常数组，这些异常应触发回退机制。当为此参数指定一个值时，只有传入的异常类型被抛出时，才会导致回退方法被调用。省略此参数等同于传入
    `Throwable.class`。


    `skipOn` 参数也接受一个异常数组，但当这些异常被抛出时，会导致跳过回退方法。你可以使用此参数来防止当目标方法抛出业务异常（例如，自定义的验证异常）时调用回退方法。

