- fmt: '# Enterprise Applications – What Are They?


    An enterprise software application can be defined as a nontrivial, relatively
    complex, multitier application developed by an organization to solve a specific
    problem for a given target market. Different types of organizations have different
    expectations from the provision of any given enterprise application to a market.
    A for-profit enterprise would expect revenue in return; a nonprofit would expect
    some form of advancement of some ideology. Whatever the organization and type
    of software provided, all enterprise applications do have some common traits that
    make them nontrivial to develop.


    A typical application would have three tiers – the user interface, the middle
    layer, and the data storage. The UI is where the end users actually interact with
    the application. The middle layer is the "orchestration" part that handles interactions
    between the UI and the data warehouse. The data warehouse refers to the database
    management system used to store application-generated data into a permanent storage
    mechanism. Whether an application is a monolith or microservice, these tiers generally
    run through the full application.


    The UI could be a traditional HTML page, for applications developed for human
    interaction. Or it could be RESTful endpoints, for applications designed for other
    applications to consume. The term "user interface" has evolved to include the
    point at which final clients of a given application interact with that application.
    The middle or service layer typically contains artifacts that handle security,
    data warehouse transactions, and interactions with other services (internally
    and/or externally), among others.


    From an engineering perspective, all nontrivial applications need certain core
    functionalities from the platform on which they are developed. The extent to which
    a platform will provide any of the functions enumerated as follows depends on
    maintainers, community, and target market of the platform. However, these functions
    can generally be expected to be available in any platform geared at developing
    enterprise applications.


    ## Dependency Management


    Whether an application is a monolith or a collection of microservices, each component
    of the application will have dependencies that need to be managed. For a nontrivial
    application, a given component would have dependencies on other components, which
    would in turn have other dependencies on yet other components. The chosen software
    development platform should provide a mechanism for automating this kind of complex
    dependency management. For the Jakarta EE platform, the Jakarta Contexts and Dependency
    Injection API is the primary way of managing application dependency. CDI not only
    helps you automate dependency management, it also provides other add-on functionality
    that helps you create loosely coupled, extensible, and maintainable applications.


    ## RESTful Web Service


    Modern enterprise applications are generally exposed as a set of RESTful web services
    to be consumed by clients. The primary client could be a purely JavaScript application
    that is part of the microservices of the overall application. Other clients could
    be third-party applications. Whatever the application development paradigm, the
    development platform should have a solid API for developing modern RESTful services.
    For Jakarta EE, the Jakarta RESTful Web Services API is the standard API for developing
    REST web services on the platform.


    ## Data Persistence


    Every application will generate and store data in one way or the other. The generated
    data could be from the application itself or retrieved from some external service.
    It could yet be user-created data. However the data gets created, almost all enterprise
    applications will have a need to store such data into a durable data store. The
    database management system could be a traditional RDBMS database or a NoSQL data
    store. The development platform must provide API constructs for the creation,
    reading, updating, and deletion of such data. It should also have some form of
    transaction management built into such API constructs. For the Jakarta EE platform,
    the Jakarta Persistence API provides the needed API constructs for transforming
    and mapping Java objects into RDBMS database table records, persisting, retrieving,
    updating, and deleting those records.


    ## Ancillary Cloud Features


    These are the three core, traditional functionalities that cut across the majority
    of enterprise applications. In addition to these core platform functions, a modern,
    cloud-native application also needs some ancillary functionalities to allow it
    to be deployed and automatically managed on cloud environments. The most popular
    of these cloud-native ancillary features are outlined in the following sections.


    ### Health Check


    For a cloud-native application deployed to and managed by an orchestration tool
    like Kubernetes, an application needs to be able to answer two simple questions:
    Are you live? If yes, are you ready to accept requests? The responses to these
    questions will determine if the orchestration tool routes requests to the application
    instance or not. The Eclipse MicroProfile project provides the Health Check API
    for creating readiness and liveness endpoints that can be queried for responses
    to the abovementioned questions.


    ### Fault Tolerance


    Every application will fail at some point. A cloud-native application should be
    able to recover from any such failure gracefully. The Eclipse MicroProfile Fault
    Tolerance API provides all the constructs needed to develop such fault-tolerant
    cloud-native applications.


    ### Configuration


    A cloud-native application should have its configuration externalized such that
    the configuration values can be changed and targeted at different environments
    without having to change the application code. The Eclipse MicroProfile Config
    API provides the API for managing application configuration.


    ### Metrics


    Application metrics provide insight into the state of an application. Cloud-native
    applications should be able to generate meaningful metrics that can be collected
    and analyzed in order to take any corrective measures if necessary. The Metrics
    API of the Eclipse MicroProfile provides a set of APIs for generating application
    metrics available at predictable endpoints.


    # Introduction to JWallet


    The case study application for this book is called JWallet, a cloud-native microservices
    financial application for storing and carrying out transactions on money, built
    on the Jakarta EE platform that showcases the various APIs and how to use them
    together. In this chapter, we are going to take an overall tour of the application
    within the context of the core and ancillary functionalities discussed to this
    point in the chapter. Subsequent chapters will then go into detail for each API.


    ## JWallet – Setup


    The Apache Maven^([^(63)](#fn63)) dependency resolution and build management system
    is the most popular dependency and build management tool for developing Jakarta
    EE applications. JWallet is set up as a multimodule Maven application, with three
    microservices (account, wallet, and rate) and one general-purpose module (core),
    as shown in Figure [3-1](#531256_1_En_3_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig1_HTML.jpg)


    A screenshot depicts the JWallet setup project, which contains an account, wallet,
    and rate that belong to the microservice and the core is a general purpose module.


    Figure 3-1


    JWallet project structure'
