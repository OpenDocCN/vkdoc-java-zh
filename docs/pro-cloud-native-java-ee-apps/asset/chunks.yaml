    ### 持久化单元


    持久化单元是一组共享相同配置的实体的逻辑分组。该配置包括数据源和其他持久化属性，例如模式创建。数据源简单来说就是 JPA 可以使用的数据库连接。持久化单元声明了数据源和事务类型，以及属于该持久化单元的一组实体。


    在 Jakarta EE 中，数据源是一种受管理的资源，通常作为服务器的一部分进行定义，并通过 JNDI 资源传递给持久化单元。如果启用了模式生成，那么用于创建数据源的数据库用户应具备在数据库中创建表所需的权限。清单
    5-28 展示了 jwallet 应用程序账户模块的持久化单元声明。


    ```


    jdbc/jwallet


    清单 5-28

    展示了一个示例持久化单元

    ```


    该持久化单元名为 jwallet，并将事务类型声明为 JTA。声明的数据源在应用服务器中创建。这是 JPA 的灵活性之一。底层数据库可以位于世界任何地方；只要存在一个有效的、JPA
    可以连接的数据源，它就能正常工作。声明的属性告诉运行时在应用程序启动时创建数据库表。


    该属性可以配置为不执行任何操作、删除并创建表、创建或删除表。还有一些属性可用于在应用程序启动时加载 SQL 脚本来填充数据库。按原样，持久化单元并未显式添加任何实体。这意味着模块中找到的所有实体都将绑定到此持久化单元。此文件放置在应用程序的
    `resource/META-INF` 文件夹中。


    ### 持久化上下文


    持久化上下文类似于持久化单元的一个实例。它是属于给定持久化单元的一组受管理的实体实例。持久化上下文类似于一个巨大的缓存，其中包含了所有绑定到创建该持久化上下文的持久化单元的实体。持久化上下文对于理解
    JPA 如何持久化和加载数据至关重要。我们稍后在讨论实体管理器时会对此进行介绍。


    ### 事务


    在 `EntityManager` 上调用的、会改变实体状态或数据库中实体集合的方法需要事务。在 Jakarta EE 中，事务由应用服务器代您管理。您通常无需担心事务边界。容器会自动开启或加入一个事务，并在操作结束时提交它。


    ### 实体管理器


    `EntityManager` 是一个接口，包含用于对 JPA 实体执行创建、读取、更新和删除操作的方法。它是 Jakarta EE 中的一个受管理对象，这意味着您不会显式创建它。相反，您向
    JPA 运行时请求一个实例，它会为您注入一个。只要您为其提供了生产者，就可以利用 CDI 运行时来注入 `EntityManager` 对象。此构造在前一章关于
    Jakarta 上下文和依赖注入的内容中讨论过。


    请求一个 `EntityManager` 实例需要您告诉 JPA 运行时将给定的 `EntityManager` 关联到哪个持久化单元。返回的实例随后绑定到该持久化单元，并从中创建一个持久化上下文。这个持久化上下文就是
    `EntityManager` 用来管理绑定到该持久化单元的实体的 CRUD 操作的工具。


    ### 持久化实体


    #### 注入 EntityManager


    要持久化一个实体，我们首先需要获取一个 `EntityManager` 实例。清单 5-29 展示了 `BaseRepository` 类注入一个由数据库限定的
    `EntityManager`（有关此构造的详细信息，请参阅第 4 章）。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    }

    清单 5-29

    展示注入的 EntityManager

    ```


    `@Inject` 注解是一个用于请求上下文实例的 CDI 注解。存在一个地方可以“生产”`EntityManager` 实例，如清单 5-30 所示。


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet")

    EntityManager postgres;

    }

    清单 5-30

    展示 EntityManager 的生产过程

    ```


    `@PersistenceContext` 注解是一个用于请求 `EntityManager` 的 JPA 构造。`postgres` 字段将由 JPA 运行时填充一个作用域为该持久化单元的
    `EntityManager` 实例。注入是在 Jakarta EE 平台上获取 `EntityManager` 实例的推荐方式。


    #### 持久化数据


    一旦您拥有了实体管理器实例，就可以调用其方法来持久化数据。`EntityManager#persist` 方法是持久化实体实例的主要方式。它接受一个实体实例并将其持久化到数据库中。清单
    5-31 展示了 `BaseRepository` 中用于持久化实体的 `save` 方法。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E save(E entity) {

    em.persist(entity);

    return entity;

    }

    }

    清单 5-31

    展示 BaseRepository

    ```


    `BaseRepository` 是一个泛型类，它接受一个实体类型及其对应的主键类型。它包含通用的 CRUD 方法，以避免为所有实体重复相同的代码。`em.persist`
    调用将导致实体管理器将传入的实体实例放入持久化上下文。为简单起见，持久化上下文在事务方法启动时创建。请记住，持久化上下文类似于持久化单元的一个实例。`UserRepository`
    继承了 `BaseRepository`，如清单 5-32 所示。


    ```

    public class UserRepository extends BaseRepository {

    public UserRepository() {

    super(User.class);

    }

    }

    清单 5-32

    展示 UserRepository

    ```


    然后，`UserRepository` 被注入到 `UserService` 中，用于持久化用户。该类的 `createUser` 方法接受一个 `CreateUserRequest`
    并委托给 `userRepository`，如清单 5-33 所示。


    ```

    @Action

    public class UserService implements UserFacade {

    @Inject

    UserRepository userRepository;

    @Override

    public UserResponse createUser(final CreateUserRequest                 createUserRequest)
    {

    User user = fromUserWrapper(createUserRequest);

    user = userRepository.save(user);

    UserResponse userResponse = getUser(user.getId());

    return userResponse;

    }

    }

    清单 5-33

    展示 UserService 持久化用户

    ```


    `UserService` 使用 `@Action` 原型来声明一个请求作用域的事务性 Bean。有关 CDI 的详细讨论，请参阅第 4 章。`@Transactional`
    注解是一个 CDI 拦截器，它将导致为在 `UserService` 上调用的每个方法创建一个事务。当在 `userRepository` 上下文对象上调用
    `save` 方法时，实体管理器会将传入的实体持久化到方法执行开始时创建的持久化上下文中。


    此时，实体实例的主键字段将被设置，但该实例仍然不在数据库中。持久化上下文包含该实例以及所有其他通过实体管理器方法调用对其执行了任何操作的实例。当方法成功返回时，容器将自动提交事务，正是在此时，持久化上下文会被刷新到数据库中。

