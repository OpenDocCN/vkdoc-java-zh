    该应用程序在 POM 文件的 `build` 元素中声明了三个插件，如清单 3-5 所示。第一个是 OpenLiberty^(⁷⁰) Maven 插件。OpenLiberty
    是 IBM 提供的一个开源 Jakarta EE 兼容实现。它是你可以选择用来运行 Jakarta EE 应用程序的众多可用实现之一。这个插件允许我们通过
    Maven 运行应用程序，而无需手动设置服务器。另外两个插件分别是用于打包的 Maven war^(⁷¹) 插件和用于运行集成测试的 Maven failsafe
    插件^(⁷²)。由于这些依赖项是在基础 POM 文件中声明的，因此它们对 `modules` 元素中声明的所有模块都可用。


    ```


