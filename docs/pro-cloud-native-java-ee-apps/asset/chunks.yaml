    # 11. 使用 JWT 的安全性


    安全性是应用程序开发最重要的方面之一。安全性方面有太多东西可能迅速出错。作为一个快速发展的领域，新的威胁、漏洞利用和入侵事件层出不穷。从最大的面向公众的应用程序到最小的应用程序，每个应用程序都面临安全漏洞的风险。


    应用程序安全是一个复杂的领域，应由安全专家处理。本章讨论如何使用 Eclipse MicroProfile JWT Propagation API 来保护
    RESTful Web 服务。本章**不是**关于安全性的“如何做”。而是关于在安全性已就位的情况下，本章的目标是展示如何使用 MicroProfile JWT
    API 来利用安全基础设施保护 REST 资源。


    作为应用程序开发者，我们（作者）将整个流程的管理委托给安全专家。因此，本章使用 Keycloak^(¹¹⁵) 作为安全框架，MicroProfile JWT
    可用于保护 REST 客户端。Keycloak 是一个开源的身份和访问管理（IAM）框架。它提供用户联合、强身份验证、用户管理、细粒度授权等功能。本章将创建用户的过程委托给
    Keycloak，并专注于使用 JWT 来保护 Web 资源。

