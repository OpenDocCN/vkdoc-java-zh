    ### 映射大对象


    通常，应用程序需要将基于字节的对象映射到数据库。这些对象可能很大，具体取决于其类型。大对象（也称为 LOB）需要单独的 JDBC 调用来从数据库加载到 Java
    中。因此，当用作字段类型时，我们需要通知运行时使用这些特殊调用。通知运行时关于 LOB 的方式是在大对象字段上使用 `@Lob` 注解。


    可以映射到数据库的大对象有两种类型。它们是大型字符对象（CLOB），在 Java 中表示为 `char[]` 或 `Character[]`，长字符串对象会映射到数据库中的
    CLOB 列类型。二进制大对象（BLOB），在 Java 中由 `byte[]`、`Byte[]` 和 `Serializable` 类型表示，会映射到数据库的
    BLOB 列。清单 5-13 展示了包含一个用于存储账户持有人照片的 BLOB 字段的 User 实体。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    }

    清单 5-13

    展示了包含 BLOB 字段的 User 实体

    ```


    清单 5-13 展示了使用 `@Lob` 注解的 `byte[]` 类型的 `picture` 字段。该字段将映射到底层数据库的二进制大对象类型。


    ### 简单字段类型


    `picture` 字段上的 `@Basic` 注解明确将该字段标记为基本类型或简单类型。在 JPA 术语中，User 实体中的所有字段都被称为简单类型。简单字段是可以直接映射到单个数据库列的字段。`@Basic`
    注解用于表示简单字段类型。但是，除了 `picture` 字段之外，User 实体中的所有字段都可以完全省略该注解。


    #### 懒加载


    当从 User 实体映射到的表中加载一行数据时，所有映射到简单类型的列都会被加载。默认情况下，当从数据库加载一个实体实例时，该实体中的简单类型会被加载或获取。然而，有时获取简单类型的效率并不高。


    以 User 实体为例，我们确实不希望每次加载实例时都获取用户的照片。为了通知运行时默认不获取二进制字段，可以将 `FetchType.LAZY` 类型传递给
    `@Basic` 字段的 `fetch` 参数。

