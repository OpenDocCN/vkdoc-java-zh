    # Taking a Pulse with Health Check


    Applications packaged as container images and deployed to the cloud are mostly
    managed by automated scheduling and deployment systems like Kubernetes. These
    systems will kill unhealthy containers, spawn new ones, and route requests to
    the requisite containers, all automatically. To help achieve these, the deployment
    manager will need to be able to probe the application instance for some health-related
    information.


    A kubelet (the Kubernetes “agent”) will probe a container to check if it’s live
    and ready to accept requests. The response will determine if traffic gets routed
    to that deployed container instance or it gets killed and replaced with a healthy
    one. Cloud-native applications therefore should be able to answer three simple
    questions in a cloud environment:


    - Have you started?

    - Are you live?

    - Are you ready to accept requests?


    The Eclipse MicroProfile Health specification provides the API constructs for
    adding machine-to-machine health checks to applications so they can answer these
    questions. This specification is similar and compatible with existing such specifications
    like the Kubernetes^([^(114)](#fn114)) Liveness, Readiness, and Startup Probes.
    This chapter discusses the Health API and how to add it to your application.


    ## Health vs. Metrics


    The Health and Metrics APIs are both APIs that generate application performance
    information. However, the similarity between both ends there. The Health API is
    primarily designed to generate machine-to-machine–level information. In a typical
    cloud cluster where everything about application deployment is automated, the
    Health API provides the construct for enabling an application to respond to simple
    machine queries about its status and readiness to accept requests.


    The Metrics API (discussed in Chapter [9](#531256_1_En_9_Chapter.xhtml)), on the
    other hand, is designed primarily for generating detailed application performance
    data. For instance, the Metrics API can be used to query how long a given method
    takes to execute, what the maximum number of concurrent connections to the method
    is, what the mean response time is, and other such detailed, fine-grained information.
    These two APIs complement each other in the design of modern cloud-native applications.


    ## Health API Structure


    The Health API revolves around two types: the `HealthCheck` interface and the
    `HealthCheckResponse` class. All health check procedures can be queried from the
    `/health` context path. An HTTP GET request to this path returns call health checks
    in that particular application in the JSON format. Successful health check probes
    will return the HTTP 200 status code. A failed health check will return HTTP status
    code 503. In this case, the application implementation of the `HealthCheck` returns
    a DOWN status.


    ### The HealthCheck Interface


    The `HealthCheck` interface is a functional interface with the single method `call()`
    that returns a `HealthCheckResponse`. This interface is the entry point to the
    Health API. A class that wants to respond to health check probes will extend the
    `HealthCheck` interface, implementing the `call()` method in an application-specific
    way, eventually returning a `HealthCheckResponse`.'
