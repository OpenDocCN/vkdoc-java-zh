- fmt: "### Fallback\n\n`@Fallback`拦截器绑定是一个方法级注解，它告知运行时在注解方法抛出异常时回退到指定方法。触发回退的异常类型可以自定义。也可以设置在抛出时跳过特定异常，即这些异常不会触发运行时调用回退方法。清单[8-1](#531256_1_En_8_Chapter.xhtml#PC1)展示了包含两个方法（`calculateAmount`和`calculateAmountFallback`）的`RateService`Bean。\n\
    \n```java\n@ApplicationScoped\npublic class RateService {\n    @Inject\n    @RestClient\n\
    \    RateResource rateResource;\n\n    @Fallback(fallbackMethod = \"calculateAmountFallback\"\
    )\n    public BigDecimal calculateAmount(TransactionRequest transactionsRequest,\
    \ Wallet wallet) {\n        ConvertCurrencyRequest convertCurrencyRequest = new\
    \ ConvertCurrencyRequest();\n        convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());\n\
