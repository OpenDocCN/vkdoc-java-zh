- fmt: "### Transaction Rollback\n\nDuring entity manager operations, errors can occur.\
    \ A typical example is constraint violation. The `User` entity we have seen so\
    \ far has no validation. However, every entity in any application will have some\
    \ form of validation constraints on its fields based on the business context.\
    \ On the Jakarta EE platform, the Jakarta Bean Validation specification^([^(102)](#fn102))\
    \ is the default means of declaring constraints on artifacts. Listing [5-34](#531256_1_En_5_Chapter.xhtml#PC34)\
    \ shows the updated `User` entity with validation constraints on its fields.\n\
    \n```java\n@Entity\n@Table(name = \"WALLET_USER\")\npublic class User extends\
    \ AbstractEntity {\n    @Column(nullable = false)\n    @NotEmpty\n    private\
    \ String firstName;\n    @Column(nullable = false)\n    @NotEmpty\n    private\
    \ String lastName;\n    @Column(precision = 19, scale = 2)\n    private BigDecimal\
    \ totalConversions;\n    @NotNull\n    @Past\n    private LocalDate birthDay;\n\
    \    @Lob\n    @Basic(fetch = FetchType.LAZY)\n    private byte[] picture;\n \
    \   @Enumerated(EnumType.STRING)\n    private UserType userType;\n    @Embedded\n\
    \    @Valid\n    private Address address;\n    @OneToOne(mappedBy = \"user\",\
    \ cascade = CascadeType.ALL)\n    @Valid\n    private UserCredentials userCredentials;\n\
    \    @OneToMany(mappedBy = \"accountOwner\", cascade = CascadeType.ALL)\n    private\
    \ List transactionHistory = new ArrayList();\n    private transient int age;\n\
    }\n```\n\nListing 5-34 shows constrained `User` entity.\n\nA number of the validation\
    \ constraints are self-explanatory, for instance, `@NotNull` means the field should\
    \ not be null. The `@Past` annotation on the `dateOfBirth` field requires the\
    \ set value to be in the past. The `@Valid` annotation on the `Address` and `UserCredentials`\
    \ tells the runtime to cascade validation to the annotated field type. So when\
    \ the `User` entity is being validated, the validation will be cascaded to the\
    \ two `@Valid` annotated fields, and their respective fields will also be validated\
    \ if they have constraint annotations. The constrained `UserCredentials` entity\
    \ is shown in Listing [5-35](#531256_1_En_5_Chapter.xhtml#PC35).\n\n```java\n\
    @Entity\npublic class UserCredentials extends AbstractEntity {\n    @Column(unique\
    \ = true, length = 30, nullable = false)\n    @NotEmpty\n    @Email\n    private\
    \ String email;\n    @Column(nullable = false)\n    @NotEmpty\n    @Size(min =\
    \ 8, max = 30)\n    private String password;\n    private String salt;\n    @OneToOne\n\
    \    @JoinColumn(name = \"wallet_user_id\")\n    private User user;\n    @ElementCollection\n\
    \    private Set emailHistory;\n}\n```\n\nListing 5-35 shows the constrained `UserCredentials`\
    \ entity.\n\nThe `@Email` annotation on the `email` field will enforce a valid\
    \ email constraint for any passed email. The `@Size` annotation sets the minimum\
    \ character length of the `password` to 8 and maximum to 30. The `Address` entity\
    \ has similar constraints for the address fields.\n\nWhen the `persist` method\
    \ is called on an `EntityManager` instance, in this case the `save` method on\
    \ the `userRepository` contextual instance, just before the entity is persisted,\
    \ the runtime will automatically validate the constraints. This validation is\
    \ enabled automatically when a bean validation provider is found on the classpath.\n\
    \nIf any validation constraint fails, a `ConstraintViolationException` will be\
    \ thrown by the bean validation runtime, which will result in a rollback of the\
    \ transaction. In this case, the transaction will not be committed and will be\
    \ rolled back. All of this is done by default without you needing to set anything.\
    \ If there is no exception thrown, the entity gets merged into the persistent\
    \ context, and when the method exits successfully, the transaction gets committed\
    \ with it being flushed to the database.\n\n### Updating and Removing Data\n\n\
    Persisting entities is done with the `persist` method on the `EntityManager`.\
    \ Updating is equally done with the `merge` method. Listing [5-36](#531256_1_En_5_Chapter.xhtml#PC36)\
    \ shows the `merge` method of the `BaseRepository` class.\n\n```java\npublic abstract\
    \ class BaseRepository {\n    @Inject\n    @Database(POSTGRES)\n    EntityManager\
    \ em;\n\n    public E merge(E entity) {\n        return em.merge(entity);\n  \
    \  }\n}\n```\n\nListing 5-36 shows the `merge` method in `UserRepository`.\n\n\
    The `merge` method similarly takes an entity and merges the state of the entity\
    \ into the currently active persistence context. Similar to persisting, validations\
    \ will be performed, and if everything works correctly, the persistence context\
    \ gets flushed when the transaction is committed.\n\nDeleting an entity is done\
    \ with the `remove` method of the `EntityManager`. This method takes an entity\
    \ instance and removes the entity first from the persistence context. And when\
    \ the persistence context is merged, the row gets removed.\n\n### Cascading Operations\n\
    \nThe various association annotations, `@OneToOne`, `@ManyToOne`, `@OneToMany`,\
    \ and `@ManyToMany`, have the `cascade` parameter that can be set to any of the\
    \ `CascadeType` enum types. The `User` entity shown in Listing [5-34](#531256_1_En_5_Chapter.xhtml#PC34)\
    \ shows the `CascadeType.ALL` value passed to the `@OneToMany` association for\
    \ the `TransactionHistory`. This means that the persistence runtime should cascade\
    \ operations on the parent entity, in this case the `User` entity, to the child\
    \ entity, in this case `TransactionHistory`.\n\nSo when persisting a user instance,\
    \ if there are any `TransactionHistory` instances in the list, these will also\
    \ get persisted. Effectively, all operations on the parent entity will be cascaded\
    \ to the child. A lot of the time, the decision to cascade will depend on the\
    \ business domain.\n\nFor instance, a rule of thumb is the direction an association\
    \ can be traversed. In the `User` entity, it is natural to traverse from a user\
    \ to its transaction history. It really would be weird to traverse a history back\
    \ to its user. For such, it makes sense to cascade operations from the `User`\
    \ to its `TransactionHistory`.\n\n### Callback Methods\n\nJPA has callback methods\
    \ that entities can implement to carry out operations just before a checkpoint\
    \ operation is executed. The `@PrePersist`, `@PreUpdate`, `@PostLoad`, and `@PostRemove`\
    \ are annotations that can be placed on a method either in the entity or in an\
    \ entity listener to mark as a callback. As the names of the annotations imply,\
    \ annotating a method with any of them results in the method being called just\
    \ before the event for which it’s listening occurs. Listing [5-37](#531256_1_En_5_Chapter.xhtml#PC37)\
    \ shows the user entity with a `@PostLoad` callback method to compute the age\
    \ of the user.\n\n```java\n@Entity\n@Table(name = \"WALLET_USER\")\npublic class\
    \ User extends AbstractEntity {\n    private transient int age;\n\n    @PostLoad\n\
    \    private void computeAge() {\n        age = (int) ChronoUnit.YEARS\n     \
    \       .between(birthDay, LocalDate.now(ZoneOffset.UTC));\n    }\n}\n```\n\n\
    Listing 5-37 shows the `@PostLoad` callback.\n\nThe `computeAge` method is annotated\
    \ with `@PostLoad`, the implementation of which simply calculates the years between\
    \ today’s date and the birthday of the user, setting the transient `age` field\
    \ to the result. This method will be called right after the entity is loaded from\
    \ the database. When a callback method is created within the entity as we have\
    \ it, the method has access to the fields of the entity. The signature of the\
    \ callback method within the entity is that it returns `void` and takes no parameter.\
    \ The caveat with a callback method within the entity is that you cannot inject\
    \ any dependency into it."
  raw: '##### Transaction Rollback


    During entity manager operations, errors can occur. A typical example is constraint
    violation. The User entity we have seen so far has no validation. However, every
    entity in any application will have some form of validation constraints on its
    fields based on the business context. On the Jakarta EE platform , the Jakarta
    Bean Validation specification^([^(102)](#fn102)) is the default means of declaring
    constraints on artifacts. Listing [5-34](#531256_1_En_5_Chapter.xhtml#PC34) shows
    the updated User entity with validation constraints on its fields.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    @NotEmpty

    private String firstName;

    @Column(nullable = false)

    @NotEmpty

    private String lastName;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    @NotNull

    @Past

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    @Embedded

    @Valid

    private Address address;

    @OneToOne(mappedBy = "user", cascade = CascadeType.ALL)

    @Valid

    private UserCredentials userCredentials;

    @OneToMany(mappedBy = "accountOwner", cascade = CascadeType.ALL)

    private List transactionHistory =

    new ArrayList();

    private transient int age;

    }

    Listing 5-34

    shows constrained User entity

    ```


    A number of the validation constraints are self-explanatory, for instance, @NotNull
    means the field should not be null. The @Past annotation on the dateOfBirth field
    requires the set value to be in the past. The @Valid annotation on the Address
    and UserCredentials tells the runtime to cascade validation to the annotated field
    type. So when the User entity is being validated, the validation will be cascaded
    to the two @Valid annotated fields, and their respective fields will also be validated
    if they have constraint annotations. The constrained UserCredentials entity is
    shown in Listing [5-35](#531256_1_En_5_Chapter.xhtml#PC35).


    ```

    @Entity

    public class UserCredentials extends AbstractEntity {

    @Column(unique = true, length = 30, nullable = false)

    @NotEmpty

    @Email

    private String email;

    @Column(nullable = false)

    @NotEmpty

    @Size(min = 8, max = 30)

    private String password;

    private String salt;

    @OneToOne

    @JoinColumn(name = "wallet_user_id")

    private User user;

    @ElementCollection

    private Set emailHistory;

    }

    Listing 5-35

    shows the constrained UserCredentials entity

    ```


    The @Email annotation on the email field will enforce a valid email constraint
    for any passed email. The @Size annotation sets the minimum character length of
    the password to 8 and maximum to 30\. The Address entity has similar constraints
    for the address fields.


    When the persist method is called on an EntityManager instance, in this case the
    save method on the userRepository contextual instance, just before the entity
    is persisted, the runtime will automatically validate the constraints. This validation
    is enabled automatically when a bean validation provider is found on the classpath.


    If any validation constraint fails, a ConstraintViolationException will be thrown
    by the bean validation runtime, which will result in a rollback of the transaction.
    In this case, the transaction will not be committed and will be rolled back. All
    of this is done by default without you needing to set anything. If there is no
    exception thrown, the entity gets merged into the persistent context, and when
    the method exits successfully, the transaction gets committed with it being flushed
    to the database.


    #### Updating and Removing Data


    Persisting entities is done with the persist method on the EntityManager. Updating
    is equally done with the merge method. Listing [5-36](#531256_1_En_5_Chapter.xhtml#PC36)
    shows the merge method of the BaseRepository class.


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E merge(E entity) {

    return em.merge(entity);

    }

    }

    Listing 5-36

    shows the merge method in UserRepository

    ```


    The merge method similarly takes an entity and merges the state of the entity
    into the currently active persistence context. Similar to persisting, validations
    will be performed, and if everything works correctly, the persistence context
    gets flushed when the transaction is committed.


    Deleting an entity is done with the remove method of the EntityManager. This method
    takes an entity instance and removes the entity first from the persistence context.
    And when the persistence context is merged, the row gets removed.


    #### Cascading Operations


    The various association annotations, @OneToOne, @ManyToOne, @OneToMany, and @ManyToMany,
    have the cascade parameter that can be set to any of the CascadeType enum types.
    The User entity shown in Listing [5-34](#531256_1_En_5_Chapter.xhtml#PC34) shows
    the CascadeType.ALL value passed to the @OneToMany association for the TransactionHistory.
    This means that the persistence runtime should cascade operations on the parent
    entity , in this case the User entity, to the child entity, in this case TransactionHistory.


    So when persisting a user instance, if there are any TransactionHistory instances
    in the list, these will also get persisted. Effectively, all operations on the
    parent entity will be cascaded to the child. A lot of the time, the decision to
    cascade will depend on the business domain.


    For instance, a rule of thumb is the direction an association can be traversed.
    In the User entity, it is natural to traverse from a user to its transaction history.
    It really would be weird to traverse a history back to its user. For such, it
    makes sense to cascade operations from the User to its TransactionHistory.


    #### Callback Methods


    JPA has callback methods that entities can implement to carry out operations just
    before a checkpoint operation is executed. The @PrePersist, @PreUpdate, @PostLoad,
    and @PostRemove are annotations that can be placed on a method either in the entity
    or in an entity listener to mark as a callback. As the names of the annotations
    imply, annotating a method with any of them results in the method being called
    just before the event for which it’s listening occurs. Listing [5-37](#531256_1_En_5_Chapter.xhtml#PC37)
    shows the user entity with a @PostLoad callback method to compute the age of the
    user .


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    private transient int age;

    @PostLoad

    private void computeAge() {

    age = (int) ChronoUnit.YEARS

    .between(birthDay, LocalDate.now(ZoneOffset.UTC));

    }

    }

    Listing 5-37

    shows the @PostLoad callback

    ```


    The computeAge method is annotated with @PostLoad, the implementation of which
    simply calculates the years between today’s date and the birthday of the user,
    setting the transient age field to the result. This method will be called right
    after the entity is loaded from the database. When a callback method is created
    within the entity as we have it, the method has access to the fields of the entity.
    The signature of the callback method within the entity is that it returns void
    and takes no parameter. The caveat with a callback method within the entity is
    that you cannot inject any dependency into it.'
