    ### 事件元数据


    有时你可能需要获取关于已触发事件的某些元数据。在这种情况下，你可以使用 `EventMetadata` Bean。观察者方法可以接受多个参数。到目前为止，我们看到的观察者方法都只接受事件负载形式的单个参数。然而，你可以向观察者方法传递多个参数，每个参数都是一个注入点，将由容器自动解析。让我们将一个
    `EventMetadata` Bean 传递给清单 4-51 中 `MessageCenter` Bean 的 `sendUserSms` 观察者方法。


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS) @MessageOption(MessageOption.MessageType.SMS)
    UserResponse userResponse, EventMetadata eventMetadata) {

    //TODO --> 通过网关发送短信... 阻塞任务

    }

    }

    清单 4-51

    展示了向观察者方法传递第二个参数

    ```


    清单 4-51 展示了将 `EventMetadata` Bean 作为第二个参数注入到 `sendUserSms` 同步观察者方法中。`EventMetadata`
    是一个接口，其实现将由 CDI 运行时提供。它包含用于获取已触发事件的限定符、获取注入点的 `InjectionPoint` Bean 以及获取事件对象类的
    `Type` 的方法。注入此元数据可以为你提供信息，以便在观察者方法中进一步用于动态决策。


    ### 条件观察者方法


    CDI 事件观察者方法可以是条件性的。你可以决定一个观察者方法是否应在其所观察的事件被触发时始终被调用，或者仅当声明该观察者方法的 Bean 的实例已存在时才被调用。默认情况下，如果不存在包含观察者方法的
    Bean 实例，则会创建一个新的实例。但是，你可以关闭此功能，仅当声明观察者方法的 Bean 的实例在当前作用域中已可用时才调用观察者。要条件性地使用观察者方法，你首先需要为声明观察者方法的
    Bean 指定一个显式的作用域。包含我们消息观察者的 `MessageCenter` Bean（上次展示于清单 4-51）是 `@Dependent` 作用域的，因为我们没有显式地将其与某个作用域关联。


    要条件性地要求仅在 `MessageCenter` Bean 的实例存在时才调用 `sendUserSms` 同步观察者，我们可以向 `@Observes`
    注解传递第二个参数，如清单 4-52 所示。


    ```

    @RequestScoped

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS, notifyObserver
    = Reception.IF_EXISTS) @MessageOption(MessageOption.MessageType.SMS)

    final UserResponse userResponse, final EventMetadata eventMetadata) {

    //TODO --> 通过网关发送短信... 阻塞任务

    }

    }

    清单 4-52

    展示了将 sendUserSms 设置为条件性

    ```


    清单 4-52 展示了 `MessageCenter` Bean，这次其作用域被设置为 `@RequestScope`。`sendUserSms` 观察者将
    `notifyObserver` 参数值 `Reception.IF_EXISTS` 传递给了 `@Observes` 注解。通过这种构造，仅当当前请求作用域中存在
    `MessageCenter` Bean 的实例时，此观察者才会被任何已触发的同步 `UserResponse` 事件调用。如果不存在该 Bean 的实例，则不会调用此观察者。


    `notifyObserver` 接受两个选项之一：`Reception.IF_EXISTS` 或 `Reception.ALWAYS`。默认值是 `Reception.ALWAYS`。因此，默认情况下，观察者方法将始终为其所观察的事件被调用，除非显式关闭。


    ## 总结


    在本章中，我们涵盖了 Jakarta 上下文和依赖注入规范的核心内容。我们了解了该规范的特性、如何激活它，然后快速浏览了它为应用程序开发提供的各种构造。Jakarta
    规范页面上提供了更多内容^(⁹⁹)。在下一章中，我们将通过介绍 Jakarta 持久化 API 来继续讨论 Jakarta EE。


