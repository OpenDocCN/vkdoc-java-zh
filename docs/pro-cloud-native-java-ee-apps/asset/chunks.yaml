    JPA annotations on the field. What this means is that the JPA runtime will directly
    access these fields at runtime. This is called field access. The other access
    type is property access, where the getter methods of the fields are annotated
    with the JPA annotations. You will not see much property access in the wild as
    much as field access . As such, all the examples in this chapter, and the rest
    of the book, use field access.'
  trans: '

    ### 映射枚举


    在实体中添加枚举字段类型即可将其映射到数据库列。默认情况下，枚举类型会映射到数据库中的整数类型列。这是因为 JPA 默认使用枚举的序数（ordinal）进行数据库映射。清单
    5-14 展示了包含 UserType 字段的 User 实体。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    private UserType userType;

    }

    清单 5-14

    包含枚举字段的 User 实体

    ```


    图 5-5 展示了包含枚举字段类型的 User 实体的模式图。


    ![](img/531256_1_En_5_Fig5_HTML.jpg)


    该模式图描绘了钱包用户表，包含以下字段：生日、创建时间、名字、姓氏、总转换次数、更新时间、用户类型、用户名和 ID。


    图 5-5

    枚举序数模式


    对于这个特定的底层数据库，userType 被映射为一个整数。这意味着运行时传递给 userType 字段的 UserType 值的序数位置将被持久化。这种方法的问题在于，随着枚举中新增条目，现有的序数很容易发生变化。为了防止因序数变化而导致已持久化的枚举字段被映射到错误的枚举值，可以使用
    `@EnumeratedType` 注解将映射的字段类型改为字符串。清单 5-15 展示了将 userType 字段映射为 String 类型。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    @Getter

    @Setter

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    }

    清单 5-15

    展示了枚举到 String 的映射

    ```


    `@Enumerated` 注解接受 `EnumType.STRING` 或 `EnumType.ORDINAL`。`ORDINAL` 是默认值，因此当像清单
    5-14 那样省略该注解时，字段会被映射为序数。图 5-6 展示了更新后的模式图。


    ![](img/531256_1_En_5_Fig6_HTML.jpg)


    该模式图描绘了钱包用户表，包含以下字段：生日、创建时间、名字、姓氏、图片、总转换次数、更新时间、用户类型、用户名和 ID。


    图 5-6

    枚举字符串映射


    userType 枚举字段现在被映射为 varchar，这代表了我们想要映射到的 String 类型。


    ### 瞬态字段


    实体中的瞬态字段是指不映射到数据库列的字段。为了向运行时表明某个字段不应被持久化，可以在字段类型上使用 `transient` 修饰符或 `@Transient`
    注解。被修饰或注解的字段不会映射到数据库列，也无法在数据检索时被查询。例如，清单 5-16 中展示的 User 实体包含一个带有 `transient` 修饰符的
    age 字段，该字段在运行时计算得出，不应被持久化。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    @Getter

    @Setter

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    }

    清单 5-16

    展示了 transient 修饰符的使用

    ```


    age 字段同样可以使用 `@Transient` 注解，效果相同。


    ### 字段访问与属性访问


    到目前为止，User 实体中讨论的所有映射，其各自的 JPA 注解都位于字段上。这意味着 JPA 运行时将在运行时直接访问这些字段。这被称为字段访问。另一种访问类型是属性访问，即字段的
    getter 方法上带有 JPA 注解。在实际应用中，属性访问的使用频率远不如字段访问。因此，本章以及本书其余部分的所有示例均采用字段访问。

    '
- fmt: '### Organizing with Inheritance


    The `User` entity discussed so far is the only entity we have looked at. However,
    an application will seldom consist of a single entity. No matter the number of
    entities, a lot of the time there will be fields that are common to a set of the
    entities. It is very tedious to repeat these fields for each entity. In any case,
    the whole point of the use of an abstraction like JPA is to use the full object-oriented
    feature of the Java language in a database context.


    As such, common entity fields can be abstracted into a common superclass that
    all other types that need such fields can inherit from. The `id`, `created`, and
    `updated` fields of the `User` entity are good candidates for abstraction into
    a superclass. These fields naturally would be found in other entities. To simplify
    the domain models, let us abstract these and more other common fields into a superclass.
    Listing [5-17](#531256_1_En_5_Chapter.xhtml#PC17) shows an `AbstractEntity` class
    with some common fields.


    ```

    @MappedSuperclass

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    }

    ```


    Listing [5-17](#531256_1_En_5_Chapter.xhtml#PC17) shows the `AbstractEntity`.
    This class is an abstract class annotated with `@MappedSuperclass`. It’s abstract
    because its sole purpose is to be extended by other classes. We do not want to
    have any concrete initialization of this class. It has five fields that all bear
    the `protected` modifier, making them available to its subclasses. The `@MappedSuperclass`
    annotation designates this class as one whose mapping information is applied to
    entities that extend it. It will not have a separate table of its own.


    The `User` entity can now extend the `AbstractEntity`, and in the database, all
    the fields of the `AbstractEntity` class will be mapped to the `wallet_user` table.
    Listing [5-18](#531256_1_En_5_Chapter.xhtml#PC18) shows the updated `User` entity.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    }

    ```


    The `User` entity now takes the common fields from the `AbstractEntity` it extends.
    The updated database diagram of the `wallet_user` table is shown in Figure [5-7](#531256_1_En_5_Chapter.xhtml#Fig7).


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig7_HTML.jpg)


    A schema diagram depicts the wallet user table with the following fields: Birthday,
    created, created by, edited by, first name, last name, picture, total conversions,
    updated, user type, user name, and ID.


    **Figure 5-7** Updated entity diagram


    The structure of the `wallet_user` table only changed because of the addition
    of the two new `createdBy` and `editedBy` fields. It still looks exactly like
    it was in Figure [5-6](#531256_1_En_5_Chapter.xhtml#Fig6). Though from the database
    perspective the structure remains the same, from the Java perspective, the code
    is better organized and easy to read and maintain.


    ### Embeddables


    An embeddable is an object that derives its identity from an enclosing object.
    In JPA, an embeddable is a Java class whose fields are mapped to its enclosing
    entity’s table. Listing [5-19](#531256_1_En_5_Chapter.xhtml#PC19) shows an `Address`
    embeddable that can be used by other entities.


    ```

    @Embeddable

    public class Address {

    protected String apartment;

    protected String street;

    protected String city;

    protected String state;

    protected String zip;

    private PhoneType phoneType;

    protected String phone;

    public enum PhoneType {

    MOBILE,

    FIXED,

    VOIP

    }

    }

    ```


    The `Address` embeddable is a POJO with no special annotation or mapping other
    than the `@Embeddable` annotation. This annotation signals the runtime that this
    class will not have an identity of its own, but rather derive such from its embedding
    entity. Any entity that embeds this `Address` object will have all its fields
    mapped to the table of the embedding class. Listing [5-20](#531256_1_En_5_Chapter.xhtml#PC20)
    shows the `User` entity embedding the `Address` class.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    @Embedded

    private Address address;

    }

    ```


    The `User` entity embeds the `Address` through the use of the `@Embedded` annotation.
    The `wallet_user` table will have all the fields of the `Address` class mapped
    to it. Figure [5-8](#531256_1_En_5_Chapter.xhtml#Fig8) shows the updated `wallet_user`
    table.


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig8_HTML.jpg)


    A schema diagram depicts the wallet user table with the following fields: Birthday,
    created by, edited by, first name, last name, user type, city, phone, phone type,
    state, street, zip, and ID.


    **Figure 5-8** Updated `wallet_user` table


    All the `Address` fields are mapped to the `User` entity table. Embeddables are
    another way of organizing code to make it much clearer and easy to read and maintain
    while taking advantage of SQL’s ability to have a lot of columns in a database.


    ### Relationships


    JPA is an object-relational mapper. The "relation" in that name refers to the
    ability of entities to have some form of relationship with each other. The kinds
    of relationships or associations that entities can have with each other are generally
    grouped into four types, namely:


    *   Many-to-one

    *   One-to-one

    *   One-to-many

    *   Many-to-many


    There are two broad types of entity relationships in JPA, namely, single-valued
    relationships and collection-valued relationships.


    #### Single-Valued Relationships


    A single-valued relationship or association is one in which an entity has an association
    to another entity instance where the cardinality^([^(101)](#fn101)) of the target
    is one. In Java, this association means that one entity has a field of the target
    entity as one of its properties. In the database, the primary key of the target
    entity will become a foreign key column in the originating entity table.'
