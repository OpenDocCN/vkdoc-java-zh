- fmt: '### Qualifying Events


    Events can be qualified to selectively determine which observers get notified.
    Back to our requirement, just as we need to persist EU residents of `jwallet`
    into an EU hosted database, we can only send an email to a successfully persisted
    EU user and not an SMS. To meet this requirement, we can qualify our events to
    selectively have different observer methods called based on their qualifiers.
    Let’s start by introducing a `MessageOption` qualifier that takes a `MessageType`
    parameter as shown in Listing [4-46](#531256_1_En_4_Chapter.xhtml#PC46).


    ```java

    @Qualifier

    @Retention(RUNTIME)

    @Target({ FIELD, TYPE, METHOD, PARAMETER })

    public @interface MessageOption {

    MessageType value();

    enum MessageType {

    SMS,

    EMAIL

    }

    }

    Listing 4-46

    showing the new MessageOption parameter

    ```


    Listing [4-46](#531256_1_En_4_Chapter.xhtml#PC46) shows the `MessageOption` qualifier.
    With this, we can selectively determine which event observers to be notified for
    which event. This annotation can be used in two ways. First, we could inject two
    `Event` objects into the `UserServiceDecorator`, qualifying each with a separate
    `MessageOption`, as shown in Listing [4-47](#531256_1_En_4_Chapter.xhtml#PC47).


    ```java

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    @MessageOption(MessageOption.MessageType.SMS)

    Event smsEvent;

    @Inject

    @MessageOption(MessageOption.MessageType.SMS)

    Event emailEvent;

    }

    Listing 4-47

    showing two qualified Event objects for each MessageOption type

    ```


    Listing [4-47](#531256_1_En_4_Chapter.xhtml#PC47) shows the `UserServiceDecorator`
    bean with two `Event` injection points, each qualified with a `MessageOption`.
    The corresponding observers interested in each event will also need to be qualified.


    ```java

    public class MessageCenter {

    public void sendUserSmsAsync(

    @ObservesAsync @MessageOption(MessageOption.MessageType.SMS) final UserResponse
    userResponse) {

    //TODO --> Send SMS through gateway... Async

    }

    public void sendEmail(

    @ObservesAsync @MessageOption(MessageOption.MessageType.EMAIL) final UserResponse
    userResponse) {

    //TODO --> send email asynchronously

    }

    }

    Listing 4-48

    shows two observers in the MessageCenter bean observing these events

    ```


    Listing [4-48](#531256_1_En_4_Chapter.xhtml#PC48) shows the `MessageCenter` bean
    with two event observers, each observing the same event type but differently qualified.
    During observer resolution, the container will match each observer to the fired
    event based on type and qualifiers. So the `sendSmsAsync` observer will be mapped
    to the async event fired from the `smsEvent` object (Listing [4-47](#531256_1_En_4_Chapter.xhtml#PC47))
    and the `sendEmail` observer mapped to the `emailEvent` object (Listing [4-47](#531256_1_En_4_Chapter.xhtml#PC47)).
    This should work as expected. However, the moment we have a dozen `MessageType`
    options in the `MessageOption` qualifier, we would have to inject a lot more `Event`
    objects.


    Fortunately, we can dynamically add qualifiers to events based on some condition
    in our code. Listing [4-49](#531256_1_En_4_Chapter.xhtml#PC49) shows the `UserServiceDecorator`
    bean refactored to dynamically select a `MessageOption` based on the location
    of the persisted `User`.


    ```java

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = userService.getUser(user.getId());

    userResponseEvent.select(getAnnotation(UserRegion.EU)).fireAsync(userResponse);

    return UserService.toUserResponse(user);

    }else{

    final UserResponse userResponse = userService.createUser(createUserRequest);

    userResponseEvent.select(getAnnotation(UserRegion.OTHERS)).fireAsync(userResponse);

    return userResponse;

    }

    }

    private MessageOption getAnnotation(final UserRegion userRegion) {

    if (userRegion == UserRegion.EU) {

    return new MessageOption() {

    @Override

    public MessageType value() {

    return MessageType.EMAIL;

    }

    @Override

    public Class annotationType() {

    return MessageOption.class;

    }

    };

    }

    return new MessageOption() {

    @Override

    public MessageType value() {

    return MessageType.SMS;

    }

    @Override

    public Class annotationType() {

    return MessageOption.class;

    }

    };

    }

    }

    Listing 4-49

    shows a refactored UserServiceDecorator with dynamically selected event qualifiers

    ```


    Listing [4-49](#531256_1_En_4_Chapter.xhtml#PC49) shows the full `UserServiceDecorator`
    bean. In the `createUser` method, if a user is in the EU, we invoke the `select`
    method on the `UserResponseEvent` object, passing it the return type of the `getAnnotation(UserRegions.EU)`
    method. The `getAnnotation` method takes a `UserRegion` type parameter and returns
    the requisite annotation for that region. In this case, the returned qualifier
    will be `MessageOption(MessageType.EMAIL)`. The `Event#select` method we’ve called
    takes a variable argument list of annotations.


    If the user is not in the EU region, we pass `UserRegion.OTHERS` to the `getAnnotation`
    method, which will return the `MessageOption(MessageType.SMS)` that is passed
    to the `select` method of the same `userResponseEvent` object. This way, our observer
    methods as shown in Listing [4-48](#531256_1_En_4_Chapter.xhtml#PC48) stay the
    same. But we have made the qualifier selection process in the event firing bean
    much more flexible. The container will still map whichever event gets fired to
    the right observer method as if we had explicitly injected and qualified different
    event types, as shown in Listing [4-47](#531256_1_En_4_Chapter.xhtml#PC47).


    It is important to note that the event observers as shown in Listing [4-48](#531256_1_En_4_Chapter.xhtml#PC48)
    will be conditionally called based on their types and qualifiers matching those
    of a fired event. However, Listing [4-50](#531256_1_En_4_Chapter.xhtml#PC50) shows
    a third `UserResponse` observer that will always be called irrespective of the
    qualifiers of the `userResponseEvent`.


    ```java

    public class MessageCenter {

    public void sendUserSms(

    @Observes(during = TransactionPhase.AFTER_SUCCESS) @MessageOption(MessageOption.MessageType.SMS)

    final UserResponse userResponse) {

    //TODO --> Send SMS through gateway... Blocking task

    }

    public void sendUserSmsAsync(

    @ObservesAsync @MessageOption(MessageOption.MessageType.SMS) final UserResponse
    userResponse) {

    //TODO --> Send SMS through gateway... Async

    }

    public void sendEmail(

    @ObservesAsync @MessageOption(MessageOption.MessageType.EMAIL) final UserResponse
    userResponse) {

    //TODO --> send email asynchronously

    }

    public void sendMessage(@ObservesAsync final UserResponse userResponse) {

    }

    }

    Listing 4-50

    shows a catch-all event observer in MessageCenter

    ```


    In Listing [4-50](#531256_1_En_4_Chapter.xhtml#PC50), the `sendMessage` observer
    will be called for all events fired by any `Event<UserResponse>` object, irrespective
    of the qualifiers of the event object. The reason is that the `sendMessage` observer,
    in the absence of any explicit qualifiers, is implicitly qualified with the built-in
    `@Any` qualifier. The `@Any` qualifier is a catch-all qualifier that applies to
    any CDI artifact, irrespective of the qualifiers of that artifact. In this example,
    the `sendMessage` observer will be called no matter which event object fires the
    `UserResponse` event. This is something to keep in mind when working with qualifiers
    in CDI. If you need to restrict things exclusively to your explicitly chosen qualifiers,
    then you should make sure to annotate all corresponding constructs with your qualifiers
    to avoid subtle bugs.'
