  raw: '### Producer Methods


    Producer methods are similar to producer fields in the sense that they both produce
    contextual instances. Producer methods, however, produce their contextual instances
    based on their return types. A method annotated @Produces will produce the return
    type of whatever it returns. A producer method can also take parameters. However,
    all parameters passed to a producer method are injection points and will be taken
    care of by the container, because producer methods are called automatically by
    the container. Listing [4-24](#531256_1_En_4_Chapter.xhtml#PC24) shows a producer
    method that produces java.util.logging.Logger objects.


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.DERBY)

    @PersistenceContext(unitName = "jwallet-derby")

    EntityManager derby;

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet-postgres")

    EntityManager postgres;

    @Produces

    public Logger getLog(final InjectionPoint injectionPoint) {

    return       Logger.getLogger(injectionPoint.getMember().getDeclaringClass().getName());

    }

    }

    Listing 4-24

    showing producer method produce Logger objects

    ```


    Listing [4-24](#531256_1_En_4_Chapter.xhtml#PC24) shows the ProducerFactory bean,
    this time with the producer method getLog(). This method returns a java.util.logging.Logger
    object . It also takes a parameter of type InjectionPoint. This parameter will
    be injected by the CDI container (an example of method injection). An InjectionPoint
    is a CDI component that contains metadata about an injection point. The getLog
    method implementation sets the name of the produced Logger to the class into which
    it’s being injected by calling the InjectionPoint#getMember#getDeclaringClass#getName().
    With the producer method in place, injecting a Logger instance is as simple as
    using @Inject on a field of type Logger as shown in Listing [4-25](#531256_1_En_4_Chapter.xhtml#PC25).


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(DERBY)

    EntityManager em;

    @Inject

    Logger logger;

    }

    Listing 4-25

    shows the injection of the Logger into the BaseRepository bean

    ```


    Listing [4-25](#531256_1_En_4_Chapter.xhtml#PC25) shows the BaseRepository with
    an additional field injection of type Logger. At runtime, the CDI container will
    consult the getLog producer method for contextual instances to satisfy this injection
    point. Because we have not set an explicit scope on the producer method and fields
    in the ProducerFactory bean, the produced contextual instances for both the EntityManager
    and Logger will be assigned to the @Dependent pseudo-scope.


    You generally will use producer methods to instantiate beans that require some
    form of custom initialization that you might not be able to do in the constructor
    of the bean. For instance, you might have to make an external call to a web service
    to initialize some bean. In such a case, you can use producer methods to transform
    the instance of the bean that you manually instantiate into a CDI-managed object.
    This is because beans that you manually instantiate are not managed by the CDI
    runtime. The access modifier of the producer method does not matter. It could
    also be static or nonstatic. Through the use of CDI producer construct, we have
    transformed another class that is not part of application code to a CDI bean.


    ### CDI Producers – Caveats


    There are a few things you need to be aware of when using CDI producers. The following
    will result in CDI definition errors at application boot time:


    *   You cannot annotate a producer method or field with @Inject.


    *   A producer method parameter cannot be annotated with @Disposes, @Observes,
    or @ObservesAsync.


    *   An interceptor may not define a producer method or field.


    ## Stereotypes


    Often in application development, especially using CDI, you will find yourself
    having different beans created for different purposes needing the same common
    set of metadata. For any nontrivial application, you could end up repeating the
    same set of metadata on beans a significant number of times. This could get quite
    tedious when you need to add functionality across all those beans.


    For instance, Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and [4-27](#531256_1_En_4_Chapter.xhtml#PC27)
    show the WalletService and UserService beans with their CDI metadata .


    ```

    @RequestScoped

    @Transactional

    public class UserService {

    }

    Listing 4-27

    shows the UserService bean with its metadata.

    ```


    ```

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    Listing 4-26

    showing the WalletService bean with its metadata

    ```


    Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and [4-27](#531256_1_En_4_Chapter.xhtml#PC27)
    both show two different CDI beans having the exact same CDI metadata. Both are
    request scoped and transactional. Even though both beans will carry out different
    functionalities, they do require the exact same set of CDI services. If we want
    to associate an interceptor (more on interceptors in the next section) with both
    beans, we would have to repeat the interceptor annotation on both beans. Clearly,
    repeating the same metadata over and over isn’t an ideal way to write code.


    The CDI specification provides the stereotype construct for grouping together
    commonly occurring architectural patterns into a single, common annotation. So
    for the beans showing in Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and
    [4-27](#531256_1_En_4_Chapter.xhtml#PC27), instead of repeating the same CDI annotations,
    stereotypes allow us to centralize them under one common annotation. In Listing
    [4-28](#531256_1_En_4_Chapter.xhtml#PC28), we create an Action stereotype that
    is @RequestScoped and @Transactional.


    ```

    @Stereotype

    @RequestScoped

    @Transactional

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    Listing 4-28

    showing the Action stereotype

    ```


    Listing [4-28](#531256_1_En_4_Chapter.xhtml#PC28) shows the @Action stereotype
    declaration. A CDI stereotype is a Java annotation annotated with @Stereotype.
    For the @Action stereotype, we declare that it’s @RequestScoped and @Transactional.
    The @Target of the stereotype is also set to TYPE because we want to only associate
    this stereotype with beans and not methods, fields, or parameters. All beans that
    are annotated with this stereotype will automatically be request scoped and transactional,
    just as if the beans have been explicitly annotated with those annotations. With
    the @Action stereotype declared, we can now refactor the UserService and WalletService
    beans to use it. Listing [4-29](#531256_1_En_4_Chapter.xhtml#PC29) shows the WalletService
    refactored to use the @Action stereotype .


    ```

    @Action

    public class UserService {

    }

    Listing 4-30

    showing the UserService using the @Action stereotype

    ```


    ```

    @Action

    public class WalletService {

    }

    Listing 4-29

    showing the WalletService using the @Action stereotype

    ```


    Listings [4-29](#531256_1_En_4_Chapter.xhtml#PC29) and [4-30](#531256_1_En_4_Chapter.xhtml#PC30)
    show the two CDI beans refactored to use the @Action stereotype . What this implies
    is that both beans are still request scoped and transactional. However, that boilerplate
    declarative metadata has been abstracted into a stereotype. If we need to associate
    all our controller beans with an interceptor, we will only have to associate the
    interceptor with the stereotype and our beans will automatically be intercepted.'
  trans: '

    ### 生产者方法


    生产者方法与生产者字段类似，它们都能生成上下文实例。然而，生产者方法基于其返回类型来生成上下文实例。一个被 `@Produces` 注解的方法将生成其返回类型的实例。生产者方法也可以接受参数。但是，传递给生产者方法的所有参数都是注入点，并由容器负责处理，因为生产者方法是由容器自动调用的。清单
    4-24 展示了一个生成 `java.util.logging.Logger` 对象的生产者方法。


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.DERBY)

    @PersistenceContext(unitName = "jwallet-derby")

    EntityManager derby;

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet-postgres")

    EntityManager postgres;

    @Produces

    public Logger getLog(final InjectionPoint injectionPoint) {

    return       Logger.getLogger(injectionPoint.getMember().getDeclaringClass().getName());

    }

    }

    清单 4-24

    展示生产者方法生成 Logger 对象

    ```


    清单 4-24 展示了 `ProducerFactory` Bean，这次它包含了生产者方法 `getLog()`。该方法返回一个 `java.util.logging.Logger`
    对象。它还接受一个 `InjectionPoint` 类型的参数。该参数将由 CDI 容器注入（这是方法注入的一个例子）。`InjectionPoint`
    是一个 CDI 组件，包含关于注入点的元数据。`getLog` 方法的实现通过调用 `InjectionPoint#getMember#getDeclaringClass#getName()`
    将生成的 Logger 的名称设置为它被注入到的类。有了这个生产者方法，注入一个 Logger 实例就变得非常简单，只需在 `Logger` 类型的字段上使用
    `@Inject` 注解即可，如清单 4-25 所示。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(DERBY)

    EntityManager em;

    @Inject

    Logger logger;

    }

    清单 4-25

    展示将 Logger 注入到 BaseRepository Bean 中

    ```


    清单 4-25 展示了 `BaseRepository`，它增加了一个 `Logger` 类型的字段注入。在运行时，CDI 容器会查询 `getLog` 生产者方法以获取上下文实例来满足这个注入点。由于我们没有在
    `ProducerFactory` Bean 的生产者方法和字段上设置显式的作用域，因此生成的 `EntityManager` 和 `Logger` 的上下文实例将被分配给
    `@Dependent` 伪作用域。


    通常，你会使用生产者方法来实例化那些需要某种自定义初始化（可能无法在 Bean 的构造函数中完成）的 Bean。例如，你可能需要调用外部 Web 服务来初始化某个
    Bean。在这种情况下，你可以使用生产者方法将你手动实例化的 Bean 实例转换为 CDI 管理的对象。这是因为你手动实例化的 Bean 不受 CDI 运行时的管理。生产者方法的访问修饰符无关紧要。它也可以是静态的或非静态的。通过使用
    CDI 生产者构造，我们将另一个不属于应用程序代码的类转换成了 CDI Bean。


    ### CDI 生产者 – 注意事项


    在使用 CDI 生产者时，有几点需要注意。以下情况会在应用程序启动时导致 CDI 定义错误：


    *   你不能使用 `@Inject` 注解生产者方法或字段。

    *   生产者方法的参数不能使用 `@Disposes`、`@Observes` 或 `@ObservesAsync` 注解。

    *   拦截器不能定义生产者方法或字段。


    ## 原型


    在应用程序开发中，尤其是使用 CDI 时，你经常会发现为不同目的创建的 Bean 需要相同的一组通用元数据。对于任何非平凡的应用程序，你最终可能会在 Bean
    上重复大量相同的元数据。当你需要为所有这些 Bean 添加功能时，这会变得相当繁琐。


    例如，清单 4-26 和 4-27 展示了 `WalletService` 和 `UserService` Bean 及其 CDI 元数据。


    ```

    @RequestScoped

    @Transactional

    public class UserService {

    }

    清单 4-27

    展示 UserService Bean 及其元数据。

    ```


    ```

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    清单 4-26

    展示 WalletService Bean 及其元数据

    ```


    清单 4-26 和 4-27 都展示了两个不同的 CDI Bean 具有完全相同的 CDI 元数据。两者都是请求作用域且支持事务的。尽管这两个 Bean 将执行不同的功能，但它们确实需要完全相同的一组
    CDI 服务。如果我们想将一个拦截器（下一节将详细介绍拦截器）与这两个 Bean 关联起来，我们就必须在两个 Bean 上重复拦截器注解。显然，一遍又一遍地重复相同的元数据并不是编写代码的理想方式。


    CDI 规范提供了原型构造，用于将常见的架构模式组合成一个单一的、通用的注解。因此，对于清单 4-26 和 4-27 中展示的 Bean，原型允许我们将它们集中在一个通用注解下，而不是重复相同的
    CDI 注解。在清单 4-28 中，我们创建了一个 `@Action` 原型，它同时具有 `@RequestScoped` 和 `@Transactional`
    特性。


    ```

    @Stereotype

    @RequestScoped

    @Transactional

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    清单 4-28

    展示 Action 原型

    ```


    清单 4-28 展示了 `@Action` 原型的声明。一个 CDI 原型是一个被 `@Stereotype` 注解的 Java 注解。对于 `@Action`
    原型，我们声明它是 `@RequestScoped` 和 `@Transactional` 的。该原型的 `@Target` 也被设置为 `TYPE`，因为我们只想将此原型与
    Bean 关联，而不是与方法、字段或参数关联。所有使用此原型注解的 Bean 将自动成为请求作用域并支持事务，就像这些 Bean 被显式地使用这些注解进行注解一样。声明了
    `@Action` 原型后，我们现在可以重构 `UserService` 和 `WalletService` Bean 来使用它。清单 4-29 展示了重构后使用
    `@Action` 原型的 `WalletService`。


    ```

    @Action

    public class UserService {

    }

    清单 4-30

    展示使用 @Action 原型的 UserService

    ```


    ```

    @Action

    public class WalletService {

    }

    清单 4-29

    展示使用 @Action 原型的 WalletService

    ```


    清单 4-29 和 4-30 展示了重构后使用 `@Action` 原型的两个 CDI Bean。这意味着这两个 Bean 仍然是请求作用域且支持事务的。但是，那些样板式的声明性元数据已经被抽象到一个原型中。如果我们需要将所有控制器
    Bean 与一个拦截器关联起来，我们只需将拦截器与原型关联，我们的 Bean 就会自动被拦截。

    '
- fmt: "Bean 可以通过声明自己的作用域来覆盖与某个构造型关联的作用域。Bean 声明的作用域会覆盖其构造型关联的作用域。例如，如果 `WalletService`\
    \ 除了构造型之外还显式声明了另一个作用域，那么 `WalletService` 声明的作用域优先于构造型声明的作用域。除了内置的 `@Named` 限定符之外，不能将限定符与构造型关联。将构造型与除\
    \ `@Named` 之外的限定符关联会导致 CDI 定义错误。你还可以将构造型与其他构造型关联。这样做时，第二个构造型会继承第一个构造型的所有元数据。\n\
    \n## 生命周期回调\n\nCDI Bean 的上下文实例由容器完全管理——从创建到销毁。然而，有时你可能希望在 Bean 实例化后立即执行一些准备工作，或者在其销毁前执行一些操作。在这两种情况下，都有生命周期回调可供你挂接以完成此类任务。这些生命周期回调会在适当的时间由容器自动代表你调用。\n\
    \n### `@PostConstruct`\n\n要在 Bean 实例化后立即执行一些自定义的准备工作，你可以使用 `@PostConstruct` 注解一个方法。该方法必须返回\
    \ `void` 且不接受任何参数（拦截器除外）。它可以是 `public`、`private` 或包私有方法，且不能是 `static`。注解的方法将在\
    \ Bean 实例化且其所有依赖项均已正确实例化后立即由容器调用。清单 [4-31](#531256_1_En_4_Chapter.xhtml#PC31)\
    \ 展示了 `SecurityManager` 中的一个后构造生命周期回调方法。\n\n```\n@ApplicationScoped\n@Singleton\n\
    @Startup\npublic class SecurityManager {\n    @Inject\n    UserService userService;\n\
    \    @Inject\n    UserSession userSession;\n    @PostConstruct\n    private void\
    \ init() {\n        //Do prep work.\n    }\n}\n清单 4-31\n展示 SecurityManager 中的\
    \ @PostConstruct 方法\n```\n\n清单 [4-31](#531256_1_En_4_Chapter.xhtml#PC31) 展示了 `SecurityManager`\
    \ 中一个使用 `@PostConstruct` 注解的生命周期回调方法。该方法将在 Bean 的上下文实例投入使用之前、但 Bean 依赖项已初始化之后由容器调用。在此示例中，该方法仅在\
    \ `userService` 和 `userSession` Bean 被容器完全初始化后才会被调用。由于该 Bean 是应用作用域的，`init` 生命周期回调方法只会被调用一次——即\
    \ Bean 首次创建并即将投入使用之前。或者更技术地说，在第一个代理方法被委托给 `SecurityManager` 的（唯一）实例之前。\n\n###\
    \ `@PreDestroy`\n\n`@PreDestroy` 与 `@PostConstruct` 相反。当声明该方法的 Bean 实例即将被容器销毁时，使用\
    \ `@PreDestroy` 注解的方法将由容器调用。`@PreDestroy` 通常用于释放 Bean 实例可能持有的资源，例如文件。`@PostConstruct`\
    \ 回调方法的限制同样适用于 `@PreDestroy` 回调方法。\n\n## CDI 拦截器\n\n在应用程序开发中，你经常会发现某些 Bean 需要一些与其核心功能无关的正交服务。例如，一个应用程序可能需要对某些方法的调用进行某种形式的自定义日志记录。日志记录是一个横切关注点，因为可能有多个\
    \ Bean 都需要它。\n\n在我们的 Bean 方法中添加大量的日志消息可能会很快变得非常令人不愉快且重复，因为几乎所有日志都具有相同的格式和消息，可能只是方法名有所不同。如果我们能够将此类横切关注点抽象到其他构造中——一种允许在不修改\
    \ Bean 代码的情况下向 Bean 添加功能的构造——那将会优雅得多。\n\n面向切面编程（AOP）^([^(96)](#fn96)) 是一种旨在将横切功能抽象为简单且可定制的构造（或切面）的范式，这些切面可以根据需要开启或关闭。CDI\
    \ 规范为你提供了拦截器的概念，以便在你的应用程序中实现 AOP。CDI 扩展了 Jakarta Interceptors 规范。\n\n在讨论构造型时，你已经看到了你的第一个拦截器。清单\
    \ [4-28](#531256_1_En_4_Chapter.xhtml#PC28) 中展示的 `@Action` 构造型带有 `@Transactional`\
    \ 注解。`@Transactional` 是 JTA^([^(97)](#fn97)) 规范提供的一个内置拦截器，用于拦截对注解 Bean 或方法的调用，并控制此类方法的事务。\n\
    \n实现 CDI 拦截器包含两个部分。第一部分是拦截器绑定注解。这个注解是拦截器的客户端将使用的。例如，`@Transactional` 注解是事务拦截器的一部分。另一部分是将该注解链接到实现拦截器方法的\
    \ Bean。\n\n### 拦截器注解\n\n对于 `jwallet`，我们有一个需求：当某些方法被调用时，记录当前登录用户的名称、日期和时间。你需要使用拦截器绑定注解来注解那些需要被记录日志的选定方法。拦截器绑定类则负责实现记录规定信息的实际过程。对于我们的日志记录拦截器需求，清单\
    \ [4-32](#531256_1_En_4_Chapter.xhtml#PC32) 展示了拦截器绑定注解。\n\n```\n@Inherited\n@Target({TYPE,\
    \ METHOD})\n@Retention(RUNTIME)\n@InterceptorBinding\npublic @interface Logged\
    \ {\n}\n清单 4-32\n展示日志记录拦截器绑定注解\n```\n\n清单 [4-32](#531256_1_En_4_Chapter.xhtml#PC32)\
    \ 展示了 `@Logged` 拦截器绑定注解。这是一个普通的 Java 注解，带有来自 Jakarta Interceptors 规范的 `@InterceptorBinding`\
    \ 注解。有了这个注解，我们现在需要将其与一个将执行注解实际工作的 Bean 关联起来。清单 [4-33](#531256_1_En_4_Chapter.xhtml#PC33)\
    \ 展示了拦截器绑定 Bean `LoggingBean` 如何实现该拦截器。"
  raw: 'A bean can override the scope associated with a stereotype by declaring its
    own scope. A bean declared scope overrides the scope associated with its stereotype.
    For instance, if the WalletService explicitly declares another scope in addition
    to the stereotype, then the scope declared by the WalletService takes precedence
    over the scope declared by the stereotype. You cannot associate qualifiers with
    a stereotype apart from the built-in @Named qualifier . Associating a stereotype
    with a qualifier other than @Named results in a CDI definition error. You can
    also associate stereotypes with other stereotypes. In doing so, the second stereotype
    inherits all the metadata of the first stereotype.


    ## Lifecycle Callbacks


    Contextual instances of CDI beans are fully managed by the container – from creation
    to destruction. However, there are times when you would want to carry out some
    prep work right after a bean is instantiated, or just before it is destroyed.
    In both cases, there are lifecycle callbacks you hook into for accomplishing such
    tasks. These lifecycle callbacks are automatically called by the container on
    your behalf at the appropriate time.


    ### @PostConstruct


    To perform some custom prep work immediately after a bean is instantiated, you
    can annotate a method with @PostConstruct. The method must return void and not
    take any parameters (except for interceptors). It can be a public, private, or
    package private method. It must not be static. The annotated method will be called
    by the container immediately after the bean is instantiated and all dependencies
    of the bean have been duly instantiated. Listing [4-31](#531256_1_En_4_Chapter.xhtml#PC31)
    shows a postconstruct lifecycle callback method in the SecurityManager.


    ```

    @ApplicationScoped

    @Singleton

    @Startup

    public class SecurityManager {

    @Inject

    UserService userService;

    @Inject

    UserSession userSession;

    @PostConstruct

    private void init() {

    //Do prep work.

    }

    }

    Listing 4-31

    showing the @PostConstruct method in SecurityManager

    ```


    Listing [4-31](#531256_1_En_4_Chapter.xhtml#PC31) shows the SecurityManager with
    a lifecycle callback method annotated @PostConstruct. This method will be called
    by the container before the contextual instance of the bean is put into service
    but after the bean dependencies have been initialized. In this example, the method
    will be called only after userService and userSession beans have been fully initialized
    by the container. Because this bean is application scoped, the init lifecycle
    callback method will only be called once – first time the bean is created and
    just before it’s put into service. Or more technically, before the first proxy
    method is delegated to the (only) instance of the SecurityManager.


    ### @PreDestroy


    @PreDestroy is the opposite of @PostConstruct. A method annotated with @PreDestroy
    will be called by the container when the instance of the bean in which the method
    is declared is about to be destroyed by the container. @PreDestroy is typically
    used to release resources like files that the bean instance might be holding on
    to. The restrictions of @PostConstruct callback methods equally apply to @PreDestroy
    callback methods.


    ## CDI Interceptors


    Often in application development, you find that there are certain orthogonal services
    that some beans require that are not core to their functionality. For instance,
    an application could require some form of custom logging for calls to certain
    methods. Logging is a cross-cutting concern in the sense that more than one bean
    might require it.


    Adding copious log messages to methods in our beans could get very unpleasant
    and repetitive quite fast, because almost all the logging will have the same format
    and message, without perhaps just a change in the method name. It would be much
    more elegant if we could abstract such cross-cutting concerns into some other
    construct – something that allows adding functionality to beans without modifying
    bean code.


    Aspect-oriented programming (AOP) ^([^(96)](#fn96)) is a paradigm that seeks to
    solve the issue of abstracting cross-cutting functionalities into a simple and
    customizable construct (or aspects) that can be turned on or off as and when needed.
    The CDI specification provides you with the concept of interceptors to implement
    AOP in your applications. CDI extends the Jakarta Interceptors specification.


    You have already seen your first interceptor when we looked at stereotypes. The
    @Action stereotype, shown in Listing [4-28](#531256_1_En_4_Chapter.xhtml#PC28),
    has the @Transactional annotation. @Transactional is a built-in interceptor provided
    by the JTA^([^(97)](#fn97)) specification for intercepting calls to annotated
    beans or methods and controlling transactions for such methods.


    There are two parts to implementing CDI interceptors. The first is an interceptor
    binding annotation. This annotation is what clients of the interceptor will use.
    For instance, the @Transactional annotation is one part of the transactional interceptor.
    The other part is linking that annotation to a bean that implements the interceptor
    method.


    ### The Interceptor Annotation


    For jwallet, we have a requirement to log the name of the currently logged in
    user, date, and time when certain methods are invoked. The interceptor binding
    annotation is what you will need to annotate selected methods that should be logged.
    The interceptor binding class is what implements the actual process of logging
    the stipulated information. For our logging interceptor requirement, Listing [4-32](#531256_1_En_4_Chapter.xhtml#PC32)
    shows the interceptor binding annotation.


    ```

    @Inherited

    @Target({TYPE, METHOD})

    @Retention(RUNTIME)

    @InterceptorBinding

    public @interface Logged {

    }

    Listing 4-32

    showing the logging interceptor binding annotation

    ```


    Listing [4-32](#531256_1_En_4_Chapter.xhtml#PC32) shows the @Logged interceptor
    binding annotation . This is a plain Java annotation with the @InterceptorBinding
    annotation from the Jakarta Interceptors specification. With the annotation in
    place, we now need to associate it with a bean that will do the actual work of
    the annotation. Listing [4-33](#531256_1_En_4_Chapter.xhtml#PC33) shows the interceptor
    binding bean LoggingBean implement the interceptor.'
  trans: '

    Bean 可以通过声明自己的作用域来覆盖与某个原型关联的作用域。Bean 声明的作用域会覆盖其原型关联的作用域。例如，如果 `WalletService`
    除了原型之外还显式声明了另一个作用域，那么 `WalletService` 声明的作用域将优先于原型声明的作用域。除了内置的 `@Named` 限定符之外，你不能将限定符与原型关联。将原型与除
    `@Named` 之外的限定符关联会导致 CDI 定义错误。你还可以将原型与其他原型关联。这样做时，第二个原型会继承第一个原型的所有元数据。


    ## 生命周期回调


    CDI Bean 的上下文实例由容器完全管理——从创建到销毁。然而，有时你可能希望在 Bean 实例化后立即执行一些准备工作，或者在其销毁前执行一些操作。在这两种情况下，你都可以通过钩入生命周期回调来完成这些任务。这些生命周期回调会在适当的时候由容器自动为你调用。


    ### @PostConstruct


    要在 Bean 实例化后立即执行一些自定义的准备工作，你可以使用 `@PostConstruct` 注解一个方法。该方法必须返回 `void` 且不接受任何参数（拦截器除外）。它可以是
    public、private 或包私有方法，且不能是静态的。被注解的方法将在 Bean 实例化且其所有依赖项都已正确实例化后，由容器立即调用。清单 4-31
    展示了 `SecurityManager` 中的一个 postconstruct 生命周期回调方法。


    ```

    @ApplicationScoped

    @Singleton

    @Startup

    public class SecurityManager {

    @Inject

    UserService userService;

    @Inject

    UserSession userSession;

    @PostConstruct

    private void init() {

    //执行准备工作。

    }

    }

    清单 4-31

    展示 SecurityManager 中的 @PostConstruct 方法

    ```


    清单 4-31 展示了 `SecurityManager` 中一个使用 `@PostConstruct` 注解的生命周期回调方法。该方法将在 Bean 的上下文实例投入使用之前，但在其依赖项初始化之后由容器调用。在此示例中，该方法仅在
    `userService` 和 `userSession` Bean 被容器完全初始化之后才会被调用。由于此 Bean 是应用作用域的，因此 `init`
    生命周期回调方法只会被调用一次——即在 Bean 首次创建且即将投入使用之前。或者更技术地说，在第一个代理方法被委托给 `SecurityManager`
    的（唯一）实例之前。


    ### @PreDestroy


    `@PreDestroy` 与 `@PostConstruct` 相反。当声明了该方法的 Bean 实例即将被容器销毁时，容器会调用使用 `@PreDestroy`
    注解的方法。`@PreDestroy` 通常用于释放 Bean 实例可能持有的资源，例如文件。`@PostConstruct` 回调方法的限制同样适用于 `@PreDestroy`
    回调方法。


    ## CDI 拦截器


    在应用程序开发中，你经常会发现某些 Bean 需要一些与其核心功能无关的正交服务。例如，一个应用程序可能需要对某些方法的调用进行某种形式的自定义日志记录。日志记录是一个横切关注点，因为可能有多个
    Bean 都需要它。


    在我们的 Bean 方法中添加大量的日志消息可能会很快变得非常令人不悦且重复，因为几乎所有日志记录都具有相同的格式和消息，可能只是方法名有所变化。如果我们能够将此类横切关注点抽象到其他结构中——即允许在不修改
    Bean 代码的情况下向 Bean 添加功能的结构——那将会优雅得多。


    面向切面编程（AOP）^(⁹⁶) 是一种范式，旨在解决将横切功能抽象为简单且可定制的结构（或切面）的问题，这些结构可以根据需要启用或禁用。CDI 规范为你提供了拦截器的概念，以便在你的应用程序中实现
    AOP。CDI 扩展了 Jakarta Interceptors 规范。


    在讨论原型时，你已经看到了你的第一个拦截器。清单 4-28 中展示的 `@Action` 原型带有 `@Transactional` 注解。`@Transactional`
    是 JTA^(⁹⁷) 规范提供的一个内置拦截器，用于拦截对被注解的 Bean 或方法的调用，并控制这些方法的事务。


    实现 CDI 拦截器包含两个部分。第一部分是拦截器绑定注解。这个注解是拦截器的客户端将使用的。例如，`@Transactional` 注解是事务拦截器的一部分。另一部分是将该注解与实现拦截器方法的
    Bean 关联起来。


    ### 拦截器注解


    对于 jwallet，我们有一个需求：当某些方法被调用时，记录当前登录用户的名称、日期和时间。你需要使用拦截器绑定注解来注解那些需要被记录日志的选定方法。拦截器绑定类则负责实现记录规定信息的实际过程。对于我们的日志记录拦截器需求，清单
    4-32 展示了拦截器绑定注解。


    ```

    @Inherited

    @Target({TYPE, METHOD})

    @Retention(RUNTIME)

    @InterceptorBinding

    public @interface Logged {

    }

    清单 4-32

    展示日志记录拦截器绑定注解

    ```


    清单 4-32 展示了 `@Logged` 拦截器绑定注解。这是一个普通的 Java 注解，带有来自 Jakarta Interceptors 规范的 `@InterceptorBinding`
    注解。有了这个注解，我们现在需要将其与一个将执行注解实际工作的 Bean 关联起来。清单 4-33 展示了拦截器绑定 Bean `LoggingBean`
    如何实现该拦截器。

    '
- fmt: '### The Interceptor Bean


    ```

    @Interceptor

    @Logged

    @Priority(Interceptor.Priority.APPLICATION)

    public class LoggingBean {

    @Inject

    Logger logger;

    @AroundInvoke

    //@AroundConstruct

    public Object logMethod(final InvocationContext invocationContext) throws Exception
    {

    logger.log(Level.FINE,

    () -> String.format("Method %s invoked at %s",   invocationContext.getMethod().getName(),

    LocalDateTime.now(ZoneOffset.UTC)));

    return invocationContext.proceed();

    }

    }

    Listing 4-33

    showing the LoggingBean interceptor class

    ```


    Listing [4-33](#531256_1_En_4_Chapter.xhtml#PC33) shows the `LoggingBean` interceptor
    class. It is annotated `@Interceptor` and `@Logged`. These two annotations make
    this class an interceptor bean and link the `@Logged` annotation with it, respectively.
    This means whenever the `@Logged` annotation is used anywhere, the actual work
    to be done during interception will be done by a method in the `LoggingBean` class.
    It is also annotated with `@Priority(Interceptor.Priority.APPLICATION)`. This
    is how interceptors are activated and ordered in Jakarta EE. The `@Priority` takes
    an `int` value; the lower the `int` value, the higher priority the annotation
    has.


    The `Interceptor.Priority.APPLICATION` is a constant for the `int` value of 2000.
    If another interceptor sets its `@Priority` value to a lower `int`, that interceptor
    will take precedence in terms of invocation sequence over the `@Logged` interceptor.
    In the past, interceptors needed to be registered in an XML config file. But that
    changed in Java EE 7. Now you use the `@Priority` annotation to activate and order
    interceptors.


    The `LoggingBean` then injects the `Logger` class being produced from our producer
    method and declares a method, `logMethod`, that takes a single parameter – `InvocationContext`.
    This parameter will be injected by the CDI container when it invokes the method
    to carry out an interception. At runtime, the container will provide an implementation
    of the `InvocationContext` interface to the method. The interface provides contextual
    information about the intercepted invocation and also has methods to control the
    behavior of the invocation chain. For the log, the `InvocationContext#getMethod#getName`
    method is called to get the name of the method being intercepted.


    The `logMethod` is annotated with `@AroundInvoke`. This annotation tells the container
    at what point we would want our interceptor to be put into action. `@AroundInvoke`,
    as the name implies, means that the interceptor should be dispatched just before
    an annotated method is invoked. So just before any method annotated with `@Logged`
    is invoked by the container, the `logMethod` will be automatically invoked to
    carry out the function of the interception. The method can invoke any service
    that the target method it is interposing on can invoke.


    Another annotation that can be used to intercept beans is `@AroundConstruct`.
    This annotation will cause the container to invoke the annotated method just before
    the construct of a target bean is invoked. Generally, you would want to be careful
    with `@AroundConstruct` because the `InvocationContext` bean passed to the interceptor
    method has access to all the parameters of the constructor. So you should exercise
    caution when using it.


    A method annotated `@AroundInvoke` must return an `Object`. As shown in Listing
    [4-33](#531256_1_En_4_Chapter.xhtml#PC33), method `logMethod` returns `Object`
    from calling the `InvocationContext#proceed()` method. This call signals to the
    container that this method is done and execution should proceed to the next interceptor
    in the chain, if any or else proceed to call the actual method. An `@AroundConstruct`
    annotated method returning an `Object` will cause execution to move to the next
    interceptor in the chain or else proceed to instantiate the interposed bean.


    With our interceptor fully declared, we can use it by annotating classes or methods
    with it. Listing [4-34](#531256_1_En_4_Chapter.xhtml#PC34) shows the `@Logged`
    interceptor applied to the `WalletService`.


    ```

    @Action

    @Logged

    public class WalletService {

    }

    Listing 4-34

    showing the @Logged annotation applied to WalletService

    ```


    Listing [4-34](#531256_1_En_4_Chapter.xhtml#PC34) shows `@Logged` interceptor
    applied to `WalletService`. Similarly, Listing [4-35](#531256_1_En_4_Chapter.xhtml#PC35)
    shows the `@Logged` annotation applied to the `UserService`.


    ```

    @Action

    @Logged

    public class UserService {

    }

    Listing 4-35

    showing the @Logged interceptor applied to the UserService

    ```


    Listing [4-35](#531256_1_En_4_Chapter.xhtml#PC35) shows the `@Logged` interceptor
    applied to the `UserService`. Because the interceptor is applied to the beans
    at the class level, all methods invoked on either class contextual instance will
    be intercepted by our interceptor. We could also have selectively annotated only
    certain methods in the beans since the `@Target` of the `@Logged` interceptor
    is both `TYPE` and `METHOD`.


    ### Using Stereotypes with Interceptors


    You will immediately notice that both intercepted beans have the exact same set
    of annotations: one a stereotype and the other an interceptor. In the section
    on stereotypes, we discussed the whole point of them is to abstract away common
    architectural patterns. Therefore, instead of separately annotating each bean
    with `@Logged`, we can add the interceptor to the `@Action` stereotype. This way,
    the interceptor automatically gets applied to all beans that are annotated with
    the stereotype. The interceptor can still be used separately to interceptor methods
    or the whole class. Listing [4-36](#531256_1_En_4_Chapter.xhtml#PC36) shows the
    `@Logged` interceptor annotation added to the `@Action` stereotype.


    ```

    @Stereotype

    @RequestScoped

    @Transactional

    @Logged

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    Listing 4-36

    showing the @Action annotation being associated with @Logged

    ```


    Listing [4-36](#531256_1_En_4_Chapter.xhtml#PC36) shows the `@Action` stereotype
    annotated with the `@Logged` interceptor. This now associates the interceptor
    with the stereotype such that any bean that is annotated with the stereotype is
    also automatically intercepted. Consequently, we can remove the `@Logged` annotation
    from `WalletService` and `UserService` beans. Interceptors are a straightforward
    way of implementing cross-cutting concerns in an application. However, to extend
    or to override a bean method, CDI has another construct that can be used for that.'
