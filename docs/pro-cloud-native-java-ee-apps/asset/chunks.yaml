  trans: "\n### 字段注入点\n\n字段注入点是我们目前已经看到的方式。它只需在类中为给定 bean 类型的字段添加 `@Inject` 注解。在代码清单\
    \ 4-12 中，`Conversation` 类型的字段 `conversation` 被标注了 `@Inject`。正如我们已经讨论过的，容器会负责将注解字段类型的正确上下文实例注入到变量\
    \ `conversation` 中。容器有效地保证了我们在运行时调用 `conversation` 变量上的方法时不会出现 `NullPointerException`。字段注入可以说是最流行，也是我们使用\
    \ CDI 请求上下文实例的首选方式。\n\n### 构造器注入\n\nCDI 中可用的第二种注入点是构造器注入点。还记得我们将 CDI bean 定义为任何具有无参构造器的\
    \ Java 类，或者至少有一个 CDI 可注入构造器的 bean 吗？构造器注入是指你使用 `@Inject` 注解 bean 的构造器，并将 CDI 可以实例化的\
    \ bean 作为参数传入。代码清单 4-12 展示了重构后的 `SignupManager` 对话作用域 bean，它使用构造器注入来实例化 `conversation`\
    \ 字段。\n\n```\n@ConversationScoped\npublic class SignupManager implements Serializable\
    \ {\n    Conversation conversation;\n    @Inject\n    public SignupManager(final\
    \ Conversation conversation) {\n        this.conversation = conversation;\n  \
    \  }\n}\n代码清单 4-12\n展示使用构造器注入点的 SignupManager\n```\n\n代码清单 4-12 展示了 `SignupManager`\
    \ bean 使用构造器注入来实例化 `conversation` 字段。这个构造器注入将由容器自动调用。即使我们的 `SignupManager` 没有无参构造器，由于使用了构造器注入，它仍然是一个完全有效的\
    \ CDI bean。\n\n需要注意的是，使用构造器注入时，传递给构造器的所有参数都必须是 CDI bean，或者至少是容器知道如何实例化的 bean（例如，通过生产者方法，我们将在后面的章节中讨论）。如果任何一个构造器参数不是有效的\
    \ CDI bean，应用程序将无法通过 CDI 启动验证。此外，每个 bean 只允许有一个构造器注入。你仍然可以拥有一个无参构造器和其他构造器。但是，拥有多个构造器注入将导致应用程序在启动时出错。\n\
    \n构造器注入的一个很好的用途是用于测试。当你需要为控制器编写单元测试时（例如，使用 Mockito^(⁹⁵)），你可以使用构造器注入在运行时初始化你的 bean\
    \ 字段。在你的测试中，你仍然可以像处理任何 POJO 构造器一样，手动调用同一个构造器，并手动传入各种参数。\n\n### 方法注入\n\n方法注入点是指一个方法被标注了\
    \ `@Inject`。与构造器注入类似，该方法的所有参数都必须是 CDI bean，或者至少容器必须知道如何初始化它们。方法注入被称为初始化器方法。容器会自动调用这些方法，类似于构造器注入。\n\
    \n以上就是 CDI 中的三种主要注入点。然而，除此之外，还有另外两种注入点，其传入的参数是由 CDI 实例化的，无需显式的 `@Inject` 注解。它们是生产者方法和观察者方法。我们将在后面的章节中介绍这两种结构。\n\
    \n## Jakarta 企业 Bean\n\nJakarta 企业 Bean，以前称为 Enterprise JavaBeans 或 EJB，是一个早于\
    \ CDI 规范的规范。它是一个面向组件的规范，用于创建实现业务逻辑的 bean。它有自己的依赖解析机制。使用 `@Stateless`、`@Stateful`\
    \ 和 `@Singleton` 中的任何一个注解标注一个 Java 类，就会使该类成为一个默认具有事务性、池化和安全性的组件。\n\nCDI 的出现以及在\
    \ Jakarta EE 平台上需要一个核心的控制反转实现，意味着 CDI 必须重新实现 EJB 中的许多特性。然而，这两个规范已经协调一致，使得 CDI\
    \ 成为创建业务层组件的单一核心入口点。尽管 CDI 是创建业务服务的首选方式，但 Jakarta 企业 Bean 仍然被广泛使用，并且在可预见的未来仍将如此。\n\
    \n所有 Jakarta 企业 Bean 自动成为 CDI bean。使用 Jakarta 企业 Bean 定义注解标注一个 bean，会使该 bean 同时成为一个\
    \ CDI bean 和一个 Jakarta 企业 Bean，并拥有这两个规范的所有特性。从 CDI 的角度来看，Jakarta 企业 Bean 被称为会话\
    \ bean。代码清单 4-13 展示了我们的 `SecurityManager`，现在多了两个注解。\n\n```\n@ApplicationScoped\n\
    @Singleton\n@Startup\npublic class SecurityManager {\n    @Inject\n    UserService\
    \ userService;\n    public void saveUser(final CreateUserRequest request) {\n\
    \        userService.createUser(request);\n    }\n}\n代码清单 4-13\n展示带有 EJB 注解的 SecurityManager\n\
    ```\n\n代码清单 4-13 展示了 `SecurityManager` bean 被标注了两个 Jakarta 企业 Bean 注解——`@Singleton`\
    \ 和 `@Startup`。`@Singleton` 注解使这个 bean 成为一个单例 Jakarta 企业 Bean。`@Singleton` 注解与\
    \ `@ApplicationScoped` 注解在某种意义上没有太大区别，两者都导致在应用程序运行的生命周期内只存在该 bean 的一个实例。\n\n`@Startup`\
    \ 注解标记 `SecurityManager` 为立即实例化。这意味着我们的 bean 实例将在应用程序启动序列期间被创建。`@Singleton` 注解还默认使在\
    \ `SecurityManager` 上下文实例上调用的每个方法都具有事务性。对于每个方法调用，如果不存在事务，容器将加入或创建事务。\n\n你可以使用立即实例化的\
    \ Jakarta 企业 Bean 单例，在你的应用程序所有其他组件准备就绪之前，执行某种形式的提前内务处理。例如，你需要在应用程序启动时准备好某种形式的数据，但你需要从外部服务加载这些数据。在这种情况下，你可以立即实例化一个单例并执行该调用。\n\
    \n如你所见，来自两个 API 规范的元数据彼此完全兼容。然而，在全新开发的应用程序中，你很可能几乎只使用 CDI。但是，仍然有大量现有代码仍在使用 Jakarta\
    \ 企业 Bean 元数据。将此类代码维护或迁移到 CDI 应该相当简单，因为这两个规范可以很好地协同工作。我们将在关于 Jakarta 持久化的章节中，在深入讨论事务和事务边界时，再回到\
    \ Jakarta 企业 Bean。现在，让我们通过查看限定符来继续我们的 CDI 讨论。\n"
- fmt: '# Qualifiers


    Qualifiers are a way to give the CDI container hints on the exact bean type to
    use to satisfy a given dependency injection point. In Listing [4-5](#531256_1_En_4_Chapter.xhtml#PC5),
    we injected the `WalletResource` into the `HelloResourceImpl`. Listing [4-14](#531256_1_En_4_Chapter.xhtml#PC14)
    shows the `WalletResource` interface.


    ```

    @RegisterRestClient(baseUri = BASE_URI)

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    public interface WalletResource {

    String BASE_URI = "http://wallet:3001/wallet/api";

    }

    ```


    Listing [4-14](#531256_1_En_4_Chapter.xhtml#PC14) shows the `WalletResource` interface.
    It is a REST endpoint declaration that uses the `@RegisterRestClient()` from the
    Eclipse MicroProfile REST Client API (there’s a full chapter on this later in
    the book) to automatically create a REST client for this Jakarta REST resource.


    As shown in Listing [4-5](#531256_1_En_4_Chapter.xhtml#PC5), we injected this
    bean by its interface into `HelloResourceImpl`. Trying to start the application
    will fail with the error “Ambiguous dependencies for type `WalletResource` with
    qualifiers `@Default`.” This is because the `WalletResource` interface has two
    implementations in the application. One is the `WalletResourceImpl` that is part
    of our application code. The other is the REST Client that is automatically generated
    by the Eclipse MicroProfile REST Client.


    Because there is more than one possible implementation of the interface, the CDI
    container will need to know exactly which concrete implementation to use at runtime
    to satisfy the injection point declared in `HelloResourceImpl`. And since we didn’t
    specify any qualifiers, the default qualifier `@Default` isn’t enough to tell
    the container which implementation to use, so during application boot validation,
    the runtime throws an error and truncates application boot.


    To fix this, let us declare a qualifier for our `WalletResource` interface. Listing
    [4-15](#531256_1_En_4_Chapter.xhtml#PC15) shows a qualifier declaration for the
    `WalletResource`.


    ```

    @Qualifier

    @Retention(RUNTIME)

    @Target({FIELD, TYPE, METHOD, PARAMETER})

    public @interface Wallet {

    }

    ```


    Listing [4-15](#531256_1_En_4_Chapter.xhtml#PC15) shows the `@Wallet` qualifier
    declaration. A qualifier in CDI is a normal Java annotation with the annotation
    `@Qualifier` from the CDI API. The `@Wallet` qualifier sets the `@Target` values
    to field, type, method, and parameter. This means it can be used on a field, class,
    method, or parameter. With the annotation declared, we now need to associate the
    qualifier with a concrete type. In this example, we want to associate the `@Wallet`
    qualifier with our `WalletResource` implementation. Listing [4-16](#531256_1_En_4_Chapter.xhtml#PC16)
    shows the use of the `@Wallet` qualifier on the `WalletResourceImpl`.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @Wallet

    public class WalletResourceImpl implements WalletResource {

    @Inject

    WalletService walletService;

    }

    ```


    Listing [4-16](#531256_1_En_4_Chapter.xhtml#PC16) shows the `@Wallet` qualifier
    associated with the `WalletResourceImpl`. With this in place, we now have a mechanism
    to tell the CDI container the exact implementation of `WalletResource` to inject
    into an injection point that is declared by the `WalletResource` interface type.
    Listing [4-17](#531256_1_En_4_Chapter.xhtml#PC17) shows the `WalletResource` injection
    point in the `HelloResourceImpl` qualified with the `@Wallet` qualifier.


    ```

    @Path("hello")

    public class HelloResourceImpl implements HelloResource {

    @Inject

    @Wallet

    WalletResource walletResource;

    }

    ```


    Listing [4-17](#531256_1_En_4_Chapter.xhtml#PC17) shows us qualifying the `walletResource`
    field with the `@Wallet` qualifier. With these in place, we are telling the container
    to inject a contextual instance of the concrete type `WalletResourceImpl` into
    field `walletResource` in `HelloResourceImpl`. After this construct, the application
    should boot up, and no validation errors should be thrown.


    ## `@Default` Qualifier


    Earlier in this section, we saw the error message thrown by the container when
    there was an ambiguous dependency resolution with the `walletResource` field.
    The message read “Ambiguous dependencies for type `WalletResource` with qualifiers
    `@Default`.” The `@Default` qualifier mentioned in that message is a built-in
    qualifier that every bean has in the absence of any explicit qualifier. It is
    implicitly annotated on each bean type by the runtime as long as that bean does
    not have any qualifier declared or associated with it. `@Default` is effectively
    the default qualifier.


    ## Other Built-In Qualifiers


    The Jakarta EE platform, along with the Eclipse MicroProfile project, comes with
    a number of built-in qualifiers. In the section “Resolution by Name”, we saw the
    `@Named` qualifier. This qualifier takes an optional `String` value that becomes
    the name of the bean in an ExpressionLanguage. The `@Named` is a built-in qualifier.


    Another built-in qualifier is the `@RestClient` qualifier. In Listing [4-14](#531256_1_En_4_Chapter.xhtml#PC14),
    we saw the `WalletResource` declaration as having the annotation `@RegisterRestClient(baseUri
    = BASE_URI)`. This annotation tells the Eclipse MicroProfile REST client to create
    an implementation of this bean for us at runtime. How do you get a hold of this
    created bean? Listing [4-18](#531256_1_En_4_Chapter.xhtml#PC18) shows the `HelloResourceImpl`
    again, but this time, with an additional injection of the same `WalletResource`
    type, but with a different qualifier.


    ```

    @Path("hello")

    public class HelloResourceImpl implements HelloResource {

    @Inject

    @Wallet

    WalletResource walletResource;

    @Inject

    @RestClient

    WalletResource restClient;

    }

    ```


    Listing [4-18](#531256_1_En_4_Chapter.xhtml#PC18) shows an additional field declaration
    of the same `WalletResource` type qualified with the `@RestClient` qualifier from
    the Eclipse MicroProfile project. The `restClient` variable will have a MicroProfile-generated
    implementation of the `WalletResource` injected into it at runtime. The `@RestClient`
    annotation will give us a contextual instance that implements all the methods
    of the interface and is ready to use. Of note is that both the `walletResource`
    and `restClient` fields are of the same type – `WalletResource`. Both fields have
    been defined by their interface. In the absence of qualifiers, the container would
    not know how to handle such ambiguous dependency declarations.


    The qualifier construct in CDI is a deceptively simple yet powerful mechanism
    that helps you write very clean, readable, and testable code with little effort.
    We will continue to discuss and use qualifiers through the rest of this chapter
    and book. Next up, let us take a look at the CDI concept of producers. All the
    beans we have seen so far are beans that we have declared from scratch in one
    way or another – either as interfaces or concrete Java classes. However, you will
    sometimes find yourself needing to transform beans that are not part of your code
    into CDI beans in your applications.'
