    # 3. Enterprise Applications – Architecture


    Modern enterprise applications have evolved over the years to become cloud native,
    resilient, fault tolerant, and reliable. Users of such applications have come
    to expect the application to always be available, irrespective of network latency
    and other possible failures that could occur during the runtime of an application.


    In order to meet such expectations, a number of application development patterns
    have evolved to help application developers craft applications that meet current
    deployment standards and the needs of modern users. The goal of this chapter is
    to explore a number of such patterns, namely, dependency injection, REST web services,
    data persistence, and cloud-native functionalities and constructs within the context
    of the reference application for this book.'
