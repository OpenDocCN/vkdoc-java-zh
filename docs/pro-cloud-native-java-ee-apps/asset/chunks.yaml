  trans: '

    #### 认证客户端


    MicroProfile JWT 运行时会利用颁发服务器或授权机构提供的公钥，自动验证请求头中传递的 JWT 令牌。在我们的上下文中，这就是 Keycloak
    发挥作用的地方。我们使用 Keycloak 作为颁发机构，代表我们颁发 JWT 令牌。


    典型的企业应用通常包含两层：客户端或 UI 层（例如使用 Angular 或 Vue 编写）以及服务器或资源层（即本书目前所介绍的部分）。客户端层是服务器或资源层的“用户”或客户端。最终用户通常与
    UI 层交互。当最终用户点击 UI 中的按钮（例如进行货币转换）时，UI 会向后端或服务器发送请求。UI 向服务器发送的这个请求将包含 JWT 令牌。但 UI
    是如何获取令牌的呢？


    当应用像我们这样（并且推荐这样）使用 Keycloak 时，用户点击 UI 进行注册，该用户创建过程将委托给 Keycloak。因此，用户凭证将存储在 Keycloak
    中。当用户通过 UI 登录时，UI 会将用户重定向到 Keycloak 进行登录。Keycloak 对用户进行身份验证，然后将用户重定向回 UI。此后，已登录用户执行的任何需要调用后端服务器的操作，UI
    都可以向 Keycloak 请求一个 JWT 令牌，该令牌将随已登录用户执行的每个请求一起转发到服务器。


    这种架构使后端服务器（在本例中即我们的 Jakarta EE 应用）完全无需了解用户的任何信息。我们的资源只需要一个有效的令牌，而相应的方法将要求当前执行用户拥有特定的角色。所有这些信息都会随每次调用发送到服务器。这样，UI
    层和后端服务器层就完全解耦且无状态。它们之间不共享任何状态。服务器所需的每项安全信息都随每个客户端请求一起发送。


    捆绑的 Keycloak 中有一个示例用户，用户名为 `max`，密码为 `max`，可用于获取 JWT。清单 11-3 中的示例 cURL 调用可以发送到
    Keycloak 的 open-id/connect 端点以获取 JWT 令牌。清单 11-1 中显示的 JWT 就是通过此调用生成的。


    ```

    curl --request POST --url http://localhost:5050/realms/jwallet/protocol/openid-connect/token
    \

    --header ''Content-Type: application/x-www-form-urlencoded'' \

    --data realm=jwallet \

    --data grant_type=password \

    --data client_id=jwallet-service \

    --data username=max \

    --data password=max

    清单 11-3

    示例 Keycloak 调用

    ```


    ##### 提供公钥


    MicroProfile JWT 运行时会利用颁发服务器（此处为 Keycloak）的公钥自动验证和认证传递的 JWT。MicroProfile JWT 规范要求提供公钥或用于获取公钥的
    URL。该规范定义了两个 MicroProfile Config 属性，用于将颁发机构或服务器的公钥传递给 MicroProfile JWT 运行时。这两个属性是
    `mp.jwt.verify.publickey` 和 `mp.jwt.verify.publickey.location`。


    第一个属性允许将公钥文本本身作为属性值传递。第二个属性允许指定一个 URL，公钥可以从该 URL 下载。同时指定这两个属性将导致部署异常。`mp.jwt.verify.issuer`
    属性也用于验证 `iss`（颁发者）声明的值。JWT 中传递的值必须与属性中传递的值匹配。


    清单 11-4 显示了 jwallet 中使用的公钥和颁发者属性。由于 Keycloak 作为容器与应用捆绑在一起，我们提供了一个指向 Keycloak 资源的
    URL，用于加载公钥。


    ```

    mp.jwt.verify.publickey.location=http://keycloak:5050/realms/jwallet/protocol/openid-connect/certs

    mp.jwt.verify.issuer=http://localhost:5050/realms/jwallet

    清单 11-4

    传递公钥 URL

    ```


    调用 `http://localhost:5050/realms/jwallet/protocol/openid-connect/certs` 会返回清单
    11-5 中所示的示例公钥。


    ```

    {

    "keys": [

    {

    "kid": "D2GqblISv3cRivhvdTtbjZT86VAFyAiOopdiodv-BYI",

    "kty": "RSA",

    "alg": "RS256",

    "use": "sig",

    "n": "3buUZWr0Fp9Rm85GPIAoYfiqNapj2DxW8gjMWOjPEgg4KUqg3tSC6G0kAzPJ70zMmfe-b3CWBQvmNXWIUZCXPlnBuVKyWcowBQk7QRnEkOuw5vL6bYU5I2DA_1CPIn4v3g4ox0GmjOwDflrlb2vlPw76BpHIKd-EUI-mkm-Yv6H60BZmo7iRyVF7TNGVYgIg0xrVFPIvTDV2yvZKO4qG6qYWk2khMPqXm-725QBp2wgWDhowibjuoOCW1S5BCr5qc3N-uaPej7Nbcub80v1XGJ7feHqg4TXtNDCSikTAGCa0geW3eP1wRoE_9QYzKlN45LI8LxhncUl58WpdulgblQ",

    "e": "AQAB",

    "x5c": [

    ""

    ],

    "x5t": "uej9O_JH-rlIpJVQMTBiD6kf-1k",

    "x5t#S256": "szj37ByL-T6Plrmzbgb7Bnq32KsYtGp_B_dDOYGEWcI"

    },

    {

    "kid": "B5uP6pwSkS-wvKmh31ZeEmeXNKU_UaO9EfTOeut00NY",

    "kty": "RSA",

    "alg": "RSA-OAEP",

    "use": "enc",

    "n": "sR3wZR9t35zM_sftCb2EbX6_tZo1boubrmnuj8YZ1utCOl2pQGX7v3uz_YHGsAbp-3J3iCt94KliRKA2yYCVi2Ozqd-EEz6GAYxF1HzYghWO-j9jMrNu1N-O8LXVEp21wPdIDsIuCLkqYWZGgoOzY2yyWkVjiHcAu3_LokwufVu-BM9iRY2FZrvgYEHPGZOk5a8hTIHSIx6dXUcU6oZ0etiGdidrIWH5GFXLSZtpcuya-w01_o1Khm97dCtGY3pVasnLgDK6Vguzul1MdpTQHwFI7m3O7uQB0CRtqe8qPnNxVLal_Ow5b5N7YNw5fufEqvLk5Dz-au4TPuFwSSvVrw",

    "e": "AQAB",

    "x5c": [

    ""

    ],

    "x5t": "rU2BclI4blvOQgymzyX0GHmm_Tk",

    "x5t#S256": "Vkv7YeizaqHS23BlvZCJwTSpjpvp55J1PCmE2LtREos"

    }

    ]

    }

    清单 11-5

    示例公钥

    ```


    借助提供的密钥，MicroProfile JWT 运行时会自动验证和认证对应用中所有受保护资源的每个 REST 调用。默认情况下，运行时会从 HTTP `Authorization`
    标头中查找密钥。这可以通过 Config 属性 `mp.jwt.token.header` 配置为其他位置。除非有非常特殊的架构原因需要更改，否则我们建议保留默认设置。

