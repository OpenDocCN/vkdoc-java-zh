    The wallet service is going to be the focal point of discussion for the migration.
    However, everything discussed about it pertains to the other two services. The
    root entry point is the pom.xml shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1).


    ```


    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.wallet

    war


    ${project.groupId}

    jwallet.core

    ${project.version}


    wallet


    Listing 14-1

    Wallet pom.xml

    ```


    The wallet service is one of three distinct microservices that showcase the breakdown
    of a monolith to constituent parts. The root pom file of the wallet service, as
    shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1), declares a parent
    pom file. This parent pom file that is partly shown in Listing [14-1](#531256_1_En_14_Chapter.xhtml#PC1)
    declares all common dependencies for all microservices in the application. For
    instance, it declares the Jakarta EE and MicroProfile dependencies.


    The parent pom file is packaged as a maven pom file that can be consumed or inherited
    by its children. The wallet root pom makes use of the parent to pull in the common
    dependencies. The use of the parent/child inheritance feature of the Maven build
    management tool allows us to keep the root pom file simple. Only a single dependency
    is declared here, which is to the core module.


    The core module allows us to abstract artifacts and functions that are common
    across all services into a single service. For instance, the AbstractEntity Jakarta
    Persistence parent entity class, the AbstractEntityListener class, and the CDI
    @Action stereotype are all declared in the core module. The abovementioned artifacts
    are all discussed in detail in their respective chapters. The wallet service is
    created as a single-unit maven web application. As such, it has all the structures
    of a maven project as shown in Figure [14-1](#531256_1_En_14_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_14_Chapter/531256_1_En_14_Fig1_HTML.jpg)


    A screenshot of a wallet service structure depicts 2 folders under the wallet.
    Dot m v n and s r c. Under s r c, are the folders main and test. The main contains
    4 subfolders.


    Figure 14-1


    Wallet service structure


    As a single-unit, packageable service, it has a Dockerfile, docker-compose.yaml
    file, and Kubernetes descriptor. The Dockerfile allows us to build this service
    as a docker image that can be pushed to any docker registry. Listing [14-2](#531256_1_En_14_Chapter.xhtml#PC2)
    shows the Dockerfile.


    ```

    FROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi

    COPY --chown=1001:0 src/main/liberty/config /config

    COPY --chown=1001:0 src/main/liberty/*.jar /opt/ol/wlp/usr/shared/resources/

    COPY --chown=1001:0 target/*.war /config/apps

    EXPOSE 3001

    RUN configure.sh

    CMD ["/opt/ol/wlp/bin/server", "debug", "defaultServer"]

    Listing 14-2

    Wallet service Dockerfile

    ```'
  trans: '

    #### 可部署单元


    每个微服务都应是一个独立的可部署单元。因此，每个服务本身应是一个完整的应用程序，并配备其自身的测试套件。每个服务都应拥有自己的流水线和 CI/CD 基础设施。所谓可部署单元，是指每个服务都应拥有自己的构建工具文件（如
    `pom.xml`、`build.gradle` 文件），理想情况下，这些文件会继承自一个包含通用库的父文件（如果适用），并且拥有自己的运行时打包文件（如
    `Containerfile`、`Dockerfile`、`docker-compose.yaml` 以及 Kubernetes 清单描述文件）。这是因为每个单元都应能够作为容器实例独立部署，并作为集群中的
    Pod 进行管理。


    #### 通过 REST 进行通信


    所有服务都应通过 HTTP REST 端点暴露以供消费。每个应用程序应将 REST 端点的边界与其实际实现分离。每个服务的客户端应仅了解通过该服务 REST
    基础设施暴露的服务构件。不应向服务的消费客户端暴露任何实现细节。默认的数据交换格式应主要基于 JSON。每个 REST 资源都应受到保护，理想情况下通过 MicroProfile
    JWT 运行时实现。


    #### 分离安全上下文


    每个服务应拥有独立的安全上下文。在 Keycloak 中，每个服务应是应用领域中的一个独立客户端^(¹²¹)。每个服务应拥有自己的一套角色和权限。


    ### 迁移后的示例应用


    结合这些及其他指导原则，让我们来看看本书项目代码中的钱包微服务。该完整应用最初是一个单体应用，允许用户创建不同货币的钱包，获取每个钱包的汇率，并为每个钱包存储每笔交易。


    钱包服务负责处理钱包及其交易。汇率服务使用 MicroProfile REST 客户端处理对汇率服务的外部调用。这里配置了两个外部汇率服务，其中一个作为备用服务，当主服务失败时应自动调用该备用服务。


    此备用功能通过 MicroProfile Fault Tolerance API 进行配置。账户服务层负责处理用户账户。它有一个用于创建账户的 REST 端点，当用户在
    Keycloak 中创建账户时，该端点会通过回调被调用。使用上一节中的指导原则将此应用拆分为微服务，需要至少三个服务：账户服务、汇率服务和钱包服务。


    钱包服务将是本次迁移讨论的焦点。然而，关于它所讨论的一切也适用于其他两个服务。根入口点是清单 14-1 中所示的 `pom.xml`。


    ```

    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.wallet

    war


    ${project.groupId}

    jwallet.core

    ${project.version}


    wallet


    清单 14-1

    钱包服务 pom.xml

    ```


    钱包服务是三个不同的微服务之一，展示了如何将单体应用拆解为各个组成部分。如清单 14-1 所示，钱包服务的根 pom 文件声明了一个父 pom 文件。这个父
    pom 文件（清单 14-1 中部分展示）声明了应用中所有微服务的所有公共依赖项。例如，它声明了 Jakarta EE 和 MicroProfile 依赖项。


    父 pom 文件被打包成一个 Maven pom 文件，可供其子模块使用或继承。钱包根 pom 利用父 pom 来引入公共依赖项。使用 Maven 构建管理工具的父/子继承特性，使我们能够保持根
    pom 文件的简洁。这里只声明了一个依赖项，即对核心模块的依赖。


    核心模块允许我们将所有服务共有的构件和功能抽象到一个单一服务中。例如，`AbstractEntity` Jakarta Persistence 父实体类、`AbstractEntityListener`
    类以及 CDI `@Action` 原型都在核心模块中声明。上述构件均在其各自的章节中详细讨论。钱包服务被创建为一个单模块的 Maven Web 应用程序。因此，它具有
    Maven 项目的所有结构，如图 14-1 所示。


    ![](img/531256_1_En_14_Fig1_HTML.jpg)


    钱包服务结构的截图显示了钱包目录下的两个文件夹：`.mvn` 和 `src`。在 `src` 下，有 `main` 和 `test` 文件夹。`main`
    包含 4 个子文件夹。


    图 14-1

    钱包服务结构


    作为一个单模块、可打包的服务，它拥有一个 `Dockerfile`、`docker-compose.yaml` 文件和 Kubernetes 描述文件。`Dockerfile`
    允许我们将此服务构建为一个 Docker 镜像，该镜像可以推送到任何 Docker 仓库。清单 14-2 展示了该 `Dockerfile`。


    ```

    FROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi

    COPY --chown=1001:0 src/main/liberty/config /config

    COPY --chown=1001:0 src/main/liberty/*.jar /opt/ol/wlp/usr/shared/resources/

    COPY --chown=1001:0 target/*.war /config/apps

    EXPOSE 3001

    RUN configure.sh

    CMD ["/opt/ol/wlp/bin/server", "debug", "defaultServer"]

    清单 14-2

    钱包服务 Dockerfile

    ```

    '
- fmt: '`Dockerfile`依赖于`OpenLiberty`镜像。`OpenLiberty`是用于运行应用程序的Jakarta EE运行时。`OpenLiberty`配置、数据库驱动文件和应用程序war文件通过`COPY`命令复制到容器中。这基本上就是钱包服务作为Docker容器运行所需的全部内容。`docker-compose.yaml`文件如代码清单[14-3](#531256_1_En_14_Chapter.xhtml#PC3)所示。


    ```

    version: "3"

    services:

    postgres:

    image: postgres:12.3

    #    ports:

    #      - "5432:5432"

    environment:

    POSTGRES_USER: jwallet

    POSTGRES_PASSWORD: jwallet

    wallet:

    image: jwallet/wallet:latest

    ports:

    - "3001:3001"

    build:

    context: .

    dockerfile: Dockerfile

    Listing 14-3

    Wallet docker-compose.yaml file

    ```


    `docker-compose`文件通过拉取`Postgres`12.3镜像并通过捆绑的`Dockerfile`构建钱包镜像，组合出一组完整运行的容器实例。有了这些文件，钱包模块可以被打包并作为云原生、自包含的Jakarta
    EE应用程序运行。钱包服务通过`WalletResource`类中的HTTP REST资源暴露给客户端，如代码清单[14-4](#531256_1_En_14_Chapter.xhtml#PC4)所示。


    ```

    @RegisterRestClient(baseUri = "http://wallet:3001/wallet/api")

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @RolesAllowed("teller")

    public interface WalletResource {

    @POST

    @Traced(operationName = "create-wallet")

    @SimplyTimed(name = "create_wallet_timer")

    BalanceResponse createWallet(CreateWalletRequest createWalletRequest);

    @GET

    @Path("{walletId}/balance")

    @Traced(operationName = "get-wallet-balance")

    @SimplyTimed(name = "get_wallet_balance_timer")

    BalanceResponse getBalance(@PathParam("walletId") long walletId);

    @GET

    @Path("{walletId}/transactions")

    @Traced(operationName = "get-wallet-transactions")

    @SimplyTimed(name = "get_wallet_transactions_timer")

    TransactionsResponse getTransactions(@PathParam("walletId") long walletId);

    @POST

    @Path("{walletId}/transactions/debit")

    @Traced(operationName = "debit-wallet")

    @SimplyTimed(name = "debit_wallet_timer")

    TransactionResponse debit(@PathParam("walletId") long walletId, TransactionRequest
    transactionsRequest);

    @POST

    @Path("{walletId}/transactions/credit")

    @Traced(operationName = "credit-wallet")

    @SimplyTimed(name = "credit_wallet_timer")

    TransactionResponse credit(@PathParam("walletId") long walletId, TransactionRequest
    transactionsRequest);

    }

    Listing 14-4

    WalletResource

    ```


    `WalletResource`是一个Jakarta REST资源，也可以作为MicroProfile REST客户端使用，通过`@RegisterRestClient`注解实现。它消费和生成JSON，并要求执行客户端具有`teller`角色。MicroProfile
    JWT用于验证和传播客户端传递的JWT令牌。它还使用MicroProfile Metrics API声明了一些度量指标。该模块也有自己的单元测试和集成测试。


    这些资源方法的实现可以且通常应该重用单体应用中的现有逻辑。从单体应用迁移到微服务主要围绕应用程序的边界和打包展开。应尽可能重用现有的业务逻辑。


    从表面上看，这个资源描述了钱包服务的功能。作为一个HTTP服务，我们可以将其部署到云集群中，让Kubernetes管理其部署、扩展和更新。`wallet-manifest.yaml`文件创建了一个Kubernetes管理的对象。代码清单[14-5](#531256_1_En_14_Chapter.xhtml#PC5)展示了该清单文件。


    ```

    apiVersion: networking.k8s.io/v1

    kind: Ingress

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    rules:

    - host: "*.wallet.sslip.io"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: wallet

    port:

    name: wallet-port


    apiVersion: v1

    kind: Service

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    ports:

    - name: wallet-port

    port: 3001

    targetPort: 3001

    selector:

    app: wallet


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: wallet

    template:

    metadata:

    labels:

    app: wallet

    spec:

    containers:

    - name: wallet

    image: k3d-registry.localhost:12345/jwallet/wallet:latest

    resources:

    limits:

    memory: "512Mi"

    cpu: "500m"

    ports:

    - containerPort: 9080

    env:

    - name: JAEGER_AGENT_HOST

    value: jaeger

    - name: JAEGER_AGENT_PORT

    value: "6831"

    - name: JAEGER_SAMPLER_TYPE

    value: const

    - name: JAEGER_SAMPLER_PARAM

    value: "1"

    livenessProbe:

    httpGet:

    path: /health/live

    port: 3001

    initialDelaySeconds: 60

    periodSeconds: 60

    timeoutSeconds: 10

    failureThreshold: 10

    readinessProbe:

    httpGet:

    path: /health/ready

    port: 3001

    initialDelaySeconds: 60

    periodSeconds: 60

    timeoutSeconds: 10

    failureThreshold: 10

    Listing 14-5

    Wallet manifest file

    ```


    有了这些文件描述符，我们就将钱包微服务转变为一个云原生的Jakarta EE应用程序。`rate`和`account`服务与钱包服务具有类似的结构。使用上一节中的指南，我们能够将单体应用分解为业务限界上下文。每个服务都是一个独立的可部署单元，并拥有自己的测试。


    示例代码包含一个shell脚本，其中包含将应用程序打包并作为Docker容器运行并部署到Kubernetes管理集群的命令。`Readme`文件包含运行应用程序或单个微服务所需的所有信息。每个服务可以独立运行，也可以作为一个整体单元一起运行。将应用程序打包为容器并配备必要的描述符后，部署到云提供商就像将生成的镜像推送到Docker注册表（大多数云提供商都有自己的注册表）并选择推送的镜像进行部署一样简单。Microsoft
    Azure Kubernetes服务^([(122)](#fn122))（AKS）是您自己进行实验的一个良好起点。


    ## 总结


    本章探讨了单体应用及其优缺点，然后讨论了在采用或迁移到微服务架构时需要牢记的注意事项。接着，本章考察了三个微服务中的一个，以及将应用程序从单体迁移到微服务时通常需要更改的通用部分。正如本章所述，迁移应用程序是一项依赖于特定领域的工作；然而，我们试图提供广泛的指南和注意事项，以帮助阐明迁移的过程和任务。'
