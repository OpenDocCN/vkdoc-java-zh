    injected. This situation requires the container to create an indirect reference
    to the UserService contextual instance. The container needs to guarantee that
    when any valid injected reference to a bean belonging to any given scope is invoked,
    the invocation is always processed by the current instance of the injected bean.


    The container needs to manage possible circular dependencies as well. The cleanest
    and most transparent way to be able to achieve all of that is through the use
    of the client proxy object . This way, you are guaranteed the right contextual
    instance in the right scope no matter the dependency relationship between your
    beans.


    ### Built-In Scopes


    CDI comes with a number of built-in scopes that cater to the common needs of most
    applications. You can create your own scope if you want. But in order to create
    a cohesive platform and provide a uniform base for other APIs to build on, the
    CDI spec comes with a total of five built-in scopes. They are @ApplicationScoped,
    @RequestScoped, @SessionScoped, @ConversationScoped, and the @Dependent pseudo-scope.


    #### @ApplicationScoped


    The @ApplicationScoped annotation on a bean makes the bean an application-scoped
    singleton. What this means is that for the entire lifetime of any given application
    running instance, only a single contextual instance of this @ApplicationScoped
    bean will be created. The SecurityManager controller shown in Listing [4-8](#531256_1_En_4_Chapter.xhtml#PC8)
    is an application-scoped bean. The application scope itself is created at container
    boot time. However, the first and only contextual instance of this bean will be
    created when a method is first invoked on a proxy. After creation, no matter how
    many SecurityManager bean proxies the container creates, all method invocations
    will be delegated to the same bean instance across the application.


    It does not matter what other scope the SecurityManager gets injected into. All
    method invocations will eventually be serviced by the same bean instance. That
    instance will be destroyed by the container when the application scope is destroyed
    during application shutdown.


    #### @RequestScoped


    The @RequestScoped annotation on a bean associates the bean with an external user
    request originating from a servlet request, a web service request, and a remote
    EJB request. The container will also create a request scope during a CDI event
    (we will talk about CDI events in a later section) dispatch to an async observer
    method.


    For a servlet request, the CDI container will create a request scope when service()
    or doFilter() methods are invoked on a servlet or servlet filter, respectively.
    For a web service, the container will create a request scope for each web service
    invocation, whether through JAX-RS or JAX-WS. A request is also created for each
    remote EJB invocation during the handling of the invocation by the EJB. A request
    scope will also be created when the CDI container dispatches an event to an async
    method observer of that particular event. For all these invocations, the request
    scope will be created and destroyed once the invocation ends.


    The UserService controller shown in Listing [4-7](#531256_1_En_4_Chapter.xhtml#PC7)
    is scoped to the request context through the @RequestScoped annotation . For each
    web service call on the UserResourceImpl resource, a new request scope will be
    created and a new contextual instance of the UserService will be created and associated
    with that scope, because the UserResourceImpl declares a dependency on the UserService
    controller as shown in Listing [4-9](#531256_1_En_4_Chapter.xhtml#PC9).


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResourceImpl implements UserResource {

    @Inject

    UserService userService;

    }

    Listing 4-9

    showing the UserResourceImpl and its dependent declaration on the UserService
    controller

    ```


    Listing [4-9](#531256_1_En_4_Chapter.xhtml#PC9) shows the @RequestScoped UserService
    controller injected into the UserResourceImpl REST web service class. For each
    REST method invoked on the UserServiceResourceImpl class, a new request scope
    will be created and both the UserServiceResourceImpl and the UserService contextual
    instances associated with that scope. After the method invocation returns, both
    the scope and associated contextual instances will be destroyed.'
  trans: '

    ## 作用域与上下文


    CDI 创建的 bean 实例与作用域相关联。你可以将 CDI 作用域视为一个定义良好的生命周期，bean 实例在其中存在。当某个作用域被销毁时，该作用域关联的所有
    bean 实例也会随之销毁。不同作用域的 bean 可以相互注入。CDI 容器负责确保将正确的 bean 注入到每个依赖注入点。


    例如，我们有一个 SecurityManager，希望在整个应用程序生命周期（从启动到关闭）中只存在一个实例。这个 SecurityManager 控制器依赖于另一个控制器
    UserService，后者作用于每个 HTTP 请求。清单 4-7 展示了 UserService 控制器。


    ```

    @RequestScoped

    @Transactional

    public class UserService {

    @Inject

    UserRepository userRepository;

    }

    清单 4-7

    展示 UserService 控制器

    ```


    清单 4-7 展示了 UserService 类。它使用了 `@RequestScoped` 注解。这是内置作用域之一（稍后会详细介绍各种作用域）。该 bean
    声明了对 UserRepository 的依赖，而 UserRepository 也是一个 RequestScoped bean。清单 4-8 展示了 SecurityManager
    控制器。


    ```

    @ApplicationScoped

    public class SecurityManager {

    @Inject

    UserService userService;

    }

    清单 4-8

    展示 SecurityManager 控制器

    ```


    清单 4-8 展示了 SecurityManager 控制器及其对 UserService 控制器的依赖声明。请注意，SecurityManager 使用了
    `@ApplicationScoped` 注解。这也是内置作用域之一。尽管 UserService 和 SecurityManager 关联了不同的作用域，但
    CDI 容器会确保 SecurityManager 的所有客户端看到不同的 userService 上下文对象实例。这是通过使用 bean 代理的概念来实现的。


    ### Bean 代理


    清单 4-8 中 SecurityManager 控制器里的 userService 引用，并非直接指向 `Contextual#create()` 调用返回的上下文实例，而是一个客户端代理对象。这个客户端代理对象实现了
    bean 的部分或全部 bean 类型，并将对其的方法调用委托给目标上下文对象。为什么需要这种间接性呢？


    回到我们的 SecurityManager 控制器，这个类在应用程序的整个生命周期中只有一个实例。然而，它声明了对一个作用于每个 HTTP 请求的 bean
    的依赖。这意味着 SecurityManager 的每个客户端都应该注入不同的 UserService bean 实例。这种情况要求容器创建一个对 UserService
    上下文实例的间接引用。容器需要保证，当任何有效的、对属于某个作用域的 bean 的注入引用被调用时，该调用始终由被注入 bean 的当前实例处理。


    容器还需要管理可能的循环依赖。实现所有这些目标最清晰、最透明的方式就是使用客户端代理对象。这样，无论你的 bean 之间是什么依赖关系，都能保证在正确的作用域中获得正确的上下文实例。


    ### 内置作用域


    CDI 提供了多个内置作用域，以满足大多数应用程序的常见需求。如果需要，你也可以创建自己的作用域。但为了构建一个内聚的平台，并为其他 API 提供统一的构建基础，CDI
    规范总共提供了五个内置作用域。它们是 `@ApplicationScoped`、`@RequestScoped`、`@SessionScoped`、`@ConversationScoped`
    和 `@Dependent` 伪作用域。


    #### @ApplicationScoped


    bean 上的 `@ApplicationScoped` 注解使其成为应用程序作用域的单例。这意味着，对于任何正在运行的应用程序实例的整个生命周期，只会创建该
    `@ApplicationScoped` bean 的一个上下文实例。清单 4-8 中展示的 SecurityManager 控制器就是一个应用程序作用域的
    bean。应用程序作用域本身在容器启动时创建。然而，该 bean 的第一个也是唯一的上下文实例，将在首次对代理调用方法时创建。创建之后，无论容器创建了多少个
    SecurityManager bean 代理，所有方法调用都将在整个应用程序中被委托给同一个 bean 实例。


    无论 SecurityManager 被注入到其他什么作用域中，所有方法调用最终都将由同一个 bean 实例处理。当应用程序在关闭期间销毁应用程序作用域时，该实例将被容器销毁。


    #### @RequestScoped


    bean 上的 `@RequestScoped` 注解将该 bean 与外部用户请求关联起来，这些请求可以来自 Servlet 请求、Web 服务请求或远程
    EJB 请求。当 CDI 事件（我们将在后续章节讨论 CDI 事件）被分派给异步观察者方法时，容器也会创建一个请求作用域。


    对于 Servlet 请求，当在 Servlet 或 Servlet 过滤器上分别调用 `service()` 或 `doFilter()` 方法时，CDI
    容器会创建一个请求作用域。对于 Web 服务，无论是通过 JAX-RS 还是 JAX-WS，容器都会为每次 Web 服务调用创建一个请求作用域。在 EJB
    处理远程 EJB 调用期间，也会为每次远程 EJB 调用创建一个请求。当 CDI 容器将事件分派给该特定事件的异步方法观察者时，也会创建一个请求作用域。对于所有这些调用，请求作用域将在调用开始时创建，并在调用结束时销毁。


    清单 4-7 中展示的 UserService 控制器通过 `@RequestScoped` 注解作用于请求上下文。对于对 UserResourceImpl
    资源的每次 Web 服务调用，都会创建一个新的请求作用域，并创建一个新的 UserService 上下文实例与该作用域关联，因为 UserResourceImpl
    声明了对 UserService 控制器的依赖，如清单 4-9 所示。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResourceImpl implements UserResource {

    @Inject

    UserService userService;

    }

    清单 4-9

    展示 UserResourceImpl 及其对 UserService 控制器的依赖声明

    ```


    清单 4-9 展示了 `@RequestScoped` 的 UserService 控制器被注入到 UserResourceImpl REST Web 服务类中。对于在
    UserServiceResourceImpl 类上调用的每个 REST 方法，都会创建一个新的请求作用域，并将 UserServiceResourceImpl
    和 UserService 上下文实例与该作用域关联。方法调用返回后，该作用域及其关联的上下文实例都将被销毁。

    '
- fmt: '#### `@SessionScoped`


    The session-scoped context can be associated with a bean through the `@SessionScoped`
    annotation. This scope is tied to a single user session and is shared between
    all servlet requests that occur in the same HTTP request. The session scope is
    active during the `service()` method of any servlet, during the `doFilter()` method
    of any servlet filter, and when the container calls any `ServletRequestListener`,
    `AsyncListener`, or `HttpSessionListener`. This scope is destroyed when the session
    times out. But before the session gets destroyed, the container will make sure
    there are no uncalled `HttpSessionListeners` for that session. This ensures that
    the session is not destroyed while there are still listeners attached to it. Listing
    [4-10](#531256_1_En_4_Chapter.xhtml#PC10) shows the use of the `@SessionScoped`
    annotation on the `UserSession` controller in jwallet.


    ```

    @SessionScoped

    public class UserSession implements Serializable {

    @Inject

    SecurityManager securityManager;

    }

    Listing 4-10

    showing the use of the @SessionScoped

    ```


    Listing [4-10](#531256_1_En_4_Chapter.xhtml#PC10) shows the `UserSession` controller.
    It declares a dependency on the `SecurityManager`. Remember from Listing [4-8](#531256_1_En_4_Chapter.xhtml#PC8)
    that the `SecurityManager` is an `@ApplicationScoped` bean. The `UserSession`
    is the first bean we are seeing that implements the `Serializable` interface.
    Why? Because the `@SessionScoped` annotation on a bean makes the bean passivation
    capable. What this means is that during runtime, when the CDI container determines
    that there are idle instances of session-scoped beans, it can temporarily transfer
    the state of such bean instances to secondary storage. Effectively, the container
    will passivate or save the state of the idle instances. The `Serializable` interface
    marks the bean as such. In addition, all fields in a session-scoped bean should
    be equally serializable or transient.


    #### `@ConversationScoped`


    The conversation scope is a special scope for holding a “conversation” between
    a client and the server. It is longer than a request scope but shorter than a
    session or application scope. You can think of a conversation with the example
    of a sign-up form that spans multiple pages. Each page is a conversation between
    your browser and the server, and once you reach the final page and hit the submit
    button, the conversation terminates. CDI provides the built-in `Conversation`^([^(94)](#fn94))
    bean for managing the conversation state in a conversation-scoped bean. Listing
    [4-11](#531256_1_En_4_Chapter.xhtml#PC11) shows a conversation-scoped `SignupManager`.


    ```

    @ConversationScoped

    public class SignupManager implements Serializable {

    @Inject

    Conversation conversation;

    public void beginSignup() {

    beginConversation();

    }

    public void submit() {

    endConversation();

    }

    private void beginConversation() {

    if (conversation.isTransient()) {

    conversation.begin();

    }

    }

    private void endConversation() {

    if (!conversation.isTransient()) {

    conversation.end();

    }

    }

    }

    Listing 4-11

    showing the SignupManager as a conversation-scoped bean

    ```


    Listing [4-11](#531256_1_En_4_Chapter.xhtml#PC11) shows our `Signup` bean. It
    also implements the `Serializable` interface because it might get passivated by
    the container, just like a session-scoped bean. Similarly, all fields in a conversation-scoped
    bean should be passivation capable or transient. By default, a `@ConversationScoped`
    bean is in transient mode. That is, a contextual instance of a conversation-scoped
    bean is likely to be destroyed by the container at any time because it’s transient.
    You will have to explicitly initiate a conversation-scoped bean into a conversation.
    The way to achieve that is through the use of methods on the `Conversation` interface.


    Listing [4-11](#531256_1_En_4_Chapter.xhtml#PC11) shows the `SignupManager` declaring
    a dependency on the `Conversation` bean through an injection point of said type.
    An instance of the `Conversation` interface will be created by the container for
    us. Method `beginSignup()` first makes a call to method `beginConversation()`.
    The `beginConversation()` method first makes a check by calling `Conversation#isTransient()`
    to check if the bean is in transient mode.


    This method returns `true` if the bean is currently not in any conversation state
    or, technically, a long-running conversation. Why this check? Because if we call
    the `Conversation#begin()` method on a bean that is already in a long-running
    conversation, an `IllegalStateException` will be thrown by the container. Method
    `beginConversation()` only starts the long-running conversation if that check
    returns `true` by calling the `Conversation#begin()` method. After this invocation,
    the bean is put into a long-running conversation or the conversation scope. This
    scope will transcend a single request, but will be shorter than a session scope.


    After the registration is done and ready to be submitted, method `submit()` first
    calls method `endConversation()`. This method does an inverse check on the bean
    to see if it’s in a long-running conversation, then calls the `Conversation#end()`
    method. This is also because if you invoke `Conversation#end()` on a `Conversation`
    that is not long-running, the container throws an `IllegalStateException`.


    The `Conversation#begin()` method also optionally takes a `String` parameter as
    the conversation ID. This ID will be associated with the conversation that is
    started by the method. In the absence of an explicit ID, the container generates
    one for you. You can get the ID associated with the current long-running conversation
    by calling the `Conversation#getId()` method. It returns the ID or `null` if the
    conversation is transient. You can also set and get the timeout of the conversation
    in milliseconds through the methods `Conversation#setTimeout()` and `Conversation#getTimeout()`,
    respectively.


    #### `@Dependent` Pseudo-Scope


    `@Dependent` is a pseudo-scope that is dependent upon where it is used. It is
    the default scope that a bean is put into when no explicit scope is defined. It
    is dependent because the `@Dependent` scoped bean takes or inherits the scope
    of the bean into which it is injected. A dependent-scoped bean has two distinguishing
    qualities, namely:


    *   No injected instance of the bean is ever shared between multiple injection
    points.

    *   Any instance of the bean injected into an object that is being created by
    the container is bound to the lifecycle of the created object.


    Effectively, every request for a dependent-scoped bean always results in a new
    bean. And the actual scope of this dependent bean instance will be the scope of
    whatever bean it’s being injected into. We will touch a little more on dependent
    scope in later sections of this book when we cover other CDI constructs.


    So far, we have talked about beans and their possible scopes. At the heart of
    CDI is managing dependencies between these beans in their different scopes. The
    “entry point” to using the dependency management magic wand in CDI is through
    the use of the `@Inject` annotation at injection points.


    ## Injection Points


    An injection point in CDI is a place where you can request for contextual instances.
    That is, you annotate a type at a specific place with the `@Inject` annotation,
    and then the CDI container will instantiate that particular variable for you.
    There are three broad injection points in CDI as follows.'
