    ### 异步事件


    到目前为止我们看到的 UserResponse 事件是一个同步阻塞事件。这意味着当它被触发时，观察者方法会阻塞执行，直到其完成。如代码清单 4-42 所示，执行将被阻塞，直到
    sendUserSms 返回，因为事件观察者方法将在触发它的同一个线程中被调用。然而，发送短信很可能需要通过外部网络与短信提供商进行通信。这可能需要时间，具体取决于网络延迟。为了避免此类潜在问题，事件机制支持触发异步事件。


    对于异步事件，观察者将被异步调用，在与触发事件不同的线程中执行。这样，短信的发送将在单独的线程中进行，因此执行会立即返回到事件触发点。代码清单 4-43 展示了在
    UserServiceDecorator bean 中触发异步事件。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = userService.getUser(user.getId());

    userResponseEvent.fireAsync(userResponse);

    return UserService.toUserResponse(user);

    }

    return userService.createUser(createUserRequest);

    }

    }

    代码清单 4-43

    展示触发一个异步事件

    ```


    代码清单 4-43 展示了 UserServiceDecorator bean 及其 createUser 方法。这次，事件对象通过调用 fireAsync
    方法触发了一个异步事件。此方法将触发一个异步事件，只有异步观察者会收到该事件的通知。它返回一个 `java.util.concurrent.CompletionStage`
    对象，用于对异步操作进行可选的进一步管道组合。代码清单 4-42 中展示的 UserResponse 观察者将不会被此事件调用，因为该观察者是同步的。代码清单
    4-44 展示了包含一个异步 UserResponse 观察者的 MessageCenter bean。


    ```

    public class MessageCenter {

    public void sendUserSmsAsync(@ObservesAsync final UserResponse userResponse) {

    //TODO --> 通过网关发送短信... 异步

    }

    }

    代码清单 4-44

    展示一个异步 UserResponse 观察者

    ```


    代码清单 4-44 展示了 MessageCenter bean 及其新方法 sendUserSmsAsync。此方法与我们在代码清单 4-42 中看到的同步方法具有几乎相同的签名，唯一的区别是
    `@Observes` 注解被替换为 `@ObservesAsync`。此注解告诉容器，此方法观察一个类型为 UserResponse 的异步事件。因此，当代码清单
    4-43 中展示的 UserResponse 事件被触发时，sendUserSmsAsync 方法将被调用。


    ### 事务性观察者


    到目前为止讨论的 UserResponse 事件应该可以正常工作。但是，存在一个问题。需求是向成功持久化到数据库的用户发送消息。然而，我们尚未检查实际的用户持久化操作是否成功。代码清单
    4-43 中触发的异步事件是在调用 EntityManager 实例的 persist 方法两行之后触发的。问题在于，直到事件被触发时，执行该方法的事务尚未提交。而在事务成功提交之前，我们无法确定用户持久化操作是否成功。


    为了解决这个问题，我们可以使用事务性观察者。事务性观察者是指定应在事务的哪个阶段被调用的观察者。根据我们的需求，我们希望观察者仅在触发事件的事务成功完成后才被调用，这意味着事务已成功提交，并且我们确定数据已在数据库中。代码清单
    4-45 展示了包含一个用于发送短信的事务性观察者的 MessageCenter bean。


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS)   final
    UserResponse userResponse) {

    //TODO --> 通过网关发送短信... 阻塞任务

    }

    }

    代码清单 4-45

    展示一个事务性观察者

    ```


    代码清单 4-45 展示了 MessageCenter bean 的 sendUserSms 方法。这一次，`@Observes` 方法传递了一个参数 –
    `during = TransactionPhase.AFTER_SUCCESS`。这向容器发出信号，表明我们希望此观察者在触发事件的任何事务的成功后阶段被调用。因为
    UserResponse 是在事务上下文中触发的，所以 sendUserSms 观察者只会在事务成功提交后才会被通知。


    您应该已经注意到，sendUserSms 观察者正在观察一个同步事件，因为它使用了 `@Observes` 注解。这是因为事务性观察者不支持异步事件。因此，触发的事件将是一个同步事件，如
    UserServiceDecorator 中的代码清单 4-41 所示。


    观察者方法有多个可用的事务阶段。这些阶段定义在 `jakarta.enterprise.event` 包中的 `TransactionPhase` 枚举类型中。它们是：


    *   **IN_PROGRESS** – 观察者在事件触发时被调用。这是默认值。

    *   **BEFORE_COMPLETION** – 观察者在事务的完成前阶段被调用。

    *   **AFTER_COMPLETION** – 观察者在事务的完成后阶段被调用。

    *   **AFTER_FAILURE** – 观察者在事务的完成后阶段被调用，但仅在事务失败时。

    *   **AFTER_SUCCESS** – 观察者在事务的完成后阶段被调用，但仅在事务成功时。

