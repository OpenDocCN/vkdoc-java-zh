    #### JWallet


    JWallet 是本书的参考应用程序，最初以一组微服务的形式开发，这些微服务位于一个公共项目中，每个服务都是该项目中的一个 Maven 模块。在后续章节中，我们将把该应用重构为物理上独立的服务，以实现另一种形式的微服务开发。表
    3-1 展示了访问应用中各个服务的端点。


    表 3-1


    JWallet 中的端点


    | 模块 | URL |

    | --- | --- |

    | Wallet | http://localhost:3001/wallet |

    | Rate | http://localhost:3002/rate |

    | Account | http://localhost:3003/account |

    | Jaeger | http://localhost:16686 |

    | Prometheus | http://localhost:9090 |

    | Grafana | http://localhost:3000 |


    如前所述，该应用是一个 Maven 多模块应用。其主要用户界面是用于在指定钱包中创建和执行交易的各种端点。这些 REST 端点使用 Jakarta RESTful
    API (JAX-RS) 开发。应用的根入口点是 `CONTEXT_PATH/api` 端点。每个 JAX-RS 应用都必须有一个根入口点，作为该应用所有
    REST 端点的基路径。这个根 REST 端点在核心模块中声明，如代码清单 3-23 所示。


    ```

    @ApplicationPath("api")

    public class JaxrsConfigurations extends Application {

    }

    代码清单 3-23

    JAX-RS 根入口点

    ```


    第 1 行的注解 `@ApplicationPath("api")` 告诉 JAX-RS 运行时，我们希望将该应用中的所有 REST 端点托管在基路径 "api"
    下。然后，`JaxrsConfigurations` 类继承了 JAX-RS API 中的 `Application` 类。有了这个配置，所有 REST 端点都可以作为
    api 路径的子路径进行访问。例如，钱包服务的 hello 路径是 `http://localhost:3003/wallet/api/hello`。


    钱包模块中的 hello 资源在 `HelloResource` 类中声明，如代码清单 3-24 所示。


    ```

    @Path("hello")

    public class HelloResource {

    @GET

    @SimplyTimed

    @Traced

    String hello {

    return "Hello account module";

    }

    }

    代码清单 3-24

    Hello 端点

    ```


    JAX-RS 资源以 Java 类的形式托管，资源端点则作为该类的方法托管。在前面的 `HelloResource` 示例中，第 1 行声明了该类及其包含的所有资源都托管在
    `/hello` 路径下。`@Path` 注解来自 JAX-RS API。这意味着我们希望在该类中暴露的任何 REST 端点都将作为 `/hello` 路径的子路径进行访问。第
    4 行使用 `@GET` 注解将第 6 行声明的 `hello` 方法定义为 HTTP GET 方法。由于该方法没有定义其他路径，当访问 `/wallet/api/hello`
    路径时，它将成为 JAX-RS 运行时调用的默认 GET 方法。


    方法的返回类型是返回给客户端的值。在此示例中，当对 `/hello` 发起 GET 调用时，会返回简单的字符串消息 "Hello wallet module"。JAX-RS
    支持返回多种不同类型。由于 `HelloResource` 类没有明确指定它消费和产生的内容类型，运行时默认使用简单类型。稍后我们将看到如何声明给定 JAX-RS
    资源消费和产生的 MIME^(⁷⁵) 类型。


    第 5 行还使用来自 Eclipse MicroProfile 指标 API 的 `@SimplyTimed` 注解对 `hello` 方法进行了注解。此注解会跟踪方法调用的耗时和次数。只需用
    `@SimplyTimed` 注解 `hello` 方法，MicroProfile 运行时就会暴露一个用于跟踪该方法调用次数和每次调用时长的指标。暴露的指标可以被任意数量的应用程序消费。在
    JWallet 的案例中，我们可以通过集成的 Prometheus（可通过 http://localhost:9090 访问）和 Grafana（可通过 http://localhost:3000
    访问）可观测性应用查看这些指标，如图 3-2 所示。


    ![](img/531256_1_En_3_Fig2_HTML.png)


    一张截图展示了 JWallet Grafana 指标探索的条形图，条形图从 17 小时 9 分 45 秒开始，到 17 小时 11 分 15 秒结束。


    图 3-2


    Grafana 指标探索器


    第 6 行还使用来自 Eclipse MicroProfile 指标 API 的 `@Traced` 注解对 `hello` 方法进行了注解。此注解会跟踪对服务的传入请求以及随后对其他服务的请求。


    在我的示例部署中，钱包模块的 Hello 资源（可通过 http://localhost:3001/wallet 访问）已被调用了八次，每次调用都列在列表中，如图
    3-3（可通过 http://localhost:16686 访问）所示。点击其中一个调用会跳转到跟踪详情页面，如图 3-4 所示。


    ![](img/531256_1_En_3_Fig4_HTML.png)


    一张截图展示了 Jaeger 跟踪的跟踪详情，包括 jwallet 示例、标签和进程。


    图 3-4


    Jaeger 跟踪 – 跟踪详情


    ![](img/531256_1_En_3_Fig3_HTML.png)


    一张截图展示了 Jaeger 跟踪的跟踪列表，包含八个跟踪，通过选择结果项比较跟踪，并包含钱包示例。


    图 3-3


    Jaeger 跟踪 – 跟踪列表


    其中一个被跟踪调用的详细列表显示了调用的日期和时间 (1)、被调用资源所在的服务及持续时间 (2)，以及被跟踪调用的一些详细信息，包括完整的资源端点 (3)。所有这些细节都由
    MicroProfile 指标运行时处理。我们所要做的就是用 `@SimplyTimed` 声明我们的 hello 资源方法。第 6 章将详细介绍 Jakarta
    RESTful Web Services API。现在，让我们先粗略地看一下 `WalletResource`。


    Wallet 资源是应用的根入口点。它托管了用于创建、借记、贷记和查询钱包的各种方法。其声明如代码清单 3-25 所示。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    public class WalletResource {

    @Inject

    WalletService walletService;

    ...

    }

    代码清单 3-25

    钱包模块端点

    ```


    Wallet 资源定义在 `WalletResource.java` 类中。第 1 行和第 2 行使用 `@Consumes` 和 `@Produces`
    注解分别声明该资源类的方法可以消费和产生的 MIME 类型。由于 JSON^(⁷⁶) 数据格式是 RESTful Web 服务最流行的格式，JWallet
    中的所有资源端点都消费和产生 JSON 格式的数据。对于 `WalletResource`，传递给这两个注解的常量 `MediaType.APPLICATION_JSON`
    告诉 JAX-RS 运行时，该类中声明的所有资源方法都消费和产生 JSON。这意味着客户端可以调用该类中的资源方法，并以 JSON 格式传入任何必要的数据。运行时将处理传入的
    JSON 数据与相应 Java 类型之间的转换。返回类型也是如此。


