- fmt: "### `@DefaultValue`\n\n`limit`和`offset`字段也是查询参数，我们希望从请求中获取它们并注入到相应的字段中。两个字段上的`@DefaultValue`在没有客户端设置任何显式值时设置默认值。这意味着，如果没有`limit`和`offset`值作为查询参数传递，实例化的类实例将把`limit`字段设置为`150`，`offset`字段设置为`0`。`limit`字段还使用了`@Positive`注解，这是一个Bean验证约束，它将字段的可能值限制为正整数。\n\
    \n我们重构了`UserSearchRequest`，但完全没有更改资源方法中的任何内容。这就是我们建议在处理查询参数时使用`@BeanParam`注解的原因。创建了分页选项后，我们现在可以重构返回类型，使其也包含一些客户端用于创建有意义的分页请求的元数据。清单[6-15](#531256_1_En_6_Chapter.xhtml#PC15)展示了一个新的参数化类`SearchResult`，其中包含一些元数据。\n\
    \n```java\npublic class SearchResult<T> implements Serializable {\n    private\
    \ List<T> searchResult = new ArrayList<>();\n    private Long totalSize;\n   \
    \ private Long offset;\n    private Long limit;\n}\n```\n*清单 6-15 `SearchResult`*\n\
    \n`SearchResult`接受一个类型，并将该类型绑定到`searchResult`列表。此列表将包含实际的搜索结果。`totalSize`字段指匹配搜索请求的总大小。`offset`和`limit`只是返回客户端传递的值（如果有的话）。有了这个新构造，我们可以重构`searchUsers`资源方法，使其返回一个类型为`UserResponse`的`SearchResult`对象。清单[6-16](#531256_1_En_6_Chapter.xhtml#PC16)展示了更新后的资源方法。\n\
    \n```java\n@GET\n@Path(\"search\")\npublic SearchResult<UserResponse> searchUsers(@NotNull\
    \ @BeanParam UserSearchRequest userSearchRequest) {\n    return userService.searchUsers(userSearchRequest);\n\
    }\n```\n*清单 6-16 更新后的 `searchUsers` 资源方法*\n\n清单[6-17](#531256_1_En_6_Chapter.xhtml#PC17)展示了`UserRepository`中使用Jakarta\
    \ Persistence规范的`Criteria API`的完整搜索实现。正如前一章所讨论的，`Criteria API`更适合此类应用搜索场景。\n\n\
    ```java\npublic SearchResult<UserResponse> searchUsers(final UserSearchRequest\
    \ searchRequest) {\n    CriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();\n\
    \    CriteriaQuery<User> query = criteriaBuilder.createQuery(User.class);\n  \
    \  Root<User> from = query.from(User.class);\n    final Set<Predicate> predicateSet\
    \ = new HashSet<>();\n\n    if (searchRequest.getFirstName() != null) {\n    \
    \    Predicate firstName = criteriaBuilder.like(from.get(\"firstName\"), \"%\"\
    \ + searchRequest.getFirstName() + \"%\");\n        predicateSet.add(firstName);\n\
    \    }\n    if (searchRequest.getLastName() != null) {\n        Predicate lastName\
    \ = criteriaBuilder.like(from.get(\"lastName\"), \"%\" + searchRequest.getLastName()\
    \ + \"%\");\n        predicateSet.add(lastName);\n    }\n    if (searchRequest.getTotalConversions()\
    \ != null) {\n        if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.EQ)\
    \ {\n            predicateSet.add(criteriaBuilder.equal(from.get(\"totalConversions\"\
    ),\n                    searchRequest.getTotalConversions()));\n        }\n  \
    \      if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.GT)\
    \ {\n            predicateSet.add(criteriaBuilder.greaterThan(from.get(\"totalConversions\"\
    ),\n                    searchRequest.getTotalConversions()));\n        }\n  \
    \      if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.GTE)\
    \ {\n            predicateSet.add(criteriaBuilder.greaterThanOrEqualTo(from.get(\"\
    totalConversions\"),\n                    searchRequest.getTotalConversions()));\n\
    \        }\n        if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.LT)\
    \ {\n            predicateSet.add(criteriaBuilder.lessThan(from.get(\"totalConversions\"\
    ),\n                    searchRequest.getTotalConversions()));\n        }\n  \
    \      if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.LTE)\
    \ {\n            predicateSet.add(criteriaBuilder.lessThanOrEqualTo(from.get(\"\
    totalConversions\"),\n                    searchRequest.getTotalConversions()));\n\
    \        }\n        if (searchRequest.getConversionFilter() == UserSearchRequest.ConversionFilter.NEQ)\
    \ {\n            predicateSet.add(criteriaBuilder.notEqual(from.get(\"totalConversions\"\
    ),\n                    searchRequest.getTotalConversions()));\n        }\n  \
    \  }\n    if (searchRequest.getUserType() != null) {\n        Predicate userType\
    \ = criteriaBuilder.equal(from.get(\"userType\"), searchRequest.getUserType());\n\
    \        predicateSet.add(userType);\n    }\n\n    CriteriaQuery<User> where =\
    \ query.select(from).where(predicateSet.toArray(new Predicate[] {}));\n    TypedQuery<User>\
    \ typedQuery = em.createQuery(where);\n\n    if (searchRequest.getOffset() !=\
    \ null) {\n        typedQuery = typedQuery.setFirstResult(searchRequest.getOffset());\n\
    \    }\n    if (searchRequest.getLimit() != null) {\n        typedQuery = typedQuery.setMaxResults(searchRequest.getLimit());\n\
    \    }\n\n    List<UserResponse> response =\n            typedQuery.getResultList().stream().map(UserService::toUserResponse).collect(Collectors.toList());\n\
    \n    SearchResult<UserResponse> searchResult = new SearchResult<>();\n    searchResult.setSearchResult(response);\n\
