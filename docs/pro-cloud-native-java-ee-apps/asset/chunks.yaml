    lastname  varchar(255),

    username  varchar(255)

    );

    清单 5-6

    展示了该实体对应的数据定义语言 (DDL)

    ```


    ##### AUTO


    `AUTO` 主键生成策略将如何生成主键的决策委托给底层运行时。这意味着应用程序要求 JPA 运行时根据字段类型和所使用的底层数据库引擎来选择最佳的主键生成策略。


    如果主键仅用作技术性的数据库唯一行标识符，那么 `AUTO` 策略就足够了。它也是开发和快速原型设计的理想选择。当模式生成由运行时完成时（我们将在本章后面讨论模式生成），`AUTO`
    也能发挥最佳效果。`AUTO` 仅适用于整型字段类型。


    ##### TABLE


    `TABLE` 生成策略是最灵活且可扩展性最强的生成策略。清单 5-7 展示了使用 `TABLE` 生成策略进行主键生成的 `User` 实体。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy=GenerationType.TABLE)

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-7

    展示了使用 TABLE 主键生成的 User 实体

    ```


    清单 5-7 展示了采用 `TABLE` 主键生成策略的 `User` 实体。照此配置，运行时将负责创建 ID 表（如果使用了模式生成）。如果运行时未进行模式生成，则声明的
    ID 表应在应用程序启动之前存在。


    ID 表是一个包含两个字段的表——一个字符串类型和一个整型。第一列是表中所有生成器的主标识符。第二列（整型）存储实际生成的 ID 序列。清单 5-8 展示了一个更详细的
    `TABLE` 生成示例，其中我们通过 `@TableGenerator` 注解显式定义了 ID 生成表。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @TableGenerator(name = "ID_Gen",

    table = "ID_GEN_TABLE",

    pkColumnName = "GENERATOR_NAME",

    pkColumnValue = "GENERATED_VALUE",

    valueColumnName = "GEN_VAL")

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "ID_Gen")

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-8

    展示了具有显式表生成的 User 实体

    ```


    清单 5-8 展示了使用 `@TableGenerator` 注解来显式指定 ID 表生成。该注解的第一个参数指定了生成器的名称。此名称随后被传递给 `@GeneratedValue`
    注解的 `generator` 参数。`@TableGenerator` 注解的其他参数如下：


    *   `table` – 指定此生成器对应的数据库表名。

    *   `pkColumnName` – 指定此表中唯一标识符的列名。

    *   `pkColumnValue` – 指定表中 `pkColumnName` 列的实际值。

    *   `valueColumnName` – 指定用于存储 ID 序列的列名。


    这种 `TABLE` ID 生成将产生如清单 5-9 所示的数据库模式。


    ```

    create table id_gen_table

    (

    generator_name varchar(50) not null primary key,

    gen_val        numeric(38)

    );

    清单 5-9

    展示了 User 实体生成的 ID 表

    ```


    图 5-2 展示了 ID 生成表对应的模式图。


    ![](img/531256_1_En_5_Fig2_HTML.jpg)


    该模式图描绘了一个 ID 生成表，其中包含生成器名称和生成器值。


    图 5-2

    ID 生成表模式


    在应用程序运行时，JPA 提供者（运行时，实现）将为该表分配一个标识符块。默认的分配块大小为 50。运行时将从此块中在内存里分配 ID，直到达到分配大小；当请求
    ID 时，会触发另一轮预分配，然后在内存中用于分配 ID，依此类推。分配大小可以通过 `@TableGenerator` 进行自定义。您还可以设置 `gen_val`
    列的初始值，对于整型，该值默认为零。


    ##### SEQUENCE


    `SEQUENCE` 标识生成策略与 `TABLE` 策略类似，用于底层数据库支持序列 ID 生成机制的情况。将 `@GeneratedValue` 的策略设置为
    `SEQUENCE` 将导致底层运行时为您创建所需的序列生成器。可以使用 `@SequenceGenerator` 显式创建序列生成表，这与我们在 `TABLE`
    策略中使用 `@TableGenerator` 讨论的方式非常相似。


    ##### IDENTITY


    `IDENTITY` 序列生成策略用于底层数据库支持自动编号功能的情况。当向数据库插入一行时，引擎会自动为主键列分配一个值。`IDENTITY` 非常依赖于数据库，因此在
    JPA 应用程序中并不常用。

