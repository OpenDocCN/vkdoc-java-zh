  trans: '

    ## 基于令牌的身份验证


    RESTful Web 服务本质上是无状态的。这意味着每个请求都独立于前一个请求。服务器需要在每个请求中提供相同的安全相关信息。实现这种无状态安全形式的最有效方法是使用令牌。令牌是一个长字符串，可以对其进行验证，以确认调用客户端声明的真实性。它允许系统对客户端进行身份验证、授权并验证其身份。基于令牌的安全性不依赖于
    HTTP 会话，因此具有更好的可扩展性、性能和可靠性。


    令牌通常被添加到请求头中。然后，服务会获取该令牌并进行验证，通过内省来提取有关调用客户端的信息，进而创建一个安全上下文，该上下文可以传播到受保护服务的所有部分。MicroProfile
    JWT API 是一种基于令牌的身份验证、授权和基于角色的访问控制（RBAC）机制，可用于基于令牌的应用程序安全。JSON Web Token（JWT）是一种基于令牌的标准^(¹¹⁶)，它已成为创建轻量级安全令牌最流行的标准。


    JWT 令牌通常会被签名，以便服务可以验证该令牌。令牌中包含的信息称为声明（claims）。声明也可以被加密，这样它们就不会以明文形式在请求头中传递。一个典型的
    JWT 由头部（header）、声明（claims，或称为主体 body）和签名（signature）组成。


    ### 头部


    JWT 的头部通常包含用于签名 JWT 的算法类型（RS256、ES256、HS256 等）、令牌类型（例如 JWT）、密钥 ID 以及取决于令牌签发者的其他元数据。对
    JWT 进行签名仅能使接收服务验证信息未被篡改。它并不会使令牌不可读。为了实现不可读，除了签名之外，令牌还需要被加密。


    ### 声明（或主体）


    JWT 的声明或主体是客户端希望传递给服务器的所有信息。很多时候，主体包含分配给特定客户端的角色。角色决定了客户端在应用程序中可以执行不同操作的范围。


    ### 签名


    签名是可选的，但强烈建议包含，它允许服务验证令牌在传输过程中是否未被更改或篡改。


    JWT 是头部、声明和签名信息的 base64 编码字符串。清单 11-1 展示了一个 JWT 令牌示例。


    ```

    eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJEMkdxYmxJU3YzY1Jpdmh2ZFR0YmpaVDg2VkFGeUFpT29wZGlvZHYtQllJIn0..lG6zEr-BEMQwyEUswIgCM5InWAH4ljAu8JK6Zc0naHD8kcaGAssxsXHzf315n--cysYJzeAQBfDmzsJr_Roe0io2nN4CZ61T6Vz4YnE_5_RRn9n6cl2rG_1oIsLknqKVseNQ4itZZjKfIGVUYxURxKmO6gsCH8FCHN1hu7rmq4jwPC0aO7Ypvjg2IpExsIociprXk7_1iyfllZ4XnlHYBADOpkNOduJgMyojQwBgTz-xa-9sBb-eoKys1gBD3nbV8STNbKAGzOUiQaq28T4x3pIn6JNfw2JbBu6_cxKXhzghoPukboLhn2C_MYJt4OiycxuprsbDRKoxAIjus_9yoA

    清单 11-1

    JWT 示例

    ```


