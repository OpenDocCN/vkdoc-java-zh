    ## MicroProfile JWT


    MicroProfile JWT API 提供了一种标准的、通常是约定优于配置的方式来验证 JWT 令牌、授权客户端并将生成的安全上下文传播到应用程序的其余部分。它通过要求
    JWT 使用基于 RSA 的数字签名算法进行签名来实现这些目标。JWT 运行时所需要的只是创建 JWT 的授权服务器的公钥，以验证该令牌。它还强制要求在 JWT
    的声明中提供某些信息。这些信息如下：


    *   `exp` – JWT 的过期时间。这确保了过期的旧令牌被拒绝。

    *   `iss` – 令牌的签发者。

    *   `iat` – 签发时间，标识令牌何时签发。

    *   `upn` – 用户主体名称或当前登录用户的首选用户名。


    它还推荐了以下声明：


    *   `sub` – 此令牌代表谁？

    *   `jti` – 此声明的唯一标识符。

    *   `aud` – 标识 JWT 可以访问的 MP JWT 端点。


    这些要求使得 Jakarta EE 应用程序能够完全无状态。`sub` 声明将被映射到一个 `java.security.Principal` 实例。`groups`
    将用于确定该 Principal 是否具有特定资源方法所需的角色。客户端将在每个请求中发送令牌；JWT 运行时将在每次调用时验证并传播安全上下文。


    ### MicroProfile JWT 安全流程


    MicroProfile JWT 通过将用户的会话信息委托给客户端，允许创建无状态的微服务。客户端的每次调用都包含构建安全上下文所需的所有信息。然后，此安全上下文被插入到现有的
    Jakarta EE 基础设施中，该基础设施可供应用程序的所有部分使用。MicroProfile JWT 安全流程包含三个步骤。

    '
- fmt: '### Authenticate the Client


    The MicroProfile JWT runtime automatically validates the passed JWT token on the
    request header using the available public key of the issuing server or authority.
    This is where Keycloak comes in in our context. We use Keycloak as the issuing
    authority to issue the JWT tokens on our behalf.


    A typical enterprise application will have two tiers: the client or UI tier, which
    can be written in, for instance, Angular or Vue, and the server or resource tier,
    which is what we have seen so far in this book. The client tier is the “user”
    or client of the server or resource tier. An end user will typically interact
    with the UI tier. When the end user clicks a button in the UI to, for instance,
    make a currency conversion, the UI sends a request to the back end or server.
    This request by the UI to the server is what will contain the JWT token. But how
    does the UI get the token?


    When an application uses Keycloak like we are doing (and recommending), when a
    user clicks to sign up through the UI, that user creation process will be delegated
    to Keycloak. So the user credentials will be stored in Keycloak. When the user
    logs in through the UI, the UI redirects the user to Keycloak to log in. Keycloak
    authenticates the user and redirects them back to the UI. From this point, any
    operation made by the logged in user that entails calling the back-end server,
    the UI can go to Keycloak for a JWT token, which will be forwarded to the server
    with each request that the logged in user performs.


    This architecture fully decouples the back-end server, or in this case our Jakarta
    EE application, from knowing anything about the user. Our resources simply require
    a valid token, and respective methods will require the currently executing user
    to have certain roles. All of this will be sent to the server with each call.
    This way, the UI tier and the back-end server tier are fully decoupled and stateless.
    There is no state sharing between them. Every security information needed by the
    server is sent with each client request.


    The bundled Keycloak has a sample user called `max` with the password `max` that
    can be used to obtain JWTs. The sample cURL call in Listing [11-3](#531256_1_En_11_Chapter.xhtml#PC3)
    can be made to the `open-id/connect` endpoint in Keycloak to obtain a JWT token.
    This is the call that was used to generate the JWT shown in Listing [11-1](#531256_1_En_11_Chapter.xhtml#PC1).


    ```

    curl --request POST --url http://localhost:5050/realms/jwallet/protocol/openid-connect/token
    \

    --header ''Content-Type: application/x-www-form-urlencoded'' \

    --data realm=jwallet \

    --data grant_type=password \

    --data client_id=jwallet-service \

    --data username=max \

    --data password=max

    Listing 11-3

    Sample Keycloak call

    ```


    ### Providing the Public Key


    The MicroProfile JWT runtime will validate and authenticate the passed JWT automatically
    by using the public key of the issuing server, in this case Keycloak. The MicroProfile
    JWT spec requires the provision of the public key or a URL for getting the public
    key. The specification defines two MicroProfile Config properties for passing
    the public key of the issuing authority or server to the MicroProfile JWT runtime.
    These properties are `mp.jwt.verify.publickey` and `mp.jwt.verify.publickey.location`.


    The first property allows the passing of the public key text itself as the value
    of the property. The second property allows specifying a URL from which the public
    keys can be downloaded. Specifying both properties results in a deployment exception.
    The `mp.jwt.verify.issuer` property is also used to verify the value of the `iss`
    or issuer claim. The passed value in the JWT must match the passed value in the
    property.


    Listing [11-4](#531256_1_En_11_Chapter.xhtml#PC4) shows the public key and issuer
    properties as used in `jwallet`. Because Keycloak is bundled as a container with
    the application, we supply a URL to the Keycloak resource for loading the public
    keys.


    ```

    mp.jwt.verify.publickey.location=http://keycloak:5050/realms/jwallet/protocol/openid-connect/certs

    mp.jwt.verify.issuer=http://localhost:5050/realms/jwallet

    Listing 11-4

    Passing the public key URL

    ```


    A call to `http://localhost:5050/realms/jwallet/protocol/openid-connect/certs`
    returns the sample public keys shown in Listing [11-5](#531256_1_En_11_Chapter.xhtml#PC5).


