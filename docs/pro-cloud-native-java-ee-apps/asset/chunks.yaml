    # Introduction


    Thank you very much for picking up this book. The Jakarta EE platform has gone
    through a major milestone over the last couple of years. This started with the
    stagnation of Java EE 8 and culminated in the transfer of the entire platform
    to the Eclipse Foundation and the eventual release of Jakarta EE 10. The current
    Jakarta EE platform is a remarkable departure from its earlier J2EE versions.
    Unfortunately, the bad experiences that developers had with the then platform
    have always created confusion in the minds of new and upcoming enterprise Java
    developers. Our goal with this book is to help you become a Jakarta EE developer
    by distilling the core of the platform in the various chapters of this book.


    Our goal is not to teach you everything you need to know about Jakarta EE. For
    that, you can take a look at the [various specifications](https://jakarta.ee/specifications)
    that make up the platform. Our goal is to teach you how “little” you need to know
    to get productive with the platform. We distilled 80% of the everyday Jakarta
    EE we do in our practice into the concise chapters of this book so you can finish
    all of it in two or so weeks. Throughout this book, we focused on keeping things
    concise and to the point.


    We cover both the oft-neglected theory and history of the platform alongside the
    core APIs that you will use in every single application you write on the platform.
    We also cover the use of the Eclipse MicroProfile APIs and how they interweave
    with the Jakarta EE platform to provide you a cohesive platform for application
    development. By the end of this book, you will have a firm theoretical and practical
    foundation in enterprise Java development using Jakarta EE. You will also understand
    much better the various acronyms that abound in its nomenclature.


    Chapter [1](#531256_1_En_1_Chapter.xhtml) sets the context for the book by exploring
    the theoretical foundations and history of the Jakarta EE platform. Chapter [2](#531256_1_En_2_Chapter.xhtml)
    follows by taking a look at general Java enterprise development in a cloud-native
    microservices era. Chapter [3](#531256_1_En_3_Chapter.xhtml) then introduces the
    [sample code](https://github.com/apress/pro-cloud-native-java-ee-apps) that forms
    the centerpiece of discussions throughout the book. Chapter [4](#531256_1_En_4_Chapter.xhtml)
    sets off the rest of the book by taking a deeper look at the Jakarta Contexts
    and Dependency Injection API. This API is single-handedly the most important on
    the platform because it weaves together the disparate parts into one cohesive
    whole. The chapter discusses the practical aspects of the specification that you
    will use in your everyday development.


    Chapter [5](#531256_1_En_5_Chapter.xhtml) follows with another discussion on the
    Jakarta Persistence API, the standard object-relational mapping API for the platform.
    Chapter [6](#531256_1_En_6_Chapter.xhtml) covers creating and consuming RESTful
    resources with the Jakarta REST API. Chapters [7](#531256_1_En_7_Chapter.xhtml)
    through [11](#531256_1_En_11_Chapter.xhtml) cover the Eclipse MicroProfile Config,
    Fault Tolerance, Metrics, Health Check, and JWT Propagation APIs, respectively.
    Chapter [12](#531256_1_En_12_Chapter.xhtml) takes a look at testing Jakarta EE
    applications using the TestContainers Java library, while Chapter [13](#531256_1_En_13_Chapter.xhtml)
    steps back to take a bird’s-eye view of everything discussed so far in the book
    within the context of the sample code. The final chapter, Chapter [14](#531256_1_En_14_Chapter.xhtml),
    discusses breaking down a monolith into microservices ready for cloud deployment.
    Throughout the book, we discuss the use of containers to make Jakarta EE development
    much more productive and faster. The sample code of the application is set up
    for deployment with Kubernetes. You can use it as a template for your own projects.


    To make the most of this book, you should be comfortable with Java SE, ideally
    have at least Java 11 installed. Some familiarity with enterprise Java development
    (doesn’t really matter if it is Spring based) should be helpful but not required.
    You also will need to have Apache Maven, since that is the build tool we use for
    the book code. You can use any modern Java IDE that supports Maven. You should
    be able to import the code into your IDE of choice as long as it has Maven support.
    We hope this book shows you how concise, modern, intuitive, easy, and productive
    the Jakarta EE platform has evolved to be from the days of J2EE.


    Feel free to reach out to us on LinkedIn ([Luqman](https://www.linkedin.com/in/ghgeek)
    [Ghazy](https://www.linkedin.com/in/ghazyabdallah)) at any time with any feedback
    you have. Once again, thank you for picking up this book. We hope it helps in
    solidifying your Jakarta EE development career.


    ## Source Code


    All code used in this book can be found at `github.com/apress/pro-cloud-native-java-ee-apps`.


    # Acknowledgments


    We’d like to acknowledge the excellent work that has been and still being done
    in the Jakarta EE and MicroProfile communities. The transition from Java EE to
    Jakarta EE and the smooth incorporation of cloud-native standards on top of a
    stable base via MicroProfile for a platform of such scale and reach can only be
    described as incredible. The work done so far is a testament to the power of the
    platform and its ecosystem.


