- fmt: '### Authorization


    When the client is authenticated, the MicroProfile JWT then maps the passed groups
    in the claims of the JWT to client roles. For each protected resource, the runtime
    will automatically check if the currently executing client has the role declared
    by the server.


    ### Security Context Propagation


    With the token verified and client authenticated, the MicroProfile JWT API provides
    ways of getting the raw token which can then be passed to other back-end resources
    in the microservice cluster. For instance, when a client authenticates with Service
    A, and Service A depends on Service B, if both are secured with MicroProfile JWT,
    Service A can get the raw token passed by the client and use that to make a call
    to Service B, thereby propagating the JWT to Service B.


    ## MicroProfile JWT Usage


    The first step to protecting resources with MicroProfile JWT is through the use
    of the `@LoginConfig` on a Jakarta REST `jakarta.ws.rs.core.Application` class.
    Listing [11-6](#531256_1_En_11_Chapter.xhtml#PC6) shows the `RootResourceConfiguration`
    class, which extends `Application`, annotated with `@LoginConfig` with the `MP-JWT`
    auth method.


    ```

    @ApplicationPath("api")

    @LoginConfig(authMethod = "MP-JWT")

    public class RootResourceConfiguration extends Application {

    }

    Listing 11-6

    JWT configuration

    ```


    The `@LoginConfig` annotation tells the runtime that all resources in the application
    should be protected, and thus all client requests will need to pass a valid JWT
    for verification and authentication. With the configuration in place, securing
    a web resource is as simple as annotating the resource class or methods with `@RolesAllowed`.
    Listing [11-7](#531256_1_En_11_Chapter.xhtml#PC7) shows the `WalletResource` requiring
    only authenticated users with the role `teller`. User roles are completely managed
    in Keycloak. In enterprise applications, the product owner together with the business
    team will determine the requisite role for each user of an application. All of
    this can be done fully in Keycloak. Our backed service is simply consuming what
    is configured in the security framework.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @RolesAllowed("teller")

    public class WalletResource {

    }

    Listing 11-7

    WalletResource secured

    ```


    The `@RolesAllowed` annotation, from the `jakarta.annotation.security.RolesAllowed`
    package, will cause a 401 HTTP status code to be returned to clients that make
    calls to any resource in this class without a valid token. Listing [11-8](#531256_1_En_11_Chapter.xhtml#PC8)
    shows the response of a sample unsecured call.


    ```

    http://localhost:3001/wallet/api/wallets

    HTTP/1.1 401 Unauthorized

    WWW-Authenticate: Bearer realm="MP-JWT", error="invalid_token"

    Content-Language: en-US

    Content-Length: 0

    Date: Sun, 28 Aug 2022 00:13:24 GMT

    Listing 11-8

    Response from a call with no token

    ```


    ### Getting Information from Tokens


    When a user successfully verified and authenticated, the application might want
    to get hold of some information contained in the claims of the token. The API
    provides two primary ways of accessing the claims in the body of the JWT. These
    are the `JsonWebToken` bean and the injection of claims value using the `@Claim`
    qualifier.


    #### JsonWebToken


    The `JsonWebToken` interface extends the `java.security.Principal` and contains
    methods for getting the claims in the JWT. It also has a method for getting the
    raw token. This can be used to get the raw token for onward propagation to other
    services. This is our recommended approach to consuming the claims of the JWT
    because the `JsonWebToken` instance does not require the bean into which it is
    injected to be `@RequestScoped`. Listing [11-9](#531256_1_En_11_Chapter.xhtml#PC9)
    shows the injection of the `JsonWebToken` into the `@ApplicationScoped` `WalletService`.


    ```

    @ApplicationScoped

    public class WalletService {

    @Inject

    JsonWebToken jsonWebToken;

    public BalanceResponse createWallet(CreateWalletRequest request){

    Wallet wallet = new Wallet();

    wallet.setBalance(BigDecimal.ZERO);

    wallet.setCurrency(request.getCurrency());

    wallet.setAuthUserId(jsonWebToken.getSubject());

    wallet = walletRepository.save(wallet);

    return getBalance(wallet.getId());

    }

    }

    Listing 11-9

    Injection of JsonWebToken

    ```


    The `WalletService` is an application-scoped bean that has the `JsonWebToken`
    injected into it. The MicroProfile JWT runtime will provide an implementation
    of the interface for us. The injected `JsonWebToken` can be used to obtain the
    claims of the token. The `createUser` method calls the `getSubject` method on
    the `jsonWebToken` to get the subject of the token. The subject of the token returned
    by Keycloak is the IAM ID of the user.


    This way, we link wallet database records to the users in Keycloak without both
    services knowing anything about each other. The `WalletService` is not a Jakarta
    REST artifact. It is a plain CDI bean, but through the MicroProfile JWT API, we
    are able to access the claims in the token passed through the HTTP header in the
    service layer of our application. We believe this is the cleanest way to access
    claims from the JWT and thus recommend this approach. Even if an endpoint is not
    secured, resulting in no token passed, an empty instance of the `JsonWebToken`
    will be created. All method invocations on the empty instance will return `null`.


    With this, we can also refactor the `AbstractEntityListener` to finally set the
    `createdBy` audit field for persisted entities. Listing [11-10](#531256_1_En_11_Chapter.xhtml#PC10)
    shows the updated `AbstractEntityListener` using the `JsonWebToken` to set the
    `createdBy` and `updatedBy` fields.


    ```

    @ApplicationScoped

    public class AbstractEntityEntityListener {

    @Inject

    JsonWebToken jsonWebToken;

    @PrePersist

    void init(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setCreated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setCreatedBy(jsonWebToken.getClaim(Claims.upn));

    }

    @PreUpdate

    void update(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setUpdated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setEditedBy(jsonWebToken.getClaim(Claims.upn));

    }

    }

    Listing 11-10

    Using the JsonWebToken

    ```


    The `@PrePersist` and `@PreUpdate` Jakarta Persistence callback methods use the
    `getClaim` method of the `JsonWebToken` to get a specific claim. The `org.eclipse.microprofile.jwt.Claims`
    enum contains constants of all claims in the JWT.


    #### Injecting into Raw Types and ClaimValue


    JWT claims can also be injected into simple Java types through `@Inject` and the
    use of the `@Claims` qualifier. We generally do not recommend this way of getting
    the tokens because some of the field types into which claims can be injected require
    the beans into which they’re being injected to be `@RequestScoped`. Effectively,
    to be able to fully utilize injecting claim values this way, the bean should be
    `@RequestScoped`. Listing [11-11](#531256_1_En_11_Chapter.xhtml#PC11) shows the
    injection of claims using these two constructs.


    ```

    @Action

    public class WalletService {

    @Inject

    @Claim(standard = Claims.sub)

    private String subject;

    @Inject

    @Claim(standard = Claims.raw_token)

    private ClaimValue rawToken;

    }

    Listing 11-11

    Injecting into simple types

    ```


    The `subject` field is a simple `String` type annotated `@Inject` and the qualifier
    `@Claim`. The `standard` parameter of the `@Claim` qualifier is passed the name
    of the claim to inject into this field. The `Claims` enum is used to pass the
    `sub` or `subject` claim as the claim of interest. The `org.eclipse.microprofile.jwt.ClaimValue`
    is an interface that extends the `Principal` interface. It has two methods, `getName`
    and `getValue`. `getName` returns the name of the claim, and `getValue` returns
    the value of the claim in the token.'
  raw: '#### Authorization


    When the client is authenticated, the MicroProfile JWT then maps the passed groups
    in the claims of the JWT to client roles. For each protected resource, the runtime
    will automatically check if the currently executing client has the role declared
    by the server.


    #### Security Context Propagation


    With the token verified and client authenticated, the MicroProfile JWT API provides
    ways of getting the raw token which can then be passed to other back-end resources
    in the microservice cluster. For instance, when a client authenticates with Service
    A, and Service A depends on Service B, if both are secured with MicroProfile JWT
    , Service A can get the raw token passed by the client and use that to make a
    call to Service B, thereby propagating the JWT to Service B.


