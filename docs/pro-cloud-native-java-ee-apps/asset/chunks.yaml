    you are working on will be used with an existing schema, mostly from legacy applications.
    The @Column annotation can also be used to set some constraints and properties
    on the column in the database. Listing [5-10](#531256_1_En_5_Chapter.xhtml#PC10)
    shows the User entity, with @Column used to customize some fields .


