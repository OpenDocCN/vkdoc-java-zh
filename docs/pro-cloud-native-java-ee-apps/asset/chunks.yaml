  trans: '

    ### 竞争性企业的激增


    上述因素以各种方式共同作用，导致了任何特定市场中竞争者数量的增加。更大的潜在用户池、通过互联网交付软件的近乎公平的竞争环境，以及相对更便宜的基础设施托管服务，所有这些因素共同为更多企业进入任何特定市场创造了平等的基础。


    ## 微服务的兴起


    上述几点都以某种方式成为促使软件开发行业重新审视软件开发、测试和部署方式的因素。企业将应用程序部署到他们主要拥有和管理的服务器上。大多数企业拥有完全专用的内部团队，负责管理整个应用程序开发生命周期所需的全部服务器堆栈。这意味着企业需要操心为其应用程序采购、安装和管理服务器堆栈。对于较小的公司和初创企业来说，这被证明是相当昂贵的。


    当某个应用程序的规模和复杂性增长时，单体架构的优势也带来了其他随之而来的挑战。一个应用程序可能会变得非常庞大和复杂，以至于添加最微小的更改都需要进行大量的自动化和手动测试，以确保没有负面的、非预期的副作用。即使是最简单的更改也意味着需要重新运行整个应用程序部署管道。因为所有东西都捆绑在一起，最简单的错误也可能导致整个应用程序崩溃。


    由于上述所有因素的不同组合，软件开发行业开始关注另一种软件开发范式。这种被称为微服务^(⁵⁴)的范式，提出了一种将前述所有因素都考虑在内的软件开发方式。这个想法源于
    Unix 哲学，即通过将完整的应用程序分解为独立的单元来编写，所有这些单元都通过一个完善且可预测的接口进行通信。


    微服务范式建议通过将软件分解为更小的服务来编写，其中每个服务负责整个应用程序的单一功能或特性，每个服务彼此独立，所有服务通过 RESTful 端点上的 HTTP
    协议进行通信。这些服务可以由编排服务在给定的服务器集群上独立部署和管理。微服务架构中还隐含着一个事实，即应用程序和整个开发过程都在“云”中执行。


    微服务架构一经推出便大受欢迎，因为它解决了许多超大型单体应用中的痛点。其优势如下。


    ### 通过分解管理复杂性


    由于应用程序的每个单元都是作为独立的子应用程序开发的，因此随着其复杂性的增加，管理整个应用程序开发相对更容易。


    ### 更易于维护


    由于整个应用程序由独立的单元组成，因此可以轻松添加新功能和修复错误，而不会破坏整个应用程序。给定服务中的任何问题都仅限于该服务。


    ### 更快的开发速度


    由于开发人员不需要了解整个应用程序，因此使用微服务架构进行开发相对更快，因为每个开发团队大多只需要了解他们正在开发的服务。因此，应用程序可以更快地发布。


    ### 可扩展性


    通过微服务架构构建的应用程序可以相对容易地进行扩展，因为可以将资源定向到仅扩展那些需要扩展的部分或服务。


    ### 弹性


    在生产环境中，作为一套微服务开发的应用程序不会因为一个服务宕机而整体崩溃。为对整个应用程序至关重要的服务构建有针对性的弹性也更容易。


    ### 更容易采用新技术


    微服务架构的核心特性——服务通过 RESTful 接口暴露其功能——意味着这些功能的实现与面向客户端的接口完全分离。这意味着单个服务可以更快地采用新技术，只需处理实现细节，而不必影响面向客户端的接口。


    ## 云原生开发


    微服务架构中隐含了云原生应用程序开发的概念。云原生计算基金会（CNCF）将其定义为：“云原生技术使组织能够在现代、动态的环境（如公有云、私有云和混合云）中构建和运行可扩展的应用程序。容器、服务网格、微服务、不可变基础设施和声明式
    API 体现了这种方法。这些技术使系统具有松散耦合、弹性、可管理和可观察的特性。结合强大的自动化，它们允许工程师以最小的辛劳频繁且可预测地进行高影响力的更改。”


    CNCF 的定义概述了现代软件开发的方式。它旨在优化整个开发过程，使其尽可能高效，并能够为客户交付尽可能多的价值。云原生原则旨在帮助企业管理现代应用程序开发的复杂性。在一个任何应用程序都可能被无数设备和方式消费的时代，需要一套可适应的模式来提高成功开发流程的几率。


    云原生开发背后的理念是能够更快、更便宜地向客户交付弹性的应用程序。随着用户对应用程序提出更多要求，企业必须找到一种有效的方式，以更低的成本向用户交付价值。云原生开发是企业实现敏捷开发流程的一种方式，从而为用户提供弹性、健康、安全和可靠的应用程序。


    云原生应用程序依赖于云服务提供商。正如 CNCF 对云原生的定义中所述，企业可以利用三种云服务。


    ### 公有云


    公有云是由第三方提供商管理的一组计算服务，这些服务可通过互联网供不同的客户访问。一个典型的例子是来自亚马逊云服务（AWS）的通用计算服务套件。


    ### 私有云


    私有云是指由单个企业拥有的一组计算服务，可以由该企业在其自己的数据中心管理，也可以由第三方服务提供商收费管理。在云托管计算服务普及之前，这是应用程序部署的主要模式。企业会建立自己的计算基础设施，由内部员工管理。现在有许多第三方私有云提供商，例如
    AWS 虚拟私有云。


    ### 混合云


    混合云是公有云和私有云的结合。它通常提供更大的灵活性和更多选择。


    ## 12-Factor 应用^(⁵⁷)


    12-Factor 应用是一套被广泛接受的、用于开发云原生应用的指导方针。它提出了一些因素，可以帮助开发人员创建高度优化以适应云环境的应用程序。这些因素如下。

    '
- fmt: '### Codebase


    This factor entails having a separate codebase for each service or component of
    the application. Common functionality or shared services should be put in libraries
    that can be dropped into each codebase through a dependency management system
    (e.g., `Maven`). A given codebase can be deployed to different stages of the deployment
    pipeline.


    ### Dependencies


    Each microservice should declare, bundle, and separate its dependencies from the
    other services. No two services should have common dependencies such that a change
    in the dependency of one service has an impact on the other service. All services
    should be fully siloed in terms of their dependencies.


    ### Configuration


    Microservices should have their configurations stored in an external environment
    such that those configurations can change between the various deployment stages
    without having to change code.


    ### Backing Services


    A backing service is any service a given microservice needs and consumes over
    the network as part of its normal operation. A 12-factor app should treat backing
    services as resources accessible via addressable URLs. The goal is to decouple
    the application from the backing service such that the backing service can be
    interchanged with another without any impact to the microservice.


    ### Build, Release, Run


    The build, release, and run stages should be fully separated. Each stage should
    be tagged with a unique identifier that makes it possible to be able to roll back
    to that particular point. Modern release tools like `Jenkins` help with this.


    ### Processes


    12-factor applications should be run as independent, stateless processes that
    share nothing. No service should operate based on the assumption of the existence
    of some data outside of what that service will generate at runtime.


    ### Port Binding


    Each microservice should be bound to a specific port from which it will listen
    for requests. No two services should be bound to the same port.


    ### Concurrency


    When the need for scaling arrives, each microservice should be scaled out horizontally
    rather than vertically. When each service is run as a stateless process, it is
    easy to scale out horizontally.


    ### Disposability


    Each microservice should be disposable. A given service should be disposable at
    a moment’s notice without loss of data. Creating microservices as stateless processes
    means they can be destroyed at any time without any side effects.


    ### Dev/Prod Parity


    Development, staging, and production environments should be as similar as possible,
    without sharing any data. Because a 12-factor application is designed to be continuously
    deployed, it is important to reduce the friction between the various stages as
    much as possible.


    ### Logs


    Logs give a glimpse into the internals of each running microservice. As such,
    each service should only concern itself with writing logs to the default output
    stream available. Log aggregator tools can then be used to collect and analyze
    these logs for corrective actions, if any.


    ### Admin Processes


    One-off administrations like database migrations should be run as one-off processes,
    preferably in an identical environment as the application runs.


    ## Containers and the Cloud


    The crux of cloud-native applications is the ability to package applications into
    images and run them as containers. Containerization tools like `Docker` and orchestration
    tools like `Kubernetes` make it easy to package an application with its runtime
    and deploy it to server stacks where they are automatically provisioned to service
    requests. This abstraction makes it possible to run any given Java application
    anywhere you can run the packaged image as containers.


    As discussed earlier in this chapter, enterprise Java applications are deployed
    to runtimes that implement the enterprise Java specification. Containerization
    has increasingly made it possible to run enterprise Java applications in public,
    private, and hybrid clouds as containerized apps. Application server vendors now
    have to compete on how easy it is for their runtimes to be packaged and run as
    cloud-native artifacts.


    ## Enterprise Java and Cloud-Native Development


    `J2EE` and its successor `Java EE`, even though originally designed for developing
    multitier, large, monolithic applications, could be used to develop microservices
    as well. As discussed in the previous chapter, a decline in the development pace
    of the platform along the line when the popularity of microservices began to rise
    meant that the platform fell behind in adopting some of the changes needed to
    position itself as a suitable platform for cloud-native development.


    This development, however, did not stop the Java community from starting projects
    to fill in the void. Notable among these is the `Eclipse MicroProfile` project.
    There are other projects equally geared toward building cloud-native enterprise
    Java applications such as `Dropwizard`, `Helidon`, `Micronaut`, and `Quarkus`.
    All these frameworks provide APIs for developing applications that are resilient,
    fault tolerant, configurable, stateless, containerizable, and portable across
    cloud environments.


    ## Summary


    The standardization of the `Eclipse MicroProfile` project and its positioning
    as an independent subset of the larger `Jakarta EE` platform provide a mature,
    dependable, predictable, and reliable platform for enterprise cloud-native application
    development.


    Throughout the rest of this book, you are going to learn how the various APIs
    on the `Jakarta EE` platform, augmented by others from the `Eclipse MicroProfile`
    project, can be used to develop modern, cloud-native, testable, resilient, fault-tolerant,
    configurable, portable, and secure enterprise applications. You will learn how
    developing enterprise applications using a mature platform like `Jakarta EE` will
    help you develop long-lived, maintainable Java applications. See you in the next
    chapter.


