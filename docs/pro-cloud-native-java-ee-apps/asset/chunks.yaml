    # 8. Resilience with Fault Tolerance API


    Modern cloud-native applications are generally crafted as a set of microservices
    that communicate with each other, mostly over the network. Users of such applications
    have come to expect applications to always be available. However, there are a
    number of things that can always go wrong during the runtime of an application
    instance.


    The network may be unavailable, a database service might take too long to respond,
    an application might go viral overnight and have an unexpected surge in concurrent
    users, a web service might be offline, and a multitude of other potential problems.
    For an application to be able to weather such inevitable mishaps, it needs to
    be fault-tolerant and resilient.


    The Eclipse MicroProfile Fault Tolerance specification provides a number of declarative
    API constructs that can be used to create fault-tolerant and resilient modern,
    cloud-native applications. The goal of this chapter is to show you how you can
    use the Eclipse MicroProfile Fault Tolerance API to add retry policies, bulkheads,
    circuit breakers, timeouts, and fallbacks to your microservices, transforming
    them into much more resilient cloud-native versions.


    ## Fault Tolerance


    The Fault Tolerance specification provides a number of interceptor bindings that
    can be used declaratively to achieve fault tolerance on applications. These interceptor
    bindings can be used individually or in combination with each other. Because the
    specification is built on the Jakarta Interceptors specification , it can be used
    directly with CDI beans. So all existing CDI services can be transformed into
    fault-tolerant components with the Fault Tolerance specification.


    The set of fault tolerance interceptor bindings available covers the following
    aspects of creating resilient, fault-tolerant applications :


    *   Fallback


    *   Timeout


    *   Retry policy


    *   Circuit breaker


    *   Asynchronous


    *   Bulkhead'
