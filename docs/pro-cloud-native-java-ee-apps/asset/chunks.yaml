  trans: '

    ##### FROM 子句


    FROM 子句定义了查询所涵盖的一个或多个实体。清单 5-41 至 5-43 中展示的查询都使用了 FROM 子句来声明查询域实体，并将其别名为一个变量。然而，FROM
    子句也可以通过 JOIN 声明多个要查询的实体。


    清单 5-42 中展示的查询将从 User 表到 UserCredentials 表创建一个隐式内连接。该查询可以重写为清单 5-44 所示的形式。


    ```

    select u.userCredentials from User  u join u.userCredentials c

    清单 5-44

    展示显式连接

    ```


    现在，该查询将 User 表与 UserCredentials 表连接起来，并将后者别名为变量 `c`。这些别名变量随后可以在 where 子句中使用。如上所述，创建的连接类型是内连接。连接类型可以显式声明，但若未声明，则默认为内连接。你可以声明多个
    JOIN，并将它们全部别名为变量，这些变量将在查询上下文的其余部分可用。也可以使用 `LEFT JOIN` 语法（而不仅仅是 `JOIN`）来创建外连接。


    还可以使用 Fetch 连接来创建连接，但与传统的连接不同，Fetch 连接不会返回被连接的实体。Fetch 连接会指示运行时立即加载被获取的实体，这样当从主实体访问它时，就不会产生额外的数据库调用。清单
    5-45 展示了 User 实体及其交易历史的 Fetch 连接查询。


    ```

    select u from User  u join fetch  u.transactionHistory

    清单 5-45

    带有 Fetch 连接的 User 实体

    ```


    对用户交易历史的 Fetch 连接告诉运行时预取每个用户行的交易历史。`transactionHistory` 被声明为延迟加载。在事务中，由于使用了 `join
    fetch`，当执行此查询时，运行时将不会对数据库进行第二次调用。Fetch 连接有效地立即加载了被连接的实体。


    ##### WHERE 子句


    JPQL 查询的 WHERE 子句用于将结果过滤为仅匹配 WHERE 条件的那些结果。JPQL 中的 WHERE 子句与 SQL 的 WHERE 子句非常相似。清单
    5-46 展示了将结果集限制为仅包含达到特定总转化阈值的用户的 User 查询。


    ```

    select u.userCredentials from User u

    where u.totalConversions >= :totalConversions

    清单 5-46

    展示 User 查询的 WHERE 子句

    ```


    WHERE 子句使用 FROM 子句中的别名变量来设置条件。别名变量是 User 实体的实例，可以使用 `.` 运算符进行遍历。WHERE 子句遍历 `totalConversions`
    字段，并使用 `>=` 运算符来限制结果。运算符右侧的变量称为**命名参数**。这是向 JPQL 查询传递变量的推荐方式。出于安全原因，运行时会代表您对值进行转义。


    WHERE 子句支持许多 Java 运算符，例如 `>`、`<`、`<=`、`>=`，以及关键字 `LIKE`、`IN`、`IS`、`EMPTY`、`BETWEEN`，以及用于反转任何关键字的
    `NOT`。它还支持逻辑 `AND`，您可以使用它来创建逻辑相关的条件。JPA 规范提供了更多关于在查询中使用 WHERE^(¹⁰³) 子句的详细信息。


    ##### 聚合查询


    JPQL 也支持聚合查询。有五种聚合查询可用于创建数据摘要，分别是 `AVG`、`COUNT`、`MAX`、`MIN` 和 `SUM`。清单 5-47 展示了所有总转化次数超过指定值的用户数量。


    ```

    select COUNT(u) from User u

    where u.totalConversions >= :totalConversions

    清单 5-47

    展示 COUNT 聚合查询的使用

    ```


    `COUNT` 聚合函数在 SELECT 子句中使用，用于统计总转化次数超过指定值的用户数量。此查询将返回一个表示总数的整数类型。


    #### 执行查询


    创建查询后，需要执行它们。执行 JPQL 查询的方式是通过 `EntityManager` 接口。JPQL 有两种类型，即动态查询和命名查询。


    ##### 动态查询


    动态查询是直接在方法中创建的 JPQL 查询。它们被称为即时创建或动态创建，因为每次调用该方法时都会构造它们。清单 5-48 展示了动态执行加载所有用户的查询。


    ```

    public List loadAllUsers() {

    return em.createQuery("select u from User  u", User.class)

    .getResultList();

    }

    清单 5-48

    展示动态查询执行

    ```


    `createQuery` 方法是实体管理器上的一个重载方法，它接受一个查询，并可选择接受一个结果应转换成的类型，然后返回一个 `TypedQuery<T>`，其中
    `T` 是传递给该方法的类型。如果在 `createQuery` 方法中未指定类型，则返回一个 `Query`。在这种情况下，结果将是未类型的。通常，我们不建议使用原始的
    `Query` 类型。只要您事先知道类型，就应该传入一个类型。


    返回的 `TypedQuery` 接口有许多方法可供调用以获取查询结果。`getResultList`、`getResultStream` 和 `getSingleResult`
    方法分别返回查询结果的类型化列表、类型化的 `java.util.stream.Stream` 接口或单个结果。我们建议避免使用 `getSingleResult`，因为它有点古怪。


    ##### 命名查询


    清单 5-48 中展示的示例可以通过将 JPQL 移动到实体类上的一个元素来转换为命名查询，如清单 5-49 所示。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    @NamedQuery(name = User.LOAD_ALL_USERS, query = "select u from User  u")

    public class User extends AbstractEntity {

    public static final String LOAD_ALL_USERS = "User.loadAllUsers";

    }

    清单 5-49

    展示一个命名查询

    ```


    创建命名查询需要使用 `@NamedQuery` 注解来注解一个实体类。该注解接受查询的名称和实际的 JPQL。清单 5-49 中展示的示例显示了 `User.loadAllUsers`
    查询，该查询从用户实体中选择所有用户。使用命名查询只需将查询的名称传递给 `EntityManager`，如清单 5-50 所示。


    ```

    public List loadAllUsers() {

    return em.createNamedQuery(User.LOAD_ALL_USERS, User.class).getResultList();

    }

    清单 5-50

    展示使用 LOAD_ALL_USERS 命名查询

    ```


    `EntityManager` 接口的 `createNamedQuery` 方法接受查询的名称，并可选择接受类型。这实际上是执行命名查询和动态查询之间的唯一区别。关于哪种方式更高效，尚无定论。我们的一般建议是尽可能使用命名查询，因为它们更易于阅读，并且可以在一个中心位置（通常是在被查询的实体上）找到。

    '
- fmt: '### Passing Parameters


    The `TypedQuery` interface has methods to set the parameters of JPQL queries.
    Listing [5-51](#531256_1_En_5_Chapter.xhtml#PC51) shows the execution of the query
    that was shown in Listing [5-46](#531256_1_En_5_Chapter.xhtml#PC46).


    ```

    public List loadUsersByTotalConversion(final BigDecimal totalConversion) {

    return em.createNamedQuery(LOAD_USERS_BY_CONVERSIONS, User.class)

    .setParameter("totalConversions", totalConversion)

    .getResultList();

    }

    Listing 5-51

    shows passing parameters to queries

    ```


    The `setParameter` method on the returned `TypedQuery` takes a `String` representing
    the named parameter and the value. The passed value will be automatically escaped
    by the JPA runtime.


    JPQL is a powerful but simple query language that complements the use of SQL for
    application development. The question of when to use JPQL is something we do not
    have any strong opinions about. In the end, a lot of things come down to technical
    decisions of the particular domain. A general rule of thumb is to use what is
    available on the platform as much as possible because doing so makes your application
    portable across different providers.


    ### Criteria API


    The Criteria API is another API for querying entities in JPA. Unlike JPQL, the
    Criteria API is typesafe but much more verbose. It lends itself better to creating
    search type queries in applications. JPQL, on the other hand, is much more suited
    to creating queries that are known beforehand. Listing [5-52](#531256_1_En_5_Chapter.xhtml#PC52)
    shows the Criteria API equivalent of the JPQL shown in Listing [5-52](#531256_1_En_5_Chapter.xhtml#PC52).


    ```

    public List loadAllUsersCriteria() {

    CriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();

    CriteriaQuery query = criteriaBuilder.createQuery(User.class);

    Root from = query.from(User.class);

    return em.createQuery(query.select(from)).getResultList();

    }

    Listing 5-52

    shows the Criteria API for getting users

    ```


    The Criteria API starts with a call to the `getCriteriaBuilder` method on the
    `EntityManager`. This returns a `CriteriaBuilder` that is used to build the query.
    The `CriteriaBuilder` creates a typed `CriteriaQuery` with a call to the `createQuery`
    method that takes a class. The query then uses the `from` method to create a typed
    `Root<T>` object that acts as the root entity of the query. The query is finally
    executed by passing the `query.select(from)` to the `createQuery` method of the
    `EntityManager`. The `CriteriaQuery.select` method returns yet another `CriteriaQuery`
    that is passed to the `EntityManager`.


    As you can see, the Criteria API can be very verbose. A one-line JPQL translated
    to the Criteria API takes about three. There is also support for passing parameters
    to the query. The query shown in Listing [5-46](#531256_1_En_5_Chapter.xhtml#PC46)
    is rewritten using the Criteria API in Listing [5-53](#531256_1_En_5_Chapter.xhtml#PC53).


    ```

    public List loadUsersByConversionCriteria(final BigDecimal totalConversion) {

    CriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();

    CriteriaQuery query = criteriaBuilder.createQuery(User.class);

    Root from = query.from(User.class);

    CriteriaQuery where =

    query.select(from).where(

    criteriaBuilder.greaterThanOrEqualTo(

    from.get("totalConversions"),totalConversion));

    return em.createQuery(where).getResultList();

    }

    Listing 5-53

    Passing parameters with the Criteria API

    ```


    The Criteria API has methods for all the keywords we saw with JPQL such as the
    `where` clause. The `query.select` method returns a `CriteriaQuery` on which the
    `where` method is called to set the predicate for the query. The `CriteriaBuilder`
    has methods representing the various operators available in JPQL such as `greaterThanOrEqualTo`
    as used earlier. To access a field of the entity, the `get()` is called on the
    `Root` object and passed the name of the field.


    The Criteria API lends itself much better to creating search type queries. Listing
    [5-54](#531256_1_En_5_Chapter.xhtml#PC54) shows a simple search for a user based
    on the passed search object.


    ```

    public List searchUsers(final UserSearchRequest searchRequest) {

    CriteriaBuilder criteriaBuilder = em.getCriteriaBuilder();

    CriteriaQuery query = criteriaBuilder.createQuery(User.class);

    Root from = query.from(User.class);

    final Set predicateSet = new HashSet();

    if (searchRequest.getFirstName() != null) {

    Predicate firstName = criteriaBuilder

    .like(from.get("firstName"),

    "%" + searchRequest.getFirstName() + "%");

    predicateSet.add(firstName);

    }

    if (searchRequest.getLastName() != null) {

    Predicate lastName = criteriaBuilder

    .like(from.get("lastName"),

    "%" + searchRequest.getLastName() + "%");

    predicateSet.add(lastName);

    }

    if (searchRequest.getTotalConversions() != null) {

    Predicate totalConversions = criteriaBuilder

    .greaterThanOrEqualTo(from.get("totalConversions"),

    searchRequest.getTotalConversions());

    predicateSet.add(totalConversions);

    }

    if (searchRequest.getUserType() != null) {

    Predicate userType = criteriaBuilder

    .equal(from.get("userType"), searchRequest.getUserType());

    predicateSet.add(userType);

    }

    CriteriaQuery where = query

    .select(from).where(predicateSet.toArray(new Predicate[] {}));

    return em.createQuery(where).getResultList();

    }

    Listing 5-54

    shows Criteria API search

    ```


    The method takes a `UserSearchRequest` object that contains some fields of the
    `User` entity. It then traverses each field, checking if it’s not null and then
    creating a `jakarta.persistence.criteria.Predicate` object from it. These predicates
    are added to a set that is then converted to an array and passed to the `where`
    method on the `CriteriaQuery`. This is a very simple search implementation using
    the Criteria API. Because of its dynamic nature, it is well suited to this kind
    of use. The Jakarta Persistence specification has much details on the Criteria
    API in the relevant section.^([^(104)](#fn104))


    ## Summary


    In this chapter, we discussed the Jakarta Persistence API,^([^(105)](#fn105))
    the standards-based object-relational mapping API for bridging the object-relational
    divide. We looked at the three broad components of data handling, namely, modelling
    which entailed creating entities and organizing their interrelationships; data
    persistence, where we actually put the data into the database; and querying data,
    which entailed getting the data out of the database.


    The Jakarta Persistence API is a very complex and extensive specification. The
    goal of this chapter has been to introduce you to the API in the hopes that you
    can better continue your study of the specification on your own. With what you
    have learned in this chapter, pursuing the specification should be easy and straightforward.


