    # 4. Managing Dependencies with CDI


    Every nontrivial application will be made up of different components working together
    to fulfill the objectives of the application. These components will have intricate
    dependencies on each other. Managing this complex interdependence manually can
    be a very daunting task. The Jakarta EE platform provides the Jakarta Contexts
    and Dependency Injection API that you can use to automate the process of managing
    application component dependencies.


    You can think of the CDI API as a black box that you make invocations to and “magically”
    get instances of your application components with a well-defined lifecycle and
    other added features. Jakarta CDI is analogous to the kitchen in a restaurant.
    Most of the time, you simply walk into a restaurant, peruse the menu, make an
    order, and after a brief moment have your order prepared and served with cutlery
    and other ancillary stuff. The CDI runtime is quite similar except your “order”
    is delivered instantaneously.


    With CDI, your various application components declare their dependencies and have
    the runtime manage the creation, injection, and destruction of the created instances.
    You invert the control of dependency management. Dependency injection is effectively
    a form of the inversion of control^([^(85)](#fn85)) pattern of application development.
    In this chapter, and the rest of this book, we loosely use the term component
    to refer to any piece of an application that can be encapsulated in a Java class.


    By the end of this chapter, you will learn how the CDI API bean management (we
    will extensively see what a bean is), producer, interceptor, and event mechanisms
    help you write maintainable, loosely coupled applications that will live for the
    foreseeable future. You will also learn how these constructs transparently allow
    you to implement tried and tested design patterns with minimal effort.


    ## An Overview of CDI in Jakarta EE 10


    The latest version of the CDI specification being shipped with Jakarta EE 10 is
    CDI 4.0.^([^(86)](#fn86)) This release features a split of the core CDI API into
    Lite and Full. CDI Lite is designed to run in more restricted environments and
    features a subset of the original features. CDI Full contains the Lite and all
    other features that were in core CDI in previous Jakarta EE releases. This chapter
    and the rest of the book focus on CDI Full, which is what is shipped with the
    full Jakarta EE 10 release.


    ### Key Features of CDI


    The CDI API gives you a set of features that help in developing loosely coupled,
    complex enterprise applications. Having a loosely coupled application means that
    the various components of your application aren’t rigidly tied to each other.
    This way, it is easy to substitute one component for another without having to
    significantly rewrite the application. The following are the core features that
    the CDI API has available for helping you achieve that.


    #### Typesafe Dependency Resolution Mechanism


    CDI uses Java types to resolve dependencies. Unlike other dependency injection
    implementations that are string based, CDI uses Java types through a combination
    of metadata and Java beans to resolve dependencies that you declare. This is achieved
    through a sophisticated resolution mechanism that allows you to select dependencies
    at development or deployment time.


    #### Well-Defined Lifecycle Contexts


    CDI allows you to bind stateful objects to a well-defined, extensible lifecycle
    context. Each instance of a bean that you request from the runtime has a predictable
    lifecycle, complete with callbacks that you can hook into.


    #### Integration with the Web Tier


    Through integration with the Jakarta Unified Expression Language (EL), contextual
    objects like Jakarta Enterprise Beans can be accessed directly from a Jakarta
    Server Faces page.


    #### Interceptors


    CDI interceptors allow you to associate interceptors with Java objects through
    typesafe interceptor bindings. You can use these interceptors to implement features
    that are orthogonal to the core of any given bean.


    #### Events


    CDI events are a powerful, typesafe way to have completely separate components
    of your application communicate in a fully decoupled way through the use of event
    notifications. One component can fire an event, and any registered listeners of
    that event will be notified or called by the CDI runtime, passing in the requisite
    event object automatically.


    #### An SPI for Creating Extensions


    CDI provides a service provider interface for the creation of portable extensions
    that integrate with the container. An example of a CDI portable extension is the
    Apache DeltaSpike^([^(87)](#fn87)) project.


    These are the main features provided by CDI for enterprise application development
    on the Jakarta EE platform. The rest of this chapter goes into detail about how
    to take advantage of these features in application development. Let us start by
    seeing how to activate CDI in a Jakarta EE application.


    ## CDI Activation


    ### Bean Discovery Modes


    To understand how CDI is activated in an application, we first need to discuss
    the concept of bean discovery modes. A bean discovery mode determines how the
    CDI runtime treats possible CDI components in an application. There are three
    bean discovery modes as follows.


    #### None


    This mode tells the CDI runtime to not scan for any beans during application boot
    time. Setting the bean discovery mode to this is effectively disabling CDI in
    the application. You will rarely ever use this option.'
