    one constructor annotated with @Inject. However, there will be some Java types
    that are needed in an application but aren’t necessarily valid CDI beans. For
    example, Listing [4-19](#531256_1_En_4_Chapter.xhtml#PC19) shows a field injection
    point of type EntityManager in the BaseRepository bean.


    ```

    public abstract class BaseRepository {

    @Inject

    EntityManager em;

    }

    Listing 4-19

    showing an attempt to inject a platform class into BaseRepository, an application-defined
    bean

    ```


    Listing [4-19](#531256_1_En_4_Chapter.xhtml#PC19) shows a field injection point
    declaration of type EntityManager in the BaseRepository bean . An attempt to deploy
    the application will fail with the error message “Unsatisfied dependencies for
    type EntityManager with qualifiers @Default at injection point @Inject com.example.jwallet.core.control.BaseRepository.em”.
    The CDI container is complaining that the field type has unsatisfied dependencies.
    What this means is that the CDI runtime doesn’t know how to instantiate a contextual
    instance of the EntityManager class.


