- fmt: '# Combining Health Checks


    The health checks seen so far have all been implemented by separate beans. However,
    they can all be combined and implemented by a single bean. In this case, the single
    `HealthCheck` bean will be annotated with all the required health check qualifiers.
    Such a `HealthCheck` implementation will be used to resolve all health checks
    for which it is annotated. Listing [10-7](#531256_1_En_10_Chapter.xhtml#PC7) shows
    a single health check implementation for `@Liveness`, `@Readiness`, and `@Startup`.


    ```

    @ApplicationScoped

    @Liveness

    @Readiness

    @Startup

    public class HelloHealth implements HealthCheck {

    LocalDateTime upSince = LocalDateTime.now(ZoneOffset.UTC);

    @Inject

    ApiLayer apiLayer;

    @Override

    public HealthCheckResponse call() {

    JsonObject currencySymbols = apiLayer.getCurrencySymbols();

    boolean success = currencySymbols.getBoolean("success", false);

    return success

    ? HealthCheckResponse.named("rate-service")

    .withData("up_since", upSince.toString())

    .withData("rate_api_provider", "up")

    .up()

    .build()

    : HealthCheckResponse.down("rate-service");

    }

    }

    Listing 10-7

    shows a single health check implementation

    ```


    Listing [10-7](#531256_1_En_10_Chapter.xhtml#PC7) shows a single health check
    implementation for liveness, readiness, and startup. For this implementation,
    an external call is made to the rate service provider for the application. The
    only time we want to return an UP health check response is when the external service
    provider is available. Since we delegate rate conversion to that service, there
    is not much point in putting our application into service when the external provider
    we depend on is down. A call to `/health`, `/health/live`, `/health/ready`, and
    `/health/started` will all be routed to this single implementation. A sample call
    to `/health` returns the data shown in Listing [10-8](#531256_1_En_10_Chapter.xhtml#PC8).


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": "2022-08-14T17:59:26.592292658",

    "rate_api_provider": "up"

    },

    "name": "rate-service",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    Listing 10-8

    shows data for the single health check implementation

    ```


    # Producing Health Checks


    As discussed in the chapter on Jakarta Contexts and Dependency Injection (Chapter
    [4](#531256_1_En_4_Chapter.xhtml)), producers are a construct for creating CDI
    beans. As `HealthCheck`s are CDI beans, they can be produced using the CDI producer
    method construct. Listing [10-9](#531256_1_En_10_Chapter.xhtml#PC9) shows the
    `WalletHealthCheckProducer` bean with three producer methods, each with a qualifier
    for the three health checks of liveness, readiness, and startup.


    ```

    @ApplicationScoped

    public class WalletHealthCheckProducer {

    CountDownLatch readinessCountdown = new CountDownLatch(2);

    CountDownLatch startupCountdown = new CountDownLatch(5);

    @Inject

    @ConfigProperty(name = "free.memory.limit")

    Integer freeMemoryLimit;

    @Produces

    @Liveness

    HealthCheck livenessCheck() {

    String healthCheckName = "wallet-liveness-health-check";

    return () -> {

    long totalMemory = Runtime.getRuntime().totalMemory();

    long freeMemory = Runtime.getRuntime().freeMemory();

    boolean adequateMemory = (((float) freeMemory / totalMemory) * 100) > freeMemoryLimit;

    return adequateMemory ?

    HealthCheckResponse

    .builder()

    .name(healthCheckName)

    .up()

    .build() :

    HealthCheckResponse

    .named(healthCheckName)

    .down()

    .build();

    };

    }

    @Produces

    @Readiness

    HealthCheck readinessCheck() {

    return () -> {

    readinessCountdown.countDown();

    return readinessCountdown.getCount() == 0 ?

    HealthCheckResponse

    .up("wallet-liveness") :

    HealthCheckResponse

    .down("wallet-liveness");

    };

    }

    @Produces

    @Startup

    HealthCheck startupCheck() {

    return () -> {

    startupCountdown.countDown();

    return startupCountdown.getCount() == 0 ?

    HealthCheckResponse

    .up("wallet-started") :

    HealthCheckResponse

    .down("wallet-startup-failed");

    };

    }

    }

    Listing 10-9

    shows HealthCheck creation with producer methods

    ```


    Listing [10-9](#531256_1_En_10_Chapter.xhtml#PC9) shows the `@ApplicationScoped`
    `WalletHealthCheckProducer` with three methods. Each method is annotated with
    the CDI `@Produces` and a health check qualifier. The first method is a `@Liveness`
    check that returns a status if the free memory relative to the total memory available
    in the JVM is more than the passed configured value. In the sample code, the MicroProfile
    config value passed in the `microprofile-config.properties` is 40. So if the free
    memory in the JVM is more than 40%, then the liveness check returns a `HealthCheckResponse`
    object with status up. Otherwise, it returns a down status.


    The second method is a `@Readiness` check that simply counts down to two and returns
    an up status. The third method is a `@Startup` check that also counts down to
    five and then returns an up status. Listing [10-10](#531256_1_En_10_Chapter.xhtml#PC10)
    shows the returned data for a sample call to the `/health` endpoint for this module.


    ```

    {

    "checks": [

    {

    "data": {},

    "name": "wallet-readiness",

    "status": "UP"

    },

    {

    "data": {},

    "name": "wallet-liveness-health-check",

    "status": "DOWN"

    },

    {

    "data": {},

    "name": "wallet-started",

    "status": "UP"

    }

    ],

    "status": "DOWN"

    }

    Listing 10-10

    showing the returned health check data for the produced health checks

    ```


    Listing [10-10](#531256_1_En_10_Chapter.xhtml#PC10) shows the response for the
    `/health` probe for the wallet module of `jwallet`. In the sample call, the JVM
    reports the available free memory to be less than 40% of total memory, resulting
    in the `@Liveness` check returning a down status. It is important to note that
    the response isn’t necessarily returned in any given order. Even though in the
    code the liveness call is declared before the readiness check, the call to the
    base `/health` endpoint returns the result of the readiness check first before
    the liveness check.


    # Summary


    This chapter discussed the Eclipse MicroProfile Health specification. We looked
    at the difference between this specification and Metrics specification. The discussion
    then looked at the structure of the Health API. We then looked at using it within
    the context of the CDI API. You should be able to create custom health check procedures
    for your cloud-native applications using the Health API.


    Footnotes [1](#531256_1_En_10_Chapter.xhtml#Fn1_source)


    # 11. Security with JWT


    Security is one of the most important aspects of application development. There
    are so many things that can go wrong so fast with security. A rapidly evolving
    domain, there are constantly new threats, exploits, and breaches happening at
    all times. From the largest public-facing applications to the smallest, every
    application is at risk of security breaches.


    Application security is a complex field that should be handled by security experts.
    This chapter discusses how to use the Eclipse MicroProfile JWT Propagation API
    to secure RESTful web services. This chapter is NOT about the how of security.
    But rather with the how of security in place, the goal of the chapter is to show
    how the MicroProfile JWT API can be used to make use of the security infrastructure
    to secure REST resources.


    As application developers, we the authors trust the management of the entire process
    to security experts. As such, this chapter uses Keycloak^([^(115)](#fn115)) as
    the security framework, from which the MicroProfile JWT can be used to secure
    REST clients. Keycloak is an open source identity and access management (IAM)
    framework. It provides user federation, strong authentication, user management,
    fine-grained authorization, and more. This chapter delegates the process of creating
    users to Keycloak and focuses on using JWT to secure web resources.'
