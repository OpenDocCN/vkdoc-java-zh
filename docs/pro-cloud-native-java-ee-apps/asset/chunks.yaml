    #### @Timed


    `@Timed`度量指标用于追踪类、构造函数或方法被调用的频率，并记录调用完成所花费的时间。`@Timed`会聚合计时时长，为被注解的对象提供时长和吞吐量统计。与仅追踪经过时长和次数的`@SimplyTimed`相比，这是一个更详细的度量指标。清单
    9-11 展示了使用`@Timed`注解的`convertCurrency`方法。


    ```

