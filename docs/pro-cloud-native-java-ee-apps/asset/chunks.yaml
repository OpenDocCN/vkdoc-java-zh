    application_count_conversions_histogram_mean{count="histogram",metric="histogram"}
    417.7099758660769

    # TYPE application_count_conversions_histogram_max gauge

    application_count_conversions_histogram_max{count="histogram",metric="histogram"}
    500.0

    # TYPE application_count_conversions_histogram_min gauge

    application_count_conversions_histogram_min{count="histogram",metric="histogram"}
    253.0

    # TYPE application_count_conversions_histogram_stddev gauge

    application_count_conversions_histogram_stddev{count="histogram",metric="histogram"}
    82.50134125075685

    # TYPE application_count_conversions_histogram summary

