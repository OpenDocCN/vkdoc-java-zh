- fmt: '### Further Development Strategy


    An application being deployed is the first step to a continuous process of refinements
    and bug fixing. There will be new feature requirements and bug fixes needed as
    long as the application is in use. Unlike in development where it’s easy to break
    things, a deployed application requires careful consideration to not bring down
    the production instance. Mitigation strategies like database migrations should
    be employed to have a clear path to extending existing data. How often new releases
    get deployed to production should also be considered and standardized.


    ### Security


    Security is the single most important consideration for an application about to
    be deployed. Irrespective of the type of application being deployed, an end-to-end
    security consideration spanning user creation, authentication, authorization,
    access control, and revocation among other security processes will need to be
    considered.


    More importantly is if security will be handled internally or outsourced to a
    security service. As nonsecurity experts, we recommend the `Keycloak` IAM framework
    to manage application security. Unless there are in-house dedicated security experts,
    we do not recommend rolling out custom security implementations.


    These are by no means all the considerations that should be made in determining
    the readiness of an application. Every business domain will have its own checklist
    of readiness checks. In the end, an application is never completed. It only gets
    put into use while being perpetually worked on. With the readiness checks done,
    deployment options will need to be considered.


    ## Jakarta EE Deployment


    Jakarta EE applications are mostly packaged as web archive (WAR) files. These
    files are mostly dropped into the deployment folders of compatible runtimes, and
    the runtimes will then deploy the application. Thus, the basic unit of a Jakarta
    EE application deployment is the runtime. The runtime can be packaged as a docker
    container, as is done with the sample code seen so far, or stand-alone.


    We recommend the adoption of containers throughout the application development
    process because it provides uniformity and predictability across teams and between
    team members. The problem of “but it was running on my machine” is largely done
    away with by the use of containers.


    The runtime chosen for application development is almost always the runtime used
    for production deployment. Whichever option it is, choosing a runtime is the first
    step to deploying a Jakarta EE application.


    ### Choosing a Runtime


    Choosing a Jakarta EE–compatible runtime requires some considerations on the part
    of an organization. Some of these considerations are as follows.


    #### Popularity of the Runtime


    How popular a runtime is is an important consideration to make. A popular runtime
    will mean a much larger user base, and that consequently implies stronger momentum
    in the development of the runtime, whether closed or open source.


    #### License Considerations


    Is the runtime an open source, a closed source, or a hybrid license? An organization
    will need to determine if the license of the runtime fits into its overall application
    development strategy.


    #### Support


    What is the support model of the runtime? If it is open source, is there enough
    of a community around it from which community support can be expected? If it is
    closed source, what is the support structure and cost relative to the organization’s
    budget?


    #### Additional Features


    One of the selling points of Jakarta EE is that it is an open platform on which
    implementation vendors can compete through the addition of add-on features above
    the base platform. The choice of an implementation should consider what other
    features beyond the platform base the runtime has.


    #### Existing Knowledge


    Picking a runtime should also consider the existing knowledge of people that will
    be working with it. How familiar is the team with the runtime? This will help
    reduce the time it takes for the team to get productive with the runtime.


    #### Other Considerations


    There will always be business domain–specific considerations that should be carried
    out when picking an application runtime. Jakarta EE has a healthy ecosystem of
    implementation runtimes and vendors that give an organization an abundance of
    choice to select.


    ### Containerization


    The rise of containers has made the packaging and deployment of applications much
    easier. For instance, the sample code for this book is packaged with docker and
    ready to run in any docker/kubernetes-managed infrastructure. The ease of use,
    universal availability, and platform-agnostic nature of containers mean every
    application development process should be containerized by default. There are
    different ways of using containers to run and package applications.


    When incorporating containers into application development, it is important to
    create predictable images. Predictable images mean the container should generally
    act the same when given the same input data at all times and across all machines.
    This means the use of tags when pulling images from a registry. Tagging ensures
    the same image will be pulled in at all times.


    ### Cloud Deployment


    Deploying an application to the cloud entails picking a cloud option. Will the
    application be deployed to an in-house on-premise hosted set of servers or a hybrid
    or full cloud? These are decisions that will be made based on the existing infrastructure,
    knowledge, experience, and budget of the organization. With the use of containers,
    whichever option that is chosen will eventually come down to the organizational
    preference based on the aforementioned factors.


    There is an abundance of choice when it comes to picking a cloud provider. Almost
    all cloud providers have support for docker and kubernetes. This means a modern
    Jakarta EE application can easily be deployed to any cloud provider. This is why
    we recommend the adoption of containers as part of the Jakarta EE application
    development cycle.


    ### Database


    Every application will need a durable data storage. The choice of database will
    be based on business and technical considerations. In the end, a choice between
    using a managed database service from a cloud provider or bundling one with the
    application as part of the set of containers will be made. We recommend using
    all the datasource management features of the chosen runtime. Jakarta EE runtimes
    traditionally have provided ways to define datasources that can then be passed
    to the application.


    ### Security


    Touching on security here as well since the deployment option, whether on-premise,
    hybrid, or fully cloud, will all have security implications. It is important to
    keep security in mind when weighing all available options for deployment.


    ### Deploying a Monolith


    Deploying a monolithic application is, in theory, easier than a suite of microservices.
    This is primarily because a monolith comprises a single unit. This single unit,
    when packaged into a WAR, is all of the application. There is nothing special
    to be done with regard to the actual deployment process. All the points discussed
    earlier should apply to deploying any Java application. And deploying a Jakarta
    EE application is deploying a pure Java application.


    ## Application Maintenance


    Once an application is deployed, maintaining it becomes an important aspect of
    its longevity. However, application maintenance starts right from when application
    development starts. No matter the application domain, incorporating best practices
    into the application development process will lead to much easier application
    maintenance and improve the longevity of an application and its codebase. The
    following are general guidelines to developing long-lived applications and making
    working on the application code a productive experience.'
