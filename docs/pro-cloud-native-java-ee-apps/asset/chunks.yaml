  trans: '

    ### 拦截器 Bean


    ```

    @Interceptor

    @Logged

    @Priority(Interceptor.Priority.APPLICATION)

    public class LoggingBean {

    @Inject

    Logger logger;

    @AroundInvoke

    //@AroundConstruct

    public Object logMethod(final InvocationContext invocationContext) throws Exception
    {

    logger.log(Level.FINE,

    () -> String.format("Method %s invoked at %s",   invocationContext.getMethod().getName(),

    LocalDateTime.now(ZoneOffset.UTC)));

    return invocationContext.proceed();

    }

    }

    清单 4-33

    展示 LoggingBean 拦截器类

    ```


    清单 4-33 展示了 LoggingBean 拦截器类。它分别被注解为 `@Interceptor` 和 `@Logged`。这两个注解使该类成为一个拦截器
    Bean，并将 `@Logged` 注解与之关联。这意味着无论 `@Logged` 注解在何处使用，拦截期间要执行的实际工作都将由 LoggingBean
    类中的一个方法完成。它还带有 `@Priority(Interceptor.Priority.APPLICATION)` 注解。这就是在 Jakarta EE
    中激活拦截器并为其排序的方式。`@Priority` 接受一个 `int` 值；该 `int` 值越小，注解的优先级越高。


    `Interceptor.Priority.APPLICATION` 是一个常量，其 `int` 值为 2000。如果另一个拦截器将其 `@Priority`
    值设置为更小的 `int` 值，那么该拦截器在调用顺序上将优先于 `@Logged` 拦截器。过去，拦截器需要在 XML 配置文件中注册。但这种情况在 Java
    EE 7 中发生了变化。现在，你使用 `@Priority` 注解来激活拦截器并为其排序。


    然后，LoggingBean 注入由我们的生产者方法生成的 Logger 类，并声明一个名为 `logMethod` 的方法，该方法接受一个参数——`InvocationContext`。当容器调用该方法执行拦截时，CDI
    容器会注入此参数。在运行时，容器会向该方法提供一个 `InvocationContext` 接口的实现。该接口提供关于被拦截调用的上下文信息，并且还包含控制调用链行为的方法。对于日志记录，会调用
    `InvocationContext#getMethod#getName` 方法来获取被拦截方法的名称。


    `logMethod` 方法带有 `@AroundInvoke` 注解。此注解告诉容器我们希望拦截器在何时生效。顾名思义，`@AroundInvoke` 意味着拦截器应在带注解的方法被调用之前被调度执行。因此，就在容器调用任何带有
    `@Logged` 注解的方法之前，`logMethod` 将被自动调用来执行拦截功能。该方法可以调用它所拦截的目标方法能够调用的任何服务。


    另一个可用于拦截 Bean 的注解是 `@AroundConstruct`。此注解会使容器在目标 Bean 的构造函数被调用之前，调用被注解的方法。通常，你需要谨慎使用
    `@AroundConstruct`，因为传递给拦截器方法的 `InvocationContext` Bean 可以访问构造函数的所有参数。因此，在使用它时应格外小心。


    带有 `@AroundInvoke` 注解的方法必须返回一个 `Object`。如清单 4-33 所示，`logMethod` 方法通过调用 `InvocationContext#proceed()`
    方法返回 `Object`。此调用向容器发出信号，表明该方法已完成，执行应继续到链中的下一个拦截器（如果有的话），否则继续调用实际方法。带有 `@AroundConstruct`
    注解的方法返回 `Object` 将导致执行移动到链中的下一个拦截器，否则继续实例化被拦截的 Bean。


    完全声明好我们的拦截器后，我们可以通过使用它来注解类或方法。清单 4-34 展示了应用于 `WalletService` 的 `@Logged` 拦截器。


    ```

    @Action

    @Logged

    public class WalletService {

    }

    清单 4-34

    展示应用于 WalletService 的 @Logged 注解

    ```


    清单 4-34 展示了应用于 `WalletService` 的 `@Logged` 拦截器。类似地，清单 4-35 展示了应用于 `UserService`
    的 `@Logged` 注解。


    ```

    @Action

    @Logged

    public class UserService {

    }

    清单 4-35

    展示应用于 UserService 的 @Logged 拦截器

    ```


    清单 4-35 展示了应用于 `UserService` 的 `@Logged` 拦截器。由于拦截器是在类级别应用于 Bean，因此对任一类的上下文实例调用的所有方法都将被我们的拦截器拦截。我们也可以选择性地只注解
    Bean 中的某些方法，因为 `@Logged` 拦截器的 `@Target` 既是 `TYPE` 也是 `METHOD`。


    ### 将拦截器与原型结合使用


    你会立即注意到，两个被拦截的 Bean 具有完全相同的注解集合：一个是原型，另一个是拦截器。在关于原型的章节中，我们讨论了它们的全部意义在于抽象出通用的架构模式。因此，我们可以将拦截器添加到
    `@Action` 原型中，而不是单独为每个 Bean 添加 `@Logged` 注解。这样，拦截器会自动应用于所有带有该原型的 Bean。该拦截器仍然可以单独用于拦截方法或整个类。清单
    4-36 展示了添加到 `@Action` 原型的 `@Logged` 拦截器注解。


    ```

    @Stereotype

    @RequestScoped

    @Transactional

    @Logged

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    清单 4-36

    展示与 @Logged 关联的 @Action 注解

    ```


    清单 4-36 展示了带有 `@Logged` 拦截器注解的 `@Action` 原型。这现在将拦截器与原型关联起来，使得任何带有该原型的 Bean 也会被自动拦截。因此，我们可以从
    `WalletService` 和 `UserService` Bean 中移除 `@Logged` 注解。拦截器是在应用程序中实现横切关注点的一种直接方式。然而，为了扩展或覆盖
    Bean 的方法，CDI 还有另一种可用于此目的的构造。

    '
- fmt: '# CDI Decorators


    CDI decorators allow the wrapping of a bean inside another bean such that the
    wrapping bean can alter the behavior of the enclosed bean. Unlike interceptors
    that allow you to implement cross-cutting concerns common to a given set of beans,
    decorators allow the altering of the implementation of a given bean method. Thus,
    whereas interceptors are common to more than a single bean, decorators are tied
    to individual beans because they implement business methods relating to the beans
    they decorate. You can use decorators to change the functionality of beans you
    do not own, for example. CDI decorators allow you to implement the decorator design
    pattern in your application.


    To understand them better, let us take a look at an example. The GDPR^([^(98)](#fn98))
    legislation of the EU requires all applications used by EU residents to have their
    data stored on servers in the Union. To comply with this requirement, we can decorate
    the `UserService` bean so as to implement this custom requirement. First, let
    us refactor the `UserService` by introducing an interface as shown in Listing
    [4-37](#531256_1_En_4_Chapter.xhtml#PC37).


    ```

    public interface UserFacade {

    UserResponse createUser(final CreateUserRequest createUserRequest);

    UserResponse getUser(final Long id);

    }

    Listing 4-37

    shows the UserFacade interface

    ```


    Listing [4-37](#531256_1_En_4_Chapter.xhtml#PC37) shows the `UserFacade` interface
    with two methods – `createUser` and `getUser`. This interface is a business interface
    that the `UserService` implements as shown in Listing [4-38](#531256_1_En_4_Chapter.xhtml#PC38).


    ```

    @Action

    public class UserService implements UserFacade {

    @Inject

    UserRepository userRepository;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    User user = fromUserWrapper(createUserRequest);

    user = userRepository.save(user);

    UserResponse userResponse = getUser(user.getId());

    return userResponse;

    }

    @Override

    public UserResponse getUser(final Long userId) {

    final User user = userRepository.findById(userId);

    return toUserResponse(user);

    }

    }

    Listing 4-38

    shows the UserService implementing the UserFacade interface

    ```


    Listing [4-38](#531256_1_En_4_Chapter.xhtml#PC38) shows the `UserService` implementing
    the `UserFacade` interface. Up to this point, there is nothing special about the
    `UserService`. Now to add extra functionality to the `UserService` bean by overriding
    the `createUser` method, Listing [4-39](#531256_1_En_4_Chapter.xhtml#PC39) shows
    the `UserServiceDecorator` for the `UserService` class.


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = getUser(user.getId());

    userResponseEvent.fire(userResponse);

    //userResponseEvent.fireAsync(userResponse);

    return UserService.toUserResponse(user);

    }

    return userService.createUser(createUserRequest);

    }

    }

    Listing 4-39

    shows the UserServiceDecorator that “decorates” the UserService and overrides
    the createUser method

    ```


    Listing [4-39](#531256_1_En_4_Chapter.xhtml#PC39) shows the `UserServiceDecorator`.
    It is annotated with `@Decorator`. This annotation specifies that this class is
    a decorator. It is also annotated with `@Priority`. Similar to the discussion
    on interceptors, `@Priority` is the new way to activate and order the decorator.
    The decorator implements the `UserFacade` interface and is declared to be abstract.
    The reason it is abstract is because not all the methods on the interface are
    implemented by the class.


    There are two injection points – one for the `EntityManager` and the other for
    the `UserService`. The `EntityManager` injection point is qualified with the `@Database(MS_SQL)`
    qualifier. The reason we are implementing this decorator is to be able to override
    the `createUser` method on the `UserFacade` interface. The objective is to save
    users in the EU to an MS SQL Server database hosted in the EU. So we inject the
    `EntityManager`, qualifying it with the requisite qualifier so that the right
    `EntityManager` instance linked to the MS SQL Server database will be injected.


    The `UserService` injection point is annotated `@Delegate`. This field is called
    the delegate injection point of the decorator. This bean is what the `UserServiceDecorator`
    is decorating. Any calls on the delegate, in this case the `UserService`, will
    be called on the decorator, which can invoke methods directly on the delegate
    object. This field is what tells the CDI container what bean the `UserServiceDecorator`
    is decorating. You can qualify the delegate injection point to restrict the type
    of bean to be decorated.


    The decorator implements the `createUser` method. This method is one of the two
    methods on the `UserFacade` interface. The implementation checks if the user to
    be persisted is in the EU region. If yes, then the actual persistence is carried
    out by the decorator through a call to the `persist` method of the injected `EntityManager`.
    Remember this `EntityManager` instance is linked to a SQL Server that will be
    hosted in the EU. If the user is not in the EU, then the decorator simply calls
    the `createdUser` method on the delegate.


    This way, we have added a functionality that is custom to the `UserService` bean.
    The process of persisting a user is not a cross-cutting but actual business function.
    To extend that functionality, the decorator pattern is used to extend the functionality
    of the bean without changing the implementation. Normally, you will find yourself
    using the decorators to extend beans that are not part of your application. Using
    producers, you transform those classes into CDI beans and then use decorators
    to extend their functionality.


    A decorator such as the `UserServiceDecorator` is a CDI bean, and as such, its
    types are all types in its chain up to `java.lang.Object`. A decorator cannot
    declare a scope other than the `@Dependent` pseudo-scope. Giving a decorator any
    other scope will be treated as a definition error by the container at application
    boot time. So far, you have seen how decorators and interceptors help you implement
    cross-cutting concerns and add functionality to beans, respectively. Next up,
    let us take a look at events in CDI.


    # CDI Events


    The CDI event mechanism is a way to allow application components to emit events
    of any type and have one or more listeners of those events notified in a typesafe,
    completely decoupled way. There is no compile-time dependency between the source
    of the event and any observers or listeners. The publisher-subscriber paradigm
    of the observer design pattern is at the core of CDI events, which comprises two
    parts – the event object and event observers.'
