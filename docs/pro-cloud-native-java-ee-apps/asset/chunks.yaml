    ## The MicroProfile JWT


    The MicroProfile JWT API provides a standard, mostly opinionated way of verifying
    a JWT token, authorizing the client and propagating the resulting security context
    to the rest of the application. It achieves these objectives by requiring that
    JWTs be signed with RSA-based digital signature algorithms. All that the JWT runtime
    needs is the public key of the authorizing server which creates the JWT to verify
    the token. It also mandates certain information to be available within the claims
    of the JWT. These are as follows:


    *   `exp` – The expiration of the JWT. This ensures old, expired tokens are rejected.

    *   `iss` – The issuer of the token.

    *   `iat` – The issued at, identifies when the token was issued.

    *   `upn` – This is the user principal or the preferred username of the currently
    logged in user.


    It also has recommended claims as follows:


    *   `sub` – Who is being represented by this token?

    *   `jti` – A unique identifier for this claim.

    *   `aud` – Identifies the MP JWT endpoint(s) which can be accessed by JWT.


    These requirements allow a Jakarta EE application to be fully stateless. The `sub`
    claim will be mapped to a `java.security.Principal` instance. The groups will
    be used to determine if the `Principal` is in a given role required by a given
    resource method. The client will send the token with each request; the JWT runtime
    will validate and propagate the security context with each call.


    ### MicroProfile JWT Security Process


    MicroProfile JWT allows the creation of stateless microservices by delegating
    the session information about users to the client. Each call by the client contains
    all the information needed to construct a security context. This security context
    is then plugged into existing Jakarta EE infrastructure that is available to all
    parts of the application. There are three steps in the MicroProfile JWT security
    process.'
