    ### 进一步发展战略


    部署应用程序只是持续优化和修复缺陷这一过程的开始。只要应用程序还在使用中，就会不断有新的功能需求和缺陷修复。与开发阶段可以随意改动不同，已部署的应用程序需要谨慎考虑，以免导致生产实例宕机。应采用诸如数据库迁移之类的缓解策略，为扩展现有数据提供清晰的路径。同时，还应考虑并标准化新版本部署到生产环境的频率。


    ### 安全性


    对于即将部署的应用程序而言，安全性是唯一最重要的考量因素。无论部署何种类型的应用程序，都需要考虑端到端的安全性，这涵盖用户创建、身份验证、授权、访问控制、权限撤销以及其他安全流程。


    更重要的是，要决定安全性是由内部处理，还是外包给安全服务。作为非安全专家，我们推荐使用 Keycloak IAM 框架来管理应用程序安全。除非公司内部有专门的安全专家，否则我们不建议自行开发自定义的安全实现。


    以上绝非判断应用程序是否就绪所需考虑的全部因素。每个业务领域都会有自己的一套就绪检查清单。最终，一个应用程序永远不会真正完成。它只是在被持续完善的过程中投入使用。完成就绪检查后，就需要考虑部署选项了。


    ## Jakarta EE 部署


    Jakarta EE 应用程序通常被打包为 Web 归档（WAR）文件。这些文件大多被放入兼容运行时的部署文件夹中，然后运行时便会部署该应用程序。因此，Jakarta
    EE 应用程序部署的基本单元是运行时。运行时可以像到目前为止看到的示例代码那样，打包成 Docker 容器，也可以独立运行。


    我们建议在整个应用程序开发过程中采用容器化技术，因为它能在团队之间以及团队成员之间提供一致性和可预测性。“但在我的机器上明明能运行”这类问题，在很大程度上可以通过使用容器来消除。


    为应用程序开发所选择的运行时，几乎总是会用于生产部署。无论选择哪种运行时，选择运行时都是部署 Jakarta EE 应用程序的第一步。


    ### 选择运行时


    选择与 Jakarta EE 兼容的运行时，需要组织进行一些考量。其中一些考量因素如下。


    #### 运行时的流行度


    运行时的流行度是一个重要的考量因素。流行的运行时意味着拥有更庞大的用户群，这反过来也意味着该运行时（无论是闭源还是开源）的发展势头更强劲。


    #### 许可证考量


    运行时是开源、闭源还是混合许可证？组织需要确定运行时的许可证是否符合其整体应用程序开发策略。


    #### 支持


    运行时的支持模式是什么？如果是开源的，是否有足够强大的社区可以提供社区支持？如果是闭源的，其支持结构和成本相对于组织的预算如何？


    #### 附加功能


    Jakarta EE 的一个卖点是它是一个开放平台，实现供应商可以通过在基础平台之上添加附加功能来进行竞争。选择实现方案时，应考虑运行时除了平台基础功能之外，还具备哪些其他功能。


    #### 现有知识


    选择运行时还应考虑将要使用它的人员的现有知识。团队对该运行时的熟悉程度如何？这将有助于缩短团队熟练掌握该运行时所需的时间。


    #### 其他考量


    在选择应用程序运行时，总会有一些特定于业务领域的考量因素。Jakarta EE 拥有一个健康的实现运行时和供应商生态系统，为组织提供了丰富的选择。


    ### 容器化


    容器的兴起使得应用程序的打包和部署变得更加容易。例如，本书的示例代码已使用 Docker 打包，并可在任何由 Docker/Kubernetes 管理的基础设施上运行。容器易于使用、普遍可用且与平台无关的特性，意味着每个应用程序开发过程默认都应采用容器化。使用容器来运行和打包应用程序有多种不同的方式。


    在将容器纳入应用程序开发时，创建可预测的镜像非常重要。可预测的镜像意味着，在任何时候、任何机器上，当给定相同的输入数据时，容器通常应表现出相同的行为。这意味着在从镜像仓库拉取镜像时应使用标签。使用标签可以确保始终拉取到相同的镜像。


    ### 云部署


    将应用程序部署到云端需要选择一种云方案。应用程序是部署到内部自建的服务器集群，还是采用混合云或纯公有云？这些决策将基于组织现有的基础设施、知识、经验和预算来做出。通过使用容器，无论选择哪种方案，最终都将归结为基于上述因素的组织偏好。


    在选择云提供商时，有大量的选择。几乎所有的云提供商都支持 Docker 和 Kubernetes。这意味着一个现代的 Jakarta EE 应用程序可以轻松地部署到任何云提供商。这就是我们建议在
    Jakarta EE 应用程序开发周期中采用容器化的原因。


    ### 数据库


    每个应用程序都需要持久化的数据存储。数据库的选择将基于业务和技术考量。最终，需要在以下两者之间做出选择：使用云提供商提供的托管数据库服务，或者将数据库作为容器集合的一部分与应用程序捆绑在一起。我们建议使用所选运行时的所有数据源管理功能。Jakarta
    EE 运行时传统上提供了定义数据源的方法，这些数据源随后可以传递给应用程序。


    ### 安全性


    这里再次提及安全性，因为部署选项（无论是本地部署、混合云还是纯公有云）都会带来安全影响。在权衡所有可用的部署选项时，牢记安全性至关重要。


    ### 部署单体应用


    从理论上讲，部署单体应用比部署一套微服务更容易。这主要是因为单体应用由单个单元组成。当这个单一单元被打包成 WAR 文件时，它就是整个应用程序。就实际的部署过程而言，没有什么特别之处。前面讨论的所有要点都应适用于部署任何
    Java 应用程序。而部署 Jakarta EE 应用程序，就是在部署一个纯 Java 应用程序。


    ## 应用程序维护


    一旦应用程序部署完毕，维护它就成为确保其长期运行的重要方面。然而，应用程序的维护实际上从应用程序开发开始时就开始了。无论应用程序领域如何，将最佳实践融入应用程序开发过程，都将使应用程序的维护变得更加容易，并提高应用程序及其代码库的寿命。以下是开发长寿应用程序并使应用程序代码开发工作富有成效的一般性指导原则。

    '
- fmt: '### Use the Platform


    The Jakarta EE platform, augmented with the MicroProfile project, provides a fairly
    rich collection of APIs for building general-purpose enterprise applications.
    Almost all core functional requirements will have corresponding APIs in the platform.
    For instance, there’s an API for dependency injection, data persistence, REST
    web services, WebSockets, configuration, and fault tolerance, among others.


    Your first choice of API should always be what is available on the platform. The
    use of third-party libraries should be carefully considered and adopted only when
    there is no API in the platform for that function.


    ### Have a Package Standard


    Having a standardized package structure means all applications, modules, and libraries
    of the organization will have the same structure and thus be easy to navigate
    for new joiners. A natural reality of every organization is that people will come
    and go. Having a standardized way of structuring applications means irrespective
    of who is doing the development, the structure of the application stays the same.


    ### Choose a Runtime Carefully


    Choosing the application runtime should be done carefully because the runtime
    can impact developer productivity. A runtime that is easy to spawn as a container,
    fast, easy to learn, and adopt is much preferable to one that does not have these
    characteristics. Since the runtime chosen for development is what eventually will
    be used to deploy the application, having a runtime that developers are familiar
    with and makes them productive is important.


    ### Avoid Excessive Use of Third-Party Libraries


    The Java ecosystem has a massive array of third-party libraries for solving almost
    all application development tasks. It can get tempting to want to adopt some of
    these libraries because they may look attractive. But it’s important to keep in
    mind that every extra library that gets drawn in becomes a part of the maintenance
    overhead of the application. Thus, the use of the third-party libraries should
    be minimized and used only as a last resort.


    ### Keep Things Simple


    Application development is very much an art. Finding the right balance between
    complexity and simplicity is something that will take some trial and error. However,
    simplicity should be a theme that runs through the codebase. Keeping things simple
    allows for relatively easy extensions, feature additions, and bug fixes. It also
    helps other developers settle in much faster with the codebase. These are all
    intrinsic benefits that add up over a long period of time. Simplicity, as the
    adage goes, is the ultimate sophistication.


    ### Have a Convention


    Having an application development process convention is important to maintaining
    a system that supports productivity. How new joiners are onboarded, what the standard
    operating procedure is for creating new features, how production bugs are handled
    are all normal parts of the application development process that should be standardized.
    Systems like SCRUM and Kanban help create a system that gives participants a routine.
    Whichever system that is chosen should support structures that automate as much
    of the work process as possible.


    ### Document Excessively


    Documentation, right from the code level (in-line, Javadocs) to the API level
    to the business level, should be a part and parcel of the application development
    process. Documentation first of all serves as an extended memory to the application
    developers. Having documentation covering as much of the codebase as possible
    helps different developers work on different aspects of the application. It also
    helps new developers get familiar with the codebase much faster. Whether the application
    is a consumer application with a UI-facing tier, or an API application, documentation
    for the client should be an important aspect of the entire process.


    ### Build and Dependency Management


    Every enterprise Jakarta EE application will most likely use one of two dominant
    build and dependency management tools – `Maven` or `Gradle`. These two tools allow
    the automation of a lot of common application development tasks like management
    of transitive dependencies and building of application artifacts. Whichever tool
    that is chosen should be standardized upon. All services should use the chosen
    build tool. As a lot of Jakarta EE applications are built with `Maven`, we recommend
    it over `Gradle` solely because of user adoption in the space. However, `Gradle`
    is equally a capable build tool that can do everything `Maven` can. Whichever
    tool that is chosen should be done based on which one will produce the maximum
    business returns.


    There are a number of ways to automate some of the documentation process. For
    instance, the MicroProfile OpenAPI specification provides declarative ways of
    documenting Jakarta REST resources, much similar to the Swagger API. The documentation
    can be published in a central place for easy access to end users. Whichever form
    that is chosen, a culture of excessive code documentation should be encouraged
    and nurtured because documenting the whys of the various parts of the application
    to the hows of its usage is an investment that will compound over the life of
    the application.


    ## Summary


    This chapter discussed general considerations that should be taken into account
    before an application is deployed. We discussed some guidelines to determine if
    an application is ready for production and looked at deployment guidelines and
    finally some pointers to creating a long-lived, maintainable application.


    Footnotes [1](#531256_1_En_13_Chapter.xhtml#Fn1_source) [2](#531256_1_En_13_Chapter.xhtml#Fn2_source)


    # 14. Cloud-Native Jakarta EE Monoliths to Microservices


    Microservices software architecture is increasingly becoming the dominant choice
    for creating enterprise, cloud-native applications. The Jakarta EE platform, augmented
    by the Eclipse MicroProfile project, even though originally designed for large
    monolithic applications, has evolved to become a capable platform for developing
    microservice applications.


    This chapter explores general guidelines for breaking down a monolithic application
    to a set of microservices. It starts off by first exploring the pros and cons
    of monoliths, then explores the need, if any, for microservices, and finally offers
    strategies for migrating a monolith to microservices that is cloud-ready for deployment
    to a `kubernetes` cluster.


    ## Monoliths


    A monolithic application is one that has all the constituent parts bundled together
    as a single unit. A large number of enterprise applications out there are monolithic.
    Even before the rise in popularity of the microservices architecture, Jakarta
    EE, or then Java EE, applications have always been more of modular monoliths.
    A modular monolith is an architecture where core parts of the application are
    broken down into submodules within the application. So, for instance, a typical
    Jakarta EE application would have the UI layer, which could be written with Jakarta
    Faces or any JavaScript framework, then you have the services layer, which is
    typically made up of a combination of CDI beans and EJB session beans (EJBs are
    being supplanted by CDI) for managing database connections and application logic.


    Such an application might not necessarily have a REST component because the UI
    layer (if using Jakarta Faces) makes direct calls to the service layer. During
    packaging, this kind of application will be packaged as a single WAR file. But
    in actual sense, it’s much of a modular monolith, lending itself to easy migration
    to microservices if the need arises. The sample code of this book so far has been
    a cross between a pure microservices and a pure monolith.'
