  trans: '

    ## Jakarta EE 与 Eclipse MicroProfile


    Jakarta EE（以及其前身 Java EE）是 Java 生态系统乃至整个软件开发行业中一个非常关键的平台。考虑到众多项目、框架和库的存在与发展都归功于
    Jakarta EE（及其“前身”J2EE）平台，毫无疑问，Jakarta EE 是任何 Java 开发者工具箱中的重要工具。


    在过去的几十年里，软件开发已经从单一的大型集中式应用演变为当前分布式、容器化、云原生的微服务范式。Jakarta EE 诞生于单体架构占主导地位的软件开发时代。因此，它的演进始终更侧重于优化单体应用的开发。这并非意味着你不能单独使用
    Jakarta EE 来开发微服务。你完全可以。


    正如我们在前几节中讨论的，Jakarta EE 是通过 Java 社区流程（JCP）开发的。这个流程并未完全优化到能跟上软件开发演进的速度。正如你在 Jakarta
    EE（或者更准确地说，当时的 Java EE）的发布历史中所见，每次发布之间的间隔越来越长，而软件开发行业的变化速度却越来越快。这自然导致了一个结果：在某个时间点，Jakarta
    EE 每次发布都需要在行业中追赶更多的变化。


    尽管你可以使用标准的 Jakarta EE API 来开发微服务，但各个平台运行时并没有得到清晰、标准化的支持定义。这意味着每个应用服务器都以一种不可移植、非供应商中立的方式实现了对使用
    Jakarta EE 开发微服务的支持。这可能导致在该平台上开发云原生微服务应用的支持变得支离破碎、缺乏一致性。Oracle 在 Java EE 7 和 8
    之间对该平台不明确的策略也无助于维持对该平台的信心。


    正是在这种背景下，应用服务器供应商和各个 Java 用户组联合起来，试图通过一套独立的、面向开发云原生微服务企业级 Java 应用的规范来增强现有的 Jakarta
    EE 平台。在 2016 年的 JavaOne 大会上，Eclipse MicroProfile 项目被宣布为一个新的协作项目，旨在提供典型微服务应用所需的一组
    API。


    Eclipse MicroProfile 项目建立在 Jakarta EE 平台之上，是一套标准化的规范，包含平台 API 的一个子集，以及独立开发的规范，旨在提供一种标准、可移植、供应商中立的方式来构建现代的、云优先的微服务应用。该项目的
    1.0 版本包含了 CDI、JAX-RS 和 JSON-P API。因此，Eclipse MicroProfile 的出现是为了扩展 Jakarta EE（或者，再次强调，更准确地说是当时的
    Java EE）平台，以适应现代应用开发范式。


    在 Eclipse MicroProfile 宣布之时，Jakarta EE 平台仍然通过 JCP 进行开发。在这方面，EMP 的关键目标之一是在 JCP
    中创建 JSR，使用已开发的 EMP（Eclipse MicroProfile）规范，并由 Eclipse 基金会担任提议的规范领导者。该项目旨在快速推进，并允许更快速、更频繁的发布节奏，以跟上不断发展的行业步伐。贡献几乎没有障碍。你所要做的就是
    fork GitHub 上的沙盒仓库^(²²)，实现你的想法，然后将其作为拉取请求提交以获取反馈和迭代。


    EMP 的另一个主要目标是消除 Jakarta EE 是“重量级”的观念，即认为你需要一个功能完备的兼容应用服务器才能运行它。尽管现代全功能 JEE（Jakarta
    EE）兼容运行时非常精简和轻量，但过去使用该平台早期版本（J2EE 时代）及其配套应用服务器时的主要痛点仍然挥之不去。因此，EMP 旨在为供应商提供更小的实现要求，以帮助使其运行尽可能快速和轻量。


    EMP 发布一年后，Oracle 宣布将 Java EE 移交给 Eclipse 基金会。其结果是，EMP 的父平台最终也回到了同一个实体。尽管这两个项目现在由同一个基金会管理，但它们作为独立演进的规范被保留下来。JEE
    现在将以比其在 JCP 时更快的速度演进，但仍慢于 EMP。其目标是让 JEE 平台保持成熟、稳定和可靠，成为各种规模企业都信赖的开发平台，同时仍然能够更快地融入经过测试且被行业接受的现代范式。


    Eclipse MicroProfile 的当前版本是 5，如图 1-3 所示，总共包含 18 个 API：13 个核心 API 和 5 个独立 API，如下图所示。


    ![](img/531256_1_En_1_Fig3_HTML.jpg)


    EMP 规范示意图展示了 18 个 API，其中包括 MicroProfile 5.0 的 13 个核心 API 和 5 个独立 API。


    图 1-3


    Eclipse MicroProfile 规范


    如你所见，EMP 包含面向微服务开发的 API。让我们简要了解一下每个 API。本书的其余部分将详细介绍 JEE 和 EMP。


    ### OpenTracing^(²³)


    OpenTracing API 提供了一个用于追踪请求流经各种服务边界的 API。在典型的微服务环境中，你将拥有一定数量的、相互依赖的独立服务，它们协同工作以实现特定的应用目标。EMP
    的 OpenTracing API 遵循 OpenTelemetry ^(²⁴)（现已归档的 OpenTracing 的超集）规范。


    ### OpenAPI^(²⁵)


    EMP 的 OpenAPI 规范旨在为 OpenAPI 规范提供一个统一的、供应商中立的 Java API。OpenAPI 规范（v3^(²⁶)）描述了应用开发者如何发布应用
    API 文档供其客户端使用。


    ### Rest Client^(²⁷)


    EMP Rest Client 是一个提供类型安全方式来调用 REST 服务的 API。它使你无需处理将调用与 RESTful Web 服务相互转换为其各自
    Java 类型所需的底层工作。


    ### Config^(²⁸)


    EMP Config API 提供了一种灵活、简单且可扩展的方式来管理应用配置。它为你提供了一种管理各种配置变量源以及将不同源映射到不同部署场景的方法。


    ### Fault Tolerance^(²⁹)


    EMP Fault Tolerance 规范定义了一个灵活、易用的系统，用于构建有弹性的微服务。它提供了用于管理微服务应用中的超时、重试、回退、熔断和隔离舱的
    API 构造。


    ### Metrics^(³⁰)


    Metrics 规范提供了一种通过定义良好的端点来暴露应用和系统指标的方法。Metrics API 并非 JMX^(³¹) API 的替代品。其目标是在多语言环境中提供一种简单的方法来收集和监控应用指标。

    '
- fmt: '### JWT Auth/Propagation^([^(32)](#fn32))


    The `JWT` specification gives you a way to use OpenID Connect–based JSON Web Tokens
    for role-based access control of microservices endpoints. With services using
    the RESTful architecture being stateless, there is the need to always pass some
    form of security context to every called endpoint so a security context can be
    created and verified. The `JWT` specification aims to help you achieve that in
    a standard, portable, and predictable way.


    ### Health^([^(33)](#fn33))


    The `EMP Health` specification provides a simple mechanism for machine-to-machine
    mechanism for validating the availability or otherwise of a microservice. It provides
    a way for services to be able to answer the simple question: Are you available
    and ready to accept requests? This is especially critical in containerized cloud
    environments where you have orchestrators like `kubernetes` responsible for destroying
    and provisioning services.


    ### CDI^([^(34)](#fn34))


    The `EMP` project ships the Jakarta Contexts and Dependency Injection specification
    as the default dependency injection mechanism. `CDI` provides you a way to build
    loosely coupled applications, by abstracting you from managing the various interdependencies
    between your application components.


    ### JSON-P^([^(35)](#fn35))


    The Jakarta JSON Processing specification provides a vendor-neutral set of APIs
    for parsing, generating, transforming, and querying JSON data using a streaming
    or object model. `JSON-P` is one of the Jakarta EE platform specifications that
    `EMP` implementations are required to support.


    ### JAX-RS^([^(36)](#fn36))


    The Jakarta RESTful Web Services is another of the Jakarta EE specifications that
    is shipped with the `EMP` project. The `JAX-RS` specification defines a set of
    APIs for developing RESTful web services as defined by the REST architectural
    style by Dr. Roy Fielding.^([^(37)](#fn37))


    ### JSON-B^([^(38)](#fn38))


    The Jakarta JSON Binding is another of the specifications that `EMP` implementations
    are mandated to support. `JSON-B` provides a set of APIs for automatically binding
    Java objects to JSON documents in a transparent way, with the option to customize
    according to your needs.


    ### Annotations^([^(39)](#fn39))


    Jakarta Annotations is another of the Jakarta EE APIs that is shipped with each
    implementation of `EMP`. This specification defines annotations for use within
    the wider component technologies on the Jakarta EE platform. Being a mostly annotation/metadata-driven
    platform, this specification aims at providing a unified base specification around
    which various other annotation-driven specifications on the platform can create
    their own annotations.


    Together, the preceding set of specifications form the full `EMP` suite of APIs
    for creating cloud-native applications. These specifications are supported by
    all implementations of the `EMP`. There are other optional specifications that
    implementations are not mandated to support, as shown in the “Outside umbrella”
    in the previous image. Together with the larger Jakarta EE platform, developing
    enterprise, vendor-neutral applications on the Java platform has become exciting
    again. For you as a developer, mastering application development with Jakarta
    EE will equip you with skills that can easily be transferred to other platforms
    like the Spring Framework.


    ## Jakarta EE and the Spring Framework


    A discussion of the theory and history of Jakarta EE will not be complete without
    a look at the Spring Framework.^([^(40)](#fn40)) Jakarta EE (or more correctly
    its ancestor `J2EE`) was not the most productive or easy-to-use development platform
    in its early history. It required a lot of manual configurations through XML files
    and required your components to extend artifacts in the platform, among others.
    As a result, the platform acquired the fame for being arcane, only used by big
    companies that had a lot of money to spend on developers.


    Naturally, a lot of books got published on how to develop on the platform. One
    that stood out was *Expert One-on-One J2EE Design and Development*^([^(41)](#fn41))
    by Rod Johnson, published in October 2002. In the book, Rod postulated the idea
    of increased use of dependency injection and Plain Old Java Objects (`POJOs`),
    as opposed to the `J2EE` way of manually configuring, managing, and mixing application
    dependencies with infrastructure code. He demonstrated this in the sample application
    built throughout the book: an online seat reservation app built with over 30K^([^(42)](#fn42))
    lines of infrastructure code. A significant part of the application code was an
    implementation of his ideas for a clean separation of application and infrastructure
    code.


    The publisher of the book, Wrox, had a page^([^(43)](#fn43)) for it, with the
    sample code available for download, complete with errata and a user forum. The
    book was a success. The ideas propounded in it resonated with a lot of `J2EE`
    developers of the time. People started using parts of the released code in their
    personal projects. In early 2003, fellow developers Juergen Hoeller and Yann Caroff
    joined hands with Rod to create an open source project from the infrastructure
    code developed in the book. This project would be called Spring, an aphorism connoting
    a fresh start after a `J2EE` “winter.”


    Version 0.9 of this new, alternative enterprise Java development framework was
    released in June 2003. In March the following year, Spring 1.0 was released. The
    new framework was an instant hit and, to a large extent, a breath of fresh air
    as `J2EE` was the only credible way of developing nontrivial enterprise applications
    on the Java platform. It is fair to say the Spring Framework owes its existence
    to the limitations of the then `J2EE` platform.


    Over the following years, as `J2EE` became Java EE, it started getting better.
    Taking inspiration from the Spring Framework, the platform increasingly became
    metadata driven, relying heavily on the use of annotations for various configurations
    and defaulting to much predictable defaults in the absence of any explicit directive
    by the developer. By the release of Java EE 7, the platform was completely different
    in terms of developer productivity relative to the `J2EE` era. The advent of specifications
    like the Contexts and Dependency Injection, the pruning and “defattening” of the
    `EJB` API, and the less reliance on XML configuration files in a way realized
    the patterns originally proposed in Rod’s book.


    The Spring Framework, in the meanwhile, had grown to become a much bigger development
    platform than its original release. It had gone beyond its original function of
    an inversion of control^([^(44)](#fn44)) (`IoC`) container to comprise APIs that
    covered the gamut of end-to-end application development. As it grew in breadth,
    so did the need to configure its various components. Gradually, the need for XML
    configuration files started to creep in, up to a point where it had become not
    so dissimilar to the earlier `J2EE`.'
