  trans: '

    ## 指标数据格式


    默认情况下，当向 `/metrics` 资源发起 GET 请求时，返回的指标信息采用 OpenMetrics 文本格式。这是一种开放标准的指标格式，受到 Prometheus
    等众多监控应用程序的支持。


    然而，如果 HTTP 请求的 `Accept` 头部匹配 `application/json`，则相同的指标数据可以以 JSON 格式返回。如果请求的 `Accept`
    头部同时匹配 `application/json` 和 `text/plain`，或者未指定 `Accept` 头部，则数据将以默认的 OpenMetrics
    文本格式返回。


    ## 指标注册表


    指标注册表是一个注册表，其中包含所有可在 `/metrics` 资源下访问的指标及其元数据。对于基础（base）、应用程序（application）和供应商（vendor）这三个指标作用域，各自有一个共享的单例注册表。指标通过其指标
    ID（由名称和标签（如有）组成）在注册表中进行标识。可以将指标注册表视为每个作用域中指标的数据库。作为应用程序开发者，大多数时候注册表对您来说是透明的。但当您需要与之交互时，您应该知道它的存在。


    ## 使用指标


    在您的应用程序中，有两种方式可以使用 Metrics API。一种是通过注解，另一种是通过 Java API。选择哪种方式仅取决于应用程序需求和开发者偏好。注解是由
    CDI 运行时管理的拦截器绑定。因此，只有可代理的托管 Bean 才能使用注解来收集指标。


    ### 注解


    有六个用于创建不同类型指标的注解。它们是：


    *   `@Counted`


    *   `@ConcurrentGauge`


    *   `@Gauge`


    *   `@Metered`


    *   `@SimplyTimed`


    *   `@Timed`


    所有这些注解都有一些共同的参数。这些参数如表 9-1 所示。


    表 9-1


    展示通用的指标注解参数


    | 名称 | 类型 | 描述 | 可选/必需 |

    | --- | --- | --- | --- |

    | name | String | 设置指标的名称 | 可选。默认为被注解对象的名称 |

    | absolute | boolean | 如果为 true，则 name 用作指标的绝对名称。如果为 false，则在给定名称前添加包名和类名 | 可选。默认为
    false |

    | displayName | String | 用于元数据的人类可读名称 | 可选。默认为 null |

    | description | String | 指标的描述 | 可选。默认为 null |

    | unit | String | 特定指标的单位 | 可选。默认值各不相同 |

    | tags | String[] | 指标的“key=value”标签数组 | 可选。空数组 |


    #### @Counted


    `@Counted` 指标注解用于统计被注解的方法、构造函数或类型被调用或实例化的次数。此注解可用于方法、构造函数或类。如果在类级别使用，则该类中的所有方法都将被统计其调用次数。清单
    9-1 展示了 `RateResourceImpl` 类中的 `convertCurrency` 方法使用了 `@Counted` 注解，并传入了一些参数。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("rates")

    public class RateResourceImpl {

    @Path("convert")

    @POST

    @Counted(name = "convert_currency",

    absolute = true,

    displayName = "Convert currency method",

    description = "Method to convert one currency to the other",

    tags = { "info=conversions", "type=meta" })

    ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){

    return rateService.convertCurrency(convertCurrencyRequest)

    };

    }

    清单 9-1

    展示了 @Counted 的使用

    ```


    清单 9-1 展示了在 `convertCurrency` 方法上使用的 `@Counted` 注解。它设置了 `name` 参数，并将 `absolute`
    设置为 `true`。这意味着将在注册表中注册的此指标的名称为 `convert_currency`。如果 `absolute` 未设置为 `true`，则指标名称将为
    包名 + 类名 + 传递给 `name` 参数的值。标签也被设置为一些特定于方法的信息。


    标签在指标中扮演着重要角色，因为在云原生环境中，已部署容器的编排由 Kubernetes 等引擎完成，应用程序运行时与主机之间的传统映射关系已不复存在。在指标上下文中，除了指标名称之外，标签还增加了用于标识指标的额外维度。


    当应用程序部署后，可以直接从 `/metrics/application/convert_currency` 访问被计数的指标。由于 `absolute`
    参数设置为 `true`，仅凭指标名称即可通过 REST 端点访问它。以 OpenMetrics 格式对此指标进行示例调用，将返回如清单 9-2 所示的结果。


    ```

    # TYPE application_convert_currency_total counter

    # HELP application_convert_currency_total Method to convert one currency to the
    other

    application_convert_currency_total{info="conversions",type="meta"} 75

    清单 9-2

    展示 @Counted 的示例指标

    ```


    清单 9-2 展示了直接从 `/metrics/application` 上下文路径访问 `@Counted` 注解时的结果。返回的数据带有 `TYPE`
    和 `HELP` 注释，分别显示指标的类型和描述。指标计数前带有 `application_` 前缀。这就是应用程序级指标与基础级和供应商级指标区分开来的方式。传递给
    `@Counted` 注解的标签也会作为完整指标 ID 的一部分返回。根据计数，`convertCurrency` 方法总共被调用了 75 次。

    '
- fmt: '### `@ConcurrentGauge`


    This annotation is used to gauge concurrent invocations of an annotated method
    or constructor or instantiations of an annotated class. This metric works by incrementing
    the parallel count by one when the annotated element is entered and decremented
    by the same number when exited. This metric gauges the number of concurrent invocations
    of the annotated element.


    When used on a class, any parallel invocation counter for the current, the previous
    minute maximum, and previous minute minimum is created and registered in the metric
    registry for each constructor and method of the class using the name and absolute
    field values of the annotation.


    When used on a method, the metric gauges for the current, previous minute maximum,
    and previous minute minimum are created and registered in the metric registry.
    When used on a constructor, the same gauges for that constructor are registered.
    Listing [9-3](#531256_1_En_9_Chapter.xhtml#PC3) shows the `convertCurrency` method
    annotated with `@ConcurrentGauge`.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("rates")

    public class RateResourceImpl {

    @Path("convert")

    @POST

    @ConcurrentGauge(name = "convert_currency_concurrent_gauge",

    absolute = true,

    description = "Method to convert one currency to the other",

    tags = { "convert=custom" }

    )

    ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){};

    }

    Listing 9-3

    showing @ConcurrentGauge on convertCurrencyMethod

    ```


    Listing [9-3](#531256_1_En_9_Chapter.xhtml#PC3) shows the `convertCurrency` method
    annotated with `@ConcurrentGauge`. The `name`, `absolute`, and `description` are
    set, along with some custom tags. This is accessible at `/metrics/application/convert_currency_concurrent_gauge`.
    A sample call for the default text format returns the data as shown in Listing
    [9-4](#531256_1_En_9_Chapter.xhtml#PC4).


    ```

    # TYPE application_convert_currency_concurrent_gauge_current gauge

    # HELP application_convert_currency_concurrent_gauge_current Method to convert
    one currency to the other

    application_convert_currency_concurrent_gauge_current{convert="custom"} 0

    # TYPE application_convert_currency_concurrent_gauge_min gauge

    application_convert_currency_concurrent_gauge_min{convert="custom"} 0

    # TYPE application_convert_currency_concurrent_gauge_max gauge

    application_convert_currency_concurrent_gauge_max{convert="custom"} 1

    Listing 9-4

    showing the result for the @ConcurrentGauge metric

    ```


    ### `@Gauge`


    The `@Gauge` metric is used to sample the return value of a method. This method
    is mostly a business method that returns some form of meaningful, business context
    value for analysis. The method will be invoked by the Metrics runtime and the
    return value assigned as the value of the metric. `@Gauge` can be used for only
    methods.


    As an example, if we want to sample the number of currency conversions in jwallet,
    `@Gauge` is the perfect metric for that. The return value of the method is the
    value of the metric. This metric can only be used with `@ApplicationScoped` or
    `@Singleton` CDI beans because using it with other non-singleton beans will not
    be clear as to which instance of the bean to use for obtaining the gauge value.
    Listing [9-5](#531256_1_En_9_Chapter.xhtml#PC5) shows the `RateService` `@ApplicationScoped`
    bean with a `countConversions` gauge method.


    ```

    @ApplicationScoped

    public class RateService {

    @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
    = true)

    public int countConversions() {

    return ThreadLocalRandom.current().nextInt(250, 500 + 1);

    }

    }

    Listing 9-5

    showing @Gauge usage

    ```


    Listing [9-5](#531256_1_En_9_Chapter.xhtml#PC5) shows the `RateService` singleton
    with `countConversions` method that returns an `int`. When this metric is queried,
    the runtime will call this method and use the returned method value as the value
    of the metric. With the name, this metric can be directly accessed from the path
    `/metrics/application/convert_currency_gauge_count`. A sample invocation return
    data is shown in Listing [9-6](#531256_1_En_9_Chapter.xhtml#PC6).


    ```

    # TYPE application_convert_currency_gauge_count gauge

    application_convert_currency_gauge_count 474

    Listing 9-6

    showing sample return data for the @Gauge metric

    ```


    ### `@Metered`


    The `@Metered` annotation is a metric that tracks the frequency of invocations
    of the annotated method or constructor or class instantiation. It tracks the mean
    throughput and one-, five-, and fifteen-minute exponentially weighted moving average
    throughput. The default `MetricUnit` is seconds. `@Metered` can be used on a class,
    method, or constructor.


