    ## MicroProfile REST 客户端


    Eclipse MicroProfile REST 客户端规范^(¹¹²)提供了另一种以更类型安全的方式进行 REST 调用的方法。尽管上一节介绍的 Jakarta
    REST 客户端能够完成任务，但有时会显得冗长且笨拙。MicroProfile REST 客户端是另一种在 Java 中消费 HTTP 资源的方式，无需处理创建客户端对象的底层工作。清单
    6-27 展示了一个完整的 MicroProfile REST 客户端声明，用于对外调用 apilayer.com 的货币转换服务。


    ```

    @RegisterRestClient(baseUri = BASE_URI)

    @ClientHeaderParam(name = "apikey", value = "INSERT_API_KEY_FROM_SERVICE")

    @Path("exchangerates_data")

    public interface ApiLayer {

    String NAME = "ApiLayer";

    String BASE_URI = "https://api.apilayer.com";

    @GET

    @Path("convert")

    ApiLayerConvertResponse convertCurrency(@BeanParam ApiLayerConvertRequest apiLayerConvertRequest);

    @GET

    @Path("list")

    JsonObject getCurrencySymbols();

    }

    清单 6-27

    MicroProfile 客户端

    ```


    创建 REST 客户端需要描述要访问的资源。`ApiLayer` 接口声明了两个 HTTP GET 方法。第一个方法接受一个 `ApiLayerConvertRequest`
    对象，该对象使用 `@BeanParam` 注解，其中包含了 apilayer.com 货币服务所需的查询参数。这两个方法分别返回 `ApiLayerConvertResponse`
    和 `JsonObject`。第一个返回类型是特定于应用的对象，第二个 `JsonObject` 是 Jakarta JSON Processing API
    的一部分。


    该接口使用 `@RegisterRestClient(baseUri = BASE_URI)` 注解。这个注解是一个 MicroProfile REST 客户端原型，将此接口标记为针对
    `baseUri` 的 REST 客户端。使用此客户端的所有调用都将相对于 `baseUri` 传递的值进行，在此示例中为 [`https://api.apilayer.com`](https://api.apilayer.com)。`@ClientHeaderParam(name
    = “apikey”, value = “API_KEY”)` 用于向出站请求添加 HTTP 头信息。由于在接口级别使用，通过此客户端发出的每个出站请求都将包含来自此注解的键值对作为头条目。对于前面的示例，每个请求的请求头中都将包含
    `apiKey=“YOUR_API_KEY_FROM_API_LAYER”`。


    `@Path` 注解用于指定相对路径，在此客户端上调用的方法将相对于该路径进行。因此，在此客户端实例上调用的所有方法都将相对于 [`https://api.apilayer.com/exchangerates_data`](https://api.apilayer.com/exchangerates_data)
    进行。第一个 GET 方法将针对 [`https://api.apilayer.com/exchangerates_data/convert`](https://api.apilayer.com/exchangerates_data)
    调用，第二个方法将针对 [`https://api.apilayer.com/exchangerates_data/list`](https://api.apilayer.com/exchangerates_data)
    调用。声明好客户端后，使用它就像使用 `@Inject` 和 MicroProfile 特定的限定符 `@RestClient` 注入它一样简单。清单 6-28
    展示了在 `RateService` bean 中使用 `ApiLayer` REST 客户端的情况。


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    ApiLayer apiLayer;

    private ConvertCurrencyResponse convert(final ConvertCurrencyRequest currencyRequest)
    {

    ApiLayerConvertRequest request = new ApiLayerConvertRequest();

    request.setFromCurrency(currencyRequest.getSourceCurrency());

    request.setToCurrency(currencyRequest.getTargetCurrency());

    request.setAmount(currencyRequest.getAmount().toPlainString());

    ApiLayerConvertResponse response = apiLayer.convertCurrency(request);

    ConvertCurrencyResponseData data = new ConvertCurrencyResponseData();

    data.setCurrency(currencyRequest.getTargetCurrency());

    data.setAmount(response.getResult());

    data.setSource(ApiLayer.NAME);

    return ConvertCurrencyResponse.of(data);

    }

    }

    清单 6-28

    REST 客户端的使用

    ```


    要使用 REST 客户端，我们使用 `@Inject` 注入它，并使用 MicroProfile REST 客户端 API 中的 `@RestClient`
    CDI 限定符对其进行限定。接口的实现将在运行时由底层的 REST 客户端实现提供。`convert` 方法像调用任何其他 Java 实例一样，在注入的客户端上调用
    `convertCurrency` 方法。该实现将负责创建实际的 HTTP 请求、调用目标资源、获取响应并将其转换为声明的 Java 类型。`ApiLayerConvertRequest`
    和 `ApiLayerConvertResponse` 类分别如清单 6-29 和 6-30 所示。


    ```

    public class ApiLayerConvertResponse {

    private boolean success;

    private Info info;

    private LocalDate date;

    private BigDecimal result;

    @Getter

    @Setter

    public static class Info {

    private Long timestamp;

    private BigDecimal rate;

    }

    }

    清单 6-30

    ApiLayerConvertResponse

    ```


    ```

    public class ApiLayerConvertRequest {

    @QueryParam("from")

    private String fromCurrency;

    @QueryParam("to")

    private String toCurrency;

    @QueryParam("amount")

    private String amount;

    }

    清单 6-29

    ApiLayerConvertRequest

    ```


    `ApiLayerConvertResponse` 是端点返回的 JSON 的 Java 表示。REST 客户端运行时负责自动将返回的 JSON 编组为 Java
    表示。清单 6-31 显示了由 [`https://api.apilayer.com/exchangerates_data/convert`](https://api.apilayer.com/exchangerates_data)
    端点返回的示例 JSON。


    ```

    {

    "date": "2005-01-01",

    "historical": true,

    "info": {

    "quote": 0.51961,

    "timestamp": 1104623999

    },

    "query": {

    "amount": 10,

    "from": "USD",

    "to": "GBP"

    },

    "result": 5.1961,

    "success": true

    }

    清单 6-31

    示例返回数据

    ```


    `ApiLayer` 接口中的 `getCurrencySymbols` 端点返回一个 `JsonObject`。对于此端点，我们希望直接获取 JSON 数据以进行进一步处理。当在客户端实例上调用该方法时，REST
    客户端运行时会将响应的 JSON 字符串表示转换为 `JsonObject`。MicroProfile REST 客户端 API 是在 Jakarta EE
    应用程序中消费 REST 资源的一种强大、直观且类型安全得多的方式。


    ## 总结


    本章探讨了使用 Jakarta REST API 创建 RESTful Web 服务。我们研究了将领域资源建模为 HTTP 资源路径，接着使用 API 中的各种构造来创建这些资源，并学习了如何使用客户端
    API 进行 REST 调用。我们还研究了 Eclipse MicroProfile REST 客户端，并看到了使用该 API 消费 REST 资源是多么简单。您可以在相应的
    Jakarta REST 和 Eclipse MicroProfile REST 客户端规范中找到更多高级主题。它们都使用易于理解的语言编写，应作为您掌握高级用法的权威知识来源。


