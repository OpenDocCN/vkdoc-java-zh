- fmt: '# Metrics Data Format


    By default, when a GET request is made to the `/metrics` resource, the returned
    metrics information is in the OpenMetrics text format. This is an open standard
    format for metrics supported by a number of monitoring applications like Prometheus.


    However, the same metrics data can be returned in the JSON format if the `Accept`
    header of the HTTP request matches `application/json`. If the `Accept` header
    of the request matches both `application/json` and `text/plain` or no `Accept`
    header is specified, then the data is returned in the default OpenMetrics text
    format.


    # The Metrics Registry


    The metrics registry is a registry of all metrics that can be accessed under the
    `/metrics` resource and their metadata. There is a shared singleton registry for
    each of the three metrics scopes of base, application, and vendor. Metrics are
    identified in the registry through their metrics ID comprising their names and
    tags (if available). Think of the metrics registry as a database of the metrics
    found in each scope. The registry will be transparent to you as an application
    developer most of the time. But you should know it’s there when you have to interact
    with it.


    # Using Metrics


    There are two ways you can use the Metrics API in your application. One is through
    annotations, and the other is through the Java API. Whichever you choose is only
    a matter of application requirements and developer preference. The annotations
    are interceptor bindings that are managed by the CDI runtime. Consequently, only
    proxyable managed beans can use the annotations for collecting metrics.


    ## Annotations


    There are six annotations for creating different kinds of metrics. These are


    *   `@Counted`

    *   `@ConcurrentGauge`

    *   `@Gauge`

    *   `@Metered`

    *   `@SimplyTimed`

    *   `@Timed`


    All these annotations have parameters that are common to all of them. These are
    shown in Table [9-1](#531256_1_En_9_Chapter.xhtml#Tab1).


    **Table 9-1** showing common metrics annotation parameters


    | Name | Type | Description | Option/Required |

    | --- | --- | --- | --- |

    | `name` | `String` | Sets the name of the metric | Optional. Defaults to name
    of annotated object |

    | `absolute` | `boolean` | If `true`, name is used as the absolute name of the
    metric. If `false`, prepends the package name and class name before the given
    name | Optional. Defaults to `false` |

    | `displayName` | `String` | Human-readable name for metadata | Optional. Defaults
    to `null` |

    | `description` | `String` | A description of the metric | Optional. Defaults
    to `null` |

    | `unit` | `String` | The unit of the specific metric | Optional. Different defaults
    |

    | `tags` | `String[]` | An array of “key=value” tags for the metric | Optional.
    Empty array |


    ### `@Counted`


    The `@Counted` metric annotation counts the number of times the annotated method,
    constructor, or type is invoked or instantiated. This annotation can be used on
    a method, constructor, or class. If used at the class level, all methods in that
    class will have their invocations counted. Listing [9-1](#531256_1_En_9_Chapter.xhtml#PC1)
    shows method `convertCurrency` in the `RateResourceImpl` class annotated with
    `@Counted`, passing in some parameters.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("rates")

    public class RateResourceImpl {

    @Path("convert")

    @POST

    @Counted(name = "convert_currency",

    absolute = true,

    displayName = "Convert currency method",

    description = "Method to convert one currency to the other",

    tags = { "info=conversions", "type=meta" })

    ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){

    return rateService.convertCurrency(convertCurrencyRequest)

    };

    }

    Listing 9-1

    shows the use of @Counted

    ```


    Listing [9-1](#531256_1_En_9_Chapter.xhtml#PC1) shows the `@Counted` annotation
    used on the `convertCurrency` method. It has the `name` parameter set and the
    `absolute` set to `true`. This means the name of this metric that will be registered
    in the registry is `convert_currency`. If `absolute` was not set to `true`, the
    name of the metric would be package name + class name + passed value to `name`
    parameter. The tags are also set to some method-specific info.


    Tags play an important role in metrics because in a cloud-native environment where
    orchestration of deployed containers is done by engines like kubernetes, the traditional
    mapping of application runtime and host is no longer the case. In the context
    of metrics, tags add an additional dimension for identifying metrics in addition
    to the name of the metrics.


    The counted metric can be accessed directly from the `/metrics/application/convert_currency`
    when the application is deployed. The name of the metric is enough to access it
    via the REST endpoint because the `absolute` parameter was set to `true`. A sample
    call for this metric in the OpenMetrics format returns the result shown in Listing
    [9-2](#531256_1_En_9_Chapter.xhtml#PC2).


    ```

    # TYPE application_convert_currency_total counter

    # HELP application_convert_currency_total Method to convert one currency to the
    other

    application_convert_currency_total{info="conversions",type="meta"} 75

    Listing 9-2

    showing a sample metric for @Counted

    ```


    Listing [9-2](#531256_1_En_9_Chapter.xhtml#PC2) shows the `@Counted` annotation
    when accessed directly from the `/metrics/application` context path. The returned
    data is annotated with `TYPE` and `HELP` that shows the type and description of
    the metric, respectively. The metric count is preceded by `application_`. This
    is how application-level metrics are differentiated from base- and vendor-level
    metrics. The tags passed to the `@Counted` annotation are also returned as part
    of the full metric ID. As per the count, the `convertCurrency` method has been
    called a total of 75 times.'
