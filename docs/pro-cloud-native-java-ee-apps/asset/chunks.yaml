- fmt: '### Provider Injection


    Config values can be retrieved through injection of the `jakarta.inject.Provider<T>`
    bean. A target type is wrapped in the `Provider` interface and annotation `@Inject`
    and `@ConfigProperty`, as shown in Listing [7-8](#531256_1_En_7_Chapter.xhtml#PC8).


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @ConfigProperty(name = "convert_request")

    Provider currencyRequestProvider;

    public ConvertCurrencyResponse batchConvertWithProvider() {

    return convert(currencyRequestProvider.get());

    }

    }

    ```


    Listing [7-8](#531256_1_En_7_Chapter.xhtml#PC8) shows the use of `Provider` to
    retrieve config values. As usual, the field `currencyRequestProvider` is annotated
    `@Inject` and `@ConfigProperty`. This construct is similar to using `Optional<T>`,
    except that unlike `Optional`, a call to `Provider#get` as done in the `batchConvertWithProvider`
    method will always get the latest value from the underlying config.


    The three previous ways you have seen all read the config value once. So if the
    data changes in the underlying config source, it is not reflected in values returned
    through any of the first three constructs. However, the use of `Provider<T>` and
    calling the `get` method on it as done in Listing [7-8](#531256_1_En_7_Chapter.xhtml#PC8)
    will always resolve the latest value from the underlying config source.


    The call to the `Provider#get` method will throw a `RuntimeException` if the value
    resolves to `null` or an empty string. Listing [7-8](#531256_1_En_7_Chapter.xhtml#PC8)
    did not explicitly pass in a `defaultValue`, which means a value is expected to
    be available, the absence of which will throw a `RuntimeException` when `get`
    is called on the `currencyRequestProvider` field.


    ### Supplier Injection


    The `java.util.Supplier<T>` interface can also be used to read config values through
    injection. Listing [7-9](#531256_1_En_7_Chapter.xhtml#PC9) shows the use of the
    `Supplier` interface to retrieve config values.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @ConfigProperty(name = "convert_request")

    Supplier convertCurrencyRequestSupplier;

    public ConvertCurrencyResponse batchConvertWithSupplier() {

    return convert(convertCurrencyRequestSupplier.get());

    }

    }

    ```


    Listing [7-9](#531256_1_En_7_Chapter.xhtml#PC9) shows the use of the `Supplier`
    functional interface. Similar to the `Provider<T>` interface, the `Supplier` interface
    is also injected using `@Inject` and the `@ConfigProperty` qualifier. Also similar
    to the `Provider<T>` interface, the call to `get` as done in the `batchConvertWithSupplier`
    method will resolve the latest value in the underlying config source. The absence
    of a default value means the value must exist, absence of which will cause a `RuntimeException`
    to be thrown.


    ### The ConfigValue Metadata


    The `org.eclipse.microprofile.config.ConfigValue` interface can also be injected
    and used to get config values. Unlike the other constructs discussed earlier,
    the `ConfigValue` interface has methods to get the `ConfigSource` name, the ordinal,
    the raw config value, the name of the property, and the value. Unless you need
    to do something at runtime with the config source, you will seldom use the `ConfigValue`.


    ## Summary


    The Eclipse MicroProfile Config specification is a simple set of API constructs
    that helps you load application properties at runtime without having to redeploy
    the application nor the application needing to know the actual underlying source
    of the configuration. This chapter looked at the three core components that make
    up the Config specification, namely, config source, converters, and config value.
    These three components together give you all that you need to abstract your application
    from its properties.


    # 8. Resilience with Fault Tolerance API


    Modern cloud-native applications are generally crafted as a set of microservices
    that communicate with each other, mostly over the network. Users of such applications
    have come to expect applications to always be available. However, there are a
    number of things that can always go wrong during the runtime of an application
    instance.


    The network may be unavailable, a database service might take too long to respond,
    an application might go viral overnight and have an unexpected surge in concurrent
    users, a web service might be offline, and a multitude of other potential problems.
    For an application to be able to weather such inevitable mishaps, it needs to
    be fault-tolerant and resilient.


    The Eclipse MicroProfile Fault Tolerance specification provides a number of declarative
    API constructs that can be used to create fault-tolerant and resilient modern,
    cloud-native applications. The goal of this chapter is to show you how you can
    use the Eclipse MicroProfile Fault Tolerance API to add retry policies, bulkheads,
    circuit breakers, timeouts, and fallbacks to your microservices, transforming
    them into much more resilient cloud-native versions.


    ## Fault Tolerance


    The Fault Tolerance specification provides a number of interceptor bindings that
    can be used declaratively to achieve fault tolerance on applications. These interceptor
    bindings can be used individually or in combination with each other. Because the
    specification is built on the Jakarta Interceptors specification, it can be used
    directly with CDI beans. So all existing CDI services can be transformed into
    fault-tolerant components with the Fault Tolerance specification.


    The set of fault tolerance interceptor bindings available covers the following
    aspects of creating resilient, fault-tolerant applications:


    - Fallback

    - Timeout

    - Retry policy

    - Circuit breaker

    - Asynchronous

    - Bulkhead'
