- fmt: "Line 1 defines that our image is based on an OpenLiberty full image which\
    \ contains full support for Jakarta EE and MicroProfile. Lines 3–5 copy the OpenLiberty\
    \ config file, Apache Derby embedded database JDBC drivers, and our application\
    \ artifact (`.war`) files to the created image so it gets autodeployed upon server\
    \ startup. Line 7 exposes port 3001 the app is expected to listen on. Finally,\
    \ line 9 runs the OpenLiberty `configure.sh` file to preconfigure and activate\
    \ required features.\n\nIn the root folder, we have a `docker-compose.yaml` file\
    \ that serves as the entry point to run the application using `docker compose`\
    \ which declares six services: the `wallet`, `rate`, and `account` services corresponding\
    \ to the three microservices of the application, and the `jaeger`, `prometheus`,\
    \ and `grafana` services. These services do have interdependencies among themselves.\n\
    \nThe `wallet` service is built from the `Dockerfile` found in the `wallet` folder\
    \ of the `wallet` module and exposes port 3001 as shown in Listing [3-9](#531256_1_En_3_Chapter.xhtml#PC9);\
    \ the `rate` from the `Dockerfile` in the `rate` folder and exposes port 3002\
    \ as shown in Listing [3-10](#531256_1_En_3_Chapter.xhtml#PC10); and the `account`\
    \ service from the `account` folder `Dockerfile` and exposes port 3003 as shown\
    \ in Listing [3-11](#531256_1_En_3_Chapter.xhtml#PC11). Of interest is the health\
    \ check^([^(73)](#fn73)) done for each of these three services. A simple `curl`\
    \ call is made to the default Eclipse MicroProfile health check endpoint for each\
    \ of them. This is used to tell Docker the readiness of the containers to start\
    \ accepting requests. And also have some environment variables to configure the\
    \ tracing agent to connect to our tracing server Jaeger.\n\n```\naccount:\n  image:\
    \ jwallet/account:latest\n  ports:\n    - \"3003:3003\"\n  environment:\n    JAEGER_AGENT_HOST:\
    \ jaeger\n    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM:\
    \ 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health || exit\
    \ 1\n  build:\n    context: account\n    dockerfile: Dockerfile\nListing 3-11\n\
    Account docker compose service\n```\n\n```\nrate:\n  image: jwallet/rate:latest\n\
    \  ports:\n    - \"3002:3002\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n\
    \    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM:\
    \ 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health || exit\
    \ 1\n  build:\n    context: rate\n    dockerfile: Dockerfile\nListing 3-10\nRate\
    \ docker compose service\n```\n\n```\nwallet:\n  image: jwallet/wallet:latest\n\
    \  ports:\n    - \"3001:3001\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n\
    \    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM:\
    \ 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health || exit\
    \ 1\n  build:\n    context: wallet\n    dockerfile: Dockerfile\nListing 3-9\n\
    Wallet docker compose service\n```\n\nThe `jaeger` service is based on the `jaeger`\
    \ Docker image as pulled from Docker Hub. This service declares a dependency on\
    \ the `wallet`, `rate`, and `account` services, so `docker compose` will start\
    \ the `jaeger` service after them. Since Jaeger is a request tracing application,\
    \ it needs to have something to trace. And the `wallet` container, being the root\
    \ container, is one on which Jaeger depends as shown in Listing [3-12](#531256_1_En_3_Chapter.xhtml#PC12).\n\
    \n```\njaeger:\n  image: docker.io/jaegertracing/all-in-one:1.31\n  ports:\n \
    \   - \"5775:5775/udp\"\n    - \"6831:6831/udp\"\n    - \"6832:6832/udp\"\n  \
    \  - \"5778:5778\"\n    - \"16686:16686\"\n    - \"14268:14268\"\n  depends_on:\n\
    \    - wallet\n    - rate\n    - account\nListing 3-12\nJaeger docker compose\
    \ service\n```\n\nThe `prometheus` service is based on the `prometheus` Docker\
    \ image pulled from Docker Hub. This service also declares a dependency on the\
    \ `wallet`, `rate`, and `account` services; on the volume section of the service\
    \ declaration, a copy of the bundled `prometheus.yml` file is bundled into the\
    \ created container. This file configures the endpoints where Prometheus will\
    \ scrape for metrics on `wallet`, `rate`, and `account` services and other related\
    \ configurations such as scrape intervals as shown in Listing [3-13](#531256_1_En_3_Chapter.xhtml#PC13).\n\
    \n```\nprometheus:\n  image: docker.io/prom/prometheus:v2.34.0\n  volumes:\n \
    \   - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml\n  ports:\n\
    \    - \"9090:9090\"\n  depends_on:\n    - wallet\n    - rate\n    - account\n\
    Listing 3-13\nPrometheus docker compose service\n```\n\nThe final service, `grafana`,\
    \ based on the image pulled from Docker Hub, declares a dependency on `prometheus`.\
    \ Both Grafana and Prometheus are applications for displaying application metrics.\
    \ However, Grafana is a much more user-friendly and configurable monitoring application\
    \ than Prometheus. So the general practice in the observability space is to configure\
    \ Grafana to consume the metrics scraped from the application by Prometheus. This\
    \ way, you get the best of both worlds – Prometheus being good at scraping the\
    \ metrics and Grafana being good at displaying them. On the volume section of\
    \ the service declaration, a copy of some preconfigured dashboards is bundled,\
    \ taking advantage of Grafana provisioning feature as shown in Listing [3-14](#531256_1_En_3_Chapter.xhtml#PC14).\n\
    \n```\ngrafana:\n  image: docker.io/grafana/grafana-oss:8.4.4\n  ports:\n    -\
    \ \"3000:3000\"\n  environment:\n    GF_AUTH_ANONYMOUS_ENABLED: 'true'\n  volumes:\n\
    \    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources\n\
    \    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards\n\
    \  depends_on:\n    - prometheus\nListing 3-14\nGrafana docker compose service\n\
    ```"
  raw: 'Line 1 defines that our image is based on an OpenLiberty full image which
    contains full support for Jakarta EE and MicroProfile. Lines 3–5 copy the OpenLiberty
    config file , Apache Derby embedded database JDBC drivers, and our application
    artifact (.war) files to the created image so it gets autodeployed upon server
    startup. Line 7 exposes port 3001 the app is expected to listen on. Finally, line
    9 runs the OpenLiberty configure.sh file to preconfigure and activate required
    features.


    In the root folder, we have a docker-compose.yaml file that serves as the entry
    point to run the application using docker compose which declares six services,
    the wallet, rate, and account services corresponding to the three microservices
    of the application and the jaeger, prometheus, and grafana services. These services
    do have interdependencies among themselves.


    The wallet service is built from the Dockerfile found in the wallet folder of
    the wallet module and exposes port 3001 as shown in Listing [3-9](#531256_1_En_3_Chapter.xhtml#PC9),
    the rate from the Dockerfile in the rate folder and exposes port 3002 as shown
    in Listing [3-10](#531256_1_En_3_Chapter.xhtml#PC10), and the account service
    from the account folder Dockerfile and exposes port 3003 as shown in Listing [3-11](#531256_1_En_3_Chapter.xhtml#PC11).
    Of interest is the health check^([^(73)](#fn73)) done for each of these three
    services. A simple curl call is made to the default Eclipse MicroProfile health
    check endpoint for each of them. This is used to tell docker the readiness of
    the containers to start accepting requests. And also have some environment variables
    to configure the tracing agent to connect to our tracing server Jaeger.


    ```

    account:

    image: jwallet/account:latest

    ports:

    - "3003:3003"

    environment:

    JAEGER_AGENT_HOST: jaeger

    JAEGER_AGENT_PORT: 6831

    JAEGER_SAMPLER_TYPE: const

    JAEGER_SAMPLER_PARAM: 1

    healthcheck:

    test: curl --fail http://localhost:9080/health || exit 1

    build:

    context: account

    dockerfile: Dockerfile

    Listing 3-11

    Account docker compose service

    ```


    ```

    rate:

    image: jwallet/rate:latest

    ports:

    - "3002:3002"

    environment:

    JAEGER_AGENT_HOST: jaeger

    JAEGER_AGENT_PORT: 6831

    JAEGER_SAMPLER_TYPE: const

    JAEGER_SAMPLER_PARAM: 1

    healthcheck:

    test: curl --fail http://localhost:9080/health || exit 1

    build:

    context: rate

    dockerfile: Dockerfile

    Listing 3-10

    Rate docker compose service

    ```


    ```

    wallet:

    image: jwallet/wallet:latest

    ports:

    - "3001:3001"

    environment:

    JAEGER_AGENT_HOST: jaeger

    JAEGER_AGENT_PORT: 6831

    JAEGER_SAMPLER_TYPE: const

    JAEGER_SAMPLER_PARAM: 1

    healthcheck:

    test: curl --fail http://localhost:9080/health || exit 1

    build:

    context: wallet

    dockerfile: Dockerfile

    Listing 3-9

    Wallet docker compose service

    ```


    The jaeger service is based on the jaeger docker image as pulled from Docker Hub.
    This service declares a dependency on the wallet, rate, and account services,
    so docker compose will start the jaeger service after them. Since jaeger is a
    request tracing application, it needs to have something to trace. And the wallet
    container, being the root container, is one on which jaeger depends as shown in
    Listing [3-12](#531256_1_En_3_Chapter.xhtml#PC12).


    ```

    jaeger:

    image: docker.io/jaegertracing/all-in-one:1.31

    ports:

    - "5775:5775/udp"

    - "6831:6831/udp"

    - "6832:6832/udp"

    - "5778:5778"

    - "16686:16686"

    - "14268:14268"

    depends_on:

    - wallet

    - rate

    - account

    Listing 3-12

    Jaeger docker compose service

    ```


    The prometheus service is based on the prometheus docker image pulled from Docker
    Hub . This service also declares a dependency on the wallet, rate, and account
    services; on the volume section of the service declaration, a copy of the bundled
    prometheus.yml file is bundled into the created container. This file configures
    the endpoints where prometheus will scrape for metrics on wallet, rate, and account
    services and other related configurations such as scrape intervals as shown in
    Listing [3-13](#531256_1_En_3_Chapter.xhtml#PC13).


    ```

    prometheus:

    image: docker.io/prom/prometheus:v2.34.0

    volumes:

    - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml

    ports:

    - "9090:9090"

    depends_on:

    - wallet

    - rate

    - account

    Listing 3-13

    Prometheus docker compose service

    ```


    The final service, grafana, based on the image pulled from Docker Hub, declares
    a dependency on prometheus. Both grafana and prometheus are applications for displaying
    application metrics. However, grafana is a much more user-friendly and configurable
    monitoring application than prometheus. So the general practice in the observability
    space is to configure grafana to consume the metrics scraped from the application
    by prometheus. This way, you get the best of both worlds – prometheus being good
    at scraping the metrics and grafana being good at displaying them. On the volume
    section of the service declaration, a copy of some preconfigured dashboards is
    bundled, taking advantage of grafana provisioning feature as shown in Listing
    [3-14](#531256_1_En_3_Chapter.xhtml#PC14).


    ```

    grafana:

    image: docker.io/grafana/grafana-oss:8.4.4

    ports:

    - "3000:3000"

    environment:

    GF_AUTH_ANONYMOUS_ENABLED: ''true''

    volumes:

    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources

    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards

    depends_on:

    - prometheus

    Listing 3-14

    Grafana docker compose service

    ```'
  trans: "\n第 1 行定义我们的镜像基于一个 OpenLiberty 完整镜像，该镜像包含对 Jakarta EE 和 MicroProfile 的完整支持。第\
    \ 3-5 行将 OpenLiberty 配置文件、Apache Derby 嵌入式数据库 JDBC 驱动程序和我们的应用程序工件（.war）文件复制到创建的镜像中，以便在服务器启动时自动部署。第\
    \ 7 行暴露应用程序预期监听的 3001 端口。最后，第 9 行运行 OpenLiberty 的 configure.sh 文件，以预配置并激活所需功能。\n\
    \n在根文件夹中，我们有一个 docker-compose.yaml 文件，作为使用 docker compose 运行应用程序的入口点，该文件声明了六个服务：wallet、rate\
    \ 和 account 服务（对应应用程序的三个微服务），以及 jaeger、prometheus 和 grafana 服务。这些服务之间存在相互依赖关系。\n\
    \nwallet 服务基于 wallet 模块的 wallet 文件夹中的 Dockerfile 构建，并暴露 3001 端口，如清单 3-9 所示；rate\
    \ 服务基于 rate 文件夹中的 Dockerfile 构建，并暴露 3002 端口，如清单 3-10 所示；account 服务基于 account 文件夹中的\
    \ Dockerfile 构建，并暴露 3003 端口，如清单 3-11 所示。值得注意的是，这三个服务都进行了健康检查^(⁷³)。对每个服务都执行了一个简单的\
    \ curl 调用，指向默认的 Eclipse MicroProfile 健康检查端点。这用于告知 docker 容器已准备好开始接受请求。此外，还设置了一些环境变量来配置追踪代理，使其连接到我们的追踪服务器\
    \ Jaeger。\n\n```\naccount:\n  image: jwallet/account:latest\n  ports:\n    - \"\
    3003:3003\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n    JAEGER_AGENT_PORT:\
    \ 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM: 1\n  healthcheck:\n\
    \    test: curl --fail http://localhost:9080/health || exit 1\n  build:\n    context:\
    \ account\n    dockerfile: Dockerfile\n清单 3-11\nAccount docker compose 服务\n```\n\
    \n```\nrate:\n  image: jwallet/rate:latest\n  ports:\n    - \"3002:3002\"\n  environment:\n\
    \    JAEGER_AGENT_HOST: jaeger\n    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE:\
    \ const\n    JAEGER_SAMPLER_PARAM: 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health\
    \ || exit 1\n  build:\n    context: rate\n    dockerfile: Dockerfile\n清单 3-10\n\
    Rate docker compose 服务\n```\n\n```\nwallet:\n  image: jwallet/wallet:latest\n\
    \  ports:\n    - \"3001:3001\"\n  environment:\n    JAEGER_AGENT_HOST: jaeger\n\
    \    JAEGER_AGENT_PORT: 6831\n    JAEGER_SAMPLER_TYPE: const\n    JAEGER_SAMPLER_PARAM:\
    \ 1\n  healthcheck:\n    test: curl --fail http://localhost:9080/health || exit\
    \ 1\n  build:\n    context: wallet\n    dockerfile: Dockerfile\n清单 3-9\nWallet\
    \ docker compose 服务\n```\n\njaeger 服务基于从 Docker Hub 拉取的 jaeger docker 镜像。该服务声明了对\
    \ wallet、rate 和 account 服务的依赖，因此 docker compose 会在这些服务之后启动 jaeger 服务。由于 jaeger\
    \ 是一个请求追踪应用程序，它需要有东西可以追踪。而 wallet 容器作为根容器，是 jaeger 所依赖的容器之一，如清单 3-12 所示。\n\n```\n\
    jaeger:\n  image: docker.io/jaegertracing/all-in-one:1.31\n  ports:\n    - \"\
    5775:5775/udp\"\n    - \"6831:6831/udp\"\n    - \"6832:6832/udp\"\n    - \"5778:5778\"\
    \n    - \"16686:16686\"\n    - \"14268:14268\"\n  depends_on:\n    - wallet\n\
    \    - rate\n    - account\n清单 3-12\nJaeger docker compose 服务\n```\n\nprometheus\
    \ 服务基于从 Docker Hub 拉取的 prometheus docker 镜像。该服务也声明了对 wallet、rate 和 account 服务的依赖；在服务声明的卷部分，一份捆绑的\
    \ prometheus.yml 文件副本被捆绑到创建的容器中。该文件配置了 prometheus 将从 wallet、rate 和 account 服务抓取指标的端点，以及其他相关配置，如抓取间隔，如清单\
    \ 3-13 所示。\n\n```\nprometheus:\n  image: docker.io/prom/prometheus:v2.34.0\n \
    \ volumes:\n    - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml\n\
    \  ports:\n    - \"9090:9090\"\n  depends_on:\n    - wallet\n    - rate\n    -\
    \ account\n清单 3-13\nPrometheus docker compose 服务\n```\n\n最后一个服务 grafana，基于从 Docker\
    \ Hub 拉取的镜像，声明了对 prometheus 的依赖。grafana 和 prometheus 都是用于显示应用程序指标的应用程序。然而，grafana\
    \ 是一个比 prometheus 更用户友好、更可配置的监控应用程序。因此，可观测性领域的普遍做法是配置 grafana 来消费 prometheus 从应用程序抓取的指标。这样，你可以两全其美——prometheus\
    \ 擅长抓取指标，而 grafana 擅长显示它们。在服务声明的卷部分，利用 grafana 的预配置功能，捆绑了一些预配置仪表板的副本，如清单 3-14\
    \ 所示。\n\n```\ngrafana:\n  image: docker.io/grafana/grafana-oss:8.4.4\n  ports:\n\
    \    - \"3000:3000\"\n  environment:\n    GF_AUTH_ANONYMOUS_ENABLED: 'true'\n\
    \  volumes:\n    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources\n\
    \    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards\n\
    \  depends_on:\n    - prometheus\n清单 3-14\nGrafana docker compose 服务\n```\n"
- fmt: "### Hello, World!\n\nSubsequent relevant chapters will be going into detail\
    \ for each of the mentioned ancillary services declared in the `docker` file.\
    \ For now, as we have seen the setup of the application, before taking a peek\
    \ at the code, let us run the traditional hello world. Since the application is\
    \ packaged and run as docker containers, the `jwallet-cli.sh` script in the root\
    \ folder is a shell script that supports getting the application up and running\
    \ through docker compose or kubernetes. The various supported commands are available\
    \ through the `help` command as shown in Listing [3-15](#531256_1_En_3_Chapter.xhtml#PC15).\n\
    \n```\n~> ./jwallet-cli.sh help\nUsage:\njwallet-cli.sh \nCommands:\nbuild   \
    \    : build docker images\nup-compose : run jwallet on docker-compose\ndown-compose:\
    \ stop jwallet running on docker-compose\nup-kube    : run jwallet on kubernetes\
    \ (using k3d)\ndown-kube   : stop jwallet running on kubernetes (using k3d)\n\
    Listing 3-15\njwallet-cli.sh help command output\n```\n\nFor our hello world,\
    \ we are going to first build the images and everything with the `build` command\
    \ followed by the `up-compose` command. The initial building of the various images\
    \ and application artifacts could take some time depending on the speed of your\
    \ network and computer. Running the `up-compose` command after should get the\
    \ application up and running. For ease of reference, the `README.md` file has\
    \ a summary of the endpoints for accessing the various services of the application\
    \ as shown in Listing [3-16](#531256_1_En_3_Chapter.xhtml#PC16).\n\n```\nRunning\
    \ JWallet\n1\\. Docker compose\nRequires\n- docker-compose\nStart / Stop\n- start\
    \ ./jwallet-cli.sh up-compose\n- stop ./jwallet-cli.sh down-compose\nAccess service\n\
    - Wallet module http://localhost:3001/wallet\n- Rate module http://localhost:3002/rate\n\
    - Account module http://localhost:3003/account\n- Jaeger tracing http://localhost:16686\n\
    - Prometheus http://localhost:9090\n- Grafana http://localhost:3000\nListing 3-16\n\
    README.md entry for running and accessing the JWallet service\n```\n\nAccessing\
    \ the Hello endpoint on the wallet service, we get a message indicating the service\
    \ is up and running as shown in Listing [3-17](#531256_1_En_3_Chapter.xhtml#PC17).\
    \ It’s also the same for rate and account services as shown in Listings [3-18](#531256_1_En_3_Chapter.xhtml#PC18)\
    \ and [3-19](#531256_1_En_3_Chapter.xhtml#PC19), respectively.\n\n```\n~> curl\
    \ http://localhost:3003/account/api/hello\nHello account module\nListing 3-19\n\
    Accessing the account service Hello endpoint\n```\n\n```\n~> curl http://localhost:3002/rate/api/hello\n\
    Hello rate module\nListing 3-18\nAccessing the rate service Hello endpoint\n```\n\
    \n```\n~> curl http://localhost:3001/wallet/api/hello\nHello wallet module\nListing\
    \ 3-17\nAccessing the wallet service Hello endpoint\n```\n\nWe can also check\
    \ if our microservices are up and ready by querying their health check endpoints.\
    \ For the wallet microservice, a call to `http://localhost:3001/health` should\
    \ give us the status as shown in Listing [3-20](#531256_1_En_3_Chapter.xhtml#PC20).\n\
    \n```\n~> curl http://localhost:3001/health\n{\n\"checks\": [\n{\n\"data\": {},\n\
    \"name\": \"wallet-liveness\",\n\"status\": \"UP\"\n},\n{\n\"data\": {},\n\"name\"\
    : \"wallet-readiness\",\n\"status\": \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing\
    \ 3-20\nAccessing the wallet service health endpoint\n```\n\nFor the rate service,\
    \ a call to `http://localhost:3002/health` should give us its health status as\
    \ shown in Listing [3-21](#531256_1_En_3_Chapter.xhtml#PC21).\n\n```\n~> curl\
    \ http://localhost:3002/health\n{\n\"checks\": [\n{\n\"data\": {},\n\"name\":\
    \ \"rate-liveness\",\n\"status\": \"UP\"\n},\n{\n\"data\": {},\n\"name\": \"rate-readiness\"\
    ,\n\"status\": \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing 3-21\nAccessing the\
    \ rate service health endpoint\n```\n\nAnd for the account service, `http://localhost:3003/health`\
    \ should equally give us the health check status of the account microservice as\
    \ shown in Listing [3-22](#531256_1_En_3_Chapter.xhtml#PC22).\n\n```\n~> curl\
    \ http://localhost:3003/health\n{\n\"checks\": [\n{\n\"data\": {},\n\"name\":\
    \ \"account-liveness\",\n\"status\": \"UP\"\n},\n{\n\"data\": {},\n\"name\": \"\
    account-readiness\",\n\"status\": \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing\
    \ 3-22\nAccessing the account service health endpoint\n```\n\n### Application\
    \ Architecture Overview\n\nMicroservices as an application development paradigm\
    \ is well known and understood. However, there is no single definition of how\
    \ it is realized. Contrasting with monoliths, where it is clear all application\
    \ code is developed as a single unit, microservices do not lend itself to such\
    \ straightforward realization. One microservices application could be made up\
    \ of physically separate services, that is, each microservice of the application\
    \ is a separate maven project in its own codebase, and all the services orchestrated\
    \ with some form of orchestration tool like BPM.^([^(74)](#fn74))\n\nAnother could\
    \ be a set of separate services developed in a common codebase, with each service\
    \ acting as a module in the project. There are other variations of the way microservices\
    \ can be realized in a given application. Whichever implementation style that\
    \ is chosen, the microservices application should generally meet the descriptions\
    \ of microservices as discussed in the previous chapter."
