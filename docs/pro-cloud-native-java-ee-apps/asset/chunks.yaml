    有了我们的资源方法，我们现在可以使用任何REST客户端向其发起一个示例REST调用。该客户端可以是JWallet中的另一个服务、一个JavaScript客户端、另一个用Python编写的应用程序，或者任何其他能够发起REST调用的工具。对于我们的示例调用，我们使用Insomnia
    REST客户端。让我们通过调用`WalletResource`中的`createWallet`资源方法来创建一个钱包，如图[3-8](#531256_1_En_3_Chapter.xhtml#Fig8)所示。


