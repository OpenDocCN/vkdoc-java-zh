    # 14. 面向云原生的 Jakarta EE：从单体到微服务


    微服务软件架构正日益成为创建企业级、云原生应用的主流选择。Jakarta EE 平台，辅以 Eclipse MicroProfile 项目，尽管最初是为大型单体应用设计的，但已发展成为一个能够开发微服务应用的强大平台。


    本章探讨了将单体应用拆解为一组微服务的一般性指导原则。首先探讨了单体架构的优缺点，然后探讨了是否需要微服务，最后提供了将单体应用迁移到微服务的策略，使其为部署到
    Kubernetes 集群做好云就绪准备。


    ## 单体架构


    单体应用是指将所有组成部分打包成一个单一单元的应用。目前存在大量企业级应用都是单体架构。即使在微服务架构流行之前，Jakarta EE（或当时的 Java
    EE）应用也更多地是模块化单体。模块化单体是一种架构，其中应用的核心部分被拆分为应用内部的子模块。例如，一个典型的 Jakarta EE 应用会有一个 UI
    层（可以使用 Jakarta Faces 或任何 JavaScript 框架编写），然后是一个服务层（通常由 CDI Bean 和 EJB 会话 Bean
    组合而成，用于管理数据库连接和应用逻辑）。


    这样的应用可能不一定包含 REST 组件，因为 UI 层（如果使用 Jakarta Faces）会直接调用服务层。在打包时，这类应用会被打包成一个单一的 WAR
    文件。但实际上，它更像是一个模块化单体，便于在需要时轻松迁移到微服务。到目前为止，本书的示例代码介于纯微服务和纯单体架构之间。

    '
- fmt: '### Pros of the Monolith Architecture


    Even though the microservices architecture has taken off in recent years, monoliths
    still have their place because as with all things technology, they have some unique
    advantages over microservices in some contexts. The following are some of the
    strong parts of the monolith architecture.


    #### Simple to Develop


    Because a monolith is a single-unit application, it is generally much more easy
    to develop. With all parts in the same codebase, developing, adding features,
    refactoring, and extending the application are relatively easy. It is also easy
    to onboard new developers to the project since there is a single point of reference.


    #### Easier to Test


    As a single unit, it is relatively easy to write full end-to-end tests for a monolith.
    Because all the constituent parts of the application are in a single package,
    writing automated integration tests is much more easy and straightforward.


    #### Easier to Deploy


    As the whole application is packaged as a single `WAR` file, deployment entails
    dropping this `WAR` file into the deployment folder of a runtime. Whether packaged
    as a docker container or using the traditional deployment methods, deploying a
    single `WAR` file is generally straightforward.


    #### Easier to Debug


    Debugging a monolith is relatively easy since the entire application is available
    within the debugging context. Following the flow of execution to different parts
    of the application to identify the source of a bug is easy and straightforward.


    #### Reusability


    A lot of common functionality like cross-cutting concerns are developed and used
    over and over again. There is also less duplication of code since everything is
    in one place.


    #### Easy to Add New Developers


    Developers will always come and go. A monolith allows for relatively easy onboarding
    of new developers to the application development team. With everything in one
    place, there is less cognitive overhead in getting comfortable with the codebase.


    #### Easier Application Evolution


    With a unified codebase and a relative ease in onboarding new developers, a monolith
    is easy to evolve with the addition of new features.


    #### Easy to Scale


    Horizontally scaling a monolith generally entails multiple copies of the same
    deployment artifact behind different load balancers. In that regard, it is easy
    and cheaper to scale when the need arises.


    ### Challenges of the Monolith


    Even though a monolith has these and other advantages, it also comes with some
    challenges, especially as the complexity of the application grows. The following
    are some challenges that can arise from the use of the monolith architecture.


    #### Single Point of Failure


    As the entire application runs as a single instance, a problem in one component
    can bring down the whole application. For instance, an out-of-memory error resulting
    from an unclosed file reader could cause the whole instance to crash.


    #### Slow to Adopt New Technologies


    As the entire application is in a single unit, it is much slower to adopt new
    versions of libraries and APIs because careful thoughts need to go into impact
    assessment of every single change. This takes time and can be quite expensive.


    #### Full Redeployment


    Any change in the application, irrespective of the size, generally requires a
    redeployment of the full artifact.


    #### Grown Complexity


    At some point, a monolith might become too large and complex to be fully understood
    by any single person. This could result in impaired change impact assessments,
    resulting in changes that may not be fully understood.


    ## Microservices


    ### Considerations for Adoption or Migration


    Despite its shortcomings, the monolithic architecture has worked well for the
    vast majority of applications. As with all other things, there is always a need
    to take the business domain and context into consideration when deciding whether
    to use the microservices architecture or not. The following are some guidelines
    to help determine the need for the use of the microservices architecture.


    #### Application Insights


    The first factor to consider when thinking about microservices is if there are
    enough application insights for the currently running application. This could
    entail detailed knowledge of the different possible bottleneck areas, application
    performance under different conditions, which components have caused the most
    failures over a given period of time, and other such metrics. This is important
    to ascertain if there really is a need to split the application up into different
    microservices. These insights will help to know what constituent microservices
    the application should be split into. It will also help to know which (if any)
    part of the application needs scaling independent of the other parts.


    #### Availability of Technical Knowledge


    The availability of the engineering knowledge to maintain a set of microservices
    needs to be considered. Since every microservice is a “mini application,” consideration
    will need to be given to whether there is the engineering knowledge to keep each
    unit running.


    #### Onboarding New Developers


    Unlike a monolith, a microservice application will be made up of different services,
    each acting as a self-contained application. Consideration will need to be given
    to how new developers get onboarded onto the development team. How to get new
    joiners to become as productive as possible is something that merits consideration.


    #### Deployment Costs


    Unlike a monolith, microservices might require different deployment servers and
    platforms. This merits consideration from both the engineering and the finance
    perspective to determine if any marginal costs of deployment relative to the monolith
    are worth it.


    #### Keeping the End Goal in Mind


    Microservices should be understood to be a means to an end. This end could vary
    from organization to organization, but in the end, it always involves the use
    of an application to provide some form of value to its users. As such, microservices
    are just one means of attaining such a goal and should not become a focus in and
    of itself. Unless the marginal benefit of developing with microservices architecture
    outweighs the benefit, it should not be adopted for its own sake.


    ### Migrating a Monolith


    The process of migrating a monolith to a microservices architecture is a very
    domain-dependent exercise. However, the following sections give general guidelines
    that can be adopted and customized for different domains.


    #### Single Responsibility Principle


    Every microservice should be responsible for a single core function of the application.
    The function of each service should be simple to understand based on its name
    and REST interfaces. Since each microservice will be exposed to other modules
    through REST endpoints, it should be clear, on the face of these endpoints, what
    each service does.


    #### Organize Around the Business Domain


    Each service should be organized around the business domain. For instance, a restaurant
    application should be broken down into the different core aspects of running a
    restaurant – order placement service, billing service, kitchen service, and such.
    The bounded context of the various services should be the business domain.


    #### Create Libraries for Common Functionality


    Commonly used cross-cutting functionality should be abstracted into a library,
    packaged as a `JAR` file that can then be depended upon by services that need
    those functions. Code duplication should be minimized through abstractions.'
