  trans: '

    ### 事件对象


    事件对象是要触发的事件所携带的有效载荷。可以将有效载荷理解为将传递给事件监听器的数据。它可以是任何有效的 Java 类型。在 jwallet 中，我们想要向成功注册应用的用户发送一条短信。我们可以将此需求硬编码到
    `UserService` bean 中。然而，这意味着我们可能会被绑定到发送短信流程的单一实现上。


    一种更清晰的方式是，以应用中用户表示的类型来触发一个事件。这样，短信实现将与系统中持久化用户的流程完全解耦。我们可以随意添加或移除消息发送实现，而不会破坏代码。我们还可以添加其他消息选项，例如电子邮件，全部作为事件监听器或观察者，并且仍然与事件源完全解耦。


    为此，我们需要一个事件对象。当事件被触发时，此对象将作为有效载荷传递给观察者。CDI 容器将根据观察者正在观察的有效载荷类型，将事件观察者映射到已触发的事件。清单
    4-40 展示了 `UserServiceDecorator` 中带有有效载荷的 `Event` 接口。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    }

    清单 4-40

    展示了在 UserServiceDecorator 中注入 Event 对象

    ```


    清单 4-40 展示了 `UserServiceDecorator` 中有一个新的注入点——`Event<UserResponse>`。CDI 事件机制的入口点是
    `Event<T>` 接口。该接口接受一个类型，该类型将成为事件的有效载荷。它拥有触发不同类型事件的方法。如清单 4-40 所示，你注入一个 `Event`
    接口的实例，并传入一个有效载荷类型。此类型被称为事件类型，将用于解析哪些观察者对此事件感兴趣。CDI 容器将在运行时为你的应用程序提供 `Event` 接口的实现。清单
    4-41 展示了注入的 `Event` 对象的使用。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = userService.getUser(user.getId());

    userResponseEvent.fire(userResponse);

    return UserService.toUserResponse(userResponse);

    }

    return userService.createUser(createUserRequest);

    }

    }

    清单 4-41

    展示了触发 UserResponse 事件的实际过程

    ```


    清单 4-41 展示了 `UserServiceDecorator` bean 中修改后的 `createUser` 方法。该方法在将 `User` 对象持久化到数据库后，调用注入的事件对象上的
    `fire` 方法，并通过 `UserResponse` 对象传入新持久化的 `User`。这个传入的 `UserResponse` 对象将成为已触发事件的有效载荷。如你所见，触发事件就像调用
    `fire` 方法并传入 `Event` 接口的类型一样简单。这个简单的调用将触发一个事件，任何组件都可以订阅或观察该事件。传递给 `Event` bean
    的 `fire` 方法的 `UserResponse` 实例，将被传递给所有 `UserResponse` 类型的事件观察者。


    ### 事件观察者


    CDI 事件机制的第二部分是事件观察者。观察者是特定事件的订阅者。容器根据观察者观察的类型，将观察者与事件配对。一个希望被通知 `UserResponse`
    事件的观察者，必须观察一个 `User` 事件。清单 4-42 展示了 `MessageCenter` bean 中的 `User` 事件观察者。


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes final UserResponse userResponse) {

    //TODO --> Send SMS through gateway... Blocking task

    }

    }

    清单 4-42

    展示了作为 MessageCenter bean 的 UserResponse 事件观察者

    ```


    清单 4-42 展示了 `MessageCenter` bean 中有一个 `sendUserSms` 方法。该方法接受一个 `UserResponse`
    类型的参数。此参数决定了此观察者将被通知的事件类型。该参数使用了 `@Observes` 注解进行标注，告知 CDI 运行时此方法观察被注解类型的事件。当
    `UserResponse` 事件在 `UserServiceDecorator` bean 中被触发时，容器将自动调用此方法，并传入在 `UserServiceDecorator`
    bean 中传递给 `Event` 接口的 `fire` 方法的 `UserResponse` 实例。尽管触发事件的 bean 和观察事件的 bean 之间在编译时绝对没有依赖关系，但在运行时，这些
    bean 将通过触发的事件相互通信。

