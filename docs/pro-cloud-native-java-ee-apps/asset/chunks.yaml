    with a new injection point – `Event<UserResponse>`. The entry point to the CDI
    event mechanism is the `Event<T>` interface. This interface takes a type, which
    will be the event payload. It has methods to fire different types of events. As
    shown in Listing [4](#531256_1_En_4_Chapter.xhtml#PC40)-40, you inject an instance
    of the `Event` interface, passing in a payload type. This type is called the event
    type and will be used in resolving which observers are interested in this event.
