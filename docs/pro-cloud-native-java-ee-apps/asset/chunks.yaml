    ### 测试


    每个应用程序都应具备某种形式的测试，最好是单元测试、组件测试、集成测试和手动测试的组合。每个 Maven 项目都有一个默认的测试文件夹用于创建测试。JWallet
    为每个微服务提供了独立的测试，用于测试应用程序的各种功能。由于对于如何编写测试没有普遍接受的定义，所有应用程序都以不同的方式实现测试。由于 JWallet
    的主要用户界面是 REST 端点，因此集成测试包括向这些端点发送请求，并对响应进行 JUnit 断言。


    在 Java 领域，有众多测试框架和库可供选择。所选库的组合主要取决于正在开发的应用程序。作为 Jakarta EE 应用程序，JWallet 需要一个实现才能运行。因此，为了运行测试，即使在测试环境中，我们也需要部署应用程序。一个能够简化
    Jakarta 应用程序测试基础设施管理的库是 TestContainers^(⁸⁴) 项目。JWallet 集成了 TestContainers 库，使得使用
    Maven 命令 `mvn verify -Dtc` 运行完整的端到端集成测试变得容易。


    钱包微服务中测试的入口点是 `AbstractWalletIT`，如代码清单 3-34 所示。


    ```

    public class AbstractWalletIT {

    protected static final String walletServiceUrl;

    protected static final WebTarget target;

    static {

    boolean testInContainer = System.getProperties().containsKey("tc");

    String walletServiceUrlTemplate = "http://%s:%d/wallet/api";

    if (testInContainer) {

    final DockerComposeContainer composeContainer = new DockerComposeContainer(new
    File("docker-compose.yaml"))

    .withExposedService("wallet", 3001);

    composeContainer.start();

    walletServiceUrl = String.format(walletServiceUrlTemplate,

    composeContainer.getServiceHost("wallet", 3001),

    composeContainer.getServicePort("wallet", 3001));

    } else {

    walletServiceUrl = String.format(walletServiceUrlTemplate, "localhost", 3001);

    }

    target = ClientBuilder.newClient().target(walletServiceUrl);

    }

    }

    代码清单 3-34

    AbstractWalletIT 类

    ```


    这段代码在静态块中进行了一些初始化，检查你是否在运行 `mvn verify` 时传入了 `tc` 属性。如果传入了，则会创建一个新的 `DockerComposeContainer`
    实例，并使用钱包模块根目录下的 `docker-compose.yaml` 文件启动它，如图 3-10 所示。


    ![](img/531256_1_En_3_Fig10_HTML.jpg)


    一张截图展示了项目结构，其中 Jwallet 测试使用的 docker compose yaml 文件被高亮显示，该文件位于钱包模块的 src 目录下。


    图 3-10


    项目结构中的 Docker-compose.yaml 文件


    创建的 `DockerComposeContainer` 实例用于获取已部署的钱包微服务的主机和端口，然后实例化 `walletServiceUrl` 变量。如果没有传入
    `tc` 属性，则使用 `localhost` 实例化 `walletServiceUrl`。然后，使用 JAX-RS `ClientBuilder` 创建一个新的
    `WebTarget` 对象。有了这个设置，继承 `AbstractWalletIT` 的测试子类就可以使用这个 `target` 对象向钱包微服务中的各种资源发送
    REST 调用。


    例如，`HelloResourceIT` 向 `HelloResource` 端点发送一个调用，并对收到的响应进行简单断言，如代码清单 3-35 所示。


    ```

    class HelloResourceIT extends AbstractWalletIT {

    @Test

    void hello() {

    String response = target.path("hello").request().get(String.class);

    assertEquals("Hello wallet module", response);

    }

    }

    代码清单 3-35

    HelloResourceIT 类

    ```


    第 4 行对我们的 `HelloResource` 发起了一个 GET 调用，并从响应中读取了 `String` Java 类型，因为我们知道 `HelloResource`
    方法返回一个字符串。然后，第 5 行使用 JUnit 断言 API 中的 `assertEquals` 方法来测试收到的响应是否与我们的预期相符。


    `WalletResourceIT` 也继承了 `AbstractWalletIT`，如代码清单 3-36 所示。第 3 行声明了一个 `createWallet`
    JUnit 测试（第 2 行使用了 `@Test` 注解）。与之前讨论的 `hello` 测试类似，`createWallet` 测试构建了一个 `CreateWalletRequest`
    对象，并发出一个 POST 请求，将创建的对象传递给 `Entity.json` 方法以将其转换为 JSON，然后发送给资源方法。`.post` 方法（第
    9 行）的第二个参数是资源期望返回类型的类类型。由于我们的 `createWallet` 资源方法返回一个 `BalanceResponse`，我们传入了
    `BalanceResponse.class`。然后，我们将返回值赋给一个 `BalanceResponse` 类型的变量，并继续对其进行一些断言。


    ```

    class WalletResourceIT extends AbstractWalletIT {

    @Test

    void createWallet() {

    CreateWalletRequest createWalletRequest = new CreateWalletRequest();

    createWalletRequest.setCurrency("USD");

    BalanceResponse balanceResponse = target.path("wallets").request()

    .post(Entity.json(createWalletRequest), BalanceResponse.class);

    assertEquals("0", balanceResponse.getResponse().getResponseCode());

    assertEquals("OK", balanceResponse.getResponse().getResponseMessage());

    assertEquals(createWalletRequest.getCurrency(), balanceResponse.getData().getCurrency());

    assertEquals(BigDecimal.ZERO, balanceResponse.getData().getBalance());

    assertNotNull(balanceResponse.getData().getWalletId());

    }

    // 更多测试

    }

    代码清单 3-36

    WalletResourceIT 类

    ```


    在第 6 章中，你将更详细地了解如何使用 JAX-RS 客户端 API 向 JWallet 内部和外部的其他资源方法发起 REST 调用。

