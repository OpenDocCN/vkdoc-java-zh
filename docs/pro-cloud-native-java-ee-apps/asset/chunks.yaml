  raw: '### The Event Object


    The event object is the payload of the event to be fired. Think of the payload
    as the data that will be passed to listeners of the event. It can be any valid
    Java type. In jwallet, we want to send an SMS to users who successfully sign up
    to the application. We could hard code this requirement into our UserService bean.
    However, that would mean we could get tied to a single implementation of the process
    of sending an SMS.


    A much cleaner way would be to fire an event of the type of user representation
    we have in the application. This way, the SMS implementation will be fully decoupled
    from the process of persisting users in the system. And we can add and remove
    message sending implementations at will without breaking the code. We could also
    add other messaging options like email, all as event listeners, or observers,
    still completely decoupled from the event source.


    To do this, we need an event object. This object will be passed to observers as
    the payload when the event is fired. The CDI container will map event observers
    to fired events based on the type of payload that the observers are observing.
