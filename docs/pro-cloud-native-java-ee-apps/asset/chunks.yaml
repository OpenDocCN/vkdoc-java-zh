    The thread pool style bulkhead is when an asynchronous method is annotated `@Bulkhead`.
    This style also allows the setting of the maximum number of requests that can
    be available in the waiting queue. Listing [8-9](#531256_1_En_8_Chapter.xhtml#PC9)
    shows the `RateService`’s `convertCurrencyAsync` method annotated with the `@Bulkhead`.


    ```

    @ApplicationScoped

    public class RateService {

    @Asynchronous

    @Retry

    @Bulkhead

    public CompletionStage convertCurrencyAsync(

    final ConvertCurrencyRequest convertCurrencyRequest) {

    return CompletableFuture.completedFuture(convert(convertCurrencyRequest));

    }

    }

    Listing 8-9

    showing the thread pool bulkhead in RateService

    ```


    In Listing [8-9](#531256_1_En_8_Chapter.xhtml#PC9), the `convertCurrencyAsync`
    method bears both the `@Asynchronous` and `@Bulkhead` annotations. By default,
    only ten concurrent requests will be allowed to the method at any point in time,
    with ten more in the waiting queue. The parameter `waitingTaskQueue` can be used
    to set the size of the waiting queue.


    If a request cannot be added to the queue, an `org.eclipse.microprofile.faulttolerance.exceptions.BulkheadException`
    is thrown. If a bulkhead-related exception is thrown in the method shown in Listing
    [8-9](#531256_1_En_8_Chapter.xhtml#PC9), the method invocation will be retried
    because of the `@Retry` annotation. Since the method did not declare a fallback,
    if the retry cycle completes and the method still throws an exception, that exception
    will be directly thrown to the client.


    ## Configuring Fault Tolerance with Config


    The Eclipse MicroProfile Fault Tolerance specification integrates with other specifications
    from the project. As such, the six fault-tolerant annotations discussed earlier
    can be configured through the use of the Config specification. Fault-tolerant
    annotation parameters can be overridden individually or globally.


    ### Individual Overrides


    You can override individual fault tolerance annotations through config properties
    using the Config API. The property format is `<classname>/<methodname>/<annotation>/<parameter>`,
    where the class name refers to the fully qualified class name, `methodName` being
    the method bearing the fault-tolerant annotation, and `annotation` being the interceptor
    whose parameter you wish to set or override.


    For example, the `@Retry` annotation shown in Listing [8-9](#531256_1_En_8_Chapter.xhtml#PC9)
    can be configured using config properties in, for instance, the `microprofile-config.properties`
    as `com.example.jwallet.rate.rate.control.RateService/convertCurrencyAsync/Retry/maxRetries=5`.
    This will set the `maxRetries` of the `@Retry` annotation on the `convertCurrencyAsync`
    method in `RateService` to 5.


    Setting fault-tolerant parameters through the Config mechanism overrides the same
    parameter if passed in the method. Also, because of the ordinal algorithm for
    setting the precedence of config sources, you can define different fault-tolerant
    parameters for the same method in different config sources for different environments.


    ### Global Parameter Overrides


    You can also set global fault-tolerant properties that will apply to all fault-tolerant
    interceptors in a given class or the entire application. For class-level overrides,
    the property format is `<classname>/<annotation>/<parameter>`, the difference
    with the individual level override being that the method name is omitted for the
    class-level override. For instance, to set the `maxRetries` for all `@Retry` annotations
    in `RateService` to 8, we can pass the property `com.example.jwallet.rate.rate.control.RateService/Retry/maxRetries=8`.


    Fault-tolerant parameters can also be overridden at the application level. The
    property format for that is `<annotation>/<parameter>`. Still on `@Retry`, to
    set the default application-level `maxRetries` to 10, we can set the property
    `Retry/maxRetries=10`. This will apply the `maxRetries=10` to all `@Retry` annotations
    in the application.


    Configurations closest to a component win in terms of precedence. Thus, individual
    fault-tolerant configurations take precedence over class-level ones, which, in
    turn, take precedence over application-level ones. This way, you can define sophisticated
    parameters for the fault-tolerant interceptors for different stages of the application.


    ## Summary


    This chapter discussed the Eclipse MicroProfile Fault Tolerance specification.
    Using annotations, we saw how you can make methods more resilient and fault tolerant
    using fallback, timeout, retry, circuit breaker, asynchronous, and bulkhead patterns.
    The chapter also discussed how you can configure the fault-tolerant annotations
    using the Eclipse MicroProfile Config API.


    # 9. Keeping Count with Metrics


    Deployed, user-facing applications need to be monitored to ensure they are delivering
    as expected. Cloud-native applications deployed to complex cloud hosting environments
    need to be monitored even more because any unexpected deviation from preset expectations
    could mean significant extra hosting bills.


    The way to monitor deployed, running applications is through the use of application
    metrics. Metrics such as how many times a method has been called and how many
    seconds a given method takes to return are all different kinds of metrics that
    can give insights into how an application is performing.


    The Eclipse MicroProfile Metrics API provides a set of API constructs for exposing
    different types and kinds of application metrics. With this API, you can expose
    application, implementation runtime, and JVM metrics through annotations and a
    Java API in the OpenMetrics^([^(113)](#fn113)) format, consumable by monitoring
    applications like Prometheus.


    This chapter covers the Metrics specification within a Jakarta EE context. By
    the end of the chapter, you will be able to use the Metrics API to expose different
    kinds of metrics in your cloud-native Jakarta EE application.


    ## The Structure


    The Eclipse MicroProfile Metrics specification is mostly a metadata-driven API
    for exposing metrics in an application. The scope and type of metrics you can
    expose depend on the application requirements. All the metrics exposed through
    the use of this API are hosted automatically under the context path `/metrics`.


    For local development, this will mostly be `http://localhost:8080/metrics`, and
    for an application deployed to `foo.com`, the metrics will be hosted at `https://foo.com/metrics`.
    The specification defines three scopes or categories of metrics. These are base-,
    application-, and vendor-specific metrics.


    ### Base Metrics


    The base metrics are metrics that all implementations are mandated to provide.
    These metrics expose information about the underlying JVM and operating system.
    Some of these base metrics are available processors, used, maximum, and committed
    heap memory, among others. There are some metrics under base metrics that could
    be optional as they could pertain to specific JVM or operating system release.
    These metrics are hosted at the path `/metrics/base`.


    ### Application Metrics


    Application metrics are the set of custom metrics that you would like to collect
    about your application. You can use either annotations or the Java API to expose
    these metrics. Examples of such metrics are how long it takes for a given method
    to execute. These metrics are accessible at `/metrics/application`.


    ### Vendor Metrics


    Vendor metrics are custom metrics that a compatible implementation of the Eclipse
    MicroProfile specification optionally provides on top of the mandatory base metrics.
    The vendor metrics are hosted at `/metrics/vendor`.'
