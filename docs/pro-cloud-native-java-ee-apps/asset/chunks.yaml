    # 12. Testing with TestContainers


    Testing is an important aspect of application development. Whether it''s a monolith
    of microservices applications being developed, testing must and should form a
    core part of the entire application development cycle. Even though testing is
    universally acknowledged as important, there is no one "right" way of doing it.
    The kind, type, and mode of testing chosen are mostly application and domain dependent.


    A lot of the time, the application development platform will determine the testing
    options available to the application developers. On the Jakarta EE platform, which
    has the Java SE as its base, there is a vast array of testing options available.
    Picking the most optimal combination of the available testing options will mostly
    boil down to the application domain. This chapter will explore testing Jakarta
    EE applications using the venerable JUnit and TestContainers libraries.


    The chapter starts off by exploring some basic testing theories, then takes a
    look at unit-testing Jakarta EE components, and then finally shows writing integration
    tests with TestContainers.^([^(117)](#fn117)) By the end of the chapter, you will
    have a good understanding of how to craft and write tests for your enterprise
    application.


    ## The Theory of Application Testing


    Testing can be defined as the process of establishing the general correctness
    and reliability of an application through a combination of different test types.
    The term "general" is important because testing does not guarantee that an application
    has no defects. It only surfaces possible defects in the application. There are
    two broad categories of tests, namely, manual and automated tests. Then there
    are different types of tests that can be run under each of these categories. Some
    test types transcend both categories. The following is a list of the general types
    of application tests.


    ### Types of Tests


    #### Unit Tests


    A unit test is an automated test that tests a single component in isolation to
    verify if the component is working as expected. Unit tests are the most atomic
    tests in any test suite. Depending on the particular component being unit-tested,
    its dependencies might be mocked in order to be able to unit-test just that component
    in isolation. Unit tests are generally very fast to run because of their isolated
    nature.


    #### Integration Tests


    An integration test is a test for asserting that different components of the application
    that together carry out a specific function work correctly. Integration tests
    span more than one component or microservice. For example, an integration test
    to assert the successful creation of a wallet can first assert the creation of
    a user before asserting for the creation of a wallet. In this case, an actual
    call will be made to both modules. Integration tests tend to be much more time
    consuming to run because they can span several components and most likely include
    several network calls. Integration tests are also automated.


    #### Functional Tests


    A functional test focuses on the business aspect of an application. Functional
    tests will normally verify the results of the operation under test. There is a
    slim difference between functional and integration tests because both tests will
    cause different components of the application to be invoked. In some organizations,
    functional and integration tests are one and the same. However, technically, functional
    tests assert the output of an operation to verify that it equals a preset, expected
    value. Integration tests, however, generally check if the components are working.
    Functional tests can be manual or automated.


    #### Performance Tests


    A performance test checks how the application behaves when subjected to different
    workloads. Performance tests can help unearth bottlenecks because they measure
    things like the speed of the application, the reliability of a site, and how scalable
    a component is, among others. This kind of test can help optimize applications
    based on the data gathered from the tests. Performance tests are automated.


    #### Smoke Tests


    A smoke test is mostly a manual test that checks if the basic functionality of
    an application is working as expected. Smoke tests generally follow a new build
    or release of the application and precede other types of checks.


    #### Other Tests


    There are other tests like end-to-end and acceptance testing that are different
    variations of integration and functional tests. In the end, every organization
    will have a mix of different test types and modes based on the domain. The test
    types enumerated earlier are in no way an exhaustive list of all the test types
    out there. But these are the most common that cut across all types of organizations.


    ### Principles of Testing


    As important as software application testing is, there is no universal criteria
    for determining what comprises good testing practices. The plethora of programming
    languages and application development frameworks out there mean testing is a highly
    heterogeneous activity that differs from one platform to the other and from one
    application to the other. The American Software Testing Qualifications Board (ASTQB)
    has identified seven principles^([^(118)](#fn118)) that can help guide the creation
    of an effective testing regime. These principles are as follows.'
  raw: '## MicroProfile JWT and the SecurityContext


    The jakarta.ws.rs.core.SecurityContext interface is a Jakarta REST artifact that
    can be injected into resource artifacts through the @Context annotation. It has
    methods for getting the Principal, checking if the currently logged in user is
    in a given role, if the request was made through an HTTPS connection and the authentication
    scheme. In a MicroProfile JWT application, the isUserInRole method will map the
    role set to the passed groups of the claims in the token. The getPrincipal method
    will also return a Principal, which is also an instance of JsonWebToken. Effectively,
    the MicroProfile JWT propagates all the information passed through the token to
    all parts of the application and existing security infrastructure within Jakarta
    EE. Listing [11-12](#531256_1_En_11_Chapter.xhtml#PC12) shows injecting the SecurityContext
    into the Wallet Resource .


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @RolesAllowed("teller")

    public class WalletResource {

    @Context

    SecurityContext securityContext;

    }

    Listing 11-12

    Injecting SecurityContext

    ```


    ## Summary


    This chapter covered the use of the MicroProfile JWT API for securing Jakarta
    EE REST resources. Given the complex nature of application security, this chapter
    followed best practices by offloading the handling of user credentials to an external
    service, in this case Keycloak. You learned how to activate the MicroProfile JWT
    in an application with the @LoginConfig annotation, then how individual resources
    can be secured either at the class or resource method level through the use of
    @RolesAllowed.


    You also learned about how to access claims in a token through the JsonWebToken
    interface. You also learned that JWT claims are automatically propagated and available
    in existing Jakarta EE security infrastructure like the Principal and SecurityContext
    interfaces. We would like to reiterate again that security is a very complex and
    fast-changing domain, with new exploit breaches every day. As such, a hybrid security
    approach as discussed in this chapter, where the more complicated aspect like
    user credential handling is delegated to a specialist application like Keycloak,
    leaving our application to only consume the token generated is one way to mitigate
    security risks.


