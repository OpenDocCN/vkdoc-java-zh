    ## 本章小结


    本章讨论了用于 Jakarta EE 平台的 Eclipse MicroProfile 指标规范。我们研究了指标作用域、数据格式，以及如何通过注解、CDI
    注入或手动实例化来使用指标。在整个过程中，你学习了如何从支持 MicroProfile 的应用程序提供的 `/metrics` 端点检索指标信息。


