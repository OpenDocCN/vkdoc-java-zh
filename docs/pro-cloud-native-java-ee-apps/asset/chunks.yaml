    # 12. 使用 TestContainers 进行测试


    测试是应用开发的重要方面。无论是开发单体应用还是微服务应用，测试都必须且应该成为整个应用开发周期的核心部分。尽管测试被普遍认为很重要，但并没有一种“正确”的测试方法。所选择的测试种类、类型和模式大多取决于应用和领域。


    很多时候，应用开发平台会决定应用开发者可用的测试选项。在以 Java SE 为基础的 Jakarta EE 平台上，有大量可用的测试选项。选择可用测试选项的最优组合，通常取决于应用领域。本章将探讨如何使用久经考验的
    JUnit 和 TestContainers 库来测试 Jakarta EE 应用。


    本章首先探讨一些基本的测试理论，然后介绍如何对 Jakarta EE 组件进行单元测试，最后展示如何使用 TestContainers 编写集成测试。^(¹¹⁷)
    到本章结束时，您将很好地理解如何为您的企业应用设计和编写测试。


    ## 应用测试理论


    测试可以定义为通过结合不同类型的测试来确立应用的整体正确性和可靠性的过程。“整体”一词很重要，因为测试并不能保证应用没有缺陷。它只能揭示应用中可能存在的缺陷。测试大致分为两类：手动测试和自动化测试。在这两类测试下，可以运行不同类型的测试。有些测试类型跨越了这两个类别。以下是应用测试的一般类型列表。


    ### 测试类型


    #### 单元测试


    单元测试是一种自动化测试，它单独测试单个组件，以验证该组件是否按预期工作。单元测试是任何测试套件中最原子的测试。根据被测试的特定组件，其依赖项可能会被模拟，以便能够单独对该组件进行单元测试。单元测试通常运行速度非常快，因为它们具有隔离性。


    #### 集成测试


    集成测试用于断言应用中共同执行特定功能的不同组件是否正常工作。集成测试跨越多个组件或微服务。例如，一个用于断言成功创建钱包的集成测试，可以先断言用户的创建，然后再断言钱包的创建。在这种情况下，将实际调用这两个模块。集成测试运行起来往往更耗时，因为它们可能跨越多个组件，并且很可能包含多次网络调用。集成测试也是自动化的。


    #### 功能测试


    功能测试侧重于应用的业务方面。功能测试通常会验证被测操作的结果。功能测试和集成测试之间差别很小，因为这两种测试都会导致调用应用的不同组件。在某些组织中，功能测试和集成测试是同一回事。然而，从技术上讲，功能测试断言操作的输出，以验证其是否等于预设的期望值。而集成测试通常检查组件是否正常工作。功能测试可以是手动的，也可以是自动化的。


    #### 性能测试


    性能测试检查应用在不同工作负载下的表现。性能测试有助于发现瓶颈，因为它们会衡量应用的速度、站点的可靠性以及组件的可扩展性等指标。这类测试有助于根据收集到的测试数据优化应用。性能测试是自动化的。


    #### 冒烟测试


    冒烟测试主要是一种手动测试，用于检查应用的基本功能是否按预期工作。冒烟测试通常在新构建或发布应用之后进行，并先于其他类型的检查。


    #### 其他测试


    还有其他测试，如端到端测试和验收测试，它们是集成测试和功能测试的不同变体。最终，每个组织都会根据其领域混合使用不同的测试类型和模式。前面列举的测试类型绝非所有现有测试类型的详尽列表。但这些是跨所有类型组织中最常见的测试类型。


    ### 测试原则


    尽管软件应用测试非常重要，但并没有一个通用的标准来确定什么是良好的测试实践。现有的众多编程语言和应用开发框架意味着测试是一种高度异质化的活动，因平台和应用而异。美国软件测试资格委员会（ASTQB）确定了七项原则^(¹¹⁸)，可以帮助指导创建有效的测试体系。这些原则如下。

    '
- fmt: '#### Testing Shows the Presence of Defects, Not Their Absence


    Tests can help surface bugs in an application. However, tests cannot guarantee
    that an application is bug-free. All the tests in a test suite passing does not
    mean there are no defects that can be unearthed. This notwithstanding, having
    extensive tests can give reasonable assurance that the application will not fail
    under conditions that have been tested.


    #### Exhaustive Testing Is Impossible


    Enterprise applications are very large and complicated. It is not possible to
    have tests that cover every possible permutation of an application. Attempting
    any such activity will prove expensive. An analysis of different core features
    should be made and test efforts focused on critical areas.


    #### Early Testing Saves Time and Money


    A quick smoke test of a new application release can help identify showstopper
    bugs that could have required the running of the entire test suite to unearth.
    This also applies to implementing test-driven development as much as possible.


    #### Defects Cluster


    A small number of components in an application will be responsible for the majority
    of bugs. Testing should then focus on these components that are responsible for
    the majority of the bugs. This is essentially applying the Pareto principle to
    testing application components.


    #### Beware of the Pesticide Principle


    The same set of tests repeated over a long period of time may end up not catching
    new defects. This principle is a simile to the ineffectiveness of pesticide applied
    to the same area over a long period in killing insects. Tests will need to be
    updated and refactored with new input data and permutations to keep them effective
    at identifying application defects.


    #### Testing Is Contextual


    Testing is a highly context-dependent activity. The tests applied to a business
    application will differ from the tests applied to an aerospace computer control
    application. This is important to keep in mind when taking inspiration for creating
    testing systems.


    #### Absence of Errors Is a Fallacy


    As elucidated in the first principle, tests do not guarantee the absence of errors.
    As such, it is a mistaken notion to assume an application is free of defects if
    tests do not unearth any. Also, identifying and fixing defects does not guarantee
    the system cannot fail.


    ## Testing in Jakarta EE


    `Jakarta EE` as an application development platform does not have a testing specification
    or API of its own. However, as it is built on `Java SE`, the gamut of testing
    libraries and frameworks available on `Java SE` can be used to test `Jakarta EE`
    applications. However, testing a `Jakarta EE` application presents some challenges.


    A modern `Jakarta EE` application, like the one discussed so far in this book,
    makes heavy use of the `Jakarta Contexts and Dependency Injection` API. Almost
    all components are managed by one runtime or the other. For instance, a `CDI`
    bean might declare a dependency on another bean that in turn has a dependency
    on a `JPA`-managed artifact like the `EntityManager`.


    ### Unit-Testing Jakarta EE Components


    Unit-testing `Jakarta EE` components can be achieved with a little bit of refactoring
    of the component under test. A component under test that uses field injection
    can be refactored to use constructor injection for its dependencies. This way,
    the component under test can have its dependencies passed to it by `CDI` during
    application runtime and manually instantiated during testing through its constructor,
    passing in mocked instances of its dependencies.


    #### JUnit


    `JUnit` is a Java testing library for making assertions on test artifacts. It
    has a number of callbacks for setting up and tearing down test data. It also has
    an extension API that other testing libraries have built on top of to extend testing
    for different purposes. `JUnit` is arguably the most popular testing library in
    enterprise Java.


    #### Mockito


    `Mockito` is a Java library for creating mocked objects in unit tests. A component
    under test that has dependencies on other components will have those dependencies
    mocked. Mocking allows predictable values on the mocked objects to be returned
    and later asserted.


    To test the `WalletService` CDI bean of `jwallet`, we first refactor it to use
    constructor injection for its two `CDI`-managed application components. This way,
    in a unit test, the `WalletService` can easily pass mocked objects. Listing [12-1](#531256_1_En_12_Chapter.xhtml#PC1)
    shows the refactored `WalletService`.


    ```

    @Action

    @NoArgsConstructor

    public class WalletService {

    WalletRepository walletRepository;

    TransactionRepository transactionRepository;

    RateService rateService;

    @Inject

    public WalletService(WalletRepository wallet,

    TransactionRepository txn,

    RateService rate) {

    this.walletRepository = wallet;

    this.transactionRepository = txn;

    this.rateService = rate;

    }

    }

    Listing 12-1

    Refactored WalletService

    ```


    The `WalletService` has a dependency on the `WalletRepository`, `TransactionRepository`,
    and `RateService`. It has been refactored out to use constructor injection, with
    a single constructor annotated `@Inject`, passing in the three dependencies and
    initializing the class field with those. With this simple refactor, the `WalletService`
    is now ready to be unit-tested. Listing [12-2](#531256_1_En_12_Chapter.xhtml#PC2)
    shows the `WalletService` unit test class, `WalletServiceTest`.


    ```

    @ExtendWith(MockitoExtension.class)

    public class WalletServiceTest {

    @Mock

    WalletRepository walletRepository;

    WalletService walletService;

    static String walletCurrency;

    static BigDecimal balance;

    @BeforeAll

    public static void initAll() {

    walletCurrency = "GHS";

    balance = new BigDecimal("50");

    }

    @BeforeEach

    void init() {

    walletService = new WalletService(walletRepository, null, null);

    when(walletRepository.findById(anyLong())).thenAnswer(i -> {

    Wallet wallet = new Wallet();

    wallet.setId(i.getArgument(0));

    wallet.setCurrency(walletCurrency);

    wallet.setBalance(balance);

    return wallet;

    });

    }

    @Test

    void shouldFindWallet() {

    BalanceResponse response = walletService.getBalance(1L);

    assertNotNull(response);

    assertEquals(1L, response.getData().getWalletId());

    assertEquals(balance, response.getData().getBalance());

    assertEquals(walletCurrency, response.getData().getCurrency());

    }

    }

    Listing 12-2

    WalletServiceTest

    ```


    The class is annotated by `@ExtendWith` and passed the `MockitoExtension.class`.
    This registers the `MockitoExtension` with the `JUnit` runtime. The `@Mock` annotation
    is used to mock the `WalletRepository`. The `@BeforeAll` callback method sets
    up some expected data that the component under test, in this case the `WalletService`
    method to be tested, should return. The `WalletService` object is instantiated,
    passing in the mocked `WalletRepository` and `null` for the other two parameters.
    We could equally have mocked the two other parameters of the `WalletService` constructor.


    The static `Mockito` `when` method is called to mock a call to the `WalletRepository.findById`
    method. The mock simply captures the passed ID and constructs a `Wallet` with
    it. We now have everything in place to unit-test the `getBalance` method of the
    `WalletService`.


    The `shouldFindWallet` test method calls the `getBalance` method on the `WalletService`
    and proceeds to use the `JUnit` assertion methods to assert the expected data.
    This is generally how you craft unit tests in `Jakarta EE` for application components.
    Note that nothing significantly different was needed apart from the small refactoring
    of the component under test to use constructor injection to initialize dependent
    fields.


    This kind of test is incredibly fast and can be run multiple times on the `CI/CD`
    pipeline. It is important to note that the `WalletServiceTest` is tested as a
    `POJO` that has nothing to do with `Jakarta EE`. Its method is tested and asserted
    to be acting as expected. As much as possible, you should unit-test core components
    of your application.'
