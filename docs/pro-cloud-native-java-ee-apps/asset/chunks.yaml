  trans: '

    #### 关于 IDE 的说明


    本书中用于截图和编写参考代码的 IDE 是 IntelliJ IDE。不过，你无需使用相同的 IDE。任何支持 Apache Maven 的 Java IDE
    都应该足够。


    `grafana`、`jaeger` 和 `prometheus` 文件夹包含了 Grafana、Prometheus 和 Jaeger 项目的配置文件。Grafana
    ^(⁶⁴) 和 Prometheus ^(⁶⁵) 是开源项目，用于抓取、整理和展示应用程序通过 Eclipse MicroProfile 指标暴露的度量数据；而
    Jaeger^(⁶⁶) 是一个实现了开放追踪^(⁶⁷)规范的项目。


    `account` 模块包含负责处理用户账户的账户微服务。`core` 模块包含所有其他服务通用的类和接口。`rate` 模块包含汇率微服务。该服务负责对外部货币汇率服务进行调用，以便在应用程序中的不同货币之间进行转换。最后，`wallet`
    模块是交易发生的核心位置。它负责创建钱包以及借记和贷记交易，同时也负责实现钱包、交易和余额的查询功能。


    该应用程序由根文件夹中的一个单一的项目对象模型 XML 文件（`pom.xml`^(⁶⁸)）进行管理。这个 POM 文件声明了基础依赖项和模块。该应用程序的主要依赖项是
    Jakarta EE 和 Eclipse MicroProfile 依赖项。


    清单 3-1 展示了 Jakarta EE 完整平台依赖项的声明。第 5 行将依赖项的作用域设置为 `provided`。这意味着我们的应用程序不会在生成的制品中包含任何
    Jakarta EE 的 jar 文件。完整的平台实现应由运行应用程序的底层兼容实现来提供。我们的应用程序仅声明其对平台的依赖，而将各种 Jakarta EE
    API 的实际实现交由服务器提供。Maven 会将其添加到用于编译和测试的类路径中，但不会添加到运行时类路径。


    ```

    jakarta.platform

    jakarta.jakartaee-api

    9.1.0

    provided


    清单 3-1

    Jakarta EE 依赖项

    ```


    清单 3-2 展示了 Eclipse MicroProfile 依赖项的声明。与 Jakarta EE 依赖项类似，EMP 依赖项的作用域也设置为 `provided`，这同样意味着应用程序期望底层兼容的运行时实现来提供
    EMP 实现。


    这种应用程序与平台依赖项的分离，是 Jakarta EE 平台非常适合开发现代应用程序的关键原因之一。这种分离使得部署制品最小化。在持续开发、测试和部署^(⁶⁹)成为标准的云原生环境中，部署制品越小，周转速度就越快，成本也越低。


    ```

    org.eclipse.microprofile

    microprofile

    5.0

    pom

    provided


    清单 3-2

    MicroProfile 5 依赖项

    ```


    清单 3-3 展示了构成应用程序的各个 Maven 模块的声明。从 Maven 的角度来看，你可以根据应用程序的需要拥有任意数量的模块。每个模块都可以是一个功能完整的应用程序，就像我们项目中的
    `rate`、`wallet` 和 `account` 模块一样。你也可以在模块之间创建依赖关系。同样，在 JWallet 中，其他三个模块都依赖于 `core`
    模块。


    ```

    core

    wallet

    rate

    account


    清单 3-3

    JWallet 模块

    ```


    清单 3-4 展示了用于应用程序测试的依赖项声明。每个应用程序都应该有自动化测试。因为我们只对用于测试的这些依赖项感兴趣，所以它们的作用域被限定在测试阶段。这意味着它们仅在测试编译和执行阶段可用。


    ```


    org.junit.jupiter

    junit-jupiter

    5.8.1

    test


    org.testcontainers

    testcontainers

