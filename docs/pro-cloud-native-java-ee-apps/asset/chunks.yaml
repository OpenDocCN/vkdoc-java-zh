- fmt: '### Testing


    Every application should have some form of testing, preferably a combination of
    unit, component, integration, and manual testing. Every Maven project has a default
    testing folder for creating tests. JWallet has separate tests for each microservice
    that test the various functionalities of the application. Because there is no
    universally accepted definition of how to write tests, all applications implement
    tests in different ways. Because the primary UI of JWallet is the REST endpoints,
    the integration tests consist of firing requests to those endpoints and making
    JUnit assertions on the responses.


    In the Java space, there are a myriad of testing frameworks and libraries that
    you can choose from. The combination of libraries chosen will mostly depend on
    the application being developed. As a Jakarta EE application, JWallet needs an
    implementation to run. Consequently, to run the tests, we need to have the application
    deployed even in a testing context. One library that makes managing the testing
    infrastructure for Jakarta applications easy is the TestContainers^([^(84)](#fn84))
    project. JWallet bundles the TestContainers library, making it easy to run the
    full, end-to-end integration tests using the Maven command `mvn verify -Dtc`.


    The entry point for the tests in the wallet microservice is the `AbstractWalletIT`
    as shown in Listing [3-34](#531256_1_En_3_Chapter.xhtml#PC34).


    ```

    public class AbstractWalletIT {

    protected static final String walletServiceUrl;

    protected static final WebTarget target;

    static {

    boolean testInContainer = System.getProperties().containsKey("tc");

    String walletServiceUrlTemplate = "http://%s:%d/wallet/api";

    if (testInContainer) {

    final DockerComposeContainer composeContainer = new DockerComposeContainer(new
    File("docker-compose.yaml"))

    .withExposedService("wallet", 3001);

    composeContainer.start();

    walletServiceUrl = String.format(walletServiceUrlTemplate,

    composeContainer.getServiceHost("wallet", 3001),

    composeContainer.getServicePort("wallet", 3001));

    } else {

    walletServiceUrl = String.format(walletServiceUrlTemplate, "localhost", 3001);

    }

    target = ClientBuilder.newClient().target(walletServiceUrl);

    }

    }

    Listing 3-34

    AbstractWalletIT class

    ```


    This does some initialization in a static block starting, checking if you passed
    in the `tc` property as part of running `mvn verify`. If you did, then a new instance
    of a `DockerComposeContainer` is created and started using the `docker-compose.yaml`
    file in the root of the wallet module as shown in Figure [3-10](#531256_1_En_3_Chapter.xhtml#Fig10).


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig10_HTML.jpg)


    A screenshot depicts the project structure Jwallet testing with docker composes
    yaml file is highlighted, which is selected in a wallet of src.


    Figure 3-10


    Docker-compose.yaml file in the project structure


    The created `DockerComposeContainer` instance is used to get the host and port
    of the deployed wallet microservice and then instantiate the `walletServiceUrl`
    variable. If no `tc` property is passed, then the `walletServiceUrl` is instantiated
    using `localhost`. Then a new `WebTarget` object is created using the JAX-RS `ClientBuilder`.
    With this setup in place, the test subclasses that extend the `AbstractWalletIT`
    can use this `target` object to fire REST calls to various resources in the wallet
    microservice.


    For example, the `HelloResourceIT` fires a call to the `HelloResource` endpoint
    and makes a simple assertion on the received response as shown in Listing [3-35](#531256_1_En_3_Chapter.xhtml#PC35).


    ```

    class HelloResourceIT extends AbstractWalletIT {

    @Test

    void hello() {

    String response = target.path("hello").request().get(String.class);

    assertEquals("Hello wallet module", response);

    }

    }

    Listing 3-35

    HelloResourceIT class

    ```


    Line 4 makes a GET call to our `HelloResource` and reads the `String` Java type
    from the response, because we know our `HelloResource` method returns a string.
    Line 5 then uses the `assertEquals` method from the JUnit assertions API to test
    if the received response is equal to what we expect.


    The `WalletResourceIT` also extends the `AbstractWalletIT` as shown in Listing
    [3-36](#531256_1_En_3_Chapter.xhtml#PC36). Line 3 declares a `createWallet` JUnit
    test (line 2 using the `@Test` annotation). Similar to the hello test discussed
    earlier, the `createWallet` test constructs a `CreateWalletRequest` object and
    makes a POST request, passing in the created object to the `Entity.json` method
    to convert it to JSON to be sent to the resource method. The second parameter
    to the `.post` method (line 9) is the class type of the expected return type from
    the resource. Because our `createWallet` resource method returns a `BalanceResponse`,
    we pass in `BalanceResponse.class`. We then assigned the returned value to a variable
    of type `BalanceResponse` and then proceeded to make some assertions on it.


    ```

    class WalletResourceIT extends AbstractWalletIT {

    @Test

    void createWallet() {

    CreateWalletRequest createWalletRequest = new CreateWalletRequest();

    createWalletRequest.setCurrency("USD");

    BalanceResponse balanceResponse = target.path("wallets").request()

    .post(Entity.json(createWalletRequest), BalanceResponse.class);

    assertEquals("0", balanceResponse.getResponse().getResponseCode());

    assertEquals("OK", balanceResponse.getResponse().getResponseMessage());

    assertEquals(createWalletRequest.getCurrency(), balanceResponse.getData().getCurrency());

    assertEquals(BigDecimal.ZERO, balanceResponse.getData().getBalance());

    assertNotNull(balanceResponse.getData().getWalletId());

    }

    // More tests

    }

    Listing 3-36

    WalletResourceIT class

    ```


    In Chapter [6](#531256_1_En_6_Chapter.xhtml), you will see in much more detail
    how the JAX-RS client API can be used to make REST calls to other resource methods
    both within and outside of JWallet.'
