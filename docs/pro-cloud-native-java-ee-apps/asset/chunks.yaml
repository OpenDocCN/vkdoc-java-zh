    # 2. Enterprise Java, Microservices, and the Cloud


    Software application development has changed significantly over the years. The
    entire process of writing, testing, shipping, and deploying code has seen rapid
    changes, culminating in the current cloud-native era of software engineering.
    The Java Platform has also over the years evolved into a capable platform for
    modern application development.


    This chapter introduces you to cloud-native application development by looking
    at the history of Jakarta EE application deployment, some factors that accelerated
    the rise in cloud adoption, an introduction to cloud-native software development
    through the 12-factor app, and finally a look at Jakarta EE within a cloud-native
    software application development world.


    ## The Birth of Java 2 Enterprise Edition (J2EE)


    The Java Programming Language, originally named Oak, was publicly released in
    May 1995 by then Sun Microsystems. The promise of "Write Once, Run Anywhere" immediately
    appealed to developers, coupled with the then Netscape announcing support for
    this new language in its browser of the same name gave the language the push it
    needed to start its journey to application development dominance. At that time,
    web browsers had started making the Internet accessible to more people, and companies
    had started looking for ways to offer more interactivity to users of their websites.


    Java, the programming language, was originally developed for creating applications
    for household devices like handheld entertainment controllers. However, that didn''t
    go quite well to expectations, and with built-in support by the then Netscape
    browser, the language gradually pivoted toward being a client-side development
    language with the applets and JavaBeans constructs. As time went on, the database
    connectivity API, Java Database Connectivity (JDBC), was added to address the
    need for data access in applications.


    Ease of use, being web enabled, and automatic garbage collection were some critical
    factors that pushed the Java adoption momentum across companies. Realizing that
    the language could be used on the server for server-side application development,
    Sun decided to capitalize on this and the other nascent, emerging application
    server market by introducing the Servlet specification. The idea of the Servlet
    specification was to have a Java application on the server, where clients could
    make calls to and, in return, receive processed data. This data could be HTML
    or anything else the browser could handle.


    Along the line, IBM^([^(51)](#fn51)) released the Enterprise JavaBeans specification
    as an independent project to simplify Java server–side development with the automatic
    provision of general-purpose services that are common to most enterprise applications
    like security, transactions, scalability, and remote invocation capabilities.
    The EJB specification also provided support for the remote invocation of a business
    method through remote interfaces. With these disparate capabilities, Java became
    a great language for developing n-tier architecture applications, adopted by a
    lot of large enterprises.


    In 1999, Sun finally introduced a new, cohesive platform fully targeted at developing
    large-scale, distributed enterprise applications. This platform brought together
    all the disparate specifications that had been developed as part of transitioning
    Java to a server-side programming language into one "umbrella" specification.
    The EJB spec originally released by IBM was also included in this new platform
    as EJB 1.0. This new platform was called the Java 2 Platform, Enterprise Edition,
    or J2EE. The initial version was 1.2.


    Built on the Java Platform, J2EE was designed to run on application servers that
    implemented the specification. This meant you could theoretically write your application
    once and run it on any server that implemented the specification. The platform
    was also inspired by previous work in the distributed enterprise systems arena
    like the Common Object Request Broker Architecture (CORBA^([^(52)](#fn52))). To
    ensure that application servers adhered to the specification and could call themselves
    certified J2EE runtimes, Sun introduced a licensing scheme, part of which required
    application servers to pass a compatibility test suite (CTS).'
