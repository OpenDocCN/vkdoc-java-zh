- fmt: '### Entity Listeners


    Another way to attach callbacks to entities in JPA is through the use of entity
    listeners. An entity listener is a class that declares one or more callback methods.
    This class can then be registered with an entity, and every callback method in
    the listening class will be called when the listening event occurs for the entity.
    Listing [5-38](#531256_1_En_5_Chapter.xhtml#PC38) shows an entity listener with
    two callback methods.


    ```

    @ApplicationScoped

    public class AbstractEntityEntityListener {

    @PrePersist

    void init(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setCreated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setCreatedBy("Dummy User");

    }

    @PreUpdate

    void update(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setUpdated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setEditedBy("Dummy User");

    }

    }

    Listing 5-38

    shows an entity listener

    ```


    The `AbstractEntityListener` is an application-scoped CDI bean that declares two
    methods annotated `@PrePersist` and `@PreUpdate`, respectively. A callback method
    in an entity listener takes a single parameter of type `java.lang.Object`. This
    is because within the entity, the instance is known to be the instance of the
    declaring entity. But a listener is a separate class, and as such, there needs
    to be a way to pass the instance on which the event occurred to the method. This
    is why the method takes an `Object`.


    Within the method implementations, the passed `Object` type is cast to the `AbstractEntity`
    type, and some fields are set on it. An entity listener is also a CDI bean as
    shown by the `@ApplicationScoped` annotation. This means we can inject dependencies
    into it and then carry operations on the entity.


    Once an entity listener is declared as done in Listing [5-38](#531256_1_En_5_Chapter.xhtml#PC38),
    it has to be registered with an entity. Listing [5-39](#531256_1_En_5_Chapter.xhtml#PC39)
    shows the `AbstractEntityEntityListener` registered with the `Abstract` entity.


    ```

    @MappedSuperclass

    @EntityListeners({AbstractEntityEntityListener.class})

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    }

    Listing 5-39

    shows registering an entity listener

    ```


    Registering an entity listener on an entity is done through the `@EntityListeners`
    annotation. As shown in Listing [5-39](#531256_1_En_5_Chapter.xhtml#PC39), this
    annotation takes an array of entity listeners and calls them for each registered
    event. Since the `AbstractEntity` is just a mapped superclass, this declaration
    is equivalent to registering the entity listener with each child of the `AbstractEntity`.


    ## Querying Data


    There are two primary ways of querying for data in JPA, namely, the Jakarta Persistence
    Query Language (JPQL) and the Criteria API. In between these two are a number
    of overridden `find` methods on the `EntityManager` that can be used to directly
    find an entity based on its primary key.


    ### Finding by Primary Key


    The `EntityManager` has the `find` method for finding an entity by primary key.
    This is the simplest way of loading an entity instance if the primary key is known.
    Listing [5-40](#531256_1_En_5_Chapter.xhtml#PC40) shows the `BaseRepository`’s
    implementation of finding an entity by its ID in the `find` method.


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E findById(K id) {

    return em.find(clazz, id);

    }

    }

    Listing 5-40

    BaseRepository’s find method

    ```


    The `find` method returns the entity instance if found or `null`. You should keep
    this in mind when using the `find` method to load an entity. You should null-check
    the returned value.


    ### Jakarta Persistence Query Language (JPQL)


    The Jakarta Persistence Query Language, otherwise known as JPQL, is a string-based,
    SQL lookalike language for querying entities. JPQL is very similar to SQL, except
    instead of querying across database tables and rows, you query across your persistent
    entities and objects. The JPA runtime takes care of translating the JPQL to the
    requisite SQL dialect of the underlying database.


    JPQL is not a SQL alternative. It is a query language you can use in addition
    to SQL. It’s important to not get bogged down by dogma about which is better.
    JPQL is well suited to Java developers. Knowing JPQL does not negate the need
    to know SQL. Both languages complement each other and help you write very sophisticated
    applications.


    #### The Structure of JPQL


    A typical JPQL query is made up of at least a `select` and `from` clause, with
    an optional `where` and `order by` clauses. Listing [5-41](#531256_1_En_5_Chapter.xhtml#PC41)
    shows the simplest JPQL for querying a `User` entity.


    ```

    select u from User  u

    Listing 5-41

    Simplest JPQL

    ```


    The first difference between this query and its SQL counterpart is that the JPQL
    is querying an entity, and not a database table. The `User` in the query refers
    to the `User` entity. This name is the unqualified class name of the `User` entity.
    This name can be customized by passing a `name` parameter to the `@Entity` annotation,
    though this is rare in practice. The entity is then aliased to the `u` variable.
    The variable `u` is arbitrary. It could equally have been `foo` or `bazz`. In
    JPQL, an alias variable is mandatory, while it’s optional in SQL. The `u` alias
    variable can then be used in the rest of the query to reference each entity instance
    in the database row.


    The query also makes a `select` clause for the `User` entity. This means the full
    user entity instance will be returned for each row of the `User` table. In SQL,
    you would enumerate the columns of the table you want to query. The runtime takes
    care of translating this query to the most optimal SQL dialect of the underlying
    database.


    ##### Selecting with Select


    The JPQL `select` clause can take more than an entity. It can take path expressions
    as well. The final returned type is dependent upon the type passed to the `select`
    clause. In the query shown in Listing [5-41](#531256_1_En_5_Chapter.xhtml#PC41),
    the returned type of the query will be a list of `User` instances. It is possible
    to also traverse an entity to one of its properties or even to a different entity.
    Listing [5-42](#531256_1_En_5_Chapter.xhtml#PC42) shows traversing the `User`
    entity to its `UserCredentials` entity.


    ```

    select u.userCredentials from User  u

    Listing 5-42

    shows path property traversal

    ```


    The path traversal to the `UserCredentials` field of the `User` entity will cause
    the result list returned from the query to be of type `UserCredentials`, even
    though the query started from the `User` table. It is possible to also traverse
    simple fields of the entity. Listing [5-43](#531256_1_En_5_Chapter.xhtml#PC43)
    shows traversing simple properties.


    ```

    select u.lastName, u.lastName, u.userCredentials.email from User  u

    Listing 5-43

    shows traversing simple properties

    ```


    This query traverses to simple types in the `User` and `UserCredentials` entities.
    The returned type of this query will be zero, or more instances of object arrays
    will be returned. This is because for such expressions, the final property could
    be any type, and as such, the runtime returns everything as an array of objects.


    At its core, this is very much how the JPQL `select` clause works. You can select
    an entity or traverse to a property in that entity or even the property of an
    entity in the primary entity. The return type of the result will depend on what
    the type or types passed to the `select` clause resolve to. If it resolves to
    a single type, the returned result will be of that type. If it resolves to more
    than one type, then you get an array of objects.'
