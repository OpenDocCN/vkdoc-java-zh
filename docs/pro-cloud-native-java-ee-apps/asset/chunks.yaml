- fmt: '### Event Metadata


    There may be times when you need to have some metadata regarding a fired event.
    In such cases, you can use the `EventMetadata` bean for that. Observer methods
    can take more than one parameter. Those we have seen so far have all taken single
    parameters in the form of the event payload. However, you can pass more than one
    parameter to the observer method, with each parameter being an injection point
    that will be automatically resolved by the container. Let us pass an `EventMetadata`
    bean to the `sendUserSms` observer method in the `MessageCenter` bean in Listing
    [4-51](#531256_1_En_4_Chapter.xhtml#PC51).


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS) @MessageOption(MessageOption.MessageType.SMS)
    UserResponse userResponse, EventMetadata eventMetadata) {

    //TODO --> Send SMS through gateway... Blocking task

    }

    }

    Listing 4-51

    shows the passing of a second parameter to an observer method

    ```


    Listing [4-51](#531256_1_En_4_Chapter.xhtml#PC51) shows the injection of the `EventMetadata`
    bean as the second parameter to the `sendUserSms` synchronous observer method.
    `EventMetadata` is an interface that will be given an implementation by the CDI
    runtime. It contains methods to get the qualifiers for the fired event, the `InjectionPoint`
    bean for the injection point, and the `Type` for the class of the event object.
    Injecting this metadata gives you information you can further use to make decisions
    dynamically in your observer methods.


    ### Conditional Observer Methods


    CDI event observer methods can be conditional. You can decide if an observer method
    should always be called when the event it is observing gets fired, or if it should
    be called only if an instance of the bean declaring the observer method already
    exists. By default, a new instance of the bean containing an observer method will
    be created if none exists. However, you can turn this off and only have observers
    called if an instance of the bean declaring them is already available in the current
    scope. To conditionally have observer methods, you will first need to give an
    explicit scope to the bean declaring the observer methods. The `MessageCenter`
    bean (last shown in Listing [4-51](#531256_1_En_4_Chapter.xhtml#PC51)) that contains
    our messaging observers is `@Dependent` scope, because we have not explicitly
    associated it with a scope.


    To conditionally ask that the `sendUserSms` synchronous observer be called only
    if an instance of the `MessageCenter` bean exists, we can pass in a second parameter
    to the `@Observes` annotation as shown in Listing [4-52](#531256_1_En_4_Chapter.xhtml#PC52).


    ```

    @RequestScoped

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS, notifyObserver
    = Reception.IF_EXISTS) @MessageOption(MessageOption.MessageType.SMS)

    final UserResponse userResponse, final EventMetadata eventMetadata) {

    //TODO --> Send SMS through gateway... Blocking task

    }

    }

    Listing 4-52

    shows the sendUserSms set to conditional

    ```


    Listing [4-52](#531256_1_En_4_Chapter.xhtml#PC52) shows the `MessageCenter` bean,
    this time around with its scope set to `@RequestScope`. The `sendUserSms` observer
    passes the `notifyObserver` parameter value of `Reception.IF_EXISTS` to the `@Observes`
    annotation. With this construct, this observer will only be called for any fired
    synchronous `UserResponse` event if an instance of the `MessageCenter` bean exists
    within the current request scope. In the absence of an instance of the bean, the
    observer will not be called.


    The `notifyObserver` takes either of the two options – `Reception.IF_EXISTS` or
    `Reception.ALWAYS`. The default is `Reception.ALWAYS`. So by default, an observer
    method will always be called for the event it is observing unless explicitly turned
    off.


    ## Summary


    In this chapter, we covered the core of the Jakarta Contexts and Dependency Injection
    specification. We saw the features of the specification, how to activate it, and
    then took a whirlwind tour of the various constructs it makes available to you
    for application development. There is a lot more available in the specification^([^(99)](#fn99))
    on the Jakarta specs page. In the next chapter, we continue our discussion of
    Jakarta EE by looking at the Jakarta Persistence API.


