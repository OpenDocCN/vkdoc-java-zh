- fmt: '# 7. Managing Configurations


    Every application will go through different stages on its way to production. From
    development to testing to staging to production, all these stages will have different
    configurations just for those environments. For instance, an app that uses an
    external service like a fraud detection API will have different configurations
    for the service depending on the stage the application is being run in. Another
    application that needs to import data in a batch service, for instance, will also
    have different configurations for which data to import depending on which stage
    the application is in.


    Applications need to behave differently depending on some configuration values
    provided. It would be tedious if these configuration values were bundled with
    the application, which would mean having to repackage and deploy the application
    for each stage. It would be ideal to have a mechanism that gives you the developer
    a way to define different configuration values for different application stages
    without having to repackage and redeploy your application.


    This is what the Eclipse MicroProfile Config API is designed for. It is a specification
    that gives your application transparent access to different configuration sources
    without having to touch the application itself. So, for instance, in the fraud
    detection example cited earlier, you can have a dummy URL for the development
    stage, a test URL from the service provider for the testing and staging stages,
    and finally the live URL for the production stage.


    The Config specification allows you to define these configuration values in a
    hierarchical way such that the right value is returned automatically depending
    on the stage. This chapter is about the Eclipse MicroProfile Config specification.
    By the end of this chapter, you will learn how to incorporate the Config API into
    your application and use it to externalize dynamic application configuration values.


    ## What Is the Config Specification?


    The Eclipse MicroProfile Config specification defines a flexible system for managing
    application configuration. Based on the examples in the introduction section,
    an application will need to have at least three different configurations for the
    stated stages. The Config specification provides the constructs to realize this
    in a flexible and intuitive way. There are three core parts to the Config specification,
    namely, config sources, converters, and config values.


    ## Config Sources


    A config source is simply a source for configuration. If an application makes
    a request for a certain configuration value, for instance, `foo`, the Config runtime
    will need to load the value associated with property key `foo`. The place where
    the key-value pair for configurations is defined is the config source. The config
    source could be anything or anywhere: database, system properties, environment
    variables, etc. All these possible sources of configuration properties are abstracted
    into a `ConfigSource` by the Config runtime.


    Your application interacts with these config sources in a transparent way through
    the `ConfigSource` abstraction. This way, the application does not concern itself
    with the actual source of the configuration values. This results in the flexibility
    of having various combinations of config sources to satisfy even the most complex
    application requirements.


    Because you can have myriad config sources, there needs to be a way to sort or
    prioritize the sources. For instance, if property `foo=someValue` is defined in
    more than one config source, which config source should take precedence?


    For this, the specification provides the concept of ordinal. Each config source
    is assigned an ordinal value that determines its priority. Sources with higher
    ordinals have higher priorities over those with lower ordinals. So in the preceding
    example, if property `foo=someValue` is defined in config source A with an ordinal
    of 100 and `foo=thatValue` is defined in config source B with an ordinal of 300,
    a call to get the value of property `foo` will return the `thatValue` because
    its source has a higher ordinal. If multiple `ConfigSource`s happen to share the
    same ordinal, then they will be sorted by name.


    The Config specification defines three default config sources, along with their
    default ordinal values, as shown in Figure [7-1](#531256_1_En_7_Chapter.xhtml#Fig1).


    Figure [7-1](#531256_1_En_7_Chapter.xhtml#Fig1) shows the default config sources.


    ![](images/531256_1_En_7_Chapter/531256_1_En_7_Fig1_HTML.png)


    A flowchart depicts the config ordinals of the following: System properties; environment
    variables; and `META-INF/microprofile-config.properties`.


    Figure 7-1


    Config ordinals


    The first source is mapped to what you would get if you invoked `System.getProperties()`.
    The second source is what you get when you call the `System.getenv()` method.
    The third source, the `microprofile-config.properties` file, is normally bundled
    with the application. This is found in the `META-INF` folder under the resources
    folder.


    The Config runtime searches for config properties starting from the config source
    with the highest ordinal to the lowest. The first match in that search order wins.
    This way, you can define different values for the same property in different config
    sources. For example, defining the property `foo=someValue` in the `microprofile-config.properties`
    file shipped with the application, and the same property `foo=thatValue` as a
    system property, a call for the `foo` property at runtime will return `thatValue`.
    This is because it is defined in a source with a higher ordinal.'
