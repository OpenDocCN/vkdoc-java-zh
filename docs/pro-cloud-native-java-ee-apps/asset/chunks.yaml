  trans: '

    #### @SessionScoped


    会话作用域可以通过 `@SessionScoped` 注解与 Bean 关联。该作用域绑定到单个用户会话，并在同一 HTTP 请求中的所有 Servlet
    请求之间共享。会话作用域在任何 Servlet 的 `service` 方法、任何 Servlet 过滤器的 `doFilter()` 方法以及容器调用任何
    `ServletRequestListener`、`AsyncListener` 或 `HttpSessionListener` 时处于活动状态。当会话超时时，该作用域被销毁。但在会话被销毁之前，容器会确保该会话没有未调用的
    `HttpSessionListeners`。这确保了当仍有监听器附加到会话时，会话不会被销毁。清单 4-10 展示了在 jwallet 的 `UserSession`
    控制器中使用 `@SessionScoped` 注解。


    ```

    @SessionScoped

    public class UserSession implements Serializable {

    @Inject

    SecurityManager securityManager;

    }

    清单 4-10

    展示 @SessionScoped 的使用

    ```


    清单 4-10 展示了 `UserSession` 控制器。它声明了对 `SecurityManager` 的依赖。回想清单 4-8，`SecurityManager`
    是一个 `@ApplicationScoped` Bean。`UserSession` 是我们看到的第一个实现了 `Serializable` 接口的 Bean。为什么？因为
    Bean 上的 `@SessionScoped` 注解使 Bean 具备钝化能力。这意味着在运行时，当 CDI 容器确定存在空闲的会话作用域 Bean 实例时，它可以临时将这些
    Bean 实例的状态转移到辅助存储中。实际上，容器会钝化或保存空闲实例的状态。`Serializable` 接口正是为此标记 Bean。此外，会话作用域 Bean
    中的所有字段都应该是可序列化的或瞬态的。


    #### @ConversationScoped


    会话作用域是一种特殊的作用域，用于保存客户端和服务器之间的“会话”。它比请求作用域长，但比会话或应用程序作用域短。你可以通过一个跨多个页面的注册表单示例来理解会话。每个页面都是浏览器和服务器之间的一次会话，一旦你到达最后一页并点击提交按钮，会话就终止了。CDI
    提供了内置的 `Conversation`^(⁹⁴) Bean，用于管理会话作用域 Bean 中的会话状态。清单 4-11 展示了一个会话作用域的 `SignupManager`。


    ```

    @ConversationScoped

    public class SignupManager implements Serializable {

    @Inject

    Conversation conversation;

    public void beginSignup() {

    beginConversation();

    }

    public void submit() {

    endConversation();

    }

    private void beginConversation() {

    if (conversation.isTransient()) {

    conversation.begin();

    }

    }

    private void endConversation() {

    if (!conversation.isTransient()) {

    conversation.end();

    }

    }

    }

    清单 4-11

    展示 SignupManager 作为会话作用域 Bean

    ```


    清单 4-11 展示了我们的注册 Bean。它也实现了 `Serializable` 接口，因为与会话作用域 Bean 类似，它可能会被容器钝化。同样，会话作用域
    Bean 中的所有字段都应该是可钝化的或瞬态的。默认情况下，`@ConversationScoped` Bean 处于瞬态模式。也就是说，会话作用域 Bean
    的上下文实例很可能随时被容器销毁，因为它处于瞬态。你必须显式地将一个会话作用域 Bean 启动为一个会话。实现这一点的方法是使用 `Conversation`
    接口上的方法。


    清单 4-11 展示了 `SignupManager` 通过一个该类型的注入点声明了对 `Conversation` Bean 的依赖。容器会为我们创建一个
    `Conversation` 接口的实例。`beginSignup()` 方法首先调用 `beginConversation()` 方法。`beginConversation()`
    方法首先通过调用 `Conversation#isTransient()` 来检查 Bean 是否处于瞬态模式。


    如果 Bean 当前不处于任何会话状态，或者从技术上讲，不处于长期运行的会话中，则此方法返回 `true`。为什么要进行此检查？因为如果我们在一个已经处于长期运行会话中的
    Bean 上调用 `Conversation#begin()` 方法，容器会抛出 `IllegalStateException`。`beginConversation()`
    方法仅在该检查返回 `true` 时，通过调用 `Conversation#begin()` 方法来启动长期运行的会话。在此调用之后，Bean 被置入长期运行的会话或会话作用域中。此作用域将超越单个请求，但比会话作用域短。


    当注册完成并准备提交时，`submit()` 方法首先调用 `endConversation()` 方法。此方法对 Bean 进行反向检查，以查看它是否处于长期运行的会话中，然后调用
    `Conversation#end()` 方法。这也是因为如果你在一个非长期运行的 `Conversation` 上调用 `Conversation#end()`，容器会抛出
    `IllegalStateException`。


    `Conversation#begin` 方法还可以选择接受一个字符串参数作为会话 ID。此 ID 将与该方法启动的会话相关联。如果没有显式指定 ID，容器会为你生成一个。你可以通过调用
    `Conversation#getId()` 方法获取与当前长期运行会话关联的 ID。如果会话处于瞬态，则返回 ID 或 `null`。你还可以分别通过 `Conversation#setTimeout()`
    和 `Conversation#getTimeout()` 方法以毫秒为单位设置和获取会话的超时时间。


    #### @Dependent 伪作用域


    `@Dependent` 是一个伪作用域，它依赖于其使用位置。当没有定义显式作用域时，它是 Bean 被置入的默认作用域。之所以称为依赖作用域，是因为 `@Dependent`
    作用域的 Bean 会采用或继承它被注入到的 Bean 的作用域。依赖作用域的 Bean 有两个显著特征，即：


    *   被注入的 Bean 实例永远不会在多个注入点之间共享。

    *   注入到容器正在创建的对象中的任何 Bean 实例都绑定到该创建对象的生命周期。


    实际上，每次请求一个依赖作用域的 Bean 都会产生一个新的 Bean。并且这个依赖 Bean 实例的实际作用域将是它被注入到的任何 Bean 的作用域。我们将在本书后续章节介绍其他
    CDI 结构时，进一步讨论依赖作用域。


    到目前为止，我们已经讨论了 Bean 及其可能的作用域。CDI 的核心是在这些不同作用域的 Bean 之间管理依赖关系。在 CDI 中使用依赖管理魔杖的“入口点”是在注入点使用
    `@Inject` 注解。


    ## 注入点


    CDI 中的注入点是你请求上下文实例的地方。也就是说，你在特定位置使用 `@Inject` 注解标注一个类型，然后 CDI 容器会为你实例化该特定变量。CDI
    中有三个主要的注入点，如下所示。

    '
- fmt: '### Field Injection Point


    Field injection point is what we have seen so far. It is simply annotating a field
    of a given bean type in a class with `@Inject`. In Listing [4-12](#531256_1_En_4_Chapter.xhtml#PC11),
    the field `conversation` of type `Conversation` is annotated with `@Inject`. As
    we have discussed already, the container will take care of providing the right
    contextual instance of the annotated field type into the variable `conversation`.
    The container effectively guarantees that we will not have a `NullPointerException`
    when we invoke methods on the `conversation` variable at runtime. Field injection
    is arguably the most popular and our preferred way of using CDI for requesting
    contextual instances.


    ### Constructor Injection


    The second injection point available to you in CDI is the constructor injection
    point. Remember when we defined a CDI bean as any Java class with a no-arg constructor
    or a bean with at least one CDI injectable constructor? Constructor injection
    is when you annotate a constructor of a bean with `@Inject`, passing in beans
    that CDI can instantiate as arguments. Listing [4-12](#531256_1_En_4_Chapter.xhtml#PC12)
    shows the `SignupManager` conversation-scoped bean refactored to use a constructor
    injection to instantiate the `conversation` field.


    ```

    @ConversationScoped

    public class SignupManager implements Serializable {

    Conversation conversation;

    @Inject

    public SignupManager(final Conversation conversation) {

    this.conversation = conversation;

    }

    }

    Listing 4-12

    showing the SignupManager using a constructor injection point

    ```


    Listing [4-12](#531256_1_En_4_Chapter.xhtml#PC12) shows the `SignupManager` bean
    using a constructor injection to instantiate the `conversation` field. This constructor
    injection will be called automatically by the container. Even though our `SignupManager`
    doesn’t have a no-arg constructor, it’s still a perfectly valid CDI bean because
    of our constructor injection.


    It is important to note that when using constructor injection, all the arguments
    passed to the constructor must be CDI beans or at least beans that the container
    knows how to instantiate (through, e.g., producer methods, which we will look
    at in a section later). The application will fail CDI boot validation if any of
    the constructor parameters is not a valid CDI bean. Also, each bean is allowed
    only one constructor injection. You can still have a no-arg constructor and other
    constructors. But having more than one constructor injection will result in errors
    at application boot time.


    One good use of the constructor injection is for testing. When you need to create
    unit tests for your controllers (for instance, using Mockito^([^(95)](#fn95))),
    you can use constructor injection to initialize your bean fields at runtime. And
    in your tests, you can still manually call the same constructor, manually passing
    in the various parameters as you would any POJO constructor.


    ### Method Injection


    A method injection point is when a method is annotated with `@Inject`. Similar
    to constructor injection, all the parameters of the method must be CDI beans,
    or at least the container must know how to initialize them. Method injections
    are called initializer methods. The container will automatically call these methods,
    similar to constructor injections.


    These are the three main injection points in CDI. In addition to these, however,
    there are two other points where the parameters passed are CDI instantiated without
    the need for an explicit `@Inject` annotation. These are producer and observer
    methods. We cover both constructs in later sections.


    ## Jakarta Enterprise Beans


    The Jakarta Enterprise Bean, previously Enterprise JavaBeans or EJB, is a specification
    that precedes the CDI specification. It is a component-oriented specification
    for creating beans that implement business logic. It had its own dependency resolution
    mechanism. Annotating a Java class with any of `@Stateless`, `@Stateful`, and
    `@Singleton` made that class a component that was transactional, pooled, and secured
    by default.


    The advent of CDI and the need to have a core inversion of control implementation
    on the Jakarta EE platform meant CDI had to reimplement a number of the features
    in EJB. However, these two specifications have been harmonized such that CDI is
    the single core entry point for creating business layer components. Even though
    CDI is the preferred way to create business services, Jakarta Enterprise Beans
    still remains widely in use and will be for the foreseeable future.


    All Jakarta Enterprise Beans are automatically CDI beans. Annotating a bean with
    a Jakarta Enterprise Bean defining annotation makes that bean both a CDI and Jakarta
    Enterprise Bean with the features of both specifications available to the bean.
    From the perspective of CDI, Jakarta Enterprise Beans are called session beans.
    Listing [4-13](#531256_1_En_4_Chapter.xhtml#PC13) shows our `SecurityManager`,
    now with two additional annotations.


    ```

    @ApplicationScoped

    @Singleton

    @Startup

    public class SecurityManager {

    @Inject

    UserService userService;

    public void saveUser(final CreateUserRequest request) {

    userService.createUser(request);

    }

    }

    Listing 4-13

    showing the SecurityManager with EJB annotations

    ```


    Listing [4-13](#531256_1_En_4_Chapter.xhtml#PC13) shows the `SecurityManager`
    bean annotated with two Jakarta Enterprise Beans annotations – `@Singleton` and
    `@Startup`. The `@Singleton` annotation makes this bean a singleton Jakarta Enterprise
    Bean. The `@Singleton` annotation is not much different from the `@ApplicationScoped`
    annotation in the sense that both result in having just a single instance of the
    bean throughout the life of the application runtime.


    The `@Startup` annotation marks the `SecurityManager` for eager instantiation.
    What this implies is that an instance of our bean will be created as part of the
    application startup sequence. The `@Singleton` annotation also makes each method
    invoked on the `SecurityManager` contextual instance transactional by default.
    The container will join or create transactions if none exists for each method
    invocation.


    You can use eagerly instantiated Jakarta Enterprise Beans singletons to do some
    form of ahead-of-time housekeeping before all other components of your application
    are ready. For instance, you need to have some form of data ready when the application
    starts, but you need to load this application from an external service. In such
    a case, you can eagerly instantiate a singleton and make that call.


    As you can see, metadata from both API specifications are perfectly compatible
    with each other. In greenfield applications however, you will most likely use
    CDI almost exclusively. But there is still a significant body of code out there
    that still uses Jakarta Enterprise Beans metadata. Maintaining or migrating such
    code to CDI should be quite straightforward since both specs play nicely with
    each other. We will get back to Jakarta Enterprise Beans in the chapter on Jakarta
    Persistence when we talk extensively about transactions and transactional boundaries.
    For now, let’s continue our CDI discussion by taking a look at qualifiers.'
