  trans: '

    ## 限定符


    限定符是一种向 CDI 容器提供提示的方式，用于指示在满足特定依赖注入点时应该使用哪个确切的 Bean 类型。在清单 4-5 中，我们将 `WalletResource`
    注入到了 `HelloResourceImpl` 中。清单 4-14 展示了 `WalletResource` 接口。


    ```

    @RegisterRestClient(baseUri = BASE_URI)

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    public interface WalletResource {

    String BASE_URI = "http://wallet:3001/wallet/api";

    }

    清单 4-14

    展示 WalletResource 接口

    ```


    清单 4-14 展示了 `WalletResource` 接口。这是一个 REST 端点声明，它使用了 Eclipse MicroProfile REST
    客户端 API 中的 `@RegisterRestClient()` 注解（本书后面会有专门章节介绍此内容），来为此 Jakarta REST 资源自动创建一个
    REST 客户端。


    如清单 4-5 所示，我们通过其接口将此 Bean 注入到了 `HelloResourceImpl` 中。尝试启动应用程序将会失败，并显示错误信息：“对于类型
    `WalletResource`，使用限定符 `@Default` 存在歧义的依赖关系。”这是因为 `WalletResource` 接口在应用程序中有两个实现。一个是属于我们应用程序代码的
    `WalletResourceImpl`。另一个是由 Eclipse MicroProfile REST 客户端自动生成的 REST 客户端。


    由于该接口存在多个可能的实现，CDI 容器需要确切地知道在运行时应该使用哪个具体实现，以满足在 `HelloResourceImpl` 中声明的注入点。而且，由于我们没有指定任何限定符，默认的限定符
    `@Default` 不足以告知容器应该使用哪个实现，因此在应用程序启动验证期间，运行时会抛出错误并终止应用程序启动。


    为了解决这个问题，让我们为 `WalletResource` 接口声明一个限定符。清单 4-15 展示了 `WalletResource` 的限定符声明。


    ```

    @Qualifier

    @Retention(RUNTIME)

    @Target({FIELD, TYPE, METHOD, PARAMETER})

    public @interface Wallet {

    }

    清单 4-15

    展示 @Wallet 限定符声明

    ```


    清单 4-15 展示了 `@Wallet` 限定符声明。CDI 中的限定符是一个普通的 Java 注解，它带有来自 CDI API 的 `@Qualifier`
    注解。`@Wallet` 限定符将 `@Target` 值设置为字段、类型、方法和参数。这意味着它可以用于字段、类、方法或参数上。声明了注解之后，我们现在需要将限定符与一个具体类型关联起来。在这个例子中，我们希望将
    `@Wallet` 限定符与我们的 `WalletResource` 实现关联起来。清单 4-16 展示了在 `WalletResourceImpl` 上使用
    `@Wallet` 限定符。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @Wallet

    public class WalletResourceImpl implements WalletResource {

    @Inject

    WalletService walletService;

    }

    清单 4-16

    展示在 WalletResourceImpl 上使用 @Wallet

    ```


    清单 4-16 展示了与 `WalletResourceImpl` 关联的 `@Wallet` 限定符。有了这个设置，我们现在就有了一种机制，可以告诉 CDI
    容器，对于由 `WalletResource` 接口类型声明的注入点，应该注入 `WalletResource` 的哪个确切实现。清单 4-17 展示了 `HelloResourceImpl`
    中使用 `@Wallet` 限定符限定的 `WalletResource` 注入点。


    ```

    @Path("hello")

    public class HelloResourceImpl implements HelloResource {

    @Inject

    @Wallet

    WalletResource walletResource;

    }

    清单 4-17

    展示在 HelloResourceImpl 中使用 @Wallet 限定符限定 walletResource 字段

    ```


    清单 4-17 向我们展示了使用 `@Wallet` 限定符来限定 `walletResource` 字段。有了这些设置，我们就是在告诉容器，将具体类型 `WalletResourceImpl`
    的一个上下文实例注入到 `HelloResourceImpl` 中的 `walletResource` 字段。完成此构造后，应用程序应该能够正常启动，并且不会抛出任何验证错误。


    ### @Default 限定符


    在本节前面，我们看到了当 `walletResource` 字段存在歧义的依赖关系解析时，容器抛出的错误信息。该信息显示为：“对于类型 `WalletResource`，使用限定符
    `@Default` 存在歧义的依赖关系。”该信息中提到的 `@Default` 限定符是一个内置限定符，在没有任何显式限定符的情况下，每个 Bean 都默认拥有它。只要某个
    Bean 没有声明或关联任何限定符，运行时就会隐式地将其注解在每个 Bean 类型上。`@Default` 实际上就是默认限定符。


    ### 其他内置限定符


    Jakarta EE 平台以及 Eclipse MicroProfile 项目附带了许多内置限定符。在“按名称解析”一节中，我们看到了 `@Named` 限定符。此限定符接受一个可选的字符串值，该值成为
    Bean 在表达式语言中的名称。`@Named` 是一个内置限定符。


    另一个内置限定符是 `@RestClient` 限定符。在清单 4-14 中，我们看到 `WalletResource` 声明带有注解 `@RegisterRestClient(baseUri
    = BASE_URI)`。此注解告诉 Eclipse MicroProfile REST 客户端在运行时为我们创建此 Bean 的一个实现。如何获取这个已创建的
    Bean 呢？清单 4-18 再次展示了 `HelloResourceImpl`，但这次，它额外注入了相同 `WalletResource` 类型但带有不同限定符的实例。


    ```

    @Path("hello")

    public class HelloResourceImpl implements HelloResource {

    @Inject

    @Wallet

    WalletResource walletResource;

    @Inject

    @RestClient

    WalletResource restClient;

    }

    清单 4-18

    展示使用来自 Eclipse MicroProfile 项目的内置限定符来限定 WalletResource

    ```


    清单 4-18 展示了另一个相同 `WalletResource` 类型的字段声明，该字段使用了来自 Eclipse MicroProfile 项目的 `@RestClient`
    限定符进行限定。`restClient` 变量将在运行时被注入一个由 MicroProfile 生成的 `WalletResource` 实现。`@RestClient`
    注解将为我们提供一个上下文实例，该实例实现了接口的所有方法，并且可以直接使用。值得注意的是，`walletResource` 和 `restClient`
    字段都是相同的类型——`WalletResource`。这两个字段都是通过它们的接口定义的。在没有限定符的情况下，容器将不知道如何处理这种歧义的依赖关系声明。


    CDI 中的限定符构造是一种看似简单但功能强大的机制，它可以帮助您轻松编写非常清晰、可读且可测试的代码。我们将在本章和本书的其余部分继续讨论和使用限定符。接下来，让我们看看
    CDI 中的生产者概念。到目前为止，我们看到的所有 Bean 都是我们以某种方式从头声明的——要么是接口，要么是具体的 Java 类。然而，有时您会发现自己需要将不属于您代码的
    Bean 转换为应用程序中的 CDI Bean。

    '
- fmt: '# CDI Producers


    Producers in CDI are a way to transform beans or Java types that are not part
    of application code into CDI beans to be used in the application. We defined a
    CDI bean as any Java class with a no-arg constructor or one that has at least
    one constructor annotated with `@Inject`. However, there will be some Java types
    that are needed in an application but aren’t necessarily valid CDI beans. For
    example, Listing [4-19](#531256_1_En_4_Chapter.xhtml#PC19) shows a field injection
    point of type `EntityManager` in the `BaseRepository` bean.


    ```

    public abstract class BaseRepository {

    @Inject

    EntityManager em;

    }

    Listing 4-19

    showing an attempt to inject a platform class into BaseRepository, an application-defined
    bean

    ```


    Listing [4-19](#531256_1_En_4_Chapter.xhtml#PC19) shows a field injection point
    declaration of type `EntityManager` in the `BaseRepository` bean. An attempt to
    deploy the application will fail with the error message “Unsatisfied dependencies
    for type `EntityManager` with qualifiers `@Default` at injection point `@Inject
    com.example.jwallet.core.control.BaseRepository.em`”. The CDI container is complaining
    that the field type has unsatisfied dependencies. What this means is that the
    CDI runtime doesn’t know how to instantiate a contextual instance of the `EntityManager`
    class.


    `EntityManager` is a Jakarta EE platform class. It’s an interface that Jakarta
    Persistence runtimes provide implementations for. Using it as an injection point
    type as we have done won’t work because CDI doesn’t have a way to instantiate
    it. To get around this problem, we can use producers. With CDI producers, you
    tell the container where a given bean type is “produced” so any time there is
    a request for a contextual instance of that bean, the container will go to your
    producer for the instance. There are two kinds of CDI producers – producer fields
    and methods.


    ## Producer Fields


    Producer fields refer to “producing” CDI beans from the field of another bean.
    Listing [4-20](#531256_1_En_4_Chapter.xhtml#PC20) shows a producer field that
    “produces” `EntityManager` instances using the `@Produces` annotation from CDI.


    ```

    public class ProducerFactory {

    @Produces

    @PersistenceContext

    EntityManager entityManager;

    }

    Listing 4-20

    showing the EntityManager producer field

    ```


    Listing [4-20](#531256_1_En_4_Chapter.xhtml#PC20) shows a producer field for the
    `EntityManager` type. The `ProducerFactory` bean has a field of type `EntityManager`
    annotated with `@PersistenceContext` and `@Produces`. `@PersistenceContext` is
    an annotation from the Jakarta Persistence API used to inject instances of `EntityManager`.
    However, since this annotation is not a CDI annotation, the returned instances
    aren’t CDI beans.


    Annotating the field yet again with `@Produces` makes the returned instance of
    the `EntityManager` from the `@PersistenceContext` annotation a CDI bean. Effectively,
    we are using the `@Produces` annotation to transform the Jakarta Persistence–created
    `EntityManager` instance into a CDI bean, complete with all CDI services. When
    the CDI container encounters the field injection point of type `EntityManager`
    found in the `BaseRepository` bean (Listing [4-19](#531256_1_En_4_Chapter.xhtml#PC19)),
    it knows to come to this field for the contextual instance.


    Producers are not limited to producing bland contextual instances. You can explicitly
    set a scope to be associated with the produced contextual instance. In the absence
    of any explicit scope, the default `@Dependent` scope applies. In the example
    in Listing [4-20](#531256_1_En_4_Chapter.xhtml#PC20), the produced `EntityManager`
    contextual instances will be in `@Dependent` scope. There is a caveat with setting
    an explicit scope for the producer field, however. If the producer field contains
    a null value when accessed at runtime and it has any other scope other than `@Dependent`,
    then the container throws an `IllegalProductException`. Producer fields can be
    static or nonstatic default-access, protected, public, or private fields of a
    CDI-managed bean class.


    ### Qualifying Producer Fields


    You can also qualify producer fields using qualifiers. Let’s say `jwallet` uses
    two databases – Apache Derby and Postgres. You can have two producer fields, each
    qualified with a specific qualifier so you can inject and qualify injection points.
    In the section on qualifiers, we created the `@Wallet` qualifier as a simple no-arg
    annotation. Qualifiers, however, can take arguments. Instead of creating two qualifiers
    to qualify the `EntityManager`s produced for each database, we can create a single
    qualifier that takes an argument. In Listing [4-21](#531256_1_En_4_Chapter.xhtml#PC21),
    we create the `@Database` qualifier that takes an argument of type `DB`.


    ```

    @Qualifier

    @Retention(RUNTIME)

    @Target({FIELD, TYPE, METHOD, PARAMETER})

    public @interface Database {

    DB value();

    enum DB {

    DERBY,

    POSTGRES

    }

    }

    Listing 4-21

    showing the @Database qualifier definition

    ```


    Listing [4-21](#531256_1_En_4_Chapter.xhtml#PC21) shows the `@Database` qualifier
    with a `value()` field of type `DB` for passing parameters to the qualifier. `DB`
    is an enum defined in the qualifier class consisting of two fields – `DERBY` and
    `POSTGRES`. Listing [4-22](#531256_1_En_4_Chapter.xhtml#PC22) shows the use of
    the `@Database` qualifier to qualify two `EntityManager` producer fields.


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.DERBY)

    @PersistenceContext(unitName = "jwallet-derby")

    EntityManager derby;

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet-postgres")

    EntityManager postgres;

    }

    Listing 4-22

    showing the use of the @Database qualifier to qualifier producer fields

    ```


    Listing [4-22](#531256_1_En_4_Chapter.xhtml#PC22) shows the `ProducerFactory`
    bean with two producer fields, both of type `EntityManager`. However, both fields
    are qualified with the `@Database` qualifier. The `derby` field producer is qualified
    by the `@Database(DERBY)` qualifier, and the `postgres` field by `@Database(POSTGRES)`.


    These two `EntityManager` fields are linked to two different persistence contexts
    as shown by the values passed to the `unitName` parameter of the `@PersistenceContext`
    annotation (Jakarta Persistence is discussed in a separate chapter). We now have
    two fields of the same type producing the same type but differently qualified.
    Listing [4-23](#531256_1_En_4_Chapter.xhtml#PC23) shows the use of the `derby`
    `EntityManager` producer field in `BaseRepository`.


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(DB.DERBY)

    EntityManager em;

    }

    Listing 4-23

    showing the use of the derby producer field

    ```


    Listing [4-23](#531256_1_En_4_Chapter.xhtml#PC23) shows an injection point of
    type `EntityManager` qualified with the `@Database(DERBY)` qualifier. At runtime,
    the container is going to use the contextual instance produced from the `derby`
    field in the `ProducerFactory` bean to populate the `em` field in the `BaseRepository`
    bean. By so doing, even though the `EntityManager` bean is not part of the application
    code, through the CDI producer field construct, we have still been able to transform
    it into a CDI bean.'
  raw: '## CDI Producers


