- fmt: '# 6. REST with Jakarta EE REST API


    The REpresentational State Transfer or REST architecture is a stateless, HTTP-based
    communication standard for modern applications. Originally proposed by Dr. Roy
    Fielding in his PhD thesis,^([^(106)](#fn106)) it is the de facto means of enabling
    simple, stateless, predictable, fast, and representation-based communication between
    applications written in different languages and frameworks. An application written
    in the Django framework in Python can have REST resources that are consumed by
    another application written in Java with Jakarta EE. Similarly, a Jakarta EE application
    can create resources that can be consumed by a C# application.


    REST resource consuming clients do not always have to be external applications.
    A single application written as a collection of microservices will use the REST
    architecture as a way for the different services to communicate with each other.
    As a platform-agnostic communication means, the HTTP protocol allows the implementation
    of REST resources to be completely abstracted from the client.


    The Jakarta RESTful Web Services specification ^([^(107)](#fn107)) is the Jakarta
    EE standard for creating REST web services on the platform. The specification
    defines a number of interfaces and annotations for creating sophisticated web
    services in combination with other Jakarta EE specifications like the Jakarta
    Contexts and Dependency Injection.


    This chapter introduces you to the Jakarta RESTful Web Services specification.
    You will learn how to create different types of web resources using the very simple
    set of API constructs from the specification, along with how it integrates with
    other Jakarta EE specifications to create a cohesive platform for developing modern
    applications.


    The chapter will also take a look at the Eclipse MicroProfile REST client for
    consuming REST resources in a typesafe way. By the end of this chapter, you will
    have a solid foundation in creating web services on Jakarta EE and using the Eclipse
    MicroProfile Client.


    ## Modelling REST Services


    REST web services are called resources because they represent application resources.
    The actual resource being represented is domain specific. Designing REST web services
    to expose resources to consuming clients entails crafting the web resources along
    the lines of what operations can be carried out on a given resource. As the REST
    architecture is based on HTTP, resources are exposed as HTTP paths. Identifying
    what operations can be carried out on a resource can clarify what HTTP paths those
    operations can be exposed on.


    Once the set of operations and their corresponding HTTP paths are identified,
    then the application data format would also need to be considered. As HTTP is
    language agnostic, it can be used to expose resources in any number of formats
    including JSON, XML, and plain text. This is important because different clients
    will want the same resource in different formats. The issue of resource format,
    however, is becoming less of a major consideration because the JSON format has
    emerged as the lingua franca of the Web. Thus, it is mostly the default format
    for exposing resources over HTTP. That notwithstanding, the issue of resource
    formats merits consideration especially when the resources are being exposed to
    different clients.


    With the application paths and data format considered, the next step is to map
    HTTP methods^([^(108)](#fn108)) to the identified paths. This step entails mapping
    the right HTTP method to each corresponding action that can be performed on the
    resource in question.


    ### The User Resource


    Let us model a REST resource for the User entity looked at extensively in the
    previous chapter on Jakarta Persistence. For our User resource, we want to allow
    a client to create, update, find a user by an ID, get all users, search a user,
    find all users with a certain total conversion threshold, and finally remove a
    user. Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1) shows the various actions
    mapped to HTTP paths and their corresponding HTTP methods.


    Table 6-1 shows the possible mappings for `UserResource`


    | Action | HTTP Path | Return Type | HTTP Method |

    | --- | --- | --- | --- |

    | Create a user | `/users` | Created user | POST |

    | Update a user | `/users` | Updated user | PUT |

    | Find a user by id | `/users/<userId>` | The user or an exception | GET |

    | Get all users | `/users` | List of users | GET |

    | Search users | `/users/search` | List of users | GET |

    | Find users by conversion | `/users/<threshold>` | List of users | GET |

    | Delete a user | `/users` | Void | DELETE |


    The table shows the mapping between the actions that can be carried out on a user
    resource and the corresponding HTTP paths and methods. Naming resource methods
    requires adhering to general good REST practices.^([^(109)](#fn109)) Because resources
    are consumed through the HTTP standard which is itself language or platform agnostic,
    it is important to name resources in a way that is intuitive, simple, and consistent.
    Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1) will serve as the discussion context
    for the rest of the chapter.


    ## Jakarta REST Resources


    For ease of application maintenance, REST resources should be organized in a hierarchical
    manner. Oftentimes, an application will have a base path where all other resource
    paths are accessed relative to. For instance, the currency conversion API from
    `https://api.apilayer.com/currency_data` has all the currency conversion resource
    methods hosted relative to the `currency_data` path. This can be said to be the
    root application path or root resource for the currency conversion API from apilayer.com.


    ### The Root Resource


    In Jakarta REST, the root resource is defined as a subclass of the `jakarta.ws.rs.core.Application`
