  raw: '#### @ConcurrentGauge


    This annotation is used to gauge concurrent invocations of an annotated method
    or constructor or instantiations of an annotated class . This metric works by
    incrementing the parallel count by one when the annotated element is entered and
    decremented by the same number when exited. This metric gauges the number of concurrent
    invocations of the annotated element.


    When used on a class, any parallel invocation counter for the current, the previous
    minute maximum, and previous minute minimum is created and registered in the metric
    registry for each constructor and method of the class using the name and absolute
    field values of the annotation.


    When used on a method, the metric gauges for the current, previous minute maximum
    , and previous minute minimum are created and registered in the metric registry.
    When used on a constructor, the same gauges for that constructor are registered.
    Listing [9-3](#531256_1_En_9_Chapter.xhtml#PC3) shows the convertCurrency method
    annotated with @ConcurrentGauge.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("rates")

    public class RateResourceImpl {

    @Path("convert")

    @POST

    @ConcurrentGauge(name = "convert_currency_concurrent_gauge",

    absolute = true,

    description = "Method to convert one currency to the other",

    tags = { "convert=custom" }

    )

    ConvertCurrencyResponse convertCurrency(@Valid ConvertCurrencyRequest convertCurrencyRequest){};

    }

    Listing 9-3

    showing @ConcurrentGauge on convertCurrencyMethod

    ```


    Listing [9-3](#531256_1_En_9_Chapter.xhtml#PC3) shows the convertCurrency method
    annotated with @ConcurrentGauge. The name, absolute, and description are set,
    along with some custom tags. This is accessible at /metrics/application/convert_currency_concurrent_gauge.
    A sample call for the default text format returns the data as shown in Listing
    [9-4](#531256_1_En_9_Chapter.xhtml#PC4).


    ```

    # TYPE application_convert_currency_concurrent_gauge_current gauge

    # HELP application_convert_currency_concurrent_gauge_current Method to convert
    one currency to the other

    application_convert_currency_concurrent_gauge_current{convert="custom"} 0

    # TYPE application_convert_currency_concurrent_gauge_min gauge

    application_convert_currency_concurrent_gauge_min{convert="custom"} 0

    # TYPE application_convert_currency_concurrent_gauge_max gauge

    application_convert_currency_concurrent_gauge_max{convert="custom"} 1

    Listing 9-4

    showing the result for the @ConcurrentGauge metric

    ```


    #### @Gauge


    The @Gauge metric is used to sample the return value of a method. This method
    is mostly a business method that returns some form of meaningful, business context
    value for analysis. The method will be invoked by the Metrics runtime and the
    return value assigned as the value of the metric. @Gauge can be used for only
    methods.


    As an example, if we want to sample the number of currency conversions in jwallet,
    @Gauge is the perfect metric for that. The return value of the method is the value
    of the metric. This metric can only be used with @ApplicationScoped or @Singleton
    CDI beans because using it with other non-singleton beans will not be clear as
    to which instance of the bean to use for obtaining the gauge value. Listing [9-5](#531256_1_En_9_Chapter.xhtml#PC5)
    shows the RateService @ApplicationScoped bean with a countConversions gauge method.


    ```

    @ApplicationScoped

    public class RateService {

    @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
    = true)

    public int countConversions() {

    return ThreadLocalRandom.current().nextInt(250, 500 + 1);

    }

    }

    Listing 9-5

    showing @Gauge usage

    ```


    Listing [9-5](#531256_1_En_9_Chapter.xhtml#PC5) shows the RateService singleton
    with countConversions method that returns an int. When this metric is queried,
    the runtime will call this method and use the returned method value as the value
    of the metric. With the name, this metric can be directly accessed from the path
    /metrics/application/convert_currency_gauge_count. A sample invocation return
    data is shown in Listing [9-6](#531256_1_En_9_Chapter.xhtml#PC6).


    ```

    # TYPE application_convert_currency_gauge_count gauge

    application_convert_currency_gauge_count 474

    Listing 9-6

    showing sample return data for the @Gauge metric

    ```


