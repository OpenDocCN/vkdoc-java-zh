  trans: '

    #### 注解模式


    注解模式的 bean 发现机制告知 CDI 运行时仅扫描带有 CDI bean 定义注解的组件。Bean 定义注解是 CDI 的构造，可用于以某种方式定义
    bean。在注解模式的 bean 发现机制下，使用这些 CDI 构造定义的 bean 是隐式 bean。在没有显式设置或 CDI 配置文件的情况下，注解模式的
    bean 发现机制是默认选项。这意味着，如果你没有显式设置 bean 发现模式，CDI 将仅扫描应用程序中的隐式 bean。


    #### 全部模式


    全部模式的 bean 发现机制告知 CDI 运行时扫描应用程序中的所有 bean，无论该 bean 是否带有显式的 CDI bean 定义注解。此模式显式启用
    CDI。将 bean 发现模式设置为全部意味着你可以注入一个没有显式 CDI 注解的 POJO，运行时仍然能够为你创建实例。本书的参考应用程序将使用此 bean
    发现模式。本章及本书后续章节的所有讨论均假设显式地将 bean 发现模式设置为全部。


    ### beans.xml 文件


    CDI 的主要配置文件是 `beans.xml` 文件。它是一个简单的文件，可用于显式设置 bean 发现模式并注册其他 CDI 组件。清单 4-1 展示了一个典型的
    beans 文件示例。


    ```


    清单 4-1

    jwallet 中使用的 beans.xml 文件

    ```


    清单 4-1 展示了使用新的 4.0 模式文件的 `beans.xml` 文件。bean 发现模式值设置为 `all`。通过此 `beans.xml` 文件，我们在
    jwallet 中显式启用了 CDI，并且通过将发现模式的值设置为 `all`，我们应用程序中的每个 bean/POJO 都会自动成为 CDI bean，并将在应用程序启动时被扫描。


    ## CDI 容器


    “容器”一词通常与控制反转相关联。它指的是负责根据依赖方的请求创建、注入和销毁依赖实例的核心软件组件。在 Jakarta EE 平台上，CDI 容器是负责管理应用程序中各种不同组件之间关系的运行时。应用程序不同部分之间的依赖关系可能会变得非常复杂且难以手动管理。


    CDI 容器负责在启动时扫描和验证你的应用程序，以确保没有违反 CDI 规则。违反 CDI 构造将阻止应用程序启动，因为 CDI 容器在扫描并发现违规时会抛出错误。由于容器的这种启动时扫描和验证，你很少会遇到运行时
    CDI 错误。


    CDI 容器还负责创建 bean 的上下文实例，为这些创建的实例添加相关的 CDI 增强功能，将它们分配到相关的上下文中，并最终在它们所绑定的上下文被销毁时销毁这些实例。你可以将
    CDI 容器视为一个黑盒，它只在响应你的请求时出现，并在不需要时消失。作为开发者，你通常不需要过多考虑 CDI 容器，只需知道它在后台随时准备响应你的请求即可。


    ## Bean 与上下文实例


    ### 什么是 CDI Bean？


    Bean 是 CDI 中最原子的组件。CDI 中的 bean 是任何具有无参构造函数或至少一个可注入构造函数的 Java 类。它可以选择性地使用一个或多个
    CDI 注解进行显式注解。CDI bean 的少数限制是它不能是内部类或抽象类。CDI bean 与 JavaBean 没有太大区别。^(⁸⁸) 事实上，任何
    JavaBean 都会自动成为 CDI bean。从技术上讲，这种 bean 被称为托管 bean——所谓“托管”，是指此类 bean 实例的创建和销毁完全由
    CDI 容器管理。


    另一种技术类型的 CDI bean 是会话 bean。会话 bean 是使用 EJB^(⁸⁹) 规范中任何 bean 定义元数据（即 `@Stateless`、`@Stateful`
    和 `@Singleton`）进行注解的组件。任何使用这些注解之一进行注解的 bean，除了是 EJB 之外，还会自动成为 CDI bean，并拥有两个规范提供的特性和服务。我们将在本章后面的部分讨论
    EJB。


    你在 bean 类中实现应用程序逻辑，并可以选择使用一个或多个 CDI 元数据为其添加 CDI 特性。然后，你可以在其他组件（这些组件也是 bean）中声明对
    bean 的依赖。清单 4-2 展示了一个 CDI bean 的示例。


    ```

    public class WalletService {

    }

    清单 4-2

    展示 WalletService 作为一个 CDI bean

    ```


    清单 4-2 展示了一个名为 `WalletService` 的简单 POJO。这个类是一个完全有效的 CDI bean，可以注入到其他 bean 中。尽管
    `WalletService` 还没有任何 CDI 属性，但由于我们在 `beans.xml` 文件中将 bean 发现模式设置为 `all`，它仍然会在启动时被容器扫描。我们可以通过使用一些
    CDI 注解为 `WalletService` bean 赋予一些属性，从而显式地为其添加 CDI 特性。清单 4-3 展示了通过注解添加了一些 CDI 属性的
    `WalletService`。


    ```

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    清单 4-3

    展示带有 CDI 属性的 WalletService

    ```


    清单 4-3 展示了被赋予了一些 CDI 属性的 `WalletService` bean。`@RequestScoped` 注解告诉 CDI 容器该 bean
    的实例应置于何种上下文中。`@Transactional` 注解是一个拦截器，它将自动为在 `WalletService` 实例上调用的方法划分事务边界。你可以赋予
    bean 的 CDI 属性集包括：限定符、作用域、替代方案和名称（我们将在本章中讨论这些）。可以通过使用 `@Inject` 注解标注一个 `WalletService`
    类型的字段，将此 bean 注入到其他 bean 中，如清单 4-4 所示。


    ```

    public class WalletResourceImpl implements WalletResource {

    @Inject

    WalletService walletService;

    }

    清单 4-4

    展示对 WalletService CDI bean 的依赖声明

    ```


    清单 4-4 展示了将 `WalletService` bean 注入到 `WalletResourceImpl` 组件中。`walletService`
    变量的字段类型是 `WalletService`，这引出了一个问题：容器如何解析用于解析注入点的类型。

