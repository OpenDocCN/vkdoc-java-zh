  trans: '

    ##### 多对一


    多对一关系是指 N 个实体与一个给定的目标实体相关联的关联关系。从发起方实体的角度来看，始终只有一个目标实体。清单 5-21 展示了一个新实体 TransactionHistory，它用于保存用户的交易历史记录。


    ```

    @Entity

    public class TransactionHistory extends AbstractEntity {

    private String sourceCurrency;

    private String targetCurrency;

    private String amount;

    private LocalDateTime transactionDate;

    @ManyToOne

    private User accountOwner;

    }

    清单 5-21

    展示了 TransactionHistory 实体

    ```


    TransactionHistory 实体与 User 实体存在关联关系。这是一种多对一关联，因为多个交易可以属于同一个用户。`@ManyToOne` 注解用于表示这种关联关系。从每个
    TransactionHistory 实例的角度来看，始终只有一个用户。在数据库中，TransactionHistory 表中会创建一个指向 wallet_user
    表的外键列。清单 5-22 展示了 TransactionHistory 实体映射到数据库时生成的 DDL。


    ```

    create table if not exists transactionhistory

    (

    id              bigint not null primary key,

    amount          varchar(255),

    created         timestamp,

    createdby       varchar(255),

    editedby        varchar(255),

    sourcecurrency  varchar(255),

    targetcurrency  varchar(255),

    transactiondate timestamp,

    updated         timestamp,

    accountowner_id bigint

    constraint fk_transactionhistory_accountowner_id

    references wallet_user

    );

    清单 5-22

    展示了 TransactionHistory 模式

    ```


    `accountOwner_id` 字段是 TransactionHistory 表中引用 User 实体表的外键列。在 JPA 中，外键列被称为连接列。由于我们没有显式指定连接列的名称，因此默认使用字段名后跟下划线以及主键列的名称（本例中为
    id）。可以通过使用 `@JoinColumn` 注解来自定义此列。


    在清单 5-21 所示的关联关系中，TransactionHistory 被认为是关系的拥有方，因为其表中包含了外键列。因此，关联关系的拥有方是指将目标实体的主键作为外键列的一方。`@JoinColumn`
    注解用于关联关系的拥有方，以自定义外键列。


    默认情况下，当加载发起方实体时，单值关系也会被加载。这意味着当从数据库中获取 TransactionHistory 实例时，其 `accountOwner`
    字段也会作为其一部分被获取。可以通过向 `@ManyToOne` 注解的 `fetch` 参数传递一个 `FetchType` 值来自定义此行为。


    此示例关联关系的方向性是单向的，意味着只有一方知道该关联关系。TransactionHistory 知道它与 User 实体存在关系，但 User 实体对此关联关系一无所知。从
    User 实体的角度来看，它是“单一的”。另一种方向性是双向的，即两个实体通过关联关系相互知晓。


    ##### 一对一


    一对一关联是指一个实体与另一个实体存在关联关系。在这种情况下，从关系任意一方的角度来看，都只有一个实体。清单 5-23 展示了一个新实体 UserCredentials，它与
    User 实体存在关联关系。


    ```

    @Entity

    public class UserCredentials extends AbstractEntity {

    @Column(unique = true, length = 30, nullable = false)

    private String email;

    @Column(nullable = false)

    private String password;

    private String salt;

    @OneToOne

    @JoinColumn(name = "wallet_user_id")

    private User user;

    }

    清单 5-23

    展示了 UserCredentials

    ```


    UserCredentials 是一个包含用户登录凭据的实体。它与 User 存在一对一关联，由 `@OneToOne` 注解表示。它还带有 `@JoinColumn`
    注解，用于设置外键列的自定义名称。这意味着 UserCredentials 是关系的拥有方。清单 5-24 展示了更新后的 User 实体（为简洁起见，仅显示新增部分）。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToOne(mappedBy = "user")

    private UserCredentials userCredentials;

    }

    清单 5-24

    展示了更新后的 User 实体

    ```


    User 实体也声明了与 UserCredentials 实体的关联关系，由 `@OneToOne` 注解表示。此处的注解传递了 `mappedBy` 参数，其值设置为目标实体（本例中为
    UserCredentials）中 User 类型字段的名称。这表示 UserCredentials 是关联关系的拥有方。User 和 UserCredentials
    之间的这种关联关系是一种双向的一对一映射或关联。图 5-9 展示了 User 和 UserCredentials 类的更新后模式图。


    ![](img/531256_1_En_5_Fig9_HTML.png)


    模式图描绘了钱包用户表和用户凭据表。前者包含 18 个字段，后者包含 9 个字段。


    图 5-9


    User 和 UserCredentials


    #### 集合值关系


    集合值关系或关联是指源实体引用目标实体的一个或多个实例。与清单 5-23 和 5-24 中源实体针对目标实体的单个实例的关联不同，集合值关系使用集合类型来建模，以表示
    N 个目标实体实例。一对多和多对多就是使用集合值字段的关联类型。

    '
- fmt: "### One-to-Many\n\nAn entity has a one-to-many association with a target entity\
    \ when it has a collection of the target entity as a field. Listing [5-25](#531256_1_En_5_Chapter.xhtml#PC25)\
    \ shows the `User` entity declaring a one-to-many association to transaction history.\n\
    \n```java\n@Entity\n@Table(name = \"WALLET_USER\")\npublic class User extends\
    \ AbstractEntity {\n    @OneToMany\n    private List transactionHistory;\n}\n\
    ```\n\nA `User` can have one or more transaction histories. This is denoted by\
    \ the one-to-many relationship between the `User` and `TransactionHistory` entities.\
    \ This association, as shown in Listing [5-25](#531256_1_En_5_Chapter.xhtml#PC25),\
    \ is declared by the use of the `@OneToMany` annotation. The current state of\
    \ the relationship is bidirectional, because the `TransactionHistory` also declares\
    \ an association back to the `User` entity.\n\nIn every one-to-many relationship,\
    \ the owning side of the association is always the many side. In the case of the\
    \ `User` and `TransactionHistory`, the latter will be the owning side of the relationship\
    \ because the primary key of the `User` entity will be placed as a foreign key\
    \ column in the `TransactionHistory` table. To declare the many side of the association\
    \ as the owning side, the `mappedBy` parameter of the `@OneToMany` annotation\
    \ should be set to the name of the field in the `TransactionHistory` entity, as\
    \ shown in Listing [5-26](#531256_1_En_5_Chapter.xhtml#PC26).\n\n```java\n@Entity\n\
    @Table(name = \"WALLET_USER\")\npublic class User extends AbstractEntity {\n \
    \   @OneToMany(mappedBy = \"accountOwner\")\n    private List transactionHistory;\n\
    }\n```\n\nIn the `TransactionHistory` table, a foreign key column will contain\
    \ the primary key of the target entity to which the `TransactionHistory` history\
    \ has an association with. The `TransactionHistory` table will remain unchanged\
    \ from what it was as shown in Figure [5-9](#531256_1_En_5_Chapter.xhtml#Fig9).\n\
    \nA one-to-many association can also be unidirectional from the perspective of\
    \ the one side of the association. In this case, the target entity type in the\
    \ collection field of the one side of the association is oblivious to the relationship.\
    \ In a unidirectional one-to-many relationship, there is only one side, which\
    \ is also automatically the owning side of the association. Since the association\
    \ field is a collection type, a join table is used to map the relationship. A\
    \ join table is a simple table that contains two primary key fields – one to the\
    \ primary key of the owning or source entity of the association and the other\
    \ to the target entity.\n\n### Many-to-Many\n\nMany-to-many association is one\
    \ in which both the source and target of the relationship have a collection of\
    \ each other. The `@ManyToMany` annotation can be used to express such an association.\
    \ Many-to-many relationships can also be bi- or unidirectional. Getting this type\
    \ of relationship right can be tricky, and so except in very complex cases, a\
    \ one/many-to-one relationship should suffice.\n\n### Lazy Fetching\n\nCollection-valued\
    \ associations are lazily loaded or fetched by default. What this means is that\
    \ when an instance of the `User` entity is loaded, its collection field of type\
    \ `TransactionHistory` will not be loaded unless it is traversed to in the same\
    \ transaction. You can change the default loading strategy by setting the `fetch`\
    \ parameter of the `@OneToMany` or `@ManyToMany` to `FetchType.EAGER`.\n\n####\
    \ Collections of Simple Types\n\nThe collection-valued associations discussed\
    \ so far have all been between entities. JPA also has support for mapping a collection\
    \ of simple types. Remember simple types refer to the basic Java types that are\
    \ not entities, for example, `String`, `Integer`, and embeddables. Listing [5-27](#531256_1_En_5_Chapter.xhtml#PC27)\
    \ shows the `UserCredentials` entity with a collection of `Strings` to represent\
    \ the email history of a user.\n\n```java\n@Entity\npublic class UserCredentials\
    \ extends AbstractEntity {\n    @ElementCollection\n    private Set emailHistory;\n\
    }\n```\n\nThe `emailHistory` field is a set of `Strings` annotated `@ElementCollection`.\
    \ This is a simple type that has no existence of its own. As such, in the database,\
    \ a table will be created with two fields. One field will be a foreign key column\
    \ that points to the primary key column of the `UserCredentials` table and another\
    \ field that contains the value of each element in the set.\n\nThe name of this\
    \ table, by default, is the name of the declaring entity class underscore the\
    \ name of the field. So for the field shown in Listing [5-27](#531256_1_En_5_Chapter.xhtml#PC27),\
    \ the resulting table will be `userCredentials_emailHistory`. Element collections\
    \ can also be eagerly fetched. By default, they are lazily fetched. You can set\
    \ them to be eagerly fetched by passing `FetchType.EAGER` to the `fetch` parameter.\n\
    \n#### Maps\n\nJPA supports declaring entity associations through the use of the\
    \ `java.util.Map` construct. A map is a collection that associates a key to any\
    \ arbitrary object type. There can be any number of combination types of declaring\
    \ associations using maps based on the key-value type permutation. The value type\
    \ of a map determines the type of association that is being created. If the value\
    \ type of the map is an entity, then either a `@OneToMany` or `@ManyToMany` association\
    \ annotation should be used. However, if the value is a simple or embeddable type,\
    \ then `@ElementCollection` must be declared.\n\nIf the key of the map is a simple\
    \ or embeddable type, the `@MapKeyColumn` can be used to customize the key column\
    \ in the database. If the value of the map is an entity and the key is to be mapped\
    \ to an attribute of that entity, then the `@MapKey` annotation can be used to\
    \ tell the runtime which field in the target value entity the key should be mapped\
    \ to.\n\nGiven the very flexible nature of modelling associations using maps,\
    \ it can be very hard to get right. A lot of the time, the use of `java.util.Collection`\
    \ types should suffice. Unless in very rare and extreme cases where you need the\
    \ flexibility offered by maps, we do not recommend its use.\n\n## Data Persistence\n\
    \nThe second of the trio of using JPA involves persisting the data. This is where\
    \ instances of the entities you modelled get persisted to their respective database\
    \ tables. The central artifact responsible for taking your entity instances and\
    \ persisting them to the database is the `EntityManager`. There are four components\
