  raw: '# 6. REST with Jakarta EE REST API


    The REpresentational State Transfer or REST architecture is a stateless, HTTP-based
    communication standard for modern applications. Originally proposed by Dr. Roy
    Fielding in his PhD thesis,^([^(106)](#fn106)) it is the de facto means of enabling
    simple, stateless, predictable, fast, and representation-based communication between
    applications written in different languages and frameworks. An application written
    in the Django framework in Python can have REST resources that are consumed by
    another application written in Java with Jakarta EE. Similarly, a Jakarta EE application
    can create resources that can be consumed by a C# application.


    REST resource consuming clients do not always have to be external applications.
    A single application written as a collection of microservices will use the REST
    architecture as a way for the different services to communicate with each other.
    As a platform-agnostic communication means, the HTTP protocol allows the implementation
    of REST resources to be completely abstracted from the client.


    The Jakarta RESTful Web Services specification ^([^(107)](#fn107)) is the Jakarta
    EE standard for creating REST web services on the platform. The specification
    defines a number of interfaces and annotations for creating sophisticated web
    services in combination with other Jakarta EE specifications like the Jakarta
    Contexts and Dependency Injection.


    This chapter introduces you to the Jakarta RESTful Web Services specification.
    You will learn how to create different types of web resources using the very simple
    set of API constructs from the specification, along with how it integrates with
    other Jakarta EE specifications to create a cohesive platform for developing modern
    applications.


    The chapter will also take a look at the Eclipse MicroProfile REST client for
    consuming REST resources in a typesafe way. By the end of this chapter, you will
    have a solid foundation in creating web services on Jakarta EE and using the Eclipse
    MicroProfile Client.


    ## Modelling REST Services


    REST web services are called resources because they represent application resources.
    The actual resource being represented is domain specific. Designing REST web services
    to expose resources to consuming clients entails crafting the web resources along
    the lines of what operations can be carried out on a given resource. As the REST
    architecture is based on HTTP, resources are exposed as HTTP paths . Identifying
    what operations can be carried out on a resource can clarify what HTTP paths those
    operations can be exposed on.


    Once the set of operations and their corresponding HTTP paths are identified,
    then the application data format would also need to be considered. As HTTP is
    language agnostic, it can be used to expose resources in any number of formats
    including JSON, XML, and plain text. This is important because different clients
    will want the same resource in different formats. The issue of resource format,
    however, is becoming less of a major consideration because the JSON format has
    emerged as the lingua franca of the Web. Thus, it is mostly the default format
    for exposing resources over HTTP. That notwithstanding, the issue of resource
    formats merits consideration especially when the resources are being exposed to
    different clients.


    With the application paths and data format considered, the next step is to map
    HTTP methods^([^(108)](#fn108)) to the identified paths. This step entails mapping
    the right HTTP method to each corresponding action that can be performed on the
    resource in question.


    ### The User Resource


    Let us model a REST resource for the User entity looked at extensively in the
    previous chapter on Jakarta Persistence. For our User resource, we want to allow
    a client to create, update, find a user by an ID, get all users , search a user,
    find all users with a certain total conversion threshold, and finally remove a
    user. Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1) shows the various actions
    mapped to HTTP paths and their corresponding HTTP methods.


    Table 6-1


    shows the possible mappings for UserResource


    | Action | HTTP Path | Return Type | HTTP Method |

    | --- | --- | --- | --- |

    | Create a user | /users | Created user | POST |

    | Update a user | /users | Updated user | PUT |

    | Find a user by id | /users/<userId> | The user or an exception | GET |

    | Get all users | /users | List of users | GET |

    | Search users | /users/search | List of users | GET |

    | Find users by conversion | /users/<threshold> | List of users | GET |

    | Delete a user | /users | Void | DELETE |


    The table shows the mapping between the actions that can be carried out on a user
    resource and the corresponding HTTP paths and methods. Naming resource methods
    requires adhering to general good REST practices.^([^(109)](#fn109)) Because resources
    are consumed through the HTTP standard which is itself language or platform agnostic,
    it is important to name resources in a way that is intuitive, simple, and consistent.
    Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1) will serve as the discussion context
    for the rest of the chapter.


    ## Jakarta REST Resources


    For ease of application maintenance, REST resources should be organized in a hierarchical
    manner. Oftentimes, an application will have a base path where all other resource
    paths are accessed relative to. For instance, the currency conversion API from
    [`https://api.apilayer.com/currency_data`](https://api.apilayer.com/currency_data)
    has all the currency conversion resource methods hosted relative to the currency_data
    path. This can be said to be the root application path or root resource for the
    currency conversion API from apilayer.com.


    ### The Root Resource


    In Jakarta REST, the root resource is defined as a subclass of the jakarta.ws.rs.core.Application
    class. Listing [6-1](#531256_1_En_6_Chapter.xhtml#PC1) shows the root resource
    declaration for the jwallet application.


    ```

    @ApplicationPath("api")

    public class RootResourceConfiguration extends Application {

    }

    Listing 6-1

    shows the root resource declaration

    ```


    The root resource class is declared as a subclass of the Application class. This
    class contains three methods that can be overridden to explicitly register resource
    classes, extensions, and properties. Most of the time, you would not need to override
    these methods as done in Listing [6-1](#531256_1_En_6_Chapter.xhtml#PC1).


    The class is annotated @ApplicationPath and passed the value “api.” This annotation
    defines the root resource for the application. All resources in the application
    will be accessed through the base or root path /api.'
  trans: '

    # 6. 使用 Jakarta EE REST API 实现 REST


    表述性状态转移（REST）架构是一种用于现代应用的无状态、基于 HTTP 的通信标准。该架构最初由 Roy Fielding 博士在其博士论文中提出^(¹⁰⁶)，它已成为在不同语言和框架编写的应用之间实现简单、无状态、可预测、快速且基于表述的通信的事实标准。例如，使用
    Python 的 Django 框架编写的应用可以拥有 REST 资源，这些资源可以被另一个使用 Java 和 Jakarta EE 编写的应用消费。同样，Jakarta
    EE 应用也可以创建资源，供 C# 应用消费。


    消费 REST 资源的客户端并不总是外部应用。一个由微服务集合构成的单一应用，也会使用 REST 架构作为不同服务之间相互通信的方式。作为一种与平台无关的通信手段，HTTP
    协议允许 REST 资源的实现对客户端完全透明。


    Jakarta RESTful Web Services 规范 ^(¹⁰⁷) 是在该平台上创建 REST Web 服务的 Jakarta EE 标准。该规范定义了一系列接口和注解，用于结合其他
    Jakarta EE 规范（如 Jakarta Contexts and Dependency Injection）创建复杂的 Web 服务。


    本章将向您介绍 Jakarta RESTful Web Services 规范。您将学习如何使用该规范中非常简单的 API 结构创建不同类型的 Web 资源，以及它如何与其他
    Jakarta EE 规范集成，形成一个用于开发现代应用的统一平台。


    本章还将介绍 Eclipse MicroProfile REST 客户端，用于以类型安全的方式消费 REST 资源。学完本章后，您将掌握在 Jakarta
    EE 上创建 Web 服务以及使用 Eclipse MicroProfile Client 的坚实基础。


    ## 建模 REST 服务


    REST Web 服务之所以被称为资源，是因为它们代表了应用资源。所代表的实际资源是特定于领域的。设计 REST Web 服务以向消费客户端暴露资源，需要根据可以对给定资源执行的操作来设计
    Web 资源。由于 REST 架构基于 HTTP，资源被暴露为 HTTP 路径。确定可以对资源执行哪些操作，可以明确这些操作可以在哪些 HTTP 路径上暴露。


    一旦确定了操作集及其对应的 HTTP 路径，就需要考虑应用数据格式。由于 HTTP 与语言无关，它可以用于以多种格式暴露资源，包括 JSON、XML 和纯文本。这一点很重要，因为不同的客户端可能希望以不同的格式获取相同的资源。然而，资源格式的问题正变得越来越不重要，因为
    JSON 格式已成为 Web 的通用语言。因此，它通常是 HTTP 上暴露资源的默认格式。尽管如此，资源格式的问题仍然值得考虑，特别是当资源暴露给不同的客户端时。


    在考虑了应用路径和数据格式之后，下一步是将 HTTP 方法^(¹⁰⁸)映射到已识别的路径。这一步需要将正确的 HTTP 方法映射到可以对相关资源执行的每个相应操作。


    ### 用户资源


    让我们为上一章关于 Jakarta Persistence 中详细讨论的 User 实体建模一个 REST 资源。对于我们的 User 资源，我们希望允许客户端创建、更新、按
    ID 查找用户、获取所有用户、搜索用户、查找具有特定总转换阈值的所有用户，最后删除用户。表 6-1 显示了映射到 HTTP 路径及其对应 HTTP 方法的各种操作。


    表 6-1


    显示了 UserResource 的可能映射


    | 操作 | HTTP 路径 | 返回类型 | HTTP 方法 |

    | --- | --- | --- | --- |

    | 创建用户 | /users | 创建的用户 | POST |

    | 更新用户 | /users | 更新后的用户 | PUT |

    | 按 ID 查找用户 | /users/<userId> | 用户或异常 | GET |

    | 获取所有用户 | /users | 用户列表 | GET |

    | 搜索用户 | /users/search | 用户列表 | GET |

    | 按转换阈值查找用户 | /users/<threshold> | 用户列表 | GET |

    | 删除用户 | /users | 空 | DELETE |


    该表显示了可以对用户资源执行的操作与相应的 HTTP 路径和方法之间的映射。命名资源方法需要遵循通用的良好 REST 实践。^(¹⁰⁹) 由于资源是通过 HTTP
    标准（其本身与语言或平台无关）消费的，因此以直观、简单且一致的方式命名资源非常重要。表 6-1 将作为本章剩余部分的讨论背景。


    ## Jakarta REST 资源


    为了便于应用维护，REST 资源应以层次结构的方式组织。通常，应用会有一个基础路径，所有其他资源路径都相对于该路径进行访问。例如，来自 [`https://api.apilayer.com/currency_data`](https://api.apilayer.com/currency_data)
    的货币转换 API 将所有货币转换资源方法都托管在相对于 currency_data 路径的位置。这可以称为 apilayer.com 货币转换 API 的根应用路径或根资源。


    ### 根资源


    在 Jakarta REST 中，根资源被定义为 `jakarta.ws.rs.core.Application` 类的子类。清单 6-1 显示了 jwallet
    应用的根资源声明。


    ```

    @ApplicationPath("api")

    public class RootResourceConfiguration extends Application {

    }

    清单 6-1

    显示了根资源声明

    ```


    根资源类被声明为 `Application` 类的子类。此类包含三个方法，可以重写它们以显式注册资源类、扩展和属性。大多数情况下，您不需要像清单 6-1 那样重写这些方法。


    该类使用 `@ApplicationPath` 注解，并传递值 `"api"`。此注解定义了应用的根资源。应用中的所有资源都将通过基础路径或根路径 `/api`
    进行访问。

    '
- fmt: '### A Jakarta REST Resource


    A REST resource in Jakarta REST is defined as a Java class. This class will have
    a path that matches an HTTP path. The class then is said to be hosted at that
    path. Listing [6-2](#531256_1_En_6_Chapter.xhtml#PC2) introduces the `UserResource`
    to implement the various resources identified in Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1).


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    }

    Listing 6-2

    shows the first UserResource class

    ```


    The `UserResource` class is a POJO with a number of Jakarta REST annotations.
    These annotations transform this POJO into a REST HTTP resource even though we
    are yet to add to any resource methods. The `@Consumes` and `@Produces` annotations
    both determine the Multipurpose Internet Mail Extensions (MIME^([^(110)](#fn110)))
    media type that the methods in the resource class can consume and produce. As
    JSON is the most popular data exchange format across the Web and within microservices
    applications, the constant `MediaType.APPLICATION_JSON` is passed to both annotations.
    This constant is a `String` with the value `application/json`.


    The `@Path` annotation is passed the value `"users"`, designating this class as
    hosted at the path `/api/users`. This annotation takes a value that denotes the
    HTTP resource path at which the annotated object will be hosted. Remember the
    root or base path is set as `"api"` through the `@ApplicationPath` on the `RootResourceConfiguration`
    class as shown in Listing [6-1](#531256_1_En_6_Chapter.xhtml#PC1). The declaration
    shown in Listing [6-2](#531256_1_En_6_Chapter.xhtml#PC2) creates a resource at
    the path `/api/users` that when accessed by a client will cause the Jakarta REST
    runtime to instantiate an instance of the `UserResource` to serve the request.


    The runtime is able to map the `/users` to be hosted at the base path `/api` because
    in the `RootResourceConfiguration`, the `getClasses` method is not overridden.
    This means, by default, all resource classes will be scanned and added as child
    resources of this root resource.


    ### HTTP Methods


    With the resource class in place, we can start implementing the HTTP methods shown
    in Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1). A resource method in Jakarta
    REST is a Java method annotated with any of the requisite annotations denoting
    the HTTP method the Java method responds to. There are seven annotations that
    map to the corresponding HTTP methods for creating resource methods. These are
    `@POST`, `@GET`, `@PUT`, `@DELETE`, `@PATCH`, `@HEAD`, and `@OPTIONS`.


    #### @POST


    The `@POST` annotation on a resource class method denotes the method as responding
    to HTTP POST requests. Listing [6-3](#531256_1_En_6_Chapter.xhtml#PC3) shows the
    `createUser` method in the `UserResource` class annotated `@POST`.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @POST

    public UserResponse createUser(CreateUserRequest createUserRequest) {

    return userService.createUser(createUserRequest);

    }

    }

    Listing 6-3

    shows the @POST method

    ```


    The `createUser` method is annotated `@POST`, meaning it responds to HTTP POST
    requests. In the absence of any explicit `@Path` annotation, this method will
    be hosted at `/api/users` path. A POST request to that path will cause the runtime
    to invoke the `createUser` method on an instance of the `UserResource` class.
    So far, everything is pure Java with a few annotations. The method consumes a
    strongly typed Java class, the `CreateUserRequest`.


    The `@Consumes` annotation at the class level means that the `createUser` method
    consumes JSON. By consuming JSON, we mean the client will post a JSON representation
    of the Java type that the method consumes, in this case the `CreateUserRequest`.
    When the runtime matches the client request to this method, the request body,
    in this case JSON string, will be passed to an artifact called a message body
    reader.


    ##### Message Body Readers


    A message body reader is an instance of the parameterized `jakarta.ws.rs.ext.MessageBodyReader<T>`
    interface that takes the `InputStream` of a `MediaType` and converts it to `T`,
    where `T` is some Java type. Each message body reader is associated with a single
    `MediaType` whose `InputStream` it can transform into a Java type. The runtime
    ships with a number of message body readers for the popular `MediaTypes`. You
    do not need to provide an instance of the `MessageBodyReader` unless you want
    to customize the conversion process.


    ##### Message Body Writers


    A message body writer is the opposite of a message body reader in that it takes
    a Java type and converts it to the type represented by the `MediaType` it is associated
    with. The message body writer takes the Java type instance and writes it to the
    output stream that is returned to the client. Similar to the body reader, you
    generally will only provide your own custom writer implementation when you need
    to do some customization of the process. The `UserResponse` object returned by
    the `createUser` method will equally be transformed into JSON and written to the
    output stream of the response sent to the client.


    The HTTP request shown in Listing [6-4](#531256_1_En_6_Chapter.xhtml#PC4) will
    be mapped to the `CreateUserRequest` Java type automatically by the automatically
    provisioned message body reader.


    ```

    POST http://localhost:3003/account/api/users

    Content-Type: application/json

    {

    "firstName":"John",

    "lastName":"Jakes",

    "email":"a@b.com",

    "userRegion":"AFRICA",

    "birthDay":"08-02-1975",

    "password":"_myStrong_pswd&^_I"

    }

    Listing 6-4

    shows a sample POST request

    ```


    The JSON in the request body will be mapped to the `CreateUserRequest` shown in
    Listing [6-5](#531256_1_En_6_Chapter.xhtml#PC5).


    ```

    public class CreateUserRequest {

    private String firstName;

    private String lastName;

    private String email;

    private LocalDate birthDay;

    private UserRegion userRegion;

    private String password;

    }

    Listing 6-5

    shows the CreateUserRequest

    ```


    The actual implementation of the resource method is completely business specific.
    The REST runtime will transform the request body to the method parameter and hand
    it over to you. As declared in Listing [6-3](#531256_1_En_6_Chapter.xhtml#PC3),
    if the client passes no method body or an empty string, the method parameter will
    be `null`. This means you will have to do null-check on the passed value. To prevent
    this, the REST spec integrates with the Jakarta Bean Validation specification
    to allow declarative validation.'
