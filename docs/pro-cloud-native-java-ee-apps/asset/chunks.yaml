    ## 企业应用——它们是什么？


    企业软件应用可以定义为一个组织为特定目标市场解决特定问题而开发的、具有相当复杂度的多层应用程序。不同类型的组织对向市场提供的任何特定企业应用抱有不同期望。营利性企业期望获得收入回报；非营利组织则期望某种意识形态的推进。无论组织类型和提供的软件类型如何，所有企业应用确实具有一些共同特征，这些特征使得它们的开发具有相当难度。


    一个典型的应用通常包含三层：用户界面、中间层和数据存储。用户界面是最终用户实际与应用交互的地方。中间层是“编排”部分，负责处理用户界面与数据仓库之间的交互。数据仓库指的是用于将应用生成的数据存储到持久化存储机制中的数据库管理系统。无论应用是单体架构还是微服务架构，这些层通常贯穿整个应用。


    用户界面可以是传统的 HTML 页面（针对为人类交互开发的应用），也可以是 RESTful 端点（针对供其他应用消费的应用）。“用户界面”这一术语已演变为包含特定应用的最终客户端与该应用交互的节点。中间层或服务层通常包含处理安全、数据仓库事务以及与内部和/或外部其他服务交互等功能的构件。


    从工程角度来看，所有具有相当复杂度的应用都需要其开发平台提供某些核心功能。平台提供以下列举功能的程度取决于平台的维护者、社区和目标市场。然而，通常可以预期，任何面向企业应用开发的平台都应具备这些功能。


    ### 依赖管理


    无论应用是单体架构还是微服务集合，应用的每个组件都有需要管理的依赖项。对于一个具有相当复杂度的应用，某个组件会依赖其他组件，而这些组件又会进一步依赖其他组件。所选软件开发平台应提供自动化此类复杂依赖管理的机制。对于
    Jakarta EE 平台，Jakarta 上下文和依赖注入 API 是管理应用依赖的主要方式。CDI 不仅帮助您自动化依赖管理，还提供了其他附加功能，帮助您创建松散耦合、可扩展且易于维护的应用。


    ### RESTful Web 服务


    现代企业应用通常以一组 RESTful Web 服务的形式暴露，供客户端消费。主要客户端可以是纯 JavaScript 应用，它是整个应用微服务的一部分。其他客户端可以是第三方应用。无论采用何种应用开发范式，开发平台都应具备用于开发现代
    RESTful 服务的可靠 API。对于 Jakarta EE，Jakarta RESTful Web 服务 API 是该平台上开发 REST Web 服务的标准
    API。


    ### 数据持久化


    每个应用都会以某种方式生成和存储数据。生成的数据可能来自应用本身，也可能从某些外部服务检索而来，还可能是用户创建的数据。无论数据如何生成，几乎所有企业应用都需要将此类数据存储到持久化数据存储中。数据库管理系统可以是传统的关系型数据库管理系统（RDBMS）或
    NoSQL 数据存储。开发平台必须提供用于创建、读取、更新和删除此类数据的 API 结构。这些 API 结构还应内置某种形式的事务管理。对于 Jakarta
    EE 平台，Jakarta 持久化 API 提供了所需的 API 结构，用于将 Java 对象转换并映射到 RDBMS 数据库表记录，以及持久化、检索、更新和删除这些记录。


    ### 辅助云功能


    以上是贯穿大多数企业应用的三个核心传统功能。除了这些核心平台功能外，现代云原生应用还需要一些辅助功能，以便能够在云环境中部署和自动管理。以下各节概述了最流行的云原生辅助功能。


    ### 健康检查


    对于部署到 Kubernetes 等编排工具并由其管理的云原生应用，应用需要能够回答两个简单问题：你是否存活？如果是，你是否准备好接受请求？对这些问题的回答将决定编排工具是否将请求路由到该应用实例。Eclipse
    MicroProfile 项目提供了健康检查 API，用于创建就绪性和存活性的端点，这些端点可被查询以获取上述问题的响应。


    ### 容错


    每个应用都会在某个时刻发生故障。云原生应用应能够优雅地从任何此类故障中恢复。Eclipse MicroProfile 容错 API 提供了开发此类容错云原生应用所需的所有结构。


    ### 配置


    云原生应用应将其配置外部化，以便配置值可以更改并针对不同环境进行设置，而无需更改应用代码。Eclipse MicroProfile 配置 API 提供了管理应用配置的
    API。


    ### 指标


    应用指标提供了对应用状态的洞察。云原生应用应能够生成有意义的指标，这些指标可以被收集和分析，以便在必要时采取纠正措施。Eclipse MicroProfile
    的指标 API 提供了一组 API，用于在可预测的端点生成应用指标。


    ## JWallet 简介


    本书的案例研究应用名为 JWallet，这是一个基于 Jakarta EE 平台构建的云原生微服务金融应用，用于存储和执行货币交易，展示了各种 API 及其协同使用方法。在本章中，我们将结合本章前面讨论的核心功能和辅助功能，对应用进行整体概览。后续章节将详细介绍每个
    API。


    ### JWallet – 设置


    Apache Maven^(⁶³)依赖解析和构建管理系统是开发 Jakarta EE 应用最流行的依赖和构建管理工具。JWallet 被设置为一个多模块 Maven
    应用，包含三个微服务（账户、钱包和汇率）和一个通用模块（核心），如图 3-1 所示。


    ![](img/531256_1_En_3_Fig1_HTML.jpg)


    截图展示了 JWallet 设置项目，其中包含属于微服务的账户、钱包和汇率，核心是一个通用模块。


    图 3-1


    JWallet 项目结构

    '
- fmt: '#### A Note on IDE


    The IDE used for the screenshots and writing the reference code for this book
    is the IntelliJ IDE. However, you do not need to use the same IDE. Any Java IDE
    that supports Apache Maven should be sufficient.


    The `grafana`, `jaeger`, and `prometheus` folders contain configuration files
    for the Grafana, Prometheus, and Jaeger projects. Grafana ^([^(64)](#fn64)) and
    Prometheus ^([^(65)](#fn65)) are open source projects that scrape, organize, and
    display metrics exposed by an application through Eclipse MicroProfile metrics,
    while Jaeger^([^(66)](#fn66)) is a project that implements the open tracing^([^(67)](#fn67))
    specification.


    The `account` module contains the account microservice that is responsible for
    handling user accounts. The `core` module contains classes and interfaces common
    to all the other services. The `rate` module contains the exchange rate microservice.
    This service is in charge of making external calls to a currency exchange rate
    service for converting between various currencies in the application. Finally,
    the `wallet` module is the central place where transactions take place. It is
    the module responsible for creating wallets and debit and credit transactions.
    It is also the module responsible for implementing querying for wallets, transactions,
    and balances.


    The application is managed by a single Project Object Model xml file (`pom.xml`^([^(68)](#fn68)))
    in the root folder. This `pom` file is where the base dependencies and modules
    are declared. The main dependencies for this application are the Jakarta EE and
    Eclipse MicroProfile dependencies.


    Listing [3-1](#531256_1_En_3_Chapter.xhtml#PC1) shows the declaration of the Jakarta
    EE full platform dependency. Line 5 sets the scope of the dependency to `provided`.
    This means that our application is not going to ship any Jakarta EE jar files
    on the produced artifacts. The full platform implementation is expected to be
    provided by the underlying compatible implementation that the application will
    be run with. Our application only declares its dependency on the platform and
    leaves the provision of the actual implementation of the various Jakarta EE APIs
    to the server. Maven will add it to the classpath used for compilation and testing,
    but not the runtime classpath.


    ```

    jakarta.platform

    jakarta.jakartaee-api

    9.1.0

    provided


    Listing 3-1

    Jakarta EE dependency

    ```


    Listing [3-2](#531256_1_En_3_Chapter.xhtml#PC2) shows the declaration of the Eclipse
    MicroProfile dependency. Similar to the Jakarta EE dependency, the EMP dependency
    also has its scope set to `provided`, again, meaning that the application expects
    the underlying compatible runtime implementation to provide the EMP implementations.


    This kind of separation of application and platform dependency is one of the key
    reasons why Jakarta EE platform is well suited for developing modern applications.
    The separation results in the shipment of minimal application deployment artifacts.
    In a cloud-native environment where continuous development, testing, and deployment^([^(69)](#fn69))
    are the standard, the smaller the deployment artifacts, the faster and cheaper
    that turnaround becomes.


    ```

    org.eclipse.microprofile

    microprofile

    5.0

    pom

    provided


    Listing 3-2

    MicroProfile 5 dependency

    ```


    Listing [3-3](#531256_1_En_3_Chapter.xhtml#PC3) shows the declaration of the various
    maven modules that make up the application. From the perspective of maven, you
    can have as many modules as your application desires. Each module can be a fully
    functional application, as is the case in our project with the `rate`, `wallet`,
    and `account` modules. You can also create dependencies between the modules. Again,
    in JWallet, the three other modules have a dependency on the `core` module.


    ```

    core

    wallet

    rate

    account


    Listing 3-3

    JWallet modules

    ```


    Listing [3-4](#531256_1_En_3_Chapter.xhtml#PC4) shows the declaration of dependencies
    used for application tests. Every application should have automated testing. Because
    we are only interested in these dependencies for testing, they are scoped to the
    test phase. This means that they will only be available for the test compilation
    and execution phase.


    ```

    org.junit.jupiter

    junit-jupiter

    5.8.1

    test


    org.testcontainers

    testcontainers

    1.16.3

    test


    org.testcontainers

    junit-jupiter

    1.16.3

    test


    org.glassfish.jersey.core

    jersey-client

    3.0.4

    test


    org.glassfish.jersey.inject

    jersey-hk2

    3.0.4

    test


    org.glassfish.jersey.media

    jersey-media-json-binding

    3.0.4

    test


    org.glassfish.jersey.media

    jersey-media-json-processing

    3.0.4

    test


    Listing 3-4

    Test dependencies

    ```


    The application declares three plugins in the build element of the `pom` file
    as shown in Listing [3-5](#531256_1_En_3_Chapter.xhtml#PC5). The first one is
    the OpenLiberty^([^(70)](#fn70)) maven plugin. OpenLiberty is an open source Jakarta
    EE–compatible implementation from IBM. It is one of many available implementations
    that you can choose from to run your Jakarta EE applications. This plugin allows
    us to run our application through maven without having to set up the server manually.
    The other two plugins are the maven war^([^(71)](#fn71)) and failsafe plugins^([^(72)](#fn72))
    for packaging and running integration tests, respectively. Because these dependencies
    are declared in the base `pom` file, they are available to all the modules declared
    in the `modules` element.


    ```

    io.openliberty.tools

    liberty-maven-plugin

    3.5


    22.0.0.3


    ${project.build.directory}/liberty/wlp/usr/shared/resources


    org.apache.derby

    derby


    org.apache.maven.plugins

    maven-war-plugin

    3.3.2


    org.apache.maven.plugins

    maven-failsafe-plugin

    3.0.0-M6


    integration-test

    verify


    Listing 3-5

    JWallet build section of the root pom.xml

    ```


    The `pom` file for the `core` module shown in Listing [3-6](#531256_1_En_3_Chapter.xhtml#PC6)
    is very minimal with no additional dependencies and a notable exception being
    it is packaged as a `jar` file. This is because the `core` module will be depended
    upon by the other three modules for common functionality, but itself isn’t a microservice
    that is deployable, hence packaged as a `jar` to be included in the other modules/microservices.
    This `core` module will act as the orchestration module through which the other
    modules communicate with each other.


    ```

    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.core

    jar

    core


    Listing 3-6

    Core module pom.xml

    ```


    The `pom.xml` files of the `account` and `rate` microservices are similar to that
    of the `wallet` microservice as shown in Listing [3-7](#531256_1_En_3_Chapter.xhtml#PC7).
    They are very minimal with the only dependency being that of the `core` module.
    Any dependency that is exclusive to any given module can be declared in that module’s
    `pom` file. Also note that their packaging format is `war`. This means they can
    be deployed as stand-alone applications to an application server. In our case,
    the OpenLiberty server will be used to run everything.


    ```

    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.wallet

    war


    ${project.groupId}

    jwallet.core

    ${project.version}


    wallet


    Listing 3-7

    Wallet module pom.xml

    ```


    The application is bundled as a collection of container images that can be deployed
    and managed by docker, docker compose, and Kubernetes. The entry point for creating
    the container images is a `Dockerfile` file in each module folder. The `Dockerfile`
    of the `wallet` microservice is shown in Listing [3-8](#531256_1_En_3_Chapter.xhtml#PC8).


    ```

    FROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi

    COPY --chown=1001:0 src/main/liberty/config /config

    COPY --chown=1001:0 src/main/liberty/derby-10.14.2.0.jar /opt/ol/wlp/usr/shared/resources

    COPY --chown=1001:0 target/*.war /config/apps

    EXPOSE 3001

    RUN configure.sh

    Listing 3-8

    Wallet module Dockerfile

    ```'
