- fmt: '### Custom Converters


    If you need to pass custom types through the configuration mechanism and none
    of the converters will get the job done, you can create your own custom converter
    and register it with the Config runtime. Listing [7-3](#531256_1_En_7_Chapter.xhtml#PC3)
    shows a custom converter for the `ConvertCurrencyRequest` type.


    ```

    public class CurrencyRequestConverter implements Converter {

    @Override

    public ConvertCurrencyRequest convert(final String value) {

    if (value == null || value.isBlank()) {

    throw new NullPointerException("Value must not be null or empty string");

    }

    final String[] split = value.split(",");

    if (split.length != 3) {

    throw new IllegalArgumentException("The resulting array has less than 3 elements.");

    }

    return  ConvertCurrencyRequest

    .builder()

    .sourceCurrency(split[0])

    .targetCurrency(split[1])

    .amount(new BigDecimal(split[2])).build();

    }

    }

    ```


    Listing [7-3](#531256_1_En_7_Chapter.xhtml#PC3) shows the `CurrencyRequestConverter`.
    A custom Config converter needs to implement the parameterized `org.eclipse.microprofile.config.spi.Converter<T>`,
    passing in the type that the converter will convert. The specification expects
    custom converter implementations to throw a `NullPointerException` if a null value
    is passed for conversion. This is done in the first check in the `CurrencyRequestConverter`.


    The implementation then splits the passed string using the expected comma separator
    into an array. Remember config values are passed as raw Strings. And so even though
    the target type is a custom type, the passed config value will just be a comma-separated
    list of field values of the target type. The custom converter then checks if the
    resulting array length is three, because the target class, shown in Listing [7-4](#531256_1_En_7_Chapter.xhtml#PC4),
    has three fields.


    ```

    public class ConvertCurrencyRequest {

    private String sourceCurrency;

    private String targetCurrency;

    private BigDecimal amount;

    }

    ```


    Listing [7-4](#531256_1_En_7_Chapter.xhtml#PC4) shows the target `ConvertCurrencyRequest`
    type.


    The custom converter then constructs a `ConvertCurrencyRequest` using the builder
    pattern, passing in each field taken from the array. This way, custom `ConvertCurrencyRequest`
    can be passed as config values and read automatically to make currency conversions
    without having to make REST calls to the application. This is especially suited
    to batch jobs and interfacing with legacy applications.


    As an example, the preceding converter can be used to read `ConvertCurrencyRequest`
    config values from a database that was populated by a legacy COBOL application.
    Because jwallet already has a custom database config source (Listing [7-2](#531256_1_En_7_Chapter.xhtml#PC2))
    and now a custom converter, the application can be used to interface with a legacy
    application without much need for refactoring. The legacy application will fill
    the database, and jwallet will read and convert the currencies.


    ## Config Value


    The third of the config trio is the actual config value. The whole essence of
    the Config specification is to abstract away all possible sources of application
    configuration values into a transparent, single view in the form of config sources.
    Using these config sources, you can then get config values based on the keys for
    each value needed.


    For the given configuration `convert_request="USD,GHS,5"`, there are six different
    ways to get the config value using the Config API. This configuration should get
    mapped to the `ConvertCurrencyRequest` type. What happens in the absence of a
    value for a given property request depends on the retrieval method. These retrieval
    methods are as follows.


    ### The Config Bean


    Config values can be retrieved by injecting an `org.eclipse.microprofile.config.Config`
    bean. This bean resolves the property value by searching through all available
    config sources. The ordinal of the config sources determine which config value
    is returned when the same property is found in more than one config source. Listing
    [7-5](#531256_1_En_7_Chapter.xhtml#PC5) shows the use of the Config bean to retrieve
    the property `convert_request="USD,GHS,5"`.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    Config config;

    public ConvertCurrencyResponse batchConvertWithConfig() {

    ConvertCurrencyRequest request = config.getValue("convert_request", ConvertCurrencyRequest.class);

    return convert(request);

    }

    }

    ```


    Listing [7-5](#531256_1_En_7_Chapter.xhtml#PC5) shows the Config bean for retrieving
    config values.


    Listing [7-5](#531256_1_En_7_Chapter.xhtml#PC5) shows the use of the Config bean
    to get configuration values. In the `batchConvertWithConfig` method, the `getValue`
    method is called on the injected Config bean. This method takes the key of the
    configured property, in this case, `convert_request` and the target type. Because
    we have a custom converter for the `ConvertCurrencyRequest`, we just pass it as
    the second parameter type. The method returns an instance of `ConvertCurrencyRequest`
    representing the read and converted property. If the value associated with the
    passed property key resolves to an empty string or null, a `java.util.NoSuchElementException`
    will be thrown.


    ### Direct Injection of Target Type


    You can directly inject the target type using `@Inject` and a qualifier as shown
    in Listing [7-6](#531256_1_En_7_Chapter.xhtml#PC6).


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @ConfigProperty(name = "convert_request")

    ConvertCurrencyRequest convertCurrencyRequest;

    public ConvertCurrencyResponse batchConvertWithSimpleProperty() {

    return convert(convertCurrencyRequest);

    }

    }

    ```


    Listing [7-6](#531256_1_En_7_Chapter.xhtml#PC6) showing the direct injection of
    an expected config value.


    Listing [7-6](#531256_1_En_7_Chapter.xhtml#PC6) shows the direct injection of
    the `ConvertCurrencyRequest` using `@Inject` and the `@ConfigProperty` qualifier.
    This qualifier takes two parameters: `name` and `defaultValue`. If the `name`
    parameter is omitted, then the runtime will default to using the `class_name.injection_point_name`,
    where `injection_point_name` is the field name or parameter name, and `class_name`
    is the fully qualified name of the class being injected to. The second parameter
    is the `defaultValue`.


    The `defaultValue` parameter acts as the lowest config source because it becomes
    a fallback to when no value is set. If this is omitted like done in Listing [7-6](#531256_1_En_7_Chapter.xhtml#PC6)
    and there is no value set, then a deployment exception will be thrown and the
    application cannot be deployed.


    ### Optional Injection


    Config values can be read by injecting optional types. Rather than directly injecting
    the target type as done in Listing [7-6](#531256_1_En_7_Chapter.xhtml#PC6), the
    target value can be wrapped in a `java.util.Optional<T>` value as shown in Listing
    [7-7](#531256_1_En_7_Chapter.xhtml#PC7).


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @ConfigProperty(name = "convert_request")

    Optional convertRequest;

    public ConvertCurrencyResponse batchConvert() {

    return convertRequest.map(this::convert).orElseGet(ConvertCurrencyResponse::new);

    }

    }

    ```


    Listing [7-7](#531256_1_En_7_Chapter.xhtml#PC7) shows injecting config values
    as `Optional` type.


    Listing [7-7](#531256_1_En_7_Chapter.xhtml#PC7) shows retrieving config values
    through the injection of an `Optional` type wrapping the target value. Similar
    to the direct injection, the `Optional` field is also annotated with the same
    `@ConfigProperty` annotation. However, as an `Optional` type, if the value associated
    with the passed key, in this case `convert_request`, resolves to an empty string
    or null, an empty `Optional` is returned instead of a `DeploymentException` being
    thrown. A default value can also be passed as the second parameter to the `@ConfigProperty`
    qualifier.'
