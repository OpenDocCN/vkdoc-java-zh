    \n`@Fallback`注解也可以传入一个类，而不是使用`fallbackMethod`参数。传入的类必须是`org.eclipse.microprofile.faulttolerance.FallbackHandler<T>`接口的实现。该接口接受它所代理的方法的返回类型。清单[8-2](#531256_1_En_8_Chapter.xhtml#PC2)展示了`RateCalcFallback`类中的`FallbackHandler`实现。\n\
