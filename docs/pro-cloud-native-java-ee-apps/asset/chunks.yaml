    # 5. 使用 Jakarta EE 持久化进行持久化


    每个应用程序在执行过程中都需要在某个时刻将数据存储到持久化数据存储中。数据存储可以简单如一个平面文件，也可以复杂如一个完整的数据库管理系统。数据存储充当应用程序的单一事实来源。例如，你在银行的账户余额就存储在某种形式的数据存储中。这个单一数据是银行识别其为你保管了多少钱的唯一事实来源。


    无论应用程序使用何种语言和平台编写，将应用程序数据存储到持久化数据存储的过程通常涵盖三大类别，即数据建模、数据持久化和数据检索。在 Java 企业版中，Jakarta
    持久化 API 是一个功能完备的规范，允许你通过使用注解和直观的接口来实现这三个广泛的应用程序数据持久化类别。


    本章介绍如何使用 Jakarta 持久化 API（JPA）将数据持久化到关系数据库。目标不是教你关于 JPA 的所有知识，而是让你掌握满足非常常见的应用程序数据持久化需求所需的基本知识。如需更全面的
    JPA 概述和参考，请查阅规范^(¹⁰⁰)文档。本章分为数据建模、数据持久化和数据检索三个主要部分。


    本章中的所有示例都使用 Postgres 数据库作为底层数据库。然而，只要你使用 JPA 构造，相同的原则应适用于所有数据库引擎。学完本章后，你应该能够熟练使用
    JPA 规范将应用程序数据持久化到关系数据库。

    '
- fmt: '# JPA at a Glance


    The Jakarta Persistence API, popularly known as JPA, is the Jakarta EE specification
    that defines how applications can model, store into, and retrieve data from relational
    databases. JPA makes heavy use of annotations to prevent your Java artifacts from
    having to extend or implement interfaces from the API. JPA helps you solve the
    object-relational impedance mismatch by giving you the constructs to map plain
    Java classes to relational database tables.


    As a Java developer, you are very familiar with object-oriented programming and
    design. However, this paradigm does not translate very well when it comes to database
    management. The JPA API allows you to model and query your data in a familiar
    Java context without having to dive deep into the technical aspect of relational
    database management systems. It also abstracts from the underlying database, leaving
    the handling of the different databases to the runtime. Except in very advanced
    cases, you as a developer will not have to know much about the database that the
    application uses.


    It is important to note that JPA does not replace SQL or database systems knowledge.
    What JPA does is to make it easy for Java developers to be able to model, persist,
    and query data in a much more “Java way” than otherwise. That notwithstanding,
    some knowledge of SQL is required to be able to make full use of the JPA API.


    ## The JPA Runtime


    Throughout this chapter, there will be references to the JPA runtime. The runtime
    is the actual implementation of the Jakarta Persistence specification that carries
    out your JPA “instructions” issued through the various API constructs. It translates
    the high-level JPA constructs to low-level, database-specific schemas and queries.
    As discussed in the early chapters, Jakarta EE is made up of individual specifications,
    with each specification having different implementations. The JPA specification
    also has implementations that ship with the different Jakarta EE containers. Some
    of the popular implementations are Hibernate and EclipseLink.


    ## Data Modelling


    The modelling aspect of JPA is handled almost entirely by annotations found in
    the `jakarta.persistence` package. These annotations transform POJOs into JPA
    entities that can be modelled based on their interrelationships and hierarchies
    and subsequently mapped to relational database tables. For instance, one entity
    might extend another, contain a list of another type, and itself be contained
    in a collection in yet another class. All these can be mapped to relational database
    entity relations using the annotations found in the `jakarta.persistence` package.


    ## Data Persistence


    The central artifact for persisting, updating, and querying data in JPA is the
    `EntityManager` interface. This interface has all the methods needed to get data
    into the database, update, and query the data. As is the norm on the Jakarta EE
    platform, the underlying JPA specification implementation provides an implementation
    for the `EntityManager` interface at runtime.


    ## Querying


    Querying data is equally as important as persisting the data. JPA has two APIs
    for querying data, namely, the Java Persistence Query Language and the Criteria
    API. These two constructs allow you to write queries that are known ahead of time
    and much more dynamic, search-type queries that come up at runtime. The `EntityManager`
    interface has methods for creating queries using these two API constructs.


    With the Jakarta Persistence API, you can create applications with complex data
    hierarchies and relationships, mapped to relational databases all through the
    much familiar Java language. This makes using the JPA API a critical toolset in
    the toolbox of every Jakarta EE developer. The rest of this chapter discusses
    the trio itemized earlier.


    # Data Modelling with JPA


    ## The Simplest Unit


    The simplest unit of a JPA artifact is a Plain Old Java Object, or POJO. Listing
    [5-1](#531256_1_En_5_Chapter.xhtml#PC1) shows a `User` POJO that will be transformed
    into an entity.


    ```

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-1

    shows the User POJO

    ```


    Listing [5-1](#531256_1_En_5_Chapter.xhtml#PC1) shows a very basic `User` Java
    class. To map this class to a relational database table, such that each field
    is mapped to a table column, we need to transform it into a JPA entity. The primary
    annotation for transforming a Java class to a JPA entity is the `@Entity` annotation.
    Listing [5-2](#531256_1_En_5_Chapter.xhtml#PC2) shows the `User` class now transformed
    into a JPA entity.


    ```

    @Entity

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-2

    showing the User entity

    ```


    Listing [5-2](#531256_1_En_5_Chapter.xhtml#PC2) shows the `User` entity. With
    this, the `User` class is now a JPA entity that will be mapped to a database table.
    The name of the database table to which this class will be mapped is by default
    the name of the entity class, in this case `User`. To customize the table name,
    the `@Table` annotation can be used as shown in Listing [5-3](#531256_1_En_5_Chapter.xhtml#PC3).


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-3

    shows the User entity with a customized table name

    ```


    Listing [5-3](#531256_1_En_5_Chapter.xhtml#PC3) shows the use of the `@Table`
    annotation to customize the relational database table name to which this entity
    will be mapped. With these annotations, the `User` class is now a JPA entity that
    will be mapped to the relational database table `wallet_user`, with its instances
    mapped to rows in the table.


    ## Primary Key Generation


    Even though the `User` entity shown in Listing [5-3](#531256_1_En_5_Chapter.xhtml#PC3)
    will be mapped to the relational database table `wallet_user`, it does not have
    a primary key. In relational databases, the primary key is the technical unique
    identifier of each row in the table. The `User` entity, however, has not declared
    a primary key. To fix this, Listing [5-4](#531256_1_En_5_Chapter.xhtml#PC4) shows
    an updated version of the `User` class with a primary key field.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-4

    shows the updated User entity

    ```


    Listing [5-4](#531256_1_En_5_Chapter.xhtml#PC4) shows the `User` entity, now with
    a field of type `Long` named `id`. This field is annotated with `@Id` and `@GeneratedValue(strategy=GenerationType.AUTO)`.
    The `@Id` annotation tells the runtime that the primary key of the `User` table
    should be mapped to this field. The allowed field types for the `@Id` annotation
    are Java primitive types or their corresponding wrappers, `String`, `java.util.Date`,
    `java.sql.Date`, `java.math.BigDecimal`, and `java.math.BigInteger`. The runtime
    takes care of mapping the annotated field to the requisite, corresponding type
    of the underlying database used.'
