    Listing 4-42

    showing the UserResponse event observer as the MessageCenter bean

    ```


    Listing [4-42](#531256_1_En_4_Chapter.xhtml#PC42) shows the `MessageCenter` bean
    with a `sendUserSms` method. This method takes a single parameter of type `UserResponse`.
    This parameter determines the type of events that this observer will be notified
    of. The parameter is annotated with the `@Observes` annotation, telling the CDI
    runtime that this method observes events of the annotated type. When the `UserResponse`
    event is fired in the `UserServiceDecorator` bean, this method will be automatically
    called by the container and passed the `UserResponse` instance that was passed
    to the `fire` method of the `Event` interface in the `UserServiceDecorator` bean.
    Even though there is absolutely no compile-time dependency between the bean that
    fires the event and the one that observes it, at runtime, these beans will communicate
