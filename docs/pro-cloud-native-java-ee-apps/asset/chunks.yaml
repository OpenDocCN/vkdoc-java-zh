    #### @Liveness


    在 HealthCheck bean 上使用 @Liveness 限定符，会创建一个健康检查来确定应用程序是否正在运行。在云环境中，如果此调用失败并返回 DOWN
    状态，例如，kubelet 可以使用此信息丢弃该容器实例并用更健康的实例替换它。要创建 @Liveness 健康检查，请使用 @Liveness 注解一个
    HealthCheck bean，如清单 10-3 所示。


    ```

    @ApplicationScoped

    @Liveness

    public class HelloLiveness implements HealthCheck {

    LocalDateTime init = LocalDateTime.now(ZoneOffset.UTC);

    @Override

    public HealthCheckResponse call() {

    LocalDateTime now = LocalDateTime.now(ZoneOffset.UTC);

    Duration upDuration = Duration.between(init, now);

    return HealthCheckResponse.builder()

    .up()

    .name("rate_service_live")

    .withData("up_since", upDuration.toMinutes())

    .build();

    }

    }

    清单 10-3

    展示了一个 @Liveness 健康检查实现

    ```


    清单 10-3 展示了 HelloLiveness bean 中的 @Liveness 健康检查实现。此实现简单地返回 UP 状态以及一个自由格式的数据，显示服务已运行了多少分钟。这个自由格式的数据可以是健康检查实现希望返回给客户端的任何内容。对此
    @Liveness 实现的一个示例调用返回的数据如清单 10-4 所示。


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": 2

    },

    "name": "rate_service_live",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    清单 10-4

    展示了一个存活健康检查响应

    ```


    清单 10-4 展示了来自 @Liveness 检查的 HealthCheckResponse JSON 表示形式。有了这些信息和 HTTP 状态码 200，kubelet
    将知道该应用程序实例已启动并正在运行。


    #### @Startup


    @Startup 是一种健康检查，允许应用程序创建自定义的启动健康检查，这些检查可用于在存活探针接管之前进行某种形式的特定于应用程序的验证。在云环境中，此健康检查流程将映射到
    Kubernetes 启动探针。@Startup 适用于你的应用程序依赖外部服务的情况。在这种情况下，你可能希望在应用程序投入使用之前确保外部服务已启动并正在运行。清单
    10-5 展示了 HelloStartup bean 中的启动健康检查实现。


    ```

    @ApplicationScoped

    @Startup

    public class HelloStartup implements HealthCheck {

    CountDownLatch countDownLatch = new CountDownLatch(5);

    LocalDateTime upSince = LocalDateTime.now(ZoneOffset.UTC);

    @Override

    public HealthCheckResponse call() {

    countDownLatch.countDown();

    return countDownLatch.getCount() == 0

    ? HealthCheckResponse.named("rate-startup")

    .withData("up_since", upSince.toString())

    .up()

    .build()

    : HealthCheckResponse.down("rate-startup");

    }

    }

    清单 10-5

    展示了一个 @Startup 健康检查实现

    ```


    清单 10-5 展示了一个 @Startup 健康检查实现，它简单地倒计时到五，然后返回 UP。对 /health/started 端点的一个示例调用返回的数据如清单
    10-6 所示。


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": "2022-08-14T17:26:33.363745328"

    },

    "name": "rate-startup",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    清单 10-6

    展示了启动健康探针返回的数据

    ```

