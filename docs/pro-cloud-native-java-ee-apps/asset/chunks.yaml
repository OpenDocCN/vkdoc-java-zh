    \n如清单[8-2](#531256_1_En_8_Chapter.xhtml#PC2)所示，`handle`方法实现调用了传入的`ExecutionContext`对象的`getParameters`方法来获取方法的参数，选取第一个参数，并返回一个默认值。清单[8-3](#531256_1_En_8_Chapter.xhtml#PC3)再次展示了`RateService`Bean，但这次使用了`RateCalcFallback`处理器，而不是类自身的方法。\n\
    \n```java\n@ApplicationScoped\npublic class RateService {\n    @Inject\n    @RestClient\n\
    \    RateResource rateResource;\n\n    @Fallback(RateCalcFallback.class)\n   \
