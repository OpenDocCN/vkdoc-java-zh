    ##### 事务回滚


    在实体管理器操作过程中，可能会发生错误。一个典型的例子是约束冲突。我们目前看到的 User 实体没有验证。然而，任何应用程序中的每个实体都会根据业务上下文对其字段设置某种形式的验证约束。在
    Jakarta EE 平台上，Jakarta Bean Validation 规范^(¹⁰²)是对构件声明约束的默认方式。清单 5-34 展示了更新后的 User
    实体，其字段上带有验证约束。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    @NotEmpty

    private String firstName;

    @Column(nullable = false)

    @NotEmpty

    private String lastName;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    @NotNull

    @Past

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    @Embedded

    @Valid

    private Address address;

    @OneToOne(mappedBy = "user", cascade = CascadeType.ALL)

    @Valid

    private UserCredentials userCredentials;

    @OneToMany(mappedBy = "accountOwner", cascade = CascadeType.ALL)

    private List transactionHistory =

    new ArrayList();

    private transient int age;

    }

    清单 5-34

    展示了带有约束的 User 实体

    ```


    许多验证约束的含义不言自明，例如，`@NotNull` 表示该字段不应为 null。`dateOfBirth` 字段上的 `@Past` 注解要求设置的值必须是过去的时间。`Address`
    和 `UserCredentials` 上的 `@Valid` 注解告诉运行时将验证级联到被注解的字段类型。因此，当 User 实体被验证时，验证将级联到这两个带有
    `@Valid` 注解的字段，并且如果它们各自的字段带有约束注解，也会被验证。带有约束的 `UserCredentials` 实体如清单 5-35 所示。


    ```

    @Entity

    public class UserCredentials extends AbstractEntity {

    @Column(unique = true, length = 30, nullable = false)

    @NotEmpty

    @Email

    private String email;

    @Column(nullable = false)

    @NotEmpty

    @Size(min = 8, max = 30)

    private String password;

    private String salt;

    @OneToOne

    @JoinColumn(name = "wallet_user_id")

    private User user;

    @ElementCollection

    private Set emailHistory;

    }

    清单 5-35

    展示了带有约束的 UserCredentials 实体

    ```


    `email` 字段上的 `@Email` 注解将对任何传入的电子邮件强制执行有效的电子邮件约束。`@Size` 注解将密码的最小字符长度设置为 8，最大设置为
    30。`Address` 实体对其地址字段也有类似的约束。


    当在 `EntityManager` 实例上调用 `persist` 方法时（在此例中，是调用 `userRepository` 上下文实例上的 `save`
    方法），就在实体被持久化之前，运行时会自动验证这些约束。当在类路径上找到 Bean 验证提供程序时，此验证会自动启用。


    如果任何验证约束失败，Bean 验证运行时将抛出 `ConstraintViolationException`，这将导致事务回滚。在这种情况下，事务将不会被提交，而是被回滚。所有这些操作都是默认完成的，无需您进行任何设置。如果没有抛出异常，实体将被合并到持久化上下文中，并且当方法成功退出时，事务将被提交，同时将数据刷新到数据库。


    #### 更新和删除数据


    持久化实体是通过 `EntityManager` 上的 `persist` 方法完成的。更新同样是通过 `merge` 方法完成的。清单 5-36 展示了
    `BaseRepository` 类的 `merge` 方法。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E merge(E entity) {

    return em.merge(entity);

    }

    }

    清单 5-36

    展示了 UserRepository 中的 merge 方法

    ```


    `merge` 方法同样接收一个实体，并将该实体的状态合并到当前活动的持久化上下文中。与持久化类似，会执行验证，如果一切正常，当事务提交时，持久化上下文会被刷新。


    删除实体是通过 `EntityManager` 的 `remove` 方法完成的。此方法接收一个实体实例，并首先从持久化上下文中移除该实体。当持久化上下文被合并时，该行数据会被删除。


    #### 级联操作


    各种关联注解 `@OneToOne`、`@ManyToOne`、`@OneToMany` 和 `@ManyToMany` 都有一个 `cascade` 参数，可以设置为任何
    `CascadeType` 枚举类型。清单 5-34 中展示的 User 实体，向 `TransactionHistory` 的 `@OneToMany`
    关联传递了 `CascadeType.ALL` 值。这意味着持久化运行时应该将对父实体（此处为 User 实体）的操作级联到子实体（此处为 TransactionHistory）。


    因此，当持久化一个 user 实例时，如果列表中包含任何 `TransactionHistory` 实例，这些实例也会被持久化。实际上，对父实体的所有操作都将级联到子实体。很多时候，是否进行级联的决定将取决于业务领域。


    例如，一条经验法则是关联可以被遍历的方向。在 User 实体中，从用户遍历到其交易历史是很自然的。从历史记录回溯到其用户确实会很奇怪。因此，将操作从 User
    级联到其 TransactionHistory 是合理的。


    #### 回调方法


    JPA 提供了回调方法，实体可以实现这些方法，以便在检查点操作执行之前执行某些操作。`@PrePersist`、`@PreUpdate`、`@PostLoad`
    和 `@PostRemove` 是可以放置在实体内部或实体监听器中的方法上的注解，用于标记为回调。正如这些注解的名称所暗示的，用其中任何一个注解标注方法，都会导致该方法在其监听的事件发生之前被调用。清单
    5-37 展示了带有 `@PostLoad` 回调方法的 user 实体，用于计算用户的年龄。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    private transient int age;

    @PostLoad

    private void computeAge() {

    age = (int) ChronoUnit.YEARS

    .between(birthDay, LocalDate.now(ZoneOffset.UTC));

    }

    }

    清单 5-37

    展示了 @PostLoad 回调

    ```


    `computeAge` 方法使用 `@PostLoad` 注解，其实现简单地计算当前日期与用户生日之间的年数，并将结果赋值给瞬态的 `age` 字段。此方法将在实体从数据库加载后立即被调用。当像我们这样在实体内部创建回调方法时，该方法可以访问实体的字段。实体内部回调方法的签名是返回
    void 且不接受参数。在实体内部使用回调方法的一个注意事项是，你不能向其中注入任何依赖项。

