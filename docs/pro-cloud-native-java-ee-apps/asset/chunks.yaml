  trans: '

    ## CDI 生产者


    CDI 中的生产者是一种将 Bean 或不属于应用程序代码的 Java 类型转换为可在应用程序中使用的 CDI Bean 的方式。我们将 CDI Bean
    定义为任何具有无参构造器或至少有一个使用 `@Inject` 注解的构造器的 Java 类。然而，应用程序中可能需要某些 Java 类型，但它们不一定是有效的
    CDI Bean。例如，清单 4-19 展示了 `BaseRepository` Bean 中一个类型为 `EntityManager` 的字段注入点。


    ```

    public abstract class BaseRepository {

    @Inject

    EntityManager em;

    }

    清单 4-19

    展示尝试将平台类注入到应用程序定义的 Bean BaseRepository 中

    ```


    清单 4-19 展示了 `BaseRepository` Bean 中一个类型为 `EntityManager` 的字段注入点声明。尝试部署该应用程序将会失败，并显示错误信息：“在注入点
    @Inject com.example.jwallet.core.control.BaseRepository.em 处，对于带有限定符 @Default
    的类型 EntityManager 存在未满足的依赖关系”。CDI 容器报错指出该字段类型存在未满足的依赖关系。这意味着 CDI 运行时不知道如何实例化 `EntityManager`
    类的上下文实例。


    `EntityManager` 是一个 Jakarta EE 平台类。它是一个由 Jakarta Persistence 运行时提供实现的接口。像我们这样将其用作注入点类型是行不通的，因为
    CDI 无法实例化它。为了解决这个问题，我们可以使用生产者。借助 CDI 生产者，你可以告诉容器某个给定的 Bean 类型是在哪里“生产”的，这样每当有对该
    Bean 的上下文实例的请求时，容器就会去你的生产者那里获取实例。CDI 生产者有两种类型：生产者字段和生产者方法。


    ### 生产者字段


    生产者字段指的是从另一个 Bean 的字段中“生产”CDI Bean。清单 4-20 展示了一个生产者字段，它使用 CDI 的 `@Produces` 注解来“生产”`EntityManager`
    实例。


    ```

    public class ProducerFactory {

    @Produces

    @PersistenceContext

    EntityManager entityManager;

    }

    清单 4-20

    展示 EntityManager 生产者字段

    ```


    清单 4-20 展示了一个用于 `EntityManager` 类型的生产者字段。`ProducerFactory` Bean 有一个类型为 `EntityManager`
    的字段，该字段使用了 `@PersistenceContext` 和 `@Produces` 注解。`@PersistenceContext` 是 Jakarta
    Persistence API 中的一个注解，用于注入 `EntityManager` 实例。然而，由于这个注解不是 CDI 注解，因此返回的实例并非 CDI
    Bean。


    再次使用 `@Produces` 注解该字段，可以将 `@PersistenceContext` 注解返回的 `EntityManager` 实例转换为一个
    CDI Bean。实际上，我们是在使用 `@Produces` 注解将 Jakarta Persistence 创建的 `EntityManager` 实例转换为一个
    CDI Bean，并使其具备所有 CDI 服务。当 CDI 容器遇到 `BaseRepository` Bean（清单 4-19）中类型为 `EntityManager`
    的字段注入点时，它就知道应该到这个字段来获取上下文实例。


    生产者并不局限于生产普通的上下文实例。你可以显式地设置一个作用域，使其与生产的上下文实例相关联。如果没有显式指定作用域，则默认应用 `@Dependent`
    作用域。在清单 4-20 的示例中，生产的 `EntityManager` 上下文实例将处于 `@Dependent` 作用域。然而，为生产者字段设置显式作用域有一个注意事项。如果生产者字段在运行时被访问时包含
    `null` 值，并且它具有除 `@Dependent` 之外的任何其他作用域，那么容器将抛出 `IllegalProductException`。生产者字段可以是
    CDI 管理的 Bean 类中的静态或非静态的默认访问、受保护、公共或私有字段。


    #### 限定生产者字段


    你也可以使用限定符来限定生产者字段。假设 jwallet 使用了两个数据库——Apache Derby 和 Postgres。你可以有两个生产者字段，每个都用特定的限定符进行限定，这样你就可以注入并限定注入点。在关于限定符的章节中，我们创建了
    `@Wallet` 限定符作为一个简单的无参注解。然而，限定符可以接受参数。与其创建两个限定符来限定为每个数据库生产的 `EntityManager`，不如创建一个接受参数的单一限定符。在清单
    4-21 中，我们创建了 `@Database` 限定符，它接受一个类型为 `DB` 的参数。


    ```

    @Qualifier

    @Retention(RUNTIME)

    @Target({FIELD, TYPE, METHOD, PARAMETER})

    public @interface Database {

    DB value();

    enum DB {

    DERBY,

    POSTGRES

    }

    }

    清单 4-21

    展示 @Database 限定符定义

    ```


    清单 4-21 展示了 `@Database` 限定符，它有一个类型为 `DB` 的 `value()` 字段，用于向限定符传递参数。`DB` 是在限定符类中定义的一个枚举，包含两个字段：`DERBY`
    和 `POSTGRES`。清单 4-22 展示了如何使用 `@Database` 限定符来限定两个 `EntityManager` 生产者字段。


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.DERBY)

    @PersistenceContext(unitName = "jwallet-derby")

    EntityManager derby;

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet-postgres")

    EntityManager postgres;

    }

    清单 4-22

    展示使用 @Database 限定符来限定生产者字段

    ```


    清单 4-22 展示了 `ProducerFactory` Bean，它有两个生产者字段，类型都是 `EntityManager`。然而，这两个字段都使用了
    `@Database` 限定符进行限定。`derby` 字段生产者由 `@Database(DERBY)` 限定符限定，而 `postgres` 字段由 `@Database(POSTGRES)`
    限定符限定。


    这两个 `EntityManager` 字段关联到两个不同的持久化上下文，如传递给 `@PersistenceContext` 注解的 `unitName`
    参数的值所示（Jakarta Persistence 将在另一章中讨论）。现在我们有了两个相同类型的字段，它们生产相同类型但具有不同限定符的实例。清单 4-23
    展示了在 `BaseRepository` 中使用 derby `EntityManager` 生产者字段的情况。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(DB.DERBY)

    EntityManager em;

    }

    清单 4-23

    展示 derby 生产者字段的使用

    ```


    清单 4-23 展示了一个类型为 `EntityManager` 的注入点，该注入点使用了 `@Database(DERBY)` 限定符进行限定。在运行时，容器将使用
    `ProducerFactory` Bean 中 `derby` 字段生产的上下文实例来填充 `BaseRepository` Bean 中的 `em` 字段。通过这种方式，即使
    `EntityManager` Bean 不属于应用程序代码，通过 CDI 生产者字段结构，我们仍然能够将其转换为一个 CDI Bean。

    '
- fmt: '### Producer Methods


    Producer methods are similar to producer fields in the sense that they both produce
    contextual instances. Producer methods, however, produce their contextual instances
    based on their return types. A method annotated with `@Produces` will produce
    the return type of whatever it returns. A producer method can also take parameters.
    However, all parameters passed to a producer method are injection points and will
    be taken care of by the container, because producer methods are called automatically
    by the container. Listing [4-24](#531256_1_En_4_Chapter.xhtml#PC24) shows a producer
    method that produces `java.util.logging.Logger` objects.


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.DERBY)

    @PersistenceContext(unitName = "jwallet-derby")

    EntityManager derby;

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet-postgres")

    EntityManager postgres;

    @Produces

    public Logger getLog(final InjectionPoint injectionPoint) {

    return       Logger.getLogger(injectionPoint.getMember().getDeclaringClass().getName());

    }

    }

    Listing 4-24

    showing producer method produce Logger objects

    ```


    Listing [4-24](#531256_1_En_4_Chapter.xhtml#PC24) shows the `ProducerFactory`
    bean, this time with the producer method `getLog()`. This method returns a `java.util.logging.Logger`
    object. It also takes a parameter of type `InjectionPoint`. This parameter will
    be injected by the CDI container (an example of method injection). An `InjectionPoint`
    is a CDI component that contains metadata about an injection point. The `getLog`
    method implementation sets the name of the produced `Logger` to the class into
    which it’s being injected by calling `InjectionPoint#getMember#getDeclaringClass#getName()`.
    With the producer method in place, injecting a `Logger` instance is as simple
    as using `@Inject` on a field of type `Logger` as shown in Listing [4-25](#531256_1_En_4_Chapter.xhtml#PC25).


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(DERBY)

    EntityManager em;

    @Inject

    Logger logger;

    }

    Listing 4-25

    shows the injection of the Logger into the BaseRepository bean

    ```


    Listing [4-25](#531256_1_En_4_Chapter.xhtml#PC25) shows the `BaseRepository` with
    an additional field injection of type `Logger`. At runtime, the CDI container
    will consult the `getLog` producer method for contextual instances to satisfy
    this injection point. Because we have not set an explicit scope on the producer
    method and fields in the `ProducerFactory` bean, the produced contextual instances
    for both the `EntityManager` and `Logger` will be assigned to the `@Dependent`
    pseudo-scope.


    You generally will use producer methods to instantiate beans that require some
    form of custom initialization that you might not be able to do in the constructor
    of the bean. For instance, you might have to make an external call to a web service
    to initialize some bean. In such a case, you can use producer methods to transform
    the instance of the bean that you manually instantiate into a CDI-managed object.
    This is because beans that you manually instantiate are not managed by the CDI
    runtime. The access modifier of the producer method does not matter. It could
    also be static or nonstatic. Through the use of CDI producer construct, we have
    transformed another class that is not part of application code to a CDI bean.


    ### CDI Producers – Caveats


    There are a few things you need to be aware of when using CDI producers. The following
    will result in CDI definition errors at application boot time:


    *   You cannot annotate a producer method or field with `@Inject`.

    *   A producer method parameter cannot be annotated with `@Disposes`, `@Observes`,
    or `@ObservesAsync`.

    *   An interceptor may not define a producer method or field.


    ## Stereotypes


    Often in application development, especially using CDI, you will find yourself
    having different beans created for different purposes needing the same common
    set of metadata. For any nontrivial application, you could end up repeating the
    same set of metadata on beans a significant number of times. This could get quite
    tedious when you need to add functionality across all those beans.


    For instance, Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and [4-27](#531256_1_En_4_Chapter.xhtml#PC27)
    show the `WalletService` and `UserService` beans with their CDI metadata.


    ```

    @RequestScoped

    @Transactional

    public class UserService {

    }

    Listing 4-27

    shows the UserService bean with its metadata.

    ```


    ```

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    Listing 4-26

    showing the WalletService bean with its metadata

    ```


    Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and [4-27](#531256_1_En_4_Chapter.xhtml#PC27)
    both show two different CDI beans having the exact same CDI metadata. Both are
    request scoped and transactional. Even though both beans will carry out different
    functionalities, they do require the exact same set of CDI services. If we want
    to associate an interceptor (more on interceptors in the next section) with both
    beans, we would have to repeat the interceptor annotation on both beans. Clearly,
    repeating the same metadata over and over isn’t an ideal way to write code.


    The CDI specification provides the stereotype construct for grouping together
    commonly occurring architectural patterns into a single, common annotation. So
    for the beans showing in Listings [4-26](#531256_1_En_4_Chapter.xhtml#PC26) and
    [4-27](#531256_1_En_4_Chapter.xhtml#PC27), instead of repeating the same CDI annotations,
    stereotypes allow us to centralize them under one common annotation. In Listing
    [4-28](#531256_1_En_4_Chapter.xhtml#PC28), we create an `Action` stereotype that
    is `@RequestScoped` and `@Transactional`.


    ```

    @Stereotype

    @RequestScoped

    @Transactional

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    Listing 4-28

    showing the Action stereotype

    ```


    Listing [4-28](#531256_1_En_4_Chapter.xhtml#PC28) shows the `@Action` stereotype
    declaration. A CDI stereotype is a Java annotation annotated with `@Stereotype`.
    For the `@Action` stereotype, we declare that it’s `@RequestScoped` and `@Transactional`.
    The `@Target` of the stereotype is also set to `TYPE` because we want to only
    associate this stereotype with beans and not methods, fields, or parameters. All
    beans that are annotated with this stereotype will automatically be request scoped
    and transactional, just as if the beans have been explicitly annotated with those
    annotations. With the `@Action` stereotype declared, we can now refactor the `UserService`
