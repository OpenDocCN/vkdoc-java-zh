  trans: '

    ## JPA 概览


    Jakarta Persistence API（通常称为 JPA）是 Jakarta EE 规范，它定义了应用程序如何对关系数据库中的数据进行建模、存储和检索。JPA
    大量使用注解，以避免你的 Java 工件必须扩展或实现 API 中的接口。JPA 通过提供将普通 Java 类映射到关系数据库表的构造，帮助你解决对象-关系阻抗不匹配问题。


    作为一名 Java 开发者，你对面向对象编程和设计非常熟悉。然而，这种范式在数据库管理方面并不能很好地转换。JPA API 允许你在熟悉的 Java 上下文中对数据进行建模和查询，而无需深入钻研关系数据库管理系统的技术细节。它还抽象了底层数据库，将不同数据库的处理工作留给了运行时。除非在非常高级的情况下，否则作为开发者，你无需过多了解应用程序所使用的数据库。


    需要注意的是，JPA 并不能取代 SQL 或数据库系统知识。JPA 所做的是让 Java 开发者能够以更“Java 的方式”对数据进行建模、持久化和查询。尽管如此，要充分利用
    JPA API，仍然需要具备一定的 SQL 知识。


    ### JPA 运行时


    在本章中，会多次提到 JPA 运行时。运行时是 Jakarta Persistence 规范的实际实现，它执行你通过各种 API 构造发出的 JPA“指令”。它将高级的
    JPA 构造转换为低级的、特定于数据库的 schema 和查询。正如前几章所讨论的，Jakarta EE 由多个独立的规范组成，每个规范都有不同的实现。JPA
    规范也有随不同 Jakarta EE 容器一起提供的实现。一些流行的实现包括 Hibernate 和 EclipseLink。


    ### 数据建模


    JPA 的建模方面几乎完全由 `jakarta.persistence` 包中的注解处理。这些注解将 POJO 转换为 JPA 实体，这些实体可以根据它们的相互关系和层次结构进行建模，并随后映射到关系数据库表。例如，一个实体可能继承另一个实体，包含另一个类型的列表，并且自身又被包含在另一个类的集合中。所有这些都可以使用
    `jakarta.persistence` 包中的注解映射到关系数据库的实体关系。


    ### 数据持久化


    在 JPA 中，用于持久化、更新和查询数据的核心工件是 `EntityManager` 接口。该接口包含了将数据存入数据库、更新和查询数据所需的所有方法。按照
    Jakarta EE 平台的惯例，底层的 JPA 规范实现会在运行时为 `EntityManager` 接口提供实现。


    ### 查询


    查询数据与持久化数据同等重要。JPA 有两个用于查询数据的 API，即 Java 持久化查询语言（Java Persistence Query Language）和
    Criteria API。这两种构造允许你编写预先已知的查询，以及运行时出现的、更具动态性的搜索类查询。`EntityManager` 接口提供了使用这两种
    API 构造创建查询的方法。


    借助 Jakarta Persistence API，你可以创建具有复杂数据层次结构和关系的应用程序，并通过熟悉的 Java 语言将其映射到关系数据库。这使得
    JPA API 成为每位 Jakarta EE 开发者工具箱中的关键工具集。本章的其余部分将讨论前面列出的三个要点。


    ## 使用 JPA 进行数据建模


    ### 最简单的单元


    JPA 工件的最简单单元是普通 Java 对象，即 POJO。清单 5-1 展示了一个将被转换为实体的 User POJO。


    ```

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-1

    展示了 User POJO

    ```


    清单 5-1 展示了一个非常基础的 User Java 类。要将此类映射到关系数据库表，使得每个字段都映射到一个表列，我们需要将其转换为 JPA 实体。将
    Java 类转换为 JPA 实体的主要注解是 `@Entity` 注解。清单 5-2 展示了现在已转换为 JPA 实体的 User 类。


    ```

    @Entity

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-2

    展示了 User 实体

    ```


    清单 5-2 展示了 User 实体。至此，User 类现在是一个 JPA 实体，将被映射到一个数据库表。该类将被映射到的数据库表名称默认为实体类的名称，在本例中为
    `User`。要自定义表名，可以使用 `@Table` 注解，如清单 5-3 所示。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-3

    展示了具有自定义表名的 User 实体

    ```


    清单 5-3 展示了使用 `@Table` 注解来自定义该实体将被映射到的关系数据库表名。有了这些注解，User 类现在是一个 JPA 实体，将被映射到关系数据库表
    `wallet_user`，其实例将映射到表中的行。


    ### 主键生成


    尽管清单 5-3 中展示的 User 实体将被映射到关系数据库表 `wallet_user`，但它没有主键。在关系数据库中，主键是表中每一行的技术唯一标识符。然而，User
    实体尚未声明主键。为了解决这个问题，清单 5-4 展示了带有主键字段的 User 类的更新版本。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    清单 5-4

    展示了更新后的 User 实体

    ```


    清单 5-4 展示了 User 实体，现在有一个名为 `id` 的 `Long` 类型字段。该字段使用了 `@Id` 和 `@GeneratedValue(strategy=GenerationType.AUTO)`
    注解。`@Id` 注解告诉运行时，User 表的主键应映射到此字段。`@Id` 注解允许的字段类型是 Java 原始类型或其对应的包装类、`String`、`java.util.Date`、`java.sql.Date`、`java.math.BigDecimal`
    和 `java.math.BigInteger`。运行时负责将带注解的字段映射到所使用的底层数据库的相应类型。

    '
- fmt: '### Id Generation


    `id`字段上的第二个注解是`@GeneratedValue`注解。该注解用于通过`strategy`参数告知运行时如何生成主键值。`strategy`参数的类型为`GenerationType`，默认值为`AUTO`。`GenerationType`的可能取值包括`TABLE`、`SEQUENCE`、`IDENTITY`和`AUTO`。由于默认值为`AUTO`，清单[5-4](#531256_1_En_5_Chapter.xhtml#PC4)中展示的`User`实体可以简化为清单[5-5](#531256_1_En_5_Chapter.xhtml#PC5)所示的内容。


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    ```


    清单[5-5](#531256_1_En_5_Chapter.xhtml#PC5)展示了`User`实体的简化`id`生成。


    清单[5-5](#531256_1_En_5_Chapter.xhtml#PC5)展示了将主键生成策略设置为`AUTO`，即`@GeneratedValue`注解的默认值。清单[5-6](#531256_1_En_5_Chapter.xhtml#PC6)展示了图[5-1](#531256_1_En_5_Chapter.xhtml#Fig1)中声明的`User`实体所对应的数据库模式图。


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig1_HTML.jpg)


    该模式图描绘了钱包用户表，其中包含`first name`、`last name`、`user name`和`ID`字段。


    **图 5-1** 钱包实体模式


    ```sql

    create table wallet_user

    (

    id        bigint not null primary key,

    firstname varchar(255),

    lastname  varchar(255),

    username  varchar(255)

    );

    ```


    清单[5-6](#531256_1_En_5_Chapter.xhtml#PC6)展示了该实体对应的数据定义语言（DDL）。


    #### AUTO


    `AUTO`主键生成策略将如何生成主键的决策委托给底层运行时。这意味着应用程序要求JPA运行时根据字段类型和所使用的底层数据库引擎来选择最佳的主键生成策略。


    如果主键仅用作技术性的数据库唯一行标识符，那么`AUTO`策略就足够了。它也是开发和快速原型设计的理想选择。当模式生成由运行时完成时（我们将在本章后面讨论模式生成），`AUTO`也能发挥最佳效果。`AUTO`仅适用于整数类型的字段。


    #### TABLE


    `TABLE`生成策略是最灵活且可扩展性最强的生成策略。清单[5-7](#531256_1_En_5_Chapter.xhtml#PC7)展示了`User`实体使用`TABLE`生成策略进行主键生成。


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy=GenerationType.TABLE)

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    ```


    清单[5-7](#531256_1_En_5_Chapter.xhtml#PC7)展示了`User`实体使用`TABLE`主键生成策略。照此，运行时将负责创建ID表（如果使用了模式生成）。如果运行时未进行模式生成，则在应用程序启动之前，声明的ID表应该已经存在。


    ID表是一个包含两个字段的表——一个字符串类型和一个整数类型。第一列是表中所有生成器的主标识符。第二列（整数列）存储实际生成的ID序列。清单[5-8](#531256_1_En_5_Chapter.xhtml#PC8)展示了一个更详细的`TABLE`生成示例，其中我们通过`@TableGenerator`注解显式定义了ID生成表。


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @TableGenerator(name = "ID_Gen",

    table = "ID_GEN_TABLE",

    pkColumnName = "GENERATOR_NAME",

    pkColumnValue = "GENERATED_VALUE",

    valueColumnName = "GEN_VAL")

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "ID_Gen")

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    ```


    清单[5-8](#531256_1_En_5_Chapter.xhtml#PC8)展示了使用`@TableGenerator`注解显式指定ID表生成。该注解的第一个参数指定了生成器的名称。此名称随后被传递给`@GeneratedValue`注解的`generator`参数。`@TableGenerator`注解的其他参数如下：


    *   `table` – 指定此生成器使用的数据库表名。

    *   `pkColumnName` – 指定此表唯一标识符的列名。

    *   `pkColumnValue` – 指定表中`pkColumnName`列的实际值。

    *   `valueColumnName` – 指定用于存储ID序列的列名。


    这种`TABLE` ID生成将产生如清单[5-9](#531256_1_En_5_Chapter.xhtml#PC9)所示的数据库模式。


    ```sql

    create table id_gen_table

    (

    generator_name varchar(50) not null primary key,

    gen_val        numeric(38)

    );

    ```


    清单[5-9](#531256_1_En_5_Chapter.xhtml#PC9)展示了`User`实体对应的ID生成表。


    图[5-2](#531256_1_En_5_Chapter.xhtml#Fig2)展示了ID生成表对应的模式图。


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig2_HTML.jpg)


    该模式图描绘了一个ID生成表，其中包含生成器名称和生成器值。


    **图 5-2** ID生成表模式


    在应用程序运行时，JPA提供者（运行时实现）将为该表分配一个标识符块。默认的分配块大小为50。运行时将从此块中在内存中分配ID，直到达到分配大小；当请求ID时，会触发另一轮预分配，然后在内存中用于分配ID，依此类推。可以通过`@TableGenerator`自定义分配大小。您还可以设置`gen_val`列的初始值，对于整数类型，该值默认为零。


    #### SEQUENCE


    `SEQUENCE`标识生成策略与`TABLE`策略类似，用于底层数据库支持序列ID生成机制的情况。将`@GeneratedValue`的`strategy`设置为`SEQUENCE`将导致底层运行时为您创建所需的序列生成器。可以使用`@SequenceGenerator`显式创建序列生成表，这与我们在`TABLE`策略中使用`@TableGenerator`讨论的方式非常相似。


    #### IDENTITY


    `IDENTITY`序列生成策略用于底层数据库支持自动编号功能的情况。当向数据库插入一行时，引擎会自动为主键列分配一个值。`IDENTITY`非常依赖于数据库，因此在JPA应用程序中并不常用。'
  raw: '#### Id Generation


    The second annotation on the id field is the @GeneratedValue annotation . This
    annotation is used to tell the runtime how the primary key values should be generated
    through the strategy parameter. The strategy parameter is of type GenerationType
    and defaults to AUTO. The possible values for the GenerationType are TABLE, SEQUENCE,
    IDENTITY, and AUTO. With a default of AUTO, the User entity shown in Listing [5-4](#531256_1_En_5_Chapter.xhtml#PC4)
    can be simplified to what is shown in Listing [5-5](#531256_1_En_5_Chapter.xhtml#PC5).


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-5

    shows a simplified id generation for the User entity

    ```


    Listing [5-5](#531256_1_En_5_Chapter.xhtml#PC5) shows the primary key generation
    set to AUTO, the default for the @GeneratedValue annotation. Listing [5-6](#531256_1_En_5_Chapter.xhtml#PC6)
    shows the resulting database schema diagram for the User entity declared in Figure
    [5-1](#531256_1_En_5_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig1_HTML.jpg)


    A schema diagram depicts the wallet user table which contains first name, last
    name, and user name, and I D.


    Figure 5-1


    Wallet entity schema


    ```

    create table wallet_user

    (

    id        bigint not null primary key,

    firstname varchar(255),

    lastname  varchar(255),

    username  varchar(255)

    );

    Listing 5-6

    shows the corresponding data definition language (DDL) for the entity

    ```


    ##### AUTO


    The AUTO primary key generation strategy delegates the decision of how primary
    keys should be generated to the underlying runtime. What this implies is that
    the application is asking the JPA runtime to select the best primary key generation
    strategy based on the field type and underlying database engine used.


    In cases where the primary key is only used as a technical database unique row
    identifier, then the AUTO strategy should suffice. It also is an ideal choice
    for development and quick prototyping. AUTO also works best when schema generation
    is done by the runtime (we talk about schema generation later in the chapter).
    AUTO will work only for integral field types.


    ##### TABLE


    The TABLE generation strategy is the most flexible and extensible generation strategy.
    Listing [5-7](#531256_1_En_5_Chapter.xhtml#PC7) shows the User entity using the
    TABLE generation strategy for the primary key generation.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy=GenerationType.TABLE)

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-7

    shows the User entity using TABLE primary key generation

    ```


    Listing [5-7](#531256_1_En_5_Chapter.xhtml#PC7) shows the User entity with the
    TABLE primary key generation strategy. As is, the runtime will take care of creating
    the ID table (if schema generation is used). In the absence of schema generation
    by the runtime, the declared ID table should exist before the application starts.


    The ID table is a table with two fields – a string and an integral type. The first
    column is the primary identifier for all generators in the table. The second integral
    column stores the actual ID sequence being generated. A much more elaborate example
    of TABLE generation is shown in Listing [5-8](#531256_1_En_5_Chapter.xhtml#PC8)
    where we explicitly define the ID generation table through the @TableGenerator
    annotation.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @TableGenerator(name = "ID_Gen",

    table = "ID_GEN_TABLE",

    pkColumnName = "GENERATOR_NAME",

    pkColumnValue = "GENERATED_VALUE",

    valueColumnName = "GEN_VAL")

    @GeneratedValue(strategy = GenerationType.TABLE,

    generator = "ID_Gen")

    protected Long id;

    private String firstName;

    private String lastName;

    private String username;

    }

    Listing 5-8

    shows the User entity with explicit table generation

    ```


    Listing [5-8](#531256_1_En_5_Chapter.xhtml#PC8) shows the use of the @TableGenerator
    annotation to explicitly specify the ID table generation. The first parameter
    of the annotation specifies the name of the generator. This name is then passed
    to the generator parameter of the @GeneratedValue annotation. The other parameters
    of the @TableGenerator annotation are as follows:


    *   table – This specifies the name of the database table for this generator.


    *   pkColumnName – This specifies the column name for the unique identifier for
    this table.


    *   pkColumnValue – This specifies the actual value of the pkColumnName in the
    table.


    *   valueColumnName – This specifies the column name of the column for storing
    the ID sequence.


    This TABLE ID generation will result in the DB schema shown in Listing [5-9](#531256_1_En_5_Chapter.xhtml#PC9).


    ```

    create table id_gen_table

    (

    generator_name varchar(50) not null primary key,

    gen_val        numeric(38)

    );

    Listing 5-9

    shows the resulting ID generation table for the User entity

    ```


    Figure [5-2](#531256_1_En_5_Chapter.xhtml#Fig2) shows the resulting schema diagram
    for the ID generation table.


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig2_HTML.jpg)


    A schema diagram depicts an I D generation table, which includes the generator
    name and generator value.


    Figure 5-2


    ID generation table schema


    At application runtime, the JPA provider (runtime, implementation) will allocate
    a block of identifiers for this table. The default allocation block is 50\. The
    runtime will then allocate IDs from this block from memory until it hits the size
    of the allocation, a request for an ID causes another round of preallocation,
    which will then be used in memory for assigning IDs, and so on. The allocation
    size can be customized through the @TableGenerator. You can also set the initial
    value of the gen_val column, which defaults to zero for integral types.


    ##### SEQUENCE


    The SEQUENCE identity generation strategy is similar to the TABLE strategy and
    is used where the underlying database supports the sequence ID generation mechanism.
    Setting the strategy of the @GeneratedValue to SEQUENCE will cause the underlying
    runtime to create the requisite sequence generator on your behalf. The @SequenceGenerator
    can be used to explicitly create sequence generation tables, much similar to what
    we discussed in the TABLE strategy using @TableGenerator.


    ##### IDENTITY


    The IDENTITY sequence generating strategy is used when the underlying database
    supports the autonumber feature. When a row is inserted into the database, the
    engine automatically assigns a value to the primary key column. IDENTITY is very
    much database dependent and thus isn’t used commonly in JPA applications.'
