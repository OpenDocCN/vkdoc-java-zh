    ## CDI Stereotypes and Metrics


    As discussed in the chapter on Jakarta Contexts and Dependency Injection, CDI
    stereotypes are a way to group common infrastructure annotations together under
    one annotation. Using the resulting stereotype on a bean is as if all the annotations
    that make up the stereotype are used individually on the bean.


    Consequently, when you annotate a stereotype with any of the Metrics annotations,
    the resulting bean will be treated by the Metrics runtime as if the metrics annotation
    was applied directly to the bean. The resulting names of the metrics are computed
    relative to the name and package of the bean itself, not of the stereotype.


    As an example, the `@Action` stereotype, developed in Chapter [4](#531256_1_En_4_Chapter.xhtml),
    is reproduced in Listing [9-19](#531256_1_En_9_Chapter.xhtml#PC19), annotated
    with `@Counted` and `@SimplyTimed`. These annotations will cause all beans that
    are annotated `@Action` to have their constructor and method invocations counted
    and simply timed, respectively.


    ```

    @Stereotype

    @RequestScoped

    @Counted

    @SimplyTimed

    @Transactional

    @Logged

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

    public @interface Action {

    }

    Listing 9-19

    showing the @Action stereotype with @Counted and @SimplyTimed

    ```


