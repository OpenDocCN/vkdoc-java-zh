    As shown in Listing [9-14](#531256_1_En_9_Chapter.xhtml#PC14), the `Histogram`
    metric returns statistical data for a given object that you want to track. Unlike
    the other metrics, you will need to inject the histogram as done in Listing [9-13](#531256_1_En_9_Chapter.xhtml#PC13)
    to have it automatically registered in the registry or manually register it.


    ### Manual Registration of Metrics


    The histogram metric can equally be manually instantiated and registered in the
    metrics registry by first injecting the `MetricRegistry` through CDI, then building
    the metadata through the `MetaData` interface, and finally calling the `histogram`
    method on the injected `MetricRegistry` instance to register and get a `Histogram`
    instance. Listing [9-15](#531256_1_En_9_Chapter.xhtml#PC15) shows these steps
    in code in the `RateService` bean.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    MetricRegistry registry;

    @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
    = true)

    public int countConversions() {

    int conversionCount = ThreadLocalRandom.current().nextInt(250, 500 + 1);

    Metadata metadata = Metadata.builder()

    .withName("count_conversions_histogram")

    .withDescription("A histogram for the count of conversions")

    .withDisplayName("A histogram")

    .build();

    Histogram manualHistogram = registry.histogram(metadata);

    manualHistogram.update(conversionCount);

    return conversionCount;

    }

    }

    Listing 9-15

    showing manual instantiation of the histogram metric

    ```


    Listing [9-15](#531256_1_En_9_Chapter.xhtml#PC15) shows the histogram metric manually
    instantiated in the `RateService` bean. The `MetricRegistry` is injected with
    `@Inject`. Then the builder pattern is used to build a `Metadata` object. This
    `Metadata` is exactly the same details you would have passed to the `@Metric`
    annotation. Then the `histogram` method is called on the `MetricRegistry` object,
    passing in the just built metadata object. This invocation returns a `Histogram`
    instance that can then be used to create histograms. The `Histogram` functionality
    will be the same no matter which construct is used to instantiate it.


    ## Metrics Metadata


    Metadata is all the information that helps describe a given metric. You can retrieve
    metadata about an individual metric or that of a given scope or the entire set
