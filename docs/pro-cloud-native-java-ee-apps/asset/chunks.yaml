    public void sendUserSmsAsync(

    @ObservesAsync @MessageOption(MessageOption.MessageType.SMS) final UserResponse
    userResponse) {

    //TODO --> 通过网关发送短信... 异步

    }

    public void sendEmail(

    @ObservesAsync @MessageOption(MessageOption.MessageType.EMAIL) final UserResponse
    userResponse) {

    //TODO --> 异步发送电子邮件

    }

    public void sendMessage(@ObservesAsync final UserResponse userResponse) {

    }

    }

    代码清单 4-50

    展示 MessageCenter 中的一个“捕获所有”事件观察者

    ```


    在代码清单 4-50 中，`sendMessage` 观察者将被任何 `Event<UserResponse>` 对象触发的所有事件调用，无论事件对象的限定符如何。原因是，在没有任何显式限定符的情况下，`sendMessage`
    观察者隐式地使用了内置的 `@Any` 限定符。`@Any` 限定符是一个“捕获所有”的限定符，适用于任何 CDI 工件，无论该工件的限定符是什么。在此示例中，无论哪个事件对象触发
    `UserResponse` 事件，`sendMessage` 观察者都会被调用。在使用 CDI 中的限定符时，需要牢记这一点。如果你需要将事物严格限制在你显式选择的限定符上，那么你应该确保使用你的限定符注解所有相应的构造，以避免微妙的错误。

