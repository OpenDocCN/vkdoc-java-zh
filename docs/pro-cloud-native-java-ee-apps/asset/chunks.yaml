    are defined in the TransactionPhase enum type in the jakarta.enterprise.event
    package. They are


    *   IN_PROGRESS – The observer is called when the event is fired. This is the
    default.


    *   BEFORE_COMPLETION – The observer is called during the before completion phase
    of the transaction.


    *   AFTER_COMPLETION – The observer is called during the after completion phase
    of the transaction.


    *   AFTER_FAILURE – The observer is called during the after completion phase of
    the transaction, only when the transaction fails.


    *   AFTER_SUCCESS – The observer is called during the after completion phase of
    the transaction, only when the transaction succeeds.'
