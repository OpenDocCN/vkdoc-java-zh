    ### 注入度量指标


    除了使用注解之外，您还可以在应用程序中直接注入类型为`meter`、`timer`、`counter`和`histogram`的度量指标。您可以使用`@Metric`注解结合`@Inject`将度量指标注入到字段、方法和参数中。`@Metric`注解支持各个度量指标所支持的所有元数据，例如名称、描述和绝对值。

