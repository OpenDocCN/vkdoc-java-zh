    Listing 4-41

    shows the actual process of firing the UserResponse event

    ```


    Listing [4-41](#531256_1_En_4_Chapter.xhtml#PC41) shows the amended `createUser`
    method in the `UserServiceDecorator` bean. The method, after persisting the `User`
    object into the database, calls the `fire` method on the injected event object,
    passing in the newly persisted `User` through the `UserResponse` object. This
    passed `UserResponse` object will be the payload of the fired event. As you can
    see, firing an event is as simple as calling the `fire` method, passing in the
    type of the `Event` interface. This simple call will cause an event to be fired
    that any component can subscribe to or observe. The `UserResponse` instance passed
    to the `fire` method of the `Event` bean will be passed to all event observers
    of the `UserResponse` type.


    ### The Event Observer


    The second part of the CDI event mechanism is the event observer. The observer
    is a subscriber to a particular event. The observers are paired to events by the
    container based on the types they observe. An observer that wants to be notified
    of the `UserResponse` event will have to observe a `User` event. Listing [4-42](#531256_1_En_4_Chapter.xhtml#PC42)
    shows the `User` event observer in the `MessageCenter` bean.


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes final UserResponse userResponse) {

    //TODO --> Send SMS through gateway... Blocking task

