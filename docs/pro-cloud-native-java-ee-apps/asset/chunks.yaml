    with @Column customizations and constraints on some fields. The first and last
    names are constrained to not be null. This means the database will enforce non-null
    checks for every insertion into the wallet_user table. The username column is
    set to not be nullable and to be unique. Its length is also set to 30 variable
    characters. The totalConversions field, which is a numeric field, is set to a
