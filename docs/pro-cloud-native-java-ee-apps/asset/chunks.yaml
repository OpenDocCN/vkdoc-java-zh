    一个针对路径 /health/ready 的示例就绪探针返回的健康数据如清单 10-2 所示。


    ```

    {

    "checks": [

    {

    "data": {},

    "name": "rate-readiness",

    "status": "UP"

    }

    ],

    "status": "UP"

