    # 14. Cloud-Native Jakarta EE Monoliths to Microservices


    Microservices software architecture is increasingly becoming the dominant choice
    for creating enterprise, cloud-native applications. The Jakarta EE platform, augmented
    by the Eclipse MicroProfile project, even though originally designed for large
    monolithic applications, has evolved to become a capable platform for developing
    microservice applications.


    This chapter explores general guidelines for breaking down a monolithic application
    to a set of microservices. It starts off by first exploring the pros and cons
    of monoliths, then explores the need, if any, for microservices, and finally offers
    strategies for migrating a monolith to microservices that is cloud-ready for deployment
    to a kubernetes cluster.


    ## Monoliths


    A monolithic application is one that has all the constituent parts bundled together
    as a single unit. A large number of enterprise applications out there are monolithic.
    Even before the rise in popularity of the microservices architecture, Jakarta
    EE, or then Java EE, applications have always been more of modular monoliths.
    A modular monolith is an architecture where core parts of the application are
    broken down into submodules within the application. So, for instance, a typical
    Jakarta EE application would have the UI layer, which could be written with Jakarta
    Faces or any JavaScript framework, then you have the services layer, which is
    typically made up of a combination of CDI beans and EJB session beans (EJBs are
    being supplanted by CDI) for managing database connections and application logic.


    Such an application might not necessarily have a REST component because the UI
    layer (if using Jakarta Faces) makes direct calls to the service layer. During
    packaging, this kind of application will be packaged as a single WAR file. But
    in actual sense, it’s much of a modular monolith, lending itself to easy migration
    to microservices if the need arises. The sample code of this book so far has been
    a cross between a pure microservices and a pure monolith.'
  trans: '

    ### 使用平台


    Jakarta EE 平台结合 MicroProfile 项目，为构建通用型企业应用提供了相当丰富的 API 集合。几乎所有核心功能需求都能在该平台中找到对应的
    API。例如，平台提供了用于依赖注入、数据持久化、REST Web 服务、WebSocket、配置和容错等功能的 API。


    你的首选 API 应始终是平台中已有的。使用第三方库需要仔细权衡，并且仅当平台中没有针对该功能的 API 时才应采纳。


    ### 制定包命名规范


    拥有标准化的包结构意味着组织中所有应用、模块和库都将具有相同的结构，从而便于新加入者快速上手。每个组织都不可避免地会有人事变动。拥有标准化的应用结构意味着无论由谁进行开发，应用的结构都保持不变。


    ### 谨慎选择运行时


    选择应用运行时需要谨慎，因为运行时会影响开发者的生产力。一个易于作为容器启动、快速、易于学习和采用的运行时，远比不具备这些特性的运行时更受欢迎。由于开发时选择的运行时最终将用于部署应用，因此选择一个开发者熟悉且能提升其生产力的运行时至关重要。


    ### 避免过度使用第三方库


    Java 生态系统拥有海量的第三方库，几乎可以解决所有应用开发任务。这些库可能看起来很吸引人，让人忍不住想要采用。但务必牢记，引入的每一个额外库都会成为应用维护负担的一部分。因此，应尽量减少第三方库的使用，仅将其作为最后的手段。


    ### 保持简单


    应用开发在很大程度上是一门艺术。在复杂性与简洁性之间找到恰当的平衡需要反复尝试。然而，简洁性应成为贯穿整个代码库的主题。保持简单有助于相对轻松地进行扩展、添加功能和修复错误。它还能帮助其他开发者更快地熟悉代码库。这些都是长期积累下来的内在优势。正如那句格言所说，简洁是终极的复杂。


    ### 建立约定


    拥有应用开发流程的约定对于维护一个支持生产力的系统至关重要。如何引导新加入者、创建新功能的标准操作流程是什么、如何处理生产环境中的错误，这些都是应用开发流程中应标准化的常规部分。SCRUM
    和 Kanban 等系统有助于创建一个为参与者提供例行流程的系统。无论选择哪种系统，都应支持尽可能自动化工作流程的结构。


    ### 充分记录文档


    从代码级别（内联注释、Javadoc）到 API 级别，再到业务级别，文档都应是应用开发流程中不可或缺的一部分。文档首先充当应用开发者的扩展记忆。覆盖尽可能多代码库的文档有助于不同的开发者处理应用的不同方面。它还能帮助新开发者更快地熟悉代码库。无论应用是带有用户界面的消费型应用，还是
    API 应用，为客户提供的文档都应是整个流程中的一个重要方面。


    ### 构建与依赖管理


    每个企业级 Jakarta EE 应用很可能都会使用两种主流构建和依赖管理工具之一——Maven 或 Gradle。这两种工具可以自动化许多常见的应用开发任务，例如管理传递性依赖和构建应用制品。无论选择哪种工具，都应将其标准化。所有服务都应使用所选定的构建工具。由于许多
    Jakarta EE 应用都是使用 Maven 构建的，我们推荐使用 Maven 而非 Gradle，这仅仅是因为该领域内用户的采用率。然而，Gradle
    同样是一个功能强大的构建工具，可以完成 Maven 能做的所有事情。选择哪种工具应基于哪种工具能带来最大的业务回报。


    有多种方法可以自动化部分文档流程。例如，MicroProfile OpenAPI 规范^(¹¹⁹) 提供了声明式的方法来记录 Jakarta REST 资源，这与
    Swagger API 非常相似。^(¹²⁰) 文档可以发布在中心位置，方便最终用户访问。无论选择哪种形式，都应鼓励和培养充分代码文档的文化，因为记录应用各个部分的“为什么”以及其使用方法的“怎么做”，是一项会在应用生命周期内产生复利效应的投资。


    ## 总结


    本章讨论了在部署应用之前应考虑的一般性问题。我们探讨了一些用于判断应用是否已准备好投入生产的指导原则，研究了部署指南，最后提供了一些关于创建长期存在、易于维护的应用的要点。


