    ### 通过继承进行组织


    到目前为止，我们只研究了 User 这一个实体。然而，一个应用程序很少会只包含单个实体。无论实体数量多少，很多时候都会有一组实体共有的字段。为每个实体重复这些字段是非常繁琐的。无论如何，使用像
    JPA 这样的抽象的全部意义，就在于在数据库环境中充分利用 Java 语言的面向对象特性。


    因此，可以将公共实体字段抽象到一个公共超类中，所有其他需要这些字段的类型都可以继承自该超类。User 实体的 `id`、`created` 和 `updated`
    字段是抽象到超类中的不错候选。这些字段自然也会出现在其他实体中。为了简化领域模型，让我们将这些字段以及其他一些公共字段抽象到一个超类中。清单 5-17 展示了一个包含一些公共字段的
    `AbstractEntity` 类。


    ```

    @MappedSuperclass

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    }

    清单 5-17

    展示了 AbstractEntity 类

    ```


    清单 5-17 展示了 `AbstractEntity`。这个类是一个带有 `@MappedSuperclass` 注解的抽象类。它是抽象的，因为其唯一目的是被其他类扩展。我们不希望对这个类进行任何具体的实例化。它有五个字段，都带有
    `protected` 修饰符，使其子类可以访问它们。`@MappedSuperclass` 注解将此类指定为映射信息应用于扩展它的实体的类。它本身不会有单独的表。


    现在，User 实体可以扩展 AbstractEntity，并且在数据库中，`AbstractEntity` 类的所有字段都将映射到 `wallet_user`
    表。清单 5-18 展示了更新后的 User 实体。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    }

    清单 5-18

    展示了扩展 AbstractEntity 的 User 实体

    ```


    现在，User 实体从其扩展的 `AbstractEntity` 中获取公共字段。更新后的 `wallet_user` 表数据库图如图 5-7 所示。


    ![](img/531256_1_En_5_Fig7_HTML.jpg)


    一个模式图描绘了包含以下字段的 wallet_user 表：生日、创建时间、创建者、编辑者、名字、姓氏、图片、总转换次数、更新时间、用户类型、用户名和 ID。


    图 5-7

    更新后的实体图


    `wallet_user` 表的结构仅因新增了 `createdBy` 和 `editedBy` 这两个字段而改变。它看起来仍然与图 5-6 中的完全一样。尽管从数据库角度来看结构保持不变，但从
    Java 角度来看，代码组织得更好，更易于阅读和维护。


    ### 可嵌入类


    可嵌入类是一个从封装对象中获取其标识的对象。在 JPA 中，可嵌入类是一个 Java 类，其字段映射到其封装实体的表中。清单 5-19 展示了一个可供其他实体使用的
    `Address` 可嵌入类。


    ```

    @Embeddable

    public class Address {

    protected String apartment;

    protected String street;

    protected String city;

    protected String state;

    protected String zip;

    private PhoneType phoneType;

    protected String phone;

    public enum PhoneType {

    MOBILE,

    FIXED,

    VOIP

    }

    }

    清单 5-19

    展示了 Address 可嵌入类

    ```


    `Address` 可嵌入类是一个 POJO，除了 `@Embeddable` 注解外，没有特殊的注解或映射。此注解向运行时表明，该类本身没有自己的标识，而是从其嵌入的实体中派生标识。任何嵌入了此
    `Address` 对象的实体，其所有字段都将映射到嵌入类的表中。清单 5-20 展示了嵌入了 `Address` 类的 User 实体。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    @Embedded

    private Address address;

    }

    清单 5-20

    展示了嵌入 Address 的 User 实体

    ```


    User 实体通过使用 `@Embedded` 注解嵌入了 `Address`。`wallet_user` 表将拥有 `Address` 类的所有字段映射到其中。图
    5-8 展示了更新后的 `wallet_user` 表。


    ![](img/531256_1_En_5_Fig8_HTML.jpg)


    一个模式图描绘了包含以下字段的 wallet_user 表：生日、创建者、编辑者、名字、姓氏、用户类型、城市、电话、电话类型、州、街道、邮编和 ID。


    图 5-8

    更新后的 wallet_user 表


    所有 `Address` 字段都映射到了 User 实体表。可嵌入类是另一种组织代码的方式，可以使代码更清晰、更易于阅读和维护，同时利用 SQL 在数据库中拥有大量列的能力。


    ### 关系


    JPA 是一个对象关系映射器。这个名称中的“关系”指的是实体之间能够拥有某种形式的关系。实体之间可以拥有的关系或关联类型通常分为四种，即：


    *   多对一

    *   一对一

    *   一对多

    *   多对多


    JPA 中有两种广义的实体关系类型，即：单值关系和集合值关系。


    #### 单值关系


    单值关系或关联是指一个实体与另一个实体实例之间存在关联，其中目标的基数^(¹⁰¹)为一。在 Java 中，这种关联意味着一个实体将目标实体的字段作为其属性之一。在数据库中，目标实体的主键将成为源实体表中的一个外键列。

    '
- fmt: '### Many-to-One


    The many-to-one relationship is an association where N number of entities are
    associated with one of a given target entity. There is always a single target
    entity from the perspective of the originating entities. Listing [5-21](#531256_1_En_5_Chapter.xhtml#PC21)
    shows a new entity, `TransactionHistory`, that saves the transaction history of
    a `User`.


    ```java

    @Entity

    public class TransactionHistory extends AbstractEntity {

    private String sourceCurrency;

    private String targetCurrency;

    private String amount;

    private LocalDateTime transactionDate;

    @ManyToOne

    private User accountOwner;

    }

    ```


    The `TransactionHistory` entity has an association with the `User` entity. This
    association is a many-to-one, in that many transactions can belong to the same
    user. The `@ManyToOne` annotation is used to denote this kind of association.
    From the perspective of every `TransactionHistory` instance, there is always a
    single user. In the database, a foreign key column will be created in the `TransactionHistory`
    table that points to the `wallet_user` table. Listing [5-22](#531256_1_En_5_Chapter.xhtml#PC22)
    shows the generated DDL for the `TransactionHistory` entity when mapped to the
    database.


    ```sql

    create table if not exists transactionhistory

    (

    id              bigint not null primary key,

    amount          varchar(255),

    created         timestamp,

    createdby       varchar(255),

    editedby        varchar(255),

    sourcecurrency  varchar(255),

    targetcurrency  varchar(255),

    transactiondate timestamp,

    updated         timestamp,

    accountowner_id bigint

    constraint fk_transactionhistory_accountowner_id

    references wallet_user

    );

    ```


    The `accountOwner_id` field is the foreign key column in the `TransactionHistory`
    table that references the `User` entity table. In JPA, the foreign key column
    is referred to as a join column. Because we did not explicitly specify any name
    for the join column, the default is the field name followed by an underscore and
    the name of the primary key column, in this case `id`. This column can be customized
    through the use of the `@JoinColumn` annotation.


    In the association shown in Listing [5-21](#531256_1_En_5_Chapter.xhtml#PC21),
    the `TransactionHistory` is said to be the owning side of the relationship because
    the foreign key column is found in its table. Thus, the owning side of an association
    is one that has the primary key of the target entity as a foreign key column.
    The `@JoinColumn` annotation is used on the owning side of the association to
    customize the foreign key column.


    By default, a single-valued relationship is loaded when the originating entity
    is loaded. This means when an instance of `TransactionHistory` is fetched from
    the database, its `accountOwner` field will be fetched as part of it. This behavior
    can be customized by passing a `FetchType` value to the `fetch` parameter of the
    `@ManyToOne` annotation.


    The directionality of this example association is unidirectional, meaning only
    one side knows about the association. The `TransactionHistory` knows it has a
    relationship with the `User` entity. But the `User` entity is oblivious of any
    such association. From the perspective of the `User` entity, it is “single.” The
    other kind of directionality is bidirectional, where both entities know about
    each other through associations.


    ### One-to-One


    A one-to-one association is one in which one entity has an association with another
    entity. In this case, there is only a single entity from the perspective of either
    side of the relationship. Listing [5-23](#531256_1_En_5_Chapter.xhtml#PC23) shows
    a new entity, `UserCredentials`, with an association to the `User` entity.


    ```java

    @Entity

    public class UserCredentials extends AbstractEntity {

    @Column(unique = true, length = 30, nullable = false)

    private String email;

    @Column(nullable = false)

    private String password;

    private String salt;

    @OneToOne

    @JoinColumn(name = "wallet_user_id")

    private User user;

    }

    ```


    `UserCredentials` is an entity that contains login credentials for a `User`. It
    has a one-to-one association with the `User`, denoted by the `@OneToOne` annotation.
    It also bears the `@JoinColumn` annotation to set a custom name for the foreign
    key column. This implies the `UserCredentials` is the owning side of the relationship.
    Listing [5-24](#531256_1_En_5_Chapter.xhtml#PC24) shows the updated `User` entity
    (showing only new parts for brevity).


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToOne(mappedBy = "user")

    private UserCredentials userCredentials;

    }

    ```


    The `User` entity also declares an association with the `UserCredentials` entity,
    denoted by the `@OneToOne` annotation. This annotation here is passed the `mappedBy`
    parameter, set to the name of the field of the `User` type in the target entity,
    in this case `UserCredentials`. This denotes that `UserCredentials` is the owning
    side of the association. The kind of association between `User` and `UserCredentials`
    is a bidirectional one-to-one mapping or association. Figure [5-9](#531256_1_En_5_Chapter.xhtml#Fig9)
    shows the updated schema diagram for the `User` and `UserCredentials` classes.


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig9_HTML.png)


    A schema diagram depicts the wallet user and user credentials table. The former
    contains 18 fields and the latter contains 9 fields.


    ### Collection-Valued Relationships


    Collection-valued relationships or association is where a source entity references
    one or more instances of the target entity. Unlike the association shown in Listings
    [5-23](#531256_1_En_5_Chapter.xhtml#PC23) and [5-24](#531256_1_En_5_Chapter.xhtml#PC24)
    where the source entity targets a single instance of the target entity, collection-valued
    relationships are modelled with the collection type to represent the N number
    of target entity instances. The one-to-many and many-to-many are the association
    types that use collection-valued fields.'
