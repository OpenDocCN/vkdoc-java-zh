- fmt: '### Persistence Unit


    A persistence unit is a logical grouping of a set of entities that share the same
    configuration. This configuration includes the datasource and other persistence
    properties such as schema creation. A datasource is simply a connection to a database
    that can be used by JPA. The persistence unit declares the datasource and the
    transaction type, along with a set of entities that belong to that persistence
    unit.


    The datasource in Jakarta EE is a managed resource that is mostly defined as part
    of the server and passed to the persistence unit as a JNDI resource. If schema
    generation is enabled, then the database user used to create the datasource should
    have the requisite permissions to create tables in the database. Listing [5-28](#531256_1_En_5_Chapter.xhtml#PC28)
    shows the persistence unit declaration for the account module of the `jwallet`
    application.


    ```

    jdbc/jwallet

    ```


    Listing 5-28 shows a sample persistence unit.


    The persistence unit is named `jwallet` and declares the transaction type as JTA.
    The declared datasource is created in the application server. This is one of the
    flexibilities of JPA. The underlying database could be anywhere in the world;
    as long as there is a valid datasource that JPA can connect to, it will work.
    The declared property tells the runtime to create the database tables when the
    application starts.


    This property can be configured to do nothing, drop and create the tables, create
    or drop the tables. There are properties that can be used to load SQL scripts
    to populate the database when an application starts. As is, the persistence unit
    does not explicitly add any entities. This means all entities found in the module
    will be bound to this persistence unit. This file is put in the `resource/META-INF`
    folder of the application.


    ### Persistence Context


    A persistence context is akin to an instance of a persistence unit. It is a managed
    set of entity instances belonging to a given persistence unit. The persistence
    context is similar to a giant cache of all the entities that are bound to the
    persistence unit from which the persistence context is created. The persistence
    context is critical to understanding how JPA works with regard to persisting and
    loading data. We will look at this shortly when we talk about the entity manager.


    ### Transactions


    Methods called on the `EntityManager` that alter the state of an entity, or the
    set of entities in the database, require a transaction. In Jakarta EE, transactions
    are managed on your behalf by the application server. You generally would not
    worry about transactional boundaries. The container will automatically spawn or
    join a transaction and commit it when the operation ends.


    ### EntityManager


    The `EntityManager` is an interface that has methods for carrying out create,
    read, update, and delete operations on JPA entities. It is a managed object in
    Jakarta EE, meaning you do not explicitly create it. Rather, you request an instance
    from the JPA runtime which should inject one for you. You can leverage the CDI
    runtime to inject the `EntityManager` object as long as you have a producer for
    it. This construct is discussed in the preceding chapter on Jakarta Contexts and
    Dependency Injection.


    Requesting for an `EntityManager` instance entails you telling the JPA runtime
    which persistence unit to associate the given `EntityManager` with. The returned
    instance is then bound to that persistence unit, from which a persistence context
    is created. This persistence context is what the `EntityManager` will use to manage
    the CRUD of the entities bound to the persistence unit.


    ### Persisting Entities


    #### Injecting the EntityManager


    To persist an entity, we need to first get an instance of the `EntityManager`.
    Listing [5-29](#531256_1_En_5_Chapter.xhtml#PC29) shows the `BaseRepository` class
    injecting a database-qualified `EntityManager` (for details of this construct,
    please refer to Chapter [4](#531256_1_En_4_Chapter.xhtml)).


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    }

    ```


    Listing 5-29 showing injected `EntityManager`.


    The `@Inject` annotation is a CDI annotation for requesting contextual instances.
    There is a place where the `EntityManager` instances are “produced” as shown in
    Listing [5-30](#531256_1_En_5_Chapter.xhtml#PC30).


    ```

    public class ProducerFactory {

    @Produces

    @Database(DB.POSTGRES)

    @PersistenceContext(unitName = "jwallet")

    EntityManager postgres;

    }

    ```


    Listing 5-30 shows `EntityManager` production.


    The `@PersistenceContext` annotation is a JPA construct for requesting `EntityManager`s.
    The `postgres` field will be populated by the JPA runtime with an instance of
    the `EntityManager` scoped to the persistence unit. Injection is the recommended
    way of getting an instance of the `EntityManager` on the Jakarta EE platform.


    #### Persisting Data


    Once you have an entity manager instance, you can invoke methods on it to persist
    data. The `EntityManager#persist` method is the primary means of persisting entity
    instances. It takes an entity instance and persists it in the database. Listing
    [5-31](#531256_1_En_5_Chapter.xhtml#PC31) shows the `save` method in `BaseRepository`
    for persisting entities.


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E save(E entity) {

    em.persist(entity);

    return entity;

    }

    }

    ```


    Listing 5-31 shows `BaseRepository`.


    The `BaseRepository` is a generic class that takes an entity type and its corresponding
    primary key type. It contains common CRUD methods to avoid repeating the same
    for all entities. The `em.persist` call will cause the entity manager to put the
    passed entity instance into the persistence context. For simplicity, the persistence
    context is created when a transactional method starts. Remember the persistence
    context is sort of an instance of the persistence unit. The `BaseRepository` is
    extended by the `UserRepository`, as shown in Listing [5-32](#531256_1_En_5_Chapter.xhtml#PC32).


    ```

    public class UserRepository extends BaseRepository {

    public UserRepository() {

    super(User.class);

    }

    }

    ```


    Listing 5-32 shows the `UserRepository`.


    The `UserRepository` is then injected into the `UserService` to be used for persisting
    users. The `createUser` method of this class takes a `CreateUserRequest` and delegates
    to the `userRepository` as shown in Listing [5-33](#531256_1_En_5_Chapter.xhtml#PC33).


    ```

    @Action

    public class UserService implements UserFacade {

    @Inject

    UserRepository userRepository;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    User user = fromUserWrapper(createUserRequest);

    user = userRepository.save(user);

    UserResponse userResponse = getUser(user.getId());

    return userResponse;

    }

    }

    ```


    Listing 5-33 shows the `UserService` persisting users.


    The `UserService` uses the `@Action` stereotype to declare a request-scoped transactional
    bean. Please refer to Chapter [4](#531256_1_En_4_Chapter.xhtml) for detailed CDI
    discussion. The `@Transactional` annotation is a CDI interceptor that will cause
    a transaction to be created for every method invoked on the `UserService`. When
    the `save` method is called on the `userRepository` contextual object, the entity
    manager will persist the passed entity to the persistence context created when
    the method execution started.


    At this point, the entity instance would have its primary key field set, but the
    instance would still not be in the database. The persistence context contains
    the instance and all other instances that have any kind of operation performed
    on them through a method invocation on the entity manager. When the method returns
    successfully, the container will automatically commit the transaction, and it
    is at this point that the persistence context will get flushed to the database.'
