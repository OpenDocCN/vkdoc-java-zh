    ### Mapping Temporal Types


    Mapping date types to database columns is a straightforward task using the Java
    8 java.time packages. Listing [5-12](#531256_1_En_5_Chapter.xhtml#PC12) shows
    the User entity with three new java.time types.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    }

    Listing 5-12

    shows temporal mapping using java.time types in the User entity

    ```


    Listing [5-12](#531256_1_En_5_Chapter.xhtml#PC12) shows three new fields in the
    User entity. The birthDay field is typed to java.time.LocalDate and the created
    and updated fields to java.time.LocalDateTime types. The LocalDate type will be
    mapped to the SQL date type and the LocalDateTime type to the timestamp type in
    the database. The updated schema diagram of the User entity is shown in Figure
    [5-4](#531256_1_En_5_Chapter.xhtml#Fig4).


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig4_HTML.jpg)


    A schema diagram of the updated user entity depicts the following fields. Birthday,
    created, first name, last name, total conversions, updated, user name, and I D.


    Figure 5-4


    Updated User entity schema


    The much older java.util.Date and java.util.Calendar types can also be used for
    temporal type fields. However, for these, the @Temporal type annotation will need
    to be used to pick which JDBC java.sql types to map the field to. The java.sql.Date,
    java.sql.Time, and java.sql.Timestamp can also be used. These map directly to
    the respective underlying database type without any hint to the runtime.


    ### Mapping Large Objects


    Oftentimes, applications need to map byte-based objects to the database. These
    objects can be large, depending on their type. Large objects , otherwise known
    as LOBs, require separate JDBC calls to the database for loading them in Java.
    As such, when used as field types, we need to signal the runtime to use these
    special calls. The way to signal the runtime about LOBs is through the use of
    the @Lob annotation on a large object field.


    There are two types of large objects that can be mapped to the database. These
    are large character objects or CLOBs, represented in Java as char[] or Character[],
    and long String objects are mapped to the CLOB column type in the database. Binary
    large objects, or BLOBs, represented in Java by byte[], Byte[], and Serializable
    types are mapped to BLOB database columns. Listing [5-13](#531256_1_En_5_Chapter.xhtml#PC13)
    shows the User entity with a BLOB field for the picture of the account holder.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    }

    Listing 5-13

    shows the User entity with a BLOB field

    ```


    Listing [5-13](#531256_1_En_5_Chapter.xhtml#PC13) shows the picture field of type
    byte[] annotated with @Lob. This will be mapped to the underlying database’s binary
    large object type.


    ### Simple Field Types


    The @Basic annotation on the picture explicitly marks the field as a basic or
    simple type. All the fields in the User entity are called simple types in JPA
    parlance. Simple fields are fields that can be mapped directly to a single database
    column. The @Basic annotation is used to denote simple field types. However, they
    can be fully omitted as has been the case with all the fields in the User entity
    except for the picture field.


    #### Lazy Fetching


    When a row is loaded from the table to which the User entity is mapped, all the
    columns mapped to simple types are loaded. By default, simple types in an entity
    are loaded or fetched when an instance is loaded from the database. However, there
    are times when fetching a simple type is not very efficient.


    In the case of the User entity, we really do not want to fetch a user’s picture
    every time an instance is loaded. To signal the runtime to not fetch the binary
    field by default, the FetchType.LAZY type is passed to the fetch parameter of
    the @Basic field .'
