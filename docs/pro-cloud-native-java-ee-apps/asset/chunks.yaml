    hand it over to you. As declared in Listing [6-3](#531256_1_En_6_Chapter.xhtml#PC3),
    if the client passes no method body or an empty string, the method parameter will
    be null. This means you will have to do null-check on the passed value. To prevent
    this, the REST spec integrates with the Jakarta Bean Validation specification
    to allow declarative validation.'
  trans: '

    ### Jakarta REST 资源


    Jakarta REST 中的 REST 资源被定义为一个 Java 类。该类将拥有一个与 HTTP 路径匹配的路径。然后，该类就被视为托管在该路径上。清单
    6-2 介绍了 `UserResource`，用于实现表 6-1 中确定的各个资源。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    }

    清单 6-2

    展示了第一个 UserResource 类

    ```


    `UserResource` 类是一个带有多个 Jakarta REST 注解的 POJO。这些注解将这个 POJO 转换为一个 REST HTTP 资源，尽管我们尚未添加任何资源方法。`@Consumes`
    和 `@Produces` 注解共同决定了资源类中的方法可以消费和产生的多用途互联网邮件扩展（MIME^(¹¹⁰)）媒体类型。由于 JSON 是 Web 和微服务应用程序中最流行的数据交换格式，因此常量
    `MediaType.APPLICATION_JSON` 被传递给这两个注解。此常量是一个值为 `application/json` 的字符串。


    `@Path` 注解被传递了值 `"users"`，指定该类托管在路径 `/api/users` 上。此注解接受一个值，该值表示被注解对象将托管在的 HTTP
    资源路径。请记住，根路径或基本路径是通过 `RootResourceConfiguration` 上的 `@ApplicationPath` 设置为 `"api"`
    的，如清单 6-1 所示。清单 6-2 中展示的声明在路径 `/api/users` 上创建了一个资源，当客户端访问该路径时，将导致 Jakarta REST
    运行时实例化一个 `UserResource` 实例来处理该请求。


    运行时能够将 `/users` 映射到托管在基本路径 `/api` 下，因为在 `RootResourceConfiguration` 中，`getClasses`
    方法没有被重写。这意味着，默认情况下，所有资源类都将被扫描并作为子资源添加到这个根资源下。


    ### HTTP 方法


    有了资源类，我们就可以开始实现表 6-1 中所示的 HTTP 方法了。Jakarta REST 中的资源方法是一个 Java 方法，它带有任何必要的注解，这些注解指明了该
    Java 方法响应的 HTTP 方法。有七个注解映射到用于创建资源方法的相应 HTTP 方法。它们是 `@POST`、`@GET`、`@PUT`、`@DELETE`、`@PATCH`、`@HEAD`
    和 `@OPTIONS`。


    #### @POST


    资源类方法上的 `@POST` 注解表示该方法响应 HTTP POST 请求。清单 6-3 展示了 `UserResource` 类中带有 `@POST`
    注解的 `createUser` 方法。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @POST

    public UserResponse createUser(CreateUserRequest createUserRequest) {

    return userService.createUser(createUserRequest);

    }

    }

    清单 6-3

    展示了 @POST 方法

    ```


    `createUser` 方法带有 `@POST` 注解，意味着它响应 HTTP POST 请求。在没有显式 `@Path` 注解的情况下，此方法将托管在
    `/api/users` 路径上。对该路径的 POST 请求将导致运行时调用 `UserResource` 类实例上的 `createUser` 方法。到目前为止，一切都是带有少量注解的纯
    Java。该方法消费一个强类型的 Java 类 `CreateUserRequest`。


    类级别的 `@Consumes` 注解意味着 `createUser` 方法消费 JSON。所谓消费 JSON，是指客户端将发布该方法所消费的 Java 类型的
    JSON 表示形式，在本例中为 `CreateUserRequest`。当运行时将客户端请求匹配到此方法时，请求体（本例中为 JSON 字符串）将被传递给一个称为消息体读取器的构件。


    ##### 消息体读取器


    消息体读取器是参数化接口 `jakarta.ws.rs.ext.MessageBodyReader<T>` 的一个实例，它接收一个 `MediaType`
    的 `InputStream` 并将其转换为 `T`，其中 `T` 是某种 Java 类型。每个消息体读取器都与一个单一的 `MediaType` 相关联，它可以将其
    `InputStream` 转换为 Java 类型。运行时附带了许多用于流行 `MediaType` 的消息体读取器。除非您想自定义转换过程，否则无需提供
    `MessageBodyReader` 的实例。


    ##### 消息体写入器


    消息体写入器与消息体读取器相反，它接收一个 Java 类型并将其转换为与其关联的 `MediaType` 所表示的类型。消息体写入器接收 Java 类型实例并将其写入返回给客户端的输出流。与消息体读取器类似，通常只有在需要对过程进行一些自定义时，您才会提供自己的自定义写入器实现。`createUser`
    方法返回的 `UserResponse` 对象同样会被转换为 JSON 并写入发送给客户端的响应输出流。


    清单 6-4 中所示的 HTTP 请求将由自动配置的消息体读取器自动映射到 `CreateUserRequest` Java 类型。


    ```

    POST http://localhost:3003/account/api/users

    Content-Type: application/json

    {

    "firstName":"John",

    "lastName":"Jakes",

    "email":"a@b.com",

    "userRegion":"AFRICA",

    "birthDay":"08-02-1975",

    "password":"_myStrong_pswd&^_I"

    }

    清单 6-4

    展示了一个示例 POST 请求

    ```


    请求体中的 JSON 将被映射到清单 6-5 中所示的 `CreateUserRequest`。


    ```

    public class CreateUserRequest {

    private String firstName;

    private String lastName;

    private String email;

    private LocalDate birthDay;

    private UserRegion userRegion;

    private String password;

    }

    清单 6-5

    展示了 CreateUserRequest

    ```


    资源方法的实际实现完全是业务特定的。REST 运行时会将请求体转换为方法参数并交给您处理。如清单 6-3 中所声明的，如果客户端没有传递方法体或传递了空字符串，则方法参数将为
    `null`。这意味着您必须对传递的值进行空值检查。为了防止这种情况，REST 规范与 Jakarta Bean Validation 规范集成，以允许声明式验证。

    '
- fmt: "### Validating Resources\n\nAs discussed in the previous chapter on persisting\
    \ data with Jakarta Persistence, the Bean Validation API is a set of annotations\
    \ and interfaces that you can use to constrain values to only what an application\
    \ requires. To prevent the client from passing `null` or invalid values for user\
    \ creation, Listing [6-6](#531256_1_En_6_Chapter.xhtml#PC6) shows the `createUser`\
    \ method with some validation constraints.\n\n```java\n@Consumes(MediaType.APPLICATION_JSON)\n\
    @Produces(MediaType.APPLICATION_JSON)\n@Path(\"users\")\npublic class UserResource\
    \ {\n    @Inject\n    UserService userService;\n\n    @POST\n    public UserResponse\
    \ createUser(@NotNull @Valid CreateUserRequest createUserRequest) {\n        return\
    \ userService.createUser(createUserRequest);\n    }\n}\n```\n\nThe two constraint\
    \ annotations, `@NotNull` and `@Valid`, will cause the method parameter to be\
    \ validated. It first will validate that the converted POST body is not `null`.\
    \ Then it will cause a recursive validation of the converted object. In this case,\
    \ all constraint validations on the `CreateUserRequest` will be validated. The\
    \ method body will only be executed when there is no validation exception. If\
    \ there is a validation exception resulting from a constraint violation, the REST\
    \ runtime will send HTTP 400 (Bad Request) to the client. The `CreateUserRequest`\
    \ is shown in Listing [6-7](#531256_1_En_6_Chapter.xhtml#PC7) with validation\
    \ constraints.\n\n```java\npublic class CreateUserRequest {\n    @NotEmpty\n \
    \   private String firstName;\n    @NotEmpty\n    private String lastName;\n \
    \   @NotEmpty\n    @Email\n    private String email;\n    @NotNull\n    @Past\n\
    \    private LocalDate birthDay;\n    private UserRegion userRegion;\n    @NotEmpty\n\
    \    @Size(min = 8, max = 30)\n    private String password;\n}\n```\n\nBecause\
    \ the `createUser` method did not explicitly declare any resource paths with the\
    \ `@Path` annotation as done on its class, the runtime will know to call it when\
    \ a POST request is made to the parent `/users` path as declared by the `@Path`\
    \ annotation on the class. Only one each of the HTTP methods is allowed to be\
    \ hosted in a class without an explicit `@Path` annotation. If we declare another\
    \ `@POST` method without a `@Path` annotation in the same `UserResource` class,\
    \ this will be an error.\n\nA sample POST request to the `/users` path with valid\
    \ data as shown in Listing [6-4](#531256_1_En_6_Chapter.xhtml#PC4) returns the\
    \ JSON data shown in Listing [6-8](#531256_1_En_6_Chapter.xhtml#PC8).\n\n```http\n\
    POST http://localhost:3003/account/api/users\nHTTP/1.1 200 OK\nContent-Type: application/json\n\
    Content-Language: en-US\nContent-Length: 114\nDate: Fri, 26 Aug 2022 17:08:13\
    \ GMT\n\n{\n    \"data\": {\n        \"firstName\": \"John\",\n        \"lastName\"\
    : \"Jakes\",\n        \"userId\": 5\n    },\n    \"response\": {\n        \"responseCode\"\
    : \"0\",\n        \"responseMessage\": \"OK\"\n    }\n}\n```\n\nThe response header\
    \ generated by the Jakarta REST runtime contains some metadata about the response.\
    \ It tells us the HTTP version used, the response code, which in this successful\
    \ invocation is 200. The returned JSON in the response body is a representation\
    \ of the `UserResponse` object returned by the `createUser` method. Listing [6-9](#531256_1_En_6_Chapter.xhtml#PC9)\
    \ shows the `UserResponse` object.\n\n```java\npublic class UserResponse extends\
    \ Response {\n    public static UserResponse of(UserResponseData data) {\n   \
    \     UserResponse userResponse = new UserResponse();\n        userResponse.setData(data);\n\
    \        return userResponse;\n    }\n\n    @Getter\n    @Setter\n    public static\
    \ class UserResponseData {\n        private Long userId;\n        private String\
    \ firstName;\n        private String lastName;\n        private String username;\n\
    \    }\n}\n```\n\nThe call to the `/users` resource method with the request shown\
    \ in Listing [6-10](#531256_1_En_6_Chapter.xhtml#PC10) will result in an HTTP\
    \ response code 400 because the data is not correct. As the request object is\
    \ being validated with the `@Valid` and `@NotNull` annotations, the runtime will\
    \ automatically validate the request and return the appropriate response.\n\n\
    ```http\nPOST http://localhost:3003/account/api/users\nContent-Type: application/json\n\
    \n{\n    \"firstName\": \"John\",\n    \"lastName\": \"Jakes\",\n    \"userRegion\"\
    : \"AFRICA\",\n    \"birthDay\": \"08-02-1975\",\n    \"password\": \"_myStrong_pswd&^_I\"\
    \n}\n```\n\nThe request data misses the `email` field, which is annotated `@NotEmpty`\
    \ in the `CreateUserRequest`. The preceding call results in the response shown\
    \ in Listing [6-11](#531256_1_En_6_Chapter.xhtml#PC11).\n\n```http\nHTTP/1.1 400\
    \ Bad Request\nContent-Type: text/plain;charset=UTF-8\nvalidation-exception: true\n\
    Content-Language: en-US\nContent-Length: 60\nConnection: Close\nDate: Fri, 26\
    \ Aug 2022 17:35:41 GMT\n```\n\nThis is automatic and only requires you to annotate\
    \ your fields with the relevant Jakarta Bean Validation annotations. A POST method\
    \ does not necessarily need to return data. The `createUser` method could as well\
    \ return `void`. What a resource method returns is a business domain decision\
    \ that will be made on a case-by-case basis.\n\n### @GET\n\nCreating a method\
    \ that responds to the HTTP GET request entails annotating a Java method with\
    \ the `@GET` annotation. There are four GET requests in the list of resource methods\
    \ shown in Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1). Three of those return\
    \ collections of users. When you have such similar return types for different\
    \ resource methods, it is an indicator to refactor the endpoints to simplify them.\n\
    \nLooking again at Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1), the endpoint\
    \ to search for users and to filter users by total conversions can be combined\
    \ into one. So the search endpoint supports filtering or searching for users by\
    \ total currency conversions. This way, the search endpoint can be expanded such\
    \ that you can filter by conversions based on a predicate like greater than or\
    \ equal to, less than or equal to, and such. With this new approach, we end up\
    \ with three GET requests: one for getting a user by ID, one for getting all users,\
    \ and another for searching. Listing [6-12](#531256_1_En_6_Chapter.xhtml#PC12)\
    \ shows the first attempt at crafting the GET requests for the `UserResource`.\n\
    \n```java\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
    @Path(\"users\")\npublic class UserResource {\n    @Inject\n    UserService userService;\n\
    \n    @GET\n    @Path(\"{userId}\")\n    public UserResponse getUser(@PathParam(\"\
    userId\") Long userId) {\n        return userService.getUser(userId);\n    }\n\
    \n    @GET\n    @Path(\"search\")\n    public List searchUsers(@NotNull @BeanParam\
    \ UserSearchRequest userSearchRequest) {\n        return userService.searchUsers(userSearchRequest);\n\
    \    }\n\n    @GET\n    public List getAllUsers() {\n        return userService.getAllUsers();\n\
    \    }\n}\n```"
  raw: '#### Validating Resources


    As discussed in the previous chapter on persisting data with Jakarta Persistence,
    the Bean Validation API is a set of annotations and interfaces that you can use
    to constrain values to only what an application requires. To prevent the client
    from passing null or invalid values for user creation, Listing [6-6](#531256_1_En_6_Chapter.xhtml#PC6)
    shows the createUser method with some validation constraints.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @POST

    public UserResponse createUser(@NotNull @Valid  CreateUserRequest createUserRequest)
    {

    return userService.createUser(createUserRequest);

    }

    }

    Listing 6-6

    shows bean validation

    ```


    The two constraint annotations, @NotNull and @Valid, will cause the method parameter
    to be validated. It first will validate that the converted POST body is not null.
    Then it will cause a recursive validation of the converted object. In this case,
    all constraint validations on the CreateUserRequest will be validated. The method
    body will only be executed when there is no validation exception. If there is
    a validation exception resulting from a constraint violation, the REST runtime
    will send HTTP 400 (Bad Request) to the client. The CreateUserRequest is shown
    in Listing [6-7](#531256_1_En_6_Chapter.xhtml#PC7) with validation constraints.


    ```

    public class CreateUserRequest {

    @NotEmpty

    private String firstName;

    @NotEmpty

    private String lastName;

    @NotEmpty

    @Email

    private String email;

    @NotNull

    @Past

    private LocalDate birthDay;

    private UserRegion userRegion;

    @NotEmpty

    @Size(min = 8, max = 30)

    private String password;

    }

    Listing 6-7

    shows updated CreateUserRequest

    ```


    Because the createUser method did not explicitly declare any resource paths with
    the @Path annotation as done on its class, the runtime will know to call it when
    a POST request is made to the parent /users path as declared by the @Path annotation
    on the class. Only one each of the HTTP methods is allowed to be hosted in a class
    without an explicit @Path annotation. If we declare another @POST method without
    a @Path annotation in the same UserResource class, this will be an error.


    A sample POST request to the /users path with valid data as shown in Listing [6-4](#531256_1_En_6_Chapter.xhtml#PC4)
    returns the JSON data shown in Listing [6-8](#531256_1_En_6_Chapter.xhtml#PC8)
    .


    ```

    http://localhost:3003/account/api/users

    HTTP/1.1 200 OK

    Content-Type: application/json

    Content-Language: en-US

    Content-Length: 114

    Date: Fri, 26 Aug 2022 17:08:13 GMT

    {

    "data": {

    "firstName": "John",

    "lastName": "Jakes",

    "userId": 5

    },

    "response": {

    "responseCode": "0",

    "responseMessage": "OK"

    }

    }

    Listing 6-8

    shows a successful call to the /users resource

    ```


    The response header generated by the Jakarta REST runtime contains some metadata
    about the response. It tells us the HTTP version used, the response code, which
    in this successful invocation is 200\. The returned JSON in the response body
    is a representation of the UserResponse object returned by the createUser method
    . Listing [6-9](#531256_1_En_6_Chapter.xhtml#PC9) shows the UserResponse object.


    ```

    public class UserResponse extends Response {

    public static UserResponse of(UserResponseData data) {

    UserResponse userResponse = new UserResponse();

    userResponse.setData(data);

    return userResponse;

    }

    @Getter

    @Setter

    public static class UserResponseData {

    private Long userId;

    private String firstName;

    private String lastName;

    private String username;

    }

    }

    Listing 6-9

    shows the UserResponse class

    ```


    The call to the /users resource method with the request shown in Listing [6-10](#531256_1_En_6_Chapter.xhtml#PC10)
    will result in an HTTP response code 400 because the data is not correct. As the
    request object is being validated with the @Valid and @NotNull annotations, the
    runtime will automatically validate the request and return the appropriate response
    .


    ```

    POST http://localhost:3003/account/api/users

    Content-Type: application/json

    {

    "firstName":"John",

    "lastName":"Jakes",

    "userRegion":"AFRICA",

    "birthDay":"08-02-1975",

    "password":"_myStrong_pswd&^_I"

    }

    Listing 6-10

    Calling /users with bad data

    ```


    The request data misses the email field, which is annotated @NotEmpty in the CreateUserRequest.
    The preceding call results in the response shown in Listing [6-11](#531256_1_En_6_Chapter.xhtml#PC11).


    ```

    http://localhost:3003/account/api/users

    HTTP/1.1 400 Bad Request

    Content-Type: text/plain;charset=UTF-8

    validation-exception: true

    Content-Language: en-US

    Content-Length: 60

    Connection: Close

    Date: Fri, 26 Aug 2022 17:35:41 GMT

    Listing 6-11

    Response data

    ```


    This is automatic and only requires you to annotate your fields with the relevant
    Jakarta Bean Validation annotations. A POST method does not necessarily need to
    return data. The createUser method could as well return void. What a resource
    method returns is a business domain decision that will be made on a case-by-case
    basis.


    #### @GET


    Creating a method that responds to the HTTP GET request entails annotating a Java
    method with the @GET annotation. There are four GET requests in the list of resource
    methods shown in Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1). Three of those
    return collections of users. When you have such similar return types for different
    resource methods, it is an indicator to refactor the endpoints to simplify them.


    Looking again at Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1), the endpoint
    to search for users and to filter users by total conversions can be combined into
    one. So the search endpoint supports filtering or searching for users by total
    currency conversions. This way, the search endpoint can be expanded such that
    you can filter by conversions based on a predicate like greater than or equal
    to, less than or equal to, and such. With this new approach, we end up with three
    GET requests: one for getting a user by ID, one for getting all users, and another
    for searching. Listing [6-12](#531256_1_En_6_Chapter.xhtml#PC12) shows the first
    attempt at crafting the GET requests for the UserResource.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource{

    @Inject

    UserService userService;

    @GET

    @Path("{userId}")

    public UserResponse getUser(@PathParam("userId") Long userId) {

    return userService.getUser(userId);

    }

    @GET

    @Path("search")

    public List searchUsers(@NotNull @BeanParam UserSearchRequest userSearchRequest)
    {

    return userService.searchUsers(userSearchRequest);

    }

    @GET

    public List getAllUsers() {

    return userService.getAllUsers();

    }

    }

    Listing 6-12

    GET requests for users

    ```'
  trans: '

    #### 验证资源


    正如上一章关于使用 Jakarta Persistence 持久化数据所讨论的，Bean Validation API 是一组注解和接口，可用于将值约束为仅满足应用程序要求的值。为了防止客户端在创建用户时传递
    null 或无效值，清单 6-6 展示了带有一些验证约束的 createUser 方法。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @POST

    public UserResponse createUser(@NotNull @Valid  CreateUserRequest createUserRequest)
    {

    return userService.createUser(createUserRequest);

    }

    }

    清单 6-6

    展示了 Bean 验证

    ```


    这两个约束注解 `@NotNull` 和 `@Valid` 将导致方法参数被验证。它首先会验证转换后的 POST 请求体不为 null。然后，它会对转换后的对象进行递归验证。在这种情况下，`CreateUserRequest`
    上的所有约束验证都将被验证。只有在没有验证异常时，方法体才会被执行。如果因违反约束而导致验证异常，REST 运行时会向客户端发送 HTTP 400（错误请求）。`CreateUserRequest`
    及其验证约束如清单 6-7 所示。


    ```

    public class CreateUserRequest {

    @NotEmpty

    private String firstName;

    @NotEmpty

    private String lastName;

    @NotEmpty

    @Email

    private String email;

    @NotNull

    @Past

    private LocalDate birthDay;

    private UserRegion userRegion;

    @NotEmpty

    @Size(min = 8, max = 30)

    private String password;

    }

    清单 6-7

    展示了更新后的 CreateUserRequest

    ```


    由于 `createUser` 方法没有像其类那样使用 `@Path` 注解显式声明任何资源路径，因此当向父路径 `/users`（由类上的 `@Path`
    注解声明）发送 POST 请求时，运行时将知道调用它。在一个没有显式 `@Path` 注解的类中，每种 HTTP 方法只允许存在一个。如果我们在同一个 `UserResource`
    类中声明另一个没有 `@Path` 注解的 `@POST` 方法，这将是一个错误。


    向 `/users` 路径发送一个包含有效数据的 POST 请求示例，如清单 6-4 所示，将返回清单 6-8 中所示的 JSON 数据。


    ```

    http://localhost:3003/account/api/users

    HTTP/1.1 200 OK

    Content-Type: application/json

    Content-Language: en-US

    Content-Length: 114

    Date: Fri, 26 Aug 2022 17:08:13 GMT

    {

    "data": {

    "firstName": "John",

    "lastName": "Jakes",

    "userId": 5

    },

    "response": {

    "responseCode": "0",

    "responseMessage": "OK"

    }

    }

    清单 6-8

    展示了成功调用 /users 资源

    ```


    由 Jakarta REST 运行时生成的响应头包含有关响应的一些元数据。它告诉我们使用的 HTTP 版本、响应代码（在此次成功调用中为 200）。响应体中返回的
    JSON 是 `createUser` 方法返回的 `UserResponse` 对象的表示。清单 6-9 展示了 `UserResponse` 对象。


    ```

    public class UserResponse extends Response {

