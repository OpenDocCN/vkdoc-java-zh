  trans: '

    ### 限定事件


    可以对事件进行限定，以有选择地决定哪些观察者会收到通知。回到我们的需求，正如我们需要将 jwallet 的欧盟居民持久化到欧盟托管的数据库中一样，我们只能向成功持久化的欧盟用户发送电子邮件，而不是短信。为了满足这一需求，我们可以限定事件，根据其限定符有选择地调用不同的观察者方法。让我们首先引入一个
    `MessageOption` 限定符，它接受一个 `MessageType` 参数，如代码清单 4-46 所示。


    ```

    @Qualifier

    @Retention(RUNTIME)

    @Target({ FIELD, TYPE, METHOD, PARAMETER })

    public @interface MessageOption {

    MessageType value();

    enum MessageType {

    SMS,

    EMAIL

    }

    }

    代码清单 4-46

    展示新的 MessageOption 参数

    ```


    代码清单 4-46 展示了 `MessageOption` 限定符。有了它，我们可以有选择地决定哪些事件观察者会收到哪个事件的通知。这个注解有两种使用方式。首先，我们可以将两个
    `Event` 对象注入到 `UserServiceDecorator` 中，每个对象使用单独的 `MessageOption` 进行限定，如代码清单 4-47
    所示。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    @MessageOption(MessageOption.MessageType.SMS)

    Event smsEvent;

    @Inject

    @MessageOption(MessageOption.MessageType.SMS)

    Event emailEvent;

    }

    代码清单 4-47

    展示为每种 MessageOption 类型限定的两个 Event 对象

    ```


    代码清单 4-47 展示了 `UserServiceDecorator` Bean，它有两个 `Event` 注入点，每个都使用 `MessageOption`
    进行了限定。对每个事件感兴趣的相应观察者也需要被限定。


    ```

    public class MessageCenter {

    public void sendUserSmsAsync(

    @ObservesAsync @MessageOption(MessageOption.MessageType.SMS) final UserResponse
    userResponse) {

    //TODO --> 通过网关发送短信... 异步

    }

    public void sendEmail(

    @ObservesAsync @MessageOption(MessageOption.MessageType.EMAIL) final UserResponse
    userResponse) {

    //TODO --> 异步发送电子邮件

    }

    }

    代码清单 4-48

    展示 MessageCenter Bean 中观察这些事件的两个观察者

    ```


    代码清单 4-48 展示了 `MessageCenter` Bean，它有两个事件观察者，每个观察者观察相同的事件类型但具有不同的限定符。在观察者解析期间，容器将根据类型和限定符将每个观察者匹配到触发的事件。因此，`sendSmsAsync`
    观察者将映射到从 `smsEvent` 对象（代码清单 4-47）触发的异步事件，而 `sendEmail` 观察者将映射到 `emailEvent` 对象（代码清单
    4-47）。这应该能按预期工作。然而，一旦 `MessageOption` 限定符中有十几个 `MessageType` 选项，我们就需要注入更多的 `Event`
    对象。


    幸运的是，我们可以根据代码中的某些条件动态地向事件添加限定符。代码清单 4-49 展示了重构后的 `UserServiceDecorator` Bean，它根据持久化用户的位置动态选择
    `MessageOption`。


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = userService.getUser(user.getId());

    userResponseEvent.select(getAnnotation(UserRegion.EU)).fireAsync(userResponse);

    return UserService.toUserResponse(user);

    }else{

    final UserResponse userResponse = userService.createUser(createUserRequest);

    userResponseEvent.select(getAnnotation(UserRegion.OTHERS)).fireAsync(userResponse);

    return userResponse;

    }

    }

    private MessageOption getAnnotation(final UserRegion userRegion) {

    if (userRegion == UserRegion.EU) {

    return new MessageOption() {

    @Override

    public MessageType value() {

    return MessageType.EMAIL;

    }

    @Override

    public Class annotationType() {

    return MessageOption.class;

    }

    };

    }

    return new MessageOption() {

    @Override

    public MessageType value() {

    return MessageType.SMS;

    }

    @Override

    public Class annotationType() {

    return MessageOption.class;

    }

    };

    }

    }

    代码清单 4-49

    展示重构后的 UserServiceDecorator，其中包含动态选择的事件限定符

    ```


    代码清单 4-49 展示了完整的 `UserServiceDecorator` Bean。在 `createUser` 方法中，如果用户位于欧盟，我们调用
    `UserResponseEvent` 对象上的 `select` 方法，并将 `getAnnotation(UserRegions.EU)` 方法的返回类型传递给它。`getAnnotation`
    方法接受一个 `UserRegion` 类型参数，并返回该区域所需的注解。在这种情况下，返回的限定符将是 `MessageOption(MessageType.EMAIL)`。我们调用的
    `Event#select` 方法接受一个可变参数列表的注解。


    如果用户不在欧盟区域，我们将 `UserRegion.OTHERS` 传递给 `getAnnotation` 方法，该方法将返回 `MessageOption(MessageType.SMS)`，然后将其传递给同一个
    `userResponseEvent` 对象的 `select` 方法。这样，我们的观察者方法（如代码清单 4-48 所示）保持不变。但我们使触发事件的 Bean
    中的限定符选择过程更加灵活。容器仍然会将任何触发的事件映射到正确的观察者方法，就像我们显式注入并限定了不同的事件类型一样，如代码清单 4-47 所示。


    需要注意的是，代码清单 4-48 中所示的事件观察者将根据其类型和限定符是否与触发的事件匹配而被有条件地调用。然而，代码清单 4-50 展示了第三个 `UserResponse`
    观察者，无论 `userResponseEvent` 的限定符如何，它都将始终被调用。


    ```

