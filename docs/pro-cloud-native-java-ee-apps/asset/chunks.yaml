- fmt: '### Custom Config Sources


    Your application is not limited to the three default config sources. For instance,
    you might be interacting with a legacy system that stores configuration values
    that your application needs in a database. You can define a database config source
    for your application and register it with the `Config` runtime. It will get scanned
    and picked up just like the default config sources. Listing [7-1](#531256_1_En_7_Chapter.xhtml#PC1)
    shows a `DatabaseConfigSource` custom config source for `jwallet`.


    ```

    public class DatabaseConfigSource implements ConfigSource {

    @Override

    public Set getPropertyNames() {

    return ConfigRepoManager.getPropertyNames();

    }

    @Override

    public String getValue(final String key) {

    return ConfigRepoManager.getPropertyValue(key);

    }

    @Override

    public String getName() {

    return this.getClass().getSimpleName();

    }

    @Override

    public int getOrdinal() {

    return 450;

    }

    }

    Listing 7-1

    shows the DatabaseConfigSource

    ```


    Listing [7-1](#531256_1_En_7_Chapter.xhtml#PC1) shows the custom config source
    declared in the `DatabaseConfigSource` class. The class starts by implementing
    the `ConfigSource` interface. The first three methods are the required methods
    to be implemented from the interface from a total of five methods. The other two
    are optional. The `DatabaseConfigSource` is a config source for fetching configuration
    values from a database. Those values could be put in by anyone or any system.
    The `DatabaseConfigSource` abstracts away that into the implemented `ConfigSource`
    view.


    Method `getPropertyNames()` returns the set of property names found in this config
    source. The `getValue()` method returns the value associated with the passed key.
    For instance, passing in the key `foo` should return the value associated with
    it. The `getName()` method returns the name of this config source, mainly for
    logging and debugging purposes. These are the three methods required to be overridden
    from the `ConfigSource` interface.


    The `getOrdinal()` method is an optional method that returns the ordinal of this
    config source. Remember an ordinal determines the priority of a config source.
    If this method is not overridden, the default ordinal of 100 defined in the `ConfigSource`
    interface will be used. For the `DatabaseConfigSource`, we want it to be the first
    place that is searched for configurations. Thus, the ordinal is set to 450, putting
    it above the three default config sources.


    The `ConfigRepoManager` is a utility class that instantiates a `dataSource` and
    uses JDBC to query the database. For this example, we assume a database table
    with two fields, `PROPERTY_KEY` and `PROPERTY_VALUE`, corresponding to a config
    key and its value, respectively. Listing [7-2](#531256_1_En_7_Chapter.xhtml#PC2)
    shows the `getPropertyValue()` in the `ConfigRepoManager` utility class.


    ```

    public static String getPropertyValue(final String keyName) {

    try {

    final PreparedStatement query;

    try (final Connection connection = dataSource.getConnection()) {

    query = connection.prepareStatement("SELECT PROPERTY_VALUE FROM CUSTOM_CONFIGURATIONS
    WHERE PROPERTY_KEY = ?");}

    query.setString(1, keyName);

    final ResultSet propertyValue = query.executeQuery();

    if (propertyValue.next()) {

    return propertyValue.getString(1);

    }

    propertyValue.close();

    query.close();

    } catch (final SQLException e) {

    e.printStackTrace();

    }

    return null;

    }

    Listing 7-2

    shows the getPropertyValue method implementation

    ```


    Listing [7-2](#531256_1_En_7_Chapter.xhtml#PC2) shows the `getPropertyValue()`
    method in `ConfigRepoManager` using JDBC to retrieve config property values from
    the database based on the passed key. Based on what you’ve learned so far in this
    book, you might be wondering why the use of plain JDBC instead of CDI and JPA.
    The answer is that a `ConfigSource` is not a CDI bean. It’s treated by the `Config`
    runtime as a Plain Old Java Object.


    This is because making a `ConfigSource` a CDI bean could cause a circular startup
    loop when a given custom config source depends on a bean that in turn also depends
    on the config source for configurations. To prevent the likelihood of such problems
    occurring, custom `ConfigSource` implementations are treated as POJOs.


    With the `ConfigSource` interface implemented, we need to register the implementation
    with the MicroProfile Config runtime. To do so, the fully qualified class name
    of the `DatabaseConfigSource` must be added to the `/META-INF/services/org.eclipse.microprofile.config.spi.ConfigSource`
    file. With an ordinal of 450, the `Config` runtime will first attempt to resolve
    the property `foo` in the newly registered custom config source, because it has
    an ordinal of 450, before going down to the system properties, then environment
    variables, and finally to the `microprofile-config.properties` file.


    ## Converters


    The second component in the Config trio is the concept of converters. By default,
    the MicroProfile Config runtime treats all configurations as `String`/`String`
    pairs. It doesn’t matter the type of the value specified in a given configuration
    source. It will be loaded as a `String`. For instance, the config property `rate.minimum=15`
    will be loaded as `"15"` when a request for the property `rate.minimum` is made
    to the `Config` runtime.


    Assuming the target Java field type for the preceding property is `BigDecimal`,
    clearly there will be a problem since the runtime will be attempting to assign
    incompatible types. The solution is the use of converters. When the property value
    associated with `rate.minimum` is loaded, the `Config` runtime will look at the
    target field type into which the value is going to be set, then call an appropriate
    converter to convert the loaded value into the target field type.


    So when `rate.minimum` is loaded, a converter that can take a `String` and return
    a `BigDecimal` from it will be called and pass the loaded `String` of `15`. This
    converter will then return a `BigDecimal` with the value of `15`. The Config specification
    provides some default converters and a mechanism to create custom converters as
    well. The default converters are:


    *   `boolean` and `java.lang.Boolean`, values for `true` (case insensitive) `"true"`,
    `"1"`, `"YES"`, `"Y"`, `"ON"`. Any other value will be interpreted as `false`

    *   `byte` and `java.lang.Byte`

    *   `short` and `java.lang.Short`

    *   `int` and `java.lang.Integer`

    *   `long` and `java.lang.Long`

    *   `float` and `java.lang.Float`, a dot `"."` is used to separate the fractional
    digits

    *   `double` and `java.lang.Double`, a dot `"."` is used to separate the fractional
    digits

    *   `char` and `java.lang.Character`

    *   `java.lang.Class` based on the result of `Class.forName`


    These converters have a default `jakarta.annotation.Priority` of `1`. A priority
    is used to determine the hierarchy of a set of converters. Two converters targeting
    the same type will be sorted by their `@Priority` values. Converters with higher
    `@Priority` values have higher precedence over converters with lower `@Priority`
    values.


    ### Automatic Converters


    When there is no default or custom converter for a given target Java type, the
    `Config` runtime will create an automatic dynamic converter if the target Java
    type:


    *   Has a public static `T of(String)` method

    *   Has a public static `T valueOf(String)` method

    *   Has a public `Constructor` with a `String` parameter

    *   Has a public static `T parse(CharSequence)` method


    For the `rate.minimum` property, the runtime will create an automatic converter
    on our behalf because the target Java type of `BigDecimal` has a `valueOf(String)`
    method.'
