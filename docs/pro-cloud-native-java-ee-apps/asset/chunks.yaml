  trans: '

    ##### 实体监听器


    在 JPA 中，为实体附加回调的另一种方式是通过使用实体监听器。实体监听器是一个声明了一个或多个回调方法的类。该类可以注册到某个实体上，当该实体发生监听事件时，监听类中的每个回调方法都会被调用。清单
    5-38 展示了一个包含两个回调方法的实体监听器。


    ```

    @ApplicationScoped

    public class AbstractEntityEntityListener {

    @PrePersist

    void init(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setCreated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setCreatedBy("Dummy User");

    }

    @PreUpdate

    void update(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setUpdated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setEditedBy("Dummy User");

    }

    }

    清单 5-38 展示了一个实体监听器

    ```


    `AbstractEntityListener` 是一个应用作用域的 CDI Bean，它声明了两个方法，分别使用 `@PrePersist` 和 `@PreUpdate`
    注解。实体监听器中的回调方法接受一个类型为 `java.lang.Object` 的单一参数。这是因为在实体内部，实例已知是声明该实体的实例。但监听器是一个独立的类，因此需要一种方式将事件发生的实例传递给方法。这就是该方法接受一个
    `Object` 类型参数的原因。


    在方法实现中，传入的 `Object` 类型会被转换为 `AbstractEntity` 类型，并对其设置一些字段。如 `@ApplicationScoped`
    注解所示，实体监听器也是一个 CDI Bean。这意味着我们可以向其注入依赖，然后对实体执行操作。


    一旦像清单 5-38 那样声明了实体监听器，就必须将其注册到实体上。清单 5-39 展示了将 `AbstractEntityEntityListener`
    注册到 `Abstract` 实体上的过程。


    ```

    @MappedSuperclass

    @EntityListeners({AbstractEntityEntityListener.class})

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    }

    清单 5-39 展示了注册实体监听器

    ```


    通过 `@EntityListeners` 注解可以将实体监听器注册到实体上。如清单 5-39 所示，该注解接受一个实体监听器数组，并在每个已注册的事件发生时调用它们。由于
    `AbstractEntity` 只是一个映射的超类，此声明等同于将实体监听器注册到 `AbstractEntity` 的每个子类上。


    ## 查询数据


    在 JPA 中，查询数据主要有两种方式：Jakarta 持久化查询语言（JPQL）和 Criteria API。在这两者之间，`EntityManager`
    上还提供了一些重写的 `find` 方法，可用于直接根据主键查找实体。


    ### 根据主键查找


    `EntityManager` 提供了 `find` 方法，用于根据主键查找实体。如果已知主键，这是加载实体实例的最简单方式。清单 5-40 展示了 `BaseRepository`
    中 `find` 方法根据 ID 查找实体的实现。


    ```

    public abstract class BaseRepository {

    @Inject

    @Database(POSTGRES)

    EntityManager em;

    public E findById(K id) {

    return em.find(clazz, id);

    }

    }

    清单 5-40 BaseRepository 的 find 方法

    ```


    `find` 方法如果找到实体则返回其实例，否则返回 `null`。在使用 `find` 方法加载实体时，应牢记这一点。你应该对返回值进行空值检查。


    ### Jakarta 持久化查询语言（JPQL）


    Jakarta 持久化查询语言，也称为 JPQL，是一种基于字符串、类似 SQL 的查询实体的语言。JPQL 与 SQL 非常相似，区别在于它不是查询数据库表和行，而是查询持久化实体和对象。JPA
    运行时会负责将 JPQL 转换为底层数据库所需的 SQL 方言。


    JPQL 并非 SQL 的替代品。它是一种可以在 SQL 之外使用的查询语言。重要的是不要陷入关于哪种更好的教条主义争论中。JPQL 非常适合 Java 开发者。了解
    JPQL 并不意味着不需要了解 SQL。这两种语言相辅相成，帮助你编写非常复杂的应用程序。


    #### JPQL 的结构


    一个典型的 JPQL 查询至少包含一个 `select` 子句和一个 `from` 子句，以及可选的 `where` 和 `order by` 子句。清单
    5-41 展示了查询 `User` 实体的最简单 JPQL 语句。


    ```

    select u from User  u

    清单 5-41 最简单的 JPQL

    ```


    此查询与其对应的 SQL 查询的第一个区别在于，JPQL 查询的是实体，而不是数据库表。查询中的 `User` 指的是 `User` 实体。此名称是 `User`
    实体的非限定类名。可以通过向 `@Entity` 注解传递 `name` 参数来自定义此名称，尽管在实践中这很少见。然后，实体被别名为变量 `u`。变量 `u`
    是任意的，也可以使用 `foo` 或 `bazz`。在 JPQL 中，别名变量是强制性的，而在 SQL 中则是可选的。然后，可以在查询的其余部分使用别名变量
    `u` 来引用数据库行中的每个实体实例。


    该查询还为 `User` 实体指定了 `select` 子句。这意味着将为 `User` 表的每一行返回完整的用户实体实例。在 SQL 中，你需要枚举要查询的表的列。运行时会负责将此查询转换为底层数据库最合适的
    SQL 方言。


    ##### 使用 Select 进行选择


    JPQL 的 `select` 子句不仅可以接受实体，还可以接受路径表达式。最终返回的类型取决于传递给 `select` 子句的类型。在清单 5-41 所示的查询中，查询的返回类型将是
    `User` 实例的列表。也可以遍历实体到其某个属性，甚至到另一个实体。清单 5-42 展示了从 `User` 实体遍历到其 `UserCredentials`
    实体的过程。


    ```

    select u.userCredentials from User  u

    清单 5-42 展示了路径属性遍历

    ```


    即使查询是从 `User` 表开始的，遍历到 `User` 实体的 `UserCredentials` 字段也会导致查询返回的结果列表类型为 `UserCredentials`。也可以遍历实体的简单字段。清单
    5-43 展示了遍历简单属性的过程。


    ```

    select u.lastName, u.lastName, u.userCredentials.email from User  u

    清单 5-43 展示了遍历简单属性

    ```


    此查询遍历到 `User` 和 `UserCredentials` 实体中的简单类型。此查询的返回类型将是零个或多个对象数组的实例。这是因为对于此类表达式，最终属性可能是任何类型，因此运行时会将所有内容作为对象数组返回。


    本质上，这就是 JPQL 的 `select` 子句的工作方式。你可以选择一个实体，或者遍历到该实体的一个属性，甚至遍历到主实体中某个实体的属性。结果的返回类型将取决于传递给
    `select` 子句的类型解析为什么。如果解析为单一类型，则返回的结果将是该类型。如果解析为多个类型，则会得到一个对象数组。

    '
- fmt: '### The From Clause


    The `FROM` clause defines the entity or entities across which the query should
    span. The queries shown in Listings [5-41](#531256_1_En_5_Chapter.xhtml#PC41)
    to [5-43](#531256_1_En_5_Chapter.xhtml#PC43) all had the `FROM` clause declaring
    the query domain entity and aliasing it to a variable. The `FROM` clause, however,
    can also declare more than one entity to query across through `JOINS`.


    The query shown in Listing [5-42](#531256_1_En_5_Chapter.xhtml#PC42) will create
    an implicit inner join from the `User` to the `UserCredentials` table. The query
    can be rewritten as shown in Listing [5-44](#531256_1_En_5_Chapter.xhtml#PC44).


    ```

    select u.userCredentials from User  u join u.userCredentials c

    Listing 5-44

    showing explicit join

    ```


    The query now joins the `User` to the `UserCredentials` table and aliases the
    latter to the `c` variable. These aliased variables can then be used in the `where`
    clause. As used, the type of `JOIN` created is the inner `JOIN`. The `JOIN` type
    can be explicitly declared, but in its absence, it defaults to inner join. You
    can declare multiple `JOINs` and alias them all to variables that will be available
    in the rest of the query context. An outer `JOIN` can also be created using the
    `LEFT JOIN` syntax instead of just `JOIN`.


    Fetch joins can also be used to create joins, but unlike traditional joins, a
    fetch join does not return the joined entity. A fetch join signals the runtime
    to eagerly load the fetched entity so when it is accessed from the primary entity,
    there is no extra database call. Listing [5-45](#531256_1_En_5_Chapter.xhtml#PC45)
    shows the `User` entity with a fetch joined query for its transaction history.


    ```

    select u from User  u join fetch  u.transactionHistory

    Listing 5-45

    User entity with fetch join

    ```


    The fetch join of the transaction history of the user tells the runtime to prefetch
    the transaction history of each user row. The `transactionHistory` is declared
    to be lazily fetched. Within the transaction, with the join fetch in place, when
    this query is executed, the runtime will not make a second call to the database.
    The fetch join effectively eagerly fetches the joined entity.


    ### The WHERE Clause


    The `where` clause of a JPQL query is where the results are filtered to only those
    matching the where criteria. The `where` clause in JPQL is very similar to the
    SQL `where` clause. Listing [5-46](#531256_1_En_5_Chapter.xhtml#PC46) shows the
    `User` query restricting the result set to only users with a certain total conversion
    threshold.


    ```

    select u.userCredentials from User u

    where u.totalConversions >= :totalConversions

    Listing 5-46

    shows where for a User query

    ```


    The `where` clause uses the aliased variable in the `from` clause to set a condition.
    The aliased variable, being an instance of the `User` entity, can be traversed
    with the `.` operator. The `where` clause traverses the `totalConversions` field
    and uses the `>=` operator to restrict the result. The variable on the right-hand
    side of the operator is called a named parameter. This is the recommended way
    to pass variables to JPQL queries. The value will be escaped by the runtime on
    your behalf for security reasons.


    The `where` clause supports a number of the Java operators like `>`, `<`, `<=`,
    `>=`, and the keywords `LIKE`, `IN`, `IS`, `EMPTY`, `BETWEEN`, and the `NOT` for
    inverting any of the keywords. It also has support for the logical `AND` that
    you can use to create logically related conditions. The JPA specification has
    much more details about using the `where`^([^(103)](#fn103)) clause in your queries.


    ### Aggregate Queries


    JPQL also has support for aggregate queries. There are five aggregate queries
    that can be used to create summaries of data. These are `AVG`, `COUNT`, `MAX`,
    `MIN`, and `SUM`. Listing [5-47](#531256_1_En_5_Chapter.xhtml#PC47) shows the
    count of all Users with total conversions exceeding a passed amount.


    ```

    select COUNT(u) from User u

    where u.totalConversions >= :totalConversions

    Listing 5-47

    shows the use of the COUNT aggregate query

    ```


    The `COUNT` aggregate function is used in the `select` clause to count the number
    of users with total conversions exceeding a passed value. This query will return
    an integral type denoting the total count.


    ## Executing Queries


    After creating queries, they need to be executed. The way to execute JPQL queries
    is through the `EntityManager` interface. There are two kinds of JPQL, namely,
    dynamic and named queries.


    ### Dynamic Queries


    Dynamic queries are JPQL queries created directly in a method. These are said
    to be created on the fly or dynamically because they will be constructed for each
    call of the method. Listing [5-48](#531256_1_En_5_Chapter.xhtml#PC48) shows the
    query for loading all Users executed dynamically.


    ```

    public List loadAllUsers() {

    return em.createQuery("select u from User  u", User.class)

    .getResultList();

    }

    Listing 5-48

    shows dynamic query execution

    ```


    The `createQuery` method is an overloaded method on the entity manager that takes
    a query, and optionally a type, to which the results should be cast, and then
    returns a `TypedQuery<T>` where `T` is the type passed to the method. If no type
    is specified in the `createQuery` method, then a `Query` is returned. In this
    case, the result will be untyped. Generally, we do not recommend the use of the
    raw `Query` type. You should pass in a type as long as you know it beforehand.


    The returned `TypedQuery` interface has a number of methods that you can call
    to get the result of the query. The `getResultList`, `getResultStream`, and `getSingleResult`
    methods return a typed list of the query result, a typed `java.util.stream.Stream`
    interface, or a single result. We recommend avoiding the use of the `getSingleResult`
    because it is a little quirky.


    ### Named Queries


    The example shown in Listing [5-48](#531256_1_En_5_Chapter.xhtml#PC48) can be
    transformed into a named query by moving the JPQL to an element on the entity
    class as shown in Listing [5-49](#531256_1_En_5_Chapter.xhtml#PC49).


    ```

    @Entity

    @Table(name = "WALLET_USER")

    @NamedQuery(name = User.LOAD_ALL_USERS, query = "select u from User  u")

    public class User extends AbstractEntity {

    public static final String LOAD_ALL_USERS = "User.loadAllUsers";

    }

    Listing 5-49

    shows a named query

    ```


    Creating a named query entails annotating an entity class with the `@NameQuery`
    annotation. This annotation takes the name of the query and the actual JPQL. The
    example shown in Listing [5-49](#531256_1_En_5_Chapter.xhtml#PC49) shows the `User.loadAllUsers`
    query that selects all users from the user entity. Using a named query is just
    a matter of passing the name of the query to the `EntityManager` as shown in Listing
    [5-50](#531256_1_En_5_Chapter.xhtml#PC50).


    ```

    public List loadAllUsers() {

    return em.createNamedQuery(User.LOAD_ALL_USERS, User.class).getResultList();

    }

    Listing 5-50

    shows using the LOAD_ALL_USERS named query

    ```


    The `createNamedQuery` method of the `EntityManager` interface takes the name
    of the query and optionally the type. This is practically the only difference
    between executing a named and dynamic query. The jury is still out on which is
    much more efficient. Our general recommendation is to use named queries as much
    as possible because they are easier to read and can be found at one central place,
    mostly on the entity being queried.'
