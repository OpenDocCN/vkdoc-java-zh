    # 2. 企业级 Java、微服务与云


    多年来，软件应用开发已发生显著变化。编写、测试、交付和部署代码的整个流程经历了快速变革，最终迎来了当前的云原生软件工程时代。Java 平台也逐年演进，成为现代应用开发的强大平台。


    本章将带你了解云原生应用开发，通过回顾 Jakarta EE 应用部署的历史、加速云采用率上升的一些因素、通过 12 要素应用介绍云原生软件开发，最后探讨
    Jakarta EE 在云原生软件应用开发世界中的角色。


    ## Java 2 企业版（J2EE）的诞生


    Java 编程语言最初名为 Oak，于 1995 年 5 月由当时的 Sun Microsystems 公开发布。“一次编写，到处运行”的承诺立即吸引了开发者，加之当时
    Netscape 宣布在其同名浏览器中支持这种新语言，为 Java 开启了通往应用开发主导地位的征程提供了必要推力。那时，Web 浏览器已开始让更多人接入互联网，企业也开始寻求为网站用户提供更多交互性的方法。


    Java 编程语言最初是为创建手持娱乐控制器等家用设备应用而开发的。然而，这并未达到预期效果。借助当时 Netscape 浏览器的内置支持，该语言逐渐转向通过
    applet 和 JavaBeans 结构成为客户端开发语言。随着时间的推移，数据库连接 API——Java 数据库连接（JDBC）被加入，以满足应用中数据访问的需求。


    易用性、支持 Web 以及自动垃圾回收是推动 Java 在企业间普及的关键因素。意识到该语言可用于服务器端应用开发后，Sun 决定利用这一趋势以及新兴的应用服务器市场，通过引入
    Servlet 规范来抢占先机。Servlet 规范的理念是在服务器上运行一个 Java 应用，客户端可向其发起调用，并接收处理后的数据作为响应。这些数据可以是
    HTML 或浏览器能处理的任何内容。


    与此同时，IBM^(⁵¹) 发布了一个独立项目——企业级 JavaBeans 规范，旨在通过自动提供大多数企业应用通用的服务（如安全性、事务、可扩展性和远程调用能力）来简化
    Java 服务器端开发。EJB 规范还支持通过远程接口对业务方法进行远程调用。凭借这些多样化的能力，Java 成为开发 n 层架构应用的绝佳语言，并被许多大型企业采用。


    1999 年，Sun 最终推出了一个全新的、统一的平台，完全专注于开发大规模、分布式的企业应用。该平台将所有作为 Java 向服务器端编程语言过渡过程中开发出的分散规范整合到一个“伞式”规范中。最初由
    IBM 发布的 EJB 规范也作为 EJB 1.0 被纳入这个新平台。这个新平台被称为 Java 2 平台企业版，即 J2EE。其初始版本为 1.2。


    J2EE 构建于 Java 平台之上，旨在运行于实现该规范的应用服务器上。这意味着理论上你可以一次编写应用，然后在任何实现该规范的服务器上运行。该平台也借鉴了分布式企业系统领域的先前工作，如公共对象请求代理体系结构（CORBA^(⁵²)）。为确保应用服务器遵守规范并能自称是经过认证的
    J2EE 运行时，Sun 引入了一项许可计划，其中部分要求应用服务器必须通过兼容性测试套件（CTS）。

    '
- fmt: 'The application server market, as we mentioned earlier, was nascent at that
    point, with analysts predicting it to develop into a multibillion-dollar industry.
    This spurred a rush of vendors into the market. And with the release of `J2EE`,
    a lot of these vendors went in for `J2EE` certification. Some of these vendors
    are `BEA Systems`, `Nokia`, `Compaq`, `IBM`, `Oracle`, `SAP`, `Sybase`, `Macromedia`,
    `Hitachi`, and `TIBCO Software`. All these companies offered application servers
    on which `J2EE` applications could be deployed. All these servers were also proprietary,
    on-premise deployments. It is worthy of note that `Sun` itself had an application
    server, originally called `iPlanet`, but later renamed `Sun ONE`. The two dominant
    vendors in this market, however, were `IBM`’s `WebSphere` and `WebLogic` from
    `BEA`.


    There was another open source budding project called the Enterprise JavaBeans
    Open Source Software (`EJB-OSS`) that implemented the `EJB` application programming
    interface (`API`) from the `J2EE` specification. This project gradually implemented
    the specification, but was not `J2EE` certified. The name of the project was also
    eventually changed to `JBoss`. This open source application server made significant
    inroads into the enterprise environments of the time.


    ## Monoliths


    The dominant application development model at this time was the monolith. This
    development paradigm is where applications are built as one giant “bundle,” with
    all layers and components forming one giant cohesive deployment artifact. This
    paradigm has its advantages and disadvantages. Changing any part of the application
    meant having to redeploy the whole application.


    A typical `J2EE` application would be deployed as a Web Application Archive (`WAR`)
    or Enterprise Application Archive (`EAR`). The `WAR` file format was used for
    deploying `J2EE` applications developed using the web profile of the specification.
    `WAR` archives could be deployed to servlet containers or any runtime that implemented
    the web profile spec of the larger `J2EE` specification. `EAR` archives were used
    to deploy fully fledged `J2EE` applications that were developed using the gamut
    of the `J2EE` specification.


    The `J2EE` platform was very much suited to developing monolithic applications.
    This is mostly due to the fact that at the time the platform was developed and
    released, and years after that, the monolithic architecture was the most dominant
    and popular application development paradigm available. Consequently, the platform
    evolved to meet the needs of enterprises that were developing their software using
    this paradigm.


    Among the advantages of the monolithic application development architecture are
    as follows.


    ### Development Speed


    Given that every component of the application is in a single codebase, it is simple
    to have teams of developers working on it, implementing different features and
    functions at any point in time. With the addition of version control systems like
    `Git`, monolithic application development is simple and straightforward.


    ### Simpler to Onboard


    It is simple to onboard a new developer onto a project that uses a monolithic
    architecture. Because everything is unified in a cohesive, singular codebase,
    it is easy for new developers to get productive as soon as possible.


    ### Simplified Testing


    With everything in a single deployment artifact, it is generally easier to write
    unit and integration tests for the various components of any given monolithic
    application.


    ### Simplified Deployment


    As everything needed to run a monolithic application is bundled into a single
    archive (`WAR` or `EAR`), it is relatively simple to deploy: drop the generated
    archive into the deployment folder of any given runtime.


    ### Simplified Scaling


    With a simpler deployment model where everything is bundled together, it is relatively
    simple to scale a given monolith application by running multiple copies on different
    servers, routing traffic to same with a load balancer.


    These, among others, made monolithic architecture a straightforward choice for
    most enterprises. Features could be added at a much more measured pace, development
    teams could be scaled, and the application itself could be easily deployed with
    new changes with minimal effort.


    ## A Changing Development Landscape


    However, with the upsurge in Internet-connected devices, a general shift in software
    consumption from local installation to cloud hosting, the rise in popularity of
    web applications like `Gmail`, the rise in popularity of third-party hosted deployment
    infrastructure (e.g., `AWS`), the rise in popularity of the `REST` architecture,
    the rise of the `API` ecosystem, the increasingly lower cost of outsourcing deployment
    infrastructure, a boom in the number of companies offering competitive products
    and services, and an increasingly interconnected world meant that software development
    could not be as it was. Let us take a cursory look at these critical factors.


    ### Rise of Internet-Connected Devices


    The general popularity of the Internet, starting in the early 2000s, and a general
    expansion of Internet accessibility, was followed by an increase in Internet-connected
    devices. Brands like `BlackBerry` and `Nokia` pioneered the use of the Internet
    on mobile phones, with the introduction of the `iPhone` greatly popularizing the
    concept of “the Internet in your pocket.”


    ### General Shift in Software Consumption


    The rise of Internet-connected devices also signalled a change in how software
    was consumed by users. In the early days of computing, the software was built
    into the hardware of the computer. This paradigm kept evolving to the point of
    the rise of connected devices. The natural nature of the Internet meant that software
    didn’t have to be necessarily installed on the consuming device for it to be used.


    ### Rise in Popularity of Web Applications


    Consequent to the rise of connected devices and a shift in the general pattern
    of software consumption is the rise in popularity of web applications. Massively
    popular applications like `Gmail` ushered in an era where web applications would
    become the default means of consuming software. This shift was very significant
    because it meant that enterprises would need to pivot how they got their software
    to final end users.


    ### Rise in Popularity of Third-Party Hosted Infrastructure


    The rise in popularity of third-party hosted infrastructure around the same time
    as the abovementioned points were taking place signalled a new era of application
    development for both established and startup enterprises alike. The advent of
    Amazon Web Services (`AWS`), with its offering of massive cloud infrastructure,
    meant that enterprises could now fully outsource all that is needed to create,
    test, and continuously deploy applications to an external service provider. This,
    consequently, entailed a shift in how applications were developed.


    ### Rise in Popularity of the REST Architecture


    The Representational State architecture, as pioneered by Dr. Roy Fielding in his
    PhD thesis, started gaining popularity around this time. This architecture proposed
    a way for applications to expose and consume information through predictable interfaces
    in the form of endpoints.


    ### Rise of the API Ecosystem


    The `API` ecosystem also started flourishing around this time. This ecosystem
    is where other companies offer specialized services in the form of `API`s over
    the Internet, for instance, an `API` service for managing currency exchange rates.
    Enterprises could now outsource orthogonal functions to third-party companies
    specializing in that particular area. All these are consumed through `RESTful`
    endpoints.


    ### Lower Cost of Outsourcing Infrastructure


    The rise in firms specializing in hosted infrastructure meant it generally was
    cheaper to outsource the entire stack needed from development to deployment rather
    than host in house.'
