    runtimes provide implementations for. Using it as an injection point type as we
    have done won’t work because CDI doesn’t have a way to instantiate it. To get
    around this problem, we can use producers. With CDI producers, you tell the container
    where a given bean type is “produced” so any time there is a request for a contextual
    instance of that bean, the container will go to your producer for the instance.
    There are two kinds of CDI producers – producer fields and methods.


    ### Producer Fields


