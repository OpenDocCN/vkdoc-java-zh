    虽然 Java EE 已经成为一个几乎完全由元数据驱动的平台，你只需一个依赖项就能让一切自动配置并可用，但 Spring 却变得更加依赖开发者通过 XML
    配置文件来配置其各种组件。公平地说，Spring 最初是基于 Java Servlet 规范的，这意味着一个典型的 Spring 开发者需要了解 Servlet
    和 Spring 的配置。实际上，使用 Spring 进行应用开发已经变得几乎和 J2EE 时代一样复杂^(⁴⁵)。


    2012 年 10 月，Mike Youngstrom 在 Spring Jira 看板上提出了一个问题^(⁴⁶)，讨论如何简化 Spring 配置。他写道：“我认为，如果能够提供工具和一个参考架构，从上到下利用
    Spring 的组件和配置模型，那么 Spring 的 Web 应用架构可以显著简化。将那些常见 Web 容器服务的配置嵌入并统一到一个从简单的 `main()`
    方法启动的 Spring 容器中。”正是在这个讨论串中，Spring Boot 被提及^(⁴⁷)，当时它还是一个旨在解决 Mike 所提出的复杂性问题的新生项目。因此，Spring
    Boot 作为 Spring 框架的一个子项目，其诞生就是为了解决其父项目的不足，正如父项目诞生是为了解决开发者在使用当时 J2EE 时所面临的挑战一样。


    如今，Jakarta EE 和 Spring 都是同样优秀且高效的、旨在让开发者生活更轻松的企业级 Java 应用开发平台。这两个平台都有着相互影响、不断创新并在每个版本中变得更好的历史。这场“创新竞赛”的最终赢家是你，开发者。实在没有必要在某些角落进行关于谁优谁劣的激烈争论。这两个平台都源于
    J2EE 平台，因此它们更多的是互补而非竞争关系。作为一名 Java 开发者，你对 Jakarta EE 的了解可以轻松地迁移到 Spring 平台，只需付出极少的努力。了解这两个平台的历史，对于认识它们的相似性而非差异性至关重要。由于本书是关于
    Jakarta EE 的，让我们简要探讨一下为什么你应该学习在该平台上进行应用开发。


    ## 为什么选择 Jakarta EE？


    到目前为止，你已经对 Jakarta EE 的历史及其与 Eclipse MicroProfile 的关系进行了一次历史性的回顾。你也从 Jakarta EE
    的角度审视了 Spring。这两个平台共同构成了 Java 生态系统中企业应用的主流选择。Java 平台当然还有更多的框架可用于开发各种类型的应用。


    作为一名 Java 开发者、CTO 或企业的平台架构师，面对众多的软件开发框架和平台，你可能会感到难以抉择。你可能会问自己一个问题：为什么我应该选择 Jakarta
    EE 作为我的主要软件开发平台？是什么让它成为更好的选择？


    至少有以下几个理由值得你尝试 Jakarta EE，其中关键包括：


    *   标准化

    *   开放性

    *   稳定性

    *   开发便捷性

    *   可移植性

    *   按需选择——坦克或手枪

    *   出色的文档


    ### 标准化


    在移交至 Eclipse 基金会之前，平台上的每一个规范都经过了严格的流程，包括公众审查和 JSR 专家组审查，最终由 JCP EC 投票决定。在 Eclipse
    基金会，新的规范发布同样会经历类似的同行评审机制^(⁴⁸)。这确保了构成平台的所有规范都在向后兼容性、对 Java 平台整体的益处以及满足明确定义的技术标准方面经过了权衡。你可以信赖
    Jakarta EE 规范将在很长一段时间内可用且可靠。这对于生命周期长的企业应用尤其重要。你也可以确信，任何给定的 API 调用在平台的不同兼容实现中都会以相同的方式可预测地运行。


    ### 开放性


    Jakarta EE 规范是通过 Jakarta EE 规范流程，采用“代码优先”的方法制定的。这个过程简单且开放，任何对推进该平台感兴趣的人都可以以规范的形式做出贡献。采用“代码优先”意味着你从提案的实际代码开始，让其接受审查，并及时获得反馈。这确保你不会投入资源经历整个贡献流程，最终却发现你的贡献或规范未被接受。


    ### 稳定性


    Jakarta EE 作为一个标准，意味着 Eclipse 基金会只会接受和标准化经过行业验证和测试的技术。对于需要长期维护的应用，没有空间去使用那些明天就可能消失的流行技术。每一项
    Jakarta EE 技术都经过了行业的验证和测试（既通过了 TCK 测试，也在生产环境中得到验证），并且是长期存在的。另一方面，那些较新、不够成熟且快速发展的技术，则是
    MicroProfile 项目的完美候选，该项目在 Jakarta EE 平台之上构建并与之良好集成。因此，如果你的应用需要，你仍然可以访问并依赖那些前沿的
    API。


    ### 开发便捷性


    使用 Jakarta EE 和 Eclipse MicroProfile 进行应用开发非常轻松。你只需要一个应用服务器或符合 Jakarta EE 规范的运行时，以及一个（或两个）Maven
    依赖项。最小化配置、约定优于配置、极少甚至无需 XML，以及可预测且可靠的默认设置，这些都是 Jakarta EE 平台开箱即用的优势。例如，对于快速原型开发，JEE
    规范提供了一个默认的数据源，你可以直接使用，无需进行任何配置。


    ### 可移植性


    Jakarta EE 作为一个标准，意味着只要开发者按照标准进行编码，你的应用就应该能够在标准的不同兼容实现之间运行，只需进行最少甚至无需配置更改。这一点很有吸引力，因为你不会被锁定在任何特定的
    Jakarta EE 应用运行时供应商。只要你使用标准的 Jakarta EE API，你的代码就可以在各种应用服务器之间移植。


    ### 按需选择——坦克或手枪


    Jakarta EE 与 Eclipse MicroProfile 项目相结合，是一个庞大的平台，可能看起来令人生畏。但你可以根据应用需求，从该平台中选择所需的任何
    API。你可以像使用坦克或手枪一样使用这个平台——由你决定。如果你选择使用整个平台，所有不同的 API 会作为一个整体集成在一起；如果你选择精挑细选，它们也可以独立存在。作为一组抽象规范，兼容的实现提供了运行应用所需的一切；你只需交付你的代码。因此，你最终会得到更轻量的部署工件，其中大部分是你的代码。


    ### 出色的文档


    Jakarta EE 是一个组织良好的社区项目，拥有海量的文档。值得注意的是 Jakarta EE 教程^(⁴⁹)，这是官方的 Jakarta EE 手册。此外，还有许多社区和企业组织的会议，如
    Devoxx 和 Oracle JavaOne^(⁵⁰)，都非常重视服务器端 Java 开发。还有像你正在阅读的这本书一样，由个人开发者撰写的书籍，都专注于帮助你成为一名基础扎实的企业级
    Java 软件开发者。

    '
