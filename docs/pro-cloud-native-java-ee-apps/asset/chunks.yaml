    With these file descriptors in place, we have transformed the wallet microservice
    into a cloud-native Jakarta EE application. The rate and account services have
    a similar structure to the wallet service. Using the guidelines in the previous
    section, we are able to decompose the monolith into business-bounded contexts.
    Each service is a single deployable unit, complete with its own tests.


    The sample code contains a shell script that has commands to package and run the
    application as docker containers deployed to a Kubernetes-managed cluster . The
    Readme file contains all the needed information to run the application or individual
    microservices. Each service can be run stand-alone or together as a single unit.
    With the application packaged as containers and with the requisite descriptors,
    deploying to a cloud provider is as simple as pushing the generated images to
    a docker registry (most cloud providers have their own registry) and choosing
    the pushed image to deploy. The Microsoft Azure Kubernetes Service^([^(122)](#fn122))
    (AKS) is a good starting point for your own experimenting.


    ## Summary


    This chapter looked at monoliths and their pros and cons, then proceeded to discuss
    the considerations to keep in mind when adopting or migrating to a microservices
    architecture . The chapter then moved to take a look at one of three microservices
    and the general parts that will need changing when migrating an application from
    a monolith to microservices. As stated in the chapter, migrating an application
    is a domain-dependent task; however, we have attempted to provide broad guidelines
    and considerations that should help clarify the process and task of migrating.'
