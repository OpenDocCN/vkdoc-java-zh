  trans: '

    #### CDI Bean 类型


    注入点是指任何期望由 CDI 容器实例化的字段或参数。例如，清单 4-4 中标注了 `@Inject` 的 `walletService` 字段就是一个注入点。CDI
    容器会将 `WalletService` 类型的上下文实例注入到变量 `walletService` 中。但 CDI 容器如何知道对于任意给定的注入点，应该将变量解析为哪种类型呢？显然，我们需要一种方式来告知运行时环境我们
    CDI Bean 的类型，以便它能正确地将每个可注入字段解析为其对应的类型。


    从技术上讲，CDI Bean 是任何实现了 `jakarta.enterprise.inject.spi.Bean<T>`^(⁹⁰) 接口的 Java 类。该接口代表一个
    Bean，并定义了 CDI 容器管理 Bean 实例所需的一切。`Bean` 接口本身扩展了 `jakarta.enterprise.inject.spi.BeanAttributes<T>`^(⁹¹)
    接口。该接口包含以下方法：


    *   `getName()` – 获取 Bean 的 EL 名称（如果 Bean 上使用了 `@Named` 注解）

    *   `getQualifiers()` – 获取 Bean 的限定符集合

    *   `getTypes()` – 获取 Bean 的类型集合

    *   `getScope()` – 获取 Bean 的作用域

    *   `getStereotypes()` – 获取 Bean 的原型集合

    *   `isAlternative()` – 布尔方法，用于判断 Bean 是否为备选 Bean


    这些方法返回相关信息，帮助 CDI 容器将注入点解析为正确的 Bean 类型。此外，`Bean` 接口还包含 `create()` 和 `destroy()`
    方法，容器会调用它们来分别创建和销毁 Bean 实例。在实践中，你无需显式实现 `Bean` 接口。CDI 实现可以代表你，从你的 Bean 生成 `Bean<T>`
    接口的实现。通过为你的 Bean 实现 `Bean<T>` 接口，CDI 容器可以通过其类型、类型与限定符的组合，以及通过名称（在表达式语言中）来解析 Bean
    类型。


    ##### 按类型解析


    任何 CDI Bean 的类型包括：该 Bean 的所有超类（直至 `java.lang.Object`）、所有直接或间接实现的接口，以及该类本身。以我们的
    `WalletService` Bean 为例，它的类型将是 `java.lang.Object` 和 `WalletService`，因为它除了 `Object`
    之外没有其他超类，也没有实现任何接口。然而，`WalletResourceImpl`（清单 4-4）有三种类型：它是 `Object`、`WalletResource`
    和 `WalletResourceImpl`。


    ##### 按名称和限定符解析


    CDI 中的限定符是一种标记或限定 CDI 组件的方式，以便 CDI 容器能进一步识别它们。如清单 4-4 所示，`WalletResourceImpl.java`
    类实现了 `WalletResource` 接口。这意味着我们可以有一个类型为 `WalletResource` 的注入点，如清单 4-5 所示。


    ```

    public class HelloResourceImpl implements HelloResource {

    @Inject

    WalletResource walletResource;

    }

    清单 4-5

    展示通过接口类型注入字段

    ```


    清单 4-5 展示了 `HelloResourceImpl` 在变量 `walletResource` 上声明了对 `WalletResource` 的依赖。`WalletResource`
    是一个由 `WalletResourceImpl` 实现的接口。由于接口可以被多个类实现，清单 4-5 中声明的注入点 `walletResource` 需要被限定，因为
    CDI 容器在运行时无法知道对于任何给定类型为 `WalletResource` 的注入点，应该注入哪个 `WalletResource` 实现。我们稍后讨论
    CDI 限定符时会再回到这一点。


    ##### 按名称解析


    前两种 Bean 解析机制，即按类型解析以及按类型和限定符解析，都是类型安全的。第三种解析 Bean 的方式是按名称解析。你可以在基于字符串的环境中（如 Jakarta
    EE 平台的表达式语言^(⁹²)）访问给定 Bean 的实例。通过在 Bean 上标注内置限定符 `@Named`，可以在 EL 中访问时解析该 Bean。清单
    4-6 展示了标注了 `@Named` 的 `WalletService`。


    ```

    @Named

    @RequestScoped

    @Transactional

    public class WalletService {

    }

    清单 4-6

    展示使用 @Named 在 EL 中解析 Bean

    ```


    清单 4-6 展示了标注了 `@Named` 限定符的 `WalletService`。有了这个限定符，`WalletService` 就可以通过 EL 表达式访问。默认情况下，`WalletService`
    可以通过 EL 表达式中自动可用的变量 `walletService` 来访问，例如：`#{walletService.someMethod()}`。当以这种方式访问时，CDI
    容器会负责创建实例并将其注入到变量中。


    无论使用哪种机制来解析 Bean 实例，CDI 容器都会为给定的字段类型创建正确的实例。由 CDI 容器为满足注入点而创建的 Bean 实例，其技术术语是**上下文实例**，这引出了一个问题：什么是上下文实例？


    ### CDI Bean 与上下文实例


    在上一节中，我们看到 Bean 是一个 Java 类，它可选地关联了 CDI 元数据，并可用于满足注入点。因此，Bean 是用于满足应用程序中依赖请求的实例来源。由
    CDI 容器为满足注入点而创建的 Bean 实例，在技术上被称为**上下文实例**。


    我们在上一节中看到的 `Bean<T>` 接口也扩展了 `Contextual<T>` 接口。`Bean<T>` 接口的 `create` 和 `destroy`
    方法正是继承自 `Contextual<T>`^(⁹³) 接口。从任何实现了 `Bean<T>` 接口的 Bean 创建的实例被称为上下文类型。由于 CDI
    运行时通常会代表你创建 `Bean<T>` 接口的实现，最终你会得到注入到注入点中的上下文实例。


    当你通过在注入点上使用 `@Inject` 注解向 CDI 容器请求 Bean 实例时，容器必须确保返回给你的上下文实例与正确的作用域相关联。Bean 实例总是与一个作用域相关联。你可以显式定义
    Bean 应该关联到哪个作用域。如果你没有为某个给定的 Bean 显式定义作用域，容器会将该 Bean 的上下文实例与默认作用域关联起来。

    '
- fmt: '# Scopes and Contexts


    CDI created instances of your beans are associated with scopes. You can think
    of a CDI scope as a well-defined lifetime within which a bean instance can exist.
    When a given scope is destroyed, so are all the bean instances associated with
    that scope. Different beans with different scopes can be injected into each other.
    The CDI container takes care of ensuring the right bean is injected into each
    dependent injection point.


    As an example, we have a `SecurityManager` that we want to have only a single
    instance for the entire lifetime of the application – from boot to shutdown. This
    `SecurityManager` controller has a dependency on another controller, `UserService`,
    that is scoped to each HTTP request. Listing [4-7](#531256_1_En_4_Chapter.xhtml#PC7)
    shows the `UserService` controller.


    ```

    @RequestScoped

    @Transactional

    public class UserService {

    @Inject

    UserRepository userRepository;

    }

    Listing 4-7

    showing the UserService controller

    ```


    Listing [4-7](#531256_1_En_4_Chapter.xhtml#PC7) shows the `UserService` class.
    It is annotated with `@RequestScoped`. This is one of the built-in scopes (more
    about the various scopes in a bit). This bean declares a dependency on the `UserRepository`,
    which is also another `RequestScoped` bean. Listing [4-8](#531256_1_En_4_Chapter.xhtml#PC8)
    shows the `SecurityManager` controller.


    ```

    @ApplicationScoped

    public class SecurityManager {

    @Inject

    UserService userService;

    }

    Listing 4-8

    showing the SecurityManager controller

    ```


    Listing [4-8](#531256_1_En_4_Chapter.xhtml#PC8) shows the `SecurityManager` controller
    and its dependency declaration on the `UserService` controller. Note that the
    `SecurityManager` is annotated with `@ApplicationScoped`. This is also one of
    the built-in scopes. Even though the `UserService` and `SecurityManager` are associated
    with different scopes, the CDI container will ensure that all clients of the `SecurityManager`
    see different instances of the `userService` context object. It achieves this
    through the use of the concept bean proxying.


    ## Bean Proxying


    The `userService` reference in the `SecurityManager` controller as shown in Listing
    [4-8](#531256_1_En_4_Chapter.xhtml#PC8) is not a direct reference to the contextual
    instance returned by the call to the `Contextual#create()`, but a client proxy
    object. This client proxy object implements some or all bean types of the bean
    and delegates method invocations on it to the target contextual object. Why this
    seeming indirection?


    Back to our `SecurityManager` controller, this class will have a single instance
    through the entire life of the application. However, it declares a dependency
    on a bean that is scoped to each HTTP request. What this means is that each client
    of the `SecurityManager` should have a different instance of the `UserService`
    bean injected. This situation requires the container to create an indirect reference
    to the `UserService` contextual instance. The container needs to guarantee that
    when any valid injected reference to a bean belonging to any given scope is invoked,
    the invocation is always processed by the current instance of the injected bean.


    The container needs to manage possible circular dependencies as well. The cleanest
    and most transparent way to be able to achieve all of that is through the use
    of the client proxy object. This way, you are guaranteed the right contextual
    instance in the right scope no matter the dependency relationship between your
    beans.


    ## Built-In Scopes


    CDI comes with a number of built-in scopes that cater to the common needs of most
    applications. You can create your own scope if you want. But in order to create
    a cohesive platform and provide a uniform base for other APIs to build on, the
    CDI spec comes with a total of five built-in scopes. They are `@ApplicationScoped`,
    `@RequestScoped`, `@SessionScoped`, `@ConversationScoped`, and the `@Dependent`
    pseudo-scope.


    ### @ApplicationScoped


    The `@ApplicationScoped` annotation on a bean makes the bean an application-scoped
    singleton. What this means is that for the entire lifetime of any given application
    running instance, only a single contextual instance of this `@ApplicationScoped`
    bean will be created. The `SecurityManager` controller shown in Listing [4-8](#531256_1_En_4_Chapter.xhtml#PC8)
    is an application-scoped bean. The application scope itself is created at container
    boot time. However, the first and only contextual instance of this bean will be
    created when a method is first invoked on a proxy. After creation, no matter how
    many `SecurityManager` bean proxies the container creates, all method invocations
    will be delegated to the same bean instance across the application.


    It does not matter what other scope the `SecurityManager` gets injected into.
    All method invocations will eventually be serviced by the same bean instance.
    That instance will be destroyed by the container when the application scope is
    destroyed during application shutdown.


    ### @RequestScoped


    The `@RequestScoped` annotation on a bean associates the bean with an external
    user request originating from a servlet request, a web service request, and a
    remote EJB request. The container will also create a request scope during a CDI
    event (we will talk about CDI events in a later section) dispatch to an async
    observer method.


    For a servlet request, the CDI container will create a request scope when `service()`
    or `doFilter()` methods are invoked on a servlet or servlet filter, respectively.
    For a web service, the container will create a request scope for each web service
    invocation, whether through JAX-RS or JAX-WS. A request is also created for each
    remote EJB invocation during the handling of the invocation by the EJB. A request
    scope will also be created when the CDI container dispatches an event to an async
    method observer of that particular event. For all these invocations, the request
    scope will be created and destroyed once the invocation ends.


    The `UserService` controller shown in Listing [4-7](#531256_1_En_4_Chapter.xhtml#PC7)
    is scoped to the request context through the `@RequestScoped` annotation. For
    each web service call on the `UserResourceImpl` resource, a new request scope
    will be created and a new contextual instance of the `UserService` will be created
    and associated with that scope, because the `UserResourceImpl` declares a dependency
    on the `UserService` controller as shown in Listing [4-9](#531256_1_En_4_Chapter.xhtml#PC9).


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResourceImpl implements UserResource {

    @Inject

    UserService userService;

    }

    Listing 4-9

    showing the UserResourceImpl and its dependent declaration on the UserService
    controller

    ```


    Listing [4-9](#531256_1_En_4_Chapter.xhtml#PC9) shows the `@RequestScoped` `UserService`
    controller injected into the `UserResourceImpl` REST web service class. For each
    REST method invoked on the `UserServiceResourceImpl` class, a new request scope
    will be created and both the `UserServiceResourceImpl` and the `UserService` contextual
    instances associated with that scope. After the method invocation returns, both
    the scope and associated contextual instances will be destroyed.'
