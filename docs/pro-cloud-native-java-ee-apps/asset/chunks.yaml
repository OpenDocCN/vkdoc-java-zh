    `core` 模块的 POM 文件如清单 3-6 所示，内容非常精简，没有额外的依赖项，一个显著的例外是它被打包成 jar 文件。这是因为 `core` 模块将被其他三个模块依赖以提供通用功能，但它本身不是一个可部署的微服务，因此被打包成
    jar 文件以包含在其他模块/微服务中。这个核心模块将充当编排模块，其他模块通过它进行相互通信。


    ```


    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.core

    jar

    core


    清单 3-6

    核心模块 pom.xml

    ```


    `account` 和 `rate` 微服务的 `pom.xml` 文件与 `wallet` 微服务的类似，如清单 3-7 所示。它们非常精简，唯一的依赖项是
    `core` 模块。任何特定于某个模块的依赖项都可以在该模块的 POM 文件中声明。另外请注意，它们的打包格式是 `war`。这意味着它们可以作为独立应用程序部署到应用服务器上。在我们的案例中，将使用
    OpenLiberty 服务器来运行所有内容。


    ```


    4.0.0


    com.example

    jwallet

    1.0-SNAPSHOT


    jwallet.wallet

    war


    ${project.groupId}

    jwallet.core

    ${project.version}


    wallet


    清单 3-7

    钱包模块 pom.xml

    ```


    该应用程序被打包为一组容器镜像，可以通过 Docker、Docker Compose 和 Kubernetes 进行部署和管理。创建容器镜像的入口点是每个模块文件夹中的
    `Dockerfile` 文件。钱包微服务的 `Dockerfile` 如清单 3-8 所示。


    ```

    FROM icr.io/appcafe/open-liberty:22.0.0.3-full-java11-openj9-ubi

    COPY --chown=1001:0 src/main/liberty/config /config

    COPY --chown=1001:0 src/main/liberty/derby-10.14.2.0.jar /opt/ol/wlp/usr/shared/resources

    COPY --chown=1001:0 target/*.war /config/apps

    EXPOSE 3001

    RUN configure.sh

    清单 3-8

    钱包模块 Dockerfile

    ```

