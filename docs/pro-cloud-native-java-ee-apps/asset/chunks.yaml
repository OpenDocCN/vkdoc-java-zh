    第11行还将方法声明为`@SimplyTimed`，但这次传入了一个显式的计时器名称。此注解暴露的指标可以在捆绑的Grafana应用程序中观察到，如图[3-6](#531256_1_En_3_Chapter.xhtml#Fig6)所示。


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig6_HTML.png)


    一个截图展示了Grafana探索器中钱包指标的堆叠线图，最高点为0.0193。


