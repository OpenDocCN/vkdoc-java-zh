- fmt: '#### Closed


    The circuit breaker is closed when invocations are allowed through to the guarded
    method. This is the normal state of being for the circuit breaker. It records
    whether each method invocation succeeded or not and keeps tally up to a preset
    count. If the preset count is reached and the proportion of failed method invocations
    exceeds a preset failure ratio (relative to the preset count), the circuit breaker
    transitions to the open state.


    #### Open


    In the open state, calls to the guarded method will fail immediately with an `org.eclipse.microprofile.faulttolerance.exceptions.CircuitBreakerOpenException`.
    This exception will keep being thrown for all method invocations until a configurable
    delay is reached, after which the circuit breaker then transitions to half-open
    state.


    #### Half-Open


    In the half-open state, the circuit breaker allows a configurable number of trial
    invocations through to the guarded method. By default, if one of those invocations
    fails, the circuit breaker transitions back to the open state. If all the trial
    executions succeed, the circuit breaker transitions to the closed state.


    The `@CircuitBreaker` annotation can be used to create a circuit breaker for a
    method. If the annotation is used on a class, then all methods in the class will
    have circuit breakers. If used on a class and a method inside that class, then
    the `@CircuitBreaker` at the method level takes precedence over the class-level
    annotation for that method. Listing [8-6](#531256_1_En_8_Chapter.xhtml#PC6) shows
    the `@CircuitBreaker` annotation used on the `convertCurrency` method in the `RateService`
    bean.


    ```

    @ApplicationScoped

    public class RateService {

    @CircuitBreaker

    @Fallback(fallbackMethod = "convertCurrencyFallback")

    public ConvertCurrencyResponse convertCurrency(final ConvertCurrencyRequest convertCurrencyRequest)
    {

    return convert(convertCurrencyRequest);

    }

    }

    Listing 8-6

    showing the @CircuitBreaker used in the RateService bean

    ```


    Listing [8-6](#531256_1_En_8_Chapter.xhtml#PC6) shows the `@CircuitBreaker` method
    used on the `convertCurrency` method in the `RateService` bean. As is, the circuit
    breaker will consider all exceptions of type `java.lang.Throwable` thrown in the
    method as a failure and transition to the open state if 10 or more failures occur
    during 20 consecutive requests. The circuit breaker will then delay for 5000 milliseconds
    in the open state before transitioning to the half-open state, during which a
    single successful call will cause it to transition to the closed state.


    The parameters of the `@CircuitBreaker` annotation are shown in Table [8-2](#531256_1_En_8_Chapter.xhtml#Tab2).


    **Table 8-2** showing the `@CircuitBreaker` annotation parameters


    | Parameter | Description | Default Value |

    | --- | --- | --- |

    | `failOn` | The exceptions to be considered a failure | `Throwable.class` |

    | `skipOn` | Exceptions that should not be considered failures | – |

    | `delay` | How long the circuit breaker should stay in the open state | `5000`
    |

    | `delayUnit` | The delay unit | `ChronoUnit.MILLIS` |

    | `requestVolumeThreshold` | The total number of consecutive requests in a rolling
    window | `20` |

    | `failureRatio` | The ratio of failures relative to the `requestVolumeThreshold`
    that should trip the circuit to open | `0.50` |

    | `successThreshold` | The number of successful invocations that should transition
    the circuit from half-open to closed | `1` |


    The `@CircuitBreaker` annotation can be used alongside other fault-tolerant annotations.
    As shown in Listing [8-6](#531256_1_En_8_Chapter.xhtml#PC6), it is used in combination
    with the `@Fallback` annotation. In this case, when the circuit breaker opens,
    failed invocations will cause the fallback method, in this case `convertCurrencyFallback`,
    to be invoked.


    ### Asynchronous


    The `@Asynchronous` annotation is used to transform a method into an asynchronous
    one that executes on a separate thread from the calling thread. A method annotated
    `@Asynchronous` must return either of `java.util.concurrent.CompletionStage` or
    `java.util.concurrent.Future`. To maximize the use of this annotation with other
    fault-tolerant annotations, the specification recommends the use of `CompletionStage`
    as the return type.


    `@Asynchronous` can be used at the class or method level. When used at the class
    level, all methods in the class will be executed asynchronously. This annotation
    does not take any parameters. The only requirement, as stated earlier, is that
    the method returns either `Future<T>` or `CompletionStage<T>`. Listing [8-7](#531256_1_En_8_Chapter.xhtml#PC7)
    shows an asynchronous method, `convertCurrencyAsync`, in the `RateService` that
    makes use of the `@Asynchronous` annotation.


    ```

    @ApplicationScoped

    public class RateService {

    @Asynchronous

    @Retry

    public CompletionStage convertCurrencyAsync(

    final ConvertCurrencyRequest convertCurrencyRequest) {

    return CompletableFuture.completedFuture(convert(convertCurrencyRequest));

    }

    }

    Listing 8-7

    shows the RateService method convertCurrencyAsync using @Asynchronous

    ```


    Listing [8-7](#531256_1_En_8_Chapter.xhtml#PC7) shows the `RateService` method
    `convertCurrencyAsync` annotated with the `@Asynchronous` and `@Retry` annotations.
    The method returns a `CompletionStage` wrapped `ConvertCurrencyResponse` object.
    When this method is invoked, a new thread will be spawned for its execution. As
    the `@Asynchronous` is used alongside `@Retry`, the retrying, should the method
    complete exceptionally, will happen in the spawned thread. All other fault-tolerant
    interceptors used with `@Asynchronous` will take place in the spawned thread.


    If `@Asynchronous` is used with `@Fallback`, the fallback method must have the
    same signature as the original method. That is, the fallback method must also
    return a `Future<T>` or `CompletionStage<T>` exactly as the method it is acting
    as a fallback for.


    ### Bulkhead


    The `@Bulkhead` annotation is a fault-tolerant annotation that is used to limit
    the number of concurrent requests that can hit a given method instance. By default,
    the annotation allows ten concurrent requests to an application. Depending on
    how the annotation is used, you can optionally specify how many requests can wait
    in a queue. The bulkhead implementation has two main styles, namely, semaphore
    and thread pool isolation.


    #### Semaphore Style


    The semaphore style bulkhead is when a non-`@Asynchronous` method is annotated
    `@Bulkhead`. Listing [8-8](#531256_1_En_8_Chapter.xhtml#PC8) shows the `RateService`
    `convertCurrency` method annotated `@Bulkhead`.


    ```

    @ApplicationScoped

    public class RateService {

    @CircuitBreaker

    @Fallback(fallbackMethod = "convertCurrencyFallback")

    @Bulkhead

    public ConvertCurrencyResponse convertCurrency(final ConvertCurrencyRequest convertCurrencyRequest)
    {

    return convert(convertCurrencyRequest);

    }

    }

    Listing 8-8

    showing the use of @Bulkhead in RateService

    ```


    Listing [8-8](#531256_1_En_8_Chapter.xhtml#PC8) shows the `RateService`’s `convertCurrency`
    method annotated `@Bulkhead`. This bulkhead use is the semaphore style because
    the annotated method is not asynchronous. As is, the method will allow only ten
    concurrent users at a time to the method. If the number of concurrent users exceeds
    ten, an `org.eclipse.microprofile.faulttolerance.exceptions.BulkheadException`
    will be thrown. In this case, because the annotation is used with the `@Fallback`,
    the fallback method will be called if the exception is thrown. The number of current
    users can be customized by setting the `value` parameter of the annotation.'
