    #### 授权


    当客户端通过身份验证后，MicroProfile JWT 会将 JWT 声明中传递的组映射为客户端角色。对于每个受保护的资源，运行时将自动检查当前正在执行的客户端是否具有服务器声明的角色。


    #### 安全上下文传播


    在令牌验证通过且客户端完成身份验证后，MicroProfile JWT API 提供了获取原始令牌的方法，该令牌随后可被传递给微服务集群中的其他后端资源。例如，当客户端向服务
    A 进行身份验证，而服务 A 又依赖于服务 B 时，如果两者都使用 MicroProfile JWT 进行保护，服务 A 可以获取客户端传递的原始令牌，并使用该令牌调用服务
    B，从而将 JWT 传播到服务 B。


    ## MicroProfile JWT 的使用


    使用 MicroProfile JWT 保护资源的第一步是在 Jakarta REST 的 `jakarta.ws.rs.core.Application`
    类上使用 `@LoginConfig` 注解。清单 11-6 展示了 `RootResourceConfiguration` 类，它继承了 `Application`，并使用
    `authMethod` 为 `MP-JWT` 的 `@LoginConfig` 注解进行了标注。


    ```

    @ApplicationPath("api")

    @LoginConfig(authMethod = "MP-JWT")

    public class RootResourceConfiguration extends Application {

    }

    清单 11-6

    JWT 配置

    ```


    `@LoginConfig` 注解告知运行时，应用程序中的所有资源都应受到保护，因此所有客户端请求都需要传递一个有效的 JWT 以进行验证和身份验证。配置完成后，保护
    Web 资源就像在资源类或方法上添加 `@RolesAllowed` 注解一样简单。清单 11-7 展示了 `WalletResource` 仅允许具有 `teller`
    角色的已认证用户访问。用户角色完全在 Keycloak 中管理。在企业应用中，产品负责人与业务团队将共同决定应用程序每个用户所需的角色。所有这些都可以在 Keycloak
    中完全完成。我们的后端服务只是消费安全框架中配置的内容。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @RolesAllowed("teller")

    public class WalletResource {

    }

    清单 11-7

    受保护的 WalletResource

    ```


    来自 `jakarta.annotation.security.RolesAllowed` 包的 `@RolesAllowed` 注解，会导致向那些在未携带有效令牌的情况下调用此类中任何资源的客户端返回
    HTTP 状态码 401。清单 11-8 展示了一个未受保护调用的响应示例。


    ```

    http://localhost:3001/wallet/api/wallets

    HTTP/1.1 401 Unauthorized

    WWW-Authenticate: Bearer realm="MP-JWT", error="invalid_token"

    Content-Language: en-US

    Content-Length: 0

    Date: Sun, 28 Aug 2022 00:13:24 GMT

    清单 11-8

    无令牌调用的响应

    ```


    ### 从令牌中获取信息


    当用户成功通过验证和身份验证后，应用程序可能希望获取令牌声明中包含的一些信息。API 提供了两种主要方式来访问 JWT 主体中的声明。它们是 `JsonWebToken`
    bean 和使用 `@Claim` 限定符注入声明值。


    #### JsonWebToken


    `JsonWebToken` 接口继承了 `java.security.Principal`，并包含用于获取 JWT 中声明的方法。它还有一个获取原始令牌的方法。这可用于获取原始令牌以进一步传播到其他服务。这是我们推荐的使用
    JWT 声明的方法，因为 `JsonWebToken` 实例不要求注入它的 bean 必须是 `@RequestScoped`。清单 11-9 展示了将 `JsonWebToken`
    注入到 `@ApplicationScoped` 的 `WalletService` 中。


    ```

    @ApplicationScoped

    public class WalletService {

    @Inject

    JsonWebToken jsonWebToken;

    public BalanceResponse createWallet(CreateWalletRequest request){

    Wallet wallet = new Wallet();

    wallet.setBalance(BigDecimal.ZERO);

    wallet.setCurrency(request.getCurrency());

    wallet.setAuthUserId(jsonWebToken.getSubject());

    wallet = walletRepository.save(wallet);

    return getBalance(wallet.getId());

    }

    }

    清单 11-9

    注入 JsonWebToken

    ```


    `WalletService` 是一个应用程序作用域的 bean，其中注入了 `JsonWebToken`。MicroProfile JWT 运行时会为我们提供该接口的实现。注入的
    `JsonWebToken` 可用于获取令牌的声明。`createUser` 方法调用 `jsonWebToken` 上的 `getSubject` 方法来获取令牌的主题。Keycloak
    返回的令牌主题是用户的 IAM ID。


    通过这种方式，我们将钱包数据库记录与 Keycloak 中的用户关联起来，而两个服务彼此之间无需了解任何信息。`WalletService` 不是一个 Jakarta
    REST 工件。它是一个普通的 CDI bean，但通过 MicroProfile JWT API，我们能够在应用程序的服务层访问通过 HTTP 头传递的令牌中的声明。我们认为这是从
    JWT 访问声明最清晰的方式，因此推荐使用此方法。即使端点未受保护，导致没有传递令牌，也会创建一个空的 `JsonWebToken` 实例。对该空实例的所有方法调用都将返回
    null。


    有了这个，我们还可以重构 `AbstractEntityListener`，以便最终为持久化实体设置 `createdBy` 审计字段。清单 11-10 展示了更新后的
    `AbstractEntityListener`，它使用 `JsonWebToken` 来设置 `createdBy` 和 `updatedBy` 字段。


    ```

    @ApplicationScoped

    public class AbstractEntityEntityListener {

    @Inject

    JsonWebToken jsonWebToken;

    @PrePersist

    void init(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setCreated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setCreatedBy(jsonWebToken.getClaim(Claims.upn));

    }

    @PreUpdate

    void update(final Object entity) {

    final AbstractEntity abstractEntity = (AbstractEntity) entity;

    abstractEntity.setUpdated(LocalDateTime.now(ZoneOffset.UTC));

    abstractEntity.setEditedBy(jsonWebToken.getClaim(Claims.upn));

    }

    }

    清单 11-10

    使用 JsonWebToken

    ```


    `@PrePersist` 和 `@PreUpdate` Jakarta Persistence 回调方法使用 `JsonWebToken` 的 `getClaim`
    方法来获取特定的声明。`org.eclipse.microprofile.jwt.Claims` 枚举包含了 JWT 中所有声明的常量。


    #### 注入到原始类型和 ClaimValue 中


    JWT 声明也可以通过 `@Inject` 和 `@Claims` 限定符注入到简单的 Java 类型中。我们通常不推荐这种获取令牌的方式，因为某些可以注入声明的字段类型要求它们被注入到的
    bean 必须是 `@RequestScoped`。实际上，为了能够充分利用这种方式注入声明值，bean 应该是 `@RequestScoped`。清单 11-11
    展示了使用这两种构造注入声明的方法。


    ```

    @Action

    public class WalletService {

    @Inject

    @Claim(standard = Claims.sub)

    private String subject;

    @Inject

    @Claim(standard = Claims.raw_token)

    private ClaimValue rawToken;

    }

    清单 11-11

    注入到简单类型中

    ```


    `subject` 字段是一个简单的 `String` 类型，使用 `@Inject` 和限定符 `@Claim` 进行注解。`@Claim` 限定符的 `standard`
    参数被传递了要注入到此字段的声明名称。使用 `Claims` 枚举来传递 `sub` 或 `subject` 声明作为感兴趣的声明。`org.eclipse.microprofile.jwt.ClaimValue`
    是一个继承自 `Principal` 接口的接口。它有两个方法：`getName` 和 `getValue`。`getName` 返回声明的名称，`getValue`
    返回令牌中该声明的值。

