    \        convertCurrencyRequest.setAmount(transactionsRequest.getAmount());\n\
    \        ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);\n\
    \        return convertCurrencyResponse.getData().getAmount();\n    }\n}\n```\n\
    *清单 8-3 展示使用 RateCalcHandler 回退处理器的 RateCalcService*\n\n清单[8-3](#531256_1_En_8_Chapter.xhtml#PC3)展示了`RateService`的`calculate`方法使用`RateCalcFallback`类作为回退，而不是一个方法。在运行时，如果抛出异常，将自动创建一个`RateCalcFallback`的非上下文实例。`@Fallback`注解还有另外两个参数：`applyOn`和`skipOn`。\n\
