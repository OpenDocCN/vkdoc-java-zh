    #### 使用直方图指标


    直方图是一种没有注解对应项的指标。这是一种复杂的指标，用于测量最小值、最大值、平均值、标准差以及中位数或第 95 百分位数等四分位数。要使用此指标，我们可以像清单
    9-13 中所示，在`RateService` Bean 中通过注入的方式使用它。


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @Metric(name = "count_conversions_histogram",

    absolute = true,

    description = "A histogram for the count of conversions",

    tags = { "count=histogram", "metric=histogram" })

    Histogram histogram;

    @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
    = true)

    public int countConversions() {

    int conversionCount = ThreadLocalRandom.current().nextInt(250, 500 + 1);

    histogram.update(conversionCount);

    return conversionCount;

    }

    }

    清单 9-13

    展示了通过注入使用直方图指标

    ```


    清单 9-13 展示了如何结合使用`@Inject`和`@Metric`来注入`Histogram`指标。此指标接受`long`或`int`类型的值作为其`update`方法的参数，以更新内部数据。`@Metric`注解用于向指标传递名称、描述和绝对元数据值。在`countConversions`方法中，返回的计数被传递给`update`方法进行计算。由于名称设置为绝对路径，因此可以通过路径`/metrics/application/count_conversions_histogram`查询该指标。清单
    9-14 展示了调用后返回的示例数据。


    ```

