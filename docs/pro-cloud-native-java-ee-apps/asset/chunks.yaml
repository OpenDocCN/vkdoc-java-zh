- fmt: "#### `@PUT`\n\n`@PUT`方法用于创建或更新资源。通常的模式是使用`@POST`进行创建，使用`@PUT`进行更新。我们将遵循这一约定。因此，`@PUT`用于更新用户。清单[6-18](#531256_1_En_6_Chapter.xhtml#PC18)展示了`UserResource`类中的`@PUT`方法。\n\
    \n```java\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
    @Path(\"users\")\npublic class UserResource {\n    @Inject\n    UserService userService;\n\
    \n    @PUT\n    public UserResponse updateUser(@NotNull UpdateUserRequest updateUserRequest)\
    \ {\n        return userService.updateUser(updateUserRequest);\n    }\n}\n```\n\
    *清单 6-18 `@PUT`方法*\n\n由于该方法没有显式声明任何`@Path`参数，它将托管在根路径`/users`下。对`/api/users`的HTTP\
    \ `PUT`请求将匹配到此方法。方法参数使用了`@NotNull`注解，因为我们不希望客户端传递`null`。但实际的`UpdateUserRequest`并未声明任何约束验证。清单[6-19](#531256_1_En_6_Chapter.xhtml#PC19)展示了`UpdateUserRequest`。\n\
    \n```java\npublic class UpdateUserRequest implements Serializable {\n    private\
    \ Long userId;\n    private String firstName;\n    private String lastName;\n\
    \    @JsonbDateFormat(\"dd-MM-yyyy\")\n    private LocalDate birthDay;\n    private\
    \ CreateUserRequest.UserRegion userRegion;\n}\n```\n*清单 6-19 `UpdateUserRequest`*\n\
    \n该类仅允许更新用户的选定字段。这是因为在应用程序开发中，某些实体字段会影响应用程序的其他许多部分。例如，用户邮箱可能链接到用户拥有的其他工件。允许随意更新此类字段可能导致数据损坏。这些核心字段通常通过更复杂的方式（例如使用业务流程）进行更新。这样，该字段被使用的所有其他位置都能一次性得到更新。这就是为什么从架构和业务角度来看，`UpdateUserRequest`只允许更新选定字段。\n\
    \n`birthDay`字段上的`@JsonbDateFormat`注解用于设置传入值的日期格式。该注解来自Jakarta JSON Binding规范^([(111)](#fn111))，这是一个用于在JSON和Java之间进行转换的API。该规范是将响应类型编组为JSON的默认底层提供程序。该注解接受与`java.time`包中的`DateTimeFormatter`相同的日期格式。\n\
    \n#### `@DELETE`\n\n`@DELETE`方法用于创建响应HTTP `DELETE`方法的资源方法。与更新某些字段类似，删除资源是一项非常严肃的操作，必须以可控且经过深思熟虑的方式进行。在企业级应用中，删除资源需要一个业务流程，确保被删除资源所使用到的所有位置都得到妥善处理。然而，为了完整性，清单[6-20](#531256_1_En_6_Chapter.xhtml#PC20)展示了一个`@DELETE`方法。\n\
    \n```java\n@DELETE\npublic void deleteUser(@NotNull @Positive Long userId) {\n\
    \    userService.removeUser(userId);\n}\n```\n*清单 6-20 `@DELETE`方法*\n\n### 响应对象\n\
    \n到目前为止看到的资源方法都直接返回Java类型，然后这些类型会被编组为JSON。`jakarta.ws.rs.core.Response`对象可用于向客户端提供自定义元数据。清单[6-21](#531256_1_En_6_Chapter.xhtml#PC21)展示了重构后的`createUser`资源方法，它返回一个包含新创建实体路径的自定义`Response`对象。\n\
    \n```java\n@POST\npublic Response createUser(@NotNull @Valid CreateUserRequest\
    \ createUserRequest, @Context UriInfo uriInfo) {\n    UserResponse user = userService.createUser(createUserRequest);\n\
    \    URI uri = uriInfo.getAbsolutePathBuilder()\n            .path(user.getData().getUserId().toString())\n\
    \            .build();\n    return Response.created(uri).entity(user).build();\n\
    }\n```\n*清单 6-21 返回`Response`对象*\n\n`createUser`方法现在接受两个参数。第二个参数是`UriInfo`，通过使用`@Context`注解注入到变量`uriInfo`中。该注解用于将Jakarta\
    \ REST工件注入到字段和方法参数中。`UriInfo`接口包含用于获取当前请求URI信息的方法。`createUser`实现首先保存传入的用户，然后构建一个指向新创建用户位置的路径。\n\
    \n回想一下表[6-1](#531256_1_En_6_Chapter.xhtml#Tab1)，我们将通过ID获取用户的路径设置为`/api/users/{userId}`。`UriInfo`实例调用`getAbsolutePathBuilder`方法，该方法返回当前资源类的完整路径，然后追加新创建的用户ID。清单[6-22](#531256_1_En_6_Chapter.xhtml#PC22)展示了当发出如清单[6-4](#531256_1_En_6_Chapter.xhtml#PC4)所示的`POST`请求时返回的响应。\n\
    \n```\nhttp://localhost:3003/account/api/users\nHTTP/1.1 201 Created\nContent-Type:\
    \ application/json\nLocation: http://localhost:3003/account/api/users/1\nContent-Language:\
    \ en-US\nContent-Length: 114\nDate: Sat, 27 Aug 2022 00:07:22 GMT\n\n{\n    \"\
    data\": {\n        \"firstName\": \"John\",\n        \"lastName\": \"Jakes\",\n\
    \        \"userId\": 1\n    },\n    \"response\": {\n        \"responseCode\"\
    : \"0\",\n        \"responseMessage\": \"OK\"\n    }\n}\n```\n*清单 6-22 返回的自定义`Response`对象*\n\
    \n`Location`头字段被设置为新创建用户的完整URI。然后客户端可以通过该路径导航，从资源类加载新创建的用户。同样值得注意的是，在清单[6-21](#531256_1_En_6_Chapter.xhtml#PC21)中，当`createUser`资源方法返回`UserResponse`时，HTTP响应码是200。但在清单[6-22](#531256_1_En_6_Chapter.xhtml#PC22)中，当返回`Response`对象时，HTTP响应码是201。`Response`类可用于创建返回给客户端的所有形式的自定义响应数据。"
  raw: '#### @PUT


    The @PUT method is used to create or update a resource. The general pattern is
    to use @POST for creating and @PUT for updating. We will stick to this convention.
    So @PUT is used to update a user. Listing [6-18](#531256_1_En_6_Chapter.xhtml#PC18)
    shows the @PUT method in the UserResource class.


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @PUT

    public UserResponse updateUser(@NotNull UpdateUserRequest updateUserRequest) {

    return       userService.updateUser(updateUserRequest);

    }

    }

    Listing 6-18

    @PUT method

    ```


    As this method does not explicitly declare any @Path param, it will be hosted
    at the root /users path. An HTTP PUT request to /api/users will be matched to
    this method. The method parameter is annotated @NotNull because we do not want
    the client to pass null. But the actual UpdateUserRequest does not declare any
    constraint validation. Listing [6-19](#531256_1_En_6_Chapter.xhtml#PC19) shows
    the UpdateUserRequest .


    ```

    public class UpdateUserRequest implements Serializable {

    private Long userId;

    private String firstName;

    private String lastName;

    @JsonbDateFormat("dd-MM-yyyy")

    private LocalDate birthDay;

    private CreateUserRequest.UserRegion userRegion;

    }

    Listing 6-19

    UpdateUserRequest

    ```


    This class only allows the updating of select fields of a user. This is because
    in application development, you will often have some entity fields that impact
    a lot of other parts of the application. For instance, the user email might be
    linked to other artifacts that the user owns. Allowing ad hoc updating of such
    a field could cause data corruption. Such core fields are generally updated in
    more complex ways like through the use of business processes. This way, all other
    places that the field is used get updated in a single shot. This is why architecturally,
    and from a business perspective, the UpdateUserRequest allows updating of only
    select fields.


    The @JsonbDateFormat annotation on the birthDay field is used to set the date
    format of the passed value. This annotation is from the Jakarta JSON Binding specification,^([^(111)](#fn111))
    an API for converting JSON to and from Java. This specification is the default
    underlying provider for marshalling the response types to JSON. The annotation
    takes the same date formats as the DateTimeFormatter in the java.time package.


    #### @DELETE


    The @DELETE method is used to create a resource method that responds to the HTTP
    DELETE method. Similar to updating certain fields, deleting a resource is a very
    serious operation that must be carried out in a controlled, well-thought-out way.
    In enterprise applications, deleting resources requires a business process that
    ensures all places where the resource to be deleted is used are taken care of.
    However, for the sake of completeness, a @DELETE method is shown in Listing [6-20](#531256_1_En_6_Chapter.xhtml#PC20).


    ```

    @DELETE

    public void deleteUser(@NotNull @Positive Long userId) {

    userService.removeUser(userId);

    }

    Listing 6-20

    @DELETE method

    ```


    ### The Response Object


    The resource methods seen so far have all directly returned Java types which are
    then marshalled to JSON. The jakarta.ws.rs.core.Response object can be used to
    provide custom metadata to the client. Listing [6-21](#531256_1_En_6_Chapter.xhtml#PC21)
    shows the createUser resource method refactored to return a custom Response object
    containing the path to the newly created entity.


    ```

    @POST

    public Response createUser(@NotNull @Valid CreateUserRequest createUserRequest,
    @Context UriInfo uriInfo) {

    UserResponse user = userService.createUser(createUserRequest);

    URI uri = uriInfo.getAbsolutePathBuilder()

    .path(user.getData().getUserId().toString())

    .build();

    return Response.created(uri).entity(user).build();

    }

    Listing 6-21

    Returning a Response object

    ```


    The createUser method now takes two parameters. The second one is the UriInfo
    that is injected into the variable uriInfo through the use of the @Context annotation.
    This annotation is used to inject Jakarta REST artifacts into fields and method
    parameters. The UriInfo interface contains methods for getting information about
    the current request URI. The createUser implementation first saves the passed
    user and then builds a path to the location of the newly created user.


    Remember in Table [6-1](#531256_1_En_6_Chapter.xhtml#Tab1), we set the path to
    getting a user by ID to /api/users/{userId}. The URI info instance calls the getAbsolutePathBuilder
    method which returns the full path to the current resource class, then appends
    the newly created user ID to it. Listing [6-22](#531256_1_En_6_Chapter.xhtml#PC22)
    shows the returned response when a POST request like shown in Listing [6-4](#531256_1_En_6_Chapter.xhtml#PC4)
    is made.


    ```

    http://localhost:3003/account/api/users

    HTTP/1.1 201 Created

    Content-Type: application/json

    Location: http://localhost:3003/account/api/users/1

    Content-Language: en-US

    Content-Length: 114

    Date: Sat, 27 Aug 2022 00:07:22 GMT

    {

    "data": {

    "firstName": "John",

    "lastName": "Jakes",

    "userId": 1

    },

    "response": {

    "responseCode": "0",

    "responseMessage": "OK"

    }

    }

    Listing 6-22

    Returned custom Response object

    ```


    The Location header field is set to the full URI to the newly created user. Clients
    then navigate through that path to then load the newly created user from the resource
    class. It is also worthy of note that in Listing [6-21](#531256_1_En_6_Chapter.xhtml#PC21)
    when the createUser resource method returned a UserResponse, the HTTP response
    code was 200\. But in Listing [6-22](#531256_1_En_6_Chapter.xhtml#PC22) when returning
    the Response object, the HTTP response code is 201\. The Response class can be
    used to create all forms of custom response data that is returned to the client.'
  trans: '

    #### @PUT


    @PUT 方法用于创建或更新资源。通常的模式是使用 @POST 进行创建，使用 @PUT 进行更新。我们将遵循这一约定。因此，@PUT 用于更新用户。清单
    6-18 展示了 UserResource 类中的 @PUT 方法。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource {

    @Inject

    UserService userService;

    @PUT

    public UserResponse updateUser(@NotNull UpdateUserRequest updateUserRequest) {

    return       userService.updateUser(updateUserRequest);

    }

    }

    清单 6-18

    @PUT 方法

    ```


    由于此方法没有显式声明任何 @Path 参数，它将托管在根路径 /users 下。对 /api/users 的 HTTP PUT 请求将匹配到此方法。方法参数使用了
    @NotNull 注解，因为我们不希望客户端传递 null。但实际的 UpdateUserRequest 并未声明任何约束验证。清单 6-19 展示了 UpdateUserRequest。


    ```

    public class UpdateUserRequest implements Serializable {

    private Long userId;

    private String firstName;

    private String lastName;

    @JsonbDateFormat("dd-MM-yyyy")

    private LocalDate birthDay;

    private CreateUserRequest.UserRegion userRegion;

    }

    清单 6-19

    UpdateUserRequest

    ```


    该类仅允许更新用户的选定字段。这是因为在应用程序开发中，你经常会遇到一些实体字段会影响应用程序的其他许多部分。例如，用户电子邮件可能链接到用户拥有的其他工件。允许临时更新此类字段可能会导致数据损坏。这些核心字段通常通过更复杂的方式更新，例如通过使用业务流程。这样，该字段被使用的所有其他位置都会一次性得到更新。这就是为什么从架构和业务角度来看，UpdateUserRequest
    只允许更新选定字段。


    birthDay 字段上的 @JsonbDateFormat 注解用于设置传入值的日期格式。此注解来自 Jakarta JSON Binding 规范^(¹¹¹)，这是一个用于在
    JSON 和 Java 之间进行转换的 API。该规范是将响应类型编组为 JSON 的默认底层提供程序。该注解接受与 java.time 包中的 DateTimeFormatter
    相同的日期格式。


    #### @DELETE


    @DELETE 方法用于创建一个响应 HTTP DELETE 方法的资源方法。与更新某些字段类似，删除资源是一个非常严肃的操作，必须以可控且经过深思熟虑的方式进行。在企业应用程序中，删除资源需要一个业务流程，以确保被删除资源所使用到的所有位置都得到妥善处理。然而，为了完整性起见，清单
    6-20 展示了一个 @DELETE 方法。


    ```

    @DELETE

    public void deleteUser(@NotNull @Positive Long userId) {

    userService.removeUser(userId);

    }

    清单 6-20

    @DELETE 方法

    ```


    ### 响应对象


    到目前为止看到的资源方法都直接返回 Java 类型，然后这些类型被编组为 JSON。可以使用 `jakarta.ws.rs.core.Response` 对象向客户端提供自定义元数据。清单
    6-21 展示了重构后的 createUser 资源方法，它返回一个包含新创建实体路径的自定义 Response 对象。


    ```

    @POST

    public Response createUser(@NotNull @Valid CreateUserRequest createUserRequest,
    @Context UriInfo uriInfo) {

    UserResponse user = userService.createUser(createUserRequest);

    URI uri = uriInfo.getAbsolutePathBuilder()

    .path(user.getData().getUserId().toString())

    .build();

    return Response.created(uri).entity(user).build();

    }

    清单 6-21

    返回 Response 对象

    ```


    createUser 方法现在接受两个参数。第二个参数是 UriInfo，通过使用 @Context 注解注入到变量 uriInfo 中。此注解用于将 Jakarta
    REST 工件注入到字段和方法参数中。UriInfo 接口包含用于获取当前请求 URI 信息的方法。createUser 实现首先保存传入的用户，然后构建指向新创建用户位置的路径。


    回想一下表 6-1，我们将通过 ID 获取用户的路径设置为 /api/users/{userId}。URI info 实例调用 getAbsolutePathBuilder
    方法，该方法返回当前资源类的完整路径，然后将新创建的用户 ID 附加到该路径上。清单 6-22 展示了当发出如清单 6-4 所示的 POST 请求时返回的响应。


    ```

    http://localhost:3003/account/api/users

    HTTP/1.1 201 Created

    Content-Type: application/json

    Location: http://localhost:3003/account/api/users/1

    Content-Language: en-US

    Content-Length: 114

    Date: Sat, 27 Aug 2022 00:07:22 GMT

    {

    "data": {

    "firstName": "John",

    "lastName": "Jakes",

    "userId": 1

    },

    "response": {

    "responseCode": "0",

    "responseMessage": "OK"

    }

    }

    清单 6-22

    返回的自定义 Response 对象

    ```


    Location 头字段被设置为指向新创建用户的完整 URI。然后客户端可以导航该路径，从资源类加载新创建的用户。同样值得注意的是，在清单 6-21 中，当
    createUser 资源方法返回 UserResponse 时，HTTP 响应码是 200。但在清单 6-22 中，当返回 Response 对象时，HTTP
    响应码是 201。Response 类可用于创建返回给客户端的各种形式的自定义响应数据。

