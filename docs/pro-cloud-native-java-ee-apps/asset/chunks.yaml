    ## CDI 原型与指标


    正如在 Jakarta 上下文和依赖注入章节中所讨论的，CDI 原型是一种将通用基础设施注解分组到一个注解下的方式。在 bean 上使用生成的原型，就如同单独在该
    bean 上使用了组成该原型的所有注解。


    因此，当你用任何指标注解来注解一个原型时，生成的 bean 将被指标运行时视为该指标注解直接应用到了 bean 上。生成的指标名称是相对于 bean 本身的名称和包计算的，而不是相对于原型。


    例如，在第 4 章中开发的 `@Action` 原型，在清单 9-19 中重现，并添加了 `@Counted` 和 `@SimplyTimed` 注解。这些注解将导致所有被
    `@Action` 注解的 bean 的构造函数和方法调用分别被计数和简单计时。


    ```

    @Stereotype

    @RequestScoped

    @Counted

    @SimplyTimed

    @Transactional

    @Logged

    @Retention(RetentionPolicy.RUNTIME)

    @Target(ElementType.TYPE)

