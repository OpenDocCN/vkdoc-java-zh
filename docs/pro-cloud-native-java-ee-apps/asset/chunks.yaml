    ```


    Listing [4-21](#531256_1_En_4_Chapter.xhtml#PC21) shows the @Database qualifier
    with a value() field of type DB for passing parameters to the qualifier. DB is
    an enum defined in the qualifier class consisting of two fields – DERBY and POSTGRES.
    Listing [4-22](#531256_1_En_4_Chapter.xhtml#PC22) shows the use of the @Database
