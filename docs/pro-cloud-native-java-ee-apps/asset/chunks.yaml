  raw: '##### One-to-Many


    An entity has a one-to-many association with a target entity when it has a collection
    of the target entity as a field. Listing [5-25](#531256_1_En_5_Chapter.xhtml#PC25)
    shows the User entity declaring a one-to-many association to transaction history.


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToMany

    private List transactionHistory;

    }

    Listing 5-25

    User entity with one-to-many relationship

    ```


    A User can have one or more transaction histories. This is denoted by the one-to-many
    relationship between the User and TransactionHistory entities. This association,
    as shown in Listing [5-25](#531256_1_En_5_Chapter.xhtml#PC25), is declared by
    the use of the @OneToMany annotation . The current state of the relationship is
    bidirectional, because the TransactionHistory also declares an association back
    to the User entity.


    In every one-to-many relationship, the owning side of the association is always
    the many side. In the case of the User and TransactionHistory, the latter will
    be the owning side of the relationship because the primary key of the User entity
    will be placed as a foreign key column in the TransactionHistory table. To declare
    the many side of the association as the owning side, the mappedBy parameter of
    the @OneToMany annotation should be set to the name of the field in the TransactionHistory
    entity , as shown in Listing [5-26](#531256_1_En_5_Chapter.xhtml#PC26).


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToMany(mappedBy = "accountOwner")

    private List transactionHistory;

    }

    Listing 5-26

    shows the updated User entity

    ```


    In the TransactionHistory table, a foreign key column will contain the primary
    key of the target entity to which the TransactionHistory history has an association
    with. The TransactionHistory table will remain unchanged from what it was as shown
    in Figure [5-9](#531256_1_En_5_Chapter.xhtml#Fig9).


    A one-to-many association can also be unidirectional from the perspective of the
    one side of the association. In this case, the target entity type in the collection
    field of the one side of the association is oblivious to the relationship. In
    a unidirectional one-to-many relationship, there is only one side, which is also
    automatically the owning side of the association. Since the association field
    is a collection type, a join table is used to map the relationship. A join table
    is a simple table that contains two primary key fields – one to the primary key
    of the owning or source entity of the association and the other to the target
    entity.


    ##### Many-to-Many


    Many-to-many association is one in which both the source and target of the relationship
    have a collection of each other. The @ManyToMany annotation can be used to express
    such an association. Many-to-many relationships can also be bi- or unidirectional.
    Getting this type of relationship right can be tricky, and so except in very complex
    cases, a one/many-to-one relationship should suffice.


    ##### Lazy Fetching


    Collection-valued associations are lazily loaded or fetched by default. What this
    means is that when an instance of the User entity is loaded, its collection field
    of type TransactionHistory will not be loaded unless it is traversed to in the
    same transaction. You can change the default loading strategy by setting the fetch
    parameter of the @OneToMany or @ManyToMany to FetchType.EAGER.


    #### Collections of Simple Types


    The collection-valued associations discussed so far have all been between entities.
    JPA also has support for mapping a collection of simple types. Remember simple
    types refer to the basic Java types that are not entities, for example, String,
    Integer, and embeddables. Listing [5-27](#531256_1_En_5_Chapter.xhtml#PC27) shows
    the UserCredentials entity with a collection of Strings to represent the email
    history of a user.


    ```

    @Entity

    public class UserCredentials extends AbstractEntity {

    @ElementCollection

    private Set emailHistory;

    }

    Listing 5-27

    shows UserCredentials with a collection of simple type

    ```


    The emailHistory field is a set of Strings annotated @ElementCollection. This
    is a simple type that has no existence of its own. As such, in the database, a
    table will be created with two fields. One field will be a foreign key column
    that points to the primary key column of the UserCredentials table and another
    field that contains the value of each element in the set.


    The name of this table, by default, is the name of the declaring entity class
    underscore the name of the field. So for the field shown in Listing [5-27](#531256_1_En_5_Chapter.xhtml#PC27),
    the resulting table will be userCredentials_emailHistory. Element collections
    can also be eagerly fetched. By default, they are lazily fetched. You can set
    them to be eagerly fetched by passing FetchType.EAGER to the fetch parameter.


    #### Maps


    JPA supports declaring entity associations through the use of the java.util.Map
    construct. A map is a collection that associates a key to any arbitrary object
    type. There can be any number of combination types of declaring associations using
    maps based on the key-value type permutation . The value type of a map determines
    the type of association that is being created. If the value type of the map is
    an entity, then either a @OneToMany or @ManyToMany association annotation should
    be used. However, if the value is a simple or embeddable type, then @ElementCollection
    must be declared.


    If the key of the map is a simple or embeddable type, the @MapKeyColumn can be
    used to customize the key column in the database. If the value of the map is an
    entity and the key is to be mapped to an attribute of that entity, then the @MapKey
    annotation can be used to tell the runtime which field in the target value entity
    the key should be mapped to.


    Given the very flexible nature of modelling associations using maps, it can be
    very hard to get right. A lot of the time, the use of java.util.Collection types
    should suffice. Unless in very rare and extreme cases where you need the flexibility
    offered by maps, we do not recommend its use.


    ## Data Persistence


    The second of the trio of using JPA involves persisting the data. This is where
    instances of the entities you modelled get persisted to their respective database
    tables. The central artifact responsible for taking your entity instances and
    persisting them to the database is the EntityManager . There are four components
    to data persistence with JPA that you should understand. These are the persistence
    unit, persistence context, transactions, and the EntityManager interface.'
  trans: '

    ##### 一对多


    当一个实体将目标实体的集合作为字段时，该实体与目标实体存在一对多关联。清单 5-25 展示了 User 实体声明与交易历史的一对多关联。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToMany

    private List transactionHistory;

    }

    清单 5-25

    具有一对多关系的 User 实体

    ```


    一个 User 可以有一个或多个交易历史。这通过 User 与 TransactionHistory 实体之间的一对多关系来表示。如清单 5-25 所示，该关联通过使用
    `@OneToMany` 注解来声明。当前关系状态是双向的，因为 TransactionHistory 也声明了指向 User 实体的反向关联。


    在每一个一对多关系中，关联的拥有方始终是多的一方。在 User 和 TransactionHistory 的例子中，后者将是关系的拥有方，因为 User 实体的主键将作为外键列放置在
    TransactionHistory 表中。要将关联的多方声明为拥有方，应将 `@OneToMany` 注解的 `mappedBy` 参数设置为 TransactionHistory
    实体中字段的名称，如清单 5-26 所示。


    ```

    @Entity

    @Table(name = "WALLET_USER")

    public class User extends AbstractEntity {

    @OneToMany(mappedBy = "accountOwner")

    private List transactionHistory;

    }

    清单 5-26

    展示了更新后的 User 实体

    ```


    在 TransactionHistory 表中，一个外键列将包含 TransactionHistory 所关联的目标实体的主键。TransactionHistory
    表将保持不变，如图 5-9 所示。


    一对多关联也可以从关联的一方视角来看是单向的。在这种情况下，关联一方的集合字段中的目标实体类型对关系是无感知的。在单向一对多关系中，只有一方，它自动成为关联的拥有方。由于关联字段是集合类型，因此使用连接表来映射关系。连接表是一个简单的表，包含两个主键字段——一个指向关联的拥有方或源实体的主键，另一个指向目标实体。


    ##### 多对多


    多对多关联是指关系的源和目标双方都拥有对方的集合。可以使用 `@ManyToMany` 注解来表达这种关联。多对多关系也可以是双向或单向的。正确处理这种类型的关系可能很棘手，因此除非在非常复杂的情况下，否则一对一/多对一关系通常就足够了。


    ##### 懒加载


    集合值关联默认是懒加载或延迟获取的。这意味着当加载 User 实体的实例时，其类型为 TransactionHistory 的集合字段将不会被加载，除非在同一事务中遍历到它。你可以通过将
    `@OneToMany` 或 `@ManyToMany` 的 `fetch` 参数设置为 `FetchType.EAGER` 来更改默认加载策略。


    #### 简单类型的集合


    到目前为止讨论的集合值关联都是在实体之间进行的。JPA 也支持映射简单类型的集合。请记住，简单类型指的是非实体的基本 Java 类型，例如 `String`、`Integer`
    和可嵌入类型。清单 5-27 展示了 UserCredentials 实体，其中包含一个 String 集合，用于表示用户的电子邮件历史。


    ```

    @Entity

    public class UserCredentials extends AbstractEntity {

    @ElementCollection

    private Set emailHistory;

    }

    清单 5-27

    展示了具有简单类型集合的 UserCredentials

    ```


    `emailHistory` 字段是一个用 `@ElementCollection` 注解的 String 集合。这是一个没有独立存在的简单类型。因此，在数据库中，将创建一个包含两个字段的表。一个字段是外键列，指向
    UserCredentials 表的主键列；另一个字段包含集合中每个元素的值。


    默认情况下，该表的名称是声明实体类的名称加下划线再加字段的名称。因此，对于清单 5-27 中所示的字段，生成的表将是 `userCredentials_emailHistory`。元素集合也可以被急切获取。默认情况下，它们是懒加载的。你可以通过将
    `FetchType.EAGER` 传递给 `fetch` 参数来将它们设置为急切获取。


    #### 映射


    JPA 支持通过使用 `java.util.Map` 结构来声明实体关联。映射是一种将键与任意对象类型关联起来的集合。基于键值类型的排列组合，可以使用映射声明任意数量的关联类型组合。映射的值类型决定了正在创建的关联类型。如果映射的值类型是实体，则应使用
    `@OneToMany` 或 `@ManyToMany` 关联注解。但是，如果值是简单类型或可嵌入类型，则必须声明 `@ElementCollection`。


    如果映射的键是简单类型或可嵌入类型，则可以使用 `@MapKeyColumn` 来自定义数据库中的键列。如果映射的值是实体，并且键要映射到该实体的某个属性，则可以使用
    `@MapKey` 注解来告诉运行时键应映射到目标值实体中的哪个字段。


    鉴于使用映射建模关联的灵活性非常高，正确使用可能非常困难。大多数情况下，使用 `java.util.Collection` 类型就足够了。除非在非常罕见和极端的情况下你需要映射提供的灵活性，否则我们不推荐使用它。


    ## 数据持久化


    使用 JPA 的三部曲中的第二步涉及持久化数据。这是将你建模的实体实例持久化到各自数据库表中的步骤。负责获取你的实体实例并将其持久化到数据库的核心组件是 `EntityManager`。你应该了解使用
    JPA 进行数据持久化的四个组成部分。它们是持久化单元、持久化上下文、事务和 `EntityManager` 接口。

