- fmt: '### Asynchronous Events


    The `UserResponse` event we have looked at so far is a synchronous blocking event.
    This means when fired, the observer method will block execution until it’s completed.
    As shown in Listing [4-42](#531256_1_En_4_Chapter.xhtml#PC42), execution will
    be blocked until the `sendUserSms` returns because the event observer method will
    be called in the same thread in which it was fired. However, sending an SMS most
    likely will require communication with an external SMS provider, over the network.
    This could take time, depending on the latency of the network. To circumvent such
    potential problems, the event mechanism supports the firing of asynchronous events.


    With async events, the observers will be invoked asynchronously, executing in
    a separate thread from the one in which the event was fired. This way, the sending
    of the SMS will be in a separate thread and thus execution will return immediately
    to the point the event was fired. Listing [4-43](#531256_1_En_4_Chapter.xhtml#PC43)
    shows the firing of async events in the `UserServiceDecorator` bean.


    ```

    @Decorator

    @Priority(Interceptor.Priority.APPLICATION)

    public abstract class UserServiceDecorator implements UserFacade {

    @Inject

    Event userResponseEvent;

    @Inject

    @Database(DB.MS_SQL)

    private EntityManager entityManager;

    @Inject

    @Delegate

    private UserService userService;

    @Override

    public UserResponse createUser(final CreateUserRequest createUserRequest) {

    final User user = UserService.fromUserWrapper(createUserRequest);

    if (createUserRequest.getUserRegion() == UserRegion.EU) {

    entityManager.persist(user);

    final UserResponse userResponse = userService.getUser(user.getId());

    userResponseEvent.fireAsync(userResponse);

    return UserService.toUserResponse(userResponse);

    }

    return userService.createUser(createUserRequest);

    }

    }

    Listing 4-43

    showing the firing of an async event

    ```


    Listing [4-43](#531256_1_En_4_Chapter.xhtml#PC43) shows the `UserServiceDecorator`
    bean with its `createUser` method. This time, the event object fires an async
    event through the call to the `fireAsync` method. This method will fire an async
    event that only async observers will be notified of. It returns a `java.util.concurrent.CompletionStage`
    object for optional further pipeline composition on the async operation. The `UserResponse`
    observer shown in Listing [4-42](#531256_1_En_4_Chapter.xhtml#PC42) will not be
    called for this event because that observer is synchronous. Listing [4-44](#531256_1_En_4_Chapter.xhtml#PC44)
    shows the `MessageCenter` bean with an async `UserResponse` observer.


    ```

    public class MessageCenter {

    public void sendUserSmsAsync(@ObservesAsync final UserResponse userResponse) {

    //TODO --> Send SMS through gateway... Async

    }

    }

    Listing 4-44

    showing an async UserResponse observer

    ```


    Listing [4-44](#531256_1_En_4_Chapter.xhtml#PC44) shows the `MessageCenter` bean
    with a new method, `sendUserSmsAsync`. This method has almost the same signature
    as the synchronous one we saw in Listing [4-42](#531256_1_En_4_Chapter.xhtml#PC42),
    with the only difference being the `@Observes` annotation replaced with `@ObservesAsync`.
    This annotation tells the container that this method observes an async event of
    type `UserResponse`. So when the `UserResponse` event shown in Listing [4-43](#531256_1_En_4_Chapter.xhtml#PC43)
    gets fired, the `sendUserSmsAsync` method will be called.


    ### Transactional Observers


    The `UserResponse` event discussed so far should work fine. However, there is
    a problem. The requirement is to send a message to a user that successfully gets
    persisted to the database. However, we haven’t checked so far if the actual act
    of persisting the user succeeded or not. The async event fired in Listing [4-43](#531256_1_En_4_Chapter.xhtml#PC43)
    is fired two lines after calling `persist` on the `EntityManager` instance. The
    problem is that up to the point the event is fired, the transaction in which the
    method is being executed has still not been committed. And until the transaction
    commits successfully, we really can’t be certain that the act of persisting the
    user has succeeded or not.


    To get around this problem, we can use transactional observers. A transactional
    observer is one that specifies at which phase of a transaction it should be invoked.
    With our requirement, we want the observer to be invoked only after the transaction
    in which the event is fired completes successfully, meaning the transaction was
    committed successfully, and we are certain the data is in the database. Listing
    [4-45](#531256_1_En_4_Chapter.xhtml#PC45) shows the `MessageCenter` bean with
    a transactional observer for sending SMS.


    ```

    public class MessageCenter {

    public void sendUserSms(@Observes(during = TransactionPhase.AFTER_SUCCESS)   final
    UserResponse userResponse) {

    //TODO --> Send SMS through gateway... Blocking task

    }

    }

    Listing 4-45

    showing a transactional observer

    ```


    Listing [4-45](#531256_1_En_4_Chapter.xhtml#PC45) shows the `sendUserSms` method
    of the `MessageCenter` bean. This time around, the `@Observes` method is passed
    a parameter – `during = TransactionPhase.AFTER_SUCCESS`. This signals to the container
    that we want this observer to be called in the after-success phase of any transaction
    in which the event was fired. Because the `UserResponse` was fired in a transactional
    context, the `sendUserSms` observer is going to be notified only after the transaction
    commits successfully.


    You should have noted that the `sendUserSms` observer is observing a synchronous
    event because it uses the `@Observes` annotation. This is because transactional
    observers are not supported for async events. So the event that is fired will
    be a synchronous event as shown in Listing [4-41](#531256_1_En_4_Chapter.xhtml#PC41)
    in the `UserServiceDecorator`.


    There are a number of transactional phases available for observer methods. These
    are defined in the `TransactionPhase` enum type in the `jakarta.enterprise.event`
    package. They are:


    - `IN_PROGRESS` – The observer is called when the event is fired. This is the
    default.

    - `BEFORE_COMPLETION` – The observer is called during the before completion phase
    of the transaction.

    - `AFTER_COMPLETION` – The observer is called during the after completion phase
    of the transaction.

    - `AFTER_FAILURE` – The observer is called during the after completion phase of
    the transaction, only when the transaction fails.

    - `AFTER_SUCCESS` – The observer is called during the after completion phase of
    the transaction, only when the transaction succeeds.'
