- fmt: '### Integration Testing in Jakarta EE


    Unlike unit testing, integration testing requires different components to talk
    to each other. This requires having a running instance of the application within
    the test context. Jakarta EE integration testing, depending on the application,
    entails making a call to an entry point in the application that will then result
    in the call to all constituent units of interest. This entry point is mostly a
    REST endpoint.


    Deploying a running application in the test context had always been a little cumbersome
    in Jakarta EE. Frameworks like `Arquillian` helped in this regard. But even that
    was difficult to set up and required significant plumbing for the various compatible
    runtimes. As more and more applications are being developed to be cloud native
    first, the use of containers means a given environment can be replicated in different
    contexts as long as there is support for containers within that context.


    `TestContainers` is a library for deploying applications as docker containers
    in a test environment. As `jwallet` is packaged as docker containers, spawning
    a running instance for integration testing requires only a `docker-compose` file.
    This `docker-compose` file will be used by the `TestContainers` library to create
    a running application instance in the test. With a running application instance,
    we can then proceed to fire REST calls to the application.


    With `TestContainers`, there is no difference between the application running
    in the test and the deployed one because they are both created from the same docker
    containers. `TestContainers` have different modules for different stacks. The
    `DockerComposeContainer` module is for running containers from `docker-compose`
    files. Listing [12-3](#531256_1_En_12_Chapter.xhtml#PC3) shows the setup of `DockerComposeContainer`
    to create containers from the wallet module’s `docker-compose` file.


    ```

    try (DockerComposeContainer composeContainer = new DockerComposeContainer(new
    File("docker-compose.yaml")).withExposedService("wallet", 3001)) {

    composeContainer.start();

    walletServiceUrl = String.format(walletServiceUrlTemplate,

    composeContainer.getServiceHost("wallet", 3001),

    composeContainer.getServicePort("wallet", 3001));

    client = ClientBuilder.newClient();

    target = client.target(walletServiceUrl);

    }

    Listing 12-3

    DockerComposeContainer

    ```


    The `DockerComposeContainer` is instantiated in a `try-with-resources` block so
    it can be auto-closed for us (it is `AutoClosable`). It is passed the `docker-compose`
    file and the service to expose from it, along with the port. The `start` method
    is called on the instance. The `getServiceHost` and `getServicePort` methods are
    called to get the host and port of the service as created in the running container.
    This is then passed to the `target` method of the Jakarta REST Client object.
    With this setup in place, we have a full running instance of the wallet module
    against which REST calls can be made and test assertions carried out on the responses.
    Listing [12-4](#531256_1_En_12_Chapter.xhtml#PC4) shows the `createWallet` JUnit
    test in the `WalletResourceIT` class.


    ```

    class WalletResourceIT extends AbstractWalletIT {

    @Test

    void createWallet() {

    CreateWalletRequest createWalletRequest = new CreateWalletRequest();

    createWalletRequest.setCurrency("USD");

    BalanceResponse balanceResponse = target.path("wallets").request()

    .post(Entity.json(createWalletRequest), BalanceResponse.class);

    assertEquals("0", balanceResponse.getResponse().getResponseCode());

    assertEquals("OK", balanceResponse.getResponse().getResponseMessage());

    assertEquals(createWalletRequest.getCurrency(), balanceResponse.getData().getCurrency());

    assertEquals(BigDecimal.ZERO, balanceResponse.getData().getBalance());

    }

    }

    Listing 12-4

    createWalletTest

    ```


    The `WalletResourceIT` class extends `AbstractWalletIT`, which contains the `TestContainers`
    instantiation code. The `createWallet` method is a JUnit test that fires a REST
    call to the wallet resource to create a wallet and then makes some assertions
    on the returned data. Unlike the unit test, this test could take some time because
    the wallet creation process involves a call to the database. With just a few lines
    of code, we have a fully containerized application runtime from which we can make
    calls to create integration tests. We highly recommend you take a look at `TestContainers`
    for your Jakarta EE testing.


    ## Summary


    This chapter started with theories about software application testing, then looked
    at how to create unit and integration JUnit tests for Jakarta EE applications.
    The process of creating unit tests entailed isolating the component to test by
    mocking its dependencies of interest. We looked at using `TestContainers` to create
    a fully containerized Jakarta EE runtime to create integration tests.


    As stated in the chapter, testing is a very domain-dependent activity that requires
    business analysis to identify what combination of the various test types to use
    and where testing resources should be concentrated. This chapter showed you the
    most efficient and straightforward options available for creating the two most
    popular types of tests – unit and integration tests.


    Footnotes [1](#531256_1_En_12_Chapter.xhtml#Fn1_source) [2](#531256_1_En_12_Chapter.xhtml#Fn2_source)


    # 13. Jakarta EE Application Deployment Considerations


    This book has covered the core APIs on the Jakarta EE platform for building applications.
    We have extensively looked at developing the various aspects of an application
    using the different APIs from a code perspective. As a general-purpose platform,
    the Jakarta EE specifications allow you to build all kinds of applications. This
    chapter covers the general theory of getting an application ready for production.


    The chapter starts off by discussing what to look out for in preparing for production,
    options, and considerations for deploying a Jakarta EE application and how to
    structure an application for easy feature additions and bug fixes and general
    considerations. By the end of the chapter, you should have a firm theoretical
    foundation of getting an application ready for production deployment and maintenance
    afterward.


    ## Production Readiness


    Determining the readiness of an application for deployment is a combination of
    both technical and business considerations. The following are some factors to
    consider in readying an application for production.


    ### Business Requirements Met?


    Has the application met the business requirements for which it was developed?
    This will mostly be something for the business analysts to decide. A comprehensive
    requirements checklist will need to be compared to the application to determine
    that. Flowing from that checklist will be the testing requirements.


    ### Test Requirements


    A decision on what combination of tests to employ for the application will need
    to be made. What proportion of the tests should be automated? Manual? Of course,
    during the application process, a combination of unit and integration test sets
    would have been created. But a test strategy is needed to test application releases.


    This test suite is independent of the tests in the application itself. These are
    mostly from the business perspectives, covering different aspects of the functional
    requirements of the application. This set of tests should have varying combinations
    of manual and automated tests, with the automated tests made up of a healthy balance
    of integration and performance tests.


    ### CI/CD Pipelines


    The continuous integration/development pipeline to ship bug fixes and new features
    from development to production will need to be considered. Of course, ideally
    there should be one in place as part of the development process right from the
    start.'
