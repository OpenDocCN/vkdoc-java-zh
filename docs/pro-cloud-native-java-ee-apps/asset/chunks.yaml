    as the default dependency injection mechanism. CDI provides you a way to build
    loosely coupled applications, by abstracting you from managing the various interdependencies
    between your application components.


    ### JSON-P^([^(35)](#fn35))


    The Jakarta JSON Processing specification provides a vendor-neutral set of APIs
    for parsing, generating, transforming, and querying JSON data using a streaming
    or object model. JSON-P is one of the Jakarta EE platform specifications that
    EMP implementations are required to support.


    ### JAX-RS^([^(36)](#fn36))


    The Jakarta RESTful Web Services is another of the Jakarta EE specifications that
    is shipped with the EMP project. The JAX-RS specification defines a set of APIs
    for developing RESTful web services as defined by the REST architectural style
    by Dr. Roy Fielding.^([^(37)](#fn37))


    ### JSON-B^([^(38)](#fn38))


    The Jakarta JSON Binding is another of the specifications that EMP implementations
    are mandated to support. JSON-B provides a set of APIs for automatically binding
    Java objects to JSON documents in a transparent way, with the option to customize
    according to your needs.


    ### Annotations^([^(39)](#fn39))


    Jakarta Annotations is another of the Jakarta EE APIs that is shipped with each
    implementation of EMP. This specification defines annotations for use within the
    wider component technologies on the Jakarta EE platform. Being a mostly annotation/metadata-driven
    platform, this specification aims at providing a unified base specification around
    which various other annotation-driven specifications on the platform can create
    their own annotations.


    Together, the preceding set of specifications form the full EMP suite of APIs
    for creating cloud-native applications. These specifications are supported by
    all implementations of the EMP. There are other optional specifications that implementations
    are not mandated to support, as shown in the “Outside umbrella” in the previous
    image. Together with the larger Jakarta EE platform, developing enterprise, vendor-neutral
    applications on the Java platform has become exciting again. For you as a developer,
    mastering application development with Jakarta EE will equip you with skills that
    can easily be transferred to other platforms like the Spring Framework.


    ## Jakarta EE and the Spring Framework


    A discussion of the theory and history of Jakarta EE will not be complete without
    a look at the Spring Framework .^([^(40)](#fn40)) Jakarta EE (or more correctly
    its ancestor J2EE) was not the most productive or easy-to-use development platform
    in its early history. It required a lot of manual configurations through XML files
    and required your components to extend artifacts in the platform, among others.
    As a result, the platform acquired the fame for being arcane, only used by big
    companies that had a lot of money to spend on developers.


    Naturally, a lot of books got published on how to develop on the platform. One
    that stood out was *Expert One-on-One J2EE Design and Development* ^([^(41)](#fn41))
    by Rod Johnson, published in October 2002\. In the book, Rod postulated the idea
    of increased use of dependency injection and Plain Old Java Objects (POJOs) ,
    as opposed to the J2EE way of manually configuring, managing, and mixing application
    dependencies with infrastructure code. He demonstrated this in the sample application
    built throughout the book: an online seat reservation app built with over 30K^([^(42)](#fn42))
    lines of infrastructure code. A significant part of the application code was an
    implementation of his ideas for a clean separation of application and infrastructure
    code.


    The publisher of the book, Wrox, had a page^([^(43)](#fn43)) for it, with the
    sample code available for download, complete with errata and a user forum. The
    book was a success . The ideas propounded in it resonated with a lot of J2EE developers
    of the time. People started using parts of the released code in their personal
    projects. In early 2003, fellow developers Juergen Hoeller and Yann Caroff joined
    hands with Rod to create an open source project from the infrastructure code developed
    in the book. This project would be called Spring, an aphorism connoting a fresh
    start after a J2EE “winter.”


    Version 0.9 of this new, alternative enterprise Java development framework was
    released in June 2003\. In March the following year, Spring 1.0 was released.
    The new framework was an instant hit and, to a large extent, a breath of fresh
    air as J2EE was the only credible way of developing nontrivial enterprise applications
    on the Java platform. It is fair to say the Spring Framework owes its existence
    to the limitations of the then J2EE platform.


    Over the following years, as J2EE became Java EE, it started getting better. Taking
    inspiration from the Spring Framework, the platform increasingly became metadata
    driven, relying heavily on the use of annotations for various configurations and
    defaulting to much predictable defaults in the absence of any explicit directive
    by the developer. By the release of Java EE 7, the platform was completely different
    in terms of developer productivity relative to the J2EE era. The advent of specifications
    like the Contexts and Dependency Injection, the pruning and “defattening” of the
    EJB API, and the less reliance on XML configuration files in a way realized the
    patterns originally proposed in Rod’s book.


    The Spring Framework, in the meanwhile, had grown to become a much bigger development
    platform than its original release. It had gone beyond its original function of
    an inversion of control^([^(44)](#fn44)) (IoC) container to comprise APIs that
    covered the gamut of end-to-end application development. As it grew in breadth,
    so did the need to configure its various components. Gradually, the need for XML
    configuration files started to creep in, up to a point where it had become not
    so dissimilar to the earlier J2EE.'
