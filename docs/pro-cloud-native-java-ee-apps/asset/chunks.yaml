    \ en-US\nContent-Length: 55\nConnection: Close\nDate: Sat, 27 Aug 2022 00:46:22\
    \ GMT\nlastName - must not be empty\nemail - must not be empty\n清单 6-24\n映射后的响应\n\
    ```\n\n该请求省略了 `CreateUserRequest` 对象的 `email` 和 `lastName` 字段。这导致了验证异常的发生，并且 `ConstraintViolationException`\
    \ 通过我们注册的异常映射器被映射给了客户端。响应体显示了每个违反的字段以及相应的帮助信息。\n\n## Jakarta REST 客户端\n\nJakarta\
    \ REST 附带了一个用于发起 REST 调用的 HTTP 客户端。这个客户端是一个非常简单的结构，围绕 `jakarta.ws.rs.client.WebTarget`\
    \ 接口展开。`WebTarget` 通过其 URI 定位一个资源。通过调用 `jakarta.ws.rs.client.ClientBuilder` 类返回的\
    \ `jakarta.ws.rs.client.Client` 实例上的静态 `target` 方法，可以获得一个 `WebTarget`。清单 6-25\
    \ 展示了在 account 模块的测试类中构建一个 `Client` 并使用它来定位资源以获取 `WebTarget` 的过程。\n\n```\npublic\
    \ class AbstractAccountIT {\n    protected static final WebTarget target;\n  \
    \  protected static final Client client;\n    static {\n        client = ClientBuilder.newClient();\n\
    \        target = client.target(\"http://localhost:3003/account/api\");\n    }\n\
    \    @AfterAll\n    protected static void cleanUp() {\n        if (client != null)\
    \ {\n            client.close();\n        }\n    }\n}\n清单 6-25\n获取一个 Client\n\
    ```\n\n`ClientBuilder.newClient` 方法返回一个 `Client`。`Client` 是重量级对象，因此不应创建超过必要数量的实例。在前面的例子中，返回的实例被赋值给静态变量\
    \ `client`。然后调用 `target` 方法，传入要定位的完整基础资源路径，返回一个 `WebTarget` 实例，该实例被赋值给 `target`\
    \ 变量。实例化是在一个静态块中完成的，因为 `WebTarget` 和 `Client` 实例是静态的。仅此初始化就足以在所有调用中使用 `target`。\n\
    \n一切完成后，应关闭 `Client` 以防止资源泄漏。根据 API 文档，“`Client` 是管理客户端通信基础设施的重量级对象。`Client` 实例的初始化和销毁可能是一项相当昂贵的操作。”因此，我们在\
    \ JUnit 测试套件中带有 `@AfterAll` 注解的 `cleanUp` 方法中，在所有测试运行完毕后关闭 `Client` 实例。\n\n初始化\
    \ `WebTarget` 后，可以通过指定目标资源的相对路径来发起 HTTP REST 调用。清单 6-26 分别展示了向 `/users` 和 `/users/{userId}`\
    \ 资源路径发起 POST 和 GET 请求。\n\n```\n@Test\nvoid createUser() {\n    UserResponse createdUser\
    \ = target.path(\"users\")\n            .request().post(Entity.json(createUserRequest),\
    \ UserResponse.class);\n    assertEquals(\"0\", createdUser.getResponse().getResponseCode());\n\
    \    assertEquals(\"OK\", createdUser.getResponse().getResponseMessage());\n \
    \   // get created user\n    UserResponse userResponse = target.path(\"users/{userId}\"\
    )\n            .resolveTemplate(\"userId\", createdUser.getData().getUserId()).request()\n\
    \            .get(UserResponse.class);\n    assertEquals(\"0\", userResponse.getResponse().getResponseCode());\n\
    \    assertEquals(\"OK\", userResponse.getResponse().getResponseMessage());\n\
    }\n清单 6-26\n使用客户端发起调用\n```\n\n`WebTarget` 上的 `path` 方法返回另一个 `WebTarget` 实例，该实例解析为传递给\
    \ `client.target` 调用的原始路径（在清单 6-25 中）和这个新路径的组合。因此，清单 6-26 中的 `target.path(\"users\"\
    )` 调用将返回的 `WebTarget` 解析为 `http://localhost:3003/account/api/users`。然后，在隐式返回的\
    \ `WebTarget` 实例上调用 `request` 方法，返回一个 `jakarta.ws.rs.client.SyncInvoker` 实例。该接口包含所有可以调用的\
    \ HTTP 方法，用于发起实际的请求。\n\n清单 6-26 中调用的 `post` 方法传入了一个 `CreateUserRequest` 实例。该实例使用\
    \ `jakarta.ws.rs.client.Entity` 类上的静态 `json` 方法转换为 JSON。传递给 `post` 方法的第二个参数是返回的响应应被转换成的类类型。根据表\
    \ 6-1 中显示的资源路径，对 `/api/users` 资源的 POST 请求会返回创建的用户。`post` 调用的响应直接赋值给一个 `UserResponse`\
    \ 变量，因为运行时会自动读取返回的实体并将其从 JSON 转换为具体的 Java 类型。\n\n第二个调用是对 `/api/users/{userId}`\
    \ 端点的 GET 调用。该端点接受一个路径参数。`path` 方法传入包含变量名的原始路径，然后通过 `resolveTemplate` 方法将其解析为用户的\
    \ ID。该方法接受要解析的变量名和要解析成的值。然后调用 `get` 方法发起 HTTP GET 请求。返回的响应直接赋值给一个 Java 类型，因为 `get`\
    \ 方法传入了一个类类型，响应的主体应被转换为该类型。\n\nJakarta REST 客户端是一个功能丰富的 API，用于向 Web 资源发起各种形式的\
    \ HTTP 调用。你可以链式调用 `path` 方法并解析变量来创建复杂的资源路径。你也可以获取调用返回的原始 `jakarta.ws.rs.core.Response`\
    \ 对象，以便在代码中使用。\n"
- fmt: '# The MicroProfile REST Client


    The Eclipse MicroProfile REST client specification provides another way to make
    REST calls in a much more typesafe way. Even though the Jakarta REST client looked
    at in the previous section gets the job done, it can get verbose and unwieldy
    at times. The MicroProfile REST client is another way to consume HTTP resources
    in Java without having to do the plumbing work of creating client objects. The
    following shows a complete MicroProfile REST client declaration for making external
    calls to apilayer.com’s currency conversion service.


    ```

    @RegisterRestClient(baseUri = BASE_URI)

    @ClientHeaderParam(name = "apikey", value = "INSERT_API_KEY_FROM_SERVICE")

    @Path("exchangerates_data")

    public interface ApiLayer {

    String NAME = "ApiLayer";

    String BASE_URI = "https://api.apilayer.com";

    @GET

    @Path("convert")

    ApiLayerConvertResponse convertCurrency(@BeanParam ApiLayerConvertRequest apiLayerConvertRequest);

    @GET

    @Path("list")

    JsonObject getCurrencySymbols();

    }

    ```


    Creating a REST client entails describing the resources that should be targeted.
    The `ApiLayer` interface declares two HTTP GET methods. The first one takes an
    `ApiLayerConvertRequest` object that is annotated `@BeanParam` that has the query
    params that the apilayer.com currency service expects. The two methods return
    an `ApiLayerConvertResponse` and `JsonObject`, respectively. The first return
    type is an application-specific object, and the second, `JsonObject`, is part
    of the Jakarta JSON Processing API.


    The interface is annotated `@RegisterRestClient(baseUri = BASE_URI)`. This annotation
    is a MicroProfile REST client stereotype that marks this interface as a REST client
    targeting the `baseUri`. All calls using this client will be relative to the passed
    value for the `baseUri`, in this example, `https://api.apilayer.com`. The `@ClientHeaderParam(name
    = "apikey", value = "API_KEY")` is used to add HTTP header information to the
    outbound request. As used on the interface level, every outbound request made
    through this client will have a header entry as key-value pair from this annotation.
    For the preceding example, each request will have an `apiKey="YOUR_API_KEY_FROM_API_LAYER"`
    in the request header.


    The `@Path` annotation is used to specify the relative path that methods invoked
    on this client will be made relative to. As is, all methods invoked on an instance
    of this client will be made relative to `https://api.apilayer.com/exchangerates_data`.
    The first GET method will be made to `https://api.apilayer.com/exchangerates_data/convert`
    and the second one to `https://api.apilayer.com/exchangerates_data/list`. With
    the client declaration in place, using it is as simple as injecting it with `@Inject`
    and the MicroProfile-specific qualifier, `@RestClient`. The following shows the
    use of the `ApiLayer` REST client in the `RateService` bean.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    ApiLayer apiLayer;

    private ConvertCurrencyResponse convert(final ConvertCurrencyRequest currencyRequest)
    {

    ApiLayerConvertRequest request = new ApiLayerConvertRequest();

    request.setFromCurrency(currencyRequest.getSourceCurrency());

    request.setToCurrency(currencyRequest.getTargetCurrency());

    request.setAmount(currencyRequest.getAmount().toPlainString());

    ApiLayerConvertResponse response = apiLayer.convertCurrency(request);

    ConvertCurrencyResponseData data = new ConvertCurrencyResponseData();

    data.setCurrency(currencyRequest.getTargetCurrency());

    data.setAmount(response.getResult());

    data.setSource(ApiLayer.NAME);

    return ConvertCurrencyResponse.of(data);

    }

    }

    ```


    To use the REST client, we inject it using `@Inject` and qualify it with the `@RestClient`
    CDI qualifier from the MicroProfile REST Client API. The implementation of the
    interface will be provided at runtime by the underlying REST Client implementation.
    The `convert` method calls the `convertCurrency` method on the inject client like
    any other Java instance. The implementation will take care of creating the actual
    HTTP request, making the invocation to the target resource, and getting and converting
    the response to the declared Java types. The `ApiLayerConvertRequest` and `ApiLayerConvertResponse`
    classes are shown below.


    ```

    public class ApiLayerConvertResponse {

    private boolean success;

    private Info info;

    private LocalDate date;

    private BigDecimal result;

    @Getter

    @Setter

    public static class Info {

    private Long timestamp;

    private BigDecimal rate;

    }

    }

    ```


    ```

    public class ApiLayerConvertRequest {

    @QueryParam("from")

    private String fromCurrency;

    @QueryParam("to")

    private String toCurrency;

    @QueryParam("amount")

    private String amount;

    }

    ```


    The `ApiLayerConvertResponse` is the Java representation of the JSON that the
    endpoint returns. The REST Client runtime takes care of marshalling the returned
    JSON to the Java representation automatically. The following shows a sample JSON
    returned by the `https://api.apilayer.com/exchangerates_data/convert` endpoint.


    ```

    {

    "date": "2005-01-01",

    "historical": true,

    "info": {

    "quote": 0.51961,

    "timestamp": 1104623999

    },

    "query": {

    "amount": 10,

    "from": "USD",

    "to": "GBP"

    },

    "result": 5.1961,

    "success": true

    }

    ```


    The `getCurrencySymbols` endpoint in the `ApiLayer` interface returns a `JsonObject`.
    For this endpoint, we want to have the JSON data directly for further processing.
    The REST Client runtime will convert the JSON string representation of the response
    to a `JsonObject` when the method is invoked on the client instance. The MicroProfile
    REST Client API is a powerful, intuitive, and much more typesafe way of consuming
    REST resources in Jakarta EE applications.


    ## Summary


    This chapter looked at creating RESTful web services using the Jakarta REST API.
    We looked at modelling the domain resource to HTTP resource paths, proceeded to
    use the various constructs from the API to create these resources, and learned
    how to use the Client API to make REST calls. We also looked at the Eclipse MicroProfile
    REST client and saw how simple it is to consume REST resources using that API.
    You can find out much more advanced topics in the respective Jakarta REST and
    Eclipse MicroProfile REST Client specifications. They are both written in an easy-to-understand
    language and should serve your authoritative source of knowledge for advanced
    usage.'
