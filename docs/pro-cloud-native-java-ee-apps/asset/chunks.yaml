    Dependency Injection. This simplified naming convention made it easy to grasp
    the myriad APIs of the platform by just their names.


    Up to this stage of the transfer, to develop applications on the platform, you
    needed to use the dependency shown in Figure [1-1](#531256_1_En_1_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_1_Chapter/531256_1_En_1_Fig1_HTML.jpg)


    6 lines of code depict Java E E dependency. The group I D and artifact I D mentioned
    are java x and java e e- a p i respectively.


    Figure 1-1


    Java EE dependency


    After the release of Jakarta EE 8, the maven coordinates changed to the dependency
    shown in Figure [1-2](#531256_1_En_1_Chapter.xhtml#Fig2).


    ![](images/531256_1_En_1_Chapter/531256_1_En_1_Fig2_HTML.jpg)


    6 lines of code depict Jakarta E E dependency. The group I D and artifact I D
    mentioned are Jakarta dot platform and Jakarta dot Jakarta e e, a p i respectively.


    Figure 1-2


    Jakarta EE dependency


    Jakarta EE 8 was a drop-in replacement for Java EE, meaning you could switch without
    any form of refactoring in your code or API change, because the various APIs were
    still within the javax.* package. Changing these to jakarta.* leads us to the
    final step of the transfer process.'
  trans: '

    ## 从 Java EE 到 Jakarta EE


    从前面按时间顺序发布的版本历史可以看出，每个版本之间的间隔年份越来越长，最终导致 Java EE 7 和 8 之间出现了超过四年的空白期。在像 Java 平台这样快节奏的生态系统中，版本之间间隔四年^(⁵)是一个巨大的鸿沟。这促使社区呼吁
    Oracle 明确其对企业级 Java 平台的意图，因为该平台是 Oracle 收购 Sun Microsystems 时继承而来的。在社区看来，Oracle
    似乎已经放弃了 Java EE。由于 Java EE 拥有广泛且深入的 API 集，甚至非 Java EE 产品也构建于此之上，因此 Java EE 的消亡对整个生态系统将是灾难性的。本质上，Java
    EE 构成了 Java 领域大部分企业级开发市场的基础。


    然而，在 2017 年晚些时候，在 Java EE 8 发布之后，Oracle 决定将 Java EE 平台转移到一个开源基金会，使其成为一个完全由社区驱动的开发平台。此次转移包括了
    Java EE 平台规范以及完整的测试兼容性工具包 (TCK)。在与 Java EE 的主要参与者 RedHat 和 IBM 协商后，Eclipse 基金会被选为
    Java EE 平台的新归属地。


    此时，Java EE 平台已有近二十年的历史，这意味着将如此庞大的平台从专有实体转移到开源基金会是一项艰巨的任务。一个值得注意的障碍涉及知识产权和商标权。为了使转移尽可能易于管理，该过程被分解为三个主要阶段^(⁷)，即：


    1.  转移 API 和实现代码

    2.  转移测试兼容性工具包 (TCK) 代码，制定新的规范流程

    3.  重构 API 包名，转移并更新规范文档


    ### 转移 API 和实现代码


    如前几节所述，Jakarta EE 由各个独立的规范组成，每个规范在转移到 Eclipse 基金会之前可能已经发布了 N 个版本。决定只将每个规范的最新发布版本转移到
    Eclipse 基金会。创建了顶级 Eclipse 项目 Eclipse Enterprise for Java (EE4J^(⁸))，并配有相应的 GitHub
    组织 eclipse-ee4j^(⁹)，作为这些规范及其实现的家园。


    在 Eclipse 基金会有了新家之后，转移的代码使用 Eclipse 基金会的服务器和基础设施进行构建，结果被暂存到一个 Maven 仓库，其 groupId
    从 javax.* 更改为 jakarta.*。这个 groupId 的更改意义重大，因为 Eclipse 基金会由于法律限制不能使用 javax 命名空间。从这些新的构件中，生成了参考实现（现在称为
    Eclipse GlassFish）的新构建，并在 Java EE 8 TCK 上运行。


    随着 Eclipse GlassFish 构建通过 TCK，它于 2019 年 1 月 29 日作为版本 5 发布。这个在 jakarta.* 包和 jakarta
    groupId 下的发布，在技术上仍然是 Java EE，因为它通过了 Java EE 8 认证。这仅标志着 Java EE 平台从 GitHub 上新的
    Eclipse 基金会 EE4J 项目发布，而不是从 Java EE 项目发布。另请注意，构成 Java EE 平台的各种规范的早期版本，均不由 Eclipse
    基金会作为平台的一部分进行管理或维护。


    ### 转移测试兼容性工具包 (TCK) 代码，制定新的规范流程


    此阶段涉及转移 TCK，并从中为新的 Jakarta EE 版本规范构建新的二进制文件。此阶段还引入了新的 Jakarta EE 规范流程 (JESP)^(¹⁰)。新的
    JESP 本身采用了现有的 Eclipse 基金会规范流程 (EFSP) v1.2^(¹¹)，并做了一些修改。与 JESP 一起发布的还有 Eclipse
    基金会技术兼容性工具包许可证^(¹²)。


    这两个法律框架共同指导着 Jakarta EE 规范的开发和兼容实现的发布，整个过程由 Eclipse 基金会端到端管理。新的 Jakarta EE 实现必须通过
    TCK，才能被认证为该平台的兼容实现，并有资格^(¹³)被列入 Eclipse 基金会的 Jakarta EE 下载页面^(¹⁴)。JESP 的目标是尽可能轻量级，鼓励采用“代码优先”的方法来开发平台，从而允许更多的实验和更快的迭代。


    请注意，在 Eclipse 基金会的背景下，我们一直使用术语“兼容实现”，而在此之前，在 JCP 的 Java EE 中，我们使用术语“参考实现”。这是因为在
    Eclipse 基金会，为了支持兼容实现，已经废除了“参考”实现的概念。目标是使认证过程尽可能简单快捷，并创造一个更公平的竞争环境，从而推动实现生态系统的创新。


    此过程的后续步骤包括更新各种 API 的 Javadoc，重新许可生成的 JAR 文件，并使用从新转移的 TCK 构建的二进制文件，针对 GlassFish
    5.1 版本进行测试。所有这些工作的结果是，Java EE 首次作为新转移的 Jakarta EE 版本 8 发布。此版本的正式发布日期是 2019 年 9
    月 10 日。请注意，Jakarta EE 8 的发布仍然使用 GlassFish 5.1 作为兼容实现。此外，此版本没有引入任何新的 API。这仅仅是“引擎盖下”的更改，标志着该平台在
    Eclipse 基金会管理下的首次完整发布。


    Java EE 向 Eclipse 基金会转移的这个阶段，还修订并重命名了各种 API，使其命名约定更加一致。例如，Java 持久化 API (JPA) 被重命名为
    Jakarta Persistence。用于容器的 Java 身份验证 SPI (JASPIC) 变成了 Jakarta Authentication，而其对应的用于容器的
    Java 授权契约 (JACC) 变成了 Jakarta Authorization。上下文和依赖注入 (CDI) API 变成了 Jakarta Contexts
    and Dependency Injection。这种简化的命名约定使得仅通过名称就能轻松掌握平台众多的 API。


    直到转移的这个阶段，要在该平台上开发应用程序，您需要使用图 1-1 中所示的依赖项。


    ![](img/531256_1_En_1_Fig1_HTML.jpg)


    6 行代码描述了 Java E E 依赖项。提到的 group I D 和 artifact I D 分别是 javax 和 java e e- a p i。


    图 1-1

    Java EE 依赖项


    Jakarta EE 8 发布后，Maven 坐标更改为图 1-2 中所示的依赖项。


    ![](img/531256_1_En_1_Fig2_HTML.jpg)


    6 行代码描述了 Jakarta E E 依赖项。提到的 group I D 和 artifact I D 分别是 Jakarta dot platform
    和 Jakarta dot Jakarta e e, a p i。


    图 1-2

    Jakarta EE 依赖项


    Jakarta EE 8 是 Java EE 的直接替代品，这意味着您无需对代码进行任何形式的重构或更改 API 即可切换，因为各种 API 仍然位于 javax.*
    包中。将它们更改为 jakarta.* 将我们引向转移过程的最后一步。

