  raw: '##### @PathParam


    The getUser method takes the java.lang.Long type. This parameter is annotated
    @PathParam. The value passed to the @PathParam annotation is the same value passed
    to the @Path annotation of the method. The @Path annotation value, however, is
    surrounded by curly braces. This is one way a variable in a resource path or path
    segment is captured in Jakarta REST. The {userId} is a variable that will be substituted
    at runtime with the actual value passed. The @PathParam grabs the value and injects
    it into the userId method parameter. The path /api/users/1 will be matched to
    this method.


    The path parameter doesn’t have to be one. A resource path can have /{param1}/{param2}/{param3}
    or any such combination. Just keep in mind that if you use the same variable twice,
    the last match wins. So if you have /{same}/{same}, and you inject the variable
    with @PathParam(“same”), the path /foo/bazz will have the value bazz injected
    for all instances of @PathParam(“same”). Keep this in mind when creating resource
    paths. The @Path annotation also supports the use of regular expressions to limit
    the set of characters that can be passed as the path. The method parameter can
    also be further constrained with @NotNull.


    Similar to the POST method, the returned type will be automatically marshalled
    to the JSON representation and returned to the client as such. Because the class
    is annotated @Produces(“application/json”), all returned types will be automatically
    transformed to JSON.


    ##### @BeanParam and @QueryParam


    The searchUsers resource method is hosted at the /api/users/search path. This
    method takes a UserSearchRequest object and returns a list of UserResponses. The
    method parameter is annotated @BeanParam , which is used for aggregating resource
    parameters into the annotated object. Listing [6-13](#531256_1_En_6_Chapter.xhtml#PC13)
    shows the annotated UserSearchRequest class.


    ```

    public class UserSearchRequest implements Serializable {

    @QueryParam("firstName")

    private String firstName;

    @QueryParam("lastName")

    private String lastName;

    @QueryParam("totalConversions")

    private BigDecimal totalConversions;

    @QueryParam("conversionFilter")

    private ConversionFilter conversionFilter = ConversionFilter.EQ;

    @QueryParam("userType")

    private UserType userType;

    public enum ConversionFilter {

    GT,

    GTE,

    LT,

    LTE,

    EQ,

    NEQ

    }

    }

    Listing 6-13

    UserSearchRequest

    ```


    The UserSearchRequest class has its fields annotated @QueryParam. This annotation
    binds the value of the passed HTTP query parameter name to the annotated field.
    It can also be used on method parameters, similar to @PathParam. As used in Listing
    [6-13](#531256_1_En_6_Chapter.xhtml#PC13), with the @BeanParam annotation annotating
    the method parameter, the runtime will grab all query parameters for the search
    resources and inject them into an instance of this class, passing that instance
    to the method.


    For example , the HTTP GET request /api/users/search?firstName=Joe&conversionFilter=GTE
    will cause an instance of UserSearchRequest to be created and the field firstName
    set to Joe and the conversionFilter field set to GTE. @BeanParam is a very powerful
    annotation for creating search type resources because instead of having many method
    parameters, you can abstract all possible query parameters into an object as we
    have done with the searchUsers method.


    In simple cases, this search resource should be enough. But, when returning a
    list, you might have very large datasets that instead of returning all at a go,
    it would be much more efficient for both client and server to page. Pagination
    would require that the client be given the option to pass a limit, that is, the
    maximum data to return per page, and an offset. The returned information would
    also include some metadata about the searched dataset, for instance, the total
    number of elements in the set. Listing [6-14](#531256_1_En_6_Chapter.xhtml#PC14)
    shows the UserSearchRequest updated to give the client the option to page.


    ```

    public class UserSearchRequest implements Serializable {

    @QueryParam("firstName")

    private String firstName;

    @QueryParam("lastName")

    private String lastName;

    @QueryParam("totalConversions")

    private BigDecimal totalConversions;

    @QueryParam("conversionFilter")

    private ConversionFilter conversionFilter = ConversionFilter.EQ;

    @QueryParam("userType")

    private UserType userType;

    @QueryParam("limit")

    @DefaultValue("150")

    @Positive

    private Integer limit;

    @QueryParam("offset")

    @DefaultValue("0")

    private Integer offset;

    public enum ConversionFilter {

    GT,

    GTE,

    LT,

    LTE,

    EQ,

    NEQ

    }

    }

