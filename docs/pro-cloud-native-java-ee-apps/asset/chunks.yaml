    *Listing 5-14 – User entity with an enum field*


    Figure [5-5](#531256_1_En_5_Chapter.xhtml#Fig5) shows the schema diagram of the
    `User` entity with the enum field type.


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig5_HTML.jpg)


    *A schema diagram depicts the wallet user table with the following fields: birthday,
    created, first name, last name, total conversions, updated, user type, user name,
    and ID.*


    *Figure 5-5 – Enum ordinal schema*


    The `userType` is mapped to an integer for this particular underlying database.
    This means the ordinal position of the `UserType` value passed to the `userType`
    field at runtime is what will persist. The problem with this approach is that
    the existing ordinals could easily change with the addition of new entries in
    the enum. To prevent already persisted enum fields being mapped to the wrong enum
    value because of changes in the ordinals, the `@Enumerated` annotation can be
    used to change the mapped field type to a string. Listing [5-15](#531256_1_En_5_Chapter.xhtml#PC15)
    shows the `userType` field mapped to `String`.


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    @Getter

    @Setter

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    }

    ```


    *Listing 5-15 – Shows the mapping of enum to String*


    The `@Enumerated` annotation takes either `EnumType.STRING` or `EnumType.ORDINAL`.
    The `ORDINAL` value is the default, and as such when omitted as was done in Listing
    [5-14](#531256_1_En_5_Chapter.xhtml#PC14), the field is mapped to the ordinal.
    Figure [5-6](#531256_1_En_5_Chapter.xhtml#Fig6) shows the updated schema diagram.


    ![](images/531256_1_En_5_Chapter/531256_1_En_5_Fig6_HTML.jpg)


    *A schema diagram depicts the wallet user table with the following fields: birthday,
    created, first name, last name, picture, total conversions, updated, user type,
    user name, and ID.*


    *Figure 5-6 – Enum string mapping*


    The `userType` enum field is now mapped to `varchar`, which represents the `String`
    type that we aim to map it to.


    ### Transient Fields


    Transient fields in an entity are fields that are not mapped to a database column.
    To signal the runtime that a given field should not be persistent, the `transient`
    modifier or `@Transient` annotation can be used on a field type. The modified
    or annotated field will not be mapped to a database column nor can it be queried
    during data retrieval. For example, the `User` entity shown in Listing [5-16](#531256_1_En_5_Chapter.xhtml#PC16)
    has an `age` field with the `transient` modifier that is computed at runtime.
    This field should not be persistent.


    ```java

    @Entity

    @Table(name = "WALLET_USER")

    @Getter

    @Setter

    public class User {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected Long id;

    @Column(nullable = false)

    private String firstName;

    @Column(nullable = false)

    private String lastName;

    @Column(unique = true, length = 30, nullable = false)

    private String username;

    @Column(precision = 19, scale = 2)

    private BigDecimal totalConversions;

    private LocalDate birthDay;

    private LocalDateTime created;

    private LocalDateTime updated;

    @Lob

    @Basic(fetch = FetchType.LAZY)

    private byte[] picture;

    @Enumerated(EnumType.STRING)

    private UserType userType;

    private transient int age;

    }

    ```


    *Listing 5-16 – Shows the use of the transient modifier*


    The `age` field could equally be annotated `@Transient`, and the effect would
    be the same.


    ### Field and Property Access


    The mappings discussed so far in the `User` entity have all had their respective
    JPA annotations on the field. What this means is that the JPA runtime will directly
    access these fields at runtime. This is called field access. The other access
    type is property access, where the getter methods of the fields are annotated
    with the JPA annotations. You will not see much property access in the wild as
    much as field access. As such, all the examples in this chapter, and the rest
    of the book, use field access.'
