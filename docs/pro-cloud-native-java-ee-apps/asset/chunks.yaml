    }

    ```


    Listing 6-1 shows the root resource declaration


    The root resource class is declared as a subclass of the `Application` class.
    This class contains three methods that can be overridden to explicitly register
    resource classes, extensions, and properties. Most of the time, you would not
    need to override these methods as done in Listing [6-1](#531256_1_En_6_Chapter.xhtml#PC1).


    The class is annotated `@ApplicationPath` and passed the value `"api"`. This annotation
