    钱包 docker-compose.yaml 文件

    ```


    docker-compose 文件通过拉取 Postgres 12.3 版本镜像，并利用附带的 Dockerfile 构建钱包镜像，组合出一组完整运行的容器实例。借助这些文件，钱包模块可以被打包并作为云原生、自包含的
    Jakarta EE 应用程序运行。钱包服务通过 `WalletResource` 类中的 HTTP REST 资源暴露给客户端，如代码清单 14-4 所示。


    ```

    @RegisterRestClient(baseUri = "http://wallet:3001/wallet/api")

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    @RolesAllowed("teller")

    public interface WalletResource {

    @POST

    @Traced(operationName = "create-wallet")

    @SimplyTimed(name = "create_wallet_timer")

    BalanceResponse createWallet(CreateWalletRequest createWalletRequest);

    @GET

    @Path("{walletId}/balance")

    @Traced(operationName = "get-wallet-balance")

    @SimplyTimed(name = "get_wallet_balance_timer")

    BalanceResponse getBalance(@PathParam("walletId") long walletId);

    @GET

    @Path("{walletId}/transactions")

    @Traced(operationName = "get-wallet-transactions")

    @SimplyTimed(name = "get_wallet_transactions_timer")

    TransactionsResponse getTransactions(@PathParam("walletId") long walletId);

    @POST

    @Path("{walletId}/transactions/debit")

    @Traced(operationName = "debit-wallet")

    @SimplyTimed(name = "debit_wallet_timer")

    TransactionResponse debit(@PathParam("walletId") long walletId, TransactionRequest
    transactionsRequest);

    @POST

    @Path("{walletId}/transactions/credit")

    @Traced(operationName = "credit-wallet")

    @SimplyTimed(name = "credit_wallet_timer")

    TransactionResponse credit(@PathParam("walletId") long walletId, TransactionRequest
    transactionsRequest);

    }

    代码清单 14-4

    WalletResource

    ```


    `WalletResource` 是一个 Jakarta REST 资源，也可以作为 MicroProfile REST 客户端使用，通过 `@RegisterRestClient`
    注解实现。它消费和生成 JSON 格式数据，并要求执行客户端具有 `teller` 角色。MicroProfile JWT 用于验证和传播客户端传递的 JWT
    令牌。它还使用 MicroProfile Metrics API 声明了一些度量指标。该模块也拥有自己的单元测试和集成测试。


    这些资源方法的实现可以，并且通常应该，复用单体应用中的现有逻辑。从单体架构迁移到微服务架构，主要围绕应用程序的边界和打包方式展开。应尽可能复用现有的业务逻辑。


    从表面上看，这个资源描述了钱包服务的功能。作为一个 HTTP 服务，我们可以将其部署到云集群中，让 Kubernetes 管理其部署、扩展和更新。wallet-manifest.yaml
    文件创建了一个 Kubernetes 管理的对象。代码清单 14-5 展示了这个清单文件。


    ```

    apiVersion: networking.k8s.io/v1

    kind: Ingress

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    rules:

    - host: "*.wallet.sslip.io"

    http:

    paths:

    - path: /

    pathType: Prefix

    backend:

    service:

    name: wallet

    port:

    name: wallet-port


    apiVersion: v1

    kind: Service

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    ports:

    - name: wallet-port

    port: 3001

    targetPort: 3001

    selector:

    app: wallet


    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: wallet

    labels:

    app: wallet

    spec:

    replicas: 1

    selector:

    matchLabels:

    app: wallet

    template:

    metadata:

    labels:

    app: wallet

    spec:

    containers:

    - name: wallet

    image: k3d-registry.localhost:12345/jwallet/wallet:latest

    resources:

    limits:

    memory: "512Mi"

    cpu: "500m"

    ports:

    - containerPort: 9080

    env:

    - name: JAEGER_AGENT_HOST

    value: jaeger

    - name: JAEGER_AGENT_PORT

    value: "6831"

    - name: JAEGER_SAMPLER_TYPE

    value: const

    - name: JAEGER_SAMPLER_PARAM

    value: "1"

    livenessProbe:

    httpGet:

    path: /health/live

    port: 3001

    initialDelaySeconds: 60

    periodSeconds: 60

    timeoutSeconds: 10

    failureThreshold: 10

    readinessProbe:

    httpGet:

    path: /health/ready

    port: 3001

    initialDelaySeconds: 60

    periodSeconds: 60

    timeoutSeconds: 10

    failureThreshold: 10

    代码清单 14-5

    钱包清单文件

    ```


    有了这些文件描述符，我们就将钱包微服务转变成了一个云原生的 Jakarta EE 应用程序。账户服务和交易服务与钱包服务具有类似的结构。利用上一节中的指导原则，我们能够将单体应用分解为业务限界上下文。每个服务都是一个独立的可部署单元，并拥有自己的测试。


    示例代码包含一个 shell 脚本，其中包含将应用程序打包并作为 Docker 容器运行，并部署到 Kubernetes 管理集群的命令。Readme 文件包含了运行应用程序或单个微服务所需的所有信息。每个服务可以独立运行，也可以作为一个整体单元一起运行。将应用程序打包为容器并配备必要的描述符后，部署到云提供商只需将生成的镜像推送到
    Docker 注册表（大多数云提供商都有自己的注册表），然后选择推送的镜像进行部署即可。Microsoft Azure Kubernetes 服务^(¹²²)
    (AKS) 是您自行实验的一个良好起点。


    ## 总结


    本章首先探讨了单体架构及其优缺点，接着讨论了在采用或迁移到微服务架构时需要牢记的注意事项。然后，本章深入研究了三个微服务中的一个，以及将应用程序从单体架构迁移到微服务架构时通常需要更改的通用部分。正如本章所述，迁移应用程序是一项依赖于具体领域的工作；然而，我们试图提供广泛的指导原则和注意事项，以帮助阐明迁移的过程和任务。

