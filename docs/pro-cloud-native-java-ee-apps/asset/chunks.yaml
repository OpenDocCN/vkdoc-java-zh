  trans: '

    ### 重构 API 包名、迁移与更新规范文档


    此阶段的迁移过程涉及将所有 API 包重命名为 `jakarta.*` 命名空间。例如，Jakarta Persistence 中的实体管理器从 `javax.persistence.EntityManager`
    迁移至 `jakarta.persistence.EntityManager`。此步骤产生的版本是 Jakarta EE 9，^(¹⁵) 五个月后发布了 Jakarta
    EE 9.1。该版本与之前的版本 8 几乎相同，显著区别在于包名的变更以及对 Java 11 的基础支持。


    鉴于大多数生产系统仍广泛使用 Java 8，这些 API 仍可在 JDK 8 下编译，但实现必须通过运行在 JDK 11 上的 TCK 测试。一些从 Java
    EE 迁移到 Java SE 并在 JDK 11 中被再次移除的规范被重新添加，其中部分为强制规范，部分为可选规范。例如，Jakarta Activation
    和 Jakarta XML Binding 分别被添加为强制规范和可选规范。Eclipse GlassFish 版本 6 也作为 Jakarta EE 9
    的首个兼容实现发布。


    此外，在此迁移步骤中，规范文档的代码也被迁移，这标志着最后一件需要迁移到 Eclipse 基金会的人工制品已完成，并预示着迁移过程的结束。这最后一步及其在
    Jakarta EE 9 发布中的最终成果，主要针对工具生态系统，旨在使其准备就绪、更新并扩展以支持新平台。对于作为开发者的你而言，Jakarta EE 9
    与 Jakarta 和 Java EE 8 完全相同。不过，从平台的先前版本升级到 Jakarta EE 9 将导致代码需要进行重要的重构，因为包名发生了变化。幸运的是，有一些工具^(¹⁶)
    可以自动完成迁移，使其尽可能顺利和简单。


    ## Jakarta EE 10 及未来展望


    2021 年 8 月 24 日，Jakarta EE 规范委员会^(¹⁷) 通过正式投票批准了 Jakarta EE 10 发布计划 ^(¹⁸)。该计划由
    Jakarta EE 社区在同年 6 月至 8 月期间创建、讨论、审查和修订。发布计划概述了发布时间线、范围、可交付成果以及各个规范的期望细节。版本 10
    的预期发布日期是 2022 年第二季度。


    Jakarta EE 10 预计将继续推动平台向适用于现代企业应用开发的云原生平台演进。此版本的一个显著特性将是支持 Java 17，即基础 Java SE
    平台的当前长期支持版本。尽管 Java 11 是最低要求版本，但兼容实现必须通过使用 Java 17 执行的 TCK 测试。


    这将极大地便利企业采用最新的 JDK，从而整体上受益于 Java 平台更快的特性迭代。作为开发者，你也将能够在应用开发中使用新特性，而无需担心与你选择的 Jakarta
    EE 兼容实现的兼容性问题。


    此版本的另一个可能显著亮点是引入 Jakarta Core Profile。Jakarta EE（以及之前的 Java EE）一直都有“配置文件”，其中构成完整平台的一部分规范被组合在一起，以服务于狭窄、通用的开发目的。这些配置文件如下：


    *   **Web** – 此配置文件包含一组面向主要开发 Web 应用（如 Jakarta Faces）的平台 API 和技术。此配置文件适用于不需要平台上全套
    API 的开发者。你只需要一个像 Apache Tomcat 这样的 Servlet 容器即可运行此配置文件。


    *   **Full** – 此配置文件包含平台上所有可用的 API 和技术。它面向企业环境中开发多层应用的开发者。需要一个像 WildFly^(¹⁹) 这样的完全兼容平台实现来运行此配置文件。


    Jakarta EE 10 的目标是可能在现有两个配置文件之外发布核心配置文件。什么是核心配置文件？它是平台 API 的另一个子集，包含旨在开发现代、云原生、微服务应用的“核心”API，这些应用将通过
    Docker 等容器平台部署到 Kubernetes 等云应用编排平台。预计将成为核心配置文件一部分的 API 列表如下：


    *   Jakarta EE Core Profile

    *   Jakarta Annotations

    *   Jakarta Contexts and Dependency Injection Lite

    *   Jakarta Dependency Injection

    *   Jakarta Expression Language

    *   Jakarta Interceptors

    *   Jakarta JSON Binding

    *   Jakarta JSON Processing

    *   Jakarta RESTful Web Services


    这些 API 与 Eclipse MicroProfile^(²⁰) 项目结合使用时，构成了开发云原生企业 Java 应用的基础。然而，此配置文件对于 Jakarta
    EE 10 而言仍是暂定的，只有当核心配置文件规范的发布计划^(²¹) 及时获得批准时才会被包含在内。

    '
- fmt: '# Jakarta EE and Eclipse MicroProfile


    Jakarta EE (and Java EE before it) is a very critical platform in the Java ecosystem
    and, indeed, in the entire software development industry. Given the sheer number
    of projects, frameworks, and libraries that owe their existence and evolution
    to the Jakarta EE (and its “ancestor” J2EE) platform, there is no gainsaying the
    fact that Jakarta EE is an important tool in the arsenal of any Java developer.


    Software development has evolved over the last few decades, from single massive,
    centralized applications to the current distributed, containerized, cloud-native
    microservices paradigm. Jakarta EE started in an era where the dominating software
    development paradigm was the monolith architecture. As such, its evolution had
    always been much more optimized for developing monolith applications. That is
    not to say you cannot use Jakarta EE alone in developing microservices. You definitely
    can.


    As we have discussed in previous sections, Jakarta EE was developed through the
    Java Community Process (JCP). This process wasn’t entirely optimized to keep up
    with the pace at which software development was evolving. As you have seen in
    the release history of Jakarta EE (or more correctly, Java EE in that context),
    the duration between each release kept getting longer, while the pace of change
    in the software development industry kept getting faster. The natural consequence
    of this is that at some point, Jakarta EE had a lot more changes to catch up on
    in the industry with each release.


    Even though you could use the standard Jakarta EE APIs to develop microservices,
    there was no clear, standardized support defined for the various platform runtimes.
    This meant that each application server implemented support for using Jakarta
    EE for microservices in a nonportable, nonvendor-neutral way. This could result
    in fragmented, noncoherent support for developing cloud-native, microservices
    applications on the platform. Oracle’s unclear strategy for the platform between
    Java EE 7 and 8 did not help in keeping confidence in the platform as well.


    It is within this context that application server vendors and various Java User
    Groups came together to find a way to augment the existing Jakarta EE platform
    with a separate set of specifications geared at developing cloud-native, microservices
    enterprise Java applications. At JavaOne 2016, the Eclipse MicroProfile project
    was announced as a new collaborative project for providing a set of APIs that
    are needed in a typical microservices application.


    The Eclipse MicroProfile project is built on the Jakarta EE platform as a set
    of standardized specifications, containing a subset of the platform APIs, in addition
    to individually developed specs, that aims at providing a standard, portable,
    vendor-neutral way to build modern, cloud-first microservices applications. Version
    1.0 of the project comprised the `CDI`, `JAX-RS`, and `JSON-P` APIs. Eclipse MicroProfile
    therefore came into existence as a way to extend the Jakarta EE (or, again, more
    correctly Java EE in that context) platform for a modern application development
    paradigm.


    At the time Eclipse MicroProfile was announced, the Jakarta EE platform was still
    developed through the JCP. In this regard, one of the key objectives of the EMP
    was to eventually create JSRs at the JCP with developed EMP (Eclipse MicroProfile)
    specs, having the Eclipse Foundation act as the proposed spec lead. The project
    was designed to move fast and allow for a much more rapid and frequent release
    cadence to keep pace with an ever-evolving industry. There is practically no barrier
    to contributing. All you have to do is to fork the sandbox repository^([^(22)](#fn22))
    on GitHub, implement your idea, and submit it as a pull request for feedback and
    iterations.


    Another major goal of the EMP is to dispel the notion that Jakarta EE is “heavy”
    in the sense that you need a full-blown compatible application server to run it.
    Even though modern full JEE (Jakarta EE) compatible runtimes are very lean and
    lightweight, the past experiences with the major pain points of earlier releases
    of the platform (the J2EE era) and its accompanying application servers at that
    time still lingered on. Thus, EMP aimed to give vendors much smaller implementation
    requirements to help make running it as fast and lightweight as possible.


    A year after the unveiling of the EMP, Oracle announced the transfer of Java EE
    to the Eclipse Foundation. The result of this is that the parent platform of the
    EMP found its way back to the same entity. Even though both projects are now managed
    by the same foundation, they are kept as separately evolved specifications. JEE
    is now going to evolve at a much faster pace relative to its time at the JCP,
    but slower than EMP. The goal is to have the JEE platform remain the matured,
    stable, and reliable development platform that enterprises of all sizes have come
    to trust while still incorporating tested and industry-accepted modern paradigms
    quicker.


    The current release of Eclipse MicroProfile is version 5, summarized in Figure
    [1-3](#531256_1_En_1_Chapter.xhtml#Fig3), is made up of 18 total APIs: 13 core
    and 5 stand-alone, as shown in the image below.


    ![](images/531256_1_En_1_Chapter/531256_1_En_1_Fig3_HTML.jpg)


    An illustration of EMP specifications depicts 18 APIs, which include 13 core APIs
    of MicroProfile 5.0 and 5 standalone.


    **Figure 1-3** Eclipse MicroProfile specs


    As you can see, the EMP contains APIs geared at developing microservices. Let
    us take a brief look at each. The rest of this book covers both JEE and EMP in
    detail.


    ## OpenTracing^([^(23)](#fn23))


    The `OpenTracing` API provides an API for tracing the flow of requests across
    various service boundaries. In a typical microservice environment, you are going
    to have a given number of individual interdependent services all acting in unison
    to fulfill a given application objective. The `OpenTracing` API of EMP adheres
    to the `OpenTelemetry`^([^(24)](#fn24)) (a super set of the now archived `OpenTracing`)
    specification.


    ## OpenAPI^([^(25)](#fn25))


    The `OpenAPI` specification of the EMP aims at providing a unified, vendor-neutral
    Java API for the `OpenAPI` specification. The `OpenAPI` specification (v3^([^(26)](#fn26)))
    describes how application developers can publish application API documentation
    for use by their clients.


    ## Rest Client^([^(27)](#fn27))


    The EMP `Rest Client` is an API that provides a typesafe way to invoke REST services.
    It abstracts you from having to handle the underlying, low-level work needed to
    translate calls to and from RESTful web services into their respective Java types.


    ## Config^([^(28)](#fn28))


    The EMP `Config` API provides a flexible, easy, and extensible way to manage application
    configuration. It gives you a way to manage various sources of configuration variables
    and mapping different sources to different deployment scenarios.


    ## Fault Tolerance^([^(29)](#fn29))


    The EMP `Fault Tolerance` specification defines a flexible, easy-to-use system
    for building resilient microservices. It provides API constructs for managing
    timeout, retry, fallback, circuit breaking, and bulkheads in a microservices application.


    ## Metrics^([^(30)](#fn30))


    The `Metrics` specification provides a way to expose application and system metrics
    through well-defined endpoints. The `Metrics` API isn’t a replacement for the
    `JMX`^([^(31)](#fn31)) API. Its objective is to provide an easy way to gather
    and monitor application metrics in a polyglot environment.'
  raw: '## Jakarta EE and Eclipse MicroProfile


    Jakarta EE (and Java EE before it) is a very critical platform in the Java ecosystem
    and, indeed, in the entire software development industry. Given the sheer number
    of projects, frameworks, and libraries that owe their existence and evolution
    to the Jakarta EE (and its “ancestor” J2EE) platform, there is no gainsaying the
    fact that Jakarta EE is an important tool in the arsenal of any Java developer.


    Software development has evolved over the last few decades, from single massive,
    centralized applications to the current distributed, containerized, cloud-native
    microservices paradigm . Jakarta EE started in an era where the dominating software
    development paradigm was the monolith architecture. As such, its evolution had
    always been much more optimized for developing monolith applications. That is
    not to say you cannot use Jakarta EE alone in developing microservices. You definitely
    can.


    As we have discussed in previous sections, Jakarta EE was developed through the
    Java Community Process (JCP) . This process wasn’t entirely optimized to keep
    up with the pace at which software development was evolving. As you have seen
    in the release history of Jakarta EE (or more correctly, Java EE in that context),
    the duration between each release kept getting longer, while the pace of change
    in the software development industry kept getting faster. The natural consequence
    of this is that at some point, Jakarta EE had a lot more changes to catch up on
    in the industry with each release.


    Even though you could use the standard Jakarta EE APIs to develop microservices,
    there was no clear, standardized support defined for the various platform runtimes.
    This meant that each application server implemented support for using Jakarta
    EE for microservices in a nonportable, nonvendor-neutral way. This could result
    in fragmented, noncoherent support for developing cloud-native, microservices
    applications on the platform. Oracle’s unclear strategy for the platform between
    Java EE 7 and 8 did not help in keeping confidence in the platform as well.


