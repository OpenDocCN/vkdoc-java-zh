    #### ID 生成


    id 字段上的第二个注解是 `@GeneratedValue` 注解。该注解用于通过 `strategy` 参数告知运行时如何生成主键值。`strategy`
    参数的类型为 `GenerationType`，默认值为 `AUTO`。`GenerationType` 的可能取值包括 `TABLE`、`SEQUENCE`、`IDENTITY`
    和 `AUTO`。由于默认值为 `AUTO`，清单 5-4 中展示的 `User` 实体可以简化为清单 5-5 所示的内容。


    ```

