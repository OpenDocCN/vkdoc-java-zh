    *清单 9-10 展示`convertCurrency`上`@SimplyTimed`度量指标的结果*


    #### `@Timed`


    `@Timed`度量指标用于跟踪类、构造函数或方法被调用的频率，并记录调用完成所花费的时间。`@Timed`聚合计时持续时间，为被注解的对象提供持续时间和吞吐量统计。相对于仅跟踪经过时间持续时间和调用次数的`@SimplyTimed`，它是一个更详细的度量指标。清单[9-11](#531256_1_En_9_Chapter.xhtml#PC11)展示了使用`@Timed`注解的`convertCurrency`方法。


