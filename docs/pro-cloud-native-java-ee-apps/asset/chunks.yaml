  raw: '### The HealthCheckResponse


    The HealthCheckResponse is a class that encapsulates the response that a health
    check probe returns. It has three simple fields, namely, name, status, and data.
    The first two fields are of type String and the last one is an Optional< Map<String,
    Object>> type. The data field can be used to return free-form additional data
    that a health check implementation would like to return to a calling client. It
    has a convenient builder method for building the response. The name field is mandatory
    and must be provided for every instance of the HealthCheckResponse.


    After a health check component performs some kind of application-specific check,
    it can then build the HealthCheckResponse and return an instance that tells the
    caller if the particular health check is up or down and also pass some optional
    data.


    ## Health and CDI


    The Health API is built on the Jakarta Contexts and Dependency Injection specification
    (Chapter [4](#531256_1_En_4_Chapter.xhtml)). What this implies is that all health
    check components are CDI beans . As health check components are required to implement
    the HealthCheck interface, all health check components are bean types of at least
    HealthCheck.


    However, as mentioned in the opening section, the Health API allows an application
    to respond to two simple questions. As there can be more than one bean type of
    HealthCheck, the API comes with three CDI qualifiers to distinguish HealthCheck
    beans from each other.


    ### Health Check Qualifiers


    The three health check qualifiers for identifying which beans respond to which
    health probe are


    *   @Readiness


    *   @Liveness


    *   @Startup


    #### @Readiness


    The @Readiness qualifier , used on a HealthCheck bean, creates a readiness health
    check procedure. This health check allows the caller to know if the application
    is ready to accept requests. Readiness health checks can be queried from the resource
    /health/ready. To create a readiness health check, annotate a bean of type HealthCheck
    with @Readiness as shown in Listing [10-1](#531256_1_En_10_Chapter.xhtml#PC1).


    ```

    @ApplicationScoped

    @Readiness

    public class HelloReadiness implements HealthCheck {

    CountDownLatch countDownLatch = new CountDownLatch(2);

    @Override

    public HealthCheckResponse call() {

    countDownLatch.countDown();

    return countDownLatch.getCount() == 0

    ? HealthCheckResponse.up("rate-readiness")

    : HealthCheckResponse.down("rate-readiness");

    }

    }

    Listing 10-1

    shows a @Readiness health check

    ```


    Listing [10-1](#531256_1_En_10_Chapter.xhtml#PC1) shows the HelloReadiness bean
    implementing the HealthCheck interface. This bean is an @ApplicationScoped bean
    that bears the @Readiness qualifier . Since a health check probe covers the entire
    application, a single application-scoped instance of the HealthCheck implementation
    suffices. We don’t need to create a new contextual instance for each probe. The
    @Readiness annotation marks this bean as a readiness health check and will be
    called by the Health runtime if the /health root health resource is queried or
    the specific /health/ready endpoint.


    For this example, the call method implementation uses a simple CountDownLatch
    to simulate some form of countdown. As the bean is a CDI bean, you can inject
    any dependency into and carry out any custom, application-specific task to determine
    the readiness of the application. The only requirement is to return the HealthCheckResponse
    object.


    A sample readiness probe to the path /health/ready returns the health data as
    shown in Listing [10-2](#531256_1_En_10_Chapter.xhtml#PC2).


    ```

    {

    "checks": [

    {

    "data": {},

    "name": "rate-readiness",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    Listing 10-2

    shows the response from a call to /health/ready

    ```


    Listing [10-2](#531256_1_En_10_Chapter.xhtml#PC2) shows the JSON representation
    of the HealthCheckResponse object. For the @Readiness probe, the health check
    procedure reports that it is UP and ready. This means the rate module of jwallet
    is up and ready to accept requests.


    #### @Liveness


    The @Liveness qualifier on a HealthCheck bean creates a health check to determine
    if the application is running. In a cloud environment, if this call fails with
    a DOWN status, for instance, a kubelet could then use this information to discard
    that container instance and replace it with a healthier one. To create @Liveness
    health check, annotate a HealthCheck bean with @Liveness as shown in Listing [10-3](#531256_1_En_10_Chapter.xhtml#PC3).


    ```

    @ApplicationScoped

    @Liveness

    public class HelloLiveness implements HealthCheck {

    LocalDateTime init = LocalDateTime.now(ZoneOffset.UTC);

    @Override

    public HealthCheckResponse call() {

    LocalDateTime now = LocalDateTime.now(ZoneOffset.UTC);

    Duration upDuration = Duration.between(init, now);

    return HealthCheckResponse.builder()

    .up()

    .name("rate_service_live")

    .withData("up_since", upDuration.toMinutes())

    .build();

    }

    }

    Listing 10-3

    shows a @Liveness health check implementation

    ```


    Listing [10-3](#531256_1_En_10_Chapter.xhtml#PC3) shows @Liveness health check
    implementation in the HelloLiveness bean. This implementation simply returns the
    UP status and a free-form data showing the number of minutes that the service
    has been live. The free-form data can be anything the health check implementation
    would like to return to the client. A sample call to this @Liveness implementation
    returns the data shown in Listing [10-4](#531256_1_En_10_Chapter.xhtml#PC4).


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": 2

    },

    "name": "rate_service_live",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    Listing 10-4

    shows a liveness health check response

    ```


    Listing [10-4](#531256_1_En_10_Chapter.xhtml#PC4) shows the HealthCheckResponse
    JSON representation from the @Liveness check. With this information and the HTTP
    status code 200, a kubelet will know that the application instance is up and running.


    #### @Startup


    @Startup is a health check that allows applications to create custom startup health
    checks that can be used for some form of application-specific verification before
    the liveness probe takes over. This health check procedure, in a cloud environment
    will be mapped to the startup Kubernetes probes. @Startup is suitable for situations
    where your application depends on an external service. In such cases, you might
    want to ensure the external service is up and running before your application
    is put into service. Listing [10-5](#531256_1_En_10_Chapter.xhtml#PC5) shows a
    startup health check implementation in the HelloStartup bean.


    ```

    @ApplicationScoped

    @Startup

    public class HelloStartup implements HealthCheck {

    CountDownLatch countDownLatch = new CountDownLatch(5);

    LocalDateTime upSince = LocalDateTime.now(ZoneOffset.UTC);

    @Override

    public HealthCheckResponse call() {

    countDownLatch.countDown();

    return countDownLatch.getCount() == 0

    ? HealthCheckResponse.named("rate-startup")

    .withData("up_since", upSince.toString())

    .up()

    .build()

    : HealthCheckResponse.down("rate-startup");

    }

    }

    Listing 10-5

    shows a @Startup health check implementation

    ```


    Listing [10-5](#531256_1_En_10_Chapter.xhtml#PC5) shows a @Startup health check
    implementation that simply counts down to five and returns UP after. A sample
    call to the /health/started endpoint returns the data shown in Listing [10-6](#531256_1_En_10_Chapter.xhtml#PC6)
    .


    ```

    {

    "checks": [

    {

    "data": {

    "up_since": "2022-08-14T17:26:33.363745328"

    },

    "name": "rate-startup",

    "status": "UP"

    }

    ],

    "status": "UP"

    }

    Listing 10-6

    shows the returned data for the startup health probe

    ```'
