- fmt: '# Exception Mappers


    Exception mapping is a Jakarta REST construct for mapping exceptions to client
    responses. Business exceptions are a way to signal to the client that there is
    a problem with the normal execution of the application. The way to convey exception
    messages to clients is through the use of exception mappers. When a POST request
    was made in Listing [6-10](#531256_1_En_6_Chapter.xhtml#PC10) to create a user,
    the server responded with HTTP status code 400 telling the client that the request
    was bad. This message is not very helpful. A much better experience would be to
    tell the client exactly what is wrong with the data being passed. This can be
    achieved through the use of exception mappers.


    An exception mapper is an implementation of the `jakarta.ws.rs.ext.ExceptionMapper`
    interface. This interface takes a `Throwable` type and maps it to a `Response`
    object in the `toResponse` method. Listing [6-23](#531256_1_En_6_Chapter.xhtml#PC23)
    shows an exception mapper for returning validation constraint violation messages
    to the client.


    ```

    @Provider

    public class ConstraintViolationExceptionMapper implements ExceptionMapper {

    @Override

    public Response toResponse(ConstraintViolationException exception) {

    StringBuilder builder = new StringBuilder();

    for (ConstraintViolation cv : exception.getConstraintViolations()) {

    String path = cv.getPropertyPath().toString().split("\\.")[2];

    builder.append(path).append(" - ")

    .append(cv.getMessage()).append("\n");

    }

    return  Response.status(Response.Status.BAD_REQUEST)

    .entity(builder.toString())

    .build();

    }

    }

    Listing 6-23

    Exception mapper

    ```


    The `ConstraintViolationExceptionMapper` maps the `jakarta.validation.ConstraintViolationException`
    exception to a `Response` object. When a constraint violation occurs, the `ConstraintViolationException`
    is thrown, with a set of the constraints that occurred. Each constraint object
    has the name of the field on which the violation occurred. The `toResponse` method
    maps these to a string and sets that as the entity on the `Response`. The `@jakarta.ws.rs.ext.Provider`
    annotation on the class registers it as a Jakarta REST artifact that will be scanned
    and registered automatically by the runtime. Listing [6-24](#531256_1_En_6_Chapter.xhtml#PC24)
    shows the response from a call with malformed data to the `createUser` resource
    method.


    ```

    HTTP/1.1 400 Bad Request

    Content-Type: application/json

    Content-Language: en-US

    Content-Length: 55

    Connection: Close

    Date: Sat, 27 Aug 2022 00:46:22 GMT

    lastName - must not be empty

    email - must not be empty

    Listing 6-24

    Mapped response

    ```


    The request omitted the `email` and `lastName` fields of the `CreateUserRequest`
    object. This caused a validation exception to take place, and the `ConstraintViolationException`
    was mapped to the client through the exception mapper that we registered. The
    response body shows each violated field and the corresponding helper message.


    # The Jakarta REST Client


    Jakarta REST comes with an HTTP client for making REST calls. This client is a
    very simple and straightforward construct that revolves around the `jakarta.ws.rs.client.WebTarget`
    interface. The `WebTarget` targets a resource by its URI. A `WebTarget` is obtained
    by calling the static `target` method on the `jakarta.ws.rs.client.Client` instance
    returned by the `jakarta.ws.rs.client.ClientBuilder` class. Listing [6-25](#531256_1_En_6_Chapter.xhtml#PC25)
    shows the construction of a `Client` and using it to target a resource to obtain
    a `WebTarget` in the test class of the account module.


    ```

    public class AbstractAccountIT {

    protected static final WebTarget target;

    protected static final Client client;

    static {

    client = ClientBuilder.newClient();

    target = client.target("http://localhost:3003/account/api");

    }

    @AfterAll

    protected static void cleanUp() {

    if (client != null) {

    client.close();

    }

    }

    }

    Listing 6-25

    Obtaining a Client

    ```


    The `ClientBuilder.newClient` method returns a `Client`. Clients are heavy objects,
    and as such, you should not create more than necessary instances. In the preceding
    example, the returned instance is assigned to the static `client` variable. The
    `target` method is then invoked with the full base resource path being targeted
    to return a `WebTarget` instance which is assigned to the `target` variable. The
    instantiation is done in a static block because the `WebTarget` and `Client` instances
    are static. Just this initialization is enough to use the `target` for all calls.


    Once everything is done, the `Client` should be closed to prevent resource leakage.
    According to the API, "Clients are heavy-weight objects that manage the client-side
    communication infrastructure. Initialization as well as disposal of a `Client`
    instance may be a rather expensive operation." As such, we close the `Client`
    instance after all the tests are run in the `cleanUp` method annotated with `@AfterAll`
    from the JUnit test suite.


    With the `WebTarget` initialized, HTTP REST calls can be made by specifying the
    relative path of the resource of interest. Listing [6-26](#531256_1_En_6_Chapter.xhtml#PC26)
    shows making both POST and GET requests to the `/users` and `/users/{userId}`
    resource paths, respectively.


    ```

    @Test

    void createUser() {

    UserResponse createdUser = target.path("users")

    .request().post(Entity.json(createUserRequest), UserResponse.class);

    assertEquals("0", createdUser.getResponse().getResponseCode());

    assertEquals("OK", createdUser.getResponse().getResponseMessage());

    // get created user

    UserResponse userResponse = target.path("users/{userId}")

    .resolveTemplate("userId", createdUser.getData().getUserId()).request()

    .get(UserResponse.class);

    assertEquals("0", userResponse.getResponse().getResponseCode());

    assertEquals("OK", userResponse.getResponse().getResponseMessage());

    }

    Listing 6-26

    Making calls with the client

    ```


    The `path` method on the `WebTarget` returns another `WebTarget` instance that
    resolves to the original path passed to the `client.target` invocation in Listing
    [6-25](#531256_1_En_6_Chapter.xhtml#PC25) and this new path. So the `target.path("users")`
    call in Listing [6-26](#531256_1_En_6_Chapter.xhtml#PC26) resolves the returned
    `WebTarget` to `http://localhost:3003/account/api/users`. The `request` method
    is then called on the implicitly returned `WebTarget` instance to return a `jakarta.ws.rs.client.SyncInvoker`
    instance. This interface has all the HTTP methods that can be invoked to make
    the actual request.


    The `post` method invoked in Listing [6-26](#531256_1_En_6_Chapter.xhtml#PC26)
    passes in an instance of the `CreateUserRequest`. This instance is transformed
    to JSON using the static `json` method on the `jakarta.ws.rs.client.Entity` class.
    The second parameter passed to the `post` method is the class type to which the
    returned response should be transformed. As per the resource paths shown in Table
    [6-1](#531256_1_En_6_Chapter.xhtml#Tab1), a POST request to the `/api/users` resource
    returns the created user. The `post` invocation response is directly assigned
    to a `UserResponse` variable because the runtime will automatically read and convert
    the returned entity from JSON to the concrete Java type for us.


    The second call is a GET call to the `/api/users/{userId}` endpoint. This endpoint
    takes a path parameter. The `path` method is passed the raw path with the variable
    name which is then resolved to the ID of the user with the `resolveTemplate` method.
    This method takes the name of the variable to resolve and the value to resolve
    to. The `get` method is then invoked to make the HTTP GET request. The returned
    response is directly assigned to a Java type because the `get` method was passed
    a class type to which the body of the response should be converted.


    The Jakarta REST client is a feature-rich API for making all forms of HTTP calls
    to web resources. You can chain paths and resolve variables to create complex
    resource paths. You can also get the raw `jakarta.ws.rs.core.Response` object
    returned by a call for use in your code.'
