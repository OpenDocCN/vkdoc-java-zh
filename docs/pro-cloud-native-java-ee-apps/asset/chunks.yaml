- fmt: '### Refactor API Package Name, Transfer and Update Specification Documents


    This stage of the transfer process entailed renaming all the API packages to `jakarta.*`
    namespace. For example, the Entity Manager in Jakarta Persistence moves from `javax.persistence.EntityManager`
    to `jakarta.persistence.EntityManager`. The resulting release from this step was
    Jakarta EE 9,^([^(15)](#fn15)) followed five months later by Jakarta EE 9.1. This
    release was almost identical with the previous version, 8, the notable exception
    being the change in package names and baseline support for Java 11.


    Given the wide use of Java 8 in most production systems, the APIs were still compilable
    with JDK 8, but implementations were required to pass the TCK running JDK 11.
    Some specifications that were moved from Java EE to Java SE and were again removed
    in JDK 11 were added back, some as mandatory, others as optional specs. For example,
    Jakarta Activation and Jakarta XML Binding were added as mandatory and optional
    specs, respectively. Eclipse GlassFish version 6 was also released as the first
    compatible implementation for Jakarta EE 9.


    Also, in this step of the transfer process, the code of the specification docs
    were transferred, marking the final remaining artifact to be transferred to the
    Eclipse Foundation and signaling the completion of the transfer process. This
    final step, and its culmination in the release of Jakarta EE 9, was aimed mostly
    at the tooling ecosystem, to have them ready, updated, and extended to support
    the new platform. For you as a developer, Jakarta EE 9 is identical to Jakarta
    and Java EE 8. Upgrading from the previous versions of the platform to Jakarta
    EE 9, though, will result in nontrivial refactoring of your code because of the
    package change. Thankfully, there are tools^([^(16)](#fn16)) that can automate
    that migration for you, making it as smooth and easy as possible.


    ## Jakarta EE 10 and Beyond


    On August 24, 2021, the Jakarta EE Specification Committee^([^(17)](#fn17)) approved
    the Jakarta EE 10 Release Plan ^([^(18)](#fn18)) through an official ballot. This
    plan had been created, discussed, reviewed, and amended by the Jakarta EE Community
    between June and August of the same year. The Release Plan outlines the details
    of the release timeline, scope, deliverables, and individual specification expectations.
    The expected release date for version 10 is the second quarter of 2022.


    Jakarta EE 10 is expected to continue the evolution of the platform into a cloud-native
    platform for modern enterprise application development. One of the notable features
    of this release will be support for Java 17, the current LTS of the base Java
    SE platform. Even though Java 11 is the minimum required version, compatible implementations
    will be required to pass the TCK executed with Java 17.


    This will significantly make it easy for enterprises to adopt the latest JDK and
    thus benefit from the faster iteration of features on the Java Platform overall.
    You as a developer will also be able to use new features in application development
    without having to worry about compatibility with your chosen Jakarta EE–compatible
    implementation.


    Another possible notable highlight of this release will be the introduction of
    the Jakarta Core Profile. Jakarta EE (and Java EE before it) has always had “profiles,”
    where a subset of the specifications that make up the full platform are grouped
    together to serve a narrow, common development purpose. These profiles are as
    follows:


    *   **Web** – This profile contains a subset of the platform APIs and technologies
    geared toward the development of mostly web applications like Jakarta Faces. This
    profile is for developers who do not desire the full set of APIs available on
    the platform. You only need a servlet container like Apache Tomcat to run this
    profile.


    *   **Full** – This profile contains the entire gamut of APIs and technologies
    available on the platform. It is geared toward developers in enterprise settings
    that develop multitier applications. A fully compatible implementation of the
    platform like WildFly^([^(19)](#fn19)) is needed to run this profile.


    Jakarta EE 10 aims to possibly release the core profile alongside the existing
    two. What is the core profile? It is another subset of the platform APIs that
    contains “core” APIs aimed at developing modern, cloud-native, microservices applications
    to be deployed through container platforms like docker to cloud application orchestration
    platforms like Kubernetes. The list of APIs expected to be part of the core profile
    are:


    *   Jakarta EE Core Profile

    *   Jakarta Annotations

    *   Jakarta Contexts and Dependency Injection Lite

    *   Jakarta Dependency Injection

    *   Jakarta Expression Language

    *   Jakarta Interceptors

    *   Jakarta JSON Binding

    *   Jakarta JSON Processing

    *   Jakarta RESTful Web Services


    These APIs, when paired with the Eclipse MicroProfile^([^(20)](#fn20)) project,
    form the basis for developing cloud-native enterprise Java applications. This
    profile, however, is still tentative for Jakarta EE 10 and will only be included
    if the release plan^([^(21)](#fn21)) of the core profile specification gets approved
    in time.'
