    如清单[3-30](#531256_1_En_3_Chapter.xhtml#PC30)所示，`Wallet`类继承了`AbstractEntity`。在使用JPA建模实体时，您会发现大多数实体中都有非常通用的字段。将这些通用字段抽象到一个超类中是一个好做法，所有需要这些通用字段的子类都将继承该超类。Jakarta
    Persistence API为您提供了不同的方式来建模这种父子继承关系。在此示例中，如清单[3-31](#531256_1_En_3_Chapter.xhtml#PC31)所示，`AbstractEntity`本身不会有任何数据库表。`AbstractEntity`中的所有字段都将放入继承它的子类中。我们选择了“每个继承层次结构一张表”的策略。


