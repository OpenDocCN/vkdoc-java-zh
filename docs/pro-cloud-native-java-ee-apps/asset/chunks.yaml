  raw: 'Line 1 uses the @Stateless annotation from the Enterprise JavaBeans (EJB)
    API to declare class WalletService as a stateless bean. This singular annotation
    transforms this class into a pooled, transactional, and secure bean that is fully
    managed on our behalf by the EJB runtime. By being transactional, every method
    that is invoked on WalletService will be called in a transactional context, meaning
    the EJB runtime will create and commit transactions for each call. Chapter [5](#531256_1_En_5_Chapter.xhtml)
    goes into detail about using the EJB API in connection with JPA.


    WalletService also declares dependencies on WalletRepository, TransactionRepository,
    and RateService. All these dependencies are declared using the @Inject annotation
    , delegating the creation, injection, and destruction of these dependencies to
    the Contexts and Dependency Injection runtime (much more on this in Chapter [4](#531256_1_En_4_Chapter.xhtml)).


    WalletService declares a method createWallet that takes a CreateWalletRequest
    type as the parameter. The method then does some basic initialization of the Wallet.java
    type and then delegates the rest of the work to the WalletRepository. The Wallet.java
    is the entity^([^(77)](#fn77)) being used to represent a wallet or bank account.
    In the Jakarta Persistence API, database tables are modelled as Java classes,
    with instances of those Java classes mapped to database table records.


    The Wallet entity, as shown in Listing [3-30](#531256_1_En_3_Chapter.xhtml#PC30),
    is a simple Java class that is declaratively marked as an entity using the @Entity
    annotation from the JPA API.


    ```

    @Entity

    public class Wallet extends AbstractEntity {

    private Long userId;

    private String currency;

    private BigDecimal balance;

    @OneToMany(mappedBy = "wallet")

    private Set transactions;

    // Getters & Setters

    }

    Listing 3-30

    Wallet entity class

    ```


    Line 1 uses the @Entity annotation to declare this class a JPA entity. What this
    translates to is that a database table will be created with the name Wallet, and
    each field of the Java class mapped to columns in the created table. The Wallet
    entity has four fields; three of them are simple types and one a collection type.
    The simple types (Long, String, and BigDecimal) will be mapped directly to columns
    in the Wallet database table. The java.util.Set collection type declared in the
    field transactions is going to be mapped specially based on the declarative relationship
    between the Wallet type and the Transaction type. In this case, one wallet instance
    can have many transactions.


    The Wallet class, as shown in Listing [3-30](#531256_1_En_3_Chapter.xhtml#PC30),
    extends the AbstractEntity . When using JPA to model entities, you will find yourself
    having very common fields across most of the entities. It is good practice to
    abstract these common fields into a superclass that will be inherited by all subclasses
    that need these common fields. The Jakarta Persistence API gives you different
    ways of modelling this parent-child inheritance relationship. In this example,
    the AbstractEntity, as shown in Listing [3-31](#531256_1_En_3_Chapter.xhtml#PC31),
    will not have any database table of its own. All the fields in the AbstractEntity
    will be put in inheriting subclasses. We are opting for the “single table per
    inheritance” strategy .


    ```

    @MappedSuperclass

    @EntityListeners({ AbstractEntityEntityListener.class })

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    // Getters & Setters

    }

    Listing 3-31

    AbstractEntity class

    ```


    AbstractEntity is declared as an abstract class that is serializable. It is declared
    as a `@MappedSuperclass` to tell the JPA runtime that we want the mapping information
    of this class applied to its subclasses. JPA will not create a separate database
    table for this class. All the fields declared in it will be mapped to inheriting
    subclasses.


    Line 4 uses the `@Id` annotation to declare the field id of type Long as the unique
    table identifier or primary key^([^(78)](#fn78)) for this class. Line 5 uses the
    `@GeneratedValue` to tell the runtime how this unique field should be generated.
    In our example, we are opting to let the JPA runtime handle the automatic creation
    of the primary key. Because the Wallet entity inherits from the AbstractEntity
    , all these are automatically and transparently mapped to the Wallet table as
    shown in Figure [3-9](#531256_1_En_3_Chapter.xhtml#Fig9).


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig9_HTML.png)


    A screenshot depicts the wallet database table, which includes id, balance, created,
    created by, currency, edited by, updated, and user id.


    Figure 3-9


    Wallet database table


    The Wallet database table shown in Figure [3-9](#531256_1_En_3_Chapter.xhtml#Fig9)
    is mapped from the Wallet entity. The id, created, createdBy, editedBy, and updated
    fields correspond to the respective fields in the AbstractEntity class. These
    fields were created because of the Wallet entity inheriting the AbstractEntity.
    In the database, there is no separate table for the AbstractEntity.


    The WalletRepository implements the repository pattern^([^(79)](#fn79)) for managing
    instances of the Wallet entity as shown in Listing [3-32](#531256_1_En_3_Chapter.xhtml#PC32).


    ```

    @RequestScoped

    public class WalletRepository extends BaseRepository {

    public WalletRepository() {

    super(Wallet.class);

    }

    @Override

    public Wallet findById(final Long id) {

    final Wallet wallet = super.findById(id);

    if (wallet == null) {

    throw new WalletNotFoundException();

    }

    return wallet;

    }

    }

    Listing 3-32

    WalletRepository class

    ```


    It extends the BaseRepository , passing in the entity and primary key types. The
    BaseRepository has common methods that correspond to the create, read, update,
    and delete operations common to all database tables. The only method that WalletRepository
    overrides is the findById method. The save method that was called on the WalletRepository
    in the WalletService is simply inherited from the BaseRepository, as shown in
    Listing [3-33](#531256_1_En_3_Chapter.xhtml#PC33).


    ```

    public abstract class BaseRepository {

    @PersistenceContext

    EntityManager em;

    Class clazz;

    public BaseRepository() {}

    public BaseRepository(Class clazz) {

    this.clazz = clazz;

    }

    public E findById(K id) {

    return em.find(clazz, id);

    }

    List findAll(String querName) {

    return em.createNamedQuery(querName, clazz).getResultList();

    }

    public E save(E entity) {

    em.persist(entity);

    return entity;

    }

    public E merge(E entity) {

    return em.merge(entity);

    }

    public E refresh(E entity) {

    em.refresh(entity);

    return entity;

    }

    public void remove(E entity) {

    E mergedEntity = merge(entity);

    em.remove(mergedEntity);

    }

    }

    Listing 3-33

    BaseRepository class

    ```


    The BaseRepository, as shown in Listing [3-33](#531256_1_En_3_Chapter.xhtml#PC33),
    uses Java generics^([^(80)](#fn80)) to create flexible, generified CRUD^([^(81)](#fn81))
    methods. The BaseRepository itself also depends upon the EntityManager^([^(82)](#fn82))
    interface to interact with the JPA runtime. The EntityManager is injected into
    the BaseRepository on line 4 using the `@PersistenceContext` ^([^(83)](#fn83))
    annotation . This annotation tells the JPA runtime that we need an instance of
    the EntityManager injected into the annotated field for us. It also tells the
    runtime to manage the injected instance for us. With this injection, we can then
    call various methods on the EntityManager interface to carry out operations on
    our entities. Chapter [5](#531256_1_En_5_Chapter.xhtml) will go into in-depth
    detail about the EntityManager.'
  trans: '

    第 1 行使用企业 JavaBean（EJB）API 中的`@Stateless`注解将`WalletService`类声明为无状态 Bean。这一单一注解将该类转换为一个由
    EJB 运行时完全管理的池化、事务性且安全的 Bean。由于具有事务性，对`WalletService`调用的每个方法都将在事务上下文中执行，这意味着 EJB
    运行时将为每次调用创建并提交事务。第 5 章将详细介绍如何结合 JPA 使用 EJB API。


    `WalletService`还声明了对`WalletRepository`、`TransactionRepository`和`RateService`的依赖。所有这些依赖都使用`@Inject`注解声明，将这些依赖的创建、注入和销毁委托给上下文和依赖注入运行时（更多内容请参见第
    4 章）。


    `WalletService`声明了一个`createWallet`方法，该方法接受`CreateWalletRequest`类型作为参数。该方法随后对`Wallet.java`类型进行一些基本初始化，并将剩余工作委托给`WalletRepository`。`Wallet.java`是用于表示钱包或银行账户的实体^(⁷⁷)。在
    Jakarta Persistence API 中，数据库表被建模为 Java 类，这些 Java 类的实例则映射到数据库表记录。


    如清单 3-30 所示，`Wallet`实体是一个简单的 Java 类，通过 JPA API 中的`@Entity`注解声明性地标记为实体。


    ```

    @Entity

    public class Wallet extends AbstractEntity {

    private Long userId;

    private String currency;

    private BigDecimal balance;

    @OneToMany(mappedBy = "wallet")

    private Set transactions;

    // Getters & Setters

    }

    清单 3-30

    Wallet 实体类

    ```


    第 1 行使用`@Entity`注解将该类声明为 JPA 实体。这意味着将创建一个名为`Wallet`的数据库表，并且 Java 类的每个字段都将映射到所创建表中的列。`Wallet`实体有四个字段：其中三个是简单类型，一个是集合类型。简单类型（`Long`、`String`和`BigDecimal`）将直接映射到`Wallet`数据库表中的列。在`transactions`字段中声明的`java.util.Set`集合类型将根据`Wallet`类型与`Transaction`类型之间的声明性关系进行特殊映射。在这种情况下，一个钱包实例可以拥有多个交易记录。


    如清单 3-30 所示，`Wallet`类继承了`AbstractEntity`。在使用 JPA 建模实体时，您会发现大多数实体中都有非常通用的字段。将这些通用字段抽象到一个超类中，并由需要这些通用字段的所有子类继承，是一种良好的实践。Jakarta
    Persistence API 为您提供了多种建模这种父子继承关系的方式。在此示例中，如清单 3-31 所示，`AbstractEntity`本身不会有任何数据库表。`AbstractEntity`中的所有字段都将放入继承它的子类中。我们选择了“每个继承层次一张表”的策略。


    ```

    @MappedSuperclass

    @EntityListeners({ AbstractEntityEntityListener.class })

    public abstract class AbstractEntity implements Serializable {

    @Id

    @GeneratedValue(strategy = GenerationType.AUTO)

    protected long id;

    protected LocalDateTime created;

    protected LocalDateTime updated;

    protected String createdBy;

    protected String editedBy;

    // Getters & Setters

    }

    清单 3-31

    AbstractEntity 类

    ```


    `AbstractEntity`被声明为一个可序列化的抽象类。它被声明为`@MappedSuperclass`，以告知 JPA 运行时我们希望将该类的映射信息应用于其子类。JPA
    不会为此类创建单独的数据库表。其中声明的所有字段都将映射到继承它的子类中。


    第 4 行使用`@Id`注解将`Long`类型的`id`字段声明为该类的唯一表标识符或主键^(⁷⁸)。第 5 行使用`@GeneratedValue`来告知运行时如何生成这个唯一字段。在我们的示例中，我们选择让
    JPA 运行时处理主键的自动创建。由于`Wallet`实体继承了`AbstractEntity`，所有这些字段都会自动且透明地映射到`Wallet`表中，如图
    3-9 所示。


    ![](img/531256_1_En_3_Fig9_HTML.png)


    一张截图展示了钱包数据库表，其中包含 id、balance、created、created by、currency、edited by、updated 和
    user id 字段。


    图 3-9

    Wallet 数据库表


    图 3-9 所示的`Wallet`数据库表是从`Wallet`实体映射而来的。`id`、`created`、`createdBy`、`editedBy`和`updated`字段对应于`AbstractEntity`类中的相应字段。这些字段之所以存在，是因为`Wallet`实体继承了`AbstractEntity`。在数据库中，没有为`AbstractEntity`单独创建表。


    `WalletRepository`实现了用于管理`Wallet`实体实例的仓储模式^(⁷⁹)，如清单 3-32 所示。


    ```

    @RequestScoped

    public class WalletRepository extends BaseRepository {

    public WalletRepository() {

    super(Wallet.class);

    }

    @Override

    public Wallet findById(final Long id) {

    final Wallet wallet = super.findById(id);

    if (wallet == null) {

    throw new WalletNotFoundException();

    }

    return wallet;

    }

    }

    清单 3-32

    WalletRepository 类

    ```


    它继承了`BaseRepository`，并传入了实体和主键类型。`BaseRepository`包含与所有数据库表通用的创建、读取、更新和删除操作相对应的方法。`WalletRepository`唯一重写的方法是`findById`。在`WalletService`中对`WalletRepository`调用的`save`方法只是从`BaseRepository`继承而来的，如清单
    3-33 所示。


    ```

    public abstract class BaseRepository {

    @PersistenceContext

    EntityManager em;

    Class clazz;

    public BaseRepository() {}

    public BaseRepository(Class clazz) {

    this.clazz = clazz;

    }

    public E findById(K id) {

    return em.find(clazz, id);

    }

    List findAll(String querName) {

    return em.createNamedQuery(querName, clazz).getResultList();

    }

    public E save(E entity) {

    em.persist(entity);

    return entity;

    }

    public E merge(E entity) {

    return em.merge(entity);

    }

    public E refresh(E entity) {

    em.refresh(entity);

    return entity;

    }

    public void remove(E entity) {

    E mergedEntity = merge(entity);

    em.remove(mergedEntity);

    }

    }

    清单 3-33

    BaseRepository 类

    ```


    如清单 3-33 所示，`BaseRepository`使用 Java 泛型^(⁸⁰)来创建灵活、泛化的 CRUD^(⁸¹)方法。`BaseRepository`本身也依赖于`EntityManager`^(⁸²)接口来与
    JPA 运行时交互。`EntityManager`在第 4 行通过`@PersistenceContext`^(⁸³)注解注入到`BaseRepository`中。该注解告知
    JPA 运行时，我们需要将一个`EntityManager`实例注入到带注解的字段中。它还告知运行时为我们管理注入的实例。通过这种注入，我们可以调用`EntityManager`接口上的各种方法来对我们的实体执行操作。第
    5 章将深入详细介绍`EntityManager`。

