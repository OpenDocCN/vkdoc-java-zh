    MicroProfile Metrics API暴露了基础、供应商、应用程序和其他自定义指标，这些指标可以被消费并显示以供观察。例如，Grafana指标浏览器显示了Eclipse
    MicroProfile为我们的应用程序生成的部分指标列表，如图[3-7](#531256_1_En_3_Chapter.xhtml#Fig7)所示。


