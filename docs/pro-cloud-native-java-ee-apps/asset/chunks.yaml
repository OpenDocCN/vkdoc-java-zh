- fmt: '### Using Histogram Metric


    One metric that does not have an annotation equivalent is the histogram. This
    is a complex metric that measures the min, max, mean, standard deviation, and
    quartiles like the median or 95th percentile. To use this metric, we can inject
    it as shown in Listing [9-13](#531256_1_En_9_Chapter.xhtml#PC13) in the `RateService`
    bean.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @Metric(name = "count_conversions_histogram",

    absolute = true,

    description = "A histogram for the count of conversions",

    tags = { "count=histogram", "metric=histogram" })

    Histogram histogram;

    @Gauge(name = "convert_currency_gauge_count", unit = MetricUnits.NONE, absolute
    = true)

    public int countConversions() {

    int conversionCount = ThreadLocalRandom.current().nextInt(250, 500 + 1);

    histogram.update(conversionCount);

    return conversionCount;

    }

    }

    Listing 9-13

    shows the use of a histogram metric through injection

    ```


    Listing [9-13](#531256_1_En_9_Chapter.xhtml#PC13) shows the use of `@Inject` in
    combination with `@Metric` to inject the `Histogram` metric. This metric takes
    a `long` or `int` for its `update` methods to update the internal data. The `@Metric`
    annotation is used to pass in the name, description, and absolute metadata values
    to the metric. Within the `countConversions` method, the returned count is passed
    to the `update` method for the computation. With the name set to absolute, the
    metric can be queried from the path `/metrics/application/count_conversions_histogram`.
    Listing [9-14](#531256_1_En_9_Chapter.xhtml#PC14) shows the sample returned data
    for the invocation.


    ```

