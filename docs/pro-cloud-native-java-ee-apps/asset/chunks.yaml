- fmt: '# Token-Based Authentication


    RESTful web services are stateless by nature. This means every request is independent
    of the previous request. The server will need to be given the same security-related
    information with each request. The most efficient way to achieve this form of
    stateless security is through the use of tokens. A token is a long string that
    can be verified to ascertain the veracity of the claim of a calling client. It
    allows systems to authenticate, authorize, and verify the identity of a client.
    Token-based security does not rely on the HTTP session, making it much more scalable,
    performant, and reliable.


    The token is mostly added to the request header. This will then be grabbed by
    the service and validated, introspective to extract information about the calling
    client and then create a security context that can then be propagated to all parts
    of the protected service. The MicroProfile JWT API is a token-based authentication,
    authorization, and role-based access control (RBAC) mechanism that can be used
    for token-based application security. JSON Web Token or JWT is a token-based standard^([^(116)](#fn116))
    that has emerged as the most popular standard for creating lightweight security
    tokens.


    A JWT token is usually signed so the service can verify the token. The information
    contained in a token is called claims. The claims can also be encrypted so they
    are not passed as plain text in the header. A typical JWT is made up of the header,
    the claims (or body), and the signature.


    ## The Header


    The JWT section of a JWT typically contains the type of algorithm used to sign
    the JWT (`RS256`, `ES256`, `HS256`, etc.), the type of the token (e.g., `JWT`),
    the key ID, and other metadata depending on the issuer of the token. Signing the
    JWT only enables receiving service to verify that the information has not been
    tampered with. It does not make the token unreadable. For that, a token will need
    to be encrypted, in addition to the signing.


    ## The Claims (or Body)


    The claims or body of the JWT is all the information that the client would like
    to pass to the server. A lot of the time, the body contains the roles that a given
    client is assigned. Roles determine the extent to which a client can carry out
    different operations in an application.


    ## The Signature


    The signature is optional by highly recommended information that allows the service
    to verify that the token has not changed or been tampered with along the way.


    A JWT is a base64 encoded string of the header, claims, and signature information.
    Listing [11-1](#531256_1_En_11_Chapter.xhtml#PC1) shows a sample JWT token.


    ```

    eyJhbGciOiJSUzI1NiIsInR5cCIgOiAiSldUIiwia2lkIiA6ICJEMkdxYmxJU3YzY1Jpdmh2ZFR0YmpaVDg2VkFGeUFpT29wZGlvZHYtQllJIn0..lG6zEr-BEMQwyEUswIgCM5InWAH4ljAu8JK6Zc0naHD8kcaGAssxsXHzf315n--cysYJzeAQBfDmzsJr_Roe0io2nN4CZ61T6Vz4YnE_5_RRn9n6cl2rG_1oIsLknqKVseNQ4itZZjKfIGVUYxURxKmO6gsCH8FCHN1hu7rmq4jwPC0aO7Ypvjg2IpExsIociprXk7_1iyfllZ4XnlHYBADOpkNOduJgMyojQwBgTz-xa-9sBb-eoKys1gBD3nbV8STNbKAGzOUiQaq28T4x3pIn6JNfw2JbBu6_cxKXhzghoPukboLhn2C_MYJt4OiycxuprsbDRKoxAIjus_9yoA

