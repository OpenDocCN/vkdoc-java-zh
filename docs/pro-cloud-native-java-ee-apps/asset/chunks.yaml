    ### Jakarta EE 中的集成测试


    与单元测试不同，集成测试需要不同的组件之间相互通信。这要求在测试上下文中有一个正在运行的应用程序实例。Jakarta EE 集成测试，根据应用程序的不同，需要调用应用程序的一个入口点，该入口点随后会调用所有相关的组成单元。这个入口点通常是一个
    REST 端点。


    在 Jakarta EE 中，在测试上下文中部署一个正在运行的应用程序一直有些繁琐。像 Arquillian 这样的框架在这方面提供了帮助。但即便如此，设置起来也很困难，并且需要为各种兼容的运行时环境进行大量的底层配置。随着越来越多的应用程序被设计为优先考虑云原生，容器的使用意味着只要特定环境支持容器，就可以在不同的上下文中复制该环境。


    TestContainers 是一个用于在测试环境中将应用程序作为 Docker 容器进行部署的库。由于 jwallet 被打包为 Docker 容器，因此为集成测试生成一个运行中的实例只需要一个
    `docker-compose` 文件。TestContainers 库将使用这个 `docker-compose` 文件在测试中创建一个正在运行的应用程序实例。有了正在运行的应用程序实例，我们就可以继续向应用程序发起
    REST 调用。


    使用 TestContainers，测试中运行的应用程序与已部署的应用程序之间没有区别，因为它们都是从相同的 Docker 容器创建的。TestContainers
    为不同的技术栈提供了不同的模块。`DockerComposeContainer` 模块用于从 `docker-compose` 文件运行容器。清单 12-3
    展示了如何设置 `DockerComposeContainer`，以便从钱包模块的 `docker-compose` 文件创建容器。


    ```

    try (DockerComposeContainer composeContainer = new DockerComposeContainer(new
    File("docker-compose.yaml")).withExposedService("wallet", 3001)) {

    composeContainer.start();

    walletServiceUrl = String.format(walletServiceUrlTemplate,

    composeContainer.getServiceHost("wallet", 3001),

    composeContainer.getServicePort("wallet", 3001));

    client = ClientBuilder.newClient();

    target = client.target(walletServiceUrl);

    }

    清单 12-3

    DockerComposeContainer

    ```


    `DockerComposeContainer` 在一个 `try-with-resources` 块中被实例化，以便它可以被自动关闭（它是 `AutoClosable`
    的）。它接收 `docker-compose` 文件、要暴露的服务以及端口。在实例上调用 `start` 方法。调用 `getServiceHost` 和
    `getServicePort` 方法来获取在运行容器中创建的服务的 host 和 port。然后将这些信息传递给 Jakarta REST Client
    对象的 `target` 方法。通过这样的设置，我们就拥有了一个完整的钱包模块运行实例，可以对其发起 REST 调用，并对响应执行测试断言。清单 12-4
    展示了 `WalletResourceIT` 类中的 `createWallet` JUnit 测试。


    ```

    class WalletResourceIT extends AbstractWalletIT {

    @Test

    void createWallet() {

    CreateWalletRequest createWalletRequest = new CreateWalletRequest();

    createWalletRequest.setCurrency("USD");

    BalanceResponse balanceResponse = target.path("wallets").request()

    .post(Entity.json(createWalletRequest), BalanceResponse.class);

    assertEquals("0", balanceResponse.getResponse().getResponseCode());

    assertEquals("OK", balanceResponse.getResponse().getResponseMessage());

    assertEquals(createWalletRequest.getCurrency(), balanceResponse.getData().getCurrency());

    assertEquals(BigDecimal.ZERO, balanceResponse.getData().getBalance());

    }

    }

    清单 12-4

    createWalletTest

    ```


    `WalletResourceIT` 类继承了 `AbstractWalletIT`，后者包含了 TestContainers 的实例化代码。`createWallet`
    方法是一个 JUnit 测试，它向钱包资源发起一个 REST 调用来创建一个钱包，然后对返回的数据进行一些断言。与单元测试不同，这个测试可能需要一些时间，因为钱包创建过程涉及对数据库的调用。仅用几行代码，我们就拥有了一个完全容器化的应用程序运行时环境，可以从中发起调用来创建集成测试。我们强烈建议你在
    Jakarta EE 测试中了解一下 TestContainers。


    ## 总结


    本章从软件应用程序测试的理论开始，然后探讨了如何为 Jakarta EE 应用程序创建单元测试和集成 JUnit 测试。创建单元测试的过程包括通过模拟其感兴趣的依赖项来隔离待测试的组件。我们研究了如何使用
    TestContainers 创建一个完全容器化的 Jakarta EE 运行时环境来创建集成测试。


    正如本章所述，测试是一项非常依赖领域的活动，需要业务分析来确定使用哪些测试类型的组合，以及测试资源应该集中在何处。本章向你展示了可用于创建两种最流行测试类型（单元测试和集成测试）的最高效、最直接的方法。


