    *清单 9-12 展示`@Timed`度量数据*


    从返回的数据可以看出，相对于`@SimplyTimed`度量指标，`@Timed`度量指标返回了关于方法调用的更详细信息。当您需要轻量级和重量级计时指标时，这两者互为补充。


    ### 注入度量指标


    除了使用注解之外，您还可以直接在应用程序中注入`meter`、`timer`、`counter`和`histogram`类型的度量指标。您可以使用`@Metric`注解结合`@Inject`将度量指标注入到字段、方法和参数中。`@Metric`注解支持各个度量指标所支持的所有元数据，例如`name`、`description`和`absolute`值。'
