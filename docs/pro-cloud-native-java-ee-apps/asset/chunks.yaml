  trans: "\n### 你好，世界！\n\n后续相关章节将详细介绍在 Docker 文件中声明的每个辅助服务。目前，我们已经了解了应用程序的搭建过程，在查看代码之前，让我们先运行传统的\
    \ hello world。由于应用程序被打包并作为 Docker 容器运行，根文件夹中的 `jwallet-cli.sh` 脚本是一个 shell 脚本，支持通过\
    \ Docker Compose 或 Kubernetes 启动和运行应用程序。各种支持的命令可通过 help 命令查看，如清单 3-15 所示。\n\n\
    ```\n~> ./jwallet-cli.sh help\nUsage:\njwallet-cli.sh \nCommands:\nbuild     \
    \  : build docker images\nup-compose : run jwallet on docker-compose\ndown-compose:\
    \ stop jwallet running on docker-compose\nup-kube    : run jwallet on kubernetes\
    \ (using k3d)\ndown-kube   : stop jwallet running on kubernetes (using k3d)\n\
    Listing 3-15\njwallet-cli.sh help command output\n```\n\n对于我们的 hello world，我们首先使用\
    \ build 命令构建镜像和所有内容，然后使用 up-compose 命令。初始构建各种镜像和应用程序工件可能需要一些时间，具体取决于您的网络和计算机速度。之后运行\
    \ up-compose 命令应该能让应用程序启动并运行。为方便参考，`README.md` 文件汇总了访问应用程序各个服务的端点，如清单 3-16 所示。\n\
    \n```\nRunning JWallet\n1\\. Docker compose\nRequires\n- docker-compose\nStart\
    \ / Stop\n- start ./jwallet-cli.sh up-compose\n- stop ./jwallet-cli.sh down-compose\n\
    Access service\n- Wallet module http://localhost:3001/wallet\n- Rate module http://localhost:3002/rate\n\
    - Account module http://localhost:3003/account\n- Jaeger tracing http://localhost:16686\n\
    - Prometheus http://localhost:9090\n- Grafana http://localhost:3000\nListing 3-16\n\
    README.md entry for running and accessing the JWallet service\n```\n\n访问钱包服务上的\
    \ Hello 端点，我们会收到一条消息，表明服务已启动并正在运行，如清单 3-17 所示。对于 rate 和 account 服务也是如此，分别如清单 3-18\
    \ 和 3-19 所示。\n\n```\n~> curl http://localhost:3003/account/api/hello\nHello account\
    \ module\nListing 3-19\nAccessing the account service Hello endpoint\n```\n\n\
    ```\n~> curl http://localhost:3002/rate/api/hello\nHello rate module\nListing\
    \ 3-18\nAccessing the rate service Hello endpoint\n```\n\n```\n~> curl http://localhost:3001/wallet/api/hello\n\
    Hello wallet module\nListing 3-17\nAccessing the wallet service Hello endpoint\n\
    ```\n\n我们还可以通过查询微服务的健康检查端点来检查它们是否已启动并准备就绪。对于钱包微服务，调用 `http://localhost:3001/health`\
    \ 应能返回状态，如清单 3-20 所示。\n\n```\n~> curl http://localhost:3001/health\n{\n\"checks\"\
    : [\n{\n\"data\": {},\n\"name\": \"wallet-liveness\",\n\"status\": \"UP\"\n},\n\
    {\n\"data\": {},\n\"name\": \"wallet-readiness\",\n\"status\": \"UP\"\n}\n],\n\
    \"status\": \"UP\"\n}\nListing 3-20\nAccessing the wallet service health endpoint\n\
    ```\n\n对于 rate 服务，调用 `http://localhost:3002/health` 应能返回其健康状态，如清单 3-21 所示。\n\n\
    ```\n~> curl http://localhost:3002/health\n{\n\"checks\": [\n{\n\"data\": {},\n\
    \"name\": \"rate-liveness\",\n\"status\": \"UP\"\n},\n{\n\"data\": {},\n\"name\"\
    : \"rate-readiness\",\n\"status\": \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing\
    \ 3-21\nAccessing the rate service health endpoint\n```\n\n对于 account 服务，调用 `http://localhost:3003/health`\
    \ 同样应能返回 account 微服务的健康检查状态，如清单 3-22 所示。\n\n```\n~> curl http://localhost:3003/health\n\
    {\n\"checks\": [\n{\n\"data\": {},\n\"name\": \"account-liveness\",\n\"status\"\
    : \"UP\"\n},\n{\n\"data\": {},\n\"name\": \"account-readiness\",\n\"status\":\
    \ \"UP\"\n}\n],\n\"status\": \"UP\"\n}\nListing 3-22\nAccessing the account service\
    \ health endpoint\n```\n\n### 应用程序架构概述\n\n微服务作为一种应用程序开发范式已广为人知并被理解。然而，对于如何实现它，并没有单一的定义。与单体应用（所有应用程序代码作为一个单元开发）形成鲜明对比的是，微服务并不适合这种直接的实现方式。一个微服务应用程序可以由物理上分离的服务组成，即应用程序的每个微服务在其自己的代码库中是一个独立的\
    \ Maven 项目，并且所有服务都通过某种编排工具（如 BPM）进行编排。^(⁷⁴)\n\n另一种方式可以是在一个公共代码库中开发一组独立的服务，每个服务作为项目中的一个模块。在特定应用程序中实现微服务的方式还有其他变体。无论选择哪种实现风格，微服务应用程序通常都应满足前一章讨论的微服务描述。\n"
- fmt: "### JWallet\n\n`JWallet`，本书的参考应用程序，最初是一组在公共项目中开发的微服务，每个服务都是该项目中的一个 Maven 模块。在后续章节中，我们将把应用程序重构为物理上独立的服务，以实现另一种形式的微服务开发。表\
    \ [3-1](#531256_1_En_3_Chapter.xhtml#Tab1) 显示了访问应用程序中各种服务的端点。\n\n**表 3-1** 展示\
    \ `jwallet` 中的端点\n\n| 模块 | URL |\n| --- | --- |\n| Wallet | `http://localhost:3001/wallet`\
    \ |\n| Rate | `http://localhost:3002/rate` |\n| Account | `http://localhost:3003/account`\
    \ |\n| Jaeger | `http://localhost:16686` |\n| Prometheus | `http://localhost:9090`\
    \ |\n| Grafana | `http://localhost:3000` |\n\n如前所述，该应用程序是一个 Maven 多模块应用程序。其主要\
    \ UI 是用于在给定钱包中创建和执行交易的各种端点。REST 端点使用 Jakarta RESTful API (JAX-RS) 开发。应用程序的根入口点是\
    \ `CONTEXT_PATH/api` 端点。每个 JAX-RS 应用程序都必须有一个根入口点，作为该应用程序所有 REST 端点的基本路径。此根 REST\
    \ 端点在核心模块的清单 [3-23](#531256_1_En_3_Chapter.xhtml#PC23) 中声明。\n\n```java\n@ApplicationPath(\"\
    api\")\npublic class JaxrsConfigurations extends Application {\n}\n```\n*清单 3-23\
    \ 根 JAX-RS 入口点*\n\n第 1 行的注解 `@ApplicationPath(\"api\")` 告诉 JAX-RS 运行时，我们希望将此应用程序中的所有\
    \ REST 端点托管在基本路径 \"api\" 下。然后，`JaxrsConfigurations` 类继承自 JAX-RS API 中的 `Application`\
    \ 类。有了这个配置，所有 REST 端点都可以作为 `api` 路径的子路径进行访问。例如，钱包服务的 `hello` 路径是 `http://localhost:3003/wallet/api/hello`。\n\
    \n钱包模块中的 `hello` 资源在 `HelloResource` 类中声明，如清单 [3-24](#531256_1_En_3_Chapter.xhtml#PC24)\
    \ 所示。\n\n```java\n@Path(\"hello\")\npublic class HelloResource {\n    @GET\n \
    \   @SimplyTimed\n    @Traced\n    String hello() {\n        return \"Hello account\
    \ module\";\n    }\n}\n```\n*清单 3-24 Hello 端点*\n\nJAX-RS 资源作为 Java 类托管，资源端点作为该类的方法托管。在前面的\
    \ `HelloResource` 示例中，第 1 行声明此类及其包含的所有资源都托管在 `/hello` 路径下。`@Path` 注解来自 JAX-RS\
    \ API。这意味着我们希望在此类中公开的任何 REST 端点都将作为 `/hello` 路径的子路径进行访问。第 4 行使用 `@GET` 注解将第 6\
    \ 行声明的 `hello` 方法定义为 HTTP GET 方法。由于此方法没有定义其他路径，当访问路径 `/wallet/api/hello` 时，它将是\
    \ JAX-RS 运行时调用的默认 GET 方法。\n\n方法的返回类型是返回给客户端的值。在此示例中，当对 `/hello` 进行 GET 调用时，将返回简单的字符串消息\
    \ \"Hello wallet module\"。JAX-RS 支持返回多种不同类型。由于 `HelloResource` 类没有明确指定其消费和产生的内容类型，运行时默认使用简单类型。我们稍后将看到如何声明给定\
    \ JAX-RS 资源消费和产生的 MIME 类型。\n\n第 5 行还使用来自 Eclipse MicroProfile Metrics API 的 `@SimplyTimed`\
    \ 注解对 `hello` 方法进行了注解。此注解跟踪方法的调用耗时和调用次数。只需用 `@SimplyTimed` 注解 `hello` 方法，MicroProfile\
    \ 运行时就会公开一个用于跟踪此方法调用次数和每次调用持续时间的指标。公开的指标可以被任意数量的应用程序消费。在 `JWallet` 的情况下，我们可以通过捆绑的\
    \ Prometheus（可通过 `http://localhost:9090` 访问）和 Grafana（可通过 `http://localhost:3000`\
    \ 访问）可观测性应用程序查看该指标，如图 [3-2](#531256_1_En_3_Chapter.xhtml#Fig2) 所示。\n\n![JWallet\
    \ Grafana 指标探索的柱状图截图，柱状图从 17 小时 9 分 45 秒开始，到 17 小时 11 分 15 秒结束。](images/531256_1_En_3_Chapter/531256_1_En_3_Fig2_HTML.png)\n\
    *图 3-2 Grafana 指标探索器*\n\n第 6 行还使用来自 Eclipse MicroProfile Metrics API 的 `@Traced`\
    \ 注解对 `hello` 方法进行了注解。此注解跟踪对服务的传入请求以及随后对其他服务的请求。\n\n在我的示例部署中，钱包模块的 `Hello` 资源（可通过\
    \ `http://localhost:3001/wallet` 访问）已被调用了八次，每次调用都列在列表中，如图 [3-3](#531256_1_En_3_Chapter.xhtml#Fig3)\
    \ 所示（可通过 `http://localhost:16686` 访问）。单击其中一个调用将进入跟踪的详细信息页面，如图 [3-4](#531256_1_En_3_Chapter.xhtml#Fig4)\
    \ 所示。\n\n![Jaeger 跟踪的跟踪详细信息截图，包括 jwallet 示例、标签和进程。](images/531256_1_En_3_Chapter/531256_1_En_3_Fig4_HTML.png)\n\
    *图 3-4 Jaeger 跟踪 – 跟踪详细信息*\n\n![Jaeger 跟踪的跟踪列表截图，包含八个跟踪，通过选择结果项比较跟踪，并包含钱包示例。](images/531256_1_En_3_Chapter/531256_1_En_3_Fig3_HTML.png)\n\
    *图 3-3 Jaeger 跟踪 – 跟踪列表*\n\n其中一个跟踪调用的详细列表显示了调用的日期和时间 (1)、被调用资源所在的服务和持续时间 (2)，以及跟踪调用的一些详细信息，包括完整的资源端点\
    \ (3)。所有这些细节都由 MicroProfile Metrics 运行时处理。我们所要做的就是将我们的 `hello` 资源方法声明为 `@Timed`。第\
    \ [6](#531256_1_En_6_Chapter.xhtml) 章将详细介绍 Jakarta RESTful Web Services API。现在，让我们粗略地看一下\
    \ `WalletResource`。\n\n`Wallet` 资源是应用程序的根入口点。它托管了用于创建、借记、贷记和查询钱包的各种方法。其声明如清单 [3-25](#531256_1_En_3_Chapter.xhtml#PC25)\
    \ 所示。\n\n```java\n@Consumes(MediaType.APPLICATION_JSON)\n@Produces(MediaType.APPLICATION_JSON)\n\
    @Path(\"wallets\")\npublic class WalletResource {\n    @Inject\n    WalletService\
    \ walletService;\n    ...\n}\n```\n*清单 3-25 钱包模块端点*\n\n`Wallet` 资源在 `WalletResource.java`\
    \ 类中定义。第 1 行和第 2 行使用 `@Consumes` 和 `@Produces` 注解分别声明此资源类的资源方法可以消费和产生的 MIME 类型。由于\
