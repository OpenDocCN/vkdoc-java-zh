- fmt: "### Timeout\n\n`@Timeout`注解用于设置超时时间，超过该时间后方法执行应被超时或截断。微服务应用通常会相互通信，并对外部服务进行调用。重要的是不要让单个方法执行占用不合理的时间。没有时间限制可能会导致巨大的成本损失。\n\
    \n`@Timeout`注解接受两个参数：`value`和`unit`。`value`指方法应超时的执行时长，默认值为`1000`。`unit`指`java.time.Duration.ChronoUnit`，默认值为`ChronoUnit.MILLIS`。因此，默认情况下，使用`@Timeout`注解的方法如果在执行`1000`毫秒后仍未返回，将会超时。\n\
    \n超时也可以与其他容错结构（如`@Fallback`）一起使用。当一个方法同时被`@Timeout`和`@Fallback`注解时，当方法超时，将调用回退方法以返回回退值。清单[8-4](#531256_1_En_8_Chapter.xhtml#PC4)展示了`RateService`方法`calculateAmount`使用了`@Timeout`注解，并保留了默认的`1000`毫秒超时设置。\n\
    \n```java\n@ApplicationScoped\npublic class RateService {\n    @Inject\n    @RestClient\n\
    \    RateResource rateResource;\n\n    @Fallback(RateCalcFallback.class)\n   \
    \ @Timeout\n    public BigDecimal calculateAmount(final TransactionRequest transactionsRequest,\
    \ final Wallet wallet) {\n        ConvertCurrencyRequest convertCurrencyRequest\
    \ = new ConvertCurrencyRequest();\n        convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());\n\
    \        convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());\n\
    \        convertCurrencyRequest.setAmount(transactionsRequest.getAmount());\n\
    \        ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);\n\
    \        return convertCurrencyResponse.getData().getAmount();\n    }\n}\n```\n\
    \n清单[8-4](#531256_1_En_8_Chapter.xhtml#PC4)展示了`RateService`在`calculateAmount`方法上使用`@Timeout`注解。`@Fallback`和`@Timeout`的存在意味着，如果没有抛出异常，但方法在`1000`毫秒后仍未完成执行，运行时将使其超时，并调用`RateCalcFallback`处理器返回一个默认值。\n\
    \n`@Timeout`注解可以在类级别和方法级别使用。当在类上使用时，该类中的所有方法都将根据类级别注解的配置进行超时。如果某个Bean同时在类级别和方法级别声明了该注解，则方法级别的注解优先于类级别。\n\
    \n### Retry\n\n几乎所有现代应用都需要通过网络进行某种形式的调用。这个调用可能是对同一网络内的另一个服务，也可能是对应用部署网络之外的完全独立的调用。网络故障可能导致调用失败。在这种情况下，最好有一个机制能够自动重试方法调用。\n\
    \n`@Retry`注解用于在操作异常终止时再次调用同一操作。可以自定义触发重试的异常类型，也可以指定应跳过的异常。清单[8-5](#531256_1_En_8_Chapter.xhtml#PC5)展示了`RateService`\
    \ Bean的`calculateAmount`方法使用了`@Retry`注解。\n\n```java\n@ApplicationScoped\npublic\
    \ class RateService {\n    @Inject\n    @RestClient\n    RateResource rateResource;\n\
    \n    @Fallback(RateCalcFallback.class)\n    @Timeout\n    @Retry\n    public\
    \ BigDecimal calculateAmount(TransactionRequest transactionsRequest, Wallet wallet)\
    \ {\n        ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();\n\
    \        convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());\n   \
    \     convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());\n\
    \        convertCurrencyRequest.setAmount(transactionsRequest.getAmount());\n\
    \        ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);\n\
    \        return convertCurrencyResponse.getData().getAmount();\n    }\n}\n```\n\
    \n清单[8-5](#531256_1_En_8_Chapter.xhtml#PC5)展示了`RateService` Bean的`calculateAmount`方法使用了`@Retry`注解。按此配置，如果方法在执行过程中抛出异常，将会被重试。由于它与`@Timeout`注解一起使用，如果方法因超时异常而超时，它也会被重试。默认情况下，最大重试次数为三次。如果三次重试后该方法仍然抛出异常，则将调用`@Fallback`注解中传入的回退处理器。\n\
    \n`@Retry`注解有许多参数，您可以根据特定应用的需求自定义其行为。这些参数如表[8-1](#531256_1_En_8_Chapter.xhtml#Tab1)所示。\n\
    \n**表 8-1** `@Retry`注解的参数\n\n| 参数 | 描述 | 默认值 |\n| --- | --- | --- |\n| `maxRetries`\
    \ | 最大重试次数 | `3` |\n| `delay` | 每次重试之间的延迟 | `0` |\n| `delayUnit` | 延迟单位 | `ChronoUnit.MILLIS`\
    \ |\n| `maxDuration` | 执行重试的最大持续时间 | `180000` |\n| `durationUnit` | `maxDuration`的持续时间单位\
    \ | `ChronoUnit.MILLIS` |\n| `jitter` | 重试延迟的随机变化 | `200` |\n| `jitterDelayUnit`\
    \ | 抖动单位 | `ChronoUnit.MILLIS` |\n| `retryOn` | 指定触发重试的失败类型 | `Exception.class`\
    \ |\n| `abortOn` | 指定应中止重试的失败类型 | `–` |\n\n`jitter`参数用于为重试延迟增加随机性。默认的`jitter`值为`200`，这意味着每次重试之间的有效延迟将是`[delay\
    \ - jitter, delay + jitter]`。在默认`delay`值为`0`的情况下，有效延迟为`-200`或`200`。然而，负的有效延迟被视为`0`。因此，在没有设置`delay`值的情况下，有效延迟为`200`毫秒。\n\
    \n`maxDuration`设置了整个重试过程的最大持续时间。设置最大持续时间至关重要，以避免陷入无限重试的情况。默认值为`180000`毫秒，这意味着整个重试持续时间将持续该时长，之后将由其他容错注解接管。\n\
    \n`abortOn`参数用于指定当方法抛出某些异常时，该方法将不会被重试。您可以使用此参数指定不应重试的自定义业务异常，例如验证异常。例如，如果方法客户端传入了无效值，并且方法抛出了验证异常，那么不重试该方法会更高效，因为异常的原因是可预见的，并且是业务流程的正常部分。\n\
    \n`@Retry`注解可以在类或方法上使用，如清单[8-5](#531256_1_En_8_Chapter.xhtml#PC5)所示。当在类上使用时，该类中的所有方法都将被重试。当同时在类和方法上使用时，对于该特定方法，方法上的注解优先于类级别的注解。\n\
    \n### Circuit Breaker\n\n断路器充当资源方法的守卫，当满足设定条件时，通过快速失败来防止该方法占用计算机资源。当对某个方法的调用持续失败时，该失败方法可能会占用资源，并在某些情况下将故障级联到应用的其他组件。为了防止此类情况发生，使用断路器模式来守卫方法，并在达到预设的失败阈值时阻止调用到达该方法。断路器始终处于三种状态之一：关闭、打开、半开。"
  raw: '### Timeout


    The @Timeout annotation is used to set a timeout, after which a method execution
    should be timed out or truncated. Microservices applications will generally talk
    to each other, as well as make external calls to other services. It is important
    to not let a single method execution take an unreasonable amount of time to execute.
    No timeboxing could end up costing significant amounts of money.


    The @Timeout annotation takes two parameters, the value and the unit. The value
    refers to the length of execution after which the method should time out. The
    default is 1000\. The unit refers to the java.time.Duration.ChronoUnit. The default
    is ChronoUnit.MILLIS. So by default, annotating a method with @Timeout will cause
    the method to time out after 1000 milliseconds of execution if it has not returned
    yet.


    The timeout can also be used with other fault-tolerant constructs like the @Fallback.
    When a method is annotated both @Timeout and @Fallback, when the method times
    out, the fallback method will be called to return the fallback value. Listing
    [8-4](#531256_1_En_8_Chapter.xhtml#PC4) shows the RateService method calculateAmount
    annotated with the @Timeout annotation, leaving it with the default of timing
    out after 1000 milliseconds.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(RateCalcFallback.class)

    @Timeout

    public BigDecimal calculateAmount(final TransactionRequest transactionsRequest,
    final Wallet wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    }

    Listing 8-4

    shows the RateService using the @Timeout annotation

    ```


    Listing [8-4](#531256_1_En_8_Chapter.xhtml#PC4) shows the RateService using the
    @Timeout annotation on the calculateAmount method . The existence of the @Fallback
    and @Timeout means if no exception is thrown, but the method still does not complete
    execution after 1000 milliseconds, the runtime will time it out and call the RateCalcFallback
    handler to return a default value.


    The @Timeout annotation can be used at the class and method level. When used on
    a class, all methods on the class will time out based on the configuration of
    the annotation at the class level. If a bean declares the annotation at both the
    class and method levels, the annotation at the method level takes precedence over
    that of the class level.


    ### Retry


    Almost all modern applications will need to make some form of call over the network.
    This call could be to another service within the same network or a completely
    separate call outside the network the application is deployed on. A network glitch
    could cause the call to fail. In such cases, it would be good to have a mechanism
    that will automatically retry the method invocation.


    The @Retry annotation is used to invoke the same operation again if that operation
    terminates exceptionally. The types of exceptions that can trigger the retry can
    be customized. So are exceptions that should be skipped. Listing [8-5](#531256_1_En_8_Chapter.xhtml#PC5)
    shows the RateService bean’s calculateAmount method bearing the @Retry annotation.


    ```

    @ApplicationScoped

    public class RateService {

    @Inject

    @RestClient

    RateResource rateResource;

    @Fallback(RateCalcFallback.class)

    @Timeout

    @Retry

    public BigDecimal calculateAmount(TransactionRequest transactionsRequest,  Wallet
    wallet) {

    ConvertCurrencyRequest convertCurrencyRequest = new ConvertCurrencyRequest();

    convertCurrencyRequest.setSourceCurrency(wallet.getCurrency());

    convertCurrencyRequest.setTargetCurrency(transactionsRequest.getCurrency());

    convertCurrencyRequest.setAmount(transactionsRequest.getAmount());

    ConvertCurrencyResponse convertCurrencyResponse = rateResource.convertCurrency(convertCurrencyRequest);

    return convertCurrencyResponse.getData().getAmount();

    }

    }

    Listing 8-5

    showing the use of the @Retry annotation in the RateService bean

    ```


    Listing [8-5](#531256_1_En_8_Chapter.xhtml#PC5) shows the RateService bean’s calculateAmount
    method bearing the @Retry annotation. As is, the method will be retried if an
    exception is thrown during its execution. Because it is used alongside the @Timeout
    annotation, if the method should time out with a timeout exception, it will be
    retried. By default, the maximum number of retries is three. If after the three
    retries the method still throws an exception, then the fallback handler passed
    in the @Fallback annotation will be called.


    The @Retry annotation has a number of parameters that you can pass to customize
    its behavior according to the needs of a given application. These parameters are
    shown in Table [8-1](#531256_1_En_8_Chapter.xhtml#Tab1).


    Table 8-1


    The parameters of the @Retry annotation


    | Parameter | Description | Default Value |

    | --- | --- | --- |

    | maxRetries | The maximum number of retries | 3 |

    | delay | Delays between each retry | 0 |

    | delayUnit | The delay unit | ChronoUnit.MILLIS |

    | maxDuration | Maximum duration to perform the retry for | 180000 |

    | durationUnit | Duration unit for maxDuration | ChronoUnit.MILLIS |

    | jitter | The random vary of retry delays |   |

    | jitterDelayUnit | The jitter unit | ChronoUnit.MILLIS |

    | retryOn | Specify the failures to retry on | Exception.class |

    | abortOn | Specify the failures to abort on | – |


    The jitter parameter is used to add randomness to the retry delay. The default
    jitter value of 200 means that the effective delay between each retry will be
    [delay - jitter, delay + jitter]. With the default delay of 0 value is, we end
    up with -200, or 200 for effective delay. However, a negative effective delay
    is treated as 0\. So in the absence of a value for the delay, the effective delay
    is 200 milliseconds.


    The maxDuration sets the maximum duration of the whole retry process. It is critical
    to have a maximum duration to not end up in an infinite retry situation. The default
    value is 180000 milliseconds, meaning the entire retry duration will last for
    that period after which another of the fault tolerance annotations takes over.


    The abortOn parameter is used to specify exceptions that when thrown in a method,
    the method will not be retried. You can use this to specify custom business exceptions
    like validation exceptions that should not be retried. If a method client, for
    instance, passes an invalid value and a method throws a validation exception,
    it is much more efficient to not retry the method since the cause of the exception
    is anticipated and a normal part of the business process.


    The @Retry annotation can be used on a class or a method as done in Listing [8-5](#531256_1_En_8_Chapter.xhtml#PC5).
    When used on a class, all methods in the class will be retried. When used on a
    class and a method, the annotation on the method takes precedence over the class-level
    annotation for that particular method.


    ### Circuit Breaker


    A circuit breaker acts as a guard over a resource method, preventing the method
    from tying down computer resources by failing fast if a set criteria is met. When
    consistent calls to a method keep failing, the failing method could end up taking
    up resources and in some cases cascading the failure to other components of the
    application. To prevent such occurrences, the circuit breaker pattern is used
    to stand guard on a method and prevent invocations from reaching that method when
    some preset failure threshold is reached. A circuit breaker is always in one of
    three states – closed, open, half-open.'
