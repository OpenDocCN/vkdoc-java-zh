- fmt: '# 1. The Theory of Jakarta EE and MicroProfile


    `Jakarta EE` (formerly `Java EE`) is a set of community-developed, abstract specifications
    that together form a platform for developing end-to-end, multitier enterprise
    applications. `Jakarta EE` is built on the `Java Standard Edition` and aims to
    provide a stable, reliable, and vendor-neutral platform on which to develop cloud-native
    applications.


    This chapter discusses the general theory surrounding the `Java Enterprise Development`
    platform. Enterprise Java–related nomenclature comprises a lot of technical words
    that might not be so clear. This chapter breaks down `Java EE` – now `Jakarta
    EE` – into its theoretical form such that by the end of this chapter, you will
    become familiar with the large number of Enterprise Java–related terminologies.


    ## What Is a Specification?


    `Jakarta EE` is made up of individual specifications, each specification covering
    a specific API, for example, `Jakarta WebSocket`, responsible for providing an
    API for writing applications that support communicating via a `WebSocket` protocol
    on the platform. These individual specifications are grouped into a single “umbrella”
    specification for a given `Jakarta EE` release. For example, the latest release,
    `Jakarta EE 10`,^([¹](#fn1)) is released under umbrella specification 10.


    A specification is a document that outlines the functions of a given set of APIs.
    This document outlines what the expected behavior should be for various scenarios
    and invocations of the given API. The specification itself can be thought of as
    a blueprint for the API. The counterpart to a `Jakarta EE` specification is the
    implementation of that specification. As the specification only states what the
    expectations and functions of an API are, the implementation of that specification
    is what does the job of actualizing those expectations and functions when any
    given API in that specification is invoked by a developer.


    The specifications and their corresponding implementations are generally separated.
    This, for you as a developer, means you can simply code against the “abstract”
    specification (blueprint) and run your code using different implementations. This
    implies the freedom to pick an implementation that suits your needs without having
    to rewrite your code. For implementation vendors, this means more competition
    and, ultimately, better and faster innovations atop the base specifications.


    In the past, the various (`Java EE`) specification releases happened under the
    `Java Community Process` (`JCP`^([²](#fn2))) `Java Specification Request` (`JSR`).
    The `JSR` is a process where any interested person (individual or registered entity)
    submits a document to the project management office of the `JCP`, proposing the
    development of a new or significant revision to an existing specification. The
    entire process, from the proposal of the specification document to the final release
    and a reference implementation, all happened as part of the `JSR`.


    As an umbrella `JSR`, `Java EE` itself had a reference implementation in the form
    of `GlassFish Application Server`. This implementation was the “reference” that
    acted as the base for other umbrella spec implementations. Over the years, a number
    of `Java EE` full implementations have come out, including `WildFly`, `Open Liberty`,
    and `Payara`, among others.


    From version 8 of `Java EE`, the specification process moved from the `JCP` to
    the `Eclipse Foundation` along with the `GlassFish` project. The concept of reference
    implementations also changed to compatible implementations, to better reflect
    the focus on cross-vendor neutrality and compatibility. However, to better understand
    what `Jakarta EE` is and how it came to be, a historical tour of `Java EE` releases
    is needed to get a better understanding of the context and objectives of `Jakarta
    EE` as a platform today and how the release process differs from what it was under
    the `JCP`.


    ## Java EE Release History


    ### Java 2 Platform, Enterprise Edition (J2EE 1.2)


    The first release of the platform was on December 12, 1999, and was called `Java
    2 Enterprise Edition` or `J2EE` for short. It featured the initial specification
    release of the platform, in the form of version 1.2. One of the key features of
    this novel (at the time) platform was the concept of `Enterprise JavaBeans`. The
    `EJB` API was intended to make it easy to encapsulate complex business logic in
    a component that was managed by a specialized runtime. This runtime provided `EJB`
    components with ancillary services like transactions, security, and scalability.


    ### Java 2 Platform, Enterprise Edition (J2EE 1.3)


    The next version of the `Enterprise Java Platform` was 1.3, released on September
    24, 2001. This was contained in the umbrella `JSR 58`. The key features of this
    release were the introduction of new `Java Connector Architecture` (`JCA`) and
    the `Java Message Service` (`JMS`) APIs. The `EJB` API also saw improvements.


    ### Java 2 Platform, Enterprise Edition (J2EE 1.4)


    The next version of the platform, `J2EE 1.4`, was released on November 11, 2003.
    This version was contained under the umbrella `JSR 151`. The key feature of this
    release was the “adherence to the `Web Services Interoperability Organization`’s
    (`WS-I`’s) `Basic Profile 1.0` document for implementing interoperable Web services.”^([³](#fn3))


    ### Java Platform, Enterprise Edition (Java EE) 5


    The next release of the platform saw a rebranding of the name from `Java 2 Enterprise
    Edition` to `Java Platform, Enterprise Edition`. This would have been `J2EE 1.5`,
    so, naturally, this saw the rebranded version becoming `Java EE 5`. This release,
    under the umbrella `JSR 244`, featured `Java` annotations and came out on May
    11, 2006.


    ### Java Platform, Enterprise Edition (Java EE) 6


    `Java EE 6` was released on December 10, 2009, under the umbrella `JSR 316`. This
    release was the last major one under `Sun Microsystems`, before its takeover by
    `Oracle` a year later. Its main features were the introduction of `CDI`-managed
    security and the introduction of `REST` APIs.


    ### Java Platform, Enterprise Edition (Java EE) 7


    Almost four years after the release of `Java EE 6`, `Java EE 7` was released on
    May 28, 2013, under the umbrella `JSR 342`. This release featured the introduction
    of the `WebSocket` and `JSON` processing APIs, as well as enhancements to `HTML5`
    support in the `JSF` API. This release was also monumental because it was the
    first major `Java EE` release after `Oracle` acquired `Sun Microsystems`, the
    company that hitherto had been the trademark owner of the `Java Platform`.


    ### Java Platform, Enterprise Edition (Java EE) 8


    More than four years after the release of `Java EE 7`, `Java EE 8` was released
    on August 31, 2017, under the umbrella `JSR 366`. Key features of this version
    were `HTTP/2` and `CDI`-based security. `Java EE 8` was a very important release
    because it was partly the result of a lot of pressure from grassroots community
    groups like the `Jakarta EE Ambassadors` (formerly `Java EE Guardians`^([⁴](#fn4)))
    that was brought to bear on `Oracle` to complete the release. This resulted in
    the scope of the release being reduced.'
  raw: '# 1. The Theory of Jakarta EE and MicroProfile


    Jakarta EE (formerly Java EE) is a set of community-developed, abstract specifications
    that together form a platform for developing end-to-end, multitier enterprise
    applications. Jakarta EE is built on the Java Standard Edition and aims to provide
    a stable, reliable, and vendor-neutral platform on which to develop cloud-native
    applications.


    This chapter discusses the general theory surrounding the Java Enterprise Development
    platform. Enterprise Java–related nomenclature comprises a lot of technical words
    that might not be so clear. This chapter breaks down Java EE – now Jakarta EE
    – into its theoretical form such that by the end of this chapter, you will become
    familiar with the large number of Enterprise Java–related terminologies.


    ## What Is a Specification?


    Jakarta EE is made up of individual specifications, each specification covering
    a specific API, for example, Jakarta WebSocket , responsible for providing an
    API for writing applications that support communicating via a WebSocket protocol
    on the platform. These individual specifications are grouped into a single “umbrella”
    specification for a given Jakarta EE release. For example, the latest release,
    Jakarta EE 10,^([¹](#fn1)) is released under umbrella specification 10.


    A specification is a document that outlines the functions of a given set of APIs.
    This document outlines what the expected behavior should be for various scenarios
    and invocations of the given API. The specification itself can be thought of as
    a blueprint for the API. The counterpart to a Jakarta EE specification is the
    implementation of that specification. As the specification only states what the
    expectations and functions of an API are, the implementation of that specification
    is what does the job of actualizing those expectations and functions when any
    given API in that specification is invoked by a developer.


    The specifications and their corresponding implementations are generally separated.
    This, for you as a developer, means you can simply code against the “abstract”
    specification (blueprint) and run your code using different implementations. This
    implies the freedom to pick an implementation that suits your needs without having
    to rewrite your code. For implementation vendors, this means more competition
    and, ultimately, better and faster innovations atop the base specifications.


    In the past, the various (Java EE) specification releases happened under the Java
    Community Process (JCP^([²](#fn2))) Java Specification Request (JSR) . The JSR
    is a process where any interested person (individual or registered entity) submits
    a document to the project management office of the JCP, proposing the development
    of a new or significant revision to an existing specification. The entire process,
    from the proposal of the specification document to the final release and a reference
    implementation, all happened as part of the JSR.


    As an umbrella JSR, Java EE itself had a reference implementation in the form
    of GlassFish Application Server. This implementation was the “reference” that
    acted as the base for other umbrella spec implementations. Over the years, a number
    of Java EE full implementations have come out, including WildFly , Open Liberty
    , and Payara , among others.


    From version 8 of Java EE, the specification process moved from the JCP to the
    Eclipse Foundation along with the GlassFish project. The concept of reference
    implementations also changed to compatible implementations, to better reflect
    the focus on cross-vendor neutrality and compatibility. However, to better understand
    what Jakarta EE is and how it came to be, a historical tour of Java EE releases
    is needed to get a better understanding of the context and objectives of Jakarta
    EE as a platform today and how the release process differs from what it was under
    the JCP.


    ## Java EE Release History


    ### Java 2 Platform, Enterprise Edition (J2EE 1.2)


    The first release of the platform was on December 12, 1999, and was called Java
    2 Enterprise Edition or J2EE for short. It featured the initial specification
    release of the platform, in the form of version 1.2\. One of the key features
    of this novel (at the time) platform was the concept of Enterprise JavaBeans .
    The EJB API was intended to make it easy to encapsulate complex business logic
    in a component that was managed by a specialized runtime. This runtime provided
    EJB components with ancillary services like transactions, security, and scalability.


    ### Java 2 Platform, Enterprise Edition (J2EE 1.3)


    The next version of the Enterprise Java Platform was 1.3, released on September
    24, 2001\. This was contained in the umbrella JSR 58\. The key features of this
    release were the introduction of new Java Connector Architecture (JCA) and the
    Java Message Service (JMS) APIs. The EJB API also saw improvements.


    ### Java 2 Platform, Enterprise Edition (J2EE 1.4)


    The next version of the platform, J2EE 1.4 , was released on November 11, 2003\.
    This version was contained under the umbrella JSR 151\. The key feature of this
    release was the “adherence to the Web Services Interoperability Organization’s
    (WS-I’s) Basic Profile 1.0 document for implementing interoperable Web services.”^([³](#fn3))


    ### Java Platform, Enterprise Edition (Java EE) 5


    The next release of the platform saw a rebranding of the name from Java 2 Enterprise
    Edition to Java Platform, Enterprise Edition. This would have been J2EE 1.5 ,
    so, naturally, this saw the rebranded version becoming Java EE 5\. This release,
    under the umbrella JSR 244, featured Java annotations and came out on May 11,
    2006.


    ### Java Platform, Enterprise Edition (Java EE) 6


    Java EE 6 was released on December 10, 2009, under the umbrella JSR 316\. This
    release was the last major one under Sun Microsystems , before its takeover by
    Oracle a year later. Its main features were the introduction of CDI-managed security
    and the introduction of REST APIs.


    ### Java Platform, Enterprise Edition (Java EE) 7


    Almost four years after the release of Java EE 6 , Java EE 7 was released on May
    28, 2013, under the umbrella JSR 342\. This release featured the introduction
    of the WebSocket and JSON processing APIs, as well as enhancements to HTML5 support
    in the JSF API. This release was also monumental because it was the first major
    Java EE release after Oracle acquired Sun Microsystems, the company that hitherto
    had been the trademark owner of the Java Platform.


    ### Java Platform, Enterprise Edition (Java EE) 8


    More than four years after the release of Java EE 7, Java EE 8 was released on
    August 31, 2017, under the umbrella JSR 366\. Key features of this version were
    HTTP/2 and CDI-based security. Java EE 8 was a very important release because
    it was partly the result of a lot of pressure from grassroots community groups
    like the Jakarta EE Ambassadors (formerly Java EE Guardians^([⁴](#fn4))) that
    was brought to bear on Oracle to complete the release. This resulted in the scope
    of the release being reduced.'
  trans: '

    # 1. Jakarta EE 与 MicroProfile 理论


    Jakarta EE（原 Java EE）是一套由社区开发的抽象规范，共同构成了一个用于开发端到端、多层企业级应用的平台。Jakarta EE 构建于 Java
    标准版之上，旨在提供一个稳定、可靠且供应商中立的平台，用于开发云原生应用。


    本章将讨论围绕 Java 企业级开发平台的一般理论。与 Java 企业版相关的术语包含大量可能不太清晰的技术词汇。本章将把 Java EE（现为 Jakarta
    EE）分解为其理论形式，以便在本章结束时，您能熟悉大量与 Java 企业版相关的术语。


    ## 什么是规范？


    Jakarta EE 由多个独立的规范组成，每个规范涵盖一个特定的 API，例如 Jakarta WebSocket，它负责提供一个 API，用于编写支持通过平台上的
    WebSocket 协议进行通信的应用。这些独立的规范被分组到给定 Jakarta EE 版本的单个“总括”规范中。例如，最新版本 Jakarta EE 10^(¹)
    是在总括规范 10 下发布的。


    规范是一份文档，概述了给定 API 集合的功能。该文档概述了在给定 API 的各种场景和调用下，预期行为应该是什么。规范本身可以被视为 API 的蓝图。Jakarta
    EE 规范的对应物是该规范的实现。由于规范仅说明 API 的期望和功能是什么，因此该规范的实现是在开发人员调用该规范中的任何给定 API 时，实际实现这些期望和功能的工作。


    规范及其相应的实现通常是分离的。对您作为开发人员而言，这意味着您可以简单地针对“抽象”规范（蓝图）进行编码，并使用不同的实现来运行您的代码。这意味着您可以自由选择适合您需求的实现，而无需重写代码。对于实现供应商而言，这意味着更多的竞争，并最终在基础规范之上实现更好、更快的创新。


    过去，各种（Java EE）规范版本是在 Java 社区流程（JCP^(²)）的 Java 规范请求（JSR）下发布的。JSR 是一个流程，任何感兴趣的人（个人或注册实体）向
    JCP 的项目管理办公室提交一份文档，提议开发一个新的规范或对现有规范进行重大修订。从规范文档的提议到最终发布和参考实现，整个过程都是 JSR 的一部分。


    作为一个总括 JSR，Java EE 本身有一个以 GlassFish 应用服务器形式存在的参考实现。该实现是作为其他总括规范实现基础的“参考”。多年来，已经出现了许多
    Java EE 完整实现，包括 WildFly、Open Liberty 和 Payara 等。


    从 Java EE 8 版本开始，规范流程与 GlassFish 项目一起从 JCP 转移到了 Eclipse 基金会。参考实现的概念也变更为兼容实现，以更好地反映对跨供应商中立性和兼容性的关注。然而，为了更好地理解
    Jakarta EE 是什么以及它是如何形成的，需要回顾一下 Java EE 版本的历史，以便更好地理解 Jakarta EE 作为当今平台的背景和目标，以及其发布流程与
    JCP 下的流程有何不同。


    ## Java EE 版本历史


    ### Java 2 平台企业版（J2EE 1.2）


    该平台的第一个版本于 1999 年 12 月 12 日发布，称为 Java 2 企业版，简称 J2EE。它以 1.2 版本的形式发布了该平台的初始规范。这个当时新颖的平台的关键特性之一是
    Enterprise JavaBeans 的概念。EJB API 旨在使将复杂业务逻辑封装在由专用运行时管理的组件中变得容易。该运行时为 EJB 组件提供了事务、安全性和可伸缩性等辅助服务。


    ### Java 2 平台企业版（J2EE 1.3）


    Java 企业平台的下一版本是 1.3，于 2001 年 9 月 24 日发布。它包含在总括 JSR 58 中。此版本的关键特性是引入了新的 Java 连接器架构（JCA）和
    Java 消息服务（JMS）API。EJB API 也得到了改进。


    ### Java 2 平台企业版（J2EE 1.4）


    该平台的下一版本 J2EE 1.4 于 2003 年 11 月 11 日发布。此版本包含在总括 JSR 151 中。此版本的关键特性是“遵循 Web 服务互操作性组织（WS-I）的基本概要
    1.0 文档，以实现可互操作的 Web 服务。”^(³)


    ### Java 平台企业版（Java EE）5


    该平台的下一版本经历了品牌重塑，从 Java 2 企业版更名为 Java 平台企业版。这本来是 J2EE 1.5，因此，自然就变成了重新命名的版本 Java
    EE 5。此版本在总括 JSR 244 下发布，引入了 Java 注解，并于 2006 年 5 月 11 日发布。


    ### Java 平台企业版（Java EE）6


    Java EE 6 于 2009 年 12 月 10 日在总括 JSR 316 下发布。此版本是 Sun Microsystems 被 Oracle 收购前一年在其旗下的最后一个主要版本。其主要特性是引入了
    CDI 管理的安全性和 REST API。


    ### Java 平台企业版（Java EE）7


    在 Java EE 6 发布近四年后，Java EE 7 于 2013 年 5 月 28 日在总括 JSR 342 下发布。此版本引入了 WebSocket
    和 JSON 处理 API，并增强了 JSF API 中的 HTML5 支持。此版本也具有里程碑意义，因为它是 Oracle 收购 Sun Microsystems（迄今为止
    Java 平台的商标所有者）后的第一个主要 Java EE 版本。


    ### Java 平台企业版（Java EE）8


    在 Java EE 7 发布四年多后，Java EE 8 于 2017 年 8 月 31 日在总括 JSR 366 下发布。此版本的关键特性是 HTTP/2
    和基于 CDI 的安全性。Java EE 8 是一个非常重要的版本，部分原因是由于来自 Jakarta EE 大使（原 Java EE 守护者^(⁴)）等基层社区团体的巨大压力，迫使
    Oracle 完成了该版本的发布。这导致该版本的范围被缩减。

    '
- fmt: '# From Java EE to Jakarta EE


    As you can see from the preceding chronological release history, the number of
    years between each release kept getting longer and longer, culminating in a more
    than four-year gap between the release of Java EE 7 and 8. In a fast-paced ecosystem
    like that of the Java Platform, four years between releases^([⁵](#fn5)) was a
    significant gap. This necessitated calls by the community for Oracle to come clear^([⁶](#fn6))
    on its intentions for the Enterprise Java Platform, having inherited it as part
    of its purchase of Sun Microsystems. To the community, it seemed Oracle had abandoned
    Java EE. With a wide-reaching set of APIs that even non-Java EE products build
    upon, the death of Java EE would be catastrophic to the entire ecosystem. Essentially,
    Java EE formed the foundation of a large part of the enterprise development market
    in the Java space.


    Later in 2017 however, after the release of Java EE 8, Oracle decided to move
    the Java EE Platform to an open source foundation to make it a full community-driven
    development platform. This transfer comprised the Java EE platform specs, complete
    with the Test Compatibility Kit (TCK). After consultations with key Java EE players
    RedHat and IBM, the Eclipse Foundation was chosen as the new home of the Java
    EE platform.


    At this point, the Java EE platform was almost two decades old, and the implication
    was that the task of transferring such a massive platform from a proprietary entity
    to an open source foundation was monumental. One noteworthy hurdle had to do with
    intellectual property and trademark rights. To make the transfer as manageable
    as possible, the process was broken down into three main stages^([⁷](#fn7)), namely:


    1. Transfer API and implementation code

    2. Transfer Test Compatibility Kit (TCK) code, new specification process

    3. Refactor API package name, transfer and update specification documents


    ## Transfer API and Implementation Code


    As discussed in the preceding sections, Jakarta EE is made up of individual specs,
    and each spec could have N number of releases in the past up to the point of transfer
    to Eclipse Foundation. It was decided to transfer only the latest released versions
    of each spec to the Eclipse Foundation. The top-level Eclipse Project, Eclipse
    Enterprise for Java (EE4J^([⁸](#fn8))), was created with the corresponding GitHub
    organization `eclipse-ee4j`^([⁹](#fn9)) to act as the home of the specs and their
    implementations.


    With a new home at the Eclipse Foundation, the transferred code was built using
    Eclipse Foundation’s servers and infrastructure, the result staged to a Maven
    repository with the `groupId` changed from `javax.*` to `jakarta.*`. This change
    of `groupId` was significant because the Eclipse Foundation could not use the
    `javax` namespace due to legal restrictions. A new build of the reference implementation,
    GlassFish now called Eclipse GlassFish, was produced from these new artifacts
    and ran against the Java EE 8 TCK.


    With the Eclipse GlassFish build passing the TCK, it was released as version 5
    on January 29, 2019. This release under the `jakarta.*` package and `jakarta`
    `groupId` was technically still Java EE, because it was Java EE 8 certified. This
    only marked the release of the Java EE platform released from the new Eclipse
    Foundation’s EE4J project on GitHub rather than the Java EE project. Also note
    that all the earlier versions of the various specifications that make up the Java
    EE platform are not managed nor maintained by the Eclipse Foundation as part of
    the platform.


    ## Transfer Test Compatibility Kit (TCK) Code, New Specification Process


    This stage involved the transfer of the TCK from which new binaries were built
    for the new Jakarta EE version specification. This stage also saw the introduction
    of the new Jakarta EE Specification Process (JESP)^([^(10)](#fn10)). The new JESP
    itself adopts the existing Eclipse Foundation Specification Process (EFSP) v1.2^([^(11)](#fn11))
    with some few modifications. Along with the JESP, the Eclipse Foundation Technology
    Compatibility Kit license^([^(12)](#fn12)) was also released.


    Together, these two legal frameworks now guide the development of Jakarta EE specifications
    and the release of compatible implementations, the whole process, managed end
    to end by the Eclipse Foundation. New Jakarta EE implementations must pass the
    TCK to be certified as compatible implementations of the platform and be eligible^([^(13)](#fn13))
    for enlistment on the Eclipse Foundation page for Jakarta EE downloads^([^(14)](#fn14)).
    The goal of the JESP is to be as lightweight as possible, encouraging a “code
    first” approach to developing the platform, thus allowing for more experimentation
    and faster iteration.


    Note that within the context of the Eclipse Foundation, we have been using the
    term “compatible implementation,” while hitherto, with Java EE at the JCP, we
    used the term “reference implementation.” This is because at the Eclipse Foundation,
    the concept of a “reference” implementation was scrapped in favor of compatible
    implementations. The goal is to make the certification process as easy and fast
    as possible and also to create a more level-playing field, thus advancing innovation
    in the implementation ecosystem.


    The next steps in this process entailed updating the Javadoc of the various APIs,
    relicensing the resulting JAR files and testing same against the GlassFish 5.1
    version, using the binaries built from the newly transferred TCK. The result of
    all these was the first release of Java EE as the newly transferred Jakarta EE,
    version 8. The official date for this release was September 10, 2019. Note that
    the release of Jakarta EE 8 still had GlassFish 5.1 as the compatible implementation.
    Also, this release did not feature any new APIs. It was solely “under-the-hood”
    changes that marked the first full release of the platform under the stewardship
    of the Eclipse Foundation.


    This stage of the transfer of Java EE to the Eclipse Foundation also saw the revision
    and renaming of the various APIs to a more consistent naming convention. For example,
    the Java Persistence API (JPA) was renamed to Jakarta Persistence. The Java Authentication
    SPI for Containers (JASPIC) became Jakarta Authentication, and its counterpart,
    the Java Authorization Contract for Containers (JACC), became Jakarta Authorization.
    The Contexts and Dependency Injection (CDI) API became the Jakarta Contexts and
    Dependency Injection. This simplified naming convention made it easy to grasp
    the myriad APIs of the platform by just their names.


    Up to this stage of the transfer, to develop applications on the platform, you
    needed to use the dependency shown in Figure [1-1](#531256_1_En_1_Chapter.xhtml#Fig1).


    ![](images/531256_1_En_1_Chapter/531256_1_En_1_Fig1_HTML.jpg)


    6 lines of code depict Java EE dependency. The `groupId` and `artifactId` mentioned
    are `javax` and `javaee-api` respectively.


    **Figure 1-1** Java EE dependency


    After the release of Jakarta EE 8, the Maven coordinates changed to the dependency
    shown in Figure [1-2](#531256_1_En_1_Chapter.xhtml#Fig2).


    ![](images/531256_1_En_1_Chapter/531256_1_En_1_Fig2_HTML.jpg)


    6 lines of code depict Jakarta EE dependency. The `groupId` and `artifactId` mentioned
    are `jakarta.platform` and `jakarta.jakartaee-api` respectively.


    **Figure 1-2** Jakarta EE dependency


    Jakarta EE 8 was a drop-in replacement for Java EE, meaning you could switch without
    any form of refactoring in your code or API change, because the various APIs were
    still within the `javax.*` package. Changing these to `jakarta.*` leads us to
    the final step of the transfer process.'
