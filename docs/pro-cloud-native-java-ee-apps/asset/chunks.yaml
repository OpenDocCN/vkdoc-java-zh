    这是自动完成的，只需要你使用相关的 Jakarta Bean Validation 注解来注解你的字段。POST 方法不一定需要返回数据。`createUser`
    方法也可以返回 void。资源方法返回什么是一个业务领域决策，需要根据具体情况进行判断。


    #### @GET


    创建一个响应 HTTP GET 请求的方法需要用一个 `@GET` 注解来注解一个 Java 方法。在表 6-1 列出的资源方法列表中，有四个 GET 请求。其中三个返回用户集合。当不同的资源方法具有如此相似的返回类型时，这表明需要重构端点以简化它们。


    再次查看表 6-1，搜索用户和按总转换次数筛选用户的端点可以合并为一个。因此，搜索端点支持按总货币转换次数筛选或搜索用户。这样，搜索端点可以扩展，以便你可以基于谓词（如大于或等于、小于或等于等）按转换次数进行筛选。采用这种新方法，我们最终得到三个
    GET 请求：一个用于按 ID 获取用户，一个用于获取所有用户，另一个用于搜索。清单 6-12 展示了为 `UserResource` 构建 GET 请求的首次尝试。


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("users")

    public class UserResource{

    @Inject

    UserService userService;

    @GET

    @Path("{userId}")

    public UserResponse getUser(@PathParam("userId") Long userId) {

    return userService.getUser(userId);

    }

    @GET

    @Path("search")

    public List searchUsers(@NotNull @BeanParam UserSearchRequest userSearchRequest)
    {

    return userService.searchUsers(userSearchRequest);

    }

    @GET

    public List getAllUsers() {

    return userService.getAllUsers();

    }

    }

