    any such activity will prove expensive. An analysis of different core features
    should be made and test efforts focused on critical areas.


    #### Early Testing Saves Time and Money


    A quick smoke test of a new application release can help identify showstopper
    bugs that could have required the running of the entire test suite to unearth.
    This also applies to implementing test-driven development as much as possible.


    #### Defects Cluster


    A small number of components in an application will be responsible for the majority
    of bugs. Testing should then focus on these components that are responsible for
    the majority of the bugs. This is essentially applying the Pareto principle to
    testing application components.


    #### Beware of the Pesticide Principle


    The same set of tests repeated over a long period of time may end up not catching
    new defects. This principle is a simile to the ineffectiveness of pesticide applied
    to the same area over a long period in killing insects. Tests will need to be
    updated and refactored with new input data and permutations to keep them effective
    at identifying application defects.


    #### Testing Is Contextual


    Testing is a highly context-dependent activity. The tests applied to a business
    application will differ from the tests applied to an aerospace computer control
    application . This is important to keep in mind when taking inspiration for creating
    testing systems.


    #### Absence of Errors Is a Fallacy


    As elucidated in the first principle, tests do not guarantee the absence of errors.
    As such, it is a mistaken notion to assume an application is free of defects if
    tests do not unearth any. Also, identifying and fixing defects does not guarantee
    the system cannot fail.


    ## Testing in Jakarta EE


    Jakarta EE as an application development platform does not have a testing specification
    or API of its own. However, as it is built on Java SE, the gamut of testing libraries
    and frameworks available on Java SE can be used to test Jakarta EE applications.
    However, testing a Jakarta EE application presents some challenges.


    A modern Jakarta EE application, like the one discussed so far in this book, makes
    heavy use of the Jakarta Contexts and Dependency Injection API. Almost all components
    are managed by one runtime or the other. For instance, a CDI bean might declare
    a dependency on another bean that in turn has a dependency on a JPA-managed artifact
    like the EntityManager.


    ### Unit-Testing Jakarta EE Components


    Unit-testing Jakarta EE components can be achieved with a little bit of refactoring
    of the component under test. A component under test that uses field injection
    can be refactored to use constructor injection for its dependencies. This way,
    the component under test can have its dependencies passed to it by CDI during
    application runtime and manually instantiated during testing through its constructor,
    passing in mocked instances of its dependencies.


    #### JUnit


    JUnit is a Java testing library for making assertions on test artifacts. It has
    a number of callbacks for setting up and tearing down test data. It also has an
    extension API that other testing libraries have built on top of to extend testing
    for different purposes. JUnit is arguably the most popular testing library in
    enterprise Java.


    #### Mockito


    Mockito is a Java library for creating mocked objects in unit tests. A component
    under test that has dependencies on other components will have those dependencies
    mocked. Mocking allows predictable values on the mocked objects to be returned
    and later asserted.


    To test the WalletService CDI bean of jwallet, we first refactor it to use constructor
    injection for its two CDI-managed application components. This way, in a unit
    test, the WalletService can easily pass mocked objects. Listing [12-1](#531256_1_En_12_Chapter.xhtml#PC1)
    shows the refactored WalletService.


    ```

    @Action

    @NoArgsConstructor

    public class WalletService {

    WalletRepository walletRepository;

    TransactionRepository transactionRepository;

    RateService rateService;

    @Inject

    public WalletService(WalletRepository wallet,

    TransactionRepository txn,

    RateService rate) {

    this.walletRepository = wallet;

    this.transactionRepository = txn;

    this.rateService = rate;

    }

    }

    Listing 12-1

    Refactored WalletService

    ```


    The WalletService has a dependency on the WalletRepository, TransactionRepository,
    and RateService. It has been refactored out to use constructor injection, with
    a single constructor annotated @Inject, passing in the three dependencies and
    initializing the class field with those. With this simple refactor, the WalletService
    is now ready to be unit-tested. Listing [12-2](#531256_1_En_12_Chapter.xhtml#PC2)
    shows the WalletService unit test class, WalletServiceTest.


    ```

    @ExtendWith(MockitoExtension.class)

    public class WalletServiceTest {

    @Mock

    WalletRepository walletRepository;

    WalletService walletService;

    static String walletCurrency;

    static BigDecimal balance;

    @BeforeAll

    public static void initAll() {

    walletCurrency = "GHS";

    balance = new BigDecimal("50");

    }

    @BeforeEach

    void init() {

    walletService = new WalletService(walletRepository, null, null);

    when(walletRepository.findById(anyLong())).thenAnswer(i -> {

    Wallet wallet = new Wallet();

    wallet.setId(i.getArgument(0));

    wallet.setCurrency(walletCurrency);

    wallet.setBalance(balance);

    return wallet;

    });

    }

    @Test

    void shouldFindWallet() {

    BalanceResponse response = walletService.getBalance(1L);

    assertNotNull(response);

    assertEquals(1L, response.getData().getWalletId());

    assertEquals(balance, response.getData().getBalance());

    assertEquals(walletCurrency, response.getData().getCurrency());

    }

    }

    Listing 12-2

    WalletServiceTest

    ```


    The class is annotated by @ExtendWith and passed the MockitoExtension.class. This
    registers the MockitoExtension with the JUnit runtime. The @Mock annotation is
    used to mock the WalletRepository. The @BeforeAll callback method sets up some
    expected data that the component under test, in this case the WalletService method
    to be tested, should return. The WalletService object is instantiated, passing
    in the mocked WalletRepository and null for the other two parameters. We could
    equally have mocked the two other parameters of the WalletService constructor.


    The static Mockito *when* method is called to mock a call to the WalletRepository.findById
    method. The mock simply captures the passed ID and constructs a Wallet with it.
    We now have everything in place to unit-test the getBalance method of the WalletService.


    The shouldFindWallet test method calls the getBalance method on the WalletService
    and proceeds to use the JUnit assertion methods to assert the expected data. This
    is generally how you craft unit tests in Jakarta EE for application components.
    Note that nothing significantly different was needed apart from the small refactoring
    of the component under test to use constructor injection to initialize dependent
    fields.


    This kind of test is incredibly fast and can be run multiple times on the CI/CD
    pipeline. It is important to note that the WalletServiceTest is tested as a POJO
    that has nothing to do with Jakarta EE. Its method is tested and asserted to be
    acting as expected. As much as possible, you should unit-test core components
    of your application.'
  trans: '

    #### 测试能证明缺陷的存在，而非其不存在


    测试有助于发现应用程序中的错误。然而，测试无法保证应用程序完全没有错误。测试套件中的所有测试都通过，并不意味着不存在尚未发现的缺陷。尽管如此，拥有广泛的测试可以在一定程度上合理保证应用程序在已测试的条件下不会发生故障。


    #### 穷尽测试是不可能的


    企业级应用程序非常庞大且复杂。不可能进行覆盖应用程序所有可能排列组合的测试。试图进行任何此类活动都将代价高昂。应对不同的核心功能进行分析，并将测试工作集中在关键领域。


    #### 尽早测试可节省时间和成本


    对新发布的应用程序进行快速冒烟测试，有助于发现那些原本需要运行整个测试套件才能揭露的致命错误。这也同样适用于尽可能实施测试驱动开发。


    #### 缺陷具有集群性


    应用程序中少数几个组件将负责大部分的错误。因此，测试应重点关注这些导致大部分错误的组件。这本质上是将帕累托原则应用于应用程序组件的测试。


    #### 警惕农药原理


    长期重复使用同一套测试用例，最终可能无法捕获新的缺陷。这一原理类似于长期在同一区域使用农药会导致杀虫效果下降。测试需要更新和重构，引入新的输入数据和排列组合，以保持其识别应用程序缺陷的有效性。


    #### 测试具有上下文相关性


    测试是一项高度依赖上下文的活动。应用于商业应用程序的测试，与应用于航空航天计算机控制系统的测试会有所不同。在借鉴经验创建测试系统时，牢记这一点非常重要。


    #### 没有错误是一种谬误


    正如第一条原则所阐述的，测试并不能保证没有错误。因此，如果测试没有发现任何缺陷就认为应用程序没有错误，这是一种错误的观念。此外，识别并修复缺陷并不能保证系统不会发生故障。


    ## Jakarta EE 中的测试


    Jakarta EE 作为一个应用程序开发平台，本身并没有自己的测试规范或 API。然而，由于它构建在 Java SE 之上，Java SE 上可用的各种测试库和框架都可以用来测试
    Jakarta EE 应用程序。但是，测试 Jakarta EE 应用程序也面临一些挑战。


    一个现代的 Jakarta EE 应用程序，就像本书到目前为止所讨论的那样，大量使用了 Jakarta 上下文和依赖注入 API。几乎所有组件都由某个运行时或其他机制管理。例如，一个
    CDI bean 可能声明了对另一个 bean 的依赖，而后者又依赖于一个 JPA 管理的工件，如 `EntityManager`。


    ### 对 Jakarta EE 组件进行单元测试


    对 Jakarta EE 组件进行单元测试可以通过对被测组件进行少量重构来实现。使用字段注入的被测组件，可以重构为其依赖项使用构造器注入。这样，被测组件的依赖项可以在应用程序运行时由
    CDI 传入，而在测试期间则通过其构造器手动实例化，传入其依赖项的模拟实例。


    #### JUnit


    JUnit 是一个用于对测试工件进行断言的 Java 测试库。它有许多用于设置和销毁测试数据的回调方法。它还有一个扩展 API，其他测试库在此基础上构建，以扩展不同目的的测试。JUnit
    可以说是企业级 Java 中最流行的测试库。


    #### Mockito


    Mockito 是一个用于在单元测试中创建模拟对象的 Java 库。一个依赖于其他组件的被测组件，其依赖项将被模拟。模拟允许在模拟对象上返回可预测的值，并随后进行断言。


    为了测试 jwallet 的 `WalletService` CDI bean，我们首先对其进行重构，使其对其两个 CDI 管理的应用程序组件使用构造器注入。这样，在单元测试中，`WalletService`
    可以轻松地传入模拟对象。清单 12-1 展示了重构后的 `WalletService`。


    ```

    @Action

    @NoArgsConstructor

    public class WalletService {

    WalletRepository walletRepository;

    TransactionRepository transactionRepository;

    RateService rateService;

    @Inject

    public WalletService(WalletRepository wallet,

    TransactionRepository txn,

    RateService rate) {

    this.walletRepository = wallet;

    this.transactionRepository = txn;

    this.rateService = rate;

    }

    }

    清单 12-1

    重构后的 WalletService

    ```


    `WalletService` 依赖于 `WalletRepository`、`TransactionRepository` 和 `RateService`。它已被重构为使用构造器注入，带有一个标注了
    `@Inject` 的构造器，传入这三个依赖项并用它们初始化类字段。通过这个简单的重构，`WalletService` 现在可以进行单元测试了。清单 12-2
    展示了 `WalletService` 的单元测试类 `WalletServiceTest`。


    ```

    @ExtendWith(MockitoExtension.class)

    public class WalletServiceTest {

    @Mock

    WalletRepository walletRepository;

    WalletService walletService;

    static String walletCurrency;

    static BigDecimal balance;

    @BeforeAll

    public static void initAll() {

    walletCurrency = "GHS";

    balance = new BigDecimal("50");

    }

    @BeforeEach

    void init() {

    walletService = new WalletService(walletRepository, null, null);

    when(walletRepository.findById(anyLong())).thenAnswer(i -> {

    Wallet wallet = new Wallet();

    wallet.setId(i.getArgument(0));

    wallet.setCurrency(walletCurrency);

    wallet.setBalance(balance);

    return wallet;

    });

    }

    @Test

    void shouldFindWallet() {

    BalanceResponse response = walletService.getBalance(1L);

    assertNotNull(response);

    assertEquals(1L, response.getData().getWalletId());

    assertEquals(balance, response.getData().getBalance());

    assertEquals(walletCurrency, response.getData().getCurrency());

    }

    }

    清单 12-2

    WalletServiceTest

    ```


    该类使用 `@ExtendWith` 注解，并传入了 `MockitoExtension.class`。这将 `MockitoExtension` 注册到
    JUnit 运行时。`@Mock` 注解用于模拟 `WalletRepository`。`@BeforeAll` 回调方法设置了一些预期数据，这些数据应该是被测组件（本例中为待测试的
    `WalletService` 方法）返回的。`WalletService` 对象被实例化，传入了模拟的 `WalletRepository`，另外两个参数传入了
    `null`。我们同样可以模拟 `WalletService` 构造器的另外两个参数。


    调用了静态的 Mockito `when` 方法来模拟对 `WalletRepository.findById` 方法的调用。这个模拟只是捕获传入的 ID，并用它构造一个
    `Wallet` 对象。现在，我们已经准备好一切，可以对 `WalletService` 的 `getBalance` 方法进行单元测试了。


    `shouldFindWallet` 测试方法调用了 `WalletService` 上的 `getBalance` 方法，然后使用 JUnit 的断言方法来断言预期数据。这通常是在
    Jakarta EE 中为应用程序组件编写单元测试的方式。请注意，除了对被测组件进行少量重构以使用构造器注入来初始化依赖字段外，并没有其他显著的不同。


    这种测试速度非常快，可以在 CI/CD 流水线上多次运行。需要注意的是，`WalletServiceTest` 是作为一个与 Jakarta EE 无关的
    POJO 进行测试的。它的方法被测试并断言其行为符合预期。你应该尽可能地对应用程序的核心组件进行单元测试。

