- fmt: '# 排版后的内容


    While Java EE had become an almost fully metadata-driven platform, where you needed
    just one dependency to have everything automatically configured and available,
    Spring had become much more reliant on the developer to configure its various
    components, mostly through XML config files. To be fair, Spring was originally
    based on the Java Servlet specification, and that meant a typical Spring developer
    would need to have knowledge of servlet and Spring configurations. In effect,
    application development with Spring had become almost as complex^([^(45)](#fn45))
    as it was on J2EE.


    In October 2012, Mike Youngstrom raised an issue^([^(46)](#fn46)) on the Spring
    Jira board, discussing how Spring configuration could be made easier. He wrote,
    “I think that Spring’s web application architecture can be significantly simplified
    if it were to [be] provided tools and a reference architecture that leverages
    the Spring component and configuration model from top to bottom. Embedding and
    unifying the configuration of those common web container services within a Spring
    Container bootstrapped from a simple `main()` method.” It was in this thread that
    Spring Boot was mentioned^([^(47)](#fn47)) as a then nascent project to address
    the complexity Mike raised. Spring Boot, a subproject of the Spring Framework,
    therefore, itself came to address the shortcomings of its parent project, just
    as the parent project was born to address the challenges developers faced in using
    the then J2EE.


    Today, both Jakarta EE and Spring are equally good and productive enterprise Java
    application development platforms that exist to make your life easier. Both platforms
    have a history of influencing each other to innovate and become better with each
    release. The ultimate winner in this “innovation contest” is you, the developer.
    There is really no need for some of the intense, flame wars in some corners about
    which is better or worse. Both platforms trace their roots back to the J2EE platform
    and as such are more complementary than competing platforms. As a Java developer,
    your knowledge of Jakarta EE can easily be transferred to the Spring platform
    with minimal effort. Having an informed history of both platforms is essential
    in knowing how similar, rather than different, they are. As this book is about
    Jakarta EE, let us take a brief look at why you would want to learn about application
    development on the platform.


    ## Why Jakarta EE?


    You have so far taken a historical tour of Jakarta EE and how it relates to Eclipse
    MicroProfile. You have also looked at Spring from the perspective of Jakarta EE.
    Together, these two platforms form the dominant options for enterprises in the
    Java ecosystem. The Java Platform still does have even more frameworks out there
    for developing all kinds of applications.


    As a Java developer, CTO, or the platform architect of an enterprise, you are
    spoiled for choice when it comes to frameworks and platforms for software development.
    A question you might be asking yourself is: Why should I choose Jakarta EE as
    my primary software development platform? What makes it a better choice?


    There are number of reasons to at least give Jakarta EE a try, key among them
    being


    *   Standardization

    *   Openness

    *   Stability

    *   Ease of development

    *   Portability

    *   Pick and choose – tank or pistol

    *   Amazing documentation


    ### Standardization


    Every single specification on the platform, before the transfer to Eclipse Foundation,
    went through a rigorous process of both public and the JSR Expert Group scrutiny
    before finally being voted on by the JCP EC. New specification releases at the
    Eclipse Foundation equally go through a similar peer-reviewed mechanism.^([^(48)](#fn48))
    This ensures all specifications that form part of the platform have been weighed
    in terms of backward compatibility, benefit to the Java Platform as a whole, and
    that they meet well-defined technical criteria. You can rely on the fact that
    Jakarta EE specifications are going to be available and reliable for a long time.
    This is especially crucial for long-lived enterprise applications. You can also
    be sure any given API invocation will act the same predictably across different
    compatible implementations of the platform.


    ### Openness


    Jakarta EE specifications are developed in a code first approach through the Jakarta
    EE Specification Process. This process is a simple and open one where anyone interested
    in advancing the platform can contribute in the form of a specification. Being
    code first means you start with the actual code of the proposal, get it reviewed,
    and receive feedback in time. This ensures you don’t invest resources in going
    through the contribution process only to not have your contributions/specification
    accepted.


    ### Stability


    Jakarta EE being a standard means the Eclipse Foundation will only accept and
    standardize industry tried and tested technology. For long-lived apps that will
    require maintenance, no room for using fad tech that will vanish tomorrow. Every
    Jakarta EE technology is industry tried and tested (both against the TCK and in
    production) and here for the long haul. Newer, less mature, and rapidly evolving
    technologies on the other hand are the perfect candidates for the MicroProfile
    project, which builds and integrates very well on top of Jakarta EE platform.
    So if your application requires it, you still have access to cutting-edge APIs
    available that you can rely on.


    ### Ease of Development


    Application development with Jakarta EE and Eclipse MicroProfile is effortless.
    All that’s needed is an application server or Jakarta EE–compliant runtime and
    one (or two) maven dependency. Minimal configuration, convention over configuration,
    minimal to no XML and predictable, reliable defaults are all benefits that come
    out of the box with developing on the Jakarta EE Platform. For example, for quick
    prototyping, the JEE specification provides for a default datasource that you
    can get right to using without needing to configure anything.


    ### Portability


    Jakarta EE as a standard means that your application should work with minimal
    to no configuration change across various compatible implementations of the standard,
    as long as the developer codes against the standard. This is compelling because
    you don’t get locked into any given Jakarta EE application runtime vendor. Your
    code is portable across various application servers as long as you use the standard
    Jakarta EE APIs.


    ### Pick and Choose – Tank or Pistol


    Jakarta EE, combined with the Eclipse MicroProfile project, is a huge platform
    that may appear intimidating. But you can pick and choose whatever API in the
    group your application requires. You can use the platform as a tank or pistol
    – you decide. All the various APIs are integrated as a whole if you choose to
    use the whole platform or can stand alone individually if you choose to nitpick.
    As a set of abstract specifications, the compatible implementation provides all
    that is needed to run your application; you only ship your code. As such, you
    end up with much lighter deployment artifacts, made up mostly of your code.


    ### Amazing Documentation


    Jakarta EE is a well-organized community project that has an amazing amount of
    documentation. Notable is the Jakarta EE Tutorials,^([^(49)](#fn49)) the official
    Jakarta EE handbook. There are also lots of community and corporate organized
    conferences like Devoxx and Oracle JavaOne^([^(50)](#fn50)) that place a lot of
    emphasis on server-side Java development. There are also books written by individual
    developers like this one you are reading, all focused on helping you become a
    well-grounded enterprise Java software developer.'
