- fmt: '第3行声明该类托管在`wallets`资源路径下。与`hello`资源类似，该类中的所有资源端点都可以作为`/wallets`路径的子路径进行访问。第6行使用来自Jakarta上下文和依赖注入API的`@Inject`注解来声明对`WalletService.java`类的依赖。这是在Jakarta
    EE中声明组件依赖关系的一种声明式方式。第[4](#531256_1_En_4_Chapter.xhtml)章将详细讨论CDI API。现在，让我们先看一下清单[3-26](#531256_1_En_3_Chapter.xhtml#PC26)中创建钱包的第一个资源方法。


    ```

    @POST

    @Traced(operationName = "create-wallet")

    @SimplyTimed(name = "create_wallet_timer")

    public BalanceResponse createWallet(CreateWalletRequest createWalletRequest) {

    return walletService.createWallet(createWalletRequest);

    }

    Listing 3-26

    WalletResource create wallet method

    ```


    第一行使用`@POST`注解声明第4行定义的`createWallet`方法是一个POST资源。由于该方法上没有使用`@Path`注解显式指定路径，因此对资源路径`/api/wallets`的POST请求将被路由到此方法。该方法接受`CreateWalletRequest`作为参数，并返回`BalanceResponse`类型。由于资源类声明了它同时消费和生成JSON类型，JAX-RS运行时会替我们处理JSON的转换。从Java开发者的角度来看，你是在编写Java方法。


    第2行将方法声明为`@Traced`，并传入一个跟踪操作名称。此注解来自Eclipse MicroProfile OpenTracing API。使用此注解会暴露关于此方法调用的指标，这些指标可以被可观测性应用程序消费。在JWallet中，捆绑的Jaeger应用程序会消费并显示`create-wallet`跟踪，如图[3-5](#531256_1_En_3_Chapter.xhtml#Fig5)所示。


