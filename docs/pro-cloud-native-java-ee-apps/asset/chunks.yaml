    注解的值与传递给该方法 `@Path` 注解的值相同。不过，`@Path` 注解的值被花括号括了起来。这是在 Jakarta REST 中捕获资源路径或路径段中变量的一种方式。`{userId}`
    是一个变量，在运行时将被替换为实际传递的值。`@PathParam` 会获取该值并将其注入到 `userId` 方法参数中。路径 `/api/users/1`
    将与此方法匹配。


    路径参数不必只有一个。资源路径可以有 `/{param1}/{param2}/{param3}` 或任何类似的组合。请记住，如果你两次使用同一个变量，则最后一次匹配的结果会生效。因此，如果你有
