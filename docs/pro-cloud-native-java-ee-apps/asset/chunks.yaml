  raw: '#### JWallet


    JWallet, the reference application for this book, starts off as a set of microservices
    developed in a common project where each service is a maven module in the project.
    In a later chapter, we will refactor the application into physically separate
    services to realize the other form of microservices development. Table [3-1](#531256_1_En_3_Chapter.xhtml#Tab1)
    shows the endpoints for accessing the various services in the application.


    Table 3-1


    showing the endpoints in jwallet


    | Module | URL |

    | --- | --- |

    | Wallet | http://localhost:3001/wallet |

    | Rate | http://localhost:3002/rate |

    | Account | http://localhost:3003/account |

    | Jaeger | http://localhost:16686 |

    | Prometheus | http://localhost:9090 |

    | Grafana | http://localhost:3000 |


    The application, as discussed in the previous section, is a maven multimodule
    application. The primary UI of the application is the various endpoints for creating
    and carrying out transactions in a given wallet. The REST endpoints are developed
    with the Jakarta RESTful API (JAX-RS) . The root entry point of the application
    is the CONTEXT_PATH/api endpoint. Every JAX-RS application must have a root entry
    point that acts as the base path for all REST endpoints for that given application.
    This root REST endpoint is declared as shown in Listing [3-23](#531256_1_En_3_Chapter.xhtml#PC23)
    on the core module.


    ```

    @ApplicationPath("api")

    public class JaxrsConfigurations extends Application {

    }

    Listing 3-23

    Root JAX-RS entry point

    ```


    The annotation `@ApplicationPath("api")` on line 1 tells the JAX-RS runtime that
    we want to host all REST endpoints in this application under the base path “api.”
    The class JaxrsConfigurations then extends the Application class from the JAX-RS
    API. With this configuration in place, all REST endpoints can be accessed as subpaths
    of the api path. So, for example, the hello path of the wallet service is http://localhost:3003/wallet/api/hello.


    The hello resource in the wallet module is declared in the class HelloResource
    as shown in Listing [3-24](#531256_1_En_3_Chapter.xhtml#PC24).


    ```

    @Path("hello")

    public class HelloResource {

    @GET

    @SimplyTimed

    @Traced

    String hello {

    return "Hello account module";

    }

    }

    Listing 3-24

    Hello endpoint

    ```


    JAX-RS resources are hosted as Java classes and resource endpoints hosted as methods
    of that class. In the HelloResource example earlier, line 1 declares that this
    class and all resources contained within it are hosted on under the /hello path.
    The @Path annotation is from the JAX-RS API. What this means is that any REST
    endpoint that we wish to expose in this class will be accessed as a subpath of
    the /hello path. Line 4 uses the @GET annotation to define the method hello declared
    on line 6 as an HTTP GET method . Because this method has no other path defined,
    it will be the default GET method called by the JAX-RS runtime when the path /wallet/api/hello
    is accessed.


    The return type of the method is the value that is returned to the client. In
    this example, the simple String message “Hello wallet module” is returned when
    a GET call to /hello is made. JAX-RS supports the return of many different types.
    Because the HelloResource class does not explicitly specify the content types
    it consumes and produces, the runtime defaults to using simple types. We will
    shortly see how we can declare the MIME^([^(75)](#fn75)) type a given JAX-RS resource
    consumes and produces.


    Line 5 also annotates the hello method with the @SimplyTimed annotation from the
    Eclipse MicroProfile metrics API. This annotation tracks elapsed time and count
    of the method invocation. Simply by annotating the hello method with this @SimplyTimed,
    the MicroProfile runtime is going to expose a metric for invocations of this method
    that tracks the number and duration of each call. The exposed metrics can be consumed
    by any number of applications. In the case of JWallet, we can see the metric through
    the bundled Prometheus (accessible at http://localhost:9090) and Grafana (accessible
    at http://localhost:3000) observability applications, as shown in Figure [3-2](#531256_1_En_3_Chapter.xhtml#Fig2).


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig2_HTML.png)


    A screenshot represents the bar graph of the JWallet Grafana metrics explore,
    bars start at 17 hours 9 minutes, and 45 seconds and end at 17 hours 11 minutes
    15 seconds.


    Figure 3-2


    Grafana metric explorer


    Line 6 also annotates the hello method with the @Traced annotation from the Eclipse
    MicroProfile metrics API. This annotation tracks incoming requests to the service
    and also subsequent requests to other services.


    In my sample deployment, the Hello resource of the wallet module (accessible at
    http://localhost:3001/wallet) has been called eight times, with each call listed
    in the list as shown in Figure [3-3](#531256_1_En_3_Chapter.xhtml#Fig3) (accessible
    at http://localhost:16686). Clicking one of the calls takes us to the detail page
    for the tracing as shown in Figure [3-4](#531256_1_En_3_Chapter.xhtml#Fig4).


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig4_HTML.png)


    A screenshot represents the trace details of jaeger tracing, which include the
    jwallet example, tags, and process.


    Figure 3-4


    Jaeger tracing – trace details


    ![](images/531256_1_En_3_Chapter/531256_1_En_3_Fig3_HTML.png)


    A screenshot represents the trace list of jaeger tracing, which consists of eight
    traces, compares traces by selecting result items, and contains wallet examples.


    Figure 3-3


    Jaeger tracing – trace list


    The detailed list of one of the traced calls shows the date and time of the call
    (1), the service in which the called resource is and the duration (2), and some
    details of the traced call, including the full resource endpoint (3). All of this
    detail is handled by the MicroProfile metrics runtime. All we had to do was to
    declare our hello resource method as timed. Chapter [6](#531256_1_En_6_Chapter.xhtml)
    goes into detail about the Jakarta RESTful Web Services API. For now, let us take
    a cursory look at the WalletResource.


    The Wallet resource is the root entry point into the application . It hosts the
    various methods for creating, debiting, crediting, and querying wallets. It is
    declared as shown in Listing [3-25](#531256_1_En_3_Chapter.xhtml#PC25).


    ```

    @Consumes(MediaType.APPLICATION_JSON)

    @Produces(MediaType.APPLICATION_JSON)

    @Path("wallets")

    public class WalletResource {

    @Inject

    WalletService walletService;

    ...

    }

    Listing 3-25

    Wallet module endpoints

    ```


    The Wallet resource is defined in class WalletResource.java. Lines 1 and 2 use
    the @Consumes and @Produces annotations to declare the MIME types that the resource
    methods of this resource class can consume and produce, respectively. Because
    the JSON^([^(76)](#fn76)) data format is the most popular format for RESTful web
    services, all the resource endpoints in JWallet consume and produce JSON data
    in the JSON format. For the WalletResource, the constant MediaType.APPLICATION_JSON
    passed to the two annotations tells the JAX-RS runtime that all resource methods
    declared in this class consume and produce JSON. What this implies is that clients
    can make calls to resource methods in this class, passing in any requisite data
    in JSON format. The runtime will handle the conversion between the passed JSON
    data and the corresponding Java type. The same thing goes for the returned type.'
