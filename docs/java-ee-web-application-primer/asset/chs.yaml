  ## Span 与 Div 标签


  `Span` 和 `div` 是用于定义文档各部分内容的容器标签。使用 `span` 和 `div` 可以为 JSP 或 HTML 页面的某个区域应用样式。将页面划分为页眉、正文和页脚等部分后，页面会更有条理。


  `<div>` 标签用于将 HTML 页面划分为多个区块，因此可以封装各种元素。`<span>` 标签用于对文档中的内联元素进行分组。`<div>` 和 `<span>`
  标签本身不会带来任何视觉变化。当每个标签包含 `style`、`class` 或 `id` 属性时，这些标签提供了一种控制文档部分内容样式的方式。ID 和 class
  的区别在于，ID 用于标识单个元素，而 class 可用于标识多个元素。当你希望对多个元素应用同一样式时，请将样式指定为 class，因为只能有一个元素拥有特定值的
  ID 属性，但多个元素可以在其 class 属性中共享相同的值。`<span>` 和 `<div>` 标签没有必需的属性。最常用的属性如下：


  *   `style` 指定一个样式，该样式应用于直到对应 `结束` 标签为止的所有内容和元素。

  *   `class` 指定一个 CSS 类，该类应用于直到 `结束` 标签为止的所有内容和元素。class 属性的值是在样式表文件中指定的 CSS 类。在样式表中，类名前面有一个点号。

  *   `id` 用于标识标签，以便你可以使用 jQuery 或 JavaScript 选择它。任何元素的 `id` 属性都必须是唯一的。在样式表中，ID 名称前面有一个
  `#` 井号。


