- "# 9. 控制器\n\n我们应用程序中的控制器层包含处理特定业务逻辑的代码。这包括从网页接收数据、将数据发送到服务层的类，以及根据情况将用户引导至下一个 Servlet\
  \ 或 JSP 等职责。控制器不直接访问数据库。控制器会确定需要执行的操作，然后在服务层或表示层找到合适的类，并调用该类来完成工作。在我们的应用程序中，控制器的大部分代码都位于\
  \ Java Servlet 中。\n\n## 什么是 Servlet？\n\nServlet 是响应传入 HTTP 请求的 Java 类。当您浏览某个 URL\
  \ 或提交表单时，浏览器会发送该请求。Servlet 位于 Web 服务器（Tomcat）内，并监听请求。然后，它们会立即启动并处理请求。可以想象成“接线员正在待命！”当您创建一个\
  \ Servlet 时，实际上是在扩展 Servlet 容器（Tomcat）的功能。可以将 Tomcat 视为一个 Web 服务器，它除了处理 HTML 之外，还知道如何处理\
  \ Servlet 和 JSP 文件。\n\n您的 Servlet 的 URL（网址）看起来会像 `http://localhost:8080/webTest/SimpleServlet`，其中\
  \ `localhost` 是代表您计算机的名称，`8080` 是端口号，`webTest` 是应用程序（或项目）名称，而 `SimpleServlet` 是\
  \ Servlet 的 `@WebServlet` 注解中指定的 Servlet URL。\n\n清单 9-1 中的 Servlet 代码展示了一个可以在 `@WebServlet`\
  \ 属性中指定的 `SimpleServlet` URL 下找到的 Servlet。它不包含处理请求的代码，仅展示结构。一个 Servlet 包含两个方法：`doGet`\
  \ 和 `doPost`。每个方法对应表单的 get 或 post 方法。当表单提交时，如果您仅使用表单值来获取只读数据（例如另一个网页），则应将表单标签的 method\
  \ 属性设置为 `GET`。如果 Web 表单使用 `GET`，数据会在 URL 中传输。您可以在 URL 中 `?` 符号后面看到参数及其值。这允许用户复制并粘贴链接，从而再次获得相同的结果。\n\
  \n当向服务器提交数据以录入数据库时，您应该使用 `POST` 方法。`POST` 不使用 URL 来提交数据。参数和值会通过一个数据包传输到服务器。这有几个优点，包括表单及其提交的数据无法被添加书签。使用\
  \ `POST` 还允许表单提交更大量的数据。\n\n```\n@WebServlet(\"/SimpleServlet\")\npublic class SimpleServlet\n\
  extends HttpServlet {\nprotected void doGet(\nHttpServletRequest request,    HttpServletResponse\
  \ response)\nthrows ServletException, IOException {\n//处理 GET 请求的代码写在这里\n}\nprotected\
  \ void doPost(\nHttpServletRequest request,    HttpServletResponse response)\nthrows\
  \ ServletException, IOException {\n//处理 POST 请求的代码写在这里\n}\n}\n清单 9-1\n一个简单的 Web\
  \ Servlet（不含导入语句）\n```\n\n## 将表单数据传入 Servlet\n\n当用户点击提交按钮时，表单中的数据会通过请求对象发送到 Servlet。Web\
  \ 服务器负责处理此事。Servlet 容器（Tomcat）将使请求对象对您的 Servlet 可用。您名为 `userName` 的输入将包含用户键入的名称。Servlet\
  \ 可以使用以下代码读取该名称：\n\n```\n//使用请求中的值设置一个变量\nString userEmail = request.getParameter(\"\
  userEmail\");\n```\n\n## 将数据发送到下一个页面\n\n您可以将任何数据（包括诸如 `ArrayLists` 之类的对象）添加到请求或会话中。这些数据将对\
  \ Servlet 调用的下一个页面可用。请注意，来自传入请求的请求包不会保留在作用域内，因此有必要将数据放回一个新的请求包中。\n\n```\n//将值放回\
  \ Servlet 的请求中\nrequest.setAttribute(\"userEmail\", userEmail);\n```\n\n现在，Servlet\
  \ 已将数据保存在名为 `userEmail` 的变量中。您现在只是在编写 Java 代码，因此可以按您认为合适的方式处理它。我们将使用 `userEmail`\
  \ 和 `userPassword` 变量来保存数据，然后验证它们是否符合我们的预期。起初，我们只会创建一个方法来验证已知的值。之后，我们将使用数据库来存储有效数据，并创建\
  \ Java 代码来查询数据库以检查结果。\n\n一旦 Servlet 验证了用户，他们将被重定向到主页。如果他们输入了无效密码，他们将被重定向回登录页面。\n\
  \n## Servlet 如何找到下一个页面\n\n在 Servlet 验证并处理完所有传入数据后，您需要指示它将用户带到下一个页面。\n\nServlet 的\
  \ `doPost` 或 `doGet` 方法中的最后一行将处理此操作。当 Servlet 执行到这行代码时，它会将用户发送到正确的页面。\n\n```\n//根据\
  \ nextURL 变量的值重定向到下一个页面\nString nextURL = \"home.jsp\";\ngetServletContext().getRequestDispatcher(nextURL)\n\
  .forward(request,response);\n```\n\n## 如何在输出页面上设置值\n\n创建一个名为 `home.jsp` 的 JSP 页面。将以下代码添加到您的页面，以便它能够读取来自\
  \ Servlet 的参数值。符号 `${userEmail}` 将从请求包中读取参数。您在 Servlet 中设置了该参数。\n\n```\n\n我的表单结果\n\
  \n使用 GET 方法读取表单数据\n\n名字: ${firstName} \n姓氏: ${lastName} \n\n```\n\n## 注销按钮如何工作\n\
  \n当用户想要注销时，您只需结束他们的会话即可。这使得注销变得简单。大多数用户不会点击注销按钮。对于他们来说，会话会在达到会话超时时结束。您可以设置会话超时属性，或者使用默认的\
  \ 20 分钟。\n\n创建一个表单，该表单将向您的登录 Servlet 传递一个名为 `action`、值为 `logout` 的参数。要传递该参数，您将创建一个隐藏输入，并为其指定名称和\
  \ ID 为 `action`，值为 `logout`。\n\n表单的 action 将是登录 Servlet 的名称。当 Servlet 接收到该参数时，它将使会话失效，并将用户重定向到登录页面。用于结束会话的\
  \ Java 代码是 `session.invalidate();`。\n\n\n\n## 登录 Servlet 代码\n\n```\n//LoginServlet.java\n\
  package controller;\n/*\n* 登录 servlet 处理 login.jsp。该 servlet 只有一个任务，\n* 即验证用户并将其添加到会话中，以便所有页面都能访问该用户。\n\
  * 如果用户无效，则登录 servlet 将重定向回登录页面。\n*/\nimport java.io.IOException;\nimport javax.servlet.ServletException;\n\
  import javax.servlet.annotation.WebServlet;\nimport javax.servlet.http.HttpServlet;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import javax.servlet.http.HttpSession;\nimport service.DbUser;\nimport model.Bhuser;\n\
  @WebServlet(\"/LoginServlet\")\npublic class LoginServlet extends HttpServlet {\n\
  private static final long serialVersionUID = 1L;\npublic LoginServlet() {\nsuper();\n\
  }\nprotected void doPost(HttpServletRequest request, HttpServletResponse response)\
  \ throws ServletException, IOException {\n//此页面不需要用户登录\nString useremail = request.getParameter(\"\
  email\");\nString userpassword = request.getParameter(\"password\");\nString action\
  \ = request.getParameter(\"action\");\n//String remember = request.getParameter(\"\
  remember\");\nString nextURL = \"/error.jsp\";\n//获取会话实例，以便我们可以向其设置属性\n//JSP 和 NavBar\
  \ 将从会话中读取数据\n//会话是在原本无状态的 Web 应用中维护状态的主要方式之一\nHttpSession session = request.getSession();\n\
  //创建用户实例并将其放入会话中\n//仅当用户有效时才将用户添加到会话中。\n//用户的存在用于确定谁拥有该站点，并将用于连接数据库\nif (action.equals(\"\
  logout\")){\nsession.invalidate();\nnextURL = \"/login.jsp\";\n}else{\nif (DbUser.isValidUser(useremail,userpassword)){\n\
  Bhuser user = DbUser.getUserByEmail(useremail);\nsession.setAttribute(\"user\",\
  \ user);\nint gravatarImageWidth = 30;\nString gravatarURL =\nDbUser.getGravatarURL(useremail,\
  \ gravatarImageWidth);\nsession.setAttribute(\"gravatarURL\", gravatarURL);\nnextURL\
  \ = \"/home.jsp\";\n}else{\nnextURL = \"/login.jsp\";\n}\n}\n//根据 nextURL 变量的值重定向到下一页\n\
  getServletContext().getRequestDispatcher(nextURL).forward(request,response);\n}\n\
  }\n//LoginServlet.java 结束\n列表 9-2\n登录 Servlet 的代码\n```\n\n## 新闻动态 Servlet 代码\n\n\
  ```\n//Newsfeed.java\npackage controller;\nimport java.io.IOException;\nimport java.util.List;\n\
  import javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
  import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport javax.servlet.http.HttpSession;\n\
  import model.Bhpost;\nimport service.DbPost;\n@WebServlet(\"/Newsfeed\")\npublic\
  \ class Newsfeed extends HttpServlet {\nprivate static final long serialVersionUID\
  \ = 1L;\npublic Newsfeed() {\nsuper();\n}\nprotected void doGet(HttpServletRequest\
  \ request, HttpServletResponse response) throws ServletException, IOException {\n\
  //用户可以通过 GET 请求访问此 servlet，因此在此处处理\n//对于 GET 请求，参数是 URL 的一部分。\n//我们已经在 doPost 中处理了所有内容，因此只需调用它即可。\n\
  doPost(request,response);\n}\nprotected void doPost(HttpServletRequest request,\
  \ HttpServletResponse response) throws ServletException, IOException {\nlong filterByUserID\
  \ = 0;\nString searchtext = \"\";\n//设置下一页的值。它应在下面的代码中更改。\nString nextURL = \"/error.jsp\"\
  ;\n//从会话中获取用户。\n//如果用户不存在，则将它们发送回登录页面。\n//同时销毁会话。\nHttpSession session = request.getSession();\n\
  if (session.getAttribute(\"user\")==null){\nnextURL = \"/login.jsp\";\nsession.invalidate();\n\
  response.sendRedirect(request.getContextPath() + nextURL);\nreturn;//返回以防止错误\n}\n\
  //根据参数获取帖子；如果没有参数，则获取所有帖子\nList posts = null;\nif (request.getParameter(\"userid\"\
  )!=null\n&& !request.getParameter(\"userid\").isEmpty()){\nfilterByUserID = Integer.parseInt(request.getParameter(\"\
  userid\"));\nposts = DbPost.postsofUser(filterByUserID);\n}else if (request.getParameter(\"\
  searchtext\")!=null\n&& !request.getParameter(\"searchtext\").isEmpty()){\nsearchtext\
  \ = request.getParameter(\"searchtext\").toString();\nposts = DbPost.searchPosts(searchtext);\n\
  }else{\nposts = DbPost.bhPost();\n}\n//将帖子添加到请求中\nrequest.setAttribute(\"posts\"\
  , posts);\n//在 newsfeed.jsp 中显示帖子\nnextURL = \"/newsfeed.jsp\";\n//根据 nextURL 变量的值重定向到下一页\n\
  getServletContext().getRequestDispatcher(nextURL).forward(request,response);\n}\n\
  }\n//Newsfeed.java 结束\n列表 9-3\n新闻动态 Servlet 的代码\n```\n\n## PostServ Servlet 代码\n\
  \n```\n//PostServ.java\npackage controller;\nimport java.io.IOException;\nimport\
  \ javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
  import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport javax.servlet.http.HttpSession;\n\
  import java.util.Calendar;\nimport java.util.Date;\nimport model.Bhpost;\nimport\
  \ model.Bhuser;\nimport service.DbPost;\n@WebServlet(\"/PostServ\")\npublic class\
  \ PostServ extends HttpServlet {\nprivate static final long serialVersionUID = 1L;\n\
  public PostServ() {\nsuper();\n}\nprotected void doPost(HttpServletRequest request,\n\
  HttpServletResponse response)\nthrows ServletException, IOException {\nString posttext\
  \ = request.getParameter(\"posttext\");\nString nextURL = \"/error.jsp\";\n//从会话中获取用户。如果用户不存在，则\n\
  //结束会话并将他们发送回登录页面。\nHttpSession session = request.getSession();\nif (session.getAttribute(\"\
  user\")==null){\nnextURL = \"/login.jsp\";\nsession.invalidate();\n} else {\n//从会话中获取用户\n\
  Bhuser bhuser = (Bhuser)session.getAttribute(\"user\");\n//插入帖子\nBhpost bhPost =\
  \ new Bhpost();\nbhPost.setBhuser(bhuser);\nDate postdate = Calendar.getInstance().getTime();//今天的日期\n\
  bhPost.setPostdate(postdate);\nbhPost.setPosttext(posttext);\nDbPost.insert(bhPost);\n\
  nextURL = \"/Newsfeed\";//转到新闻动态 servlet 以显示所有帖子\n}\n//nextURL 的值将是 newsfeed、login\
  \ 或 error\ngetServletContext().getRequestDispatcher(nextURL)\n.forward(request,\
  \ response);\n}\n}\n//PostServ.java 结束\n列表 9-4\nPostServ Servlet 的代码\n```\n\n\n\n\
  ## 个人资料 Servlet 代码\n\n```\n//ProfileServlet.java\npackage controller;\nimport java.io.IOException;\n\
  import javax.servlet.ServletException;\nimport javax.servlet.annotation.WebServlet;\n\
  import javax.servlet.http.HttpServlet;\nimport javax.servlet.http.HttpServletRequest;\n\
  import javax.servlet.http.HttpServletResponse;\nimport javax.servlet.http.HttpSession;\n\
  import java.text.SimpleDateFormat;\nimport service.DbUser;\nimport model.Bhuser;\n\
  @WebServlet(\"/ProfileServlet\")\npublic class ProfileServlet extends HttpServlet\
  \ {\nprivate static final long serialVersionUID = 1L;\npublic ProfileServlet() {\n\
  super();\n}\nprotected void doGet(HttpServletRequest request, HttpServletResponse\
  \ response) throws ServletException, IOException {\ndoPost(request,response);\n\
  }\nprotected void doPost(HttpServletRequest request, HttpServletResponse response)\
  \ throws ServletException, IOException {\n/*\n* 简化逻辑，使其始终需要两个参数：userid 和 action\n\
  * action 的值为 view 或 edit。如果是 edit，则会话中用户的 userID 必须与要编辑的个人资料的 userID 相同\n* 因为只能编辑自己的资料。\n\
  * 所有访问此页面的 URL 都必须包含这两个参数，否则会报错。\n*/\nHttpSession session = request.getSession();\n\
  String nextURL = \"/error.jsp\";\nlong userid = 0;\nString action = \"\";\nBhuser\
  \ profileUser = null;\nBhuser loggedInUser = null;\n//从会话中获取用户。如果用户不存在，则将其重定向到登录页面。\n\
  //同时销毁会话。\nif (session.getAttribute(\"user\")==null){\nnextURL = \"/login.jsp\"\
  ;\nsession.invalidate();\nresponse.sendRedirect(request.getContextPath() + nextURL);\n\
  return;//提前返回以防止错误\n}\ntry{\nuserid = Long.parseLong(request.getParameter(\"userid\"\
  ));\naction = request.getParameter(\"action\");\n//如果 action 等于 updateprofile，则更新请求变量中的用户资料\n\
  if (request.getParameter(\"action\").equals(\"updateprofile\")){\nlong uid = Long.parseLong(request.getParameter(\"\
  userid\"));\nString userEmail = request.getParameter(\"useremail\");\nString userMotto\
  \ = request.getParameter(\"usermotto\");\nBhuser updateUser = DbUser.getUser(uid);\n\
  updateUser.setMotto(userMotto);\nupdateUser.setUseremail(userEmail);\nDbUser.update(updateUser);\n\
  }\n//根据参数获取用户\nprofileUser = DbUser.getUser(userid);\n//从会话中获取当前用户\nloggedInUser\
  \ = (Bhuser) session.getAttribute(\"user\");\nif (profileUser.getBhuserid()==loggedInUser.getBhuserid()){\n\
  //以表单形式显示个人资料\n//会话变量 editProfile 用于 JSP 以编辑模式显示个人资料\nsession.setAttribute(\"editProfile\"\
  , true);\n}else{\n//以只读模式显示个人资料\n//会话变量 editProfile 用于 JSP 以只读模式显示个人资料\nsession.setAttribute(\"\
  editProfile\", false);\n}\n//在属性中填充数据\nint imgSize = 120;\nSimpleDateFormat sdf\
  \ = new SimpleDateFormat(\"MMM d, yyyy\");\nString joindate = sdf.format(profileUser.getJoindate());\n\
  request.setAttribute(\"userid\", profileUser.getBhuserid());\nrequest.setAttribute(\"\
  userimage\",\nDbUser.getGravatarURL(profileUser.getUseremail(), imgSize));\nrequest.setAttribute(\"\
  username\", profileUser.getUsername());\nrequest.setAttribute(\"useremail\", profileUser.getUseremail());\n\
  request.setAttribute(\"usermotto\", profileUser.getMotto());\nrequest.setAttribute(\"\
  userjoindate\", joindate);\nnextURL = \"/profile.jsp\";\n}catch(Exception e){\n\
  //打印异常，以便在测试应用程序时查看\n//在生产环境中，不建议打印到控制台，因为这会消耗资源且不可见\nSystem.out.println(e);\n}\n\
  //根据 nextURL 变量的值重定向到下一页\ngetServletContext().getRequestDispatcher(nextURL)\n.forward(request,response);\n\
  }\n}\n//ProfileServlet.java\n清单 9-5\n个人资料 Servlet 的代码\n```\n\n## 添加用户 Servlet 代码\n\
  \n```\n//AddUser.java\npackage controller;\nimport java.io.IOException;\nimport\
  \ java.util.Calendar;\nimport java.util.Date;\nimport javax.servlet.ServletException;\n\
  import javax.servlet.annotation.WebServlet;\nimport javax.servlet.http.HttpServlet;\n\
  import javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\n\
  import javax.servlet.http.HttpSession;\nimport model.Bhuser;\nimport service.DbUser;\n\
  @WebServlet(\"/AddUser\")\npublic class AddUser extends HttpServlet {\nprivate static\
  \ final long serialVersionUID = 1L;\npublic AddUser() {\nsuper();\n}\nprotected\
  \ void doPost(HttpServletRequest request,\nHttpServletResponse response) throws\
  \ ServletException, IOException {\nHttpSession session = request.getSession();\n\
  //此页面不需要用户登录\nString userName = request.getParameter(\"userName\");\nString userEmail\
  \ = request.getParameter(\"userEmail\");\nString userPassword = request.getParameter(\"\
  userPassword\");\nString userMotto = request.getParameter(\"userMotto\");\nString\
  \ nextURL = \"/error.jsp\";\n//检查用户是否已存在（通过邮箱）\nBhuser user = DbUser.getUserByEmail(userEmail);\n\
  //如果用户不存在，则创建并添加用户\nif (user == null){\nuser = new Bhuser();\nuser.setUsername(userName);\n\
  user.setUseremail(userEmail);\nuser.setUserpassword(userPassword);\nDate joindate\
  \ = Calendar.getInstance().getTime();\nuser.setJoindate(joindate);\nuser.setMotto(userMotto);\n\
  DbUser.insert(user);\nnextURL = \"/home.jsp\";\n}else{\nString message = \"您已拥有一个账户\
  \ - \";\nrequest.setAttribute(\"message\", message);\nnextURL = \"/login.jsp\";\n\
  }\n//将用户添加到会话中\nsession.setAttribute(\"user\", user);\n//根据 nextURL 变量的值重定向到下一页\n\
  getServletContext().getRequestDispatcher(nextURL)\n.forward(request,response);\n\
  }\n}\n// AddUser.java 结束\n清单 9-6\n添加用户 Servlet 的代码\n```\n\n"
- '# 10. 表示层/视图


  用户通过他们的网页浏览器与您的应用程序进行交互。网页浏览器的作用是显示 HTML、JavaScript 和图像。每个网页文档都包含我们称之为头部（head）和主体（body）的两个部分。


  头部包含标题标签（title tag）、链接标签（link tag）和脚本标签（script tag）。链接标签和脚本标签分别允许页面包含用于样式表和 JavaScript
  的外部文件。我们的应用程序将包含指向 Bootstrap 样式表和 JavaScript 的链接。


  文档的主体包含更多信息。主体是浏览器中可见内容的存放位置。这包括表单、显示给用户的文本、链接和图像。主体中的所有内容都将使用标签进行标记，这些标签决定了内容将如何渲染。


  您可以在网页中包含注释，这些注释不会显示给用户。它们有助于您记录页面布局。


  '
- '# 11. 使用 HTML 设计网页


  HTML（超文本标记语言）是一种用于创建网页文档（网页）的标记语言。浏览器的主要功能是从网络服务器接收 HTML 格式的网页并进行显示。浏览器会应用由 HTML
  标签和 CSS 属性值指定的所有字体、样式和布局。这些内容可以通过使用 JavaScript（浏览器的编程语言）进行进一步操作。


  文档对象模型（DOM）是您 HTML 文档的一种树形结构表示。DOM 将每个节点视为代表文档一部分的对象。这些对象可以通过 JavaScript 以编程方式进行操作，从而使您的页面能够与用户交互。


  以下是您需要了解的关于 HTML 的全部内容：


  *   HTML 文档由称为标签的元素组成。

  *   网页文档中 HTML 元素的集合称为 DOM（文档对象模型）。

  *   标签用于标识文档内容和结构。

  *   标签通常包含为元素提供参数的属性。

  *   包含内容和标签的 HTML 文档由浏览器渲染，以显示网页的格式化版本。

  *   HTML 的最新版本称为 HTML5。




  '
- "# 12. HTML5 标签\n\n标签是通过将标签名称放入尖括号中来创建的，例如：`<tag>`。括号中的单词（此处为 tag）就是标签名称。标签包含一个开始标签和一个结束标签。开始标签仅包含尖括号中的标签名称。结束标签则在标签名称前加上一个正斜杠。例如：`<table></table>`。如果标签不包含任何数据，则开始标签和结束标签可以合并，例如\
  \ `<br/>`。\n\n标签可以包含属性，这些属性提供关于标签的更多信息。HTML5 属性使用名称-值对创建，通常放在标签名称旁边。在本章中，我们将讨论属性，然后介绍一些用于开发\
  \ Bullhorn 的标签。\n\n名称-值对由一组文本字符串表示，其中 `name=\"value\"`，通常用逗号、分号、空格或换行符分隔。HTML5 属性写在元素的标签内，并用空格分隔。参见清单\
  \ 12-1。\n\n```\n清单 12-1\n来自 HTML 表单的输入标签示例\n```\n\n在这段代码中，属性是 `type`、`id`、`name`\
  \ 和 `value`，它们的值始终跟在等号后面的引号内。属性提供了关于元素的额外信息。例如，我们现在知道，前面的 input 元素是一个文本框，由 `name`/`id`\
  \ 标识为 `email`，并包含默认值 `user@domain.com`。`id` 属性是元素的唯一标识符。`id` 被 CSS 和 JavaScript\
  \ 使用。`name` 属性为元素指定一个名称。我们在 servlet 中检索元素的值时使用该名称。对表单控件（例如 `<input>`）使用 name 属性。`Name`\
  \ 是在表单提交时发生的 `POST` 或 `GET` 调用中使用的标识符。使用 `id` 属性通过 CSS 或 JavaScript 来标识特定的 HTML\
  \ 元素。可以通过 `name` 查找元素，但使用 `id` 更简单。\n\n## 常用标签说明\n\n*   `<!DOCTYPE html>` 将文档标识为\
  \ HTML5 文档。这确保了不同浏览器会以相同方式解析该文档。\n*   `<head></head>` HTML 文档头部部分的所有数据都被视为元数据，即关于数据的数据。此部分的信息通常不会直接显示。相反，诸如\
  \ style 之类的元素会影响文档中其他元素的外观。头部部分中的某些项目可能被搜索引擎等程序用于了解有关页面的更多信息，以供参考。\n*   `<title></title>`\
  \ 属于文档的头部部分，设置显示在浏览器标签页中的标题。\n*   `<body></body>` 整个文档主体都包含在这两个标签内。\n*   `<h1></h1>`\
  \ 包含在这些标签内的任何文本通常显示为大的粗体字体标题，但实际格式取决于浏览器。有六个标题标签，从 h1（最大）到 h6（最小）。\n*   `<p></p>`\
  \ 段落标签内的任何内容都被视为一个段落。你可以向段落标签添加诸如 style 之类的属性，以控制哪些样式影响段落标签内的文本。\n*   `<img></img>`\
  \ 图像标签用于显示图像。它有两个你需要使用的属性：`src` 和 `alt`。`src` 属性包含图像文件的路径。该路径可以是文件名或 URL。`alt` 属性包含当图像不显示或无法看到时要显示的替代文本。屏幕阅读器也用它来描述图像。一个完整的图像标签看起来像这样：`<img\
  \ src=\"path/to/filename.png\" alt=\"我的猫的图片\"/>`\n\nHTML 表单允许用户向 Web 服务器提交数据。表单中的数据将在请求数据包中发送到\
  \ servlet。Servlet 将接收数据，并可以使用它来查询数据库或选择另一个页面发送给用户。参见清单 12-2。请注意，每个标签都有一个结束标签（或包含\
  \ `/>` 以表示它是自闭合的）。\n\n*   `<form></form>` `form` 标签包含用户输入表单的所有元素，该表单从用户获取数据并将其发送到\
  \ servlet。`form` 标签包含两个必需的属性：`method` 和 `action`。`method` 属性可以是 `\"get\"` 或 `\"\
  post\"`，它决定了数据如何发送到 servlet。`action` 属性包含处理表单数据的 servlet 的 URL。\n*   `<input></input>`\
  \ 表单的目的是从用户获取输入并显示将要发送到服务器的数据。从用户获取输入的方式是使用 `input` 标签。它将在网页上创建一个文本框。当点击提交按钮时，`input`\
