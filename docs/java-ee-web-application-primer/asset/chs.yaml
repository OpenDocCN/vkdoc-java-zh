  现在你已经在 Oracle 中创建了表并输入了一些测试数据，是时候回到 Eclipse 并将你的项目连接到数据库了。我们将使用 Java 持久化 API（JPA）来实现这一点。




  ## 实现 Java 持久化（JPA）


  Java 持久化 API（JPA）是一套标准，规定了 Java 如何使用实体（也称为 POJO，即普通 Java 对象）连接数据库。每个实体代表数据库表中的一行。JPA
  将数据库对象视为 Java 对象。我们的程序只需与实体交互，而实体则负责与数据库交互。


  有时，我们会有一个包含来自其他表数据的表。例如，Bullhorn 表中的一条帖子会包含一个用户 ID，用于标识提交该帖子的用户。使用 JPA，该 ID 会被替换为完整的
  `User` 对象，从而允许你从 `Post` 实体访问关于该用户的所有数据。


  JPA 允许你运用面向对象编程技能来处理数据库。此外，它还能让你的程序以统一的方式看待所有数据库。JPA 是一种对象关系映射规范。它负责处理连接数据库的细节。你只需为现有数据库设置各种参数的值，其余工作由
  JPA 完成。Eclipse JPA 工具会检查表，并为每个表创建一个类。类名基于表名。我们将使用 Eclipse JPA 工具来创建类及其 getter 和
  setter 方法。类的字段映射到表的字段。每个类代表数据库中的一个表。类的实例代表表中的一条记录（即一行）。Eclipse JPA 工具会处理序列和标识键，也会处理表关系。当你的表包含指向数据库中另一个表的外键时，你的类将包含一个代表该外键所对应表的对象实例。例如，`Posts`
  表中的 `userID` 列会变成嵌入在 `Posts` 类中的一个 `User` 对象。


  使用 JPA 的一个优势是，我们可以在不更改 Java 代码的情况下更换数据库。数据库信息存储在一个 XML 文件中，无需重新编译应用程序即可编辑该文件。你可以先用
  MySQL 编写应用程序，随着应用规模增长，再迁移到 Oracle，而无需对应用程序代码做任何更改。


  JPA 中的查询使用一种名为 JPQL（Java 持久化查询语言）的语言编写。这种语言对所有数据库都是相同的。


  要实现 JPA，我们需要配置一个名为 `persistence.xml` 的文件。该文件必须位于 Java 源代码文件夹下的 `META-INF` 文件夹中。Eclipse
  使用该配置来生成实体类。之后，我们将为应用程序创建辅助类。


  第一步是将三个 JAR 文件复制到项目的 `WEB-INF\lib` 文件夹中。本项目所需的 JAR 文件包含在代码下载包中。你也可以在 Bullhorn 应用程序的
  `WEB-INF\lib` 文件夹中找到它们。这些 JAR 文件分别是 `eclipselink.jar`、`javax.persistence_2.1.0.v201304241213.jar`
  和 `ojdbc6.jar`。


  ![A458483_1_En_7_Figa_HTML.jpg](img/A458483_1_En_7_Figa_HTML.jpg)


  注意


  请将以下 JAR 文件放置在 `WEB-INF\lib` 文件夹中：`eclipselink.jar`、`javax.persistence_2.1.0.v201304241213.jar`
  和 `ojdbc6.jar`。放置在其他位置可能无法正常工作。你也可以同时包含在 Bullhorn 中找到的其他 JAR 文件，我们稍后会用到它们。


  ## Persistence.xml 文件


  要配置 JPA，我们需要创建 `persistence.xml` 文件。在 Eclipse 中，有多种方法可以创建此类文件，但我们将把它创建在名为 `META-INF`
  的 `src` 目录下。JPA 规范要求必须使用这个特定位置。该文件可以是任何文本文件，你需要按照表 7-1 中所示的值进行填写。不想手动输入全部内容？你可以从本书附带的下载包中复制该文件。需要更改的值已在表中详细列出。你可能需要按所示内容进行修改。


  表 7-1


  Bullhorn 的 persistence.xml 文件元素设置


  | XML 标签名 | 推荐值 |

  | --- | --- |

  | Persistence Unit Name | Bullhorn |

  | Transaction Type | RESOURCE_LOCAL |

  | Provider | org.eclipse.persistence.jpa.PersistenceProvider |

  | Class | 为数据库中的每个表列出一次。因此应有两个 class 元素：model.Bhuser 和 model.Bhpost |

  | Exclude Unlisted Classes | False |

  | Java.persistence.jdbc.url | `jdbc:oracle:thin:@localhost:1521:ora1` |

  | javax.persistence.jdbc.user | system |

  | javax.persistence.jdbc.password | password |

  | javax.persistence.jdbc.driver | `oracle.jdbc.OracleDriver` |


