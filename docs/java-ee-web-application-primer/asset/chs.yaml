  代码。


  ## 软件


  我们的学生参加我们的课程，是为了学习如何为大型公司编程。我们发现这些技能是招聘我们学生的公司最常要求的。我们选择使用 Java 8、Oracle 12c 和 Eclipse
  来开发应用。同样，我们选择使用 JPA（Java 持久化 API）而不是 Hibernate。我们选择 JSTL（Java 标准标签库）而非其他可用选项。再次强调，这些技术教授核心技能，同时不会向学生隐藏所有实现细节。我们的应用旨在教学。我们提供完整的源代码。仅仅通过审查和修改源代码，您就能学到很多东西。本书回答了您在处理源代码后可能遇到的问题，而源代码则有助于解释本书中的概念是如何实现的。


