  请记住


  `persistence.xml` 文件必须位于 `src` 目录下的 `META-INF` 目录中。这是强制要求的位置。


  一旦设置好 `persistence.xml` 文件，你就可以让 Eclipse 根据数据库中的表自动生成实体了。为此，右键单击项目名称，选择“新建”，然后导航到“JPA”菜单下的“从表生成
  JPA 实体”。弹出的对话框将使用 `persistence.xml` 文件中的信息连接到数据库，并为每个表生成一个 Java 类。你的程序将使用这些 Java
  类（以及 `persistence.xml` 文件）来查找、添加、编辑和删除数据库中的记录。




