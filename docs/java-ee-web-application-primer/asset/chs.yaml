  ## 创建 DbUtilities 类


  每次应用程序连接数据库时，都会执行相同的代码。通过创建一个包含可复用方法的类，您可以根据需要调用这些方法，从而提高应用程序的效率。创建一个名为 `DbUtilities`
  的类。这将使您在需要读取或写入数据库时，能够简化对实体管理器的调用。该类将是静态的（无需实例化）。它将包含一个方法 `getFactory()`，该方法将返回
  `persistence.xml` 中标识的 `EntityManagerFactory` 实例。请参见清单 8-1。


