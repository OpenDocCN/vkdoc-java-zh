- '# 16. 使用 JavaScript 让网页动起来


  JavaScript 是浏览器的语言。它是一种面向对象的编程语言。虽然 JavaScript 看起来很像 Java（因为两者都基于 C 和 C++），但它们之间毫无关联。JavaScript
  通常用于以编程方式与 HTML 页面交互，这是通过操作 DOM（文档对象模型）来实现的。所有主流浏览器都支持 JavaScript。


  将 JavaScript 包含在网页中，只需将脚本放在 `<script>` 和 `</script>` 标签之间即可。你可以将脚本标签放在 `<head>`
  部分或页面底部。如果将 JavaScript 放在页面顶部或 `<head>` 标签之间，用户可能会看到几秒钟的空白页面。不过，一旦页面加载完成，所有功能从第一秒起就能完全正常运行。如果将
  JavaScript 放在页面底部，页面加载速度会显得更快，但 JavaScript 需要等到页面（和脚本）完全加载后才会运行。JavaScript 也可以保存在一个文本文件中（这种情况下不需要脚本标签），并在页面的
  `<head>` 部分引用它。这样你就可以在多个页面上复用同一个 JavaScript。从维护角度来看，使用链接文件更好，因为所有 JavaScript 都位于一个位置，便于更新。


  由于许多开发者觉得 JavaScript 使用起来有挑战性，多年来开发了各种库来简化 JavaScript 的常规任务。jQuery（[`http://www.jquery.com`](http://www.jquery.com)）适用于所有支持
  JavaScript 的浏览器，并使 JavaScript 的使用更加一致。jQuery 在 Bootstrap 中被广泛使用。我们稍后会介绍 Bootstrap；它让使用
  jQuery、HTML 和 CSS 变得更加有趣。


  注意


  操作 DOM 是 JavaScript 最强大的用途之一。通过 DOM，你可以遍历并修改整个页面，从简单地添加一个元素到重新排列页面上的多个区域。DOM 将文档分解成一个节点树。


