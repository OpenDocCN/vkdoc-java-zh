  HTML、CSS 和 JavaScript。它包含用于排版、表单、按钮、导航和其他界面组件的设计模板。


  BootStrap 允许你创建响应式网页。响应式网页会根据不同设备调整其布局。如果没有响应式设计，你将不得不为不同设备开发不同的页面。BootStrap 解决了这个问题，结束了这种混乱局面。它基于一个
