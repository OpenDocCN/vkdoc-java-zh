- fmt: "# Structured Query Language (SQL)\n\nA database has its own programming language,\
    \ `SQL` (Structured Query Language). `SQL` is a nonprocedural language that provides\
    \ database access. All database operations are performed using `SQL`. Java can\
    \ talk to the database management system using `SQL`. This is done using the `JDBC`\
    \ API, which allows your application to specify which records to retrieve based\
    \ on various criteria. For example, you can select records created between certain\
    \ dates or update only records that meet given criteria. `SQL` can also be used\
    \ to create database objects, such as user tables and saved queries, which are\
    \ known as views. A view contains no data itself but is simply the stored query\
    \ the use of which simplifies accessing the data.\n\n`SQL` (pronounced as the\
    \ letters S-Q-L or sequel) is a specialized database language that consists of\
    \ statements that are very close to English. `SQL` has one purpose: to communicate\
    \ with a database. We communicate with the database to add, update, or delete\
    \ data. We also communicate with the database to create and modify tables and\
    \ other database objects.\n\nAlmost every major DBMS supports `SQL`. Learning\
    \ `SQL` will enable you to interact with almost every database you might encounter.\
    \ `SQL` is easy to learn. The statements consist of descriptive English words.\
    \ `SQL` is powerful. Cleverly using the language elements allows you to perform\
    \ complex database operations. `SQL` is a standard governed by ANSI (American\
    \ National Standards Institute). In addition to the standard implementation of\
    \ `SQL`, most vendors implement their own proprietary extensions. The version\
    \ of `SQL` you use for Oracle may differ from the version you use to access other\
    \ databases.\n\n## Working with the Oracle Database\n\nJust as you use an IDE\
    \ (integrated development environment) to work with Java programs, you can also\
    \ use an IDE to work with Oracle databases. This IDE is called `SQL Developer`.\
    \ The virtual machine has a copy of `SQL Developer` already installed.\n\n## How\
    \ to Open and Use SQL Developer\n\nTo open `SQL Developer` in the virtual machine,\
    \ simply click its icon on the desktop.\n\n> **Tip**  \n> Oracle provides step-by-step\
    \ instructions for using `SQL Developer` on their technetwork website. If you\
    \ use the virtual machine, then everything is installed for you. Browse to [`http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html`](http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html).\n\
    \n# 3. Installing and Running Eclipse\n\nYour virtual machine contains all the\
    \ software you need to create Bullhorn—the Oracle Database 12c, `SQL Developer`,\
    \ and Java 1.8—but it doesn’t contain the Eclipse IDE. You will need to download\
    \ and install that yourself. Fortunately, the installation process is very easy.\n\
    \n## Install Eclipse on the Virtual Machine\n\nTo install Eclipse on the virtual\
    \ machine, you will need to open Firefox and download the Eclipse archive. Then,\
    \ you will need to extract the files from the archive. Next, you will need to\
    \ run the setup program that is included in the archive files. Finally, open Eclipse.\n\
    \n1. From the virtual machine, open the Firefox web browser. You can get to Firefox\
    \ by clicking on the Applications menu and selecting the icon for Firefox Web\
    \ Browser.\n2. Next, browse to [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads).\n\
    3. Click on the orange button to download Eclipse. You’ll be installing the latest\
    \ version, which is called Oxygen.\n4. You’ll be directed to another page with\
    \ an orange Download button. Click this one as well.\n5. Select the option to\
    \ open with the Archive Manager when this window is displayed. The Archive Manager\
    \ is the program that will extract your files.\n6. You’ll be prompted to select\
    \ a folder into which you want to place the extracted files. Browse to the Home\
    \ folder and select Extract.\n7. Check the option to open the folder to view the\
    \ files. Once you see the extracted files, look for the file called `eclipse-install`.\n\
    8. Select the option to install Eclipse for Java EE.\n9. Your folder should be\
    \ `/home/oracle/eclipse/jee-oxygen`.\n10. Click Launch.\n11. Accept the default\
    \ workspace. This is where your project files will be kept.\n\nYou have just installed\
    \ Eclipse Oxygen.\n\n## How to Change the Port in Tomcat\n\nBy default, Tomcat\
    \ is configured to listen on the following port numbers: 8005, 8080, and 8009.\
    \ The port we’re most interested in is 8080 since it’s used for HTTP access. When\
    \ you run a web application in Eclipse using Tomcat, the URL becomes `http://localhost:8080/ApplicationName`.\
    \ However, sometimes these ports are used by other software running on the computer.\
    \ Fortunately, Eclipse makes it easy to change the port numbers.\n\n1. From your\
    \ web project, in the Servers view, double-click on the server name.\n2. That\
    \ will open a configuration page for Tomcat as follows:\n3. Notice that the port\
    \ numbers are shown in the table on the right. Click to edit; for example:\n4.\
    \ Once you change the port number for HTTP from 8080 to 9000, you should press\
    \ `Ctrl + S` to save the change and restart the server.\n\nYour application should\
    \ now run without conflict. If you do get a conflict, then you’ve chosen another\
    \ used port. Repeat the process with a different port number. It’s best to select\
    \ a port within the range of 1025 to 65535. You can research “Well-known port\
    \ numbers” to find many articles explaining the reasoning here.\n\n# 4. Bullhorn\
    \ Site Overview\n\nThe diagram in Figure 4-1 illustrates how the site fits together.\
    \ Only the core components are shown. You may wish to add additional pages and\
    \ classes as needed.\n\n![A458483_1_En_4_Fig1_HTML.gif](A458483_1_En_4_Fig1_HTML.gif)\n\
    \n**Figure 4-1** The components that make up Bullhorn\n\n## The Components of\
    \ Bullhorn\n\n* **Servlets** – Java classes that extend the web server to provide\
    \ an interface to the browser and database or other servlets.\n* **JPA classes**\
    \ – Java Persistence API classes that are used to communicate between the servlets\
    \ and the database.\n* **Request objects** – represent information sent between\
    \ the browser and the servlets. This information might include email addresses\
    \ and passwords that are being used by the servlet to allow access to the site.\n\
    * **Sessions** – are the web server’s method or approach of retaining data while\
    \ the user is accessing the site.\n* **User objects** – The user information is\
    \ stored in a class that will be stored in the session and is available to all\
    \ pages for the current user.\n* **JSP (Java Server Pages)** – Web pages that\
    \ contain HTML and tags from the JSP Standard Tag Library to add functionality.\
    \ Because they contain code they can dynamically render for each user’s request.\
    \ The JSP Standard Tag Library permits each person to view their own version of\
    \ the page.\n* **HTML (Hypertext Markup Language) pages** – HTML is a system for\
    \ tagging text files to control fonts, colors, and images on your web pages.\n\
    \n> **Tip**  \n> To keep your HTML from getting too complicated, use CSS (Cascading\
    \ Style Sheets) and JavaScript to control the presentation of your content and\
    \ let HTML control the layout.\n\nThe Bullhorn application contains web pages\
    \ for login, home, news feed, and user profile. The user starts at the login page.\
    \ Once the user clicks the Login button, the request (data from the login form)\
    \ will be sent to the login servlet.\n\nThe login servlet will validate the user\
    \ against the database. A valid user will be stored in the session, which is the\
    \ website’s way of remembering data between page views. Invalid users will not\
    \ get past the login page until they enter a correct username and password combination.\n\
    \nWe will create other objects (classes) to validate data or support the classes\
    \ and pages shown in the diagram."
  raw: '## Structured Query Language (SQL)


    A database has its own programming language, SQL (Structured Query Language) .
    SQL is a nonprocedural language that provides database access. All database operations
    are performed using SQL. Java can talk to the database management system using
    SQL. This is done using the JDBC API, which allows your application to specify
    which records to retrieve based on various criteria. For example, you can select
    records created between certain dates or update only records that meet given criteria.
    SQL can also be used to create database objects, such as user tables and saved
    queries, which are known as views . A view contains no data itself but is simply
    the stored query the use of which simplifies accessing the data.


    SQL (pronounced as the letters S-Q-L or sequel) is a specialized database language
    that consists of statements that are very close to English. SQL has one purpose:
    to communicate with a database. We communicate with the database to add, update,
    or delete data. We also communicate with the database to create and modify tables
    and other database objects.


    Almost every major DBMS supports SQL. Learning SQL will enable you to interact
    with almost every database you might encounter. SQL is easy to learn. The statements
    consist of descriptive English words. SQL is powerful. Cleverly using the language
    elements allows you to perform complex database operations. SQL is a standard
    governed by ANSI (American National Standards Institute) . In addition to the
    standard implementation of SQL, most vendors implement their own proprietary extensions.
    The version of SQL) you use for Oracle may differ from the version you use to
    access other databases.


    ## Working with the Oracle Database


    Just as you use an IDE (integrated development environment) to work with Java
    programs, you can also use an IDE to work with Oracle databases . This IDE is
    called SQL Developer. The virtual machine has a copy of SQL Developer already
    installed.


    ## How to Open and Use SQL Developer


    To open SQL Developer in the virtual machine, simply click its icon on the desktop.


    Tip


    Oracle provides step-by-step instructions for using SQL Developer on their technetwork
    website. If you use the virtual machine, then everything is installed for you.
    Browse to [`http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html`](http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html)
    .


    # 3. Installing and Running Eclipse


    Your virtual machine contains all the software you need to create Bullhorn—the
    Oracle Database 12c, SQL Developer, and Java 1.8—but it doesn’t contain the Eclipse
    IDE . You will need to download and install that yourself. Fortunately, the installation
    process is very easy.


    Install Eclipse on the Virtual Machine


    To install Eclipse on the virtual machine , you will need to open Firefox and
    download the Eclipse archive. Then, you will need to extract the files from the
    archive. Next, you will need to run the setup program that is included in the
    archive files. Finally, open Eclipse.


    1.  From the virtual machine, open the Firefox web browser. You can get to Firefox
    by clicking on the Applications menu and selecting the icon for Firefox Web Browser.
     

    2.  Next, browse to [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads)
    .  

    3.  Click on the orange button to download Eclipse. You’ll be installing the latest
    version, which is called Oxygen.  

    4.  You’ll be directed to another page with an orange Download button. Click this
    one as well.  

    5.  Select the option to open with the Archive Manager when this window is displayed.
    The Archive Manager is the program that will extract your files.  

    6.  You’ll be prompted to select a folder into which you want to place the extracted
    files. Browse to the Home folder and select Extract.  

    7.  Check the option to open the folder to view the files. Once you see the extracted
    files, look for the file called `eclipse-install`.  

    8.  Select the option to install Eclipse for Java EE.  

    9.  Your folder should be `/home/oracle/eclipse/jee-oxygen`.  

    10.  Click Launch.  

    11.  Accept the default workspace. This is where your project files will be kept.
     


    You have just installed Eclipse Oxygen.


    How to Change the Port in Tomcat


    By default, Tomcat is configured to listen on the following port numbers: 8005,
    8080, and 8009\. The port we’re most interested in is 8080 since it’s used for
    HTTP access. When you run a web application in Eclipse using Tomcat, the URL becomes
    `http://localhost:8080/ApplicationName`. However, sometimes these ports are used
    by other software running on the computer. Fortunately, Eclipse makes it easy
    to change the port numbers.


    1.  From your web project, in the Servers view, double-click on the server name.
     

    2.  That will open a configuration page for Tomcat as follows:  

    3.  Notice that the port numbers are shown in the table on the right. Click to
    edit; for example:  

    4.  Once you change the port number for HTTP from 8080 to 9000, you should press
    `Ctrl + S` to save the change and restart the server.  


    Your application should now run without conflict. If you do get a conflict, then
    you’ve chosen another used port . Repeat the process with a different port number.
    It’s best to select a port within the range of 1025 to 65535\. You can research
    “Well-known port numbers” to find many articles explaining the reasoning here.


    # 4. Bullhorn Site Overview


    The diagram in Figure [4-1](#A458483_1_En_4_Chapter.html#Fig1) illustrates how
    the site fits together. Only the core components are shown. You may wish to add
    additional pages and classes as needed.


    ![A458483_1_En_4_Fig1_HTML.gif](A458483_1_En_4_Fig1_HTML.gif)


    Figure 4-1


    The components that make up Bullhorn


    ## The Components of Bullhorn


    *   Servlets Java classes that extend the web server to provide an interface to
    the browser and database or other servlets.

    *   JPA classes Java Persistence API classes that are used to communicate between
    the servlets and the database.

    *   Request objects represent information sent between the browser and the servlets.
    This information might include email addresses and passwords that are being used
    by the servlet to allow access to the site.

    *   Sessions are the web server’s method or approach of retaining data while the
    user is accessing the site.

    *   User objects The user information is stored in a class that will be stored
    in the session and is available to all pages for the current user.

    *   JSP (Java Server Pages) Web pages that contain HTML and tags from the JSP
    Standard Tag Library to add functionality. Because they contain code they can
    dynamically render for each user’s request. The JSP Standard Tag Library permits
    each person to view their own version of the page.

    *   HTML (Hypertext Markup Language) pages. HTML is a system for tagging text
    files to control fonts, colors, and images on your web pages.


    Tip


    To keep your HTML from getting too complicated, use CSS (Cascading Style Sheets)
    and JavaScript to control the presentation of your content and let HTML control
    the layout.


    The Bullhorn application contains web pages for login, home, news feed, and user
    profile. The user starts at the login page. Once the user clicks the Login button,
    the request (data from the login form) will be sent to the login servlet.


    The login servlet will validate the user against the database . A valid user will
    be stored in the session, which is the website’s way of remembering data between
    page views. Invalid users will not get past the login page until they enter a
    correct username and password combination.


    We will create other objects (classes) to validate data or support the classes
    and pages shown in the diagram.'
  trans: '

    ## 结构化查询语言（SQL）


    数据库拥有自己的编程语言，即 SQL（结构化查询语言）。SQL 是一种非过程化语言，用于提供数据库访问。所有数据库操作都通过 SQL 执行。Java 可以使用
    SQL 与数据库管理系统进行通信。这是通过 JDBC API 实现的，它允许你的应用程序根据各种条件指定要检索哪些记录。例如，你可以选择在特定日期之间创建的记录，或者仅更新满足给定条件的记录。SQL
    还可用于创建数据库对象，例如用户表和已保存的查询（即所谓的视图）。视图本身不包含任何数据，它只是存储的查询，使用它可以简化数据访问。


    SQL（发音为字母 S-Q-L 或 sequel）是一种专门的数据库语言，由非常接近英语的语句组成。SQL 只有一个目的：与数据库通信。我们与数据库通信以添加、更新或删除数据。我们还与数据库通信以创建和修改表及其他数据库对象。


    几乎所有主要的数据库管理系统都支持 SQL。学习 SQL 将使你能够与几乎任何你遇到的数据库进行交互。SQL 易于学习。其语句由描述性的英语单词组成。SQL
    功能强大。巧妙地使用语言元素可以让你执行复杂的数据库操作。SQL 是由 ANSI（美国国家标准学会）管理的标准。除了 SQL 的标准实现之外，大多数供应商还实现了自己的专有扩展。你用于
    Oracle 的 SQL 版本可能与你用于访问其他数据库的版本不同。


    ## 使用 Oracle 数据库


    就像你使用 IDE（集成开发环境）来处理 Java 程序一样，你也可以使用 IDE 来处理 Oracle 数据库。这个 IDE 叫做 SQL Developer。虚拟机中已经安装了
    SQL Developer 的副本。


    ## 如何打开和使用 SQL Developer


    要在虚拟机中打开 SQL Developer，只需点击桌面上的图标即可。


    提示


    Oracle 在其技术网络网站上提供了使用 SQL Developer 的分步说明。如果你使用虚拟机，那么所有内容都已为你安装好。请访问 [`http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html`](http://www.oracle.com/webfolder/technetwork/tutorials/obe/db/sqldev/r40/sqldev4.0_GS/sqldev4.0_GS.html)
    。


    # 3. 安装和运行 Eclipse


    你的虚拟机包含创建 Bullhorn 所需的所有软件——Oracle Database 12c、SQL Developer 和 Java 1.8——但它不包含
    Eclipse IDE。你需要自行下载并安装。幸运的是，安装过程非常简单。


    在虚拟机上安装 Eclipse


    要在虚拟机上安装 Eclipse，你需要打开 Firefox 并下载 Eclipse 归档文件。然后，你需要从归档文件中提取文件。接下来，你需要运行归档文件中包含的安装程序。最后，打开
    Eclipse。


    1.  从虚拟机中，打开 Firefox 网页浏览器。你可以通过点击“应用程序”菜单并选择 Firefox 网页浏览器的图标来打开 Firefox。

    2.  接下来，访问 [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads)
    。

    3.  点击橙色按钮下载 Eclipse。你将安装最新版本，名为 Oxygen。

    4.  你将被重定向到另一个带有橙色“下载”按钮的页面。也点击这个按钮。

    5.  当此窗口显示时，选择使用归档管理器打开的选项。归档管理器是用于提取文件的程序。

    6.  系统会提示你选择一个文件夹，用于放置提取的文件。浏览到主文件夹并选择“提取”。

    7.  勾选打开文件夹以查看文件的选项。看到提取的文件后，查找名为 `eclipse-install` 的文件。

    8.  选择安装用于 Java EE 的 Eclipse 的选项。

    9.  你的文件夹应为 `/home/oracle/eclipse/jee-oxygen`。

    10.  点击“启动”。

    11.  接受默认工作空间。你的项目文件将保存在此处。


    你已成功安装 Eclipse Oxygen。


    如何更改 Tomcat 中的端口


    默认情况下，Tomcat 配置为监听以下端口号：8005、8080 和 8009。我们最感兴趣的端口是 8080，因为它用于 HTTP 访问。当你在 Eclipse
    中使用 Tomcat 运行 Web 应用程序时，URL 将变为 `http://localhost:8080/ApplicationName`。但是，有时这些端口会被计算机上运行的其他软件占用。幸运的是，Eclipse
    可以轻松更改端口号。


    1.  在你的 Web 项目中，在“服务器”视图中，双击服务器名称。

    2.  这将打开 Tomcat 的配置页面，如下所示：

    3.  请注意，端口号显示在右侧的表格中。点击进行编辑；例如：

    4.  将 HTTP 的端口号从 8080 更改为 9000 后，你应该按 `Ctrl + S` 保存更改并重新启动服务器。


    你的应用程序现在应该可以无冲突地运行。如果确实遇到冲突，说明你选择了另一个已被使用的端口。使用不同的端口号重复此过程。最好选择 1025 到 65535 范围内的端口。你可以搜索“知名端口号”来查找许多解释此原理的文章。


    # 4. Bullhorn 网站概览


    图 4-1 中的图表说明了网站的组成方式。仅显示了核心组件。你可以根据需要添加额外的页面和类。


    ![A458483_1_En_4_Fig1_HTML.gif](img/A458483_1_En_4_Fig1_HTML.gif)


    图 4-1


    构成 Bullhorn 的组件


    ## Bullhorn 的组件


    *   Servlet Java 类，用于扩展 Web 服务器，为浏览器和数据库或其他 Servlet 提供接口。

    *   JPA 类 Java 持久化 API 类，用于在 Servlet 和数据库之间进行通信。

    *   请求对象 表示在浏览器和 Servlet 之间发送的信息。这些信息可能包括 Servlet 用于允许访问网站的电子邮件地址和密码。

    *   会话 是 Web 服务器在用户访问网站时保留数据的方法或途径。

    *   用户对象 用户信息存储在一个类中，该类将存储在会话中，并且当前用户的所有页面都可以访问。

    *   JSP（Java 服务器页面） 包含 HTML 和来自 JSP 标准标签库的标签的网页，用于添加功能。由于它们包含代码，因此可以为每个用户的请求动态渲染。JSP
    标准标签库允许每个人查看自己版本的页面。

    *   HTML（超文本标记语言）页面。HTML 是一种标记文本文件的系统，用于控制网页上的字体、颜色和图像。


    提示


    为了避免 HTML 过于复杂，请使用 CSS（层叠样式表）和 JavaScript 来控制内容的呈现，并让 HTML 控制布局。


    Bullhorn 应用程序包含用于登录、主页、新闻推送和用户个人资料的网页。用户从登录页面开始。一旦用户点击“登录”按钮，请求（来自登录表单的数据）将被发送到登录
    Servlet。


    登录 Servlet 将根据数据库验证用户。有效的用户将被存储在会话中，这是网站在页面视图之间记住数据的方式。无效的用户将无法通过登录页面，直到他们输入正确的用户名和密码组合。


    我们将创建其他对象（类）来验证数据或支持图中所示的类和页面。

