    # 18. 让页面在所有屏幕尺寸上正常工作


    响应式网页设计（RWD）指的是一种开发 Web 应用程序的方法，使其在从台式电脑到手机的任何尺寸屏幕上都能良好显示。电脑、手机或平板电脑的屏幕由像素组成。电脑常见的屏幕分辨率为
    1366 × 768。这意味着屏幕宽 1366 像素，高 768 像素。屏幕分辨率决定了文本和图像的显示清晰度。在更高分辨率下，项目显示得更清晰。它们也会显得更小，从而可以在屏幕上容纳更多内容。在平板电脑上查看时，屏幕可能只有
    1024 像素宽。手机可能只有 480 像素宽。创建一个能在不同设备上良好显示的网页，被称为使你的网页具有响应性。过去，开发人员实际上会为不同设备创建多个网站。


    BootStrap（[`http://getbootstrap.com`](http://getbootstrap.com)）是一个用于开发响应式 Web
    应用程序的库。它允许你快速开发应用程序界面，而无需花费大量时间学习 HTML、CSS 或 JavaScript。BootStrap 需要 jQuery 才能运行。你可以通过将以下内容添加到项目中来使用
    BootStrap：


    BootStrap 通过内容分发网络（CDN）提供其代码。这意味着最新版本的 BootStrap 存储在分布在世界各地的服务器上。你的页面可以通过在页面的
    `HEAD` 部分包含指向 BootStrap CDN 的链接来获取最新版本。


    ## 使用 BootStrap


    像你这样的开发人员负责编写代码。设计师负责让界面看起来美观。但并非每个项目都有设计师。有时这份工作也落在你头上。恭喜你！


    你有一个秘密武器。BootStrap 是用于在 Web 上开发响应式移动优先项目的最流行的 HTML、CSS 和 JS 框架。BootStrap 是一个库。它使用
    HTML、CSS 和 JavaScript。它包含用于排版、表单、按钮、导航和其他界面组件的设计模板。


    BootStrap 允许你创建响应式网页。响应式网页会根据不同设备调整其布局。如果没有响应式设计，你将不得不为不同设备开发不同的页面。BootStrap 解决了这个问题，结束了这种混乱局面。它基于一个
    1170 像素宽、12 列的布局。你可以在 HTML 标签中为不同设备（和分辨率）设置属性。清单 18-1 展示了一个三列布局的示例，该布局将放在页面的 body
    部分。你可以使用 `div` 标签轻松添加更多列。将你的内容放在 `body` 元素中。


    ```


