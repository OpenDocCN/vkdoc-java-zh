  trans: "\n# 6. 创建 Web 应用程序\n\n我们将把 Bullhorn 应用程序创建为一个动态 Web 项目，这样我们就可以使用 HTML、JSP、Servlet\
    \ 以及 JPA 连接数据库来开发它。如果你已经理解所有这些概念，现在就可以停止阅读了。如果你还不太明白，那么这些内容将在后续章节中逐步解释。\n\n我们的动态\
    \ Web 应用程序不仅包含静态 HTML 页面，还包含动态的 Java Server Pages（JSP）和 Servlet。我们能够在应用程序的不同部分之间传递数据。\n\
    \n数据库实际上是一个独立的软件，你的 Web 应用程序将与之通信。在许多系统中，数据库甚至完全位于另一台计算机上。JSP 会将信息发送给 Servlet。Servlet\
    \ 通过服务层将信息发送到数据库（并从数据库获取信息）。然后 Servlet 将结果返回给 JSP。\n\n注意\n\n可以直接从 JSP 向数据库发送信息。也可以在两个\
    \ JSP 之间传递信息。但我们不会这样做。我们会在每一次通信之间都加入一个 Servlet。这样我们就可以在 Servlet 中用一些 Java 代码拦截每条消息，从而轻松地验证、评估和重定向每条被拦截的消息。\n\
    \n## 使用 Eclipse 创建动态 Web 项目\n\nEclipse 为各种类型的项目预配置了模板。我发现动态 Web 项目最为实用。创建一个这样的项目只需几个简单的步骤。\n\
    \n1.  在 Eclipse 中选择 `File` ➤ `New` ➤ `Dynamic Web Project`。为项目命名，例如 `SampleDynamicWebProject`，如步骤\
    \ 2 所示。\n2.  选择目标运行时为 Tomcat v.8.0 或更高版本。在继续之前，系统可能会提示你安装 Tomcat。\n\n    ![A458483_1_En_6_Figa_HTML.jpg](img/A458483_1_En_6_Figa_HTML.jpg)\n\
    \n3.  点击 Finish。\n4.  如果系统提示，选择“Yes”以关联 Java EE 透视图。\n5.  一旦你的项目包含了一些网页，你可以在 Project\
    \ Explorer 中选择该页面，然后右键点击并选择 `Run As` ➤ `Run on Server` 来启动它们。你的应用程序将在 Eclipse\
    \ 中启动。\n\n    ![A458483_1_En_6_Fig1_HTML.jpg](img/A458483_1_En_6_Fig1_HTML.jpg)\n\
    \n    图 6-1\n\n    Eclipse 中动态 Web 项目的文件夹结构\n\n动态 Web 项目会生成用于组织 Java 代码的文件夹（见图\
    \ 6-1）。最重要的是 Java 源文件夹和 Web 内容文件夹。Java Servlet 和类应放置在 Java Resources 下的 `src`\
    \ 文件夹中。JSP 文件属于 `WebContent` 文件夹。JSP 文件不能放在 `WEB-INF` 中，否则你的应用程序将无法访问它们。将 `WEB-INF`\
    \ 下的 `lib` 文件夹用于 JAR（Java 归档）文件。当我们将数据库添加到项目中时，我们会用到 JAR 文件。\n\n提示\n\nBullhorn\
    \ 的 JAR（Java 归档）文件可以在 `WebContent/WEB-INF/lib` 中找到。对于你选择开发的任何动态 Web 应用程序，你都应该将\
    \ Bullhorn 中的所有 JAR 文件复制到 `/WEB-INF/lib` 目录中。\n\n# 7. DAO/仓库\n\nBullhorn 需要两个表，分别用于用户和帖子。我们将在\
    \ Oracle 中创建这些表，并分别命名为 `Bhuser` 和 `Bhpost`。用户表需要以下字段：用户名、用户邮箱、密码、座右铭和注册日期。帖子表将包含帖子文本、发帖日期以及创建该帖子的用户\
    \ ID 字段。每个表还将包含一个 ID 字段，用于唯一标识每条记录。我们可以通过运行脚本来指示 SQL Developer 构建这些表。只需在新的 SQL\
    \ 工作表中输入清单 7-1 中的文本即可。\n\n```\nCREATE TABLE BHUSER\n(\"BHUSERID\" NUMBER GENERATED\
    \ BY DEFAULT ON NULL AS IDENTITY MINVALUE 1 MAXVALUE 9999999999999999999999999999\
    \ INCREMENT BY 1 START WITH 1 CACHE 20 NOORDER NOCYCLE,\n\"USERNAME\" VARCHAR2(50\
    \ BYTE) NOT NULL,\n\"USERPASSWORD\" VARCHAR2(50 BYTE),\n\"MOTTO\" VARCHAR2(100\
    \ BYTE) NOT NULL,\n\"USEREMAIL\" VARCHAR2(100 BYTE) NOT NULL,\n\"JOINDATE\" DATE\
    \ NOT NULL,\nPRIMARY KEY (\"BHUSERID\")\n) ;\n清单 7-1\nBhuser 表的数据定义\n```\n\n现在我们有了存储用户的地方，可以再添加一个表来存储帖子。创建\
    \ `Bhpost` 表的 SQL 如清单 7-2 所示。你需要在 SQL Developer 的 SQL 工作表中输入这些内容。许多开发人员使用同一个 SQL\
    \ 工作表，将每个表一个接一个地输入。一旦 SQL 输入到工作表中，选中这些语句，然后同时按下 Ctrl 和 Enter 键。首先创建 `Bhuser` 表，因为\
    \ `Bhpost` 表包含一个外键，代表 `Bhuser` 表中的 `BhuserId`。\n\n```\nCREATE TABLE BHPOST\n(\"\
    POSTID\" NUMBER GENERATED BY DEFAULT ON NULL AS IDENTITY MINVALUE 1 MAXVALUE 9999999999999999999999999999\
    \ INCREMENT BY 1 START WITH 1 CACHE 20 NOORDER NOCYCLE,\n\"POSTDATE\" DATE NOT\
    \ NULL,\n\"POSTTEXT\" VARCHAR2(141 BYTE) NOT NULL,\n\"BHUSERID\" NUMBER NOT NULL,\n\
    PRIMARY KEY (\"POSTID\")\n);\n清单 7-2\n创建 Bhpost 表的 SQL\n```\n\n接下来，你可能希望输入一些测试数据。清单\
    \ 7-3 和 7-4 展示了一些可以运行的语句。将 SQL 输入到 SQL Developer 中，选中这些语句，然后按 Ctrl + Enter。\n\n\
    ```\nInsert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values\
    \ ('user 1','password','motto for user 1','user1@domain.com',to_date('18-JUN-16','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 2','password','motto for user 2','user2@domain.com',to_date('22-JUL-15','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 3','password','motto for user 3','user3@domain.com',to_date('31-DEC-16','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 4','password','motto for user 4','user4@domain.com',to_date('22-JAN-17','DD-MON-RR'));\n\
    -- commit saves the data to the database\ncommit;\n清单 7-3\n为 Bhuser 表输入测试数据的 SQL\
    \ 语句\n```\n\n```\nInsert into BHPOST (POSTDATE,POSTTEXT,BHUSERID) values (to_date('18-JUN-17','DD-MON-RR'),'This\
    \ is a test post',1);\nInsert into BHPOST (POSTDATE,POSTTEXT,BHUSERID) values\
    \ (to_date('21-AUG-17','DD-MON-RR'),'Bullhorn is a fun program!',2);\nInsert into\
    \ BHPOST (POSTDATE,POSTTEXT,BHUSERID) values (to_date('30-JUL-17','DD-MON-RR'),'Hello,\
    \ I am posting something',2);\n-- commit saves the data to the database\ncommit;\n\
    清单 7-4\n为 Bhpost 表输入测试数据的 SQL 语句\n```\n\n如果你需要重新创建这些表，只需在 SQL 工作表中运行以下两行来删除它们（清单\
    \ 7-5）。\n\n```\nDROP TABLE BHPOST;\nDROP TABLE BHUSER;\n清单 7-5\n删除现有表和数据的 SQL\
    \ 语句\n```\n\n现在你已经在 Oracle 中创建了表并输入了一些测试数据，是时候回到 Eclipse 并将你的项目连接到数据库了。我们将使用 Java\
    \ 持久化 API（JPA）来实现这一点。\n"
- fmt: "## Implement Java Persistence (JPA)\n\nThe Java Persistence API (JPA) is a\
    \ set of standards that specify how Java will connect to a database using entities,\
    \ also known as POJO (plain old Java objects). Each entity represents a single\
    \ row in our database table. JPA treats the database objects as Java objects.\
    \ Our program simply interacts with the entity, which in turn interacts with the\
    \ database.\n\nSometimes we have a table that contains data from other tables.\
    \ For example, a post in the Bullhorn table will contain a user ID that identifies\
    \ the user who submitted the post. With JPA, the ID is replaced with the entire\
    \ `User` object, allowing you to access all the data about the user from the `Post`\
    \ entity.\n\nJPA allows you to use your object-oriented programming skills to\
    \ work with a database. Furthermore, it makes all databases look the same to your\
    \ program. JPA is an object-relational mapping specification. It takes care of\
    \ the details of connecting to the database. You set the values of various parameters\
    \ for your existing database, and JPA will do the rest. The Eclipse JPA tools\
    \ examine the tables and create a class for each. The class name is based on the\
    \ table name. We will use Eclipse JPA tools to create the class and its getters\
    \ and setters. The class fields map to the table fields. Each class represents\
    \ one table in your database. An instance of a class represents one record, or\
    \ row, in the table. The Eclipse JPA tools will handle sequences and identity\
    \ keys. They will also handle table relationships. When your table contains a\
    \ foreign key to another record in another table in the database, your class will\
    \ contain an instance of the object representing the foreign key’s table. For\
    \ example, a `userID` column in your `Posts` table becomes a `User` object embedded\
    \ in your `Posts` class.\n\nAn advantage of using JPA is that we can change the\
    \ database without changing our Java code. The database information is stored\
    \ in an XML file, which can be edited without recompiling your application. You\
    \ may start off writing your application using MySQL, then as it grows move up\
    \ to Oracle without any changes to your application code.\n\nQueries in JPA are\
    \ written in a language called JPQL (Java Persistence Query Language). This language\
    \ is the same for all databases.\n\nTo implement JPA we need to configure a file\
    \ called the `persistence.xml`. This file must be found under the Java source\
    \ code folder in a folder called `META-INF`. Eclipse uses that configuration to\
    \ generate the entity classes. After that, we will create helper classes for our\
    \ application.\n\nThe first step is to copy three JAR files to the `WEB-INF\\\
    lib` folder of your project. The JAR files for this project are included with\
    \ the code download. They can also be found in the `WEB-INF\\lib` folder of the\
    \ Bullhorn application. The JAR files are called `eclipselink.jar`, `javax.persistence_2.1.0.v201304241213.jar`,\
    \ and `ojdbc6.jar`.\n\n![A458483_1_En_7_Figa_HTML.jpg](A458483_1_En_7_Figa_HTML.jpg)\n\
    \n> **Note**  \n> Place the following JAR files in the `WEB-INF\\lib` folder:\
    \ `eclipselink.jar`, `javax.persistence_2.1.0.v201304241213.jar`, and `ojdbc6.jar`.\
    \ Any other location may not work. You may include the other JAR files you find\
    \ in Bullhorn at the same time. We’ll use them later.\n\n## The Persistence.xml\
    \ File\n\nTo configure JPA, we need to create the `persistence.xml` file. In Eclipse,\
    \ there are a few ways to create such a file, but we will create it in the `src`\
    \ directory called `META-INF`. This particular location is required by the JPA\
    \ specification. It can be any text file, which you will fill in with the values\
    \ shown in Table [7-1](#A458483_1_En_7_Chapter.html#Tab1). Don’t feel like typing\
    \ it all? You can copy the file from the download that accompanies this book.\
    \ The values you need to change are detailed in the table. You may need to modify\
    \ them as shown.\n\n**Table 7-1**  \nSettings for the Elements of the Bullhorn\
    \ `persistence.xml` File\n\n| XML Tag Name | Recommended Value |\n| --- | ---\
    \ |\n| Persistence Unit Name | Bullhorn |\n| Transaction Type | RESOURCE_LOCAL\
    \ |\n| Provider | `org.eclipse.persistence.jpa.PersistenceProvider` |\n| Class\
    \ | List once for each table in your database. So there should be two class elements:\
    \ `model.Bhuser` and `model.Bhpost` |\n| Exclude Unlisted Classes | False |\n\
    | `javax.persistence.jdbc.url` | `jdbc:oracle:thin:@localhost:1521:ora1` |\n|\
    \ `javax.persistence.jdbc.user` | system |\n| `javax.persistence.jdbc.password`\
    \ | password |\n| `javax.persistence.jdbc.driver` | `oracle.jdbc.OracleDriver`\
    \ |\n\nListing [7-6](#A458483_1_En_7_Chapter.html#Par21) shows the full `persistence.xml`\
    \ file.\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence xmlns=\"\
    http://java.sun.com/xml/ns/persistence\"\n             xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n             xsi:schemaLocation=\"http://java.sun.com/xml/ns/persistence\n \
    \            http://java.sun.com/xml/ns/persistence/persistence_2_0.xsd\"\n  \
    \           version=\"2.0\">\n    <persistence-unit name=\"Bullhorn\" transaction-type=\"\
    RESOURCE_LOCAL\">\n        <provider>org.eclipse.persistence.jpa.PersistenceProvider</provider>\n\
    \        <class>model.Bhpost</class>\n        <class>model.Bhuser</class>\n  \
    \      <exclude-unlisted-classes>false</exclude-unlisted-classes>\n        <properties>\n\
    \            <property name=\"javax.persistence.jdbc.url\" value=\"jdbc:oracle:thin:@localhost:1521:ora1\"\
    />\n            <property name=\"javax.persistence.jdbc.user\" value=\"system\"\
    />\n            <property name=\"javax.persistence.jdbc.password\" value=\"password\"\
    />\n            <property name=\"javax.persistence.jdbc.driver\" value=\"oracle.jdbc.OracleDriver\"\
    />\n        </properties>\n    </persistence-unit>\n</persistence>\n```\n\n**Listing\
    \ 7-6**  \nExample `persistence.xml` File That Details All the JPA Settings\n\n\
    > **Remember**  \n> The `persistence.xml` file belongs in the `META-INF` directory\
    \ found below the `src` directory. This location is required.\n\nOnce you have\
    \ your `persistence.xml` file set up, you are ready to let Eclipse automatically\
    \ generate the entities from the tables in your database. To do this, right-click\
    \ on the project name and select “New.” Then, navigate to the JPA menu for JPA\
    \ Entities from Tables. The resulting dialog box will use the information in your\
    \ `persistence.xml` file to connect to the database and generate a Java class\
    \ for each table. Your program will use these Java classes (and the `persistence.xml`\
    \ file) to find, add, edit, and delete records in the database."
  raw: '## Implement Java Persistence (JPA)


    The Java Persistence API (JPA) is a set of standards that specify how Java will
    connect to a database using entities, also known as POJO (plain old Java objects)
    . Each entity represents a single row in our database table. JPA treats the database
    objects as Java objects. Our program simply interacts with the entity, which in
    turn interacts with the database.


    Sometimes we have a table that contains data from other tables. For example, a
    post in the Bullhorn table will contain a user ID that identifies the user who
    submitted the post. With JPA, the ID is replaced with the entire `User` object,
    allowing you to access all the data about the user from the `Post` entity.


    JPA allows you to use your object-oriented programming skills to work with a database.
    Furthermore, it makes all databases look the same to your program. JPA is an object-relational
    mapping specification. It takes care of the details of connecting to the database.
    You set the values of various parameters for your existing database, and JPA will
    do the rest. The Eclipse JPA tools examine the tables and create a class for each.
    The class name is based on the table name. We will use Eclipse JPA tools to create
    the class and its getters and setters. The class fields map to the table fields.
    Each class represents one table in your database. An instance of a class represents
    one record, or row, in the table. The Eclipse JPA tools will handle sequences
    and identity keys. They will also handle table relationships. When your table
    contains a foreign key to another record in another table in the database, your
    class will contain an instance of the object representing the foreign key’s table.
    For example, a `userID` column in your `Posts` table becomes a `User` object embedded
    in your `Posts` class.


    An advantage of using JPA is that we can change the database without changing
    our Java code. The database information is stored in an XML file, which can be
    edited without recompiling your application. You may start off writing your application
    using MySQL, then as it grows move up to Oracle without any changes to your application
    code.


    Queries in JPA are written in a language called JPQL (Java Persistence Query Language)
    . This language is the same for all databases.


    To implement JPA we need to configure a file called the `persistence.xml`. This
    file must be found under the Java source code folder in a folder called `META-INF`
    . Eclipse uses that configuration to generate the entity classes. After that,
    we will create helper classes for our application.


    The first step is to copy three JAR files to the `WEB-INF\lib` folder of your
    project. The JAR files for this project are included with the code download. They
    can also be found in the `WEB-INF\lib` folder of the Bullhorn application. The
    JAR files are called `eclipselink` `.jar`, `javax.persistence_2.1.0.v201304241213.jar`,
    and `ojdbc6.jar`.


    ![A458483_1_En_7_Figa_HTML.jpg](A458483_1_En_7_Figa_HTML.jpg)


    Note


    Place the following JAR files in the `WEB-INF\lib` folder: `eclipselink.jar`,
    `javax.persistence_2.1.0.v201304241213.jar`, and `ojdbc6.jar`. Any other location
    may not work. You may include the other JAR files you find in Bullhorn at the
    same time. We’ll use them later.


    ## The Persistence.xml File


    To configure JPA, we need to create the `persistence.xml` file. In Eclipse, there
    are a few ways to create such a file, but we will create it in the `src` directory
    called `META-INF` . This particular location is required by the JPA specification
    . It can be any text file, which you will fill in with the values shown in Table
    [7-1](#A458483_1_En_7_Chapter.html#Tab1). Don’t feel like typing it all? You can
    copy the file from the download that accompanies this book. The values you need
    to change are detailed in the table. You may need to modify them as shown.


    Table 7-1


    Settings for the Elements of the Bullhorn persistence.xml File


    | XML Tag Name | Recommended Value |

    | --- | --- |

    | Persistence Unit Name | Bullhorn |

    | Transaction Type | RESOURCE_LOCAL |

    | Provider | org.eclipse.persistence.jpa.PersistenceProvider |

    | Class | List once for each table in your database. So there should be two class
    elements: model.Bhuser and model.Bhpost |

    | Exclude Unlisted Classes | False |

    | Java.persistence.jdbc.url | `jdbc:oracle:thin:@localhost:1521:ora1` |

    | javax.persistence.jdbc.user | system |

    | javax.persistence.jdbc.password | password |

    | javax.persistence.jdbc.driver | `oracle.jdbc.OracleDriver` |


    Listing [7-6](#A458483_1_En_7_Chapter.html#Par21) shows the full `persistence.xml`
    file.


    ```


    org.eclipse.persistence.jpa.PersistenceProvider


    model.Bhpost

    model.Bhuser


    False


    Listing 7-6

    Example persistence.xml File That Details All the JPA Settings

    ```


    Remember


    The `peristence.xml` file belongs in the `META-INF` directory found below the
    `src` directory. This location is required.


    Once you have your `persistence.xml` file set up, you are ready to let Eclipse
    automatically generate the entities from the tables in your database. To do this,
    right-click on the project name and select “New.” Then, navigate to the JPA menu
    for JPA Entities from Tables. The resulting dialog box will use the information
    in your `persistence` `.xml` file to connect to the database and generate a Java
    class for each table. Your program will use these Java classes (and the `persistence.xml`
    file) to find, add, edit, and delete records in the database.'
  trans: '

    ## 实现 Java 持久化（JPA）


    Java 持久化 API（JPA）是一套标准，规定了 Java 如何使用实体（也称为 POJO，即普通 Java 对象）连接数据库。每个实体代表数据库表中的一行。JPA
    将数据库对象视为 Java 对象。我们的程序只需与实体交互，而实体则负责与数据库交互。


    有时，我们会有一个包含来自其他表数据的表。例如，Bullhorn 表中的一条帖子会包含一个用户 ID，用于标识提交该帖子的用户。使用 JPA，该 ID 会被替换为完整的
    `User` 对象，从而允许你从 `Post` 实体访问关于该用户的所有数据。


    JPA 允许你运用面向对象编程技能来处理数据库。此外，它还能让你的程序以统一的方式看待所有数据库。JPA 是一种对象关系映射规范。它负责处理连接数据库的细节。你只需为现有数据库设置各种参数的值，其余工作由
    JPA 完成。Eclipse JPA 工具会检查表，并为每个表创建一个类。类名基于表名。我们将使用 Eclipse JPA 工具来创建类及其 getter
    和 setter 方法。类的字段映射到表的字段。每个类代表数据库中的一个表。类的实例代表表中的一条记录（即一行）。Eclipse JPA 工具会处理序列和标识键，也会处理表关系。当你的表包含指向数据库中另一个表的外键时，你的类将包含一个代表该外键所对应表的对象实例。例如，`Posts`
    表中的 `userID` 列会变成嵌入在 `Posts` 类中的一个 `User` 对象。


    使用 JPA 的一个优势是，我们可以在不更改 Java 代码的情况下更换数据库。数据库信息存储在一个 XML 文件中，无需重新编译应用程序即可编辑该文件。你可以先用
    MySQL 编写应用程序，随着应用规模增长，再迁移到 Oracle，而无需对应用程序代码做任何更改。


    JPA 中的查询使用一种名为 JPQL（Java 持久化查询语言）的语言编写。这种语言对所有数据库都是相同的。


    要实现 JPA，我们需要配置一个名为 `persistence.xml` 的文件。该文件必须位于 Java 源代码文件夹下的 `META-INF` 文件夹中。Eclipse
    使用该配置来生成实体类。之后，我们将为应用程序创建辅助类。


    第一步是将三个 JAR 文件复制到项目的 `WEB-INF\lib` 文件夹中。本项目所需的 JAR 文件包含在代码下载包中。你也可以在 Bullhorn
    应用程序的 `WEB-INF\lib` 文件夹中找到它们。这些 JAR 文件分别是 `eclipselink.jar`、`javax.persistence_2.1.0.v201304241213.jar`
    和 `ojdbc6.jar`。


    ![A458483_1_En_7_Figa_HTML.jpg](img/A458483_1_En_7_Figa_HTML.jpg)


    注意


    请将以下 JAR 文件放置在 `WEB-INF\lib` 文件夹中：`eclipselink.jar`、`javax.persistence_2.1.0.v201304241213.jar`
    和 `ojdbc6.jar`。放置在其他位置可能无法正常工作。你也可以同时包含在 Bullhorn 中找到的其他 JAR 文件，我们稍后会用到它们。


    ## Persistence.xml 文件


    要配置 JPA，我们需要创建 `persistence.xml` 文件。在 Eclipse 中，有多种方法可以创建此类文件，但我们将把它创建在名为 `META-INF`
    的 `src` 目录下。JPA 规范要求必须使用这个特定位置。该文件可以是任何文本文件，你需要按照表 7-1 中所示的值进行填写。不想手动输入全部内容？你可以从本书附带的下载包中复制该文件。需要更改的值已在表中详细列出。你可能需要按所示内容进行修改。


    表 7-1


    Bullhorn 的 persistence.xml 文件元素设置


    | XML 标签名 | 推荐值 |

    | --- | --- |

    | Persistence Unit Name | Bullhorn |

    | Transaction Type | RESOURCE_LOCAL |

    | Provider | org.eclipse.persistence.jpa.PersistenceProvider |

    | Class | 为数据库中的每个表列出一次。因此应有两个 class 元素：model.Bhuser 和 model.Bhpost |

    | Exclude Unlisted Classes | False |

    | Java.persistence.jdbc.url | `jdbc:oracle:thin:@localhost:1521:ora1` |

    | javax.persistence.jdbc.user | system |

    | javax.persistence.jdbc.password | password |

    | javax.persistence.jdbc.driver | `oracle.jdbc.OracleDriver` |


    清单 7-6 展示了完整的 `persistence.xml` 文件。


