    # 1. Getting Started


    VirtualBox allows you to create virtual computers within your physical computer,
    enabling you to run multiple computers on one system. Setting up VirtualBox requires
    very few steps. Once installed, you can then import an existing virtual computer
    and begin work using that system.


    Click and run the file to install VirtualBox just like with any other software
    you’ve ever downloaded. If you are using Windows, double-click the setup file
    and follow the prompts to install. If you are using a Mac, open the DMG file that
    you downloaded and drag the VirtualBox file to your Applications folder. During
    the installation, keep all of the options set to their default.


    Start the VirtualBox program. VirtualBox allows you to manage your various virtual
    machines and easily create new ones. You can run VirtualBox directly from the
    installation program, or you can start it from the desktop icon.


    Note


    Download VirtualBox from Oracle’s website:


    [`http://www.oracle.com/technetwork/server-storage/virtualbox/downloads/index.html`](http://www.oracle.com/technetwork/server-storage/virtualbox/downloads/index.html)'
