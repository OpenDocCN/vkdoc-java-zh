- fmt: "# 9. The Controller\n\nThe controller layer in our application contains code\
    \ to handle application-specific logic. This includes concerns such as receiving\
    \ data from web pages, sending data to the classes in the service layer, and sending\
    \ the user the next servlet or JSP as appropriate. The controller does not access\
    \ the database directly. The controller finds out what needs to be done, then\
    \ finds the right class in the service layer or presentation layer and calls on\
    \ that class to do its work. In our application, most of the code for the controller\
    \ resides in Java servlets.\n\n## What Is a Servlet?\n\nServlets are Java classes\
    \ that respond to incoming HTTP requests. The request is sent by the browser whenever\
    \ you browse to a URL or submit a form. Servlets reside within the web server—Tomcat—and\
    \ listen for requests. Then, they spring into action and process the request.\
    \ Think of “operators are standing by!” When you create a servlet you are actually\
    \ extending the functionality of the servlet container, Tomcat. Think of Tomcat\
    \ as a web server that knows how to work with servlets and JSP files in addition\
    \ to HTML.\n\nThe URL (web address) of your servlet will look something like `http://localhost:8080/webTest/SimpleServlet`,\
    \ where `localhost` is the name representing your computer, `8080` is the port\
    \ number, `webTest` is the application (or project) name, and `SimpleServlet`\
    \ is the servlet URL as indicated in the servlet’s `@WebServlet` annotation.\n\
    \nThe servlet code in Listing [9-1](#A458483_1_En_9_Chapter.html#Par6) features\
    \ a servlet that can be found at the `SimpleServlet` URL as specified in the `@WebServlet`\
    \ attribute. It contains no code to process a request, only showing the structure.\
    \ A servlet contains two methods, `doGet` and `doPost`. Each corresponds to the\
    \ get or post method of a form. When the form is submitted, the method attribute\
    \ of the form tag should be set to `GET` if you are only using the form values\
    \ to retrieve read-only data such as another web page. If the web form is using\
    \ `GET`, the data is transferred within the URL. You can see the parameter and\
    \ its values in the URL following a `?` symbol. This allows the user to copy and\
    \ paste a link and get the same results again.\n\nWhen submitting data to the\
    \ server for entry into the database, you should use the `POST` method. `POST`\
    \ does not use the URL to submit data. The parameters and values are transferred\
    \ to the server in a package of data. This has several advantages, including the\
    \ fact that the form and its submitted data cannot be bookmarked. Using `POST`\
    \ also allows a form to submit larger quantities of data.\n\n```\n@WebServlet(\"\
    /SimpleServlet\")\npublic class SimpleServlet\nextends HttpServlet {\nprotected\
    \ void doGet(\nHttpServletRequest request,    HttpServletResponse response)\n\
    throws ServletException, IOException {\n//code to handle GET requests goes here\n\
    }\nprotected void doPost(\nHttpServletRequest request,    HttpServletResponse\
    \ response)\nthrows ServletException, IOException {\n//code to handle POST requests\
    \ goes here\n}\n}\nListing 9-1\nA Simple Web Servlet (Excluding Import Statements)\n\
    ```\n\n## Getting the Form Data into the Servlet\n\nWhen the user clicks the Submit\
    \ button, the data from the form gets sent to the servlet in the request object.\
    \ The web server takes care of this. The servlet container, Tomcat, will make\
    \ the request object available to your servlet. Your input, named `userName`,\
    \ will contain the name that the user has typed. The servlet can read that name\
    \ by using the following code:\n\n```\n//set a variable with the value from the\
    \ request\nString userEmail = request.getParameter(\"userEmail\");\n```\n\n##\
    \ Sending the Data to the Next Page\n\nYou can add any data (including objects\
    \ such as `ArrayLists`) to the request or session. These will be available to\
    \ the next page the servlet calls. Note that the request packet from the incoming\
    \ request will not remain in scope, so it’s necessary to put the data back into\
    \ a new request packet.\n\n```\n//put the value back in the servlet's request\n\
    request.setAttribute(\"userEmail\", userEmail);\n```\n\nNow the servlet has the\
    \ data in a variable called `userEmail`. You’re just writing Java code now, so\
    \ you can work with it however you see fit. We’ll use the `userEmail` and `userPassword`\
    \ variables to hold the data and then validate that they match our expectations.\
    \ At first we’ll just create a method to validate known values. Later, we’ll use\
    \ the database to store the valid data and create Java code to query the database\
    \ to check the results.\n\nOnce the servlet validates the user they will be redirected\
    \ to the home page. If they entered an invalid password they will be redirected\
    \ back to the login page.\n\n## How the Servlet Finds the Next Page\n\nAfter the\
    \ servlet has validated and processed all the incoming data, you want to tell\
    \ it to take the user to the next page.\n\nThe last line in your servlet’s `doPost`\
    \ or `doGet` methods will handle that. When the servlet comes to this line of\
    \ code it will send the user to the correct page.\n\n```\n//redirect to next page\
    \ as indicated by the value of the nextURL variable\nString nextURL = \"home.jsp\"\
    ;\ngetServletContext().getRequestDispatcher(nextURL)\n.forward(request,response);\n\
    ```\n\n## How to Set Values on Your Output Page\n\nCreate a jsp page called `home.jsp`.\
    \ Add the following code to your page so it will read the values of the parameters\
    \ from the servlet. The notation `${userEmail}` will read the parameter from the\
    \ request packet. You set that in the servlet.\n\n```\n\nThe results of my form\n\
    \nUsing GET Method to Read Form Data\n\nFirst Name: ${firstName} \nLast Name:\
    \ ${lastName} \n\n```\n\n## How the Log Out Button Works\n\nWhen the user wants\
    \ to log out, you simply end their session. That makes logging out easy. Most\
    \ users won’t click the Log Out button. For them, the session ends when the session\
    \ timeout is reached. You can set the session timeout property or use the default\
    \ of 20 minutes.\n\nCreate a form that will pass a parameter called `action` with\
    \ a value of `logout` to your login servlet. To pass that parameter, you’ll create\
    \ a hidden input and give it a name and ID of `action` with a value of `logout`.\n\
    \nThe form’s action will be the name of the login servlet. When the servlet receives\
    \ the parameter it will invalidate the session and redirect the user to the login\
    \ page. The Java code to end a session is `session.invalidate();`."
  raw: "# 9. The Controller\n\nThe controller layer in our application contains code\
    \ to handle application-specific logic. This includes concerns such as receiving\
    \ data from web pages, sending data to the classes in the service layer, and sending\
    \ the user the next servlet or JSP as appropriate. The controller does not access\
    \ the database directly. The controller finds out what needs to be done, then\
    \ finds the right class in the service layer or presentation layer and calls on\
    \ that class to do its work. In our application, most of the code for the controller\
    \ resides in Java servlets.\n\n## What Is a Servlet?\n\nServlets are Java classes\
    \ that respond to incoming HTTP requests. The request is sent by the browser whenever\
    \ you browse to a URL or submit a form. Servlets reside within the web server—Tomcat—and\
    \ listen for requests. Then, they spring into action and process the request.\
    \ Think of “operators are standing by!” When you create a servlet you are actually\
    \ extending the functionality of the servlet container, Tomcat. Think of Tomcat\
    \ as a web server that knows how to work with servlets and JSP files in addition\
    \ to HTML .\n\nThe URL (web address) of your servlet will look something like\
    \ `http://localhost:8080/webTest/SimpleServlet`, where `localhost` is the name\
    \ representing your computer, `8080` is the port number, `webTest` is the application\
    \ (or project) name, and `SimpleServlet` is the servlet URL as indicated in the\
    \ servlet’s `@WebServlet` annotation.\n\nThe servlet code in Listing [9-1](#A458483_1_En_9_Chapter.html#Par6)\
    \ features a servlet that can be found at the `SimpleServlet` URL as specified\
    \ in the `@WebServlet` attribute. It contains no code to process a request, only\
    \ showing the structure. A servlet contains two methods, `doGet` and `doPost`.\
    \ Each corresponds to the get or post method of a form. When the form is submitted,\
    \ the method attribute of the form tag should be set to `GET` if you are only\
    \ using the form values to retrieve read-only data such as another web page. If\
    \ the web form is using `GET`, the data is transferred within the URL. You can\
    \ see the parameter and its values in the URL following a `?` symbol. This allows\
    \ the user to copy and paste a link and get the same results again.\n\nWhen submitting\
    \ data to the server for entry into the database, you should use the `POST` method.\
    \ `POST` does not use the URL to submit data. The parameters and values are transferred\
    \ to the server in a package of data. This has several advantages, including the\
    \ fact that the form and its submitted data cannot be bookmarked. Using `POST`\
    \ also allows a form to submit larger quantities of data.\n\n```\n@WebServlet(\"\
    /SimpleServlet\")\npublic class SimpleServlet\nextends HttpServlet {\nprotected\
    \ void doGet(\nHttpServletRequest request,    HttpServletResponse response)\n\
    throws ServletException, IOException {\n//code to handle GET requests goes here\n\
    }\nprotected void doPost(\nHttpServletRequest request,    HttpServletResponse\
    \ response)\nthrows ServletException, IOException {\n//code to handle POST requests\
    \ goes here\n}\n}\nListing 9-1\nA Simple Web Servlet (Excluding Import Statements)\n\
    ```\n\n## Getting the Form Data into the Servlet\n\nWhen the user clicks the Submit\
    \ button , the data from the form gets sent to the servlet in the request object.\
    \ The web server takes care of this. The servlet container, Tomcat , will make\
    \ the request object available to your servlet. Your input, named `userName`,\
    \ will contain the name that the user has typed. The servlet can read that name\
    \ by using the following code:\n\n```\n//set a variable with the value from the\
    \ request\nString userEmail = request.getParameter(\"userEmail\");\n```\n\n##\
    \ Sending the Data to the Next Page\n\nYou can add any data (including objects\
    \ such as `ArrayLists`) to the request or session. These will be available to\
    \ the next page the servlet calls. Note that the request packet from the incoming\
    \ request will not remain in scope, so it’s necessary to put the data back into\
    \ a new request packet.\n\n```\n//put the value back in the servlet's request\n\
    request.setAttribute(\"userEmail\", userEmail);\n```\n\nNow the servlet has the\
    \ data in a variable called `userEmail`. You’re just writing Java code now, so\
    \ you can work with it however you see fit. We’ll use the `userEmail` and `userPassword`\
    \ variables to hold the data and then validate that they match our expectations.\
    \ At first we’ll just create a method to validate known values. Later, we’ll use\
    \ the database to store the valid data and create Java code to query the database\
    \ to check the results.\n\nOnce the servlet validates the user they will be redirected\
    \ to the home page. If they entered an invalid password they will be redirected\
    \ back to the login page.\n\n## How the Servlet Finds the Next Page\n\nAfter the\
    \ servlet has validated and processed all the incoming data, you want to tell\
    \ it to take the user to the next page.\n\nThe last line in your servlet’s `doPost`\
    \ or `doGet` methods will handle that. When the servlet comes to this line of\
    \ code it will send the user to the correct page.\n\n```\n//redirect to next page\
    \ as indicated by the value of the nextURL variable\nString nextURL = \"home.jsp\"\
    ;\ngetServletContext().getRequestDispatcher(nextURL)\n.forward(request,response);\n\
    ```\n\n## How to Set Values on Your Output Page\n\nCreate a jsp page called `home.jsp`.\
    \ Add the following code to your page so it will read the values of the parameters\
    \ from the servlet. The notation `${userEmail}` will read the parameter from the\
    \ request packet. You set that in the servlet.\n\n```\n\nThe results of my form\n\
    \nUsing GET Method to Read Form Data\n\nFirst Name: ${firstName} \nLast Name:\
    \ ${lastName} \n\n```\n\n## How the Log Out Button Works\n\nWhen the user wants\
    \ to log out, you simply end their session. That makes logging out easy. Most\
    \ users won’t click the Log Out button . For them, the session ends when the session\
    \ timeout is reached. You can set the session timeout property or use the default\
    \ of 20 minutes.\n\nCreate a form that will pass a parameter called `action` with\
    \ a value of `logout` to your login servlet. To pass that parameter, you’ll create\
    \ a hidden input and give it a name and ID of `action` with a value of `logout`.\n\
    \nThe form’s action will be the name of the login servlet. When the servlet receives\
    \ the parameter it will invalidate the session and redirect the user to the login\
    \ page. The Java code to end a session is `session.invalidate();`."
  trans: "\n# 9. 控制器\n\n我们应用程序中的控制器层包含处理特定业务逻辑的代码。这包括从网页接收数据、将数据发送到服务层的类，以及根据情况将用户引导至下一个\
    \ Servlet 或 JSP 等职责。控制器不直接访问数据库。控制器会确定需要执行的操作，然后在服务层或表示层找到合适的类，并调用该类来完成工作。在我们的应用程序中，控制器的大部分代码都位于\
    \ Java Servlet 中。\n\n## 什么是 Servlet？\n\nServlet 是响应传入 HTTP 请求的 Java 类。当您浏览某个 URL\
    \ 或提交表单时，浏览器会发送该请求。Servlet 位于 Web 服务器（Tomcat）内，并监听请求。然后，它们会立即启动并处理请求。可以想象成“接线员正在待命！”当您创建一个\
    \ Servlet 时，实际上是在扩展 Servlet 容器（Tomcat）的功能。可以将 Tomcat 视为一个 Web 服务器，它除了处理 HTML 之外，还知道如何处理\
    \ Servlet 和 JSP 文件。\n\n您的 Servlet 的 URL（网址）看起来会像 `http://localhost:8080/webTest/SimpleServlet`，其中\
    \ `localhost` 是代表您计算机的名称，`8080` 是端口号，`webTest` 是应用程序（或项目）名称，而 `SimpleServlet`\
    \ 是 Servlet 的 `@WebServlet` 注解中指定的 Servlet URL。\n\n清单 9-1 中的 Servlet 代码展示了一个可以在\
    \ `@WebServlet` 属性中指定的 `SimpleServlet` URL 下找到的 Servlet。它不包含处理请求的代码，仅展示结构。一个 Servlet\
    \ 包含两个方法：`doGet` 和 `doPost`。每个方法对应表单的 get 或 post 方法。当表单提交时，如果您仅使用表单值来获取只读数据（例如另一个网页），则应将表单标签的\
    \ method 属性设置为 `GET`。如果 Web 表单使用 `GET`，数据会在 URL 中传输。您可以在 URL 中 `?` 符号后面看到参数及其值。这允许用户复制并粘贴链接，从而再次获得相同的结果。\n\
    \n当向服务器提交数据以录入数据库时，您应该使用 `POST` 方法。`POST` 不使用 URL 来提交数据。参数和值会通过一个数据包传输到服务器。这有几个优点，包括表单及其提交的数据无法被添加书签。使用\
    \ `POST` 还允许表单提交更大量的数据。\n\n```\n@WebServlet(\"/SimpleServlet\")\npublic class\
    \ SimpleServlet\nextends HttpServlet {\nprotected void doGet(\nHttpServletRequest\
    \ request,    HttpServletResponse response)\nthrows ServletException, IOException\
    \ {\n//处理 GET 请求的代码写在这里\n}\nprotected void doPost(\nHttpServletRequest request,\
    \    HttpServletResponse response)\nthrows ServletException, IOException {\n//处理\
    \ POST 请求的代码写在这里\n}\n}\n清单 9-1\n一个简单的 Web Servlet（不含导入语句）\n```\n\n## 将表单数据传入 Servlet\n\
    \n当用户点击提交按钮时，表单中的数据会通过请求对象发送到 Servlet。Web 服务器负责处理此事。Servlet 容器（Tomcat）将使请求对象对您的\
    \ Servlet 可用。您名为 `userName` 的输入将包含用户键入的名称。Servlet 可以使用以下代码读取该名称：\n\n```\n//使用请求中的值设置一个变量\n\
    String userEmail = request.getParameter(\"userEmail\");\n```\n\n## 将数据发送到下一个页面\n\
    \n您可以将任何数据（包括诸如 `ArrayLists` 之类的对象）添加到请求或会话中。这些数据将对 Servlet 调用的下一个页面可用。请注意，来自传入请求的请求包不会保留在作用域内，因此有必要将数据放回一个新的请求包中。\n\
    \n```\n//将值放回 Servlet 的请求中\nrequest.setAttribute(\"userEmail\", userEmail);\n\
    ```\n\n现在，Servlet 已将数据保存在名为 `userEmail` 的变量中。您现在只是在编写 Java 代码，因此可以按您认为合适的方式处理它。我们将使用\
    \ `userEmail` 和 `userPassword` 变量来保存数据，然后验证它们是否符合我们的预期。起初，我们只会创建一个方法来验证已知的值。之后，我们将使用数据库来存储有效数据，并创建\
    \ Java 代码来查询数据库以检查结果。\n\n一旦 Servlet 验证了用户，他们将被重定向到主页。如果他们输入了无效密码，他们将被重定向回登录页面。\n\
    \n## Servlet 如何找到下一个页面\n\n在 Servlet 验证并处理完所有传入数据后，您需要指示它将用户带到下一个页面。\n\nServlet\
    \ 的 `doPost` 或 `doGet` 方法中的最后一行将处理此操作。当 Servlet 执行到这行代码时，它会将用户发送到正确的页面。\n\n```\n\
    //根据 nextURL 变量的值重定向到下一个页面\nString nextURL = \"home.jsp\";\ngetServletContext().getRequestDispatcher(nextURL)\n\
    .forward(request,response);\n```\n\n## 如何在输出页面上设置值\n\n创建一个名为 `home.jsp` 的 JSP\
    \ 页面。将以下代码添加到您的页面，以便它能够读取来自 Servlet 的参数值。符号 `${userEmail}` 将从请求包中读取参数。您在 Servlet\
    \ 中设置了该参数。\n\n```\n\n我的表单结果\n\n使用 GET 方法读取表单数据\n\n名字: ${firstName} \n姓氏: ${lastName}\
    \ \n\n```\n\n## 注销按钮如何工作\n\n当用户想要注销时，您只需结束他们的会话即可。这使得注销变得简单。大多数用户不会点击注销按钮。对于他们来说，会话会在达到会话超时时结束。您可以设置会话超时属性，或者使用默认的\
    \ 20 分钟。\n\n创建一个表单，该表单将向您的登录 Servlet 传递一个名为 `action`、值为 `logout` 的参数。要传递该参数，您将创建一个隐藏输入，并为其指定名称和\
    \ ID 为 `action`，值为 `logout`。\n\n表单的 action 将是登录 Servlet 的名称。当 Servlet 接收到该参数时，它将使会话失效，并将用户重定向到登录页面。用于结束会话的\
    \ Java 代码是 `session.invalidate();`。\n"
- fmt: '# The Login Servlet Code


    ```java

    //LoginServlet.java

    package controller;

    /*

    * the login servlet processes login.jsp. The servlet has one job

    * which is to validate the user and add them to the session so

    * that user will be available to all pages. If the user is not valid

    * then the login servlet will redirect back to the login page.

    */

    import java.io.IOException;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import javax.servlet.http.HttpSession;

    import service.DbUser;

    import model.Bhuser;

    @WebServlet("/LoginServlet")

    public class LoginServlet extends HttpServlet {

    private static final long serialVersionUID = 1L;

    public LoginServlet() {

    super();

    }

    protected void doPost(HttpServletRequest request, HttpServletResponse response)
    throws ServletException, IOException {

    //this page does not require user to be logged in

    String useremail = request.getParameter("email");

    String userpassword = request.getParameter("password");

    String action = request.getParameter("action");

    //String remember = request.getParameter("remember");

    String nextURL = "/error.jsp";

    //get an instance of the session so we can set attributes to it

    //the JSP and NavBar will read from the session

    //The session is one of the primary ways we maintain state

    //in an otherwise stateless web application

    HttpSession session = request.getSession();

    //create an instance of the user and put it in the session

    //only add the user to the session if the user if valid.

    //The presence of the user is used to determine who

    //owns the site and will be used to connect to the database

    if (action.equals("logout")){

    session.invalidate();

    nextURL = "/login.jsp";

    }else{

    if (DbUser.isValidUser(useremail,userpassword)){

    Bhuser user = DbUser.getUserByEmail(useremail);

    session.setAttribute("user", user);

    int gravatarImageWidth = 30;

    String gravatarURL =

    DbUser.getGravatarURL(useremail, gravatarImageWidth);

    session.setAttribute("gravatarURL", gravatarURL);

    nextURL = "/home.jsp";

    }else{

    nextURL = "/login.jsp";

    }

    }

    //redirect to next page as indicated by the value of the nextURL variable

    getServletContext().getRequestDispatcher(nextURL).forward(request,response);

    }

    }

    //End of LoginServlet.java

    ```


    *Listing 9-2: The Code for the Login Servlet*


    ## The News Feed Servlet Code


    ```java

    //Newsfeed.java

    package controller;

    import java.io.IOException;

    import java.util.List;

    import javax.servlet.ServletException;

    import javax.servlet.annotation.WebServlet;

    import javax.servlet.http.HttpServlet;

    import javax.servlet.http.HttpServletRequest;

    import javax.servlet.http.HttpServletResponse;

    import javax.servlet.http.HttpSession;

    import model.Bhpost;

    import service.DbPost;

    @WebServlet("/Newsfeed")

    public class Newsfeed extends HttpServlet {

    private static final long serialVersionUID = 1L;

    public Newsfeed() {

    super();

    }

    protected void doGet(HttpServletRequest request, HttpServletResponse response)
    throws ServletException, IOException {

    //users can get to this servlet through a get request so handle it here

    //With a get request the parameters are part of the url.

    //We already handle everything in doPost so just call that.

    doPost(request,response);

    }

    protected void doPost(HttpServletRequest request, HttpServletResponse response)
    throws ServletException, IOException {

    long filterByUserID = 0;

    String searchtext = "";

    //set the value of the next page. It should change in the code below.

    String nextURL = "/error.jsp";

    //get user out of session.

    //If they don''t exist then send them back to the login page.

    //kill the session while you''re at it.

    HttpSession session = request.getSession();

    if (session.getAttribute("user")==null){

    nextURL = "/login.jsp";

    session.invalidate();

    response.sendRedirect(request.getContextPath() + nextURL);

    return;//return prevents an error

    }

    //get posts based on parameters; if no parameters then get all posts

    List posts = null;

    if (request.getParameter("userid")!=null

    && !request.getParameter("userid").isEmpty()){

    filterByUserID = Integer.parseInt(request.getParameter("userid"));

    posts = DbPost.postsofUser(filterByUserID);

    }else if (request.getParameter("searchtext")!=null

    && !request.getParameter("searchtext").isEmpty()){

    searchtext = request.getParameter("searchtext").toString();

    posts = DbPost.searchPosts(searchtext);

    }else{

    posts = DbPost.bhPost();

    }

    //add posts to request

    request.setAttribute("posts", posts);

    //display posts in newsfeed.jsp

    nextURL = "/newsfeed.jsp";

    //redirect to next page as indicated by the value of the nextURL variable

    getServletContext().getRequestDispatcher(nextURL).forward(request,response);

    }

    }

    //end of Newsfeed.java

    ```


