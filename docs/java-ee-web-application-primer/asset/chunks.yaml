    package controller;

    /*

    * 登录 servlet 处理 login.jsp。该 servlet 只有一个任务，

    * 即验证用户并将其添加到会话中，以便所有页面都能访问该用户。

    * 如果用户无效，则登录 servlet 将重定向回登录页面。

