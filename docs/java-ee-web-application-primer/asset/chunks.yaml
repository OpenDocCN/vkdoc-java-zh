- fmt: "# 6. Creating a Web Application\n\nWe will create the Bullhorn application\
    \ as a dynamic web project, which will allow us to develop it with HTML, JSP,\
    \ servlets, and using JPA to connect to the database. If you understand what all\
    \ those things are then you can stop reading now. If you’re still with me, then\
    \ those things will be explained as we go.\n\nOur dynamic web application will\
    \ contain not only static HTML pages but also dynamic Java Server Pages (JSPs)\
    \ and servlets. We’ll be able to pass data between the different parts of the\
    \ application.\n\nThe database is actually a separate piece of software that your\
    \ web application will communicate with. In many systems, the database actually\
    \ resides on a different computer entirely. The JSPs will send information to\
    \ the servlets. The servlets will send information to (and get information from)\
    \ the database through the service layer. And the servlet will send the result\
    \ back to the JSP.\n\n**Note**\n\nIt is possible to send information straight\
    \ to the database from a JSP. It is also possible to send information between\
    \ two JSPs. We won’t do that here. We’re putting a servlet in between every conversation.\
    \ That allows us to intercept each message with some Java code in the servlet,\
    \ which will make it easy to validate, evaluate, and redirect each intercepted\
    \ message.\n\n## Create a Dynamic Web Project Using Eclipse\n\nEclipse is preconfigured\
    \ for various types of projects. I find the Dynamic Web Project most helpful.\
    \ Starting one only consists of a few simple steps.\n\n1. From Eclipse choose\
    \ `File` ➤ `New` ➤ `Dynamic Web Project`. Give it a project name, such as `SampleDynamicWebProject`,\
    \ as shown in Step 2.\n2. Select the target runtime as Tomcat v.8.0 or higher.\
    \ You may be prompted to install Tomcat before you can continue.\n\n   ![A458483_1_En_6_Figa_HTML.jpg](A458483_1_En_6_Figa_HTML.jpg)\n\
    \n3. Click Finish.\n4. If prompted, select “Yes” to associate with a Java EE Perspective.\n\
    5. Once your project contains some web pages, you can start them by selecting\
    \ the page in the Project Explorer, then right-click and select `Run As` ➤ `Run\
    \ on Server`. Your application will start in Eclipse.\n\n   ![A458483_1_En_6_Fig1_HTML.jpg](A458483_1_En_6_Fig1_HTML.jpg)\n\
    \n   **Figure 6-1** The folder structure of a dynamic web project in Eclipse\n\
    \nThe dynamic web project generates folders for organizing Java code (see Figure\
    \ [6-1](#A458483_1_En_6_Chapter.html#Fig1)). The most important are the Java source\
    \ folder and the web content folder. Java servlets and classes should be placed\
    \ in the `src` folder shown under Java Resources. JSP files belong in the `WebContent`\
    \ folder. JSP files must not be placed in `WEB-INF` or they will not be accessible\
    \ by your application. Use the `lib` folder under `WEB-INF` for JAR (Java Archive)\
    \ files. We’ll work with JAR files when we add the database to our project.\n\n\
    **Tip**\n\nThe JAR (Java Archive) files for Bullhorn can be found in `WebContent/WEB-INF/lib`.\
    \ You should copy all the JAR files in Bullhorn to the `/WEB-INF/lib` directory\
    \ for any Dynamic Web Application you choose to develop.\n\n# 7. The DAO/Repository\n\
    \nBullhorn requires two tables, for users and posts. We’ll create these tables\
    \ in Oracle and call them `Bhuser` and `Bhpost`, respectively. The user table\
    \ will need the following fields: user name, user email, password, motto, and\
    \ join date. The posts table will contain fields for post text, post date, and\
    \ the ID of the user who created the post. Each table will also contain an ID\
    \ field to uniquely identify each record. We can instruct SQL Developer to construct\
    \ the tables by running scripts. Simply enter the text seen in Listing [7-1](#A458483_1_En_7_Chapter.html#Par2)\
    \ in SQL Developer inside a new SQL worksheet.\n\n```\nCREATE TABLE BHUSER\n(\"\
    BHUSERID\" NUMBER GENERATED BY DEFAULT ON NULL AS IDENTITY MINVALUE 1 MAXVALUE\
    \ 9999999999999999999999999999 INCREMENT BY 1 START WITH 1 CACHE 20 NOORDER NOCYCLE,\n\
    \"USERNAME\" VARCHAR2(50 BYTE) NOT NULL,\n\"USERPASSWORD\" VARCHAR2(50 BYTE),\n\
    \"MOTTO\" VARCHAR2(100 BYTE) NOT NULL,\n\"USEREMAIL\" VARCHAR2(100 BYTE) NOT NULL,\n\
    \"JOINDATE\" DATE NOT NULL,\nPRIMARY KEY (\"BHUSERID\")\n) ;\n```\n\n**Listing\
    \ 7-1** The Data Definition for the `Bhuser` Table\n\nNow that we have a place\
    \ to store our users, we can add another table in which to store the posts. The\
    \ SQL for creating the `Bhpost` table is shown in Listing [7-2](#A458483_1_En_7_Chapter.html#Par4).\
    \ You will enter that in SQL Developer in a SQL worksheet. Many developers use\
    \ the same SQL worksheet and enter each table one below the other. Once the SQL\
    \ is in a SQL worksheet, highlight the statements and press the CTRL and Enter\
    \ keys together. Create the `Bhuser` table first since the `Bhpost` table contains\
    \ a foreign key representing the `BhuserId` in the `Bhuser` table.\n\n```\nCREATE\
    \ TABLE BHPOST\n(\"POSTID\" NUMBER GENERATED BY DEFAULT ON NULL AS IDENTITY MINVALUE\
    \ 1 MAXVALUE 9999999999999999999999999999 INCREMENT BY 1 START WITH 1 CACHE 20\
    \ NOORDER NOCYCLE,\n\"POSTDATE\" DATE NOT NULL,\n\"POSTTEXT\" VARCHAR2(141 BYTE)\
    \ NOT NULL,\n\"BHUSERID\" NUMBER NOT NULL,\nPRIMARY KEY (\"POSTID\")\n);\n```\n\
    \n**Listing 7-2** SQL for Creating the `Bhpost` Table\n\nNext, you may wish to\
    \ enter some test data. Listings [7-3](#A458483_1_En_7_Chapter.html#Par6) and\
    \ [7-4](#A458483_1_En_7_Chapter.html#Par7) show a few statements you can run.\
    \ Enter the SQL into SQL Developer, highlight the statements, and press CTRL +\
    \ Enter.\n\n```\nInsert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE)\
    \ values ('user 1','password','motto for user 1','user1@domain.com',to_date('18-JUN-16','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 2','password','motto for user 2','user2@domain.com',to_date('22-JUL-15','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 3','password','motto for user 3','user3@domain.com',to_date('31-DEC-16','DD-MON-RR'));\n\
    Insert into BHUSER (USERNAME,USERPASSWORD,MOTTO,USEREMAIL,JOINDATE) values ('user\
    \ 4','password','motto for user 4','user4@domain.com',to_date('22-JAN-17','DD-MON-RR'));\n\
    -- commit saves the data to the database\ncommit;\n```\n\n**Listing 7-3** SQL\
    \ Statements for Entering Test Data for the `Bhuser` Table\n\n```\nInsert into\
    \ BHPOST (POSTDATE,POSTTEXT,BHUSERID) values (to_date('18-JUN-17','DD-MON-RR'),'This\
    \ is a test post',1);\nInsert into BHPOST (POSTDATE,POSTTEXT,BHUSERID) values\
    \ (to_date('21-AUG-17','DD-MON-RR'),'Bullhorn is a fun program!',2);\nInsert into\
    \ BHPOST (POSTDATE,POSTTEXT,BHUSERID) values (to_date('30-JUL-17','DD-MON-RR'),'Hello,\
    \ I am posting something',2);\n-- commit saves the data to the database\ncommit;\n\
    ```\n\n**Listing 7-4** SQL Statements for Entering Test Data for the `Bhpost`\
    \ Table\n\nIf you need to recreate the tables, you can just delete them by running\
    \ the following two lines in a SQL worksheet (Listing [7-5](#A458483_1_En_7_Chapter.html#Par9)).\n\
    \n```\nDROP TABLE BHPOST;\nDROP TABLE BHUSER;\n```\n\n**Listing 7-5** SQL Statements\
    \ for Deleting Existing Table and Data\n\nNow that you have your tables created\
    \ and some test data entered in Oracle, it’s time to go back to Eclipse and connect\
    \ your project to the database. We’ll use the Java Persistence API (JPA) for this."
