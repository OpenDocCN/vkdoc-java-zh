    To those who seek to teach themselves. Introduction


    Are you a Java developer wondering how to create an Enterprise application? Do
    you find the different components overwhelming or confusing, not knowing how they
    go together? We’re here to help. What if you could just get an example application
    working and use that knowledge to continue your Java journey?


    This book and the accompanying code will show you one way to create a website.
    It’s not the only way. It may not be the best way for every application. But it’s
    a way that will introduce you to the different components of Java Enterprise application
    development. And it’s a good way to get started.


    In Java EE Web Application Primer , you’ll learn the basics of Java EE application
    development. You’ll see how the parts connect. You will have the Java code for
    a complete, working application.


    ## The Software


    Our students take our courses to learn how to program for large companies. We
    have found these are the skills most requested by the companies hiring our students.
    We choose to use Java 8, Oracle 12c, and Eclipse for developing the application.
    Similarly, we choose to use JPA (Java Persistence API) instead of Hibernate. We
    choose JSTL (Java Standard Tag Library) over other available options. Again, these
    technologies teach core skills without hiding all the implementation details from
    the student. Our application is designed to teach. We provide the complete source
    code. You will learn much simply by reviewing and modifying the source code. This
    book answers the questions you may have after working with the source code, and
    the source code helps explain how the concepts in this book have been implemented.


    ## How to Use This Book


    We wrote this book based on our experience teaching Java bootcamps and other programming
    courses. The objective of our courses is to help people learn skills they can
    use at work. Businesses care more about results than theory, and we apply that
    principle to our application. This book answers the questions many of our students
    have about web application development when starting out.


    ## What Our Students Have Achieved


    > “I remember when the light bulbs started going off in my head, when the gibberish
    on the screen started to make sense. It was the most amazing feeling to start
    catching up with the rest of my impressive classmates.” —Vicky, now a project
    manager at a Fortune 100 company “I went through four years of university schooling
    in computer science, and I can honestly say that going through this course gave
    me a wealth of experience that I only had a taste of during my schooling. I certainly
    had project experience under my belt graduating with a tech degree, but doing
    project after project with Dave and Alton, the instructors, really cemented the
    theory and practices I had learned previously in stone. More than that, I got
    to patch up a lot of holes that I had left unfilled from missed opportunities
    in college.” —Francis, now an analyst at a Fortune 100 company


    If you’re ready to get started and develop your first Java Enterprise web application,
    we thank you for choosing our book to begin your journey. Know that you will face
    challenges and frustrations. You aren’t alone. We have found that as our students
    worked through those, they learned more about software development than we could
    ever teach in a book. You’re in the right place. Wait no longer. It’s time to
    move on to Chapter [1](#A458483_1_En_1_Chapter.html) !'
