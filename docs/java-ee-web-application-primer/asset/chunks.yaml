    ![A458483_1_En_4_Fig3_HTML.jpg](img/A458483_1_En_4_Fig3_HTML.jpg)


    图 4-3


    主页包含一个用于向数据库提交帖子的表单。该表单包含一个文本框以及用于提交帖子或清除表单的按钮。


    每个页面都包含相同的导航栏，允许用户在应用程序中移动。导航栏包含徽标、主页和动态消息页面的链接，以及一个搜索框。它还显示已登录用户的姓名。用户还可以从各种用户选项中进行选择，这些选项以下拉列表的形式实现。这些选项包括注销、查看或编辑个人资料以及提交反馈。见图
    4-4。


