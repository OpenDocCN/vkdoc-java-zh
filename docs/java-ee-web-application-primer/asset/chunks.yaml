    ## 基本的 HTML5 和 JSP 文档


    JSP（JavaServer Pages）页面是一个动态 HTML 页面。它同时包含 HTML 和 JSP 标签。内容可以根据用户正在查看的数据而变化。


    JSP 仍然是一个文本文档。它也像 HTML 文档一样包含 HTML 标签。但不仅如此。JSP 可以接收并显示由 servlet 发送的数据。现在你可以为每个用户个性化你的网站，而
    HTML 页面则为每个用户显示相同的内容。JSTL 允许你在 JSP 页面中嵌入逻辑，而无需直接使用 Java 代码。使用标准化标签不仅更安全，而且使代码更易于维护，并将
    Java 代码与用户界面分离。此模板将保存为扩展名为 .jsp 的文本文档。参见清单 12-4。


