- fmt: "# 19. Use Gravatar to Display User’s Avatars with Posts\n\nAn avatar is an\
    \ image people use for their online identity. Gravatar is a free service for providing\
    \ globally unique avatars. Gravatar allows users to register an account using\
    \ their email address. Users then upload an image to be associated with their\
    \ Gravatar account. When the user uses the same email address on a website that\
    \ uses Gravatar, the website retrieves the user’s avatar from Gravatar by using\
    \ an image URL based on a hash of the email address. Websites, including Bullhorn,\
    \ may freely use Gravatar to display the user’s image. Bullhorn displays the image\
    \ next to posts and on the profile page.\n\nTo control the size of the image,\
    \ append the URL with `?s=150` where 150 is the height or width in pixels of the\
    \ square image to be returned by the URL. The value of `s` can range from 1 to\
    \ 2048. Lower values will look better.\n\nIf a user does not have a Gravatar set\
    \ up then a default image will be displayed:\n\n[`https://www.gravatar.com/avatar/unknownhash`](https://www.gravatar.com/avatar/unknownhash)\n\
    \n![A458483_1_En_19_Figa_HTML.jpg](A458483_1_En_19_Figa_HTML.jpg)\n\n## Calculating\
    \ an MD5 Hash with Java\n\nAn MD5 hash is a way of encrypting text such that it\
    \ is not identifiable by looking at it. The value of MD5 is that the same email\
    \ address will always generate the same MD5 hash.\n\nThe Gravatar URL is made\
    \ from an MD5 hash of the user’s email address. You can create an MD5 hash of\
    \ an email address using code provided at the Gravatar website. This code is implemented\
    \ in Bullhorn in the `MD5Util.java` class. The code will return a string containing\
    \ the MD5 hash given the user’s email address.[¹](#A458483_1_En_19_Chapter.html#Fn1)\n\
    \nThe `DbUser` class in Bullhorn contains a method that generates the Gravatar\
    \ URL. The method takes two parameters, email and image size. The method then\
    \ returns the correct URL, which can be used in an image tag throughout the Bullhorn\
    \ site. See Listing [19-1](#A458483_1_En_19_Chapter.html#Par10).\n\n```\npublic\
    \ static String getGravatarURL(String email, Integer size){\nStringBuilder url\
    \ = new StringBuilder();\nurl.append(\"http://www.gravatar.com/avatar/\");\nurl.append(MD5Util.md5Hex(email));\n\
    url.append(\"?s=\" + size.toString());\nreturn url.toString();\n}\nListing 19-1\n\
    The Method to Generate a Gravatar URL Based on the User’s Email Address\n```\n\
    \n### Footnotes\n\nThe source code for the MD5 class in Bullhorn is derived from\
    \ that found at [`http://en.gravatar.com/site/implement/images/java`](http://en.gravatar.com/site/implement/images/java).\n\
    \n# 20. The Presentation/View\n\nThe presentation layer, also known as the view,\
    \ is the perspective your end user has of your application. They don’t see all\
    \ the Java code. They only see what the browser displays. The view consists mostly\
    \ of HTML, JavaScript, and images. In this section, we’ll look at the different\
    \ JSP files that make up the view. The JSP files contain other code such as JSTL,\
    \ but the end result is that they become HTML files sent to the user’s browser.\n\
    \nTo start, the user browses to the site’s URL for the `login.jsp` page. The URL\
    \ for your development environment will be `http://localhost:8080/Bullhorn/login.jsp`.\n\
    \n**Note**\n\nTo start your application in Eclipse, at the login page simply right-click\
    \ on the login page and select the option to Run on Server. Your site will open\
    \ in a browser inside the Eclipse environment.\n\n## The Code for the Login Page\n\
    \n```\nLogin\n\n${message}Please sign in\nEmail address\n\nPassword\n\nSign in\n\
    \nJoin\n\n```\n\n## The Code for the Home Page\n\n```\nBullhorn\n\nThis is the\
    \ home page\n\nCreate New Post (141 char):\n\n$(document).ready(function() {\n\
    var text_max = 141;\n$('#textarea_feedback').html(text_max + ' characters remaining');\n\
    $('#posttext').keyup(function() {\nvar text_length = $('#posttext').val().length;\n\
    var text_remaining = text_max - text_length;\n$('#textarea_feedback').html(text_remaining\
    \ + ' characters remaining');\n});\n});\nfunction validate(form) {\nvalid = true;\n\
    if ($('#posttext').val().length==0){\nalert(\"You may not submit an empty post.\"\
    );\nvalid = false;\n}\nreturn valid;\n}\n\n```\n\n## The Code for the News Feed\
    \ Page\n\n```\nBullHorn\n\nThis is the news feed page\n\nUserPostDate\n\n\">\n\
    \n```\n\n## The Code for the Profile Page\n\n```\nBullHorn\n\n/>&nbsp;&nbsp;Profile\
    \ for \nEmail: \nMotto: \nJoin Date:\n\n&nbsp;&nbsp;Edit Profile for ${username}\n\
    \nEmail: \nMotto: \nJoin Date:\n\n```\n\n## The Code for the Add User Page\n\n\
    ```\nBullHorn\n\nAdd New User\nName: \nEmail: \nPassword: \nMotto: \nJoin Date:\
    \ -->\n\n```\n\n## The Code for the Support Page\n\n```\nBullHorn\n\nThis is the\
    \ support page\n\n```\n\n## The Code for the Error Page\n\n```\nBullHorn\n\nSomething's\
    \ Wrong...\n\n```\n\n## The Navbar Include File\n\n```\nToggle navigation\n\n\
    &nbsp;Bullhorn\n\nHome(current)\nNews Feed\n\nSubmit\n\n&nbsp;${user.username}\n\
    \nUser Options\n\nLogout-->\n\nLogout\n\nShow my Posts\nEdit Profile\n\nFeedback\n\
    \n```\n\n## The BootStrap Include File\n\nThe BootStrap include file contains\
    \ links for the BootStrap files. These links come from the BootStrap website.\
    \ They use a content delivery service called MaxCDN to host their files. You don’t\
    \ have to download anything. Simply include the links from the BootStrap site,\
    \ and your application will retrieve the file over the internet.\n\nThe BootStrap\
    \ include file also contains links to some style sheets, which can be found in\
    \ the styles folder of your Bullhorn application. The styles folder lies below\
    \ the `WebContent` folder.\n\n## The Bootstrap Style Pages\n\nThe Bullhorn site\
    \ contains some style sheets that have been downloaded from [`https://bootswatch.com/`](https://bootswatch.com/).\
    \ This site contains free downloadable BootStrap themes that you can include in\
    \ your projects. Simply browse their collection and include them in your site.\
    \ Then, from each web page, you need to include a link to the theme you want to\
    \ use. This is done in the BootStrap include file.\n\n## The Footer Include File\n\
    \n```\n&nbsp;Bullhorn&nbsp;&nbsp;&copy; 2016\n\n```\n\n# Index\n\n## A\n\n- AddUser\
    \ servlet code\n- American National Standards Institute (ANSI)\n- Attributes\n\
    \  - action\n  - alt\n  - method\n  - name\n  - src\n  - type\n- Avatar\n\n##\
