    ## A Basic HTML5 and JSP Document


    A JSP (JavaServer Pages) page is a dynamic HTML page. It contains both HTML and
    JSP tags. The content can change depending on the data the user is viewing.


    A JSP is still a text document. It also contains HTML tags just like an HTML document.
    But there’s more. The JSP can receive and display data sent by the servlet. Now
    you can personalize your site for each user, whereas an HTML page displays the
    same for every user. JSTL allows you to embed logic within a JSP page without
    using Java code directly. Using standardized tags is not only more secure, but
    it also allows code to be more maintainable and keeps the Java code separate from
    the user interface. This template would be saved as a text document with a `.jsp`
    extension. See Listing [12-4](#A458483_1_En_12_Chapter.html#Par31).


