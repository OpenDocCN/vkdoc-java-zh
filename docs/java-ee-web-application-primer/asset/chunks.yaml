- fmt: '# 12. HTML5 Tags


    A tag is created by putting the tag names in angle brackets, like this: `<tag>`.
    The word in brackets, in this case `tag`, is the tag name. Tags contain an opening
    tag and a closing tag. An opening tag contains only the tag name in angle brackets.
    A closing tag precedes the tag name with a forward slash. For example: `<table></table>`.
    If a tag contains no data, then the opening and closing tags can be combined,
    as in `<br/>`.


    Tags can contain attributes that give further information about them. HTML5 attributes
    are created using a name-value pair and are usually put alongside the tag name.
    In this chapter, we’ll discuss attributes and then look at some of the tags we’ll
    use for developing Bullhorn.


    Name-value pairs are represented by a set of text strings in which `name="value"`
    and are usually separated by commas, semicolons, or space or newline characters.
    HTML5 attributes are written inside the element’s tag and separated by spaces.
    See Listing [12-1](#A458483_1_En_12_Chapter.html#Par4).


    ```

    Listing 12-1

    An Example Input Tag from an HTML Form

    ```


    In this code, the attributes are `type`, `id`, `name`, and `value`, and their
    values are always in quotes following the equal sign. Attributes provide extra
    information about an element. We now know, for example, the preceding input element
    is a text box, is identified by the `name`/`id` `email`, and contains a default
    value of `user@domain.com`. The `id` attribute is a unique identifier for the
    element. The `id` is used by CSS and JavaScript. The `name` attribute specifies
    a name for an element. We use the name when retrieving the element’s value in
    the servlet. Use `name` attributes for form controls (such as `<input>`). `Name`
    is the identifier used in the `POST` or `GET` call that happens on form submission.
    Use the `id` attribute to identify a particular HTML element with CSS or JavaScript.
    It’s possible to look up elements by `name` but simpler to use `id`.


    ## Explanation of Common Tags


    *   `<!DOCTYPE html>` Identifies the document as an HTML5 document. This makes
    sure the document will be parsed the same way by different browsers.

    *   `<head></head>` All data in the head section of an HTML document is considered
    metadata, meaning data about data. The information in this section is not normally
    displayed directly. Instead, elements such as style affect the appearance of other
    elements in the document. Some items in the head section may be used by programs
    such as search engines to learn more about the page for reference purposes.

    *   `<title></title>` Belongs in the head section of the document and sets the
    title that is displayed in the browser tab.

    *   `<body></body>` The entire document body is contained within these two tags.

    *   `<h1></h1>` Any text contained within these tags is often displayed as a large
    bold font heading, but the actual formatting is up to the browser. There are six
    heading tags, `h1` (largest) to `h6` (smallest).

    *   `<p></p>` Any content with the paragraph tags is considered a paragraph. You
    can add an attribute such as `style` to the paragraph tags to control which styles
    impact the text within the paragraph tags.

    *   `<img></img>` The image tag is used to display images. It has two attributes
    you need to use: `src` and `alt`. The `src` attribute contains the path to the
    image file. The path can be either a filename or a URL. The `alt` attribute contains
    the alternate text to be displayed when the images don’t show or can’t be seen.
    It is also used by screen readers to describe the image. A complete image tag
    would look like this: `<img src="path/to/filename.png" alt="Picture of my cat"/>`


    An HTML form allows the user to submit data to the web server. The data from the
    form will be sent in the request packet to the servlet. The servlet will receive
    the data and can use it to either query the database or choose another page to
    send the user to. See Listing [12-2](#A458483_1_En_12_Chapter.html#Par15). Notice
    that every tag has a closing tag (or contains `/>` to indicate it is self-closing).


    *   `<form></form>` The `form` tag contains all the elements of a user input form
    that gets data from the user and sends it to the servlet. The `form` tag contains
    two required attributes, `method` and `action`. The `method` attribute can be
    either `"get"` or `"post"`, and it determines how the data is sent to the servlet.
    The `action` attribute contains the URL of the servlet that processes the form
    data.

    *   `<input></input>` The purpose of a form is to get input from the user and
    display data that will be sent to the server. The way you get input from the user
    is with the `input` tag. It will create a text box on the web page. The contents
    of the `input` tag will be sent to the servlet when the Submit button is clicked.
    Submit itself is an input. An `input` tag becomes a Submit button when the `type`
    attribute is set to `"submit"`.


