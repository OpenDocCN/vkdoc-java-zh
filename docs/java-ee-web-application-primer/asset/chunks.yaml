    ## 每个页面的外观是怎样的？


    登录页面将包含文本框，用户可在其中输入电子邮件和密码。这些信息将在登录 servlet 中进行验证。如果与数据库中的信息匹配，用户将被重定向到其主页。如果不匹配，系统将提示用户重新登录。未在网站上注册的用户可以通过点击“加入”链接来注册登录。见图
    4-2。


    ![A458483_1_En_4_Fig2_HTML.jpg](img/A458483_1_En_4_Fig2_HTML.jpg)


    图 4-2


