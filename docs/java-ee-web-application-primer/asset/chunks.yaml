    您是否是一位 Java 开发者，想知道如何创建企业级应用？您是否觉得不同的组件令人不知所措或困惑，不知道它们如何组合在一起？我们在此为您提供帮助。如果您能先让一个示例应用运行起来，并利用这些知识继续您的
    Java 之旅，那会怎样？


    本书及其附带的代码将向您展示创建网站的一种方法。这不是唯一的方法。它可能不是适用于所有应用的最佳方法。但这是一种能向您介绍 Java 企业级应用开发不同组件的方法。而且这是一个很好的入门方法。


    在《Java EE Web 应用入门》中，您将学习 Java EE 应用开发的基础知识。您将看到各个部分是如何连接的。您将获得一个完整、可运行应用的 Java
    代码。


    ## 软件


    我们的学生参加我们的课程，是为了学习如何为大型公司编程。我们发现这些技能是招聘我们学生的公司最常要求的。我们选择使用 Java 8、Oracle 12c 和
    Eclipse 来开发应用。同样，我们选择使用 JPA（Java 持久化 API）而不是 Hibernate。我们选择 JSTL（Java 标准标签库）而非其他可用选项。再次强调，这些技术教授核心技能，同时不会向学生隐藏所有实现细节。我们的应用旨在教学。我们提供完整的源代码。仅仅通过审查和修改源代码，您就能学到很多东西。本书回答了您在处理源代码后可能遇到的问题，而源代码则有助于解释本书中的概念是如何实现的。


    ## 如何使用本书


    我们根据教授 Java 训练营和其他编程课程的经验撰写了本书。我们课程的目标是帮助人们学习能在工作中使用的技能。企业更看重结果而非理论，我们将这一原则应用于我们的应用。本书回答了我们许多学生在刚开始接触
    Web 应用开发时遇到的问题。


    ## 我们学生取得的成就


    > “我记得当我脑海中的灯泡开始亮起，屏幕上的乱码开始变得有意义时。开始赶上我那些令人印象深刻的同学们，那是最奇妙的感觉。” ——维基，现为一家财富 100
    强公司的项目经理 “我经历了四年的计算机科学大学教育，我可以诚实地说，参加这门课程给了我丰富的经验，而这些经验我在学校期间只是浅尝辄止。我毕业时确实带着技术学位和项目经验，但与讲师戴夫和阿尔顿一起做一个又一个项目，确实将我先前学到的理论和实践牢牢巩固。更重要的是，我填补了大学期间因错失机会而留下的许多空白。”
    ——弗朗西斯，现为一家财富 100 强公司的分析师


    如果您已准备好开始并开发您的第一个 Java 企业级 Web 应用，我们感谢您选择我们的书来开启您的旅程。要知道，您将面临挑战和挫折。您并不孤单。我们发现，当我们的学生努力克服这些困难时，他们学到的软件开发知识比我们能在书中教授的要多得多。您来对地方了。不要再等待了。是时候进入第
    1 章了！

