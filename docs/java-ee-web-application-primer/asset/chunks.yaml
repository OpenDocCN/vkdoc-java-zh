    ## Create a DbUtilities Class


    Every time your application connects to the database, it will execute the same
    code. You can make your application more efficient by creating a class of reusable
    methods that you can call as needed. Create a class called `DbUtilities`. This
    will allow you to simplify calling the Entity Manager when you need to read or
    write to the database. This class will be static (no instantiation required).
    It will have one method, `getFactory()`. It will return an instance of `EntityManagerFactory`
    as identified in the `persistence.xml`. See Listing [8-1](#A458483_1_En_8_Chapter.html#Par3).


