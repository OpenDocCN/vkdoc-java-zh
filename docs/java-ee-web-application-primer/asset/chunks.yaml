  trans: "\n### 创建 HTML 登录表单\n\nHTML 表单允许用户向你的 Servlet 提交数据。\n\n我们希望用户能够使用他们的电子邮件和密码登录。因此，我们需要创建一个包含\
    \ HTML 登录表单的网页。\n\n该表单应包含两个文本框——一个用于用户名，一个用于密码。表单需要一个提交按钮。文本框和按钮必须包含在声明表单的标签内，这样它们才会被提交到\
    \ `form` 标签的 `action` 属性所指定的登录 Servlet 的 URL。\n\n所有属性值必须用引号括起来，格式为 `attribute=\"\
    value\"`。这些值将被 Web 服务器用来决定如何处理表单。\n\n在我们创建 Servlet 之前，表单是无法工作的。Servlet 是一个可以运行\
    \ Java 代码并处理我们表单的容器。它将接收来自输入字段的值。然后，我们可以编写 Java 代码来处理这些输入。\n\n```\n\nLogin\n\n\
    Email Address:\n\nPassword:\n\n```\n\n生成的网页表单如图 12-2 所示。\n\n![A458483_1_En_12_Fig2_HTML.jpg](img/A458483_1_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2\n\n如果你点击提交按钮，表单数据将被发送到一个名为 LoginServlet.java 的 Servlet，该 Servlet 的代码顶部包含一个设置为\
    \ 'loginServlet' 的 @WebServlet 注解。\n\n请确保将表单的 `action` 属性设置为与你的 Servlet 的 @WebServlet\
    \ 注解相匹配。\n\n### 创建页面以显示表单的输出\n\n接下来，我们将创建一个 JSP 来显示表单的输出。表单会将其数据发送给 Servlet，然后\
    \ Servlet 会将数据发送给输出 JSP。虽然可以绕过 Servlet，但没有任何充分的理由这样做，因为任何重要的应用程序都会使用 Servlet 来执行一些处理。用于显示输出的页面将被简单地命名为\
    \ `output.jsp`。参见清单 12-13。由于 body 中没有 HTML 代码，该页面不会显示任何内容。\n\n```\n\nPage\n\n\
    Listing 12-13\nA Simple JSP Page, output.jsp\n```\n\n### 如何允许用户在网页之间导航\n\n链接几乎出现在所有网页中。链接允许用户点击从一个页面跳转到另一个页面。HTML\
    \ 链接被称为超链接。它们使用 `<a>` 标签定义：\n\n```\n_link text_\n```\n\n超链接是可以点击以跳转到另一个文档的文本或图像。例如：\n\
    \n```\nVisit Some Site\n```\n\n本地链接（指向同一网站的链接）使用相对 URL（不带 `http://www` `.`...）指定：\n\
    \n```\nMy other page\n```\n\n## 重用 JSP 代码\n\n编写代码很有趣。重复编写相同的代码则……很重复。而且无趣。Java\
    \ Server Pages 允许你通过创建包含文件来重用代码。包含文件就是一个你包含在现有页面中的 JSP 或 JSP（或 HTML）片段。在一个页面中包含某些代码片段的好处是，你可以在其他页面中包含相同的片段，从而节省你重写相同代码的宝贵时间。Bullhorn\
    \ 的导航栏代码位于每个页面的顶部，就在 body 开始标签的下方。我可以将该代码复制到每个页面。然后，如果我选择修改它，我可以打开每个页面并修改每个页面。更好的方法是将导航栏的代码放在一个\
    \ JSP 文件中，并在我希望导航栏出现的位置添加一个 `include` 标签（参见清单 12-14 到 12-16）。现在，我只需要在一个地方更改或更新导航栏。太好了！\n\
    \n```\nListing 12-14\nThe include Directive That Goes in Every Page to Include\
    \ the navbar on Bullhorn\n```\n\n```\n\nListing 12-15\nThe First Two Lines of\
    \ navbar.jsp (you can view the entire file in the source code that accompanies\
    \ this book)\n```\n\n```\n\nListing 12-16\nThe Last Three Lines of navbar.jsp\
    \ (you can view the entire file in the source code that accompanies this book)\n\
    ```\n\n## 自定义错误页面\n\n在开发应用程序时，你可能不想实现自定义错误页面。Tomcat 的错误页面正是你所需要的，它在一个地方包含了你可能想要的所有信息。\n\
    \n一旦你准备好部署应用程序，默认的错误页面就缺乏……打磨……并且可能是不专业应用程序的标志。\n\n你希望应用程序能够处理的错误有两种：HTML 错误和\
    \ Java 异常。\n\n你需要处理的主要 HTML 错误是 404 错误（页面未找到）和 500 错误（服务器错误）。\n\n至于 Java 异常，我们可以构建一个通用页面来处理所有异常。\n\
    \n如何添加自定义错误页面\n\n处理自定义错误最简单的方法是在 `web.xml` 文件中添加条目。默认情况下，`web.xml` 文件是不可用的，因此要添加它，你需要执行以下操作：\n\
    \n1.  右键单击你的动态 Web 项目。  \n2.  选择 Java EE 工具 ➤ 生成部署描述符存根。  \n3.  双击 `WebContent/WEB-INF`\
    \ 中的 `web.xml` 文件。  \n4.  在 `</web-app>` 之前添加一行，并插入以下内容：\n\n    ```\n\n    /error_404.jsp\n\
    \n    ```\n\n5.  然后，创建一个带有适当消息的相应 JSP。  \n\n如果你运行应用程序并尝试导航到一个不存在的页面，你现在应该会看到新的自定义错误页面。\n\
    \n要创建你自己的、用于处理所有 Java 异常的漂亮页面，请将以下内容添加到你的 `web.xml` 文件中：\n\n```\n/error_java.jsp\n\
    \n```\n\n然后，在你的 `error_java.jsp` 中放入类似以下内容：\n\n```\nError\nSorry, Java has thrown\
    \ an exception.\nTo continue, click the Back button.\nDetails\nType: ${pageContext.exception[\"\
    class\"]}\nMessage: ${pageContext.exception.message}\n```\n\n# 13. Web 的无状态特性\n\
    \nWeb 应用程序不维护状态。它没有记忆。对 Web 服务器的每个请求都是一个独立的事件。每个请求都不知道之前的请求。当你发送用户名和密码时，Web 服务器将其视为一个独立的事件。它不会跟踪你正在登录什么。信息只是被发送到服务器。\n\
    \n当你提交表单时，关于如何处理表单数据的所有信息都必须与表单一起发送。为什么？因为每个请求都是一个独立的事务。\n\n在现实生活中，这就像你去银行，每问一个问题就换一个柜员。而且柜员之间互不交谈——只和你交谈。每个柜员都想看你的身份证、检查你的余额，并做其他柜员已经做过的所有事情。为了让这种情况更容易处理，你可以保留每个事务的运行日志，每个柜员都可以用它来验证已经完成的操作。\n\
    \n那么，Web 应用程序如何维护状态呢？答案是使用会话变量或传递来自先前事务的称为参数的信息。参数通过 URL 或作为请求的一部分发送到服务器的其他信息，在客户端（Web\
    \ 浏览器）和服务器之间传递。这被称为请求包；我们在讨论 Servlet 时已经提到过这一点。\n\n会话变量存在于 Web 服务器的内存中。每个请求都包含一个会话\
    \ ID。会话 ID 将该请求与该用户的会话数据关联起来。会话 ID 在请求之间自动传递。你不需要做任何事情。它始终存在。\n\n由于每个用户有一个会话，你可以在每个用户的会话中存储变量。这是内存中的一个空间，在用户使用网站时保存数据。由于\
    \ Java 始终知道会话 ID，因此它可以访问会话中的任何数据。\n\n所以，是请求包和会话将整个房间联系在一起。而你以为是地毯！（不好笑？再看一遍《谋杀绿脚趾》）。会话使得服务器能够轻松地将一个请求与另一个请求连接起来。\n"
- fmt: '# The Process of Passing Data


    The following list is a summary of the steps that are followed for data to be
    sent from a web form to a JSP using a servlet:


    1. The form passes the request.

    2. Servlet receives the request.

    3. The servlet processes the request with `request.getParameter()`.

    4. The servlet generates a response based on the data in the request.

    5. The servlet constructs a response in an object that will be sent to the JSP.

    6. The JSP contains an attribute `${user}`.

    7. The servlet sets the attribute `request.setAttribute("user", myUser);`.

    8. The servlet sends the JSP back to the originating browser by calling `getServletContext().getRequestDispatcher(url).forward(request,
    response);`.


    # 14. Users and Sessions


    The user first accesses your site through the login page. The user’s email and
    password are validated against the database in the login servlet. A user email
    with the correct matching password is presumed to be a valid user. The valid user
    is retrieved from the database and stored in the `User` object. Recall that the
    `User` object is generated by the "JPA Generate Entities from Tables" option.


    A `User` object that is stored in the session is easily available to every servlet
    or JSP in your site. The login servlet validated the user and sent them to the
    next page, but the next page doesn’t know anything about the user. We put the
    user in the session, and the next page, as well as other pages in our application,
    can access the session and therefore the user. See Listing [14-1](#A458483_1_En_14_Chapter.html#Par3).


    ```

    @Entity

    @NamedQuery(name="Bhuser.findAll",

    query="SELECT b FROM Bhuser b")

    public class Bhuser

    implements Serializable {

    @Id

    @GeneratedValue(

    strategy=GenerationType.IDENTITY)

    private long bhuserid;

    @Temporal(TemporalType.DATE)

    private Date joindate;

    private String motto;

    private String useremail;

    private String username;

    private String userpassword;

    Listing 14-1

    The Private Member Variables of the User Class Correspond with the User Table

    ```


    Each user can create many posts. Each post in the database contains the user ID
    pointing back to the user. The user table keeps track of the posts by placing
    all the posts in a list. Therefore, the `User` object contains a list of all the
    posts for that user, not just the `PostId`. See Listing [14-2](#A458483_1_En_14_Chapter.html#Par5).


    ```

    @OneToMany(mappedBy="bhuser")

    private List bhposts;

    Listing 14-2

    The Private Member Variable for the Posts Corresponds to the Posts Table. The
    User Contains Posts So the Posts Are Implemented as a List.

    ```


    The `user` class is a POJO—Plain Old Java Object. It contains getters and setters
    for each private member variable. The getter and setter for the user ID are shown
    in Listing [14-3](#A458483_1_En_14_Chapter.html#Par7). The naming convention is:
    always the word `get` or `set` followed by the capitalized private member variable
    name. You’ll see later when we are accessing the variable in the JSP pages that
    the word `get` or `set` can be eliminated and the JSP will still find the correct
    value. You don’t have to program this behavior—it’s part of the Java Standard
    Tag Library.


    ```

    public long getBhuserid() {

    return this.bhuserid;

    }

    public void setBhuserid(long bhuserid) {

    this.bhuserid = bhuserid;

    }

    Listing 14-3

    Getter and Setter for the User Class

    ```


    The session allows every page to display the user’s name, email, and Gravatar.
    Java servlets provide a variable called `HttpSession` that we use to identify
    a user across multiple page requests. Sessions persist for twenty minutes (by
    default) after they are last used.


    Your program obtains a reference to the `HttpSession` object by calling the `getSession()`
    method of `HttpServletRequest`. The request is stored in a variable called `request`
    and is managed by Tomcat, the servlet container. See Listing [14-4](#A458483_1_En_14_Chapter.html#Par10).


    ```

    javax.servlet.http.HttpSession session =

    request.getSession();

    Listing 14-4

    By Adding This line of Code, Any Servlet in the Application Can Access Objects
    Stored in the Session.

    ```


    Think of a session as the memory common to all your application’s servlets and
    JSPs. It works like the Windows clipboard. One servlet puts data into the session,
    and another JSP can access a copy of it.


    ## Adding Objects to the Session


    Objects stored in the session can be accessed by different pages in the application.
    Add objects to the session in the login servlet as soon as you validate the user.
    The object is then available for use on other pages of the application. See Listing
    [14-5](#A458483_1_En_14_Chapter.html#Par13).


    ```

    User user = new User();

    user.setUserName("Larry");

    user.setEmail("larry12345@domain.com");

    //add the user to the session

    session.setAttribute("user", user);

    Listing 14-5

    Adding a User to the Session. This Code Can Be Found in the Login Servlet

    ```


    ### To Read a Value from the Session


    The user is stored in the session as an object. When you retrieve the user from
    the session, you need to cast it to the `User` object and assign it to a variable
    so you can work with it. See Listing [14-6](#A458483_1_En_14_Chapter.html#Par15).


    ```

    User user = (User) session.getAttribute("user");

    //now we can get values out of the class

    String username = user.getUserName();

    String email = user.getEmail();

    Listing 14-6

    Retrieving a Value from the Session

    ```


    # 15. How to Create Database Tables for Bullhorn


    Scripts for creating the database tables are included with the source code for
    Bullhorn. I usually recommend saving SQL scripts in a folder within your project
    called SQL Scripts so you can easily recreate the database on other systems.


    To create a table in a database, you code the table name followed by the field
    names and data types, as shown in Listing [15-1](#A458483_1_En_15_Chapter.html#Par4).
    The `POSTID` and `BHUSERID` fields in the code listing are generated by the database.


    You can create the tables by running the scripts found in the SQL Scripts folder
    of Bullhorn. Copy the code to SQL Developer and press F5 to run the scripts.


    ```

    CREATE TABLE BHPOST

    (    POSTID NUMBER

    GENERATED BY DEFAULT ON NULL AS IDENTITY,

    POSTDATE DATE DEFAULT NULL,

    POSTTEXT VARCHAR2(141 BYTE) DEFAULT NULL,

    BHUSERID NUMBER DEFAULT NULL

    ) ;

    CREATE TABLE BHUSER

    (    BHUSERID NUMBER

    GENERATED BY DEFAULT ON NULL AS IDENTITY,

    USERNAME VARCHAR2(50 BYTE),

    USERPASSWORD VARCHAR2(50 BYTE),

    MOTTO VARCHAR2(100 BYTE) DEFAULT NULL,

    USEREMAIL VARCHAR2(100 BYTE),

    JOINDATE DATE DEFAULT NULL

    );

    Listing 15-1

    Code for Creating BHPOST and BHUSER Tables

    ```'
