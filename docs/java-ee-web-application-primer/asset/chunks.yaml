    # The Presentation/View


    Users interact with your application through their web browser. The role of the
    web browser is to display the HTML, JavaScript, and images. Each web document
    contains a section we call the head and a section we call the body.


    The head contains the `title` tag, `link` tag, and `script` tag. The `link` and
    `script` tags allow the page to include external files for style sheets and JavaScript,
    respectively. Our application will contain links to style sheets and JavaScript
    for Bootstrap.


    The body of the document has more information. The body is where the content seen
    in the browser will go. This includes the form, text displayed to the user, links,
    and images. All the content in the body will be marked up with tags, which determine
    how the content will render.


    You can include comments in your web page that won’t show to the user. They help
    you document your page layout.


    # Designing Web Pages with HTML


    HTML (hypertext markup language) is a markup language for creating web documents
    (web pages). The main function of a browser is to receive the web page as HTML
    from the web server and display it. The browser applies all fonts, styles, and
    layouts specified by the HTML tags and CSS property values. This content can be
    further manipulated by using JavaScript, the programming language of the browser.


    The document object model (DOM) is a representation of your HTML document as a
    tree structure. The DOM sees each node as an object representing a part of the
    document. The objects can be manipulated programmatically by JavaScript, allowing
    your page to interact with the user.


    Here’s all you need to know about HTML:


    *   HTML documents are composed of elements called tags.

    *   The collection of HTML elements in a web page document is called the DOM (document
    object model).

    *   Tags are used to identify document content and structure.

    *   Tags often contain attributes that provide parameters for the element.

    *   The HTML document, which contains content and tags, is rendered by the browser
    to display the formatted version of the web page.

    *   The latest version of HTML is called HTML5.'
