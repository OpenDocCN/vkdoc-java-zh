    Some example input tags:


    *   `<input id="email" name="email" type="text" value=""/>` An input tag that
    displays as a text box and collects the email address of the user

    *   `<input type="submit" value="Submit" id="submit"/>` An input tag that displays
    as a button and calls the form’s action when clicked

    *   `<input type="reset" value="Clear"/>` An input tag that displays as a button
    with a label that says Clear and causes all the form’s input boxes to clear

    *   `<textarea></textarea>` An input that contains multiple rows: `<textarea name="posttext"
    id="posttext" rows="2" maxlength="141"></textarea>`


    ## HTML Tables


    A table starts with `<table>` and ends with `</table>`.


    Each table is made of table rows, which start with `<tr>` and end with `</tr>`.


    Each row is made up of cells of table data, which start with `<td>` and end with
    `</td>`.


    The first row of a table can be used as the header row. In this case, change the
    `<td>` tags to `<th>` for the first row. You can change the style of the header
    row to make it appear different from the other table rows.


    `<caption>...</caption>` is useful for defining or describing the content of the
    table. Captions are optional. To add a caption to a table, add the caption element
    after the opening table tag, with the text of the caption inside the element.
    Captions are usually displayed outside the border of the table, at the top. The
    exact appearance and placement of captions is subject to CSS styling. See Listing
    [12-3](#A458483_1_En_12_Chapter.html#Par28) and Figure [12-1](#A458483_1_En_12_Chapter.html#Fig1).


