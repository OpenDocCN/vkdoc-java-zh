  trans: '

    # 12. HTML5 标签


    标签是通过将标签名称放入尖括号中来创建的，例如：`<tag>`。括号中的单词（此处为 tag）就是标签名称。标签包含一个开始标签和一个结束标签。开始标签仅包含尖括号中的标签名称。结束标签则在标签名称前加上一个正斜杠。例如：`<table></table>`。如果标签不包含任何数据，则开始标签和结束标签可以合并，例如
    `<br/>`。


    标签可以包含属性，这些属性提供关于标签的更多信息。HTML5 属性使用名称-值对创建，通常放在标签名称旁边。在本章中，我们将讨论属性，然后介绍一些用于开发
    Bullhorn 的标签。


    名称-值对由一组文本字符串表示，其中 `name="value"`，通常用逗号、分号、空格或换行符分隔。HTML5 属性写在元素的标签内，并用空格分隔。参见清单
    12-1。


    ```

    清单 12-1

    来自 HTML 表单的输入标签示例

    ```


    在这段代码中，属性是 `type`、`id`、`name` 和 `value`，它们的值始终跟在等号后面的引号内。属性提供了关于元素的额外信息。例如，我们现在知道，前面的
    input 元素是一个文本框，由 `name`/`id` 标识为 `email`，并包含默认值 `user@domain.com`。`id` 属性是元素的唯一标识符。`id`
    被 CSS 和 JavaScript 使用。`name` 属性为元素指定一个名称。我们在 servlet 中检索元素的值时使用该名称。对表单控件（例如 `<input>`）使用
    name 属性。`Name` 是在表单提交时发生的 `POST` 或 `GET` 调用中使用的标识符。使用 `id` 属性通过 CSS 或 JavaScript
    来标识特定的 HTML 元素。可以通过 `name` 查找元素，但使用 `id` 更简单。


    ## 常用标签说明


    *   `<!DOCTYPE html>` 将文档标识为 HTML5 文档。这确保了不同浏览器会以相同方式解析该文档。

    *   `<head></head>` HTML 文档头部部分的所有数据都被视为元数据，即关于数据的数据。此部分的信息通常不会直接显示。相反，诸如 style
    之类的元素会影响文档中其他元素的外观。头部部分中的某些项目可能被搜索引擎等程序用于了解有关页面的更多信息，以供参考。

    *   `<title></title>` 属于文档的头部部分，设置显示在浏览器标签页中的标题。

    *   `<body></body>` 整个文档主体都包含在这两个标签内。

    *   `<h1></h1>` 包含在这些标签内的任何文本通常显示为大的粗体字体标题，但实际格式取决于浏览器。有六个标题标签，从 h1（最大）到 h6（最小）。

    *   `<p></p>` 段落标签内的任何内容都被视为一个段落。你可以向段落标签添加诸如 style 之类的属性，以控制哪些样式影响段落标签内的文本。

    *   `<img></img>` 图像标签用于显示图像。它有两个你需要使用的属性：`src` 和 `alt`。`src` 属性包含图像文件的路径。该路径可以是文件名或
    URL。`alt` 属性包含当图像不显示或无法看到时要显示的替代文本。屏幕阅读器也用它来描述图像。一个完整的图像标签看起来像这样：`<img src="path/to/filename.png"
    alt="我的猫的图片"/>`


    HTML 表单允许用户向 Web 服务器提交数据。表单中的数据将在请求数据包中发送到 servlet。Servlet 将接收数据，并可以使用它来查询数据库或选择另一个页面发送给用户。参见清单
    12-2。请注意，每个标签都有一个结束标签（或包含 `/>` 以表示它是自闭合的）。


    *   `<form></form>` `form` 标签包含用户输入表单的所有元素，该表单从用户获取数据并将其发送到 servlet。`form` 标签包含两个必需的属性：`method`
    和 `action`。`method` 属性可以是 `"get"` 或 `"post"`，它决定了数据如何发送到 servlet。`action` 属性包含处理表单数据的
    servlet 的 URL。

    *   `<input></input>` 表单的目的是从用户获取输入并显示将要发送到服务器的数据。从用户获取输入的方式是使用 `input` 标签。它将在网页上创建一个文本框。当点击提交按钮时，`input`
    标签的内容将被发送到 servlet。Submit 本身就是一个 input。当 `type` 属性设置为 `"submit"` 时，`input` 标签就变成了一个提交按钮。


    ```

