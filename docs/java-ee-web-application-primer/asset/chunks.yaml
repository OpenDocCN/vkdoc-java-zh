    The login page will contain text boxes in which the user will enter their email
    and password. This information will be verified in the login servlet. If they
    match what is in the database then the user will be redirected to their home page.
    If they do not match then the user will be prompted to log in again. Users who
    reach the login page but aren’t registered on the site can register for a login
    by clicking on the “Join” link. See Figure [4-2](#A458483_1_En_4_Chapter.html#Fig2).


    ![A458483_1_En_4_Fig2_HTML.jpg](A458483_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The login page contains text boxes for email and password and a button to sign
    in to the application


    The home page will allow each user to create a new post. Each post is limited
    to 141 characters, so the home page enforces this restriction (see Figure [4-3](#A458483_1_En_4_Chapter.html#Fig3)).
    Once the user is logged in, all pages contain a navigation bar at the top that
    allows the user to navigate to different pages, view or edit their profile, and
    search for posts containing a specific word.


    ![A458483_1_En_4_Fig3_HTML.jpg](A458483_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    The home page contains a form to submit a post to the database. The form contains
    a text box and buttons to either submit the post or clear the form.


    Each page contains the same navigation bar, which allows the user to move around
    the application. The navigation bar contains the logo, links for the home page
    and the news feed page, and a search box. It also displays the name of the logged-in
    user. The user can also select from various user options, which is implemented
    as a drop-down list. These include logging out, viewing or editing profile, and
    submitting feedback. See Figure [4-4](#A458483_1_En_4_Chapter.html#Fig4).


    ![A458483_1_En_4_Fig4_HTML.jpg](A458483_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    The navigation bar in Bullhorn shows at the top of every page


    The “News Feed” link in the navigation bar will take a user to the news feed page,
    which displays all posts from all users. Each user’s email address is a link that
    will display the user’s profile information. Clicking Search in the navigation
    bar will also display the news feed, but filtered to posts that contain the text
    entered in the search text box. See Figure [4-5](#A458483_1_En_4_Chapter.html#Fig5).


    ![A458483_1_En_4_Fig5_HTML.jpg](A458483_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    The news feed page displays any posts that are in the database


    The profile for a user is read-only. It displays their email, motto, join date,
    and avatar image, if any. Users can view profiles for other users by clicking
    on their user names from the news feed page. See Figure [4-6](#A458483_1_En_4_Chapter.html#Fig6).


    ![A458483_1_En_4_Fig6_HTML.jpg](A458483_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    The profile page for a user shown in read-only view


    ## Editing a Profile


    If a user views their own profile, then the profile can be edited. See Figure
    [4-7](#A458483_1_En_4_Chapter.html#Fig7).


    ![A458483_1_En_4_Fig7_HTML.jpg](A458483_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    The profile page for the logged-in user displays with text boxes and a button
    so the user can make changes


    The support page doesn’t show much, just some text to let you know it exists.
    We could modify this to include a text box that will send an email or add a record
    to the database. Then, the support person could check for new messages periodically.
    See Figure [4-8](#A458483_1_En_4_Chapter.html#Fig8).


    ![A458483_1_En_4_Fig8_HTML.jpg](A458483_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    The support page could allow you to let users submit requests to the web administrator


    # What Is MVC?


    The model-view-controller (MVC) pattern is a software-design pattern used for
    creating data-driven web applications. A design pattern is a general solution
    that addresses common software-design challenges. While not a finished design,
    you may think of a design pattern as a template or set of best practices.


    Following the MVC pattern means you intend to keep the presentation layer (view),
    business logic (controller), and database layer (model) separate. Changes made
    to one layer will minimally impact the others.


    The real benefit of MVC is not seen when writing the code, but rather when maintaining
    it. Code is in independent units and can be maintained without keeping the entire
    application in your head.


    Team building around MVC is easier. The design lends itself to segmentation among
    different people or groups. Imagine a View Team that is responsible for great
    views, a Model Team that knows all about the data, and a Controller Team that
    understands the application flow and business rules. Each can work on their part
    of the application concurrently without regard for the other teams. This allows
    for more rapid application development.


    Another great advantage of MVC is code reuse. The application’s logic implemented
    in the model and controller gets reused for each different view.


    ## The Model, View, Controller, and Service in Bullhorn


    When you think of the model, think of the database. Generally, the model is constructed
    first. The model must store the data. The model may consist of classes that communicate
    with the database. The model in Bullhorn is represented by the Oracle database
    and the entity classes, which represent the tables in Oracle.


    Once you create the data model and any classes that are part of the model, move
    on to the services. The services are all the code that interacts with the model.


    Next, move on to the controller. The controller is part of the web application
    and moves data between the services and the view. The controller also determines
    which page or servlet is called next. In Bullhorn, the servlets happen to also
    be the controller. This is not always the case. The controller is simply that
    code that controls application-specific logic. Since this is a web application,
    the servlets are in charge of getting data from the view and determining which
    JSP will display next. If you have Java classes that contain that functionality,
    they will be part of the controller.


    The part of the application the user actually sees is called the view. It presents
    the data to the user and gets data from the user, which is then passed back to
    the model through the services and controller. The view in Bullhorn consists of
    JSPs (Java Server Pages) using Bootstrap, CSS (Cascading Style Sheets), JavaScript,
    and images. All the parts of the view work to create the pages that are displayed
    in the user’s browser. See Figure [5-1](#A458483_1_En_5_Chapter.html#Fig1).


    ![A458483_1_En_5_Fig1_HTML.jpg](A458483_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The components of Bullhorn are logically divided into layers called Model, View,
    Controller, and Service Tip


    Perform validation in every layer. Data can come to your application through ways
    unanticipated by you when you initially develop it, not just through the browser.
    For example, it may come to be that you need to import information into your database.
    Or, you may later write a web service that interacts directly with your service
    layer.'
