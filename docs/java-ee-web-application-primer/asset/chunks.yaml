- fmt: "# The Oracle Virtual Machine\n\nBeing lazy—I mean, efficient—we used a pre-built\
    \ Oracle virtual machine (VM) image to develop the site. Oracle makes this VM\
    \ available for download at no cost (registration required). The VM requires the\
    \ open source `VirtualBox` software be installed on your computer as just described.\
    \ The VM hosts the latest version of the Oracle database (version 12c). It also\
    \ contains `SQL Developer` and even `Java 1.8`. You will only need to install\
    \ `Eclipse`, which we’ll cover in a later section.\n\n> **Tip**\n> \n> Download\
    \ the Oracle Database Application Developer virtual machine from the Oracle website\
    \ at [`http://www.oracle.com/technetwork/database/enterprise-edition/databaseappdev-vm-161299.html`](http://www.oracle.com/technetwork/database/enterprise-edition/databaseappdev-vm-161299.html).\
    \ You must accept the terms of the software prior to downloading.\n\nOnce you\
    \ have the Oracle virtual machine file ready, select **File** ➤ **Import Appliance**\
    \ in the menu bar. Click the **Open Appliance** button to select the Oracle virtual\
    \ machine file. Navigate to the file with the `.ova` file extension. Selecting\
    \ this file will open a dialog box in `VirtualBox` that displays the settings.\
    \ You can select the **Import** button from here. The next window will show you\
    \ the configuration of the current virtual appliance.\n\nOnce you click on **Import**,\
    \ `VirtualBox` will copy the disk images and create a virtual machine with the\
    \ settings described in the dialog. You will see the Oracle virtual machine in\
    \ the `VirtualBox Manager`’s list of virtual machines. The `VirtualBox Manager`\
    \ is the first screen that opens when you open `VirtualBox`. Select your machine,\
    \ click **Start**, and give it time to load, then you can work with that machine\
    \ as if it were a separate computer.\n\n> **Note**\n> \n> If you’re not using\
    \ the Oracle virtual machine, you can complete everything in this book using Windows.\n\
    \nYou can download and install Oracle database version 12c for Windows at [`http://www.oracle.com/technetwork/database/enterprise-edition/downloads/database12c-win64-download-2297732.html`](http://www.oracle.com/technetwork/database/enterprise-edition/downloads/database12c-win64-download-2297732.html).\n\
    \nYou will also need to install `SQL Developer`, which you can find at [`http://www.oracle.com/technetwork/developer-tools/sql-developer/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sql-developer/downloads/index.html).\n\
    \nFinally, you will need to install `Eclipse Oxygen` from [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads).\n\
    \n# What Is a Database?\n\nA database is a place to permanently store data for\
    \ retrieval in a safe, efficient way. A database allows us to create data and\
    \ save it permanently. It allows us to retrieve previously created data, update\
    \ existing data, or delete existing data.\n\nA transaction groups `SQL` statements\
    \ so that they are all applied to the database. If one statement fails for some\
    \ reason, all the statements are undone from the database. Transactions ensure\
    \ data integrity. Transactions distinguish a database management system such as\
    \ Oracle from a file system.\n\nThe properties of a database transaction that\
    \ ensure data validity are atomicity, consistency, isolation, and durability.\n\
    \n- **Atomicity** refers to the fact that in each database transaction either\
    \ all the information is saved or none of the information is saved.\n- **Consistency**\
    \ ensures that a transaction either works correctly or the dataset is returned\
    \ to the state it was in before the transaction was executed.\n- **Isolation**\
    \ refers to the ability of a database to keep a transaction that is not yet committed\
    \ distinctly separate from the working database.\n- **Durability** refers to the\
    \ way committed data is saved by the system such that, even in the event of a\
    \ failure and system restart, the data is available in its correct state.\n\n\
    The database stores data in sets, which are most commonly viewed as tables. One\
    \ row of a database table represents a record containing related attributes, called\
    \ fields. Fields are represented by the columns in a table.\n\n## Referential\
    \ Integrity\n\nYour database management system (DBMS) supports referential integrity.\
    \ The goal of referential integrity is to avoid having “orphaned” data. Orphaned\
    \ data can happen when you are deleting or updating the data in your tables; for\
    \ example, if you have a post in your database that does not have a matching user.\
    \ This shouldn’t happen and is often the result of importing poorly formatted\
    \ data or inadvertently deleting a user. A database management system such as\
    \ Oracle can enforce referential integrity to prevent this by denying changes\
    \ that will result in orphaned data.\n\n## Null Values\n\nSometimes there is no\
    \ value in a column of a row. In this case, the column stores a `NULL` value.\
    \ You can think of this as a flag to indicate the absence of data. `NULL` is different\
    \ from the numeric value zero or a string with a length of zero characters. It\
    \ is neither. It is nothing, because no value has been stored in the column for\
    \ this record. `NULL`, it turns out, is very useful. You can search for a field\
    \ in records that contain `NULL` and know that they are the ones with no value\
    \ in the field.\n\n## Primary Keys, Foreign Keys, and Indexes\n\nDatabases are\
    \ very powerful tools that allow us to search and sort data at incredible speeds.\
    \ An essential ingredient of the mechanics of a database is that each record should\
    \ be unique. To make each record unique, either use an existing field that is\
    \ unique to each record or add a field to each record that contains a unique number.\n\
    \nYour DBMS can generate a unique number for each record. The unique number of\
    \ each record becomes its primary key. This field distinguishes that record from\
    \ any other in the table.\n\nWhen a second table contains data related to that\
    \ of the first table, the second table can refer to the original using the primary\
    \ key field.\n\nA primary key used as a reference in another table is called a\
    \ foreign key. Foreign keys define a reference from one table (the child) to another\
    \ table (the parent).\n\nTo make access to a column of data more efficient, the\
    \ database will create an object called an index. An index contains an entry for\
    \ each value in the indexed column(s), resulting in fast access to rows. Like\
    \ an index in a print book, the database can look up the requested value in the\
    \ index and quickly locate its corresponding row in the table.\n\n## Joining Tables\n\
    \nRelationships are a means to join data to different tables. This helps you avoid\
    \ redundancy in the tables. You can divide your data into different tables—entering\
    \ it only once—and then reference it from other tables by establishing relationships.\n\
    \nThere are three types of relationships, as follows:\n\n- A **One-to-One** relationship\
    \ is where each record in the first table has only one matching record in the\
    \ second table. This usually happens when information in one table is divided\
    \ across multiple tables. This is not common.\n- A **One-to-Many** relationship\
    \ is where each record in the first table matches with multiple records in the\
    \ second table. For example, a user can have multiple posts.\n- A **Many-to-Many**\
    \ relationship is where each record in the first table can have many corresponding\
    \ records in the second table, and also each record in the second table can have\
    \ many corresponding records in the first table.\n\n## Normalization\n\nIn a normalized\
    \ data structure, each table contains information about a single entity and each\
    \ piece of information is stored in exactly one place.\n\nNormalization is the\
    \ process of efficiently organizing data in a database. This is done by organizing\
    \ the columns (fields or attributes) and tables of a relational database to minimize\
    \ data redundancy.\n\nThe goals of the normalization process are to eliminate\
    \ redundant data and ensure data dependencies make sense."
