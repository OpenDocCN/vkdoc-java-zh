  raw: "# 19. Use Gravatar to Display User’s Avatars with Posts\n\nAn avatar is an\
    \ image people use for their online identity. Gravatar is a free service for providing\
    \ globally unique avatars. Gravatar allows users to register an account using\
    \ their email address. Users then upload an image to be associated with their\
    \ Gravatar account. When the user uses the same email address on a website that\
    \ uses Gravatar, the website retrieves the user’s avatar from Gravatar by using\
    \ an image URL based on a hash of the email address. Websites, including Bullhorn\
    \ , may freely use Gravatar to display the user’s image. Bullhorn displays the\
    \ image next to posts and on the profile page.\n\n```\n\nTo control the size of\
    \ the image, append the URL with `?s=150` where 150 is\nthe height or width in\
    \ pixels of the square image to be returned by the\nURL. The value of ‘s’ can\
    \ range from 1 to 2048\\. Lower values will look\nbetter.\n\nIf a user does not\
    \ have a Gravatar  set up then a\ndefault image will be displayed:\n\n[`https://www.gravatar.com/avatar/unknownhash`](https://www.gravatar.com/avatar/unknownhash)\n\
    \n![A458483_1_En_19_Figa_HTML.jpg](A458483_1_En_19_Figa_HTML.jpg)\n\nCalculating\
    \ an MD5 Hash with Java\n\nAn MD5  hash is a\nway of encrypting text such that\
    \ it is not identifiable by looking at\nit. The value of MD5 is that the same\
    \ email address will always generate\nthe same MD5 hash.\n\nThe Gravatar  URL\n\
    is made from an MD5 hash of the user’s email address. You can create an\nMD5 \
    \ hash of an\nemail address using code provided at the Gravatar website . This\
    \ code is\nimplemented in Bullhorn\n in the `MD5Util.java` class.\nThe code will\
    \ return a string containing the MD5 hash given the user’s\nemail address.[¹](#A458483_1_En_19_Chapter.html#Fn1)\n\
    \nThe `DbUser`\nclass in Bullhorn\n contains a method that generates the Gravatar\
    \  URL. The\nmethod takes two parameters, email and image size. The method then\n\
    returns the correct URL, which can be used in an image tag throughout\nthe Bullhorn\
    \ site. See Listing [19-1](#A458483_1_En_19_Chapter.html#Par10).\n\n```\npublic\
    \ static String getGravatarURL(String email, Integer size){\nStringBuilder url\
    \ = new StringBuilder();\nurl.append(\"http://www.gravatar.com/avatar/\");\nurl.append(MD5Util.md5Hex(email));\n\
    url.append(\"?s=\" + size.toString());\nreturn url.toString();\n}\nListing 19-1\n\
    The Method to Generate a Gravatar URL Based on the User’s Email Address\n```\n\
    \nFootnotes\n\nThe source code for the MD5  class in Bullhorn\nis derived from\
    \ that found at [`http://en.gravatar.com/site/implement/images/java`](http://en.gravatar.com/site/implement/images/java)\
    \ .\n\n20. The Presentation/View\n\nThe presentation layer, also known as the\
    \ view, is the perspective your\nend user has of your application. They don’t\
    \ see all the Java code. They\nonly see what the browser displays. The view consists\
    \ mostly of HTML,\nJavaScript, and images. In this section, we’ll look at the\
    \ different JSP\nfiles that make up the view. The JSP files contain other code\
    \ such as\nJSTL, but the end result is that they become HTML files sent to the\n\
    user’s browser.\n\nTo start, the user browses to the site’s URL for the `login.jsp`\
    \ page. The\nURL for your development environment will be `http://localhost:8080/Bullhorn/login.jsp`.\n\
    \nNote\n\nTo start your application in Eclipse, at the login page simply\nright-click\
    \ on the login page and select the option to Run on Server.\nYour site will open\
    \ in a browser inside the Eclipse environment.\n\nThe Code for the Login Page\n\
    \n```\n\nLogin\n\n${message}Please sign in\nEmail address\n\nPassword\n\nSign\
    \ in\n\nJoin\n\n```\n\nThe Code for the Home Page\n\n```\n\nBullhorn\n\nThis is\
    \ the home page\n\nCreate New Post (141 char):\n\n$(document).ready(function()\
    \ {\nvar text_max = 141;\n$('#textarea_feedback').html(text_max + ' characters\
    \ remaining');\n$('#posttext').keyup(function() {\nvar text_length = $('#posttext').val().length;\n\
    var text_remaining = text_max - text_length;\n$('#textarea_feedback').html(text_remaining\
    \ + ' characters remaining');\n});\n});\nfunction validate(form) {\nvalid = true;\n\
    if ($('#posttext').val().length==0){\nalert(\"You may not submit an empty post.\"\
    );\nvalid = false;\n}\nreturn valid;\n}\n\n```\n\nThe Code for the News Feed Page\n\
    \n```\n\nBullHorn\n\nThis is the news feed page\n\nUserPostDate\n\n\">\n\n```\n\
    \nThe Code for the Profile Page\n\n```\n\nBullHorn\n\n/>&nbsp;&nbsp;Profile for\
    \ \nEmail: \nMotto: \nJoin Date:\n\n&nbsp;&nbsp;Edit Profile for ${username}\n\
    \nEmail: \nMotto: \nJoin Date:\n\n```\n\nThe Code for the Add User Page\n\n```\n\
    \nBullHorn\n\nAdd New User\nName: \nEmail: \nPassword: \nMotto: \nJoin Date: -->\n\
    \n```\n\nThe Code for the Support Page\n\n```\n\nBullHorn\n\nThis is the support\
    \ page\n\n```\n\nThe Code for the Error Page\n\n```\n\nBullHorn\n\nSomething's\
    \ Wrong...\n\n```\n\nThe Navbar Include File\n\n```\n\nToggle navigation\n\n&nbsp;Bullhorn\n\
    \nHome(current)\nNews Feed\n\nSubmit\n\n&nbsp;${user.username}\n\nUser Options\n\
    \nLogout-->\n\nLogout\n\nShow my Posts\nEdit Profile\n\nFeedback\n\n```\n\nThe\
    \ BootStrap Include File\n\nThe BootStrap include\nfile  contains links for the\
    \ BootStrap files. These links come\nfrom the BootStrap website. They use a content\
    \ delivery service called\nMaxCDN to host their files. You don’t have to download\
    \ anything. Simply\ninclude the links from the BootStrap site, and your application\
    \ will\nretrieve the file over the internet.\n\nThe BootStrap include\nfile  also\
    \ contains links to some style sheets, which can be\nfound in the styles folder\
    \ of your Bullhorn application. The styles\nfolder lies below the WebContent folder.\n\
    \nThe Bootstrap Style Pages\n\nThe Bullhorn site contains some style sheets that\
    \ have been downloaded\nfrom [`https://bootswatch.com/`](https://bootswatch.com/)\
    \ . This site contains free downloadable BootStrap\nthemes that you can include\
    \ in your projects. Simply browse their\ncollection and include them in your site.\
    \ Then, from each web page, you\nneed to include a link to the theme you want\
    \ to use. This is done in the\nBootStrap include file.\n\nThe Footer Include File\n\
    \n```\n\n&nbsp;Bullhorn&nbsp;&nbsp;&copy; 2016\n\n```\n\nIndex\n\nA\n\nAddUser\
    \ servlet code\n\nAmerican National Standards Institute (ANSI)\n\nAttributes\n\
