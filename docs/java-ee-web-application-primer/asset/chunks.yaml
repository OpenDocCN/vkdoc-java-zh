    一些 input 标签示例：


    *   `<input id="email" name="email" type="text" value=""/>` 一个显示为文本框并收集用户电子邮件地址的
    input 标签

    *   `<input type="submit" value="提交" id="submit"/>` 一个显示为按钮并在点击时调用表单 action 的
    input 标签

    *   `<input type="reset" value="清除"/>` 一个显示为带有“清除”标签的按钮，并导致表单所有输入框被清空的 input 标签

    *   `<textarea></textarea>` 一个包含多行的输入：`<textarea name="posttext" id="posttext"
    rows="2" maxlength="141"></textarea>`


    ## HTML 表格


    表格以 `<table>` 开始，以 `</table>` 结束。


    每个表格由表格行组成，表格行以 `<tr>` 开始，以 `</tr>` 结束。


    每行由表格数据单元格组成，单元格以 `<td>` 开始，以 `</td>` 结束。


    表格的第一行可以用作标题行。在这种情况下，将第一行的 `<td>` 标签改为 `<th>`。你可以更改标题行的样式，使其看起来与其他表格行不同。


    `<caption>...</caption>` 用于定义或描述表格的内容。标题是可选的。要向表格添加标题，请在开始表格标签之后添加 caption 元素，并将标题文本放在元素内部。标题通常显示在表格边框之外，位于顶部。标题的确切外观和位置取决于
    CSS 样式。参见清单 12-3 和图 12-1。


