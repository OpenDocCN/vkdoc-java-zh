    已登录用户的个人资料页面显示有文本框和一个按钮，以便用户进行更改


    支持页面显示的内容不多，只有一些文字让您知道它的存在。我们可以修改此页面，使其包含一个文本框，用于发送电子邮件或向数据库添加记录。然后，支持人员可以定期检查新消息。见图
