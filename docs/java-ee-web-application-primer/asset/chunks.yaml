  trans: "\n## JSP 标准标签库 (JSTL)\n\nJSP 标准标签库 (JSTL) 是一组实用标签，您可以将其添加到 JSP 页面中。这些标签为许多\
    \ JSP 应用程序提供了通用功能。JSTL 支持常见的结构性任务，例如迭代和条件判断。它还支持在页面中正确转义 HTML 或 XML 代码，从而防止标签被解析并可能执行恶意代码。\n\
    \nEL（表达式语言）是 JSTL 的一个子集，它使得在 JSP 中轻松使用 Java 类（称为 bean）成为可能。表达式语言语法简洁，允许您访问对象的嵌套属性。例如，一个\
    \ `post` 对象包含一个用户。表达式语言允许您的 JSP 使用 `${user.username}` 这种简洁的语法来访问用户的 `getUsername()`\
    \ 方法。表达式语言还可以使用 `${message}` 这样的语法来检索从 Servlet 设置的标量变量的值。\n\n要在 JSP 中包含 JSTL，请将以下代码清单（清单\
    \ 12-5）中所示的指令添加到页面顶部。确切位置并不重要，但放在 `<html>` 标签上方是一个好位置。JSTL 由多个库组成，这些库为循环、if/else\
    \ 语句以及格式化数字、日期和时间等任务添加了功能。由于我们知道要在 JSP 中包含循环和 if/else 功能，并且还要格式化日期，因此我们将同时包含核心库和格式化库。请参见清单\
    \ 12-5。\n\n```\n\n清单 12-5\n应包含在页面 <html> 标签上方的 JSTL 指令。C 前缀包含来自核心库的标签。FMT 前缀包含来自格式化库的标签。\n\
    ```\n\n## 如何在 JSP 中使用 JSTL 标签\n\n1.  将本书附带的以下两个 Java 归档 (jar) 文件复制到动态 Web 应用程序的\
    \ `WEB-INF/lib` 文件夹中。\n    1.  `taglibs-standard-impl-1.2.5.jar`  \n    2.  `javax.servlet.jsp.jstl-api-1.2.1.jar`\
    \   \n2.  添加以下指令，将 JSTL 的核心库和格式化库包含到页面顶部： \n\n现在，您可以使用接下来讨论的任何 JSTL 标签了。\n\n##\
    \ 使用 JSTL 可以做什么？\n\n### 防止跨站脚本攻击\n\n跨站脚本 (XSS) 是一种计算机安全漏洞，当恶意用户通过网页上的文本框向您的网站输入脚本或其他代码时就会发生。JSTL\
    \ `core out` 标签可以防止跨站脚本攻击。`c:out` 会转义用户的任何输入，使其不再可执行。如果用户在您网站的文本框中输入了恶意的 JavaScript，该\
    \ JavaScript 将被执行并可能危及数据安全。JSTL 的 `c:out` 标签可以降低这种风险。\n\n### 遍历集合\n\nJSTL `forEach`\
    \ 标签提供了一种遍历集合中项目的机制。该集合可以在 Servlet 中设置，JSP 中的 JSTL 代码将遍历它，并重复执行 `forEach` 开始和结束标签之间的代码。这两个标签之间的任何\
    \ HTML 也会为集合中的每个项目重复显示。您可以在 `newsfeed.jsp` 页面中看到 `forEach` 标签的示例。另请参见清单 12-6。\n\
    \n```\n\n清单 12-6\nJSTL forEach 标签允许您遍历帖子集合\n```\n\n### 设置值\n\n清单 12-7 中的代码展示了如何设置一个名为\
    \ `number` 的变量的值。然后，您可以在页面后续部分甚至会话中引用该变量。如果只想在当前页面引用该变量，请将作用域设置为 `\"request\"\
    `。如果要在应用程序的其他页面引用该变量，请将作用域设置为 `\"session\"`（仅适用于单个用户）或 `\"application\"`（适用于所有用户）。然后，您可以在页面或应用程序的后续部分使用\
    \ `c:out` 标签来使用该变量。在此示例中，我们只是将值设置为某个随机值，比如 10。\n\n```\n\n清单 12-7\n使用 JSTL 核心库的\
    \ set 标签\n```\n\n### 测试条件\n\nJSTL 允许您根据条件包含或排除代码。在清单 12-8 的示例中，名为 `number` 的变量的值决定了\
    \ JSTL `if` 标签之间的内容是否显示。\n\n```\n\nif 标签之间的任何内容\n在条件为真时显示\n\n清单 12-8\nJSTL 允许您根据条件显示或隐藏代码\n\
    ```\n\n### 重复内容固定次数\n\nJSTL 核心库的 `forEach` 标签会将内容重复固定的次数。内容是指您在 `forEach` 开始和结束标签之间指定的任何内容。内容将根据\
    \ `begin` 和 `end` 属性指定的次数（包含边界值）重复显示。在清单 12-9 的代码中，数字 5 6 7 8 9 10 将显示在浏览器中。\n\
    \n```\n\n清单 12-9\nJSTL 允许您将内容重复固定次数\n```\n\n### 测试条件并选择替代方案\n\nJSTL 没有与 `if` 语句配套的\
    \ `else` 子句。但是，当 JSTL 核心库的 `when` 和 `otherwise` 标签放在 JSTL 核心库的 `choose` 标签内部时，它们的作用类似于\
    \ if-else 语句。您可以使用任意数量的 `when` 标签，但只能有一个 `otherwise` 标签。请参见清单 12-10。\n\n```\n\n\
    清单 12-10\nJSTL 的 choose、when 和 otherwise 标签允许您模拟 if/else 条件\n```\n\n### 判断字符串是否为空或\
    \ null\n\nJSTL 允许您的代码测试一个值并判断该值是否为 null 或空。如清单 12-11 中的代码所示，您传入变量，该变量可以在 Servlet\
    \ 中设置，也可以来自您正在遍历的集合。然后，如果字符串为 null 或空，`c:if` 语句之间的代码将执行。如果 `c:if` 标签之间有 HTML 代码，那么当条件为真时，它将在浏览器中显示。您可以通过在\
    \ `empty` 前面加上 `not` 来否定该条件。\n\n```\nvar1 为空或 null。\n\n清单 12-11\n测试变量是否为 null\
    \ 或空\n```\n\n### 格式化日期\n\nJSTL 允许您以指定的格式显示日期。我们在 Bullhorn 中显示帖子日期时使用了这个功能。我们只想将日期显示为年份，后跟月份缩写，然后是日期。日期的值应该是一个\
    \ `Date` 对象，即 `java.util.Date`。如果您的日期是一个 `String` 对象，那么您应该先转换它。JSTL `formatDate`\
    \ 标签将根据指定的模式格式化日期。请参见清单 12-12。\n\n```\n清单 12-12\n使用 JSTL 格式化库来格式化日期\n```\n\n##\
    \ 如何显示表单数据\n\nJava Web 应用程序通常包含表单，用于收集用户输入并将其传递给 Servlet 进行处理。然后，Servlet 可以与数据库通信并对数据执行某些操作。一旦\
    \ Servlet 处理完数据，它会将包含表单结果的新网页发送到浏览器。所有这些都在服务器上瞬间完成，用户是看不到的。\n"
- fmt: "### Create an HTML Login Form\n\nHTML forms allow users to submit data to\
    \ your servlet.\n\nWe want to enable the user to log in with their email and a\
    \ password. So, we need to create a web page with an HTML login form.\n\nThe form\
    \ should contain two text boxes—one for username and one for password. The form\
    \ needs a Submit button. The text boxes and button must be contained within the\
    \ tags that declare the form so they will be submitted to the URL of the login\
    \ servlet indicated in the `action` attribute of the `form` tag.\n\nAll attribute\
    \ values must be in quotes and in the format of `attribute=\"value\"`. These values\
    \ will be used by the web server to determine how the form is processed.\n\nThe\
    \ form will not work until we create the servlet. The servlet is a container that\
    \ can run Java code and process our form. It will receive the values from the\
    \ inputs. Then, we can write Java code to do something with the inputs.\n\n```\n\
    <html>\n<body>\n<form action=\"loginServlet\">\n  Email Address:<br>\n  <input\
    \ type=\"text\" name=\"email\"><br>\n  Password:<br>\n  <input type=\"password\"\
    \ name=\"password\"><br><br>\n  <input type=\"submit\" value=\"Submit\">\n</form>\n\
    </body>\n</html>\n```\n\nThe resulting web form can be seen in Figure [12-2](#A458483_1_En_12_Chapter.html#Fig2).\n\
    \n![A458483_1_En_12_Fig2_HTML.jpg](A458483_1_En_12_Fig2_HTML.jpg)\n\nFigure 12-2\n\
    \nIf you click the Submit button, the form’s data will be sent to a servlet called\
    \ `LoginServlet.java`, which contains an `@WebServlet` annotation at the top of\
    \ the code set to `'loginServlet'`.\n\nBe sure to set the `action` attribute of\
    \ your form to match your servlet’s `@WebServlet` annotation.\n\n### Create a\
    \ Page to Display the Output of Your Form\n\nNext, we will create a JSP to display\
    \ the output of the form. The form will send its data to the servlet, and the\
    \ servlet will send the data to the output JSP. While it’s possible to bypass\
    \ the servlet, there’s no good reason to do so since any application of significance\
    \ will use the servlet to perform some processing. The page to display the output\
    \ will be called, simply enough, `output.jsp`. See Listing [12-13](#A458483_1_En_12_Chapter.html#Par68).\
    \ The page will not display anything since there is no HTML code in the body.\n\
    \n```\n<%@ page language=\"java\" contentType=\"text/html; charset=UTF-8\"\n \
    \   pageEncoding=\"UTF-8\"%>\n<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"\
    UTF-8\">\n<title>Page</title>\n</head>\n<body>\n</body>\n</html>\n```\n\nListing\
    \ 12-13  \nA Simple JSP Page, `output.jsp`\n\n### How to Allow the User to Navigate\
    \ Between Web Pages\n\nLinks are found in nearly all web pages. Links allow users\
    \ to click their way from page to page. HTML links are called hyperlinks. They\
    \ are defined with the `<a>` tag:\n\n```\n<a href=\"url\">link text</a>\n```\n\
    \nA hyperlink is text or an image you can click on to jump to another document.\
    \ For example:\n\n```\n<a href=\"https://www.somesite.com\">Visit Some Site</a>\n\
    ```\n\nA local link (link to the same website) is specified with a relative URL\
    \ (without `http://www`...):\n\n```\n<a href=\"otherpage.html\">My other page</a>\n\
    ```\n\n## Reusing JSP Code\n\nWriting code is fun. Writing the same code repetitively\
    \ is . . . repetitive. And not fun. Java Server Pages allow you to reuse code\
    \ by creating include files. An include file is simply a JSP or fragment of a\
    \ JSP (or HTML) that you include in your existing page. The advantage of including\
    \ some fragment of code in one page is that you can then include that same fragment\
    \ in other pages, saving you valuable time from rewriting the same code. The code\
    \ for the navigation bar for Bullhorn goes at the top of every page, just below\
    \ the opening body tag. I could copy that code to every page. Then, if I choose\
    \ to modify it, I could open every page and modify every page. A better idea is\
    \ to put the code for the navigation bar in one JSP file and add an `include`\
    \ tag at the location where I want the navigation bar to appear (see Listings\
    \ [12-14](#A458483_1_En_12_Chapter.html#Par76) to [12-16](#A458483_1_En_12_Chapter.html#Par78)).\
    \ Now I only need to change or update the navigation bar in one place. Nice!\n\
    \n```\n<%@ include file=\"navbar.jsp\" %>\n```\n\nListing 12-14  \nThe `include`\
    \ Directive That Goes in Every Page to Include the navbar on Bullhorn\n\n```\n\
    <div id=\"navbar\">\n  <ul>\n    <li><a href=\"index.jsp\">Home</a></li>\n```\n\
    \nListing 12-15  \nThe First Two Lines of `navbar.jsp` (you can view the entire\
    \ file in the source code that accompanies this book)\n\n```\n    <li><a href=\"\
    contact.jsp\">Contact</a></li>\n  </ul>\n</div>\n```\n\nListing 12-16  \nThe Last\
    \ Three Lines of `navbar.jsp` (you can view the entire file in the source code\
    \ that accompanies this book)\n\n## Customizing Your Errors\n\nWhile you are developing\
    \ your application, you probably won’t want to implement custom error pages. The\
    \ Tomcat error pages are exactly what you need, with all the information you could\
    \ want in one place.\n\nOnce you are ready to deploy your application, the default\
    \ error pages lack . . . polish . . . and can be a sign of an unprofessional application.\n\
    \nThere are two kinds of errors that you are going to want your application to\
    \ be able to handle: HTML errors and Java exceptions.\n\nThe main HTML errors\
    \ you need to handle are the 404 error (page not found) and the 500 error (server\
    \ error).\n\nAs for Java exceptions, we can build a general page that handles\
    \ them all.\n\n### How to Add a Custom Error Page\n\nThe easiest way to handle\
    \ custom errors is to add entries to the `web.xml` file. By default, the `web.xml`\
    \ file is not available, so to add it you need to do the following:\n\n1.  Right-click\
    \ your dynamic web project.\n2.  Select Java EE Tools ➤ Generate Deployment Descriptor\
    \ Stub.\n3.  Double-click the `web.xml` file in `WebContent/WEB-INF`.\n4.  Add\
    \ an extra line before `</web-app>` and insert the following:\n\n    ```\n   \
    \ <error-page>\n      <error-code>404</error-code>\n      <location>/error_404.jsp</location>\n\
    \    </error-page>\n    ```\n\n5.  Then, create a corresponding JSP with the proper\
    \ message.\n\nIf you run your application and try to navigate to a page that doesn’t\
    \ exist, you should now get your new custom error page.\n\nTo create your own\
    \ attractive page for handling ALL Java exceptions, add the following to your\
    \ `web.xml` file:\n\n```\n<error-page>\n  <exception-type>java.lang.Exception</exception-type>\n\
    \  <location>/error_java.jsp</location>\n</error-page>\n```\n\nThen, put something\
    \ like the following in your `error_java.jsp`:\n\n```\n<%@ page isErrorPage=\"\
    true\" %>\n<html>\n<body>\n<h1>Error</h1>\n<p>Sorry, Java has thrown an exception.</p>\n\
    <p>To continue, click the Back button.</p>\n<h2>Details</h2>\n<p>Type: ${pageContext.exception[\"\
    class\"]}</p>\n<p>Message: ${pageContext.exception.message}</p>\n</body>\n</html>\n\
    ```\n\n# 13. The Stateless Nature of the Web\n\nA web application does not maintain\
    \ state. It has no memory. Each request to the web server is an independent event.\
    \ Each request does not know about previous requests. When you send your username\
    \ and password, the web server views this as an independent event. It does not\
    \ keep track of what you’re logging in to. The information is simply sent to the\
    \ server.\n\nWhen you submit a form, all the information about what to do with\
    \ the form data must be sent along with the form. Why? Because each request is\
    \ an independent transaction.\n\nIn real life this is what it would be like if\
    \ you went to the bank and got a new teller after each question. And the tellers\
    \ don’t talk to each other—only to you. And each teller would want to see your\
    \ ID and check your balance and do everything the other teller had already done.\
    \ To make such a situation easier, you could keep a running log of each transaction\
    \ that each teller could use to verify what has been done.\n\nSo, how does a web\
    \ application maintain state? The answer is by using either session variables\
    \ or passing information known as parameters from the previous transaction. Parameters\
    \ are sent between the client (web browser) and the server via either the URL\
    \ or as other information sent to the server as part of the request. This is called\
    \ the request packet; we have touched on this already in our discussion of servlets.\n\
    \nSession variables exist in the memory of the web server. Each request includes\
    \ a session ID. The session ID links the request to the session data for that\
    \ user. The session ID is automatically passed between requests. You don’t have\
    \ to do anything. It’s always there.\n\nSince there is one session per user, you\
    \ can store variables in each user’s session. This is a space in memory that holds\
    \ data while the user is using the site. Since Java always knows the session ID,\
    \ it has access to any data in the session.\n\nSo, it’s the request packet and\
    \ the session that tie the room together. And you thought it was the rug! (Not\
    \ funny? Watch The Big Lebowski again). A session makes it easy for the server\
    \ to connect one request to another."
