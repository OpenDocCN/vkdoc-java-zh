- fmt: '# 16. Make Web Pages Do Something Using JavaScript


    JavaScript is the language of the browser. It is an object-oriented programming
    language. Although JavaScript looks much like Java (because both were based on
    C and C++), it is not at all related. JavaScript is often used to programmatically
    interact with an HTML page. It does this by interacting with the DOM (document
    object model). JavaScript is supported by all major browsers.


    Include JavaScript in your web page by putting the script between `<script>` and
    `</script>` tags. You can place the script tags in the head section or at the
    bottom of page. If you place the JavaScript on top of your page or between the
    `<head>` tags, the user may see a blank page for a few seconds. However, once
    the page is loaded, everything will be fully functional from the first second.
    If you place the JavaScript at the bottom of the page, the page will seem to load
    faster, but the JavaScript will not run until the page (and script) is fully loaded.
    JavaScript may also be saved in a text file (no script tags are needed in this
    case) and referenced in the head section of your page. This allows you to reuse
    the same JavaScript on multiple pages. Using linked files is better from a maintenance
    perspective since all the JavaScript resides in only one location, making updates
    easy.


    Because many developers find JavaScript challenging to work with, various libraries
    have been developed over the years to simplify the routine tasks of working with
    JavaScript. JQuery ([`http://www.jquery.com`](http://www.jquery.com)) works across
    all browsers that support JavaScript and makes working with JavaScript much more
    consistent. JQuery is used extensively in BootStrap. We will look at BootStrap
    shortly; it makes working with JQuery, HTML, and CSS even more fun.


    **Note**


    Manipulating the DOM is one of JavaScript’s more powerful uses. With DOM, you
    can navigate through and modify an entire page, ranging from simply adding an
    element to rearranging several areas on the page. DOM breaks up a document into
    a tree of nodes.


    ## Validate a Form Using JavaScript


    The form in Listing [16-1](#A458483_1_En_16_Chapter.html#Par6) is used to submit
    a post to Bullhorn. The post should be validated before the user attempts to submit
    it. JavaScript allows us to do this at the browser. The JavaScript method to validate
    the form is shown in the listing and contains one method, `validate()`. The JavaScript
    should be placed between `<script>...</script>` tags at the bottom of the page
    just before the closing body tag, `</body>`. Placing the script after the elements
    it references ensures the elements have been created by the DOM before the script
    is executed. The `validate` method looks at the element with an ID of `posttext`
    and returns false if the length of this text box is 0 (empty post). A false return
    will prevent the form from being submitted.


    ```

    function validate() {

    valid = true;

    if ($(''#posttext'').val().length==0){

    alert("You may not submit an empty post.");

    valid = false;

    }

    return valid;

    }

    Listing 16-1

    A JavaScript Function to Validate the Form Can Go Between Script Tags at the Bottom
    of the Web Page, Just Before the Closing Body Tag

    ```


    The HTML form that will use the preceding validation script goes on your web page
    within the `<body>...</body>` tags and before your JavaScript. This form will
    call the script when the Submit button is clicked. If the `validate` method returns
    false then the form will not be submitted. See Listing [16-2](#A458483_1_En_16_Chapter.html#Par8).
    The `onsubmit` attribute of the `form` tag calls the JavaScript function to validate
    the form.


    ```

    Create New Post (141 char):


    Listing 16-2

    Form for Submitting a Post

    ```


    ### Display Number of Characters in Text Box


    We can also use JavaScript to count the number of characters remaining and update
    the web page dynamically as the user types. This is an excellent example of the
    power of JavaScript. It shows that it can be used to manipulate the web page at
    the browser. This JavaScript function will load when the document is ready. The
    document is ready after it has been fully rendered and all the DOM has been downloaded
    from the web server to the browser. Then the function will be created. This function
    will set the HTML property of the element with the ID of `textarea_feedback` to
    "XX characters remaining," where XX is the number of remaining characters from
    the max length of 141. Within `document.ready`, the `keyup` event of the element
    with an ID of `posttext` is modified to include another function that counts the
    number of remaining characters and displays them in the `textarea_feedback` element.
    See Listing [16-3](#A458483_1_En_16_Chapter.html#Par10).


    ```

    $(document).ready(function() {

    var text_max = 141;

    $(''#textarea_feedback'').html

    (text_max + '' characters remaining'');

    $(''#posttext'').keyup(function() {

    var text_length = $(''#posttext'').val().length;

    var text_remaining = text_max - text_length;

    $(''#textarea_feedback'').html(text_remaining + ''

    characters remaining'');

    });

    });

    Listing 16-3

    JavaScript to Return the Number of Characters Remaining in the Text Box

    ```


    # 17. Cascading Style Sheets (CSS)


    Cascading Style Sheets (CSS) allow you to specify the visual style and presentation
    of your web application. CSS allows you to separate the style from the structure.
    This means you are looking through less code when working with your page. The
    separation of style from structure and content also increases maintainability.
    Cascading Style Sheets are a set of programmable rules to define how your web
    pages display content. The styles described by CSS include the colors, fonts,
    layout, and other presentation aspects of a document, including variations in
    display for different devices and screen sizes. A single CSS file can describe
    a common style applicable to many documents.


    Typically, an element in an HTML file has a "cascade" of CSS style rules that
    can be applied to it. The styles cascade based on the location of the definition.
    If you define a style in multiple locations, then the last definition is applied.
    You can place your CSS between the `<head>...</head>` tags of a document, in an
    external style sheet (on your server or on another server), or as a style attribute
    of an element on your page.


    An external style sheet is generally recommended. To link an external style sheet
    to your document, add a link to the style sheet between the `<head>...</head>`
    tags of the document. Keeping the style definitions separate from your HTML content
    minimizes duplication and makes your site easier to maintain.


    When you create a style sheet, you create a rule for each element by name, class,
    or ID. These values are set as attributes of the element. The browser will apply
    the CSS rule when the page is rendered. Each rule has two parts: a selector and
    a group of one or more declarations surrounded by braces. Each declaration consists
    of a property name and value pair. There can be several declarations in one rule.
    See Listing [17-1](#A458483_1_En_17_Chapter.html#Par6), which shows an example
    CSS rule to be applied to all `span` tags for a document. This rule can be placed
    in the head section of your web page between `<style>...</style>` tags or in a
    separate file.


    ```

    span {

    font-weight: bold;

    color: yellow;

    background-color: black;

    }

    Listing 17-1

    Example CSS Rule

    ```


    If you wish to include your CSS rules in a separate file, just add a link to that
    file in the head section of your web page. See Listing [17-2](#A458483_1_En_17_Chapter.html#Par8).


    ```

    Listing 17-2

    Example Link to a Style Sheet

    ```'
