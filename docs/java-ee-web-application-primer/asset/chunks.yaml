  trans: "\n# 19. 使用 Gravatar 在帖子中显示用户头像\n\n头像（Avatar）是人们在网络上用于代表自己身份的图片。Gravatar\
    \ 是一项提供全球唯一头像的免费服务。Gravatar 允许用户使用其电子邮件地址注册一个账户。然后，用户可以上传一张图片与其 Gravatar 账户关联。当用户在某个使用\
    \ Gravatar 的网站上使用相同的电子邮件地址时，该网站会通过一个基于电子邮件地址哈希值生成的图片 URL，从 Gravatar 获取用户的头像。包括\
    \ Bullhorn 在内的网站可以自由使用 Gravatar 来显示用户的图片。Bullhorn 在帖子旁边和个人资料页面上显示该图片。\n\n```\n\
    \n要控制图片大小，请在 URL 后附加 `?s=150`，其中 150 是 URL 返回的正方形图片的高度或宽度（以像素为单位）。's' 的值范围可以从\
    \ 1 到 2048。较小的值看起来效果更好。\n\n如果用户没有设置 Gravatar，则会显示一张默认图片：\n\n[`https://www.gravatar.com/avatar/unknownhash`](https://www.gravatar.com/avatar/unknownhash)\n\
    \n![A458483_1_En_19_Figa_HTML.jpg](img/A458483_1_En_19_Figa_HTML.jpg)\n\n使用 Java\
    \ 计算 MD5 哈希值\n\nMD5 哈希是一种加密文本的方式，使得通过查看文本无法识别其内容。MD5 的价值在于，相同的电子邮件地址总是会生成相同的 MD5\
    \ 哈希值。\n\nGravatar URL 由用户电子邮件地址的 MD5 哈希值构成。你可以使用 Gravatar 网站提供的代码来创建电子邮件地址的 MD5\
    \ 哈希值。该代码已在 Bullhorn 的 `MD5Util.java` 类中实现。给定用户的电子邮件地址，该代码将返回一个包含 MD5 哈希值的字符串。¹\n\
    \nBullhorn 中的 `DbUser` 类包含一个生成 Gravatar URL 的方法。该方法接受两个参数：电子邮件和图片大小。然后，该方法返回正确的\
    \ URL，该 URL 可在整个 Bullhorn 站点的图片标签中使用。参见清单 19-1。\n\n```\npublic static String getGravatarURL(String\
    \ email, Integer size){\nStringBuilder url = new StringBuilder();\nurl.append(\"\
    http://www.gravatar.com/avatar/\");\nurl.append(MD5Util.md5Hex(email));\nurl.append(\"\
    ?s=\" + size.toString());\nreturn url.toString();\n}\n清单 19-1\n基于用户电子邮件地址生成 Gravatar\
    \ URL 的方法\n```\n\n脚注\n\nBullhorn 中 MD5 类的源代码源自 [`http://en.gravatar.com/site/implement/images/java`](http://en.gravatar.com/site/implement/images/java)\
    \ 上找到的代码。\n\n20. 表示层/视图\n\n表示层，也称为视图，是最终用户看待你的应用程序的视角。他们看不到所有的 Java 代码。他们只看到浏览器显示的内容。视图主要由\
    \ HTML、JavaScript 和图片组成。在本节中，我们将研究构成视图的不同 JSP 文件。JSP 文件包含其他代码，例如 JSTL，但最终结果是它们成为发送到用户浏览器的\
    \ HTML 文件。\n\n首先，用户浏览到站点的 `login.jsp` 页面 URL。你的开发环境的 URL 将是 `http://localhost:8080/Bullhorn/login.jsp`。\n\
    \n注意\n\n要在 Eclipse 中启动你的应用程序，在登录页面上，只需右键单击登录页面，然后选择“在服务器上运行”选项。你的站点将在 Eclipse\
    \ 环境内的浏览器中打开。\n\n登录页面的代码\n\n```\n\n登录\n\n${message}请登录\n电子邮件地址\n\n密码\n\n登录\n\n\
    加入\n\n```\n\n主页的代码\n\n```\n\nBullhorn\n\n这是主页\n\n创建新帖子 (141 字符):\n\n$(document).ready(function()\
    \ {\nvar text_max = 141;\n$('#textarea_feedback').html(text_max + ' characters\
    \ remaining');\n$('#posttext').keyup(function() {\nvar text_length = $('#posttext').val().length;\n\
    var text_remaining = text_max - text_length;\n$('#textarea_feedback').html(text_remaining\
    \ + ' characters remaining');\n});\n});\nfunction validate(form) {\nvalid = true;\n\
    if ($('#posttext').val().length==0){\nalert(\"You may not submit an empty post.\"\
    );\nvalid = false;\n}\nreturn valid;\n}\n\n```\n\n动态消息页面的代码\n\n```\n\nBullHorn\n\
    \n这是动态消息页面\n\n用户帖子日期\n\n\">\n\n```\n\n个人资料页面的代码\n\n```\n\nBullHorn\n\n/>&nbsp;&nbsp;个人资料\
    \ \n电子邮件: \n座右铭: \n加入日期:\n\n&nbsp;&nbsp;编辑 ${username} 的个人资料\n\n电子邮件: \n座右铭: \n\
    加入日期:\n\n```\n\n添加用户页面的代码\n\n```\n\nBullHorn\n\n添加新用户\n姓名: \n电子邮件: \n密码: \n座右铭:\
    \ \n加入日期: -->\n\n```\n\n支持页面的代码\n\n```\n\nBullHorn\n\n这是支持页面\n\n```\n\n错误页面的代码\n\
    \n```\n\nBullHorn\n\n出了点问题...\n\n```\n\n导航栏包含文件\n\n```\n\n切换导航\n\n&nbsp;Bullhorn\n\
    \n首页(当前)\n动态消息\n\n提交\n\n&nbsp;${user.username}\n\n用户选项\n\n登出-->\n\n登出\n\n显示我的帖子\n\
    编辑个人资料\n\n反馈\n\n```\n\nBootStrap 包含文件\n\nBootStrap 包含文件包含 BootStrap 文件的链接。这些链接来自\
    \ BootStrap 网站。他们使用名为 MaxCDN 的内容分发服务来托管他们的文件。你无需下载任何东西。只需包含来自 BootStrap 网站的链接，你的应用程序就会通过互联网获取该文件。\n\
    \nBootStrap 包含文件还包含一些样式表的链接，这些样式表可以在你的 Bullhorn 应用程序的 styles 文件夹中找到。styles 文件夹位于\
    \ WebContent 文件夹之下。\n\nBootstrap 样式页面\n\nBullhorn 站点包含一些从 [`https://bootswatch.com/`](https://bootswatch.com/)\
    \ 下载的样式表。该站点包含免费可下载的 BootStrap 主题，你可以将其包含在你的项目中。只需浏览他们的收藏并将其包含在你的站点中。然后，从每个网页，你需要包含一个指向你想要使用的主题的链接。这是在\
    \ BootStrap 包含文件中完成的。\n\n页脚包含文件\n\n```\n\n&nbsp;Bullhorn&nbsp;&nbsp;&copy; 2016\n\
    \n```\n\n索引\n\nA\n\nAddUser servlet 代码\n\n美国国家标准学会 (ANSI)\n\n属性\n\naction\n\n\
    alt\n\nmethod\n\nname\n\nsrc\n\ntype\n\n头像\n\nB\n\nBhpost 表\n\n用于创建的 SQL\n\nSQL\
