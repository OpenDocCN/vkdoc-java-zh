- fmt: "# JSP Standard Tag Library (JSTL)\n\nThe JSP Standard Tag Library (JSTL) is\
    \ a collection of useful tags you can add to your JSP pages. These tags add functionality\
    \ common to many JSP applications. JSTL adds support for common structural tasks,\
    \ such as iteration and conditionals. They also add support for properly escaping\
    \ HTML or XML code in your pages. This prevents the tags from being evaluated\
    \ and potentially executing malicious code.\n\n`EL` (expression language) is a\
    \ subset of JSTL that makes it easy to use Java classes (called beans) in your\
    \ JSP. Expression language has a compact syntax and allows you to access the nested\
    \ properties of objects. For example, a `post` object contains a user. Expression\
    \ language allows your JSP to access the `getUsername()` method of the user with\
    \ the relaxed syntax of `${user.username}`. Expression language can also retrieve\
    \ the values of scalar variables set from the servlet using syntax such as `${message}`.\n\
    \nTo include JSTL in your JSP, add the directives shown in the following code\
    \ listing (Listing [12-5](#A458483_1_En_12_Chapter.html#Par35)) to the top of\
    \ your page. Exact placement isn’t important, but just above the `<html>` tag\
    \ is a good place. JSTL is composed of libraries that add functionality for tasks\
    \ such as looping and if/else statements, as well as formatting numbers, dates,\
    \ and times. Since we know we want to include looping and if/else functionality\
    \ in our JSP, and we want to also format dates, we’ll include both the core library\
    \ and the formatting library. See Listing [12-5](#A458483_1_En_12_Chapter.html#Par35).\n\
    \n```\nListing 12-5\nJSTL Directives Which Should Be Included Just Above the \
    \ Tag on Your Page. The C Prefix Includes Tags from the Core Library. The FMT\
    \ Prefix Includes Tags from the Formatting Library.\n```\n\n## How to Use JSTL\
    \ Tags in Your JSP\n\n1.  Copy the following two Java archive (jar) files from\
    \ the files included with this book to the `WEB-INF/lib` folder of a dynamic web\
    \ application.\n    1.  `taglibs-standard-impl-1.2.5.jar`\n    2.  `javax.servlet.jsp.jstl-api-1.2.1.jar`\n\
    2.  Add the following directives to include the core and formatting libraries\
    \ for JSTL to the top of the page:\n\nYou can now use any of the JSTL tags discussed\
    \ next.\n\n# What Can You Do with JSTL?\n\n## Prevent Cross-site Scripting Attacks\n\
    \nCross-site scripting (XSS) is a computer security vulnerability that occurs\
    \ when malicious users input scripts or other code into your website through the\
    \ text boxes on your web pages. The JSTL `core out` tag prevents cross-site scripting\
    \ attacks. The `c:out` escapes any input from the user so it is no longer executable.\
    \ If a user entered malicious JavaScript in a text box on your website, that JavaScript\
    \ would be executed and could compromise the data. The `c:out` JSTL tag reduces\
    \ this vulnerability.\n\n## Loop Through a Collection\n\nThe JSTL `forEach` tag\
    \ provides a mechanism to loop through the items in a collection. The collection\
    \ can be set in the servlet, and the JSTL code in your JSP will loop through it\
    \ and repeat the code between the `forEach` open and closing tags. Any HTML in\
    \ between those tags will also be repeated for each item in the collection. You\
    \ can see an example of the `forEach` tag in the `newsfeed.jsp` page. See also\
    \ Listing [12-6](#A458483_1_En_12_Chapter.html#Par45).\n\n```\nListing 12-6\n\
    The JSTL forEach Tag Allows You to Loop Through a Collection of Posts\n```\n\n\
    ## Set a Value\n\nThe code in Listing [12-7](#A458483_1_En_12_Chapter.html#Par47)\
    \ shows how to set the value of a variable called `number`. You can then refer\
    \ to the variable later in the page or even the session. To refer to the variable\
    \ only on the current page, set the scope to `\"request\"`. To refer to the variable\
    \ on other pages in your application, set the scope to `\"session\"`, which applies\
    \ just to a single user, or `\"application\"`, which applies to all users. You\
    \ can then use the variable with a `c:out` tag later in your page or application.\
    \ In the example here we simply set the value to some random value, say, 10.\n\
    \n```\nListing 12-7\nUsing the set Tag of the JSTL Core Library\n```\n\n## Test\
    \ a Condition\n\nJSTL allows you to include or exclude code based on a condition.\
    \ In the example in Listing [12-8](#A458483_1_En_12_Chapter.html#Par49), the value\
    \ of the variable called `number` determines if the content between the JSTL `if`\
    \ tags will be displayed or not.\n\n```\nAny content between the if tags will\n\
    display when the condition if true\n\nListing 12-8\nJSTL Allows You to Show or\
    \ Hide Code Based on a Condition\n```\n\n## Repeat Content a Fixed Number of Times\n\
    \nThe JSTL core library `forEach` tag will repeat content a fixed number of times.\
    \ The content is whatever you have specified in between the opening and closing\
    \ `forEach` tags. The content will be repeated the number of times indicated by\
    \ the `begin` and `end` attributes, inclusively. In the code in Listing [12-9](#A458483_1_En_12_Chapter.html#Par51),\
    \ the numbers 5 6 7 8 9 10 will be displayed in the browser.\n\n```\nListing 12-9\n\
    JSTL Allows You to Repeat Content a Fixed Number of Times\n```\n\n## Test a Condition\
    \ and Choose an Alternative\n\nJSTL does not feature an `else` clause to go with\
    \ the `if` statement. However, the JSTL core `when` and `otherwise` tags work\
    \ like an if-else statement when placed inside the JSTL core `choose` tag. You\
    \ can have any number of `when` tags but only one `otherwise` tag. See Listing\
    \ [12-10](#A458483_1_En_12_Chapter.html#Par53).\n\n```\nListing 12-10\nThe JSTL\
    \ choose, when, and otherwise Tags Allow You to Simulate an if/else Condition\n\
    ```\n\n## Determine If a String Is Null or Empty\n\nJSTL will allow your code\
    \ to test a value and determine if the value is null or empty. As shown in the\
    \ code in Listing [12-11](#A458483_1_En_12_Chapter.html#Par55), you pass the variable,\
    \ which can be set in the servlet or from a collection you’re looping through.\
    \ Then, if the string is null or empty, the code between the `c:if` statements\
    \ will execute. If HTML code is between the `c:if` tags then it will be displayed\
    \ in the browser when the condition is true. You can negate the condition by placing\
    \ the word `not` prior to the word `empty`.\n\n```\nvar1 is empty or null.\n\n\
    Listing 12-11\nTest If a Variable Is Null or Empty\n```\n\n## Formatting Dates\n\
    \nJSTL will allow you to display dates in a format you specify. We use this in\
    \ Bullhorn when we display the post date. We only want to see the date as the\
    \ year followed by the month abbreviation and then the day. The value of the date\
    \ should be a `Date` object, `java.util.Date`. If your date is a `String` object,\
    \ then you should convert it first. The JSTL `formatDate` tag will format a date\
    \ according to the specified pattern. See Listing [12-12](#A458483_1_En_12_Chapter.html#Par57).\n\
    \n```\nListing 12-12\nUsing the JSTL Format Library to Format a Date\n```\n\n\
    # How to Display Form Data\n\nJava web applications typically contain forms that\
    \ collect user input and pass it to a servlet for processing. The servlet can\
    \ then communicate with the database and do something with the data. Once the\
    \ servlet is finished working with the data it will send a new web page to the\
    \ browser with the results of the form. All this happens in an instant on the\
    \ server and out of the sight of the user."
