    machine with the settings described in the dialog. You will see the Oracle virtual
    machine in the VirtualBox Manager’s list of virtual machines. The VirtualBox Manager
    is the first screen that opens when you open VirtualBox. Select your machine,
    click Start, and give it time to load, then you can work with that machine as
    if it were a separate computer.


    Note


    If you’re not using the Oracle virtual machine, you can complete everything in
    this book using Windows.


    You can download and install Oracle database version 12c for Windows at [`http://www.oracle.com/technetwork/database/enterprise-edition/downloads/database12c-win64-download-2297732.html`](http://www.oracle.com/technetwork/database/enterprise-edition/downloads/database12c-win64-download-2297732.html)
    .


    You will also need to install SQL Developer, which you can find at [`http://www.oracle.com/technetwork/developer-tools/sql-developer/downloads/index.html`](http://www.oracle.com/technetwork/developer-tools/sql-developer/downloads/index.html)
    .


    Finally, you will need to install Eclipse Oxygen from [`http://www.eclipse.org/downloads`](http://www.eclipse.org/downloads)
    .


    # 2. What Is a Database?


    A database is a place to permanently store data for retrieval in a safe, efficient
    way. A database allows us to create data and save it permanently. It allows us
    to retrieve previously created data, update existing data, or delete existing
    data.


    A transaction groups SQL statements so that they are all applied to the database.
    If one statement fails for some reason, all the statements are undone from the
    database. Transactions ensure data integrity . Transactions distinguish a database
    management system such as Oracle from a file system.


    The properties of a database transaction that ensure data validity are atomicity,
    consistency, isolation, and durability.


    *   Atomicity refers to the fact that in each database transaction either all
    the information is saved or none of the information is saved.

    *   Consistency ensures that a transaction either works correctly or the dataset
    is returned to the state it was in before the transaction was executed.

    *   Isolation refers to the ability of a database to keep a transaction that is
    not yet committed distinctly separate from the working database.

    *   Durability refers to the way committed data is saved by the system such that,
    even in the event of a failure and system restart, the data is available in its
    correct state.


    The database stores data in sets, which are most commonly viewed as tables. One
    row of a database table represents a record containing related attributes, called
    fields . Fields are represented by the columns in a table.


    ## Referential Integrity


    Your database management system (DBMS) supports referential integrity . The goal
    of referential integrity is to avoid having “orphaned” data. Orphaned data can
    happen when you are deleting or updating the data in your tables; for example,
    if you have a post in your database that does not have a matching user. This shouldn’t
    happen and is often the result of importing poorly formatted data or inadvertently
    deleting a user. A database management system such as Oracle can enforce referential
    integrity to prevent this by denying changes that will result in orphaned data.


    ## Null Values


    Sometimes there is no value in a column of a row. In this case, the column stores
    a NULL value . You can think of this as a flag to indicate the absence of data.
    NULL is different from the numeric value zero or a string with a length of zero
    characters. It is neither. It is nothing, because no value has been stored in
    the column for this record. NULL, it turns out, is very useful. You can search
    for a field in records that contain NULL and know that they are the ones with
    no value in the field.


    ## Primary Keys, Foreign Keys, and Indexes


    Databases are very powerful tools that allow us to search and sort data at incredible
    speeds. An essential ingredient of the mechanics of a database is that each record
    should be unique. To make each record unique, either use an existing field that
    is unique to each record or add a field to each record that contains a unique
    number.


    Your DBMS can generate a unique number for each record. The unique number of each
    record becomes its primary key . This field distinguishes that record from any
    other in the table.


    When a second table contains data related to that of the first table, the second
    table can refer to the original using the primary key field.


    A primary key used as a reference in another table is called a foreign key . Foreign
    keys define a reference from one table (the child) to another table (the parent).


    To make access to a column of data more efficient, the database will create an
    object called an index . An index contains an entry for each value in the indexed
    column(s), resulting in fast access to rows. Like an index in a print book, the
    database can look up the requested value in the index and quickly locate its corresponding
    row in the table.


    ## Joining Tables


    Relationships are a means to join data to different tables. This helps you avoid
    redundancy in the tables. You can divide your data into different tables—entering
    it only once—and then reference it from other tables by establishing relationships.


    There are three types of relationships , as follows:


    *   A One-to-One relationship is where each record in the first table has only
    one matching record in the second table. This usually happens when information
    in one table is divided across multiple tables. This is not common.

    *   A One-to-Many relationship is where each record in the first table matches
    with multiple records in the second table. For example, a user can have multiple
    posts.

    *   A Many-to-Many relationship is where each record in the first table can have
    many corresponding records in the second table, and also each record in the second
    table can have many corresponding records in the first table.


    ## Normalization


    In a normalized data structure, each table contains information about a single
    entity and each piece of information is stored in exactly one place.


    Normalization is the process of efficiently organizing data in a database. This
    is done by organizing the columns (fields or attributes) and tables of a relational
    database to minimize data redundancy.


    The goals of the normalization process are to eliminate redundant data and ensure
    data dependencies make sense.'
