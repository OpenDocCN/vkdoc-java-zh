    # 10. 表示层/视图


    用户通过他们的网页浏览器与您的应用程序进行交互。网页浏览器的作用是显示 HTML、JavaScript 和图像。每个网页文档都包含我们称之为头部（head）和主体（body）的两个部分。


    头部包含标题标签（title tag）、链接标签（link tag）和脚本标签（script tag）。链接标签和脚本标签分别允许页面包含用于样式表和 JavaScript
    的外部文件。我们的应用程序将包含指向 Bootstrap 样式表和 JavaScript 的链接。


    文档的主体包含更多信息。主体是浏览器中可见内容的存放位置。这包括表单、显示给用户的文本、链接和图像。主体中的所有内容都将使用标签进行标记，这些标签决定了内容将如何渲染。


    您可以在网页中包含注释，这些注释不会显示给用户。它们有助于您记录页面布局。


    # 11. 使用 HTML 设计网页


    HTML（超文本标记语言）是一种用于创建网页文档（网页）的标记语言。浏览器的主要功能是从网络服务器接收 HTML 格式的网页并进行显示。浏览器会应用由 HTML
    标签和 CSS 属性值指定的所有字体、样式和布局。这些内容可以通过使用 JavaScript（浏览器的编程语言）进行进一步操作。


    文档对象模型（DOM）是您 HTML 文档的一种树形结构表示。DOM 将每个节点视为代表文档一部分的对象。这些对象可以通过 JavaScript 以编程方式进行操作，从而使您的页面能够与用户交互。


    以下是您需要了解的关于 HTML 的全部内容：


    *   HTML 文档由称为标签的元素组成。

    *   网页文档中 HTML 元素的集合称为 DOM（文档对象模型）。

    *   标签用于标识文档内容和结构。

    *   标签通常包含为元素提供参数的属性。

    *   包含内容和标签的 HTML 文档由浏览器渲染，以显示网页的格式化版本。

    *   HTML 的最新版本称为 HTML5。

