- fmt: "# Span and Div Tags\n\n`Span` and `div` are container tags that define parts\
    \ of your document. Use `span` and `div` to apply styles to a section of a JSP\
    \ or HTML page. Your page is more organized when you divide it into parts such\
    \ as header, body, and footer.\n\nThe `<div>` tag is used to divide your HTML\
    \ page into sections and therefore encapsulates various elements. The `<span>`\
    \ tag is used to group inline elements in a document. The `<div>` and `<span>`\
    \ tags provide no visual change on their own. These tags provide a way to control\
    \ the style of part of your document when each tag includes a `style`, `class`,\
    \ or `id` attribute. The difference between an ID and a class is that an ID can\
    \ be used to identify one element while a class can be used to identify multiple\
    \ elements. When you wish to apply a style to multiple elements, specify the style\
    \ as a class, since only one element can have an ID attribute with a particular\
    \ value, but many elements can share the same value in their `class` attribute.\
    \ The `<span>` and `<div>` tags have no required attributes. The most common attributes\
    \ used are:\n\n*   `style` specifies a style that applies to all content and elements\
    \ up to the corresponding `end` tag.\n*   `class` specifies a CSS class that applies\
    \ to all content and elements up to the `end` tag. The value of the `class` attribute\
    \ is a CSS class specified in the style sheet file. In the style sheet, the class\
    \ name is preceded by a period.\n*   `id` identifies the tag so you can select\
    \ it with jQuery or JavaScript. The `id` attribute for any element must be unique.\
    \ In the style sheet, the ID name is preceded by a `#` hash character.\n\n```\n\
