  ## 摘要


  项目通常依赖于内部或第三方库。Gradle 为声明和管理这些依赖提供了出色的支持。本章回顾了声明式依赖的基础知识，并学习了如何使用依赖配置对依赖进行分组。你还了解了三种依赖类型——外部模块、文件和项目。外部模块依赖使用
  `group`、`name` 和 `version` 属性声明，而文件依赖则使用其名称声明。接着，本章回顾了 Gradle 如何解决依赖冲突以及如何配置解决策略。最后，你了解了仓库在依赖管理中的作用以及
  Gradle 支持的几种仓库类型。


  下一章将介绍 Gradle 对多项目的支持。


  '
- "# 7. 多项目构建\n\n复杂的企业项目通常被拆分为多个子项目，以简化开发、提高可维护性并增强复用性。本章将回顾多项目的结构和配置方式。你将构建一个示例多项目，以更好地理解\
  \ Gradle 的多项目支持。你将了解如何在根项目和子项目之间分发构建逻辑。你还将学习如何执行单个项目构建或完整项目构建，以及如何在项目之间声明依赖。\n\n\
  ## 多项目结构\n\nGradle 通过允许在单个根 Gradle 项目下嵌套多个 Gradle 项目来支持复杂项目的开发。根项目允许你定义公共依赖和构建逻辑，而不是将其分散到各个项目中。根项目提供了一个对所有项目执行完整构建的单一位置，而无需单独构建每个子项目。分层结构的多项目布局如图\
  \ 7-1 所示。\n\n![A978-1-4842-1031-4_7_Fig1_HTML.gif](img/A978-1-4842-1031-4_7_Fig1_HTML.gif)\n\
  \n图 7-1.\n\n标准分层多项目布局\n\n根项目包含三个子项目文件夹、一个 `build.gradle` 文件和一个 `settings.gradle`\
  \ 文件。每个子项目可以包含一个可选的 `build.gradle` 文件。为了更好地理解多项目构建以及 `settings.gradle` 文件的重要性，你将在下一节中了解如何实现一个示例多项目。\n\
  \n### 示例项目\n\n此示例多项目由一个包含用户界面（WAR 工件）的 Web 子项目、一个包含服务层代码的服务项目（JAR 工件）以及一个包含持久层和实体代码的仓库项目（JAR\
  \ 工件）组成。UI 层代码依赖服务层代码来完成 Web 请求。因此，Web 子项目依赖于服务子项目。服务层代码将所有持久化操作委托给仓库层。因此，服务子项目依赖于仓库子项目。图\
  \ 7-2 直观地展示了这种依赖关系。\n\n![A978-1-4842-1031-4_7_Fig2_HTML.gif](img/A978-1-4842-1031-4_7_Fig2_HTML.gif)\n\
  \n图 7-2.\n\n示例项目依赖关系\n\n首先，在你的本地机器上创建以下文件夹结构，开始实现示例多项目。\n\n`intro-root`\n\n      `web`\n\
  \n      `service`\n\n      `repository`\n\n`root` 项目是 `intro-root`，子项目是 `web`、`service`\
  \ 和 `repository`。在 `root` 项目中创建一个空的 `build.gradle` 文件，并运行 `gradle projects` 命令。`projects`\
  \ 任务是一个内置的 Gradle 任务，它以分层方式显示子项目。命令输出如下：\n\n`\\chapter` `7` `\\intro-root>gradle\
