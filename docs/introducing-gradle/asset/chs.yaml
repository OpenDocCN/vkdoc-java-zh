  |

  | `commons-lang3-3.4.jar` | [`http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar`](http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar)
  |

  | `spring-core-4.2.3.RELEASE.jar` | [`http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar`](http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar)
  |

  | `slf4j-api-1.7.13.jar` | [`http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar`](http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar)
  |


  此时，项目应具有如图 6-3 所示的目录结构。


  ![A978-1-4842-1031-4_6_Fig3_HTML.jpg](img/A978-1-4842-1031-4_6_Fig3_HTML.jpg)


  图 6-3.


  gradle-file-dep 文件夹结构


  将文件作为依赖项添加到项目涉及向 Gradle 传递一个文件集合。顾名思义，文件集合就是一组文件。处理文件集合的最简单方法是使用 `Project.files()`
  方法。此方法接受可变数量的对象作为参数，并尝试将它们转换为 `java.io.File` 实例的集合。清单 6-4 显示了 `build.gradle` 文件，其中向
  `compile` 配置添加了两个文件依赖项。


  清单 6-4\. 包含两个文件依赖项的 build.gradle


  `apply plugin: ''java''`


  `dependencies {`


  `compile files ("lib/logback-classic-1.1.3.jar", "lib/commons-lang3-3.4.jar")`


  `}`


  有时，您可能希望包含文件夹中的所有文件或子集，而不是将每个文件都列为依赖项。您可以使用项目的 `fileTree` 方法来实现这一点。文件树表示文件的层次结构，例如
  `directory`。清单 6-5 显示了更新后的 `build.gradle` 文件，该文件将 `lib` 目录中的所有 JAR 文件添加到 `compile`
  配置中。


  清单 6-5\. 使用文件树的文件依赖类型


  `apply plugin: ''java''`


  `dependencies {`


  `compile fileTree (dir : "lib", include: "*.jar")`


  `}`


  文件依赖项不包含在项目的依赖描述符中。因此，运行 `gradle dependencies` 命令不会在控制台上列出文件依赖项的 JAR。要查看这些 JAR，请将清单
  6-6 中所示的 `displayJars` 任务附加到 `build.gradle` 文件中。该任务使用 `collect()` 方法遍历 `compile`
  配置中的所有依赖项并打印它们的名称。


  清单 6-6\. displayJars 任务


  `task displayJars << {`


  `println "${configurations.compile.collect {File f -> f.name}}"`


  `}`


  使用命令提示符，在 `project` 文件夹内运行 `gradle -q displayJars` 命令。您应该会看到以下输出：


  `\gradle-file-dep>gradle -q displayJars`


  `[commons-lang3-3.4.jar, logback-classic-1.1.3.jar, slf4j-api-1.7.13.jar, spring-`


  `core-4.2.3.RELEASE.jar]`


  ### 项目依赖


  复杂的企业项目通常被拆分为更小的项目。例如，一个在线应用程序可能被分解为三个独立的项目——一个包含 UI 相关资源和组件的 Web 项目、一个包含后端服务的服务项目，以及一个包含用于访问数据库后端的仓库/DAO
  代码的仓库项目。在这种情况下，Web 项目依赖于服务项目，而服务项目又依赖于仓库项目。Gradle 提供了项目依赖类型来建立此类依赖关系。


  项目依赖可以使用项目的 `project()` 方法来声明，该方法接受被依赖项目的名称。清单 6-7 展示了一个“web”项目依赖于 `service` 项目的示例。冒号
  (`:`) 字符表示项目层次结构。因此，字符串 `":service"` 表示服务项目位于根目录下一级。


  清单 6-7\. 项目依赖类型


  `dependencies {`


      `compile project (":service")`


  `}`


  通过此项目依赖，Gradle 会将生成的 `service.jar` 工件作为依赖项包含在 Web 项目中。此外，服务项目的依赖项及其传递依赖项也会作为 Web
  项目的依赖项添加。您将在第 7 章中更详细地了解项目依赖项，并附有示例。




  ## 解决依赖冲突


  假设有一个名为 `transitive-dep` 的 Gradle 项目，它使用了 Spring Core 库（`spring-core.jar`）和 Apache
  HttpClient（`httpclient.jar`）。清单 6-8 展示了该项目的 `build.gradle` 文件，其中包含两个编译时依赖项。


  **清单 6-8\. 版本冲突示例**


  `apply plugin: ''java''`


  `dependencies {`


  `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


  `}`


  `repositories {`


  `mavenCentral()`


  `}`


  Spring Core 和 HttpClient 库都使用 Apache Commons Logging 作为其底层日志框架。然而，Spring Core 4.2.2
  版本使用的是 Commons Logging 1.2 版本，而 HttpClient 4.0 版本使用的是 Commons Logging 1.1 版本。当出现此类版本冲突时，Gradle
  默认会使用传递依赖的最新版本。`gradle dependencies` 命令的输出展示了这种解析策略：


  `\chapter` `6` `\transitive-dep>gradle dependencies`


  `----------`


  `compile - Compile classpath for source set ''main''.`


  `+--- org.springframework:spring-core:4.2.2.RELEASE`


  `|    \--- commons-logging:commons-logging:1.2`


  `\--- org.apache.httpcomponents:httpclient:4.0`


  `+--- org.apache.httpcomponents:httpcore:4.0.1`


  `+--- commons-logging:commons-logging:1.1.1 -> 1.2`


  `\--- commons-codec:commons-codec:1.3`


  有时，您可能不希望 Gradle 选择最新的 JAR 文件。在这种情况下，您可以更改默认的解析策略，强制 Gradle 包含特定版本。清单 6-9 展示了实现此目的的修改后的
  `build.gradle` 文件。`configurations{}` 块允许您配置项目的依赖配置行为。然后，您将 `resolutionStrategy`
  块应用于所有配置。最后，您使用 `force` 方法强制使用 1.1.1 版本的 commons-logging 依赖项。


  **清单 6-9\. 强制依赖项的解析策略**


  `apply plugin: ''java''`


  `configurations.all {`


  `resolutionStrategy {`


  `force ''commons-logging:commons-logging:1.1.1''`


  `}`


  `}`


  `dependencies {`


  `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


  `}`


  `repositories {`


  `mavenCentral()`


  `}`


  在修改后的 `build.gradle` 上运行 `gradle dependencies` 命令，可以看到 1.1.1 版本被选中，而不是 1.2 版本：


  `default - Configuration for default artifacts.`


  `+--- org.springframework:spring-core:4.2.2.RELEASE`


  `|    \--- commons-logging:commons-logging:1.2 -> 1.1.1`


  `\--- org.apache.httpcomponents:httpclient:4.0`


  `+--- org.apache.httpcomponents:httpcore:4.0.1`


  `+--- commons-logging:commons-logging:1.1.1`


  `\--- commons-codec:commons-codec:1.3`


  尽管传递依赖很有用，但它们也可能导致问题及不可预测的副作用，因为项目中最终可能会包含错误版本的 JAR 包。为了主动排查版本冲突问题，您可以让 Gradle 在发现版本冲突时构建失败。您可以使用
  `failOnVersionConflict` 方法更改默认的解析策略，使其在版本冲突时失败。清单 6-10 展示了使用 `failOnVersionConflict()`
  方法的修改后的 `build.gradle` 文件。


  **清单 6-10\. 冲突时失败的解析策略**


  `apply plugin: ''java''`


  `configurations.all {`


  `resolutionStrategy {`


  `failOnVersionConflict()`


  `}`


  `}`


  `dependencies {`


  `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


  `}`


  `repositories {`


  `mavenCentral()`


  `}`


  在命令行中运行 `gradle dependencies` 命令，您将看到一个失败报告：


  `FAILURE: Build failed with an exception.`


  `* What went wrong:`


  `Execution failed for task '':dependencies''.`


  `> Could not resolve all dependencies for configuration '':compile''.`


  `>``A conflict was found between the following modules:`


  `- commons-logging:commons-logging:1.2`


  `- commons-logging:commons-logging:1.1.1`




  ## 仓库


  如本章开头所述，仓库包含依赖项及其相关的元数据。Gradle 开箱即用即可支持 Maven、Ivy 和本地目录仓库。它还提供了一些预配置的仓库，方便您与常用仓库进行交互。`mavenCentral()`
  仓库就是这样一个预配置的仓库，它指向 Maven 的中央仓库 `https://repo1.maven.org/maven2`。清单 6-11 展示了与 Maven
  Central 交互所需的配置。`repositories` 块用于配置项目中使用的仓库。


  **清单 6-11\. Maven Central 仓库配置**


  `repositories {`


  `mavenCentral()`


  `}`


  JCenter 是另一个流行的仓库，它托管工件于 [`https://bintray.com/bintray/jcenter`](https://bintray.com/bintray/jcenter)。清单
  6-12 展示了与 JCenter 仓库交互的配置。


  **清单 6-12\. JCenter 仓库配置**


  `repositories {`


  `jcenter()`


  `}`


  通常情况下，您的公司可能有一个内部的 Maven 仓库。Gradle 提供了一个 `maven()` 方法，可以轻松添加和配置 Maven 仓库。清单 6-13
  展示了一个自定义 Maven 仓库的声明。对于需要身份验证的仓库，该配置允许您提供凭据。


  **清单 6-13\. 自定义 Maven 仓库**


  `apply plugin: ''java''`


  `repositories {`


  `maven {`


  `url "http://your_repo.url"`


  `credentials {`


  `username ''user_name''`


  `password ''pwd''`


  `}`


  `}`


  `}`


  在某些有限的情况下，您可能需要使用本地 Maven 仓库来检索依赖项。本地 Maven 仓库通常位于 `USER_HOME/.m2` 目录中。对于这些场景，Gradle
  提供了另一个名为 `mavenLocal()` 的预配置仓库，如清单 6-14 所示。


  **清单 6-14\. Maven 本地仓库**


  `apply plugin: ''java''`


  `repositories {`


  `mavenLocal()`


  `}`


  在处理遗留项目时，您可能需要与位于本地目录中的库进行交互。Gradle 通过扁平目录仓库支持此类交互。这不应与 Maven 本地仓库混淆。Maven 本地仓库包含工件及其相关的元数据，例如
  `pom.xml` 文件。然而，扁平目录只包含 JAR 文件，没有元数据。清单 6-15 展示了使用 `lib` 文件夹中 JAR 文件的配置。


  **清单 6-15\. 扁平目录仓库**


  `apply plugin: ''java''`


  `repositories {`


  `flatDir {`


  `dirs ''lib''`


  `}`


  `}`


  `dependencies {`


  `compile name: ''commons-lang3'', version : ''3.4''`


  `compile name: ''logback-classic'', version: ''1.1.3''`


  `}`


  使用扁平目录仓库时，您需要使用工件的 `name` 和 `version` 属性来声明依赖项。清单 6-15 使用 `name` 和 `version` 属性声明了
  `commons-lang3` 库。在构建过程中，Gradle 会在 `lib` 目录中查找名为 `commons-lang3-3.4.jar` 的 JAR 文件。如果仅使用
  `name` 属性声明 `logback-classic` 库，Gradle 会在 `lib` 文件夹中查找名为 `logback-classic.jar` 的
  JAR 文件。


  与前面章节讨论的文件依赖项不同，来自扁平目录仓库的依赖项会包含在项目的依赖描述符中。要验证此配置，请在 `gradle-file-dep` 项目中创建一个 `build-file-repository.gradle`
  文件，并复制清单 6-15 的内容。在项目中运行 `gradle -b build-file-repository.gradle dependencies` 命令，它将列出以下依赖项：


  `compile - Compile classpath for source set ''main''.`


  `+--- :commons-lang3:3.4`


  `\--- :logback-classic:1.1.3`


  ## 创建 Uber JAR


  对于 Java 项目，Gradle 会生成一个包含编译后的类以及 `src/main/resources` 文件夹中其他资源的 JAR 文件。但是，在某些场景下，您可能希望将
  Java 应用程序作为包含所有依赖 JAR 的自包含应用程序进行分发。一种常见的打包技术是创建“uber”或“fat”JAR。在本节中，您将为本章中构建的 `gradle-dep`
  项目生成一个 uber JAR。


  要构建 uber JAR，您将使用一个名为 Shadow 的开源插件。该插件在 Gradle 插件门户上的页面 [`https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow`](https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow)
  提供了一个使用该插件的脚本片段（如清单 6-16 所示）。


  **清单 6-16\. Shadow 插件片段**


  `buildscript {`


    `repositories {`


      `maven {`


        `url "` [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
  `"`


      `}`


    `}`


    `dependencies {`


      `classpath "com.github.jengelman.gradle.plugins:shadow:1.2.2"`


    `}`


  `}`


  `apply plugin: "com.github.johnrengelman.shadow"`


  清单 6-16 中的 `buildscript` 块允许您使用像 Shadow 这样的第三方插件。在该块内部，您声明了位于 [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
  的 Gradle 插件 Maven 仓库。随后是一个 `dependencies` 块，您在其中将插件 JAR 添加到构建脚本的类路径中。


  将清单 6-16 中的片段附加到 `gradle-dep` 项目的 `build.gradle` 文件末尾。清单 6-17 展示了您将使用的完整 `build.gradle`
  文件。


  **清单 6-17\. 包含 Shadow 插件的构建脚本**


  `apply plugin: ''java''`


  `ext {`


      `logbackVersion = ''1.1.2''`


      `commonsLangVersion = ''3.4''`


      `junitVersion = ''4.12''`


      `hsqlDbVersion = ''2.3.3''`


  `}`


  `dependencies {`


      `compile "ch.qos.logback:logback-classic:$logbackVersion", "org.apache.commons:commons-lang3:$commonsLangVersion"`


      `testCompile (`


          `[group: ''junit'', name: ''junit'', version: "$junitVersion"],`


                                      `[group: ''org.hsqldb'', name: ''hsqldb'', version:
  "$hsqlDbVersion"]`


      `)`


  `}`


  `repositories {`


      `mavenCentral()`


  `}`


  `buildscript {`


      `repositories {`


          `maven {`


              `url "` [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
  `"`


          `}`


      `}`


      `dependencies {`


          `classpath "com.github.jengelman.gradle.plugins:shadow:1.2.2"`


      `}`


  `}`


  `apply plugin: "com.github.johnrengelman.shadow"`


  在 `gradle-dep` 项目中运行 `gradle shadowJar` 命令，您应该会看到以下输出：


  `\chapter` `6` `\gradle-dep>gradle shadowJar`


  `:compileJava UP-TO-DATE`


  `:processResources UP-TO-DATE`


  `:classes UP-TO-DATE`


  `:shadowJar`


  `BUILD SUCCESSFUL`


  任务成功完成后，导航到项目下的 `build/libs` 文件夹，您应该会看到一个 `gradle-dep-all.jar`。该 JAR 文件应包含来自 Logback
  和 Apache Commons Lang 的类，如图 6-4 所示。


  ![A978-1-4842-1031-4_6_Fig4_HTML.jpg](img/A978-1-4842-1031-4_6_Fig4_HTML.jpg)


