  ### 创建独立项目插件


  在上一节中，你构建了一个简单的插件，其源代码位于项目的 `buildSrc` 文件夹中。这种方法不太模块化，因为该插件无法在其定义的项目之外重用。独立项目方法允许你创建一个打包成
  JAR 文件的插件，并且可以轻松地被任意数量的项目分发和重用。为了更好地理解这种插件开发方法，你将创建一个更真实的插件。


  #### 插件背景


  软件项目通常使用由句点分隔的三个数字来表示版本号：


  `<主版本号>.<次版本号>.<补丁/增量版本号>`


  正如命名约定所暗示的，主版本号通常在进行重大功能变更（通常不向后兼容）时递增。次版本号在实现次要功能或重大错误修复时递增。最后，补丁/增量版本号针对小错误、文本更改等进行递增。此约定遵循
  [`http://semver.org/`](http://semver.org/) 上描述的“语义化版本 2.0.0”指南。


  在开发过程中，开发团队可能会为同一源代码创建多个构建，并将其部署用于测试或与其他开发人员共享。这些构建都将具有相同的版本号。为了单独区分这些构建，你通常会使用另一个称为构建编号的数字。一些软件团队遵循将构建编号附加到版本号的约定：


  `<主版本号>.<次版本号>.<补丁/增量版本号>.<构建编号>`


  其他团队则简单地将构建编号添加到生成的 JAR 清单中，或显示在应用程序的 UI 上。以下是一些带有构建编号的示例版本：


  *   1.0.0.56

  *   3.3.9.25BLR48

  *   6.1.0-20151123154556


  构建编号可以从多种来源获得——来自源代码签入的提交编号、构建时间戳或持续集成（CI）服务器生成的编号等。在本节中，你将创建一个生成随机构建编号的 Gradle
  插件。


  #### 插件配置


  为了便于本书管理，构建编号插件生成两种类型的值——基于时间戳的数值或字母数字值。清单 5-9 显示了一个假设的 `build.gradle` 配置来使用此插件。


  清单 5-9\. 构建编号插件示例用法


  `apply plugin: ''build-number-plugin''`


  `buildNumber {`


      `numberType = ''alphanumeric''`


      `alphaNumLength = 5`


  `}`


  该插件提供了一个 `buildNumber` 配置块，允许插件用户设置构建编号类型——字母数字或时间戳。用户可以使用 `alphaNumLength` 属性来指定生成的字母数字字符串中的字符数。


  配置插件后，可以在 `build.gradle` 文件中使用 `buildNumber.value` 访问生成的构建编号。


  注意


  有一些可用的开源 Gradle 插件可以从其他来源（如 Git/SVN）生成构建编号，并提供更多功能。你可以在 [`https://github.com/GeoNet/gradle-build-version-plugin`](https://github.com/GeoNet/gradle-build-version-plugin)
  查看这样一个插件。


  #### 插件开发


  你将通过创建一个 Groovy 项目来开始插件开发。在你的文件系统上创建一个名为 `build-number-plugin` 的文件夹，然后创建图 5-7 所示的子文件夹。


  ![A978-1-4842-1031-4_5_Fig7_HTML.jpg](img/A978-1-4842-1031-4_5_Fig7_HTML.jpg)


  图 5-7.


  独立项目目录结构


  下一步是使用插件项目所需的依赖项和配置填充 `build.gradle` 文件。清单 5-10 显示了 `build.gradle` 文件的内容。


  清单 5-10\. 构建编号插件的 build.gradle 文件


  `apply plugin: ''groovy''`


  `group = ''com.apress.gradle''`


  `version = ''1.0.0''`


  `dependencies {`


      `compile gradleApi()`


  `}`


  `uploadArchives {`


      `repositories {`


        `flatDir { dirs "../repo" }`


      `}`


  `}`


  由于你正在处理一个 Groovy 项目，因此必须通过应用 Groovy 插件来开始 `build.gradle` 文件。Gradle 工件使用三个坐标来标识（更多内容请参见第
  6 章）：


  *   表示负责该项目的组织的 group

  *   工件的名称

  *   工件的版本


  在 `build.gradle` 文件中，你使用 `com.apress.gradle` 和 `1.0.0` 作为 group 和 version 值。由于你没有指定名称，Gradle
  将项目文件夹的名称用作工件名称。文件的 `dependencies` 部分用于为 Gradle 提供插件项目编译和测试所需的外部库和框架。在这种情况下，你使用
  `gradleApi()` 来引入自定义插件和任务类使用的 Gradle API。


  注意


  在下一章中，你将更深入地了解依赖管理以及 Gradle 对引入外部依赖项的支持。


  最后，你使用 `uploadArchives` 方法将生成的插件上传或发布到仓库。`flatDir` 方法被配置为将打包好的插件发布到 `repo` 文件夹，该文件夹在文件系统上与
  `build-number-plugin`（项目）位于同一层级。


  注意


  生成的工件可以通过发布到中央/公共工件仓库来与其他开发人员/团队共享。第 8 章 将详细讨论工件发布。




  #### 插件扩展


  开发插件的下一步是让用户 `build.gradle` 中的插件配置（清单 5-9）对自定义插件可用。实现此目的的一种方法是通过扩展对象。每个 Gradle 项目都有一个
  `org.gradle.api.plugins.ExtensionContainer` 实例，用于跟踪传递给插件的设置和属性。要存储这些数据并在插件间传递，你需要向此容器注册一个或多个
  Java/Groovy Bean（称为扩展对象）。


  清单 5-11 展示了 `src/main/groovy/com/apress/gradle` 文件夹中的 `BuildNumberExtension.groovy`
  类，它将作为构建编号插件的扩展模型。它包含 `numberType` 和 `alphaNumLength` 属性，用于保存插件的输入。它还包含 `value`
  属性，允许插件/任务将构建编号提供给 `build.gradle` 文件。


  **清单 5-11. BuildNumberExtension.groovy 类**


  `package com.apress.gradle;`


  `class BuildNumberExtension {`


      `String numberType;`


      `int alphaNumLength;`


      `String value;`


  `}`


  #### 插件任务


  在“`buildSrc`”方法（清单 5-8）中，你将插件代码与任务代码合并在一起。对于实际插件，将插件代码与执行操作的代码清晰分离是合理的。因此，请在 `src/main/groovy/com/apress/gradle`
  文件夹中创建 `BuildNumberTask.groovy` 文件，并复制清单 5-12 的内容。


  **清单 5-12. BuildNumberTask 代码**


  `package com.apress.gradle;`


  `import org.gradle.api.DefaultTask`


  `import org.gradle.api.tasks.TaskAction`


  `class BuildNumberTask extends DefaultTask {`


      `@TaskAction`


      `def generateBuildNumber() {`


          `String numberType = project.buildNumber.numberType`


          `int alphaNumLength = project.buildNumber.alphaNumLength`


          `def buildNumber;`


          `if("alphanumeric".equals (numberType)) {`


              `buildNumber = getAlphaNumString(alphaNumLength)`


          `}`


          `else if ( "timestamp".equals (numberType) ) {`


              `buildNumber = System.currentTimeMillis()`


          `}`


         `project.buildNumber.value = buildNumber;`


      `}`


      `def getAlphaNumString(length) {`


          `String uuid = UUID.randomUUID().toString()`


          `uuid.take(length)`


      `}`


  `}`


  `BuildNumberTask` 中 `generateBuildNumber()` 方法上的 `@TaskAction` 指示了 Gradle 需要调用来执行操作的方法。`generateBuildNumber()`
  的实现使用 `buildNumber` 扩展对象读取用户配置的 `numberType` 和 `alphaNumLength` 值。然后，它调用 `System.currentTimeMillis()`
  或 `getAlphaNumString()` 工具方法来生成实际的构建编号。生成的构建编号随后被赋值给 `buildNumber` 的 `value` 属性。这使得构建编号对用户的
  `build.gradle` 文件可用。


  #### 插件类


  实现的最后一部分是将所有内容联系在一起的 `Plugin` 类。清单 5-13 展示了位于 `src/main/groovy/com/apress/gradle`
  文件夹下的 `BuildNumberPlugin` 类代码。在 `apply()` 方法内部，你使用 `create` 方法将 `buildNumber` 扩展对象添加到项目中。`create`
  方法接受一个名称和模型类作为其参数。此名称 `buildNumber` 必须与用户用于提供输入的配置闭包块的名称（清单 5-9 中的 `buildNumber`）相匹配。它还必须与任务类（清单
  5-12）用于检索配置值的名称相匹配。


  **清单 5-13. BuildNumberPlugin 类**


  `package com.apress.gradle;`


  `import org.gradle.api.Plugin;`


  `import org.gradle.api.Project;`


  `import org.gradle.api.Task;`


  `class BuildNumberPlugin implements Plugin<Project>  {`


      `void apply(Project project) {`


          `project.extensions.create(''buildNumber'', BuildNumberExtension)`


          `Task buildnumberTask = project.task(''buildnumbertask'', type: BuildNumberTask)`


          `project.tasks[''jar''].dependsOn buildnumberTask`


      `}`


  `}`


  在 `apply()` 方法中，你接着添加一个类型为 `BuildNumberTask` 的任务。名称 `buildnumbertask` 没有特殊含义。但是，你应该尽量赋予一个有意义的名称，因为它会显示在控制台和调试输出中。最后，你让
  `Jar` 任务依赖于 `buildnumberTask`，以便在生成 JAR 之前构建脚本可以获得构建编号。


  #### 简短插件名称


  默认情况下，插件通过其完全限定类名来引用。但是，你也可以为插件指定简短、易用的名称。为此，你需要在 `src/main/resources/META-INF/gradle-plugin`
  文件夹中创建一个属性文件。该属性文件的名称将成为插件的短名称。


  由于此插件处理构建编号，你可以将其命名为 `build-number-plugin`。要实现这一点，请在 `gradle-plugin` 文件夹下创建一个 `build-number-plugin.properties`
  文件。在该文件中，你只需创建一个键为 `implementation-class`、值为完全限定插件类的属性：


  `implementation-class=com.apress.gradle.BuildNumberPlugin`


  #### 插件打包


  至此，插件实现完成。下一步是构建归档文件并将其发布到本地文件仓库。为此，请使用命令行导航到 `build-gradle-plugin` 文件夹并运行命令 `gradle
  uploadArchives`。你应该会看到以下输出：


  `\build-number-plugin>gradle uploadArchives`


  `:compileJava UP-TO-DATE`


  `:compileGroovy`


  `:processResources UP-TO-DATE`


  `:classes`


  `:jar`


  `:uploadArchives`


  `BUILD SUCCESSFUL`


  注意


  你将在第 8 章中了解更多关于 `uploadArchives` 命令的信息。


  成功执行后，你应该会在 `repo` 文件夹中看到 `build-number-plugin-1.0.0.jar` 文件。如前所述，`repo` 应与 `build-gradle-plugin`
  文件夹位于同一层级。




  #### 使用插件


  要使用新创建的插件，请新建一个名为 `plugin-consumer` 的 Gradle 项目。在此项目中，你需要将插件的构建编号添加到生成的 JAR 文件的
  `MANIFEST.MF` 文件中。


  首先，在文件系统中创建 `plugin-consumer` 文件夹，使其与 `repo` 和 `build-gradle-plugin` 文件夹位于同一层级。


  ![A978-1-4842-1031-4_5_Fig8_HTML.jpg](img/A978-1-4842-1031-4_5_Fig8_HTML.jpg)


  图 5-8.


  项目目录结构


  然后，为 `plugin-consumer` 项目创建一个 `build.gradle` 文件。由于这是一个生成 JAR 制品的 Java 项目，需要应用 Java
  插件。同时，还需要应用并配置 `build-number-plugin`，如下所示：


  `apply plugin: ''java''`


  `apply plugin: ''build-number-plugin''`


  `buildNumber {`


      `numberType = ''alphanumeric''`


      `alphaNumLength = 5`


  `}`


  下一步是将插件 JAR 文件添加到构建脚本的类路径中，以便 Gradle 能够找到插件类。这可以通过 `buildscript` 代码块来实现：


  `buildscript {`


      `repositories {`


          `flatDir {`


              `dirs ''../repo''`


          `}`


      `}`


      `dependencies { classpath ''com.apress.gradle:build-number-plugin-1.0.0'' }`


  `}`


  最后，在 `jar` 任务上使用 `doFirst` 方法来添加一个新的 `manifest` 条目，如下所示：


  `jar.doFirst {`


      `manifest {`


          `attributes(''Build-Number'': project.buildNumber.value)`


      `}`


  `}`


  现在，你可以生成消费者插件了。使用命令行，导航到 `plugin-consumer` 文件夹并运行 `gradle build` 命令。在输出中，你应该会看到
  `buildnumbertask` 被触发，随后是 Java 插件的任务（`compileJava`、`jar` 等）执行。输出应如下所示：


  `\plugin-consumer>gradle build`


  `:buildnumbertask`


  `:compileJava UP-TO-DATE`


  `:processResources UP-TO-DATE`


  `:classes UP-TO-DATE`


  `:jar`


  `:assemble`


  `:compileTestJava UP-TO-DATE`


  `:processTestResources UP-TO-DATE`


  `:testClasses UP-TO-DATE`


  `:test UP-TO-DATE`


  `:check UP-TO-DATE`


  `:build`


  `BUILD SUCCESSFUL`


  构建成功完成后，导航到 `plugin-consumer\build\libs` 文件夹。使用 WinZip 或 WinRAR 等 ZIP 工具，打开 `plugin-consumer.jar`，然后打开
  `META-INF` 下的 `MANIFEST.MF` 文件。你应该会看到一个包含字母数字文本的 `Build-Number` 条目，类似于图 5-9。


  ![A978-1-4842-1031-4_5_Fig9_HTML.jpg](img/A978-1-4842-1031-4_5_Fig9_HTML.jpg)


  图 5-9.


  MANIFEST 文件中的构建编号


  要使用时间戳生成构建编号，请将 `build.gradle` 文件中的 `buildNumber` 配置块替换为以下代码：


  `buildNumber {`


      `numberType = ''timestamp''`


  `}`


  运行命令 `gradle clean build`，它将删除现有的 JAR 文件并生成一个新的。构建成功执行后，你应该会在生成的清单文件中看到一个基于时间戳的构建编号。


  至此，基于独立项目的插件开发就结束了。你可以将此插件发布到内部的 Maven 仓库，供开发团队的其他成员使用。你也可以将其发布到 Gradle 插件门户。位于
  [`https://plugins.gradle.org/`](https://plugins.gradle.org/) 的 Gradle 插件门户托管了来自世界各地开发者贡献的众多开源插件。该门户允许你搜索所需的插件，并显示使用这些插件所需的配置。你可以按照
  [`https://plugins.gradle.org/docs/submit`](https://plugins.gradle.org/docs/submit)
  上的说明了解提交流程。


  ## 总结


  Gradle 通过使用提供任务和合理默认值的插件，极大地简化了 Java 项目的构建。本章回顾了用于编译 Java 代码、运行单元测试和组装 JAR 归档文件的
  `java` 插件。然后，你使用了 `javadoc` 插件来生成 API 文档。`war` 插件允许你构建和打包 Web 应用程序。


  Gradle 还为构建自定义插件提供了出色的支持。你了解到有三种打包自定义插件的方式：构建脚本、使用 `buildSrc` 目录以及创建独立项目。你学习了使用
  `buildSrc` 方法创建简单 Java 和 Groovy 插件的基础知识。然后，你基于这些概念，使用独立项目方法开发了一个插件。


  在下一章中，你将全面了解 Gradle 对管理依赖项以及与各种制品仓库交互的支持。


  '
- '# 6. 依赖管理


  软件项目很少是孤立构建的。它们要么依赖于内部项目，要么依赖于其他开源库。本章将探讨 Gradle 如何帮助你有效管理这些依赖项。你将学习不同类型的依赖项，以及如何对依赖项进行分组和解决依赖冲突。你还将回顾存储制品的仓库。




  ## 声明式依赖管理


  假设你希望在应用程序中使用 Logback（[`http://logback.qos.ch`](http://logback.qos.ch/)）进行日志记录。一种直接的方法是从
  Logback 网站下载 `logback.jar` 文件并将其添加到项目中。在使用 IDE 或 ANT 构建项目时，这曾是一种相当常见的做法。然而，这种方法存在一些问题：


  *   下载的 JAR 文件可能依赖于其他几个库。这种依赖关系被称为传递性依赖。更麻烦的是，传递性依赖可能还有自己的依赖关系。你需要花时间找出所有这些依赖关系，并下载它们以供项目使用。

  *   传递性依赖之间可能存在版本冲突。假设你的项目依赖于 JAR A 和 B。如果 A 依赖于 JAR C 的 1.0.0 版本，而 B 依赖于 C 的 2.0.0
  版本，你需要手动解决这个冲突。

  *   下载的 JAR 文件必须检入版本控制系统或放置在共享驱动器上，以便项目可以在其他开发人员的机器上或持续集成服务器上构建。将 JAR 文件检入 VCS 不被视为最佳实践。这种方法在处理频繁变更的工作副本（在
  Maven 中称为快照版本）时尤其困难。

  *   升级变得非常困难，你必须重复整个手动过程。

  *   在团队之间共享内部开发的 JAR 文件变得困难。


  为了解决 ANT 的这些固有问题，Maven 提出了声明式依赖管理。使用这种方法，你告诉 Maven 你需要什么（通常是在外部配置文件中）。Maven 会自动找出在哪里以及如何获取这些依赖项，并将它们交给你的项目。后来，Ant
  提供了与另一个名为 Apache Ivy 的依赖管理工具的集成。Gradle 提供了自己的依赖管理实现，但也支持 Maven 和 Ivy 仓库。


  图 6-1 提供了 Gradle 依赖管理的高级视图。Gradle 与仓库交互以检索依赖项及其关联的元数据。通过网络访问的仓库被视为远程仓库，通常由第三方维护。Gradle
  还可以与本地机器上的仓库以及包含 JAR 文件的目录进行交互。获取依赖项后，Gradle 会将其存储在缓存中。默认情况下，缓存位于本地机器上的 `<<USER_HOME>>/.gradle`。在
  Windows 上，它将是 `C:\Users\<<user_name>>\.gradle`。然后，Gradle 在项目构建、测试或打包期间检索这些依赖项。拥有本地缓存可以减少远程仓库的负载并提高构建速度。


  ![A978-1-4842-1031-4_6_Fig1_HTML.gif](img/A978-1-4842-1031-4_6_Fig1_HTML.gif)


  图 6-1.


  Gradle 依赖管理提示


  你可以通过设置环境变量 `GRADLE_USER_HOME` 并将其指向一个新目录，将默认的 Gradle 主目录从 `.gradle` 更改为其他位置。


  尽管图 6-1 中的架构适用于小型项目，但在企业环境中会带来一些严重问题。通过互联网访问的远程仓库可能会宕机，或者在高流量情况下变得无响应，从而导致构建速度急剧下降。许可和知识产权问题可能会阻止团队在公共仓库中发布其内部工件，从而难以轻松共享。为了解决这些问题，大多数企业选择图
  6-2 所示的架构。


  ![A978-1-4842-1031-4_6_Fig2_HTML.gif](img/A978-1-4842-1031-4_6_Fig2_HTML.gif)


  图 6-2.


  使用仓库管理器的依赖管理


  内部仓库管理器充当远程仓库的代理并缓存工件。这确保了即使远程仓库宕机或过时，构建也是可重复的。仓库管理器还允许你推送和共享公司内部的工件。有几种开源和商业仓库管理器可用，例如
  Sonatype Nexus、Apache Archiva 和 Artifactory。


  ## 依赖配置


  考虑前面使用 Logback 进行日志记录的示例。源代码将包含使用 Logback 类和 API 的日志语句。为了编译项目代码，你需要在类路径中提供 Logback
  JAR。此外，为了让应用程序在 Tomcat 等容器中运行，你需要将 Logback JAR 打包到生成的 WAR 工件中。现在考虑同一个项目使用 JUnit
  进行单元测试。JUnit JAR 文件仅在运行单元测试时需要，并且不需要打包到生成的 WAR 工件中。如果 Web 应用程序包含 Java Servlet，则在代码编译期间需要
  Servlet API JAR。由于 Tomcat 等容器在运行时使此 API JAR 在类路径上可用，因此你无需将其打包到 WAR 文件中。


  这些示例表明需要在构建的某些阶段拥有特定的依赖项集合。Gradle 提供了配置，使你可以轻松实现这一点。配置是依赖项的逻辑分组。例如，你可以有一个 `compile`
  配置，其中包含代码编译期间所需的所有依赖项。Java 插件开箱即用地声明了以下六种配置：


  *   `compile`——包含在代码编译期间添加到类路径的依赖项。在 Web 项目中，Hibernate 和 Spring 等依赖项在 `compile`
  配置中声明。

  *   `runtime`——包含在代码执行期间使用的依赖项。例如，MySQL 驱动程序等数据库驱动程序在 `runtime` 配置中声明。

  *   `testCompile`——包含在测试代码编译期间成为类路径一部分的依赖项。JUnit 和 TestNG 等测试框架是在此配置中声明的库的典型示例。

  *   `testRuntime`——包含在测试代码执行期间使用的依赖项。HSQLDB 或 H2 等嵌入式数据库是在此配置中声明的库的示例。

  *   `archives`——包含项目生成的工件。考虑一个生成额外工件的 Java 项目，例如包含源代码的 JAR 文件和包含 Javadoc API 的 ZIP
  文件。这些工件在此配置中声明。你将在第 8 章中了解更多关于 archives 配置的信息。

  *   `default`——此配置通常出现在多项目设置中，其中一个项目的构建依赖于另一个子项目的构建。假设项目 A 将项目 B 声明为其依赖项。默认情况下，项目
  B 的 `default` 配置中的所有工件都将包含在项目 A 中。`default` 配置扩展了 `runtime` 配置，因此包含项目运行时中声明的所有工件和依赖项。


  依赖配置可以扩展其他配置。例如，`runtime` 配置扩展了 `compile` 配置。这意味着在 `compile` 配置中声明的所有依赖项都将在 `runtime`
  配置中可用。表 6-1 显示了六种 Java 插件配置及其扩展的配置。


  表 6-1.


  配置继承关系


  | 配置名称 | 扩展自 |

  | --- | --- |

  | `compile` | `无` |

  | `runtime` | `compile` |

  | `testCompile` | `compile` |

  | `testRuntime` | `runtime, testCompile` |

  | `archives` | 无 |

  | `default` | `runtime` |




  ### 处理依赖关系


  在开始声明和使用依赖之前，理解不同类型的依赖关系至关重要。表 6-2 展示了 Gradle 提供的依赖类型。


  表 6-2. Gradle 依赖类型


  | 依赖类型 | 描述 |

  | --- | --- |

  | 外部模块依赖 | 对仓库中某个库的依赖。例如，对 Maven Central 中的 Logback JAR 的依赖就属于此类型。 |

  | 项目依赖 | 对某个 Gradle 项目的依赖。 |

  | 文件依赖 | 对本地机器上文件的依赖。 |

  | 客户端模块依赖 | 对外部模块的依赖，该模块位于外部仓库中，但其对应的元数据在构建文件中指定。 |

  | Gradle API 依赖 | 对 Gradle API 的依赖。在第 5 章的插件开发中，你已经见过这种依赖类型。 |

  | 本地 Groovy 依赖 | 对作为已安装 Gradle 一部分的 Groovy 库的依赖。 |


  在本章中，你将学习使用三种依赖类型：外部模块依赖、文件依赖和项目依赖。你可以在构建文件中使用 `dependencies` 闭包来声明依赖，如下所示：


  `dependencies {`


      `<依赖配置> 依赖 1, 依赖 2....`


  `}`


  ### 外部模块依赖


  顾名思义，外部模块依赖指的是对当前项目结构之外制品的依赖。这种类型的依赖使用以下坐标来指定：


  *   `group` — 负责该项目的组或组织的标识符。例如 `org.springframework` 和 `org.hibernate`。

  *   `name` — 制品的名称。例如 `spring-beans` 和 `hibernate-core`。

  *   `version` — 制品的版本。例如 1.0.0 和 4.2.0。

  *   `classifier` — 附加到制品上的额外字段。例如，同一个制品可以为两个 JDK 版本发布，可以使用分类器来选择正确的版本。


  这些依赖可以在 `build.gradle` 文件中使用以下格式声明：


  `group: ''GROUP_NAME'', name: ''ARTIFACT_NAME'', version: ''VERSION_NUMBER''`


  Gradle 还提供了以下声明依赖的快捷格式：


  `GROUP_NAME:ARTIFACT_NAME:VERSION_NUMBER`


  为了实际演示外部模块依赖，在你的本地机器上创建一个新文件夹 `gradle_dep`。创建一个 `build.gradle` 文件，并复制清单 6-1 中的内容。这个示例使用快捷记法为编译配置添加了两个依赖。请注意，多个依赖之间用逗号
  (`,`) 分隔。它还使用 `ArrayList` 记法声明了两个额外的 `testCompile` 依赖。同时请注意 `repositories` 块。你将在本章后面学习仓库的相关内容，所以现在可以先忽略它。


