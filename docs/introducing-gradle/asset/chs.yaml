  \n`include 'web', 'service', 'repository'`\n\n运行 `gradle projects` 命令后，你将看到 Gradle\
  \ 检测到了所有四个项目（包括根项目）：\n\n`\\chapter` `7` `\\intro-root>gradle projects`\n\n`:projects`\n\
