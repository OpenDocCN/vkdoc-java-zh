  \n`------------------------------------------------------------`\n\n`Root project\
  \ 'intro-root'`\n\n`+--- Project ':repository'`\n\n`+--- Project ':service'`\n\n\
  `\\--- Project ':web'`\n\n`To see a list of the tasks of a project, run gradle <project-path>:tasks`\n\
  \n`For example, try running gradle :repository:tasks`\n\n`BUILD SUCCESSFUL`\n\n\
  输出还显示了 Gradle 使用“`:`”来表示项目层次结构。例如，`:service` 表示服务项目位于根项目（隐式引用，无需名称）下一级。如果你的项目位于\
  \ `service/soap/util` 下，那么它将使用 `:service:soap:util` 来引用。\n\n### 扁平布局\n\n除了上一节中介绍的分层项目布局外，Gradle\
  \ 还支持用于多项目开发的“扁平布局”。在这种组织结构中，所有项目都作为 `root` 项目的同级项目存在。图 7-3 展示了使用扁平布局组织的 `intro-root`\
  \ 多项目。\n\n![A978-1-4842-1031-4_7_Fig3_HTML.gif](img/A978-1-4842-1031-4_7_Fig3_HTML.gif)\n\
  \n图 7-3.\n\n扁平布局中的 intro-root\n\n为了熟悉扁平布局的组织项目方式，请重新创建 `intro-root` 示例应用程序。首先，在你的本地文件系统上创建一个名为\
  \ `flat-layout` 的文件夹。在此文件夹内，创建四个子文件夹——`web`、`service`、`repository` 和 `intro-root`。在\
  \ `intro-root` 下，创建一个空的 `build.gradle` 文件和一个空的 `settings.gradle` 文件。对于扁平布局，你需要使用\
  \ `includeFlat` 方法而不是 `include` 方法来包含项目。`includeFlat` 方法将子项目的目录名称作为其参数。将这些内容复制到\
  \ `settings.gradle` 文件中：\n\n`includeFlat 'web', 'service', 'repository'`\n\n使用命令提示符，导航到\
  \ `intro-root` 文件夹并运行 `gradle projects` 命令。你应该会看到类似如下的输出，Gradle 识别了所有项目：\n\n`\\\
  chapter` `7` `\\flat-layout\\intro-root>gradle projects`\n\n`:projects`\n\n`------------------------------------------------------------`\n\
  \n`Root project`\n\n`------------------------------------------------------------`\n\
  \n`Root project 'intro-root'`\n\n`+--- Project ':repository'`\n\n`+--- Project ':service'`\n\
  \n`\\--- Project ':web'`\n\n`To see a list of the tasks of a project, run gradle\
  \ <project-path>:tasks`\n\n`For example, try running gradle :repository:tasks`\n\
  \n`BUILD SUCCESSFUL`\n\n选择分层布局还是扁平布局来组织项目纯粹是个人偏好。我们认为分层布局更加清晰，本章将使用“分层”的 `intro-root`\
  \ 项目。\n\n\n\n### 多项目构建 vs. 单项目构建\n\n根项目的 `build.gradle` 文件可用于触发所有项目的完整构建。然而，子项目也可以包含一个可选的\
  \ `build.gradle` 文件。Gradle 允许你在任何这些子项目上执行独立构建。在这种情况下，只会构建该子项目及其依赖的项目。\n\n那么，Gradle\
  \ 如何判断一个构建是单项目构建还是更大规模多项目构建的一部分呢？为了做出这个判断，Gradle 会使用以下算法查找 `settings.gradle` 文件：\n\
  \n在当前目录中查找 `settings.gradle`。  \n如果未找到 `settings.gradle`，则在当前目录同级嵌套的 `master` 目录下查找。\
  \  \n如果仍未找到 `settings.gradle`，则在任何父目录中查找。\n\n一旦找到 `settings.gradle` 文件，就会进行检查，以确定当前项目是否通过\
  \ `include` 或 `includeFlat` 方法被定义为多项目的一部分。如果条件满足，则构建将作为多项目构建执行。否则，该项目将作为单项目构建执行。\n\
  \n## 项目配置\n\n多项目中的子项目通常包含一些通用的配置、任务和插件，这些可以迁移到根项目的 `build.gradle` 文件中。例如，所有项目可能共享相同的\
  \ `group` 和 `version` 属性。Gradle 提供了一个 `allprojects` 闭包块，允许你定义根项目和子项目共享的这些通用属性/行为。清单\
  \ 7-1 展示了一个声明了 `group` 和 `version` 属性的 `allprojects` 块。\n\n**清单 7-1. build.gradle\
  \ 中的 allprojects 块**\n\n`allprojects {`\n\n    `group = \"com.apress.gradle\"`\n\
  \n    `version = \"1.0.0-SNAPSHOT\"`\n\n`}`\n\n类似地，如果所有子项目都是 Java 项目，它们都会应用 `java`\
  \ 插件。它们也会共享通用的仓库，并可能共享少量依赖。为了定义这种特定于所有 `subprojects` 的行为，Gradle 提供了一个 `subprojects`\
  \ 闭包块。清单 7-2 展示了一个包含 `java` 插件和 `mavenCentral()` 仓库声明的 `subprojects` 块。\n\n**清单\
  \ 7-2. build.gradle 中的 subprojects 闭包块**\n\n`subprojects {`\n\n     `apply plugin:\
  \ 'java'`\n\n     `repositories {`\n\n          `mavenCentral()`\n\n     `}`\n\n\
  `}`\n\n> **注意**\n>\n> `allprojects` 块应用于声明适用于所有项目的属性/配置/任务。IDE 插件就是可以在 `allprojects`\
  \ 部分内部声明的插件的一个很好的例子。\n\n也可以在根项目的 `build.gradle` 文件中配置特定于单个子项目的行为。例如，你需要将 `war` 插件应用于\
  \ `web` 项目。你可以使用 `project()` 方法添加这种特定于项目的行为，然后将要配置的项目名称作为参数传递进去。清单 7-3 展示了将 `war`\
  \ 插件应用于 `web` 项目的配置。\n\n**清单 7-3. 特定于项目的行为**\n\n`project(':web') {`\n\n     `apply\
  \ plugin: 'war'`\n\n`}`\n\n你可以应用本节到目前为止讨论的概念来创建 `intro-root` 的 `build.gradle` 文件，如清单\
  \ 7-4 所示。它使用 `allprojects` 块来确保根项目和子项目共享相同的 `group` 和 `version` 编号。代码还使用了 `subprojects`\
  \ 块来确保所有子项目从 Maven Central 获取其依赖。各个 `project` 块将 `java` 插件应用于 `service` 和 `repository`\
  \ 项目，并将 `war` 插件应用于 `web` 项目。\n\n**清单 7-4. Intro-Project 的 build.gradle 文件**\n\n\
  `allprojects {`\n\n    `group = \"com.apress.gradle\"`\n\n    `version = \"1.0.0-SNAPSHOT\"\
  `\n\n`}`\n\n`subprojects {`\n\n    `repositories {`\n\n        `mavenCentral()`\n\
  \n    `}`\n\n`}`\n\n`project (':service') {`\n\n    `apply plugin: 'java'`\n\n`}`\n\
  \n`project (':repository') {`\n\n    `apply plugin: 'java'`\n\n`}`\n\n`project(':web')\
  \ {`\n\n    `apply plugin: 'war'`\n\n`}`\n\n更新了 `intro-root` 项目的 `build.gradle`\
  \ 文件后，运行 `gradle build` 命令，你将看到以下输出：\n\n`\\chapter` `7` `\\intro-root>gradle build`\n\
  \n`:repository:compileJava UP-TO-DATE`\n\n`:repository:processResources UP-TO-DATE`\n\
  \n`:repository:classes UP-TO-DATE`\n\n`:repository:jar`\n\n`.........................`\n\
  \n`:repository:build`\n\n`:service:compileJava UP-TO-DATE`\n\n`:service:processResources\
  \ UP-TO-DATE`\n\n`:service:classes UP-TO-DATE`\n\n`:service:jar`\n\n`:service:assemble`\n\
  \n`........................`\n\n`:web:compileJava UP-TO-DATE`\n\n`:web:processResources\
  \ UP-TO-DATE`\n\n`:web:classes UP-TO-DATE`\n\n`:web:war`\n\n`:web:assemble`\n\n\
  `.........................`\n\n`:web:build`\n\n`BUILD SUCCESSFUL`\n\n从输出中可以看出，Gradle\
  \ 默认按照子项目名称的字母数字升序执行它们。\n\n## 项目依赖\n\n正如你在图 7-2 中看到的，web 项目依赖于 service 项目，而 service\
  \ 项目又依赖于 repository 项目。Gradle 提供了项目依赖类型来声明此类依赖。清单 7-5 展示了修改后的 `build.gradle` 部分，其中声明了这两个依赖。\n\
  \n**清单 7-5. build.gradle 中的项目依赖**\n\n`allprojects {`\n\n    `group = \"com.apress.gradle\"\
  `\n\n    `version = \"1.0.0-SNAPSHOT\"`\n\n`}`\n\n`subprojects {`\n\n    `repositories\
  \ {`\n\n        `mavenCentral()`\n\n    `}`\n\n`}`\n\n`project (':repository') {`\n\
  \n    `apply plugin: 'java'`\n\n`}`\n\n`project (':service') {`\n\n    `apply plugin:\
  \ 'java'`\n\n    `dependencies {`\n\n        `compile project(':repository')`\n\n\
      `}`\n\n`}`\n\n`project(':web') {`\n\n    `apply plugin: 'war'`\n\n    `dependencies\
  \ {`\n\n        `compile project(':service')`\n\n    `}`\n\n`}`\n\n如果你现在执行 `gradle\
  \ build`，Gradle 将尝试先构建 repository 项目，然后是 service 项目，最后是 web 项目。输出应该类似于 Gradle 的默认输出。然而，如果你调整依赖关系，使得\
  \ web 依赖于 repository，而 repository 依赖于 service，那么运行 `gradle build` 将会在运行 repository\
  \ 构建之前先构建 service JAR：\n\n`\\chapter` `7` `\\intro-root>gradle build`\n\n`:service:compileJava\
  \ UP-TO-DATE`\n\n`:service:processResources UP-TO-DATE`\n\n`:service:classes UP-TO-DATE`\n\
  \n`:service:jar UP-TO-DATE`\n\n`:repository:compileJava UP-TO-DATE`\n\n`..............................`\n\
  \n`:repository:check UP-TO-DATE`\n\n`:repository:build UP-TO-DATE`\n\n`:service:assemble\
  \ UP-TO-DATE`\n\n`...............................`\n\n`:web:compileTestJava UP-TO-DATE`\n\
  \n`:web:processTestResources UP-TO-DATE`\n\n`:web:testClasses UP-TO-DATE`\n\n`:web:test\
  \ UP-TO-DATE`\n\n`:web:check UP-TO-DATE`\n\n`:web:build`\n\n`BUILD` `SUCCESSFUL`\n\
  \n\n\n## 子项目构建文件\n\n到目前为止，你一直在使用根项目的 `build.gradle` 文件来声明通用行为以及特定于项目的行为，从而无需在每个子项目中单独创建\
  \ `build.gradle` 文件。对于大型项目，这种做法会导致单个 `build.gradle` 文件变得复杂。为了便于维护，你可能希望将根项目的 `build.gradle`\
  \ 文件限制为仅包含通用行为，并将其余配置拆分到各个子项目的构建文件中。\n\n为了演示这一点，请在 `service` 项目下创建一个 `build.gradle`\
  \ 文件，并复制清单 7-6 中所示的内容。然后，从根项目的 `build.gradle` 文件中移除 `project(':service'){}` 代码块。\n\
