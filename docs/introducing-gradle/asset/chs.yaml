  \ project(':repository')`\n\n`}`\n\n使用命令提示符，导航到 `service` 文件夹并运行 `gradle build`\
  \ 命令。你将看到这会先触发 repository 的 JAR 构建，然后是 service 项目的构建：\n\n`\\chapter` `7` `\\intro-root\\\
  service>gradle build`\n\n`:repository:compileJava UP-TO-DATE`\n\n`:repository:processResources\
  \ UP-TO-DATE`\n\n`:repository:classes UP-TO-DATE`\n\n`:repository:jar UP-TO-DATE`\n\
  \n`:service:compileJava UP-TO-DATE`\n\n`:service:processResources UP-TO-DATE`\n\n\
  `:service:classes UP-TO-DATE`\n\n`:service:jar UP-TO-DATE`\n\n`:service:assemble\
  \ UP-TO-DATE`\n\n`:service:compileTestJava UP-TO-DATE`\n\n`:service:processTestResources\
  \ UP-TO-DATE`\n\n`:service:testClasses UP-TO-DATE`\n\n`:service:test UP-TO-DATE`\n\
  \n`:service:check UP-TO-DATE`\n\n`:service:build UP-TO-DATE`\n\n`BUILD SUCCESSFUL`\n\
  \n## 本章小结\n\n在本章中，你学习了 Gradle 多项目构建的复杂性。你了解了两种项目结构类型——层次结构和扁平结构。你学习了 `allprojects`、`subprojects`\
  \ 和 `project` 代码块，它们允许你将构建逻辑放置在正确的位置以提高可维护性。然后，你学习了如何在项目之间声明依赖关系。最后，你回顾了如何触发完整构建和子项目构建。\n\
  \n在下一章中，你将学习 Gradle 对将生成的工件发布到仓库的支持。\n\n"
- '# 8. 发布工件


  为了共享内部开发的框架和库，开发者需要将它们发布到仓库。在本章中，你将使用 Gradle 将工件发布到本地文件系统和远程仓库。


  ## 发布到本地仓库


  你处理的项目通常会生成一个或多个工件，例如 JAR、WAR 或 ZIP 文件。Gradle 提供了一个 `archives` 配置，可用于声明项目产生的工件。Java
  项目默认会生成一个 JAR 文件，因此 Java 插件会自动将生成的 JAR 关联到 `archives` 配置。类似地，`War` 插件会将生成的 WAR 分配给此配置。Gradle
  提供了一个 `uploadArchives` 任务，可用于将这些工件发布到仓库。


  为了更好地理解发布过程，你将创建一个名为 `sample-app` 的空 Java 应用程序。为此，在你的文件系统上创建一个名为 `sample-app` 的新文件夹。然后创建一个
  `build.gradle` 文件，并复制清单 8-1 的内容。


  清单 8-1\. sample-app 的 build.gradle 文件


  `apply plugin: ''java''`


  `version = 1.0`


  `uploadArchives {`


      `repositories {`


        `flatDir { dirs "../repo" }`


      `}`


  `}`


  `uploadArchives` 任务中的 `repositories` 闭包允许你配置工件应发布到的位置。清单 8-1 要求 Gradle 将生成的工件发布到文件系统上与
  `sample-app` 文件夹同级的 `repo` 文件夹中。要执行发布，请运行以下 `uploadArchives` 任务：


  `\chapter` `8` `\sample-app>gradle uploadArchives`


  成功执行后，你将看到一个创建的 `repo` 文件夹及其内容，如图 8-1 所示。


  ![A978-1-4842-1031-4_8_Fig1_HTML.jpg](img/A978-1-4842-1031-4_8_Fig1_HTML.jpg)


  图 8-1.


  repo 文件夹的内容


  Gradle 默认使用 `projectname-version.type` 格式作为生成的文件名。因此，生成的工件被命名为 `sample-app-1.0.jar`。此外，Gradle
  会生成一个 `ivy.xml` 配置文件并将其添加到 `repo` 文件夹中。


  这个已发布的工件现在可以被其他项目访问。如第 6 章所述，一种直接的方法是将此文件夹声明为“扁平目录仓库”，并将 `sample-app` 添加为依赖项。


  ## 发布到 Maven 仓库


  为了发布到 Maven 仓库，你需要一个 `pom.xml` 配置文件以及工件。项目对象模型（即 `pom.xml` 文件）描述了工件，并包含依赖项和插件等信息。Gradle
  提供了一个 Maven 插件，可以简化到 Maven 仓库的部署，并能自动生成 `pom.xml` 文件。


  在开始发布到 Maven 仓库之前，你需要访问一个仓库管理器，例如 Artifactory ( [`www.jfrog.com/artifactory/`](http://www.jfrog.com/artifactory/)
  ) 或 Nexus ( [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/) )。仓库管理器管理仓库，充当公共仓库的代理，并支持对企业中使用的工件进行治理。在下一节中，你将学习如何在本地机器上安装
  Nexus，这是一个来自 Sonatype 的流行的开源仓库管理器。


  ### 安装 Nexus


  Nexus 以归档文件形式分发，并捆绑了一个 Jetty 实例。从 Sonatype 的网站 [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/)
  下载 Nexus 发行版（Windows 使用 `.zip` 版本）。在撰写本文时，可用的 Nexus 版本是 2.11.4-01。解压文件并将其内容放置在你的机器上。本书中的代码假定内容位于
  `C:\tools\nexus` 文件夹中。


  以管理员模式启动命令行，并导航到位于 `C:\tools\nexus\nexus-2.11.4-01` 的 `bin` 文件夹。要启动 Nexus，请运行以下命令：


  `nexus console`


  默认情况下，Nexus 运行在 8081 端口。启动 Web 浏览器并导航到 Nexus 的地址 `http://localhost:8081/nexus`。图
  8-2 显示了 Nexus 的启动画面。使用右上角的“登录”链接登录应用程序。Nexus 的默认登录用户名和密码是 `admin` 和 `admin123`。


  ![A978-1-4842-1031-4_8_Fig2_HTML.jpg](img/A978-1-4842-1031-4_8_Fig2_HTML.jpg)


  图 8-2.


  Nexus 索引页面




  ### 构建配置


  现在你已经运行了 Nexus 仓库管理器，下一步是修改 `build.gradle` 文件。清单 8-2 展示了更新后的 `build.gradle` 文件，其中包含了发布到
  Maven 仓库所需的配置。


  **清单 8-2\. 用于发布到 Maven 仓库的 build.gradle**


  `apply plugin: ''java''`


  `apply plugin: ''maven''`


  `group = ''com.apress.gradle.intro''`


  `archivesBaseName = ''sample-app''`


  `version = ''1.0-SNAPSHOT''`


  `uploadArchives {`


  `repositories {`


  `mavenDeployer {`


  `repository (url: "http://localhost:8081/nexus/content/repositories/releases") {`


  `authentication (userName: "deployment", password: "deployment123")`


  `}`


  `snapshotRepository (url: "http://localhost:8081/nexus/content/repositories/snapshots")
  {`


  `authentication (userName: "deployment", password: "deployment123")`


  `}`


  `}`


  `}`


  `}`


  `dependencies {`


  `compile ''ch.qos.logback:logback-classic:1.1.2''`


  `}`


  `repositories {`


  `mavenCentral()`


  `}`


  为了让 Gradle 生成 `pom.xml` 文件，它需要三个 Maven 坐标——`groupId`、`artifactId` 和 `version`。在清单
  8-2 中，你使用了项目的 `group`、`archivesBaseName` 和 `version` 属性来提供这些值。Gradle 提供了 `mavenDeployer`
  方法，允许你配置用于发布工件的 Maven 仓库。在清单 8-2 中，你配置了一个 `snapshotRepository`（`http://localhost:8081/nexus/content/repositories/snapshots`）用于发布
  `SNAPSHOT` 或开发版本的工件，以及一个发布仓库（`http://localhost:8081/nexus/content/repositories/releases`）用于发布已发布的工件。为了让
  Gradle 将工件发布到 Nexus，它需要提供适当的凭据。在构建脚本中，你使用了 Nexus 安装时默认提供的部署用户（密码：deployment123）。该部署用户拥有“Nexus
  部署角色”，具有写入仓库的权限。然后，这段代码向项目添加了一个 `logback` 依赖，随后是一个指向 Maven Central 的 `repositories`
  块。`mavenCentral()` 配置告诉 Gradle 从 Maven Central 下载 `logback` 依赖。尽管此配置本可以使用 Nexus
  来下载依赖，但它提供了为下载和上传工件使用不同仓库的可能性。


  配置完成后，运行 `gradle uploadArchives` 命令，你将看到以下输出：


  `\chapter` `8` `\sample-app>gradle uploadArchives`


  `:compileJava UP-TO-DATE`


  `:processResources UP-TO-DATE`


  `:classes UP-TO-DATE`


  `:jar`


  `:uploadArchives`


  `Could not find metadata com.apress.gradle.intro:sample-app:1.0-SNAPSHOT/maven-metadata.xml
  in remote (` `http://localhost:8081/nexus/content/repositories/snapshots` `)`


  `Could not find metadata com.apress.gradle.intro:sample-app/maven-metadata.xml in
  remote (` `http://localhost:8081/nexus/content/repositories/snapshots` `)`


  `BUILD SUCCESSFUL`


  输出中的 `"Could not find metadata ..."` 错误只是一个警告，表明 Gradle 无法在 Nexus 服务器上找到此工件的 `metadata.xml`
  文件。当工件首次发布时，你会看到此消息。`metadata.xml` 文件将在首次发布时创建，因此在后续发布中你不应再看到此消息。


