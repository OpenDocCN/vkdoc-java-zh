  ### 配置默认布局


  Gradle 提供了 SourceSet 的概念，它表示源文件的逻辑集合。默认情况下，`Java` 插件提供 `main` 和 `test` 这两个 SourceSet。但是，在处理遗留项目时，您可能需要
  Gradle 在不同位置查找 Java 源文件和其他资源文件。清单 5-4 展示了如何使用 `sourceSets` 闭包来更改默认布局。该代码表明 Java
  源文件将位于 `source/java` 文件夹下，而 Java 测试用例将位于 `source/test` 文件夹下。


  清单 5-4\. 更改默认布局


  `apply plugin: ''java''`


