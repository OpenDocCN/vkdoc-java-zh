- '# 3. Groovy 语言入门


  Gradle 构建脚本是使用 Groovy 编写的。本章涵盖 Groovy 编程语言的基础知识。


  Groovy 是一种在 JVM 上运行的动态编程语言。Groovy 语言从设计之初就旨在与 Java 在源代码和二进制级别兼容。这种兼容性允许 Groovy 类扩展
  Java 类或利用大量的 Java 框架和库。Groovy 的 1.0 版本于 2007 年 1 月发布。下一个主要版本——Groovy 2.0——于 2012
  年 7 月发布。在撰写本书时，Groovy 的最新版本是 2.4。Groovy 是开源的，并根据 Apache 2.0 许可证分发。


  ## 安装 Groovy


  Gradle 自带其 Groovy 库，任何现有的 Groovy 安装都将被忽略。为了学习和尝试 Groovy，您需要先安装 Groovy。外部 Groovy
  安装将使您能够熟悉该语言，而不会弄乱 Gradle 安装。请按照以下步骤安装 Groovy：


  从 [`www.groovy-lang.org/download.html`](http://www.groovy-lang.org/download.html)
  下载 Groovy 二进制文件。   解压 ZIP 文件并将内容放置在您的硬盘上。例如，`C:\tools\groovy-2.4.5`。   创建一个名为 `GROOVY_HOME`
  的新环境变量，指向解压位置。   将 `GROOVY_HOME\bin` 添加到 `PATH` 环境变量中。例如，在 Windows 机器上，您将添加 `%GROOVY_HOME%\bin`。
    成功安装 Groovy 后，在命令行上运行 `groovy -v` 或 `groovy -version` 命令以验证安装。图 3-1 显示了成功安装的输出。


  ![A978-1-4842-1031-4_3_Fig1_HTML.jpg](img/A978-1-4842-1031-4_3_Fig1_HTML.jpg)


  图 3-1.


  Groovy 版本命令




  ## 运行 Groovy


  Groovy 提供了一个名为 Groovy Shell 或 `groovysh` 的命令行工具。它允许你轻松快速地试验该语言。要启动 `groovysh`，请打开命令提示符/终端并输入
  `groovysh`。Shell 启动完成后，你就可以开始输入 Groovy 代码并查看其运行效果，如下所示：


  `C:\apress\intro-gradle>groovysh`


  `Groovy Shell (2.4.5, JVM: 1.7.0_67)`


  `Type '':help'' or '':h'' for help.`


  `----------------------------------------------------------------------------`


  `groovy:000> println ''Hello World''`


  `Hello World`


  `===> null`


  `groovy:000>`


  你可以通过运行命令 `:exit` 或 `:quit` 来退出 Groovy shell。你也可以运行 `:help` 命令来列出可用的 shell 命令或获取某个特定命令的详细信息。


  Groovy 还提供了 GroovyConsole——一个用于执行 Groovy 代码的基于 GUI 的工具。要启动 GroovyConsole，只需双击 `GROOVY_HOME\bin`
  目录下的 `groovyConsole.bat`（适用于 Windows）。图 3-2 展示了带有输入区域和输出区域的 GroovyConsole。输入区域是你输入
  Groovy 代码的地方（例如图 3-2 中显示的 `println ''Hello World''`）。可以通过选择 **脚本** ➤ **运行** 菜单项或从
  **操作** 菜单中选择 **运行** 来编译和执行 Groovy 代码。执行结果会显示在输出区域中。


  ![A978-1-4842-1031-4_3_Fig2_HTML.jpg](img/A978-1-4842-1031-4_3_Fig2_HTML.jpg)


  图 3-2.


  GroovyConsole 示例


  ## 基本 Groovy 语言特性


  本节涵盖 Groovy 语法、数据类型（简单类型和集合类型）以及闭包。如果你想了解更多关于 Groovy 语言特性的信息，请参考在线文档 [`www.groovy-lang.org/single-page-documentation.html`](http://www.groovy-lang.org/single-page-documentation.html)。


  ### Groovy 语法


  Groovy 从 Java 中吸收了大量语法，并增加了简化使其易于使用。其中一个简化是，当一行只包含一条语句时，可以省略行尾的分号。类似地，至少有一个参数的方法可以在没有括号的情况下调用。以下两条语句在
  Groovy 中都是有效的：


  `println ("Hello World");`


  `println "Hello World"`


  以下是与 Java 相比其他一些值得注意的区别：


  *   Groovy 中的方法和类默认是 public 的。

  *   方法中的 `return` 语句是可选的。如果 Groovy 没有找到 `return` 语句，它会返回最后一个被求值的表达式。

  *   受检异常（Checked exceptions）不需要被捕获或声明。Groovy 会自动将这些异常包装为 `RuntimeException`。

  *   默认情况下，会导入以下包——`java.lang.*`、`java.util.*`、`java.util.regex.*`、`java.net.*`、`java.io.*`、`groovy.lang.*`、`groovy.util.*`、`java.math.BigDecimal`
  和 `java.math.BigInteger`。


  ### 注释


  Groovy 注释的语法与 Java 相同。单行注释以 `//` 开头，多行注释以 `/*` 开头并以 `*/` 结尾。Groovydoc 注释类似于 Javadoc
  注释，以 `/**` 开头并以 `*/` 结尾。


  ### 数据类型


  Groovy 语言提供了多种数据类型，例如数字、字符串，以及列表和映射等复杂数据类型。


  #### 字符串


  Groovy 支持两种类型的字符串——常规的 Java 字符串（`java.lang.String` 的实例）和 GStrings（`groovy.lang.GString`
  的实例）。常规的 Groovy 字符串通过使用单引号、双引号或三引号包围字符序列来声明。以下是 `String` 声明的一些示例：


  `String message = ''Hello World''`


  `String processor = "Intel"`


  `String multiLine = ''''''This text is on line one`


     `line 2 and`


     `line 3''''''`


  `String escapedExample = ''Bob\''s Burgers''`


  三引号语法允许你将文本跨行放置，而无需在每行进行拆分和拼接。Groovy 会保留使用三引号声明的多行文本中的空白字符。例如，上面显示的变量 `multiLine`
  将包含带有空白字符和换行符的文本。如果你要将该文本保存到数据库中，它将按如下方式保存：


  `This text is on line one`


      `line 2 and`


      `line 3`


  注意


  与 Java 一样，Groovy 中的字符串是不可变的。如果需要更改字符串的内容，建议使用 `StringBuilder` 或 `StringBuffer`。


  GStrings 是使用双引号（或斜杠 `//`）转义并包含使用 `${...}` 语法的 Groovy 表达式的字符串。当访问 GString 时，Groovy
  会对表达式求值，并用其值替换表达式文本。这里展示了一个 GString 的示例：


  `String name = ''Luke''`


  `String message = "Hello ${name}"`


  `println message// 这将打印 Hello Luke`


  当表达式是对变量的简单引用时，可以省略花括号 `{}`。因此，前面代码中的 `message` 可以重写如下：


  `String message = "Hello $name"`


  注意


  Ruby 和 Perl 等语言具有字符串插值的概念，即能够在字符串中用表达式的值替换表达式。因此，GStrings 通常被称为插值字符串。


  Groovy 允许在 `${...}` Groovy 表达式内部进行方法调用、语句和变量名引用。使用 GStrings，你可以轻松创建模板，而无需外部模板引擎。以下是一个在表达式内部调用
  `length()` 和 `toLowerCase()` 方法的示例：


  `String name = ''Luke''`


  `String count = "${name.length()}"`


  `println count`


  `println "${name.toLowerCase()}"`


  #### 数字


  Groovy 支持整数和浮点数。与 Java 不同，Groovy 不提供原始数据类型。相反，Groovy 中的一切都是对象。这允许你在看似原始类型的东西上调用方法，如下所示：


  `8.toString()`


  `4.times {`


          `// 运行一个任务`


  `}`


  `7.next()`


  默认情况下，Groovy 中的整数是 `java.lang.Integer`、`java.lang.Long` 或 `java.math.BigInteger`
  的实例。Groovy 会自动选择最小的类来容纳整数的值。示例如下：


  `println 90.class                     // 打印 class java.lang.Integer`


  `println 9999999999999999999.class    // 打印 class java.math.BigInteger`


  默认情况下，浮点数是 `java.math.BigDecimal` 的实例：


  `println 9.0.class    // 打印 class java.math.BigDecimal`


  始终可以通过显式关联类型或使用后缀来覆盖默认行为，如下所示：


  `println 90l.class    // 打印 class java.lang.Long`


  `float foo = 9.0`


  `println foo.class    // 打印 class java.lang.Float`


  如果 Groovy 不支持原始类型，那么你可能会想知道如何使用运算符进行基本算术运算，例如 2 + 3 或 10/2。Groovy 重载了运算符，这些运算符实际上是
  Groovy 中的方法调用。例如，2 + 3 等价于 `2.plus(3)`。由于运算符是方法，如果其中一个操作数是 null，那么执行该操作将导致 `NullPointerException`。


  注意


  与 Java 不同，Groovy 默认执行浮点除法。例如，操作 2/4 的结果是 0.5。在 Java 中，相同的操作结果将是 `0`，因为 Java 检测到两个操作数都是整数，因此会执行整数除法。




  #### 声明变量


  到目前为止，你已经了解了如何使用数据类型声明变量。Groovy 还提供了 `def` 关键字，当你不确定或不关心变量数据类型时，可以用它来声明变量。例如：


  `def obj = ''a''`


  `println obj.class    // 输出 class java.lang.String`


  `obj = 1.4`


  `println obj.class    // 输出 class java.math.BigDecimal`


  在声明变量时，可以省略 `def` 关键字。以下是省略 `def` 后的上述代码：


  `obj = ''a''`


  `println obj.class         // 输出 class java.lang.String`


  `obj = 1.4`


  `println obj.class         // 输出 class java.math.BigDecimal`


  #### 列表


  Groovy 中的列表是一个有序的元素集合。默认情况下，Groovy 列表是 `java.util.ArrayList` 的实例，并具有以下声明语法：


  `list = [1, 2, 3, 4]`


  `listWithDiffItems = [1, 3, ''String Item'', 3.4]`


  与 Java 一样，可以使用 `get` 方法访问列表中的元素。Groovy 还提供了一个 `getAt` 方法，该方法允许你使用负索引从末尾开始访问元素：


  `println list.get(1)       // 输出 2`


  `println list.getAt(-1)    // 输出 4，即倒数第一个元素`


  可以使用 `add` 和 `remove` 方法添加或删除元素。`each` 方法可用于遍历列表元素：


  `list.add 5`


  `list.remove 0    // 0 是要删除元素的索引`


  `list.each { println it }`


  请注意，`each` 方法将闭包作为其参数。你将在本章后面部分了解更多关于闭包的内容。


  #### 映射


  Groovy 中的映射包含键/值对。默认情况下，Groovy 映射是 `java.util.LinkedHashMap` 的实例，并具有以下语法：


  `[key1 : value1, key2 : value2]`


  以下是在 Groovy 中定义的映射示例：


  `map = [ "red" : 1, "yellow" : 2, "green" : 3 ]`


  可以通过多种方式访问映射中的元素。最常见的方法是使用 `"."` 表示法。以下是一些示例：


  `println map.red //输出 1`


  `println map["yellow"] // 输出 2`


  `println map.get("green") // 输出 3`


  你可以使用 `put` 方法向映射添加新值，并使用 `each` 方法遍历值：


  `map.put "blue", 4`


  `map.each { println "Key: ${it.key} and Value: ${it.value}" }`


  请注意 `each()` 方法中 `${}` 表达式的使用。Groovy 会计算这些表达式并输出键/值对。


  #### 范围


  Groovy 提供了一个范围运算符（`..`）来创建对象范围。例如，以下代码定义了一个从 0 到 9 的整数范围：


  `def intRange = 0..9`


  `println intRange.size()     // 输出 10`


  `intRange.each {print it}    // 输出 0123456789`


  ### 闭包


  简单来说，闭包是一段可执行的代码块。Groovy 中的闭包是 `groovy.lang.Closure` 的实例。由于闭包是对象，因此可以将它们分配给变量或作为参数传递给方法。由于它们包含代码，因此可以执行闭包。闭包通常被称为匿名函数。


  Groovy 中的闭包可以接受参数并返回值。声明闭包的语法如下：


  `{ 参数列表 -> 闭包体 }`


  闭包由花括号 `{}` 括起来。参数列表由逗号（,）分隔，闭包体包含一个或多个语句。符号 `->` 将参数列表与闭包体分开。如果闭包没有 `return` 语句，则返回最后一个语句的输出。以下是一个接受一个
  `String` 类型参数的闭包示例：


  `def greet = {String name -> "Hello ${name}" }`


  可以使用引用变量 `greet` 调用此闭包，如下所示：


  `greet "Joe"`


  `greet.call "Joe"`


  如果闭包不接受任何参数，则可以省略参数列表和 `->` 符号。以下是一个没有任何参数的非常简单的示例：


  `def greet = {"Hello"}`


  在没有声明参数的情况下，一个名为 `it` 的无类型参数将隐式地提供给闭包体。考虑以下使用 `it` 参数的示例：


  `def greet = {"Hello $it"}`


  当使用参数（例如 `"World"`）调用 `greet` 闭包时，它将输出 `Hello World`。如果在没有参数的情况下调用 `greet`，则会传递
  `null`。


  `def greet = {"Hello $it"}`


  `greet "World"    // 输出 Hello World`


  `greet()          // 输出 Hello null`


  以下是更多闭包定义的示例：


  `{ -> }                     // 空闭包`


  `{ a, b -> a + b }          // 带有两个无类型参数的闭包`


  `{int a, int b -> a + b}    // 带有两个 int 类型参数的闭包`


  闭包可以作为参数传递给方法。事实上，本章的“列表”和“映射”部分展示了如何将闭包 `{print it}` 传递给列表或映射的 `each` 方法。`each`
  方法接受一个 `groovy.lang.Closure` 类型的参数，并为列表或映射中的每个元素执行它。闭包通过隐式的 `it` 参数访问元素。


  闭包可以访问在其作用域内声明的变量。例如，如果闭包是在方法内部定义的，它可以访问该方法有权访问的所有变量（参数、局部变量、类变量等）。


  ## 总结


  Groovy 是使用 Gradle 时的首选语言。本章涵盖了安装 Groovy 以及使用 Groovy Shell 和 GroovyConsole。它回顾了 Groovy
  的基础知识及其支持的数据类型。你了解到 Groovy 的 GString 允许你包含表达式，从而使其适合模板化。最后，你学习了闭包——可以传递的代码块/功能。


  在接下来的章节中，你将深入了解 Gradle 的任务，并开始编写 Gradle 构建脚本。


  '
- '# 4. 理解 Gradle 构建


  Gradle 的核心是两个基本构建块——项目和任务。一个 Gradle 构建由一个或多个项目组成，每个项目包含一个或多个任务。本章将回顾这两个构建块。你将回顾这些构建块，并了解与构建相关的生命周期阶段。




  ## 项目


  在 Gradle 中，项目是一个抽象概念，代表需要构建的产物。例如，一个 Gradle 项目可以是一个需要打包成 JAR 文件的 Java 应用程序。Gradle
  项目也可以代表一项需要完成的工作。例如，可以使用 Gradle 项目来部署一个应用程序。


  对于构建中的每个项目，Gradle 都会创建一个 `org.gradle.api.Project` 实例，并将其与构建脚本关联。这使得构建脚本能够在运行时使用
  Project 的 API 来访问属性和自定义构建行为（例如，通过创建新任务或跳过现有任务）。表 4-1 列出了 Project API 中一些常用的属性和方法。


  表 4-1.


  常用的 Project API 属性和方法


  | 属性/方法 | 描述 |

  | --- | --- |

  | `name` | 项目名称，可通过 `settings.gradle` 文件更改。默认为项目目录名称。 |

  | `description` | 项目描述。通常在 `build.gradle` 文件中设置。 |

  | `version` | 项目的版本。 |

  | `parent` | 返回父项目（如果存在）。 |

  | `group` | 用户定义的标识符，表示负责该项目的组或组织。例如，`org.hibernate` 或 `org.springframework`。 |

  | `task` | 用于创建新任务的重载方法。 |

  | `dependencies` | 配置项目的依赖项。 |

  | `repositories` | 配置项目的仓库。 |

  | `defaultTasks` | 配置要为项目运行的默认任务名称。 |


  要访问 Project API 的属性/方法，可以使用 Gradle 与构建文件关联的隐式变量 `project`。清单 4-1 展示了一个位于 `chapter4`
  文件夹中、名为 `project-explicit.gradle` 的 Gradle 构建文件。该构建文件包含设置 Project 的 description
  并将其打印到控制台的代码。Gradle 将使用名称 `chapter4` 作为它为此构建创建的项目对象。


  清单 4-1\. project-explicit.gradle 示例


  `project.description = "Hello World Project"`


  `println "Project Description ${project.description}"`


  请注意，此新构建文件的名称并未使用 `build.gradle`。Gradle 默认会查找 `build.gradle` 文件来运行构建。也可以创建具有不同名称的构建文件。要使用这些文件触发构建，需要使用命令行选项
  `-b` 或 `--build-file`，后跟文件名。在本章中，你将处理大量示例，并会创建单独的构建文件，然后使用 `-b` 选项运行它们。运行 `project-explicit.gradle`
  构建文件将产生以下输出。


  `chapter` `4` `>gradle -b project-explicit.gradle`


  `Project Description Hello World Project`


  Gradle 还允许你在访问 Project API 的方法或属性时省略项目变量名：


  `description = "Hello World Project"`


  `println "Project Description ${description}"`


  可以使用 `ext {}` 闭包内的语法 `<<name>> =<< value>>` 或使用快捷方式 `ext.<<name>>=<<value>>` 来定义额外的项目级属性。清单
  4-2 展示了一个名为 `project-add-properties.gradle` 的新构建文件中定义的两个额外属性——`environment` 和 `outputLang`。


  清单 4-2\. project-add-properties.gradle 示例


  `description = "Hello World Project"`


  `println "Project Description ${description}"`


  `ext {`


  `outputLang = "English"`


  `}`


  `ext.environment = "local"`


  `println "Output Language: ${project.outputLang}"`


  `println "Environment: ${environment}"`


  运行此脚本将产生以下输出。由于这些属性是在项目级别定义的，你可以直接访问它们的值，或使用 `project` 前缀。


  `chapter` `4` `>gradle -b project-add-properties.gradle`


  `Project Description Hello World Project`


  `Output Language: English`


  `Environment: local`


  ## 任务


  Gradle 项目由一个或多个执行构建步骤的任务组成。任务执行诸如编译 Java 源代码并生成类或清理目标文件夹等操作。任务也可以依赖于其他任务。例如，运行测试用例的任务依赖于编译
  Java 代码的任务。对应于构建文件中的每个任务，Gradle 都会创建一个 `org.gradle.api.Task` 实例。默认情况下，它将是 `org.gradle.api.DefaultTask`
  类。表 4-2 展示了一些常用的与任务相关的 API 属性和方法。


  表 4-2.


  常用的与任务相关的 API 属性和方法


  | 属性/方法 | 描述 |

  | --- | --- |

  | `name` | 任务名称。 |

  | `description` | 任务描述。 |

  | `group` | 任务所属的任务组。任务组提供了一种对相关任务进行逻辑分组的方法。 |

  | `enabled` | 决定任务是启用还是禁用。 |

  | `dependson` | 配置任务依赖关系。 |

  | `doFirst` | 在任务操作列表的开头添加一个操作。 |

  | `doLast` | 在任务操作列表的末尾添加一个操作。 |

  | `onlyIf` | 仅当传入的闭包返回 true 时才运行任务。 |


  在接下来的章节中，你将使用这些属性和方法来创建任务、添加操作以及声明任务之间的依赖关系。




  ### 创建任务


  在最简单的层面上，创建一个任务只需要任务名称：


  `task displayProperties`


  尽管这个任务完全有效，但它实际上什么也不做。为了让任务执行有意义的操作，你需要为其添加一些动作。Gradle 提供了 `doFirst` 和 `doLast`
  方法来将动作与任务关联。顾名思义，添加到 `doFirst` 方法的动作会位于待执行动作列表的开头。添加到 `doLast` 方法的动作则位于动作列表的末尾。清单
  4-3 展示了更新后的 `displayProperties` 任务及其添加的动作。


  **清单 4-3.** 带动作的 displayProperties


  `description = "Sample Description for Project"`


  `task displayProperties {`


  `description = "Task to display properties"`


  `ext {`


  `taskProp1 = "Prop Val"`


  `}`


  `doFirst {`


  `println "Project Description: $project.description"`


  `println "Task name $name"`


  `println "Task Description: $description"`


  `}`


  `doLast {`


  `println "Task Property 1: $taskProp1"`


  `}`


  `}`


  清单 4-3 更新了项目对象的 `description` 属性，然后在任务的闭包内更新了任务的 `description` 属性。Gradle 允许你使用 `ext`
  闭包在任务级别声明额外的属性。跨任务和其他配置元素共享的属性通常被声明为项目属性。例如，依赖工件的版本号通常被声明为项目属性（更多内容见第 6 章）。特定于某个任务的属性则被声明为任务属性。在清单
  4-3 中，使用了 `ext` 闭包来声明一个名为 `taskProp1` 的任务属性。代码还为 `doFirst` 方法添加了三个动作，为 `doLast`
  方法添加了一个动作。在 `doFirst` 方法中，`$project` 变量将项目对象的描述打印到控制台。由于 `name` 和 `description`
  是任务属性，你可以直接访问它们来打印其值。


  创建一个名为 `display-properties.gradle` 的新构建文件，并复制清单 4-3 的内容。执行 `displayProperties` 任务，你应该会看到以下输出。如你所见，`doFirst`
  内的动作先被执行，然后是 `doLast` 块内的动作。


  `\chapter` `4` `>gradle -b display-properties.gradle displayProperties`


  `:displayProperties`


  `Project Description: Sample Description for Project`


  `Task name displayProperties`


  `Task Description: Task to display properties`


  `Task Property 1: Prop Val`


  `BUILD SUCCESSFUL`


  `Total time: 4.046 secs`


  **提示**


  在命令行执行任务时，不必指定完整的任务名称。驼峰式命名的任务可以通过缩写每个单词来运行。例如，`displayProperties` 任务可以使用以下快捷方式运行：`gradle
  -b display-properties.gradle dP`。


  为了让 Gradle 执行任务，你需要将任务名称作为 Gradle 命令的一部分传入，正如你在之前的执行中所见。Gradle 提供了一种方法，可以使用 `defaultTasks`
  方法定义一个或多个默认任务，当没有提供其他任务时可以运行这些默认任务。清单 4-4 展示了如何使用 `defaultTasks` 方法将 `displayProperties`
  定义为默认任务。


  **清单 4-4.** 带默认任务的 displayProperties


  `description = "Sample Description for Project"`


  `defaultTasks ''displayProperties''`


  `task displayProperties {`


  `description = "Task to display properties"`


  `// 为简洁起见，内容已移除`


  `}`


  一旦你用 `defaultTasks` 代码更新了 `display-properties.gradle` 文件，你就可以使用 `gradle -b display-properties.gradle`
  命令触发任务执行。


  ### 任务依赖


  非平凡的构建通常包含多个任务，并且一个任务通常需要其依赖的另一个任务完成后才能运行。例如，在运行打包任务来组装工件之前，你必须先运行编译源代码的任务。同样，在编译任务运行之前，它可能需要运行一个任务来清理输出文件夹。Gradle
  提供了几种声明此类任务依赖关系的方法。


  清单 4-5 展示了 `task-dependencies.gradle` 构建文件，其中包含三个任务——`clean`、`compile` 和 `package`。这个例子采用了两种声明依赖关系的方法。`dependsOn`
  方法使 `compile` 任务依赖于 `clean` 任务。要使 `package` 任务依赖于 `compile`，你需要使用任务的 `dependsOn`
  属性。在 Gradle 中，`package` 是一个保留字，要将其用作任务名称，你必须将其作为参数传递给 `task` 方法。另外，请注意使用 `<<` 运算符作为
  `doLast` 方法的快捷方式。


  **清单 4-5.** task-dependencies.gradle


  `task clean << {`


  `println ''Executing clean task''`


  `}`


  `task compile << {`


  `println ''Executing compile task''`


  `}`


  `compile.dependsOn ''clean''`


  `task ("package", dependsOn : ''compile'') << {`


  `println ''Executing package task''`


  `}`


  运行 `package` 任务，你会看到 `clean` 和 `compile` 任务在运行 `package` 任务之前被执行：


  `\chapter` `4` `>gradle -b task-dependencies.gradle package`


  `:clean`


  `Executing clean task`


  `:compile`


  `Executing compile task`


  `:package`


  `Executing package task`


  `BUILD SUCCESSFUL`


  为了确定任务需要运行的顺序，Gradle 会创建一个有向无环图（DAG）。每个要执行的任务都成为图中的一个节点。任务之间的依赖关系用于创建节点之间的边。图 4-1
  展示了清单 4-5 中任务的 DAG 表示。


  ![A978-1-4842-1031-4_4_Fig1_HTML.gif](img/A978-1-4842-1031-4_4_Fig1_HTML.gif)


  **图 4-1.** Gradle 的任务 DAG 表示


  DAG 不包含有向环。换句话说，不可能从一个节点出发，沿着一条边序列，再回到同一个节点。因此，Gradle 永远不会执行一个已经执行过的任务。


  考虑清单 4-6 中的场景，其中任务 A 和任务 B 都依赖于任务 C。


  **清单 4-6.** task-dependencies2.gradle


  `task A << { println ''In task A'' }`


  `task B << { println ''In task B'' }`


  `task C << { println ''In task C'' }`


  `A.dependsOn ''C''`


  `B.dependsOn ''C''`


  由于 Gradle 为任务执行创建了 DAG，当任务 A 和 B 运行时，Gradle 只运行任务 C 一次。创建一个包含清单 4-6 内容的 `task-dependencies2.gradle`
  文件，并运行以下命令来验证这一点：


  `\chapter` `4` `>gradle -b task-dependencies2.gradle A B`


  `:C`


  `In task C`


  `:A`


  `In task A`


  `:B`


  `In task B`


  考虑另一个不同的场景，其中任务 A 依赖于任务 B 和任务 C，如清单 4-7 所示。


  **清单 4-7.** task-dependencies3.gradle


  `task A << { println ''In task A'' }`


  `task B << { println ''In task B'' }`


  `task C << { println ''In task C'' }`


  `A.dependsOn ''B''`


  `A.dependsOn ''C''`


  当任务 A 运行时，`dependsOn` 确保 B 和 C 在执行 A 之前运行。创建一个包含清单 4-7 内容的 `task-dependencies3.gradle`
  文件并执行任务 A。你应该会看到以下输出：


  `\chapter` `4` `>gradle -b task-dependencies3.gradle A`


  `:B`


  `In task B`


  `:C`


  `In task C`


  `:A`


  `In task A`




  `dependsOn` 并不能保证依赖任务的执行顺序。例如，在清单 4-7 中，无法保证任务 B 会在任务 C 之前执行，反之亦然。有时你可能需要确保 B 在
  C 之前运行。为此，Gradle 提供了 `mustRunAfter` 方法。清单 4-8 展示了在前一个清单的基础上添加了 `mustRunAfter` 的修改版本。


  **清单 4-8. task-dependencies4.gradle**


  `task A << { println ''In task A'' }`


  `task B << { println ''In task B'' }`


  `task C << { println ''In task C'' }`


  `A.dependsOn ''B''`


  `A.dependsOn ''C''`


  `B.mustRunAfter ''C''`


  创建一个包含清单 4-8 内容的 `task-dependencies4.gradle` 文件，并运行任务 A。你应该会看到任务按照 C、B、A 的顺序执行，如下所示：


  `\chapter` `4` `>gradle -b task-dependencies4.gradle A`


  `:C`


  `In task C`


  `:B`


  `In task B`


  `:A`


  `In task A`


  ### 跳过任务


  有时你可能希望跳过某个任务的执行。例如，你可能只想在开发环境中运行某些任务，而在测试和生产环境中跳过它们。为此，Gradle 提供了 `onlyIf` 方法，该方法接受一个闭包。如果闭包返回
  `false`，则跳过该任务的执行。


  清单 4-9 展示了一个仅在非生产环境中运行的任务。`onlyIf` 闭包检查一个名为 `env` 的属性是否存在，并验证其值是否等于 `Prod`。


  **清单 4-9. skip-task.gradle**


  `task skipInProd {`


      `onlyIf {`


          `!project.hasProperty(''env'') || project.env != "Prod"`


      `}`


      `doLast {`


          `println ''Task execution complete''`


      `}`


  `}`


  你可以使用命令行参数 `-Pname=value` 将外部属性传递给 Gradle 构建脚本。将清单 4-9 的内容复制到 `skip-task.gradle`
  文件中，并使用命令行参数 `-Penv=Prod` 执行 `skipInProd` 任务。你应该会看到任务被跳过执行，如下所示：


  `\chapter` `4` `>gradle -b skip-task.gradle skipInProd -Penv=Prod`


  `:skipInProd SKIPPED`


  `BUILD SUCCESSFUL`


  `Total time: 2.82 secs`


  Gradle 提供了另一种通过任务的 `enabled` 属性来跳过任务的技术。默认情况下，`enabled` 属性被设置为 `true`。但是，可以通过编程方式切换其值，从而影响任务的执行。清单
  4-10 展示了使用 `enabled` 属性重写的 `skipInProd` 任务。


  **清单 4-10. 使用 enabled 属性跳过任务**


  `task skipInProd {`


      `enabled = !project.hasProperty(''env'') || project.env != "Prod"`


      `doLast {`


          `println ''Task execution complete''`


      `}`


  `}`


  ### Gradle 任务类型


  在本章前面部分，你已经了解到 Gradle 会为构建文件中找到的每个任务创建一个 `org.gradle.api.Task` 实例。默认情况下，这些任务是 `org.gradle.api.DefaultTask`
  的实例，因此继承了 `DefaultTask` 的属性和方法。Gradle 提供了几种开箱即用的任务类型，你的任务可以扩展这些类型，从而获得额外的功能，例如创建
  ZIP 归档或执行 Java 程序的能力。本节将介绍其中一些开箱即用的任务类型。


  #### Zip


  `Zip` 任务允许你从一组文件/目录创建 ZIP 归档。以下是一个 `Zip` 任务的示例：


  `task archiveTask (type : Zip) {`


      `archiveName  ''images.zip''`


      `from ''images''`


      `into "$buildDir/dist"`


  `}`


  `archiveTask` 从 `images` 目录读取文件/文件夹，创建一个名为 `images.zip` 的 ZIP 文件，并将其放置在 `build/dist`
  文件夹中。


  #### Copy


  `Copy` 任务允许你将文件从一个或多个源复制到目标目录。以下是一个 `Copy` 任务的示例：


  `task copyTask(type : Copy) {`


      `from ''src/config/dev.cert''`


      `from ''src/db''`


      `into ''dist''`


  `}`


  `copyTask` 会将一个名为 `dev.cert` 的单个文件以及 `src/db` 文件夹中的所有文件复制到 `dist` 文件夹中。


  #### Exec


  `Exec` 任务允许你执行一个命令行进程。示例如下：


  `task showWindowsVersion(type:Exec) {`


    `commandLine ''cmd'', ''ver''`


  `}`


  在 Windows 机器上，此任务会查找 Windows 操作系统版本。`commandLine` 属性需要完整的命令行，包括可执行文件和参数。但是，你需要将命令字符串按空格分割，并以逗号分隔的形式提供分割后的项。因此，命令
  `cmd ver` 被分割并作为 `cmd, ver` 提供。


  #### Delete


  `Delete` 任务允许你删除文件或文件夹。以下任务删除了两个文件夹——`libs` 和 `docs`。


  `task cleanTask (type : Delete) {`


      `delete ''build/libs'', ''build/docs''`


  `}`


  ## 构建生命周期


  每个 Gradle 构建都会经历三个不同的生命周期阶段：


  初始化阶段：在此阶段，Gradle 识别所有需要处理的 `build.gradle` 文件。对于单项目构建，只会识别一个构建文件。对于多项目构建（更多内容请参见第
  7 章），Gradle 会尝试定位与这些项目相关的所有可能的构建文件。一旦 Gradle 识别出参与构建的项目，它将为每个项目创建一个对应的 `org.gradle.api.Project`
  实例。   配置阶段：在此阶段，所有已识别项目的构建脚本都会被执行。请务必记住，此阶段不会执行任何实际的任务。相反，Gradle 会为每个项目构建一个任务对象的
  DAG（有向无环图）。Gradle 还会执行所有任务的配置部分，包括被禁用的任务。   执行阶段：在此阶段，Gradle 识别出需要执行的任务，并按正确的顺序运行它们。
   


  为了更好地理解构建生命周期，请考虑清单 4-11 中所示的 `build-phases.gradle` 构建脚本。该脚本包含两个任务——`noActionTask`
  和 `withActionTask`。这两个任务都直接在任务的闭包中包含 Groovy 代码。此外，`withActionTask` 在 `doLast` 方法内部也有代码。


  **清单 4-11. build-phases.gradle**


  `task noActionTask {`


      `description = "A task with no actions"`


      `println "I am in the configuration block of $name"`


  `}`


  `task withActionTask {`


      `println "I am in the configuration block of $name"`


      `doLast {`


          `println "performing an action in $name"`


      `}`


  `}`


  在配置阶段，Gradle 会执行直接在任务闭包中指定的代码。配置阶段完成后，Gradle 会在执行阶段执行 `doFirst` 和 `doLast` 内部的操作。例如，运行一个列出所有任务的命令会执行初始化和配置阶段，产生以下输出：


  `\chapter` `4` `>gradle -q -b build-phases.gradle tasks`


  `I am in the configuration block of noActionTask`


  `I am in the configuration block of withActionTask`


  ---------------output truncated---------------------


  运行 `withActionTask` 将导致执行两个配置块以及 `doLast` 方法中的操作。以下是产生的输出：


  `\chapter` `4` `>gradle -q -b build-phases.gradle wAT`


  `I am a in the configuration block of noActionTask`


  `I am a in the configuration block of withActionTask`


  `performing an action in withActionTask`




  ## 总结


  在本章中，你学习了 Gradle 构建的两个基本组成部分：项目和任务。你了解到一个任务可以包含一个或多个在 `doFirst` 或 `doLast` 代码块中定义的操作。任务可以依赖于其他任务，Gradle
  会创建一个有向无环图（DAG）来确保任务按正确顺序执行，同时也确保每个任务只执行一次。你了解了两种用于执行或跳过任务的技术——`onlyIf` 和 `enable`。最后，你回顾了
  Gradle 构建的三个阶段。


  在下一章中，你将使用 Gradle 构建 Java 和 Web 项目。你还将学习 Gradle 插件，并构建一个自定义插件。


  '
- '# 5. 项目与插件


  Gradle 为 Java、Scala 和 Groovy 等领域提供了标准化的项目结构。它采用“约定优于配置”的方法，并就项目不同部分应位于何处提供了建议。例如，Gradle
  建议所有 Java 源代码应放在 `src/main/java` 文件夹中，所有测试代码应放在 `src/test/java` 文件夹中。这种标准化使得开发人员可以轻松地在不同项目之间切换。本章将介绍
  Gradle 针对 Java 项目的“约定优于配置”特性。


  Gradle 遵循基于插件的架构，这使得增强和自定义其功能变得容易。它提供了几个开箱即用的插件，可以轻松构建 Java 项目。此外，Gradle 使得创建可与其他开发人员共享的自定义插件变得容易。本章将介绍
  Gradle 插件，并向你展示如何开发一个生成构建编号的自定义插件。


  ## 插件介绍


  Gradle 中的插件封装了可重用的构建、任务或配置逻辑。使用插件，可以添加新的任务、新的 DSL 元素或合理的默认值，从而扩展 Gradle 的功能。


  Gradle 插件分为两种类型：脚本插件和二进制插件。顾名思义，脚本插件是可以包含在其他构建脚本中的 Gradle 构建脚本。脚本插件提供了一种模块化通用构建逻辑的简便方法。这些脚本插件可以位于本地文件系统，也可以使用以下语法从远程服务器引入：


  `apply from: ''reusable-build.gradle''`


  位于远程服务器上的脚本插件可以使用以下语法导入：


  `apply from: ''http://your_server.com/plugin_path/plugin_name''`


  二进制插件将可重用的构建逻辑封装在实现 `org.gradle.api.Plugin<T>` 接口的类中。这些类通常打包成 JAR 文件，但也可以位于构建脚本内部或项目下的
  `buildSrc` 文件夹中。二进制插件可以使用以下语法在构建脚本中使用：


  `apply plugin: ''plugin_id''`


  `plugin_id` 是给定插件的唯一标识符。Gradle 自带的插件使用短名称，例如 `java` 或 `groovy`，而社区插件通常使用完全限定名称，例如
  `org.hibernate.gradle.tools`。


  ## Java 项目


  Gradle 附带几个开箱即用的插件，可简化 Java 开发。本节将介绍用于构建 JAR 工件的 `java` 插件，以及用于开发 Web 应用程序的 `war`
  插件。你还将了解可用于生成 API 文档的 Javadoc 插件。


  ### 使用 Java 插件


  `Java` 插件允许你编译 Java 代码、运行单元测试并组装 JAR 工件。要查看该插件的实际效果，请先在您的机器上创建一个名为 `hello-gradle`
  的新 Java 项目。创建一个 `build.gradle` 文件，并添加以下代码以应用 `Java` 插件：


  `apply plugin: ''java''`


  如上一节所述，此插件会向构建添加一组任务和属性。你可以通过运行 `gradle tasks` 命令来查看这些任务。以下是输出的一部分：


  `\hello-gradle>gradle tasks`


  `:tasks`


  `Build tasks`


  `-----------`


  `assemble - 组装此项目的输出。`


  `build - 组装并测试此项目。`


  `buildDependents - 组装并测试此项目以及所有依赖它的项目。`


  `buildNeeded - 组装并测试此项目以及它依赖的所有项目。`


  `classes - 组装 ''main'' 类。`


  `clean - 删除构建目录。`


  `jar - 组装一个包含主类的 jar 归档文件。`


  `testClasses - 组装 ''test'' 类。`


  `Documentation tasks`


  `-------------------`


  `javadoc - 为主源代码生成 Javadoc API 文档。`


  `Verification tasks`


  `------------------`


  `check - 运行所有检查。`


  `test - 运行单元测试。`


  注意


  所有 Gradle 命令都在包含 `build.gradle` 文件的文件夹中使用命令行/终端执行。


  输出显示了许多由插件清晰分组的新任务。`Build tasks` 组下的任务（如 `assemble` 和 `jar`）用于构建和打包。你通常不会单独运行这些任务，而是运行
  `build` 任务，该任务通过触发 `assemble` 和 `check` 任务来编译、测试和组装代码。`Documentation tasks` 下的 `javadoc`
  任务用于生成 Javadoc API 文档。`Verification tasks` 组下的任务用于运行单元测试。


  除了这些任务之外，`Java` 插件还就 Java 项目代码的不同部分应位于何处提供了一些指导。表 5-1 显示了推荐的目录。


  表 5-1. Gradle 推荐的 Java 目录结构


  | 目录 | 存放的资源 |

  | --- | --- |

  | `src/main/java` | 需要投入生产的 Java 源代码 |

  | `src/main/resources` | 需要投入生产的资源，例如配置文件（XML）和属性文件 |

  | `src/test/java` | Java 测试源代码 |

  | `src/test/resources` | 测试阶段使用的资源 |


  注意


  有经验的 Maven 用户会注意到 `Java` 插件的目录约定与 Maven 推荐的 Java 项目结构相匹配。请务必记住，这些约定只是建议，Gradle 可以轻松地根据项目需求更改它们。


  根据这些建议，让我们在 `hello-gradle` 文件夹下创建 `src/main/java` 文件夹。创建一个 `HelloGradle.java` 类，其内容如清单
  5-1 所示。


  清单 5-1. HelloGradle Java 代码


  `public class HelloGradle {`


  `public static void main(String[] args) {`


  `System.out.println("Hello Gradle!!");`


  `}`


  `}`


  现在，你可以使用 `gradle build` 命令构建代码。运行该命令的输出如下所示：


  `\hello-gradle>gradle build`


  `:compileJava`


  `:processResources UP-TO-DATE`


  `:classes`


  `:jar`


  `:assemble`


  `:compileTestJava UP-TO-DATE`


  `:processTestResources UP-TO-DATE`


  `:testClasses UP-TO-DATE`


  `:test UP-TO-DATE`


  `:check UP-TO-DATE`


  `:build`


  `BUILD SUCCESSFUL`


  `Total time: 4.479 secs`


  构建成功后，在 Windows 资源管理器中打开 `hello-gradle` 文件夹，你会看到一个 `build` 文件夹被创建，其内容如图 5-1 所示。`classes`
  文件夹包含编译后的类，`libs` 文件夹包含组装好的 JAR 文件。`tmp` 文件夹包含临时生成的文件，例如清单文件。


  ![A978-1-4842-1031-4_5_Fig1_HTML.jpg](img/A978-1-4842-1031-4_5_Fig1_HTML.jpg)




  图 5-1.


  Gradle 构建目录


  `gradle build` 命令的输出会在某些任务旁边显示文本 `"UP-TO-DATE"`。此文本表示该特定任务已被跳过。某些 Gradle 任务会声明一组输入和一组输出。例如，`compileJava`
  任务将一组 Java 文件作为输入，并生成一组编译后的类作为输出。如果 Gradle 确定任务的输入和输出自上次执行以来没有变化，它会自动跳过该任务的执行。此功能称为增量构建，可以显著减少大型项目的构建时间。


  ### Jar 任务


  Java 插件提供的 `Jar` 任务负责组装 JAR 归档文件。`Jar` 任务提供了许多属性，允许您配置生成的工件。其中一个属性是 `archiveName`。默认情况下，生成的
  JAR 文件名将是项目的名称。在本例中，项目名称为 `hello-gradle`，因此 `build/libs` 文件夹包含一个 `hello-gradle.jar`
  文件。以下代码显示了将生成的 JAR 名称更改为 `introducing-gradle.jar` 所需的配置：


  `jar {`


      `archiveName = ''introducing-gradle.jar''`


  `}`


  `Jar` 任务还会自动向其创建的 JAR 文件添加一个清单文件。清单文件通常包含有关打包在 JAR 文件中的文件的信息。要向清单文件添加新条目，您可以使用 `Jar`
  任务的 `manifest` 属性。清单 5-2 显示了修改后的 `build.gradle` 文件，其中包含向清单文件添加三个新条目的配置。


  清单 5-2\. 新的 hello-gradle build.gradle 文件


  `apply plugin: ''java''`


  `jar {`


      `manifest {`


          `attributes (`


              `''Main-Class'' : ''HelloGradle'',`


              `''Implementation-Title'' : project.name,`


              `''Developer''  : ''Sudha Belida''`


          `)`


      `}`


  `}`


  运行 `gradle build` 命令。构建成功完成后，使用 WinZip 等 ZIP 工具打开 `builds/lib` 文件夹内生成的归档文件。`META-INF`
  文件夹下的 `MANIFEST.MF` 文件应显示这三个新条目。


  注意


  为了使构建生成包含清单条目的更新 JAR，您可能需要从 `libs` 目录中删除现有的 `hello-gradle.jar` 并重新运行 `build` 命令。


