  ### War 任务


  `War` 插件中的 `War` 任务负责组装 WAR 归档文件。默认情况下，它会执行以下操作：


  *   将编译后的 Java 代码复制到 `WEB-INF/classes` 文件夹。

  *   将 `src/main/webapp` 的内容复制到 WAR 文件的根目录。

  *   将运行时配置中的依赖项复制到 `WEB-INF/lib` 文件夹。


  `War` 任务提供了多个可用于自定义生成工件的属性和方法。以下代码展示了其中一些配置选项：


  `war {`


      `archiveName ''new-archive.war''`


      `webXml file (''src/config/web.xml'')`


      `from ''src/media/images''`


  `}`


  此配置将生成的工件重命名为 `new-archive.war`。然后，它配置 `War` 任务使用位于 `src/config` 文件夹中的 `web.xml`
  文件。最后，该任务被配置为将 `src/media/images` 文件夹中的内容添加到 WAR 文件的根目录。使用 `War` 插件时，WAR 文件的内容默认位于
  `src/main/webapp`。请务必记住，此配置仅将 `images` 文件夹中的内容附加到 WAR 文件。如果你希望 `War` 任务覆盖默认行为并在其他位置（例如
  `src/WebContent`）查找内容，则需要更改 war 插件的 `webAppDirName` 属性：


  `apply plugin: ''war''`


  `apply plugin: ''jetty''`


  `webAppDirName = ''src/WebContent''`


  ## 编写自定义插件


  Gradle 使得构建自定义二进制插件变得非常容易。你只需创建一个实现 `org.gradle.api.Plugin<T>` 接口的类即可。该插件类及其相关代码可以位于以下三个位置之一：


  *   **构建脚本**：插件源代码可以直接嵌入到构建脚本中。这种方法限制了插件的复用价值，因为该插件在构建脚本外部不可见。

  *   **buildSrc 项目**：位于 `buildSrc` 项目下的插件代码会被自动编译，并在构建脚本的类路径中可用。此插件在构建外部也不可见，因此无法在项目外部复用。

  *   **独立项目**：插件代码可以打包成一个 JAR 文件，然后包含在构建脚本的类路径中。这种方法提供了最高的复用价值，但也需要单独的项目和构建基础设施。


  在接下来的章节中，你将构建一个包含单个任务的简单插件，该任务向控制台打印 `"Hello Gradle Plugin"`，以及一个更复杂的用于生成构建编号的插件。你将采用
  `buildSrc` 项目方法来构建简单插件。Gradle 插件可以用任何能编译成字节码的语言编写。你将首先使用 Java 创建简单插件，然后使用 Groovy
  创建一个示例。你将使用独立项目方法来构建复杂插件。


  ### 创建 Java 插件


  你将通过在 `hello-gradle` 文件夹内创建一个 `buildSrc` 文件夹来开始你的 Hello Gradle 插件开发。为了存放 Java 代码，在
  `buildSrc` 下创建子文件夹 `src/main/java`。目录结构应类似于图 5-5 所示的结构。


  ![A978-1-4842-1031-4_5_Fig5_HTML.jpg](img/A978-1-4842-1031-4_5_Fig5_HTML.jpg)


  图 5-5.


  buildSrc 目录结构


  下一步是创建一个向控制台输出 `"Hello Gradle Plugin"` 的任务。在 `buildSrc` 文件夹下创建一个 `GreetTask.java`
  文件，并复制清单 5-6 的内容。


  清单 5-6\. GreetTask.java 内容


  `import org.gradle.api.DefaultTask;`


  `import org.gradle.api.tasks.TaskAction;`


  `public class GreetTask extends DefaultTask {`


      `@TaskAction`


      `public void greetAction() {`


          `System.out.println("Hello Gradle Plugin");`


      `}`


  `}`


  在 Gradle 中创建自定义任务最简单的方法是扩展 `org.gradle.api.DefaultTask`，该类本身实现了 `org.gradle.api.Task`
  接口。为了让任务执行一个操作，你必须创建带有 `System.out.println` 语句的 `greetAction` 方法，该方法将消息写入控制台。为了让
  Gradle 将此方法视为要执行的操作，你必须使用 `@TaskAction` 对其进行注解。


  下一步是编写插件类本身。在 `buildSrc` 文件夹中创建 `HelloPlugin.java` 类，并将清单 5-7 的内容复制进去。


  清单 5-7\. HelloPlugin.java 内容


  `import org.gradle.api.Plugin;`


  `import org.gradle.api.Project;`


  `import java.util.Map;`


  `import java.util.HashMap;`


  `public class HelloPlugin implements Plugin<Project> {`


      `@Override`


      `public void  apply(Project project) {`


          `project.getTasks().create("greet", GreetTask.class);`


      `}`


  `}`


  Gradle 插件是通过实现 `org.gradle.api.Plugin<T>` 接口创建的。`Plugin` 接口包含一个名为 `apply(Project)`
  的方法，插件类必须实现该方法。Gradle 通过调用其 `apply` 方法来开始执行插件。因此，你在 `apply` 方法内部使用传入的 `Project`
  参数注册 `GreetTask`。你通过使用 `create` 方法来创建任务并将其添加到 `Project` 的任务容器中。`create` 方法接受要创建的任务名称以及任务类。


  至此，插件开发完成。要使用此插件，请将以下代码添加到 `build.gradle` 文件中：


