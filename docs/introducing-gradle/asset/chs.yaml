  ### 测试安装


  现在 Gradle 已安装，是时候测试并验证安装了。打开命令提示符并运行以下命令：


  `gradle -v`


  此命令应输出类似于图 2-6 所示的信息。


  ![A978-1-4842-1031-4_2_Fig6_HTML.jpg](img/A978-1-4842-1031-4_2_Fig6_HTML.jpg)


  图 2-6.


  Gradle 版本命令


  `–v` 命令行选项会显示 Gradle 的安装路径以及它正在使用的 Java、Ant 和 Groovy 版本。运行扩展命令 `gradle --version`
  会得到相同的结果。




  ### 在 Mac OS X 上安装


  解压下载的分发包，并将 `gradle-2.7-all` 文件夹的内容移动到 `/Users/<<your_user_name>/tools` 目录下，如图 2-7
  所示。


  ![A978-1-4842-1031-4_2_Fig7_HTML.jpg](img/A978-1-4842-1031-4_2_Fig7_HTML.jpg)


  图 2-7.


  Mac 上的 Gradle 安装位置


  打开终端，使用以下命令编辑位于您主目录下的初始化脚本 `.profile`：


  `nano ∼/.profile`


  在 `.profile` 文件中，添加以下行：


  `export GRADLE_HOME = /Users/<<your_user_name>/tools/gradle-2.7`


  `export PATH=$PATH:$GRADLE_HOME/bin`


  按 CTRL+O 保存更改。然后按 CTRL+X 退出文件。运行 `gradle -v` 命令以验证安装是否成功。


  ### 设置 Gradle 的 JVM 选项


  与所有其他 Java 应用程序一样，Gradle 共享由环境变量 `JAVA_OPTS` 设置的相同 JVM 选项。特别是在复杂项目中，您很可能会遇到 `OutOfMemory`
  错误。例如，当您运行大量 `JUnit` 测试或生成大量报告时，可能会发生这种情况。要解决此错误，请增加 Gradle 使用的 Java 虚拟机 (JVM) 的堆大小。这可以通过创建一个名为
  `GRADLE_OPTS` 的新环境变量来全局完成。首先，我们建议使用值 `-Xmx512m` 或 `-Xmx1024m`。


  ### Gradle 分发包


  如您在图 2-2（参见“在 Windows 上安装”）中所见，Gradle 分发包包含多个文件和文件夹。表 2-1 简要总结了这些内容及其用途。


  表 2-1.


  Gradle 分发包的文件和文件夹


  | 文件夹 | 描述 |

  | --- | --- |

  | `bin` | 包含 Gradle 可执行文件 |

  | `docs` | 包含用户指南 (HTML/PDF)、Javadoc、Groovydoc 和 Gradle DSL 参考 |

  | `init.d` | 包含每次构建需要运行的任何脚本 |

  | `lib` | 包含 Gradle 运行所需的依赖项（JAR、插件） |

  | `media` | 包含 Gradle 图标和徽标 |

  | `samples` | 包含复杂构建以及与工具集成的模板和示例 |

  | `src` | 包含 Gradle 的源代码 |


  ## Hello World Gradle 脚本


  现在您已成功安装 Gradle，可以创建您的第一个 Gradle 脚本了，该脚本不执行任何操作，仅输出文本 `Hello world!!`。执行构建时，Gradle
  默认会查找名为 `build.gradle` 的构建脚本。首先，创建一个名为 `hello-world` 的文件夹。在该文件夹内，创建 `build.gradle`
  文件，然后从清单 2-1 复制代码。


  清单 2-1\. Hello World 任务


  `task helloWorld << {`


      `println ''Hello world!!''`


  `}`


  打开命令提示符，导航到 `hello-world` 目录。然后使用命令 `gradle helloWorld` 执行 `helloWorld` 任务。您应该会看到如下所示的
  `Hello world!!` 输出：


  `C:\apress\chapter` `2` `\hello-world>gradle helloWorld`


  `:helloWorld`


  `Hello world!!`


  `BUILD SUCCESSFUL`


  `Total time: 3.594 secs`


  清单 2-1 使用 Gradle 的 DSL 来定义 `helloWorld` 任务，并添加一个动作以向控制台打印 `Hello world!!`。您可以使用闭包（花括号
  `{}` 内的代码）和 Groovy 的 `println` 方法来实现这一点，该方法类似于 Java 的 `System.out.println` 方法。正如您将在第
  4 章中探讨的那样，Gradle 任务可以包含多个动作。`<<` 是一个快捷操作符，指示要为任务执行的最后一个动作（在本例中为打印到控制台）。


  构建输出包括所运行任务的名称和执行时间。可以运行仅输出任务输出的相同构建。这通过使用 `-q` 标志来实现，如下所示：


  `C:\apress\chapter` `2` `\hello-world>gradle -q helloWorld`


  `Hello world!!`


