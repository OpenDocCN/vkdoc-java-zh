  《Gradle 入门指南》是一本关于 Gradle 构建自动化工具的快速入门手册。本书首先解释 Gradle 的基本原理，并向您展示如何在本地机器上设置和测试
  Gradle。它解释了用于创建 Gradle 构建脚本的语言 Groovy 的基础知识。然后深入探讨了依赖管理、项目、任务、生命周期阶段和插件等概念。本书还讨论了
  Gradle 对多项目的支持以及将构件发布到本地和远程仓库。最后，以对持续集成（CI）的讨论和对 Jenkins 对 Gradle 的支持的回顾作为结尾。


  ## 本书结构


  第 1 章 从对 Gradle 的温和介绍开始。它讨论了采用 Gradle 的原因，并概述了其两个替代方案：Ant 和 Maven。


  第 2 章 重点介绍如何在您的机器上设置 Gradle 并测试安装。它还概述了 Gradle 发行版中包含的不同文件/文件夹，并展示了一个简单的 Gradle
  构建脚本。


  第 3 章 深入探讨 Groovy 语言基础，并回顾构建 Gradle 脚本所需的语言特性。


  第 4 章 讨论 Gradle 的两个构建块——项目和任务。您将学习如何创建任务以及在这些任务之间声明依赖关系。您还将回顾 Gradle 构建的生命周期。


  第 5 章 深入探讨 Gradle 对 Java 项目的支持。您将了解 `Java` 和 `War` 插件，并使用它们来构建和部署 Java 及 Web 应用程序。本章还深入介绍了
  Gradle 插件。您还将了解如何构建自定义插件。


  第 6 章 详细介绍了依赖管理。您将学习依赖管理背后的原理，并了解 Gradle 对管理这些依赖的支持。您还将了解不同类型的依赖以及如何解决依赖冲突。


  第 7 章 回顾 Gradle 多项目构建的复杂性。您将了解两种类型的项目结构——层次结构和扁平结构。您还将学习如何在根项目和子项目构建文件中声明公共行为和特定项目行为。


  第 8 章 讨论 Gradle 对发布构件的支持。您将了解用于声明项目产生的构件的归档配置。然后，您将安装 Nexus Maven 仓库管理器并将构件发布到该仓库。您还将了解处理额外构件所需的配置。


  第 9 章 回顾持续集成（CI）流程，并探索流行的开源 CI 服务器 Jenkins。您将了解安装 Jenkins 以及配置必要的插件来运行位于 GitHub
  仓库上的示例项目。


  ## 目标读者


  《Gradle 入门指南》面向希望快速上手 Gradle 的开发人员和自动化工程师。本书假定读者具备 Java 基础知识。无需具备 Gradle 使用经验。





