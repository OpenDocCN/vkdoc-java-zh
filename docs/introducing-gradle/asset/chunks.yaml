- fmt: "# Running Groovy\n\nGroovy provides a command-line tool called Groovy Shell\
    \ or `groovysh`. It allows you to easily and quickly experiment with the language.\
    \ To launch `groovysh`, open a command prompt/terminal and type `groovysh`. Once\
    \ the shell finishes launching, you can start typing Groovy code and see it in\
    \ action, as shown here:\n\n```\nC:\\apress\\intro-gradle>groovysh\nGroovy Shell\
    \ (2.4.5, JVM: 1.7.0_67)\nType ':help' or ':h' for help.\n----------------------------------------------------------------------------\n\
    groovy:000> println 'Hello World'\nHello World\n===> null\ngroovy:000>\n```\n\n\
    You can exit the Groovy shell by running the command `:exit` or `:quit`. You can\
    \ also run the `:help` command to list available shell commands or get details\
    \ on an individual command.\n\nGroovy also provides GroovyConsole—a GUI-based\
    \ tool for executing Groovy code. To launch the GroovyConsole, simply double-click\
    \ the `groovyConsole.bat` (for Windows) under the `GROOVY_HOME\\bin` directory.\
    \ Figure [3-2](#A978-1-4842-1031-4_3_Chapter.html#Fig2) shows GroovyConsole with\
    \ an input area and an output area. The input area is where you enter Groovy code\
    \ (such as `println 'Hello World'` shown in Figure [3-2](#A978-1-4842-1031-4_3_Chapter.html#Fig2)).\
    \ The Groovy code can be compiled and executed using the Script ➤ Run menu item\
    \ or by choosing Run from the Action menu. The output of the execution is shown\
    \ in the output area.\n\n![A978-1-4842-1031-4_3_Fig2_HTML.jpg](A978-1-4842-1031-4_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. GroovyConsole example\n\n# Basic Groovy Language Features\n\nThis\
    \ section covers Groovy syntax, data types (simple and collections), and closures.\
    \ If you are interested in learning more about Groovy’s language features, refer\
    \ to the online documentation at [`www.groovy-lang.org/single-page-documentation.html`](http://www.groovy-lang.org/single-page-documentation.html).\n\
    \n## Groovy Syntax\n\nGroovy absorbs much of its syntax from Java and has added\
    \ simplifications that make it easy to use. One such simplification is dropping\
    \ the semicolon requirement at the end of a line when the line contains only one\
    \ statement. Similarly, methods with at least one parameter can be invoked without\
    \ parentheses. The following two statements are valid in Groovy:\n\n```\nprintln\
    \ (\"Hello World\");\nprintln \"Hello World\"\n```\n\nHere are few more notable\
    \ differences from Java:\n\n- Methods and classes in Groovy are public by default.\n\
    - The `return` statement is optional in methods. If Groovy doesn’t find a `return`\
    \ statement, it returns the last evaluated expression.\n- Checked exceptions need\
    \ not be caught or declared. Groovy automatically wraps those exceptions as a\
    \ `RuntimeException`.\n- By default, the following packages are imported—`java.lang.*`,\
    \ `java.util.*`, `java.util.regex.*`, `java.net.*`, `java.io.*`, `groovy.lang.*`,\
    \ `groovy.util.*`, `java.math.BigDecimal`, and `java.math.BigInteger`.\n\n## Comments\n\
    \nGroovy comments have the same syntax as that of Java. Single-line comments start\
    \ with `//` and multi-line comments start with `/*` and end with `*/`. Groovydoc\
    \ comments are similar to Javadoc comments and begin with `/**` and end with `*/`.\n\
    \n## Data Types\n\nThe Groovy language offers several data types such as numbers,\
    \ strings, and complex data types such as lists and maps.\n\n### Strings\n\nGroovy\
    \ supports two types of strings—regular Java strings that are instances of `java.lang.String`\
    \ and GStrings, which are instances of `groovy.lang.GString`. Regular Groovy strings\
    \ are declared by surrounding sequences of characters with single, double, or\
    \ triple quotes. Here are a few examples of `String` declarations:\n\n```\nString\
    \ message = 'Hello World'\nString processor = \"Intel\"\nString multiLine = '''This\
    \ text is on line one\n   line 2 and\n   line 3'''\nString escapedExample = 'Bob\\\
    's Burgers'\n```\n\nTriple quotes syntax allows you to place the text across line\
    \ boundaries without having to split and concatenate it on each line. Groovy preserves\
    \ the whitespace in a multi-line text declared using triple quotes. For example,\
    \ the variable `multiLine` shown above will hold text containing whitespaces and\
    \ newline characters. If you were to save that text in a database, it would be\
    \ saved as shown:\n\n```\nThis text is on line one\n    line 2 and\n    line 3\n\
    ```\n\n> **Note:** Like Java, Strings in Groovy are immutable. If the contents\
    \ of a string need to be changed, then it is recommended you use `StringBuilder`\
    \ or `StringBuffer`.\n\nGStrings are strings that are escaped using double quotes\
    \ (or slashes `//`) and contain Groovy expressions with the `${...}` syntax. When\
    \ a GString is accessed, Groovy evaluates the expression and replaces the expression\
    \ text with its value. An example of a GString is shown here:\n\n```\nString name\
    \ = 'Luke'\nString message = \"Hello ${name}\"\nprintln message // This will print\
    \ Hello Luke\n```\n\nWhen expressions are simple references to variables, the\
    \ curly braces `{}` can be omitted. Hence, the `message` in the previous code\
    \ can be rewritten as follows:\n\n```\nString message = \"Hello $name\"\n```\n\
    \n> **Note:** Languages such as Ruby and Perl have the concept of string interpolation,\
    \ which is the ability to replace an expression in a string with its value. Hence,\
    \ GStrings are often referred to as interpolated strings.\n\nGroovy allows method\
    \ calls, statements, and variable names inside the `${...}` Groovy expressions.\
    \ Using GStrings, you can easily create templates without needing an external\
    \ templating engine. Here is an example that invokes the `length()` and `toLowerCase()`\
    \ methods inside expressions:\n\n```\nString name = 'Luke'\nString count = \"\
    ${name.length()}\"\nprintln count\nprintln \"${name.toLowerCase()}\"\n```\n\n\
    ### Numbers\n\nGroovy supports both integers and floating-point numbers. Unlike\
    \ Java, Groovy doesn’t offer primitive data types. Instead everything in Groovy\
    \ is an object. This allows you to invoke methods on what looks like primitives\
    \ as shown here:\n\n```\n8.toString()\n4.times {\n    // Run a task\n}\n7.next()\n\
    ```\n\nBy default, integers in Groovy are instances of `java.lang.Integer`, `java.lang.Long`,\
    \ or `java.math.BigInteger`. Groovy will automatically pick the smallest class\
    \ to accommodate the integer’s value. Here is an example:\n\n```\nprintln 90.class\
    \                     // Prints class java.lang.Integer\nprintln 9999999999999999999.class\
    \    // Prints class java.math.BigInteger\n```\n\nFloating-point numbers by default\
    \ are instances of `java.math.BigDecimal`:\n\n```\nprintln 9.0.class    // Prints\
    \ class java.math.BigDecimal\n```\n\nIt is always possible to override the default\
    \ behavior by explicitly associating a type or using suffixes as shown here:\n\
    \n```\nprintln 90l.class    // Prints class java.lang.Long\nfloat foo = 9.0\n\
    println foo.class    // Prints class java.lang.Float\n```\n\nIf Groovy doesn’t\
    \ support primitive types, then you might be wondering how basic arithmetic such\
    \ as `2 + 3` or `10/2` using operators is possible. Groovy has overloaded the\
    \ operators and the operators are actually method calls in Groovy. For example,\
    \ `2 + 3` is equivalent to `2.plus(3)`. Since the operators are methods, if one\
    \ of the operands is a null, then executing the operation would result in a `NullPointerException`.\n\
    \n> **Note:** Unlike Java, Groovy performs floating-point division by default.\
    \ For example, the operation `2/4` would result in `0.5`. In Java, the same operation\
    \ would result in `0` since Java detects both operands as integers and an integer\
    \ division would be performed."
