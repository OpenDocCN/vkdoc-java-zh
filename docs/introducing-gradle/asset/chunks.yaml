    ## 处理额外构件


    在本章前面部分，你已经了解到 `archives` 配置用于声明项目产生的构件。诸如 Java 之类的插件会自动将生成的 JAR 文件与此配置关联。然而，如果你的项目产生了额外的构件（例如，源码
    JAR 或 Javadoc JAR），你需要在构建文件中显式地将它们与 `archives` 配置关联起来。你可以通过向 `archives` 配置提供实际的构件或产生该构件的任务来实现这一点。


    为了更好地理解这个概念，考虑一个场景：你希望 `sample-app` 分发以下构件：


    *   一个位于项目根目录的名为 `app.properties` 的属性文件。

    *   一个包含项目源代码的 JAR 文件


    为了继续学习后续的代码示例，请在 `sample-app` 文件夹中创建一个 `app.properties` 文件，并复制以下内容：


    `licenseKey=XYFDLE`


    `encrypt=false`


    清单 8-3 展示了 `sample-app` 的 `build.gradle` 文件中将本用例中的两个构件分配给 `archives` 配置的部分。首先，你声明一个对
    `app.properties` 构件的引用。然后，你创建一个 `sourceJar` 任务，该任务将生成一个包含 `src/main` 文件夹中源代码和资源文件的
    JAR 文件。最后，你使用 `artifacts` 块将属性构件和源码 JAR 任务添加到 `archives` 配置中。


    清单 8-3\. 将构件与配置关联


    `def propertiesArtifact = file(''app.properties'')`


    `task sourceJar (type : Jar) {`


       `classifier = ''sources''`


       `from sourceSets.main.allSource`


    `}`


    `artifacts {`


       `archives propertiesArtifact`


       `archives sourceJar`


    `}`


    将此清单添加到 `sample-app` 的 `build.gradle` 文件后，你可以运行 `uploadArchives` 任务，它将自动将这两个新构件连同
    `sample-app.jar` 文件一起部署到 Maven 仓库。运行该命令应产生以下输出：


    `\chapter` `8` `\sample-app>gradle uploadArchives`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:jar UP-TO-DATE`


    `:sourceJar`


    `:uploadArchives`


    `BUILD SUCCESSFUL`


    命令成功执行后，在浏览器中导航到 URL `http://localhost:8081/nexus/content/repositories/snapshots/com/apress/gradle/intro/sample-app/1.0-SNAPSHOT/`。你应该会看到图
    8-4 中所示的三个构件。


    ![A978-1-4842-1031-4_8_Fig4_HTML.jpg](img/A978-1-4842-1031-4_8_Fig4_HTML.jpg)


    图 8-4.


    Maven 仓库中示例应用的三个构件


    打开 `sample-app-1.0-###########.properties` 文件；它应包含图 8-5 所示的内容。


    ![A978-1-4842-1031-4_8_Fig5_HTML.jpg](img/A978-1-4842-1031-4_8_Fig5_HTML.jpg)


    图 8-5.


    属性文件内容


    ## 安装到 Gradle 缓存


    在第 6 章中，你了解到 Gradle 维护着一个缓存，用于存储下载的构件和元数据。这提高了构建性能，因为向外部仓库发出的下载请求数量显著减少。默认情况下，此缓存位于
    `<<USER_HOME>>/.gradle/caches` 文件夹中。图 8-6 展示了我们机器上 Gradle 缓存的一部分。Gradle 会计算构件内容的
    `SHA1` 哈希码，并将其用作存放构件的文件夹名称。Gradle 不保证此文件夹结构，并且该结构很可能会随着 Gradle 新版本而改变。


    ![A978-1-4842-1031-4_8_Fig6_HTML.jpg](img/A978-1-4842-1031-4_8_Fig6_HTML.jpg)


    图 8-6.


    Gradle 缓存目录结构


    考虑一个场景：你希望将一个第三方 JAR 文件添加到 Gradle 的缓存中，以便 Gradle 构建可以使用它。也可能存在另一种场景：你有一个项目（称为
    A）生成了一个 JAR 文件，你希望该文件在 Gradle 缓存中可用，以供其他项目使用。有 Maven 背景的人会很快想起 Maven 提供的 “install/install-file”
    目标（[`https://maven.apache.org/guides/mini/guide-3rd-party-jars-local.html`](https://maven.apache.org/guides/mini/guide-3rd-party-jars-local.html)），它允许你将文件添加到
    Maven 本地缓存。另一方面，Gradle 将其缓存视为真正的缓存，并且不提供任何直接添加 JAR 文件的机制。


    为了用 Gradle 解决这些场景，接下来的小节将讨论三种方案。


    ### 使用文件仓库


    将第三方 JAR 文件添加到文件系统上的一个目录中。你可以配置项目（例如本场景中的项目 A）将生成的构件发布到此目录。需要使用这些 JAR 文件的项目可以将此目录用作文件仓库。


    ### 使用本地 Maven 仓库


    将 JAR 文件发布到你的本地 Maven 仓库，并配置 Gradle 从 Maven 缓存拉取依赖项。使用 Maven 的 Gradle 项目可以使用 `gradle
    install` 命令将其构件发布到本地 Maven 仓库。例如，在 `sample-app` 中运行 `gradle install` 将使 `sample-app.jar`
    文件在本地 Maven 仓库中可用，如图 8-7 所示。


    ![A978-1-4842-1031-4_8_Fig7_HTML.jpg](img/A978-1-4842-1031-4_8_Fig7_HTML.jpg)


    图 8-7.


    本地 Maven 仓库中的示例应用 JAR


    ### 使用中央仓库


    将第三方 JAR 发布到诸如 Nexus 之类的中央仓库。对于由项目 A 等项目产生的 JAR，让 CI 服务器定期构建项目并将其推送到中央仓库。如果这些
    JAR 文件的内容经常变化，那么使用该 JAR 文件的项目需要将依赖项声明为可变的。以下是此类声明的示例：


    `dependencies {`


        `compile group:"com.apress", name:"A",version:"1.0-SNAPSHOT",``changing: true`


    `}`


    默认情况下，Gradle 会将标记为 `changing` 的构件缓存 24 小时。你可以通过配置其解析策略来强制 Gradle 在每次构建时检查更新版本。以下是此类配置的示例：


    `configurations.all {`


         `resolutionStrategy.cacheChangingModulesFor 0, "seconds"`


    `}`


    ## 总结


    在本章中，你回顾了 Gradle 对发布构件的支持。你了解到 `archives` 配置用于声明项目产生的构件。你使用了 `uploadArchives`
    来发布到本地文件仓库。然后，你了解了安装 Nexus Maven 仓库管理器，并使用 `mavenDeployer` 发布到远程 Maven 仓库。你还学习了处理额外构件所需的配置。


    在下一章中，你将回顾持续集成的概念，并探索一个流行的 CI 服务器——Jenkins，以及它对 Gradle 的支持。


    # 9. 持续集成


    持续集成（CI）是一种软件工程实践，其中对源代码的更改每天多次集成到共享的主线中。每次更改都会触发自动构建，编译并测试整个代码库。任何失败都会立即报告，从而及早发现集成问题。持续集成还允许你自动监控代码质量、生成代码覆盖率指标并评估项目的整体健康状况。


    持续集成市场充满了多种开源和商业工具，例如 Hudson、TeamCity、Bamboo 和 Jenkins。本章将探讨 Jenkins 及其对 Gradle
    的支持。

