  raw: '## Summary


    In this chapter, you learned about project and tasks, the two building blocks
    of Gradle builds. You learned that a task can contain one or more actions that
    are defined inside a `doFirst` or `doLast` blocks. It is possible for tasks to
    depend on other tasks and Gradle creates a DAG to ensure that tasks are executed
    in the right order. It also ensures that each task is executed only once. You
    looked at two techniques—`onlyIf` and `enable`—for executing or skipping tasks.
    Finally, you reviewed the three build phases of a Gradle build.


    In the next chapter, you will use Gradle to build Java and web projects. You will
    also learn about Gradle plugins and build a custom plugin.


    # 5. Projects and Plugins


    Gradle provides a standardized project structure for domains such as Java, Scala,
    and Groovy. It takes a build-by-convention approach and provides recommendations
    on where different parts of the project should reside. For example, Gradle suggests
    that all of the Java source code should be placed in the `src/main/java` folder
    and all the test code should reside in the `src/test/java` folder. This standardization
    makes it easy for developers to jump from one project to another. This chapter
    covers Gradle’s build-by-convention features for Java projects.


    Gradle follows a plugin-based architecture that makes it easy to augment and customize
    its functionality. It provides several out-of-the-box plugins that make it easy
    to build Java projects. Additionally, Gradle makes it easy to create custom plugins
    that can be shared with other developers. This chapter reviews the Gradle plugins
    and shows you how to develop a custom plugin that generates build numbers.


    ## Introducing Plugins


    Plugins in Gradle encapsulate reusable build, task, or configuration logic. Using
    plugins, it is possible to add new tasks, new DSL elements, or sensible defaults
    and therefore extend Gradle’s functionality.


    Gradle plugins are grouped into two types—script plugins and binary plugins. Script
    plugins, as the name suggests, are Gradle build scripts that can be included in
    other build scripts. Script plugins provide an easy way to modularize common build
    logic. These script plugins can reside on local file system or can be included
    from remote servers using this syntax:


    `apply from: ''reusable-build.gradle''`


    Script plugins residing on a remote server can be imported using the following
    syntax:


    `apply from: ''http://your_server.com/plugin_path/plugin_name''`


    Binary plugins encapsulate reusable build logic in classes that implement the
    `org.gradle.api.Plugin<T>` interface. These classes are typically bundles into
    JAR files but can also reside inside a build script or inside the project under
    the `buildSrc` folder. Binary plugins can be used inside a build script using
    the following syntax:


    `apply plugin: ''plugin_id''`


    The `plugin_id` is the unique identifier for the given plugin. Gradle-provided
    plugins have the short names such as `java` or `groovy`, while the community plugins
    typically use the fully qualified names such as `org.hibernate.gradle.tools`.


    ## Java Projects


    Gradle comes with several out-of-the-box plugins that simplify Java development.
    This section reviews the `java` plugin used for building JAR artifacts, followed
    by `war` plugin for developing web applications. You will also learn about the
    Javadoc plugin that can be used to generate API documentation.


    ### Using the Java Plugin


    The `Java` plugin allows you to compile Java code, run unit tests, and assemble
    a JAR artifact. To see the plugin in action, start by creating a new Java project
    called `hello-gradle` on your machine. Create a `build.gradle` file and add the
    following code to apply the `Java` plugin:


    `apply plugin: ''java''`


    As discussed in the previous section, this plugin adds a set of tasks and properties
    to the build. You can look at these tasks by running the `gradle tasks` command.
    A portion of the output is shown here:


    `\hello-gradle>gradle tasks`


    `:tasks`


    `Build tasks`


    `-----------`


    `assemble - Assembles the outputs of this project.`


    `build - Assembles and tests this project.`


    `buildDependents - Assembles and tests this project and all projects that depend
    on it.`


    `buildNeeded - Assembles and tests this project and all projects it depends on.`


    `classes - Assembles classes ''main''.`


    `clean - Deletes the build directory.`


    `jar - Assembles a jar archive containing the main classes.`


    `testClasses - Assembles classes ''test''.`


    `Documentation tasks`


    `-------------------`


    `javadoc - Generates Javadoc API documentation for the main source code.`


    `Verification tasks`


    `------------------`


    `check - Runs all checks.`


    `test - Runs the unit tests.`


    Note


    All Gradle commands are executed using a command line/terminal in the folder containing
    the `build.gradle` file.


    The output shows a number of new tasks cleanly grouped by the plugin. The tasks
    such as `assemble` and `jar` under the `Build tasks` group are used for building
    and packaging. Instead of running these tasks individually, you typically run
    the `build` task, which compiles, tests, and assembles the code by triggering
    the `assemble` and `check` tasks. The `javadoc` task under `Documentation tasks`
    is used to generate the Javadoc API documentation. The tasks under the `Verification
    tasks` group run unit tests.


    In addition to these tasks, the `Java` plugin provides some guidance on where
    different parts of Java project’s code should reside. Table [5-1](#A978-1-4842-1031-4_5_Chapter.html#Tab1)
    shows the recommended directories.


    Table 5-1.


    Gradle Recommended Directory Structure for Java


    | Directory | Assets to Put |

    | --- | --- |

    | `src/main/java` | Java source that needs to go to production |

    | `src/main/resources` | Resources such as configuration files (XML) and property
    files that need to go to production |

    | `src/test/java` | Java test source code |

    | `src/test/resources` | Resources used during the testing phase |


    Note


    Experienced Maven users would notice that `Java` plugin’s directory conventions
    match Maven’s recommended Java project structure. It is important to remember
    that these conventions are just recommendations and Gradle makes it easy to change
    them according to your project’s needs.


    Based on these recommendations, let’s create the `src/main/java` folders under
    the `hello-gradle` folder. Create a `HelloGradle.java` class with the contents
    shown in Listing [5-1](#A978-1-4842-1031-4_5_Chapter.html#FPar3).


    Listing 5-1\. HelloGradle Java Code


    `public class HelloGradle {`


    `public static void main(String[] args) {`


    `System.out.println("Hello Gradle!!");`


    `}`


    `}`


    Now you are ready to build the code using the `gradle build` command. The output
    of running the command is shown here:


    `\hello-gradle>gradle build`


    `:compileJava`


    `:processResources UP-TO-DATE`


    `:classes`


    `:jar`


    `:assemble`


    `:compileTestJava UP-TO-DATE`


    `:processTestResources UP-TO-DATE`


    `:testClasses UP-TO-DATE`


    `:test UP-TO-DATE`


    `:check UP-TO-DATE`


    `:build`


    `BUILD SUCCESSFUL`


    `Total time: 4.479 secs`


    Once the build is successful, open the `hello-gradle` folder in Windows Explorer
    and you will see a build folder created with the contents shown in Figure [5-1](#A978-1-4842-1031-4_5_Chapter.html#Fig1).
    The `classes` folder contains the compiled classes and the `libs` folder contains
    the assembled JAR file. The `tmp` folder contains temporary generated files, such
    as a manifest file.


    ![A978-1-4842-1031-4_5_Fig1_HTML.jpg](A978-1-4842-1031-4_5_Fig1_HTML.jpg)'
