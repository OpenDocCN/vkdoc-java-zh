    ### Gradle Task Types


    Earlier in the chapter, you learned that Gradle creates an instance of `org.gradle.api.Task`
    for each task it finds in the build file. By default, these tasks are instances
    of `org.gradle.api.DefaultTask` and thereby inherit `DefaultTask`’s properties
    and methods. Gradle provides several out-of-the-box task types that your tasks
    can extend and thereby receive additional functionality, such as ability to create
    a ZIP archive or execute a Java program. This section reviews some of those out-of-the-box
    task types.


    #### Zip


    The `Zip` task allows you to create ZIP archives from a set of files/directories.
    Here’s an example `Zip` task:


    `task archiveTask (type : Zip) {`


        `archiveName  ''images.zip''`


        `from ''images''`


        `into "$buildDir/dist"`


    `}`


    The `archiveTask` reads files/folders from the `images` directory, creates a ZIP
    file named `images.zip`, and places it in the `build/dist` folder.


    #### Copy


    The `Copy` task allows you to copy files from one or more sources to a destination
    directory. Here’s an example `Copy` task:


    `task copyTask(type : Copy) {`


        `from ''src/config/dev.cert''`


        `from ''src/db''`


        `into ''dist''`


