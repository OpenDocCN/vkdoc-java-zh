    ## Summary


    Groovy is the language of choice when working with Gradle. This chapter covered
    installing Groovy and using the Groovy shell and GroovyConsole. It reviewed the
    basics of Groovy and its supported data types. You learned that Groovy’s GStrings
    allows you to include expressions, thereby making them suitable for templating.
    Finally, you learned about closures—blocks of code/functionality that can be passed
    around.


    In the next chapters, you will take a deep dive into Gradle’s tasks and start
    developing Gradle build scripts.


    # 4. Understanding Gradle Builds


    Central to Gradle are two basic building blocks—projects and tasks. A Gradle build
    is made up of one or more projects and each project contains one or more tasks.
    This chapter reviews those two building blocks. You will review these building
    blocks and learn about the lifecycle phases associated with builds.'
