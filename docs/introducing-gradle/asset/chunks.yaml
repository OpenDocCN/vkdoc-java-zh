- fmt: "### Creating a Groovy Plugin\n\nThis section recreates the Java `HelloPlugin`\
    \ using Groovy language. To start, create a `groovy` folder in the `buildSrc/src/main`\
    \ folder. The resulting folder structure is shown in Figure [5-6](#A978-1-4842-1031-4_5_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1031-4_5_Fig6_HTML.jpg](A978-1-4842-1031-4_5_Fig6_HTML.jpg)\n\n\
    Figure 5-6. The Groovy Plugin Directory Structure\n\nIn the `groovy` folder, create\
    \ the `HelloPlugin2.groovy` file and copy the contents of Listing [5-8](#A978-1-4842-1031-4_5_Chapter.html#FPar12).\n\
    \nListing 5-8. HelloPlugin2 Using Groovy\n\n```\nimport org.gradle.api.Plugin;\n\
    import org.gradle.api.Project;\n\nclass HelloPlugin2 implements Plugin<Project>\
    \ {\n    @Override\n    void apply(Project project) {\n        project.task('greet2')\
    \ << {\n            println 'Hello Gradle Plugin2'\n        }\n    }\n}\n```\n\
    \nThe `HelloPlugin2` implements the `Plugin` interface like Java’s `HelloPlugin`\
    \ class. In the `apply` method, you use the `Project` instance to create a new\
    \ task named `greet2`. You also add an action to the task’s `doLast` method using\
    \ the `<<` shortcut notation. The action closure code prints the text `\"Hello\
    \ Gradle Plugin2\"` to the console.\n\nApply the newly created plugin using this\
    \ statement:\n\n```\napply plugin: HelloPlugin2\n```\n\nRun the `gradle greet2`\
    \ command to use the plugin. The output should be as shown here:\n\n```\n\\hello-gradle>gradle\
    \ greet2\n:buildSrc:compileJava UP-TO-DATE\n:buildSrc:compileGroovy UP-TO-DATE\n\
    :buildSrc:processResources UP-TO-DATE\n:buildSrc:classes UP-TO-DATE\n:buildSrc:jar\
    \ UP-TO-DATE\n:buildSrc:assemble UP-TO-DATE\n:buildSrc:compileTestJava UP-TO-DATE\n\
    :buildSrc:compileTestGroovy UP-TO-DATE\n:buildSrc:processTestResources UP-TO-DATE\n\
    :buildSrc:testClasses UP-TO-DATE\n:buildSrc:test UP-TO-DATE\n:buildSrc:check UP-TO-DATE\n\
    :buildSrc:build UP-TO-DATE\n:greet2\nHello Gradle Plugin2\nBUILD SUCCESSFUL\n\
    Total time: 5.451 secs\n```\n\nIt is also possible to run both `greet` and `greet2`\
    \ tasks using the command `gradle greet greet2`. You should see this output if\
    \ you do so:\n\n```\n:buildSrc:build UP-TO-DATE\n:greet\nHello Gradle Plugin\n\
    :greet2\nHello Gradle Plugin2\n```\n\n### Creating a Stand-Alone Project Plugin\n\
    \nIn the previous section, you built a simple plugin with source code residing\
    \ in the `buildSrc` folder of the project. This approach is not very modular as\
    \ the plugin can’t be reused beyond the project where it is defined. The stand-alone\
    \ project approach allows you to create a plugin that is packaged into a JAR file\
    \ and can be easily distributed and reused by any number of projects. To better\
    \ understand this plugin-development approach, you will create a more realistic\
    \ plugin.\n\n#### Plugin Background\n\nSoftware projects typically have version\
    \ numbers that are expressed using three numbers separated by periods:\n\n```\n\
    <major-version>.<minor-version>.<patch/incremental-version>\n```\n\nAs the naming\
    \ convention suggests, the major versions are generally incremented for major\
    \ feature changes that are usually not backward compatible. Minor versions are\
    \ incremented when implementing minor features or major bug fixes. Finally, the\
    \ patch/incremental versions are incremented for minor bugs, text changes, etc.\
    \ This convention follows the “Semantic Versioning 2.0.0” guidelines described\
    \ at [`http://semver.org/`](http://semver.org/).\n\nDuring development, it is\
    \ possible for development teams to create multiple builds of the same source\
    \ code and deploy them for testing or sharing with other developers. These builds\
    \ will all have the same version number. In order to distinguish these builds\
    \ individually, you typically use another number called the build number. Some\
    \ software teams follow the convention of appending this build number to the version:\n\
    \n```\n<major-version>.<minor-version>.<patch/incremental-version>.<build-number>\n\
    ```\n\nOther teams would simply add the build number to the generated JAR’s manifest\
    \ or display it on the application’s UI. Here are some example versions with build\
    \ number:\n\n- `1.0.0.56`\n- `3.3.9.25BLR48`\n- `6.1.0-20151123154556`\n\nBuild\
    \ numbers can be obtained from a variety of sources—commit numbers from source\
    \ code check-ins or build timestamps or continuous integration (CI) server-generated\
    \ numbers, and so on. In this section, you will create a Gradle plugin that generates\
    \ random build numbers.\n\n#### Plugin Configuration\n\nTo keep things manageable\
    \ for the book, the build number plugin generates two types of values—a numeric\
    \ value based on the timestamp or an alphanumeric value. Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13)\
    \ shows a hypothetical `build.gradle` configuration to use this plugin.\n\nListing\
    \ 5-9. Build Number Plugin Example Usage\n\n```\napply plugin: 'build-number-plugin'\n\
    \nbuildNumber {\n    numberType = 'alphanumeric'\n    alphaNumLength = 5\n}\n\
    ```\n\nThe plugin provides a `buildNumber` configuration block that allows the\
    \ plugin user to set the build number type—alphanumeric or timestamp. The user\
    \ can use the `alphaNumLength` property to dictate the number of characters in\
    \ the generated alpha numeric string.\n\nOnce the plugin is configured, the generated\
    \ build number can be accessed in the `build.gradle` file using `buildNumber.value`.\n\
    \n> **Note:** There are a few open source Gradle plugins available that generate\
    \ build numbers from other sources such as Git/SVN and provide more bells and\
    \ whistles. You can check out one such plugin at [`https://github.com/GeoNet/gradle-build-version-plugin`](https://github.com/GeoNet/gradle-build-version-plugin).\n\
    \n#### Plugin Development\n\nYou’ll begin the plugin development by creating a\
    \ Groovy project. Create a folder called `build-number-plugin` on your file system\
    \ followed by the subfolders shown in Figure [5-7](#A978-1-4842-1031-4_5_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1031-4_5_Fig7_HTML.jpg](A978-1-4842-1031-4_5_Fig7_HTML.jpg)\n\n\
    Figure 5-7. Stand-alone project directory structure\n\nThe next step is to populate\
    \ the `build.gradle` file with dependencies and configuration needed for a plugin\
    \ project. Listing [5-10](#A978-1-4842-1031-4_5_Chapter.html#FPar15) shows the\
    \ contents of the `build.gradle` file.\n\nListing 5-10. The `build.gradle` file\
    \ for the Build Number Plugin\n\n```\napply plugin: 'groovy'\n\ngroup = 'com.apress.gradle'\n\
    version = '1.0.0'\n\ndependencies {\n    compile gradleApi()\n}\n\nuploadArchives\
    \ {\n    repositories {\n      flatDir { dirs \"../repo\" }\n    }\n}\n```\n\n\
    Since you are dealing with a Groovy project, you must begin the `build.gradle`\
    \ file by applying the Groovy plugin. Gradle artifacts are identified using three\
    \ coordinates (more on this in [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html)):\n\
    \n- The group indicating the organization responsible for the project\n- The name\
    \ of the artifact\n- The version of the artifact\n\nIn the `build.gradle` file,\
    \ you use `com.apress.gradle` and `1.0.0` as group and version values. Since you\
    \ didn’t specify the name, Gradle uses the name of the project folder as the artifact\
    \ name. The `dependencies` section of the file is used to provide Gradle the external\
    \ libraries and frameworks the plugin project requires for compilation and testing\
    \ purposes. In this case, you use the `gradleApi()` to pull in Gradle API used\
    \ by custom plugin and task classes.\n\n> **Note:** In the next chapter, you will\
    \ be taking a deeper dive into dependency management and Gradle’s support for\
    \ pulling in external dependencies.\n\nFinally, you use the `uploadArchives` method\
    \ to upload or publish the generated plugin to a repository. The `flatDir` method\
    \ is configured to publish the packaged plugin to a `repo` folder that exists\
    \ at the same level as `build-number-plugin` (the project) on the file system.\n\
    \n> **Note:** Generated artifacts can be shared with other developers/teams by\
    \ publishing to central/common artifact repositories. [Chapter 8](#A978-1-4842-1031-4_8_Chapter.html)\
    \ deals with artifact publishing in detail."
  raw: '### Creating a Groovy Plugin


    This section recreates the Java `HelloPlugin` using Groovy language. To start,
    create a `groovy` folder in the `buildSrc/src/main` folder. The resulting folder
    structure is shown in Figure [5-6](#A978-1-4842-1031-4_5_Chapter.html#Fig6).


    ![A978-1-4842-1031-4_5_Fig6_HTML.jpg](A978-1-4842-1031-4_5_Fig6_HTML.jpg)


    Figure 5-6.


    The Groovy Plugin Directory Structure


    In the `groovy` folder, create the `HelloPlugin2.groovy` file and copy the contents
    of Listing [5-8](#A978-1-4842-1031-4_5_Chapter.html#FPar12).


    Listing 5-8\. HelloPlugin2 Using Groovy


    `import org.gradle.api.Plugin;`


    `import org.gradle.api.Project;`


    `class HelloPlugin2 implements Plugin<Project> {`


    `@Override`


        `void apply(Project project) {`


            `project.task(''greet2'') << {`


                `println ''Hello Gradle Plugin2''`


            `}`


        `}`


    `}`


    The `HelloPlugin2` implements the `Plugin` interface like Java’s `HelloPlugin`
    class. In the `apply` method, you use the `Project` instance to create a new task
    named `greet2`. You also add an action to the task’s `doLast` method using the
    `<<` shortcut notation. The action closure code prints the text `"Hello Gradle
    Plugin2"` to the console.


    Apply the newly created plugin using this statement:


    `apply plugin: HelloPlugin2`


    Run the `gradle greet2` command to use the plugin. The output should be as shown
    here:


    `\hello-gradle>gradle greet2`


    `:buildSrc:compileJava UP-TO-DATE`


    `:buildSrc:compileGroovy UP-TO-DATE`


    `:buildSrc:processResources UP-TO-DATE`


    `:buildSrc:classes UP-TO-DATE`


    `:buildSrc:jar UP-TO-DATE`


    `:buildSrc:assemble UP-TO-DATE`


    `:buildSrc:compileTestJava UP-TO-DATE`


    `:buildSrc:compileTestGroovy UP-TO-DATE`


    `:buildSrc:processTestResources UP-TO-DATE`


    `:buildSrc:testClasses UP-TO-DATE`


    `:buildSrc:test UP-TO-DATE`


    `:buildSrc:check UP-TO-DATE`


    `:buildSrc:build UP-TO-DATE`


    `:greet2`


    `Hello Gradle Plugin2`


    `BUILD SUCCESSFUL`


    `Total time: 5.451 secs`


    It is also possible to run both `greet` and `greet 2` tasks using the command
    `gradle greet greet2`. You should see this output if you do so:


    `:buildSrc:build UP-TO-DATE`


    `:greet`


    `Hello Gradle Plugin`


    `:greet2`


    `Hello Gradle Plugin2`


    ### Creating a Stand-Alone Project Plugin


    In the previous section, you built a simple plugin with source code residing in
    the `buildSrc` folder of the project. This approach is not very modular as the
    plugin can’t be reused beyond the project where it is defined. The stand-alone
    project approach allows you to create a plugin that is packaged into a JAR file
    and can be easily distributed and reused by any number of projects. To better
    understand this plugin-development approach, you will create a more realistic
    plugin.


    #### Plugin Background


    Software projects typically have version numbers that are expressed using three
    numbers separated by periods:


    `<major-version>.<minor-version>.<patch/incremental-version>`


    As the naming convention suggests, the major versions are generally incremented
    for major feature changes that are usually not backward compatible. Minor versions
    are incremented when implementing minor features or major bug fixes. Finally,
    the patch/incremental versions are incremented for minor bugs, text changes, etc.
    This convention follows the “Semantic Versioning 2.0.0” guidelines described at
    [`http://semver.org/`](http://semver.org/) .


    During development, it is possible for development teams to create multiple builds
    of the same source code and deploy them for testing or sharing with other developers.
    These builds will all have the same version number. In order to distinguish these
    builds individually, you typically use another number called the build number.
    Some software teams follow the convention of appending this build number to the
    version:


    `<major-version>.<minor-version>.<patch/incremental-version> .<build-number>`


    Other teams would simply add the build number to the generated JAR’s manifest
    or display it on the application’s UI. Here are some example versions with build
    number:


    *   1.0.0.56

    *   3.3.9.25BLR48

    *   6.1.0-20151123154556


    Build numbers can be obtained from a variety of sources—commit numbers from source
    code check-ins or build timestamps or continuous integration (CI) server-generated
    numbers, and so on. In this section, you will create a Gradle plugin that generates
    random build numbers.


    #### Plugin Configuration


    To keep things manageable for the book, the build number plugin generates two
    types of values—a numeric value based on the timestamp or an alphanumeric value.
    Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13) shows a hypothetical
    `build.gradle` configuration to use this plugin.


    Listing 5-9\. Build Number Plugin Example Usage


    `apply plugin: ''build-number-plugin''`


    `buildNumber {`


        `numberType = ''alphanumeric''`


        `alphaNumLength = 5`


    `}`


    The plugin provides a `buildNumber` configuration block that allows the plugin
    user to set the build number type—alphanumeric or timestamp. The user can use
    the `alphaNumLength` property to dictate the number of characters in the generated
    alpha numeric string.


    Once the plugin is configured, the generated build number can be accessed in the
    `build.gradle` file using `buildNumber.value`.


    Note


    There are a few open source Gradle plugins available that generate build numbers
    from other sources such as Git/SVN and provide more bells and whistles. You can
    check out one such plugin at [`https://github.com/GeoNet/gradle-build-version-plugin`](https://github.com/GeoNet/gradle-build-version-plugin)
    .


    #### Plugin Development


    You’ll begin the plugin development by creating a Groovy project. Create a folder
    called `build-number-plugin` on your file system followed by the subfolders shown
    in Figure [5-7](#A978-1-4842-1031-4_5_Chapter.html#Fig7).


    ![A978-1-4842-1031-4_5_Fig7_HTML.jpg](A978-1-4842-1031-4_5_Fig7_HTML.jpg)


    Figure 5-7.


    Stand-alone project directory structure


    The next step is to populate the `build.gradle` file with dependencies and configuration
    needed for a plugin project. Listing [5-10](#A978-1-4842-1031-4_5_Chapter.html#FPar15)
    shows the contents of the `build.gradle` file.


    Listing 5-10\. The build.gradle file for the Build Number Plugin


    `apply plugin: ''groovy''`


    `group = ''com.apress.gradle''`


    `version = ''1.0.0''`


    `dependencies {`


        `compile gradleApi()`


    `}`


    `uploadArchives {`


        `repositories {`


          `flatDir { dirs "../repo" }`


        `}`


    `}`


    Since you are dealing with a Groovy project, you must begin the `build.gradle`
    file by applying the Groovy plugin. Gradle artifacts are identified using three
    coordinates (more on this in [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html)):


    *   The group indicating the organization responsible for the project

    *   The name of the artifact

    *   The version of the artifact


    In the `build.gradle` file, you use `com.apress.gradle` and 1.0.0 as group and
    version values. Since you didn’t specify the name, Gradle uses the name of the
    project folder as the artifact name. The `dependencies` section of the file is
    used to provide Gradle the external libraries and frameworks the plugin project
    requires for compilation and testing purposes. In this case, you use the `gradleApi()`
    to pull in Gradle API used by custom plugin and task classes.


    Note


    In next the chapter, you will be taking a deeper dive into dependency management
    and Gradle’s support for pulling in external dependencies


    Finally, you use the `uploadArchives` method to upload or publish the generated
    plugin to a repository. The `flatDir` method is configured to publish the packaged
    plugin to a `repo` folder that exists at the same level as build-number-plugin
    (the project) on the file system.


    Note


    Generated artifacts can be shared with other developers/teams by publishing to
    central/common artifact repositories. [Chapter 8](#A978-1-4842-1031-4_8_Chapter.html)
    deals with artifact publishing in detail.'
  trans: '

    ### 创建 Groovy 插件


    本节将使用 Groovy 语言重新创建 Java 的 `HelloPlugin`。首先，在 `buildSrc/src/main` 文件夹中创建一个 `groovy`
    文件夹。最终的文件夹结构如图 5-6 所示。


    ![A978-1-4842-1031-4_5_Fig6_HTML.jpg](img/A978-1-4842-1031-4_5_Fig6_HTML.jpg)


    图 5-6.


    Groovy 插件目录结构


    在 `groovy` 文件夹中，创建 `HelloPlugin2.groovy` 文件，并复制清单 5-8 的内容。


    清单 5-8\. 使用 Groovy 的 HelloPlugin2


    `import org.gradle.api.Plugin;`


    `import org.gradle.api.Project;`


    `class HelloPlugin2 implements Plugin<Project> {`


    `@Override`


        `void apply(Project project) {`


            `project.task(''greet2'') << {`


                `println ''Hello Gradle Plugin2''`


            `}`


        `}`


    `}`


    `HelloPlugin2` 实现了 `Plugin` 接口，就像 Java 的 `HelloPlugin` 类一样。在 `apply` 方法中，你使用 `Project`
    实例创建了一个名为 `greet2` 的新任务。你还使用 `<<` 快捷方式为任务的 `doLast` 方法添加了一个操作。该操作闭包代码将文本 `"Hello
    Gradle Plugin2"` 打印到控制台。


    使用以下语句应用新创建的插件：


    `apply plugin: HelloPlugin2`


    运行 `gradle greet2` 命令来使用该插件。输出应如下所示：


    `\hello-gradle>gradle greet2`


    `:buildSrc:compileJava UP-TO-DATE`


    `:buildSrc:compileGroovy UP-TO-DATE`


    `:buildSrc:processResources UP-TO-DATE`


    `:buildSrc:classes UP-TO-DATE`


    `:buildSrc:jar UP-TO-DATE`


    `:buildSrc:assemble UP-TO-DATE`


    `:buildSrc:compileTestJava UP-TO-DATE`


    `:buildSrc:compileTestGroovy UP-TO-DATE`


    `:buildSrc:processTestResources UP-TO-DATE`


    `:buildSrc:testClasses UP-TO-DATE`


    `:buildSrc:test UP-TO-DATE`


    `:buildSrc:check UP-TO-DATE`


    `:buildSrc:build UP-TO-DATE`


    `:greet2`


    `Hello Gradle Plugin2`


    `BUILD SUCCESSFUL`


    `Total time: 5.451 secs`


    也可以使用命令 `gradle greet greet2` 同时运行 `greet` 和 `greet2` 任务。如果这样做，你应该会看到以下输出：


    `:buildSrc:build UP-TO-DATE`


    `:greet`


    `Hello Gradle Plugin`


    `:greet2`


    `Hello Gradle Plugin2`


    ### 创建独立项目插件


    在上一节中，你构建了一个简单的插件，其源代码位于项目的 `buildSrc` 文件夹中。这种方法不太模块化，因为该插件无法在其定义的项目之外重用。独立项目方法允许你创建一个打包成
    JAR 文件的插件，并且可以轻松地被任意数量的项目分发和重用。为了更好地理解这种插件开发方法，你将创建一个更真实的插件。


    #### 插件背景


    软件项目通常使用由句点分隔的三个数字来表示版本号：


    `<主版本号>.<次版本号>.<补丁/增量版本号>`


    正如命名约定所暗示的，主版本号通常在进行重大功能变更（通常不向后兼容）时递增。次版本号在实现次要功能或重大错误修复时递增。最后，补丁/增量版本号针对小错误、文本更改等进行递增。此约定遵循
    [`http://semver.org/`](http://semver.org/) 上描述的“语义化版本 2.0.0”指南。


    在开发过程中，开发团队可能会为同一源代码创建多个构建，并将其部署用于测试或与其他开发人员共享。这些构建都将具有相同的版本号。为了单独区分这些构建，你通常会使用另一个称为构建编号的数字。一些软件团队遵循将构建编号附加到版本号的约定：


    `<主版本号>.<次版本号>.<补丁/增量版本号>.<构建编号>`


    其他团队则简单地将构建编号添加到生成的 JAR 清单中，或显示在应用程序的 UI 上。以下是一些带有构建编号的示例版本：


    *   1.0.0.56

    *   3.3.9.25BLR48

    *   6.1.0-20151123154556


    构建编号可以从多种来源获得——来自源代码签入的提交编号、构建时间戳或持续集成（CI）服务器生成的编号等。在本节中，你将创建一个生成随机构建编号的 Gradle
    插件。


    #### 插件配置


    为了便于本书管理，构建编号插件生成两种类型的值——基于时间戳的数值或字母数字值。清单 5-9 显示了一个假设的 `build.gradle` 配置来使用此插件。


    清单 5-9\. 构建编号插件示例用法


    `apply plugin: ''build-number-plugin''`


    `buildNumber {`


        `numberType = ''alphanumeric''`


        `alphaNumLength = 5`


    `}`


    该插件提供了一个 `buildNumber` 配置块，允许插件用户设置构建编号类型——字母数字或时间戳。用户可以使用 `alphaNumLength` 属性来指定生成的字母数字字符串中的字符数。


    配置插件后，可以在 `build.gradle` 文件中使用 `buildNumber.value` 访问生成的构建编号。


    注意


    有一些可用的开源 Gradle 插件可以从其他来源（如 Git/SVN）生成构建编号，并提供更多功能。你可以在 [`https://github.com/GeoNet/gradle-build-version-plugin`](https://github.com/GeoNet/gradle-build-version-plugin)
    查看这样一个插件。


    #### 插件开发


    你将通过创建一个 Groovy 项目来开始插件开发。在你的文件系统上创建一个名为 `build-number-plugin` 的文件夹，然后创建图 5-7
    所示的子文件夹。


    ![A978-1-4842-1031-4_5_Fig7_HTML.jpg](img/A978-1-4842-1031-4_5_Fig7_HTML.jpg)


    图 5-7.


    独立项目目录结构


    下一步是使用插件项目所需的依赖项和配置填充 `build.gradle` 文件。清单 5-10 显示了 `build.gradle` 文件的内容。


    清单 5-10\. 构建编号插件的 build.gradle 文件


    `apply plugin: ''groovy''`


    `group = ''com.apress.gradle''`


    `version = ''1.0.0''`


    `dependencies {`


        `compile gradleApi()`


    `}`


    `uploadArchives {`


        `repositories {`


          `flatDir { dirs "../repo" }`


        `}`


    `}`


    由于你正在处理一个 Groovy 项目，因此必须通过应用 Groovy 插件来开始 `build.gradle` 文件。Gradle 工件使用三个坐标来标识（更多内容请参见第
    6 章）：


    *   表示负责该项目的组织的 group

    *   工件的名称

    *   工件的版本


    在 `build.gradle` 文件中，你使用 `com.apress.gradle` 和 `1.0.0` 作为 group 和 version 值。由于你没有指定名称，Gradle
    将项目文件夹的名称用作工件名称。文件的 `dependencies` 部分用于为 Gradle 提供插件项目编译和测试所需的外部库和框架。在这种情况下，你使用
    `gradleApi()` 来引入自定义插件和任务类使用的 Gradle API。


    注意


    在下一章中，你将更深入地了解依赖管理以及 Gradle 对引入外部依赖项的支持。


    最后，你使用 `uploadArchives` 方法将生成的插件上传或发布到仓库。`flatDir` 方法被配置为将打包好的插件发布到 `repo` 文件夹，该文件夹在文件系统上与
    `build-number-plugin`（项目）位于同一层级。


    注意


    生成的工件可以通过发布到中央/公共工件仓库来与其他开发人员/团队共享。第 8 章 将详细讨论工件发布。

