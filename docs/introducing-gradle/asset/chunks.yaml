    GitHub project URL   Under the Source Code Management section, select the Git
    option. Under the Repository URL, enter the HTTPS URL to clone the GitHub repository,
    as shown in Figure [9-11](#A978-1-4842-1031-4_9_Chapter.html#Fig11).


    ![A978-1-4842-1031-4_9_Fig11_HTML.jpg](A978-1-4842-1031-4_9_Fig11_HTML.jpg)


    Figure 9-11.


    Source Repository configuration   You can obtain the clone URL to be entered on
    the GitHub repository page’s vertical navigation (see Figure [9-12](#A978-1-4842-1031-4_9_Chapter.html#Fig12)).
    Make sure that the HTTPS option is selected before copying the URL.


    ![A978-1-4842-1031-4_9_Fig12_HTML.jpg](A978-1-4842-1031-4_9_Fig12_HTML.jpg)


    Figure 9-12.


    Clone URL to GitHub   Click the Add button next to the credentials. In the Add
    Credentials dialog box, enter your GitHub account’s username and password, as
    shown in Figure [9-13](#A978-1-4842-1031-4_9_Chapter.html#Fig13). Click Add.


    ![A978-1-4842-1031-4_9_Fig13_HTML.jpg](A978-1-4842-1031-4_9_Fig13_HTML.jpg)


    Figure 9-13.


    GitHub Repo credentials   In the Build Triggers section, select the Poll SCM option.
    The schedule field takes a UNIX cron expression value. In Figure [9-14](#A978-1-4842-1031-4_9_Chapter.html#Fig14),
    `H/15 * * * *` has been entered, indicating that VCS should be polled every 15
    minutes.


    ![A978-1-4842-1031-4_9_Fig14_HTML.jpg](A978-1-4842-1031-4_9_Fig14_HTML.jpg)


    Figure 9-14.


    The Build Triggers configuration   Under the Build section, click the Add Build
    Step drop-down and choose Invoke Gradle Script (see Figure [9-15](#A978-1-4842-1031-4_9_Chapter.html#Fig15)).


    ![A978-1-4842-1031-4_9_Fig15_HTML.jpg](A978-1-4842-1031-4_9_Fig15_HTML.jpg)


    Figure 9-15.


    Adding the build step   Under the Invoke Gradle script section, select Invoke
    Gradle and, from the drop-down, select the Local Gradle option you configured
    in the preceding section (refer to Figure [9-8](#A978-1-4842-1031-4_9_Chapter.html#Fig8)).
    Enter clean build in the Tasks textbox (see Figure [9-16](#A978-1-4842-1031-4_9_Chapter.html#Fig16)).


    ![A978-1-4842-1031-4_9_Fig16_HTML.jpg](A978-1-4842-1031-4_9_Fig16_HTML.jpg)


    Figure 9-16.


    Invoke the Gradle script configuration   Click Save and you will be taken to the
    `intro-gradle-app` project page shown in Figure [9-17](#A978-1-4842-1031-4_9_Chapter.html#Fig17).
    From this page, you can trigger manual builds or change the job configuration.


    ![A978-1-4842-1031-4_9_Fig17_HTML.jpg](A978-1-4842-1031-4_9_Fig17_HTML.jpg)


    Figure 9-17.


    The intro-gradle-app project page


    ### Running the Build Job


    The build job you configured in the previous section polls the repository for
    changes every 15 minutes. Additionally, you can use the project’s page to trigger
    a manual build anytime. From Jenkins dashboard, click the `intro-gradle-app` project
    link (see Figure [9-18](#A978-1-4842-1031-4_9_Chapter.html#Fig18)).


    ![A978-1-4842-1031-4_9_Fig18_HTML.jpg](A978-1-4842-1031-4_9_Fig18_HTML.jpg)


    Figure 9-18.


    Project list on dashboard


    On the ensuing project page, click the Build Now link on the left vertical navigation.
    This schedules a new build. Click on the build number and then click on Console
    Output, as shown in Figure [9-19](#A978-1-4842-1031-4_9_Chapter.html#Fig19).


    ![A978-1-4842-1031-4_9_Fig19_HTML.jpg](A978-1-4842-1031-4_9_Fig19_HTML.jpg)


    Figure 9-19.


    Viewing the console output


    You should see the output of the execution, similar to Figure [9-20](#A978-1-4842-1031-4_9_Chapter.html#Fig20).


    ![A978-1-4842-1031-4_9_Fig20_HTML.jpg](A978-1-4842-1031-4_9_Fig20_HTML.jpg)


    Figure 9-20.


    Job execution output


    ## Archiving Artifacts


    In the previous section, you ran a Jenkins build job to build the project and
    the `generate ig-app.jar` file. In this section, you will configure Jenkins to
    store those generated artifacts for later use.


    From the Jenkins dashboard, navigate to the `intro-gradle-app` project page and
    click the Configure link on the left vertical navigation. Scroll to the bottom
    of the Configure page, click the Add `post-build-action` drop-down, and select
    the Archive the Artifacts option (see Figure [9-21](#A978-1-4842-1031-4_9_Chapter.html#Fig21)).


    ![A978-1-4842-1031-4_9_Fig21_HTML.jpg](A978-1-4842-1031-4_9_Fig21_HTML.jpg)


    Figure 9-21.


    Archive the artifacts post-build action


    In the Files to Archive textbox, enter the value `build/**/*.jar` to archive all
    generated JAR files (see Figure [9-22](#A978-1-4842-1031-4_9_Chapter.html#Fig22)).


    ![A978-1-4842-1031-4_9_Fig22_HTML.jpg](A978-1-4842-1031-4_9_Fig22_HTML.jpg)


    Figure 9-22.


    Files to archive configuration


    Save the configuration changes and trigger a manual build by clicking the Build
    Now button. Once the build is complete, the generated artifact should be available
    on the project dashboard, as shown in Figure [9-23](#A978-1-4842-1031-4_9_Chapter.html#Fig23).


    ![A978-1-4842-1031-4_9_Fig23_HTML.jpg](A978-1-4842-1031-4_9_Fig23_HTML.jpg)


    Figure 9-23.


    ig-app.jar artifact on project dashboard


    ## Publishing Test Results


    The Java plugin’s `test` task runs unit tests and generates reports in HTML, XML,
    and binary formats. These reports display the number of tests run and helps you
    drill down to identify failed tests. By default the HTML reports are stored in
    the `build/reports` folder, while the XML/binary results are stored in the `build/test-results`
    folder.


    The `ig-app` contains a JUnit test named `HelloWorldTest` in `src/test/java`.
    This unit test tests the functionality of the simple `HelloWorld` Java code. In
    this section, you will configure Jenkins to surface the generated reports on the
    project home page.


    JUnit results in Jenkins are published through a post-build action. Navigate to
    the `intro-gradle-app`’s configure page and select Publish JUnit Test Result Report
    (see Figure [9-24](#A978-1-4842-1031-4_9_Chapter.html#Fig24)).


    ![A978-1-4842-1031-4_9_Fig24_HTML.jpg](A978-1-4842-1031-4_9_Fig24_HTML.jpg)


    Figure 9-24.


    Test result post-build action


    Enter the value `build/test-results/*.xml` in the Test Report XMLs textbox (Figure
    [9-25](#A978-1-4842-1031-4_9_Chapter.html#Fig25)) and click Save button to save
    your changes.


    ![A978-1-4842-1031-4_9_Fig25_HTML.jpg](A978-1-4842-1031-4_9_Fig25_HTML.jpg)


    Figure 9-25.


    XML test report location config


    Trigger a new build. Upon successful completion, you should see the Latest Test
    Results link on the projects home page, as shown in Figure [9-26](#A978-1-4842-1031-4_9_Chapter.html#Fig26).
    Click the link and you should see test run details.


    ![A978-1-4842-1031-4_9_Fig26_HTML.jpg](A978-1-4842-1031-4_9_Fig26_HTML.jpg)


    Figure 9-26.


    Test results on the project home page'
  trans: '

    ### 创建构建任务


    Jenkins 中的任务代表构建过程中的任务或步骤。例如，一个构建任务可以下载源代码、编译并执行测试。在本节中，您将创建一个执行示例应用的 Gradle 构建脚本的构建任务。要创建新任务，请按照以下步骤操作：


    导航至 Jenkins 仪表盘 `http://localhost:8080`，然后点击 **New Item** 链接。在 **New Item** 界面上，输入名称
    `intro-gradle-app`，并选择 **Freestyle Project**，如图 9-9 所示。我们选择 **Freestyle Project**
    选项，因为它提供了极大的灵活性，并且可以与任何 SCM 和构建系统配合使用。点击 **OK** 按钮。


    ![A978-1-4842-1031-4_9_Fig9_HTML.jpg](img/A978-1-4842-1031-4_9_Fig9_HTML.jpg)


    图 9-9.


    新建任务界面   在下一个界面上，输入包含已 fork 示例项目的 GitHub 仓库 URL（见图 9-10）。


    ![A978-1-4842-1031-4_9_Fig10_HTML.jpg](img/A978-1-4842-1031-4_9_Fig10_HTML.jpg)


    图 9-10.


    GitHub 项目 URL   在 **Source Code Management** 部分下，选择 **Git** 选项。在 **Repository
    URL** 下，输入用于克隆 GitHub 仓库的 HTTPS URL，如图 9-11 所示。


    ![A978-1-4842-1031-4_9_Fig11_HTML.jpg](img/A978-1-4842-1031-4_9_Fig11_HTML.jpg)


    图 9-11.


    源代码仓库配置   您可以在 GitHub 仓库页面的垂直导航栏上获取要输入的克隆 URL（见图 9-12）。在复制 URL 之前，请确保已选择 **HTTPS**
    选项。


    ![A978-1-4842-1031-4_9_Fig12_HTML.jpg](img/A978-1-4842-1031-4_9_Fig12_HTML.jpg)


    图 9-12.


    克隆 GitHub 的 URL   点击凭据旁边的 **Add** 按钮。在 **Add Credentials** 对话框中，输入您的 GitHub 账户用户名和密码，如图
    9-13 所示。点击 **Add**。


    ![A978-1-4842-1031-4_9_Fig13_HTML.jpg](img/A978-1-4842-1031-4_9_Fig13_HTML.jpg)


    图 9-13.


    GitHub 仓库凭据   在 **Build Triggers** 部分，选择 **Poll SCM** 选项。调度字段接受 UNIX cron 表达式值。在图
    9-14 中，已输入 `H/15 * * * *`，表示应每 15 分钟轮询一次 VCS。


    ![A978-1-4842-1031-4_9_Fig14_HTML.jpg](img/A978-1-4842-1031-4_9_Fig14_HTML.jpg)


    图 9-14.


    构建触发器配置   在 **Build** 部分下，点击 **Add Build Step** 下拉菜单，并选择 **Invoke Gradle Script**（见图
    9-15）。


    ![A978-1-4842-1031-4_9_Fig15_HTML.jpg](img/A978-1-4842-1031-4_9_Fig15_HTML.jpg)


    图 9-15.


    添加构建步骤   在 **Invoke Gradle script** 部分下，选择 **Invoke Gradle**，然后从下拉菜单中选择您在前一节中配置的
    **Local Gradle** 选项（参见图 9-8）。在 **Tasks** 文本框中输入 `clean build`（见图 9-16）。


    ![A978-1-4842-1031-4_9_Fig16_HTML.jpg](img/A978-1-4842-1031-4_9_Fig16_HTML.jpg)


    图 9-16.


    调用 Gradle 脚本配置   点击 **Save**，您将被带到 `intro-gradle-app` 项目页面，如图 9-17 所示。在此页面上，您可以触发手动构建或更改任务配置。


    ![A978-1-4842-1031-4_9_Fig17_HTML.jpg](img/A978-1-4842-1031-4_9_Fig17_HTML.jpg)


    图 9-17.


    intro-gradle-app 项目页面


    ### 运行构建任务


    您在前一节中配置的构建任务每 15 分钟轮询一次仓库以获取更改。此外，您还可以随时使用项目页面触发手动构建。从 Jenkins 仪表盘，点击 `intro-gradle-app`
    项目链接（见图 9-18）。


    ![A978-1-4842-1031-4_9_Fig18_HTML.jpg](img/A978-1-4842-1031-4_9_Fig18_HTML.jpg)


    图 9-18.


    仪表盘上的项目列表


    在随后的项目页面上，点击左侧垂直导航栏中的 **Build Now** 链接。这将调度一个新的构建。点击构建编号，然后点击 **Console Output**，如图
    9-19 所示。


    ![A978-1-4842-1031-4_9_Fig19_HTML.jpg](img/A978-1-4842-1031-4_9_Fig19_HTML.jpg)


    图 9-19.


    查看控制台输出


    您应该会看到执行的输出，类似于图 9-20。


    ![A978-1-4842-1031-4_9_Fig20_HTML.jpg](img/A978-1-4842-1031-4_9_Fig20_HTML.jpg)


    图 9-20.


    任务执行输出


    ## 归档构建产物


    在前一节中，您运行了一个 Jenkins 构建任务来构建项目并生成 `ig-app.jar` 文件。在本节中，您将配置 Jenkins 以存储这些生成的构建产物供以后使用。


    从 Jenkins 仪表盘，导航至 `intro-gradle-app` 项目页面，然后点击左侧垂直导航栏中的 **Configure** 链接。滚动到 **Configure**
    页面底部，点击 **Add post-build-action** 下拉菜单，并选择 **Archive the Artifacts** 选项（见图 9-21）。


    ![A978-1-4842-1031-4_9_Fig21_HTML.jpg](img/A978-1-4842-1031-4_9_Fig21_HTML.jpg)


    图 9-21.


    归档构建产物的构建后操作


    在 **Files to Archive** 文本框中，输入值 `build/**/*.jar` 以归档所有生成的 JAR 文件（见图 9-22）。


    ![A978-1-4842-1031-4_9_Fig22_HTML.jpg](img/A978-1-4842-1031-4_9_Fig22_HTML.jpg)


    图 9-22.


    要归档的文件配置


    保存配置更改，并通过点击 **Build Now** 按钮触发手动构建。构建完成后，生成的构建产物应可在项目仪表盘上看到，如图 9-23 所示。


    ![A978-1-4842-1031-4_9_Fig23_HTML.jpg](img/A978-1-4842-1031-4_9_Fig23_HTML.jpg)


    图 9-23.


    项目仪表盘上的 ig-app.jar 构建产物


    ## 发布测试结果


    Java 插件的 `test` 任务运行单元测试，并生成 HTML、XML 和二进制格式的报告。这些报告显示运行的测试数量，并帮助您深入分析以识别失败的测试。默认情况下，HTML
    报告存储在 `build/reports` 文件夹中，而 XML/二进制结果存储在 `build/test-results` 文件夹中。


    `ig-app` 在 `src/test/java` 中包含一个名为 `HelloWorldTest` 的 JUnit 测试。此单元测试测试了简单的 `HelloWorld`
    Java 代码的功能。在本节中，您将配置 Jenkins 以在项目主页上显示生成的报告。


    Jenkins 中的 JUnit 结果通过构建后操作发布。导航至 `intro-gradle-app` 的配置页面，并选择 **Publish JUnit
    Test Result Report**（见图 9-24）。


    ![A978-1-4842-1031-4_9_Fig24_HTML.jpg](img/A978-1-4842-1031-4_9_Fig24_HTML.jpg)


    图 9-24.


    测试结果构建后操作


    在 **Test Report XMLs** 文本框中输入值 `build/test-results/*.xml`（图 9-25），然后点击 **Save**
    按钮保存更改。


    ![A978-1-4842-1031-4_9_Fig25_HTML.jpg](img/A978-1-4842-1031-4_9_Fig25_HTML.jpg)


    图 9-25.


    XML 测试报告位置配置


    触发一个新的构建。成功完成后，您应该会在项目主页上看到 **Latest Test Results** 链接，如图 9-26 所示。点击该链接，您应该会看到测试运行的详细信息。


    ![A978-1-4842-1031-4_9_Fig26_HTML.jpg](img/A978-1-4842-1031-4_9_Fig26_HTML.jpg)


    图 9-26.


    项目主页上的测试结果

