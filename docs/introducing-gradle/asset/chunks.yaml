- fmt: "# Multi-Project vs. Single-Project Builds\n\nThe root project’s `build.gradle`\
    \ file can be used to trigger a full build of all projects. However, it is possible\
    \ for the subprojects to contain an optional `build.gradle` file. Gradle allows\
    \ you to execute stand-alone builds on any of these subprojects. In that scenario,\
    \ only the subproject and any dependent projects are built.\n\nSo how would Gradle\
    \ know if a build is a single-project build or part of a larger multi-project\
    \ build? To make this determination, Gradle looks for the `settings.gradle` file\
    \ using the following algorithm:\n\n- Look for the `settings.gradle` in the current\
    \ directory.\n- If `settings.gradle` is not found, look for it under a `master`\
    \ directory that is at the same level of nesting as the current directory.\n-\
    \ If `settings.gradle` is not found, look for it under any parent directories.\n\
    \nUpon finding a `settings.gradle` file, a check is made to determine if the current\
    \ project is defined as part of a multi-project using the `include` or `includeFlat`\
    \ methods. If the condition is met, the build is executed as a multi-project build.\
    \ Otherwise, the project is executed as a single-project build.\n\n## Project\
    \ Configuration\n\nThe subprojects in a multi-project often contain common configuration,\
    \ tasks, and plugins that can be moved to the root project’s `build.gradle` file.\
    \ For example, all projects would share the same group and version number attributes.\
    \ Gradle provides an `allprojects` closure block that allows you to define such\
    \ common attributes/behavior shared by root project as well as subprojects. Listing\
    \ [7-1](#A978-1-4842-1031-4_7_Chapter.html#FPar1) shows an `allprojects` block\
    \ with group and version attributes declared.\n\n**Listing 7-1.** The `allprojects`\
    \ Block in `build.gradle`\n\n```\nallprojects {\n    group = \"com.apress.gradle\"\
    \n    version = \"1.0.0-SNAPSHOT\"\n}\n```\n\nSimilarly, if all subprojects are\
    \ Java projects, they would all have the `java` plugin applied to them. They would\
    \ also share common repositories and possibly share few dependencies as well.\
    \ To define such behavior specific to all subprojects, Gradle provides a `subprojects`\
    \ closure block. Listing [7-2](#A978-1-4842-1031-4_7_Chapter.html#FPar2) shows\
    \ a `subprojects` block containing the `java` plugin and the `mavenCentral()`\
    \ repository declaration.\n\n**Listing 7-2.** The `subprojects` Closure Block\
    \ in `build.gradle`\n\n```\nsubprojects {\n     apply plugin: 'java'\n     repositories\
    \ {\n          mavenCentral()\n     }\n}\n```\n\n> **Note:** The `allprojects`\
    \ block should be used to declare attributes/configuration/tasks that apply to\
    \ all projects. IDE plugins are good examples of plugins that can be declared\
    \ inside the `allprojects` section.\n\nIt is also possible to configure behavior\
    \ specific to a single subproject in the root project’s `build.gradle` file. For\
    \ example, you need to apply the `war` plugin to the `web` project. You can add\
    \ this project-specific behavior using the `project()` method and then pass in\
    \ the project name you want to configure as its parameter. Listing [7-3](#A978-1-4842-1031-4_7_Chapter.html#FPar4)\
    \ shows the configuration to apply a `war` plugin to the `web` project.\n\n**Listing\
    \ 7-3.** Project-Specific Behavior\n\n```\nproject(':web') {\n     apply plugin:\
    \ 'war'\n}\n```\n\nYou apply the concepts discussed so far in this section to\
    \ create an `intro-root`’s `build.gradle` file shown in Listing [7-4](#A978-1-4842-1031-4_7_Chapter.html#FPar5).\
    \ It uses the `allprojects` block to ensure that root and subprojects share the\
    \ same group and version numbers. The code also uses the `subprojects` block to\
    \ ensure that all the subprojects get their dependencies from Maven Central. The\
    \ individual `project` blocks apply the `java` plugin to the `service` and `repository`\
    \ projects and apply the `war` plugin to the `web` project.\n\n**Listing 7-4.**\
    \ The Intro-Project’s `build.gradle` File\n\n```\nallprojects {\n    group = \"\
    com.apress.gradle\"\n    version = \"1.0.0-SNAPSHOT\"\n}\n\nsubprojects {\n  \
    \  repositories {\n        mavenCentral()\n    }\n}\n\nproject (':service') {\n\
    \    apply plugin: 'java'\n}\n\nproject (':repository') {\n    apply plugin: 'java'\n\
    }\n\nproject(':web') {\n    apply plugin: 'war'\n}\n```\n\nWith the `intro-root`\
    \ project’s `build.gradle` file updated, run the `gradle build` command and you\
    \ will see this output:\n\n```\n\\chapter 7 \\intro-root>gradle build\n:repository:compileJava\
    \ UP-TO-DATE\n:repository:processResources UP-TO-DATE\n:repository:classes UP-TO-DATE\n\
    :repository:jar\n.........................\n:repository:build\n:service:compileJava\
    \ UP-TO-DATE\n:service:processResources UP-TO-DATE\n:service:classes UP-TO-DATE\n\
    :service:jar\n:service:assemble\n........................\n:web:compileJava UP-TO-DATE\n\
    :web:processResources UP-TO-DATE\n:web:classes UP-TO-DATE\n:web:war\n:web:assemble\n\
    .........................\n:web:build\nBUILD SUCCESSFUL\n```\n\nFrom the output,\
    \ notice that Gradle by default executes the subprojects in ascending order of\
    \ their alphanumeric names.\n\n## Project Dependencies\n\nAs you saw in Figure\
    \ [7-2](#A978-1-4842-1031-4_7_Chapter.html#Fig2), the web project depends on the\
    \ service project and the service project has dependency on the repository project.\
    \ Gradle provides the project dependency type to declare such dependencies. Listing\
    \ [7-5](#A978-1-4842-1031-4_7_Chapter.html#FPar6) shows the modified `build.gradle`\
    \ section declaring these two dependencies.\n\n**Listing 7-5.** Project Dependencies\
    \ in `build.gradle`\n\n```\nallprojects {\n    group = \"com.apress.gradle\"\n\
    \    version = \"1.0.0-SNAPSHOT\"\n}\n\nsubprojects {\n    repositories {\n  \
    \      mavenCentral()\n    }\n}\n\nproject (':repository') {\n    apply plugin:\
    \ 'java'\n}\n\nproject (':service') {\n    apply plugin: 'java'\n    dependencies\
    \ {\n        compile project(':repository')\n    }\n}\n\nproject(':web') {\n \
    \   apply plugin: 'war'\n    dependencies {\n        compile project(':service')\n\
    \    }\n}\n```\n\nIf you were to execute `gradle build` now, Gradle will attempt\
    \ to build the repository project, followed by the service and then the web project.\
    \ The output should resemble Gradle’s default output. However, if you were to\
    \ tweak the dependencies such that web depends on the repository and the repository\
    \ depends on the service, running `gradle build` would assemble the service JAR\
    \ before running the repository build:\n\n```\n\\chapter 7 \\intro-root>gradle\
    \ build\n:service:compileJava UP-TO-DATE\n:service:processResources UP-TO-DATE\n\
    :service:classes UP-TO-DATE\n:service:jar UP-TO-DATE\n:repository:compileJava\
    \ UP-TO-DATE\n...............................\n:repository:check UP-TO-DATE\n\
    :repository:build UP-TO-DATE\n:service:assemble UP-TO-DATE\n................................\n\
    :web:compileTestJava UP-TO-DATE\n:web:processTestResources UP-TO-DATE\n:web:testClasses\
    \ UP-TO-DATE\n:web:test UP-TO-DATE\n:web:check UP-TO-DATE\n:web:build\nBUILD SUCCESSFUL\n\
    ```"
  raw: '### Multi-Project vs. Single-Project Builds


    The root project’s `build.gradle` file can be used to trigger a full build of
    all projects. However, it is possible for the subprojects to contain an optional
    `build.gradle` file. Gradle allows you to execute stand-alone builds on any of
    these subprojects. In that scenario, only the subproject and any dependent projects
    are built.


    So how would Gradle know if a build is a single-project build or part of a larger
    multi-project build? To make this determination, Gradle looks for the `settings.gradle`
    file using the following algorithm:


    Look for the `settings.gradle` in the current directory.   If `settings.gradle`
    is not found, look for it under a `master` directory that is at the same level
    of nesting as the current directory.   If `settings.gradle` is not found, look
    for it under any parent directories.  


    Upon finding a `settings.gradle` file, a check is made to determine if the current
    project is defined as part of a multi-project using the `include` or `includeFlat`
    methods. If the condition is met, the build is executed as a multi-project build.
    Otherwise, the project is executed as a single-project build.


    ## Project Configuration


    The subprojects in a multi-project often contain common configuration, tasks,
    and plugins that can be moved to the root project’s `build.gradle` file. For example,
    all projects would share the same group and version number attributes. Gradle
    provides an `allprojects` closure block that allows you to define such common
    attributes/behavior shared by root project as well as subprojects. Listing [7-1](#A978-1-4842-1031-4_7_Chapter.html#FPar1)
    shows an `allprojects` block with group and version attributes declared.


    Listing 7-1\. The allprojects Block in build.grade


    `allprojects {`


        `group = "com.apress.gradle"`


        `version = "1.0.0-SNAPSHOT"`


    `}`


    Similarly, if all subprojects are Java projects, they would all have the `java`
    plugin applied to them. They would also share common repositories and possibly
    share few dependencies as well. To define such behavior specific to all `subprojects`,
    Gradle provides a `subprojects` closure block. Listing [7-2](#A978-1-4842-1031-4_7_Chapter.html#FPar2)
    shows a `subprojects` block containing the `java` plugin and the `mavenCentral()`
    repository declaration.


    Listing 7-2\. The subprojects Closure Block in build.gradle


    `subprojects {`


         `apply plugin: ''java''`


         `repositories {`


              `mavenCentral()`


         `}`


    `}`


    Note


    The `allprojects` block should be used to declare attributes/configuration/tasks
    that apply to all projects. IDE plugins are good examples of plugins that can
    be declared inside the `allprojects` section.


    It is also possible to configure behavior specific to a single subproject in the
    root project’s `build.gradle` file. For example, you need to apply the `war` plugin
    to the `web` project. You can add this project-specific behavior using the `project()`
    method and then pass in the project name you want to configure as its parameter.
    Listing [7-3](#A978-1-4842-1031-4_7_Chapter.html#FPar4) shows the configuration
    to apply a `war` plugin to the `web` project.


    Listing 7-3. Project-Specific Behavior


    `project('':web'') {`


         `apply plugin: ''war''`


    `}`


    You apply the concepts discussed so far in this section to create an `intro-root`’s
    `build.gradle` file shown in Listing [7-4](#A978-1-4842-1031-4_7_Chapter.html#FPar5).
    It uses the `allprojects` block to ensure that root and subprojects share the
    same group and version numbers. The code also uses the `subprojects` block to
    ensure that all the subprojects get their dependencies from Maven Central. The
    individual `project` blocks apply the `java` plugin to the `service` and `repository`
    projects and apply the `war` plugin to the `web` project.


    Listing 7-4\. The Intro-Project’s build.gradle File


    `allprojects {`


        `group = "com.apress.gradle"`


        `version = "1.0.0-SNAPSHOT"`


    `}`


    `subprojects {`


        `repositories {`


            `mavenCentral()`


        `}`


    `}`


    `project ('':service'') {`


        `apply plugin: ''java''`


    `}`


    `project ('':repository'') {`


        `apply plugin: ''java''`


    `}`


    `project('':web'') {`


        `apply plugin: ''war''`


    `}`


    With the `intro-root` project’s `build.gradle` file updated, run the `gradle build`
    command and you will see this output:


    `\chapter` `7` `\intro-root>gradle build`


    `:repository:compileJava UP-TO-DATE`


    `:repository:processResources UP-TO-DATE`


    `:repository:classes UP-TO-DATE`


    `:repository:jar`


    `.........................`


    `:repository:build`


    `:service:compileJava UP-TO-DATE`


    `:service:processResources UP-TO-DATE`


    `:service:classes UP-TO-DATE`


    `:service:jar`


    `:service:assemble`


    `........................`


    `:web:compileJava UP-TO-DATE`


    `:web:processResources UP-TO-DATE`


    `:web:classes UP-TO-DATE`


    `:web:war`


    `:web:assemble`


    `.........................`


    `:web:build`


    `BUILD SUCCESSFUL`


    From the output, notice that Gradle by default executes the subprojects in ascending
    order of their alphanumeric names.


    ## Project Dependencies


    As you saw in Figure [7-2](#A978-1-4842-1031-4_7_Chapter.html#Fig2), the web project
    depends on the service project and the service project has dependency on the repository
    project. Gradle provides the project dependency type to declare such dependencies.
    Listing [7-5](#A978-1-4842-1031-4_7_Chapter.html#FPar6) shows the modified `build.gradle`
    section declaring these two dependencies.


    Listing 7-5\. Project Dependencies in build.gradle


    `allprojects {`


        `group = "com.apress.gradle"`


        `version = "1.0.0-SNAPSHOT"`


    `}`


    `subprojects {`


        `repositories {`


            `mavenCentral()`


        `}`


    `}`


    `project ('':repository'') {`


        `apply plugin: ''java''`


    `}`


    `project ('':service'') {`


        `apply plugin: ''java''`


        `dependencies {`


            `compile project('':repository'')`


        `}`


    `}`


    `project('':web'') {`


        `apply plugin: ''war''`


        `dependencies {`


            `compile project('':service'')`


        `}`


    `}`


    If you were to execute `gradle build` now, Gradle will attempt to build the repository
    project, followed by the service and then the web project. The output should resemble
    Gradle’s default output. However, if you were to tweak the dependencies such that
    web depends on repository and the repository depends on the service, running `gradle
    build` would assemble the service JAR before running the repository build:


    `\chapter` `7` `\intro-root>gradle build`


    `:service:compileJava UP-TO-DATE`


    `:service:processResources UP-TO-DATE`


    `:service:classes UP-TO-DATE`


    `:service:jar UP-TO-DATE`


    `:repository:compileJava UP-TO-DATE`


    `..............................`


    `:repository:check UP-TO-DATE`


    `:repository:build UP-TO-DATE`


    `:service:assemble UP-TO-DATE`


    `...............................`


    `:web:compileTestJava UP-TO-DATE`


    `:web:processTestResources UP-TO-DATE`


    `:web:testClasses UP-TO-DATE`


    `:web:test UP-TO-DATE`


    `:web:check UP-TO-DATE`


    `:web:build`


    `BUILD` `SUCCESSFUL`'
  trans: "\n### 多项目构建 vs. 单项目构建\n\n根项目的 `build.gradle` 文件可用于触发所有项目的完整构建。然而，子项目也可以包含一个可选的\
    \ `build.gradle` 文件。Gradle 允许你在任何这些子项目上执行独立构建。在这种情况下，只会构建该子项目及其依赖的项目。\n\n那么，Gradle\
    \ 如何判断一个构建是单项目构建还是更大规模多项目构建的一部分呢？为了做出这个判断，Gradle 会使用以下算法查找 `settings.gradle` 文件：\n\
    \n在当前目录中查找 `settings.gradle`。  \n如果未找到 `settings.gradle`，则在当前目录同级嵌套的 `master`\
    \ 目录下查找。  \n如果仍未找到 `settings.gradle`，则在任何父目录中查找。\n\n一旦找到 `settings.gradle` 文件，就会进行检查，以确定当前项目是否通过\
    \ `include` 或 `includeFlat` 方法被定义为多项目的一部分。如果条件满足，则构建将作为多项目构建执行。否则，该项目将作为单项目构建执行。\n\
    \n## 项目配置\n\n多项目中的子项目通常包含一些通用的配置、任务和插件，这些可以迁移到根项目的 `build.gradle` 文件中。例如，所有项目可能共享相同的\
    \ `group` 和 `version` 属性。Gradle 提供了一个 `allprojects` 闭包块，允许你定义根项目和子项目共享的这些通用属性/行为。清单\
    \ 7-1 展示了一个声明了 `group` 和 `version` 属性的 `allprojects` 块。\n\n**清单 7-1. build.gradle\
    \ 中的 allprojects 块**\n\n`allprojects {`\n\n    `group = \"com.apress.gradle\"\
    `\n\n    `version = \"1.0.0-SNAPSHOT\"`\n\n`}`\n\n类似地，如果所有子项目都是 Java 项目，它们都会应用\
    \ `java` 插件。它们也会共享通用的仓库，并可能共享少量依赖。为了定义这种特定于所有 `subprojects` 的行为，Gradle 提供了一个 `subprojects`\
    \ 闭包块。清单 7-2 展示了一个包含 `java` 插件和 `mavenCentral()` 仓库声明的 `subprojects` 块。\n\n**清单\
    \ 7-2. build.gradle 中的 subprojects 闭包块**\n\n`subprojects {`\n\n     `apply plugin:\
    \ 'java'`\n\n     `repositories {`\n\n          `mavenCentral()`\n\n     `}`\n\
    \n`}`\n\n> **注意**\n>\n> `allprojects` 块应用于声明适用于所有项目的属性/配置/任务。IDE 插件就是可以在 `allprojects`\
    \ 部分内部声明的插件的一个很好的例子。\n\n也可以在根项目的 `build.gradle` 文件中配置特定于单个子项目的行为。例如，你需要将 `war`\
    \ 插件应用于 `web` 项目。你可以使用 `project()` 方法添加这种特定于项目的行为，然后将要配置的项目名称作为参数传递进去。清单 7-3 展示了将\
    \ `war` 插件应用于 `web` 项目的配置。\n\n**清单 7-3. 特定于项目的行为**\n\n`project(':web') {`\n\n\
         `apply plugin: 'war'`\n\n`}`\n\n你可以应用本节到目前为止讨论的概念来创建 `intro-root` 的 `build.gradle`\
    \ 文件，如清单 7-4 所示。它使用 `allprojects` 块来确保根项目和子项目共享相同的 `group` 和 `version` 编号。代码还使用了\
    \ `subprojects` 块来确保所有子项目从 Maven Central 获取其依赖。各个 `project` 块将 `java` 插件应用于 `service`\
    \ 和 `repository` 项目，并将 `war` 插件应用于 `web` 项目。\n\n**清单 7-4. Intro-Project 的 build.gradle\
    \ 文件**\n\n`allprojects {`\n\n    `group = \"com.apress.gradle\"`\n\n    `version\
    \ = \"1.0.0-SNAPSHOT\"`\n\n`}`\n\n`subprojects {`\n\n    `repositories {`\n\n\
            `mavenCentral()`\n\n    `}`\n\n`}`\n\n`project (':service') {`\n\n    `apply\
    \ plugin: 'java'`\n\n`}`\n\n`project (':repository') {`\n\n    `apply plugin:\
    \ 'java'`\n\n`}`\n\n`project(':web') {`\n\n    `apply plugin: 'war'`\n\n`}`\n\n\
    更新了 `intro-root` 项目的 `build.gradle` 文件后，运行 `gradle build` 命令，你将看到以下输出：\n\n`\\\
    chapter` `7` `\\intro-root>gradle build`\n\n`:repository:compileJava UP-TO-DATE`\n\
    \n`:repository:processResources UP-TO-DATE`\n\n`:repository:classes UP-TO-DATE`\n\
    \n`:repository:jar`\n\n`.........................`\n\n`:repository:build`\n\n\
    `:service:compileJava UP-TO-DATE`\n\n`:service:processResources UP-TO-DATE`\n\n\
    `:service:classes UP-TO-DATE`\n\n`:service:jar`\n\n`:service:assemble`\n\n`........................`\n\
    \n`:web:compileJava UP-TO-DATE`\n\n`:web:processResources UP-TO-DATE`\n\n`:web:classes\
    \ UP-TO-DATE`\n\n`:web:war`\n\n`:web:assemble`\n\n`.........................`\n\
    \n`:web:build`\n\n`BUILD SUCCESSFUL`\n\n从输出中可以看出，Gradle 默认按照子项目名称的字母数字升序执行它们。\n\
    \n## 项目依赖\n\n正如你在图 7-2 中看到的，web 项目依赖于 service 项目，而 service 项目又依赖于 repository 项目。Gradle\
    \ 提供了项目依赖类型来声明此类依赖。清单 7-5 展示了修改后的 `build.gradle` 部分，其中声明了这两个依赖。\n\n**清单 7-5. build.gradle\
    \ 中的项目依赖**\n\n`allprojects {`\n\n    `group = \"com.apress.gradle\"`\n\n    `version\
    \ = \"1.0.0-SNAPSHOT\"`\n\n`}`\n\n`subprojects {`\n\n    `repositories {`\n\n\
            `mavenCentral()`\n\n    `}`\n\n`}`\n\n`project (':repository') {`\n\n\
        `apply plugin: 'java'`\n\n`}`\n\n`project (':service') {`\n\n    `apply plugin:\
    \ 'java'`\n\n    `dependencies {`\n\n        `compile project(':repository')`\n\
    \n    `}`\n\n`}`\n\n`project(':web') {`\n\n    `apply plugin: 'war'`\n\n    `dependencies\
    \ {`\n\n        `compile project(':service')`\n\n    `}`\n\n`}`\n\n如果你现在执行 `gradle\
    \ build`，Gradle 将尝试先构建 repository 项目，然后是 service 项目，最后是 web 项目。输出应该类似于 Gradle\
    \ 的默认输出。然而，如果你调整依赖关系，使得 web 依赖于 repository，而 repository 依赖于 service，那么运行 `gradle\
    \ build` 将会在运行 repository 构建之前先构建 service JAR：\n\n`\\chapter` `7` `\\intro-root>gradle\
    \ build`\n\n`:service:compileJava UP-TO-DATE`\n\n`:service:processResources UP-TO-DATE`\n\
    \n`:service:classes UP-TO-DATE`\n\n`:service:jar UP-TO-DATE`\n\n`:repository:compileJava\
    \ UP-TO-DATE`\n\n`..............................`\n\n`:repository:check UP-TO-DATE`\n\
    \n`:repository:build UP-TO-DATE`\n\n`:service:assemble UP-TO-DATE`\n\n`...............................`\n\
    \n`:web:compileTestJava UP-TO-DATE`\n\n`:web:processTestResources UP-TO-DATE`\n\
    \n`:web:testClasses UP-TO-DATE`\n\n`:web:test UP-TO-DATE`\n\n`:web:check UP-TO-DATE`\n\
    \n`:web:build`\n\n`BUILD` `SUCCESSFUL`\n"
- fmt: "# Subproject Build Files\n\nSo far you have been using the root project’s\
    \ `build.gradle` file to declare common as well as project-specific behavior,\
    \ thereby eliminating the need for individual `build.gradle` files in each subproject.\
    \ For large projects, this technique would result in a complex single `build.gradle`\
    \ file. For ease of maintenance, you might want to limit the root project’s `build.gradle`\
    \ file to contain only the common behavior and split the rest of the configuration\
    \ into individual subproject build files.\n\nTo see this in action, create a `build.gradle`\
    \ file under the service project and copy the contents shown in Listing 7-6. From\
    \ the root project’s `build.gradle` file, remove the `project(':service'){}` block.\n\
    \n**Listing 7-6.** The Service Project Specific Configuration\n\n```\napply plugin:\
    \ 'java'\n\ndependencies {\n     compile project(':repository')\n}\n```\n\nUsing\
    \ a command prompt, navigate to the `service` folder and run the `gradle build`\
    \ command. You will see that this triggers a repository JAR build followed by\
    \ the service project’s build:\n\n```\n\\chapter 7 \\intro-root\\service>gradle\
    \ build\n:repository:compileJava UP-TO-DATE\n:repository:processResources UP-TO-DATE\n\
    :repository:classes UP-TO-DATE\n:repository:jar UP-TO-DATE\n:service:compileJava\
    \ UP-TO-DATE\n:service:processResources UP-TO-DATE\n:service:classes UP-TO-DATE\n\
    :service:jar UP-TO-DATE\n:service:assemble UP-TO-DATE\n:service:compileTestJava\
    \ UP-TO-DATE\n:service:processTestResources UP-TO-DATE\n:service:testClasses UP-TO-DATE\n\
    :service:test UP-TO-DATE\n:service:check UP-TO-DATE\n:service:build UP-TO-DATE\n\
    BUILD SUCCESSFUL\n```\n\n## Summary\n\nIn this chapter, you learned about the\
    \ intricacies of Gradle’s multi-project builds. You looked at the two types of\
    \ project structure—hierarchical and flat. You learned about `allprojects`, `subprojects`,\
    \ and `project` blocks, which allow you to place build logic in the right locations\
    \ to improve maintainability. You then learned how to declare dependencies across\
    \ your projects. Finally, you reviewed how to trigger a full build and a subproject\
    \ build.\n\nIn the next chapter, you learn about Gradle’s support for publishing\
    \ generated artifacts to repositories.\n\n# Publishing Artifacts\n\nIn order to\
    \ share internally developed frameworks and libraries, developers need to publish\
    \ them to repositories. In this chapter, you will use Gradle to publish artifacts\
    \ to local file system and a repository.\n\n## Publishing to a Local Repository\n\
    \nThe projects you work with typically generate one or more artifacts such as\
    \ JAR, WAR, or ZIP files. Gradle provides an `archives` configuration that can\
    \ be used to declare the artifacts produced by a project. A Java project by default\
    \ produces a JAR file and hence the Java plugin automatically associates the generated\
    \ JAR to the `archives` configuration. Similarly, the `War` plugin assigns the\
    \ generated WAR to this configuration. Gradle provides an `uploadArchives` task\
    \ that can be used to publish these artifacts to repositories.\n\nTo better understand\
    \ the publishing process, you’ll create an empty Java application named `sample-app`.\
    \ To do this, create a new folder called `sample-app` on your file system. Then\
    \ create a `build.gradle` file and copy the contents of Listing 8-1.\n\n**Listing\
    \ 8-1.** `sample-app` `build.gradle` file\n\n```\napply plugin: 'java'\n\nversion\
    \ = 1.0\n\nuploadArchives {\n    repositories {\n      flatDir { dirs \"../repo\"\
    \ }\n    }\n}\n```\n\nThe repositories closure in the `uploadArchives` task allows\
    \ you to configure the location where the artifacts should be published. Listing\
    \ 8-1 is asking Gradle to publish the generated artifact to a `repo` folder located\
    \ at the same level as `sample-app` folder on the file system. To perform the\
    \ publishing, run the following `uploadArchives` task:\n\n```\n\\chapter 8 \\\
    sample-app>gradle uploadArchives\n```\n\nUpon successful execution, you will see\
    \ a `repo` folder created with contents, as shown in Figure 8-1.\n\n![A978-1-4842-1031-4_8_Fig1_HTML.jpg](A978-1-4842-1031-4_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1.** The `repo` folder’s contents\n\nGradle by default uses the `projectname-version.type`\
    \ format for the generated file names. Hence, the generated artifact is named\
    \ `sample-app-1.0.jar`. Additionally, Gradle generates an `ivy.xml` configuration\
    \ file and adds it to the `repo` folder.\n\nThis published artifact is now ready\
    \ to be accessed in other projects. As discussed in Chapter 6, a straightforward\
    \ approach is to declare this folder as a “flat directory repository” and add\
    \ `sample-app` as a dependency.\n\n## Publishing to a Maven Repository\n\nIn order\
    \ to publish to a Maven repository, you need a `pom.xml` configuration file along\
    \ with the artifact. The Project Object Model or `pom.xml` file describes the\
    \ artifact and contains information such as dependencies and plugins. Gradle provides\
    \ a Maven plugin that simplifies deployments to Maven repositories and can automatically\
    \ generate the `pom.xml` file.\n\nBefore you can start publishing to a Maven repository,\
    \ you need access to a repository manager such as Artifactory (www.jfrog.com/artifactory/)\
    \ or Nexus (www.sonatype.org/nexus/go/). Repository managers manage repositories,\
    \ act as proxies of public repositories, and enable governance of artifacts used\
    \ in the enterprise. In the next section, you will look at installing Nexus, which\
    \ is a popular open source repository manager from Sonatype, on your local machine.\n\
    \n### Installing Nexus\n\nNexus is distributed as an archive, and it comes bundled\
    \ with a Jetty instance. Download the Nexus distribution (`.zip` version for Windows)\
    \ from Sonatype’s web site at www.sonatype.org/nexus/go/. At the time of this\
    \ writing, version 2.11.4-01 of Nexus is available. Unzip the file and place the\
    \ contents on your machine. The code in this book assumes the contents to be in\
    \ the `C:\\tools\\nexus` folder.\n\nLaunch your command line in administrator\
    \ mode and navigate to the `bin` folder located in `C:\\tools\\nexus\\nexus-2.11.4-01`.\
    \ To start Nexus, run the following command:\n\n```\nnexus console\n```\n\nBy\
    \ default, Nexus runs on port 8081. Launch a web browser and navigate to Nexus\
    \ at `http://localhost:8081/nexus`. Figure 8-2 shows the Nexus launch screen.\
    \ Sign in to the application using the Log In link in the top-right corner. The\
    \ default login username and password for Nexus are `admin` and `admin123`.\n\n\
    ![A978-1-4842-1031-4_8_Fig2_HTML.jpg](A978-1-4842-1031-4_8_Fig2_HTML.jpg)\n\n\
    **Figure 8-2.** Nexus index page"
  raw: '## Subproject Build Files


    So far you have been using the root project’s `build.gradle` file to declare common
    as well as project-specific behavior, thereby eliminating the need for individual
    `build.gradle` files in each subproject. For large projects, this technique would
    result in a complex single `build.gradle` file. For ease of maintenance, you might
    want to limit the root project’s `build.gradle` file to contain only the common
    behavior and split the rest of the configuration into individual subproject build
    files.


    To see this in action, create a `build.gradle` file under the service project
    and copy the contents shown in Listing [7-6](#A978-1-4842-1031-4_7_Chapter.html#FPar7).
    From the root project’s `build.gradle` file, remove the `project('':service''){}`
    block.


    Listing 7-6\. The Service Project Specific Configuration


    `apply plugin: ''java''`


    `dependencies {`


         `compile project('':repository'')`


    `}`


    Using a command prompt, navigate to the `service` folder and run the `gradle build`
    command. You will see that this triggers a repository JAR build followed by the
    service project’s build:


    `\chapter` `7` `\intro-root\service>gradle build`


    `:repository:compileJava UP-TO-DATE`


    `:repository:processResources UP-TO-DATE`


    `:repository:classes UP-TO-DATE`


    `:repository:jar UP-TO-DATE`


    `:service:compileJava UP-TO-DATE`


    `:service:processResources UP-TO-DATE`


    `:service:classes UP-TO-DATE`


    `:service:jar UP-TO-DATE`


    `:service:assemble UP-TO-DATE`


    `:service:compileTestJava UP-TO-DATE`


    `:service:processTestResources UP-TO-DATE`


    `:service:testClasses UP-TO-DATE`


    `:service:test UP-TO-DATE`


    `:service:check UP-TO-DATE`


    `:service:build UP-TO-DATE`


    `BUILD SUCCESSFUL`


    ## Summary


    In this chapter, you learned about the intricacies of Gradle’s multi-project builds.
    You looked at the two types of project structure—hierarchical and flat. You learned
    about allprojects, subprojects, and project blocks, which allow you to place build
    logic in the right locations to improve maintainability. You then learned how
    to declare dependencies across your projects. Finally, you reviewed how to trigger
    a full build and a subproject build.


    In the next chapter, you learn about Gradle’s support for publishing generated
    artifacts to repositories.


    # 8. Publishing Artifacts


    In order to share internally developed frameworks and libraries, developers need
    to publish them to repositories. In this chapter, you will use Gradle to publish
    artifacts to local file system and an repository.


    ## Publishing to a Local Repository


    The projects you work with typically generate one or more artifacts such as JAR,
    WAR, or ZIP files. Gradle provides an `archives` configuration that can be used
    to declare the artifacts produced by a project. A Java project by default produces
    a JAR file and hence the Java plugin automatically associates the generated JAR
    to the `archives` configuration. Similarly, the `War` plugin assigns the generated
    WAR to this configuration. Gradle provides an `uploadArchives` task that can be
    used to publish these artifacts to repositories.


    To better understand the publishing process, you’ll create an empty Java application
    named `sample-app`. To do this, create a new folder called `sample-app` on your
    file system. Then create a `build.gradle` file and copy the contents of Listing
    [8-1](#A978-1-4842-1031-4_8_Chapter.html#FPar1).


    Listing 8-1\. sample-app build.gradle file


    `apply plugin: ''java''`


    `version = 1.0`


    `uploadArchives {`


        `repositories {`


          `flatDir { dirs "../repo" }`


        `}`


    `}`


    The repositories closure in the `uploadArchives` task allows you to configure
    the location where the artifacts should be published. Listing [8-1](#A978-1-4842-1031-4_8_Chapter.html#FPar1)
    is asking Gradle to publish the generated artifact to a `repo` folder located
    at the same level as `sample-app` folder on the file system. To perform the publishing,
    run the following `uploadArchives` task:


    `\chapter` `8` `\sample-app>gradle uploadArchives`


    Upon successful execution, you will see a `repo` folder created with contents,
    as shown in Figure [8-1](#A978-1-4842-1031-4_8_Chapter.html#Fig1).


    ![A978-1-4842-1031-4_8_Fig1_HTML.jpg](A978-1-4842-1031-4_8_Fig1_HTML.jpg)


    Figure 8-1.


    The repo folder’s contents


    Gradle by default uses the `projectname-version.type` format for the generated
    file names. Hence, the generated artifact is named `sample-app-1.0.jar`. Additionally,
    Gradle generates an `ivy.xml` configuration file and adds it to the `repo` folder.


    This published artifact is now ready to be accessed in other projects. As discussed
    in [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html), a straightforward approach
    is to declare this folder as a “flat directory repository” and add `sample-app`
    as a dependency.


    ## Publishing to a Maven Repository


    In order to publish to a Maven repository, you need a `pom.xml` configuration
    file along with the artifact. The Project Object Model or `pom.xml` file describes
    the artifact and contains information such as dependencies and plugins. Gradle
    provides a Maven plugin that simplifies deployments to Maven repositories and
    can automatically generate the `pom.xml` file.


    Before you can start publishing to a Maven repository, you need access to a repository
    manager such as Artifactory ( [`www.jfrog.com/artifactory/`](http://www.jfrog.com/artifactory/)
    ) or Nexus ( [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/)
    ). Repository managers manage repositories, act as proxies of public repositories,
    and enable governance of artifacts used in the enterprise. In the next section,
    you will look at installing Nexus, which is a popular open source repository manager
    from Sonatype, on your local machine.


    ### Installing Nexus


    Nexus is distributed as an archive, and it comes bundled with a Jetty instance.
    Download the Nexus distribution (`.zip` version for Windows) from Sonatype’s web
    site at [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/) . At
    the time of this writing, version 2.11.4-01 of Nexus is available. Unzip the file
    and place the contents on your machine. The code in this book assumes the contents
    to be in the `C:\tools\nexus` folder.


    Launch your command line in administrator mode and navigate to the `bin` folder
    located in `C:\tools\nexus\nexus-2.11.4-01`. To start Nexus, run the following
    command:


    `nexus console`


    By default, Nexus runs on port 8081\. Launch a web browser and navigate to Nexus
    at `http://localhost:8081/nexus`. Figure [8-2](#A978-1-4842-1031-4_8_Chapter.html#Fig2)
    shows the Nexus launch screen. Sign in to the application using the Log In link
    in the top-right corner. The default login username and password for Nexus are
    `admin` and `admin123`.


    ![A978-1-4842-1031-4_8_Fig2_HTML.jpg](A978-1-4842-1031-4_8_Fig2_HTML.jpg)


    Figure 8-2.


    Nexus index page'
  trans: '

    ## 子项目构建文件


    到目前为止，你一直在使用根项目的 `build.gradle` 文件来声明通用行为以及特定于项目的行为，从而无需在每个子项目中单独创建 `build.gradle`
    文件。对于大型项目，这种做法会导致单个 `build.gradle` 文件变得复杂。为了便于维护，你可能希望将根项目的 `build.gradle` 文件限制为仅包含通用行为，并将其余配置拆分到各个子项目的构建文件中。


    为了演示这一点，请在 `service` 项目下创建一个 `build.gradle` 文件，并复制清单 7-6 中所示的内容。然后，从根项目的 `build.gradle`
    文件中移除 `project('':service''){}` 代码块。


    清单 7-6\. 服务项目特定配置


    `apply plugin: ''java''`


    `dependencies {`


         `compile project('':repository'')`


    `}`


    使用命令提示符，导航到 `service` 文件夹并运行 `gradle build` 命令。你将看到这会先触发 repository 的 JAR 构建，然后是
    service 项目的构建：


    `\chapter` `7` `\intro-root\service>gradle build`


    `:repository:compileJava UP-TO-DATE`


    `:repository:processResources UP-TO-DATE`


    `:repository:classes UP-TO-DATE`


    `:repository:jar UP-TO-DATE`


    `:service:compileJava UP-TO-DATE`


    `:service:processResources UP-TO-DATE`


    `:service:classes UP-TO-DATE`


    `:service:jar UP-TO-DATE`


    `:service:assemble UP-TO-DATE`


    `:service:compileTestJava UP-TO-DATE`


    `:service:processTestResources UP-TO-DATE`


    `:service:testClasses UP-TO-DATE`


    `:service:test UP-TO-DATE`


    `:service:check UP-TO-DATE`


    `:service:build UP-TO-DATE`


    `BUILD SUCCESSFUL`


    ## 本章小结


    在本章中，你学习了 Gradle 多项目构建的复杂性。你了解了两种项目结构类型——层次结构和扁平结构。你学习了 `allprojects`、`subprojects`
    和 `project` 代码块，它们允许你将构建逻辑放置在正确的位置以提高可维护性。然后，你学习了如何在项目之间声明依赖关系。最后，你回顾了如何触发完整构建和子项目构建。


    在下一章中，你将学习 Gradle 对将生成的工件发布到仓库的支持。


    # 8. 发布工件


    为了共享内部开发的框架和库，开发者需要将它们发布到仓库。在本章中，你将使用 Gradle 将工件发布到本地文件系统和远程仓库。


    ## 发布到本地仓库


    你处理的项目通常会生成一个或多个工件，例如 JAR、WAR 或 ZIP 文件。Gradle 提供了一个 `archives` 配置，可用于声明项目产生的工件。Java
    项目默认会生成一个 JAR 文件，因此 Java 插件会自动将生成的 JAR 关联到 `archives` 配置。类似地，`War` 插件会将生成的 WAR
    分配给此配置。Gradle 提供了一个 `uploadArchives` 任务，可用于将这些工件发布到仓库。


    为了更好地理解发布过程，你将创建一个名为 `sample-app` 的空 Java 应用程序。为此，在你的文件系统上创建一个名为 `sample-app`
    的新文件夹。然后创建一个 `build.gradle` 文件，并复制清单 8-1 的内容。


    清单 8-1\. sample-app 的 build.gradle 文件


    `apply plugin: ''java''`


    `version = 1.0`


    `uploadArchives {`


        `repositories {`


          `flatDir { dirs "../repo" }`


        `}`


    `}`


    `uploadArchives` 任务中的 `repositories` 闭包允许你配置工件应发布到的位置。清单 8-1 要求 Gradle 将生成的工件发布到文件系统上与
    `sample-app` 文件夹同级的 `repo` 文件夹中。要执行发布，请运行以下 `uploadArchives` 任务：


    `\chapter` `8` `\sample-app>gradle uploadArchives`


    成功执行后，你将看到一个创建的 `repo` 文件夹及其内容，如图 8-1 所示。


    ![A978-1-4842-1031-4_8_Fig1_HTML.jpg](img/A978-1-4842-1031-4_8_Fig1_HTML.jpg)


    图 8-1.


    repo 文件夹的内容


    Gradle 默认使用 `projectname-version.type` 格式作为生成的文件名。因此，生成的工件被命名为 `sample-app-1.0.jar`。此外，Gradle
    会生成一个 `ivy.xml` 配置文件并将其添加到 `repo` 文件夹中。


    这个已发布的工件现在可以被其他项目访问。如第 6 章所述，一种直接的方法是将此文件夹声明为“扁平目录仓库”，并将 `sample-app` 添加为依赖项。


    ## 发布到 Maven 仓库


    为了发布到 Maven 仓库，你需要一个 `pom.xml` 配置文件以及工件。项目对象模型（即 `pom.xml` 文件）描述了工件，并包含依赖项和插件等信息。Gradle
    提供了一个 Maven 插件，可以简化到 Maven 仓库的部署，并能自动生成 `pom.xml` 文件。


    在开始发布到 Maven 仓库之前，你需要访问一个仓库管理器，例如 Artifactory ( [`www.jfrog.com/artifactory/`](http://www.jfrog.com/artifactory/)
    ) 或 Nexus ( [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/)
    )。仓库管理器管理仓库，充当公共仓库的代理，并支持对企业中使用的工件进行治理。在下一节中，你将学习如何在本地机器上安装 Nexus，这是一个来自 Sonatype
    的流行的开源仓库管理器。


    ### 安装 Nexus


    Nexus 以归档文件形式分发，并捆绑了一个 Jetty 实例。从 Sonatype 的网站 [`www.sonatype.org/nexus/go/`](http://www.sonatype.org/nexus/go/)
    下载 Nexus 发行版（Windows 使用 `.zip` 版本）。在撰写本文时，可用的 Nexus 版本是 2.11.4-01。解压文件并将其内容放置在你的机器上。本书中的代码假定内容位于
    `C:\tools\nexus` 文件夹中。


    以管理员模式启动命令行，并导航到位于 `C:\tools\nexus\nexus-2.11.4-01` 的 `bin` 文件夹。要启动 Nexus，请运行以下命令：


    `nexus console`


    默认情况下，Nexus 运行在 8081 端口。启动 Web 浏览器并导航到 Nexus 的地址 `http://localhost:8081/nexus`。图
    8-2 显示了 Nexus 的启动画面。使用右上角的“登录”链接登录应用程序。Nexus 的默认登录用户名和密码是 `admin` 和 `admin123`。


    ![A978-1-4842-1031-4_8_Fig2_HTML.jpg](img/A978-1-4842-1031-4_8_Fig2_HTML.jpg)


    图 8-2.


    Nexus 索引页面

