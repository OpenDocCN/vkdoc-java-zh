- fmt: '# Continuous Integration Flow


    Continuous integration servers interact with version control systems (VCS), such
    as SVN and GIT, to perform builds on a regular basis. A high-level interaction
    between CI and code repository is shown in Figure [9-1](#A978-1-4842-1031-4_9_Chapter.html#Fig1).


    ![A978-1-4842-1031-4_9_Fig1_HTML.jpg](A978-1-4842-1031-4_9_Fig1_HTML.jpg)


    Figure 9-1. CI flow


    The interaction begins with a developer checking in her changes to a central source
    code repository (VCS). The CI server can be configured to periodically poll for
    changes to the code repository or have the VCS trigger a build. When the CI server
    detects changes to code, it downloads the source code and begins a build. Upon
    a successful build, the CI server can push the generated artifacts to testing/staging
    environments. If any failures in the build are detected, the CI server sends out
    notifications to the developers.


    ## Sample Project


    To fully understand Jenkins support for Gradle, you need a sample Gradle project
    residing in a VCS. In this book, you will use Git as the VCS and GitHub, a popular
    online hosting service, for the Git repositories. You will be working with a sample
    application named `ig-app` that has been uploaded to GitHub at [`https://github.com/bava/ig-app`](https://github.com/bava/ig-app).
    The sample project contains a simple `build.gradle` file and a `HelloWorld.java`
    class that prints `"Hello World"` to console.


    To follow along with the rest of the chapter, you need an account on GitHub. If
    you are a first time user, you can sign up for a free account on GitHub’s home
    page at [`https://github.com`](https://github.com/). Once you have an account,
    you need to fork or make a copy of the `ig-app` repository under your own account.
    This allows you to configure Jenkins to interact with your forked repository using
    your credentials. This also allows you to commit changes to the repository and
    have Jenkin builds triggered automatically. You can fork the `ig-app` repository
    by clicking on the Fork button next to the repository name, as shown in Figure
    [`9-2`](#A978-1-4842-1031-4_9_Chapter.html#Fig2).


    ![A978-1-4842-1031-4_9_Fig2_HTML.jpg](A978-1-4842-1031-4_9_Fig2_HTML.jpg)


    Figure 9-2. Forking the `ig-app` repository


    ### Installing Jenkins


    Jenkins is an open source, cross-platform continuous integration tool written
    entirely in Java. It supports a wide variety of technologies and languages such
    as Java, .Net, PHP, Ruby, and more. Before you start using Jenkins, you need to
    install and configure it.


    Note


    Since Jenkins needs to interact with the Git repository, you need to have Git
    installed on your machine. You can download OS-specific Git installers at [`http://git-scm.com/downloads`](http://git-scm.com/downloads).


    Begin the Jenkins installation by downloading the latest version at [`https://jenkins-ci.org/`](https://jenkins-ci.org/)
    (see Figure [9-3](#A978-1-4842-1031-4_9_Chapter.html#Fig3)). Jenkins comes in
    two flavors—native installers for major operating systems and an executable WAR
    file. To keep things simple, this book takes the WAR file approach.


    ![A978-1-4842-1031-4_9_Fig3_HTML.jpg](A978-1-4842-1031-4_9_Fig3_HTML.jpg)


    Figure 9-3. The Jenkins download page


    Download the `jenkins.war` file and save it on your file system. Using a command
    prompt, navigate to the downloaded directory and run the following command to
    start Jenkins:


    ```

    java -jar jenkins.war

    ```


    Upon successful execution of the command, you should see the statement `"INFO:
    Jenkins is fully up and running"` on the console indicating that Jenkins is up
    and running. By default, Jenkins runs on port 8080. Using a browser, navigate
    to `http://localhost:8080` and you should see the Jenkins dashboard, as shown
    in Figure [9-4](#A978-1-4842-1031-4_9_Chapter.html#Fig4).


    ![A978-1-4842-1031-4_9_Fig4_HTML.jpg](A978-1-4842-1031-4_9_Fig4_HTML.jpg)


    Figure 9-4. The Jenkins dashboard


    ### Configuring Jenkins


    Before you can start using Jenkins to run Gradle builds, you need to configure
    Jenkins by adding and configuring the Gradle and GitHub plugins. On the Jenkins
    dashboard’s vertical navigation, click Manage Jenkins. Then click the Manage Plugins
    link. On the ensuing screen, click the Available tab and use the filter box to
    search for Gradle plugin, as shown in Figure [9-5](#A978-1-4842-1031-4_9_Chapter.html#Fig5).


    ![A978-1-4842-1031-4_9_Fig5_HTML.jpg](A978-1-4842-1031-4_9_Fig5_HTML.jpg)


    Figure 9-5. Available tab on the Manage Plugins screen


    Select the plugin and click the Download Now and Install After Restart button.
    Follow the same approach for searching and installing the GitHub plugin (see Figure
    [9-6](#A978-1-4842-1031-4_9_Chapter.html#Fig6)).


    ![A978-1-4842-1031-4_9_Fig6_HTML.jpg](A978-1-4842-1031-4_9_Fig6_HTML.jpg)


    Figure 9-6. The GitHub plugin


    You will notice that the GitHub plugin will trigger the installation of other
    plugins, such as Git and Git Client (see Figure [9-7](#A978-1-4842-1031-4_9_Chapter.html#Fig7)).


    ![A978-1-4842-1031-4_9_Fig7_HTML.jpg](A978-1-4842-1031-4_9_Fig7_HTML.jpg)


    Figure 9-7. Plugins installed with the GitHub plugin


    To complete the plugin installation, restart the Jenkins server. You can accomplish
    this by simply killing the Jenkins process at the command line (Ctrl+C on Windows)
    and rerunning the `java -jar jenkins.war` command.


    Finally, you need to configure the Gradle plugin to use the local Gradle installation.
    To do this, click on the Manage Jenkins link on the dashboard and then click on
    the Configure System link. Navigate to the Gradle section on the page and click
    the Add Gradle button. This opens a section to configure Gradle installation.
    Enter `Local Gradle` as Gradle name. Then enter the Gradle installation directory
    under `GRADLE_HOME` and uncheck the Install Automatically option, as shown in
    Figure [9-8](#A978-1-4842-1031-4_9_Chapter.html#Fig8).


    ![A978-1-4842-1031-4_9_Fig8_HTML.jpg](A978-1-4842-1031-4_9_Fig8_HTML.jpg)


    Figure 9-8. The Gradle plugin configuration


    Save the changes by clicking the Save button at the bottom of the page. This concludes
    the plugin configuration and you can now move forward and create a Jenkins build
    job.'
  raw: '## Continuous Integration Flow


    Continuous integration servers interact with version control systems (VCS), such
    as SVN and GIT, to perform builds on a regular basis. A high-level interaction
    between CI and code repository is shown in Figure [9-1](#A978-1-4842-1031-4_9_Chapter.html#Fig1).


    ![A978-1-4842-1031-4_9_Fig1_HTML.jpg](A978-1-4842-1031-4_9_Fig1_HTML.jpg)


    Figure 9-1.


    CI flow


    The interaction begins with a developer checking in her changes to a central source
    code repository (VCS). The CI server can be configured to periodically poll for
    changes to the code repository or have the VCS trigger a build. When the CI server
    detects changes to code, it downloads the source code and begins a build. Upon
    a successful build, the CI server can push the generated artifacts to testing/staging
    environments. If any failures in the build are detected, the CI server sends out
    notifications to the developers.


    ## Sample Project


    To fully understand Jenkins support for Gradle, you need a sample Gradle project
    residing in a VCS. In this book, you will use Git as the VCS and GitHub, a popular
    online hosting service, for the Git repositories. You will be working with a sample
    application named `ig-app` that has been uploaded to GitHub at [`https://github.com/bava/ig-app`](https://github.com/bava/ig-app)
    . The sample project contains a simple `build.gradle` file and a `HelloWorld.java`
    class that prints `"Hello World"` to console.


    To follow along with the rest of the chapter, you need an account on GitHub. If
    you are a first time user, you can sign up for a free account on GitHub’s home
    page at [`https://github.com`](https://github.com/) . Once you have an account,
    you need to fork or make a copy of the `ig-app` repository under your own account.
    This allows you to configure Jenkins to interact with your forked repository using
    your credentials. This also allows you to commit changes to the repository and
    have Jenkin builds triggered automatically. You can fork the `ig-app` repository
    by clicking on the Fork button next to the repository name, as shown in Figure
    [`9-2`](#A978-1-4842-1031-4_9_Chapter.html#Fig2) .


    ![A978-1-4842-1031-4_9_Fig2_HTML.jpg](A978-1-4842-1031-4_9_Fig2_HTML.jpg)


    Figure 9-2.


    Forking the ig-app repository


    ### Installing Jenkins


    Jenkins is an open source, cross-platform continuous integration tool written
    entirely in Java. It supports a wide variety of technologies and languages such
    as Java, .Net, PHP, Ruby, and more. Before you start using Jenkins, you need to
    install and configure it.


    Note


    Since Jenkins needs to interact with the Git repository, you need to have Git
    installed on your machine. You can download OS-specific Git installers at [`http://git-scm.com/downloads`](http://git-scm.com/downloads)
    .


    Begin the Jenkins installation by downloading the latest version at [`https://jenkins-ci.org/`](https://jenkins-ci.org/)
    (see Figure [9-3](#A978-1-4842-1031-4_9_Chapter.html#Fig3)). Jenkins comes in
    two flavors—native installers for major operating systems and an executable WAR
    file. To keep things simple, this book takes the WAR file approach.


    ![A978-1-4842-1031-4_9_Fig3_HTML.jpg](A978-1-4842-1031-4_9_Fig3_HTML.jpg)


    Figure 9-3.


    The Jenkins download page


    Download the `jenkins.war` file and save it on your file system. Using a command
    prompt, navigate to the downloaded directory and run the following command to
    start Jenkins:


    `java -jar jenkins.war`


    Upon successful execution of the command, you should see the statement `"INFO:
    Jenkins is fully up and running"` on the console indicating that Jenkins is up
    and running. By default, Jenkins runs on port 8080\. Using a browser, navigate
    to `http://localhost:8080` and you should see the Jenkins dashboard, as shown
    in Figure [9-4](#A978-1-4842-1031-4_9_Chapter.html#Fig4).


    ![A978-1-4842-1031-4_9_Fig4_HTML.jpg](A978-1-4842-1031-4_9_Fig4_HTML.jpg)


    Figure 9-4.


    The Jenkins dashboard


    ### Configuring Jenkins


    Before you can start using Jenkins to run Gradle builds, you need to configure
    Jenkins by adding and configuring the Gradle and GitHub plugins. On the Jenkins
    dashboard’s vertical navigation, click Manage Jenkins. Then click the Manage Plugins
    link. On the ensuing screen, click the Available tab and use the filter box to
    search for Gradle plugin, as shown in Figure [9-5](#A978-1-4842-1031-4_9_Chapter.html#Fig5).


    ![A978-1-4842-1031-4_9_Fig5_HTML.jpg](A978-1-4842-1031-4_9_Fig5_HTML.jpg)


    Figure 9-5.


    Available tab on the Manage Plugins screen


    Select the plugin and click the Download Now and Install After Restart button.
    Follow the same approach for searching and installing the GitHub plugin (see Figure
    [9-6](#A978-1-4842-1031-4_9_Chapter.html#Fig6)).


    ![A978-1-4842-1031-4_9_Fig6_HTML.jpg](A978-1-4842-1031-4_9_Fig6_HTML.jpg)


    Figure 9-6.


    The GitHub plugin


    You will notice that the GitHub plugin will trigger the installation of other
    plugins, such as Git and Git Client (see Figure [9-7](#A978-1-4842-1031-4_9_Chapter.html#Fig7)).


    ![A978-1-4842-1031-4_9_Fig7_HTML.jpg](A978-1-4842-1031-4_9_Fig7_HTML.jpg)


    Figure 9-7.


    Plugins installed with the GitHub plugin


    To complete the plugin installation, restart the Jenkins server. You can accomplish
    this by simply killing the Jenkins process at the command line (Ctrl+C on Windows)
    and rerunning the `java -jar jenkins.war` command.


    Finally, you need to configure the Gradle plugin to use the local Gradle installation.
    To do this, click on the Manage Jenkins link on the dashboard and then click on
    the Configure System link. Navigate to the Gradle section on the page and click
    the Add Gradle button. This opens a section to configure Gradle installation.
    Enter Local Gradle as Gradle name. Then enter the Gradle installation directory
    under `GRADLE_HOME` and uncheck the Install Automatically option, as shown in
    Figure [9-8](#A978-1-4842-1031-4_9_Chapter.html#Fig8).


    ![A978-1-4842-1031-4_9_Fig8_HTML.jpg](A978-1-4842-1031-4_9_Fig8_HTML.jpg)


    Figure 9-8.


    The Gradle plugin configuration


    Save the changes by clicking the Save button at the bottom of the page. This concludes
    the plugin configuration and you can now move forward and create a Jenkins build
    job.'
  trans: '

    ## 持续集成流程


    持续集成服务器会与版本控制系统（VCS）（例如 SVN 和 GIT）交互，以定期执行构建。CI 与代码仓库之间的高层交互如图 9-1 所示。


    ![A978-1-4842-1031-4_9_Fig1_HTML.jpg](img/A978-1-4842-1031-4_9_Fig1_HTML.jpg)


    图 9-1.


    CI 流程


    该交互始于开发者将其更改提交到中央源代码仓库（VCS）。CI 服务器可以配置为定期轮询代码仓库的更改，或者由 VCS 触发构建。当 CI 服务器检测到代码更改时，它会下载源代码并开始构建。构建成功后，CI
    服务器可以将生成的工件推送到测试/预发布环境。如果检测到构建失败，CI 服务器会向开发者发送通知。


    ## 示例项目


    为了充分理解 Jenkins 对 Gradle 的支持，你需要一个存放在 VCS 中的示例 Gradle 项目。本书将使用 Git 作为 VCS，并使用流行的在线托管服务
    GitHub 来托管 Git 仓库。你将使用一个名为 `ig-app` 的示例应用程序，该程序已上传至 GitHub 的 [`https://github.com/bava/ig-app`](https://github.com/bava/ig-app)
    。该示例项目包含一个简单的 `build.gradle` 文件和一个向控制台输出 `"Hello World"` 的 `HelloWorld.java` 类。


    要跟随本章后续内容，你需要一个 GitHub 账户。如果你是首次使用，可以在 GitHub 主页 [`https://github.com`](https://github.com/)
    上注册一个免费账户。拥有账户后，你需要 fork 或复制 `ig-app` 仓库到你自己的账户下。这样你就可以配置 Jenkins，使用你的凭据与 fork
    后的仓库进行交互。这也允许你向仓库提交更改，并自动触发 Jenkins 构建。你可以通过点击仓库名称旁边的 Fork 按钮来 fork `ig-app` 仓库，如图
    `9-2` 所示。


    ![A978-1-4842-1031-4_9_Fig2_HTML.jpg](img/A978-1-4842-1031-4_9_Fig2_HTML.jpg)


    图 9-2.


    Fork ig-app 仓库


    ### 安装 Jenkins


    Jenkins 是一个完全用 Java 编写的开源、跨平台持续集成工具。它支持多种技术和语言，例如 Java、.Net、PHP、Ruby 等。在开始使用 Jenkins
    之前，你需要安装并配置它。


    注意


    由于 Jenkins 需要与 Git 仓库交互，你需要在机器上安装 Git。你可以从 [`http://git-scm.com/downloads`](http://git-scm.com/downloads)
    下载特定操作系统的 Git 安装程序。


    从 [`https://jenkins-ci.org/`](https://jenkins-ci.org/) 下载最新版本开始安装 Jenkins（见图 9-3）。Jenkins
    有两种形式——主要操作系统的原生安装程序和一个可执行的 WAR 文件。为简单起见，本书采用 WAR 文件方式。


    ![A978-1-4842-1031-4_9_Fig3_HTML.jpg](img/A978-1-4842-1031-4_9_Fig3_HTML.jpg)


    图 9-3.


    Jenkins 下载页面


    下载 `jenkins.war` 文件并将其保存到你的文件系统中。使用命令提示符，导航到下载目录并运行以下命令来启动 Jenkins：


    `java -jar jenkins.war`


    命令成功执行后，你应该会在控制台上看到语句 `"INFO: Jenkins is fully up and running"`，表明 Jenkins 已启动并正在运行。默认情况下，Jenkins
    运行在 8080 端口。使用浏览器，导航到 `http://localhost:8080`，你应该会看到 Jenkins 仪表盘，如图 9-4 所示。


    ![A978-1-4842-1031-4_9_Fig4_HTML.jpg](img/A978-1-4842-1031-4_9_Fig4_HTML.jpg)


    图 9-4.


    Jenkins 仪表盘


    ### 配置 Jenkins


    在开始使用 Jenkins 运行 Gradle 构建之前，你需要通过添加和配置 Gradle 与 GitHub 插件来配置 Jenkins。在 Jenkins
    仪表盘的垂直导航栏中，点击“管理 Jenkins”。然后点击“管理插件”链接。在出现的屏幕上，点击“可选插件”选项卡，并使用过滤器框搜索 Gradle 插件，如图
    9-5 所示。


    ![A978-1-4842-1031-4_9_Fig5_HTML.jpg](img/A978-1-4842-1031-4_9_Fig5_HTML.jpg)


    图 9-5.


    管理插件屏幕上的“可选插件”选项卡


    选择该插件，然后点击“立即下载并在重启后安装”按钮。按照相同的方法搜索并安装 GitHub 插件（见图 9-6）。


    ![A978-1-4842-1031-4_9_Fig6_HTML.jpg](img/A978-1-4842-1031-4_9_Fig6_HTML.jpg)


    图 9-6.


    GitHub 插件


    你会注意到 GitHub 插件会触发安装其他插件，例如 Git 和 Git 客户端（见图 9-7）。


    ![A978-1-4842-1031-4_9_Fig7_HTML.jpg](img/A978-1-4842-1031-4_9_Fig7_HTML.jpg)


    图 9-7.


    与 GitHub 插件一起安装的插件


    要完成插件安装，请重启 Jenkins 服务器。你可以通过在命令行中终止 Jenkins 进程（Windows 上按 Ctrl+C）并重新运行 `java
    -jar jenkins.war` 命令来实现。


    最后，你需要配置 Gradle 插件以使用本地 Gradle 安装。为此，点击仪表盘上的“管理 Jenkins”链接，然后点击“系统配置”链接。导航到页面上的
    Gradle 部分，然后点击“新增 Gradle”按钮。这将打开一个用于配置 Gradle 安装的区域。在“Gradle 名称”中输入“Local Gradle”。然后在
    `GRADLE_HOME` 下输入 Gradle 安装目录，并取消选中“自动安装”选项，如图 9-8 所示。


    ![A978-1-4842-1031-4_9_Fig8_HTML.jpg](img/A978-1-4842-1031-4_9_Fig8_HTML.jpg)


    图 9-8.


    Gradle 插件配置


    点击页面底部的“保存”按钮保存更改。至此，插件配置完成，你现在可以继续创建 Jenkins 构建任务了。

    '
- fmt: '### Creating the Build Job


    Jobs in Jenkins represent tasks or steps in the build process. A build job for
    example can download source code and compile and execute tests. In this section,
    you will create a build job that executes the sample app’s Gradle build script.
    To create a new job, follow these steps:


    Navigate to the Jenkins dashboard at `http://localhost:8080` and click the New
    Item link. On the New Item screen, enter the name `intro-gradle-app` and select
    Freestyle Project, as shown in Figure [9-9](#A978-1-4842-1031-4_9_Chapter.html#Fig9).
    We chose the Freestyle Project option as it provides a lot of flexibility and
    can work with any SCM and build system. Click the OK button.


    ![A978-1-4842-1031-4_9_Fig9_HTML.jpg](A978-1-4842-1031-4_9_Fig9_HTML.jpg)


    Figure 9-9. New job screen


    On the next screen, enter the URL to your GitHub repository that contains the
    forked sample project (see Figure [9-10](#A978-1-4842-1031-4_9_Chapter.html#Fig10)).


    ![A978-1-4842-1031-4_9_Fig10_HTML.jpg](A978-1-4842-1031-4_9_Fig10_HTML.jpg)


    Figure 9-10. GitHub project URL


    Under the Source Code Management section, select the Git option. Under the Repository
    URL, enter the HTTPS URL to clone the GitHub repository, as shown in Figure [9-11](#A978-1-4842-1031-4_9_Chapter.html#Fig11).


    ![A978-1-4842-1031-4_9_Fig11_HTML.jpg](A978-1-4842-1031-4_9_Fig11_HTML.jpg)


    Figure 9-11. Source Repository configuration


    You can obtain the clone URL to be entered on the GitHub repository page’s vertical
    navigation (see Figure [9-12](#A978-1-4842-1031-4_9_Chapter.html#Fig12)). Make
    sure that the HTTPS option is selected before copying the URL.


    ![A978-1-4842-1031-4_9_Fig12_HTML.jpg](A978-1-4842-1031-4_9_Fig12_HTML.jpg)


    Figure 9-12. Clone URL to GitHub


    Click the Add button next to the credentials. In the Add Credentials dialog box,
    enter your GitHub account’s username and password, as shown in Figure [9-13](#A978-1-4842-1031-4_9_Chapter.html#Fig13).
    Click Add.


    ![A978-1-4842-1031-4_9_Fig13_HTML.jpg](A978-1-4842-1031-4_9_Fig13_HTML.jpg)


    Figure 9-13. GitHub Repo credentials


    In the Build Triggers section, select the Poll SCM option. The schedule field
    takes a UNIX cron expression value. In Figure [9-14](#A978-1-4842-1031-4_9_Chapter.html#Fig14),
    `H/15 * * * *` has been entered, indicating that VCS should be polled every 15
    minutes.


    ![A978-1-4842-1031-4_9_Fig14_HTML.jpg](A978-1-4842-1031-4_9_Fig14_HTML.jpg)


    Figure 9-14. The Build Triggers configuration


    Under the Build section, click the Add Build Step drop-down and choose Invoke
    Gradle Script (see Figure [9-15](#A978-1-4842-1031-4_9_Chapter.html#Fig15)).


    ![A978-1-4842-1031-4_9_Fig15_HTML.jpg](A978-1-4842-1031-4_9_Fig15_HTML.jpg)


    Figure 9-15. Adding the build step


    Under the Invoke Gradle script section, select Invoke Gradle and, from the drop-down,
    select the Local Gradle option you configured in the preceding section (refer
    to Figure [9-8](#A978-1-4842-1031-4_9_Chapter.html#Fig8)). Enter `clean build`
    in the Tasks textbox (see Figure [9-16](#A978-1-4842-1031-4_9_Chapter.html#Fig16)).


    ![A978-1-4842-1031-4_9_Fig16_HTML.jpg](A978-1-4842-1031-4_9_Fig16_HTML.jpg)


    Figure 9-16. Invoke the Gradle script configuration


    Click Save and you will be taken to the `intro-gradle-app` project page shown
    in Figure [9-17](#A978-1-4842-1031-4_9_Chapter.html#Fig17). From this page, you
    can trigger manual builds or change the job configuration.


    ![A978-1-4842-1031-4_9_Fig17_HTML.jpg](A978-1-4842-1031-4_9_Fig17_HTML.jpg)


    Figure 9-17. The `intro-gradle-app` project page


    ### Running the Build Job


    The build job you configured in the previous section polls the repository for
    changes every 15 minutes. Additionally, you can use the project’s page to trigger
    a manual build anytime. From Jenkins dashboard, click the `intro-gradle-app` project
    link (see Figure [9-18](#A978-1-4842-1031-4_9_Chapter.html#Fig18)).


    ![A978-1-4842-1031-4_9_Fig18_HTML.jpg](A978-1-4842-1031-4_9_Fig18_HTML.jpg)


    Figure 9-18. Project list on dashboard


    On the ensuing project page, click the Build Now link on the left vertical navigation.
    This schedules a new build. Click on the build number and then click on Console
    Output, as shown in Figure [9-19](#A978-1-4842-1031-4_9_Chapter.html#Fig19).


    ![A978-1-4842-1031-4_9_Fig19_HTML.jpg](A978-1-4842-1031-4_9_Fig19_HTML.jpg)


    Figure 9-19. Viewing the console output


    You should see the output of the execution, similar to Figure [9-20](#A978-1-4842-1031-4_9_Chapter.html#Fig20).


    ![A978-1-4842-1031-4_9_Fig20_HTML.jpg](A978-1-4842-1031-4_9_Fig20_HTML.jpg)


    Figure 9-20. Job execution output


    ## Archiving Artifacts


    In the previous section, you ran a Jenkins build job to build the project and
    the `generate ig-app.jar` file. In this section, you will configure Jenkins to
    store those generated artifacts for later use.


    From the Jenkins dashboard, navigate to the `intro-gradle-app` project page and
    click the Configure link on the left vertical navigation. Scroll to the bottom
    of the Configure page, click the Add `post-build-action` drop-down, and select
    the Archive the Artifacts option (see Figure [9-21](#A978-1-4842-1031-4_9_Chapter.html#Fig21)).


    ![A978-1-4842-1031-4_9_Fig21_HTML.jpg](A978-1-4842-1031-4_9_Fig21_HTML.jpg)


    Figure 9-21. Archive the artifacts post-build action


    In the Files to Archive textbox, enter the value `build/**/*.jar` to archive all
    generated JAR files (see Figure [9-22](#A978-1-4842-1031-4_9_Chapter.html#Fig22)).


    ![A978-1-4842-1031-4_9_Fig22_HTML.jpg](A978-1-4842-1031-4_9_Fig22_HTML.jpg)


    Figure 9-22. Files to archive configuration


    Save the configuration changes and trigger a manual build by clicking the Build
    Now button. Once the build is complete, the generated artifact should be available
    on the project dashboard, as shown in Figure [9-23](#A978-1-4842-1031-4_9_Chapter.html#Fig23).


    ![A978-1-4842-1031-4_9_Fig23_HTML.jpg](A978-1-4842-1031-4_9_Fig23_HTML.jpg)


    Figure 9-23. `ig-app.jar` artifact on project dashboard


    ## Publishing Test Results


    The Java plugin’s `test` task runs unit tests and generates reports in HTML, XML,
    and binary formats. These reports display the number of tests run and helps you
    drill down to identify failed tests. By default the HTML reports are stored in
    the `build/reports` folder, while the XML/binary results are stored in the `build/test-results`
    folder.


    The `ig-app` contains a JUnit test named `HelloWorldTest` in `src/test/java`.
    This unit test tests the functionality of the simple `HelloWorld` Java code. In
    this section, you will configure Jenkins to surface the generated reports on the
    project home page.


    JUnit results in Jenkins are published through a post-build action. Navigate to
    the `intro-gradle-app`’s configure page and select Publish JUnit Test Result Report
    (see Figure [9-24](#A978-1-4842-1031-4_9_Chapter.html#Fig24)).


    ![A978-1-4842-1031-4_9_Fig24_HTML.jpg](A978-1-4842-1031-4_9_Fig24_HTML.jpg)


    Figure 9-24. Test result post-build action


    Enter the value `build/test-results/*.xml` in the Test Report XMLs textbox (Figure
    [9-25](#A978-1-4842-1031-4_9_Chapter.html#Fig25)) and click Save button to save
    your changes.


    ![A978-1-4842-1031-4_9_Fig25_HTML.jpg](A978-1-4842-1031-4_9_Fig25_HTML.jpg)


    Figure 9-25. XML test report location config


    Trigger a new build. Upon successful completion, you should see the Latest Test
    Results link on the projects home page, as shown in Figure [9-26](#A978-1-4842-1031-4_9_Chapter.html#Fig26).
    Click the link and you should see test run details.


    ![A978-1-4842-1031-4_9_Fig26_HTML.jpg](A978-1-4842-1031-4_9_Fig26_HTML.jpg)


    Figure 9-26. Test results on the project home page'
