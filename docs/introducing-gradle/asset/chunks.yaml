    This section covers Groovy syntax, data types (simple and collections), and closures.
    If you are interested in learning more about Groovy’s language features, refer
    to the online documentation at [`www.groovy-lang.org/single-page-documentation.html`](http://www.groovy-lang.org/single-page-documentation.html)
    .


    ### Groovy Syntax


    Groovy absorbs much of its syntax from Java and has added simplifications that
    make it an easy to use. One such simplification is dropping the semicolon requirement
    at the end of a line when the line contains only one statement. Similarly, methods
    with at least one parameter can be invoked without parentheses. The following
    two statements are valid in Groovy:


    `println ("Hello World");`


    `println "Hello World"`


    Here are few more notable differences from Java:


    *   Methods and classes in Groovy are public by default.

    *   The `return` statement is optional in methods. If Groovy doesn’t find a `return`
    statement, it returns the last evaluated expression.

    *   Checked exceptions need not be caught or declared. Groovy automatically wraps
    those exceptions as a `RuntimeException`.

    *   By default, the following packages are imported—`java.lang.*`, `java.util.*`,
    `java.util.regex.*`, `java.net.*`, `java.io.*`, `groovy.lang.*`, `groovy.util.*`,
    `java.math.BigDecimal`, and `java.math.BigInteger`.


    ### Comments


    Groovy comments have the same syntax as that of Java. Single-line comments start
    with `//` and multi-line comments start with `/*` and end with `*/`. Groovydoc
    comments are similar to Javadoc comments and begin with `/**` and end with `*/`.


    ### Data Types


    The Groovy language offers several data types such as numbers, strings, and complex
    data types such as lists and maps.


    #### Strings


    Groovy supports two types of strings—regular Java strings that are instances of
    `java.lang.String` and GStrings, which are instances of `groovy.lang.GString`.
    Regular Groovy strings are declared by surrounding sequences of characters with
    single, double, or triple quotes. Here are a few examples of `String` declarations:


    `String message = ''Hello World''`


    `String processor = "Intel"`


    `String multiLine = ''''''This text is on line one`


       `line 2 and`


       `line 3''''''`


    `String escapedExample = ''Bob\''s Burgers''`


    Triple quotes syntax allows you to place the text across line boundaries without
    having to split and concatenate it on each line. Groovy preserves the whitespace
    in a multi-line text declared using triple quotes. For example, the variable `multiLine`
    shown above will hold text containing whitespaces and newline characters. If you
    were to save that text in a database, it would be saved as shown:


    `This text is on line one`


        `line 2 and`


        `line 3`


    Note


    Like Java, Strings in Groovy are immutable. If the contents of a string need to
    be changed, then it is recommended you use `StringBuilder` or `StringBuffer`.


    GStrings are strings that are escaped using double quotes (or slashes `//`) and
    contain Groovy expressions with the `${...}` syntax. When a GString is accessed,
    Groovy evaluates the expression and replaces the expression text with its value.
    An example of a GString is shown here:


    `String name = ''Luke''`


    `String message = "Hello ${name}"`


    `println message// This will print Hello Luke`


    When expressions are simple references to variables, the curly braces `{}` can
    be omitted. Hence, the `message` in the previous code can be rewritten as follows:


    `String message = "Hello $name"`


    Note


    Languages such as Ruby and Perl have the concept of string interpolation, which
    is the ability to replace an expression in a string with its value. Hence, GStrings
    are often referred to as interpolated strings.


    Groovy allows method calls, statements, and variable names inside the `${...}`
    Groovy expressions. Using GStrings, you can easily create templates without needing
    an external templating engine. Here is an example that invokes the `length()`
    and `toLowerCase()` methods inside expressions:


    `String name = ''Luke''`


    `String count = "${name.length()}"`


    `println count`


    `println "${name.toLowerCase()}"`


    #### Numbers


    Groovy supports both integers and floating-point numbers. Unlike Java, Groovy
    doesn’t offer primitive data types. Instead everything in Groovy is an object.
    This allows you to invoke methods on what looks like primitives as shown here:


    `8.toString()`


    `4.times {`


            `// Run a task`


    `}`


    `7.next()`


    By default, integers in Groovy are instances of `java.lang.Integer`, `java.lang.Long`,
    or `java.math.BigInteger`. Groovy will automatically pick the smallest class to
    accommodate the integer’s value. Here is an example:


    `println 90.class                     // Prints class java.lang.Integer`


    `println 9999999999999999999.class    //Prints class java.math.BigInteger`


    Floating-point numbers by default are instances of `java.math.BigDecimal`:


    `println 9.0.class    //Prints class java.math.BigDecimal`


    It is always possible to override the default behavior by explicitly associating
    a type or using suffixes as shown here:


    `println 90l.class    // Prints class java.lang.Long`


    `float foo = 9.0`


    `println foo.class    // Prints class java.lang.Float`


    If Groovy doesn’t support primitive types, then you might be wondering how basic
    arithmetic such as 2 + 3 or 10/2 using operators is possible. Groovy has overloaded
    the operators and the operators are actually method calls in Groovy. For example,
    2 + 3 is equivalent to `2.plus(3)`. Since the operators are methods, if one of
    the operands is a null, then executing the operation would result in a `NullPointerException`.


    Note


    Unlike Java, Groovy performs floating-point division by default. For example,
    the operation 2/4 would result in 0.5\. In Java, the same operation would result
    in `0` since Java detects both operands as integers and an integer division would
    be performed.'
