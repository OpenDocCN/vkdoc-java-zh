    ### Task Dependencies


    Nontrivial builds typically have several tasks and often a task needs another
    dependent task to be finished before it can run. For example, before you can run
    the package task to assemble an artifact, you must run the task to compile sources.
    Similarly, before the compile task can run, it might need to run a task to clean
    the output folder. Gradle provides several ways to declare such task dependencies.


    Listing [4-5](#A978-1-4842-1031-4_4_Chapter.html#FPar6) shows the `task-dependencies.gradle`
    build file, which contains three tasks—`clean`, `compile`, and `package`. This
    example takes two approaches to declaring dependencies. The `dependsOn` method
    makes `compile` task dependent on the `clean` task. To make `package` task dependent
    on `compile`, you have to use task’s `dependsOn` property. In Gradle, `package`
    is a reserved word and to use it as a task name, you must pass it as a parameter
    to the `task` method. Also, notice the use of the `<<` operator as a shortcut
    for the `doLast` method.


    Listing 4-5. task-dependencies.gradle


    `task clean << {`


    `println ''Executing clean task''`


    `}`


    `task compile << {`


    `println ''Executing compile task''`


    `}`


    `compile.dependsOn ''clean''`


    `task ("package", dependsOn : ''compile'') << {`


    `println ''Executing package task''`


    `}`


    Run the package task and you will see that the `clean` and `compile` tasks are
    executed prior to running the `package` task:


    `\chapter` `4` `>gradle -b task-dependencies.gradle package`


    `:clean`


    `Executing clean task`


    `:compile`


    `Executing compile task`


    `:package`


    `Executing package task`


    `BUILD SUCCESSFUL`


    To determine the order in which tasks need to be run, Gradle creates a Directed
    Acyclic Graph or DAG. Each task to be executed becomes a node in the graph. Dependencies
    between tasks are used to create edges between nodes. Figure [4-1](#A978-1-4842-1031-4_4_Chapter.html#Fig1)
    shows a representation of the DAG for the tasks in Listing [4-5](#A978-1-4842-1031-4_4_Chapter.html#FPar6).


    ![A978-1-4842-1031-4_4_Fig1_HTML.gif](A978-1-4842-1031-4_4_Fig1_HTML.gif)


    Figure 4-1.


    Gradle’s task DAG representation


    A DAG does not contain a directed cycle. In other words, it’s not possible to
    start at a node, follow a sequence of edges, and come back to the same node. Hence,
    Gradle never executes a task that has been executed before.


    Consider the scenario in Listing [4-6](#A978-1-4842-1031-4_4_Chapter.html#FPar7),
    where you have both tasks A and B dependent on a task C.


    Listing 4-6. task-dependencies2.gradle


    `task A << { println ''In task A'' }`


    `task B << { println ''In task B'' }`


    `task C << { println ''In task C'' }`


    `A.dependsOn ''C''`


    `B.dependsOn ''C''`


    Since Gradle creates a DAG for task execution, when tasks A and B run, Gradle
    runs task C only. Create a `task-dependencies2.gradle` file with contents of Listing
    [4-6](#A978-1-4842-1031-4_4_Chapter.html#FPar7) and run the following command
    to verify this:


    `\chapter` `4` `>gradle -b task-dependencies2.gradle A B`


    `:C`


    `In task C`


    `:A`


    `In task A`


    `:B`


    `In task B`


    Consider a different scenario, where task A depends on task B and task C, as shown
    in Listing [4-7](#A978-1-4842-1031-4_4_Chapter.html#FPar8).


    Listing 4-7. task-dependencies3.gradle


    `task A << { println ''In task A'' }`


    `task B << { println ''In task B'' }`


    `task C << { println ''In task C'' }`


    `A.dependsOn ''B''`


    `A.dependsOn ''C''`


    When task A is run, the `dependsOn` ensures that B and C are run prior to executing
    A. Create a `task-dependencies3.gradle` file with Listing [4-7](#A978-1-4842-1031-4_4_Chapter.html#FPar8)
    contents and execute task A. You should see the following output:


    `\chapter` `4` `>gradle -b task-dependencies3.gradle A`


    `:B`


    `In task B`


    `:C`


    `In task C`


    `:A`


    `In task A`'
