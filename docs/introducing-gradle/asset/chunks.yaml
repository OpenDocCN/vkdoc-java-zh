    ## 项目


    在 Gradle 中，项目是一个抽象概念，代表需要构建的产物。例如，一个 Gradle 项目可以是一个需要打包成 JAR 文件的 Java 应用程序。Gradle
    项目也可以代表一项需要完成的工作。例如，可以使用 Gradle 项目来部署一个应用程序。


    对于构建中的每个项目，Gradle 都会创建一个 `org.gradle.api.Project` 实例，并将其与构建脚本关联。这使得构建脚本能够在运行时使用
    Project 的 API 来访问属性和自定义构建行为（例如，通过创建新任务或跳过现有任务）。表 4-1 列出了 Project API 中一些常用的属性和方法。


    表 4-1.


    常用的 Project API 属性和方法


    | 属性/方法 | 描述 |

    | --- | --- |

    | `name` | 项目名称，可通过 `settings.gradle` 文件更改。默认为项目目录名称。 |

    | `description` | 项目描述。通常在 `build.gradle` 文件中设置。 |

    | `version` | 项目的版本。 |

    | `parent` | 返回父项目（如果存在）。 |

    | `group` | 用户定义的标识符，表示负责该项目的组或组织。例如，`org.hibernate` 或 `org.springframework`。
    |

    | `task` | 用于创建新任务的重载方法。 |

    | `dependencies` | 配置项目的依赖项。 |

    | `repositories` | 配置项目的仓库。 |

    | `defaultTasks` | 配置要为项目运行的默认任务名称。 |


    要访问 Project API 的属性/方法，可以使用 Gradle 与构建文件关联的隐式变量 `project`。清单 4-1 展示了一个位于 `chapter4`
    文件夹中、名为 `project-explicit.gradle` 的 Gradle 构建文件。该构建文件包含设置 Project 的 description
    并将其打印到控制台的代码。Gradle 将使用名称 `chapter4` 作为它为此构建创建的项目对象。


    清单 4-1\. project-explicit.gradle 示例


    `project.description = "Hello World Project"`


    `println "Project Description ${project.description}"`


    请注意，此新构建文件的名称并未使用 `build.gradle`。Gradle 默认会查找 `build.gradle` 文件来运行构建。也可以创建具有不同名称的构建文件。要使用这些文件触发构建，需要使用命令行选项
    `-b` 或 `--build-file`，后跟文件名。在本章中，你将处理大量示例，并会创建单独的构建文件，然后使用 `-b` 选项运行它们。运行 `project-explicit.gradle`
    构建文件将产生以下输出。


    `chapter` `4` `>gradle -b project-explicit.gradle`


    `Project Description Hello World Project`


    Gradle 还允许你在访问 Project API 的方法或属性时省略项目变量名：


    `description = "Hello World Project"`


    `println "Project Description ${description}"`


    可以使用 `ext {}` 闭包内的语法 `<<name>> =<< value>>` 或使用快捷方式 `ext.<<name>>=<<value>>` 来定义额外的项目级属性。清单
    4-2 展示了一个名为 `project-add-properties.gradle` 的新构建文件中定义的两个额外属性——`environment` 和
    `outputLang`。


    清单 4-2\. project-add-properties.gradle 示例


    `description = "Hello World Project"`


    `println "Project Description ${description}"`


    `ext {`


    `outputLang = "English"`


    `}`


    `ext.environment = "local"`


    `println "Output Language: ${project.outputLang}"`


    `println "Environment: ${environment}"`


    运行此脚本将产生以下输出。由于这些属性是在项目级别定义的，你可以直接访问它们的值，或使用 `project` 前缀。


    `chapter` `4` `>gradle -b project-add-properties.gradle`


    `Project Description Hello World Project`


    `Output Language: English`


    `Environment: local`


    ## 任务


    Gradle 项目由一个或多个执行构建步骤的任务组成。任务执行诸如编译 Java 源代码并生成类或清理目标文件夹等操作。任务也可以依赖于其他任务。例如，运行测试用例的任务依赖于编译
    Java 代码的任务。对应于构建文件中的每个任务，Gradle 都会创建一个 `org.gradle.api.Task` 实例。默认情况下，它将是 `org.gradle.api.DefaultTask`
    类。表 4-2 展示了一些常用的与任务相关的 API 属性和方法。


    表 4-2.


    常用的与任务相关的 API 属性和方法


    | 属性/方法 | 描述 |

    | --- | --- |

    | `name` | 任务名称。 |

    | `description` | 任务描述。 |

    | `group` | 任务所属的任务组。任务组提供了一种对相关任务进行逻辑分组的方法。 |

    | `enabled` | 决定任务是启用还是禁用。 |

    | `dependson` | 配置任务依赖关系。 |

    | `doFirst` | 在任务操作列表的开头添加一个操作。 |

    | `doLast` | 在任务操作列表的末尾添加一个操作。 |

    | `onlyIf` | 仅当传入的闭包返回 true 时才运行任务。 |


    在接下来的章节中，你将使用这些属性和方法来创建任务、添加操作以及声明任务之间的依赖关系。

