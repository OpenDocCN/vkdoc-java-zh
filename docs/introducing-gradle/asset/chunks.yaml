- fmt: "### Installing on Mac OS X\n\nUnpack the downloaded distribution and move\
    \ the contents of the `gradle-2.7-all` folder under `/Users/<<your_user_name>/tools`,\
    \ as shown in Figure [2-7](#A978-1-4842-1031-4_2_Chapter.html#Fig7).\n\n![A978-1-4842-1031-4_2_Fig7_HTML.jpg](A978-1-4842-1031-4_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7. Gradle installation location on Mac\n\nLaunch a terminal to edit\
    \ the initialization script `.profile` located in your home directory using this\
    \ command:\n\n`nano ∼/.profile`\n\nIn the `.profile` file, add the following lines:\n\
    \n`export GRADLE_HOME = /Users/<<your_user_name>/tools/gradle-2.7`\n\n`export\
    \ PATH=$PATH:$GRADLE_HOME/bin`\n\nSave the changes by pressing `CTRL+O`. Then\
    \ exit the file by pressing `CTRL+X`. Run the `gradle -v` command to verify that\
    \ the installation was successful.\n\n### Setting Gradle’s JVM Options\n\nLike\
    \ every other Java application, Gradle shares the same JVM options set by the\
    \ environment variable `JAVA_OPTS`. Especially in a complex project, chances are\
    \ that you will run into `OutOfMemory` errors. This may happen, for example, when\
    \ you are running a large number of `JUnit` tests or when you are generating a\
    \ large number of reports. To address this error, increase the heap size of the\
    \ Java virtual machine (JVM) used by Gradle. This is done globally by creating\
    \ a new environment variable called `GRADLE_OPTS`. To begin, we recommend using\
    \ the value `-Xmx512m` or `-Xmx1024m`.\n\n### Gradle Distribution\n\nGradle distribution\
    \ contains several files and folders, as you saw in Figure [2-2](#A978-1-4842-1031-4_2_Chapter.html#Fig2)\
    \ (see “Installing on Windows”). Table [2-1](#A978-1-4842-1031-4_2_Chapter.html#Tab1)\
    \ provides a brief summary of those and their purposes.\n\nTable 2-1. Gradle Distribution\
    \ Files and Folders\n\n| Folder | Description |\n| --- | --- |\n| `bin` | Contains\
    \ Gradle executables |\n| `docs` | Contains user guide (HTML/PDF), Javadoc, Groovydoc\
    \ and Gradle DSL references |\n| `init.d` | Contains any scripts that needs to\
    \ be run for each build |\n| `lib` | Contains dependencies (JARs, plugins) that\
    \ are needed for Gradle to run |\n| `media` | Contains Gradle icons and logos\
    \ |\n| `samples` | Contains templates and examples of complex builds and integration\
    \ with tools |\n| `src` | Contains the source code for Gradle |\n\n## Hello World\
    \ Gradle Script\n\nNow that you have successfully installed Gradle, you can create\
    \ your first Gradle script that does nothing but simply outputs the text `Hello\
    \ world!!`. When executing a build, Gradle by default looks for a build script\
    \ named `build.gradle`. You begin by creating a folder called `hello-world`. Inside\
    \ the folder, you create `build.gradle` file and then copy the code from Listing\
    \ [2-1](#A978-1-4842-1031-4_2_Chapter.html#FPar1).\n\nListing 2-1. Hello World\
    \ Task\n\n```\ntask helloWorld << {\n    println 'Hello world!!'\n}\n```\n\nOpen\
    \ a command prompt and navigate to the `hello-world` directory. Then execute the\
    \ `helloWorld` task using the command `gradle helloWorld`. You should see the\
    \ `Hello world!!` output as shown here:\n\n```\nC:\\apress\\chapter 2 \\hello-world>gradle\
    \ helloWorld\n:helloWorld\nHello world!!\nBUILD SUCCESSFUL\nTotal time: 3.594\
    \ secs\n```\n\nListing [2-1](#A978-1-4842-1031-4_2_Chapter.html#FPar1) uses Gradle’s\
    \ DSL to define the `helloWorld` task and add an action to print `Hello world!!`\
    \ to the console. You can accomplish this using a closure (code inside curly braces\
    \ `{}`) and Groovy’s `println` method, which is similar to Java’s `System.out.println`\
    \ method. As you will explore in [Chapter 4](#A978-1-4842-1031-4_4_Chapter.html),\
    \ Gradle tasks can contain multiple actions. The `<<` is a shortcut operator that\
    \ indicates the last action (in this case, printing to the console) to be executed\
    \ for a task.\n\nThe build output includes the name of the task run and the execution\
    \ time. It is possible to run the same build that just outputs the task’s output.\
    \ This is accomplished using the `-q` flag as shown here:\n\n```\nC:\\apress\\\
    chapter 2 \\hello-world>gradle -q helloWorld\nHello world!!\n```\n\n## Getting\
    \ Help\n\nYou can get a list of Gradle command-line options by using the `–h`\
    \ or `-help` options. Running the following command will produce output similar\
    \ to that shown in Figure [2-8](#A978-1-4842-1031-4_2_Chapter.html#Fig8).\n\n\
    ![A978-1-4842-1031-4_2_Fig8_HTML.jpg](A978-1-4842-1031-4_2_Fig8_HTML.jpg)\n\n\
    Figure 2-8. Gradle help command\n\n```\ngradle -help\n```\n\n## Gradle GUI\n\n\
    In addition to providing a powerful command-line interface, Gradle comes with\
    \ a graphical user interface for working with builds. Gradle’s GUI can be launched\
    \ using the `-gui` option. Figure [2-9](#A978-1-4842-1031-4_2_Chapter.html#Fig9)\
    \ shows the Gradle GUI launched from the `hello-world` folder:\n\n![A978-1-4842-1031-4_2_Fig9_HTML.jpg](A978-1-4842-1031-4_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9. Gradle GUI\n\n```\n\\chapter 2 \\hello-world>gradle –gui\n```\n\n\
    The Task Tree tab displays all the available tasks in the `build.gradle` file.\
    \ You can execute a task in the Task Tree by simply double-clicking on a task\
    \ name. The Favorites tab allows you to store frequently used Gradle commands.\
    \ The Command Line tab, as the name suggests, allows you to type and run any Gradle\
    \ commands that you would run using the command-line interface. The Setup tab\
    \ allows you to change configuration options such as the project directory and\
    \ log levels.\n\n## IDE Support\n\nThis book uses the command line to create and\
    \ build sample applications. If you are interested in using an IDE, the good news\
    \ is that all modern IDEs come with full Gradle integration.\n\n## Summary\n\n\
    This chapter walked you through the setup of Gradle on your local computer. You\
    \ also learned the different files/folders that come as part of the Gradle distribution\
    \ and looked at a simple Gradle build script.\n\nIn the next chapter, you’ll learn\
    \ fundamentals of the Groovy language.\n\n# 3. Groovy Language Primer\n\nGradle\
    \ build scripts are written using Groovy. This chapter covers the basics of the\
    \ Groovy programming language.\n\nGroovy is a dynamic programming language that\
    \ runs on the JVM. Groovy language is designed from the ground up to be source-\
    \ and binary-compatible with Java. This compatibility allows Groovy classes to\
    \ extend Java classes or leverage the vast array of Java frameworks and libraries.\
    \ The 1.0 version of Groovy was released in January of 2007. The next major release—Groovy\
    \ 2.0—was in July 2012. At the time of writing this book, the latest version of\
    \ Groovy was 2.4. Groovy is open source and is distributed under the Apache 2.0\
    \ License.\n\n## Installing Groovy\n\nGradle comes with its own Groovy library\
    \ and any existing Groovy installations will be ignored. In order to learn and\
    \ tinker with Groovy, you need to install Groovy first. An external Groovy installation\
    \ would allow you to get familiar with the language without messing up the Gradle\
    \ installation. Follow these steps for installing Groovy:\n\n1. Download Groovy\
    \ binaries from [`www.groovy-lang.org/download.html`](http://www.groovy-lang.org/download.html).\n\
    2. Extract the ZIP file and place the contents on your hard drive. For example,\
    \ `C:\\tools\\groovy-2.4.5`.\n3. Create a new environment variable called `GROOVY_HOME`,\
    \ pointing to the extracted location.\n4. Add `GROOVY_HOME\\bin` to the `PATH`\
    \ environment variable. For example, on a Windows machine, you would add `%GROOVY_HOME%\\\
    bin`.\n\nOnce Groovy is successfully installed, run the `groovy -v` or `groovy\
    \ -version` command on a command line to verify the installation. Figure [3-1](#A978-1-4842-1031-4_3_Chapter.html#Fig1)\
    \ shows the output of a successful installation.\n\n![A978-1-4842-1031-4_3_Fig1_HTML.jpg](A978-1-4842-1031-4_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1. Groovy version command"
