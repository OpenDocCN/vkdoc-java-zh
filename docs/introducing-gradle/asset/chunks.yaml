    ### Gradle 任务类型


    在本章前面部分，你已经了解到 Gradle 会为构建文件中找到的每个任务创建一个 `org.gradle.api.Task` 实例。默认情况下，这些任务是
    `org.gradle.api.DefaultTask` 的实例，因此继承了 `DefaultTask` 的属性和方法。Gradle 提供了几种开箱即用的任务类型，你的任务可以扩展这些类型，从而获得额外的功能，例如创建
    ZIP 归档或执行 Java 程序的能力。本节将介绍其中一些开箱即用的任务类型。


    #### Zip


    `Zip` 任务允许你从一组文件/目录创建 ZIP 归档。以下是一个 `Zip` 任务的示例：


    `task archiveTask (type : Zip) {`


        `archiveName  ''images.zip''`


        `from ''images''`


        `into "$buildDir/dist"`


    `}`


    `archiveTask` 从 `images` 目录读取文件/文件夹，创建一个名为 `images.zip` 的 ZIP 文件，并将其放置在 `build/dist`
    文件夹中。


    #### Copy


    `Copy` 任务允许你将文件从一个或多个源复制到目标目录。以下是一个 `Copy` 任务的示例：


    `task copyTask(type : Copy) {`


        `from ''src/config/dev.cert''`


        `from ''src/db''`


        `into ''dist''`


    `}`


    `copyTask` 会将一个名为 `dev.cert` 的单个文件以及 `src/db` 文件夹中的所有文件复制到 `dist` 文件夹中。


    #### Exec


    `Exec` 任务允许你执行一个命令行进程。示例如下：


    `task showWindowsVersion(type:Exec) {`


      `commandLine ''cmd'', ''ver''`


    `}`


    在 Windows 机器上，此任务会查找 Windows 操作系统版本。`commandLine` 属性需要完整的命令行，包括可执行文件和参数。但是，你需要将命令字符串按空格分割，并以逗号分隔的形式提供分割后的项。因此，命令
    `cmd ver` 被分割并作为 `cmd, ver` 提供。


    #### Delete


    `Delete` 任务允许你删除文件或文件夹。以下任务删除了两个文件夹——`libs` 和 `docs`。


    `task cleanTask (type : Delete) {`


        `delete ''build/libs'', ''build/docs''`


    `}`


    ## 构建生命周期


    每个 Gradle 构建都会经历三个不同的生命周期阶段：


    初始化阶段：在此阶段，Gradle 识别所有需要处理的 `build.gradle` 文件。对于单项目构建，只会识别一个构建文件。对于多项目构建（更多内容请参见第
    7 章），Gradle 会尝试定位与这些项目相关的所有可能的构建文件。一旦 Gradle 识别出参与构建的项目，它将为每个项目创建一个对应的 `org.gradle.api.Project`
    实例。   配置阶段：在此阶段，所有已识别项目的构建脚本都会被执行。请务必记住，此阶段不会执行任何实际的任务。相反，Gradle 会为每个项目构建一个任务对象的
    DAG（有向无环图）。Gradle 还会执行所有任务的配置部分，包括被禁用的任务。   执行阶段：在此阶段，Gradle 识别出需要执行的任务，并按正确的顺序运行它们。
     


