    to the console. Since `name` and `description` are task properties, you can access
    them directly to print their values.


    Create a new build file named `display-properties.gradle` and copy the contents
    of Listing [4-3](#A978-1-4842-1031-4_4_Chapter.html#FPar3). Execute the `displayProperties`
    task and you should see the following output. As you can see, the actions inside
    the `doFirst` were executed first, followed by the actions inside the `doLast`
    block.


    `\chapter` `4` `>gradle -b display-properties.gradle displayProperties`


    `:displayProperties`


    `Project Description: Sample Description for Project`


    `Task name displayProperties`


    `Task Description: Task to display properties`


    `Task Property 1: Prop Val`


    `BUILD SUCCESSFUL`


    `Total time: 4.046 secs`


    Tip


    When executing a task in the command-line, you don’t have to specify full task
    name. A camelCase task name can be run by abbreviating each word. For example,
    the `displayProperties` task can be run using the following shortcut: `gradle
    -b display-properties.gradle dP`.


    For Gradle to execute task(s), you need to pass in the name of the task(s) as
    part of the Gradle command, as you saw in the previous execution. Gradle provides
