- fmt: "Figure 5-1. Gradle build directory\n\nThe output of the `gradle build` command\
    \ shows the text `\"UP-TO-DATE\"` next to certain tasks. This text indicates that\
    \ the particular task was skipped. Certain Gradle tasks declare a set of inputs\
    \ to the task and a set of outputs from the task. For example, the `compileJava`\
    \ task takes a set of Java files as input and produces a set of compiled classes\
    \ as output. If Gradle determines that the inputs and outputs of a task have not\
    \ changed since the last execution, it automatically skips the task execution.\
    \ This feature is referred to as an incremental build and can considerably reduce\
    \ build times in larger projects.\n\n### Jar Task\n\nThe `Jar` task provided by\
    \ the Java plugin is responsible for assembling the JAR archive. The `Jar` task\
    \ provides a number of properties that allow you to configure the generated artifact.\
    \ One such property is `archiveName`. By default, the generated JAR file name\
    \ will be the name of the project. In this case, the project name is `hello-gradle`\
    \ and hence the `build/libs` folder contains a `hello-gradle.jar` file. The following\
    \ code shows the configuration needed to change the generated JAR name to `introducing-gradle.jar`:\n\
    \n```\njar {\n    archiveName = 'introducing-gradle.jar'\n}\n```\n\nThe `Jar`\
    \ task also automatically adds a manifest file to the JAR file it creates. The\
    \ manifest file typically contains information about the files packaged in a JAR\
    \ file. To add new entries to the manifest file, you can use the `Jar` task’s\
    \ `manifest` property. Listing 5-2 shows the modified `build.gradle` file with\
    \ configuration to add three new entries to the manifest file.\n\n**Listing 5-2.**\
    \ The New `hello-gradle` `build.gradle` File\n\n```\napply plugin: 'java'\n\n\
    jar {\n    manifest {\n        attributes (\n            'Main-Class' : 'HelloGradle',\n\
    \            'Implementation-Title' : project.name,\n            'Developer' \
    \ : 'Sudha Belida'\n        )\n    }\n}\n```\n\nRun the `gradle build` command.\
    \ After successful completion of the build, open the generated archive inside\
    \ the `builds/lib` folder using a ZIP utility such as WinZip. The `MANIFEST.MF`\
    \ file under `META-INF` folder should show these three new entries.\n\n> **Note:**\
    \ For the build to produce an updated JAR with manifest entries, you might have\
