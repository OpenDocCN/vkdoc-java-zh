- fmt: "# Projects\n\nA project in Gradle is an abstract concept that represents an\
    \ artifact that needs to be built. For example, a Gradle project could be a Java\
    \ application that gets assembled into a JAR file. A Gradle project can also represent\
    \ a piece of work that needs to be accomplished. For example, a Gradle project\
    \ can be used to deploy an application.\n\nFor each project in the build, Gradle\
    \ creates an instance of `org.gradle.api.Project` and associates it with the build\
    \ script. This allows the build scripts to use `Project`’s API to access properties\
    \ and customize build behavior at runtime (for example, by creating new tasks\
    \ or skipping existing tasks). Table [4-1](#A978-1-4842-1031-4_4_Chapter.html#Tab1)\
    \ lists some of the commonly used properties and methods in the `Project` API.\n\
    \n**Table 4-1.** Commonly Used Project API Properties and Methods\n\n| Property/Method\
    \ | Description |\n| --- | --- |\n| `name` | Name of the project and can be changed\
    \ using the `settings.gradle` file. By default, the project directory name. |\n\
    | `description` | Description of the project. Typically set in the `build.gradle`\
    \ file. |\n| `version` | Project’s version. |\n| `parent` | Returns the parent\
    \ project (if exists). |\n| `group` | User-defined identifier indicating group\
    \ or organization responsible for the project. For example, `org.hibernate` or\
    \ `org.springframework`. |\n| `task` | Overloaded method to create a new task.\
    \ |\n| `dependencies` | Configures dependencies for a project. |\n| `repositories`\
    \ | Configures repositories for a project. |\n| `defaultTasks` | Configures the\
    \ names of the default tasks to run for a project. |\n\nTo access `Project` API’s\
    \ properties/methods, you can use the implicit variable `project` that Gradle\
    \ associates with the build file. Listing [4-1](#A978-1-4842-1031-4_4_Chapter.html#FPar1)\
    \ shows a Gradle build file named `project-explicit.gradle` located in the `chapter4`\
    \ folder. The build file contains code that sets `Project`’s description and prints\
    \ it on the console. Gradle will use the name `chapter4` for the project object\
    \ it creates for this build.\n\n**Listing 4-1.** The `project-explicit.gradle`\
    \ Example\n\n```\nproject.description = \"Hello World Project\"\nprintln \"Project\
    \ Description ${project.description}\"\n```\n\nNotice that the code doesn’t use\
    \ the name `build.gradle` for this new build file. Gradle by default looks for\
    \ a `build.gradle` file to run a build. It is possible to create build files with\
    \ different names. In order to trigger builds using those files, you need to use\
    \ the command line option `-b` or `--build-file`, followed by the file name. In\
    \ this chapter, you will be working with a lot of examples and will be creating\
    \ separate build files and running them using the `-b` option. Running the `project-explicit.gradle`\
    \ build file would result in the following output.\n\n```\nchapter 4 >gradle -b\
    \ project-explicit.gradle\nProject Description Hello World Project\n```\n\nGradle\
    \ also allows you to leave out the `project` variable name when accessing `Project`\
    \ API methods or properties:\n\n```\ndescription = \"Hello World Project\"\nprintln\
    \ \"Project Description ${description}\"\n```\n\nIt is possible to define additional\
    \ project-level properties using the syntax `<<name>> = <<value>>` inside an `ext\
    \ {}` closure or using the shortcut `ext.<<name>> = <<value>>`. Listing [4-2](#A978-1-4842-1031-4_4_Chapter.html#FPar2)\
    \ shows two additional properties—`environment` and `outputLang`—defined inside\
    \ a new build file named `project-add-properties.gradle`.\n\n**Listing 4-2.**\
    \ The `project-add-properties.gradle` Example\n\n```\ndescription = \"Hello World\
    \ Project\"\nprintln \"Project Description ${description}\"\n\next {\n    outputLang\
    \ = \"English\"\n}\next.environment = \"local\"\n\nprintln \"Output Language:\
    \ ${project.outputLang}\"\nprintln \"Environment: ${environment}\"\n```\n\nRunning\
    \ this script will yield the following output. Since the properties were defined\
    \ at the project level, you can access their values directly or use the `project`\
    \ prefix.\n\n```\nchapter 4 >gradle -b project-add-properties.gradle\nProject\
    \ Description Hello World Project\nOutput Language: English\nEnvironment: local\n\
    ```\n\n# Tasks\n\nGradle projects are made up of one or more tasks that perform\
    \ build steps. Tasks execute actions such as compile Java source code and generate\
    \ classes or clean target folders. It is also possible for tasks to depend on\
    \ other tasks. For example, the task that runs test cases is dependent on the\
    \ task that compiles Java code. Corresponding to each task in the build file,\
    \ Gradle creates an instance of `org.gradle.api.Task`. By default it would be\
    \ `org.gradle.api.DefaultTask` class. Table [4-2](#A978-1-4842-1031-4_4_Chapter.html#Tab2)\
    \ shows some of the commonly used task-related API properties and methods.\n\n\
    **Table 4-2.** Commonly Used Task-Related API Properties and Methods\n\n| Property/Method\
    \ | Description |\n| --- | --- |\n| `name` | Name of the task. |\n| `description`\
    \ | Description of the task |\n| `group` | The task group that the task belongs\
    \ to. Task groups provide a way to logically group related tasks. |\n| `enabled`\
    \ | Decides if a task is enabled or disabled. |\n| `dependson` | Configures task\
    \ dependencies. |\n| `doFirst` | Adds an action to the beginning of the task’s\
    \ action list. |\n| `doLast` | Adds an action to the end of task’s action list.\
    \ |\n| `onlyIf` | Runs a task only if the passed in closure returns true. |\n\n\
    In the upcoming sections, you will be using these properties and methods to create\
    \ tasks, add actions, and declare dependencies between tasks."
  raw: '## Projects


    A project in Gradle is an abstract concept that represents an artifact that needs
    to be built. For example, a Gradle project could be a Java application that gets
    assembled into a JAR file. A Gradle project can also represent a piece of work
    that needs to be accomplished. For example, a Gradle project can be used to deploy
    an application.


    For each project in the build, Gradle creates an instance of `org.gradle.api.Project`
    and associates it with the build script. This allows the build scripts to use
    Project’s API to access properties and customize build behavior at runtime (for
    example, by creating new tasks or skipping existing tasks). Table [4-1](#A978-1-4842-1031-4_4_Chapter.html#Tab1)
    lists some of the commonly used properties and methods in the Project API.


    Table 4-1.


    Commonly Used Project API Properties and Methods


    | Property/Method | Description |

    | --- | --- |

    | `name` | Name of the project and can be changed using the `settings.gradle`
    file. By default, the project directory name. |

    | `description` | Description of the project. Typically set in the `build.gradle`
    file. |

    | `version` | Project’s version. |

    | `parent` | Returns the parent project (if exists). |

    | `group` | User-defined identifier indicating group or organization responsible
    for the project. For example, `org.hibernate` or `org.springframework`. |

    | `task` | Overloaded method to create a new task. |

    | `dependencies` | Configures dependencies for a project. |

    | `repositories` | Configures repositories for a project. |

    | `defaultTasks` | Configures the names of the default tasks to run for a project.
    |


    To access Project API’s properties/methods, you can use the implicit variable
    `project` that Gradle associates with the build file. Listing [4-1](#A978-1-4842-1031-4_4_Chapter.html#FPar1)
    shows a Gradle build file named `project-explicit.gradle` located in the `chapter4`
    folder. The build file contains code that sets Project’s description and prints
    it on the console. Gradle will use the name `chapter4` for the project object
    it creates for this build.


    Listing 4-1\. The project-explicit.gradle Example


    `project.description = "Hello World Project"`


    `println "Project Description ${project.description}"`


    Notice that the code doesn’t use the name `build.gradle` for this new build file.
    Gradle by default looks for a `build.gradle` file to run a build. It is possible
    to create build files with different names. In order to trigger builds using those
    files, you need to use the command line option `-b` or `--build-file`, followed
    by the file name. In this chapter, you will be working with a lot of examples
    and will be creating separate build files and running them using the `-b` option.
    Running the `project-explicit.gradle` build file would result in the following
    output.


    `chapter` `4` `>gradle -b project-explicit.gradle`


    `Project Description Hello World Project`


    Gradle also allows you to leave out the project variable name when accessing Project
    API methods or properties:


    `description = "Hello World Project"`


    `println "Project Description ${description}"`


    It is possible to define additional project-level properties using the `syntax
    <<name>> =<< value>>` inside an `ext {}` closure or using the shortcut `ext.<<name>>=<<value>>`.
    Listing [4-2](#A978-1-4842-1031-4_4_Chapter.html#FPar2) shows two additional properties—`environment`
    and `outputLang`—defined inside a new build file named `project-add-properties.gradle`.


    Listing 4-2\. The project-add-properties.gradle Example


    `description = "Hello World Project"`


    `println "Project Description ${description}"`


    `ext {`


    `outputLang = "English"`


    `}`


    `ext.environment = "local"`


    `println "Output Language: ${project.outputLang}"`


    `println "Environment: ${environment}"`


    Running this script will yield the following output. Since the properties were
    defined at the project level, you can access their values directly or use the
    `project` prefix.


    `chapter` `4` `>gradle -b project-add-properties.gradle`


    `Project Description Hello World Project`


    `Output Language: English`


    `Environment: local`


    ## Tasks


    Gradle projects are made up of one or more tasks that perform build steps. Tasks
    execute actions such as compile Java source code and generate classes or clean
    target folders. It is also possible for tasks to depend on other tasks. For example,
    the task that runs test cases is dependent on the task that compiles Java code.
    Corresponding to each task in the build file, Gradle creates an instance of `org.gradle.api.Task`.
    By default it would be `org.gradle.api. DefaultTask` class. Table [4-2](#A978-1-4842-1031-4_4_Chapter.html#Tab2)
    shows some of the commonly used task-related API properties and methods.


    Table 4-2.


    Commonly Used Task-Related API Properties and Methods


    | Property/Method | Description |

    | --- | --- |

    | `name` | Name of the task. |

    | `description` | Description of the task |

    | `group` | The task group that the task belongs to. Task groups provide a way
    to logically group related tasks. |

    | `enabled` | Decides if a task is enabled or disabled. |

    | `dependson` | Configures task dependencies. |

    | `doFirst` | Adds an action to the beginning of the task’s action list. |

    | `doLast` | Adds an action to the end of task’s action list. |

    | `onlyIf` | Runs a task only if the passed in closure returns true. |


    In the upcoming sections, you will be using these properties and methods to create
    tasks, add actions, and declare dependencies between tasks.'
