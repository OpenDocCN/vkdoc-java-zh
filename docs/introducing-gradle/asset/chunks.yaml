- fmt: "# Dealing with Additional Artifacts\n\nEarlier in the chapter you learned\
    \ that the `archives` configuration is used to declare artifacts produced by a\
    \ project. Plugins such as Java automatically associate the generated JAR file\
    \ with this configuration. However, if your project produces additional artifacts\
    \ (for example, a source JAR or a Javadoc JAR), you need to explicitly associate\
    \ those with the `archives` configuration in your build file. You achieve this\
    \ by providing to the `archives` configuration, the actual artifact or a task\
    \ that produces the artifact.\n\nTo better understand this concept, consider the\
    \ scenario where you want `sample-app` to distribute the following artifacts:\n\
    \n- A properties file named `app.properties` located at the root of the project.\n\
    - A JAR file containing the project’s source code\n\nTo follow along the rest\
    \ of the code samples, create an `app.properties` file in the `sample-app` folder\
    \ and copy the following content:\n\n```\nlicenseKey=XYFDLE\nencrypt=false\n```\n\
    \nListing [8-3](#A978-1-4842-1031-4_8_Chapter.html#FPar3) shows the portion of\
    \ `sample-app`’s `build.gradle` file that assigns the two artifacts from this\
    \ use case to `archives` configuration. You begin by declaring a reference to\
    \ the `app.properties` artifact. Then you create a `sourceJar` task that would\
    \ generate a JAR file with the source code and resource files in the `src/main`\
    \ folder. Finally, you use the `artifacts` block to add the properties artifact\
    \ and source JAR task to the `archives` configuration.\n\nListing 8-3\\. Associating\
    \ artifact to configuration\n\n```\ndef propertiesArtifact = file('app.properties')\n\
    \ntask sourceJar (type : Jar) {\n   classifier = 'sources'\n   from sourceSets.main.allSource\n\
    }\n\nartifacts {\n   archives propertiesArtifact\n   archives sourceJar\n}\n```\n\
    \nWith this listing added to `sample-app`’s `build.gradle` file, you can run the\
    \ `uploadArchives` task and it will automatically deploy the two new artifacts\
    \ along with the `sample-app.jar` file to the Maven repository. Running the command\
    \ should yield this output:\n\n```\n\\chapter 8 \\sample-app>gradle uploadArchives\n\
    :compileJava UP-TO-DATE\n:processResources UP-TO-DATE\n:classes UP-TO-DATE\n:jar\
    \ UP-TO-DATE\n:sourceJar\n:uploadArchives\nBUILD SUCCESSFUL\n```\n\nUpon successful\
    \ execution of the command, navigate to the URL `http://localhost:8081/nexus/content/repositories/snapshots/com/apress/gradle/intro/sample-app/1.0-SNAPSHOT/`\
    \ in a browser. You should see the three artifacts shown in Figure [8-4](#A978-1-4842-1031-4_8_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1031-4_8_Fig4_HTML.jpg](A978-1-4842-1031-4_8_Fig4_HTML.jpg)\n\n\
    Figure 8-4\\. Sample app’s three artifacts in Maven repo\n\nOpen the `sample-app-1.0-###########.properties`\
    \ file; it should contain the content shown in Figure [8-5](#A978-1-4842-1031-4_8_Chapter.html#Fig5).\n\
    \n![A978-1-4842-1031-4_8_Fig5_HTML.jpg](A978-1-4842-1031-4_8_Fig5_HTML.jpg)\n\n\
    Figure 8-5\\. Property file contents\n\n# Installing to a Gradle Cache\n\nIn [Chapter\
    \ 6](#A978-1-4842-1031-4_6_Chapter.html), you learned that Gradle maintains a\
    \ cache where it stores downloaded artifacts and metadata. This improves build\
    \ performance since the number of download requests made to external repositories\
    \ is significantly reduced. By default this cache is located in the `<<USER_HOME>>/.gradle/caches`\
