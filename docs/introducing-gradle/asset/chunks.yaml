    ## Introduction


    `Introducing Gradle` is a quick start-up primer on the Gradle build automation
    tool. The book starts by explaining the fundamentals behind Gradle and showing
    you how to set up and test Gradle on your local machine. It explains the basics
    of Groovy, the language for creating Gradle build scripts. It then delves deeply
    into concepts such as dependency management, projects, tasks, lifecycle phases,
    and plugins. It also discusses Gradle’s support for multi-projects and publishing
    artifacts to local and remote repositories. Finally, it concludes with a discussion
    of continuous integration (CI) and a review of Jenkins support for Gradle.


    ## How This Book Is Structured


    [Chapter 1](#A978-1-4842-1031-4_1_Chapter.html) starts with a gentle introduction
    to Gradle. It discusses reasons for adopting Gradle, and it provides an overview
    of its two alternatives: Ant and Maven.


    [Chapter 2](#A978-1-4842-1031-4_2_Chapter.html) focuses on setting up Gradle on
    your machine and testing the installation. It also provides an overview of different
    files/folders that come as part of the Gradle distribution, and it shows a simple
    Gradle build script.


    [Chapter 3](#A978-1-4842-1031-4_3_Chapter.html) delves into Groovy language basics
    and reviews its language features needed to build Gradle scripts.


    [Chapter 4](#A978-1-4842-1031-4_4_Chapter.html) discusses Gradle’s two building
    blocks—project and tasks. You will learn how to create tasks and declare dependencies
    between those tasks. You will also review the lifecycle of a Gradle build.


    [Chapter 5](#A978-1-4842-1031-4_5_Chapter.html) delves deep into Gradle’s support
    for Java projects. You will learn about the `Java` and `War` plugins and use them
    to build and deploy Java and web applications. The chapter also provides in-depth
    coverage of Gradle plugins. You will also look at building a custom plugin.


    [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html) provides a detailed coverage of
    dependency management. You will learn about principles behind dependency management
    and look at Gradle’s support for managing those dependencies. You will also learn
    about the different types of dependencies and how to resolve dependency conflicts.


    [Chapter 7](#A978-1-4842-1031-4_7_Chapter.html) reviews the intricacies of Gradle’s
    multi-project builds. You look at the two types of project structures—hierarchical
    and flat. You also learn how to declare common and project specific behavior in
    root and subproject build files.


    [Chapter 8](#A978-1-4842-1031-4_8_Chapter.html) discusses Gradle’s support for
    publishing artifacts. You learn about archives configuration for declaring artifacts
    produced by a project. You then install Nexus Maven repository manager and publish
    artifacts to the repository. You also learn about the configuration needed to
    deal with additional artifacts.


    [Chapter 9](#A978-1-4842-1031-4_9_Chapter.html) reviews continuous integration
    (CI) flow and explores Jenkins, a popular open source CI server. You look at installing
    Jenkins and configuring the necessary plugins to run a sample project located
    on the GitHub repository.


    ## Target Audience


    `Introducing Gradle` is intended for developers and automation engineers who want
    to get started quickly with Gradle. This book assumes basic knowledge of Java.
    No prior experience with Gradle is required.'
