- fmt: "### The Build Configuration\n\nNow that you have Nexus repository manager\
    \ running, the next step is to modify the `build.gradle` file. Listing [8-2](#A978-1-4842-1031-4_8_Chapter.html#FPar2)\
    \ shows the updated `build.gradle` file with configuration needed to publish to\
    \ a Maven repository.\n\n**Listing 8-2.** `build.gradle` for Publishing to Maven\
    \ Repo\n\n```\napply plugin: 'java'\napply plugin: 'maven'\ngroup = 'com.apress.gradle.intro'\n\
    archivesBaseName = 'sample-app'\nversion = '1.0-SNAPSHOT'\nuploadArchives {\n\
    \    repositories {\n        mavenDeployer {\n            repository (url: \"\
    http://localhost:8081/nexus/content/repositories/releases\") {\n             \
    \   authentication (userName: \"deployment\", password: \"deployment123\")\n \
    \           }\n            snapshotRepository (url: \"http://localhost:8081/nexus/content/repositories/snapshots\"\
    ) {\n                authentication (userName: \"deployment\", password: \"deployment123\"\
    )\n            }\n        }\n    }\n}\ndependencies {\n    compile 'ch.qos.logback:logback-classic:1.1.2'\n\
    }\nrepositories {\n    mavenCentral()\n}\n```\n\nFor Gradle to generate the `pom.xml`\
    \ file, it needs three Maven coordinates—`groupId`, `artifactId`, and `version`.\
    \ In Listing [8-2](#A978-1-4842-1031-4_8_Chapter.html#FPar2), you use Project’s\
    \ `group`, `archivesBaseName`, and `version` properties to provide those values.\
    \ Gradle provides the `mavenDeployer` method, which allows you to configure the\
    \ Maven repositories to publish artifacts. In Listing [8-2](#A978-1-4842-1031-4_8_Chapter.html#FPar2),\
    \ you configured a `snapshotRepository` (`http://localhost:8081/nexus/content/repositories/snapshots`)\
    \ to publish `SNAPSHOT` or development versions of artifacts and a release repository\
    \ (`http://localhost:8081/nexus/content/repositories/releases`) for released artifacts.\
    \ For Gradle to publish artifacts to Nexus, it needs to provide appropriate credentials.\
    \ In the build script, you are using the deployment user (password: `deployment123`)\
    \ that comes by default with Nexus installation. The deployment user has the \"\
    Nexus Deployment Role\" with privileges to write to repositories. This code then\
    \ adds a `logback` dependency to the project followed by a repositories block\
    \ pointing to Maven Central. The `mavenCentral()` configuration tells Gradle to\
    \ download the `logback` dependency from Maven Central. Although this configuration\
    \ could have used Nexus for downloading dependencies, it provides the possibility\
    \ of using separate repositories for downloading and uploading artifacts.\n\n\
    With this configuration in place, run the `gradle uploadArchives` command and\
    \ you will see this output:\n\n```\n\\chapter 8 \\sample-app>gradle uploadArchives\n\
    :compileJava UP-TO-DATE\n:processResources UP-TO-DATE\n:classes UP-TO-DATE\n:jar\n\
    :uploadArchives\nCould not find metadata com.apress.gradle.intro:sample-app:1.0-SNAPSHOT/maven-metadata.xml\
    \ in remote (http://localhost:8081/nexus/content/repositories/snapshots)\nCould\
    \ not find metadata com.apress.gradle.intro:sample-app/maven-metadata.xml in remote\
    \ (http://localhost:8081/nexus/content/repositories/snapshots)\nBUILD SUCCESSFUL\n\
    ```\n\nThe `\"Could not find metadata ...\"` error in this output is simply a\
    \ warning indicating that Gradle wasn’t able to find a `metadata.xml` file for\
    \ this artifact on the Nexus server. You would see this message when an artifact\
    \ is being published for the first time. The `metadata.xml` file would get created\
    \ on first publish and hence you should not see this message in future publishes.\n\
    \nUsing your browser, navigate to the Nexus Console at `http://localhost:8081/nexus/`.\
    \ From the vertical navigation on the left, click the Repositories link. You will\
    \ see all user-managed repositories displayed in the right pane. Since you published\
    \ a `SNAPSHOT` version of the artifact, click the repository path link next to\
    \ Snapshots (`http://localhost:8081/nexus/content/repositories/snapshots/`). This\
    \ will launch the Snapshot repository in a new browser tab. Click through the\
    \ links `com->apress->gradle->intro->sample-app->1.0-SNAPSHOT` and you will see\
    \ the generated artifacts, as shown in Figure [8-3](#A978-1-4842-1031-4_8_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1031-4_8_Fig3_HTML.jpg](A978-1-4842-1031-4_8_Fig3_HTML.jpg)\n\n\
    **Figure 8-3.** Sample app artifacts on Nexus\n\nYou can also use the URL `http://localhost:8081/nexus/content/repositories/snapshots/com/apress/gradle/intro/sample-app/1.0-SNAPSHOT/`\
    \ to directly access the generated artifacts. Notice that Nexus uses the artifact’s\
    \ group name (`com.apress.gradle.intro`), artifact’s name (`sample-app`), and\
    \ artifact’s version (`1.0-SNAPSHOT`) to construct this URL.\n\nOpen the generated\
    \ `sample-app-1.0-#########.pom` file and you will see that Gradle has automatically\
    \ added project’s `logback` dependency as a Maven dependency:\n\n```\n<project\
    \ \".....\">\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress.gradle.intro</groupId>\n\
    \    <artifactId>sample-app</artifactId>\n    <version>1.0-SNAPSHOT</version>\n\
    \    <dependencies>\n        <dependency>\n            <groupId>ch.qos.logback</groupId>\n\
    \            <artifactId>logback-classic</artifactId>\n            <version>1.1.2</version>\n\
    \            <scope>compile</scope>\n        </dependency>\n    </dependencies>\n\
    </project>\n```"
