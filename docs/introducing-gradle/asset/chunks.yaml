- fmt: "# Summary\n\nProjects typically depend on internal or third-party libraries.\
    \ Gradle provides excellent support for declaring and managing these dependencies.\
    \ This chapter reviewed the basics of declarative dependencies, and you learned\
    \ how to group dependencies using dependency configurations. You also learned\
    \ about three dependency types—external module, file, and project. External module\
    \ dependencies are declared using `group`, `name`, and `version` attributes, while\
    \ file dependencies are declared using their names. The chapter then reviewed\
    \ how Gradle resolves dependency conflicts and how to configure the resolution\
    \ strategies. Finally, you learned about the role repositories play in dependency\
    \ management and the several repository types that Gradle supports.\n\nThe next\
    \ chapter covers Gradle’s support for multi-projects.\n\n# 7. Multi-Project Builds\n\
    \nComplex enterprise projects are often split into several subprojects to ease\
    \ development, maintainability, and increase reuse. This chapter reviews how multi-projects\
    \ are structured and configured. You will build a sample multi-project to better\
    \ understand Gradle’s multi-project support. You will look at approaches for distributing\
    \ build logic across root and subprojects. You will also learn how to execute\
    \ single project builds or a full project build and declare dependencies between\
    \ projects.\n\n## Multi-Project Structure\n\nGradle supports development of complex\
    \ projects by allowing multiple Gradle projects to be nested under a single root\
    \ Gradle project. The root project allows you to define common dependencies and\
    \ build logic instead of spreading it across individual projects. Instead of building\
    \ each subproject individually, the root project provides one place to perform\
    \ a full build of all projects. The layout of a hierarchically structured multi-project\
    \ is shown in Figure 7-1.\n\n![A978-1-4842-1031-4_7_Fig1_HTML.gif](A978-1-4842-1031-4_7_Fig1_HTML.gif)\n\
    \nFigure 7-1. Standard hierarchical multi-project layout\n\nThe root project contains\
    \ three subproject folders, a `build.gradle` file, and a `settings.gradle` file.\
    \ Each subproject can contain an optional `build.gradle` file. To better understand\
    \ the multi-project builds and the significance of the `settings.gradle` file,\
    \ you will see how to implement a sample multi-project in the next section.\n\n\
    ### Sample Project\n\nThis sample multi-project is made up of a web subproject\
    \ that contains a user interface (WAR artifact), a service project (JAR artifact)\
    \ that contains a service layer code, and a repository project (JAR artifact)\
    \ that contains a persistence layer and entity code. The UI layer code relies\
    \ on the service layer code to complete the web requests. Hence, the web subproject\
    \ has a dependency over the service subproject. The service layer code delegates\
    \ all persistence operations to the repository layer. Hence, the service subproject\
    \ has a dependency over the repository subproject. Figure 7-2 provides a visual\
    \ representation of this dependency scenario.\n\n![A978-1-4842-1031-4_7_Fig2_HTML.gif](A978-1-4842-1031-4_7_Fig2_HTML.gif)\n\
    \nFigure 7-2. Sample project dependencies\n\nBegin the sample multi-project implementation\
    \ by creating the following folder structure on your local machine.\n\n```\nintro-root\n\
    \      web\n      service\n      repository\n```\n\nThe root project is `intro-root`\
    \ and the subprojects are `web`, `service`, and `repository`. Create an empty\
    \ `build.gradle` file in the root project and run the `gradle projects` command.\
    \ The task `projects` is a built-in Gradle task that displays subprojects in a\
    \ hierarchical fashion. The output of the command is as follows:\n\n```\n\\chapter\
    \ 7 \\intro-root>gradle projects\n\n:projects\n------------------------------------------------------------\n\
    Root project\n------------------------------------------------------------\nRoot\
    \ project 'intro-root'\nNo sub-projects\n\nTo see a list of the tasks of a project,\
    \ run gradle <project-path>:tasks\nFor example, try running gradle :tasks\n\n\
    BUILD SUCCESSFUL\n```\n\nFrom the output you can see that Gradle found the root\
    \ project `intro-root` but didn’t find any subprojects inside it. This is where\
    \ the `settings.gradle` comes into picture. In this file, you specify the subprojects\
    \ that Gradle needs to include in the build. Let’s fix the build by creating a\
    \ `settings.gradle` file inside the `intro-root` folder. You then use the `include`\
    \ method to add the three subprojects, as shown. The `include` method takes the\
    \ subproject directory names as its parameters.\n\n```\ninclude 'web', 'service',\
    \ 'repository'\n```\n\nUpon running the `gradle projects` command, you will see\
    \ that Gradle detects all four projects (including root):\n\n```\n\\chapter 7\
    \ \\intro-root>gradle projects\n\n:projects\n------------------------------------------------------------\n\
    Root project\n------------------------------------------------------------\nRoot\
    \ project 'intro-root'\n+--- Project ':repository'\n+--- Project ':service'\n\\\
    --- Project ':web'\n\nTo see a list of the tasks of a project, run gradle <project-path>:tasks\n\
    For example, try running gradle :repository:tasks\n\nBUILD SUCCESSFUL\n```\n\n\
    The output also shows Gradle’s use of \"`:`\" to indicate project hierarchy. For\
    \ example, `:service` indicates that the service project is one level below the\
    \ root (referred implicitly without a name). If your project exists under `service/soap/util`,\
    \ then it will be referred to using `:service:soap:util`.\n\n### Flat Layout\n\
    \nIn addition to the hierarchical project layout you saw in the previous section,\
    \ Gradle supports a “flat layout” for multi-project development. In this organization,\
    \ all the projects exist as siblings of the root project. Figure 7-3 shows the\
    \ `intro-root` multi-project organized using the flat layout.\n\n![A978-1-4842-1031-4_7_Fig3_HTML.gif](A978-1-4842-1031-4_7_Fig3_HTML.gif)\n\
    \nFigure 7-3. `intro-root` in flat layout\n\nTo get familiar with the flat layout\
    \ way of organizing projects, recreate the `intro-root` sample application. Start\
    \ by creating a folder named `flat-layout` on your local file system. Inside this\
    \ folder, create four subfolders—`web`, `service`, `repository`, and `intro-root`.\
    \ Under `intro-root`, create an empty `build.gradle` file and an empty `settings.gradle`\
    \ file. With flat layouts, you use the `includeFlat` method instead of the `include`\
    \ method for including projects. The `includeFlat` method takes the directory\
    \ names of the subprojects as its parameters. Copy these contents into `settings.gradle`\
    \ file:\n\n```\nincludeFlat 'web', 'service', 'repository'\n```\n\nUsing command\
    \ prompt, navigate to the `intro-root` folder and run the `gradle projects` command.\
    \ You should see output similar to this, with Gradle recognizing all the projects:\n\
    \n```\n\\chapter 7 \\flat-layout\\intro-root>gradle projects\n\n:projects\n------------------------------------------------------------\n\
    Root project\n------------------------------------------------------------\nRoot\
    \ project 'intro-root'\n+--- Project ':repository'\n+--- Project ':service'\n\\\
    --- Project ':web'\n\nTo see a list of the tasks of a project, run gradle <project-path>:tasks\n\
    For example, try running gradle :repository:tasks\n\nBUILD SUCCESSFUL\n```\n\n\
    The choice of a hierarchical or flat layout for organizing your project is purely\
    \ your personal preference. We find the hierarchical layout much cleaner and the\
    \ “hierarchical” `intro-root` project is used in this chapter."
  raw: '## Summary


    Projects typically depend on internal or third-party libraries. Gradle provides
    excellent support for declaring and managing these dependencies. This chapter
    reviewed the basics of declarative dependencies, and you learned how to group
    dependencies using dependency configurations. You also learned about three dependency
    types—external module, file, and project. External module dependencies are declared
    using `group`, `name`, and `version` attributes, while file dependencies are declared
    using their names. The chapter then reviewed how Gradle resolves dependency conflicts
    and how to configure the resolution strategies. Finally, you learned about the
    role repositories play in dependency management and the several repository types
    that Gradle supports.


    The next chapter covers Gradle’s support for multi-projects.


    # 7. Multi-Project Builds


    Complex enterprise projects are often split into several subprojects to ease development,
    maintainability, and increase reuse. This chapter reviews how multi-projects are
    structured and configured. You will build a sample multi-project to better understand
    Gradle’s multi-project support. You will look at approaches for distributing build
    logic across root and subprojects. You will also learn how to execute single project
    builds or a full project build and declare dependencies between projects.


    ## Multi-Project Structure


    Gradle supports development of complex projects by allowing multiple Gradle projects
    to be nested under a single root Gradle project. The root project allows you to
    define common dependencies and build logic instead of spreading it across individual
    projects. Instead of building each subproject individually, the root project provides
    one place to perform a full build of all projects. The layout of a hierarchically
    structured multi-project is shown in Figure [7-1](#A978-1-4842-1031-4_7_Chapter.html#Fig1).


    ![A978-1-4842-1031-4_7_Fig1_HTML.gif](A978-1-4842-1031-4_7_Fig1_HTML.gif)


    Figure 7-1.


    Standard hierarchical multi-project layout


    The root project contains three subproject folders, a `build.gradle` file, and
    a `settings.gradle` file. Each subproject can contain an optional `build.gradle`
    file. To better understand the multi-project builds and the significance of the
    `settings.gradle` file, you will see how to implement a sample multi-project in
    the next section.


    ### Sample Project


    This sample multi-project is made up of a web subproject that contains a user
    interface (WAR artifact), a service project (JAR artifact) that contains a service
    layer code, and a repository project (JAR artifact) that contains a persistence
    layer and entity code. The UI layer code relies on the service layer code to complete
    the web requests. Hence, the web subproject has a dependency over the service
    subproject. The service layer code delegates all persistence operations to the
    repository layer. Hence, the service subproject has a dependency over the repository
    subproject. Figure [7-2](#A978-1-4842-1031-4_7_Chapter.html#Fig2) provides a visual
    representation of this dependency scenario.


    ![A978-1-4842-1031-4_7_Fig2_HTML.gif](A978-1-4842-1031-4_7_Fig2_HTML.gif)


    Figure 7-2.


    Sample project dependencies


    Begin the sample multi-project implementation by creating the following folder
    structure on your local machine.


    `intro-root`


          `web`


          `service`


          `repository`


    The `root` project is `intro-root` and the subprojects are `web`, `service`, and
    `repository`. Create an empty `build.gradle` file in the `root` project and run
    the `gradle projects` command. The task `projects` is a built-in Gradle task that
    displays subprojects in a hierarchical fashion. The output of the command is as
    follows:


    `\chapter` `7` `\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `No sub-projects`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :tasks`


    `BUILD SUCCESSFUL`


    From the output you can see that Gradle found the root project `intro-root` but
    didn’t find any subprojects inside it. This is where the `settings.gradle` comes
    into picture. In this file, you specify the subprojects that Gradle needs to include
    in the build. Let’s fix the build by creating a `settings.gradle` file inside
    the `intro-root` folder. You then use the `include` method to add the three subprojects,
    as shown. The `include` method takes the subproject directory names as its parameters.


    `include ''web'', ''service'', ''repository''`


    Upon running the `gradle projects` command, you will see that Gradle detects all
    four projects (including root):


    `\chapter` `7` `\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `+--- Project '':repository''`


    `+--- Project '':service''`


    `\--- Project '':web''`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :repository:tasks`


    `BUILD SUCCESSFUL`


    The output also shows Gradle’s use of "`:`" to indicate project hierarchy. For
    example, `:service` indicates that the service project is one level below the
    root (referred implicitly without a name). If your project exists under `service/soap/util`,
    then it will be referred to using `:service:soap:util`.


    ### Flat Layout


    In addition to the hierarchical project layout you saw in the previous section,
    Gradle supports a “flat layout” for multi-project development. In this organization,
    all the projects exist as siblings of the `root` project. Figure [7-3](#A978-1-4842-1031-4_7_Chapter.html#Fig3)
    shows the `intro-root` multi-project organized using the flat layout.


    ![A978-1-4842-1031-4_7_Fig3_HTML.gif](A978-1-4842-1031-4_7_Fig3_HTML.gif)


    Figure 7-3.


    intro-root in flat layout


    To get familiar with the flat layout way of organizing projects, recreate the
    `intro-root` sample application. Start by creating a folder named `flat-layout`
    on your local file system. Inside this folder, create four subfolders—`web`, `service`,
    `repository`, and `intro-root`. Under `intro-root`, create an empty `build.gradle`
    file and an empty `settings.gradle` file. With flat layouts, you use the `includeFlat`
    method instead of the `include` method for including projects. The `includeFlat`
    method takes the directory names of the subprojects as its parameters. Copy these
    contents into `settings.gradle` file:


    `includeFlat ''web'', ''service'', ''repository''`


    Using command prompt, navigate to the `intro-root` folder and run the `gradle
    projects` command. You should see output similar to this, with Gradle recognizing
    all the projects:


    `\chapter` `7` `\flat-layout\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `+--- Project '':repository''`


    `+--- Project '':service''`


    `\--- Project '':web''`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :repository:tasks`


    `BUILD SUCCESSFUL`


    The choice of a hierarchical or flat layout for organizing your project is purely
    your personal preference. We find the hierarchical layout much cleaner and the
    “hierarchical” `intro-root` project is used in this chapter.'
  trans: '

    ## 摘要


    项目通常依赖于内部或第三方库。Gradle 为声明和管理这些依赖提供了出色的支持。本章回顾了声明式依赖的基础知识，并学习了如何使用依赖配置对依赖进行分组。你还了解了三种依赖类型——外部模块、文件和项目。外部模块依赖使用
    `group`、`name` 和 `version` 属性声明，而文件依赖则使用其名称声明。接着，本章回顾了 Gradle 如何解决依赖冲突以及如何配置解决策略。最后，你了解了仓库在依赖管理中的作用以及
    Gradle 支持的几种仓库类型。


    下一章将介绍 Gradle 对多项目的支持。


    # 7. 多项目构建


    复杂的企业项目通常被拆分为多个子项目，以简化开发、提高可维护性并增强复用性。本章将回顾多项目的结构和配置方式。你将构建一个示例多项目，以更好地理解 Gradle
    的多项目支持。你将了解如何在根项目和子项目之间分发构建逻辑。你还将学习如何执行单个项目构建或完整项目构建，以及如何在项目之间声明依赖。


    ## 多项目结构


    Gradle 通过允许在单个根 Gradle 项目下嵌套多个 Gradle 项目来支持复杂项目的开发。根项目允许你定义公共依赖和构建逻辑，而不是将其分散到各个项目中。根项目提供了一个对所有项目执行完整构建的单一位置，而无需单独构建每个子项目。分层结构的多项目布局如图
    7-1 所示。


    ![A978-1-4842-1031-4_7_Fig1_HTML.gif](img/A978-1-4842-1031-4_7_Fig1_HTML.gif)


    图 7-1.


    标准分层多项目布局


    根项目包含三个子项目文件夹、一个 `build.gradle` 文件和一个 `settings.gradle` 文件。每个子项目可以包含一个可选的 `build.gradle`
    文件。为了更好地理解多项目构建以及 `settings.gradle` 文件的重要性，你将在下一节中了解如何实现一个示例多项目。


    ### 示例项目


    此示例多项目由一个包含用户界面（WAR 工件）的 Web 子项目、一个包含服务层代码的服务项目（JAR 工件）以及一个包含持久层和实体代码的仓库项目（JAR
    工件）组成。UI 层代码依赖服务层代码来完成 Web 请求。因此，Web 子项目依赖于服务子项目。服务层代码将所有持久化操作委托给仓库层。因此，服务子项目依赖于仓库子项目。图
    7-2 直观地展示了这种依赖关系。


    ![A978-1-4842-1031-4_7_Fig2_HTML.gif](img/A978-1-4842-1031-4_7_Fig2_HTML.gif)


    图 7-2.


    示例项目依赖关系


    首先，在你的本地机器上创建以下文件夹结构，开始实现示例多项目。


    `intro-root`


          `web`


          `service`


          `repository`


    `root` 项目是 `intro-root`，子项目是 `web`、`service` 和 `repository`。在 `root` 项目中创建一个空的
    `build.gradle` 文件，并运行 `gradle projects` 命令。`projects` 任务是一个内置的 Gradle 任务，它以分层方式显示子项目。命令输出如下：


    `\chapter` `7` `\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `No sub-projects`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :tasks`


    `BUILD SUCCESSFUL`


    从输出中可以看到，Gradle 找到了根项目 `intro-root`，但没有在其中找到任何子项目。这就是 `settings.gradle` 发挥作用的地方。在此文件中，你需要指定
    Gradle 在构建中需要包含的子项目。让我们通过在 `intro-root` 文件夹内创建一个 `settings.gradle` 文件来修复构建。然后，使用
    `include` 方法添加三个子项目，如下所示。`include` 方法将子项目目录名称作为其参数。


    `include ''web'', ''service'', ''repository''`


    运行 `gradle projects` 命令后，你将看到 Gradle 检测到了所有四个项目（包括根项目）：


    `\chapter` `7` `\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `+--- Project '':repository''`


    `+--- Project '':service''`


    `\--- Project '':web''`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :repository:tasks`


    `BUILD SUCCESSFUL`


    输出还显示了 Gradle 使用“`:`”来表示项目层次结构。例如，`:service` 表示服务项目位于根项目（隐式引用，无需名称）下一级。如果你的项目位于
    `service/soap/util` 下，那么它将使用 `:service:soap:util` 来引用。


    ### 扁平布局


    除了上一节中介绍的分层项目布局外，Gradle 还支持用于多项目开发的“扁平布局”。在这种组织结构中，所有项目都作为 `root` 项目的同级项目存在。图
    7-3 展示了使用扁平布局组织的 `intro-root` 多项目。


    ![A978-1-4842-1031-4_7_Fig3_HTML.gif](img/A978-1-4842-1031-4_7_Fig3_HTML.gif)


    图 7-3.


    扁平布局中的 intro-root


    为了熟悉扁平布局的组织项目方式，请重新创建 `intro-root` 示例应用程序。首先，在你的本地文件系统上创建一个名为 `flat-layout` 的文件夹。在此文件夹内，创建四个子文件夹——`web`、`service`、`repository`
    和 `intro-root`。在 `intro-root` 下，创建一个空的 `build.gradle` 文件和一个空的 `settings.gradle`
    文件。对于扁平布局，你需要使用 `includeFlat` 方法而不是 `include` 方法来包含项目。`includeFlat` 方法将子项目的目录名称作为其参数。将这些内容复制到
    `settings.gradle` 文件中：


    `includeFlat ''web'', ''service'', ''repository''`


    使用命令提示符，导航到 `intro-root` 文件夹并运行 `gradle projects` 命令。你应该会看到类似如下的输出，Gradle 识别了所有项目：


    `\chapter` `7` `\flat-layout\intro-root>gradle projects`


    `:projects`


    `------------------------------------------------------------`


    `Root project`


    `------------------------------------------------------------`


    `Root project ''intro-root''`


    `+--- Project '':repository''`


    `+--- Project '':service''`


    `\--- Project '':web''`


    `To see a list of the tasks of a project, run gradle <project-path>:tasks`


    `For example, try running gradle :repository:tasks`


    `BUILD SUCCESSFUL`


    选择分层布局还是扁平布局来组织项目纯粹是个人偏好。我们认为分层布局更加清晰，本章将使用“分层”的 `intro-root` 项目。

