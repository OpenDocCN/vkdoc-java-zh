- fmt: "### Consuming the Plugin\n\nTo consume the newly created plugin, create a\
    \ new Gradle project named `plugin-consumer`. In this project, you add the plugin’s\
    \ build number to the generated JAR’s `MANIFEST.MF` file.\n\nTo begin, create\
    \ the `plugin-consumer` folder on your file system, next to the `repo` and `build-gradle-plugin`\
    \ folders.\n\n![A978-1-4842-1031-4_5_Fig8_HTML.jpg](A978-1-4842-1031-4_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8. Project directory structure\n\nThen create a `build.gradle` file\
    \ for the `plugin-consumer` project. Since this is a Java project that generates\
    \ a JAR artifact, apply the Java plugin. You also need to apply and configure\
    \ the `build-number-plugin`, as shown here:\n\n```\napply plugin: 'java'\napply\
    \ plugin: 'build-number-plugin'\nbuildNumber {\n    numberType = 'alphanumeric'\n\
    \    alphaNumLength = 5\n}\n```\n\nThe next step is to add the plugin JAR file\
    \ to the build script’s classpath so Gradle can find the plugin classes. You accomplish\
    \ this using a `buildscript` block:\n\n```\nbuildscript {\n    repositories {\n\
    \        flatDir {\n            dirs '../repo'\n        }\n    }\n    dependencies\
    \ { classpath 'com.apress.gradle:build-number-plugin-1.0.0' }\n}\n```\n\nFinally,\
    \ you use the `doFirst` method on the `jar` task to add a new `manifest` entry,\
    \ as shown here:\n\n```\njar.doFirst {\n    manifest {\n        attributes('Build-Number':\
    \ project.buildNumber.value)\n    }\n}\n```\n\nYou are now ready to generate the\
    \ consumer plugin. Using a command line, navigate to the `plugin-consumer` folder\
    \ and run the `gradle build` command. In the output, you should see the `buildnumbertask`\
    \ getting triggered followed by Java plugin’s task (`compileJava`, `jar`, etc.)\
    \ execution. The output should look as follows:\n\n```\n\\plugin-consumer>gradle\
    \ build\n:buildnumbertask\n:compileJava UP-TO-DATE\n:processResources UP-TO-DATE\n\
    :classes UP-TO-DATE\n:jar\n:assemble\n:compileTestJava UP-TO-DATE\n:processTestResources\
    \ UP-TO-DATE\n:testClasses UP-TO-DATE\n:test UP-TO-DATE\n:check UP-TO-DATE\n:build\n\
    BUILD SUCCESSFUL\n```\n\nUpon successful completion of the build, navigate to\
    \ the `plugin-consumer\\build\\libs` folder. Using a ZIP utility such as WinZip\
    \ or WinRAR, open `plugin-consumer.jar` and open the `MANIFEST.MF` file under\
    \ `META-INF`. You should see a `Build-Number` entry containing alphanumeric text,\
    \ similar to Figure 5-9.\n\n![A978-1-4842-1031-4_5_Fig9_HTML.jpg](A978-1-4842-1031-4_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9. Build number in the MANIFEST file\n\nTo generate build numbers using\
    \ a timestamp, replace the `buildNumber` configuration block in `build.gradle`\
    \ file with this code:\n\n```\nbuildNumber {\n    numberType = 'timestamp'\n}\n\
    ```\n\nRun the command `gradle clean build` and it should delete the existing\
    \ JAR file and generate a new one. Upon successful build execution, you should\
    \ see a timestamp-based build number in the generated manifest file.\n\nThis concludes\
    \ the stand-alone project-based plugin development. You can publish this plugin\
    \ to an internal Maven repository and make it available to rest of the development\
    \ team. You can also publish it to Gradle Plugin Portal. The Gradle Plugin Portal\
    \ at [https://plugins.gradle.org/](https://plugins.gradle.org/) hosts numerous\
    \ open source plugins contributed by developers across the world. The portal allows\
    \ you to search for plugins you need and displays the necessary configuration\
    \ to use those plugins. You can follow the instructions for the submission process\
    \ at [https://plugins.gradle.org/docs/submit](https://plugins.gradle.org/docs/submit).\n\
    \n## Summary\n\nGradle greatly simplifies building of Java projects using plugins\
    \ that provide tasks and sensible defaults. This chapter reviewed the `java` plugin\
    \ that compiles Java code, runs unit tests, and assembles JAR archives. You then\
    \ used the `javadoc` plugin to generate API documentation. The `war` plugin allows\
    \ you to build and package web applications.\n\nGradle also provides excellent\
    \ support for building custom plugins. You learned that there are three ways to\
    \ package custom plugins—build scripts, use a `buildSrc` directory, and create\
    \ a stand-alone project. You learned the basics of creating a simple Java and\
    \ Groovy plugin using the `buildSrc` approach. You then built on those concepts\
    \ to develop a plugin using a stand-alone project approach.\n\nIn the next chapter,\
    \ you will read all about Gradle’s support for managing dependencies and interacting\
    \ with various artifact repositories.\n\n# 6. Dependency Management\n\nSoftware\
    \ projects are rarely built in isolation. They either depend on internal projects\
    \ or other open source libraries. This chapter looks at how Gradle helps you effectively\
    \ manage these dependencies. You will learn about the different types of dependencies,\
    \ as well as learn how to group dependencies and resolve dependency conflicts.\
    \ You will also review repositories that store artifacts."
  raw: '#### Consuming the Plugin


    To consume the newly created plugin, create a new Gradle project named `plugin-consumer`.
    In this project, you add the plugin’s build number to the generated JAR’s `MANIFEST.MF`
    file.


    To begin, create the `plugin-consumer` folder on your file system, next to the
    `repo` and `build-gradle-plugin` folders.


    ![A978-1-4842-1031-4_5_Fig8_HTML.jpg](A978-1-4842-1031-4_5_Fig8_HTML.jpg)


    Figure 5-8.


    Project directory structure


    Then create a `build.gradle` file for the `plugin-consumer` project. Since this
    is a Java project that generates a JAR artifact, apply the Java plugin. You also
    need to apply and configure the `build-number-plugin`, as shown here:


    `apply plugin: ''java''`


    `apply plugin: ''build-number-plugin''`


    `buildNumber {`


        `numberType = ''alphanumeric''`


        `alphaNumLength = 5`


    `}`


    The next step is to add the plugin JAR file to the build script’s classpath so
    Gradle can find the plugin classes. You accomplish this using a `buildscript`
    block:


    `buildscript {`


        `repositories {`


            `flatDir {`


                `dirs ''../repo''`


            `}`


        `}`


        `dependencies { classpath ''com.apress.gradle:build-number-plugin-1.0.0''
    }`


    `}`


    Finally, you use the `doFirst` method on the `jar` task to add a new `manifest`
    entry, as shown here:


    `jar.doFirst {`


        `manifest {`


            `attributes(''Build-Number'': project.buildNumber.value)`


        `}`


    `}`


    You are now ready to generate the consumer plugin. Using a command line, navigate
    to the `plugin-consumer` folder and run the `gradle build` command. In the output,
    you should see the `buildnumbertask` getting triggered followed by Java plugin’s
    task (`compileJava`, `jar`, etc.) execution. The output should look as follows:


    `\plugin-consumer>gradle build`


    `:buildnumbertask`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:jar`


    `:assemble`


    `:compileTestJava UP-TO-DATE`


    `:processTestResources UP-TO-DATE`


    `:testClasses UP-TO-DATE`


    `:test UP-TO-DATE`


    `:check UP-TO-DATE`


    `:build`


    `BUILD SUCCESSFUL`


    Upon successful completion of the build, navigate to the `plugin-consumer\build\libs`
    folder. Using a ZIP utility such as WinZip or WinRAR, open `plugin-consumer.jar`
    and open the `MANIFEST.MF` file under `META-INF`. You should see a `Build-Number`
    entry containing alphanumeric text, similar to Figure [5-9](#A978-1-4842-1031-4_5_Chapter.html#Fig9).


    ![A978-1-4842-1031-4_5_Fig9_HTML.jpg](A978-1-4842-1031-4_5_Fig9_HTML.jpg)


    Figure 5-9.


    Build number in the MANIFEST file


    To generate build numbers using a timestamp, replace the `buildNumber` configuration
    block in `build.gradle` file with this code:


    `buildNumber {`


        `numberType = ''timestamp''`


    `}`


    Run the command `gradle clean build` and it should delete the existing JAR file
    and generate a new one. Upon successful build execution, you should see a timestamp-based
    build number in the generated manifest file.


    This concludes the stand-alone project-based plugin development. You can publish
    this plugin to an internal Maven repository and make it available to rest of the
    development team. You can also publish it to Gradle Plugin Portal. The Gradle
    Plugin Portal at [`https://plugins.gradle.org/`](https://plugins.gradle.org/)
    hosts numerous open source plugins contributed by developers across the world.
    The portal allows you to search for plugins you need and displays the necessary
    configuration to use those plugins. You can follow the instructions for the submission
    process at [`https://plugins.gradle.org/docs/submit`](https://plugins.gradle.org/docs/submit)
    .


    ## Summary


    Gradle greatly simplifies building of Java projects using plugins that provide
    tasks and sensible defaults. This chapter reviewed the `java` plugin that compiles
    Java code, runs unit tests, and assembles JAR archives. You then used the `javadoc`
    plugin to generate API documentation. The `war` plugin allows you to build and
    package web applications.


    Gradle also provides excellent support for building custom plugins. You learned
    that there are three ways to package custom plugins—build scripts, use a `buildSrc`
    directory, and create a stand-alone project. You learned the basics of creating
    a simple Java and Groovy plugin using the `buildSrc` approach. You then built
    on those concepts to develop a plugin using a stand-alone project approach.


    In the next chapter, you will read all about Gradle’s support for managing dependencies
    and interacting with various artifact repositories.


    # 6. Dependency Management


    Software projects are rarely built in isolation. They either depend on internal
    projects or other open source libraries. This chapter looks at how Gradle helps
    you effectively manage these dependencies. You will learn about the different
    types of dependencies, as well as learn how to group dependencies and resolve
    dependency conflicts. You will also review repositories that store artifacts.'
  trans: '

    #### 使用插件


    要使用新创建的插件，请新建一个名为 `plugin-consumer` 的 Gradle 项目。在此项目中，你需要将插件的构建编号添加到生成的 JAR 文件的
    `MANIFEST.MF` 文件中。


    首先，在文件系统中创建 `plugin-consumer` 文件夹，使其与 `repo` 和 `build-gradle-plugin` 文件夹位于同一层级。


    ![A978-1-4842-1031-4_5_Fig8_HTML.jpg](img/A978-1-4842-1031-4_5_Fig8_HTML.jpg)


    图 5-8.


    项目目录结构


    然后，为 `plugin-consumer` 项目创建一个 `build.gradle` 文件。由于这是一个生成 JAR 制品的 Java 项目，需要应用
    Java 插件。同时，还需要应用并配置 `build-number-plugin`，如下所示：


    `apply plugin: ''java''`


    `apply plugin: ''build-number-plugin''`


    `buildNumber {`


        `numberType = ''alphanumeric''`


        `alphaNumLength = 5`


    `}`


    下一步是将插件 JAR 文件添加到构建脚本的类路径中，以便 Gradle 能够找到插件类。这可以通过 `buildscript` 代码块来实现：


    `buildscript {`


        `repositories {`


            `flatDir {`


                `dirs ''../repo''`


            `}`


        `}`


        `dependencies { classpath ''com.apress.gradle:build-number-plugin-1.0.0''
    }`


    `}`


    最后，在 `jar` 任务上使用 `doFirst` 方法来添加一个新的 `manifest` 条目，如下所示：


    `jar.doFirst {`


        `manifest {`


            `attributes(''Build-Number'': project.buildNumber.value)`


        `}`


    `}`


    现在，你可以生成消费者插件了。使用命令行，导航到 `plugin-consumer` 文件夹并运行 `gradle build` 命令。在输出中，你应该会看到
    `buildnumbertask` 被触发，随后是 Java 插件的任务（`compileJava`、`jar` 等）执行。输出应如下所示：


    `\plugin-consumer>gradle build`


    `:buildnumbertask`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:jar`


    `:assemble`


    `:compileTestJava UP-TO-DATE`


    `:processTestResources UP-TO-DATE`


    `:testClasses UP-TO-DATE`


    `:test UP-TO-DATE`


    `:check UP-TO-DATE`


    `:build`


    `BUILD SUCCESSFUL`


    构建成功完成后，导航到 `plugin-consumer\build\libs` 文件夹。使用 WinZip 或 WinRAR 等 ZIP 工具，打开 `plugin-consumer.jar`，然后打开
    `META-INF` 下的 `MANIFEST.MF` 文件。你应该会看到一个包含字母数字文本的 `Build-Number` 条目，类似于图 5-9。


    ![A978-1-4842-1031-4_5_Fig9_HTML.jpg](img/A978-1-4842-1031-4_5_Fig9_HTML.jpg)


    图 5-9.


    MANIFEST 文件中的构建编号


    要使用时间戳生成构建编号，请将 `build.gradle` 文件中的 `buildNumber` 配置块替换为以下代码：


    `buildNumber {`


        `numberType = ''timestamp''`


    `}`


    运行命令 `gradle clean build`，它将删除现有的 JAR 文件并生成一个新的。构建成功执行后，你应该会在生成的清单文件中看到一个基于时间戳的构建编号。


    至此，基于独立项目的插件开发就结束了。你可以将此插件发布到内部的 Maven 仓库，供开发团队的其他成员使用。你也可以将其发布到 Gradle 插件门户。位于
    [`https://plugins.gradle.org/`](https://plugins.gradle.org/) 的 Gradle 插件门户托管了来自世界各地开发者贡献的众多开源插件。该门户允许你搜索所需的插件，并显示使用这些插件所需的配置。你可以按照
    [`https://plugins.gradle.org/docs/submit`](https://plugins.gradle.org/docs/submit)
    上的说明了解提交流程。


    ## 总结


    Gradle 通过使用提供任务和合理默认值的插件，极大地简化了 Java 项目的构建。本章回顾了用于编译 Java 代码、运行单元测试和组装 JAR 归档文件的
    `java` 插件。然后，你使用了 `javadoc` 插件来生成 API 文档。`war` 插件允许你构建和打包 Web 应用程序。


    Gradle 还为构建自定义插件提供了出色的支持。你了解到有三种打包自定义插件的方式：构建脚本、使用 `buildSrc` 目录以及创建独立项目。你学习了使用
    `buildSrc` 方法创建简单 Java 和 Groovy 插件的基础知识。然后，你基于这些概念，使用独立项目方法开发了一个插件。


    在下一章中，你将全面了解 Gradle 对管理依赖项以及与各种制品仓库交互的支持。


    # 6. 依赖管理


    软件项目很少是孤立构建的。它们要么依赖于内部项目，要么依赖于其他开源库。本章将探讨 Gradle 如何帮助你有效管理这些依赖项。你将学习不同类型的依赖项，以及如何对依赖项进行分组和解决依赖冲突。你还将回顾存储制品的仓库。

