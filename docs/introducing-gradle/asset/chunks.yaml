    \ {\n    compile 'org.springframework:spring-core:4.2.2.RELEASE', 'org.apache.httpcomponents:httpclient:4.0'\n\
    }\n\nrepositories {\n    mavenCentral()\n}\n```\n\nFrom a command line, run the\
