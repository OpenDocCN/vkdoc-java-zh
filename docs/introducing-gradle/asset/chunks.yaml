    ### 构建配置


    现在你已经运行了 Nexus 仓库管理器，下一步是修改 `build.gradle` 文件。清单 8-2 展示了更新后的 `build.gradle` 文件，其中包含了发布到
    Maven 仓库所需的配置。


    **清单 8-2\. 用于发布到 Maven 仓库的 build.gradle**


    `apply plugin: ''java''`


    `apply plugin: ''maven''`


    `group = ''com.apress.gradle.intro''`


    `archivesBaseName = ''sample-app''`


    `version = ''1.0-SNAPSHOT''`


    `uploadArchives {`


    `repositories {`


    `mavenDeployer {`


    `repository (url: "http://localhost:8081/nexus/content/repositories/releases")
    {`


    `authentication (userName: "deployment", password: "deployment123")`


    `}`


    `snapshotRepository (url: "http://localhost:8081/nexus/content/repositories/snapshots")
    {`


    `authentication (userName: "deployment", password: "deployment123")`


    `}`


    `}`


    `}`


    `}`


    `dependencies {`


    `compile ''ch.qos.logback:logback-classic:1.1.2''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    为了让 Gradle 生成 `pom.xml` 文件，它需要三个 Maven 坐标——`groupId`、`artifactId` 和 `version`。在清单
    8-2 中，你使用了项目的 `group`、`archivesBaseName` 和 `version` 属性来提供这些值。Gradle 提供了 `mavenDeployer`
    方法，允许你配置用于发布工件的 Maven 仓库。在清单 8-2 中，你配置了一个 `snapshotRepository`（`http://localhost:8081/nexus/content/repositories/snapshots`）用于发布
    `SNAPSHOT` 或开发版本的工件，以及一个发布仓库（`http://localhost:8081/nexus/content/repositories/releases`）用于发布已发布的工件。为了让
    Gradle 将工件发布到 Nexus，它需要提供适当的凭据。在构建脚本中，你使用了 Nexus 安装时默认提供的部署用户（密码：deployment123）。该部署用户拥有“Nexus
    部署角色”，具有写入仓库的权限。然后，这段代码向项目添加了一个 `logback` 依赖，随后是一个指向 Maven Central 的 `repositories`
    块。`mavenCentral()` 配置告诉 Gradle 从 Maven Central 下载 `logback` 依赖。尽管此配置本可以使用 Nexus
    来下载依赖，但它提供了为下载和上传工件使用不同仓库的可能性。


    配置完成后，运行 `gradle uploadArchives` 命令，你将看到以下输出：


    `\chapter` `8` `\sample-app>gradle uploadArchives`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:jar`


    `:uploadArchives`


    `Could not find metadata com.apress.gradle.intro:sample-app:1.0-SNAPSHOT/maven-metadata.xml
    in remote (` `http://localhost:8081/nexus/content/repositories/snapshots` `)`


    `Could not find metadata com.apress.gradle.intro:sample-app/maven-metadata.xml
    in remote (` `http://localhost:8081/nexus/content/repositories/snapshots` `)`


    `BUILD SUCCESSFUL`


    输出中的 `"Could not find metadata ..."` 错误只是一个警告，表明 Gradle 无法在 Nexus 服务器上找到此工件的 `metadata.xml`
    文件。当工件首次发布时，你会看到此消息。`metadata.xml` 文件将在首次发布时创建，因此在后续发布中你不应再看到此消息。


    使用浏览器，导航到 Nexus 控制台 `http://localhost:8081/nexus/`。从左侧的垂直导航栏中，点击“Repositories”链接。你将在右侧窗格中看到所有用户管理的仓库。由于你发布了一个
    `SNAPSHOT` 版本的工件，请点击 Snapshots 旁边的仓库路径链接（`http://localhost:8081/nexus/content/repositories/snapshots/`）。这将在新的浏览器标签页中打开
    Snapshot 仓库。依次点击链接 `com->apress->gradle->intro->sample-app->1.0-SNAPSHOT`，你将看到生成的工件，如图
    8-3 所示。


    ![A978-1-4842-1031-4_8_Fig3_HTML.jpg](img/A978-1-4842-1031-4_8_Fig3_HTML.jpg)


    **图 8-3\. Nexus 上的示例应用工件**


    你也可以使用 URL `http://localhost:8081/nexus/content/repositories/snapshots/com/apress/gradle/intro/sample-app/1.0-SNAPSHOT/`
    直接访问生成的工件。请注意，Nexus 使用工件的组名（`com.apress.gradle.intro`）、工件名称（`sample-app`）和工件版本（`1.0-SNAPSHOT`）来构建此
    URL。


    打开生成的 `sample-app-1.0-#########.pom` 文件，你将看到 Gradle 已自动将项目的 `logback` 依赖添加为 Maven
    依赖：


    `<project ".....">`


    `<modelVersion>4.0.0</modelVersion>`


    `<groupId>com.apress.gradle.intro</groupId>`


    `<artifactId>sample-app</artifactId>`


    `<version>1.0-SNAPSHOT</version>`


    `<dependencies>`


    `<dependency>`


    `<groupId>ch.qos.logback</groupId>`


    `<artifactId>logback-classic</artifactId>`


