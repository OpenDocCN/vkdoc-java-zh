    \ available in local Maven repository, as shown in Figure [8-7](#A978-1-4842-1031-4_8_Chapter.html#Fig7).\n\
    \n![A978-1-4842-1031-4_8_Fig7_HTML.jpg](A978-1-4842-1031-4_8_Fig7_HTML.jpg)\n\n\
