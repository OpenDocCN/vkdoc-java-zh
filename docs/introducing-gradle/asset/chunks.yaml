- fmt: "### Maven\n\nApache Maven is currently the most popular build automation/project\
    \ management tool in the Java ecosystem. Released in 2004, Maven attempted to\
    \ address many problems faced by Ant users. It adheres heavily to convention over\
    \ configuration and introduced standard directory structure to projects. It also\
    \ introduced declarative dependency management and automatically downloaded needed\
    \ dependencies from external repositories.\n\nMaven uses XML for providing project,\
    \ dependency metadata, and build configuration. This information is provided in\
    \ a `pom.xml` file defined at the root of the project. Listing [1-3](#A978-1-4842-1031-4_1_Chapter.html#FPar3)\
    \ shows an example `pom.xml` file for a Java project.\n\nListing 1-3. Sample `pom.xml`\
    \ File\n\n```\n<project xmlns=\"http://maven.apache.org/POM/4.0.0\"\n        \
    \ xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n                             http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n    <modelVersion>4.0.0</modelVersion>\n    <groupId>com.apress</groupId>\n\
    \    <artifactId>test-service</artifactId>\n    <version>1.0.0-SNAPSHOT</version>\n\
    \    <dependencies>\n        <dependency>\n            <groupId>junit</groupId>\n\
    \            <artifactId>junit</artifactId>\n            <version>3.8.1</version>\n\
    \            <scope>test</scope>\n        </dependency>\n    </dependencies>\n\
    </project>\n```\n\nIn this `pom.xml` file, the `groupId`, `artifactId` and `version`\
    \ elements provide information about the project being built. The `dependencies`\
    \ element indicates the artifact (`JUnit` in this case) on which the project depends.\n\
    \nMaven’s convention over configuration, though helpful, can sometimes be too\
    \ rigid and it’s difficult to deviate from the conventions. Maven’s use of XML\
    \ is not very expressive and can become too restrictive for declaring complex\
    \ build logic.\n\n**Note:** To learn more about Maven, refer to *Introducing Maven*\
    \ ( [http://www.apress.com/9781484208427](http://www.apress.com/9781484208427)\
    \ ) by Balaji Varanasi and Sudha Belida (Apress 2014).\n\n## Summary\n\nGradle\
    \ greatly simplifies the build process and automates build management. This chapter\
    \ provided a gentle introduction to Gradle and described the main reasons for\
    \ adopting it. You also looked at Gradle’s close peers—Ant + Ivy and Maven.\n\n\
    In the next chapter, you will learn about the set up required to get up and running\
    \ with Gradle.\n\n# 2. Setting Up Gradle\n\nGradle installation is an easy and\
    \ straightforward process. This chapter explains how to install and set up Gradle\
    \ using the Windows 7 and Mac operating systems. You can follow similar procedure\
    \ with other operating systems. In addition to the basic Gradle installation and\
    \ setup, this chapter includes installation prerequisites, an initial example\
    \ script, and information about Gradle Help and IDE support.\n\n## Installation\
    \ Prerequisites\n\nBefore you get started with the Gradle installation, you need\
    \ to make sure you have Java installed and configured correctly and then download\
    \ the current version of Gradle.\n\n### Setting Up Java\n\nTo install Java, download\
    \ the JDK (not just Java Runtime Environment [JRE]) from [www.oracle.com/technetwork/java/javase/downloads/index.html](http://www.oracle.com/technetwork/java/javase/downloads/index.html)\
    \ and follow the installation instructions specified on that web page. Gradle\
    \ requires version 6.0 or higher version of JDK. This book uses JDK 7. (The instructions\
    \ work with Java 8, as well.)\n\nOnce the JDK is installed on your machine, point\
    \ the `JAVA_HOME` environment variable to the JDK installation. For example, if\
    \ you have the JDK installed under `c:\\java\\jdk1.7`, the `JAVA_HOME` value should\
    \ be set to `c:\\java\\jdk1.7`. Then modify the `PATH` environment variable and\
    \ append `%JAVA_HOME%\\bin` to its end.\n\nWithout the `JAVA_HOME` variable, you’ll\
    \ see the `\"JAVA_HOME not found in your environment\"` build error.\n\n### Downloading\
    \ Gradle\n\nBefore you begin the installation process, download the latest version\
    \ of Gradle from the Gradle web site ( [https://gradle.org/gradle-download/](https://gradle.org/gradle-download/)\
    \ ). At the time of this writing, the latest version was 2.7. Download the Gradle\
    \ 2.7 “Complete Distribution” file (`gradle-2.7-all.zip`) shown in Figure [2-1](#A978-1-4842-1031-4_2_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1031-4_2_Fig1_HTML.jpg](A978-1-4842-1031-4_2_Fig1_HTML.jpg)\n\n\
    Figure 2-1. Gradle download options\n\n## Installing Gradle\n\nThis section covers\
    \ installing and testing Gradle on Windows and Mac OS X. The section also includes\
    \ Gradle’s JVM options and an overview of the distribution’s file set.\n\n###\
    \ Installing on Windows\n\nUnzip the downloaded distribution to a local directory\
    \ on your computer. It will create a folder named `gradle-2.7-all`. This book\
    \ assumes that you have placed the contents of the `gradle-2.7` folder in the\
    \ `c:\\tools\\gradle-2.7` directory, as shown in Figure [2-2](#A978-1-4842-1031-4_2_Chapter.html#Fig2).\n\
    \n![A978-1-4842-1031-4_2_Fig2_HTML.jpg](A978-1-4842-1031-4_2_Fig2_HTML.jpg)\n\n\
    Figure 2-2. Gradle install location\n\nThe next step in the installation process\
    \ is to add the `GRADLE_HOME` environment variable pointing to the Gradle installation\
    \ directory—in our case that’s `c:\\tools\\gradle-2.7`. Launch the Start menu\
    \ and right-click the Computer option. Next, select System Properties followed\
    \ by the Advanced System Settings. This will launch the window shown in Figure\
    \ [2-3](#A978-1-4842-1031-4_2_Chapter.html#Fig3).\n\n![A978-1-4842-1031-4_2_Fig3_HTML.jpg](A978-1-4842-1031-4_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. The System Properties window\n\nClick the Environment Variables\
    \ button, and then click New under System Variables. Enter the values shown in\
    \ Figure [2-4](#A978-1-4842-1031-4_2_Chapter.html#Fig4) and then click OK.\n\n\
    ![A978-1-4842-1031-4_2_Fig4_HTML.jpg](A978-1-4842-1031-4_2_Fig4_HTML.jpg)\n\n\
    Figure 2-4. Gradle Home system variable\n\nThe final step in the process is to\
    \ modify the `Path` environment variable so that you can run Gradle commands from\
    \ the command line. Select the `Path` variable and click Edit. Add `%GRADLE_HOME%\\\
    bin` at the beginning of the `Path` value, as shown in Figure [2-5](#A978-1-4842-1031-4_2_Chapter.html#Fig5).\
    \ Click OK. This completes the Gradle installation. If you have any open command-line\
    \ windows, close them and reopen a new command-line window. When environment variables\
    \ are added or modified, new values are not propagated to open command-line windows\
    \ automatically.\n\n![A978-1-4842-1031-4_2_Fig5_HTML.jpg](A978-1-4842-1031-4_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. Adding Gradle home location to the path variable\n\n### Testing\
    \ the Installation\n\nNow that Gradle is installed, it’s time to test and verify\
    \ the installation. Open a command prompt and run the following command:\n\n```\n\
    gradle -v\n```\n\nThis command should output information similar to that shown\
    \ in Figure [2-6](#A978-1-4842-1031-4_2_Chapter.html#Fig6).\n\n![A978-1-4842-1031-4_2_Fig6_HTML.jpg](A978-1-4842-1031-4_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6. Gradle version command\n\nThe `-v` command-line option tells the\
    \ path where Gradle is installed and what versions of Java, Ant, and Groovy it\
    \ is using. You get the same results by running the expanded command `gradle --version`."
  raw: '### Maven


    Apache Maven is currently the most popular build automation/project management
    tool in the Java ecosystem. Released in 2004, Maven attempted to address many
    problems faced by Ant users. It adheres heavily to convention over configuration
    and introduced standard directory structure to projects. It also introduced declarative
    dependency management and automatically downloaded needed dependencies from external
    repositories.


    Maven uses XML for providing project, dependency metadata, and build configuration.
