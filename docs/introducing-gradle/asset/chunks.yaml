    `copyTask` would copy a single file called `dev.cert` and all the files in the
    `src/db` folder into a `dist` folder.


    #### Exec


    The `Exec` task allows you to execute a command-line process. An example is shown
    here:


    `task showWindowsVersion(type:Exec) {`


      `commandLine ''cmd'', ''ver''`


    `}`


