- fmt: "### Plugin Extensions\n\nThe next step in developing the plugin is to make\
    \ the plugin configuration in the user’s `build.gradle` (Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13))\
    \ available to the custom plugin. One way to achieve this is through extension\
    \ objects. Every Gradle project has an instance of `org.gradle.api.plugins.ExtensionContainer`\
    \ that keeps track of settings and properties passed to plugins. To store this\
    \ data and pass it back and forth, you need to register one or more Java/Groovy\
    \ beans (referred to as extension objects) to this container.\n\nListing [5-11](#A978-1-4842-1031-4_5_Chapter.html#FPar18)\
    \ shows `BuildNumberExtension.groovy` class in the `src/main/groovy/com/apress/gradle`\
    \ folder, which will act as an extension model for the build number plugin. It\
    \ contains the `numberType` and `alphaNumLength` properties, which will hold the\
    \ inputs to plugin. It also contains the value property that allows the plugin/task\
    \ to make a build number available to the `build.gradle` file.\n\n**Listing 5-11.**\
    \ `BuildNumberExtension.groovy` Class\n\n```\npackage com.apress.gradle;\n\nclass\
    \ BuildNumberExtension {\n    String numberType;\n    int alphaNumLength;\n  \
    \  String value;\n}\n```\n\n### Plugin Task\n\nIn the “`buildSrc`” approach (Listing\
    \ [5-8](#A978-1-4842-1031-4_5_Chapter.html#FPar12)), you combined plugin code\
    \ with task code. For real-world plugins, it makes sense to cleanly separate plugin\
    \ code from code that executes actions. Hence, create the `BuildNumberTask.groovy`\
    \ file in the `src/main/groovy/com/apress/gradle` folder and copy the contents\
    \ of Listing [5-12](#A978-1-4842-1031-4_5_Chapter.html#FPar19).\n\n**Listing 5-12.**\
    \ `BuildNumberTask` Code\n\n```\npackage com.apress.gradle;\n\nimport org.gradle.api.DefaultTask\n\
    import org.gradle.api.tasks.TaskAction\n\nclass BuildNumberTask extends DefaultTask\
    \ {\n    @TaskAction\n    def generateBuildNumber() {\n        String numberType\
    \ = project.buildNumber.numberType\n        int alphaNumLength = project.buildNumber.alphaNumLength\n\
    \        def buildNumber;\n        if(\"alphanumeric\".equals (numberType)) {\n\
    \            buildNumber = getAlphaNumString(alphaNumLength)\n        }\n    \
    \    else if ( \"timestamp\".equals (numberType) ) {\n            buildNumber\
    \ = System.currentTimeMillis()\n        }\n       project.buildNumber.value =\
    \ buildNumber;\n    }\n\n    def getAlphaNumString(length) {\n        String uuid\
    \ = UUID.randomUUID().toString()\n        uuid.take(length)\n    }\n}\n```\n\n\
    The `@TaskAction` on the `generateBuildNumber()` method inside `BuildNumberTask`\
    \ indicates the method that Gradle needs to invoke to execute an action. The `generateBuildNumber()`\
    \ implementation reads user-configured `numberType` and `alphaNumLength` values\
    \ using `buildNumber` extension object. It then invokes the `System.currentTimeMillis()`\
    \ or `getAlphaNumString()` utility method to generate the actual build number.\
    \ The generated build number is then assigned to `buildNumber`’s value property.\
    \ This makes the build number available to the user’s `build.gradle` file.\n\n\
    ### Plugin Class\n\nThe final piece to the implementation is the `Plugin` class\
    \ that ties everything together. Listing [5-13](#A978-1-4842-1031-4_5_Chapter.html#FPar20)\
    \ shows the `BuildNumberPlugin` class code located under the `src/main/groovy/com/apress/gradle`\
    \ folder. Inside the `apply()` method, you use the `create` method to add the\
    \ `buildNumber` extension object to the project. The `create` method takes a name\
    \ and the model class as its parameters. This name, `buildNumber`, must match\
    \ the name of the configuration closure block that the user will be using to provide\
    \ inputs (`buildNumber` in Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13)).\
    \ It must also match the name that the task class (Listing [5-12](#A978-1-4842-1031-4_5_Chapter.html#FPar19))\
    \ uses to retrieve configuration values.\n\n**Listing 5-13.** `BuildNumberPlugin`\
    \ Class\n\n```\npackage com.apress.gradle;\n\nimport org.gradle.api.Plugin;\n\
    import org.gradle.api.Project;\nimport org.gradle.api.Task;\n\nclass BuildNumberPlugin\
    \ implements Plugin<Project>  {\n    void apply(Project project) {\n        project.extensions.create('buildNumber',\
    \ BuildNumberExtension)\n        Task buildnumberTask = project.task('buildnumbertask',\
    \ type: BuildNumberTask)\n        project.tasks['jar'].dependsOn buildnumberTask\n\
    \    }\n}\n```\n\nIn the `apply()` method, you then add a task of type `BuildNumberTask`.\
    \ The name `buildnumbertask` doesn’t carry any special significance. However,\
    \ you should strive to give a meaningful name as it gets displayed in the console\
    \ and debug output. Finally, you make the `Jar` task depend on the `buildnumberTask`\
    \ so that a build number is available to the build script before a JAR is generated.\n\
    \n### Short Plugin Name\n\nPlugins by default are referred to by their fully qualified\
    \ class names. It is however possible to give your plugins short, easy-to-use,\
    \ names. You do this by creating a properties file in the `src/main/resources/META-INF/gradle-plugin`\
    \ folder. The name of the properties file becomes the plugin’s short name.\n\n\
    Since this plugin deals with build numbers, you could call the plugin `build-number-plugin`.\
    \ To accomplish this, create a `build-number-plugin.properties` file under the\
    \ `gradle-plugin` folder. Inside the file, you simply create a property with the\
    \ key `implementation-class` and the fully qualified plugin class as its value:\n\
    \n```\nimplementation-class=com.apress.gradle.BuildNumberPlugin\n```\n\n### Plugin\
    \ Packaging\n\nThis concludes the plugin implementation. The next step is to build\
    \ an archive and publish it to the local file repository. To achieve this, use\
    \ the command line to navigate to the `build-gradle-plugin` folder and run the\
    \ command `gradle uploadArchives`. You should see this output:\n\n```\n\\build-number-plugin>gradle\
    \ uploadArchives\n:compileJava UP-TO-DATE\n:compileGroovy\n:processResources UP-TO-DATE\n\
    :classes\n:jar\n:uploadArchives\nBUILD SUCCESSFUL\n```\n\n**Note**\n\nYou will\
    \ learn more about the `uploadArchives` command in [Chapter 8](#A978-1-4842-1031-4_8_Chapter.html).\n\
    \nUpon successful execution, you should see the `build-number-plugin-1.0.0.jar`\
    \ file in the `repo` folder. As mentioned earlier, `repo` should be located at\
    \ the same level as the `build-gradle-plugin` folder."
  raw: '#### Plugin Extensions


    The next step in developing the plugin is to make the plugin configuration in
    the user’s `build.gradle` (Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13))
    available to the custom plugin. One way to achieve this is through extension objects.
    Every Gradle project has an instance of `org.gradle.api.plugins.ExtensionContainer`
    that keeps track of settings and properties passed to plugins. To store this data
    and pass it back and forth, you need to register one or more Java/Groovy beans
    (referred to as extension objects) to this container.


    Listing [5-11](#A978-1-4842-1031-4_5_Chapter.html#FPar18) shows `BuildNumberExtension.groovy`
    class in the `src/main/groovy/com/apress/gradle` folder, which will act as an
    extension model for the build number plugin. It contains the `numberType` and
    `alphaNumLength` properties, which will hold the inputs to plugin. It also contains
    the value property that allows the plugin/task to make a build number available
    to the `build.gradle` file.


    Listing 5-11. BuildNumberExtension.groovy Class


    `package com.apress.gradle;`


    `class BuildNumberExtension {`


        `String numberType;`


        `int alphaNumLength;`


        `String value;`


    `}`


    #### Plugin Task


    In the “`buildSrc`” approach (Listing [5-8](#A978-1-4842-1031-4_5_Chapter.html#FPar12)),
    you combined plugin code with task code. For real-world plugins, it makes sense
    to cleanly separate plugin code from code that executes actions. Hence, create
    the `BuildNumberTask.groovy` file in the `src/main/groovy/com/apress/gradle` folder
    and copy the contents of Listing [5-12](#A978-1-4842-1031-4_5_Chapter.html#FPar19).


    Listing 5-12. BuildNumberTask Code


    `package com.apress.gradle;`


    `import org.gradle.api.DefaultTask`


    `import org.gradle.api.tasks.TaskAction`


    `class BuildNumberTask extends DefaultTask {`


        `@TaskAction`


        `def generateBuildNumber() {`


            `String numberType = project.buildNumber.numberType`


            `int alphaNumLength = project.buildNumber.alphaNumLength`


            `def buildNumber;`


            `if("alphanumeric".equals (numberType)) {`


                `buildNumber = getAlphaNumString(alphaNumLength)`


            `}`


            `else if ( "timestamp".equals (numberType) ) {`


                `buildNumber = System.currentTimeMillis()`


            `}`


           `project.buildNumber.value = buildNumber;`


        `}`


        `def getAlphaNumString(length) {`


            `String uuid = UUID.randomUUID().toString()`


            `uuid.take(length)`


        `}`


    `}`


    The `@TaskAction` on the `generateBuildNumber()` method inside `BuildNumberTask`
    indicates the method that Gradle needs to invoke to execute an action. The `generateBuildNumber()`
    implementation reads user-configured `numberType` and `alphaNumLength` values
    using `buildNumber` extension object. It then invokes the `System.currentTimeMillis()`
    or `getAlphaNumString()` utility method to generate the actual build number. The
    generated build number is then assigned to `buildNumber`’s value property. This
    makes the build number available to the user’s `build.gradle` file.


    #### Plugin Class


    The final piece to the implementation is the `Plugin` class that ties everything
    together. Listing [5-13](#A978-1-4842-1031-4_5_Chapter.html#FPar20) shows the
    `BuildNumberPlugin` class code located under the `src/main/groovy/com/apress/gradle`
    folder. Inside the `apply()` method, you use the `create` method to add the `buildNumber`
    extension object to the project. The `create` method takes a name and the model
    class as its parameters. This name, `buildNumber`, must match the name of the
    configuration closure block that the user will be using to provide inputs (`buildNumber`
    in Listing [5-9](#A978-1-4842-1031-4_5_Chapter.html#FPar13)). It must also match
    the name that the task class (Listing [5-12](#A978-1-4842-1031-4_5_Chapter.html#FPar19))
    uses to retrieve configuration values.


    Listing 5-13. BuildNumberPlugin Class


    `package com.apress.gradle;`


    `import org.gradle.api.Plugin;`


    `import org.gradle.api.Project;`


    `import org.gradle.api.Task;`


    `class BuildNumberPlugin implements Plugin<Project>  {`


        `void apply(Project project) {`


            `project.extensions.create(''buildNumber'', BuildNumberExtension)`


            `Task buildnumberTask = project.task(''buildnumbertask'', type: BuildNumberTask)`


            `project.tasks[''jar''].dependsOn buildnumberTask`


        `}`


    `}`


    In the `apply()` method, you then add a task of type `BuildNumberTask`. The name
    `buildnumbertask` doesn’t carry any special significance. However, you should
    strive to give a meaningful name as it gets displayed in the console and debug
    output. Finally, you make the `Jar` task depend on the `buildnumberTask` so that
    a build number is available to the build script before a JAR is generated.


    #### Short Plugin Name


    Plugins by default are referred to by their fully qualified class names. It is
    however possible to give your plugins short, easy-to-use, names. You do this by
    creating a properties file in the `src/main/resources/META-INF/gradle-plugin`
    folder. The name of the properties file becomes the plugin’s short name.


    Since this plugin deals with build numbers, you could call the plugin `build-number-plugin`.
    To accomplish this, create a `build-number-plugin.properties` file under the `gradle-plugin`
    folder. Inside the file, you simply create a property with the key `implementation-class`
    and the fully qualified plugin class as its value:


    `implementation-class=com.apress.gradle.BuildNumberPlugin`


    #### Plugin Packaging


    This concludes the plugin implementation. The next step is to build an archive
    and publish it to the local file repository. To achieve this, use the command
    line to navigate to the `build-gradle-plugin` folder and run the command `gradle
    uploadArchives`. You should see this output:


    `\build-number-plugin>gradle uploadArchives`


    `:compileJava UP-TO-DATE`


    `:compileGroovy`


    `:processResources UP-TO-DATE`


    `:classes`


    `:jar`


    `:uploadArchives`


    `BUILD SUCCESSFUL`


    Note


    You will learn more about the `uploadArchives` command in [Chapter 8](#A978-1-4842-1031-4_8_Chapter.html).


    Upon successful execution, you should see the `build-number-plugin-1.0.0.jar`
    file in the `repo` folder. As mentioned earlier, `repo` should be located at the
    same level as the `build-gradle-plugin` folder.'
  trans: '

    #### 插件扩展


    开发插件的下一步是让用户 `build.gradle` 中的插件配置（清单 5-9）对自定义插件可用。实现此目的的一种方法是通过扩展对象。每个 Gradle
    项目都有一个 `org.gradle.api.plugins.ExtensionContainer` 实例，用于跟踪传递给插件的设置和属性。要存储这些数据并在插件间传递，你需要向此容器注册一个或多个
    Java/Groovy Bean（称为扩展对象）。


    清单 5-11 展示了 `src/main/groovy/com/apress/gradle` 文件夹中的 `BuildNumberExtension.groovy`
    类，它将作为构建编号插件的扩展模型。它包含 `numberType` 和 `alphaNumLength` 属性，用于保存插件的输入。它还包含 `value`
    属性，允许插件/任务将构建编号提供给 `build.gradle` 文件。


    **清单 5-11. BuildNumberExtension.groovy 类**


    `package com.apress.gradle;`


    `class BuildNumberExtension {`


        `String numberType;`


        `int alphaNumLength;`


        `String value;`


    `}`


    #### 插件任务


    在“`buildSrc`”方法（清单 5-8）中，你将插件代码与任务代码合并在一起。对于实际插件，将插件代码与执行操作的代码清晰分离是合理的。因此，请在 `src/main/groovy/com/apress/gradle`
    文件夹中创建 `BuildNumberTask.groovy` 文件，并复制清单 5-12 的内容。


    **清单 5-12. BuildNumberTask 代码**


    `package com.apress.gradle;`


    `import org.gradle.api.DefaultTask`


    `import org.gradle.api.tasks.TaskAction`


    `class BuildNumberTask extends DefaultTask {`


        `@TaskAction`


        `def generateBuildNumber() {`


            `String numberType = project.buildNumber.numberType`


            `int alphaNumLength = project.buildNumber.alphaNumLength`


            `def buildNumber;`


            `if("alphanumeric".equals (numberType)) {`


                `buildNumber = getAlphaNumString(alphaNumLength)`


            `}`


            `else if ( "timestamp".equals (numberType) ) {`


                `buildNumber = System.currentTimeMillis()`


            `}`


           `project.buildNumber.value = buildNumber;`


        `}`


        `def getAlphaNumString(length) {`


            `String uuid = UUID.randomUUID().toString()`


            `uuid.take(length)`


        `}`


    `}`


    `BuildNumberTask` 中 `generateBuildNumber()` 方法上的 `@TaskAction` 指示了 Gradle 需要调用来执行操作的方法。`generateBuildNumber()`
    的实现使用 `buildNumber` 扩展对象读取用户配置的 `numberType` 和 `alphaNumLength` 值。然后，它调用 `System.currentTimeMillis()`
    或 `getAlphaNumString()` 工具方法来生成实际的构建编号。生成的构建编号随后被赋值给 `buildNumber` 的 `value` 属性。这使得构建编号对用户的
    `build.gradle` 文件可用。


    #### 插件类


    实现的最后一部分是将所有内容联系在一起的 `Plugin` 类。清单 5-13 展示了位于 `src/main/groovy/com/apress/gradle`
    文件夹下的 `BuildNumberPlugin` 类代码。在 `apply()` 方法内部，你使用 `create` 方法将 `buildNumber`
    扩展对象添加到项目中。`create` 方法接受一个名称和模型类作为其参数。此名称 `buildNumber` 必须与用户用于提供输入的配置闭包块的名称（清单
    5-9 中的 `buildNumber`）相匹配。它还必须与任务类（清单 5-12）用于检索配置值的名称相匹配。


    **清单 5-13. BuildNumberPlugin 类**


    `package com.apress.gradle;`


    `import org.gradle.api.Plugin;`


    `import org.gradle.api.Project;`


    `import org.gradle.api.Task;`


    `class BuildNumberPlugin implements Plugin<Project>  {`


        `void apply(Project project) {`


            `project.extensions.create(''buildNumber'', BuildNumberExtension)`


            `Task buildnumberTask = project.task(''buildnumbertask'', type: BuildNumberTask)`


            `project.tasks[''jar''].dependsOn buildnumberTask`


        `}`


    `}`


    在 `apply()` 方法中，你接着添加一个类型为 `BuildNumberTask` 的任务。名称 `buildnumbertask` 没有特殊含义。但是，你应该尽量赋予一个有意义的名称，因为它会显示在控制台和调试输出中。最后，你让
    `Jar` 任务依赖于 `buildnumberTask`，以便在生成 JAR 之前构建脚本可以获得构建编号。


    #### 简短插件名称


    默认情况下，插件通过其完全限定类名来引用。但是，你也可以为插件指定简短、易用的名称。为此，你需要在 `src/main/resources/META-INF/gradle-plugin`
    文件夹中创建一个属性文件。该属性文件的名称将成为插件的短名称。


    由于此插件处理构建编号，你可以将其命名为 `build-number-plugin`。要实现这一点，请在 `gradle-plugin` 文件夹下创建一个
    `build-number-plugin.properties` 文件。在该文件中，你只需创建一个键为 `implementation-class`、值为完全限定插件类的属性：


    `implementation-class=com.apress.gradle.BuildNumberPlugin`


    #### 插件打包


    至此，插件实现完成。下一步是构建归档文件并将其发布到本地文件仓库。为此，请使用命令行导航到 `build-gradle-plugin` 文件夹并运行命令 `gradle
    uploadArchives`。你应该会看到以下输出：


    `\build-number-plugin>gradle uploadArchives`


    `:compileJava UP-TO-DATE`


    `:compileGroovy`


    `:processResources UP-TO-DATE`


    `:classes`


    `:jar`


    `:uploadArchives`


    `BUILD SUCCESSFUL`


    注意


    你将在第 8 章中了解更多关于 `uploadArchives` 命令的信息。


    成功执行后，你应该会在 `repo` 文件夹中看到 `build-number-plugin-1.0.0.jar` 文件。如前所述，`repo` 应与 `build-gradle-plugin`
    文件夹位于同一层级。

