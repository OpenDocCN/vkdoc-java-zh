- fmt: '# Declarative Dependency Management


    Consider the scenario where you want to use Logback (`http://logback.qos.ch`)
    in your application for logging. A straightforward approach is to download the
    `logback.jar` file from Logback web site and add it to your project. This used
    to be a pretty common behavior when using IDE or ANT for building projects. However,
    there are few issues with this approach:


    - The downloaded JAR file might depend on a few other libraries. Such dependencies
    are referred to as transitive dependencies. To make things more difficult, transitive
    dependencies might have their own dependencies. You need to spend time figuring
    out all those dependencies and downloading them for use in your project.

    - There could be version conflicts with transitive dependencies. Let’s say your
    project depends on JAR A and B. Now if A depends on 1.0.0 version of JAR C and
    B depends on version 2.0.0 of C, you need to manually resolve this conflict.

    - Downloaded JAR files must be checked into a Version Control System or placed
    on a shared drive so that the project can be built on other developer machines
    or on a Continuous Integration server. Checking JAR files in to VCS is not considered
    a best practice. This approach especially makes it hard when dealing with frequently
    changing working copies (referred to as snapshot versions in Maven).

    - Upgrades become really difficult and you have to repeat this manual process
    all over again.

    - It becomes hard to share internally developed JAR files across teams.


    To address these inherent problems with ANT, Maven came up with declarative dependency
    management. With this approach, you tell the Maven what you need, typically in
    an external configuration file. Maven will automatically figure out where and
    how to get those dependencies and hand them over to your project. Later, Ant provided
    integration with another dependency management tool called Apache Ivy. Gradle
    provides its own dependency management implementation but does support the Maven
    and Ivy repositories.


    Figure 6-1 provides a high level view of Gradle’s dependency management. Gradle
    interacts with repositories to retrieve dependencies and associated metadata.
    Repositories that are accessed over the web are considered remote and are typically
    maintained by third parties. Gradle can also interact with repositories that exist
    on the local machine as well as directories containing JAR files. Once dependencies
    are obtained, Gradle stores them in a cache. By default, the cache is located
    at `<<USER_HOME>>/.gradle` on your local machine. On Windows it would be `C:\Users\<<user_name>>\.gradle`.
    Gradle then retrieves those dependencies during the project’s building, testing,
    or packaging. Having a local cache reduces the load on the remote repositories
    and improves build speed.


    ![A978-1-4842-1031-4_6_Fig1_HTML.gif](A978-1-4842-1031-4_6_Fig1_HTML.gif)


    Figure 6-1. Gradle dependency management


    **Tip:** You can change the default Gradle’s home directory from `.gradle` by
    setting the environment variable `GRADLE_USER_HOME` and pointing it to a new directory.


    Although the architecture in Figure 6-1 works for small projects, it poses some
    serious problems in an enterprise setting. Remote repositories accessed via the
    Internet can go down or become unresponsive in high traffic situations, causing
    your builds to slow down drastically. Licensing and intellectual property issues
    might prevent teams from publishing their internal artifacts in public repositories,
    thereby preventing them from being shared easily. To address those situations,
    most enterprises opt for the architecture shown in Figure 6-2.


    ![A978-1-4842-1031-4_6_Fig2_HTML.gif](A978-1-4842-1031-4_6_Fig2_HTML.gif)


    Figure 6-2. Dependency management with repo manager


    The internal repository manager serves as a proxy to remote repositories and caches
    artifacts. This ensures that builds are repeatable even if a remote repository
    were to be down or became obsolete. The repository manager also allows you to
    push and share your company’s internal artifacts. Several open source and commercial
    repository managers are available such as Sonatype Nexus, Apache Archiva, and
    Artifactory.


    ## Dependency Configuration


    Consider the earlier example of using Logback for logging. The source code will
    contain log statements that use Logback classes and API. For the project code
    to be compiled, you need the Logback JAR to be available in the classpath. Also,
    for the application to run inside a container such as Tomcat, you need the Logback
    JAR to be bundled inside the generated WAR artifact. Now consider the same project
    using JUnit for unit testing. The JUnit JAR file is needed only when you run unit
    tests and does need not be bundled in the generated WAR artifact. If the web application
    contains Java servlets, it would need the Servlet API JAR during code compilation.
    Since containers such as Tomcat make this API JAR available on classpath during
    runtime, you don’t have to bundle it inside the WAR file.


    These examples indicate the need to have certain sets of dependencies available
    at certain points of the build. Gradle has configurations that allow you to accomplish
    this easily. A configuration is a logical group of dependencies. For example,
    you can have a `compile` configuration that has all the dependencies needed during
    code compilation time. The Java plugin out-of-the-box declares the following six
    configurations:


    - `compile` — Contains dependencies that are added to the classpath during code
    compilation. In a web project, dependencies such as Hibernate and Spring are declared
    in the `compile` configuration.

    - `runtime` — Contains dependencies that are used during the execution of the
    code. For example, database drivers such as MySQL driver are declared in the `runtime`
    configuration.

    - `testCompile` — Contains dependencies that become part of classpath during test
    code compilation. Test frameworks such as JUnit and TestNG are good examples of
    libraries declared in this configuration.

    - `testRuntime` — Contains dependencies that are used during the execution of
    test code. Embedded databases such as HSQLDB or H2 are examples of libraries declared
    in this configuration.

    - `archives` — Contains artifacts generated by the project. Consider a Java project
    that produces additional artifacts such as a JAR file containing source code and
    a ZIP file containing Javadoc API. These artifacts are declared in this configuration.
    You will learn more about `archives` configuration in Chapter 8.

    - `default` — This configuration typically comes into picture in a multi-project
    setting where a project’s build depends on another subproject’s build. Consider
    the scenario where project A declares project B as its dependency. By default,
    all the artifacts in project B’s `default` configuration will be included in project
    A. The `default` configuration extends the `runtime` configuration and hence contains
    all artifacts and dependencies declared in the project’s runtime.


    Dependency configurations can extend other configurations. The `runtime` configuration,
    for example, extends the `compile` configuration. What this means is that all
    the dependencies declared in the `compile` configuration will be available in
    the `runtime` configuration. Table 6-1 shows the six Java plugin configurations
    and the configurations they extend.


    **Table 6-1.** Configurations Inheritance


    | Configuration Name | Extends From |

    | --- | --- |

    | `compile` | None |

    | `runtime` | `compile` |

    | `testCompile` | `compile` |

    | `testRuntime` | `runtime`, `testCompile` |

    | `archives` | None |

    | `default` | `runtime` |'
