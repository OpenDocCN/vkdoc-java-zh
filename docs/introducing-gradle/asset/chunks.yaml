    \ Build failed with an exception.\n\n* What went wrong:\nExecution failed for\
    \ task ':dependencies'.\n> Could not resolve all dependencies for configuration\
    \ ':compile'.\n>A conflict was found between the following modules:\n- commons-logging:commons-logging:1.2\n\
    - commons-logging:commons-logging:1.1.1\n```"
  raw: '## Resolving Dependency Conflicts


    Consider a Gradle project named `transitive-dep` that uses the Spring Core library
    (`spring-core.jar`) and Apache HttpClient (`httpclient.jar`). Listing [6-8](#A978-1-4842-1031-4_6_Chapter.html#FPar9)
    shows the project’s `build.gradle` file with the two compile-time dependencies.


    Listing 6-8\. Version Conflict Example


    `apply plugin: ''java''`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    Both the Spring Core and HttpClient libraries use Apache Commons Logging as their
    underlying logging framework. However, the version 4.2.2 of Spring Core uses Commons
    Logging version 1.2, while version 4.0 of HttpClient uses Commons Logging version
    1.1\. When such version conflicts arise, Gradle by default uses the latest version
    of the transitive dependency. Output of the `gradle dependencies` command shows
    this resolution strategy:


    `\chapter` `6` `\transitive-dep>gradle dependencies`


    `----------`


    `compile - Compile classpath for source set ''main''.`


    `+--- org.springframework:spring-core:4.2.2.RELEASE`


    `|    \--- commons-logging:commons-logging:1.2`


    `\--- org.apache.httpcomponents:httpclient:4.0`


    `+--- org.apache.httpcomponents:httpcore:4.0.1`


    `+--- commons-logging:commons-logging:1.1.1 -> 1.2`


    `\--- commons-codec:commons-codec:1.3`


    On occasions, you might not want Gradle to pick the latest JAR file. In such scenarios,
    you can change the default resolution strategy and force Gradle to include a certain
    version. Listing [6-9](#A978-1-4842-1031-4_6_Chapter.html#FPar10) shows the modified
    `build.gradle` file accomplishing this. The `configurations{}` block allows you
    to configure project’s dependency configuration behavior. You then apply a `resolutionStrategy`
    block to all configurations. Finally, you use the `force` method to force the
    usage of 1.1.1 version of commons-logging dependency.


    Listing 6-9\. Resolution Strategy Forcing a Dependency


    `apply plugin: ''java''`


    `configurations.all {`


    `resolutionStrategy {`


    `force ''commons-logging:commons-logging:1.1.1''`


    `}`


    `}`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    Running the `gradle dependencies` command on the modified `build.gradle` shows
    that the 1.1.1 version is being picked up over the 1.2 version:


    `default - Configuration for default artifacts.`


    `+--- org.springframework:spring-core:4.2.2.RELEASE`


    `|    \--- commons-logging:commons-logging:1.2 -> 1.1.1`


    `\--- org.apache.httpcomponents:httpclient:4.0`


    `+--- org.apache.httpcomponents:httpcore:4.0.1`


    `+--- commons-logging:commons-logging:1.1.1`


    `\--- commons-codec:commons-codec:1.3`


    Though transitive dependencies are useful, they can cause problems and unpredictable
    side effects as you might end up with wrong versions of JARs in the project. To
    be proactive and troubleshoot issues when version conflicts arise, you can make
    Gradle fail the builds when version conflicts are found. You can change the default
    resolution strategy to fail on version conflicts using the `failOnVersionConflict`
    method. Listing [6-10](#A978-1-4842-1031-4_6_Chapter.html#FPar11) shows the modified
    `build.gradle` file using the `failOnVersionConflict()` method.


    Listing 6-10\. Resolution Strategy Failing on Conflicts


    `apply plugin: ''java''`


    `configurations.all {`


    `resolutionStrategy {`


    `failOnVersionConflict()`


    `}`


    `}`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    From a command line, run the `gradle dependencies` command and you will see a
    failed report:


    `FAILURE: Build failed with an exception.`


    `* What went wrong:`


    `Execution failed for task '':dependencies''.`


    `> Could not resolve all dependencies for configuration '':compile''.`


    `>``A conflict was found between the following modules:`


    `- commons-logging:commons-logging:1.2`


    `- commons-logging:commons-logging:1.1.1`'
  trans: '

    ## 解决依赖冲突


    假设有一个名为 `transitive-dep` 的 Gradle 项目，它使用了 Spring Core 库（`spring-core.jar`）和 Apache
    HttpClient（`httpclient.jar`）。清单 6-8 展示了该项目的 `build.gradle` 文件，其中包含两个编译时依赖项。


    **清单 6-8\. 版本冲突示例**


    `apply plugin: ''java''`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    Spring Core 和 HttpClient 库都使用 Apache Commons Logging 作为其底层日志框架。然而，Spring Core
    4.2.2 版本使用的是 Commons Logging 1.2 版本，而 HttpClient 4.0 版本使用的是 Commons Logging 1.1
    版本。当出现此类版本冲突时，Gradle 默认会使用传递依赖的最新版本。`gradle dependencies` 命令的输出展示了这种解析策略：


    `\chapter` `6` `\transitive-dep>gradle dependencies`


    `----------`


    `compile - Compile classpath for source set ''main''.`


    `+--- org.springframework:spring-core:4.2.2.RELEASE`


    `|    \--- commons-logging:commons-logging:1.2`


    `\--- org.apache.httpcomponents:httpclient:4.0`


    `+--- org.apache.httpcomponents:httpcore:4.0.1`


    `+--- commons-logging:commons-logging:1.1.1 -> 1.2`


    `\--- commons-codec:commons-codec:1.3`


    有时，您可能不希望 Gradle 选择最新的 JAR 文件。在这种情况下，您可以更改默认的解析策略，强制 Gradle 包含特定版本。清单 6-9 展示了实现此目的的修改后的
    `build.gradle` 文件。`configurations{}` 块允许您配置项目的依赖配置行为。然后，您将 `resolutionStrategy`
    块应用于所有配置。最后，您使用 `force` 方法强制使用 1.1.1 版本的 commons-logging 依赖项。


    **清单 6-9\. 强制依赖项的解析策略**


    `apply plugin: ''java''`


    `configurations.all {`


    `resolutionStrategy {`


    `force ''commons-logging:commons-logging:1.1.1''`


    `}`


    `}`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    在修改后的 `build.gradle` 上运行 `gradle dependencies` 命令，可以看到 1.1.1 版本被选中，而不是 1.2 版本：


    `default - Configuration for default artifacts.`


    `+--- org.springframework:spring-core:4.2.2.RELEASE`


    `|    \--- commons-logging:commons-logging:1.2 -> 1.1.1`


    `\--- org.apache.httpcomponents:httpclient:4.0`


    `+--- org.apache.httpcomponents:httpcore:4.0.1`


    `+--- commons-logging:commons-logging:1.1.1`


    `\--- commons-codec:commons-codec:1.3`


    尽管传递依赖很有用，但它们也可能导致问题及不可预测的副作用，因为项目中最终可能会包含错误版本的 JAR 包。为了主动排查版本冲突问题，您可以让 Gradle
    在发现版本冲突时构建失败。您可以使用 `failOnVersionConflict` 方法更改默认的解析策略，使其在版本冲突时失败。清单 6-10 展示了使用
    `failOnVersionConflict()` 方法的修改后的 `build.gradle` 文件。


    **清单 6-10\. 冲突时失败的解析策略**


    `apply plugin: ''java''`


    `configurations.all {`


    `resolutionStrategy {`


    `failOnVersionConflict()`


    `}`


    `}`


    `dependencies {`


    `compile ''org.springframework:spring-core:4.2.2.RELEASE'', ''org.apache.httpcomponents:httpclient:4.0''`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    在命令行中运行 `gradle dependencies` 命令，您将看到一个失败报告：


    `FAILURE: Build failed with an exception.`


    `* What went wrong:`


    `Execution failed for task '':dependencies''.`


    `> Could not resolve all dependencies for configuration '':compile''.`


    `>``A conflict was found between the following modules:`


    `- commons-logging:commons-logging:1.2`


    `- commons-logging:commons-logging:1.1.1`

