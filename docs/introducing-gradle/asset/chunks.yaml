    - 将`src/main/webapp`的内容复制到WAR文件的根目录。\n- 将运行时配置中的依赖项复制到`WEB-INF/lib`文件夹。\n\n`War`任务提供了多个可用于自定义生成工件的属性和方法。以下代码展示了其中一些配置选项：\n\
    \n```\nwar {\n    archiveName 'new-archive.war'\n    webXml file ('src/config/web.xml')\n\
    \    from 'src/media/images'\n}\n```\n\n此配置将生成的工件名称重命名为`new-archive.war`。然后，它配置`War`任务使用位于`src/config`文件夹中的`web.xml`文件。最后，该任务被配置为将`src/media/images`文件夹中的内容添加到WAR文件的根目录。使用`War`插件时，WAR文件的内容默认位于`src/main/webapp`。请务必记住，此配置仅将`images`文件夹中的内容追加到WAR文件。如果你希望`War`任务覆盖默认行为并到其他位置（例如`src/WebContent`）查找内容，则需要更改war插件的`webAppDirName`属性：\n\
    \n```\napply plugin: 'war'\napply plugin: 'jetty'\nwebAppDirName = 'src/WebContent'\n\
    ```\n\n## 编写自定义插件\n\nGradle使得构建自定义二进制插件变得非常容易。你只需创建一个实现`org.gradle.api.Plugin<T>`接口的类即可。该插件类及其相关代码可以位于以下三个位置之一：\n\
    \n- **构建脚本**：插件源代码可以直接嵌入到构建脚本中。这种方法限制了插件的复用价值，因为该插件在构建脚本外部不可见。\n- **`buildSrc`项目**：位于`buildSrc`项目下的插件代码会被自动编译，并在构建脚本的类路径中可用。此插件在构建外部也不可见，因此无法在项目外部复用。\n\
    - **独立项目**：插件代码可以打包成一个JAR文件，然后包含在构建脚本的类路径中。这种方法提供了最高的复用价值，但也需要单独的项目和构建基础设施。\n\n\
    在接下来的章节中，你将构建一个包含单个任务的简单插件，该任务向控制台打印`\"Hello Gradle Plugin\"`，以及一个更复杂的用于生成构建编号的插件。你将采用`buildSrc`项目的方法来构建简单插件。Gradle插件可以用任何能编译成字节码的语言编写。你将首先使用Java创建简单插件，然后使用Groovy创建一个示例。你将使用独立项目的方法来构建复杂插件。\n\
    \n### 创建Java插件\n\n你将通过在`hello-gradle`文件夹内创建一个`buildSrc`文件夹来开始你的Hello Gradle Plugin开发。为了存放Java代码，在`buildSrc`下创建子文件夹`src/main/java`。目录结构应类似于图[5-5](#A978-1-4842-1031-4_5_Chapter.html#Fig5)所示的结构。\n\
    \n![A978-1-4842-1031-4_5_Fig5_HTML.jpg](A978-1-4842-1031-4_5_Fig5_HTML.jpg)\n\n\
    图5-5. `buildSrc`目录结构\n\n下一步是创建一个向控制台输出`\"Hello Gradle Plugin\"`的任务。在`buildSrc`文件夹下创建一个`GreetTask.java`文件，并复制清单[5-6](#A978-1-4842-1031-4_5_Chapter.html#FPar10)的内容。\n\
    \n清单5-6. `GreetTask.java`内容\n\n```\nimport org.gradle.api.DefaultTask;\nimport\
    \ org.gradle.api.tasks.TaskAction;\n\npublic class GreetTask extends DefaultTask\
    \ {\n    @TaskAction\n    public void greetAction() {\n        System.out.println(\"\
    Hello Gradle Plugin\");\n    }\n}\n```\n\n在Gradle中创建自定义任务最简单的方法是继承`org.gradle.api.DefaultTask`，该类本身实现了`org.gradle.api.Task`接口。为了让任务执行一个操作，你必须创建带有`System.out.println`语句的`greetAction`方法，该方法将消息写入控制台。为了让Gradle将此方法视为要执行的操作，你必须使用`@TaskAction`对其进行注解。\n\
    \n下一步是编写插件类本身。在`buildSrc`文件夹中创建`HelloPlugin.java`类，并将清单[5-7](#A978-1-4842-1031-4_5_Chapter.html#FPar11)的内容复制进去。\n\
    \n清单5-7. `HelloPlugin.java`内容\n\n```\nimport org.gradle.api.Plugin;\nimport org.gradle.api.Project;\n\
    import java.util.Map;\nimport java.util.HashMap;\n\npublic class HelloPlugin implements\
    \ Plugin<Project> {\n    @Override\n    public void  apply(Project project) {\n\
    \        project.getTasks().create(\"greet\", GreetTask.class);\n    }\n}\n```\n\
    \nGradle插件是通过实现`org.gradle.api.Plugin<T>`接口来创建的。`Plugin`接口包含一个名为`apply(Project)`的方法，插件类必须实现该方法。Gradle通过调用其`apply`方法来开始执行插件。因此，你在`apply`方法内部使用传入的`Project`参数注册`GreetTask`。你通过使用`create`方法来创建任务并将其添加到`Project`的任务容器中。`create`方法接受要创建的任务名称以及任务类。\n\
    \n至此，插件开发完成。要使用此插件，请将以下代码添加到`build.gradle`文件中：\n\n```\napply plugin: HelloPlugin\n\
    ```\n\n现在，让我们使用该插件并通过命令`gradle greet`运行`greet`任务。你应该会在输出中看到文本`\"Hello Gradle Plugin\"\
    `，如下所示：\n\n```\n\\hello-gradle>gradle greet\n:buildSrc:compileJava\n:buildSrc:compileGroovy\
    \ UP-TO-DATE\n:buildSrc:processResources UP-TO-DATE\n:buildSrc:classes\n:buildSrc:jar\n\
    :buildSrc:assemble\n:buildSrc:compileTestJava UP-TO-DATE\n:buildSrc:compileTestGroovy\
    \ UP-TO-DATE\n:buildSrc:processTestResources UP-TO-DATE\n:buildSrc:testClasses\
    \ UP-TO-DATE\n:buildSrc:test UP-TO-DATE\n:buildSrc:check UP-TO-DATE\n:buildSrc:build\n\
    :greet\nHello Gradle Plugin\nBUILD SUCCESSFUL\nTotal time: 5.725 secs\n```"
  raw: '### War Task


    The `War` task in the `War` plugin is responsible for assembling the WAR archive.
    By default, it performs the following actions:


    *   Copies compiled Java code to the `WEB-INF/classes` folder.

    *   Copies the content of `src/main/webapp` into the root of the WAR file.

    *   Copies dependencies in the runtime configuration to the `WEB-INF/lib` folder.


    The `War` task provides several properties and methods that can be used to customize
    the generated artifact. The following code showcases some of these configuration
    options:


    `war {`


        `archiveName ''new-archive.war''`


        `webXml file (''src/config/web.xml'')`


        `from ''src/media/images''`


    `}`


    This configuration renames the generated artifact name to `new-archive.war`. It
    then configures the `War` task to use `web.xml` file located in the `src/config`
    folder. Finally, the task is configured to add the contents in the `src/media/images`
    folder to the root of the WAR file. With a `War` plugin, the contents of the WAR
    file by default are located in `src/main/webapp`. It is important to remember
    that this configuration only appends the content from the `images` folder to the
    WAR file. If you want the `War` task to override the default behavior and look
    for contents elsewhere, say `src/WebContent`, you need to change the war plugin’s
    `webAppDirName` property:


    `apply plugin: ''war''`


    `apply plugin: ''jetty''`


    `webAppDirName = ''src/WebContent''`


    ## Writing a Custom Plugin


    Gradle makes it very easy to build custom binary plugins. You simply need to create
    a class that implements the `org.gradle.api.Plugin<T>` interface. The plugin class
    and its associated code can reside in one of the following three locations:


    *   Build script: The plugin source code can be directly embedded into the build
    script. This approach limits the reuse value of the plugin as the plugin is not
    visible outside the build script.

    *   buildSrc project: Plugin code that resides under the `buildSrc` project is
    automatically compiled and is made available in the build script’s classpath.
    This plugin is also not visible outside the build and hence doesn’t provide reuse
    outside the project.

    *   Stand-alone project: Plugin code can be bundled as a JAR file that can then
    be included in the build script’s classpath. This approach provides the highest
    reuse value but also requires separate project and build infrastructure.


    In the next sections, you will build a simple plugin with a single task that prints
    `"Hello Gradle Plugin"` to the console and a more complex plugin that generates
    a build number. You will take the `buildSrc` project approach for building the
    simple plugin. Gradle plugins can be written in any language that can compile
    to byte code. You will initially use Java to create the simple plugin followed
    by an example using Groovy. You will be using the stand-alone project approach
    for building the complex plugin.


    ### Creating a Java Plugin


    You’ll begin your Hello Gradle Plugin development by creating a `buildSrc` folder
    inside the `hello-gradle` folder. To house Java code, underneath `buildSrc`, create
    the subfolders `src/main/java`. The directory structure should resemble the structure
    shown in Figure [5-5](#A978-1-4842-1031-4_5_Chapter.html#Fig5).


    ![A978-1-4842-1031-4_5_Fig5_HTML.jpg](A978-1-4842-1031-4_5_Fig5_HTML.jpg)


    Figure 5-5.


    The buildSrc Directory Structure


    The next step is to create a task that outputs `"Hello Gradle Plugin"` to the
    console. Create a `GreetTask.java` file under the `buildSrc` folder and copy the
    contents of Listing [5-6](#A978-1-4842-1031-4_5_Chapter.html#FPar10).


    Listing 5-6\. GreetTask.java Contents


    `import org.gradle.api.DefaultTask;`


    `import org.gradle.api.tasks.TaskAction;`


    `public class GreetTask extends DefaultTask {`


        `@TaskAction`


        `public void greetAction() {`


            `System.out.println("Hello Gradle Plugin");`


        `}`


    `}`


    The easiest way to create a custom task in Gradle is to extend `org.gradle.api.DefaultTask`,
    which itself implements the `org.gradle.api.Task` interface. For the task to perform
    an action, you have to create the `greetAction` method with the `System.out.println`
    statement, which writes the message to the console. For Gradle to treat this method
    as an action to execute, you must annotate it with `@TaskAction`.


    The next step is to write the plugin class itself. Create the `HelloPlugin.java`
    class in the `buildSrc` folder and copy the contents of Listing [5-7](#A978-1-4842-1031-4_5_Chapter.html#FPar11)
    into it.


    Listing 5-7\. The HelloPlugin.java Contents


    `import org.gradle.api.Plugin;`


    `import org.gradle.api.Project;`


    `import java.util.Map;`


    `import java.util.HashMap;`


    `public class HelloPlugin implements Plugin<Project> {`


        `@Override`


        `public void  apply(Project project) {`


            `project.getTasks().create("greet", GreetTask.class);`


        `}`


    `}`


    A Gradle plugin is created by implementing the `org.gradle.api.Plugin<T>` interface.
    The `Plugin` interface contains one method named `apply(Project)` that the plugin
    classes must implement. Gradle begins the plugin execution by invoking its `apply`
    method. Hence, you register the `GreetTask` inside the `apply` method using the
    passed-in `Project` argument. You do this using the `create` method to create
    a task and add it to the `Project` task container. The `create` method takes the
    name of the task being created along with the task class.


    This concludes the plugin development. To use this plugin, add the following code
    to `build.gradle` file:


    `apply plugin: HelloPlugin`


    Now let’s use the plugin and run the `greet` task using the command `gradle greet`.
    You should see the text `"Hello Gradle Plugin"` in the output, as shown here:


    `\hello-gradle>gradle greet`


    `:buildSrc:compileJava`


    `:buildSrc:compileGroovy UP-TO-DATE`


    `:buildSrc:processResources UP-TO-DATE`


    `:buildSrc:classes`


    `:buildSrc:jar`


    `:buildSrc:assemble`


    `:buildSrc:compileTestJava UP-TO-DATE`


    `:buildSrc:compileTestGroovy UP-TO-DATE`


    `:buildSrc:processTestResources UP-TO-DATE`


    `:buildSrc:testClasses UP-TO-DATE`


    `:buildSrc:test UP-TO-DATE`


    `:buildSrc:check UP-TO-DATE`


    `:buildSrc:build`


    `:greet`


    `Hello Gradle Plugin`


    `BUILD SUCCESSFUL`


    `Total time: 5.725 secs`'
