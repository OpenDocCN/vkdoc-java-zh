- fmt: "### File Dependencies\n\nMost legacy projects contain dependencies inside\
    \ a `lib` folder in their project or in a folder on a shared drive. Gradle’s file\
    \ dependency type allows you to use such files directly in your project. This\
    \ type is especially useful during legacy project migrations or when you don’t\
    \ have a private repository to host internal libraries.\n\nTo better understand\
    \ file dependency type, let’s create a new project named `gradle-file-dep`. Create\
    \ the `gradle-file-dep` folder on your file system and an empty `build.gradle`\
    \ file. Inside this folder, create a `lib` subfolder and populate it with a couple\
    \ of JAR files. Table [6-3](#A978-1-4842-1031-4_6_Chapter.html#Tab3) lists the\
    \ JAR files you will be using along with the links to download them from the Internet.\n\
    \n**Table 6-3.** JAR Files Inside the `lib` Folder\n\n| JAR File | Download URL\
    \ |\n| --- | --- |\n| `logback-classic-1.1.3.jar` | [`http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar`](http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar)\
    \ |\n| `commons-lang3-3.4.jar` | [`http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar`](http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar)\
    \ |\n| `spring-core-4.2.3.RELEASE.jar` | [`http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar`](http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar)\
    \ |\n| `slf4j-api-1.7.13.jar` | [`http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar`](http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar)\
    \ |\n\nAt this point, the project should have the directory structure shown in\
    \ Figure [6-3](#A978-1-4842-1031-4_6_Chapter.html#Fig3).\n\n![A978-1-4842-1031-4_6_Fig3_HTML.jpg](A978-1-4842-1031-4_6_Fig3_HTML.jpg)\n\
    \n**Figure 6-3.** The `gradle-file-dep` folder structure\n\nAdding files as dependencies\
    \ to your project involves passing in a file collection to Gradle. As the name\
    \ suggests, a file collection is simply a set of files. The easiest way to work\
    \ with a file collection is to use the `Project.files()` method. This method takes\
    \ a variable number of objects as parameters and attempts to convert them into\
    \ sets of `java.io.File` instances. Listing [6-4](#A978-1-4842-1031-4_6_Chapter.html#FPar5)\
    \ shows the `build.gradle` file with two file dependencies added to the `compile`\
    \ configuration.\n\n**Listing 6-4.** The `build.gradle` with two File Dependencies\n\
    \n```\napply plugin: 'java'\n\ndependencies {\n    compile files (\"lib/logback-classic-1.1.3.jar\"\
    , \"lib/commons-lang3-3.4.jar\")\n}\n```\n\nInstead of spelling out each file\
    \ as a dependency, there are occasions where you might want to include all or\
    \ a subset of files in a folder. You can accomplish that using project’s `fileTree`\
    \ method. A file tree represents a hierarchy of files, such as `directory`. Listing\
    \ [6-5](#A978-1-4842-1031-4_6_Chapter.html#FPar6) shows the updated `build.gradle`\
    \ file that adds all the JAR files inside the `lib` directory to the `compile`\
    \ configuration.\n\n**Listing 6-5.** File Dependency Type Using File Trees\n\n\
    ```\napply plugin: 'java'\n\ndependencies {\n    compile fileTree (dir : \"lib\"\
    , include: \"*.jar\")\n}\n```\n\nFile dependencies are not included in the project’s\
    \ dependency descriptor. Hence, running the command `gradle dependencies` will\
    \ not list the file dependency JARs on the console. To see those JARs, append\
    \ the `displayJars` task shown in Listing [6-6](#A978-1-4842-1031-4_6_Chapter.html#FPar7)\
    \ to the `build.gradle` file. The task uses the `collect()` method to iterate\
    \ through all the dependencies in the `compile` configuration and prints their\
    \ names.\n\n**Listing 6-6.** The `displayJars` Task\n\n```\ntask displayJars <<\
    \ {\n    println \"${configurations.compile.collect {File f -> f.name}}\"\n}\n\
    ```\n\nUsing a command prompt, run the `gradle -q displayJars` command inside\
    \ the `project` folder. You should see the following output:\n\n```\n\\gradle-file-dep>gradle\
    \ -q displayJars\n[commons-lang3-3.4.jar, logback-classic-1.1.3.jar, slf4j-api-1.7.13.jar,\
    \ spring-\ncore-4.2.3.RELEASE.jar]\n```\n\n### Project Dependencies\n\nComplex\
    \ enterprise projects are often split into smaller projects. For example, an online\
    \ application might be broken into three separate projects—a web project containing\
    \ UI related assets and components, a services project that contains backend services,\
    \ and a repository project that contains repository/DAO code to access a database\
    \ backend. In such scenarios, the web project depends on the service project,\
    \ which in turn depends on the repository project. Gradle provides the project\
    \ dependency type to establish such dependencies.\n\nProject dependencies can\
    \ be declared using the project’s `project()` method, which takes the name of\
    \ the dependent project. Listing [6-7](#A978-1-4842-1031-4_6_Chapter.html#FPar8)\
    \ shows an example of a “web” project depending on the `service` project. The\
    \ colon (`:`) character denotes project hierarchy. Hence the string `\":service\"\
    ` indicates that the service project is one level underneath the root.\n\n**Listing\
    \ 6-7.** The Project Dependency Type\n\n```\ndependencies {\n    compile project\
    \ (\":service\")\n}\n```\n\nWith this project dependency, Gradle will include\
    \ the generated `service.jar` artifact as a dependency in the web project. Additionally\
    \ the service project’s dependencies and their transitive dependencies are added\
    \ as web project’s dependencies. You will look at project dependencies in more\
    \ detail and with examples in [Chapter 7](#A978-1-4842-1031-4_7_Chapter.html)."
  raw: '### File Dependencies


    Most legacy projects contain dependencies inside a `lib` folder in their project
    or in a folder on a shared drive. Gradle’s file dependency type allows you to
    use such files directly in your project. This type is especially useful during
    legacy project migrations or when you don’t have a private repository to host
    internal libraries.


    To better understand file dependency type, let’s create a new project named `gradle-file-dep`.
    Create the `gradle-file-dep` folder on your file system and an empty `build.gradle`
    file. Inside this folder, create a `lib` subfolder and populate it with a couple
    of JAR files. Table [6-3](#A978-1-4842-1031-4_6_Chapter.html#Tab3) lists the JAR
    files you will be using along with the links to download them from the Internet.


    Table 6-3.


    JAR Files Inside the lib Folder


    | JAR File | Download URL |

    | --- | --- |

    | `logback-classic-1.1.3.jar` | [`http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar`](http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar)
    |

    | `commons-lang3-3.4.jar` | [`http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar`](http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar)
    |

    | `spring-core-4.2.3.RELEASE.jar` | [`http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar`](http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar)
    |

    | `slf4j-api-1.7.13.jar` | [`http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar`](http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar)
    |


    At this point, the project should have the directory structure shown in Figure
    [6-3](#A978-1-4842-1031-4_6_Chapter.html#Fig3).


    ![A978-1-4842-1031-4_6_Fig3_HTML.jpg](A978-1-4842-1031-4_6_Fig3_HTML.jpg)


    Figure 6-3.


    The gradle-file-dep folder structure


    Adding files as dependencies to your project involves passing in a file collection
    to Gradle. As the name suggests, a file collection is simply a set of files. The
    easiest way to work with a file collection is to use the `Project.files()` method.
    This method takes a variable number of objects as parameters and attempts to convert
    them into sets of `java.io.File` instances. Listing [6-4](#A978-1-4842-1031-4_6_Chapter.html#FPar5)
    shows the `build.gradle` file with two file dependencies added to the `compile`
    configuration.


    Listing 6-4\. The build.gradle with two File Dependencies


    `apply plugin: ''java''`


    `dependencies {`


    `compile files ("lib/logback-classic-1.1.3.jar", "lib/commons-lang3-3.4.jar")`


    `}`


    Instead of spelling out each file as a dependency, there are occasions where you
    might want to include all or a subset of files in a folder. You can accomplish
    that using project’s `fileTree` method. A file tree represents a hierarchy of
    files, such as `directory`. Listing [6-5](#A978-1-4842-1031-4_6_Chapter.html#FPar6)
    shows the updated `build.gradle` file that adds all the JAR files inside the `lib`
    directory to the `compile` configuration.


    Listing 6-5\. File Dependency Type Using File Trees


    `apply plugin: ''java''`


    `dependencies {`


    `compile fileTree (dir : "lib", include: "*.jar")`


    `}`


    File dependencies are not included in the project’s dependency descriptor. Hence,
    running the command `gradle dependencies` will not list the file dependency JARs
    on the console. To see those JARs, append the `displayJars` task shown in Listing
    [6-6](#A978-1-4842-1031-4_6_Chapter.html#FPar7) to the `build.gradle` file. The
    task uses the `collect()` method to iterate through all the dependencies in the
    `compile` configuration and prints their names.


    Listing 6-6\. The displayJars Task


    `task displayJars << {`


    `println "${configurations.compile.collect {File f -> f.name}}"`


    `}`


    Using a command prompt, run the `gradle -q displayJars` command inside the `project`
    folder. You should see the following output:


    `\gradle-file-dep>gradle -q displayJars`


    `[commons-lang3-3.4.jar, logback-classic-1.1.3.jar, slf4j-api-1.7.13.jar, spring-`


    `core-4.2.3.RELEASE.jar]`


    ### Project Dependencies


    Complex enterprise projects are often split into smaller projects. For example,
    an online application might be broken into three separate projects—a web project
    containing UI related assets and components, a services project that contains
    backend services, and a repository project that contains repository/DAO code to
    access a database backend. In such scenarios, the web project depends on the service
    project, which in turn depends on the repository project. Gradle provides the
    project dependency type to establish such dependencies.


    Project dependencies can be declared using the project’s `project()` method, which
    takes the name of the dependent project. Listing [6-7](#A978-1-4842-1031-4_6_Chapter.html#FPar8)
    shows an example of a “web” project depending on the `service` project. The colon
    (`:`) character denotes project hierarchy. Hence the string `":service"` indicates
    that the service project is one level underneath the root.


    Listing 6-7\. The Project Dependency Type


    `dependencies {`


        `compile project (":service")`


    `}`


    With this project dependency, Gradle will include the generated `service.jar`
    artifact as a dependency in the web project. Additionally the service project’s
    dependencies and their transitive dependencies are added as web project’s dependencies.
    You will look at project dependencies in more detail and with examples in [Chapter
    7](#A978-1-4842-1031-4_7_Chapter.html).'
  trans: '

    ### 文件依赖


    大多数遗留项目在其项目的 `lib` 文件夹或共享驱动器上的文件夹中包含依赖项。Gradle 的文件依赖类型允许您直接在项目中使用此类文件。这种类型在遗留项目迁移或当您没有私有仓库来托管内部库时特别有用。


    为了更好地理解文件依赖类型，让我们创建一个名为 `gradle-file-dep` 的新项目。在您的文件系统上创建 `gradle-file-dep` 文件夹和一个空的
    `build.gradle` 文件。在此文件夹内，创建一个 `lib` 子文件夹，并向其中放入几个 JAR 文件。表 6-3 列出了您将使用的 JAR 文件以及从互联网下载它们的链接。


    表 6-3.


    lib 文件夹内的 JAR 文件


    | JAR 文件 | 下载 URL |

    | --- | --- |

    | `logback-classic-1.1.3.jar` | [`http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar`](http://search.maven.org/remotecontent?filepath=ch/qos/logback/logback-classic/1.1.3/logback-classic-1.1.3.jar)
    |

    | `commons-lang3-3.4.jar` | [`http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar`](http://search.maven.org/remotecontent?filepath=org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.jar)
    |

    | `spring-core-4.2.3.RELEASE.jar` | [`http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar`](http://search.maven.org/remotecontent?filepath=org/springframework/spring-core/4.2.3.RELEASE/spring-core-4.2.3.RELEASE.jar)
    |

    | `slf4j-api-1.7.13.jar` | [`http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar`](http://search.maven.org/remotecontent?filepath=org/slf4j/slf4j-api/1.7.13/slf4j-api-1.7.13.jar)
    |


    此时，项目应具有如图 6-3 所示的目录结构。


    ![A978-1-4842-1031-4_6_Fig3_HTML.jpg](img/A978-1-4842-1031-4_6_Fig3_HTML.jpg)


    图 6-3.


    gradle-file-dep 文件夹结构


    将文件作为依赖项添加到项目涉及向 Gradle 传递一个文件集合。顾名思义，文件集合就是一组文件。处理文件集合的最简单方法是使用 `Project.files()`
    方法。此方法接受可变数量的对象作为参数，并尝试将它们转换为 `java.io.File` 实例的集合。清单 6-4 显示了 `build.gradle` 文件，其中向
    `compile` 配置添加了两个文件依赖项。


    清单 6-4\. 包含两个文件依赖项的 build.gradle


    `apply plugin: ''java''`


    `dependencies {`


    `compile files ("lib/logback-classic-1.1.3.jar", "lib/commons-lang3-3.4.jar")`


    `}`


    有时，您可能希望包含文件夹中的所有文件或子集，而不是将每个文件都列为依赖项。您可以使用项目的 `fileTree` 方法来实现这一点。文件树表示文件的层次结构，例如
    `directory`。清单 6-5 显示了更新后的 `build.gradle` 文件，该文件将 `lib` 目录中的所有 JAR 文件添加到 `compile`
    配置中。


    清单 6-5\. 使用文件树的文件依赖类型


    `apply plugin: ''java''`


    `dependencies {`


    `compile fileTree (dir : "lib", include: "*.jar")`


    `}`


    文件依赖项不包含在项目的依赖描述符中。因此，运行 `gradle dependencies` 命令不会在控制台上列出文件依赖项的 JAR。要查看这些 JAR，请将清单
    6-6 中所示的 `displayJars` 任务附加到 `build.gradle` 文件中。该任务使用 `collect()` 方法遍历 `compile`
    配置中的所有依赖项并打印它们的名称。


    清单 6-6\. displayJars 任务


    `task displayJars << {`


    `println "${configurations.compile.collect {File f -> f.name}}"`


    `}`


    使用命令提示符，在 `project` 文件夹内运行 `gradle -q displayJars` 命令。您应该会看到以下输出：


    `\gradle-file-dep>gradle -q displayJars`


    `[commons-lang3-3.4.jar, logback-classic-1.1.3.jar, slf4j-api-1.7.13.jar, spring-`


    `core-4.2.3.RELEASE.jar]`


    ### 项目依赖


    复杂的企业项目通常被拆分为更小的项目。例如，一个在线应用程序可能被分解为三个独立的项目——一个包含 UI 相关资源和组件的 Web 项目、一个包含后端服务的服务项目，以及一个包含用于访问数据库后端的仓库/DAO
    代码的仓库项目。在这种情况下，Web 项目依赖于服务项目，而服务项目又依赖于仓库项目。Gradle 提供了项目依赖类型来建立此类依赖关系。


    项目依赖可以使用项目的 `project()` 方法来声明，该方法接受被依赖项目的名称。清单 6-7 展示了一个“web”项目依赖于 `service` 项目的示例。冒号
    (`:`) 字符表示项目层次结构。因此，字符串 `":service"` 表示服务项目位于根目录下一级。


    清单 6-7\. 项目依赖类型


    `dependencies {`


        `compile project (":service")`


    `}`


    通过此项目依赖，Gradle 会将生成的 `service.jar` 工件作为依赖项包含在 Web 项目中。此外，服务项目的依赖项及其传递依赖项也会作为 Web
    项目的依赖项添加。您将在第 7 章中更详细地了解项目依赖项，并附有示例。

    '
- fmt: "# Resolving Dependency Conflicts\n\nConsider a Gradle project named `transitive-dep`\
    \ that uses the Spring Core library (`spring-core.jar`) and Apache HttpClient\
    \ (`httpclient.jar`). Listing [6-8](#A978-1-4842-1031-4_6_Chapter.html#FPar9)\
    \ shows the project's `build.gradle` file with the two compile-time dependencies.\n\
    \nListing 6-8\\. Version Conflict Example\n\n```\napply plugin: 'java'\n\ndependencies\
    \ {\n    compile 'org.springframework:spring-core:4.2.2.RELEASE', 'org.apache.httpcomponents:httpclient:4.0'\n\
    }\n\nrepositories {\n    mavenCentral()\n}\n```\n\nBoth the Spring Core and HttpClient\
    \ libraries use Apache Commons Logging as their underlying logging framework.\
    \ However, the version 4.2.2 of Spring Core uses Commons Logging version 1.2,\
    \ while version 4.0 of HttpClient uses Commons Logging version 1.1. When such\
    \ version conflicts arise, Gradle by default uses the latest version of the transitive\
    \ dependency. Output of the `gradle dependencies` command shows this resolution\
    \ strategy:\n\n```\n\\chapter 6 \\transitive-dep>gradle dependencies\n----------\n\
    compile - Compile classpath for source set 'main'.\n+--- org.springframework:spring-core:4.2.2.RELEASE\n\
    |    \\--- commons-logging:commons-logging:1.2\n\\--- org.apache.httpcomponents:httpclient:4.0\n\
    +--- org.apache.httpcomponents:httpcore:4.0.1\n+--- commons-logging:commons-logging:1.1.1\
    \ -> 1.2\n\\--- commons-codec:commons-codec:1.3\n```\n\nOn occasions, you might\
    \ not want Gradle to pick the latest JAR file. In such scenarios, you can change\
    \ the default resolution strategy and force Gradle to include a certain version.\
    \ Listing [6-9](#A978-1-4842-1031-4_6_Chapter.html#FPar10) shows the modified\
    \ `build.gradle` file accomplishing this. The `configurations{}` block allows\
    \ you to configure project's dependency configuration behavior. You then apply\
    \ a `resolutionStrategy` block to all configurations. Finally, you use the `force`\
    \ method to force the usage of 1.1.1 version of `commons-logging` dependency.\n\
    \nListing 6-9\\. Resolution Strategy Forcing a Dependency\n\n```\napply plugin:\
    \ 'java'\n\nconfigurations.all {\n    resolutionStrategy {\n        force 'commons-logging:commons-logging:1.1.1'\n\
    \    }\n}\n\ndependencies {\n    compile 'org.springframework:spring-core:4.2.2.RELEASE',\
    \ 'org.apache.httpcomponents:httpclient:4.0'\n}\n\nrepositories {\n    mavenCentral()\n\
    }\n```\n\nRunning the `gradle dependencies` command on the modified `build.gradle`\
    \ shows that the 1.1.1 version is being picked up over the 1.2 version:\n\n```\n\
    default - Configuration for default artifacts.\n+--- org.springframework:spring-core:4.2.2.RELEASE\n\
    |    \\--- commons-logging:commons-logging:1.2 -> 1.1.1\n\\--- org.apache.httpcomponents:httpclient:4.0\n\
    +--- org.apache.httpcomponents:httpcore:4.0.1\n+--- commons-logging:commons-logging:1.1.1\n\
    \\--- commons-codec:commons-codec:1.3\n```\n\nThough transitive dependencies are\
