    For example, the version numbers of the dependent artifacts are typically declared
    as project properties (more about that in [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html)).
    Properties specific to a task are declared as task properties. In Listing [4-3](#A978-1-4842-1031-4_4_Chapter.html#FPar3)
    used the `ext` closure to declare a task property named `taskProp1`. The code
    also added three actions to `doFirst` method and one action to the `doLast` method.
