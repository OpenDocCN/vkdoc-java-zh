    ## 总结


    在本章中，你学习了持续集成流程，并探索了 Jenkins——一款流行的开源 CI 服务器。你了解了如何安装 Jenkins 以及配置必要的插件，以运行位于
    GitHub 仓库中的示例项目。


    至此，本书的旅程已接近尾声。通过本书，你已经掌握了 Gradle 背后的关键概念。我们希望你能运用新学到的 Gradle 知识，来自动化并改进现有的构建和项目管理流程。


