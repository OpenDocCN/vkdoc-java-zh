  raw: '## Dealing with Additional Artifacts


    Earlier in the chapter you learned that the `archives` configuration is used to
    declare artifacts produced by a project. Plugins such as Java automatically associate
    the generated JAR file with this configuration. However, if your project produces
    additional artifacts (for example, a source JAR or a Javadoc JAR), you need to
    explicitly associate those with the `archives` configuration in your build file.
    You achieve this by providing to the `archives` configuration, the actual artifact
    or a task that produces the artifact.


    To better understand this concept, consider the scenario where you want `sample-app`
    to distribute the following artifacts:


    *   A properties file named `app.properties` located at the root of the project.

    *   A JAR file containing the project’s source code


    To follow along the rest of the code samples, create an `app.properties` file
    in the `sample-app` folder and copy the following content:


    `licenseKey=XYFDLE`


    `encrypt=false`


    Listing [8-3](#A978-1-4842-1031-4_8_Chapter.html#FPar3) shows the portion of sample-app’s
    `build.gradle` file that assigns the two artifacts from this use case to `archives`
    configuration. You begin by declaring a reference to the `app.properties` artifact.
    Then you create a `sourceJar` task that would generate a JAR file with the source
    code and resource files in the `src/main` folder. Finally, you use the `artifacts`
    block to add the properties artifact and source JAR task to the `archives` configuration.


    Listing 8-3\. Associating artifact to configuration


    `def propertiesArtifact = file(''app.properties'')`


    `task sourceJar (type : Jar) {`


       `classifier = ''sources''`


       `from sourceSets.main.allSource`


    `}`


    `artifacts {`


       `archives propertiesArtifact`


       `archives sourceJar`


    `}`


    With this listing added to `sample-app`’s `build.gradle` file, you can run the
    `uploadArchives` task and it will automatically deploy the two new artifacts along
    with the `sample-app.jar` file to the Maven repository. Running the command should
    yield this output:


    `\chapter` `8` `\sample-app>gradle uploadArchives`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:jar UP-TO-DATE`


    `:sourceJar`


    `:uploadArchives`


    `BUILD SUCCESSFUL`


    Upon successful execution of the command, navigate to the URL `http://localhost:8081/nexus/content/repositories/snapshots/com/apress/gradle/intro/sample-app/1.0-SNAPSHOT/`
    in a browser. You should see the three artifacts shown in Figure [8-4](#A978-1-4842-1031-4_8_Chapter.html#Fig4).


    ![A978-1-4842-1031-4_8_Fig4_HTML.jpg](A978-1-4842-1031-4_8_Fig4_HTML.jpg)


    Figure 8-4.


    Sample app’s three artifacts in Maven repo


    Open the `sample-app-1.0-###########.properties` file; it should contain the content
    shown in Figure [8-5](#A978-1-4842-1031-4_8_Chapter.html#Fig5).


    ![A978-1-4842-1031-4_8_Fig5_HTML.jpg](A978-1-4842-1031-4_8_Fig5_HTML.jpg)


    Figure 8-5.


    Property file contents


    ## Installing to a Gradle Cache


    In [Chapter 6](#A978-1-4842-1031-4_6_Chapter.html), you learned that Gradle maintains
    a cache where it stores downloaded artifacts and metadata. This improves build
    performance since the number of download requests made to external repositories
    is significantly reduced. By default this cache is located in the `<<USER_HOME>>/.gradle/caches`
    folder. Figure [8-6](#A978-1-4842-1031-4_8_Chapter.html#Fig6) shows a portion
    of Gradle cache located on our machine. Gradle computes a `SHA1` hashcode of the
    artifact contents and uses it as the folder name for housing the artifact. Gradle
    doesn’t guarantee this folder structure and it is quite possible that the structure
    may change with new Gradle versions.


    ![A978-1-4842-1031-4_8_Fig6_HTML.jpg](A978-1-4842-1031-4_8_Fig6_HTML.jpg)


    Figure 8-6.


    Gradle cache directory structure


    Consider a scenario where you want to a third-party JAR file to be added to Gradle’s
    cache so that it is available for Gradle builds. There could also be a different
    scenario where you have a project (called A) producing a JAR file that you want
    to be available in the Gradle cache for other projects to use. Folks with a Maven
    background quickly recollect the “install/install-file” goals provided by Maven
    ( [`https://maven.apache.org/guides/mini/guide-3rd-party-jars-local.html`](https://maven.apache.org/guides/mini/guide-3rd-party-jars-local.html)
    ) that allow you to add files to the Maven local cache. Gradle, on the other hand,
    treats its cache as a true cache and doesn’t provide any mechanism to directly
    add JAR files.


    To address these scenarios with Gradle, three options are discussed in the next
    subsections.


    ### Use a File Repository


    Add the third-party JAR files to a directory on your file systems. You can configure
    projects such as Project A in this scenario to publish generated artifacts to
    this directory. Projects needing to use the JAR files can use this directory as
    a file repository.


    ### Use a Local Maven Repository


    Publish JAR files to your local Maven repository and configure Gradle to pull
    dependencies from the Maven cache. Gradle projects using Maven can publish their
    artifacts to the local Maven repository using the `gradle install` command. For
    example, running `gradle install` in `sample-app` would make the `sample-app.jar`
    file available in local Maven repository, as shown in Figure [8-7](#A978-1-4842-1031-4_8_Chapter.html#Fig7).


    ![A978-1-4842-1031-4_8_Fig7_HTML.jpg](A978-1-4842-1031-4_8_Fig7_HTML.jpg)


    Figure 8-7.


    Sample app JAR in the local Maven repository


    ### Use a Central Repository


    Publish the third-party JARs to a central repository such as Nexus. For JARs produced
    by projects such as project A, have a CI server build the project on a regular
    basis and push it to central repository. If the contents of these JAR files were
    to change often, the projects using the JAR file need to declare the dependency
    as changing. Here is an example of such a declaration:


    `dependencies {`


        `compile group:"com.apress", name:"A",version:"1.0-SNAPSHOT",``changing: true`


    `}`


    Gradle by default caches artifacts marked `changing` for 24 hours. You can force
    Gradle to check for updated versions with every build by configuring its resolution
    strategy. Here is an example of such a configuration:


    `configurations.all {`


         `resolutionStrategy.cacheChangingModulesFor 0, "seconds"`


    `}`


    ## Summary


    In this chapter you reviewed Gradle’s support for publishing artifacts. You learned
    that archives configuration is used to declare the artifacts produced by a project.
    You used `uploadArchives` to publish to a local file repository. Then you looked
    at installing Nexus Maven repository manager and used `mavenDeployer` to publish
    to a remote Maven repository. You also learned the configuration needed to deal
    with additional artifacts.


    In the next chapter, you will review the concepts of continuous integration and
    explore a popular CI server, called Jenkins, and its support for Gradle.


    # 9. Continuous Integration


    Continuous integration or CI is a software engineering practice where changes
    to source code are integrated into a shared mainline several times a day. Each
    change results in an automatic build that compiles and tests the entire code base.
    Any failures are immediately reported back, resulting in early detection of integration
    problems. Continuous integration also allows you to automatically monitor code
    quality, generate code coverage metrics, and assess overall project health.


    The continuous integration market is filled with several open source and commercial
    tools such as Hudson, TeamCity, Bamboo, and Jenkins. This chapter explores Jenkins
    and its support for Gradle.'
