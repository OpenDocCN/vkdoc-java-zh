    \ method. In the `doFirst` method, the `$project` variable prints project object’s\
    \ description to the console. Since `name` and `description` are task properties,\
    \ you can access them directly to print their values.\n\nCreate a new build file\
    \ named `display-properties.gradle` and copy the contents of Listing [4-3](#A978-1-4842-1031-4_4_Chapter.html#FPar3).\
    \ Execute the `displayProperties` task and you should see the following output.\
    \ As you can see, the actions inside the `doFirst` were executed first, followed\
    \ by the actions inside the `doLast` block.\n\n```\n\\chapter 4 >gradle -b display-properties.gradle\
    \ displayProperties\n:displayProperties\nProject Description: Sample Description\
    \ for Project\nTask name displayProperties\nTask Description: Task to display\
    \ properties\nTask Property 1: Prop Val\nBUILD SUCCESSFUL\nTotal time: 4.046 secs\n\
    ```\n\n**Tip**\n\nWhen executing a task in the command-line, you don’t have to\
    \ specify full task name. A camelCase task name can be run by abbreviating each\
    \ word. For example, the `displayProperties` task can be run using the following\
    \ shortcut: `gradle -b display-properties.gradle dP`.\n\nFor Gradle to execute\
    \ task(s), you need to pass in the name of the task(s) as part of the Gradle command,\
