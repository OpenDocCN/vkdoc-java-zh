- fmt: "# Repositories\n\nAs discussed at the beginning of this chapter, repositories\
    \ contain dependencies and associated metadata. Gradle out-of-the-box can work\
    \ with Maven, Ivy, and local directory repositories. It also provides a few preconfigured\
    \ repositories that make it easy to interact with commonly used repositories.\
    \ The `mavenCentral()` repository is one such preconfigured repository that points\
    \ to Maven’s central repository at `https://repo1.maven.org/maven2`. Listing [6-11](#A978-1-4842-1031-4_6_Chapter.html#FPar12)\
    \ shows the configuration needed to interact with Maven Central. The `repositories`\
    \ block is used to configure repositories used in a project.\n\nListing 6-11\\\
    . Mavan Central Repository Config\n\n```\nrepositories {\n    mavenCentral()\n\
    }\n```\n\nJCenter is another popular repository that hosts artifacts at `https://bintray.com/bintray/jcenter`.\
    \ Listing [6-12](#A978-1-4842-1031-4_6_Chapter.html#FPar13) shows the configuration\
    \ to interact with JCenter repo.\n\nListing 6-12\\. JCenter Repository Config\n\
    \n```\nrepositories {\n    jcenter()\n}\n```\n\nMore often than not, your company\
    \ might have an internal Maven repository. Gradle provides a `maven()` method\
    \ that makes it easy to add and configure a Maven repository. Listing [6-13](#A978-1-4842-1031-4_6_Chapter.html#FPar14)\
    \ shows a custom Maven repository declaration. For repositories that need authentication,\
    \ the configuration allows you to provide credentials.\n\nListing 6-13\\. Custom\
    \ Maven Repository\n\n```\napply plugin: 'java'\n\nrepositories {\n    maven {\n\
    \        url \"http://your_repo.url\"\n        credentials {\n            username\
    \ 'user_name'\n            password 'pwd'\n        }\n    }\n}\n```\n\nIn certain\
    \ limited cases you might need to use a local Maven repository to retrieve dependencies.\
    \ Local Maven repositories are typically located in the `USER_HOME/.m2` directory.\
    \ For those scenarios, Gradle provides another preconfigured repository named\
    \ `mavenLocal()`, as shown in Listing [6-14](#A978-1-4842-1031-4_6_Chapter.html#FPar15).\n\
    \nListing 6-14\\. Maven Local Repository\n\n```\napply plugin: 'java'\n\nrepositories\
    \ {\n    mavenLocal()\n}\n```\n\nIn cases where you are dealing with legacy projects,\
    \ you might want to interact with libraries located in a local directory. Gradle\
    \ supports such interactions with a flat directory repository. This shouldn’t\
    \ be confused with a Maven local repository. Maven local repositories contain\
    \ artifacts and the associated metadata, such as a `pom.xml` file. However, a\
    \ flat directory just contains JAR files and no metadata. Listing [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16)\
    \ shows the configuration to use JAR files from the `lib` folder.\n\nListing 6-15\\\
    . Flat Directory Repository\n\n```\napply plugin: 'java'\n\nrepositories {\n \
    \   flatDir {\n        dirs 'lib'\n    }\n}\n\ndependencies {\n    compile name:\
    \ 'commons-lang3', version : '3.4'\n    compile name: 'logback-classic', version:\
    \ '1.1.3'\n}\n```\n\nWhen working with flat directory repositories, you need to\
    \ declare dependencies using the artifact’s `name` and `version` attributes. Listing\
    \ [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16) declares the `commons-lang3`\
    \ library with the `name` and `version` attributes. During the build, Gradle will\
    \ look for a JAR file with the name `commons-lang3-3.4.jar` inside the `lib` directory.\
    \ If the `logback-classic` library is declared using just the `name` attribute,\
    \ Gradle will look for a JAR named `logback-classic.jar` inside the `lib` folder.\n\
    \nUnlike file dependencies discussed in an earlier section, dependencies from\
    \ flat directory repositories are included in the project’s dependency descriptor.\
    \ To verify this configuration, create a `build-file-repository.gradle` file inside\
    \ the `gradle-file-dep` project and copy the contents of Listing [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16).\
    \ Run the `gradle -b build-file-repository.gradle dependencies` command in the\
    \ project and it will list the following dependencies:\n\n```\ncompile - Compile\
    \ classpath for source set 'main'.\n+--- :commons-lang3:3.4\n\\--- :logback-classic:1.1.3\n\
    ```\n\n## Uber JAR Creation\n\nFor Java projects, Gradle generates a JAR file\
    \ that contains compiled classes and other resources residing in the `src/main/resources`\
    \ folder. However, there are scenarios when you’ll want to distribute your Java\
    \ application as a self-contained application that includes all its dependent\
    \ JARs. A common technique to deliver such a bundle is to create an “uber” or\
    \ “fat” JAR. In this section, you will generate an uber JAR of the `gradle-dep`\
    \ project you have built in this chapter.\n\nTo build an uber JAR, you will use\
    \ an open source plugin named Shadow. The plugin’s page on the Gradle plugin portal\
    \ at `https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow` provides\
    \ a script snippet (shown in Listing [6-16](#A978-1-4842-1031-4_6_Chapter.html#FPar17))\
    \ to use the plugin.\n\nListing 6-16\\. Shadow Plugin Snippet\n\n```\nbuildscript\
    \ {\n    repositories {\n        maven {\n            url \"https://plugins.gradle.org/m2/\"\
    \n        }\n    }\n    dependencies {\n        classpath \"com.github.jengelman.gradle.plugins:shadow:1.2.2\"\
    \n    }\n}\n\napply plugin: \"com.github.johnrengelman.shadow\"\n```\n\nThe `buildscript`\
    \ block in Listing [6-16](#A978-1-4842-1031-4_6_Chapter.html#FPar17) allows you\
    \ to use third-party plugins such as Shadow. Inside the block, you declare the\
    \ Gradle Plugin Maven repository located at `https://plugins.gradle.org/m2/`.\
    \ This is followed by a `dependencies` block, where you add the plugin JAR to\
    \ the build script’s classpath.\n\nAppend the snippet in Listing [6-16](#A978-1-4842-1031-4_6_Chapter.html#FPar17)\
    \ to the bottom of `gradle-dep`’s `build.gradle` file. Listing [6-17](#A978-1-4842-1031-4_6_Chapter.html#FPar18)\
    \ shows the complete `build.gradle` file you will be using.\n\nListing 6-17\\\
    . The Build Script with Shadow Plugin\n\n```\napply plugin: 'java'\n\next {\n\
    \    logbackVersion = '1.1.2'\n    commonsLangVersion = '3.4'\n    junitVersion\
    \ = '4.12'\n    hsqlDbVersion = '2.3.3'\n}\n\ndependencies {\n    compile \"ch.qos.logback:logback-classic:$logbackVersion\"\
    , \"org.apache.commons:commons-lang3:$commonsLangVersion\"\n    testCompile (\n\
    \        [group: 'junit', name: 'junit', version: \"$junitVersion\"],\n      \
    \  [group: 'org.hsqldb', name: 'hsqldb', version: \"$hsqlDbVersion\"]\n    )\n\
    }\n\nrepositories {\n    mavenCentral()\n}\n\nbuildscript {\n    repositories\
    \ {\n        maven {\n            url \"https://plugins.gradle.org/m2/\"\n   \
    \     }\n    }\n    dependencies {\n        classpath \"com.github.jengelman.gradle.plugins:shadow:1.2.2\"\
    \n    }\n}\n\napply plugin: \"com.github.johnrengelman.shadow\"\n```\n\nRun the\
    \ `gradle shadowJar` command inside the `gradle-dep` project and you should see\
    \ this output:\n\n```\n\\chapter 6 \\gradle-dep>gradle shadowJar\n:compileJava\
    \ UP-TO-DATE\n:processResources UP-TO-DATE\n:classes UP-TO-DATE\n:shadowJar\n\
    BUILD SUCCESSFUL\n```\n\nUpon successful completion of the task, navigate to the\
    \ `build/libs` folder under the project and you should see a `gradle-dep-all.jar`.\
    \ The JAR file should contain classes from the Logback and Apache Commons Lang,\
    \ as shown in Figure [6-4](#A978-1-4842-1031-4_6_Chapter.html#Fig4).\n\n![A978-1-4842-1031-4_6_Fig4_HTML.jpg](A978-1-4842-1031-4_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4. Extracted directory structure of gradle-dep-all"
  raw: '## Repositories


    As discussed at the beginning of this chapter, repositories contain dependencies
    and associated metadata. Gradle out-of-the-box can work with Maven, Ivy, and local
    directory repositories. It also provides a few preconfigured repositories that
    make it easy to interact with commonly used repositories. The `mavenCentral()`
    repository is one such preconfigured repository that points to Maven’s central
    repository at `https://repo1.maven.org/maven2`. Listing [6-11](#A978-1-4842-1031-4_6_Chapter.html#FPar12)
    shows the configuration needed to interact with Maven Central. The `repositories`
    block is used to configure repositories used in a project.


    Listing 6-11\. Mavan Central Repository Config


    `repositories {`


    `mavenCentral()`


    `}`


    JCenter is another popular repository that hosts artifacts at [`https://bintray.com/bintray/jcenter`](https://bintray.com/bintray/jcenter)
    . Listing [6-12](#A978-1-4842-1031-4_6_Chapter.html#FPar13) shows the configuration
    to interact with JCenter repo.


    Listing 6-12\. JCenter Repository Config


    `repositories {`


    `jcenter()`


    `}`


    More often than not, your company might have an internal Maven repository. Gradle
    provides a `maven()` method that makes it easy to add and configure a Maven repository.
    Listing [6-13](#A978-1-4842-1031-4_6_Chapter.html#FPar14) shows a custom Maven
    repository declaration. For repositories that need authentication, the configuration
    allows you to provide credentials.


    Listing 6-13\. Custom Maven Repository


    `apply plugin: ''java''`


    `repositories {`


    `maven {`


    `url "http://your_repo.url"`


    `credentials {`


    `username ''user_name''`


    `password ''pwd''`


    `}`


    `}`


    `}`


    In certain limited cases you might need to use a local Maven repository to retrieve
    dependencies. Local Maven repositories are typically located in the `USER_HOME/.m2`
    directory. For those scenarios, Gradle provides another preconfigured repository
    named `mavenLocal()`, as shown in Listing [6-14](#A978-1-4842-1031-4_6_Chapter.html#FPar15).


    Listing 6-14\. Maven Local Repository


    `apply plugin: ''java''`


    `repositories {`


    `mavenLocal()`


    `}`


    In cases where you are dealing with legacy projects, you might want to interact
    with libraries located in a local directory. Gradle supports such interactions
    with a flat directory repository. This shouldn’t be confused with a Maven local
    repository. Maven local repositories contain artifacts and the associated metadata,
    such as a `pom.xml` file. However, a flat directory just contains JAR files and
    no metadata. Listing [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16) shows the
    configuration to use JAR files from the `lib` folder.


    Listing 6-15\. Flat Directory Repository


    `apply plugin: ''java''`


    `repositories {`


    `flatDir {`


    `dirs ''lib''`


    `}`


    `}`


    `dependencies {`


    `compile name: ''commons-lang3'', version : ''3.4''`


    `compile name: ''logback-classic'', version: ''1.1.3''`


    `}`


    When working with flat directory repositories, you need to declare dependencies
    using the artifact’s `name` and `version` attributes. Listing [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16)
    declares the `commons-lang3` library with the `name` and `version` attributes.
    During the build, Gradle will look for a JAR file with the name `commons-lang3-3.4.jar`
    inside the `lib` directory. If the `logback-classic` library is declared using
    just the `name` attribute, Gradle will look for a JAR named `logback-classic.jar`
    inside the `lib` folder.


    Unlike file dependencies discussed in an earlier section, dependencies from flat
    directory repositories are included in the project’s dependency descriptor. To
    verify this configuration, create a `build-file-repository.gradle` file inside
    the `gradle-file-dep` project and copy the contents of Listing [6-15](#A978-1-4842-1031-4_6_Chapter.html#FPar16).
    Run the `gradle -b build-file-repository.gradle dependencies` command in the project
    and it will list the following dependencies:


    `compile - Compile classpath for source set ''main''.`


    `+--- :commons-lang3:3.4`


    `\--- :logback-classic:1.1.3`


    ## Uber JAR Creation


    For Java projects, Gradle generates a JAR file that contains compiled classes
    and other resources residing in the `src/main/resources` folder. However, there
    are scenarios when you’ll want to distribute your Java application as a self-contained
    application that includes all its dependent JARs. A common technique to deliver
    such a bundle is to create an “uber” or “fat” JAR. In this section, you will generate
    an uber JAR of the `gradle-dep` project you have built in this chapter.


    To build an uber JAR, you will use an open source plugin named Shadow. The plugin’s
    page on the Gradle plugin portal at [`https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow`](https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow)
    provides a script snippet (shown in Listing [6-16](#A978-1-4842-1031-4_6_Chapter.html#FPar17))
    to use the plugin.


    Listing 6-16\. Shadow Plugin Snippet


    `buildscript {`


      `repositories {`


        `maven {`


          `url "` [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
    `"`


        `}`


      `}`


      `dependencies {`


