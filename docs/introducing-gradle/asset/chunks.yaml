    ## 仓库


    如本章开头所述，仓库包含依赖项及其相关的元数据。Gradle 开箱即用即可支持 Maven、Ivy 和本地目录仓库。它还提供了一些预配置的仓库，方便您与常用仓库进行交互。`mavenCentral()`
    仓库就是这样一个预配置的仓库，它指向 Maven 的中央仓库 `https://repo1.maven.org/maven2`。清单 6-11 展示了与 Maven
    Central 交互所需的配置。`repositories` 块用于配置项目中使用的仓库。


    **清单 6-11\. Maven Central 仓库配置**


    `repositories {`


    `mavenCentral()`


    `}`


    JCenter 是另一个流行的仓库，它托管工件于 [`https://bintray.com/bintray/jcenter`](https://bintray.com/bintray/jcenter)。清单
    6-12 展示了与 JCenter 仓库交互的配置。


    **清单 6-12\. JCenter 仓库配置**


    `repositories {`


    `jcenter()`


    `}`


    通常情况下，您的公司可能有一个内部的 Maven 仓库。Gradle 提供了一个 `maven()` 方法，可以轻松添加和配置 Maven 仓库。清单 6-13
    展示了一个自定义 Maven 仓库的声明。对于需要身份验证的仓库，该配置允许您提供凭据。


    **清单 6-13\. 自定义 Maven 仓库**


    `apply plugin: ''java''`


    `repositories {`


    `maven {`


    `url "http://your_repo.url"`


    `credentials {`


    `username ''user_name''`


    `password ''pwd''`


    `}`


    `}`


    `}`


    在某些有限的情况下，您可能需要使用本地 Maven 仓库来检索依赖项。本地 Maven 仓库通常位于 `USER_HOME/.m2` 目录中。对于这些场景，Gradle
    提供了另一个名为 `mavenLocal()` 的预配置仓库，如清单 6-14 所示。


    **清单 6-14\. Maven 本地仓库**


    `apply plugin: ''java''`


    `repositories {`


    `mavenLocal()`


    `}`


    在处理遗留项目时，您可能需要与位于本地目录中的库进行交互。Gradle 通过扁平目录仓库支持此类交互。这不应与 Maven 本地仓库混淆。Maven 本地仓库包含工件及其相关的元数据，例如
    `pom.xml` 文件。然而，扁平目录只包含 JAR 文件，没有元数据。清单 6-15 展示了使用 `lib` 文件夹中 JAR 文件的配置。


    **清单 6-15\. 扁平目录仓库**


    `apply plugin: ''java''`


    `repositories {`


    `flatDir {`


    `dirs ''lib''`


    `}`


    `}`


    `dependencies {`


    `compile name: ''commons-lang3'', version : ''3.4''`


    `compile name: ''logback-classic'', version: ''1.1.3''`


    `}`


    使用扁平目录仓库时，您需要使用工件的 `name` 和 `version` 属性来声明依赖项。清单 6-15 使用 `name` 和 `version` 属性声明了
    `commons-lang3` 库。在构建过程中，Gradle 会在 `lib` 目录中查找名为 `commons-lang3-3.4.jar` 的 JAR
    文件。如果仅使用 `name` 属性声明 `logback-classic` 库，Gradle 会在 `lib` 文件夹中查找名为 `logback-classic.jar`
    的 JAR 文件。


    与前面章节讨论的文件依赖项不同，来自扁平目录仓库的依赖项会包含在项目的依赖描述符中。要验证此配置，请在 `gradle-file-dep` 项目中创建一个
    `build-file-repository.gradle` 文件，并复制清单 6-15 的内容。在项目中运行 `gradle -b build-file-repository.gradle
    dependencies` 命令，它将列出以下依赖项：


    `compile - Compile classpath for source set ''main''.`


    `+--- :commons-lang3:3.4`


    `\--- :logback-classic:1.1.3`


    ## 创建 Uber JAR


    对于 Java 项目，Gradle 会生成一个包含编译后的类以及 `src/main/resources` 文件夹中其他资源的 JAR 文件。但是，在某些场景下，您可能希望将
    Java 应用程序作为包含所有依赖 JAR 的自包含应用程序进行分发。一种常见的打包技术是创建“uber”或“fat”JAR。在本节中，您将为本章中构建的
    `gradle-dep` 项目生成一个 uber JAR。


    要构建 uber JAR，您将使用一个名为 Shadow 的开源插件。该插件在 Gradle 插件门户上的页面 [`https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow`](https://plugins.gradle.org/plugin/com.github.johnrengelman.shadow)
    提供了一个使用该插件的脚本片段（如清单 6-16 所示）。


    **清单 6-16\. Shadow 插件片段**


    `buildscript {`


      `repositories {`


        `maven {`


          `url "` [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
    `"`


        `}`


      `}`


      `dependencies {`


        `classpath "com.github.jengelman.gradle.plugins:shadow:1.2.2"`


      `}`


    `}`


    `apply plugin: "com.github.johnrengelman.shadow"`


    清单 6-16 中的 `buildscript` 块允许您使用像 Shadow 这样的第三方插件。在该块内部，您声明了位于 [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
    的 Gradle 插件 Maven 仓库。随后是一个 `dependencies` 块，您在其中将插件 JAR 添加到构建脚本的类路径中。


    将清单 6-16 中的片段附加到 `gradle-dep` 项目的 `build.gradle` 文件末尾。清单 6-17 展示了您将使用的完整 `build.gradle`
    文件。


    **清单 6-17\. 包含 Shadow 插件的构建脚本**


    `apply plugin: ''java''`


    `ext {`


        `logbackVersion = ''1.1.2''`


        `commonsLangVersion = ''3.4''`


        `junitVersion = ''4.12''`


        `hsqlDbVersion = ''2.3.3''`


    `}`


    `dependencies {`


        `compile "ch.qos.logback:logback-classic:$logbackVersion", "org.apache.commons:commons-lang3:$commonsLangVersion"`


        `testCompile (`


            `[group: ''junit'', name: ''junit'', version: "$junitVersion"],`


                                        `[group: ''org.hsqldb'', name: ''hsqldb'',
    version: "$hsqlDbVersion"]`


        `)`


    `}`


    `repositories {`


        `mavenCentral()`


    `}`


    `buildscript {`


        `repositories {`


            `maven {`


                `url "` [`https://plugins.gradle.org/m2/`](https://plugins.gradle.org/m2/)
    `"`


            `}`


        `}`


        `dependencies {`


            `classpath "com.github.jengelman.gradle.plugins:shadow:1.2.2"`


        `}`


    `}`


    `apply plugin: "com.github.johnrengelman.shadow"`


    在 `gradle-dep` 项目中运行 `gradle shadowJar` 命令，您应该会看到以下输出：


    `\chapter` `6` `\gradle-dep>gradle shadowJar`


    `:compileJava UP-TO-DATE`


    `:processResources UP-TO-DATE`


    `:classes UP-TO-DATE`


    `:shadowJar`


    `BUILD SUCCESSFUL`


    任务成功完成后，导航到项目下的 `build/libs` 文件夹，您应该会看到一个 `gradle-dep-all.jar`。该 JAR 文件应包含来自 Logback
    和 Apache Commons Lang 的类，如图 6-4 所示。


    ![A978-1-4842-1031-4_6_Fig4_HTML.jpg](img/A978-1-4842-1031-4_6_Fig4_HTML.jpg)


    **图 6-4\. 提取的 gradle-dep-all 目录结构**

