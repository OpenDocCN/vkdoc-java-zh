- fmt: "`dependsOn` doesn’t guarantee the order in which dependent tasks will run.\
    \ In Listing [4-7](#A978-1-4842-1031-4_4_Chapter.html#FPar8) for example, no guarantees\
    \ are made that task B will run prior to task C or vice versa. There may be occasions\
    \ where you want to ensure that B runs prior to C, for example. To accomplish\
