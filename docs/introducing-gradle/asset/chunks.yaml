- fmt: "### Creating Tasks\n\nAt the simplest level, creating a task just requires\
    \ the task name:\n\n`task displayProperties`\n\nAlthough this task is perfectly\
    \ valid, it doesn’t actually do anything. For a task to do something meaningful,\
    \ you need to add some actions to it. Gradle provides the `doFirst` and `doLast`\
    \ methods for associating actions with a task. As the name suggests, actions added\
    \ to the `doFirst` method end up at the beginning of the list of actions that\
    \ get executed. Actions added to the `doLast` method reside at the end of the\
