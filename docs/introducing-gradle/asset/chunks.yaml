    property requires the full command line, including the executable and the arguments.
    However, you need to split the command string on spaces and provide split items
    in a comma-delimited fashion. Hence the command `cmd ver` is split and provided
    as `cmd, ver`.


    #### Delete


    The `Delete` task allows you to delete files or folders. The following task deletes
    two folders—`libs` and `docs`.


    `task cleanTask (type : Delete) {`


        `delete ''build/libs'', ''build/docs''`


    `}`


    ## Build Lifecycle


    Every Gradle build goes through three distinct lifecycle phases:


    Initialization phase: In this phase, Gradle identifies all the `build.gradle`
    files it needs to process. For a single project build, only one build file is
    identified. For multi-project builds (more on that in [Chapter 7](#A978-1-4842-1031-4_7_Chapter.html)),
    Gradle tries to locate all possible build files associated with these projects.
    Once Gradle identifies the projects participating in the build, it will create
    an instance of `org.gradle.api.Project` corresponding to each project.   Configuration
    phase: In this phase, the build scripts for all identified projects are executed.
    It is important to remember that no actual task execution happens during this
    phase. Instead, Gradle constructs a DAG of tasks objects per project. Gradle also
    executes the configuration sections of all the tasks, including disabled tasks.
      Execution phase: In this section, Gradle identifies the tasks that need to be
    executed and runs them in the right order.  


    To better understand the build lifecycle, consider the `build-phases.gradle` build
    script shown in Listing [4-11](#A978-1-4842-1031-4_4_Chapter.html#FPar12). The
    script contains two tasks—`noActionTask` and `withActionTask`. Both tasks contain
    Groovy code directly in the task’s closure. Additionally, the `withActionTask`
    has code inside the `doLast` method.


    Listing 4-11. build-phases.gradle


    `task noActionTask {`


        `description = "A task with no actions"`


        `println "I am in the configuration block of $name"`


    `}`


    `task withActionTask {`


        `println "I am in the configuration block of $name"`


        `doLast {`


            `println "performing an action in $name"`


        `}`


    `}`


    During the configuration phase, Gradle executes the code specified directly in
    the task’s closure. Once the configuration phase is complete, Gradle executes
    the actions inside `doFirst` and `doLast` in the execution phase. For example,
    running a command to list all tasks would execute initialization and configuration
    phases to produce the following output:


    `\chapter` `4` `>gradle -q -b build-phases.gradle tasks`


    `I am in the configuration block of noActionTask`


    `I am in the configuration block of withActionTask`


    ---------------output truncated---------------------


    Running the `withActionTask` would result in execution of both configuration blocks
    as well as the action in the `doLast` method. Here is the resulting output:


    `\chapter` `4` `>gradle -q -b build-phases.gradle wAT`


    `I am a in the configuration block of noActionTask`


    `I am a in the configuration block of withActionTask`


    `performing an action in withActionTask`'
