    ## 声明式依赖管理


    假设你希望在应用程序中使用 Logback（[`http://logback.qos.ch`](http://logback.qos.ch/)）进行日志记录。一种直接的方法是从
    Logback 网站下载 `logback.jar` 文件并将其添加到项目中。在使用 IDE 或 ANT 构建项目时，这曾是一种相当常见的做法。然而，这种方法存在一些问题：


    *   下载的 JAR 文件可能依赖于其他几个库。这种依赖关系被称为传递性依赖。更麻烦的是，传递性依赖可能还有自己的依赖关系。你需要花时间找出所有这些依赖关系，并下载它们以供项目使用。

    *   传递性依赖之间可能存在版本冲突。假设你的项目依赖于 JAR A 和 B。如果 A 依赖于 JAR C 的 1.0.0 版本，而 B 依赖于 C 的
    2.0.0 版本，你需要手动解决这个冲突。

    *   下载的 JAR 文件必须检入版本控制系统或放置在共享驱动器上，以便项目可以在其他开发人员的机器上或持续集成服务器上构建。将 JAR 文件检入 VCS
    不被视为最佳实践。这种方法在处理频繁变更的工作副本（在 Maven 中称为快照版本）时尤其困难。

    *   升级变得非常困难，你必须重复整个手动过程。

    *   在团队之间共享内部开发的 JAR 文件变得困难。


    为了解决 ANT 的这些固有问题，Maven 提出了声明式依赖管理。使用这种方法，你告诉 Maven 你需要什么（通常是在外部配置文件中）。Maven 会自动找出在哪里以及如何获取这些依赖项，并将它们交给你的项目。后来，Ant
    提供了与另一个名为 Apache Ivy 的依赖管理工具的集成。Gradle 提供了自己的依赖管理实现，但也支持 Maven 和 Ivy 仓库。


    图 6-1 提供了 Gradle 依赖管理的高级视图。Gradle 与仓库交互以检索依赖项及其关联的元数据。通过网络访问的仓库被视为远程仓库，通常由第三方维护。Gradle
    还可以与本地机器上的仓库以及包含 JAR 文件的目录进行交互。获取依赖项后，Gradle 会将其存储在缓存中。默认情况下，缓存位于本地机器上的 `<<USER_HOME>>/.gradle`。在
    Windows 上，它将是 `C:\Users\<<user_name>>\.gradle`。然后，Gradle 在项目构建、测试或打包期间检索这些依赖项。拥有本地缓存可以减少远程仓库的负载并提高构建速度。


    ![A978-1-4842-1031-4_6_Fig1_HTML.gif](img/A978-1-4842-1031-4_6_Fig1_HTML.gif)


    图 6-1.


    Gradle 依赖管理提示


    你可以通过设置环境变量 `GRADLE_USER_HOME` 并将其指向一个新目录，将默认的 Gradle 主目录从 `.gradle` 更改为其他位置。


    尽管图 6-1 中的架构适用于小型项目，但在企业环境中会带来一些严重问题。通过互联网访问的远程仓库可能会宕机，或者在高流量情况下变得无响应，从而导致构建速度急剧下降。许可和知识产权问题可能会阻止团队在公共仓库中发布其内部工件，从而难以轻松共享。为了解决这些问题，大多数企业选择图
    6-2 所示的架构。


    ![A978-1-4842-1031-4_6_Fig2_HTML.gif](img/A978-1-4842-1031-4_6_Fig2_HTML.gif)


    图 6-2.


    使用仓库管理器的依赖管理


    内部仓库管理器充当远程仓库的代理并缓存工件。这确保了即使远程仓库宕机或过时，构建也是可重复的。仓库管理器还允许你推送和共享公司内部的工件。有几种开源和商业仓库管理器可用，例如
    Sonatype Nexus、Apache Archiva 和 Artifactory。


    ## 依赖配置


    考虑前面使用 Logback 进行日志记录的示例。源代码将包含使用 Logback 类和 API 的日志语句。为了编译项目代码，你需要在类路径中提供 Logback
    JAR。此外，为了让应用程序在 Tomcat 等容器中运行，你需要将 Logback JAR 打包到生成的 WAR 工件中。现在考虑同一个项目使用 JUnit
    进行单元测试。JUnit JAR 文件仅在运行单元测试时需要，并且不需要打包到生成的 WAR 工件中。如果 Web 应用程序包含 Java Servlet，则在代码编译期间需要
    Servlet API JAR。由于 Tomcat 等容器在运行时使此 API JAR 在类路径上可用，因此你无需将其打包到 WAR 文件中。


    这些示例表明需要在构建的某些阶段拥有特定的依赖项集合。Gradle 提供了配置，使你可以轻松实现这一点。配置是依赖项的逻辑分组。例如，你可以有一个 `compile`
    配置，其中包含代码编译期间所需的所有依赖项。Java 插件开箱即用地声明了以下六种配置：


    *   `compile`——包含在代码编译期间添加到类路径的依赖项。在 Web 项目中，Hibernate 和 Spring 等依赖项在 `compile`
    配置中声明。

    *   `runtime`——包含在代码执行期间使用的依赖项。例如，MySQL 驱动程序等数据库驱动程序在 `runtime` 配置中声明。

    *   `testCompile`——包含在测试代码编译期间成为类路径一部分的依赖项。JUnit 和 TestNG 等测试框架是在此配置中声明的库的典型示例。

    *   `testRuntime`——包含在测试代码执行期间使用的依赖项。HSQLDB 或 H2 等嵌入式数据库是在此配置中声明的库的示例。

    *   `archives`——包含项目生成的工件。考虑一个生成额外工件的 Java 项目，例如包含源代码的 JAR 文件和包含 Javadoc API 的
    ZIP 文件。这些工件在此配置中声明。你将在第 8 章中了解更多关于 archives 配置的信息。

    *   `default`——此配置通常出现在多项目设置中，其中一个项目的构建依赖于另一个子项目的构建。假设项目 A 将项目 B 声明为其依赖项。默认情况下，项目
    B 的 `default` 配置中的所有工件都将包含在项目 A 中。`default` 配置扩展了 `runtime` 配置，因此包含项目运行时中声明的所有工件和依赖项。


    依赖配置可以扩展其他配置。例如，`runtime` 配置扩展了 `compile` 配置。这意味着在 `compile` 配置中声明的所有依赖项都将在 `runtime`
    配置中可用。表 6-1 显示了六种 Java 插件配置及其扩展的配置。


    表 6-1.


    配置继承关系


    | 配置名称 | 扩展自 |

    | --- | --- |

    | `compile` | `无` |

    | `runtime` | `compile` |

    | `testCompile` | `compile` |

    | `testRuntime` | `runtime, testCompile` |

    | `archives` | 无 |

    | `default` | `runtime` |

    '
- fmt: "### Working with Dependencies\n\nBefore you can start declaring and using\
    \ dependencies, it’s important to understand the different types of dependencies.\
    \ Table [6-2](#A978-1-4842-1031-4_6_Chapter.html#Tab2) shows the types provided\
    \ by Gradle.\n\nTable 6-2. Gradle Dependency Types\n\n| Dependency Type | Description\
    \ |\n| --- | --- |\n| External module dependency | Dependency on a library in\
    \ a repository. A dependency on the Logback JAR residing in Maven Central is an\
    \ example this dependency type. |\n| Project dependency | Dependency on a Gradle\
    \ project. |\n| File dependency | Dependency on files on the local machine. |\n\
    | Client module dependency | Dependency on an external module where the module\
    \ is located in an external repository but the corresponding metadata is specified\
    \ in a build file. |\n| Gradle API dependency | Dependency on Gradle API. You\
    \ saw this dependency type in [Chapter 5](#A978-1-4842-1031-4_5_Chapter.html)\
    \ during plugin development. |\n| Local Groovy dependency | Dependency on the\
    \ Groovy libraries that came as part of the installed Gradle. |\n\nIn this chapter,\
    \ you look at using three dependency types—external module, file, and project\
    \ dependencies. You declare dependencies in a build file using the `dependencies`\
    \ closure as shown here:\n\n```\ndependencies {\n    <dependency configuration>\
    \ dependency1, dependency2....\n}\n```\n\n### External Module Dependencies\n\n\
    External module dependencies, as the name suggests, refer to dependencies on artifacts\
    \ external to the current project structure. Dependencies of this type are specified\
    \ using the following coordinates:\n\n*   `group`—Identifier of the group or organization\
    \ responsible for this project. Examples include `org.springframework` and `org.hibernate`.\n\
    *   `name`—The name of the artifact. Examples include `spring-beans` and `hibernate-core`.\n\
    *   `version`—The version of the artifact. Examples include `1.0.0` and `4.2.0`.\n\
    *   `classifier`—Additional field attached to the artifact. For example, the same\
    \ artifact can be released for 2 JDK versions and a classifier can be used to\
    \ select the right one.\n\nThese dependencies can be declared using the following\
    \ format in a `build.gradle` file:\n\n`group: 'GROUP_NAME', name: 'ARTIFACT_NAME',\
    \ version: 'VERSION_NUMBER'`\n\nGradle also provides the following shortcut format\
    \ for declaring dependencies:\n\n`GROUP_NAME:ARTIFACT_NAME:VERSION_NUMBER`\n\n\
    To see external module dependencies in action, create a new folder `gradle_dep`\
    \ on your local machine. Create a `build.gradle` file and copy the contents from\
    \ Listing [6-1](#A978-1-4842-1031-4_6_Chapter.html#FPar2). This example adds two\
    \ dependencies for compile configuration using the shortcut notation. Notice that\
    \ multiple dependencies are separated with a comma (`,`). It declares the two\
    \ additional `testCompile` dependencies using the `ArrayList` notation. Also notice\
    \ the `repositories` block. You will be learning about repositories later in this\
    \ chapter, so for now you can ignore it.\n\nListing 6-1. The `build.gradle` File\
    \ with Dependencies\n\n```\napply plugin: 'java'\n\ndependencies {\n    compile\
    \ 'ch.qos.logback:logback-classic:1.1.2', 'org.apache.commons:commons-lang3:3.4'\n\
    \    testCompile (\n        [group: 'junit', name: 'junit', version: '4.12'],\n\
    \        [group: 'org.hsqldb', name: 'hsqldb', version: '2.3.3']\n    )\n}\n\n\
    repositories {\n    mavenCentral()\n}\n```\n\nGradle provides a built-in `dependencies`\
    \ tasks that can be used to see the declared dependencies and their transitive\
    \ dependencies. Running the command `gradle dependencies` will show output similar\
    \ to this:\n\n```\n\\chapter 6 \\gradle-dep>gradle dependencies\n.................\n\
    compile - Compile classpath for source set 'main'.\nDownload https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.4/commons-lang3-3.4.pom\n\
    Download https://repo1.maven.org/maven2/org/apache/commons/commons-parent/37/commons-parent-37.pom\n\
    Download https://repo1.maven.org/maven2/org/apache/apache/16/apache-16.pom\nDownload\
    \ https://repo1.maven.org/maven2/org/slf4j/slf4j-api/1.7.6/slf4j-api-1.7.6.pom\n\
    Download https://repo1.maven.org/maven2/org/slf4j/slf4j-parent/1.7.6/slf4j-parent-1.7.6.pom\n\
    +--- ch.qos.logback:logback-classic:1.1.2\n|    +--- ch.qos.logback:logback-core:1.1.2\n\
    |    \\--- org.slf4j:slf4j-api:1.7.6\n\\--- org.apache.commons:commons-lang3:3.4\n\
    ....................\ntestCompile - Compile classpath for source set 'test'.\n\
    Download https://repo1.maven.org/maven2/org/hsqldb/hsqldb/2.3.3/hsqldb-2.3.3.pom\n\
    +--- ch.qos.logback:logback-classic:1.1.2\n|    +--- ch.qos.logback:logback-core:1.1.2\n\
    |    \\--- org.slf4j:slf4j-api:1.7.6\n+--- org.apache.commons:commons-lang3:3.4\n\
    +--- junit:junit:4.12\n|    \\--- org.hamcrest:hamcrest-core:1.3\n\\--- org.hsqldb:hsqldb:2.3.3\n\
    ................\n```\n\nFrom the output you will notice that all compile-time\
    \ dependencies are available as runtime dependencies due to configuration inheritance.\
    \ You are now ready to start using the Java classes/API provided by these libraries\
    \ in your project.\n\nIn projects that contain a lot of dependencies, it is recommended\
    \ to extract dependency versions into properties. This makes it easy to quickly\
    \ identify artifact versions or change them during upgrades. Listing [6-2](#A978-1-4842-1031-4_6_Chapter.html#FPar3)\
    \ shows modified `build.gradle` file with version numbers extracted to project\
    \ level properties inside the `ext` closure. The dependency declarations are modified\
    \ to use GStrings with version expressions. At runtime, these expressions will\
    \ be replaced with the right version values.\n\nListing 6-2. The `build.gradle`\
    \ File with Properties\n\n```\napply plugin: 'java'\n\next {\n    logbackVersion\
    \ = '1.1.2'\n    commonsLangVersion = '3.4'\n    junitVersion = '4.12'\n    hsqlDbVersion\
    \ = '2.3.3'\n}\n\ndependencies {\n    compile \"ch.qos.logback:logback-classic:$logbackVersion\"\
    , \"org.apache.commons:commons-lang3:$commonsLangVersion\"\n    testCompile (\n\
    \        [group: 'junit', name: 'junit', version: \"$junitVersion\"],\n      \
    \  [group: 'org.hsqldb', name: 'hsqldb', version: \"$hsqlDbVersion\"]\n    )\n\
    }\n\nrepositories {\n    mavenCentral()\n}\n```\n\nIn projects containing a lot\
    \ of dependencies, you run into another common problem where you end up repeating\
    \ the same group and version numbers in multiple places. For example, consider\
    \ a Java project using the 3.0 version of Spring Framework libraries such as `spring-core`,\
    \ `spring-aop`, `spring-beans`, `spring-jdbc`, and `spring-context`. Listing [6-3](#A978-1-4842-1031-4_6_Chapter.html#FPar4)\
    \ shows the `build-common-group.gradle` file demonstrating an approach to address\
    \ this duplication issue. The artifact names are grouped into a list. The code\
    \ iterates through the list, registering each dependency as a compile-time configuration.\
    \ You can run the build script using the command `gradle -b build-common-group.gradle\
    \ dependencies`.\n\nListing 6-3. The `build-common-group.gradle` File\n\n```\n\
    apply plugin: 'java'\n\next { springVersion = '3.0.0.RELEASE' }\n\ndependencies\
    \ {\n    ['spring-core', 'spring-aop','spring-beans', 'spring-jdbc', 'spring-context'].each\
    \ {\n        compile \"org.springframework:$it:$springVersion\"\n    }\n}\n\n\
    repositories {\n    mavenCentral()\n}\n```"
  raw: '### Working with Dependencies


    Before you can start declaring and using dependencies, it’s important to understand
    the different types of dependencies. Table [6-2](#A978-1-4842-1031-4_6_Chapter.html#Tab2)
    shows the types provided by Gradle.


    Table 6-2.


    Gradle Dependency Types


    | Dependency Type | Description |

    | --- | --- |

    | External module dependency | Dependency on a library in a repository. A dependency
    on the Logback JAR residing in Maven Central is an example this dependency type.
    |

    | Project dependency | Dependency on a Gradle project. |

    | File dependency | Dependency on files on the local machine. |

    | Client module dependency | Dependency on an external module where the module
    is located in an external repository but the corresponding metadata is specified
    in a build file. |

    | Gradle API dependency | Dependency on Gradle API. You saw this dependency type
    in [Chapter 5](#A978-1-4842-1031-4_5_Chapter.html) during plugin development.
    |

    | Local Groovy dependency | Dependency on the Groovy libraries that came as part
    of the installed Gradle. |


    In this chapter, you look at using three dependency types—external module, file,
    and project dependencies. You declare dependencies in a build file using the dependencies
    closure as shown here:


    `dependencies {`


        `<dependency configuration> dependency1, dependency2....`


    `}`


    ### External Module Dependencies


    External module dependencies, as the name suggests, refer to dependencies on artifacts
    external to the current project structure. Dependencies of this type are specified
    using the following coordinates:


    *   `group`—Identifier of the group or organization responsible for this project.
    Examples include `org.springframework` and `org.hibernate`.

    *   `name`—The name of the artifact. Examples include `spring-beans` and `hibernate-core`.

    *   `version`—The version of the artifact. Examples include 1.0.0 and 4.2.0.

    *   `classifier`—Additional field attached to the artifact. For example, the same
    artifact can be released for 2 JDK versions and a classifier can be used to select
    the right one.


    These dependencies can be declared using the following format in a `build.gradle`
    file:


    `group: ''GROUP_NAME, name: ''ARTIFACT_NAME'', version: ''VERSION_NUMBER''`


    Gradle also provides the following shortcut format for declaring dependencies:


    `GROUP_NAME:ARTIFACT_NAME:VERSION_NUMBER`


    To see external module dependencies in action, create a new folder `gradle_dep`
    on your local machine. Create a `build.gradle` file and copy the contents from
    Listing [6-1](#A978-1-4842-1031-4_6_Chapter.html#FPar2). This example adds two
    dependencies for compile configuration using the shortcut notation. Notice that
    multiple dependencies are separated with a comma (`,)`. It declares the two additional
    `testCompile` dependencies using the `ArrayList` notation. Also notice the `repositories`
    block. You will be learning about repositories later in this chapter, so for now
    you can ignore it.


    Listing 6-1\. The build.gradle File with Dependencies


    `apply plugin: ''java''`


    `dependencies {`


    `compile ''ch.qos.logback:logback-classic:1.1.2'', ''org.apache.commons:commons-lang3:3.4''`


    `testCompile (`


    `[group: ''junit'', name: ''junit'', version: ''4.12''],`


    `[group: ''org.hsqldb'', name: ''hsqldb'', version: ''2.3.3'']`


    `)`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    Gradle provides a built-in `dependencies` tasks that can be used to see the declared
    dependencies and their transitive dependencies. Running the command `gradle dependencies`
    will show output similar to this:


    `\chapter` `6` `\gradle-dep>gradle dependencies`


    `.................`


    `compile - Compile classpath for source set ''main''.`


    `Download` [`https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.4/com`](https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.4/com)


    `mons-lang3-3.4.pom`


    `Download` [`https://repo1.maven.org/maven2/org/apache/commons/commons-parent/37/com`](https://repo1.maven.org/maven2/org/apache/commons/commons-parent/37/com)


    `mons-parent-37.pom`


    `Download` [`https://repo1.maven.org/maven2/org/apache/apache/16/apache-16.pom`](https://repo1.maven.org/maven2/org/apache/apache/16/apache-16.pom)


    `Download` [`https://repo1.maven.org/maven2/org/slf4j/slf4j-api/1.7.6/slf4j-api-1.7`](https://repo1.maven.org/maven2/org/slf4j/slf4j-api/1.7.6/slf4j-api-1.7)
    `.`


    `6.pom`


    `Download` [`https://repo1.maven.org/maven2/org/slf4j/slf4j-parent/1.7.6/slf4j-paren`](https://repo1.maven.org/maven2/org/slf4j/slf4j-parent/1.7.6/slf4j-paren)


    `t-1.7.6.pom`


    `+--- ch.qos.logback:logback-classic:1.1.2`


    `|    +--- ch.qos.logback:logback-core:1.1.2`


    `|    \--- org.slf4j:slf4j-api:1.7.6`


    `\--- org.apache.commons:commons-lang3:3.4`


    `....................`


    `testCompile - Compile classpath for source set ''test''.`


    `Download` [`https://repo1.maven.org/maven2/org/hsqldb/hsqldb/2.3.3/hsqldb-2.3.3.pom`](https://repo1.maven.org/maven2/org/hsqldb/hsqldb/2.3.3/hsqldb-2.3.3.pom)


    `+--- ch.qos.logback:logback-classic:1.1.2`


    `|    +--- ch.qos.logback:logback-core:1.1.2`


    `|    \--- org.slf4j:slf4j-api:1.7.6`


    `+--- org.apache.commons:commons-lang3:3.4`


    `+--- junit:junit:4.12`


    `|    \--- org.hamcrest:hamcrest-core:1.3`


    `\--- org.hsqldb:hsqldb:2.3.3`


    `................`


    From the output you will notice that all compile-time dependencies are available
    as runtime dependencies due to configuration inheritance. You are now ready to
    start using the Java classes/API provided by these libraries in your project.


    In projects that contain a lot of dependencies, it is recommended to extract dependency
    versions into properties. This makes it easy to quickly identify artifact versions
    or change them during upgrades. Listing [6-2](#A978-1-4842-1031-4_6_Chapter.html#FPar3)
    shows modified `build.gradle` file with version numbers extracted to project level
    properties inside the `ext` closure. The dependency declarations are modified
    to use GStrings with version expressions. At runtime, these expressions will be
    replaced with the right version values.


    Listing 6-2\. The build.gradle File with Properties


    `apply plugin: ''java''`


    `ext {`


    `logbackVersion = ''1.1.2''`


    `commonsLangVersion = ''3.4''`


    `junitVersion = ''4.12''`


    `hsqlDbVersion = ''2.3.3''`


    `}`


    `dependencies {`


    `compile "ch.qos.logback:logback-classic:$logbackVersion", "org.apache.commons:commons-lang3:$commonsLangVersion"`


    `testCompile (`


    `[group: ''junit'', name: ''junit'', version: "$junitVersion"],`


    `[group: ''org.hsqldb'', name: ''hsqldb'', version: "$hsqlDbVersion"]`


    `)`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    In projects containing a lot of dependencies, you run into another common problem
    where you end up repeating the same group and version numbers in multiple places.
    For example, consider a Java project using the 3.0 version of Spring Framework
    libraries such as `spring-core`, `spring-aop`, `spring-beans`, `spring-jdbc`,
    and `spring-context`. Listing [6-3](#A978-1-4842-1031-4_6_Chapter.html#FPar4)
    shows the `build-common-group.gradle` file demonstrating an approach to address
    this duplication issue. The artifact names are grouped into a list. The code iterates
    through the list, registering each dependency as a compile-time configuration.
    You can run the build script using the command `gradle -b build-common-group.gradle
    dependencies`.


    Listing 6-3\. The build-common-group.gradle File


    `apply plugin: ''java''`


    `ext { springVersion = ''3.0.0.RELEASE'' }`


    `dependencies {`


    `[''spring-core'', ''spring-aop'',''spring-beans'', ''spring-jdbc'', ''spring-context''].each
    {`


    `compile "org.springframework:$it:$springVersion"`


    `}`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`'
  trans: '

    ### 处理依赖关系


    在开始声明和使用依赖之前，理解不同类型的依赖关系至关重要。表 6-2 展示了 Gradle 提供的依赖类型。


    表 6-2. Gradle 依赖类型


    | 依赖类型 | 描述 |

    | --- | --- |

    | 外部模块依赖 | 对仓库中某个库的依赖。例如，对 Maven Central 中的 Logback JAR 的依赖就属于此类型。 |

    | 项目依赖 | 对某个 Gradle 项目的依赖。 |

    | 文件依赖 | 对本地机器上文件的依赖。 |

    | 客户端模块依赖 | 对外部模块的依赖，该模块位于外部仓库中，但其对应的元数据在构建文件中指定。 |

    | Gradle API 依赖 | 对 Gradle API 的依赖。在第 5 章的插件开发中，你已经见过这种依赖类型。 |

    | 本地 Groovy 依赖 | 对作为已安装 Gradle 一部分的 Groovy 库的依赖。 |


    在本章中，你将学习使用三种依赖类型：外部模块依赖、文件依赖和项目依赖。你可以在构建文件中使用 `dependencies` 闭包来声明依赖，如下所示：


    `dependencies {`


        `<依赖配置> 依赖 1, 依赖 2....`


    `}`


    ### 外部模块依赖


    顾名思义，外部模块依赖指的是对当前项目结构之外制品的依赖。这种类型的依赖使用以下坐标来指定：


    *   `group` — 负责该项目的组或组织的标识符。例如 `org.springframework` 和 `org.hibernate`。

    *   `name` — 制品的名称。例如 `spring-beans` 和 `hibernate-core`。

    *   `version` — 制品的版本。例如 1.0.0 和 4.2.0。

    *   `classifier` — 附加到制品上的额外字段。例如，同一个制品可以为两个 JDK 版本发布，可以使用分类器来选择正确的版本。


    这些依赖可以在 `build.gradle` 文件中使用以下格式声明：


    `group: ''GROUP_NAME'', name: ''ARTIFACT_NAME'', version: ''VERSION_NUMBER''`


    Gradle 还提供了以下声明依赖的快捷格式：


    `GROUP_NAME:ARTIFACT_NAME:VERSION_NUMBER`


    为了实际演示外部模块依赖，在你的本地机器上创建一个新文件夹 `gradle_dep`。创建一个 `build.gradle` 文件，并复制清单 6-1 中的内容。这个示例使用快捷记法为编译配置添加了两个依赖。请注意，多个依赖之间用逗号
    (`,`) 分隔。它还使用 `ArrayList` 记法声明了两个额外的 `testCompile` 依赖。同时请注意 `repositories` 块。你将在本章后面学习仓库的相关内容，所以现在可以先忽略它。


    清单 6-1. 包含依赖的 build.gradle 文件


    `apply plugin: ''java''`


    `dependencies {`


    `compile ''ch.qos.logback:logback-classic:1.1.2'', ''org.apache.commons:commons-lang3:3.4''`


    `testCompile (`


    `[group: ''junit'', name: ''junit'', version: ''4.12''],`


    `[group: ''org.hsqldb'', name: ''hsqldb'', version: ''2.3.3'']`


    `)`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    Gradle 提供了一个内置的 `dependencies` 任务，可以用来查看已声明的依赖及其传递性依赖。运行命令 `gradle dependencies`
    将显示类似如下的输出：


    `\chapter` `6` `\gradle-dep>gradle dependencies`


    `.................`


    `compile - 为源集 ''main'' 编译的类路径。`


    `Download` [`https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.4/com`](https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.4/com)


    `mons-lang3-3.4.pom`


    `Download` [`https://repo1.maven.org/maven2/org/apache/commons/commons-parent/37/com`](https://repo1.maven.org/maven2/org/apache/commons/commons-parent/37/com)


    `mons-parent-37.pom`


    `Download` [`https://repo1.maven.org/maven2/org/apache/apache/16/apache-16.pom`](https://repo1.maven.org/maven2/org/apache/apache/16/apache-16.pom)


    `Download` [`https://repo1.maven.org/maven2/org/slf4j/slf4j-api/1.7.6/slf4j-api-1.7`](https://repo1.maven.org/maven2/org/slf4j/slf4j-api/1.7.6/slf4j-api-1.7)
    `.`


    `6.pom`


    `Download` [`https://repo1.maven.org/maven2/org/slf4j/slf4j-parent/1.7.6/slf4j-paren`](https://repo1.maven.org/maven2/org/slf4j/slf4j-parent/1.7.6/slf4j-paren)


    `t-1.7.6.pom`


    `+--- ch.qos.logback:logback-classic:1.1.2`


    `|    +--- ch.qos.logback:logback-core:1.1.2`


    `|    \--- org.slf4j:slf4j-api:1.7.6`


    `\--- org.apache.commons:commons-lang3:3.4`


    `....................`


    `testCompile - 为源集 ''test'' 编译的类路径。`


    `Download` [`https://repo1.maven.org/maven2/org/hsqldb/hsqldb/2.3.3/hsqldb-2.3.3.pom`](https://repo1.maven.org/maven2/org/hsqldb/hsqldb/2.3.3/hsqldb-2.3.3.pom)


    `+--- ch.qos.logback:logback-classic:1.1.2`


    `|    +--- ch.qos.logback:logback-core:1.1.2`


    `|    \--- org.slf4j:slf4j-api:1.7.6`


    `+--- org.apache.commons:commons-lang3:3.4`


    `+--- junit:junit:4.12`


    `|    \--- org.hamcrest:hamcrest-core:1.3`


    `\--- org.hsqldb:hsqldb:2.3.3`


    `................`


    从输出中你会注意到，由于配置继承，所有编译时依赖在运行时也是可用的。现在，你可以在项目中使用这些库提供的 Java 类/API 了。


    在包含大量依赖的项目中，建议将依赖版本提取到属性中。这使得在升级期间可以轻松地快速识别制品版本或更改它们。清单 6-2 展示了修改后的 `build.gradle`
    文件，其中版本号被提取到 `ext` 闭包内的项目级属性中。依赖声明被修改为使用包含版本表达式的 GString。在运行时，这些表达式将被替换为正确的版本值。


    清单 6-2. 包含属性的 build.gradle 文件


    `apply plugin: ''java''`


    `ext {`


    `logbackVersion = ''1.1.2''`


    `commonsLangVersion = ''3.4''`


    `junitVersion = ''4.12''`


    `hsqlDbVersion = ''2.3.3''`


    `}`


    `dependencies {`


    `compile "ch.qos.logback:logback-classic:$logbackVersion", "org.apache.commons:commons-lang3:$commonsLangVersion"`


    `testCompile (`


    `[group: ''junit'', name: ''junit'', version: "$junitVersion"],`


    `[group: ''org.hsqldb'', name: ''hsqldb'', version: "$hsqlDbVersion"]`


    `)`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`


    在包含大量依赖的项目中，你还会遇到另一个常见问题：在多个地方重复相同的组和版本号。例如，考虑一个使用 3.0 版本 Spring Framework 库（如
    `spring-core`、`spring-aop`、`spring-beans`、`spring-jdbc` 和 `spring-context`）的 Java
    项目。清单 6-3 展示了 `build-common-group.gradle` 文件，演示了解决此重复问题的一种方法。制品名称被分组到一个列表中。代码遍历该列表，将每个依赖注册为编译时配置。你可以使用命令
    `gradle -b build-common-group.gradle dependencies` 运行此构建脚本。


    清单 6-3. build-common-group.gradle 文件


    `apply plugin: ''java''`


    `ext { springVersion = ''3.0.0.RELEASE'' }`


    `dependencies {`


    `[''spring-core'', ''spring-aop'',''spring-beans'', ''spring-jdbc'', ''spring-context''].each
    {`


    `compile "org.springframework:$it:$springVersion"`


    `}`


    `}`


    `repositories {`


    `mavenCentral()`


    `}`

