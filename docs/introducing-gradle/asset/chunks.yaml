- fmt: '#### Declaring Variables


    So far you have looked at declaring variables using data types. Groovy also provides
    the `def` keyword, which can be used for variable declaration when you are not
    sure or don’t care about the variable data type. For example:


    ```

    def obj = ''a''

    println obj.class    // Prints class java.lang.String

    obj = 1.4

    println obj.class    // Prints class java.math.BigDecimal

    ```


    It is possible to omit the `def` keyword during variable declaration. Here is
    the previous code with `def` omitted:


    ```

    obj = ''a''

    println obj.class         // Prints class java.lang.String

    obj = 1.4

    println obj.class         // Prints class java.math.BigDecimal

    ```


    #### Lists


    Lists in Groovy are an ordered collection of items. By default, Groovy lists are
    instances of `java.util.ArrayList` and have the following declaration syntax:


    ```

    list = [1, 2, 3, 4]

    listWithDiffItems = [1, 3, ''String Item'', 3.4]

    ```


    As in Java, items in a list can be accessed using the `get` method. Groovy also
    provides a `getAt` method that, among other things, allows you to use negative
    indexes to access items starting at the end:


    ```

    println list.get(1)       // Prints 2

    println list.getAt(-1)    // Prints 4, the first element from last

    ```


    Items can be added or removed using the `add` and `remove` methods. The `each`
    method can be used to iterate over the list items:


    ```

    list.add 5

    list.remove 0    // 0 is the index of the element to be removed

    list.each { println it }

    ```


    Note that the `each` method took a closure as its parameter. You will learn more
    about closures later in the chapter.


    #### Maps


    Maps in Groovy contain key/value pairs. By default Groovy maps are instances of
    `java.util.LinkedHashMap` and have the following syntax:


    `[key1 : value1, key2 : value2]`


    Here is an example of a map defined in Groovy:


    `map = [ "red" : 1, "yellow" : 2, "green" : 3 ]`


    Elements in a map can be accessed in several ways. The most common approach is
    to use the `"."` notation. Here are some examples:


    ```

    println map.red //Prints 1

    println map["yellow"] // Prints 2

    println map.get("green") // Prints 3

    ```


    You can add new values to a map using the `put` method and iterate over values
    using the `each` method:


    ```

    map.put "blue", 4

    map.each { println "Key: ${it.key} and Value: ${it.value}" }

    ```


    Notice the use of the `${}` expressions in the `each()` method. Groovy evaluates
    these expressions and prints the key/value pairs.


    #### Range


    Groovy provides a range operator (`..`) to create a range of objects. For example,
    the following code defines a range of integers from 0 to 9:


    ```

    def intRange = 0..9

    println intRange.size()     // Prints 10

    intRange.each {print it}    // Prints 0123456789

    ```


    ### Closures


    To put simply, a closure is a block of executable code. Closures in Groovy are
    instances of `groovy.lang.Closure`. Since closures are objects, they can be assigned
    to variables or passed around as parameters to methods. Since they contain code,
    closures can be executed. Closures are often referred to as anonymous functions.


    Closures in Groovy can accept parameters and return values. The syntax for declaring
    closures is as follows:


    `{ list of arguments -> closure body }`


    Closures are enclosed by curly braces `{}`. The list of arguments are separated
    by commas (`,`) and the closure body contains one or more statements. The symbol
    `->` separates the argument list from the body. If the closure doesn’t have a
    `return` statement, the output of the last statement is returned. Here is an example
    of a closure that accepts one parameter of type `String`:


    `def greet = {String name -> "Hello ${name}" }`


    This closure can be invoked using the reference variable `greet` as shown here:


    ```

    greet "Joe"

    greet.call "Joe"

    ```


    If a closure doesn’t take any arguments, the list of arguments and the `->` symbol
    can be omitted. Here is a very simple example without any arguments:


    `def greet = {"Hello"}`


    In the scenario when no arguments are declared, an untyped argument called `it`
    will be implicitly available to the closure body. Consider the following example,
    which makes use of the `it` argument:


    `def greet = {"Hello $it"}`


    When the `greet` closure is invoked with a parameter, such as `"World"`, it would
    print `Hello World`. If the `greet` is invoked without a parameter, a `null` is
    passed.


    ```

    def greet = {"Hello $it"}

    greet "World"    // Prints Hello World

    greet()          // Prints Hello null

    ```


    Here are few more examples of closure definitions:


    ```

    { -> }                     // Empty Closure

    { a, b -> a + b }          // Closure with two untyped arguments

    {int a, int b -> a + b}    // Closure with two arguments of type int

    ```


    Closures can be passed as parameters to methods. In fact, the "List" and "Map"
    sections of this chapter showed how to pass the closure `{print it}` to the list
    or map’s `each` method. The `each` method takes in a parameter of type `groovy.lang.Closure`
    and executes it for each item in a list or map. The closure accesses the item
    through the implicit `it` parameter.


    Closures may access the variables declared within their scope. For example, if
    a closure is defined inside a method, it can access all the variables that the
    method has access to (parameters, local variables, class variables, etc.).


    ## Summary


    Groovy is the language of choice when working with Gradle. This chapter covered
    installing Groovy and using the Groovy shell and GroovyConsole. It reviewed the
    basics of Groovy and its supported data types. You learned that Groovy’s GStrings
    allows you to include expressions, thereby making them suitable for templating.
    Finally, you learned about closures—blocks of code/functionality that can be passed
    around.


    In the next chapters, you will take a deep dive into Gradle’s tasks and start
    developing Gradle build scripts.


    # 4. Understanding Gradle Builds


    Central to Gradle are two basic building blocks—projects and tasks. A Gradle build
    is made up of one or more projects and each project contains one or more tasks.
    This chapter reviews those two building blocks. You will review these building
    blocks and learn about the lifecycle phases associated with builds.'
