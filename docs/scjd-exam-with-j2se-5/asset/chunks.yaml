    > **Note** This chapter is only designed to be an introduction to threading. If
    you want to gain an in-depth understanding of threading, we recommend Allen Holub’s
    excellent book, *Taming Java Threads* (Apress, 2000).


    ## Threading Fundamentals


    Before you start this chapter, there are few things you should already know about
    threads. You should know that there are two ways to create a thread of execution
    in Java: the first by extending the `Thread` object, and the second by implementing
    the `Runnable` interface. You should know that to start a thread you must call
    the `start` method, and you should know that threads can appear to do their work
    in parallel with each other. This is the basic understanding required for the
    SCJP exam, and it should be material you have mastered if you are thinking about
    taking the SCJD exam.


    ## A Brief Review of Threads


    A *thread* is an independent stream of execution for a set of instructions. For
    example, imagine a word processor needs to accomplish two activities, as shown
    in Figure 4-1. It needs to print and save the document you are currently working
    on.


    **Figure 4-1.** *Word processing program example*


    If the word processor were single-threaded, it could not start saving the document
    until it was finished printing the document, as depicted in Figure 4-1. This approach
    would certainly work, but it would be overly inefficient, as those of us who remember
    the earliest word processors can attest. We can do better.


    Now imagine that the program spawns two independent paths of execution, or threads.
    One is printing a document, and the other is quietly backing up the document in
    the background. This approach will yield potentially more efficient results, because
    there is no need for the two activities to wait on each other. For example, even
    as the network connection is being established with the printer, another thread
    could be saving the file. This concept of multithreading is illustrated in Figure
    4-2 and described in detail in the next section.


    **Figure 4-2.** *Word processing program with threads*


    ## Multithreading


    *Multithreading* is the coordination of the various threads that run in a system.
    It is done for the purpose of improving overall system efficiency. This could
    mean taking turns with the resources or sharing them, decreasing overhead, or
    respecting the boundaries of other threads.


    There are inherent challenges in managing multiple threads. These challenges arise
    as a result of the way in which central processing units (CPUs) handle threads.
    We will be discussing these challenges throughout this chapter, with explicit
    details in the section “Understanding Thread Safety.”


    A CPU will execute a number of instructions from a given thread, then switch over
    to executing a set of instructions from another thread, and so on. Because this
    switching happens quickly, an illusion of independent and parallel execution is
    created for all the threads. In addition, threads that are inactively waiting—say,
    for a network connection—will not act as bottlenecks for other threads. This is
    one of the greatest advantages of multithreading. However, this increased efficiency
    comes at a price: It is entirely possible for one thread to corrupt the data that
    another thread is using, unless precautions are taken. We will demonstrate these
    problems, and show you how to program defensively to counteract these problems
    in the section “Understanding Thread Safety.”


    > **Note** Throughout this chapter we will be discussing threading from the perspective
    of the JVM operating on a single CPU computer. On computers with multiple CPUs,
    it is quite possible for threads to be operating on different CPUs concurrently.
    Regardless, the issues that arise will be the same.


    Returning to the word processing program example, suppose that another thread
    is justifying the text, and this thread makes no effort to coordinate with the
    thread that is printing the document. The result might be that some of the printed
    document is justified and some of it is not.


    These are some of the challenges that come with the territory when you start to
    multithread. The SCJD exam requires that you have a strong understanding of multithreading
    and the dangers that lurk therein.


    ## Java’s Multithreading Concepts


    Java is one of the few languages that has built-in support for multithreading.
    Two important behaviors arise from this support. First, every Java object can
    be locked down for exclusive use by a given thread. Synchronizing on an object
    achieves this. A locked object is inaccessible to any thread other than the one
    that explicitly claimed it as long as all the other threads honor the locking.
    Second, each Java object can keep track of all the threads that want exclusive
    access to it. Think of this as having a sign-up sheet for each object.


    The basic challenge of multithreading is similar to one of the challenges of raising
    young children: How do you keep the threads (children) from fighting over a limited
    supply of resources (toys)?


    The solution, at least in Java, is twofold. First, every method that potentially
    uses a global object must adhere to the convention of checking to see if it is
    currently in use by another thread. Second, every method that modifies the object
    needs to put a sign on it noting that the object is currently in use. (If only
    it were so easy with children...) A real-world metaphor for the latter part of
    the solution is signing up to use the treadmill at the gym. If you (the thread)
    want to use the globally available object (the treadmill), then you have check
    to see whether other people (other threads) are using it. If somebody is using
    it, then you wait. If not, then you sign it out and use it.


    The first activity is referred to as waiting. The next section explains waiting
    in detail.


    ### Waiting


    *Waiting* is the act of getting out of the way when you can’t be productive. As
    the name implies, waiting is an inactive process. This means that a waiting thread
    does not waste CPU time it cannot use. If a thread is waiting, then other threads
    are free to use its allotted quota of CPU time. The waiting thread will certainly
    not need it.


    Imagine a group of children trying to buy ice cream from an ice cream truck. If
    the boy who currently has the ice cream vendor’s attention does not have enough
    money to pay for his ice cream, he won’t force everyone else to wait while his
    father brings him the funds he needs. He will get out the way, probably weep quietly
    to himself, and wait. Then he’ll step back into the fray and try to claim the
    ice cream vendor’s attention. The other children won’t wait for him, because he
    can’t order anyway.


    > **Note** The metaphor of children greedily trying to get ice cream is not an
    arbitrary one. Competing threads do not behave like polite adults in a grocery
    store line. There is no sense of order. All compete voraciously, and based on
    the underlying operating system, priorities, and other variables, one or another
    wins.


    In general, there are two distinct families of pausing execution while waiting
    for something to happen. There is a version of pausing that maintains the lock(s)
    that your thread has, as well as a version that releases a lock. Typically the
    first type of pausing happens when you need some event to happen before continuing
    (for example, waiting for data to be sent over a network socket), and the second
    usually happens when you call some method that explicitly states that it will
    release the lock—for example, calling the `Object.wait` method will release the
    lock on the particular object it is invoked on.'
