    起始注释


    起始注释与 Javadoc 注释是分开的，因此 Java 程序员常常不理解它们。起始注释包含一些与类的 Javadoc 注释相同的信息，但有几个主要区别：信息在一个标准位置提供，并且列出了非常具体的信息。虽然
    Javadoc 注释可能包含起始注释中信息的超集，但信息不会出现在特定的行号上，并且所需的信息可能深埋在 API 文档中。起始注释包含以下内容：


