    **More on Blocking**


    Blocking is an important phenomenon in threading and thus deserves a few more
    words of explanation. To quickly review, blocking threads do not use CPU cycles
    and are in a state of suspended animation. They do not wait for a time period
    to expire, but rather for an event to occur; specifically, a lock they were trying
    to acquire becomes available. Blocking threads deserve a healthy dose of respect
    because they do not release locked resources when they slice out of the CPU. A
    blocking thread that does not receive its lock can refuse to release resources
    that other threads might need, in addition to never coming out of hibernation,
    as shown in Listing 4-12\. Figure 4-12 shows the output of this example.


