- fmt: "在客户端应用程序中包含的`JTable`中，表头名称在应用程序的整个生命周期内保持不变。因此，`String`对象数组将是保存列名的完美数据结构。接下来，每一行的行列值是不可变的，因为一旦创建了一行，该行中的值数量就不需要更改。因此，`String`值数组也可以表示一行DVD数据。\n\
    \n保存行的实际集合与表头和列数据完全不同，因为行数会发生变化——而且变化相当频繁。如果用户搜索DVD记录列表，无法确保会得到多少行结果，因此不可能预先确定保存这些值所需的数据结构大小。保存行数据的最佳选择是一个动态集合，可以轻松地追加、删除和遍历其中的值。结果的顺序也很重要，因此`Set`集合显然是一个糟糕的选择。最佳选择是某种类型的动态列表。现在可以将列表范围缩小到`Vector`、`LinkedList`或`ArrayList`。正如第4章“内部同步类”一节中提到的，`Vector`在大多数情况下几乎没有什么好处，但可能会给人一种虚假的线程安全感觉——因此我们通常建议不要使用它们。在这种特定情况下，`TableModel`中的值不必是线程安全的，因为只有一个线程在单个实例中操作它们的值。因此，`Vector`在此应用程序中提供了不必要的开销，却没有带来任何好处。`LinkedList`为我们提供了一些`ArrayList`所没有的额外方法——特别是添加和删除集合中第一个和最后一个对象的能力；然而，我们并不需要这个额外的功能。在我们的`TableModel`中表示DVD数据行的最佳选择显然是`ArrayList`。\n\
    \n接下来，我们的`TableModel`必须实现`JTable`用于将模型渲染为视图所需的一些方法。例如，`TableModel`必须有一种方法告知`JTable`它封装了多少列。清单8-11中所示的`getColumnCount`方法提供了此功能。\n\
    \n**清单8-11.** *我们的`TableModel`的`getColumnCount`方法*\n```\npublic int getColumnCount()\
    \ {\n    return this.headerNames.length;\n}\n```\n\n在这种情况下，列数始终等于标题的数量，因此此方法可以简单地返回`headerNames`成员的长度。我们的`TableModel`还必须返回每一列的名称。清单8-12从`headerNames`成员中返回指定索引处的`String`值。\n\
    \n**清单8-12.** *`TableModel`的`getColumnName`方法*\n```\npublic String getColumnName\
    \ (int column) {\n    return headerNames[column];\n}\n```\n\n接下来，`TableModel`返回并设置给定行和列索引处的单元格值。清单8-13中所示的方法允许在特定行和列索引处赋值和检索值。\n\
    \n**清单8-13.** *`TableModel`的`set`和`getValueAt`方法*\n```\npublic Object getValueAt(int\
    \ row, int column) {\n    String[] rowValues = this.dvdRecords.get(row);\n   \
    \ return rowValues[column];\n}\n\npublic void setValueAt(Object obj, int row,\
    \ int column) {\n    Object[] rowValues = this.dvdRecords.get(row);\n    rowValues[column]\
    \ = obj;\n}\n```\n\n请注意，`getValueAt`方法本可以写成：\n```\npublic Object getValueAt(int\
    \ row, int column) {\n    return this.dvdRecords.get(row)[column];\n}\n```\n\n\
    然而，每当你想要走这样的捷径时，你应该考虑它给你带来了什么好处。创建或销毁`rowValues`对数组的**引用**是否代价高昂，以至于能获得很大的效率提升？或者，这段代码是否更难阅读，从而更难维护？\n\
    \n接下来，清单8-14中所示的`getRowCount`方法返回`TableModel`中封装的数据行数。在我们的`TableModel`中，行数就是DVD\
    \ `ArrayList`的大小。\n\n**清单8-14.** *`DVDTableModel`的`getRowCount`方法*\n```\npublic\
    \ int getRowCount() {\n    return this.dvdRecords.size();\n}\n```\n\n我们的`TableModel`类中的`isCellEditable`方法（见清单8-15）指示单元格是否可编辑。在我们的特定`TableModel`实现中，没有单元格是可编辑的，因此该方法默认返回`false`。如果`TableModel`中的特定单元格是可编辑的，此方法将考虑列和行索引，并评估单元格是否可编辑。\n\
    \n**清单8-15.** *`TableModel`的`isCellEditable`方法*\n```\npublic boolean isCellEditable\
    \ (int row, int column) {\n    return false;\n}\n```\n\n■**注意** 与迄今为止显示的其他方法不同，`isCellEditable`已经在`AbstractTableModel`中实现了。碰巧的是，`AbstractTableModel`实现提供了与我们重写的方法相同的功能。因此我们不需要重写此方法；然而，这样做可以让你更容易地试验此方法。\n\
    \n最后，我们的`DVDTableModel`类包含了`TableModel`接口所需方法之外的两个方法。包含这些额外方法是出于方便考虑。正如本章前面提到的，系统其余部分使用的`DVD`对象与视图使用的模型不同。在这种情况下，视图对象是`JTable`，模型对象是`DVDTableModel`。`GUIController`类必须经历将`DVD`对象（或`DVD`对象集合）转换为`DVDTableModel`对象的过程。为了使这项任务更容易，`DVDTableModel`实现了清单8-16中的两个方法。\n\
    \n**清单8-16.** *`DVDTableModel`类中的便捷方法*\n```\npublic void addDVDRecord (String\
    \ upc, String name, String director, String leadActor, String supportingActor,\n\
    \                          String composer, int numberOfCopies) {\n    String\
    \ [] temp = {upc, name, director, leadActor, supportingActor, composer, Integer.toString(numberOfCopies)};\n\
    \    this.dvdRecords.add(temp);\n}\n\npublic void addDVDRecord (DVD dvd) {\n \
    \   addDVDRecord(dvd.getUPC(), dvd.getName(), dvd.getDirector(), dvd.getLeadActor(),\
    \ dvd.getSupportingActor(),\n                 dvd.getComposer(), dvd.getCopy());\n\
    }\n```\n\n清单8-16中的方法接收一个`DVD`对象（或等效数据）并将新行追加到`DVDTableModel`内封装的数据集中。第一个方法接收`DVD`对象中包含的数据作为各个部分，而第二个方法只需要一个`DVD`对象。为了向`DVDTableModel`添加一个DVD，`GUIController`将简单地调用这两个方法之一，从而避免每次对数据视图进行更改时都从`GUIController`内部进行转换过程。\n\
    \n■**提示** 前面的`DVDTableModel`能够一次转换一个DVD模型对象，但有时提供一个能转换整个模型对象集合的方法会更方便。这样，搜索方法就可以通过一次调用来转换其整个搜索结果集。\n\
    \n**将TableModel与JTable一起使用**\n\n一旦实现了`TableModel`，将其与`JTable`一起使用就是一项简单的任务。可以在`JTable`对象的构造函数中指定一个`TableModel`。例如，以下代码片段将使用上一节中描述的`DVDTableModel`创建一个新的`JTable`：\n\
    ```\nJTable table = new JTable (new DVDTableModel ());\n```\n上述语句将使用`DVDTableModel`创建一个`JTable`，但表格显示将是空的，因为指定的`DVDTableModel`实例中不包含任何数据。"
  raw: 'In the case of the JTable contained in our client application, the header
    names will remain the same throughout the life of the application. Therefore,
    an array of String objects will be the perfect data structure to hold the column
    names. Next, the row column values for each row are immutable in the sense that
    once a row is created, the number of values in a row does not need to change.
    Thus, an array of String values can also represent a row of DVD data.


    The actual collection that holds the rows is entirely different from the table
    headers and column data in that the number of rows changes—and changes quite often.
    If a user searches for a list of DVD records, there is no way to ensure how many
    rows will result, and therefore it will be impossible to anticipate the size of
    the data structure required to hold the values. The best option to hold rows of
    data is a dynamic collection that can have values easily appended, removed, and
    iterated through. The order of the results also matters, so a set collection is
    obviously a poor choice. The best choice is some type of dynamic list. The list
    can now be narrowed to a Vector, a LinkedList, or an ArrayList. As mentioned in
    the “Internally Synchronized Classes” section of Chapter 4, Vectors provide little
    benefit in most cases, but can provide a false sense of thread safety—we therefore
    generally recommend against their use. In this particular case, the values in
    our TableModel do not have to be thread-safe because only one thread is manipulating
    their values in a single instance. Thus, a Vector provides unneeded overhead in
    this application without providing any benefits. A LinkedList provides us with
    some additional methods over an ArrayList—specifically the ability to add and
    remove the first and last objects in the collection; however, we do not need this
    additional functionality. The best choice for the representation of DVD data rows
    in our TableModel is clearly an ArrayList.


    Next, our TableModel must implement some of the required methods that the JTable
    uses to render the Model into a View. For instance, the TableModel must have a
    way to inform the JTable of how many columns it encapsulates. The method getColumnCount
    shown in Listing 8-11 provides this functionality.


    **Listing 8-11.** *Our TableModel’s getColumnCount Method* public int getColumnCount()
    {


    return this.headerNames.length;


    }


