    第 3 章 ■ 项目概述


    **59**


    **介绍示例项目**


    Denny''s DVDs 是一家面向小社区的 DVD 租赁店。认证项目要求基于提供的接口构建应用程序。Sun 公司将提供一个接口作为任务的一部分，而你将负责实现该接口并开发一个功能完整的应用程序。我们的示例项目将采用相同的方法。我们将设想
    Denny''s DVDs 那位臭名昭著的 Denny 会定义一个接口，期望开发者（即你，读者）来实现。该接口 `DBClient.java` 将是我们开发的起点。图
    3.1 展示了系统必须支持的主要操作的 UML 用例图。


    ■**注意** 缩写词 *UPC* 会频繁出现，因此了解一些背景信息可能会有所帮助。UPC 代表通用产品代码，是产品（无论是书籍、CD 还是 DVD）的官方标识符。它是一个在全球范围内唯一标识该产品的数字。有关
    UPC 的更多琐碎信息（以及相关概念，如欧洲商品编号 [EAN] 和校验和），请参考诸如维基百科 (http://en.wikipedia.org/wiki/Main_Page)
    以及各种在线 UPC 数据库等网站。当然，此类主题远远超出了本书的范围。就我们的目的而言，UPC 是系统范围标识符或主键的一个很好的替代品。


    **图 3-1.** *Denny''s DVDs 用例图*


    5165CH03.qxd 11/16/05 12:10 PM 第 60 页


    **60**


    第 3 章 ■ 项目概述


    图 3.1 中的操作构成了 Denny''s DVDs 应用程序必须实现的公共接口 `DBClient.java`。以下是接口方法的描述：

    `addDVD`——需要一个 DVD 对象作为输入参数。如果 UPC 是唯一的，则将 DVD 添加到系统；否则，将抛出异常。

    `getDVD`——给定一个 DVD 的 UPC 值，此方法应返回相应的 DVD 对象。如果在数据库中未找到该 UPC，则返回空对象。

    `modifyDVD`——需要一个 DVD 对象，其 UPC 存在于数据库中。将用新的 DVD 值覆盖现有的 DVD。如果数据库中没有包含所提供 UPC 代码的
    DVD，则返回 `false`，并且数据库不会更新。

    `getDVDs`——应返回数据库中所有 DVD 的集合。如果数据库中没有 DVD，则应返回一个空集合。


    ■**注意** 可供下载的 Denny''s DVDs 系统附带一个初始数据库，本书示例中会一直引用该数据库。


    `findDVD`——此操作应使用正则表达式查询作为输入参数。所提供的输入参数应通过正则表达式查询匹配多个属性。输入参数是正则表达式查询，因此应用程序必须在调用此方法之前将用户的搜索条件转换为正则表达式查询。将用户的搜索条件转换为正则表达式可以在
    GUI 中完成，也可以通过某个中间类完成，但不能在 `findDVD` 方法本身中完成。当然，你不能要求或期望用户输入正则表达式语法作为搜索条件。应返回一个
    DVD 集合。

