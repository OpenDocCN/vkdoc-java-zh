    ## Starvation


    Starvation occurs when a thread never gets a chance to run. Its most common manifestation
    occurs when higher-priority threads keep getting preferential treatment over those
    with a lower priority. Imagine that your task requires that you speak to the CTO
    of your company. However, every time it seems as if she might be free, a senior
    executive steps in and takes the slice of time you were going to use. This could
    be for very legitimate reasons, but the end result is that you never get to speak
    with her (your thread never gets a chance to run).


    The example in Listing 4-10 shows a contrived example of three high-priority threads
    and one low-priority thread all trying to use the same resource.


    **Listing 4-10.** *Starvation Example*


    ```java

