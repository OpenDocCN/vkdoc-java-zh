  raw: 'As shown in Listing 8-21, there is one JMenuBar for the frame. The menu bar
    may have several JMenus attached (for example, one for the File menu, one for
    the Help menu, and so on).


    Each menu may have several JMenuItems attached—one for each action your user is
    likely to perform via a menu.


    Each menu and menu item may have an optional mnemonic key and an optional icon
    attached. We have shown attaching the mnemonic key F to the File menu, and the
    mnemonic key Q to the Quit menu item. If the user presses the Alt and F keys,
    the File menu will pop down, and if they then press the Q key, the application
    will quit.


    Normally each menu item has an actionListener attached to respond to events. We
    have shown attaching an instance of the QuitApplication class to the quitMenuItem
    (the QuitApplication class will be shown in Listing 8-22).


    After the menus have been configured, and the data loaded from the database, an
    instance of the DVDScreen class is added to the MainWindow frame. DVDScreen is
    a JPanel that contains the elements described in the “GUI Design and Layout” section
    earlier. It will be shown in Listing 8-23.


    Finally, an initial size for the application window is set, and the application
    window is centered on the screen.


    **Listing 8-21.** *The MainWindow Constructor: Setting Up the Menu* public MainWindow(String[]
    args) {


    super("Denny''s DVDs");


    this.setDefaultCloseOperation(this.EXIT_ON_CLOSE);


    ApplicationMode connectionType = (args.length == 0)


    ? ApplicationMode.NETWORK_CLIENT


    : ApplicationMode.STANDALONE_CLIENT;


    5165CH08.qxd 11/16/05 12:16 PM Page 269


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **269**


    // find out where our database is


    DatabaseLocationDialog dbLocation =


    new DatabaseLocationDialog(this, connectionType);


    try {


    controller = new GuiController(dbLocation.getNetworkType(), dbLocation.getLocation(),


    dbLocation.getPort());


    } catch (GUIControllerException gce) {


    ApplicationRunner.handleException(


    "Failed to connect to the database");


    }


    // Add the menu bar


    JMenuBar menuBar = new JMenuBar ();


    JMenu fileMenu = new JMenu ("File");


    JMenuItem quitMenuItem = new JMenuItem ("Quit"); quitMenuItem.addActionListener(new
    QuitApplication ()); quitMenuItem.setMnemonic(KeyEvent.VK_Q);


    fileMenu.add(quitMenuItem);


    fileMenu.setMnemonic(KeyEvent.VK_F);


    menuBar.add(fileMenu);


    this.setJMenuBar(menuBar);


    // A full data set is returned from an empty search


    try {


    tableData = controller.getDVDs();


    setupTable();


    } catch (GUIControllerException gce) {


    ApplicationRunner.handleException(


    "Failed to acquire an initial DVD list." +


    "\nPlease check the DB connection.");


    }


    this.add(new DvdScreen());


    this.pack();


    this.setSize(650, 300);


    // Center on screen


    Dimension d = Toolkit.getDefaultToolkit().getScreenSize(); int x = (int) ((d.getWidth()
    - this.getWidth())/ 2);


    int y = (int) ((d.getHeight() - this.getHeight())/ 2); this.setLocation(x, y);


    this.setVisible(true);


    5165CH08.qxd 11/16/05 12:16 PM Page 270


    **270**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    If the user chooses to quit the application using the Quit menu item, the event
    handler will call the QuitApplication class. This is one of the simplest event
    handlers we could write—


    all it does is call System.exit(0). It is shown in Listing 8-22.


    **Listing 8-22.** *The QuitApplication ActionListener* private class QuitApplication
    implements ActionListener {


    public void actionPerformed (ActionEvent ae) {


    System.exit(0);


    }


    }


    Listing 8-23 contains the DVDScreen constructor. The major components of this
    have all been introduced in the earlier sections.


    DVDScreen starts by adding a scroll pane for the table holding the DVDs—this is
    added to the center of the JPanel.


    Following this, the panel for the search options is created, along the way creating
    the text field for entering the search parameters, and the button to begin a search.
    An action listener is added to the search button, and will be described after
    Listing 8-23 since it is a little more involved than our application listener
    for the Quit menu item.'
