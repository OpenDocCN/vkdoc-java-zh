    and even rearranged. The following methods can be called on a JTable instance
    to enable and disable these capabilities:


    • setSelectionMode(ListSelectionModel.SINGLE_SELECTION)


    • setAutoResizeMode(JTable.AUTO_RESIZE_ALL_COLUMNS)


    The preceding table example is perfect if the data in the table only needs to
    be displayed once, but the example is not a very malleable method with which to
    display data. To become a


