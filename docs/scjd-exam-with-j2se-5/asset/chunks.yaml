    \ 接口中指定的方法并非总是必需的。例如，如果开发者想要实现一个简单的 TableModel，那么必须为所有接口方法（如 `removeTableModelListener(TableModelListener\
    \ modListener)`）提供实现将是低效的。因此，提供了一个适配器类，其功能类似于事件适配器类。`AbstractTableModel` 类实现了\
