    在读写记录时，如果能直接定位到文件中存储记录的位置，就能加速操作。如果主键是记录编号，我们就能根据记录编号乘以记录大小，即时计算出文件位置。然而，我们的应用程序使用
    UPC 字符串作为主键，因此需要一种将 UPC 映射到文件位置的方法。唯一的方法是至少读取一次数据文件，在读取过程中将 UPC 和文件位置存储到映射中。


    我们可以专门创建一个方法来完成此操作，但必须实现的接口中已有一个公共方法，该方法会读取整个文件并返回该文件中 DVD 的列表，因此我们可以借助该逻辑来填充映射。


