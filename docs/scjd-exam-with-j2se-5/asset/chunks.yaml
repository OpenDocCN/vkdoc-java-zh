- fmt: "**Note** A `JTable` instance can have its internal table model modified after\
    \ it is instantiated. The `setModel` method updates a `JTable`’s internal `TableModel`\
    \ member and therefore updates the data the `JTable` displays. Data can also be\
    \ added to a `JTable`’s `TableModel` reference by calling the `getModel` method\
    \ on a `JTable` instance. In our case, this method can be called to get a reference\
    \ to the `JTable`’s internal `DVDTableModel` reference. Then the method `addRecord`\
    \ can be called to add a row to a `JTable`.\n\nBecause alterations to a `JTable`’s\
    \ `TableModel` translates into an updated View, the client must be set up to take\
    \ advantage of this schema. The `MainWindow` class contains the private member:\n\
    \n```\nprivate DVDTableModel tableData;\n```\n\nThis data member will always hold\
    \ the main `JTable`’s `TableModel`. Because all data transfer between the View\
    \ and the Controller is done via a `DVDTableModel` object, this member is always\
    \ updated to reflect changes to the database’s state.\n\nOnce the database has\
    \ been updated or queried, the resulting table model is placed into the `tableData`\
    \ member. After calling the Controller, the `MainWindow` class calls its internal\
    \ private method `setupTable`. This method contains the statements in Listing\
    \ 8-17.\n\n**Listing 8-17.** *The setupTable Method*\n\n```\nprivate void setupTable()\
    \ {\n\n    // Preserve the previous selection\n\n    int index = mainTable.getSelectedRow();\n\
    \n    String prevSelected = (index >= 0)\n\n        ? (String) mainTable.getValueAt(index,\
    \ 0)\n\n        : \"\";\n\n    // Reset the table data\n\n    this.mainTable.setModel(this.tableData);\n\
    \n    // Reselect the previous item if it still exists\n\n    for (int i = 0;\
    \ i < this.mainTable.getRowCount(); i++) {\n\n        String selectedUpc = (String)\
    \ mainTable.getValueAt(i, 0);\n\n        if (selectedUpc.equals(prevSelected))\
    \ {\n\n            this.mainTable.setRowSelectionInterval(i, i);\n\n         \
    \   break;\n\n        }\n\n    }\n\n}\n```\n\nNotice that the `setupTable` method\
    \ refreshes the `MainWindow`’s `JTable` instance by calling the `setTableModel`\
    \ method. As soon as the table’s internal `TableModel` is replaced, the View will\
    \ refresh and display the updated data set. If the `JTable` does not update its\
    \ contents, the `updateUI` method can be called, effectively forcing the table\
    \ to redisplay its contents.\n\nAlso notice that the `setupTable` method stores\
    \ the last selected row before refreshing the table model. After the table model\
    \ is reset, the method loops through the new data set and locates the previously\
    \ selected row by the UPC number. After that, the table’s `setRowSelectionInterval`\
    \ method is called to reselect the previous row.\n\n## The JScrollPane\n\nOccasionally\
    \ we get a situation where we need to display more on the screen than will fit.\
    \ For the Denny’s DVDs application, it is possible that there could be so many\
    \ DVDs in the database that displaying them all on screen simultaneously is impossible.\n\
    \nIn these cases, we can add the component that is too large for the screen to\
    \ a `JScrollPane`, which will put scrollbars around the component, *where necessary*,\
    \ to allow scrolling to a different region and viewing the contents there. Note\
    \ that, by default, the scrollbars are only shown when needed—if they are not\
    \ needed, they will not appear.\n\nListing 8-18 shows an example of an application\
    \ where there is too much data to appear in the desired text area, and the way\
    \ this would appear on screen is shown in Figure 8-20.\n\n**Listing 8-18.** *An\
    \ Application That Has Too Much Data to Appear in the Window*\n\n```\nimport javax.swing.*;\n\
    \npublic class MyFrame {\n\n    public static void main(String[] args) throws\
    \ Exception {\n\n        JFrame theFrame = new JFrame();\n\n        theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    \n        String outputString = \"\";\n\n        for (int i = 0; i < 100; i++)\
    \ {\n\n            outputString += \"The quick brown fox jumped over the lazy\
    \ dog. \";\n\n        }\n\n        JTextArea textDisplay = new JTextArea(20, 60);\n\
    \n        textDisplay.setLineWrap(true);\n\n        theFrame.add(textDisplay);\n\
    \n    }\n\n}\n```"
