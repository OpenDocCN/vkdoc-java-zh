    **112**


    第 4 章 ■ 线程


    ■**注意** 我们指定线程在第 1 行或第 2 行的*中间*被切出的原因是，Vector 和 ArrayList 的 add 方法在执行将请求的对象实际添加到底层存储之前，会执行多个操作。

