    ```

    311 public Collection<DVD> find(String query)

    312     throws IOException, PatternSyntaxException {

    313     log.entering("DvdFileAccess", "find", query);

    314     Collection<DVD> returnValue = new ArrayList<DVD>();

    315     Pattern p = Pattern.compile(query);

    316

    317     for (DVD dvd : getDvds()) {

    318         Matcher m = p.matcher(dvd.toString());

    319         if (m.find()) {

    320             returnValue.add(dvd);

    321         }

    322     }

    323

    324     log.exiting("DvdFileAccess", "find", returnValue);

    325     return returnValue;

    326 }

    ```


    In line 315 we take the string provided from our GUI application and compile it
    into a Java `Pattern`. We then need another class, the `Matcher` class, which
    can attempt to match the pattern against the provided string in various ways;
    we generate the `Matcher` for each `DVD` read in line 318. Finally, in line 319
    we tell the `Matcher` to find the next occurrence of the pattern in the current
    `DVD`''s string representation; if found we add the `DVD` to the collection of
    `DVD`s to be returned. While we are only interested in finding the pattern as
    a subset of the entire `DVD`, the `Matcher` can perform other types of matching
    as well; for instance, it can compare two strings in their entirety, or match
    starting with the beginning of the string.


