- fmt: "# 确认并转换对象类型\n\n一旦我们确认了这一点——并且只有当我们确认了这一点时——我们才能将提供的对象转换为`DVD`类型的对象，如第421行所示。最后，在第423和424行中，我们利用了UPC编号对于DVD是唯一的这一事实，并比较了UPC编号。\n\
    \n> **注意** 第423和424行使用三元运算符来确定返回`true`还是`false`。每个人对于三元运算符是提高还是降低可读性都有自己的看法。这是你必须自己决定的事情，可能要根据具体情况逐一判断。在这个特定案例中，我们认为它提高了可读性，与以下替代方案相比：\n\
    > \n> ```\n> if (upc == null) {\n>     return otherDVD.getUPC() == null;\n> }\
    \ else {\n>     return upc.equals(otherDVD.getUPC());\n> }\n> ```\n\n在最后的`return`语句中，我们可以安全地使用`String.equals`方法来比较两个UPC字段的内容。我们之前不能使用它，因为我们不知道本地UPC字段是否包含`null`（在这种情况下，最后的`return`语句会抛出`NullPointerException`）；同样，我们也不知道另一个UPC值是否包含`null`，因此我们不能反转逻辑（`otherDVD.getUPC().equals(upc)`），因为它也可能抛出`NullPointerException`。只有在验证了*至少*两个UPC值中的一个不为`null`之后，我们才能使用`equals`方法。\n\
    \n如果UPC不能唯一标识DVD，我们可能会考虑使用更复杂的逻辑；例如，我们可能会比较UPC、标题和主要演员（演员不太可能参与一部与他们之前参与过的电影标题相同且UPC也相同的电影）。然而，我们可能不会检查可用的DVD数量，因为它们对于DVD来说不是唯一的。\n\
    \n**强烈**建议，无论何时重写`equals`方法，你也应该重写`hashCode`方法，因为这两者经常一起使用。同样，我们利用了UPC编号唯一标识DVD这一事实，并直接重用UPC的哈希码作为DVD的哈希码：\n\
    \n```\n462 public int hashCode() {\n463     return upc.hashCode();\n464 }\n465\
