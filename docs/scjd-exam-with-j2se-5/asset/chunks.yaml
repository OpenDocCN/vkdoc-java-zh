    第 7 章


    ■ ■ ■


    使用套接字进行网络通信


    **本**章描述如何使用套接字构建 Denny''s DVDs 的网络层。


    套接字是一种软件抽象，允许应用程序通过网络相互通信。通过 IP（互联网协议）连接的两台机器之间的任何连接都需要使用套接字。Java 为程序员提供了连接应用程序套接字的能力，但正如我们将在本章中看到的，需要做大量工作来确保客户端和服务器能够使用标准套接字进行有效通信。为了减轻部分工作，Java
    还提供了远程方法调用（RMI）框架，该框架构建在套接字之上。然而，正如你在前一章所学到的，使用 RMI 会引入其自身的问题。两种网络解决方案各有利弊，作为开发人员，你需要根据具体情况决定哪种方案更合适。在本章中，我们将为示例项目详细说明一个简单的套接字解决方案，为你提供所需的信息，以便你在
    Sun 认证项目中就使用哪种解决方案做出明智的决定。


    我们将涵盖的主要领域包括


    • 套接字概述


    • 为什么要使用套接字


    • 连接套接字所需的基本信息


    • 如何构建 TCP 套接字客户端


    • 如何构建 TCP 套接字服务器


    • 套接字与序列化对象


    • 套接字生命周期


    **套接字概述**

