    **问：** Sun 提供了几种跨平台界面外观包。在 JDK 1.5 之前，Metal 和 Motif 是唯一有保障的外观库。随着 JDK 1.5 的发布，Sun
    加入了 Ocean（一种自定义 Metal 主题）和 Synth（一种可换肤的外观）。大多数其他库都是特定于操作系统的。尽管在技术上可以在 Mac 上使用
    Windows 外观，反之亦然，但在一个平台上分发使用另一个操作系统外观的应用程序通常是不合法的。


    Swing 的强大之处部分在于其可扩展性以及能够创建自定义外观库。有一些可用的自定义库是跨平台的，但它们不属于标准 Java 发行版的一部分，并且难以在界面设计中依赖。


    **问：** 我在网上找到了一种外观，它比 Sun 提供的任何外观都更合我意。我可以使用它吗？


    **答：** 请仔细检查你的说明——大多数说明都规定**所有**提交的代码必须是您自己编写的。如果您使用了并非自己编写且不属于 JDK 一部分的外观，那么您将违反此规则。


    **问：** 我在哪里可以找到更多关于 Java 外观指南的信息？


    **答：** 您可以在 http://java.sun.com/products/jlf/ 找到与 Java 界面设计和标准实践相关的大量信息。


    **问：** 我在哪里可以找到更多关于界面设计和可用性测试的信息？


    **答：** 以下网址是开始研究可用性工程和测试的好地方：


    http://www.useit.com


