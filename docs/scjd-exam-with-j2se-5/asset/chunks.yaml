    第 6 章 ■ 使用 RMI 进行网络编程 **图 6-3.** *在 DVD 类上运行 serialver 工具* **图 6-4.** *在 DvdFileAccess
    类上运行 serialver 工具* 由于我们从 DennyDVD 类目录启动了 serialver，因此可以检查项目中的类是否实现了 Serializable
    接口。如果我们从其他目录启动，则必须确保项目已列在系统类路径中。检查类是否实现了 Serializable 接口并不是很有趣，因为我们拥有源代码，并且很清楚哪些类是可序列化的，哪些不是（即，我们可以直接查看文件以确认是否实现了
    Serializable）。但是，对没有源代码的类使用 serialver 会更加有用——例如，JAR 文件中的类或 JDK 的一部分类。


    为了好玩，可以尝试检查类路径中的其他类，例如 Java JDK 中的类（即 `java.util.Date` 或 `java.lang.String`）。


    如果你检查 DVD 和 DVDFileAccess 类的源代码（可从 http://www.apress.com 下载），你会注意到 DVD 确实实现了 Serializable，而
    DVDFileAccess 没有。


    **序列化过程**


    为了实际持久化对象的状态，`java.io` 包中有两个类负责读写可序列化对象的大部分工作：`ObjectOutputStream` 和 `ObjectInputStream`。`ObjectOutputStream`
    有一个名为 `writeObject` 的方法，而 `ObjectInputStream` 有一个名为 `readObject` 的方法。在 Denny''s
    DVDs 项目中，序列化用于在 GUI 和服务器之间通过网络发送方法参数，使用的是默认序列化机制（例如，无论服务器是 RMI 服务器还是套接字服务器）。我们实际上并没有显式地序列化方法参数来使
    RMI 工作。事实上，我们唯一关心的是通过网络发送的对象必须是可序列化的。假设我们想要将 DVD 对象的状态显式持久化到文件系统。在这种情况下，我们可以通过实现
    `persistDVD` 和 `retrieveDVD` 方法来实现。当客户端想要保存数据库记录或 DVD 对象的状态时（例如在调用 `setRecordNumber`
    之后），客户端会调用 `DVDFileAccess` 的 `persistDVD` 方法。`persistDVD` 使用 `ObjectOutputStream`
    类及其 `writeObject` 方法序列化 DVD 对象。`persistDVD` 方法如清单 6-1 所示。请记住，我们实际序列化的成员是 DVD。我们的
    DVD 类必须是可序列化的。`retrieveDVD` 方法读取序列化的对象并重新创建该对象，如清单 6-2 所示。


    5165CH06.qxd 11/16/05 12:14 PM Page 167


    第 6 章 ■ 使用 RMI 进行网络编程 **167**


    **清单 6-1.** *演示使用 FileOutputStream 序列化 DVD 对象的 persistDVD 方法* private boolean
    persistDVD(DVD dvd) throws IOException{


    boolean retVal=false;


    //打开与数据关联的 FileOutputStream


    //注意，如果 DVD 尚不存在，


    //它将被创建。


    String filePath = dbName+"/"+ dvd.getUPC() + fileExtension; FileOutputStream fos
    = new FileOutputStream(filePath); try {


    ObjectOutputStream oos = new ObjectOutputStream(fos);


    //从对象中读取数据


    oos.writeObject(dvd);


    }


    finally {


    //关闭所有引用


    oos.close();


    fos.close();


    }


    }


    **清单 6-2.** *演示使用 FileInputStream 反序列化 DVD 对象的 retrieveDVD 方法* private DVD retrieveDVD(String
    upc, String fileExtension) throws IOException, ClassNotFoundException {


    DVD retVal = null;


    //获取对象序列化状态的路径。


    try {


    String filePath = dbName+"/"+ upc + fileExtension; FileInputStream fis = new FileInputStream(filePath);


    //从对象中读取数据


    ObjectInputStream ois = new ObjectInputStream(fis);


    retVal = (DVD)ois.readObject();


    }


    finally {


    ois.close();


    fis.close();


    }


    return retVal;


    }


    ■**警告** 这些清单中显示的代码并未包含在实际项目中，因为 Denny''s DVDs 依赖于 JVM 和默认序列化机制。这些代码仅作为教学工具，用于说明如何显式序列化对象。


    5165CH06.qxd 11/16/05 12:14 PM Page 168


    **168**


    第 6 章 ■ 使用 RMI 进行网络编程 如前所述，与对象状态相关的信息通过字节流持久化到文件中。但这并不是保存的全部信息。有关类类型及其版本号的信息也会被持久化。这一点很重要，因为类加载器需要从持久化状态正确地反序列化该类。如果未声明
    `serialVersionUID`，则 `ObjectOutputStream` 会为该类生成一个唯一的版本号。随后对类成员的任何更改都会在下次编译时生成新的版本号。在
    `sampleproject.db.DVD` 类中，版本 ID 被定义为一个私有成员，定义如下：


    private static final long serialVersionUID = 5165L;


    ■**注意** 通常，即使发生了不会破坏序列化兼容性的微小更改，也需要保持版本之间的序列化兼容性。在这些情况下，你需要声明 `serialVersionID`。你可以首先使用
    `serialver` 来执行此操作。这将允许你为类的版本 ID 定义自己的编号方案。有趣的是，尽管这是一个私有字段，但 JVM 知道它的存在，并在定义类时使用它。


    调整默认序列化机制


    有时你可能希望更精细地控制对象状态的序列化方式。例如，你可能只关心持久化对象的部分状态，而不是全部。如果类包含一个用于保存数据库连接引用的私有成员，并且你不想持久化该信息，因为连接仅在单个会话中有意义，并且是按需分配的，那么这将非常有用。尝试为下次运行应用程序持久化一个数据库连接是没有意义的。下次加载带有连接引用的对象时，你可以简单地为该成员分配一个新的连接。另一种不希望持久化对象信息的情况是，当对象成员的类型不可序列化时。例如，在我们的示例项目中，DVD
    类中的 J2SE 1.5 Logger 实例是不可序列化的。


    但是，我们如何向 JVM 指示我们不想持久化某个特定的类成员，但希望持久化其他类成员呢？Java 通过使用关键字 `transient` 提供了此功能。持久化的字节流将不包含任何使用关键字
    `transient` 声明的成员。


    我们在序列化实现中使用了关键字 `transient`，因为 Logger 实例无法被序列化。（提示：尝试在 logger 上运行 `serialver`。）从概念上讲，这很合理，因为
    logger 成员实际上并没有为 DVD 的概念增加任何本质内容。通常，logger 是一种不需要持久化的东西，我们可以通过重新初始化 logger 来重新创建一个完整的
    DVD 记录。以下是一个示例，展示了如何在 DVD.java 的 Logger 实例中使用关键字 `transient`： private transient
    Logger log = Logger.getLogger("sampleproject.db"); 还有另一种序列化方法值得一提。除了实现 `Serializable`，另一种方法是实现
    `Serializable` 的子接口：


