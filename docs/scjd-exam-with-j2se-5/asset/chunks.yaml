    **Look and Feel**


    Swing supports a pluggable look and feel. This feature is a welcome side effect
    of Swing’s lightweight components that can be overwritten with programmer-defined
    design and functionality. A prime example of this feature is the Ocean look and
    feel. This interface style can be used on any platform that supports Java and
    graphical user interfaces, and it can be used as a standard interface across all
    platforms. If an interface absolutely must look and behave the same on every platform,
    then the Ocean look and feel is the right choice.


    The look and feel of any Swing-based GUI can be changed on the fly programmatically
    within the application.


