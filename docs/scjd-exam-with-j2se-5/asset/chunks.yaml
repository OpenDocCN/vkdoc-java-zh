- fmt: "# The Externalizable Interface\n\nThe big advantage of the `Externalizable`\
    \ interface is performance. The algorithm for serialization uses reflection for\
    \ marshaling and demarshaling. The serialization algorithm will systematically\
    \ determine the nontransient and nonstatic class members through the use of reflection.\n\
    \nHowever, this can be quite expensive because the reflection algorithm costs\
    \ in terms of CPU cycles and memory. The costs result from the JVM having to dynamically\
    \ discover class properties during runtime. In situations where performance is\
    \ more important than flexibility, consider using a reflectionless approach to\
    \ serialization, such as `Externalizable`. For more information on reflection,\
    \ refer to the following Sun tutorial: `http://java.sun.com/docs/books/tutorial/reflect/`.\n\
    \n## Customizing Serialization with the Externalizable Interface\n\nIf performance\
    \ is a must, then you can serialize using the `java.io.Externalizable` interface\
    \ instead of the `Serializable` interface. So just how does `Externalizable` improve\
    \ on the default serialization mechanism? `Externalizable` requires that you write\
    \ the details of reading and writing the object’s state to the byte stream. This\
    \ is much more tedious than relying on reflection, but ultimately it provides\
    \ more of a speed burst to your application. The `ObjectOutputStream` class no\
    \ longer simplifies this process. You must use the methods `readExternal` and\
    \ `writeExternal` and be aware of the member’s type—whether it is a primitive\
    \ type, a `String` (i.e., UTF), or some other type of object, other than `String`,\
    \ that is serializable.\n\nSince you are involved in the low-level handling, you\
    \ must read your object’s members in the same order in which they were written\
    \ to the stream.\n\nListing 6-3 presents an example of how our `DVD` class might\
    \ look if it were `Externalizable`.\n\nFor illustration purposes, the nuts and\
    \ bolts of the class are not shown—just the code that relates to `writeExternal`\
    \ and `readExternal`. Both methods can be private since the serialization mechanism\
    \ can circumvent the normally applicable accessibility rules for classes (i.e.,\
    \ the JVM can invoke an object’s private serialization methods).\n\n> **Note**\
    \ If the `readObject` and `writeObject` methods are implemented in the `Serializable`\
    \ object, the heavy reliance on reflection is not required and there is actually\
    \ a performance edge over the default serialization mechanism (i.e., implementing\
    \ `Serializable` without overriding the `readObject` and `writeObject` methods).\n\
    \nThis approach is similar to externalization, with some minor differences with\
    \ regard to inheritance and the handling of class metadata. The signatures of\
    \ the methods to override appear in Listing 6-3. When you override these methods,\
    \ it is crucial that the order in which the class attributes are written to the\
    \ stream is the same as the order they are read back. As long as the serializable\
    \ objects are not part of a class hierarchy, `readObject` and `writeObject` are\
    \ implemented exactly as `readExternal` and `writeExternal`, as discussed later\
    \ in this section. Here are the method signatures for `readObject` and `writeObject`:\n\
    \n```\nprivate void writeObject(java.io.ObjectOutputStream out) throws IOException\n\
    private Object readObject(java.io.ObjectInputStream in) throws IOException, ClassNotFoundException\n\
    ```\n\n**Listing 6-3.** *An Externalizable Version of DVD.java: Implementing the\
    \ readExternal and writeExternal Methods of DVD.java*\n\n```\n/**\n * Required\
    \ method for Externalizable interface.\n * Specifies how the object graph gets\
    \ converted to a byte stream.\n */\nprivate void writeExternal(ObjectOutput out)\
    \ throws IOException{\n    out.writeUTF(upc);\n    out.writeUTF(name);\n    out.writeUTF(composer);\n\
    \    out.writeUTF(director);\n    out.writeUTF(leadActor);\n    out.writeUTF(supportingActor);\n\
    \    out.writeUTF(year);\n    out.writeInt(copy);\n}\n\n/**\n * Required method\
    \ for Externalizable interface.\n * Specifies how to recreate the object graph\
    \ from\n * a byte stream. The order members are read must\n * match the order\
    \ in which the object members were\n * written to the stream.\n */\nprivate void\
    \ readExternal(ObjectInput in) throws IOException{\n    out.readUTF(upc);\n  \
    \  out.readUTF(name);\n    out.readUTF(composer);\n    out.readUTF(director);\n\
    \    out.readUTF(leadActor);\n    out.readUTF(supportingActor);\n    out.readUTF(year);\n\
    \    out.readInt(copy);\n}\n```\n\n> **Caution** As was the case with `persistDVD`\
    \ and `retrieveDVD`, the `readExternal` and `writeExternal` methods are not included\
    \ in the actual project code base, but are used merely as a pedagogical device\
    \ for demonstrating externalization.\n\nSince `Externalizable` is considered a\
    \ more advanced serialization approach, we will not cover `Externalizable` any\
    \ further in this book. Rather, we have chosen to implement `Serializable` for\
    \ simplicity, but `Externalizable` is mentioned so that you understand the alternative.\
    \ `Serializable` is simpler to implement but sacrifices performance and flexibility.\n\
    \nUsing `Externalizable` results in code that is more difficult to maintain. For\
    \ instance, if we were to add a new class member to the `DVD` class—say, a serializable\
    \ type such as `boolean`—our preceding read and write code would not change. However,\
    \ if `DVD` implemented `Externalizable` instead of `Serializable`, then we would\
    \ have to update the `readExternal` and `writeExternal` methods to incorporate\
    \ the change. In addition, the externalization methods should include logic to\
    \ check for specific versions of serial version IDs to determine if they were\
    \ dealing with older versions of the class. In a production system, this can be\
    \ an annoyance if you have a lot of classes that tend to change over time. Table\
    \ 6-1 presents a comparison of serialization to externalization.\n\n> **Tip**\
    \ The use of `transient` in a class that implements `Externalizable` is not required.\
    \ Since the `Externalizable` interface requires that the details of reading and\
    \ writing the object’s state be defined, the `transient` keyword is not necessary.\
    \ In fact, it is completely ignored in an `Externalizable` object.\n\n> **Note**\
    \ Since application performance is not a consideration in our design; we have\
    \ opted for plain serialization over externalization in our implementation of\
    \ Denny’s DVDs version 2.0.\n\n**Table 6-1.** *Comparing Serialization and Externalization*\n\
    \n| Serialization | Externalization | Advantage Goes To . . . |\n|---|---|---|\n\
    | Easier to use. Just implement `Serializable` and use `writeObject` and `readObject`\
    \ to persist state. | More complex. Must implement the `Externalizable` interface\
    \ methods `readExternal` and `writeExternal`. | Serialization |\n| Less efficient\
    \ algorithm. Uses reflection to determine object’s makeup. | Better performance.\
    \ No need to use reflection since you write the code. | Externalizable |\n| More\
    \ data gets serialized due to larger class description and versioning information.\
    \ | More control over what gets serialized. | Externalizable |\n\n## Introducing\
    \ RMI\n\nAn important objective of the SCJD exam is for the examinee to develop\
    \ a solution that will allow machines on a network to exchange messages. Such\
    \ communication, known as distributed computing, can be a challenging task, but\
    \ RMI is one of the helpful tools at your disposal.\n\nHowever, RMI is not the\
    \ only game in town. There are other technologies, such as RPC, Common Object\
    \ Request Broker Architecture (CORBA), and Microsoft’s .NET technology. In fact,\
    \ RMI can be thought of as object-oriented RPC.\n\n> **Note** .NET has a similar\
    \ and competing technology called .NET remoting.\n\nThis is a good time to define\
    \ some terms. When we use the term *server* in RMI programming scenarios, we are\
    \ referring to a remote object that has methods that can be invoked from another\
    \ JVM. A *client* is the object that invokes the remotely accessible methods of\
    \ the server."
