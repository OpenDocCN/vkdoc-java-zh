    以下是 TCP 套接字通信涉及的基本步骤：**1.** 创建套接字类的实例。


    **2.** 使用套接字 I/O 流发送序列化消息。


    **3.** 关闭套接字连接。


    ■**注意** 对于初始连接，有两个要求：一个发送初始连接请求的套接字客户端，以及一个监听传入连接请求的套接字服务器。但是一旦连接建立，你就拥有了两个套接字之间的连接，任何一端都可以发送或接收数据。由通信协议决定在任何给定时刻哪个套接字在发送数据，哪个套接字在接收数据。我们将在本章后面的“应用协议”一节中介绍应用协议。正如你可能想象的那样，如果客户端或服务器不遵循应用协议，点对点通信将会中断。


    **TCP 套接字客户端**


    java.net.Socket 类负责实现套接字到套接字的连接。该类的构造函数（实际上会尝试连接到目标机器）需要目标机器的主机名（作为 URL 字符串）和端口。表
    7-1 列出了 java.net.Socket 的各种公共构造函数。


