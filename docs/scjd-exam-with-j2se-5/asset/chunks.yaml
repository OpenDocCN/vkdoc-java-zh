    IceCreamMan.java 示例


    IceCreamMan 对象在其 run 方法内启动一个循环。该方法检查是否有任何 IceCreamDish 对象需要被服务。这一切都发生在 run 方法的第
    15 行到第 32 行之间：


    1 import java.util.*;


    3 public class IceCreamMan extends Thread {


    4 /**


    5 * 一个用于存放 IceCreamDish 对象的列表


    6 */


    7 private List<IceCreamDish> dishes = new ArrayList<IceCreamDish> (); 8


    9 /**


    10 * 启动一个线程，等待冰淇淋碗被交予它。


    11 */


    12 String clientExists = "IceCreamMan: has a client"; 13 String clientDoesntExist
    = "IceCreamMan: does not have a client"; 14


    15 public void run() {


    16 while (true) {


    17 if (!dishes.isEmpty()) {


    18 System.out.println(clientExists);


    19 serveIceCream();


    20 } else {


    21 try {


    22 System.out.println(clientDoesntExist); 23 // 休眠，以便孩子们有机会添加他们的

    24 // 碗。关于为什么这不是一个 yield 语句，请参见书中的注释。

    25 sleep(1000);


    26 } catch(InterruptedException ie) {


    27 ie.printStackTrace();


    28 }


    29 }


    30 }


    31 }


    第 16 行为此线程启动了一个无限循环。请记住，IceCreamMan 的线程是一个守护线程，因此即使这是一个无限循环，一旦所有 Child 线程都吃完了他们的冰淇淋，它也不会阻止应用程序退出。


    第 17 行检查是否有任何 IceCreamDish 对象已排队等待处理。如果没有，IceCreamMan 线程会休眠一秒钟，然后再次检查，如第 22 到
    26 行所示。如果队列中有条目，则 IceCreamMan 线程调用 serveIceCream 方法。


    在第 26 行，我们有一个选择——我们可以让出（yield）给其他线程，或者休眠一段时间。任何一种选择都能给 Child 线程运行的机会。然而，休眠为 Child
    线程提供了更好的运行机会，因为 JVM 知道 IceCreamMan 至少在一秒钟内不会运行——如果我们让出，任何 Child


    5165CH04.qxd 11/16/05 12:11 PM 第 84 页


    **84**


    第 4 章 ■ 线程


    线程或 IceCreamMan 线程都可能立即开始运行。此外，让出通常是在开始（或进行中）一个冗长或复杂的任务之前做的事情——这是一种对其他线程友好的方式。然而，这里并非这种情况。最后，如果没有其他线程可以运行，JVM
    会立即将控制权交还给 while 循环——这将导致该线程消耗尽可能多的 CPU 周期；甚至可能导致你的计算机看起来像死机了一样。


    serveIceCream 方法是我们代码中最有趣的部分。假设队列中当前有一个 Dish，第 49 行对该 IceCreamDish 实例进行了同步。这会产生强制任何想要使用该
    IceCreamDish 实例的 Child 对象等待的效果。具体来说，它会导致 Child 中的第 55 行暂停，直到 IceCreamMan 中的第 53
    行被执行；或者，如果 Child 线程在第 60 行暂停，它将无法恢复，直到 IceCreamMan 中的第 53 行被执行。


    相反，如果一个 Child 实例正在执行一个同步在 IceCreamDish 上的方法，那么执行到 IceCreamMan 中的第 49 行将导致 IceCreamMan
    等待，直到 Child 中的第 50 到 61 行执行完毕，或者直到 Child 实例通过在第 55 行调用 wait 释放了 IceCreamDish 上的锁。


    这是线程相互尊重边界的例子。通过在同一个对象上进行同步，两个线程可以确保它们不会同时修改或使用同一个对象。


    当 IceCreamMan 拥有 dish 上的锁时，他可以用冰淇淋填满它，然后通知 Child 冰淇淋已就绪。这发生在第 52 行。第 52 行运行后，正在等待那个特定盘子的
    Child 线程将不再等待——JVM 调度器现在可以运行它了。然而，直到 IceCreamMan 在第 53 行完成时释放 dish 上的锁，Child 才能重新获得
    dish 上的锁，因此它将保持阻塞状态。


    ■**注意** 除非你在一个同步于该对象的块或方法中，否则你不能在该对象上调用 notify 方法。


    34 /**


    35 * 向 Child 对象提供冰淇淋。


    36 */


    37 private void serveIceCream() {


    38 // 获取一个冰淇淋碟子


    39 IceCreamDish currentDish = dishes.get(0);


    41 // 有时等待，有时不等待


    42 if (Math.random() > .5) {


    43 delay();


    44 }


    46 String msg = "notify client that the ice cream is ready"; 47 System.out.println("IceCreamMan:
    " + msg); 48


