    第 5 章 ■ DVD 数据库类


    **149**


    • 客户端 A 检索电影《*上班一条虫*》的 DVD 记录。

    • 客户端 B 检索电影《*上班一条虫*》的 DVD 记录。

    • 客户端 A 确认该 DVD 仍有一份库存。

    • 客户端 B 确认该 DVD 仍有一份库存。

    • 客户端 A 租借了该 DVD。

    • 客户端 B 租借了该 DVD。


    现在问题出现了：根据电子记录，客户端 A 和 B 都租借了同一张 DVD。


    解决此问题的一种方法是使检索-确认-租借操作成为原子操作。然而，这只能在服务器端完成，因为运行在各自 JVM 中的两个独立客户端无法感知其他 JVM 中运行的同步块。将这段代码放在服务器端运行，构建瘦客户端会非常简单，但我们已知需要构建一个
    Swing 客户端，因此我们知道客户端计算机能够支持胖客户端。更大的问题是，将此代码置于原子块内会降低并发性。


    **瘦客户端与胖客户端**


    术语“瘦客户端”用于表示可在处理能力最低的计算机上运行的客户端界面。一个典型例子是应用程序的 Web 界面——访问该 Web 界面的计算机可以是性能非常低的计算机。甚至有可能设置一台没有硬盘或软盘驱动器的计算机，只要软件有瘦客户端界面，就能访问功能强大的软件。例如，可以在配备
    386 CPU（运行频率 16 MHz、4 MB RAM）的个人计算机上设置一个 Web 浏览器。如果这样做，你仍然可以访问电子邮件、阅读新闻、执行网络搜索等操作。


    对于不像作者那么年长的读者来说，在目前配备奔腾 4 CPU（运行频率超过 2 GHz、至少 128 MB RAM）的个人计算机之前，曾有过配备奔腾 III
    CPU 的个人计算机。再往前追溯，有奔腾 II CPU、奔腾 CPU、486 CPU——再之前是 386 CPU。在配备 386 CPU 的个人计算机之前，还有
    286、8086 和 8088 CPU，但作者可不想在它们中的任何一台上面设置 Web 浏览器（作者之一工作的第一个类 Unix 系统是运行在 286 上的
    Coherent 系统）。


    “胖客户端”（或“肥客户端”）是指大部分处理在客户端计算机上完成的客户端，因此需要性能更强的客户端计算机。例如，微软建议在至少配备奔腾 III CPU 和
    128 MB RAM 的 PC 上运行 Microsoft Office。


    组织内部存在尽可能使用瘦客户端软件的趋势，原因有很多，例如瘦客户端通常仍能在较旧的计算机上运行（386 于 1985 年发布，而奔腾 III 于 1999
    年发布；如果所有软件都需要在奔腾 III 上运行胖客户端，那么有 14 年间的计算机都将过时），此外，如果系统管理员只需管理运行应用程序的一两台服务器，而所有客户端机器只运行瘦客户端软件，他们的工作也会更轻松。


    5165CH05.qxd 11/16/05 12:13 PM 第 150 页


    **150**


    第 5 章 ■ DVD 数据库类


    ■**注意** 在决定为你的提交构建瘦客户端还是胖客户端之前，请仔细阅读从 Sun 网站下载的说明，以确定是否有必须遵守的要求。关于此主题，JavaRanch
    (http://www.javaranch.com) 上已有许多讨论（其中一个由一位作者发起的讨论，收到了 133 条观点），欢迎你加入那里的讨论。


    但考虑一下采用逻辑记录锁定的相同场景：


    • 客户端 A 逻辑锁定电影《*上班一条虫*》的 DVD 记录。

    • 客户端 B 尝试逻辑锁定电影《*上班一条虫*》的 DVD 记录；但在客户端 A 释放逻辑锁之前无法锁定。客户端 B 现在必须等待客户端 A 完成。

    • 客户端 A 检索电影《*上班一条虫*》的 DVD 记录。

    • 客户端 A 确认该 DVD 仍有一份库存。

    • 客户端 A 租借了该 DVD。

    • 客户端 A 释放电影《*上班一条虫*》DVD 记录的逻辑锁。

    • 客户端 B 逻辑锁定电影《*上班一条虫*》的 DVD 记录。

    • 客户端 B 检索电影《*上班一条虫*》的 DVD 记录。

    • 客户端 B 发现该 DVD 已无库存。

    • 客户端 B 释放电影《*上班一条虫*》的逻辑锁，并（希望如此）去寻找其他可租借的 DVD。


    逻辑记录锁定的主要优势之一是允许更高的并发性。它还能在网络中工作，因此我们可以利用胖客户端的处理能力。


    **讨论点：识别锁的所有者** 仅仅拥有逻辑预留记录和释放预留的方法通常是不够的。你通常需要某种方式来识别哪个客户端预留了该记录，以便只有该客户端才能释放它。


    一个现实生活中的例子可能有助于解释为什么需要这样做。想象一下，你打电话给剧院，为一场演出预留了最后一个座位。但随后另一个人出现在剧院，声称他们预留了那个座位。如果剧院没有某种方式来识别是谁预留了座位，你可能会失去你的座位。


    同样，如果我们不识别锁的所有者，一个不道德的程序员可能会编写这样的程序：如果在特定时间内未获得锁，他们就会直接解锁该记录。


    5165CH05.qxd 11/16/05 12:13 PM 第 151 页


    第 5 章 ■ DVD 数据库类


    **151**


    如何识别锁的所有者取决于你的说明要求，也可能取决于你如何开发网络服务器。我们将在以下章节中提供一些建议，但你需要自行确定哪种方法适用于你的具体说明。


    使用令牌识别锁的所有者


    如果我们能从锁定方法向请求逻辑锁的客户端返回一个令牌，那么我们可以要求客户端在执行其他操作（包括释放逻辑锁）时必须使用该令牌。

