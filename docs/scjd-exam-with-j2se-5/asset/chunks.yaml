    `IceCreamMan.java`示例


    `IceCreamMan`对象在其`run`方法内启动一个循环。该方法检查是否有任何`IceCreamDish`对象需要被服务。这一切都发生在`run`方法的第15行到第32行之间：


    ```java

    1 import java.util.*;


    3 public class IceCreamMan extends Thread {


    4     /**

    5      * a list to hold the IceCreamDish objects

    6      */

    7     private List<IceCreamDish> dishes = new ArrayList<IceCreamDish> ();


    8

    9     /**

    10      * Start a thread that waits for ice cream bowls to be given to it.

    11      */

    12     String clientExists = "IceCreamMan: has a client";

    13     String clientDoesntExist = "IceCreamMan: does not have a client";


    14

    15     public void run() {

    16         while (true) {

    17             if (!dishes.isEmpty()) {

    18                 System.out.println(clientExists);

    19                 serveIceCream();

    20             } else {

    21                 try {

    22                     System.out.println(clientDoesntExist);

    23                     // sleep, so that children have a chance to add their

    24                     // dishes. see note in book about why this is not a

    25                     // yield statement.

    26                     sleep(1000);

    27                 } catch(InterruptedException ie) {

    28                     ie.printStackTrace();

    29                 }

    30             }

    31         }

    32     }

    ```


    第16行为此线程启动了一个无限循环。请记住，`IceCreamMan`的线程是一个守护线程，因此即使这是一个无限循环，一旦所有`Child`线程都吃完了冰淇淋，它也不会阻止应用程序退出。


    第17行检查是否有任何`IceCreamDish`对象已排队等待处理。如果没有，`IceCreamMan`线程会休眠一秒钟，然后再次检查，如第22行到第26行所示。如果队列中有条目，则`IceCreamMan`线程调用`serveIceCream`方法。


    在第26行，我们有一个选择——我们可以让出（`yield`）给其他线程，或者休眠一段时间。这两种选择都为`Child`线程提供了运行的机会。然而，休眠为`Child`线程提供了更好的运行机会，因为JVM知道`IceCreamMan`至少在一秒钟内不会运行——如果我们让出，任何`Child`线程或`IceCreamMan`线程都可能立即重新开始运行。此外，让出通常是在开始（或进行中）一个冗长或复杂的任务之前做的事情——这是一种对其他线程友好的方式。然而，这里的情况并非如此。最后，如果没有其他线程可以运行，JVM会立即将控制权交还给`while`循环——这将导致该线程消耗尽可能多的CPU周期；甚至可能导致你的计算机看起来像死机了一样。


    `serveIceCream`方法是我们代码中最有趣的部分。假设队列中当前有一个`Dish`，第49行在该`IceCreamDish`实例上同步。这会产生强制任何想要使用该`IceCreamDish`实例的`Child`对象等待的效果。具体来说，它会导致`Child`中的第55行暂停，直到`IceCreamMan`中的第53行被执行，或者，如果`Child`线程在第60行暂停，它将无法恢复，直到`IceCreamMan`中的第53行被执行。


    相反，如果一个`Child`实例正在执行一个在`IceCreamDish`上同步的方法，那么执行到`IceCreamMan`中的第49行将导致`IceCreamMan`等待，直到`Child`中的第50行到第61行执行完毕，或者直到`Child`实例通过在第55行调用`wait`释放了`IceCreamDish`上的锁。


    这是线程相互尊重边界的例子。通过在同一个对象上同步，两个线程可以确保它们不会同时修改或使用同一个对象。


    当`IceCreamMan`拥有盘子的锁时，他可以往里面装满冰淇淋，然后通知`Child`盘子已经准备好了。这发生在第52行。第52行运行后，正在等待那个特定盘子的`Child`线程将不再等待——JVM调度器现在可以运行它了。然而，直到`IceCreamMan`在第53行完成时释放盘子的锁，`Child`才能重新获得盘子的锁，因此它将保持阻塞状态。


    > **注意** 除非你在一个同步于该对象的块或方法中，否则你不能在该对象上调用`notify`方法。


    ```java

    34     /**

    35      * Serve Ice Cream to a Child object.

    36      */

    37     private void serveIceCream() {

    38         // get an ice cream dish

    39         IceCreamDish currentDish = dishes.get(0);


    41         // wait sometimes, don''t wait sometimes

    42         if (Math.random() > .5) {

    43             delay();

    44         }


    46         String msg = "notify client that the ice cream is ready";

    47         System.out.println("IceCreamMan: " + msg);


    48

    49         synchronized (currentDish) {

    50             currentDish.readyToEat = true;

    51             //notify the dish''s owner that the dish is ready

    52             currentDish.notify();

    53         }


    55         //remove the dish from the queue of dishes that need service

    56         dishes.remove(currentDish);

    57     }

    ```


    `IceCreamMan`的`serveIceCream`方法中第49-53行的同步块，以及`Child`的`eatIceCream`方法中第55-66行的同步块，要求两个线程在同一个对象上同步。我们必须假设任何在`Child`类和`IceCreamMan`类上工作的程序员都会继续使用同步块。然而，存在一个风险，即`Child`可能会移除他们的同步代码，这意味着他们可以在盘子被装满冰淇淋之前就把它拿回去。这实际上为我们提供了一种防止程序被更改的保护措施——我们可以向其他程序员解释，移除同步代码可能导致`Child`线程拿到一个没有完全装满（甚至可能是空的）的盘子。


    > **提示** 每当编写的代码依赖于特定的实现方式时，你应该添加实现注释来向其他程序员解释细节。我们在前面代码清单中`Child`类的第50-54行的注释中展示了这一点。


    虽然向`Child`解释他们不应该在被告知盘子已满之前试图拿走盘子相对容易（因为他们不想错过更多的冰淇淋），但更难让他们同意不一次性交出所有盘子——从他们的角度来看，越早交出盘子，盘子就能越早被装满。他们并不特别关心对其他孩子的公平性，或者`IceCreamMan`一次接收多个盘子的处理能力如何。


    为了防止这种情况，我们同步了`IceCreamMan`的`requestIceCream`方法。通过同步该方法，我们可以确保一次只有一个`Child`向`IceCreamMan`递交盘子。


    ```java

    59     /**

    60      * Allow client objects to add dishes

    61      */

    62     public synchronized void requestIceCream(IceCreamDish dish) {

    63         dishes.add(dish);

