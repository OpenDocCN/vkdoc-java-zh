    \ 1999).\n\nThis description seems to cause a great deal of confusion when first\
    \ read, so an example is in order:\n\n```\n1 public class IndentationExample {\n\
    2   /* this line is indented once */\n3   public IndentationExample() {\n4   \
    \  /* this line is indented twice */\n5   }\n6 }\n```\n\nLines 2, 3, and 5 all\
    \ have one indentation, so you should prefix them with four spaces. Line 4 has\
    \ two indentations, so you *should* prefix them with eight spaces. However, eight\
    \ spaces are also equivalent to a tab, so you *could* use a tab instead of the\
    \ eight spaces for line 4.\n\nTo avoid confusion, we recommend that you use eight\
    \ spaces instead of a tab.\n\n> **Tip**: Many IDEs and editors give you the option\
    \ to insert a specified number of spaces whenever you press the Tab key (and even\
    \ handle backspacing over the indentation/reformatting entire blocks of code).\
    \ We recommend you check whether your IDE/editor provides this functionality and\
    \ turn it on when available.\n\n## Line Lengths/Wrapping\n\nAs mentioned earlier,\
    \ you cannot know what sort of an editor or what screen size your assessor will\
    \ be using. Limiting line lengths to 80 characters will ensure that your code\
    \ should be readable in most cases.\n\nLines that are longer than 80 characters\
    \ should be broken after a comma or before an operator whenever possible. The\
    \ second (and subsequent lines) should be indented to the beginning of the expression\
    \ on the previous line, or eight spaces. For example:\n\n```\nint i = myMethod(longNamedVariable1,\
    \ longNamedVariable2,\n                 longNamedVariable3, longNamedVariable4);\n\
    ```\n\nLine wrapping for `if`, `for`, and `while` statements generally uses the\
    \ eight-space indentation rule rather than the beginning of the expression, since\
    \ using the beginning of the expression can cause confusion with the line that\
    \ follows, which will be indented four characters. The following example shows\
    \ both the preferred and nonpreferred way of breaking `if` statements:\n\n```\n\
    // nonpreferred way\nif (myMethod(longNamedVariable1, longNamedVariable2,\n  \
    \           longNamedVariable3, longNamedVariable4)) {\n  // code starts here\
    \ – see how confusing this is ?\n  doSomething();\n}\n\n// preferred way\nif (myMethod(longNamedVariable1,\
    \ longNamedVariable2,\n             longNamedVariable3, longNamedVariable4)) {\n\
    \  // code starts here – now we can see the difference between\n  // the condition\
    \ and the code to be run within the condition\n  doSomething();\n}\n```\n\nIn\
    \ cases where you have multiple levels of code in one line, for example, calling\
