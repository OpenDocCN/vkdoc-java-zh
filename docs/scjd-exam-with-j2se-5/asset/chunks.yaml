    \ *Making a GUI object scrollable using a JScrollPane*\n\n## Bringing Denny’s\
    \ DVDs Together\n\nNow it is time to bring the Denny’s DVDs application together.\
    \ The best way to launch the Denny’s DVDs client is through the use of a shell\
    \ class. The entire responsibility of this class is to initiate the launch of\
    \ the application. Usually, an application shell will initialize some global settings,\
