    \ server. (Of course, we could check the `serialversionID` so that we could be\
    \ backward compatible, but you get the idea.) A different approach would be to\
    \ embed the command as a string in the `DvdCommand`. This way, as new commands\
    \ are added, there would be no need to add them to the `SocketCommand` class,\
    \ but the server would be able to recognize the new command.\n\n**Q** Should I\
