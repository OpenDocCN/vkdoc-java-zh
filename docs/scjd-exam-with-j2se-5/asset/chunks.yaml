    第 6 章 ■ 使用 RMI 进行网络编程 JVM 之间传输参数和返回值。需要考虑三类参数和返回值：原始类型、可序列化对象和远程对象。


    ■**注意** 原始类型数组和可序列化对象数组也可以安全地作为远程方法参数传递。


    **原始类型**


    RMI 会为方法参数和返回值都创建原始类型的副本。当原始类型的副本通过网络发送时，我们说该参数或返回值是*按值传递*的。


    **可序列化对象**


    当一个对象作为方法参数或返回值通过网络进行编组时，RMI 会将该对象及其引用的所有对象作为一个大的对象图进行复制。对象参数与原始类型一样，是按值传递通过网络发送的。


    被传递的对象必须是可序列化的，否则会抛出 `NotSerializableException`。此外，被编组的对象的所有类成员也必须是可序列化的，除非该成员被声明为
    `transient` 成员，或者实现了 `Externalizable` 接口而不是 `Serializable`。


    **远程对象**


    这是三种情况中最复杂的一种。当返回的项目是一个远程对象（即实现了 `java.rmi.Remote` 的对象）时，该对象的代理（即存根）会被返回，而不是真实对象。通过这种方式，远程对象是按引用传递的，并且存根会在两端之间来回编组。


    默认情况下，远程对象实现了 `Serializable`。表 6-3 总结了 RMI 如何处理各种参数和返回值。RMI 使用两种机制之一来获取远程对象引用。RMI
    注册表是一种方式，另一种是简单地传递代理或存根，这在前文已经讨论过。RMI 注册表使用 `java.lang.Naming` 来存储对远程对象的引用。`java.rmi.Naming`
    提供了基于 URL 的方法，用于关联位于特定主机和端口上的名称-对象对。RMI 还可以使用有效的 URL 命名协议（如 FTP 或 HTTP）加载字节码。当客户端与远程对象交互时，它也是与远程对象接口交互，而不是与实际的远程实现交互。


