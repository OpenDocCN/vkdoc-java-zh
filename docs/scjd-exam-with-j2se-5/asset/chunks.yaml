    **图 8-32.** *GridLayout 示例，展示一致的单元格大小* 如图 8-32 所示，所有组件的宽度都与最长组件（内容为“A very long
    component”的 JLabel）的宽度相同，所有组件的高度都与最高组件（包含多行文本的 JTextArea）的高度相同。


    虽然当大多数组件大小相同时，这种布局非常有用，但当组件大小差异较大时（就像我们常见框架中的情况），它就不太适用了。如果我们使用 GridLayout，那么分配给标签的空间将与分配给最大组件（数据库位置字段）的空间相同。


    GridBagLayout 同样基于单元格网格工作；然而，组件可以占据多个单元格，列的宽度根据不跨多列的最宽列计算，行的高度根据该行中不跨多行的最高组件计算。


    我们将从一个简单的示例开始，该示例包含与图 8-32 中相同的组件，但这次我们将使用 GridBagLayout。清单 8-26 展示了创建图 8-33 所示
    GUI 的程序。


