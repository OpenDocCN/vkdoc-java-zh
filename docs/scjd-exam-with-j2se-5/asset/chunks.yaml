    When printing statistics (and in our PretendLogger), we use the PrintStream.format
    method that was introduced in JDK 5\. Remember that the System out static variable
    is an instance of PrintStream, so we get to use this new method in defining our
    output.


    The format method takes a String argument that describes the formatting of the
    output, and then takes a variable number of arguments (VarArgs in action). This
    means that no matter how many arguments you provide, one definition of the format
    method can handle them all.


    The String argument that describes the formatting of the output has many options—far
    too many to mention here. Table 9-3 describes the options we have used in our
    test harness.


    For more information, we recommend you look at the documentation for PrintStream’s
    format method, and the Format class available online at http://java.sun.com/j2se/1.5.0/


    docs/api/index.html.


