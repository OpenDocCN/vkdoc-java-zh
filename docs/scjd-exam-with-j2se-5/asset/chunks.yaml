  trans: '

    SCJD 考试的目标是验证你对最重要 Java 技能的掌握程度，包括线程、RMI、套接字、序列化、文件 I/O 和 Swing。每个作业项目都可能独一无二，以不同方式测试这些特性。例如，虽然你必须编写一个能够处理并发请求的服务器，但所提供的接口可能会改变你允许多个线程运行的类。或者，你的需求可能要求严格的搜索功能，而非更通用的搜索能力。本书汇集了你需要了解的所有相关主题知识，并整合了
    J2SE 5 中的相关变更。


    Sun 还要求你使用当前的 JDK（未被更新版本取代超过 18 个月的 JDK）来开发解决方案，以确保考生能够跟上 JDK 最新特性的步伐。发布日期列表可在
    http://java.sun.com/j2se/codenames.html 找到。


    **下载作业**


    你可以通过访问美国网站 http://www.sun.com/training/certification/java/java_devj2se.html 来注册作业和考试。许多其他国家也支持在线注册——你可以在
    http://www.sun.com/training/world_training.html 查看联系方式。支付作业费用后，你将收到 Sun 发送的一封电子邮件，详细说明如何下载包含作业说明的
    Java 归档（JAR）文件。收到这封邮件可能需要几天时间，也可能当天就收到。一旦收到 JAR 文件，请制作几份副本并安全存放。获取与本节主题匹配的第二份作业副本费用非常昂贵。


    ■**提示** Sun 教育网站列出了你可以下载作业的网址。你或许可以在收到指定账户已配置为可下载的电子邮件之前，就下载你的作业。


    **文档与问题**


    你很可能对考试要求有疑问。通常，Sun 不会回答这些问题。这可能是因为他们想考察你在不同解决方案之间做出选择（并描述你做出决策的原因）的能力。也可能是因为他们试图模拟现实世界中的情况，即客户并不总是愿意沟通。甚至可能是因为回答每位考生的提问是一项难以完成的任务。无论如何，清晰地阐述你的问题，并在作为作业交付物一部分而必须创建的文档中处理这些问题，这一点非常重要。至少，你应该记录你的假设和选择。如需更多帮助，我们建议使用
    JavaRanch (http://www.javaranch.com) 上提供的优秀资源，以及 Yahoo 上各种有用的 Java 认证小组。


    第 2 章就如何使用 Javadoc 风格的注释提供了很好的建议，并介绍了一些行业最佳实践。不要使用古怪的命名约定，甚至不要使用匈牙利命名法。如果可能，请使用材料本身使用的风格。就
    SCJD 考试而言，Sun 确实希望你循规蹈矩。


