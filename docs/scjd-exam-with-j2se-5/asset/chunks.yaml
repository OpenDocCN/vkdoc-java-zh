    such as the large messages that are possible in response to a database query in
    our sample application. The next section describes how to develop a socket solution
    using TCP.


    TCP Sockets


    TCP stands for Transmission Control Protocol—a protocol that controls the transmission
    of packets so that messages are guaranteed to be received and that packets are
    received in the same order as they were sent. To meet these guarantees, the TCP
    protocol uses slightly more network traffic than UDP (and since RMI provides more
    features and guarantees than a plain TCP socket, it uses even more network traffic
    than TCP). However, since the protocol provides these features for us, we do not
    have to verify the order in which packets are received in our application. This
    makes it a much better choice for Denny’s DVDs.


    A TCP socket is a socket connection that utilizes a TCP/IP connection as its underlying
    transfer protocol. Each end of the connection is identified with an IP address
    and a port number. TCP socket clients send requests, and TCP socket servers listen
    for requests.


