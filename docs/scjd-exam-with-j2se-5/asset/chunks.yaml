- fmt: 'JDK 1.5 的可重入锁（`ReentrantLock`）与 `synchronized` 块的语法不同，它提供了实现“手递手锁定”（hand-over-hand
    locking）的能力。在这种锁定模式中，先请求一个锁，然后请求第二个锁，接着释放第一个锁，依此类推。在下一个锁被授予之前，链中的任何一个锁都不会被释放。


    从概念上讲，`reserveDVD` 方法的替代实现看起来像清单 5-3 中的代码。请注意，行号仅针对此讨论，与原始 `reserveDvd` 方法的行号无关。


    **清单 5-3.** *一个 CPU 占用更低的 `reserveDvd` 方法*

    ```

    1 private static Map<String, LockInformation> reservations

    2 = new HashMap<String, LockInformation>();

    3

    4 private static Lock masterLock = new ReentrantLock();

    5

    6 public boolean reserveDvd(String upc, DvdDatabase renter)

    7 throws InterruptedException {

    8 LockInformation dvdLock = null;

    9 masterLock.lock();

    10 try {

    11 dvdLock = reservations.get(upc);

    12 if (dvdLock == null) {

    13 dvdLock = new LockInformation();

    14 reservations.put(upc, dvdLock);

    15 }

    16 dvdLock.lock();

    17 } finally {

    18 masterLock.unlock();

    19 }

    21 try {

    22 long endTimeMSec = System.currentTimeMillis() + 5000;

    23 Condition dvdCondition = dvdLock.getCondition();

    24 while (dvdLock.isReserved()) {

    25 long timeLeftMSec = endTimeMSec - System.currentTimeMillis();

    26 if (!dvdCondition.await(timeLeftMSec, TimeUnit.MILLISECONDS)) {

    27 return false;

    28 }

    29 }

    30 dvdLock.setReserver(renter);

    31 } finally {

    32 dvdLock.unlock();

    33 }

    34 return true;

    35 }

    ```


    我们首先获取 `masterLock` 上的锁，这允许我们在第 11 行检索特定 UPC 的锁，或者在必要时在第 13 和 14 行创建一个新锁并将其添加到映射中。如果没有这个主锁，另一个线程可能会在我们尝试获取锁的同时修改映射。


    在 JDK 1.4 中，我们现在会遇到一个问题——我们不再需要持有 `masterLock` 上的锁，但如果在获得特定 `dvdLock` 的锁之前释放 `masterLock`，则存在其他线程在我们成功锁定
    `dvdLock` 之前修改它的风险。然而，由于 JDK 1.4 的锁定是基于 `synchronized` 块工作的，因此无法先锁定 `dvdLock`
    再释放 `masterLock`。


    手递手锁定为我们解决了这个问题。在释放 `masterLock` 上的锁之前，我们在第 16 行锁定了 `dvdLock`。此时我们拥有两个锁，但在第 18
    行释放了 `masterLock`，使我们回到只有一个锁的状态。我们从未处于持有零个锁的状态，并且同时持有两个锁的时间被降到了最低。


    当我们执行到第 26 行时，每个客户端将等待其目标锁对应的条件。它们将不再因为*任何*锁被释放而被唤醒。


    这依赖于一个 `LockInformation` 类，如清单 5-4 所示。


