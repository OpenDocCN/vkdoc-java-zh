    **线程安全总结**


    你可以针对本节中出现的任何情况编写代码来应对，但这是错误的方法。最好的做法是避免导致线程不安全的情况。每条规则都有例外，但通常不要嵌套锁，不要依赖线程优先级，并注意竞态条件。本章后面的“线程最佳实践”一节将帮助你减少出现此类问题的可能性。


    **使用线程对象**


    本节包含一些重要的通用信息，你在直接使用线程对象时应牢记。


    **停止、挂起、销毁和恢复**


    你永远不应使用`Thread.stop`、`Thread.suspend`、`Thread.resume`或`Thread.destroy`方法，因为它们已被弃用，且本质上是不安全的。


    `5165CH04.qxd 11/16/05 12:11 PM Page 107`


