    在这种情况下，该记录将被永久锁定——没有其他客户端能够再锁定该记录。


    同样，有许多可能的解决方案，其中一些包括：


    *   使用更瘦的客户端（客户端仅调用服务器上的 `rentDVD` 方法，而服务器同时调用 `reserveDVD` 和 `releaseDVD` 方法）将完全绕过此问题。锁永远不会变得完全不可用。我们建议你参考本章前面关于胖/瘦客户端的部分，以了解其影响（并可能加入
