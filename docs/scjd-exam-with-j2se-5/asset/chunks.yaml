- fmt: 'RMI also relieves you of the responsibility of having to write multithreaded
    servers, which can be tricky. You are still required to write thread-safe code
    in either protocol, but the actual server does not have to spawn threads or manage
    thread pools.


    Thread pooling can provide a significant performance improvement when systems
    are scaled to large numbers of simultaneous users, and RMI provides it for free.
    Yet this comes at a cost: client identification is slightly more complex if you
    cannot use cookies.


    RMI is also extensively used in Enterprise JavaBean (EJB) technology, so learning
    and using RMI for the SCJD assignment will assist you in EJB projects.


    The RMI registry helps you deploy your server side code dynamically—using the
    `Registry` class’s `rebind` method allows you to load the new server functionality
    with a minimum of downtime. With a sockets solution you would either have to stop
    the old server and then start the new server (with a longer downtime than RMI’s
    `rebind`), or use a different socket port (which would require reconfiguring or
    replacing clients).


    Using RMI frees you from the requirements of specifying which port a particular
    service will be available on. With a sockets solution you must specify which port
    your server will be listening on, and the clients must make a connection to that
    port. If you do not make this configurable and some other application is developed
    in such a way that it uses the same port (and is also not configurable), then
    one or the other will have to be recompiled. Even if the port number is reconfigurable
    you would have to reconfigure all the clients to use the new port number, which
    may not be easy or practical. RMI solutions, by default, use random port numbers
    for the servers, where the port number is specified by the RMI registry. The clients
    need only know the port number of the registry, which they then query to determine
    how to contact the server they are interested in.


    Although not permitted within the SCJD assignment, RMI allows you to download
    executable classes. You could use it, for instance, to download some security
    algorithm that will encrypt all the data between clients and server—since the
    code is downloaded dynamically, the programmer for the client side never gets
    to see how you implemented it (indeed, you could even hide the fact that it is
    being used at all), thus reducing the chances of someone trying to hack your encryption
    algorithms if they never get to see them.


    ## Choosing Between the Two Solutions


    Probably by now you have seen that there are good arguments for both solutions,
    and no absolute differentiator between either. We believe that Sun has deliberately
    done this to see your decision-making logic.


    You must decide which of the arguments we’ve listed (or others that you determine
    for yourself ) make the most sense to you, and which of them you are willing to
    defend if you are asked to explain your decision.


    ## The MVC Pattern in the GUI


    Chapter 8 covered GUI-related design decisions ranging from general information
    on interface layout principles all the way to the discussion of specific Swing
    components, such as the `JTable`. Unlike the choice between an RMI and a sockets-based
    network implementation (discussed in Chapters 6 and 7 as well as earlier in this
    chapter), Sun literally requires the use of the `JTable` in order to pass the
    SCJD exam, so the decision to use it is a no-brainer if you want to pass the exam.


    The design decision therefore shifts from what GUI widget is appropriate for use
    in the Denny’s DVDs application to how to properly incorporate the `JTable` into
    a Swing user interface. The solution we suggest in Chapter 8 is the application-level
    use of the MVC design pattern. As you learned in Chapter 8, Swing components,
    such as the `JTree` and the `JTable`, implement the MVC pattern internally, but
    the choice to use the MVC pattern beyond these components is entirely up to the
    developer. The main benefit gained through the use of an application-wide MVC
    architecture is increased abstraction between the data display and the actual
    data implementation. The `JTable` and its own MVC implementation in turn becomes
    a smaller player in the overall application display layer and works in cooperation
    with the application’s MVC implementation.


    ## Locating the Code Samples


    You can find the code samples for this book in the Source Code section of the
    Apress web site (http://www.apress.com). There you will a zip file with the final
    code base (i.e., Denny’s DVDs version 2.0). In this chapter you will be concerned
    with the version 2.0 zip file.


    Unzip the final code base in the location of your choice on your machine. There
    should be one directory, `sampleproject`, which contains four directories: `db`,
    `remote`, `sockets`, and `gui`.


    These directories correspond to four packages:


    - `sampleproject.db`

    - `sampleproject.remote`

    - `sampleproject.sockets`

    - `sampleproject.gui`


    Unless you’ve skipped around quite a bit and started out with Chapter 9, you should
    be very familiar with each of these packages. Once you’ve unzipped all of the
    Java source files into something resembling the preceding directory structure,
    you’re ready to compile the application.


    ## Compiling and Packaging the Application


    Bring up a command prompt and type `java -version`. Make sure that you are using
    J2SE 5 or later (see Figure 9-2). If you aren’t, please download it and install
    it from the Sun J2SE download site (http://java.sun.com/j2se/1.5.0/download.jsp).


    > **Note** The “b05” shown in the version number in Figure 9-2 indicates that
    this is build number 05; it does not imply a beta version of the software.


    ![Image 56](index-321_1.png)


    **Figure 9-2.** *Verify that J2SE 5 is properly installed.*


    Navigate to the root directory of Denny’s DVDs. This is the directory where you
    unzipped the project’s `.java` files. For demonstration purposes, we created a
    directory called `dennysDVDs2.0` and chose that as the root directory.


    > **Tip** Zip files can usually be decompressed with the `jar` executable, as
    shown in Figure 9-3. Both zip files and JAR files use the same compression algorithms.


    Next, you’ll want to compile the `.java` files into a destination directory. By
    default, Java will place the `.class` files in the same directory as the source
    files. Using the Java compiler’s `-d` option allows you to separate the source
    and compiled files. Separating the source and compiled files helps you organize
    your project.


    You need to decide where to direct your `.class` files. For simplicity, we decided
    to place the compiled files in a directory below the root called `classes`. Using
    the command `mkdir classes` from the command prompt will create the necessary
    directory. Or you can add the directory using Windows Explorer.


    Next, compile each package separately using `javac` with the `-d` option set to
    your destination directory. Figure 9-3 illustrates the battery of commands needed
    to successfully compile the sample project. Make sure that you compile the packages
    in this order: `db`, `remote`, `sockets`, and finally `gui`. This order highlights
    the project dependencies. Recall from Chapter 5 that we only had the `db` package.
    We added the other packages as topics were introduced in Chapters 6, 7, and 8,
    respectively.


    ![Image 57](index-322_1.png)'
