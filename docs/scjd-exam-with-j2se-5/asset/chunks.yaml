    Socket 中用于设置和获取此选项的方法如下：

    public int **getSendBufferSize**() throws SocketException

    public void **setSendBufferSize**(int size) throws SocketException


    发送缓冲区大小值决定了在等待另一端应用程序确认收到数据包之前，可以发送多少个数据包。在可靠的网络上，你可以将此值设置得较高，以获得最佳的数据吞吐量。在最坏的情况下，你可以将发送缓冲区设置为与数据包大小相同。在这种情况下，每发送一个数据包，就需要接收一个确认——如果你需要发送
    100 个数据包，就需要接收 100 个确认。与此对比，如果发送缓冲区比数据包大小大 100 倍——发送 100 个数据包时，你只需接收一个确认；完成时间几乎可以缩短一半。


    **使用 SO_RCVBUF**


    此选项类似于用于设置发送缓冲区的 SO_SNDBUF。区别在于，此选项处理的是接收缓冲区。与发送缓冲区选项一样，设置接收缓冲区大小值实际上是对平台的一个提示。要验证缓冲区实际设置的大小，请使用
    getReceiveBufferSize 方法。为了提高高容量套接字连接的性能，请增大接收缓冲区的大小。减小此值可以减少传入积压。


    public void **setReceiveBufferSize**(int size) throws SocketException

    public int **getReceiveBufferSize**() throws SocketException


    **使用 SO_BINDADDR**


    此选项指示套接字绑定的本地地址。此选项是只读的。套接字地址在创建后无法更改，并且必须在构造函数中指定。


    方法签名如下：


    public InetAddress **getLocalAddress**()


    此方法的一个可能用途是，当在具有多个 IP 地址的计算机上运行时（例如，具有多个网卡的服务器、同时具有本地 IP 地址和网络地址的 PC，或同时具有网络地址和虚拟专用网络地址的计算机），确定你绑定到了哪个
    IP 地址。


    **DvdSocketClient**


    关于 DVDSocketClient，有几点需要注意。我们示例项目中的套接字实现默认使用端口 3000。此外，默认情况下，我们使用 localhost 作为主机名。当我们希望在一台机器上以网络模式运行应用程序时（即，当我们无法访问网络时），这非常有用。如果我们在不同的机器上运行应用程序，则必须指定运行套接字服务器的机器的
    IP 地址。


