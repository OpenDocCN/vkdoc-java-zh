  trans: '

    设计决策文档将简要概述你在开发解决方案时做出的*主要*选择，以及你考虑过的替代方案——可能还会解释你为何放弃这些替代方案。


    你无需就你的选择撰写长篇大论——评审者只关心两件事：


    **1.** 你是否考虑过替代方案？


    **2.** 你提交的代码是否是你自己编写的？


    如果你将来成为系统架构师，你需要*了解*实现任何软件目标的多种方法——通常涉及多种架构和语言。作为开发者，你也应该能够在自己的专业领域（J2SE）内考虑并排除替代方案。例如，在可以使用单选按钮或复选框的情况下，你应该能够认识到两种方案都是可行的，并决定哪个是正确的选择（注意，单选按钮和复选框之间的选择*可能*是一个次要决定，或许不值得记录在文档中）。


    5165CH02.qxd 11/16/05 12:09 PM Page 48


    **48**


    第 2 章 ■ 项目分析与设计


    ■**提示** 在可能的情况下，你也应该将设计决策以实现注释的形式放在代码附近。例如，如果你选择了单选按钮而不是复选框，在该按钮的构造函数附近添加一条实现注释，将节省维护你代码的人花时间判断这是否是“正确”选择的时间。


    Sun 面临一项艰巨的任务——他们如何证明*你*提交的作业是*你*自己编写的？流程中的一步是设置多个作业（不同的业务领域），每个作业又有多个版本（需要实现的不同接口），这样你认识的人不太可能恰好和你拿到相同的作业。另一步是检查你在笔试（必须提供身份证明）中填写的信息是否与设计决策文档一致，并且设计决策文档是否描述了代码。


    结合这些措施，Sun 可以相当确信参加考试的人就是编写代码的人。


    在做出设计决策时立即记录下来非常重要。如果你把这个任务留到项目结束时，你将很难记住自己做了哪些选择，更不用说为什么做出这些选择了。


    Javadoc


    一次又一次地证明，如果文档与代码分离，那么它通常不会在代码更新时同步更新，这使其变得毫无用处。


    Javadoc 以及类似的代码文档工具就是为了解决这个问题而设计的。通过将代码文档与代码本身放在一起，在更新代码的同时更新文档就变得容易得多。


    但这依赖于一个主要前提——你在编写和更新代码的同时编写和更新注释。


    如果你等到为期三个月的作业结束时才进行源代码注释，你可能会发现，仅仅为了完成注释，你还需要另外三个月的工作，因为你必须重新阅读所有代码，弄清楚你在做什么，以便为其编写文档。


    用户文档


    在“原型化 GUI”一节中，我们建议在开始项目之前先绘制用户界面的粗略草图。我们提到的一个好处是，你将有一个明确的设计目标，从而降低因实现更简单而最终得到可用性较差的界面的风险。


    在编码之前编写用户文档，你会得到同样的好处：你预先描述了用户界面将要做什么，因此你有了一个明确的目标要实现。


    你心中也有一个明确的终点——当你的用户界面符合你的用户文档时，你就知道用户界面应该可以准备测试了。


    用户文档也是用户在遇到问题或想了解如何执行更高级操作时查阅的地方。不正确或措辞不当的用户文档会让最终用户感到沮丧，并且在你的实际工作中，会让你的支持电话变得比本应更令人烦恼。提前编写文档意味着它不太可能仓促完成，也意味着你在开发过程中更有可能多次回顾并改进它。


    **断言**


    断言是在 JDK 1.4 中引入的，它为开发者提供了一种有用的方式来确认和记录假设，同时不影响应用程序的部署。


    断言的语法如下：


    assert <布尔表达式>;


    或者


    assert <布尔表达式> : <任意语句>; 如果 <布尔表达式> 返回 false，并且在部署时启用了断言检查，则会抛出 AssertionError。


    程序员有时会对程序的两个部分如何交互做出假设——例如，他们可能假设私有方法中某个参数的值永远不会超过某个特定值。然而，如果假设不正确，它引起的问题可能在一段时间内都不会变得明显。在这种情况下，在方法开头包含一条
    assert 语句是值得的，该语句可以在测试时用于确认你的假设，但不会对部署的代码产生任何影响。


    ■**警告** 切勿使用断言来验证公共方法的输入——这些方法可能被其他程序员使用，他们可能不遵守你的要求。无论运行时是否启用断言，你都应该验证这些输入。


    以下是一些示例代码，展示如何验证一个值：


    public class AssertionTest {


    public static void main(String[] args) {


    new AssertionTest(11);


    }


    public AssertionTest(int withdrawalAmount) {


    int balance = reduceBalance(withdrawalAmount);


    // reduceBalance 方法永远不应返回小于零的数字 assert (balance < 0) : "业务规则：余额不能小于 0";


    }


    }


    5165CH02.qxd 11/16/05 12:09 PM Page 50


    **50**


    第 2 章 ■ 项目分析与设计


    ■**注意** 在 JDK 1.4 中，你必须为 Java 编译器指定 -source 1.4 选项才能启用断言的编译。在 JDK 5 中，这不再是必需的。


    默认情况下，断言在运行时是关闭的。这有两个主要好处：


    • AssertionError 是一种 Error，因此你不希望它在生产环境中被抛出。


    • 评估断言中的表达式可能很耗时——默认关闭它可以确保更好的性能。


    ■**警告** 切勿使用断言来执行方法正常工作所需的操作——断言只应验证值是否正确。由于断言通常在运行时关闭，你在断言中执行的任何操作通常不会在运行时执行。


    要在运行时启用断言，你必须指定 -ea 或 -enableassertions 命令行选项。例如：


    java -ea AssertionTest


    如果不使用 -ea 选项，AssertionTest 程序将正常运行而不会出错。使用 -ea 选项，它将抛出 AssertionError。


    断言也可以针对单个类或包启用，方法是在命令行上指定类或包：


    java -ea:<包名> -ea:<类名>


    **日志记录**


    在调试时，了解你是否已到达某个方法，以及某些参数和变量的值是多少，会非常有用。


    在调试器中，你可能会在特定位置设置断点，并对某些变量设置监视。但每次调试程序时都这样做可能会很繁琐。

    '
- fmt: "# 使用日志框架\n\n下一步合乎逻辑的做法可能是在代码中到处添加`System.out.println(...);`语句。通过观察命令窗口中的输出，你可以了解程序的运行情况。然而，对于由他人（你的客户或评估者）部署的代码来说，这并不是一个好主意：往好了说这会分散他们的注意力；往坏了说他们可能会认为这些“正常”的调试消息是错误迹象。此外，任何可能作为服务器应用程序部署的应用程序甚至可能没有用于观察消息的窗口。\n\
    \n而且，如果程序确实出了问题，很难让用户复制正确的消息并发送给你。此外，有些在调试应用程序时希望出现的消息在部署时毫无意义——你希望能够有选择地关闭某些消息。\n\
    \n显然，这个问题已经出现过很多次，并且有一个常见的解决方案：使用日志框架。这样做可以确保我们能够：\n\n- 将日志消息发送到所需位置（文件/屏幕/打印机/无处）\n\
    - 即使应用程序以“服务器”模式运行且没有用于显示消息的窗口，也能记录消息\n- 确保在整个应用程序中以一致的方式进行日志记录\n- 在部署时有选择地打开或关闭整个应用程序的日志记录\n\
    \nJDK 1.4及更高版本提供了用于日志记录的标准API。我们建议你在整个应用程序中，每当考虑向标准输出或错误输出发送内容时，都使用此API。\n\n##\
    \ 使用日志记录器\n\n要使用日志记录器，首先必须获取一个可用的日志记录器实例。日志记录器通常是有名称的（尽管有一个任何人都可以使用的匿名日志记录器），这允许你以不同的方式配置不同的日志记录器。要获取`example.com.testApplication`上下文的日志记录器引用，你可以编写类似这样的代码：\n\
    \n```java\nLogger myLogger = Logger.getLogger(\"example.com.testApplication\"\
    );\n```\n\n所有使用相同名称“获取”日志记录器的类都将获得该日志记录器的同一个实例。这确保了应用于该日志记录器的配置将应用于该日志记录器的所有实例。\n\
    \n> **注意**：日志记录器的名称是分层命名空间的一部分，这意味着`example.com.testApplication`是命名空间`example.com`的子级。我们将在本节后面进一步说明这一点。\n\
    \n## 日志级别\n\n你可以定义消息将被记录的级别。有几个预定义的级别，我们建议你使用它们，而不是定义自己的级别。预定义的级别按从最少日志记录到最多日志记录的顺序显示在表2-10中。\n\
    \n**表2-10.** *预定义的日志级别*\n\n| 日志级别 | 推荐用途 |\n|---------|---------|\n| `Severe`\
    \ | 严重故障 |\n| `Warning` | 潜在问题 |\n| `Info` | 信息性消息 |\n| `Config` | 配置消息 |\n| `Fine`\
    \ | 跟踪（调试）消息 |\n| `Finer` | 相当详细的跟踪消息 |\n| `Finest` | 非常详细的跟踪消息 |\n\n`Logger`类有几个用于记录信息（`Logger.info(<msg>)`）、警告（`Logger.warning(<msg>)`）和严重（`Logger.severe(<msg>)`）消息的实用方法，允许你记录简单的消息，例如：\n\
    \n```java\nmyLogger.severe(\"Sending message to standard error\");\n```\n\n如果你一直在将这些命令放入简单的测试应用程序中，你可能会想知道这有什么大惊小怪的——毕竟，到目前为止，我们还没有做任何不能用`System.out.println(<msg>)`语句完成的事情。但请考虑一下，你可以在应用程序开头附近用一条语句关闭对整个*整个*应用程序的所有日志记录，例如：\n\
    \n```java\nmyLogger.setLevel(Level.OFF);\n```\n\n也就是说，你所有的类都可以在不同级别记录消息，而这一行代码就可以将它们全部关闭——无需去寻找所有那些`System.out.println(<msg>)`语句。\n\
    \n你可能只想在确定日志代码实际会被记录时才执行它。在这种情况下，你可以先调用`isLoggable(<level>)`方法来确定是否应该调用你的（可能降低性能的）日志记录代码。\n\
    \n## 将日志记录到文件\n\n我们之前提到的一个好处是我们可以将消息记录到文件——这是通过`Handler`对象完成的。我们可以用一条简单的命令向日志记录器添加一个简单的文件处理器：\n\
    \n```java\nimport java.util.logging.*;\nimport java.io.IOException;\n\npublic\
    \ class TestLogging {\n    public static void main(String[] args) throws IOException\
    \ {\n        Logger myLogger = Logger.getLogger(\"Test\");\n        myLogger.addHandler(new\
    \ FileHandler(\"temp.log\"));\n        myLogger.severe(\"My program did something\
    \ bad\");\n    }\n}\n```\n\n> **注意**：`FileHandler`类可以处理将日志存储到常见位置（无论操作系统如何），并且可以处理常见问题，例如轮换日志文件。请参阅`FileHandler`的API以了解如何使用这些选项。\n\
    \n运行此示例会产生以下日志消息：\n\n```\nC:\\TEMP> java TestLogging\n11/12/2004 19:22:40 TestLogging\
    \ main\nSEVERE: My program did something bad\n```\n\n> **注意**：你的时间和日期显然会不同。\n\n\
    当前工作目录中还应该有一个`temp.log`文件，其中包含XML格式的日志消息：\n\n```\nC:\\Temp>dir temp.log\n Volume\
    \ in drive C has no label.\n Volume Serial Number is E0F1-2766\n Directory of\
    \ C:\\Temp\n11/12/2004  07:22p                 388 temp.log\n               1\
    \ File(s)            388 bytes\n               0 Dir(s)   2,066,956,288 bytes\
    \ free\n\nC:\\Temp>type temp.log\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
    \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n  <record>\n\
    \    <date>2004-12-11T19:22:40</date>\n    <millis>1102753360550</millis>\n  \
    \  <sequence>0</sequence>\n    <logger>Test</logger>\n    <level>SEVERE</level>\n\
    \    <class>TestLogging</class>\n    <method>main</method>\n    <thread>10</thread>\n\
    \    <message>My program did something bad</message>\n  </record>\n</log>\n```\n\
    \n当你有一个程序来分析日志消息时，你可能会发现这很有用。然而，当你想自己阅读日志消息时，你可能会发现以纯文本形式输出更有益。你可以通过添加`Formatter`来实现这一点。\n\
    \n将代码修改为：\n\n```java\nimport java.util.logging.*;\nimport java.io.IOException;\n\
    \npublic class TestLogging {\n    public static void main(String[] args) throws\
    \ IOException {\n        FileHandler myFileHandler = new FileHandler(\"temp.log\"\
    );\n        myFileHandler.setFormatter(new SimpleFormatter());\n        Logger\
    \ myLogger = Logger.getLogger(\"Test\");\n        myLogger.addHandler(myFileHandler);\n\
    \        myLogger.severe(\"My program did something bad\");\n    }\n}\n```\n\n\
    将在屏幕上产生以下输出：\n\n```\n11/12/2004 19:39:27 Test main\nSEVERE: My program did something\
    \ bad\n```\n\n并且在`temp.log`文件中产生以下输出：\n\n```\n11/12/2004 19:39:27 Test main\n\
    SEVERE: My program did something bad\n```\n\n如果你想要其他形式的输出，可以考虑创建自己的格式化器。`SimpleFormatter`的源代码在JDK源代码中可用，整个格式化器只有80行——创建自己的格式化器很容易。\n\
    \n## 默认行为\n\n你会注意到，到目前为止，日志记录一直输出到屏幕，即使我们没有要求这样做。这是因为默认情况下，每个日志记录器都会结合使用其父级的日志处理器和自己的日志处理器。默认的匿名日志记录器默认会将输出发送到屏幕。也就是说，如果你为`example.com`获取一个日志记录器，并为`example.com`获取另一个日志记录器..."
  raw: 'The next logical step might be to add System.out.println(...); statements
    throughout your code. Watching the output in the command window will then give
    you an idea of what your program is doing. However, this is not a good idea for
    code that someone else (your client or assessor) is deploying: at best it is distracting
    for them; at worst they may assume that the


    “normal” debug messages are signs of an error. In addition, any application that
    may be deployed as a server application may not even have a window in which to
    watch the messages.


    And, if something does go wrong with your program, it can be difficult to get
    the user of the program to copy the correct messages and send them to you. Furthermore,
    some of the messages you want to appear while debugging the application make no
    sense at deploy time—you would want to be able to selectively turn off some of
    the messages.


    5165CH02.qxd 11/16/05 12:09 PM Page 51


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **51**


    Obviously this problem has cropped up many times, and there is a common solution:
    use a logging framework. Doing so ensures that we can


    • Send logging messages to a desired location (file/screen/printer/nowhere)


    • Log messages even if the application is running in “server” mode and does not
    have a window for messages to appear in


    • Ensure that logging is done in a consistent manner throughout the entire application


    • Turn logging on and off selectively throughout the application at deploy time
    JDK 1.4 and later provide a standard API for logging. We recommend that you use
    this API throughout your application whenever you consider sending something to
    the standard or error output.


    To use the logger, you must first get an instance of a logger you can use. Loggers
    are normally named (although there is an anonymous logger that everyone can use),
    allowing you to configure different loggers in different ways. To get a reference
    to the logger for the example.com.testApplication context, you would create code
    similar to this: Logger myLogger = Logger.getLogger("example.com.testApplication");
    All classes that “get” a logger using the same name will get the same instance
    of the logger.


    This ensures that the configuration applied to that logger will apply to all instances
    of that logger.


    ■**Note** The name of the logger is part of a hierarchical namespace, meaning
    that example.com.


    testApplication is a child of the namespace example.com. We will comment further
    on this later in this section.


    You can define the level at which your messages will be logged. There are several
    predefined levels, and we recommend that you use them rather than define your
    own. The predefined levels are shown in Table 2-10 in order from the least amount
    of logging to the most amount of logging.


    **Table 2-10.** *Predefined Logging Levels*


    **Logging Level**


    **Recommended Usage**


    Severe


    Serious failure


    Warning


    Potential problem


    Info


    Informational messages


    Config


    Configuration messages


    Fine


    Tracing (debugging) messages


    Finer


    Fairly detailed tracing messages


    Finest


    Highly detailed tracing messages


    5165CH02.qxd 11/16/05 12:09 PM Page 52


    **52**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    The logger class has several utility methods for logging information (Logger.info(<msg>)),
    warning (Logger.warning(<msg>)), and severe (Logger.severe(<msg>)) messages, allowing
    you to log simple messages, for example:


    myLogger.severe("Sending message to standard error"); If you have been putting
    these commands into simple test applications, you may be wondering what the fuss
    is about—after all, so far we have not done anything that we cannot do with a
    System.out.println(<msg>) statement. But consider that you could turn off all
    logging to your *entire* application with one statement near the start of your
    application, such as myLogger.setLevel(Level.OFF);


    That is, all your classes could be logging messages, at different levels, and
    that one line could turn them all off—no need to go hunting for all those System.out.println(<msg>)
    statements.


    You may want to execute a block of logging code only if you know that it is actually
    going to be logged. In such a case, you can make a call to the isLoggable(<level>)
    method first to determine whether you should call your (potentially performance-reducing)
    logging code.


    One benefit we mentioned earlier was that we could log messages to a file—this
    is done through a Handler object. We can add a simple file handler to our logger
    with one simple command:


    import java.util.logging.*;


    import java.io.IOException;


    public class TestLogging {


    public static void main(String[] args) throws IOException {


    Logger myLogger = Logger.getLogger("Test");


    myLogger.addHandler(new FileHandler("temp.log")); myLogger.severe("My program
    did something bad");


    }


    }


    ■**Note** The FileHandler class can handle storing logs in common locations regardless
    of operating system, and can handle the usual issues such as rotating log files.
    Refer to the API for FileHandler to see how such options can be utilized.


    Running this example produces the following log message: C:\TEMP> java TestLogging


    11/12/2004 19:22:40 TestLogging main


    SEVERE: My program did something bad


    ■**Note** Your time and date will obviously differ.


    5165CH02.qxd 11/16/05 12:09 PM Page 53


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **53**


    There should also be a temp.log file in the current working directory, which contains
    the log message in XML format:


    C:\Temp>dir temp.log


    Volume in drive C has no label.


    Volume Serial Number is E0F1-2766


    Directory of C:\Temp


    11/12/2004 07:22p 388 temp.log


    1 File(s) 388 bytes


    0 Dir(s) 2,066,956,288 bytes free


    C:\Temp>type temp.log


    <?xml version="1.0" encoding="windows-1252" standalone="no"?>


    <!DOCTYPE log SYSTEM "logger.dtd">


    <log>


    <record>


    <date>2004-12-11T19:22:40</date>


    <millis>1102753360550</millis>


    <sequence>0</sequence>


    <logger>Test</logger>


    <level>SEVERE</level>


    <class>TestLogging</class>


    <method>main</method>


    <thread>10</thread>


    <message>My program did something bad</message>


    </record>


    </log>


    When you have a program to analyze your log messages, you may find this useful.
    However, when you want to read the log messages yourself, you may find it more
    beneficial to have the output in plain text. You can do this by adding a Formatter.


    Changing the code to read:


    import java.util.logging.*;


    import java.io.IOException;


    public class TestLogging {


    public static void main(String[] args) throws IOException {


    FileHandler myFileHandler = new FileHandler("temp.log"); myFileHandler.setFormatter(new
    SimpleFormatter());


    Logger myLogger = Logger.getLogger("Test");


    myLogger.addHandler(myFileHandler);


    myLogger.severe("My program did something bad");


    }


    }


    5165CH02.qxd 11/16/05 12:09 PM Page 54


    **54**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    will result in the following output on the screen:


    11/12/2004 19:39:27 Test main


    SEVERE: My program did something bad


    and the following output in the temp.log file:


    11/12/2004 19:39:27 Test main


    SEVERE: My program did something bad


    If you wanted to have some other form of output, consider making your own formatter.


    The source code to SimpleFormatter is available in the JDK sources, and is only
    80 lines for the entire formatter—it would be easy to create your own formatter.


    You will have noticed that logging has so far been going to the screen, even though
    we have not asked for this. This is because by default each logger will use its
    parent’s log handlers in combination with its own. The default anonymous logger
    will, by default, send output to the screen. That is, if you get a logger for
    example.com, and another logger for example.com.'
