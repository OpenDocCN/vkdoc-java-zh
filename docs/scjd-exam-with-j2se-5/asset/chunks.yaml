    **What Is Serialization?**


    So what is serialization, and why would you need it in your program? Let’s consider
    an example.


    Suppose there are two machines on the same network. Machine A sends a message
    to a Java program on machine B; how does machine B receive and understand the
    message? What’s required is a transfer protocol. A *transfer protocol* will flatten
    the data that needs to be transferred by putting it into a format that can be
    sent across a network.


    Part of the process of sending data across a network involves serialization. *Serialization*
    is the process of deconstructing an object into its components of type information
    and state, and then reconstructing a copy of the original object on the receiving
    end by reading in the type information and then the field values. The term often
    used to describe the process of transferring serialized objects across a network
    is *marshaling*. Sometimes the reverse process, restoring the serialized object
    on the other end, is referred to as *demarshaling*, or *unmarshaling*.


    Serialized objects can be persisted to a local file system, courtesy of Java file
    I/O, or sent across a network via a socket. This is accomplished by converting
    the object into a serial stream of bytes, transmitting that stream across a network
    or to a file system, and then reading the persisted byte stream back into memory
    in order to re-create the object graph (see Figure 6-2), which is Java vernacular
    for reconstructing the original object and its state as if nothing ever happened.


    When a byte stream is loaded into memory in the form of an object, it is said
    to be in an *active* state. When that same byte stream is located in a file, rather
    than in a Java Virtual Machine (JVM) memory bank, it is said to be in a *passive*
    state. Keep in mind the notion of an object being in an active or passive state,
    as it will come in handy when we introduce the Activatable interface later in
    this chapter. Let’s discuss the process in a little more detail.


    5165CH06.qxd 11/16/05 12:14 PM Page 165


    C H A P T E R 6 ■ N E T W O R K I N G W I T H R M I **165**


    The first of three steps is converting the object to a serial stream of bytes.
    First, type information gets written as header information to the stream, and
    then state information is written. The state information consists of the values
    of the class members, except for the static and transient members (assuming the
    default serialization mechanism, which does not implement readObject and writeObject;
    this is discussed a bit later in more detail). On the deserialization end, the
    receiving remote object first reads the type information in from the header and
    creates an instance of the class. If the class cannot be located (either locally
    or remotely), then a ClassNotFoundException is raised. Once the class is instantiated,
    the field values are read in from the stream and the values set in the marshaled
    object.


    ■**Note** Serialized objects are a copy of the original, not a reference to them.
    Parameters and return values in RMI are passed by values or copies. An object
    can be referenced on another machine only if the object is a remote object—that
    is, the object is exported via the UnicastRemoteObject.export() method or UnicastRemoteObject
    is extended.


    **Figure 6-2.** *Creating the byte stream from an object graph* **Using the serialver
    Tool**


    Serialization involves implementing the java.io.Serializable interface. This interface
    is of interest because it does not have any methods that require implementing.
    In fact, the main purpose of implementing Serializable is to inform the JVM that
    the object can be serialized.


    Serializable is often referred to as a marker interface. Formally a marker interface
    is an interface, which does not define any methods that a class or subclass would
    be required to implement but rather identifies the object as being of a certain
    type. To determine if a class is serializable, use the tool serialver. To start
    the serialver tool, from the project root enter the following at a command prompt:


    serialver -classpath classes/. -show


    Let’s run the serialver tool on two of our classes, one that is serializable and
    one that is not serializable. We will use the DVD class as our serializable class
    and DvdFileAccess as the class that is not serializable. Figures 6-3 and 6-4 demonstrate
    the use of serialver on our DVD


    and DvdFileAccess classes, respectively.


