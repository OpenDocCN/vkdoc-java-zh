- fmt: '# Vectors vs. ArrayLists


    `Vector` is not superior to `ArrayList`, nor is `ArrayList` superior to `Vector`.
    There are times when you do not need the overhead of synchronization on the `Collection`,
    and there are times when you absolutely must have it. For example, a local method
    variable might as well be an `ArrayList`, because it only exists in the context
    of that particular method; thus, there is no opportunity for any other threads
    to modify it.


    However, where possible we recommend against using the `Vector` class. There is
    the possibility that a junior programmer may incorrectly believe that use of a
    `Vector` is providing thread safety other than what synchronized classes actually
    guarantee. Plus, there is the risk that a later programmer may change the `Vector`
    to some other class, not realizing that a synchronized class was required.


    Synchronized objects have their purpose, as do unsynchronized ones. Part of earning
    your Java developer certification is knowing what those purposes are.


    ## Client Synchronization


    Client synchronization is the process of making sure that no other thread interrupts
    your method while it is mid-stride. For example, while `myVector.add(Object)`
    is a synchronized operation, the internal synchronization of the `Vector` object
    did not guarantee that another thread would not empty the `myVector` before the
    next step of your method executed. Consider the following example:


    ```

    1 public boolean addDVD(DVD dvd ){

    2   for (int i = 0; i < myVector.length(); i++) {

    3     doSomethingWith(myVector.get(i));

    4   }

    5 }

    ```


    While you are guaranteed that line 2 will not be hijacked mid-stride, you are
    not guaranteed that some other thread will not set empty the `myVector` object
    by the time you get to line 3.


    The current thread could slice out between lines 2 and 3, and the thread that
    picks up could just happen to be one that corrupts `myVector`. The chances are
    probably small, but the possibility for mischief does exist.


    Be aware of such risks, even if you decide to accept them: Another thread could
    always slice in between two unsynchronized lines of code even if they’re calls
    to synchronized methods.


    To guarantee exclusivity, you could modify the method in one of two ways. The
    first way is to synchronize the method:


    ```

    1 public synchronized boolean addDVD(DVD dvd ) {

    2   for (int i = 0; i < myVector.length(); i++) {

    3     doSomethingWith(myVector.get(i));

    4   }

    5 }

    ```


    This denies any other threads the capability to call any synchronized methods
    on this particular object until `addDVD` returns. Depending on your class’s structure,
    this may be sufficient.


    The second way is to synchronize on the `myVector` member variable:


    ```

    1 public boolean addDVD(DVD dvd ) {

    2   synchronized (myVector) {

    3     for (int i = 0; i < myVector.length(); i++) {

    4       doSomethingWith(myVector.get(i));

    5     }

    6   }

    7 }

    ```


    This keeps any other method that calls from modifying the `myVector` object for
    the duration of lines 3, 4, 5, and 6. This holds even if your thread slices out
    during those lines.


    As with all exclusivity, this only applies to methods that follow synchronization
    rules. If those methods do not internally synchronize on the `myVector` object,
    then they won’t obey the protocol. Thus, the guarantee of thread safety would
    no longer hold.


    Incidentally, this is a great justification for controlling access to your class’s
    member variables through encapsulation. If all member variables are private, then
    you can control access to sensitive data by synchronizing all the relevant methods.
    This is exactly what the `Vector` object does. Synchronized objects such as `Vector`
    do not synchronize on their internal data state; they synchronize the methods
    used to access that data. Sun recommends and encourages encapsulation. For example,
    it is explicitly evident in JavaBeans.


    ## Multithreading with Swing


    Swing components, by and large, are not thread-safe. Swing uses a single thread
    to deal with UI events from the underlying operating system. That is, in general
    Swing components don’t *need* to be thread-safe as they’re typically accessed
    from only one thread. This means that processing an event, such as a button click,
    will cause other events to be ignored until the first event is finished. Your
    UI could be very unresponsive if the event handler associated with the event is
    long.


    The point here is that your Swing client could become slow if you are doing a
    big operation for a given event. This may be okay on the SCJD exam, but you need
    to be aware of it and document it. If your requirements state that UI responsiveness
    is very important, then you need to think about spawning threads to deal with
    more intensive operations, and that’s when you have to worry about all the thread
    safety concerns, synchronizing as appropriate.


    ### General Principles of Threading with Swing


    Once a Swing component has called `setVisible(true)` or `pack()`, all updates
    should be done via the event dispatcher thread. This helps avoid race conditions
    that can occur as a result of the various requests from the `RepaintManager`.


    In general, you only need to be concerned about threading in your Swing application
    when you are updating your components based on a thread other than the event dispatcher
    thread—specifically, in cases where you need a responsive GUI that cannot wait
    for RMI and/or socket calls across the network.


    You should make sure that you can’t afford to wait for these before you start
    down this path: It’s a long and error-prone approach, and it will probably complicate
    your life unduly as far as the SCJD exam is concerned. If you do decide to take
    this route, execute your lengthier calls through a separate thread, or worker
    thread, and then feed your results back into the GUI using the event dispatcher.
    For an excellent example of this technique, please visit `http://java.sun.com/products/jfc/tsc/articles/threads/threads2.html`.


    > **Caution** You must not use the `SwingWorker` class directly in your assignment.
    The assignment specifies that you are only allowed to submit code you write yourself,
    so submitting the `SwingWorker` class could lead to disqualification. You can,
    however, use the `SwingWorker` class to learn the techniques needed, then make
    your own class(es).


    Remember that calling the various setters on a component is not a thread-safe
    way to get that event into the event-dispatching queue. This process does generate
    events, but the event dispatcher thread does not always handle these.


    ### Updating Components in the Event Dispatcher Thread


    So how do you get your events into the event dispatcher thread? You use the `SwingUtilities.invokeAndWait`
    and `SwingUtilities.invokeLater` methods. The first method, `invokeAndWait`, blocks
    until the event fires. `invokeLater` does not block; it simply adds your code
    to the queue of events to be fired. The parameter to both of these methods is
    a `Runnable` interface. The `run` method of the parameter is then called by the
    event dispatcher.


    ## Threading Best Practices


    Here are some general practices that should help you avoid the dark side of threading:


    - **Don’t nest locks.** If you have two synchronized blocks on two different objects
    in your execution path, you’re probably heading down the wrong road.

    - **Avoid multithreading with Swing, if possible.** It can be argued that multithreading
    activities for distributed calls from a Swing front-end, for example, only offer
    illusionary responsiveness. That is, just because the GUI appears to respond quickly
    doesn’t mean that it actually does so. Do you really want your client to think
    an operation is finished when in fact it isn’t? Does the illusion actually serve
    a useful purpose in your application?'
