- fmt: "# 项目概述\n\n`releaseDVD` — 将增加可用 DVD 的数量。此操作相当于归还租赁。该操作应返回 `true`，表示由 UPC 标识的\
    \ DVD 存在于数据库中且有副本已出租。否则，该操作返回 `false`。\n\n`reserveDVD` — 将减少 DVD 数量，表示有人已租借了一个可用副本。需要一个\
    \ UPC 作为输入参数。如果要预订的 DVD 的 UPC 不存在，则返回 `false`；如果没有更多 DVD 副本可供租赁，也返回 `false`。\n\
    \n`removeDVD` — 将删除匹配 UPC 的 DVD 并返回 `true`。如果在数据库中未找到该 UPC，则不删除任何 DVD，方法返回 `false`。\n\
    \n接口必须有一个 GUI，以允许执行此处列出的每个必需方法。此外，GUI 必须能够连接到网络上的服务器，或在独立模式下工作并连接到本地主机上的服务器。您还必须考虑与并发用户访问和记录锁定相关的设计问题。清单\
    \ 3.1 包含了 `DBClient.java` 接口的代码。\n\n**提示** 在检查可供下载的 Denny's DVDs `DBClient.java`\
    \ 源代码之前，请尝试自己编写该类，并看看您的接口与示例项目中使用的接口有多接近。由于您在实际作业中也会获得该接口，因此此练习仅供娱乐。\n\n**清单 3-1.**\
    \ *DBClient 接口*\n\n```java\npackage sampleproject.db;\n\nimport java.io.*;\nimport\
    \ java.util.regex.*;\nimport java.util.*;\n\n/**\n * An interface implemented\
    \ by classes that provide access to the DVD\n * data store, including DVDDatabase.\n\
    \ *\n * @author Denny's DVDs\n * @version 2.0\n */\npublic interface DBClient\
    \ {\n\n    /**\n     * Adds a DVD to the database or inventory.\n     *\n    \
    \ * @param dvd The DVD item to add to inventory.\n     * @return Indicates the\
    \ success/failure of the add operation.\n     * @throws IOException Indicates\
    \ there is a problem accessing the database.\n     */\n    public boolean addDVD(DVD\
    \ dvd) throws IOException;\n\n    /**\n     * Locates a DVD using the UPC identification\
    \ number.\n     *\n     * @param UPC The UPC of the DVD to locate.\n     * @return\
    \ The DVD object which matches the UPC.\n     * @throws IOException if there is\
    \ a problem accessing the data.\n     */\n    public DVD getDVD(String UPC) throws\
    \ IOException;\n\n    /**\n     * Changes existing information of a DVD item.\n\
    \     * Modifications can occur on any of the attributes of DVD except UPC.\n\
    \     * The UPC is used to identify the DVD to be modified.\n     *\n     * @param\
    \ dvd The DVD to modify.\n     * @return Returns true if the DVD was found and\
    \ modified.\n     * @throws IOException Indicates there is a problem accessing\
    \ the data.\n     */\n    public boolean modifyDVD(DVD dvd) throws IOException;\n\
    \n    /**\n     * Removes DVDs from inventory using the unique UPC.\n     *\n\
    \     * @param UPC The UPC or key of the DVD to be removed.\n     * @return Returns\
    \ true if the UPC was found and the DVD was removed.\n     * @throws IOException\
    \ Indicates there is a problem accessing the data.\n     */\n    public boolean\
    \ removeDVD(String UPC) throws IOException;\n\n    /**\n     * Gets the store's\
    \ inventory.\n     * All of the DVDs in the system.\n     *\n     * @return A\
    \ List containing all found DVD's.\n     * @throws IOException Indicates there\
    \ is a problem accessing the data.\n     */\n    public List<DVD> getDVDs() throws\
    \ IOException;\n\n    /**\n     * A properly formatted <code>String</code> expressions\
    \ returns all\n     * matching DVD items. The <code>String</code> must be formatted\
    \ as a\n     * regular expression.\n     *\n     * @param query The formatted\
    \ regular expression used as the search\n     *              criteria.\n     *\
    \ @return The list of DVDs that match the query. Can be an empty\n     *     \
    \    Collection.\n     * @throws IOException Indicates there is a problem accessing\
    \ the data.\n     * @throws PatternSyntaxException Indicates there is a syntax\
    \ problem in\n     *                                the regular expression.\n\
    \     */\n    public Collection<DVD> findDVD(String query)\n            throws\
    \ IOException, PatternSyntaxException;\n\n    /**\n     * Lock the requested DVD.\
    \ This method blocks until the lock succeeds,\n     * or for a maximum of 5 seconds,\
    \ whichever comes first.\n     *\n     * @param UPC The UPC of the DVD to reserve\n\
    \     * @throws InterruptedException Indicates the thread is interrupted.\n  \
    \   * @throws IOException on any network problem\n     */\n    boolean reserveDVD(String\
    \ UPC) throws IOException, InterruptedException;\n\n    /**\n     * Unlock the\
    \ requested record. Ignored if the caller does not have\n     * a current lock\
    \ on the requested record.\n     *\n     * @param UPC The UPC of the DVD to release\n\
    \     * @throws IOException on any network problem\n     */\n    void releaseDVD(String\
    \ UPC) throws IOException;\n}\n```\n\n**注意** 示例项目不是一个功能齐全的电子商务系统。相反，将其视为一个程序，用于演示成功完成\
    \ SCJD 考试项目部分所需的概念。\n\n## 应用程序概述\n\n那么，接下来呢？在本节中，我们将介绍新系统的概述，并描述成功实现示例项目所需的步骤。\n\
    \n从架构上讲，该应用程序是一个传统的客户端-服务器系统，由三个关键部分组成：具有网络服务器功能的服务器端数据库、客户端 GUI 以及代表用户界面处理网络通信的客户端数据库接口。\n\
    \n图 3-2 显示了新系统的高级概述。\n\n**图 3-2.** *Denny's DVDs 系统概述*\n\n用户，即 Denny's 的员工，必须能够执行以下操作：\n\
    \n- 通过 GUI 界面执行 `DbClient.java` 中定义的操作。\n- 实现对集中式 DVD 数据库的多用户网络访问。\n- 通过 RMI 或套接字允许网络访问。\n\
    - 使数据库实现线程安全（多用户网络访问的隐含要求）。\n\n**提示** 在可供下载的源代码中包含了一个 `DOSClient.java` 类。这是一个有用的命令行程序，随本书第一版提供下载，但由于认证项目格式的近期更改，在\
    \ Denny's DVDs 的第二版中不再需要。尽管我们在本书中不讨论 `DOSClient.java`，但我们仍将其包含在内，以方便下载代码的人。将 `DOSClient.java`\
    \ 视为 GUI 工具的简化命令行版本。\n\n## 创建 GUI\n\nGUI 必须允许员工查看 DVD 信息，例如 UPC、标题、租赁状态、导演、演员、女演员、作曲家和商店副本数量。GUI\
    \ 还必须允许员工对这些 DVD 属性中的任何一个进行搜索。这些属性列在图 3-3 的类图中。GUI 应为用户提供连接到本地数据库或通过网络连接的选项。它不需要考虑任何安全功能，例如身份验证和登录。由于\
    \ SCJD 考试目前要求使用 Swing 作为 GUI，您也将使用 Swing 来构建项目的 GUI。\n\n**注意** Swing 是构建在抽象窗口工具包（AWT）之上的\
    \ Sun 技术。AWT 是 Java 基础类（JFC）的一部分。对于程序员级别的认证，不再需要了解 AWT，并且直接理解 Swing 如何利用 AWT 对于开发人员认证来说也不是必需的。\n\
    \n**图 3-3.** *类图*\n\n## 数据库系统的网络服务器功能\n\nDenny's 租赁跟踪系统的 1.0 版本可以在本地或通过网络运行。\n\
    \n在本地模式下，GUI 仅当数据库位于同一台机器上时才会连接到它。"
