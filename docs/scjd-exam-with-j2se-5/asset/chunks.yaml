    ■**注意** 在清单 4-1 中，第 41 行集合线程调用的是 `notify` 还是 `notifyAll` 其实无关紧要——无论哪种调用都会唤醒部长线程。由于只有一个线程在等待条件（募捐盘中的金额）发生变化，我们选择了调用
    `notify`。如果有多个线程在等待不同条件的变化，那么调用 `notifyAll` 会更合理。


    5165CH04.qxd 11/16/05 12:11 PM 第 77 页


    第 4 章 ■ 线程


    **77**


    或者想象一个生产者/消费者关系：一个线程填充某个对象，另一个线程在该对象被填充后消费它。在这种情况下，消费者线程希望对象被修改；因此，消费者想知道修改何时发生。


    `Object.wait`、`Object.notify` 和 `Object.notifyAll` 支持后一种等待方式。


    调用 `wait` 方法与调用 `sleep` 或 `yield`，甚至因 I/O 而暂停是不同的。


    `wait` 方法实际上允许其他线程获取所讨论对象的锁，而 `sleep`、`yield` 和因 I/O 暂停则不会。


    ■**注意** `wait` 和 `notify`/`notifyAll` 方法几乎总是成对出现。如果一个线程在等待，就应该有另一个线程能够调用 `notify`
    或 `notifyAll`。唯一的例外是当你使用超时机制并需要释放锁时——但这种情况非常罕见。如果没有对 `wait` 方法的调用，那么完全没有理由调用 `notify`
    或 `notifyAll`。


    **让步**


    *让步* 是指在保持自身资源的同时，礼貌地让出自己在队列中的位置。例如，假设你正在使用银行的自动柜员机（ATM）。你知道这个过程会花一些时间，因为你要转账、查询余额、存款等等。让步就是主动邀请你后面的人在你之前使用
    ATM。当然，你不会把资源（钱、ATM 卡等）交给那个人。但你会主动让出你在 ATM 前的位置（类似于 CPU）。做出这种邀请的过程，即使没有人接受，也叫做让步。


    即使你让步了，你仍有可能获得优先访问权。在我们的 ATM 场景中，你后面的人可能太客气而不愿接受你的好意。但在计算机术语中，当你让步时，所有线程（包括你自己的线程）都会竞争对象的锁——你的线程获得对象锁的机会并不会因此变少或变多。那么，是什么决定了哪个线程最终赢得竞争并获得对象的锁呢？是线程调度器。


    *线程调度器* 就像一个办公室经理。它会考虑所有线程，并根据底层操作系统、线程优先级和其他因素来决定哪个线程应该被允许运行。


    有两点需要注意。首先，你必须意识到，当你让步时，即使你原本自愿放弃 CPU，也不能保证你的执行线程会成为下一个获得 CPU 的线程。一旦一个线程让步，CPU
    被另一个线程占用，原先让步的线程在排队顺序上没有任何特殊地位。它必须像其他所有线程一样等待和期盼。


    其次，重要的是要认识到，你的线程并没有放弃它拥有独占锁的资源。也就是说，即使你让别人使用 ATM，你也没有把你的 ATM 卡给他。当一个线程让步时，它会退出
    CPU，但它仍然保留对最初标记为独占使用的任何资源的控制权。


    那么为什么要让步呢？想象一下，你的线程需要执行六项小型银行操作：查询余额、将资金从支票账户转到日常账户、查询余额、将资金从储蓄账户转到日常账户、查询余额，最后取款。你让步给的那个线程可能只是将欠你的钱存入你的日常账户，这样你的那些财务操作就变得多余，从而无需继续执行。如果你的线程没有让步，它可能要在完成所有六项银行操作之后才能收到这笔钱。如果你的线程正在执行一个耗时或开销较大的操作，偶尔让步是一个好主意。


    ■**警告** 你不应该依赖线程优先级，进而依赖让步，来解决你的线程问题。线程调度（包括让步）的实现完全取决于 JVM 制造商。


    因此，不同的操作系统，甚至同一操作系统上的两个不同 JVM，处理让步的方式可能不同。所以，你可以在程序中放心地使用让步，但永远不要指望让步一定会实际发生。


    **阻塞**


    *阻塞* 是指暂停执行直到某个锁可用。如果你的线程试图获取另一个线程已经拥有的锁，那么它将会阻塞，直到那个线程释放它的锁。这仅仅意味着线程进入休眠状态，直到事件发生。在这种情况下，锁变为可用就是那个事件。


    这对其他线程意味着什么？这意味着它们可以自由使用阻塞线程有权使用但并未使用的 CPU 周期。然而，阻塞线程仍然保持对任何它已显式锁定的其他资源的独占控制。此外，其他线程应该随时准备好阻塞线程可能重新开始执行，因为触发它的事件随时可能发生。


    ■**注意** JVM 会为你处理线程从 `Thread.State.BLOCKED` 状态到 `Thread.State.RUNNABLE` 状态的转换。你无需在代码中做任何特殊处理来告知其他线程你即将释放某个对象的锁。


    **休眠**


    *休眠* 是指等待至少一段指定时间的操作。想象一下，你正在使用 ATM，但屏幕上显示一条消息，告诉你系统繁忙。你可能会决定放弃 5 分钟，等这段时间过去后再回来尝试使用。这个操作使得
    ATM 至少在接下来的 5 分钟内空闲。这段时间过后，你走回 ATM 并加入等待使用的队列。


    ■**注意** 一个休眠的线程保证至少等待指定的时间。然而，它可能会等待更长时间，这取决于线程调度器的随意决定。


    5165CH04.qxd 11/16/05 12:11 PM 第 79 页


    第 4 章 ■ 线程


    **79**


    休眠和让步的区别在于，让步的线程永远不知道等待时间会多短或多长。而休眠的线程则始终知道它将至少等待指定的时间。


    **Child.java 示例**


    这个示例可能比你在 SCJD 考试中需要处理的任何内容都要复杂，但它很好地说明了等待机制。仔细研究它，你就不会被 SCJD 考试中的线程要求所压倒。


    本示例的前 41 行非常直接。创建了一个 `IceCreamMan` 对象，它运行在自己的线程中，并进入一个循环，等待客户将 `IceCreamDish`
    对象递给他。`IceCreamMan` 是一个静态对象，这确保了在我们的示例中，所有孩子共享的唯一一个 `IceCreamMan`。


    在第 15 行，我们将 `IceCreamMan` 线程设置为守护线程。如果唯一仍在运行的线程是守护线程，JVM 将会退出。在本示例中，我们显式创建了几个非守护线程：每个孩子对应三个线程。此外，还有一个为我们创建的非守护线程：主线程。当这四个线程完成后，我们*显式*创建的仍在运行的唯一线程将是
    `IceCreamMan` 守护线程，因此程序将终止。

