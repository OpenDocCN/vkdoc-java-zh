    **问** 如何将窗口在屏幕上居中？


    **答** 要将窗口在屏幕上居中，请从 `java.awt.Toolkit.getDefaultToolkit().getScreenSize()` 方法获取窗口尺寸。使用返回的
    `Dimension` 计算屏幕的垂直和水平中心，同时考虑你想要居中的窗口的尺寸。最后，将窗口放置在该位置，如下面的代码片段所示，用于居中我们的 `connectionDialog`
    对象：


    ```java

    // 在屏幕上居中

    Dimension d = Toolkit.getDefaultToolkit().getScreenSize(); int x = (int) ((d.getWidth()
    - connectionDialog.getWidth())/ 2); int y = (int) ((d.getHeight() - connectionDialog.getHeight())/
    2); dialog.setLocation(x, y);

    ```


    **问** 如何为我的 GUI 组件创建键盘快捷键？


    **答** 你可以通过 `setMnemonic(int keyValue)` 方法为几乎任何组件添加快捷键。预定义的键值列表位于 `KeyEvent` 类中。


    **问** 我可以在 Windows 操作系统上使用 Macintosh 外观，或者反过来吗？

