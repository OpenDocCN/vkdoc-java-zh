    35 }


    We start by getting a lock on the masterLock, which allows us to retrieve the
    lock for our specific UPC at line 11 or create a new lock and add it to the map
    if necessary at lines 13 and 14\. Without this master lock, another thread could
    be modifying the map while we are trying to get our lock.


