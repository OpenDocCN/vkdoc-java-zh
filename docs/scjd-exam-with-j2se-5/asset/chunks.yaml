- fmt: '参考以下关于`@see`和`@link`标签的注释，了解特殊说明。标签将以等宽字体显示。


    `{@linkplain *reference label*}`


    与`{@link}`标签相同，但标签将以标准字体显示。


    `{@docRoot}`


    指向生成的 Javadoc 的基目录（即`index.html`文件所在的位置）。无论此标签在目录结构中嵌套多深，该路径都是正确的。


    字段的 Javadoc 标签如表 2-6 所示。


    **表 2-6.** *字段标签*


    | 标签 | 描述 |

    | :--- | :--- |

    | `@see` | 生成指向指定类或方法的链接——该链接将出现在生成的 Javadoc 的“另请参阅”部分。 |

    | `@since` | 用于指示此字段首次出现的包版本号。 |

    | `@serial` | 用于指定通常可序列化的类或字段是否应被记录为可序列化。 |

    | `@deprecated` | 用于指示某个字段不应再使用，但出于兼容性原因仍然存在。该标签后应跟有文本，指示用户应使用哪个字段或方法代替此字段，如果没有具有替代功能的字段，则使用“无替代”。
    |

    | `{@link *reference label*}` | 生成指向指定类、方法或字段的内联链接。标签将以等宽字体显示。 |

    | `{@linkplain *reference label*}` | 与`{@link}`标签相同，但标签将以标准字体显示。 |

    | `{@docRoot}` | 指向生成的 Javadoc 的基目录（即`index.html`文件所在的位置）。无论此标签在目录结构中嵌套多深，该路径都是正确的。
    |

    | `{@value}` | 显示指定常量的值。 |


    构造函数和方法的 Javadoc 标签如表 2-7 所示。


    **表 2-7.** *构造函数和方法标签*


    | 标签 | 描述 |

    | :--- | :--- |

    | `@param` | 描述方法签名中的参数。每个参数应单独一行描述，列表顺序与方法签名中的参数顺序相同。 |

    | `@return` | 描述方法返回的值或对象。 |

    | `@exception` | 描述可能从此方法抛出的异常。（`@throws`是 Javadoc 1.2 中添加的同义词。） |

    | `@see` | 生成指向指定类、方法或字段的链接——该链接将出现在生成的 Javadoc 的“另请参阅”部分。 |

    | `@since` | 用于指示此构造函数或方法首次出现的包版本号。 |

    | `@deprecated` | 用于指示某个构造函数或方法不应再使用，但出于兼容性原因仍然存在。该标签后应跟有文本，指示用户应使用哪个构造函数或方法代替此构造函数或方法，如果没有具有替代功能的构造函数或方法，则使用“无替代”。
    |

    | `{@link *reference label*}` | 生成指向指定类、方法或字段的内联链接。标签将以等宽字体显示。 |

    | `{@linkplain *reference label*}` | 与`{@link}`标签相同，但标签将以标准字体显示。 |

    | `{@docRoot}` | 指向生成的 Javadoc 的基目录（即`index.html`文件所在的位置）。无论此标签在目录结构中嵌套多深，该路径都是正确的。
    |


    `@see`和`@link`标签将创建指向第一个匹配的类、字段或方法的超链接。


    当引用当前类中的方法或字段时，无需指定类名；同样，当引用同一包中的类时，也无需指定包名。最后，除非您想引用特定的重载方法，否则无需指定方法参数。一些示例如表
    2-8 所示。


    **表 2-8.** *`@see`链接示例*


    | 示例 | 注释 |

    | :--- | :--- |

    | `@see #field label` | 创建指向指定字段的链接，并赋予给定的标签。 |

    | `@see #method label` | 创建指向第一个匹配方法的链接，并为该链接指定标签。 |

    | `@see #method (parameters) label` | 创建指向指定参数列表的方法的链接，并赋予给定的标签。 |'
