- fmt: "# Method Naming Conventions\n\nIt is very common to combine several words\
    \ to give more information on what the method does. For instance, using the method\
    \ name `getLeadActor` makes it far more explicit when *using* this method that\
    \ we are specifically retrieving the lead actor’s name (and not the name of some\
    \ other person associated with this DVD). As can be seen in this example, CamelCase\
    \ is used when combining words.\n\n## Variable Naming Conventions\n\nVariable\
    \ names should always start with a lowercase letter, should be short, and should\
    \ describe what data is stored in the variable. For example, within our DVD class,\
    \ the variable name `leadActor` would contain the names of the lead actor of the\
    \ film on DVD.\n\nAgain, it is very common to combine several words to provide\
    \ more information on what the variable does. As you can see in this example,\
    \ CamelCase is used when combining words.\n\n> **Note** The Sun Coding Conventions\
    \ specify that you should apply the same naming convention to all instance, class,\
    \ and local variables. Be aware that you may see code written by other coders\
    \ where instance or class variables are signified by an underscore or some other\
    \ special mark. Another way to achieve the same effect is by using the convention\
    \ `variable` when referring to a local variable, `this.variable` when referring\
    \ to an instance variable, and `Class.variable` when referring to a class variable.\
    \ Doing so makes it explicit which type of variable you are referring to.\n\n\
    ## Constant Naming Conventions\n\nConstants are always written in all capital\
    \ letters, with individual words separated by underscores. An example might be\
    \ the constant `DIRECTOR_LENGTH`, which would be set to the maximum size of the\
    \ director’s name stored in our database.\n\n## File Layout\n\nA Java class or\
    \ interface always consists of the following standard layout:\n\n1. Beginning\
    \ comments\n2. Package and import statements\n3. Class or interface declarations\n\
