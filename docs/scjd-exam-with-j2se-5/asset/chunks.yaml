- fmt: "- 对于提供长时间服务的线程，偶尔让出（`yield`）是一个好主意。例如，如果你的线程正在启动一个耗时过程，但用户想要取消，那么取消事件可能在线程停止执行之前无法被读取。通过偶尔让出，你为其他线程提供了在你线程执行状态合适的时机切入的机会。最好在让出之前释放所有锁。\n\
    - 不需要同步那些不使用类中状态信息的方法。如果你的方法不使用内部成员变量、不修改外部对象、也不修改作为参数传入的对象，就不要同步它。\n- 不要过度同步。确保你确切知道你的方法或数据结构为何被同步。如果你无法向自己清晰地阐述同步的必要性，你可能应该重新审视最初的需求。\n\
    - 不可变对象（如`String`和`Integer`）永远不需要同步。这甚至适用于成员变量，因为不可变对象不能被修改。然而，如果一个引用不可变对象的成员变量本身是可变的，那么它可能仍然需要同步。\n\
    - 不要不必要地使用多线程。除非你的线程做了大量阻塞操作，否则单线程通常更快。\n- 在使用`Swing`时，可以随意创建组件并将其插入到任何尚未被实现的容器中。一个组件被实现意味着它能够接收绘制或验证事件——这发生在对该组件调用`show()`、`setVisible(true)`或`pack()`之前。\n\
    - 不要被内部同步的类（如`Vector`）搞糊涂。内部同步的类仅保证其操作是原子性的。这意味着如果一个线程执行`myVector.add(\"test\"\
    )`，而另一个线程切入并执行`myVector.contains(\"test\")`，它将返回`true`。这种行为在例如`ArrayList`上是不保证的。你通常需要使用同步方法来与这些变量交互。\n\
    - 尽量最小化在同步块内执行的操作，因为在同步期间，没有其他线程能够获取你的代码所同步的锁，从而降低了并发性。\n- 避免依赖线程优先级作为线程控制机制。不同的操作系统使用不同的算法来处理线程优先级，不同的`JVM`也使用不同的算法。这可能导致你的程序在不同平台上的行为差异巨大。你最好的选择是避免线程优先级带来的歧义，尤其是在`SCJD`考试中。\n\
    - 不要同步你的线程的`run()`方法。同步线程的`run()`方法可能导致许多复杂问题，这是一个坏主意。\n- 如果你在同步代码块中检查一个条件，请使用`while`循环而不是`if`语句。如果你的线程在执行`if`语句的中间被切出，那么当它切回时，它将从离开的地方继续执行。反直觉的是，这不是一件好事，因为当你的线程被切出时条件为真，但可能因为另一个线程改变了它而不再为真。\n\
    - 另一方面，`while`循环在线程退出代码块之前会被重新检查。因此，相关的状态变化会被检测到。以下代码片段展示了这种技术的一个例子：\n```\nsynchronized\
    \ (lockedRecords) {\n    while (lockedRecords.contains(upc)) {\n        lockedRecords.wait();\n\
    \    }\n    //do stuff\n    lockedRecords.notifyAll();\n}\n```\n- 使用`notifyAll()`而不是`notify()`。`notify()`只唤醒一个等待的线程，而`notifyAll()`唤醒所有等待的线程。\n\
    \n**总结**\n\n在本章中，我们讨论了在使用线程时可用的一些可能性，并指出了一些需要避免的问题点。我们讨论了安全线程问题、线程与`Swing`、阻塞、等待以及其他一系列主题。\n\
    \n理解线程的最佳方式是设计你的线程方案，预测它将如何运行，然后使用`Thread`类中的便捷方法`holdsLock(Object)`来测试这些预测。`Thread`的`getState()`和`getStackTrace()`方法对于检查另一个线程正在做什么非常有用。如果你的线程没有按照你预期的方式运行，请明确记录你的假设（我们建议写下来），然后逐一检查它们。线程很像语法：有很多规则，但最终你会培养出一种对什么可行、什么不可行的直觉。（至少别人是这么告诉我的。）在阅读后续章节时，如果需要，请随时回顾本章。\n\
    \n**常见问题解答**\n\n**问** 当一个同步块/方法调用一个非同步块/方法时会发生什么？\n\n**答** 非同步块/方法会被当作同步的来处理。\n\
    \n**问** 当一个同步块/方法在同一个对象内调用另一个同步块/方法时会发生什么？\n\n**答** 如果两个方法都在同一个对象上同步，那么对你来说不会发生什么异常情况——没有双重同步或死锁风险。线程会在该对象上获取一个额外的锁，当锁被释放时，这个额外的锁也会随之消失。\n\
    \n**问** 锁定一个对象会锁定它所有的内部变量吗？\n\n**答** 不，绝对不会。这样做会给`JVM`带来巨大的负担，因为它会锁定所有内部对象，然后依次锁定成员变量的内部对象，依此类推。`Java`假设你理解这一点，并且你只锁定你打算锁定的内容。\n\
    \n**问** 同步方法比非同步方法慢多少？\n\n**答** 很难说，但非科学测试表明，根据争用情况，同步方法的速度可能是非同步方法的1.5到150倍。非争用同步对时间的影响可能可以忽略不计。\n\
    \n**问** 可以同步数据吗？\n\n**答** 不，你只能同步对数据的访问。\n\n**问** `Vector`不是同步的数据吗？\n\n**答** 不，`Vector`提供了访问其数据的同步方法。这是一个重要的区别。\n\
    \n**问** 同步静态成员变量和同步局部成员变量有什么区别？\n\n**答** 实际上没有区别。你仍然是在获取一个对象上的锁。但是，通过同步静态成员变量，该锁可以在多个共享该静态对象作为类成员变量的对象之间共享。\n\
    \n**问** 当人们说一个对象（如`Vector`）是同步的，这意味着什么？\n\n**答** 这意味着该对象的所有公共方法在访问共享数据时都是同步的。通常，这意味着在该对象上调用一个方法是一个原子操作。任何其他线程调用该对象上的方法都将被阻塞，直到你的线程完成对该对象的操作。\n\
    \n**问** 当一个方法同步一个成员变量，而另一个方法同步`this`关键字，并且这两个方法需要交互时，会发生什么？\n\n**答** 那么你是在两个不同的对象上获取两个锁——即`this`和该成员变量——并且需要非常小心。否则，你将为死锁打开大门。你应该仔细考虑是否真的需要这样做，或者是否可以只同步一个对象。\n\
    \n**问** 线程死亡后，如何重新启动它？\n\n**答** 你不能。你必须创建一个新线程。\n\n**问** 大多数示例都显示主应用程序隐式地等待所有创建的线程完成后再退出。有没有一种方法可以在不等待线程完成的情况下退出程序？"
  raw: '• For threads that are providing lengthy services, it’s a good idea to yield
    occasionally. For example, if your thread is starting a lengthy process but the
    user wants to cancel, that canceling event might not get read until your thread
    stops executing. By yielding occasionally, you give other threads a chance to
    slice in at a time that is opportune for your thread’s execution state. It’s best
    to release any locks before yielding.


    5165CH04.qxd 11/16/05 12:11 PM Page 115


    C H A P T E R 4 ■ T H R E A D I N G


    **115**


    • There’s no need to synchronize methods that don’t use state information in the
    class. If your method doesn’t use internal member variables, doesn’t modify an
    external object, and doesn’t modify an object that was passed in as a parameter,
    don’t synchronize it.


    • Don’t oversynchronize. Make sure you know exactly why your method or data structure
    is synchronized. If you can’t articulate the need for synchronization to your
    own satis-faction, you probably should reexamine the original need.


    • Immutable objects, such as Strings and Integers, never need synchronization.
    This applies even to member variables, because immutable objects can’t be modified.


    However, a member variable referring to an immutable object may still need synchronization
    if the member variable itself is mutable.


    • Don’t multithread needlessly. Unless your threads are doing a lot of blocking,
    single threading is often faster.


    • When working with Swing, feel free to create and insert components into any
    container that hasn’t been realized yet. To be realized, a component must be able
    to receive paint or validation events—this means before show, setVisible(true),
    or pack has been called on the component.


    • Don’t get confused by internally synchronized classes such as Vector. All an
    internally synchronized class promises is to perform its actions atomically. This
    means that if one thread code executes myVector.add("test"), and another thread
    slices in, if that new thread executes myVector.contains("test") it will return
    true. This behavior is not guaranteed with, say, an ArrayList. You will usually
    need to use synchronized methods to interact with these variables.


    • Try to minimize actions performed within your synchronized blocks, since no
    other thread will be able to obtain the lock your code is synchronized on for
    the duration, thus reducing concurrency.


    • Avoid depending on thread priority as a mechanism of thread control. Different
    operating systems use distinct algorithms to deal with thread priority, and different
    JVMs use different algorithms still. This could lead to your program acting wildly
    different from one platform to the next. You best bet is to avoid the ambiguity
    of thread priorities, especially where the SCJD exam is concerned.


    • Don’t synchronize your thread’s run method. Synchronizing your thread’s run
    method can lead to a lot of complications, and it’s a bad idea.


    • If you are checking a condition in a synchronized block of code, use a while
    loop and not an if statement. If your thread slices out in the middle of executing
    your if statement, then the thread will resume exactly where it left off when
    it slices back in.


    Counterintuitively, this is not a good thing, because the condition that was true
    when your thread sliced out might no longer be true, because another thread could
    have changed it.


    5165CH04.qxd 11/16/05 12:11 PM Page 116


    **116**


    C H A P T E R 4 ■ T H R E A D I N G


    • While loops, on the other hand, are re-checked before your thread exits the
    block. Thus, relevant state changes will be detected. The following snippet shows
    an example of this technique:


    synchronized (lockedRecords) {


    while (lockedRecords.contains(upc)) {


    lockedRecords.wait();


    }


    //do stuff


    lockedRecords.notifyAll();


    }


    • Use notifyAll instead of notify. notify only wakes a single waiting thread,
    while notifyAll wakes all waiting threads.


    **Summary**


    In this chapter, we discussed some of the possibilities available to you when
    using threads, and we pointed out some trouble spots to avoid. We discussed safe
    threading issues, threads and Swing, blocking, waiting, and a host of other topics.


    The best way to understand threading is to design your threading scheme, make
    predictions about how it will function, and then test those predictions with the
    handy method in the Thread class, holdsLock(Object). Thread’s getState() and getStackTrace()
    methods can be very handy for checking what another thread is doing. If your threads
    aren’t behaving the way you expected them to, explicitly record your assumptions
    (we suggest writing them down) and then examine them one by one. Threading is
    a lot like grammar: There are a lot of rules, but eventually you develop a sense
    for what works and what doesn’t. (Or so I’m told.) As you read the next chapters,
    please don''t hesitate to refer back to this chapter when needed.


    **FAQs**


    **Q** What happens when a synchronized block/method calls an unsynchronized one?


    **A** The unsynchronized block/method is treated as if it was synchronized.


    **Q** What happens when a synchronized block/method calls a synchronized one within
    the same object?


    **A** If both methods are synchronizing on the same object, then nothing unusual
    happens as far as you’re concerned—there’s no double synchronization or risk of
    deadlock. The thread acquires an extra lock on the object, which in turn dissipates
    when the lock is released.


    **Q** Does locking an object lock all of its internal variables?


    **A** No, absolutely not. Doing so would place a tremendous burden on the JVM,
    because it would lock all their internal objects, and then the internal object
    of member variables in turn, and so on. Java assumes that you understand this,
    and that you are only locking what you mean to lock.


    5165CH04.qxd 11/16/05 12:11 PM Page 117


    C H A P T E R 4 ■ T H R E A D I N G


    **117**


    **Q** How much slower is a synchronized method than an unsynchronized one?


    **A** It’s difficult to say, but unscientific tests seem to indicate that a synchronized
    method is anywhere from 1.5 to 150 times slower than an unsynchronized method,
    depending on contention. Noncontended synchronization may have negligible impact
    on time.


    **Q** Can you synchronize data?


    **A** No, you can only synchronize access to data.


    **Q** Aren’t vectors synchronized data?


    **A** No, vectors provide synchronized methods that access their data. It’s an
    important difference.


    **Q** What’s the difference between synchronizing on a static member variable
    and a local one?


    **A** There’s no difference, really. You’re still obtaining a lock on an object.
    But by synchronizing on a static member variable, the lock can be shared across
    multiple objects who share that static object as a class member variable.


    **Q** What does it mean when people say that an object, such as a Vector, is synchronized?


    **A** It means that all public methods of that object are synchronized when they
    access shared data. Generally, it means that calling a method on that object is
    an atomic action. Any other thread calling a method on that object will block
    until your thread completes its operation on that object.


    **Q** What happens when one method synchronizes on a member variable, and another
    synchronizes on the this keyword, and the two have to interact?


    **A** Then you are acquiring two locks on two distinct objects—namely this and
    the member variable—and it is very important to be careful. Otherwise, you are
    opening the door to deadlock. You should consider carefully whether you really
    need to do this, or whether you can synchronize on the one object.


    **Q** How can I restart a thread after it has died?


    **A** You can’t. You will have to create a new thread.


    **Q** Most of the examples provided show the main application implicitly waiting
    until all the created threads had finished before exiting. Is there a way of exiting
    the program without waiting for a thread to complete?'
