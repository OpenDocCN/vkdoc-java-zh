    ■**注意** 本章仅作为线程的入门介绍。若想深入理解线程，我们推荐艾伦·霍鲁布（Allen Holub）的佳作《驯服 Java 线程》（Apress, 2000
    年出版）。


    **线程基础**


    在开始本章之前，你需要对线程有几点基本认识：首先，在 Java 中创建执行线程有两种方式——继承 Thread 对象或实现 Runnable 接口；其次，启动线程必须调用
    start 方法；最后，线程可以看似并行地执行各自的任务。这是 SCJP 考试要求掌握的基础知识，也是准备参加 SCJD 考试者应当熟练掌握的内容。


    **线程简述**


    *线程*是指令集的独立执行流。例如，假设文字处理器需要同时完成打印和保存当前文档两项任务，如图 4-1 所示。


    **图 4-1.** *文字处理程序示例* 如果文字处理器是单线程的，它必须等打印完成后才能开始保存文档，如图 4-1 所示。这种方法虽然可行，但效率极低——早期文字处理器的使用者对此深有体会。我们可以做得更好。


    现在设想程序创建了两个独立的执行路径（即线程）：一个负责打印文档，另一个在后台静默备份。这种方法能带来更高的效率，因为两个活动无需相互等待。例如，在建立网络打印机连接的同时，另一个线程可以保存文件。这种多线程概念如图
    4-2 所示，下一节将详细阐述。


    **图 4-2.** *带线程的文字处理程序*


    **多线程**


    *多线程*是协调系统中运行的各种线程的技术，旨在提升系统整体效率。这包括资源轮换或共享、减少开销、以及尊重其他线程的边界。


    管理多线程存在固有挑战，这些挑战源于中央处理器（CPU）处理线程的方式。本章将全程讨论这些挑战，并在“理解线程安全”一节中详细说明。


    CPU 会从某个线程执行若干指令，然后切换到另一个线程执行指令集，如此循环。由于切换速度极快，所有线程都会产生独立并行执行的错觉。此外，处于非活跃等待状态（如等待网络连接）的线程不会成为其他线程的瓶颈——这是多线程最大的优势之一。但这种效率提升是有代价的：若不采取预防措施，一个线程完全可能破坏另一个线程正在使用的数据。我们将在“理解线程安全”一节中演示这些问题，并教你如何通过防御性编程来应对。


    ■**注意** 本章将从单 CPU 计算机上 JVM 运行的角度讨论线程。在多 CPU 计算机上，线程完全可能在不同 CPU 上并发运行。但无论何种情况，出现的问题本质相同。


    回到文字处理程序示例：假设另一个线程正在执行文本对齐操作，且该线程未与打印文档的线程协调，结果可能导致打印文档部分对齐、部分未对齐。


    这些就是多线程编程中必然面临的挑战。SCJD 考试要求考生深入理解多线程及其潜在风险。


    **Java 的多线程概念**


    Java 是少数内置多线程支持的语言之一。这种支持带来两个重要特性：第一，每个 Java 对象都可以被锁定，供特定线程独占使用——通过对象同步实现。只要其他线程遵守锁定规则，被锁定的对象对除声明线程外的所有线程都不可访问。第二，每个
    Java 对象都能追踪所有希望获得其独占访问权的线程。可以将其理解为每个对象都有一份登记表。


    多线程的基本挑战与养育幼儿的挑战类似：如何防止线程（孩子）争夺有限的资源（玩具）？


    在 Java 中，解决方案包含两方面：首先，所有可能使用全局对象的方法必须遵循检查该对象是否正被其他线程使用的约定；其次，所有修改对象的方法需要在该对象上标记“使用中”状态。（要是对孩子也能这么简单就好了...）现实世界中，后者可以类比为在健身房使用跑步机的登记流程：如果你（线程）想使用全局可用对象（跑步机），就需要检查其他人（其他线程）是否正在使用。若有人在使用，则等待；若无人使用，则登记后使用。


    第一个活动称为等待。下一节将详细解释等待机制。


    **等待**


    *等待*是在无法继续执行时主动让出资源的行为。顾名思义，等待是一个非活跃过程，意味着等待中的线程不会浪费无法使用的 CPU 时间。当线程等待时，其他线程可以自由使用其分配的
    CPU 时间配额——等待线程显然不需要这些时间。


    想象一群孩子试图从冰淇淋车购买冰淇淋。如果当前正在与售货员交涉的男孩钱不够，他不会让所有人等待父亲送钱过来。他会让出位置（可能暗自啜泣），然后等待。之后他会重新加入争夺，试图再次引起售货员的注意。其他孩子不会等他，因为他反正无法下单。


    ■**注意** 用孩子争抢冰淇淋的比喻并非随意之举。竞争中的线程不会像杂货店排队的礼貌成年人那样行事。这里没有秩序感——所有线程都激烈竞争，最终胜出者取决于底层操作系统、优先级及其他变量。


    通常，在等待事件发生时暂停执行有两种截然不同的方式：一种是保持线程持有的锁，另一种是释放锁。第一种暂停通常发生在需要等待某个事件发生才能继续执行时（例如等待网络套接字传输数据），第二种则发生在调用明确声明会释放锁的方法时——例如调用
    Object.wait 方法会释放被调用对象的锁。

    '
- fmt: '■**Note** We will explore locking in the “Locks” section of this chapter.
    For now, think of locking as sticking an “in use” sign on an object.


    If your thread goes into a wait state by calling `Thread.yield` or `Thread.sleep`,
    or needs something to occur before continuing, such as receiving I/O, then your
    thread will maintain all locks it holds. That means that other threads will not
    be able to use the locked objects. If they attempt to do so, they will block until
    those resources are released.


    Calling `myObject.wait` for a given object `myObject`, however, does release that
    object’s lock, assuming you have the lock on that object—if you do not have the
    lock on that object, attempting to call the `wait` method will result in an `IllegalStateException`
    being thrown. This is actually very useful, because it allows other threads to
    modify `myObject`. This is illustrated later in this chapter in the “Ice Cream
    Man” example.


    To understand the `wait` method, think of the minister of a church passing around
    a collection plate. He expects people to modify the collection plate’s state—as
    a matter of fact he’s waiting for them to do so. If they don’t, he’ll probably
    continue to wait until they do. In code, this might look something like Listing
    4-1. Don’t be discouraged if the code samples aren’t 100 percent clear to you
    right now. Read the entire chapter, and it will all fall into place.


    **Listing 4-1.** *Waiting Example*


    ```

    1 public class Minister {

    2     private CollectionPlate collectionPlate = new CollectionPlate();

    3

    4     public static void main(String[] args) {

    5         Minister minister = new Minister();

    6

    7         // create a Thread that checks the amount of

    8         // money in the collection plate.

    9         minister.new CollectionChecker().start();

    10

    11         //create several threads to accept contributions.

    12         for (int i = 0; i < 6; i++) {

    13             minister.new CollectionAcceptor(20).start();

    14         }

    15     }

    16

    17     /**

    18      * the collection plate that get passed around

    19      */

    20     private class CollectionPlate {

    21         int amount = 0;

    22     }

    23

    24     /**

    25      * Thread that accepts collections.

    26      */

    27     private class CollectionAcceptor extends Thread {

    28         int contribution = 0;

    29

    30         public CollectionAcceptor(int contribution) {

    31             this.contribution = contribution;

    32         }

    33

    34         public void run() {

    35             //Add the contributed amount to the collectionPlate.

    36             synchronized (collectionPlate) {

    37                 int amount = collectionPlate.amount + contribution;

    38                 String msg = "Contributing: current amount: " + amount;

    39                 System.out.println(msg);

    40                 collectionPlate.amount = amount;

    41                 collectionPlate.notify();

    42             }

    43         }

    44     }

    45

    46     /**

    47      * Thread that checks the collections made.

    48      */

    49     private class CollectionChecker extends Thread {

    50         public void run() {

    51             // check the amount of money in the collection plate. If it''s

    52             // less than 100, then release the collection plate, so other

    53             // Threads can modify it.

    54             synchronized (collectionPlate) {

    55                 while (collectionPlate.amount < 100) {

    56                     try {

    57                         System.out.println("Waiting ");

    58                         collectionPlate.wait();

    59                     } catch (InterruptedException ie) {

    60                         ie.printStackTrace();

    61                     }

    62                 }

    63                 // getting past the while statement means that the

    64                 // contribution goal has been met.

    65                 System.out.println("Thank you");

    66             }

    67         }

    68     }

    69 }

    ```


    In this case, there is one thread representing the minister waiting for the collection
    to exceed $100. There are a further six threads representing attendees adding
    $20 to the collection plate.


    Each of these threads synchronizes on the `collectionPlate` object. Since the
    threads adding to the collection plate need to obtain the lock on the `collectionPlate`
    object, the minister thread must temporarily release it from time to time, which
    it does by calling the `wait` method. As each thread adds to the collection plate,
    it wakes the minister by calling the `notify` method.'
