    如清单 8-21 所示，框架中有一个 JMenuBar。菜单栏可以附加多个 JMenu（例如，一个用于“文件”菜单，一个用于“帮助”菜单，等等）。


    每个菜单可以附加多个 JMenuItem——每个菜单项对应一个用户可能通过菜单执行的操作。


    每个菜单和菜单项都可以附带一个可选的助记键和一个可选的图标。我们展示了将助记键 F 附加到“文件”菜单，以及将助记键 Q 附加到“退出”菜单项。如果用户按下
    Alt 和 F 键，“文件”菜单将下拉，如果随后按下 Q 键，应用程序将退出。


    通常，每个菜单项都附加了一个 actionListener 来响应事件。我们展示了将 QuitApplication 类的一个实例附加到 quitMenuItem
    上（QuitApplication 类将在清单 8-22 中展示）。


    在菜单配置完成并从数据库加载数据后，将 DVDScreen 类的一个实例添加到 MainWindow 框架中。DVDScreen 是一个 JPanel，包含前面“GUI
    设计与布局”部分中描述的元素。它将在清单 8-23 中展示。


