    第 6 章 ■ 使用 RMI 进行网络通信 **197**


    **问** RMI 和套接字，哪种方法更好？


    **答** 每种方法都有其优势。套接字适用于在没有太多开销的情况下发送大量数据（无论是否使用协议）。使用 RMI 实现多线程服务器要容易得多，因为 RMI
    为你处理了线程方面的问题。远程对象的行为也像一个本地对象，拥有完整的协议或一组公共方法，而套接字则需要你实现一个协议。这实际上取决于你，但只要你理解与协议相关的关键技术问题，两种方法都应该能很好地工作。


    **问** 是否需要安全管理器或某种身份验证？


    **答** 这在很大程度上取决于你考试的具体要求。请非常仔细地阅读说明！每次考试都不同。在本章中，我们简要讨论了一些安全问题，如策略文件、动态类加载、HTTP
    隧道、防火墙和安全管理器。然而，在我们的实现中，我们确实包含了安全管理器，但没有使用策略文件。


    **问** 在我的 J2SE 5.0 RMI 实现中，是否需要包含骨架（skeletons）？


    **答** 不需要。骨架仅对 1.2 之前的 Java 版本（即 1.1 版本）是必需的。默认情况下，当你在远程对象实现上运行 `rmic` 时，会生成骨架，但你可以使用
    `rmic` 的 `-keep v1.2` 选项来控制此功能。然而，在撰写本文时，认证项目仍然要求你的提交中包含存根（stubs），并且你不能依赖 Tiger
    版本（即 J2SE 5.0）中的动态存根生成技术。


    **问** 我需要手动启动 RMI 注册表吗？


    **答** 不需要。注册表必须以编程方式启动。同样，请阅读你考试中的说明。但最有可能的是，你需要像我们在 `RegDVDDatabase` 类中那样启动注册表。该类有一个
    `register` 方法，该方法将远程对象实现类绑定到 RMI 命名服务，并使用 `LocateRegistry.register` 方法。当我们在网络上运行此程序时（如第
    8 章所述），你应该从 `main` 方法中调用 `Connector` 的 `getRemote` 方法。


