    **观察者设计模式**


    有许多选项需要配置，但除非所有正确的选项都已配置好，否则客户端和服务器应用程序无法启动。然而，在客户端应用程序中，我们的通用框架将用于对话框，而在服务器应用程序中，它将成为服务器
    GUI 的一部分。因此，我们需要一种通用的方式，让这两个应用程序都能创建通用框架的实例，并在任何字段发生变化时接收通知。实际上，我们希望对话框和服务器应用程序能够观察通用框架中的任何变化。


    这正是我们可以使用观察者设计模式的情况。在这种模式中，你将一个类设置为 Observable 类，任何希望收到变更通知的类都实现 Observer 接口。然后，Observer
    类向 Observable 类注册自己，Observable 类会将任何变更通知给已注册的 Observer 类。


