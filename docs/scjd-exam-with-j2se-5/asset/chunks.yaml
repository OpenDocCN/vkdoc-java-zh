    • 第 1 章，“引言”。本章是一般性介绍，旨在帮助你判断本书是否满足你的需求。它阐述了后续教育计划的结构，介绍了考试目标，并聚焦于后续的技术讨论。


    • 第 2 章，“项目分析与设计”。本章详细介绍了基本的项目考量，例如目录结构、包开发、编码约定、ReadMe 文件以及为 SCJD 考试启动项目的一般方法。


    • 第 3 章，“项目概述”。本章介绍了示例项目 Denny''s DVDs。该应用程序要求你开发类以类似数据库的方式访问文件、构建 Swing 用户界面并设计网络层。仔细阅读本章非常重要，因为它有助于明确项目旨在实现的目标。

