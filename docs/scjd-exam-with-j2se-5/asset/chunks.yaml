- fmt: "# Design Choices Document\n\nThe design choices document will contain a quick\
    \ overview of what *major* choices you made while developing your solution, and\
    \ what alternatives you considered—possibly explaining why you discarded the alternative.\n\
    \nYou do not need to write a book on your choices—the assessors are only interested\
    \ in two things:\n\n1. Did you consider alternatives?\n2. Did you write the code\
    \ you submitted?\n\nIf you go on to become a system architect, you will be expected\
    \ to *know* multiple ways of achieving any software goal—often using multiple\
    \ architectures and languages. As a developer, you should also be able to consider\
    \ and reject alternative solutions within your area of expertise—`J2SE`. For example,\
    \ in a case where you could use a radio button or a check box, you should be able\
    \ to recognize that both alternatives are possible, and decide which is the correct\
    \ choice (note that the choice between a radio button and check box is *probably*\
    \ a minor decision, and possibly not something you would want to document).\n\n\
    > **Tip** Where possible, you should also put your design decisions in an implementation\
    \ comment close to the code itself. For example, if you had chosen a radio button\
    \ instead of a check box, having an implementation comment near the constructor\
    \ for that button will save the person maintaining your code from spending time\
    \ trying to decide whether this was the “right” choice or not.\n\nSun has a difficult\
    \ task—how do they prove that *you* wrote the assignment that *you* submitted?\
    \ One step in the process is to have multiple assignments (different business\
    \ domains), each with multiple versions (different interfaces to be implemented),\
    \ so it is unlikely that anyone you know will happen to have the same assignment\
    \ as you. Another step is to check that the information you write in the written\
    \ exam (where you must provide proof of ID) matches the design choices document,\
    \ and that the design choices document describes the code.\n\nCombine these, and\
    \ Sun can be reasonably certain that the person who sits for the exam is the person\
    \ who wrote the code.\n\nIt is very important that you write down your design\
    \ decisions as you make them. If you leave that task until the end of the project,\
    \ you will have a hard time remembering what choices you made, let alone why you\
    \ made them.\n\n## Javadoc\n\nIt has been shown time and time again that if the\
    \ documentation is separate from the code, then it is often not updated at the\
    \ same time as the code is updated, which renders it useless.\n\n`Javadoc`, and\
    \ similar code documenting tools, were designed to solve this problem. By putting\
    \ the code documentation with the code itself, it is much easier to update the\
    \ documentation at the same time the code is updated.\n\nBut this relies on one\
    \ major premise—that you write and update the comments at the same time as you\
    \ write and update the code.\n\nIf you wait until the end of a three-month assignment\
    \ to do the source code commenting, you may find that you have another three-month\
    \ job ahead of you just to finish the comments, simply because you have to reread\
    \ all your code to work out what you were doing in order to document it.\n\n##\
    \ User Documentation\n\nIn the section “Prototyping the GUI,” we recommended drawing\
    \ rough sketches of your user interface before starting the project. One of the\
    \ benefits we mentioned is that you will then have a definite design to work toward,\
    \ reducing the risk that you will end up with a less usable interface simply because\
    \ it is easier to implement.\n\nWhen you write the user documentation before coding,\
    \ you get the same benefit: you have described up front what your user interface\
    \ is going to do, so you have a definite target to achieve.\n\nYou also have a\
    \ definite end point in mind—when your user interface meets your user documentation,\
    \ you know that the user interface should be ready for testing.\n\nUser documentation\
    \ is also where users go when they have a problem, or when they want to determine\
    \ how they can do something more advanced. Incorrect or badly worded user documentation\
    \ will cause frustration for the end user, and in your real employment will cause\
    \ your support calls to be more aggravating than they need to be. Writing your\
    \ documentation up front means that it is less likely to be rushed, and also means\
    \ that you are more likely to go back to it several times during the course of\
    \ your development and improve it.\n\n## Assertions\n\nAssertions were added in\
    \ `JDK 1.4`, and provide a useful confirmation and documentation of assumptions\
    \ for you as the developer without affecting deployment of your application.\n\
    \nThe syntax of assertions is as follows:\n\n```\nassert <expression with a boolean\
    \ result>;\n```\n\nor\n\n```\nassert <expression with a boolean result> : <any\
    \ statement>;\n```\n\nIf `<expression with a boolean result>` returns `false`,\
    \ and assertion checking is turned on at deploy time, an `AssertionError` is thrown.\n\
    \nProgrammers sometimes make assumptions about how two parts of their program\
    \ interact—for example, they might assume that the value of a parameter in a private\
    \ method will never exceed a certain value. However, if the assumption is incorrect,\
    \ the problems it causes might not become obvious for quite some time. In such\
    \ a case, it can be worthwhile to include an `assert` statement at the start of\
    \ the method that can be used while testing to confirm your assumptions but that\
    \ will not have any effect on the deployed code.\n\n> **Caution** You should never\
    \ use assertions to validate the inputs on public methods—these are methods that\
    \ other programmers may use, and they may not honor your requirements. You should\
    \ validate these inputs regardless of whether or not assertions are turned on\
    \ at runtime.\n\nHere is some example code to show validating a value:\n\n```java\n\
    public class AssertionTest {\n\n    public static void main(String[] args) {\n\
    \        new AssertionTest(11);\n    }\n\n    public AssertionTest(int withdrawalAmount)\
    \ {\n        int balance = reduceBalance(withdrawalAmount);\n        // reduceBalance\
    \ should never return a number less than zero\n        assert (balance < 0) :\
    \ \"Business rule: balance cannot be < 0\";\n    }\n}\n```\n\n> **Note** In `JDK\
    \ 1.4` you had to specify the `-source 1.4` option to the Java compiler in order\
    \ to enable the compilation of assertions. In `JDK 5` this is no longer required.\n\
    \nBy default, assertions are turned off at runtime. This has two major benefits:\n\
    \n- `AssertionError` is an `Error`, and as such you do not want it thrown in production.\n\
    - Evaluating the expression in the assertion could be time consuming—having it\
    \ switched off by default ensures better performance.\n\n> **Caution** You should\
    \ never use assertions to perform actions required for the method to work—assertions\
    \ should only validate that the values are correct. Since assertions are normally\
    \ switched off at runtime, any actions you perform within the assertion will not\
    \ normally be performed at runtime.\n\nTo enable assertions at runtime, you must\
    \ specify either the `-ea` or the `-enableassertions` command-line option. For\
    \ example:\n\n```\njava -ea AssertionTest\n```\n\nWithout the `-ea` option, the\
    \ `AssertionTest` program will run without errors. With the `-ea` option, it will\
    \ throw an `AssertionError`.\n\nAssertions can be enabled for individual classes\
    \ or packages as well, by specifying the classes or packages on the command line:\n\
    \n```\njava -ea:<packageName> -ea:<className>\n```\n\n## Logging\n\nWhen debugging,\
    \ you will find it useful to know when you have reached a certain method, and\
    \ what the values of some of your parameters and variables are.\n\nIn a debugger\
    \ you might set breakpoints at certain locations and watches on some variables.\
    \ But this can be tedious to do each time you want to debug a program."
