    Tweaking the Default Serialization Mechanism


    There may be times when you want more control over how an object’s state is serialized.
    For instance, perhaps you are only concerned with persisting part of the object’s
    state, but not all of it. This is useful if the class contains a private member
    for holding a reference to a database connection, and you do not want to persist
    that information because the connections are only meaningful during a single session
    and are assigned on an as-needed basis. It wouldn’t make sense to try to persist
