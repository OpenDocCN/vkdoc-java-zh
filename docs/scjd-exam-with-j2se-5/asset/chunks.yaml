    \ 8-14 所示；然而，随着 JDK 1.5 的发布，Sun 改进了标准外观和感觉，引入了图 8-13 所示的 Ocean 主题。要恢复到旧主题，需要使用以下命令行：`java\
    \ -Dswing.metalTheme=steel MyFrame javax.swing.plaf.metal.MetalLookAndFeel`\n\n\
    **注意** 布局管理器被设计用来执行确定组件相对位置以及容器大小的艰巨工作。虽然可以使用`setLocation`方法显式放置组件，并使用`setSize`方法设置其大小（我们在清单\
    \ 8-4 中使用了这些方法），但如图 8-11 至图 8-15 所示，组件的大小会根据所使用的不同外观和感觉而变化，因此故意设置组件或容器的大小或位置可能会导致\
    \ GUI 显示异常。我们强烈建议您将组件放置和容器大小调整的工作交给布局管理器。\n\n当使用不同的外观和感觉包时，界面不仅会采用该特定平台的外观，还会采用其界面小部件的功能。例如，Motif\
    \ 外观和感觉下的下拉菜单与 Windows 或 Metal 外观和感觉下的菜单功能截然不同。这是因为 Motif 代表了 X Window 系统的界面外观和功能。\n\
    \n**JLabel 组件**\n\n标准用户界面会在任何接受输入的组件旁边放置标签，为用户提供关于输入用途的简要说明。例如，在接收姓氏数据的文本字段旁边放置标签“姓氏”——该标签用于提醒用户应在文本字段中输入何种类型的数据。\n\
    \n持有标签的 Swing 组件是`JLabel`。一个简单的构造函数如下：\n\n```java\nJLabel zipCodeLabel = new JLabel(\"\
    Zip code\");\n```\n\n虽然这本身并不令人兴奋，但你还可以指定哪个字符将显示为助记符（即哪个字符将被加下划线）。由于标签获得焦点没有意义，你通常会设置显示的助记符，同时设置当按下助记符时哪个字段将获得焦点。这可能类似于：\n\
    \n```java\nzipCodeLabel.setDisplayedMnemonic('Z');\nzipCodeLabel.setLabelFor(zipCode);\n\
    ```\n\n在这种情况下，如果用户按下助记键（同时按下`Alt`和`Z`键），焦点将转移到`zipCode`字段。\n\n此技术将在下一节的清单 8-5\
    \ 中演示，示例 GUI 如图 8-16 所示。\n\n![Image 38](index-264_1.png)\n\n**第 8 章 ■ 图形用户界面**\n\
    \n**245**\n\n**JTextField 组件**\n\n`JTextField`是基本的数据输入字段。它允许用户输入指定长度的纯文本。以下是`JTextField`的一个简单构造函数，大小为\
    \ 15 列：\n\n```java\nJTextField zipCode = new JTextField(15);\n```\n\n`JTextField`的其他构造函数允许你指定要在文本字段中显示的默认值，以及用于验证数据输入的`Document`（数据验证将在下一小节中介绍）。\n\
    \n清单 8-5 展示了一个非常简单的应用程序，用于演示`JLabel`和`JTextField`的使用，其创建的 GUI 如图 8-16 所示。GUI 中包含一个`JButton`，以便你可以尝试将焦点从`JTextField`移开，然后使用助记符将焦点移回。\n\
    \n**清单 8-5.** *JLabel 和 JTextField 组件的演示*\n\n```java\nimport java.awt.*;\nimport\
    \ javax.swing.*;\nimport javax.swing.text.*;\n\npublic class MyFrame extends JFrame\
    \ {\n    public static void main(String[] args) throws Exception {\n        new\
    \ MyFrame().setVisible(true);\n    }\n\n    public MyFrame() throws Exception\
    \ {\n        setDefaultCloseOperation(EXIT_ON_CLOSE);\n        setLayout(new FlowLayout());\n\
    \        JLabel zipCodeLabel = new JLabel(\"Zip code\");\n        JTextField zipCode\
    \ = new JTextField(15);\n        zipCodeLabel.setDisplayedMnemonic('Z');\n   \
    \     zipCodeLabel.setLabelFor(zipCode);\n        this.add(zipCodeLabel);\n  \
    \      this.add(zipCode);\n        this.add(new JButton(\"A button for focus\"\
    ));\n        pack();\n    }\n}\n```\n\n**图 8-16.** *JLabel 和 JTextField 组件的演示*\n\
    \n**246**\n\n**第 8 章 ■ 图形用户界面**\n\n**验证 JTextField 的内容**\n\n在理想世界中，用户只会向我们的应用程序输入有效数据。然而，在现实世界中，人们会犯错误，不幸的是，如果未能及时捕获，输入无效数据可能会导致重大问题。因此，我们应该做出合理的努力来防止输入无效数据，并可能在数据输入后对其进行验证。\n\
    \n清单 8-5 包含一个名为`zipCode`的字段。在美国，邮政编码是五位数字，用于标识信件或包裹的投递区域。不幸的是，我们的示例程序允许输入任何数据，无论其长度或内容如何。\n\
    \n如果我们希望将邮政编码字段限制为仅接受五位数字的邮政编码，我们可以使用`JTextField`的子类：`JFormattedTextField`与`MaskFormatter`结合使用。`JFormattedTextField`只允许输入与指定掩码匹配的字符。`MaskFormatter`提供了一种基于掩码指定文本格式化程序的简单方法——任何与掩码不匹配的字符都将被丢弃。数字的掩码是`#`字符。因此，我们可以将清单\
    \ 8-5 中`zipCode`变量的定义更改如下：\n\n```java\nMaskFormatter fiveDigits = new MaskFormatter(\"\
    #####\");\nJTextField zipCode = new JFormattedTextField(fiveDigits);\nzipCode.setColumns(5);\n\
    ```\n\n如果你进行这些更改，你会发现你不能再输入除数字以外的任何字符，并且不能添加超过五位数字。\n\n进一步考虑验证，让我们考虑用户想要输入 zip+4\
    \ 代码的情况，其中原始的五位代码后跟一个破折号和额外的四位数字，以进一步缩小投递地址的范围——例如，前五位数字指定投递办公室（邮局），接下来的两位数字标识主要街道上的一组街区，最后两位数字标识街道上的特定街区。\n\
    \n然而，zip+4 并非在所有地方都使用，即使在可用的情况下也不是强制使用此格式（就此而言，通过美国邮政服务投递的任何物品似乎也并非强制使用邮政编码，但如果你希望信件及时到达，可能还是建议使用）。\n\
    \n处理此问题的一种方法是创建我们自己的文本字段，并带有自己的文档模型，在其中重写`insertString`方法。因此，我们再次更改`zipCode`变量的定义：\n\
    \n```java\nJTextField zipCode = new ZipTextField(9);\n```\n\n`ZipTextField`扩展了`JTextField`，但它只重写了构造函数和`createDefaultModel`方法：\n\
    \n```java\nprivate class ZipTextField extends JTextField {\n    ZipTextField()\
    \ {\n        super();\n    }\n\n    ZipTextField(int columns) {\n        super(columns);\n\
    \    }\n\n    protected Document createDefaultModel() {\n        return new ZipDocument();\n\
    \    }\n}\n```\n\n如果你愿意，可以重写更多构造函数，或者甚至可以省略构造函数（只使用默认构造函数，并调用继承的`setColumns`方法）。\n\
    \n所有繁重的工作都在我们的`ZipTextField`的模型中完成。对于`JTextField`（我们正在子类化），默认模型是`PlainDocument`。我们将子类化它以形成我们的`ZipDocument`，在其中我们将验证输入的文本。"
  raw: 'You may have noticed that Figures 8-13 and 8-14 both use the Metal look and
    feel but different themes. Prior to JDK 1.5, the Metal look and feel looked like
    Figure 8-14; however, with JDK 1.5 Sun has improved the standard look and feel,
    making the Ocean theme shown in Figure 8-13\. To revert to the old theme, the
    following command line was used: java -Dswing.metalTheme=steel MyFrame javax.swing.plaf.metal.MetalLookAndFeel


    ■**Caution** The layout managers have been designed to perform the hard work of
    determining where components should be placed relative to one another, as well
    as determining the size of containers. It is possible to explicitly place components
    with the setLocation method, and set their size with the setSize method (which
    we used in Listing 8-4); however, as shown in Figures 8-11 through 8-15, the size
    of components varies depending on the look and feel used, so deliberately setting
    the size or location of a component or a container can result in strange-looking
    GUIs. We strongly recommend that you leave the work of component placement and
    container sizing to the layout managers.


    When a different look-and-feel package is used, the interface adopts not only
    the look of that particular platform but also the functionality of its interface
    widgets. For example, a drop-down menu in the Motif look and feel is vastly different
    from the menu functionality under the Windows or Metal look and feel. This is
    because Motif represents the interface look and also the functionality of an X
    Window system.


    **The JLabel Component**


    Standard user interfaces have labels near any component that accepts input, providing
    the user with a brief explanation of what the user input is for. An example of
    this might be having the label “Surname” next to the text field that accepts the
    surname data—the label serves to remind the user what sort of data is to be entered
    in the text field.


    The Swing component that holds a label is the JLabel. A simple constructor for
    this could be


    JLabel zipCodeLabel = new JLabel("Zip code"); While this on its own is not very
    exciting, you can also specify which character will be displayed as the mnemonic
    (which character will be underlined). Since it does not make sense for a label
    to have focus, you normally set the displayed mnemonic, and at the same time set
    which field will get focus if the mnemonic is pressed. This could look similar
    to zipCodeLabel.setDisplayedMnemonic(''Z'');


    zipCodeLabel.setLabelFor(zipCode);


    In this case, if a user presses the mnemonic key (by pressing the Alt and Z keys
    simultaneously), then focus will be transferred to the zipCode field.


    This technique will be demonstrated in Listing 8-5 in the next section, with a
    sample GUI displayed in Figure 8-16.


    ![Image 38](index-264_1.png)


    5165CH08.qxd 11/16/05 12:16 PM Page 245


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **245**


    **The JTextField Component**


    The JTextField is the basic data entry field. It allows the user to enter plain
    text up to a specified length. Here’s a simple constructor for the JTextField
    with a size of 15 columns: JTextField zipCode = new JTextField(15);


    Other constructors for the JTextField allow you to specify a default value to
    be displayed in the text field, and a Document to validate data entry (data validation
    will be covered in the next subsection).


    A very simple application to demonstrate the use of JLabels and JTextFields is
    shown in Listing 8-5, and the GUI that this creates is shown in Figure 8-16\.
    A JButton has been included in the GUI to allow you to experiment with transferring
    focus away from the JTextField and then use the mnemonic to transfer focus back
    again.


    **Listing 8-5.** *Demonstration of JLabel and JtextField Components* import java.awt.*;


    import javax.swing.*;


    import javax.swing.text.*;


    public class MyFrame extends JFrame {


    public static void main(String[] args) throws Exception {


    new MyFrame().setVisible(true);


    }


    public MyFrame() throws Exception {


    setDefaultCloseOperation(EXIT_ON_CLOSE);


    setLayout(new FlowLayout());


    JLabel zipCodeLabel = new JLabel("Zip code"); JTextField zipCode = new JTextField(15);


    zipCodeLabel.setDisplayedMnemonic(''Z'');


    zipCodeLabel.setLabelFor(zipCode);


    this.add(zipCodeLabel);


    this.add(zipCode);


    this.add(new JButton("A button for focus")); pack();


    }


    }


    **Figure 8-16.** *Demonstration of JLabel and JtextField components*


    5165CH08.qxd 11/16/05 12:16 PM Page 246


    **246**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    Validating the Contents of a JTextField


    In a perfect world, users would only ever enter valid data into our applications.
    However, in the real world, people make mistakes, and unfortunately, if not caught
    in time, major problems can occur if invalid data is entered. So we should make
    a reasonable effort to prevent invalid data from being entered, and possibly validate
    data once it has been entered.


    Listing 8-5 contained a field named zipCode. In the United States, zip codes are
    five digits long, and are used to identify the area where a letter or parcel is
    to be delivered. Unfortunately, our sample program will allow any data to be entered,
    regardless of length or content.


    If we want to limit the zip code field to accept only five-digit zip codes, we
    can use a subclass of the JTextField: the JFormattedTextField in combination with
    a MaskFormatter. A JFormattedTextField will only allow characters to be entered
    that match a specified mask. The MaskFormatter provides a simple method of specifying
    a text formatter based on a mask—any characters that do not match the mask will
    be discarded. The mask for a number is the # character. So we could change our
    definition of the zipCode variable from Listing 8-5 as follows: MaskFormatter
    fiveDigits = new MaskFormatter("#####"); JTextField zipCode = new JFormattedTextField(fiveDigits);
    zipCode.setColumns(5);


    If you make these changes, you will find that you can no longer enter any character
    other than a number, and you cannot add more than five digits.


    Taking validation a step further, let’s consider the case where users want to
    enter the zip+4


    code, where the original five-digit code is followed by a dash and an additional
    four digits to further narrow down the delivery address—for example, the first
    five digits specify the delivery office (post office), the next two digits identify
    a set of blocks on a major street, and the final two digits identify the particular
    block on the street.


    However, zip+4 is not used everywhere, nor is it mandatory to use this format
    even where it’s available (for that matter, it does not appear to be mandatory
    to use zip codes for anything going through the US Postal Service, but it is probably
    advisable if you want your letter to arrive in a timely fashion).


    One method of handling this is by creating our own text field, with its own document
    model, in which we override the insertString method. So once again, our definition
    of the zipCode variable is changing:


    JTextField zipCode = new ZipTextField(9);


    The ZipTextField extends JTextField, but all it overrides are the constructors
    and the createDefaultModel method:


    private class ZipTextField extends JTextField {


    ZipTextField() {


    super();


    }


    ZipTextField(int columns) {


    super(columns);


    }


    5165CH08.qxd 11/16/05 12:16 PM Page 247


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **247**


    protected Document createDefaultModel() {


    return new ZipDocument();


    }


    }


    You could override more constructors if you wish, or you could even leave out
    the constructors (just use default constructors, and call the inherited setColumns
    method).


    The hard work is all done in the model for our ZipTextField. For JTextField (which
    we are subclassing), the default model is a PlainDocument. We will subclass that
    to form our ZipDocument, in which we will validate text entered.'
