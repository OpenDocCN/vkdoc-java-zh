    JDK 1.5 introduced two new tags that can be used anywhere within your document:
    `{@code *text*}` and `{@literal *text*}`. In both cases, the text will be displayed
    without interpretation. For example, if your text was `<b>`, normally this would
    be interpreted as the HTML tag to start bold text. However, using the tag `{@code
    <b>}` will result in the text `<b>` being displayed as desired. The `{@code *text*}`
    tag will display the text in monotype font and `{@literal *text*}` will display
    the text in normal font.


    ## Package-Level Documentation


    Javadoc can also incorporate package documentation into the generated output,
    and create a summary page for your overall submission. An example of the summary
    page is shown in Figure 2-2.


    **Figure 2-2.** *Sample summary page*


    To create package documentation, you will need to create a file named `package.html`
    in each package directory. A simple example might look like this:


    ```html

    <!doctype HTML PUBLIC "-//W3C//DTD HTML 3.2//EN">

    <html>

    <head>

    <title>com.example.db</title>

    </head>

    <body>

    Provides database functionality.

    <h2>Package Specification</h2>

    These classes are the base that provide the basic data creation, reading, updating,
    and deleting functions required to process data in a database. Basic locking functionality
    exists, but this is not an advanced package.

    @author Unattributed person from example.com.

    @author Andrew Monkhouse

    @version 1.0

    @since 1.0

    </body>

    </html>

    ```


    ## JDK 5 Changes


    The obvious changes to the Javadoc tool from earlier versions include support
    for the two new tags (`{@code *text*}` and `{@literal *text*}`) mentioned earlier,
    and the obvious support for the generics, enums, and VarArgs features.


    When JDK 1.4 was released, Sun was planning to change the way Javadoc would determine
    how much of a comment should appear in the summary (where the break should be
    between the summary and the remainder of the comment). Sun incorporated the logic
    for the new break iterator in the Javadoc tool, which resulted in large numbers
    of warnings being generated when the proposed change would cause different summaries
    to appear in the future version. Sun has now reversed their plans, and removed
    the 1.4 logic.


    ## Running Javadoc from the Command Line


    The basic command format for Javadoc is


    `javadoc [options] [packagenames] [sourcefiles] [@files]`


    Following from this, you could generate the API documentation for all your source
    files that do not belong to any package by typing the following command in the
    same directory as the source files:


    `javadoc *java`


    If you have your source files organized in packages, you could list the package
    names on the command line instead:


    `javadoc com.example.mypackage com.example.more.packages`


    Both those command lines will generate the API documentation in the current working
    directory, which may not be desirable. You can specify the directory where API
    documentation should be stored by using the `-d` option:


    `javadoc -d doc/api com.example.mypackage com.example.more.packages`


    > **Tip** Javadoc will convert Unix-style pathnames into platform-specific pathnames.
    This is especially useful when you are developing scripts that may be run by unknown
    people on potentially any platform.


    You can add many more options, turning features on or off as desired. For example:


    ```

    javadoc \

    -d doc/api \

    -version \

    -author \

    -use \

    -source 1.5 \

    -windowtitle "Denny''s DVD application" \

    -doctitle "<h1>The SCJD Exam with J2SE 1.5 Project</h1>" \

    -bottom "<i>Developers: Andrew Monkhouse and Terry Camerlengo</i>" \

    -sourcepath src \

    -linkoffline http://java.sun.com/j2se/1.5.0/docs/api /jdk_1.5/api \

    sampleproject.gui sampleproject.db sampleproject.remote

    ```


    The meaning of the new tags is explained in Table 2-9.


    **Table 2-9.** *Meaning of Common Javadoc Command-Line Options*


    | Line | Option | Meaning |

    |------|--------|---------|

    | | `-d` | Used to specify the output directory for generated API. |

    | | `-version` | Specifies that the version information in your Javadoc comments
    will be incorporated into the generated API. |

    | | `-author` | Specifies that the author information in your Javadoc comments
    will be incorporated into the generated API. |

    | | `-use` | Tells Javadoc to include a "use" page for each class, detailing where
    it is used as either a parameter in a method or as a return value. |

    | | `-source` | Specifies which version of the JDK the Javadoc should maintain
    compatibility with. |

    | | `-windowtitle` | Specifies the title to appear at the top of your browser
    (where supported). |

    | | `-doctitle` | Specifies the title to appear on the package summary page. |

    | | `-bottom` | Specifies text that appears on the bottom of every generated page.
    |

    | | `-sourcepath` | Specifies the base directory containing your packages. |

    | | `-linkoffline` | Creates links to existing Javadoc entries. See the description
    in the paragraph that follows. |


    The `-link` and the `-linkoffline` options enable you to link to other preexisting
    APIs. For example, if you used the `String` class as a parameter in one of your
    methods, you might like to have your API documentation for your method include
    a hyperlink back to Sun''s API documentation for the `String` method.


    You would normally use the `-link` option whenever you do not have a copy of the
    preexisting API local to you, but you can access it over the Web.


    The `-linkoffline` option is preferred when you have a local copy of the preexisting
    API documentation, or when you have a local copy of the `package-list` file from
    the preexisting API documentation, or when you cannot access the preexisting API
    over the Web.


    > **Tip** Whenever possible you should refer to local documentation rather than
    looking at it over the Web, simply because it will be faster for you. Likewise,
    linking "offline" by using your local copy of the documentation will be faster
    than accessing the required file over the Web.


    Obviously, you would not want to type such a complex command line every time you
    wanted to regenerate your API documentation. One way of working around this is
    to put all the options (one per line) into a plain text file, and then refer to
    that file on the command line.


    For example, if you had put all the options in a file named `javadoc.options`,
    you could use the following command line to generate your API documentation:


    `javadoc @javadoc.options sampleproject.gui sampleproject.db sampleproject.remote`


    ## Working with Packages


    If you were to put all the files on your computer into one folder, this one folder
    would quickly become unmanageable, and finding any particular file would be a
    nightmare. To avoid this, you probably organize folders to store related files—one
    for accounting information, another for job hunting, another for music, and so
    on. Some of these folders may have subfolders to provide further subcategories.


    Developing software has the same potential issue. Fortunately, Sun has provided
    us with a platform-independent equivalent of the folders: packages. You can locate
    classes belonging to a specific package by the fully qualified package and class
    name, even if the operating system has no concept of folders, directories, or
    a hierarchical file system.'
