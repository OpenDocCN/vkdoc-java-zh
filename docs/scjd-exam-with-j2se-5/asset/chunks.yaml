- fmt: 'When starting any project, consider what logical modules or functionalities
    your project might have, and place the classes related to that functionality into
    its own package. In the case of our project, we will have a set of classes that
    provide the graphical user interface, another set of classes that provide network
    functionality, and another set of classes that provide data access functions.
    We could therefore start with the following potential packages: `gui`, `network`,
    `database`.


    After further investigation, we may decide to add more packages and/or refactor
    the existing packages—Chapter 3 will discuss how to analyze the sample project.
    For example, we might decide to subdivide the `network` package into two separate
    packages: one for RMI networking, and one for Sockets networking. We would therefore
    have the packages `network.rmi` and `network.sockets`.


    Package names should be qualified to ensure that each class can be uniquely identified.
    That is, when you attempt to instantiate the `StartGui` class, you want to instantiate
    *your* class of that name, not mine. To do this, you create packages for your
    domain name, written in lowercase and in reverse. So if you worked for a company
    with the domain name `example.com`, then your package names should start with
    the same name in reverse (`com.example`). So our fully qualified package name
    would now become `com.example.network.sockets`.


    On Microsoft Windows and Unix-based systems, each package should be in a separate
    directory. So for the `com.example.network.sockets` package mentioned earlier,
    we would have a directory for the first package `com`, which would contain a directory
    for the `example` package, which in turn would contain the directory for the `network`
    package, which finally would contain a directory for the `sockets` package. This
    final directory would contain all the Java class files that belong in that package.


    > **Note** Many operating systems differentiate between case for files and directories.
    So a file named `numberOfBoxes` will be different from a file named `NumberOfBoxes`.
    Since Java must request files from the underlying operating system, and cannot
    reasonably go through every permutation of upper- and lowercase, Sun has stipulated
    that the case of your files and directories must match the case of your classes
    and packages.


    The Sun Java utilities are all designed to work with packages in the same way,
    so you can be sure that if the Java compiler can find and compile your classes,
    then the Java runtime and the Java documenter will also be able to work with your
    classes.


    JAR files can also act as a package structure. After you change directory to the
    classpath root folder, running the command:


    ```

    C:\devProj\classes\> jar cf db.jar sampleproject.db

    ```


    will result in a compressed file named `db.jar` containing the `sampleproject.db`
    package tree. Therefore, this file can now be added to a classpath the same way
    a directory is specified, and the compiler or Java Virtual Machine (JVM) will
    scan the file for referenced packages.


    It is important to note the behavior of Java utilities when dealing with shared
    package definitions. For example, a situation could arise under which two directories
    containing different portions of a package definition exist on a computer’s file
    system. The classes for the first package are stored in `c:\devProj\classes`,
    and the second set of files is stored outside of the project’s directory structure
    in `c:\tempClasses`. In the first directory, the package `sampleproject.db` is
    stored, while `sampleproject.testclient` is stored in the second directory (this
    means that the files will be stored in the directories `c:\dev\Proj\classes\sampleproject\db\`
    and `c:\dev\Proj\classes\sampleproject\testclient\`, respectively).


    Next, both directories are compressed into separate JAR files using the JAR utility,
    as shown here:


    ```

    C:\devProj\classes\> jar cf db.jar sampleproject.db

    C:\devProj\classes\> jar cf testclient.jar sampleproject.testclient

    ```


    Finally, both JAR files are specified in a classpath when compiling a Java application,
    as shown here:


    ```

    C:\devProj\tmp\> javac -cp c:\devProj\classes\db.jar;c:\tempClasses\testclient.jar
    MyClass.java

    ```


    The question at this point is, what happens to the classpaths? Does the first
    JAR file overwrite the package path of the second file? The answer is no. Packages
    with the same package tree can be stored in separate JAR files or separate directories,
    and in this case, the Java compiler will combine the contents of these two files
    at runtime.


    > **Caution** If you have classes with the same name that are in the same package
    namespace in two JAR files, the first one found (based on classpath order) will
    be used—the second will be ignored.


    The ability to store package definitions in different locations allows for a very
    modular structure. Thus, you should consider certain ideals when planning an application’s
    package structure. First and foremost, packages should consist of all classes
    that are similar in function or are dependent on each other in design. This allows
    for the packages to function as complete units of functionality. Thus, a JAR file
    could conceivably contain an entire functional package that is “plugged” into
    a project.


    > **Note** The sample project introduced later in this book uses package structure
    to isolate the different network implementations. This structure enables the entire
    networking layer of the sample application to be changed without impacting the
    application’s other packages.


    Classes in the base node of every package should be the building blocks of that
    tree’s functionality, and therefore they should be the most stable portions of
    the tree. Lower-level packages designate the stable classes that all others are
    built upon, and package definitions should be planned using this principle.


    If it is not possible to place only stable, nonchanging classes in the base nodes
    of a package, the classes should be replaced by interfaces, and the volatile implementations
    of these interfaces moved to a higher level of the package definition or into
    a whole different package altogether.


    It is also very important to ensure that dependencies between classes are contained
    within a single package. Essentially, packages should be autonomous units that
    can be compiled separately. For the most part, if classes in a package have to
    be compiled in order for another package to compile, the package structure should
    be reworked so that all class dependencies fall within a single package. A proper
    package design will also ensure that an application is built on the most stable
    foundation possible.


    In summary, packages act as a mechanism to compartmentalize portions of a project
    into functional blocks. Thus, an effective package design allows for portions
    of a project to be removed and swapped around without impacting other portions
    of your code.


    ## Best Practices


    In your programming career, you may have noticed practices that you (or others)
    follow that do not fit into the categories above, and yet they make the overall
    delivery of a final solution much easier. While these practices are not required,
    you should consider using them in your assignment.


    ### Writing Documentation As You Go


    It seems strange to have to mention this, but you really must write your documentation
    at the same time as you are working on your assignment, preferably before you
    write your code, or as you write it.


    You must provide three major forms of documentation as part of this assignment:


    - Design choices

    - Javadoc

    - User documentation


