    \    ois.close();\n    socket.close();\n}\n```\n\n## Socket Servers\n\nIn this\
    \ section, we discuss the various types of socket servers and the techniques often\
    \ used to build them. We also introduce the concept of an application protocol\
    \ and how we implemented the protocol in the Denny’s DVDs socket server.\n\n###\
    \ Multicast and Unicast Servers\n\nA unicast server involves one-to-one communication\
    \ between a client and a server. The sockets developed in Denny’s DVDs are unicast.\
    \ However, in addition to unicast sockets, there are multicast sockets.\n\nMulticast\
    \ sockets are connections between groups of machines. Multicasting, or broadcasting,\
    \ is used when data is sent from one host to multiple clients. The class `java.net.MulticastSocket`\
    \ is used when writing applications that broadcast messages to many clients. We\
    \ will not discuss multicast sockets any further, but you should at least be familiar\
    \ with the concept. Figure 7-2 highlights the differences between multicast and\
    \ unicast sockets.\n\n### Multitasking\n\nAn iterative, or single-threaded, server\
    \ is one that handles client requests sequentially. As one request comes in, the\
    \ server responds and begins listening again once the request is completed. Client\
    \ requests that come in while the server is processing a prior request are placed\
    \ on a queue and serviced as prior requests are completed. In addition, as long\
    \ as one client maintains the port connection to a single-threaded server, no\
    \ other client can connect—if the connection is held for too long, some of the\
    \ waiting clients may time out. (Refer to the `SO_TIMEOUT` setting earlier.) Figure\
    \ 7-2 shows the lifecycle of an iterative, or sequential, socket server.\n\n**Figure\
    \ 7-2.** *Iterative socket server lifecycle*\n\nSocket servers that can multitask\
    \ can process multiple client requests simultaneously. This is accomplished with\
    \ a multithreaded socket server. If you are anticipating a lot of requests, or\
    \ requests take a long time to process, then multitasking is a very useful feature\
    \ for a socket server to have. The Denny’s DVDs socket version is a multithreaded\
    \ socket server.\n\nEach client gets serviced with its own thread, which makes\
    \ the socket solution operate much like our RMI factory solution. We can thus\
    \ be assured that each client has its own `DvdDatabase` object. (See our discussion\
    \ on the RMI factory in Chapter 6.) The next section describes the details of\
    \ our multitasking socket solution.\n\n### The Server Socket Class\n\nThe class\
    \ `java.net.ServerSocket` allows you to create servers that listen to incoming\
    \ connections on a specified port. A `ServerSocket` can send and receive data\
    \ as well as act upon that data. Figure 7-3 illustrates the lifecycle of a multithreaded\
    \ server. The public constructors for `ServerSocket` let you specify the port,\
    \ queue length, and binding address. The server is responsible for implementing\
    \ the protocol, or the rules that both the client and server must conform to in\
    \ order to communicate. If the port you try to open is being used when you try\
    \ to instantiate your `ServerSocket`, then an `IOException` is thrown. If the\
    \ socket is successfully created, the server listens on that port for incoming\
    \ connections by using the `accept` method. The `ServerSocket.accept` method returns\
    \ the client socket that is connected to the client.\n\n**Figure 7-3.** *Lifecycle\
    \ of a multithreaded socket server*\n\n> **Note** More accurately, if the port\
    \ you try to open is already being used when you try to instantiate your `ServerSocket`\
    \ connection, a `BindException` will be thrown. However, the constructor for `ServerSocket`\
    \ only specifies the superclass of `BindException` (`IOException`) will be thrown,\
    \ as other exceptions may also be thrown during construction.\n\nNext, the server\
    \ opens readers and writers on the socket and communicates with the client by\
    \ writing and reading to the socket. The `ServerSocket.accept` method blocks the\
    \ port until a client connects, and then it returns a `Socket` object. The socket\
    \ connection is then used to execute the client request, and the connection can\
    \ be closed for that client.\n\n`SocketServer` has many of the same socket options\
    \ available as the `Socket` class. One important option that they share is the\
    \ `SO_TIMEOUT` option. With the `ServerSocket` class, the `SO_TIMEOUT` option\
    \ specifies how long the server should wait for an incoming socket connection\
    \ with the `accept` method. When the `accept` method times out, a `java.net.SocketTimeoutException`\
    \ is raised. Let’s look at a sample socket implementation in Listing 7-2 for our\
