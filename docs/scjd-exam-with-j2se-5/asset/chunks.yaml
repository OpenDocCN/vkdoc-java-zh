    **107**


    不应使用这些方法，而应使用一个变量，该变量既能被你想要改变其状态的线程访问，也能被想要改变该状态的线程访问。状态正在被改变的线程应定期监视此变量，并在变量发生变化时安全地改变其状态（通过释放所有资源、关闭文件等）。


    更多信息，请阅读关于这些方法为何被弃用的说明，网址为：`http://java.sun.com/j2se/1.5.0/docs/guide/misc/threadPrimitiveDeprecation.html`。


    **线程状态**


    线程有六种状态：`Thread.State.NEW`、`Thread.State.RUNNABLE`、`Thread.State.WAITING`、`Thread.State.TIMED_WAITING`、`Thread.State.BLOCKED`或`Thread.State.TERMINATED`。Java
    对状态之间的转换有特定规则，了解这些规则很重要。


    最重要的规则是，处于`Thread.State.TERMINATED`状态的线程不能进入任何其他状态。永远不能。其次重要的规则是，线程只有在`Thread.State.RUNNABLE`状态下才能执行命令。当你首次在线程上调用`start`方法时，线程调度器会将其转换为`Thread.State.RUNNABLE`状态。之后，根据线程调度器的调度，线程将开始执行`run`方法体中的语句。


    从`Thread.State.RUNNABLE`状态开始，线程有四种路径可选，如图4-11所示：


    *   它可以继续执行直至完成，之后进入`Thread.State.TERMINATED`状态。

    *   线程可以通过调用`wait`或`join`进入`Thread.State.WAITING`状态。

    *   如果线程调用带有超时值的`sleep`或`wait`，它将进入`Thread.State.TIMED_WAITING`状态。

    *   如果线程无法访问锁，它将进入`Thread.State.BLOCKED`状态。


