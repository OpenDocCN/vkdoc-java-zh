    **222**


    第 7 章 ■ 使用套接字进行网络编程


    **总结**


    在本章中，我们讨论了 Denny''s DVDs 的套接字实现。我们还简要概述了不同类型的套接字，以及各种类型的 TCP 套接字开发策略。我们为套接字实现制定了应用协议，并借助
    Java 枚举演示了命令模式。在您的考试解决方案中选择套接字作为网络协议，不应被视为某种需要不惜一切代价避免的深奥且可怕的东西。尽管大多数学生选择不开发套接字解决方案，但我们相信，鉴于本书附带的示例代码库，这个选择并不比
    RMI 解决方案更具挑战性，而且应该相当直接明了。


    套接字是大多数网络协议底层所依赖的技术。大多数酷炫的新技术，例如 Web 服务和 EJB，最终都依赖于套接字。正如我们所讨论的，即使是 RMI 也是构建在套接字之上的。因此，熟悉套接字对您大有裨益，哪怕只是为了加深您对这些其他网络技术的理解。下一章将介绍
    Denny''s DVDs 应用程序的图形用户界面（GUI）。


    **常见问题解答**


    **问** 我需要实现一个多线程的套接字服务器吗？


    **答** 是的。认证考试要求服务器允许多用户访问。如果您使用单线程解决方案，那么将永远无法演示并发访问。您的应用程序将串行阻塞，直到每个请求被逐一解决。


    这可能是一个有趣的解决方案，并且可以避免需要设计锁定策略，但 Sun 公司不会允许这样做。


    **问** 我应该为套接字服务器实现使用线程池吗？


    **答** 这完全取决于您。您可以这样做，而且这将是一个良好的实践。每次接受新连接时，我们的服务器都会生成一个新线程来处理请求。然而，创建和销毁线程并非没有代价。在一个非常繁忙、高流量的服务器上，控制线程的创建可能会更好。线程池会在启动时实例化一定数量的线程，这个数量可以根据您的应用程序性能要求进行调整。当服务器收到新请求时，会从池中取出一个线程来处理该请求。当请求完成时，该线程被返回到池中以供后续使用。线程池将消除与创建和销毁新线程相关的开销。我们在
    Denny''s DVDs 中没有使用线程池，您也不必为您的认证项目实现线程池，因为考试不要求您的服务器在高负载下具有良好的性能。


    **问** TCP 套接字被称为面向连接的协议是什么意思？


    **答** 有时在文献中，提到 TCP 套接字时会使用术语“面向连接”。这意味着在端点之间可以进行通信之前，必须存在一个连接。这与 UDP 套接字（一种无连接协议）形成对比。


    5165CH07.qxd 11/16/05 12:15 PM Page 223


    第 7 章 ■ 使用套接字进行网络编程


    **223**


    **问** 是否有必要使用`SocketCommand`对象来指示要对数据库执行哪个命令？


    **答** 没有必要。我们选择这种实现是为了清晰：这是一种枚举可能命令并演示命令模式的好方法。其缺点是，如果向数据库添加了新命令，客户端必须接收更新后的`SocketCommand`类才能提交未来的请求，因为我们将无法再反序列化服务器上旧的命令对象。（当然，我们可以检查`serialversionID`以实现向后兼容，但您明白这个意思。）另一种方法是将命令作为字符串嵌入到`DvdCommand`中。这样，当添加新命令时，无需将它们添加到`SocketCommand`类中，但服务器能够识别新命令。


    **问** 我应该允许用户更改此应用程序中使用的端口吗？


    **答** 虽然并非严格必要，但这样做通常被认为是一个好主意。否则，如果另一个服务器应用程序正在使用您想要的端口，您的服务器应用程序将无法启动。


    **问** 在选择用于我的应用程序的端口号时（无论是硬编码还是默认值），是否有任何我应该避免使用的数字？


    **答** 互联网号码分配机构（IANA）指定了知名端口列表（端口号 0 到 1023）、注册端口（1024 到 49151）以及动态和/或私有端口（49152
    到 65535）。建议您从私有端口范围内选择一个端口号，以避免与任何其他服务冲突。您应该避免使用知名端口，因为根据您的操作系统，您可能会发现没有管理员权限就无法使用知名端口运行您的服务器。


    **问** 当客户端断开连接时，我该如何执行系统清理？


    **答** 如果专用于该客户端的线程正在监听来自客户端的新命令，那么当客户端断开连接时，它将收到一个异常。或者，如果客户端在您的服务器有机会响应之前的请求之前断开连接，那么当您尝试向客户端发送响应时，专用于该客户端的线程将收到一个异常。在这两种情况下，您都可以在
    catch 块中添加清理代码。

