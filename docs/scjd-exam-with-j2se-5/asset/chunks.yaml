    第 2 章 ■ 项目分析与设计


    `-link` 和 `-linkoffline` 选项使你能够链接到其他已有的 API。例如，如果你在某个方法中使用了 `String` 类作为参数，你可能希望你的方法的
    API 文档包含一个指向 Sun 公司 `String` 方法 API 文档的超链接。


    当你本地没有已有 API 的副本，但可以通过网络访问它时，通常会使用 `-link` 选项。


    当你本地有已有 API 文档的副本，或者有来自已有 API 文档的 `package-list` 文件的本地副本，或者无法通过网络访问已有 API 时，首选
    `-linkoffline` 选项。


    ■**提示** 只要可能，你应该引用本地文档，而不是通过网络查看，因为这样会更快。同样，通过使用本地文档副本进行“离线”链接，也会比通过网络访问所需文件更快。


    显然，你不会希望每次重新生成 API 文档时都输入如此复杂的命令行。解决这个问题的一种方法是将所有选项（每行一个）放入一个纯文本文件中，然后在命令行中引用该文件。


    例如，如果你将所有选项放在一个名为 `javadoc.options` 的文件中，你可以使用以下命令行来生成 API 文档：


    javadoc @javadoc.options sampleproject.gui sampleproject.db sampleproject.remote


    **使用包**


    如果你将计算机上的所有文件都放入一个文件夹，这个文件夹很快就会变得难以管理，查找任何特定文件都将是一场噩梦。为了避免这种情况，你可能会组织文件夹来存储相关文件——一个用于会计信息，另一个用于求职，再一个用于音乐，等等。其中一些文件夹可能还有子文件夹以提供进一步的子分类。


    开发软件也存在同样的问题。幸运的是，Sun 公司为我们提供了与文件夹等效的、独立于平台的解决方案：包。你可以通过完全限定的包名和类名来定位属于特定包的类，即使操作系统没有文件夹、目录或分层文件系统的概念。

