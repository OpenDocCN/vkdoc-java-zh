    If we try and catch RuntimeException, we risk catching a whole lot of subclasses
    of RuntimeException that we really probably don’t want to handle in this exception
    block, where we’re only trying to handle the “interrupted” exception. For example,
    let’s assume that somewhere in the getLock method, something throws a NullPointerException.
    NullPointerException is a subclass of RuntimeException, so it will be caught in
    line 25a. However, we do not handle NullPointerException, so it will not be handled
    appropriately. To ensure that we only handle the one RuntimeException that we
    are really interested in, we have to look at the cause of the RuntimeException,
    and if it is not the RuntimeException we are interested in, we should rethrow
    the exception.


    22 public void run() {


    23 try {


    24 getLock();


    25a } catch (RuntimeException re) {


    25b if (re.getCause() instanceof InterruptedException) {


    25c log.log(Level.WARNING, "Caught the interrupt", re); 25d } else {


    25e throw re;


    25f }


    25g } catch (LockAttemptFailedException dle) {


    26 log.log(Level.WARNING, "Lock attempt failed", dle); 27 }


    28 }


    If we make this change and run the program, we will see the now familiar output
    as shown in Figure 5-5.


    **Figure 5-5.** *Wrapping the exception within a RuntimeException* Wrapping the
    Exception Within a Subclass of RuntimeException We needed to add five lines of
    code to handle the RuntimeException, instead of the normal two lines we would
    have added for a checked exception, significantly adding to our code complexity.


    5165CH05.qxd 11/16/05 12:13 PM Page 133


    C H A P T E R 5 ■ T H E D V D D ATA B A S E C L A S S


    **133**


    However, as stated previously, subclasses of RuntimeException do not need to be
    declared or caught. So a better solution is to create a new exception that is
    a subclass of RuntimeException, similar to this:


    public class UserInterruptionException extends RuntimeException {


    public UserInterruptionException(String msg, Throwable t) {


    super(msg, t);


    }


    }


    We can then use this in exactly the same way that we had used the RuntimeException
    in our previous example, namely


    38 } catch (InterruptedException ie) {


    39a throw new UserInterruptionException(


    39b "InterruptedException in getLock", 39c ie);


    40 }


    However, our code for catching the exception returns to being nice and simple:
    22 public void run() {


    23 try {


    24 getLock();


    25a } catch (UserInterruptionException uie) {


    25b log.log(Level.WARNING, "Caught the interrupt", uie); 25c } catch (LockAttemptFailedException
    dle) {


    26 log.log(Level.WARNING, "Lock attempt failed", dle); 27 }


    28 }


    ■**Tip** If you are creating a subclass of RuntimeException that you do not expect
    to be caught, then it is considered standard programming practice not to declare
    it in the method signature. However, if you are trying to work around a limitation
    of a provided interface, then you might want to declare it in your method signature
    and in your Javadoc documentation. Many common IDEs will show the exceptions a
    method will throw when it is entered, and some will even create standard catch
    blocks based on method signatures. In such cases, listing the subclass of RuntimeException
    will help your users.


    If you do list the RuntimeException in the method signature and/or the Javadoc,
    it would be wise to add a code comment stating why you did this for the benefit
    of the person who is maintaining your code. In the specific case of the Sun assignment,
    you might also want to consider putting a comment in the Javadoc itself stating
    why you did it.


    The big downside of using RuntimeExceptions and its subclasses is that they do
    not need to be caught. If a programmer left out the additions to lines 25a–c,
    the program will still run fine, but a RuntimeException will propagate up the
    stack to the top of the thread. This is shown in Figure 5-6.


    ![Image 20](index-153_1.png)


    5165CH05.qxd 11/16/05 12:13 PM Page 134


    **134**


    C H A P T E R 5 ■ T H E D V D D ATA B A S E C L A S S


    **Figure 5-6.** *RuntimeException propagating to the top of the thread stack*


    ■**Caution** It is important to realize that the RuntimeException propagates to
    the top of the stack *for the* *thread it is running in, not for the **entire**
    JVM*. As can be seen in Figure 5-6, even after the RuntimeException has been thrown,
    and Thread-1 has died, the main thread is still operational. This has important
    ramifications when developing your server code—if you throw a RuntimeException
    and don’t catch it, it is possible that your server will still be running while
    being unable to process any requests.


    **The DvdDatabase Class: A Façade**


    Before building any class, it is worthwhile considering what it is that the class
    does. The same applies to methods—for each method, try to determine just what
    the method does. If you find yourself using the word “and” when describing a class
    or method, there is the *possibility* that the class or method is trying to be
    responsible for more than it should. You might then consider whether it makes
    sense to break a class or method into two or more classes or methods; it might
    make your code a bit more manageable and maintainable.


    In the case of our DvdDatabase class, we have been told in our instructions that
    this is the public class that all other classes will use if they want to access
    the data file. However, when we look at what the DvdDatabase class provides, we
    find that there are two separate functions: **1.** Physically accessing the data


    **2.** Providing logical record locking


    If we tried to describe what this class does in a short sentence, we would probably
    have to use the word “and”: “This class provides physical access to the data **and**
    provides logical record locking.”


    We *could* provide both these functions in one class, but if we split them out,
    then the code will be more maintainable later. If you need to work on a method
    that physically accesses the database, you will be able to go to a class that
    only deals with accessing the database; you will not have to wade through all
    the logical locking code.


    5165CH05.qxd 11/16/05 12:13 PM Page 135


    C H A P T E R 5 ■ T H E D V D D ATA B A S E C L A S S


    **135**


    There is a design pattern that describes what we are trying to achieve here: the
    Façade pattern. The English meaning of the word “façade” is the front face of
    something, typically a building. So we might refer to the front of a shop or building
    as its façade: the view of the building that the average user gets to see. In
    the same way, we can think of the DvdDatabase as the front face, or façade, shown
    to external users, hiding the classes that external users may not need to know
    about.


    ■**Note** Although using a façade does not stop us from using the word “and” in
    our description of what the class does, it does change the class itself so that
    the faced class is not providing all the functionality; it is handing off to the
    other classes behind the scene.


    Our DvdDatabase class is therefore very simple. We start by creating references
    to the classes that do the real work:


    package sampleproject.db;


    import java.io.FileNotFoundException;


    import java.io.IOException;


    import java.util.Collection;


    import java.util.List;


    import java.util.regex.PatternSyntaxException;


    public class DvdDatabase implements DBClient {


    private static ReservationsManager reservationsManager


    = new ReservationsManager();


    private static DVDFileAccess database = null;


    public DvdDatabase() throws FileNotFoundException, IOException {


    this(System.getProperty("user.dir"));


