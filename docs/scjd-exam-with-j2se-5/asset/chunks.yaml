    使用getter和setter（之所以这样命名，是因为方法的第一个动词是`get`或`set`）使我们能够只暴露我们想要暴露的方法部分，并只允许对它们进行某些操作。例如，我们可能决定DVD的副本数量永远不能低于零；如果我们允许客户端直接修改该字段，那么他们可以将其设置为任何他们喜欢的数字，包括负数。但是通过为DVD数量设置一个setter，我们可以包含我们的业务逻辑，以确保客户端不能设置负数。


