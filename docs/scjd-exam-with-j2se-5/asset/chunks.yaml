- fmt: '# Note


    You cannot change a thread’s daemon status after the thread has started—if you
    want your thread to be a daemon, you must explicitly set it as such before starting
    the thread. A thread created from non-daemon threads defaults to being a non-daemon
    thread. Likewise, a thread created from daemon threads defaults to being a daemon
    thread. In either case, if you do not like the default type of thread, you can
    change it by calling the `setDaemon` method on the thread.


    The `IceCreamMan` class extends the `Thread` class, so we can call the `start`
    method directly, as shown in line 16.


    Line 25 shows an example of using the enhanced for loop to iterate over the items
    in an array. In this array we create several `Child` objects, each of which is
    an independent thread. Their role is to request a dish of ice cream from the `IceCreamMan`.


    Lines 27 and 28 show how to create a thread based on a `Runnable` class. In line
    27 we create a new thread from the `Runnable` class, and in line 28 we start the
    thread as we would any other thread object.


    For this example we have decided that getting ice cream for our three children
    is the most important task—what happens after that is not important. So we have
    decided that we can end the application once all three children have eaten their
    ice cream. To do this, our main thread must pause until all three `Child` threads
    have completed running. We accomplish this in lines 32 through 38, where we call
    the `join` method on each of the child threads.


    # Tip


    If you are having trouble understanding the terminology of “joining a thread,”
    it may make more sense if you refer back to Figure 4-2. In the diagram it *appears*
    as if each thread split from the main thread, then rejoined it after completion.


    Once all the `Child` threads have completed, the main thread prints a status message,
    then exits. As mentioned earlier, at this point there will be no more non-daemon
    threads running, and the application itself will exit.


    # Note


    If we did not have the `join` statements in lines 32 through 38, the application
    would still work in a very similar fashion. The major difference would be that
    the `main` method would complete before the `Child` threads complete. However,
    since the `Child` threads are not daemon threads, they would still continue to
    run. So all the children would still get their ice cream. Once all the children
    have their ice cream, the program would still exit.


    ```

    1 /**

    2  * a Child object, designed to consume ice cream

    3  */

    4 public class Child implements Runnable {

    5     private static IceCreamMan iceCreamMan = new IceCreamMan();;

    6     private IceCreamDish myDish = new IceCreamDish();

    7     private String name;

    8

    9     public Child(String name) {

    10         this.name = name;

    11     }

    12

    13     public static void main(String args[]) {

    14         // start the ice cream man''s thread.

    15         iceCreamMan.setDaemon(true);

    16         iceCreamMan.start();

    17

    18         String[] names = {"Ricardo", "Sally", "Maria"};

    19         Thread[] children = new Thread[names.length];

    20

    21         // create some child objects

    22         // create a thread for each child

    23         // get the Child threads started

    24         int counter = -1;

    25         for (String name : names) {

    26             Child child = new Child(name);

    27             children[++counter] = new Thread(child);

    28             children[counter].start();

    29         }

    30

    31         // wait until all children have eaten their ice cream

    32         for (Thread child : children) {

    33             try {

    34                 child.join();

    35             } catch (InterruptedException ie) {

    36                 ie.printStackTrace();

    37             }

    38         }

    39

    40         System.out.println("All children received ice cream");

    41     }

    ```


    `Child` objects attempt to hand their personal `IceCreamDish` to the ice cream
    man, as shown in line 44. Then they eat the ice cream when it is returned to them—this
    is handled by the `eatIceCream` method.


    # Note


    The Sun Code Conventions for the Java programming language recommend inserting
    a blank line between methods; however, there is no value in showing these blank
    lines when code listings have been split to allow room for comments within this
    book. Nevertheless, the blank lines do exist in the downloadable source, so to
    ensure the line numbers remain consistent between the book and the downloadable
    source, you may see cases where blank lines and Javadoc comments have been removed
    from the text. Therefore, while it appears that lines are missing, rest assured
    that all the relevant code is presented.


    ```

    43     public void run() {

    44         iceCreamMan.requestIceCream(myDish);

    45         eatIceCream();

    46     }

    ```


    As we will see when we review the `IceCreamMan` code in the next section of this
    chapter, after receiving an `IceCreamDish` the `IceCreamMan` instance fills it
    and signals that he is done with that particular `IceCreamDish`. The `Child` instances
    wait until the `IceCreamMan` modifies their personal `IceCreamDish` objects and
    notifies them of the change. As soon as they receive that notification, they eat
    their `IceCream`.


    Notice that in this example the `Child` instance actually releases its lock on
    the instance of the `IceCreamDish` by calling `myDish.wait()` in line 60. This
    then provides the opportunity for the `IceCreamMan` to gain the lock on the dish,
    after which he can fill it.


    The next interesting part of the code happens between lines 48 and 69:


    # Note


    You cannot call the `wait` method on an object unless you are in a block or a
    method that is synchronized on that object.


    ```

    48     public void eatIceCream() {

    49         String msg = name + " waiting for the IceCreamMan to fill dish";

    50         /*

    51          * The IceCreamMan will notify us when the dish is full, so we should

    52          * wait until we have received that notification. Otherwise we could

    53          * get a dish that is only half full (or even empty).

    54          */

    55         synchronized (myDish) {

    56             while (myDish.readyToEat == false) {

    57                 // wait for the ice cream man''s attention

    58                 try {

    59                     System.out.println(name + msg);

    60                     myDish.wait();

    61                 } catch (InterruptedException ie) {

    62                     ie.printStackTrace();

    63                 }

    64             }

    65             myDish.readyToEat = false;

    66         }

    67         System.out.println(name +": yum");

    68     }

    69 }

    70

    71 class IceCreamDish {

    72     public boolean readyToEat = false;

    73 }

    ```


    Line 55 synchronizes on the `IceCreamDish` reference, `myDish`. This means that
    the current `Child` thread will not move past line 55 until it has exclusive access
    to the `IceCreamDish` reference of this particular `Child` object.


    Remember that each `Child` and the `IceCreamMan` share access to that particular
    child’s `IceCreamDish`. The `IceCreamMan` could be modifying the `IceCreamDish`
    at any time; we don’t want the `Child` object to use the `IceCreamDish` until
    the `IceCreamMan` is through.


    Now assume that the `Child` has achieved access to the `IceCreamDish`. This could
    happen for two reasons. First, the `IceCreamMan` is not currently using that `Dish`
    (he does, after all, have other `Child` objects to attend to). Second, the `IceCreamMan`
    is finished with that `Dish`. Line 56 checks the value of `dish.readyToEat`. This
    value tells the `Child` whether the `IceCream` is ready to be eaten. A monitor
    is used between the `Child` objects and the `IceCreamMan`. Monitors will be defined
    shortly. For now, think of a monitor as a prearranged signaling device between
    the `IceCreamMan` and the `Child` objects.


    If the `dish.readyToEat` value is `false`, then the `IceCreamMan` has not finished
    filling the bowl. The `Child` can release the lock on the `Dish` by calling `wait`
    on it, as in line 60.'
