    如果用户选择使用“退出”菜单项退出应用程序，事件处理程序将调用 QuitApplication 类。这是我们可以编写的最简单的事件处理程序之一——它所做的只是调用
    System.exit(0)。它展示在清单 8-22 中。


    **清单 8-22.** *QuitApplication ActionListener* private class QuitApplication implements
