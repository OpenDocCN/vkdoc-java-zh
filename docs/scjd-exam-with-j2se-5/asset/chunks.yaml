    Externalizable\n\n版本信息，序列化的数据更多。\n\n**介绍 RMI**\n\nSCJD 考试的一个重要目标是让考生开发一个解决方案，允许网络上的机器交换消息。这种通信被称为分布式计算，可能是一项具有挑战性的任务，但\
    \ RMI 是你可用的有用工具之一。\n\n然而，RMI 并非唯一的解决方案。还有其他技术，例如 RPC、公共对象请求代理体系结构 (CORBA) 和微软的\
    \ .NET 技术。事实上，RMI 可以被认为是面向对象的 RPC。\n\n5165CH06.qxd 11/16/05 12:14 PM 第 172 页\n\
    \n**172**\n\n第 6 章 ■ 使用 RMI 进行网络编程\n\n■**注意** .NET 有一个类似且竞争的技术，称为 .NET 远程处理。\n\
    \n现在是定义一些术语的好时机。当我们在 RMI 编程场景中使用术语 *服务器* 时，我们指的是一个远程对象，其方法可以从另一个 JVM 调用。*客户端*\
    \ 是调用服务器远程可访问方法的对象。\n"
- fmt: '# An RMI Distributed Object System


    An RMI *distributed object system* provides remote objects that can be invoked
    by clients. Communication between a client and a remote object is two-way. A client
    must be able to locate and communicate with remote objects, invoke their methods,
    and receive their return values.


    `RMI` specifically enables Java objects on different machines to communicate with
    each other. One of the motivations behind `RMI` is for developers to interact
    with remote Java objects as if they were local objects. The actual location of
    the object is transparent to the developer. Network transparency is a very appealing
    feature, because it abstracts the complexities involved in distributed object
    systems so that they behave as if they were local object systems. So in an `RMI`
    system, the client runs locally, while the rest of the system runs on a different
    machine. These types of systems are often referred to as distributed object systems.


    Figure 6-5 illustrates this type of system.


    > **Note** An alternative to sockets and `RMI` is Remote Procedure Call (`RPC`).
    `RPC` is language- and processor-independent, assumes that parameters are network
    representations of simple data types such as `int`s and `char`s, and can be run
    on almost any platform. `RMI` is only processor-independent, assumes an object-oriented
    framework, and requires the use of Java.


    In addition to `RPC`, `CORBA` and Simple Object Access Protocol (`SOAP`) are other
    technologies that allow processor and language independence between different
    platforms. But because `RMI` assumes the use of Java, many of the tedious protocol-level
    tasks have been built into `RMI`, leaving the developer with more time to worry
    about application logic. Java’s `RMI` is very good for Java systems, since it
    can assume that a `JVM` will be present on both sides of the network connection.
    For these reasons, `RMI` is preferable to `RPC` and `CORBA` in distributed object
    systems built entirely with Java. However, as a scandalous side note, `CORBA`
    systems tend to perform better than `RMI` systems, mainly because they can be
    written in C or C++.


    Closely related to `RMI` is `RMI-IIOP`, which stands for Java Remote Method Invocation
    Run Over Internet Inter-Orb Protocol. `RMI-IIOP` was coproduced by Sun and IBM
    in order to achieve interoperability between `CORBA`-compliant applications and
    Java. Using the Java development language, you can create the Interface Definition
    Language (`IDL`) that will work with `CORBA` applications written in languages
    such as C++. The `rmic` compiler supports the option `-iiop`, which will produce
    the `IDL` files.


    **Figure 6-5.** *Distributed object system*


    ## The Delivery Stack


    A transport protocol is a protocol built directly above the network layer; the
    two most common examples are `TCP/IP` and `UDP`. Above the transport layer is
    the transfer layer, which is responsible for the transparent transfer of data
    between hosts, flow control, and end-to-end error recovery and data transfer.
    The transport layer issues requests to the network layer.


    Figure 6-6 shows the technology stack complete with the network layer that `RMI`
    applications are built upon.


    **Figure 6-6.** *The delivery stack*


    A transfer protocol resides above a transport protocol and establishes how information
    is transferred between hosts. A very common example of a transfer protocol is
    Hypertext Transfer Protocol (`HTTP`). `HTTP` is the protocol for the World Wide
    Web. Java `RMI` does not use `HTTP` as a transfer protocol but instead uses the
    Java Remote Method Protocol (`JRMP`). One shortcoming to `JRMP` is that Java must
    be understood on both ends, the sending and receiving end, tying the solution
    to a Java `RMI` framework. To alleviate the dependency on Java, `CORBA`-related
    clients can be used by specifying `-iiop` for stub generation with the `rmic`
    tool. `IIOP` ensures the `CORBA` clients can be used with Java remote object implementations,
    thus reducing the dependency on a strictly Java solution.


    Table 6-2 summarizes the three choices developers have for choosing a transfer
    protocol when using `RMI`.


    **Table 6-2.** *RMI Transfer Protocols*


    | Protocol | Description |

    |----------|-------------|

    | `RMI-JRMP` | The default transfer protocol for `RMI`. For client-server applications
    relying entirely on Java as the programming language. A Java-to-Java solution.
    |

    | `Java-IDL` | For `CORBA` developers wanting to use Java in conjunction with
    interfaces defined in `CORBA`-compliant applications. Essentially this is a `CORBA`-to-Java
    solution. |

    | `Java RMI-IIOP` | For Java developers needing to maintain compatibility with
    legacy applications. A Java-to-non-Java solution. |


    Return values and parameters are copies. Objects that are exported, or that implement
    a remote interface, are referenced via their stub, or client-side proxy. To export
    an object, extend `UnicastRemoteObject` or explicitly call `UnicastRemoteObject.export(<remote
    object>)`.


    ## The Pros and Cons of Using RMI as a Networking Protocol


    For the developer exam, the examinee can choose between `RMI` or serialized objects
    over sockets for the networking protocol. Here are some of the reasons for selecting
    `RMI` over sockets:


    - **Object-based semantics** — Remote objects look and feel just like local objects.
    The complexities of network-aware objects can be hidden from the programs using
    `RMI` remote objects.

    - **No protocol burden** — Unlike sockets, when working with `RMI` there is no
    need to worry about designing a protocol between the client and server, a process
    that is error-prone.

    - **Method calls are type-safe in `RMI`** — `RMI` is more strongly typed than
    sockets. Errors can be caught at compile time.

    - **It’s easy to add new objects with `RMI` or extend the protocol** — You can
    more easily add new remote object interfaces or add methods to an existing remote
    object.

    - **`IIOP` can be used for non-Java end points** — You are not explicitly tied
    to a Java-to-Java solution.

    - **Generating stubs just got easier with `J2SE 5.0`** — If `JRMP` is used, there
    is no need to generate stubs explicitly with `rmic` any longer. But we will still
    be required to do so for our project.


    > **Caution** Even though Java 5.0 has added dynamic stub generation to alleviate
    `RMI` developers from explicitly invoking `rmic` on their remote classes prior
    to runtime, you must still do so for the certification project. This is important:
    **The use of `rmic` is still required** as of this writing for the Java developer
    certification project.


    However, the relatively intuitive object semantics of `RMI` come at the expense
    of the network. There is communication overhead involved when using `RMI`, and
    that is due to lookups in the `RMI` registry and client stubs or proxies that
    make remote invocations transparent. For each `RMI` remote object, there is a
    need for a proxy, which slows the performance down.


    Also it is important to be aware that thread management can sometimes cause issues
    if working with classes that are not designed around thread safety. Control and
    management of threads in `RMI` is delegated to the `JVM` and not the program.


    ## The Classes and Interfaces of RMI


    Figure 6-7 presents an overview of the classes and interfaces of `RMI`.


    **Figure 6-7.** *The RMI classes and interfaces*


    ### The Interfaces


    The `Remote` interface is another marker interface, similar to the `Serializable`
    interface discussed earlier. The term *remote* indicates that the methods defined
    may be accessed from a different virtual machine than the one containing the remote
    object. For an object to be considered a remote object, the `Remote` interface
    must be implemented. Implementing this interface is accomplished by extending
    `java.rmi.Remote`.'
