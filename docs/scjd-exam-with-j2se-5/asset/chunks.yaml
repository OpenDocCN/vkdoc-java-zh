    由于多个客户端可能通过网络连接并同时尝试修改相同的记录，因此应用程序必须是线程安全的。我们将在第 4 章中更详细地讨论线程安全。目前，只需知道线程安全代码能够在多个客户端访问和修改同一对象时保护该对象的状态即可。确保您的认证提交是线程安全的，这是您的责任，您将在第
    4 章的“理解线程安全”部分中了解到这一点。


    无需通知客户端*不可重复读取*——也就是说，不要求所有查看已被修改记录的客户端都收到修改通知。但是，如果两名员工同时尝试租借同一张 DVD，则只有一位客户能获得该
    DVD。这被称为*记录锁定*。在第 4 章中，将更详细地探讨记录锁定（第 5 章中会给出示例）。


