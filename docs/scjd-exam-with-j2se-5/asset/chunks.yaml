- fmt: "# 线程\n\n如图4-3所示，`IceCreamMan`在自己的线程中等待客户。每个`Child`对象也都在自己的线程中。`Child`对象通过将它们的`IceCreamDish`交给`IceCreamMan`来与之交互，然后它们退出CPU并等待。`IceCreamMan`准备`IceCreamDish`，这是与该`IceCreamDish`关联的`Child`需要唤醒并吃掉其`IceCream`的信号。\n\
    \n**图4-3.** *等待客户的IceCreamMan* 等待总结\n\n需要资源的线程会在你没有特别要求它暂停的情况下暂停。相比之下，由于调用`yield`、`wait`或`sleep`而暂停的线程，是应程序员的要求特意暂停的。无论哪种情况，结果都是线程暂停执行。\n\
    \n对于因资源不可用而暂停的线程，以及让出CPU给其他线程的线程，程序员不知道线程何时会恢复处理——对于前者，它将在资源可用时恢复；对于后者，则由JVM线程调度器决定。如果你调用不带任何参数的`wait`，你将不知道线程何时会恢复处理——这取决于另一个线程通知它可以继续操作。然而，如果你调用带时间限制的`wait`，你会知道线程将在收到通知时，或在时间限制到期后不久恢复处理。请记住，时间限制无法严格执行；JVM会至少按照你请求的时间暂停线程，并尽力在时间限制到期后调度该线程，但线程恢复的确切时间无法保证。\n\
    \n如果你调用`sleep`，你会知道线程将在时间限制到期后不久恢复处理——同样，时间限制无法严格执行。回到冰淇淋的例子，想象小Sally终于引起了冰淇淋小贩的注意并给了他一些钱，但她还没有真正选择口味。如果Sally`yield`，那么她会自愿让开，让另一个孩子尝试，但她确信冰淇淋小贩不会卖掉她明确锁定的蛋筒。如果没有孩子感兴趣，那么她会重新加入并让她的蛋筒装满冰淇淋。\n\
    \n如果Sally决定`sleep`，就好像她为蛋筒付了钱，但延迟做出选择，最多延迟1分钟——比如说，等她弟弟到来。一分钟后，她会再次尝试（无论弟弟是否出现）。当她最终引起冰淇淋小贩的注意时，她会确信她锁定的蛋筒仍然在那里。但仅仅因为Sally决定一分钟到了，并不意味着她能立即拿到她的蛋筒——在Sally的一分钟结束时，可能另一个孩子正在装他的蛋筒。每当Sally无法引起冰淇淋小贩的注意时，她就会被阻塞。在前面的例子中睡了1分钟后，她现在发现冰淇淋小贩正在服务另一个孩子。虽然她仍然拥有她蛋筒上的锁，但她并不拥有冰淇淋小贩上的锁，因此被阻塞，直到她能获得那个锁（同时她的弟弟可能在此期间出现）。\n\
    \n然而，如果Sally必须等待她父亲给她送钱，那么她没有锁定任何蛋筒，等到钱送来时，所有的蛋筒可能都卖完了。\n\n## 锁\n\n*锁*是独占使用的令牌。每个Java对象都有一个。将锁视为能够在任何对象上贴一张便条，并声明该对象归你的线程独占使用。通过声明一个对象的锁，你的线程告诉其他方法（那些尊重同步的方法）在你释放它之前不要以任何方式修改该对象。尊重同步的方法是那些在相关对象上进行同步的方法。\n\
    \n在Java中，你可以通过同步来锁定一个对象。考虑以下示例：\n\n```java\npublic void addElement(Object item)\
    \ {\n    synchronized (myArrayList) {\n        //do stuff\n    }\n}\n```\n\n这告诉JVM，其他线程不应修改`myArrayList`对象。当然，这仅适用于同步方法。例如，在以下示例中，方法`elementExists`可能不需要同步访问，因为它是一个只读操作：\n\
    \n```java\npublic boolean elementExists(Object item) {\n    return myArrayList.contains(item);\n\
    }\n```\n\n然而，如果要求`elementExists`绝对准确（即，当另一个线程正在向`ArrayList`插入或删除元素时，你无法承受得到错误答案），那么你也需要在此处同步访问。\n\
    \n本节整合了之前已经介绍的一些概念。锁的概念对于理解线程至关重要，仔细关注这里会让你收获颇丰。\n\n### 锁定对象\n\n你在日常生活中一直在锁定对象。当你去看电影时，你可能会把外套留在座位上“锁定”你的座位。即使你离开座位去买爆米花，大家也明白没有人应该坐在那个座位上。把外套留在座位上的行为有效地将该座位标记为你的独占使用，直到你选择释放它。\n\
    \n任何Java对象都可以被声明为独占使用。这是Java支持多线程的明确方式之一。Java通过允许对象在被释放时广播通知，并强制想要锁定资源的线程在资源被释放前变为非活动状态，进一步支持多线程。\n\
    \n如果一个对象没有被明确声明，那么它对任何线程都是开放的。同样，电影院里没有被明确声明的座位随时可以被占用。这意味着，如果你离开座位去买零食，并且没有通过留下外套来锁定座位，那么当你回来时，如果别人占用了你的座位，你不应该感到惊讶。\n\
    \n即使这种策略过去有效，也不能保证未来是线程安全的。Java也是如此。除非你的类被明确地设为线程安全，否则它们过去未被破坏的事实并不能保证它们将来不会被破坏。\n\
    \n这个比喻还有第二层深度。即使你的外套在座位上，别人也可能会拿走你的电影院座位。Java也是如此。如果修改锁定对象的线程不尊重同步，那么该锁定对象可能会被违反。\n\
    \n例如，假设你有一个在成员变量上同步的方法：\n\n```java\npublic void goodMethod() {\n    synchronized\
    \ (myObject) {\n        //do stuff to myObject\n    }\n}\n```\n\n第二个方法如果选择不在`myObject`上同步，就可以修改`myObject`。\n\
    \n在对象上同步意味着“我会尊重其他人对这个对象的锁，并且我希望他们也尊重我的。”然而，这是无法强制执行的。因此，以下示例会拒绝尊重`goodMethod`中建立的同步，并且会毫无怨言地执行。\n\
    \n如果`badMethod`修改了`myObject`，这可能会引起问题，因为其他已在`myObject`上同步的线程会期望对`myObject`拥有独占访问权。\n\
    \n```java\npublic void badMethod() {\n    //do stuff to myObject\n}\n```\n\n当然，这些方法的名称并不真正意味着一种方式是“好的”而另一种是“坏的”。"
  raw: 'As Figure 4-3 shows, the IceCreamMan is waiting for clients in his own thread.
    Each Child object is also in its own thread. The Child objects interact with the
    IceCreamMan by giving him their IceCreamDish, and then they step out of the CPU
    and wait. The IceCreamMan prepares the IceCreamDish, which is the signal that
    the Child associated with that IceCreamDish needs to wake up and eat their IceCream.


    **Figure 4-3.** *IceCreamMan waiting for clients* Waiting Summary


    A thread that needs a resource becomes paused without you specifically requesting
    that it pause. In contrast, a thread that pauses because of a call to yield, wait,
    or sleep is paused specifically at the request of the programmer. Regardless,
    all cases result in the thread pausing execution.


    In the case of a thread paused until a resource becomes available and a thread
    that yielded to other threads, the programmer does not know when the thread will
    resume processing—for the former, it will be whenever the resource becomes available,
    and for the latter it will be at the discretion of the JVM thread scheduler. If
    you call wait without any parameters, you will not know when the thread will resume
    processing—it is dependent on another thread notifying it that it can continue
    operating. However, if you call wait with a time limit,


    5165CH04.qxd 11/16/05 12:11 PM Page 87


    C H A P T E R 4 ■ T H R E A D I N G


    **87**


    you will know that the thread will resume processing when it has been notified,
    or soon after the time limit has expired. Remember that time limits cannot be
    strictly enforced; the JVM will pause the thread at least as long as you requested
    and make its best attempt to schedule the thread after the time limit has expired,
    but the exact time the thread resumes is not guaranteed.


    If you call sleep, you will know that the thread will resume processing soon after
    the time limit has expired—again, time limits cannot be strictly enforced. Returning
    to the ice cream example, imagine that little Sally has finally gotten the ice
    cream man’s attention and given him some money, but she hasn’t yet actually picked
    her flavor. If Sally yielded, then she would move out of the way voluntarily to
    let another child try, but she would be secure in the knowledge that the ice cream
    man won’t sell the cone that she explicitly locked down. If no children were in
    fact interested, then she would jump back in and have her cone filled with ice
    cream.


    If Sally decided to sleep, it might be as if she has put her money down for a
    cone but is delaying making her choice for up to 1 minute—say, for her younger
    brother to arrive. After the minute has elapsed, then she will try again (whether
    the younger brother has shown up or not). When she finally does get the ice cream
    man’s attention, she will be confident that the ice cream cone she had locked
    down will still be there. But just because Sally has decided that the minute is
    up does not mean that she will be able to get her cone immediately—another child
    may be getting his or her cone filled at the end of Sally’s minute. Sally is blocked
    whenever she cannot get the ice cream man’s attention. Having slept for 1 minute
    in the previous example, she now finds that the ice cream man is serving another
    child. Although she still owns the lock on her cone, she does not own the lock
    on the ice cream man and is blocked until she can get that lock (and maybe her
    brother can turn up in the meantime).


    However, if Sally had to wait for her father to bring her money, then she does
    not have any cone locked down, and by the time the money arrives, all the cones
    may be sold.


    **Locks**


    *Locks* are tokens of exclusive use. Each Java object has one. Think of locking
    as the ability to stick a note on any object and claim that object for your thread’s
    exclusive use. By claiming an object’s lock, your thread tells other methods (those
    that respect synchronization) not to modify that object in any way until your
    thread releases it. A method that respects synchronization is one that synchronizes
    on the object in question.


    In Java, you can lock an object by synchronizing on it. Consider the following
    example: public void addElement(Object item) {


    synchronized (myArrayList) {


    //do stuff


    }


    }


    This lets the JVM know that other threads should not modify the myArrayList object.
    Of course, this only applies to synchronized methods. For instance, in the following
    example the method elementExists might have no need to synchronize access, because
    it is a read-only operation:


    public boolean elementExists(Object item) {


    return myArrayList.contains(item);


    }


    5165CH04.qxd 11/16/05 12:11 PM Page 88


    **88**


    C H A P T E R 4 ■ T H R E A D I N G


    However, if it were required that elementExists be absolutely accurate (that is,
    if you could not afford to receive an incorrect answer while another thread was
    in the middle of inserting or removing elements into the ArrayList by another
    thread), then you would synchronize access here as well.


    This section integrates some of the ideas already presented. The concept of locking
    is fundamental to understanding threading, and you will gain a lot by paying careful
    attention here.


    Locking Objects


    You lock objects all the time in everyday life. When you go the movies, you might
    “lock” your seat by leaving your coat on it. Even if you leave the seat to buy
    some popcorn, it is understood that no one should sit down in that seat. The act
    of leaving your coat on the seat effectively marks the seat for your exclusive
    use until you choose to release it.


    Any Java object can be claimed for exclusive use. This is one of the explicit
    ways that Java supports multithreading. Java further supports multithreading by
    allowing objects to broadcast when they are freed and by forcing threads that
    want a locked resource to become inactive until those resources are freed.


    If an object is not explicitly claimed, it is open for any thread’s use. Similarly,
    a seat in a movie theater that is not explicitly claimed can be taken at any time.
    This means that if you leave your seat to buy some refreshments and don’t lock
    the seat by leaving your coat on it, then you shouldn’t be surprised if someone
    else has claimed your seat when you get back.


    Even if this strategy has worked in the past, it is not thread-safe for future
    use. The same is true in Java. Unless your classes are made explicitly thread-safe,
    the fact that they have been uncorrupted in the past is no guarantee that they
    will not be corrupted in the future.


    There is a second level of depth to this metaphor. Someone might take your movie
    theater seat anyway, even though your coat is on it. The same is true in Java.
    A locked object can be violated if the thread that is modifying it does not respect
    synchronization.


    For example, suppose you have a method that synchronizes on a member variable:
    public void goodMethod() {


    synchronized (myObject) {


    //do stuff to myObject


    }


    }


    A second method could modify myObject if it chooses not to synchronize on myObject.


    Synchronizing on an object means “I’ll respect other people’s locks on this object,
    and I hope they respect mine.” However, it is unenforced. Thus, the following
    example would refuse to respect the synchronization established in goodMethod,
    and would execute without complaint.


    This could cause problems if badMethod modifies myObject, as other threads that
    have synchronized on myObject would be expecting to have exclusive access to myObject.


    public void badMethod() {


    //do stuff to myObject


    }


    Of course, these methods’ names don’t really imply that one way is “good” and
    another is'
  trans: "\n如图 4-3 所示，IceCreamMan 在自己的线程中等待客户。每个 Child 对象也都在各自的线程中。Child 对象通过将 IceCreamDish\
    \ 交给 IceCreamMan 来与之交互，然后它们退出 CPU 并等待。IceCreamMan 准备 IceCreamDish，这是与该 IceCreamDish\
    \ 关联的 Child 需要唤醒并吃掉其 IceCream 的信号。\n\n**图 4-3.** *等待客户的 IceCreamMan* 等待总结\n\n\
    需要资源的线程会在你没有特别要求的情况下自动暂停。相比之下，因调用`yield`、`wait`或`sleep`而暂停的线程，则是程序员明确要求其暂停的。无论哪种情况，最终都会导致线程暂停执行。\n\
    \n对于因等待资源可用而暂停的线程，以及让出 CPU 给其他线程的线程，程序员无法知道线程何时会恢复处理——对于前者，它会在资源可用时恢复；对于后者，则由\
    \ JVM 线程调度器决定。如果你调用不带任何参数的`wait`，你将不知道线程何时会恢复处理——这取决于另一个线程通知它可以继续操作。然而，如果你调用带时间限制的`wait`，\n\
    \n5165CH04.qxd 11/16/05 12:11 PM 第 87 页\n\n第 4 章 ■ 线程\n\n**87**\n\n你就会知道线程会在收到通知时，或在时间限制到期后不久恢复处理。请记住，时间限制无法严格执行；JVM\
    \ 会至少按照你请求的时间暂停线程，并尽力在时间限制到期后调度该线程，但线程恢复的确切时间无法保证。\n\n如果你调用`sleep`，你会知道线程会在时间限制到期后不久恢复处理——同样，时间限制无法严格执行。回到冰淇淋的例子，想象一下小莎莉终于引起了冰淇淋小贩的注意并给了他一些钱，但她还没有真正选择口味。如果莎莉让出\
    \ CPU（yield），那么她会自愿让开，让另一个孩子尝试，但她确信冰淇淋小贩不会卖掉她明确锁定的蛋筒。如果实际上没有孩子感兴趣，那么她会重新加入，并让她的蛋筒装满冰淇淋。\n\
    \n如果莎莉决定休眠（sleep），就好像她为蛋筒付了钱，但将选择延迟最多 1 分钟——比如说，等她弟弟到来。一分钟后，她会再次尝试（无论弟弟是否出现）。当她最终引起冰淇淋小贩的注意时，她会确信她锁定的蛋筒仍然在那里。但仅仅因为莎莉决定一分钟到了，并不意味着她能立即拿到她的蛋筒——在莎莉的一分钟结束时，可能另一个孩子正在装他的蛋筒。每当莎莉无法引起冰淇淋小贩的注意时，她就会被阻塞。在上一个例子中休眠了\
    \ 1 分钟后，她现在发现冰淇淋小贩正在服务另一个孩子。虽然她仍然拥有她蛋筒上的锁，但她并不拥有冰淇淋小贩上的锁，因此被阻塞，直到她能获得那个锁（同时她的弟弟可能在此期间出现）。\n\
    \n然而，如果莎莉必须等她父亲给她送钱，那么她没有锁定任何蛋筒，等到钱送来时，所有的蛋筒可能都卖完了。\n\n**锁**\n\n*锁*是独占使用的令牌。每个\
    \ Java 对象都有一个。可以把锁想象成在任何对象上贴一张便条，声明该对象归你的线程独占使用。通过声明一个对象的锁，你的线程告诉其他方法（那些尊重同步的方法）在你释放锁之前，不要以任何方式修改该对象。尊重同步的方法是指对相关对象进行同步的方法。\n\
    \n在 Java 中，你可以通过对一个对象进行同步来锁定它。考虑以下示例：\n```java\npublic void addElement(Object\
    \ item) {\n    synchronized (myArrayList) {\n        //执行操作\n    }\n}\n```\n这告诉\
    \ JVM，其他线程不应修改`myArrayList`对象。当然，这仅适用于同步方法。例如，在以下示例中，方法`elementExists`可能不需要同步访问，因为它是一个只读操作：\n\
    ```java\npublic boolean elementExists(Object item) {\n    return myArrayList.contains(item);\n\
    }\n```\n\n5165CH04.qxd 11/16/05 12:11 PM 第 88 页\n\n**88**\n\n第 4 章 ■ 线程\n\n然而，如果要求`elementExists`绝对准确（即，当另一个线程正在向\
    \ ArrayList 中插入或删除元素时，你无法承受得到错误答案的后果），那么你也需要在此处同步访问。\n\n本节整合了之前已经介绍的一些概念。锁的概念是理解线程的基础，在此处仔细关注将让你受益匪浅。\n\
    \n锁定对象\n\n在日常生活中，你一直在锁定对象。当你去看电影时，你可能会把外套留在座位上“锁定”你的座位。即使你离开座位去买爆米花，大家也明白不应该有人坐在那个座位上。把外套留在座位上的行为有效地标记了该座位供你独占使用，直到你选择释放它。\n\
    \n任何 Java 对象都可以被声明为独占使用。这是 Java 支持多线程的明确方式之一。Java 还通过允许对象在被释放时广播通知，并强制想要锁定资源的线程在资源被释放前变为非活动状态，来进一步支持多线程。\n\
    \n如果一个对象没有被明确声明，那么它对任何线程都是开放的。类似地，电影院里没有被明确声明的座位随时可能被占用。这意味着，如果你离开座位去买零食，并且没有通过留下外套来锁定座位，那么当你回来时，如果别人占用了你的座位，你也不应感到惊讶。\n\
    \n即使这种策略过去有效，也不能保证它在未来是线程安全的。Java 也是如此。除非你的类被明确地设计为线程安全，否则它们过去未被破坏的事实并不能保证它们将来不会被破坏。\n\
    \n这个比喻还有第二层深度。即使你的外套在座位上，也可能有人强行占用你的电影院座位。Java 也是如此。如果修改锁定对象的线程不尊重同步，那么该锁定对象就可能被违反。\n\
    \n例如，假设你有一个方法对一个成员变量进行同步：\n```java\npublic void goodMethod() {\n    synchronized\
    \ (myObject) {\n        //对 myObject 执行操作\n    }\n}\n```\n第二个方法如果选择不对`myObject`进行同步，就可以修改`myObject`。\n\
    \n对一个对象进行同步意味着“我会尊重其他人对这个对象的锁，也希望他们尊重我的锁。”然而，这并没有强制力。因此，以下示例会拒绝尊重`goodMethod`中建立的同步，并且会毫无怨言地执行。\n\
    \n如果`badMethod`修改了`myObject`，这可能会引发问题，因为其他已对`myObject`进行同步的线程会期望对`myObject`拥有独占访问权。\n\
    ```java\npublic void badMethod() {\n    //对 myObject 执行操作\n}\n```\n当然，这些方法的名称并不意味着一种方式是“好的”而另一种是\n"
- fmt: "# Locking Class Instances\n\nJava provides a mechanism for locking classes\
    \ as well as objects. This can be a little confusing, but the concept is actually\
    \ very straightforward. A class is just an object, used to create other objects,\
    \ just as an axe is an object for creating firewood.\n\nThe JVM generates a `Class`\
    \ object when your program initially loads for every class the program uses. Per\
    \ JVM, there is a single `Class` object for all of the instance objects of a given\
    \ class. You have limited access to the `Class` object. Because the `Class` object\
    \ is itself an object, you can lock it just as you can lock any other object.\
    \ What makes the `Class` object interesting is its capability to contain static\
    \ variables and static methods.\n\nStatic variables are universal for every object\
    \ of a class, which means that a single instance is shared by every object of\
    \ that class. For example, for objects of the class `McBurgerPlace`, `chiefExecutiveOfficer`\
    \ is a static member variable, because it is common to all. No matter which `McBurgerPlace`\
    \ you are eating in, it shares the same `chiefExecutiveOfficer` with every other\
    \ `McBurgerPlace`. If any `McBurgerPlace` restaurants were to change the `chiefExecutiveOfficer`,\
    \ every other `McBurgerPlace` would instantly be able to sense that change.\n\n\
    A static method is universal for every object of a class, which means that the\
    \ single method is shared by every object of the class, per JVM. For example,\
    \ objects of the class `McBurgerPlace` might have `createFranchise` as a static\
    \ member method, assuming that creating a franchise happens at the corporate level.\
    \ Any `McBurgerPlace` object can create a new franchise by calling corporate headquarters\
    \ and asking to do so. No matter which `McBurgerPlace` store you are talking about,\
    \ the exact same `createFranchise` method is called.\n\nUsing static methods is\
    \ different from using instance methods in one very important way: The method\
    \ exists on the class, not the objects. The proof of this lies in the fact that\
    \ you can create a franchise, even if there is no `McBurgerPlace` store present,\
    \ by getting in touch with corporate headquarters directly.\n\nSo what does all\
    \ of this have to do with locking? Assume that you want to lock a given `McBurgerPlace`\
    \ for exclusive use while executing a method. For example, if your `McBurgerPlace`\
    \ (say the one on High Street) has a `waxFloor` method, then you don’t want to\
    \ be doing anything else while waxing the floor—after all, lawsuits abound.\n\n\
    How do you enforce this exclusivity? In the real world, you make sure that nothing\
    \ else is happening in that particular store while waxing is in progress: no making\
    \ burgers, no selling French fries, no preparing Joyful Meals. Almost every activity\
    \ waits until you are done waxing the floor. To achieve the same exclusivity in\
    \ Java, you synchronize the method in question by putting the keyword `synchronized`\
    \ in the method declaration: `public synchronized void waxFloor()`\n\nThis means\
    \ that any other synchronized methods called on the `McBurgerPlace` on High Street\
    \ will wait until the floor has been waxed.\n\n> **Note:** Unsynchronized methods\
    \ do not respect synchronized methods. Thus, an unsynchronized method can be executed\
    \ at any time. It is important to make sure that such methods can do no damage\
    \ in your object’s state. For example, `countMoney` is probably safe to leave\
    \ unsynchronized because it cannot interfere with the waxing of the floor. The\
    \ method `wipeDownTables` should probably be synchronized, however, because it\
    \ does interfere with the floor waxing.\n\nThis exclusivity has nothing to do\
    \ with other objects of the `McBurgerPlace` class. For example, the `McBurgerPlace`\
    \ on Fifth Street is free to make burgers, sell French fries, and so forth, even\
    \ if the `McBurgerPlace` on High Street is currently waxing the floor. Why shouldn’t\
    \ they?\n\nWhat about dealing with an activity that does affect other objects?\
    \ For example, what about receiving the `chiefExecutiveOfficer`? Obviously, you\
    \ only want a single `McBurgerPlace` to receive the `chiefExecutiveOfficer` at\
    \ a given time: She can’t be in two places at once. How do you represent this\
    \ exclusivity of access in Java? For that matter, how do you control access to\
    \ her? You don’t want one store to interrupt her while she is in the middle of\
    \ talking to another store.\n\nThere are two steps in the solution to this dilemma.\
    \ First, make sure that the `chiefExecutiveOfficer` variable is static—that is,\
    \ it exists only at the class level. You can achieve this by using the keyword\
    \ `static` when declaring the `chiefExecutiveOfficer` variable at the class level:\n\
    \n```java\nprivate static Object ceo = new Object();\n```\n\nThe second step is\
    \ to synchronize the static method that accesses the `chiefExecutiveOfficer`,\
    \ like this:\n\n```java\npublic static synchronized Object receiveCeo () {\n \
    \   return ceo;\n}\n```\n\nBecause the method is static, this synchronization\
    \ occurs at class level rather than at instance level.\n\n## Locking Objects Directly\n\
    \nThere is a second way to lock objects (both instance objects and class objects).\
    \ You can synchronize on the object you want to lock explicitly. For example,\
    \ imagine that your `McBurgerPlace` class has a `getSoda` method that requires\
    \ exclusive control of the `sodaFountain` member variable. You can lock the entire\
    \ `McBurgerPlace` object, or you can lock just the `sodaFountain` member variable:\n\
    \n```java\npublic void getSodaEfficiently() {\n    synchronized (sodaFountain)\
    \ {\n        //do Stuff\n    }\n}\n```\n\nLocking a member variable object is\
    \ like forcing only those people who want to use the `sodaFountain` to wait while\
    \ you are using the `sodaFountain`, as opposed to forcing everyone in the entire\
    \ store (including those who only want to purchase a burger) to wait.\n\nSynchronizing\
    \ a method is a form of locking an object—specifically, the `this` object. Synchronizing\
    \ a method is really just shorthand for synchronizing on the `this` reference\
    \ object.\n\nThus, this code presented in Listing 4-2 is equivalent to the code\
    \ presented in Listing 4-3.\n\n**Listing 4-2.** *Synchronizing a Method*\n\n```java\n\
    public synchronized void myMethod() {\n    //code\n}\n```\n\n**Listing 4-3.**\
    \ *Synchronizing on the `this` Reference Object*\n\n```java\npublic void myMethod()\
    \ {\n    synchronized (this) {\n        //code\n    }\n}\n```\n\nLocking some\
    \ object other than `this` can provide more concurrency than synchronizing a method\
    \ because it allows other blocks of code that are synchronized on different objects\
    \ to work concurrently. But efficiency, alas, is in the eye of the beholder. If\
    \ an individual method needs to obtain multiple locks, then the steps of locking\
    \ and unlocking the multiple locks can lead to more overhead than synchronizing\
    \ the method.\n\nIn Listing 4-4, `synchThisObjectExample` is more efficient than\
    \ `synchAllLocksExample` because it doesn’t have the overhead of locking and unlocking\
    \ three times. If your object is carefully constructed not to allow unsynchronized\
    \ access to the resources you need to lock, then synchronizing methods is probably\
    \ the simpler approach.\n\n**Listing 4-4.** *Synchronization Example*\n\n```java\n\
    1 public class SynchExample {\n3     private Resource resourceOne = new Resource();\n\
    4     private Resource resourceTwo = new Resource();\n5     private Resource resourceThree\
    \ = new Resource();\n6\n7     public synchronized void synchThisObjectExample()\
    \ {\n8         resourceOne.value = -3;\n9         resourceTwo.value = -2;\n10\
    \        resourceThree.value = -1;\n11    }\n13    public void synchAllLocksExample()\
    \ {\n14        synchronized (resourceOne) {\n15            resourceOne.value =\
    \ -3;\n16        }\n18        synchronized (resourceTwo) {\n19            resourceTwo.value\
    \ = -2;\n20        }\n21        synchronized (resourceThree) {\n22           \
    \ resourceThree.value = -1;\n23        }\n24    }\n25 }\n```"
