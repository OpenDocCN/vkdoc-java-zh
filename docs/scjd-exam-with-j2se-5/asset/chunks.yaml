    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **19**


    does occur, raise the issue as a design decision and document all the assumptions
    you made to deal with the problem. Be certain to complete the design decisions
    document, because it is the only chance the test allows you to defend your submitted
    project.


    ■**Tip** It is worth noting that in the Sun assignment, as with projects in real
    life, there are sometimes several solutions to any given problem. It is also possible
    that for *every* possible solution there will be reasons why that particular solution
    is not optimal. You should not spend too much time trying to find the “one perfect
    solution”—it may not exist. Sun has deliberately left enough vagueness in the
    assignment instructions that there are very few areas where candidates have limited
    choices. In all other cases, it does not matter so much what choice is made, but
    it does matter how you came to your choice, which should be detailed in your design
    decisions document.


    **Java Coding Conventions**


    One of the common goals in our industry is the ability to hand over the project
    to someone else—let them do any maintenance in the future, as you won’t be available
    (you will be working on more exciting projects and going on vacation).


    To meet this goal, the code we write needs to be formatted in such a way that
    you can hand it over to somebody else, and they will happily accept it. It will
    not do your reputation any good if you hand over the code, and the other person
    throws it all away as being incomprehensible.


    In the same way, it would not do us any good if we did not organize this book
    into chapters, paragraphs, and sentences—if you can’t read this book, you won’t
    learn much from it.


    The developers of Java, C, and C++ deliberately avoided forcing coders to follow
    a specific coding convention—there are syntactical requirements, but as long as
    you meet them, the code can appear on a printed page any way you like it to. For
    instance, consider the following code snippet:


    public class MyTest {


    public static void main(String[] args) {


    System.out.println("Hello");


    }


    }


    That code is interpreted by the Java compiler in exactly the same way as public


    class


    MyTest{public static void main(String


    z[]){System.out.println("Hello");}}


    You’ll undoubtedly agree that the first format is far more readable than the second.


    While it is easy to agree that a code-formatting style should be followed, it
    is less easy to agree on the code-formatting style itself. For example, often
    one person prefers to have the brace ({) at the end of an existing line; another
    prefers to have the brace on its own line. Both coders can have compelling arguments
    for their particular style, but realistically only one style


    5165CH02.qxd 11/16/05 12:09 PM Page 20


    **20**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    In the workplace, management will usually specify which particular style must
    be used.


    For this book, and for the SCJD assignment, we recommend you use the Sun Code
    Conventions for the Java Programming Language, which you can download at http://java.sun.com/


    docs/codeconv/. Sun has specified 11 areas where they believe coding guidelines
    are needed, and these can be grouped into the following major categories: naming
    conventions, file layout, source code format, and comment format. We introduce
    each of these categories next.


    **Naming Conventions**


    The Sun Code Conventions specify different naming conventions for packages, classes
    and interfaces, methods, variables, and constants.


    For all of the naming conventions, you should try to avoid using abbreviations,
    except where the abbreviation is more commonly recognized than the complete word.
    At the same time, you should try not to make your names too long, or they will
    quickly become tedious to read and write. Consider the variable names shown in
    Table 2-2.


    **Table 2-2.** *Variable Naming Examples*


    **Contents**


    **Good Variable Name**


    **Poor Variable Name**


    The balance of an account


    accountBalance


    usersCurrentAccountBalance (too long)


    ab (not a common abbreviation; doesn’t


    mean much)


    HTML editor class


    HtmlEditor


    HyperTextMarkupLanguageEditor


    (“HTML” is a common abbreviation, so


    using it will enhance the readability of


    this class name)


    Package Naming Conventions


    Package names start with your fully qualified domain name, written in lowercase
    and in reverse. So if you worked for a company with the domain name example.com,
    then your package names should start with the same name in reverse (com.example).


    From that point on, you would follow your company’s naming conventions. A sample
    naming convention might be to use the project name, followed by a conceptual grouping
    of classes. For instance, as we are working on the SCJD project, which contains
    a GUI client, we could have a combined package name of com.sun.edu.scjd.gui (for
    simplicity though, we have used the base package name of sampleproject throughout
    our project, and the GUI code is therefore in package sampleproject.gui).


    ■**Tip** In the real assignment, Sun will typically specify a package name for
    at least one class. Therefore, you do not need to be concerned that you do not
    have an existing domain name that you can use as your base package name.


    5165CH02.qxd 11/16/05 12:09 PM Page 21


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **21**


    Class and Interface Naming Conventions


    Class and interface names should always start with a capital letter, and should
    be a noun (they should describe an object, not an action on the object). For example,
    “Book” might be used as the name of the class containing information about a book.


    It is common to combine two or more nouns or an adjective and a noun together
    to form the class name, in which case CamelCase is used (the first letter of each
    word is capitalized, producing the undulating pattern associated with camels).
    For example, “SocketFactory”


    might be used as the name of a class that creates socket connections.


    ■**Tip** You should try to have only one responsibility for each class. For instance,
    a class that is responsible for creating an RMI connection to a server should
    not also be responsible for displaying data to the end user. If you can maintain
    “one responsibility per class,” you will find it easier to name your classes.
    This provides a major benefit later when it is time to modify or maintain your
    classes—the separation of responsibilities and clear class names makes it much
    easier to determine which classes need to be modified.


    Method Naming Conventions


    Method names should always start with a lowercase letter, and should begin with
    a verb (they should describe an action on the object). For example, within our
    DVD class, the method name getLeadActor indicates that we can call this method
    to get the name of the lead actor for the DVD.'
