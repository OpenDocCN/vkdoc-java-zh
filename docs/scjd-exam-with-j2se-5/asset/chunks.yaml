    **The JRadioButton Component**


    Radio buttons are small buttons that are logically grouped together, but only
    one of the group can be active at any given time. This is similar to the way a
    radio with buttons for several pre-set stations should only have one button pressed
    at any given time—you can only listen to one station at a time.


    A simple constructor for a JRadioButton could be


    JRadioButton serverButton = new JRadioButton("Server"); Other constructors allow
    for an icon to be used instead of or as well as the text, setting the initial
    state of the radio button, and setting an Action for the radio button.


    As with the JButton, an ActionListener can be added to each JRadioButton. You
    might use this if you needed to enable or disable fields dependent on which button
    a user clicked.


    However, it is not always necessary to have an ActionListener—if you don’t care
    about which button is clicked until after the user performs some other action,
    then you can use the isSelected method to check the user’s choice.


    For JRadioButtons to be effective, several of them should be logically grouped
    together, so that only one of the logical group can be selected at any given time.
    You do this by creating a ButtonGroup, and adding the radio buttons to it:


    ButtonGroup applicationMode = new ButtonGroup();


    applicationMode.add(serverButton);


    A complete example of JButtons and JRadioButtons is demonstrated in Listing 8-6,
    and the window it would create is shown in Figure 8-17.


