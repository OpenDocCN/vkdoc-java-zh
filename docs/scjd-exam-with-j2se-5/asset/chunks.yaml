    关于 `DBSocketRequest` 的最后一点是，`DBSocketRequest` 是我们实现应用协议的地方。我们已经将协议与实际 socket `DVDSocketServer`
    分离开来。


    **应用协议**


    socket 客户端向 socket 服务器发送一个序列化对象。但是服务器如何知道如何响应该对象呢？从技术上讲，序列化对象只是字节流形式的数据；表面上它并不传达操作信息。这就是我们需要一个*协议*（即一组规则）的地方，该协议定义了我们的客户端如何与服务器交互。


    从高层次来看，我们的协议将按如下方式工作：


    **1.** 客户端将向服务器发出请求，例如租借或归还租赁。


    **2.** 服务器将执行该请求。


    **3.** 结果状态或返回值将发送回客户端。


    仔细思考上述列表，应该会引出以下两个问题：“服务器将如何解释请求？”以及“结果将如何发送回客户端？”


    Denny''s DVDs 应用程序采用了一种封装方法。请求被封装在命令对象中，结果被封装在结果对象中。让我们仔细看看命令对象和结果对象。


    命令枚举


    `DvdCommand` 类通过将客户端请求存储为 `SocketCommand` 成员 `commandId` 来封装该请求。当 GUI 客户端调用 `DVDSocketClient`
    上的某个 `DBClient` 方法时，socket 客户端会设置 `commandId` 属性并将其发送到 socket 服务器 `DVDSocketServer`。


    由于 `DVDCommand` 是通过网络发送（或编组）的，因此它必须是可序列化的。当服务器接收到 `DVDCommand` 对象时，它会使用 `commandId`
    来调用 `DVDDatabase` 上的相应方法，这是对服务器的本地调用。请求所需的任何参数（例如，UPC 值）都通过 `DVD` 类成员传递。`regex`
    属性专门用于 `find` 方法。


    清单 7-4 展示了接受 `SocketCommand` 枚举 ID 的构造函数（参见侧边栏）。

