- fmt: '# The Goal of the SCJD Exam


    The goal of the SCJD exam is to validate your understanding of the most important
    Java skills, including threading, RMI, sockets, serialization, file I/O, and Swing.
    Each assignment project can be unique, testing these features to different degrees.
    For example, while you must write a server capable of handling concurrent requests,
    the interface provided might change which classes you allow multiple threads to
    run on. Or your requirements could call for strict search requirements versus
    more general searching ability. This book gathers together everything you need
    to know about all the relevant topics and integrates in the relevant changes in
    J2SE 5.


    Sun also requires you to use a current JDK (one that has not been superseded by
    a newer JDK by more than 18 months) for developing your solution, ensuring that
    candidates stay current with the latest features of the JDK. A list of release
    dates may be found at `http://java.sun.com/j2se/codenames.html`.


    ## Downloading the Assignment


    You can register for the assignment and examination by visiting `http://www.sun.com/training/certification/java/java_devj2se.html`
    in the United States. Many other countries also allow online registration—you
    can view contact details at `http://www.sun.com/training/world_training.html`.
    After paying for the assignment, you will receive an e-mail from Sun telling you
    exactly how to download the Java archive (JAR) files that contain the assignment
    instructions. Receiving this e-mail may take a few days, or it may happen that
    same day. As soon as you receive the JAR files, make a couple of copies and store
    them safely. It is very expensive to get a second copy of the assignment to match
    the subject of this section.


    **Tip** The Sun Education web site lists the web address where you may download
    your assignment. You may be able to download your assignment before you have received
    an e-mail specifying that your account has been configured for downloading.


    ## Documentation and Questions


    You are probably going to have questions regarding the requirements of the exam.
    Generally, Sun will not answer these questions. This may be because they want
    to see how well you can choose between different solutions (and describe why you
    made your decisions). It may be because they are trying to emulate real-world
    conditions where the client is not always willing to communicate. It may even
    be because answering questions for each test applicant is an untenable task. In
    any case, it is very important that you articulate your questions and deal with
    them in the documentation you must create as part of your assignment deliverables.
    If nothing else, you should document your assumptions and choices. For more help,
    we suggest using the excellent resources available at JavaRanch (`http://www.javaranch.com`)
    and the various helpful Java certification groups on Yahoo.


    Chapter 2 provides good suggestions on how to work with Javadoc-style comments
    and offers some industry best practices. Don’t use outlandish naming conventions
    or even Hungarian notation. If possible, use whatever style the material itself
    uses. As far as the SCJD exam is concerned, Sun really wants you to color inside
    the lines.


    ## Who Should Read This Book


    This book is for the working Java professional who needs an introduction to J2SE
    5 and has an eye toward learning the material needed to pass the Sun Certified
    Java Developer exam. The SCJD exam gives programmers a slice of what they can
    expect on a real-world assignment, and you have to be ready for that challenge.
    A developer who has passed, or could pass, the Sun Certified Java Programmer (SCJP)
    exam will feel at home here. A developer with less than six months of experience
    should probably supplement this book with some of the excellent Java books available
    from Apress or other publishers.


    This book describes in detail many features of the JDK, some of which have been
    part of standard Java for many years, and some of which have only been introduced
    in JDK 5. The only assumption we have made in this book is that the reader will
    be familiar enough with Java to pass the SCJP exam—so we do not need to spend
    time explaining the basics of the language (for example, the difference between
    an `int` and a `long`). However, we do go into details of changes to the language,
    so candidates who have not yet learned the JDK 5 language enhancements can discover
    them here.


    ## About This Book


    This book addresses the SCJD certification, which is one of several Java certification
    exams offered by Sun Microsystems. The SCJD and SCEA (Sun Certified Enterprise
    Architect) certificates require candidates to complete projects, whereas the other
    certifications only require theory-based exams in which the candidate typically
    has multichoice questions to answer. As far as programming goes, the SCJD exam
    is the most challenging of the exams that Sun offers, and that is precisely why
    it is the focus of this book.


    This book is divided into three parts. Part 1 focuses on general development considerations
    and outlines a sample project. Part 2 teaches necessary concepts from the ground
    up, while facilitating both understanding and implementation. Part 3 concludes
    the book with a discussion of design and implementation decisions made and possible
    alternative paths.


    A sample project is provided that offers challenges similar to those you’ll find
    on the SCJD exam while introducing and taking advantage of the relevant new features
    of J2SE 5. Each topic related to the exam is explained in detail, and trade-offs
    are considered. Where appropriate, parallel development paths are explored and
    implemented.


    Where applicable, chapters briefly discuss the design patterns being used and
    offer a brief explanation of those patterns. We strongly encourage you to purchase
    or download some pattern resources. Various web sites offer insightful tutorials,
    including the Sun site (`http://www.sun.com`) and TheServerSide.com (`http://www.theserverside.com`).
    There are also various excellent books on the topic, including *Head First Design
    Patterns*, by Elisabeth Freeman, Eric Freeman, Bert Bates, and Kathy Sierra (O''Reilly,
    2004).


    Throughout this book, we present numerous examples that aid in the development
    of a real-world Java application. Each chapter contributes directly to this application
    by addressing a critical topic such as threading, Swing, or networking. The text
    explores questions that naturally arise in these topics and explains how the challenges
    can be met. More important, the trade-offs and implications of these choices are
    discussed.


    - **Chapter 1, “Introduction.”** This chapter is a general introduction provided
    to help you decide if this book meets your needs. It lays out the structure of
    the educational program to follow, introduces the goals of the exam, and focuses
    the technology discussions to follow.

    - **Chapter 2, “Project Analysis and Design.”** This chapter details basic project
    considerations such as directory structure, package development, coding conventions,
    ReadMe files, and general approaches to starting a project for the SCJD exam.

    - **Chapter 3, “Project Overview.”** This chapter introduces the sample project,
    Denny’s DVDs. This application requires that you develop classes to access a file
    in a database-like manner, build a Swing user interface, and design a networking
    layer. It is important to read this chapter carefully because it helps to define
    exactly what the project is trying to accomplish.'
