    由于你应该在参加考试之前提交作业，因此你应在计划提交作业的日期和参加考试的日期之间留出几个工作日，以防你需要先请求许可。


    **总结**


    我们希望你喜欢这本书。更重要的是，我们希望你现在已经准备好完成 SCJD 考试。你已经接触了大量材料，将所学的一切融会贯通是一项艰巨的任务。毫无疑问，你还有一些悬而未决的问题，例如“我的应用程序测试得当吗？”以及“我的应用程序在这种场景下会如何表现？”

