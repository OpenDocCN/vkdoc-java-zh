    C H A P T E R 3 ■ P R O J E C T OV E R V I E W


    Because it is possible for multiple clients to connect over a network and attempt
    to modify the same records simultaneously, the application must be thread-safe.
    We discuss thread safety in more detail in Chapter 4\. For now, it will suffice
    to know that thread-safe code protects an object’s state in situations where multiple
    clients are accessing and modifying the same object. It is your responsibility
    to make sure that your certification submission is thread-safe, as you’ll learn
    in Chapter 4 in the section, “Understanding Thread Safety.”


    There is no need to notify clients of *nonrepeatable reads—* that is, it is not
    a requirement that all clients viewing a record that has been modified be notified
    of the modification. However, if two employees attempt to rent the same DVD simultaneously,
    then only one customer will get the DVD. This is referred to as *record locking.*
    In Chapter 4, record locking will be explored in more detail (with an example
    given in Chapter 5).


    The application should be able to work in a non-networked mode. In this mode,
    the database and user interface run in the same virtual machine (VM), no networking
    is performed, and no sockets should be created. Later, in Chapter 5 (which covers
    networking), separate implementations for both RMI and sockets are demonstrated.


    **Summary**


    In this chapter, we introduced the public interface of Denny’s DVDs rental-tracking
    program.


    We discussed the project requirements and each method of the interface that you
    will be responsible for implementing. All of the code for the sample application
    can be obtained from the Source Code section of the Apress web site (http://www.apress.com).


    The new system should be accessible by multiple clients either across a network
    or locally. The GUI should be intuitive and easy-to-use, and the application must
    be thread-safe.


    The remainder of this book examines the requirements covered in this chapter.
    Denny’s DVDs rental-tracking program will evolve as each new concept is introduced.


    **FAQs**


    **Q** The Sun assignment instructions tell us that we must include the instructions
    and data file in our submission. Why is this needed?


    **A** There are multiple assignments available from Sun, and multiple versions
    of these assignments. Some of the changes in the assignment versions include variations
    in the data file format, the provided interface, the required class names, or
    any combination of these variations. Providing both the instructions *you* implemented
    and *your* data file ensures that the assessor will be comparing your submission
    with your instructions, and not anyone else’s. Likewise, this means that the assessor
    is guaranteed to receive the correct instructions at the same time he or she receives
    your submission.


    **Q** The provided interface does not include an exception I would like to throw.
    Can I add it?


    **A** No. As stated in the instructions, other applications are expecting to use
    this interface, so if you add exceptions, the other application will need to catch
    them. This could prevent the other application from working.


    5165CH03.qxd 11/16/05 12:10 PM Page 67


    C H A P T E R 3 ■ P R O J E C T OV E R V I E W


    **67**


    **Q** I think this application will work better if I add another method to the
    interface. Can I do this?


    **A** You can; however, we advise against it for the Sun assignment. Adding new
    interface methods will break the contract between the data formats and user interface.
    Additionally, if you do this on the actual assignment you may end up failing.
    A better approach is to add methods to the implemented classes. We encourage you
    to add class methods (that is, not interface methods provided by Sun) or to modify
    implementations as a way to better understand the project and source code.


    **Q** How similar is this chapter’s example to the one Sun will provide?


    **A** There is no guarantee what future exams will look like from Sun, but this
    sample demonstrates the concepts required to achieve the Java developer certification,
    and it also introduces new features in J2SE.


    **Q** How should I use the provided code samples?


    **A** The completed version of the Denny’s DVDs system is available for download.
    Each chapter will describe the evolution of the project from the required DBClient
    interface developed in this chapter to the remainder of the application. As you
    read the book, refer to the relevant section of the code base in order to understand
    the full implementations. Chapter 9 explains in detail how to compile and execute
    the entire Denny’s DVDs system in a manner similar to the way your actual Sun
    submission will need to be executed.


    An alternative approach is to study the sample project source code first and then
    read the book to provide an explanation for the design choices made and how those
    choices relate to similar decisions you will encounter while developing the actual
    Sun certification project. We recommend reading the book first and then referring
    to the code, but the alternative approach of reading the code and referring to
    the book should also produce successful results. It really depends on which approach
    makes more sense for you and your natural learning methods.


    **Q** Can I add features not discussed in this book?


    **A** Of course you are free to modify the project and make it more sophisticated.
    In fact, inquisitiveness and a sense of experimentation are very important qualities
    for a software engineer. However, the project has been carefully designed with
    two goals in mind. The first and more important goal is to cover all of the concepts
    required for the SCJD exam. So if you do decide to ad-lib, keep in mind the purpose
    of the sample project. The second goal is to introduce the new features of J2SE
    5, such as autoboxing and generics.


