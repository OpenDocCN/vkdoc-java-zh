    ■**提示** 在服务器上运行的应用程序中，添加关闭钩子是处理关闭操作的一种好方法。无论你的代码调用 `System.exit`，还是用户点击关闭按钮，亦或是操作系统通知应用程序必须关闭，同一个钩子都会被执行。处理操作系统通知应用程序关闭的情况尤其有价值——考虑一下服务器运行在
    UPS（不间断电源）上但断电的情况。通常 UPS 会依靠电池供电运行一段时间，但电池只能维持那么久。因此，在电池电量可能耗尽之前，UPS 会向操作系统发送消息，通知其关闭。然后操作系统会向所有正在运行的应用程序发送消息，通知它们关闭。关闭钩子允许你的应用程序接收此消息并执行干净的关闭操作。


    **清单 8-32.** *关闭钩子代码*


    ```java

    package sampleproject.gui;


    import java.io.IOException;


    import java.util.logging.*;


    import sampleproject.db.*;


    public class CleanExit extends Thread {


    private Logger log = Logger.getLogger("sampleproject.gui"); public void run()
    {


    log.info("Ensuring a clean shutdown");


    try {


    DVDDatabase database = new DVDDatabase();


    database.setDatabaseLocked(true);


    } catch (IOException fne) {


    log.log(Level.SEVERE, "Failed to lock database before exiting", fne);


    }


    }


    }

    ```


    **J2SE 5 中的 Swing 变更**


    Sun 在最新版本的 J2SE 中对 Swing 进行了几项变更。其中一些改进可用于提供更完善的提交。我们将在本节中简要讨论它们。


    **改进 Swing 的默认外观**


    在 JDK 5 之前，如果你想在多个平台上为应用程序提供统一的外观，你必须使用 Metal 外观，其默认外观如图 8-37 所示。


    ![Image 54](img/index-309_1.png)


    ![Image 55](img/index-309_2.png)


    5165CH08.qxd 11/16/05 12:16 PM Page 290


    **290**


    第 8 章 ■ 图形用户界面


    **图 8-37.** *使用 Steel 主题的 Metal 外观示例* 在 JDK 5 中，Sun 修改了这种外观，如图 8-38 所示。


    **图 8-38.** *使用 Ocean 主题的 Metal 外观示例* 为了减少混淆，Sun 将这两种相同外观的版本分别命名为“Steel”和“Ocean”。


    如果你希望使用旧主题，可以设置以下系统属性：


    ```bash

    -Dswing.metalTheme=steel

    ```


    **皮肤外观**


    “皮肤”（也称为“主题”）是一种无需更改任何代码即可改变应用程序或网站外观的方式。这通常通过修改配置文件来实现。


    Sun 创建了 `javax.swing.plaf.synth.SynthLookAndFeel` 作为可皮肤化的外观，允许在文件中指定外观。这意味着你的用户可以修改此文件，使你的应用程序符合他们偏好的外观，而无需任何代码更改。


    **向 Swing 容器添加组件已简化** 在 JDK 5 之前，无法直接将组件添加到任何实现了 `RootPaneContainer` 的类中，即 `JApplet`、`JDialog`、`JFrame`、`JInternalFrame`
    和 `JWindow`。相反，你必须先获取内容窗格，然后将组件添加到其中。这导致代码看起来像这样：


    ```java

    JFrame theFrame = new JFrame();


    theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); Container thePane = theFrame.getContentPane();


    thePane.add(new JButton("Exit"));


    theFrame.pack();


    theFrame.setVisible(true);

    ```


    5165CH08.qxd 11/16/05 12:16 PM Page 291


    第 8 章 ■ 图形用户界面


    **291**


    大量使用实现 `JRootPane` 的类的用户并不需要使用存在的各种窗格——他们只需要向内容窗格添加内容。因此，在 JDK 5 中，Sun 重写了这些类的
    `add` 方法，使其按照大多数用户期望的方式工作。这允许我们将之前的代码重写如下：


    ```java

    JFrame theFrame = new JFrame();


    theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); theFrame.add(new JButton("Exit"));


    theFrame.pack();


    theFrame.setVisible(true);

    ```


    这减少了关于何时应该处理框架本身或面板的混淆，并使代码更具可读性。


    **总结**


    一个良好的界面设计将弥合用户与系统之间的鸿沟。通过使用可靠的设计模式，例如模型-视图-控制器（MVC）架构范式，你可以确保数据展示的变更对系统其余部分的影响最小。在表面层面上，最终用户很可能会根据界面的功能性来判断应用程序的质量，因此规划和设计一个高质量的系统前端非常重要。


    在本章中，我们介绍了 GUI 设计，并提供了一些示例，说明如何组合各种布局管理器和组件来实现你期望的设计。重要的是要认识到，开发 GUI 没有“唯一正确的方法”，因此你可以使用这里介绍的技术来开发你认为对你的指令有用的
    GUI。


    **常见问题解答**


    **问** 指令说明我只能使用 Swing 组件，但没有任何布局管理器属于 `javax.swing` 包——这会导致我失败吗？


    **答** 使用任何布局管理器都可以。但是，你不能在有 Swing 替代品的情况下使用 AWT 组件。例如，你不应该使用 `Button`，因为存在 Swing
    替代品：`JButton`。


    **问** Swing 是否取代了 AWT？


    **答** Swing 并不是 AWT 的替代品。Swing 建立在 AWT 中设定的模式和基础之上。Swing 和 AWT 组件可以在一定程度上混合搭配到任何界面中（但是，在
    Sun 的作业中只能使用 Swing 组件）。Swing 在性能和功能上都比 AWT 有了一些重大改进。因此，Sun 现在更强调 Swing 而非 AWT。因此，Swing
    是 SCJD 考试的必要部分。


    5165CH08.qxd 11/16/05 12:16 PM Page 292


    **292**


