    第 6 章


    ■ ■ ■


    使用 RMI 进行网络通信


    **本**章中，你将学习使用远程方法调用（RMI）实现完整网络解决方案所需的背景知识。为此，本章将涵盖 RMI，并在较小程度上涉及序列化。图 6-1 展示了网络解决方案在整个系统架构中的位置，它位于
    GUI 和数据层之间。


    **图 6-1.** *Denny 的 DVD 版本 2.0 的网络层*


    在完全理解 RMI 之前，熟悉序列化的一些细节非常重要，因为 RMI 依赖于这一特性。序列化可能是你在 Sun 认证 Java 程序员（SCJP）考试中已经熟悉的话题，但我们仍将简要介绍该主题。这些主题是本章将要阐述的一些宏观要点：


    • 理解 Denny 的 DVD 中的对象序列化


    • 评估使用 RMI 作为网络协议的优缺点 **163**


