    35                System.out.println(getName() + ": is working " + count);

    36            }

    37        }

    38    }

    39 }

    ```


    The starving thread never ran, as you can see in Figure 4-9.


    ![Image 12](index-122_1.png)


    **Figure 4-9.** *Output from the starvation example*


    > **Note** The exact output varies with each running of this application, as thread
