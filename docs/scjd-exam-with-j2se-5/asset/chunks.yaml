    在本章中，你将学习实现使用远程方法调用（RMI）的完整网络解决方案所需的背景知识。为此，本章将涵盖 RMI，并在较小程度上涵盖序列化。图 6-1 展示了网络解决方案在系统整体架构中的位置，它位于
