    **Listing 8-26.** *A Simple GridBagLayout Application Similar to Listing 8-25*


    import java.awt.*;


    import javax.swing.*;


    public class MyFrame {


    static GridBagLayout grid = new GridBagLayout();


    static GridBagConstraints constraints = new GridBagConstraints(); public static
    void main(String[] args) throws Exception {


    JFrame theFrame = new JFrame();


    theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); theFrame.setLayout(grid);


    constraints.anchor = GridBagConstraints.WEST;


    JButton one = new JButton("One");


    grid.setConstraints(one, constraints);


