- fmt: '# 排版后的内容


    Admittedly, the main reason for including NIO in the previous edition was just
    to demonstrate this cool new technology. Our primary examples (downloadable from
    the Apress web site) did not use NIO in the networking layer. Unfortunately, there
    was some confusion since many believed that the inclusion of NIO indicated that
    our proposed solution required NIO. It did not. For this reason, we have decided
    to drop the discussion of NIO in the current edition of this book to avoid any
    further confusion, but would like to make it clear that sockets or RMI are required
    for the networking layer but that channels can safely be used for plain old file
    I/O.


    ## Introducing the Sample Project


    Denny’s DVDs is a DVD rental store for a small community. The certification project
    requires that the application be built on a provided interface. Sun will include
    an interface as part of the assignment, and you will be responsible for implementing
    that interface and developing a fully featured application. Our sample project
    will take the same approach. We will imagine that the infamous Denny of Denny’s
    DVDs will define an interface that he expects the developer (i.e., you the reader)
    to implement. That interface, `DBClient.java`, will be our starting point for
    development. Figure 3.1 shows a UML use case diagram for the primary operations
    the system must support.


    **Note** The acronym *UPC* will be bandied around quite a bit, so a little background
    information may come in handy. UPC, which stands for Universal Product Code, is
    an official designation for a product, whether it be a book, a CD, or a DVD. It
    is a unique number identifying that product worldwide. For more trivia-related
    information on UPC (and related concepts such as European Article Numbering [EAN]
    and checksums), refer to such sites as Wikipedia (http://en.wikipedia.org/wiki/Main_Page)
    and the various online UPC databases. Of course, such a topic is way outside the
    scope of this book. For our purposes, UPC is a nice surrogate for a system-wide
    identifier or primary key.


    **Figure 3-1.** *Denny’s DVDs use case diagram*


    The operations in Figure 3.1 make up the public interface, `DBClient.java`, that
    the Denny’s DVDs application must implement. Here are descriptions of the interface
    methods:


    - `addDVD`—Requires a `DVD` object as an input parameter. Will add the `DVD` to
    the system if the UPC is unique; otherwise, will throw an exception.

    - `getDVD`—Given a UPC value for a DVD, this method should return the corresponding
    `DVD` object. A null object is returned if the UPC is not found in the database.

    - `modifyDVD`—Requires a `DVD` object with a UPC that exists in the database.
    Will overwrite an existing DVD with new DVD values. If the database does not contain
    a DVD with the supplied UPC code, then `false` is returned and the database is
    not updated.

    - `getDVDs`—Should return a collection of all the DVDs in the database. If there
    are no DVDs in the database, then an empty collection should be returned.


    **Note** The Denny’s DVDs system available for download comes with a starter database,
    which is referred to throughout the book’s examples.


    - `findDVD`—This operation should use a regular expression query as the input
    parameter. The supplied input parameter should match on multiple attributes with
    a regular expression query. The input parameter is the regular expression query,
    so the application must translate the user’s search criteria into a regular expression
    query prior to invoking this method. Transforming the user’s search criteria into
    a regular expression can be done either in the GUI or via some intermediate class,
    but not in the `findDVD` method itself. Of course, you must not require or expect
    the user to enter the regular expression syntax as the search criteria. A collection
    of DVDs should be returned.'
