    action. This is where we need a *protocol*, or set of rules, that defines how
    our client is to interact with our server.


    At a high level, here is how our protocol will work:


    **1.** The client will make a request, such as rent or return rental, of the server.


    **2.** The server will execute the request.


    **3.** The result status or return value will be sent to the client.


    Deliberating on the preceding list should lead to the following two questions:
    “How will the server interpret the request?” and “How will the result be sent
    back to the client?”


    The Denny’s DVDs application adopts an approach of encapsulation. The request
    is encapsulated in a command object and the result is encapsulated in a result
    object. Let’s take a closer look at the command and result objects.


    The Command Enum


    The DvdCommand class encapsulates the client request by storing it as a SocketCommand
    member, commandId. When a GUI client calls one of the DBClient methods on DVDSocketClient,
    the socket client sets the commandId property and sends it off to the socket server,
    DVDSocketServer.


    Since DVDCommand is sent, or marshaled, across the wire, it must be serializable.
    When the server receives the DVDCommand object, it uses the commandId to call
    the corresponding method on the DVDDatabase, which is a local call to our server.
    Any parameters (for instance, the UPC


    value) that are required for the request are passed in the DVD class member. The
    regex attribute is used exclusively for the find method.


    Listing 7-4 shows the constructors that take a SocketCommand enum ID (see the
    sidebar'
