    第 7 章 ■ 使用套接字进行网络编程


    **221**


    在 JDK 5 之前，`DvdCommand`类中的`commandId`变量通常会被定义为常量，形式如下：


    public final static int FIND = 0;


    public final static int RENT = 1;


    public final static int RETURN = 2;


    然而，这样做存在许多问题，包括：有人可能直接将`commandId`变量设置为一个不受支持的整数值，或者对常量进行不合逻辑的操作（例如尝试将它们相加）。此外，我们无法枚举这些模式的数量，而且如果尝试打印`commandId`变量的值，返回的将是一个数字——我们必须查阅文档或源代码才能确定这个数字的真正含义。


    JDK 5 为我们提供了一种更简单的定义这些常量的方式：使用枚举。`SocketCommand`枚举定义如下：


    package sampleproject.gui;


    public enum SocketCommand {


    UNSPECIFIED, /* 表示命令对象尚未设置 */


    FIND, /* 请求将执行查找操作 */


    RENT, /* 租借 DVD */


    RETURN, /* 归还 DVD */


    MODIFY, /* 更新 DVD 状态 */


    ADD, /* 创建新的 DVD 记录 */


    REMOVE, /* 删除 DVD 记录 */


    GET_DVD, /* 从数据库中检索单个 DVD */


    GET_DVDS, /* 从数据库中检索多个 DVD */


    RESERVE,


    RELEASE


    }


    现在，任何`SocketCommand`类型的变量*只能*包含这些列出的选项之一——其他选项都是不可能的。


    我们还有一个好处：任何时候我们打印（或记录）`commandSocket`变量的内容时，将会打印（或记录）字符串`UNSPECIFIED`、`FIND`、`RENT`、`RETURN`、`MODIFY`、`ADD`、`REMOVE`、`GET_DVD`、`GET_DVDS`、`RESERVE`或`RELEASE`——通过查看输出，可以立即清楚地知道该变量被设置成了什么。


    使用枚举还有许多其他好处。我们建议您阅读与枚举相关的发行说明，网址为 http://java.sun.com/j2se/1.5.0/docs/guide/language/enums.html，以获取更多信息。


