    第 3 章 ■ 项目概述


    你的项目提交必须包含以下组件：


    • 一个可执行的 JAR 文件，它将同时运行独立客户端和网络连接客户端


    • 一个可执行的服务器专用 JAR 文件，它将运行网络服务器


    • 一个公共 JAR 文件，它将包含客户端和服务器应用程序共用的代码：


    • 一个包含项目源文件的 src 目录


    • 随说明提供的原始数据文件


    • 一个 docs 目录，其中将包含


    • 由 Javadoc 生成的 API 文档


    • 最终用户文档


    • 总结你设计选择的文件


    整个提交成果应打包在一个 JAR 文件中，如第 9 章所述。


    ■**注意** JAR 最初是为了允许小程序（applet）通过单个 HTTP 请求下载，而不是通过多次往返（请求-响应对）来检索每个小程序组件（如类文件、图像等）而创建的。可执行
    JAR 文件具有文件关联，因此在 Windows 上单击它们将运行 `javaw -jar`，在 Unix 上则运行 `java -jar`。


    Denny''s DVDs 示例最终将被捆绑到一个 JAR 文件中。该 JAR 文件将包含一个名为 `runme.jar` 的可执行 JAR 文件，其中包含数据库文件、文档和源代码。


    `runme.jar` 将根据其调用方式处理服务器和客户端。从可执行 JAR 文件运行最终应用程序将在第 9 章中说明。


    ■**注意** 本书的上一版包含一章关于 Java 新 I/O（NIO）的内容。当时，NIO 是一个新的 1.4 主题，并且 NIO 可用于认证考试的程度尚不明确。随后，在第一版出版和
    J2SE 1.4 发布之后，Sun 明确禁止将 NIO 用作认证项目的网络解决方案，但允许将其用作文件 I/O 的机制。

