    **Specifying the Database Location**


    When users start the client or server applications, they need to be able to specify
    where the database is located.


    For the Denny’s DVDs application, we have determined that this entails the following:


    • In stand-alone client mode, the user must specify where the physical file is
    located.


    • In networked client mode, the user must be able to specify the URL or IP address
    of the server computer, the type of server running (RMI or sockets), and the port
    number the server is using.


    • In server mode, the user must be able to specify where the physical file is
    located, the type of server (RMI or sockets), and the port number the server will
    use.


    ■**Note** You should not need anything so complex for your solution. Some of the
    options we are allowing for are specifically to allow for all the options of this
    book.


    To allow these options to be entered in client mode, we are going to develop a
    dialog box, as shown in Figure 8-30\. The major part of this dialog box is the
    reusable panel shown in Figure 8-31.


    ![Image 47](index-293_1.png)


    ![Image 48](index-293_2.png)


