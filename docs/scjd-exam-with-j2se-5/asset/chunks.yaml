    \ `Dog` 列表，但无法阻止其他人编译假设该列表包含 `Cat` 的源代码——它会在没有错误的情况下编译通过。但是，如果发生这种情况，运行时将会抛出 `ClassCastException`。\n\
    \n为了解决这个问题，你必须在代码中编写显式的类型检查（使用 `instanceof` 运算符）和/或捕获 `ClassCastException`。\n\n\
    当我们能够确保泛型类在运行时被正确处理时，情况就好多了。考虑以下替代 `getBreed` 和 `listDogs` 方法的代码：\n\n```java\n\
    public List<Dog> getBreed(String breedName) {\n    List<Dog> dogs = new ArrayList<Dog>();\n\
    \    // 执行一些操作来找到正确的狗\n    String dogName = \"Labrador\";\n    Dog pooch = new\
    \ Dog(dogName);\n    dogs.add(pooch);\n    return dogs;\n}\n\npublic void listDogs()\
    \ {\n    Collection<Dog> c = getBreed(\"labrador\");\n    for (Iterator<Dog> i\
    \ = c.iterator(); i.hasNext(); ) {\n        String name = i.next().getName();\n\
    \        System.out.println(name);\n    }\n}\n```\n\n我们现在已经指定了 `getBreed` 方法的返回类型将是\
    \ `List of Dog`。（将 `List<Dog>` 理解为“Dog 的列表”可能会有所帮助）。\n\n请注意，`String name = i.next().getName();`\
    \ 这一行不再进行类型转换——定义 `Iterator` 的那一行已经指定了其类型。\n\n尝试将集合中的项转换为不相关的类会产生以下错误：\n\n```\n\
    GenericExample.java:16: inconvertible types\nfound : Dog\nrequired: Cat\n    \
    \    String name = ((Cat) i.next()).getName();\n                     ^\n1 error\n\
    ```\n\n5165CH02.qxd 11/16/05 12:09 PM 第 31 页\n\n第 2 章 ■ 项目分析与设计\n\n**31**\n\n\
    请注意上述示例中使用的格式：\n\n-   尖括号（`<` 和 `>`）内没有空格。\n-   集合名称和尖括号之间没有空格。\n-   尖括号和圆括号之间没有空格（在调用构造函数时）。\n\
    \n这些是 JSR 以及描述 JDK 5 新功能的多个 Sun 文档中使用的编码约定；然而，目前还没有正式的约定。\n\n增强的 for 循环\n\n在我们的泛型示例中，我们使用\
    \ `Iterator` 来遍历集合中的项。重申一下，我们的代码示例如下所示：\n\n```java\nfor (Iterator<Dog> i = c.iterator();\
    \ i.hasNext(); ) {\n    String name = i.next().getName();\n```\n\n然而，这过于冗长：在大多数情况下，你希望逐个遍历迭代器中的所有项。那么，为什么要以这种方式向编译器详细说明呢？\n\
    \nJDK 5 使得在 for 循环中使用迭代器变得更加容易。考虑以下执行相同操作的构造：\n\n```java\nfor (Dog mutt : c) {\n\
    \    String name = mutt.getName();\n```\n\n将冒号（`:`）理解为“in”可能会有所帮助。因此，语句 `for (Dog\
    \ mutt : c)` 可以理解为“对于集合 c 中的每只狗 mutt”。\n\n■**注意** 许多人好奇为什么 Sun 选择使用冒号而不是使用单词“in”或“foreach”。很简单，Sun\
    \ 希望避免引入任何可能破坏现有源代码的新关键字。你所有的现有代码都应该能在 JDK 5 下无问题地编译和运行。\n\n增强的 for 循环也可以与标准数组一起使用。以下代码给出了一个不使用增强\
    \ for 循环遍历字符串数组的示例：\n\n```java\npublic static void main(String[] args) {\n   \
    \ for (int i = 0; i < args.length; i++) {\n        System.out.println(args[i]);\n\
    \    }\n}\n```\n\n5165CH02.qxd 11/16/05 12:09 PM 第 32 页\n\n**32**\n\n第 2 章 ■ 项目分析与设计\n\
    \n增强的 for 循环允许将其简化，如下所示：\n\n```java\npublic static void main(String[] args) {\n\
    \    for (String arg : args) {\n        System.out.println(arg);\n    }\n}\n```\n\
    \n请注意，新的 for 循环不能在所有场景中使用。特别是，它隐藏了迭代器，因此你不能再在迭代器上调用任何可能改变底层集合的方法。\n\n新的 for 循环的格式规则是在冒号前后各有一个空格。\n\
    \n自动装箱\n\nJDK 5 允许在基本类型及其包装类之间进行自动类型转换。例如：\n\n```java\nInteger myInteger = 5;\
    \ // 自动将 5 (int) 转换为 Integer\n```\n\n处理此功能不需要特殊的编码约定。\n\n可变参数\n\n可变参数列表（通常也称为\
    \ VarArgs）允许编码者指定构造函数或方法签名中的参数数量是可变的。使用此功能可以减少重载方法和构造函数的数量。\n\n然而，可变参数是有代价的：当你指定给定方法所需参数的确切数量和类型时，Java\
    \ 编译器可以执行类型检查以确保你对方法的使用是正确的。当你使用可变参数时，只能进行最少的检查。\n\n举个例子，考虑创建一个 `Dog` 类，它有两个可选属性（字段）：`age`\
    \ 和 `name`。如果你想创建能够处理用户创建 `Dog` 类的所有可能方式的构造函数，你将需要以下构造函数：\n\n```java\nDog();\n\
    Dog(int age);\nDog(String name);\nDog(int age, String name);\n```\n\n不幸的是，事情并没有到此结束。你需要的构造函数数量是\
    \ 2 的参数数量次方。因此，如果 `Dog` 类有以下七个属性——`age`、`height`、`weight`、`name`、`owner`、`color`\
    \ 和 `pedigree`——我们可能需要 128 个构造函数来涵盖所有组合！\n\n然后我们还会遇到其他问题，因为 Java 无法区分方法签名实际上相同的构造函数。例如：\n\
    \n```java\nDog(int age, String name);\nDog(int age, String owner);\n```\n\n5165CH02.qxd\
    \ 11/16/05 12:09 PM 第 33 页\n\n第 2 章 ■ 项目分析与设计\n\n**33**\n\nJDK 5 允许我们指定传递给方法或构造函数的参数数量是*相同类型*的可变参数。因此，你可以通过指定一个如下所示的构造函数来指定传递给构造函数的\
    \ `String` 的确切数量是可变的：\n\n```java\nDog(int age, String... args) {\n    for (String\
    \ parameter : args) {\n        System.out.println(\"Received parameter \" + parameter);\n\
    \    }\n}\n```\n\n正如你在前面的代码中看到的，省略号（`...`）紧跟在它所指的类型之后。一旦进入方法体内部，你就可以将参数视为指定类型的数组。\n\
    \n■**注意** 在给定的方法或构造函数声明中，你只能有一个可变参数列表，并且它必须是方法或构造函数中的最后一个参数。例如，你不能有 `Dog(int...\
    \ ages, String name)`。\n\n■**警告** 在重载包含可变参数版本的构造函数或方法时要非常小心。很容易导致编译器无法区分的重写方法（例如，`Dog(String\
    \ name, String... args)` 和 `Dog(String... args)` 实际上是相同的），或者导致一个泛型方法匹配了超出你预期的内容（例如，`Dog(Object...\
    \ args)` 由于自动装箱，将匹配*所有*构造函数）。\n"
- fmt: "您可能已经意识到，在早期版本的 JDK 中也可以实现类似的效果：即只需将一个命名类型的数组传递给方法。然而，要使用这种方式，您实际上必须创建一个新数组。例如：\n\
    \n```java\npublic static void lookupDog(String... searchCriteria) {\n    for (String\
    \ criterion : searchCriteria) {\n        // do work here\n    }\n}\n\npublic static\
    \ void lookupCat(String[] searchCriteria) {\n    for (String criterion : searchCriteria)\
    \ {\n        // do work here – no different than working with Dog method\n   \
    \ }\n}\n\npublic static void main(String[] args) {\n    // first the easy code:\
    \ use the Dog method:\n    lookupDog(\"Breed\", \"Terrier\", \"Color\", \"Brown\"\
    );\n\n    // now for the Cat method\n    lookupCat(new String[] {\"Breed\", \"\
    Burmese\", \"Coat\", \"Silky\"});\n\n    // or\n    String[] criteria = {\" Breed\"\
    , \"Burmese\", \"Coat\", \"Silky\"};\n    lookupCat(criteria);\n}\n```\n\n使用`lookupDog`方法的代码比等效的`lookupCat`方法更易于阅读、编写和维护。\n\
    \n## 静态导入\n\n在 JDK 5 之前，一些程序员在接口中定义常量，因为这允许他们*实现*该接口，从而获得一种编写常量名称的简写方式。如下例所示：\n\
    \n```java\npublic interface BadInterface {\n    public static final int FIRST_NAME_POSITION\
    \ = 1;\n}\n\npublic class BadClass implements BadInterface {\n    public static\
    \ void main(String[] args) {\n        System.out.println(\"First name = \" + args[FIRST_NAME_POSITION]);\n\
    \    }\n}\n```\n\n这样做存在几个问题：\n\n- 实现接口的类被称为是该接口的“一个实例”。如果您为接口取了一个合理的名称，那么说您的类“是”它的一个实例可能没有意义。\n\
    - 如果您的类实现了一个接口，那么该类的任何子类也将实现该接口。实际上，这些常量将成为子类命名空间的一部分——即使子类可能根本不需要这些常量。\n\n为了解决这些问题，JDK\
    \ 5 引入了*静态导入*的概念——即能够从另一个类或接口导入静态成员。\n\n例如，如果您正在使用日志功能（将在本章后面的“日志”部分讨论），通常必须像以下代码片段那样限定日志级别：\n\
    \n```java\nmyLogger.log(Level.FINE, \"This message is at FINE level\");\n```\n\
    \n然而，静态导入允许我们引用静态对象`FINE`，就好像它是在我们自己的类中定义的一样：\n\n```java\nimport static java.util.logging.Level.*;\n\
    // ...\nmyLogger.log(FINE, \"This message is at FINE level\");\n```\n\n需要注意的是，引入这个“特性”是为了解决一个不良的编程实践。当您原本会倾向于声明常量的本地副本，或者倾向于像前面提到的那样滥用继承时，您可能会想使用它。但总的来说，我们建议您尽可能避免使用它，而使用限定常量。\n\
    \n## Javadoc\n\nJavadoc 是一个非常简单但功能强大的工具，它帮助程序员为其他程序员提供 API 文档。\n\n默认的 Javadoc\
    \ 工具非常简单。它会解析您的源代码，查找特殊的注释。然后，它会基于这些注释生成 HTML 文档。为了更容易理解，让我们从一些 Javadoc 注释示例开始，并对它们进行描述：\n\
    \n```java\n/**\n * The <b>main</b> starting point for this application.\n * Instantiates\
    \ an instance of this class, and runs it.\n *\n * @param args an array containing\
    \ the command line arguments.\n * @throws IOException if files cannot be created\n\
    \ */\npublic static void main(String[] args) throws IOException {\n    // ...\n\
    ```\n\nJavadoc 注释以特殊的注释开始指示符`/**`开头，一直持续到注释结束指示符`*/`。标签由 at 符号（`@`）标识。从注释开始指示符到第一个标签之间的所有文本都会直接包含在生成的输出中。\n\
    \nJavadoc 会忽略未知标签，以及从*任何标签*之后到下一个已知标签或文档注释结束之间的纯文本——正是这种神奇之处使得 XDoclet 能够工作。\n\
    \n上面的 Javadoc 代码会生成以下 HTML：\n\n```html\n<A NAME=\"main(java.lang.String[])\"><!--\
    \ --></A><H3> main</H3>\n<PRE>\npublic static void <B>main</B>(java.lang.String[]&nbsp;args)\
    \ throws java.io.IOException</PRE>\n<DL>\n<DD>The <b>main</b> starting point for\
    \ this application.\nInstantiates an instance of this class, and runs it.\n<P>\n\
    <DD><DL>\n<DT><B>Parameters:</B><DD><CODE>args</CODE> - an array containing the\
    \ command line arguments.\n<DT><B>Throws:</B>\n<DD><CODE>java.io.IOException</CODE>\
    \ - if files cannot be created</DL>\n</DD>\n</DL>\n```\n\n![Image 4](index-55_1.png)\n\
    \n在 Microsoft Internet Explorer 中查看时，它将类似于图 2-1。\n\n**图 2-1.** *Javadoc 输出示例*\n\
    \n> **注意** Javadoc 比许多程序员意识到的更强大。它是作为一个可扩展工具开发的，可以根据插入的模块以不同的方式运行。默认情况下，它会解析 Java\
    \ 源代码，生成 API 文档。但是，如果您将插件更改为 XDoclet（http://xdoclet.sourceforge.net/），例如，Javadoc\
    \ 引擎可以根据您编写的代码中的注释生成额外的源代码（在构建 J2EE 应用程序时非常有用——您可以让 XDoclet 为您创建接口和部署描述符）。或者，您可以插入\
    \ DocCheck（http://java.sun.com/j2se/javadoc/doccheck），并获得一份关于您遵守 Sun 的 Javadoc\
    \ 约定情况的报告。\n\n## 编码约定\n\nSun 发布了一篇题为“如何为 Javadoc 工具编写文档注释”的文章，该文章可在 http://java.sun.com/j2se/javadoc/writingdoccomments/index.html\
    \ 在线获取。\n\n以下是该文章涵盖主题的快速概述。\n\n### 编写内容\n\n您的类和方法名称应该具有合理的自文档性，因此编写仅仅重述类或方法名称的\
    \ Javadoc 注释是没有意义的。您的 Javadoc 注释应提供有助于类用户的信息，和/或提供第三方在需要从头开始（不查看您的源代码）重新实现您的类时所需的信息。\n\
    \n例如，如果您正在创建一个提供到服务器网络连接的类，您可能会将类命名为`NetworkConnection`。编写一个说明该类提供“网络连接”的 Javadoc\
    \ 注释是没有意义的——用户已经知道这一点。\n\n相反，您可以考虑指定该类提供“通过网络到数据库服务器的连接，通过该连接可以使用对数据库函数的远程访问”。\n\
    \n> **注意** 您不应在 Javadoc 注释中编写任何实现细节。\n\n### 放置 Javadoc 注释的位置\n\n理论上，Javadoc 注释可以放在源代码的任何位置。但是，Javadoc\
    \ 应用程序只会包含特定位置的注释：\n\n- 类注释应紧跟在类声明之前（Javadoc 目前允许注释出现在类声明之前的任何位置，甚至在包声明之前，但不应依赖此行为）。\n\
    - 类和实例变量注释应紧跟在它们所属的类或实例变量之前。\n- 方法注释应紧跟在方法签名之前。"
