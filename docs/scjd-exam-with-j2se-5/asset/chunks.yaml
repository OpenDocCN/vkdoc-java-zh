    \ 和 `writeObject` 的实现方式就与 `readExternal` 和 `writeExternal` 完全相同，本节稍后将对此进行讨论。以下是\
    \ `readObject` 和 `writeObject` 的方法签名：\n`private void writeObject(java.io.ObjectOutputStream\
    \ out) throws IOException`\n`private Object readObject(java.io.ObjectInputStream\
    \ in) throws IOException, ClassNotFoundException`\n\n5165CH06.qxd 11/16/05 12:14\
    \ PM 第 170 页\n\n**170**\n\n第 6 章 ■ 使用 RMI 进行网络编程 **清单 6-3.** *DVD.java 的 Externalizable\
    \ 版本：实现 DVD.java 的 readExternal 和 writeExternal 方法*\n\n/**\n* Externalizable 接口的必需方法。\n\
    * 指定对象图如何转换为字节流。\n*/\nprivate void writeExternal(ObjectOutput out) throws IOException{\n\
    \    out.writeUTF(upc);\n    out.writeUTF(name);\n    out.writeUTF(composer);\n\
    \    out.writeUTF(director);\n    out.writeUTF(leadActor);\n    out.writeUTF(supportingActor);\n\
    \    out.writeUTF(year);\n    out.writeInt(copy);\n}\n\n/**\n* Externalizable\
    \ 接口的必需方法。\n* 指定如何从字节流重新创建对象图。\n* 读取成员的顺序必须与对象成员写入流的顺序匹配。\n*/\nprivate void readExternal(ObjectInput\
    \ in) throws IOException{\n    out.readUTF(upc);\n    out.readUTF(name);\n   \
