    **存根与骨架**


    只有客户端会实际调用*存根*上的方法，存根是远程对象的本地表示或代理。虽然看起来客户端是直接调用远程对象，但客户端并不知道，它实际上是在调用存根中的一个代理方法，该方法会启动与目标虚拟机的通信。存根负责在通过网络发送远程方法调用的参数之前，对它们进行打包。在通过网络传输之前打包参数的过程称为*编组*。


    在网络另一端，即服务器端，传入的调用最终由远程引用层接收，该层对参数进行解组，并将调用分派给实际的服务器对象。然后，服务器将返回值编组，发送回客户端的调用方。


    J2SE 1.5 引入了一项新特性，无需再使用 `rmic` 工具为客户端单独生成存根类。现在，存根类可以在运行时由 JVM 动态生成。（但是，在我们的提交中，仍然需要使用
    `rmic` 来生成存根。）要无条件地动态生成存根，请将 JVM 参数 `java.rmi.server.ignoreStubClasses` 设置为 `true`。这可以通过
    `-D` 选项完成（例如，`java -Djava.rmi.server.ignoreStubClasses=true`）。


    ■**注意** 为了与 J2SE 1.5 之前的客户端向后兼容，您仍然必须使用 `rmic` 生成存根类。


