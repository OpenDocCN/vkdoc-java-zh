- fmt: '# Project Wrap-Up


    There always seems to be some change or enhancement that can make your application
    better, and at some point you need to feel confident that your project will pass
    Sun’s scrutiny.


    After all, your goal is to pass the exam, not develop a commercial project. Sun
    estimates that about 100 hours of development time is needed to develop a working
    solution.


    To ensure that you pass your exam, here is a list of to-dos:


    - Read the SCJD exam instructions very carefully. Even though many of the tests
    have the same name, their details differ.

    - Read this book. At the very least, look at the sample project to see how we
    solved some of the basic problems such as locking, networking, and the GUI implementation,
    especially the `JTable`. We believe that if you understand the code, you should
    have all of the tools you need to pass your exam.

    - Refer to this book throughout your development process.

    - Join the JavaRanch SCJD forum (see the FAQs section).

    - Test your application. Write a test harness similar to the one we discussed
    in this chapter. If possible, test it across an actual network. Test all of the
    use cases. Test your application in a multithreaded environment with a test class
    such as `DBTestRunner`.

    - Package up all of your ReadMe and design documents along with your application
    and submit the project to Sun as your exam directions stipulate.


    ## FAQs


    **Q** Where do I get the database files to run the sample project?


    **A** It is included in the zip file you can download from the Apress web site
    (http://www.apress.com).


    **Q** Do I have to package my application as a JAR file?


    **A** The answer to this question depends on the specifics of your exam. However,
    our experience has been that most exams require that the examinees use `JAR` files
    for their submission. It is recommended that separate `JAR` files be included
    in a master `JAR` file for submission.


    **Q** What do I need to include with my exam submission?


    **A** The basic elements are typically as follows:


    - Source files

    - An executable `JAR` file

    - Database file(s)

    - A design document explaining some of the key design decisions

    - A file that explains the development environment you used

    - Javadocs

    - User documentation


    However, you **must** carefully read the instructions provided to you by Sun to
    ensure that you meet the submission requirements. If there is a discrepancy between
    what we have described and what is in the Sun instructions, you must follow the
    Sun instructions.


    **Q** What platform should I test my submission on?


    **A** Since Java is platform independent, your submission should run on either
    Unix or Windows. We strongly recommend that you test your exam on Windows, Unix,
    Linux, and Mac OS X (i.e., Macintosh), since there can be subtle platform differences
    that could cause problems with your submission. For consistency and simplicity,
    the examples in this book have been demonstrated on Windows 2000. Even though
    there is no guarantee what platform your application will be tested on once it
    is submitted, make sure you document the platform you worked on in your ReadMe.


    **Q** What should I do after I have passed the exam?


    **A** Celebrate. Then send us an e-mail at scjd@apress.com.


    **Q** If I have comments or questions regarding this book, whom should I contact?


    **A** You can contact the authors at scjd@apress.com.


    **Q** Are there any online resources useful for passing the SCJD exam?


    **A** There are many excellent online resources. Here are just a few that we found
    particularly helpful:


    - The JavaRanch web site at http://www.javaranch.com

    - The SCJD discussion groups on Yahoo! (http://groups.yahoo.com)

    - Java 2 Development Kit, Standard Edition Documentation page (http://java.sun.com/j2se/1.5.0/docs/)

    - The Java Tutorial: RMI (http://java.sun.com/docs/books/tutorial/rmi/)'
