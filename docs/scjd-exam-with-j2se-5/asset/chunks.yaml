    **图 8-29.** *正则表达式编译失败的错误消息* **指定数据库位置**


    当用户启动客户端或服务器应用程序时，他们需要能够指定数据库的位置。


    对于 Denny''s DVDs 应用程序，我们确定这需要满足以下条件：


    • 在独立客户端模式下，用户必须指定物理文件的位置。


    • 在网络客户端模式下，用户必须能够指定服务器计算机的 URL 或 IP 地址、正在运行的服务器类型（RMI 或套接字）以及服务器正在使用的端口号。


    • 在服务器模式下，用户必须能够指定物理文件的位置、服务器类型（RMI 或套接字）以及服务器将使用的端口号。


    ■**注意** 你的解决方案不需要如此复杂。我们允许的一些选项是为了涵盖本书的所有选项。


    为了允许在客户端模式下输入这些选项，我们将开发一个对话框，如图 8-30 所示。该对话框的主要部分是可重用面板，如图 8-31 所示。


    ![Image 47](img/index-293_1.png)


    ![Image 48](img/index-293_2.png)


    5165CH08.qxd 11/16/05 12:16 PM Page 274


    **274**


    第 8 章 ■ 图形用户界面


    **图 8-30.** *用于输入数据库位置的客户端应用程序对话框* **图 8-31.** *用于在客户端和服务器应用程序中获取通用参数的 JPanel*


    在清单 8-28 中，我们将看到通用框架的构造函数会根据构造函数中的参数更改显示的选项和工具提示文本。这使我们能够为独立客户端、网络客户端和服务器应用程序使用相同的框架。


    对于主客户端 GUI，我们使用了简单的图形布局管理器：BorderLayout 和 FlowLayout。这些布局管理器在大多数情况下都能满足需求。然而，在某些情况下，您可能会发现需要使用这些简单布局管理器难以实现的形式来布局面板。通用框架就是这样一个例子——我们希望最多有四行组件，但每个组件都有一个标签，我们希望将其在右侧垂直对齐。


    在本节中，我们将介绍最强大的布局管理器之一——GridBagLayout。我们特意将介绍这个布局管理器推迟到现在，因为它比其他布局管理器使用起来更复杂。


    ■**提示** 尽管这个布局管理器非常强大，并且在 Denny''s DVD 示例应用程序中运行良好，但您可能会发现您的应用程序中不需要使用这个布局管理器。我们建议您使用最适合您的简单解决方案——证明您能使用所有布局管理器并不会获得额外加分。


    GridBagLayout


    Java 有两种基于网格的布局管理器：GridLayout 和 GridBagLayout 管理器。


    GridLayout 是两者中较简单的一个；然而，它强制网格中的所有单元格大小相同，如图 8-32 所示。生成此图的程序如清单 8-25 所示。


