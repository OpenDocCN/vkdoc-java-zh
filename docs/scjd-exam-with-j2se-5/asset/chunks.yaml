    讨论点：死锁处理


    当线程被永久阻塞，等待一个永远不会发生的条件时，就会发生死锁。


    第 4 章从线程角度讨论了死锁处理，但同样的问题也适用于应用逻辑层面。考虑一下，如果两个客户端都试图以不同的顺序获取同两条记录的逻辑锁，会发生什么情况，如下例所示：


    *   客户端 A 获取记录 1 的逻辑锁。

    *   客户端 B 获取记录 2 的逻辑锁。

    *   客户端 A 尝试获取记录 2 的逻辑锁。

    *   客户端 B 尝试获取记录 1 的逻辑锁。


    我们的 `reserveDVD` 方法会在 5 秒后超时。但如果客户端 A 和客户端 B 都立即重试获取锁，结果将与没有超时一样：两个线程实际上都会陷入死锁。


    有多种解决方案可以防止死锁，其中包括：


    *   不允许客户端一次锁定超过一条记录。如果他们不能锁定多条记录，就不会发生逻辑死锁。

    *   只允许客户端按数字顺序锁定记录。根据此规则，在上例中，客户端 B 将不被允许尝试锁定记录 1，并且必须在某个时刻放弃对记录 2 的锁定，从而允许客户端
    A 继续执行。

    *   拥有一个专用机制来跟踪哪些锁已被拥有以及哪些锁存在争用。每次有新的锁进入争用状态时，都会检查此机制以确认是否会发生死锁，如果会，则取消该锁。这是所有可能解决方案中最复杂的一种，但所需的代码大多是递归的，稍加思考即可简单编写。

    *   忽略问题。说真的——这是你作业的要求吗？尝试处理此问题是否可能导致你犯错而失分？你是否觉得这超出了作业的范围？


    我们再次建议你仔细阅读从 Sun 公司收到的说明，以确定你需要如何处理死锁（如果需要处理的话）。


    然而，如果你的说明完全没有提及这一点，你将需要自行决定是否要处理死锁。你可能想问的一些问题包括：处理死锁是否更专业？处理死锁是否会为代码增加不必要的复杂性？你是否能通过允许抛出的异常来处理死锁？


    无论你决定如何，这都是一个你可能需要记录的设计决策。


