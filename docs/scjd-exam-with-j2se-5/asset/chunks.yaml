    > **注意**：UPC（通用产品代码）编号是分配给美国和加拿大商店零售商品的唯一编号。日本的等效代码是JAN代码，下一个标准将是欧洲EAN代码，该代码旨在增加潜在代码的数量，以满足全球需求。


    出于本书的目的，我们坚持使用原始的UPC代码，用它来确保数据文件中的每条记录都有唯一的索引。


    # 构造函数


    然后我们有三个构造函数：一个默认构造函数（任何序列化对象都需要）、一个假设我们只有一份DVD库存的构造函数，以及一个允许我们指定DVD副本数量的构造函数。


