  trans: '

    RMI 还让您免于编写多线程服务器的责任，这可能会很棘手。无论采用哪种协议，您仍然需要编写线程安全的代码，但实际的服务器不必生成线程或管理线程池。


    当系统扩展到大量并发用户时，线程池可以显著提升性能，而 RMI 免费提供了这一功能。然而，这也有代价：如果您无法使用 cookie，客户端识别会稍微复杂一些。


    RMI 也广泛应用于企业级 JavaBean（EJB）技术中，因此为 SCJD 作业学习和使用 RMI 将有助于您处理 EJB 项目。


    5165CH09.qxd 11/16/05 12:17 PM 第 300 页


    **300**


    第 9 章 ■ 项目收尾


    RMI 注册表帮助您动态部署服务器端代码——使用 Registry 类的 rebind 方法，您可以以最短的停机时间加载新的服务器功能。使用套接字解决方案时，您要么必须停止旧服务器然后启动新服务器（停机时间比
    RMI 的 rebind 更长），要么使用不同的套接字端口（这需要重新配置或替换客户端）。


    使用 RMI 使您无需指定特定服务将在哪个端口上可用。使用套接字解决方案时，您必须指定服务器将监听的端口，并且客户端必须连接到该端口。如果您没有使其可配置，并且其他应用程序以使用相同端口的方式开发（且同样不可配置），那么其中一个将不得不重新编译。即使端口号是可重新配置的，您也必须重新配置所有客户端以使用新的端口号，这可能并不容易或不切实际。默认情况下，RMI
    解决方案为服务器使用随机端口号，端口号由 RMI 注册表指定。客户端只需知道注册表的端口号，然后查询该端口号以确定如何联系他们感兴趣的服务器。


    虽然在 SCJD 作业中不允许，但 RMI 允许您下载可执行类。例如，您可以使用它下载某种安全算法，该算法将加密客户端和服务器之间的所有数据——由于代码是动态下载的，客户端程序员永远看不到您是如何实现它的（实际上，您甚至可以隐藏它正在被使用的事实），从而降低了如果有人从未看到您的加密算法就试图破解它的可能性。


    **两种解决方案的选择**


    到现在为止，您可能已经看到两种解决方案都有充分的论据，并且两者之间没有绝对的区分因素。我们相信 Sun 公司故意这样做是为了考察您的决策逻辑。


    您必须决定我们列出的哪些论据（或您自己确定的其他论据）对您最有意义，以及如果被要求解释您的决定，您愿意为哪些论据辩护。


    **GUI 中的 MVC 模式**


    第 8 章涵盖了与 GUI 相关的设计决策，从界面布局原则的一般信息到特定 Swing 组件（如 JTable）的讨论。与 RMI 和基于套接字的网络实现之间的选择（在第
    6 章和第 7 章以及本章前面讨论过）不同，Sun 公司实际上要求使用 JTable 才能通过 SCJD 考试，因此如果您想通过考试，使用它是一个无需思考的决定。


    5165CH09.qxd 11/16/05 12:17 PM 第 301 页


    第 9 章 ■ 项目收尾


    **301**


    因此，设计决策从“在 Denny''s DVDs 应用程序中使用哪个 GUI 小部件合适”转变为“如何将 JTable 正确集成到 Swing 用户界面中”。我们在第
    8 章中建议的解决方案是在应用程序级别使用 MVC 设计模式。正如您在第 8 章中学到的，Swing 组件（如 JTree 和 JTable）在内部实现了
    MVC 模式，但选择在这些组件之外使用 MVC 模式完全取决于开发人员。通过使用应用程序范围的 MVC 架构获得的主要好处是增加了数据显示与实际数据实现之间的抽象。JTable
    及其自身的 MVC 实现反过来成为整个应用程序显示层中一个较小的参与者，并与应用程序的 MVC 实现协同工作。


    **查找代码示例**


    您可以在 Apress 网站（http://www.apress.com）的源代码部分找到本书的代码示例。那里有一个包含最终代码库（即 Denny''s DVDs
    2.0 版）的 zip 文件。在本章中，您将关注 2.0 版的 zip 文件。


    将最终代码库解压到您机器上选择的任何位置。应该有一个目录 sampleproject，其中包含四个子目录：db、remote、sockets 和 gui。


    这些目录对应四个包：


    • sampleproject.db


    • sampleproject.remote


    • sampleproject.sockets


    • sampleproject.gui


    除非您跳过了很多内容并直接从第 9 章开始，否则您应该对这些包非常熟悉。一旦您将所有 Java 源文件解压到类似于上述目录结构的位置，就可以编译应用程序了。


    **编译和打包应用程序**


    打开命令提示符并输入 java -version。确保您使用的是 J2SE 5 或更高版本（参见图 9-2）。如果不是，请从 Sun J2SE 下载站点（http://java.sun.com/j2se/1.5.0/download.jsp）下载并安装。


    ■**注意** 图 9-2 版本号中显示的“b05”表示这是构建版本 05；它并不意味着软件的测试版。


    ![Image 56](img/index-321_1.png)


    5165CH09.qxd 11/16/05 12:17 PM 第 302 页


    **302**


    第 9 章 ■ 项目收尾


    **图 9-2.** *验证 J2SE 5 是否正确安装。*


    导航到 Denny''s DVDs 的根目录。这是您解压项目 .java 文件的目录。为了演示，我们创建了一个名为 dennysDVDs2.0 的目录，并将其选为根目录。


    ■**提示** Zip 文件通常可以使用 jar 可执行文件解压缩，如图 9-3 所示。Zip 文件和 JAR 文件使用相同的压缩算法。


    接下来，您需要将 .java 文件编译到目标目录。默认情况下，Java 会将 .class 文件放在与源文件相同的目录中。使用 Java 编译器的 -d 选项可以将源文件和编译后的文件分开。分离源文件和编译后的文件有助于您组织项目。


    您需要决定将 .class 文件输出到哪里。为简单起见，我们决定将编译后的文件放在根目录下一个名为 classes 的子目录中。在命令提示符下使用命令 mkdir
    classes 将创建必要的目录。或者您也可以使用 Windows 资源管理器添加该目录。


    接下来，使用 javac 并设置 -d 选项指向您的目标目录，分别编译每个包。图 9-3 展示了成功编译示例项目所需的一系列命令。请确保按此顺序编译包：db、remote、sockets，最后是
    gui。这个顺序突出了项目的依赖关系。回顾第 5 章，我们只有 db 包。我们分别在第 6、7 和 8 章引入相关主题时添加了其他包。


    ![Image 57](img/index-322_1.png)


