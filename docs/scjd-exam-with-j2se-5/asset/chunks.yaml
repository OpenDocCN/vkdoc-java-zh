- fmt: '# The Sun Certified Developer for the Java 2 Platform Assignment


    The Sun Certified Developer for the Java 2 Platform assignment offers a unique
    opportunity for Java developers to put their Java skills to practical use without
    requiring any specific development or runtime environment. The assignment also
    provides a great learning environment as many different APIs can be used, and
    many alternative solutions can be provided. This book introduces many of the concepts
    you will need to know in order to pass the SCJD assignment.


    Many developers are a little daunted by the scope of the assignment, as it covers
    everything from a back-end database, a server application, a front-end application,
    API documentation, and user documentation. This book covers each section in detail,
    helping you gradually build up your knowledge of each topic while working toward
    a sample project. This book will also introduce you to the new features of JDK
    5, providing contextual usage of the new APIs and features within our sample project.


    The Sun assignment deliberately does not specify an operating system platform
    or development environment to be used—all that is needed is a computer capable
    of running a current version of the JDK. Throughout this book we have used JDK
    5 on Windows 2000. Since this book introduces JDK 5 features, and uses them throughout
    our sample project, you will need JDK 5 to run our sample applications; however,
    the sample application is not dependent on Windows 2000.


    We hope you enjoy this book, and we look forward to hearing that you passed and
    any comments you may have on this book. You can contact both authors at `scjd@apress.com`.


    ---


    # Part 1: Introduction and General Development Considerations


    ## Chapter 1: Introduction


    Welcome to *The Sun Certified Java Developer Exam with J2SE 5, Second Edition*.
    By taking advantage of the new features of J2SE 5, passing the Sun Certified Java
    Developer (SCJD) exam is easier than ever before. Features such as generics, the
    enhanced for loop, autoboxing and unboxing of primitives, the new concurrency
    classes, and other new capabilities offer developers a richer and more robust
    tool set than ever before. This book and the accompanying sample project will
    help you acquire the understanding necessary to pass the SCJD examination while
    learning the finer points of the J2SE Development Kit (JDK 5). If you have been
    meaning to take the SCJD exam or you are ready to further explore the mysteries
    of Java, you have found the right book.


    The best way to learn a new skill is to use it. This is true in tennis, pottery,
    and yes, programming. With that principle firmly in mind, this book helps you
    learn about J2SE 5 while detailing the strategies, skills, and information needed
    to pass the SCJD exam. Sun Microsystems designed the SCJD exam to be a realistic
    example of what a professional Java developer can expect to encounter in the real
    world. The SCJD exam covers a large portion of J2SE, including Remote Method Invocation
    (RMI), threading, file input/output (I/O), and Swing.


    The sample project, Denny’s DVDs (introduced in Chapter 3), is designed to explore
    the same concepts that the SCJD exam does. Unlike on the SCJD exam, however, the
    underlying concepts are explained in detail. When you have finished this book,
    you will have learned the skills necessary to take and pass Sun’s exam.


    The two major topics discussed in this chapter are:


    - Finding out how to download and take the SCJD exam

    - Understanding the goals of this book


    ### J2SE 5


    J2SE 5 is a major update, designed to improve ease of development, increase scalability,
    provide for additional monitoring and manageability, and enhance the Java desktop
    clients. While J2SE 5 offers a slew of new and exciting features, this book focuses
    on bread-and-butter topics such as threading, RMI, Swing, sockets, exception chaining,
    logging, and serialization. Once you understand the foundations, everything else
    follows naturally.


    ### The SCJD Exam


    The SCJD certification is a comprehensive test used by Sun to verify the skills
    of advanced Java programmers. It is generally considered a strong benchmark of
    competence. This book focuses on the features of J2SE 5 that are relevant to this
    exam. Adequate preparation is essential to pass the exam. Due to its difficulty,
    the opportunity to take the SCJD exam is only available to programmers who have
    already passed the Sun Certified Java Programmer (SCJP) exam. Fortunately, this
    book explains the concepts you need to know to pass the SCJD exam.


    > **Note:** Three Sun Certified Java Programmer exams are currently available:
    one for certification on each of the J2SE 1.2, J2SE 1.4, or J2SE 5.0 platforms,
    respectively. While the questions for each of these certifications differ slightly
    (for example, the J2SE 1.2 exam has Abstract Windowing Toolkit [AWT] questions),
    you only need to be certified in any one of these three certifications in order
    to be eligible for the SCJD certification.


    ### The Certification Process


    The SCJD certification process consists of two parts. The first part is an assignment
    consisting of a custom-designed sample project with a sample data file, an interface
    to be implemented, and specific requirements. You complete the assignment and
    return it for grading. Information on how to register for the assignment and download
    the assignment instructions and data file are presented in the next section of
    this chapter.


    When you have completed the assignment and returned it for grading, you move on
    to the second part of the certification process, which is a written test designed
    to confirm that you wrote the assignment you submitted, and to investigate the
    understanding that led to the design and implementation decisions made during
    the first part of the exam. You may take up to 90 minutes to complete the written
    exam; however, since there are currently only four questions on the exam, you
    should find that you have more than enough time to complete it.


    It is not possible to have notes or material with you for that exam. As such,
    it is best to take the written exam as soon as possible after you have submitted
    your assignment, while all the details are still fresh in your mind. Both sections
    are graded at once, even though the coding section is collected first. This means
    that the second exam will ask generic questions rather than specific ones about
    your individual project. You need a holistic understanding to pass both parts
    of the SCJD exam.


    > **Caution:** The assignment you submit will not be passed to an assessor for
    grading until *after* you have completed the essay exam. If you do not take the
    essay exam, you will not receive any warning that your assignment is not being
    assessed—it will just sit in limbo until you finally do take the essay exam.'
