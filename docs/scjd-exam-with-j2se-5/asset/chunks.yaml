- fmt: "# JDK 5 中的锁与条件等待\n\nJDK 5 包含了几个包，提供了独立于前述同步和锁定机制之外，对条件进行锁定和等待的能力。这些机制有几个好处，包括能够指定是否应公平地授予锁定（请记住，前面描述的方法对线程被授予锁定的顺序不做任何保证——一个刚刚开始等待的线程可能会比一个已经等待了很长时间的线程更早被通知）。\n\
    \n一个新的包`java.util.concurrent.locks`已在 JDK 5 中创建，它为 SCJD 考生提供了一些好处，包括拥有`ReadWriteLock`的能力（其中多个线程可以同时锁定记录进行读取，但只有一个线程可以锁定记录进行写入——这将提高并发性）。我们将在第\
    \ 5 章讨论`DvdFileAccess`类的部分中研究`ReadWriteLock`。\n\n在 JDK 1.4 中，从调用`wait(milliseconds)`返回后，无法*直接*知道线程是被通知了，还是超时已过。`Lock.tryLock(time,\
    \ unit)`方法返回一个`boolean`值，指示它是获得了锁还是时间已过期。使用类似的`Lock.await(time, unit)`方法的示例将在第\
    \ 5 章的“创建我们的逻辑预留方法”部分中展示。虽然这种技术对于 SCJD 作业不是必需的，但现在可以设置多个条件，线程可以在这些条件下被通知。\n\n\
    尽管新的锁代码看起来与使用`synchronized`块不同，但将代码从一种风格转换为另一种风格并不太难。例如，以下代码使用了一个`synchronized`块：\n\
    \n```\nObject lock = new Object();\n\npublic void doSomething() {\n    synchronized\
    \ (lock) {\n        while (true) {\n            try {\n                lock.wait();\n\
    \                // something happens here\n            } catch (InterruptedException\
    \ ie) {\n                // handle exception\n            }\n        }\n    }\n\
    }\n```\n\n这段代码可以改为如下新格式：\n\n```\nprivate static Lock lock = new ReentrantLock();\n\
    private static Condition lockReleased = lock.newCondition();\n\npublic void doSomething()\
    \ {\n    lock.lock();\n    try {\n        while (true) {\n            lockReleased.await();\n\
    \            // something happens here\n        }\n    } catch (InterruptedException\
    \ ie) {\n        // handle exception\n    } finally {\n        lock.unlock();\n\
    \    }\n}\n```\n\n使用新锁定类的示例将在第 5 章的“创建我们的逻辑预留方法”部分中展示，进一步的思考将在同一章的“讨论点：多个通知对象”部分中呈现。\n\
    \n为了确保锁被释放，我们强烈建议您像前面演示的那样，将对`unlock`的调用放在`finally`块中。\n\n无论您使用`synchronized`块还是新的并发类，线程安全的相同规则都适用。\n\
    \n## 锁定总结\n\n对象锁和对象内成员变量上的锁不会以任何方式相互作用。\n\n也就是说，同步一个对象并不会锁定该对象的成员变量。同样，同步一个成员变量也不会锁定拥有该变量的对象。只要线程不共享对公共对象的锁，拥有不同对象锁的线程就可以并发运行。此外，锁定一个类并不会锁定该类的实例。对成员变量的非同步访问可能会违反线程安全。\n\
    \n## 理解线程安全\n\n线程化带来了独特的逻辑陷阱，这些陷阱通常可能意外且看似随机地出现。在本节中，我们定义了一些常见的陷阱，并提供关于如何避免它们的建议。以下小节解释了什么是线程安全以及它有助于防止的各类问题。\n\
    \n### 死锁\n\n*死锁*发生在线程被永久阻塞，等待一个不可能发生的条件时。"
  raw: 'JDK 5 includes several packages that provide the ability to lock and wait
    on conditions separate from the synchronization and locking mechanisms described
    previously. These have several benefits, including the ability to specify whether
    locking should be granted fairly (remember that the methods described earlier
    make no guarantees about the order in which threads will be granted—a thread that
    has only just started waiting could be notified before a thread that has been
    waiting for a long time).


    5165CH04.qxd 11/16/05 12:11 PM Page 97


    C H A P T E R 4 ■ T H R E A D I N G


    **97**


    A new package, java.util.concurrent.locks, has been created in JDK 5, which provides
    some benefits to SCJD candidates, including the ability to have a ReadWriteLock
    (where multiple threads could all lock a record for reading, but only one thread
    could lock the record for writing—this will improve concurrency). We will examine
    ReadWriteLocks in the section discussing the DvdFileAccess class in Chapter 5.


    In JDK 1.4, after returning from a call to wait(milliseconds), it was not possible
    to know *directly* whether the thread had been notified, or whether the timeout
    had elapsed. The Lock.tryLock(time, unit) method returns a boolean indicating
    whether it had gained the lock or whether the time expired. An example of using
    the similar Lock.await(time, unit) method is shown in the “Creating Our Logical
    Reserve Methods” section in Chapter 5\. And while this technique is not required
    for the SCJD assignment, it is now possible to set multiple conditions upon which
    a thread might be notified.


    Although the new lock code looks different from using synchronized blocks, it
    is not too difficult to convert code from one style to another. For example, the
    following code uses a synchronized block:


    Object lock = new Object();


    public void doSomething() {


    synchronized (lock) {


    while (true) {


    try {


    lock.wait();


    // something happens here


    } catch (InterruptedException ie) {


    // handle exception


    }


    }


    }


    }


    This code can be changed to the new format like this:


    private static Lock lock = new ReentrantLock();


    private static Condition lockReleased = lock.newCondition(); public void doSomething()
    {


    lock.lock();


    try {


    while (true) {


    lockReleased.await();


    // something happens here


    }


    } catch (InterruptedException ie) {


    // handle exception


    } finally {


    lock.unlock();


    }


    }


    5165CH04.qxd 11/16/05 12:11 PM Page 98


    **98**


    C H A P T E R 4 ■ T H R E A D I N G


    An example of using the new locking classes is shown in the “Creating Our Logical
    Reserve Methods” section of Chapter 5, and further thoughts are presented in the
    same chapter, in the “Discussion Point: Multiple Notification Objects” section.


    To ensure that a lock is released, we highly recommend that you place the call
    to unlock in a finally block as demonstrated earlier.


    Regardless of whether you use synchronized blocks or the new concurrency classes,
    the same rules of thread safety apply.


    **Locking Summary**


    Object locks and locks on the member variable within the object do not interact
    in any way.


    That is, synchronizing an object does not lock member variables of that object.
    Nor does synchronizing a member variable lock the object that owns that variable.
    Threads that own locks on different objects can run concurrently as long as they
    do not also share a lock on a common object. In addition, locking a class does
    not lock instances of that class. Unsynchronized access to member variables can
    violate thread safety.


    **Understanding Thread Safety**


    Threading presents unique logical pitfalls, which can often be reached unexpectedly
    and seemingly randomly. In this section, we define some of the more common pitfalls
    and offer advice on ways to avoid them. The following subsections explain what
    thread safety is and the sorts of horrors it helps to prevent.


    **Deadlocks**


    *Deadlocks* occur when threads are blocked forever, waiting for a condition that
    cannot occur.'
