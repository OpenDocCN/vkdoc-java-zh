- fmt: '### **Figure 9-3.** *Compiling the source into the classes directory* **Creating
    a Manifest File**


    Now you’ll want to create a manifest file. This file will be packaged in your
    project’s JAR file and used by the JVM to load the correct class and run the application.
    The key entry in the manifest file is the class name of the main method you want
    to execute when running the application. In our case, this is the `ApplicationRunner`
    class in the `gui` package.


    The contents of the manifest file are minimal. Insert the following two lines
    of code and save them in a new file called `Manifest.mf`. We have placed the manifest
    file in the root directory, `dennysDVDs2.0`.


    ```

    Manifest-Version: 1.0

    Main-Class: sampleproject.gui.ApplicationRunner

    ```


    > **Note** The name of the manifest file can be anything you like if you are using
    Sun’s `jar` tool to create the JAR file. We will go into this in more detail when
    we describe using the `jar` tool in the section “Packaging the Application” later
    in this chapter. If you are not using Sun’s `jar` tool (there is really no reason
    not to use it, though), then the final manifest file **must** be named `MANIFEST.MF`
    and must be placed in the `META.INF` directory, which must be in the root directory
    of the JAR file.


    The location of the manifest file comes into play when we actually create a JAR
    file containing our project’s class files. All JAR files contain manifests, and
    the manifest can be used to specify many attributes for the JAR file. Some of
    the more common attributes are shown in Table 9-1.


    **Table 9-1.** *Manifest Attributes*


    | Attribute | Use |

    | --- | --- |

    | `Manifest-Version` | Specifies which version of the `Manifest.mf` definition
    you are conforming to. At present only version 1.0 has been defined. |

    | `Created-By` | Specifies the `jar` tool’s creator and version number. This is
    automatically added by the `jar` tool itself, so you should not set it. |

    | `Class-Path` | You may optionally use this to specify libraries needed at runtime.
    These must be specified relative to the current JAR file (so you can specify `lib/another.jar`
    but you cannot specify an absolute path like `d:\libs\another.jar`). If you have
    multiple JAR files, separate them by spaces. |

    | `Main-Class` | Tells the JVM which class to execute if the JVM is started with
    the `-jar` parameter. |


    There are many other attributes that can be set as well, but delving into them
    is beyond the scope of this book. If you are interested in reviewing these options,
    we recommend you look at the Sun documentation for JAR files available online
    at `http://java.sun.com/j2se/1.5.0/docs/guide/jar/jar.html#JAR Manifest`.


    The `jar` tool needs to know where to load the manifest file so that it can be
    included in the JAR file. Otherwise, the `jar` tool will create one by default.
    The manifest file that is created by default when you do not specify one will
    not include a main class label.


    ### **Running `rmic` on the Remote Package**


    One of the benefits of using JDK 5 is that using `rmic` to create stubs is not
    strictly necessary; the stubs can be generated dynamically. However, as explained
    in Chapter 6, stubs are still required if you have pre-JDK 5 clients or if you
    are not allowed to dynamically generate stubs.


    This section has been provided for the benefit of those who may require stubs.


    > **Caution** At the time of this writing, all current assignments have a prohibition
    against *requiring* the dynamic downloading of stubs—you must provide all stubs
    precompiled in your executable JAR file. Since dynamically generating stubs would
    result in the stubs being dynamically downloaded, you cannot use the JDK 5 dynamic
    stub generation feature. However, you should still check the assignment instructions
    **you** downloaded from Sun; future assignments may remove this prohibition.


    Using RMI involves creating stubs with the Java tool `rmic`. The stubs need to
    be packaged up with the JAR file in order to run the program using RMI via the
    remote package.


    The `rmic` command only needs to be run on the remote object implementation class
    file. In our case, that class is `DvdDatabaseImpl` of the `remote` package. Make
    sure you run the `rmic` command from the destination directory because the class
    files are required by `rmic`.


    Figure 9-4 shows `rmic` being run against the `DvdDatabaseImpl` class. In addition,
    `rmic` also needs to be run against the `DvdDatabaseFactoryImpl` class.


    ![Image 58](index-324_1.png)


    **Figure 9-4.** *Running `rmic` on the remote object `DvdDatabaseImpl`*


    If you would like more detailed information than what is shown in Figure 9-4,
    run `rmic` with the `-verbose` flag. The `-help` option will display all of the
    other options that are available.


    The file displayed in the remote directory, `DvdDatabaseImpl_Stub.class`, is the
    result of the `rmic` command.


    ### **Packaging the Application**


    You are ready to create your JAR file. The `jar` command allows you to create
    archives of files of various types into a single compressed file based on the
    zip format. To run the `jar` command, make sure you comply with the following
    syntax:


    ```

    jar [options] [manifest] destination input-file [input-files]

    ```


    To create your JAR file, use the `c`, `v`, `f`, and `m` options, which are described
    in Table 9-2. You will also need to specify the location of your manifest file,
    which is in the `dennysDVDs2.0` root directory.


    **Table 9-2.** *`jar` Tool Options Used to Create `sampleproject.jar`*


    | Option | Description |

    | --- | --- |

    | `c` | **C**reates a new archive; unless the `f` parameter is provided, the archive
    will be created on standard output. |

    | `v` | Generates **v**erbose output. |

    | `f` | Indicates that the name of the JAR **f**ile to be created (not on stdout)
    will be specified as the next argument in order. |

    | `m` | Includes a **m**anifest file that will be specified as the next argument
    in order. The `jar` tool will read the contents of the file you specified and
    store them in the file named `MANIFEST.MF` in the `META.INF` directory. |


    ![Image 59](index-325_1.png)


    > **Note** When more than one `jar` command-line option requires a parameter,
    the parameters must appear in the same order as the command-line options. That
    is, if the command-line options are `-cvfm`, then the output filename must appear
    before the manifest file name (since the `f` appeared before the `m`). However,
    if the command-line options provided were `-cvmf`, then the manifest file name
    must appear before the output filename (since the `m` appeared before the `f`).


    There are other options you can use with the `jar` tool. Running `jar -help` will
    give a brief synopsis of the various arguments and usage options. Figure 9-5 captures
    the `sampleproject.jar` file creation in the root directory using the command:
    `jar -cfm sampleproject.jar Manifest.mf -C classes .`


    > **Caution** There is one period in the command line following the directory
    named `classes`. It is easy to miss that period in a book, particularly when it
    occurs at the end of a sentence. If you are unsure of the command line we used,
    compare it with Figure 9-5.


    Using the `-v` option will display verbose output detailing which files are being
    added to the JAR and information related to file compression. To display verbose
    information, replace `-cfm` with `-cvfm` in the `jar` command.


    **Figure 9-5.** *Creating the `sampleproject.jar` file*


