    public interface DBClient {


    /**


    * 向数据库或库存中添加一张 DVD。


    *


    * @param dvd 要添加到库存中的 DVD 项目。


    * @return 指示添加操作的成功/失败。


    * @throws IOException 指示访问数据库时出现问题。


    */


    public boolean addDVD(DVD dvd) throws IOException;


    /**


    * 使用 UPC 标识号查找 DVD。


    *


    * @param UPC 要查找的 DVD 的 UPC。


    * @return 与 UPC 匹配的 DVD 对象。


    * @throws IOException 如果访问数据时出现问题。


    */


    public DVD getDVD(String UPC)throws IOException;


    /**


    * 更改 DVD 项目的现有信息。


    * 可以修改 DVD 除 UPC 之外的任何属性。


    * UPC 用于标识要修改的 DVD。


    *


    * @param dvd 要修改的 DVD。


    * @return 如果找到并修改了 DVD，则返回 true。


    * @throws IOException 指示访问数据时出现问题。


    */


    public boolean modifyDVD(DVD dvd) throws IOException;


    /**


    * 使用唯一的 UPC 从库存中移除 DVD。


    *


    * @param UPC 要移除的 DVD 的 UPC 或键。


    * @return 如果找到 UPC 并移除了 DVD，则返回 true。


    * @throws IOException 指示访问数据时出现问题。


    */


    public boolean removeDVD(String UPC) throws IOException;


    /**


    * 获取商店的库存。


    * 系统中所有的 DVD。


    *


    * @return 包含所有找到的 DVD 的列表。


    5165CH06.qxd 11/16/05 12:14 PM Page 187


    第 6 章 ■ 使用 RMI 进行网络编程 **187**


    * @throws IOException 指示访问数据时出现问题。


    */


    public List<DVD> getDVDs() throws IOException;


    /**


    * 格式正确的 <code>String</code> 表达式将返回所有


    * 匹配的 DVD 项目。<code>String</code> 必须格式化为


    * 正则表达式。


    *


    * @param query 用作搜索条件的格式化正则表达式。


    * @return 与查询匹配的 DVD 列表。可以是空集合。


    * @throws IOException 指示访问数据时出现问题。


    * @throws PatternSyntaxException 指示正则表达式中存在语法问题。


    */


    public Collection<DVD> findDVD(String query)


    throws IOException, PatternSyntaxException;


    /**


    * 锁定请求的 DVD。此方法会阻塞，直到锁定成功，


    * 或最多 5 秒钟，以先到者为准。


    *


    * @param UPC 要预留的 DVD 的 UPC


    * @throws InterruptedException 指示线程被中断。


    * @throws IOException 任何网络问题


    */


    boolean reserveDVD(String UPC) throws IOException, InterruptedException;


    /**


    * 解锁请求的记录。如果调用者当前没有


    * 对请求记录的锁定，则忽略此操作。


    *


    * @param UPC 要释放的 DVD 的 UPC


    * @throws IOException 任何网络问题


    */


    void releaseDVD(String UPC) throws IOException;


    }


