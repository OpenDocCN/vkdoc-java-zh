    Dealing with Nonimplicit Locking


    You should be aware of two important issues when you deal with locks. First, locking
    an object does not lock member variables of that object. This may seem counterintuitive
    at first, but it makes sense from the JVM’s point of view. Specifically, it allows
    the thread to avoid locking objects that may be nested *n* layers deep. Imagine
    the overhead of locking an object, locking all of its member variables, locking
    all of their member variables, and so on. Listing 4-6


    shows an example of locking objects but not their member variables. The output
    is shown in Figure 4-5.


