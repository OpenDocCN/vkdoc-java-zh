    ## About the Authors


    **ANDREW MONKHOUSE** is a moderator on the JavaRanch web site, currently moderating
    the SCJD and SCJA forums. Andrew has passed SCJP 1.2, SCJP 1.4, SCJD, SCWCD, SCBCD,
    and Part I of SCEA. He has been working with computers for too long (his first
    program was written on mark-sense cards, which are similar to punch cards). Andrew
    has worked in a number of positions from programmer, to architect and IT manager,
    working on VMS, Unix, Macintosh, and Microsoft operating systems. He’s built back-end,
    middleware, and front-end solutions for a variety of industries. Andrew is an
    Australian at heart, although he is frequently in other countries for work purposes.


    **TERRY CAMERLENGO** has over 9 years of software engineering experience from
    numerous corporations, including Fortune 500s and dot-coms. He is experienced
    in all phases of the software life cycle, with a focus on object-oriented technologies
    such as Java, C#, C++, and .NET. His expertise includes front-end web design,
    server-side enterprise development, and relational database modeling and development.
    Terry holds both Sun and Microsoft certifications, and graduated with a degree
    in computer science and philosophy from Ohio State University. Currently Terry
    works for Ohio State University’s James Cancer Center in the Biomedical Informatics
    department as a senior developer and research specialist and is pursuing advanced
    studies in computational biology.


    ## About the Technical Reviewer


    **JIM YINGST** studied engineering physics at the University of Arizona, but after
    graduating he got sucked into the IT job market instead because, well, it seemed
    like a good idea at the time. He now roams the West helping tech companies find
    solutions to their IT problems. Jim is a sheriff (administrator) and longtime
    contributor at `www.javaranch.com`, where his duties include answering Java questions,
    redirecting off-topic posts, and dealing with troublesome Australians. He seems
    to spend most of his free time obsessively visiting bookstores. On rare occasions
    he actually reads the stuff he buys, mostly science fiction. The rest of the time
    he’s probably listening to obscure progressive rock bands or finding new Thai
    restaurants. Jim lives in Boulder, Colorado.


    ## Acknowledgments


    We would like to thank the following people:


    - Mehran (Max) Habibi, who did so much work on the first edition and in getting
    this edition started, as well as introducing us to each other and to the Apress
    staff

    - Our technical editor Jim Yingst, who not only verified our writing but made
    so many wonderful suggestions

    - The fantastic staff at Apress for working with us on this project, and taking
    our raw work and producing a polished publication

    - Each other


    Without the help of all these people, this book would not be anywhere near as
    good as it is. We would also like to thank family, friends, and colleagues who
    put up with our bouncing between being totally unsociable when there were deadlines
    to meet, and desperately trying to catch up with everyone in the quiet times.


    Andrew Monkhouse and Terry Camerlengo'
