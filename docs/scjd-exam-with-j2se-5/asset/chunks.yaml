- fmt: "# Tip\n\nAdding a shutdown hook is a good way of handling shutdowns within\
    \ an application that will be running on a server. No matter whether your code\
    \ calls `System.exit`, or the user clicks the close button, or the application\
    \ is told by the operating system that it must shut down, the same hook will be\
    \ run. Handling the cases where the operating system tells the application to\
    \ shut down is especially valuable—consider the case where the server is running\
    \ on an uninterruptible power supply (UPS) and the power goes out. Normally the\
    \ UPS runs for a while on battery power, but that can only last so long. So before\
    \ the battery is likely to run out, the UPS sends a message to the operating system\
    \ telling it to shut down. The operating system then sends a message to all running\
    \ applications telling them to shut down. The shutdown hook allows your application\
    \ to receive this message and perform a clean shutdown.\n\n## Listing 8-32. The\
    \ Shutdown Hook Code\n\n```\npackage sampleproject.gui;\n\nimport java.io.IOException;\n\
    import java.util.logging.*;\nimport sampleproject.db.*;\n\npublic class CleanExit\
    \ extends Thread {\n    private Logger log = Logger.getLogger(\"sampleproject.gui\"\
    );\n    public void run() {\n        log.info(\"Ensuring a clean shutdown\");\n\
    \        try {\n            DVDDatabase database = new DVDDatabase();\n      \
    \      database.setDatabaseLocked(true);\n        } catch (IOException fne) {\n\
    \            log.log(Level.SEVERE, \"Failed to lock database before exiting\"\
    , fne);\n        }\n    }\n}\n```\n\n## Swing Changes in J2SE 5\n\nSun has introduced\
    \ several changes to Swing for the latest release of J2SE. Several of these improvements\
    \ can be used to provide a more polished submission. We will briefly discuss them\
    \ in this section.\n\n### Improve Default Look and Feel of Swing\n\nPrior to JDK\
    \ 5, if you wanted to provide a common look and feel for your application on multiple\
    \ platforms, you had to use the Metal look and feel, which by default used to\
    \ look like Figure 8-37.\n\n![Image 54](index-309_1.png)\n\n![Image 55](index-309_2.png)\n\
    \n**Figure 8-37.** *An example of using the Metal look and feel with the Steel\
    \ theme*\n\nWith JDK 5, Sun has modified this look and feel, as shown in Figure\
    \ 8-38.\n\n**Figure 8-38.** *An example of using the Metal look and feel with\
    \ the Ocean theme*\n\nTo help reduce confusion, Sun has named these two versions\
    \ of the same look and feel \"Steel\" and \"Ocean,\" respectively.\n\nIf you wish\
    \ to use the old theme, you can set the following system property:\n\n```\n-Dswing.metalTheme=steel\n\
    ```\n\n### Skins Look and Feel\n\nA \"skin\" (also called a \"theme\") is a way\
    \ of changing the look and feel of an application or website, without changing\
    \ any code. This is usually achieved by modifying a configuration file.\n\nSun\
    \ has created `javax.swing.plaf.synth.SynthLookAndFeel` as a skinnable look and\
    \ feel, allowing the look and feel to be specified in a file. This means that\
    \ your users could modify this file to make your application meet their preferred\
    \ look and feel without needing any coding changes.\n\n### Adding Components to\
    \ Swing Containers Has Been Simplified\n\nPrior to JDK 5, it was not possible\
    \ to directly add components to any class that implemented `RootPaneContainer`,\
    \ namely `JApplet`, `JDialog`, `JFrame`, `JInternalFrame`, and `JWindow`. Instead,\
    \ you had to get the content pane, then add the components to it. This resulted\
    \ in code that looks like this:\n\n```\nJFrame theFrame = new JFrame();\ntheFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    Container thePane = theFrame.getContentPane();\nthePane.add(new JButton(\"Exit\"\
    ));\ntheFrame.pack();\ntheFrame.setVisible(true);\n```\n\nA large number of users\
    \ of classes that implement `JRootPane` do not need to use the various panes that\
    \ exist—they only need to add content to the content pane. So in JDK 5 Sun has\
    \ rewritten the `add` methods of these classes so that they perform in the way\
    \ most users would expect. This allows us to rewrite the previous code as shown\
    \ here:\n\n```\nJFrame theFrame = new JFrame();\ntheFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    theFrame.add(new JButton(\"Exit\"));\ntheFrame.pack();\ntheFrame.setVisible(true);\n\
    ```\n\nThis reduces confusion as to when we should be dealing with the frame itself\
    \ or the panel, and makes the code a little more readable.\n\n## Summary\n\nA\
    \ sound interface design will bridge the gap between the user and the system.\
    \ By using solid design patterns, such as the Model-View-Controller (MVC) architectural\
    \ paradigm, you can ensure that changes to the data display have minimal impact\
    \ on the rest of the system. On a superficial level, the end user will most likely\
    \ judge the quality of an application based on the functionally of its interface,\
    \ so it is important to plan and design a quality front-end to a system.\n\nIn\
    \ this chapter we introduced GUI design, and provided some examples of how you\
    \ can combine various layout managers and components to achieve your desired design.\
    \ It is important to realize that there is no \"one right way\" to develop a GUI,\
    \ so you can use the techniques introduced here to develop GUIs that you believe\
    \ will be usable for your instructions.\n\n## FAQs\n\n**Q** The instructions state\
    \ that I may only use Swing components, but none of the layout managers are part\
    \ of the `javax.swing` package—will this cause me to fail?\n\n**A** You will be\
    \ fine using any of the layout managers. However, you must not use an AWT component\
    \ where there is a Swing replacement. For example you should not use a `Button`\
    \ since there is a Swing replacement: the `JButton`.\n\n**Q** Does Swing replace\
    \ AWT?\n\n**A** Swing is not a replacement for AWT. Swing is built on the patterns\
    \ and groundwork set forth in AWT. Both Swing and AWT components can be mixed\
    \ and matched in any interface, to an extent (however, only Swing components may\
    \ be used in the Sun assignment). Swing does offer some large improvements over\
    \ AWT both in performance and functionality. Therefore, Sun now emphasizes Swing\
    \ over AWT. As a result, Swing is a required part of the SCJD exam.\n\n**Q** How\
    \ do I center a window on screen?\n\n**A** To center a window on screen, get the\
    \ window dimensions from the `java.awt.Toolkit.getDefaultToolkit().getScreenSize()`\
    \ method. Use the returned `Dimension` to calculate the vertical and horizontal\
    \ center of the screen while taking into account the dimensions of the window\
    \ you want to center. Finally, place the window at that location, as in the following\
    \ code snippet used for centering our `connectionDialog` object:\n\n```\n// Center\
    \ on screen\nDimension d = Toolkit.getDefaultToolkit().getScreenSize();\nint x\
    \ = (int) ((d.getWidth() - connectionDialog.getWidth()) / 2);\nint y = (int) ((d.getHeight()\
    \ - connectionDialog.getHeight()) / 2);\ndialog.setLocation(x, y);\n```\n\n**Q**\
    \ How do I create keystroke mnemonics for my GUI components?\n\n**A** You can\
    \ add keystroke mnemonics to virtually any component via the `setMnemonic(int\
    \ keyValue)` method. Lists of predefined key values are located in the `KeyEvent`\
    \ class.\n\n**Q** Can I use the Macintosh look and feel on a Windows operating\
    \ system, or vice versa?"
  raw: '■**Tip** Adding a shutdown hook is a good way of handling shutdowns within
    an application that will be running on a server. No matter whether your code calls
    System.exit, or the user clicks the close button, or the application is told by
    the operating system that it must shut down, the same hook will be run. Handling
    the cases where the operating system tells the application to shut down is especially
    valuable—consider the case where the server is running on an uninterruptible power
    supply (UPS) and the power goes out. Normally the UPS runs for a while on battery
    power, but that can only last so long. So before the battery is likely to run
    out, the UPS sends a message to the operating system telling it to shut down.
    The operating system then sends a message to all running applications telling
    them to shut down. The shutdown hook allows your application to receive this message
    and perform a clean shutdown.


    **Listing 8-32.** *The Shutdown Hook Code*


    package sampleproject.gui;


    import java.io.IOException;


    import java.util.logging.*;


    import sampleproject.db.*;


    public class CleanExit extends Thread {


    private Logger log = Logger.getLogger("sampleproject.gui"); public void run()
    {


    log.info("Ensuring a clean shutdown");


    try {


    DVDDatabase database = new DVDDatabase();


    database.setDatabaseLocked(true);


    } catch (IOException fne) {


    log.log(Level.SEVERE, "Failed to lock database before exiting", fne);


    }


    }


    }


    **Swing Changes in J2SE 5**


    Sun has introduced several changes to Swing for the latest release of J2SE. Several
    of these improvements can be used to provide a more polished submission. We will
    briefly discuss them in this section.


    **Improve Default Look and Feel of Swing**


    Prior to JDK 5, if you wanted to provide a common look and feel for your application
    on multiple platforms, you had to use the Metal look and feel, which by default
    used to look like Figure 8-37.


    ![Image 54](index-309_1.png)


    ![Image 55](index-309_2.png)


    5165CH08.qxd 11/16/05 12:16 PM Page 290


    **290**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **Figure 8-37.** *An example of using the Metal look and feel with the Steel theme*
    With JDK 5, Sun has modified this look and feel, as shown in Figure 8-38.


    **Figure 8-38.** *An example of using the Metal look and feel with the Ocean theme*
    To help reduce confusion, Sun has named these two versions of the same look and
    feel


    “Steel” and “Ocean,” respectively.


    If you wish to use the old theme, you can set the following system property:


    -Dswing.metalTheme=steel


    **Skins Look and Feel**


    A “skin” (also called a “theme”) is a way of changing the look and feel of an
    application or website, without changing any code. This is usually achieved by
    modifying a configuration file.


    Sun has created javax.swing.plaf.synth.SynthLookAndFeel as a skinnable look and
    feel, allowing the look and feel to be specified in a file. This means that your
    users could modify this file to make your application meet their preferred look
    and feel without needing any coding changes.


    **Adding Components to Swing Containers Has Been Simplified** Prior to JDK 5,
    it was not possible to directly add components to any class that implemented RootPaneContainer,
    namely JApplet, JDialog, JFrame, JInternalFrame, and JWindow. Instead, you had
    to get the content pane, then add the components to it. This resulted in code
    that looks like this:


    JFrame theFrame = new JFrame();


    theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); Container thePane = theFrame.getContentPane();


    thePane.add(new JButton("Exit"));


    theFrame.pack();


    theFrame.setVisible(true);


    5165CH08.qxd 11/16/05 12:16 PM Page 291


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **291**


    A large number of users of classes that implement JRootPane do not need to use
    the various panes that exist—they only need to add content to the content pane.
    So in JDK 5 Sun has rewritten the add methods of these classes so that they perform
    in the way most users would expect. This allows us to rewrite the previous code
    as shown here: JFrame theFrame = new JFrame();


    theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); theFrame.add(new JButton("Exit"));


    theFrame.pack();


    theFrame.setVisible(true);


    This reduces confusion as to when we should be dealing with the frame itself or
    the panel, and makes the code a little more readable.


    **Summary**


    A sound interface design will bridge the gap between the user and the system.
    By using solid design patterns, such as the Model-View-Controller (MVC) architectural
    paradigm, you can ensure that changes to the data display have minimal impact
    on the rest of the system. On a superficial level, the end user will most likely
    judge the quality of an application based on the functionally of its interface,
    so it is important to plan and design a quality front-end to a system.


    In this chapter we introduced GUI design, and provided some examples of how you
    can combine various layout managers and components to achieve your desired design.
    It is important to realize that there is no “one right way” to develop a GUI,
    so you can use the techniques introduced here to develop GUIs that you believe
    will be usable for your instructions.


    **FAQs**


    **Q** The instructions state that I may only use Swing components, but none of
    the layout managers are part of the javax.swing package—will this cause me to
    fail?


    **A** You will be fine using any of the layout managers. However, you must not
    use an AWT


    component where there is a Swing replacement. For example you should not use a
    Button since there is a Swing replacement: the JButton.


    **Q** Does Swing replace AWT?


    **A** Swing is not a replacement for AWT. Swing is built on the patterns and groundwork
    set forth in AWT. Both Swing and AWT components can be mixed and matched in any
    interface, to an extent (however, only Swing components may be used in the Sun
    assignment).


    Swing does offer some large improvements over AWT both in performance and functionality.
    Therefore, Sun now emphasizes Swing over AWT. As a result, Swing is a required
    part of the SCJD exam.


    5165CH08.qxd 11/16/05 12:16 PM Page 292


    **292**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **Q** How do I center a window on screen?


    **A** To center a window on screen, get the window dimensions from the java.awt.Toolkit.getDefaultToolkit().getScreenSize()
    method. Use the returned Dimension to calculate the vertical and horizontal center
    of the screen while taking into account the dimensions of the window you want
    to center. Finally, place the window at that location, as in the following code
    snippet used for centering our connectionDialog object:


    // Center on screen


    Dimension d = Toolkit.getDefaultToolkit().getScreenSize(); int x = (int) ((d.getWidth()
    - connectionDialog.getWidth())/ 2); int y = (int) ((d.getHeight() - connectionDialog.getHeight())/
    2); dialog.setLocation(x, y);


    **Q** How do I create keystroke mnemonics for my GUI components?


    **A** You can add keystroke mnemonics to virtually any component via the setMnemonic(int
    keyValue) method. Lists of predefined key values are located in the KeyEvent class.


    **Q** Can I use the Macintosh look and feel on a Windows operating system, or
    vice versa?'
