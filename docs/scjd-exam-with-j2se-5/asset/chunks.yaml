    object used by many threads. However, in most cases, the threads will only be
    reading from the `recordNumbers` map—it will be much rarer for a method to update
    this map. Prior to JDK 5, we would have synchronized all access to the `recordNumbers`
    map, which would have meant that only one thread could ever access it at any given
    time. With JDK 5 we now have `ReadWriteLock`s that allow for greater concurrency.
    Instead of synchronizing code, we encapsulate the code inside calls to `lock`
    and `unlock` methods. Multiple threads can own a read lock on a single object
    at any given time, but only one thread can own a write lock at any given time.


    If we are running this from the constructor, then we will be updating the `recordNumbers`
    map, so we will not want any other thread to be accessing the map in the meantime—a
