  trans: '

    *套接字*是两个程序之间通信链路中的一个端点，并且始终绑定到一个端口。套接字连接用于连接远程机器，以及发送和接收数据。要创建套接字连接，你需要目标主机地址和端口号。套接字并非
    Java 所特有。然而，自 JDK 1.0 以来，所有版本的 Java 都提供了创建套接字的工具。与 RMI 一样，讨论将按客户端和服务器的考量进行划分。


    服务器是一个监听服务，用于接收来自套接字客户端的连接请求。


    当请求被批准时，服务器会建立一个套接字到套接字的连接。客户端将使用服务器的主机名（或 IP 地址）和端口来请求连接。在网络的服务端，`java.net.ServerSocket`
    是用于监听来自套接字客户端的连接请求的类。`java.net.Socket` 类是套接字连接的一个端点。


    服务器和客户端在每个套接字连接上都会有一个 `java.net.Socket` 实例。


    **为什么使用套接字**


    在套接字和 RMI 之间做出选择，是你在认证项目中必须做出的最大决定之一。但每种选择都有其自身的优势和权衡。如果 JavaRanch 认证考试论坛上的讨论能说明问题，那么大多数开发者似乎都选择了
    RMI 方案。事实上，在本书的第一版中，我们曾推荐使用 RMI 而非套接字，仅仅是因为当时我们认为从 Java 程序员的角度来看，这种方法更直观。然而，自那以后，我们不再坚持这一论断。无论是
    RMI 还是套接字都能很好地工作，并且两者实现起来都相当直接。但对于那些喜欢冒险的人来说，让我们讨论一下你可能选择套接字方案的一些原因。


    套接字服务器比 RMI 服务器更具可扩展性且速度更快。获取远程对象句柄需要以注册表查找的形式进行网络调用。此外，每个远程对象都有一个客户端代理或存根，这实际上在客户端和实际远程对象实现类之间增加了一个对象层。这种通信开销是以性能为代价的。


    通常，提到*不*使用套接字的原因之一是需要在套接字客户端和套接字服务器之间建立隐式契约或应用协议。我们将在本章后面的“应用协议”一节中更详细地讨论这一点。但是，如果协议非常简单呢？在套接字接口简单的情况下，套接字是一个极好的选择。


    最后一个值得考虑使用套接字实现的原因涉及线程。在我们的套接字方案中，每个套接字客户端请求都会产生一个新线程，我们可以利用这个线程来维护对 `DvdDatabase`
    的锁定。这意味着我们不必像使用 RMI 那样担心实现工厂模式。我们的套接字方案的本质避免了这一可能复杂化的问题。当然，你现在必须处理开发多线程套接字服务器的问题，但解决方案即将到来！Denny''s
    DVDs 就是一个多线程套接字服务器，我们将在本章后面描述我们的服务器实现。


    **套接字基础**


    在本节中，我们将探讨 Java 程序员可用的套接字类型，以及与套接字开发相关的一些基本概念。


    **地址**


    地址是用于标识连接到网络的设备的唯一编号，就像邮政地址标识城市中建筑物的位置一样。IP 地址是一个唯一的编号，通常由 12 位或更多数字组成，技术上是一个
    32 位或 128 位的无符号数，由互联网协议（即 IP）使用，用于在基于 TCP 或 UDP 的网络上在套接字地址之间发送消息。`java.net.InetAddress`
    类是封装了 IP 地址以供 Java 套接字使用的 Java 类。


    ■**注意** TCP/IP 使用的 32 位寻址方案自 20 世纪 70 年代以来就已存在。随着越来越多的设备需要互联网地址，据估计，所有当前可用的地址将在
    2016 年至 2023 年之间的某个时候被用完（然而，之前对互联网增长的估计远低于实际情况，因此这个数字并不可靠）。为了缓解这个问题，一种新的寻址方案已被推荐并正在逐步实施。32
    位寻址方案称为 IPv4，新的寻址方案称为 IPv6。Java 分别通过 `Inet4Address` 类和 `Inet6Address` 类支持这两种方案。在本章中，我们将使用
    IPv4，因为这是目前最常用的寻址方案。


    **TCP 和 UDP 套接字概述**


    多年来，编程已经从手动设置二进制指令（1GL 或第一代语言），发展到汇编语言（2GL）、人类可读语言（Java、C++）以及像 SQL（4GL）这样的规范语言。后来的语言并没有消除对低级语言的需求——它们只是完成了将程序员代码翻译成低级代码的艰巨工作。例如，在使用
    Java 编程时，你的代码将由 Java 编译器翻译成字节码（大致对应于汇编语言程序的输出），然后由 JVM 将其翻译成计算机的二进制指令。虽然你仍然可以找到机器语言程序员的工作，但许多程序员发现这类工作速度慢且容易出错——使用像
    Java 这样的高级语言可以极大地提高生产力和工作质量。


    类似地，网络协议多年来也在不断发展，因此我们不再需要担心最底层的网络细节。当你编写 Java 程序时，你通常不关心如何通过电线（或其他介质）物理发送信号，也不关心你的计算机是通过以太网还是令牌环网络进行通信；你只关心如何建立连接。最后，为了使用套接字，我们将使用
    IP 而不是其他网络层（X.25、ICMP、IPX）。但即使选择了使用套接字，将所有低级通信留给 IP 层及其下层，我们仍然需要在 TCP 和 UDP 套接字之间做出选择。


    UDP 套接字


    用户数据报协议（UDP）使网络上的机器能够相互发送数据报包。UDP 套接字的工作方式与美国邮政系统非常相似。消息或信件被发送到特定地址，服务器或收件人端点不需要立即响应。UDP
    套接字不需要双向连接。同样，邮政系统不要求收件人在信件送达时在场。


    让我们进一步考虑一下邮件的类比。一封信被投递到邮箱，然后被送到指定的地址。邮递员随后将信件放入目的地的邮箱。邮政系统不要求有人在那里接收信件（当然，我意识到有时包裹需要签名，但为了方便起见，我们现在先忽略这类包裹）。当收信人回家后，他或她就可以取走邮件。

