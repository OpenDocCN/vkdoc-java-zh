    C H A P T E R 7 ■ N E T W O R K I N G W I T H S O C K E T S


    **213**


    **Figure 7-2.** *Iterative socket server lifecycle* Socket servers that can multitask
    can process multiple client requests simultaneously.


    This is accomplished with a multithreaded socket server. If you are anticipating
    a lot of requests, or requests take a long time to process, then multitasking
    is a very useful feature for a socket server to have. The Denny’s DVDs socket
    version is a multithreaded socket server.


    Each client gets serviced with its own thread, which makes the socket solution
    operate much like our RMI factory solution. We can thus be assured that each client
    has its own DvdDatabase object. (See our discussion on the RMI factory in Chapter
    6.) The next section describes the details of our multitasking socket solution.


