- fmt: '# SCJD 考试中的设计决策


    在整个 SCJD 考试中，Sun 已经规定了某些设计和实现选择。例如，考试要求使用 `JTable` Swing 组件。然而，其他选择则由您（考生）自行决定。例如，您可以选择实现使用
    RMI 的网络层，也可以采用基于套接字的不同方法。每种实现都有其优缺点。您必须确保记录您的选择，因为有必要向最终决定您的考试提交是否通过的个人辩护这些设计决策。


    对于 SCJD 考试，请在**设计决策文档**中清晰地记录您的设计选择。该文档应包含具体决策的示例，例如您选择的设计模式或使用某种技术而非另一种技术。也可能出现基于不明确的功能需求做出设计决策的情况。如果发生这种情况，请将其作为设计决策提出，并记录您为处理该问题所做的所有假设。请务必完成设计决策文档，因为这是考试允许您为提交的项目进行辩护的唯一机会。


    > **提示** 值得注意的是，在 Sun 的作业中，就像在现实生活中的项目中一样，任何给定问题通常都有几种解决方案。对于*每一个*可能的解决方案，都可能存在该特定解决方案并非最优的原因。您不应花费过多时间寻找“唯一完美的解决方案”——它可能不存在。Sun
    在作业说明中故意留下了足够的模糊性，以至于考生选择有限的领域非常少。在所有其他情况下，做出什么选择并不那么重要，但您如何做出选择却很重要，这应在您的设计决策文档中详细说明。


    # Java 编码规范


    我们行业中的一个共同目标是能够将项目移交给其他人——让他们将来进行任何维护，因为您将无法参与（您将从事更令人兴奋的项目并去度假）。


    为了实现这一目标，我们编写的代码需要以这样一种方式格式化，以便您可以将其移交给其他人，并且他们会乐意接受。如果您移交代码，而另一个人因为代码难以理解而将其全部丢弃，这对您的声誉没有任何好处。


    同样，如果我们不将本书组织成章节、段落和句子，对我们也没有任何好处——如果您无法阅读本书，您就不会从中学习到太多东西。


    Java、C 和 C++ 的开发人员故意避免强制编码人员遵循特定的编码规范——存在语法要求，但只要满足这些要求，代码就可以以任何您喜欢的方式出现在打印页面上。例如，考虑以下代码片段：


    ```java

    public class MyTest {


    public static void main(String[] args) {


    System.out.println("Hello");


    }


    }

    ```


    该代码被 Java 编译器解释的方式与以下代码完全相同：


    ```java

    public


    class


    MyTest{public static void main(String


    z[]){System.out.println("Hello");}}

    ```


    您无疑会同意第一种格式比第二种格式可读性强得多。


    虽然很容易同意应该遵循代码格式化风格，但很难就代码格式化风格本身达成一致。例如，一个人通常喜欢将左花括号（`{`）放在现有行的末尾；另一个人则喜欢将左花括号单独放在一行。两位编码人员都可以为他们特定的风格提出令人信服的论据，但实际上只有一种风格


    在工作场所，管理层通常会指定必须使用哪种特定风格。


    对于本书以及 SCJD 作业，我们建议您使用 **Sun Java 编程语言代码规范**，您可以从 `http://java.sun.com/docs/codeconv/`
    下载。Sun 指定了他们认为需要编码指南的 11 个领域，这些领域可以归纳为以下主要类别：命名规范、文件布局、源代码格式和注释格式。接下来我们将介绍这些类别。


    ## 命名规范


    Sun 代码规范为包、类和接口、方法、变量以及常量指定了不同的命名规范。


    对于所有命名规范，您应尽量避免使用缩写，除非缩写比完整单词更常用。同时，您应尽量不让名称过长，否则它们很快就会变得难以阅读和编写。考虑表 2-2 中显示的变量名。


    **表 2-2.** *变量命名示例*


    | 内容 | 好的变量名 | 差的变量名 |

    |------|------------|------------|

    | 账户余额 | `accountBalance` | `usersCurrentAccountBalance`（过长）<br>`ab`（不是常见缩写；含义不明确）
    |

    | HTML 编辑器类 | `HtmlEditor` | `HyperTextMarkupLanguageEditor`（“HTML”是常见缩写，因此使用它将增强此类名的可读性）
    |


    ### 包命名规范


    包名以您的完全限定域名开头，全部小写并倒序书写。因此，如果您为域名为 `example.com` 的公司工作，那么您的包名应以倒序的相同名称（`com.example`）开头。


    从那时起，您将遵循您公司的命名规范。一个示例命名规范可能是使用项目名称，后跟概念上的类分组。例如，由于我们正在处理包含 GUI 客户端的 SCJD 项目，我们可以有一个组合包名
    `com.sun.edu.scjd.gui`（但为简单起见，我们在整个项目中使用了基础包名 `sampleproject`，因此 GUI 代码位于包 `sampleproject.gui`
    中）。


    > **提示** 在实际作业中，Sun 通常会为至少一个类指定包名。因此，您无需担心没有可用于作为基础包名的现有域名。


    ### 类和接口命名规范


    类和接口名应始终以大写字母开头，并且应为名词（它们应描述一个对象，而不是对对象的操作）。例如，`Book` 可能用作包含书籍信息的类的名称。


    通常将两个或多个名词或一个形容词和一个名词组合在一起形成类名，在这种情况下使用驼峰命名法（每个单词的首字母大写，产生与骆驼相关的起伏模式）。例如，`SocketFactory`
    可能用作创建套接字连接的类的名称。


    > **提示** 您应尽量让每个类只承担一个职责。例如，负责创建到服务器的 RMI 连接的类不应同时负责向最终用户显示数据。如果您能保持“每个类一个职责”，您会发现更容易为类命名。这在以后需要修改或维护类时提供了主要好处——职责分离和清晰的类名使得更容易确定需要修改哪些类。


    ### 方法命名规范


    方法名应始终以小写字母开头，并且应以动词开头（它们应描述对对象的操作）。例如，在我们的 `DVD` 类中，方法名 `getLeadActor` 表示我们可以调用此方法来获取
    DVD 的主演姓名。'
  raw: 'Throughout the SCJD exam, certain design and implementation choices are already
    dictated by Sun. One example is that the exam requires the use of the JTable Swing
    component. Other choices, however, are left up to you, the test taker, to decide.
    For instance, you may choose to implement a networking layer that uses RMI, or
    you may take a different approach that is built upon sockets. Each implementation
    has advantages and disadvantages. You must be certain to document your choices
    because it is necessary to defend these design decisions to the individual who
    will ultimately decide if your test submission passes or fails.


    For the SCJD exam, clearly document your design choices in a design decisions
    document. This document should contain examples of specific decisions, such as
    your choice of design pattern or the use of one technology over another. Circumstances
    may also arise in which design decisions were made based on unclear functional
    requirements. If this situation


