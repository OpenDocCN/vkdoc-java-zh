    \ SERVER_COMMAND = \"SERVER\";\n\n    public static void main(String[] args) throws\
    \ Exception {\n        new MyFrame().setVisible(true);\n    }\n\n    public MyFrame()\
    \ throws Exception {\n        setDefaultCloseOperation(EXIT_ON_CLOSE);\n\n   \
    \     ActionListener buttonHandler = new MyFrameActionListener();\n        JButton\
