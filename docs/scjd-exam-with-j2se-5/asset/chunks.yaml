    ## Discussion Point: Caching Records


    So far we have made minor concessions to speeding up the data access code, but
    we still have the situation where each `DVD` record is read from the physical
    file on disk—possibly the slowest operation of all. We have deliberately done
    this so that we have not overcomplicated this chapter; however, it is worthwhile
    considering whether or not we can cache the data.


    The first question we should address is whether caching the data will save us
    any disk operations. If most operations on the data were writing to disk, then
    caching would not make much sense, since we would have to update the cache and
