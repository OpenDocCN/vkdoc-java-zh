    ```\n\n## The `notify` and `notifyAll` Methods\n\nEvery Java object has the capability\
    \ to broadcast a call, notifying threads that have called the `wait` method on\
    \ that object that some event that they might be interested in has occurred. If\
    \ you call the `notify` method, one of the threads waiting on that object is told\
    \ to come out of the waiting state and block until it can regain the lock on the\
    \ object, after which it can continue processing. If you call `notifyAll`, every\
    \ thread waiting for the object is told to come out of the waiting state and block\
    \ until it can regain the lock on the object, after which it can continue processing.\n\
    \n**Caution:** It is easy to become confused when talking about threads waiting.\
    \ `Thread.State.WAITING` has a specific meaning in Java, namely that the thread\
    \ has called the `wait` or the `join` methods. When a thread enters the `Thread.State.WAITING`\
    \ state by calling the `wait` method, it consumes no CPU cycles until some other\
    \ thread calls either `notify` or `notifyAll` on the same object that `wait` was\
    \ called on, or until the thread is interrupted. When a thread enters the `Thread.State.WAITING`\
    \ state by calling the `join` method, it consumes no CPU cycles until the thread\
    \ it is trying to join terminates, or until the thread is interrupted. In contrast,\
    \ if several threads attempt to obtain the same lock simultaneously, one will\
    \ obtain it, and the remainder will enter the `Thread.State.Blocked` state until\
    \ the lock is released, at which time another thread will obtain the lock—the\
    \ JVM scheduler handles automatically selecting another thread from those in the\
    \ `Thread.State.Blocked` state.\n\nListing 4-5 demonstrates the difference between\
    \ calling `notify` and `notifyAll`.\n\n**Listing 4-5.** *NotifyVersusNotifyAll.java*\n\
    \n```java\n1 public class NotifyVersusNotifyAll extends Thread {\n2     private\
    \ static Object mutex = new Object();\n4     public static void main(String[]\
    \ args) throws InterruptedException {\n5         for (int i = 0; i < 5; i++) {\n\
    6             new NotifyVersusNotifyAll().start();\n7         }\n9         Thread.sleep(2000);\n\
    10        synchronized(mutex) {\n11            mutex.notifyAll();\n12        \
    \    // mutex.notify();\n13        }\n14    }\n16    public void run() {\n17 \
    \       try {\n18            synchronized (mutex) {\n19                System.out.println(getName()\
    \ + \" waiting\");\n20                mutex.wait();\n21                System.out.println(getName()\
    \ + \" woken up\");\n22                mutex.wait(2000);\n23                System.out.println(getName()\
    \ + \" waking up another thread\");\n24                mutex.notify();\n25   \
    \         }\n26        } catch (InterruptedException ie) {\n27            ie.printStackTrace();\n\
    28        }\n29    }\n30 }\n```\n\nFigure 4-4 shows the results of running `NotifyVersusNotifyAll`,\
    \ first with line 12 and line 11 commented out (so that `notify` is called), then\
    \ with line 11 and line 12 commented out (so that `notifyAll` is called).\n\n\
    **Figure 4-4.** *`notify` returns one thread to the runnable state whereas `notifyAll`\
    \ returns all threads to the runnable state.*\n\n**Caution:** Although Figure\
    \ 4-4 shows the threads being notified in the same order they called `wait`, this\
    \ should never be relied on. The order in which threads are notified, and the\
    \ order in which they regain ownership of the lock on the common object, is entirely\
    \ at the discretion of the JVM’s thread scheduler.\n\nIn general, you would use\
    \ `notify` only when you are certain that the thread that will be notified will\
    \ be able to use the notification. If you have multiple threads that you are certain\
    \ will be able to use the notification but you want only one of them to transition\
    \ to the runnable state, then you should use `notify`. However, in this case you\
    \ must ensure that the remaining threads do not stay in limbo—some thread will\
