    \ using a well-known port without administrator privileges.\n\n**Q** How can I\
    \ perform system cleanup when a client disconnects?\n\n**A** If the thread that\
    \ is dedicated to that client is listening for a new command from the client,\
    \ then it will receive an exception when the client disconnects. Alternatively,\
    \ if the client disconnects before your server has an opportunity to respond to\
    \ a previous request, then the thread dedicated to that client will receive an\
