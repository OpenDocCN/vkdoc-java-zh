    {


    synchronized (this) {


    //code


    }


    }


    Locking some object other than this can provide more concurrency than synchronizing
    a method because it allows other blocks of code that are synchronized on different
    objects to work concurrently. But efficiency, alas, is in the eye of the beholder.
    If an individual method needs to obtain multiple locks, then the steps of locking
    and unlocking the multiple locks can lead to more overhead than synchronizing
    the method.


    In Listing 4-4, synchThisObjectExample is more efficient than synchAllLocksExample
    because it doesn’t have the overhead of locking and unlocking three times. If
    your object is carefully constructed not to allow unsynchronized access to the
    resources you need to lock, then synchronizing methods is probably the simpler
    approach.


