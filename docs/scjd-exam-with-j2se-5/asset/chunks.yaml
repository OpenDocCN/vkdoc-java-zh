    第 9 章 ■ 项目收尾


    **图 9-1.** *Denny''s DVDs 2.0 概览*


    我们所做的设计决策围绕应用程序的三层架构展开，而这正是 SCJD 考试的核心。关注的领域包括：`db` 包中的锁定机制、为网络层选择 RMI 还是套接字，以及在
    GUI 包中使用 MVC 模式。


    我们还需要介绍如何打包、安装、运行和测试应用程序。


    您可以在 Apress 网站（http://www.apress.com）的源代码部分找到所有示例代码。本章将解释如何编译和打包最终版本 Denny''s
    DVDs 2.0。


    让我们开始吧！


    **线程安全与锁定**


    线程安全在第 4 章中已有深入介绍。第 4 章的主要重点是解释线程及相关主题，如同步、锁定、并发以及 JDK 5 中新的并发包。等待机制以及其他与跨多个客户端线程共享单个资源相关的问题也进行了详细解释。


    第 5 章还实现了一种锁定策略来演示这些概念。例如，网络代码库为每个客户端创建了 `DvdDatabase` 类的独立实例，这样我们就可以根据讨论要点中所述来识别锁的所有者。


    **在 RMI 和套接字之间选择**


    在为 Sun SCJD 作业开发 RMI 解决方案还是基于套接字的序列化对象解决方案之间做出选择可能很困难。Sun 接受任何一种解决方案，并且不会因为选择本身而给予或扣除额外分数。许多考生会选择他们最不熟悉的技术，因为这为他们提供了最大的学习空间。但如果您对这两种技术都不了解，或者对两者都同样熟悉，那么能够审视每种技术的优势将是有益的。


    5165CH09.qxd 11/16/05 12:17 PM Page 297


    第 9 章 ■ 项目收尾


    **297**


    ■**注意** 在阅读这些优势时，您应该意识到，某一方的优势可能正是另一方的劣势。此外，许多看似明显的优势在辩论中很容易被反驳——在可能的情况下，我们会在讨论优势的同时提供反驳论点。


    **使用基于套接字的序列化对象解决方案的优势** 在实际应用中，RMI 和套接字之间的选择通常取决于应用程序的可扩展性和性能要求。


    如果性能是必须考虑的因素，那么套接字是理想的选择，因为您可以限制开销程度，并且套接字非常适合发送数据，通常是以不需要繁重协议的压缩形式发送。您可能还记得，协议变得越大越复杂，您可能就越想使用
    RMI。一个设计良好的简单套接字接口可以胜过基于 RMI 的服务器。如果您必须高效地处理大量请求，那么套接字可能适合您。


    这并不意味着您不能使用 RMI 来压缩或加密数据——如果您愿意，可以使用自定义套接字工厂与 RMI 结合来提供专业功能（更多信息，请参考 http://java.sun.com/j2se/1.5.0/docs/guide/rmi/socketfactory/）。


    然而，当您实现一个直接的套接字解决方案时，您可以轻松地只集成您需要的功能，而忽略不需要的功能。例如，您可能决定放弃集成到每个 RMI 解决方案中的“心跳”功能。心跳功能仅仅是确保服务器定期向
    RMI 注册表发送一个信号（即心跳），让注册表知道服务器仍然存活；同样，RMI 客户端也会向服务器发送一个信号（即心跳），让服务器知道它们仍然存活。


    套接字的另一个优势是，大多数系统管理员已经熟悉了实现一个监听特定套接字的服务器所需的工作，即使需要穿越防火墙也是如此。但很少有人熟悉如何设置 RMI 注册表，更少有人知道如何配置
    RMI 以使其能穿越防火墙工作。RMI 可以穿越防火墙，但这并不像通过防火墙设置一个简单的套接字解决方案那么简单。

    '
- fmt: '# 关于 Socket 与 RMI 的对比


    **注意**：Socket 多年来一直是执行网络连接的标准方法，而 RMI 则是一个相对较新的标准。然而，这本身并不能证明使用 Socket 优于 RMI；通过
    Socket 连接使用序列化对象几乎可以确保只有另一个 Java 类能够连接到你的服务器（之所以说“几乎”，是因为 Java 规范明确说明了序列化类的外观，这意味着有人有可能用其他语言开发客户端——只是非常困难）。相反，使用基于
    IIOP（CORBA 使用的互联网 Inter-Orb 协议）的 RMI 将允许任何符合 CORBA 的客户端连接到你的服务器（尽管在当前作业中不允许使用基于
    IIOP 的 RMI）。有关 IIOP 和 CORBA 的更多信息，请分别参考维基百科页面 `http://en.wikipedia.org/wiki/IIOP`
    和 `http://en.wikipedia.org/wiki/CORBA`。


    ---


    通过 Socket 方案传播对远程可访问方法的更改可能比 RMI 方案更容易。除非你做了重大改动（例如删除正在使用的方法，或更改其运行的端口），否则通常可以在客户端甚至不知情的情况下更改基于
    Socket 的服务器——它们只是无法获得新功能。


    相比之下，对于具有 JDK 5 之前版本的客户端，或者不允许动态生成存根的 RMI 方案，将需要重新编译客户端存根，并且如果你不使用动态下载，还需要重新分发给客户端。如果你确实使用动态下载，则可能还会遇到与安全性和设置
    `codebase` 选项相关的问题。


    Socket 方案在客户端和服务器之间所需的 Socket 数量和网络流量也应该更少。对于此作业，Socket 方案可能每个客户端只需要一个 Socket，并且网络流量可以非常小，具体取决于你的方案有多精简。另一方面，RMI
    方案将始终为你的 RMI 注册表打开一个监听端口，为你的 RMI 服务器打开一个监听端口，在服务器和注册表之间建立一个连接端口，并且在客户端和服务器之间为每个客户端建立一个
    Socket。RMI 方案在连接时（执行注册表查找）以及空闲时（执行分布式垃圾回收和发送心跳消息）也需要更多的网络流量。


    这引出了另一点：使用 RMI 时，你总是有一个额外的进程在运行（RMI 服务器）。虽然大多数计算机不会因为这个额外的进程而负担过重，但如果你正在使用服务器的大部分
    CPU 和内存资源，这可能会成为一个问题。


    一个*编写良好*的 Socket 方案*可能*比 RMI 方案更容易让初级程序员理解和维护。这与普遍认为 RMI 更简单的观点相矛盾。但这里有几点需要考虑。如果你将
    Socket 代码编写得很好，网络代码将对客户端和服务器应用程序隐藏——它们只需调用你的 Socket API，就像在 RMI 方案中客户端和服务器只需调用
    RMI API 一样。但在这种情况下，初级程序员不需要学习注册表、如何使用 `rmic` 或如何处理 RMI 存根。因此，他们的学习曲线更短。然而，毫无疑问，一旦克服了学习曲线，RMI
    方案更容易开发、理解和维护。而且，Socket 方案比 RMI 方案更清晰的唯一可能方式是，如果 Socket 方案编写得非常好（并且可能 RMI 方案编写得不好）。


    在 Socket 方案中，通用客户端标识更容易——你可以使用连接的线程来标识客户端。但是，如果你的作业要求你使用 cookie 进行锁定、解锁和修改调用，那么你可以使用
    cookie 作为客户端标识。


    同样，如果你出于扩展性原因决定使用线程池，那么你将无法再使用线程标识符。无论如何，对于 RMI 或 Socket，使用连接工厂将提供简单的客户端标识。


    有人意外禁用你的服务器的可能性较小。使用 RMI 时，如果另一个服务器恰好使用相同的远程引用名称调用了 `Registry` 类的 `rebind` 方法，它们将替换你的代码。使用
    Socket 时，一旦你绑定到特定端口，其他服务器就无法绑定到该端口。然而，这也可能对你不利——如果有人部署了另一个恰好使用该端口号的服务器，然后重新启动计算机，则可能无法预测哪个服务器会先绑定到该端口，因此你可能不知道哪个服务器将接受连接。这被称为竞态条件；与线程相关的竞态条件在第
    4 章中讨论过。


    ---


    ## 使用 RMI 方案的好处


    然而，让我们直截了当地说。**对于 SCJD 考试，可扩展性和性能不是设计考虑因素**，正如前面“使用基于 Socket 的序列化对象方案的好处”部分所示，两种方案都没有提供允许非
    Java 客户端连接的方法。


    我们提到，一个*编写良好*的 Socket 方案*可能*更容易让初级程序员理解和维护。然而，作为开发人员，你应该了解这两种技术，以便能够在它们之间做出有效选择（为了帮助你，我们将第
    6 章专门用于 RMI，第 7 章用于 Socket）。一旦你了解了这两种技术，你可能会发现使用 RMI 实际上可以让你的工作轻松得多。


    并且评估者应该理解 RMI，因此提交 RMI 方案没有问题。让我们快速列出 RMI 的一些优点。


    实现 Socket 服务器和 Socket 客户端涉及创建自定义协议。Socket 实现必须通过网络发送序列化对象，接收端的 Socket 点必须在运行时知道如何处理这些对象。因此，基于
    Socket 的应用程序可能比 RMI 程序编写起来更繁琐和笨拙。如果你编写了分解良好的代码，使得每个类只有一个职责，并且方法也同样分解良好，这可以稍微抵消这种影响。然而，对客户端-服务器通信协议使用命令模式，可以简化构建新协议的过程。


    对象序列化和网络通信的细节被 RMI 隐藏了，而使用 Socket 你必须自己实现所有这些。换句话说，你将在重新发明一个已经存在的基本技术。


    无论你编写代码有多好，毫无疑问，你为基于 Socket 的方案编写的代码将比 RMI 方案多。而且你编写的代码越多，出错的可能性就越大——利用 RMI 开发人员编写的代码可能更安全，这些代码已经经过多年的测试；RMI
    的大部分代码库自 1997 年 9 月发布的 JDK 1.1 以来就一直存在。


    RMI 提供了网络透明性，这意味着对于客户端来说，远程对象的行为似乎就像本地对象一样。因此，无需实现握手协议或担心诸如打开和关闭 Socket 连接之类的底层细节。


    由于使用了接口和远程方法表现得像本地方法一样，开发调用远程方法的代码通常是类型安全的。这同样适用于 Socket 方案，但与 RMI 不同，它不要求使用接口。因此，很容易最终得到一个不提供任何形式的编译时（甚至运行时）类型安全性的方案。'
  raw: '■**Note** Sockets have been a standard method of performing network connectivity
    for many years, whereas RMI is a relatively new standard. However, this alone
    does not justify using sockets over RMI; using serialized objects over the sockets
    connection almost ensures that only another Java class can connect to your server
    (only “almost” because the Java specifications make it explicitly clear how a
    serialized class will appear, which means it is *possible* for somebody to develop
    a client in a different language—just very difficult). Conversely, using RMI over
    IIOP (the Internet Inter-Orb Protocol used by CORBA) would allow any CORBA-compliant
    client to connect to your server (although using RMI over IIOP is not allowed
    in the current assignments). For more information on IIOP and CORBA, refer to
    the Wikipedia pages http://


    en.wikipedia.org/wiki/IIOP and http://en.wikipedia.org/wiki/CORBA, respectively.


    5165CH09.qxd 11/16/05 12:17 PM Page 298


    **298**


    C H A P T E R 9 ■ P R O J E C T W R A P - U P


    It may be easier to propagate changes to remotely accessible methods over a sockets
    solution than an RMI solution. Unless you do something major like remove a method
    that is being used, or change the port it is running on, you can usually change
    a sockets-based server without the clients even being aware of it—they just won’t
    get the new functionality.


    In comparison, an RMI solution that has pre-JDK 5 clients or that doesn’t allow
    stubs to be dynamically generated will require recompilation of the client stubs,
    and redistribution to clients if you do not use dynamic downloading. If you do
    use dynamic downloading, you may also have associated issues with security and
    setting the codebase option.


    A sockets solution should also require less sockets and network traffic between
    client and server. A sockets solution for this assignment might need only one
    socket per client, and the network traffic can be minimal depending on how minimal
    you make your solution. An RMI solution, on the other hand, will always open a
    listening port for your RMI registry, a listening port for your RMI server, a
    connected port between the server and the registry, and one socket per client
    between the clients and the server. The RMI solution will also require more network
    traffic while connecting (doing the lookup on the registry) and also while idling
    (performing distributed garbage collection and sending heartbeat messages).


    This brings up another point: with RMI you always have an extra process running
    (the RMI server). While most computers are not going to be taxed by this extra
    process, if you were using most of the CPU and memory resources of your server,
    this could become an issue.


    A *well-written* sockets solution *can* be easier for a junior programmer to understand
    and maintain than an RMI solution. This contradicts the commonly accepted view
    that RMI is simpler. But there are several items to consider here. If you write
    your sockets code well, the networking code will be hidden from the client and
    server applications—they will just be calling your sockets API, in the same way
    that in an RMI solution the clients and servers are just calling the RMI API.
    But in this case, the junior programmer does not need to learn about registries,
    or how to use rmic, or how to deal with the RMI stubs. So there is less of a learning
    curve for them. However, there is little doubt that once that learning curve has
    been passed, an RMI solution is easier to develop, understand, and maintain. And
    most likely, the only way a sockets solution can be clearer than an RMI solution
    is if the sockets solution is really well written (and possibly also if the RMI
    solution is not well written).


    General client identification is easier in a sockets solution—you can use the
    connection’s thread to identify the client. However, if your assignment requires
    you to use cookies for locking, unlocking, and modification calls, then you can
    use the cookie as the client identification.


    Likewise, if you decide to use thread pooling for scaling reasons, then you will
    no longer be able to use the thread identifier. Regardless, for either RMI or
    sockets, using a connection factory will provide a simple client identifier.


    There is less chance that somebody will accidentally disable your server. With
    RMI, if another server happened to do use the Registry class’s rebind method with
    the same remote reference name, they will replace your code. With sockets, once
    you have bound to a particular port, no other server can bind to that port. However,
    this can also work to your disadvantage—


    if somebody deployed another server that happened to use the port number, then
    restarted the computer, it may not be possible to predict which server will bind
    to the port first, so you may not know which server will be accepting connections.
    This is called a race condition; a race condition in relation to threads is discussed
    in Chapter 4.


    5165CH09.qxd 11/16/05 12:17 PM Page 299


    C H A P T E R 9 ■ P R O J E C T W R A P - U P


    **299**


    **Benefits of Using an RMI Solution**


    However, let’s be blunt. **For the SCJD exam, scalability and performance are
    not design considerations**, and as shown in the “Benefits of Using a Serialized
    Objects Over Sockets Solution”


    section earlier, neither solution provides a method of allowing non-Java clients
    to connect.


    We mentioned that a *well-written* sockets solution *might* be easier for a junior
    programmer to understand and maintain. However, as a developer you would be expected
    to know both of these technologies anyway so that you can make a valid choice
    between them (and to help you, we have devoted Chapter 6 to RMI and Chapter 7
    to sockets). Once you know the two technologies, you may find that your job could
    actually be a lot less tedious using RMI.


    And the assessor is expected to understand RMI, so there is no problem with submitting
    an RMI solution. Let’s quickly list a few of the advantages of RMI.


    Implementing socket servers and socket clients involves creating a custom protocol.
    A sockets implementation must send serialized objects across the network that
    the receiving socket point must know how to handle at runtime. Thus, a sockets-based
    application can be a little more tedious and awkward to write than an RMI program.
    This can be negated slightly if you write well-factored code, such that each class
    has only one responsibility, and the methods are likewise well factored. However,
    using the Command pattern for the client-server communication protocol trivializes
    building the new protocol.


    The details of object serialization and network communication are hidden by RMI,
    whereas using sockets you have to implement it all yourself. In other words you
    will be rein-venting a basic technology that already exists.


    No matter how well you write your code, there is no doubt that you will write
    more code for a socket-based solution than an RMI one. And the more code you write,
    the more chance of making mistakes—it can be safer to leverage off the code written
    by the RMI developers, which has been tried and tested for many years; much of
    the RMI code base has been around since JDK 1.1, which was released in September
    1997.


    RMI provides network transparency, which means that to the client a remote object
    seems to behave as if it is a local object. Thus there is no need to implement
    a handshake protocol or worry about low-level details such as opening and closing
    socket connections.


    Due to the use of interfaces and remote methods behaving as though they were local,
    developing code to call a remote method is usually type safe. The same can apply
    to a sockets solution, but unlike RMI there is no requirement to use interfaces.
    Consequently, it is easy to end up with a solution that does not provide any form
    of compile-time (or even runtime) type safety.'
