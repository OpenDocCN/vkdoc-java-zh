    ■**Note** The Factory design pattern, used by the BorderFactory, is often used
    when many similar objects need to be created, but the user of the objects does
    not need to know the implementation details—all the user of the object needs to
    know about is how to use it. Each of the BorderFactory’s create methods will create
    a Border, where Border is an interface. Since we have an interface for all potential
    borders, we can use the created border in any JFrame or JPanel without concerning
    ourselves with what type of border was created. Furthermore, we don’t have to
    worry about how a particular border will be created on different operating systems—the
    factory handles all that for us.


    Which particular border to create and use is up to you. Frequently status bars
    use a lowered bevel border (which you can create using the createLoweredBevelBorder
    method), groupings of radio buttons use a titled border (createTitledBorder),
    and groupings of buttons might be enclosed in a beveled border without a title
    (createBevelBorder).


