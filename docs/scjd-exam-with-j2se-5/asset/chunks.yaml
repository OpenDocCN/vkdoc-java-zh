    \ 类通常是最佳起点。\n\n在 Denny's DVDs 应用程序的 2.0 版本中，`DVDTableModel` 类是 `AbstractTableModel`\
    \ 类的扩展。`DVDTableModel` 不需要实现 `getColumnClass`、`removeTableModelListener` 和 `addTableModelListener`\
    \ 方法，因此抽象实现提供的默认实现就足够了。TableModel 接口中的所有其他方法都将被实现。\n\n首先，请注意清单 8-10 中 `DVDTableModel`\
