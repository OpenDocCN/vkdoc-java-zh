    当通过使用输入流的 read 方法从套接字读取数据时*，* 该调用会根据此设置阻塞其他请求。SO_TIMEOUT 选项决定了阻塞操作在超时之前可以阻塞的时间量（以毫秒为单位）。如果操作在分配的时间内没有完成，则会抛出
    java.net.SocketTimeoutException，如图 7-1 所示。如果未设置此选项或将其设置为 0，则调用会阻塞请求直到完成，并且不会超时。


