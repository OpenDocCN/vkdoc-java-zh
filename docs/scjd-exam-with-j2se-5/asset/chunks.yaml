- fmt: "# Chapter 6: Networking with RMI\n\n## The Serialization Process\n\nTo actually\
    \ persist an object's state, there are two classes in the `java.io` package that\
    \ perform the bulk of work required for reading and writing serializable objects:\
    \ `ObjectOutputStream` and `ObjectInputStream`. `ObjectOutputStream` has a method\
    \ called `writeObject`, while `ObjectInputStream` has a method called `readObject`.\
    \ In the Denny's DVDs project, serialization is used to send method parameters\
    \ across the network between the GUI and the server using the default serialization\
    \ mechanism (e.g., whether the server is an RMI or a socket server). We do not\
    \ actually serialize our method parameters explicitly for RMI to work. In fact,\
    \ our only concern is that the object sent across the network be serializable.\n\
    \nLet's assume that we want to persist the state of our DVD objects explicitly\
    \ to the file system. In that case, we could do so by implementing the `persistDVD`\
    \ and `retrieveDVD` methods. When the client wants to save the state of a database\
    \ record or DVD object, such as after a `setRecordNumber` call, the client invokes\
    \ the `DVDFileAccess` method `persistDVD`. `persistDVD` serializes the DVD object\
    \ using the `ObjectOutputStream` class and its `writeObject` method. The `persistDVD`\
    \ method is shown in Listing 6-1. Keep in mind that the actual member we are serializing\
    \ is a `DVD`. Our `DVD` class must be `Serializable`. The `retrieveDVD` method\
    \ reads the serialized object and re-creates the object, as demonstrated in Listing\
    \ 6-2.\n\n**Listing 6-1.** *persistDVD Method Demonstrating FileOutputStream to\
    \ Serialize a DVD Object*\n\n```java\nprivate boolean persistDVD(DVD dvd) throws\
    \ IOException {\n    boolean retVal = false;\n    // open a FileOutputStream associated\
    \ with the data\n    // notice that if the DVD does not already exist,\n    //\
    \ it will be created.\n    String filePath = dbName + \"/\" + dvd.getUPC() + fileExtension;\n\
    \    FileOutputStream fos = new FileOutputStream(filePath);\n    try {\n     \
    \   ObjectOutputStream oos = new ObjectOutputStream(fos);\n        // Read in\
    \ the data from the object\n        oos.writeObject(dvd);\n    } finally {\n \
    \       // close all references\n        oos.close();\n        fos.close();\n\
    \    }\n}\n```\n\n**Listing 6-2.** *retrieveDVD Method Demonstrating FileInputStream\
    \ to Deserialize a DVD Object*\n\n```java\nprivate DVD retrieveDVD(String upc,\
    \ String fileExtension) throws IOException, ClassNotFoundException {\n    DVD\
    \ retVal = null;\n    // get the path to the object's serialized state.\n    try\
    \ {\n        String filePath = dbName + \"/\" + upc + fileExtension;\n       \
    \ FileInputStream fis = new FileInputStream(filePath);\n        // Read in the\
    \ data from the object\n        ObjectInputStream ois = new ObjectInputStream(fis);\n\
    \        retVal = (DVD) ois.readObject();\n    } finally {\n        ois.close();\n\
    \        fis.close();\n    }\n    return retVal;\n}\n```\n\n> **Caution** The\
    \ code shown in these listings is not contained in the actual project since Denny's\
    \ DVDs relies on the JVM and the default serialization mechanism. The code is\
    \ used as a pedagogical device to illustrate how to explicitly serialize an object.\n\
    \nAs mentioned previously, information pertaining to the object's state is persisted\
    \ to a file via a stream of bytes. But that is not all of the information that\
    \ is saved. Information regarding the class type and its version number is also\
    \ persisted. This is important because the class loader needs to properly deserialize\
    \ the class from its persisted state. If the `serialVersionUID` is not declared,\
    \ then the `ObjectOutputStream` will generate a unique version number for the\
    \ class. Any subsequent changes to the class's members will generate a new version\
    \ number at the next compilation. In the `sampleproject.db.DVD` class, the version\
    \ ID is defined as a private member defined as follows:\n\n```java\nprivate static\
    \ final long serialVersionUID = 5165L;\n```\n\n> **Note** Often, serialization\
    \ compatibility between versions needs to be maintained even though minor changes\
    \ that will not break serialization compatibility have occurred. In these situations\
    \ you need to declare the `serialVersionUID`. You can use `serialver` to do this\
    \ initially. This will allow you to define your own numbering schemes for the\
    \ version ID for the class. Interestingly, even though this is a private field,\
    \ the JVM knows it is there and uses it when defining a class.\n\n## Tweaking\
    \ the Default Serialization Mechanism\n\nThere may be times when you want more\
    \ control over how an object's state is serialized. For instance, perhaps you\
    \ are only concerned with persisting part of the object's state, but not all of\
    \ it. This is useful if the class contains a private member for holding a reference\
    \ to a database connection, and you do not want to persist that information because\
    \ the connections are only meaningful during a single session and are assigned\
    \ on an as-needed basis. It wouldn't make sense to try to persist a database connection\
    \ for the next time the application is run. The next time you load the object\
    \ with the connection reference, you can simply assign that member a new connection.\n\
    \nAnother situation where you would not want to persist object information is\
    \ when an object member is of a type that is not serializable. For instance, in\
    \ our sample project the J2SE 1.5 `Logger` instance in the `DVD` class is not\
    \ serializable.\n\nBut how do we indicate to the JVM that we don't want to persist\
    \ a specific class member but would like to persist the other class members? Java\
    \ provides for this functionality through the use of the keyword `transient`.\
    \ The byte stream that gets persisted will not include any members that are declared\
    \ using the keyword `transient`.\n\nWe use the keyword `transient` in our serialization\
    \ implementation since the `Logger` instance cannot be serialized. (Hint: Try\
    \ running `serialver` on the logger.) Conceptually this works out well since a\
    \ logger member does not really add anything essential to the notion of a DVD.\
    \ In general, a logger is the sort of thing that does not need to be persisted,\
    \ and we can recreate a complete DVD record by reinitializing the logger. The\
    \ following is an example of how you can use the keyword `transient` in the `Logger`\
    \ instance in `DVD.java`:\n\n```java\nprivate transient Logger log = Logger.getLogger(\"\
    sampleproject.db\");\n```\n\nThere is another approach to serialization that we\
    \ should mention. Rather than implement `Serializable`, an alternative approach\
    \ is to implement a subinterface of `Serializable`."
