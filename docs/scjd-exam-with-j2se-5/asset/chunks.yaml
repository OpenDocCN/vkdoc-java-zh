- fmt: '# Sun Certified Java Developer (SCJD) Project Wrap-Up


    **A** Sun provides several cross-platform interface look and feel packages. `Metal`
    and `Motif` were the only guaranteed look-and-feel libraries prior to JDK 1.5.
    With the release of JDK 1.5 Sun has included `Ocean` (a custom Metal theme), and
    `Synth` (a skinnable look and feel). Most other libraries are operating system–specific.
    Although it might be technically possible to use the Windows look and feel on
    a Mac, or vice versa, it is usually not legal to distribute an application that
    uses one operating system’s look and feel on another platform.


    Part of the power of Swing is its capability to be extended and make custom look-and-feel
    libraries. Some custom libraries are available that are cross-platform, but they
    are not part of the standard Java distributions and are difficult to rely on for
    interface design.


    **Q** I found a look and feel on the Web that I prefer to any of Sun’s look and
    feels. Can I use it instead?


    **A** Check your instructions carefully—most instructions state that **all** code
    submitted must be your own. If you use a look and feel that you did not write
    and that is not part of the JDK, then you will be violating this rule.


    **Q** Where can I find out more about Java look-and-feel guidelines?


    **A** You can find extensive information pertaining to Java interface design and
    standard practices at `http://java.sun.com/products/jlf/`.


    **Q** Where can I find out more information on interface design and usability
    testing?


    **A** The following URLs are great places to begin research into usability engineering
    and testing:


    `http://www.useit.com`


    `http://www.asktog.com`


    ## Part 3: Wrap-Up


    ## Chapter 9: Project Wrap-Up


    **C**ongratulations! You’ve made it through a myriad of complex topics and intricate
    details.


    We’ve covered a lot of information that will help you pass the Sun Certified Java
    Developer (SCJD) exam, and we’ve exposed you to some of the new features of JDK
    5. This chapter summarizes some of the architectural decisions we confronted during
    the completion of our sample project, and it wraps up some of the loose ends regarding
    packaging and running the application. In this chapter we will cover:


    - Understanding the design decisions

    - Finding out where to get the code samples

    - Compiling and packaging the application

    - Creating a manifest file

    - Running the application in local mode

    - Running the application in network mode

    - Running a multithreaded test client

    - Packaging the submission


    Figure 9-1 presents an overview of the Denny’s DVDs 2.0 application.


    **Note** Normally you would expect to see an overall diagram of an application
    drawn from left to right, or top-down—in other words, the client would normally
    be in the far left of the diagram or in the top location.


    There is a reason we have drawn the diagram bottom-up, though: it matches the
    way we have developed the project through this book. We started with the `DvdDatabase`
    class in Chapter 5, proceeded with the RMI and sockets classes in Chapters 6 and
    7, and built the GUI classes in Chapter 8.


    **Figure 9-1.** *Denny’s DVDs 2.0 overview*


    The design decisions we made centered around the three tiers of the application,
    which are central to the SCJD exam. The areas of interest are locking in the `db`
    package, choosing between RMI and sockets for the network layer, and using the
    MVC pattern in the GUI package.


    We also need to cover how to package, install, run, and test the application.


    You can find all of the sample code in the Source Code section of the Apress web
    site (`http://www.apress.com`). This chapter explains how to compile and package
    the final version, Denny’s DVDs 2.0.


    Let’s get started!


    ### Thread Safety and Locking


    Thread safety was covered in depth in Chapter 4. The main thrust of Chapter 4
    was to explain threading and related topics such as synchronization, locking,
    and concurrency and the new concurrent package of JDK 5. Waiting was also explained
    in detail, as were other issues relating to sharing a single resource across multiple
    client threads.


    Chapter 5 also implemented a locking strategy that demonstrated these concepts.
    For example, the networking code base creates separate instances of the `DvdDatabase`
    class for each client so that we can identify the owner of the lock as described
    in the discussion points.


    ### The Choice Between RMI and Sockets


    It can be difficult to choose whether to develop an RMI solution or a serialized
    object over sockets solution to the Sun SCJD assignment. Sun will accept either
    solution, with no extra marks awarded or deducted for the choice alone. Many candidates
    simply choose the technology they are least familiar with as that gives them greatest
    scope for learning. But if you do not know either technology, or if you are equally
    comfortable with both technologies, it is beneficial to be able to look at the
    benefits of each.


    **Note** When reading these benefits you should be aware that the benefit might
    be a disadvantage of the other choice. Also, many of the perceived benefits can
    be easily countered in an argument—where possible we provide counterarguments
    in our discussions in the same place we discuss the benefit.


    #### Benefits of Using a Serialized Objects Over Sockets Solution


    In real-world applications, the choice between RMI and sockets often comes down
    to the scalability and performance requirements of your application.


    Sockets are ideal if performance is a must since you can limit the degree of overhead
    and sockets are well suited for sending data, often in compressed form that does
    not require a heavy protocol. As you may recall, the larger and more complex your
    protocol becomes, the more you may want to use RMI. A well-designed, simple socket
    interface can outperform an RMI-based server. If you must handle a large number
    of requests efficiently, sockets may be for you.


    This does not mean that you cannot compress or encrypt your data using RMI—if
    you want to, you can use custom socket factories with RMI to provide specialist
    functionality (for more information, refer to `http://java.sun.com/j2se/1.5.0/docs/guide/rmi/socketfactory/`).


    However, when you implement a straightforward sockets solution, you can easily
    incorporate only the functionality you need, and leave out the functionality you
    do not need. For example, you might decide to drop the “heartbeat” functionality
    that is incorporated into every RMI solution. The heartbeat functionality simply
    ensures that at regular intervals the server sends a signal—a heartbeat—to the
    RMI registry to let the registry know that the server is still alive; similarly
    the RMI clients send a signal—a heartbeat—to the server to let it know that they
    are still alive.


    Another advantage to sockets is that most system administrators are already familiar
    with what needs to be done to implement a server that listens on a particular
    socket, even if they need to go through a firewall. Few are familiar with setting
    up an RMI registry, and even fewer know how to configure RMI to work through a
    firewall. RMI can work through a firewall, but it is not quite as simple as setting
    up a simple sockets solution through the firewall.'
