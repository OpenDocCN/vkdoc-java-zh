    如果你知道列表中要使用的项目，那么可以使用允许你指定初始项目的构造方法。或者，你也可以分别使用 `addItems` 和 `removeItems` 方法动态地向列表中添加或移除项目。


    与 JButton 和 JRadioButton 类似，可以为每个 JComboBox 添加一个 ActionListener。


    如果你需要在用户选择某个选项后立即执行操作，就可以使用它。


    然而，并不总是需要添加 ActionListener——如果你不关心用户点击了哪个按钮，直到用户执行其他操作后才需要处理，那么你可以使用 `getSelectedIndex`
