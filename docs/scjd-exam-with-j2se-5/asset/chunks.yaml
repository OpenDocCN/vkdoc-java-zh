    to a rental return. The operation should return true, which indicates whether
    the DVD identified by the UPC exists in the database and has copies out for rental.
    Otherwise, the operation returns false.


    reserveDVD—Will decrement the DVD count indicating that someone has rented one
    of the available copies. Requires a UPC as an input parameter. If the UPC of the
    DVD to reserve does not exist, false is returned; false is also returned if no
    more copies of the DVD


    are available for rental.


    removeDVD—Will remove the DVD with the matching UPC and return true. If the UPC
    is not found in the database, then no DVD is removed and the method returns false.


    The interface must have a GUI to allow the execution of each of the required methods
    listed here. Also, the GUI must be capable of connecting to a server on a network,
    or work in stand-alone mode and connect to a server on the localhost. You must
    also consider design issues related to concurrent user access and record locking.
    Listing 3.1 contains the code for the DBClient.java interface.


