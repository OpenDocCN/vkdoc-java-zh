- fmt: '■**Tip** Usually, user interfaces allow for multiple ways to complete a task.
    For example, an application may allow a user to save a document via a menu item,
    or a designated keystroke, or an onscreen button. This is considered good interface
    design, and users will memorize and use the method that works best for them.


    While not explicitly listed as a requirement for the SCJD assignment, developers
    are expected to follow standard practices, and you would do well to consider adding
    common features such as keystroke shortcuts to button operations and menu operations.


    ![Image 26](index-250_1.png)


    Another simple principle to consider is how users actually traverse and interpret
    the user interface. In most Western societies, users generally begin analyzing
    an interface at the upper-left corner. The tendency from that point is to continue
    down and to the right. This is due to the nature of the written word in Western
    nations: Words on a page flow from left to right, so most Western users tend to
    perceive the left portion of the screen as a beginning point and the right portion
    as the end. Anything in between these two points represents the necessary steps
    to travel from the beginning to the end. This concept is illustrated in Figure
    8-3.


    **Figure 8-3.** *Path of a Western user’s eye when interpreting a GUI*


    ■**Tip** Even if you’re an Asian developer working in Asia, for the purpose of
    the Sun assignment you should probably assume that the assignment is being evaluated
    with Western expectations.


    When you plan the workflow of an interface, it is advantageous to the user to
    arrange items in order of importance along this path. The elements we want the
    user to be aware of first should, of course, be closest to the upper-left corner.
    The order in which the interface items are placed descending from the starting
    corner also suggests an order to the actions.


    For example, consider Figure 8-4.


    The path illustrated in Figure 8-4 suggests that users should perform operations
    on the table and then click the Enter button when they have completed the operations.
    If the Enter button was placed before the table, the user would likely still figure
    out and interpret the order of operations, but the interface would seem nonintuitive
    and clearly not as well organized.


    Grouping items also suggests similar functionality. This is why document-storage
    buttons, such as Open, Save, and New Document, are located in close proximity
    to each other in most word processing programs.


    ![Image 27](index-251_1.png)


    ■**Tip** If you have a question about how to design an action that is intuitive
    for the end user, the answer is sometimes very easy to find: Look for another
    popular program with similar functionality. Designing an interface that is similar
    to other application interfaces to which the user may be accustomed is a helpful
    way to ensure your application is intuitive as well.


    **Figure 8-4.** *An applied path*


    Also, placing a button next to a text field suggests that the button performs
    some type of action associated with the text field. This principle dictates a
    significant design error you should be cautious of committing. Because the user
    interprets grouped items as grouped functionally, placing a Quit button directly
    next to a Save button is a very bad idea. The Quit item is considered a destructive
    action because it terminates program execution, whereas the Save button is a nondestructive
    and frequently used action. This particular interface design error could result
    in users quitting the program when they really intended to save their work.


    It is important to always remember that the average user is accident-prone. Developers
    must assume that users will make mistakes and click a wrong button every now and
    then. A good interface design with proper button groupings and placements will
    minimize this possibility. In many real-world applications, the user interface
    might even go a step further and implement an “undo” mechanism using the facilities
    available in the `javax.swing.undo` package. This enhanced functionality allows
    the user to revert the application state to a preceding point in time and erase
    the ramification of an action that may have been a mistake. Although this functionality
    is useful, it is far beyond what is required for the SCJD exam.


    Another consideration to keep in mind when designing a user interface is that
    you as the developer may have assumptions about an application’s operating environment,
    but these assumptions can never be considered fact. For example, just because
    your development computer has a mouse attached to it does not mean you can assume
    that every computer your application runs on will have a mouse. This is especially
    true for Java applications because they aim to target almost every platform in
    existence. To ensure the functionality of your user interface, each functional
    widget on the screen should have a keystroke mnemonic mapping, an equivalent function
    key, or even a hotkey. That way, if your application is run on a platform that
    does not have a mouse, the end user will still be able to navigate the application
    via the keyboard.


    An excellent final interface principle is to place items in stationary, predictable
    locations. Following this principle helps the user develop what is known as muscle
    memory. The phenomenon occurs when the user becomes so accustomed to the location
    of an item on the screen that his or her mind subconsciously knows where it is
    located. Thus, working with the interface becomes less thought-intensive and more
    like second nature to the user. For example, think about the web browser you have
    used for the past three years. Even if you have switched browsers numerous times,
    the Back and Forward buttons are almost always located in the same place. Therefore,
    locating these buttons with the eye and targeting them with the mouse has become
    quicker for you, basically because you always know where they are. It is like
    riding a bicycle: You may stop riding for a few years, but you never forget how
    to keep your balance.


    ■**Note** Users adapt to new UI standards, and therefore what is intuitive is
    always in flux. Over the years, popular new UI concepts have been introduced.
    For example, when the tabbed panel metaphor was introduced, it became an instant
    hit with developers since it offers a highly efficient method to display multiple
    panels of data in a single window. Due to its efficient nature, the tabbed panel
    was, and still is, used quite liberally by developers. Because the metaphor has
    been used so often, users have become accustomed to using it. Some other examples
    of new UI paradigms that have entered the average user’s interface vocabulary
    include the icon button bar and the web browser-style “back and forward” navigational
    interface.


    As you design and develop an interface for your application, it’s always a good
    idea to test it. Testing an interface isn’t as cut and dried as testing application
    code, however. The best way to test the GUI is to have someone who has never seen
    or used the application sit down and use it. First, create an interface prototype.
    The prototype can be a simple, nonfunctional version of the proposed interface.
    At this stage, even an interface mock-up sketched out on paper is sufficient.
    The point is, don’t put too much work into a prototype before you’re certain of
    its usability value.'
