    5165CH02.qxd 11/16/05 12:09 PM Page 34


    **34**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    // now for the Cat method


    lookupCat(new String[] {"Breed", "Burmese", "Coat", "Silky"});


    // or


    String[] criteria = {" Breed", "Burmese", "Coat", "Silky"}; lookupCat(criteria);


    }


    The code to use the lookupDog method is much easier to read, write, and maintain
    than the equivalent lookupCat method.


    Static Imports


    Prior to JDK 5 some programmers were defining constants in interfaces, as this
    allowed them to *implement* the interface, giving them a shorthand way of writing
    the constant name. This is shown in the following example:


    public interface BadInterface {


    public static final int FIRST_NAME_POSITION = 1;


    }


    public class BadClass implements BadInterface {


    public static void main(String[] args) {


    System.out.println("First name = " + args[FIRST_NAME_POSITION]);


    }


    }


    There are a couple of problems with this:


    • A class that implements an interface is said to “be” an instance of that interface.
    If you have a reasonable name for your interface, it probably doesn’t make sense
    to say your class “is” an instance of it.


    • If your class implements an interface, then any subclasses of your class will
    also implement the interface. Effectively, the constants will become part of the
    namespace of the subclass—even though the subclass may have no need of these constants.


    To get around these problems, JDK 5 introduces the idea of *static imports*—the
    ability to import the static members from another class or interface.


    For instance, if you were using the logging features (discussed in the section
    “Logging”


    later in this chapter), you would normally have to qualify the logging levels
    as this code snippet shows:


    myLogger.log(Level.FINE, "This message is at FINE level"); However, static imports
    allow us to refer to the static object FINE as though it had been defined within
    our own class:


    import static java.util.logging.Level.*;


    // ...


    myLogger.log(FINE, "This message is at FINE level");


    5165CH02.qxd 11/16/05 12:09 PM Page 35


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **35**


    It should be noted that this “feature” was introduced to work around a bad programming
    practice. You might want to use it when you would otherwise be tempted to declare
    local copies of the constants, or when you are tempted to abuse the inheritance
    as mentioned earlier. But, in general, we recommend that you avoid this where
    possible, and use qualified constants.


    **Javadoc**


    Javadoc is a very simple, yet powerful, tool that helps programmers provide API
    documentation for other programmers.


    The default Javadoc tool is very simple. It parses your source code, looking for
    special comments. It then generates HTML documentation based on that. To make
    this easier to understand, let’s start with some sample Javadoc comments, and
    describe them:


    /**


    * The <b>main</b> starting point for this application.


    * Instantiates an instance of this class, and runs it.


    *


    * @param args an array containing the command line arguments.


    * @throws IOException if files cannot be created


    */


    public static void main(String[] args) throws IOException {


    // ...


    A Javadoc comment starts with the special comment start indicator of /**, and
    continues until the comment closing indicator of */. Tags are noted by the at
    symbol (@). All text from the comment start indicator through to the first tag
    is included directly in the generated output.


    Javadoc will ignore unknown tags and plain text after *any tag* has been found
    up until the next known tag, or the end of the doc comment—this bit of magic is
    how XDoclet can work.


    The Javadoc code above produces the following HTML:


    <A NAME="main(java.lang.String[])"><!-- --></A><H3> main</H3>


    <PRE>


    public static void <B>main</B>(java.lang.String[]&nbsp;args) throws java.io.IOException</PRE>


    <DL>


    <DD>The <b>main</b> starting point for this application.


    Instantiates an instance of this class, and runs it.


    <P>


    <DD><DL>


    <DT><B>Parameters:</B><DD><CODE>args</CODE> - an array containing the command
    line arguments.


    <DT><B>Throws:</B>


    <DD><CODE>java.io.IOException</CODE> - if files cannot be created</DL>


    </DD>


    </DL>


    ![Image 4](index-55_1.png)


    5165CH02.qxd 11/16/05 12:09 PM Page 36


    **36**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    When viewed in Microsoft Internet Explorer, this will appear similar to Figure
    2-1.


    **Figure 2-1.** *Example Javadoc output*


    ■**Note** Javadoc is more powerful than many programmers realize. It was developed
    as an extensible tool, which can behave in different ways depending on which module
    is plugged in. By default, it will parse the Java source code, generating API
    documentation. But if you were to change the plug-in to XDoclet (http://


    xdoclet.sourceforge.net/), for instance, the Javadoc engine could generate additional
    source code based on comments in the code you wrote (very useful when building
    J2EE applications—you could have XDoclet create your interfaces and deployment
    descriptors for you). Or you could plug in DocCheck (http://java.sun.com/j2se/javadoc/doccheck),
    and you could get a report on how well you are adhering to Sun’s Javadoc conventions.


    **Coding Conventions**


    Sun published an article titled “How to Write Doc Comments for the Javadoc Tool,”
    which is available online at http://java.sun.com/j2se/javadoc/writingdoccomments/index.html.


    A quick overview of the topics covered in this article follows.


    What to Write


    The names of your classes and methods should be reasonably self-documenting, so
    there is no point in writing Javadoc comments that just restate the name of the
    class or method. Your Javadoc comments should provide information that will help
    the user of your class and/or provide information that would be needed by a third
    party if they wanted to reimplement your class from scratch (without looking at
    your source code).


    5165CH02.qxd 11/16/05 12:09 PM Page 37


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **37**


    For example, if you were creating a class to provide a network connection to your
    server, you might call the class NetworkConnection. There is no point in having
    a Javadoc comment that states that this class provides “a network connection”—the
    user already knows that.


    Instead, you might consider specifying that the class provides “a connection to
    the database server over the network through which remote access to the database
    functions can be used.”


    ■**Caution** You should not write any implementation-specific details in your
    Javadoc comments.


    Where to Put your Javadoc Comments


    In theory, Javadoc comments can go anywhere in your source code. However, the
    Javadoc application will only include comments in specific locations:


    • Class comments should appear immediately before the class declaration (Javadoc
    currently allows the comments to appear anywhere before the class declaration,
    even before the package declaration, but this behavior should not be relied on).


    • Class and instance variable comments should appear immediately before the class
    or instance variable to which they belong.


    • Method comments should appear immediately before the method signature.'
