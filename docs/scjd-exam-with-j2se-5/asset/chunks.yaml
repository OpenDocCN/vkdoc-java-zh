    \    out.readUTF(supportingActor);\n    out.readUTF(year);\n    out.readInt(copy);\n\
    }\n\n■**警告** 与 `persistDVD` 和 `retrieveDVD` 的情况一样，`readExternal` 和 `writeExternal`\
    \ 方法并未包含在实际项目代码库中，仅作为演示外部化的教学工具使用。\n\n由于 Externalizable 被认为是一种更高级的序列化方法，本书将不再进一步介绍\
    \ Externalizable。相反，为了简单起见，我们选择实现 Serializable，但提及 Externalizable 是为了让你了解另一种选择。Serializable\
    \ 实现起来更简单，但牺牲了性能和灵活性。\n\n5165CH06.qxd 11/16/05 12:14 PM 第 171 页\n\n第 6 章 ■ 使用\
