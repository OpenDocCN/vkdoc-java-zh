    friendship.


    The MainWindow


    The MainWindow class extends JFrame and is the actual implementation of the Denny’s
    DVDs main window. The constructor of the MainWindow goes through the process of
    setting up the application menu bar, the main data table, adding the DVDScreen
    (described after Listing 8-22), and setting the main window in the center of the
    operating system screen.


    First, the DVDMainWindow constructor creates an instance of its super class, JFrame,
    setting the title of the application. Following this, a dialog box is created
    where the user can enter the location of the database (described in the upcoming
    section, “Specifying the Database Location”). The initialization procedure then
    continues to create the menu bar and all menu items.'
  trans: "\n•   你可以随时向样本观众/测试者展示草图——无需随身携带电脑。\n•   当你向潜在用户展示时，他们会*明白*这只是一个草图，而非完整的应用程序；而如果你展示的是模拟的图形用户界面（GUI），用户往往会认为大部分工作已经完成。\n\
    •   预先对美观性做出决策后，我们更有可能坚持该设计。若没有预先绘制草图就直接编码，每当遇到实现困难时，就容易产生修改设计某部分的冲动。\n•   预先对\
    \ GUI 中要显示的内容做出决策后，在开发过程中就不太容易随意添加新功能。\n\n就像拼图一样，解决同一个问题有多种方法。上述布局结构当然只是我们为 Denny's\
    \ DVD 应用程序选择的方式——你可能会为自己的应用程序选择完全不同的布局。Denny's DVD 应用程序界面采用了一种简单的方法，只包含了极少的额外花哨功能。Sun\
    \ 公司对 SCJD 考试的要求仅是一个基本的 Swing 实现，但你可以选择超出要求，添加更多功能。例如，即使考试并未明确要求，也可以提供一个`JToolBar`以提升易用性。是否添加此类功能由你决定。一方面，你可以添加许多功能来使\
    \ GUI 更友好，从而提高分数；另一方面，考试说明可能警告不要超出规范。如何把握分寸，取决于你自己。\n\n查看图 8-22 中的草图，我们可以看到有三个主要区域（不包括标题栏和菜单栏），如图\
    \ 8-23 所示。\n\n**图 8-23.** *客户端 GUI 应用程序的三个主要区域*\n\n5165CH08.qxd 11/16/05 12:16\
    \ PM 第 265 页\n\n第 8 章 ■ 图形用户界面\n\n**265**\n\n我们可能会尝试直接将组件添加到`BorderLayout`中；然而，如果用户调整屏幕大小，北部和南部的对象只会水平拉伸——只有中心的对象会垂直拉伸。这可能导致屏幕外观不协调，如图\
    \ 8-24 所示。\n\n**图 8-24.** *如果表格位于北部、搜索面板位于中部、预订面板位于南部时，调整 GUI 应用程序大小的效果*\n\n■**注意**\
    \ 这是一个例子，说明在编码前创建应用程序草图有助于确保最终得到的 GUI 是用户想要的，而不是对我们来说最容易实现的。如果没有那个草图，我们可能会为了让自己更轻松而改变用户认可的设计。\n\
    \n因此，我们需要改变 GUI 的划分方式。大部分信息将显示在表格中，所以表格是我们希望放在中心的组件。\n\n这意味着我们需要创建另一个面板，同时包含搜索选项和预订选项，并将其放置在主面板的南部，如图\
    \ 8-25 所示。\n\n**图 8-25.** *主窗口的新面板*\n\n5165CH08.qxd 11/16/05 12:16 PM 第 266 页\n\
    \n**266**\n\n第 8 章 ■ 图形用户界面\n\n我们将创建一个包含搜索面板和预订面板的`JPanel`。由于这两个面板在用户调整窗口大小时不需要改变大小，我们将搜索面板放在北部，预订面板放在南部，如图\
    \ 8-26 所示。\n\n**图 8-26.** *用于搜索和预订的新面板* 然后，我们可以将图 8-26 所示的面板添加到图 8-25 所示面板的南部，这样得到的\
    \ GUI 会在需要时调整表格窗格的大小，同时保持搜索和预订窗格为所需大小。清单 8-20 中的代码演示了这种技术。但请注意，代码中使用标签代替了实际组件——这样做是为了使代码更易于理解。\n\
    \n**清单 8-20.** *组合多个面板以形成整体 GUI*\n```java\nimport java.awt.*;\nimport javax.swing.*;\n\
    import javax.swing.border.*;\n\npublic class MyFrame {\n    public static void\
    \ main(String[] args) throws Exception {\n        Border border = BorderFactory.createLineBorder(Color.BLACK);\n\
    \        JFrame theFrame = new JFrame();\n        theFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\n\
    \n        // 这是表格的面板——它只包含表格\n        JPanel tablePanel = new JPanel();\n    \
    \    tablePanel.setBorder(border);\n        JLabel table = new JLabel(\"Table\
    \ display area\", SwingConstants.CENTER);\n        table.setPreferredSize(new\
    \ Dimension(650, 225));\n        tablePanel.add(table);\n\n        // 搜索选项面板\n\
    \        JPanel searchPanel = new JPanel();\n        searchPanel.setBorder(border);\n\
    \        JLabel search = new JLabel(\"Search area\", SwingConstants.CENTER);\n\
    \        search.setPreferredSize(new Dimension(650, 15));\n        searchPanel.add(search);\n\
    \n        // 预订选项面板\n        JPanel bookPanel = new JPanel();\n        bookPanel.setBorder(border);\n\
    \        JLabel book = new JLabel(\"Booking area\", SwingConstants.CENTER);\n\
    \        book.setPreferredSize(new Dimension(650, 15));\n        bookPanel.add(book);\n\
    \n5165CH08.qxd 11/16/05 12:16 PM 第 267 页\n\n第 8 章 ■ 图形用户界面\n\n**267**\n\n    \
    \    // 搜索和预订选项面板都添加到一个额外的面板中\n        JPanel optionsPanel = new JPanel(new BorderLayout());\n\
    \        optionsPanel.add(searchPanel, BorderLayout.NORTH);\n        optionsPanel.add(bookPanel,\
    \ BorderLayout.SOUTH);\n\n        // 然后将 tablePanel 和 optionsPanel 添加到 JFrame\
    \ 中\n        theFrame.add(tablePanel, BorderLayout.CENTER);\n        theFrame.add(optionsPanel,\
    \ BorderLayout.SOUTH);\n\n        theFrame.pack();\n        theFrame.setVisible(true);\n\
    \    }\n}\n```\n清单 8-20 大致展示了我们将如何为客户应用程序的 MainWindow 进行布局。接下来我们将提供 MainWindow\
    \ 类的完整代码；不过，在继续之前，值得通读清单 8-20 中的代码，以确保你熟悉布局概念。\n\n清单 8-20 生成的屏幕内容如图 8-27 所示。\n\
    \n**图 8-27.** *组合多个框架的结果*\n\n搜索区域和预订区域各自包含多个按行排列的项目。我们可以为这两个窗格使用`FlowLayout`，这将在下一节的清单\
    \ 8-21 中展示。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 268 页\n\n**268**\n\n第 8 章 ■ 图形用户界面\n\
    \n■**提示** 这种开发小段代码来展示概念的技术在开发和调试代码中非常有用。当尝试集成某个似乎无法正常工作的功能，或调试现有代码时，通常大部分代码与你的问题无关。当你创建一个仅用于测试该问题的简单应用程序时，就不会有不相关的代码分散你的注意力。这也意味着你有一小段代码，可以在必要时向朋友或同事寻求帮助——请朋友或同事帮助调试上千行的应用程序，确实是在考验友谊。\n\
    \nMainWindow\n\nMainWindow 类继承自`JFrame`，是 Denny's DVD 主窗口的实际实现。MainWindow 的构造函数执行设置应用程序菜单栏、主数据表、添加`DVDScreen`（在清单\
    \ 8-22 之后描述）以及将主窗口置于操作系统屏幕中央的过程。\n\n首先，DVDMainWindow 构造函数创建其超类`JFrame`的一个实例，并设置应用程序的标题。随后，创建一个对话框，用户可以在其中输入数据库的位置（将在下一节“指定数据库位置”中描述）。然后，初始化过程继续创建菜单栏和所有菜单项。\n"
