- fmt: "# Chapter 7: Networking with Sockets\n\nPrior to JDK 5, the `commandId` variable\
    \ in the `DvdCommand` class would probably have been constants, of the form:\n\
    \n```java\npublic final static int FIND = 0;\npublic final static int RENT = 1;\n\
    public final static int RETURN = 2;\n```\n\nThere are many problems with doing\
    \ this, though, including the possibility that someone might directly set the\
    \ `commandId` variable to an integer value that is not supported, or they might\
    \ do something illogical with the constants (such as try to add them). Furthermore,\
    \ we cannot enumerate over the number of modes, and if we tried to print the value\
    \ of the `commandId` variable, a number would be returned—we would have to look\
    \ up this number in the documentation or in the source code to determine what\
    \ the number really means.\n\nJDK 5 provides us with a simpler way of defining\
    \ these constants: using an `enum`. The `SocketCommand` enum is defined as:\n\n\
    ```java\npackage sampleproject.gui;\n\npublic enum SocketCommand {\n    UNSPECIFIED,\
    \ /* indicate that the command object has not been set */\n    FIND,        /*\
    \ request will be performing a Find action */\n    RENT,        /* renting a DVD\
    \ */\n    RETURN,      /* returning a DVD */\n    MODIFY,      /* updating status\
    \ of a DVD */\n    ADD,         /* creating a new DVD record */\n    REMOVE, \
    \     /* delete a DVD record */\n    GET_DVD,     /* retrieve a single DVD from\
    \ database */\n    GET_DVDS,    /* retrieve multiple DVDs from database */\n \
    \   RESERVE,\n    RELEASE\n}\n```\n\nNow any variable of type `SocketCommand`\
    \ can *only* contain one of these listed options—no other options are possible.\n\
    \nWe also have the benefit that anytime we print (or log) the contents of the\
    \ `commandSocket` variable, the string `UNSPECIFIED`, `FIND`, `RENT`, `RETURN`,\
    \ `MODIFY`, `ADD`, `REMOVE`, `GET_DVD`, `GET_DVDS`, `RESERVE`, or `RELEASE` will\
    \ be printed (or logged)—it will be instantly clear from looking at the output\
    \ what the variable was set to.\n\nThere are many more benefits of using enums.\
    \ We recommend you read the release notes related to enums available at [http://java.sun.com/j2se/1.5.0/docs/guide/language/enums.html](http://java.sun.com/j2se/1.5.0/docs/guide/language/enums.html)\
    \ for more information.\n\n## Summary\n\nIn this chapter, we discussed the Denny's\
    \ DVDs socket implementation. We also provided a brief overview of the different\
    \ types of sockets, and the various types of TCP socket development strategies.\
    \ We laid out the application protocol for our socket implementation and demonstrated\
    \ the Command pattern with the help of Java enums. The choice of sockets as the\
    \ network protocol in your exam solution should not be perceived as something\
    \ esoteric and frightening that is to be avoided at all costs. Even though most\
    \ students opt to not develop a socket solution, we believe that the choice isn't\
    \ any more challenging than an RMI solution and should be fairly straightforward,\
    \ given the sample code base that accompanies this text.\n\nSockets are a technology\
    \ that underlies most networking protocols. Most of the cool new technologies,\
    \ such as web services and EJBs, ultimately rely on sockets. As we have discussed,\
    \ even RMI is built on top of sockets. So you would be well served to become acquainted\
    \ with sockets, if only to help deepen your understanding of these other networking\
    \ technologies. The next chapter covers the graphical user interface (GUI) for\
    \ the Denny's DVDs application.\n\n## FAQs\n\n**Q** Do I need to implement a multithreaded\
    \ socket server?\n\n**A** Yes. The certification exam requires that the server\
    \ allow multiuser access. If you use a single-threaded solution, then there will\
    \ never be a way to demonstrate concurrent access. Your application will block\
    \ serially until each request is resolved one at a time.\n\nThis may be an interesting\
    \ solution and will circumvent the need to figure out a locking strategy, but\
    \ one that Sun will not permit.\n\n**Q** Should I utilize a thread pool for the\
    \ socket server implementation?\n\n**A** This is completely up to you. You could\
    \ do so and it would be a good practice. Every time a new connection is accepted,\
    \ our server spawns a new thread to handle the request. However, creating and\
    \ destroying threads is not a free lunch. On a really busy, highly trafficked\
    \ server, it might be better to control the creation of threads. A thread pool\
    \ will instantiate a set number of threads, a number that can be calibrated based\
    \ on your application performance requirements, upon startup. When the server\
    \ receives a new request, it is serviced with one of the threads from the pool.\
    \ When the request is completed, the thread is returned to the pool for later\
    \ use. A thread pool will eliminate the overhead associated with creating and\
    \ destroying new threads. We do not make use of a thread pool in Denny's DVDs\
    \ and you will not have to implement a thread pool for your certification project\
    \ since the exam does not require that your server perform well under a heavy\
    \ load.\n\n**Q** What is meant by TCP sockets being a connection-oriented protocol?\n\
    \n**A** Sometimes in the literature, the term \"connection-oriented\" will be\
    \ used when referring to TCP sockets. What this means is that before communication\
    \ can occur between the endpoints, a connection must exist. Contrast this with\
