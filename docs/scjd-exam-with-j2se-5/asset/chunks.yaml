  trans: "\n*泛型*（以类型安全的方式在运行时支持泛型类型）允许我们在编译时指定泛型对象在运行时将包含的内容。通过一个示例可能更容易理解这一点。示例中使用的格式规则将在本节末尾总结。考虑以下非类型安全的代码：\n\
    \n```java\npublic List getBreed(String breedName) {\n    List dogs = new ArrayList();\n\
    \    // 执行一些操作来找到正确的狗\n    String dogName = \"\";\n    Dog pooch = new Dog(dogName);\n\
    \    dogs.add(pooch);\n    return dogs;\n}\n```\n\n5165CH02.qxd 11/16/05 12:09\
    \ PM 第 30 页\n\n**30**\n\n第 2 章 ■ 项目分析与设计\n\n```java\npublic void listDogs() {\n\
    \    Collection c = getBreed(\"labrador\");\n    for (Iterator i = c.iterator();\
