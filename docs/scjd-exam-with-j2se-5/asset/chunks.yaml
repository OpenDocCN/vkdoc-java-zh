    `final` 方法类似，因为它们无法被重写——其他类甚至无法看到它们）。


    `getDVDs` 方法是一个业务方法。也就是说，我们创建它仅仅是因为业务需求要求如此——即使没有它，我们也能轻松编写客户端应用程序。同样，虽然我们的实现会从头到尾读取整个数据库文件，但也可以采用不同的实现方式，例如不直接访问文件，而是调用其他公共方法（如
