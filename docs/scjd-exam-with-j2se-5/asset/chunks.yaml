    **代码内注释的格式**\n\nJava 源代码中允许两种形式的注释：文档注释（Javadoc 注释）和实现注释（所有其他注释）。\n\nJavadoc 注释将在本章后面关于\
    \ Javadoc 的部分中更详细地介绍；目前，只需说明 Javadoc 注释旨在创建 API 文档，其他程序员可以使用该文档来学习如何使用你的类及其相关的常量、方法（以及可能的变量），而无需查看你的源代码。由于\
    \ Javadoc 注释旨在供外部程序员使用，因此它们应概念性地解释你的代码整体如何工作——它们绝不应涉及实现细节。\n\n另一方面，实现注释旨在向查看你代码的程序员（或评估者）提示代码正在做什么。\n\
    \n■**注意** 不要过度向代码中添加实现注释。如果你为类、方法和变量使用了良好的命名，你的代码通常会是自文档化的。在这种情况下，添加过多的注释会适得其反——注释会分散对代码的注意力，并且很快就会过时。\n\
    \n实现注释有两种形式：块注释（用 `/*` 和 `*/` 标签括起来）和以 `//` 标签开头并持续到行尾的注释。\n\n当添加单行注释，或在代码行末尾添加注释时，我们建议你使用\
    \ `//` 注释分隔符，如下例所示：\n\n```java\n// 这是一个使用单行文本的注释示例\ndoSomething(); // 这是一个行尾注释的示例\n\
    ```\n\n当注释无法容纳在一行文本中时，请使用块注释，如下所示：\n\n```java\n/*\n * 此注释解释了为什么必须使用以下代码而不是更“直观”的方式。\n\
    \ * 由于它需要多行，因此采用块注释形式。\n */\n```\n\n尽量避免使用块注释来注释掉代码行——你应该改用 `//` 注释。使用块注释来注释掉代码行会使其他程序员很难确定哪些代码正在使用，哪些已被注释掉。单独成行的注释应始终缩进到与其所应用的代码相同的级别。\n\
    \n**JDK 5 新特性的建议编码规范**\n\nSun 编码规范尚未更新以反映 JDK 5 中的新增内容。在本节中，我们将简要解释一些新特性，并演示 JDK\
    \ 5 API、Sun 示例代码以及指定该新特性的 Java 规范请求（JSR）中典型的编码规范。\n\n■**注意** 在开始 JDK 5 之前，Sun\
    \ 向 Java 开发者询问了他们希望在新版本中看到哪些特性。所有请求都得到了考虑，用户被允许为他们认为最有价值的特性投票。然后，一个 JSR 编号指定了这些特性，得票最高的请求被纳入\
    \ JDK 5。你可以通过访问 JCP 网站 http://jcp.org/en/home/index 了解更多关于 Java 社区进程的信息，并在未来的增强功能中发表自己的意见。\n\
    \n我们将在本章中快速概述这些新特性，然后在后续章节中更详细地介绍它们，届时可以在我们作业的上下文中看到它们。\n\n**泛型**\n"
- fmt: "# Generics\n\n*Generics* (supporting generic types at runtime in a type-safe\
    \ manner) allow us to specify at compile time what a generic object will contain\
    \ at runtime. An example will probably make this easier to understand. The formatting\
    \ rules used in the example will be summarized at the end of this section. Consider\
    \ the following non-type-safe code:\n\n```\npublic List getBreed(String breedName)\
    \ {\n    List dogs = new ArrayList();\n    // do some work to find the correct\
    \ dogs\n    String dogName = \"\";\n    Dog pooch = new Dog(dogName);\n    dogs.add(pooch);\n\
    \    return dogs;\n}\n```\n\n```\npublic void listDogs() {\n    Collection c =\
    \ getBreed(\"labrador\");\n    for (Iterator i = c.iterator(); i.hasNext(); )\n\
    \        String name = ((Dog) i.next()).getName();\n        System.out.println(name);\n\
    \    }\n}\n```\n\nThis does work; however, although we know that the returned\
    \ `List` must contain a list of `Dogs`, there is nothing to stop someone else\
    \ from compiling source code that assumes that the list contains `Cats`—it will\
    \ compile without problems. However, if that happens, a `ClassCastException` will\
    \ be thrown at runtime.\n\nTo get around that, you would have to write explicit\
    \ type checking into your code (using the `instanceof` operator) and/or catch\
    \ `ClassCastException`.\n\nIt is much nicer when we can ensure that a generic\
    \ class will be handled correctly at runtime. Consider the following replacement\
    \ for the `getBreed` and `listDogs` methods:\n\n```\npublic List<Dog> getBreed(String\
    \ breedName) {\n    List<Dog> dogs = new ArrayList<Dog>();\n    // do some work\
    \ to find the correct dogs\n    String dogName = \"Labrador\";\n    Dog pooch\
    \ = new Dog(dogName);\n    dogs.add(pooch);\n    return dogs;\n}\n```\n\n```\n\
    public void listDogs() {\n    Collection<Dog> c = getBreed(\"labrador\");\n  \
    \  for (Iterator<Dog> i = c.iterator(); i.hasNext(); ) {\n        String name\
    \ = i.next().getName();\n        System.out.println(name);\n    }\n}\n```\n\n\
    We have now specified that the return type of the `getBreed` method will be a\
    \ `List` of `Dogs`. (It may help to read `List<Dog>` as *List of Dog*).\n\nNote\
    \ that the line `String name = i.next().getName();` does not cast the class anymore—the\
    \ line defining the `Iterator` specifies its type.\n\nAttempting to cast an item\
    \ in the collection to a nonrelated class produces the following error:\n\n```\n\
    GenericExample.java:16: inconvertible types\nfound   : Dog\nrequired: Cat\n  \
    \      String name = ((Cat) i.next()).getName();\n                      ^\n1 error\n\
    ```\n\nNote the formatting used in the above examples:\n\n- There are no spaces\
    \ within the angle brackets (`<` and `>`).\n- There is no space between the collection\
    \ name and the angle brackets.\n- There is no space between the angle brackets\
    \ and the curved brackets (when calling a constructor).\n\nThese are the coding\
    \ conventions used in the JSRs and in several Sun documents describing the new\
    \ features of JDK 5; however, currently there are no formal conventions.\n\n##\
    \ Enhanced for Loop\n\nIn our example of generics, we used an `Iterator` to step\
    \ through the items in the collection. To reiterate, our code example looked like\
    \ this:\n\n```\nfor (Iterator<Dog> i = c.iterator(); i.hasNext(); ) {\n    String\
    \ name = i.next().getName();\n}\n```\n\nHowever, this is overly wordy: in most\
    \ cases you will want to step through all the items in your iterator one by one.\
    \ So why spell it out for the compiler in this way?\n\nJDK 5 has made the use\
    \ of iterators in `for` loops much easier. Consider the following construct, which\
    \ does the same work:\n\n```\nfor (Dog mutt : c) {\n    String name = mutt.getName();\n\
    }\n```\n\nIt may help to read the colon (`:`) as “in.” Thus, the statement `for\
    \ (Dog mutt : c)` would read “for each mutt in collection c.”\n\n> **Note** Many\
    \ people are curious about why Sun chose to use the colon instead of using the\
    \ words “in” or “foreach.” Quite simply, Sun wanted to avoid introducing any new\
    \ keywords, which might potentially break existing source code. All your existing\
    \ code should compile and run without any problems under JDK 5.\n\nThe enhanced\
    \ `for` loop can also work with standard arrays. The following code gives an example\
    \ of iterating over an array of `Strings` without using the enhanced `for` loop:\n\
    \n```\npublic static void main(String[] args) {\n    for (int i = 0; i < args.length;\
    \ i++) {\n        System.out.println(args[i]);\n    }\n}\n```\n\nThe enhanced\
    \ `for` loop allows this to be simplified, as shown here:\n\n```\npublic static\
    \ void main(String[] args) {\n    for (String arg : args) {\n        System.out.println(arg);\n\
    \    }\n}\n```\n\nNote that the new `for` loop can’t be used in every scenario.\
    \ In particular, it hides the iterator, so you can no longer call any methods\
    \ on the iterator that might change the underlying collection.\n\nThe formatting\
    \ rule for the new `for` loops is to have a space before and after the colon.\n\
    \n## Autoboxing\n\nJDK 5 allows for automatic type conversions between primitives\
    \ and their wrapper classes. For example:\n\n```\nInteger myInteger = 5; // automatically\
    \ converts 5 (int) into an Integer\n```\n\nNo special coding convention is needed\
    \ for handling this.\n\n## VarArgs\n\nVariable argument lists (also commonly referred\
    \ to as VarArgs) allow the coder to specify that the number of arguments in a\
    \ constructor or method signature is variable. Using this facility can reduce\
    \ the number of overloaded methods and constructors.\n\nHowever, VarArgs come\
    \ at a price: when you specify the exact number and type of parameters a given\
    \ method requires, the Java compiler can perform type checking to ensure that\
    \ your usage of the method is correct. When you use VarArgs, only minimal checking\
    \ is possible.\n\nTo give an example, consider creating a class `Dog`, which has\
    \ two optional attributes (fields): age and name. If you wanted to create constructors\
    \ that can handle all potential ways that a user could create a `Dog` class, you\
    \ would need the following constructors:\n\n```\nDog();\nDog(int age);\nDog(String\
    \ name);\nDog(int age, String name);\n```\n\nUnfortunately, it doesn’t end there.\
    \ The number of constructors you need is 2 to the power of the number of parameters.\
    \ So if the `Dog` class has the following seven attributes—age, height, weight,\
    \ name, owner, color, and pedigree—we would potentially need 128 constructors\
    \ to allow for every combination!\n\nWe would then have additional problems, because\
    \ Java would be unable to differentiate between constructors where the method\
    \ signatures are effectively the same. For example:\n\n```\nDog(int age, String\
    \ name);\nDog(int age, String owner);\n```\n\nJDK 5 allows us to specify that\
    \ there will be a variable number of arguments *of the same type* passed to the\
    \ method or constructor. So you could specify that the exact number of `Strings`\
    \ passed to the constructor is variable by specifying a constructor of:\n\n```\n\
    Dog(int age, String... args) {\n    for (String parameter : args) {\n        System.out.println(\"\
    Received parameter \" + parameter);\n    }\n}\n```\n\nAs you can see in the previous\
    \ code, the ellipsis (`...`) immediately follows the type it refers to. Once it’s\
    \ inside the body of your method, you can just treat the argument as an array\
    \ of the named type.\n\n> **Note** You can only have one variable argument list\
    \ in a given method or constructor declaration, and it must be the last parameter\
    \ in the method or constructor. For example, you cannot have `Dog(int... ages,\
    \ String name)`.\n\n> **Caution** Be very careful when overloading constructors\
    \ or methods with versions containing VarArgs. It is very easy to end up with\
    \ overridden methods that cannot be differentiated by the compiler (e.g., `Dog(String\
    \ name, String... args)` and `Dog(String... args)` are effectively the same),\
    \ or end up with a generic method that matches more than you bargained for (e.g.,\
    \ `Dog(Object... args)` will match *all* constructors, due to autoboxing)."
