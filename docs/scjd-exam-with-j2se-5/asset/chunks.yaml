    Alternatively, if you are only interested in cleaning up any outstanding locks,
    you can use the thread dedicated to the client as a key within a `WeakHashMap`
    containing the locks. When the client disconnects (and the thread dies), then
    eventually the lock will be automatically removed from the `WeakHashMap`. Refer
    to Chapter 5 for more information.


    **Q** How can I automatically update all clients whenever a booking is made by
    any other client on the server?


    **A** This is not required for the Sun assignment; however, you would have to
    open an additional socket between the server and the client so that the server
    can send messages to the client. You could combine this with the Observer design
    pattern (described in Chapter 8) so that clients can register their desire to
    be notified of bookings.


    ## Chapter 8: The Graphical User Interfaces


    In the preceding chapters, the implementation of the data and network tiers for
    the Denny’s DVD application were discussed in detail. Now it is time to deal with
    the final development tier: the graphical user interface (GUI).


    In this chapter we will cover the following topics:


    - Designing simple yet usable GUIs

    - Reviewing Swing components and the event model

    - Implementing a `JTable`

    - Implementing the Model-View-Controller (MVC) design pattern

    - Implementing the Observer design pattern


    It is not necessary to have read the networking chapters prior to reading this
    chapter. The majority of this chapter details how to design your GUI, and as such,
    the networking sections are not required. The sections of this chapter that deal
    with connecting to the database use the Factory design pattern, which will provide
    an instance of a class that implements our connection interface. Naturally, though,
    you will not be able to connect the GUI to the database using the networking options
    described in this chapter until after you have completed the networking chapters.


    > **Tip** The way we are using the connection interfaces shows one of the benefits
    of using an interface: the interface provides a contract that we can assume will
    be implemented—we don’t need the actual implementation to develop our factory
    and use it.


    While developing the Sun assignment, you might choose to start development of
    the GUI prior to developing the networking classes. This is also a reasonable
    approach, and might even be the preferred approach in real life—developing the
    GUI before the networking code means that the customer could start working with
    the stand-alone application before the final code is written.


    For the purposes of this book, it made sense for us to develop the networking
    code first, as we will be connecting to the database via direct connection and
    via the various networking options from within our GUI.


    > **Caution** A common misconception made by end users is that when they have
    seen the user interface, then the entire project is close to completion. It can
    save a lot of confusion if you spend extra time with the client to make sure that
    they understand how much additional work is required at the time you show them
    the user interface. One attempt to get around this misconception is the Napkin
    Look & Feel for Swing applications. See `http://napkinlaf.sourceforge.net` for
    further details.


    Of all components in an application, none affects the user quite as much as the
    GUI. This is true by an interface’s nature: It is the method by which an end user
    interacts with a system.


    Unfortunately, the GUI is often the most de-emphasized part of the application
    development process. This is truly a fallacy, since a user interface can sometimes
    make or break an entire system. If a GUI is convoluted and difficult to navigate,
    users will quickly become frustrated and the result will be a poor overall user
    experience. In the end, a system is only successful if people can successfully
    use it.


    This chapter aims to introduce concepts of GUI layout, design, and implementation
    to those who may not have given it much thought in the past. An interface is a
    required portion of the SCJD exam, and this chapter provides novices with all
    the information they need to get one up and running.


    ## GUI Concepts


    The SCJD exam requires that one individual complete all development work. This
    includes development of all three tiers of the application: the server tier, the
    middle tier, and the presentation tier. This is different from the more common
    working environment, where developers often specialize in a certain tier. It is
    common practice in the workforce to have a group of back-end developers and a
    separate group of front-end developers working on a three-tiered project. In the
    case of the SCJD exam, one developer must create all three tiers.


    > **Tip** The fact that you are doing the work that might normally be split into
    three teams can cause confusion when reading Sun’s instructions. Often candidates
    feel that requirements in the GUI section of the instructions contradict instructions
    in the Data section. But when considered from the perspective of individual teams,
    you should find that the instructions do not contradict each other; the team building
    the Data class has clear instructions to carry out. The team building the GUI
    has been told what the Data class will provide, and can then add their own restrictions
    to meet the requirements of the GUI.


    Creating the front-end can be a daunting task, especially for those who are primarily
    not front-end developers. There are many Java developers who never write a line
    of interface code but who are still extremely fluent programmers in general. This
    is further exacerbated by the fact that only a limited textual description of
    the interface is provided; we have not been given any examples of what the end
    user would like to see. The crux of the next two sections is to ease the burden
    of developing the GUI.


    Layout concepts are discussed at a high level, in addition to some basic human
    interface concepts that can be incorporated into the interface for the SCJD exam.


    > **Note** Layout concepts and human interface concepts are courses of study unto
    themselves. The next two sections only introduce ideas of relevance to the SCJD
    exam.


    ### Layout Concepts


    It is a common misconception that GUI layout is more an art than a science. This
    is a slight misrepresentation of the process of layout design and information
    architecture. In the early days of computing, computer programming was considered
    more of an art than a science.


    This fact seems almost ludicrous by today’s standards. It was only after an engineering
    process was applied to the art of programming that it quickly became more of a
    science or an engineering practice. The same can be said for interface design
    concepts.


    Layout design revolves around the presentation of information in a clear and concise
    manner. The user should be able to process the information a user interface presents
    with little or no effort. This last statement is vague, but for a reason. No matter
    how standards oriented a process may become, there is always a level of intuition
    in decision making. Not all roads can be anticipated and laid out in a standard
    process. Intuition is where the art of layout design comes into play, in deciding
    how to deal with those gray areas of development where no one has treaded before.'
