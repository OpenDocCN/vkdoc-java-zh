    LockInformation> reservations 2 = new HashMap<String, LockInformation>(); 3


    4 private static Lock masterLock = new ReentrantLock(); 5


    6 public boolean reserveDvd(String upc, DvdDatabase renter) 7 throws InterruptedException
    {


    8 LockInformation dvdLock = null;


    9 masterLock.lock();


    10 try {


    11 dvdLock = reservations.get(upc);


    12 if (dvdLock == null) {


    13 dvdLock = new LockInformation();


    14 reservations.put(upc, dvdLock);


    15 }


    16 dvdLock.lock();


    17 } finally {


    18 masterLock.unlock();


    19 }


    21 try {


    22 long endTimeMSec = System.currentTimeMillis() + 5000; 23 Condition dvdCondition
    = dvdLock.getCondition(); 24 while (dvdLock.isReserved()) {


    25 long timeLeftMSec = endTimeMSec - System.currentTimeMillis(); 26 if (!dvdCondition.await(timeLeftMSec,
    TimeUnit.MILLISECONDS)) {


    27 return false;


    28 }


    29 }


    30 dvdLock.setReserver(renter);


    31 } finally {


    5165CH05.qxd 11/16/05 12:13 PM Page 159


    C H A P T E R 5 ■ T H E D V D D ATA B A S E C L A S S


    **159**


    32 dvdLock.unlock();


