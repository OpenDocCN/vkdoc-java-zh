  raw: 'The java and javaw executables allow you to specify a JAR that you want to
    execute using the -jar option. At the command prompt, type the following: javaw
    -jar sampleproject.jar alone


    The sampleproject.jar file can be anywhere on your machine since the entire project
    classes are packaged in the JAR. This should bring up the database location dialog
    box shown in Figure 9-6\. Select the location of the database (it should be in
    the root directory) and click Connect. The main window will then load as shown
    in Figure 9-7.


    **Figure 9-6.** *Starting the application in local mode* **Figure 9-7.** *The
    application running in local mode* **Running Denny’s DVDs Server**


    Running Denny’s DVD server requires you to specify the location of the database
    file, which port you want to use, and the type of server (RMI or sockets). To
    start the server, at the command prompt, type the following:


    javaw -jar sampleproject.jar server


    This should bring up the server configuration window shown in Figure 9-8\. Select
    the location of the database (it should be in the root directory), change the
    port number if desired, select the network type, and click the Start Server button.
    The server window will then display information that it is running and will disable
    most controls, as shown in Figure 9-9.


    ![Image 62](index-327_1.png)


    ![Image 63](index-327_2.png)


    ![Image 64](index-327_3.png)


    5165CH09.qxd 11/16/05 12:17 PM Page 308


    **308**


    C H A P T E R 9 ■ P R O J E C T W R A P - U P


    **Figure 9-8.** *Configuring the network server*


    **Figure 9-9.** *Running the network server*


    We specified that the server should use port 1099 in Figure 9-8\. With our RMI
    solution, this means that the RMI registry will be listening on port 1099 (if
    we had chosen the socket server, it would have meant that our server itself would
    have been listening on port 1099).


    We can confirm this by running the netstat -a command to show all connected or
    listening ports, as shown in Figure 9-10.


    **Figure 9-10.** *Checking which ports are in use*


    ![Image 65](index-328_1.png)


    5165CH09.qxd 11/16/05 12:17 PM Page 309


    C H A P T E R 9 ■ P R O J E C T W R A P - U P


    **309**


    In Figure 9-10 we can see that the fifth Local Address is listening on port 1099\.
    The port that the server itself is running on is unknown—it will be dynamically
    configured by the RMI registry.


    **Running the Client Application in Networked Mode**


    Running the application in network mode requires specifying the IP address or
    host name of the machine that the server and database files are located on, the
    port number the RMI registry or the server is listening on, and the server type.
    To start the networked client, at the command prompt type the following:


    javaw -jar sampleproject.jar server


    This should bring up the connection configuration dialog box shown in Figure 9-11.


    **Figure 9-11.** *Starting the networked client*


    Enter the location of the database (either by the name of the computer hosting
    the database, e.g., localhost, or by the IP address of the computer host, e.g.,
    127.0.0.1), change the port number if necessary to match the port number specified
    when starting the server, and select the same network type as specified when starting
    the server. Then click Connect, and the main window will load as shown in Figure
    9-7 earlier.


    **Testing**


    In version 2.0 of Denny’s DVDs is a package called test, which is in a different
    directory structure than the standard source. The standard source is in the directory
    named src, while the test package is in a subdirectory called test. The different
    directory structures will assist us to ensure that we do not submit any classes
    we do not want to submit—this will be explained in the “Packaging Your Submission”
    section later in this chapter.


    This may be a little confusing, so we recommend you look at the directory tree
    structure displayed in Figure 9-12\. If you have been following along with this
    chapter, you will have a root directory similar to D:\dennysDVDs2.0 (the actual
    drive and directory can be different). In that root directory so far are the directories
    classes (where javac has been storing our compiled classes), src (which is the
    root directory for our sample assignment source), and test (which is the root
    directory for our test source). Our package structure appears within each of those
    directories, starting with the top-level package named sampleproject.


    ![Image 66](index-329_1.png)


    5165CH09.qxd 11/16/05 12:17 PM Page 310


    **310**


    C H A P T E R 9 ■ P R O J E C T W R A P - U P


    ■**Note** There should also be a bonus directory in the root directory named src
    – examples. This has not previously been described anywhere in the book, but it
    contains sample code for many of the topics discussed in the book that are not
    part of the project itself.


