    或者，如果你只关心清理任何未处理的锁，你可以使用专用于客户端的线程作为包含锁的 `WeakHashMap` 中的键。当客户端断开连接（且线程终止）时，锁最终会自动从
    `WeakHashMap` 中移除。更多信息请参考第 5 章。


    **问** 当服务器上任何其他客户端进行预订时，如何自动更新所有客户端？


    **答** 这对于 Sun 的作业来说并非必需；不过，你需要在服务器和客户端之间打开一个额外的套接字，以便服务器可以向客户端发送消息。你可以将此与观察者设计模式（在第
    8 章中描述）结合使用，以便客户端可以注册其希望接收预订通知的意愿。


    5165CH07.qxd 11/16/05 12:15 PM 第 224 页


    5165CH08.qxd 11/16/05 12:16 PM 第 225 页


    第 8 章


    ■ ■ ■


    图形用户界面


    在之前的章节中，详细讨论了 Denny 的 DVD 应用程序的数据层和网络层的实现。现在，是时候处理最后一个开发层了：图形用户界面（GUI）。


    在本章中，我们将涵盖以下主题：


    • 设计简单但可用的 GUI


    • 回顾 Swing 组件和事件模型


    • 实现 `JTable`


    • 实现模型-视图-控制器（MVC）设计模式


    • 实现观察者设计模式


    在阅读本章之前，不必先阅读网络章节。本章的大部分内容详细介绍了如何设计你的 GUI，因此不需要网络部分的知识。本章中涉及连接数据库的部分使用了工厂设计模式，该模式将提供一个实现我们连接接口的类的实例。当然，在完成网络章节之前，你将无法使用本章描述的网络选项将
    GUI 连接到数据库。


    ■**提示** 我们使用连接接口的方式展示了使用接口的一个好处：接口提供了一个我们可以假设会被实现的契约——我们不需要实际的实现来开发我们的工厂并使用它。


    在开发 Sun 的作业时，你可能会选择在开发网络类之前先开始开发 GUI。这也是一种合理的方法，甚至在现实生活中可能是更可取的方法——在网络代码之前开发 GUI
    意味着客户可以在最终代码编写完成之前就开始使用独立应用程序。


    **225**


    5165CH08.qxd 11/16/05 12:16 PM 第 226 页


    **226**


    第 8 章 ■ 图形用户界面


    就本书而言，我们先开发网络代码是有意义的，因为我们将通过直接连接以及从 GUI 内部通过各种网络选项来连接数据库。


    ■**警告** 最终用户常有一个误解，即当他们看到用户界面时，整个项目就接近完成了。如果你花额外的时间与客户沟通，确保他们理解在展示用户界面时还需要多少额外工作，这可以避免很多困惑。解决这种误解的一种尝试是
    Swing 应用程序的 Napkin 外观。更多详情请参见 http://napkinlaf.sourceforge.net。


    在应用程序的所有组件中，没有哪个组件能像 GUI 那样对用户产生如此大的影响。这由界面的本质决定：它是最终用户与系统交互的方法。


    不幸的是，GUI 往往是应用程序开发过程中最被忽视的部分。这实际上是一种谬误，因为用户界面有时可以成就或毁掉整个系统。如果 GUI 复杂且难以导航，用户很快就会感到沮丧，结果将是糟糕的整体用户体验。最终，一个系统只有在人们能够成功使用时才算成功。


    本章旨在向那些过去可能没有过多考虑 GUI 布局、设计和实现的人介绍相关概念。界面是 SCJD 考试的必要部分，本章为新手提供了启动和运行界面所需的所有信息。


    **GUI 概念**


    SCJD 考试要求一个人完成所有开发工作。这包括应用程序所有三个层的开发：服务器层、中间层和表示层。这与更常见的工作环境不同，在那种环境中，开发人员通常专注于某一特定层。在职场中，常见做法是让一组后端开发人员和另一组前端开发人员共同处理一个三层项目。而在
    SCJD 考试中，一个开发人员必须创建所有三个层。


    ■**提示** 你正在完成通常可能由三个团队分担的工作，这一事实在阅读 Sun 的说明时可能会引起混淆。考生常常觉得说明中 GUI 部分的要求与数据部分的要求相矛盾。但如果从各个团队的角度来考虑，你会发现这些说明并不矛盾；构建数据类的团队有明确的指令要执行。构建
    GUI 的团队被告知数据类将提供什么，然后可以添加自己的限制以满足 GUI 的要求。


    5165CH08.qxd 11/16/05 12:16 PM 第 227 页


    第 8 章 ■ 图形用户界面


    **227**


    创建前端可能是一项艰巨的任务，尤其是对于那些主要不是前端开发人员的人来说。有许多 Java 开发人员从未写过一行界面代码，但总体上仍然是极其熟练的程序员。由于只提供了有限的界面文字描述，这一情况更加严重；我们没有任何关于最终用户希望看到什么的示例。接下来两节的关键在于减轻开发
    GUI 的负担。


    除了可以融入 SCJD 考试界面的一些基本人机界面概念外，还将从高层次讨论布局概念。


    ■**注意** 布局概念和人机界面概念本身就是研究课题。接下来的两节仅介绍与 SCJD 考试相关的概念。


    **布局概念**


    一个常见的误解是，GUI 布局与其说是科学，不如说是艺术。这稍微歪曲了布局设计和信息架构的过程。在计算机早期，计算机编程被认为与其说是科学，不如说是艺术。


    按照今天的标准，这一事实似乎近乎荒谬。只有在将工程流程应用于编程艺术之后，它才迅速变得更像一门科学或工程实践。界面设计概念也是如此。


    布局设计围绕着以清晰简洁的方式呈现信息。用户应该能够毫不费力地处理用户界面呈现的信息。最后这句话很模糊，但这是有原因的。无论一个流程可能变得多么标准化，决策中总会有一定程度的直觉。并非所有道路都能被预见并纳入标准流程。直觉正是布局设计的艺术发挥作用的地方，它决定了如何处理那些无人涉足过的开发灰色地带。

