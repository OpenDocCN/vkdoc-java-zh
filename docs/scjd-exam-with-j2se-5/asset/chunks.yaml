    # CHAPTER 8 ■ THE GRAPHICAL USER INTERFACES


    ## Model-View-Controller Pattern


    The previous section demonstrated the necessity of reconciling system functionality
    with a user’s interaction with the application through the GUI layout. The Model-View-Controller
    (MVC) pattern limits the dependencies between a system’s interface and implementation,
    and buffers the data and middle tiers from design decisions that may affect the
    presentation tier.


    ### Why Use the MVC Pattern?


    The main purpose of the MVC pattern is the separation of responsibility for the
    various tasks involved in the user interface (UI). A typical UI can be split into
    the following areas of responsibility:


    1. The interface to the system

    2. The displaying of the data to the end user

    3. Accepting input from the user, then parsing and processing it


    These three areas of responsibility correspond to the Model, the View, and the
    Controller, respectively.


    It is possible, using the MVC design pattern, to keep these three areas of responsibility
    logically separate. On large teams it might be possible to assign these areas
    of responsibility to teams who have the best skills to perform the work—for example,
    those who have good layout skills might be assigned to work on the View, while
    those who are better at parsing inputs from various sources might work on the
    Controller.


    Using the MVC design pattern allows us to change the UI rapidly. For this book’s
    sample assignment and for the Sun SCJD assignment we will be creating a GUI that
    will run as a stand-alone application. However, by changing the View and the Controller,
    we can easily create a web-based application. Another View and Controller can
    be used to provide a web services interface to the application.


    > **Tip** It is often recommended that when learning any new subject you should
    try to put the concepts into practice. If you are planning to study for the Sun
    Certified Web Component Developer certification, you could try creating a web
    interface to your assignment. This can be easier than trying to implement a brand-new
    project as part of your studies, as you will have already created the business
    logic and will therefore only be concentrating on the information pertinent to
    your new certification studies.


    ### MVC in Detail


    As its name suggests, the MVC pattern consists of three primary players, as shown
    in Table 8-2.


    The MVC pattern may seem complex, but it’s actually an incredibly simple concept.
    The concept is very easy to follow when it’s boiled down to a real-world example.
    Let’s consider it from the perspective of ordering from your local fast-food restaurant.


    5165CH08.qxd 11/16/05 12:16 PM Page 235


    **235**


    **Table 8-2.** *Components of an MVC Architecture*


    | Component  | Role |

    |------------|------|

    | Model      | The Model is the interface to the remainder of the application.
    It provides a consistent way for the Controller(s) to access and/or modify data,
    and returns data in a specified format. It is not uncommon for the Model to incorporate
    other design patterns—for example, the Façade pattern to hide low-level application
    details; the observable side of the Observer pattern to provide automatic updates
    to view(s); the Singleton pattern to ensure that only one instance of the model
    can exist; and so on. |

    | View       | The View is the actual visual representation of the data. The underlying
    system may store data in a number of ways, but it is the function of the View
    to interpret and transform the system data into an appropriate format. Some appropriate
    presentation formats may include an HTML page, a PostScript document, or the GUI
    of a Java application. No matter what type of data display is chosen, the fact
    remains that the View is solely responsible for transforming the system’s internal
    data format into the presentation format. The View must also allow for human interaction.
    The user may click a button in the GUI interface, and the View must handle and
    dispatch that action. This translates into a call to the Controller. It is important
    to realize that a View does not necessarily have to correspond to a screen layout—it
    is also possible in a business-to-business (B2B) scenario that the View may be
    an XML document that is being sent to a remote application. |

    | Controller | The Controller is the mediator between the data and presentation
    portions of an application. The View calls the Controller and instructs it to
    execute a certain action. The action may require data passed from the View, or
    it may pass data back to the View. In any case, one thing is certain: All interaction
    between the data tiers and the presentation tiers must occur through the Controller.
    To preserve the high level of abstraction the MVC allows, the View must never
    bypass the Controller and communicate directly with components below it. For instance,
    the View should never call the database directly and tell it to execute a query.
    Instead, the View should call the Controller and instruct it to call the database
    component. |


    When you get to the restaurant you look at the menu and decide the salad looks
    really nice. So you ask the counter person for a salad and a milk shake. That
    individual goes to the kitchen, collects your food, and returns it to you.


    This is a pretty common scenario, but it is a perfect representation of the MVC
    pattern.


    Let’s break down the main actors in this scenario and map them to their equivalents
    in the MVC pattern.


    The View in this example is the menu being presented to you. The type of View
    may vary—you may be inside the restaurant looking at a menu in your hands, or
    you may be in the drive-through looking at a menu on the wall. The same information
    is presented in either View, but it might be presented in different formats—a
    paper menu for patrons inside the restaurant or a painted menu for those in the
    drive-through.


    The Controller in this scenario is the counter person who takes your order. That
    person acts as the buffer between you and the actual operations of the fast-food
    restaurant. The counter person takes note of the meal you request, and arranges
    for it to be provided to you.


    5165CH08.qxd 11/16/05 12:16 PM Page 236


    **236**


    > **Note** It is possible to consider the counter person as part of the View,
    since they are asking the customer questions and possibly requesting payment for
    the meal. However, for the purposes of simplicity, we are ignoring the multiple
    roles the counter person may play.'
