- fmt: "# Figure 5-7. Example of Thread Reuse Within RMI\n\nAs can be seen in Figure\
    \ 5-7, both client A and client B use threads `15655788` and `16112134`.\n\nWith\
    \ this in mind, if we cannot use tokens and we have chosen to use RMI, then we\
    \ need to find some other way of uniquely identifying our clients.\n\nOne way\
    \ of handling this is to build our server using the Factory design pattern, where\
    \ our factory creates a unique object for each connected client. We can then use\
    \ the unique instance of our `DvdDatabase` class to identify the client.\n\nUsing\
    \ a factory works for both a sockets-based solution (although it is generally\
    \ overkill) and for an RMI solution. Since we are presenting both solutions in\
    \ this book, we have decided to use a factory, and we will describe it in Chapter\
    \ 6.\n\n## Creating Our Logical Reserve Methods\n\nTo create the `reserveDVD`\
    \ and `releaseDVD` methods needed for logical locking, we need some class variables.\
    \ For a start, we need to track the owners of the locks; a `Map` containing the\
    \ UPC number and the owner is ideal. We also need a common `Lock` object to ensure\
    \ that different threads do not try to lock the record simultaneously. Finally,\
    \ we need a condition that threads can monitor to determine when they can attempt\
    \ to acquire a lock again. These three variables are as follows:\n\n```java\n\
    private static Map<String, DvdDatabase> reservations\n    = new HashMap<String,\
    \ DvdDatabase>();\nprivate static Lock lock = new ReentrantLock();\nprivate static\
    \ Condition lockReleased = lock.newCondition();\n```\n\nListing 5-2 contains the\
    \ `reserveDVD` method.\n\n### Listing 5-2. The `reserveDVD` Method\n\n```java\n\
    boolean reserveDVD(String upc, DvdDatabase renter)\n    throws InterruptedException\
    \ {\n    log.entering(\"ReservationsManager\", \"reserveDvd\", new Object[]{upc,\
    \ renter});\n    lock.lock();\n    try {\n        long endTimeMSec = System.currentTimeMillis()\
    \ + 5000;\n        while (reservations.containsKey(upc)) {\n            long timeLeftMSec\
    \ = endTimeMSec - System.currentTimeMillis();\n            if (!lockReleased.await(timeLeftMSec,\
    \ TimeUnit.MILLISECONDS)) {\n                log.fine(renter + \" giving up after\
    \ 5 seconds: \" + upc);\n                return false;\n            }\n      \
    \  }\n        reservations.put(upc, renter);\n        log.fine(renter + \" got\
    \ Lock for \" + upc);\n        log.fine(\"Locked record count = \" + reservations.size());\n\
    \        log.exiting(\"ReservationsManager\", \"reserveDvd\", true);\n       \
    \ return true;\n    } finally {\n        // ensure lock is always released, even\
    \ if an Exception is thrown\n        lock.unlock();\n    }\n}\n```\n\nWe have\
    \ decided to allow any UPC to be reserved, even if no such record exists. This\
    \ ensures that a DVD can also be reserved when we are first adding it to the system.\
    \ The alternative would be to have the `reserveDVD` method start by verifying\
    \ that the record does exist, throwing some exception if the record does not exist.\
    \ If we had any delete methods, we would also have to verify that the record existed\
    \ after we acquired the lock. However, if we did this, we would also have to change\
    \ the logic of the `addDVD` method, and possibly the `updateDVD` method (remember,\
    \ they both defer to the same private `persistDVD` method, which might also have\
    \ to be updated).\n\nOur `reserveDVD` method acquires a mutual exclusion lock,\
    \ and then goes into a `while` loop, waiting until we either time out or acquire\
    \ the lock.\n\nOur `DBClient` interface specifies that we must return `false`\
    \ if we were unable to lock the record within 5 seconds. Under JDK 1.4 there was\
    \ no guaranteed way of determining whether a call to `wait(timeout)` had timed\
    \ out or whether notification had been received. JDK 5 has a new `Condition.await`\
    \ method, which will return a `Boolean` `true` if we were notified by the `unlock`\
    \ method that we can continue processing, and `false` if we timed out.\n\nIf we\
    \ have acquired the lock, we add a record to the map of lock owners, indicating\
    \ that we own the lock.\n\nFinally, we release the mutual exclusion lock.\n\n\
    ## The Logical Release Method"
