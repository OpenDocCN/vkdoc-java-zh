    # Chapter 2: Project Analysis and Design


    This chapter introduces project issues that are common to all software projects,
    discussing them in relation to this book’s sample project and the Sun assignment
    that you need to complete to become a Sun Certified Java Developer. In particular,
    the following topics will be covered:


    - Planning the beginning stages of the SCJD exam

    - Organizing the layout of your project

    - Documenting projects

    - Becoming familiar with industry-standard principles on source code formatting
    and Javadoc, and incorporating these principles from the onset of project development

    - Using Java packages to group code based on functional similarities

    - Learning common development practices, including using assertions and logging


    This chapter does not attempt to forge a new road, but rather leads down the well-worn
    paths of Java standards, such as coding conventions, Javadoc usage, and packaging
    concepts. Some of these tools are necessary in order to pass the SCJD exam, and
    all should be used every day by a Java developer.


    By using these standards from the beginning, you will be well on your way to reaching
    your goal of being a certified Java 2 developer.


    ## Implementing a Project


    It is very tempting to start a project by jumping right into code. Doing so is
    fun and grants an immediate sense of progress. However, this approach often has
    significant drawbacks. Beginning a project without proper planning may tie the
    project to unspoken assumptions, cause you to overlook critical information, or
    introduce design flaws that manifest as the project progresses.


    Generally, it is best to start by confirming requirements, designing data flow,
    and sketching a prototype of the graphical user interface (GUI) layout. After
    this step comes the design.


    > **Note** Many different development methodologies are used in varying degrees
    in the software industry.'
