    afterwards in line 201.


    As always, there was a design decision to be made here: Do we create our own log
    message (probably calling log.finer), or do we use the two calls that really don’t
    provide much useful information? Once again, there is no one “right” way to handle
    this. The disadvantage of our chosen method is that we are providing unnecessary
    logging, which does not produce much useful information. However, on the positive
    side we are still using the same standard logging format for **all** “entering”
    and “exiting” log messages—contrast this with the probability that if we were
    to write our own specialized log method for these getters and setters, it is likely
    that the log messages would vary from method to method. In addition, if we ever
    needed to do more work in this method, the work can be put directly between the
    two log messages; if we had created our own specialized log message, we would
    probably have to remove it and replace it with the standard log messages.


    The logging provided for the getters and setters is possibly overkill; however,
    it does highlight one valuable debugging tool: It can be very useful to see what
    parameters are passed into a method, and what the end result of executing the
