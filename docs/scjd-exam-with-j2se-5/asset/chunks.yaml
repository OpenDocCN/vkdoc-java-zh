    **答** 不，你只能同步对数据的访问。


    **问** `Vector`不就是同步数据吗？


    **答** 不，`Vector`提供的是访问其数据的同步方法。这是一个重要的区别。


    **问** 在静态成员变量和局部变量上同步有什么区别？


    **答** 实际上没有区别。你仍然是在获取一个对象上的锁。但是，通过在静态成员变量上同步，该锁可以在共享该静态对象作为类成员变量的多个对象之间共享。


    **问** 当人们说一个对象（例如`Vector`）是同步的，这意味着什么？


    **答** 这意味着该对象的所有公共方法在访问共享数据时都是同步的。通常，这意味着在该对象上调用一个方法是一个原子操作。任何其他线程在该对象上调用方法都将被阻塞，直到你的线程完成对该对象的操作。


    **问** 当一个方法在一个成员变量上同步，而另一个方法在`this`关键字上同步，并且这两个方法必须交互时，会发生什么？


    **答** 那么你正在两个不同的对象上获取两个锁——即`this`和该成员变量——并且非常需要小心。否则，你就为死锁打开了大门。你应该仔细考虑是否真的需要这样做，或者是否可以在一个对象上进行同步。


    **问** 线程死亡后，我如何重新启动它？


    **答** 你不能。你必须创建一个新线程。


    **问** 提供的大多数示例都显示主应用程序隐式地等待所有创建的线程完成后再退出。有没有一种方法可以在不等待线程完成的情况下退出程序？

