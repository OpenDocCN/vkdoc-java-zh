    ## 常见问题解答


    **问**：Sun 的作业说明告诉我们，必须在提交中包含说明和数据文件。为什么需要这样做？


    **答**：Sun 提供了多个作业，以及这些作业的多个版本。作业版本的一些变化包括数据文件格式、提供的接口、所需的类名或这些变化的任意组合。同时提供您*实现*的说明和*您的*数据文件，可确保评估员将您的提交与您的说明进行比较，而不是与其他人的说明进行比较。同样，这保证了评估员在收到您的提交时，能够同时收到正确的说明。


    **问**：提供的接口不包含我想要抛出的异常。我可以添加它吗？


    **答**：不可以。如说明中所述，其他应用程序期望使用此接口，因此如果您添加异常，其他应用程序将需要捕获它们。这可能会阻止其他应用程序正常工作。


    **问**：我认为如果我在接口中添加另一个方法，这个应用程序会工作得更好。我可以这样做吗？


    **答**：您可以这样做；但是，对于 Sun 的作业，我们建议不要这样做。添加新的接口方法会破坏数据格式和用户界面之间的约定。此外，如果您在实际作业中这样做，可能会失败。更好的方法是在实现的类中添加方法。我们鼓励您添加类方法（即，不是
    Sun 提供的接口方法）或修改实现，以便更好地理解项目和源代码。


    **问**：本章的示例与 Sun 将提供的示例有多相似？


    **答**：无法保证 Sun 未来的考试会是什么样子，但此示例演示了获得 Java 开发人员认证所需的概念，并介绍了 J2SE 中的新特性。


    **问**：我应该如何使用提供的代码示例？


    **答**：Denny''s DVDs 系统的完整版本可供下载。每章将描述项目从本章开发的所需 `DBClient` 接口到应用程序其余部分的演进过程。在阅读本书时，请参考代码库的相关部分，以理解完整的实现。第
    9 章详细解释了如何以类似于您实际 Sun 提交需要执行的方式编译和执行整个 Denny''s DVDs 系统。


    另一种方法是先研究示例项目的源代码，然后阅读本书，以解释所做的设计选择，以及这些选择如何与您在开发实际 Sun 认证项目时将遇到的类似决策相关联。我们建议先阅读本书，然后再参考代码，但先阅读代码再参考本书的替代方法也应该能产生成功的结果。这实际上取决于哪种方法更适合您和您的自然学习方法。


    **问**：我可以添加本书未讨论的功能吗？


    **答**：当然，您可以自由修改项目并使其更复杂。事实上，好奇心和实验精神是软件工程师非常重要的品质。然而，该项目是经过精心设计的，有两个目标。第一个也是最重要的目标是涵盖
    SCJD 考试所需的所有概念。因此，如果您决定即兴发挥，请记住示例项目的目的。第二个目标是介绍 J2SE 5 的新特性，例如自动装箱和泛型。


