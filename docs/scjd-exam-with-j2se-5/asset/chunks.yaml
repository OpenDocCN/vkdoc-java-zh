    threads or the IceCreamMan thread could have started running immediately afterwards.
    In addition, yielding is something you would normally do before you start (or
    in the middle of ) a lengthy or complex task—it is a way of being nice to other
    threads. However, this is not the case here. Finally, if there are no other threads
    that can run, the JVM will immediately pass control back to the while loop—this
    will result in the thread consuming as much CPU cycles as are available; it can
    even lead to your computer having the appearance of hanging.


    The serveIceCream method is the most interesting part of our code. Assuming that
    there is currently a Dish in the queue, line 49 synchronizes on that IceCreamDish
    instance. This has the effect of forcing any Child objects that want to use the
    IceCreamDish instance to wait. Specifically, it causes line 55 in Child to pause
    until line 53 in IceCreamMan is reached or, if the Child thread had paused at
    line 60, it will not be able to resume until line 53 in IceCreamMan is reached.


    Conversely, if a Child instance is executing a method that synchronizes on the
    IceCreamDish, then hitting line 49 in IceCreamMan will cause IceCreamMan to wait
    until lines 50


    through 61 in Child finish executing, or until the Child instance releases the
    lock on the IceCreamDish by calling wait in line 55.


    This is an example of the threads respecting each other’s boundaries. By synchronizing
    on the same object, the two threads can be assured that they will not be simultaneously
    modifying or using the same object.


    When the IceCreamMan owns the lock on the dish, he can fill it with ice cream,
    and then notify the Child that it is available. This happens in line 52\. After
    line 52 is run, the Child thread that was waiting on that particular plate will
