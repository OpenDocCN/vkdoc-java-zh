    I/O 类代码的实现方式。在调试代码或查阅其他出版物时，你需要意识到 Java 没有为因 I/O 而暂停的线程设置单独的状态。


    InterruptedException


    InterruptedException 通常发生在线程暂停（休眠、等待或尝试加入多个线程）时间过长，而另一个线程故意调用该线程的 interrupt 方法将其从中断状态唤醒时。可以将
    InterruptedException 想象成一个线程猛烈摇晃另一个线程使其恢复意识。当线程以这种方式被摇醒时，它做的第一件事就是执行其 catch (InterruptedException)
    子句中的任何代码（如果存在的话）。


    例如，假设你编写了一个 Data 类，其中有一个 lockRecord 方法，该方法必须等待记录可用后才能锁定它，但它没有超时机制。在 Data 类获得批准后，要求你创建一个
    Data 类的子类，该子类在锁定时处理超时。你可以从头重写整个锁定代码，或者创建一个单独的线程，如果在超时期限内未获取锁，则中断正在锁定记录的线程。


    ■**注意** 线程随时可能被中断，即使它没有调用 sleep、wait 或 join。在这种情况下，线程将继续正常执行，直到它调用 sleep、wait
    或 join，此时会立即从被调用的方法中抛出 InterruptedException。


    5165CH04.qxd 11/16/05 12:11 PM Page 111


    第 4 章 ■ 线程


    **111**


    **同步**


    在讨论同步时，有两个自然的划分：对象同步和客户端同步。本节将解释两者之间的区别。


    内部同步类


    Vector 是一个同步对象，而 ArrayList 则不是。这意味着什么？这意味着所有可以访问 Vector 内部数据的方法都是同步的。一个线程对 Vector
    对象所做的任何更改都保证能立即被其他线程看到，而对 ArrayList 所做的更改则没有这种保证。这并不意味着你在代码中以线程安全的方式使用 Vector
    对象。如果你想要这种保证，你必须直接对 Vector 对象进行同步，就像你必须直接对 ArrayList 进行同步一样。


    ■**注意** Vector 是线程安全集合的一个例子；然而，很少需要 Vector 提供的线程安全性（有关保证的线程安全性的信息，请参阅下一段）。如果你确实需要这种线程安全性，最好使用
    Collections.synchronizedCollection 或类似方法，根据你首选的基础集合的特性来创建线程安全的集合。


    一个同步对象只保证这一点：在该对象上调用的方法将原子性地执行。例如，假设你正在运行两个线程，并且 myVector 和 myArrayList 是类成员变量。Thread1
    已开始运行第 1 行，而 Thread2 尚未开始运行第 A 行。


    *Thread1:*


    1 myVector.add("Hello");


    2 myArrayList.add("Hello");


    *Thread2:*


    A myVector.add("Cruel");


    B myArrayList.add("Cruel");


    现在，假设在第 1 行执行过程中，Thread1 被切出。Thread2 将无法切入，因为 Vector 是同步的。因此，可以保证对于 myVector，Thread2
    的第 A 行会在 "Hello" 之后添加 "Cruel"。


    对于 myArrayList，这种保证不存在。也就是说，如果 Thread1 在第 2 行执行过程中被切出，而 Thread2 切入，则向 ArrayList
    添加项目的顺序是不确定的。


    更糟糕的是，如果其中一个添加操作导致内部数组调整大小，则可能发生各种奇怪的事情。我们可能会看到 NullPointerException 或 ArrayIndexOutOfBoundsException，或者其中一个添加操作可能会“丢失”。多线程的未同步访问可能会产生各种不可预测的麻烦。


