    这里 IceCreamMan 的 serveIceCream 方法中第 49-53 行的同步块，以及 Child 的 eatIceCream 方法中第 55-66
    行的同步块，要求两个线程在同一个对象上进行同步。我们必须假设任何在 Child 类和 IceCreamMan 类上工作的程序员都会继续使用同步块。然而，存在一个风险，即
    Child 可能会移除他们的同步代码，这意味着他们可能在碟子被装满冰淇淋之前就把它拿回去。这实际上为我们提供了一种防止程序被更改的保护措施——我们可以向其他程序员解释，移除同步代码可能导致
    Child 线程拿到一个未完全装满（甚至可能是空的）的碟子。


    ■**提示** 每当编写的代码依赖于特定的实现方式时，你应该添加一个实现注释来向其他程序员解释细节。我们在前面代码清单中 Child 类的第 50-54 行的注释中展示了这一点。


    虽然向一个 Child 解释他们不应该在被告知盘子满了之前试图拿走盘子相对容易（因为他们不想错过更多的冰淇淋），但更难让他们同意不要一次性交出他们的碟子——从他们的角度来看，他们越早交出碟子，碟子就能越早被装满。他们并不特别关心对其他孩子的公平性，或者
    IceCreamMan 一次接收多个盘子的处理能力如何。


    为了防止这种情况，我们对 IceCreamMan 的 requestIceCream 方法进行了同步。通过同步该方法，我们可以确保一次只有一个 Child
    向 IceCreamMan 递交碟子。


    59 /**


    60 * 允许客户端对象添加碟子


    61 */


    62 public synchronized void requestIceCream(IceCreamDish dish) {


    63 dishes.add(dish);


    64 }


