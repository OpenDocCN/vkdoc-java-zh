    **J**ava 2 平台 Sun 认证开发者（SCJD）的作业为 Java 开发者提供了一个独特的机会，让他们无需任何特定的开发或运行时环境即可将 Java
    技能付诸实践。该作业还提供了一个极佳的学习环境，因为可以使用许多不同的 API，并且可以提供多种替代解决方案。本书介绍了通过 SCJD 作业所需了解的许多概念。


    许多开发者对作业的广度感到有些畏惧，因为它涵盖了从后端数据库、服务器应用程序、前端应用程序、API 文档到用户文档的所有内容。本书详细介绍了每个部分，帮助你在逐步构建示例项目的过程中，逐渐积累每个主题的知识。本书还将向你介绍
    JDK 5 的新特性，并在我们的示例项目中提供新 API 和特性的上下文用法。


    Sun 的作业特意没有指定要使用的操作系统平台或开发环境——所需要的只是一台能够运行当前版本 JDK 的计算机。在本书中，我们在 Windows 2000
    上使用了 JDK 5。由于本书介绍了 JDK 5 的特性，并在整个示例项目中使用了这些特性，因此你需要 JDK 5 来运行我们的示例应用程序；不过，示例应用程序并不依赖于
    Windows 2000。


    我们希望你喜欢这本书，并期待听到你通过考试的消息以及你对本书的任何评论。你可以通过 scjd@apress.com 联系两位作者。


