    ■**提示** 许多集成开发环境 (IDE) 具有以下部分功能：自动添加缺失的导入语句；自动删除未使用的导入语句；以及自动重构给定包中过多或过少的导入。虽然这些功能可以帮助你在实际工作中提高编码速度，但我们建议你在处理
    SCJD 作业时关闭这些功能。使用某些 IDE“功能”的一个问题是，如果出现问题，可能难以确定哪里出了错——如果你在 SCJD 作业中学会手动处理导入语句，你将来就更有可能处理任何问题。


