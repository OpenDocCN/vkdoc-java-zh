    When a client has the remote object stubs and class files locally, the task is
    much simpler and there are no special runtime considerations. However, if a client
    only has the remote interface, Java provides the capability to load the classes
    and stubs dynamically. Dynamic loading is the feature in RMI that allows for an
    object not available locally to be retrieved. Two important classes make dynamic
    loading possible: RMIClassLoader and SecurityManager.


    Besides these two important classes, you need to know the location of the classes
    to be loaded.


    This is referred to as a code base. Think of a code base as similar to a classpath,
