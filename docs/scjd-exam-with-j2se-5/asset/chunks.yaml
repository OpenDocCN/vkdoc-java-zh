- fmt: '# The `RMIClassLoader` Class and Security


    The `RMIClassLoader` class makes use of the codebase property. The `RMIClassLoader`
    class can load classes from either an applet or an RMI application. For our purposes,
    and the purposes of the certification exam, our discussion on security will be
    brief. We do not need to worry about security or policy files in our implementation,
    since our application does not use a security manager. Java 2 makes use of a security
    manager option due to compatibility with pre–Java 2 applications. However, in
    a professional RMI application, a security manager is a given. In addition, if
    your network application uses dynamic class loading, a security manager is required.


    ## Firewall Issues


    When the client and server are separated by a firewall, the RMI transport layer
    is forbidden from creating socket connections. In situations where a socket connection
    is prohibited, RMI makes use of a technique called HTTP tunneling. Tunneling is
    the process of wrapping RMI calls in an HTTP POST request, which firewalls typically
    allow.


    Tunneling is done automatically. When a socket connection is denied by the transport
    layer, a last-ditch effort is made to service the request via HTTP tunneling.


    > **Note** Java programs have permissions that are governed by policy files. The
    Java 2 security model requires that programs and the RMI registry have permission
    to create sockets. After all, RMI is based on sockets. The client also needs to
    specify a policy file on start-up. Here is how we would start the RMI registry
    to load a policy file other than the default: `rmiregistry -J-Djava.security.policy=ourSecurityFile.policy`.


    Port 80 is used as the default port unless one is specified in the server property
    `http.proxyHost`. However, HTTP tunneling comes with a number of costs. Performance
    is sacrificed and security can be compromised. Tunneling can be disabled by setting
    the server property `java.rmi.server.disableHttp` to `true`.


    ## Summary


    This chapter covered a great deal of information. First, we reviewed serialization.
    Any object that can potentially be sent across a network must be serialized prior
    to its trip across the wire. Both sockets (which will be discussed in the next
    chapter) and RMI require serialization. In RMI, both the return values and the
    method parameters must be serializable for the application to work.


    Finally, we explored RMI in depth and implemented an RMI solution for Denny''s
    DVDs. Considering the amount of effort that went into building the socket implementation,
    we were able to appreciate the amount of work RMI does under the hood. We did
    not have to worry about writing a multithreaded server, since RMI handles that
    aspect for us. We also did not have to worry about creating command and result
    objects in order to implement an application protocol.


    However, RMI did require us to define a remote interface and make sure that all
    of our method parameters were serializable. Additionally, we had to concern ourselves
    with registering our remote object with the RMI naming service and starting the
    RMI registry so that our object is accessible to a remote client. We hope you
    have learned enough about serialization, sockets, and RMI so that you can design
    and implement a complete networking solution for the SCJD exam. Using this project
    networking package as a guide, along with the chapter, you should be adequately
    prepared.


    ## FAQ


    **Q** Is RMI thread-safe?


    **A** No. The J2SE 1.4 RMI specification makes no guarantee regarding the number
    of threads that will have access to your remote object. For this reason, your
    design has to take into account issues of thread safety. See Chapter 4 for details
    on locking and thread safety. The approach we used in this chapter was to create
    an RMI factory ensuring a distinct instance of the `DvdDatabase` wrapper class
    and using that as our unique identifier for record locking.


    **Q** Which method is better, RMI or sockets?


    **A** Each approach has its strengths. Sockets are useful for sending large amounts
    of data (with or without a protocol) without a lot of overhead. With RMI it is
    much easier to implement a multithreaded server, since RMI handles the threading
    aspect for you. The remote object also behaves as if it is a local object complete
    with a protocol or set of public methods, whereas sockets require that you implement
    a protocol. It is really up to you, but both approaches should work fine as long
    as you understand the key technical issues pertaining to the protocol.


    **Q** Is a security manager, or some sort of authentication, required?


    **A** This depends largely on the details of your exam. Read the instructions
    very carefully! Each test is different. In this chapter, we briefly discussed
    a number of security issues such as policy files, dynamic class loading, HTTP
    tunneling, firewalls, and security managers. However, in our implementation, we
    do include a security manager and do not make use of policy files.


    **Q** Do I need to include the skeletons in my J2SE 5.0 implementation of RMI?


    **A** Yes. Skeletons are only required for those Java versions prior to 1.2 (i.e.,
    version 1.1). By default, skeletons are generated when `rmic` is run on your remote
    object implementations, but you can control this feature by using the `-keep v1.2`
    option of `rmic`. However, at the time of this writing, the certification project
    still requires that stubs be included with your submission and that you do not
    rely on the dynamic stub generation technique in the Tiger version (i.e., J2SE
    5.0).


    **Q** Am I required to start the RMI registry manually?


    **A** No. The registry must be started programmatically. Again, read the instructions
    on your exam. But most likely, you will be required to start the registry as we
    did in the `RegDVDDatabase` class. The class has a `register` method that binds
    the remote object implementation class in the RMI naming service and uses the
    `LocateRegistry.register` method. When running this across a network, as we will
    in Chapter 8, you should call the `getRemote` method in `Connector` from a `main`
    method.


    ---


    # Chapter 7: Networking with Sockets


    This chapter describes how to build the Denny''s DVDs networking layer by using
    sockets.


    Sockets are a software abstraction that allows applications to communicate with
    each other across a network. Any connection between two machines over IP (Internet
    Protocol) requires the use of sockets. Java provides programmers with the ability
    to connect application sockets, but as we will see in this chapter, much work
    needs to be done to ensure that clients and servers can communicate effectively
    using standard sockets. To alleviate some of that effort, Java also provides the
    Remote Method Invocation (RMI) framework, which is built on top of sockets. As
    you learned in the previous chapter, however, using RMI introduces its own problems.
    Either networking solution has its pros and cons, and it is up to you as a developer
    to determine which one you feel is better for a given situation. In this chapter,
    we will detail a simple sockets solution for our sample project, providing you
    with what you need to make an informed decision regarding which solution to use
    in your Sun assignment.


    Our major areas to cover include:


    - An overview of sockets

    - Why you would want to use sockets

    - The basic information required for connecting sockets

    - How to build a TCP socket client

    - How to build a TCP socket server

    - Serialized objects with sockets

    - Socket lifecycles


    ## Socket Overview'
