    C H A P T E R 4 ■ T H R E A D I N G


    **89**


    Locking Class Instances


    Java provides a mechanism for locking classes as well as objects. This can be
    a little confusing, but the concept is actually very straightforward. A class
    is just an object, used to create other objects, just as an axe is an object for
    creating firewood.


    The JVM generates a Class object when your program initially loads for every class
    the program uses. Per JVM, there is a single Class object for all of the instance
    objects of a given class. You have limited access to the Class object. Because
    the Class object is itself an object, you can lock it just as you can lock any
    other object. What makes the Class object interesting is its capability to contain
    static variables and static methods.


    Static variables are universal for every object of a class, which means that a
    single instance is shared by every object of that class. For example, for objects
    of the class McBurgerPlace, chiefExecutiveOfficer is a static member variable,
    because it is common to all. No matter which McBurgerPlace you are eating in,
    it shares the same chiefExecutiveOfficer with every other McBurgerPlace. If any
    McBurgerPlace restaurants were to change the chiefExecutive➥


    Officer, every other McBurgerPlace would instantly be able to sense that change.


    A static method is universal for every object of a class, which means that the
    single method is shared by every object of the class, per JVM. For example, objects
    of the class McBurgerPlace might have createFranchise as a static member method,
    assuming that creating a franchise happens at the corporate level. Any McBurgerPlace
    object can create a new franchise by calling corporate headquarters and asking
    to do so. No matter which McBurgerPlace store you are talking about, the exact
    same createFranchise method is called.


    Using static methods is different from using instance methods in one very important
    way: The method exists on the class, not the objects. The proof of this lies in
    the fact that you can create a franchise, even if there is no McBurgerPlace store
    present, by getting in touch with corporate headquarters directly.


    So what does all of this have to do with locking? Assume that you want to lock
    a given McBurgerPlace for exclusive use while executing a method. For example,
    if your McBurgerPlace (say the one on High Street) has a waxFloor method, then
    you don’t want to be doing anything else while waxing the floor—after all, lawsuits
    abound.


    How do you enforce this exclusivity? In the real world, you make sure that nothing
    else is happening in that particular store while waxing is in progress: no making
    burgers, no selling French fries, no preparing Joyful Meals. Almost every activity
    waits until you are done waxing the floor. To achieve the same exclusivity in
    Java, you synchronize the method in question by putting the keyword synchronized
    in the method declaration: public synchronized void waxFloor()


    This means that any other synchronized methods called on the McBurgerPlace on
    High Street will wait until the floor has been waxed.


    ■**Note** Unsynchronized methods do not respect synchronized methods. Thus, an
    unsynchronized method can be executed at any time. It is important to make sure
    that such methods can do no damage in your object’s state. For example, countMoney
    is probably safe to leave unsynchronized because it cannot interfere with the
    waxing of the floor. The method wipeDownTables should probably be synchronized,
    however, because it does interfere with the floor waxing.


    5165CH04.qxd 11/16/05 12:11 PM Page 90


    **90**


    C H A P T E R 4 ■ T H R E A D I N G


    This exclusivity has nothing to do with other objects of the McBurgerPlace class.
    For example, the McBurgerPlace on Fifth Street is free to make burgers, sell French
    fries, and so forth, even if the McBurgerPlace on High Street is currently waxing
    the floor. Why shouldn’t they?


    What about dealing with an activity that does affect other objects? For example,
    what about receiving the chiefExecutiveOfficer? Obviously, you only want a single
    McBurgerPlace to receive the chiefExecutiveOfficer at a given time: She can’t
    be in two places at once. How do you represent this exclusivity of access in Java?
    For that matter, how do you control access to her? You don’t want one store to
    interrupt her while she is in the middle of talking to another store.


    There are two steps in the solution to this dilemma. First, make sure that the
    chiefExecutiveOfficer variable is static—that is, it exists only at the class
    level. You can achieve this by using the keyword static when declaring the chiefExecutiveOfficer
    variable at the class level:


    private static Object ceo = new Object();


    The second step is to synchronize the static method that accesses the chiefExecutive➥


    Officer, like this:


    public static synchronized Object receiveCeo (){


    return ceo;


    }


    Because the method is static, this synchronization occurs at class level rather
    than at instance level.


    Locking Objects Directly


    There is a second way to lock objects (both instance objects and class objects).
    You can synchronize on the object you want to lock explicitly. For example, imagine
    that your McBurgerPlace class has a getSoda method that requires exclusive control
    of the sodaFountain member variable. You can lock the entire McBurgerPlace object,
    or you can lock just the sodaFountain member variable:


    public void getSodaEfficiently() {


    synchronized (sodaFountain) {


    //do Stuff


    }


    }


    Locking a member variable object is like forcing only those people who want to
    use the sodaFountain to wait while you are using the sodaFountain, as opposed
    to forcing everyone in the entire store (including those who only want to purchase
    a burger) to wait.


    Synchronizing a method is a form of locking an object—specifically, the this object.
    Synchronizing a method is really just shorthand for synchronizing on the this
    reference object.


    Thus, this code presented in Listing 4-2 is equivalent to the code presented in
    Listing 4-3.


