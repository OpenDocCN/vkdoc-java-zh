    ## UDP 概述


    `UDP` 会丢弃损坏的消息（数据报），因此无法保证通过 `UDP` 发送的消息能够到达最终目的地，就像无法保证通过邮政系统寄出的信件能够送达预期收件人一样。在
    Java API 中，主要使用的类是 `DatagramSocket` 和 `DatagramPacket`。一个*数据包*是以字节序列形式在网络中传输的信息。由于消息不保证送达且可能乱序接收，`UDP`
    套接字应用程序必须处理重新排序和数据丢失的问题。


    效率和灵活性是选择 `UDP` 套接字方法的主要原因。


    我们不使用 `UDP` 有几个原因。首先，效率并非首要考虑因素。其次，也是最重要的，考试不允许使用 `UDP` 方法。所以这使我们的决定相当明确。但如果我们要使用
    `UDP` 方法，那么客户端和服务器都将使用 `DatagramSocket` 类来发送和接收 `DatagramPacket` 对象。本章剩余部分和示例项目将使用
    `TCP` 套接字而非 `UDP` 套接字，因此我们对 `UDP` 的讨论到此结束。


    > **注意** 考试要求在这方面往往比较模糊。最可能的指示是：“你必须使用序列化对象通过简单套接字连接，或使用 `RMI`。” 对于什么是简单套接字以及这是否排除
    `UDP` 解决方案，并不十分明确。我们认为这意味着你应该使用 `java.net.Socket` 类，而不是 `java.net.DatagramSocket`
    类。虽然从技术上讲，为此任务创建 `UDP` 解决方案是可行的，但这样做需要大量工作来开发数据包处理代码，并且会违背 `UDP` 的标准预期用途（简单、短小（通常小于
    100 字节）的消息）。因此，我们建议，如果你使用套接字作为网络协议，请使用更简单的 `TCP` 方法。不过，话虽如此，你应始终参考你的具体考试说明。


    `UDP` 专为最小化消息传递应用而设计——例如用于监控网络应用的非常小的消息，如 `SNMP`（简单网络管理协议）——或用于非常简单的查询/响应，如 `DNS`（域名系统）查询。对于较大的消息，例如在我们的示例应用程序中响应数据库查询可能产生的大消息，最好使用
    `TCP`。下一节将描述如何使用 `TCP` 开发套接字解决方案。


    ## TCP 套接字


    `TCP` 代表传输控制协议——一种控制数据包传输的协议，确保消息被接收，并且数据包按照发送顺序被接收。为了满足这些保证，`TCP` 协议使用的网络流量略多于
    `UDP`（并且由于 `RMI` 比普通 `TCP` 套接字提供更多功能和保证，它使用的网络流量甚至比 `TCP` 更多）。然而，由于协议为我们提供了这些功能，我们无需在应用程序中验证数据包的接收顺序。这使得它成为
    Denny''s DVDs 的更好选择。


    `TCP` 套接字是一种利用 `TCP/IP` 连接作为底层传输协议的套接字连接。连接的每一端都由一个 `IP` 地址和一个端口号标识。`TCP` 套接字客户端发送请求，`TCP`
    套接字服务器监听请求。


    以下是 `TCP` 套接字通信涉及的基本步骤：


    1. 创建套接字类的实例。

    2. 使用套接字 `I/O` 流发送序列化消息。

    3. 关闭套接字连接。


    > **注意** 对于初始连接，有两个要求：一个发送初始连接请求的套接字客户端，以及一个监听传入连接请求的套接字服务器。但一旦连接建立，你就拥有了两个套接字之间的连接，任一方都可以发送或接收数据。由通信协议决定在任何给定时间哪个套接字发送数据，哪个套接字接收数据。我们将在本章后面的“应用程序协议”部分介绍应用程序协议。正如你可能想象的，如果客户端或服务器不遵循应用程序协议，点对点通信将会中断。


    ### TCP 套接字客户端


    `java.net.Socket` 类负责实现套接字到套接字的连接。该类的构造函数（实际尝试连接到目标机器）需要目标机器的主机名（作为 `URL` 字符串）和端口。表
    7-1 列出了 `java.net.Socket` 的各种公共构造函数。


    **表 7-1.** `java.net.Socket` 的公共构造函数


    | Socket 类构造函数 | 描述 |

    | --- | --- |

    | `public Socket()` | 创建一个未连接的套接字。 |

    | `public Socket(InetAddress address, int port)` | 最常用的。创建一个连接到指定地址和端口的套接字。 |

    | `public Socket(InetAddress address, int port, InetAddress localAddr, int localPort)`
    | 创建一个连接到远程地址和端口，并绑定到本地地址和端口的套接字。 |

    | `public Socket(String host, int port)` | 创建一个流套接字并将其连接到指定的主机和端口。 |

    | `public Socket(String host, int port, InetAddress localAddr, int localPort)`
    | 连接到远程主机和端口，并绑定到本地地址和端口。 |


    一旦建立套接字连接，你可以通过各种 `getter` 方法获取有关连接的信息。客户端套接字不绑定到服务器所在的端口号。相反，客户端套接字被分配一个用于与服务器通信的本地端口。


    ![Image 25](index-223_1.png)


    在 `SocketOptions` 接口中定义了许多常量。这些常量用作自定义客户端套接字的设置。我们不直接实现 `SocketOptions` 接口，但可以通过
    `Socket` 类中的 `getter` 和 `setter` 方法访问其常量。在接下来的部分中，我们将讨论一些更有用的选项。


    #### 使用 `SO_TIMEOUT`


    当通过输入流的 `read` 方法从套接字读取数据时，调用会根据此设置阻塞其他请求。`SO_TIMEOUT` 选项确定阻塞操作可以阻塞直到超时的毫秒数。如果操作在分配的时间内未完成，则会抛出
    `java.net.SocketTimeoutException`，如图 7-1 所示。如果未设置此选项或将其设置为 0，则调用会阻塞请求直到完成，并且不会超时。


    **图 7-1.** `SocketTimeoutException`


    用于设置和获取此选项的 `Socket` 方法如下：


    ```java

    public void setSoTimeout(int timeout) throws SocketException

    public int getSoTimeout() throws SocketException

    ```


    我们在 `DVDSocketServer.java` 中使用了此选项，尽管我们也可以轻松地在套接字客户端 `DVDSocketClient.java` 中使用它。以下行将在
    1 分钟（即 60000 毫秒）不活动后关闭套接字服务器：


    ```java

    serverSocket.setSoTimeout(60000);

    ```


    指定时间过后，会抛出 `java.net.SocketTimeoutException`。图 7.1 展示了发生异常时的 `DVDSocketServer`
    控制台。


