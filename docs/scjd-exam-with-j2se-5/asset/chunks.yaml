    \n所有繁重的工作都在我们的`ZipTextField`的模型中完成。对于`JTextField`（我们正在子类化），默认模型是`PlainDocument`。我们将子类化它以形成我们的`ZipDocument`，在其中我们将验证输入的文本。\n"
- fmt: "■**Note** `JTextField`, like many Swing components, uses the Model-View-Controller\
    \ design pattern internally. This gives us two potential areas where we can control\
    \ data entry—in the Model that contains the data entered, and in the Controller\
    \ before data is passed to the Model.\n\n```\nprivate class ZipDocument extends\
    \ PlainDocument {\n\n    public void insertString(int offs, String str, AttributeSet\
    \ a) throws BadLocationException {\n\n        if (str == null) {\n\n         \
    \   return;\n\n        }\n\n        for (char c : str.toCharArray()) {\n\n   \
    \         if (! ((Character.isDigit(c) && offs < 10 && offs != 5)\n\n        \
    \        || (b == '-' && offs == 5))) {\n\n                return;\n\n       \
    \     }\n\n        }\n\n        super.insertString(offs, str, a);\n\n    }\n\n\
    }\n```\n\nTo keep this example simple, we have only overriden the `insertString`\
    \ method, and only checked that the character being entered is valid in the location\
    \ it is being entered. If it is valid, we call the `insertString` method of the\
    \ super class to perform the work of actually inserting the string.\n\nBecause\
    \ we have chosen to keep this simple, we have not shown code for validating the\
    \ deletion of entered data for which we would have to override the `remove` method.\
    \ A more complete example is provided in the downloadable source code for this\
    \ book in the port number validation.\n\n■**Caution** Nothing shown so far prevents\
    \ the user from entering something like `12345-67` and then moving to the next\
    \ field or clicking elsewhere in the document. Therefore, some additional validation\
    \ is in order somewhere, an example of which is shown in the full code.\n\n##\
    \ The JButton Component\n\nThe `JButton` is a “click to do something” type of\
    \ button. What it does when the user clicks it is up to you. An example of a constructor\
    \ for this is:\n\n```\nJButton exitButton = new JButton(\"Exit\");\n```\n\nOther\
    \ constructors allow for an icon to be used instead of or as well as the text,\
    \ and setting an `Action` for the button.\n\nThe constructor on its own is not\
    \ very useful—we have not specified what should happen when the button is clicked.\
    \ For that, we need to add an `ActionListener`:\n\n```\nexitButton.addActionListener(anActionListener);\n\
    ```\n\nThe `ActionListener` interface allows you to listen for actions: button\
    \ clicked on, button clicked on while a modifier (the Ctrl, Alt, Shift, or Meta\
    \ key) was pressed, and so on. When such an action occurs, your `actionPerformed`\
    \ method will be called by the event dispatcher thread.\n\nThe `ActionListener`\
    \ can be an anonymous inner class, a private class, or an external class, or (since\
    \ `ActionListener` is an interface) your View can implement the `ActionListener`.\n\
    \nHere is an example of creating an anonymous inner class for your `ActionListener`:\n\
    \n```\nJButton exitButton = new JButton(\"Exit\");\n\nexitButton.addActionListener(new\
    \ ActionListener() {\n\n    public void actionPerformed(ActionEvent ae) {\n\n\
    \        System.out.println(\"Somebody clicked the Exit button\");\n\n       \
    \ System.exit(1);\n\n    }\n\n});\n```\n\n■**Note** The last line of the code\
    \ snippet above may look confusing, but if you count backwards, you will find\
    \ that the closing brace (`}`) matches the opening brace for the `new ActionListener()\
    \ {`, and the closing bracket (`)`) matches the opening bracket for the `addActionListener(`.\n\
    \nAs with all choices, there are good points and bad points for using an anonymous\
    \ inner class. Some of the good points are as follows:\n\n- There is no need to\
    \ create a separate class to handle user events.\n- There is no need to check\
    \ which component triggered the action event.\n- The code to handle the event\
    \ is right with the component that triggered the event.\n\nThe first point can\
    \ be worth consideration, but if you are using the MVC pattern, you might prefer\
    \ to have the Controller handle the user events. Alternatively, a simple anonymous\
    \ class can call a method in the Controller class, making the Controller class\
    \ less dependent on the GUI architecture."
