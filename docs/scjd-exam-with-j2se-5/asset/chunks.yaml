    更好的解决方案是让每个线程仅在其感兴趣的记录变为可用时才收到通知。


    在 JDK 1.4 下，这很难实现；你必须同步不同的对象，才能确保只有特定的线程收到通知。在 JDK 5 下，你可以让所有线程获取同一个对象的锁，但使用不同的
    `Condition` 来决定它们应该在哪个条件下被通知。

