    Using getters and setters (so named because the first verb of the method is either
    get or set) enables us to expose only the sections of the method we want to expose,
    and allow only certain operations on them. For example, we might decide that the
    number of copies of a DVD


    can never go below zero; if we allow clients to directly modify the field, then
    they can set it to any number they like, including negative numbers. But by having
    a setter for numbers of DVDs, we can include our business logic to ensure that
    the client cannot set a negative number.


