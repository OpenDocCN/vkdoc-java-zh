  trans: '

    ■**提示** 通常，用户界面会提供多种方式来完成同一任务。例如，一个应用程序可能允许用户通过菜单项、指定按键或屏幕按钮来保存文档。这被认为是良好的界面设计，用户会记住并使用最适合自己的方法。


    虽然 SCJD 作业并未明确将其列为要求，但开发者应遵循标准实践，你最好考虑添加常见功能，例如为按钮操作和菜单操作设置快捷键。


    ![图 26](img/index-250_1.png)


    5165CH08.qxd 11/16/05 12:16 PM 第 231 页


    第 8 章 ■ 图形用户界面


    **231**


    另一个需要考虑的简单原则是用户如何实际浏览和解读用户界面。在大多数西方社会中，用户通常从左上角开始分析界面。从该点开始，趋势是继续向下和向右移动。这是由于西方国家书面文字的特性所致：页面上的文字从左向右流动，因此大多数西方用户倾向于将屏幕左侧视为起点，右侧视为终点。这两点之间的任何内容都代表了从起点到终点的必要步骤。这一概念如图
    8-3 所示。


    **图 8-3.** *西方用户解读 GUI 时的视线路径*


    ■**提示** 即使你是在亚洲工作的亚洲开发者，就 Sun 公司的作业而言，你可能应该假设该作业是按照西方期望进行评估的。


    在规划界面的工作流程时，沿着这条路径按重要性排列项目对用户有利。我们希望用户首先注意到的元素，当然应该最靠近左上角。界面项目从起始角向下排列的顺序也暗示了操作的顺序。


    例如，考虑图 8-4。


    图 8-4 所示的路径表明，用户应对表格执行操作，然后在完成操作后点击“输入”按钮。如果将“输入”按钮放在表格之前，用户可能仍然能够理解并推断出操作顺序，但界面会显得不够直观，且组织性明显较差。


    对项目进行分组也暗示了相似的功能。这就是为什么在大多数文字处理程序中，诸如“打开”、“保存”和“新建文档”等文档存储按钮彼此紧邻的原因。


    ![图 27](img/index-251_1.png)


    5165CH08.qxd 11/16/05 12:16 PM 第 232 页


    **232**


    第 8 章 ■ 图形用户界面


    ■**提示** 如果你对如何设计对最终用户直观的操作有疑问，答案有时很容易找到：寻找另一个具有类似功能的流行程序。设计一个与用户可能习惯的其他应用程序界面相似的界面，是确保你的应用程序同样直观的有效方法。


    **图 8-4.** *一个应用路径*


    此外，将按钮放在文本字段旁边，暗示该按钮执行与文本字段相关的某种操作。这一原则指出了一种你应该谨慎避免的重大设计错误。因为用户会将分组的项目理解为功能上分组，所以将“退出”按钮直接放在“保存”按钮旁边是一个非常糟糕的主意。“退出”项目被视为破坏性操作，因为它会终止程序执行，而“保存”按钮是非破坏性且经常使用的操作。这种特定的界面设计错误可能导致用户在真正想要保存工作时退出程序。


    始终记住，普通用户容易出错。开发者必须假设用户会犯错，并且时不时会点错按钮。一个具有适当按钮分组和放置位置的优秀界面设计将最大限度地减少这种可能性。在许多实际应用程序中，用户界面甚至可能更进一步，利用`javax.swing.undo`包中提供的功能实现“撤销”机制。这种增强功能允许用户将应用程序状态恢复到之前的时间点，并消除可能因错误操作而产生的后果。尽管此功能很有用，但它远远超出了
    SCJD 考试的要求。


    在设计用户界面时要牢记的另一个考虑因素是，作为开发者，你可能对应用程序的运行环境有所假设，但这些假设绝不能被视为事实。例如，仅仅因为你的开发计算机连接了鼠标，并不意味着你可以假设运行你应用程序的每台计算机都有鼠标。这对于
    Java 应用程序尤其如此，因为它们旨在针对几乎所有现有平台。为了确保用户界面的功能性，屏幕上的每个功能小部件都应具有键盘助记符映射、等效的功能键，甚至热键。这样，如果你的应用程序在没有鼠标的平台上运行，最终用户仍然能够通过键盘导航应用程序。


    一个极好的最终界面原则是将项目放置在固定、可预测的位置。


    遵循这一原则有助于用户发展所谓的肌肉记忆。当用户对屏幕上某个项目的位置变得如此熟悉，以至于其大脑下意识地知道它位于何处时，这种现象就会发生。因此，使用界面变得不那么费神，更像是用户的本能。例如，想想你过去三年使用的网页浏览器。即使你多次更换浏览器，“后退”和“前进”按钮几乎总是位于同一位置。因此，用眼睛定位这些按钮并用鼠标点击它们对你来说变得更快，基本上是因为你总是知道它们在哪里。这就像骑自行车：你可能几年不骑，但永远不会忘记如何保持平衡。


    ■**注意** 用户会适应新的 UI 标准，因此直观的定义总是在变化。多年来，流行的新 UI 概念不断被引入。例如，当选项卡式面板这一隐喻被引入时，它立即受到开发者的欢迎，因为它提供了一种在单个窗口中显示多个数据面板的高效方法。由于其高效性，选项卡式面板过去是，现在仍然是开发者相当自由使用的工具。由于这种隐喻被频繁使用，用户已经习惯了使用它。其他一些已进入普通用户界面词汇的新
    UI 范式示例包括图标按钮栏和网页浏览器风格的“后退和前进”导航界面。


    在设计和开发应用程序界面时，对其进行测试总是一个好主意。然而，测试界面并不像测试应用程序代码那样简单明了。测试 GUI 的最佳方法是让一个从未见过或使用过该应用程序的人坐下来使用它。


    首先，创建一个界面原型。原型可以是所提议界面的一个简单的、非功能性版本。在这个阶段，甚至在纸上画出的界面草图就足够了。关键是，在确定其可用性价值之前，不要在原型上投入太多工作。

