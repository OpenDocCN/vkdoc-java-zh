    **256**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **Listing 8-10.** *The DVDTableModel’s Internal Members That Hold the Table Rows*
    private String [] headerNames = {"UPC", "Movie Title", "Director",


    "Lead Actor", "Supporting Actor", "Composer",


    "Copies in Stock"};


    private List<String[]> dvdRecords = new ArrayList<String[]>(5); Remember that
    Model objects act as data containers. The View object that transforms a Model
    into a display format does not require knowledge of how they internally represent
    data.


    On a very abstract level, tables encapsulate two things:


    • The names of the columns


    • The data contained in each row


    These two items require a TableModel to internally represent two types of collections:
    one that contains a list of header names and one that contains a list of row values.
    The only decision that remains is what type of collection is appropriate to represent
    these two types of data.'
