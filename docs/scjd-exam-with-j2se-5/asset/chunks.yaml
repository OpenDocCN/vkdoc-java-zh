- fmt: '# A *socket* is one of the endpoints in a communication link between two programs
    and is always bound to a port. A socket connection is useful for connecting to
    remote machines, and sending and receiving data. To create a socket connection,
    you will need the host address to which you want to connect and the port number.
    Sockets are not specific to Java. However, all versions of Java since JDK 1.0
    have provided facilities for creating sockets. As with RMI, the discussion is
    demarcated by client and server considerations.


    The server is a listening service that receives connection requests from socket
    clients.


    When a request is granted, the server establishes a socket-to-socket connection.
    The client will use the server’s hostname (or IP address) and port to request
    a connection. On the server side of the network, `java.net.ServerSocket` is the
    class that listens for connection requests from socket clients. The class `java.net.Socket`
    is one of the endpoints of a socket connection.


    Both the server and the client will have an instance of `java.net.Socket` per
    socket connection.


    ## Why Use Sockets


    Choosing between sockets and RMI is one of the biggest decisions you will have
    to make for the certification project. But each choice comes with its own advantages
    and trade-offs. If the JavaRanch web forum on the certification exam is any indication,
    it seems that most developers opt for the RMI solution. In fact, in the first
    edition of this book we recommended using RMI instead of sockets just because
    we believed at the time that the approach seemed more intuitive from a Java programmer’s
    perspective. However, since then we have backed off from this assertion. Either
    RMI or sockets will work fine and both are reasonably straightforward to implement.
    But for the adventurous at heart, let’s discuss some of the reasons you might
    opt for a socket solution.


    Socket servers are more scalable and faster than RMI servers. Acquiring a remote
    object handle requires a network call in the form of a Registry lookup. In addition,
    each remote object has a client-side proxy, or stubs, which effectively adds an
    object layer between the client and the actual remote object implementation class.
    This communication overhead is paid for in terms of performance.


    Typically one of the reasons mentioned for *not* using sockets is the implicit
    contract, or application protocol, that needs to be in place between the socket
    clients and the socket server. We discuss this in more detail later in this chapter
    in the section “The Application Protocol.” However, what if the protocol is very
    simple? In cases where the socket interface is simple, sockets are an excellent
    choice.


    One final reason worth considering a socket implementation involves threading.
    Each socket client request in our socket solution spawns a new thread, which we
    can use to maintain a lock on the `DvdDatabase`. This means we do not have to
    worry about implementing a factory as we did with RMI. The very nature of our
    socket solution avoids this potentially complicating issue. Of course, you now
    have to deal with the problem of developing a multithreaded socket server, but
    help is on the way! Denny’s DVDs is a multithreaded socket server, and we describe
    our server implementation later in this chapter.


    ## Socket Basics


    In this section, we will explore the types of sockets available to the Java programmer
    as well as some of the fundamental concepts related to socket development.


    ### Addresses


    An address is a unique number used to identify a device connected to a network,
    much like a postal address identifies the location of a building in a city. An
    IP address is a unique number, usually consisting of 12 digits or more, that is
    technically a 32-bit or 128-bit unsigned number used by the Internet protocol
    (i.e., IP) and for sending messages between socket addresses on TCP- or UDP-based
    networks. The `java.net.InetAddress` class is the Java class that encapsulates
    an IP address for use with Java sockets.


    > **Note** The 32-bit addressing scheme used by TCP/IP has been around since the
    1970s. With more and more devices requiring Internet addresses, it is estimated
    that all currently available addresses will be used somewhere between 2016 and
    2023 (however, previous estimates on Internet growth have been far below reality,
    so this figure is not to be relied on). To alleviate this problem, a new addressing
    scheme has been recommended and is slowly being implemented. The 32-bit addressing
    scheme is known as IPv4, and the new addressing scheme is known as IPv6. Java
    supports both schemes with the `Inet4Address` class and `Inet6Address` classes,
    respectively. In this chapter we will be using IPv4 as this is the most common
    addressing scheme currently in use.


    ### TCP and UDP Sockets Overview


    Over the years programming has evolved from manually setting binary instructions
    (1GL or first-generation languages), through assembly language (2GL), human-readable
    languages (Java, C++), and specification languages like SQL (4GL). The later languages
    do not eliminate the need for the lower-level languages—they just do the hard
    work of translating the programmer’s code into lower-level code. For example,
    when programming in Java your code will be translated into bytecode by the Java
    compiler (corresponding roughly to the output from an assembly language program),
    which is later translated into the binary instructions for the computer by the
    JVM. While you can still find work as a machine language programmer, many programmers
    find that such work is slow and error prone—working in a higher-level language
    such as Java can greatly improve productivity and quality of work.


    Similarly, network protocols have evolved over the years, so that we no longer
    need to worry ourselves with the lowest-level network details. When you are programming
    your Java program, you typically do not care how to physically send signals over
    a piece of wire (or other medium), nor do you care whether your computers are
    communicating over an Ethernet or a Token Ring network; all you care about is
    how to make the connection. Finally, in order to use sockets, we will be using
    IP rather than one of the other network layers (X.25, ICMP, IPX). But even having
    chosen to use sockets, leaving all the low-level communication to the IP layer
    and layers beneath it, we still have a choice between TCP and UDP sockets.


    #### UDP Sockets


    User Datagram Protocol (UDP) enables machines on a network to send datagram packets
    to each other. UDP sockets work in much the same way as the U.S. postal system.
    Messages, or letters, are sent to a particular address and an immediate response
    by the server, or addressee, endpoint is not necessary. UDP sockets do not require
    a two-way connection. Similarly, the postal system does not require that the recipient
    be present when a letter is delivered.


    Let’s consider the mail analogy a little more. A letter is dropped off at a mailbox
    and delivered to the stated address. The mail carrier then places the letter in
    the destination mailbox.


    The mail system does not require that someone be there to accept the letter (of
    course, I realize that sometimes packages require signatures, but for the sake
    of convenience let’s ignore those kinds of packages for now). Once the individual
    to whom the letter is addressed returns home, he or she can then collect the mail.'
