    请注意，Child 线程在 while 循环（而非 if 语句）中检查 dish.readyToEat 变量的条件。这样做的原因是，当 JVM 在调用 wait
    方法后将控制权返回给应用程序时，存在一个小问题。Sun 关于 wait 方法的 Javadoc 注释部分指出：“*线程也可能在没有收到通知、中断或超时的情况下被唤醒，即所谓的伪唤醒。虽然这种情况在实践中很少发生，*
    *但应用程序必须通过测试本应导致线程被唤醒的条件来防范它，并在条件不满足时继续等待。换句话说，* *wait 应始终在循环中进行。* ”


