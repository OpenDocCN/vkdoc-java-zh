    \n然而，静态导入允许我们引用静态对象 `FINE`，就好像它是在我们自己的类中定义的一样：\n\n```java\nimport static java.util.logging.Level.*;\n\
    // ...\nmyLogger.log(FINE, \"This message is at FINE level\");\n```\n\n需要注意的是，引入这个“特性”是为了解决一种不良的编程实践。当你原本想声明常量的本地副本，或者想滥用前面提到的继承机制时，可能会用到它。但总的来说，我们建议尽可能避免使用它，而使用限定的常量。\n\
    \n**Javadoc**\n\nJavadoc 是一个非常简单但功能强大的工具，它帮助程序员为其他程序员提供 API 文档。\n\n默认的 Javadoc\
    \ 工具非常简单。它会解析你的源代码，查找特殊的注释。然后基于这些注释生成 HTML 文档。为了更容易理解，让我们从一些 Javadoc 注释示例开始，并进行描述：\n\
    \n```java\n/**\n * 此应用程序的 <b>主要</b> 入口点。\n * 实例化此类的一个实例并运行它。\n *\n * @param args\
    \ 包含命令行参数的数组。\n * @throws IOException 如果无法创建文件\n */\npublic static void main(String[]\
    \ args) throws IOException {\n    // ...\n```\n\nJavadoc 注释以特殊的注释开始指示符 `/**` 开头，一直持续到注释结束指示符\
    \ `*/`。标签由 at 符号（`@`）标识。从注释开始指示符到第一个标签之间的所有文本都会直接包含在生成的输出中。\n\nJavadoc 会忽略未知标签，以及从*任何标签*之后到下一个已知标签或文档注释结束之间的纯文本——正是这种神奇机制使得\
    \ XDoclet 能够工作。\n\n上面的 Javadoc 代码生成以下 HTML：\n\n```html\n<A NAME=\"main(java.lang.String[])\"\
    ><!-- --></A><H3> main</H3>\n<PRE>\npublic static void <B>main</B>(java.lang.String[]&nbsp;args)\
    \ throws java.io.IOException</PRE>\n<DL>\n<DD>The <b>main</b> starting point for\
    \ this application.\nInstantiates an instance of this class, and runs it.\n<P>\n\
    <DD><DL>\n<DT><B>Parameters:</B><DD><CODE>args</CODE> - an array containing the\
    \ command line arguments.\n<DT><B>Throws:</B>\n<DD><CODE>java.io.IOException</CODE>\
    \ - if files cannot be created</DL>\n</DD>\n</DL>\n```\n\n![Image 4](img/index-55_1.png)\n\
    \n在 Microsoft Internet Explorer 中查看时，它将类似于图 2-1 所示。\n\n**图 2-1.** *Javadoc 输出示例*\n\
    \n■**注意** Javadoc 比许多程序员意识到的更强大。它是作为一个可扩展工具开发的，其行为方式取决于插入的模块。默认情况下，它会解析 Java 源代码，生成\
    \ API 文档。但是，如果你将插件更改为 XDoclet（http://xdoclet.sourceforge.net/），例如，Javadoc 引擎可以根据你编写的代码中的注释生成额外的源代码（在构建\
    \ J2EE 应用程序时非常有用——你可以让 XDoclet 为你创建接口和部署描述符）。或者，你可以插入 DocCheck（http://java.sun.com/j2se/javadoc/doccheck），并获得一份关于你遵守\
    \ Sun 的 Javadoc 约定情况的报告。\n\n**编码约定**\n\nSun 发布了一篇题为“如何为 Javadoc 工具编写文档注释”的文章，可在线访问\
    \ http://java.sun.com/j2se/javadoc/writingdoccomments/index.html。\n\n以下是该文章涵盖主题的快速概述。\n\
    \n**编写内容**\n\n你的类和方法名称应该具有合理的自文档性，因此编写仅仅重述类或方法名称的 Javadoc 注释是没有意义的。你的 Javadoc\
    \ 注释应提供有助于类的用户的信息，和/或提供第三方从头开始（不查看你的源代码）重新实现你的类所需的信息。\n\n例如，如果你正在创建一个提供到服务器的网络连接的类，你可能会将类命名为\
    \ `NetworkConnection`。编写一个说明该类提供“网络连接”的 Javadoc 注释是没有意义的——用户已经知道这一点。\n\n相反，你可以考虑指定该类提供“通过网络到数据库服务器的连接，通过该连接可以使用数据库函数的远程访问。”\n\
    \n■**警告** 你不应在 Javadoc 注释中编写任何实现细节。\n\n**放置 Javadoc 注释的位置**\n\n理论上，Javadoc 注释可以放在源代码的任何位置。但是，Javadoc\
    \ 应用程序只会包含特定位置的注释：\n\n*   类注释应紧跟在类声明之前（Javadoc 目前允许注释出现在类声明之前的任何位置，甚至在包声明之前，但不应依赖此行为）。\n\
    *   类和实例变量注释应紧跟在它们所属的类或实例变量之前。\n*   方法注释应紧跟在方法签名之前。\n"
- fmt: '# The Javadoc Tool


    The Javadoc tool will ignore Javadoc comments in any other locations entirely.
    If you want to put a comment inside a method, for example, there’s no point in
    making it a Javadoc comment, as it won’t appear in any generated API. Just use
    an implementation comment.


    ## Formatting Codes and Special Tags


    Javadoc comments can contain any HTML markup tags. Commonly used tags are shown
    in Table 2-4.


    **Table 2-4.** *Commonly Used HTML Tags*


    | **Tag** | **End Tag** | **Description** |

    | --- | --- | --- |

    | `<code>` | `</code>` | Text between these two tags will appear in monospaced
    font in the HTML output. This is usually designed for short words or phrases.
    |

    | `<pre>` | `</pre>` | Text between these two tags will appear in monospaced font
    in the HTML output, maintaining your indentation. This is usually used for example
    code. |

    | `<ul>` | `</ul>` | Denotes the start and end of an unordered list (not numbered).
    |

    | `<ol>` | `</ol>` | Denotes the start and end of an ordered list (numbered).
    |

    | `<li>` | | Denotes the start of a list item within either an unordered or an
    ordered list. |

    | `<p>` | | Denotes the start of a new paragraph. |


    > **Note:** Javadoc produces output conforming to HTML standard 3.2, which does
    not require closing tags for certain elements (e.g., there is no requirement for
    the `<li>` tag to be closed with a `</li>` tag, nor for the `<p>` tag to be closed
    with a `</p>` tag); however, you may use them if you wish. In addition, the HTML
    3.2 standard does not specify whether tags should appear in upper- or lowercase.
    Throughout this book we will use HTML 3.2 tags, but we will format them according
    to the later HTML 4.0 and XHTML formats (we will use closing tags, and we will
    put the tags in lowercase). You may also use tags and HTML constructs that were
    only created in HTML version 4 or later if you wish (Javadoc will handle them
    without problems). However, if you do so, you may find that some older browsers
    may not be able to display your generated documentation.


    There are many more HTML codes you may use in your Javadoc comments. You generally
    don’t need many of them, though, as you are generating API documentation for other
    programmers to read.


    > **Tip:** You should use the `<code>` tag for Java keywords, package names, class
    and interface names, method names, field names, and argument names to make them
    appear in monospaced font when the browser supports it.


    In addition to the HTML tags, Javadoc recognizes special *Javadoc tags*—and they
    will be handled in special ways. The Javadoc tags for classes and interfaces are
    shown in Table 2-5.


    The tags are listed in the order they should appear in your Javadoc comment.


    **Table 2-5.** *Class and Interface Tags*


    | **Tag** | **Description** |

    | --- | --- |

    | `@author` | The name of the person who wrote the class or interface. |

    | `@version` | The current version of the class or interface. You might choose
    to have your revision control software set this automatically as you check your
    code out of source control. |

    | `@see` | Generates a link to the specified class or method—the link will appear
    in a special "See Also" section of the generated Javadoc. Refer to the comments
    below regarding the `@see` and `@link` tags for special instructions. |

    | `@since` | Used to indicate the version number of your release in which this
    class first appeared. |

    | `@deprecated` | Used to indicate that a class should no longer be used but still
    exists for compatibility reasons. The tag should be followed by text indicating
    what class the user should use instead of this class, or "No replacement" if there
    is no class with replacement functionality. |

    | `@serial` | Used to specify whether a class or field that would normally be
    serializable should be documented as being Serializable. |

    | `{@link reference label}` | Generates an inline link to the specified class
    or method. |'
