    Design Choices'
  trans: '

    启动任何项目时，都应考虑项目可能包含的逻辑模块或功能，并将与这些功能相关的类放入各自的包中。以我们的项目为例，将有一组类提供图形用户界面，另一组类提供网络功能，还有一组类提供数据访问功能。因此，我们可以从以下潜在的包开始：`gui`、`network`、`database`。


    经过进一步研究，我们可能会决定添加更多包和/或重构现有包——第 3 章将讨论如何分析示例项目。例如，我们可能决定将 `network` 包细分为两个独立的包：一个用于
    RMI 网络，另一个用于 Socket 网络。因此，我们将拥有包 `network.rmi` 和 `network.sockets`。


    包名应进行限定，以确保每个类都能被唯一标识。也就是说，当你尝试实例化 `StartGui` 类时，你希望实例化的是*你的*同名类，而不是我的。为此，你需要为你的域名创建包，域名需小写并倒序书写。因此，如果你在一家域名为
    `example.com` 的公司工作，那么你的包名应以倒序的相同名称开头（`com.example`）。这样，我们完整的限定包名就变成了 `com.example.network.sockets`。


    在 Microsoft Windows 和基于 Unix 的系统中，每个包应位于一个独立的目录中。因此，对于前面提到的 `com.example.network.sockets`
    包，我们需要为第一个包 `com` 创建一个目录，该目录下包含 `example` 包的目录，`example` 目录下又包含 `network` 包的目录，最后
    `network` 目录下包含 `sockets` 包的目录。这个最终的目录将包含该包中的所有 Java 类文件。


    ■**注意** 许多操作系统会区分文件和目录的大小写。因此，名为 `numberOfBoxes` 的文件与名为 `NumberOfBoxes` 的文件是不同的。由于
    Java 必须向底层操作系统请求文件，并且无法合理地遍历所有大小写组合，Sun 公司规定，你的文件和目录的大小写必须与你的类和包的大小写匹配。


    Sun 的 Java 工具都以相同的方式设计用于处理包，因此你可以确信，如果 Java 编译器能够找到并编译你的类，那么 Java 运行时和 Java 文档生成器也能够处理你的类。


    JAR 文件也可以充当包结构。在切换到类路径根文件夹后，运行命令：


    ```

    C:\devProj\classes\> jar cf db.jar sampleproject.db

    ```


    将生成一个名为 `db.jar` 的压缩文件，其中包含 `sampleproject.db` 包树。


    因此，这个文件现在可以像指定目录一样被添加到类路径中，编译器或 Java 虚拟机（JVM）将扫描该文件以查找引用的包。


    需要注意的是 Java 工具在处理共享包定义时的行为。例如，可能会出现这样一种情况：计算机文件系统中存在两个目录，它们包含同一个包定义的不同部分。


    第一个包的类存储在 `c:\devProj\classes` 中，第二组文件存储在项目目录结构之外的 `c:\tempClasses` 中。在第一个目录中，存储了包
    `sampleproject.db`，而 `sampleproject.testclient` 存储在第二个目录中（这意味着文件将分别存储在目录 `c:\dev\Proj\classes\sampleproject\db\`
    和 `c:\dev\Proj\classes\sampleproject\testclient\` 中）。


    接下来，使用 JAR 工具将这两个目录分别压缩成独立的 JAR 文件，如下所示：


    ```

    C:\devProj\classes\> jar cf db.jar sampleproject.db

    C:\devProj\classes\> jar cf testclient.jar sampleproject.testclient

    ```


    最后，在编译 Java 应用程序时，在类路径中指定这两个 JAR 文件，如下所示：


    ```

    C:\devProj\tmp\> javac -cp c:\devProj\classes\db.jar;c:\tempClasses\testclient.jar
    MyClass.java

    ```


    此时的问题是，类路径会发生什么？第一个 JAR 文件会覆盖第二个文件的包路径吗？答案是否定的。具有相同包树的包可以存储在独立的 JAR 文件或独立的目录中，在这种情况下，Java
    编译器会在运行时合并这两个文件的内容。


    ■**警告** 如果两个 JAR 文件中存在同名且位于同一包命名空间中的类，则首先找到的类（基于类路径顺序）将被使用——第二个类将被忽略。


    将包定义存储在不同位置的能力允许构建高度模块化的结构。因此，在规划应用程序的包结构时，你应该考虑某些理想原则。首先也是最重要的，包应由所有功能相似或在设计上相互依赖的类组成。这使得包能够作为完整的功能单元运行。因此，一个
    JAR 文件理论上可以包含一个完整的、可“插入”项目的功能包。


    ■**注意** 本书后面介绍的示例项目使用包结构来隔离不同的网络实现。这种结构使得示例应用的整个网络层可以被更改，而不会影响应用的其他包。


    每个包根节点中的类应该是该树功能的构建块，因此它们应该是树中最稳定的部分。较低级别的包指定了所有其他类所依赖的稳定类，包定义应遵循这一原则进行规划。


    如果无法在包的根节点中仅放置稳定、不变的类，则这些类应被接口取代，而这些接口的可变实现应移至包定义的更高级别，或完全移入另一个不同的包中。


    确保包内的依赖关系被限制在单个包内部也非常重要。本质上，包应该是可以独立编译的自治单元。在大多数情况下，如果一个包中的类必须被编译才能使另一个包编译，那么应该重新设计包结构，以便所有类依赖关系都落在单个包内。一个恰当的包设计还将确保应用程序建立在尽可能稳定的基础之上。


    总之，包是一种将项目各部分划分为功能块的机制。因此，一个有效的包设计允许项目的某些部分被移除和替换，而不会影响代码的其他部分。


    **最佳实践**


    在你的编程生涯中，你可能已经注意到一些你（或他人）遵循的做法，这些做法虽然不属于上述类别，但却能使最终解决方案的整体交付变得更加容易。虽然这些做法并非必需，但你应该考虑在你的作业中使用它们。


    **边工作边编写文档**


    提到这一点似乎有些奇怪，但你确实必须在完成作业的同时编写文档，最好是在编写代码之前，或者在编写代码的同时进行。


    作为本次作业的一部分，你必须提供三种主要形式的文档：


    *   设计选择

    *   Javadoc

    *   用户文档


    设计选择

