    RMIClassLoader 类利用了代码库属性。它可以从小程序或 RMI 应用程序中加载类。就我们的目的以及认证考试而言，关于安全性的讨论将简要带过。在我们的实现中，无需担心安全或策略文件，因为我们的应用程序没有使用安全管理器。由于需要与
    Java 2 之前的应用程序兼容，Java 2 使用了安全管理器选项。然而，在专业的 RMI 应用程序中，安全管理器是标配。此外，如果你的网络应用程序使用动态类加载，则必须使用安全管理器。


    防火墙问题


    当客户端和服务器被防火墙隔开时，RMI 传输层会被禁止创建套接字连接。在禁止套接字连接的情况下，RMI 会使用一种称为 HTTP 隧道（HTTP tunneling）的技术。隧道技术是将
    RMI 调用封装在 HTTP POST 请求中的过程，防火墙通常允许这种请求。


    隧道技术是自动完成的。当传输层拒绝套接字连接时，会通过 HTTP 隧道技术作为最后的手段来尝试处理请求。


    5165CH06.qxd 11/16/05 12:14 PM 第 196 页


    **196**


    第 6 章 ■ 使用 RMI 进行网络通信


    ■**注意** Java 程序的权限由策略文件控制。Java 2 安全模型要求程序和 RMI 注册表拥有创建套接字的权限。毕竟，RMI 是基于套接字的。客户端在启动时也需要指定一个策略文件。以下是我们启动
    RMI 注册表以加载非默认策略文件的方法：rmiregistry -J-Djava.security.policy=ourSecurityFile.policy。


    除非在服务器属性 `http.proxyHost` 中指定了其他端口，否则默认使用端口 80。然而，HTTP 隧道技术会带来许多代价。性能会下降，安全性也可能受到损害。可以通过将服务器属性
    `java.rmi.server.disableHttp` 设置为 `true` 来禁用隧道技术。


    **总结**


    本章涵盖了大量的信息。首先，我们回顾了序列化。任何可能通过网络发送的对象在传输之前都必须被序列化。套接字（将在下一章讨论）和 RMI 都需要序列化。在 RMI
    中，返回值和方法参数都必须可序列化，应用程序才能正常工作。


    最后，我们深入探讨了 RMI，并为 Denny''s DVDs 实现了一个 RMI 解决方案。考虑到构建套接字实现所需的工作量，我们能够体会到 RMI 在底层做了多少工作。我们无需担心编写多线程服务器，因为
    RMI 为我们处理了这方面的问题。我们也无需为了实现应用程序协议而创建命令和结果对象。


    然而，RMI 确实要求我们定义一个远程接口，并确保所有方法参数都是可序列化的。此外，我们还需要将远程对象注册到 RMI 命名服务，并启动 RMI 注册表，以便远程客户端能够访问我们的对象。我们希望你已经对序列化、套接字和
    RMI 有了足够的了解，从而能够为 SCJD 考试设计和实现一个完整的网络解决方案。以本项目网络包作为指南，结合本章内容，你应该已经做好了充分的准备。


    **常见问题解答**


    **问** RMI 是线程安全的吗？


    **答** 不是。J2SE 1.4 RMI 规范不保证访问远程对象的线程数量。因此，你的设计必须考虑线程安全问题。关于锁定和线程安全的详细信息，请参见第 4
    章。我们在本章中使用的方法是创建一个 RMI 工厂，确保 `DvdDatabase` 包装类有一个唯一的实例，并将其用作记录锁定的唯一标识符。


