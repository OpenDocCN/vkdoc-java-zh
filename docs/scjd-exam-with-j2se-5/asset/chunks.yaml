- fmt: '# Atomic Operations in Java


    Atomic operations are indivisible. A thread will not be swapped out while in the
    middle of an atomic operation. In practical terms, the only naturally occurring
    atomic operations in Java are assignments. For example:


    ```

    x = 45;

    ```


    is an atomic operation when `x` is an `int`. The only exceptions to this rule
    are assignments involving `double`s and `long`s. Those are not atomic.


    Operations involving `long`s and `double`s are essentially two operations, because
    `long`s and `double`s are so big. The first part of the operation sets the high
    32 bits, and the next part sets the low 32 bits. This means that mid-assignment
    to a `long` or `double` variable, your thread could be sliced out.


    Your thread consists of a number of programmatic statements. These in turn consist
    of atomic statements. Your thread of execution could be swapped out anywhere,
    except while Java is in the middle of an atomic statement. For example:


    ```

    1 x = 7;

    2 y = x++;

    ```


    is really:


    ```

    1 x = 7;

    2a int temp = x + 1;

    2b x = temp;

    2c y = x;

    ```


    Assume `x`, `y`, and `z` are class member variables. A thread swap between lines
    `2a` and `2b` could lead to unexpected results, for example, if the thread that
    has swapped in changes the value of `x` to, say, `13`. You could end up with the
    bizarre result of `y` being `13` (and a headache).


    Of course, this problem would not exist if `x`, `y`, and `z` were local method
    variables, because then no other method could have access to them.


    By wrapping your method in a `synchronized` block, you are effectively treating
    the entire method as a single atomic operation, as far as other threads'' clients
    of that object are concerned. Even if another thread swaps in before your method
    is done executing, as long as the thread calls methods on your object that are
    `synchronized`, you are guaranteed that corruptions such as the previous one will
    not occur, because those methods will not execute until your method returns.


    The example in Listing 4-11 shows a contrived example of 10 threads yielding at
    an inopportune time, causing invalid results.


    **Listing 4-11.** *Nonatomic Operation Example*


    ```

    1 public class NonAtomic {

    2     static int x;

    3

    4     public static void main(String[] args) {

    5         for (int i = 0; i < 10; i++) {

    6             new Runner().start();

    7         }

    8     }

    9

    10     static class Runner extends Thread {

    11         private int validCounts = 0;

    12         private int invalidCounts = 0;

    13

    14         public void run() {

    15             for (int i = 0; i < 10; i++) {

    16                 // synchronized (NonAtomic.class) {

    17                 int reference = (int) (Math.random() * 100);

    18                 x = reference;

    19

    20                 // either yielding or doing something intensive

    21                 // should cause the problem to manifest.

    22                 yield();

    23                 // for (int y = 0; y < 20000; y++) {

    24                 //     Math.tan(200);

    25                 // }

    26

    27                 if (x == reference) {

    28                     validCounts++;

    29                 } else {

    30                     invalidCounts++;

    31                 }

    32             }

    33             // }

    34

    35             System.out.println(getName()

    36                 + " valid: " + validCounts

    37                 + " invalid: " + invalidCounts);

    38         }

    39     }

    40 }

    ```


    When you run this program, you will see that in the majority of cases, another
    thread has changed the value of `x` between when it is set (in line `18`) and
    when it is checked (in line `28`).


    An example of this is provided in Figure 4-10.


    ![Image 13](index-125_1.png)


    **Figure 4-10.** *Output from the nonatomic example*


    In calling `yield()` we caused this problem to be more obvious than would normally
    be the case; however, it is not the call to `yield()` that is the problem—it is
    the coding itself. You can prove this by commenting out the call to `yield()`
    in line `22`, and uncommenting the `for` loop in lines `23–25`. If you change
    the program in this way, and rerun the program, you will see that there are still
    often errors caused by the nonatomic nature of the code, even though there is
    no explicit yielding. You will also notice that changing the program in this way
    will cause it to take significantly longer to run, and if you watch your computer''s
    CPU usage, you should find that these loops require a lot of computational effort.'
