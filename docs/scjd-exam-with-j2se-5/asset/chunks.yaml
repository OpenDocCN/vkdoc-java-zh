    \ PM 第 248 页\n\n**248**\n\n第 8 章 ■ 图形用户界面\n\n■**警告** 到目前为止所展示的内容，并不能阻止用户输入类似 `12345-67`\
    \ 这样的内容，然后移动到下一个字段或点击文档中的其他位置。因此，需要在某处进行一些额外的验证，完整代码中给出了一个示例。\n\n**JButton 组件**\n\
    \n`JButton` 是一种“点击执行操作”类型的按钮。用户点击它时具体执行什么操作，由你来决定。该组件的一个构造器示例如下：\n\n```java\n\
    JButton exitButton = new JButton(\"Exit\");\n```\n\n其他构造器允许使用图标来代替文本，或与文本一起使用，并且可以为按钮设置一个\
    \ `Action`。\n\n仅靠构造器本身作用不大——我们还没有指定点击按钮时应该发生什么。为此，我们需要添加一个 `ActionListener`：\n\
    \n```java\nexitButton.addActionListener(anActionListener);\n```\n\n`ActionListener`\
    \ 接口允许你监听各种动作：按钮被点击、按钮在按下修饰键（Ctrl、Alt、Shift 或 Meta 键）时被点击，等等。当此类动作发生时，事件分发线程将调用你的\
    \ `actionPerformed` 方法。\n\n`ActionListener` 可以是一个匿名内部类、一个私有类、一个外部类，或者（由于 `ActionListener`\
    \ 是一个接口）你的视图（View）可以实现该接口。\n\n以下是为你的 `ActionListener` 创建匿名内部类的示例：\n\n```java\n\
    JButton exitButton = new JButton(\"Exit\");\n\nexitButton.addActionListener(new\
    \ ActionListener() {\n\n    public void actionPerformed(ActionEvent ae) {\n\n\
    \        System.out.println(\"有人点击了退出按钮\"); System.exit(1);\n\n    }\n\n});\n\
    ```\n\n■**注意** 上面代码片段的最后一行可能看起来令人困惑，但如果你往回数，会发现闭合花括号 (`}`) 与 `new ActionListener()\
    \ {` 的起始花括号匹配，而闭合括号 (`))` 与 `addActionListener(` 的起始括号匹配。\n\n与所有选择一样，使用匿名内部类既有优点也有缺点。一些优点如下：\n\
    \n*   无需创建单独的类来处理用户事件。\n*   无需检查是哪个组件触发了动作事件。\n*   处理事件的代码与触发事件的组件位于同一位置。\n\n\
    5165CH08.qxd 11/16/05 12:16 PM 第 249 页\n\n第 8 章 ■ 图形用户界面\n\n**249**\n\n第一点值得考虑，但如果你正在使用\
