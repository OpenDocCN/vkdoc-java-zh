    **The BorderFactory**


    So far all the components demonstrated have appeared to the end user to be in
    the same-JFrame—there is nothing to logically separate one component (or set of
    components) from another.


    However, there are times when it makes sense to logically group components together
    by drawing a border around them. One of the most common uses of borders is to
    create a perceived link around several radio buttons or check boxes. We did not
    put a border around our radio buttons in the previous section because we want
    to emphasize that the border only creates a **user perception** that the buttons
    are logically linked—it is possible to have a border drawn around buttons that
    are not logically linked, and just creating a border around buttons does not logically
    link them.


    Unlike with most Swing components, we do not create a border directly. Instead
    we call one of the static methods of the BorderFactory class to create a border
    for us, which we can then use in a JPanel or JFrame.


