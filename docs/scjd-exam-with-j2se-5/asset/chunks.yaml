    ■**注意** 永远不要忘记，你将把源代码提交给一位未知的评估者进行审查。你确实需要编写代码，使其成为他们乐于评估的作品。这一点同样适用于你的实际工作——你应当始终编写让同事乐于使用的代码。


    缩进


    Sun 编码规范包含以下缩进要求："缩进单位应为四个空格。缩进的具体构成（空格与制表符）未作规定。制表符必须严格设置为每 8 个空格（而非 4 个）"（Sun
    编码规范，http://java.sun.com/docs/codeconv/html/CodeConventions.doc3.html，1999 年）。


    初次阅读时，这段描述似乎会引起很多困惑，因此有必要举一个例子：


    1 public class IndentationExample {

    2 /* 此行缩进一次 */

    3 public IndentationExample() {

    4 /* 此行缩进两次 */

    5 }

    6 }


    第 2、3 和 5 行各缩进一次，因此应在它们前面加上四个空格。


    第 4 行缩进两次，因此*应该*在其前面加上八个空格。然而，八个空格也等同于一个制表符，所以第 4 行你*可以*使用制表符代替八个空格。


    为避免混淆，我们建议你使用八个空格而非制表符。


