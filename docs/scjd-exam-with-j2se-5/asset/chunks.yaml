    第 1 章 ■ 引言


    **谁应该阅读本书**


    本书面向需要了解 J2SE 5 入门知识，并着眼于学习通过 Sun 认证 Java 开发人员考试所需材料的在职 Java 专业人员。SCJD 考试让程序员一窥他们在实际作业中可能遇到的情况，你必须为这一挑战做好准备。已经通过或能够通过
    Sun 认证 Java 程序员（SCJP）考试的开发者会对此书感到得心应手。经验不足六个月的开发者，或许应该用 Apress 或其他出版社出版的一些优秀 Java
    书籍来补充本书。


    本书详细描述了 JDK 的许多特性，其中一些已成为标准 Java 的一部分多年，另一些则仅在 JDK 5 中引入。我们在本书中唯一假设的是，读者对 Java
    足够熟悉，能够通过 SCJP 考试——因此我们无需花时间解释语言的基础知识（例如，int 和 long 之间的区别）。然而，我们确实深入探讨了语言的变更，因此尚未学习
    JDK 5 语言增强功能的考生可以在此发现它们。


    **关于本书**


    本书针对 SCJD 认证，这是 Sun Microsystems 提供的多项 Java 认证考试之一。SCJD 和 SCEA（Sun 认证企业架构师）证书要求考生完成项目，而其他认证仅要求基于理论的考试，考生通常需要回答多项选择题。就编程而言，SCJD
    考试是 Sun 提供的最具挑战性的考试，而这正是本书关注它的原因。


    本书分为三个部分。第一部分侧重于通用开发考量，并概述了一个示例项目。第二部分从头开始教授必要的概念，同时促进理解和实现。第三部分以对设计和实现决策以及可能的替代路径的讨论作为本书的结尾。


    本书提供了一个示例项目，该项目提供了与你在 SCJD 考试中遇到的挑战类似的挑战，同时引入并利用了 J2SE 5 的相关新特性。与考试相关的每个主题都得到了详细解释，并考虑了权衡取舍。在适当的情况下，探讨并实现了并行的开发路径。


    在适用的情况下，各章简要讨论了所使用的设计模式，并对这些模式进行了简要说明。我们强烈建议你购买或下载一些模式资源。包括 Sun 网站 (http://www.sun.com)
    和 TheServerSide.com (http://www.theserverside.com) 在内的多个网站提供了富有洞察力的教程。此外，还有多本关于该主题的优秀书籍，包括
    Elisabeth Freeman、Eric Freeman、Bert Bates 和 Kathy Sierra 合著的 *Head First 设计模式*（O''Reilly，2004
    年）。


    在本书中，我们提供了大量示例，以帮助开发一个真实的 Java 应用程序。每一章都通过探讨线程、Swing 或网络等关键主题，直接为该应用程序做出贡献。文本探讨了这些主题中自然产生的问题，并解释了如何应对挑战。更重要的是，讨论了这些选择的权衡取舍和影响。


