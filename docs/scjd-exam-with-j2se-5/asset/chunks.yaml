    - 理解 Denny''s DVDs 中的对象序列化

    - 评估使用 RMI 作为网络协议的优缺点

    - 实现远程对象并定义远程接口

    - 研究工厂模式并了解为何在 RMI 实现中使用它

    - RMI 中的编组与解组

    - 注册你的远程对象


