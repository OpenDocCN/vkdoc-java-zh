    RMI 需要序列化，但在 Java 套接字实现中并非绝对必要。例如，你可以在套接字实现中实现自己的线路格式，以便任何客户端技术都可以向 Java 套接字服务器提交请求。在下一章中，我们将解释使用序列化对象的套接字技术。如果你决定使用套接字作为网络协议来实现解决方案，下一节“什么是序列化？”仍然会很有用。


    ## 什么是序列化？


    那么什么是序列化，为什么在程序中需要它？让我们考虑一个例子。


    假设同一网络上有两台机器。机器 A 向机器 B 上的 Java 程序发送一条消息；机器 B 如何接收并理解这条消息？需要一个传输协议。*传输协议*会将需要传输的数据扁平化，将其放入可以通过网络发送的格式。


    通过网络发送数据的过程的一部分涉及序列化。*序列化*是将对象分解为其类型信息和状态组件的过程，然后在接收端通过读取类型信息然后读取字段值来重建原始对象的副本。通常用来描述通过网络传输序列化对象过程的术语是*编组*。有时，在另一端恢复序列化对象的反向过程被称为*解组*或*反编组*。


    序列化对象可以持久化到本地文件系统（借助 Java 文件 I/O），或通过套接字发送到网络。这是通过将对象转换为序列化的字节流，将该流通过网络传输或传输到文件系统，然后将持久化的字节流读回内存以重新创建对象图（见图
    6-2）来实现的。用 Java 术语来说，这就像什么都没发生过一样重建原始对象及其状态。


    当字节流以对象形式加载到内存中时，它被称为处于*活动*状态。当同一个字节流位于文件中而不是 Java 虚拟机（JVM）内存中时，它被称为处于*被动*状态。请记住对象处于活动或被动状态的概念，因为当我们在本章后面介绍`Activatable`接口时，这会派上用场。让我们更详细地讨论这个过程。


    三个步骤中的第一步是将对象转换为序列化的字节流。首先，类型信息作为头部信息写入流中，然后写入状态信息。状态信息由类成员的值组成，但静态和瞬态成员除外（假设使用默认序列化机制，该机制不实现`readObject`和`writeObject`；稍后将更详细地讨论这一点）。在反序列化端，接收远程对象首先从头部读取类型信息，并创建类的实例。如果找不到该类（无论是本地还是远程），则会引发`ClassNotFoundException`。一旦类被实例化，字段值就会从流中读取，并在编组的对象中设置这些值。


    > **注意** 序列化对象是原始对象的副本，而不是对它们的引用。RMI 中的参数和返回值是按值或副本传递的。只有当对象是远程对象时——即通过`UnicastRemoteObject.export()`方法导出或扩展了`UnicastRemoteObject`——它才能被另一台机器引用。


