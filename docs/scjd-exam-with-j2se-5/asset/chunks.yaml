    无论你决定如何，请记住，这是一个你可能需要记录的设计决策。


    讨论点：多个通知对象


    考虑一下，如果有 100 个线程都在等待预约不同的记录，会发生什么情况。当一个线程释放其对任何一条记录的锁时，它会调用 `lockReleased.signal`，并且*所有
    100 个线程*都会收到锁已被释放的通知，因此所有 100 个线程都会尝试重新获取锁互斥体，并检查被释放的是否是它们感兴趣的那条记录——而很可能被释放的记录对它们中的任何一个都不感兴趣！因此，每次释放一条记录时，都会出现
    CPU 活动的突然爆发，可能会降低服务器的整体生产力。


