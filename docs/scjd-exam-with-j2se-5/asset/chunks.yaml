  trans: '

    总有一些改进或增强能让你的应用程序变得更好，但到了某个阶段，你需要确信自己的项目能够通过 Sun 公司的严格审查。


    毕竟，你的目标是通过考试，而不是开发一个商业项目。Sun 公司估计，开发一个可运行的解决方案大约需要 100 小时的开发时间。


    为了确保你能通过考试，这里有一份待办事项清单：


    • 非常仔细地阅读 SCJD 考试说明。即使许多考试名称相同，其具体细节也有所不同。


    • 阅读本书。至少，要查看示例项目，了解我们是如何解决一些基本问题的，例如锁定、网络和 GUI 实现，尤其是 `JTable`。我们相信，如果你理解了这些代码，你就拥有了通过考试所需的所有工具。


    • 在整个开发过程中参考本书。


    • 加入 JavaRanch SCJD 论坛（请参阅常见问题解答部分）。


    • 测试你的应用程序。编写一个类似于本章讨论的测试工具。如果可能，在实际网络上进行测试。测试所有用例。使用诸如 `DBTestRunner` 之类的测试类，在多线程环境中测试你的应用程序。


    • 将你的所有 ReadMe 和设计文档与应用程序一起打包，并按照考试说明提交项目给 Sun 公司。


    5165CH09.qxd 11/16/05 12:17 PM 第 322 页


    **322**


    第 9 章 ■ 项目收尾


    **常见问题解答**


    **问** 我在哪里可以获取运行示例项目所需的数据库文件？


    **答** 它包含在你可以从 Apress 网站 (http://www.apress.com) 下载的 zip 文件中。


    **问** 我必须将我的应用程序打包成 JAR 文件吗？


    **答** 这个问题的答案取决于你考试的具体要求。然而，根据我们的经验，大多数考试都要求考生使用 JAR 文件进行提交。建议将多个独立的 JAR 文件包含在一个主
    JAR 文件中进行提交。


    **问** 我的考试提交需要包含哪些内容？


    **答** 基本要素通常如下：


    • 源文件


    • 一个可执行的 JAR 文件


    • 数据库文件


    • 一份解释关键设计决策的设计文档


    • 一份说明你所使用的开发环境的文件


    • Javadoc 文档


    • 用户文档


    但是，你**必须**仔细阅读 Sun 公司提供的说明，以确保满足提交要求。如果我们的描述与 Sun 公司的说明之间存在差异，你必须遵循 Sun 公司的说明。


    **问** 我应该在我的提交物上测试哪个平台？


    **答** 由于 Java 是平台无关的，你的提交物应该能在 Unix 或 Windows 上运行。我们强烈建议你在 Windows、Unix、Linux
    和 Mac OS X（即 Macintosh）上测试你的考试项目，因为可能存在细微的平台差异，导致你的提交物出现问题。为了保持一致性和简单性，本书中的示例均在
    Windows 2000 上演示。尽管无法保证你的应用程序提交后会在哪个平台上进行测试，但请确保在你的 ReadMe 文件中记录你工作的平台。


    **问** 通过考试后我应该做什么？


    **答** 庆祝一下。然后发送电子邮件至 scjd@apress.com 联系我们。


    **问** 如果我对本书有意见或问题，应该联系谁？


    **答** 你可以通过 scjd@apress.com 联系作者。


    5165CH09.qxd 11/16/05 12:17 PM 第 323 页


    第 9 章 ■ 项目收尾


    **323**


    **问** 有没有对通过 SCJD 考试有用的在线资源？


    **答** 有很多优秀的在线资源。以下是我们认为特别有帮助的几个：


    • JavaRanch 网站：http://www.javaranch.com


    • Yahoo! 上的 SCJD 讨论组 (http://groups.yahoo.com)


    • Java 2 开发工具包标准版文档页面 (http://java.sun.com/j2se/1.5.0/docs/)


    • Java 教程：RMI (http://java.sun.com/docs/books/tutorial/rmi/)

