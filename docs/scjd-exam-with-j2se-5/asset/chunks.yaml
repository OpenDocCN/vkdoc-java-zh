- fmt: '# 常用设计方法


    一些常用的设计方法包括迭代过程、Rational统一过程、Boehm螺旋模型和XP（极限编程）。在本书中，我们使用另一种常见模型：瀑布模型。顾名思义，这种设计模型要求开发是一个持续的过程，一个版本的软件基于前一个版本，依此类推。此外，在该模型中，需求是在项目设计和开发开始之前确定的。SCJD考试允许无限期完成项目，并要求你作为单个开发人员工作。SCJD考试中设定的这两个特殊标准完全符合瀑布方法论。


    设计是一个以编码为基础的流动过程。开始项目设计的最佳方式是通过编写一些代码、进行一些设计、再编写更多代码来探索前方的技术挑战。在这方面，项目设计成为一个迭代过程。以下是一些建议的原则。


    ## 开始


    作为第一步，花一点时间验证你对需求的理解。多次阅读材料并仔细审视其内容。探索功能的逻辑分解并记录你的假设。确保你注意到涵盖给定主题下几种不同变体的总括活动。这通常有助于包结构设计。例如，拥有一个负责视觉呈现的`GUI`包可能是有意义的。


    ## 收集需求


    需求是客户希望你正在创建的系统中项目应具备的功能。


    需求应详细说明系统需要执行的所有内容。我们的建议是提出问题。更好的是，提出大量问题。在制定答案之前写下问题，并确保它们有意义。为了清晰起见，用不同的方式表述它们并再次提问。在项目开始时被认为有点迟钝，总比在项目结束时被证明粗心要好。


    以书面形式或作为`GUI`布局确认所有假设。当然，在这个项目中，你无法向任何人提问，但这不应阻止你阐明潜在问题和项目风险。事实上，这应鼓励你提出问题以组织思路。


    > **注意** 第3章介绍了一些从项目需求中导出的示例用例。第8章提供了一个处理用例及其转换为项目功能的完整示例。


    ## 原型化GUI


    当你开始原型化项目的`GUI`部分时，用铅笔和纸画出各种命令窗口的简单布局。这一活动将帮助你在决定界面如何在内部工作之前，了解用户需要看到什么。这通常是协调用户期望与系统实现所施加的现实的关键步骤。第8章介绍了`GUI`原型化和界面布局过程的示例。


    我们建议你在此阶段使用铅笔和纸原型化`GUI`，而不是直接在计算机上进行。直接在计算机上编码存在以下风险：


    - 你认为非常好且花费了大量时间的设计，可能会被你的样本测试者（参见侧边栏“样本测试者”）拒绝，导致时间浪费。

    - 与在纸上绘制`GUI`布局相比，在计算机上原型化`GUI`几乎肯定需要更多时间。我们建议你将原型展示给一些样本测试者（参见侧边栏），如果他们提出更改建议（或者最坏情况下，拒绝你的原型），如果你的原型只是铅笔草图，浪费的时间会更少。

    - 如果你有`GUI`的铅笔草图，无论是否有计算机在手，你都可以在任何地方与样本测试者讨论。他们建议的任何更改都可以在几秒钟内纳入。

    - 如果你花费了大量时间编码原型，自然会抗拒更改它，这可能导致你拒绝样本用户提出的一些优秀想法。

    - 你可能会在原型就位之前很久就因实现细节而感到沮丧，结果你可能为了更容易开发的东西而牺牲好的设计，从而降低`GUI`的得分。

    - 如果你现在编码`GUI`，你最终可能会得到你认为非常好的东西，但后来发现用户不喜欢它。再次，你面临从头开始的风险。


    > **注意** 在第8章中，我们将为示例项目开发`GUI`，作为其中的一部分，我们将展示一些我们可能用于项目的备选屏幕布局的粗略草图。


    ## 样本测试者


    程序员为程序员编写程序，这是一个不言而喻的道理。也就是说，对于任何给定的任务，我们作为程序员往往会编写一个*我们认为*非常逻辑但大多数非程序员会觉得难以使用的程序。这种效应在所有职业中都存在，有些职业雇佣员工仅仅是为了处理美学问题——例如，一些汽车制造商雇佣员工，其唯一工作是确保汽车对最终消费者有吸引力。


    如果我们想编写最终用户（在Sun作业的情况下，是作业评估者）会喜欢并因此认可（在Sun作业的情况下，给予满分）的`GUI`应用程序，我们需要做类似的事情。获得最终用户的认可极其重要——否则我们会陷入对`GUI`进行无休止更改的循环。我们需要一个（最好）不是程序员的人，他可以查看我们的原型和最终应用程序，并告诉我们需要更改什么，以使其感觉像是一个出色的应用程序，而不仅仅是平庸的。


    这些人就是我们的样本测试者。他们可以是你的配偶、伴侣、母亲或办公室秘书。他们是可能发现某些他们认为标准但你却遗漏的功能的人。他们是可能查看你的应用程序并告诉你某些东西放错了位置的人。在测试最终应用程序时，他们是可能做出你意想不到的事情的人——比如试图同时打开两个应用程序，或试图将应用程序屏幕缩小到你认为没人会使用的大小以下。


    应尽量避免的人是其他程序员——他们是最可能因为自己不喜欢某个特定功能而不提及它的人。此外，他们可能因为习惯于处理他人程序中的问题而忽略可用性问题。


    所以，看看你是否能想到一些样本测试者，将你的屏幕粗略草图拿给他们，并询问他们的想法。然后听取他们的意见，回去进行必要的修改。


    如果可能，向样本测试者展示完全不同的屏幕样本——让他们选择他们喜欢使用的界面类型。他们会感到更有参与感，并且通常会因为你的某个样本布局尚未最终确定而觉得可以提出更多修改建议。


    ## 使用公认的设计模式


    不遵循惯例很少值得花费开发时间。更糟的是，它可能导致你无法通过Sun的考试。最糟糕的是，在现实世界中，它将招致那些必须维护由此产生的晦涩代码的程序员的憎恨。'
  raw: 'Some of the commonly used design approaches are the Iterative Process, the
    Rational Unified Process, the Boehm Spiral Model, and XP (Extreme Programming).
    In this book, we are using another common model: the Waterfall Model. As its name
    implies, this design model requires that development be an ongoing process, with
    one version of software based on a previous version, and so on. In addition, requirements
    are determined before project design and development begin in this model. The
    SCJD exam allows unlimited time to complete the project, and it requires that
    you work as a single developer. Both of these special criteria set forth in the
    SCJD exam fit perfectly into the Waterfall methodology.


    Design is a fluid process that is grounded by coding. The best way to begin a
    project design is to explore the technical challenges ahead by coding a little,
    designing a little, and coding some more. In this respect, project design becomes
    an iterative process. Some suggested principles follow.


    **Getting Started**


    As a first step, spend a little time verifying your understanding of the requirements.
    Read the material several times and scrutinize its contents. Explore the logical
    breakdown of functionality and document your assumptions. Make sure that you note
    the umbrella activities that encompass several different variations under a given
    topic. This often helps with the package structure design. For example, it might
    make sense to have a GUI package that is responsible for visual presentation.


    **Gathering Requirements**


    Requirements are functions of a project that the client wants in the system you
    are creating.


    The requirements should detail everything that the system is required to do. Our
    suggestion is to ask questions. Better yet, ask a lot of questions. Write down
    the questions before you formulate answers, and ensure that they make sense. For
    the sake of clarity, phrase them differently and ask them again. It is probably
    best to be thought a little slow at the beginning of a project than to be proven
    careless at the end.


    Confirm all assumptions either in writing or as a GUI layout. Of course, on this
    project, you are not going to be able to ask anyone your questions, but that should
    not prevent you from articulating potential issues and project risks. As a matter
    of fact, it should encourage you to formulate questions to organize your thoughts.


    ■**Note** Chapter 3 introduces some example use cases derived from project requirements.
    Chapter 8 presents a full example of dealing with use cases and their translation
    to project functionality.


    5165CH02.qxd 11/16/05 12:09 PM Page 13


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **13**


    Prototyping the GUI


    When you begin prototyping the GUI portion of the project, draw out simple layouts
    of the various command windows with pencil and paper. This activity will help
    you acquire a sense of what the user needs to see before you decide how the interface
    will work internally. This is often a crucial step in reconciling user expectations
    with the reality imposed by the system implementation. Chapter 8 presents examples
    of GUI prototyping and the interface layout process.


    We recommend that you prototype the GUI using pencil and paper at this stage,
    rather than directly on the computer. Coding directly on computer runs the following
    risks:


    • The design that you thought was so good, and that you spent so much time on,
    might be rejected by your sample testers (see the sidebar, “Sample Testers”),
    resulting in wasted time.


    • You will almost certainly require more time to prototype a GUI on the computer
    compared with sketching the GUI layout on paper. We recommend you show your prototype
    to some sample testers (see the sidebar), and if they have recommendations for
    change (or, worst case, reject your prototype) there will be less time wasted
    if your prototype is only a penciled sketch.


    • If you have a penciled sketch of your GUI, you can discuss it with your sample
    testers anywhere, regardless of whether there is a computer handy. And any changes
    they suggest can be incorporated in a few seconds.


    • If you have spent a large amount of time coding your prototype, there is a natural
    resist-ance to changing it, which might result in you rejecting some otherwise
    excellent ideas from your sample users.


    • You may get frustrated with implementation details long before a prototype is
    in place, and as a result you may sacrifice a good design for something that is
    easier to develop, and, accordingly a lower score for your GUI.


    • If you code the GUI now, you may end up with something that you believe is very
    nice, but which you later find your users don’t like. Once again, you run the
    risk of having to start from scratch.


    ■**Note** In Chapter 8 we will be developing the GUIs for our sample project,
    and as part of this we will be showing some rough sketches of alternate screen
    layouts we might use for our project.


    5165CH02.qxd 11/16/05 12:09 PM Page 14


    **14**


    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **SAMPLE TESTERS**


    It is a truism that programmers write programs for programmers. That is, for any
    given assignment, we as programmers will tend to write a program that *we believe*
    is very logical but that most nonprogrammers will find difficult to use. This
    effect happens in all professions, and some professions employ staff simply to
    work on aesthetics—for example, some car manufacturers hire staff whose only job
    is to ensure that the car will look good to the final consumer.


    We need to do something similar if we want to write GUI applications that the
    end users (in the case of the Sun assignment, the assignment assessor) will like
    and accordingly, approve (in the case of the Sun assignment, award full marks).
    Having end-user approval is extremely important—otherwise we end up in a never-ending
    cycle of making one change after another to the GUI. We need someone who is (preferably)
    not a programmer who can look at our prototype and our final application, and
    tell us what needs to be changed to make them feel like it is a great application,
    and not just a mediocre one.


    These are our sample testers. They could be your spouse, your significant other,
    your mother, or the office secretary. They are the people who are likely to spot
    some feature that they consider standard, but that you have managed to leave out.
    And they are the ones who are likely to look at your application and tell you
    that something is in the wrong place. And when it comes to testing the final application,
    they are the ones who are likely to do the things you were not expecting—trying
    to open two applications at once, or trying to reduce the size of your application
    screen below the size you thought anyone would use.


    The people to try to avoid are other programmers—they are the people who are most
    likely to not mention some feature because they don’t like that particular feature
    themselves. Furthermore, they may ignore a usability issue because they are used
    to working around issues in others’ programs.


    So see if you can think of some sample testers, take your rough sketches of screens
    to them, and ask them what they think. Then listen to their comments, and go back
    and make any necessary modifications.


    If possible, take some samples of totally different screens to your sample testers—give
    them a choice of what sort of interface they would like to work with. They will
    feel that they have more involvement, and they will often feel that they can suggest
    more modifications to one of your sample layouts since it has not yet been finalized.


    **Using Accepted Design Patterns**


    Failing to follow conventions is rarely worth the development time. Worse, it
    may cause you to fail Sun’s exam. Worst of all, in the real world it will attract
    the hatred of programmers who will have to maintain the cryptic code that ensues.'
  trans: '

    一些常用的设计方法包括迭代过程、统一过程、Boehm 螺旋模型和 XP（极限编程）。在本书中，我们采用另一种常见模型：瀑布模型。顾名思义，这种设计模型要求开发是一个持续的过程，每个软件版本都基于前一个版本，以此类推。此外，在此模型中，需求是在项目设计和开发开始之前确定的。SCJD
    考试允许无限制时间完成项目，并要求你作为单个开发者工作。SCJD 考试中规定的这两个特殊标准与瀑布方法论完美契合。


    设计是一个以编码为基础的动态过程。开始项目设计的最佳方式是通过少量编码、少量设计、再更多编码来探索前方的技术挑战。在这方面，项目设计成为一个迭代过程。以下是一些建议的原则。


    **开始着手**


    作为第一步，花一点时间验证你对需求的理解。多次阅读材料并仔细审视其内容。探索功能的逻辑分解并记录你的假设。确保你注意到那些涵盖特定主题下多种不同变体的总括性活动。这通常有助于包结构设计。例如，设置一个负责视觉呈现的
    GUI 包可能是合理的。


    **收集需求**


    需求是客户希望在你所创建系统中实现的项目功能。


    需求应详细说明系统需要做的所有事情。我们的建议是提出问题。更好的是，提出大量问题。在形成答案之前写下问题，并确保它们合理。为了清晰起见，用不同的方式表述并再次提问。在项目开始时被认为有点迟钝，总比在项目结束时被证明粗心大意要好。


    以书面形式或 GUI 布局确认所有假设。当然，在这个项目中，你无法向任何人提问，但这不应阻止你阐明潜在问题和项目风险。事实上，这应该鼓励你提出问题以整理思路。


    ■**注意** 第 3 章介绍了一些从项目需求中导出的示例用例。第 8 章提供了一个处理用例及其转化为项目功能的完整示例。


    5165CH02.qxd 11/16/05 12:09 PM 第 13 页


    第 2 章 ■ 项目分析与设计


    **13**


    GUI 原型设计


    当你开始设计项目的 GUI 原型时，用铅笔和纸画出各种命令窗口的简单布局。这项活动将帮助你在决定界面内部工作方式之前，了解用户需要看到什么。这通常是协调用户期望与系统实现现实之间的关键步骤。第
    8 章介绍了 GUI 原型设计和界面布局过程的示例。


    我们建议你在此阶段使用铅笔和纸来设计 GUI 原型，而不是直接在计算机上操作。直接在计算机上编码存在以下风险：


    •   你认为非常好且花费了大量时间的设计，可能会被你的样本测试者（参见侧边栏“样本测试者”）拒绝，导致时间浪费。

    •   与在纸上勾勒 GUI 布局相比，在计算机上制作 GUI 原型几乎肯定需要更多时间。我们建议你将原型展示给一些样本测试者（参见侧边栏），如果他们提出修改建议（或者最坏情况下，拒绝你的原型），如果你的原型只是铅笔草图，浪费的时间会更少。

    •   如果你有 GUI 的铅笔草图，无论是否有电脑在手，你都可以在任何地方与样本测试者讨论。他们建议的任何更改都可以在几秒钟内纳入。

    •   如果你花费了大量时间编码原型，自然会抗拒更改它，这可能导致你拒绝样本用户提出的一些绝佳想法。

    •   你可能会在原型完成之前很久就因实现细节而感到沮丧，结果可能为了更容易开发的东西而牺牲好的设计，从而导致 GUI 得分较低。

    •   如果你现在编码 GUI，最终可能会得到你认为非常好的东西，但后来发现用户不喜欢。再次，你面临从头开始的风险。


    ■**注意** 在第 8 章中，我们将为示例项目开发 GUI，作为其中的一部分，我们将展示一些我们可能用于项目的备选屏幕布局的粗略草图。


    5165CH02.qxd 11/16/05 12:09 PM 第 14 页


    **14**


    第 2 章 ■ 项目分析与设计


    **样本测试者**


    程序员为程序员编写程序，这是一个不言而喻的事实。也就是说，对于任何给定的任务，作为程序员，我们倾向于编写一个*我们认为*非常合乎逻辑，但大多数非程序员会觉得难以使用的程序。这种效应在所有行业都存在，有些行业会雇佣员工专门处理美学问题——例如，一些汽车制造商雇佣员工，其唯一工作是确保汽车对最终消费者有吸引力。


    如果我们想编写最终用户（在 Sun 认证任务中，即任务评估者）会喜欢并因此认可（在 Sun 认证任务中，即获得满分）的 GUI 应用程序，我们需要做类似的事情。获得最终用户的认可极其重要——否则我们会陷入无休止地对
    GUI 进行一个又一个修改的循环。我们需要一个（最好）不是程序员的人，他可以查看我们的原型和最终应用程序，并告诉我们哪些需要更改，以使其感觉像是一个出色的应用程序，而不仅仅是一个平庸的。


    这些人就是我们的样本测试者。他们可以是你的配偶、你的伴侣、你的母亲，或者办公室秘书。他们很可能会发现一些他们认为标准，但你却遗漏的功能。他们也可能会查看你的应用程序并告诉你某些东西放错了位置。在测试最终应用程序时，他们很可能会做一些你意想不到的事情——比如试图同时打开两个应用程序，或者试图将你的应用程序屏幕缩小到你认为没人会使用的大小以下。


    要尽量避免的人是其他程序员——他们最有可能因为自己不喜欢某个特定功能而不提及它。此外，他们可能会忽略可用性问题，因为他们习惯于处理他人程序中的问题。


    所以，看看你是否能想到一些样本测试者，把你的屏幕粗略草图拿给他们，问问他们的想法。然后倾听他们的评论，回去进行必要的修改。


    如果可能，将完全不同的屏幕样本拿给你的样本测试者——让他们选择他们喜欢使用哪种界面。他们会感到更有参与感，并且通常会因为你的某个样本布局尚未最终确定而觉得可以提出更多修改建议。


    **使用公认的设计模式**


    不遵循惯例很少值得花费开发时间。更糟的是，它可能导致你无法通过 Sun 的考试。最糟糕的是，在现实世界中，它会招致那些必须维护由此产生的晦涩代码的程序员的憎恨。

    '
- fmt: '虽然为通用问题实现自定义解决方案是可能的，而且通常很巧妙，但对于本项目及 Sun 的考试，你应抵制这种诱惑。然而，在实际工作中，自定义解决方案有时比通用解决方案更快、成本更低。例如，一个对数组元素进行排序的自定义方法可能比`Arrays`类中内置的方法更快。


    由于本书的重点并非软件设计模式，因此我们无法涵盖所有设计模式。我们强烈建议你自行阅读相关内容，因为你在开发职业生涯中将会用到它们。该领域最广为人知的著作是
    Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides 合著的《设计模式》（Addison-Wesley
    Professional, 1995）。这本书通常被称为“四人组”（Gang of Four，简称 GOF）著作。你可能会发现这本书并不容易阅读，因此你可能希望了解一些替代读物，例如
    Elisabeth Freeman、Eric Freeman、Bert Bates 和 Kathy Sierra 合著的《深入浅出设计模式》（O''Reilly,
    2004）、波特兰模式仓库（`http://c2.com/ppr/index.html`），或维基百科上关于设计模式的条目（起始于`http://en.wikipedia.org/wiki/Design_pattern_(computer_science)`）。Sun
    的 J2EE 设计模式（`http://java.sun.com/blueprints/patterns/`）也非常有用，但你应该意识到它们是以 J2EE
    为中心的，并且可能以某种形式描述模式，这种形式对于本作业来说可能看起来不合理。


    ## 记录设计决策


    记录你在开发过程中所做的选择。写下你做出的各种决定及其原因。例如，如果你决定使用`ArrayList`而不是`Vector`作为内部数据结构，请记录`ArrayList`不同步这一事实，以及因此选择它们是因为它们是更轻量级的数据结构。这类文档无需过度，因此请务必运用常识。这种文档是调试和性能调优的关键工具，也是任何需要理解代码的人的绝佳资料来源。


    无论你做什么，都不要把记录设计决策的工作留到项目结束。如果你等到完成编码后才开始编写这份文档，你不仅需要回忆当初为什么选择某个特定选项，还需要首先回忆起你当初还有其他选项！例如，如果你在作业开始时决定使用自定义对话框，那么在作业结束时，你可能已经忘记了你最初还考虑过在主窗口上使用可编辑单元格。


    很有可能，当你完成作业时，你会发现你的设计决策文档非常庞大——可以删除次要决策以减小文档体积。


    > **提示** 你可能希望使用项目符号来描述你的设计决策。这不仅会减少你的书写量，而且在考试时也更容易记住。这对于母语非英语的考生尤其有用——你无需过分担心拼写或句子组织得有多好。


    例如，我们可以像这样记录几个决策：


    - 使用`Sockets`而非`RMI`——允许完全控制线程

    - 使用`RandomAccessFile`而非独立的`DataInputStream`和`DataOutputStream`类——允许对文件进行随机访问


    ## 测试


    你应该通过为每个类编写一个单元测试客户端来开始测试，或者你可以使用诸如`JUnit`（`http://www.junit.org/`）之类的测试工具来自动生成测试客户端。当你设计自定义测试时，最好在实现待测试方法之前编写测试类。'
  raw: 'While it is possible, and often clever, to implement custom solutions to general
    problems, you should resist the temptation to do so for this project and Sun’s
    exam. In real life, however, custom solutions are occasionally faster and cheaper
    than general solutions. For example, a custom method that sorts the elements of
    an array may be faster than the methods that are built into the Arrays class.


    Since this book’s focus is not software design patterns, there are many design
    patterns that we cannot cover in this book. We strongly recommend that you read
    up on these yourself, as you will use them in your development career. The most
    widely recognized book on the subject is *Design Patterns* by Erich Gamma, Richard
    Helm, Ralph Johnson, and John Vlissides (Addison-Wesley Professional, 1995). This
    is commonly referred to as the “Gang of Four,” or GOF, book. You may find that
    this is not the easiest book to read, so you may wish to investigate


