    ## The Observer Design Pattern


    There are many options to be configured, but the client and server applications
    cannot start unless all the correct options are configured. However, in the client
    application, our common frame will be used in a dialog box, while in the server
    application it will form part of the server GUI. So we need some common way for
    either of these applications to create an instance of the common frame and receive
    notifications whenever a field changes. In effect, we want the dialog box and
    the server application to observe any changes in the common frame.


    This is one occasion where we can use the Observer design pattern. In this pattern,
    you set up one class as the `Observable` class, and any classes that want to be
    notified of changes implement the `Observer` interface. The `Observer` classes
    then register themselves to the `Observable` class, and the `Observable` class
    notifies registered `Observer` classes of any changes.


    > **Note** The Observer design pattern is not normally used for one part of a
    GUI to receive notifications of changes to another part of the GUI. It is more
    common to have an `Observable` model in an MVC pattern with one or more `Observer`
    views. Or you might have an `Observable` server that notifies all the `Observer`
    clients whenever something changes on the server.


    Normally you would have the class you wish to observe extend the `Observable`
    class, but our `ConfigOptions` panel already extends `JPanel`, so we cannot do
    this. Instead, we have created an inner class that extends `Observable`, and provided
    a convenient `getObservable` method that the client and server applications can
    use in order to register themselves as observers.


    When using Java’s inbuilt implementations of the observer pattern, you can specify
    an object that should be passed to the observers. We have created a value object
    class that can be used to pass the field that was changed along with the field
    contents. This class is presented in Listing 8-29. For more information on the
    Value Object design pattern, refer to Chapter 5.


