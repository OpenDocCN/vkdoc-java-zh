    C H A P T E R 3


    ■ ■ ■


    Project Overview


    **I**n this chapter, we introduce the sample application, which will serve as
    a wellspring for the myriad of topics required for developer certification. The
    sample project, Denny’s DVDs, has a structure and format similar to the one you
    will encounter during the Sun Certified Java Developer (SCJD) exam, and it will
    demonstrate each of the essential concepts necessary for successful completion
    of the certification project. Each chapter adds an integral component to the project
    and builds from the preceding chapter, so that by the end of the book you will
    have a complete and properly functioning version of Denny’s DVDs version 2.0\.
    As an added benefit, Denny’s DVDs utilizes Java 2 Platform Standard Edition (J2SE)
    5, and some of the


    “Tiger” features, such as autoboxing and generics, are elucidated in the following
    chapters.


    ■**Note** “Tiger” is the code name for J2SE 5, and the two terms will be referred
    to interchangeably throughout the book. Sometimes we will use the term “Tigerize,”
    which means to add a J2SE 5 language feature to code originally composed as a
    J2SE 1.4 program. We do this quite a bit in the sample project, and even the DOSClient
    makes use of generics. For more information on J2SE 5 and the plethora of new
    features that have been added (some of which are discussed in this book), go to
    http://java.sun.com/developer/


    technicalArticles/releases/j2se15.


    **What Are the Essential Requirements for the**


    **Sun Certification Project?**


    To demonstrate “developer-level” competency for Sun certification, your project
    submission must successfully accomplish the following objectives:


    • It must implement an application interface provided by Sun.


    • It must use either RMI or serialized objects over sockets for networking.


    • It must use Swing with a JTable for display.


    • It must be entirely contained within one single executable JAR and, consequently,
    should not require any command-line options to run.


    • Configuration settings must be persisted between application runs.


    **57**


    5165CH03.qxd 11/16/05 12:10 PM Page 58


    **58**


    C H A P T E R 3 ■ P R O J E C T OV E R V I E W


    Your project submission must consist of these components:


    • An executable JAR file, which will run both the stand-alone client and the network-connected
    client


    • An executable server-specific JAR file, which will run the networked server


    • A common JAR file, which will contain code common to both client and server
    applications:


    • An src directory containing the source files for the project


    • The original data file supplied with the instructions


    • A docs directory that will contain


    • The API generated by Javadoc


    • The end-user documentation


    • The file summarizing your design choices


    The entire submission should be packaged in a JAR file, as described in Chapter
    9.


    ■**Note** JARs were initially created to allow applets to be downloaded in a single
    HTTP request, rather than multiple round-trips (request-response pairings) to
    retrieve each applet component, such as class files, images, and so forth. Executable
    JAR files have file associations so that clicking on them will run javaw -jar
    on Windows and java -jar on Unix.


    The Denny’s DVDs sample will eventually be bundled into one JAR file. That JAR
    file will contain an executable JAR file named runme.jar, containing the database
    files, documentation, and source code.


    The runme.jar will handle both the server and the client depending on how it is
    invoked. Running the final application from the executable JAR file will be explained
    in Chapter 9.


    ■**Note** The previous edition of this book included a chapter on Java’s New I/O,
    or NIO. At the time, NIO


    was a new 1.4 topic, and the extent that NIO could be used for the certification
    exam was unclear. Subsequently, after the publication of the first edition and
    the release of J2SE 1.4, Sun explicitly disallowed the use of NIO as a networking
    solution for the certification project, but permitted its use as a mechanism for
    file I/O.'
