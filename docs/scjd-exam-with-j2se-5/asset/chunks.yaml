    49 synchronized (currentDish) {


    50 currentDish.readyToEat = true;


    51 //通知碟子的主人碟子已准备好

    52 currentDish.notify();


    53 }


    55 //从需要服务的碟子队列中移除该碟子

    56 dishes.remove(currentDish);


