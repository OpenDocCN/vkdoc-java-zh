    **222**


    C H A P T E R 7 ■ N E T W O R K I N G W I T H S O C K E T S


    **Summary**


    In this chapter, we discussed the Denny’s DVDs socket implementation. We also
    provided a brief overview of the different types of sockets, and the various types
    of TCP socket development strategies. We laid out the application protocol for
    our socket implementation and demonstrated the Command pattern with the help of
    Java enums. The choice of sockets as the network protocol in your exam solution
    should not be perceived as something esoteric and frightening that is to be avoided
    at all costs. Even though most students opt to not develop a socket solution,
    we believe that the choice isn’t any more challenging than an RMI solution and
    should be fairly straightforward, given the sample code base that accompanies
    this text.


    Sockets are a technology that underlies most networking protocols. Most of the
    cool new technologies, such as web services and EJBs, ultimately rely on sockets.
    As we have discussed, even RMI is built on top of sockets. So you would be well
    served to become acquainted with sockets, if only to help deepen your understanding
    of these other networking technologies. The next chapter covers the graphical
    user interface (GUI) for the Denny’s DVDs application.


    **FAQs**


    **Q** Do I need to implement a multithreaded socket server?


    **A** Yes. The certification exam requires that the server allow multiuser access.
    If you use a single-threaded solution, then there will never be a way to demonstrate
    concurrent access. Your application will block serially until each request is
    resolved one at a time.


    This may be an interesting solution and will circumvent the need to figure out
    a locking strategy, but one that Sun will not permit.


    **Q** Should I utilize a thread pool for the socket server implementation?


    **A** This is completely up to you. You could do so and it would be a good practice.
    Every time a new connection is accepted, our server spawns a new thread to handle
    the request. However, creating and destroying threads is not a free lunch. On
    a really busy, highly trafficked server, it might be better to control the creation
    of threads. A thread pool will instantiate a set number of threads, a number that
    can be calibrated based on your application performance requirements, upon startup.
    When the server receives a new request, it is serviced with one of the threads
    from the pool. When the request is completed, the thread is returned to the pool
    for later use. A thread pool will eliminate the overhead associated with creating
    and destroying new threads. We do not make use of a thread pool in Denny’s DVDs
    and you will not have to implement a thread pool for your certification project
    since the exam does not require that your server perform well under a heavy load.


    **Q** What is meant by TCP sockets being a connection-oriented protocol?


    **A** Sometimes in the literature, the term “connection-oriented” will be used
    when referring to TCP sockets. What this means is that before communication can
    occur between the endpoints, a connection must exist. Contrast this with UDP sockets,
    a connection-less protocol.


    5165CH07.qxd 11/16/05 12:15 PM Page 223


    C H A P T E R 7 ■ N E T W O R K I N G W I T H S O C K E T S


    **223**


    **Q** Was it necessary to use the SocketCommand object to indicate which command
    to perform on the database?


    **A** No. We chose this implementation for clarity: it was a nice way to enumerate
    over the possible commands and demonstrate the command pattern. The drawback is
    that if new commands were added to the database, the client would have to receive
    an updated SocketCommand class in order to submit future requests since we would
    no longer be able to deserialize older command objects on the server. (Of course,
    we could check the serialversionID so that we could be backward compatible, but
    you get the idea.) A different approach would be to embed the command as a string
    in the DvdCommand. This way, as new commands are added, there would be no need
    to add them to the SocketCommand class, but the server would be able to recognize
    the new command.


    **Q** Should I allow the user to change the port to be used in this application?


    **A** While not strictly necessary, doing so is generally considered a good idea.
    Otherwise, if another server application is using your desired port, your server
    application will be unable to start.


    **Q** When choosing a port number to use in my application (whether hard-coded
    or a default value), are there any numbers I should avoid?


    **A** The Internet Assigned Numbers Authority (IANA) specifies a list of well-known
    ports (from port number 0 through 1023), registered ports (from 1024 through 49151),
    and dynamic and/or private ports (from 49152 through 65535). It is recommended
    that you choose a port number from the private port range to avoid conflict with
    any other service. You should avoid using a well-known port since, depending on
    your operating system, you may also find that you cannot run your server using
    a well-known port without administrator privileges.


    **Q** How can I perform system cleanup when a client disconnects?


    **A** If the thread that is dedicated to that client is listening for a new command
    from the client, then it will receive an exception when the client disconnects.
    Alternatively, if the client disconnects before your server has an opportunity
    to respond to a previous request, then the thread dedicated to that client will
    receive an exception when you attempt to send the response to the client. In either
    of these cases, you can add cleanup code to your catch block.'
