    第 8 章 ■ 图形用户界面


    **模型-视图-控制器模式**


    上一节展示了通过 GUI 布局协调系统功能与用户交互的必要性。模型-视图-控制器（MVC）模式限制了系统接口与实现之间的依赖关系，并缓冲了数据层和中间层，使其免受可能影响表示层的设计决策的影响。


    **为什么要使用 MVC 模式？**


    MVC 模式的主要目的是分离用户界面（UI）中涉及的各种任务的职责。一个典型的 UI 可以划分为以下职责领域：


    **1.** 系统接口


    **2.** 向最终用户显示数据


    **3.** 接受用户输入，然后解析并处理这些输入 这三个职责领域分别对应模型、视图和控制器。


    使用 MVC 设计模式，可以将这三个职责领域在逻辑上保持分离。在大型团队中，可能可以将这些职责领域分配给拥有最佳技能来执行工作的团队——例如，擅长布局设计的人可能被分配到视图工作，而更擅长解析各种来源输入的人可能负责控制器。


    使用 MVC 设计模式允许我们快速更改 UI。对于本书的示例作业和 Sun SCJD 作业，我们将创建一个作为独立应用程序运行的 GUI。然而，通过更改视图和控制器，我们可以轻松创建一个基于
    Web 的应用程序。另一个视图和控制器可用于为应用程序提供 Web 服务接口。


    ■**提示** 通常建议在学习任何新主题时，尝试将概念付诸实践。如果你计划学习 Sun 认证 Web 组件开发人员认证，可以尝试为你的作业创建一个 Web
    界面。这比在学习中尝试实现一个全新的项目更容易，因为你已经创建了业务逻辑，因此只需专注于与新认证学习相关的信息。


    **MVC 详解**


    顾名思义，MVC 模式由三个主要参与者组成，如表 8-2 所示。


    MVC 模式可能看起来复杂，但实际上它是一个极其简单的概念。当将其简化为一个现实世界的例子时，这个概念非常容易理解。让我们从在本地快餐店点餐的角度来考虑。


    5165CH08.qxd 11/16/05 12:16 PM 第 235 页


    第 8 章 ■ 图形用户界面


    **235**


    **表 8-2.** *MVC 架构的组件* **组件**


    **角色**


    模型


    模型是应用程序其余部分的接口。它为控制器提供了一种一致的方式来访问和/或修改数据，并以指定格式返回数据。模型通常会结合其他设计模式——例如，使用外观模式隐藏底层应用程序细节；使用观察者模式的可观察端向视图提供自动更新；使用单例模式确保模型只能存在一个实例；等等。


    视图


    视图是数据的实际视觉表示。底层系统可能以多种方式存储数据，但视图的功能是解释并将系统数据转换为适当的格式。一些适当的表示格式可能包括 HTML 页面、PostScript
    文档或 Java 应用程序的 GUI。无论选择何种数据显示类型，事实仍然是视图仅负责将系统的内部数据格式转换为表示格式。视图还必须允许人机交互。用户可能点击
    GUI 界面中的按钮，视图必须处理并分发该操作。这转化为对控制器的调用。重要的是要认识到，视图不一定对应于屏幕布局——在 B2B 场景中，视图也可能是发送到远程应用程序的
    XML 文档。


    控制器


    控制器是应用程序数据和表示部分之间的中介。视图调用控制器并指示其执行某个操作。该操作可能需要从视图传递数据，或者可能将数据传递回视图。无论如何，有一点是确定的：数据层和表示层之间的所有交互都必须通过控制器进行。为了保持
    MVC 所允许的高度抽象，视图绝不能绕过控制器而直接与其下方的组件通信。例如，视图绝不应直接调用数据库并指示其执行查询。相反，视图应调用控制器并指示其调用数据库组件。


    当你到达餐厅时，你看着菜单，觉得沙拉看起来很不错。于是你向柜台服务员点了一份沙拉和一杯奶昔。那个人去厨房，取回你的食物，然后交给你。


    这是一个非常常见的场景，但它完美地代表了 MVC 模式。


    让我们分解这个场景中的主要角色，并将它们映射到 MVC 模式中的对应部分。


    这个例子中的视图是呈现给你的菜单。视图的类型可能有所不同——你可能在餐厅内看着手中的菜单，或者你在免下车通道看着墙上的菜单。无论哪种视图，呈现的信息相同，但可能以不同格式呈现——餐厅内顾客的纸质菜单，或免下车通道顾客的喷绘菜单。


    这个场景中的控制器是接受你点餐的柜台服务员。那个人充当了你与快餐店实际运营之间的缓冲。柜台服务员记下你要求的餐点，并安排将其提供给你。


    5165CH08.qxd 11/16/05 12:16 PM 第 236 页


    **236**


    第 8 章 ■ 图形用户界面


    ■**注意** 可以将柜台服务员视为视图的一部分，因为他们会向顾客提问并可能要求支付餐费。然而，为简单起见，我们忽略了柜台服务员可能扮演的多个角色。

    '
- fmt: "控制器（`Controller`）负责处理为您获取餐点的实际细节，您无需查看或理解他们如何获取餐点。控制器可能会去厨房请厨师准备您的沙拉和奶昔，或者控制器可能需要请两个不同的人分别完成这两项任务。事实上，当您点餐时，您绝不会亲自进去告诉各个员工去准备您的餐点，当然也不会自己动手准备。组织食物供应是控制器的工作，您关心的只是获取下一个视图（即餐点本身）。\n\
    \nMVC 的下一个组件是模型（`Model`）。在快餐的例子中，模型就是厨房。厨房将提供各种视图——标准菜单、任何“今日特色”菜单（这些菜单可能列在餐厅内部菜单的单独页面上，或写在为驾车顾客服务的黑板上）——然后接收订单并呈现数据（食物）以供下一个视图使用。\n\
    \n**MVC 的优势**\n\nMVC 模式的主要优势在于将数据呈现与系统操作进行抽象分离。这一事实带来了许多影响。例如，如果一个系统必须通过多种不同的输出方式显示数据，那么这种模式是理想的解决方案。在\
    \ MVC 模式下，数据模型保持不变，但显示方式可以非常容易地改变。\n\n因此，同一个系统可以拥有图形用户界面（GUI）前端和基于 Web 的 HTML\
    \ 前端，而无需对系统的其余部分进行任何更改。\n\nMVC 模式还有助于限制系统变更的范围。大多数情况下，客户会专注于表示层的功能。这是完全可以理解的，因为这是最终用户实际使用的应用程序部分。很多时候，客户会要求对前端设计进行大量更改。MVC\
    \ 模式限制了这些更改的范围，并常常阻止它们影响系统的其他部分。这并不是说 MVC 模式能让系统更新变得轻而易举，但它确实使系统的前端更加灵活。\n\n**MVC\
    \ 的缺点**\n\n凡事都有两面性，MVC 模式也不例外。MVC 并非是所有系统的最佳选择。例如，一个不需要通过多个数据源显示数据的系统可能就不是这种模式的理想候选。MVC\
    \ 确实使用了大量的数据抽象，有时相关的开销（无论是在开发时间还是性能方面）并不值得。\n\nMVC 模式通常是一个好主意，并且是较为轻量级的设计模式之一。它也被广泛使用，并受到大多数开发平台的支持。其实用性几乎与项目的规模直接相关。如果开发任务需要多个程序员并且需要大量的可扩展性，那么\
    \ MVC 模式无疑是一个胜利。如果项目范围非常小并且可能永远不会更新，那么 MVC 模式可能是不必要的。\n\n**MVC 的替代方案**\n\nMVC\
    \ 模式最明显的替代方案就是完全不使用它。可以设计和实现一个将实际系统功能与用户界面紧密集成的系统。当然，这会限制图形用户界面的灵活性。由于系统基本上是一个整体，所有更改都将直接影响系统的所有区域。\n\
    \n在某些编程平台上，表示层和数据层的紧密集成是可能的。由于 Java 平台的事件驱动特性，MVC 模式的某些方面在任何用户界面中都是固有的。所有界面组件都会产生动作，并且总会有一些类被创建来处理这些动作。从这个意义上说，MVC\
    \ 模式是内置的，但程序员可以选择限制其效果，而不使用完整的 MVC 架构。\n\n**Swing 与抽象窗口工具包**\n\n前面的部分强调了一些界面设计的高级方法论。大多数想法，例如\
    \ MVC 模式，都是平台无关的，并适用于开发项目的架构，这些项目随后可以用几乎任何语言进行开发。接下来的部分将转向使用抽象窗口工具包（AWT）和 Swing\
    \ 的特定平台方法，以解释在 Java 平台上实现接口的方法。\n\n关于如何使用 AWT 和 Swing 进行编程，已有整本书的论述。本节仅提供一些基本概念的概述。要更全面地了解这些主题，我们建议您阅读在线教程，网址为\
    \ `http://java.sun.com/docs/books/tutorial/uiswing`。\n\n**布局管理器概述**\n\n组件（按钮、文本区域、图形等）被添加到容器（如\
    \ `JFrame`、`JPanel` 或 `JWindow`）中。容器使用布局管理器来指定组件在容器内的布局方式。`Window` 和 `Frame` 容器使用\
    \ `BorderLayout` 作为其默认布局管理器。这种特定的布局方案具有一些您可能需要了解的独特功能。\n\n首先，`BorderLayout` 将容器划分为五个区域，如图\
    \ 8-5 所示。\n\n**图 8-5.** *BorderLayout 的区域*\n\n可以通过调用容器的 `add` 方法将组件放置到 `BorderLayout`\
    \ 的指定区域中，第一个参数是要添加的对象，第二个参数是约束条件，对于 `BorderLayout` 来说，该约束条件将是 `BorderLayout` 的五个区域之一，由以下字符串常量表示：\n\
    \n*   `BorderLayout.NORTH`\n*   `BorderLayout.SOUTH`\n*   `BorderLayout.EAST`\n\
    *   `BorderLayout.WEST`\n*   `BorderLayout.CENTER`\n\n当一个组件被放置到这些区域之一时，它会立即扩展以填充该区域，并遵守该区域的任何约束。例如，在清单\
    \ 8-1 中，一个按钮被添加到每个区域。图 8-6 显示了结果。\n\n**清单 8-1.** *BorderLayoutExample*\n\n```java\n\
    import java.awt.*;\nimport javax.swing.*;\n\npublic class BorderLayoutExample\
    \ extends JFrame {\n\n    public static void main(String[] args) {\n        new\
    \ BorderLayoutExample().setVisible(true);\n    }\n\n    public BorderLayoutExample()\
    \ {\n        setDefaultCloseOperation(EXIT_ON_CLOSE);\n        add(new JButton(\"\
    North\"), BorderLayout.NORTH);\n        add(new JButton(\"South\"), BorderLayout.SOUTH);\n\
    \        add(new JButton(\"East\"), BorderLayout.EAST);\n        add(new JButton(\"\
    West\"), BorderLayout.WEST);\n        add(new JButton(\"Center\"), BorderLayout.CENTER);\n\
    \        pack();\n    }\n}\n```\n\n> **注意：** 在 JDK 1.5 之前，需要获取 `JFrame` 的内容窗格，然后将组件添加到内容窗格中。JDK\
    \ 1.5 为 `JFrame` 提供了重写的 `add` 方法，使得上述代码看起来像是直接将组件添加到 `JFrame` 中——实际上并非如此；组件是在重写的\
    \ `add` 方法中被添加到组件窗格中的。\n\n![Image 28](index-258_1.png)\n\n**图 8-6.** *BorderLayout\
    \ 运行示例*\n\n可以看出，添加到“北”和“南”区域的按钮已经扩展以填充从 `JFrame` 最左侧到最右侧的区域；但是，它们并没有扩展以填充按钮上方或下方的空间。添加到“东”和“西”区域的按钮则垂直扩展以填充它们所在区域的高度。"
  raw: 'It is the Controller’s job to handle the actual details of getting the meal
    for you, and you do not need to see or understand how they get your meal. The
    Controller may go to the kitchen and ask the chef to prepare your salad and milk
    shake, or the Controller may have to ask two separate people to do these two tasks.
    The fact is, when you order your food, you never go in and tell the individual
    employees to go off and make your meal, and you certainly do not prepare the meal
    yourself. Organizing the supply of food is the job of the Controller, and all
    you care about is getting the next View (the meal itself ).


    The next component of the MVC is the Model. In the fast-food example, the Model
    is the kitchen. The kitchen will provide the various Views—the standard menu,
    any “specials of the day” menus (which might be listed on a separate page on the
    menus used inside the restaurant, or on a blackboard for the drive-through customers)—then
    take the order and present the data (the food) for the next View.


    **Benefits of MVC**


    The main benefit of the MVC pattern is the abstraction of the data presentation
    from the system operations. The implications of this fact are many. For example,
    if a system must display data to many different output methods, this pattern is
    the ideal solution. Under the MVC pattern, the data model remains the same, but
    the method of display can very easily change.


    Thus, the same system could have a GUI front-end and a web-based HTML front-end,
    all without any changes to the rest of the system.


    The MVC pattern also helps limit the scope of changes to a system. The majority
    of the time, a client will get preoccupied with the functionality of the presentation
    tier. This is quite understandable, considering that this is the portion of the
    application the end user will actually use. Many times, clients will request numerous
    changes to the front-end design. The MVC


    pattern limits the scope of these changes and often precludes them from impacting
    other portions of the system. This is not to say that the MVC pattern makes system
    updates a snap, but it certainly does make the front-end of the system much more
    flexible.


    **Drawbacks of MVC**


    Everything has a good side and a bad side, and the MVC pattern is no exception.
    MVC is not the best option for every system. For instance, a system that does
    not need the capability to display data through multiple sources may not be a
    good candidate for this pattern. MVC does employ a large amount of data abstraction,
    and sometimes the associated overhead is not worth the cost, both in development
    time and performance.


    The MVC pattern is generally a good idea, and it is one of the more lightweight
    design patterns. It is also widely used, and is supported by most development
    platforms. Its useful-ness almost directly correlates with the size of a project.
    If the development task requires


    5165CH08.qxd 11/16/05 12:16 PM Page 237


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    **237**


    several programmers and substantial expandability, the MVC pattern is a sure win.
    If the project is very small in scope and will probably never be updated, the
    MVC pattern is probably unnecessary.


    **Alternatives to MVC**


    The most obvious alternative to the MVC pattern is not to use it at all. A system
    can be designed and implemented that tightly integrates the actual system functions
    with the user interface. This will, of course, limit the flexibly of the GUI.
    All changes will directly impact all areas of the system, since the system is
    basically one unit.


    On some programming platforms, tight integration of the presentation and data
    tiers is possible. Due to the event-driven nature of the Java platform, some aspects
    of the MVC pattern are inherent in any user interface. All interface components
    produce actions, and there are always classes that are created to deal with these
    actions. In this sense, the MVC pattern is built in, but the programmer can choose
    to limit its effect and not use the full MVC architecture.


    **Swing and the Abstract Windows Toolkit**


    The previous sections emphasized some high-level methodologies of interface design.
    Most of the ideas, such as the MVC pattern, are platform agnostic and apply to
    the architecture of development projects, which can then be developed in almost
    any language. The next sections shift to a platform-specific approach using the
    Abstract Window Toolkit (AWT) and Swing to explain methods of interface implementation
    on the Java platform.


    Entire books have been written on how to program with AWT and Swing. This section
    offers only an overview of some of the basic concepts. For more complete coverage
    of these topics, we recommend you read the tutorials available online at http://java.sun.com/docs/


    books/tutorial/uiswing.


    **Layout Manager Overview**


    Components (buttons, text areas, graphics, etc.) are added to Containers such
    as a JFrame, JPanel, or a JWindow. Containers use layout managers to specify how
    components should be laid out within the container. Window and Frame containers
    use BorderLayout as their default layout manager. This particular layout schema
    has some peculiar functionality you may want to review.


    First, the BorderLayout divides the container into five areas, as shown in Figure
    8-5.


    **Figure 8-5.** *The areas of BorderLayout*


    5165CH08.qxd 11/16/05 12:16 PM Page 238


    **238**


    C H A P T E R 8 ■ T H E G R A P H I C A L U S E R I N T E R FA C E S


    A Component can be placed into a specified region of the BorderLayout by calling
    the Container’s add method, with the first parameter being the object to add,
    and the second parameter being the constraint, which for BorderLayout will be
    one of the five regions of the BorderLayout, as represented by the following String
    constants:


    • BorderLayout.NORTH


    • BorderLayout.SOUTH


    • BorderLayout.EAST


    • BorderLayout.WEST


    • BorderLayout.CENTER


    When a component is placed into one of these five regions, it will immediately
    expand to fill that area, observing any constraints for that area. For instance,
    in Listing 8-1 a button is added to each of the regions. Figure 8-6 shows the
    result.


    **Listing 8-1.** *BorderLayoutExample*


    import java.awt.*;


    import javax.swing.*;


    public class BorderLayoutExample extends JFrame {


    public static void main(String[] args) {


    new BorderLayoutExample().setVisible(true);


    }


    public BorderLayoutExample() {


    setDefaultCloseOperation(EXIT_ON_CLOSE);


    add(new JButton("North"), BorderLayout.NORTH); add(new JButton("South"), BorderLayout.SOUTH);
    add(new JButton("East"), BorderLayout.EAST); add(new JButton("West"), BorderLayout.WEST);
    add(new JButton("Center"), BorderLayout.CENTER); pack();


    }


    }


