  trans: '

    幸运的是，许多人已经探索过 SCJD 考试中涉及的设计考量。事实上，数据的布局已经变得如此标准化，以至于 Sun 公司甚至提供了一个 Swing 组件——`JTable`，专门用于处理这种“数据库”风格的数据。Sun
    公司甚至要求 SCJD 考试必须使用 `JTable` 组件。`JTable` 组件（本章后面会详细讨论）是本书示例应用程序中数据展示的主要方法。


    从高层次来看，让我们看看 `JTable` 如何高效地显示数据。`JTable` 采用了电子表格的范式，将项目划分为行和列进行展示。这种电子表格风格的布局如图
    8-1 所示。请注意，当用户需要在这种范式下定位数据时，他们只需交叉引用列值和行值即可。


    两个值相交的地方就是数据的位置。这种范式也是数据与显示空间之间的终极协调。如果向表格中添加一行数据，表格大小将增加大约所用字体的高度。添加一列对大小的影响比添加一行更大，但这种布局非常灵活，因此底层系统数据的更新可以很容易地在展示层中体现出来。除了所有这些特性之外，表格模式还能在很小的区域内展示大量数据。


    5165CH08.qxd 11/16/05 12:16 PM 第 228 页


    **228**


    第 8 章 ■ 图形用户界面


    **图 8-1.** *一个高层次的表格模式*


    虽然上述分析可能看起来显而易见，但它确实强调了表格模式做得非常好的布局原则。对 `JTable` 进行的分析可以而且应该应用于任何 GUI 界面的整体布局。你应该在用户界面中寻找以下标准：


    • 所有数据都在最小的空间内呈现，且不显得杂乱无章。

    • 用户应能快速定位所需信息。

    • 在大多数情况下，界面必须能够伸缩以适应更多或更少的数据。


    **人机界面概念**


    人机界面概念超越了简单的数据布局组织技术。人机界面设计模式在用户尝试完成任务时，组织用户的事件流。例如，决定如何布局数据以最大化其可读性是一个*布局*决策。而决定如何布局选择数据项并修改它的整个过程则是一个*人机界面*决策。简而言之，人机界面决策决定了用户如何与系统交互。


    GUI 的目的是创建一种用户与系统之间简便的交互方式。


    从某种意义上说，GUI 充当了一个屏蔽层，将系统的实际功能对用户进行抽象。当用户点击按钮保存文档时，系统可能需要经过多个步骤来保存文件：**1.** 应用程序验证文件完整性。

    **2.** 系统计算文件的物理大小。

    **3.** 系统检查硬盘是否有足够的可用空间来保存文件。

    **4.** 应用程序将文件写入文件系统。


    5165CH08.qxd 11/16/05 12:16 PM 第 229 页


    第 8 章 ■ 图形用户界面


    **229**


    这些几乎是每个应用程序为了保存文件都要执行的步骤。但大多数应用程序只需要用户提供一个输入项来启动这些操作：从“文件”菜单中选择“保存”选项。


    想象一下，如果一个应用程序要求用户先选择“验证文件”菜单项，接着选择“计算文件大小”选项，然后选择“检查硬盘空间”选项；接着输入从上一步获得的计算出的文件大小；最后，在确认有足够的硬盘空间后，选择“将文件写入文件系统”选项。这个应用程序会让保存文档变得得不偿失。


    前面的例子有些极端，但它仍然展示了尽可能将系统操作对用户进行抽象的概念。系统应该能够完成前面列出的许多任务，而无需用户任何输入。只有在发生错误时，才需要通知用户系统的活动。例如，如果文件系统没有足够的空间来保存文件，应该提示并通知用户系统无法自行完成此步骤。除此之外，应该允许用户简单地选择“保存”，然后让系统抽象掉所有必要的子步骤。


    这是界面设计的主要关注点之一：协调系统指令与用户实际与系统交互所需执行的操作。这看起来可能是一项显而易见且简单的任务，但坦率地说，它并不简单。它要求一个人从从未使用过该应用程序的普通人的角度来审视系统。保持客观对许多应用程序设计人员和开发人员来说都很有挑战性。他们对整个系统的深入了解，可能会使他们难以判断哪些操作对用户是必要的，哪些操作对系统是必要的。


    这就是花时间重新审视需求可能极具价值的地方。为了让自己从系统设计中抽离出来，从用户的角度来审视应用程序，退后一步，重新阅读应用程序的需求，并寻找特定的交互信息：


    • 系统的主要用户是谁？

    • 用户使用系统做什么？系统必须允许他们完成哪些任务？

    • 为了完成这些任务，系统需要执行哪些操作？


    写下这些问题的答案。举个例子，如果你正在考虑创建一个允许用户向文档添加脚注的软件，你应该得到一个类似于表 8-1 的列表。


    **表 8-1.** *示例用例骨架*


    **用户**


    **与脚注功能的交互**


    作者


    添加脚注


    作者


    查看脚注


    作者


    编辑脚注


    作者


    删除脚注


    那些有项目需求经验的人现在会注意到，我们正在做的是创建一组简单的用例。*用例*详细说明了诸如所有参与者如何与系统交互，以及系统将允许他们完成哪些任务等内容。一组用例通常会提供更多细节，并详细说明完成任务所需的额外步骤。表
    8-1 的一个简单用例图将类似于图 8-2 所示。


    5165CH08.qxd 11/16/05 12:16 PM 第 230 页


    **230**


    第 8 章 ■ 图形用户界面


    **图 8-2.** *用户与脚注功能交互的用例图*


    ■**注意** 用户界面应尝试弥合用例与系统功能之间的差距。系统在设计上应允许执行用例中详述的所有操作。界面的工作就是让这些任务对用户来说尽可能简单。如果系统架构不允许执行用例中详述的所有操作，则表明应用程序设计存在严重缺陷。


    接下来，填写每个操作的细节，如下所示：“用户可以通过首先选择要附加脚注的文本，然后可选地为脚注指定一个名称，接着为脚注添加一些正文，最后保存脚注。”


    现在应该有足够的细节来开始界面设计了。首先也是最重要的，考虑如何协调系统所需操作与用户所需操作。


    规划一个界面，要求用户完成一个任务所需的步骤最少。这应该成为你界面设计的指导原则。

