- fmt: '# Fortunately for us, many have treaded into the design considerations presented
    in the SCJD exam. In fact, the layout of data has become so standardized that
    Sun actually includes a Swing component, the `JTable`, to deal specifically with
    this “database”-style data. Sun even goes so far as to require the use of the
    `JTable` component for the SCJD exam. The `JTable` component, which is discussed
    in detail later in this chapter, is the main method of data presentation in this
    book’s example application.


    On a high level, let’s take a look at how the `JTable` efficiently displays data.
    The `JTable` uses the spreadsheet paradigm of presenting items divided into rows
    and columns. This spreadsheet-style layout is illustrated in Figure 8-1. Notice
    that when users need to locate data under this paradigm, they only need to cross-reference
    a column value with a row value.


    Where the two values intersect is the location of the data. The paradigm also
    is the ultimate reconciliation of data versus display space. If another row of
    data is added to the table, the size will increase by approximately the height
    of the font used. Adding an additional column impacts the size of more than a
    row, but the layout is extremely flexible, so updates to the underlying system
    data are easily represented in the presentation. In addition to all of these features,
    the table schema presents a great quantity of data in a very small area.


    **Figure 8-1.** *A high-level table schema*


    While the preceding analysis may appear to be stating the obvious, it does emphasize
    the layout principles the table schema does very well. The analysis performed
    on the `JTable` can and should be done for the overall layout of any GUI interface.
    You should look for these criteria in a user interface:


    - All data is presented in the minimum amount of space, without being cluttered
    or disorganized.

    - The user should be able to locate necessary information quickly.

    - In most cases, the interface must scale to fit more or less data.


    ## Human Interface Concepts


    Human interface concepts go beyond simple data layout organizational techniques.
    Human interface design schemas organize the user’s flow of events when attempting
    to complete a task. For instance, deciding how to lay out data in order to maximize
    its readability is a *layout* decision. Deciding how to lay out the entire act
    of selecting a data item and modifying it is a *human interface* decision. In
    short, human interface decisions determine how users interact with the system.


    The point of a GUI is to create an easy method of interaction between a user and
    a system. The GUI, in a certain sense, acts as a layer of shielding, abstracting
    the actual functions of the system away from the user. When the user clicks a
    button to save a document, the system may have to go through a number of steps
    to save the file:


    1. The application validates the file integrity.

    2. The system calculates the physical size of the file.

    3. The system checks the hard disk to see if there is enough available space to
    save the file.

    4. The application writes the file to the file system.


    These are steps almost every application takes in order to save a file. But most
    applications require only one item of input from the user to initiate these actions:
    selecting the Save option from the File menu.


    Imagine if an application required the user to select a Validate File menu item,
    followed by a Calculate File Size option, followed by a Check Hard Drive Space
    option; to then enter the calculated file size obtained from the previous step;
    and finally, after confirming that there is enough hard drive space, to select
    a Write File to File System option. This application would make saving a document
    more trouble than it is worth.


    The previous example is extreme, but it still demonstrates the notion of abstracting
    the operations of the system away from the user as much as possible. The system
    should be able to complete many of the tasks listed previously without any input
    from the user. The only time the user needs to be notified of the system’s activities
    is if an error should occur. For instance, if there is not enough space on the
    file system to save the file, the user should be prompted and notified that the
    system can no longer complete this step on its own. Beyond these circumstances,
    the user should be allowed to simply select Save and have the system abstract
    away all necessary substeps.


    This is one of the primary focuses of interface design: reconciling system instructions
    with the actions a user must take to actually interface with the system. This
    may seem like an obvious and simple task, but quite frankly, it is not simple.
    It requires an individual to view a system from the standpoint of the average
    person who has never used the application. Being objective is challenging for
    many application designers and developers. Their intimate knowledge of the entire
    system may make it difficult to judge what actions are necessary for the user
    versus what actions are necessary for the system.


    This is where the time taken to get a fresh reading of the requirements can be
    extremely valuable. To detach yourself from the system design and approach the
    application from the point of view of the user, step back and reread the requirements
    for the application and look for certain interaction information:


    - Who are the primary users of the system?

    - What do users employ the system for? What tasks must it allow them to complete?

    - What actions are required by the system in order to complete these tasks?


    Write down the answers to these questions. To give an example, if you were considering
    creating software that allows the user to add footnotes to a document, you should
    get a list that looks something like Table 8-1.


    **Table 8-1.** *Sample Use Case Skeleton*


    | User   | Interactions with Footnote Facilities |

    |--------|---------------------------------------|

    | Writer | Add a Footnote                        |

    | Writer | View a footnote                       |

    | Writer | Edit a footnote                       |

    | Writer | Delete a footnote                     |


    Those who are experienced in project requirements by now have noticed that what
    we are doing is creating a set of simple use cases. *Use cases* spell out items
    such as how all of the actors interact with the system and what tasks the system
    will allow them to complete. A set of use cases will usually go into further detail
    and spell out the additional steps required for the completion of a task. A simple
    use-case diagram for Table 8-1 would look similar to that shown in Figure 8-2.


    **Figure 8-2.** *Use case diagram for user interactions with footnote facilities*


    > **Note:** User interfaces should attempt to bridge the gap between the use cases
    and the functionality of the system. The system should, by design, allow for all
    the actions detailed in the use cases. The interface’s job is to make these tasks
    as easy as possible for the user. If the system architecture does not allow for
    all of the actions detailed in the use cases, it indicates a serious flaw in the
    application’s design.


    Next, fill in the details of each action, like this: “The user may add a footnote
    to text by first selecting the text to attach a footnote to. Next, the user may
    optionally specify a name for the footnote, and then add some body text for the
    footnote. The user then saves the footnote.”


    Now there should be enough detail to begin the interface design. First and foremost,
    consider how to reconcile the actions the system requires versus the actions required
    by the user. Plan an interface that requires the minimum number of steps from
    the user in order to complete a task. This should be the guiding principle in
    your interface design.'
