- fmt: '# Chapter 4, “Threading”


    This chapter starts from scratch and helps guide you to a clear understanding
    of threads. You will also learn about the `Runnable` interface, the `Thread` class,
    locks, synchronization, waiting, sleeping, notification of one or all waiting
    threads, the constraints of using threads with Swing, deadlocks, and thread scheduling.


    We will then move on to the new scheduling package of J2SE 5, and demonstrate
    how this can make threading easier. The focus is on the threading material you
    need to know in order to earn your Java developer certification.


    # Chapter 5, “The DvdDatabase Class”


    This chapter demonstrates how to create a class that will meet the requirements
    of our sample project and implement a specified interface. We will use the Façade,
    Value Object, and Adapter patterns to simplify the code.


    # Chapter 6, “Networking with RMI”


    This chapter provides an introduction to distributed computing. You will learn
    about RMI and how to utilize it when building your clients and servers.


    # Chapter 7, “Networking with Sockets”


    This chapter provides an introduction to an alternative method of developing distributed
    computing. You will learn about sockets, and the pros and cons of working with
    sockets instead of RMI. Chapter 7 also briefly discusses security, serialization,
    the Command and Proxy patterns, and the sample project.


    # Chapter 8, “The Graphical User Interfaces”


    This chapter provides an introduction to Swing. It is designed for Java programmers
    who have little to no Swing experience. The chapter assumes you are starting from
    scratch and quickly explains the fundamentals of how Swing works, what the MVC
    pattern is, how events are handled, how `JTable`s work, and how all the pieces
    fit together.


    # Chapter 9, “Project Wrap-Up”


    This chapter gives us a chance to examine the project in hindsight. We apply finishing
    touches and organize our JAR files. We also review the decisions made and the
    trade-offs involved, and prepare the project for submission.


    The source code for the project, as well as various helpful diagrams and documents,
    can be obtained from the Source Code section of `http://www.apress.com`.


    ## Setting Up the J2SE 5 JDK and Environmental Variables


    Setting up the J2SE 5 JDK is very straightforward. Sun provides extensive documentation
    on how to do so for the various platforms, so we will not rehash all of that material.


    Information on downloading and configuring the J2SE 5 JDK is available at `http://java.sun.com/j2se`.


    ## Summary


    In this chapter, we presented a broad overview of the Sun Certified Java Developer
    (SCJD) exam, as well as strategies you can use to meet your goal of passing the
    exam. We identified the areas that the exam covers, discussed the test itself,
    and offered some suggestions on taking it. We also provided a breakdown of the
    topics discussed in this book, integrated in the relevant J2SE 5 material.


    With this information, you have already begun to prepare for the exam. Congratulations!
    With about four weeks spent covering the issues set forth in this book, you should
    be able to take and pass the SCJD exam. In general, you should expect to spend
    a week on each of the four major topics: threading, Swing, networking, and the
    user interface.


    Of course, this will vary depending on your personal background. You now have
    a sense of what to expect. Good luck, study hard, and e-mail us at `scjd@apress.com`
    when you pass the exam.


    ## FAQs


    **Q** Am I ready to take the SCJD exam?


    **A** If you have passed, or could pass, the Sun Certified Java Programmer (SCJP)
    exam, you are ready to prepare for the SCJD exam. There is no time limit on completing
    the assignment, so you could purchase it and learn as you work through the book
    and assignment simultaneously. However, be aware that there is a time limit on
    the exam voucher, and some Sun offices require you to purchase both the assignment
    and the exam voucher simultaneously.


    **Q** Will this book help me if I am preparing for the Sun Certified Java Programmer
    (SCJP) exam?


    **A** Using this book in conjunction with a book covering the SCJP topics may
    help your understanding of the topics; however, we do not recommend that this
    book be used as reference material for SCJP candidates. Although several of the
    topics required for SCJP certification are covered in this book in detail, many
    required topics are either not covered or are used without explanation on the
    assumption that their usage is well known. In addition, this book covers many
