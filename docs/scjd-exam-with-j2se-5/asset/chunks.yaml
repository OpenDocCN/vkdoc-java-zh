  trans: "\n**图 5-7.** *RMI 中线程复用的示例* 如图 5-7 所示，客户端 A 和客户端 B 都使用了线程 15655788 和 16112134。\n\
    \n考虑到这一点，如果我们无法使用令牌且已选择使用 RMI，那么就需要寻找其他方法来唯一标识客户端。\n\n一种处理方式是使用工厂设计模式构建服务器，让工厂为每个连接的客户端创建唯一对象。然后，我们可以利用\
    \ `DvdDatabase` 类的唯一实例来标识客户端。\n\n5165CH05.qxd 11/16/05 12:13 PM 第 154 页\n\n**154**\n\
    \n第 5 章 ■ DVD 数据库类\n\n使用工厂模式既适用于基于套接字的解决方案（尽管通常有些大材小用），也适用于 RMI 解决方案。由于本书将同时介绍这两种方案，我们决定采用工厂模式，并将在第\
    \ 6 章中进行详细描述。\n\n**创建逻辑预留方法**\n\n为了实现逻辑锁定所需的 `reserveDVD` 和 `releaseDVD` 方法，我们需要一些类变量。首先，需要跟踪锁的持有者；一个包含\
    \ UPC 编号和持有者的 `Map` 是理想选择。其次，需要一个公共的 `Lock` 对象，以确保不同线程不会同时尝试锁定记录。最后，需要一个条件变量，供线程监控以确定何时可以再次尝试获取锁。这三个变量如下所示：\n\
    \n```java\nprivate static Map<String, DvdDatabase> reservations\n    = new HashMap<String,\
    \ DvdDatabase>();\nprivate static Lock lock = new ReentrantLock();\nprivate static\
    \ Condition lockReleased = lock.newCondition();\n```\n\n清单 5-2 包含了 `reserveDVD`\
    \ 方法。\n\n**清单 5-2.** *reserveDVD 方法*\n\n```java\nboolean reserveDVD(String upc,\
    \ DvdDatabase renter)\n    throws InterruptedException {\n    log.entering(\"\
    ReservationsManager\", \"reserveDvd\", new Object[]{upc, renter});\n    lock.lock();\n\
    \    try {\n        long endTimeMSec = System.currentTimeMillis() + 5000;\n  \
    \      while (reservations.containsKey(upc)) {\n            long timeLeftMSec\
    \ = endTimeMSec - System.currentTimeMillis();\n            if (!lockReleased.await(timeLeftMSec,\
    \ TimeUnit.MILLISECONDS)) {\n                log.fine(renter + \" giving up after\
    \ 5 seconds: \" + upc);\n                return false;\n            }\n      \
    \  }\n        reservations.put(upc, renter);\n        log.fine(renter + \" got\
    \ Lock for \" + upc);\n        log.fine(\"Locked record count = \" + reservations.size());\n\
    \        log.exiting(\"ReservationsManager\", \"reserveDvd\", true);\n       \
    \ return true;\n    } finally {\n        // 确保锁始终被释放，即使抛出异常也不例外\n        lock.unlock();\n\
    \    }\n}\n```\n\n5165CH05.qxd 11/16/05 12:13 PM 第 155 页\n\n第 5 章 ■ DVD 数据库类\n\
    \n**155**\n\n我们决定允许预留任何 UPC，即使该记录不存在。这样，当首次将 DVD 添加到系统时，也可以进行预留。另一种做法是让 `reserveDVD`\
    \ 方法先验证记录是否存在，若不存在则抛出异常。如果存在任何删除方法，我们还需要在获取锁后验证记录是否存在。但若如此，就必须修改 `addDVD` 方法的逻辑，可能还需要修改\
    \ `updateDVD` 方法（请记住，它们都委托给同一个私有方法 `persistDVD`，该方法也可能需要更新）。\n\n我们的 `reserveDVD`\
