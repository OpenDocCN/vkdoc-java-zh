- fmt: '# Project Analysis and Design


    We recommend that you design tests that cover the conditions set forth in a project’s
    written requirements before beginning the development process. Under these conditions,
    if a class provides the functionality detailed in the project requirements without
    failing the prewritten tests, then the test can be considered a success. Additional
    functionality beyond what is required is unnecessary. Writing test cases before
    coding deliverable classes will prevent the overzealous programmer from dwelling
    on functionality that is not required.


    As your project develops, you may find yourself adding to, or changing, methods
    within the class. Be sure to update test clients accordingly as the project classes
    evolve. It is generally recommended that test cases should never be deleted—once
    the test has been written, it provides valuable confirmation that basic functionality
    still works if you modify your deliverable classes.


    > **Note** A unit test simply tests a unit (usually a class) that you have written.
    If your class has a `setDvdName(String dvdName)` method, then your unit test should
    call it, preferably with the various kinds of input it can expect. You should
    do this for every method. Unit testing is not required for the exam, but we strongly
    recommend it as a sanity test. Of course, you should not send your unit tests
    or their results to Sun.


    When the application is ready for system testing, recruit some volunteers to help.
    It is generally best to avoid system-testing your own code—use an unsympathetic
    and unbiased eye to look over the system. When you design the system test, it
    is a good idea to work with the client. If this is not possible (as it is not
    in this project), then use the requirements gathered at the beginning of the project.


    > **Note** A system test simply tests how the various units (usually classes)
    fit together. For example, your client class might need to call your DVD class’s
    `setDvdName(String dvdName)` method. Even though you know the client and the DVD
    class both work correctly from the unit test, you don’t know if they work well
    together. For example, there might be a network problem or the client class might
    store DVD names as an array of characters, where the DVD class uses `String`.
    System testing enables you to make sure that all of your classes play nicely together.


    ## Organizing a Project


    One of the first tasks in any software project is determining a sound organization
    for all related project materials. An organizational paradigm, in this case, is
    a directory structure aimed at organizing all files associated with the project.
    It is extremely difficult to decide such matters later in the development process
    and attempt a retrofit. You should decide upon a directory structure early in
    the project planning stage. A typical project directory structure follows. Sun
    does not dictate a directory structure for the development of the SCJD assignment;
    however, on some assignments they do specify some top-level directories to be
    used in the submission. The directory structure in Table 2-1 acts as a suggested
    organizational foundation for the assignment. We use the structure detailed in
    Table 2-1 throughout this book’s example application project.


    **Table 2-1.** *Suggested Directory Structure*


    | **Subdirectory** | **Recommended Use** |

    |------------------|----------------------|

    | `src\` | Contains all of the `.java` source files written during the course
    of the project. |

    | `classes\` | Contains all compiled class files and any packaged JAR files. The
    classpath will point to this directory when we are running our application. |

    | `bkp\` | A directory to hold any files needed for backup. |

    | `tst\` | Contains all of the `.java` source files written for unit-testing the
    project. |

    | `tmp\` | A “hold anything” directory for temporary storage. |

    | `log\` | A directory to store all logged output. |

    | `doc\` | Holds all documentation, including Javadocs, end-user documentation,
    and design decisions documentation. |


    ## High-Level Documentation


    In addition to completing the code portion of the test, to pass the SCJD exam
    you must author and submit several forms of documentation. At the time of writing,
    the following documentation is required:


    - Javadoc documentation (discussed in depth later in this chapter).

    - A plain text file named `version.txt`.

    - User instructions—unless the user instructions are built into your application
    and available while the application is running.

    - A design decisions document. The design decisions document is discussed in detail
    in the following section.


    The `version.txt` file must contain an explanation of the following items:


    - The version of the JDK used for development

    - The development platform


    This book uses JDK version 5 and Microsoft Windows 2000.


    > **Caution** There are currently several different Sun assignments in use, and
    instructions may vary between assignments. Sun may also release assignments in
    the future with other minor differences in the instructions. While the information
    in this book will be generally applicable to any current assignment, you must
    take care to read the instructions you have received from Sun carefully, and ensure
    that you follow them.


    ### What Extra Files Should You Include in Submissions?


    We often see questions from candidates asking whether they should include their
    test cases and/or their class diagrams in their submission.


    Our general recommendation is not to include anything that you have not been asked
    for. The latest instructions from Sun include a comment that you will not be given
    extra marks for anything you do outside of the requirements, so you are not going
    to gain anything by providing the assessor with these extra files.


    However, it is unfortunately possible that in providing these files you may inadvertently
    lower your score simply by making a mistake that the assessor notices in a file
    that you didn’t need to provide.


    The one time we might consider changing this general recommendation is where the
    additional files make it much simpler to understand your submission. A class diagram
    might be one such example (however, the assignment is simple enough that if you
    need a class diagram to understand the submission, then you have probably overcomplicated
    your solution).


    User directions are essential. After all, if you do not explain to the client
    how to use the application, then the application is rendered useless. As a result,
    you should take great care when writing these instructions. The only safe assumption
    you as the developer can make is that the end user has no experience with this
    particular application. Every step, no matter how minute, must be detailed in
    the instructions. After you list the instructions, test their clarity by handing
    them off to unsuspecting friends (preferably nonprogrammers). If they can follow
    the instructions, then the instructions are adequate.


    > **Caution** The current assignment instructions specify that the instructions
    you write may be placed in a specific directory or may be available online. This
    directive has caused confusion in the past, as some candidates have felt that
    this might mean that this requires them to run a web server—but this is not the
    case. Sun only requires that the assessor have access to the instructions, which
    can be achieved if the instructions are in the required directory, or alternatively
    can be called up from within your application (for example, pressing the F1 key
    in Microsoft Word will bring up “online help” even if you do not have an Internet
    connection).


    ## Design Decisions Document'
