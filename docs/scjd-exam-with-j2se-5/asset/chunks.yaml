    \n最后，释放互斥锁。\n\n**逻辑释放方法**\n"
- fmt: "`releaseDVD()`方法是前面展示的`reserveDVD()`方法的对应部分，代码非常相似。\n\n```\nvoid releaseDvd(String\
    \ upc, DvdDatabase renter) {\n\n    log.entering(\"ReservationsManager\", \"releaseDvd\"\
    , new Object[]{upc, renter});\n\n    lock.lock();\n\n    if (reservations.get(upc)\
    \ == renter) {\n\n        reservations.remove(upc);\n\n        log.fine(renter\
    \ + \" released lock for \" + upc); lockReleased.signal();\n\n    } else {\n\n\
    \        log.warning(renter + \" cant release lock for \" + upc + \": not owner\"\
    );\n\n    }\n\n    lock.unlock();\n\n    log.exiting(\"ReservationsManager\",\
    \ \"releaseDvd\");\n\n}\n```\n\n首先，我们确保获得了互斥锁`Lock`；然后，如果释放锁的是该预约的所有者，我们从映射中移除锁的标记。接着，我们通知所有等待的线程，它们可以尝试获取锁。如果向此方法传递了错误的租户实例，则会记录一条警告消息。最后，我们释放互斥锁`Lock`。\n\
    \n## 讨论点：死锁处理\n\n当线程被永久阻塞，等待一个永远不会发生的条件时，就会发生死锁。第4章从线程角度讨论了死锁处理，但同样的问题也适用于应用逻辑层面。考虑以下情况：两个客户端都试图以不同的顺序获取同两条记录的逻辑锁，如下例所示：\n\
    \n- 客户端A获取记录1的逻辑锁。\n- 客户端B获取记录2的逻辑锁。\n- 客户端A尝试获取记录2的逻辑锁。\n- 客户端B尝试获取记录1的逻辑锁。\n\
    \n我们的`reserveDVD()`方法在5秒后超时。但如果客户端A和客户端B都立即重试获取锁，结果将与没有超时一样：两个线程将实际上陷入死锁。\n\n\
    有多种方法可以防止死锁，其中包括：\n\n- 不允许客户端同时锁定超过一条记录。如果它们无法锁定多条记录，就不会发生逻辑死锁。\n- 只允许客户端按数字顺序锁定记录。根据此规则，在上例中，客户端B将不被允许尝试锁定记录1，并且必须在某个时刻放弃记录2上的锁，从而允许客户端A继续执行。\n\
    - 建立一个专用机制来跟踪哪些锁已被持有以及哪些锁存在争用。每次新锁进入争用状态时，都会检查此机制以确认是否会发生死锁，如果会，则取消该锁。这是所有可能解决方案中最复杂的一种，但所需的代码大多是递归的，稍加思考即可简单编写。\n\
    - 忽略问题。说真的——这是你作业的要求吗？尝试处理此问题是否可能导致你犯错并因此失分？你是否觉得这超出了作业的范围？\n\n我们再次建议你仔细阅读从Sun收到的说明，以确定你需要如何处理死锁（如果需要处理的话）。\n\
    \n然而，如果你的说明完全没有提及这一点，你将需要自行决定是否要处理死锁。你可能想问的一些问题包括：处理死锁是否更专业？处理死锁是否会为代码增加不必要的复杂性？你是否能够使用允许抛出的异常来处理死锁？\n\
    \n无论你决定如何，这都是一个你可能需要记录的设计决策。\n\n## 讨论点：处理客户端崩溃\n\n在本章前面，我们讨论了使用胖客户端的可能性，即客户端负责获取逻辑记录锁并在之后释放它。但是，如果客户端在请求逻辑记录锁之后、释放逻辑记录锁之前的某个时刻崩溃（或只是被关闭）了，会发生什么？在这种情况下，该记录将被永久锁定——没有其他客户端能够再锁定该记录。\n\
    \n同样，有许多可能的解决方案，其中包括：\n\n- 使用更瘦的客户端（客户端仅调用服务器上的`rentDVD()`方法，而服务器同时调用`reserveDVD()`和`releaseDVD()`方法）将完全绕过此问题。锁永远不会变得完全不可用。我们建议你参考本章前面关于胖/瘦客户端的章节，以了解其影响（并可能加入JavaRanch上关于此主题的讨论）。\n\
    - 如果我们采用套接字网络解决方案，那么当客户端断开连接时，为客户端服务的服务器线程将收到一个异常。如果该线程跟踪已授予了哪些锁，则可以在收到此异常时释放它们。\n\
    - 如果我们有一个服务器工厂，使用唯一的`DvdDatabase`对象作为客户端标识符，我们可以将预约数据存储在`WeakHashMap`中，以客户端标识符作为键。当客户端断开连接时，该客户端的`DvdDatabase`将（最终）被垃圾回收，锁也会自动从`WeakHashMap`中移除。在这种情况下，我们可能需要一个单独的线程来监控`WeakHashMap`，以便它可以通知任何等待的线程某个预约已被清除。\n\
    - 如果我们有一个服务器工厂，为每个RMI客户端提供唯一的工作者，我们可以让工作者实现`java.rmi.server.Unreferenced`。在RMI客户端断开连接后的某个时刻，将调用此接口的`unreferenced()`方法。如果工作者实例跟踪了已授予哪些锁，则可以在调用`unreferenced()`时释放它们。\n\
    - 忽略问题。再次强调，说真的——这是你作业的要求吗？尝试处理此问题是否可能导致你犯错并因此失分？你是否觉得这超出了作业的范围？\n\n我们再次建议你仔细阅读从Sun收到的说明，以确定你需要如何处理客户端崩溃（如果需要处理的话）。然而，如果你的说明完全没有提及这一点，你将需要自行决定是否要处理锁可能永远不会被释放的情况。你可能想问的一些问题包括：处理断开的客户端是否更专业？处理断开的客户端是否会为代码增加不必要的复杂性？\n\
    \n无论你决定如何，请记住，这是一个你可能需要记录的设计决策。\n\n## 讨论点：多个通知对象\n\n考虑一下，如果有100个线程都在等待预约不同的记录，会发生什么。当一个线程释放它对任何一条记录的锁时，它会调用`lockReleased.signal()`，并且*所有100个线程*都会收到锁已被释放的通知，因此所有100个线程都会尝试重新获取锁互斥体并检查被释放的是否是它们感兴趣的那条记录——而很可能被释放的记录对它们中的任何一个都不感兴趣！因此，每次释放记录时都会出现CPU活动的突发高峰，可能会降低服务器的整体生产力。\n\
    \n更好的解决方案是让每个线程仅在其感兴趣的记录变为可用时才收到通知。\n\n在JDK 1.4下，这很难实现；你必须同步不同的对象才能确保只有特定的线程收到通知。在JDK\
    \ 5下，你可以让所有线程获取同一个对象的锁，但使用不同的`Condition`来指定它们应在何种条件下被通知。"
