    C H A P T E R 2 ■ P R O J E C T A N A LYS I S A N D D E S I G N


    **15**


    some of the alternatives such as “Head First Design Patterns” by Elisabeth Freeman,
    Eric Freeman, Bert Bates, and Kathy Sierra (O’Reilly, 2004), the Portland Pattern
    Repository at http://c2.com/ppr/index.html, or the Wikipedia entries for design
    patterns starting at http://en.wikipedia.org/wiki/Design_pattern_(computer_science).
    Sun’s J2EE design patterns at http://java.sun.com/blueprints/patterns/ are also
    very useful, but you should be aware that they are J2EE-centric, and may describe
    patterns in a form that may not seem to make sense for this assignment.


    **Documenting Design Decisions**


    Document the choices that you make during the development process. Write down
    the various decisions you make and the reasons you make them. For example, if
    you decide to use an ArrayList instead of a Vector for an internal data structure,
    document the fact the ArrayLists are not synchronized and thus were chosen because
    they are a more lightweight data structure. There is no need to go overboard with
    this type of documentation, so be mindful to use common sense. This sort of documentation
    is a crucial tool in debugging and performance tuning, and it also serves as an
    excellent source for anyone who needs to understand the code.


    Whatever you do, don’t leave documenting your design decisions until the end of
    the project. If you wait until after you have completed coding before beginning
    this document, not only will you have to remember why you chose a particular option,
    but you will also have to remember that you had other options in the first place!
    For example, if you decided at the start of the assignment that you were going
    to use a custom dialog box, at the end of the assignment you might have forgotten
    that you had originally also considered having an editable cell on the main window.


    It is quite possible that by the time you get to the end of the assignment, you
    may find that your design decisions document is huge—minor decisions can be removed
    to reduce the size of the document.


    ■**Tip** You might want to use bullet points to describe your design decisions.
    Not only will this reduce the amount you write, but also they are easier to remember
    when it comes time for the exam. This is especially useful for candidates for
    whom English is not their first language—you will not have to be so concerned
    about how good your spelling is or how well you have formed your sentences.


    For instance, we might document a few decisions like so:


    • Sockets used instead of RMI—allows complete control over threads


    • RandomAccessFile used instead of separate DataInputStream and DataOutputStream
    classes—allows for random access to the file


    **Testing**


    You should begin testing by writing a unit test client for each class, or you
    can use a testing tool such as JUnit (http://www.junit.org/) to automatically
    generate test clients. When you design a custom test, it is best to write the
    test class before implementing the methods to be'
  trans: '

    虽然针对通用问题实现自定义解决方案是可行的，而且通常很巧妙，但在本项目及 Sun 的考试中，你应抵制这种诱惑。然而在现实生活中，自定义解决方案有时比通用方案更快、成本更低。例如，一个自定义的数组元素排序方法可能比
    `Arrays` 类内置的方法更快。


    由于本书的重点并非软件设计模式，因此书中无法涵盖所有设计模式。我们强烈建议你自行阅读相关内容，因为在你的开发职业生涯中将会用到它们。该领域最广为人知的著作是
    Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides 合著的 *设计模式*（Addison-Wesley
    Professional, 1995）。这本书通常被称为“四人组”（Gang of Four，简称 GOF）著作。你可能会发现这本书并不容易阅读，因此你可能希望了解一些替代读物，例如
    Elisabeth Freeman、Eric Freeman、Bert Bates 和 Kathy Sierra 合著的《深入浅出设计模式》（O''Reilly,
    2004）、波特兰模式知识库（http://c2.com/ppr/index.html），或维基百科上关于设计模式的条目（起始于 http://en.wikipedia.org/wiki/Design_pattern_(computer_science)）。Sun
    的 J2EE 设计模式（http://java.sun.com/blueprints/patterns/）也非常有用，但你应该意识到它们是以 J2EE 为中心的，并且可能以某种形式描述模式，这种形式对于本作业来说可能显得不合逻辑。


    **记录设计决策**


    记录你在开发过程中做出的选择。写下你做出的各种决策及其原因。例如，如果你决定使用 `ArrayList` 而不是 `Vector` 作为内部数据结构，请记录这样一个事实：`ArrayList`
    是非同步的，因此被选中是因为它是一种更轻量级的数据结构。无需过度进行此类文档记录，因此请务必运用常识。这类文档是调试和性能调优的关键工具，同时也是任何需要理解代码的人的重要参考来源。


    无论你做什么，都不要将记录设计决策的工作留到项目结束。如果你等到完成编码后才开始编写这份文档，你不仅需要回忆当初为何选择某个特定选项，还需要首先回忆起你当初还有其他选项！例如，如果你在作业开始时决定使用自定义对话框，那么在作业结束时，你可能已经忘记了你最初还考虑过在主窗口上使用可编辑单元格。


    很可能当你完成作业时，你会发现你的设计决策文档非常庞大——可以删除次要决策以缩减文档篇幅。


    ■**提示** 你可能希望使用项目符号来描述你的设计决策。这不仅会减少你的书写量，而且在考试时也更容易记住。这对于母语非英语的考生尤其有用——你无需过分担心拼写是否正确或句子是否通顺。


    例如，我们可以像这样记录几个决策：


    • 使用 Socket 而非 RMI——允许完全控制线程

    • 使用 `RandomAccessFile` 而非独立的 `DataInputStream` 和 `DataOutputStream` 类——允许对文件进行随机访问


    **测试**


    你应该通过为每个类编写单元测试客户端来开始测试，或者使用诸如 JUnit（http://www.junit.org/）之类的测试工具来自动生成测试客户端。当你设计自定义测试时，最好在实现待测试方法之前编写测试类。

