    **What It Does**


    %tT


    Declares that the corresponding argument after the format string should be displayed
    as time (the lowercase t), and that the time format should be 24-hour format (the
    uppercase T)


    %8s


    Declares that the corresponding argument after the format string should be displayed
    right justified in a minimum of 8 characters, and it should be a String (the lowercase
    s)


    %n


