    通用数据库位置框架


    现在我们已经解释了 GridBagLayout 的基础知识，可以展示创建用于显示数据库位置的通用框架的代码了。


    ConfigOptions 构造函数存储一个局部变量以显示其配置的模式，然后构造一个 GridBagLayout，组件之间在各个方向上的间距为 2 像素。


    无论我们处于哪种模式，都将显示数据库位置字段的标签，因此接下来我们添加该标签。

