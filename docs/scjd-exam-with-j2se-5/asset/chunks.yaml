    \ 5 章“创建我们的逻辑预留方法”一节中展示了使用类似 `Lock.await(time, unit)` 方法的示例。虽然 SCJD 作业不要求使用此技术，但现在可以设置多个条件，线程可以基于这些条件被通知。\n\
    \n尽管新的锁定代码看起来与使用 `synchronized` 块不同，但将代码从一种风格转换为另一种风格并不太难。例如，以下代码使用了 `synchronized`\
    \ 块：\n\n```java\nObject lock = new Object();\n\npublic void doSomething() {\n\
    \    synchronized (lock) {\n        while (true) {\n            try {\n      \
    \          lock.wait();\n                // 此处发生某些操作\n            } catch (InterruptedException\
    \ ie) {\n                // 处理异常\n            }\n        }\n    }\n}\n```\n\n\
    这段代码可以改为如下新格式：\n\n```java\nprivate static Lock lock = new ReentrantLock();\nprivate\
    \ static Condition lockReleased = lock.newCondition();\n\npublic void doSomething()\
    \ {\n    lock.lock();\n    try {\n        while (true) {\n            lockReleased.await();\n\
    \            // 此处发生某些操作\n        }\n    } catch (InterruptedException ie) {\n\
    \        // 处理异常\n    } finally {\n        lock.unlock();\n    }\n}\n```\n\n5165CH04.qxd\
    \ 11/16/05 12:11 PM 第 98 页\n\n**98**\n\n第 4 章 ■ 线 程\n\n第 5 章的“创建我们的逻辑预留方法”一节中展示了使用新锁定类的示例，同一章的“讨论点：多个通知对象”一节中则提出了进一步的思考。\n\
    \n为了确保锁被释放，我们强烈建议像前面演示的那样，将对 `unlock` 的调用放在 `finally` 块中。\n\n无论你使用 `synchronized`\
    \ 块还是新的并发类，线程安全的规则都是相同的。\n\n**锁定总结**\n\n对象锁和对象内成员变量上的锁不会以任何方式相互作用。\n\n也就是说，同步一个对象并不会锁定该对象的成员变量。同样，同步一个成员变量也不会锁定拥有该变量的对象。只要不共享对同一个对象的锁，持有不同对象锁的线程就可以并发运行。此外，锁定一个类并不会锁定该类的实例。对成员变量的非同步访问可能会破坏线程安全性。\n\
    \n**理解线程安全**\n\n线程编程存在独特的逻辑陷阱，这些陷阱常常会出乎意料且看似随机地出现。在本节中，我们将定义一些常见的陷阱，并提供避免它们的建议。以下小节将解释什么是线程安全，以及它有助于防止哪些可怕的问题。\n\
    \n**死锁**\n\n*死锁*发生在线程被永久阻塞，等待一个永远无法发生的条件时。\n"
- fmt: '# Deadlock


    `Deadlock` is like a cartoon where Daffy Duck and Bugs Bunny are stranded on an
    island. Daffy has a can of food, and Bugs has a can opener. Daffy won’t give up
    the food until he gets the can opener, and Bugs won’t give up the can opener until
    he gets some food. They are deadlocked.


    In Listing 4-8, you can see that `thread1` acquires a lock on `lock1` but needs
    `lock2`. `thread2` has acquired a lock on `lock2` and needs to acquire `lock1`.
    Neither thread will allow the other thread to progress, nor will it progress itself.
    This is deadlock. Figure 4-7 shows the output.


    **Listing 4-8.** *Deadlock Example*


    ```

    1 public class DeadlockExample {

    2   /**

    3    * Entry point to the application. Creates 2 threads that will deadlock.

    4    */

    5   public static void main(String args[]) {

    6     DeadlockExample dle = new DeadlockExample();

    7

    8     Object lock1 = "Lock 1";

    9     Object lock2 = "Lock 2";

    10

    11     Runner thread1 = new Runner(lock1, lock2);

    12     Runner thread2 = new Runner(lock2, lock1);

    13

    14     thread1.start();

    15     thread2.start();

    16   }

    17

    18   /**

    19    * Lock two objects in the order they were specified in the constructor.

    20    */

    21   static class Runner extends Thread {

    22     private Object lockA;

    23     private Object lockB;

    24

    25     public Runner(Object firstLockToGet, Object secondLockToGet) {

    26       this.lockA = firstLockToGet;

    27       this.lockB = secondLockToGet;

    28     }

    29

    30     public void run() {

    31       String name = Thread.currentThread().getName();

    32       synchronized (lock1) {

    33         System.out.println(name + ": locked " + lockA);

    34         delay(name);

    35         System.out.println(name + ": trying to get " + lockB);

    36         synchronized (lock2) {

    37           System.out.println(name + ": locked " + lockB);

    38         }

    39       }

    40     }

    41   }

    42

    43   /**

    44    * build in a delay to allow the other thread time to lock the object

    45    * the delaying thread would like to get.

    46    */

    47   private static void delay(String name) {

    48     try {

    49       System.out.println(name + ": delaying 1 second");

    50       Thread.sleep(1000L);

    51     } catch (InterruptedException ie) {

    52       ie.printStackTrace();

    53     }

    54   }

    55 }

    ```


    ![Image 10](index-119_1.png)


    **Figure 4-7.** *Output from the deadlock example*


    This is an example of bad design. There is almost always a better way to handle
    these sorts of situations than resorting to nested locks. If you find yourself
    unable to come up with a solution, reconsider the larger design of your project.
    Sun gives difficult problems on the SCJD exam, but most can be solved elegantly.


    ## Race Conditions


    Race conditions occur when two or more threads compete for the same resource,
    and the behavior of the program changes depending on who wins. For example, you
    and Johnson race to get be the first person to reach the test server in the morning.
    Depending on who wins, the server is tied up for a few minutes or for a few hours.
    Thus, based on somewhat random factors—say, who got stuck in traffic that morning—your
    program’s behavior changes. This is rarely a good thing. Race conditions can be
    very difficult to track down because they happen sporadically and thus are difficult
    to reproduce.


    Race conditions can also lead to deadlock because locks could be achieved in an
    order other than the one expected. Thus, your application, which had always achieved
    `lock1` followed by `lock2`, could suddenly achieve `lock2` first and attempt
    to release those locks in an unexpected order.


    These sorts of problems are manifested when your application appears to “spontaneously”
    generate new behaviors, as shown in Listing 4-9. They are difficult to debug and
    often difficult to reproduce. That’s why it’s so important to make design decisions
    that will steer you clear of the general dangerous area of race conditions. Figure
    4-8 shows the output of our example.


    **Listing 4-9.** *Race Condition Example*


    ```

    1 public class RaceConditionExample {

    2   public static void main(String args[]) {

    3     //create an instance of this object

    4     RaceConditionExample rce = new RaceConditionExample();

    5   }

    6 }

    ```'
