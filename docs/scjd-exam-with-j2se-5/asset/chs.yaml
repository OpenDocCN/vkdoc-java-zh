  \ 公司在 SCJD\n\n考试中会出一些难题，但大多数问题都可以优雅地解决。\n\n**竞态条件**\n\n当两个或多个线程竞争同一个资源，并且程序的行为取决于谁获胜时，就会发生竞态条件。例如，你和约翰逊比赛谁先到达早上的测试服务器。根据谁获胜，服务器可能会被占用几分钟或几个小时。因此，基于一些随机的因素——比如那天早上谁遇到了交通堵塞——你的程序行为就会发生变化。这通常不是什么好事。竞态条件可能非常难以追踪，因为它们偶尔发生，因此难以重现。\n\
  \n竞态条件也可能导致死锁，因为锁的获取顺序可能出乎意料。因此，你的应用程序原本总是先获取 lock1 再获取 lock2，却可能突然先获取 lock2，并尝试以意外的顺序释放这些锁。\n\
  \n当你的应用程序似乎“自发地”产生新行为时，就会出现这类问题，如代码清单 4-9 所示。这些问题很难调试，而且通常难以重现。这就是为什么做出能够让你远离竞态条件这一普遍危险区域的设计决策如此重要。图\
