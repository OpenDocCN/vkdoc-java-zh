  \ JPanel*\n\n在清单 8-28 中，我们将看到通用框架的构造函数会根据构造函数中的参数更改显示的选项和工具提示文本。这使我们能够为独立客户端、网络客户端和服务器应用程序使用相同的框架。\n\
  \n对于主客户端 GUI，我们使用了简单的图形布局管理器：BorderLayout 和 FlowLayout。这些布局管理器在大多数情况下都能满足需求。然而，在某些情况下，您可能会发现需要使用这些简单布局管理器难以实现的形式来布局面板。通用框架就是这样一个例子——我们希望最多有四行组件，但每个组件都有一个标签，我们希望将其在右侧垂直对齐。\n\
  \n在本节中，我们将介绍最强大的布局管理器之一——GridBagLayout。我们特意将介绍这个布局管理器推迟到现在，因为它比其他布局管理器使用起来更复杂。\n\
  \n■**提示** 尽管这个布局管理器非常强大，并且在 Denny's DVD 示例应用程序中运行良好，但您可能会发现您的应用程序中不需要使用这个布局管理器。我们建议您使用最适合您的简单解决方案——证明您能使用所有布局管理器并不会获得额外加分。\n\
  \nGridBagLayout\n\nJava 有两种基于网格的布局管理器：GridLayout 和 GridBagLayout 管理器。\n\nGridLayout\
  \ 是两者中较简单的一个；然而，它强制网格中的所有单元格大小相同，如图 8-32 所示。生成此图的程序如清单 8-25 所示。\n\n![Image 49](img/index-294_1.png)\n\
  \n5165CH08.qxd 11/16/05 12:16 PM Page 275\n\n\n\n第 8 章 ■ 图形用户界面\n\n**275**\n\n**清单\
  \ 8-25.** *一个简单的 GridLayout 应用* import java.awt.*;\n\nimport javax.swing.*;\n\n\
  public class MyFrame {\n\npublic static void main(String[] args) throws Exception\
  \ {\n\nJFrame theFrame = new JFrame();\n\ntheFrame.setLayout(new GridLayout(2,2));\n\
  \ntheFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE); theFrame.add(new JButton(\"\
  One\"));\n\ntheFrame.add(new JLabel(\"A very long component\")); theFrame.add(new\
  \ JTextField(\"Three\"));\n\ntheFrame.add(new JTextArea(\"Four\\nFive\\nSix\"));\
  \ theFrame.pack();\n\ntheFrame.setVisible(true);\n\n}\n\n}\n\n**图 8-32.** *GridLayout\
  \ 示例，展示一致的单元格大小* 如图 8-32 所示，所有组件的宽度都与最长组件（内容为“A very long component”的 JLabel）的宽度相同，所有组件的高度都与最高组件（包含多行文本的\
  \ JTextArea）的高度相同。\n\n虽然当大多数组件大小相同时，这种布局非常有用，但当组件大小差异较大时（就像我们常见框架中的情况），它就不太适用了。如果我们使用\
  \ GridLayout，那么分配给标签的空间将与分配给最大组件（数据库位置字段）的空间相同。\n\nGridBagLayout 同样基于单元格网格工作；然而，组件可以占据多个单元格，列的宽度根据不跨多列的最宽列计算，行的高度根据该行中不跨多行的最高组件计算。\n\
  \n我们将从一个简单的示例开始，该示例包含与图 8-32 中相同的组件，但这次我们将使用 GridBagLayout。清单 8-26 展示了创建图 8-33 所示\
  \ GUI 的程序。\n\n![Image 50](img/index-295_1.png)\n\n5165CH08.qxd 11/16/05 12:16 PM\
  \ 第 276 页\n\n**276**\n\n第 8 章 ■ 图形用户界面\n\n**清单 8-26.** *一个类似于清单 8-25 的简单 GridBagLayout\
  \ 应用*\n\nimport java.awt.*;\n\nimport javax.swing.*;\n\npublic class MyFrame {\n\
  \nstatic GridBagLayout grid = new GridBagLayout();\n\nstatic GridBagConstraints\
  \ constraints = new GridBagConstraints(); public static void main(String[] args)\
  \ throws Exception {\n\nJFrame theFrame = new JFrame();\n\ntheFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\
  \ theFrame.setLayout(grid);\n\nconstraints.anchor = GridBagConstraints.WEST;\n\n\
  JButton one = new JButton(\"One\");\n\ngrid.setConstraints(one, constraints);\n\n\
  theFrame.add(one);\n\nconstraints.gridwidth = GridBagConstraints.REMAINDER;\n\n\
  theFrame.add(constrain(new JLabel(\"A very long component\"))); constraints.weightx\
  \ = 0.0;\n\nconstraints.gridwidth = 1;\n\ntheFrame.add(constrain(new JTextField(\"\
  Three\"))); theFrame.add(constrain(new JTextArea(\"Four\\nFive\\nSix\"))); theFrame.pack();\n\
  \ntheFrame.setVisible(true);\n\n}\n\nprivate static Component constrain(Component\
  \ c) {\n\ngrid.setConstraints(c, constraints);\n\nreturn c;\n\n}\n\n}\n\n**图 8-33.**\
  \ *GridBagLayout 示例，展示不一致的单元格大小*\n\n5165CH08.qxd 11/16/05 12:16 PM 第 277 页\n\n第\
  \ 8 章 ■ 图形用户界面\n\n**277**\n\n如图 8-33 所示，组件不再被迫与最高和最宽的组件保持相同的高度和宽度。第一行的高度与第二行的高度无关，第一列的宽度与第二列的宽度也无关。\n\
  \n使用 GridBagLayout 的基本概念是：配置要用于组件的约束，将这些约束通知给 GridBagLayout 管理器，然后将组件添加到面板中。以下来自清单\
  \ 8-26 的代码片段很好地说明了这一点：constraints.anchor = GridBagConstraints.WEST;\n\nJButton one\
  \ = new JButton(\"One\");\n\ngrid.setConstraints(one, constraints);\n\ntheFrame.add(one);\n\
  \n在此代码片段之前，约束被设置为默认值（从第 1 行第 1 列开始，在网格中居中，占据一个网格位置等）。第一行更改了每个组件的位置，使它们现在左对齐。然后我们创建了组件，并通知\
  \ GridBagLayout 将指定的约束用于该特定组件。最后，我们将组件添加到面板中。\n\n■**注意** 整个应用程序只使用一组约束——当调用 setConstraints\
  \ 方法时，布局管理器会克隆所提供的约束。这使开发更加容易，因为你可以在布局代码的开头设置通用的约束配置，并在整个程序中使用这些约束。\n\n由于组件可以跨多行和多列，GridBagLayout\
  \ 无法确定某个组件是否是最后一个组件。因此，在将最后一个项目添加到第 1 行之前，我们必须通过约束指定这将是该行中的最后一个组件。以下代码行实现了这一点：\n\
  \nconstraints.gridwidth = GridBagConstraints.REMAINDER;\n\n如前所述，我们对所有组件使用同一组约束。我们设置约束以指定该组件将是行中的最后一个组件，然后在将组件添加到容器时使用该约束。但是，如果我们不重置约束，所有后续组件也将显示为行中的最后一个组件。以下代码行实现了重置：\n\
  \nconstraints.gridwidth = 1;\n\n为了结束本节，我们将演示如何指定组件跨多行或多列。实现此功能的程序如清单 8-27 所示，输出如图\
  \ 8-34 所示。\n\n![Image 51](img/index-297_1.png)\n\n5165CH08.qxd 11/16/05 12:16 PM\
  \ 第 278 页\n\n**278**\n\n第 8 章 ■ 图形用户界面\n\n**清单 8-27.** *一个演示组件跨多个单元格的 GridBagLayout\
  \ 应用* import java.awt.*;\n\nimport javax.swing.*;\n\npublic class MyFrame {\n\n\
  static GridBagLayout grid = new GridBagLayout();\n\nstatic GridBagConstraints constraints\
  \ = new GridBagConstraints(); public static void main(String[] args) throws Exception\
  \ {\n\nJFrame theFrame = new JFrame();\n\ntheFrame.setDefaultCloseOperation(JFrame.EXIT_ON_CLOSE);\
  \ theFrame.setLayout(grid);\n\nconstraints.fill = GridBagConstraints.BOTH;\n\nconstraints.gridheight\
  \ = 2;\n\ntheFrame.add(constrain(new JButton(\"Deep\"))); constraints.gridheight\
  \ = 1;\n\nconstraints.gridwidth = GridBagConstraints.REMAINDER;\n\ntheFrame.add(constrain(new\
  \ JButton(\"Wide\"))); constraints.gridwidth = 1;\n\ntheFrame.add(constrain(new\
  \ JButton(\"One\"))); theFrame.add(constrain(new JButton(\"Two\"))); theFrame.pack();\n\
  \ntheFrame.setVisible(true);\n\n}\n\nprivate static Component constrain(Component\
  \ c) {\n\ngrid.setConstraints(c, constraints);\n\nreturn c;\n\n}\n\n}\n\n**图 8-34.**\
