  \n}\n\n}\n\n**JTable 组件**\n\n正如本章前面所讨论的，表格范式已发展成为一种事实上的数据展示机制。你可能还记得，表格模式是一种极佳的数据展示方式，因为它便于用户解读，并能高效地在有限区域内显示大量数据。\n\
  \nJTable 以熟悉的“数据表格”样式呈现数据。对于开发者而言，它是易用性与可扩展性的完美结合。你可以通过简单地调用 JTable 构造方法 `JTable\
  \ (Object rowData [][], Object columnNames[])` 并定义两个包含表头名称和数据行的数组来创建一个临时使用的 JTable，如清单\
  \ 8-9 所示。\n\n**清单 8-9.** *一个简单的 JTable 构造方法*\n\nObject [ ][ ] rows = {{\"Data 1\"\
  , \"Data 2\"}, {\"Data 3\", \"Data 4\"},\n\n{\"Data 6\", \"Data 6\"} };\n\nObject\
  \ [ ] colNames = {\"Header 1\", \"Header 2\"}; JTable table = new JTable (rows,\
  \ colNames);\n\n清单 8-9 创建了一个由三行组成的表格。该表格如图 8-19 所示。\n\n**图 8-19.** *一个示例表格*\n\n\
  请注意，每一行都带有一个表头标签。如果未指定表格表头数组，表格将仅显示行和列，而不显示任何表头。另外，表格列会自动调整大小，但也可以调整大小甚至重新排列。可以在\
  \ JTable 实例上调用以下方法来启用或禁用这些功能：\n\n• setSelectionMode(ListSelectionModel.SINGLE_SELECTION)\n\
  \n• setAutoResizeMode(JTable.AUTO_RESIZE_ALL_COLUMNS)\n\n如果表格中的数据只需显示一次，上述表格示例是完美的，但该示例并非一种非常灵活的数据展示方法。为了成为更灵活的数据展示方式，一个好的表格类需要额外的方法和构造方法，以适应\
  \ MVC 模式的范式。恰好，JTable 非常契合这种模式——以至于 JTable 实际上定义了自己的模型：TableModel 接口。\n\n■**注意**\
  \ 许多 Swing 组件，例如 JTable 和 JTree，都实现了自己的 MVC 架构。\n\n**TableModel**\n\nTableModel\
  \ 是在 JTable 中展示数据集最简单、最灵活的方式之一。\n\n本章前面详细讨论了 MVC 模式中模型与视图之间的交互。你可能还记得，视图仅负责获取模型对象中包含的数据并将其转换为可视化表示。JTable\
  \ 实际上将 MVC 模式的这一部分融入了其标准 API。在这种情况下，已实现的 TableModel 接口充当模型，而 JTable 实例充当视图。\n\n\
  TableModel 本质上被传递给 JTable 实例，然后表格组件将数据模型渲染为可视化表示。可以在 JTable 构造方法中指定模型：\n\nJTable\
  \ table = new JTable (TableModel model);\n\n或者通过 `void setTableModel (TableModel\
  \ model)` 实例方法设置。一旦 TableModel 被传递给表格实例，JTable 类就会处理其余的工作。\n\n此时，JTable 可能看起来很容易使用。虽然\
  \ JTable 确实易于使用，但开发者的主要工作在于实现 TableModel 接口。\n\n与事件监听器接口类似，对于给定的数据集，TableModel 接口中指定的方法并非总是必需的。例如，如果开发者想要实现一个简单的\
