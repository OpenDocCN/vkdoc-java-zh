  \ 是一个受检异常，因此必须包含在 try/catch 块中，或在任何使用远程对象的对象的方法签名中指定。RemoteException 可能由以下任一原因引起：\n\
  \n• 服务器宕机、不可达，或已终止与客户端的通信。\n\n• 在参数和返回值的编组过程中遇到错误。\n\n创建远程对象还需要另一个接口。还必须扩展抽象类 java.rmi.RemoteObject，如图\
