  \n**饥饿**\n\n当线程永远没有机会运行时，就会发生饥饿。其最常见的表现形式是，高优先级线程持续获得比低优先级线程更优的待遇。想象一下，你的任务需要与公司的首席技术官交谈。\n\
  \n然而，每次她似乎有空的时候，一位高级主管就会介入，占用了你本打算使用的那段时间。这可能有非常合理的原因，但最终结果是你永远无法与她交谈（你的线程永远没有机会运行）。\n\
  \n清单 4-10 中的示例展示了一个人为构造的例子，其中三个高优先级线程和一个低优先级线程都试图使用同一资源。\n\n**清单 4-10.** *饥饿示例*\n\
