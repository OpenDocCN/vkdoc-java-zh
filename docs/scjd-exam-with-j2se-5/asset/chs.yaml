  \ = composer;\n214 log.exiting(\"DVD\", \"setComposer\", this.composer);\n215 }\n\
  \n使用 getter 和 setter（之所以这样命名，是因为方法的第一个动词是 get 或 set）使我们能够只暴露我们想要暴露的方法部分，并只允许对它们执行某些操作。例如，我们可能决定\
  \ DVD 的副本数量永远不能低于零；如果我们允许客户端直接修改该字段，那么他们可以将其设置为任何他们喜欢的数字，包括负数。但是，通过为 DVD 数量设置一个\
  \ setter，我们可以包含业务逻辑，以确保客户端不能设置负数。\n\n■**注意** 在第 200 行，我们调用了 log.entering，然后紧接着在第\
  \ 201 行调用了 log.exiting。\n\n一如既往，这里需要做出一个设计决策：我们是创建自己的日志消息（可能调用 log.finer），还是使用这两个实际上并未提供太多有用信息的调用？同样，没有一种“正确”的方法来处理这个问题。我们选择的方法的缺点是我们提供了不必要的日志记录，这不会产生太多有用的信息。然而，从积极的方面来看，我们仍然对**所有**“进入”和“退出”日志消息使用相同的标准日志记录格式——与此形成对比的是，如果我们为这些\
  \ getter 和 setter 编写自己的专用日志方法，那么日志消息很可能会因方法而异。此外，如果我们将来需要在此方法中做更多工作，可以将工作直接放在两条日志消息之间；如果我们创建了自己的专用日志消息，我们可能不得不将其删除并替换为标准日志消息。\n\
  \n为 getter 和 setter 提供的日志记录可能有些过度；然而，它确实突显了一个有价值的调试工具：查看传递给方法的参数以及执行方法后的最终结果非常有用。通过在第\
  \ 212 行记录 composer 方法参数，我们将记录传递给方法的内容，并通过在第 214 行记录 this.composer 实例变量，我们将记录执行 setComposer\
  \ 方法后的最终结果。如果将来此方法被更新（例如，添加代码以确保作曲者姓名每个部分的首字母大写），我们仍然会获得显示输入和结果的日志记录。\n\n5165CH05.qxd\
  \ 11/16/05 12:13 PM 第 124 页\n\n**124**\n\n第 5 章 ■ DVD 数据库类\n\n其余的 getter 和 setter\
