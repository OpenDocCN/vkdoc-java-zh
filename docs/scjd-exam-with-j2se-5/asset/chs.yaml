  \ 12:13 PM Page 140\n\n**140**\n\n第 5 章 ■ DVD 数据库类\n\n■**注意** 即使尚未发生，总有一天你可能会被要求改进某个类的性能。虽然手动通读代码查找已知问题区域可能有用，但始终建议使用性能分析器——这是一种能在程序运行时附加到程序上，并告知程序大部分时间消耗在何处的工具。当你知道哪些方法耗时最长后，就可以专注于改进它们的性能，而非试图修复随机方法。\n\
  \n此处提供的关于改进 `DvdDatabase` 类性能的信息，旨在为讨论该类及 JDK 5 的多个部分提供切入点。这些并非我们优化程序时唯一（甚至最佳）的关注点。\n\
  \n磁盘读写是我们必须处理的最慢操作之一。\n\n我们还可能面临多个用户同时尝试访问不同记录的情况；由于只有一个数据文件，他们必须排队访问该文件，这实际上形成了瓶颈。\n\
  \n在读写记录时，如果能直接定位到文件中存储记录的位置，就能加速操作。如果主键是记录编号，我们就能根据记录编号乘以记录大小，即时计算出文件位置。然而，我们的应用程序使用\
  \ UPC 字符串作为主键，因此需要一种将 UPC 映射到文件位置的方法。唯一的方法是至少读取一次数据文件，在读取过程中将 UPC 和文件位置存储到映射中。\n\
  \n我们可以专门创建一个方法来完成此操作，但必须实现的接口中已有一个公共方法，该方法会读取整个文件并返回该文件中 DVD 的列表，因此我们可以借助该逻辑来填充映射。\n\
  \n但这样做存在风险：我们的构造函数依赖此方法来填充所需字段。然而 `getDVDs` 方法可能被重写，这会导致字段无法被填充。因此，我们应将该方法设为 `final`（阻止任何其他类重写它），或调用一个执行相同功能的私有方法（私有方法与\
  \ `final` 方法类似，因为它们无法被重写——其他类甚至无法看到它们）。\n\n`getDVDs` 方法是一个业务方法。也就是说，我们创建它仅仅是因为业务需求要求如此——即使没有它，我们也能轻松编写客户端应用程序。同样，虽然我们的实现会从头到尾读取整个数据库文件，但也可以采用不同的实现方式，例如不直接访问文件，而是调用其他公共方法（如\
  \ `getDVD` 方法）。鉴于此，将来可能有人决定重写我们的实现，因此将此方法设为 `final` 并不合适。\n\n然而，根据提供的接口，`getDVDs`\
  \ 是我们必须设为公共的方法之一。\n\n幸运的是，针对这一困境，我们有一个简单的变通方案：创建一个执行实际工作的私有方法，然后让 `getDVDs` 方法调用它。这样，即使将来有人重写了\
  \ `getDVDs`，我们的私有方法仍会在后台运行，填充所需的映射。\n\n不过，这仍然不是一个完美的解决方案。使用此方法填充映射时，我们会无谓地创建列表并立即丢弃。通常，创建集合后不加以使用就销毁是不好的做法，但在这种情况下，这样做是完全合理的。只有构造函数会浪费这个列表，而替代方案是创建一个几乎相同但仅用于填充映射的方法。以下是我们\n\
  \n5165CH05.qxd 11/16/05 12:13 PM Page 141\n\n第 5 章 ■ DVD 数据库类\n\n**141**\n\n从文件中读取所有记录，并在过程中填充\
  \ UPC 编号到文件位置的映射的方法，以及调用它的 `getDVDs` 方法：\n\n113 public List<DVD> getDvds() throws\
