  **121**\n\n你可以在代码中声明一个 `static final long serialVersionUID`，如第 19 行所示。请注意，`static\
  \ final` 和 `long` 修饰符是强制性的。可以使用任何访问修饰符，包括我们在此代码中使用的 `private` 修饰符。这使你能够决定对 `Serializable`\
  \ 类的更改是否需要重新编译客户端类。例如，如果我们向 `DVD` 类添加一个额外字段来包含该 DVD 获得的艾美奖提名数量，这不会影响在该字段添加之前编译的客户端；它们仍然能够访问之前能够访问的所有字段。如果你删除了一个字段，情况就**不**同了，即使该字段是你的客户端当前未使用的字段——*可能*它们将无法访问该字段，因此对类的更改将要求客户端重新编译。\n\
  \n如果你没有在 `Serializable` 类中声明 `serialVersionUID`，Java 编译器将根据类的各个方面（例如类名、方法名、字段名等）为你生成一个。如果其中任何一项发生更改，你的\
  \ `serialVersionUID` 也会随之更改。因此，即使对于我们之前添加一个不重要字段的例子，自动生成的 `serialVersionUID` 也会改变。出于这个原因，始终建议你定义自己的\
  \ `serialVersionUID`。（对于那些好奇的人，我们使用的 `serialVersionUID` 只是本书 ISBN 号的最后四位数字。）\n\n\
