  \n**观感**\n\nSwing 支持可插拔的观感。这一特性是 Swing 轻量级组件的一个受欢迎的附带效果，这些组件可以被程序员自定义的设计和功能所覆盖。Ocean\
  \ 观感就是一个典型的例子。这种界面风格可以在任何支持 Java 和图形用户界面的平台上使用，并且可以作为所有平台上的标准界面。如果一个界面必须在每个平台上都具有完全相同的外观和行为，那么\
  \ Ocean 观感是正确的选择。\n\n任何基于 Swing 的 GUI 的观感都可以在应用程序内部通过编程方式动态更改。\n\n5165CH08.qxd 11/16/05\
  \ 12:16 PM Page 242\n\n**242**\n\n第 8 章 ■ 图形用户界面\n\n以下是一些常见的 `LookAndFeel` 子类：\n\
