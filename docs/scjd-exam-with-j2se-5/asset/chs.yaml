  \n第 2 章\n\n■ ■ ■\n\n项目分析与设计\n\n**本**章介绍所有软件项目共有的项目问题，并结合本书的示例项目以及你为成为 Sun 认证 Java\
  \ 开发者而需要完成的 Sun 作业进行讨论。具体来说，将涵盖以下主题：\n\n• 规划 SCJD 考试的初始阶段\n\n• 组织项目布局\n\n• 记录项目\n\
  \n• 熟悉源代码格式化和 Javadoc 的行业标准原则，并在项目开发初期就融入这些原则\n\n• 使用 Java 包根据功能相似性对代码进行分组\n\n•\
  \ 学习常见开发实践，包括使用断言和日志记录\n\n本章并非试图开辟新道路，而是沿着 Java 标准的成熟路径前进，例如编码规范、Javadoc 使用和打包概念。\n\
  \n其中一些工具是通过 SCJD 考试所必需的，而所有工具都应该是 Java 开发者日常使用的。\n\n从一开始就使用这些标准，你将顺利迈向成为认证 Java\
  \ 2 开发者的目标。\n\n**实施项目**\n\n人们很容易一上来就直接跳入代码开始项目。这样做很有趣，并能立即获得进展感。然而，这种方法通常有显著的缺点。在没有适当规划的情况下开始项目，可能会使项目受制于未言明的假设，导致你忽略关键信息，或引入随着项目进展而显现的设计缺陷。\n\
  \n通常，最好从确认需求、设计数据流和绘制图形用户界面（GUI）布局原型开始。完成这一步之后，再进行设计。\n\n**11**\n\n5165CH02.qxd\
  \ 11/16/05 12:09 PM 第 12 页\n\n**12**\n\n第 2 章 ■ 项目分析与设计\n\n■**注意** 软件行业中不同程度地使用着许多不同的开发方法论。\n\
  \n\n\n一些常用的设计方法包括迭代过程、统一过程、Boehm 螺旋模型和 XP（极限编程）。在本书中，我们采用另一种常见模型：瀑布模型。顾名思义，这种设计模型要求开发是一个持续的过程，每个软件版本都基于前一个版本，以此类推。此外，在此模型中，需求是在项目设计和开发开始之前确定的。SCJD\
  \ 考试允许无限制时间完成项目，并要求你作为单个开发者工作。SCJD 考试中规定的这两个特殊标准与瀑布方法论完美契合。\n\n设计是一个以编码为基础的动态过程。开始项目设计的最佳方式是通过少量编码、少量设计、再更多编码来探索前方的技术挑战。在这方面，项目设计成为一个迭代过程。以下是一些建议的原则。\n\
  \n**开始着手**\n\n作为第一步，花一点时间验证你对需求的理解。多次阅读材料并仔细审视其内容。探索功能的逻辑分解并记录你的假设。确保你注意到那些涵盖特定主题下多种不同变体的总括性活动。这通常有助于包结构设计。例如，设置一个负责视觉呈现的\
  \ GUI 包可能是合理的。\n\n**收集需求**\n\n需求是客户希望在你所创建系统中实现的项目功能。\n\n需求应详细说明系统需要做的所有事情。我们的建议是提出问题。更好的是，提出大量问题。在形成答案之前写下问题，并确保它们合理。为了清晰起见，用不同的方式表述并再次提问。在项目开始时被认为有点迟钝，总比在项目结束时被证明粗心大意要好。\n\
  \n以书面形式或 GUI 布局确认所有假设。当然，在这个项目中，你无法向任何人提问，但这不应阻止你阐明潜在问题和项目风险。事实上，这应该鼓励你提出问题以整理思路。\n\
  \n■**注意** 第 3 章介绍了一些从项目需求中导出的示例用例。第 8 章提供了一个处理用例及其转化为项目功能的完整示例。\n\n5165CH02.qxd\
  \ 11/16/05 12:09 PM 第 13 页\n\n第 2 章 ■ 项目分析与设计\n\n**13**\n\nGUI 原型设计\n\n当你开始设计项目的\
  \ GUI 原型时，用铅笔和纸画出各种命令窗口的简单布局。这项活动将帮助你在决定界面内部工作方式之前，了解用户需要看到什么。这通常是协调用户期望与系统实现现实之间的关键步骤。第\
  \ 8 章介绍了 GUI 原型设计和界面布局过程的示例。\n\n我们建议你在此阶段使用铅笔和纸来设计 GUI 原型，而不是直接在计算机上操作。直接在计算机上编码存在以下风险：\n\
  \n•   你认为非常好且花费了大量时间的设计，可能会被你的样本测试者（参见侧边栏“样本测试者”）拒绝，导致时间浪费。\n•   与在纸上勾勒 GUI 布局相比，在计算机上制作\
  \ GUI 原型几乎肯定需要更多时间。我们建议你将原型展示给一些样本测试者（参见侧边栏），如果他们提出修改建议（或者最坏情况下，拒绝你的原型），如果你的原型只是铅笔草图，浪费的时间会更少。\n\
  •   如果你有 GUI 的铅笔草图，无论是否有电脑在手，你都可以在任何地方与样本测试者讨论。他们建议的任何更改都可以在几秒钟内纳入。\n•   如果你花费了大量时间编码原型，自然会抗拒更改它，这可能导致你拒绝样本用户提出的一些绝佳想法。\n\
  •   你可能会在原型完成之前很久就因实现细节而感到沮丧，结果可能为了更容易开发的东西而牺牲好的设计，从而导致 GUI 得分较低。\n•   如果你现在编码 GUI，最终可能会得到你认为非常好的东西，但后来发现用户不喜欢。再次，你面临从头开始的风险。\n\
  \n■**注意** 在第 8 章中，我们将为示例项目开发 GUI，作为其中的一部分，我们将展示一些我们可能用于项目的备选屏幕布局的粗略草图。\n\n5165CH02.qxd\
  \ 11/16/05 12:09 PM 第 14 页\n\n**14**\n\n第 2 章 ■ 项目分析与设计\n\n**样本测试者**\n\n程序员为程序员编写程序，这是一个不言而喻的事实。也就是说，对于任何给定的任务，作为程序员，我们倾向于编写一个*我们认为*非常合乎逻辑，但大多数非程序员会觉得难以使用的程序。这种效应在所有行业都存在，有些行业会雇佣员工专门处理美学问题——例如，一些汽车制造商雇佣员工，其唯一工作是确保汽车对最终消费者有吸引力。\n\
  \n如果我们想编写最终用户（在 Sun 认证任务中，即任务评估者）会喜欢并因此认可（在 Sun 认证任务中，即获得满分）的 GUI 应用程序，我们需要做类似的事情。获得最终用户的认可极其重要——否则我们会陷入无休止地对\
  \ GUI 进行一个又一个修改的循环。我们需要一个（最好）不是程序员的人，他可以查看我们的原型和最终应用程序，并告诉我们哪些需要更改，以使其感觉像是一个出色的应用程序，而不仅仅是一个平庸的。\n\
  \n这些人就是我们的样本测试者。他们可以是你的配偶、你的伴侣、你的母亲，或者办公室秘书。他们很可能会发现一些他们认为标准，但你却遗漏的功能。他们也可能会查看你的应用程序并告诉你某些东西放错了位置。在测试最终应用程序时，他们很可能会做一些你意想不到的事情——比如试图同时打开两个应用程序，或者试图将你的应用程序屏幕缩小到你认为没人会使用的大小以下。\n\
  \n要尽量避免的人是其他程序员——他们最有可能因为自己不喜欢某个特定功能而不提及它。此外，他们可能会忽略可用性问题，因为他们习惯于处理他人程序中的问题。\n\n\
  所以，看看你是否能想到一些样本测试者，把你的屏幕粗略草图拿给他们，问问他们的想法。然后倾听他们的评论，回去进行必要的修改。\n\n如果可能，将完全不同的屏幕样本拿给你的样本测试者——让他们选择他们喜欢使用哪种界面。他们会感到更有参与感，并且通常会因为你的某个样本布局尚未最终确定而觉得可以提出更多修改建议。\n\
  \n**使用公认的设计模式**\n\n不遵循惯例很少值得花费开发时间。更糟的是，它可能导致你无法通过 Sun 的考试。最糟糕的是，在现实世界中，它会招致那些必须维护由此产生的晦涩代码的程序员的憎恨。\n\
  \n\n\n虽然针对通用问题实现自定义解决方案是可行的，而且通常很巧妙，但在本项目及 Sun 的考试中，你应抵制这种诱惑。然而在现实生活中，自定义解决方案有时比通用方案更快、成本更低。例如，一个自定义的数组元素排序方法可能比\
  \ `Arrays` 类内置的方法更快。\n\n由于本书的重点并非软件设计模式，因此书中无法涵盖所有设计模式。我们强烈建议你自行阅读相关内容，因为在你的开发职业生涯中将会用到它们。该领域最广为人知的著作是\
  \ Erich Gamma、Richard Helm、Ralph Johnson 和 John Vlissides 合著的 *设计模式*（Addison-Wesley\
  \ Professional, 1995）。这本书通常被称为“四人组”（Gang of Four，简称 GOF）著作。你可能会发现这本书并不容易阅读，因此你可能希望了解一些替代读物，例如\
  \ Elisabeth Freeman、Eric Freeman、Bert Bates 和 Kathy Sierra 合著的《深入浅出设计模式》（O'Reilly,\
  \ 2004）、波特兰模式知识库（http://c2.com/ppr/index.html），或维基百科上关于设计模式的条目（起始于 http://en.wikipedia.org/wiki/Design_pattern_(computer_science)）。Sun\
  \ 的 J2EE 设计模式（http://java.sun.com/blueprints/patterns/）也非常有用，但你应该意识到它们是以 J2EE 为中心的，并且可能以某种形式描述模式，这种形式对于本作业来说可能显得不合逻辑。\n\
  \n**记录设计决策**\n\n记录你在开发过程中做出的选择。写下你做出的各种决策及其原因。例如，如果你决定使用 `ArrayList` 而不是 `Vector`\
  \ 作为内部数据结构，请记录这样一个事实：`ArrayList` 是非同步的，因此被选中是因为它是一种更轻量级的数据结构。无需过度进行此类文档记录，因此请务必运用常识。这类文档是调试和性能调优的关键工具，同时也是任何需要理解代码的人的重要参考来源。\n\
  \n无论你做什么，都不要将记录设计决策的工作留到项目结束。如果你等到完成编码后才开始编写这份文档，你不仅需要回忆当初为何选择某个特定选项，还需要首先回忆起你当初还有其他选项！例如，如果你在作业开始时决定使用自定义对话框，那么在作业结束时，你可能已经忘记了你最初还考虑过在主窗口上使用可编辑单元格。\n\
  \n很可能当你完成作业时，你会发现你的设计决策文档非常庞大——可以删除次要决策以缩减文档篇幅。\n\n■**提示** 你可能希望使用项目符号来描述你的设计决策。这不仅会减少你的书写量，而且在考试时也更容易记住。这对于母语非英语的考生尤其有用——你无需过分担心拼写是否正确或句子是否通顺。\n\
  \n例如，我们可以像这样记录几个决策：\n\n• 使用 Socket 而非 RMI——允许完全控制线程\n• 使用 `RandomAccessFile` 而非独立的\
  \ `DataInputStream` 和 `DataOutputStream` 类——允许对文件进行随机访问\n\n**测试**\n\n你应该通过为每个类编写单元测试客户端来开始测试，或者使用诸如\
  \ JUnit（http://www.junit.org/）之类的测试工具来自动生成测试客户端。当你设计自定义测试时，最好在实现待测试方法之前编写测试类。\n\n\
  \n\n5165CH02.qxd 11/16/05 12:09 PM 第 16 页\n\n**16**\n\n第 2 章 ■ 项目分析与设计\n\n我们建议在开始开发流程之前，先设计能够覆盖项目书面需求中所列条件的测试。在这种情况下，如果一个类提供了项目需求中详述的功能，并且没有使预编写的测试失败，那么该测试就可以被视为成功。超出需求范围的额外功能是不必要的。在编写可交付类之前编写测试用例，可以防止过于热心的程序员在非必需的功能上花费过多精力。\n\
  \n随着项目的进展，你可能会发现自己需要添加或修改类中的方法。请确保在项目类演变时相应地更新测试客户端。通常建议永远不要删除测试用例——一旦测试被编写出来，它就能提供宝贵的确认，证明在你修改可交付类时，基本功能仍然有效。\n\
  \n■**注意** 单元测试只是测试你编写的某个单元（通常是一个类）。如果你的类有一个 `setDvdName(String dvdName)` 方法，那么你的单元测试应该调用它，最好使用它可能接收的各种输入。你应该对每个方法都这样做。考试不要求进行单元测试，但我们强烈建议将其作为一种健全性测试。当然，你不应该将单元测试或其结果发送给\
  \ Sun。\n\n当应用程序准备好进行系统测试时，招募一些志愿者来帮忙。通常最好避免测试自己的代码——用不带偏见且客观的眼光来审视系统。在设计系统测试时，与客户合作是一个好主意。如果这不可行（就像在这个项目中一样），那么请使用项目开始时收集的需求。\n\
  \n■**注意** 系统测试只是测试各个单元（通常是类）如何协同工作。例如，你的客户端类可能需要调用你的 DVD 类的 `setDvdName(String dvdName)`\
  \ 方法。即使你从单元测试中知道客户端和 DVD 类都能正常工作，你也不知道它们是否能很好地协同工作。例如，可能存在网络问题，或者客户端类可能将 DVD 名称存储为字符数组，而\
  \ DVD 类使用字符串。系统测试使你能够确保所有类都能良好地协同工作。\n\n**组织项目**\n\n在任何软件项目中，首要任务之一就是为所有相关项目材料确定一个合理的组织结构。在这种情况下，组织范式是一种旨在组织与项目相关的所有文件的目录结构。在开发过程的后期才决定此类事项并尝试进行改造是极其困难的。你应该在项目规划阶段尽早决定目录结构。一个典型的项目目录结构如下所示。Sun\
  \ 并未规定 SCJD 作业开发的目录结构；但是，在某些作业中，他们确实指定了一些用于提交的顶级目录。表 2-1 中的目录结构可作为该作业的建议性组织基础。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 17 页\n\n第 2 章 ■ 项目分析与设计\n\n**17**\n\n本书的示例应用程序项目将使用表\
  \ 2-1 中详述的结构。\n\n**表 2-1.** *建议的目录结构*\n\n**子目录**\n\n**推荐用途**\n\nsrc\\\n\n包含项目过程中编写的所有\
  \ .java 源文件。\n\nclasses\\\n\n包含所有编译后的类文件和任何打包的 JAR 文件。当我们运行应用程序时，类路径将指向此目录。\n\n\
  bkp\\\n\n用于存放备份所需文件的目录。\n\ntst\\\n\n包含为项目单元测试编写的所有 .java 源文件。\n\ntmp\\\n\n用于临时存储的“存放任何东西”的目录。\n\
  \nlog\\\n\n用于存储所有日志输出的目录。\n\ndoc\\\n\n存放所有文档，包括 Javadoc、最终用户文档和设计决策文档。\n\n**高级文档**\n\
  \n除了完成测试的代码部分外，要通过 SCJD 考试，你还必须编写并提交几种形式的文档。在撰写本文时，需要以下文档：\n\n• Javadoc 文档（本章后面将深入讨论）。\n\
  \n• 一个名为 `version.txt` 的纯文本文件。\n\n• 用户说明——除非用户说明已内置于你的应用程序中，并且在应用程序运行时可用。\n\n• 一份设计决策文档。设计决策文档将在下一节详细讨论。\n\
  \n`version.txt` 文件必须包含对以下项目的说明：\n\n• 用于开发的 JDK 版本\n\n• 开发平台\n\n本书使用 JDK 5 版和 Microsoft\
  \ Windows 2000。\n\n■**警告** 目前有几种不同的 Sun 作业在使用，不同作业的说明可能有所不同。Sun 未来也可能会发布在说明上有其他细微差别的作业。虽然本书中的信息通常适用于任何当前的作业，但你必须仔细阅读从\
  \ Sun 收到的说明，并确保遵循它们。\n\n5165CH02.qxd 11/16/05 12:09 PM 第 18 页\n\n**18**\n\n第 2 章\
  \ ■ 项目分析与设计\n\n**提交时应包含哪些额外文件？**\n\n我们经常看到考生询问是否应该在提交中包含他们的测试用例和/或类图。\n\n我们的一般建议是不要包含任何未被要求提供的内容。Sun\
  \ 的最新说明中包含一条评论，即你不会因做了需求之外的任何事情而获得额外分数，因此向评估者提供这些额外文件不会给你带来任何好处。\n\n然而，不幸的是，提供这些文件可能会因为你犯了一个评估者在你不必提供的文件中注意到的错误，而无意中降低你的分数。\n\
  \n我们可能会考虑改变这一般建议的唯一情况是，当额外文件使你的提交更容易被理解时。类图可能就是这样一个例子（然而，这个作业足够简单，如果你需要类图来理解提交，那么你可能已经把解决方案搞得太复杂了）。\n\
  \n用户指南是必不可少的。毕竟，如果你不向客户解释如何使用应用程序，那么该应用程序就毫无用处。因此，你在编写这些说明时应格外小心。作为开发者，你能做的唯一安全假设是最终用户没有使用过这个特定应用程序的经验。每一步，无论多么微小，都必须在说明中详细说明。列出说明后，通过将它们交给不知情的朋友（最好是非程序员）来测试其清晰度。如果他们能遵循说明，那么说明就是足够的。\n\
  \n■**警告** 当前的作业说明指定，你编写的说明可以放在特定目录中，也可以在线获取。这一指令过去曾引起混淆，因为一些考生认为这可能意味着需要他们运行一个 Web\
  \ 服务器——但事实并非如此。Sun 只要求评估者能够访问这些说明，如果说明放在所需目录中，或者可以从你的应用程序中调出（例如，在 Microsoft Word\
  \ 中按 F1 键会弹出“联机帮助”，即使你没有互联网连接），就可以实现这一点。\n\n**设计决策文档**\n\n\n\n在整个 SCJD 考试中，某些设计和实现选择已由\
  \ Sun 公司指定。例如，考试要求使用 `JTable` Swing 组件。然而，其他选择则留给你（考生）自行决定。例如，你可以选择实现一个使用 RMI 的网络层，也可以采用基于套接字的不同方法。每种实现都有其优缺点。你必须确保记录你的选择，因为你需要向最终决定你的考试提交是否通过的个人辩护这些设计决策。\n\
  \n对于 SCJD 考试，请在设计决策文档中清晰地记录你的设计选择。该文档应包含具体决策的示例，例如你对设计模式的选择，或对某一种技术而非另一种技术的使用。有时，也可能出现基于不明确的功能需求而做出设计决策的情况。如果出现这种情况，请将其作为设计决策提出，并记录你为处理该问题所做的所有假设。务必完成设计决策文档，因为这是考试允许你为提交的项目进行辩护的唯一机会。\n\
  \n■**提示** 值得注意的是，在 Sun 的作业中，就像在现实生活中的项目一样，任何给定问题有时都有多种解决方案。而且，对于*每一个*可能的解决方案，都可能存在该特定方案并非最优的理由。你不应花费过多时间试图寻找“唯一完美的解决方案”——它可能并不存在。Sun\
  \ 有意在作业说明中留下了足够的模糊性，以至于考生选择受限的领域非常少。在所有其他情况下，做出什么选择并不那么重要，但你是如何做出选择的却很重要，这应在你的设计决策文档中详细说明。\n\
  \n**Java 编码规范**\n\n我们行业中的一个共同目标是能够将项目移交给其他人——让他们将来进行任何维护，因为你将无法参与（你将从事更令人兴奋的项目并去度假）。\n\
  \n为了实现这一目标，我们编写的代码需要以这样一种方式格式化，以便你可以将其移交给其他人，并且他们会乐意接受。如果你移交的代码被对方因为难以理解而全部丢弃，那将对你的声誉毫无益处。\n\
  \n同样，如果我们不将本书组织成章节、段落和句子，那对我们也没有任何好处——如果你无法阅读本书，你就无法从中学习到多少东西。\n\nJava、C 和 C++ 的开发人员刻意避免强制编码人员遵循特定的编码规范——存在语法要求，但只要满足这些要求，代码在打印页面上可以以你喜欢的任何方式呈现。例如，考虑以下代码片段：\n\
  \npublic class MyTest {\n\npublic static void main(String[] args) {\n\nSystem.out.println(\"\
  Hello\");\n\n}\n\n}\n\n这段代码被 Java 编译器解释的方式与以下代码完全相同：\n\npublic\n\nclass\n\nMyTest{public\
  \ static void main(String\n\nz[]){System.out.println(\"Hello\");}}\n\n你无疑会同意第一种格式比第二种格式可读性强得多。\n\
  \n虽然很容易同意应该遵循代码格式化风格，但就代码格式化风格本身达成一致则不那么容易。例如，一个人通常喜欢将左花括号 ({) 放在现有行的末尾；另一个人则喜欢将左花括号单独放在一行。两位编码人员都可以为他们特定的风格提出令人信服的论据，但实际上只有一种风格\n\
  \n在工作场所，管理层通常会指定必须使用哪种特定风格。\n\n对于本书以及 SCJD 作业，我们建议你使用 Java 编程语言的 Sun 代码规范，你可以从 http://java.sun.com/docs/codeconv/\
  \ 下载。Sun 指定了他们认为需要编码指南的 11 个领域，这些领域可以归纳为以下几个主要类别：命名规范、文件布局、源代码格式和注释格式。接下来我们将介绍每个类别。\n\
  \n**命名规范**\n\nSun 代码规范为包、类和接口、方法、变量以及常量指定了不同的命名规范。\n\n对于所有命名规范，你应尽量避免使用缩写，除非该缩写比完整单词更广为人知。同时，你应尽量不让名称过长，否则它们很快就会变得读写起来很繁琐。请考虑表\
  \ 2-2 中显示的变量名。\n\n**表 2-2.** *变量命名示例*\n\n**内容**\n\n**好的变量名**\n\n**差的变量名**\n\n账户余额\n\
  \naccountBalance\n\nusersCurrentAccountBalance（过长）\n\nab（不是常见缩写；含义不明确）\n\nHTML 编辑器类\n\
  \nHtmlEditor\n\nHyperTextMarkupLanguageEditor（“HTML”是常见缩写，因此使用它\n\n将增强此类名的可读性）\n\
  \n包命名规范\n\n包名以你的完全限定域名开头，全部小写并倒序书写。因此，如果你为域名是 example.com 的公司工作，那么你的包名应以倒序的相同名称开头（com.example）。\n\
  \n从那时起，你将遵循你公司的命名规范。一个示例命名规范可能是使用项目名称，后跟概念上的类分组。例如，由于我们正在处理包含 GUI 客户端的 SCJD 项目，我们可以有一个组合包名\
  \ com.sun.edu.scjd.gui（但为简单起见，我们在整个项目中使用了基本包名 sampleproject，因此 GUI 代码位于包 sampleproject.gui\
  \ 中）。\n\n■**提示** 在实际作业中，Sun 通常会为至少一个类指定包名。因此，你无需担心没有现成的域名可用作基本包名。\n\n类和接口命名规范\n\n\
  类和接口名应始终以大写字母开头，并且应为名词（它们应描述一个对象，而不是对对象的操作）。例如，“Book”可用作包含图书信息的类的名称。\n\n通常会将两个或多个名词或一个形容词和一个名词组合起来形成类名，在这种情况下使用驼峰命名法（每个单词的首字母大写，产生与骆驼相关的起伏模式）。例如，“SocketFactory”可用作创建套接字连接的类的名称。\n\
  \n■**提示** 你应尽量让每个类只承担一项职责。例如，负责创建到服务器的 RMI 连接的类不应同时负责向最终用户显示数据。如果你能保持“每个类一项职责”，你会发现命名类更容易。这在以后需要修改或维护你的类时提供了主要好处——职责分离和清晰的类名使得确定哪些类需要修改变得容易得多。\n\
  \n方法命名规范\n\n方法名应始终以小写字母开头，并且应以动词开头（它们应描述对对象的操作）。例如，在我们的 DVD 类中，方法名 `getLeadActor`\
  \ 表示我们可以调用此方法来获取 DVD 的主演姓名。\n\n\n\n将多个单词组合起来以更详细地描述方法的功能，这种做法非常普遍。例如，使用方法名 `getLeadActor`\
  \ 在*使用*该方法时，就能更明确地表明我们正在专门检索主角的姓名（而不是与这张 DVD 相关的其他人的名字）。如本例所示，组合单词时使用了驼峰命名法。\n\n\
  变量命名约定\n\n变量名应始终以小写字母开头，应简短，并应描述变量中存储的数据。例如，在我们的 DVD 类中，变量名 `leadActor` 将包含 DVD\
  \ 影片中主角的姓名。\n\n同样，将多个单词组合起来以提供关于变量功能的更多信息，这种做法也非常普遍。如本例所示，组合单词时使用了驼峰命名法。\n\n■**注意**\
  \ Sun 编码规范规定，你应该对所有实例变量、类变量和局部变量应用相同的命名约定。请注意，你可能会看到其他程序员编写的代码中，实例变量或类变量通过下划线或其他特殊标记来表示。另一种达到相同效果的方法是：引用局部变量时使用\
  \ `variable` 约定，引用实例变量时使用 `this.variable`，引用类变量时使用 `Class.variable`。这样做可以明确你正在引用的是哪种类型的变量。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 22 页\n\n**22**\n\n第 2 章 ■ 项目分析与设计\n\n常量命名约定\n\
  \n常量始终全部使用大写字母书写，单词之间用下划线分隔。例如，常量 `DIRECTOR_LENGTH` 可能被设置为数据库中存储的导演姓名的最大长度。\n\n\
  **文件布局**\n\n一个 Java 类或接口始终包含以下标准布局：**1.** 起始注释\n\n**2.** 包和导入语句\n\n**3.** 类或接口声明\n\
  \nSun 代码规范规定，这些主要部分之间应有两个空行。也就是说，起始注释和包语句之间应有两个空行。同样，导入语句和类或接口声明之间也应有两个空行。在所有其他有助于提高可读性的情况下（例如，在方法声明之间），通常只需一个空行。以下代码片段展示了一个简单的示例：1\
  \ /*\n\n2 * HelloWorld.java 版本 1.0.0 日期 2005-06-20\n\n3 * 版权所有 © Andrew Monkhouse\
  \ & Terry Camerlengo 2005\n\n4 *\n\n5 * 这是一个 Hello World 程序的版本\n\n6 * 起始注释后跟两个空行\
  \ 7 */\n\n10 package com.example.javaExamples;\n\n12 import java.util.Date;\n\n\
  15 public class HelloWorld {\n\n16 public static void main(String[] args) {\n\n\
  17 sayHello();\n\n18 }\n\n20 public static void sayHello() {\n\n21 System.out.println(\"\
  Hello, world at \" + new Date() + \"\\n\"); 22 }\n\n23 }\n\n如上所示，每个主要部分之间有两个空行：第\
  \ 8 行和第 9 行将起始注释与包和导入语句分开，第 13 行和第\n\n5165CH02.qxd 11/16/05 12:09 PM 第 23 页\n\n\
  第 2 章 ■ 项目分析与设计\n\n**23**\n\n14 行将导入语句与类声明分开。在所有其他情况下，只使用一个空行来分隔次要部分：第 11 行将包语句与第一个导入语句分开，第\
  \ 19 行将构造函数和方法声明分开。\n\n起始注释\n\n起始注释与 Javadoc 注释是分开的，因此 Java 程序员常常不理解它们。起始注释包含一些与类的\
  \ Javadoc 注释相同的信息，但有几个主要区别：信息在一个标准位置提供，并且列出了非常具体的信息。虽然 Javadoc 注释可能包含起始注释中信息的超集，但信息不会出现在特定的行号上，并且所需的信息可能深埋在\
  \ API 文档中。起始注释包含以下内容：\n\n• 类名\n\n• 版本信息（可能由你的版本控制系统自动填写）\n\n• 创建/修改日期（可能由你的版本控制系统自动填写）\n\
  \n• 作者/最后修改者（可能由你的版本控制系统自动填写） 整个注释块是 C 类型注释，而不是 Javadoc 注释——也就是说，注释块以 `/*` 开头，而不是\
  \ `/**`。\n\n包和导入语句\n\n在起始注释之后，放置包语句、一个空行，然后是导入语句，如前面代码示例的第 10-12 行所示。\n\n尽管 Sun\
  \ 编码规范文档没有指定是列出每个类还是包含整个包，但一种常见的用法是，在单个包中列出三个类之前，先列出单个类。之后，通常会导入整个包。\n\n同样，Sun 编码规范也没有指定导入语句是否应按特定顺序排列。担心此类细节可能超出了需求的范围（并且可能导致你的同事用奇怪的眼神看你）。许多开发人员倾向于按字母顺序排列它们，但不必对此过于担心。\n\
  \n■**提示** 许多集成开发环境 (IDE) 具有以下部分功能：自动添加缺失的导入语句；自动删除未使用的导入语句；以及自动重构给定包中过多或过少的导入。虽然这些功能可以帮助你在实际工作中提高编码速度，但我们建议你在处理\
  \ SCJD 作业时关闭这些功能。使用某些 IDE“功能”的一个问题是，如果出现问题，可能难以确定哪里出了错——如果你在 SCJD 作业中学会手动处理导入语句，你将来就更有可能处理任何问题。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 24 页\n\n**24**\n\n第 2 章 ■ 项目分析与设计\n\n常见的做法是在标准\
  \ J2SE 包、标准 J2EE 包、外部包和内部包的导入之间包含一个空行。\n\n类或接口声明\n\nSun 编码规范规定，类或接口声明应按指定顺序包含以下部分或全部元素：\n\
  \n• 类/接口 Javadoc 注释\n\n• 类/接口语句\n\n• 类变量\n\n• 实例变量\n\n• 构造函数\n\n• 方法\n\n变量应根据可访问性排序，从最可访问（public）到最不可访问（private）。例如：\n\
  \npublic class VariableOrderExample {\n\npublic int aVariableModifiableByAnyOtherClass;\n\
  \npublic String anotherPublicVariable;\n\n// 受保护变量出现在公有变量之后\n\nprotected int protectedVariable;\n\
  \n// 现在列出具有默认访问权限的变量\n\nCharacter defaultAccessVariable;\n\n// 最后列出具有私有访问权限的变量\n\
  \nprivate int noOtherClassCanSeeMe;\n\n}\n\n■**提示** 尽管 Sun 编码规范没有指定常量的位置，但常见的用法是将它们列在类变量之前。\n\
  \n另一方面，方法应按功能而不是作用域进行分组。这意味着你应该将公共的私有方法放在调用它的公有方法附近。\n\n\n\n**源代码格式**\n\n在编写代码时，你应当对以下风格问题保持一致的规范：\n\
  \n• 缩进\n\n• 行长度/换行\n\n5165CH02.qxd 11/16/05 12:09 PM 第 25 页\n\n第 2 章 ■ 项目分析与设计\n\
  \n**25**\n\n• 间距\n\n• 语句格式\n\n• 变量声明格式\n\n这些格式规则大多旨在让阅读你代码的人能够使用他们自己选择的 IDE、编辑器、屏幕分辨率等工具进行阅读。如果你选择非标准的格式规范，其他人可能会觉得你的代码难以阅读。\n\
  \n■**注意** 永远不要忘记，你将把源代码提交给一位未知的评估者进行审查。你确实需要编写代码，使其成为他们乐于评估的作品。这一点同样适用于你的实际工作——你应当始终编写让同事乐于使用的代码。\n\
  \n缩进\n\nSun 编码规范包含以下缩进要求：\"缩进单位应为四个空格。缩进的具体构成（空格与制表符）未作规定。制表符必须严格设置为每 8 个空格（而非 4\
  \ 个）\"（Sun 编码规范，http://java.sun.com/docs/codeconv/html/CodeConventions.doc3.html，1999\
  \ 年）。\n\n初次阅读时，这段描述似乎会引起很多困惑，因此有必要举一个例子：\n\n1 public class IndentationExample {\n\
  2 /* 此行缩进一次 */\n3 public IndentationExample() {\n4 /* 此行缩进两次 */\n5 }\n6 }\n\n第 2、3\
  \ 和 5 行各缩进一次，因此应在它们前面加上四个空格。\n\n第 4 行缩进两次，因此*应该*在其前面加上八个空格。然而，八个空格也等同于一个制表符，所以第\
  \ 4 行你*可以*使用制表符代替八个空格。\n\n为避免混淆，我们建议你使用八个空格而非制表符。\n\n■**提示** 许多 IDE 和编辑器都提供了选项，让你在按下\
  \ Tab 键时插入指定数量的空格（甚至能处理退格覆盖缩进/重新格式化整个代码块）。我们建议你检查你的 IDE/编辑器是否提供此功能，并在可用时将其开启。\n\n\
  行长度/换行\n\n如前所述，你无法知道评估者将使用何种编辑器或屏幕尺寸。将行长度限制在 80 个字符以内，可以确保你的代码在大多数情况下都是可读的。\n\n\
  5165CH02.qxd 11/16/05 12:09 PM 第 26 页\n\n**26**\n\n第 2 章 ■ 项目分析与设计\n\n超过 80 个字符的行应尽可能在逗号之后或运算符之前断开。第二行（及后续行）应缩进到前一行表达式的起始位置，或缩进八个空格。例如：\n\
  int i = myMethod(longNamedVariable1, longNamedVariable2, longNamedVariable3, longNamedVariable4);\n\
  \n对于 if、for 和 while 语句的换行，通常使用八个空格的缩进规则，而非表达式起始位置，因为使用表达式起始位置可能会与后续行（将缩进四个字符）造成混淆。以下示例展示了\
  \ if 语句换行的推荐方式和非推荐方式：\n\n// 非推荐方式\nif (myMethod(longNamedVariable1, longNamedVariable2,\n\
  longNamedVariable3, longNamedVariable4)) {\n// 代码从这里开始——看，这有多令人困惑？\ndoSomething();\n\
  }\n\n// 推荐方式\nif (myMethod(longNamedVariable1, longNamedVariable2,\nlongNamedVariable3,\
  \ longNamedVariable4)) {\n// 代码从这里开始——现在我们可以区分条件与条件内要运行的代码了\ndoSomething();\n}\n\
  \n当一行中存在多层代码时，例如调用一个方法并将其结果作为参数传递给另一个方法调用，最好在较高层级处断开——尽可能将对外部方法的调用保持在一行内。例如：\nint\
  \ i = myMethod(variable1,\ncallToAnotherMethod(variable1, variable2),\n\n\n(variable1\
  \ + variable2));\n\n在像最后一个示例这样的情况下，你应该考虑是否可以通过重构代码来提高其可读性和可理解性。例如，你可以：\n\n• 将外部过程调用移到单独一行。\n\
  • 将括号内的计算移到单独一行。\n• 同时进行上述两种修改。\n\n思考一下，以下代码在阅读和维护上会变得多么容易：\n`int dbValue = callToAnotherMethod(variable1,\
  \ variable2);`\n`int calculated = variable1 + variable2;`\n`int i = myMethod(variable1,\
  \ dbValue, calculated);`\n\n一旦你的缩进层级超过第三或第四层，你可能会发现这些规则难以遵循。这通常也表明你的代码可能难以理解，你应该考虑是否可以将部分缩进的代码移到一个单独的方法中。\n\
  \n**间距**\n\n间距旨在使代码更易于阅读，但过多的间距可能会产生相反的效果，使代码更难阅读和维护。通常，你应该在关键字和括号之间、逗号之后、`for`语句中的表达式之间、类型转换之后以及所有二元运算符周围放置一个空格。表\
  \ 2-3 中展示了这些示例。\n\n**表 2-3.** *间距示例*\n\n| **规则** | **示例** |\n| :--- | :--- |\n|\
  \ 关键字与括号之间的空格 | `while (true)` |\n| 逗号后的空格 | `myMethod(variable1, variable2);` |\n\
  | 表达式之间的空格 | `for (expression1; expression2; expression3) {` |\n| 类型转换后的空格 | `int\
  \ i = (int) aLongValue;` |\n| 二元运算符后的空格 | `a = b + c;` |\n|  | `c = 5 * 10;` |\n\
  \n**语句格式**\n\n大多数语句格式规则只是对我们已经讨论过的规则的延续。\n\n大多数程序员都有自己偏好的编写复合语句的方法——例如，大括号放在哪里，以及大括号是否可选。为了避免无休止的争论，Sun\
  \ 公司明确规定，作为控制结构的一部分，必须使用大括号将语句括起来——即使控制结构中只使用了一条语句。例如，即使 `if` 语句后面只有一行代码需要执行，也必须用大括号括起来，如下所示：\n\
  \n```java\nif (variable == someValue) {\n    doSomething();\n}\n```\n\n如你所见，大括号之间的语句应缩进一个缩进级别（四个空格），并且右大括号应在原始缩进级别上另起一行。\n\
  \n■**提示** 有许多工具可以帮助你确认所编写的代码是否符合 Sun 编码标准。其中一个工具是 Checkstyle (http://checkstyle.sourceforge.net/)——它可以很好地集成到许多流行的\
  \ IDE 中，并支持多种不同的编码风格，而不仅仅是 Sun 的。一个好的风格检查器会提供一份报告，指出它认为需要修改的地方，之后你可以手动逐一验证每个项目。\n\
  \n■**注意** 对于此任务，请尽量避免使用自动代码格式化工具。有时，它们会以编码规范允许但与你（或评估者）期望的方式相悖的格式重新格式化你的代码。不幸的是，一旦完成，就很难撤销，而且大多数自动格式化工具在应用或拒绝更改之前，并不提供简便的方法来审查更改。\n\
  \n**变量声明格式**\n\n变量应每行声明一个，最好在声明后附上相关注释（如果适用）。\n\nSun 编码规范规定，你可以使用空格或制表符来分隔变量名和其类型。不幸的是，使用多个制表符可能会导致你在以后添加新变量时花费过多时间重新格式化代码，因此我们建议你始终在类型和变量名之间使用单个空格。\n\
  \n在可能的情况下，变量应在首次声明时进行初始化。此外，变量应在提供所需作用域的最小封闭大括号的开头附近声明。你不应该等到即将使用变量时才声明它。\n\n**代码内注释的格式**\n\
  \nJava 源代码中允许两种形式的注释：文档注释（Javadoc 注释）和实现注释（所有其他注释）。\n\nJavadoc 注释将在本章后面关于 Javadoc\
  \ 的部分中更详细地介绍；目前，只需说明 Javadoc 注释旨在创建 API 文档，其他程序员可以使用该文档来学习如何使用你的类及其相关的常量、方法（以及可能的变量），而无需查看你的源代码。由于\
  \ Javadoc 注释旨在供外部程序员使用，因此它们应概念性地解释你的代码整体如何工作——它们绝不应涉及实现细节。\n\n另一方面，实现注释旨在向查看你代码的程序员（或评估者）提示代码正在做什么。\n\
  \n■**注意** 不要过度向代码中添加实现注释。如果你为类、方法和变量使用了良好的命名，你的代码通常会是自文档化的。在这种情况下，添加过多的注释会适得其反——注释会分散对代码的注意力，并且很快就会过时。\n\
  \n实现注释有两种形式：块注释（用 `/*` 和 `*/` 标签括起来）和以 `//` 标签开头并持续到行尾的注释。\n\n当添加单行注释，或在代码行末尾添加注释时，我们建议你使用\
  \ `//` 注释分隔符，如下例所示：\n\n```java\n// 这是一个使用单行文本的注释示例\ndoSomething(); // 这是一个行尾注释的示例\n\
  ```\n\n当注释无法容纳在一行文本中时，请使用块注释，如下所示：\n\n```java\n/*\n * 此注释解释了为什么必须使用以下代码而不是更“直观”的方式。\n\
  \ * 由于它需要多行，因此采用块注释形式。\n */\n```\n\n尽量避免使用块注释来注释掉代码行——你应该改用 `//` 注释。使用块注释来注释掉代码行会使其他程序员很难确定哪些代码正在使用，哪些已被注释掉。单独成行的注释应始终缩进到与其所应用的代码相同的级别。\n\
  \n**JDK 5 新特性的建议编码规范**\n\nSun 编码规范尚未更新以反映 JDK 5 中的新增内容。在本节中，我们将简要解释一些新特性，并演示 JDK\
  \ 5 API、Sun 示例代码以及指定该新特性的 Java 规范请求（JSR）中典型的编码规范。\n\n■**注意** 在开始 JDK 5 之前，Sun 向\
  \ Java 开发者询问了他们希望在新版本中看到哪些特性。所有请求都得到了考虑，用户被允许为他们认为最有价值的特性投票。然后，一个 JSR 编号指定了这些特性，得票最高的请求被纳入\
  \ JDK 5。你可以通过访问 JCP 网站 http://jcp.org/en/home/index 了解更多关于 Java 社区进程的信息，并在未来的增强功能中发表自己的意见。\n\
  \n我们将在本章中快速概述这些新特性，然后在后续章节中更详细地介绍它们，届时可以在我们作业的上下文中看到它们。\n\n**泛型**\n\n\n\n*泛型*（以类型安全的方式在运行时支持泛型类型）允许我们在编译时指定泛型对象在运行时将包含的内容。通过一个示例可能更容易理解这一点。示例中使用的格式规则将在本节末尾总结。考虑以下非类型安全的代码：\n\
  \n```java\npublic List getBreed(String breedName) {\n    List dogs = new ArrayList();\n\
  \    // 执行一些操作来找到正确的狗\n    String dogName = \"\";\n    Dog pooch = new Dog(dogName);\n\
  \    dogs.add(pooch);\n    return dogs;\n}\n```\n\n5165CH02.qxd 11/16/05 12:09 PM\
  \ 第 30 页\n\n**30**\n\n第 2 章 ■ 项目分析与设计\n\n```java\npublic void listDogs() {\n   \
  \ Collection c = getBreed(\"labrador\");\n    for (Iterator i = c.iterator(); i.hasNext();\
  \ ) {\n        String name = ((Dog) i.next()).getName();\n        System.out.println(name);\n\
  \    }\n}\n```\n\n这段代码确实能工作；然而，尽管我们知道返回的 `List` 必须包含一个 `Dog` 列表，但无法阻止其他人编译假设该列表包含\
  \ `Cat` 的源代码——它会在没有错误的情况下编译通过。但是，如果发生这种情况，运行时将会抛出 `ClassCastException`。\n\n为了解决这个问题，你必须在代码中编写显式的类型检查（使用\
  \ `instanceof` 运算符）和/或捕获 `ClassCastException`。\n\n当我们能够确保泛型类在运行时被正确处理时，情况就好多了。考虑以下替代\
  \ `getBreed` 和 `listDogs` 方法的代码：\n\n```java\npublic List<Dog> getBreed(String breedName)\
  \ {\n    List<Dog> dogs = new ArrayList<Dog>();\n    // 执行一些操作来找到正确的狗\n    String\
  \ dogName = \"Labrador\";\n    Dog pooch = new Dog(dogName);\n    dogs.add(pooch);\n\
  \    return dogs;\n}\n\npublic void listDogs() {\n    Collection<Dog> c = getBreed(\"\
  labrador\");\n    for (Iterator<Dog> i = c.iterator(); i.hasNext(); ) {\n      \
  \  String name = i.next().getName();\n        System.out.println(name);\n    }\n\
  }\n```\n\n我们现在已经指定了 `getBreed` 方法的返回类型将是 `List of Dog`。（将 `List<Dog>` 理解为“Dog 的列表”可能会有所帮助）。\n\
  \n请注意，`String name = i.next().getName();` 这一行不再进行类型转换——定义 `Iterator` 的那一行已经指定了其类型。\n\
  \n尝试将集合中的项转换为不相关的类会产生以下错误：\n\n```\nGenericExample.java:16: inconvertible types\n\
  found : Dog\nrequired: Cat\n        String name = ((Cat) i.next()).getName();\n\
  \                     ^\n1 error\n```\n\n5165CH02.qxd 11/16/05 12:09 PM 第 31 页\n\
  \n第 2 章 ■ 项目分析与设计\n\n**31**\n\n请注意上述示例中使用的格式：\n\n-   尖括号（`<` 和 `>`）内没有空格。\n-   集合名称和尖括号之间没有空格。\n\
