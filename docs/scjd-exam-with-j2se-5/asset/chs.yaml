  \n**线程安全总结**\n\n你可以针对本节中出现的任何情况编写代码来应对，但这是错误的方法。最佳做法是避免导致线程不安全的各种情况。每条规则都有例外，但通常不要嵌套锁，不要依赖线程优先级，并注意竞态条件。本章稍后的“线程最佳实践”部分将帮助你减少出现此类问题滋生的可能性。\n\
  \n**使用线程对象**\n\n本节包含一些重要的通用信息，你在直接使用线程对象时应牢记在心。\n\n**停止、挂起、销毁和恢复**\n\n你绝不应使用`Thread.stop`、`Thread.suspend`、`Thread.resume`或`Thread.destroy`方法，因为它们已被弃用，且本质上是不安全的。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 107 页\n\n第 4 章 ■ 线程\n\n**107**\n\n不应使用这些方法，而应设置一个变量，该变量既能被你想改变其状态的线程访问，也能被想要改变该状态的线程访问。状态正在被改变的线程应定期监控此变量，并在变量发生变化时安全地改变其状态（通过释放所有资源、关闭文件等）。\n\
  \n更多信息，请阅读关于这些方法为何被弃用的说明，网址为：http://java.sun.com/j2se/1.5.0/docs/guide/misc/threadPrimitiveDeprecation.html。\n\
  \n**线程状态**\n\n线程有六种状态：`Thread.State.NEW`、`Thread.State.RUNNABLE`、`Thread.State.WAITING`、`Thread.State.TIMED_WAITING`、`Thread.State.BLOCKED`或`Thread.State.TERMINATED`。Java\
  \ 对于状态之间的转换有特定规则，了解这些规则很重要。\n\n最重要的规则是，处于`Thread.State.TERMINATED`状态的线程不能进入任何其他状态。永远不能。其次重要的规则是，线程只有在`Thread.State.RUNNABLE`状态下才能执行命令。当你首次在线程上调用`start`方法时，线程调度器会将其转换为`Thread.State.RUNNABLE`状态。此后某个时刻，根据线程调度器的调度策略，线程将开始执行`run`方法体中的语句。\n\
  \n从`Thread.State.RUNNABLE`状态开始，线程有四种可能的路径，如图 4-11 所示：\n\n• 它可以继续执行直至完成，之后进入`Thread.State.TERMINATED`状态。\n\
  • 线程可以通过调用`wait`或`join`进入`Thread.State.WAITING`状态。\n• 如果线程调用带有超时值的`sleep`或`wait`，它将进入`Thread.State.TIMED_WAITING`状态。\n\
  • 如果线程无法获取锁，它将进入`Thread.State.BLOCKED`状态。\n\n**图 4-11.** *线程状态*\n\n5165CH04.qxd\
  \ 11/16/05 12:11 PM 第 108 页\n\n**108**\n\n第 4 章 ■ 线程\n\n**关于阻塞的更多说明**\n\n阻塞是线程中的一个重要现象，因此值得进一步解释。快速回顾一下，阻塞线程不消耗\
  \ CPU 周期，处于暂停状态。它们不是等待一段时间到期，而是等待某个事件发生；具体来说，就是它们试图获取的锁变得可用。阻塞线程值得高度重视，因为当它们被切出\
