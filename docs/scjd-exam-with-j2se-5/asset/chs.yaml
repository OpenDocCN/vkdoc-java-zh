  \ 12:10 PM 第 64 页\n\n**64**\n\n第 3 章 ■ 项目概述\n\n用户，即 Denny's 的员工，必须能够执行以下操作：\n\n\
  • 通过 GUI 界面执行 `DbClient.java` 中定义的操作。\n\n• 实现对集中式 DVD 数据库的多用户网络访问。\n\n• 允许通过 RMI\
  \ 或套接字进行网络访问。\n\n• 使数据库实现线程安全（多用户网络访问的隐含要求）。\n\n■**提示** 在可供下载的源代码中，包含了一个 `DOSClient.java`\
  \ 类。这是一个有用的命令行程序，在本书第一版的下载中提供，但由于认证项目格式的近期变化，在 Denny's DVDs 的第二版中不再需要。尽管我们在本书中不讨论\
  \ `DOSClient.java`，但我们仍然将其包含在内，以方便下载代码的人。可以将 `DOSClient.java` 视为 GUI 工具的简化命令行版本。\n\
  \n**创建 GUI**\n\nGUI 必须允许员工查看 DVD 信息，例如 UPC、标题、租赁状态、导演、演员、女演员、作曲家和商店副本数量。GUI 还必须允许员工对这些\
  \ DVD 属性中的任何一个进行搜索。这些属性列在图 3-3 的类图中。GUI 应为用户提供本地连接数据库或通过网络连接数据库的选项。它不需要考虑任何安全功能，例如身份验证和登录。由于\
  \ SCJD 考试目前要求使用 Swing 作为 GUI，因此您也将在项目 GUI 中使用 Swing。\n\n■**注意** Swing 是构建在抽象窗口工具包（AWT）之上的\
  \ Sun 技术。AWT 是 Java 基础类（JFC）的一部分。对于程序员级别的认证，不再需要了解 AWT，并且直接理解 Swing 如何利用 AWT 对于开发人员认证也不是必需的。\n\
