  \n第 5 章 ■ DVD 数据库类\n\n吞没异常\n\n在上一节展示的代码中，第 38 行到第 40 行对异常完全未做任何处理。这通常被称为“吞没异常”。一旦这些行执行完毕，就好像你的代码将异常整个吞下：没有留下任何痕迹供他人查看。\n\
  \n虽然 Java 语言允许你这样做，但这被认为是极其糟糕的编程实践，几乎肯定会在你的作业中扣分（并导致你与工作中维护你代码的人之间产生激烈讨论）。异常，顾名思义，是本来不应该发生的事情。但通过吞没异常，我们既没有对此事件进行任何处理，也没有提供任何形式来追踪后续出错的原因。\n\
  \n如果我们现在运行这个程序，会发现`main`方法永远无法完成。如图 5-1 所示。\n\n**图 5-1.** *吞没异常*\n\n记录异常\n\n我们可能出于业务原因决定忽略该异常。例如，业务规则可能规定出于审计原因，交易不能被取消——它们必须完全处理，然后创建一个新交易来撤销第一个交易（这是一个常见的业务需求）。在这种情况下，我们可能会决定忽略客户端试图中断我们的事实，并继续尝试获取锁。\n\
  \n然而，在这种情况下，我们不想仅仅吞没异常——那样会让我们没有证据表明客户端正在尝试中断线程。因此，我们应该进行某种形式的日志记录。以下是一些示例：\n\n\
  38 } catch (InterruptedException ie) {\n\n39 log.info(\"忽略交易中的 InterruptedException\"\
  ); 40 }\n\n此更改的输出如图 5-2 所示。\n\n![图片 16](img/index-148_1.png)\n\n![图片 17](img/index-148_2.png)\n\
