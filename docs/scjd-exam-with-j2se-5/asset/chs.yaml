  第 1 章 ■ 引言\n\n**谁应该阅读本书**\n\n本书面向需要了解 J2SE 5 入门知识，并着眼于学习通过 Sun 认证 Java 开发人员考试所需材料的在职\
  \ Java 专业人员。SCJD 考试让程序员一窥他们在实际作业中可能遇到的情况，你必须为这一挑战做好准备。已经通过或能够通过 Sun 认证 Java 程序员（SCJP）考试的开发者会对此书感到得心应手。经验不足六个月的开发者，或许应该用\
  \ Apress 或其他出版社出版的一些优秀 Java 书籍来补充本书。\n\n本书详细描述了 JDK 的许多特性，其中一些已成为标准 Java 的一部分多年，另一些则仅在\
  \ JDK 5 中引入。我们在本书中唯一假设的是，读者对 Java 足够熟悉，能够通过 SCJP 考试——因此我们无需花时间解释语言的基础知识（例如，int 和\
  \ long 之间的区别）。然而，我们确实深入探讨了语言的变更，因此尚未学习 JDK 5 语言增强功能的考生可以在此发现它们。\n\n**关于本书**\n\n\
  本书针对 SCJD 认证，这是 Sun Microsystems 提供的多项 Java 认证考试之一。SCJD 和 SCEA（Sun 认证企业架构师）证书要求考生完成项目，而其他认证仅要求基于理论的考试，考生通常需要回答多项选择题。就编程而言，SCJD\
  \ 考试是 Sun 提供的最具挑战性的考试，而这正是本书关注它的原因。\n\n本书分为三个部分。第一部分侧重于通用开发考量，并概述了一个示例项目。第二部分从头开始教授必要的概念，同时促进理解和实现。第三部分以对设计和实现决策以及可能的替代路径的讨论作为本书的结尾。\n\
  \n本书提供了一个示例项目，该项目提供了与你在 SCJD 考试中遇到的挑战类似的挑战，同时引入并利用了 J2SE 5 的相关新特性。与考试相关的每个主题都得到了详细解释，并考虑了权衡取舍。在适当的情况下，探讨并实现了并行的开发路径。\n\
  \n在适用的情况下，各章简要讨论了所使用的设计模式，并对这些模式进行了简要说明。我们强烈建议你购买或下载一些模式资源。包括 Sun 网站 (http://www.sun.com)\
  \ 和 TheServerSide.com (http://www.theserverside.com) 在内的多个网站提供了富有洞察力的教程。此外，还有多本关于该主题的优秀书籍，包括\
  \ Elisabeth Freeman、Eric Freeman、Bert Bates 和 Kathy Sierra 合著的 *Head First 设计模式*（O'Reilly，2004\
  \ 年）。\n\n在本书中，我们提供了大量示例，以帮助开发一个真实的 Java 应用程序。每一章都通过探讨线程、Swing 或网络等关键主题，直接为该应用程序做出贡献。文本探讨了这些主题中自然产生的问题，并解释了如何应对挑战。更重要的是，讨论了这些选择的权衡取舍和影响。\n\
  \n5165CH01.qxd 11/16/05 12:01 PM 第 7 页\n\n第 1 章 ■ 引言\n\n**7**\n\n• 第 1 章，“引言”。本章是一般性介绍，旨在帮助你判断本书是否满足你的需求。它阐述了后续教育计划的结构，介绍了考试目标，并聚焦于后续的技术讨论。\n\
  \n• 第 2 章，“项目分析与设计”。本章详细介绍了基本的项目考量，例如目录结构、包开发、编码约定、ReadMe 文件以及为 SCJD 考试启动项目的一般方法。\n\
  \n• 第 3 章，“项目概述”。本章介绍了示例项目 Denny's DVDs。该应用程序要求你开发类以类似数据库的方式访问文件、构建 Swing 用户界面并设计网络层。仔细阅读本章非常重要，因为它有助于明确项目旨在实现的目标。\n\
  \n\n\n• 第 4 章“线程”。本章从零开始，引导你清晰理解线程。你还将学习`Runnable`接口、`Thread`类、锁、同步、等待、休眠、通知一个或所有等待线程、在\
  \ Swing 中使用线程的限制、死锁以及线程调度。\n\n接着，我们将介绍 J2SE 5 的新调度包，并演示它如何简化线程操作。重点是你需要掌握的线程知识，以便获得\
  \ Java 开发者认证。\n\n• 第 5 章“DvdDatabase 类”。本章演示如何创建一个满足示例项目要求并实现指定接口的类。我们将使用外观模式、值对象模式和适配器模式来简化代码。\n\
  \n• 第 6 章“基于 RMI 的网络通信”。本章介绍分布式计算。你将学习 RMI 以及如何在构建客户端和服务器时使用它。\n\n• 第 7 章“基于 Socket\
  \ 的网络通信”。本章介绍开发分布式计算的另一种方法。你将学习 Socket，以及使用 Socket 而非 RMI 的优缺点。第 7 章还简要讨论了安全性、序列化、命令模式和代理模式，以及示例项目。\n\
  \n• 第 8 章“图形用户界面”。本章介绍 Swing。它面向几乎没有 Swing 经验的 Java 程序员。本章假设你从零开始，快速解释 Swing 的工作原理、什么是\
  \ MVC 模式、事件如何处理、JTable 如何工作，以及所有组件如何协同工作。\n\n• 第 9 章“项目收尾”。本章让我们有机会回顾项目。我们进行最终润色并组织\
  \ JAR 文件。我们还回顾了所做的决策和涉及的权衡，并准备提交项目。\n\n项目的源代码以及各种有用的图表和文档，可以从 http://www.apress.com\
