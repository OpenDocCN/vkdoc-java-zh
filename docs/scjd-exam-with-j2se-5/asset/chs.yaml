  \ **177**\n\n编写 RMI 程序所需的另一个抽象类是 java.rmi.RemoteServer。RemoteServer 类是服务器实现的公共父类，并提供了支持广泛远程引用语义的框架。具体来说，创建和导出远程对象（即使其可远程访问）所需的功能由\
  \ RemoteServer 抽象提供，并由其子类具体实现。RemoteServer 有两个重要的子类：java.rmi.server.UnicastRemoteObject\
  \ 和 java.rmi.Activatable。\n\n导出远程对象是 Activatable 或 UnicastRemoteObject 的职责。Activatable\
  \ 对象在被请求时执行，并在必要时可以自行关闭，而 UnicastRemoteObject 仅在服务器启动并运行时运行。活动对象是已被实例化并导出到 JVM 的对象。被动对象是尚未被实例化的对象。激活是将被动对象转换为活动对象的过程。延迟激活是将激活推迟到首次使用时的过程。Activatable\
  \ 接口为 RMI 提供了延迟访问持久化对象直到需要时的选项。允许 RMI 服务器通过加载大量不常用或不需要的远程对象来占用大量系统资源是不可取的。理想情况下，分布式系统应该能够在非常长甚至无限的时间内访问数千个持久化对象。\n\
  \n使用 UnicastRemoteObject 的 RMI 服务器要求在远程客户端调用某个远程方法之前实例化远程对象。但在我们拥有许多远程对象且实例化所有对象的成本过高的情况下，Activatable\
  \ RMI 服务器是一个极好的替代方案。通过将 Activatable 接口与 RMI 守护进程 rmid 结合使用，服务器将在需要时实例化远程对象。\n\n\
  幸运的是，在实现我们的 RMI 服务器时，我们无需担心资源管理的这一方面，因为我们只有一个远程对象 BookDatabaseImpl，它充当我们的 RMI 服务器和数据库网关。本书不演示\
  \ Activatable 的实现。相反，我们扩展了 UnicastRemoteObject 类。\n\n**什么是 RMI 工厂？**\n\nRMI 工厂正如其名：软件设计模式中恰如其分地命名为工厂模式的\
  \ RMI 版本。如第 5 章（讨论了数据锁定）所述，我们利用 RMI 工厂为锁所有权提供适当的标识符机制。通过确保每个 RMI 客户端拥有自己版本的 DvdDatabase\
  \ 类，我们避免了线程重用的问题，这在 RMI 中很常见，并且无法通过 JVM 或 RMI 属性显式控制。由于我们无法确定线程的使用方式，也不允许使用 cookie\
  \ 或令牌来标识请求者，因此我们利用工厂模式来生成 DvdDatabase 的离散实例。图 6-9 中的序列图描绘了工厂模式中的典型操作和参与者。\n\n5165CH06.qxd\
  \ 11/16/05 12:14 PM 第 178 页\n\n**178**\n\n第 6 章 ■ 使用 RMI 进行网络编程 **图 6-9.** *应用于\
  \ Denny's DVDs 的 RMI 工厂模式* 工厂模式——什么是工厂？\n\n*工厂*是一种创建其他类型软件实体的软件实体。客户端向工厂请求某种类型的对象，然后该对象就被创建出来。请求另一种类型，工厂将创建并返回所请求的类型。当然，工厂需要知道如何创建所请求的对象；否则工厂会抱怨它不理解该请求。例如，你不会向专门生产汽车的工厂请求一台个人电脑。同样，我们的工厂将知道如何创建远程对象。具体来说，我们的工厂将创建一种特殊类型的远程对象：DvdDatabase。\n\
  \n从某种意义上说，我们的工厂不是一个非常健壮的工厂，因为我们只批量生产一种对象类型：DvdDatabase。实现 RMI 工厂最常见的动机之一是减少需要注册的远程对象数量。这允许我们只注册一次工厂，并逐步演进和添加新的远程类，而无需注册新类甚至重启注册表。这是\
  \ RMI 工厂的一个不错的副产品，尽管它不适用于我们的情况。\n\n我们在 Denny's DVDs 中实现的 RMI 工厂是参数化工厂模式的一个示例，这是一种创建型模式（即涉及创建对象和/或类型的模式；单例模式是创建型模式的另一个常见示例）。它是参数化模式的一个变体，因为我们实际上并没有向\
  \ getClient 方法提供名称或参数。它可以写成 getClient(String class_name_to_create)。然而，由于我们的应用程序只有一个远程接口\
  \ DvdDatabaseRemote，因此类的类型是隐含的。我们不需要指定。但我们可以轻松地修改此方法或工厂以返回多个远程对象。\n\n5165CH06.qxd\
  \ 11/16/05 12:14 PM 第 179 页\n\n第 6 章 ■ 使用 RMI 进行网络编程 **179**\n\nRMI 实现\n\n为了创建我们服务器的一个充当工厂的版本，我们首先定义工厂及其唯一的方法\
