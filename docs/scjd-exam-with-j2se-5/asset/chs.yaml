  163 }\n\n与文件本身一样，UPC 编号到文件位置的映射是一个被多个线程使用的单一对象。然而，在大多数情况下，线程只会从 `recordNumbers`\
  \ 映射中读取数据——更新此映射的方法要罕见得多。在 JDK 5 之前，我们会同步对 `recordNumbers` 映射的所有访问，这意味着在任何给定时间只能有一个线程访问它。有了\
  \ JDK 5，我们现在有了 `ReadWriteLock`，它允许更高的并发性。我们不再同步代码，而是将代码封装在对 `lock` 和 `unlock` 方法的调用中。多个线程可以在任何给定时间拥有对单个对象的读锁，但任何给定时间只能有一个线程拥有写锁。\n\
  \n如果我们从构造函数中运行此代码，那么我们将更新 `recordNumbers` 映射，因此我们不希望任何其他线程在此期间访问该映射——写锁将为我们确保这一点。这在第\
  \ 136 行设置，并在第 157 行的 `finally` 块中释放。\n\n确保即使抛出异常也能释放锁非常重要；因此，对 `unlock` 的调用放在 `finally`\
  \ 块中，以确保它始终被执行。这是使用新的锁定类时的推荐做法。\n\n第 150 行将我们的 UPC 字符串和文件中的位置添加到映射中。使用泛型和自动装箱（在第\
