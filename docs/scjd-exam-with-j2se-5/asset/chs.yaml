  \ 3000 上来自任何 Java 或非 Java 客户端的请求。一旦收到请求，连接即被接受，这意味着 `accept` 方法停止阻塞并返回 `Socket`\
  \ 对象。生成的 socket 作为参数传递给 `DBSocketRequest`。随后，服务器 socket 为客户端请求生成一个新线程。这种设计使得多个客户端能够连接到\
