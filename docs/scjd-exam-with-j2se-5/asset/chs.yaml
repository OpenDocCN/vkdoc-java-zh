  \ [EAN] 和校验和），请参考诸如维基百科 (http://en.wikipedia.org/wiki/Main_Page) 以及各种在线 UPC 数据库等网站。当然，此类主题远远超出了本书的范围。就我们的目的而言，UPC\
  \ 是系统范围标识符或主键的一个很好的替代品。\n\n**图 3-1.** *Denny's DVDs 用例图*\n\n5165CH03.qxd 11/16/05\
  \ 12:10 PM 第 60 页\n\n**60**\n\n第 3 章 ■ 项目概述\n\n图 3.1 中的操作构成了 Denny's DVDs 应用程序必须实现的公共接口\
  \ `DBClient.java`。以下是接口方法的描述：\n`addDVD`——需要一个 DVD 对象作为输入参数。如果 UPC 是唯一的，则将 DVD 添加到系统；否则，将抛出异常。\n\
  `getDVD`——给定一个 DVD 的 UPC 值，此方法应返回相应的 DVD 对象。如果在数据库中未找到该 UPC，则返回空对象。\n`modifyDVD`——需要一个\
  \ DVD 对象，其 UPC 存在于数据库中。将用新的 DVD 值覆盖现有的 DVD。如果数据库中没有包含所提供 UPC 代码的 DVD，则返回 `false`，并且数据库不会更新。\n\
  `getDVDs`——应返回数据库中所有 DVD 的集合。如果数据库中没有 DVD，则应返回一个空集合。\n\n■**注意** 可供下载的 Denny's DVDs\
  \ 系统附带一个初始数据库，本书示例中会一直引用该数据库。\n\n`findDVD`——此操作应使用正则表达式查询作为输入参数。所提供的输入参数应通过正则表达式查询匹配多个属性。输入参数是正则表达式查询，因此应用程序必须在调用此方法之前将用户的搜索条件转换为正则表达式查询。将用户的搜索条件转换为正则表达式可以在\
  \ GUI 中完成，也可以通过某个中间类完成，但不能在 `findDVD` 方法本身中完成。当然，你不能要求或期望用户输入正则表达式语法作为搜索条件。应返回一个\
  \ DVD 集合。\n\n\n\nreleaseDVD — 将增加可用 DVD 的数量。此操作相当于归还租赁。该操作应返回 true，表示由 UPC 标识的 DVD\
  \ 存在于数据库中且有副本处于出租状态。否则，该操作返回 false。\n\nreserveDVD — 将减少 DVD 数量，表示有人已租借了其中一个可用副本。需要一个\
  \ UPC 作为输入参数。如果要预留的 DVD 的 UPC 不存在，则返回 false；如果该 DVD 没有更多副本可供租赁，也返回 false。\n\nremoveDVD\
  \ — 将移除具有匹配 UPC 的 DVD 并返回 true。如果在数据库中未找到该 UPC，则不移除任何 DVD，并且该方法返回 false。\n\n该接口必须有一个\
  \ GUI，以允许执行此处列出的每个必需方法。此外，GUI 必须能够连接到网络上的服务器，或者以独立模式运行并连接到本地主机上的服务器。您还必须考虑与并发用户访问和记录锁定相关的设计问题。清单\
