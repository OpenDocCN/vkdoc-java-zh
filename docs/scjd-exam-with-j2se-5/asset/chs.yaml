  ; // 他们将租赁的 DVD\nprivate DBTester[] clients = null; // 测试客户端数组\n\n5165CH09.qxd 11/16/05\
  \ 12:17 PM 第 315 页\n\n第 9 章 ■ 项目收尾\n\n**315**\n\npublic static void main(String[]\
  \ args) throws Exception {\n\nnew DBTestRunner();\n\n}\n\nDBTestRunner() throws\
  \ Exception {\n\nclients = new DBTester[numberOfClients];\n\nstartClients();\n\n\
  waitForClientsToDie();\n\ndisplayStatistics();\n\n}\n\nprivate void startClients()\
  \ throws Exception {\n\nfor (int i = 0; i < numberOfClients; i++) {\n\nString clientName\
  \ = \"Client \" + i;\n\nclients[i] = new DBTester(clientName, rentalsPerClient,\
  \ dvdUpc);\nclients[i].start();\n\n}\n\n}\n\nprivate void waitForClientsToDie()\
  \ throws Exception {\n\n// 等待所有客户端完成\n\nfor (DBTester client : clients) {\n\nclient.join();\n\
  \n}\n\n}\n\n重要的是要认识到，即使在生成统计信息时客户端线程都已处于 TERMINATED 状态，DBTester 对象仍然存在，我们仍然可以调用该对象上的公共方法来获取统计所需的信息。\n\
  \nprivate void displayStatistics() {\n\n// 显示一些统计信息\n\nSystem.out.println();\n\n\
  formatLine(\"========\", \"========\", \"========\", \"========\", \"========\"\
