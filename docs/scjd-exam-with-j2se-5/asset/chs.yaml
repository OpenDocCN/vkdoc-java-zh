  \ PM 第 192 页\n\n**192**\n\n第 6 章 ■ 使用 RMI 进行网络编程 所有 RMI 实现都必须是线程安全的，因为如果 RMI 运行时生成多个线程，对特定对象的调用可能会并发发生。RMI\
  \ 线程管理没有保证。因此，确保远程对象实现是线程安全的是你的责任。在我们的案例中，使用 RMI 工厂模式，并结合 DvdDatabase 类中的 reserveDVD\
  \ 和 releaseDVD 方法，确保了我们的实现是线程安全的。\n\n如果你选择不扩展 UnicastRemoteObject，而是在构造函数中调用类方法\
  \ UnicastRemoteObject.export，那么必须实现诸如 hashcode、toString 和 equals 等对象方法。清单 6-10 展示了类构造函数和声明如何适应这种方法（为简洁起见，省略了其余代码）。\n\
  \n**清单 6-10.** *导出 UnicastRemoteObject* public class DvdDatabaseImpl implements\
  \ DvdDatabaseRemote\n\n{\n\npublic DvdDatabaseImpl() throws RemoteException {\n\n\
  \n\n`UnicastRemoteObject.exportObject(this);`\n\n`this.dvdDatabase = new DvdDatabase();`\n\
  \n`}`\n\n`}`\n\n**存根与骨架**\n\n只有客户端会实际调用*存根*上的方法，存根是远程对象的本地表示或代理。虽然看起来客户端是直接调用远程对象，但客户端并不知道，它实际上是在调用存根中的一个代理方法，该方法会启动与目标虚拟机的通信。存根负责在通过网络发送远程方法调用的参数之前，对它们进行打包。在通过网络传输之前打包参数的过程称为*编组*。\n\
  \n在网络另一端，即服务器端，传入的调用最终由远程引用层接收，该层对参数进行解组，并将调用分派给实际的服务器对象。然后，服务器将返回值编组，发送回客户端的调用方。\n\
  \nJ2SE 1.5 引入了一项新特性，无需再使用 `rmic` 工具为客户端单独生成存根类。现在，存根类可以在运行时由 JVM 动态生成。（但是，在我们的提交中，仍然需要使用\
  \ `rmic` 来生成存根。）要无条件地动态生成存根，请将 JVM 参数 `java.rmi.server.ignoreStubClasses` 设置为 `true`。这可以通过\
  \ `-D` 选项完成（例如，`java -Djava.rmi.server.ignoreStubClasses=true`）。\n\n■**注意** 为了与\
  \ J2SE 1.5 之前的客户端向后兼容，您仍然必须使用 `rmic` 生成存根类。\n\n5165CH06.qxd 11/16/05 12:14 PM Page\
  \ 193\n\n第 6 章 ■ 使用 RMI 进行网络编程 **193**\n\n`rmic` 工具可以根据上下文以多种方式使用。`rmic` 允许与旧版 Java（如\
  \ Java 1.1（存根和骨架）和 Java 1.2（仅存根））兼容。J2SE 1.5 不需要使用骨架，但正如我们之前提到的，在您的项目提交中仍然必须使用 `rmic`。\n\
  \n■**注意** 骨架接口在 Java 2 平台（即 JDK 1.2 及更高版本）中已被弃用。要仅为我们的 RMI 实现创建 1.2 版本的存根，我们使用以下\
  \ `rmic` 语法：\n\n`rmic -v1.2 sampleproject.remote.DVDDatabaseImpl`\n\n■**注意** RMI\
  \ 使用了代理设计模式。代理模式指定一个代理对象来控制对真实对象的访问。此设计模式中有三个关键角色：主题、代理和真实主题。代理对象持有对真实主题的引用，并负责与真实主题之间的通信。主题为代理和真实主题提供相同的接口。真实主题是代理所代表并由主题定义的对象的具体实现。在\
  \ RMI 中，主题对应远程实现。\n\n存根是代理，远程对象实现是真实主题。图 6-13 展示了代理设计模式中的各个元素。\n\n**图 6-13.** *代理设计模式*\n\
  \n为了与旧版 Java 的存根/骨架向后兼容，您可以访问以下链接了解更多关于 `rmic` 的信息：Windows 系统请访问 http://java.sun.com/j2se/1.5.0/docs/tooldocs/windows/rmic.html，Unix\
  \ 系统请访问 http://java.sun.com/j2se/1.5.0/docs/tooldocs/solaris/rmic.html。\n\n**参数传递**\n\
  \nRMI 方法调用需要不同机器和不同 JVM 上的对象之间进行通信，尽管该调用的行为就像是在同一个 JVM 内的本地调用一样。本节描述 RMI 如何在不同的\n\
  \n5165CH06.qxd 11/16/05 12:14 PM Page 194\n\n**194**\n\n第 6 章 ■ 使用 RMI 进行网络编程 JVM\
  \ 之间传输参数和返回值。需要考虑三类参数和返回值：原始类型、可序列化对象和远程对象。\n\n■**注意** 原始类型数组和可序列化对象数组也可以安全地作为远程方法参数传递。\n\
  \n**原始类型**\n\nRMI 会为方法参数和返回值都创建原始类型的副本。当原始类型的副本通过网络发送时，我们说该参数或返回值是*按值传递*的。\n\n**可序列化对象**\n\
  \n当一个对象作为方法参数或返回值通过网络进行编组时，RMI 会将该对象及其引用的所有对象作为一个大的对象图进行复制。对象参数与原始类型一样，是按值传递通过网络发送的。\n\
  \n被传递的对象必须是可序列化的，否则会抛出 `NotSerializableException`。此外，被编组的对象的所有类成员也必须是可序列化的，除非该成员被声明为\
  \ `transient` 成员，或者实现了 `Externalizable` 接口而不是 `Serializable`。\n\n**远程对象**\n\n这是三种情况中最复杂的一种。当返回的项目是一个远程对象（即实现了\
  \ `java.rmi.Remote` 的对象）时，该对象的代理（即存根）会被返回，而不是真实对象。通过这种方式，远程对象是按引用传递的，并且存根会在两端之间来回编组。\n\
  \n默认情况下，远程对象实现了 `Serializable`。表 6-3 总结了 RMI 如何处理各种参数和返回值。RMI 使用两种机制之一来获取远程对象引用。RMI\
  \ 注册表是一种方式，另一种是简单地传递代理或存根，这在前文已经讨论过。RMI 注册表使用 `java.lang.Naming` 来存储对远程对象的引用。`java.rmi.Naming`\
  \ 提供了基于 URL 的方法，用于关联位于特定主机和端口上的名称-对象对。RMI 还可以使用有效的 URL 命名协议（如 FTP 或 HTTP）加载字节码。当客户端与远程对象交互时，它也是与远程对象接口交互，而不是与实际的远程实现交互。\n\
  \n**表 6-3.** *RMI 参数传递*\n\n**对象/类型**\n\n**参数/返回值**\n\n远程对象\n\n按引用传递：传递的是存根，而不是副本。\n\
  \n非远程/序列化对象\n\n按值传递：传递的是对象的实际序列化副本。\n\n原始类型\n\n按值传递：创建副本。\n\n5165CH06.qxd 11/16/05\
  \ 12:14 PM Page 195\n\n第 6 章 ■ 使用 RMI 进行网络编程 **195**\n\n**安全性与动态加载**\n\n通过网络运行 RMI\
  \ 应用程序需要服务器和客户端的类加载器能够访问某些文件。表 6-4 总结了需要哪些文件。\n\n**表 6-4.** *类加载器要求*\n\n**客户端类加载器需要**\n\
  \n**服务器类加载器需要**\n\n远程接口\n\n远程接口、远程实现\n\n远程对象的存根\n\n远程对象的存根\n\n用作返回值的服务器类\n\n远程对象的骨架（仅限\
  \ JDK 1.1 版本）\n\n杂项客户端类\n\n杂项服务器类\n\n当客户端本地拥有远程对象存根和类文件时，任务会简单得多，并且没有特殊的运行时注意事项。但是，如果客户端只有远程接口，Java\
  \ 提供了动态加载类和存根的能力。动态加载是 RMI 中的一个特性，允许检索本地不可用的对象。有两个重要的类使动态加载成为可能：`RMIClassLoader`\
  \ 和 `SecurityManager`。\n\n除了这两个重要的类之外，您还需要知道要加载的类的位置。这被称为代码库。可以将代码库视为类似于类路径，只不过它位于可通过\
  \ URL 访问的不同机器上。类路径类似于本地代码库。代码库属性是 `java.rmi.server.codebase`。它可以在命令行中指定如下：\n\n`java\
  \ -Djava.rmi.server.codebase <URL>`\n\n使用 RMI 时，动态类加载需要 `java.rmi.server.RMIClasssLoader`\
  \ 类。\n\n\n\nRMIClassLoader 类利用了代码库属性。它可以从小程序或 RMI 应用程序中加载类。就我们的目的以及认证考试而言，关于安全性的讨论将简要带过。在我们的实现中，无需担心安全或策略文件，因为我们的应用程序没有使用安全管理器。由于需要与\
  \ Java 2 之前的应用程序兼容，Java 2 使用了安全管理器选项。然而，在专业的 RMI 应用程序中，安全管理器是标配。此外，如果你的网络应用程序使用动态类加载，则必须使用安全管理器。\n\
  \n防火墙问题\n\n当客户端和服务器被防火墙隔开时，RMI 传输层会被禁止创建套接字连接。在禁止套接字连接的情况下，RMI 会使用一种称为 HTTP 隧道（HTTP\
  \ tunneling）的技术。隧道技术是将 RMI 调用封装在 HTTP POST 请求中的过程，防火墙通常允许这种请求。\n\n隧道技术是自动完成的。当传输层拒绝套接字连接时，会通过\
  \ HTTP 隧道技术作为最后的手段来尝试处理请求。\n\n5165CH06.qxd 11/16/05 12:14 PM 第 196 页\n\n**196**\n\
  \n第 6 章 ■ 使用 RMI 进行网络通信\n\n■**注意** Java 程序的权限由策略文件控制。Java 2 安全模型要求程序和 RMI 注册表拥有创建套接字的权限。毕竟，RMI\
  \ 是基于套接字的。客户端在启动时也需要指定一个策略文件。以下是我们启动 RMI 注册表以加载非默认策略文件的方法：rmiregistry -J-Djava.security.policy=ourSecurityFile.policy。\n\
  \n除非在服务器属性 `http.proxyHost` 中指定了其他端口，否则默认使用端口 80。然而，HTTP 隧道技术会带来许多代价。性能会下降，安全性也可能受到损害。可以通过将服务器属性\
  \ `java.rmi.server.disableHttp` 设置为 `true` 来禁用隧道技术。\n\n**总结**\n\n本章涵盖了大量的信息。首先，我们回顾了序列化。任何可能通过网络发送的对象在传输之前都必须被序列化。套接字（将在下一章讨论）和\
  \ RMI 都需要序列化。在 RMI 中，返回值和方法参数都必须可序列化，应用程序才能正常工作。\n\n最后，我们深入探讨了 RMI，并为 Denny's DVDs\
  \ 实现了一个 RMI 解决方案。考虑到构建套接字实现所需的工作量，我们能够体会到 RMI 在底层做了多少工作。我们无需担心编写多线程服务器，因为 RMI 为我们处理了这方面的问题。我们也无需为了实现应用程序协议而创建命令和结果对象。\n\
  \n然而，RMI 确实要求我们定义一个远程接口，并确保所有方法参数都是可序列化的。此外，我们还需要将远程对象注册到 RMI 命名服务，并启动 RMI 注册表，以便远程客户端能够访问我们的对象。我们希望你已经对序列化、套接字和\
  \ RMI 有了足够的了解，从而能够为 SCJD 考试设计和实现一个完整的网络解决方案。以本项目网络包作为指南，结合本章内容，你应该已经做好了充分的准备。\n\n\
  **常见问题解答**\n\n**问** RMI 是线程安全的吗？\n\n**答** 不是。J2SE 1.4 RMI 规范不保证访问远程对象的线程数量。因此，你的设计必须考虑线程安全问题。关于锁定和线程安全的详细信息，请参见第\
  \ 4 章。我们在本章中使用的方法是创建一个 RMI 工厂，确保 `DvdDatabase` 包装类有一个唯一的实例，并将其用作记录锁定的唯一标识符。\n\n\
  5165CH06.qxd 11/16/05 12:14 PM 第 197 页\n\n第 6 章 ■ 使用 RMI 进行网络通信 **197**\n\n**问**\
  \ RMI 和套接字，哪种方法更好？\n\n**答** 每种方法都有其优势。套接字适用于在没有太多开销的情况下发送大量数据（无论是否使用协议）。使用 RMI 实现多线程服务器要容易得多，因为\
  \ RMI 为你处理了线程方面的问题。远程对象的行为也像一个本地对象，拥有完整的协议或一组公共方法，而套接字则需要你实现一个协议。这实际上取决于你，但只要你理解与协议相关的关键技术问题，两种方法都应该能很好地工作。\n\
  \n**问** 是否需要安全管理器或某种身份验证？\n\n**答** 这在很大程度上取决于你考试的具体要求。请非常仔细地阅读说明！每次考试都不同。在本章中，我们简要讨论了一些安全问题，如策略文件、动态类加载、HTTP\
  \ 隧道、防火墙和安全管理器。然而，在我们的实现中，我们确实包含了安全管理器，但没有使用策略文件。\n\n**问** 在我的 J2SE 5.0 RMI 实现中，是否需要包含骨架（skeletons）？\n\
  \n**答** 不需要。骨架仅对 1.2 之前的 Java 版本（即 1.1 版本）是必需的。默认情况下，当你在远程对象实现上运行 `rmic` 时，会生成骨架，但你可以使用\
  \ `rmic` 的 `-keep v1.2` 选项来控制此功能。然而，在撰写本文时，认证项目仍然要求你的提交中包含存根（stubs），并且你不能依赖 Tiger\
  \ 版本（即 J2SE 5.0）中的动态存根生成技术。\n\n**问** 我需要手动启动 RMI 注册表吗？\n\n**答** 不需要。注册表必须以编程方式启动。同样，请阅读你考试中的说明。但最有可能的是，你需要像我们在\
  \ `RegDVDDatabase` 类中那样启动注册表。该类有一个 `register` 方法，该方法将远程对象实现类绑定到 RMI 命名服务，并使用 `LocateRegistry.register`\
  \ 方法。当我们在网络上运行此程序时（如第 8 章所述），你应该从 `main` 方法中调用 `Connector` 的 `getRemote` 方法。\n\n\
  5165CH06.qxd 11/16/05 12:14 PM 第 198 页\n\n5165CH07.qxd 11/16/05 12:15 PM 第 199 页\n\
  \n第 7 章\n\n■ ■ ■\n\n使用套接字进行网络通信\n\n**本**章描述如何使用套接字构建 Denny's DVDs 的网络层。\n\n套接字是一种软件抽象，允许应用程序通过网络相互通信。通过\
  \ IP（互联网协议）连接的两台机器之间的任何连接都需要使用套接字。Java 为程序员提供了连接应用程序套接字的能力，但正如我们将在本章中看到的，需要做大量工作来确保客户端和服务器能够使用标准套接字进行有效通信。为了减轻部分工作，Java\
  \ 还提供了远程方法调用（RMI）框架，该框架构建在套接字之上。然而，正如你在前一章所学到的，使用 RMI 会引入其自身的问题。两种网络解决方案各有利弊，作为开发人员，你需要根据具体情况决定哪种方案更合适。在本章中，我们将为示例项目详细说明一个简单的套接字解决方案，为你提供所需的信息，以便你在\
  \ Sun 认证项目中就使用哪种解决方案做出明智的决定。\n\n我们将涵盖的主要领域包括\n\n• 套接字概述\n\n• 为什么要使用套接字\n\n• 连接套接字所需的基本信息\n\
  \n• 如何构建 TCP 套接字客户端\n\n• 如何构建 TCP 套接字服务器\n\n• 套接字与序列化对象\n\n• 套接字生命周期\n\n**套接字概述**\n\
  \n\n\n*套接字*是两个程序之间通信链路中的一个端点，并且始终绑定到一个端口。套接字连接用于连接远程机器，以及发送和接收数据。要创建套接字连接，你需要目标主机地址和端口号。套接字并非\
  \ Java 所特有。然而，自 JDK 1.0 以来，所有版本的 Java 都提供了创建套接字的工具。与 RMI 一样，讨论将按客户端和服务器的考量进行划分。\n\
  \n服务器是一个监听服务，用于接收来自套接字客户端的连接请求。\n\n当请求被批准时，服务器会建立一个套接字到套接字的连接。客户端将使用服务器的主机名（或 IP\
  \ 地址）和端口来请求连接。在网络的服务端，`java.net.ServerSocket` 是用于监听来自套接字客户端的连接请求的类。`java.net.Socket`\
  \ 类是套接字连接的一个端点。\n\n服务器和客户端在每个套接字连接上都会有一个 `java.net.Socket` 实例。\n\n**为什么使用套接字**\n\
  \n在套接字和 RMI 之间做出选择，是你在认证项目中必须做出的最大决定之一。但每种选择都有其自身的优势和权衡。如果 JavaRanch 认证考试论坛上的讨论能说明问题，那么大多数开发者似乎都选择了\
  \ RMI 方案。事实上，在本书的第一版中，我们曾推荐使用 RMI 而非套接字，仅仅是因为当时我们认为从 Java 程序员的角度来看，这种方法更直观。然而，自那以后，我们不再坚持这一论断。无论是\
  \ RMI 还是套接字都能很好地工作，并且两者实现起来都相当直接。但对于那些喜欢冒险的人来说，让我们讨论一下你可能选择套接字方案的一些原因。\n\n套接字服务器比\
  \ RMI 服务器更具可扩展性且速度更快。获取远程对象句柄需要以注册表查找的形式进行网络调用。此外，每个远程对象都有一个客户端代理或存根，这实际上在客户端和实际远程对象实现类之间增加了一个对象层。这种通信开销是以性能为代价的。\n\
  \n通常，提到*不*使用套接字的原因之一是需要在套接字客户端和套接字服务器之间建立隐式契约或应用协议。我们将在本章后面的“应用协议”一节中更详细地讨论这一点。但是，如果协议非常简单呢？在套接字接口简单的情况下，套接字是一个极好的选择。\n\
  \n最后一个值得考虑使用套接字实现的原因涉及线程。在我们的套接字方案中，每个套接字客户端请求都会产生一个新线程，我们可以利用这个线程来维护对 `DvdDatabase`\
  \ 的锁定。这意味着我们不必像使用 RMI 那样担心实现工厂模式。我们的套接字方案的本质避免了这一可能复杂化的问题。当然，你现在必须处理开发多线程套接字服务器的问题，但解决方案即将到来！Denny's\
  \ DVDs 就是一个多线程套接字服务器，我们将在本章后面描述我们的服务器实现。\n\n**套接字基础**\n\n在本节中，我们将探讨 Java 程序员可用的套接字类型，以及与套接字开发相关的一些基本概念。\n\
  \n**地址**\n\n地址是用于标识连接到网络的设备的唯一编号，就像邮政地址标识城市中建筑物的位置一样。IP 地址是一个唯一的编号，通常由 12 位或更多数字组成，技术上是一个\
  \ 32 位或 128 位的无符号数，由互联网协议（即 IP）使用，用于在基于 TCP 或 UDP 的网络上在套接字地址之间发送消息。`java.net.InetAddress`\
  \ 类是封装了 IP 地址以供 Java 套接字使用的 Java 类。\n\n■**注意** TCP/IP 使用的 32 位寻址方案自 20 世纪 70 年代以来就已存在。随着越来越多的设备需要互联网地址，据估计，所有当前可用的地址将在\
  \ 2016 年至 2023 年之间的某个时候被用完（然而，之前对互联网增长的估计远低于实际情况，因此这个数字并不可靠）。为了缓解这个问题，一种新的寻址方案已被推荐并正在逐步实施。32\
  \ 位寻址方案称为 IPv4，新的寻址方案称为 IPv6。Java 分别通过 `Inet4Address` 类和 `Inet6Address` 类支持这两种方案。在本章中，我们将使用\
  \ IPv4，因为这是目前最常用的寻址方案。\n\n**TCP 和 UDP 套接字概述**\n\n多年来，编程已经从手动设置二进制指令（1GL 或第一代语言），发展到汇编语言（2GL）、人类可读语言（Java、C++）以及像\
  \ SQL（4GL）这样的规范语言。后来的语言并没有消除对低级语言的需求——它们只是完成了将程序员代码翻译成低级代码的艰巨工作。例如，在使用 Java 编程时，你的代码将由\
  \ Java 编译器翻译成字节码（大致对应于汇编语言程序的输出），然后由 JVM 将其翻译成计算机的二进制指令。虽然你仍然可以找到机器语言程序员的工作，但许多程序员发现这类工作速度慢且容易出错——使用像\
  \ Java 这样的高级语言可以极大地提高生产力和工作质量。\n\n类似地，网络协议多年来也在不断发展，因此我们不再需要担心最底层的网络细节。当你编写 Java\
  \ 程序时，你通常不关心如何通过电线（或其他介质）物理发送信号，也不关心你的计算机是通过以太网还是令牌环网络进行通信；你只关心如何建立连接。最后，为了使用套接字，我们将使用\
  \ IP 而不是其他网络层（X.25、ICMP、IPX）。但即使选择了使用套接字，将所有低级通信留给 IP 层及其下层，我们仍然需要在 TCP 和 UDP 套接字之间做出选择。\n\
  \nUDP 套接字\n\n用户数据报协议（UDP）使网络上的机器能够相互发送数据报包。UDP 套接字的工作方式与美国邮政系统非常相似。消息或信件被发送到特定地址，服务器或收件人端点不需要立即响应。UDP\
  \ 套接字不需要双向连接。同样，邮政系统不要求收件人在信件送达时在场。\n\n让我们进一步考虑一下邮件的类比。一封信被投递到邮箱，然后被送到指定的地址。邮递员随后将信件放入目的地的邮箱。邮政系统不要求有人在那里接收信件（当然，我意识到有时包裹需要签名，但为了方便起见，我们现在先忽略这类包裹）。当收信人回家后，他或她就可以取走邮件。\n\
  \n\n\nUDP 会丢弃损坏的消息（数据报），因此无法保证通过 UDP 发送的消息一定能到达最终目的地，就像无法保证通过邮政系统寄出的信件一定能送达收件人一样。Java\
  \ API 中主要使用的类是 DatagramSocket 和 DatagramPacket。一个*数据包*是以字节序列形式在网络中传输的信息。由于不保证消息能够送达，且可能乱序接收，UDP\
  \ 套接字应用程序必须处理消息重排和数据丢失的问题。\n\n效率和灵活性是选择 UDP 套接字方法的主要原因。\n\n我们出于几个原因不使用 UDP。首先，效率并非我们首要考虑的问题。其次，也是最重要的一点，考试不允许使用\
  \ UDP 方法。所以这基本上让我们的决定变得非常明确。但如果我们采用 UDP 方法，那么客户端和服务器都将使用 DatagramSocket 类来发送和接收\
  \ DatagramPacket 对象。本章剩余部分以及示例项目将使用 TCP 套接字而非 UDP 套接字，因此我们对 UDP 的讨论到此为止。\n\n■**注意**\
  \ 考试要求在这方面往往比较模糊。最可能的指示是“你必须使用基于简单套接字连接的序列化对象，或者使用 RMI。”对于什么是简单套接字，以及这是否排除了 UDP\
  \ 解决方案，并没有明确说明。我们将其理解为你应该使用 java.net.Socket 类，而不是 java.net.DatagramSocket 类。虽然从技术上讲，为此任务创建\
  \ UDP 解决方案是可行的，但这样做需要大量工作来开发数据包处理代码，并且会违背 UDP 的标准预期用途（简单、短小 [通常小于 100 字节] 的消息）。因此，我们建议，如果你使用套接字作为网络协议，请采用更简单的\
  \ TCP 方法。不过，话虽如此，你始终应参考你的具体考试说明。\n\nUDP 专为最小化消息传递应用而设计——例如，在尝试监控网络应用（如 SNMP（简单网络管理协议））时可能使用的非常小的消息——或者用于非常简单的查询/响应，如\
  \ DNS（域名系统）查询。对于较大的消息，例如在我们的示例应用中响应数据库查询时可能产生的大消息，最好使用 TCP。下一节将介绍如何使用 TCP 开发套接字解决方案。\n\
  \nTCP 套接字\n\nTCP 代表传输控制协议——一种控制数据包传输的协议，以确保消息能够被接收，并且数据包按照发送顺序被接收。为了满足这些保证，TCP 协议使用的网络流量略多于\
  \ UDP（并且由于 RMI 比普通 TCP 套接字提供更多功能和保证，它使用的网络流量甚至比 TCP 还多）。然而，由于该协议为我们提供了这些功能，我们无需在应用程序中验证数据包的接收顺序。这使得它成为\
  \ Denny's DVDs 的更好选择。\n\nTCP 套接字是一种利用 TCP/IP 连接作为其底层传输协议的套接字连接。连接的每一端都由一个 IP 地址和一个端口号标识。TCP\
  \ 套接字客户端发送请求，TCP 套接字服务器监听请求。\n\n以下是 TCP 套接字通信涉及的基本步骤：**1.** 创建套接字类的实例。\n\n**2.**\
  \ 使用套接字 I/O 流发送序列化消息。\n\n**3.** 关闭套接字连接。\n\n■**注意** 对于初始连接，有两个要求：一个发送初始连接请求的套接字客户端，以及一个监听传入连接请求的套接字服务器。但是一旦连接建立，你就拥有了两个套接字之间的连接，任何一端都可以发送或接收数据。由通信协议决定在任何给定时刻哪个套接字在发送数据，哪个套接字在接收数据。我们将在本章后面的“应用协议”一节中介绍应用协议。正如你可能想象的那样，如果客户端或服务器不遵循应用协议，点对点通信将会中断。\n\
  \n**TCP 套接字客户端**\n\njava.net.Socket 类负责实现套接字到套接字的连接。该类的构造函数（实际上会尝试连接到目标机器）需要目标机器的主机名（作为\
  \ URL 字符串）和端口。表 7-1 列出了 java.net.Socket 的各种公共构造函数。\n\n**表 7-1.** *java.net.Socket\
  \ 的公共构造函数* **Socket 类**\n\n**Socket 类构造函数**\n\npublic Socket()\n\n创建一个未连接的套接字。\n\
  \npublic Socket(InetAddress address,\n\n最常用的。创建一个连接到指定地址和端口的\n\nint port)\n\n已连接套接字。\n\
  \npublic Socket(InetAddress address,\n\n创建一个连接到远程地址和端口，并同时绑定到本地\n\nint port, InetAddress\
  \ localAddr,\n\n地址和端口的套接字。\n\nint localPort)\n\npublic Socket(String host,\n\n创建一个流套接字并将其连接到指定的\n\
  \nint port)\n\n主机和端口。\n\npublic Socket(String host,\n\n连接到远程主机和端口，并绑定到\n\nint port,\
  \ InetAddress localAddr,\n\n本地地址和端口。\n\nint localPort)\n\n一旦建立套接字连接，你可以通过各种 getter\
  \ 方法获取有关连接的信息。客户端套接字不绑定到服务器所在的端口号。相反，客户端套接字被分配一个用于与服务器通信的本地端口。\n\n![Image 25](img/index-223_1.png)\n\
  \n在接口 SocketOptions 中定义了许多常量。这些常量用作自定义客户端套接字的设置。我们不直接实现 SocketOptions 接口，但可以通过 Socket\
  \ 类中的 getter 和 setter 方法访问其常量。在接下来的几节中，我们将讨论一些更有用的选项。\n\n使用 SO_TIMEOUT\n\n当通过使用输入流的\
  \ read 方法从套接字读取数据时*，* 该调用会根据此设置阻塞其他请求。SO_TIMEOUT 选项决定了阻塞操作在超时之前可以阻塞的时间量（以毫秒为单位）。如果操作在分配的时间内没有完成，则会抛出\
  \ java.net.SocketTimeoutException，如图 7-1 所示。如果未设置此选项或将其设置为 0，则调用会阻塞请求直到完成，并且不会超时。\n\
  \n**图 7-1.** *SocketTimeoutException*\n\n用于设置和获取此选项的 Socket 方法如下：public void **setSoTimeout**(int\
  \ timeout) throws SocketException public int **getSoTimeout**() throws SocketException\
  \ 我们在 DVDSocketServer.java 中使用了此选项，尽管我们也可以轻松地在我们的套接字客户端 DVDSocketClient.java 中使用它。以下代码行将在服务器空闲\
  \ 1 分钟（即 60000 毫秒）后关闭套接字服务器：serverSocket.setSoTimeout(60000);\n\n在指定时间过后，会抛出 java.net.SocketTimeoutException。图\
  \ 7.1 展示了发生此异常时的 DVDSocketServer 控制台。\n\n使用 SO_SNDBUF\n\n\n\n此选项用于设置此套接字数据传输的缓冲区大小。设置此选项时，它仅是对平台的一个建议或提示，表明应用程序在通过套接字进行输出操作时所需的缓冲区大小。getter\
  \ 方法返回输出缓冲区的实际大小。这两个方法可以结合使用，通过在输出操作后调用 get 方法，来确定平台是否能够利用 set 方法中的提示。\n\n5165CH07.qxd\
  \ 11/16/05 12:15 PM 第 205 页\n\n第 7 章 ■ 使用套接字进行网络编程\n\n**205**\n\nSocket 中用于设置和获取此选项的方法如下：\n\
  public int **getSendBufferSize**() throws SocketException\npublic void **setSendBufferSize**(int\
  \ size) throws SocketException\n\n发送缓冲区大小值决定了在等待另一端应用程序确认收到数据包之前，可以发送多少个数据包。在可靠的网络上，你可以将此值设置得较高，以获得最佳的数据吞吐量。在最坏的情况下，你可以将发送缓冲区设置为与数据包大小相同。在这种情况下，每发送一个数据包，就需要接收一个确认——如果你需要发送\
  \ 100 个数据包，就需要接收 100 个确认。与此对比，如果发送缓冲区比数据包大小大 100 倍——发送 100 个数据包时，你只需接收一个确认；完成时间几乎可以缩短一半。\n\
  \n**使用 SO_RCVBUF**\n\n此选项类似于用于设置发送缓冲区的 SO_SNDBUF。区别在于，此选项处理的是接收缓冲区。与发送缓冲区选项一样，设置接收缓冲区大小值实际上是对平台的一个提示。要验证缓冲区实际设置的大小，请使用\
  \ getReceiveBufferSize 方法。为了提高高容量套接字连接的性能，请增大接收缓冲区的大小。减小此值可以减少传入积压。\n\npublic void\
  \ **setReceiveBufferSize**(int size) throws SocketException\npublic int **getReceiveBufferSize**()\
  \ throws SocketException\n\n**使用 SO_BINDADDR**\n\n此选项指示套接字绑定的本地地址。此选项是只读的。套接字地址在创建后无法更改，并且必须在构造函数中指定。\n\
  \n方法签名如下：\n\npublic InetAddress **getLocalAddress**()\n\n此方法的一个可能用途是，当在具有多个 IP 地址的计算机上运行时（例如，具有多个网卡的服务器、同时具有本地\
  \ IP 地址和网络地址的 PC，或同时具有网络地址和虚拟专用网络地址的计算机），确定你绑定到了哪个 IP 地址。\n\n**DvdSocketClient**\n\
  \n关于 DVDSocketClient，有几点需要注意。我们示例项目中的套接字实现默认使用端口 3000。此外，默认情况下，我们使用 localhost 作为主机名。当我们希望在一台机器上以网络模式运行应用程序时（即，当我们无法访问网络时），这非常有用。如果我们在不同的机器上运行应用程序，则必须指定运行套接字服务器的机器的\
  \ IP 地址。\n\n5165CH07.qxd 11/16/05 12:15 PM 第 206 页\n\n**206**\n\n第 7 章 ■ 使用套接字进行网络编程\n\
  \n关于套接字客户端的另一个关键点是它实现了 DBClient。这确保了我们的租借和归还方法可供任何使用 DVDSocketServer 的客户端使用。DvdSocketClient.java\
