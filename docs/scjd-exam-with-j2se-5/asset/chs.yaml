  \n5165CH05.qxd 11/16/05 12:13 PM 第 131 页\n\n第 5 章 ■ DVD 数据库类\n\n**131**\n\n■**警告**\
  \ 你需要仔细考虑以这种方式包装异常是否有意义。如果你唯一允许抛出的异常是`RecordNotFoundException`，你可能会认为将`EOFException`包装在`RecordNotFoundException`中是合理的——如果你到达文件末尾仍未找到记录，那么这*可能*是一个合理的假设。然而，这也可能是一个无效的假设——如果你在读取记录中途收到`EOFException`，那么你的文件可能已损坏，暗示找不到记录充其量可能具有误导性，或者导致进一步的问题和损坏。类似地，将`InterruptedException`包装在`RecordNotFoundException`中可能没有意义——如果你正在等待记录的锁，那么该记录很可能确实存在。\n\
  \n将异常包装在 RuntimeException 中\n\n在某些情况下，将捕获的异常包装在已声明的异常中没有意义，如前一条注释所述。然而，我们可能无法向方法签名添加新的受检异常，因为这可能会阻止其他程序正常工作。\n\
  \n在编写实现接口的类时尤其如此——另一个程序员可能会根据已发布的接口编写程序来使用你的类，如果你更改接口，他们的程序可能会以意外的方式失败——或者他们可能会发现重新编译他们的代码不再有效。无论哪种方式，你很可能很快就会变得不受欢迎。\n\
  \n`RuntimeException`及其子类不需要在方法签名中声明，也不需要被捕获。因此，可以将捕获的异常包装在`RuntimeException`中，如下面的代码所示：\n\
  \n38 } catch (InterruptedException ie) {\n\n39a throw new RuntimeException (\n\n\
  39b \"getLock 中的 InterruptedException\", 39c ie);\n\n40 }\n\n不幸的是，如果你这样做，你的类的用户将很难捕获该异常并正确处理它。请考虑以下代码，它演示了一种糟糕的处理方式：\n\
  \n22 public void run() {\n\n23 try {\n\n24 getLock();\n\n25a } catch (RuntimeException\
  \ re) {\n\n\n\n25b log.log(Level.WARNING, \"Caught the interrupt\", re); 25c } catch\
  \ (LockAttemptFailedException dle) {\n\n26 log.log(Level.WARNING, \"Lock attempt\
  \ failed\", dle); 27 }\n\n28 }\n\n![图片 19](img/index-151_1.png)\n\n5165CH05.qxd\
  \ 11/16/05 12:13 PM 第 132 页\n\n**132**\n\n第 5 章 ■ DVD 数据库类\n\n如果我们尝试捕获 `RuntimeException`，就有可能捕获到大量我们实际上可能不想在此异常块中处理的\
  \ `RuntimeException` 子类，而我们只想处理“中断”异常。例如，假设在 `getLock` 方法的某处，某个操作抛出了 `NullPointerException`。`NullPointerException`\
