  \ *类图*\n\n**数据库系统的网络服务器功能**\n\nDenny's 租赁跟踪系统的 1.0 版本可以在本地或通过网络运行。\n\n在本地模式下，GUI\
  \ 仅当数据库位于同一台机器上时才会连接到它。\n\n\n\n在网络模式下，GUI 应能从网络中任意可访问的机器连接到数据服务器。网络实现可以使用套接字或 RMI（见图\
  \ 3-4）。我们将在第 5 章和第 6 章中演示这两种方法。\n\n■**注意** 尽管本书未讨论 2.0 版本，但我们仍将所描述的系统称为 Denny's\
  \ DVDs 1.0 版。或许 2.0 版会在第三版中出现。\n\n**图 3-4.** *高层客户端-服务器功能*\n\n5165CH03.qxd 11/16/05\
  \ 12:10 PM 第 66 页\n\n**66**\n\n第 3 章 ■ 项目概述\n\n由于多个客户端可能通过网络连接并同时尝试修改相同记录，应用程序必须是线程安全的。我们将在第\
  \ 4 章更详细地讨论线程安全。目前，只需知道线程安全代码能在多个客户端访问和修改同一对象时保护该对象的状态即可。确保你的认证提交是线程安全的，这是你的责任，正如你将在第\
  \ 4 章“理解线程安全”一节中学到的那样。\n\n无需通知客户端*不可重复读取*——也就是说，不要求通知所有查看已被修改记录的客户端该修改。但是，如果两名员工同时尝试租借同一张\
  \ DVD，则只有一位客户能获得该 DVD。这被称为*记录锁定*。在第 4 章中，将更详细地探讨记录锁定（第 5 章中会给出示例）。\n\n应用程序应能在非网络模式下工作。在此模式下，数据库和用户界面运行在同一虚拟机（VM）中，不执行任何网络操作，也不应创建任何套接字。稍后，在第\
  \ 5 章（涵盖网络）中，将演示 RMI 和套接字的独立实现。\n\n**总结**\n\n在本章中，我们介绍了 Denny's DVDs 租赁跟踪程序的公共接口。\n\
  \n我们讨论了项目需求以及你需要实现的接口中的每个方法。示例应用程序的所有代码都可以从 Apress 网站（http://www.apress.com）的源代码部分获取。\n\
  \n新系统应能被多个客户端通过网络或本地访问。GUI 应直观且易于使用，并且应用程序必须是线程安全的。\n\n本书的其余部分将探讨本章涵盖的需求。随着每个新概念的引入，Denny's\
  \ DVDs 租赁跟踪程序将逐步演进。\n\n**常见问题解答**\n\n**问** Sun 的作业说明告诉我们，必须在提交中包含说明和数据文件。为什么需要这样做？\n\
  \n**答** Sun 提供了多个作业，以及这些作业的多个版本。作业版本中的一些变化包括数据文件格式、提供的接口、所需的类名，或这些变化的任意组合。同时提供你*实现*的说明和*你的*数据文件，可以确保评估员将你的提交与你的说明进行比较，而不是其他人的。同样，这保证了评估员在收到你的提交时，能同时收到正确的说明。\n\
  \n**问** 提供的接口不包含我想要抛出的异常。我可以添加它吗？\n\n**答** 不可以。如说明中所述，其他应用程序期望使用此接口，因此如果你添加异常，其他应用程序将需要捕获它们。这可能会阻止其他应用程序正常工作。\n\
  \n5165CH03.qxd 11/16/05 12:10 PM 第 67 页\n\n第 3 章 ■ 项目概述\n\n**67**\n\n**问** 我认为如果我在接口中添加另一个方法，这个应用程序会工作得更好。我可以这样做吗？\n\
  \n**答** 你可以这样做；但是，对于 Sun 的作业，我们建议不要这样做。添加新的接口方法会破坏数据格式和用户界面之间的约定。此外，如果你在实际作业中这样做，最终可能会失败。更好的方法是将方法添加到已实现的类中。我们鼓励你添加类方法（即，不是\
  \ Sun 提供的接口方法）或修改实现，以便更好地理解项目和源代码。\n\n**问** 本章的示例与 Sun 将提供的示例有多相似？\n\n**答** 无法保证\
