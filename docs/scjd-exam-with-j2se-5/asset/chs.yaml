  \n■**警告** 布局管理器被设计用于自动完成确定组件相对位置以及容器大小的繁重工作。虽然可以使用`setLocation`方法显式放置组件，并使用`setSize`方法（如代码清单\
  \ 8-4 所示）设置其大小，但如图 8-11 至图 8-15 所示，组件的大小会因所使用的外观和感觉而异，因此刻意设置组件或容器的大小或位置可能会导致 GUI\
  \ 显示异常。我们强烈建议您将组件放置和容器大小调整的工作交给布局管理器处理。\n\n当使用不同的外观和感觉包时，界面不仅会采用该特定平台的外观，还会采用其界面小部件的功能。例如，Motif\
  \ 外观和感觉下的下拉菜单与 Windows 或 Metal 外观和感觉下的菜单功能截然不同。这是因为 Motif 代表了 X Window 系统的界面外观和功能。\n\
  \n**JLabel 组件**\n\n标准用户界面会在任何接受输入的组件旁边放置标签，为用户提供关于输入用途的简要说明。例如，在接收姓氏数据的文本字段旁边放置标签“姓氏”——该标签用于提醒用户应在文本字段中输入何种类型的数据。\n\
  \n用于容纳标签的 Swing 组件是`JLabel`。一个简单的构造函数如下：\n\n`JLabel zipCodeLabel = new JLabel(\"\
  Zip code\");`\n\n虽然这本身并不令人兴奋，但你还可以指定哪个字符将显示为助记符（即哪个字符将被加下划线）。由于标签获得焦点没有意义，因此你通常会设置显示的助记符，并同时设置按下助记符时哪个字段将获得焦点。这看起来类似于：\n\
  \n`zipCodeLabel.setDisplayedMnemonic('Z');`\n\n`zipCodeLabel.setLabelFor(zipCode);`\n\
  \n在这种情况下，如果用户按下助记键（同时按下 Alt 和 Z 键），焦点将转移到`zipCode`字段。\n\n此技术将在下一节的代码清单 8-5 中演示，其示例\
  \ GUI 如图 8-16 所示。\n\n![Image 38](img/index-264_1.png)\n\n5165CH08.qxd 11/16/05 12:16\
  \ PM 第 245 页\n\n第 8 章 ■ 图形用户界面\n\n**245**\n\n**JTextField 组件**\n\n`JTextField`是基本的数据输入字段。它允许用户输入最多指定长度的纯文本。以下是一个大小为\
