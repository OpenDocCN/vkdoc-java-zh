  \nconnectButton.addActionListener(this);\n\nconnectButton.setEnabled(false);\n\n\
  exitButton.setActionCommand(EXIT);\n\nexitButton.addActionListener(this);\n\noptions.setOptions(new\
  \ Object[] {connectButton, exitButton}); dialog = options.createDialog(parent, TITLE);\n\
  \ndialog.setDefaultCloseOperation(JDialog.DO_NOTHING_ON_CLOSE); dialog.addWindowListener(this);\n\
  \ndialog.setVisible(true);\n\n}\n\n5165CH08.qxd 11/16/05 12:16 PM 第 285 页\n\n第 8\
  \ 章 ■ 图形用户界面\n\n**285**\n\n\n\n当用户在公共框架中进行更改时，所有观察者都会收到通知。该通知会发送给具有签名 `public void\
  \ update(Observable o, Object arg)` 的方法。在该方法中，我们首先确认确实收到了 `OptionUpdate` 值对象的实例，如果没有收到，则忽略整个消息。如果是\
  \ `OptionUpdate`，则进行类型转换，以便轻松获取有关更改内容的信息，如下面的代码片段所示：\n\nif (! (arg instanceof OptionUpdate))\
  \ {\n\nlog.log(Level.WARNING,\n\n\"DatabaseLocationDialog received update type:\
  \ \" + arg, new IllegalArgumentException());\n\nreturn;\n\n}\n\nOptionUpdate optionUpdate\
  \ = (OptionUpdate) arg;\n\n■**警告** 在类型转换之前，应始终检查对象是否为 null 或其类型。但是，如果检查了对象的类型，则可能无需显式检查\
  \ null，因为如果传入 null 引用，`instanceof` 将返回 false。还应检查传入任何公开 API 的参数是否为 null。\n\n尽管我们知道当前正在观察的类只应发送\
  \ `OptionUpdate` 类的实例，但我们无法保证将来不会发生变化。如果发生变化，我们将收到一条警告日志消息，其中会尽可能多地提供有关接收内容及其来源的信息。\n\
  \n■**提示** 尽管我们为了在日志消息中创建堆栈跟踪而创建了 `IllegalArgumentException`，但我们从未抛出它，因此应用程序将继续运行。如果需要对代码进行调试，仅为了从异常中获取信息而创建异常可能是一个有用的工具。\n\
  \n■**注意** 记录所有收到的、但特定代码不感兴趣的更新可能并不可取。\n\n当 AWT 首次发布时，**所有**事件都会发送给对任何事件感兴趣的类。这可能意味着，一个只对了解鼠标何时移过特定字段感兴趣的类，可能会在鼠标移过屏幕其他区域时收到数百万次更新——在这种情况下，你不会希望记录所有不需要的事件。然而，在这种特定情况下，我们知道此时可能生成的所有事件，因此如果收到意外事件，记录一条警告是合理的。\n\
