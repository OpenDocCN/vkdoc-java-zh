  \n增强的 for 循环\n\n在我们的泛型示例中，我们使用 `Iterator` 来遍历集合中的项。重申一下，我们的代码示例如下所示：\n\n```java\n\
  for (Iterator<Dog> i = c.iterator(); i.hasNext(); ) {\n    String name = i.next().getName();\n\
  ```\n\n然而，这过于冗长：在大多数情况下，你希望逐个遍历迭代器中的所有项。那么，为什么要以这种方式向编译器详细说明呢？\n\nJDK 5 使得在 for\
  \ 循环中使用迭代器变得更加容易。考虑以下执行相同操作的构造：\n\n```java\nfor (Dog mutt : c) {\n    String name\
  \ = mutt.getName();\n```\n\n将冒号（`:`）理解为“in”可能会有所帮助。因此，语句 `for (Dog mutt : c)` 可以理解为“对于集合\
  \ c 中的每只狗 mutt”。\n\n■**注意** 许多人好奇为什么 Sun 选择使用冒号而不是使用单词“in”或“foreach”。很简单，Sun 希望避免引入任何可能破坏现有源代码的新关键字。你所有的现有代码都应该能在\
  \ JDK 5 下无问题地编译和运行。\n\n增强的 for 循环也可以与标准数组一起使用。以下代码给出了一个不使用增强 for 循环遍历字符串数组的示例：\n\
  \n```java\npublic static void main(String[] args) {\n    for (int i = 0; i < args.length;\
  \ i++) {\n        System.out.println(args[i]);\n    }\n}\n```\n\n5165CH02.qxd 11/16/05\
  \ 12:09 PM 第 32 页\n\n**32**\n\n第 2 章 ■ 项目分析与设计\n\n增强的 for 循环允许将其简化，如下所示：\n\n```java\n\
  public static void main(String[] args) {\n    for (String arg : args) {\n      \
  \  System.out.println(arg);\n    }\n}\n```\n\n请注意，新的 for 循环不能在所有场景中使用。特别是，它隐藏了迭代器，因此你不能再在迭代器上调用任何可能改变底层集合的方法。\n\
  \n新的 for 循环的格式规则是在冒号前后各有一个空格。\n\n自动装箱\n\nJDK 5 允许在基本类型及其包装类之间进行自动类型转换。例如：\n\n```java\n\
  Integer myInteger = 5; // 自动将 5 (int) 转换为 Integer\n```\n\n处理此功能不需要特殊的编码约定。\n\n可变参数\n\
  \n可变参数列表（通常也称为 VarArgs）允许编码者指定构造函数或方法签名中的参数数量是可变的。使用此功能可以减少重载方法和构造函数的数量。\n\n然而，可变参数是有代价的：当你指定给定方法所需参数的确切数量和类型时，Java\
  \ 编译器可以执行类型检查以确保你对方法的使用是正确的。当你使用可变参数时，只能进行最少的检查。\n\n举个例子，考虑创建一个 `Dog` 类，它有两个可选属性（字段）：`age`\
  \ 和 `name`。如果你想创建能够处理用户创建 `Dog` 类的所有可能方式的构造函数，你将需要以下构造函数：\n\n```java\nDog();\nDog(int\
  \ age);\nDog(String name);\nDog(int age, String name);\n```\n\n不幸的是，事情并没有到此结束。你需要的构造函数数量是\
  \ 2 的参数数量次方。因此，如果 `Dog` 类有以下七个属性——`age`、`height`、`weight`、`name`、`owner`、`color`\
  \ 和 `pedigree`——我们可能需要 128 个构造函数来涵盖所有组合！\n\n然后我们还会遇到其他问题，因为 Java 无法区分方法签名实际上相同的构造函数。例如：\n\
  \n```java\nDog(int age, String name);\nDog(int age, String owner);\n```\n\n5165CH02.qxd\
  \ 11/16/05 12:09 PM 第 33 页\n\n第 2 章 ■ 项目分析与设计\n\n**33**\n\nJDK 5 允许我们指定传递给方法或构造函数的参数数量是*相同类型*的可变参数。因此，你可以通过指定一个如下所示的构造函数来指定传递给构造函数的\
  \ `String` 的确切数量是可变的：\n\n```java\nDog(int age, String... args) {\n    for (String\
  \ parameter : args) {\n        System.out.println(\"Received parameter \" + parameter);\n\
  \    }\n}\n```\n\n正如你在前面的代码中看到的，省略号（`...`）紧跟在它所指的类型之后。一旦进入方法体内部，你就可以将参数视为指定类型的数组。\n\
  \n■**注意** 在给定的方法或构造函数声明中，你只能有一个可变参数列表，并且它必须是方法或构造函数中的最后一个参数。例如，你不能有 `Dog(int...\
  \ ages, String name)`。\n\n■**警告** 在重载包含可变参数版本的构造函数或方法时要非常小心。很容易导致编译器无法区分的重写方法（例如，`Dog(String\
  \ name, String... args)` 和 `Dog(String... args)` 实际上是相同的），或者导致一个泛型方法匹配了超出你预期的内容（例如，`Dog(Object...\
  \ args)` 由于自动装箱，将匹配*所有*构造函数）。\n\n\n\n你可能已经意识到，在早期版本的 JDK 中也能实现类似的效果：即只需将一个命名类型的数组传递给方法。然而，要使用这种方式，你实际上必须创建一个新数组。例如：\n\
  \n```java\npublic static void lookupDog(String... searchCriteria) {\n    for (String\
  \ criterion : searchCriteria) {\n        // 在此处执行工作\n    }\n}\n\npublic static void\
  \ lookupCat(String[] searchCriteria) {\n    for (String criterion : searchCriteria)\
  \ {\n        // 在此处执行工作 – 与 Dog 方法无异\n    }\n}\n\npublic static void main(String[]\
  \ args) {\n    // 首先是简单的代码：使用 Dog 方法：\n    lookupDog(\"Breed\", \"Terrier\", \"\
  Color\", \"Brown\");\n\n    // 现在使用 Cat 方法\n    lookupCat(new String[] {\"Breed\"\
  , \"Burmese\", \"Coat\", \"Silky\"});\n    // 或者\n    String[] criteria = {\"Breed\"\
  , \"Burmese\", \"Coat\", \"Silky\"};\n    lookupCat(criteria);\n}\n```\n\n使用 `lookupDog`\
  \ 方法的代码比等效的 `lookupCat` 方法更易于阅读、编写和维护。\n\n**静态导入**\n\n在 JDK 5 之前，一些程序员在接口中定义常量，因为这允许他们*实现*该接口，从而获得一种编写常量名的简写方式。如下例所示：\n\
  \n```java\npublic interface BadInterface {\n    public static final int FIRST_NAME_POSITION\
  \ = 1;\n}\n\npublic class BadClass implements BadInterface {\n    public static\
  \ void main(String[] args) {\n        System.out.println(\"First name = \" + args[FIRST_NAME_POSITION]);\n\
  \    }\n}\n```\n\n这存在几个问题：\n\n*   实现接口的类被称为是该接口的一个“实例”。如果你的接口名称合理，那么说你的类“是”它的一个实例可能没有意义。\n\
  *   如果你的类实现了一个接口，那么该类的任何子类也将实现该接口。实际上，这些常量将成为子类命名空间的一部分——即使子类可能根本不需要这些常量。\n\n为了解决这些问题，JDK\
  \ 5 引入了*静态导入*的概念——即能够从另一个类或接口导入静态成员。\n\n例如，如果你正在使用日志记录功能（将在本章后面的“日志记录”部分讨论），通常需要像下面这段代码片段那样限定日志级别：\n\
  \n```java\nmyLogger.log(Level.FINE, \"This message is at FINE level\");\n```\n\n\
  然而，静态导入允许我们引用静态对象 `FINE`，就好像它是在我们自己的类中定义的一样：\n\n```java\nimport static java.util.logging.Level.*;\n\
  // ...\nmyLogger.log(FINE, \"This message is at FINE level\");\n```\n\n需要注意的是，引入这个“特性”是为了解决一种不良的编程实践。当你原本想声明常量的本地副本，或者想滥用前面提到的继承机制时，可能会用到它。但总的来说，我们建议尽可能避免使用它，而使用限定的常量。\n\
  \n**Javadoc**\n\nJavadoc 是一个非常简单但功能强大的工具，它帮助程序员为其他程序员提供 API 文档。\n\n默认的 Javadoc 工具非常简单。它会解析你的源代码，查找特殊的注释。然后基于这些注释生成\
  \ HTML 文档。为了更容易理解，让我们从一些 Javadoc 注释示例开始，并进行描述：\n\n```java\n/**\n * 此应用程序的 <b>主要</b>\
  \ 入口点。\n * 实例化此类的一个实例并运行它。\n *\n * @param args 包含命令行参数的数组。\n * @throws IOException\
  \ 如果无法创建文件\n */\npublic static void main(String[] args) throws IOException {\n \
  \   // ...\n```\n\nJavadoc 注释以特殊的注释开始指示符 `/**` 开头，一直持续到注释结束指示符 `*/`。标签由 at 符号（`@`）标识。从注释开始指示符到第一个标签之间的所有文本都会直接包含在生成的输出中。\n\
  \nJavadoc 会忽略未知标签，以及从*任何标签*之后到下一个已知标签或文档注释结束之间的纯文本——正是这种神奇机制使得 XDoclet 能够工作。\n\n\
  上面的 Javadoc 代码生成以下 HTML：\n\n```html\n<A NAME=\"main(java.lang.String[])\"><!-- --></A><H3>\
  \ main</H3>\n<PRE>\npublic static void <B>main</B>(java.lang.String[]&nbsp;args)\
  \ throws java.io.IOException</PRE>\n<DL>\n<DD>The <b>main</b> starting point for\
  \ this application.\nInstantiates an instance of this class, and runs it.\n<P>\n\
  <DD><DL>\n<DT><B>Parameters:</B><DD><CODE>args</CODE> - an array containing the\
  \ command line arguments.\n<DT><B>Throws:</B>\n<DD><CODE>java.io.IOException</CODE>\
  \ - if files cannot be created</DL>\n</DD>\n</DL>\n```\n\n![Image 4](img/index-55_1.png)\n\
  \n在 Microsoft Internet Explorer 中查看时，它将类似于图 2-1 所示。\n\n**图 2-1.** *Javadoc 输出示例*\n\
  \n■**注意** Javadoc 比许多程序员意识到的更强大。它是作为一个可扩展工具开发的，其行为方式取决于插入的模块。默认情况下，它会解析 Java 源代码，生成\
  \ API 文档。但是，如果你将插件更改为 XDoclet（http://xdoclet.sourceforge.net/），例如，Javadoc 引擎可以根据你编写的代码中的注释生成额外的源代码（在构建\
  \ J2EE 应用程序时非常有用——你可以让 XDoclet 为你创建接口和部署描述符）。或者，你可以插入 DocCheck（http://java.sun.com/j2se/javadoc/doccheck），并获得一份关于你遵守\
  \ Sun 的 Javadoc 约定情况的报告。\n\n**编码约定**\n\nSun 发布了一篇题为“如何为 Javadoc 工具编写文档注释”的文章，可在线访问\
  \ http://java.sun.com/j2se/javadoc/writingdoccomments/index.html。\n\n以下是该文章涵盖主题的快速概述。\n\
  \n**编写内容**\n\n你的类和方法名称应该具有合理的自文档性，因此编写仅仅重述类或方法名称的 Javadoc 注释是没有意义的。你的 Javadoc 注释应提供有助于类的用户的信息，和/或提供第三方从头开始（不查看你的源代码）重新实现你的类所需的信息。\n\
  \n例如，如果你正在创建一个提供到服务器的网络连接的类，你可能会将类命名为 `NetworkConnection`。编写一个说明该类提供“网络连接”的 Javadoc\
  \ 注释是没有意义的——用户已经知道这一点。\n\n相反，你可以考虑指定该类提供“通过网络到数据库服务器的连接，通过该连接可以使用数据库函数的远程访问。”\n\n\
  ■**警告** 你不应在 Javadoc 注释中编写任何实现细节。\n\n**放置 Javadoc 注释的位置**\n\n理论上，Javadoc 注释可以放在源代码的任何位置。但是，Javadoc\
  \ 应用程序只会包含特定位置的注释：\n\n*   类注释应紧跟在类声明之前（Javadoc 目前允许注释出现在类声明之前的任何位置，甚至在包声明之前，但不应依赖此行为）。\n\
  *   类和实例变量注释应紧跟在它们所属的类或实例变量之前。\n*   方法注释应紧跟在方法签名之前。\n\n\n\nJavadoc 工具会完全忽略位于任何其他位置的\
  \ Javadoc 注释。例如，如果你想在方法内部添加注释，将其写成 Javadoc 注释是没有意义的，因为它不会出现在任何生成的 API 中。此时只需使用实现注释即可。\n\
  \n格式化代码与特殊标签\n\nJavadoc 注释可以包含任何 HTML 标记标签。表 2-4 展示了常用的标签。\n\n**表 2-4.** *常用 HTML\
  \ 标签*\n\n**标签**\n\n**结束标签**\n\n**描述**\n\n<code>\n\n</code>\n\n这两个标签之间的文本在 HTML 输出中将以等宽字体显示。通常用于简短的单词或短语。\n\
  \n<pre>\n\n</pre>\n\n这两个标签之间的文本在 HTML 输出中将以等宽字体显示，并保留你的缩进格式。通常用于示例代码。\n\n<ul>\n\n\
  </ul>\n\n表示无序列表（无编号）的开始和结束。\n\n<ol>\n\n</ol>\n\n表示有序列表（有编号）的开始和结束。\n\n<li>\n\n表示无序列表或有序列表中列表项的开始。\n\
  \n<p>\n\n表示新段落的开始。\n\n5165CH02.qxd 11/16/05 12:09 PM Page 38\n\n**38**\n\n第 2 章\
  \ ■ 项目分析与设计\n\n■**注意** Javadoc 生成的输出符合 HTML 3.2 标准，该标准不要求某些元素必须有关闭标签（例如，`<li>` 标签不需要用\
  \ `</li>` 关闭，`<p>` 标签也不需要 `</p>` 关闭）；不过，如果你愿意，也可以使用它们。此外，HTML 3.2 标准并未规定标签应使用大写还是小写。在本书中，我们将使用\
  \ HTML 3.2 标签，但会按照较新的 HTML 4.0 和 XHTML 格式进行格式化（我们将使用关闭标签，并将标签设为小写）。如果你愿意，也可以使用仅在\
  \ HTML 4 或更高版本中才创建的标签和 HTML 结构（Javadoc 可以毫无问题地处理它们）。但是，如果你这样做，可能会发现一些较旧的浏览器无法正确显示你生成的文档。\n\
  \n你可以在 Javadoc 注释中使用更多 HTML 代码。不过，通常你不需要使用太多，因为你生成的是供其他程序员阅读的 API 文档。\n\n■**提示**\
  \ 你应该对 Java 关键字、包名、类名和接口名、方法名、字段名以及参数名使用 `<code>` 标签，以便在浏览器支持的情况下，它们能以等宽字体显示。\n\n\
  除了 HTML 标签之外，Javadoc 还能识别特殊的 *Javadoc 标签*——这些标签会以特殊方式处理。用于类和接口的 Javadoc 标签如表 2-5\
  \ 所示。\n\n这些标签按照它们在 Javadoc 注释中应出现的顺序列出。\n\n**表 2-5.** *类与接口标签*\n\n**标签**\n\n**描述**\n\
  \n@author\n\n编写该类或接口的人员姓名。\n\n@version\n\n该类或接口的当前版本。你可以选择让版本控制软件在你从源代码管理系统中检出代码时自动设置此信息。\n\
  \n@see\n\n生成指向指定类或方法的链接——该链接将出现在生成的 Javadoc 的“另请参阅”部分。关于 `@see` 和 `@link` 标签的特殊用法说明，请参考下文注释。\n\
  \n@since\n\n用于指明该类首次出现的发布版本号。\n\n@deprecated\n\n用于指明某个类因兼容性原因不应再使用，但仍保留。该标签后应跟有文本，指示用户应使用哪个类来替代此类，如果没有具有替代功能的类，则注明“无替代”。\n\
