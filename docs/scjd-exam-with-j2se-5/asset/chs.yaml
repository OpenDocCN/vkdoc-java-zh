  \nSystem.err.println();\n\n}\n\n}\n\n`rentDvd` 方法复制了应用程序所需的业务逻辑。它先预订 DVD，以便其他客户端无法修改它（当然，前提是其他客户端也遵循在修改前预订\
  \ DVD 的协议），然后检索 DVD（以确保我们拥有最新副本），检查是否有足够的 DVD 可用（如果有，则减少一个），最后将修改后的 DVD 保存回数据库。\n\
  \nprivate int rentDvd(String upc) throws Exception {\n\nif (db.reserveDVD(upc))\
  \ {\n\ntry {\n\nDVD dvd = db.getDVD(upc);\n\nint copiesInStock = dvd.getCopy();\n\
  \nif (copiesInStock > 0) {\n\ncopiesInStock--;\n\nlog.info(getName() +\n\n\" ->\
