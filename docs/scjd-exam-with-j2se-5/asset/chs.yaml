  \n\n大部分工作都在 `run` 方法中执行——客户端根据其应租赁 DVD 的次数进入一个循环。在该循环中，它尝试租赁 DVD。如果成功，则观看两秒钟，然后归还。如果因商店缺货而失败，则向管理层抱怨一秒钟。如果因尝试获取锁超过五秒钟而失败，则仅记录该事实。无论发生哪种情况，它都会再等待两秒钟，然后尝试获取另一个锁。\n\
  \n5165CH09.qxd 11/16/05 12:17 PM 第 312 页\n\n**312**\n\n第 9 章 ■ 项目收尾\n\n■**注意** 我们为每个事件指定了具体的时间，这在一定程度上确保了我们能够重复测试。我们无法绝对保证每次都能得到完全相同的结果，因为多次预订过程中网络流量时间的微小变化可能会产生影响。但对于低流量局域网（或单机）上的少量预订，我们应该能够自信地预测结果。\n\
  \npublic void run() {\n\nint secondsForWatchingDvd = 2;\n\nint secondsForComplaining\
