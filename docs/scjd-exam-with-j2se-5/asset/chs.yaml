  \n5165CH09.qxd 11/16/05 12:17 PM Page 295\n\n第 9 章\n\n■ ■ ■\n\n项目收尾\n\n**恭**喜！您已经成功穿越了众多复杂主题和繁琐细节。\n\
  \n我们涵盖了大量有助于您通过 Sun 认证 Java 开发人员（SCJD）考试的信息，并且向您介绍了 JDK 5 的一些新特性。本章总结了我们在完成示例项目过程中面临的一些架构决策，并收尾了有关打包和运行应用程序的一些未尽事宜。在本章中，我们将涵盖：\n\
  \n• 理解设计决策\n• 查找代码示例的获取位置\n• 编译和打包应用程序\n• 创建清单文件\n• 在本地模式下运行应用程序\n• 在网络模式下运行应用程序\n\
  • 运行多线程测试客户端\n• 打包提交内容\n\n图 9-1 展示了 Denny's DVDs 2.0 应用程序的概览。\n\n■**注意** 通常，您会期望看到应用程序的总体示意图是从左到右或从上到下绘制的——换句话说，客户端通常位于图的最左侧或顶部位置。\n\
