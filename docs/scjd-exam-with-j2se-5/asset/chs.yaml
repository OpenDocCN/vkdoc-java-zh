  , \"--------\", \"--------\", \"--------\", \"--------\");\nfor (DBTester client\
  \ : clients) {\n\nformatLine(client.getName(),\n\nclient.getSuccessfulRentals(),\n\
  \nclient.getOutOfStock(),\n\nclient.getTimeouts());\n\n}\n\nformatLine(\"========\"\
