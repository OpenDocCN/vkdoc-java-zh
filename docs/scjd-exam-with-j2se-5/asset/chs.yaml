  \ 和 JRadioButton 组件的演示* **JComboBox 组件**\n\n有时，为用户提供清晰的选择选项，而不是要求他们手动输入（这是一种容易出错的方式）是合理的。JComboBox\
  \ 提供了一个简单的框，点击后会弹出一个选项列表，用户可从中选择。\n\n如果你知道列表中要使用的项目，那么可以使用允许你指定初始项目的构造方法。或者，你也可以分别使用\
  \ `addItems` 和 `removeItems` 方法动态地向列表中添加或移除项目。\n\n与 JButton 和 JRadioButton 类似，可以为每个\
  \ JComboBox 添加一个 ActionListener。\n\n如果你需要在用户选择某个选项后立即执行操作，就可以使用它。\n\n然而，并不总是需要添加\
  \ ActionListener——如果你不关心用户点击了哪个按钮，直到用户执行其他操作后才需要处理，那么你可以使用 `getSelectedIndex` 方法来确定所选项目的索引，或者使用\
  \ `getSelectedItem` 方法来找出所选的对象。\n\nJComboBox 的使用方法在下一节的清单 8-7 中进行了演示，其创建的窗口如图 8-18\
  \ 所示。\n\n**BorderFactory**\n\n到目前为止，所有演示的组件在最终用户看来都位于同一个 JFrame 中——没有任何东西可以将一个组件（或一组组件）与另一个组件在逻辑上区分开来。\n\
  \n然而，有时通过绘制边框将组件在逻辑上分组是合理的。边框最常见的用途之一是在多个单选按钮或复选框周围创建一种感知上的关联。我们在上一节中没有为单选按钮添加边框，因为我们想强调，边框只是创建了一种**用户感知**，即这些按钮在逻辑上是关联的——实际上，可以在逻辑上不关联的按钮周围绘制边框，而仅仅在按钮周围创建边框并不会在逻辑上关联它们。\n\
  \n与大多数 Swing 组件不同，我们不会直接创建边框。相反，我们调用 BorderFactory 类的某个静态方法来为我们创建边框，然后可以在 JPanel\
  \ 或 JFrame 中使用它。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 252 页\n\n**252**\n\n第 8 章 ■\
  \ 图形用户界面\n\n■**注意** BorderFactory 使用的工厂设计模式，通常用于需要创建许多相似对象，但对象的使用者无需了解实现细节的情况——对象的使用者只需要知道如何使用它即可。BorderFactory\
  \ 的每个 create 方法都会创建一个 Border，其中 Border 是一个接口。由于我们为所有可能的边框提供了一个接口，因此我们可以在任何 JFrame\
  \ 或 JPanel 中使用创建的边框，而无需关心创建的是哪种类型的边框。此外，我们不必担心特定边框在不同操作系统上如何创建——工厂会为我们处理这一切。\n\n\
