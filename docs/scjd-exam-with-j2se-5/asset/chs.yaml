  \ 12:11 PM 第 98 页\n\n**98**\n\n第 4 章 ■ 线 程\n\n第 5 章的“创建我们的逻辑预留方法”一节中展示了使用新锁定类的示例，同一章的“讨论点：多个通知对象”一节中则提出了进一步的思考。\n\
  \n为了确保锁被释放，我们强烈建议像前面演示的那样，将对 `unlock` 的调用放在 `finally` 块中。\n\n无论你使用 `synchronized`\
  \ 块还是新的并发类，线程安全的规则都是相同的。\n\n**锁定总结**\n\n对象锁和对象内成员变量上的锁不会以任何方式相互作用。\n\n也就是说，同步一个对象并不会锁定该对象的成员变量。同样，同步一个成员变量也不会锁定拥有该变量的对象。只要不共享对同一个对象的锁，持有不同对象锁的线程就可以并发运行。此外，锁定一个类并不会锁定该类的实例。对成员变量的非同步访问可能会破坏线程安全性。\n\
  \n**理解线程安全**\n\n线程编程存在独特的逻辑陷阱，这些陷阱常常会出乎意料且看似随机地出现。在本节中，我们将定义一些常见的陷阱，并提供避免它们的建议。以下小节将解释什么是线程安全，以及它有助于防止哪些可怕的问题。\n\
  \n**死锁**\n\n*死锁*发生在线程被永久阻塞，等待一个永远无法发生的条件时。\n\n\n\n死锁就像动画片里达菲鸭和兔八哥被困在荒岛上的情景。达菲有一罐食物，兔八哥有一个开罐器。达菲在拿到开罐器之前不肯交出食物，而兔八哥在得到食物之前也不肯交出开罐器。他们就这样陷入了死锁。\n\
  \n在代码清单 4-8 中，你可以看到线程 1 获取了 lock1 上的锁，但还需要 lock2。线程 2\n\n已经获取了 lock2 上的锁，并且需要获取\
  \ lock1。两个线程都不允许对方继续执行，自己也无法继续。这就是死锁。图 4-7 显示了输出结果。\n\n**代码清单 4-8.** *死锁示例*\n\n\
