  ■ ■ ■\n\n实现\n\n一个 J2SE 项目\n\n5165CH04.qxd 11/16/05 12:11 PM 第 70 页\n\n5165CH04.qxd\
  \ 11/16/05 12:11 PM 第 71 页\n\n第 4 章\n\n■ ■ ■\n\n线程\n\n**欢**迎来到线程的世界。在本章中，我们将通过使用现实世界的示例和隐喻，将其分解为易于管理的章节和子章节，来揭开这个主题的神秘面纱。本章的目的是解释你需要通过\
  \ SCJD 考试（包括笔试部分）所需的概念和技术细节。\n\n本章的前几节介绍了线程和多线程的挑战。详细解释了等待和锁定。最后，有一个关于线程安全问题的子章节，包括死锁、饥饿、竞态条件和监视器。\n\
  \n接下来的章节讨论了直接使用 Thread 对象的各种方式、使用 Swing 时线程的注意事项，以及线程的注意事项。\n\n最后，我们将以一个涵盖一些常见线程问题的常见问题解答部分作为结束。\n\
  \n具体涵盖以下主题：\n\n• 线程和多线程简介\n\n• 锁定和同步\n\n• JDK 5 的新锁定功能\n\n• 通过等待、休眠和让步进行有效的线程管理\n\
  \n• 线程安全的重要性\n\n• 记录锁定策略\n\n\n\n■**注意** 本章仅作为线程的入门介绍。若想深入理解线程，我们推荐艾伦·霍鲁布（Allen Holub）的佳作《驯服\
  \ Java 线程》（Apress, 2000 年出版）。\n\n**线程基础**\n\n在开始本章之前，你需要对线程有几点基本认识：首先，在 Java 中创建执行线程有两种方式——继承\
  \ Thread 对象或实现 Runnable 接口；其次，启动线程必须调用 start 方法；最后，线程可以看似并行地执行各自的任务。这是 SCJP 考试要求掌握的基础知识，也是准备参加\
  \ SCJD 考试者应当熟练掌握的内容。\n\n**线程简述**\n\n*线程*是指令集的独立执行流。例如，假设文字处理器需要同时完成打印和保存当前文档两项任务，如图\
  \ 4-1 所示。\n\n**图 4-1.** *文字处理程序示例* 如果文字处理器是单线程的，它必须等打印完成后才能开始保存文档，如图 4-1 所示。这种方法虽然可行，但效率极低——早期文字处理器的使用者对此深有体会。我们可以做得更好。\n\
  \n现在设想程序创建了两个独立的执行路径（即线程）：一个负责打印文档，另一个在后台静默备份。这种方法能带来更高的效率，因为两个活动无需相互等待。例如，在建立网络打印机连接的同时，另一个线程可以保存文件。这种多线程概念如图\
  \ 4-2 所示，下一节将详细阐述。\n\n**图 4-2.** *带线程的文字处理程序*\n\n**多线程**\n\n*多线程*是协调系统中运行的各种线程的技术，旨在提升系统整体效率。这包括资源轮换或共享、减少开销、以及尊重其他线程的边界。\n\
  \n管理多线程存在固有挑战，这些挑战源于中央处理器（CPU）处理线程的方式。本章将全程讨论这些挑战，并在“理解线程安全”一节中详细说明。\n\nCPU 会从某个线程执行若干指令，然后切换到另一个线程执行指令集，如此循环。由于切换速度极快，所有线程都会产生独立并行执行的错觉。此外，处于非活跃等待状态（如等待网络连接）的线程不会成为其他线程的瓶颈——这是多线程最大的优势之一。但这种效率提升是有代价的：若不采取预防措施，一个线程完全可能破坏另一个线程正在使用的数据。我们将在“理解线程安全”一节中演示这些问题，并教你如何通过防御性编程来应对。\n\
  \n■**注意** 本章将从单 CPU 计算机上 JVM 运行的角度讨论线程。在多 CPU 计算机上，线程完全可能在不同 CPU 上并发运行。但无论何种情况，出现的问题本质相同。\n\
  \n回到文字处理程序示例：假设另一个线程正在执行文本对齐操作，且该线程未与打印文档的线程协调，结果可能导致打印文档部分对齐、部分未对齐。\n\n这些就是多线程编程中必然面临的挑战。SCJD\
  \ 考试要求考生深入理解多线程及其潜在风险。\n\n**Java 的多线程概念**\n\nJava 是少数内置多线程支持的语言之一。这种支持带来两个重要特性：第一，每个\
  \ Java 对象都可以被锁定，供特定线程独占使用——通过对象同步实现。只要其他线程遵守锁定规则，被锁定的对象对除声明线程外的所有线程都不可访问。第二，每个 Java\
  \ 对象都能追踪所有希望获得其独占访问权的线程。可以将其理解为每个对象都有一份登记表。\n\n多线程的基本挑战与养育幼儿的挑战类似：如何防止线程（孩子）争夺有限的资源（玩具）？\n\
  \n在 Java 中，解决方案包含两方面：首先，所有可能使用全局对象的方法必须遵循检查该对象是否正被其他线程使用的约定；其次，所有修改对象的方法需要在该对象上标记“使用中”状态。（要是对孩子也能这么简单就好了...）现实世界中，后者可以类比为在健身房使用跑步机的登记流程：如果你（线程）想使用全局可用对象（跑步机），就需要检查其他人（其他线程）是否正在使用。若有人在使用，则等待；若无人使用，则登记后使用。\n\
  \n第一个活动称为等待。下一节将详细解释等待机制。\n\n**等待**\n\n*等待*是在无法继续执行时主动让出资源的行为。顾名思义，等待是一个非活跃过程，意味着等待中的线程不会浪费无法使用的\
  \ CPU 时间。当线程等待时，其他线程可以自由使用其分配的 CPU 时间配额——等待线程显然不需要这些时间。\n\n想象一群孩子试图从冰淇淋车购买冰淇淋。如果当前正在与售货员交涉的男孩钱不够，他不会让所有人等待父亲送钱过来。他会让出位置（可能暗自啜泣），然后等待。之后他会重新加入争夺，试图再次引起售货员的注意。其他孩子不会等他，因为他反正无法下单。\n\
  \n■**注意** 用孩子争抢冰淇淋的比喻并非随意之举。竞争中的线程不会像杂货店排队的礼貌成年人那样行事。这里没有秩序感——所有线程都激烈竞争，最终胜出者取决于底层操作系统、优先级及其他变量。\n\
  \n通常，在等待事件发生时暂停执行有两种截然不同的方式：一种是保持线程持有的锁，另一种是释放锁。第一种暂停通常发生在需要等待某个事件发生才能继续执行时（例如等待网络套接字传输数据），第二种则发生在调用明确声明会释放锁的方法时——例如调用\
  \ Object.wait 方法会释放被调用对象的锁。\n\n\n\n■**注意** 我们将在本章的“锁”一节中探讨锁定机制。目前，可以将锁定理解为在对象上贴上一张“使用中”的标签。\n\
  \n如果线程通过调用 `Thread.yield` 或 `Thread.sleep` 进入等待状态，或者在继续执行前需要等待某些事件发生（例如接收 I/O），那么该线程将保持其持有的所有锁。这意味着其他线程将无法使用这些被锁定的对象。如果它们尝试这样做，就会阻塞，直到这些资源被释放。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 75 页\n\n第 4 章 ■ 线程\n\n**75**\n\n然而，对于给定对象 `myObject`，调用\
  \ `myObject.wait` 会释放该对象的锁（前提是你拥有该对象的锁——如果你没有该对象的锁，尝试调用 `wait` 方法将导致抛出 `IllegalStateException`）。这实际上非常有用，因为它允许其他线程修改\
  \ `myObject`。本章后面的“卖冰淇淋的人”示例将对此进行说明。\n\n要理解 `wait` 方法，可以想象教堂的牧师传递奉献盘的情景。他期望人们修改奉献盘的状态——事实上，他正是在等待他们这样做。如果人们不行动，他可能会一直等待下去。在代码中，这可能类似于清单\
  \ 4-1。如果现在这些代码示例对你来说不是百分之百清晰，请不要气馁。读完整个章节，一切都会豁然开朗。\n\n**清单 4-1.** *等待示例*\n\n```java\n\
  1 public class Minister {\n2     private CollectionPlate collectionPlate = new CollectionPlate();\n\
  3\n4     public static void main(String[] args) {\n5         Minister minister =\
  \ new Minister();\n7         // 创建一个线程来检查奉献盘中的金额。\n8         minister.new CollectionChecker().start();\n\
  11         // 创建多个线程来接收捐款。\n12         for (int i = 0; i < 6; i++) {\n13       \
  \      minister.new CollectionAcceptor(20).start();\n14         }\n15     }\n17\
  \     /**\n18      * 被传递的奉献盘\n19      */\n20     private class CollectionPlate {\n\
  21         int amount = 0;\n22     }\n24     /**\n25      * 接收捐款的线程。\n26      */\n\
  27     private class CollectionAcceptor extends Thread {\n28         int contribution\
  \ = 0;\n30         public CollectionAcceptor(int contribution) {\n31           \
  \  this.contribution = contribution;\n32         }\n34         public void run()\
  \ {\n35             // 将捐款金额添加到奉献盘中。\n36             synchronized (collectionPlate)\
  \ {\n37                 int amount = collectionPlate.amount + contribution;\n38\
  \                 String msg = \"捐款：当前金额：\" + amount;\n39                 System.out.println(msg);\n\
  40                 collectionPlate.amount = amount;\n41                 collectionPlate.notify();\n\
  42             }\n43         }\n44     }\n46     /**\n47      * 检查捐款情况的线程。\n48 \
  \     */\n49     private class CollectionChecker extends Thread {\n50         public\
  \ void run() {\n51             // 检查奉献盘中的金额。如果少于 100，\n52             // 则释放奉献盘，以便其他线程可以修改它。\n\
  53             synchronized (collectionPlate) {\n54                 while (collectionPlate.amount\
  \ < 100) {\n55                     try {\n56                         System.out.println(\"\
  等待中 \");\n57                         collectionPlate.wait();\n58               \
  \      } catch (InterruptedException ie) {\n59                         ie.printStackTrace();\n\
  60                     }\n61                 }\n62                 // 通过 while 语句意味着捐款目标已达到。\n\
  63                 System.out.println(\"谢谢\");\n64             }\n65         }\n\
  66     }\n67 }\n```\n\n在这个例子中，有一个代表牧师的线程在等待捐款总额超过 100 美元。另外还有六个线程代表与会者，每人向奉献盘添加\
  \ 20 美元。\n\n这些线程都在 `collectionPlate` 对象上同步。由于向奉献盘添加金额的线程需要获取 `collectionPlate` 对象的锁，牧师线程必须不时地临时释放它，这是通过调用\
  \ `wait` 方法实现的。每当一个线程向奉献盘添加金额时，它会通过调用 `notify` 方法来唤醒牧师。\n\n\n\n■**注意** 在清单 4-1 中，第\
  \ 41 行集合线程调用的是 `notify` 还是 `notifyAll` 其实无关紧要——无论哪种调用都会唤醒部长线程。由于只有一个线程在等待条件（募捐盘中的金额）发生变化，我们选择了调用\
  \ `notify`。如果有多个线程在等待不同条件的变化，那么调用 `notifyAll` 会更合理。\n\n5165CH04.qxd 11/16/05 12:11\
  \ PM 第 77 页\n\n第 4 章 ■ 线程\n\n**77**\n\n或者想象一个生产者/消费者关系：一个线程填充某个对象，另一个线程在该对象被填充后消费它。在这种情况下，消费者线程希望对象被修改；因此，消费者想知道修改何时发生。\n\
  \n`Object.wait`、`Object.notify` 和 `Object.notifyAll` 支持后一种等待方式。\n\n调用 `wait` 方法与调用\
  \ `sleep` 或 `yield`，甚至因 I/O 而暂停是不同的。\n\n`wait` 方法实际上允许其他线程获取所讨论对象的锁，而 `sleep`、`yield`\
  \ 和因 I/O 暂停则不会。\n\n■**注意** `wait` 和 `notify`/`notifyAll` 方法几乎总是成对出现。如果一个线程在等待，就应该有另一个线程能够调用\
  \ `notify` 或 `notifyAll`。唯一的例外是当你使用超时机制并需要释放锁时——但这种情况非常罕见。如果没有对 `wait` 方法的调用，那么完全没有理由调用\
  \ `notify` 或 `notifyAll`。\n\n**让步**\n\n*让步* 是指在保持自身资源的同时，礼貌地让出自己在队列中的位置。例如，假设你正在使用银行的自动柜员机（ATM）。你知道这个过程会花一些时间，因为你要转账、查询余额、存款等等。让步就是主动邀请你后面的人在你之前使用\
  \ ATM。当然，你不会把资源（钱、ATM 卡等）交给那个人。但你会主动让出你在 ATM 前的位置（类似于 CPU）。做出这种邀请的过程，即使没有人接受，也叫做让步。\n\
  \n即使你让步了，你仍有可能获得优先访问权。在我们的 ATM 场景中，你后面的人可能太客气而不愿接受你的好意。但在计算机术语中，当你让步时，所有线程（包括你自己的线程）都会竞争对象的锁——你的线程获得对象锁的机会并不会因此变少或变多。那么，是什么决定了哪个线程最终赢得竞争并获得对象的锁呢？是线程调度器。\n\
  \n*线程调度器* 就像一个办公室经理。它会考虑所有线程，并根据底层操作系统、线程优先级和其他因素来决定哪个线程应该被允许运行。\n\n有两点需要注意。首先，你必须意识到，当你让步时，即使你原本自愿放弃\
  \ CPU，也不能保证你的执行线程会成为下一个获得 CPU 的线程。一旦一个线程让步，CPU 被另一个线程占用，原先让步的线程在排队顺序上没有任何特殊地位。它必须像其他所有线程一样等待和期盼。\n\
  \n其次，重要的是要认识到，你的线程并没有放弃它拥有独占锁的资源。也就是说，即使你让别人使用 ATM，你也没有把你的 ATM 卡给他。当一个线程让步时，它会退出\
  \ CPU，但它仍然保留对最初标记为独占使用的任何资源的控制权。\n\n那么为什么要让步呢？想象一下，你的线程需要执行六项小型银行操作：查询余额、将资金从支票账户转到日常账户、查询余额、将资金从储蓄账户转到日常账户、查询余额，最后取款。你让步给的那个线程可能只是将欠你的钱存入你的日常账户，这样你的那些财务操作就变得多余，从而无需继续执行。如果你的线程没有让步，它可能要在完成所有六项银行操作之后才能收到这笔钱。如果你的线程正在执行一个耗时或开销较大的操作，偶尔让步是一个好主意。\n\
  \n■**警告** 你不应该依赖线程优先级，进而依赖让步，来解决你的线程问题。线程调度（包括让步）的实现完全取决于 JVM 制造商。\n\n因此，不同的操作系统，甚至同一操作系统上的两个不同\
  \ JVM，处理让步的方式可能不同。所以，你可以在程序中放心地使用让步，但永远不要指望让步一定会实际发生。\n\n**阻塞**\n\n*阻塞* 是指暂停执行直到某个锁可用。如果你的线程试图获取另一个线程已经拥有的锁，那么它将会阻塞，直到那个线程释放它的锁。这仅仅意味着线程进入休眠状态，直到事件发生。在这种情况下，锁变为可用就是那个事件。\n\
  \n这对其他线程意味着什么？这意味着它们可以自由使用阻塞线程有权使用但并未使用的 CPU 周期。然而，阻塞线程仍然保持对任何它已显式锁定的其他资源的独占控制。此外，其他线程应该随时准备好阻塞线程可能重新开始执行，因为触发它的事件随时可能发生。\n\
  \n■**注意** JVM 会为你处理线程从 `Thread.State.BLOCKED` 状态到 `Thread.State.RUNNABLE` 状态的转换。你无需在代码中做任何特殊处理来告知其他线程你即将释放某个对象的锁。\n\
  \n**休眠**\n\n*休眠* 是指等待至少一段指定时间的操作。想象一下，你正在使用 ATM，但屏幕上显示一条消息，告诉你系统繁忙。你可能会决定放弃 5 分钟，等这段时间过去后再回来尝试使用。这个操作使得\
  \ ATM 至少在接下来的 5 分钟内空闲。这段时间过后，你走回 ATM 并加入等待使用的队列。\n\n■**注意** 一个休眠的线程保证至少等待指定的时间。然而，它可能会等待更长时间，这取决于线程调度器的随意决定。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 79 页\n\n第 4 章 ■ 线程\n\n**79**\n\n休眠和让步的区别在于，让步的线程永远不知道等待时间会多短或多长。而休眠的线程则始终知道它将至少等待指定的时间。\n\
  \n**Child.java 示例**\n\n这个示例可能比你在 SCJD 考试中需要处理的任何内容都要复杂，但它很好地说明了等待机制。仔细研究它，你就不会被\
  \ SCJD 考试中的线程要求所压倒。\n\n本示例的前 41 行非常直接。创建了一个 `IceCreamMan` 对象，它运行在自己的线程中，并进入一个循环，等待客户将\
  \ `IceCreamDish` 对象递给他。`IceCreamMan` 是一个静态对象，这确保了在我们的示例中，所有孩子共享的唯一一个 `IceCreamMan`。\n\
  \n在第 15 行，我们将 `IceCreamMan` 线程设置为守护线程。如果唯一仍在运行的线程是守护线程，JVM 将会退出。在本示例中，我们显式创建了几个非守护线程：每个孩子对应三个线程。此外，还有一个为我们创建的非守护线程：主线程。当这四个线程完成后，我们*显式*创建的仍在运行的唯一线程将是\
