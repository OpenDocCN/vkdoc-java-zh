  \n}\n\n现在我们需要为 `DvdDatabase` 定义构造函数。由于示例项目的说明并未指定 `DvdDatabase` 构造函数的具体形式，我们拥有一定的灵活性。这引出了两个主要问题：\n\
  \n**1.** 构造函数应使用哪些参数？\n\n**2.** 构造函数应抛出哪些异常（如果有的话）？\n\n关于参数，我们必须考虑这个类将如何被使用。我们知道它可能用于独立应用程序，为此，不提供任何参数，并假设数据文件位于当前工作目录中，可能会很方便。\n\
  \n然而，我们也知道这个类将用于服务器环境，在这种情况下，数据文件通常位于与应用程序不同的目录（有时甚至是不同的硬盘驱动器）中。在这种情况下，我们需要能够指定数据文件所在的目录。\n\
  \n第一个构造函数只是第二个构造函数的一个特例，因此我们可能会倾向于省略它。我们应该根据它是否会被频繁使用来做出决定。如果是，添加这个构造函数会让我们的用户满意。如果不是，我们可以省略这个构造函数，从而简化代码，在极少数用户希望使用当前工作目录中的数据库的情况下，他们可以调用那个以目录为参数的构造函数，并将当前工作目录（`System.getProperties(\"\
  user.dir\")`）作为参数传入。\n\n我们决定在类中保留这两个构造函数，主要是为了演示一个构造函数调用另一个构造函数的技术。这是处理重载方法和构造函数的一种非常常见的方式，因为它确保了无论调用哪个版本，都会执行相同的业务逻辑。\n\
  \n我们的构造函数将打开数据文件，这意味着如果文件不在指定目录中，我们可能会遇到 `FileNotFoundException`；如果打开数据文件时出现问题（例如，权限不足），我们可能会遇到\
