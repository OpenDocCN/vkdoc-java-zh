  \n\n\n由于磁盘驱动器在执行操作时持续旋转，逐字段写入的速度将远慢于一次性写入整个记录。这是因为在每次调用写入字段的间隙，磁盘会继续旋转，并且磁头返回正确写入位置时会产生短暂延迟（此类操作虽由驱动器控制器处理，但仍会拖慢整体流程）。\n\
