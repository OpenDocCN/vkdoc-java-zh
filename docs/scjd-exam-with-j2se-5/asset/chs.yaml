  •   当你向潜在用户展示时，他们会*明白*这只是一个草图，而非完整的应用程序；而如果你展示的是模拟的图形用户界面（GUI），用户往往会认为大部分工作已经完成。\n\
  •   预先对美观性做出决策后，我们更有可能坚持该设计。若没有预先绘制草图就直接编码，每当遇到实现困难时，就容易产生修改设计某部分的冲动。\n•   预先对 GUI\
