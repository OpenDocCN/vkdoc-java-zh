  \ 页\n\n第 6 章\n\n■ ■ ■\n\n使用 RMI 进行网络通信\n\n**本**章中，你将学习使用远程方法调用（RMI）实现完整网络解决方案所需的背景知识。为此，本章将涵盖\
  \ RMI，并在较小程度上涉及序列化。图 6-1 展示了网络解决方案在整个系统架构中的位置，它位于 GUI 和数据层之间。\n\n**图 6-1.** *Denny\
  \ 的 DVD 版本 2.0 的网络层*\n\n在完全理解 RMI 之前，熟悉序列化的一些细节非常重要，因为 RMI 依赖于这一特性。序列化可能是你在 Sun\
  \ 认证 Java 程序员（SCJP）考试中已经熟悉的话题，但我们仍将简要介绍该主题。这些主题是本章将要阐述的一些宏观要点：\n\n• 理解 Denny 的 DVD\
  \ 中的对象序列化\n\n• 评估使用 RMI 作为网络协议的优缺点 **163**\n\n5165CH06.qxd 11/16/05 12:14 PM 第 164\
  \ 页\n\n**164**\n\n第 6 章 ■ 使用 RMI 进行网络通信\n\n• 实现远程对象并定义远程接口\n\n• 研究工厂模式并了解为何在我们的\
  \ RMI 实现中使用它\n\n• RMI 中的编组与解编组\n\n• 注册你的远程对象\n\n■**警告** 下一章将描述 Java 套接字，这是考生可以为认证项目选择使用的另一种网络协议。但是，请注意，对于认证项目，如果你选择套接字解决方案作为网络协议，则必须发送序列化对象。Java\
  \ RMI 需要序列化，但在 Java 套接字实现中并非绝对必要。例如，你可以在套接字实现中实现自己的线路格式，以便任何客户端技术都可以向 Java 套接字服务器提交请求。在下一章中，我们将解释使用带有序列化对象的套接字的技术。如果你决定使用套接字作为网络协议来实现你的解决方案，下一节“什么是序列化？”仍然会很有用。\n\
  \n**什么是序列化？**\n\n那么什么是序列化，为什么你的程序中需要它？让我们考虑一个例子。\n\n假设同一网络上有两台机器。机器 A 向机器 B 上的一个\
  \ Java 程序发送一条消息；机器 B 如何接收并理解这条消息？需要的是一个传输协议。一个*传输协议*会将需要传输的数据扁平化，将其放入一种可以通过网络发送的格式。\n\
  \n通过网络发送数据的过程的一部分涉及序列化。*序列化*是将一个对象解构为其类型信息和状态组件，然后在接收端通过读取类型信息，然后是字段值，来重建原始对象副本的过程。通常用来描述通过网络传输序列化对象过程的术语是*编组*。有时，在另一端恢复序列化对象的反向过程被称为*解编组*。\n\
  \n序列化对象可以持久化到本地文件系统（借助 Java 文件 I/O），或者通过套接字发送到网络。这是通过将对象转换为序列化的字节流，将该流通过网络传输或传输到文件系统，然后将持久化的字节流读回内存以重新创建对象图（见图\
  \ 6-2）来实现的。对象图是 Java 术语，用于描述重建原始对象及其状态，仿佛什么都没发生过一样。\n\n当一个字节流以对象的形式加载到内存中时，它被称为处于*活动*状态。当同一个字节流位于文件中，而不是在\
  \ Java 虚拟机（JVM）内存库中时，它被称为处于*被动*状态。请记住对象处于活动或被动状态的概念，因为当我们在本章后面介绍 `Activatable` 接口时，它会派上用场。让我们更详细地讨论这个过程。\n\
  \n5165CH06.qxd 11/16/05 12:14 PM 第 165 页\n\n第 6 章 ■ 使用 RMI 进行网络通信 **165**\n\n三个步骤中的第一步是将对象转换为序列化的字节流。首先，类型信息作为头部信息写入流，然后写入状态信息。状态信息由类成员的值组成，但静态和瞬态成员除外（假设使用默认的序列化机制，该机制不实现\
  \ `readObject` 和 `writeObject`；稍后将更详细地讨论这一点）。在反序列化端，接收远程对象首先从头部读取类型信息，并创建该类的一个实例。如果找不到该类（无论是在本地还是远程），则会引发\
  \ `ClassNotFoundException`。一旦类被实例化，字段值就会从流中读取，并在编组的对象中设置这些值。\n\n■**注意** 序列化对象是原始对象的副本，而不是对它们的引用。RMI\
  \ 中的参数和返回值是按值或副本传递的。只有当对象是远程对象时，它才能在另一台机器上被引用——也就是说，该对象通过 `UnicastRemoteObject.export()`\
  \ 方法导出，或者扩展了 `UnicastRemoteObject`。\n\n**图 6-2.** *从对象图创建字节流* **使用 serialver 工具**\n\
  \n序列化涉及实现 `java.io.Serializable` 接口。这个接口之所以有趣，是因为它没有任何需要实现的方法。事实上，实现 `Serializable`\
  \ 的主要目的是通知 JVM 该对象可以被序列化。\n\n`Serializable` 通常被称为标记接口。正式地说，标记接口是一个不定义任何类或子类需要实现的方法，而是将对象标识为属于某种类型的接口。要确定一个类是否可序列化，请使用\
  \ `serialver` 工具。要启动 `serialver` 工具，请在项目根目录的命令提示符下输入以下内容：\n\nserialver -classpath\
  \ classes/. -show\n\n让我们在两个类上运行 `serialver` 工具，一个是可序列化的，另一个是不可序列化的。我们将使用 `DVD` 类作为可序列化的类，使用\
  \ `DvdFileAccess` 作为不可序列化的类。图 6-3 和图 6-4 分别演示了在我们的 `DVD` 和 `DvdFileAccess` 类上使用\
