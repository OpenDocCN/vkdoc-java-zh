  \ PM Page 94\n**94**\nC H A P T E R 4 ■ T H R E A D I N G\n\n■**警告** 尽管图 4-4 显示线程被通知的顺序与它们调用\
  \ `wait` 的顺序相同，但绝不应依赖于此。线程被通知的顺序，以及它们重新获得公共对象锁所有权的顺序，完全由 JVM 的线程调度器决定。\n\n通常，只有当你确定被通知的线程能够利用该通知时，才应使用\
  \ `notify`。如果你有多个线程，并且确定它们都能利用该通知，但你只希望其中一个线程转换到可运行状态，那么你应该使用 `notify`。然而，在这种情况下，你必须确保其余线程不会处于不确定状态——某个线程必须在适当的时候通知它们可以继续处理。这很复杂，需要详细分析才能正确实现。如果你有多个线程在等待一个事件，但它们需要满足不同的条件，那么最好调用\
  \ `notifyAll`，以便所有线程都能重新检查它们的条件。例如，考虑以下代码片段：\n\n*生产者线程：*\n\nsynchronized (lock)\
  \ {\n    value = Math.random();\n    lock.notifyAll();\n}\n\n*消费者线程 1：*\n\nsynchronized\
  \ (lock) {\n    while (value < 0.5) {\n        lock.wait();\n    }\n}\n\n*消费者线程\
  \ 2：*\n\nsynchronized (lock) {\n    while (value >= 0.5) {\n        lock.wait();\n\
  \    }\n}\n\n这段代码展示了一个例子，说明调用 `notifyAll` 比调用 `notify` 更可取。通过在设置 `value` 后调用 `notifyAll`，生产者可以确保两个消费者都会检查\
  \ `value` 变量的当前内容，并且其中一个能够继续处理。如果使用 `notify` 而不是 `notifyAll`，则有可能在设置 `value` 后，错误的线程被通知，并且发现\
  \ `value` 变量不包含所需的数字后，它会回到 `Thread.State.WAITING` 状态，这意味着两个消费者线程都不会工作！\n\n![Image\
