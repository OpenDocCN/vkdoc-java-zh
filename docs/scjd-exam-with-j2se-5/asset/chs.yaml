  \ in Socket Server: \"\n\n+ e.getMessage()\n\n);\n\n}\n\n5165CH07.qxd 11/16/05 12:15\
  \ PM Page 218\n\n**218**\n\n第 7 章 ■ 使用 SOCKET 进行网络编程\n\n关于 `DBSocketRequest` 的最后一点是，`DBSocketRequest`\
  \ 是我们实现应用协议的地方。我们已经将协议与实际 socket `DVDSocketServer` 分离开来。\n\n**应用协议**\n\nsocket 客户端向\
  \ socket 服务器发送一个序列化对象。但是服务器如何知道如何响应该对象呢？从技术上讲，序列化对象只是字节流形式的数据；表面上它并不传达操作信息。这就是我们需要一个*协议*（即一组规则）的地方，该协议定义了我们的客户端如何与服务器交互。\n\
  \n从高层次来看，我们的协议将按如下方式工作：\n\n**1.** 客户端将向服务器发出请求，例如租借或归还租赁。\n\n**2.** 服务器将执行该请求。\n\
  \n**3.** 结果状态或返回值将发送回客户端。\n\n仔细思考上述列表，应该会引出以下两个问题：“服务器将如何解释请求？”以及“结果将如何发送回客户端？”\n\
  \nDenny's DVDs 应用程序采用了一种封装方法。请求被封装在命令对象中，结果被封装在结果对象中。让我们仔细看看命令对象和结果对象。\n\n命令枚举\n\
  \n`DvdCommand` 类通过将客户端请求存储为 `SocketCommand` 成员 `commandId` 来封装该请求。当 GUI 客户端调用 `DVDSocketClient`\
  \ 上的某个 `DBClient` 方法时，socket 客户端会设置 `commandId` 属性并将其发送到 socket 服务器 `DVDSocketServer`。\n\
  \n由于 `DVDCommand` 是通过网络发送（或编组）的，因此它必须是可序列化的。当服务器接收到 `DVDCommand` 对象时，它会使用 `commandId`\
  \ 来调用 `DVDDatabase` 上的相应方法，这是对服务器的本地调用。请求所需的任何参数（例如，UPC 值）都通过 `DVD` 类成员传递。`regex`\
  \ 属性专门用于 `find` 方法。\n\n清单 7-4 展示了接受 `SocketCommand` 枚举 ID 的构造函数（参见侧边栏）。\n\n\n\n\
  “使用枚举常量”）以及一个 dvd 对象作为参数。dvd 对象用于存储租赁和归还时的 UPC 码。对于 modify 方法，可以使用 dvd 参数来设置特定 DVD\
  \ 的其他属性。在我们的实现中，实际上并未公开使用 modify 方法，但该类在设计时已考虑到了这一扩展需求。\n\n■**注意** DVDCommand 对象是命令模式的一个示例。命令对象将请求封装为一个对象。有关命令模式的更多信息，请参阅《设计模式：可复用面向对象软件的基础》一书，作者为\
  \ Erich Gamma、Richard Helm、Ralph Johnson 和 John M. Vlissides（Addison-Wesley，1995\
  \ 年）。代理模式和适配器模式也在这本软件领域的经典著作中有所描述。\n\n5165CH07.qxd 11/16/05 12:15 PM 第 219 页\n\n\
  第 7 章 ■ 使用套接字进行网络编程\n\n**219**\n\n**清单 7-4.** *DVDCommand.java 的公有方法*\n\n/**\n\n\
  * 默认构造函数\n\n*/\n\npublic DvdCommand() {\n\nthis(SocketCommand.UNSPECIFIED);\n\n\
  }\n\n/**\n\n* 需要指定要执行命令类型的构造函数。\n\n*\n\n* @param command 服务器要执行的命令的 ID。\n\n*/\n\n\
  public DvdCommand(SocketCommand command) {\n\nthis (command, new DVD());\n\n}\n\n\
  /**\n\n* 需要指定命令类型和 DVD 对象的构造函数。\n\n*\n\n* @param command 服务器要执行的命令的 ID。\n\n* @param\
  \ aDvd\n\n*/\n\npublic DvdCommand(SocketCommand command, DVD dvd) {\n\nsetCommandId(command);\n\
  \nthis.dvd = dvd;\n\n}\n\n/**\n\n* 获取用于搜索的查询条件。\n\n*\n\n* @return 表示在 find() 中使用的正则表达式的字符串。\n\
  \n*/\n\npublic String getRegex() {\n\nreturn regex;\n\n}\n\n/**\n\n* 设置正则表达式\n\n\
  *\n\n* @param re 在 find() 中使用的正则表达式。\n\n*/\n\npublic void setRegex(String re) {\n\
  \nregex = re;\n\n}\n\n5165CH07.qxd 11/16/05 12:15 PM 第 220 页\n\n**220**\n\n第 7 章\
  \ ■ 使用套接字进行网络编程\n\nDVDSocketClient 在其每个 DBClient 方法中都使用了 DVDCommand 对象。例如，在 find\
  \ 方法中，使用 SocketCommand 的 FIND 枚举值构造命令对象。接着，使用 find 方法的 query 参数设置 regex 属性。\n\n\
  这两个步骤在此再次展示：\n\nDvdCommand cmdObj = new DvdCommand(SocketCommand.FIND); cmdObj.setRegex(query);\n\
  \n结果对象\n\nDVDResult 对象用于封装请求的结果。当 DVDDatabase 完成一个请求后，结果会发送回 DVDSocketServer，后者再将结果包装到\
  \ DVDResult 对象中，并发送回套接字客户端。与命令对象的情况类似，DVDResult 必须可序列化，因为它需要通过网络传输。即使是异常也会被包装到 DVDResult\
  \ 中并发送回客户端。\n\n结果对象在其操作上与 DVDCommand 对象类似。有多个构造函数可以接收来自 DBClient 方法的不同类型的返回值。你可以在项目下载中找到相关代码，但以下是其在\
  \ DVDSocketClient 的 find 方法中使用的一个示例：\n\nDVDResult serialReturn = (DVDResult)ois.readObject();\n\
  \nif (!serialReturn.isException()) {\n\nretVal = serialReturn.getCollection();\n\
  \n}\n\nDVDResult 从套接字服务器接收。检查结果对象中是否包含异常，如果未检测到异常，则从 DVDResult 中提取 Collection。我们知道它必定是一个\
  \ Collection，因为我们的协议确保对于 DBClient 的 find 方法，始终返回一个 Collection。\n\n■**注意** 基于良好的设计原则，我们将应用程序协议与套接字服务器分离开来。\n\
  \n因此，协议的变化，甚至新增协议，现在都可以在不直接影响套接字服务器的情况下进行处理。\n\n**使用枚举常量**\n\n应用程序协议通过指定命令类型来实现。这是通过从\
  \ DvdCommand 类的构造函数中提取的以下代码完成的：public DvdCommand(SocketCommand command, DVD dvd)\
  \ {\n\nsetCommandId(command);\n\nthis.dvd = dvd;\n\n}\n\n\n\n5165CH07.qxd 11/16/05\
  \ 12:15 PM Page 221\n\n第 7 章 ■ 使用套接字进行网络编程\n\n**221**\n\n在 JDK 5 之前，`DvdCommand`类中的`commandId`变量通常会被定义为常量，形式如下：\n\
  \npublic final static int FIND = 0;\n\npublic final static int RENT = 1;\n\npublic\
  \ final static int RETURN = 2;\n\n然而，这样做存在许多问题，包括：有人可能直接将`commandId`变量设置为一个不受支持的整数值，或者对常量进行不合逻辑的操作（例如尝试将它们相加）。此外，我们无法枚举这些模式的数量，而且如果尝试打印`commandId`变量的值，返回的将是一个数字——我们必须查阅文档或源代码才能确定这个数字的真正含义。\n\
  \nJDK 5 为我们提供了一种更简单的定义这些常量的方式：使用枚举。`SocketCommand`枚举定义如下：\n\npackage sampleproject.gui;\n\
  \npublic enum SocketCommand {\n\nUNSPECIFIED, /* 表示命令对象尚未设置 */\n\nFIND, /* 请求将执行查找操作\
  \ */\n\nRENT, /* 租借 DVD */\n\nRETURN, /* 归还 DVD */\n\nMODIFY, /* 更新 DVD 状态 */\n\n\
  ADD, /* 创建新的 DVD 记录 */\n\nREMOVE, /* 删除 DVD 记录 */\n\nGET_DVD, /* 从数据库中检索单个 DVD */\n\
  \nGET_DVDS, /* 从数据库中检索多个 DVD */\n\nRESERVE,\n\nRELEASE\n\n}\n\n现在，任何`SocketCommand`类型的变量*只能*包含这些列出的选项之一——其他选项都是不可能的。\n\
  \n我们还有一个好处：任何时候我们打印（或记录）`commandSocket`变量的内容时，将会打印（或记录）字符串`UNSPECIFIED`、`FIND`、`RENT`、`RETURN`、`MODIFY`、`ADD`、`REMOVE`、`GET_DVD`、`GET_DVDS`、`RESERVE`或`RELEASE`——通过查看输出，可以立即清楚地知道该变量被设置成了什么。\n\
  \n使用枚举还有许多其他好处。我们建议您阅读与枚举相关的发行说明，网址为 http://java.sun.com/j2se/1.5.0/docs/guide/language/enums.html，以获取更多信息。\n\
  \n5165CH07.qxd 11/16/05 12:15 PM Page 222\n\n**222**\n\n第 7 章 ■ 使用套接字进行网络编程\n\n\
  **总结**\n\n在本章中，我们讨论了 Denny's DVDs 的套接字实现。我们还简要概述了不同类型的套接字，以及各种类型的 TCP 套接字开发策略。我们为套接字实现制定了应用协议，并借助\
  \ Java 枚举演示了命令模式。在您的考试解决方案中选择套接字作为网络协议，不应被视为某种需要不惜一切代价避免的深奥且可怕的东西。尽管大多数学生选择不开发套接字解决方案，但我们相信，鉴于本书附带的示例代码库，这个选择并不比\
  \ RMI 解决方案更具挑战性，而且应该相当直接明了。\n\n套接字是大多数网络协议底层所依赖的技术。大多数酷炫的新技术，例如 Web 服务和 EJB，最终都依赖于套接字。正如我们所讨论的，即使是\
  \ RMI 也是构建在套接字之上的。因此，熟悉套接字对您大有裨益，哪怕只是为了加深您对这些其他网络技术的理解。下一章将介绍 Denny's DVDs 应用程序的图形用户界面（GUI）。\n\
  \n**常见问题解答**\n\n**问** 我需要实现一个多线程的套接字服务器吗？\n\n**答** 是的。认证考试要求服务器允许多用户访问。如果您使用单线程解决方案，那么将永远无法演示并发访问。您的应用程序将串行阻塞，直到每个请求被逐一解决。\n\
  \n这可能是一个有趣的解决方案，并且可以避免需要设计锁定策略，但 Sun 公司不会允许这样做。\n\n**问** 我应该为套接字服务器实现使用线程池吗？\n\n\
  **答** 这完全取决于您。您可以这样做，而且这将是一个良好的实践。每次接受新连接时，我们的服务器都会生成一个新线程来处理请求。然而，创建和销毁线程并非没有代价。在一个非常繁忙、高流量的服务器上，控制线程的创建可能会更好。线程池会在启动时实例化一定数量的线程，这个数量可以根据您的应用程序性能要求进行调整。当服务器收到新请求时，会从池中取出一个线程来处理该请求。当请求完成时，该线程被返回到池中以供后续使用。线程池将消除与创建和销毁新线程相关的开销。我们在\
  \ Denny's DVDs 中没有使用线程池，您也不必为您的认证项目实现线程池，因为考试不要求您的服务器在高负载下具有良好的性能。\n\n**问** TCP\
  \ 套接字被称为面向连接的协议是什么意思？\n\n**答** 有时在文献中，提到 TCP 套接字时会使用术语“面向连接”。这意味着在端点之间可以进行通信之前，必须存在一个连接。这与\
  \ UDP 套接字（一种无连接协议）形成对比。\n\n5165CH07.qxd 11/16/05 12:15 PM Page 223\n\n第 7 章 ■ 使用套接字进行网络编程\n\
  \n**223**\n\n**问** 是否有必要使用`SocketCommand`对象来指示要对数据库执行哪个命令？\n\n**答** 没有必要。我们选择这种实现是为了清晰：这是一种枚举可能命令并演示命令模式的好方法。其缺点是，如果向数据库添加了新命令，客户端必须接收更新后的`SocketCommand`类才能提交未来的请求，因为我们将无法再反序列化服务器上旧的命令对象。（当然，我们可以检查`serialversionID`以实现向后兼容，但您明白这个意思。）另一种方法是将命令作为字符串嵌入到`DvdCommand`中。这样，当添加新命令时，无需将它们添加到`SocketCommand`类中，但服务器能够识别新命令。\n\
  \n**问** 我应该允许用户更改此应用程序中使用的端口吗？\n\n**答** 虽然并非严格必要，但这样做通常被认为是一个好主意。否则，如果另一个服务器应用程序正在使用您想要的端口，您的服务器应用程序将无法启动。\n\
  \n**问** 在选择用于我的应用程序的端口号时（无论是硬编码还是默认值），是否有任何我应该避免使用的数字？\n\n**答** 互联网号码分配机构（IANA）指定了知名端口列表（端口号\
  \ 0 到 1023）、注册端口（1024 到 49151）以及动态和/或私有端口（49152 到 65535）。建议您从私有端口范围内选择一个端口号，以避免与任何其他服务冲突。您应该避免使用知名端口，因为根据您的操作系统，您可能会发现没有管理员权限就无法使用知名端口运行您的服务器。\n\
  \n**问** 当客户端断开连接时，我该如何执行系统清理？\n\n**答** 如果专用于该客户端的线程正在监听来自客户端的新命令，那么当客户端断开连接时，它将收到一个异常。或者，如果客户端在您的服务器有机会响应之前的请求之前断开连接，那么当您尝试向客户端发送响应时，专用于该客户端的线程将收到一个异常。在这两种情况下，您都可以在\
  \ catch 块中添加清理代码。\n\n\n\n或者，如果你只关心清理任何未处理的锁，你可以使用专用于客户端的线程作为包含锁的 `WeakHashMap` 中的键。当客户端断开连接（且线程终止）时，锁最终会自动从\
  \ `WeakHashMap` 中移除。更多信息请参考第 5 章。\n\n**问** 当服务器上任何其他客户端进行预订时，如何自动更新所有客户端？\n\n**答**\
  \ 这对于 Sun 的作业来说并非必需；不过，你需要在服务器和客户端之间打开一个额外的套接字，以便服务器可以向客户端发送消息。你可以将此与观察者设计模式（在第\
  \ 8 章中描述）结合使用，以便客户端可以注册其希望接收预订通知的意愿。\n\n5165CH07.qxd 11/16/05 12:15 PM 第 224 页\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 225 页\n\n第 8 章\n\n■ ■ ■\n\n图形用户界面\n\n在之前的章节中，详细讨论了\
  \ Denny 的 DVD 应用程序的数据层和网络层的实现。现在，是时候处理最后一个开发层了：图形用户界面（GUI）。\n\n在本章中，我们将涵盖以下主题：\n\
  \n• 设计简单但可用的 GUI\n\n• 回顾 Swing 组件和事件模型\n\n• 实现 `JTable`\n\n• 实现模型-视图-控制器（MVC）设计模式\n\
  \n• 实现观察者设计模式\n\n在阅读本章之前，不必先阅读网络章节。本章的大部分内容详细介绍了如何设计你的 GUI，因此不需要网络部分的知识。本章中涉及连接数据库的部分使用了工厂设计模式，该模式将提供一个实现我们连接接口的类的实例。当然，在完成网络章节之前，你将无法使用本章描述的网络选项将\
  \ GUI 连接到数据库。\n\n■**提示** 我们使用连接接口的方式展示了使用接口的一个好处：接口提供了一个我们可以假设会被实现的契约——我们不需要实际的实现来开发我们的工厂并使用它。\n\
  \n在开发 Sun 的作业时，你可能会选择在开发网络类之前先开始开发 GUI。这也是一种合理的方法，甚至在现实生活中可能是更可取的方法——在网络代码之前开发 GUI\
  \ 意味着客户可以在最终代码编写完成之前就开始使用独立应用程序。\n\n**225**\n\n5165CH08.qxd 11/16/05 12:16 PM 第\
  \ 226 页\n\n**226**\n\n第 8 章 ■ 图形用户界面\n\n就本书而言，我们先开发网络代码是有意义的，因为我们将通过直接连接以及从 GUI\
  \ 内部通过各种网络选项来连接数据库。\n\n■**警告** 最终用户常有一个误解，即当他们看到用户界面时，整个项目就接近完成了。如果你花额外的时间与客户沟通，确保他们理解在展示用户界面时还需要多少额外工作，这可以避免很多困惑。解决这种误解的一种尝试是\
  \ Swing 应用程序的 Napkin 外观。更多详情请参见 http://napkinlaf.sourceforge.net。\n\n在应用程序的所有组件中，没有哪个组件能像\
  \ GUI 那样对用户产生如此大的影响。这由界面的本质决定：它是最终用户与系统交互的方法。\n\n不幸的是，GUI 往往是应用程序开发过程中最被忽视的部分。这实际上是一种谬误，因为用户界面有时可以成就或毁掉整个系统。如果\
  \ GUI 复杂且难以导航，用户很快就会感到沮丧，结果将是糟糕的整体用户体验。最终，一个系统只有在人们能够成功使用时才算成功。\n\n本章旨在向那些过去可能没有过多考虑\
  \ GUI 布局、设计和实现的人介绍相关概念。界面是 SCJD 考试的必要部分，本章为新手提供了启动和运行界面所需的所有信息。\n\n**GUI 概念**\n\n\
  SCJD 考试要求一个人完成所有开发工作。这包括应用程序所有三个层的开发：服务器层、中间层和表示层。这与更常见的工作环境不同，在那种环境中，开发人员通常专注于某一特定层。在职场中，常见做法是让一组后端开发人员和另一组前端开发人员共同处理一个三层项目。而在\
  \ SCJD 考试中，一个开发人员必须创建所有三个层。\n\n■**提示** 你正在完成通常可能由三个团队分担的工作，这一事实在阅读 Sun 的说明时可能会引起混淆。考生常常觉得说明中\
  \ GUI 部分的要求与数据部分的要求相矛盾。但如果从各个团队的角度来考虑，你会发现这些说明并不矛盾；构建数据类的团队有明确的指令要执行。构建 GUI 的团队被告知数据类将提供什么，然后可以添加自己的限制以满足\
  \ GUI 的要求。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 227 页\n\n第 8 章 ■ 图形用户界面\n\n**227**\n\
  \n创建前端可能是一项艰巨的任务，尤其是对于那些主要不是前端开发人员的人来说。有许多 Java 开发人员从未写过一行界面代码，但总体上仍然是极其熟练的程序员。由于只提供了有限的界面文字描述，这一情况更加严重；我们没有任何关于最终用户希望看到什么的示例。接下来两节的关键在于减轻开发\
  \ GUI 的负担。\n\n除了可以融入 SCJD 考试界面的一些基本人机界面概念外，还将从高层次讨论布局概念。\n\n■**注意** 布局概念和人机界面概念本身就是研究课题。接下来的两节仅介绍与\
  \ SCJD 考试相关的概念。\n\n**布局概念**\n\n一个常见的误解是，GUI 布局与其说是科学，不如说是艺术。这稍微歪曲了布局设计和信息架构的过程。在计算机早期，计算机编程被认为与其说是科学，不如说是艺术。\n\
  \n按照今天的标准，这一事实似乎近乎荒谬。只有在将工程流程应用于编程艺术之后，它才迅速变得更像一门科学或工程实践。界面设计概念也是如此。\n\n布局设计围绕着以清晰简洁的方式呈现信息。用户应该能够毫不费力地处理用户界面呈现的信息。最后这句话很模糊，但这是有原因的。无论一个流程可能变得多么标准化，决策中总会有一定程度的直觉。并非所有道路都能被预见并纳入标准流程。直觉正是布局设计的艺术发挥作用的地方，它决定了如何处理那些无人涉足过的开发灰色地带。\n\
  \n\n\n幸运的是，许多人已经探索过 SCJD 考试中涉及的设计考量。事实上，数据的布局已经变得如此标准化，以至于 Sun 公司甚至提供了一个 Swing 组件——`JTable`，专门用于处理这种“数据库”风格的数据。Sun\
  \ 公司甚至要求 SCJD 考试必须使用 `JTable` 组件。`JTable` 组件（本章后面会详细讨论）是本书示例应用程序中数据展示的主要方法。\n\n\
  从高层次来看，让我们看看 `JTable` 如何高效地显示数据。`JTable` 采用了电子表格的范式，将项目划分为行和列进行展示。这种电子表格风格的布局如图\
  \ 8-1 所示。请注意，当用户需要在这种范式下定位数据时，他们只需交叉引用列值和行值即可。\n\n两个值相交的地方就是数据的位置。这种范式也是数据与显示空间之间的终极协调。如果向表格中添加一行数据，表格大小将增加大约所用字体的高度。添加一列对大小的影响比添加一行更大，但这种布局非常灵活，因此底层系统数据的更新可以很容易地在展示层中体现出来。除了所有这些特性之外，表格模式还能在很小的区域内展示大量数据。\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 228 页\n\n**228**\n\n第 8 章 ■ 图形用户界面\n\n**图 8-1.**\
  \ *一个高层次的表格模式*\n\n虽然上述分析可能看起来显而易见，但它确实强调了表格模式做得非常好的布局原则。对 `JTable` 进行的分析可以而且应该应用于任何\
  \ GUI 界面的整体布局。你应该在用户界面中寻找以下标准：\n\n• 所有数据都在最小的空间内呈现，且不显得杂乱无章。\n• 用户应能快速定位所需信息。\n\
  • 在大多数情况下，界面必须能够伸缩以适应更多或更少的数据。\n\n**人机界面概念**\n\n人机界面概念超越了简单的数据布局组织技术。人机界面设计模式在用户尝试完成任务时，组织用户的事件流。例如，决定如何布局数据以最大化其可读性是一个*布局*决策。而决定如何布局选择数据项并修改它的整个过程则是一个*人机界面*决策。简而言之，人机界面决策决定了用户如何与系统交互。\n\
  \nGUI 的目的是创建一种用户与系统之间简便的交互方式。\n\n从某种意义上说，GUI 充当了一个屏蔽层，将系统的实际功能对用户进行抽象。当用户点击按钮保存文档时，系统可能需要经过多个步骤来保存文件：**1.**\
  \ 应用程序验证文件完整性。\n**2.** 系统计算文件的物理大小。\n**3.** 系统检查硬盘是否有足够的可用空间来保存文件。\n**4.** 应用程序将文件写入文件系统。\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 229 页\n\n第 8 章 ■ 图形用户界面\n\n**229**\n\n这些几乎是每个应用程序为了保存文件都要执行的步骤。但大多数应用程序只需要用户提供一个输入项来启动这些操作：从“文件”菜单中选择“保存”选项。\n\
  \n想象一下，如果一个应用程序要求用户先选择“验证文件”菜单项，接着选择“计算文件大小”选项，然后选择“检查硬盘空间”选项；接着输入从上一步获得的计算出的文件大小；最后，在确认有足够的硬盘空间后，选择“将文件写入文件系统”选项。这个应用程序会让保存文档变得得不偿失。\n\
  \n前面的例子有些极端，但它仍然展示了尽可能将系统操作对用户进行抽象的概念。系统应该能够完成前面列出的许多任务，而无需用户任何输入。只有在发生错误时，才需要通知用户系统的活动。例如，如果文件系统没有足够的空间来保存文件，应该提示并通知用户系统无法自行完成此步骤。除此之外，应该允许用户简单地选择“保存”，然后让系统抽象掉所有必要的子步骤。\n\
  \n这是界面设计的主要关注点之一：协调系统指令与用户实际与系统交互所需执行的操作。这看起来可能是一项显而易见且简单的任务，但坦率地说，它并不简单。它要求一个人从从未使用过该应用程序的普通人的角度来审视系统。保持客观对许多应用程序设计人员和开发人员来说都很有挑战性。他们对整个系统的深入了解，可能会使他们难以判断哪些操作对用户是必要的，哪些操作对系统是必要的。\n\
  \n这就是花时间重新审视需求可能极具价值的地方。为了让自己从系统设计中抽离出来，从用户的角度来审视应用程序，退后一步，重新阅读应用程序的需求，并寻找特定的交互信息：\n\
  \n• 系统的主要用户是谁？\n• 用户使用系统做什么？系统必须允许他们完成哪些任务？\n• 为了完成这些任务，系统需要执行哪些操作？\n\n写下这些问题的答案。举个例子，如果你正在考虑创建一个允许用户向文档添加脚注的软件，你应该得到一个类似于表\
  \ 8-1 的列表。\n\n**表 8-1.** *示例用例骨架*\n\n**用户**\n\n**与脚注功能的交互**\n\n作者\n\n添加脚注\n\n作者\n\
  \n查看脚注\n\n作者\n\n编辑脚注\n\n作者\n\n删除脚注\n\n那些有项目需求经验的人现在会注意到，我们正在做的是创建一组简单的用例。*用例*详细说明了诸如所有参与者如何与系统交互，以及系统将允许他们完成哪些任务等内容。一组用例通常会提供更多细节，并详细说明完成任务所需的额外步骤。表\
  \ 8-1 的一个简单用例图将类似于图 8-2 所示。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 230 页\n\n**230**\n\
  \n第 8 章 ■ 图形用户界面\n\n**图 8-2.** *用户与脚注功能交互的用例图*\n\n■**注意** 用户界面应尝试弥合用例与系统功能之间的差距。系统在设计上应允许执行用例中详述的所有操作。界面的工作就是让这些任务对用户来说尽可能简单。如果系统架构不允许执行用例中详述的所有操作，则表明应用程序设计存在严重缺陷。\n\
  \n接下来，填写每个操作的细节，如下所示：“用户可以通过首先选择要附加脚注的文本，然后可选地为脚注指定一个名称，接着为脚注添加一些正文，最后保存脚注。”\n\n\
  现在应该有足够的细节来开始界面设计了。首先也是最重要的，考虑如何协调系统所需操作与用户所需操作。\n\n规划一个界面，要求用户完成一个任务所需的步骤最少。这应该成为你界面设计的指导原则。\n\
  \n\n\n■**提示** 通常，用户界面会提供多种方式来完成同一任务。例如，一个应用程序可能允许用户通过菜单项、指定按键或屏幕按钮来保存文档。这被认为是良好的界面设计，用户会记住并使用最适合自己的方法。\n\
  \n虽然 SCJD 作业并未明确将其列为要求，但开发者应遵循标准实践，你最好考虑添加常见功能，例如为按钮操作和菜单操作设置快捷键。\n\n![图 26](img/index-250_1.png)\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 231 页\n\n第 8 章 ■ 图形用户界面\n\n**231**\n\n另一个需要考虑的简单原则是用户如何实际浏览和解读用户界面。在大多数西方社会中，用户通常从左上角开始分析界面。从该点开始，趋势是继续向下和向右移动。这是由于西方国家书面文字的特性所致：页面上的文字从左向右流动，因此大多数西方用户倾向于将屏幕左侧视为起点，右侧视为终点。这两点之间的任何内容都代表了从起点到终点的必要步骤。这一概念如图\
  \ 8-3 所示。\n\n**图 8-3.** *西方用户解读 GUI 时的视线路径*\n\n■**提示** 即使你是在亚洲工作的亚洲开发者，就 Sun 公司的作业而言，你可能应该假设该作业是按照西方期望进行评估的。\n\
  \n在规划界面的工作流程时，沿着这条路径按重要性排列项目对用户有利。我们希望用户首先注意到的元素，当然应该最靠近左上角。界面项目从起始角向下排列的顺序也暗示了操作的顺序。\n\
  \n例如，考虑图 8-4。\n\n图 8-4 所示的路径表明，用户应对表格执行操作，然后在完成操作后点击“输入”按钮。如果将“输入”按钮放在表格之前，用户可能仍然能够理解并推断出操作顺序，但界面会显得不够直观，且组织性明显较差。\n\
  \n对项目进行分组也暗示了相似的功能。这就是为什么在大多数文字处理程序中，诸如“打开”、“保存”和“新建文档”等文档存储按钮彼此紧邻的原因。\n\n![图 27](img/index-251_1.png)\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 232 页\n\n**232**\n\n第 8 章 ■ 图形用户界面\n\n■**提示**\
  \ 如果你对如何设计对最终用户直观的操作有疑问，答案有时很容易找到：寻找另一个具有类似功能的流行程序。设计一个与用户可能习惯的其他应用程序界面相似的界面，是确保你的应用程序同样直观的有效方法。\n\
  \n**图 8-4.** *一个应用路径*\n\n此外，将按钮放在文本字段旁边，暗示该按钮执行与文本字段相关的某种操作。这一原则指出了一种你应该谨慎避免的重大设计错误。因为用户会将分组的项目理解为功能上分组，所以将“退出”按钮直接放在“保存”按钮旁边是一个非常糟糕的主意。“退出”项目被视为破坏性操作，因为它会终止程序执行，而“保存”按钮是非破坏性且经常使用的操作。这种特定的界面设计错误可能导致用户在真正想要保存工作时退出程序。\n\
  \n始终记住，普通用户容易出错。开发者必须假设用户会犯错，并且时不时会点错按钮。一个具有适当按钮分组和放置位置的优秀界面设计将最大限度地减少这种可能性。在许多实际应用程序中，用户界面甚至可能更进一步，利用`javax.swing.undo`包中提供的功能实现“撤销”机制。这种增强功能允许用户将应用程序状态恢复到之前的时间点，并消除可能因错误操作而产生的后果。尽管此功能很有用，但它远远超出了\
  \ SCJD 考试的要求。\n\n在设计用户界面时要牢记的另一个考虑因素是，作为开发者，你可能对应用程序的运行环境有所假设，但这些假设绝不能被视为事实。例如，仅仅因为你的开发计算机连接了鼠标，并不意味着你可以假设运行你应用程序的每台计算机都有鼠标。这对于\
  \ Java 应用程序尤其如此，因为它们旨在针对几乎所有现有平台。为了确保用户界面的功能性，屏幕上的每个功能小部件都应具有键盘助记符映射、等效的功能键，甚至热键。这样，如果你的应用程序在没有鼠标的平台上运行，最终用户仍然能够通过键盘导航应用程序。\n\
  \n一个极好的最终界面原则是将项目放置在固定、可预测的位置。\n\n遵循这一原则有助于用户发展所谓的肌肉记忆。当用户对屏幕上某个项目的位置变得如此熟悉，以至于其大脑下意识地知道它位于何处时，这种现象就会发生。因此，使用界面变得不那么费神，更像是用户的本能。例如，想想你过去三年使用的网页浏览器。即使你多次更换浏览器，“后退”和“前进”按钮几乎总是位于同一位置。因此，用眼睛定位这些按钮并用鼠标点击它们对你来说变得更快，基本上是因为你总是知道它们在哪里。这就像骑自行车：你可能几年不骑，但永远不会忘记如何保持平衡。\n\
  \n■**注意** 用户会适应新的 UI 标准，因此直观的定义总是在变化。多年来，流行的新 UI 概念不断被引入。例如，当选项卡式面板这一隐喻被引入时，它立即受到开发者的欢迎，因为它提供了一种在单个窗口中显示多个数据面板的高效方法。由于其高效性，选项卡式面板过去是，现在仍然是开发者相当自由使用的工具。由于这种隐喻被频繁使用，用户已经习惯了使用它。其他一些已进入普通用户界面词汇的新\
  \ UI 范式示例包括图标按钮栏和网页浏览器风格的“后退和前进”导航界面。\n\n在设计和开发应用程序界面时，对其进行测试总是一个好主意。然而，测试界面并不像测试应用程序代码那样简单明了。测试\
  \ GUI 的最佳方法是让一个从未见过或使用过该应用程序的人坐下来使用它。\n\n首先，创建一个界面原型。原型可以是所提议界面的一个简单的、非功能性版本。在这个阶段，甚至在纸上画出的界面草图就足够了。关键是，在确定其可用性价值之前，不要在原型上投入太多工作。\n\
  \n\n\n接下来，向测试对象提供一份书面任务清单，并请用户完成这些任务。在用户尝试使用你的界面原型完成清单时，观察他们的操作。在观察测试者的过程中，不要指导他们如何绕过可能误解或卡住的地方。在此过程中，预计用户会在你的界面原型上卡住，并在某些任务上失败。这非常常见，因此注意不要对测试过程感到烦躁。当用户卡住时，只需询问测试用户他们试图完成什么，以及他们期望下一步操作的位置。记下这些评论——它们实际上是对如何为下一位用户调整界面的建议。根据你认为合适的次数重复此过程，或者直到所有测试者都能几乎毫无问题地使用界面的至高时刻。关于可用性测试和可用性设计问题的更广泛信息，请参阅本章的常见问题解答部分，其中提供了一些有价值的网址。\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 234 页\n\n**234**\n\n第 8 章 ■ 图形用户界面\n\n**模型-视图-控制器模式**\n\
  \n上一节展示了通过 GUI 布局协调系统功能与用户交互的必要性。模型-视图-控制器（MVC）模式限制了系统接口与实现之间的依赖关系，并缓冲了数据层和中间层，使其免受可能影响表示层的设计决策的影响。\n\
  \n**为什么要使用 MVC 模式？**\n\nMVC 模式的主要目的是分离用户界面（UI）中涉及的各种任务的职责。一个典型的 UI 可以划分为以下职责领域：\n\
  \n**1.** 系统接口\n\n**2.** 向最终用户显示数据\n\n**3.** 接受用户输入，然后解析并处理这些输入 这三个职责领域分别对应模型、视图和控制器。\n\
  \n使用 MVC 设计模式，可以将这三个职责领域在逻辑上保持分离。在大型团队中，可能可以将这些职责领域分配给拥有最佳技能来执行工作的团队——例如，擅长布局设计的人可能被分配到视图工作，而更擅长解析各种来源输入的人可能负责控制器。\n\
  \n使用 MVC 设计模式允许我们快速更改 UI。对于本书的示例作业和 Sun SCJD 作业，我们将创建一个作为独立应用程序运行的 GUI。然而，通过更改视图和控制器，我们可以轻松创建一个基于\
  \ Web 的应用程序。另一个视图和控制器可用于为应用程序提供 Web 服务接口。\n\n■**提示** 通常建议在学习任何新主题时，尝试将概念付诸实践。如果你计划学习\
  \ Sun 认证 Web 组件开发人员认证，可以尝试为你的作业创建一个 Web 界面。这比在学习中尝试实现一个全新的项目更容易，因为你已经创建了业务逻辑，因此只需专注于与新认证学习相关的信息。\n\
  \n**MVC 详解**\n\n顾名思义，MVC 模式由三个主要参与者组成，如表 8-2 所示。\n\nMVC 模式可能看起来复杂，但实际上它是一个极其简单的概念。当将其简化为一个现实世界的例子时，这个概念非常容易理解。让我们从在本地快餐店点餐的角度来考虑。\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 235 页\n\n第 8 章 ■ 图形用户界面\n\n**235**\n\n**表 8-2.**\
  \ *MVC 架构的组件* **组件**\n\n**角色**\n\n模型\n\n模型是应用程序其余部分的接口。它为控制器提供了一种一致的方式来访问和/或修改数据，并以指定格式返回数据。模型通常会结合其他设计模式——例如，使用外观模式隐藏底层应用程序细节；使用观察者模式的可观察端向视图提供自动更新；使用单例模式确保模型只能存在一个实例；等等。\n\
  \n视图\n\n视图是数据的实际视觉表示。底层系统可能以多种方式存储数据，但视图的功能是解释并将系统数据转换为适当的格式。一些适当的表示格式可能包括 HTML\
  \ 页面、PostScript 文档或 Java 应用程序的 GUI。无论选择何种数据显示类型，事实仍然是视图仅负责将系统的内部数据格式转换为表示格式。视图还必须允许人机交互。用户可能点击\
  \ GUI 界面中的按钮，视图必须处理并分发该操作。这转化为对控制器的调用。重要的是要认识到，视图不一定对应于屏幕布局——在 B2B 场景中，视图也可能是发送到远程应用程序的\
  \ XML 文档。\n\n控制器\n\n控制器是应用程序数据和表示部分之间的中介。视图调用控制器并指示其执行某个操作。该操作可能需要从视图传递数据，或者可能将数据传递回视图。无论如何，有一点是确定的：数据层和表示层之间的所有交互都必须通过控制器进行。为了保持\
  \ MVC 所允许的高度抽象，视图绝不能绕过控制器而直接与其下方的组件通信。例如，视图绝不应直接调用数据库并指示其执行查询。相反，视图应调用控制器并指示其调用数据库组件。\n\
  \n当你到达餐厅时，你看着菜单，觉得沙拉看起来很不错。于是你向柜台服务员点了一份沙拉和一杯奶昔。那个人去厨房，取回你的食物，然后交给你。\n\n这是一个非常常见的场景，但它完美地代表了\
  \ MVC 模式。\n\n让我们分解这个场景中的主要角色，并将它们映射到 MVC 模式中的对应部分。\n\n这个例子中的视图是呈现给你的菜单。视图的类型可能有所不同——你可能在餐厅内看着手中的菜单，或者你在免下车通道看着墙上的菜单。无论哪种视图，呈现的信息相同，但可能以不同格式呈现——餐厅内顾客的纸质菜单，或免下车通道顾客的喷绘菜单。\n\
  \n这个场景中的控制器是接受你点餐的柜台服务员。那个人充当了你与快餐店实际运营之间的缓冲。柜台服务员记下你要求的餐点，并安排将其提供给你。\n\n5165CH08.qxd\
  \ 11/16/05 12:16 PM 第 236 页\n\n**236**\n\n第 8 章 ■ 图形用户界面\n\n■**注意** 可以将柜台服务员视为视图的一部分，因为他们会向顾客提问并可能要求支付餐费。然而，为简单起见，我们忽略了柜台服务员可能扮演的多个角色。\n\
  \n\n\n控制器（Controller）的职责是处理为你获取餐食的实际细节，你无需查看或理解他们如何获取餐食。控制器可能会去厨房请厨师准备你的沙拉和奶昔，也可能需要请两个不同的人分别完成这两项任务。事实上，当你点餐时，你绝不会走进厨房去指挥每个员工去制作你的餐食，当然也不会亲自准备。组织餐食供应是控制器的工作，你关心的只是获取下一个视图（即餐食本身）。\n\
  \nMVC 的下一个组件是模型（Model）。在快餐的例子中，模型就是厨房。厨房会提供各种视图——标准菜单、任何“今日特供”菜单（这些可能在餐厅内部菜单的单独页面上列出，或写在免下车顾客的黑板上）——然后接收订单并呈现数据（即餐食）以供下一个视图使用。\n\
  \n**MVC 的优势**\n\nMVC 模式的主要优势在于将数据呈现与系统操作进行抽象分离。这一特性带来了诸多影响。例如，如果一个系统需要向多种不同的输出方式展示数据，那么这种模式就是理想的解决方案。在\
  \ MVC 模式下，数据模型保持不变，但展示方式可以非常容易地改变。\n\n因此，同一个系统可以同时拥有图形用户界面前端和基于 Web 的 HTML 前端，而系统的其余部分无需任何更改。\n\
  \nMVC 模式还有助于限制系统变更的范围。大多数情况下，客户会专注于表示层的功能。这完全可以理解，因为这是最终用户实际使用的应用程序部分。很多时候，客户会要求对前端设计进行大量更改。MVC\
  \ 模式限制了这些更改的范围，并常常防止它们影响系统的其他部分。这并不是说 MVC 模式能让系统更新变得轻而易举，但它确实使系统前端更加灵活。\n\n**MVC\
  \ 的缺点**\n\n凡事都有两面性，MVC 模式也不例外。MVC 并非是所有系统的最佳选择。例如，一个不需要通过多种数据源展示数据的系统可能就不适合采用这种模式。MVC\
  \ 确实使用了大量的数据抽象，有时相关的开销（无论是在开发时间还是性能方面）并不值得付出。\n\nMVC 模式通常是一个好主意，并且是较为轻量级的设计模式之一。它也被广泛使用，并受到大多数开发平台的支持。其实用性几乎与项目规模直接相关。如果开发任务需要\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 237 页\n\n第 8 章 ■ 图形用户界面\n\n**237**\n\n多名程序员并且需要大量的可扩展性，那么\
  \ MVC 模式无疑是一个胜利。如果项目范围非常小，并且可能永远不会更新，那么 MVC 模式可能就没有必要了。\n\n**MVC 的替代方案**\n\nMVC\
  \ 模式最明显的替代方案就是完全不使用它。可以设计和实现一个将实际系统功能与用户界面紧密集成的系统。当然，这会限制图形用户界面的灵活性。由于系统基本上是一个整体，所有更改都会直接影响系统的所有领域。\n\
  \n在某些编程平台上，表示层和数据层的紧密集成是可能的。由于 Java 平台的事件驱动特性，MVC 模式的某些方面在任何用户界面中都是固有的。所有界面组件都会产生动作，并且总是有类被创建来处理这些动作。从这个意义上说，MVC\
  \ 模式是内置的，但程序员可以选择限制其效果，而不使用完整的 MVC 架构。\n\n**Swing 与抽象窗口工具包**\n\n前面的部分强调了界面设计的一些高级方法论。大多数思想，如\
  \ MVC 模式，都与平台无关，适用于开发项目的架构，然后几乎可以用任何语言进行开发。接下来的部分将转向使用抽象窗口工具包（AWT）和 Swing 的特定平台方法，以解释在\
  \ Java 平台上实现界面的方法。\n\n关于如何使用 AWT 和 Swing 进行编程，已有整本书籍论述。本节仅概述一些基本概念。如需更全面地了解这些主题，我们建议您阅读在线教程，网址为\
  \ http://java.sun.com/docs/books/tutorial/uiswing。\n\n**布局管理器概述**\n\n组件（按钮、文本区域、图形等）被添加到容器中，例如\
  \ `JFrame`、`JPanel` 或 `JWindow`。容器使用布局管理器来指定组件在容器内的布局方式。`Window` 和 `Frame` 容器默认使用\
  \ `BorderLayout` 作为其布局管理器。这种特定的布局方案具有一些你可能需要了解的独特功能。\n\n首先，`BorderLayout` 将容器划分为五个区域，如图\
  \ 8-5 所示。\n\n**图 8-5.** *BorderLayout 的区域*\n\n5165CH08.qxd 11/16/05 12:16 PM 第 238\
  \ 页\n\n**238**\n\n第 8 章 ■ 图形用户界面\n\n可以通过调用容器的 `add` 方法将组件放置到 `BorderLayout` 的指定区域中，第一个参数是要添加的对象，第二个参数是约束条件，对于\
  \ `BorderLayout`，该约束条件将是 `BorderLayout` 的五个区域之一，由以下字符串常量表示：\n\n• `BorderLayout.NORTH`\n\
  • `BorderLayout.SOUTH`\n• `BorderLayout.EAST`\n• `BorderLayout.WEST`\n• `BorderLayout.CENTER`\n\
  \n当一个组件被放置到这五个区域之一时，它会立即扩展以填充该区域，并遵守该区域的任何约束。例如，在清单 8-1 中，每个区域都添加了一个按钮。图 8-6 显示了结果。\n\
  \n**清单 8-1.** *BorderLayoutExample*\n\n```java\nimport java.awt.*;\nimport javax.swing.*;\n\
  \npublic class BorderLayoutExample extends JFrame {\n    public static void main(String[]\
  \ args) {\n        new BorderLayoutExample().setVisible(true);\n    }\n\n    public\
  \ BorderLayoutExample() {\n        setDefaultCloseOperation(EXIT_ON_CLOSE);\n  \
  \      add(new JButton(\"North\"), BorderLayout.NORTH);\n        add(new JButton(\"\
  South\"), BorderLayout.SOUTH);\n        add(new JButton(\"East\"), BorderLayout.EAST);\n\
  \        add(new JButton(\"West\"), BorderLayout.WEST);\n        add(new JButton(\"\
  Center\"), BorderLayout.CENTER);\n        pack();\n    }\n}\n```\n\n■**注意** 在 JDK\
  \ 1.5 之前，需要获取 `JFrame` 的内容窗格，然后将组件添加到内容窗格中。JDK 1.5 为 `JFrame` 提供了重写的 `add` 方法，使得前面的代码看起来像是直接将组件添加到\
  \ `JFrame` 中——实际上并非如此；组件是在重写的 `add` 方法中被添加到组件窗格中的。\n\n![Image 28](img/index-258_1.png)\n\
  \n5165CH08.qxd 11/16/05 12:16 PM 第 239 页\n\n第 8 章 ■ 图形用户界面\n\n**239**\n\n**图 8-6.**\
  \ *BorderLayout 运行示例* 可以看出，添加到“North”和“South”区域的按钮已经扩展以填充从 `JFrame` 最左侧到最右侧的区域；但是，它们并没有扩展以填充按钮上方或下方的空间。添加到“East”和\n\
  \n\n\n“West”区域已扩展至按钮的上方和下方，但并未向左或向右扩展。添加到“Center”区域的按钮可以向所有方向扩展。\n\n■**注意** 如果向一个区域添加了多个组件，则最后放入该区域的组件会绘制在所有先前添加的组件之上。这常常会在程序员初次添加组件时造成困惑，因为看起来有些组件似乎丢失了。通常没有理由会故意在同一个区域中添加两个组件。\n\
  \n有多种策略可用于在容器中布局组件并避免上述异常。控制组件流的最佳（或许也是最简单）方法是，先将所有组件放入一个 `JPanel` 容器中，然后将该 `JPanel`\
  \ 容器放入 `BorderLayout` 的五个区域之一。与 `BorderLayout` 不同，`JPanel` 的默认布局管理器是 `FlowLayout`。这种特定布局类型的属性比\
  \ `GridBagLayout` 甚至 `GridLayout` 更容易处理。放置在 `FlowLayout` 中的每个组件都将保持其建议大小，并从左到右排列。\n\
  \n`FlowLayout` 还接受一些对齐参数。构造函数 `FlowLayout(int index)` 可以与 `FlowLayout` 类中的以下常量之一配合使用：\n\
  \n• `FlowLayout.CENTER`\n\n• `FlowLayout.RIGHT`\n\n• `FlowLayout.LEFT`\n\n清单 8-2\
