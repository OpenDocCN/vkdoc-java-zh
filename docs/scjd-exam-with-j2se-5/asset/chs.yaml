  \n321 }\n\n322 }\n\n**讨论点：缓存记录**\n\n到目前为止，我们在加速数据访问代码方面做了一些小的让步，但我们仍然面临每条 DVD 记录都从磁盘上的物理文件读取的情况——这可能是所有操作中最慢的。我们故意这样做是为了不让本章过于复杂；然而，考虑是否可以对数据进行缓存是值得的。\n\
  \n我们应该解决的第一个问题是，缓存数据是否能为我们节省磁盘操作。如果对数据的大多数操作都是写入磁盘，那么缓存就没有太大意义，因为在大多数操作中，我们既要更新缓存，又要更新文件。事实上，我们甚至可能最终得到比完全不缓存数据更差的性能。然而，我们正在开发的应用程序很可能会有大量的搜索匹配记录和显示记录的操作，然后才会选择一条记录进行更新。因此，大多数操作都可以从缓存记录中受益。\n\
  \n下一个问题是内存需求是否会妨碍缓存。每条 DVD 记录相对较小，缓存 1000 条 DVD 记录很可能只需要远少于 10 MB 的 RAM。由于大多数新售出的计算机至少拥有\
  \ 128 MB 的 RAM，因此缓存数据应该没有问题。\n\n\n\n最后，我们应考虑此变更对代码的影响。如果添加任何功能都会使代码显著更难阅读，那么我们就应权衡是否值得添加——毕竟，维护我们代码的人若需维护难以阅读的代码，是不会感谢我们的。不过，为现有代码添加缓存相当简单；我们只需额外增加一个映射来保存\
  \ UPC 键和 DVD 记录。对此缓存的访问方式，可与用于 UPC 到文件位置映射的`recordNumbersLock`互斥锁相同。\n\n在决定是否实现缓存之前，你应仔细阅读从\
  \ Sun 公司收到的说明。检查是否存在任何性能要求，或对尽可能简单代码的要求。如果没有具体要求，你可以自行决定是否实现缓存——只需记住在设计选择文档中记录你的决定。\n\
  \n**ReservationsManager 类**\n\nReservationsManager 类提供了逻辑预留记录的能力，以便客户端可以修改该记录，并确信在逻辑预留释放之前，没有其他客户端能修改它。\n\
  \n为帮助解释逻辑记录锁定的目的，我们先考虑一个没有逻辑记录锁定的场景：两个客户端试图租借某特定 DVD 的唯一副本：\n\n5165CH05.qxd 11/16/05\
  \ 12:13 PM 第 149 页\n\n第 5 章 ■ DVD 数据库类\n\n**149**\n\n• 客户端 A 检索电影《*上班一条虫*》的 DVD\
  \ 记录。\n• 客户端 B 检索电影《*上班一条虫*》的 DVD 记录。\n• 客户端 A 确认该 DVD 仍有一份库存。\n• 客户端 B 确认该 DVD\
  \ 仍有一份库存。\n• 客户端 A 租借了该 DVD。\n• 客户端 B 租借了该 DVD。\n\n现在问题出现了：根据电子记录，客户端 A 和 B 都租借了同一张\
  \ DVD。\n\n解决此问题的一种方法是使检索-确认-租借操作成为原子操作。然而，这只能在服务器端完成，因为运行在各自 JVM 中的两个独立客户端无法感知其他\
  \ JVM 中运行的同步块。将这段代码放在服务器端运行，构建瘦客户端会非常简单，但我们已知需要构建一个 Swing 客户端，因此我们知道客户端计算机能够支持胖客户端。更大的问题是，将此代码置于原子块内会降低并发性。\n\
  \n**瘦客户端与胖客户端**\n\n术语“瘦客户端”用于表示可在处理能力最低的计算机上运行的客户端界面。一个典型例子是应用程序的 Web 界面——访问该 Web\
  \ 界面的计算机可以是性能非常低的计算机。甚至有可能设置一台没有硬盘或软盘驱动器的计算机，只要软件有瘦客户端界面，就能访问功能强大的软件。例如，可以在配备 386\
  \ CPU（运行频率 16 MHz、4 MB RAM）的个人计算机上设置一个 Web 浏览器。如果这样做，你仍然可以访问电子邮件、阅读新闻、执行网络搜索等操作。\n\
  \n对于不像作者那么年长的读者来说，在目前配备奔腾 4 CPU（运行频率超过 2 GHz、至少 128 MB RAM）的个人计算机之前，曾有过配备奔腾 III\
  \ CPU 的个人计算机。再往前追溯，有奔腾 II CPU、奔腾 CPU、486 CPU——再之前是 386 CPU。在配备 386 CPU 的个人计算机之前，还有\
  \ 286、8086 和 8088 CPU，但作者可不想在它们中的任何一台上面设置 Web 浏览器（作者之一工作的第一个类 Unix 系统是运行在 286 上的\
  \ Coherent 系统）。\n\n“胖客户端”（或“肥客户端”）是指大部分处理在客户端计算机上完成的客户端，因此需要性能更强的客户端计算机。例如，微软建议在至少配备奔腾\
  \ III CPU 和 128 MB RAM 的 PC 上运行 Microsoft Office。\n\n组织内部存在尽可能使用瘦客户端软件的趋势，原因有很多，例如瘦客户端通常仍能在较旧的计算机上运行（386\
  \ 于 1985 年发布，而奔腾 III 于 1999 年发布；如果所有软件都需要在奔腾 III 上运行胖客户端，那么有 14 年间的计算机都将过时），此外，如果系统管理员只需管理运行应用程序的一两台服务器，而所有客户端机器只运行瘦客户端软件，他们的工作也会更轻松。\n\
  \n5165CH05.qxd 11/16/05 12:13 PM 第 150 页\n\n**150**\n\n第 5 章 ■ DVD 数据库类\n\n■**注意**\
  \ 在决定为你的提交构建瘦客户端还是胖客户端之前，请仔细阅读从 Sun 网站下载的说明，以确定是否有必须遵守的要求。关于此主题，JavaRanch (http://www.javaranch.com)\
  \ 上已有许多讨论（其中一个由一位作者发起的讨论，收到了 133 条观点），欢迎你加入那里的讨论。\n\n但考虑一下采用逻辑记录锁定的相同场景：\n\n• 客户端\
  \ A 逻辑锁定电影《*上班一条虫*》的 DVD 记录。\n• 客户端 B 尝试逻辑锁定电影《*上班一条虫*》的 DVD 记录；但在客户端 A 释放逻辑锁之前无法锁定。客户端\
  \ B 现在必须等待客户端 A 完成。\n• 客户端 A 检索电影《*上班一条虫*》的 DVD 记录。\n• 客户端 A 确认该 DVD 仍有一份库存。\n•\
  \ 客户端 A 租借了该 DVD。\n• 客户端 A 释放电影《*上班一条虫*》DVD 记录的逻辑锁。\n• 客户端 B 逻辑锁定电影《*上班一条虫*》的 DVD\
  \ 记录。\n• 客户端 B 检索电影《*上班一条虫*》的 DVD 记录。\n• 客户端 B 发现该 DVD 已无库存。\n• 客户端 B 释放电影《*上班一条虫*》的逻辑锁，并（希望如此）去寻找其他可租借的\
  \ DVD。\n\n逻辑记录锁定的主要优势之一是允许更高的并发性。它还能在网络中工作，因此我们可以利用胖客户端的处理能力。\n\n**讨论点：识别锁的所有者**\
  \ 仅仅拥有逻辑预留记录和释放预留的方法通常是不够的。你通常需要某种方式来识别哪个客户端预留了该记录，以便只有该客户端才能释放它。\n\n一个现实生活中的例子可能有助于解释为什么需要这样做。想象一下，你打电话给剧院，为一场演出预留了最后一个座位。但随后另一个人出现在剧院，声称他们预留了那个座位。如果剧院没有某种方式来识别是谁预留了座位，你可能会失去你的座位。\n\
  \n同样，如果我们不识别锁的所有者，一个不道德的程序员可能会编写这样的程序：如果在特定时间内未获得锁，他们就会直接解锁该记录。\n\n5165CH05.qxd\
  \ 11/16/05 12:13 PM 第 151 页\n\n第 5 章 ■ DVD 数据库类\n\n**151**\n\n如何识别锁的所有者取决于你的说明要求，也可能取决于你如何开发网络服务器。我们将在以下章节中提供一些建议，但你需要自行确定哪种方法适用于你的具体说明。\n\
  \n使用令牌识别锁的所有者\n\n如果我们能从锁定方法向请求逻辑锁的客户端返回一个令牌，那么我们可以要求客户端在执行其他操作（包括释放逻辑锁）时必须使用该令牌。\n\
  \n\n\n令牌本身（也称为“cookie”或“魔法 cookie”）是我们的类用于识别逻辑锁持有者的东西。因此，它不必是一个有意义的对象，因为客户端除了存储该令牌以供调用其他方法时使用外，无需对其进行任何操作。事实上，这个令牌最好是随机的，因为如果令牌具有某种含义，那么不道德的程序员可能会猜出它并仍然解锁我们的记录。\n\
  \n然而，我们的接口要求锁定方法返回一个布尔值，而 releaseDVD 方法也不允许我们插入令牌，因此这对我们来说不幸地不是一个可行的选择。\n\n使用线程来识别锁持有者\n\
  \n如果我们选择使用套接字作为网络接口，我们将完全控制每个客户端使用的线程。当客户端连接到服务器时，我们将创建一个新线程，因此我们可以使用线程标识符作为客户端标识符的代理。\n\
  \n这样做时，我们只需在逻辑锁定记录时，将线程标识符与记录标识符一起存储。然后，每当客户端尝试执行任何需要锁的操作时，我们可以将当前线程标识符与存储的值进行比较；如果它们匹配，则允许该操作。\n\
  \n这省去了客户端担心存储和重用令牌的麻烦，但它仅适用于我们的独立客户端和基于套接字的网络解决方案。如果我们的网络解决方案使用远程方法调用（RMI），这将不起作用。\n\
  \n使用类实例来识别锁持有者\n\nRMI 规范指出，对于任何给定的远程方法，无法保证使用哪些线程。这意味着根据规范，可能出现以下场景：\n\n• 客户端 A\
  \ 使用线程 1 逻辑锁定一条记录。\n\n• 客户端 B 使用线程 1 尝试逻辑锁定同一条记录；它等待逻辑锁被释放。\n\n• 客户端 A 使用线程 2 逻辑释放该记录。\n\
  \n• 客户端 B 使用线程 1 逻辑释放该记录。\n\n更复杂的场景也是可能的。清单 5-1 展示了此问题的一个示例。\n\n5165CH05.qxd 11/16/05\
  \ 12:13 PM 第 152 页\n\n**152**\n\n第 5 章 ■ DVD 数据库类\n\n**清单 5-1.** *RMI 中线程重用的示例*\
