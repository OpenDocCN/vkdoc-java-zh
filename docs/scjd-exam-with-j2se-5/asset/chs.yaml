  \ {\n28     int value;\n29 }\n30 }\n\nnotify 与 notifyAll 方法\n\n每个 Java 对象都有能力广播一个调用，通知那些在该对象上调用了\
  \ `wait` 方法的线程，它们可能感兴趣的某个事件已经发生。如果调用 `notify` 方法，则会告知在该对象上等待的其中一个线程退出等待状态并阻塞，直到它能够重新获得该对象的锁，之后它才能继续处理。如果调用\
  \ `notifyAll`，则会告知在该对象上等待的每一个线程退出等待状态并阻塞，直到它能够重新获得该对象的锁，之后它才能继续处理。\n\n■**警告** 在讨论线程等待时很容易混淆。`Thread.State.WAITING`\
  \ 在 Java 中具有特定含义，即线程已调用了 `wait` 或 `join` 方法。当线程通过调用 `wait` 方法进入 `Thread.State.WAITING`\
  \ 状态时，它不会消耗任何 CPU 周期，直到其他线程在调用 `wait` 的同一个对象上调用 `notify` 或 `notifyAll`，或者直到该线程被中断。当线程通过调用\
  \ `join` 方法进入 `Thread.State.WAITING` 状态时，它不会消耗任何 CPU 周期，直到它试图加入的线程终止，或者直到该线程被中断。相比之下，如果多个线程同时尝试获取同一个锁，其中一个会获得该锁，其余线程将进入\
  \ `Thread.State.Blocked` 状态，直到锁被释放，此时另一个线程将获得该锁——JVM 调度器会自动从处于 `Thread.State.Blocked`\
  \ 状态的线程中选择另一个线程。\n\n清单 4-5 演示了调用 `notify` 和 `notifyAll` 之间的区别。\n\n**清单 4-5.** *NotifyVersusNotifyAll.java*\n\
