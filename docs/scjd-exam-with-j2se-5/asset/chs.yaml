  \n**答** Denny's DVDs 系统的完整版本可供下载。每章将描述项目从本章开发的所需 DBClient 接口到应用程序其余部分的演进过程。阅读本书时，请参考代码库的相关部分，以理解完整的实现。第\
  \ 9 章详细解释了如何以类似于你实际 Sun 提交需要执行的方式编译和执行整个 Denny's DVDs 系统。\n\n另一种方法是先研究示例项目的源代码，然后阅读本书，以解释所做的设计选择，以及这些选择如何与你在开发实际\
  \ Sun 认证项目时遇到的类似决策相关联。我们建议先阅读本书，然后再参考代码，但先阅读代码再参考本书的替代方法也应该能产生成功的结果。这实际上取决于哪种方法更适合你和你的自然学习方法。\n\
  \n**问** 我可以添加本书未讨论的功能吗？\n\n**答** 当然，你可以自由修改项目并使其更复杂。事实上，好奇心和实验精神是软件工程师非常重要的品质。然而，该项目的设计是经过深思熟虑的，有两个目标。第一个也是最重要的目标是涵盖\
  \ SCJD 考试所需的所有概念。因此，如果你决定即兴发挥，请记住示例项目的目的。第二个目标是介绍 J2SE 5 的新特性，例如自动装箱和泛型。\n\n5165CH03.qxd\
