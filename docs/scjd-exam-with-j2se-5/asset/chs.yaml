  \ ois.close();\n    socket.close();\n}\n}\n\n**套接字服务器**\n\n在本节中，我们将讨论各种类型的套接字服务器以及构建它们时常用的技术。我们还将介绍应用协议的概念，以及如何在\
  \ Denny's DVDs 套接字服务器中实现该协议。\n\n**多播与单播服务器**\n\n单播服务器涉及客户端与服务器之间的一对一通信。Denny's DVDs\
  \ 中开发的套接字是单播的。然而，除了单播套接字之外，还有多播套接字。\n\n多播套接字是机器组之间的连接。当数据从一台主机发送到多个客户端时，会使用多播（或广播）。在编写向多个客户端广播消息的应用程序时，会使用\
  \ `java.net.MulticastSocket` 类。我们不会进一步讨论多播套接字，但你至少应该熟悉这个概念。图 7-2 突出了多播套接字与单播套接字之间的区别。\n\
  \n**多任务处理**\n\n迭代式（或单线程）服务器是一种按顺序处理客户端请求的服务器。当一个请求到来时，服务器进行响应，并在请求完成后再次开始监听。在服务器处理先前请求期间到来的客户端请求会被放入队列，并在先前请求完成后得到处理。此外，只要一个客户端保持与单线程服务器的端口连接，其他客户端就无法连接——如果连接保持时间过长，一些等待的客户端可能会超时。（请参考前面的\
  \ `SO_TIMEOUT` 设置。）图 7-2 展示了迭代式（或顺序）套接字服务器的生命周期。\n\n**图 7-2.** *迭代式套接字服务器生命周期*\n\
  \n能够进行多任务处理的套接字服务器可以同时处理多个客户端请求。这是通过多线程套接字服务器实现的。如果你预计会有大量请求，或者请求需要很长时间才能处理完毕，那么多任务处理对于套接字服务器来说是一个非常实用的特性。Denny's\
  \ DVDs 的套接字版本就是一个多线程套接字服务器。\n\n每个客户端都由其自己的线程提供服务，这使得套接字解决方案的运行方式与我们的 RMI 工厂解决方案非常相似。因此，我们可以确保每个客户端都有自己的\
  \ `DvdDatabase` 对象。（请参见我们在第 6 章中对 RMI 工厂的讨论。）下一节将描述我们的多任务套接字解决方案的细节。\n\n**ServerSocket\
  \ 类**\n\n`java.net.ServerSocket` 类允许你创建在指定端口上监听传入连接的服务器。`ServerSocket` 可以发送和接收数据，并对这些数据进行处理。图\
  \ 7-3 展示了多线程服务器的生命周期。`ServerSocket` 的公共构造函数允许你指定端口、队列长度和绑定地址。服务器负责实现协议，即客户端和服务器为了进行通信而必须遵守的规则。\n\
  \n如果你在尝试实例化 `ServerSocket` 时，试图打开的端口已被占用，则会抛出 `IOException`。如果套接字创建成功，服务器会使用 `accept`\
  \ 方法在该端口上监听传入的连接。\n\n`ServerSocket.accept` 方法返回连接到客户端的客户端套接字。\n\n**图 7-3.** *多线程套接字服务器的生命周期*\n\
  \n■**注意** 更准确地说，如果你在尝试实例化 `ServerSocket` 连接时，试图打开的端口已被占用，则会抛出 `BindException`。然而，`ServerSocket`\
  \ 的构造函数仅指定会抛出 `BindException` 的超类（`IOException`），因为在构造过程中也可能抛出其他异常。\n\n接下来，服务器在套接字上打开读取器和写入器，并通过向套接字写入和读取数据来与客户端通信。`ServerSocket.accept`\
  \ 方法会阻塞端口，直到有客户端连接，然后返回一个 `Socket` 对象。随后，该套接字连接被用于执行客户端请求，并且可以为该客户端关闭连接。\n\n`SocketServer`\
  \ 拥有许多与 `Socket` 类相同的套接字选项。它们共享的一个重要选项是 `SO_TIMEOUT` 选项。对于 `ServerSocket` 类，`SO_TIMEOUT`\
  \ 选项指定了服务器在使用 `accept` 方法等待传入套接字连接时应等待的时间。\n\n当 `accept` 方法超时时，会抛出 `java.net.SocketTimeoutException`。让我们在清单\
  \ 7-2 中查看一个示例套接字实现，这是 Denny's DVDs 网络版本的一部分。图 7-4 展示了我们必须如何实现套接字解决方案的高级视图。\n\n**图\
  \ 7-4.** *套接字类*\n\n**清单 7-2.** *DVDSocketServer.java*\n\n```java\npackage sampleproject.sockets;\n\
  \nimport java.io.*;\nimport java.net.*;\nimport java.util.*;\nimport java.util.logging.*;\n\
  import sampleproject.db.*;\n```\n\n/**\n* DVDSocketServer 是处理套接字客户端请求并将请求传递给数据库的类。\n\
