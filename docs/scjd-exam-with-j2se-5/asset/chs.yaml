  \ 54 行的端口号从 8080 改为其他数字，例如 9090。\n\nmylock 对象永远不会被释放，因为 LockOwner 线程永远不会结束。由于 mylock\
  \ 对象从未被释放，等待 mylock 的线程（在本例中是 BlockingExample 线程）将被阻塞，永远没有机会执行。\n\n然而，如果主线程不依赖于被锁定的资源，它将继续执行。再次强调，这是因为阻塞线程不会消耗\
  \ CPU 周期。\n\n■**警告** 当谈到应用程序或线程暂停直到获得某些 I/O 时，许多出版物使用标准术语，称该线程或应用程序因 I/O 而阻塞。根据他们的术语，LockOwner\
  \ 线程将被阻塞，直到有客户端连接到套接字。然而，如前面的示例所示，等待 I/O 的线程的 JVM 状态可能是 Thread.State.RUNNABLE，也可能是其他状态，具体取决于\
  \ I/O 类代码的实现方式。在调试代码或查阅其他出版物时，你需要意识到 Java 没有为因 I/O 而暂停的线程设置单独的状态。\n\nInterruptedException\n\
  \nInterruptedException 通常发生在线程暂停（休眠、等待或尝试加入多个线程）时间过长，而另一个线程故意调用该线程的 interrupt 方法将其从中断状态唤醒时。可以将\
  \ InterruptedException 想象成一个线程猛烈摇晃另一个线程使其恢复意识。当线程以这种方式被摇醒时，它做的第一件事就是执行其 catch (InterruptedException)\
  \ 子句中的任何代码（如果存在的话）。\n\n例如，假设你编写了一个 Data 类，其中有一个 lockRecord 方法，该方法必须等待记录可用后才能锁定它，但它没有超时机制。在\
  \ Data 类获得批准后，要求你创建一个 Data 类的子类，该子类在锁定时处理超时。你可以从头重写整个锁定代码，或者创建一个单独的线程，如果在超时期限内未获取锁，则中断正在锁定记录的线程。\n\
  \n■**注意** 线程随时可能被中断，即使它没有调用 sleep、wait 或 join。在这种情况下，线程将继续正常执行，直到它调用 sleep、wait\
  \ 或 join，此时会立即从被调用的方法中抛出 InterruptedException。\n\n5165CH04.qxd 11/16/05 12:11 PM\
  \ Page 111\n\n第 4 章 ■ 线程\n\n**111**\n\n**同步**\n\n在讨论同步时，有两个自然的划分：对象同步和客户端同步。本节将解释两者之间的区别。\n\
  \n内部同步类\n\nVector 是一个同步对象，而 ArrayList 则不是。这意味着什么？这意味着所有可以访问 Vector 内部数据的方法都是同步的。一个线程对\
  \ Vector 对象所做的任何更改都保证能立即被其他线程看到，而对 ArrayList 所做的更改则没有这种保证。这并不意味着你在代码中以线程安全的方式使用\
  \ Vector 对象。如果你想要这种保证，你必须直接对 Vector 对象进行同步，就像你必须直接对 ArrayList 进行同步一样。\n\n■**注意**\
  \ Vector 是线程安全集合的一个例子；然而，很少需要 Vector 提供的线程安全性（有关保证的线程安全性的信息，请参阅下一段）。如果你确实需要这种线程安全性，最好使用\
  \ Collections.synchronizedCollection 或类似方法，根据你首选的基础集合的特性来创建线程安全的集合。\n\n一个同步对象只保证这一点：在该对象上调用的方法将原子性地执行。例如，假设你正在运行两个线程，并且\
  \ myVector 和 myArrayList 是类成员变量。Thread1 已开始运行第 1 行，而 Thread2 尚未开始运行第 A 行。\n\n*Thread1:*\n\
  \n1 myVector.add(\"Hello\");\n\n2 myArrayList.add(\"Hello\");\n\n*Thread2:*\n\n\
  A myVector.add(\"Cruel\");\n\nB myArrayList.add(\"Cruel\");\n\n现在，假设在第 1 行执行过程中，Thread1\
  \ 被切出。Thread2 将无法切入，因为 Vector 是同步的。因此，可以保证对于 myVector，Thread2 的第 A 行会在 \"Hello\"\
  \ 之后添加 \"Cruel\"。\n\n对于 myArrayList，这种保证不存在。也就是说，如果 Thread1 在第 2 行执行过程中被切出，而 Thread2\
  \ 切入，则向 ArrayList 添加项目的顺序是不确定的。\n\n更糟糕的是，如果其中一个添加操作导致内部数组调整大小，则可能发生各种奇怪的事情。我们可能会看到\
  \ NullPointerException 或 ArrayIndexOutOfBoundsException，或者其中一个添加操作可能会“丢失”。多线程的未同步访问可能会产生各种不可预测的麻烦。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM Page 112\n\n**112**\n\n第 4 章 ■ 线程\n\n■**注意** 我们指定线程在第\
  \ 1 行或第 2 行的*中间*被切出的原因是，Vector 和 ArrayList 的 add 方法在执行将请求的对象实际添加到底层存储之前，会执行多个操作。\n\
  \n\n\n向量并不优于 ArrayList，ArrayList 也不优于向量。有些情况下你不需要集合上的同步开销，而有些情况下你则绝对需要它。例如，一个局部方法变量完全可以作为\
  \ ArrayList 使用，因为它只存在于该特定方法的上下文中；因此，其他线程没有机会修改它。\n\n然而，在可能的情况下，我们建议不要使用 Vector 类。初级程序员可能会错误地认为使用\
  \ Vector 能提供同步类实际并未保证的线程安全性。此外，还存在风险：后续程序员可能会将 Vector 改为其他类，却没有意识到需要同步类。\n\n同步对象有其用途，非同步对象亦然。获得\
  \ Java 开发者认证的部分意义就在于了解这些用途。\n\n**客户端同步**\n\n客户端同步是确保在执行方法过程中没有其他线程中断的过程。例如，虽然`myVector.add(Object)`是一个同步操作，但\
  \ Vector 对象的内部同步并不能保证在方法下一步执行之前，其他线程不会清空 myVector。请考虑以下示例：\n\n1 public boolean addDVD(DVD\
  \ dvd ){\n\n2 for (int i = 0; i < myVector.length(); i++) {\n\n3 doSomethingWith(myVector.get(i));\n\
  \n4 }\n\n5 }\n\n虽然可以保证第 2 行在执行过程中不会被中途劫持，但无法保证在到达第 3 行时，其他线程不会清空 myVector 对象。\n\n\
  当前线程可能会在第 2 行和第 3 行之间被切出，而接管的线程恰好可能破坏 myVector。这种可能性虽然很小，但确实存在造成破坏的风险。\n\n即使你决定接受这些风险，也要意识到它们的存在：其他线程总是可以在两个非同步代码行之间切入，即使它们是对同步方法的调用。\n\
  \n为了保证独占性，你可以通过两种方式修改该方法。第一种方式是同步该方法：\n\n1 public synchronized boolean addDVD(DVD\
  \ dvd ) {\n\n2 for (int i = 0; i < myVector.length(); i++) {\n\n3 doSomethingWith(myVector.get(i));\n\
  \n4 }\n\n5 }\n\n5165CH04.qxd 11/16/05 12:11 PM 第 113 页\n\n第 4 章 ■ 线程\n\n**113**\n\
  \n这会阻止任何其他线程在`addDVD`返回之前调用该特定对象上的任何同步方法。根据类的结构，这可能就足够了。\n\n第二种方式是在`myVector`成员变量上进行同步：\n\
  \n1 public boolean addDVD(DVD dvd ) {\n\n2 synchronized (myVector) {\n\n3 for (int\
  \ i = 0; i < myVector.length(); i++) {\n\n4 doSomethingWith(myVector.get(i));\n\n\
  5 }\n\n6 }\n\n7 }\n\n这可以防止任何其他方法在第 3、4、5、6 行执行期间修改`myVector`对象。即使你的线程在这些行期间被切出，这一保护依然有效。\n\
  \n与所有独占性机制一样，这仅适用于遵循同步规则的方法。如果这些方法没有在内部对`myVector`对象进行同步，那么它们就不会遵守该协议。因此，线程安全性的保证将不再成立。\n\
  \n顺便提一下，这是通过封装控制对类成员变量访问的一个很好的理由。如果所有成员变量都是私有的，那么你可以通过同步所有相关方法来控制对敏感数据的访问。这正是 Vector\
  \ 对象所做的。像 Vector 这样的同步对象并非同步其内部数据状态，而是同步用于访问这些数据的方法。Sun 公司推荐并鼓励封装。例如，这在 JavaBeans\
  \ 中体现得尤为明显。\n\n**Swing 的多线程**\n\nSwing 组件在很大程度上不是线程安全的。Swing 使用单个线程来处理来自底层操作系统的\
  \ UI 事件。也就是说，通常 Swing 组件不需要是线程安全的，因为它们通常只从一个线程访问。这意味着处理一个事件（例如按钮点击）会导致其他事件被忽略，直到第一个事件处理完毕。如果与事件关联的事件处理程序耗时较长，你的\
  \ UI 可能会变得非常不响应。\n\n这里的关键点是，如果你为某个事件执行一个大型操作，你的 Swing 客户端可能会变慢。这在 SCJD 考试中可能没问题，但你需要意识到这一点并记录下来。如果你的需求表明\
  \ UI 响应性非常重要，那么你需要考虑生成线程来处理更密集的操作，这时你就必须担心所有线程安全问题，并进行适当的同步。\n\n**Swing 线程的一般原则**\n\
  \n一旦 Swing 组件调用了`setVisible(true)`或`pack()`，所有更新都应通过事件分发线程完成。这有助于避免因 RepaintManager\
  \ 的各种请求而可能发生的竞态条件。\n\n通常，只有在基于事件分发线程以外的线程更新组件时，你才需要关注 Swing 应用程序中的线程问题——具体来说，是在你需要一个响应式\
  \ GUI，而它无法等待跨网络的 RMI 和/或套接字调用的情况下。\n\n在开始这条路之前，你应该确保自己确实无法等待这些调用：这是一个漫长且容易出错的方法，而且就\
  \ SCJD 考试而言，它可能会不必要地使你的生活复杂化。\n\n5165CH04.qxd 11/16/05 12:11 PM 第 114 页\n\n**114**\n\
  \n第 4 章 ■ 线程\n\n如果你决定走这条路，请通过一个单独的线程（或工作线程）执行较长的调用，然后使用事件分发器将结果反馈回 GUI。关于此技术的优秀示例，请访问\
  \ http://java.sun.com/products/jfc/tsc/articles/threads/threads2.html。\n\n■**注意**\
  \ 你不得在作业中直接使用`SwingWorker`类。作业规定你只能提交自己编写的代码，因此提交`SwingWorker`类可能导致取消资格。不过，你可以使用`SwingWorker`类来学习所需的技术，然后创建你自己的类。\n\
  \n请记住，在组件上调用各种 setter 方法并不是将事件安全地放入事件分发队列的线程安全方式。这个过程确实会生成事件，但事件分发线程并不总是处理这些事件。\n\
  \n**在事件分发线程中更新组件**\n\n那么，如何将事件放入事件分发线程呢？你可以使用`SwingUtilities.invokeAndWait`和`SwingUtilities.invokeLater`方法。第一个方法`invokeAndWait`会阻塞，直到事件触发。`invokeLater`不会阻塞；它只是将你的代码添加到待触发的事件队列中。这两个方法的参数都是一个`Runnable`接口。然后，事件分发器会调用参数的`run`方法。\n\
  \n**线程最佳实践**\n\n以下是一些通用实践，应该能帮助你避免线程的阴暗面：\n\n*   **不要嵌套锁。** 如果在执行路径中有两个不同对象上的同步块，你可能正走在错误的道路上。\n\
  *   **如果可能，避免在 Swing 中使用多线程。** 例如，可以认为，为 Swing 前端的分布式调用进行多线程活动，只提供了虚幻的响应性。也就是说，仅仅因为\
  \ GUI 看起来响应迅速，并不意味着它实际上做到了。你真的希望你的客户端认为一个操作已经完成，而实际上它并没有完成吗？这种虚幻在你的应用程序中真的有实际用途吗？\n\
  \n\n\n• 对于提供长时间服务的线程，最好偶尔让出执行权。例如，如果你的线程正在启动一个耗时过程，但用户想要取消，那么取消事件可能在线程停止执行之前都无法被读取。通过偶尔让出执行权，你为其他线程提供了在你线程执行状态合适的时机切入的机会。最好在让出执行权之前释放所有锁。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 115 页\n\n第 4 章 ■ 线程\n\n**115**\n\n• 不需要同步那些不使用类中状态信息的方法。如果你的方法不使用内部成员变量、不修改外部对象、也不修改作为参数传入的对象，就不要同步它。\n\
  \n• 不要过度同步。确保你确切知道你的方法或数据结构为何被同步。如果你无法让自己满意地阐明同步的必要性，你可能应该重新审视最初的需求。\n\n• 不可变对象，例如`String`和`Integer`，永远不需要同步。这甚至适用于成员变量，因为不可变对象不能被修改。然而，如果一个引用不可变对象的成员变量本身是可变的，那么它可能仍然需要同步。\n\
  \n• 不要不必要地使用多线程。除非你的线程做了大量阻塞操作，否则单线程通常更快。\n\n• 在使用 Swing 时，可以随意创建组件并将其插入到任何尚未实现的容器中。要实现一个组件，它必须能够接收绘制或验证事件——这意味着在组件上调用`show`、`setVisible(true)`或`pack`之前。\n\
  \n• 不要被像`Vector`这样内部同步的类搞糊涂。内部同步的类所承诺的只是原子性地执行其操作。这意味着，如果一个线程代码执行`myVector.add(\"\
  test\")`，而另一个线程切入，如果该新线程执行`myVector.contains(\"test\")`，它将返回`true`。例如，对于`ArrayList`，这种行为是无法保证的。你通常需要使用同步方法来与这些变量交互。\n\
  \n• 尽量最小化在同步块内执行的操作，因为在同步期间，没有其他线程能够获取你的代码所同步的锁，从而降低了并发性。\n\n• 避免依赖线程优先级作为线程控制机制。不同的操作系统使用不同的算法来处理线程优先级，而不同的\
  \ JVM 也使用不同的算法。这可能导致你的程序在不同平台上的行为大相径庭。你最好的选择是避免线程优先级的歧义性，尤其是在 SCJD 考试中。\n\n• 不要同步你的线程的`run`方法。同步线程的`run`方法可能导致许多复杂问题，这是一个坏主意。\n\
  \n• 如果你在同步代码块中检查条件，请使用`while`循环而不是`if`语句。如果你的线程在执行`if`语句的中间切出，那么当它切回时，线程将精确地从它离开的地方继续执行。与直觉相反，这不是一件好事，因为当你的线程切出时为真的条件可能不再为真，因为另一个线程可能已经改变了它。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 116 页\n\n**116**\n\n第 4 章 ■ 线程\n\n• 另一方面，`while`循环在线程退出代码块之前会重新检查条件。因此，相关的状态变化将被检测到。以下代码片段展示了这种技术的一个示例：\n\
  \nsynchronized (lockedRecords) {\n\nwhile (lockedRecords.contains(upc)) {\n\nlockedRecords.wait();\n\
  \n}\n\n//执行操作\n\nlockedRecords.notifyAll();\n\n}\n\n• 使用`notifyAll`而不是`notify`。`notify`只唤醒一个等待的线程，而`notifyAll`唤醒所有等待的线程。\n\
  \n**总结**\n\n在本章中，我们讨论了在使用线程时可用的一些可能性，并指出了一些需要避免的问题点。我们讨论了安全线程问题、线程与 Swing、阻塞、等待以及其他一系列主题。\n\
  \n理解线程的最佳方式是设计你的线程方案，预测它将如何运行，然后使用`Thread`类中的便捷方法`holdsLock(Object)`来测试这些预测。`Thread`的`getState()`和`getStackTrace()`方法对于检查另一个线程正在做什么非常有用。如果你的线程行为不符合预期，请明确记录你的假设（我们建议写下来），然后逐一检查它们。线程很像语法：有很多规则，但最终你会培养出一种直觉，知道什么可行，什么不可行。（至少我是这么听说的。）在阅读后续章节时，如有需要，请随时回顾本章。\n\
  \n**常见问题解答**\n\n**问** 当一个同步块/方法调用一个非同步块/方法时会发生什么？\n\n**答** 非同步块/方法会被当作同步的来处理。\n\n\
  **问** 当一个同步块/方法在同一个对象内调用另一个同步块/方法时会发生什么？\n\n**答** 如果两个方法都在同一个对象上同步，那么对你来说不会发生什么异常情况——没有双重同步或死锁风险。线程会在该对象上获取一个额外的锁，当锁被释放时，这个额外的锁也会随之消失。\n\
  \n**问** 锁定一个对象会锁定其所有内部变量吗？\n\n**答** 不，绝对不会。这样做会给 JVM 带来巨大的负担，因为它会锁定所有内部对象，然后依次锁定成员变量的内部对象，依此类推。Java\
  \ 假设你理解这一点，并且你只锁定你打算锁定的内容。\n\n5165CH04.qxd 11/16/05 12:11 PM 第 117 页\n\n第 4 章 ■\
  \ 线程\n\n**117**\n\n**问** 同步方法比非同步方法慢多少？\n\n**答** 很难说，但非科学测试似乎表明，根据争用情况，同步方法比非同步方法慢\
  \ 1.5 到 150 倍不等。非争用同步对时间的影响可能可以忽略不计。\n\n**问** 可以同步数据吗？\n\n**答** 不，你只能同步对数据的访问。\n\
  \n**问** `Vector`不就是同步数据吗？\n\n**答** 不，`Vector`提供的是访问其数据的同步方法。这是一个重要的区别。\n\n**问**\
  \ 在静态成员变量和局部变量上同步有什么区别？\n\n**答** 实际上没有区别。你仍然是在获取一个对象上的锁。但是，通过在静态成员变量上同步，该锁可以在共享该静态对象作为类成员变量的多个对象之间共享。\n\
  \n**问** 当人们说一个对象（例如`Vector`）是同步的，这意味着什么？\n\n**答** 这意味着该对象的所有公共方法在访问共享数据时都是同步的。通常，这意味着在该对象上调用一个方法是一个原子操作。任何其他线程在该对象上调用方法都将被阻塞，直到你的线程完成对该对象的操作。\n\
  \n**问** 当一个方法在一个成员变量上同步，而另一个方法在`this`关键字上同步，并且这两个方法必须交互时，会发生什么？\n\n**答** 那么你正在两个不同的对象上获取两个锁——即`this`和该成员变量——并且非常需要小心。否则，你就为死锁打开了大门。你应该仔细考虑是否真的需要这样做，或者是否可以在一个对象上进行同步。\n\
  \n**问** 线程死亡后，我如何重新启动它？\n\n**答** 你不能。你必须创建一个新线程。\n\n**问** 提供的大多数示例都显示主应用程序隐式地等待所有创建的线程完成后再退出。有没有一种方法可以在不等待线程完成的情况下退出程序？\n\
  \n\n\n**答**：是的——你可以显式调用 `System.exit`，或者在你不想等待的线程*启动之前*调用 `Thread.setDaemon(true)`。关于如何设置守护线程的示例，请参见\
  \ `IceCreamMan` 线程的创建过程。\n\n5165CH04.qxd 11/16/05 12:11 PM 第 118 页\n\n5165CH05.qxd\
  \ 11/16/05 12:13 PM 第 119 页\n\n第 5 章\n\n■ ■ ■\n\nDvdDatabase 类\n\n**本**章中，我们将通过开发一个\
  \ `DvdDatabase` 类来开始我们的作业，该类将实现第 3 章中描述的 `DBClient` 接口。由于客户端和服务器都需要这个类，因此从该类开始作业是合乎逻辑的。\n\
  \n在学习本章的过程中，你将用到第 2 章和第 3 章中介绍的几个重要概念：\n\n• 设计模式\n• 泛型\n\n正如本书前面所述，在我们的示例项目中，有几个地方我们觉得*必须*偏离\
  \ Sun 提供的项目。这一点在本章介绍的类中体现得最为明显。我们示例作业中使用的代码要么比你的作业要求详细得多，要么我们会使用一些你在作业中无法使用的捷径。特别是，我们指定可以在接口和类中抛出\
  \ `java.io.IOException`，这极大地简化了我们的开发；我们通过为锁设置超时来增加作业的复杂性；我们还使用 `ReadWriteLock` 来提高并发性。无论如何，本章提供了你为*自己的*需求开发一个良好解决方案所需的所有信息。\n\
  \n我们还讨论了一些你可能希望在作业中考虑的问题，这些问题虽然不是必需的，但可能会让你的提交更显专业。这包括缓存数据、处理死锁、管理客户端崩溃，以及使用多个通知对象来减少线程在尝试获取逻辑记录锁时的\
  \ CPU 使用率。\n\n**创建 DvdDatabase 类所需的类**\n\n`DvdDatabase` 类使用其他几个类作为输入、输出或异常。在构建 `Data`\
  \ 类本身之前，我们需要先构建这些类。\n\n**DVD 类：一个值对象**\n\n`DvdDatabase` 类使用一个名为 `DVD` 的类来包含与可预订\
  \ DVD 对应的数据。这种类型的对象被称为值对象。值对象设计模式也被称为传输对象模式。*值对象*这个名称代表了它所属的对象类型；它包含与特定对象相关的所有值（在我们的例子中，是我们希望跟踪的与\
  \ DVD 相关的所有值）。*传输对象*则是根据该设计模式最常见的用途之一命名的：创建一个单一的类，用于在两个独立的系统之间（通常是在客户端和服务器之间）传输数据。\n\
  \n使用这种对象的原因相当简单——它可以使你的代码更易于阅读，并提高整个系统的性能。你的代码将引用单个对象中的字段，这会使代码中这些字段都是相关的这一点更加清晰。而且，由于你可以通过一次调用另一个方法来发送和检索整个值对象，因此你的代码性能将比分别检索每个字段好得多。这在通过网络检索值对象时尤其有用，因为只需要一次网络调用，而如果分别检索每个字段，则需要多次网络调用。\n\
