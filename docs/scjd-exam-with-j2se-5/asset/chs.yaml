  \n**常见问题解答**\n\n**问** 我在哪里可以获取运行示例项目所需的数据库文件？\n\n**答** 它包含在你可以从 Apress 网站 (http://www.apress.com)\
  \ 下载的 zip 文件中。\n\n**问** 我必须将我的应用程序打包成 JAR 文件吗？\n\n**答** 这个问题的答案取决于你考试的具体要求。然而，根据我们的经验，大多数考试都要求考生使用\
  \ JAR 文件进行提交。建议将多个独立的 JAR 文件包含在一个主 JAR 文件中进行提交。\n\n**问** 我的考试提交需要包含哪些内容？\n\n**答**\
  \ 基本要素通常如下：\n\n• 源文件\n\n• 一个可执行的 JAR 文件\n\n• 数据库文件\n\n• 一份解释关键设计决策的设计文档\n\n• 一份说明你所使用的开发环境的文件\n\
  \n• Javadoc 文档\n\n• 用户文档\n\n但是，你**必须**仔细阅读 Sun 公司提供的说明，以确保满足提交要求。如果我们的描述与 Sun 公司的说明之间存在差异，你必须遵循\
  \ Sun 公司的说明。\n\n**问** 我应该在我的提交物上测试哪个平台？\n\n**答** 由于 Java 是平台无关的，你的提交物应该能在 Unix 或\
  \ Windows 上运行。我们强烈建议你在 Windows、Unix、Linux 和 Mac OS X（即 Macintosh）上测试你的考试项目，因为可能存在细微的平台差异，导致你的提交物出现问题。为了保持一致性和简单性，本书中的示例均在\
  \ Windows 2000 上演示。尽管无法保证你的应用程序提交后会在哪个平台上进行测试，但请确保在你的 ReadMe 文件中记录你工作的平台。\n\n**问**\
  \ 通过考试后我应该做什么？\n\n**答** 庆祝一下。然后发送电子邮件至 scjd@apress.com 联系我们。\n\n**问** 如果我对本书有意见或问题，应该联系谁？\n\
