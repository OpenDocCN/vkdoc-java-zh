  \n**理解原子操作**\n\n\n\n原子操作是不可分割的。线程在执行原子操作的过程中不会被切换出去。在实际应用中，Java 中唯一自然发生的原子操作是赋值操作。例如，\n\
  \nx = 45;\n\n当 x 是 int 类型时，这是一个原子操作。此规则的唯一例外是涉及 double 和 long 类型的赋值。这些操作不是原子的。\n\
  \n涉及 long 和 double 类型的操作本质上是两个操作，因为 long 和 double 类型的数据非常大。操作的第一部分设置高 32 位，第二部分设置低\
  \ 32 位。这意味着在对 long 或 double 变量进行赋值的过程中，你的线程可能会被中途切出。\n\n你的线程由许多程序语句组成。这些语句又由原子语句组成。你的执行线程可以在任何地方被切换出去，除非\
  \ Java 正在执行一个原子语句。例如：1 x = 7;\n\n2 y = x++;\n\n实际上等同于\n\n1 x = 7;\n\n2a int temp\
  \ = x + 1;\n\n2b x = temp;\n\n2c y = x;\n\n假设 x、y 和 z 是类成员变量。在 2a 行和 2b 行之间发生线程切换可能会导致意外结果，例如，如果切换进来的线程将\
  \ x 的值更改为 13，你最终可能会得到 y 为 13 的怪异结果（并且会感到头疼）。\n\n当然，如果 x、y 和 z 是局部方法变量，则不会存在此问题，因为其他方法无法访问它们。\n\
  \n通过将你的方法包装在 `synchronized` 块中，就其他线程的该对象客户端而言，你实际上是将整个方法视为一个单一的原子操作。即使另一个线程在你的方法执行完毕之前切换进来，只要该线程调用的是你对象上的同步方法，就可以保证不会发生像之前那样的数据破坏，因为这些方法会一直等待，直到你的方法返回才会执行。\n\
