  \ 如图 5-7 所示，客户端 A 和客户端 B 都使用了线程 15655788 和 16112134。\n\n考虑到这一点，如果我们无法使用令牌且已选择使用\
  \ RMI，那么就需要寻找其他方法来唯一标识客户端。\n\n一种处理方式是使用工厂设计模式构建服务器，让工厂为每个连接的客户端创建唯一对象。然后，我们可以利用\
  \ `DvdDatabase` 类的唯一实例来标识客户端。\n\n5165CH05.qxd 11/16/05 12:13 PM 第 154 页\n\n**154**\n\
  \n第 5 章 ■ DVD 数据库类\n\n使用工厂模式既适用于基于套接字的解决方案（尽管通常有些大材小用），也适用于 RMI 解决方案。由于本书将同时介绍这两种方案，我们决定采用工厂模式，并将在第\
  \ 6 章中进行详细描述。\n\n**创建逻辑预留方法**\n\n为了实现逻辑锁定所需的 `reserveDVD` 和 `releaseDVD` 方法，我们需要一些类变量。首先，需要跟踪锁的持有者；一个包含\
  \ UPC 编号和持有者的 `Map` 是理想选择。其次，需要一个公共的 `Lock` 对象，以确保不同线程不会同时尝试锁定记录。最后，需要一个条件变量，供线程监控以确定何时可以再次尝试获取锁。这三个变量如下所示：\n\
  \n```java\nprivate static Map<String, DvdDatabase> reservations\n    = new HashMap<String,\
  \ DvdDatabase>();\nprivate static Lock lock = new ReentrantLock();\nprivate static\
  \ Condition lockReleased = lock.newCondition();\n```\n\n清单 5-2 包含了 `reserveDVD`\
  \ 方法。\n\n**清单 5-2.** *reserveDVD 方法*\n\n```java\nboolean reserveDVD(String upc,\
  \ DvdDatabase renter)\n    throws InterruptedException {\n    log.entering(\"ReservationsManager\"\
  , \"reserveDvd\", new Object[]{upc, renter});\n    lock.lock();\n    try {\n   \
  \     long endTimeMSec = System.currentTimeMillis() + 5000;\n        while (reservations.containsKey(upc))\
  \ {\n            long timeLeftMSec = endTimeMSec - System.currentTimeMillis();\n\
  \            if (!lockReleased.await(timeLeftMSec, TimeUnit.MILLISECONDS)) {\n \
  \               log.fine(renter + \" giving up after 5 seconds: \" + upc);\n   \
  \             return false;\n            }\n        }\n        reservations.put(upc,\
  \ renter);\n        log.fine(renter + \" got Lock for \" + upc);\n        log.fine(\"\
  Locked record count = \" + reservations.size());\n        log.exiting(\"ReservationsManager\"\
  , \"reserveDvd\", true);\n        return true;\n    } finally {\n        // 确保锁始终被释放，即使抛出异常也不例外\n\
  \        lock.unlock();\n    }\n}\n```\n\n5165CH05.qxd 11/16/05 12:13 PM 第 155 页\n\
  \n第 5 章 ■ DVD 数据库类\n\n**155**\n\n我们决定允许预留任何 UPC，即使该记录不存在。这样，当首次将 DVD 添加到系统时，也可以进行预留。另一种做法是让\
  \ `reserveDVD` 方法先验证记录是否存在，若不存在则抛出异常。如果存在任何删除方法，我们还需要在获取锁后验证记录是否存在。但若如此，就必须修改 `addDVD`\
  \ 方法的逻辑，可能还需要修改 `updateDVD` 方法（请记住，它们都委托给同一个私有方法 `persistDVD`，该方法也可能需要更新）。\n\n我们的\
  \ `reserveDVD` 方法首先获取互斥锁，然后进入 `while` 循环，等待直到超时或成功获取锁。\n\n`DBClient` 接口规定，如果在 5\
  \ 秒内无法锁定记录，必须返回 `false`。在 JDK 1.4 中，无法可靠判断 `wait(timeout)` 调用是超时还是收到了通知。JDK 5 提供了新的\
  \ `Condition.await` 方法，如果通过 `unlock` 方法收到通知可以继续处理，则返回布尔值 `true`；如果超时，则返回 `false`。\n\
  \n如果成功获取锁，我们会在锁持有者映射表中添加一条记录，表明我们拥有该锁。\n\n最后，释放互斥锁。\n\n**逻辑释放方法**\n\n\n\n`releaseDVD`\
  \ 方法是前面展示的 `reserveDVD` 方法的对应操作，其代码非常相似。\n\n```java\nvoid releaseDvd(String upc,\
  \ DvdDatabase renter) {\n\nlog.entering(\"ReservationsManager\", \"releaseDvd\"\
  , new Object[]{upc, renter});\n\nlock.lock();\n\nif (reservations.get(upc) == renter)\
  \ {\n\nreservations.remove(upc);\n\nlog.fine(renter + \" released lock for \" +\
  \ upc); lockReleased.signal();\n\n} else {\n\nlog.warning(renter + \" cant release\
  \ lock for \" + upc + \": not owner\");\n\n}\n\nlock.unlock();\n\nlog.exiting(\"\
  ReservationsManager\", \"releaseDvd\");\n\n}\n```\n\n首先，我们确保获取了互斥锁 `Lock`；然后，如果释放锁的是该预约的所有者，我们就从映射中移除锁的标记。接着，我们通知所有等待的线程，它们可以尝试获取锁了。如果向此方法传递了错误的租户实例，则会记录一条警告消息。最后，我们释放互斥锁\
  \ `Lock`。\n\n5165CH05.qxd 11/16/05 12:13 PM 第 156 页\n\n**156**\n\n第 5 章 ■ DVD 数据库类\n\
  \n讨论点：死锁处理\n\n当线程被永久阻塞，等待一个永远不会发生的条件时，就会发生死锁。\n\n第 4 章从线程角度讨论了死锁处理，但同样的问题也适用于应用逻辑层面。考虑一下，如果两个客户端都试图以不同的顺序获取同两条记录的逻辑锁，会发生什么情况，如下例所示：\n\
  \n*   客户端 A 获取记录 1 的逻辑锁。\n*   客户端 B 获取记录 2 的逻辑锁。\n*   客户端 A 尝试获取记录 2 的逻辑锁。\n*  \
  \ 客户端 B 尝试获取记录 1 的逻辑锁。\n\n我们的 `reserveDVD` 方法会在 5 秒后超时。但如果客户端 A 和客户端 B 都立即重试获取锁，结果将与没有超时一样：两个线程实际上都会陷入死锁。\n\
  \n有多种解决方案可以防止死锁，其中包括：\n\n*   不允许客户端一次锁定超过一条记录。如果他们不能锁定多条记录，就不会发生逻辑死锁。\n*   只允许客户端按数字顺序锁定记录。根据此规则，在上例中，客户端\
  \ B 将不被允许尝试锁定记录 1，并且必须在某个时刻放弃对记录 2 的锁定，从而允许客户端 A 继续执行。\n*   拥有一个专用机制来跟踪哪些锁已被拥有以及哪些锁存在争用。每次有新的锁进入争用状态时，都会检查此机制以确认是否会发生死锁，如果会，则取消该锁。这是所有可能解决方案中最复杂的一种，但所需的代码大多是递归的，稍加思考即可简单编写。\n\
  *   忽略问题。说真的——这是你作业的要求吗？尝试处理此问题是否可能导致你犯错而失分？你是否觉得这超出了作业的范围？\n\n我们再次建议你仔细阅读从 Sun\
  \ 公司收到的说明，以确定你需要如何处理死锁（如果需要处理的话）。\n\n然而，如果你的说明完全没有提及这一点，你将需要自行决定是否要处理死锁。你可能想问的一些问题包括：处理死锁是否更专业？处理死锁是否会为代码增加不必要的复杂性？你是否能通过允许抛出的异常来处理死锁？\n\
  \n无论你决定如何，这都是一个你可能需要记录的设计决策。\n\n讨论点：处理客户端崩溃\n\n在本章前面部分，我们讨论了使用胖客户端的可能性，即客户端负责获取逻辑记录锁并在之后释放它。但是，如果客户端在请求逻辑记录锁之后、但在释放逻辑记录锁之前崩溃（或只是被关闭）了，会发生什么情况？\n\
  \n5165CH05.qxd 11/16/05 12:13 PM 第 157 页\n\n第 5 章 ■ DVD 数据库类\n\n**157**\n\n在这种情况下，该记录将被永久锁定——没有其他客户端能够再锁定该记录。\n\
  \n同样，有许多可能的解决方案，其中一些包括：\n\n*   使用更瘦的客户端（客户端仅调用服务器上的 `rentDVD` 方法，而服务器同时调用 `reserveDVD`\
  \ 和 `releaseDVD` 方法）将完全绕过此问题。锁永远不会变得完全不可用。我们建议你参考本章前面关于胖/瘦客户端的部分，以了解其影响（并可能加入 JavaRanch\
  \ 上关于此主题的讨论）。\n*   如果我们采用套接字网络解决方案，那么当客户端断开连接时，为客户端服务的服务器线程将收到一个异常。如果该线程跟踪已授予了哪些锁，那么它可以在收到此异常时释放这些锁。\n\
  *   如果我们有一个服务器工厂，使用唯一的 `DvdDatabase` 对象作为客户端标识符，我们可以将预约数据存储在一个 `WeakHashMap` 中，以客户端标识符作为键。当客户端断开连接时，该客户端的\
  \ `DvdDatabase` 将（最终）被垃圾回收，并且该锁将自动从 `WeakHashMap` 中移除。在这种情况下，我们可能需要一个单独的线程来监控 `WeakHashMap`，以便它可以通知任何等待的线程某个预约已被清除。\n\
  *   如果我们有一个服务器工厂，为每个 RMI 客户端提供唯一的工作者，我们可以让工作者实现 `java.rmi.server.Unreferenced`。当\
  \ RMI 客户端断开连接后，此接口中的 `unreferenced` 方法将在某个时刻被调用。如果工作者实例跟踪已授予了哪些锁，那么它可以在 `unreferenced`\
  \ 被调用时释放这些锁。\n*   忽略问题。再次强调，说真的——这是你作业的要求吗？尝试处理此问题是否可能导致你犯错而失分？你是否觉得这超出了作业的范围？\n\
  \n我们再次建议你仔细阅读从 Sun 公司收到的说明，以确定你需要如何处理客户端崩溃（如果需要处理的话）。然而，如果你的说明完全没有提及这一点，你将需要自行决定是否要处理锁可能永远不会被释放的情况。你可能想问的一些问题包括：处理断开的客户端是否更专业？处理断开的客户端是否会为代码增加不必要的复杂性？\n\
  \n无论你决定如何，请记住，这是一个你可能需要记录的设计决策。\n\n讨论点：多个通知对象\n\n考虑一下，如果有 100 个线程都在等待预约不同的记录，会发生什么情况。当一个线程释放其对任何一条记录的锁时，它会调用\
  \ `lockReleased.signal`，并且*所有 100 个线程*都会收到锁已被释放的通知，因此所有 100 个线程都会尝试重新获取锁互斥体，并检查被释放的是否是它们感兴趣的那条记录——而很可能被释放的记录对它们中的任何一个都不感兴趣！因此，每次释放一条记录时，都会出现\
  \ CPU 活动的突然爆发，可能会降低服务器的整体生产力。\n\n5165CH05.qxd 11/16/05 12:13 PM 第 158 页\n\n**158**\n\
  \n第 5 章 ■ DVD 数据库类\n\n更好的解决方案是让每个线程仅在其感兴趣的记录变为可用时才收到通知。\n\n在 JDK 1.4 下，这很难实现；你必须同步不同的对象，才能确保只有特定的线程收到通知。在\
  \ JDK 5 下，你可以让所有线程获取同一个对象的锁，但使用不同的 `Condition` 来决定它们应该在哪个条件下被通知。\n\n\n\nJDK 1.5\
  \ 的可重入锁，其语法与同步块不同，提供了创建**交替锁定**的能力，即先请求一个锁，再请求第二个锁，然后释放第一个锁，依此类推。在下一个锁被授予之前，链中的任何锁都不会被释放。\n\
  \n从概念上讲，`reserveDVD` 方法的替代方案将类似于清单 5-3 中的代码。请注意，行号仅针对此讨论，与原始 `reserveDvd` 方法的行号无关。\n\
  \n**清单 5-3.** *一个 CPU 密集度较低的 reserveDvd 方法*\n1 private static Map<String, LockInformation>\
  \ reservations\n2 = new HashMap<String, LockInformation>();\n3\n4 private static\
