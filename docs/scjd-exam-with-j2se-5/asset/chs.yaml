  \ `DVDDatabase` 中匹配的方法。请参考项目下载以获取完整的 `DBSocketRequest` 类。为简洁起见，清单 7-3 仅展示了 `run`\
  \ 方法。\n\n**清单 7-3.** *DBSocketRequest.java*\n\n/**\n\n* 对于继承 Thread 的类是必需的，这是该线程的主要执行路径。\n\
  \n*/\n\npublic void run() {\n\ntry {\n\nObjectOutputStream out =\n\nnew ObjectOutputStream(client.getOutputStream());\n\
