  \ 等待总结\n\n需要资源的线程会在你没有特别要求的情况下自动暂停。相比之下，因调用`yield`、`wait`或`sleep`而暂停的线程，则是程序员明确要求其暂停的。无论哪种情况，最终都会导致线程暂停执行。\n\
  \n对于因等待资源可用而暂停的线程，以及让出 CPU 给其他线程的线程，程序员无法知道线程何时会恢复处理——对于前者，它会在资源可用时恢复；对于后者，则由 JVM\
  \ 线程调度器决定。如果你调用不带任何参数的`wait`，你将不知道线程何时会恢复处理——这取决于另一个线程通知它可以继续操作。然而，如果你调用带时间限制的`wait`，\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 87 页\n\n第 4 章 ■ 线程\n\n**87**\n\n你就会知道线程会在收到通知时，或在时间限制到期后不久恢复处理。请记住，时间限制无法严格执行；JVM\
  \ 会至少按照你请求的时间暂停线程，并尽力在时间限制到期后调度该线程，但线程恢复的确切时间无法保证。\n\n如果你调用`sleep`，你会知道线程会在时间限制到期后不久恢复处理——同样，时间限制无法严格执行。回到冰淇淋的例子，想象一下小莎莉终于引起了冰淇淋小贩的注意并给了他一些钱，但她还没有真正选择口味。如果莎莉让出\
  \ CPU（yield），那么她会自愿让开，让另一个孩子尝试，但她确信冰淇淋小贩不会卖掉她明确锁定的蛋筒。如果实际上没有孩子感兴趣，那么她会重新加入，并让她的蛋筒装满冰淇淋。\n\
  \n如果莎莉决定休眠（sleep），就好像她为蛋筒付了钱，但将选择延迟最多 1 分钟——比如说，等她弟弟到来。一分钟后，她会再次尝试（无论弟弟是否出现）。当她最终引起冰淇淋小贩的注意时，她会确信她锁定的蛋筒仍然在那里。但仅仅因为莎莉决定一分钟到了，并不意味着她能立即拿到她的蛋筒——在莎莉的一分钟结束时，可能另一个孩子正在装他的蛋筒。每当莎莉无法引起冰淇淋小贩的注意时，她就会被阻塞。在上一个例子中休眠了\
  \ 1 分钟后，她现在发现冰淇淋小贩正在服务另一个孩子。虽然她仍然拥有她蛋筒上的锁，但她并不拥有冰淇淋小贩上的锁，因此被阻塞，直到她能获得那个锁（同时她的弟弟可能在此期间出现）。\n\
  \n然而，如果莎莉必须等她父亲给她送钱，那么她没有锁定任何蛋筒，等到钱送来时，所有的蛋筒可能都卖完了。\n\n**锁**\n\n*锁*是独占使用的令牌。每个 Java\
  \ 对象都有一个。可以把锁想象成在任何对象上贴一张便条，声明该对象归你的线程独占使用。通过声明一个对象的锁，你的线程告诉其他方法（那些尊重同步的方法）在你释放锁之前，不要以任何方式修改该对象。尊重同步的方法是指对相关对象进行同步的方法。\n\
  \n在 Java 中，你可以通过对一个对象进行同步来锁定它。考虑以下示例：\n```java\npublic void addElement(Object item)\
  \ {\n    synchronized (myArrayList) {\n        //执行操作\n    }\n}\n```\n这告诉 JVM，其他线程不应修改`myArrayList`对象。当然，这仅适用于同步方法。例如，在以下示例中，方法`elementExists`可能不需要同步访问，因为它是一个只读操作：\n\
  ```java\npublic boolean elementExists(Object item) {\n    return myArrayList.contains(item);\n\
  }\n```\n\n5165CH04.qxd 11/16/05 12:11 PM 第 88 页\n\n**88**\n\n第 4 章 ■ 线程\n\n然而，如果要求`elementExists`绝对准确（即，当另一个线程正在向\
  \ ArrayList 中插入或删除元素时，你无法承受得到错误答案的后果），那么你也需要在此处同步访问。\n\n本节整合了之前已经介绍的一些概念。锁的概念是理解线程的基础，在此处仔细关注将让你受益匪浅。\n\
  \n锁定对象\n\n在日常生活中，你一直在锁定对象。当你去看电影时，你可能会把外套留在座位上“锁定”你的座位。即使你离开座位去买爆米花，大家也明白不应该有人坐在那个座位上。把外套留在座位上的行为有效地标记了该座位供你独占使用，直到你选择释放它。\n\
  \n任何 Java 对象都可以被声明为独占使用。这是 Java 支持多线程的明确方式之一。Java 还通过允许对象在被释放时广播通知，并强制想要锁定资源的线程在资源被释放前变为非活动状态，来进一步支持多线程。\n\
  \n如果一个对象没有被明确声明，那么它对任何线程都是开放的。类似地，电影院里没有被明确声明的座位随时可能被占用。这意味着，如果你离开座位去买零食，并且没有通过留下外套来锁定座位，那么当你回来时，如果别人占用了你的座位，你也不应感到惊讶。\n\
  \n即使这种策略过去有效，也不能保证它在未来是线程安全的。Java 也是如此。除非你的类被明确地设计为线程安全，否则它们过去未被破坏的事实并不能保证它们将来不会被破坏。\n\
  \n这个比喻还有第二层深度。即使你的外套在座位上，也可能有人强行占用你的电影院座位。Java 也是如此。如果修改锁定对象的线程不尊重同步，那么该锁定对象就可能被违反。\n\
  \n例如，假设你有一个方法对一个成员变量进行同步：\n```java\npublic void goodMethod() {\n    synchronized\
  \ (myObject) {\n        //对 myObject 执行操作\n    }\n}\n```\n第二个方法如果选择不对`myObject`进行同步，就可以修改`myObject`。\n\
  \n对一个对象进行同步意味着“我会尊重其他人对这个对象的锁，也希望他们尊重我的锁。”然而，这并没有强制力。因此，以下示例会拒绝尊重`goodMethod`中建立的同步，并且会毫无怨言地执行。\n\
  \n如果`badMethod`修改了`myObject`，这可能会引发问题，因为其他已对`myObject`进行同步的线程会期望对`myObject`拥有独占访问权。\n\
  ```java\npublic void badMethod() {\n    //对 myObject 执行操作\n}\n```\n当然，这些方法的名称并不意味着一种方式是“好的”而另一种是\n\
  \n\n\n“坏的”。例如，`badMethod` 可能只需要读取 `myObject`。如果是这样，根据上下文，不对 `myObject` 进行同步可能完全没问题。正如通常情况一样，“好的”和“坏的”\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 89 页\n\n第 4 章 ■ 线程\n\n**89**\n\n锁定类实例\n\nJava\
  \ 提供了一种机制来锁定类以及对象。这可能有点令人困惑，但概念实际上非常简单。类只是一个用于创建其他对象的对象，就像斧头是用于生火的物体一样。\n\n当程序最初加载程序使用的每个类时，JVM\
  \ 会生成一个 Class 对象。每个 JVM 中，对于给定类的所有实例对象，只有一个 Class 对象。你对 Class 对象的访问是有限的。因为 Class\
  \ 对象本身就是一个对象，所以你可以像锁定任何其他对象一样锁定它。Class 对象的有趣之处在于它能够包含静态变量和静态方法。\n\n静态变量对于类的每个对象都是通用的，这意味着该类的每个对象共享一个单一的实例。例如，对于\
  \ `McBurgerPlace` 类的对象，`chiefExecutiveOfficer` 是一个静态成员变量，因为它对所有对象都是通用的。无论你在哪个 `McBurgerPlace`\
  \ 就餐，它都与所有其他 `McBurgerPlace` 共享同一个 `chiefExecutiveOfficer`。如果任何 `McBurgerPlace`\
  \ 餐厅更改了 `chiefExecutiveOfficer`，那么所有其他 `McBurgerPlace` 都会立即感知到这一变化。\n\n静态方法对于类的每个对象都是通用的，这意味着每个\
  \ JVM 中，该类的每个对象共享同一个方法。例如，`McBurgerPlace` 类的对象可能将 `createFranchise` 作为静态成员方法，假设创建特许经营权发生在公司层面。任何\
  \ `McBurgerPlace` 对象都可以通过致电公司总部并请求这样做来创建新的特许经营权。无论你谈论的是哪个 `McBurgerPlace` 门店，调用的都是完全相同的\
  \ `createFranchise` 方法。\n\n使用静态方法与使用实例方法在一个非常重要的方面有所不同：该方法存在于类上，而不是对象上。证明这一点的事实是，即使没有\
  \ `McBurgerPlace` 门店存在，你也可以通过直接联系公司总部来创建特许经营权。\n\n那么这一切与锁定有什么关系呢？假设你想在执行某个方法时锁定一个特定的\
  \ `McBurgerPlace` 以供独占使用。例如，如果你的 `McBurgerPlace`（比如 High Street 上的那家）有一个 `waxFloor`\
  \ 方法，那么你肯定不想在打蜡地板时做任何其他事情——毕竟，诉讼比比皆是。\n\n你如何强制执行这种排他性？在现实世界中，你要确保在打蜡进行期间，该特定门店内没有其他事情发生：不做汉堡，不卖薯条，不准备开心乐园餐。几乎所有的活动都要等到你完成地板打蜡。要在\
  \ Java 中实现同样的排他性，你可以通过在方法声明中放入关键字 `synchronized` 来同步该方法：`public synchronized void\
  \ waxFloor()`\n\n这意味着在 High Street 的 `McBurgerPlace` 上调用的任何其他同步方法都将等待，直到地板打蜡完成。\n\
  \n■**注意** 非同步方法不尊重同步方法。因此，非同步方法可以随时执行。确保此类方法不会损害对象的状态非常重要。例如，`countMoney` 可能保持非同步是安全的，因为它不会干扰地板打蜡。然而，`wipeDownTables`\
  \ 方法可能应该同步，因为它确实会干扰地板打蜡。\n\n5165CH04.qxd 11/16/05 12:11 PM 第 90 页\n\n**90**\n\n\
  第 4 章 ■ 线程\n\n这种排他性与 `McBurgerPlace` 类的其他对象无关。例如，Fifth Street 上的 `McBurgerPlace`\
  \ 可以自由地制作汉堡、销售薯条等，即使 High Street 上的 `McBurgerPlace` 正在打蜡地板。为什么它们不能呢？\n\n那么如何处理影响其他对象的活动呢？例如，接待\
  \ `chiefExecutiveOfficer` 呢？显然，你只希望一次只有一个 `McBurgerPlace` 接待 `chiefExecutiveOfficer`：她不能同时出现在两个地方。你如何在\
  \ Java 中表示这种访问的排他性？就此而言，你如何控制对她的访问？你不想在她与另一家门店交谈时被一家门店打断。\n\n解决这个困境有两个步骤。首先，确保 `chiefExecutiveOfficer`\
