  \ 标签功能相同，区别在于标签将以标准字体显示。\n\n{@docRoot}\n\n指向生成的 Javadoc 的根目录（即 `index.html` 文件所在目录）。无论此标签在目录结构中嵌套多深，该路径始终正确。\n\
  \n{@value}\n\n显示指定常量的值。\n\n构造函数和方法的 Javadoc 标签如表 2-7 所示。\n\n5165CH02.qxd 11/16/05\
  \ 12:09 PM 第 40 页\n\n**40**\n\n第 2 章 ■ 项目分析与设计\n\n**表 2-7.** *构造函数与方法标签*\n\n**标签**\n\
  \n**描述**\n\n@param\n\n描述方法签名中的参数。每个参数应单独一行描述，列表顺序与方法签名中的参数顺序一致。\n\n@return\n\n描述方法返回的值或对象。\n\
  \n@exception\n\n描述可能从此方法抛出的异常。（`@throws` 是 Javadoc 1.2 中新增的同义词。）\n\n@see\n\n生成指向指定类、方法或字段的链接——该链接将出现在生成的\
  \ Javadoc 的“另请参阅”特殊部分中。\n\n@since\n\n用于指明该构造函数或方法首次出现的包版本号。\n\n@deprecated\n\n用于指明某个构造函数或方法不应再被使用，但出于兼容性原因仍然保留。该标签后应跟有文本，指示用户应使用哪个构造函数或方法来替代此构造函数或方法；如果没有具备替代功能的构造函数或方法，则使用“无替代”。\n\
  \n{@link *引用标签*}\n\n生成指向指定类、方法或字段的内联链接。标签将以等宽字体显示。\n\n{@linkplain *引用标签*}\n\n与 `{@link}`\
  \ 标签功能相同，区别在于标签将以标准字体显示。\n\n{@docRoot}\n\n指向生成的 Javadoc 的根目录（即 `index.html` 文件所在目录）。无论此标签在目录结构中嵌套多深，该路径始终正确。\n\
  \n`@see` 和 `@link` 标签将创建指向第一个匹配的类、字段或方法的超链接。\n\n当引用当前类中的方法或字段时，无需指定类名；同样，当引用同一包中的类时，也无需指定包名。最后，除非你想引用特定的重载方法，否则无需指定方法参数。表\
  \ 2-8 展示了一些示例。\n\n**表 2-8.** *@see 链接示例*\n\n**示例**\n\n**注释**\n\n@see #字段 标签\n\n\
  创建指向指定字段的链接，并赋予给定的标签\n\n@see #方法 标签\n\n创建指向第一个匹配方法的链接，并为该链接赋予指定的标签\n\n@see #方法 (参数)\
  \ 标签\n\n\n\n创建一个指向具有匹配签名的方法的链接，并为该链接指定标签\n\n@see class#method label\n\n创建一个指向指定类中第一个匹配方法的链接，并为该链接指定标签\n\
  \n@see package.class#method label\n\n创建一个指向指定包中指定类里第一个匹配方法的链接，并为该链接指定标签\n\n![图片\
  \ 5](img/index-60_1.png)\n\n5165CH02.qxd 11/16/05 12:09 PM 第 41 页\n\n第 2 章 ■ 项目分析与设计\n\
  \n**41**\n\nJDK 1.5 引入了两个可以在文档中任意位置使用的新标签：`{@code *text*}` 和 `{@literal *text*}`。在这两种情况下，文本都将按原样显示，而不进行解释。例如，如果你的文本是\
  \ `<b>`，通常它会被解释为用于开始粗体文本的 HTML 标签。然而，使用标签 `{@code <b>}` 将导致文本 `<b>` 按预期显示。`{@code\
  \ *text*}` 标签将以等宽字体显示文本，而 `{@literal *text*}` 将以普通字体显示文本。\n\n包级文档\n\nJavadoc 还可以将包文档整合到生成的输出中，并为你的整体提交创建一个摘要页面。摘要页面的示例如图\
  \ 2-2 所示。\n\n**图 2-2.** *示例摘要页面*\n\n要创建包文档，你需要在每个包目录中创建一个名为 `package.html` 的文件。一个简单的示例如下所示：\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 42 页\n\n**42**\n\n第 2 章 ■ 项目分析与设计\n\n<!doctype\
  \ HTML PUBLIC \"-//W3C//DTD HTML 3.2//EN\">\n\n<html>\n\n<head>\n\n<title>com.example.db</title>\n\
  \n</head>\n\n<body>\n\n提供数据库功能。\n\n<h2>包规范</h2>\n\n这些类是基础类，提供了在数据库中处理数据所需的基本数据创建、读取、更新和删除功能。存在基本的锁定功能，但这并非一个高级包。\n\
  \n@author 来自 example.com 的匿名人士。\n\n@author Andrew Monkhouse\n\n@version 1.0\n\n\
  @since 1.0\n\n</body>\n\n</html>\n\nJDK 5 的变化\n\n与早期版本相比，Javadoc 工具的明显变化包括对前面提到的两个新标签（`{@code\
  \ *text*}` 和 `{@literal *text*}`）的支持，以及对泛型、枚举和可变参数（VarArgs）特性的明显支持。\n\n当 JDK 1.4\
  \ 发布时，Sun 公司计划改变 Javadoc 确定注释的哪一部分应出现在摘要中（摘要与注释其余部分之间的分隔点）的方式。Sun 公司在 Javadoc 工具中加入了新的断点迭代器逻辑，这导致当提议的更改会导致未来版本中出现不同摘要时，会生成大量警告。Sun\
  \ 公司现已撤销了他们的计划，并移除了 1.4 版本的逻辑。\n\n从命令行运行 Javadoc\n\nJavadoc 的基本命令格式为：\n\njavadoc\
  \ [options] [packagenames] [sourcefiles] [@files]\n\n据此，你可以通过在与源文件相同的目录下输入以下命令，为所有不属于任何包的源文件生成\
  \ API 文档：\n\njavadoc *java\n\n如果你的源文件按包组织，你可以在命令行中列出包名：\n\njavadoc com.example.mypackage\
  \ com.example.more.packages\n\n5165CH02.qxd 11/16/05 12:09 PM 第 43 页\n\n第 2 章 ■\
  \ 项目分析与设计\n\n**43**\n\n这两个命令行都会在当前工作目录中生成 API 文档，这可能不是你所期望的。你可以使用 `-d` 选项指定 API\
  \ 文档的存储目录：\n\njavadoc -d doc/api com.example.mypackage com.example.more.packages\n\
  \n■**提示** Javadoc 会将 Unix 风格的路径名转换为特定平台的路径名。当你开发可能由未知用户在任意平台上运行的脚本时，这尤其有用。\n\n你可以添加更多选项，根据需要启用或禁用功能。例如：\n\
  \n1 javadoc \\\n2 -d doc/api \\\n3 -version \\\n4 -author \\\n5 -use \\\n6 -source\
  \ 1.5 \\\n7 -windowtitle \"Denny's DVD application\" \\\n8 -doctitle \"<h1>The SCJD\
  \ Exam with J2SE 1.5 Project</h1>\" \\\n9 -bottom \"<i>Developers: Andrew Monkhouse\
  \ and Terry Camerlengo</i>\" \\\n10 -sourcepath src \\\n11 -linkoffline http://java.sun.com/j2se/1.5.0/docs/api\
  \ /jdk_1.5/api \\\n12 sampleproject.gui sampleproject.db sampleproject.remote\n\n\
  新标签的含义在表 2-9 中解释。\n\n**表 2-9.** *常见 Javadoc 命令行选项的含义*\n**行号**\n**选项**\n**含义**\n\n\
  -d\n用于指定生成 API 的输出目录。\n\n-version\n指定 Javadoc 注释中的版本信息将包含在生成的 API 中。\n\n-author\n\
  指定 Javadoc 注释中的作者信息将包含在生成的 API 中。\n\n-use\n告诉 Javadoc 为每个类包含一个“使用”页面，详细说明该类在方法中作为参数或返回值的使用位置。\n\
  \n-source\n指定 Javadoc 应保持兼容的 JDK 版本。\n\n-windowtitle\n指定浏览器顶部显示的标题（在支持的情况下）。\n\n\
  -doctitle\n指定包摘要页面上显示的标题。\n\n-bottom\n指定每个生成页面底部显示的文本。\n\n-sourcepath\n指定包含你的包的基目录。\n\
  \n-linkoffline\n创建指向现有 Javadoc 条目的链接。请参见后续段落中的描述。\n\n5165CH02.qxd 11/16/05 12:09\
  \ PM 第 44 页\n\n**44**\n\n第 2 章 ■ 项目分析与设计\n\n`-link` 和 `-linkoffline` 选项使你能够链接到其他已有的\
  \ API。例如，如果你在某个方法中使用了 `String` 类作为参数，你可能希望你的方法的 API 文档包含一个指向 Sun 公司 `String` 方法\
  \ API 文档的超链接。\n\n当你本地没有已有 API 的副本，但可以通过网络访问它时，通常会使用 `-link` 选项。\n\n当你本地有已有 API 文档的副本，或者有来自已有\
  \ API 文档的 `package-list` 文件的本地副本，或者无法通过网络访问已有 API 时，首选 `-linkoffline` 选项。\n\n■**提示**\
  \ 只要可能，你应该引用本地文档，而不是通过网络查看，因为这样会更快。同样，通过使用本地文档副本进行“离线”链接，也会比通过网络访问所需文件更快。\n\n显然，你不会希望每次重新生成\
  \ API 文档时都输入如此复杂的命令行。解决这个问题的一种方法是将所有选项（每行一个）放入一个纯文本文件中，然后在命令行中引用该文件。\n\n例如，如果你将所有选项放在一个名为\
  \ `javadoc.options` 的文件中，你可以使用以下命令行来生成 API 文档：\n\njavadoc @javadoc.options sampleproject.gui\
  \ sampleproject.db sampleproject.remote\n\n**使用包**\n\n如果你将计算机上的所有文件都放入一个文件夹，这个文件夹很快就会变得难以管理，查找任何特定文件都将是一场噩梦。为了避免这种情况，你可能会组织文件夹来存储相关文件——一个用于会计信息，另一个用于求职，再一个用于音乐，等等。其中一些文件夹可能还有子文件夹以提供进一步的子分类。\n\
  \n开发软件也存在同样的问题。幸运的是，Sun 公司为我们提供了与文件夹等效的、独立于平台的解决方案：包。你可以通过完全限定的包名和类名来定位属于特定包的类，即使操作系统没有文件夹、目录或分层文件系统的概念。\n\
  \n\n\n启动任何项目时，都应考虑项目可能包含的逻辑模块或功能，并将与这些功能相关的类放入各自的包中。以我们的项目为例，将有一组类提供图形用户界面，另一组类提供网络功能，还有一组类提供数据访问功能。因此，我们可以从以下潜在的包开始：`gui`、`network`、`database`。\n\
  \n经过进一步研究，我们可能会决定添加更多包和/或重构现有包——第 3 章将讨论如何分析示例项目。例如，我们可能决定将 `network` 包细分为两个独立的包：一个用于\
  \ RMI 网络，另一个用于 Socket 网络。因此，我们将拥有包 `network.rmi` 和 `network.sockets`。\n\n包名应进行限定，以确保每个类都能被唯一标识。也就是说，当你尝试实例化\
  \ `StartGui` 类时，你希望实例化的是*你的*同名类，而不是我的。为此，你需要为你的域名创建包，域名需小写并倒序书写。因此，如果你在一家域名为 `example.com`\
  \ 的公司工作，那么你的包名应以倒序的相同名称开头（`com.example`）。这样，我们完整的限定包名就变成了 `com.example.network.sockets`。\n\
  \n在 Microsoft Windows 和基于 Unix 的系统中，每个包应位于一个独立的目录中。因此，对于前面提到的 `com.example.network.sockets`\
  \ 包，我们需要为第一个包 `com` 创建一个目录，该目录下包含 `example` 包的目录，`example` 目录下又包含 `network` 包的目录，最后\
  \ `network` 目录下包含 `sockets` 包的目录。这个最终的目录将包含该包中的所有 Java 类文件。\n\n■**注意** 许多操作系统会区分文件和目录的大小写。因此，名为\
  \ `numberOfBoxes` 的文件与名为 `NumberOfBoxes` 的文件是不同的。由于 Java 必须向底层操作系统请求文件，并且无法合理地遍历所有大小写组合，Sun\
  \ 公司规定，你的文件和目录的大小写必须与你的类和包的大小写匹配。\n\nSun 的 Java 工具都以相同的方式设计用于处理包，因此你可以确信，如果 Java\
  \ 编译器能够找到并编译你的类，那么 Java 运行时和 Java 文档生成器也能够处理你的类。\n\nJAR 文件也可以充当包结构。在切换到类路径根文件夹后，运行命令：\n\
  \n```\nC:\\devProj\\classes\\> jar cf db.jar sampleproject.db\n```\n\n将生成一个名为 `db.jar`\
  \ 的压缩文件，其中包含 `sampleproject.db` 包树。\n\n因此，这个文件现在可以像指定目录一样被添加到类路径中，编译器或 Java 虚拟机（JVM）将扫描该文件以查找引用的包。\n\
  \n需要注意的是 Java 工具在处理共享包定义时的行为。例如，可能会出现这样一种情况：计算机文件系统中存在两个目录，它们包含同一个包定义的不同部分。\n\n\
  第一个包的类存储在 `c:\\devProj\\classes` 中，第二组文件存储在项目目录结构之外的 `c:\\tempClasses` 中。在第一个目录中，存储了包\
  \ `sampleproject.db`，而 `sampleproject.testclient` 存储在第二个目录中（这意味着文件将分别存储在目录 `c:\\\
  dev\\Proj\\classes\\sampleproject\\db\\` 和 `c:\\dev\\Proj\\classes\\sampleproject\\\
  testclient\\` 中）。\n\n接下来，使用 JAR 工具将这两个目录分别压缩成独立的 JAR 文件，如下所示：\n\n```\nC:\\devProj\\\
  classes\\> jar cf db.jar sampleproject.db\nC:\\devProj\\classes\\> jar cf testclient.jar\
  \ sampleproject.testclient\n```\n\n最后，在编译 Java 应用程序时，在类路径中指定这两个 JAR 文件，如下所示：\n\n\
  ```\nC:\\devProj\\tmp\\> javac -cp c:\\devProj\\classes\\db.jar;c:\\tempClasses\\\
  testclient.jar MyClass.java\n```\n\n此时的问题是，类路径会发生什么？第一个 JAR 文件会覆盖第二个文件的包路径吗？答案是否定的。具有相同包树的包可以存储在独立的\
  \ JAR 文件或独立的目录中，在这种情况下，Java 编译器会在运行时合并这两个文件的内容。\n\n■**警告** 如果两个 JAR 文件中存在同名且位于同一包命名空间中的类，则首先找到的类（基于类路径顺序）将被使用——第二个类将被忽略。\n\
  \n将包定义存储在不同位置的能力允许构建高度模块化的结构。因此，在规划应用程序的包结构时，你应该考虑某些理想原则。首先也是最重要的，包应由所有功能相似或在设计上相互依赖的类组成。这使得包能够作为完整的功能单元运行。因此，一个\
  \ JAR 文件理论上可以包含一个完整的、可“插入”项目的功能包。\n\n■**注意** 本书后面介绍的示例项目使用包结构来隔离不同的网络实现。这种结构使得示例应用的整个网络层可以被更改，而不会影响应用的其他包。\n\
  \n每个包根节点中的类应该是该树功能的构建块，因此它们应该是树中最稳定的部分。较低级别的包指定了所有其他类所依赖的稳定类，包定义应遵循这一原则进行规划。\n\n\
  如果无法在包的根节点中仅放置稳定、不变的类，则这些类应被接口取代，而这些接口的可变实现应移至包定义的更高级别，或完全移入另一个不同的包中。\n\n确保包内的依赖关系被限制在单个包内部也非常重要。本质上，包应该是可以独立编译的自治单元。在大多数情况下，如果一个包中的类必须被编译才能使另一个包编译，那么应该重新设计包结构，以便所有类依赖关系都落在单个包内。一个恰当的包设计还将确保应用程序建立在尽可能稳定的基础之上。\n\
  \n总之，包是一种将项目各部分划分为功能块的机制。因此，一个有效的包设计允许项目的某些部分被移除和替换，而不会影响代码的其他部分。\n\n**最佳实践**\n\n\
  在你的编程生涯中，你可能已经注意到一些你（或他人）遵循的做法，这些做法虽然不属于上述类别，但却能使最终解决方案的整体交付变得更加容易。虽然这些做法并非必需，但你应该考虑在你的作业中使用它们。\n\
  \n**边工作边编写文档**\n\n提到这一点似乎有些奇怪，但你确实必须在完成作业的同时编写文档，最好是在编写代码之前，或者在编写代码的同时进行。\n\n作为本次作业的一部分，你必须提供三种主要形式的文档：\n\
  \n*   设计选择\n*   Javadoc\n*   用户文档\n\n设计选择\n\n\n\n设计决策文档将简要概述你在开发解决方案时做出的*主要*选择，以及你考虑过的替代方案——可能还会解释你为何放弃这些替代方案。\n\
  \n你无需就你的选择撰写长篇大论——评审者只关心两件事：\n\n**1.** 你是否考虑过替代方案？\n\n**2.** 你提交的代码是否是你自己编写的？\n\n\
  如果你将来成为系统架构师，你需要*了解*实现任何软件目标的多种方法——通常涉及多种架构和语言。作为开发者，你也应该能够在自己的专业领域（J2SE）内考虑并排除替代方案。例如，在可以使用单选按钮或复选框的情况下，你应该能够认识到两种方案都是可行的，并决定哪个是正确的选择（注意，单选按钮和复选框之间的选择*可能*是一个次要决定，或许不值得记录在文档中）。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM Page 48\n\n**48**\n\n第 2 章 ■ 项目分析与设计\n\n■**提示**\
  \ 在可能的情况下，你也应该将设计决策以实现注释的形式放在代码附近。例如，如果你选择了单选按钮而不是复选框，在该按钮的构造函数附近添加一条实现注释，将节省维护你代码的人花时间判断这是否是“正确”选择的时间。\n\
  \nSun 面临一项艰巨的任务——他们如何证明*你*提交的作业是*你*自己编写的？流程中的一步是设置多个作业（不同的业务领域），每个作业又有多个版本（需要实现的不同接口），这样你认识的人不太可能恰好和你拿到相同的作业。另一步是检查你在笔试（必须提供身份证明）中填写的信息是否与设计决策文档一致，并且设计决策文档是否描述了代码。\n\
  \n结合这些措施，Sun 可以相当确信参加考试的人就是编写代码的人。\n\n在做出设计决策时立即记录下来非常重要。如果你把这个任务留到项目结束时，你将很难记住自己做了哪些选择，更不用说为什么做出这些选择了。\n\
  \nJavadoc\n\n一次又一次地证明，如果文档与代码分离，那么它通常不会在代码更新时同步更新，这使其变得毫无用处。\n\nJavadoc 以及类似的代码文档工具就是为了解决这个问题而设计的。通过将代码文档与代码本身放在一起，在更新代码的同时更新文档就变得容易得多。\n\
  \n但这依赖于一个主要前提——你在编写和更新代码的同时编写和更新注释。\n\n如果你等到为期三个月的作业结束时才进行源代码注释，你可能会发现，仅仅为了完成注释，你还需要另外三个月的工作，因为你必须重新阅读所有代码，弄清楚你在做什么，以便为其编写文档。\n\
  \n用户文档\n\n在“原型化 GUI”一节中，我们建议在开始项目之前先绘制用户界面的粗略草图。我们提到的一个好处是，你将有一个明确的设计目标，从而降低因实现更简单而最终得到可用性较差的界面的风险。\n\
  \n在编码之前编写用户文档，你会得到同样的好处：你预先描述了用户界面将要做什么，因此你有了一个明确的目标要实现。\n\n你心中也有一个明确的终点——当你的用户界面符合你的用户文档时，你就知道用户界面应该可以准备测试了。\n\
  \n用户文档也是用户在遇到问题或想了解如何执行更高级操作时查阅的地方。不正确或措辞不当的用户文档会让最终用户感到沮丧，并且在你的实际工作中，会让你的支持电话变得比本应更令人烦恼。提前编写文档意味着它不太可能仓促完成，也意味着你在开发过程中更有可能多次回顾并改进它。\n\
  \n**断言**\n\n断言是在 JDK 1.4 中引入的，它为开发者提供了一种有用的方式来确认和记录假设，同时不影响应用程序的部署。\n\n断言的语法如下：\n\
  \nassert <布尔表达式>;\n\n或者\n\nassert <布尔表达式> : <任意语句>; 如果 <布尔表达式> 返回 false，并且在部署时启用了断言检查，则会抛出\
  \ AssertionError。\n\n程序员有时会对程序的两个部分如何交互做出假设——例如，他们可能假设私有方法中某个参数的值永远不会超过某个特定值。然而，如果假设不正确，它引起的问题可能在一段时间内都不会变得明显。在这种情况下，在方法开头包含一条\
  \ assert 语句是值得的，该语句可以在测试时用于确认你的假设，但不会对部署的代码产生任何影响。\n\n■**警告** 切勿使用断言来验证公共方法的输入——这些方法可能被其他程序员使用，他们可能不遵守你的要求。无论运行时是否启用断言，你都应该验证这些输入。\n\
  \n以下是一些示例代码，展示如何验证一个值：\n\npublic class AssertionTest {\n\npublic static void main(String[]\
  \ args) {\n\nnew AssertionTest(11);\n\n}\n\npublic AssertionTest(int withdrawalAmount)\
  \ {\n\nint balance = reduceBalance(withdrawalAmount);\n\n// reduceBalance 方法永远不应返回小于零的数字\
  \ assert (balance < 0) : \"业务规则：余额不能小于 0\";\n\n}\n\n}\n\n5165CH02.qxd 11/16/05 12:09\
  \ PM Page 50\n\n**50**\n\n第 2 章 ■ 项目分析与设计\n\n■**注意** 在 JDK 1.4 中，你必须为 Java 编译器指定\
  \ -source 1.4 选项才能启用断言的编译。在 JDK 5 中，这不再是必需的。\n\n默认情况下，断言在运行时是关闭的。这有两个主要好处：\n\n•\
  \ AssertionError 是一种 Error，因此你不希望它在生产环境中被抛出。\n\n• 评估断言中的表达式可能很耗时——默认关闭它可以确保更好的性能。\n\
  \n■**警告** 切勿使用断言来执行方法正常工作所需的操作——断言只应验证值是否正确。由于断言通常在运行时关闭，你在断言中执行的任何操作通常不会在运行时执行。\n\
  \n要在运行时启用断言，你必须指定 -ea 或 -enableassertions 命令行选项。例如：\n\njava -ea AssertionTest\n\n\
  如果不使用 -ea 选项，AssertionTest 程序将正常运行而不会出错。使用 -ea 选项，它将抛出 AssertionError。\n\n断言也可以针对单个类或包启用，方法是在命令行上指定类或包：\n\
  \njava -ea:<包名> -ea:<类名>\n\n**日志记录**\n\n在调试时，了解你是否已到达某个方法，以及某些参数和变量的值是多少，会非常有用。\n\
  \n在调试器中，你可能会在特定位置设置断点，并对某些变量设置监视。但每次调试程序时都这样做可能会很繁琐。\n\n\n\n下一步合乎逻辑的做法可能是在代码中到处添加\
  \ `System.out.println(...);` 语句。通过观察命令窗口中的输出，你可以了解程序的运行情况。然而，对于由他人（你的客户或评估者）部署的代码来说，这并不是一个好主意：往好了说，这会分散他们的注意力；往坏了说，他们可能会认为这些“普通的”调试信息是错误迹象。此外，任何可能作为服务器应用程序部署的应用程序，甚至可能没有一个窗口来观察这些消息。\n\
  \n而且，如果程序确实出了问题，让用户复制正确的消息并发送给你可能会很困难。此外，有些在调试应用程序时希望出现的消息，在部署时却毫无意义——你希望能够有选择地关闭某些消息。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 51 页\n\n第 2 章 ■ 项目分析与设计\n\n**51**\n\n显然，这个问题已经出现过很多次，并且有一个常见的解决方案：使用日志框架。这样做可以确保我们能够：\n\
  \n• 将日志消息发送到所需位置（文件/屏幕/打印机/无处）\n• 即使应用程序以“服务器”模式运行且没有用于显示消息的窗口，也能记录日志\n• 确保在整个应用程序中以一致的方式进行日志记录\n\
  • 在部署时，有选择地开启或关闭整个应用程序的日志记录\n\nJDK 1.4 及更高版本提供了用于日志记录的标准 API。我们建议，只要您考虑向标准输出或错误输出发送内容，就在整个应用程序中使用此\
  \ API。\n\n要使用日志记录器，首先必须获取一个可用的日志记录器实例。日志记录器通常是有名称的（尽管也有一个任何人都可以使用的匿名日志记录器），这允许您以不同的方式配置不同的日志记录器。要获取\
  \ `example.com.testApplication` 上下文的日志记录器引用，您可以编写类似这样的代码：`Logger myLogger = Logger.getLogger(\"\
  example.com.testApplication\");` 所有使用相同名称“获取”日志记录器的类都将获得该日志记录器的同一个实例。\n\n这确保了应用于该日志记录器的配置将应用于该日志记录器的所有实例。\n\
  \n■**注意** 日志记录器的名称是分层命名空间的一部分，这意味着 `example.com.testApplication` 是命名空间 `example.com`\
  \ 的子级。我们将在本节后面进一步说明这一点。\n\n您可以定义消息将被记录的级别。有几个预定义的级别，我们建议您使用它们，而不是定义自己的级别。预定义的级别按从最少日志记录到最多日志记录的顺序显示在表\
  \ 2-10 中。\n\n**表 2-10.** *预定义的日志记录级别*\n\n**日志记录级别**\n\n**推荐用途**\n\nSevere\n\n严重故障\n\
  \nWarning\n\n潜在问题\n\nInfo\n\n信息性消息\n\nConfig\n\n配置消息\n\nFine\n\n跟踪（调试）消息\n\nFiner\n\
  \n相当详细的跟踪消息\n\nFinest\n\n非常详细的跟踪消息\n\n5165CH02.qxd 11/16/05 12:09 PM 第 52 页\n\n\
  **52**\n\n第 2 章 ■ 项目分析与设计\n\n日志记录器类有几个用于记录信息（`Logger.info(<msg>)`）、警告（`Logger.warning(<msg>)`）和严重（`Logger.severe(<msg>)`）消息的实用方法，允许您记录简单的消息，例如：\n\
  \n`myLogger.severe(\"Sending message to standard error\");`\n\n如果您一直在简单的测试应用程序中使用这些命令，您可能会想知道这有什么大惊小怪的——毕竟，到目前为止，我们还没有做任何不能用\
  \ `System.out.println(<msg>)` 语句完成的事情。但是，请考虑一下，您可以在应用程序开头附近使用一条语句关闭对整个*整个*应用程序的所有日志记录，例如\
  \ `myLogger.setLevel(Level.OFF);`\n\n也就是说，您的所有类可能都在不同级别记录消息，而这一行代码就可以将它们全部关闭——无需再去寻找那些\
  \ `System.out.println(<msg>)` 语句。\n\n您可能只想在确定日志代码确实会被记录时才执行它。在这种情况下，您可以先调用 `isLoggable(<level>)`\
  \ 方法来确定是否应该调用您的（可能会降低性能的）日志记录代码。\n\n我们之前提到的一个好处是，我们可以将消息记录到文件中——这是通过 `Handler` 对象完成的。我们可以通过一个简单的命令向日志记录器添加一个简单的文件处理器：\n\
  \n```java\nimport java.util.logging.*;\nimport java.io.IOException;\n\npublic class\
  \ TestLogging {\n    public static void main(String[] args) throws IOException {\n\
  \        Logger myLogger = Logger.getLogger(\"Test\");\n        myLogger.addHandler(new\
  \ FileHandler(\"temp.log\"));\n        myLogger.severe(\"My program did something\
  \ bad\");\n    }\n}\n```\n\n■**注意** `FileHandler` 类可以处理将日志存储到常见位置（无论操作系统如何），并且可以处理诸如日志文件轮换之类的常见问题。请参阅\
  \ `FileHandler` 的 API 以了解如何使用这些选项。\n\n运行此示例会产生以下日志消息：\n```\nC:\\TEMP> java TestLogging\n\
  11/12/2004 19:22:40 TestLogging main\nSEVERE: My program did something bad\n```\n\
  \n■**注意** 您的日期和时间显然会不同。\n\n5165CH02.qxd 11/16/05 12:09 PM 第 53 页\n\n第 2 章 ■ 项目分析与设计\n\
  \n**53**\n\n当前工作目录中还应该有一个 `temp.log` 文件，其中包含 XML 格式的日志消息：\n\n```\nC:\\Temp>dir temp.log\n\
  \ Volume in drive C has no label.\n Volume Serial Number is E0F1-2766\n Directory\
  \ of C:\\Temp\n\n11/12/2004  07:22p                 388 temp.log\n             \
  \  1 File(s)            388 bytes\n               0 Dir(s)  2,066,956,288 bytes\
  \ free\n\nC:\\Temp>type temp.log\n<?xml version=\"1.0\" encoding=\"windows-1252\"\
  \ standalone=\"no\"?>\n<!DOCTYPE log SYSTEM \"logger.dtd\">\n<log>\n<record>\n \
  \ <date>2004-12-11T19:22:40</date>\n  <millis>1102753360550</millis>\n  <sequence>0</sequence>\n\
  \  <logger>Test</logger>\n  <level>SEVERE</level>\n  <class>TestLogging</class>\n\
  \  <method>main</method>\n  <thread>10</thread>\n  <message>My program did something\
  \ bad</message>\n</record>\n</log>\n```\n\n当您有一个程序来分析日志消息时，您可能会发现这很有用。但是，当您想自己阅读日志消息时，您可能会发现以纯文本形式输出更有益。您可以通过添加一个\
  \ `Formatter` 来实现这一点。\n\n将代码修改为：\n\n```java\nimport java.util.logging.*;\nimport\
  \ java.io.IOException;\n\npublic class TestLogging {\n    public static void main(String[]\
  \ args) throws IOException {\n        FileHandler myFileHandler = new FileHandler(\"\
  temp.log\");\n        myFileHandler.setFormatter(new SimpleFormatter());\n     \
  \   Logger myLogger = Logger.getLogger(\"Test\");\n        myLogger.addHandler(myFileHandler);\n\
  \        myLogger.severe(\"My program did something bad\");\n    }\n}\n```\n\n5165CH02.qxd\
  \ 11/16/05 12:09 PM 第 54 页\n\n**54**\n\n第 2 章 ■ 项目分析与设计\n\n将导致屏幕上输出以下内容：\n\n```\n\
  11/12/2004 19:39:27 Test main\nSEVERE: My program did something bad\n```\n\n以及 `temp.log`\
  \ 文件中输出以下内容：\n\n```\n11/12/2004 19:39:27 Test main\nSEVERE: My program did something\
  \ bad\n```\n\n如果您想要其他形式的输出，请考虑制作自己的格式化程序。`SimpleFormatter` 的源代码在 JDK 源码中可用，整个格式化程序只有\
  \ 80 行——创建自己的格式化程序很容易。\n\n您会注意到，到目前为止，日志记录一直输出到屏幕，即使我们没有要求这样做。这是因为默认情况下，每个日志记录器都会结合使用其父级的日志处理器和自身的处理器。默认的匿名日志记录器默认会将输出发送到屏幕。也就是说，如果您为\
  \ `example.com` 获取一个日志记录器，并为 `example.com` 获取另一个日志记录器...\n\n\n\n`example.com.test`的日志记录器是`example.com`的子级。因此，任何记录到`example.com.test`日志记录器的消息也会被发送到`example.com`的处理器。你可以通过调用子级日志记录器上的`setUseParentHandlers(boolean\
  \ useParentHandlers)`方法来关闭此行为。\n\n在生产环境部署前，你不应移除日志记录代码。这样做存在风险，可能会误删本不该删除的内容，并且如果日后需要恢复日志记录，你将不得不手动重新添加所有代码。更好的做法是结合使用日志记录器的轮转日志方案，确保日志文件不会变得过大，同时设置日志级别，以避免产生过多日志消息——通常使用`Level.WARNING`或`Level.SEVERE`日志级别。通常，你还需要关闭任何屏幕日志输出（如果尚未这样做的话）。\n\
  \n**总结**\n\n在项目规划阶段预先投入少量时间，可以大大减少完成此任务的总耗时。确保代码易于阅读和维护，不仅能让你在此任务中获得更高的分数，也能赢得同事更多的尊重。而使用\
  \ Sun 提供的工具则能让你的提交成果显得更加专业。\n\n我们介绍了一些功能，它们将帮助你提交更专业的成果，并辅助你的日常工作。\n\n**常见问题解答**\n\
  \n**问** 是否有必要遵循本章中的方法和标准？\n\n**答** 你的任务说明中有一些必须遵循的要求，使用 Javadoc 就是其中之一。然而，方法和标准的使用并非总是有明确规定——如果你没有具体要求，可以忽略标准，但你需要自行承担风险。\n\
  \n5165CH02.qxd 11/16/05 12:09 PM 第 55 页\n\n第 2 章 ■ 项目分析与设计\n\n**55**\n\n**问** 我应该在提交成果中包含单元测试吗？\n\
  \n**答** 当前的任务说明中有一条警告，指出超出规范要求不会获得额外加分。既然如此，我们建议你不要在提交成果中包含测试用例：最好的情况是评估员会忽略它们，最坏的情况是，如果评估员发现额外代码存在缺陷，你可能会得到较低的分数。此外，如果你使用\
  \ JUnit，你的测试代码在没有`junit.jar`的情况下将无法编译——而这是你提交任务时不允许包含的外部代码。\n\n**问** 我应该在提交成果中保留日志记录代码吗？\n\
  \n**答** 正如日志记录部分所述，我们建议你保留代码中的日志记录——这可以省去你尝试删除它的麻烦，更重要的是，可以省去你日后再次需要它时重新添加的麻烦。（是的，我们知道这似乎与关于单元测试的答案相矛盾，但单元测试与你的主要项目代码是分离的，而日志记录是集成到你的项目代码中的。此外，`java.util.logging`*是*标准库的一部分，而\
  \ JUnit 则不是。所以，这是另一个在任务中包含日志记录代码可以接受，但不包含 JUnit 代码的理由。）\n\n**问** 可以使用自定义的目录结构来代替书中给出的结构吗？\n\
  \n**答** 对于你的 Sun 认证任务，请仔细检查说明——如果它们指定了目录结构，那么你*必须*遵循。在 Sun 的任何限制之外，可以使用任何目录结构。如果你打算跟随本书中的示例项目，但决定更改目录结构，那么书中的说明和示例可能需要进行修改才能按所述方式运行。只有在你已经熟悉\
  \ Javadoc、类路径和包结构的情况下，才应使用自定义目录结构。\n\n5165CH02.qxd 11/16/05 12:09 PM 第 56 页\n\n\
  5165CH03.qxd 11/16/05 12:10 PM 第 57 页\n\n第 3 章\n\n■ ■ ■\n\n项目概述\n\n**本**章中，我们将介绍示例应用程序，它将作为开发者认证所需众多主题的源泉。示例项目“Denny's\
  \ DVDs”的结构和格式与你将在 Sun 认证 Java 开发者（SCJD）考试中遇到的类似，并将演示成功完成认证项目所必需的每个基本概念。每一章都为项目添加一个不可或缺的组成部分，并基于前一章进行构建，这样到本书结束时，你将拥有一个完整且功能正常的\
  \ Denny's DVDs 2.0 版本。此外，Denny's DVDs 还利用了 Java 2 平台标准版（J2SE）5，并且一些“Tiger”特性，如自动装箱和泛型，将在后续章节中阐明。\n\
  \n■**注意** “Tiger”是 J2SE 5 的代号，这两个术语在本书中将互换使用。有时我们会使用术语“Tigerize”，意思是将 J2SE 5 的语言特性添加到最初作为\
  \ J2SE 1.4 程序编写的代码中。我们在示例项目中经常这样做，甚至 DOSClient 也使用了泛型。有关 J2SE 5 及其添加的大量新功能（其中一些在本书中讨论）的更多信息，请访问\
  \ http://java.sun.com/developer/technicalArticles/releases/j2se15。\n\n**Sun 认证项目的基本要求是什么？**\n\
  \n为了证明具备 Sun 认证所需的“开发者级别”能力，你的项目提交必须成功实现以下目标：\n\n• 必须实现 Sun 提供的应用程序接口。\n\n• 必须使用\
  \ RMI 或通过套接字传输的序列化对象进行网络通信。\n\n• 必须使用带有 JTable 的 Swing 进行显示。\n\n• 必须完全包含在一个可执行的\
  \ JAR 文件中，因此，运行时不应需要任何命令行选项。\n\n• 配置设置必须在应用程序运行之间持久保存。\n\n**57**\n\n5165CH03.qxd\
  \ 11/16/05 12:10 PM 第 58 页\n\n**58**\n\n第 3 章 ■ 项目概述\n\n你的项目提交必须包含以下组件：\n\n• 一个可执行的\
  \ JAR 文件，它将同时运行独立客户端和网络连接客户端\n\n• 一个可执行的服务器专用 JAR 文件，它将运行网络服务器\n\n• 一个公共 JAR 文件，它将包含客户端和服务器应用程序共用的代码：\n\
  \n• 一个包含项目源文件的 src 目录\n\n• 随说明提供的原始数据文件\n\n• 一个 docs 目录，其中将包含\n\n• 由 Javadoc 生成的\
  \ API 文档\n\n• 最终用户文档\n\n• 总结你设计选择的文件\n\n整个提交成果应打包在一个 JAR 文件中，如第 9 章所述。\n\n■**注意**\
  \ JAR 最初是为了允许小程序（applet）通过单个 HTTP 请求下载，而不是通过多次往返（请求-响应对）来检索每个小程序组件（如类文件、图像等）而创建的。可执行\
  \ JAR 文件具有文件关联，因此在 Windows 上单击它们将运行 `javaw -jar`，在 Unix 上则运行 `java -jar`。\n\nDenny's\
  \ DVDs 示例最终将被捆绑到一个 JAR 文件中。该 JAR 文件将包含一个名为 `runme.jar` 的可执行 JAR 文件，其中包含数据库文件、文档和源代码。\n\
  \n`runme.jar` 将根据其调用方式处理服务器和客户端。从可执行 JAR 文件运行最终应用程序将在第 9 章中说明。\n\n■**注意** 本书的上一版包含一章关于\
  \ Java 新 I/O（NIO）的内容。当时，NIO 是一个新的 1.4 主题，并且 NIO 可用于认证考试的程度尚不明确。随后，在第一版出版和 J2SE 1.4\
  \ 发布之后，Sun 明确禁止将 NIO 用作认证项目的网络解决方案，但允许将其用作文件 I/O 的机制。\n\n\n\n诚然，上一版中引入 NIO 的主要原因只是为了展示这项酷炫的新技术。我们的主要示例（可从\
  \ Apress 网站下载）在网络层并未使用 NIO。不幸的是，这造成了一些困惑，因为许多人认为包含 NIO 意味着我们提出的解决方案需要 NIO。事实并非如此。因此，我们决定在当前版本中删除关于\
  \ NIO 的讨论，以避免进一步的混淆，但需要明确的是，网络层需要使用套接字或 RMI，而通道可以安全地用于普通的旧式文件 I/O。\n\n5165CH03.qxd\
  \ 11/16/05 12:10 PM 第 59 页\n\n第 3 章 ■ 项目概述\n\n**59**\n\n**介绍示例项目**\n\nDenny's DVDs\
