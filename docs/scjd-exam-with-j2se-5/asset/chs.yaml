  SCJD 考试的一个重要目标是让考生开发一个解决方案，允许网络上的机器交换消息。这种通信被称为分布式计算，可能是一项具有挑战性的任务，但 RMI 是你可用的有用工具之一。\n\
  \n然而，RMI 并非唯一的解决方案。还有其他技术，例如 RPC、公共对象请求代理体系结构 (CORBA) 和微软的 .NET 技术。事实上，RMI 可以被认为是面向对象的\
  \ RPC。\n\n5165CH06.qxd 11/16/05 12:14 PM 第 172 页\n\n**172**\n\n第 6 章 ■ 使用 RMI 进行网络编程\n\
  \n■**注意** .NET 有一个类似且竞争的技术，称为 .NET 远程处理。\n\n现在是定义一些术语的好时机。当我们在 RMI 编程场景中使用术语 *服务器*\
  \ 时，我们指的是一个远程对象，其方法可以从另一个 JVM 调用。*客户端* 是调用服务器远程可访问方法的对象。\n\n\n\nRMI *分布式对象系统*提供了可供客户端调用的远程对象。客户端与远程对象之间的通信是双向的。客户端必须能够定位并通信远程对象、调用其方法并接收返回值。\n\
  \nRMI 特别支持不同机器上的 Java 对象相互通信。RMI 的设计动机之一，是让开发者能够像操作本地对象一样与远程 Java 对象交互。对象的实际位置对开发者是透明的。网络透明性是一个非常吸引人的特性，因为它抽象了分布式对象系统中的复杂性，使其表现得如同本地对象系统一般。因此，在\
  \ RMI 系统中，客户端在本地运行，而系统的其余部分则在另一台机器上运行。这类系统通常被称为分布式对象系统。\n\n图 6-5 展示了这类系统。\n\n■**注意**\
  \ 套接字和 RMI 的替代方案是远程过程调用（RPC）。RPC 与语言和处理器无关，假设参数是简单数据类型（如 int 和 char）的网络表示形式，并且几乎可以在任何平台上运行。RMI\
  \ 仅与处理器无关，假设采用面向对象的框架，并要求使用 Java。\n\n除了 RPC，CORBA 和简单对象访问协议（SOAP）也是允许不同平台间实现处理器和语言无关性的其他技术。但由于\
  \ RMI 假设使用 Java，许多繁琐的协议级任务已内置于 RMI 中，使开发者有更多时间专注于应用逻辑。Java 的 RMI 非常适合 Java 系统，因为它可以假设网络连接两端都存在\
  \ JVM。基于这些原因，在完全用 Java 构建的分布式对象系统中，RMI 比 RPC 和 CORBA 更受青睐。然而，值得一提的是，CORBA 系统的性能通常优于\
  \ RMI 系统，这主要是因为它们可以用 C 或 C++ 编写。\n\n与 RMI 密切相关的是 RMI-IIOP，它代表基于互联网内部 ORB 协议运行的 Java\
  \ 远程方法调用。RMI-IIOP 由 Sun 和 IBM 共同开发，旨在实现 CORBA 兼容应用与 Java 之间的互操作性。使用 Java 开发语言，你可以创建接口定义语言（IDL），使其能与用\
  \ C++ 等语言编写的 CORBA 应用协同工作。`rmic` 编译器支持 `-iiop` 选项，该选项将生成 IDL 文件。\n\n5165CH06.qxd\
  \ 11/16/05 12:14 PM 第 173 页\n\n第 6 章 ■ 使用 RMI 进行网络编程 **173**\n\n**图 6-5.** *分布式对象系统*\n\
  \n**传输栈**\n\n传输协议是直接构建在网络层之上的协议；最常见的两个例子是 TCP/IP 和 UDP。传输层之上是传送层，负责主机间数据的透明传输、流量控制、端到端错误恢复以及数据传输。传输层向网络层发出请求。\n\
  \n图 6-6 展示了包含网络层的完整技术栈，RMI 应用正是构建于此之上。\n\n**图 6-6.** *传输栈*\n\n5165CH06.qxd 11/16/05\
  \ 12:14 PM 第 174 页\n\n**174**\n\n第 6 章 ■ 使用 RMI 进行网络编程 传送协议位于传输协议之上，并规定了信息如何在主机之间传输。传送协议的一个非常常见的例子是超文本传输协议（HTTP）。HTTP\
  \ 是万维网的协议。Java RMI 不使用 HTTP 作为传送协议，而是使用 Java 远程方法协议（JRMP）。JRMP 的一个缺点是通信两端（发送端和接收端）都必须理解\
  \ Java，从而将解决方案绑定到 Java RMI 框架。为了减轻对 Java 的依赖，可以通过使用 `rmic` 工具指定 `-iiop` 来生成存根，从而使用\
  \ CORBA 相关的客户端。IIOP 确保 CORBA 客户端可以与 Java 远程对象实现一起使用，从而减少对纯 Java 解决方案的依赖。\n\n表 6-2\
  \ 总结了开发者在 RMI 中选择传送协议时的三种选择。\n\n**表 6-2.** *RMI 传送协议*\n\n**协议**\n\n**描述**\n\nRMI-JRMP\n\
  \nRMI 的默认传送协议。适用于完全依赖 Java 作为编程语言的客户端-服务器应用。一种 Java 到 Java 的解决方案。\n\nJava-IDL\n\n\
  适用于希望将 Java 与 CORBA 兼容应用中定义的接口结合使用的 CORBA 开发者。本质上这是一种 CORBA 到 Java 的解决方案。\n\nJava\
  \ RMI-IIOP\n\n适用于需要与遗留应用保持兼容性的 Java 开发者。一种 Java 到非 Java 的解决方案。\n\n返回值与参数都是副本。被导出或实现了远程接口的对象，通过其存根（即客户端代理）进行引用。要导出对象，需扩展\
  \ `UnicastRemoteObject` 或显式调用 `UnicastRemoteObject.export(<远程对象>)`。\n\n**使用 RMI\
  \ 作为网络协议的优缺点**\n\n对于开发者考试，考生可以在 RMI 或基于套接字的序列化对象之间选择作为网络协议。以下是选择 RMI 而非套接字的一些理由：基于对象的语义——远程对象在外观和感觉上都像本地对象。网络感知对象的复杂性可以对使用\
  \ RMI 远程对象的程序隐藏。\n\n无协议负担——与套接字不同，使用 RMI 时无需担心设计客户端与服务器之间的协议，这一过程容易出错。\n\nRMI 中的方法调用是类型安全的——RMI\
  \ 比套接字类型检查更严格。错误可以在编译时捕获。\n\n使用 RMI 添加新对象或扩展协议很容易——你可以更轻松地添加新的远程对象接口或向现有远程对象添加方法。\n\
  \nIIOP 可用于非 Java 端点——你不必明确绑定到 Java 到 Java 的解决方案。\n\n使用 J2SE 5.0 生成存根变得更简单——如果使用\
  \ JRMP，则不再需要显式使用 `rmic` 生成存根。但对于我们的项目，我们仍然需要这样做。\n\n5165CH06.qxd 11/16/05 12:14\
  \ PM 第 175 页\n\n第 6 章 ■ 使用 RMI 进行网络编程 **175**\n\n■**警告** 尽管 Java 5.0 增加了动态存根生成功能，使\
  \ RMI 开发者无需在运行时之前显式对其远程类调用 `rmic`，但对于认证项目，你仍然必须这样做。这一点很重要：**截至本文撰写时，Java 开发者认证项目仍然需要使用\
  \ `rmic`**。\n\n然而，RMI 相对直观的对象语义是以网络性能为代价的。使用 RMI 时存在通信开销，这是由于 RMI 注册表中的查找以及使远程调用透明的客户端存根或代理所致。每个\
