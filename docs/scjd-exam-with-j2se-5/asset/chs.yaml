  \ 11/16/05 12:16 PM 第 246 页\n\n**246**\n\n第 8 章 ■ 图形用户界面\n\n验证 JTextField 的内容\n\n\
  在理想世界中，用户只会向我们的应用程序输入有效数据。然而，在现实世界中，人们会犯错误，不幸的是，如果未能及时捕获，输入无效数据可能会导致重大问题。因此，我们应该做出合理的努力来防止输入无效数据，并可能在数据输入后对其进行验证。\n\
  \n代码清单 8-5 包含一个名为`zipCode`的字段。在美国，邮政编码是五位数字，用于标识信件或包裹的投递区域。不幸的是，我们的示例程序允许输入任何数据，无论其长度或内容如何。\n\
  \n如果我们希望限制邮政编码字段仅接受五位数字的邮政编码，我们可以使用`JTextField`的子类：`JFormattedTextField`，并结合`MaskFormatter`。`JFormattedTextField`只允许输入与指定掩码匹配的字符。`MaskFormatter`提供了一种基于掩码指定文本格式化程序的简单方法——任何与掩码不匹配的字符都将被丢弃。数字的掩码是`#`字符。因此，我们可以将代码清单\
  \ 8-5 中`zipCode`变量的定义更改如下：\n\n```java\nMaskFormatter fiveDigits = new MaskFormatter(\"\
  #####\");\nJTextField zipCode = new JFormattedTextField(fiveDigits);\nzipCode.setColumns(5);\n\
  ```\n\n如果你进行这些更改，你会发现除了数字之外，无法再输入任何其他字符，并且不能添加超过五位数字。\n\n进一步考虑验证，让我们考虑用户想要输入 zip+4\
  \ 代码的情况，其中原始的五位代码后跟一个破折号和额外的四位数字，以进一步缩小投递地址的范围——例如，前五位数字指定投递局（邮局），接下来的两位数字标识主要街道上的一组街区，最后两位数字标识街道上的特定街区。\n\
  \n然而，zip+4 并非在所有地方都使用，即使在可用的情况下，也不是强制使用此格式（就此而言，通过美国邮政服务投递的任何物品似乎也并非强制使用邮政编码，但如果你希望信件及时送达，可能还是建议使用）。\n\
  \n处理此问题的一种方法是创建我们自己的文本字段，并带有自己的文档模型，在其中重写`insertString`方法。因此，我们再次更改`zipCode`变量的定义：\n\
  \n`JTextField zipCode = new ZipTextField(9);`\n\n`ZipTextField`扩展了`JTextField`，但它只重写了构造函数和`createDefaultModel`方法：\n\
  \n```java\nprivate class ZipTextField extends JTextField {\n    ZipTextField() {\n\
  \        super();\n    }\n\n    ZipTextField(int columns) {\n        super(columns);\n\
  \    }\n\n    protected Document createDefaultModel() {\n        return new ZipDocument();\n\
  \    }\n}\n```\n\n如果你愿意，可以重写更多构造函数，或者甚至可以省略构造函数（仅使用默认构造函数，并调用继承的`setColumns`方法）。\n\
  \n所有繁重的工作都在我们的`ZipTextField`的模型中完成。对于`JTextField`（我们正在子类化），默认模型是`PlainDocument`。我们将子类化它以形成我们的`ZipDocument`，在其中我们将验证输入的文本。\n\
  \n\n\n■**注意** 与许多 Swing 组件一样，`JTextField` 在内部使用了模型-视图-控制器（Model-View-Controller）设计模式。这为我们提供了两个可以控制数据输入的潜在区域：在包含输入数据的**模型**中，以及在数据传递给模型之前的**控制器**中。\n\
  \n```java\nprivate class ZipDocument extends PlainDocument {\n\n    public void\
  \ insertString(int offs, String str, AttributeSet a) throws BadLocationException\
  \ {\n\n        if (str == null) {\n\n            return;\n\n        }\n\n      \
  \  for (char c : str.toCharArray()) {\n\n            if (! ((Character.isDigit(c)\
  \ && offs < 10 && offs != 5)\n\n                || (b == '-' && offs == 5))) {\n\
  \n                return;\n\n            }\n\n        }\n\n        super.insertString(offs,\
  \ str, a);\n\n    }\n\n}\n```\n\n为了保持示例简洁，我们只重写了 `insertString` 方法，并且仅检查了输入的字符在其输入位置是否有效。如果有效，我们就调用父类的\
  \ `insertString` 方法来执行实际插入字符串的工作。\n\n由于我们选择保持简单，因此没有展示用于验证删除已输入数据的代码（为此我们需要重写 `remove`\
  \ 方法）。本书可下载的源代码中，在端口号验证部分提供了一个更完整的示例。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 248 页\n\
  \n**248**\n\n第 8 章 ■ 图形用户界面\n\n■**警告** 到目前为止所展示的内容，并不能阻止用户输入类似 `12345-67` 这样的内容，然后移动到下一个字段或点击文档中的其他位置。因此，需要在某处进行一些额外的验证，完整代码中给出了一个示例。\n\
  \n**JButton 组件**\n\n`JButton` 是一种“点击执行操作”类型的按钮。用户点击它时具体执行什么操作，由你来决定。该组件的一个构造器示例如下：\n\
  \n```java\nJButton exitButton = new JButton(\"Exit\");\n```\n\n其他构造器允许使用图标来代替文本，或与文本一起使用，并且可以为按钮设置一个\
  \ `Action`。\n\n仅靠构造器本身作用不大——我们还没有指定点击按钮时应该发生什么。为此，我们需要添加一个 `ActionListener`：\n\n\
  ```java\nexitButton.addActionListener(anActionListener);\n```\n\n`ActionListener`\
  \ 接口允许你监听各种动作：按钮被点击、按钮在按下修饰键（Ctrl、Alt、Shift 或 Meta 键）时被点击，等等。当此类动作发生时，事件分发线程将调用你的\
  \ `actionPerformed` 方法。\n\n`ActionListener` 可以是一个匿名内部类、一个私有类、一个外部类，或者（由于 `ActionListener`\
  \ 是一个接口）你的视图（View）可以实现该接口。\n\n以下是为你的 `ActionListener` 创建匿名内部类的示例：\n\n```java\nJButton\
  \ exitButton = new JButton(\"Exit\");\n\nexitButton.addActionListener(new ActionListener()\
  \ {\n\n    public void actionPerformed(ActionEvent ae) {\n\n        System.out.println(\"\
  有人点击了退出按钮\"); System.exit(1);\n\n    }\n\n});\n```\n\n■**注意** 上面代码片段的最后一行可能看起来令人困惑，但如果你往回数，会发现闭合花括号\
  \ (`}`) 与 `new ActionListener() {` 的起始花括号匹配，而闭合括号 (`))` 与 `addActionListener(` 的起始括号匹配。\n\
  \n与所有选择一样，使用匿名内部类既有优点也有缺点。一些优点如下：\n\n*   无需创建单独的类来处理用户事件。\n*   无需检查是哪个组件触发了动作事件。\n\
  *   处理事件的代码与触发事件的组件位于同一位置。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 249 页\n\n第 8 章 ■\
  \ 图形用户界面\n\n**249**\n\n第一点值得考虑，但如果你正在使用 MVC 模式，你可能更希望让控制器（Controller）来处理用户事件。或者，一个简单的匿名类可以调用控制器类中的方法，从而使控制器类对\
  \ GUI 架构的依赖更小。\n\n\n\n最后一点既有利也有弊——你可能不希望用*配置*视图的代码来*处理*事件。将事件处理代码分开存放可能更有意义。\n\n\
  如果你决定使用单独的类或方法来处理事件，不妨考虑使用 `setActionCommand` 方法设置一个字符串，以便轻松识别你的组件。你设置的字符串随后可以从传递给\
  \ `actionPerformed` 方法的 `ActionEvent` 中获取。下一节的清单 8-6 演示了这一点。\n\n**JRadioButton 组件**\n\
  \n单选按钮是逻辑上分组在一起的小按钮，但在任何给定时刻，该组中只能有一个按钮处于激活状态。这类似于带有多个预设电台按钮的收音机，在任何给定时刻只能按下一个按钮——你一次只能收听一个电台。\n\
  \n`JRadioButton` 的一个简单构造函数可以是：\n\n```java\nJRadioButton serverButton = new JRadioButton(\"\
  Server\");\n```\n\n其他构造函数允许使用图标代替文本或与文本一起使用，设置单选按钮的初始状态，以及为单选按钮设置一个 `Action`。\n\n\
  与 `JButton` 类似，可以为每个 `JRadioButton` 添加一个 `ActionListener`。如果你需要根据用户点击的按钮来启用或禁用某些字段，可以使用它。\n\
  \n然而，并不总是需要 `ActionListener`——如果你不关心用户点击了哪个按钮，直到用户执行其他操作后才需要知道，那么你可以使用 `isSelected`\
  \ 方法来检查用户的选择。\n\n要使 `JRadioButton` 有效，应将多个按钮逻辑上分组在一起，以便在任何给定时刻只能选择该逻辑组中的一个。你可以通过创建一个\
  \ `ButtonGroup` 并将单选按钮添加到其中来实现这一点：\n\n```java\nButtonGroup applicationMode = new\
  \ ButtonGroup();\napplicationMode.add(serverButton);\n```\n\n清单 8-6 演示了一个包含 `JButton`\
  \ 和 `JRadioButton` 的完整示例，它创建的窗口如图 8-17 所示。\n\n**清单 8-6.** *JButton 和 JRadioButton\
