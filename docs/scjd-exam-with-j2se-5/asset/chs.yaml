  \ . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .\n\n\n**J**ava 2 平台\
  \ Sun 认证开发者（SCJD）的作业为 Java 开发者提供了一个独特的机会，让他们无需任何特定的开发或运行时环境即可将 Java 技能付诸实践。该作业还提供了一个极佳的学习环境，因为可以使用许多不同的\
  \ API，并且可以提供多种替代解决方案。本书介绍了通过 SCJD 作业所需了解的许多概念。\n\n许多开发者对作业的广度感到有些畏惧，因为它涵盖了从后端数据库、服务器应用程序、前端应用程序、API\
  \ 文档到用户文档的所有内容。本书详细介绍了每个部分，帮助你在逐步构建示例项目的过程中，逐渐积累每个主题的知识。本书还将向你介绍 JDK 5 的新特性，并在我们的示例项目中提供新\
  \ API 和特性的上下文用法。\n\nSun 的作业特意没有指定要使用的操作系统平台或开发环境——所需要的只是一台能够运行当前版本 JDK 的计算机。在本书中，我们在\
  \ Windows 2000 上使用了 JDK 5。由于本书介绍了 JDK 5 的特性，并在整个示例项目中使用了这些特性，因此你需要 JDK 5 来运行我们的示例应用程序；不过，示例应用程序并不依赖于\
  \ Windows 2000。\n\n我们希望你喜欢这本书，并期待听到你通过考试的消息以及你对本书的任何评论。你可以通过 scjd@apress.com 联系两位作者。\n\
  \n**xvii**\n\n5165CH00_FM.qxd 11/16/05 11:58 AM Page xviii\n\n5165CH01.qxd 11/16/05\
  \ 12:01 PM Page 1\n\n第 1 部分\n\n■ ■ ■\n\n引言与通用\n\n开发考量\n\n5165CH01.qxd 11/16/05 12:01\
  \ PM Page 2\n\n5165CH01.qxd 11/16/05 12:01 PM Page 3\n\n第 1 章\n\n■ ■ ■\n\n引言\n\n\
  **欢**迎阅读《使用 J2SE 5 的 Sun 认证 Java 开发者考试（第二版）》。通过利用 J2SE 5 的新特性，通过 Sun 认证 Java 开发者（SCJD）考试比以往任何时候都更容易。泛型、增强的\
  \ for 循环、基本类型的自动装箱与拆箱、新的并发类以及其他新功能，为开发者提供了比以往更丰富、更强大的工具集。本书及附带的示例项目将帮助你掌握通过 SCJD\
  \ 考试所需的理解，同时学习 J2SE 开发工具包（JDK 5）的细节。如果你一直打算参加 SCJD 考试，或者你已准备好进一步探索 Java 的奥秘，那么你找对了书。\n\
  \n学习新技能的最佳方法是使用它。这在网球、陶艺，当然还有编程中都是如此。牢牢记住这一原则，本书将帮助你学习 J2SE 5，同时详细阐述通过 SCJD 考试所需的策略、技能和信息。Sun\
  \ Microsystems 设计 SCJD 考试的目的是使其成为专业 Java 开发者在现实世界中可能遇到情况的真实示例。SCJD 考试涵盖了 J2SE 的大部分内容，包括远程方法调用（RMI）、线程、文件输入/输出（I/O）和\
  \ Swing。\n\n示例项目 Denny's DVDs（在第 3 章中介绍）旨在探索与 SCJD 考试相同的概念。然而，与 SCJD 考试不同的是，本书详细解释了底层概念。当你读完本书时，你将掌握参加并通过\
  \ Sun 考试所需的技能。\n\n本章讨论的两个主要主题是：\n\n• 了解如何下载并参加 SCJD 考试\n\n• 理解本书的目标\n\n**J2SE 5**\n\
  \nJ2SE 5 是一次重大更新，旨在提高开发便捷性、增加可扩展性、提供额外的监控和管理能力，并增强 Java 桌面客户端。虽然 J2SE 5 提供了大量令人兴奋的新特性，但本书侧重于线程、RMI、Swing、套接字、异常链、日志记录和序列化等基础主题。一旦你理解了基础，其他一切都会自然跟上。\n\
  \n**3**\n\n5165CH01.qxd 11/16/05 12:01 PM Page 4\n\n**4**\n\n第 1 章 ■ 引言\n\n**SCJD\
  \ 考试**\n\nSCJD 认证是 Sun 用于验证高级 Java 程序员技能的一项综合性测试。它通常被认为是能力的有力基准。本书侧重于与本次考试相关的 J2SE\
  \ 5 特性。充分的准备对于通过考试至关重要。由于其难度，只有已经通过 Sun 认证 Java 程序员（SCJP）考试的程序员才有机会参加 SCJD 考试。幸运的是，本书解释了通过\
  \ SCJD 考试所需了解的概念。\n\n■**注意** 目前有三种 Sun 认证 Java 程序员考试可供选择：分别针对 J2SE 1.2、J2SE 1.4\
  \ 或 J2SE 5.0 平台的认证。虽然这些认证的考题略有不同（例如，J2SE 1.2 考试包含抽象窗口工具包 [AWT] 问题），但你只需通过其中任何一个认证即可有资格参加\
  \ SCJD 认证。\n\n**认证流程**\n\nSCJD 认证流程由两部分组成。第一部分是一个作业，包含一个定制设计的示例项目、一个示例数据文件、一个需要实现的接口以及特定的要求。你需要完成作业并将其提交评分。关于如何注册作业以及下载作业说明和数据文件的信息将在本章下一节中介绍。\n\
  \n当你完成作业并提交评分后，你将进入认证流程的第二部分，即一场笔试，旨在确认你提交的作业是你自己编写的，并考察你在考试第一部分做出设计和实现决策时所依据的理解。你最多有\
  \ 90 分钟的时间完成笔试；不过，由于目前考试只有四个问题，你应该会发现时间非常充裕。\n\n参加该考试时不允许携带笔记或资料。因此，最好在提交作业后尽快参加笔试，趁所有细节在你脑海中仍然清晰。两部分会同时评分，尽管编码部分会先被收集。这意味着第二场考试会提出通用性问题，而不是针对你个人项目的具体问题。你需要有一个全面的理解才能通过\
  \ SCJD 考试的两部分。\n\n■**警告** 你提交的作业只有在完成论文考试后才会被传递给评估员进行评分。如果你不参加论文考试，你将不会收到任何关于作业未被评估的警告——它只会处于悬而未决的状态，直到你最终参加论文考试。\n\
  \n5165CH01.qxd 11/16/05 12:01 PM Page 5\n\n第 1 章 ■ 引言\n\n**5**\n\n\n\nSCJD 考试的目标是验证你对最重要\
  \ Java 技能的掌握程度，包括线程、RMI、套接字、序列化、文件 I/O 和 Swing。每个作业项目都可能独一无二，以不同方式测试这些特性。例如，虽然你必须编写一个能够处理并发请求的服务器，但所提供的接口可能会改变你允许多个线程运行的类。或者，你的需求可能要求严格的搜索功能，而非更通用的搜索能力。本书汇集了你需要了解的所有相关主题知识，并整合了\
  \ J2SE 5 中的相关变更。\n\nSun 还要求你使用当前的 JDK（未被更新版本取代超过 18 个月的 JDK）来开发解决方案，以确保考生能够跟上 JDK\
  \ 最新特性的步伐。发布日期列表可在 http://java.sun.com/j2se/codenames.html 找到。\n\n**下载作业**\n\n你可以通过访问美国网站\
  \ http://www.sun.com/training/certification/java/java_devj2se.html 来注册作业和考试。许多其他国家也支持在线注册——你可以在\
  \ http://www.sun.com/training/world_training.html 查看联系方式。支付作业费用后，你将收到 Sun 发送的一封电子邮件，详细说明如何下载包含作业说明的\
  \ Java 归档（JAR）文件。收到这封邮件可能需要几天时间，也可能当天就收到。一旦收到 JAR 文件，请制作几份副本并安全存放。获取与本节主题匹配的第二份作业副本费用非常昂贵。\n\
  \n■**提示** Sun 教育网站列出了你可以下载作业的网址。你或许可以在收到指定账户已配置为可下载的电子邮件之前，就下载你的作业。\n\n**文档与问题**\n\
  \n你很可能对考试要求有疑问。通常，Sun 不会回答这些问题。这可能是因为他们想考察你在不同解决方案之间做出选择（并描述你做出决策的原因）的能力。也可能是因为他们试图模拟现实世界中的情况，即客户并不总是愿意沟通。甚至可能是因为回答每位考生的提问是一项难以完成的任务。无论如何，清晰地阐述你的问题，并在作为作业交付物一部分而必须创建的文档中处理这些问题，这一点非常重要。至少，你应该记录你的假设和选择。如需更多帮助，我们建议使用\
