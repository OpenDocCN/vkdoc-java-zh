  \n**JDK 5 中的锁定**\n\n\n\nJDK 5 包含了几个包，它们提供了独立于前述同步与锁定机制之外，对条件进行锁定和等待的能力。这些机制具有多项优势，包括能够指定是否应公平地授予锁定（请记住，之前描述的方法不保证线程被授予锁定的顺序——一个刚刚开始等待的线程，可能会比一个已经等待了很长时间的线程更早收到通知）。\n\
  \n5165CH04.qxd 11/16/05 12:11 PM 第 97 页\n\n第 4 章 ■ 线 程\n\n**97**\n\nJDK 5 中创建了一个新包\
  \ `java.util.concurrent.locks`，它为 SCJD 考生提供了一些便利，包括拥有 `ReadWriteLock` 的能力（在这种锁机制下，多个线程可以同时锁定记录进行读取，但只有一个线程能锁定记录进行写入——这将提高并发性）。我们将在第\
  \ 5 章讨论 `DvdFileAccess` 类的章节中详细探讨 `ReadWriteLock`。\n\n在 JDK 1.4 中，从调用 `wait(milliseconds)`\
  \ 返回后，无法*直接*得知线程是被通知了，还是超时时间已到。`Lock.tryLock(time, unit)` 方法返回一个布尔值，指示它是成功获得了锁，还是时间已过期。第\
  \ 5 章“创建我们的逻辑预留方法”一节中展示了使用类似 `Lock.await(time, unit)` 方法的示例。虽然 SCJD 作业不要求使用此技术，但现在可以设置多个条件，线程可以基于这些条件被通知。\n\
  \n尽管新的锁定代码看起来与使用 `synchronized` 块不同，但将代码从一种风格转换为另一种风格并不太难。例如，以下代码使用了 `synchronized`\
  \ 块：\n\n```java\nObject lock = new Object();\n\npublic void doSomething() {\n  \
  \  synchronized (lock) {\n        while (true) {\n            try {\n          \
  \      lock.wait();\n                // 此处发生某些操作\n            } catch (InterruptedException\
  \ ie) {\n                // 处理异常\n            }\n        }\n    }\n}\n```\n\n这段代码可以改为如下新格式：\n\
  \n```java\nprivate static Lock lock = new ReentrantLock();\nprivate static Condition\
  \ lockReleased = lock.newCondition();\n\npublic void doSomething() {\n    lock.lock();\n\
  \    try {\n        while (true) {\n            lockReleased.await();\n        \
  \    // 此处发生某些操作\n        }\n    } catch (InterruptedException ie) {\n        //\
