  \ 6 章和第 7 章中介绍了 RMI 和套接字类，并在第 8 章中构建了 GUI 类。\n\n**295**\n\n5165CH09.qxd 11/16/05\
  \ 12:17 PM Page 296\n\n**296**\n\n第 9 章 ■ 项目收尾\n\n**图 9-1.** *Denny's DVDs 2.0 概览*\n\
  \n我们所做的设计决策围绕应用程序的三层架构展开，而这正是 SCJD 考试的核心。关注的领域包括：`db` 包中的锁定机制、为网络层选择 RMI 还是套接字，以及在\
  \ GUI 包中使用 MVC 模式。\n\n我们还需要介绍如何打包、安装、运行和测试应用程序。\n\n您可以在 Apress 网站（http://www.apress.com）的源代码部分找到所有示例代码。本章将解释如何编译和打包最终版本\
  \ Denny's DVDs 2.0。\n\n让我们开始吧！\n\n**线程安全与锁定**\n\n线程安全在第 4 章中已有深入介绍。第 4 章的主要重点是解释线程及相关主题，如同步、锁定、并发以及\
  \ JDK 5 中新的并发包。等待机制以及其他与跨多个客户端线程共享单个资源相关的问题也进行了详细解释。\n\n第 5 章还实现了一种锁定策略来演示这些概念。例如，网络代码库为每个客户端创建了\
  \ `DvdDatabase` 类的独立实例，这样我们就可以根据讨论要点中所述来识别锁的所有者。\n\n**在 RMI 和套接字之间选择**\n\n在为 Sun\
  \ SCJD 作业开发 RMI 解决方案还是基于套接字的序列化对象解决方案之间做出选择可能很困难。Sun 接受任何一种解决方案，并且不会因为选择本身而给予或扣除额外分数。许多考生会选择他们最不熟悉的技术，因为这为他们提供了最大的学习空间。但如果您对这两种技术都不了解，或者对两者都同样熟悉，那么能够审视每种技术的优势将是有益的。\n\
  \n5165CH09.qxd 11/16/05 12:17 PM Page 297\n\n第 9 章 ■ 项目收尾\n\n**297**\n\n■**注意**\
  \ 在阅读这些优势时，您应该意识到，某一方的优势可能正是另一方的劣势。此外，许多看似明显的优势在辩论中很容易被反驳——在可能的情况下，我们会在讨论优势的同时提供反驳论点。\n\
  \n**使用基于套接字的序列化对象解决方案的优势** 在实际应用中，RMI 和套接字之间的选择通常取决于应用程序的可扩展性和性能要求。\n\n如果性能是必须考虑的因素，那么套接字是理想的选择，因为您可以限制开销程度，并且套接字非常适合发送数据，通常是以不需要繁重协议的压缩形式发送。您可能还记得，协议变得越大越复杂，您可能就越想使用\
  \ RMI。一个设计良好的简单套接字接口可以胜过基于 RMI 的服务器。如果您必须高效地处理大量请求，那么套接字可能适合您。\n\n这并不意味着您不能使用 RMI\
  \ 来压缩或加密数据——如果您愿意，可以使用自定义套接字工厂与 RMI 结合来提供专业功能（更多信息，请参考 http://java.sun.com/j2se/1.5.0/docs/guide/rmi/socketfactory/）。\n\
  \n然而，当您实现一个直接的套接字解决方案时，您可以轻松地只集成您需要的功能，而忽略不需要的功能。例如，您可能决定放弃集成到每个 RMI 解决方案中的“心跳”功能。心跳功能仅仅是确保服务器定期向\
  \ RMI 注册表发送一个信号（即心跳），让注册表知道服务器仍然存活；同样，RMI 客户端也会向服务器发送一个信号（即心跳），让服务器知道它们仍然存活。\n\n\
  套接字的另一个优势是，大多数系统管理员已经熟悉了实现一个监听特定套接字的服务器所需的工作，即使需要穿越防火墙也是如此。但很少有人熟悉如何设置 RMI 注册表，更少有人知道如何配置\
  \ RMI 以使其能穿越防火墙工作。RMI 可以穿越防火墙，但这并不像通过防火墙设置一个简单的套接字解决方案那么简单。\n\n\n\n■**注意** 套接字多年来一直是执行网络连接的标准方法，而\
  \ RMI 则是一个相对较新的标准。然而，仅凭这一点并不能证明使用套接字优于 RMI；通过套接字连接使用序列化对象几乎可以确保只有另一个 Java 类能够连接到你的服务器（之所以说“几乎”，是因为\
  \ Java 规范明确说明了序列化类的外观，这意味着有人*有可能*用其他语言开发客户端——只是非常困难）。相反，使用基于 IIOP（CORBA 使用的互联网内部对象请求代理协议）的\
  \ RMI，将允许任何符合 CORBA 规范的客户端连接到你的服务器（尽管在当前作业中不允许使用基于 IIOP 的 RMI）。有关 IIOP 和 CORBA 的更多信息，请分别参考维基百科页面\
  \ http://en.wikipedia.org/wiki/IIOP 和 http://en.wikipedia.org/wiki/CORBA。\n\n5165CH09.qxd\
  \ 11/16/05 12:17 PM 第 298 页\n\n**298**\n\n第 9 章 ■ 项目收尾\n\n通过套接字解决方案传播对远程可访问方法的更改可能比\
  \ RMI 解决方案更容易。除非你做了重大改动，比如删除正在使用的方法，或者更改其运行的端口，否则你通常可以在客户端甚至没有察觉的情况下更改基于套接字的服务器——它们只是无法获得新功能。\n\
  \n相比之下，如果 RMI 解决方案有 JDK 5 之前的客户端，或者不允许动态生成存根，那么如果你不使用动态下载，就需要重新编译客户端存根并重新分发给客户端。如果你确实使用动态下载，还可能遇到与安全性和设置代码库选项相关的关联问题。\n\
  \n套接字解决方案还应该需要更少的套接字和客户端与服务器之间的网络流量。对于此作业，套接字解决方案可能每个客户端只需要一个套接字，并且网络流量可以最小化，具体取决于你的解决方案的简化程度。另一方面，RMI\
  \ 解决方案总是会为你的 RMI 注册表打开一个监听端口，为你的 RMI 服务器打开一个监听端口，在服务器和注册表之间建立一个连接端口，并在客户端和服务器之间为每个客户端建立一个套接字。RMI\
  \ 解决方案在连接时（在注册表上执行查找）以及空闲时（执行分布式垃圾回收和发送心跳消息）也需要更多的网络流量。\n\n这引出了另一点：使用 RMI 时，你总是有一个额外的进程在运行（RMI\
  \ 服务器）。虽然大多数计算机不会因为这个额外的进程而负担过重，但如果你正在使用服务器的大部分 CPU 和内存资源，这可能会成为一个问题。\n\n一个*编写良好*的套接字解决方案*可能*比\
  \ RMI 解决方案更容易让初级程序员理解和维护。这与普遍认为 RMI 更简单的观点相矛盾。但这里有几点需要考虑。如果你编写套接字代码得当，网络代码将对客户端和服务器应用程序隐藏——它们只需调用你的套接字\
  \ API，就像在 RMI 解决方案中客户端和服务器只需调用 RMI API 一样。但在这种情况下，初级程序员不需要学习注册表，或如何使用 rmic，或如何处理\
  \ RMI 存根。因此，他们的学习曲线更短。然而，毫无疑问，一旦度过了这个学习曲线，RMI 解决方案更容易开发、理解和维护。而且，套接字解决方案比 RMI 解决方案更清晰的唯一可能方式是，如果套接字解决方案编写得非常好（并且可能\
  \ RMI 解决方案编写得不好）。\n\n在套接字解决方案中，通用客户端标识更容易——你可以使用连接的线程来标识客户端。但是，如果你的作业要求你使用 cookie\
  \ 进行锁定、解锁和修改调用，那么你可以使用 cookie 作为客户端标识。\n\n同样，如果你出于扩展性原因决定使用线程池，那么你将无法再使用线程标识符。无论如何，对于\
  \ RMI 或套接字，使用连接工厂将提供一个简单的客户端标识符。\n\n有人意外禁用你的服务器的可能性较小。使用 RMI，如果另一个服务器恰好使用相同的远程引用名称调用了注册表类的\
  \ rebind 方法，它们将替换你的代码。使用套接字，一旦你绑定到特定端口，其他服务器就无法绑定到该端口。然而，这也可能对你不利——如果有人部署了另一个恰好使用该端口号的服务器，然后重新启动计算机，可能无法预测哪个服务器会先绑定到该端口，因此你可能不知道哪个服务器会接受连接。这被称为竞态条件；与线程相关的竞态条件在第\
  \ 4 章中讨论过。\n\n5165CH09.qxd 11/16/05 12:17 PM 第 299 页\n\n第 9 章 ■ 项目收尾\n\n**299**\n\
  \n**使用 RMI 解决方案的优势**\n\n然而，让我们直截了当地说。**对于 SCJD 考试，可扩展性和性能不是设计考虑因素**，正如前面“使用基于套接字的序列化对象解决方案的优势”部分所示，两种解决方案都没有提供允许非\
  \ Java 客户端连接的方法。\n\n我们提到过，一个*编写良好*的套接字解决方案*可能*更容易让初级程序员理解和维护。然而，作为一名开发人员，你无论如何都应该了解这两种技术，以便能够在它们之间做出有效的选择（为了帮助你，我们将第\
  \ 6 章专门用于 RMI，第 7 章用于套接字）。一旦你了解了这两种技术，你可能会发现使用 RMI 实际上可以让你的工作轻松得多。\n\n并且评估人员应该理解\
  \ RMI，因此提交 RMI 解决方案没有问题。让我们快速列出 RMI 的一些优点。\n\n实现套接字服务器和套接字客户端涉及创建自定义协议。套接字实现必须通过网络发送序列化对象，接收套接字点必须在运行时知道如何处理这些对象。因此，基于套接字的应用程序编写起来可能比\
  \ RMI 程序更繁琐和笨拙。如果你编写了结构良好的代码，使得每个类只有一个职责，并且方法也同样结构良好，这可以稍微缓解这种情况。然而，对客户端-服务器通信协议使用命令模式，可以简化构建新协议的过程。\n\
  \n对象序列化和网络通信的细节被 RMI 隐藏了，而使用套接字你必须自己实现所有这些。换句话说，你是在重新发明一种已经存在的基本技术。\n\n无论你编写代码多么出色，毫无疑问，你为基于套接字的解决方案编写的代码会比\
  \ RMI 解决方案多。而且你编写的代码越多，出错的可能性就越大——利用 RMI 开发人员编写的代码可能更安全，这些代码已经经过多年的尝试和测试；RMI 的大部分代码库自\
  \ 1997 年 9 月发布的 JDK 1.1 以来就一直存在。\n\nRMI 提供了网络透明性，这意味着对客户端来说，远程对象的行为似乎就像本地对象一样。因此，无需实现握手协议或担心诸如打开和关闭套接字连接之类的底层细节。\n\
  \n由于使用了接口并且远程方法表现得像本地方法一样，调用远程方法的代码通常是类型安全的。这同样适用于套接字解决方案，但与 RMI 不同，它不要求使用接口。因此，很容易最终得到一个不提供任何形式的编译时（甚至运行时）类型安全性的解决方案。\n\
  \n\n\nRMI 还让您免于编写多线程服务器的责任，这可能会很棘手。无论采用哪种协议，您仍然需要编写线程安全的代码，但实际的服务器不必生成线程或管理线程池。\n\
  \n当系统扩展到大量并发用户时，线程池可以显著提升性能，而 RMI 免费提供了这一功能。然而，这也有代价：如果您无法使用 cookie，客户端识别会稍微复杂一些。\n\
  \nRMI 也广泛应用于企业级 JavaBean（EJB）技术中，因此为 SCJD 作业学习和使用 RMI 将有助于您处理 EJB 项目。\n\n5165CH09.qxd\
  \ 11/16/05 12:17 PM 第 300 页\n\n**300**\n\n第 9 章 ■ 项目收尾\n\nRMI 注册表帮助您动态部署服务器端代码——使用\
  \ Registry 类的 rebind 方法，您可以以最短的停机时间加载新的服务器功能。使用套接字解决方案时，您要么必须停止旧服务器然后启动新服务器（停机时间比\
  \ RMI 的 rebind 更长），要么使用不同的套接字端口（这需要重新配置或替换客户端）。\n\n使用 RMI 使您无需指定特定服务将在哪个端口上可用。使用套接字解决方案时，您必须指定服务器将监听的端口，并且客户端必须连接到该端口。如果您没有使其可配置，并且其他应用程序以使用相同端口的方式开发（且同样不可配置），那么其中一个将不得不重新编译。即使端口号是可重新配置的，您也必须重新配置所有客户端以使用新的端口号，这可能并不容易或不切实际。默认情况下，RMI\
  \ 解决方案为服务器使用随机端口号，端口号由 RMI 注册表指定。客户端只需知道注册表的端口号，然后查询该端口号以确定如何联系他们感兴趣的服务器。\n\n虽然在\
  \ SCJD 作业中不允许，但 RMI 允许您下载可执行类。例如，您可以使用它下载某种安全算法，该算法将加密客户端和服务器之间的所有数据——由于代码是动态下载的，客户端程序员永远看不到您是如何实现它的（实际上，您甚至可以隐藏它正在被使用的事实），从而降低了如果有人从未看到您的加密算法就试图破解它的可能性。\n\
  \n**两种解决方案的选择**\n\n到现在为止，您可能已经看到两种解决方案都有充分的论据，并且两者之间没有绝对的区分因素。我们相信 Sun 公司故意这样做是为了考察您的决策逻辑。\n\
  \n您必须决定我们列出的哪些论据（或您自己确定的其他论据）对您最有意义，以及如果被要求解释您的决定，您愿意为哪些论据辩护。\n\n**GUI 中的 MVC 模式**\n\
  \n第 8 章涵盖了与 GUI 相关的设计决策，从界面布局原则的一般信息到特定 Swing 组件（如 JTable）的讨论。与 RMI 和基于套接字的网络实现之间的选择（在第\
  \ 6 章和第 7 章以及本章前面讨论过）不同，Sun 公司实际上要求使用 JTable 才能通过 SCJD 考试，因此如果您想通过考试，使用它是一个无需思考的决定。\n\
  \n5165CH09.qxd 11/16/05 12:17 PM 第 301 页\n\n第 9 章 ■ 项目收尾\n\n**301**\n\n因此，设计决策从“在\
  \ Denny's DVDs 应用程序中使用哪个 GUI 小部件合适”转变为“如何将 JTable 正确集成到 Swing 用户界面中”。我们在第 8 章中建议的解决方案是在应用程序级别使用\
  \ MVC 设计模式。正如您在第 8 章中学到的，Swing 组件（如 JTree 和 JTable）在内部实现了 MVC 模式，但选择在这些组件之外使用 MVC\
  \ 模式完全取决于开发人员。通过使用应用程序范围的 MVC 架构获得的主要好处是增加了数据显示与实际数据实现之间的抽象。JTable 及其自身的 MVC 实现反过来成为整个应用程序显示层中一个较小的参与者，并与应用程序的\
  \ MVC 实现协同工作。\n\n**查找代码示例**\n\n您可以在 Apress 网站（http://www.apress.com）的源代码部分找到本书的代码示例。那里有一个包含最终代码库（即\
  \ Denny's DVDs 2.0 版）的 zip 文件。在本章中，您将关注 2.0 版的 zip 文件。\n\n将最终代码库解压到您机器上选择的任何位置。应该有一个目录\
  \ sampleproject，其中包含四个子目录：db、remote、sockets 和 gui。\n\n这些目录对应四个包：\n\n• sampleproject.db\n\
  \n• sampleproject.remote\n\n• sampleproject.sockets\n\n• sampleproject.gui\n\n除非您跳过了很多内容并直接从第\
  \ 9 章开始，否则您应该对这些包非常熟悉。一旦您将所有 Java 源文件解压到类似于上述目录结构的位置，就可以编译应用程序了。\n\n**编译和打包应用程序**\n\
  \n打开命令提示符并输入 java -version。确保您使用的是 J2SE 5 或更高版本（参见图 9-2）。如果不是，请从 Sun J2SE 下载站点（http://java.sun.com/j2se/1.5.0/download.jsp）下载并安装。\n\
  \n■**注意** 图 9-2 版本号中显示的“b05”表示这是构建版本 05；它并不意味着软件的测试版。\n\n![Image 56](img/index-321_1.png)\n\
  \n5165CH09.qxd 11/16/05 12:17 PM 第 302 页\n\n**302**\n\n第 9 章 ■ 项目收尾\n\n**图 9-2.**\
  \ *验证 J2SE 5 是否正确安装。*\n\n导航到 Denny's DVDs 的根目录。这是您解压项目 .java 文件的目录。为了演示，我们创建了一个名为\
  \ dennysDVDs2.0 的目录，并将其选为根目录。\n\n■**提示** Zip 文件通常可以使用 jar 可执行文件解压缩，如图 9-3 所示。Zip\
  \ 文件和 JAR 文件使用相同的压缩算法。\n\n接下来，您需要将 .java 文件编译到目标目录。默认情况下，Java 会将 .class 文件放在与源文件相同的目录中。使用\
  \ Java 编译器的 -d 选项可以将源文件和编译后的文件分开。分离源文件和编译后的文件有助于您组织项目。\n\n您需要决定将 .class 文件输出到哪里。为简单起见，我们决定将编译后的文件放在根目录下一个名为\
  \ classes 的子目录中。在命令提示符下使用命令 mkdir classes 将创建必要的目录。或者您也可以使用 Windows 资源管理器添加该目录。\n\
  \n接下来，使用 javac 并设置 -d 选项指向您的目标目录，分别编译每个包。图 9-3 展示了成功编译示例项目所需的一系列命令。请确保按此顺序编译包：db、remote、sockets，最后是\
  \ gui。这个顺序突出了项目的依赖关系。回顾第 5 章，我们只有 db 包。我们分别在第 6、7 和 8 章引入相关主题时添加了其他包。\n\n![Image\
  \ 57](img/index-322_1.png)\n\n5165CH09.qxd 11/16/05 12:17 PM 第 303 页\n\n第 9 章 ■\
  \ 项目收尾\n\n**303**\n\n\n\n**图 9-3.** *将源代码编译到 classes 目录* **创建清单文件**\n\n现在你需要创建一个清单文件。该文件将被打包到项目的\
  \ JAR 文件中，并由 JVM 用于加载正确的类并运行应用程序。清单文件中的关键条目是运行应用程序时要执行的主方法的类名。在我们的例子中，这是 `gui` 包中的\
  \ `ApplicationRunner` 类。\n\n清单文件的内容非常简洁。插入以下两行代码，并将其保存到一个名为 `Manifest.mf` 的新文件中。我们将清单文件放在了根目录\
  \ `dennysDVDs2.0` 下。\n\nManifest-Version: 1.0\n\nMain-Class: sampleproject.gui.ApplicationRunner\n\
  \n■**注意** 如果你使用 Sun 的 `jar` 工具创建 JAR 文件，清单文件的名称可以是任意你喜欢的名称。我们将在本章后面的“打包应用程序”一节中描述如何使用\
  \ `jar` 工具时更详细地讨论这一点。如果你不使用 Sun 的 `jar` 工具（尽管实际上没有理由不使用它），那么最终的清单文件**必须**命名为 `MANIFEST.MF`，并且必须放置在\
  \ `META.INF` 目录中，该目录必须位于 JAR 文件的根目录下。\n\n当我们实际创建包含项目类文件的 JAR 文件时，清单文件的位置就变得重要了。所有\
  \ JAR 文件都包含清单，清单可用于指定 JAR 文件的许多属性。表 9-1 显示了一些更常见的属性。\n\n5165CH09.qxd 11/16/05 12:17\
  \ PM 第 304 页\n\n**304**\n\n第 9 章 ■ 项目收尾\n\n**表 9-1.** *清单属性*\n\n**属性**\n\n**用途**\n\
  \nManifest-Version\n\n指定你所遵循的 Manifest.mf 定义的版本。目前仅定义了版本 1.0。\n\nCreated-By\n\n\
  指定 jar 工具的创建者和版本号。这由 jar 工具自动添加，因此你不应设置它。\n\nClass-Path\n\n你可以选择使用此属性来指定运行时所需的库。这些库必须相对于当前\
  \ JAR 文件指定（因此你可以指定 `lib/another.jar`，但不能指定像 `d:\\libs\\another.jar` 这样的绝对路径）。如果你有多个\
