  第 5 章 ■ DVD 数据库类\n\n**123**\n\n另外需要注意的是，第二个实例化器中没有任何对日志记录器的调用。由于这个实例化器立即调用了第三个实例化器，我们依赖的是那里可用的日志记录。\n\
  \n对于第 89–129 行列出的每个变量，我们都有一个 getter 和一个 setter。例如，第 100 行指定的 composer 变量有一个 getComposer\
