  \ dvdLock);\n15 }\n16 dvdLock.lock();\n17 } finally {\n18 masterLock.unlock();\n\
  19 }\n21 try {\n22 long endTimeMSec = System.currentTimeMillis() + 5000;\n23 Condition\
  \ dvdCondition = dvdLock.getCondition();\n24 while (dvdLock.isReserved()) {\n25\
  \ long timeLeftMSec = endTimeMSec - System.currentTimeMillis();\n26 if (!dvdCondition.await(timeLeftMSec,\
  \ TimeUnit.MILLISECONDS)) {\n27 return false;\n28 }\n29 }\n30 dvdLock.setReserver(renter);\n\
  31 } finally {\n5165CH05.qxd 11/16/05 12:13 PM Page 159\n第 5 章 ■ DVD 数据库类\n**159**\n\
  32 dvdLock.unlock();\n33 }\n34 return true;\n35 }\n\n我们首先获取 `masterLock` 上的锁，这允许我们在第\
  \ 11 行检索特定 UPC 的锁，或者在必要时在第 13 和 14 行创建一个新锁并将其添加到映射中。如果没有这个主锁，当我们试图获取自己的锁时，另一个线程可能正在修改该映射。\n\
