  \n\n\n关于 `@see` 和 `@link` 标签的特殊说明，请参考下方注释。标签将以等宽字体显示。\n\n{@linkplain *引用标签*}\n\n\
  与 `{@link}` 标签功能相同，区别在于标签将以标准字体显示。\n\n{@docRoot}\n\n指向生成的 Javadoc 的根目录（即 `index.html`\
  \ 文件所在目录）。无论此标签在目录结构中嵌套多深，该路径始终正确。\n\n字段的 Javadoc 标签如表 2-6 所示。\n\n**表 2-6.** *字段标签*\n\
  \n**标签**\n\n**描述**\n\n@see\n\n生成指向指定类或方法的链接——该链接将出现在生成的 Javadoc 的“另请参阅”特殊部分中。\n\n\
  @since\n\n用于指明该字段首次出现的包版本号。\n\n@serial\n\n用于指定通常可序列化的类或字段是否应被记录为可序列化。\n\n@deprecated\n\
