  \ re) {\n\n25b if (re.getCause() instanceof InterruptedException) {\n\n25c log.log(Level.WARNING,\
  \ \"Caught the interrupt\", re); 25d } else {\n\n25e throw re;\n\n25f }\n\n25g }\
  \ catch (LockAttemptFailedException dle) {\n\n26 log.log(Level.WARNING, \"Lock attempt\
  \ failed\", dle); 27 }\n\n28 }\n\n如果我们进行此更改并运行程序，将会看到现在熟悉的输出，如图 5-5 所示。\n\n**图 5-5.**\
  \ *将异常包装在 RuntimeException 中*  \n将异常包装在 RuntimeException 的子类中  \n我们需要添加五行代码来处理 `RuntimeException`，而不是通常为受检异常添加的两行代码，这显著增加了代码的复杂性。\n\
  \n5165CH05.qxd 11/16/05 12:13 PM 第 133 页\n\n第 5 章 ■ DVD 数据库类\n\n**133**\n\n然而，如前所述，`RuntimeException`\
  \ 的子类不需要声明或捕获。因此，更好的解决方案是创建一个新的异常，它是 `RuntimeException` 的子类，类似于这样：\n\npublic class\
  \ UserInterruptionException extends RuntimeException {\n\npublic UserInterruptionException(String\
  \ msg, Throwable t) {\n\nsuper(msg, t);\n\n}\n\n}\n\n然后我们可以像之前示例中使用 `RuntimeException`\
  \ 一样使用它，即：\n\n38 } catch (InterruptedException ie) {\n\n39a throw new UserInterruptionException(\n\
  \n39b \"InterruptedException in getLock\", 39c ie);\n\n40 }\n\n然而，我们捕获异常的代码又变得简洁明了：\n\
  \n22 public void run() {\n\n23 try {\n\n24 getLock();\n\n25a } catch (UserInterruptionException\
  \ uie) {\n\n25b log.log(Level.WARNING, \"Caught the interrupt\", uie); 25c } catch\
  \ (LockAttemptFailedException dle) {\n\n26 log.log(Level.WARNING, \"Lock attempt\
  \ failed\", dle); 27 }\n\n28 }\n\n■**提示** 如果你创建了一个不期望被捕获的 `RuntimeException` 子类，那么标准编程实践是不在方法签名中声明它。但是，如果你试图绕过所提供接口的限制，那么你可能希望在你的方法签名和\
  \ Javadoc 文档中声明它。许多常见的 IDE 会在输入方法时显示该方法将抛出的异常，有些甚至会根据方法签名创建标准的 catch 块。在这种情况下，列出\
  \ `RuntimeException` 的子类将有助于你的用户。\n\n如果你确实在方法签名和/或 Javadoc 中列出了 `RuntimeException`，那么明智的做法是添加一条代码注释，说明你为何这样做，以方便维护你代码的人。在\
  \ Sun 作业的具体情况下，你可能还需要考虑在 Javadoc 本身中添加注释，说明你为何这样做。\n\n使用 `RuntimeException` 及其子类的一大缺点是它们不需要被捕获。如果程序员遗漏了第\
  \ 25a–c 行的添加内容，程序仍然可以正常运行，但 `RuntimeException` 会沿着调用栈向上传播到线程的顶部。如图 5-6 所示。\n\n![图片\
  \ 20](img/index-153_1.png)\n\n5165CH05.qxd 11/16/05 12:13 PM 第 134 页\n\n**134**\n\
  \n第 5 章 ■ DVD 数据库类\n\n**图 5-6.** *RuntimeException 传播到线程栈的顶部*\n\n■**警告** 重要的是要认识到，`RuntimeException`\
  \ 会传播到*其运行所在线程*的栈顶，而不是**整个** JVM。如图 5-6 所示，即使在 `RuntimeException` 被抛出并且 Thread-1\
  \ 终止后，主线程仍然在运行。这在开发服务器代码时具有重要影响——如果你抛出一个 `RuntimeException` 而没有捕获它，你的服务器可能仍在运行，但无法处理任何请求。\n\
  \n**DvdDatabase 类：一个外观**\n\n在构建任何类之前，值得考虑该类的作用是什么。这同样适用于方法——对于每个方法，尝试确定该方法的功能。如果你在描述一个类或方法时使用了“和”这个词，那么该类或方法*可能*承担了超出其应有范围的职责。这时你可以考虑是否将一个类或方法拆分成两个或多个类或方法；这可能会使你的代码更易于管理和维护。\n\
  \n就我们的 `DvdDatabase` 类而言，我们在指令中被告知，这是所有其他类在访问数据文件时将使用的公共类。然而，当我们查看 `DvdDatabase`\
  \ 类提供的功能时，我们发现有两个独立的功能：**1.** 物理访问数据  \n**2.** 提供逻辑记录锁定\n\n如果我们试图用一句话来描述这个类的作用，我们可能不得不使用“和”这个词：“这个类提供对数据的物理访问**和**逻辑记录锁定。”\n\
  \n我们*可以*在一个类中提供这两个功能，但如果将它们拆分，代码以后将更易于维护。如果你需要处理一个物理访问数据库的方法，你将能够直接进入一个只处理数据库访问的类；你无需费力地浏览所有逻辑锁定的代码。\n\
  \n5165CH05.qxd 11/16/05 12:13 PM 第 135 页\n\n第 5 章 ■ DVD 数据库类\n\n**135**\n\n有一种设计模式描述了我们在这里试图实现的目标：外观模式。“façade”一词的英文含义是某物的正面，通常指建筑物。因此，我们可以将商店或建筑物的正面称为其外观：普通用户能看到的那一面。同样，我们可以将\
  \ `DvdDatabase` 视为向外部用户展示的正面或外观，隐藏了外部用户可能不需要知道的类。\n\n■**注意** 尽管使用外观模式并不能阻止我们在描述类的作用时使用“和”这个词，但它确实改变了类本身，使得外观类并不提供所有功能；它是在幕后将任务分派给其他类。\n\
  \n因此，我们的 `DvdDatabase` 类非常简单。我们首先创建对执行实际工作的类的引用：\n\npackage sampleproject.db;\n\n\
