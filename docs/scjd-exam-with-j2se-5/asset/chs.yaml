  \ 有一个名为 `readObject` 的方法。在 Denny's DVDs 项目中，序列化用于在 GUI 和服务器之间通过网络发送方法参数，使用的是默认序列化机制（例如，无论服务器是\
  \ RMI 服务器还是套接字服务器）。我们实际上并没有显式地序列化方法参数来使 RMI 工作。事实上，我们唯一关心的是通过网络发送的对象必须是可序列化的。假设我们想要将\
