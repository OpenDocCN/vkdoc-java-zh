  }\n\n如果显示 RMI 和套接字之间的选择，我们希望显示两个上下排列的单选按钮，左侧只有一个标签。\n\n\n\n我们本可以有多种方式处理这个问题。我们可以将标签设置为两列深度，或者创建另一个框架来容纳单选按钮。然而，这两种技术之前都已展示过，因此我们选择通过指令\
  \ `constraints.gridx = 1;` 为 `rmiOption` 单选按钮设置绝对网格位置。\n\n这告诉 `GridBagLayout` 将指定组件添加到位置\
  \ 1，其中单元格从第 0 列开始。\n\n如果你想了解这个通用框架在服务器应用程序中的外观，可以跳到图 8-35。我们建议你之后返回本节，了解我们是如何处理将信息从通用框架传递到外层框架或对话框的。\n\
  \n**观察者设计模式**\n\n有许多选项需要配置，但除非所有正确的选项都已配置好，否则客户端和服务器应用程序无法启动。然而，在客户端应用程序中，我们的通用框架将用于对话框，而在服务器应用程序中，它将成为服务器\
  \ GUI 的一部分。因此，我们需要一种通用的方式，让这两个应用程序都能创建通用框架的实例，并在任何字段发生变化时接收通知。实际上，我们希望对话框和服务器应用程序能够观察通用框架中的任何变化。\n\
  \n这正是我们可以使用观察者设计模式的情况。在这种模式中，你将一个类设置为 Observable 类，任何希望收到变更通知的类都实现 Observer 接口。然后，Observer\
  \ 类向 Observable 类注册自己，Observable 类会将任何变更通知给已注册的 Observer 类。\n\n5165CH08.qxd 11/16/05\
  \ 12:16 PM 第 282 页\n\n**282**\n\n第 8 章 ■ 图形用户界面\n\n■**注意** 观察者设计模式通常不用于 GUI 的一部分接收另一部分变更的通知。更常见的是在\
  \ MVC 模式中，有一个 Observable 模型和多个 Observer 视图。或者，你可能有一个 Observable 服务器，当服务器上发生任何变化时，它会通知所有\
  \ Observer 客户端。\n\n通常，你会希望被观察的类继承 Observable 类，但我们的 `ConfigOptions` 面板已经继承了 `JPanel`，所以我们无法这样做。相反，我们创建了一个继承\
  \ Observable 的内部类，并提供了一个便捷的 `getObservable` 方法，客户端和服务器应用程序可以使用该方法将自己注册为观察者。\n\n\
  当使用 Java 内置的观察者模式实现时，你可以指定一个应传递给观察者的对象。我们创建了一个值对象类，可用于传递已更改的字段及其内容。此类在清单 8-29 中展示。有关值对象设计模式的更多信息，请参阅第\
  \ 5 章。\n\n**清单 8-29.** *OptionUpdate 值对象* package sampleproject.gui;\n\npublic class\
  \ OptionUpdate {\n\npublic enum Updates {\n\nNETWORK_CHOICE_MADE,\n\nDB_LOCATION_CHANGED,\n\
  \nPORT_CHANGED;\n\n}\n\nprivate Updates updateType = null;\n\nprivate Object payload\
  \ = null;\n\npublic OptionUpdate(Updates updateType, Object payload) {\n\nthis.updateType\
  \ = updateType;\n\nthis.payload = payload;\n\n}\n\npublic Updates getUpdateType()\
  \ {\n\nreturn this.updateType;\n\n}\n\npublic Object getPayload() {\n\nreturn payload;\n\
  \n}\n\n}\n\n当用户在通用对话框（即可能拥有一些观察者的类）中更改某些内容时，会调用其中一个事件处理程序。如果这是我们想要通知 Observer 类的事件，则会构造一个\
  \ `OptionUpdate` 值更新并发送给所有观察者。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 283 页\n\n第 8\
  \ 章 ■ 图形用户界面\n\n**283**\n\n例如，当用户离开 `locationField` 或 `portNumber` 字段时，会执行以下代码：\n\
  \npublic void focusLost(FocusEvent e) {\n\nif (DB_LOCATION_LABEL.equals(e.getComponent().getName())\n\
  \n\n\n&& ( ! locationField.getText().equals(location))) {\n\nlocation = locationField.getText();\n\
  \nupdateObservers(OptionUpdate.Updates.DB_LOCATION_CHANGED, location.trim());\n\n\
  }\n\nif (SERVER_PORT_LABEL.equals(e.getComponent().getName())\n\n&& ( ! portNumber.getText().equals(port)))\
  \ {\n\nport = portNumber.getText();\n\nupdateObservers(OptionUpdate.Updates.PORT_CHANGED,\
  \ port.trim());\n\n}\n\n}\n\n假设用户更改了这些字段之一，则会调用以下方法：private void updateObservers(OptionUpdate.Updates\
  \ updateType, Object payLoad) {\n\nOptionUpdate update = new OptionUpdate(updateType,\
  \ payLoad); observerConfigOptions.setChanged();\n\nobserverConfigOptions.notifyObservers(update);\n\
  \n}\n\n■**注意** 我们在调用 notifyObservers 方法之前，先调用了 Observable 对象上的 setChanged 方法。如果在未先调用\
  \ setChanged 的情况下调用 notifyObservers，则不会有任何观察者收到通知。\n\n这就是通知任意数量观察者所需的全部操作。虽然我们似乎做了大量工作来将某些信息传回“客户端数据库位置”对话框或服务器\
  \ GUI，但其优势在于我们将面板与面板的使用者解耦了——任何类都可以使用此面板，只需将自己注册为该面板的观察者，即可在面板上发生任何变化时收到通知。\n\n\
  接下来的两节——“客户端数据库位置对话框”和“服务器 GUI”——展示了观察者-可观察对象对的另一半。两者都将成为此处所述面板的观察者。\n\n客户端数据库位置对话框\n\
  \n为各种模式创建了通用框架后，我们可以将其添加到对话框中，如清单 8-30 所示。\n\n5165CH08.qxd 11/16/05 12:16 PM 第 284\
  \ 页\n\n**284**\n\n第 8 章 ■ 图形用户界面\n\n我们的对话框在用户输入所需详细信息之前，不会允许他们启动客户端应用程序；然而，所需详细信息会根据客户端应用程序模式而变化——在独立模式下，我们只需要知道数据文件的\
  \ URI。但在网络模式下，我们需要知道服务器的 URL、其端口号以及我们正在连接的服务器类型。构造函数首先假设，如果我们要为独立模式构建对话框，则不需要端口号或连接类型。然后，它继续创建\
  \ ConfigOptions 窗格的一个实例，并将自身添加为该窗格的观察者。\n\n接着创建一个简单的“确定/取消”JOptionPane 问题对话框，以通用窗格作为其主要对象。然后我们覆盖将要显示的按钮，以便在用户输入所需数据时启用连接按钮。\n\
  \n如果用户关闭对话框而不是单击“连接”或“退出”按钮，我们希望将其视为单击了“退出”按钮。因此，我们将对话框设置为关闭时不执行任何操作，然后向对话框添加一个窗口监听器。\n\
  \n**清单 8-30.** *DatabaseLocationDialog*\n\npublic DatabaseLocationDialog (Frame\
