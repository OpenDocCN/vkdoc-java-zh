  \ JTable table = new JTable (new DVDTableModel ());\n\n上述语句将使用 DVDTableModel 创建一个\
  \ JTable，但表格显示将是空的，因为指定的 DVDTableModel 实例中不包含任何数据。\n\n\n\n■**注意** JTable 实例在实例化后可以修改其内部表格模型。`setModel`\
  \ 方法会更新 JTable 内部的 `TableModel` 成员，从而更新 JTable 显示的数据。也可以通过调用 JTable 实例的 `getModel`\
  \ 方法向 JTable 的 `TableModel` 引用添加数据。在我们的案例中，可以调用此方法获取 JTable 内部 `DVDTableModel` 引用的引用。然后可以调用\
  \ `addRecord` 方法向 JTable 添加一行。\n\n由于对 JTable 的 `TableModel` 的修改会转化为视图的更新，因此必须将客户端设置为利用此模式。`MainWindow`\
  \ 类包含私有成员：\n\n`private DVDTableModel tableData;`\n\n此数据成员将始终保存主 JTable 的 `TableModel`。由于视图与控制器之间的所有数据传输都通过\
  \ `DVDTableModel` 对象完成，因此该成员会始终更新以反映数据库状态的变化。\n\n一旦数据库被更新或查询，生成的表格模型就会被放入 `tableData`\
  \ 成员中。在调用控制器后，`MainWindow` 类会调用其内部的私有方法 `setupTable`。该方法包含清单 8-17 中的语句。\n\n**清单\
  \ 8-17.** *setupTable 方法*\n\n```java\nprivate void setupTable() {\n\n    // 保留之前的选中项\n\
  \n    int index = mainTable.getSelectedRow();\n\n    String prevSelected = (index\
  \ >= 0)\n\n            ? (String) mainTable.getValueAt(index, 0)\n\n           \
  \ : \"\";\n\n    // 重置表格数据\n\n    this.mainTable.setModel(this.tableData);\n\n \
  \   // 如果之前的项仍然存在，则重新选中它\n\n    for (int i = 0; i < this.mainTable.getRowCount();\
  \ i++) {\n\n        String selectedUpc = (String) mainTable.getValueAt(i, 0);\n\n\
  \        if (selectedUpc.equals(prevSelected)) {\n\n            this.mainTable.setRowSelectionInterval(i,\
  \ i);\n\n            break;\n\n        }\n\n    }\n\n}\n```\n\n请注意，`setupTable`\
  \ 方法通过调用 `setTableModel` 方法来刷新 `MainWindow` 的 JTable 实例。一旦表格的内部 `TableModel` 被替换，视图就会刷新并显示更新后的数据集。如果\
  \ JTable 没有更新其内容，可以调用 `updateUI` 方法，从而强制表格重新显示其内容。\n\n另外请注意，`setupTable` 方法在刷新表格模型之前会存储最后选中的行。在表格模型重置后，该方法会遍历新的数据集，并通过\
  \ UPC 编号定位之前选中的行。之后，会调用表格的 `setRowSelectionInterval` 方法来重新选中之前的行。\n\n**JScrollPane**\n\
