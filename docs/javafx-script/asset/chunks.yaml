    In the last line of this excerpt, the dur operator is used to temporalize a sequence
    over a time duration. In this case, the range expression from 0.01, 0.02 to 1
    is temporalized over a 3000 milliseconds period. When this temporalized range
    expression is assigned to the opa variable, each element of the range expression
    is assigned to opa in turn over time. As a result, opa will contain the values
    0.01, 0.02, to 1 successively during a 3 second time frame.


    **Animating a Node**


    Because the opacity attribute is bound to the opa variable, the appearance of
    the Super Duck image changes as the opa variable is assigned values from the range
    expression. As shown in the preceding excerpt, the variables that are bound to
    the transforms (shown following) are also assigned temporalized range expressions.
    In the case of the translate transformation, the values of x and y range from
    the current location to a randomly calculated location. In the case of the rotate
    transformation, the values of cx and cy are set to the midpoint of the ImageView,
    and the rotAngle ranges from the angle that points to the new location to 0 (upright).


    transform: bind [


    translate (x, y),


    rotate (rotAngle, cx, cy)


    ]


    The easeout keyword after some of the dur keywords means that near the end of
    the specified time period, the values change more slowly. Other options are easein,
    linear, and easeboth (which is the default).


