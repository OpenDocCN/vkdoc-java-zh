  trans: "\n*JavaOne 大会上的 JavaFX 发布*：本页面包含 Sun Microsystems 公司\n在 2007 年 5 月 JavaOne\
    \ 大会上发布的原始 JavaFX 公告。网址为：\n[www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml](http://www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml)\n\
    \n**第 2 章**\n\n**快速入门**\n\n*领先的秘诀是开始行动。开始的秘诀是将复杂繁重的任务分解为可管理的小任务，然后从第一个任务着手。*\n\
    ——马克·吐温\n\n现在，您已经对 JavaFX 有了宏观的了解，我们将遵循马克·吐温的建议，将 JavaFX Script 的学习曲线分解为可管理的小任务。\n\
    \n第一个任务是选择一个可以开始开发 JavaFX 程序的环境。\n\n注意 ➡ 为简洁起见，本书后续内容通常将*JavaFX Script*简称为*JavaFX*。\n\
    \n**选择 JavaFX 开发环境**\n\n开始开发 JavaFX 应用程序最实用的三种开发环境如下：\n\n• *JavaFXPad*：这是一个快速输入和运行\
    \ JavaFX 程序的优秀工具。非常适合边玩边学，掌握 JavaFX 语言特性。\n\n• *带 JavaFX 插件的 Eclipse*：Eclipse\
    \ 是一个功能完备的 Java 集成开发环境（IDE），并拥有支持 JavaFX 的插件。这是开发 JavaFX 应用程序的不错选择。\n\n• *带 JavaFX\
    \ 插件的 NetBeans*：NetBeans 是另一个功能完备的 Java IDE，同样是开发 JavaFX 应用程序的好选择。\n\n我将为您提供设置这三种环境的指导。建议您安装\
    \ JavaFXPad，并同时选择其中一个 IDE 及其 JavaFX Script 插件。\n\n*firstPress：快速入门*\n\n注意 ➡ 无论您选择哪种开发环境，都需要\
    \ Java 运行时环境（JRE）1.5 或更高版本（Mac OS 需要最新的 JRE 1.5 版本或 JRE 1.6）。对于 IDE，您需要 J2SE Java\
    \ 开发工具包（JDK 5.0），该工具包自带 JRE。关于各平台所需 JDK 的具体说明，请参考我稍后将提供的 IDE 插件网址。\n\n**获取 JavaFXPad**\n\
    \n您可以通过访问以下网址直接从互联网运行 JavaFXPad：\n[`download.java.net/general/openjfx/demos/javafxpad.jnlp`](http://download.java.net/general/openjfx/demos/javafxpad.jnlp)\n\
    \n这将通过 Java Web Start（一种 Java 应用程序部署技术）启动 JavaFXPad。每次访问此网址时，它都会检查最新版本的 JavaFXPad，下载并自动执行。\n\
    \n另一种运行 JavaFXPad 的方式是从 Project OpenJFX 网站下载 JavaFX 运行时、库文件和演示程序。我强烈建议您这样做，因为除了\
    \ JavaFXPad 之外，您还可以访问 JavaFX 类的源代码、一些 JavaFX 演示程序以及 JavaFX 运行时库。您可以通过以下网址获取这个优秀的软件包，格式为.zip\
    \ 或.tar.gz：\n[`openjfx.dev.java.net/servlets/ProjectDocumentList`](https://openjfx.dev.java.net/servlets/ProjectDocumentList)\n\
    \n如果您希望通过 Subversion 版本控制客户端直接访问 JavaFX 代码仓库中的最新版本，可以通过以下网址获取相同的软件：\n[`openjfx.dev.java.net/source/browse/openjfx/`](https://openjfx.dev.java.net/source/browse/openjfx/)\n\
    \n请继续从 Project OpenJFX 网站获取 JavaFX 软件包，因为本书中的说明将假设您已下载该软件包。\n\n**获取 IDE 插件**\n\
    \n再次强调，我强烈建议使用 IDE 进行 JavaFX 开发，这有助于在您学习第 3 章的“单词搜索生成器”示例时，使代码更易于管理。在阅读本书的过程中，请考虑为您选择的\
    \ IDE 安装以下两个插件之一。\n\n*firstPress：快速入门*\n\n**Eclipse 插件**\n\n要获取适用于 Eclipse 的 JavaFX\
    \ 插件（需要 Eclipse 3.2 或更高版本），请按照以下网址的说明操作：\n[`openjfx.dev.java.net/javafx-eclipse-plugin-install.html`](https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html)\n\
    \n**NetBeans 插件**\n\n要获取适用于 NetBeans 5.5 IDE 的 JavaFX 插件，请按照以下网址的说明操作：\n[`openjfx.dev.java.net/javafx-nb55-plugin-install.html`](https://openjfx.dev.java.net/javafx-nb55-plugin-install.html)\n\
    \n如果您喜欢冒险（既然您在学习 JavaFX，很可能如此），那么您可以获取适用于 NetBeans 6.0 预览版 IDE 的插件。\n\n**您的第一个\
    \ JavaFX 应用程序：HelloJFX**\n\n自从 C 编程语言问世以来，人们学习的第一个程序通常是某种“Hello World”应用程序。为了不打破传统，我将从\
    \ HelloJFX 应用程序开始教您。\n\n**运行 HelloJFX 应用程序**\n\n图 2-1 显示了在 JavaFXPad 中运行 HelloJFX\
    \ 应用程序的结果。如果您安装了带有 JavaFX 插件的 IDE，请随意使用它来运行此程序。要使用 JavaFXPad 运行该应用程序，请执行以下步骤：\n\
    \n1. 启动 JavaFXPad。这可以通过执行适用于您平台的相应脚本来完成，该脚本位于 JavaFX 软件包（来自本章前面“获取 JavaFXPad”部分提到的\
    \ Project OpenJFX 网站）的 trunk/demos/javafxpad 文件夹中。我的系统安装在 Windows 上，因此我将 PATH\
    \ 环境变量设置为该文件夹，并执行了 javafxpad.bat 文件。\n\n2. （可选）使用“运行 ➤ 自动运行”菜单选项关闭代码自动运行的功能。我通常关闭此选项，尤其是在输入代码更改时，因为默认情况下每次按键都会导致代码被重新评估并运行。\n\
    \n![图片 6](img/index-22_1.png)\n\n*firstPress：快速入门*\n\n3. 使用“文件 ➤ 打开”菜单选项打开 HelloJFX.fx\
    \ 文件。或者，您可以将 HelloJFX.fx 源代码剪切并粘贴到代码（中间）窗格中，替换默认显示的 JavaFX 代码。此程序以及我们将要检查的所有其他示例程序，都可以在\
    \ Apress 网站（[www.apress.com](http://www.apress.com)）上本书的代码下载中找到。更具体地说，HelloJFX.fx\
    \ 文件位于该下载的 Chapter02/jfx_book 文件夹中。\n\n4. 如果您禁用了“运行 ➤ 自动运行”选项，则通过选择“运行 ➤ 运行”菜单选项来启动应用程序。\n\
    \n您的输出应该类似于图 2-1 所示的窗口。\n\n*图 2-1. HelloJFX 应用程序*\n\n成功完成此练习后，您将验证所有设置是否正确，以便进行后续练习并创建自己的\
    \ JavaFX 程序。\n\n*firstPress：快速入门*\n\n**理解 HelloJFX 应用程序**\n\n现在您已经运行了该应用程序，让我们一起浏览程序清单。HelloJFX\
    \ 应用程序的代码如清单 2-1 所示。\n\n*清单 2-1. HelloJFX.fx 程序*\n\n/*\n * HelloJFX.fx - 一个 JavaFX\
    \ Script 的“Hello World”风格示例\n *\n * 2007 年由 James L. Weaver 开发（jim.weaver at jmentor\
    \ dot com）\n */\n\npackage jfx_book;\n\nimport javafx.ui.*;\nimport javafx.ui.canvas.*;\n\
    \nFrame {\n    title: \"JavaFX Script 的 Hello World 风格示例\"\n    height: 100\n\
    \    width: 400\n    content:\n        Canvas {\n            content:\n      \
    \          Text {\n                    font:\n                        Font {\n\
    \                            faceName: \"Sans Serif\"\n                      \
    \      style: BOLD\n                            size: 24\n                   \
    \     }\n                    x: 10\n                    y: 10\n              \
    \      content: \"Hello JavaFX Script Developer!\"\n                }\n      \
    \  }\n    // 在屏幕上显示 Frame\n    visible: true\n}\n\n让我们详细地逐行分析代码，因为这是第一个示例。\n\n\
    *firstPress：快速入门*\n\n**注释**\n\nJavaFX 中有两种类型的注释（记住，我们将“JavaFX Script”简称为“JavaFX”）\n"
- fmt: "# JavaFX 注释\n\n为了简洁起见，本书中简称为“JavaFX”：多行注释和单行注释。*多行注释*以两个字符`/*`开头，并以相反顺序的相同两个字符`*/`结尾——JavaFX\
    \ 会忽略其中的任何内容。清单 2-1 的开头展示了一个多行注释的示例。*单行注释*以两个字符`//`开头——在同一行中，这两个字符之后的任何内容都将被忽略。代码清单底部附近展示了一个单行注释的示例。\n\
    \n## 包声明\n\nJavaFX 包类似于文件系统中的文件夹。它们提供了一种逻辑组织构成应用程序的源代码文件的方式。前面示例中的包是`jfx_book`，这表明`HelloJFX.fx`源代码位于名为`jfx_book`的文件夹中。包名可以由多个节点组成（例如，`com.apress.jfx_book`），在这种情况下，源代码文件将位于名为`jfx_book`的文件夹中，该文件夹又位于名为`apress`的文件夹中，依此类推。实际上，包名通常以开发应用程序的公司或组织的域名开头（按相反顺序，从顶级域名开始，例如`com`或`org`）。\n\
    \n包声明是可选的，但在除最琐碎的程序之外的所有程序中使用它是一个非常好的实践。如果使用，`package`语句必须位于源代码的顶部（不包括空白和注释）。\n\
    \n## import 语句\n\nJavaFX 程序通常使用由 JavaFX（以及可选的 Java）代码组成的库。\n\n在此示例中，每个`import`语句都指明了此`HelloJFX.fx`文件中的其余代码所依赖的\
    \ JavaFX 类的位置（包），以便输出小部件并绘制到屏幕。`import`语句可以以星号（`*`）结尾，表示程序可以使用该包中的任何类。另一种形式是具体命名每个使用的类，如下例所示：\n\
    \n```\nimport javafx.ui.Frame;\n```\n\n除最琐碎的应用程序外，所有应用程序都应通过包声明来组织其源代码。源代码文件使用`import`语句来表明它使用了包含在不同`package`语句的源代码文件中的类。你将在下一章介绍的\
    \ Word Search Builder 示例中看到这样的例子。\n\n*firstPress: Quick Start*\n\n`import`语句可以出现在\
    \ JavaFX 源代码中的任何位置，并且每当遇到一个`import`语句时，导入的 JavaFX 文件就会按需运行。\n\n## 定义用户界面的声明式代码\n\
    \nJavaFX 最令人兴奋的特性之一是它能够使用简单、一致且强大的*声明式*语法来表达图形用户界面（GUI）。声明式编程，与过程式编程相对，由一个单一表达式组成（而不是按顺序执行的多个表达式）。JavaFX\
    \ 支持这两种编程方式，但最好尽可能使用声明式语法。\n\n在此示例中，整个程序（不包括`package`和`import`语句）是声明式的，因为它由一个表达式组成。这个声明式表达式首先定义一个`Frame`对象，后跟一个左花括号，并以程序中最后一行的匹配右花括号结束。嵌套在其中的是`Frame`对象的*属性*，包括`content`属性，该属性被赋值为一个`Canvas`*小部件*（GUI\
    \ 组件）。\n\n嵌套在其中的是`Canvas`小部件的`content`属性，该属性被赋值为一个`Text`对象，依此类推。\n\n> **注意**：属性是与对象关联的变量。属性将在本章后面更详细地讨论。\n\
    \n声明式代码会自动创建表达式中每个 JavaFX 类的实例（也称为对象）。它还会为新实例的属性赋值。\n\n例如，看下面创建`Font`类实例的代码片段：\n\
    \n```\nFont {\n    faceName: \"Sans Serif\"\n    style: BOLD\n    size: 24\n}\n\
    ```\n\n这段代码创建了一个 JavaFX `Font`类的实例，并将值`Sans Serif`赋给新`Font`实例的`faceName`属性。请注意，属性名后面总是跟着一个冒号（`:`），在\
    \ JavaFX 声明式语法中，这意味着“将右侧表达式的值赋给左侧的属性”。这些相同的概念适用于此脚本中的所有类（`Frame`、`Canvas`和`Text`）。让我们逐一查看这些类。\n\
    \n*firstPress: Quick Start*\n\n## 使用 Frame 类\n\n`Frame`代表一个 GUI 窗口，它有自己的边框，并且可以在其中包含其他\
    \ GUI 组件。\n\n> **注意**：在这个简单的`HelloJFX.fx`示例中，如图 2-1 所示，JavaFXPad 将`Frame`对象渲染为输出区域内的一个矩形区域，而不是一个单独的窗口。在图\
    \ 2-3 所示的稍微不那么简单的示例截图中，JavaFXPad 将`Frame`对象渲染为一个单独的窗口。\n\n与任何类一样，`Frame`类有一组属性。`Frame`小部件拥有的属性集，如清单\
    \ 2-1 中的以下代码片段所示，如下所示：\n\n-   一个出现在窗口标题栏中的标题（再次，请查看图 2-3 以了解`Frame`对象的正确渲染，并注意其标题）。\n\
    -   决定窗口初始高度和宽度的`height`和`width`（以像素为单位）。\n-   一个`content`属性，定义了`Frame`对象的内容。在这种情况下，`Frame`对象将包含一个`Canvas`小部件，你将在其上绘制一个包含要显示消息的`Text`对象。\n\
    -   一个`visible`属性（在`Canvas`小部件的右花括号之后），控制`Frame`对象是否立即显示在屏幕上。\n\n```\nFrame {\n\
    \    title: \"Hello World-style example for JavaFX Script\"\n    height: 100\n\
    \    width: 400\n    content:\n    ...some code omitted...\n    // Show the Frame\
    \ on the screen\n    visible: true\n}\n```\n\n*firstPress: Quick Start*\n\n##\
    \ 创建字符串字面量\n\nJavaFX 拥有的数据类型之一是`String`，它由零个或多个字符组成。如下面的`Frame`对象的`title`属性所示，字符串字面量是通过将一组字符括在双引号中来定义的：`title:\
    \ \"Hello World-style example for JavaFX Script\"`\n\n或者，字符串字面量可以用单引号括起来。\n\n\
    ## 使用 Canvas GUI 小部件\n\n`Canvas`小部件的目的是绘制二维（2D）图形，包括线条、形状和文本。它是一个 JavaFX 类，但我在这里将其称为*小部件*，因为它是\
    \ JavaFX `Widget`类的子类。如下所示，`Canvas`小部件的`content`属性指示将在画布上绘制什么——在本例中是一些文本：\n\n\
    ```\nCanvas {\n    content:\n    Text {\n        ...some code omitted...\n   \
    \ }\n}\n```\n\n> **提示**：如果你想查看任何 JavaFX 类的代码，请查看软件包中`trunk/src/javafx`文件夹（本章前面“获取\
    \ JavaFXPad”部分提到过）中的内容，该软件包来自 Project OpenJFX 网站。JavaFX 类按包组织，特别是`javafx.ui`、`javafx.ui.canvas`和`javafx.ui.filter`包，因此你需要查看相应的子文件夹以找到包含源代码的\
    \ FX 文件。\n\n## 绘制文本\n\n要在画布上绘制一些文本，你需要使用`Text`类，提供`x`和`y`位置（以像素为单位）作为属性，文本的左上角将出现在该位置。`Text`类的`content`属性包含将要绘制的字符串，`font`属性指定将要绘制的文本的外观。\n\
    \n*firstPress: Quick Start*\n\n```\nText {\n    font:\n    Font {\n        faceName:\
    \ \"Sans Serif\"\n        style: BOLD\n        size: 24\n    }\n    x: 10\n  \
    \  y: 10\n    content: \"Hello JavaFX Script Developer!\"\n}\n```\n\n## 定义字体"
  raw: 'to “JavaFX” for the sake of brevity in this book): multiline comments and
    single-line comments. *Multiline comments* begin with the two characters /* and
    end with the same two characters in reverse order (*/)—JavaFX will ignore anything
    in between. The beginning of Listing 2-1 shows an example of a multiline comment.
    *Single-line comments* begin with the two characters //—anything that follows
    these two characters on a single line will be ignored. An example of a single-line
    comment is shown near the bottom of the code listing.


    **The package Declaration**


    JavaFX packages are analogous to folders in a file system. They provide a way
    to logically organize the source code files that comprise an application. The
    package in the preceding example is jfx_book, which indicates that the HelloJFX.fx
    source code is located in a folder named jfx_book. Package names may consist of
    more than one node (e.g., com.apress.jfx_book), in which case the source code
    file would be located in a folder named jfx_book that is located in a folder named
    apress, and so on. In fact, it is customary for a package name to begin with the
    domain name of the company or organization that developed the application (in
    reverse order, beginning with the top-level domain name, such as com or org).


    The package declaration is optional, but it is a very good practice to use it
    in all but the most trivial programs. If used, the package statement must be at
    the top of the source code (excluding whitespace and comments).


    **import Statements**


    JavaFX programs typically use libraries that consist of JavaFX (and optionally
    Java) code.


    In this example, each import statement indicates the location (package) of the
    JavaFX


    classes that the code in the rest of this HelloJFX.fx file depends on for outputting
    widgets and drawing to the screen. An import statement can end with an asterisk
    (*), indicating that the program may use any of the classes in the package. An
    alternative form is to specifically name each class being used, as in the following
    example:


    import javafx.ui.Frame;


    All but the most trivial applications should organize their source code via package
    declarations. A source code file uses import statements to indicate its use of
    classes contained in source code files that have a different package statement.
    You’ll see examples of this in the Word Search Builder example introduced the
    next chapter.


    *firstPress: Quick Start*


    An import statement may appear anywhere in your JavaFX source code, and whenever
    one is encountered, the imported JavaFX file is run as deemed appropriate.


    **Declarative Code That Defines the User Interface**


    One of the most exciting features of JavaFX is its ability to express a graphical
    user interface (GUI) using a simple, consistent, and powerful *declarative* syntax.
    Declarative programming, as opposed to procedural programming, consists of a single
    expression (rather than multiple expressions that are executed sequentially).
    JavaFX supports both types of programming, but it is good practice to use declarative
    syntax whenever possible.


    In this example, the entire program (excluding the package and import statements)
    is declarative, in that it consists of one expression. This declarative expression
    begins by defining a Frame object followed by an open curly brace, and ends with
    the matching curly brace in the last line of the program. Nested within that are
    *attributes* of the Frame object, including the content attribute, which is assigned
    a Canvas *widget* (GUI component).


    Nested within that is the content attribute of the Canvas widget, which is assigned
    a Text object, and so on.


    Note ➡ An attribute is a variable that is associated with an object. Attributes
    will be discussed in more detail later in this chapter.


    Declarative code automatically creates an instance (also known as an object) of
    each JavaFX class in the expression. It also assigns values to the attributes
    of the new instance.


    For example, look at the portion of code that creates an instance of the Font
    class: Font {


    faceName: "Sans Serif"


    style: BOLD


    size: 24


    }


    This code creates an instance of the JavaFX Font class, and assigns the value
    Sans Serif to the faceName attribute of the new Font instance. Notice that the
    attribute name is always followed by a colon (:), which in JavaFX declarative
    syntax means “assign the value of the expression on the right to the attribute
    on the left.” These same concepts are true for all of the classes (Frame, Canvas,
    and Text) in this script. Let’s look at each of these classes individually.


    *firstPress: Quick Start*


    **Using the Frame Class**


    A Frame represents a GUI window, which has its own border, and can contain other
    GUI components within it.


    Note ➡ In this trivial HelloJFX.fx example, as shown in Figure 2-1, JavaFXPad
    renders the Frame object as a rectangular area within the output area, as opposed
    to a separate window. In the screenshot of the slightly less trivial example shown
    in Figure 2-3, JavaFXPad renders the Frame object as a separate window.


    As with any class, the Frame class has a set of attributes. The set of attributes
    that Frame widgets have, as shown in the following code snippet from Listing 2-1,
    are as follows:


    •


    A title that appears in the title bar of the window (again, please look at Figure
    2-3 for a correct rendering of a Frame object, and notice its title).


    •


    A height and width (in pixels) that determine how high and wide the window will
    initially be.


    •


    A content attribute that defines what the contents of the Frame object will be.
    In this case, the Frame object will contain a Canvas widget on which you’ll draw
    a Text object that contains the message to be displayed.


    •


    A visible attribute (after the closing brace of the Canvas widget) that controls
    whether the Frame object is to be shown on the screen just yet.


    Frame {


    title: "Hello World-style example for JavaFX Script"


    height: 100


    width: 400


    content:


    **...some code omitted...**


    // Show the Frame on the screen


    visible: true


    }


    *firstPress: Quick Start*


    **Creating String Literals**


    One of the data types that JavaFX has is the String, which consists of zero or
    more characters strung together. As shown in the following title attribute of
    the Frame object, a String literal is defined by enclosing a set of characters
    in double quotes: title: "Hello World-style example for JavaFX Script"


    Alternatively, String literals may be enclosed in single quotes.


    **Using the Canvas GUI Widget**


    The purpose of the Canvas widget is to draw two-dimensional (2D) graphics, including
    lines, shapes, and text. It is a JavaFX class, but I’m referring to it as a *widget*
    here because it is a subclass of the JavaFX Widget class. As shown following,
    the content attribute of the Canvas widget indicates what will be drawn on the
    canvas—in this case, some text: Canvas {


    content:


    Text {


    **...some code omitted...**


    }


    }


    Tip ➡ If you’d like to see the code for any of the JavaFX classes, look in the
    trunk/src/javafx folder of the software package (referred to earlier in the “Obtaining
    JavaFXPad” section of this chapter) from the Project OpenJFX site. The JavaFX
    classes are organized in packages, specifically the javafx.ui, javafx.ui.canvas,
    and javafx.ui.filter packages, so you’ll need to look in the appropriate subfolders
    to find the FX files containing the source code.


    **Drawing Text**


    To draw some text on the canvas, you use the Text class, supplying as attributes
    the x and y location (in pixels) at which the upper-left-hand corner of the text
    should appear. The content attribute of the Text class contains the string that
    will be drawn, and the font attribute specifies the appearance of the text that
    will be drawn.


    *firstPress: Quick Start*


    Text {


    font:


    Font {


    faceName: "Sans Serif"


    style: BOLD


    size: 24


    }


    x: 10


    y: 10


    content: "Hello JavaFX Script Developer!"


    }


