    *图 3-10：尝试将单词 JUPITER 拖动到无法放置的位置* 可以通过在单击单词第一个字母的同时按住 Shift 键来改变单词在网格上的方向。每次单击，单词都会以第一个字母为轴心，循环切换每个可用方向。图
    3-11 显示了 *VENUS* 的方向从斜向下变为垂直，以字母 *V* 为轴心：


    *图 3-11：将单词 VENUS 的方向从斜向下改为垂直* 除了使用图 3-7 中的弹出菜单从网格中移除单词外，你还可以在“已放置单词”列表框中选择一个单词，然后选择“网格
    ➤ 取消放置单词”菜单


