    To place a word randomly on the grid, select that word in the Unplaced Words list
    box and select the Grid ➤ Place Word Randomly menu option. Most of the menu options
    have accelerator (shortcut) keys, which you can see when dropping down a menu.
    For example, this option can also be invoked via the Ctrl+R accelerator keystroke
    combination. Yet another way to invoke this option is to double-click the word
    to be placed in the Unplaced Words list. Any way you invoke it, the result is
    a dialog box asking you to confirm that you really want to place the word, as
    shown in Figure 3-6.


    *Figure 3-6\. The Place Word Randomly on Grid dialog*


    To place all of the remaining words randomly, select the Grid ➤ Place All Words
    Randomly menu option. After clicking OK on a dialog that asks you to confirm that
    you want to place all the words, all the words will be placed on the grid, and
    will also appear in the Placed Words list box. If you roll the cursor over a letter
    in the word grid, the associated words will be highlighted in yellow. If you right-click
    the mouse on a letter (or click the mouse while holding the Ctrl key down), a
    menu enabling you to unplace the words pops up, as shown in Figure 3-7.


    *Figure 3-7\. After placing the rest of the planets randomly on the word grid
    and invoking the* *pop-up menu on a letter*


    ![Image 19](index-48_1.png)


    ![Image 20](index-48_2.png)


    *firstPress: Creating User Interfaces in JavaFX*


    To fill the remaining cells on the grid with random letters, select the Grid ➤
    Show Fill Letters menu option, or press the Ctrl+F key combination. The word grid
    should appear, similar to what is shown in Figure 3-8.'
