  trans: "  \n**本**书献给我的妻子朱莉；我的女儿洛丽和凯莉；我的“儿子”马蒂；以及我的孙辈凯勒布和吉莉安。感谢你们在写作密集期间始终如一的关爱、支持与理解。感谢梅里尔和芭芭拉·比希尔、玛丽莲·普雷特、沃尔特·韦弗，你们是杰出的榜样。也感谢劳拉·李和史蒂夫·布朗、吉尔·韦弗、莎莉和道格·比姆、韦德·韦弗、杰里和谢丽尔·比希尔、我的商业伙伴兼“兄弟”丹尼尔·赖特，以及史蒂夫·科尔特牧师。感谢史蒂夫·安格林、加里·康奈尔、蒂娜·尼尔森、理查德·达尔·波尔图和达蒙·拉尔森，与\
    \ Apress 合作写作始终是愉快的体验。感谢凯尔文·哈钦斯创作了“超级鸭子”图像，以及布莱恩·舒尔茨首次向我介绍 JavaFX。特别感谢高伟奇，他的专业知识和智慧在本书审阅和技术指导中发挥了宝贵作用。\n\
    \n詹姆斯·L·（吉姆）·韦弗\n\n我要感谢吉姆·韦弗和 Apress 给予我担任本书技术审阅人的机会。\n\n高伟奇\n\n*“耶和华说：我知道我向你们所怀的意念，是赐平安的意念，不是降灾祸的意念，要叫你们末后有指望。”*\n\
    \n耶利米书 29:11\n\n*7f672e752e259312b9d0e126a4b50034*\n\n**xi**\n\n**第 1 章**\n\n\
    **JavaFX 简介**\n\n*我不愿为复杂性这一侧的简单性付出一分钱，但我愿意为复杂性另一侧的简单性付出生命。*\n\n阿尔伯特·爱因斯坦\n\n**JavaFX\
    \ 家族**\n\n在 2007 年 5 月的年度 JavaOne 大会上，Sun Microsystems 宣布了一个名为*JavaFX*的新产品家族。其既定目标包括在移动电话、电视、车载仪表盘系统和浏览器等消费设备上开发和部署富内容应用程序。据\
    \ Sun 公司称，JavaFX 产品家族的愿景是提供“从桌面到移动设备再到客厅，创建交互式内容、应用程序和服务的能力”。JavaFX 产品家族目前包含两项技术：JavaFX\
    \ Mobile 和 JavaFX Script。\n\n**JavaFX Mobile**\n\nJavaFX Mobile 本质上是一个面向移动设备的分层软件系统，用\
    \ JavaFX Script 开发的程序可在其上运行。\n\n**JavaFX Script**\n\nJavaFX Script 是一种面向内容创作者的编程语言，无论其编程背景如何。通过使用简单的声明式脚本，内容创作者可以创建非常丰富的用户界面。除了声明式脚本功能外，JavaFX\
    \ Script 还是一种完全面向对象的语言，包含方法（在 JavaFX 中称为操作和函数）和属性。与 Java 一样，JavaFX Script 是静态类型的。\n\
    \n*firstPress：JavaFX 简介*\n\n**JavaFX Script 与 Java 的关系**\n\n如果你做过大量 Java 开发，尤其是\
    \ Java Swing 开发，你会知道 Java 和 Java Swing 拥有惊人的功能，同时也非常复杂。\n\nJavaFX 充分利用了 Java 的全部能力，因为\
    \ JavaFX 代码可以完全使用 Java 库。例如，它可以调用 Java 类的方法并实例化 Java 类。JavaFX 的许多用户界面（UI）功能在幕后都使用了\
    \ Java Swing 类。\n\n最终效果是，内容开发者和应用程序开发者可以使用一种简单而优雅的语言，来驾驭 Java 和 Java Swing 的强大功能。正如本章开篇爱因斯坦的名言所暗示的那样，我对\
    \ JavaFX 如何找到“复杂性另一侧的简单性”感到兴奋。\n\n**JavaFX Script 的特性与优势**\n\n以下列表描述了 JavaFX Script\
    \ 的一些优势：\n\n• 其用于表达用户界面的简单声明式语法，包含一套非常丰富的*布局组件*，能以平台无关的方式轻松完成用户界面布局。内容创作者无需成为专业程序员，就能创建外观精美、功能完善的用户界面。\n\
    \n•"
- fmt: '# JavaFX Script 特性


    其天生支持模型-视图-控制器模式的能力，源于其非常强大的`bind`功能。这补充并实现了声明式编程语法，因为对象的属性（包括用户界面对象）可以绑定到模型类中包含的值，通常是双向绑定。


    •


    `triggers`（触发器）的概念（当某些条件发生时自动调用的功能，例如当属性值发生变化时）。这也实现了声明式语法，并使 UI 开发相对容易，因为 setter
    和 getter 被触发器取代，当属性值发生变化时，触发器会自动调用。


    •


    JavaFX 程序可以在任何 Java 程序能运行的地方运行，因为它们是在 Java 虚拟机（JVM）的上下文中运行的。目前有一个名为 OpenJFX 编译器孵化器项目的计划，其使命是为
    JavaFX 代码创建一个编译器，将其转换为 JVM 字节码。当这一目标完全实现时，JavaFX Script 的执行速度将与 Java 代码相媲美。


    •


    其非常强大的语法用于定义、修改和查询序列（可以理解为数组）。


    *firstPress: Introduction to JavaFX*


    一个附带的好处是，它能够快速开发应用程序原型。另一个附带的好处是，它非常适合在学校中用于教授编程概念。


    ## JavaFX Script 的当前状态


    正如你将在本书中看到的，JavaFX Script 借助 Java 库，目前功能非常强大且可靠。JavaFX Script 的语法在不断改进中，处于变化状态，同时
    JavaFX Script 类库也在持续完善。由于 Project OpenJFX 是一个开放项目，JavaFX 社区正在为 JavaFX Script 的想法和开发做出贡献。这个社区包括开发工具提供商，将不断改进
    JavaFX Script 开发工具的能力，增加诸如重构等功能。JavaFX Script 目前处于评估许可下，但很快将开源。


    ## 如何充分利用本书


    本书采用教程风格编写，建议从头到尾按顺序阅读。我强烈建议运行所有示例并完成所有练习，这将加快你对材料的学习速度。本书在 Apress 上提供了代码下载，其中包含所有练习的示例解决方案（最后一个练习除外）。


    我在本书中的目标不仅是教你 JavaFX Script 语法，而且是通过本书中的主要示例（单词搜索拼图生成器）作为一个例子，你可以从中汲取设计 JavaFX
    程序的架构思路。我的另一个目标是帮助你真正享受学习 JavaFX Script 的过程。那么，让我们开始吧！


    ## 总结


    在本章中，你学习了以下内容：


    - JavaFX 产品家族包括 JavaFX Mobile 和 JavaFX Script。

    - JavaFX Script 的目标受众之一是内容作者，他们可以使用简单的声明式脚本创建丰富的用户界面。

    - JavaFX Script 是面向对象且静态类型的。

    - JavaFX Script 利用了 Java 和 Java Swing 的强大功能。


    *firstPress: Introduction to JavaFX*


    - 布局小部件有助于轻松开发平台无关的用户界面。

    - `bind`功能有助于支持模型-视图-控制器模式的实现以及声明式脚本编写。`triggers`也支持这些功能。

    - JavaFX Script 程序在 JVM 上运行，因此几乎可以在任何地方运行。此外，目前正在努力将 JavaFX Script 代码编译为 JVM 字节码。

    - JavaFX Script 具有非常强大的序列（数组）操作能力。


    ## 资源


    有关 JavaFX 的一些背景信息，你可以参考以下资源：


    - *Sun Microsystems JavaFX 网站*：该网站描述了 JavaFX 产品家族。网址是 [www.sun.com/javafx](http://www.sun.com/javafx)。'
  raw: 'Its innate ability to support the model-view-controller pattern because of
    its very powerful *bind* capability. This complements and enables the declarative
    programming syntax because attributes of objects, including user interface objects,
    can be bound to values contained in model classes, often bidirectionally.


    •


    The concept of *triggers* (functionality that is automatically invoked when certain
    conditions take place, such as when the value of an attribute changes). This enables
    the declarative syntax as well, and makes UI development relatively easy, because
    setters and getters are replaced by triggers that are automatically invoked when
    the value of an attribute changes.


    •


    JavaFX programs will run anywhere Java programs will run, because they run within
    the context of a Java Virtual Machine (JVM). There is a project underway, called
    the OpenJFX Compiler Incubator Project, whose mission is to create a compiler
    for JavaFX code that will turn it into JVM bytecode. When this is fully implemented,
    execution speeds of JavaFX Script will rival Java code.


    •


    Its very powerful syntax for defining, modifying, and querying sequences (think
    arrays).


    *firstPress: Introduction to JavaFX*


    A side benefit is that it is enables fast development of application prototypes.
    Another side benefit is that it would be a great language to use in schools to
    teach programming concepts.


    **Current Status of JavaFX Script**


    As you’ll see in this book, JavaFX Script, with the help of Java libraries, is
    currently very functional and reliable. JavaFX Script syntax is in a state of
    flux as it is continually being improved, and JavaFX Script class libraries are
    being fleshed out continually. Because Project OpenJFX is an open project, the
    JavaFX community is contributing to the ideas and development of JavaFX Script.
    This community, which includes development tool providers, will continually improve
    the capability of JavaFX Script development tools, adding capabilities such as
    refactoring. JavaFX Script is currently under an evaluation license, but will
    soon be open source.


    **Getting the Most from This Book**


    This book is written in a tutorial style, and is meant to be read in order from
    beginning to end. I highly suggest running all of the examples and doing all of
    the exercises, as that will speed your learning of the material. There is a code
    download from Apress for this book that contains sample solutions for all of the
    exercises (except for the final one).


    It is my goal in this book not only to teach you JavaFX Script syntax, but to
    use the main example in this book (the Word Search Puzzle Builder) as an example
    from which you can draw architectural ideas for designing JavaFX programs. Another
    goal of mine is to help you really enjoy learning JavaFX Script. So let’s get
    started!


    **Summary**


    In this chapter, you learned the following:


    •


    The JavaFX family of products consists of JavaFX Mobile and JavaFX Script.


    •


    One of the target audiences of JavaFX Script is content authors, who can use simple,
    declarative scripts to create rich user interfaces.


    •


    JavaFX Script is object-oriented and statically typed.


    •


    Java FX Script leverages the power of Java and Java Swing.


    *firstPress: Introduction to JavaFX*


    •


    Layout widgets enable the easy development of platform-independent user interfaces.


    •


    The bind capability helps supports the implementation of the model-view-controller
    pattern as well as declarative scripting. Triggers support these capabilities
    as well.


    •


    JavaFX Script programs run on the JVM, so they will run virtually anywhere. Also,
    there is an effort underway to compile JavaFX Script code to JVM bytecode.


    •


    JavaFX Script has very powerful sequence (array) manipulation capabilities.


    **Resources**


    For some background information on JavaFX, you can consult the following resources:


    •


    *The Sun Microsystems JavaFX web site*: This site describes the JavaFX product
    family. The URL is [www.sun.com/javafx.](http://www.sun.com/javafx)


    •'
