- fmt: "```java\nx = [self.currentX..newX] dur 3000 easeout;\ny = [self.currentY..newY]\
    \ dur 3000 easeout;\nopa = [0.01, 0.02 .. 1] dur 3000;\n```\n\nIn the last line\
    \ of this excerpt, the `dur` operator is used to temporalize a sequence over a\
    \ time duration. In this case, the range expression from `0.01`, `0.02` to `1`\
    \ is temporalized over a 3000 milliseconds period. When this temporalized range\
    \ expression is assigned to the `opa` variable, each element of the range expression\
    \ is assigned to `opa` in turn over time. As a result, `opa` will contain the\
    \ values `0.01`, `0.02`, to `1` successively during a 3 second time frame.\n\n\
    ## Animating a Node\n\nBecause the opacity attribute is bound to the `opa` variable,\
    \ the appearance of the Super Duck image changes as the `opa` variable is assigned\
    \ values from the range expression. As shown in the preceding excerpt, the variables\
    \ that are bound to the transforms (shown following) are also assigned temporalized\
    \ range expressions. In the case of the `translate` transformation, the values\
    \ of `x` and `y` range from the current location to a randomly calculated location.\
    \ In the case of the `rotate` transformation, the values of `cx` and `cy` are\
    \ set to the midpoint of the `ImageView`, and the `rotAngle` ranges from the angle\
    \ that points to the new location to `0` (upright).\n\n```\ntransform: bind [\n\
    \    translate (x, y),\n    rotate (rotAngle, cx, cy)\n]\n```\n\nThe `easeout`\
    \ keyword after some of the `dur` keywords means that near the end of the specified\
    \ time period, the values change more slowly. Other options are `easein`, `linear`,\
    \ and `easeboth` (which is the default).\n\n## Using a Custom Component in a Program\n\
    \nAs mentioned earlier, the `SuperDuckExample.fx` program, shown in Listing 5-5,\
    \ is an example that uses the `SuperDuckComponent` custom component class.\n\n\
    *Listing 5-5. The SuperDuckExample.fx Program*\n\n```\npackage jfx_book;\nimport\
    \ javafx.ui.*;\n```\n\n![Image 39](index-180_1.png)\n\n*firstPress: More UI Fun\
    \ Including 2D Drawing*\n\n```\nFrame {\n    title: \"The Adventures of Superlative\
    \ Duck\"\n    height: 600\n    width: 600\n    visible: true\n    content:\n \
    \       BorderPanel {\n            center:\n                Canvas {\n       \
    \             var: self\n                    content:\n                      \
    \  SuperDuckComponent {\n                            theCanvas: self\n       \
    \                 }\n                }\n        }\n}\n```\n\nYou’ll notice that\
    \ we’re getting a reference to the `Canvas` and assigning it to the `theCanvas`\
    \ attribute that we declared in the `SuperDuckComponent` class.\n\n## Examining\
    \ the WordGridView Custom Graphical Component\n\nThe Word Search Builder application\
    \ contains a custom component that extends `CompositeNode`, named `WordGridView`.\
    \ To refresh your memory, Figure 5-4 contains a screenshot of this component.\n\
    \n*Figure 5-4. The WordGridView custom component*\n\n![Image 40](index-181_1.png)\n\
    \n*firstPress: More UI Fun Including 2D Drawing*\n\nSince we’re going to turn\
    \ our attention again to the UI portion of the Word Search Builder, please take\
    \ a look at the diagram in Figure 5-5, which zooms in on the `wordsearch_jfx.ui`\
    \ package from Figure 3-12 in Chapter 3.\n\n*Figure 5-5. Word Search Builder wordsearch_jfx.ui\
    \ package block diagram*\n\nNow that you’re back in the Word Search Builder UI\
    \ frame of mind, please look through the `WordGridView.fx` file in Listing 5-6,\
    \ and afterward I’ll point out some items of interest in this listing.\n\n*firstPress:\
    \ More UI Fun Including 2D Drawing*\n\n*Listing 5-6. The WordGridView Class*\n\
    \n```\npackage wordsearch_jfx.ui;\n\nimport javafx.ui.*;\nimport javafx.ui.canvas.*;\n\
    import javafx.ui.filter.*;\nimport wordsearch_jfx.model.WordGridEntry;\nimport\
    \ wordsearch_jfx.model.WordGridModel;\n\nclass WordGridView extends CompositeNode\
