    }


    A *replace trigger* is automatically executed when the attribute named in the
    trigger is assigned another value. Here is an example from the WordGridModel class
    taken from Listing 4-5:


    /**


    * Updates the uplaced selected word in the model based upon what cell


    * is selected in the unplaced words ListBox


    */


    trigger on WordGridModel.selectedUnplacedWordIndex[oldValue] = newValue {


    selectedUnplacedWord = unplacedListBox.cells[selectedUnplacedWordIndex].text;


    }


    When this trigger executes, the variable to the right of the assignment operator
    (=) contains the new value that was assigned to the attribute. Optionally, as
    shown in the preceding excerpt, you can put a variable name in square brackets
    on the left side of the assignment operator. This causes the value of the attribute,
    before it was assigned a new value, to be stored in that variable. This enables
    you to compare the old value with the new value in code of the trigger.


    If you are familiar with setter and getter methods, you’ll realize that replace
    triggers enable you to dispense with getters and setters in your code. Instead,
    you can access the attributes directly. Any validation or business logic that
    you can put in a setter method can be put into a trigger instead.


    Replace triggers can also be used with sequences, as can the other two types of
