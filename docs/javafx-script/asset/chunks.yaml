- fmt: '# EMPOWERING PRODUCTIVITY FOR THE JAVA™ DEVELOPER


    Available as a **PDF Electronic Book** or **Print On Demand**


    Apress’s **firstPress** series is your source for understanding cutting-edge technology.
    Short, highly focused, and written by experts, Apress’s firstPress books save
    you time and effort. They contain the information you could get based on intensive
    research yourself or if you were to attend a conference every other week—if only
    you had the time. They cover the concepts and techniques that will keep *you*
    ahead of the technology curve. Apress’s firstPress books are real books, **in
    your choice of electronic or print-on-demand format**, with no rough edges even
    when the technology itself is still rough. You can’t afford to be without them.


    Author of **JavaFX™ Script: Dynamic Java™ Scripting for Rich Internet/Client-Side
    Applications** *Inside Java™*


    Dear Reader,


    JavaFX Script was revealed at JavaOne 2007 as the tool that will enable developers
    to create rich content using the JavaFX family of products from Sun Microsystems.


    I wrote *JavaFX™ Script: Dynamic Java™ Scripting for Rich Internet/Client-Side
    Applications* because I am excited about the power and simplicity of using JavaFX
    Script to create rich internet applications that will run on many different platforms,
    including personal computers and mobile phones.


    I began developing Java applications in 1995 and have witnessed the capabilities
    and complexities of Java increase over time. I recognized the potential in JavaFX
    Script straight away when I saw how it can give content designers and application
    developers a simple, but powerful, language that has all the capability of Java
    behind it. For example, in JavaFX Script a simple declarative expression can define
    a user interface complete with platform-independent layout managers. Behind-the-scenes,
    Java facilities such as layout managers and Swing components are automatically
    employed to implement the desired user interface.


    My tutorial-style book will have you developing applications with JavaFX Script
    as quickly as possible. I lead you step-by-step through JavaFX Script concepts,
    with each concept building on your knowledge of the previous one. Exercises and
    sample solutions test your understanding throughout, help you learn even faster
    and, combined with the logical style of the tutorial, also provide a valuable
    course textbook or training companion. Complex information on JavaFX Script constructs,
    such as operators, are presented in tabular format which makes the book an easy-to-reference
    guide that you will turn to again and again. JavaFX Script is very new, and still
    changing. As it does, this book will be updated to reflect these changes.


    It is my hope that you’ll share my excitement about JavaFX Script and the potential
    it offers, and that you’ll enjoy working through the book to reach it.


    Regards,


    James L. (Jim) Weaver, SCJD


    October, 2007


    ---


