- fmt: "# `firstPress: Creating JavaFX Classes and Objects` 133\n\n- `insert *element*\
    \ into *sequence*`: This was used to insert Pluto. This form of the `insert` statement\
    \ adds the element to the end of the sequence. The more formal version of this\
    \ variation is `insert *element* as last into *sequence*`.\n\n- `insert *element*\
    \ as first into *sequence*`: This was used to insert the Sun. This form of the\
    \ `insert` statement inserts the element at the beginning of the sequence.\n\n\
    - `insert *element* before *sequence[index]*`: This was used to insert Uranus.\
    \ This form of the `insert` statement inserts the element before a specified element\
    \ that is already in the sequence.\n\n- `insert *element* after *sequence[index]*`:\
    \ This was used to insert Jupiter. This form of the `insert` statement inserts\
    \ the element after a specified element that is already in the sequence.\n\nIn\
    \ the Word Search Builder application, the `insert` statement is used in the `WordGridModel.addWord()`\
    \ operation to insert `WordGridEntry` instances into the sequence of unplaced\
    \ word grid entries, as shown following:\n\n```\ninsert wge into unplacedGridEntries;\n\
    ```\n\nThe `insert` statement is also used in the `WordGridModel.initializeGrid()`\
    \ operation to initially populate the sequence of `gridCells`:\n\n```\nfor (i\
    \ in [0.. (rows * columns) - 1]) {\n    insert WordGridCell{} into gridCells;\n\
    }\n```\n\nAs mentioned earlier, an insert trigger can be defined that executes\
    \ when an element is inserted into a sequence. See the following URL for details\
    \ on the insert trigger:\n\n[https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig.](https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig)\n\
    \n## Querying Sequences\n\nYou can query a sequence to retrieve a subset of its\
    \ elements. The example in Listing 4-9 shows examples of the two *list comprehension*\
    \ operators: `select` and `foreach`. Here are some excerpts:\n\n```\nsomePlanets\
    \ = select \"{planet},\" from planet in planets where planet.length() > 5;\nprintln(\"\
    The {sizeof somePlanets} planets with more than 5 characters are: {somePlanets}\"\
    );\n```\n\n`firstPress: Creating JavaFX Classes and Objects`\n\nThis `select`\
    \ query chooses all of the elements in the `planets` sequence that consist of\
    \ more than five characters. The result is held in a sequence referred to by the\
    \ variable named `somePlanets`. A variable named `planet` is implicitly created\
    \ that holds a reference to each element that matches the query. As you can see,\
    \ directly after the `select` operator, I decided to concatenate each element\
    \ that is returned with a comma before placing it in the `somePlanets` array.\n\
    \n```\n// Use foreach to query for all of the planets that begin with\n// the\
    \ letter \"N\" or later\nsomePlanets = foreach (planet in planets where planet\
    \ >= \"N\") \"{planet},\";\nprintln(\"The {sizeof somePlanets} planets in the\
    \ second half of the alphabet are: {somePlanets}\");\n```\n\nThe preceding `foreach`\
    \ query does nearly the same thing that the `select` query did, just using different\
    \ syntax. The only difference in functionality here is the criterion in the condition.\n\
    \nShown following is another example of a `foreach` query that returns a sequence\
    \ of numbers that are indexes into each element that matches the query. That sequence\
    \ of numbers is put between the square brackets of the `delete` statement so that\
    \ the elements at those indexes are deleted.\n\n```\n// Query for the indexof\
    \ Pluto and delete it\nprintln(\"Querying for the indexof Pluto\");\nvar indices\
    \ = foreach (planet in planets\n    where planet == \"Pluto\") indexof planet;\n\
    println(\"Pluto is in position {indices}\");\nif (sizeof indices >= 0) {\n   \
    \ println(\"Deleting Pluto\");\n    delete planets[indices];\n}\n```\n\nShown\
    \ following is another `select` query that retrieves all of the elements in the\
    \ `planets` sequence in reverse:\n\n```\nvar allPlanetsRunTogether = select planet\
    \ from planet in reverse planets;\n```\n\n## Deleting Sequence Elements\n\nTo\
    \ delete an element from a sequence, use the `delete` statement as shown in the\
    \ following excerpts from Listing 4-9:\n\n```\ndelete planets[0];\n```\n\n`firstPress:\
    \ Creating JavaFX Classes and Objects` 135"
