    你已了解了 JavaFX 如何通过其布局控件集（包括 `BorderPanel`、`Box`、`CardPanel`、`FlowPanel`、`GridBagPanel`、`GridPanel`、`GroupPanel`
    和 `StackPanel`）在跨平台环境中处理 UI 组件的放置。其中，你在练习中使用了 `BorderPanel` 和 `GridPanel` 类，演练了一个
    `Box` 类的示例，并了解了其余控件的描述和属性。


    你将在第 5 章中获得一些使用 `GroupPanel` 布局控件的经验。


    •


    你已了解了如何创建 JavaFX `ToolBar` 控件，以及如何在工具栏上创建并放置包含图标的按钮。


    •


    你已了解了 `SimpleLabel` 控件的用途和属性列表，并在练习中使用了它。你还了解到，JavaFX UI 中的许多类（包括 `SimpleLabel`）都从
    `Widget` 类继承其属性，并且你看到了其中的几个属性。


    在下一章中，我将帮助你理解如何创建 JavaFX 类并涵盖相关概念，其中一些概念我在本章中已经提及。我们将讨论的概念包括 JavaFX 类、操作、触发器、语句、运算符、表达式、数组、数据类型和访问修饰符。下一章的任务确实很艰巨，但你将学到很多东西！


    **资源**


    以下是一些你可以探索的 JavaFX 资源，以补充本章所学内容，并了解 JavaFX 的历史视角：


    *firstPress: Creating User Interfaces in JavaFX*


    •


    *Getting Started with the JavaFX Script Language (for Swing Programmers)*：这是 OpenJFX
    网站上的一个网页，重点介绍如何使用 JavaFX 声明式代码创建用户界面。正如我所提到的，JavaFX 的优势之一在于它能够利用 Java 代码。Java
    Swing 是一套高度进化且丰富的用户界面库，JavaFX 使用它来实现你用 JavaFX 声明式代码表达的内容。


    该资源探讨了许多这些 JavaFX UI 组件。其中一些材料对你来说是复习，但它也涵盖了一些本书范围之外的 UI 组件。网址是：


    [`openjfx.dev.java.net/Getting_Started_With_JavaFX.html.`](https://openjfx.dev.java.net/Getting_Started_With_JavaFX.html)


    •


    *Chris Oliver*：Chris 是 F3（现在称为 JavaFX）的创建者。要了解其创建者对 JavaFX 的历史（且非常有趣的）视角，你可以查看他的
    F3 博客：[`blogs.sun.com/chrisoliver/category/F3`](http://blogs.sun.com/chrisoliver/category/F3)
    以及他的 JavaFX 博客：[`blogs.sun.com/chrisoliver/category/JavaFX.`](http://blogs.sun.com/chrisoliver/category/JavaFX)


    *firstPress: Creating User Interfaces in JavaFX*


    **第 4 章**


    **创建 JavaFX 类和**


    **对象**


    *我按照我的想法来描绘对象，而不是按照我所见到的样子。*


    巴勃罗·毕加索


    既然你已经获得了一些在 JavaFX 中开发 UI 的经验，我想换个角度，更全面地向你展示如何定义类。在本章中，你将获得编写操作和函数以及*触发器*（触发器会在特定条件下自动调用）的理解和经验。你还将熟悉
    JavaFX 语句、表达式、*序列*（也称为数组）以及与创建类相关的其他概念。我将以上一章开始研究的 Word Search Builder 应用程序为背景，带你逐一了解这些内容。


    **测试 Word Search Builder 模型**


    图 4-1 放大了上一章图 3-12 中的 `wordsearch_jfx.model` 包，并展示了该包中类里的许多属性、操作和触发器。你会注意到，该图的左上角是一个名为
    `WordGridModelTester` 的新类，我们将使用它来独立测试模型，而不依赖于 `wordsearch_jfx.ui` 包中的 JavaFX 代码。

