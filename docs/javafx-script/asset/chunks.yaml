    Notice that both files are in the same package, so they are both located in the
    folder named jfx_book. When the code that references the HelloJFXModel class is
    encountered (see the following code snippet), the JavaFX runtime will look for
    a file named HelloJFXModel.fx in the jfx_book folder and make an instance of the
    class.


    var hellojfxModel =


    HelloJFXModel {


    greeting: "Howdy JavaFX Script Developer!"


    }


    The preceding code snippet is the minor modification that I told you about, by
    the way.


    It demonstrates the idea that you can declare variables in the midst of declarative
    code. In this case, I’ve moved this code snippet from directly above the declarative
    code block that begins with Frame to inside that block. You may have noticed that
    it was necessary to remove the semicolon from the end of the statement, because
    it is no longer a single statement, but rather part of the larger declarative
    expression. The variable that is declared only exists within the block in which
    it is declared, so the scope of the hellojfxModel variable is from the Frame opening
    curly brace to the matching closing curly brace. If we had declared it in the
    Canvas block, the scope would have been limited to that block.


    **Special Instructions for Running This Example with JavaFXPad** When using one
    of the IDEs, your project will have a base from which it will look for the necessary
    FX files at runtime. When using JavaFXPad, you have to tell it what that base
    folder is. In this case, it is the Chapter02 folder (if you’re using the code
    download for this book). From the Run ➤ Source Path menu option, choose the Chapter02
    folder. Run the HelloJFXBind2.fx file located in the Chapter02/jfx_book folder,
    and you should see the output in Figure 2-5 (note that it should now say “Howdy”
    instead of “Hello,” which will ensure that you’ve run the correct file).


