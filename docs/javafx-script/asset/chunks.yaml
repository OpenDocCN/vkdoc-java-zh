    In order to create the body of an operation, trigger, or function, you’ll need
    to understand what JavaFX *statements* and *operators* are available to you. Let’s
    dive into those now.


    *firstPress: Creating JavaFX Classes and Objects*


    **Using JavaFX Statements and Operators**


    So far in this book you’ve already examined and used several JavaFX statements
    and operators. For example, you’ve used the assignment operator (=) in exercises,
    you examined the for statement and the return statement earlier in this chapter,
    and you were exposed to the equality operator (==) earlier in this chapter as
    well. In this section, we’ll look at examples from the WordGridModel class in
    Listing 4-5 of several JavaFX statements and operators that I haven’t explained
    yet. Let’s start looking for statements and operators beginning in the placeWord()
    operation, and I’ll offer explanations as we encounter them.


    Note ➡ So that you can see the JavaFX statements in one place for reference purposes,
    Table 4-2 contains a list of them with a description of each. Tables 4-3 through
    4-7 contain this same type of reference for the JavaFX operators.


    **The if/else Statement**


    Please look at the excerpt shown following from the placeWord() operation: if
    (success) {


    return true;


    }


    The if statement performs the statements inside the required curly braces only
    if the condition (the Boolean expression inside the parentheses) evaluates to
    true.'
  trans: '

    触发器是 JavaFX 的关键特性，它们在实现其声明式编程模型中扮演着重要角色。你已经接触过一种触发器形式：*断言* *触发器*。此时还有两种适合介绍的触发器声明形式：


    •


    创建触发器


    •


    替换触发器


    *创建触发器*在包含它的类的新实例被创建时自动执行。创建触发器的用途与本章前面讨论过的、与类同名的特殊操作几乎相同。


    以下是从 WordGridCell 类摘录的一个创建触发器示例。我们将在本章稍后更详细地查看清单 4-11 中所示的 WordGridCell 类。


    *firstPress: 创建 JavaFX 类与对象* 117


    trigger on new WordGridCell {


    cellLetter = SPACE;


    // 生成随机字母，用于在不包含单词的情况下填充此单元格


    fillLetter = Character.forDigit(Math.random() * 26 + 10, 36).


    toString().toUpperCase();


    wordEntries = [];


    }


