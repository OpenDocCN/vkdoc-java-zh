    **The Keypad Exercise**


    In this exercise, you’ll create a JavaFX program that vaguely resembles the keypad
    and numeric display on a calculator. Here are the requirements for this exercise:


    •


    The keypad should have nine buttons, arranged in a three-by-three grid, with the
