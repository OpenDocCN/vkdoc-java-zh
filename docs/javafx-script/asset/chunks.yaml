    **CHAPTER 5**


    **More UI Fun Including 2D**


    **Drawing**


    *He [Mickey Mouse] popped out of my mind onto a drawing pad 20 years ago* *on
    a train ride from Manhattan to Hollywood at a time when business fortunes* *of
    my brother Roy and myself were at lowest ebb and disaster seemed right* *around
    the corner.*


    Walt Disney


    In the last chapter, you learned a lot about creating JavaFX classes and objects,
    including the details of creating the code for constructs such as operations and
    triggers. In this chapter, you’re going to focus again on UI programming, especially
    in an area that JavaFX


    excels at making simple: 2D graphics.


    **Understanding JavaFX 2D Graphics**


    JavaFX uses a powerful declarative syntax for 2D drawing, transformations, displaying
    images, and animation. There are many shapes available, such as lines, rectangles,
    polygons, and as you experienced in Chapter 2, the Text object is one of the available
    shapes.


    We’re going to put aside the Word Search Builder program for a moment and explore
    some examples of 2D drawing that will help you understand the rest of the code
    in the wordsearch_jfx.ui package. We’ll start with one that builds just a little
    on the HelloJFX.fx program, which was the first JavaFX program in this book. This
    program is located in the TextAndEllipse.fx file in the Chapter05/jfx_book folder
    of the source code download. Please go ahead and run the program, and the output
    should look like Figure 5-1.


    ![Image 36](index-162_1.png)


    *firstPress: More UI Fun Including 2D Drawing*


    *Figure 5-1\. Output of the TextAndEllipse.fx program*


    Let’s look at the new concepts in Listing 5-1 that are in addition to what you’ve
    already learned in the HelloJFX.fx program.


    *Listing 5-1\. The TextAndEllipse.fx Program*


    package jfx_book;


    import javafx.ui.*;


    import javafx.ui.canvas.*;


    Frame {


    title: "Text and Ellipse"


    height: 250


    width: 600


    visible: true


    content:


    Canvas {


    content: [


    Ellipse {


    transform: translate(300, 100)


    strokeWidth: 5


    stroke: red


    fill: white


    cx: 0


    cy: 0


    radiusX: 250


    radiusY: 50


    },


    Text {


    *firstPress: More UI Fun Including 2D Drawing* 149


    font:


    Font {


    faceName: "Sans Serif"


    style: BOLD


    size: 24


    }


    x: 120


    y: 90


    content: "This is Text and an Ellipse"


    }


    ]


    }


    }


    **Drawing and Painting Shapes**


    You already know that the Text class is actually a shape that can be drawn; in
    this program, you’ll learn how to draw an ellipse as well. As shown in Listing
    5-1, to define an ellipse, we’re defining the x and y coordinates (using the cx
    and cy attributes) of the center point of the ellipse, relative to the canvas
    on which it is being drawn. The horizontal radius of the ellipse is specified
    in the radiusX attribute and the vertical radius of the ellipse is specified in
    the radiusY attribute.


    To specify the outline width, color, and fill color for the Ellipse object, I’m
    using the same attributes you learned about with the Text object in Chapter 2,
    as shown here: strokeWidth: 5


    stroke: red


    fill: white


