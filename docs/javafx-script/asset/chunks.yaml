    version of this variation is insert *element* as last into *sequence.*


    •


    insert *element* as first into *sequence*: This was used to insert the Sun. This
    form of the insert statement inserts the element at the beginning of the sequence.


    •


    insert *element* before *sequence[index]*: This was used to insert Uranus. This
    form of the insert statement inserts the element before a specified element that
    is already in the sequence.


    •


    insert *element* after *sequence[index]*: This was used to insert Jupiter. This
    form of the insert statement inserts the element after a specified element that
    is already in the sequence.


    In the Word Search Builder application, the insert statement is used in the WordGridModel.addWord()
    operation to insert WordGridEntry instances into the sequence of unplaced word
    grid entries, as shown following:


    insert wge into unplacedGridEntries;


    The insert statement is also used in the WordGridModel.initializeGrid() operation
    to initially populate the sequence of gridCells:


    for (i in [0.. (rows * columns) - 1]) {


    insert WordGridCell{} into gridCells;


    }


    As mentioned earlier, an insert trigger can be defined that executes when an element
    is inserted into a sequence. See the following URL for details on the insert trigger:


    [https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig.](https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig)


    **Querying Sequences**


    You can query a sequence to retrieve a subset of its elements. The example in
    Listing 4-9


    shows examples of the two *list comprehension* operators: select and foreach.
    Here are some excerpts:


    somePlanets = select "{planet}," from planet in planets where planet.length()
    > 5;


    println("The {sizeof somePlanets} planets with more than 5 characters are:


    {somePlanets}");


    *firstPress: Creating JavaFX Classes and Objects*


    This select query chooses all of the elements in the planets sequence that consist
    of more than five characters. The result is held in a sequence referred to by
    the variable named somePlanets. A variable named planet is implicitly created
    that holds a reference to each element that matches the query. As you can see,
    directly after the select operator, I decided to concatenate each element that
    is returned with a comma before placing it in the somePlanets array.


    // Use foreach to query for all of the planets that begin with


    // the letter "N" or later


    somePlanets = foreach (planet in planets where planet >= "N") "{planet},"; println("The
    {sizeof somePlanets} planets in the second half of the alphabet are:


    {somePlanets}");


    The preceding foreach query does nearly the same thing that the select query did,
    just using different syntax. The only difference in functionality here is the
    criterion in the condition.


    Shown following is another example of a foreach query that returns a sequence
    of numbers that are indexes into each element that matches the query. That sequence
    of numbers is put between the square brackets of the delete statement so that
    the elements at those indexes are deleted.


    // Query for the indexof Pluto and delete it


    println("Querying for the indexof Pluto");


    var indices = foreach (planet in planets


    where planet == "Pluto") indexof planet;


    println("Pluto is in position {indices}");


    if (sizeof indices >= 0) {


    println("Deleting Pluto");


    delete planets[indices];


    }


    Shown following is another select query that retrieves all of the elements in
    the planets sequence in reverse:


    var allPlanetsRunTogether = select planet from planet in reverse planets; **Deleting
    Sequence Elements**


    To delete an element from a sequence, use the delete statement as shown in the
    following excerpts from Listing 4-9:


    delete planets[0];


