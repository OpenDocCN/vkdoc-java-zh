    **Understanding the Structure of a JavaFX Class**


    Looking at the top of the preceding listing, you’ll see some familiar JavaFX concepts
    from earlier chapters, such as the package declaration, import statements, and
    attribute declarations. As shown in the following code snippet, the attribute
    named wordGridModel being defined in this class is of type WordGridModel, which
    means it is capable of holding a reference to an instance of the WordGridModel
    class. In addition to attribute declarations, a class definition may have operation
    declarations, as shown here: class WordGridModelTester {


    attribute wordGridModel:WordGridModel;


    operation runTest();


    operation printGrid();


    }


    Note ➡ As you’ll see a little later, class definitions may also have function
    declarations. A JavaFX


    function contains a subset of the features of a JavaFX operation.


    **Understanding Attribute Initializers**


    The initialization for an attribute occurs outside of the class definition, as
    shown in the following *attribute initializer* from the current example: attribute
    WordGridModelTester.wordGridModel = new WordGridModel(7, 6); Notice that in an
    attribute initializer, the attribute must be qualified with the class name.


    In this particular case, the value being assigned to the wordGridModel attribute
    is a reference to a new instance of the WordGridModel class. We’ll need this reference
    in order to call operations of the WordGridModel instance as we’re putting it
    though its paces.


    If an attribute is not initialized, it is assigned a default value based upon
    its data type.


    I’ll cover the basic (also known as *primitive*) data types and their default
    values a little later in this chapter.


    *firstPress: Creating JavaFX Classes and Objects*


    **Introducing Triggers**


    One of the features of JavaFX that makes declarative scripting work well in conjunction
    with classes is the concept of a trigger. A trigger, as you would expect, is run
    automatically when a particular condition occurs. The triggers in this class are
    a less frequently used form of trigger, but they’re very handy nonetheless. One
    of these triggers is run when an assert statement, as shown following, is executed:


    assert wordGridModel.placeWord("red") == false;


    The preceding statement asserts that passing the word *red* into the placeWord()
    operation of the wordGridModel object will return false.


    Note ➡ The equality operator consists of two equal signs (==) and compares the
    value of the expression on its left with the expression on its right. If the expressions
    are equal, then the value of the expression that contains the equality operator
    is true.


    If this turns out to be the case, the following trigger will automatically be
    executed: trigger on assert assertion {


    println("Assertion passed!");


    }


    If, however, this turns out not to be the case, the following trigger will be
    run instead: trigger on not assert assertion {


    println("Assertion failed!");


    }


    I’d like to reiterate that this form of trigger (trigger on assert assertion),
    and the assert statement itself, are used primarily for testing. There are much
    more common forms of the trigger statement that we’ll discuss a little later.


