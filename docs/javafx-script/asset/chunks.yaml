    *firstPress: Creating JavaFX Classes and Objects* 111


    **Defining and Using Named Instances (Constants)**


    Having used constants in earlier exercises to represent colors and fonts, you’ve
    experienced one of the benefits of using them, which is that a familiar name (e.g.,
    blue or BOLD) can be used to represent values. Another benefit is that the values
    contained in a named instance can be changed in one place (where it is defined),
    and any code that uses it will reflect the change.


    An example of defining a named instance in the WordGridModel class is shown following:


    // Constant that indicates that an operation


    // pertains to no cell. Used as an argument to highlightWordsOnCell() NO_CELL:Integer
    = -1;


    This creates an integer that has the value of -1 and is given the name NO_CELL.


    Wherever NO_CELL:Integer is used, it represents an integer with the value of -1—for
    example, in the following code located in the WordGridModel.highlightWordsOnCell()
    operation in Listing 4-5:


    if (cellNum <> NO_CELL:Integer) {


    In this particular case, the type of the named instance is one that is supplied
    by JavaFX.


    You can create named instances of types that you define as well. For example,
    take a look at this excerpt from the WordGridRect class, which is located in the
    wordsearch_jfx.ui package that we’ll examine in the next chapter:


    // Constants


    SELECTED_LOOK:WordGridRect = WordGridRect {name: "SELECTED_LOOK"}; SELECTED_FIRST_LETTER_LOOK:WordGridRect
    =


    WordGridRect {name: "SELECTED_FIRST_LETTER_LOOK"}; DRAGGING_LOOK:WordGridRect
    = WordGridRect {name: "DRAGGING_LOOK"}; CANT_DROP_LOOK:WordGridRect = WordGridRect
    {name: "CANT_DROP_LOOK"}; DEFAULT_FIRST_LETTER_LOOK:WordGridRect =


    WordGridRect {name: "DEFAULT_FIRST_LETTER_LOOK"}; DEFAULT_LOOK:WordGridRect =
    WordGridRect {name: "DEFAULT_LOOK"}; Note ➡ You probably noticed in the preceding
    code excerpt that the syntax on the right side of the assignment (=) operator
    is the object literal syntax. The appearance is different from other examples
    that I’ve shown you, however, in that each object literal uses only one line.
    I use this appearance whenever there are several object literals to define and
    they don’t have many attributes.


    *firstPress: Creating JavaFX Classes and Objects*


    Here is an example of using these named instances in the


    WordGridModel.canPlaceWordSpecific() operation from Listing 4-5. Their purpose
    is to influence the appearance of the cells on the word grid.


    if (cellAppearance == DRAGGING_LOOK:WordGridRect) {


    gridCells[yPos * columns + xPos].appearance = DRAGGING_LOOK;


    }


    else if (cellAppearance == CANT_DROP_LOOK:WordGridRect) {


    gridCells[yPos * columns + xPos].appearance = CANT_DROP_LOOK;


    }


    else if (i == 0) {


    // This is the first letter of the word


    gridCells[yPos * columns + xPos].appearance = DEFAULT_FIRST_LETTER_LOOK;


    }


    else {


    gridCells[yPos * columns + xPos].appearance = DEFAULT_LOOK;


    }


    Looking at the first line in excerpt, please notice that the name of the DRAGGING_LOOK
    constant is qualified by the type, but that the name of the DRAGGING_LOOK constant
    isn’t qualified in the second line of this example. This is because when assigning
    a named instance to an attribute (or any variable) of the same type, it is not
    necessary to qualify the named instance with its type. You’ll recall that in Chapter
    2


    the color- and font-related named instances didn’t have to be qualified by their
    types to assign them to attributes in declarative code either.


    Now that you understand how to define and use named instances, we’ll examine further
    how to create and use operations and functions.


    **Creating Operations and Functions**


    You’ve already been working with operations in some of the exercises, but there
    are a few details that I haven’t covered yet. In this section, you’ll also learn
    how to create and use functions. Let’s start with showing you how to define the
    *parameters* of an operation and its optional *return type*.


    **Defining the Parameters and Return Type of an Operation** Some operations require
    that *arguments* be passed into them, and some don’t. Also, some operations return
    a value after being invoked, and some don’t. The name of an operation plus the
    configuration of the required arguments and the optional return type is called
    an


    *firstPress: Creating JavaFX Classes and Objects* 113


    operation’s *signature*. An operation’s signature is defined in the class definition,
    as the following excerpt from the WordGridModel class definition illustrates:
    public operation canPlaceWordSpecific(word:String, row:Integer, column:Integer,
    direction:Integer,


    cellAppearance:WordGridRect):Boolean;


    public operation selectPlacedWord(word:String);


    public operation unplaceWord(word:String):Boolean;


    public operation unplaceGridEntries();


    public operation addWord(word:String):Boolean;


    public operation deleteWord(word:String):Boolean;


    public operation highlightWordsOnCell(cellNum:Integer);


    In the preceding excerpt, you can see that if an operation has any parameters,
    they are specified within the parentheses following its name. Each parameter is
    defined by supplying a parameter name, a colon, and its type. Notice that some
    of the parameter types are one of the four basic data types, and one them (cellAppearance:WordGridRect)
    is an object type.


    Please also notice that some of these operation declarations contain a colon followed
    by a data type after the closing parenthesis. This indicates that the operation
    returns a value, and therefore has a return statement that returns a value of
    that type in the body of the operation.


    To invoke an operation that contains parameters, you specify the name of the operation
    followed by a comma-separated list of values, enclosed in parentheses, which match
    the order and types of the parameters. The following code excerpts are examples
    from various FX files in the Word Search Builder program of invoking some of the
    operations shown in the previous code excerpt:


    if (not canPlaceWordSpecific(word, row, column, direction, DEFAULT_LOOK:WordGridRect))
    {


    return false;


    }


    wgModel.selectPlacedWord(wge.word);


    wgModel.unplaceGridEntries();


    if (wgModel.unplaceWord(wge.word)) {


    wgModel.placeWordSpecific(wge.word,


    wge.row,


    wge.column,


    newOrient);


    wgModel.highlightWordsOnCell(wge.row * columns +


    wge.column);


    }


