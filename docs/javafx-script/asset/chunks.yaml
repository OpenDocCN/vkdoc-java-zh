    As you already know, the code contained in an operation is located in that operation’s
    body. Take a look at the body of the following addWord() operation, and compare
    it with the declaration of the preceding addWord() operation. You’ll notice that
    the data types for the parameters and return value expressed in the operation
    declaration don’t have to be repeated in the body of the operation. You’ll also
    notice that *access modifiers* (such as public in this case) are specified in
    the operation declaration and aren’t allowed to be specified in the operation
    body.


    operation WordGridModel.addWord(word) {


    if (getGridEntryByWord(word) == null) {


    var wge = WordGridEntry {


    word: word


    };


    insert wge into unplacedGridEntries;


    return true;


    }


    else {


    return false;


    }


