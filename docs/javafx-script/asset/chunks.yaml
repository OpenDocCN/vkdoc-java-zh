    **理解 JavaFX 布局控件**


    为不同平台设计用户界面面临诸多挑战，其中最主要的是不同平台上的 UI 组件在大小、外观和行为上通常存在差异。UI 组件的绝对定位可能适用于单一平台，但当您的
    UI 需要在多个平台上良好运行时，就需要一种布局策略，使 UI 组件相对于彼此及其上下文进行定位。JavaFX *布局控件* 是解决此问题的一种非常简单且强大的方案。


    布局控件有几种类型，它们可以协同使用以实现所需的组件放置。您刚刚在图 3-16 和清单 3-4 中看到的 BordersExample.fx 程序


    ![图 28](img/index-76_1.png)


    *firstPress: 使用 JavaFX 创建用户界面*


    就是一个简单 UI 设计的良好示例，它只需要一个布局控件：GridPanel 布局控件。


    **使用 GridPanel 布局控件**

