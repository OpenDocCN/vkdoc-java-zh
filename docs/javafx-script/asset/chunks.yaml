    再次选择“网格 ➤ 显示填充字母”菜单选项（或按 Ctrl+F）将从网格中移除填充字母。


    要将单词从网格的一个位置拖到另一个位置，请单击并拖动单词的第一个字母。当单词可以放置到当前位置时，被拖动单词的背景会变为青色，光标会变为手形图标。图 3-9
    展示了这一行为的一个示例，其中 *MARS* 正被拖动以与 *MERCURY* 中的 *M* 相交。


    *图 3-9：将单词 MARS 拖动到可放置的位置*


    ![Image 21](img/index-49_1.png)


    ![Image 22](img/index-49_2.png)


    *firstPress：使用 JavaFX 创建用户界面*


