    \ the letter at a specified row and column of the grid.\n */\nfunction WordGridModel.getLetter(row,\
    \ column) {\n    return gridCells[row * columns + column].cellLetter;\n}\n```\n\
    \n既然我们已经探讨了操作和函数，让我们更仔细地看看 JavaFX 触发器。\n\n## 理解 JavaFX 触发器"
  raw: 'Note ➡ As of this writing, access modifiers are not fully implemented in JavaFX,
    but when they are, there may be four of them, as in Java: public, private, protected,
    and default (no modifier). A public operation, function, or attribute may be accessed
    from any other class. A private operation, function, or attribute may only be
    accessed from within the same class. An operation, function, or attribute with
    no access modifier (default) may be accessed from any class within the same package.
    A protected operation, function, or attribute may be accessed from any class within
    the same package, or any subclass regardless of what package it is in. Another
    recent proposal states that there would be only three access modifiers: public,
    protected, and private (which would be the default).


    We’ll take a closer look in a bit at what the body of an operation may contain,
    including JavaFX statements and operators. Let’s turn our attention now, however,
    to a specially named operation that executes when an instance is created with
    the new operator.


    **Understanding the Effects of the new Operator**


    Sometimes it is desired for some code to be automatically executed when an instance
    of an object is created. The purpose for running this code is typically to initialize
    the state of the


    *firstPress: Creating JavaFX Classes and Objects* 115


    object. There are two ways of doing this in JavaFX, which correspond to two ways
    of creating an instance of an object shown earlier. Recall that these two ways
    are as follows:


    •


    Using an object literal, which is the most typical way of creating new instances
    in JavaFX


    •


    Using the new operator, as shown following:


    var wgModel = new WordGridModel(9, 9);


    Let’s explore the latter option now, and we’ll discuss the former option in a
    moment in the context of the trigger keyword.


    In the preceding code excerpt, the new operator is followed by the name of the
    class that you’d like to create an instance of, which is followed by a comma-separated
    list of arguments enclosed in parentheses. Using this syntax causes an operation
    with the same name as the class to be invoked, in this case the WordGridModel
    operation located in the WordGridModel class from Listing 4-5, whose declaration
    is shown following: public operation WordGridModel(rows:Integer, columns:Integer);
    Here is the body of the WordGridModel operation from Listing 4-5:


    /**


    * A method that acts as a constructor for the WordGridModel class


    */


    operation WordGridModel.WordGridModel(rows, columns) {


    this.rows = rows;


    this.columns = columns;


    selectedPlacedWordIndex = -1;


    unplacedGridEntries = [];


    placedGridEntries = [];


    gridCells = [];


    fillLettersOnGrid = false;


    initializeGrid();


    }


    Notice that in the method just shown, a keyword named this is used to access the
    rows and columns attributes of the new instance of the WordGridModel class, which
    distinguishes the attributes from the values that were passed into the WordGridModel
    operation. As with any operation (or function or trigger), these passed-in values
    become local variables as if they had been declared with the var keyword. Incidentally,
    the this keyword is available for use in any operation, and its purpose is to
    provide a reference to the current instance of the class.


    Speaking of functions, let’s go ahead and discuss how to create one.


    *firstPress: Creating JavaFX Classes and Objects*


    **Creating JavaFX Functions**


    A JavaFX *function* has a subset of the capabilities of an operation. It can only
    contain var declarations and a return statement. Shown following is an example
    of a function declaration from the WordGridModel class in Listing 4-5:


    private function getLetter(row:Integer, column:Integer):String; Here is the body
    of the getLetter() function:


    /**


    * Returns the letter at a specfied row and column of the grid.


    */


    function WordGridModel.getLetter(row, column) {


    return gridCells[row * columns + column].cellLetter;


    }


    Now that we’ve explored operations and functions, let’s take a closer look at
    JavaFX


    triggers.


    **Understanding JavaFX Triggers**'
