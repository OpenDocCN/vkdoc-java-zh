    \ except that execution immediately continues to the next iteration of the `for`\
    \ or `while` statement, where the condition is evaluated to see if any more iterations\
    \ are warranted.\n\nIncidentally, you may have spotted a couple more relational\
    \ operators in this excerpt, namely the *greater than operator* (`>`) and the\
    \ *inequality operator* (`<>`). There are also a couple of Boolean operators (the\
    \ `or` and the `and` operators) in this excerpt.\n\nNow I’ve got an exercise for\
    \ you that will help you internalize several of the concepts that you’ve learned\
    \ in this chapter so far.\n\n## The Appointments Exercise\n\nIn this exercise,\
    \ you will create a class named `Appointment` (in its own FX file) that represents\
    \ an appointment having month, day, year, hour, and so forth as attributes. You\
    \ will also create a JavaFX program named `AppointmentTester.fx` that tests the\
    \ functionality of the `Appointment` class. Here are the functionality requirements\
    \ of the `Appointment` class:\n\n- It must have at least the following attributes:\n\
    \  - `month:Integer` (the month of the appointment).\n  - `day:Integer` (the day\
    \ of the month of the appointment).\n  - `year:Integer` (the year of the appointment).\n\
    \  - `hour:Integer` (the start time of the appointment, which always begins on\
    \ the hour).\n  - `pm:Boolean` (false if am, true if pm).\n  - `durationHours:Number`\
    \ (the appointment’s duration in hours).\n- It must have at least the following\
    \ operations:\n  - An `isConflict(otherAppt:Appointment):Boolean` operation into\
    \ which you can pass another instance of the `Appointment` class. The `isConflict()`\
    \ operation should return a Boolean value indicating whether the two appointments\
