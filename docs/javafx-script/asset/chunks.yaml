    **文件** ➤ **打开** 菜单，浏览到 `Chapter03/wordsearch_jfx/ui` 文件夹，并打开 `WordSearchMain.fx`
    文件。


    图 3-1 展示了应用程序首次启动时的界面。请注意，它包含一个菜单、一个工具栏、左侧的一个单词网格以及右侧的两个列表框。上方的列表框包含未放置的单词，即单词列表中尚未放置到单词网格中的单词。下方的列表框则包含已经放置好的单词。


    *图 3-1. 单词搜索生成器应用程序启动界面*


    ![Image 13](img/index-45_1.png)


    ![Image 14](img/index-45_2.png)


    *firstPress: 在 JavaFX 中创建用户界面*


    **应用程序概览**


    要向“未放置单词”列表中添加单词，你可以通过以下几种方式之一进行操作：


    •


    选择 **单词列表** ➤ **添加单词** 选项。


    •


    点击最右侧的工具栏按钮。


    •


    按下 Insert 键（如果你的键盘上有此键）。


    以上任一操作都会弹出如图 3-2 所示的对话框，你可以在其中输入一个单词，然后点击 **确定** 按钮（或按下 Enter 键）。


    *图 3-2. 向单词列表添加单词对话框*


    在添加了我们太阳系中八大行星的名称（抱歉，冥王星）之后，“未放置单词”列表框的外观应如图 3-3 所示。


    *图 3-3. 将行星添加到单词列表后*


    要将单词放置到网格中你选择的某个位置和方向上，可以选择 **网格** ➤ **放置单词** 菜单选项，或者点击最左侧的工具栏按钮。你应该会看到如图 3-4
    所示的对话框，你可以在其中选择起始行、起始列以及单词的方向。


    ![Image 15](img/index-46_1.png)


    ![Image 16](img/index-46_2.png)


    *firstPress: 在 JavaFX 中创建用户界面*


    *图 3-4. 在网格上放置单词对话框*


    以这种方式放置了前两个行星后，应用程序的外观如图 3-5 所示，这些单词既出现在单词网格中，也出现在“已放置单词”列表框中。


    *图 3-5. 放置前两个行星后的单词搜索生成器应用程序*


    ![Image 17](img/index-47_1.png)


    ![Image 18](img/index-47_2.png)


    *firstPress: 在 JavaFX 中创建用户界面*


    要将单词随机放置在网格上，请在“未放置单词”列表框中选中该单词，然后选择 **网格** ➤ **随机放置单词** 菜单选项。大多数菜单选项都有加速键（快捷键），你可以在下拉菜单中看到它们。例如，此选项也可以通过
    `Ctrl+R` 快捷键组合来调用。另一种调用此选项的方式是双击“未放置单词”列表中要放置的单词。无论以何种方式调用，结果都会弹出一个对话框，要求你确认是否真的要放置该单词，如图
    3-6 所示。


    *图 3-6. 在网格上随机放置单词对话框*


    要随机放置所有剩余的单词，请选择 **网格** ➤ **随机放置所有单词** 菜单选项。在点击确认对话框中的“确定”按钮（该对话框要求你确认是否要放置所有单词）后，所有单词都将被放置在网格上，并且也会出现在“已放置单词”列表框中。如果将光标悬停在单词网格中的某个字母上，相关的单词将会以黄色高亮显示。如果在某个字母上右键单击鼠标（或按住
    Ctrl 键的同时单击鼠标），则会弹出一个菜单，允许你取消放置这些单词，如图 3-7 所示。


    *图 3-7. 将剩余行星随机放置在单词网格上并调用某个字母的弹出菜单后*


    ![Image 19](img/index-48_1.png)


    ![Image 20](img/index-48_2.png)


    *firstPress: 在 JavaFX 中创建用户界面*


    要用随机字母填充网格中剩余的单元格，请选择 **网格** ➤ **显示填充字母** 菜单选项，或按下 `Ctrl+F` 组合键。单词网格应会显示出来，类似于图
    3-8 所示的样子。

