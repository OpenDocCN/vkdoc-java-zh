    Notice that to programmatically show and hide the dialog box, you use the show()
    and hide() operations of the Dialog class.


    **Experiencing the GroupPanel Layout**


    This dialog uses a layout widget named GroupPanel that is very useful, among other
    things, for laying out dialog boxes. As shown in Listing 5-10, to use the GroupPanel
    layout, you define each Row and Column, and then place widgets in those rows and
    columns. This layout makes it easy to create rows of neatly aligned labels and
    values, as shown in the top of Figure 5-10.


    *firstPress: More UI Fun Including 2D Drawing*


    **Using the RadioButton Widget**


    A radio button gives the user a group of mutually exclusive choices, as shown
    in Figure 5-10\. To associate RadioButton widgets with a group, create a ButtonGroup
    as shown in Listing 5-10, and assign it to the buttonGroup attribute of each RadioButton
    you want in that group.


    **More JavaFX UI Components**


    While I’ve shown you many of the JavaFX UI components, there are many more available.


    Table 5-4 contains some of the more commonly used, and interesting, UI components.


    *Table 5-4\. Some More JavaFX UI Components*


