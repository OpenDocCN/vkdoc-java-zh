    **wordsearch_jfx.ui 包中的声明式代码和类** wordsearch_jfx.ui 包由构成 Word Search Builder 应用程序
    UI（即视图）的类组成。该应用程序从 WordSearchMain.fx 中的声明式代码开始执行。图中 wordsearch_jfx.ui 包左侧下方的列显示了
    WordSearchMain.fx 文件中 UI 类的包含层次结构。


    注意 ➡ 我采用了一种命名约定，将第一个被调用的 FX 文件命名为


    [Something]Main.fx。


    WordSearchMain.fx 文件包含创建大部分用户界面的声明式代码。它在概念上与 HelloJFXBind2.fx 文件类似，但功能大大扩展了。


    WordSearchHandlers 类用于处理用户与 UI 交互时发生的*事件*。当选择菜单项和工具栏按钮时，通常会调用 WordSearchHandlers
    类中的关联方法。我采用一种约定，将 WordSearchHandlers 类中的处理程序方法命名为关联菜单选项的拼接。例如，如类图所示，WordSearchHandlers
    类中有一个名为 gridPlaceWord() 的操作。当用户选择“网格 ➤ 放置单词”菜单选项时，会调用该操作。通常，当需要显示对话框以从用户处收集更多信息、确认选择或显示消息时，Word
    Search Builder 应用程序会调用 WordSearchHandlers 类中的操作。


    如带箭头的虚线所示，WordGridView 类的一个实例存在于包含层次结构中的 Canvas 实例内。它是一个自定义组件，负责绘制和管理单词网格，包括显示字母和提供单词拖拽/重定向功能等功能。


    WordGridRect 类本质上是一个二维矩形，并添加了此应用程序所需的某些功能，在网格单元级别为 WordGridView 类提供辅助。单词网格中的每个单元都会创建该类的一个实例。请注意图中
    WordGridRect 类上方线条附近的星号 (*)。这意味着可能有多个 WordGridRect 实例与 WordGridView 实例相关联。


    *firstPress：使用 JavaFX 创建用户界面*


    WordGridRect 类还包含与单元外观相关的常量（例如，DRAGGING_LOOK 和 SELECTED_LOOK）。


    如带箭头的虚线所示，WordListsView 类的一个实例存在于包含层次结构中的 BorderPanel 实例内。它是一个自定义组件，负责创建、显示和管理“未放置单词”和“已放置单词”列表框。


    现在你已经对 wordsearch_jfx.ui 包中的架构有了概述，让我们将注意力转向 wordsearch_jfx.model 包。


    **wordsearch_jfx.model 包中的类**


    wordsearch_jfx.model 包由包含应用程序模型（表示数据的对象）的类组成。


    WordGridModel 类是负责保存模型的主要类。例如，如类图所示，该类的属性之一是 fillLettersOnGrid。该属性保存填充字母当前是否显示在网格上的状态。如前所述，当填充字母显示在网格上时，许多菜单选项和工具栏按钮需要被禁用。为了实现这一点，如从该类的
    fillLettersOnGrid 属性出发的两条虚线所示，某些菜单项和工具栏按钮的 enable 属性被绑定到 fillLettersOnGrid 属性。这是
    bind 运算符如何帮助应用程序视图与模型保持同步的一个示例。这个 WordGridModel 类还具有为模型提供功能的操作。例如，当调用 addWord()
    操作时（由 WordSearchHandlers 类中的 wordListAddWord() 方法调用），该操作中的逻辑会导致一个 WordGridEntry
    被添加到 WordGridModel 实例中的 unplacedGridEntries 数组中。如从 unplacedGridEntries 和 placedGridEntries
    属性出发的虚线所示，“未放置单词”和“已放置单词”列表框被绑定到这些数组，因此当这些数组的内容发生变化时，它们会自动更新。

