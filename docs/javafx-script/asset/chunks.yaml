- fmt: "# 排版后的内容\n\nCreate a JavaFX program modeled after the `ForRangeExample.fx`\
    \ program that prints the square of each number from 0 to 10. Please use the `for`\
    \ statement with a range expression, and use the multiplication operator (`*`)\
    \ to compute the square of each number. Each line of output should contain a sentence\
    \ that includes both the number and its square. The program should be in a file\
    \ named `SquaredNumbers.fx` that defines a class named `SquaredNumbers` and declares\
    \ a package name of `chapter4`.\n\nFigure 4-2 is a screenshot of the output of\
    \ a solution to this exercise.\n\n![Image 34](index-108_1.png)\n\n*firstPress:\
    \ Creating JavaFX Classes and Objects*\n\n*Figure 4-2. Output of the Squared Numbers\
    \ exercise*\n\nHave fun with this exercise!\n\nNow that you’ve studied the code\
    \ in the `WordGridModelTester.fx` program and have used it to test the functionality\
    \ of the `WordGridModel` class, I’d like to show you more JavaFX concepts by gleaning\
    \ them from the `WordGridModel` class.\n\n## Examining the Model Behind the Word\
    \ Search Grid\n\nThe class that you’re about to examine represents much of the\
    \ model behind the views of the Word Search Builder application. Its operations,\
    \ functions, triggers, and bind operators provide much the *controller* functionality\
    \ that is a part of the model-view-controller pattern that JavaFX is designed\
    \ to support. This controller functionality provides model-related services to\
