    如清单 3-2 所示，要在 Frame 中创建菜单，首先需要创建一个 MenuBar 小部件的实例来容纳它们，方法是将一个 MenuBar 赋值给 Frame
    的 `menubar` 属性。


    **创建 Menu 小部件**


    要在 MenuBar 上创建菜单，需要将它们赋值给 MenuBar 的 `menus` 属性。


    回顾一下，要将多个对象赋值给一个属性，需要使用数组字面量表示法，即用方括号括起逗号分隔的值。请注意，在 JavaFX 中数组也称为序列，因此在本书中我会交替使用这两个术语。


    如清单 3-2 中的 Grid 菜单所示，Menu 小部件有几个可用的属性，包括：


    *   一个 `text` 属性，用于确定菜单上的标签（在本例中为单词 *Grid*）。

    *   一个 `mnemonic` 属性，用于指定一个可以与 Alt 键结合使用来调用该菜单的按键（在本例中为字母 *G*）。


    *firstPress: Creating User Interfaces in JavaFX*


    *   一个 `items` 属性，用于存放菜单项，如下一节所述。该属性也可以存放 Menu 小部件，以便定义多级菜单结构。


    **创建 MenuItem 小部件**


    如清单 3-2 中的 Place Word 菜单项所示，要在 Menu 上创建菜单项，需要使用数组字面量表示法将它们赋值给 Menu 小部件的 `items`
    属性。


    MenuItem 小部件有几个可用的属性，包括：


    *   一个 `text` 属性，用于确定 MenuItem 上的标签（在本例中为文本 *Place Word..*）。

    *   一个 `mnemonic` 属性，用于指定一个可以与 Alt 键结合使用来调用该 MenuItem 的按键（在本例中为字母 *P*）。

    *   一个 `accelerator` 属性，用于定义调用 MenuItem 的快捷键，该快捷键借助 `Accelerator` 类的 `modifier`
    和 `keystroke` 属性来定义。在本例中，快捷键组合是 Ctrl+P。

    *   一个 `enabled` 属性，用于控制 MenuItem 是启用还是禁用。在本例中，如图 3-12 所示，`enabled` 属性的值绑定到 `WordGridModel`
    的 `fillLettersOnGrid` 属性的状态。由于使用了 `not` 运算符，当 `fillLettersOnGrid` 为 `false` 时，此
    MenuItem 被启用；当 `fillLettersOnGrid` 为 `true` 时，此 MenuItem 不被启用。

    *   一个 `action` 属性，用于定义当动作事件发生时（即用户选择此 MenuItem 时）应调用哪个操作或函数。为此，需要像清单中所示的那样，将一个操作或函数赋值给
    `action` 属性。在本例中，会调用 `WordSearchHandlers` 实例的 `gridPlaceWord()` 操作（稍后您将看到这个 `WordSearchHandlers`
    实例是在哪里创建的）。我将在第 4 章详细讨论操作和函数，并在第 5 章进一步讨论事件。


    MenuItem 是菜单结构中的叶节点，不能包含其他 MenuItem 小部件。


    *firstPress: Creating User Interfaces in JavaFX*


    注意 ➡ 您可能已经注意到，将 `Accelerator` 实例赋值给 `accelerator` 属性时，不需要在包含其属性的花括号前提到 `Accelerator`
    类。这是因为 MenuItem 的 `accelerator` 属性只能被赋值为 `Accelerator` 类的实例，所以不存在歧义（与指定一个超类、其任何子类都可以被赋值的属性不同）。在您阅读完下一章后，这个解释可能会更有意义，但我还是想在这里指出来。顺便提一下，出于刚才解释的原因，在将
    `MenuBar` 赋值给 `Frame` 类的 `menuBar` 属性时，也不需要提到 `MenuBar` 类。


    **创建 CheckBoxMenuItem 小部件**


    如清单 3-2 中的 Show Fill Letters 菜单项所示，有一种特殊的菜单项，名为 `CheckBoxMenuItem`，它的行为类似于复选框，因为它保存了当前是否被选中的状态。当用户选择这种菜单项时，`selected`
    属性的状态会在 `true` 和 `false` 之间切换。在本例中，该状态绑定到 `WordGridModel` 的 `fillLettersOnGrid`
    属性，因此前面描述的绑定行为会影响此 `CheckBoxMenuItem` 的状态。此外，每当一个其值可由用户更改的 UI 小部件被绑定时，该绑定就变成了双向绑定。对于这个
    Show Fill Letters CheckBoxMenuItem，当用户使其被选中时，`WordGridModel` 的 `fillLettersOnGrid`
    属性的状态变为 `true`。当用户使其被取消选中时，`WordGridModel` 的 `fillLettersOnGrid` 属性的状态变为 `false`。这是绑定运算符的另一个非常强大的方面。


    `CheckBoxMenuItem` 小部件有一个本示例未使用的事件相关属性，名为 `onChange`。每当用户选择一个 `CheckBoxMenuItem`
    时，就会发生 `onChange` 事件，并且被赋值给该属性的操作或函数会被调用，同时将当前是否被选中的状态作为参数传递。


    **视觉上分隔菜单项**


    如图 3-13 所示，有时用一条线在视觉上分隔菜单项是很有用的。


    这允许您将相关的菜单项分组在一起。为此，可以在所需的菜单项之间使用 `MenuSeparator` 小部件，如清单 3-2 所示。


    *firstPress: Creating User Interfaces in JavaFX*


    **菜单相关小部件表**


    供您参考，表 3-1 包含了与菜单相关的 JavaFX 小部件。在“公共属性”列中，显示了属性名称及其类型，两者用冒号分隔（正如您稍后将看到的，JavaFX
    类中公共的属性对您的应用程序是可访问的）。如果该属性可以存放一个实例数组，则类型后面会跟一个星号（*）。如果某个属性是可选的，则类型后面会跟一个问号（?）。


    这种表示法与图 3-12 中的图表以及 JavaFX 类中属性的定义方式一致。数据类型将在下一章详细讨论，但我希望您现在就能看到此表中每个属性对应的数据类型，以便作为参考。


    这些类型要么是四种基本的 JavaFX 类型之一（`String`、`Boolean`、`Number` 和 `Integer`），要么是一个 JavaFX
    类，您可以在我之前提到的 Project OpenJFX 网站下载中看到其源代码。您可以在该下载中看到此表中所有类（以及本书中任何其他表格）的源代码。


