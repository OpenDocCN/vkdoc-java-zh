- fmt: "与清单5-1不同，`Canvas`对象的`content`属性并不包含一个含有`Ellipse`对象和`Text`对象的序列。相反，它包含一个单独的`Group`对象，该对象的`content`属性持有一个包含`Ellipse`和`Text`对象的序列。\n\
    \n可以为组指定变换，这些变换将应用于组中的所有图形对象。此外，`Group`拥有自己的坐标空间，该空间由该`Group`中包含的所有图形对象共享，因此`Group`中任何对象指定的坐标都是相对于该`Group`的坐标空间的。这就是为什么`Text`节点的`x`和`y`属性被赋予的值与清单5-1中赋予的值截然不同的原因。\n\
    \n请查看清单5-3中所示的`Group`节点的`transform`属性。\n\n*清单5-3. `GroupTextAndEllipse.fx`程序中绑定到`Group`节点的变换*\n\
    \n```\nGroup {\n    var rotAngle = 0\n    var scaleFactorX = 1\n    var scaleFactorY\
    \ = 1\n    var transX = 300\n    var transY = 200\n    transform: bind [\n   \
    \     translate(transX, transY),\n        rotate (rotAngle, 0, 0),\n        scale\
    \ (scaleFactorX, scaleFactorY)\n    ]\n}\n```\n\n我将逐一介绍所指定的三个变换，但在此之前，请注意它们都绑定到了`transform`属性。随着给定变换参数值的变化，该变换的效果也会随之改变。请注意，这些变换在`transform`属性中出现的顺序很重要，因为这将决定它们在运行时被应用的顺序。\n\
    \n`translate`变换有两个参数，名为`transX`和`transY`。当这些值在其他地方发生变化时，它们将被应用于此`translate`变换，这将导致此`Group`节点（以及其中包含的任何节点）移动到屏幕上的新位置。在此程序中，当事件处理器被用户交互触发时，这些值会发生变化（回顾之前示例中的`action`和`onClose`属性）。在本例中，如下所示的名为`onMouseDragged`的属性包含了当用户在椭圆上点击并拖动鼠标时的事件处理器：\n\
    \n```\nonMouseDragged: operation(mEvt) {\n    transX += mEvt.dragTranslation.x;\n\
    \    transY += mEvt.dragTranslation.y;\n}\n```\n\n*首次印刷：更多UI乐趣，包括2D绘图* 155\n\n\
    **注意** ➡ 此处定义的操作被称为*匿名*操作，因为它是在现场定义且没有命名的。由于此操作不会从其他地方被调用，因此没有必要为其命名。\n\n**Canvas鼠标事件**\n\
    \n当鼠标被拖动时，分配给`onMouseDragged`属性的操作会被调用，并重复传入一个`CanvasMouseEvent`类的实例作为参数。如上所示，自上次调用以来在x方向拖动的像素数（向左为负，向右为正）会被加到`transX`变量中。同样，自上次调用以来在y方向拖动的像素数（向上为负，向下为正）会被加到`transY`变量中。当这种情况发生时，绑定到`transform`属性的`translate()`函数会被更新，从而使得该`Group`中的`Ellipse`和`Text`节点随着鼠标的拖动在屏幕上移动。\n\
    \n**提示** ➡ `CanvasMouseEvent`类还有一个名为`localDragTranslation`的属性，它与`dragTranslation`属性类似，区别在于它包含的是在本地图形对象坐标中的拖动平移量，而不是在Canvas坐标中的拖动平移量。\n\
    \n我们`Group`节点中的第二个变换是`rotate`变换，它使节点围绕一个中心点旋转给定的角度。请再次参考清单5-3以查看`rotate`变换，然后检查以下摘录，其中包含改变传入`rotate()`变换函数的`rotAngle`变量中旋转角度的事件处理器。\n\
    \n```\nonMouseClicked: operation(mEvt) {\n    if (mEvt.isControlDown() and mEvt.isShiftDown())\
    \ {\n        rotAngle -= 10;\n    }\n}\n```"
  raw: 'Unlike Listing 5-1, the content attribute of the Canvas object doesn’t hold
    a sequence that contains an Ellipse object and a Text object. Rather, it holds
    a single Group object whose content attribute holds a sequence that contains the
    Ellipse and Text objects.


    Transformations can be specified for the group, which apply to all of the graphic
    objects in the group. Also, the Group has its own coordinate space that is shared
    by all of the graphics objects contained in that Group, so any coordinates specified
    by an object in a Group are relative to the coordinate space of the Group. That
    is why the x and y attributes of the Text node are assigned values that are very
    different from the values assigned in Listing 5-1.


    Please take a look at the transform attribute of the Group node, shown in Listing
    5-3.


    *Listing 5-3\. The Transforms Bound to the Group Node in the GroupTextAndEllipse.fx
    Program* Group {


    var rotAngle = 0


    var scaleFactorX = 1


    var scaleFactorY = 1


    var transX = 300


    var transY = 200


    transform: bind [


    translate(transX, transY),


    rotate (rotAngle, 0, 0),


    scale (scaleFactorX, scaleFactorY)


    ]


    I’m going to walk through each of the three transforms specified, but before I
    do, please notice that they are bound to the transform attribute. As the values
    in the parameters of a given transform change, the effect of that transform will
    change. Note that the order in which these transforms appear in the transform
    attribute is significant, because that will be the order in which they are applied
    at runtime.


    The translate transformation has two parameters, named transX and transY. As those
    values change elsewhere, they will be applied to this translate transformation,
    which will cause this Group node (and any nodes contained within it) to move to
    a new location on the screen. In this program, these values are changed when an
    event handler is triggered by user interactions (recall the action and onClose
    attributes from previous examples). In this case, the attribute named onMouseDragged
    shown following contains the event handler for whenever the user clicks and drags
    the mouse while on the ellipse: onMouseDragged: operation(mEvt) {


    transX += mEvt.dragTranslation.x;


    transY += mEvt.dragTranslation.y;


    }


    *firstPress: More UI Fun Including 2D Drawing* 155


    Note ➡ The operation defined here is known as an *anonymous* operation, because
    it is defined on the spot and not given a name. Since this operation won’t be
    invoked from anywhere else, it is not necessary to give it a name.


    **Canvas Mouse Events**


    As the mouse is dragged, the operation assigned to the onMouseDragged attribute
    is called, passing an argument that is an instance of the CanvasMouseEvent class
    repeatedly. As just shown, the number of pixels dragged in the x direction (negative
    if to the left, positive if to the right) since the last call is added to the
    transX variable. Also, the number of pixels dragged in the y direction (negative
    if up, positive if down) since the last call is added to the transY variable.
    As this occurs, the translate() function that is bound to the transform attribute
    is updated, which causes the Ellipse and Text nodes in that Group to move around
    on the screen as the mouse is dragged.


    Tip ➡ The CanvasMouseEvent class also has an attribute named localDragTranslation,
    which is similar to the dragTranslation attribute, except that instead of containing
    the drag translation in Canvas coordinates, it contains the drag translation in
    the local graphical object’s coordinates.


