    \n*firstPress: 创建 JavaFX 类和对象* 109\n\n*清单 4-6. AttributeDefaultValuesExample.fx\
    \ 程序* package jfx_book;\n\nclass AttributeDefaultValuesExample {\n\n    attribute\
    \ stri:String;\n\n    attribute bool:Boolean;\n\n    attribute inte:Integer;\n\
    \n    attribute numb:Number;\n\n}\n\n// 创建类的实例并打印每个属性的默认值 var example = AttributeDefaultValuesExample{};\n\
    \nprintln(\"具有原始数据类型的属性的默认值:\"); println(\"String 属性的默认值为 '{example.stri}'\n\n\
    且 example.stri.length() 为:{example.stri.length()}\"); println(\"Boolean 属性的默认值为\
    \ {example.bool}\"); println(\"Integer 属性的默认值为 {example.inte}\"); println(\"Number\
    \ 属性的默认值为 {example.numb}\"); 该程序产生的输出如下所示：\n\n具有原始数据类型的属性的默认值: String 属性的默认值为\
    \ '\n\n且 example.stri.length() 为:0\n\nBoolean 属性的默认值为 false\n\nInteger 属性的默认值为\
    \ 0\n\nNumber 属性的默认值为 0\n\n从清单 4-6 中的程序及其输出中，我们还可以了解到另外几点：\n\n•\n\n双引号括起来的字符串中间可以包含换行符。当字符串打印到控制台时，这些换行符也会被包含在内。\n\
    \n•\n\nJavaFX 字符串实际上是由 Java String 类实现的，这使得所有 Java String 方法（例如前面展示的 `length()`\
    \ 方法）都可以在 JavaFX 程序中使用。有关 Java String 类方法的文档，请参见以下网址：\n\n[`java.sun.com/j2se/1.5.0/docs/api/java/lang/String.html#method_summary.`](http://java.sun.com/j2se/1.5.0/docs/api/java/lang/String.html#method_summary)\n\
    \n*firstPress: 创建 JavaFX 类和对象*\n\n**声明 var 时的注意事项**\n\n声明 var 与声明属性相比，有一些不同的注意事项。如前所述，var\
    \ 没有默认值。var 也不要求显式声明其数据类型，在这种情况下，数据类型由赋给它的值来确定。请考虑清单 4-5 中 `WordGridModel` 类的\
    \ `placeWord()` 操作中的以下摘录。\n\nvar success = false;\n\nvar startingRow:Integer =\
    \ (Math.random() * rows).intValue(); 在第一个声明中，名为 `success` 的变量的数据类型为 Boolean，因为赋给它的是一个\
    \ Boolean 值。这被称为隐式声明。JavaFX 是静态类型化的，因此在编译时就能确定名为 `success` 的变量是 Boolean 类型。\n\n\
    在第二个声明中，名为 `startingRow` 的变量与属性一样是显式类型化的。\n\n注意 ➡ 属性与 var 之间的另一个重要区别是其*作用域*（生命周期）。只要属性所属的对象存在，该属性就存在。而\
    \ var 仅在其声明的操作或函数处于作用域内（正在执行）时才存在。var 也可以在顶层（任何操作或函数之外）声明，在这种情况下，其作用域是源文件的剩余部分。\n\
    \n关于此代码片段中为 `startingRow` 变量赋值，我希望你注意另外几点：\n\n•\n\n对于 Integer 变量，如果赋给它一个浮点数，小数部分将被截断。\n\
    \n•"
- fmt: "# The Java Class `Math` and Named Instances in JavaFX\n\nThe Java class named\
    \ `Math` is used here to generate a random number via its `random()` method, similar\
    \ to the way that we used the `exit()` method of the `System` class earlier. This\
    \ requires us to import the `java.lang.Math` class as shown at the top of the\
    \ `WordGridModel.fx` file in Listing 4-5. See the following URL for the documentation\
    \ of the methods in the Java `Math` class:\n\n[http://java.sun.com/j2se/1.5.0/docs/api/java/lang/Math.html](http://java.sun.com/j2se/1.5.0/docs/api/java/lang/Math.html)\n\
    \nNow that you have a better understanding of the JavaFX basic data types and\
    \ considerations when using them in attribute and `var` declarations, let’s turn\
    \ our attention to examining how to define and use *named instances* in JavaFX.\n\
    \n## Defining and Using Named Instances (Constants)\n\nHaving used constants in\
    \ earlier exercises to represent colors and fonts, you’ve experienced one of the\
    \ benefits of using them, which is that a familiar name (e.g., `blue` or `BOLD`)\
    \ can be used to represent values. Another benefit is that the values contained\
    \ in a named instance can be changed in one place (where it is defined), and any\
    \ code that uses it will reflect the change.\n\nAn example of defining a named\
    \ instance in the `WordGridModel` class is shown following:\n\n```\n// Constant\
    \ that indicates that an operation\n// pertains to no cell. Used as an argument\
    \ to highlightWordsOnCell()\nNO_CELL:Integer = -1;\n```\n\nThis creates an integer\
    \ that has the value of `-1` and is given the name `NO_CELL`.\n\nWherever `NO_CELL:Integer`\
    \ is used, it represents an integer with the value of `-1`—for example, in the\
    \ following code located in the `WordGridModel.highlightWordsOnCell()` operation\
    \ in Listing 4-5:\n\n```\nif (cellNum <> NO_CELL:Integer) {\n```\n\nIn this particular\
    \ case, the type of the named instance is one that is supplied by JavaFX.\n\n\
    You can create named instances of types that you define as well. For example,\
    \ take a look at this excerpt from the `WordGridRect` class, which is located\
    \ in the `wordsearch_jfx.ui` package that we’ll examine in the next chapter:\n\
    \n```\n// Constants\nSELECTED_LOOK:WordGridRect = WordGridRect {name: \"SELECTED_LOOK\"\
    };\nSELECTED_FIRST_LETTER_LOOK:WordGridRect =\n    WordGridRect {name: \"SELECTED_FIRST_LETTER_LOOK\"\
    };\nDRAGGING_LOOK:WordGridRect = WordGridRect {name: \"DRAGGING_LOOK\"};\nCANT_DROP_LOOK:WordGridRect\
    \ = WordGridRect {name: \"CANT_DROP_LOOK\"};\nDEFAULT_FIRST_LETTER_LOOK:WordGridRect\
    \ =\n    WordGridRect {name: \"DEFAULT_FIRST_LETTER_LOOK\"};\nDEFAULT_LOOK:WordGridRect\
    \ = WordGridRect {name: \"DEFAULT_LOOK\"};\n```\n\nNote ➡ You probably noticed\
    \ in the preceding code excerpt that the syntax on the right side of the assignment\
    \ (`=`) operator is the object literal syntax. The appearance is different from\
    \ other examples that I’ve shown you, however, in that each object literal uses\
    \ only one line. I use this appearance whenever there are several object literals\
    \ to define and they don’t have many attributes.\n\nHere is an example of using\
    \ these named instances in the `WordGridModel.canPlaceWordSpecific()` operation\
    \ from Listing 4-5. Their purpose is to influence the appearance of the cells\
    \ on the word grid.\n\n```\nif (cellAppearance == DRAGGING_LOOK:WordGridRect)\
    \ {\n    gridCells[yPos * columns + xPos].appearance = DRAGGING_LOOK;\n}\nelse\
    \ if (cellAppearance == CANT_DROP_LOOK:WordGridRect) {\n    gridCells[yPos * columns\
    \ + xPos].appearance = CANT_DROP_LOOK;\n}\nelse if (i == 0) {\n    // This is\
    \ the first letter of the word\n    gridCells[yPos * columns + xPos].appearance\
    \ = DEFAULT_FIRST_LETTER_LOOK;\n}\nelse {\n    gridCells[yPos * columns + xPos].appearance\
    \ = DEFAULT_LOOK;\n}\n```\n\nLooking at the first line in excerpt, please notice\
    \ that the name of the `DRAGGING_LOOK` constant is qualified by the type, but\
    \ that the name of the `DRAGGING_LOOK` constant isn’t qualified in the second\
    \ line of this example. This is because when assigning a named instance to an\
    \ attribute (or any variable) of the same type, it is not necessary to qualify\
    \ the named instance with its type. You’ll recall that in Chapter 2 the color-\
    \ and font-related named instances didn’t have to be qualified by their types\
    \ to assign them to attributes in declarative code either.\n\nNow that you understand\
    \ how to define and use named instances, we’ll examine further how to create and\
    \ use operations and functions.\n\n## Creating Operations and Functions\n\nYou’ve\
    \ already been working with operations in some of the exercises, but there are\
    \ a few details that I haven’t covered yet. In this section, you’ll also learn\
    \ how to create and use functions. Let’s start with showing you how to define\
    \ the *parameters* of an operation and its optional *return type*.\n\n### Defining\
    \ the Parameters and Return Type of an Operation\n\nSome operations require that\
    \ *arguments* be passed into them, and some don’t. Also, some operations return\
    \ a value after being invoked, and some don’t. The name of an operation plus the\
    \ configuration of the required arguments and the optional return type is called\
    \ an operation’s *signature*. An operation’s signature is defined in the class\
    \ definition, as the following excerpt from the `WordGridModel` class definition\
    \ illustrates:\n\n```\npublic operation canPlaceWordSpecific(word:String, row:Integer,\
    \ column:Integer, direction:Integer,\n    cellAppearance:WordGridRect):Boolean;\n\
    public operation selectPlacedWord(word:String);\npublic operation unplaceWord(word:String):Boolean;\n\
    public operation unplaceGridEntries();\npublic operation addWord(word:String):Boolean;\n\
    public operation deleteWord(word:String):Boolean;\npublic operation highlightWordsOnCell(cellNum:Integer);\n\
    ```\n\nIn the preceding excerpt, you can see that if an operation has any parameters,\
    \ they are specified within the parentheses following its name. Each parameter\
    \ is defined by supplying a parameter name, a colon, and its type. Notice that\
    \ some of the parameter types are one of the four basic data types, and one them\
    \ (`cellAppearance:WordGridRect`) is an object type.\n\nPlease also notice that\
    \ some of these operation declarations contain a colon followed by a data type\
    \ after the closing parenthesis. This indicates that the operation returns a value,\
    \ and therefore has a `return` statement that returns a value of that type in\
    \ the body of the operation.\n\nTo invoke an operation that contains parameters,\
    \ you specify the name of the operation followed by a comma-separated list of\
    \ values, enclosed in parentheses, which match the order and types of the parameters.\
    \ The following code excerpts are examples from various FX files in the Word Search\
    \ Builder program of invoking some of the operations shown in the previous code\
    \ excerpt:\n\n```\nif (not canPlaceWordSpecific(word, row, column, direction,\
    \ DEFAULT_LOOK:WordGridRect)) {\n    return false;\n}\nwgModel.selectPlacedWord(wge.word);\n\
    wgModel.unplaceGridEntries();\nif (wgModel.unplaceWord(wge.word)) {\n    wgModel.placeWordSpecific(wge.word,\n\
    \        wge.row,\n        wge.column,\n        newOrient);\n    wgModel.highlightWordsOnCell(wge.row\
    \ * columns +\n        wge.column);\n}\n```\n\nAs you already know, the code contained\
    \ in an operation is located in that operation’s body. Take a look at the body\
    \ of the following `addWord()` operation, and compare it with the declaration\
    \ of the preceding `addWord()` operation. You’ll notice that the data types for\
    \ the parameters and return value expressed in the operation declaration don’t\
    \ have to be repeated in the body of the operation. You’ll also notice that *access\
    \ modifiers* (such as `public` in this case) are specified in the operation declaration\
    \ and aren’t allowed to be specified in the operation body.\n\n```\noperation\
    \ WordGridModel.addWord(word) {\n    if (getGridEntryByWord(word) == null) {\n\
    \        var wge = WordGridEntry {\n            word: word\n        };\n     \
    \   insert wge into unplacedGridEntries;\n        return true;\n    }\n    else\
    \ {\n        return false;\n    }\n}\n```"
