    **Understanding JavaFX Layout Widgets**


    Designing user interfaces for use on different platforms has many challenges,
    not the least of which is the fact that the UI components on one platform are
    typically different in size, appearance, and behavior from another platform. Absolute
    positioning of UI components may work on a single type of platform, but when your
    UI has to behave well on multiple platforms, a layout strategy is required in
    which UI components are positioned relative to each other and to their context.
    JavaFX *layout widgets* are a very simple and powerful solution to this problem.


    There are several types of layout widgets, and they can be used in concert with
    each other to achieve the desired placement of components. The BordersExample.fx
    program that


