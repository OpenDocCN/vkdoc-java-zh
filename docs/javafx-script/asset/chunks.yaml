    *他（米老鼠）在 20 年前从我的脑海中跃然纸上，那是在从曼哈顿开往好莱坞的火车上，当时我和哥哥罗伊的事业正处于最低谷，灾难似乎近在咫尺。*


    ——沃尔特·迪士尼


    在上一章中，你学到了很多关于创建 JavaFX 类和对象的知识，包括为操作和触发器这样的构造编写代码的细节。在本章中，你将再次专注于 UI 编程，尤其是在
    JavaFX 擅长简化的领域：2D 图形。


    **理解 JavaFX 2D 图形**


    JavaFX 使用强大的声明式语法进行 2D 绘图、变换、显示图像和动画。有许多可用的形状，例如线条、矩形、多边形，正如你在第 2 章中所体验到的，Text
    对象也是可用形状之一。


    我们将暂时搁置 Word Search Builder 程序，探索一些 2D 绘图的示例，这些示例将帮助你理解 wordsearch_jfx.ui 包中的其余代码。我们将从一个基于
    HelloJFX.fx 程序（本书中的第一个 JavaFX 程序）稍作扩展的程序开始。该程序位于源代码下载的 Chapter05/jfx_book 文件夹中的
    TextAndEllipse.fx 文件中。请继续运行该程序，输出应如图 5-1 所示。


    ![Image 36](img/index-162_1.png)


    *firstPress：更多 UI 乐趣，包含 2D 绘图*


    *图 5-1. TextAndEllipse.fx 程序的输出*


