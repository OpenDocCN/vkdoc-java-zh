- fmt: "# Triggers\n\nTriggers are key feature of JavaFX, in that they play a big\
    \ part in enabling its declarative programming model. You’ve already been exposed\
    \ to one form of trigger: the *assert* *trigger*. There are two more forms of\
    \ trigger declarations that are appropriate to introduce at this point:\n\n- Creation\
    \ triggers\n- Replace triggers\n\nA *creation trigger* is automatically executed\
    \ when a new instance of the class that it is contained in is created. Creation\
    \ triggers serve nearly the same purpose as the special operation that has the\
    \ same name as the class (that we examined earlier in this chapter).\n\nShown\
    \ following is an example of a creation trigger from an excerpt of the `WordGridCell`\
    \ class. We’ll look at the `WordGridCell` class, shown in Listing 4-11, in more\
    \ detail a little later in this chapter.\n\n*firstPress: Creating JavaFX Classes\
    \ and Objects* 117\n\n```\ntrigger on new WordGridCell {\n    cellLetter = SPACE;\n\
    \    // Generate random letter to be used to fill in this cell\n    // in the\
    \ case that it doesn't contain a word\n    fillLetter = Character.forDigit(Math.random()\
    \ * 26 + 10, 36).\n        toString().toUpperCase();\n    wordEntries = [];\n\
    }\n```\n\nA *replace trigger* is automatically executed when the attribute named\
    \ in the trigger is assigned another value. Here is an example from the `WordGridModel`\
    \ class taken from Listing 4-5:\n\n```\n/**\n * Updates the uplaced selected word\
    \ in the model based upon what cell\n * is selected in the unplaced words ListBox\n\
    \ */\ntrigger on WordGridModel.selectedUnplacedWordIndex[oldValue] = newValue\
    \ {\n    selectedUnplacedWord = unplacedListBox.cells[selectedUnplacedWordIndex].text;\n\
    }\n```\n\nWhen this trigger executes, the variable to the right of the assignment\
    \ operator (`=`) contains the new value that was assigned to the attribute. Optionally,\
    \ as shown in the preceding excerpt, you can put a variable name in square brackets\
    \ on the left side of the assignment operator. This causes the value of the attribute,\
    \ before it was assigned a new value, to be stored in that variable. This enables\
    \ you to compare the old value with the new value in code of the trigger.\n\n\
    If you are familiar with setter and getter methods, you’ll realize that replace\
    \ triggers enable you to dispense with getters and setters in your code. Instead,\
    \ you can access the attributes directly. Any validation or business logic that\
    \ you can put in a setter method can be put into a trigger instead.\n\nReplace\
    \ triggers can also be used with sequences, as can the other two types of triggers\
    \ that we haven’t covered yet: the *insert trigger* and the *delete trigger*.\
    \ I’ll mention these in the context of sequences later in this chapter.\n\nIn\
    \ order to create the body of an operation, trigger, or function, you’ll need\
    \ to understand what JavaFX *statements* and *operators* are available to you.\
    \ Let’s dive into those now.\n\n*firstPress: Creating JavaFX Classes and Objects*\n\
    \n## Using JavaFX Statements and Operators\n\nSo far in this book you’ve already\
    \ examined and used several JavaFX statements and operators. For example, you’ve\
    \ used the assignment operator (`=`) in exercises, you examined the `for` statement\
    \ and the `return` statement earlier in this chapter, and you were exposed to\
    \ the equality operator (`==`) earlier in this chapter as well. In this section,\
    \ we’ll look at examples from the `WordGridModel` class in Listing 4-5 of several\
    \ JavaFX statements and operators that I haven’t explained yet. Let’s start looking\
    \ for statements and operators beginning in the `placeWord()` operation, and I’ll\
    \ offer explanations as we encounter them.\n\n**Note** ➡ So that you can see the\
    \ JavaFX statements in one place for reference purposes, Table 4-2 contains a\
    \ list of them with a description of each. Tables 4-3 through 4-7 contain this\
    \ same type of reference for the JavaFX operators.\n\n### The if/else Statement\n\
    \nPlease look at the excerpt shown following from the `placeWord()` operation:\n\
    \n```\nif (success) {\n    return true;\n}\n```\n\nThe `if` statement performs\
    \ the statements inside the required curly braces only if the condition (the Boolean\
    \ expression inside the parentheses) evaluates to `true`."
