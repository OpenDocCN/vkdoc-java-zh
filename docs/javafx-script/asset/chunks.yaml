    ## About the Author


    **JAMES L. (JIM) WEAVER** is chief technical officer at Learning Assistant Technologies
    (http://lat-inc.com/), a technology consulting and software development company.
    He is also president of JMentor (http://jmentor.com/), for which he writes books
    and provides training and consulting services on the subjects of JavaFX and the
    Java™ programming language.


    In his free time, Jim enjoys his family (including two grandchildren), plays guitar,
    sings in a gospel quartet, and plays racquetball.


    ## About the Technical Reviewer


    **WEIQI GAO** is a principal software engineer at Object Computing, Inc. (http://ociweb.com),
    a software engineering, training, consulting, and open source support company
    in St. Louis, Missouri. He has been using Java technologies since 1998, working
    with Java AWT and Swing user interface libraries, EJB-based software systems and
    products, and implementations of middleware standards. He is also a member of
    the St. Louis Java Users Group steering committee.


