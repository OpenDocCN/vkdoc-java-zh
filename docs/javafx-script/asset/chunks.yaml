    keyword that I described earlier in the context of importing JavaFX packages and
    classes.


    In this case, you want to identify that you’ll be using the System class that
    is located in the Java package named java.lang:


    import java.lang.System;


    This import statement, as you would expect, is located near the top of the WordSearchMain.fx
    file (see Listing 3-1). I’d also like to point out that this form of the import
    statement is the one we discussed earlier, in which you specify the name of the
    class, rather than using an asterisk as a wildcard to denote any class in that
    package.


    Note ➡ The import statement also allows you to specify an alias. The following
    statement will let you refer to the System class as Sys in your program:


    import java.lang.System as Sys;


