    JavaFX™ Script


    我撰写《JavaFX™ Script: Dynamic Java™ Scripting for Rich Internet/Client-Side Applications》这本书，是因为我对使用
    JavaFX Script 创建能在多种平台（包括个人电脑和手机）上运行的富互联网应用程序的强大功能和简洁性感到兴奋。


    Dynamic Java™ Scripting for Rich


    我于 1995 年开始开发 Java 应用程序，见证了 Java 功能和复杂性的与日俱增。当我看到 JavaFX Script 如何为内容设计者和应用程序开发者提供一种简单而强大、背后拥有
    Java 全部能力的语言时，我立刻认识到了它的潜力。例如，在 JavaFX Script 中，一个简单的声明式表达式就可以定义一个包含平台无关布局管理器的用户界面。在幕后，诸如布局管理器和
    Swing 组件等 Java 设施会被自动调用来实现所需的用户界面。


