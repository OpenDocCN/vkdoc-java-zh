- fmt: "# 命名规范\n\n以一个小写字母开头，由一个或多个驼峰式单词组成。操作或函数的名称通常表示动作。示例包括`highlightWordsOnCell()`和`rotate()`。\n\
    \n## 命名实例\n\n命名实例通常全部使用大写字母，复合词之间用下划线分隔。偶尔，命名实例全部使用小写字母，且复合词之间没有任何分隔符，就像表示颜色的命名实例那样。示例包括`DIAG_DOWN`和`blue`。\n\
    \n## 包名\n\n包名全部使用小写字母，复合词之间用下划线分隔。通常，包名会以组织的域名开头（域名类型在前）。示例包括`com.apress.javafx_book`和`wordsearch_jfx.model`。\n\
    \n# 总结\n\n在本章中，你再次涵盖了大量内容，并学习了更多关于 JavaFX 的知识。你学习和体验的一些概念包括：\n\n- 创建一个程序来测试模型。\n\
    - 使用`javafx.bat`或`javafx.sh`从命令行执行 JavaFX 程序。\n- 使用触发器在特定条件下自动执行代码，具体包括：\n  -\
    \ 在断言时\n  - 当替换属性或序列中的元素时\n  - 当创建类的新实例时\n  - 当向序列中插入元素时\n  - 当从序列中删除元素时\n- 理解\
    \ JavaFX 类的结构，并思考如何标准化你所创建的类的结构。\n- 使用属性初始化器为属性赋值，而不是让其采用默认值。\n- 在类声明中声明操作（包括其参数和返回类型），然后创建操作的主体，并用\
    \ JavaFX 代码填充它。\n- 使用 Java 的`System.out.println()`和`System.out.print()`方法以及 JavaFX\
    \ 的`println()`操作将输出发送到控制台。\n- 使用`{}`运算符创建字符串表达式。\n- 调用操作和函数，无论是在同一个类中还是在不同的类中。\n\
    - 学习如何使用 JavaFX 中的所有语句和许多运算符。\n- 学习范围表达式，以及如何使用`for`语句对其进行迭代。\n- 理解何时使用声明式代码，何时使用类/操作/函数/触发器，以及何时使用任何类上下文之外的过程式代码。\n\
    - 学习属性声明中的基数符号。\n- 了解更多关于数据类型的信息，包括四种基本类型、对象类型和序列。\n- 理解每个基本数据类型对应的属性的默认值。\n-\
    \ 检查使用属性与局部变量时的一些注意事项。\n- 创建 Java 类的实例并调用其方法。\n- 创建和使用命名实例。\n- 理解`new`运算符以及它调用与\
    \ JavaFX 类同名的操作这一事实。\n- 学习如何使用`this`关键字。\n- 理解如何创建和使用序列，包括如何使用`foreach`和`select`运算符插入元素、替换元素、删除元素以及查询序列。\n\
    \n在下一章（也是最后一章）中，我们将继续第 3 章的内容，探索如何创建 JavaFX 用户界面，并且你还会接触到 JavaFX 非常出色的 2D 图形功能。\n\
    \n# 资源\n\n以下是一些可以作为参考的资源：\n\n- **JavaFX Script 编程语言参考**：可在 Project OpenJFX 网站上找到，网址如下：\n\
    \  [https://openjfx.dev.java.net/JavaFX_Programming_Language.html](https://openjfx.dev.java.net/JavaFX_Programming_Language.html)\n\
    - **Java SE 1.5 API**：当你想要使用 Java 类（例如我们在示例中已经使用过的`System`、`Math`和`Character`类）时，这是一个很好的参考。以下是\
    \ Java SE 1.5 版本的链接。"
  raw: 'Begins with a lowercase letter and consists of one or


    more camel case words. The name of an operation or


    function often denotes action. Examples include


    highlightWordsOnCell() and rotate().


    named instance


    A named instance is usually all uppercase letters, with


    compound word separated by underscores. Occasionally,


    named instances are all lowercase with nothing


    delimiting compound words, as is the case with the


    named instances that represent colors. Examples include


    DIAG_DOWN and blue.


    package


    A package name is all lowercase letters, with compound


    words separated by underscores. Often a package name


    will begin with the domain name of the organization


    (with the domain type first). Examples include


    com.apress.javafx_book and wordsearch_jfx.model.


    **Summary**


    Once again, you’ve covered a lot of ground and learned a lot more about JavaFX
    in this chapter. Some concepts that you’ve learned and experienced include the
    following:


    •


    Creating a program to test a model.


    •


    Executing a JavaFX program from the command line using javafx.bat or javafx.sh.


    •


    Using triggers to automatically execute code upon certain conditions, specifically:


    *firstPress: Creating JavaFX Classes and Objects* 145


    • On an assertion


    • When replacing an attribute, or an element in a sequence


    • When creating a new instance of a class


    • Upon inserting an element into a sequence


    • Upon deleting an element from a sequence


    •


    Understanding the structure of a JavaFX class, and thinking about how to standardize
    the structure of the classes that you create.


    •


    Using attribute initializers to assign a value to an attribute instead of having
    it assume a default value.


    •


    Declaring an operation in the class declaration (including its parameters and
    return type), and then creating the body of the operation, populating it with
    JavaFX code.


    •


    Sending output to the console using the Java System.out.println() and System.out.print()
    methods, and using the JavaFX println() operation.


    •


    Creating String expression using the {} operator.


    •


    Invoking operations and functions, both in the same class and in a different class.


    •


    Learning how to use all of the statements and many of the operators in JavaFX.


    •


    Learning about range expressions, and how to use the for statement to iterate
    over them.


    •


    Gaining an understanding of when to use declarative code, when to use classes/operations/functions/triggers,
    and when to use procedural code that is outside the context of any class.


    •


    Learning about the cardinality symbols in an attribute declaration.


    •


    Learning more about data types, including the four basic types, the object types,
    and sequences.


    •


    Understanding the default values of an attribute corresponding to each basic data
    type.


    •


    Examining some considerations when using attributes versus local variables.


    •


    Creating an instance of a Java class and calling its methods.


    •


    Creating and using named instances.


    *firstPress: Creating JavaFX Classes and Objects*


    •


    Understanding the new operator and the fact that it invokes an operation of the
    same name as the JavaFX class.


    •


    Learning how to use the this keyword.


    •


    Gaining an understanding of how to create and use sequences, including how to
    insert elements, replace elements, delete elements, and query a sequence using
    the foreach and select operators.


    In the next (and final) chapter, we’re going to continue where we left off in
    Chapter 3, exploring how to create JavaFX UIs, and you’ll get some exposure to
