- fmt: "# Note\n\n截至撰写本文时，访问修饰符在 JavaFX 中尚未完全实现，但一旦实现，可能会有四个，与 Java 中一样：`public`、`private`、`protected`\
    \ 和 `default`（无修饰符）。`public` 操作、函数或属性可以从任何其他类访问。`private` 操作、函数或属性只能从同一类内部访问。没有访问修饰符（`default`）的操作、函数或属性可以从同一包中的任何类访问。`protected`\
    \ 操作、函数或属性可以从同一包中的任何类或任何子类（无论其位于哪个包中）访问。另一个最近的提议指出，将只有三个访问修饰符：`public`、`protected`\
    \ 和 `private`（这将是默认值）。\n\n我们稍后将更详细地了解操作体可能包含的内容，包括 JavaFX 语句和运算符。然而，现在让我们将注意力转向一个特殊命名的操作，该操作在使用\
    \ `new` 运算符创建实例时执行。\n\n## 理解 `new` 运算符的效果\n\n有时，希望在创建对象实例时自动执行某些代码。运行此代码的目的通常是初始化对象的状态。\n\
    \n*firstPress: Creating JavaFX Classes and Objects* 115\n\n在 JavaFX 中有两种方法可以做到这一点，这对应于前面显示的创建对象实例的两种方式。回想一下，这两种方式如下：\n\
    \n- 使用对象字面量，这是在 JavaFX 中创建新实例的最典型方式\n- 使用 `new` 运算符，如下所示：\n\n```\nvar wgModel\
    \ = new WordGridModel(9, 9);\n```\n\n现在让我们探讨后一种选项，稍后我们将在 `trigger` 关键字的上下文中讨论前一种选项。\n\
    \n在前面的代码片段中，`new` 运算符后面跟着您要创建实例的类名，然后是括号内以逗号分隔的参数列表。使用此语法会调用一个与类同名的操作，在本例中是位于清单\
    \ 4-5 的 `WordGridModel` 类中的 `WordGridModel` 操作，其声明如下所示：\n\n```\npublic operation\
    \ WordGridModel(rows:Integer, columns:Integer);\n```\n\n以下是清单 4-5 中 `WordGridModel`\
    \ 操作的主体：\n\n```\n/**\n * A method that acts as a constructor for the WordGridModel\
    \ class\n */\noperation WordGridModel.WordGridModel(rows, columns) {\n    this.rows\
    \ = rows;\n    this.columns = columns;\n    selectedPlacedWordIndex = -1;\n  \
    \  unplacedGridEntries = [];\n    placedGridEntries = [];\n    gridCells = [];\n\
    \    fillLettersOnGrid = false;\n    initializeGrid();\n}\n```\n\n请注意，在刚刚显示的方法中，使用了一个名为\
    \ `this` 的关键字来访问 `WordGridModel` 类新实例的 `rows` 和 `columns` 属性，这将这些属性与传递给 `WordGridModel`\
    \ 操作的值区分开来。与任何操作（或函数或触发器）一样，这些传入的值成为局部变量，就好像它们是用 `var` 关键字声明的一样。顺便提一下，`this` 关键字可用于任何操作，其目的是提供对当前类实例的引用。\n\
    \n说到函数，让我们继续讨论如何创建一个函数。\n\n*firstPress: Creating JavaFX Classes and Objects*\n\
    \n## 创建 JavaFX 函数\n\nJavaFX *函数* 具有操作功能的子集。它只能包含 `var` 声明和 `return` 语句。下面显示的是清单\
