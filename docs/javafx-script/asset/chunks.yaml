  raw: 'Note ➡ The asterisk (*) after the placedGridEntries:WordGridEntry* attribute
    means that this attribute is an array (also know as a *sequence*). We’ll examine
    arrays in depth a little later.


    The WordGridEntry class holds a word, the state of whether it is placed or not,
    and if so, in what row, column, and direction (vertical, horizontal, etc.) is
    it placed. Notice from the diagram that the WordGridCell class has a one-to-many
    relationship with instances of the WordGridEntry class. Because of this, as the
    user invokes a pop-up menu when the cursor is


    *firstPress: Creating User Interfaces in JavaFX*


    on a letter on the grid, you can show a list of the words on the menu that the
    letter is a part of.


    The WordGridCell class holds the letter for a cell in the grid, as well as a randomly
    generated fill letter. It also holds the appearance that a cell should have, using
    the constants defined in the WordGridRect class. As shown by the dotted lines
    with arrows, the appearance attribute of each WordGridRect instance in the view
    is bound to the appearance attribute of the corresponding WordGridCell instance
    in the model. Also, each Text letter that is drawn in the WordGridView component
    is bound to the cellLetter attribute of each WordGridCell instance in the model.


    Finally, the WordOrientation class contains constants that represent the orientation
    of a word on the grid (e.g., HORIZ, DIAG_DOWN, etc.). These constants are used
    by other classes to influence the orientation of words placed on the word grid.


    Now that you’ve received a high-level overview of the architecture of the Word
    Search Builder application, let’s begin an in-depth examination of the UI code.


