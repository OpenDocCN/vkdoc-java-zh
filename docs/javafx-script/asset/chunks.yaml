- fmt: '### 排版后的文本


    **Figure 3-8. The word grid after invoking the Show Fill Letters option** When
    the fill letters are on the grid, most of the application functionality is disabled,
    so if you drop down the grid menu, most of the menu options will be grayed out.
    Note that three of the toolbar buttons are disabled as well.


    Selecting the **Grid ➤ Show Fill Letters** menu option again (or pressing `Ctrl+F`)
    will remove the fill letters from the grid.


    To drag a word from one place on the grid to another, click and drag the first
    letter of a word. The background for the word being dragged changes to cyan and
    the cursor becomes a hand icon when a word can be placed in the current location.
    See Figure 3-9 for an example of this behavior, where *MARS* is being dragged
    to intersect with the *M* in *MERCURY*.


    **Figure 3-9. Dragging the word MARS to a location where it can be placed**


    ![Image 21](index-49_1.png)


    ![Image 22](index-49_2.png)


    *firstPress: Creating User Interfaces in JavaFX*


    When the word is being dragged to a location where it can’t be placed, the background
    for the word changes to red and the cursor changes to one that means *move* (see
    Figure 3-10).


    **Figure 3-10. Trying to drag the word JUPITER to a location where it can’t be
    placed** The orientation of a word on the grid can be changed by holding the `Shift`
    key down while clicking the first letter of the word. With each click, the word
    will cycle through each available orientation, pivoting on the first letter of
    the word. Figure 3-11 shows the orientation of *VENUS* being changed from diagonal
    down to vertical, pivoting on the letter *V*:


    **Figure 3-11. Changing the orientation of the word VENUS from diagonal down to
    vertical** In addition to using the pop-up menu in Figure 3-7 to remove a word
    from the grid, you can select a word in the **Placed Words** list box and select
    the **Grid ➤ Unplace Word** menu


    ![Image 23](index-50_1.png)


    *firstPress: Creating User Interfaces in JavaFX*


    option. Another alternative is to double-click a word in the **Placed Words**
    list box. In both cases, you’ll be prompted to confirm the operation.


    Finally, to unplace all the words from the grid, select the **Grid ➤ Unplace All
    Words** menu option, or use the `Alt+U` accelerator key combination. Again, you’ll
    be prompted to confirm the operation.


    Now that you’ve received a grand tour of the behavior of the Word Search Builder
    application, I’d like to show you a high-level view of its overall architecture.
    This will help you see the Word Search Builder code that we’ll walk through in
    the context of the entire application.


    ## The Word Search Builder Application Architecture


    Figure 3-12 contains a block diagram that depicts the overall architecture of
    the Word Search Builder application. Each FX file in the application is represented,
    but due to space constraints I chose to show only certain attributes and operations
    in their respective class diagrams (e.g., the box that is labeled `WordGridModel`).
    I am also only showing a few of the bind operations (the dotted lines with arrows
    pointing to the left). Please take a look, and I’ll point out some of the most
    important and interesting points.


    **Figure 3-12. Word Search Builder application block diagram**


    *firstPress: Creating User Interfaces in JavaFX*


    The source code for the Word Search Builder application is located in two packages
    (as shown at the top of the diagram by the package statements and dotted rectangles
    that encompass the FX files in each package). These two packages are `wordsearch_jfx.ui`
    and `wordsearch_jfx.model`. We’ll explore these one at a time.


    ### The Declarative Code and Classes in the `wordsearch_jfx.ui` Package


    The `wordsearch_jfx.ui` package is comprised of the classes that make up the UI,
    or view, of the Word Search Builder application. This application starts execution
    with the declarative code in `WordSearchMain.fx`. The column under the left side
    of the `wordsearch_jfx.ui` package in the diagram shows the containment hierarchy
    of the UI classes in the `WordSearchMain.fx` file.


    **Note** ➡ I’ve adopted a convention of naming the FX file that is the first to
    be invoked `[Something]Main.fx`.


    The `WordSearchMain.fx` file contains the declarative code that creates much of
    the user interface. It is similar in concept to the `HelloJFXBind2.fx` file, although
    greatly expanded.


    The `WordSearchHandlers` class exists to handle the *events* that occur when the
    user interacts with the UI. When menu items and toolbar buttons are selected,
    oftentimes an associated method in the `WordSearchHandlers` class is invoked.
    I use a convention of naming the handler method in the `WordSearchHandlers` class
    a concatenation of the associated menu options. For example, as shown in the class
    diagram, there is an operation named `gridPlaceWord()` in the `WordSearchHandlers`
    class. That operation is invoked when the user selects the **Grid ➤ Place Word**
    menu option. Typically, the Word Search Builder application invokes an operation
    in the `WordSearchHandlers` class when a dialog needs to appear to collect more
    information from the user, confirm a choice, or display a message.


    An instance of the `WordGridView` class, as noted by the dashed line with the
    arrow, lives within the `Canvas` instance in the containment hierarchy. It is
    a custom component that is responsible for drawing and managing the word grid,
    including functionality such as displaying the letters and providing the word
    dragging/reorientation capability.


    The `WordGridRect` class is essentially a 2D rectangle with some added functionality
    required by this application, providing assistance at the grid cell level to the
    `WordGridView` class. One instance of this class is created for every cell in
    the word grid. Notice the asterisk (*) near the line above the `WordGridRect`
    class on the diagram. That means that there may be many instances of `WordGridRect`
    associated with the instance of `WordGridView`. The


    *firstPress: Creating User Interfaces in JavaFX*


    `WordGridRect` class also holds constants associated with the appearance of a
    cell (e.g., `DRAGGING_LOOK` and `SELECTED_LOOK`).


    An instance of the `WordListsView` class, as noted by the dashed line with the
    arrow, lives within the `BorderPanel` instance in the containment hierarchy. It
    is a custom component that is responsible for creating, displaying, and managing
    the **Unplaced Words** and **Placed Words** list boxes.


    Now that you have an overview of the architecture in the `wordsearch_jfx.ui` package,
    let’s turn our attention to the `wordsearch_jfx.model` package.


    ### The Classes in the `wordsearch_jfx.model` Package


    The `wordsearch_jfx.model` package is comprised of classes that contain the model
    (objects that represent the data) of the application.


    The `WordGridModel` class is the primary class responsible for holding the model.
    For example, as shown in the class diagram, one of the attributes of this class
    is `fillLettersOnGrid`. This attribute holds the state of whether the fill letters
    are currently showing on the grid. As discussed earlier, when the fill letters
    are on the grid, many of the menu options and toolbar buttons need to be disabled.
    To accomplish this, as shown by the two dotted lines originating from the `fillLettersOnGrid`
    attribute of this class, the `enable` attribute of some of the menu items and
    toolbar buttons are bound to the `fillLettersOnGrid` attribute. This is an example
    of how the `bind` operator helps the view of an application stay in sync with
    the model. This `WordGridModel` class also has operations that provide functionality
    to the model. For example, when the `addWord()` operation is invoked (by the `wordListAddWord()`
    method in the `WordSearchHandlers` class), the logic in that operation causes
    a `WordGridEntry` to be added to the `unplacedGridEntries` array in the `WordGridModel`
    instance. As noted by the dotted lines originating from the `unplacedGridEntries`
    and `placedGridEntries` attributes, the **Unplaced Words** and **Placed Words**
    list boxes are bound to these arrays and therefore automatically updated as the
    contents of these arrays change.'
