    \n*图 3-19. 在 Word Search Builder 应用程序中使用`BorderPanel`布局控件*\n\n您将在以下来自`WordSearchMain.fx`的代码片段中看到与`BorderPanel`控件相关的代码：\n\
    \n```\nBorderPanel {\n    top:\n        ToolBar {\n            *firstPress: Creating\
    \ User Interfaces in JavaFX*\n            **...some code omitted...**\n      \
    \  }\n    center:\n        Box {\n            **...some code omitted...**\n  \
    \      }\n}\n```\n\n`BorderPanel`控件中有五个可用属性：`top`、`bottom`、`left`、`right`和`center`。这些属性的任意组合都可以分配\
    \ UI 组件。未分配给`center`属性的 UI 组件所剩余的任何空间，都将由分配给`center`的 UI 组件（如果已分配）占据。\n\n表 3-3\
    \ 包含了所有 JavaFX 布局控件类型的列表，以及描述和属性（在适用情况下包含常量）。\n\n**布局控件类型**\n\n*表 3-3. 布局控件类型*\n\
    \n| 布局控件 | 描述 | 公共属性 |\n| --- | --- | --- |\n| `BorderPanel` | 提供将 UI 组件放置在 UI\
    \ 容器的顶部、底部、左侧和/或右侧的能力，任何可用空间由位于中心的 UI 组件（如果已分配）占据。 | `top:Widget?`<br>`left:Widget?`<br>`bottom:Widget?`<br>`right:Widget?`<br>`center:Widget?`\
    \ |\n| `Box` | UI 组件可以在 UI 容器内水平或垂直堆叠。 | `orientation:Orientation VERTICAL, HORIZONTAL`<br>`content:Widget*`\
    \ |\n| `CardPanel` | 提供一次查看一个 UI 组件的能力，如同从一副牌中选择卡片。 | `selection:Number`<br>`cards:Widget*`\
    \ |\n| `FlowPanel` | UI 组件从左到右流动，保持其原始大小。 | `Alignment:Alignment LEADING, TRAILING,\
    \ CENTER, BASELINE`<br>`vgap:Number`<br>`hgap:Number`<br>`content:Widget*` |\n\
    | `GridBagPanel` | 非常灵活但复杂的网格布局 UI 组件方式。与`GridCell`类配合使用。 | `Cells:GridCell*`<br>`GridCell`具有：<br>`insets:Insets?`<br>`Anchor:Anchor\
    \ CENTER, NORTH, SOUTH, EAST, WEST, NORTHWEST, NORTHEAST, SOUTHWEST, SOUTHEAST,\
    \ PAGE_START, PAGE_END, LINE_START, FIRST_LINE_START, FIRST_LINE_END, LAST_LINE_START,\
    \ LAST_LINE_END`<br>`gridwidth:Number`<br>`gridheight:Number`<br>`gridx:Number`<br>`gridy:Number`<br>`fill:Fill\
    \ HORIZONTAL, VERTICAL, BOTH, NONE`<br>`weightx:Number`<br>`weighty:Number`<br>`ipadx:Number`<br>`ipady:Number`<br>`content:Widget`\
    \ |\n| `GridPanel` | UI 组件排列在具有相同大小单元格的网格中。每个组件扩展至网格单元格的大小。 | `rows:Number`<br>`columns:Number`<br>`hgap:Number?`<br>`vgap:Number?`<br>`cells:Widget*`\
    \ |\n| `GroupPanel` | 使用`Row`和`Column`类定义行和列，每个 UI 组件被分配到给定的行和列。在布局对话框时非常有用。 |\
    \ `autoCreateGaps:Boolean`<br>`autoCreateContainerGaps:Boolean`<br>`Row`和`Column`具有：<br>`alignment:Alignment?\
    \ LEADING, TRAILING, CENTER, BASELINE`<br>`resizable: Boolean` |\n| `StackPanel`\
    \ | 将 UI 组件堆叠在一起。 | `content:Widget*` |\n\n我们已经介绍了`BorderPanel`、`Box`和`GridPanel`布局控件的示例。在第\
    \ 5 章中，您还将看到`GroupPanel`布局控件的实际应用。\n\n**提示** ➡ 大多数布局控件是类似命名的 Java 布局管理器的 JavaFX\
    \ 改编版。Sun 的在线 Java 教程包含一个页面，展示了大多数这些布局的图形。如果您深入研究使用这些布局创建 UI 的 Java 代码，您将会欣赏 JavaFX\
    \ 声明式脚本在构建 UI 方面提供的强大功能和简洁性。以下是链接："
