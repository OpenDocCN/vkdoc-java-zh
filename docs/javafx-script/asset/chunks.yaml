    **CHAPTER 3**


    **Creating User Interfaces in**


    **JavaFX**


    *Designing a clear, logical, easily-understood user interface is a lot like doing*
    *stand-up comedy. It’s harder than it looks, and if you fail, a lot of innocent*
    *people suffer.*


    Glen M Bever


    To help me accomplish the task of teaching you JavaFX, I’ve developed a nontrivial
    application that creates word search puzzles. The source code of this program
    will be used during the rest of this book to explain and show examples of JavaFX
    concepts and constructs. Before we get into the main point of this chapter, which
    is to continue learning to develop user interfaces in JavaFX and gain exposure
    to lots of GUI components, please allow me to briefly walk you through the behavior
    of the application. A good understanding of this behavior will help you relate
    to the code that produced it, and I recommend that you actually run the application
    and follow along while reading this section.


    **Overview of the Word Search Builder Application**


    The word search builder application is a tool for creating word search puzzles.
    The user enters words into a word list and places these words on a word grid.
    Each word can be placed at a specific location and orientation (horizontal, vertical,
    diagonal up, or diagonal down) on the grid. Alternatively, words can be placed
    in random locations and orientations.


    When a word is on the word grid it can be dragged to other locations on the grid
    and its orientation can be changed as well.


    ![Image 12](index-44_1.png)


    *firstPress: Creating User Interfaces in JavaFX*


    **Invoking the Application**


    To execute the word search builder application with JavaFXPad, you’ll need to
    navigate in your console to the Chapter03 folder of the book’s source code download.
    This is because at runtime the application will load image resources (the toolbar
    icons) from the resources folder in the Chapter03 folder. If you are using an
    IDE with a JavaFX plug-in, you won’t need to be concerned with this detail.'
