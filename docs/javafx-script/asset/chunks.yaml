    **总结**


    恭喜你，在短时间内取得了长足的进步！在本章中，你完成了以下内容：


    •


    选择并安装了一个或多个用于开发和执行 JavaFX 程序的工具。


    •


    检查并运行了一个简单的 Hello World 风格的 JavaFX 程序。


    •


    学习了如何在 JavaFX 中使用单行和多行注释。


    •


    处理了 `package` 和 `import` 语句的使用。


    •


    理解了如何编写声明式 JavaFX 代码。


    •


