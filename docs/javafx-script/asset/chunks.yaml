    **Naming Rules and Conventions for JavaFX Identifiers**


    The rules for naming identifiers in JavaFX are that they must begin with a letter,
    an underscore character (_), or a dollar sign ($). Subsequent characters in the
    identifier name can be numbers, letters, an underscore character, or a dollar
    sign. In practice, dollar signs are not used in identifiers, and numbers are rarely
    used. There are some conventions for naming each type of identifier that will
    help you create code that other JavaFX


