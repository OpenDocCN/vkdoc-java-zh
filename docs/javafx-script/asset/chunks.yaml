    **绘制和填充形状**


    你已经知道 Text 类实际上是一种可以绘制的形状；在这个程序中，你还将学习如何绘制椭圆。如清单 5-1 所示，要定义一个椭圆，我们需要定义椭圆中心点的 x
    和 y 坐标（使用 cx 和 cy 属性），这些坐标相对于绘制椭圆的画布。椭圆的水平半径由 radiusX 属性指定，垂直半径由 radiusY 属性指定。


    为了指定 Ellipse 对象的轮廓宽度、颜色和填充颜色，我使用了你在第 2 章中学习 Text 对象时了解到的相同属性，如下所示：strokeWidth:
    5


    stroke: red


    fill: white


    表 5-1 列出了 JavaFX 中可绘制的形状列表：*表 5-1. JavaFX 形状*


    **形状**


    **描述**


    Arc


    由边界矩形、起始角度、角度跨越的度数以及闭合类型定义的椭圆弧


    Circle


    由中心点和半径定义的圆


    *(续)*


    *firstPress：更多 UI 乐趣，包含 2D 绘图*


    CubicCurve


    由起点、两个控制点和终点定义的三次曲线段


