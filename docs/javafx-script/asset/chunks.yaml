    **Creating Custom Graphical Components**


    Sometime it is desirable to create a custom component that can be reused in other
    JavaFX


    programs. For example, if someone creates a great component that pops up a monthly
    calendar from which a user can select a date, it would be good to reuse that component
    instead of reinventing it. I’m going to show you how to create a custom graphical
    component that can be used on a canvas. Following are the example JavaFX files
    that I’ll use to do this:


    •


    SuperDuckComponent.fx, which contains the code for our SuperDuckComponent custom
    component class, shown in Listing 5-4


    •


    SuperDuckExample.fx, shown in Listing 5-5, which is an example that uses the SuperDuckComponent
    custom component class


    Before looking at the listings, please go ahead and run the SuperDuckExample.fx
    program, located within the Chapter05 folder of the code download for this book.
    Note that these files are in the jfx_book package, and in addition, the SuperDuckComponent
    class makes use of a graphics image file located in the Chapter05/images folder.
    Figure 5-3


    shows the initial output of this program.


    ![Image 38](index-173_1.png)


    *firstPress: More UI Fun Including 2D Drawing*


    *Figure 5-3\. Output of the SuperDuckExample.fx program*


    Note ➡ Superlative Duck (which I’ll call Super Duck in this book for short) is
    a fictitious character that Marty, Kaleb, and Kelvin Hutchins created to foster
    communication about character, virtues, and values (as any typical superhero would).


    The SuperDuckComponent has the same features as the previous example (e.g., dragging,
    scaling, and rotating the ellipse), as well as the following functionality related
    to the image of Super Duck:


    •


    Dragging the image of Super Duck will move the image on the screen.


