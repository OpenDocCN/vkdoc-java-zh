  raw: 'System.out.println("It is {placed} that red was placed. Expected true.");
    You used the Java System class earlier in the book to exit an application. Here
    it is being used to obtain a reference to the standard output stream (in this
    case your console), and invoking its println() method. You can put any kind of
    expression in the println() method; here we’re supplying a string. The println()
    method causes the expression to be output to the console, followed by a new line.
    If you’d like to output an expression without a new line, then use the Java System.out.print()
    method instead, as shown later in the listing: System.out.print("|");


    **Creating String Expressions**


    Let’s take another look at the following statement, including some lines of code
    leading up to it:


    var placed;


    // Try to place a word. It is expected to be successful.


    placed = wordGridModel.placeWordSpecific("red", 4, 3, DIAG_UP:WordOrientation.id);


    System.out.println("It is {placed} that red was placed. Expected true.");


    *firstPress: Creating JavaFX Classes and Objects*


    Please take note of the curly braces around the variable named placed. This is
    a special syntax inside of a String literal that causes the value of the expression
    inside to be evaluated and included in the String. In this case, the variable
    named placed is of type Boolean, and the value will either be true or false. In
    the sample output of this program shown earlier in Listing 4-1, this was output
    as a result of this statement: It is true that red was placed. Expected true.


    Using the {} operator within a String literal is also a way of concatenating strings
    in JavaFX. Note that the {} operator may only be used with double-quoted String
    literals, not with single-quoted String literals.


    Note ➡ The DIAG_UP portion of the DIAG_UP:WordOrientation.id expression shown
    in the code snippet a little earlier is actually a constant. You worked with constants
    earlier, in the context of colors and fonts. A constant in JavaFX is also known
    as a *named instance*, because it is always an instance of some type that is given
    a name. I’ll explain how to define and use constants in more detail a little later
    in this chapter.


    **Invoking an Operation Located in the Same Class**


    Please move down to the statement shown following:


    printGrid();


    The printGrid() operation is located within the same class as the runTest() operation
    that we’ve been examining. Consequently, to invoke it you don’t have to qualify
    it with an instance of a class.


    **The for Statement**


    Peeking inside the printGrid() operation for a moment, please take a look at the
    nested for statements (shown following) that are responsible for printing the
    letters in the word grid to the console:


    for (row in [0.. wordGridModel.rows - 1]) {


    System.out.print("|");


    for (column in [0.. wordGridModel.columns - 1]) {


    System.out.print(wordGridModel.gridCells


    [row * wordGridModel.columns + column].cellLetter);


    }


    *firstPress: Creating JavaFX Classes and Objects* 91


    System.out.println("|");


    }


    The body of a for statement must be enclosed in curly braces, and executes once
    for every element in a sequence (also known as an array). In this case, the sequence
    for each of the for statements is defined by a *range expression*, as shown following
    pertaining to the outer for statement:


    [0.. wordGridModel.rows - 1]


    This range expression defines a numeric sequence that begins with 0 and ends with
    whatever the value of the wordGridModel.rows - 1 expression turns out to be. The
    syntax for a range expression is as follows:


    •


    An open square bracket, followed by


    •


    The first number in the sequence, followed by


    •


    Two periods (..), followed by


    •


    The last number in the sequence, followed by


    •


    A closing square bracket


    Optionally, you can also specify the interval contained in the number sequence
    by following the first number of the sequence with a comma (,) and a second number.
    The numeric difference between these numbers determines the numeric interval contained
    in the array. For example, the following range expression (not contained in the
    current example), defines a sequence that contains all 20 of the numbers between
    5 and 100 that are multiples of 5, inclusive:


    [5, 10 .. 100]


    You could then create a for statement that iterates over that sequence and prints
    out the value of the current element in the sequence, as shown in the ForRangeExample.fx
    example in Listing 4-3.


    *Listing 4-3\. The ForRangeExample.fx Program*


    package jfx_book;


    import java.lang.System;


    class ForRangeExample {


    operation run();


    }


    *firstPress: Creating JavaFX Classes and Objects*


    operation ForRangeExample.run() {


    for (i in [5, 10 .. 50]) {


    System.out.println("The value of the current element is {i}");


    }


    }


    var example =


    ForRangeExample {


    };


    example.run();


    Please note that after the class is defined, including the body of the operation,
    there are a couple of statements not associated with the ForRangeExample class
    at the end of the program that that make an instance of the class and invoke the
    run() operation. Incidentally, the WordGridModelTester.fx program uses the same
    technique in its last two statements.


    Here is the output that you should see:


    The value of the current element is 5


    The value of the current element is 10


    The value of the current element is 15


    The value of the current element is 20


    The value of the current element is 25


    The value of the current element is 30


    The value of the current element is 35


    The value of the current element is 40


    The value of the current element is 45


    The value of the current element is 50


    Since this chapter is about creating JavaFX classes and objects, the examples
    that I’ve shown you so far are in the context of a class. Listing 4-4 contains
    a JavaFX program that produces the same output without defining a class.


    *Listing 4-4\. The ForRangeExampleNoClass.fx Program*


    package jfx_book;


    for (i in [5, 10 .. 50]) {


    println("The value of the current element is {i}");


    }


    Of course, you could omit the package statement as well. Notice that instead of
    using the System.out.println() method, I’m using the JavaFX println() operation.
    This makes the import java.lang.System statement unnecessary. As of this writing,
    there is no analogous


    *firstPress: Creating JavaFX Classes and Objects* 93


    print() operation in JavaFX, so I typically just use the methods in System.out
    to output to the console.


    Before leaving the for statement, please take a look at the one that I ignored
    earlier, shown following:


    for (wge in wordGridModel.unplacedGridEntries) {


    System.out.println(wge);


    }


    This one also iterates over a sequence, which in this case contains the unplaced
    WordGridEntry objects. This sequence is defined in the WordGridModel class in
    the following line:


    public attribute unplacedGridEntries:WordGridEntry*;


    You may recall that in an attribute declaration, an asterisk after the attribute
    type denotes a sequence. To be more specific, the asterisk denotes a sequence
    that can contain zero or more elements.


    Note ➡ Other cardinality symbols that can follow the attribute type in an attribute
    declaration are a plus sign (+), which denotes a sequence that can contain one
    or more elements, and a question mark (?), which denotes that assigning a value
    to that attribute is optional.


    Before leaving this section, I’d like you to do a quick exercise to cement some
    of the concepts covered so far in this chapter in your mind:


    **The Squared Numbers Exercise**'
