- fmt: "`CheckBox` - A widget that represent two states (selected true or false).\
    \ A `CheckBox` can have icons associated with it that represent these states.\n\
    \n`ColorChooser` - A dialog that allows the user to select a color.\n\n`ComboBox`\
    \ - A drop-down list box that the user can select from, as well as enter text\
    \ into.\n\n`EditorPane` - A widget that provides text editing functionality.\n\
    \n`FileChooser` - A dialog that allows the user to select a file from the file\
    \ system.\n\n`Label` - A text label that supports HTML and hyperlinks.\n\n`PasswordField`\
    \ - A text field suitable for entering a password.\n\n`ProgressBar` - A widget\
    \ that shows the progress of an operation.\n\n`Slider` - A widget that allows\
    \ the user to choose a value via a slider.\n\n`Spinner` - A widget that allows\
    \ the user to choose from a list of values by clicking an up or down symbol.\n\
    \n`SplitPane` - A widget that contains panes whose sizes may be adjusted by the\
    \ user.\n\n`TabbedPane` - A widget that contains tabs, with a pane for each tab.\n\
    \n`Table` - A widget that has rows and columns.\n\n`TextArea` - A multiline, scrollable\
    \ text field.\n\n`Tree` - A hierarchical list of collapsible nodes.\n\nI’ve got\
    \ one more exercise for you that will help you internalize many of the concepts\
    \ that you’ve learned in this book:\n\n*firstPress: More UI Fun Including 2D Drawing*\
    \ 199\n\n## The JavaFX-a-Sketch Exercise\n\nCreate a JavaFX program that allows\
    \ the user to create various shapes by drawing them on the canvas. For example,\
    \ the user could choose a circle from a menu, click the mouse at the desired center\
    \ point, and drag the mouse to the desired radius. The circle would dynamically\
    \ resize as the user drags the mouse. Prior to drawing a shape, the user would\
    \ also choose fill color, stroke color, and stroke width. The user should be able\
    \ to select and delete a shape. This program should have a model class, as well\
    \ as a custom component for the drawing area. As extra credit, the model class\
    \ should have a sequence that holds information about each shape that is drawn,\
    \ and bind a `ListBox` to the model so that as each shape is added and deleted,\
    \ the `ListBox` reflects information about the current shape objects that are\
    \ on the screen.\n\nBy the way, I’m not including a sample solution to this program\
    \ in the code download, because I want to encourage your creativity and resourcefulness,\
    \ and not short-circuit the learning process. If you’d like, please send me your\
    \ solution (to jim.weaver@jmentor.com) in a ZIP file, as I’d like to see how various\
    \ readers approach this exercise. I plan to post a Java Web Start link on my web\
    \ site (http://jmentor.com/) to some of the solutions I receive, so please indicate\
    \ in your submission e-mail whether you consent to having it made publicly available\
    \ on the Internet.\n\n## Summary\n\nOnce again, you’ve climbed a steep learning\
    \ curve! In this chapter you learned how to do the following:\n\n- Draw several\
    \ shapes on a canvas, as well as place images on a canvas.\n- Use transformations\
    \ such as `translate()` and `rotate()` to control the placement and appearance\
    \ of shapes.\n- Use the bind operator with transformations and the opacity attribute\
    \ (in conjunction with canvas mouse events) to allow the user to dynamically interact\
    \ with shapes and images.\n- Use the `dur` operator with range expressions to\
    \ animate graphical objects.\n- Create an anonymous operation.\n- Use the `var`\
    \ pseudo-attribute to get a reference in declarative code to the context instance\
    \ (analogous to `this`).\n- Create custom components that are 2D graphics–based\
    \ by extending the `CompositeNode` class. You learned to use the `Group` node\
    \ to organize the groupings of the nodes in the component.\n- Create and display\
    \ a `PopupMenu` on a graphical object. This was accomplished with the help of\
    \ a `View` adapter node, which may be place on a canvas but can hold `Widget`\
    \ subclasses.\n- Create custom components that are UI widget–oriented by extending\
    \ the `CompositeWidget` class.\n- Use the `ListBox` and `RadioButton` widgets.\
    \ You also learned about the purpose of many other UI components.\n- Create dialog\
    \ boxes in several ways, depending upon the capabilities required. In this context,\
    \ you learned to use the `GroupPanel` layout widget.\n\nIt has been a pleasure\
    \ teaching you how to create programs in JavaFX, and I’d like to encourage you\
    \ to be active in the Project OpenJFX forums and mailing lists, as well as learning\
    \ from and contributing to the PlanetJFX wiki. This is an exciting time for JavaFX\
    \ Script, as this very simple, elegant, and powerful language is continuing to\
    \ evolve and improve!\n\n## Resources\n\nHere are some more JavaFX resources that\
    \ you can explore to supplement what you’ve learned in this chapter:\n\n- *The\
    \ JavaFX Canvas Tutorial*: This is an excellent resource for continuing to learn\
    \ and practice JavaFX 2D capabilities. It is located in the `trunk/demos/tutorial`\
    \ folder of the Project OpenJFX download, and can be invoked with the `tutorial.bat`\
    \ or `tutorial.sh` script in that folder.\n- *The JavaFX API Reference*: This\
    \ consists of web pages that contain documentation for the attributes, operations,\
    \ and functions in the JavaFX class library. This documentation is generated from\
    \ comments in the JavaFX library source code, and will increase in value as the\
    \ source code becomes increasingly commented. It is located at `https://openjfx.dev.java.net/nonav/api/index.html`,\
    \ and is also located in the Project OpenJFX download.\n- *Additional programs*:\
    \ There are several programs in the Project OpenJFX download that you can learn\
    \ from, including the SVG to JavaFX Translator and the Casual Instant Messaging\
    \ client.\n\n# Document Outline\n\n- [JavaFX Script](#index_split_000.html#p1)\n\
    \  - [Contents](#index_split_000.html#p5)\n  - [CHAPTER 1 Introduction to JavaFX.](#index_split_000.html#p15)\n\
    \  - [CHAPTER 2 Quick Start](#index_split_000.html#p19)\n  - [CHAPTER 3 Creating\
    \ User Interfaces in JavaFX.](#index_split_000.html#p43)\n  - [CHAPTER 4 Creating\
    \ JavaFX Classes and Objects](#index_split_000.html#p95)\n  - [CHAPTER 5 More\
    \ UI Fun Including 2D Drawing](#index_split_001.html#p161)"
