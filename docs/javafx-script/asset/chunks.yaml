    **CHAPTER 4**


    **Creating JavaFX Classes and**


    **Objects**


    *I paint objects as I think them, not as I see them.*


    Pablo Picasso


    Now that you have gained some experience developing UIs in JavaFX, I’d like to
    switch gears and show you more completely how to define classes. In this chapter,
    you’ll gain understanding and experience in writing operations and functions,
    as well as *triggers*, which are automatically invoked under certain conditions.
    You’ll also become familiar with JavaFX statements, expressions, *sequences* (also
    known as arrays), and other concepts related to creating classes. I’m going to
    walk you through all of this in the context of the Word Search Builder application
    that we began examining in the previous chapter.


    **Testing the Word Search Builder Model**


    Figure 4-1 zooms in on the wordsearch_jfx.model package from Figure 3-12 in the
    previous chapter, and shows many of the attributes, operations, and triggers in
    the classes located in that package. You’ll notice that in the upper-left corner
    of this figure is a new class named WordGridModelTester, which we’ll use to test
    the model as a unit, independently of the JavaFX code in the wordsearch_jfx.ui
    package.'
