    Now would be a great time to do an exercise that solidifies the concepts you’ve
    learned in this chapter.


    **The Two Messages Exercise**


    Create a JavaFX program that binds to a model and displays two Text objects. One
    Text object should be displayed below and to the right of the other. Each displayed
    Text object should have an outline that has a different color than its fill color,
    and each should have different font styles. The title bar of the frame should
    contain the phrase “The Two Messages Exercise.” The model class should be in its
    own source file named TwoMessagesModel.fx and the source file that you run should
    be named TwoMessagesMain.fx. Both source files should declare a package name of
    chapter2.


    Figure 2-6 is a screenshot of the output of a sample solution to this exercise.


    *Figure 2-6\. Sample solution to the Two Messages exercise* Hint: Since the content
    attribute of the Canvas instance will now have two Text instances, you’ll need
    to use the array literal notation to assign both of them to the content attribute.
    Have fun with this exercise!


