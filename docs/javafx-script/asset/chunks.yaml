    \nIn the last chapter, you learned a lot about creating JavaFX classes and objects,\
    \ including the details of creating the code for constructs such as operations\
    \ and triggers. In this chapter, you’re going to focus again on UI programming,\
    \ especially in an area that JavaFX excels at making simple: 2D graphics.\n\n\
    ## Understanding JavaFX 2D Graphics\n\nJavaFX uses a powerful declarative syntax\
    \ for 2D drawing, transformations, displaying images, and animation. There are\
    \ many shapes available, such as lines, rectangles, polygons, and as you experienced\
    \ in Chapter 2, the `Text` object is one of the available shapes.\n\nWe’re going\
    \ to put aside the Word Search Builder program for a moment and explore some examples\
    \ of 2D drawing that will help you understand the rest of the code in the `wordsearch_jfx.ui`\
    \ package. We’ll start with one that builds just a little on the `HelloJFX.fx`\
    \ program, which was the first JavaFX program in this book. This program is located\
    \ in the `TextAndEllipse.fx` file in the `Chapter05/jfx_book` folder of the source\
    \ code download. Please go ahead and run the program, and the output should look\
    \ like Figure 5-1.\n\n![Image 36](index-162_1.png)\n\n*Figure 5-1. Output of the\
    \ `TextAndEllipse.fx` program*\n\nLet’s look at the new concepts in Listing 5-1\
    \ that are in addition to what you’ve already learned in the `HelloJFX.fx` program.\n\
    \n*Listing 5-1. The `TextAndEllipse.fx` Program*\n\n```\npackage jfx_book;\n\n\
    import javafx.ui.*;\nimport javafx.ui.canvas.*;\n\nFrame {\n    title: \"Text\
    \ and Ellipse\"\n    height: 250\n    width: 600\n    visible: true\n    content:\n\
    \        Canvas {\n            content: [\n                Ellipse {\n       \
    \             transform: translate(300, 100)\n                    strokeWidth:\
    \ 5\n                    stroke: red\n                    fill: white\n      \
    \              cx: 0\n                    cy: 0\n                    radiusX:\
    \ 250\n                    radiusY: 50\n                },\n                Text\
    \ {\n                    font:\n                        Font {\n             \
    \               faceName: \"Sans Serif\"\n                            style: BOLD\n\
    \                            size: 24\n                        }\n           \
    \         x: 120\n                    y: 90\n                    content: \"This\
    \ is Text and an Ellipse\"\n                }\n            ]\n        }\n}\n```\n\
    \n## Drawing and Painting Shapes\n\nYou already know that the `Text` class is\
    \ actually a shape that can be drawn; in this program, you’ll learn how to draw\
