    \nComboBox\n\n一个下拉列表框，用户既可以从列表中选择，也可以输入文本\n\nEditorPane\n\n一个提供文本编辑功能的控件\n\nFileChooser\n\
    \n一个允许用户从文件系统中选择文件的对话框\n\nLabel\n\n一个支持 HTML 和超链接的文本标签\n\nPasswordField\n\n一个适合输入密码的文本字段\n\
    \nProgressBar\n\n一个显示操作进度的进度条\n\nSlider\n\n一个允许用户通过滑块选择数值的控件\n\nSpinner\n\n一个允许用户通过点击向上或向下符号从值列表中进行选择的控件\n\
    \nSplitPane\n\n一个包含多个窗格，且窗格大小可由用户调整的控件\n\nTabbedPane\n\n一个包含多个选项卡，每个选项卡对应一个窗格的控件\n\
    \nTable\n\n一个包含行和列的表格控件\n\nTextArea\n\n一个可滚动的多行文本字段\n\nTree\n\n一个可折叠节点的分层列表\n\n\
    我还有一个练习要给你，它将帮助你内化本书中学到的许多概念：\n\n*firstPress: 更多 UI 乐趣，包括 2D 绘图* 199\n\n**JavaFX-a-Sketch\
    \ 练习**\n\n创建一个 JavaFX 程序，允许用户通过在画布上绘制来创建各种形状。例如，用户可以从菜单中选择一个圆形，在所需的中心点单击鼠标，然后拖动鼠标到所需的半径。当用户拖动鼠标时，圆形会动态调整大小。在绘制形状之前，用户还需要选择填充颜色、描边颜色和描边宽度。用户应该能够选择和删除一个形状。该程序应该有一个模型类，以及一个用于绘图区域的自定义组件。作为额外加分项，模型类应该有一个序列来保存每个已绘制形状的信息，并将一个\
    \ ListBox 绑定到该模型，这样当每个形状被添加或删除时，ListBox 会反映当前屏幕上形状对象的信息。\n\n顺便说一句，我没有在代码下载中包含这个程序的示例解决方案，因为我希望鼓励你的创造力和足智多谋，而不是缩短学习过程。如果你愿意，请将你的解决方案（以\
    \ ZIP 文件形式）发送到 jim. weaver@jmentor.com，因为我想看看不同的读者是如何处理这个练习的。我计划在我网站 ([`jmentor.com/`](http://jmentor.com))\
    \ 上发布一个 Java Web Start 链接，指向我收到的一些解决方案，因此请在提交邮件中说明你是否同意将其在互联网上公开。\n\n**总结**\n\n\
    再一次，你攀登了一条陡峭的学习曲线！在本章中，你学习了如何执行以下操作：\n\n•\n\n在画布上绘制多种形状，以及在画布上放置图像。\n\n•\n\n使用诸如\
    \ `translate()` 和 `rotate()` 之类的变换来控制形状的位置和外观。\n\n•\n\n将绑定运算符与变换和不透明度属性（结合画布鼠标事件）一起使用，以允许用户与形状和图像进行动态交互。\n\
    \n•\n\n将 `dur` 运算符与范围表达式一起使用来制作图形对象的动画。\n\n*firstPress: 更多 UI 乐趣，包括 2D 绘图*\n\n\
    •\n\n创建一个匿名操作。\n\n•\n\n使用 `var` 伪属性在声明式代码中获取对上下文实例的引用（类似于 `this`）。\n\n•\n\n通过扩展\
    \ `CompositeNode` 类来创建基于 2D 图形的自定义组件。你学习了使用 `Group` 节点来组织组件中节点的分组。\n\n•\n\n在图形对象上创建并显示一个\
    \ `PopupMenu`。这是通过一个 `View` 适配器节点实现的，该节点可以放置在画布上，但可以容纳 `Widget` 子类。\n\n•\n\n通过扩展\
    \ `CompositeWidget` 类来创建面向 UI 控件的自定义组件。\n\n•\n\n使用 `ListBox` 和 `RadioButton` 控件。你还了解了许多其他\
    \ UI 组件的用途。\n\n•\n\n根据所需功能，以多种方式创建对话框。在此上下文中，你学习了使用 `GroupPanel` 布局控件。\n\n教授你如何使用\
