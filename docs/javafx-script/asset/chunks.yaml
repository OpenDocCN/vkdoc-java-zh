    \nNow that you’ve examined the `WordGridModel` class, which is responsible for\
    \ most of the functionality of the model, and have gleaned many JavaFX concepts\
    \ from it, let’s examine the other classes that comprise the model for the Word\
    \ Search Builder application.\n\n**The Model Behind Each Word Search Grid Cell**\n\
    \nAs you saw when examining the `WordGridModel` class, it has an attribute named\
    \ `gridCells` that contains a reference to a sequence of `WordGridCell` instances:\n\
    \n```\n// Array of objects, each of which represent a cell on the word grid\n\
    public attribute gridCells:WordGridCell*;\n```\n\nEach of these instances represents\
    \ a cell in the word search puzzle, and holds information such as the letter that\
    \ occupies that cell. Listing 4-11 contains the code for the `WordGridCell` class.\n\
    \n*firstPress: Creating JavaFX Classes and Objects*\n\n*Listing 4-11\\. The WordGridCell\
    \ Class*\n\n```\npackage wordsearch_jfx.model;\n\nimport javafx.ui.*;\nimport\
    \ java.lang.Character;\nimport java.lang.Math;\nimport wordsearch_jfx.ui.WordGridRect;\n\
    \nclass WordGridCell {\n    // Placed letter in this cell (or could contain a\
    \ space)\n    attribute cellLetter:String;\n    // Random letter in this cell\n\
    \    attribute fillLetter:String;\n    // Indicate which appearance that this\
    \ cell should have\n    // (e.g., SELECTED_LOOK, DRAGGING_LOOK, OR DEFAULT_LOOK)\n\
    \    attribute appearance:WordGridRect;\n    // Word grid entries associated with\
    \ this cell on the grid\n    attribute wordEntries:WordGridEntry*;\n}\n\ntrigger\
    \ on new WordGridCell {\n    cellLetter = SPACE;\n    // Generate random letter\
    \ to be used to fill in this cell\n    // in the case that it doesn't contain\
