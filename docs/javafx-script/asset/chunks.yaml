    属性分配了一个操作，该操作将在 onClose 事件发生时被调用。


    在后续章节中，我将进一步讨论如何在 JavaFX 中使用 Java 功能，包括这些语言中数据类型之间的关系，以及如何创建 Java 类的新实例。与此同时，我将向你展示几种创建
    JavaFX 类新实例的方法，然后我会继续教你关于 JavaFX UI 组件的内容。


