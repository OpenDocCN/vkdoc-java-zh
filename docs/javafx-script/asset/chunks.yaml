- fmt: "# The JavaFX Announcement at JavaOne\n\nThis page contains Sun Microsystems’\
    \ original JavaFX announcement at the May, 2007 JavaOne conference. The URL is\
    \ [www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml](http://www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml).\n\
    \n## Quick Start\n\n*The secret of getting ahead is getting started. The secret\
    \ of getting started is breaking your complex overwhelming tasks into small manageable\
    \ tasks, and then starting on the first one.*\n\n—Mark Twain\n\nNow that you’ve\
    \ been given a 30,000 foot overview of JavaFX, we’re going to follow Mark Twain’s\
    \ advice and break your JavaFX Script learning curve into small, manageable tasks.\n\
    \nThe first task is to choose an environment in which you can begin developing\
    \ JavaFX programs.\n\n> **Note** ➡ For brevity, the rest of this book will typically\
    \ shorten *JavaFX Script* to *JavaFX*.\n\n### Choosing a JavaFX Development Environment\n\
    \nThe three most practical development environments for beginning to develop JavaFX\
    \ applications are as follows:\n\n- **JavaFXPad**: This is a nice tool for quickly\
    \ entering and running JavaFX programs. It is great for playing around and learning\
    \ to use JavaFX language features.\n- **Eclipse, with the JavaFX plug-in**: Eclipse\
    \ is a full-featured Java integrated development environment (IDE), and has a\
    \ plug-in that supports JavaFX. This is a good choice for developing JavaFX applications.\n\
    - **NetBeans, with the JavaFX plug-in**: NetBeans is another full-featured Java\
    \ IDE, and is also a good choice for developing JavaFX applications.\n\nI’m going\
    \ to give you guidance on setting up all three. I would suggest installing JavaFXPad,\
    \ and also choosing one of the IDEs and its JavaFX Script plug-in.\n\n> **Note**\
    \ ➡ Regardless of which development environments you choose, you’ll need the Java\
    \ Runtime Environment (JRE) 1.5 or higher (Mac OS requires the latest JRE 1.5\
    \ release or JRE 1.6). For the IDEs, you’ll need the J2SE Java Development Kit\
    \ (JDK 5.0), which comes with the JRE. Specific instructions concerning the JDK\
    \ required for each platform are on the IDE plug-in URLs that I’ll refer you to\
    \ in a moment.\n\n### Obtaining JavaFXPad\n\nIt is possible to run JavaFXPad straight\
    \ from the Internet by accessing the following URL:\n\n[http://download.java.net/general/openjfx/demos/javafxpad.jnlp](http://download.java.net/general/openjfx/demos/javafxpad.jnlp)\n\
    \nThis will launch JavaFXPad via Java Web Start, which is a Java application deployment\
    \ technology. Each time you access this URL it will check for the latest version\
    \ of JavaFXPad, download it, and automatically execute it.\n\nAnother way to run\
    \ JavaFXPad is to download the JavaFX runtime, library files, and demo programs\
    \ from the Project OpenJFX web site. I highly recommend doing this, as it will\
    \ give you access to the source code for the JavaFX classes, some JavaFX demos,\
    \ and the JavaFX runtime libraries, in addition to JavaFXPad. You can obtain this\
    \ great package in both `.zip` or `.tar.gz` formats at the following URL:\n\n\
    [https://openjfx.dev.java.net/servlets/ProjectDocumentList](https://openjfx.dev.java.net/servlets/ProjectDocumentList)\n\
    \nIf you prefer direct access to the latest releases in the JavaFX code repository\
    \ via a Subversion version control client, you can get this same software at the\
    \ following URL:\n\n[https://openjfx.dev.java.net/source/browse/openjfx/](https://openjfx.dev.java.net/source/browse/openjfx/)\n\
    \nPlease go ahead and obtain the JavaFX software package from the Project OpenJFX\
    \ site, as I’ll be providing instructions in this book that assume that you’ve\
    \ downloaded it.\n\n### Obtaining an IDE Plug-In\n\nAgain, I highly recommend\
    \ using an IDE for JavaFX development, which should help make the code more manageable\
    \ when you get to the Word Search Builder example in Chapter 3. At some point\
    \ while going through this book, please consider getting one of the following\
    \ two plug-ins for your IDE of choice.\n\n#### The Eclipse Plug-In\n\nTo get the\
    \ JavaFX plug-in for Eclipse (requires Eclipse version 3.2 or later), follow the\
    \ instructions at this URL: [https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html](https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html).\n\
    \n#### The NetBeans Plug-In\n\nTo get the JavaFX plug-in for the NetBeans 5.5\
    \ IDE, follow the instructions at this URL:\n\n[https://openjfx.dev.java.net/javafx-nb55-plugin-install.html](https://openjfx.dev.java.net/javafx-nb55-plugin-install.html)\n\
    \nIf you like living on the edge (which you probably do since you’re learning\
    \ about JavaFX), then you can get the plug-in for the NetBeans 6.0 Preview IDE.\n\
    \n## Your First JavaFX Application: HelloJFX\n\nEver since the C programming language\
    \ was introduced, the first program that one usually learns is some sort of Hello\
    \ World application. Not wanting to break tradition, I’m going to start you out\
    \ with the HelloJFX application.\n\n### Running the HelloJFX Application\n\nFigure\
    \ 2-1 shows the results of running the HelloJFX application in JavaFXPad. If you\
    \ installed an IDE with a JavaFX plug-in, then feel free to use that to run this\
    \ program. To run the application using JavaFXPad, perform the following steps:\n\
    \n1. Invoke JavaFXPad. This can be accomplished by executing the proper script\
    \ for your platform, located in the `trunk/demos/javafxpad` folder of the JavaFX\
    \ software package (from the Project OpenJFX site that I referred to in the “Obtaining\
    \ JavaFXPad” section earlier in this chapter). Mine is installed on Windows, so\
    \ I set the `PATH` environment variable to that folder and executed the `javafxpad.bat`\
    \ file.\n2. Optionally, use the **Run ➤ Run Automatically** menu option to turn\
    \ off the feature in which your code will run automatically. I usually turn this\
    \ option off, especially when typing changes into the code, because by default\
    \ every keystroke causes the code to be reevaluated and run.\n\n![Image 6](index-22_1.png)\n\
    \n3. Open the `HelloJFX.fx` file by using the **File ➤ Open** menu option. Alternatively,\
    \ you can cut and paste the `HelloJFX.fx` source code into the code (middle) pane,\
    \ replacing the JavaFX code that appears there by default. This program, as well\
    \ as all the other example programs we’ll be examining, is in the code download\
    \ for this book on the Apress web site ([www.apress.com](http://www.apress.com)).\
    \ More specifically, the `HelloJFX.fx` file can be found in the `Chapter02/jfx_book`\
    \ folder of that download.\n4. If you disabled the **Run ➤ Run Automatically**\
    \ option, then invoke the application by selecting the **Run ➤ Run** menu option.\n\
    \nYour output should look something like the window shown in Figure 2-1.\n\n*Figure\
    \ 2-1. The HelloJFX application*\n\nBy successfully completing this exercise,\
    \ you are verifying that you’ve got everything set up correctly to do the subsequent\
    \ exercises and create your own JavaFX programs.\n\n### Understanding the HelloJFX\
    \ Application\n\nNow that you’ve run the application, let’s walk through the program\
    \ listing together. The code for the HelloJFX application is shown in Listing\
    \ 2-1.\n\n*Listing 2-1. The HelloJFX.fx Program*\n\n```\n/*\n * HelloJFX.fx -\
    \ A JavaFX Script \"Hello World\" style example\n *\n * Developed 2007 by James\
    \ L. Weaver (jim.weaver at jmentor dot com)\n */\n\npackage jfx_book;\n\nimport\
    \ javafx.ui.*;\nimport javafx.ui.canvas.*;\n\nFrame {\n    title: \"Hello World-style\
    \ example for JavaFX Script\"\n    height: 100\n    width: 400\n    content:\n\
    \        Canvas {\n            content:\n                Text {\n            \
    \        font:\n                        Font {\n                            faceName:\
    \ \"Sans Serif\"\n                            style: BOLD\n                  \
    \          size: 24\n                        }\n                    x: 10\n  \
    \                  y: 10\n                    content: \"Hello JavaFX Script Developer!\"\
    \n                }\n        }\n    // Show the Frame on the screen\n    visible:\
    \ true\n}\n```\n\nLet’s walk through the code at a fine level of detail, since\
    \ this is the first example.\n\n#### Comments\n\nThere are two types of comments\
    \ in JavaFX (remember, we’re shortening “JavaFX Script” to “JavaFX”)."
  raw: '*The JavaFX announcement at JavaOne*: This page contains Sun Microsystems’


    original JavaFX announcement at the May, 2007 JavaOne conference. The URL is


    [www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml.](http://www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml)


    **CHAPTER 2**


    **Quick Start**


    *The secret of getting ahead is getting started. The secret of getting started
    is* *breaking your complex overwhelming tasks into small manageable tasks, and*
    *then starting on the first one.*


    Mark Twain


    Now that you’ve been given a 30,000 foot overview of JavaFX, we’re going to follow
    Mark Twain’s advice and break your JavaFX Script learning curve into small, manageable
    tasks.


    The first task is to choose an environment in which you can begin developing JavaFX


    programs.


    Note ➡ For brevity, this rest of this book will typically shorten *JavaFX Script*
    to *JavaFX*.


    **Choosing a JavaFX Development Environment**


    The three most practical development environments for beginning to develop JavaFX


    applications are as follows:


    •


    *JavaFXPad*: This is a nice tool for quickly entering and running JavaFX programs.
    It is great for playing around and learning to use JavaFX language features.


    •


    *Eclipse, with the JavaFX plug-in*: Eclipse is a full-featured Java integrated
    development environment (IDE), and has a plug-in that supports JavaFX. This is
    a good choice for developing JavaFX applications.


    •


    *NetBeans, with the JavaFX plug-in*: NetBeans is another full-featured Java IDE,
    and is also a good choice for developing JavaFX applications.


    I’m going to give you guidance on setting up all three. I would suggest installing
    JavaFXPad, and also choosing one of the IDEs and its JavaFX Script plug-in.


    *firstPress: Quick Start*


    Note ➡ Regardless of which development environments you choose, you’ll need the
    Java Runtime Environment (JRE) 1.5 or higher (Mac OS requires the latest JRE 1.5
    release or JRE 1.6). For the IDEs, you’ll need the J2SE Java Development Kit (JDK
    5.0), which comes with the JRE. Specific instructions concerning the JDK required
    for each platform are on the IDE plug-in URLs that I’ll refer you to in a moment.


    **Obtaining JavaFXPad**


    It is possible to run JavaFXPad straight from the Internet by accessing the following
    URL:


    [http://download.java.net/general/openjfx/demos/javafxpad.jnlp.](http://download.java.net/general/openjfx/demos/javafxpad.jnlp)


    This will launch JavaFXPad via Java Web Start, which is a Java application deployment
    technology. Each time you access this URL it will check for the latest version
    of JavaFXPad, download it, and automatically execute it.


    Another way to run JavaFXPad is to download the JavaFX runtime, library files,
    and demo programs from the Project OpenJFX web site. I highly recommend doing
    this, as it will give you access to the source code for the JavaFX classes, some
    JavaFX demos, and the JavaFX runtime libraries, in addition to JavaFXPad. You
    can obtain this great package in both .zip or .tar.gz formats at the following
    URL:


    [https://openjfx.dev.java.net/servlets/ProjectDocumentList.](https://openjfx.dev.java.net/servlets/ProjectDocumentList)


    If you prefer direct access to the latest releases in the JavaFX code repository
    via a Subversion version control client, you can get this same software at the
    following URL:


    [https://openjfx.dev.java.net/source/browse/openjfx/.](https://openjfx.dev.java.net/source/browse/openjfx)


    Please go ahead and obtain the JavaFX software package from the Project OpenJFX


    site, as I’ll be providing instructions in this book that assume that you’ve downloaded
    it.


    **Obtaining an IDE Plug-In**


    Again, I highly recommend using an IDE for JavaFX development, which should help
    make the code more manageable when you get to the Word Search Builder example
    in Chapter 3\. At some point while going through this book, please consider getting
    one of the following two plug-ins for your IDE of choice.


    *firstPress: Quick Start*


    **The Eclipse Plug-In**


    To get the JavaFX plug-in for Eclipse (requires Eclipse version 3.2 or later),
    follow the instructions at this URL: [https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html.](https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html)


    **The NetBeans Plug-In**


    To get the JavaFX plug-in for the NetBeans 5.5 IDE, follow the instructions at
    this URL:


    [https://openjfx.dev.java.net/javafx-nb55-plugin-install.html.](https://openjfx.dev.java.net/javafx-nb55-plugin-install.html)


    If you like living on the edge (which you probably do since you’re learning about
    JavaFX), then you can get the plug-in for the NetBeans 6.0 Preview IDE.


    **Your First JavaFX Application: HelloJFX**


    Ever since the C programming language was introduced, the first program that one
    usually learns is some sort of Hello World application. Not wanting to break tradition,
    I’m going to start you out with the HelloJFX application.


    **Running the HelloJFX Application**


    Figure 2-1 shows the results of running the HelloJFX application in JavaFXPad.
    If you installed an IDE with a JavaFX plug-in, then feel free to use that to run
    this program. To run the application using JavaFXPad, perform the following steps:


    1\. Invoke JavaFXPad. This can be accomplished by executing the proper script
    for your platform, located in the trunk/demos/javafxpad folder of the JavaFX software
    package (from the Project OpenJFX


    site that I referred to in the “Obtaining JavaFXPad” section earlier in this chapter).
    Mine is instal ed on Windows, so I set the PATH environment variable to that folder
    and executed the javafxpad.bat file.


    2\. Optionally, use the Run ➤ Run Automatical y menu option to turn of the feature
    in which your code wil run automatical y. I usual y turn this option off, especial
    y when typing changes into the code, because by default every keystroke causes
    the code to be reevaluated and run.


    ![Image 6](index-22_1.png)


    *firstPress: Quick Start*


    3\. Open the HelloJFX.fx file by using the File ➤ Open menu option. Alternatively,
    you can cut and paste the HelloJFX.fx source code into the code (middle) pane,
    replacing the JavaFX code that appears there by default. This program, as wel
    as al the other example programs we’l be examining, is in the code download for
    this book on the Apress web site ([www.apress.com). Mo](http://www.apress.com)re
    specifically, the HelloJFX.fx file can be found in the Chapter02/jfx_book folder
    of that download.


    4\. If you disabled the Run ➤ Run Automatically option, then invoke the application
    by selecting the Run


    ➤ Run menu option.


    Your output should look something like the window shown in Figure 2-1.


    *Figure 2-1\. The HelloJFX application*


    By successfully completing this exercise, you are verifying that you’ve got everything
    set up correctly to do the subsequent exercises and create your own JavaFX programs.


    *firstPress: Quick Start*


    **Understanding the HelloJFX Application**


    Now that you’ve run the application, let’s walk through the program listing together.
    The code for the HelloJFX application is shown in Listing 2-1.


    *Listing 2-1\. The HelloJFX.fx Program*


