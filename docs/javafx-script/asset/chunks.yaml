    import javafx.ui.*;


    import javafx.ui.canvas.*;


    Frame {


    title: "Text and Ellipse"


    height: 250


    width: 600


    visible: true


    content:


    Canvas {


    content: [


    Ellipse {


    transform: translate(300, 100)


    strokeWidth: 5


