    ## The JavaFX Statements


    *Table 4-2. JavaFX Statements*


    | **Statement** | **Description** |

    | :--- | :--- |

    | `return` | Exits the current operation or trigger, optionally returning a value
    to the caller. |

    | `if/else` | Executes the statements in the body of the `if` statement when the
    condition is true. If there is an `else` clause, the body of the `else` clause
    is executed when the `if` condition is false. |

    | `for` | Iterates over a sequence, performing the statements in the body of the
    `for` loop with each iteration. |

    | `while` | Executes the statements contained in the body of the `while` loop
    while the condition is true. |

    | `break` | Breaks out of a `for` or `while` loop, continuing execution after
    the body of the loop. |

    | `continue` | Immediately continues executing with the next iteration of a `for`
    or `while` loop where the loop condition is evaluated. |

    | `insert` | Used with sequences, the `insert` statement inserts an element into
    a sequence. |

    | `delete` | Used with sequences, the `delete` statement deletes elements from
    a sequence. |

    | `try/catch/finally` | Used for exception handling, the `try` statement contains
    a body in which one or more statements are attempted. If an exception (error condition)
    occurs, execution immediately continues at the appropriate `catch` clause. The
    optional `finally` clause is executed regardless of whether an exception occurred.
    |

    | `throw` | Used in conjunction with exception handling, the `throw` statement
    causes an exception to be thrown, which is then typically caught by a `try` statement.
    |

    | `do`, `do later` | Used for concurrent processing. |


