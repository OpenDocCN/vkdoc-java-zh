    \ outputs of a sample solution to this exercise. Yours should be similar to one\
    \ of them, depending on whether you run your solution using `JavaFXPad`.\n\n![Image\
    \ 7](index-29_1.png)\n\n*firstPress: Quick Start*\n\n*Figure 2-2. Two sample solutions\
    \ to the Longer Message exercise*\n\nNow that you’ve learned some JavaFX concepts\
    \ by running and examining the `HelloJFX.fx` code and doing the Longer Message\
    \ exercise, I’d like to introduce you to some more concepts. You’ll get a taste\
    \ of what it is like to create classes and objects in JavaFX, as well as how to\
    \ create variables and use constants. You’ll also learn about a deceptively simple\
    \ but powerful concept in JavaFX: binding a view to a model. Let’s walk through\
    \ these concepts in the context of the `HelloJFXBind` application, which builds\
    \ on the previous application.\n\n## Running and Examining the HelloJFXBind Application\n\
    \nRun the `HelloJFXBind.fx` program in your JavaFX tool of choice; the output\
    \ should be a window that looks something like Figure 2-3.\n\n![Image 8](index-30_1.png)\n\
    \n*firstPress: Quick Start*\n\n*Figure 2-3. Output of the HelloJFXBind application*\n\
    \nNow let’s examine the source code in Listing 2-2, making special note of the\
    \ added concepts.\n\n*Listing 2-2. The HelloJFXBind.fx Program*\n\n```\npackage\
    \ jfx_book;\n\nimport javafx.ui.*;\nimport javafx.ui.canvas.*;\n\n/**\n * This\
    \ class serves as the model behind the user interface\n */\nclass HelloJFXModel\
    \ {\n    attribute greeting:String;\n}\n\n/**\n * This is a JavaFX Script that\
    \ binds to data from the model.\n */\nvar hellojfxModel =\n    HelloJFXModel {\n\
    \        greeting: \"Hello JavaFX Script Developer!\"\n    };\n\nFrame {\n   \
    \ title: \"JavaFX Script example that binds to a model\"\n    height: 100\n  \
    \  width: 400\n    content:\n        Canvas {\n            content:\n        \
    \        Text {\n                    font:\n                        Font {\n \
    \                           *firstPress: Quick Start*\n                      \
    \      faceName: \"Sans Serif\"\n                            // Example of an\
    \ attribute with a collection of values\n                            style: [\n\
    \                                BOLD,\n                                ITALIC]\n\
    \                            size: 24\n                        }\n           \
    \         // Put some color into the app\n                    stroke: red\n  \
    \                  fill: red\n                    x: 10\n                    y:\
    \ 10\n                    content: bind hellojfxModel.greeting\n             \
    \   }\n        }\n    visible: true\n}\n```\n\n## Structure of a Minimal JavaFX\
    \ Class\n\nOne of the first differences you’ll notice from the previous example\
    \ is that this program defines a class named `HelloJFXModel` in the following\
    \ lines of code:\n\n```\nclass HelloJFXModel {\n    attribute greeting:String;\n\
    }\n```\n\nThis is a very minimal class, as it doesn’t have many of the possible\
    \ characteristics (which you’ll learn about later), but it’s a good place to start.\n\
    \n### The `class` Declaration\n\nThe declaration of a class always includes the\
    \ `class` keyword and, as shown in the preceding code snippet, has opening and\
    \ closing curly braces. There are other JavaFX keywords, such as `public` and\
