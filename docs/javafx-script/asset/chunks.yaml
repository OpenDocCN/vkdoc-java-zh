    environment with its set of layout widgets, which are BorderPanel, Box, CardPanel,
    FlowPanel, GridBagPanel, GridPanel, GroupPanel, and StackPanel. Of these, you
    used the BorderPanel and GridPanel classes in an exercise, walked through an example
    of the Box class, and saw the descriptions and attributes for the rest of them.


    You’ll be getting some experience with the GroupPanel layout widget in Chapter
    5.


    •


    You learned how to create a JavaFX ToolBar widget, and to create and place buttons
    that contain icons on the toolbar.


    •


    You learned to use the SimpleLabel widget in an exercise after being exposed only
    to its purpose and list of attributes. You were also exposed to the idea that
    many of the classes that appear in a JavaFX UI (including SimpleLabel) inherit
    their attributes from the Widget class, and you saw several of those attributes.


    In the next chapter, I’m going to help you understand how to create JavaFX classes
    and cover related concepts, some of which I’ve alluded to in this chapter. Among
    the concepts that we’ll discuss are JavaFX classes, operations, triggers, statements,
    operators, expressions, arrays, data types, and access modifiers. You’ve really
    got your work cut out for you in the next chapter, but you’re going to learn a
    lot!


