    \ Serif` 赋给新 `Font` 实例的 `faceName` 属性。请注意，属性名称后面总是跟着一个冒号（`:`），在 JavaFX 声明式语法中，这意味着“将右侧表达式的值赋给左侧的属性”。这些相同的概念适用于此脚本中的所有类（`Frame`、`Canvas`\
    \ 和 `Text`）。让我们逐一查看这些类。\n\n*firstPress：快速入门*\n\n**使用 Frame 类**\n\n`Frame` 代表一个\
    \ GUI 窗口，它有自己的边框，并且可以在其中包含其他 GUI 组件。\n\n注意 ➡ 在这个简单的 `HelloJFX.fx` 示例中，如图 2-1 所示，JavaFXPad\
    \ 将 `Frame` 对象渲染为输出区域内的一个矩形区域，而不是一个单独的窗口。在图 2-3 所示的稍微复杂一点的示例截图中，JavaFXPad 将 `Frame`\
    \ 对象渲染为一个单独的窗口。\n\n与任何类一样，`Frame` 类也有一组属性。`Frame` 小部件所具有的属性集，如清单 2-1 中的以下代码片段所示，如下所示：\n\
    \n*   一个出现在窗口标题栏中的标题（再次，请查看图 2-3 以了解 `Frame` 对象的正确渲染，并注意其标题）。\n*   决定窗口初始高度和宽度的\
    \ `height` 和 `width`（以像素为单位）。\n*   一个 `content` 属性，定义了 `Frame` 对象的内容是什么。在这种情况下，`Frame`\
    \ 对象将包含一个 `Canvas` 小部件，你将在其上绘制一个包含要显示消息的 `Text` 对象。\n*   一个 `visible` 属性（在 `Canvas`\
    \ 小部件的右花括号之后），用于控制 `Frame` 对象是否立即显示在屏幕上。\n\n```java\nFrame {\n    title: \"Hello\
    \ World-style example for JavaFX Script\"\n    height: 100\n    width: 400\n \
    \   content:\n    ...some code omitted...\n    // Show the Frame on the screen\n\
    \    visible: true\n}\n```\n\n*firstPress：快速入门*\n\n**创建字符串字面量**\n\nJavaFX 拥有的数据类型之一是\
    \ `String`，它由零个或多个字符连接而成。如下面的 `Frame` 对象的 `title` 属性所示，字符串字面量是通过将一组字符括在双引号中来定义的：\n\
    \n```java\ntitle: \"Hello World-style example for JavaFX Script\"\n```\n\n或者，字符串字面量也可以用单引号括起来。\n\
    \n**使用 Canvas GUI 小部件**\n\n`Canvas` 小部件的用途是绘制二维（2D）图形，包括线条、形状和文本。它是一个 JavaFX 类，但我在这里将其称为*小部件*，因为它是\
    \ JavaFX `Widget` 类的子类。如下所示，`Canvas` 小部件的 `content` 属性指示了将在画布上绘制的内容——在本例中是一些文本：\n\
    \n```java\nCanvas {\n    content:\n    Text {\n        ...some code omitted...\n\
    \    }\n}\n```\n\n提示 ➡ 如果你想查看任何 JavaFX 类的代码，请查看 Project OpenJFX 站点软件包（本章前面“获取\
    \ JavaFXPad”部分提到过）中的 `trunk/src/javafx` 文件夹。JavaFX 类按包组织，特别是 `javafx.ui`、`javafx.ui.canvas`\
    \ 和 `javafx.ui.filter` 包，因此你需要在相应的子文件夹中查找包含源代码的 FX 文件。\n\n**绘制文本**\n\n要在画布上绘制一些文本，你需要使用\
    \ `Text` 类，并提供 `x` 和 `y` 位置（以像素为单位）作为属性，文本的左上角将出现在该位置。`Text` 类的 `content` 属性包含将要绘制的字符串，`font`\
    \ 属性指定了将要绘制的文本的外观。\n\n*firstPress：快速入门*\n\n```java\nText {\n    font:\n    Font\
    \ {\n        faceName: \"Sans Serif\"\n        style: BOLD\n        size: 24\n\
    \    }\n    x: 10\n    y: 10\n    content: \"Hello JavaFX Script Developer!\"\n\
    }\n```\n\n**定义字体**\n"
- fmt: "# 排版后的文档\n\nAnd finally, at the innermost level of the declarative script\
