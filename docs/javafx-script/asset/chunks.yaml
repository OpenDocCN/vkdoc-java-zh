  raw: 'If you run the BordersExample.fx program and resize the frame (or move the
    drag handles if using JavaFXPad) to be smaller vertically, the result will continue
    to be nine uniform cells, each vertically smaller than it originally was. See
    Figure 3-17 for the results that I observed when resizing the frame.


    *Figure 3-17\. Output of BordersExample.fx after resizing the frame vertically*
    Let’s examine some excerpts from the BordersExample.fx program, shown following,
    so you can learn to use the GridPanel layout widget:


    Frame {


    **...some code omitted...**


    content:


    GridPanel {


    rows: 3


    columns: 3


    vgap: 5


    hgap: 5


    cells: [


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    *firstPress: Creating User Interfaces in JavaFX*


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    Button {


    **...some code omitted...**


    },


    ]


    }


    }


    In the preceding code, we first assign a GridPanel widget to the content attribute
    of the Frame. This causes the layout of the UI components in the Frame to be governed
    by the rules of the GridPanel layout widget.


    Next, we tell the GridPanel how many rows and columns should be in the grid by
    assigning the desired values to the rows and columns attributes.


    You’ll notice from the screenshot in Figure 3-17 that there is some space between
    the cells in the grid. This is achieved by assigning the desired values to the
    vgap and hgap attributes (in pixels) to control the vertical and horizontal spacing,
    respectively.


    Using array literal notation, we then assign a UI component to each of the cells
    in the GridPanel. UI components in a GridPanel expand to the size of the cell,
    which is why the Button widgets in this example are nearly as large as the cells.


    Note ➡ Although I’m showing the GridPanel widget being assigned to the content
    of a Frame, please note that any layout widget can be assigned to any GUI component
    that can contain widgets. This includes, for example, Frame, Dialog, and all of
    the layout widgets. I’ll generically call these types of components *UI containers*.


    ![Image 29](index-78_1.png)


    *firstPress: Creating User Interfaces in JavaFX*


    Let’s look at another very useful layout widget, named the Box.


    **Using the Box Layout Widget**


    The Box layout widget is used for stacking UI components in a UI container either
    vertically or horizontally. You can see the effects of using the Box layout widget
    in the screenshot in Figure 3-18, in which the WordGridView and WordListsView
    custom UI components are arranged horizontally. Note that I’ve added dotted lines
    to this screenshot to show where the Box layout widget is (the outer dotted rectangle)
    and where each UI component is within the Box layout widget (the inner dotted
    rectangles).


    *Figure 3-18\. Using the Box layout widget in the Word Search Builder application*
    You’ll see the code related to the Box widget used in the following snippet from
    WordSearchMain.fx:


    Box {


    orientation: HORIZONTAL


    content: [


    Canvas {


    content: bind wgModel.wordGridView


    },


    BorderPanel {


    center: bind wgModel.wordListsView


    }


    ]


    }


    ![Image 30](index-79_1.png)


    *firstPress: Creating User Interfaces in JavaFX*


    The orientation attribute controls whether the UI components in the Box will be
    arranged horizontally or vertically. The content attribute is assigned one or
    more UI components via the array literal notation. Notice that one of the UI components
    being assigned is a BorderPanel layout widget—this is an example of where a layout
    widget is nested inside of another layout widget to achieve the desired UI component
    placement.


    Speaking of BorderPanel layout widgets, let’s turn our attention to those.


    **Using the BorderPanel Layout Widget**'
