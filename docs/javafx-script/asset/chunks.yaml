    its declarative programming model. You’ve already been exposed to one form of
    trigger: the *assert* *trigger*. There are two more forms of trigger declarations
    that are appropriate to introduce at this point:


    •


    Creation triggers


    •


    Replace triggers


    A *creation trigger* is automatically executed when a new instance of the class
    that it is contained in is created. Creation triggers serve nearly the same purpose
    as the special operation that has the same name as the class (that we examined
    earlier in this chapter).


    Shown following is an example of a creation trigger from an excerpt of the WordGridCell
    class. We’ll look at the WordGridCell class, shown in Listing 4-11, in more detail
    a little later in this chapter.


    *firstPress: Creating JavaFX Classes and Objects* 117


    trigger on new WordGridCell {


    cellLetter = SPACE;


    // Generate random letter to be used to fill in this cell


    // in the case that it doesn''t contain a word


    fillLetter = Character.forDigit(Math.random() * 26 + 10, 36).


    toString().toUpperCase();


