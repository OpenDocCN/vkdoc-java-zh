- fmt: "[http://java.sun.com/docs/books/tutorial/uiswing/layout/visual.html](http://java.sun.com/docs/books/tutorial/uiswing/layout/visual.html)\n\
    \nI’d like to teach you one more concept in this chapter: how to create and use\
    \ a `ToolBar`.\n\n## Creating a ToolBar\n\nListing 3-5 contains a snippet of code\
    \ from the `WordSearchMain.fx` file related to creating the Word Search Builder\
    \ application’s toolbar.\n\n*firstPress: Creating User Interfaces in JavaFX*\n\
    \n**Listing 3-5.** Creating the ToolBar Widget in `WordSearchMain.fx`\n\n```\n\
    ToolBar {\n    floatable: true\n    border:\n        EtchedBorder {\n        \
    \    style:RAISED\n        }\n    buttons: [\n        Button {\n            icon:\n\
    \                Image {\n                    url: \"file:resources/place_word.gif\"\
    \n                }\n            toolTipText: \"Place word on grid\"\n       \
    \     enabled: bind not wgModel.fillLettersOnGrid\n            action: operation()\
    \ {\n                wsHandlers.gridPlaceWord();\n            }\n        },\n\
    \        Button {\n            icon:\n                Image {\n              \
    \      url: \"file:resources/place_random.gif\"\n                }\n         \
    \   toolTipText: \"Place word randomly on grid\"\n            enabled: bind not\
    \ wgModel.fillLettersOnGrid\n            action: operation() {\n             \
    \   wsHandlers.gridPlaceWordRandomly();\n            }\n        },\n        Button\
    \ {\n            icon:\n                Image {\n                    url: \"file:resources/unplace_word.gif\"\
    \n                }\n            toolTipText: \"Unplace (remove) word from grid\"\
    \n            enabled: bind not wgModel.fillLettersOnGrid\n            action:\
    \ operation() {\n                wsHandlers.gridUnplaceWord();\n            }\n\
    \        },\n        Button {\n            ![Image 31](index-84_1.png)\n     \
    \       *firstPress: Creating User Interfaces in JavaFX*\n            icon:\n\
    \                Image {\n                    url: \"file:resources/add_word.gif\"\
    \n                }\n            toolTipText: \"Add word to word list\"\n    \
    \        action: operation() {\n                wsHandlers.wordListAddWord();\n\
    \            }\n        }\n    ]\n}\n```\n\nAs you saw in Figure 3-19 and the\
    \ related code, this `ToolBar` widget is assigned to the `top` attribute of the\
    \ `BorderPanel` layout widget, which is why it appears across the top of the `Frame`.\
    \ By setting the `floatable` attribute to `true`, we’re allowing the user to drag\
    \ this `ToolBar` widget from the top of the `Frame` object to its own floating\
    \ window, as shown in Figure 3-20.\n\n*Figure 3-20. The ToolBar’s floatable attribute\
    \ enabling the user to undock the toolbar*\n\nThe most typical UI components used\
    \ on toolbars are `Button` widgets, but some other JavaFX widgets may be placed\
    \ on a toolbar as well.\n\n*firstPress: Creating User Interfaces in JavaFX*\n\n\
    ## Using Button Widgets on a Toolbar\n\nAs shown in Listing 3-5, to place `Button`\
    \ widgets (or other kinds of widgets) on the `ToolBar` widget, you assign them\
    \ to the `buttons` attribute. Typically, a toolbar button displays an icon, and\
    \ when the user hovers the mouse cursor over a button, a tool tip appears that\
    \ contains text briefly describing the purpose of the button. A tool tip being\
    \ displayed as a result of hovering is shown in Figure 3-20. To make an icon appear\
    \ on a `Button` widget, we’re assigning an `Image` instance to the `icon` attribute,\
    \ supplying a URL that contains the location of the desired image file. To define\
    \ a tool tip’s text, we’re assigning a `String` to the `toolTipText` attribute\
    \ of the `Button` widget.\n\nThe other two attributes that we’re using on the\
    \ toolbar buttons are the same ones that were used on their `MenuItem` counterparts,\
    \ and were described earlier in this chapter.\n\nCompare, for example, what is\
    \ assigned to the `enabled` and `action` attributes of the first `Button` widget\
    \ on this toolbar with the same attributes in the Grid ➤ Place Word `MenuItem`\
    \ in Listing 3-2.\n\nFor your reference, Table 3-4 contains the JavaFX classes\
    \ that we’ve covered so far in this book (in order of appearance), but that haven’t\
    \ appeared in a table yet. This table also contains a class (named `SimpleLabel`)\
    \ that I haven’t mentioned yet, but that you will be using in the exercise that\
    \ follows this table. Some classes contain too many attributes to show here, so\
    \ I’ve selected the ones that you’re most likely to use in declarative code. To\
    \ see the other public attributes (as well as operations and functions) related\
    \ to a class, consult the JavaFX source code for that class.\n\n*Table 3-4. Some\
    \ JavaFX Classes*\n\n| Class | Description | Public Attributes |\n|-------|-------------|------------------|\n\
    | `Frame` | The main window of a JavaFX application. | `shape:Shape?`<br>`disposeOnClose:Boolean`<br>`hideOnClose:Boolean`<br>`screenx:Number?`<br>`screeny:Number?`<br>`menubar:MenuBar?`<br>`content:Widget`<br>`dispose:Boolean`<br>`title:String`<br>*(Continued)*\
    \ |"
