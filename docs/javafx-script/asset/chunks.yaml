    **Using the JavaFX Dialog Class**


    When you need to create a dialog box that is more complex than the ones previously
    described, you can use the JavaFX Dialog class. For example, Figure 5-10 shows
    the dialog box from the Word Search Builder that asks the user for specific information
    on where a word should be placed:


    *Figure 5-10\. A dialog box created with the JavaFX Dialog class* Using the Dialog
    class is similar to using the Frame class, as shown in the excerpt in Listing
    5-10:


