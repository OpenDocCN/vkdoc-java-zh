    As you saw in Figure 3-19 and the related code, this ToolBar widget is assigned
    to the top attribute of the BorderPanel layout widget, which is why it appears
    across the top of the Frame. By setting the floatable attribute to true, we’re
    allowing the user to drag this ToolBar widget from the top of the Frame object
    to its own floating window, as shown in Figure 3-20.


    *Figure 3-20\. The ToolBar’s floatable attribute enabling the user to undock the
    toolbar* The most typical UI components used on toolbars are Button widgets, but
    some other JavaFX widgets may be placed on a toolbar as well.


    *firstPress: Creating User Interfaces in JavaFX*


    **Using Button Widgets on a Toolbar**


    As shown in Listing 3-5, to place Button widgets (or other kinds of widgets) on
    the ToolBar widget, you assign them to the buttons attribute. Typically, a toolbar
    button displays an icon, and when the user hovers the mouse cursor over a button,
    a tool tip appears that contains text briefly describing the purpose of the button.
    A tool tip being displayed as a result of hovering is shown in Figure 3-20\. To
    make an icon appear on a Button widget, we’re assigning an Image instance to the
    icon attribute, supplying a URL that contains the location of the desired image
    file. To define a tool tip’s text, we’re assigning a String to the toolTipText
    attribute of the Button widget.


    The other two attributes that we’re using on the toolbar buttons are the same
    ones that were used on their MenuItem counterparts, and were described earlier
    in this chapter.


    Compare, for example, what is assigned to the enabled and action attributes of
    the first Button widget on this toolbar with the same attributes in the Grid ➤
    Place Word MenuItem in Listing 3-2.


    For your reference, Table 3-4 contains the JavaFX classes that we’ve covered so
    far in this book (in order of appearance), but that haven’t appeared in a table
    yet. This table also contains a class (named SimpleLabel) that I haven’t mentioned
    yet, but that you will be using in the exercise that follows this table. Some
    classes contain too many attributes to show here, so I’ve selected the ones that
    you’re most likely to use in declarative code. To see the other public attributes
    (as well as operations and functions) related to a class, consult the JavaFX source
    code for that class.


    *Table 3-4\. Some JavaFX Classes*


    **Class**


    **Description**


    **Public Attributes**


    Frame


    The main window of a


    shape:Shape?


    JavaFX application.


    disposeOnClose:Boolean


    hideOnClose:Boolean


    screenx:Number?\


    screeny:Number?


    menubar:MenuBar?


    content:Widget


    dispose:Boolean


    title:String


    *(Continued)*'
  trans: "\n[`java.sun.com/docs/books/tutorial/uiswing/layout/visual.html`](http://java.sun.com/docs/books/tutorial/uiswing/layout/visual.html)\n\
    \n在本章中，我想再教你一个概念：如何创建和使用工具栏。\n\n**创建工具栏**\n\n清单 3-5 包含了来自 WordSearchMain.fx 文件的一段代码片段，该代码与创建\
    \ Word Search Builder 应用程序的工具栏相关。\n\n*firstPress: 使用 JavaFX 创建用户界面*\n\n清单 3-5\\\
    . 在 WordSearchMain.fx 中创建工具栏组件 ToolBar {\n\nfloatable: true\n\nborder:\n\nEtchedBorder\
    \ {\n\nstyle:RAISED\n\n}\n\nbuttons: \n\nButton {\n\nicon:\n\nImage {\n\nurl:\
    \ \"file:resources/place_word.gif\"\n\n}\n\ntoolTipText: \"在网格上放置单词\"\n\nenabled:\
    \ bind not wgModel.fillLettersOnGrid\n\naction: operation() {\n\nwsHandlers.gridPlaceWord();\n\
    \n}\n\n},\n\nButton {\n\nicon:\n\nImage {\n\nurl: \"file:resources/place_random.gif\"\
    \n\n}\n\ntoolTipText: \"在网格上随机放置单词\"\n\nenabled: bind not wgModel.fillLettersOnGrid\n\
    \naction: operation() {\n\nwsHandlers.gridPlaceWordRandomly();\n\n}\n\n},\n\n\
    Button {\n\nicon:\n\nImage {\n\nurl: \"file:resources/unplace_word.gif\"\n\n}\n\
    \ntoolTipText: \"从网格中移除（取消放置）单词\"\n\nenabled: bind not wgModel.fillLettersOnGrid\n\
    \naction: operation() {\n\nwsHandlers.gridUnplaceWord();\n\n}\n\n},\n\nButton\
    \ {\n\n![图片 31\n\n*firstPress: 使用 JavaFX 创建用户界面*\n\nicon:\n\nImage {\n\nurl: \"\
    file:resources/add_word.gif\"\n\n}\n\ntoolTipText: \"将单词添加到单词列表\"\n\naction: operation()\
    \ {\n\nwsHandlers.wordListAddWord();\n\n}\n\n}\n\n]\n\n}\n\n正如你在图 3-19 和相关代码中所见，此工具栏组件被分配给了\
    \ BorderPanel 布局组件的 top 属性，这就是它出现在 Frame 顶部的原因。通过将 floatable 属性设置为 true，我们允许用户将此工具栏组件从\
    \ Frame 对象的顶部拖拽到其独立的浮动窗口中，如图 3-20 所示。\n\n*图 3-20\\. 工具栏的 floatable 属性允许用户取消停靠工具栏*\
    \ 工具栏上最常用的 UI 组件是 Button 组件，但其他一些 JavaFX 组件也可以放置在工具栏上。\n\n*firstPress: 使用 JavaFX\
    \ 创建用户界面*\n\n**在工具栏上使用按钮组件**\n\n如清单 3-5 所示，要将 Button 组件（或其他类型的组件）放置在 ToolBar 组件上，你需要将它们分配给\
    \ buttons 属性。通常，工具栏按钮会显示一个图标，当用户将鼠标光标悬停在按钮上时，会出现一个工具提示，其中包含简要描述按钮用途的文本。图 3-20\
    \ 显示了因悬停而显示的工具提示。要使图标显示在 Button 组件上，我们将一个 Image 实例分配给 icon 属性，并提供包含所需图像文件位置的 URL。要定义工具提示的文本，我们将一个字符串分配给\
    \ Button 组件的 toolTipText 属性。\n\n我们在工具栏按钮上使用的另外两个属性与它们在 MenuItem 对应项上使用的属性相同，并且在本章前面已经描述过。\n\
    \n例如，将此工具栏上第一个 Button 组件的 enabled 和 action 属性所分配的值，与清单 3-2 中 Grid ➤ Place Word\
    \ MenuItem 的相同属性进行比较。\n\n供你参考，表 3-4 包含了本书迄今为止（按出现顺序）介绍过的 JavaFX 类，但这些类尚未在表格中出现过。此表还包含一个我尚未提及的类（名为\
    \ SimpleLabel），但你将在本表之后的练习中使用它。某些类包含的属性太多，无法在此全部展示，因此我选择了你在声明式代码中最可能使用的那些属性。要查看与某个类相关的其他公共属性（以及操作和函数），请查阅该类的\
    \ JavaFX 源代码。\n\n*表 3-4\\. 部分 JavaFX 类*\n\n**类**\n\n**描述**\n\n**公共属性**\n\nFrame\n\
    \nJavaFX 应用程序的\n\nshape:Shape?\n\n主窗口。\n\ndisposeOnClose:Boolean\n\nhideOnClose:Boolean\n\
    \nscreenx:Number?\\\n\nscreeny:Number?\n\nmenubar:MenuBar?\n\ncontent:Widget\n\
    \ndispose:Boolean\n\ntitle:String\n\n*(续)*\n"
- fmt: "# *firstPress: Creating User Interfaces in JavaFX*\n\n## Class\n\n**Description**\n\
    \n**Public Attributes**\n\n`Frame`\n\nThe main window of a JavaFX application.\n\
    \n`height:Number?`\n`width:Number?`\n`onOpen:function()`\n`onClose:function()`\n\
    `centerOnScreen:Boolean`\n`background:Color?`\n`visible:Boolean`\n`resizable:Boolean`\n\
    `iconImage:Image?`\n`undecorated:Boolean`\n`showing:Boolean`\n`iconified:Boolean`\n\
    `active:Boolean`\n\n`Canvas`\n\nA JavaFX widget on which 2D drawing is performed.\
    \ `Canvas` is a subclass (and therefore inherits the attributes) of the JavaFX\
    \ `Widget` class, so your applications can use the attributes defined in the `Widget`\
    \ class when using a `Canvas` (shown next in this table).\n\n`content:Node*`\n\
    `scaleToFit:Boolean`\n`onDrop:function(e:CanvasDropEvent)?`\n`onDragEnter:function(e:CanvasDropEvent)?`\n\
    `onDragExit:function(e:CanvasDropEvent)?`\n`dropType:Class?`\n`canAcceptDrop:function(e:CanvasDropEvent):Boolean?`\n\
    \n`Widget`\n\nThe JavaFX class from which all non-window UI components (a.k.a.\
    \ widgets) are derived.\n\n`keyboardAction:KeyboardAction*`\n`x:Number?`\n`y:Number?`\n\
    `width:Number?`\n`height:Number?`\n`toolTipText:String?`\n`visible:Boolean?`\n\
    \n`Widget`\n\nThe JavaFX class from which all non-window UI components (a.k.a.\
    \ widgets) are derived.\n\n`background:AbstractColor?`\n`foreground:Color?`\n\
    `font:Font?`\n`border:Border?`\n`cursor:Cursor?`\n`enabled:Boolean?`\n`onMouseEntered:function(e:MouseEvent)`\n\
    `onMouseExited:function(e:MouseEvent)`\n`onMousePressed:function(e:MouseEvent)`\n\
    `onMouseReleased:function(e:MouseEvent)`\n`onMouseClicked:function(e:MouseEvent)`\n\
    `onMouseMoved:function(e:MouseEvent)`\n`onMouseDragged:function(e:MouseEvent)`\n\
    `onMouseWheelMoved:function(e:MouseWheelEvent)`\n`onKeyUp:function(event:KeyEvent)`\n\
    `onKeyDown:function(event:KeyEvent)`\n`onKeyTyped:function(event:KeyEvent)`\n\n\
    `Text`\n\nA JavaFX class for drawing text on a canvas.\n\n`editable:Boolean`\n\
    `content:String`\n`x:Number`\n`y:Number`\n`font:Font?`\n`verticalAlignment:Alignment`\
    \ `LEADING`, `TRAILING`, `CENTER`, `BASELINE`\n\n`Font`\n\nA JavaFX class that\
    \ specifies a font.\n\n`face:FontFace?` `ALBANY`, `ANDALE_SANS`, `ANDALE_SANS_UI`,\
    \ `ARIAL`, `ARIAL_BLACK`, `ARIAL_NARROW`, etc.\n`faceName:String?`\n`size:Integer`\n\
    `style:FontStyle*` `BOLD`, `PLAIN`, `ITALIC`\n`styleStr:String`\n\n*(Continued)*\n\
    \n`ToolBar`\n\nA rectangular area usually at the top of a window that contains\
    \ buttons and perhaps other widgets. A `ToolBar` is a subclass of the `Widget`\
    \ class (shown in a previous entry of this table), and inherits its attributes.\n\
    \n`floatable:Boolean?`\n`rollover:Boolean`\n`borderPainted:Boolean?`\n`orientation:Orientation`\n\
    `margin:Insets?`\n`buttons:Widget*`\n\n`Button`\n\nA subclass of the `Widget`\
    \ class that the user can click (or otherwise activate) to cause an action to\
    \ occur.\n\n`defaultButton:Boolean?`\n`defaultCancelButton:Boolean?`\n`text:String?`\n\
    `mnemonic:KeyStroke?`\n`icon:Icon?`\n`selectedIcon:Icon?`\n`pressedIcon:Icon?`\n\
    `rolloverIcon:Icon?`\n`rolloverSelectedIcon:Icon?`\n`rolloverEnabled:Boolean`\n\
    `disabledIcon:Icon?`\n`disabledSelectedIcon:Icon?`\n`iconTextGap:Number?`\n`horizontalTextPosition:HorizontalAlignment?`\
    \ `LEADING`, `CENTER`, `TRAILING`\n`verticalTextPosition:VerticalAlignment?` `CENTER`,\
    \ `TOP`, `BOTTOM`\n`horizontalAlignment:HorizontalAlignment?` `LEADING`, `CENTER`,\
    \ `TRAILING`\n`verticalAlignment:VerticalAlignment?` `CENTER`, `TOP`, `BOTTOM`\n\
    \n`Image`\n\nAn icon, including the location of where the graphical image is loaded\
    \ from (e.g., from a web URL or the user’s local file system).\n\n`url:String?`\n\
    `size:Dimension?`\n`onLoad:function()`\n\n`SimpleLabel`\n\nA subclass of the `Widget`\
    \ class that displays text. It is typically used as a label in front of, or above,\
    \ other UI components.\n\n`text:String`\n`icon:Icon?`\n`horizontalAlignment:HorizontalAlignment`\
    \ `LEADING`, `CENTER`, `TRAILING`\n`mnemonic:KeyStroke?`\n`labelFor:Widget?`\n\
    \nAs promised, here is an exercise that uses the newly introduced `SimpleLabel`,\
    \ as well as many of the concepts introduced in this chapter.\n\n## The Keypad\
    \ Exercise\n\nIn this exercise, you’ll create a JavaFX program that vaguely resembles\
    \ the keypad and numeric display on a calculator. Here are the requirements for\
    \ this exercise:\n\n- The keypad should have nine buttons, arranged in a three-by-three\
    \ grid, with the numbers 1 through 9 assigned to their text attribute. Put some\
    \ type of noticeable border around the keypad. Hint: The sample solution uses\
    \ a `GridPanel` to arrange the buttons.\n- The numeric display should appear on\
    \ top of the keypad and consist of a `SimpleLabel` widget that displays the number\
    \ of the last button clicked. Hint: To achieve this arrangement, the sample solution\
    \ assigns the `SimpleLabel` to the top attribute of a `BorderPanel`, and the `GridPanel`\
    \ to the center of the `BorderPanel`.\n- To make it look more like a calculator,\
    \ the number should be right-justified on the `SimpleLabel` widget.\n- The `SimpleLabel`\
    \ should have an `EmptyBorder` that provides spacing on the right side so that\
    \ the number doesn’t appear too close to the right edge of the `Frame`.\n- Hint:\
    \ The class solution uses the font attribute of `SimpleLabel` (which it inherits\
    \ from the `Widget` class) to make the number in the display a little larger than\
    \ the default.\n- The program should have one menu, with two menu items on it:\n\
    \  - A `CheckBoxMenuItem` with *Disabled* as its text. When this menu item is\
    \ checked, all of the buttons are disabled, and when it is not checked, all of\
    \ the buttons are enabled. The `Ctrl+D` shortcut key combination should choose\
    \ this menu item. Hint: The sample solution uses the bind operator for this functionality.\n\
    \  - A `MenuItem` with *Exit* as its text. When the user chooses this menu item,\
    \ the program will exit.\n- The initial program should be located in a file named\
    \ `KeyPadMain.fx`, and should make use of a model with class name of `KeyPadModel`,\
    \ located in a separate file. To help you out a little, here are two of the lines\
    \ of code from the `KeyPadModel` class in the sample solution:\n  ```\n  attribute\
    \ keysDisabled: Boolean;\n  attribute letterClicked: String;\n  ```\n  I’d like\
    \ to offer one additional hint for this exercise: the action attribute assignment\
    \ on each `Button` in the sample solution looks something similar to the following:\n\
    \  ```\n  operation() {\n      kpModel.letterClicked = \"1\";\n  }\n  ```\n\n\
    Figure 3-21 is a screenshot of the output of a sample solution to this exercise.\n\
    \n![Image 32](index-91_1.png)\n\n*Figure 3-21. Sample solution to the Keypad exercise*\n\
    \nEnjoy this exercise!\n\n## Summary\n\nOnce again, congratulations on your progress!\
    \ I hope that you have found the Keypad exercise helpful and at least slightly\
    \ challenging. Here are some of the accomplishments you can now celebrate:\n\n\
    - You took a tour of the Word Search Builder application, which serves as a nontrivial\
    \ JavaFX example from which to learn JavaFX. You also studied its architecture,\
    \ which you can use as a reference when designing your own JavaFX applications.\n\
    - You learned to create menus for a JavaFX application, and in the process learned\
    \ to use the `MenuBar`, `Menu`, `MenuItem`, `CheckBoxMenuItem`, `MenuSeparator`,\
    \ and `Accelerator` classes. You also found out that there is a `RadioButtonMenuItem`\
    \ class that has similar functionality to the `RadioButton` class that you’ll\
    \ learn about in Chapter 5.\n- You learned how to leverage the universe of existing\
    \ Java code by invoking methods contained in Java classes.\n- You reviewed the\
    \ declarative syntax for making an instance of a JavaFX class, and learned the\
    \ procedural syntax (using the `new` operator) for doing the same thing.\n- You\
    \ learned how to create and use all of the border types in JavaFX, which are `BevelBorder`,\
    \ `EtchedBorder`, `EmptyBorder`, `LineBorder`, `MatteBorder`, `ShadowedBorder`,\
    \ `SoftBevelBorder`, `TitledBorder`, and `CompoundBorder`. Recall that the `CompoundBorder`\
    \ enables you to combine more than one border type, placing one inside the other."
