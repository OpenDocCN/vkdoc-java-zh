    **Using the PopupMenu Widget**


    The PopupMenu widget is responsible for displaying the context menu shown in Figure
    3-7


    in Chapter 3\. In order to display a PopupMenu, however, you must specify a subclass
    of Widget that is the owner of the PopupMenu. To see this, look for a moment at
    the displayPopupMenu() operation in the WordGridRect class in Listing 5-7.


    Because this custom component extends CompositeNode, it consists of 2D graphical
    (Node) objects drawn on a canvas. Subclasses of the Widget class (e.g., Button
    or Canvas) can’t be put directly on a canvas. We have to find a way to give the
    PopupMenu a Widget that can be its owner. This is why I used a View object, shown
    following, in the composeNode() operation in Listing 5-6.


    View {


    // This canvas serves as the owner for the PopupMenu


    content: canvas


    }


    I think of the View class as an adapter, because it can be placed on a canvas,
    and a Widget can be placed on a view. The problem is solved because the canvas
    that I placed on the view is used as the owner for the PopupMenu.


    *Listing 5-7\. The WordGridRect Class*


    package wordsearch_jfx.ui;


    import javafx.ui.*;


    import javafx.ui.canvas.*;


    import wordsearch_jfx.model.WordGridModel;


    class WordGridRect extends Rect {


    attribute wsHandlers:WordSearchHandlers;


    attribute wgModel:WordGridModel;


    attribute row:Integer;


    attribute column:Integer;


    attribute appearance:WordGridRect;


    // For ..._LOOK constants


    attribute name:String;


    operation displayPopupMenu (cmEvt:CanvasMouseEvent, canvas:Canvas);


    }


