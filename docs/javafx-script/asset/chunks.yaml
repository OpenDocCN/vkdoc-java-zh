    Now that you understand how to develop both kinds of custom components (Node-based
    and Widget-based), let’s look at the final listing in the Word Search Builder
    application and you’ll learn how to create dialog boxes in JavaFX in the process.


    **Creating Dialog Boxes**


    As shown in the diagram in Figure 5-5 and Figure 3-12 in Chapter 3, the purpose
    of the WordSearchHandlers class is to handle requests made by the code in the
    WordSearchMain.fx file, the WordGridView class, and the WordListsView class. Some
    requests are made directly to the WordGridModel class, but the requests that require
    a dialog box to appear are being handled in the WordSearchHandlers class, which
    then makes requests of the WordGridModel class. Please take a moment to browse
    the WordSearchHandlers.fx code in Listing 5-9, and we’ll look at three ways to
    create dialog boxes.


