    *firstPress: 在 JavaFX 中创建用户界面*


    SimpleLabel


    Widget 类的子类，用于显示文本。它通常用作其他 UI 组件前面或上方的标签。


    text:String


    icon:Icon?


    horizontalAlignment:HorizontalAlignment LEADING, CENTER, TRAILING


    mnemonic:KeyStroke?


    labelFor:Widget?


    正如所承诺的，这里有一个练习，它使用了新介绍的 SimpleLabel，以及本章介绍的许多概念。


    **键盘练习**


    在本练习中，您将创建一个 JavaFX 程序，该程序大致类似于计算器上的键盘和数字显示屏。以下是本练习的要求：


    •


    键盘应有九个按钮，排列成三乘三的网格，数字 1 到 9 分配给它们的文本属性。在键盘周围放置某种明显的边框。提示：示例解决方案使用 GridPanel 来排列按钮。


    •


    数字显示屏应出现在键盘顶部，由一个 SimpleLabel 控件组成，该控件显示最后点击的按钮的数字。提示：为了实现这种排列，示例解决方案将 SimpleLabel
    分配给 BorderPanel 的 top 属性，并将 GridPanel 分配给 BorderPanel 的 center 属性。


    •


    为了使其看起来更像计算器，数字应在 SimpleLabel 控件上右对齐。


    •


    SimpleLabel 应有一个 EmptyBorder，在右侧提供间距，以便数字看起来不会太靠近 Frame 的右边缘。


    •


    提示：类解决方案使用 SimpleLabel 的 font 属性（它从 Widget 类继承而来）使显示屏中的数字比默认值稍大一些。


    *firstPress: 在 JavaFX 中创建用户界面*


    • 程序应有一个菜单，菜单上有两个菜单项：


    •


    一个 CheckBoxMenuItem，其文本为 *Disabled*。当选中此菜单项时，所有按钮都被禁用；当未选中时，所有按钮都被启用。Ctrl+D 快捷键组合应选择此菜单项。提示：示例解决方案使用
    bind 运算符来实现此功能。


    •


    一个 MenuItem，其文本为 *Exit*。当用户选择此菜单项时，程序将退出。


    • 初始程序应位于名为 KeyPadMain.fx 的文件中，并应使用一个模型，其类名为 KeyPadModel，位于单独的文件中。为了给您一些帮助，以下是示例解决方案中
    KeyPadModel 类的两行代码：attribute keysDisabled: Boolean;


    attribute letterClicked: String;


    对于此练习，我想再提供一个提示：示例解决方案中每个 Button 上的 action 属性赋值类似于以下内容：


    operation() {


    kpModel.letterClicked = "1";


    }


    图 3-21 是本练习示例解决方案输出的屏幕截图。


    ![Image 32](img/index-91_1.png)


    *firstPress: 在 JavaFX 中创建用户界面*


    *图 3-21. 键盘练习的示例解决方案*


    祝您享受这个练习！


    **总结**


    再次祝贺您取得的进步！我希望您觉得键盘练习有所帮助，并且至少有一点挑战性。以下是您现在可以庆祝的一些成就：


    •


    您参观了 Word Search Builder 应用程序，它作为一个重要的 JavaFX 示例，可供您学习 JavaFX。您还研究了它的架构，在设计自己的
    JavaFX 应用程序时，可以将其用作参考。


    •


    您学习了为 JavaFX 应用程序创建菜单，并在此过程中学习了如何使用 MenuBar、Menu、MenuItem、CheckBoxMenuItem、MenuSeparator
    和 Accelerator 类。您还发现有一个 RadioButtonMenuItem 类，其功能与您将在第 5 章中学习的 RadioButton 类类似。


    •


    您学习了如何通过调用 Java 类中包含的方法来利用现有 Java 代码的庞大资源。


    *firstPress: 在 JavaFX 中创建用户界面*


    •


    您复习了创建 JavaFX 类实例的声明式语法，并学习了执行相同操作的过程式语法（使用 new 运算符）。


    •


    您学习了如何创建和使用 JavaFX 中的所有边框类型，包括 BevelBorder、EtchedBorder、EmptyBorder、LineBorder、MatteBorder、ShadowedBorder、SoftBevelBorder、TitledBorder
    和 CompoundBorder。回想一下，CompoundBorder 使您能够组合多种边框类型，将一个边框放置在另一个边框内部。


