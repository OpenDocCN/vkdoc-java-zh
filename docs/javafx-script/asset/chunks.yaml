- fmt: '# Creating Menus in JavaFX


    As shown in Listing 3-2, to create menus in a `Frame`, you first need to create
    an instance of a `MenuBar` widget to contain them by assigning a `MenuBar` to
    the `menubar` attribute of the `Frame`.


    ## Creating Menu Widgets


    To create menus on the `MenuBar`, you assign them to the `menus` attribute of
    the `MenuBar`.


    Recall that to assign multiple objects to an attribute, you use array literal
    notation that consists of comma-separated values enclosed in square brackets.
    Note that arrays are also called sequences in JavaFX, so I’ll use those terms
    interchangeably in this book.


    As shown in the Grid menu in Listing 3-2, `Menu` widgets have several available
    attributes, including the following:


    - A `text` attribute that determines what the label is on the `Menu` (in this
    case, the word *Grid*).

    - A `mnemonic` attribute that specifies a key that can be used in conjunction
    with the `Alt` key to invoke that menu (in this case, the letter *G*).

    - An `items` attribute that holds menu items, as described in the next section.
    This attribute can also hold `Menu` widgets so that multilevel menu structures
    can be defined.


    ## Creating MenuItem Widgets


    As shown in the Place Word menu item in Listing 3-2, to create menu items on a
    `Menu`, you assign them to the `items` attribute of the `Menu` widget using array
    literal notation.


    `MenuItem` widgets have several available attributes, including the following:


    - A `text` attribute that determines what the label is on the `MenuItem` (in this
    case, the text *Place Word..*)

    - A `mnemonic` attribute that specifies a key that can be used in conjunction
    with the `Alt` key to invoke that `MenuItem` (in this case, the letter *P*).

    - An `accelerator` attribute that defines a shortcut key for invoking the `MenuItem`,
    which is defined with the help of the `modifier` and `keystroke` attributes of
    the `Accelerator` class. In this case, the shortcut key combination is `Ctrl+P`.

    - An `enabled` attribute that controls whether the `MenuItem` is enabled or disabled.
    In this case, as depicted in Figure 3-12, the value of the `enabled` attribute
    is bound to the state of the `fillLettersOnGrid` attribute of the `WordGridModel`.
    Because of the use of the `not` operator, this `MenuItem` is enabled when `fillLettersOnGrid`
    is `false`, and not enabled when `fillLettersOnGrid` is `true`.

    - An `action` attribute that defines what operation or function should be invoked
    when the action event occurs (when the user selects this `MenuItem`). To accomplish
    this, assign an operation or function to the `action` attribute as shown in the
    listing. In this case, the `gridPlaceWord()` operation of the `WordSearchHandlers`
    instance gets invoked (you’ll see in a few moments where this `WordSearchHandlers`
    instance is created). I’ll go into detail in Chapter 4 about operations and functions,
    and I’ll have more to say about events in Chapter 5.


    A `MenuItem` is a leaf node in a menu structure, and cannot contain other `MenuItem`
    widgets.


    > **Note** ➡ You may have noticed that the assignment of an `Accelerator` instance
    to the `accelerator` attribute doesn’t require mentioning the `Accelerator` class
    in front of the curly braces that contain its attributes. This is because the
    `accelerator` attribute of a `MenuItem` can only be assigned an instance of the
    `Accelerator` class, so there is no ambiguity (as opposed to an attribute that
    specifies a superclass to which any of its subclasses can be assigned). This explanation
    may make more sense to you after you’ve worked through the next chapter, but I
    wanted to point it out here. Incidentally, for the reason just explained, it also
    wouldn’t have been necessary to mention the `MenuBar` class when assigning it
    to the `menuBar` attribute of the `Frame` class.


    ## Creating CheckBoxMenuItem Widgets


    As shown in the Show Fill Letters menu item in Listing 3-2, there is a special
    kind of menu item, named `CheckBoxMenuItem`, that acts like a check box because
    it holds the state of whether it is currently checked or not. When the user selects
    this kind of menu item, the state of the `selected` attribute toggles between
    `true` and `false`. In this case, that state is bound to the `fillLettersOnGrid`
    attribute of the `WordGridModel`, so the bind behavior described earlier affects
    the state of this `CheckBoxMenuItem`. In addition, whenever a UI widget whose
    value can be changed by the user is bound, the bind becomes bidirectional. In
    the case of this Show Fill Letters `CheckBoxMenuItem`, when the user causes it
    to be checked, the state of the `fillLettersOnGrid` attribute of the `WordGridModel`
    becomes `true`. When the user causes it to be unchecked, the state of the `fillLettersOnGrid`
    attribute of the `WordGridModel` becomes `false`. This is another very powerful
    aspect of the bind operator.


    The `CheckBoxMenuItem` widget has an event-related attribute that isn’t required
    by this example, named `onChange`. Whenever the user chooses a `CheckBoxMenuItem`,
    the `onChange` event occurs and the operation or function that is assigned to
    is invoked, passing as an argument the state of whether it is currently selected.


    ## Visually Separating Menu Items


    As shown in Figure 3-13, it is sometimes useful to visually separate menu items
    with a line. This allows you to group related menu items together. To do this,
    use the `MenuSeparator` widget between the desired menu items, as shown in Listing
    3-2.


    ## Table of Menu-Related Widgets


    For your reference, Table 3-1 contains JavaFX widgets that are related to menus.
    In the Public Attributes column, the attribute name and that attribute’s type
    is shown, separated by a colon (as you’ll see later, an attribute of a JavaFX
    class that is public is accessible to your application). If the attribute can
    hold an array of instances, then the type will be followed by an asterisk (`*`).
    If an attribute is optional, the type will be followed by a question mark (`?`).


    This notation is consistent with the diagram in Figure 3-12, and with how attributes
    are defined within JavaFX classes. Data types will be covered in detail in the
    next chapter, but I want you to see how the data types relate to each attribute
    in this table now as a reference.


    These types will either be one of the four basic JavaFX types (`String`, `Boolean`,
    `Number`, and `Integer`) or a JavaFX class whose source code you can see in the
    Project OpenJFX site download to which I referred you earlier. You can see the
    source code for all the classes in this table (and any other table in this book)
    in that download.


    ### Table 3-1. Menu-Related Widgets


    | Widget | Description | Public Attributes |

    |--------|-------------|------------------|

    | `MenuBar` | A widget that lives in a `Frame` object and holds menus | `menus:Menu*`
    |

    | `Menu` | A widget that contains `MenuItem`, `CheckBoxMenuItem`, `RadioButtonMenuItem`,
    and `MenuSeparator` widgets | `text:String`, `mnemonic:KeyStroke?`, `items:AbstractMenuItem*`
    |

    | `MenuItem` | An item on a menu that can cause something to happen when selected
    | `mnemonic:KeyStroke?`, `accelerator:Accelerator?`, `text:String`, `icon:Icon?`,
    `action:function()`, `enabled:Boolean` |

    | `Accelerator` | A shortcut keystroke combination meant to invoke a menu item
    | `modifier:KeyModifier*`, `keyStroke:KeyStroke` |

    | `CheckBoxMenuItem` | A special kind of menu item that can be checked and unchecked
    | Same attributes as `MenuItem`, plus: `selected:Boolean`, `onChange:function(newValue:Boolean)`
    |

    | `RadioButtonMenuItem` | A special kind of menu item in which only one of the
    menu items in a group can be selected at any given time | Same attributes as `CheckBoxMenuItem`,
    plus: `buttonGroup:ButtonGroup` |

    | `MenuSeparator` | Visually separates menu items from each other | No attributes
    |


    > **Note** ➡ Creating and using a `RadioButtonMenuItem` is very similar to creating
    and using a `RadioButton`, which is discussed in Chapter 5.'
