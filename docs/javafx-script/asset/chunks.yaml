    *firstPress: Creating User Interfaces in JavaFX*


    you just looked at in Figure 3-16 and Listing 3-4 is a good example of a simple
    UI design, requiring only one layout widget: the GridPanel layout widget.


    **Using the GridPanel Layout Widget**'
