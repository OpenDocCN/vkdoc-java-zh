    关于 firstPress


    Apress 的 **firstPress** 系列是您了解前沿技术的源泉。内容简短、高度精炼，并由专家撰写，Apress 的 firstPress 书籍为您节省时间和精力。它们包含您通过密集研究或每隔一周参加一次会议（如果您有时间的话）才能获得的信息。它们涵盖了能让
    *您* 始终走在技术曲线前沿的概念和技术。Apress 的 firstPress 书籍是真正的书籍，以您选择的电子版或按需印刷版形式呈现，即使在技术本身尚不成熟时，也毫无粗糙之处。您不能没有它们。


    JavaFX™ Script: Dynamic Java™ Scripting for


    Rich Internet/Client-Side Applications


    亲爱的读者，


    JavaFX Script 在 2007 年 JavaOne 大会上亮相，被誉为一款能让开发者使用 Sun Microsystems 的 JavaFX 产品系列创建富内容的工具。我撰写《JavaFX™
    Script: Dynamic Java™ Scripting for Rich Internet/Client-Side Applications》这本书，是因为我对使用
    JavaFX Script 创建能在多种平台（包括个人电脑和手机）上运行的富互联网应用程序的强大功能和简洁性感到兴奋。


    我于 1995 年开始开发 Java 应用程序，见证了 Java 功能和复杂性的与日俱增。当我看到 JavaFX Script 如何为内容设计者和应用程序开发者提供一种简单而强大、背后拥有
    Java 全部能力的语言时，我立刻认识到了它的潜力。例如，在 JavaFX Script 中，一个简单的声明式表达式就可以定义一个包含平台无关布局管理器的用户界面。在幕后，诸如布局管理器和
    Swing 组件等 Java 设施会被自动调用来实现所需的用户界面。


    我的教程式书籍将让您以最快的速度使用 JavaFX Script 开发应用程序。我将逐步引导您学习 JavaFX Script 的概念，每个概念都建立在您对前一概念的理解之上。全书穿插的练习和示例解答将测试您的理解程度，帮助您更快地学习，并结合教程的逻辑风格，使其成为宝贵的课程教材或培训伴侣。关于
    JavaFX Script 结构（如运算符）的复杂信息以表格形式呈现，使本书成为一本易于参考、您会反复查阅的指南。JavaFX Script 非常新，并且仍在变化。随着它的变化，本书将进行更新以反映这些变化。


    我希望您能和我一样对 JavaFX Script 及其提供的潜力感到兴奋，并希望您能享受通过本书学习并掌握它的过程。


    此致，


    James L. (Jim) Weaver, SCJD


