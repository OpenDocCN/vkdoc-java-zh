- fmt: "# JavaFX 注释类型\n\n注意 ➡ 如示例所示，JavaFX 文件中存在第三种注释类型，称为 Javadoc 注释。这些注释以`/**`字符开头，以`*/`字符结尾。其目的是支持\
    \ Java 类的文档自动生成，我预计未来会有工具利用 Javadoc 风格的注释为 JavaFX 类生成文档。\n\n## 创建类的实例\n\n现在`HelloJFXModel`类已定义，程序继续使用之前创建\
    \ UI 时所用的声明式语法来创建该类的实例：\n\n```\nvar hellojfxModel = HelloJFXModel {\n    greeting:\
    \ \"Hello JavaFX Script Developer!\"\n};\n```\n\n这个新实例的`greeting`属性包含一个字符串，其值为`Hello\
    \ JavaFX Script Developer!`。\n\n## 声明和赋值变量\n\n如上所示，程序使用`var`关键字声明了一个名为`hellojfxModel`的变量。通过赋值运算符（`=`），该变量被赋值为`HelloJFXModel`类新创建实例的引用。稍后你将需要`hellojfxModel`变量来获取该实例的引用。值得注意的是，在使用`var`关键字声明的变量之前，应始终为其赋值。\n\
    \n变量命名（使用`var`或`attribute`关键字声明的标识符）需遵循以下规则和约定：\n\n*firstPress: 快速入门*\n\n- **规则**：变量必须以字母、下划线（`_`）或美元符号（`$`）开头。变量名中的后续字符可以是数字、字母、下划线或美元符号。\n\
    - **约定**：变量以小写字母开头，通常不包含下划线，绝不包含美元符号，并由一个或多个驼峰式单词组成。\n\n在适当的情况下使用数字。例如，`HelloJFXModel`类中使用的变量名为`greeting`。保存行星名称的变量可以命名为`planetName`。\n\
    \n变量名应尽可能长且具有实际意义，并应传达其含义。此外，与 JavaFX 中的大多数事物一样，变量名区分大小写。\n\n## 理解绑定\n\n请跳转到当前示例中`Text`对象的声明处，如下所示：\n\
    \n```\nText {\n    font: Font {\n        faceName: \"Sans Serif\"\n        //\
    \ 具有值集合的属性示例\n        style: [BOLD, ITALIC]\n        size: 24\n    }\n    // 为应用添加一些颜色\n\
    \    stroke: red\n    fill: red\n    x: 10\n    y: 10\n    content: bind hellojfxModel.greeting\n\
    }\n```\n\n这段代码块（任何一对花括号之间的代码称为代码块）中包含一些新概念。我现在想指出的概念是将应用程序的视图（用户界面）绑定到模型（数据）。在最后一行代码中，你会注意到`Text`实例的`content`属性包含了`bind`运算符。这会导致将`Text`实例的内容与`HelloJFXModel`实例的`greeting`属性进行绑定（增量更新）。如果\n\
    \n![Image 9](index-34_1.jpg)\n\n*firstPress: 快速入门*\n\n`greeting`属性发生变化，JavaFX\
    \ 将自动导致`Text`实例的内容发生变化，从而立即更新应用程序中显示的消息。图 2-4 展示了这种绑定行为，左侧是 UI 组件的包含层次结构，右侧是`HelloJFXModel`类的类图。\n\
    \n*图 2-4. HelloJFXBind 应用程序中的绑定示意图*\n\n由于绑定是一个如此强大的概念，你将在本书的示例应用程序中频繁看到它的使用。在结束这个示例之前，我想向你展示几个与在声明式表达式中为属性赋值相关的\
    \ JavaFX 概念。\n\n## 为 Text 对象分配颜色常量"
  raw: 'Note ➡ As shown in the example, there is a third type of comment used in JavaFX
    files, called Javadoc comments. These comments start with the /** characters and
    end with the */ characters. Their purpose is to support automatic generation of
    documentation for Java classes, and I anticipate that there will be tools created
    for JavaFX that use Javadoc-style comments to generate documentation for JavaFX
    classes.


    **Making an Instance of the Class**


    Now that the HelloJFXModel class has been defined, the program goes on to create
    an instance of that class using the same declarative syntax that was used earlier
    to create a UI: var hellojfxModel =


    HelloJFXModel {


    greeting: "Hello JavaFX Script Developer!"


    };


    The greeting attribute of this new instance contains a string with the value of
    Hello JavaFX Script Developer!.


    **Declaring and Assigning Variables**


    As just shown, the program uses the var keyword to declare a variable named hellojfxModel.
    Using an assignment operator (=), this variable is assigned a reference to a newly
    created instance of the HelloJFXModel class. You’re going to need the hellojfxModel
    variable a little later to get a reference to this instance. It is worth noting
    that you should always assign a value to a variable declared with the var keyword
    before using it.


    There are rules and conventions for the names that you give to variables (identifiers
    that are declared with either the var or attribute keywords):


    *firstPress: Quick Start*


    •


    *The rules*: Variables must begin with a letter, an underscore character (_),
    or a dollar sign ($). Subsequent characters in the variable name can be numbers,
    letters, underscore characters, or dollar signs.


    •


    *The conventions*: Variables start with a lowercase letter, don’t usually have
    underscores, never contain dollar signs, and consist of one or more camel case
    words.


    Numbers are used where appropriate. For example, the variable used in the HelloJFXModel
    class is named greeting. A variable that holds the name of a planet could be named
    planetName.


    Variable names can be as long as practical, and should convey meaning. In addition,
    variables, like most everything in JavaFX, are case-sensitive.


    **Understanding Binding**


    Please jump down in the current example to the declaration of the Text object,
    shown here: Text {


