    # Chapter 1: Introduction to JavaFX


    *I wouldn’t give a nickel for the simplicity on this side of complexity, but I
    would give my life for the simplicity on the other side of complexity.*


    Albert Einstein


    ## The JavaFX Family


    At the annual JavaOne conference in May 2007, Sun Microsystems announced a new
    product family named JavaFX. Its stated purpose includes enabling the development
    and deployment of content-rich applications on consumer devices such as mobile
    phones, televisions, in-dash car systems, and browsers. According to Sun, the
    vision of the JavaFX product family is to deliver “the ability to create interactive
    content, applications and services from the desktop to mobile devices to the living
    room.” The JavaFX product family currently consists of two technologies: JavaFX
    Mobile and JavaFX Script.


    ### JavaFX Mobile


    JavaFX Mobile is essentially a layered software system for mobile devices on which
    programs developed in JavaFX Script can execute.


    ### JavaFX Script


    JavaFX Script is a language that is targeted at content authors, regardless of
    their programming background. Using simple, declarative scripts, content authors
    can create very rich user interfaces. As well as having declarative scripting,
    JavaFX Script is a fully object-oriented language, complete with methods (called
    operations and functions in JavaFX) and attributes. JavaFX Script, like Java,
    is statically typed.


    *firstPress: Introduction to JavaFX*


    ## JavaFX Script’s Relationship to Java


    If you’ve done much Java development, especially Java Swing development, you know
    that Java and Java Swing have an amazing amount of functionality, and at the same
    time are very complex.


    JavaFX leverages all of the power of Java, because JavaFX code can fully utilize
    the Java libraries. For example, it can call methods of, and instantiate, Java
    classes. Much of the user interface (UI) capability of JavaFX makes use of the
    Java Swing classes behind the scenes.


    The net effect is that content developers and application developers can use a
    simple and elegant language that harnesses the power of Java and Java Swing. As
    intimated by the Einstein quote at the beginning of the chapter, I am excited
    about how JavaFX has found the “simplicity on the other side of complexity.”


    ## Features and Advantages of JavaFX Script


    The following list describes some of the strengths of JavaFX Script:


    - Its simple, declarative syntax used to express user interfaces, including a
    very rich set of *layout widgets* that make easy work of laying out a user interface
    in a platform-independent way. Content developers can create great looking, functional
    user interfaces without being expert programmers.'
