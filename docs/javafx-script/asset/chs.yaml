  \n耶利米书 29:11\n\n*7f672e752e259312b9d0e126a4b50034*\n\n**xi**\n\n**第 1 章**\n\n**JavaFX\
  \ 简介**\n\n*我不愿为复杂性这一侧的简单性付出一分钱，但我愿意为复杂性另一侧的简单性付出生命。*\n\n阿尔伯特·爱因斯坦\n\n**JavaFX 家族**\n\
  \n在 2007 年 5 月的年度 JavaOne 大会上，Sun Microsystems 宣布了一个名为*JavaFX*的新产品家族。其既定目标包括在移动电话、电视、车载仪表盘系统和浏览器等消费设备上开发和部署富内容应用程序。据\
  \ Sun 公司称，JavaFX 产品家族的愿景是提供“从桌面到移动设备再到客厅，创建交互式内容、应用程序和服务的能力”。JavaFX 产品家族目前包含两项技术：JavaFX\
  \ Mobile 和 JavaFX Script。\n\n**JavaFX Mobile**\n\nJavaFX Mobile 本质上是一个面向移动设备的分层软件系统，用\
  \ JavaFX Script 开发的程序可在其上运行。\n\n**JavaFX Script**\n\nJavaFX Script 是一种面向内容创作者的编程语言，无论其编程背景如何。通过使用简单的声明式脚本，内容创作者可以创建非常丰富的用户界面。除了声明式脚本功能外，JavaFX\
  \ Script 还是一种完全面向对象的语言，包含方法（在 JavaFX 中称为操作和函数）和属性。与 Java 一样，JavaFX Script 是静态类型的。\n\
  \n*firstPress：JavaFX 简介*\n\n**JavaFX Script 与 Java 的关系**\n\n如果你做过大量 Java 开发，尤其是\
  \ Java Swing 开发，你会知道 Java 和 Java Swing 拥有惊人的功能，同时也非常复杂。\n\nJavaFX 充分利用了 Java 的全部能力，因为\
  \ JavaFX 代码可以完全使用 Java 库。例如，它可以调用 Java 类的方法并实例化 Java 类。JavaFX 的许多用户界面（UI）功能在幕后都使用了\
  \ Java Swing 类。\n\n最终效果是，内容开发者和应用程序开发者可以使用一种简单而优雅的语言，来驾驭 Java 和 Java Swing 的强大功能。正如本章开篇爱因斯坦的名言所暗示的那样，我对\
  \ JavaFX 如何找到“复杂性另一侧的简单性”感到兴奋。\n\n**JavaFX Script 的特性与优势**\n\n以下列表描述了 JavaFX Script\
  \ 的一些优势：\n\n• 其用于表达用户界面的简单声明式语法，包含一套非常丰富的*布局组件*，能以平台无关的方式轻松完成用户界面布局。内容创作者无需成为专业程序员，就能创建外观精美、功能完善的用户界面。\n\
  \n•\n\n\n其天生支持模型-视图-控制器模式的能力源于其非常强大的*绑定*功能。这补充并实现了声明式编程语法，因为对象的属性（包括用户界面对象）可以绑定到模型类中包含的值，且通常是双向绑定。\n\
  \n•\n\n*触发器*的概念（当特定条件发生时自动调用的功能，例如当属性值发生变化时）。这也实现了声明式语法，并使 UI 开发相对容易，因为 setter 和\
  \ getter 被触发器取代，当属性值发生变化时会自动调用这些触发器。\n\n•\n\nJavaFX 程序可以在任何能运行 Java 程序的地方运行，因为它们运行在\
  \ Java 虚拟机（JVM）的上下文中。目前有一个名为 OpenJFX 编译器孵化器项目的计划正在进行中，其使命是为 JavaFX 代码创建一个编译器，将其转换为\
  \ JVM 字节码。当这一目标完全实现后，JavaFX Script 的执行速度将与 Java 代码相媲美。\n\n•\n\n其用于定义、修改和查询序列（可视为数组）的语法非常强大。\n\
  \n*firstPress：JavaFX 入门*\n\n一个附带好处是它能够快速开发应用程序原型。另一个附带好处是它非常适合在学校中用于教授编程概念。\n\n\
  **JavaFX Script 的当前状态**\n\n正如您将在本书中看到的，JavaFX Script 借助 Java 库，目前功能非常完善且可靠。JavaFX\
  \ Script 的语法在不断改进中处于变化状态，JavaFX Script 类库也在持续完善。由于 Project OpenJFX 是一个开放项目，JavaFX\
  \ 社区正在为 JavaFX Script 的理念和开发做出贡献。这个包括开发工具提供商在内的社区将不断改进 JavaFX Script 开发工具的能力，增加诸如重构等功能。JavaFX\
  \ Script 目前处于评估许可下，但很快将开源。\n\n**如何充分利用本书**\n\n本书采用教程风格编写，建议从头到尾按顺序阅读。我强烈建议运行所有示例并完成所有练习，这将加快您对内容的学习。本书在\
  \ Apress 网站上有代码下载，其中包含所有练习的示例解决方案（最后一个练习除外）。\n\n我在本书中的目标不仅是教您 JavaFX Script 语法，还要将本书的主要示例（单词搜索拼图构建器）作为示例，供您从中汲取设计\
  \ JavaFX 程序的架构思路。我的另一个目标是帮助您真正享受学习 JavaFX Script 的过程。那么，让我们开始吧！\n\n**总结**\n\n在本章中，您学习了以下内容：\n\
  \n•\n\nJavaFX 产品系列包括 JavaFX Mobile 和 JavaFX Script。\n\n•\n\nJavaFX Script 的目标受众之一是内容作者，他们可以使用简单的声明式脚本创建丰富的用户界面。\n\
  \n•\n\nJavaFX Script 是面向对象且静态类型的。\n\n•\n\nJavaFX Script 利用了 Java 和 Java Swing 的强大功能。\n\
  \n*firstPress：JavaFX 入门*\n\n•\n\n布局控件使得开发平台无关的用户界面变得容易。\n\n•\n\n绑定功能有助于实现模型-视图-控制器模式以及声明式脚本编写。触发器也支持这些功能。\n\
  \n•\n\nJavaFX Script 程序运行在 JVM 上，因此几乎可以在任何地方运行。此外，目前正在努力将 JavaFX Script 代码编译为 JVM\
  \ 字节码。\n\n•\n\nJavaFX Script 具有非常强大的序列（数组）操作能力。\n\n**资源**\n\n有关 JavaFX 的一些背景信息，您可以查阅以下资源：\n\
  \n•\n\n*Sun Microsystems JavaFX 网站*：该网站介绍了 JavaFX 产品系列。网址是[www.sun.com/javafx。](http://www.sun.com/javafx)\n\
  \n•\n\n\n\n*JavaOne 大会上的 JavaFX 发布*：本页面包含 Sun Microsystems 公司\n在 2007 年 5 月 JavaOne\
  \ 大会上发布的原始 JavaFX 公告。网址为：\n[www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml](http://www.sun.com/aboutsun/pr/2007-05/sunflash.20070508.2.xml)\n\
  \n**第 2 章**\n\n**快速入门**\n\n*领先的秘诀是开始行动。开始的秘诀是将复杂繁重的任务分解为可管理的小任务，然后从第一个任务着手。*\n——马克·吐温\n\
  \n现在，您已经对 JavaFX 有了宏观的了解，我们将遵循马克·吐温的建议，将 JavaFX Script 的学习曲线分解为可管理的小任务。\n\n第一个任务是选择一个可以开始开发\
  \ JavaFX 程序的环境。\n\n注意 ➡ 为简洁起见，本书后续内容通常将*JavaFX Script*简称为*JavaFX*。\n\n**选择 JavaFX\
  \ 开发环境**\n\n开始开发 JavaFX 应用程序最实用的三种开发环境如下：\n\n• *JavaFXPad*：这是一个快速输入和运行 JavaFX 程序的优秀工具。非常适合边玩边学，掌握\
  \ JavaFX 语言特性。\n\n• *带 JavaFX 插件的 Eclipse*：Eclipse 是一个功能完备的 Java 集成开发环境（IDE），并拥有支持\
  \ JavaFX 的插件。这是开发 JavaFX 应用程序的不错选择。\n\n• *带 JavaFX 插件的 NetBeans*：NetBeans 是另一个功能完备的\
  \ Java IDE，同样是开发 JavaFX 应用程序的好选择。\n\n我将为您提供设置这三种环境的指导。建议您安装 JavaFXPad，并同时选择其中一个\
  \ IDE 及其 JavaFX Script 插件。\n\n*firstPress：快速入门*\n\n注意 ➡ 无论您选择哪种开发环境，都需要 Java 运行时环境（JRE）1.5\
  \ 或更高版本（Mac OS 需要最新的 JRE 1.5 版本或 JRE 1.6）。对于 IDE，您需要 J2SE Java 开发工具包（JDK 5.0），该工具包自带\
  \ JRE。关于各平台所需 JDK 的具体说明，请参考我稍后将提供的 IDE 插件网址。\n\n**获取 JavaFXPad**\n\n您可以通过访问以下网址直接从互联网运行\
  \ JavaFXPad：\n[`download.java.net/general/openjfx/demos/javafxpad.jnlp`](http://download.java.net/general/openjfx/demos/javafxpad.jnlp)\n\
  \n这将通过 Java Web Start（一种 Java 应用程序部署技术）启动 JavaFXPad。每次访问此网址时，它都会检查最新版本的 JavaFXPad，下载并自动执行。\n\
  \n另一种运行 JavaFXPad 的方式是从 Project OpenJFX 网站下载 JavaFX 运行时、库文件和演示程序。我强烈建议您这样做，因为除了\
  \ JavaFXPad 之外，您还可以访问 JavaFX 类的源代码、一些 JavaFX 演示程序以及 JavaFX 运行时库。您可以通过以下网址获取这个优秀的软件包，格式为.zip\
  \ 或.tar.gz：\n[`openjfx.dev.java.net/servlets/ProjectDocumentList`](https://openjfx.dev.java.net/servlets/ProjectDocumentList)\n\
  \n如果您希望通过 Subversion 版本控制客户端直接访问 JavaFX 代码仓库中的最新版本，可以通过以下网址获取相同的软件：\n[`openjfx.dev.java.net/source/browse/openjfx/`](https://openjfx.dev.java.net/source/browse/openjfx/)\n\
  \n请继续从 Project OpenJFX 网站获取 JavaFX 软件包，因为本书中的说明将假设您已下载该软件包。\n\n**获取 IDE 插件**\n\n\
  再次强调，我强烈建议使用 IDE 进行 JavaFX 开发，这有助于在您学习第 3 章的“单词搜索生成器”示例时，使代码更易于管理。在阅读本书的过程中，请考虑为您选择的\
  \ IDE 安装以下两个插件之一。\n\n*firstPress：快速入门*\n\n**Eclipse 插件**\n\n要获取适用于 Eclipse 的 JavaFX\
  \ 插件（需要 Eclipse 3.2 或更高版本），请按照以下网址的说明操作：\n[`openjfx.dev.java.net/javafx-eclipse-plugin-install.html`](https://openjfx.dev.java.net/javafx-eclipse-plugin-install.html)\n\
  \n**NetBeans 插件**\n\n要获取适用于 NetBeans 5.5 IDE 的 JavaFX 插件，请按照以下网址的说明操作：\n[`openjfx.dev.java.net/javafx-nb55-plugin-install.html`](https://openjfx.dev.java.net/javafx-nb55-plugin-install.html)\n\
  \n如果您喜欢冒险（既然您在学习 JavaFX，很可能如此），那么您可以获取适用于 NetBeans 6.0 预览版 IDE 的插件。\n\n**您的第一个 JavaFX\
  \ 应用程序：HelloJFX**\n\n自从 C 编程语言问世以来，人们学习的第一个程序通常是某种“Hello World”应用程序。为了不打破传统，我将从\
  \ HelloJFX 应用程序开始教您。\n\n**运行 HelloJFX 应用程序**\n\n图 2-1 显示了在 JavaFXPad 中运行 HelloJFX\
  \ 应用程序的结果。如果您安装了带有 JavaFX 插件的 IDE，请随意使用它来运行此程序。要使用 JavaFXPad 运行该应用程序，请执行以下步骤：\n\n\
  1. 启动 JavaFXPad。这可以通过执行适用于您平台的相应脚本来完成，该脚本位于 JavaFX 软件包（来自本章前面“获取 JavaFXPad”部分提到的\
  \ Project OpenJFX 网站）的 trunk/demos/javafxpad 文件夹中。我的系统安装在 Windows 上，因此我将 PATH 环境变量设置为该文件夹，并执行了\
  \ javafxpad.bat 文件。\n\n2. （可选）使用“运行 ➤ 自动运行”菜单选项关闭代码自动运行的功能。我通常关闭此选项，尤其是在输入代码更改时，因为默认情况下每次按键都会导致代码被重新评估并运行。\n\
  \n![图片 6](img/index-22_1.png)\n\n*firstPress：快速入门*\n\n3. 使用“文件 ➤ 打开”菜单选项打开 HelloJFX.fx\
  \ 文件。或者，您可以将 HelloJFX.fx 源代码剪切并粘贴到代码（中间）窗格中，替换默认显示的 JavaFX 代码。此程序以及我们将要检查的所有其他示例程序，都可以在\
  \ Apress 网站（[www.apress.com](http://www.apress.com)）上本书的代码下载中找到。更具体地说，HelloJFX.fx\
  \ 文件位于该下载的 Chapter02/jfx_book 文件夹中。\n\n4. 如果您禁用了“运行 ➤ 自动运行”选项，则通过选择“运行 ➤ 运行”菜单选项来启动应用程序。\n\
  \n您的输出应该类似于图 2-1 所示的窗口。\n\n*图 2-1. HelloJFX 应用程序*\n\n成功完成此练习后，您将验证所有设置是否正确，以便进行后续练习并创建自己的\
  \ JavaFX 程序。\n\n*firstPress：快速入门*\n\n**理解 HelloJFX 应用程序**\n\n现在您已经运行了该应用程序，让我们一起浏览程序清单。HelloJFX\
  \ 应用程序的代码如清单 2-1 所示。\n\n*清单 2-1. HelloJFX.fx 程序*\n\n/*\n * HelloJFX.fx - 一个 JavaFX\
  \ Script 的“Hello World”风格示例\n *\n * 2007 年由 James L. Weaver 开发（jim.weaver at jmentor\
  \ dot com）\n */\n\npackage jfx_book;\n\nimport javafx.ui.*;\nimport javafx.ui.canvas.*;\n\
  \nFrame {\n    title: \"JavaFX Script 的 Hello World 风格示例\"\n    height: 100\n  \
  \  width: 400\n    content:\n        Canvas {\n            content:\n          \
  \      Text {\n                    font:\n                        Font {\n     \
  \                       faceName: \"Sans Serif\"\n                            style:\
  \ BOLD\n                            size: 24\n                        }\n      \
  \              x: 10\n                    y: 10\n                    content: \"\
  Hello JavaFX Script Developer!\"\n                }\n        }\n    // 在屏幕上显示 Frame\n\
  \    visible: true\n}\n\n让我们详细地逐行分析代码，因为这是第一个示例。\n\n*firstPress：快速入门*\n\n**注释**\n\
  \nJavaFX 中有两种类型的注释（记住，我们将“JavaFX Script”简称为“JavaFX”）\n\n\n\n为了在本书中简洁起见，简称为“JavaFX”）：多行注释和单行注释。*多行注释*以两个字符\
  \ `/*` 开头，并以相反顺序的相同两个字符 `*/` 结尾——JavaFX 会忽略两者之间的任何内容。清单 2-1 的开头展示了一个多行注释的示例。*单行注释*以两个字符\
  \ `//` 开头——在同一行中，这两个字符之后的任何内容都将被忽略。代码清单底部附近显示了一个单行注释的示例。\n\n**包声明**\n\nJavaFX 包类似于文件系统中的文件夹。它们提供了一种逻辑组织构成应用程序的源代码文件的方法。前面示例中的包是\
  \ `jfx_book`，这表明 `HelloJFX.fx` 源代码位于名为 `jfx_book` 的文件夹中。包名可以由多个节点组成（例如 `com.apress.jfx_book`），在这种情况下，源代码文件将位于名为\
  \ `jfx_book` 的文件夹中，而该文件夹又位于名为 `apress` 的文件夹中，依此类推。实际上，包名通常以开发该应用程序的公司或组织的域名开头（按相反顺序，从顶级域名开始，例如\
  \ `com` 或 `org`）。\n\n包声明是可选的，但除了最简单的程序之外，在所有程序中使用它是一个非常好的实践。如果使用，`package` 语句必须位于源代码的顶部（不包括空白和注释）。\n\
  \n**import 语句**\n\nJavaFX 程序通常使用由 JavaFX（以及可选的 Java）代码组成的库。\n\n在此示例中，每个 `import`\
  \ 语句都指明了此 `HelloJFX.fx` 文件中的其余代码在输出小部件和绘制屏幕时所依赖的 JavaFX 类的位置（包）。`import` 语句可以以星号（`*`）结尾，表示程序可以使用该包中的任何类。另一种形式是具体命名所使用的每个类，如下例所示：\n\
  \n```java\nimport javafx.ui.Frame;\n```\n\n除了最简单的应用程序之外，所有应用程序都应通过包声明来组织其源代码。一个源代码文件使用\
  \ `import` 语句来表明它使用了具有不同 `package` 语句的源代码文件中所包含的类。你将在下一章介绍的“单词搜索生成器”示例中看到这方面的示例。\n\
  \n*firstPress：快速入门*\n\n`import` 语句可以出现在 JavaFX 源代码中的任何位置，并且每当遇到一个 `import` 语句时，被导入的\
  \ JavaFX 文件就会在认为合适的时候运行。\n\n**定义用户界面的声明式代码**\n\nJavaFX 最令人兴奋的特性之一是其能够使用简单、一致且强大的*声明式*语法来表达图形用户界面（GUI）。与过程式编程不同，声明式编程由一个单一的表达式组成（而不是按顺序执行的多个表达式）。JavaFX\
  \ 支持这两种编程类型，但最好尽可能使用声明式语法。\n\n在此示例中，整个程序（不包括 `package` 和 `import` 语句）是声明式的，因为它由一个表达式组成。这个声明式表达式首先定义一个\
  \ `Frame` 对象，后跟一个左花括号，并以程序最后一行的匹配右花括号结束。嵌套在其中的是 `Frame` 对象的*属性*，包括 `content` 属性，该属性被赋值为一个\
  \ `Canvas` *小部件*（GUI 组件）。\n\n再嵌套其中是 `Canvas` 小部件的 `content` 属性，该属性被赋值为一个 `Text`\
  \ 对象，依此类推。\n\n注意 ➡ 属性是与对象关联的变量。属性将在本章后面更详细地讨论。\n\n声明式代码会自动创建表达式中每个 JavaFX 类的一个实例（也称为对象）。它还会为新实例的属性赋值。\n\
  \n例如，看一下创建 `Font` 类实例的代码部分：\n\n```java\nFont {\n    faceName: \"Sans Serif\"\n \
  \   style: BOLD\n    size: 24\n}\n```\n\n这段代码创建了一个 JavaFX `Font` 类的实例，并将值 `Sans\
  \ Serif` 赋给新 `Font` 实例的 `faceName` 属性。请注意，属性名称后面总是跟着一个冒号（`:`），在 JavaFX 声明式语法中，这意味着“将右侧表达式的值赋给左侧的属性”。这些相同的概念适用于此脚本中的所有类（`Frame`、`Canvas`\
  \ 和 `Text`）。让我们逐一查看这些类。\n\n*firstPress：快速入门*\n\n**使用 Frame 类**\n\n`Frame` 代表一个 GUI\
  \ 窗口，它有自己的边框，并且可以在其中包含其他 GUI 组件。\n\n注意 ➡ 在这个简单的 `HelloJFX.fx` 示例中，如图 2-1 所示，JavaFXPad\
  \ 将 `Frame` 对象渲染为输出区域内的一个矩形区域，而不是一个单独的窗口。在图 2-3 所示的稍微复杂一点的示例截图中，JavaFXPad 将 `Frame`\
  \ 对象渲染为一个单独的窗口。\n\n与任何类一样，`Frame` 类也有一组属性。`Frame` 小部件所具有的属性集，如清单 2-1 中的以下代码片段所示，如下所示：\n\
  \n*   一个出现在窗口标题栏中的标题（再次，请查看图 2-3 以了解 `Frame` 对象的正确渲染，并注意其标题）。\n*   决定窗口初始高度和宽度的\
  \ `height` 和 `width`（以像素为单位）。\n*   一个 `content` 属性，定义了 `Frame` 对象的内容是什么。在这种情况下，`Frame`\
  \ 对象将包含一个 `Canvas` 小部件，你将在其上绘制一个包含要显示消息的 `Text` 对象。\n*   一个 `visible` 属性（在 `Canvas`\
  \ 小部件的右花括号之后），用于控制 `Frame` 对象是否立即显示在屏幕上。\n\n```java\nFrame {\n    title: \"Hello\
  \ World-style example for JavaFX Script\"\n    height: 100\n    width: 400\n   \
  \ content:\n    ...some code omitted...\n    // Show the Frame on the screen\n \
  \   visible: true\n}\n```\n\n*firstPress：快速入门*\n\n**创建字符串字面量**\n\nJavaFX 拥有的数据类型之一是\
  \ `String`，它由零个或多个字符连接而成。如下面的 `Frame` 对象的 `title` 属性所示，字符串字面量是通过将一组字符括在双引号中来定义的：\n\
  \n```java\ntitle: \"Hello World-style example for JavaFX Script\"\n```\n\n或者，字符串字面量也可以用单引号括起来。\n\
  \n**使用 Canvas GUI 小部件**\n\n`Canvas` 小部件的用途是绘制二维（2D）图形，包括线条、形状和文本。它是一个 JavaFX 类，但我在这里将其称为*小部件*，因为它是\
  \ JavaFX `Widget` 类的子类。如下所示，`Canvas` 小部件的 `content` 属性指示了将在画布上绘制的内容——在本例中是一些文本：\n\
  \n```java\nCanvas {\n    content:\n    Text {\n        ...some code omitted...\n\
  \    }\n}\n```\n\n提示 ➡ 如果你想查看任何 JavaFX 类的代码，请查看 Project OpenJFX 站点软件包（本章前面“获取 JavaFXPad”部分提到过）中的\
  \ `trunk/src/javafx` 文件夹。JavaFX 类按包组织，特别是 `javafx.ui`、`javafx.ui.canvas` 和 `javafx.ui.filter`\
  \ 包，因此你需要在相应的子文件夹中查找包含源代码的 FX 文件。\n\n**绘制文本**\n\n要在画布上绘制一些文本，你需要使用 `Text` 类，并提供\
  \ `x` 和 `y` 位置（以像素为单位）作为属性，文本的左上角将出现在该位置。`Text` 类的 `content` 属性包含将要绘制的字符串，`font`\
  \ 属性指定了将要绘制的文本的外观。\n\n*firstPress：快速入门*\n\n```java\nText {\n    font:\n    Font\
  \ {\n        faceName: \"Sans Serif\"\n        style: BOLD\n        size: 24\n \
  \   }\n    x: 10\n    y: 10\n    content: \"Hello JavaFX Script Developer!\"\n}\n\
  ```\n\n**定义字体**\n\n\n\n最后，在定义此应用程序 UI 的声明式脚本的最内层，我们找到了 Font 类（参见前面的代码片段）。此类用于通过所示的\
  \ `faceName`、`style` 和 `size` 属性来指定 Text 小部件的特性。\n\n为了实践并内化你目前学到的概念，请完成以下练习。\n\n\
  **长消息练习**\n\n创建一个 JavaFX 程序，显示一条你选择的消息。该消息应足够长，以至于你需要将 Frame 实例的 `width` 属性值增加到超过\
  \ 400。请将 Frame 实例的 `title` 属性更改为“长消息练习”。此程序应模仿本章前面的 `HelloJFX.fx` 示例，并且你的源文件应命名为\
  \ `LongerMessage.fx`。\n\n包声明应如下所示：\n\npackage chapter2;\n\n因此，请务必将你的源文件放在名为 `chapter2`\
  \ 的文件夹中。图 2-2 显示了此练习示例解决方案的两种不同输出。你的输出应与其中之一类似，具体取决于你是否使用 JavaFXPad 运行你的解决方案。\n\n\
  ![图片 7](img/index-29_1.png)\n\n*firstPress: 快速入门*\n\n*图 2-2. 长消息练习的两个示例解决方案*\n\n\
  现在，你已经通过运行和检查 `HelloJFX.fx` 代码并完成长消息练习，学习了一些 JavaFX 概念，我想向你介绍更多概念。你将初步了解在 JavaFX\
  \ 中创建类和对象是什么感觉，以及如何创建变量和使用常量。你还将学习 JavaFX 中一个看似简单但功能强大的概念：将视图绑定到模型。让我们在 `HelloJFXBind`\
  \ 应用程序的上下文中逐步了解这些概念，该应用程序构建于之前的应用程序之上。\n\n**运行和检查 HelloJFXBind 应用程序**\n\n在你选择的 JavaFX\
  \ 工具中运行 `HelloJFXBind.fx` 程序；输出应是一个看起来类似于图 2-3 的窗口。\n\n![图片 8](img/index-30_1.png)\n\
  \n*firstPress: 快速入门*\n\n*图 2-3. HelloJFXBind 应用程序的输出*\n\n现在让我们检查清单 2-2 中的源代码，特别注意新增的概念。\n\
  \n*清单 2-2. HelloJFXBind.fx 程序*\n\npackage jfx_book;\n\nimport javafx.ui.*;\n\nimport\
  \ javafx.ui.canvas.*;\n\n/**\n\n* 此类作为用户界面背后的模型\n\n*/\n\nclass HelloJFXModel {\n\
  \nattribute greeting:String;\n\n}\n\n/**\n\n* 这是一个绑定到模型数据的 JavaFX 脚本。\n\n*/\n\n\
  var hellojfxModel =\n\nHelloJFXModel {\n\ngreeting: \"Hello JavaFX Script Developer!\"\
  \n\n};\n\nFrame {\n\ntitle: \"JavaFX Script example that binds to a model\"\n\n\
  height: 100\n\nwidth: 400\n\ncontent:\n\nCanvas {\n\ncontent:\n\nText {\n\nfont:\n\
  \nFont {\n\n*firstPress: 快速入门*\n\nfaceName: \"Sans Serif\"\n\n// 具有值集合的属性示例\n\n\
  style: [\n\nBOLD,\n\nITALIC]\n\nsize: 24\n\n}\n\n// 为应用程序添加一些颜色\n\nstroke: red\n\
  \nfill: red\n\nx: 10\n\ny: 10\n\ncontent: bind hellojfxModel.greeting\n\n}\n\n}\n\
  \nvisible: true\n\n}\n\n**最小 JavaFX 类的结构**\n\n你会注意到的与前一个示例的第一个区别是，此程序在以下几行代码中定义了一个名为\
  \ `HelloJFXModel` 的类： class HelloJFXModel {\n\nattribute greeting:String;\n\n}\n\
  \n这是一个非常小的类，因为它没有很多可能的特性（你将在后面学习），但这是一个很好的起点。\n\n**类声明**\n\n类的声明始终包含 `class` 关键字，并且如前面的代码片段所示，具有左花括号和右花括号。还有其他\
  \ JavaFX 关键字，例如 `public` 和 `extends`，它们可以修饰 `class` 关键字。我们稍后将详细讨论这些内容。\n\n*firstPress:\
  \ 快速入门*\n\n**属性声明**\n\n`HelloJFXModel` 类中有一个名为 `greeting` 的属性，其数据类型为 `String`。如前所述，属性是与对象关联的变量。\n\
  \n当创建此类的实例时，每个实例都将能够持有一个名为 `greeting` 的字符串。\n\n\n\n注意 ➡ 如示例所示，JavaFX 文件中存在第三种注释类型，称为\
  \ Javadoc 注释。这类注释以 `/**` 字符开头，以 `*/` 字符结尾。其目的是支持为 Java 类自动生成文档，我预计未来会有工具利用 Javadoc\
  \ 风格的注释为 JavaFX 类生成文档。\n\n**创建类的实例**\n\n在定义了 `HelloJFXModel` 类之后，程序继续使用之前创建 UI 时用到的声明式语法来创建该类的一个实例：`var\
  \ hellojfxModel =`\n\n`HelloJFXModel {`\n\n`greeting: \"Hello JavaFX Script Developer!\"\
  `\n\n`};`\n\n这个新实例的 `greeting` 属性包含一个字符串，其值为 `Hello JavaFX Script Developer!`。\n\
  \n**声明与赋值变量**\n\n如上所示，程序使用 `var` 关键字声明了一个名为 `hellojfxModel` 的变量。通过赋值运算符（`=`），该变量被赋予了对\
  \ `HelloJFXModel` 类新创建实例的引用。稍后你将需要 `hellojfxModel` 变量来获取这个实例的引用。值得注意的是，在使用 `var`\
  \ 关键字声明的变量之前，应始终为其赋值。\n\n对于你给变量（使用 `var` 或 `attribute` 关键字声明的标识符）命名的规则和约定如下：\n\n\
  *firstPress: 快速入门*\n\n•\n\n*规则*：变量必须以字母、下划线（`_`）或美元符号（`$`）开头。变量名中后续字符可以是数字、字母、下划线或美元符号。\n\
  \n•\n\n*约定*：变量以小写字母开头，通常不包含下划线，绝不包含美元符号，并由一个或多个驼峰式单词组成。\n\n在适当的情况下会使用数字。例如，`HelloJFXModel`\
  \ 类中使用的变量名为 `greeting`。一个保存行星名称的变量可以命名为 `planetName`。\n\n变量名在实用范围内可以尽可能长，并且应能传达含义。此外，与\
  \ JavaFX 中的大多数事物一样，变量名是区分大小写的。\n\n**理解绑定**\n\n请跳转到当前示例中 `Text` 对象的声明部分，如下所示：`Text\
  \ {`\n\n`font:`\n\n`Font {`\n\n`faceName: \"Sans Serif\"`\n\n`// 一个包含值集合的属性示例`\n\
  \n`style: [`\n\n`BOLD,`\n\n`ITALIC]`\n\n`size: 24`\n\n`}`\n\n`// 为应用添加一些颜色`\n\n\
  `stroke: red`\n\n`fill: red`\n\n`x: 10`\n\n`y: 10`\n\n`content: bind hellojfxModel.greeting`\n\
  \n`}`\n\n这段*代码块*（左花括号与其匹配的右花括号之间的代码称为代码块）中包含一些新概念。我现在想指出的概念是将应用程序的*视图*（用户界面）绑定到应用程序的*模型*（数据）。在最后一行代码中，你会注意到\
  \ `Text` 实例的 `content` 属性包含了 `bind` 运算符。这会导致将 `Text` 实例的内容与 `HelloJFXModel` 实例的\
  \ `greeting` 属性进行绑定（增量更新）。如果\n\n![图 9](img/index-34_1.jpg)\n\n*firstPress: 快速入门*\n\
  \n`greeting` 属性发生变化，JavaFX 将自动导致 `Text` 实例的内容发生变化，从而立即更新应用程序中显示的消息。图 2-4 展示了这种绑定行为，左侧是\
  \ UI 组件的包含层次结构，右侧是 `HelloJFXModel` 类的类图。\n\n*图 2-4. HelloJFXBind 应用中的绑定示意图* 由于绑定是一个如此强大的概念，你将在本书的示例应用中频繁看到它的使用。在结束这个示例之前，我想向你展示更多与在声明式表达式中为属性赋值相关的\
  \ JavaFX 概念。\n\n**为 Text 对象分配颜色常量**\n\n\n\nJavaFX 提供了许多预定义常量供您使用，同时也支持创建您自己的常量。我将在后面详细讲解如何创建常量，但这里我想先指出如何在代码中赋值常量。在当前示例的以下代码片段中，请注意\
  \ Text 对象的 stroke 和 fill 属性都被赋值为红色：Text {\n\nfont:\n\nFont {\n\n**...部分代码省略...**\n\
  \n}\n\n// 为应用添加一些颜色\n\nstroke: red\n\nfill: red\n\nx: 10\n\ny: 10\n\ncontent: bind\
  \ hellojfxModel.greeting\n\n}\n\n*firstPress: 快速入门*\n\n对于包括此 Text 对象在内的任何图形元素，stroke\
  \ 属性定义了轮廓的颜色。fill 属性则定义了轮廓内部区域填充的颜色。\n\nJavaFX 中的 Paint 类目前约有 140 个表示颜色的预定义常量。以下是其中一些常量：\n\
  \n•\n\nred\n\n•\n\ngreen\n\n•\n\nblue\n\n•\n\nyellow\n\n•\n\norange\n\n•\n\nblack\n\
  \n•\n\nwhite\n\n•\n\nlightblue\n\n•\n\nlemonchiffon\n\n•\n\nlightgoldenrodyellow\n\
  \n要查看所有可用的 Paint 常量，请查看 JavaFX 软件下载中的 Color.fx 文件（位于 javafx.ui 包中），该下载在本书前面“获取 JavaFXPad”一节中已提及。\n\
  \n注意 ➡ 类的常量有时定义在与该类本身不同的 FX 文件中。在这种情况下，Paint 类定义在 Paint.fx 文件中，但前面提到的 Paint 常量却定义在\
  \ Color.fx 类中。\n\n**为属性赋值一个数组**\n\n稍后我会详细讨论数组，因为它们是 JavaFX 中的主要数据结构。现在，我只想通过向您展示如何在声明式代码中创建数组并将其赋值给属性，来初步介绍这个主题。在当前示例的以下代码片段中，Font\
  \ 对象的 style 属性被赋值为两个值，您可能已经猜对了，它们是常量：\n\n*firstPress: 快速入门*\n\nFont {\n\nfaceName:\
  \ \"Sans Serif\"\n\n// 属性包含多个值的示例\n\nstyle: [\n\nBOLD,\n\nITALIC]\n\nsize: 24\n\n\
  }\n\nFont 类的 style 属性接受一个或多个值，为了表示这些值，这里实际上定义了一个数组字面量。如前面的代码片段所示，数组字面量由一个左方括号开头，后跟逗号分隔的元素，最后以右方括号结尾。Font\
  \ 类的 style 属性可用的常量位于 javafx.ui 包中的 FontStyle.fx 文件中，具体如下：\n\n•\n\nBOLD\n\n•\n\n\
  PLAIN\n\n•\n\nITALIC\n\n现在是时候探讨本章的最后一个概念了，我们将开始把代码组织成更接近真实世界 JavaFX 应用程序的形式。\n\n\
  **将 HelloJFXModel 类移入其专属文件**\n\n随着应用程序变得越来越复杂，将代码组织到多个文件中，并将这些文件组织到多个包中，是明智的做法。我们现在就朝这个方向迈出一步，将\
  \ HelloJFXModel 类拆分到它自己的 FX 文件中。当一个 JavaFX 类位于单独的文件中时，为了在运行时能被找到，它需要位于一个与类同名的文件中。清单\
  \ 2-3 包含了我已移至 HelloJFXModel.fx 文件的代码，而清单 2-4 包含了 UI 的声明式代码，我将其放在名为 HelloJFXBind2.fx\
  \ 的文件中（稍作修改，我稍后会告诉您）。\n\n*firstPress: 快速入门*\n\n*清单 2-3. HelloJFXModel.fx 程序*\n\n\
  package jfx_book;\n\n/**\n\n* 此类作为用户界面背后的模型\n\n*/\n\nclass HelloJFXModel {\n\nattribute\
  \ greeting:String;\n\n}\n\n*清单 2-4. HelloJFXBind2.fx 程序*\n\npackage jfx_book;\n\n\
  import javafx.ui.*;\n\nimport javafx.ui.canvas.*;\n\n/**\n\n* 这是一个绑定到模型数据的 JavaFX\
  \ 脚本。\n\n*/\n\nFrame {\n\nvar hellojfxModel =\n\nHelloJFXModel {\n\ngreeting: \"\
  Howdy JavaFX Script Developer!\"\n\n}\n\ntitle: \"JavaFX Script example that binds\
  \ to a model\"\n\nheight: 100\n\nwidth: 400\n\ncontent:\n\nCanvas {\n\ncontent:\n\
  \nText {\n\nfont:\n\nFont {\n\nfaceName: \"Sans Serif\"\n\n\n\n// 具有值集合的属性的示例\n\n\
  style: [\n\nBOLD,\n\nITALIC]\n\nsize: 24\n\n}\n\n*firstPress: 快速入门*\n\n// 为应用添加一些颜色\n\
  \nstroke: red\n\nfill: red\n\nx: 10\n\ny: 10\n\ncontent: bind hellojfxModel.greeting\n\
  \n}\n\n}\n\nvisible: true\n\n}\n\n请注意，这两个文件位于同一个包中，因此它们都位于名为 `jfx_book` 的文件夹内。当遇到引用\
  \ `HelloJFXModel` 类的代码时（参见以下代码片段），JavaFX 运行时将在 `jfx_book` 文件夹中查找名为 `HelloJFXModel.fx`\
  \ 的文件，并创建该类的一个实例。\n\nvar hellojfxModel =\n\nHelloJFXModel {\n\ngreeting: \"Howdy\
  \ JavaFX Script Developer!\"\n\n}\n\n顺便提一下，前面的代码片段就是我之前提到的微小修改。\n\n它演示了在声明式代码中间声明变量的思想。在这个例子中，我将这段代码从直接位于以\
  \ `Frame` 开头的声明式代码块上方，移到了该代码块内部。你可能已经注意到，有必要删除语句末尾的分号，因为它不再是一个单独的语句，而是更大的声明式表达式的一部分。声明的变量仅存在于其声明所在的块内，因此\
  \ `hellojfxModel` 变量的作用域是从 `Frame` 的左花括号到与之匹配的右花括号。如果我们是在 `Canvas` 块中声明它，那么作用域将仅限于该块。\n\
