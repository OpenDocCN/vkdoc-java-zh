  \ 乐趣，包括 2D 绘图*\n\n\n\n与清单 5-1 不同，Canvas 对象的`content`属性并不包含一个由 Ellipse 对象和 Text 对象组成的序列。相反，它包含一个单独的\
  \ Group 对象，该对象的`content`属性则包含一个由 Ellipse 和 Text 对象组成的序列。\n\n可以为该组指定变换，这些变换将应用于组内的所有图形对象。此外，Group\
  \ 拥有自己的坐标空间，该组内包含的所有图形对象共享此空间，因此组内对象指定的任何坐标都是相对于该 Group 的坐标空间的。这就是为什么 Text 节点的`x`和`y`属性被赋予的值与清单\
  \ 5-1 中赋予的值截然不同的原因。\n\n请查看清单 5-3 中 Group 节点的`transform`属性。\n\n*清单 5-3\\. GroupTextAndEllipse.fx\
  \ 程序中绑定到 Group 节点的变换* Group {\n\nvar rotAngle = 0\n\nvar scaleFactorX = 1\n\nvar\
  \ scaleFactorY = 1\n\nvar transX = 300\n\nvar transY = 200\n\ntransform: bind [\n\
  \ntranslate(transX, transY),\n\nrotate (rotAngle, 0, 0),\n\nscale (scaleFactorX,\
  \ scaleFactorY)\n\n]\n\n我将逐一讲解这三个指定的变换，但在此之前，请注意它们都绑定到了`transform`属性。随着给定变换参数值的变化，该变换的效果也会随之改变。注意，这些变换在`transform`属性中出现的顺序很重要，因为运行时将按照这个顺序应用它们。\n\
  \n平移变换有两个参数，名为`transX`和`transY`。当这些值在其他地方发生变化时，它们将被应用于此平移变换，从而导致此 Group 节点（及其包含的任何节点）在屏幕上移动到新位置。在此程序中，当用户交互触发事件处理程序时（回想之前示例中的`action`和`onClose`属性），这些值会发生变化。在这种情况下，下面显示的名为`onMouseDragged`的属性包含了当用户在椭圆上点击并拖动鼠标时的事件处理程序：\
  \ onMouseDragged: operation(mEvt) {\n\ntransX += mEvt.dragTranslation.x;\n\ntransY\
  \ += mEvt.dragTranslation.y;\n\n}\n\n*首次出版：更多 UI 乐趣，包括 2D 绘图* 155\n\n注意 ➡ 此处定义的操作被称为*匿名*操作，因为它是在现场定义且没有命名。由于此操作不会从其他地方调用，因此无需为其命名。\n\
  \n**Canvas 鼠标事件**\n\n当鼠标被拖动时，分配给`onMouseDragged`属性的操作会被调用，并反复传递一个`CanvasMouseEvent`类的实例作为参数。如上所示，自上次调用以来在\
  \ x 方向上拖动的像素数（向左为负，向右为正）会被加到`transX`变量中。同样，自上次调用以来在 y 方向上拖动的像素数（向上为负，向下为正）会被加到`transY`变量中。当这种情况发生时，绑定到`transform`属性的`translate()`函数会更新，从而导致该\
  \ Group 中的 Ellipse 和 Text 节点随着鼠标拖动在屏幕上移动。\n\n提示 ➡ `CanvasMouseEvent`类还有一个名为`localDragTranslation`的属性，它与`dragTranslation`属性类似，区别在于它包含的是在本地图形对象坐标中的拖动平移量，而不是\
  \ Canvas 坐标中的拖动平移量。\n\n我们 Group 节点中的第二个变换是旋转变换，它使节点围绕一个中心点旋转给定的角度。请再次参考清单 5-3 以查看旋转变换，然后检查以下摘录，其中包含改变传递给`rotate()`变换函数的`rotAngle`变量中旋转角度的事件处理程序。\n\
  \nonMouseClicked: operation(mEvt) {\n\nif (mEvt.isControlDown() and mEvt.isShiftDown())\
  \ {\n\nrotAngle -= 10;\n\n}\n\n\n\nelse if (mEvt.isControlDown()) {\n\nrotAngle\
  \ += 10;\n\n}\n\nelse if (mEvt.isShiftDown()) {\n\nscaleFactorX *= .8;\n\nscaleFactorY\
  \ *= .8;\n\n*firstPress: 更多 UI 乐趣，包括 2D 绘图*\n\n}\n\nelse {\n\nscaleFactorX *= 1.25;\n\
  \nscaleFactorY *= 1.25;\n\n}\n\n}\n\n如上述代码片段所示，当用户在椭圆上点击鼠标时，会执行分配给 `onMouseClicked`\
  \ 属性的匿名操作。`if` 语句中的前两个条件调用了 `CanvasMouseEvent` 对象的方法，以判断用户是否按下了我们与旋转 Group 相关联的修饰键。\n\
  \nGroup 节点中的第三个变换（请再次参见清单 5-3）是缩放变换，它根据为 x 和 y 方向提供的缩放因子，使节点增大或减小尺寸。当用户在椭圆上点击鼠标时，上述代码片段中的最后两个条件会修改\
  \ `scaleFactorX` 和 `scaleFactorY` 变量的值，这些变量会被传入 `scale()` 变换函数。\n\n`GroupTextAndEllipse.fx`\
  \ 程序中还使用了另一个鼠标事件处理器，如下面的代码片段所示：\n\nEllipse {\n\nvar: self\n\nonMouseEntered: operation(mEvt)\
  \ {\n\nself.cursor = HAND;\n\n}\n\n}\n\n当鼠标进入 Ellipse 节点的边界时，这个匿名事件处理器会将鼠标光标更改为手形，表示用户可以在屏幕上拖动椭圆。请注意，此代码片段中有一个名为\
  \ `var` 的属性。这实际上是一个*伪属性*，我们将在下一节中介绍。同时，请查看表 5-2，了解画布上可能发生的鼠标事件相关属性的信息。\n\n*firstPress:\
  \ 更多 UI 乐趣，包括 2D 绘图* 157\n\n*表 5-2\\. JavaFX CanvasMouseEvents*\n\n**事件**\n\n**描述**\n\
  \nonMouseClicked\n\n当在图形对象上点击鼠标（按下并释放）时发生\n\nonMouseDragged\n\n当在对象中点击鼠标并拖动时发生\n\
  \nonMouseEntered\n\n当鼠标进入对象时发生\n\nonMouseExited\n\n当鼠标离开对象时发生\n\nonMouseMoved\n\n\
  当鼠标在对象内移动时发生\n\nonMousePressed\n\n当鼠标在对象中按下时发生\n\nonMouseReleased\n\n当鼠标在对象中释放时发生\n\
  \n**使用 var 伪属性**\n\n在第 4 章中，您了解到 `this` 关键字是对操作、函数或触发器正在执行的实例的引用。这被称为*上下文实例*。在 JavaFX\
  \ 声明式代码中，要获取对上下文实例的引用，您可以使用 `var` 伪属性（如上述代码片段所示）来创建一个局部变量，此处任意命名为 `self`。由于 `var`\
  \ 伪属性被用作 Ellipse 实例的一个属性，因此名为 `self` 的变量是对正在定义的 Ellipse 实例的引用。因此，在分配给 `onMouseEntered`\
  \ 属性的操作中，我们可以使用 `self` 变量来访问 Ellipse 实例的 `cursor` 属性，并将 `Cursor` 类的命名实例 `HAND` 赋值给它。\n\
