  font: new Font(\"Serif\", [\"BOLD\", \"ITALIC\"], 24)\n\n},\n\nGroup {\n\ntransform:\
  \ translate(45, 55)\n\ncontent: [\n\nwgRects,\n\nView {\n\n// 此画布作为 PopupMenu 的拥有者\n\
  \ncontent: canvas\n\n}\n\n]\n\n},\n\nGroup {\n\ntransform: translate(53, 63)\n\n\
