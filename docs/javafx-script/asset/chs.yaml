  \nunplacedListBox,\n\nplacedListBox\n\n]\n\n};\n\n}\n\n**提供 composeWidget() 操作**\n\
  \n在创建基于 CompositeWidget 的自定义组件时，你需要在自定义组件类中提供一个 composeWidget() 操作，如清单 5-7 所示。此操作必须返回一个\
  \ Widget 类的子类对象（GridPanel 就是 Widget 的子类）。\n\n**创建和使用 ListBox 控件**\n\n如图 5-6 所示，WordListsView\
  \ 自定义组件中有两个列表框。\n\n要创建每个列表框，如清单 5-8 所示，我提供了四个属性：\n\n•\n\ncells 属性，它包含一个 ListCell\
  \ 实例序列。在这里，我使用 foreach 和 bind 运算符来查询模型中的相应序列，并将其元素动态绑定到 ListBox 的单元格。每当向序列中添加或从序列中移除\
  \ WordGridEntry 时，ListBox 都会自动反映此更改。\n\n*firstPress: 更多 UI 乐趣，包括 2D 绘图*\n\n•\n\n\
  \n\n`selection` 属性保存了 ListBox 中选中单元格的从零开始的索引，并绑定到模型中相应的属性。当该属性的值为 -1 时，表示没有选中任何单元格。\n\
  \n•\n\n`action` 属性，为其分配了一个匿名操作，当用户在 ListBox 单元格上双击（或按下 Enter 键）时将执行该操作。\n\n•\n\n\
  `border` 属性，如你所知，可用于任何小部件。这里我使用了一个 `TitledBorder` 来为每个 ListBox 添加标签。\n\n现在你已经了解了如何开发两种自定义组件（基于\
  \ Node 和基于 Widget），让我们来看一下 Word Search Builder 应用程序中的最终清单，在此过程中你将学习如何在 JavaFX 中创建对话框。\n\
  \n**创建对话框**\n\n如图 5-5 和第 3 章图 3-12 所示，`WordSearchHandlers` 类的目的是处理由 `WordSearchMain.fx`\
  \ 文件、`WordGridView` 类和 `WordListsView` 类中的代码发出的请求。有些请求直接发送给 `WordGridModel` 类，但需要显示对话框的请求则由\
  \ `WordSearchHandlers` 类处理，然后该类再向 `WordGridModel` 类发出请求。请花点时间浏览清单 5-9 中的 `WordSearchHandlers.fx`\
  \ 代码，我们将介绍三种创建对话框的方法。\n\n*清单 5-9. WordSearchHandlers 类*\n\npackage wordsearch_jfx.ui;\n\
