  \ import 语句：\n\nimport wordsearch_jfx.model.WordGridModel;\n\n创建 JavaFX 类实例的另一种方法是使用声明式语法来表达一个*对象字面量*。下面展示了\
  \ WordSearchMain.fx 中与 UI 相关的脚本所需访问的其余三个类的实例化过程：\n\nvar wsHandlers = WordSearchHandlers\
