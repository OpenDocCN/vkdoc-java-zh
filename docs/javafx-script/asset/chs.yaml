  \ -1 的整数——例如，在清单 4-5 中 WordGridModel.highlightWordsOnCell() 操作的以下代码中：\n\nif (cellNum\
  \ <> NO_CELL:Integer) {\n\n在这个特定例子中，命名实例的类型是由 JavaFX 提供的。\n\n你也可以创建自定义类型的命名实例。例如，看看下面来自\
