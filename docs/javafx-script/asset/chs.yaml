  \nPolygon\n\n由一系列点定义的多边形\n\nPolyline\n\n由一系列点定义的一组连接线\n\nQuadCurve\n\n由起点、控制点和终点定义的二次曲线段\n\
  \nRect\n\n由左上角点、宽度、高度以及可选圆角定义的矩形\n\nStar\n\n\n\n一个由中心点、点数、内半径、外半径以及可选的第一个点起始角度定义的星形\n\
  \n文本\n\n文本的图形化表示\n\n**变换图形对象**\n\n你可能想知道为什么这个程序的输出没有将椭圆绘制在画布的 (0, 0) 点（左上角）。原因是我使用了\
  \ Ellipse 类的 transform 属性（如下所示）将椭圆在 x 方向（向右）平移了 300 像素，在 y 方向（向下）平移了 100 像素。\n\n\
  transform: translate(300, 100)\n\n顺便提一下，所有 JavaFX 形状都支持这个 transform 属性。\n\n除了平移之外，2D\
  \ 图形对象（也称为*图形节点*，或简称为*节点*）还有几种其他类型的变换可用。例如，你可以旋转、缩放和倾斜图形节点。我很快就会向你介绍这些，但与此同时，我想向你展示如何将\
  \ 2D 节点组合在一起，从而能够创建作为一个整体运行的复杂 2D 图形。\n\n**使用 Group 节点将形状组合在一起**\n\n通常，你需要构建由多个图形节点组成的\
  \ 2D 结构。例如，在图 5-1 和清单 5-1 的 TextAndEllipse.fx 程序中，Ellipse 和 Text 对象彼此独立运行。如果你想改变它们在屏幕上的位置，你必须在以下几行代码中分别更改每个对象。对于椭圆，你需要更改这一行中的值：transform:\
  \ translate(300, 100)\n\n对于 Text 对象，你需要更改这几行中的值：x: 120\n\ny: 90\n\n同样的思路也适用于你想要使用的其他效果，例如旋转和缩放，如图\
  \ 5-2 中 GroupTextAndEllipse.fx 的输出所示。\n\n*图 5-2. GroupTextAndEllipse.fx 程序的输出* 继续运行这个程序，并尝试以下影响\
  \ Ellipse 和 Text 图形节点的操作：\n\n•\n\n点击椭圆内的任意位置，每次点击它都会进一步放大。\n\n*firstPress: 更多 UI\
  \ 乐趣，包括 2D 绘图*\n\n•\n\n按住 Shift 键的同时点击椭圆，每次点击它都会缩小。\n\n•\n\n按住 Ctrl 键的同时点击椭圆，它会顺时针旋转\
  \ 10 度。\n\n•\n\n按住 Ctrl 和 Shift 键的同时点击椭圆，它会逆时针旋转 10 度。\n\n•\n\n在屏幕上点击并拖动椭圆。\n\n\
  让我们检查一下清单 5-2 中的 GroupTextAndEllipse.fx 程序，看看如何使用 Group 对象来帮助实现这一点。\n\n*清单 5-2.\
  \ GroupTextAndEllipse.fx 程序*\n\npackage jfx_book;\n\nimport javafx.ui.*;\n\nimport\
  \ javafx.ui.canvas.*;\n\nFrame {\n\ntitle: \"组中的文本和椭圆\"\n\nheight: 600\n\nwidth:\
  \ 600\n\nvisible: true\n\ncontent:\n\nCanvas {\n\ncontent:\n\nGroup {\n\nvar rotAngle\
  \ = 0\n\nvar scaleFactorX = 1\n\nvar scaleFactorY = 1\n\nvar transX = 300\n\nvar\
  \ transY = 200\n\ntransform: bind [\n\ntranslate(transX, transY),\n\nrotate (rotAngle,\
  \ 0, 0),\n\nscale (scaleFactorX, scaleFactorY)\n\n]\n\ncontent: [\n\nEllipse {\n\
