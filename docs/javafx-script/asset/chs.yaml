  \ gridLabels\n\n}\n\n]\n\n};\n\n}\n\n与 SuperDuckComponent 自定义组件一样，这个 WordGridView\
  \ 自定义组件也有一个 composeNode() 操作，其目的是在 Node 类（Group 类是其子类）的子类中返回自定义组件。这在清单 5-6 的最后部分有所展示，你可以看到它在\
  \ Group 节点内返回了四个节点：\n\n•\n\n一个 Text 节点，包含文字 *我的单词搜索谜题*。你会注意到它有一个 filter 属性，被赋值为\
  \ ShadowFilter。如图 5-4 所示，这为文本添加了阴影效果。ShadowFilter 是可用于增强任何图形节点外观的几种*滤镜*之一。这些滤镜位于\
  \ javafx.ui.filter 包中，这解释了本清单顶部附近的 import javafx.ui.filter.*; 语句。\n\n•\n\n一个 Group\
  \ 节点，包含以下内容：\n\n• 对 WordGridRect 实例序列的引用（在 wgRects 属性中）。\n\nWordGridRect 类（如清单 5-7\
  \ 所示）扩展了 JavaFX 的 Rect 类，Rect 是一个 2D 矩形节点。这个矩形数组是在 WordGridView.wgModel = newValue\
  \ 触发器中被创建并赋值给 wgRects 属性的。这里需要注意的一点是，每个 WordGridRect 实例的 appearance 属性都绑定到模型中对应\
  \ WordGridCell 实例的 appearance 属性。当用户与网格交互时（例如，拖动单词），WordGridModel 类中的操作会改变 WordGridCell\
  \ 实例的 appearance 属性，由于这种绑定关系，这些变化会反映在屏幕上。最终效果是，网格从 translate() 函数指定的左侧 45 像素、顶部\
  \ 55 像素的位置开始绘制在我们的自定义组件上，并且网格中的每个单元格都具有适当的外观（例如，填充颜色和 strokeWidth）。\n\n• 一个 View\
  \ 节点，这是一个特殊的类，可以显示小部件（任何继承自 Widget 类的 JavaFX 类）。出于稍后我们将讨论的与显示 PopupMenu 相关的原因，我们在此自定义组件上放置了一个\
  \ Canvas 小部件。\n\n•\n\n\n\n一个包含对文本图形对象序列的引用（通过 `textLetters` 属性）的 Group 节点。在 `on\
  \ WordGridView.wgModel = newValue` 触发器中，该序列中每个 Text 对象的 `content` 属性被绑定到模型中对应 `WordGridCell`\
  \ 实例的 `cellLetter` 属性。在同一触发器中，该序列中每个 Text 对象的 `x` 和 `y` 属性被绑定到对应 `WordGridRect`\
  \ 实例的 `x` 和 `y` 属性（我们在检查前一个 Group 节点时讨论过）。其效果是，字母被绘制在我们的自定义组件上，起始位置距离左侧 53 像素、距离顶部\
  \ 63 像素，如 `translate()` 函数中所指定。\n\n•\n\n一个包含对文本图形对象序列的引用（通过 `gridLabels` 属性）的 Group\
  \ 节点。在 `on WordGridView.wgModel = newValue` 触发器中，该序列中每个 Text 对象的 `content` 属性被赋予所需的\
  \ `x`、`y`、`content` 和 `font` 属性。其效果是，行号和列号标签被绘制在我们的自定义组件上，起始位置距离左侧 27 像素、距离顶部 36\
  \ 像素，如 `translate()` 函数中所指定。\n\n*firstPress: 更多 UI 乐趣，包括 2D 绘图*\n\n**使用 PopupMenu\
  \ 控件**\n\nPopupMenu 控件负责显示第 3 章图 3-7 中所示的上下文菜单。然而，要显示 PopupMenu，你必须指定一个 Widget 的子类作为该\
  \ PopupMenu 的所有者。要了解这一点，请暂时查看清单 5-7 中 `WordGridRect` 类的 `displayPopupMenu()` 操作。\n\
  \n由于这个自定义组件扩展了 `CompositeNode`，它由绘制在画布上的 2D 图形（Node）对象组成。Widget 类的子类（例如 `Button`\
  \ 或 `Canvas`）不能直接放在画布上。我们必须找到一种方法，为 PopupMenu 提供一个可以作为其所有者的 Widget。这就是为什么我在清单 5-6\
  \ 的 `composeNode()` 操作中使用了如下所示的 View 对象。\n\nView {\n\n// 此画布作为 PopupMenu 的所有者\n\n\
  content: canvas\n\n}\n\n我认为 View 类就像一个适配器，因为它可以放置在画布上，而 Widget 可以放置在视图上。问题得以解决，因为我放置在视图上的画布被用作\
  \ PopupMenu 的所有者。\n\n*清单 5-7. WordGridRect 类*\n\npackage wordsearch_jfx.ui;\n\n\
  import javafx.ui.*;\n\nimport javafx.ui.canvas.*;\n\nimport wordsearch_jfx.model.WordGridModel;\n\
  \nclass WordGridRect extends Rect {\n\nattribute wsHandlers:WordSearchHandlers;\n\
  \nattribute wgModel:WordGridModel;\n\nattribute row:Integer;\n\nattribute column:Integer;\n\
  \nattribute appearance:WordGridRect;\n\n// 用于 ..._LOOK 常量\n\nattribute name:String;\n\
  \noperation displayPopupMenu (cmEvt:CanvasMouseEvent, canvas:Canvas);\n\n}\n\n*firstPress:\
  \ 更多 UI 乐趣，包括 2D 绘图* 177\n\n// 常量\n\nSELECTED_LOOK:WordGridRect = WordGridRect {name:\
  \ \"SELECTED_LOOK\"}; SELECTED_FIRST_LETTER_LOOK:WordGridRect =\n\nWordGridRect\
  \ {name: \"SELECTED_FIRST_LETTER_LOOK\"}; DRAGGING_LOOK:WordGridRect = WordGridRect\
  \ {name: \"DRAGGING_LOOK\"}; CANT_DROP_LOOK:WordGridRect = WordGridRect {name: \"\
  CANT_DROP_LOOK\"}; DEFAULT_FIRST_LETTER_LOOK:WordGridRect =\n\nWordGridRect {name:\
