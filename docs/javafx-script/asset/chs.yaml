  \ SimpleLabel，以及本章介绍的许多概念。\n\n**键盘练习**\n\n在本练习中，您将创建一个 JavaFX 程序，该程序大致类似于计算器上的键盘和数字显示屏。以下是本练习的要求：\n\
  \n•\n\n键盘应有九个按钮，排列成三乘三的网格，数字 1 到 9 分配给它们的文本属性。在键盘周围放置某种明显的边框。提示：示例解决方案使用 GridPanel\
  \ 来排列按钮。\n\n•\n\n数字显示屏应出现在键盘顶部，由一个 SimpleLabel 控件组成，该控件显示最后点击的按钮的数字。提示：为了实现这种排列，示例解决方案将\
  \ SimpleLabel 分配给 BorderPanel 的 top 属性，并将 GridPanel 分配给 BorderPanel 的 center 属性。\n\
  \n•\n\n为了使其看起来更像计算器，数字应在 SimpleLabel 控件上右对齐。\n\n•\n\nSimpleLabel 应有一个 EmptyBorder，在右侧提供间距，以便数字看起来不会太靠近\
  \ Frame 的右边缘。\n\n•\n\n提示：类解决方案使用 SimpleLabel 的 font 属性（它从 Widget 类继承而来）使显示屏中的数字比默认值稍大一些。\n\
