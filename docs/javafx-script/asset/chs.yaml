  \n}\n\ndragOrigWge = null;\n\n}\n\n} into wgRects;\n\n// 用网格单元格中的字母填充 textLetters\
  \ 数组 insert Text {\n\nx: bind wgRects[yPos * columns + xPos].x\n\ny: bind wgRects[yPos\
