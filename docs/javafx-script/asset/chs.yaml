  \n/**\n\n* 此方法会被自动调用，其返回值是定义此自定义图形组件的声明式脚本\n\n*/\n\noperation WordGridView.composeNode()\
  \ {\n\nreturn Group {\n\ncontent: [\n\nText {\n\nfilter: ShadowFilter\n\nx: 10\n\
