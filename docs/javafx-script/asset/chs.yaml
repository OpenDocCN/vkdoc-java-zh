  \n**创建操作和函数**\n\n你已经在一些练习中使用过操作，但还有一些细节我尚未涉及。在本节中，你还将学习如何创建和使用函数。让我们首先向你展示如何定义操作的*参数*及其可选的*返回类型*。\n\
  \n**定义操作的参数和返回类型** 有些操作需要向它们传递*参数*，有些则不需要。同样，有些操作在被调用后会返回一个值，有些则不会。操作的名称加上所需参数和可选返回类型的配置，被称为操作的*签名*。操作的签名在类定义中定义，如下面来自\
  \ WordGridModel 类定义的摘录所示：\n\npublic operation canPlaceWordSpecific(word:String,\
  \ row:Integer, column:Integer, direction:Integer,\n\ncellAppearance:WordGridRect):Boolean;\n\
  \npublic operation selectPlacedWord(word:String);\n\npublic operation unplaceWord(word:String):Boolean;\n\
  \npublic operation unplaceGridEntries();\n\npublic operation addWord(word:String):Boolean;\n\
  \npublic operation deleteWord(word:String):Boolean;\n\npublic operation highlightWordsOnCell(cellNum:Integer);\n\
  \n在前面的摘录中，你可以看到，如果操作有参数，它们会在操作名称后面的括号内指定。每个参数通过提供参数名称、冒号和其类型来定义。请注意，有些参数类型是四种基本数据类型之一，而其中一个（cellAppearance:WordGridRect）是对象类型。\n\
  \n还请留意，其中一些操作声明在右括号后包含一个冒号，后跟一个数据类型。这表明该操作返回一个值，因此在操作体中有一个返回语句，返回该类型的值。\n\n要调用包含参数的操作，你需要指定操作名称，后跟一个用括号括起来的、以逗号分隔的值列表，这些值的顺序和类型与参数相匹配。以下代码摘录来自单词搜索构建器程序中的各种\
  \ FX 文件，展示了调用前面代码摘录中所示的一些操作的示例：\n\nif (not canPlaceWordSpecific(word, row, column,\
  \ direction, DEFAULT_LOOK:WordGridRect)) {\n\nreturn false;\n\n}\n\nwgModel.selectPlacedWord(wge.word);\n\
  \nwgModel.unplaceGridEntries();\n\nif (wgModel.unplaceWord(wge.word)) {\n\nwgModel.placeWordSpecific(wge.word,\n\
  \nwge.row,\n\nwge.column,\n\nnewOrient);\n\nwgModel.highlightWordsOnCell(wge.row\
  \ * columns +\n\nwge.column);\n\n}\n\n*firstPress: 创建 JavaFX 类和对象*\n\n正如你已经知道的，操作中包含的代码位于该操作的操作体中。看看下面\
  \ addWord() 操作的操作体，并将其与前面 addWord() 操作的声明进行比较。你会注意到，操作声明中表达的参数和返回值的数据类型不必在操作体中重复。你还会注意到，*访问修饰符*（例如本例中的\
  \ public）是在操作声明中指定的，并且不允许在操作体中指定。\n\noperation WordGridModel.addWord(word) {\n\n\
  if (getGridEntryByWord(word) == null) {\n\nvar wge = WordGridEntry {\n\nword: word\n\
  \n};\n\ninsert wge into unplacedGridEntries;\n\nreturn true;\n\n}\n\nelse {\n\n\
  return false;\n\n}\n\n}\n\n\n\n注意 ➡ 截至撰写本文时，JavaFX 尚未完全实现访问修饰符，但一旦实现，可能会像 Java 一样有四种：public、private、protected\
  \ 和 default（无修饰符）。public 操作、函数或属性可从任何其他类访问。private 操作、函数或属性只能从同一类内部访问。无访问修饰符（default）的操作、函数或属性可从同一包内的任何类访问。protected\
  \ 操作、函数或属性可从同一包内的任何类或任何子类（无论其位于哪个包）访问。另一项近期提案指出，可能只有三种访问修饰符：public、protected 和 private（后者将成为默认值）。\n\
  \n我们稍后将更详细地探讨操作体可能包含的内容，包括 JavaFX 语句和运算符。不过，现在让我们将注意力转向一个特殊命名的操作，该操作在使用 `new` 运算符创建实例时执行。\n\
  \n**理解 new 运算符的作用**\n\n有时，我们希望当创建对象实例时能自动执行某些代码。运行这些代码的目的通常是为了初始化对象的\n\n*firstPress：创建\
  \ JavaFX 类和对象* 115\n\n状态。在 JavaFX 中有两种方法可以实现这一点，它们对应于前面展示的两种创建对象实例的方式。回顾一下，这两种方式如下：\n\
  \n•\n\n使用对象字面量，这是在 JavaFX 中创建新实例最典型的方式\n\n•\n\n使用 `new` 运算符，如下所示：\n\n```\nvar wgModel\
  \ = new WordGridModel(9, 9);\n```\n\n现在我们来探讨后一种方式，稍后将在讨论 `trigger` 关键字时介绍前一种方式。\n\
  \n在上述代码片段中，`new` 运算符后面跟着你想要创建实例的类名，类名后面是括号括起来的、以逗号分隔的参数列表。使用这种语法会调用一个与类同名的操作，在本例中，调用的是清单\
  \ 4-5 中 `WordGridModel` 类里的 `WordGridModel` 操作，其声明如下：`public operation WordGridModel(rows:Integer,\
  \ columns:Integer);` 以下是清单 4-5 中 `WordGridModel` 操作的主体：\n\n```\n/**\n * 一个充当 WordGridModel\
  \ 类构造器的方法\n */\noperation WordGridModel.WordGridModel(rows, columns) {\n    this.rows\
  \ = rows;\n    this.columns = columns;\n    selectedPlacedWordIndex = -1;\n    unplacedGridEntries\
  \ = [];\n    placedGridEntries = [];\n    gridCells = [];\n    fillLettersOnGrid\
  \ = false;\n    initializeGrid();\n}\n```\n\n请注意，在上述方法中，使用了一个名为 `this` 的关键字来访问 `WordGridModel`\
  \ 类新实例的 `rows` 和 `columns` 属性，这将其与传入 `WordGridModel` 操作的值区分开来。与任何操作（或函数、触发器）一样，这些传入的值会成为局部变量，就好像它们是用\
  \ `var` 关键字声明的一样。顺便提一下，`this` 关键字可用于任何操作中，其目的是提供对当前类实例的引用。\n\n说到函数，我们接着讨论如何创建一个函数。\n\
  \n*firstPress：创建 JavaFX 类和对象*\n\n**创建 JavaFX 函数**\n\nJavaFX *函数* 拥有操作的部分功能。它只能包含\
  \ `var` 声明和一个 `return` 语句。以下是清单 4-5 中 `WordGridModel` 类的一个函数声明示例：\n\n```\nprivate\
  \ function getLetter(row:Integer, column:Integer):String;\n```\n\n以下是 `getLetter()`\
  \ 函数的主体：\n\n```\n/**\n * 返回网格中指定行和列的字母。\n */\nfunction WordGridModel.getLetter(row,\
  \ column) {\n    return gridCells[row * columns + column].cellLetter;\n}\n```\n\n\
  既然我们已经探讨了操作和函数，接下来让我们更仔细地看看 JavaFX 触发器。\n\n**理解 JavaFX 触发器**\n\n\n\n触发器是 JavaFX\
  \ 的关键特性，它们在实现其声明式编程模型中扮演着重要角色。你已经接触过一种触发器形式：*断言* *触发器*。此时还有两种适合介绍的触发器声明形式：\n\n•\n\
  \n创建触发器\n\n•\n\n替换触发器\n\n*创建触发器*在包含它的类的新实例被创建时自动执行。创建触发器的用途与本章前面讨论过的、与类同名的特殊操作几乎相同。\n\
  \n以下是从 WordGridCell 类摘录的一个创建触发器示例。我们将在本章稍后更详细地查看清单 4-11 中所示的 WordGridCell 类。\n\n\
  *firstPress: 创建 JavaFX 类与对象* 117\n\ntrigger on new WordGridCell {\n\ncellLetter\
  \ = SPACE;\n\n// 生成随机字母，用于在不包含单词的情况下填充此单元格\n\nfillLetter = Character.forDigit(Math.random()\
  \ * 26 + 10, 36).\n\ntoString().toUpperCase();\n\nwordEntries = [];\n\n}\n\n*替换触发器*在触发器中命名的属性被赋予新值时自动执行。以下是从清单\
  \ 4-5 的 WordGridModel 类中摘录的示例：\n\n/**\n\n* 根据未放置单词列表框中选中的单元格，更新模型中选中的未放置单词\n\n*/\n\
  \ntrigger on WordGridModel.selectedUnplacedWordIndex[oldValue] = newValue {\n\n\
  selectedUnplacedWord = unplacedListBox.cells[selectedUnplacedWordIndex].text;\n\n\
  }\n\n当此触发器执行时，赋值运算符（=）右侧的变量包含赋予该属性的新值。可选地，如上述摘录所示，你可以在赋值运算符左侧的方括号中放置一个变量名。这会使该属性在被赋予新值之前的值存储在该变量中。这使你能够在触发器的代码中比较旧值和新值。\n\
  \n如果你熟悉 setter 和 getter 方法，你会意识到替换触发器使你可以省去代码中的 getter 和 setter。相反，你可以直接访问属性。任何可以放在\
  \ setter 方法中的验证或业务逻辑都可以放在触发器中。\n\n替换触发器也可以与序列一起使用，我们尚未介绍的另外两种触发器类型也是如此：*插入触发器*和*删除触发器*。我将在本章稍后讨论序列时提及它们。\n\
  \n为了创建操作、触发器或函数的主体，你需要了解 JavaFX 中可用的*语句*和*运算符*。现在让我们深入了解它们。\n\n*firstPress: 创建 JavaFX\
  \ 类与对象*\n\n**使用 JavaFX 语句和运算符**\n\n到目前为止，本书中你已经检查并使用了几个 JavaFX 语句和运算符。例如，你在练习中使用了赋值运算符（=），在本章前面检查了\
  \ for 语句和 return 语句，并且也在本章前面接触了相等运算符（==）。在本节中，我们将查看清单 4-5 中 WordGridModel 类的几个我尚未解释的\
  \ JavaFX 语句和运算符示例。让我们从 placeWord() 操作开始寻找语句和运算符，并在遇到它们时提供解释。\n\n注意 ➡ 为了方便参考，表 4-2\
  \ 列出了 JavaFX 语句及其描述。表 4-3 至表 4-7 包含了 JavaFX 运算符的同类参考。\n\n**if/else 语句**\n\n请查看以下从\
  \ placeWord() 操作中摘录的片段：if (success) {\n\nreturn true;\n\n}\n\nif 语句仅在条件（括号内的布尔表达式）求值为\
  \ true 时执行必需花括号内的语句。\n\n\n\n可选地，`if` 语句可以有一个匹配的 `else` 子句，如下面来自 `addWord()` 操作的代码片段所示：\n\
  \nif (getGridEntryByWord(word) == null) {\n\nvar wge = WordGridEntry {\n\nword:\
  \ word\n\n};\n\ninsert wge into unplacedGridEntries;\n\nreturn true;\n\n}\n\nelse\
  \ {\n\nreturn false;\n\n}\n\n*firstPress: Creating JavaFX Classes and Objects* 119\n\
  \n如果条件为假，则执行 `else` 子句必需花括号内的语句。`else` 子句唯一不需要花括号的情况是当该 `else` 子句本身是另一个 `if` 语句时。下面来自\
  \ `canPlaceWordSpecific()` 操作的代码片段展示了这一点：if (cellAppearance == DRAGGING_LOOK:WordGridRect)\
  \ {\n\ngridCells[yPos * columns + xPos].appearance = DRAGGING_LOOK;\n\n}\n\nelse\
  \ if (cellAppearance == CANT_DROP_LOOK:WordGridRect) {\n\ngridCells[yPos * columns\
  \ + xPos].appearance = CANT_DROP_LOOK;\n\n}\n\nelse if (i == 0) {\n\n// 这是单词的第一个字母\n\
  \ngridCells[yPos * columns + xPos].appearance = DEFAULT_FIRST_LOOK;\n\n}\n\nelse\
  \ {\n\ngridCells[yPos * columns + xPos].appearance = DEFAULT_LOOK;\n\n}\n\n此外，还有一个\
  \ `if/then/else` 三元运算符。以下是该运算符的一个示例：var a = 3;\n\nvar b = 4;\n\nprintln(\"a is {if\
  \ a > b then \"biggger\" else \"smaller\"} than b\"); 前面的示例还演示了可以在字符串表达式运算符中嵌套双引号。你也可以在嵌套的双引号内再嵌套字符串表达式，以此类推。\n\
  \n现在你已经了解了 `if` 语句的各种形式，接下来我们将介绍一种名为 `while` 语句的循环语句。\n\n**while 语句**\n\n`while`\
  \ 语句在其必需花括号内执行语句，只要圆括号内的条件求值为真。请参见下面来自 `unplaceWord()` 操作的代码片段：\n\nwhile (i < word.length())\
  \ {\n\ngridCells[yPos * columns + xPos].cellLetter = SPACE:String;\n\n// 将此 WordGridEntry\
  \ 与网格视图上的单元格解除关联\nvar wges = gridCells[yPos * columns + xPos].wordEntries;\n\ndelete\
  \ wges[w | w == wge];\n\n*firstPress: Creating JavaFX Classes and Objects*\n\nxPos\
  \ += xIncr;\n\nyPos += yIncr;\n\ni++;\n\n}\n\n前面的代码片段引入了*小于运算符*（<），它将左侧表达式的值与右侧表达式的值进行比较。如果左侧表达式的值小于右侧表达式的值，则包含小于运算符（<）的表达式的值为真。有关\
  \ JavaFX 中每个*关系运算符*的列表和简要说明，请参见表 4-3。\n\n该代码片段还引入了一些*算术运算符*，例如*加并赋值运算符*（+=）。该运算符将右侧表达式的值加到左侧变量的值上，并将结果赋值给左侧变量。*递增运算符*（++）将左侧变量的值加\
  \ 1。有关 JavaFX 中每个算术运算符的列表和简要说明，请参见表 4-5。\n\n**break 语句**\n\n在 `for` 语句和 `while`\
  \ 语句中，你可以使用 `break` 语句提前跳出循环。请参见来自 `canPlaceWordSpecific()` 操作的代码片段：for (i in [0..\
  \ word.length() - 1]) {\n\nif (xPos > columns - 1 or yPos > rows - 1 or xPos < 0\
  \ or yPos <0) {\n\n// 单词无法放置，因为其中一个字母超出了网格范围\ncanPlaceWord = false;\n\nbreak;\n\n\
  }\n\n// 检查要放置的字母是空格还是相同的字母\nelse if ((gridCells[yPos * columns + xPos].cellLetter\
  \ <> SPACE:String) and (gridCells[yPos * columns + xPos].cellLetter <> word.substring(i,\
  \ i+1))) {\n\n// 单词无法放置，因为与网格上的另一个字母冲突\ncanPlaceWord = false;\n\n}\n\n**...部分代码已省略...**\n\
  \n}\n\n在这种情况下，当该代码片段第二行中的 `if` 条件为真时，`for` 循环将在遍历完序列中的所有元素之前终止。执行将在 `for` 语句的结束花括号之后继续。\n\
  \n*firstPress: Creating JavaFX Classes and Objects* 121\n\n\n\nJavaFX 中还有一个 continue\
  \ 语句，其工作方式类似，区别在于它会立即继续执行 for 或 while 语句的下一次迭代，此时会评估条件以确定是否还需要进行更多迭代。\n\n顺便提一下，你可能已经在这段摘录中发现了另外几个关系运算符，即*大于运算符*\
  \ (>) 和*不等运算符* (<>)。这段摘录中还有几个布尔运算符（或运算符和与运算符）。\n\n现在，我为你准备了一个练习，它将帮助你巩固本章到目前为止所学的几个概念。\n\
