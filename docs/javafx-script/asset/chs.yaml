  \ 5-1 中除了你在 HelloJFX.fx 程序中已经学过的内容之外的新概念。\n\n*清单 5-1. TextAndEllipse.fx 程序*\n\n\
  package jfx_book;\n\nimport javafx.ui.*;\n\nimport javafx.ui.canvas.*;\n\nFrame\
