  \ .8;\n\nscaleFactorY *= .8;\n\n}\n\nelse {\n\nscaleFactorX *= 1.25;\n\nscaleFactorY\
  \ *= 1.25;\n\n}\n\n}\n\nonMouseDragged: operation(mEvt) {\n\ntransX += mEvt.dragTranslation.x;\n\
  \ntransY += mEvt.dragTranslation.y;\n\n}\n\nstrokeWidth: 5\n\nstroke: red\n\nfill:\
  \ white\n\ncx: 0\n\ncy: 0\n\nradiusX: 250\n\nradiusY: 50\n\n},\n\nText {\n\nfont:\n\
  \nFont {\n\nfaceName: \"Sans Serif\"\n\nstyle: BOLD\n\nsize: 24\n\n}\n\nx: -180\n\
