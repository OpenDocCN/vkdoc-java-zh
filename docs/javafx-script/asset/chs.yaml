  \n**...大量代码已省略...**\n\n我提到过有几种方法可以创建 JavaFX 类的实例（也称为对象）。其中一种方法是使用 new 运算符，如下所示，用于实例化\
  \ WordGridModel 类：\n\n\n\nvar wgModel = new WordGridModel(9, 9);\n\n在下一章中，您将看到，以这种方式创建对象会调用\
