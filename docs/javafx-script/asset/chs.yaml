  \n}\n\n]\n\n}\n\n}\n\n}\n\n**创建菜单**\n\n我们将稍微跳跃式地浏览这个程序清单——一些概念因为已经介绍过而跳过，另一些概念则遵循一个逻辑教学顺序，该顺序与它们在清单中出现的顺序不同。我们将从声明式脚本的一部分开始，如清单\
  \ 3-2 所示，这部分脚本创建了 Frame 及其内部的一些与菜单相关的 UI 组件。我们在清单 3-2 中重点关注的部分代码与创建单词搜索生成器应用程序的“网格”菜单相关，如图\
  \ 3-13 所示。\n\n*图 3-13\\. 单词搜索生成器的菜单栏，显示了“网格”菜单*\n\n*firstPress: Creating User Interfaces\
  \ in JavaFX*\n\n**创建 MenuBar 小部件**\n\n*清单 3-2\\. WordSearchMain.fx 中与菜单相关的一些代码*\
  \ Frame {\n\ntitle: \"JavaFX Script 中的单词搜索谜题生成器\"\n\nwidth: 750\n\nheight: 450\n\
  \nonClose: operation() {\n\nSystem.exit(0);\n\n}\n\nvisible: true\n\nmenubar: MenuBar\
  \ {\n\nmenus: [\n\nMenu {\n\ntext: \"网格\"\n\nmnemonic: G\n\nitems: [\n\nMenuItem\
