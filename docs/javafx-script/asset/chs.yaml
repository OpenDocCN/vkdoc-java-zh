  \ 在上述示例中，一个表达式被赋值给序列中的一个元素。如前所述，如果该序列存在替换触发器，那么当序列中某个元素的值被替换时，该触发器将会执行。有关序列替换触发器的更多信息，请参阅以下网址：\n\
  \n[`openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig`](https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig)\n\
  \n*firstPress: 创建 JavaFX 类和对象*\n\n**遍历序列**\n\n在本章前面部分，你已经看到 for 语句以几种方式用于遍历序列。清单\
  \ 4-9 中的 SequenceExample.fx 程序也使用了这两种技术，如下所示：\n\n// 通过遍历行星序列打印所有行星 for (planet in\
  \ planets) {\n\nprintln(\"{planet} 是我们太阳系中的一颗行星\");\n\n}\n\n// 通过遍历一个与行星序列大小相同的序列，并引用行星数组中对应的元素\n\
  \n// 来打印所有行星。\n\nfor (i in [0.. sizeof planets - 1]) {\n\nprintln(\"{planets[i]}\
  \ 是我们太阳系中的一颗行星\");\n\n}\n\n请注意使用 sizeof 运算符来确定序列中的元素数量。\n\n**插入序列元素**\n\n要向序列中插入元素，请使用\
  \ insert 语句，如下面清单 4-9 的摘录所示：\n\n// 在海王星（当前位于位置 5）之前插入天王星 println(\"在天王星之前插入海王星\"\
  );\n\ninsert \"Uranus\" before planets[5];\n\n// 在火星（当前位于位置 3）之后插入木星 println(\"\
  在火星之后插入木星\");\n\ninsert \"Jupiter\" after planets[3];\n\n// 将冥王星添加到序列末尾。\n\nprintln(\"\
  将冥王星作为最后一颗行星插入\");\n\ninsert \"Pluto\" into planets;\n\n// 将太阳添加到序列开头\n\nprintln(\"\
  将太阳插入到开头\"); insert \"Sun\" as first into planets;\n\n如上述摘录所示，insert 语句有几种变体：\n\n\
  \n\n*firstPress：创建 JavaFX 类与对象* 133\n\n•\n\n将 *element* 插入 *sequence*：此操作用于插入冥王星。这种形式的\
  \ insert 语句会将元素添加到序列的末尾。该变体的更正式写法是 insert *element* as last into *sequence*。\n\n\
  •\n\n将 *element* 作为第一个元素插入 *sequence*：此操作用于插入太阳。这种形式的 insert 语句会将元素插入到序列的开头。\n\n\
  •\n\n将 *element* 插入到 *sequence[index]* 之前：此操作用于插入天王星。这种形式的 insert 语句会将元素插入到序列中某个已存在元素的前面。\n\
  \n•\n\n将 *element* 插入到 *sequence[index]* 之后：此操作用于插入木星。这种形式的 insert 语句会将元素插入到序列中某个已存在元素的后面。\n\
  \n在 Word Search Builder 应用程序中，insert 语句被用于 WordGridModel.addWord() 操作，以便将 WordGridEntry\
  \ 实例插入到未放置的单词网格条目序列中，如下所示：\n\ninsert wge into unplacedGridEntries;\n\ninsert 语句还被用于\
  \ WordGridModel.initializeGrid() 操作，以初始填充 gridCells 序列：\n\nfor (i in [0.. (rows\
  \ * columns) - 1]) {\n\ninsert WordGridCell{} into gridCells;\n\n}\n\n如前所述，可以定义一个\
  \ insert 触发器，当元素被插入到序列中时执行。有关 insert 触发器的详细信息，请参见以下网址：\n\n[`openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig.`](https://openjfx.dev.java.net/JavaFX_Programming_Language.html#replace_trig)\n\
  \n**查询序列**\n\n你可以查询序列以检索其元素的子集。清单 4-9 中的示例展示了两种*列表推导式*运算符：select 和 foreach。以下是一些摘录：\n\
  \nsomePlanets = select \"{planet},\" from planet in planets where planet.length()\
  \ > 5;\n\nprintln(\"The {sizeof somePlanets} planets with more than 5 characters\
  \ are:\n\n{somePlanets}\");\n\n*firstPress：创建 JavaFX 类与对象*\n\n这个 select 查询选择了 planets\
  \ 序列中所有字符数超过五个的元素。结果保存在由变量 somePlanets 引用的序列中。一个名为 planet 的变量被隐式创建，它持有对每个匹配查询的元素的引用。如你所见，在\
  \ select 运算符之后，我决定在将每个返回的元素放入 somePlanets 数组之前，先在其后拼接一个逗号。\n\n// 使用 foreach 查询所有以字母\
  \ \"N\" 或之后字母开头的行星\n\nsomePlanets = foreach (planet in planets where planet >= \"\
  N\") \"{planet},\"; println(\"The {sizeof somePlanets} planets in the second half\
  \ of the alphabet are:\n\n{somePlanets}\");\n\n前面的 foreach 查询所做的几乎与 select 查询相同，只是使用了不同的语法。这里功能上的唯一区别在于条件中的标准。\n\
  \n下面展示的是另一个 foreach 查询的示例，它返回一个数字序列，这些数字是匹配查询的每个元素的索引。该数字序列被放在 delete 语句的方括号内，以便删除这些索引处的元素。\n\
  \n// 查询冥王星的索引并删除它\n\nprintln(\"Querying for the indexof Pluto\");\n\nvar indices\
  \ = foreach (planet in planets\n\nwhere planet == \"Pluto\") indexof planet;\n\n\
  println(\"Pluto is in position {indices}\");\n\nif (sizeof indices >= 0) {\n\nprintln(\"\
  Deleting Pluto\");\n\ndelete planets[indices];\n\n}\n\n下面展示的是另一个 select 查询，它以相反顺序检索\
  \ planets 序列中的所有元素：\n\nvar allPlanetsRunTogether = select planet from planet in\
  \ reverse planets; **删除序列元素**\n\n要从序列中删除一个元素，请使用 delete 语句，如清单 4-9 中的以下摘录所示：\n\n\
  delete planets[0];\n\n*firstPress：创建 JavaFX 类与对象* 135\n\n\n\n此操作会从 `planets` 序列中删除索引为\
  \ 0 的元素。如前一示例所示，你也可以在 `delete` 运算符的谓词（方括号内）中放入一个数字序列。\n\n以下是在 Word Search Builder\
  \ 应用程序的 `WordGridModel.placeWordSpecific` 操作中使用 `delete` 运算符的示例：\n`delete unplacedGridEntries[w\
  \ | w == wge];`\n`insert wge into placedGridEntries;`\n\n从 `unplacedGridEntries`\
  \ 中删除一个 `WordGridEntry` 实例后，此代码会将相同的值插入到 `placedGridEntries` 序列中。\n\n可以定义一个删除触发器，当从序列中删除元素时执行。有关删除触发器的详细信息，请参阅以下\
  \ URL：\n\n[`openjfx.dev.java.net/JavaFX_Programming_Language.html#delete_trig.`](https://openjfx.dev.java.net/JavaFX_Programming_Language.html#delete_trig)\n\
  \n**将序列置零**\n\n要使数组不包含任何元素，请使用方括号内为空的序列字面量表示法，如下面摘自 `WordGridModel.WordGridModel`\
  \ 操作的示例所示：\n\n`unplacedGridEntries = [];`\n`placedGridEntries = [];`\n`gridCells\
  \ = [];`\n\n正如所承诺的，以下是一些表格（见表 4-2 至 4-7），其中汇总了 JavaFX 语句和 JavaFX 运算符，供你参考。\n\n*firstPress:\
  \ 创建 JavaFX 类和对象*\n\n**JavaFX 语句**\n\n*表 4-2. JavaFX 语句*\n\n**语句**\n\n**描述**\n\n\
  `return`\n\n退出当前操作或触发器，可选择向调用者返回一个值。\n\n`if/else`\n\n当条件为真时，执行 `if` 语句体中的语句。如果存在\
  \ `else` 子句，则当 `if` 条件为假时执行 `else` 子句体。\n\n`for`\n\n遍历一个序列，在每次迭代中执行 `for` 循环体中的语句。\n\
  \n`while`\n\n当条件为真时，执行 `while` 循环体中的语句。\n\n`break`\n\n跳出 `for` 或 `while` 循环，继续执行循环体之后的代码。\n\
  \n`continue`\n\n立即继续执行 `for` 或 `while` 循环的下一次迭代，并评估循环条件。\n\n`insert`\n\n与序列一起使用，`insert`\
  \ 语句将一个元素插入到序列中。\n\n`delete`\n\n与序列一起使用，`delete` 语句从序列中删除元素。\n\n`try/catch/finally`\n\
  \n用于异常处理，`try` 语句包含一个主体，其中尝试执行一个或多个语句。如果发生异常（错误条件），则立即在相应的 `catch` 子句处继续执行。无论是否发生异常，都会执行可选的\
  \ `finally` 子句。\n\n`throw`\n\n与异常处理结合使用，`throw` 语句会导致抛出异常，该异常通常会被 `try` 语句捕获。\n\n\
  `do`, `do later`\n\n用于并发处理。\n\n*firstPress: 创建 JavaFX 类和对象* 137\n\n**JavaFX 运算符**\n\
