  \ assert 语句执行时运行，如下所示：\n\nassert wordGridModel.placeWord(\"red\") == false;\n\n\
  上述语句断言，将单词 *red* 传递给 `wordGridModel` 对象的 `placeWord()` 操作将返回 false。\n\n注意 ➡ 相等运算符由两个等号\
  \ (==) 组成，用于比较其左侧表达式的值与右侧表达式的值。如果表达式相等，则包含相等运算符的表达式的值为 true。\n\n如果情况确实如此，将自动执行以下触发器：\n\
