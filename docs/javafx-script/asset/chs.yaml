  ]\n\n}\n\n}\n\n**理解 JavaFX 布局控件**\n\n为不同平台设计用户界面面临诸多挑战，其中最主要的是不同平台上的 UI 组件在大小、外观和行为上通常存在差异。UI\
  \ 组件的绝对定位可能适用于单一平台，但当您的 UI 需要在多个平台上良好运行时，就需要一种布局策略，使 UI 组件相对于彼此及其上下文进行定位。JavaFX\
  \ *布局控件* 是解决此问题的一种非常简单且强大的方案。\n\n布局控件有几种类型，它们可以协同使用以实现所需的组件放置。您刚刚在图 3-16 和清单 3-4\
  \ 中看到的 BordersExample.fx 程序\n\n![图 28](img/index-76_1.png)\n\n*firstPress: 使用 JavaFX\
  \ 创建用户界面*\n\n就是一个简单 UI 设计的良好示例，它只需要一个布局控件：GridPanel 布局控件。\n\n**使用 GridPanel 布局控件**\n\
  \n\n\n如果你运行 `BordersExample.fx` 程序并垂直缩小窗口（或在使用 JavaFXPad 时移动拖拽手柄），结果仍会是九个均匀的单元格，每个单元格在垂直方向上比原来更小。图\
  \ 3-17 展示了我调整窗口大小时观察到的结果。\n\n*图 3-17\\. 垂直调整窗口大小后 `BordersExample.fx` 的输出* 让我们分析一下\
  \ `BordersExample.fx` 程序中的部分代码片段（如下所示），以便你学习如何使用 `GridPanel` 布局控件：\n\nFrame {\n\n\
  **...部分代码省略...**\n\ncontent:\n\nGridPanel {\n\nrows: 3\n\ncolumns: 3\n\nvgap: 5\n\
  \nhgap: 5\n\ncells: [\n\nButton {\n\n**...部分代码省略...**\n\n},\n\nButton {\n\n**...部分代码省略...**\n\
  \n},\n\n*firstPress: 在 JavaFX 中创建用户界面*\n\nButton {\n\n**...部分代码省略...**\n\n},\n\n\
  Button {\n\n**...部分代码省略...**\n\n},\n\nButton {\n\n**...部分代码省略...**\n\n},\n\nButton\
  \ {\n\n**...部分代码省略...**\n\n},\n\nButton {\n\n**...部分代码省略...**\n\n},\n\nButton {\n\
  \n**...部分代码省略...**\n\n},\n\nButton {\n\n**...部分代码省略...**\n\n},\n\n]\n\n}\n\n}\n\n\
  在上述代码中，我们首先将一个 `GridPanel` 控件赋值给 `Frame` 的 `content` 属性。这导致 `Frame` 中 UI 组件的布局由\
  \ `GridPanel` 布局控件的规则控制。\n\n接下来，我们通过为 `rows` 和 `columns` 属性赋予所需的值，告诉 `GridPanel`\
  \ 网格中应有多少行和列。\n\n从图 3-17 的截图中你会注意到，网格中的单元格之间存在一些间距。这是通过为 `vgap` 和 `hgap` 属性（以像素为单位）赋予所需的值来实现的，分别用于控制垂直和水平间距。\n\
  \n然后，我们使用数组字面量表示法，为 `GridPanel` 中的每个单元格分配一个 UI 组件。`GridPanel` 中的 UI 组件会扩展至单元格的大小，这就是为什么此示例中的\
  \ `Button` 控件几乎和单元格一样大。\n\n注意 ➡ 虽然我展示了将 `GridPanel` 控件赋值给 `Frame` 的 `content`，但请注意，任何布局控件都可以赋值给任何能够包含控件的\
  \ GUI 组件。这包括例如 `Frame`、`Dialog` 以及所有布局控件。我将这些类型的组件统称为 *UI 容器*。\n\n![Image 29](img/index-78_1.png)\n\
  \n*firstPress: 在 JavaFX 中创建用户界面*\n\n让我们来看另一个非常有用的布局控件，名为 `Box`。\n\n**使用 Box 布局控件**\n\
  \n`Box` 布局控件用于在 UI 容器中垂直或水平堆叠 UI 组件。你可以在图 3-18 的截图中看到使用 `Box` 布局控件的效果，其中 `WordGridView`\
  \ 和 `WordListsView` 自定义 UI 组件水平排列。请注意，我在此截图中添加了虚线，以显示 `Box` 布局控件的位置（外部虚线矩形）以及每个\
  \ UI 组件在 `Box` 布局控件内的位置（内部虚线矩形）。\n\n*图 3-18\\. 在 Word Search Builder 应用程序中使用 Box\
  \ 布局控件* 你将在 `WordSearchMain.fx` 的以下代码片段中看到与 `Box` 控件相关的代码：\n\nBox {\n\norientation:\
  \ HORIZONTAL\n\ncontent: [\n\nCanvas {\n\ncontent: bind wgModel.wordGridView\n\n\
  },\n\nBorderPanel {\n\ncenter: bind wgModel.wordListsView\n\n}\n\n]\n\n}\n\n![Image\
  \ 30](img/index-79_1.png)\n\n*firstPress: 在 JavaFX 中创建用户界面*\n\n`orientation` 属性控制\
  \ `Box` 中的 UI 组件是水平排列还是垂直排列。`content` 属性通过数组字面量表示法分配一个或多个 UI 组件。请注意，其中一个被分配的 UI\
  \ 组件是 `BorderPanel` 布局控件——这是一个布局控件嵌套在另一个布局控件中以实现所需 UI 组件放置的示例。\n\n说到 `BorderPanel`\
  \ 布局控件，让我们将注意力转向它。\n\n**使用 BorderPanel 布局控件**\n\n\n\nBorderPanel 布局控件在 Word Search\
  \ Builder 应用程序中用于将工具栏放置在应用程序框架的顶部，并允许界面中的其余组件占据工具栏未占用的剩余可用区域。这一点在图 3-19 的截图中得到了说明，为了清晰起见，我在图中添加了粗线和\
  \ BorderPanel 的属性名称。\n\n*图 3-19. 在 Word Search Builder 应用程序中使用 BorderPanel 布局控件*\
  \ 你将在以下来自 WordSearchMain.fx 的代码片段中看到与 BorderPanel 控件相关的代码：\n\nBorderPanel {\n\n\
  top:\n\nToolBar {\n\n*firstPress: 使用 JavaFX 创建用户界面*\n\n**...部分代码省略...**\n\n}\n\n\
  center:\n\nBox {\n\n**...部分代码省略...**\n\n}\n\n}\n\nBorderPanel 控件有五个可用属性：top、bottom、left、right\
  \ 和 center。这些属性的任意组合都可以分配界面组件。未分配给 center 属性的界面组件所剩余的任何空间，都将由分配给 center 的界面组件（如果已分配）占据。\n\
  \n表 3-3 列出了所有 JavaFX 布局控件类型，以及描述和属性（在适用情况下包含常量）。\n\n**布局控件类型**\n\n*表 3-3. 布局控件类型*\n\
