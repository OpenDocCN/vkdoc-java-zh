  \n**控制节点的不透明度**\n\n如前面的片段所示，`opacity`属性绑定到了一个名为`opa`的变量，该变量的初始值为 1。`opacity`属性的取值范围是\
  \ 0 到 1，其中 0 表示完全透明，1 表示完全不透明。当鼠标点击超级鸭子图像时，会调用下面片段中显示的事件处理代码：onMouseClicked: operation(mEvt)\
  \ {\n\nvar newX = Math.random() * (theCanvas.width - self.currentWidth); var newY\
