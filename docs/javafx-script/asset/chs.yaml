  \ JavaFX 关键字用作标识符。\n\n现在你已经检查了负责模型大部分功能的 `WordGridModel` 类，并从中汲取了许多 JavaFX 概念，接下来让我们检查构成单词搜索构建器应用程序模型的其他类。\n\
  \n**每个单词搜索网格单元格背后的模型**\n\n正如你在检查 `WordGridModel` 类时所看到的，它有一个名为 `gridCells` 的属性，其中包含对\
  \ `WordGridCell` 实例序列的引用：\n\n// 对象数组，每个对象代表单词网格上的一个单元格\npublic attribute gridCells:WordGridCell*;\n\
  \n这些实例中的每一个都代表单词搜索谜题中的一个单元格，并保存诸如占据该单元格的字母等信息。清单 4-11 包含了 `WordGridCell` 类的代码。\n\
  \n*首版印刷：创建 JavaFX 类与对象*\n\n*清单 4-11\\. WordGridCell 类*\n\npackage wordsearch_jfx.model;\n\
  \nimport javafx.ui.*;\n\nimport java.lang.Character;\n\nimport java.lang.Math;\n\
  \nimport wordsearch_jfx.ui.WordGridRect;\n\nclass WordGridCell {\n\n// 放置在此单元格中的字母（或可能包含一个空格）\n\
  attribute cellLetter:String;\n\n// 此单元格中的随机字母\nattribute fillLetter:String;\n\n\
  // 指示此单元格应具有哪种外观\n//（例如，SELECTED_LOOK、DRAGGING_LOOK 或 DEFAULT_LOOK）\nattribute appearance:WordGridRect;\n\
  \n// 与此单元格关联的单词网格条目\nattribute wordEntries:WordGridEntry*;\n\n}\n\ntrigger on new\
  \ WordGridCell {\n\ncellLetter = SPACE;\n\n// 生成随机字母，用于在该单元格不包含单词时填充它\nfillLetter\
  \ = Character.forDigit(Math.random() * 26 + 10, 36).\ntoString().toUpperCase();\n\
  \nwordEntries = [];\n\n}\n\n// 与 WordGridCell 相关的常量，当该单元格为空（包含一个空格）时\nSPACE:String\
  \ = \" \";\n\n除了保存占据单元格的字母（或空格）之外，此类还生成并保存一个随机字母，当用户选择在网格上显示填充字母时显示该字母。这个随机字母是在创建此类实例时由\
  \ *new 触发器* 调用的以下语句中生成的：\n\n// 生成随机字母，用于在该单元格不包含单词时填充它\n*首版印刷：创建 JavaFX 类与对象* 141\n\
  // 在它不包含单词的情况下\nfillLetter = Character.forDigit(Math.random() * 26 + 10, 36).\n\
  toString().toUpperCase();\n\n刚刚显示的语句调用了 Java 的 Character、Math 和 String 类的方法。\n\n\
  此类还负责维护一个 `WordGridEntry` 实例序列，这些实例表示包含此 `WordGridCell` 实例所代表的任何字母的单词。这连同 `appearance`\
  \ 属性，有助于实现高亮显示网格上与鼠标光标所指字母相交的单词的功能。\n\n**单词列表框背后的模型**\n\n\n\n如前所示，`WordGridModel`\
  \ 类有一个名为 `unplacedGridEntries` 的属性，该属性包含对一系列 `WordGridEntry` 实例的引用，每个实例代表 UI 中“未放置单词”列表框中的一个单词：`public\
  \ attribute unplacedGridEntries:WordGridEntry*;`\n\n`WordGridModel` 类还有一个名为 `placedGridEntries`\
  \ 的属性，该属性同样包含对一系列 `WordGridEntry` 实例的引用，每个实例代表 UI 中“已放置单词”列表框中的一个单词：\n\n`public\
  \ attribute placedGridEntries:WordGridEntry*;`\n\n每个 `WordGridEntry` 实例不仅保存一个单词，还保存该单词是否已放置在网格上、单词首字母所在的行和列，以及单词在网格上的方向（朝向）。清单\
  \ 4-12 包含了 `WordGridEntry` 类的代码。\n\n*firstPress：创建 JavaFX 类和对象*\n\n*清单 4-12. WordGridEntry\
  \ 类*\n\npackage wordsearch_jfx.model;\n\nimport javafx.ui.*;\n\npublic class WordGridEntry\
  \ {\n\n// 包含此 WordGridEntry 所代表的单词\n\nattribute word:String;\n\n// 指示此单词是否已放置在网格上。可能存在\n\
  \n// 未放置在网格上的 WordGridEntry 对象。\n\npublic attribute placed:Boolean;\n\n// 包含此单词在网格中起始的行号。\n\
  \nattribute row:Integer;\n\n// 包含此单词在网格中起始的列号。\n\nattribute column:Integer;\n\n\
  // 包含此单词在网格上的方向（朝向）。可能的\n\n// 取值是 WordOrientation 类中的方向常量。\n\npublic attribute direction:Integer;\n\
  \n}\n\ntrigger on WordGridEntry.word = newWord {\n\nword = newWord.toUpperCase();\n\
  \n}\n\n当为此类的实例赋值一个单词时，替换触发器会调用 Java `String` 类的 `toUpperCase()` 方法，您还记得，该方法为 JavaFX\
  \ `String` 数据类型提供了大部分功能。\n\n在“单词搜索构建器”UI 背后的模型中，还有另一个类，其目的是定义命名实例，这些实例代表放置在网格上的单词可能具有的方向。清单\
  \ 4-13 包含了 `WordOrientation` 类的代码。\n\n*firstPress：创建 JavaFX 类和对象* 143\n\n*清单 4-13.\
  \ WordOrientation.fx 程序*\n\npackage wordsearch_jfx.model;\n\nimport javafx.ui.*;\n\
  \npublic class WordOrientation {\n\npublic attribute id: Integer;\n\n}\n\nHORIZ:WordOrientation\
  \ = WordOrientation {\n\nid: 0\n\n};\n\nDIAG_DOWN:WordOrientation = WordOrientation\
  \ {\n\nid: 1\n\n};\n\nVERT:WordOrientation = WordOrientation {\n\nid: 2\n\n};\n\n\
  DIAG_UP:WordOrientation = WordOrientation {\n\nid: 3\n\n};\n\nNUM_ORIENTS:Integer\
  \ = 4;\n\n现在您已经了解了所有 JavaFX 标识符（例如类、属性、变量、操作、函数和命名实例），我想让您更全面地理解命名它们的规则和约定。\n\n\
  **JavaFX 标识符的命名规则和约定**\n\nJavaFX 中标识符的命名规则是：必须以字母、下划线字符（_）或美元符号（$）开头。标识符名称中的后续字符可以是数字、字母、下划线字符或美元符号。实际上，美元符号很少用于标识符，数字也极少使用。对于每种类型的标识符，都有一些命名约定，这些约定将帮助您编写其他\
  \ JavaFX\n\n*firstPress：创建 JavaFX 类和对象*\n\n程序员易于阅读的代码。表 4-8 描述了每种标识符类型的命名约定。\n\n\
  *表 4-8. 标识符命名约定*\n\n**标识符类型**\n\n**命名约定**\n\nclass\n\n以大写字母开头，由一个或多个\n\n驼峰式单词组成。类名通常是一个\n\
  \n名词。例如 `WordGridCell` 和 `Planet`。\n\nattribute/variable\n\n以小写字母开头，由一个或多个\n\n驼峰式单词组成。例如\
  \ `wordEntries` 和\n\n`numMoons`。有些开发者会在属性前加上\n\n字符（如下划线（_）或 `m_`），以\n\n将其与局部变量区分开来。\n\
  \noperation/function\n\n\n\n以小写字母开头，由一个或多个驼峰式单词组成。操作或函数的名称通常表示动作。示例包括 `highlightWordsOnCell()`\
  \ 和 `rotate()`。\n\n命名实例\n\n命名实例通常全部使用大写字母，复合词之间用下划线分隔。偶尔，命名实例全部使用小写字母，且复合词之间没有任何分隔符，例如表示颜色的命名实例就是如此。示例包括\
  \ `DIAG_DOWN` 和 `blue`。\n\n包\n\n包名全部使用小写字母，复合词之间用下划线分隔。通常，包名会以组织的域名开头（域名类型在前）。示例包括\
  \ `com.apress.javafx_book` 和 `wordsearch_jfx.model`。\n\n**总结**\n\n在本章中，你再次涉猎广泛，学到了更多关于\
  \ JavaFX 的知识。你已学习和体验的一些概念包括：\n\n•\n\n创建一个程序来测试模型。\n\n•\n\n使用 `javafx.bat` 或 `javafx.sh`\
  \ 从命令行执行 JavaFX 程序。\n\n•\n\n使用触发器在特定条件下自动执行代码，具体包括：\n\n*firstPress: 创建 JavaFX 类和对象*\
