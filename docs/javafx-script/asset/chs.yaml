  \ Java 用户组指导委员会的成员。\n\n**ix**\n\n致谢\n\n\n  \n**本**书献给我的妻子朱莉；我的女儿洛丽和凯莉；我的“儿子”马蒂；以及我的孙辈凯勒布和吉莉安。感谢你们在写作密集期间始终如一的关爱、支持与理解。感谢梅里尔和芭芭拉·比希尔、玛丽莲·普雷特、沃尔特·韦弗，你们是杰出的榜样。也感谢劳拉·李和史蒂夫·布朗、吉尔·韦弗、莎莉和道格·比姆、韦德·韦弗、杰里和谢丽尔·比希尔、我的商业伙伴兼“兄弟”丹尼尔·赖特，以及史蒂夫·科尔特牧师。感谢史蒂夫·安格林、加里·康奈尔、蒂娜·尼尔森、理查德·达尔·波尔图和达蒙·拉尔森，与\
