  \n注意 ➡ 属性与 var 之间的另一个重要区别是其*作用域*（生命周期）。只要属性所属的对象存在，该属性就存在。而 var 仅在其声明的操作或函数处于作用域内（正在执行）时才存在。var\
  \ 也可以在顶层（任何操作或函数之外）声明，在这种情况下，其作用域是源文件的剩余部分。\n\n关于此代码片段中为 `startingRow` 变量赋值，我希望你注意另外几点：\n\
