  \ WordGridRect 实例与 WordGridView 实例相关联。\n\n*firstPress：使用 JavaFX 创建用户界面*\n\nWordGridRect\
  \ 类还包含与单元外观相关的常量（例如，DRAGGING_LOOK 和 SELECTED_LOOK）。\n\n如带箭头的虚线所示，WordListsView 类的一个实例存在于包含层次结构中的\
  \ BorderPanel 实例内。它是一个自定义组件，负责创建、显示和管理“未放置单词”和“已放置单词”列表框。\n\n现在你已经对 wordsearch_jfx.ui\
  \ 包中的架构有了概述，让我们将注意力转向 wordsearch_jfx.model 包。\n\n**wordsearch_jfx.model 包中的类**\n\
  \nwordsearch_jfx.model 包由包含应用程序模型（表示数据的对象）的类组成。\n\nWordGridModel 类是负责保存模型的主要类。例如，如类图所示，该类的属性之一是\
  \ fillLettersOnGrid。该属性保存填充字母当前是否显示在网格上的状态。如前所述，当填充字母显示在网格上时，许多菜单选项和工具栏按钮需要被禁用。为了实现这一点，如从该类的\
  \ fillLettersOnGrid 属性出发的两条虚线所示，某些菜单项和工具栏按钮的 enable 属性被绑定到 fillLettersOnGrid 属性。这是\
  \ bind 运算符如何帮助应用程序视图与模型保持同步的一个示例。这个 WordGridModel 类还具有为模型提供功能的操作。例如，当调用 addWord()\
  \ 操作时（由 WordSearchHandlers 类中的 wordListAddWord() 方法调用），该操作中的逻辑会导致一个 WordGridEntry\
  \ 被添加到 WordGridModel 实例中的 unplacedGridEntries 数组中。如从 unplacedGridEntries 和 placedGridEntries\
  \ 属性出发的虚线所示，“未放置单词”和“已放置单词”列表框被绑定到这些数组，因此当这些数组的内容发生变化时，它们会自动更新。\n\n\n\n注意 ➡ `placedGridEntries:WordGridEntry*`\
  \ 属性后的星号 (*) 表示该属性是一个数组（也称为*序列*）。稍后我们将深入探讨数组。\n\n`WordGridEntry` 类包含一个单词、该单词是否已放置的状态，以及如果已放置，则包含其放置的行、列和方向（垂直、水平等）。从图中可以注意到，`WordGridCell`\
  \ 类与 `WordGridEntry` 类的实例之间存在一对多的关系。因此，当用户在网格上的某个字母上调用弹出菜单时，你可以显示该字母所属的单词列表。\n\n\
  `WordGridCell` 类包含网格中某个单元格的字母，以及一个随机生成的填充字母。它还使用 `WordGridRect` 类中定义的常量来保存单元格应具有的外观。如带箭头的虚线所示，视图中每个\
  \ `WordGridRect` 实例的外观属性都绑定到模型中相应 `WordGridCell` 实例的外观属性。此外，在 `WordGridView` 组件中绘制的每个文本字母都绑定到模型中每个\
  \ `WordGridCell` 实例的 `cellLetter` 属性。\n\n最后，`WordOrientation` 类包含表示网格上单词方向的常量（例如，`HORIZ`、`DIAG_DOWN`\
  \ 等）。其他类使用这些常量来影响放置在单词网格上的单词的方向。\n\n现在你已经对单词搜索生成器应用程序的架构有了一个高层次的概述，让我们开始深入检查 UI\
  \ 代码。\n\n**创建框架和菜单结构**\n\n我们将处理的 UI 的第一部分是整体结构，包括菜单、工具栏和应用程序的主窗口。我喜欢称之为 *UI 外骨骼*，因为它为应用程序的整体\
  \ UI 提供了一个可见的结构。\n\n**单词搜索生成器 UI 的外骨骼**\n\n请花点时间通读清单 3-1 中所示的 `WordSearchMain.fx`\
  \ 脚本，该脚本是单词搜索生成器中的主（初始）程序，并为 UI 提供了外骨骼。之后，我们将详细检查这段代码的特定部分。\n\n*清单 3-1. WordSearchMain.fx\
