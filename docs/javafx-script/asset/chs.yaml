  \n•\n\n理解 JavaFX 类的结构，并思考如何标准化你所创建的类的结构。\n\n•\n\n使用属性初始化器为属性赋值，而不是让其采用默认值。\n\n•\n\
  \n在类声明中声明操作（包括其参数和返回类型），然后创建操作的主体，并用 JavaFX 代码填充它。\n\n•\n\n使用 Java 的 `System.out.println()`\
