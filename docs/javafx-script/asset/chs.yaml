  \ 与创建和使用 `RadioButton` 非常相似，后者将在第 5 章中讨论。\n\n\n\n你可能已经注意到，清单 3-2 中仍有几行不熟悉的代码。现在让我们来看看这些代码。\n\
  \n**从 JavaFX 调用 Java 方法**\n\nJavaFX 的优势之一在于你可以利用 Java 类的功能，考虑到 Java 库、第三方库等中存在的类数量之多，这意义重大。清单\
  \ 3-2 中包含了一个示例：当用户选择“退出”菜单项时，会调用名为 System 的 Java 类的 exit()方法：\n\n*firstPress: Creating\
  \ User Interfaces in JavaFX*\n\nMenuItem {\n\ntext: \"退出\"\n\nmnemonic: X\n\naction:\
  \ operation() {\n\nSystem.exit(0);\n\n}\n\n},\n\n要告知 JavaFX 应用程序关于名为 System 的 Java\
  \ 类，请使用我之前在导入 JavaFX 包和类时介绍过的 import 关键字。\n\n在这种情况下，你需要指明将要使用位于名为 java.lang 的 Java\
  \ 包中的 System 类：\n\nimport java.lang.System;\n\n正如你所料，这条 import 语句位于 WordSearchMain.fx\
  \ 文件的开头附近（参见清单 3-1）。我还想指出，我们之前讨论过的正是这种形式的 import 语句，即指定类的名称，而不是使用星号作为通配符来表示该包中的任何类。\n\
  \n注意 ➡ import 语句还允许你指定别名。以下语句将让你在程序中用 Sys 来引用 System 类：\n\nimport java.lang.System\
  \ as Sys;\n\n如果你恰好熟悉 Java，你会知道 exit()方法会关闭程序，这正是此处所需的行为。你还会认识到这是一个静态（类）方法，无需创建类的实例即可调用。\n\
  \n顺便提一下，清单 3-2 在以下几行代码中也使用了相同的技术：Frame {\n\ntitle: \"JavaFX 脚本中的单词搜索谜题生成器\"\n\n\
  width: 750\n\nheight: 450\n\nonClose: operation() {\n\nSystem.exit(0);\n\n}\n\n\
  **...大量代码已省略...**\n\n}\n\n*firstPress: Creating User Interfaces in JavaFX*\n\n在这种情况下，用户关闭了应用程序的主窗口，这会导致\
  \ Frame 的 onClose 事件发生。与之前描述的 action 事件类似，我们为 onClose 属性分配了一个操作，该操作将在 onClose 事件发生时被调用。\n\
  \n在后续章节中，我将进一步讨论如何在 JavaFX 中使用 Java 功能，包括这些语言中数据类型之间的关系，以及如何创建 Java 类的新实例。与此同时，我将向你展示几种创建\
  \ JavaFX 类新实例的方法，然后我会继续教你关于 JavaFX UI 组件的内容。\n\n**实例化模型、处理器和视图类**\n\n正如你在图 3-12\
  \ 中所见，单词搜索生成器应用程序由多个类组成。WordSearchMain.fx 中包含的与 UI 相关的声明式脚本需要直接访问其中四个类的实例。在清单 3-3\
  \ 中（包含 WordSearchMain.fx 文件的前几行），你将看到这些 JavaFX 类是如何被实例化的。\n\n*清单 3-3. 在 WordSearchMain.fx\
