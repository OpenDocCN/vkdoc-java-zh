  \ font: letterFont\n\n}\n\ninto textLetters;\n\n*首次按下：更多 UI 乐趣，包括 2D 绘图* 173\n\n\
  var rowColumnNumberFont = new Font(\"Sans Serif\", \"PLAIN\", 12); if (yPos == 0)\
  \ {\n\n// 绘制列号\n\ninsert Text {\n\nx: (xPos + 1) * CELL_WIDTH:Integer\n\ny: yPos\n\
  \ncontent: \"{xPos}\"\n\nfont: rowColumnNumberFont\n\n}\n\ninto gridLabels;\n\n\
  }\n\nif (xPos == 0) {\n\n// 绘制行号\n\ninsert Text {\n\nx: xPos\n\ny: (yPos + 1) *\
