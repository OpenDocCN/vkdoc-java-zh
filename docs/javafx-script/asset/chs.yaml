  界面容器的顶部、左侧、\n\nleft:Widget?\n\n底部和/或右侧的能力，\n\nbottom:Widget?\n\n任何可用空间将由位于\n\nright:Widget?\n\
  \n中心的界面组件（如果已\n\ncenter:Widget?\n\n分配给 center）占据。\n\nBox\n\n界面组件可以在界面\n\norientation:Orientation\
