  trans: "\n###### 清单 13-1 booksTemplate.xhtml 草案\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8' ?>\n 2   <!DOCTYPE html [<!ENTITY copy \"©\">]>\n 3   <html\
    \ xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4         xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n 5         xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n 6       <h:head>\n 7           <title>图书</title>\n\
     8           <h:outputStylesheet library=\"css\" name=\"books.css\" />\n 9       </h:head>\n\
    10       <h:body>\n11           <div id=\"wrapper\">\n12               <header>\n\
    13                   <h1>迈克尔的书单</h1>\n14               </header>\n15               <main>\n\
    16                   <ui:insert name=\"content\">此处为内容</ui:insert>\n17               </main>\n\
    18               <nav>\n19                   这是导航栏\n20               </nav>\n\
    21               <footer>\n22                   &copy;  迈克尔·穆勒\n23                   |\n\
    24                   <h:outputLink value=\"http://blog.mueller-bruehl.de\">\n\
    25                       迈克尔的博客\n26                   </h:outputLink>\n27                   |\n\
    28                   <h:link value=\"关于\" outcome=\"index.xhtml\"/>\n29               </footer>\n\
    30           </div>\n31       </h:body>\n32   </html>\n```\n\n`<ui:insert ...>`\
    \ 标签定义了一个名为 `content` 的占位符，由 `name` 属性指定。这是一个内容将显现的“孔洞”。在一个给定的模板中，可以定义多个插入标签。该标签中的文本\
    \ *此处为内容* 将被模板客户端提供的内容替换。\n\n###### 浏览模板\n\n1.  启动应用程序。\n\n2.  打开模板页面。在浏览器的地址（URL）栏中，输入\
    \ **http://localhost:8080/Books/booksTemplate.xhtml**。\n\n您应该会看到基本布局，其中主要内容部分显示为“此处为内容”。\n\
    \n现在我们需要重构 `index.xhtml`，将其转换为模板客户端。我们将使用 `<ui:composition ...>` 标签代替 `html` 标签。在此标签内，我们放置\
    \ `<ui:define name=\"content\">`。这里提供的名称与我们在模板中作为占位符提供的名称相同。无论我们想为模板内容显示什么，只需将适当的内容放在此标签中即可。\n\
    \n最后但同样重要的是，我们需要声明要使用的模板，如清单 13-2 所示。\n\n###### 清单 13-2 模板客户端\n\n```\n 1   <?xml\
    \ version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition\
    \ xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n 5         xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 6         template=\"\
    /booksTemplate.xhtml\">\n 7       <ui:define name=\"content\">\n 8           <h1>编辑分类</h1>\n\
     9           <h:form>\n10               <h:dataTable value=\"#{categoryEditor.categories}\"\
    \n11                            var=\"cat\">\n12                   <h:column>\n\
    13                       <h:commandLink\n14                           action=\"\
    #{categoryEditor.deleteCategory(cat)}\">\n15                           <h:graphicImage\
    \ alt=\"删除\"\n16                                           name=\"Delete.png\"\
    \n17                                           library=\"icon/small\"\n18                                           title=\"\
    删除\"/>\n19                       </h:commandLink>\n20                   </h:column>\n\
    21                   <h:column>\n22                       <h:inputText value=\"\
    #{cat.name}\"/>\n23                   </h:column>\n24               </h:dataTable>\n\
    25               <h:commandLink styleClass=\"button\"\n26                              value=\"\
    添加分类\"\n27                              action=\"#{categoryEditor.addCategory}\"\
    />\n28               <h:commandButton styleClass=\"button\"\n29                                value=\"\
    保存\"                                                                \n30                                action=\"\
    #{categoryEditor.save}\"/>\n31           </h:form>\n32       </ui:define>>\n33   </ui:composition>\n\
    ```\n\n在此示例中，命名空间被定义为 `<ui:composition ...>` 元素的属性。有时您会看到 JSF 模板客户端包含一个 `html`\
    \ 元素，并在其中声明命名空间。然后 `<ui:composition ...>` 定义在此页面的某处，例如在 `body` 内。`<ui:composition\
    \ ...>` 之外的所有内容对于客户端都将被忽略。清单 13-3 展示了这种方法。在我看来，它更简洁，没有这种额外的开销。\n\n###### 清单 13-3\
    \ 包含多余 html 标签的模板客户端\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE\
    \ html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4         xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    >\n\n 7       此处内容将被忽略\n\n 9     <ui:composition  template=\"/booksTemplate.xhtml\"\
    >\n10         <ui:define name=\"content\">\n12               此处放置内容\n13         </ui:define>>\n\
    14     </ui:composition>\n\n16       此处内容将被忽略\n\n18  </html>\n```\n\n正如我们将在本书后面看到的，一个模板可能是另一个模板的客户端。JSF\
    \ 允许您定义嵌套模板的级联。\n\n###### 注意\n\n从启动到模板化开发的 Books 完整源代码可从 [`webdevelopment-java.info`](http://webdevelopment-java.info)\
    \ 获取。\n\n## 总结\n\n通过 JSF 的模板机制，可以创建统一的整体外观和感觉。它由一个定义整体布局的模板构建而成。客户端通过替换或添加预定义位置的内容来使用此模板。一个模板可以被多个客户端使用，并且一个模板可以是另一个模板的客户端，从而支持级联结构。\n\
    \n© 迈克尔·穆勒 2018\n\n迈克尔·穆勒，Java EE 8 中的实用 JSF，`doi.org/10.1007/978-1-4842-3030-5_14`\n\
    \n# 14. 走向国际化\n\n迈克尔·穆勒^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\n托管在互联网上 Web 服务器中的应用程序，几乎可以从全球任何地方访问。即使您的应用程序并非面向所有人，您也可能需要面向不同国家、使用不同语言的用户。这意味着您需要为国际市场准备您的软件。\n\
    \n## 国际化和本地化\n\nBooks 将针对不同语言和格式进行准备（*国际化*），并针对英语（如澳大利亚、加拿大、美国和英国等国家）和德语（德国）语言进行实现。使图书支持不同语言并适应其他环境，比听起来要容易。\n\
    \nJava 通过让您简单地指定一个区域，为我们完成了大部分工作。我们只需提供关于该区域的信息，以我们选择的语言为所有 GUI 元素和消息提供文本。GUI\
    \ 元素和消息的文本将根据用户系统的语言设置应用所选语言。此外，我们可能还需要提供一个语言选择器。\n\n到目前为止，我们已经开发了分类编辑器的第一个版本。该编辑器带有一个极简的用户界面。只有少数几个元素需要翻译。但除了翻译页面之外，我们还需要翻译内容（分类）——想象一下应用程序以不同语言显示。因此，让我们首先介绍并本地化欢迎屏幕（一个非常简单的页面），然后再回到分类编辑器。\n"
- fmt: '# Internationalization and Localization


    *Internationalization* (often abbreviated `i18n`) is the process of making software
    potentially available for other languages and regions, whereas *localization*
    (`L10n`) is the adaption to a special language and region.


    Both involve more than simply translating GUI elements into a different language.
    Remember different date formats, different symbols (a German postbox looks very
    different from a U.S. mailbox), different wording within one language depending
    on the region (such as mailbox/postbox, localization/localization, cellular phone/mobile
    phone), and more.


    ## Welcome Page


    The welcome page (or landing page) simply informs the visitor about the intention
    of the application and contains some static text. With respect to international
    users, the text is available in different languages.


    On my website (`it-rezension.de`), I offer German and English as languages, because
    I read books in both languages. My reviews of German books are written in German.
    My reviews of English books are written in German and/or English, depending on
    the publishing media (such as print magazine or online). Because of this, offering
    these two languages only is enough for my site. But the Books application is designed
    to be presented in other languages as needed.


    On the welcome page, there is text only. We can focus internationalization on
    offering that text in different languages. There’s no need to adapt date or number
    formats or icons. We’ll look at such aspects later on when we work on the Alumni
    application.


    ### Message Bundle


    To achieve our goal, we’ll use what’s called a *message bundle*. This is nothing
    but a resource bundle made available for JSF. A *resource bundle* is a bunch of
    properties files that follow a special naming convention. Even if you’ve never
    developed an application for an international market, you may have used a properties
    file to configure your application. Each file is a kind of key-value storage.
    For internationalization and localization, we need such a file for each language.
    Each file contains the same keys but with values translated to the target locale.
    If the user’s locale is unknown, the application must provide a default. The convention
    is to use the default with a simple filename and to append a language code (ISO-639
    Language Code) plus optionally a region code (ISO-3166 Country Code plus a variant
    in rare cases). You’ll find these codes on different sites on the Internet, for
    example at Oracle, ISO-3166 Country Codes and ISO-639 Language Codes is available
    at [http://docs.oracle.com/cd/E13214_01/wli/docs92/xref/xqisocodes.html](http://docs.oracle.com/cd/E13214_01/wli/docs92/xref/xqisocodes.html).


    Table [14-1](#A435433_1_En_14_Chapter.xhtml#Tab1) shows an example.


    ###### Table 14-1 Language Codes


    | Filename | Usage |

    | --- | --- |

    | `messages.properties` | Default |

    | `messages_de.properties` | German |

    | `messages_en.properties` | English |

    | `messages_en_US.properties` | English, U.S. |

    | `messages_en_GB.properties` | English, Great Britain |


    In this example, `messages` is the filename. You may choose any other name you
    like. Language and region (country) codes are appended after an underscore.


    Now let’s create a resource bundle and talk about how to use it in our web application.


    Using NetBeans, choose New File ➤ Other ➤ Properties File and click Next. The
    New Properties File dialog appears, as shown in Figure [14-1](#A435433_1_En_14_Chapter.xhtml#Fig1).
    Provide the name `messages` and type in the folder name `src/main/resources/de/muellerbruehl/books`.
    You can replace `de/muellerbruehl/books` with a package name of your choice. Click
    Browse to browse to the existing `src/main/resources` first and then complete
    the name. Note that when you browse a Windows system, you’ll get `src\main\resources`
    because Windows uses a backslash as a folder delimiter. You can enter a normal
    slash or a backslash—both will be recognized by the dialog. Click Finish to create
    the properties file.


    ![A435433_1_En_14_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig1_HTML.jpg)


    ###### Figure 14-1 New Properties File dialog


    NetBeans creates a new file and opens it in its editor. If NetBeans has placed
    any content into this file, delete it, save the file, and close it in the editor.


    On the Projects tree, right-click the `messages.properties` file (Figure [14-2](#A435433_1_En_14_Chapter.xhtml#Fig2))
    and choose Add ➤ Locale.


    ![A435433_1_En_14_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig2_HTML.jpg)


    ###### Figure 14-2 Projects tree


    NetBeans displays the New Locale wizard, shown in Figure [14-3](#A435433_1_En_14_Chapter.xhtml#Fig3).


    ![A435433_1_En_14_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig3_HTML.jpg)


    ###### Figure 14-3 New Locale wizard


    As you can see, you can choose a language and a region (country and variant).
    For Books, enter `en` and click OK or press Enter. NetBeans creates the appropriate
    properties files for you (`messages.properties` and `messages_en.properties`).
    Add a second file for `de` (for German), creating a `messages_de.properties` file.
    If you know about the language codes, you don’t need the New Locale wizard; you
    can just create the files with respect to the correct names, which involves nothing
    more than appending the correct language code to the properties filename. You
    can also do this if your favorite IDE doesn’t offer such a wizard. To offer different
    versions of a language, you need to append the correct variant, such as `messages_en_US.properties`
    (U.S. English) or `messages_en_GB.properties` (British English).


    We want to offer two languages, but we’ve created three properties files in total.
    Of course, we could have used the default for German and the other for English,
    but I recommend using a specific file for each language and the default as a fallback.


    The text for our page’s headline is in the key `headWelcome`. You can edit the
    properties file, as in Figure [14-4](#A435433_1_En_14_Chapter.xhtml#Fig4), but
    you’d have to enter the key into every file to keep the files synchronized, which
    might be an annoying job. For easy editing, NetBeans offers a special properties
    editor, shown in Figure [14-4](#A435433_1_En_14_Chapter.xhtml#Fig4). Right-click
    any of the properties files and choose Open—don’t choose Edit because that will
    open a single file in the text editor. You can create a new key-value pair by
    choosing New Property, as shown in Figure [14-5](#A435433_1_En_14_Chapter.xhtml#Fig5).


    ![A435433_1_En_14_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig4_HTML.jpg)


    ###### Figure 14-4 Properties files editor


    ![A435433_1_En_14_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig5_HTML.jpg)'
