    \ Resources ➤ JavaMail Sessions ➤ New to create a session.\n\n![A435433_1_En_30_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_30_Fig2_HTML.jpg)\n\
    \n###### Figure 30-2 *JavaMail* *session in GlassFish/* *Payara*\n\nAlternatively,\
    \ you might create a glassfish-resources.xml file (or let NetBeans create it in\
    \ the proper place), which resides in the WEB-INF folder. See Listing [30-3](#A435433_1_En_30_Chapter.xhtml#PC4)."
  trans: "\n###### 清单 30-1 邮件发送器（为演示目的使用硬编码属性）\n\n```\n01   @Dependent\n02   public\
    \ class Mailer implements Serializable {\n\n04     protected static final Logger\
    \ LOGGER = Logger.getLogger(\"Mailer\");\n\n06     public boolean sendMail(String\
    \ to, String subject, String body) {\n07       List<Recipient> recipients = new\
    \ ArrayList<>();\n08       recipients.add(new Recipient(to, RecipientType.TO));\n\
    09       return sendMail(\"mailer@alumni-web.de\", recipients, subject, body);\n\
    10     }\n\n12     public boolean sendMail(String from, List<Recipient> recipients,\n\
    13             String subject, String body, String... files) {\n14       try {\n\
    15         Properties properties = obtainConfig();\n16         Session session\
    \ = Session.getDefaultInstance(properties);\n17         MimeMessage message =\
    \ composeMessage(session, from, recipients,\n18                 subject, body,\
    \ files);\n19         Transport.send(message, from, \"secret\");\n20         return\
    \ true;\n21       } catch (MessagingException ex) {\n22         LOGGER.log(Level.SEVERE,\
    \ \"Mailer failed: {0}\", ex.getMessage());\n23         return false;\n24       }\n\
    25     }\n\n27     private Properties obtainConfig() {\n28       Properties properties\
    \ = System.getProperties();\n29       properties.put(\"mail.transport.protocol.rfc822\"\
    , \"smtps\");\n30       properties.put(\"mail.smtps.host\", \"smtp.strato.de\"\
    );\n31      properties.put(\"mail.smtps.port\", 465);\n32       properties.put(\"\
    mail.smtps.auth\", true);\n33       return properties;                       \
    \                                   \n34     }\n\n36     private MimeMessage composeMessage(Session\
    \ session,\n37             String from,\n38             List<Recipient> recipients,\n\
    39             String subject,\n40             String body,\n41             String[]\
    \ files) throws MessagingException {\n42       MimeMessage message = new MimeMessage(session);\n\
    43       for (Recipient recipient : recipients) {\n44         message.addRecipient(recipient.getType(),\n\
    45                 new InternetAddress(recipient.getEmail()));\n46       }\n47       message.setSubject(subject);\n\
    48       message.setContent(getMultipartBody(body, files));\n49       message.setFrom(new\
    \ InternetAddress(from));\n50       return message;\n51     }\n\n53     private\
    \ Multipart getMultipartBody(String body, String[] files)\n54             throws\
    \ MessagingException {\n55       MimeBodyPart messageBodyPart = new MimeBodyPart();\n\
    56       messageBodyPart.setText(body);\n57       Multipart multipart = new MimeMultipart();\n\
    58       multipart.addBodyPart(messageBodyPart);\n59       for (String file :\
    \ files) {\n60         addAttachment(multipart, file);\n61       }\n62       return\
    \ multipart;\n63     }\n\n65     private static void addAttachment(Multipart multipart,\
    \ String filename)\n66          throws MessagingException {\n67        if (filename.isEmpty())\
    \ {\n68         return;\n69       }\n70       MimeBodyPart messageBodyPart = new\
    \ MimeBodyPart();\n71       DataSource source = new FileDataSource(filename);\n\
    72       messageBodyPart.setDataHandler(new DataHandler(source));\n73       File\
    \ file = new File(filename);\n74       messageBodyPart.setFileName(file.getName());\n\
    75       multipart.addBodyPart(messageBodyPart);\n76     }\n\n78   }\n```\n\n\
    JavaMail 是 Java 企业版（EE）的一部分。因此，无需直接引用 JavaMail jar。我们只需在 POM 中添加正确的 Java EE 依赖项即可。\n\
    \n如果没有这个依赖项，IDE 就无法添加所需的导入。NetBeans 为未满足的导入提供了 Maven 搜索功能。我们需要添加以下内容：\n\n```\n\
    import javax.mail.Message;\n```\n\n将光标放在该行的末尾，然后按 Alt+Enter。NetBeans 会弹出一个 Maven\
    \ 搜索对话框，如图 30-1 所示。\n\n![A435433_1_En_30_Fig1_HTML.jpg](img/A435433_1_En_30_Fig1_HTML.jpg)\n\
    \n###### 图 30-1 Maven 搜索对话框\n\n在“匹配工件”字段中选择 javax:javaee-api。NetBeans 会将依赖项添加到\
    \ POM 中。如果使用其他 IDE，你可以手动添加依赖项。请参见清单 30-2。\n\n###### 清单 30-2 JavaMail（以及 Java EE\
    \ API 的其他部分）的依赖项\n\n```\n1   <dependency>\n2     <groupId>javax</groupId>\n3     <artifactId>javaee-api</artifactId>\n\
    4     <version>8.0</version>\n5     <type>jar</type>\n6   </dependency>\n```\n\
    \n一旦包含了该依赖项，NetBeans 就可以修复缺失的导入（Ctrl+Shift+I）。\n\n让我们检查一下代码：第 1 行显示了 `@Dependent`\
    \ 注解。这声明了一个符合 CDI 规范的 bean，其生命周期取决于它被注入到的那个 bean。\n\n为了发送激活邮件，Alumni 使用了 `sendMail`\
    \ 方法，该方法从第 6 行开始。它只是向一个收件人发送一封由主题和正文组成的电子邮件。\n\n我们可能需要附加文件或添加其他收件人。`sendMail`\
    \ 委托给了该方法的另一个重载版本，该版本接受更多参数（清单 30-1 中的第 12 行）。用一个携带所有信息的邮件信息对象来替换这么多参数可能会更好。由于\
    \ Mailer 的最终版本需要的参数更少，因此保持现状可能也可以。\n\n要创建一条消息，我们需要一个会话。这样的会话是通过将邮件服务器特定的属性传递给其工厂方法来创建的（第\
    \ 16 行）。这些属性由 `obtainConfig` 方法（第 27 行）收集到一个映射中。在此方法中，一些硬编码的属性被收集到一个映射中。在最终版本中，我们将选择使用\
    \ JavaMail Session 来检索配置。\n\nAlumni 使用安全协议版本，因此我们将协议设置为 SMTPS。接下来，我们根据邮件服务器设置一些\
    \ SMTPS 参数。属性 `mail.smpts.XXX` 对应于所选的协议。你可以在 [`javaee.github.io/javaee-spec/javadocs/javax/mail/package-summary.html`](https://javaee.github.io/javaee-spec/javadocs/javax/mail/package-summary.html)\
    \ 阅读 API 的完整描述。\n\n一旦 `sendMail` 获取到会话，它就会构建消息（第 17 和 18 行）并发送邮件（第 19 行）。这里我们提供了一个秘密密码。如果不需要密码，我们可以通过一个属性设置发件人，并仅将消息传递给\
    \ `Transport.send` 方法。\n\n## 邮件会话\n\n如前所述，硬编码配置在这里不是一个好选择。你可能需要区分开发环境和生产环境，或者在不同的生产系统上需要不同的配置。Alumni\
    \ 使用在 GlassFish/Payara 上定义的 JavaMail 会话，如图 30-2 所示。假设你在本地运行服务器，管理页面可通过地址 https://localhost:4848\
    \ 访问。如果你使用 NetBeans，也可以通过服务树视图中服务器的上下文菜单打开管理控制台。在管理控制台中，选择“资源” ➤ “JavaMail 会话”\
    \ ➤ “新建”来创建一个会话。\n\n![A435433_1_En_30_Fig2_HTML.jpg](img/A435433_1_En_30_Fig2_HTML.jpg)\n\
    \n###### 图 30-2 GlassFish/Payara 中的 *JavaMail* *会话*\n\n或者，你可以创建一个 `glassfish-resources.xml`\
    \ 文件（或让 NetBeans 在正确的位置创建它），该文件位于 `WEB-INF` 文件夹中。请参见清单 30-3。\n"
- fmt: "### Listing 30-3 `glassfish-resources.xml`\n\n```xml\n01   <!DOCTYPE resources\
    \ PUBLIC\n02   \"-//GlassFish.org//DTD GlassFish Application Server 3.1 Resource\
    \ Definitions//EN\"\n03   \"http://glassfish.org/dtds/glassfish-resources_1_5.dtd\"\
    >\n04   <resources>\n05     <mail-resource debug=\"true\"\n06                \
    \    enabled=\"true\"\n07                    from=\"mailer@alumni-web.de\"\n08\
    \                    host=\"smtp.strato.de\"\n09                   jndi-name=\"\
    alumniMail\"\n10                   object-type=\"user\"\n11                  \
    \ store-protocol=\"imap\"\n12                   store-protocol-class=\"com.sun.mail.imap.IMAPStore\"\
    \n13                   transport-protocol=\"smtps\"\n14                   transport-protocol-class=\"\
    mail.smtp.SMTPTransport\"\n15                   user=\"mailer@alumni-web.de\"\
    >\n16      <description>alumniMail</description>\n17      <property name=\"mail.smtps.port\"\
    \ value=\"465\"/>\n18      <property name=\"mail.smtps.auth\" value=\"true\"/>\n\
    19      <property name=\"mail.smtps.password\" value=\"secret\"/>\n20    </mail-resource>\n\
    21  </resources>\n```\n\nThis session can be injected by a traditional `@Resource`\
    \ annotation, as shown in Listing [30-4](#A435433_1_En_30_Chapter.xhtml#PC5).\
    \ Since JSF 2.3, it’s been available via `@Inject`. There’s no need to collect\
    \ the config properties because they’re defined outside the code, as shown in\
    \ Listing [30-5](#A435433_1_En_30_Chapter.xhtml#PC7). So you can change the config\
    \ without changing the code just by changing the parameters using the admin console.\n\
    \nTake a look at the interesting parts of the final `Mailer` class, which is reduced\
    \ in size as we remove the `from` parameter of `sendMail`. See Listing [30-4](#A435433_1_En_30_Chapter.xhtml#PC5).\n\
    \n### Listing 30-4 `Mailer` Using an Injected Session (Excerpt)\n\n```java\n01\
    \     @Resource(lookup = \"alumniMail\")\n02     private Session _session;\n\n\
    04     public boolean sendMail(List<Recipient> recipients,\n05             String\
    \ subject, String body, String... files) {\n06       try {\n07          MimeMessage\
    \ message = composeMessage(recipients,\n08                  subject, body, files);\n\
    09          String user = _session.getProperty(\"mail.user\");\n10          String\
    \ password = _session.getProperty(\"mail.smpt.password\");\n11         Transport.send(message,\
    \ user, password);\n12         return true;\n13       } catch (MessagingException\
    \ ex) {\n14         LOGGER.log(Level.SEVERE, \"Mailer failed: {0}\", ex.getMessage());\n\
    15         return false;\n16       }\n17     }\n\n19     private MimeMessage composeMessage(List<Recipient>\
    \ recipients,\n20             String subject,                                \
    \                                                                \n21        \
    \     String body,\n22             String[] files) throws MessagingException {\n\
    23       MimeMessage message = new MimeMessage(_session);\n24       for (Recipient\
    \ recipient : recipients) {\n25         message.addRecipient(recipient.getType(),\n\
    26                 new InternetAddress(recipient.getEmail()));\n27       }\n28\
    \       message.setSubject(subject);\n29       message.setContent(getMultipartBody(body,\
    \ files));\n30       String from = _session.getProperty(\"mail.from\");\n31  \
    \     message.setFrom(new InternetAddress(from));\n32       return message;\n\
    33     }\n```\n\n## Send Activation\n\nWhen the user clicks the Register button,\
    \ Alumni creates a new account with a status of `new`. I'll explain this later\
    \ in relation to login. Login will be possible once the account is activated (that\
    \ is, status = `active`).\n\nIn order to send an activation mail to the user,\
    \ we need an email template to which we’ll add information such as username and\
    \ an activation link. This template will be created by the admin using a simple\
    \ JSF-based web form and will be stored in a table of the database. It consists\
    \ of an `id`, a `name` (as a kind of human readable identifier), a `subject`,\
    \ and a `body`. Remember to store a template version for every language you want\
    \ to support.\n\nWhen I showed the `Mailer`, I concentrated on the `sendMail`\
    \ functionality. In Alumni, the `Mailer` delegates to an instance of the class\
    \ `MailService` (not shown here), which is used to access the mail templates.\
    \ Within such a template, we use names within curly braces as placeholders that\
    \ are replaced before sending. The body of the activation mail might look like\
    \ this:\n\n```\nHello {firstName},                \nIn order to complete your\
    \ registration, please click the following link {link}. \n```\n\nSending the activation\
    \ mail becomes straightforward: retrieve a mail template (line 4 of Listing [30-5](#A435433_1_En_30_Chapter.xhtml#PC7)),\
    \ build subject and body by replacing the placeholders (lines 5–9), and send the\
    \ mail (line 10). The most complicated part is to build the URL that replaces\
    \ one of the placeholders (lines 13—30).\n\n### Listing 30-5 Register User (Excerpt)\n\
    \n```java\n01     @Inject private Mailer _mailer;\n\n03     private void sendMail(String\
    \ accessKey) {\n04       MailTemplate template = _mailer.findTemplateByName(TemplateName.ActivationMail);\n\
    05       String subject = template.getSubject();\n06       String body = template\n\
    07               .getBody()\n08               .replace(\"{firstName}\", _account.getFirstName())\n\
    09               .replace(\"{link}\", getUrl(accessKey));\n10       _mailer.sendMail(_account.getEmail(),\
    \ subject, body);\n11     }\n\n13     private String getUrl(String key) {\n14\
    \       HttpServletRequest request = obtainServletRequest();\n15       try {\n\
    16          URL url = new URL(request.getScheme(),\n17                  request.getServerName(),\n\
    18                  request.getServerPort(),\n19                  request.getContextPath()\
    \ + Page.Activate.url() + \"?key=\" + key);\n20          return url.toString();\n\
    21       } catch (MalformedURLException ex) {\n22          Logger.getLogger(Register.class.getName()).log(Level.SEVERE,\
    \ null, ex);\n23          return \"\";\n24       }\n25   }\n\n27     private HttpServletRequest\
    \ obtainServletRequest() {\n28       FacesContext context = FacesContext.getCurrentInstance();\n\
    29       return (HttpServletRequest) context.getExternalContext().getRequest();\n\
    30     }\n```\n\nUsually, we navigate to pages in the application. Such a path\
    \ will be automatically appended to the context path. But for the activation mail,\
    \ we need to send the user a complete URL (URI), including the domain name (or\
    \ for development, the server's name) and the context path. This URL is built\
    \ in lines 16–20. If your server is operating on a standard HTTP port (port 80,\
    \ or 430 for HTTPS), you can omit the port number.\n\nOnce a user receives this\
    \ activation mail, they follow the link.\n\n## Summary\n\nWith JavaMail, you have\
    \ an API for handling emails that you can use either in Java SE or Java EE. It’s\
    \ included in Java EE, so there’s no need to add an extra reference to the POM\
    \ within a Java EE project.\n\nJavaMail requires some properties to configure\
    \ the transport, including mail server, protocol, and more. This chapter showed\
    \ such properties with a hardcoded solution. Even better, these properties are\
    \ set outside the application. A Java EE-compliant server offers the ability to\
    \ define a mail session via its console or a `.properties` file. That’s how Alumni\
    \ uses the mail functionality to send activation mails or other info to the user.\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_31](#A435433_1_En_31_Chapter.xhtml)\n\
    \n# 31. Scheduled Tasks\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nIf a user doesn’t activate their account, we’ll get an *orphaned*\
    \ registration (or account). We have to clean up the database periodically, and\
    \ what works better for periodically jobs than a timer? This is where scheduled\
    \ tasks come into play. Because timers can be very sensitive to errors within\
    \ the same thread, we’ll do this scheduling asynchronously."
