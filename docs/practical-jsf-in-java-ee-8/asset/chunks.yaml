- fmt: "###### Figure 32-2 Add web resource\n\nWe want to restrict access to members\
    \ of a given role, so check Enable Authentication Constraint and edit Role Name.\
    \ Choose both `member` and `admin`, the roles we defined earlier. This establishes\
    \ a requirement for authorization, whereas Enable User Data Constraint forces\
    \ a requirement for the transport layer.\n\nNow create a second security constraint\
    \ that grants access to the admin pages for members of the admin role only.\n\n\
    No NetBeans available? Or maybe you prefer to edit an XML file directly? Let’s\
    \ take a look at that. Using NetBeans, choose the Source tab. Your `web.xml` should\
    \ look similar to Listing [32-1](#A435433_1_En_32_Chapter.xhtml#PC1).\n\n######\
    \ Listing 32-1 `security-constraint` Section in `web.xml`\n\n```\n 1   <?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n 2   <web-app version=\"3.1\" xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n 3       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n 4       xsi:schemaLocation=\"\
    http://xmlns.jcp.org/xml/ns/javaee\n 5       http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd\"\
    >\n\n 8       [... omitted entries...]\n\n10       <security-constraint>\n11           <display-name>member\
    \ access</display-name>\n12           <web-resource-collection>\n13               <web-resource-name>member</web-resource-name>\n\
    14               <description>member access</description>\n15               <url-pattern>/member/*</url-pattern>\n\
    16           </web-resource-collection>\n17           <auth-constraint>\n18               <description>Member\
    \ pages are available to all roles</description\\>\n\n20               <role-name>member</role-name>\n\
    21               <role-name>admin</role-name>\n22           </auth-constraint>\n\
    23       </security-constraint>\n24       <security-constraint>\n25           <display-name>admin\
    \ access</display-name>\n26           <web-resource-collection>\n27               <web-resource-name>admin</web-resource-name>\n\
    28               <description>admin access</description>\n29               <url-pattern>/admin/*</url-pattern>\n\
    30           </web-resource-collection>\n31           <auth-constraint>\n32               <description>Admin\
    \ pages are restricted to people of the admin role only</description>\n\n34               <role-name>admin</role-name>\n\
    35           </auth-constraint>\n36       </security-constraint>\n37       <login-config>\n\
    38           <auth-method>BASIC</auth-method>\n39           <realm-name>file</realm-name>\n\
    40       </login-config>\n41       <security-role>\n42           <description/>\n\
    43           <role-name>member</role-name>\n44           </security-role>\n45       <security-role>\n\
    46           <description/>                                                  \
    \        \n47           <role-name>admin</role-name>\n48       </security-role>\n\
    49   </web-app>\n```\n\nLocate the tags `security-constraint`, `login-config`,\
    \ `security-role`, and their children. This is the result of the configuration\
    \ made earlier. Thus, the intent of these tags should be clear. If you know these\
    \ tags, it can be faster to edit the XML file directly. To apply more than these\
    \ constraints, add a sibling. Within one constraint, you can add further web resource\
    \ collections. And you may restrict it to one or more dedicated HTTP methods,\
    \ as shown in Listing [32-2](#A435433_1_En_32_Chapter.xhtml#PC2).\n\n###### Listing\
    \ 32-2 Dedicated HTTP Method Example\n\n```\n1   <web-resource-collection>\n2       <web-resource-name>All\
    \ web pages</web-resource-name>\n3       <description/>\n4       <url-pattern>*.xhtml</url-pattern>\n\
    5       <http-method>PUT</http-method>\n6       <http-method>POST</http-method>\n\
    7   </web-resource-collection>\n```\n\n`<login-config>` is where you need to apply\
    \ changes if you choose a different authentication, such as Form, or a different\
    \ realm. Changing the method usually doesn’t affect the security constraint(s)\
    \ or role(s), so I won’t explain this again when we move to a different realm\
    \ or authentication method.\n\nTo test the security behavior, we create three\
    \ simple web pages, each within the folders `admin`, `member`, and `public`. Always\
    \ give it the name `test.xhtml`. For this simple test, we don’t need any JSF-specific\
    \ tag. Just place some text in the page to identify the folder. Listing [32-3](#A435433_1_En_32_Chapter.xhtml#PC3)\
    \ shows my test page within the `admin` folder.\n\n###### Listing 32-3 Simple\
    \ Test Page\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n 3       \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n 4   <html xmlns:=\"http://www.w3.org/1999/xhtml\">\n 5       <head>\n 6           <title>Admin\
    \ Test Page</title>\n 7       </head>\n 8       <body>\n 9           <h1>Admin\
    \ Page</h1>\n10       </body>\n11   </html>\n```\n\nNow what happens if you start\
    \ the application and navigate to these pages? First try the public page `http://localhost:8080/Alumni/public/test.xhtml`\
    \ or its TLS counterpart `https://localhost:8181/Alumni/public/test.xhtml`. If\
    \ you haven’t installed your own validated certificate, the latter uses a self-signed\
    \ certificate of the GlassFish server, so your browser will moan about an untrusted\
    \ certificate. Because you know it’s your server, you can accept it. The connection\
    \ will be fully encrypted.\n\nYour browser will display the page as expected.\
    \ But if you try to navigate to the test page in the `member` oder `admin` folder,\
    \ this behavior changes: your browser will display a small login dialog to query\
    \ username and password, as shown in Figure [32-3](#A435433_1_En_32_Chapter.xhtml#Fig3).\n\
    \n![A435433_1_En_32_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig3_HTML.jpg)\n\
    \n###### Figure 32-3 Login dialog for basic authentication\n\nEnter some credentials,\
    \ press Enter (or click OK), and this dialog will be re-displayed until (depending\
    \ on your browser) you enter a valid username/password combination. But we have\
    \ no user defined, so the only choice is to cancel. You’ll get a `401 – Unauthorized`\
    \ page displayed by the browser. The application is secured now.\n\nWant to let\
    \ in some user? Okay, let’s define them.\n\nOpen the GlassFish admin console.\
    \ Ensure GlassFish is running (it will be started with your app). Using NetBeans,\
    \ open the Services view (Ctrl+5), choose Servers, and open the context menu of\
    \ your GlassFish. Choose View Domain Admin Console. Alternatively, go to `http://localhost:4848/`\
    \ in your browser.\n\nIn the Navigation pane, choose Configurations ➤ server-config\
    \ ➤ Security ➤ Realms ➤ file, as shown in Figure [32-4](#A435433_1_En_32_Chapter.xhtml#Fig4).\n\
    \n![A435433_1_En_32_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig4_HTML.jpg)\n\
    \n###### Figure 32-4 GlassFish Configurations tree\n\nGlassFish displays the Edit\
    \ Realm page. Click Manage Users ➤ New. Now enter some credentials as shown in\
    \ Figure [32-5](#A435433_1_En_32_Chapter.xhtml#Fig5). Confirm by clicking OK.\n\
    \n![A435433_1_En_32_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig5_HTML.jpg)"
