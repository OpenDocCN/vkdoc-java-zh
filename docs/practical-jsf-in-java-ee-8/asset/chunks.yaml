- fmt: '# Security Basics


    To grant a user access to a secured application, you first have to authenticate
    the user. The user must tell the system who they are. This might be done by providing
    a username (“it’s me”) and a password (“you can verify that it’s really me, by
    checking some secret information that only we share”). Alternative authentication
    techniques include the use of identity cards, certificates, fingerprints, and
    so on. In this book, we focus on usernames and passwords.


    Once the system has authenticated the user, it authorizes the user, deciding whether
    to let them access the whole application or only parts of it, depending on security
    status. This is realized by assigning one or more different *roles* to the user.
    Depending on the role, access to the application is controlled.


    Let’s recap:


    1. System offers a login (such as a form) to query username and password.

    2. User provides this information.

    3. System verifies this information. If there is no match, login is aborted.

    4. System determines roles and grants access depending on these roles.


    Using container-provided security, step 1 might be realized in (at least) three
    ways:


    - The user’s web browser displays a simple input dialog. The appearance and client-side
    data handling are determined by the browser. There’s no further action required
    by the developer. This mode is called *basic authentication*.

    - The developer provides an HTML form for the two input fields and buttons to
    submit or reset. These fields may be integrated in a web page with the look and
    feel of the application. The names of the input fields and the actions have to
    strictly follow a convention. This mode is called *form-based authentication*.

    - The developer uses a pre-arranged JSF form. On the server side, the application
    calls the container’s login method. This is called *programmatic authentication*.


    The username and password have to be sent from client to server. It doesn’t make
    any difference whether the password is sent as plain (clear) text or as hashed
    digest (which might be configured in a server property): if someone captures this
    data, they might try to use it to gain access. Thus, a common recommendation is
    to use a secure transport protocol such as TSL/SSL. Users may identify such a
    secure protocol by the `https://` protocol part of a URL—the *s* stands for security.


    For step 3 of the authentication/authorization process, the server must check
    the input (username/password) against information stored somewhere. This is realized
    by so-called security *realms*. Usually, one or more realms are predefined at
    your server. GlassFish, for example, provides a couple of realms. We’ll discuss
    two of them: `fileRealm` (user info stored in a file) and `jdbcRealm` (user info
    stored in a database). Last but not least, we’ll talk about a self-programmed
    (custom) realm.


    Even though these security realms are sometimes implemented in a similar way,
    they’re still vendor specific. Terminology conventions may differ, too. Some call
    it *realm*, others say *domain*, *zone*, and so on. The same applies to other
    terminology in this context, such as *group*, *role*, *principal*, *right*, and
    so on.


    To overcome this confusion, a standard has been created: Java Authentication Service
    Provider Interface for Containers (JASPIC, JSR 196). Although the definition of
    JASPIC started more than a decade ago, proprietary realms are still prevalent.
    With Java EE 6, this started to change, and it seemed JASPIC became a kind of
    first-class citizen. Anyway Java EE 7 didn’t introduce as much as needed, and
    there’s an ongoing standardization process (JSR 375) that builds on top of JASPIC
    and JACC (Java Authorization Service Provider Contract for Containers). This Java
    Security API is partially scheduled for Java EE 8 and will be completed with Java
    EE 9. We’ll use its reference implementation, Soteria, later on for simpler access
    than with plain JASPIC.


    We’ll start with the HTTP authentication and its realms. The Java Authentication
    and Authorization Service (JAAS) was integrated into Java 2 SDK 1.4. (To read
    more about this, check out [https://docs.oracle.com/javase/8/docs/technotes/guides/security/jaas/JAASRefGuide.html](https://docs.oracle.com/javase/8/docs/technotes/guides/security/jaas/JAASRefGuide.html).)
    Keep in mind vendor-specific implementations when I write about realms. I’ll focus
    on GlassFish and NetBeans, and you may have to transform some info into your environment.


    For example, NetBeans offers some special editors to configure container-based
    security. I’ll discuss this as well as the resulting configuration, which usually
    is pure XML.


    ## Basic Authentication and fileRealm


    To secure Alumni, we need to add a security constraint to `web.xml`. Open this
    file in your editor. Using NetBeans, choose on your project tree Web Pages, WEB-INF,
    `web.xml`. NetBeans opens this file by default in the source view. To get an overview,
    switch to the Security tab. Doing so alters the view and allows you to easily
    read or define security settings. See Figure [32-1](#A435433_1_En_32_Chapter.xhtml#Fig1).


    ![A435433_1_En_32_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig1_HTML.jpg)


    ###### Figure 32-1 Security tab for web.xml.


    At the top, note the different Login Configurations. As mentioned, I’ll cover
    Basic and Form in this tutorial. From the users’ point of view, Digest is almost
    the same as Basic: both present a small input dialog in the browser where the
    user can enter username and password. Under the hood, a *digest* (hash value)
    is derived from the password. Thus, no clear text is sent to the server. But this
    isn’t really a security feature. If the digest were captured by some criminal
    it would have almost the same effect as if the password were captured. So, you
    must encrypt the connection itself using SSL (Secure Socket Layers) or its modern
    successor TLS (Transport Layer Security). Using either will result in an HTTPS
    connection.


    The Form login configuration will display the specified form to query the credentials.
    This allows you to customize the process.


    The Client Certificate login configuration is based on SSL and a server certificate
    in conjunction with a client certificate.


    To proceed with the basic authentication, choose Basic and enter **file** in the
    Realm Name field. This info isn’t checked by NetBeans, so be sure to enter an
    existing realm name. Refer to your application server to figure out which values
    are valid. Because I’m using GlassFish for this tutorial, *file* is a valid realm
    name. A file realm (a.k.a. domain, zone, and so on) is available for most app
    servers.


    Next, go to Security Roles and add two roles. Call them **member** and **admin**.
    You can define as many roles as you like. This might be useful for applications
    where you need to distinguish between different access levels like admin, normal
    user, manager, service, and so on. For the full version of Alumni, we need a couple
    of roles too, but for this first demonstration, there’s no need to define more
    roles yet.


    The next step to configure `web.xml` is to add security constraints. Click Add
    Security Constraint to add one. The display name is optional and for your convenience.
    We’ll use *member access* here. The display name is very useful, if you have to
    deal with lots of different constraints.


    Now add a web resource collection (see Figure [32-2](#A435433_1_En_32_Chapter.xhtml#Fig2)).
    Give it a name and provide a URL pattern. `/member/*` applies to all pages of
    the member folder. Click OK to return to the Security tab.


    ![A435433_1_En_32_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig2_HTML.jpg)'
