  trans: "\n###### 清单 35-1 从后台 Bean 获取库\n\n```\n01     <h:outputStylesheet library=\"\
    #{sessionTools.theme}\" name=\"css/alumni.css\"/>\n02     <h:outputScript library=\"\
    #{sessionTools.theme}\" name=\"script/alumni.js\"/>\n```\n\n该后台 Bean 用于在会话持续期间保存用户特定信息，因此它是会话作用域的。请参见清单\
    \ 35-2。\n\n###### 清单 35-2 SessionTools\n\n```\n01   @Named\n02   @SessionScoped\n\
    03   public class SessionTools implements Serializable {\n\n05     private String\
    \ _theme = \"standard\";\n\n07     public String getTheme() {\n08       return\
    \ _theme;\n09     }\n\n11     public void setTheme(String theme) {\n12       _theme\
    \ = theme;\n13     }\n\n15     ...\n\n17   }\n```\n\n当用户登录时，我们需要从相应的用户配置中读取主题，并在后台\
    \ Bean 中设置该主题。仅此而已。\n\n## 立即更改外观\n\n我们可能希望让用户能够立即更改外观，而不是在配置对话框中询问用户。作为初步方法，我们将在屏幕上呈现两个按钮，分别代表两种不同的主题。如果用户点击某个按钮，我们希望外观能立即改变。\n\
    \n解决方案也非常简单。我们只需要设置主题，然后重新加载页面即可。如果 commandLink 或 commandButton 的操作返回空字符串或空值（null\
    \ 或 void），那么 JSF 会重新加载同一页面。为了执行此任务，我们将主题的设置器用作链接的操作。请参见清单 35-3。\n\n###### 清单 35-3\
    \ 切换主题的按钮\n\n```\n01    <h:commandLink styleClass=\"button\"\n02                           immediate=\"\
    true\"\n03                           value=\"standard\"\n04                           action=\"\
    #{sessionTools.setTheme('standard')}\"/>\n05    <h:commandLink styleClass=\"button\"\
    \n06                           immediate=\"true\"\n07                           value=\"\
    muellerbruehl\"\n08                           action=\"#{sessionTools.setTheme('muellerbruehl')}\"\
    />\n```\n\n## 从资源中读取\n\n随着主题数量的增加，按钮数量也会增加，这会使页面变得丑陋。通过菜单可以实现更优雅的解决方案，用户可以从多个条目中选择一个。而且，如果我们添加一个主题，系统应该能自动识别它。为此，我们需要检查资源。为简单起见，我们假设资源目录中每个包含\
    \ CSS 文件的文件夹都是一个资源库。我们将忽略该文件夹下可能存在的版本。\n\n方法 getThemes 返回一个字符串列表，其中包含我们找到的所有库文件夹，如清单\
    \ 35-4 所示。\n\n###### 清单 35-4 从资源中检索主题\n\n```\n01     public List<String> getThemes()\
    \ throws IOException {\n02       String resourcePath = obtainResourcePath();\n\
    03       List<String> themes = obtainThemes(resourcePath);\n04       return themes;\n\
    05     }\n\n07     private String obtainResourcePath() {\n08       ServletContext\
    \ context = (ServletContext) FacesContext\n09               .getCurrentInstance()\n\
    10               .getExternalContext()\n11               .getContext();\n12       return\
    \ context.getRealPath(\"/resources\");\n13     }\n\n15     private List<String>\
    \ obtainThemes(String resourcePath){\n16       List<String> themes = new ArrayList<>();\n\
    17       for (File file : new File(resourcePath).listFiles()) {\n18         addFilenameIfContainsCss(file,\
    \ themes);\n19       }\n20       return themes;\n21     }\n\n23     private void\
    \ addFilenameIfContainsCss(File file, List<String> themes) {\n24       if (!file.isDirectory())\
    \ {\n25         return;\n26       }\n27       try (Stream<Path> paths = Files.walk(Paths.get(file.getAbsolutePath())))\
    \ {\n28         boolean conatinsCss = paths\n29                 .filter(Files::isRegularFile)\n\
    30                 .anyMatch(f -> f.toString().toLowerCase().endsWith(\".css\"\
    ));\n31         if (conatinsCss) {\n32           themes.add(file.getName());\n\
    33         }\n34       } catch (IOException ex) {\n35         LOGGER.log(Level.SEVERE,\
    \ null, ex);\n36       }\n37     } \n```\n\n图 35-1 展示了项目树的一个片段。你会为每个主题找到一个文件 alumni.css（muellerbruehl\
    \ 和 standard 也是主题，但此处树已折叠）。\n\n![A435433_1_En_35_Fig1_HTML.jpg](img/A435433_1_En_35_Fig1_HTML.jpg)\n\
    \n###### 图 35-1 不同主题的资源文件\n\n由于我们不知道应用程序部署后的具体位置，因此需要找出正确的路径。资源位于 \\resources\
    \ 路径下。虽然从应用程序的角度看，它看起来像绝对路径，但实际上它是一个相对路径。我们需要找出它的父路径。\n\n清单 35-4 中值得关注的部分是 obtainResourcePath\
    \ 方法（第 7–13 行）。在这里，我们将检索 ServletContext。我们可以用它来确定一个真实路径。在许多情况下，都需要搜索资源。\n\n在另一个项目中，我需要创建报告。我没有从头开始创建报告文件，而是添加了在运行时完成的模板文件。我将这些文件部署在\
    \ resources 文件夹中，并使用此处讨论的相同逻辑来检索文件的位置。\n\n清单 35-4 的其余部分是简单的 Java 代码，用于在此路径中搜索\
    \ CSS 文件。如果你不熟悉流，请允许我推荐我的书 *Java Lambdas and Parallel Streams*（Apress，2016）作为很好的信息来源。\n\
    \n一旦我们确定了主题，就需要在 selectOneMenu 中将其呈现给用户，如清单 35-5 所示。\n\n###### 清单 35-5 选择主题（不完整）\n\
    \n```\n01  <h:form id=\"theme\">\n02    <h:selectOneMenu value=\"#{sessionTools.theme}\"\
    >\n03      <f:selectItems value=\"#{sessionTools.themes}\"/>\n04      <f:ajax/>\n\
    05    </h:selectOneMenu>\n06  </h:form>\n```\n\n上述清单使用了我们之前创建的 getter/setter 对。如果用户选择了一个主题，它将在后台\
    \ Bean 中立即更新。在下次导航期间，JSF 将应用新主题。\n\n但是，我们如何立即应用主题呢？好吧，我们可以添加信息来渲染所有内容：<f:ajax\
    \ render=\"@all\"/>。\n\n现在，当用户选择不同的主题时，布局似乎会改变。但这并不是预期的布局。只有重新加载页面后，才会显示预期的布局。似乎\
    \ @all 并没有真正加载我们需要的所有内容。\n\n如果我们应用一个监听器方法并添加程序化导航，如清单 35-6 所示，会怎么样？\n\n######\
    \ 清单 35-6 程序化导航\n\n```\n01  public void themeChangeListener(AjaxBehaviorEvent\
    \ event) {\n02    FacesContext facesContext = FacesContext.getCurrentInstance();\n\
    03    NavigationHandler navigationHandler = facesContext\n04            .getApplication()\n\
    05            .getNavigationHandler();\n06    navigationHandler.handleNavigation(facesContext,\
    \ null, \"\");\n07  }\n```\n\n在第 6 行，第三个参数表示目标页面。我们将其留空以重新加载当前页面。\n\n不要尝试这样做。你可能会在请求时使用这样的片段进行导航，但不能在部分请求期间使用。*部分*请求仅查询一些信息来更新当前页面。\n\
    \nselectOneMenu 并非旨在触发任何导航。一些额外的库——例如，PrimeFaces（[www.primefaces.org](http://www.primefaces.org)）——包含针对此用例的扩展。但是，这个问题可能有一个简单的解决方案：当用户选择了新主题时，我们需要通过点击\
    \ commandLink 来触发页面导航。我们使用一个不可见的链接和一些 JavaScript 魔法来执行此任务，如清单 35-7 所示。\n"
