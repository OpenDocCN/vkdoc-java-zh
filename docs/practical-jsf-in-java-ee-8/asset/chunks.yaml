    # 4. Expression Language


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    Building the TinyCalculator, we used some special expressions, beginning within
    the delimiters #{ and }. These expressions, always using the form #{expr}, are
    defined by the Expression Language (EL). JSR 341: Expression Language 3.0 is part
    of Java EE 8 (read about it at [https://jcp.org/en/jsr/detail?id=341](https://jcp.org/en/jsr/detail%3Fid=341)
    ). The same release had been part of Java EE 7.


    ## Unified Expression Language


    Originally the Expression Language was defined for JSP using the form of ${expr}
    (with a leading $). Then JSF introduced a slightly different syntax. The main
    intention was to support the higher level JSF lifecycle. This JSF EL used a leading
    '' for an expression, as we did in TinyCalculator.


    Beginning with Java EE 5, JSP EL and JSF EL became unified. Hence, you may sometimes
    read about the Unified Expression Language. Although the expressions are unified
    now, both format conventions (the leading $ and leading #) are supported, even
    if the leading character still indicates slightly different behavior if using
    JSP as VDL. ${expr} (with expr being short for expression) is evaluated at page
    compile time (*immediate expression*), whereas #{expr} is evaluated at runtime
    (*deferred expression*). Remember, a JSP is compiled to a servlet. And JSP is
    still supported as VDL for JSF. Using the modern Facelets VDL, the page definition
    is always interpreted at runtime. There is no compile time. So, you may replace
    all expressions within the TinyCalulator example to use the ${expr} form and it
    won’t make a difference. All the examples in this book use the #{expr} form.


    Also in EL, you may read about *value expressions* and *method expressions*. What’s
    the difference? Let’s recap some expressions from the TinyCalculator: #{tinyCalculator.param1}
    is a value expression, whereas #{tinyCalculator.add} is a method expression. In
    these simple examples, we can’t see any syntactic difference. To identify which
    is which, you need to know the context. Java conventions may help you: param1
    is a subject, and add is a verb. Java methods shall start with a verb and may
    continue with something else. In case of properties, the verbs are get and set,
    followed by a name (the subject). And, as shortly explained for the TinyCalculator
    example, #{tinyCalculator.param1} is a kind of two-way binding, omitting get and
    set.


    ###### Note


    A bit more generally, we may say #{myBean.myProperty} is a value expression, whereas
    #{myBean.myMethod} is a method expression.


    The part before the first dot (or as used in other examples, the first opening
    square bracket) is called the *base*, whereas the part after is called a *property*—or
    in case of a method expression, a *method*. In this example, the base is a bean.
    As explained later, the base also might be a variable or an implicit object.


    In the common case of referring to a bean , the name of the bean (if not defined
    to be something else, the bean’s classname—you may define a different name within
    the @Named annotation, such as @Named("myBaseName")) is used for the base, but
    with a lowercase first letter.


    If needed, the property is broken into smaller parts by using the common dot syntax.
    invoice.customer.street refers to the street of the customer object within an
    invoice. Within pure Java, it might look like Listing [4-1](#A435433_1_En_4_Chapter.xhtml#PC1).'
