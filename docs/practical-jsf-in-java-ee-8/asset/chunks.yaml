  raw: '###### Figure 32-5 GlassFish User Editor (for file realm)


    For the test, you can enter two different users, one for group member and the
    other for group admin. As the Realm name suggests, your user information will
    be stored in a file, which is located in your domain/config folder and called
    keyfile. You can open it with a text editor . The content should be similar to
    the following:


    ```

    1     guest;{SSHA256}c6/mlRhM7djv01PY+eA1tF6plcQ/3IROXeCwO06ZTLtkF+dqmg2Erw==;\

    2   student

    ```


    Each line is built up by three columns: Username, password, and group(s). For
    technical reasons the group is shown in line 2\. For protection, the password
    is stored as an encrypted hash value. See Chapter [28](#A435433_1_En_28_Chapter.xhtml)
    if you need a refresher on secure passwords. With this in mind, the file realm
    might be used for applications only where weak security is sufficient.


    If you start the application, you still can’t log in. Do you remember web.xml
    dealing with roles and GlassFish storing groups? Although we used the same names
    (member and admin), these are two slightly different objects. What’s missing is
    a mapping from group (or principal) to role. That’s a task specific to GlassFish.


    For this mapping, you need a glassfish-web.xml (or sun-web.xml) file. You’ll have
    to create one if it doesn’t exist yet. Using NetBeans, choose New ➤ Other ➤ GlassFish
    ➤ GlassFish Descriptor to create this file. Or create it manually in the WEB-INF
    folder.


    In the Security tab , enter information as shown in Figure [32-6](#A435433_1_En_32_Chapter.xhtml#Fig6).


    ![A435433_1_En_32_Fig6_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig6_HTML.jpg)


    ###### Figure 32-6 NetBeans security editor


    The information you entered in the Security Role Mappings box simply adds the
    lines in Listing [32-4](#A435433_1_En_32_Chapter.xhtml#PC5) to the file. If you
    prefer, you can edit them directly in XML mode.


    ###### Listing 32-4 Map One Group to Each Role


    ```

    1   <security-role-mapping>

    2     <role-name>admin</role-name>

    3     <group-name>admin</group-name>

    4   </security-role-mapping>

    5   <security-role-mapping>

    6     <role-name>member</role-name>

    7     <group-name>member</group-name>

    8   </security-role-mapping>

    ```


    You can map a couple of groups to one role, as shown in Listing [32-5](#A435433_1_En_32_Chapter.xhtml#PC6).


    ###### Listing 32-5 Map Multiple Groups to a Role


    ```

    1   <security-role-mapping>

    2     <role-name>member</role-name>

    3     <group-name>admin</group-name>

    4     <group-name>member</group-name>

    5   </security-role-mapping>

    ```


    This configuration maps both groups member and admin to the role member.


    You can also map a user (principal) directly to a role: {lang="XML", title="map
    groups and members to a role"}:


    ```

    1   <security-role-mapping>

    2     <role-name>admin</role-name>

    3     <group-name>admin</group-name>

    4     <principal-name>muellermi</principal-name>

    5   </security-role-mapping>

    ```


    If there’s no need for this flexible mapping, you can switch it off. In GlassFish,
    choose Configurations ➤ server-config ➤ Security check ➤ Default Principal To
    Role Mapping. Now a group is directly mapped to a role (group name = role name)—no
    need for a dedicated mapping. But beware: this affects only applications deployed
    after changing this setting! Usually users and roles will fit the requirements.
    There’s no need for variant groups. So, I recommend using this setting.


    Now if you start the application, login to Alumni is possible.


    ## Form Login


    Now that we’ve addressed basic login with simple file realm, let’s move on and
    change the authentication method. Remember, this book is about web development
    with JavaServer Faces. All I’ve showed for container-based security so far is
    technology that’s entirely independent from JSF. The same applies to simple form
    login. But it’s possible to embed this into some JSF techniques. And, further
    on, programmatic login is done using JSF.


    For the form-based login, we have to change our web.xml slightly. Besides changing
    the authentication method, we have to declare two pages, one for the login and
    one failure page (which might be the same) .


    So, replace Listing [32-6](#A435433_1_En_32_Chapter.xhtml#PC8) with Listing [32-7](#A435433_1_En_32_Chapter.xhtml#PC9).


    ###### Listing 32-6 Config for Basic Authentication


    ```

    1   <login-config>

    2       <auth-method>BASIC</auth-method>

    3       <realm-name>file</realm-name>

    4   </login-config>

    ```


    ###### Listing 32-7 Config for Form Authentication


    ```

    1   <login-config>

    2       <auth-method>FORM</auth-method>

    3       <realm-name>file</realm-name>

    4       <form-login-config>

    5           <form-login-page>/public/login.xhtml</form-login-page>

    6           <form-error-page>/public/loginError.xhtml</form-error-page>

    7       </form-login-config>

    8   </login-config>

    ```


    Listing [32-8](#A435433_1_En_32_Chapter.xhtml#PC10) shows a short login page.


    ###### Listing 32-8 Simple Login Page


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0

     3       Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.d\

     4   td">

     5   <html xmlns:="http://www.w3.org/1999/xhtml"

     6         xmlns:h="http://xmlns.jcp.org/jsf/html">

     7       <h:head>

     8           <title>Login</title>

     9       </h:head>

    10       <h:body>

    11           <form method="POST" action="j_security_check">

    12               Username: <input type="text" name="j_username" />

    13               Password: <input type="password" name="j_password" />

    14               <br />

    15               <input type="submit" value="Login" />

    16           </form>

    17       </h:body>

    18   </html>

    ```


    Because this book is mainly about JSF, I used the NetBeans commands New ➤ JSF
    Page to create a stub. But the heart of this page is pure HTML—the form with the
    method POST and the action j_security_check. This name is fixed, as are the names
    for the user (j_username) and password (j_password) fields. If you like, you can
    insert this form into a full-fledged JSF page. Or you can embed this login form
    into a JSF component to make it more reusable. Remember to use this standard HTML
    form to define the action; its JSF counterpart doesn’t know about defining a special
    action.


    Listing [32-9](#A435433_1_En_32_Chapter.xhtml#PC11) shows an example error page,
    but you can use any page. Here I used some simple JSF without any backing bean.
    It simply informs the user about the authentication failure and offers a navigation
    button back to the login page.'
  trans: '

    ###### 图 32-5 GlassFish 用户编辑器（用于文件域）


    为了进行测试，你可以输入两个不同的用户，一个作为组成员，另一个作为管理员组。正如域名称所示，你的用户信息将存储在一个文件中，该文件位于你的 domain/config
    文件夹中，名为 keyfile。你可以用文本编辑器打开它。其内容应类似于以下内容：


    ```

    1     guest;{SSHA256}c6/mlRhM7djv01PY+eA1tF6plcQ/3IROXeCwO06ZTLtkF+dqmg2Erw==;\

    2   student

    ```


    每一行由三列组成：用户名、密码和组。出于技术原因，组显示在第二行。为了安全起见，密码以加密哈希值的形式存储。如果你需要复习安全密码的相关知识，请参阅第 28
    章。考虑到这一点，文件域可能仅适用于安全性要求不高的应用程序。


    如果你启动应用程序，仍然无法登录。你还记得 web.xml 处理角色以及 GlassFish 存储组的方式吗？尽管我们使用了相同的名称（member 和 admin），但它们是两个略有不同的对象。缺少的是从组（或主体）到角色的映射。这是
    GlassFish 特有的任务。


    对于这种映射，你需要一个 glassfish-web.xml（或 sun-web.xml）文件。如果该文件不存在，你必须创建一个。使用 NetBeans，选择
    New ➤ Other ➤ GlassFish ➤ GlassFish Descriptor 来创建此文件。或者，在 WEB-INF 文件夹中手动创建。


    在 Security 选项卡中，输入如图 32-6 所示的信息。


    ![A435433_1_En_32_Fig6_HTML.jpg](img/A435433_1_En_32_Fig6_HTML.jpg)


    ###### 图 32-6 NetBeans 安全编辑器


    你在 Security Role Mappings 框中输入的信息，只是将清单 32-4 中的行添加到文件中。如果你愿意，可以直接在 XML 模式下编辑它们。


    ###### 清单 32-4 将每个组映射到一个角色


    ```

    1   <security-role-mapping>

    2     <role-name>admin</role-name>

    3     <group-name>admin</group-name>

    4   </security-role-mapping>

    5   <security-role-mapping>

    6     <role-name>member</role-name>

    7     <group-name>member</group-name>

    8   </security-role-mapping>

    ```


    你可以将多个组映射到一个角色，如清单 32-5 所示。


    ###### 清单 32-5 将多个组映射到一个角色


    ```

    1   <security-role-mapping>

    2     <role-name>member</role-name>

    3     <group-name>admin</group-name>

    4     <group-name>member</group-name>

    5   </security-role-mapping>

    ```


    此配置将组 member 和 admin 都映射到角色 member。


