    The publisher makes no warranty, express or implied, with respect to the material
    contained herein.


    Distributed to the book trade worldwide by Springer Science+Business Media New
    York, 233 Spring Street, 6th Floor, New York, NY 10013\. Phone 1-800-SPRINGER,
    fax (201) 348-4505, e-mail orders-ny@springer-sbm.com, or visit www.springeronline.com.
    Apress Media, LLC is a California LLC and the sole member (owner) is Springer
    Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a
    Delaware corporation.


    *To my wife Claudia and my kids:*


    *Thank you for your patience during night-writing and other long sessions.*


    *I love you.*


    # Preface


    Developing web applications with Java and JavaServer Faces (JSF) had been a great
    pleasure (and success) to me for a couple of years when I realized first wanted
    to write a book about JSF in late 2010\. I got in touch with some German publishers
    with the goal of writing around 200–250 pages about this subject, nothing more.
    “No thanks, too special” was one answer. The other: “Great. Add some more pages,
    another thousand, and write about the whole Java Enterprise Edition. Keep JSF
    smaller than 200 pages.” Frustrating answers.


    So, I started to blog about JSF in early 2011\. And I became a member of the JSF
    2.2 (JSR 344) Expert Group. Unlike most of the other volunteers, I wasn’t a JSF
    implementer, but an expert JSF user. I became a member of the JSF 2.3 (JSR 372)
    Expert Group too. I’m still an expert JSF user, but I started to code a bit within
    the JSF sources. If I’m accepted as an expert group member for JSF’s next version,
    whatever it may be called after the transition to the Eclipse Foundation, I want
    to contribute code.


    My tutorial on web development with JSF is still the most popular part of my blog
    ( [blog.mueller-bruehl.de](https://blog.mueller-bruehl.de) ), and I never gave
    up my intention to write a book about this subject. Over time, I switched from
    blogging in German to writing about development in mostly English. And that German
    publisher would be happy to learn that I now write about related Java EE stuff
    also.


    With the articles of my blog as a solid foundation, I started to write my book,
    *Web Development with Java and JSF* , which I first published myself in 2014 using
    Leanpub ( [www.leanpub.com/jsf](http://www.leanpub.com/jsf) ). It became a kind
    of living book. The first version only covered the fundamentals. Every reader
    who purchased it was able to download later updates. Thus, the book grew up.


    In 2016 Apress first asked me to publish the book as is. I declined, because I
    wanted to add more stuff. When they asked me again in 2017, the book had reached
    such a stage that I agreed. Of course, there is still more to write about, but
    for every book you need to make a final decision on content.


    Today, you hold in your hands an enhanced edition of my former book. It follows
    the same approach, combining theoretical background with practical development.
    The title *Practical JSF in Java EE 8* is a clue that it’s not only about JSF —
    you can’t use this UI technology in isolation. Rather, it’s embedded in a full
    stack of technologies we know as the Java Enterprise Edition (Java EE). Java EE
    8 was released on September 21, 2017, and Oracle has begun its donation of Java
    EE to the Eclipse Foundation. Even if future versions will be called Jakarta EE,
    the latest version still is Java EE 8 with JSF 2.3\. Because this book is about
    practical development, it concentrates on applications, not on the latest features.
    Although all applications in this book operate with Java EE 8, most of the apps
    might be realized with Java EE 7, which is still state-of-the-art in most enterprise
    environments. Only those functions that rely on newer Java EE features need the
    appropriate version — the last application described in this book, Alumni, takes
    advantage of such new features.


    In a sense, this book teaches you to develop Java EE applications with JSF as
    user interface. It’s a book for Java enthusiasts. Knowledge about web technologies
    is helpful, but not required. For developers who aren’t familiar with HTML, CSS,
    and other stuff, I’ve added some introductory chapters in the appendixes.


    Enjoy!


    > —Michael Müller'
