    书籍不仅仅是一个已审阅书籍的列表。您还可以使用它来创建和显示评论。除了这些*内部*评论外，大多数评论都发布在其他地方，例如印刷媒体和/或在线媒体。本章的目标是创建一个评论列表，其中包含指向内部和*外部*评论的链接。


    ## 内部评论


    指向内部评论的链接将从评论实体创建。这样的实体包含以下属性：


    *   Id


    *   BookId


    *   Date


    *   Language


    *   Text


    *   Book


    最后一个属性并未存储在相应的 SQL 表中。数据库中存储的与书籍的唯一引用是 BookId。但是，将 Book 作为附加属性使用，将使我们能够显示书籍本身的一些信息，而无需编写额外的数据库调用。用
    SQL 术语来说，我们执行了一种类似于 select ...from Review join Book.... 的操作。我们只需要定义一个关系，如清单 18-1
    所示。JPA 将执行 SQL 相关的工作。清单 18-1 展示了 Review 类的一个片段。


