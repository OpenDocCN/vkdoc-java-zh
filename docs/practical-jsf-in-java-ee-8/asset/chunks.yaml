    # 22. 重温 JSF 生命周期


    Michael Müller¹


    (1)德国北莱茵-威斯特法伦州布吕尔


    让我们回顾一下 JSF 的生命周期。它包含六个阶段，从恢复视图阶段开始。或者，对于新页面，则需要创建视图。图 22-1 应该能唤起你对 JSF 生命周期的记忆。


    ![A435433_1_En_22_Fig1_HTML.jpg](img/A435433_1_En_22_Fig1_HTML.jpg)


    ###### 图 22-1 JSF 生命周期


    作为视图的主要部分，组件树必须在阶段 1 中（重新）创建。这棵树是 UI 组件的逻辑表示。HTML 组件将在渲染阶段（阶段 6）从组件树中派生出来。但 UI
    组件和 HTML 组件之间可能并非一一对应的关系。


    除此之外，JSF 标签可以被解释为*标签处理器*或*UI 组件*。标签处理器在创建组件树时被处理，但它本身不会包含在树中。另一方面，UI 组件*会*成为组件树的一部分。并且在渲染阶段，一个组件可能被用来创建多个
    HTML 元素。


    你可以将标签处理器视为构建树的处理指令，而 UI 组件则是创建输出的处理指令。下一章将使用重复结构的示例来讨论此类问题。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_23`


    # 23. 重复结构


    Michael Müller¹


    (1)德国北莱茵-威斯特法伦州布吕尔


    到目前为止，我们已经使用了三种不同的标签来处理重复结构：


    *   c:forEach


    *   ui:repeat


    *   h:dataTable


    在本章中，我们将讨论它们之间的差异和覆盖范围。


    前两个元素用于重复开始和结束标签之间的所有内容。作为开发者，你需要自行选择 HTML 中的合适结构。如果没有特殊结构，你可以简单地将字符串拼接成一个段落。或者，你可以将其嵌套在表格标签内，并重复行来渲染一个表格。或者，你也可以使用
    HTML 的 `<ul>` 或 `<ol>` 元素及其嵌套项（`<li>`）来创建一个列表。无论你选择哪种方式，你都有完全的控制权。


    顾名思义，第三个元素 `h:dataTable` 会在 HTML 表格的预定义结构内重复其内容。这提供了较少的选项，但创建表格的方式更简单。


    ## 标签处理器 vs. 组件


    `forEach` 是一个标签处理器，而另外两个元素是组件。请记住，标签处理器在组件树的编译阶段生效。当组件树构建时，JSF 会为循环的每次迭代添加所包含的组件。


    考虑一下 `forEach` 标签处理器：它仅仅是对其子元素进行重复处理的指令，如清单 23-1 所示。


    ###### 清单 23-1 c:forEach 示例，Facelets 源码


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </c:forEach>

    ```


    假设好友列表包含三位好友：那么会显示三个名字。如果你检查渲染后的 HTML 页面（例如，在 Firefox 中，你可以按 Ctrl+U 显示 HTML 源码），你会看到三个包含名字的
    div，正如你可能预期的那样，如清单 23-2 所示。


    ###### 清单 23-2 c:forEach 示例，渲染后的 HTML


    ```

    1   <div>Sally

    2   </div>

    3   <div>Bob

    4   </div>

    5   <div>John

    6   </div>

    ```


    在清单 23-3 中，你可以看到类似的逻辑，只是使用了 `repeat` 而不是 `forEach`。


    ###### 清单 23-3 ui:repeat 示例


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </ui:repeat>

    ```


    如果你运行这个示例（作为完整页面的一部分），你会得到相同的输出，无论是视觉上还是 HTML 代码上。那么区别在哪里呢？


    嗯，一个可观察到的区别是组件树。图 23-1 展示了两种结构的组件树。由于使用了 `forEach`（标签处理器），三个 `outputText` 会被插入到组件树中。标签处理器本身不会被插入。另一方面，`repeat`（一个组件）本身被插入到组件树中，并且只嵌套了一个
    `outputText`。这就像源页面中定义的两个组件，没有重复。


    重复操作直到渲染输出阶段被调用时才发生。如果我们想显示三位好友，`forEach` 的主体将被重复三次，并插入属于三个不同 div 的三个名字。结果，两种结构的
    HTML 源码将是相同的。


    如果你在循环中使用标签处理器，那么循环会在构建组件树时进行迭代。如果你使用组件，它在组件树中只会出现一次。迭代发生在解释树（渲染页面）的过程中。


    ![A435433_1_En_23_Fig1_HTML.jpg](img/A435433_1_En_23_Fig1_HTML.jpg)


    ###### 图 23-1 组件树


    除了组件树之外，在这个简短的示例中没有其他可观察到的区别。但很容易想象，不同的时机和不同的组件树可能会导致截然不同的行为，这取决于应用程序的复杂性。


    让我们检查一个稍微修改过的 `forEach` 循环示例，如清单 23-4 所示。


    ###### 清单 23-4 带条件的 c:forEach 示例


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </c:forEach>

    ```


    唯一的区别是增加了一个对非空名字的测试。因为所有好友都有名字，所以输出仍然相同。


    接下来，在清单 23-5 中，我们将以相同的方式修改 `repeat`。


    ###### 清单 23-5 带条件的 ui:repeat 示例


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </ui:repeat>

    ```


    如果你运行前面的示例，将不会显示任何名字。


    ###### 标签处理器 vs. 组件谜题


    运行前面的示例并思考发生了什么。在继续阅读之前，尝试自己弄清楚。你如何修改显示条件才能使其正确工作？


    因为标签处理器是在（组件树的）编译时被解释的，所以所有信息在那时也必须可用。在编译时，组件只是被插入到树中。它在渲染阶段被处理。


    尽管这是一个简化的视图，但足以描述发生了什么：`forEach` 和 `if` 都是标签处理器。在编译树时，执行循环并检查条件。到目前为止，一切正常。但 `repeat`
    是一个组件，这意味着循环直到渲染阶段才会执行。在编译时，没有执行循环，没有变量 `friend` 是已知的，因此，没有测试结果为真。


    一种可能的解决方案是使用组件 `panelGroup`。结合任何样式类使用 `layout="block"`，当且仅当 `rendered` 条件为真时，它会渲染一个
    div。在组件内部，条件与循环执行的阶段相同。如果你省略了 `layout` 或 `styleClass`，那么 JSF 将不会插入 div，你的浏览器会将所有名字显示在一行上。参见清单
    23-6。

    '
- fmt: "### Listing 23-6: `ui:repeat` Example Using `rendered`\n\n```\n1   <ui:repeat\
    \ value=\"#{controller.friends}\" var=\"friend\">\n2     <h:panelGroup rendered=\"\
    #{friend.name.length() > 0}\"\n3                   layout=\"block\"  styleClass=\"\
    dummy\">\n4       <h:outputText value=\"#{friend.name}\"/>\n5     </h:panelGroup>\n\
    6   </ui:repeat>\n```\n\nUsing a predefined JSF tag (`panelGroup`) requires some\
    \ useless effort. An HTML-friendly approach seems much clearer, as you can see\
    \ in Listing 23-7.\n\n### Listing 23-7: `ui:repeat` Example Using an HTML-Friendly\
    \ Approach\n\n```\n1   <ui:repeat value=\"#{controller.friends}\" var=\"friend\"\
    >\n2     <div jsf:rendered=\"#{friend.name.length() > 0}\">\n3       <h:outputText\
    \ value=\"#{friend.name}\"/>\n4     </div>\n5   </ui:repeat>\n```\n\n## Performance\
    \ Issues\n\nTake a look at the source code of `loopDemo` in Listing 23-8 and recap\
    \ your knowledge of the `forEach` loop. Within the method `getNames()` we’ll print\
    \ a short message. What do you think: how many times will a single call to `loopDemo`\
    \ invoke that method? Not even once, once, or three times?\n\n### Listing 23-8:\
    \ Loop Puzzler\n\n```\n 1   private static void loopDemo(){\n 2     for (String\
    \ name : getNames()){\n 3       System.out.println(\"Name is \" + name);\n 4 \
    \    }\n 5   }\n\n 7   private static List<String> getNames() {\n 8     System.out.println(\"\
    withing  getNames\");\n 9     List<String> names = new  ArrayList<>();\n10   \
    \  names.add(\"Bob\");\n11     names.add(\"Anne\");\n12     names.add(\"Eve\"\
    );\n13     return names;\n14   }\n```\n\nThat shouldn’t have been really that\
    \ hard: the list is built exactly once.\n\nYou might expect something similar\
    \ when retrieving the values for the loop variable. To verify the behavior of\
    \ these different tags, let’s perform some tests.\n\nWe’ll create three simple\
    \ classes: a (non-persistent) `Friend` entity, a named bean `controller` to handle\
    \ the JSF part, and a data provider that mimics the relatively slow access to\
    \ persistent data (for example, a database).\n\n### Listing 23-9: `Friend`\n\n\
    ```\n 1   public class Friend {\n 2       private final String _name;\n 3    \
    \   private final List<Book> _books = new ArrayList<>();\n\n 5       public Friend(\
    \ String name){\n 6           _name = name;\n 7       }\n\n 9       public String\
    \ getName() {\n10           return _name;\n11       }\n\n13       public List<Book>\
    \ getBooks() {\n14           return _books;\n15       }\n\n17   }\n```\n\nA `Friend`\
    \ has a name and holds books. To keep everything as simple as possible, we grant\
    \ direct access to the book list by returning the complete list. This simple approach\
    \ lets us add a book directly to the list. In a real application, you may hide\
    \ the list and implement an `addBook()` method. Although a *book* contains other\
    \ info than its title, we’ll use a very simple `Book` class for this demonstration.\
    \ Create a new class `Book` with just a field plus getter and setter for `Title`.\
    \ Let NetBeans create the `hashCode` and `equals` methods.\n\nNext, we create\
    \ a named bean, which is simply request scoped. All it does is offer the friend\
    \ list to our page. To do that, the data has to be obtained from some data provider.\
    \ In a real app, this might be a JPA service. See Listing 23-10.\n\n### Listing\
    \ 23-10: `Controller`\n\n```\n 1   @Named\n 2   @RequestScoped\n 3   public class\
    \ Controller {\n\n 5     private int _counter;\n\n 7     public int getCounter()\
    \ {\n 8       return _counter;\n 9     }\n\n11     public List<Friend> getFriends()\
    \ {\n12       _counter++;\n13       return DataProvider.instance.getFriends();\n\
    14     }\n15   }\n```\n\nBesides the getter for the friends, this controller contains\
    \ a field to count the accesses to the list. And it provides a getter to access\
    \ this counter.\n\nNext, you see the simple data provider, as shown in Listing\
    \ 23-11. It creates a fixed list of five friends and assigns a random number of\
    \ books to each. When somebody tries to access the friend list, we call the `retrieveDatafromDB()`\
    \ method. Because this should mimic a longer-running method, the thread sleeps\
    \ for 100 ms. In a real Java EE app, we don’t use `sleep()` because the server\
    \ will control the threads for us. But for this little test, it’s quite okay.\n\
    \n### Listing 23-11: `DataProvider`\n\n```\n 1   public class DataProvider {\n\
    \n 3     private final List<Friend> _friends = new ArrayList<>();\n\n 5     public\
    \ static DataProvider instance = new DataProvider();\n\n 7     private DataProvider()\
    \ {\n 8       createData();\n 9     }\n\n11     /**\n12      * retrieves a list\
    \ of friends\n13      * @return friends    \n14      */\n15     public List<Friend>\
    \ getFriends() {\n16       retrieveDatafromDB();\n17       return _friends;\n\
    18     }\n\n20     private void retrieveDatafromDB() {\n21       // here might\
    \ be an access to a DB\n22       // simulate it by a sleep (yea, shouldn't use\
    \ sleep in an EE environment)\n23       try {\n24         Thread.sleep(100); \
    \ // slow db access\n25       } catch (InterruptedException ex) {\n26        \
    \ // ignore\n27       }\n28     }\n29     private void createData() {\n30    \
    \   _friends.clear();\n31       String[] names = {\"Sally\", \"Bob\", \"John\"\
    , \"Mary\", \"Jim\"};\n32       for (int i = 0; i < 5; i++){\n33         addFriend(names[i]);\n\
    34       }\n35     }\n\n37     private void addFriend(String name) {         \
    \                                                                            \
    \ \n38       Friend friend = new Friend(name);\n39       Random random = new Random();\n\
    40       int count = random.nextInt(5);\n41       for (int i = 0; i < count; i++)\
    \ {\n42         String title = \"Book.\" + name.substring(0, 1) + i;\n43     \
    \    Book book = new Book(title);\n44         friend.getBooks().add(book);\n45\
    \       }\n46       _friends.add(friend);\n47     }\n48   }\n```\n\nNow we need\
    \ a page to display the friend list. We’ll create this page in three different\
    \ flavors to examine the different repetitive structures. The intention is to\
    \ display a list of friends, and for each friend we’ll display a table with its\
    \ books. See Listing 23-12.\n\n### Listing 23-12: Display Friends by `repeat`\
    \ (`repeat.xhtml`)\n\n```\n 1   <?xml  version='1.0'  encoding='UTF-8'  ?>\n 2\
    \   <!DOCTYPE html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4  \
    \       xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    \n 6         xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 7         xmlns:c=\"\
    http://xmlns.jcp.org/jsp/jstl/core\">\n 8     <h:head>\n 9       <title>LoopCompare</title>\n\
    10     </h:head>\n\n12     <h:body>\n13       <h1>Test loop ui:repeat</h1>\n\n\
    15       AccessCount:  #{controller.counter}                                 \
    \                                                     \n\n17       <ui:repeat\
    \ value=\"#{controller.friends}\" var=\"friend\">\n18         <div>\n19      \
    \     #{friend.name} (Access no #{controller.counter})\n20            <h:dataTable\
    \ value=\"#{friend.books}\" var=\"book\">\n21              <h:column>\n22    \
    \            - #{book.title} (Access no #{controller.counter})\n23           \
    \   </h:column>\n24            </h:dataTable>\n25         </div>\n26       </ui:repeat>\n\
    \n28       AccessCount:  #{controller.counter}\n\n30       <div>\n31         <h:button\
    \ value=\"forEach\" outcome=\"forEach\"/>\n32         <h:button value=\"repeat\"\
    \ outcome=\"repeat\"/>\n33         <h:button value=\"table\" outcome=\"table\"\
    />\n34       </div>\n35     </h:body>\n36   </html>\n```\n\nIn line 15 we simply\
    \ display the counter before invoking the loop, and in line 28 after that. Lines\
    \ 17–26 show the loop, constructed by the `repeat` component. This is the part\
    \ we’ll adopt in each file. Lines 31–33 create three buttons to switch between\
    \ the three test pages.\n\nFor the other two pages, only the part that differs\
    \ is shown in Listings 23-13 and 23-14."
