  trans: "\n###### 清单 24-1 Alumni 主 POM 文件（节选）\n\n```\n01 <?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n02 <project xmlns:=\"http://maven.apache.org/POM/4.0.0\"\n03          xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n04          xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n05          http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n\n07   <modelVersion>4.0.0</modelVersion>\n\n09   <properties>\n10     <java.version>1.8</java.version>\n\
    11     <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n12  </properties>\n\
    \n14   <groupId>de.mueller-bruehl</groupId>\n15   <artifactId>Alumni</artifactId>\n\
    16   <version>2017.0.0-SNAPSHOT</version>\n17   <packaging>pom</packaging>\n\n\
    19   <modules>\n20     <module>AlumniGui</module>\n21     <module>AlumniBusiness</module>\n\
    \n22     <module>AlumniData</module>\n23     <module>AlumniAccount</module>\n\
    24   </modules>\n\n26   <build>\n27     <plugins>\n28       <plugin>\n29         <groupId>org.apache.maven.plugins</groupId>\n\
    30         <artifactId>maven-compiler-plugin</artifactId>\n31         <version>3.7.0</version>\n\
    32         <configuration>\n33           <source>${java.version}</source>\n34           <target>${java.version}</target>\n\
    35         </configuration>\n36       </plugin>\n37       <plugin>\n38         <groupId>org.apache.maven.plugins</groupId>\
    \                                                                            \
    \                              \n39         <artifactId>maven-war-plugin</artifactId>\n\
    40         <version>3.1.0</version>\n41       </plugin>\n42     </plugins>\n43   </build>\n\
    \n45   <dependencyManagement>\n46     <dependencies>\n47       <dependency>\n\
    48         <groupId>javax</groupId>\n49         <artifactId>javaee-api</artifactId>\n\
    50         <version>8.0</version>\n51         <scope>provided</scope>\n52       </dependency>\n\
    \n54      ... 其他依赖项在此处 ...\n\n56     </dependencies>\n57   </dependencyManagement>\n\
    \n59 </project>\n```\n\n从第 19 行开始，我们定义了应用程序的模块。我们将创建三个模块来组成 Alumni 应用程序：\n\n*\
    \   AlumniGui（GUI 层）\n\n*   AlumniBusiness（业务层）\n\n*   AlumniData（数据库访问层）\n\n\
    第四个模块 AlumniAccount 将是一个由 Alumni 使用的独立服务（详见第 33 章）。在依赖管理中，我们为模块预定义了依赖项。这里我们引用了\
    \ Java EE 8 API（第 47-52 行）。除了这个父 POM，我们还需要为每个模块定义一个 POM。清单 24-2 展示了 AlumniGui\
    \ 的 POM。（其他 POM 非常相似——推导出它们应该没有问题。我将在解释特定方面时稍后说明一些相关细节。）\n\n###### 清单 24-2 模块\
    \ AlumniGui 的 POM（节选）\n\n```\n01 <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    02 <project xmlns:=\"http://maven.apache.org/POM/4.0.0\"\n03         xmlns:xsi=\"\
    http://www.w3.org/2001/XMLSchema-instance\"\n04         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n05          http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n06   <modelVersion>4.0.0</modelVersion>\n\n08   <name>AlumniGui</name>\n\n\
    10   <parent>\n11     <groupId>de.mueller-bruehl</groupId>\n12     <artifactId>Alumni</artifactId>\n\
    13    <version>2017.0.0-SNAPSHOT</version>\n14     <relativePath>../pom.xml</relativePath>\n\
    15   </parent>\n\n17   <artifactId>AlumniGui</artifactId>\n18   <packaging>war</packaging>\n\
    \n20   <dependencies>\n21     <dependency>\n22       <groupId>javax</groupId>\n\
    23       <artifactId>javaee-api</artifactId>\n24       <scope>provided</scope>\n\
    25     </dependency>\n\n27     <dependency>\n28       <groupId>${project.groupId}</groupId>\n\
    29       <artifactId>AlumniBusiness</artifactId>\n30       <version>${project.version}</version>\n\
    31    </dependency>\n\n33     <dependency>\n34      <groupId>${project.groupId}</groupId>\n\
    35       <artifactId>AlumniData</artifactId>\n36       <version>${project.version}</version>\
    \                                                                            \
    \                              \n37    </dependency>\n\n39     <dependency>\n\
    40      <groupId>${project.groupId}</groupId>\n41       <artifactId>AlumniService</artifactId>\n\
    42      <version>${project.version}</version>\n43     </dependency>\n\n45    ...\
    \ 为简洁起见，省略了其他依赖项 ...\n\n47   <build>\n48     <finalName>${project.artifactId}</finalName>\n\
    49     <resources>\n50       <resource>\n51         <directory>src/main/resources</directory>\n\
    52         <filtering>true</filtering>\n53       </resource>\n54     </resources>\n\
    55   </build>\n\n57 </project>\n```\n\nGUI 模块依赖于 Java EE 8 以及应用程序的其他层。\n\n为了简单访问实体，业务层不会增加任何价值。我们要么使用业务层将所有数据访问委托给数据层，要么允许\
    \ GUI 绕过业务层直接访问数据层。因为我们使用的是 JPA，应用程序只处理 Java 对象。因此，即使我们绕过业务层，GUI 也永远不需要了解数据库。为简单起见，我选择了后一种方法。因此，AlumniGui\
    \ 需要同时依赖 AlumniBusiness 和 AlumniData。\n\n正如我所提到的，其他模块由类似的 POM 定义。为了避免循环依赖，没有其他模块会依赖\
    \ AlumniGui。\n\n## 注册表单\n\nAlumni 仅供会员使用。这意味着用户必须先注册。注册后，用户可以随时登录。我们在注册过程中只收集少量强制性的个人数据。\n\
    \nAlumni 的欢迎页面提供了一个登录表单和一个指向新用户注册对话框的链接。虽然注册不是应用程序的第一个对话框，但它代表了每个用户在使用 Alumni\
    \ 之前需要执行的第一个操作。这也是介绍后续 JSF 和 Java EE 特性的一个很好的起点。\n\n与所有其他对话框一样，此表单将验证用户输入并通过显示消息报告潜在问题。这可以防止用户输入无效数据，同时也保护系统免受意外行为的影响。\n\
    \n在 Books 中，当用户单击“提交”按钮时进行此验证。对于小页面来说，这可能是一个不错的解决方案，但对于较大的页面来说，这却是一种负担。你是否曾经因为填写了数百个输入字段后，页面才提示第一个输入字段有问题而感到恼火？为了用户友好，我们将在每个输入字段后提供反馈。这就是\
    \ AJAX 发挥作用的地方。\n\nJSF 提供了一组通常会被翻译（渲染）成 HTML 组件的组件。有些人认为这是一个不必要的抽象层。为什么在 HTML\
    \ 期望 `<input type = \"text .../>` 的地方编写 `<h:inputText .../>`？答案很简单：一个 JSF 标签可能由不同的渲染引擎处理。例如，PDF\
    \ 渲染器可能会将 inputText 转换为交互式文本字段。JSF 标签是一种用于创建不同格式的领域特定语言（DSL）。\n\n如果我们只需要渲染 HTML，我们可以省略\
    \ DSL，直接使用 HTML 编写页面，并辅以 JSF 信息。（第 5 章简要介绍了这种编码方式。）我们将开发两个版本的注册表单：一个使用传统的 JSF\
    \ 标签，另一个主要使用 HTML 标签。当然，我们还必须考虑安全性。为了防止用户注入 HTML 代码，我们必须正确地转义输出。JSF 标签会自动为我们处理这个问题。\n\
    \n清单 24-3 展示了注册表单的第一个原始版本，图 24-1 展示了其摘录。\n"
