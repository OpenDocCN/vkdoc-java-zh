    ###### 清单 19-7：像素尺寸布局示例


    ```

     1   main {

     2     min-height: 500px;

     3     width: 640px;

     4     opacity: 0.95;

     5     border-radius: 10px;

     6     background-color: #eeeef3;

     7     padding: 10px;

     8     margin-bottom: 10px;

     9     box-shadow: 5px 5px 5px #004

    10   }


    12   nav{

    13     min-height: 500px;

    14     position: fixed;

    15     margin-left: 670px;

    16     width: 270px;

    17     padding: 10px;

    18     top: 90px;

    19     opacity: 0.85;

    20     border-radius: 10px;

    21     background-color: #ccccd8;

    22     box-shadow: 5px 5px 5px #004

    23   }

    ```


    请注意，这并不相同！例如，导航栏的左边距是 670px，而原始布局使用的是 56em = 672px。在这里，设计者更倾向于能被 10 整除，或者至少能被
    5 整除的尺寸。根据我的经验，这对于基于固定像素数设计的布局来说很典型。


    大多数关于响应式设计的书籍都会从一个示例开始，介绍如何使像素布局具有响应性。常见的方法是计算一个像素的相对宽度，然后将每个像素宽度乘以这个精确的因子。让我们来操作一下：


    *   总宽度 = 960 像素，因此一个像素是 1/960 × 100% = 0.1041666666666667%。


    *   640px = 640 × 0.1041666666666667% = 66.66666666666667%。


    *   670px = 670 × 0.1041666666666667% = 69.79166666666667%。


    依此类推。


    现在 CSS 看起来很难看。在大多数情况下，不需要如此高的精度。鼓起勇气将这些值四舍五入到最多两位小数。相信我，用户不会注意到任何差异。


    ## 计算尺寸


    清单 19-8 计算了一些尺寸。


    ###### 清单 19-8：导航布局示例


    ```

     1   @media screen and (min-width: 960px){

     2     nav{

     3       margin-left: 56em;

     4       width: 22em;

     5       padding: 1em;

     6     }

     7   }


     9   @media screen and (min-width: 600px) and (max-width: 960px){

    10     nav{

    11       margin-left: 70%;

    12       width: 27.5%;

    13       padding: 1.25%;

    14     }

    15   }

    ```


    通过缩小屏幕尺寸，我们将相对于当前字体大小的内边距，切换到了相对于周围容器的百分比尺寸。这意味着内边距本身会缩小。有时，保持内边距相对于字体大小是很有用的。使用
    CSS 3，混合不同尺寸并保持精度是没有问题的。


    在我们的示例中，元素宽度加上其内边距将得到总宽度 1.25% + 27.5% + 1.25% = 30%。假设我们有一个要求，即保持 1em 的内边距。那么元素宽度必须是
    30% 减去 2em。这正是你可以做到的：


    ```

    width: calc(30% - 2em);

    ```


    我假设内边距会被添加到盒子宽度中。这是大多数浏览器的做法。（旧版本的 Internet Explorer 声明宽度包含内边距和边框。）使用 CSS 3，你可以改变盒子大小的行为，使得宽度包含内边距和边框（通过
    `box-sizing: border-box;`）。


    ###### 提示


    你可以在 W3Schools 上阅读关于 CSS 盒子模型的内容。请查看 [www.w3schools.com/css/css_boxmodel.asp](http://www.w3schools.com/css/css_boxmodel.asp)
    和 [www.w3schools.com/cssref/css3_pr_box-sizing.asp](http://www.w3schools.com/cssref/css3_pr_box-sizing.asp)。


    ## 移动优先与桌面优先


    起初，Books 仅针对台式电脑开发。随后，随着移动设备的兴起，需要使其适应更小的屏幕尺寸。这个过程就是今天所谓的*桌面优先*方法。


    当屏幕尺寸缩小时，Books 简单地将导航栏放置在底部。通常，对于小尺寸屏幕，高度非常有限。用折叠菜单替换导航栏以节省空间可能是个好主意。这也可以通过 CSS
    解决。移动设备有时只有较小的带宽（蜂窝网络速度）可用。因此，我经常建议简化用户界面。例如，你可以省略背景图片。或者你可能需要减少内容。


    后者可能是一项艰巨的工作。哪些部分不太重要，可以删除？带着这个问题，许多人更喜欢*移动优先*的方法：先开发一个具有最小界面的应用程序，然后使其适应更大的屏幕，添加一些装饰性的内边距。


    不要担心有人说某种方法是最好的。按照你自己的方式去做就行。


    ## 总结


    几年前，应用程序可以针对特定的屏幕分辨率进行设计，但今天我们需要考虑不同种类的屏幕和尺寸。用户可能不仅仅使用台式电脑。我们必须考虑笔记本电脑尺寸、平板电脑和其他移动设备。因为我们不能期望用户在小型屏幕上滚动长内容，所以我们需要使应用程序页面的内容适应不同的屏幕尺寸。


    使 Web 应用程序具有*响应性*的一个关键技术是在 CSS 的媒体查询中定义不同的断点。本章展示了一种纯 CSS 的方法。这可以通过 JavaScript
    来补充，我们将在 Alumni 应用程序中使用它。


    要创建响应式应用程序，你可以从移动布局开始（移动优先）或桌面布局开始（桌面优先）。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_20`


    # 20. 总结与展望


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    Books 是一个主要供一位作者管理、面向众多读者发布的应用程序。我们期望评论的作者（也就是我）知道如何与应用程序交互。这意味着我们可以降低对用户界面的要求，特别是在验证输入方面。尽管如此，Books
    仍然是一个功能齐全的交互式 Web 应用程序。


    在回顾了用于表单和文本的基本 JSF 标签（在我们讨论 TinyCalculator 时）之后，我们讨论了更多 JSF 特性，如循环、条件、表格和不同类型的链接，以及更高级的特性，如模板。我们概述了
    JSF 如何与其他 Java EE 技术集成。Books 利用了 Java 持久化 API (JPA)、上下文和依赖注入 (CDI) 以及 Bean 验证。我们讨论了国际化的某些方面，以及如何使用
    CSS 使应用程序适应不同的屏幕尺寸。


    Books 应用程序的源代码以 zip 文件形式提供，可从 [`webdevelopment-java.info/webdevelopment/resources/download/BooksComplete.zip`](http://webdevelopment-java.info/webdevelopment/resources/download/BooksComplete.zip)
    下载。要打开压缩存档，请使用密码 MdkJ47(kq!。如果你检查代码，你会发现一些尚未讨论的技术。例如，有一个很少使用的 `<f:ajax>`。这些技术将在下一部分中描述。


    说到下一部分，下一个应用程序 Alumni 被设计成一个社交平台。所有用户都需要注册并输入数据。我们需要讨论安全性并提高对用户界面的要求。所有用户输入都必须经过验证，并且用户应该获得即时响应。验证器、AJAX、身份验证、自定义组件等都将结合
    Alumni 的使用进行介绍。


    # 第三部分

    间奏曲


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_21`


    # 21. 间奏曲


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    到目前为止，我们已经讨论了两个 Web 应用程序：TinyCalculator 和 Books。在本部分中，我们将脱离具体应用程序的开发，讨论使用 JSF
    进行 Web 开发的一些方面。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_22`

