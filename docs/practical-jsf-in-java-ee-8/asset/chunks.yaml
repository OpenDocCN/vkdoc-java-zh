    ;\n59       private String _imageEnabled = \"\";\n60       private String _imageDisabled\
    \ = \"\";\n61       private boolean _isEnabled = true;\n\n63       static public\
    \ TopicBuilder createBuilder(String key) {\n64         return new TopicBuilder(key);\n\
    65       }\n\n67       private TopicBuilder(String key) {\n68         _key = key;\n\
    69         _title = key;   // defaults to key\n70       }\n\n72       public TopicBuilder\
    \ setTitle(String title) {\n73         _title = title;\n74         return this;\n\
    75       }\n\n77       ... other chain elements omitted ...\n\n79       public\
    \ Topic build() {\n80         return new Topic(_key, _title, _outcome, _info,\n\
    81                          _imageEnabled, _imageDisabled, _isEnabled);\n82       }\n\
    83     }\n84   }\n```\n\nListing [14-15](#A435433_1_En_14_Chapter.xhtml#PC18)\
    \ shows the list of Topics:\n\n###### Listing 14-15 `Topics.java`\n\n```\n 1   public\
    \ class Topics implements Serializable {\n\n 3     private Optional<Topic> _activeTopic\
    \ = Optional.empty();\n 4     private final Set<Topic> _topics = new LinkedHashSet<>();\n\
    \n 6     public Set<Topic> getTopics() {\n 7       return _topics;\n 8     }\n\
    \n10     public void clear() {\n11       _topics.clear();\n12     }\n\n14     public\
    \ void addTopic(String title) {\n15       addTopic(Topic.TopicBuilder.createBuilder(title).build());\n\
    16     }\n\n18     public void addTopic(Topic topic) {\n19       _topics.add(topic);\n\
    20     }\n\n22     public void remove(String key) {\n23       Optional<Topic>\
    \ topic = findTopic(key);\n24       topic.ifPresent(t -> _topics.remove(t));\n\
    25     }\n\n27     public void remove(Topic topic) {\n28       _topics.remove(topic);\n\
    29     }\n\n31     public Optional<Topic> findTopic(String key) {\n32       return\
    \ _topics.stream()\n33               .filter(topic -> topic.getKey().equals(key))\n\
    34               .findAny();\n35     }\n\n37     /* pre-Java 8 code example\n\
    38      public Topic findTopic(String key) {\n39      for (Topic topic : _topics)\
    \ {\n40      if (topic.getKey().equals(key)) {\n41      return topic;\n42      }\n\
    43      }\n44      return Topic.TopicBuilder.createBuilder(\"\").build();\n45      }\n\
    46      */\n47     public Optional<Topic> getActiveTopic() {\n48       return\
    \ _activeTopic;\n49     }\n\n51     public void setActive(String key) {\n52       _activeTopic\
    \ = findTopic(key);                                                          \
    \                                    \n53     }\n\n55   }\n```\n\nEach topic is\
    \ intended to hold the information of a specific tab page. The first will be our\
    \ existing category editor page, which has to be only slightly adapted. And for\
    \ every supported locale, we’ll add another tab page. To perform this task, we\
    \ need information about the supported languages, so we’ll create a small method\
    \ to collect this info. And because we might reuse this, we’ll put it into a `Utilities`\
    \ class, as in Listing [14-16](#A435433_1_En_14_Chapter.xhtml#PC19).\n\n######\
    \ Listing 14-16 `Utilities.java`\n\n```\n 1   public class Utilities {\n 2     public\
    \ static Set<String> getSupportedLocales(HandleDefault defHandler) {\n 3       Application\
    \ app = FacesContext.getCurrentInstance().getApplication();\n 4       Set<String>\
    \ languageCodes = new HashSet<>();\n 5       for (Iterator<Locale> itr = app.getSupportedLocales();\
    \ itr.hasNext();) {\n 6         Locale locale = itr.next();\n 7         languageCodes.add(locale.getLanguage());\n\
     8       }\n\n10       String defaultLang = app.getDefaultLocale().getLanguage();\n\
    11       if (defHandler == HandleDefault.Exclude) {\n12         languageCodes.remove(defaultLang);\n\
    13       } else {\n14         languageCodes.add(defaultLang);\n15       }\n16       return\
    \ languageCodes;                                                             \
    \                                 \n17     }\n\n19     public enum HandleDefault\
    \ {\n\n21       Include, Exclude\n22     }\n23   }\n```\n\nThe locales are defined\
    \ in the `faces-config.xml` file, which is valid for the whole application. Hence,\
    \ it’s the application object we have to query. `getSupportedLocales()` is an\
    \ iterator, not an iterable, so we can’t use a for each loop. Depending on the\
    \ configuration file, the default language might be included within the supported\
    \ locales or not. We’ll tackle this problem by explicitly excluding or including\
    \ the default locale, depending on the parameter `defHandler`.\n\nBecause the\
    \ application should potentially support many languages, and we need to save space,\
    \ the topics will just contain the locale code as is. But the first tab will be\
    \ named `Category`, or in German *Kategorie*. It needs to be translated, so we\
    \ have to get the message bundle and the appropriate translation out of it. To\
    \ do that, we’ll add another method to our `Utilities` class, as in Listing [14-17](#A435433_1_En_14_Chapter.xhtml#PC20)."
