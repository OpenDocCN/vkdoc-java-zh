    ## Summary


    Java EE supports security features like user authentication and authorization
    out of the box. The servlet specification defines a couple of different modes
    to query the user credentials, like basic or form.


    Although basic isn’t useful for most scenarios, the form-based mode might be used
    to redirect a non-logged-in user to a login form. The most flexible method for
    login is the programmatic login. Here, it’s up to the developer to embed the login
    into an appropriate page.


    Depending on the application server, the application developer may choose from
    several authentication realms (zones, domains, and so on). GlassFish, for example,
    offers a fileRealm as well as a JDBCRealm. To enforce a strong password policy,
    the developer may need a realm that enables him to use his own identity store.
    Here, a custom realm comes into play.


    In the next chapter, I''ll demonstrate how this custom realm interacts with the
    identity store.


