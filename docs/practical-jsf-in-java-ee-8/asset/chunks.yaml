    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    TinyCalculator is the first and simplest application discussed in this book. It’s
    nothing more than a simple calculator for basic arithmetic. But it is useful to
    show some fundamental concepts of web applications with Java and JSF.


    As a kind of appetizer, and unlike how I’ll handle the other applications, I’ll
    first show you the whole application, with a little explanation afterwards. Then,
    as a kind of restart, I talk about the foundations of web applications and explain
    TinyCalculator and different approaches.


    You can access the source code for TinyCalculator by clicking the Download Source
    Code button at [www.apress.com/9781484230299](http://www.apress.com/9781484230299).
    You can also find the source code at [http://webdevelopment-java.info](http://webdevelopment-java.info).


    ## Creating the Application


    A web application with Java and JSF uses an application server to run. Don’t be
    afraid—your IDE usually deals with that. Later on, I’ll discuss that in more detail.
    We’ll start with the application.


    For this book, I had to decide which IDE to use in the tutorial parts. NetBeans,
    either the Java EE or All edition, comes with GlassFish. At the time of writing,
    the direct link to the download page is [https://netbeans.org/downloads/index.html](https://netbeans.org/downloads/index.html).
    Because NetBeans has been donated to Apache, this location may change. If that
    link isn’t available anymore, refer to [https://apache.netbeans.org](https://apache.netbeans.org).
    Just install it, and no further configuration is needed to start with simple applications.
    It’s quite easy.


    Many of this book’s basic examples are based on NetBeans 8 (English), which is
    bundled with GlassFish 4. GlassFish 4 is the reference implementation of Java
    EE 7, which is fine for TinyCalculator. To enable the brand new Java EE 8 features,
    you need GlassFish 5 or any other Java EE 8–compliant server, once available.
    GlassFish 5 will be bundled with NetBeans 9. Since the first donation (IDE) is
    still in progress, and Java EE is part of the second Java EE 8 donation, this
    may be a lengthy process. I’ll describe how to update to Java EE 8 just after
    TinyCalculator’s explanation.


    All applications in this book are built with Apache Maven ([http://maven.apache.org](http://maven.apache.org)),
    which is bundled with NetBeans. The Maven application structure is almost independent
    from the IDE. Thus, you may use any IDE of your choice (see also Chapter [2](#A435433_1_En_2_Chapter.xhtml)).
    Depending on your IDE, you may open Maven projects directly (for example, with
    NetBeans) or you may need to perform a simple import (for example, with Eclipse).


    As a novice to JSF or Java EE, you may not have created any Java-based web application
    before. So, I’ll start this one from scratch in the form of a step-by-step tutorial.
    Unlike in future chapters, I’ll cover the whole application here without detailed
    explanation, and then we’ll catch up after the tutorial:


    1.  Launch NetBeans.


    2.  From the File menu, choose New Project. NetBeans displays the New Project
    wizard, as shown in Figure [1-1](#A435433_1_En_1_Chapter.xhtml#Fig1).


    ![A435433_1_En_1_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_1_Fig1_HTML.jpg)


    ###### Figure 1-1 New Project wizard


    3.  Click the category Maven, click Web Application, and then click Next. NetBeans
    displays the New Web Application wizard, as shown in Figure [1-2](#A435433_1_En_1_Chapter.xhtml#Fig2).


    ![A435433_1_En_1_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_1_Fig2_HTML.jpg)


    ###### Figure 1-2 New Web Application wizard


    4.  For the Project Name, enter **TinyCalculator**. You may adapt the other fields
    as desired, or just keep them unchanged. It’s good practice to set the Group Id
    to the reverse notation of your domain. Click Next, keep the settings in the next
    dialog unchanged, and click Finish.


    NetBeans creates a skeleton of a new web application for you and displays it within
    the projects tree, as shown in Figure [1-3](#A435433_1_En_1_Chapter.xhtml#Fig3).


    ![A435433_1_En_1_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_1_Fig3_HTML.jpg)


    ###### Figure 1-3 Projects tree


    5.  Right-click (secondary click) TinyCalculator in the projects tree and choose
    Properties from the context menu. The Project Properties screen appears, as shown
    in Figure [1-4](#A435433_1_En_1_Chapter.xhtml#Fig4).


    ![A435433_1_En_1_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_1_Fig4_HTML.jpg)


    ###### Figure 1-4 Framework configuration


    6.  Choose the Frameworks category. Choose JavaServer Faces and click the Add
    button. Click the Configuration tab and change the contents of the JSF Servlet
    URL Pattern box to `*.xhtml`. Click OK.


    While adding JSF to your project, NetBeans creates a web page called `index.xhtml`
    within the web pages, keeping the formerly created `index.html` file.'
