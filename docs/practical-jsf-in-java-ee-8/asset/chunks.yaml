    ###### Note


    JSF offers a tag for debugging (don’t forget the appropriate namespace): <ui:debug
    hotkey="1"/>. If a page containing this tag is displayed in your browser, press
    Ctrl+Shift+1 to get some useful information such as component tree, variables,
    and view state. Replace the 1 with any key of your choice. If the key attribute
    is omitted, it defaults to d. Depending on your browser and installed add-ons,
    this default key might be used for something else.


    ## Navigation


    Navigation is an essential part of applications. In a desktop application, you
    might open a dialog by clicking a menu option or selecting a register tab. In
    a web application, we always deal with pages. Although we might provide the user
    a look and feel, like having a tab control, everything is still a page.


    The standard navigation element of HTML is a link. But within a JSF application,
    navigation might also be triggered by a button click. Prior to JSF 2.0, navigation
    rules had to be defined within the faces-config.xml file (see Chapter [6](#A435433_1_En_6_Chapter.xhtml)
    for more).


    Navigation might be defined like this:


    ```

    1   <navigation-rule>

    2       <from-view-id>/index.xhtml</from-view-id>

    3       <navigation-case>

    4           <from-outcome>add</from-outcome>

    5           <to-view-id>/index.xhtml</to-view-id>

    6       </navigation-case>

    7   </navigation-rule>

    ```


    Let’s assume there’s an Add button on the page. This button is assigned to a method,
    which returns the string add. If, starting on page index.xhtml, the button is
    clicked, then the page index.xhtml should be opened next. In this case, it’s simply
    the same page—and that’s exactly what we’ve done with TinyCalculator.


    But our example was simpler. There was no navigation rule defined. Starting with
    JSF 2.0, the outcome of an action method might directly be used as the next URL.
    Thus, our add method simply returns index.xhtml to navigate to this page. Or even
    simpler, it returns an empty string (or null) to stay on the page. This feature
    is called *internal navigation* (or *implicit navigation*). But *external navigation*,
    which is defined by XML, is still allowed and will overwrite the internal navigation
    rules.


    In the example applications in this book, we’ll mostly use internal navigation.


    ## Summary


    JSF has been developed in the open process of Java Specification Requests (JSRs).
    The latest version is JSF 2.3\. JSF supports two different view definition languages:
    JSP (JavaServer Pages) and Facelets. Because new features are available for Facelets
    only, this book mostly omits JSP in favor of Facelets.


    One challenge of web development is the stateless behavior of the underlying HTTP
    protocol. Although mostly hidden by JSF, a minimum level of knowledge is helpful.
    JSF tackles this challenge by its lifecycle phases. JSF offers a couple of namespaces
    and tags to describe the pages (views) of an application and builds up a component
    tree of these elements when processing a request. Navigation between web pages
    might been defined externally (via XML config files) or internally. This book
    mostly uses internal navigation.


