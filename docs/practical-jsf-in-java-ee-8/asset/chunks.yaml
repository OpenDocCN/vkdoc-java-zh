    \                  17       </                  style                  >     \
    \           \n\n                  19       <                  body           \
    \       >                \n                  20           <                  label\
    \                  >输入你的名字</                  label                  >       \
    \         \n                  21           <                  br             \
    \     />                \n                  22           <                  form\
    \                  >                \n                  23               <   \
    \               label                  for=\"txtName\">姓名：</                 \
    \ label                  >                \n                  24               <\
    \                  input                  type=\"text\" id=\"txtName\"/>     \
    \           \n                  25               <                  input    \
    \              type=\"submit\" value=\"发送\"/>                \n              \
    \    26           </                  form                  >                \n\
    \                  27       </                  body                  >      \
    \          \n                  28   </                  html                 \
    \ > \n```\n\n`label` 是一个元素选择器。它简单地选择一个 HTML 元素。其他类型的选择器包括 id 选择器和类选择器（稍后讨论）。在此选择器之后，样式在大括号内指定。此示例中的样式不言自明。字体大小的单位是相对单位：`2em`\
    \ 在当前上下文中将大小加倍。\n\n`form label` 是一个复合元素选择器，用于定位嵌套在 `form` 元素内的 `label`。如你所见，`color`\
    \ 样式被添加到 `bold` 样式中，而 `font-size` 被覆盖，因为该选择器比单独的 `label` 选择器更具体。如果你交换顺序，结果将相同。\n\
    \n但是，如果你使用的选择器与此文件中先前指定的选择器具有相同的特异性，它将覆盖该样式，如清单 B-2 所示。图 B-2 显示了输出结果。因为第 13 行中的\
    \ `font-size` 引用的 `label` 与第 5 行中的特异性相同，所以字体大小将被设置为该大小，从而覆盖（或简单地忽略）第 5 行中设置的格式。\n\
    \n![A435433_1_En_BookBackmatter_Fig4_HTML.jpg](img/A435433_1_En_BookBackmatter_Fig4_HTML.jpg)\n\
    \n###### 图 B-2 应用 CSS 后的效果\n\n###### 清单 B-2 CSS 覆盖先前指令的示例\n\n```\n 1   ...\n \
    \                  2       <                  style                  type=\"text/css\"\
    >                \n                   3                             label    \
    \              {                \n                   4                       \
    \          font-weight                  :                  bold              \
    \    ;                \n                   5                                 font-size\
    \                  : 2                  em                  ;                \n\
     6           }\n                   7                             form label  \
    \                {                \n                   8                     \
    \            color                  :                  red                  ;\
    \                \n                   9                                 font-size\
    \                  : 1                  em                  ;                \n\
    10           }\n                  11                             label       \
    \           {                \n                  12                          \
    \       font-weight                  :                  normal               \
    \   ;                \n                  13                                 font-size\
    \                  : 1                  em                  ;                \n\
    14           }\n                  15       </                  style         \
    \         >                \n16   ...\n```\n\n示例中使用的换行和空格是可选的。以下代码：\n\n```\n 1   \
    \                  form label                  {                \n           \
    \       2                         color                  :                  red\
    \                  ;                \n                  3                    \
    \     font-size                  : 1                  em                  ;  \
    \              \n4   }\n```\n\n等同于以下代码：\n\n```\n 1                     form label\
    \                  {                  color                  :               \
    \   red                  ;                  font-size                  : 1   \
    \               em                  ;} \n```\n\n可以使用逗号作为分隔符同时声明多个元素。以下代码：\n\n\
    ```\n 1                     label                  {                  font-size\
    \                  : 1                  em                  ;}               \
    \ \n                  2                     input                  {         \
    \         font-size                  : 1                  em                 \
    \ ;} \n```\n\n等同于以下代码：\n\n```\n 1                     label                  ,\
    \                  input                  {                  font-size       \
    \           : 1                  em                  ;} \n```\n\n### **选择器**\n\
    \n任何 CSS 指令都应用于由选择器指定的一个或多个元素。在前面的示例中，元素名称被用作这样的选择器。CSS 支持多种类型的选择器。\n\n#### 类型选择器\n\
    \n到目前为止讨论的所有选择器都是*类型*选择器，有时也称为*元素*选择器。元素通过其标签名称来指定。\n\n#### ID 选择器\n\n这里通过元素的\
    \ id 来指定它。ID 选择器以井号（#）开头。示例如下：\n\n```\n 1   #                      txtName   \
    \                   {                      color                      :      \
    \                red                      ;} \n```\n\n#### 类选择器\n\n这里通过元素的类名来指定它。类选择器以点号（.）开头，如清单\
    \ B-3 所示。\n"
- fmt: "### Listing B-3 CSS class\n\n```\n1   ...\n2       <style type=\"text/css\"\
    >\n3           .requiredInput { background-color: yellow ;}\n4       </style>\n\
    5   ...\n6       <input type=\"text\" id=\"txtName\" class=\"requiredInput\"/>\n\
    7   ...\n```\n\n### Attribute Selector\n\nThe *attribute* of an element and its\
    \ value are indicated by square brackets. Listing [B-4](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC63)\
    \ illustrates.\n\n### Listing B-4 CSS Instruction for an Element Type\n\n```\n\
    1   ...\n2       <style type=\"text/css\">\n3           [type =\"text\"] { background-color:\
    \ yellow ;}\n4       </style>\n5   ...\n6       <input type=\"text\" id=\"txtName\"\
    />\n7   ...\n```\n\n### Nesting Selector\n\nOne selector to address nested structures\
    \ was used in the introductory example: `tagname1 tagname2` refers to an element\
    \ of type `tagname2`, which is nested into an element of type `tagname1`. `tagname2`\
    \ might be nested anywhere within `tagname1`.\n\nNote that the `>` addresses elements\
    \ that are immediately nested, as shown in line 17 of Listing [B-5](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC64)\
    \ (Figure [B-3](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Fig5) shows\
    \ the output).\n\n![A435433_1_En_BookBackmatter_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_BookBackmatter_Fig5_HTML.jpg)\n\
    \n**Figure B-3** CSS nesting example\n\n### Listing B-5 CSS Nesting Selector (Line\
    \ 17)\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n\
    \ 3   <html>\n 4       <head>\n 5           <title>CSS demo</title>\n 6      \
    \ </head>\n\n8       <style type=\"text/css\">\n 9           label {\n10     \
    \          font-weight: bold ;\n11               font-size: 2 em ;\n12       \
    \    }\n13           form label {\n14               color: red ;\n15         \
    \      font-size: 1 em ;\n16           }\n17           form > label {\n18    \
    \           color: blue ;\n19           }\n20       </style>\n\n22       <body>\n\
    23           <label>Personal information</label>\n24           <br />\n25    \
    \       <form>\n26               <label>Enter your name</label>\n27          \
    \     <br />\n28               <div>\n29                   <label for=\"txtFirstName\"\
    >Last name:</label>\n30                   <input type=\"text\" id=\"txtFirstName\"\
    />\n31               </div>\n32               <div>\n33                   <label\
    \ for=\"txtLasrName\">First name:</label>\n34                   <input type=\"\
    text\" id=\"txtLastName\"/>\n35               </div>\n36                   <input\
    \ type=\"submit\" value=\"send\"/>\n37           </form>\n38       </body>\n39\
    \   </html>\n```\n\nOnly `Enter your name` is displayed in blue. Using the `>`\
    \ operator, the labels for entering last or first name could have been addressed\
    \ by `form > div > label`, because this includes the missing `div` in the path.\n\
    \n### Sibling Selector\n\nThe tilde (`~`) selects all the following siblings of\
    \ an element. A *sibling* is an element on the same nesting level. The plus sign\
    \ (`+`) selects the neighbor sibling element. Listing [B-6](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC65)\
    \ illustrates, and Figure [B-4](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Fig6)\
    \ displays the output.\n\n![A435433_1_En_BookBackmatter_Fig6_HTML.jpg](OEBPS/Images/A435433_1_En_BookBackmatter_Fig6_HTML.jpg)\n\
    \n**Figure B-4** CSS sibling example"
