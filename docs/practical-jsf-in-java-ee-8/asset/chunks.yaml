    `@PostConstruct` 注解的存在，当 BookEditor 的构造完成时，此方法会被自动调用。


    无论如何，首先检查对话是否为临时（非长期运行）状态非常重要。只有在这种状态下才允许启动长期运行。在清单 17-1 的第 12 行，我们执行了检查，看对话是否尚未进入长期运行状态（由
    `isTransient()` 指示）。如果不是这种情况，我们就通过调用 `begin()` 来启动长期运行部分。


    启动长期运行相当简单，但结束它可能会变得复杂。当然，这无非是在我们的对话对象上调用 `end()`。唯一的问题是：我们何时终止长期运行模式？如果编辑器有一个“保存并关闭”按钮，那将是一个绝佳的选择——保存书籍后，编辑器将被关闭，从而退出对话的长期运行模式。但在使用书籍时，用户可能会保存并停留在打开的对话框中。他可能会继续编辑，因此我们不能结束对话。或者用户可能会点击某个导航按钮跳转到其他位置——例如创建一本新书，或编辑另一本书。由于没有单一的退出编辑器的点，这就需要更多的处理。


    让我们检查一下 JSF 何时会重用现有的对话，或者注入一个新的对话。每当一个新的请求中使用 Book Bean 时，它都会被创建，要么对话是临时的，要么在长期运行对话的情况下，会使用一个新的对话。在这种情况下，`init()`
    方法会被调用。因此，我们可以通过跟踪对此方法的调用来追踪新的对话，如清单 17-2 所示。


    ###### 清单 17-2 BookEditor.java：记录 init 日志


