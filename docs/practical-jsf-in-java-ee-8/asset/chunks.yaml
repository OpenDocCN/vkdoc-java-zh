    \ we need to inject the service class we just created and adopt the init and change\
    \ methods, as shown in Listing [12-11](#A435433_1_En_12_Chapter.xhtml#PC16)."
  trans: "\n###### 图 12-5 实体生命周期（简化版）\n\n使用 `new` 关键字创建的实体处于 **New** 状态。如果新实体由上下文和依赖注入（CDI）框架（使用\
    \ `@Inject`）创建，情况也是如此。通过调用 `persist(entity)`，它会转换到 **Managed**（或 attached）状态。**Managed**\
    \ 状态反映了持久化状态。因此，对处于 **Managed** 状态的实体所做的任何更改都会自动存储（更新）到数据库中。数据库检索可能会在内存中创建一个处于托管状态的实体。调用\
    \ `remove(entity)` 将从数据库中删除该实体。\n\n到目前为止，我们已经了解了所有四种 CRUD 操作：创建（persist）、读取（数据库检索）、更新（更改托管实体）和删除（remove）。但图\
    \ 12-5 还显示了其他内容——实体可能处于 **Detached** 状态。除了这些操作，该图还显示了一个特殊的 **Detached** 状态。当实体存在于内存中但不再受管理时，它就会变为分离状态。这可以通过显式调用\
    \ `detach(entity)` 方法来实现。但还有其他原因，在简化图中省略了：如果 EM 被关闭，或者实体被序列化和反序列化，它也会变为分离状态。后者会在内存中恢复实体，但不受管理。例如，如果应用服务器内存不足，它可能会钝化\
    \ bean（通常通过序列化值保存到某处），并在稍后激活它们。一个特殊的方法 `merge(entity)` 会将实体再次转换回托管状态。\n\n如图所示，`remove()`\
    \ 将删除该实体。我的一位朋友拒绝使用 JPA，因为“一个需要加载实体才能执行删除操作的框架毫无用处，简直是疯了。” 这是一个我见过多次的严重误解。`remove()`\
    \ 方法对于删除仍驻留在内存中的实体非常有用。例如，应用用户加载了一些显示在屏幕上的数据——然后她决定删除这些数据。另一方面，如果你想删除一个或多个不驻留在内存中的实体，你将使用删除操作。\n\
    \nEM 提供了 `contains(entity)` 方法来检查实体是否处于托管状态。此方法简单地返回 `true` 或 `false`。\n\n如果我们将服务类注入到编辑器\
    \ bean 中，Categories 可能会变为分离状态！因此，要执行更新或删除操作，我们需要先合并实体。\n\n清单 12-7 展示了初步的服务类。\n\
    \n###### 清单 12-7 CategoryService\n\n```\n 1   @Stateless\n 2   public class CategoryService\
    \ {\n 3     @PersistenceContext(unitName = \"BooksPU\")\n 4     private EntityManager\
    \ _em;\n\n 7     protected EntityManager getEntityManager() {\n 8       return\
    \ _em;\n 9     }\n\n11     public Category create(Category entity) {\n12       getEntityManager().persist(entity);\n\
    13       return entity;\n14     }\n\n16     public Category read(Object id) {\n\
    17       return getEntityManager().find(Category.class, id);\n18     }\n\n20     public\
    \ Category update(Category entity) {\n21       return getEntityManager().merge(entity);\n\
    22     }\n\n24     public void delete(Category entity) {\n25       getEntityManager().remove(getEntityManager().merge(entity));\n\
    26     }\n\n28     /**\n29      * 便捷方法，用于自动创建或更新\n30      * @param entity\n31      *\
    \ @return 托管实体\n32      */\n33     public Category save(Category entity) {\n34       if\
    \ (entity.getId() < 0){\n35           return create(entity);\n36       }\n37       return\
    \ update(entity);                                                            \
    \                          \n38     }\n\n40     public List<Category> findAll()\
    \ {\n41       CriteriaQuery cq = getEntityManager().getCriteriaBuilder().createQuery();\n\
    42       cq.select(cq.from(Category.class));\n43       return getEntityManager().createQuery(cq).getResultList();\n\
    44     }\n\n46   }\n```\n\n如前所述，将使用注解中给定的 PU 注入一个 `EntityManager`。\n\n使用 `@Stateless`\
    \ 注解会自动将该 bean 声明为企业 JavaBean（EJB）。使用 EJB 会自动将数据库访问置于事务范围内。这种简单的方法假设有一个功能完备的 Java\
    \ EE 容器，例如 GlassFish。在仅支持 servlet 的容器上，我们必须使用不同的方法。如今，CDI 可以注入 `EntityManager`。如果你将\
    \ Weld CDI 实现添加到 servlet 容器中（清单 12-8），则需要更改类注解（清单 12-9）。\n\n###### 清单 12-8 Weld\
    \ 的 Maven 坐标（如 Java EE 中所定义）\n\n```\n1   <dependency>\n2     <groupId>javax.enterprise</groupId>\n\
    3     <artifactId>cdi-api</artifactId>\n4     <version>2.0</version>\n5     <scope>provided</scope>\n\
    6   </dependency>\n```\n\n###### 清单 12-9 CategoryService\n\n```\n1   @RequestScoped\n\
    2   @Transactional\n3   public class CategoryService {\n```\n\n这将服务类从企业 JavaBean\
    \ 更改为纯 CDI bean。由于不会自动添加事务，我们需要使用特殊注解（或通过代码管理事务）来添加它。此 CDI 注解也可以在功能完备的应用服务器上运行。\n\
    \n`EntityManager` 有一些用于 CRUD（创建、读取、更新、删除）操作的方法。它们分别被称为 `persist`、`find`、`merge`（仅用于重新附加到托管状态）和\
    \ `remove`。服务类将使用 CRUD 名称来公开它们。为简洁起见，该类尚未包含任何异常处理。\n\n`findAll()` 方法将从数据库中检索所有类别。它通过使用\
    \ criteria API 来实现。或者，我们也可以直接使用 JPA 查询语言（JPQL）查询来获取类别。我稍后会解释这两种方法。\n\n`merge`\
    \ 不仅仅是将实体重新附加到托管状态。如果实体之前不存在，它将被创建。在图 12-5 中，`persist` 用于进入托管状态。这就是 `persist`\
    \ 的用途。但你可以改用 `merge`。\n\n有了这些知识，我们可以简化我们的服务。只需省略 `create` 和 `update` 方法，并用清单 12-10\
    \ 替换 `save`。\n\n###### 清单 12-10 save 方法\n\n```\n1   public Category save(Category\
    \ entity) {\n2     return getEntityManager().merge(entity);\n3   }\n```\n\n##\
    \ 使用 CategoryService/注入\n\n在我们的类别编辑器中，我们需要注入刚刚创建的服务类，并采用 `init` 和 `change` 方法，如清单\
    \ 12-11 所示。\n"
- fmt: "###### Listing 12-11 Controller Bean `CategoryEditor`\n\n```\n 1   @Named\n\
     2   @SessionScoped\n 3   public class CategoryEditor implements Serializable{\n\
     4     private static final Logger _logger = Logger.getLogger(\"CategoryEditor\"\
    );\n\n 6     @Inject CategoryService _categoryService;    \n\n 8     @PostConstruct\n\
     9     private void init(){\n10       _categories = _categoryService.findAll();\n\
    11       _deletedCategories = new ArrayList<>();\n12     }\n\n14     private List<Category>\
    \ _deletedCategories;\n15     private List<Category> _categories;\n\n17     public\
    \ List<Category> getCategories() {\n18       return _categories;\n19     }\n\n\
    21     public void setCategories(List<Category> categories) {\n22       _categories\
    \ = categories;\n23     }\n\n25     public String deleteCategory(Category category){\n\
    26       if (category.getId() >= 0){\n27         _deletedCategories.add(category);\n\
    28       }\n29       _categories.remove(category);\n30       return \"\";\n31     }\n\
    \n33     public String addCategory(){\n34       _categories.add(new Category());\n\
    35       return \"\";\n36     }\n\n38     public String save(){\n39       for\
    \ (Category category : _categories){\n40         _categoryService.save(category);\n\
    41     }\n42     for (Category category : _deletedCategories){\n43       _categoryService.delete(category);\n\
    44     }\n45     _deletedCategories = new ArrayList<>();\n\n47     return \"\"\
    ;                                                                            \
    \          \n48     }\n49   }\n```\n\n`@Inject` is part of the CDI. It’s up to\
    \ the container to pass an object of the requested type (class) into the annotated\
    \ variable. If necessary, the container will create an appropriate object and\
    \ maintain its lifecycle. In the old days of JSF, you could only inject JSF managed\
    \ beans with a lifetime longer than the current bean (for example, a session scoped\
    \ bean into a request scoped bean, but vice versa). Rather than injecting an instance\
    \ of the requested class, CDI is going to inject a proxy object. Once that proxy\
    \ is injected, you use it to access the appropriate object of the requested class.\
    \ The real object may change between requests.\n\nFor example, the container can\
    \ inject a request scoped bean into a session scoped bean. Now, if you try to\
    \ access that request scoped bean, the proxy presents a different real object\
    \ for you with every request.\n\nOnly eligible beans can be injected. Otherwise,\
    \ NetBeans would alert you that no bean matches the injection point. But which\
    \ bean is eligible? Examples are EJBs, named beans, and more. All are identified\
    \ by a special annotation or configuration file. And you might create your own\
    \ annotations to “produce” eligible beans. I discuss CDI in more detail later.\
    \ The problem with new technologies might be that the IDE doesn’t know about them—especially\
    \ for some new Java EE injectable objects NetBeans doesn’t know about and alerts\
    \ with such a message. Don’t worry—and use it.\n\nSo far, the first version of\
    \ the category editor is ready. Later, we’ll refine it by using a generalized\
    \ service class, by AJAXifying the JSF page, and more.\n\n###### Check Entity\
    \ State\n\nAdd a simple method to the service class to return an entity’s state:\n\
    \n```\n1   public String checkState(Category entity){\n2     return entity + (_em.contains(entity)\
    \ ? \"attached\" : \"detached\");\n3   }\n```\n\nCall this method within `findAll`\
    \ (`CategoryService`) and `init` (`CategoryEditor`), print out, and observe the\
    \ states of the entities.\n\n## Summary\n\nWe covered a lot in this chapter. The\
    \ Java Persistence API defines a framework for Object Relational Mapping (ORM).\
    \ It’s based on the core concept of entities that are managed by an entity manager\
    \ (EM). An entity is a plain old Java object (POJO) with some special annotations.\
    \ Only the `@Entity` and `@Id` annotations are mandatory, whereas the framework\
    \ assumes default values for table and column names. Usually mappings for different\
    \ table (`@Table`) or column (`@Column`) names are needed.\n\nAn entity will be\
    \ in one of four different states that are managed by the EM. It’s recommended\
    \ to separate the data object from the data access. Thus, an entity should not\
    \ contain (database-specific) logic. The data access is performed by a special\
    \ service class.\n\nThe EM relies on the definition of a persistence unit, which\
    \ configures the logical database access. The technical database access (driver,\
    \ server properties) is configured by a data source.\n\nThis chapter also explained\
    \ how to use the service class within a backing bean.\n\n© Michael Müller 2018\n\
    \nMichael Müller, *Practical JSF in Java EE 8*, [https://doi.org/10.1007/978-1-4842-3030-5_13](https://doi.org/10.1007/978-1-4842-3030-5_13)\n\
    \n# 13. JSF Templating\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nUsually an application provides a consistent look and feel. That\
    \ way, the overall layout remains the same, with only content or other minor elements\
    \ changing from page to page. JSF supports such an overall layout with its simple\
    \ but powerful template feature.\n\n## Templating Books\n\nA *template* is like\
    \ a picture, with (mostly) rectangular holes cut into it. By placing other pictures\
    \ behind these holes, you may change the picture while keeping the basic layout.\n\
    \nFigure 13-1 shows some different screens of the Books application.\n\n![A435433_1_En_13_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_13_Fig1_HTML.jpg)\n\
    \n###### Figure 13-1 Books in action\n\nAs you can see, because of JSF templating\
    \ (see Figure 13-2), only the main content area changes.\n\n![A435433_1_En_13_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_13_Fig2_HTML.jpg)\n\
    \n###### Figure 13-2 Books in action\n\nFor templating, at least two components\
    \ are needed: the template file and the content file. Because the content file\
    \ is using the template, it’s called a *client*.\n\nLet’s start with the template.\
    \ Remember the category editor? The first (prototype) version is still called\
    \ `index.xhtml`. This file contains header, nav, main, and footer. The “hole”\
    \ we need is exactly the main part. The simplest way to create the template is\
    \ to copy this file (in the web pages branch of the projects tree, the `src/webapp`\
    \ folder), cut the content in main, and replace it with an instruction that means\
    \ “insert variable content here.” That’s what the `<ui:insert ...>` tag is for.\
    \ Don’t forget to insert the namespace declaration for `ui:`. And—voilà—the template\
    \ is ready, as in Listing 13-1."
