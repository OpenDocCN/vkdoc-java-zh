  raw: '### outputLink


    The outputLink tag is the classic tag to create an HTML link element for a GET
    request. As its name suggests, it’s used to navigate outside your application.
    Using this tag, you simply create links, not JSF navigation, but you can use it
    to navigate within your application.


    ### Choosing the Right Link


    The postback navigation is no problem if the user starts our application with
    a defined entry point—for example, a login page. Maybe you offer your user some
    additional starting points for the application . Once the application is started,
    it follows its workflow. The user acts within the application without caring about
    the URI. In such a case, it doesn’t matter—the URI is one step behind.


    In case of Books, the review list should link to reviews. These reviews will be
    direct addressable. They should also be searchable by a search engine, so we need
    to access them via GET request. commandLink won’t fit these requirements.


    But which of the other two link elements is best? Or do we need both? Before I
    discuss them, I invite you to figure out the behavior by yourself in the next
    exercise.


    ###### ![A435433_1_En_18_Figa_HTML.gif](OEBPS/Images/A435433_1_En_18_Figa_HTML.gif) Investigating
    Links


    Create a new web application called testLinks and add the JSF framework. As JSF
    servlet URL pattern, use *.xhtml. You may want to revisit TinyCalculator and read
    up on how to create such an app using NetBeans.


    NetBeans will automatically create the page index.xhtml during application setup.
    If you’re using a different IDE, you may need to create such a page by yourself.
    Add a second page, page2.xhtml.


    To the index.xhtml page, add <h:link...> (outcome="link") as well as <h:outputLink...>
    (value="link") with the following targets:


    *   /page2


    *   /page2.xhtml


    *   /testLink/page2


    *   /testLink/page2.xhtml


    *   [http://it-rezension.de](http://it-rezension.de)


    Run the project and try and observe the links.


    Listing [18-3](#A435433_1_En_18_Chapter.xhtml#PC3) shows a simple version of the
    index.xhtml page. It’s not very sophisticated—just for demonstration.


    ###### Listing 18-3 Link Demo (testLink) index.xhtml


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html">

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Facelet Title</title>

     7     </h:head>

     8     <h:body>

     9       Hello from Facelets


    11       <div>

    12         <h:link value="/page2" outcome="/page2"/>

    13       </div>

    14       <div>

    15         <h:link value="/page2.xhtml" outcome="/page2.xhtml"/>

    16       </div>

    17       <div>

    18         <h:link value="/testLink/page2" outcome="/testLink/page2"/>

    19       </div>

    20       <div>

    21         <h:link value="/testLink/page2.xhtml" outcome="/testLink/page2.xhtml"/>

    22       </div>

    23       <div>

    24         <h:link value="http://it-rezension.de" outcome="http://it-rezension.de”/>


    26       </div>

    27       <hr/>

    28       <div>

    29         <h:outputLink value="/page2">

    30           /page2

    31         </h:outputLink>

    32       </div>

    33       <div>

    34         <h:outputLink value="/page2.xhtml">

    35           /page2.xhtml

    36         </h:outputLink>

    37       </div>

    38       <div>

    39         <h:outputLink value="/testLinks/page2">

    40           /testLinks/page2

    41         </h:outputLink>

    42       </div>

    43       <div>

    44         <h:outputLink value="/testLinks/page2.xhtml">

    45           /testLinks/page2.xhtml

    46         </h:outputLink>

    47       </div>

    48       <div>

    49         <h:outputLink value="http://it-rezension.de">

    50           http://it-rezension.de

    51         </h:outputLink>

    52       </div>


    54     </h:body>

    55   </html>

    ```


    Figure [18-1](#A435433_1_En_18_Chapter.xhtml#Fig1) shows the output .


    ![A435433_1_En_18_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_18_Fig1_HTML.jpg)


    ###### Figure 18-1 Output of testLink


    link creates links both for /page2 and /page2.xhtml, but no other. If you omit
    the file extension, JSF automatically adds the .xhtml. The slash / determines
    the root within our application—*not* an absolute path.


    /testLink is the context path of the application, a kind of “outside the application.”
    And the link to my review page points to a different website. link is used for
    a JSF navigation and as such, for any other link, it can’t find a navigation.


    On the other hand, outputLink simply creates every link we provide, as specified.
    If not provided, JSF automatically precedes the current host to complete the link.
    Thus /page2 becomes http://localhost:8080/page2. Such a link would point to a
    nonexisting page. Only /testLinks/page2.xhtml and [http://itrezension.de](http://itrezension.de)
    point to existing pages.


    ### Draw the Conclusion


    link can only be used for internal navigation. outputLink might be used for external
    as well for internal links. For an internal link, the context path needs to be
    added.


    For the review list, (at least) two alternative solutions might be used:


    *   Use both link and outputLink together with a condition that selects the appropriate
    element depending on the kind of link. Listing [18-4](#A435433_1_En_18_Chapter.xhtml#PC4)
    shows the principle of this approach.


    *   Or always use an outputLink for both internal and external links. For internal
    links, you need to add the context path to the page’s address, making the URI
    fully qualified.


    Books uses the second approach.


    ###### Listing 18-4 Principle of Determining Internal versus External Link


    ```

    1   <h:link rendered="#{review.intern}" .../>

    2   <h:outputLink rendered="#{not review.intern}" .../>

    ```


    ###### Listing 18-5 Excerpt of reviewList.xhtml


    ```

    1   <h:outputLink value="#{review.url}"

    2                 target="#{review.intern ? ''_self'' : ''_blank''}">

    3     #{review.title}

    4   </h:outputLink>

    ```


    External links are stored in the ReviewLink table. They define a complete URI
    and are used as stored in the database. Internal links are created dynamically
    by appending the bookId and language to the page and prefixing it with the context
    path. The context path is available from the external context of the Faces context,
    as shown in Listing [18-6](#A435433_1_En_18_Chapter.xhtml#PC6).


    ###### Listing 18-6 Creation of Internal Links


    ```

    1   private String buildUrl(int bookId, String language) {

    2     String path = FacesContext.getCurrentInstance()

    3             .getExternalContext().getRequestContextPath();

    4     return path + Page.UserReview.getUrl() +

    5             "?bookId=" + bookId + "&language=" + language;

    6   }

    ```


    buildUrl is part of the ReviewInfo.class.


    ## Summary


    JSF offers three different type of links. commandLink renders an HTML link (href
    element). While rendering this link, JSF adds an onClick handler redirecting this
    link to an input submit element. As a result, such a link initiates a postback
    navigation.


    link renders a real link that’s used for a JSF navigation case (internal navigation),
    whereas the intention outputLink creates a link element that’s not used for regular
    JSF navigation but for navigating to an external page. Anyway, we can use it for
    a navigation within our application.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_19](#A435433_1_En_19_Chapter.xhtml)'
  trans: '

    ### outputLink


    outputLink 标签是用于创建 GET 请求的 HTML 链接元素的经典标签。顾名思义，它用于导航到应用程序外部。使用此标签，你只需创建链接，而非 JSF
    导航，但你也可以用它来在应用程序内部进行导航。


    ### 选择合适的链接


    如果用户通过定义的入口点（例如登录页面）启动我们的应用程序，回传导航就没有问题。也许你可以为用户提供应用程序的一些额外起始点。一旦应用程序启动，它就会遵循其工作流程。用户在应用程序内操作，无需关心
    URI。在这种情况下，这无关紧要——URI 是次要的。


    就书籍而言，评论列表应链接到评论。这些评论应该是可直接寻址的。它们也应该能被搜索引擎搜索到，因此我们需要通过 GET 请求访问它们。commandLink
    不符合这些要求。


    但另外两个链接元素中哪个最好？还是我们需要两者都用？在讨论它们之前，我邀请你在下一个练习中自行找出它们的行为。


    ###### ![A435433_1_En_18_Figa_HTML.gif](img/A435433_1_En_18_Figa_HTML.gif) 调查链接


    创建一个名为 testLinks 的新 Web 应用程序，并添加 JSF 框架。JSF servlet URL 模式使用 *.xhtml。你可能想回顾一下
    TinyCalculator，并了解如何使用 NetBeans 创建此类应用程序。


    NetBeans 会在应用程序设置期间自动创建页面 index.xhtml。如果你使用不同的 IDE，则可能需要自己创建这样的页面。添加第二个页面 page2.xhtml。


    在 index.xhtml 页面中，添加 <h:link...>（outcome="link"）以及 <h:outputLink...>（value="link"），目标如下：


    *   /page2


    *   /page2.xhtml


    *   /testLink/page2


    *   /testLink/page2.xhtml


    *   [`it-rezension.de`](http://it-rezension.de)


    运行项目并尝试观察这些链接。


    清单 18-3 展示了 index.xhtml 页面的一个简单版本。它并不复杂——仅用于演示。


    ###### 清单 18-3 链接演示 (testLink) index.xhtml


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html">

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Facelet 标题</title>

     7     </h:head>

     8     <h:body>

     9       来自 Facelets 的问候


    11       <div>

    12         <h:link value="/page2" outcome="/page2"/>

    13       </div>

    14       <div>

    15         <h:link value="/page2.xhtml" outcome="/page2.xhtml"/>

    16       </div>

    17       <div>

    18         <h:link value="/testLink/page2" outcome="/testLink/page2"/>

    19       </div>

    20       <div>

    21         <h:link value="/testLink/page2.xhtml" outcome="/testLink/page2.xhtml"/>

    22       </div>

    23       <div>

    24         <h:link value="http://it-rezension.de" outcome="http://it-rezension.de”/>


    26       </div>

    27       <hr/>

    28       <div>

    29         <h:outputLink value="/page2">

    30           /page2

    31         </h:outputLink>

    32       </div>

    33       <div>

    34         <h:outputLink value="/page2.xhtml">

    35           /page2.xhtml

    36         </h:outputLink>

    37       </div>

    38       <div>

    39         <h:outputLink value="/testLinks/page2">

    40           /testLinks/page2

    41         </h:outputLink>

    42       </div>

    43       <div>

    44         <h:outputLink value="/testLinks/page2.xhtml">

    45           /testLinks/page2.xhtml

    46         </h:outputLink>

    47       </div>

    48       <div>

    49         <h:outputLink value="http://it-rezension.de">

    50           http://it-rezension.de

    51         </h:outputLink>

    52       </div>


    54     </h:body>

    55   </html>

    ```


    图 18-1 显示了输出结果。


    ![A435433_1_En_18_Fig1_HTML.jpg](img/A435433_1_En_18_Fig1_HTML.jpg)


    ###### 图 18-1 testLink 的输出


    link 为 /page2 和 /page2.xhtml 创建了链接，但没有为其他目标创建。如果省略文件扩展名，JSF 会自动添加 .xhtml。斜杠 /
    决定了我们应用程序内的根目录——*不是*绝对路径。


    /testLink 是应用程序的上下文路径，是一种“应用程序外部”的路径。而指向我的评论页面的链接则指向一个不同的网站。link 用于 JSF 导航，因此对于任何其他链接，它都无法找到导航。


    另一方面，outputLink 会按照指定方式创建我们提供的每一个链接。如果未提供，JSF 会自动添加当前主机前缀以完成链接。因此 /page2 变成了 http://localhost:8080/page2。这样的链接会指向一个不存在的页面。只有
    /testLinks/page2.xhtml 和 [`itrezension.de`](http://itrezension.de) 指向了存在的页面。


    ### 得出结论


    link 只能用于内部导航。outputLink 既可用于外部链接，也可用于内部链接。对于内部链接，需要添加上下文路径。


    对于评论列表，（至少）可以使用两种替代方案：


    *   同时使用 link 和 outputLink，并附带一个条件，根据链接类型选择适当的元素。清单 18-4 展示了这种方法的原则。


    *   或者始终使用 outputLink 来处理内部和外部链接。对于内部链接，你需要将上下文路径添加到页面地址中，使 URI 成为完全限定形式。


    Books 采用了第二种方法。


    ###### 清单 18-4 确定内部链接与外部链接的原则


    ```

    1   <h:link rendered="#{review.intern}" .../>

    2   <h:outputLink rendered="#{not review.intern}" .../>

    ```


    ###### 清单 18-5 reviewList.xhtml 的摘录


    ```

    1   <h:outputLink value="#{review.url}"

    2                 target="#{review.intern ? ''_self'' : ''_blank''}">

    3     #{review.title}

    4   </h:outputLink>

    ```


    外部链接存储在 ReviewLink 表中。它们定义了完整的 URI，并按原样存储在数据库中使用。内部链接通过将 bookId 和 language 附加到页面，并在前面加上上下文路径来动态创建。上下文路径可从
    Faces 上下文的外部上下文中获取，如清单 18-6 所示。


    ###### 清单 18-6 创建内部链接


    ```

    1   private String buildUrl(int bookId, String language) {

    2     String path = FacesContext.getCurrentInstance()

    3             .getExternalContext().getRequestContextPath();

    4     return path + Page.UserReview.getUrl() +

    5             "?bookId=" + bookId + "&language=" + language;

    6   }

    ```


    buildUrl 是 ReviewInfo.class 的一部分。


    ## 总结


    JSF 提供了三种不同类型的链接。commandLink 渲染一个 HTML 链接（href 元素）。在渲染此链接时，JSF 会添加一个 onClick 处理程序，将该链接重定向到一个输入提交元素。因此，这样的链接会发起一次回传导航。


    link 渲染一个用于 JSF 导航案例（内部导航）的真实链接，而 outputLink 的意图是创建一个不用于常规 JSF 导航、而是用于导航到外部页面的链接元素。无论如何，我们都可以用它来在应用程序内部进行导航。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_19`

