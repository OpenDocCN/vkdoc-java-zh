    to create an appropriate instance of a class or interface and provide (inject)
    it for our application. Java classes annotated with `@Named` automatically become
    eligible for injection and will be injected at appropriate places by the `@Inject`
    annotation.


    CDI itself offers much more. For example, you might define your own annotations
    by defining interfaces for producers. That’s beyond this book’s scope. In this
    book, we’ll commonly use the predefined injections.


