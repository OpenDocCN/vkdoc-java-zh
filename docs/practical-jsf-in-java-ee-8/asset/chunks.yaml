- fmt: '# Micro Service


    Creating, retrieving, and deleting a user account as well as setting its state
    and login will be handled by a small application that runs independently from
    both Alumni and the custom realm. Usually such a unit would be called a *service*.
    You can develop and deploy such a service independently from the other units.
    In the domain of web development, we usually use two kinds of services:


    - WS* services that communicate using SOAP

    - Services based on the REST architectural style


    SOAP ( [www.w3.org/TR/soap/](http://www.w3.org/TR/soap/) ) is a protocol standard
    for the communication of web services in the WS* family. Usually SOAP is tunnelled
    via HTTP. *SOAP* originally stood for Simple Object Access Protocol, but today
    only the acronym is used. There are simpler protocols available.


    We’re talking about the WS* family because these kinds of service use the Web
    Services Description Language (WSDL). (You can read more about WSDL at [www.w3schools.com/xml/xml:wsdl.asp](http://www.w3schools.com/xml/xml:wsdl.asp).)
    When web services became popular in conjunction with service oriented architecture
    (SOA) in the early 2000s, they often were used in combination with a kind of registry,
    which could be used to look up a catalog of services. From the point of view of
    the application using a WS* service, it could be treated as a kind of remote method
    invocation. Calling such a service is as easy as calling a local method. We can
    pass parameters and receive a result object. Personally, I often use WS* services,
    but within Alumni, I’ve chosen to follow a REST-like style, which usually is more
    lightweight.


    Today, we’re talking about micro services. Often people misunderstand this term.
    A *micro service* is not a “small” service. It’s an application that offers a
    complete set of associated functions with high cohesion. Its functionality is
    available with a public interface and can be reached via the network. A micro
    service stands on its own; it doesn’t need the overhead of any supporting components
    like a registry (for example, as designed for WS* services).


    This definition restricts a micro service to neither a special protocol nor to
    a special architecture. If we omit the supporting infrastructure, a WS* service
    might act as a micro service.


    The other popular kind of services includes the ones that follow the REST architectural
    style. Of course, there are more kinds of services, but the two I’m talking about
    in this chapter are the most important in the domain of web development.


    ###### Note


    *REST*, by the way, is short for *REpresentational State Transfer* and was described
    by Roy Thomas Fielding in his dissertation “Architectural Styles and the Design
    of Network-based Software Architectures,” which you can read at [www.ics.uci.edu/~fielding/pubs/dissertation/top.htm](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/top.htm).


    Within REST, a resource is represented by an identifier. Using HTTP as transfer
    medium, a resource is identified by a URI. Actions on such a resource are associated
    with HTTP methods like `POST`, `GET`, `PUT`, or `DELETE`. Usually `POST` is used
    to create an object, `GET` to read it, `PUT` to update, and `DELETE` to delete
    it. Thus, all the well-known CRUD operations can be supported.


    For more on REST and the HTTP methods, you might read “Using HTTP Methods for
    RESTful Services” ( [www.restapitutorial.com/lessons/httpmethods.html](http://www.restapitutorial.com/lessons/httpmethods.html)
    ) or “RESTFUL API tutorial” ( [https://restfulapi.net/http-methods/](https://restfulapi.net/http-methods/)
    ). Lots of other articles and good books are available, too. Discussing all the
    fundamentals of RESTful services goes far beyond this book.


    Let’s assume we want to handle customers. A list of customers might be accessed
    by `<baseAddress>/customers` using the `GET` method. The same address using the
    `POST` method and passing the data for a customer will create a new customer and
    return its id. A `GET` to `<baseAddress>/customers/<id>` (where `<id>` represents
    the appropriate id) will retrieve the customer, whereas the same address in conjunction
    with the `DELETE` method deletes it.


    Java EE includes the Java API for RESTful Web Services (JAX-RS). The current version
    Java EE 8 includes RAX-RS 2.1, which has been defined as JSR370 ( [https://jcp.org/en/jsr/detail?id=370](https://jcp.org/en/jsr/detail%3Fid=370)
    ).


    For Alumni, the access to the account information is handled by a micro service
    based on JAX-RS.


    # Account Service


    Many older JSF applications (including mine, in the beginning) tended to become
    monolithic. Compiling and deploying a growing application takes a growing amount
    of time. Such a monolith becomes harder to maintain, so it’s better to compose
    the whole application using a set of smaller parts. We might integrate a couple
    of independent JSF apps using *portlets* (see the portlet specification, JSR 362,
    at [https://jcp.org/en/jsr/detail?id=362](https://jcp.org/en/jsr/detail%3Fid=362)
    ). Or we can design a couple of JSF apps to interact seamlessly by sharing a session.
    Or we can call services.


    Let’s look at how *Alumni* handles its accounts. The address to reach its API
    will be `http://<server:port>/AccountService/Accounts`. Alumni might call this
    address with the `POST` method and pass some account data to create a new account.
    In contrast to the customer example mentioned earlier, I inserted an additional
    id sub-path to access a specific account (I hope RESTful purists won’t hurt me).
    This allowed me to add other sub-branches for the specific functions of enabling
    login and disabling an account.'
