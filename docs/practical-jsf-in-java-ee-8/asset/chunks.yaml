- fmt: "### Listing 11-5 Fix Width by CSS (Add to `books.css`)\n\n```\n1   body >\
    \ div {\n2     width: 80em;\n3     margin: 0 auto;\n4     text-align: left;\n\
    5   }\n```\n\nThese styles affect the topmost `div` within our document, which\
    \ is our wrapping element. Using the combined element and id selector, `div#wrapper`\
    \ would have addressed the same `div`. Later on, when designing the admin pages,\
    \ we’d like to reuse this style. For admin pages, the first `div` gets a different\
    \ id. Thus, by using the `div#wrapper` selector, we can’t reuse this style information.\n\
    \n`width: 80em;` limits the size of our web content by a relative size. Some years\
    \ ago, it was common to set the limit to a fixed absolute size, like `width: 960px;`.\
    \ This allowed creation of a fixed layout with nearly full control of the exact\
    \ sizes. But we don’t develop for desktop computers only. Starting with relative\
    \ sizes allows for switching to a responsive layout later on. `1em` is a relative\
    \ unit, its width about the width of the capital *M* in whatever font and size\
    \ are currently in use. Later on, we’ll add so-called *media queries*, to consider\
    \ smaller screen (or window) sizes.\n\n### Check the Wrapper\n\n1.  Add a long\
    \ piece of text (200 characters, say) to the main content.\n2.  Run the application.\n\
    3.  Resize the browser window from full screen width to a skinnier width.\n\n\
    Note that the text stays centered. That is, to the left and right of each line\
    \ of text, there will be roughly equal space. When you squeeze the window size,\
    \ this space is reduced. Once there’s no more space, a horizontal scroll bar appears.\n\
    \nOur header will be as wide as the wrapper area with rounded corners, and the\
    \ text displayed will be white on blue background. To get a smooth design, it\
    \ will be a bit transparent and let the background shine through somewhat. The\
    \ footer will look similar, but instead of a headline it will contain some text\
    \ and links. Right now, it only contains pure text, so let’s add some links, as\
    \ shown in Listing [11-6](#A435433_1_En_11_Chapter.xhtml#PC8).\n\n### Listing\
    \ 11-6 Book’s Footer\n\n```\n 1   ...\n 2     <footer>\n 3       &copy; Michael\
    \ Müller\n 4       |\n 5       <h:outputLink value=\"http://blog.mueller-bruehl.de\"\
    >\n 6         Michael's Blog\n 7       </h:outputLink>\n 8       |\n 9       <h:link\
    \ value=\"About\" outcome=\"index.xhtml\"/>\n10     </footer>\n11   ...\n```\n\
    \n`&copy;` is an HTML entity that refers to the copyright sign. Using HTML 4.x,\
    \ you could use it right this way—but we declared our doctype to be HTML5, which\
    \ doesn’t know such entities. So, we have to declare this entity first by enhancing\
    \ the doctype information at the first line of our XHTML file: `<!DOCTYPE html\
    \ [<!ENTITY copy \"©\">]>`.\n\nThe JSF tag `<h:outputLink ...>` renders an outgoing\
    \ link. This kind of link leaves the application. In this page, it simply would\
    \ be rendered as `<a href=\"http://blog.mueller-bruehl.de\">Michael's Blog</a>`,\
    \ which is a standard HTML link. Why should somebody use this JSF tag and not\
    \ the HTML version? Because it’s possible to enrich the tag with additional information.\
    \ For example, you could add attributes known by JSF, such as `rendered = \"#{someCondition}\"\
    `. Doing so, the link would be rendered if the condition evals to true only.\n\
    \n`<h:link ...>` renders to an `<a href=...>` also. It’s used as an internal link\
    \ (within the application) and might be enriched with JSF-specific attributes,\
    \ too. Because we don’t have an About page yet, it simply points to the source\
    \ page. The differences of the various links are discussed later on in Chapter\
    \ [18](#A435433_1_En_18_Chapter.xhtml).\n\nHaving added some “real” content, we\
    \ can continue to apply styles, as shown in Listing [11-7](#A435433_1_En_11_Chapter.xhtml#PC9).\n\
    \n### Listing 11-7 Basic CSS for the Page Layout and Menu (Add to `books.css`)\n\
    \n```\n 1   header, footer {\n 2     opacity: 0.75;\n 3     border-radius: 1em;\n\
    \ 4     background-color: #000044;\n 5     padding: 1em;\n 6     text-align: center;\n\
    \ 7     box-shadow: 0 0 1em white;\n 8   }\n\n10   header {\n11     margin: 2em\
    \ auto 1em auto;\n12   }\n\n14   footer {\n15     margin: 0.5em auto 1em auto;\n\
    16     color: white;\n17   }\n\n19   header > h1{\n20     color: white;\n21  \
    \   margin: 0;\n22     padding: 0;\n23   }\n\n25   a {\n26     text-decoration:\
    \ none;\n27     color: white;\n28   }\n\n30   a:hover{\n31     color: red;\n32\
    \   } \n```\n\nAlthough we used JSF tags, the style is always applied to the rendered\
    \ HTML elements. The links are rendered as an anchor tag, (`<a href=...>`). Setting\
    \ `text-decoration: none;` will omit the underlining. Rather, the link will turn\
    \ red on a mouse over (by defining `hover`).\n\n`padding 1em;` applies `1em` padding\
    \ to each side. Instead of one parameter, you might apply two (`padding top/bottom\
    \ right/left`) or four (`padding top right bottom left`) parameters, as done for\
    \ the `margin`. Or you may define `padding-top 1em;` (`-right`, `-bottom`, `-left`)\
    \ for a given side only.\n\n`box-shadow: 0 0 1em white;` defines a white “shadow.”\
    \ In fact, this seems to be a bright light. No value is added to the horizontal\
    \ and vertical position. The width from opacity 100 percent to 0 is `1em`.\n\n\
    The other elements should be fairly self-explanatory. The navigation will be placed\
    \ left from the main part.\n\n### Column Layout\n\nAn established way to calculate\
    \ layout sizes is to divide the whole content area into columns—for example, six\
    \ columns with gaps in between. If we take 2 percent of the full width for such\
    \ a gap, we can calculate each column width by `(100% – 5 × 2%) / 6 = 15%` per\
    \ column. Long version: in between six cols, there are five gaps. Each gap takes\
    \ 2% of the width, which is a total of 10% for the gaps. We need to subtract this\
    \ from the 100% width. As a result, 90% of the full width has to be devided by\
    \ the six columns. In this example, we use four columns for the main part, including\
    \ three gaps, and two columns for the navigation, including one gap. Last but\
    \ not least, we have one remaining gap between the main part and the navigation.\n\
    \nI mention column layout because it’s very popular and you may have heard or\
    \ read about it. For Books, there’s no need to arrange content in columns. The\
    \ navigation will be “fixed” during scrolling; this will be realized by `position:\
    \ fixed;`. See Listing [11-8](#A435433_1_En_11_Chapter.xhtml#PC10).\n\n### Listing\
    \ 11-8 CSS for Main Part and Navigation (Add to `books.css`)\n\n```\n 1   main\
    \ {\n 2     min-height: 40em;\n 3     width: 53em;\n 4     opacity: 0.95;\n 5\
    \     border-radius: 1em;\n 6     background-color: #eeeef3;\n 7     padding:\
    \ 1em;\n 8     margin-bottom: 1em;\n 9     box-shadow: 0.5em 0.5em 0.5em #004\n\
    10   }\n\n12   nav{\n13     min-height: 40em;\n14     position: fixed;\n15   \
    \  margin-left: 56em;\n16     width: 22em;\n17     padding: 1em;\n18     top:\
    \ 7.5em;\n19     opacity: 0.85;\n20     border-radius: 1em;\n21     background-color:\
    \ #ccccd8;\n22     box-shadow: 0.5em 0.5em 0.5em #004\n23   }\n```\n\nThe height\
    \ of an element is usually calculated by its content. The main part might get\
    \ much longer than the navigation. Right now, both parts contain only a few words.\
    \ To balance the height, a minimum height is defined for each of these parts.\
    \ The main part’s width is simply set to `53em` (remember the wrapper being `80em`\
    \ wide). According to the box model, a padding of `2 × 1em` will be added. If\
    \ we assume a gap of `1em` between main and nav, `nav` needs a left margin of\
    \ `56em`. And the width of `nav` is simply calculated by `80em – 56em – 2 × 1em`\
    \ (padding) = `22em`.\n\nFigure [11-5](#A435433_1_En_11_Chapter.xhtml#Fig5) shows\
    \ the app running.\n\n![A435433_1_En_11_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig5_HTML.jpg)\n\
    \n**Figure 11-5** All styles applied"
  raw: "###### Listing 11-5 Fix Width by CSS (Add to books.css)\n\n```\n1   body >\
    \ div {\n2     width: 80em;\n3     margin: 0 auto;\n4     text-align: left;\n\
    5   }\n```\n\nThese styles affect the topmost div within our document, which is\
    \ our wrapping element. Using the combined element and id selector, div#wrapper\
    \ would have addressed the same div. Later on, when designing the admin pages,\
    \ we’d like to reuse this style. For admin pages, the first div gets a different\
    \ id. Thus, by using the div#wrapper selector, we can’t reuse this style information.\n\
    \nwidth: 80em; limits the size of our web content by a relative size. Some years\
    \ ago, it was common to set the limit to a fixed absolute size, like width: 960px;.\
    \ This allowed creation of a fixed layout with nearly full control of the exact\
    \ sizes. But we don’t develop for desktop computers only. Starting with relative\
    \ sizes allows for switching to a responsive layout later on. 1em is a relative\
    \ unit, its width about the width of the capital *M* in whatever font and size\
    \ are currently in use. Later on, we’ll add so-called *media queries*, to consider\
    \ smaller screen (or window) sizes.\n\n###### Check the Wrapper\n\n1.  Add a long\
    \ piece of text (200 characters, say) to the main content.\n\n2.  Run the application.\n\
    \n3.  Resize the browser window from full screen width to a skinnier width.\n\n\
    Note that the text stays centered. That is, to the left and right of each line\
    \ of text, there will be roughly equal space. When you squeeze the window size,\
    \ this space is reduced. Once there’s no more space, a horizontal scroll bar appears.\n\
    \nOur header will be as wide as the wrapper area with rounded corners, and the\
    \ text displayed will be white on blue background. To get a smooth design, it\
    \ will be a bit transparent and let the background shine through somewhat. The\
    \ footer will look similar, but instead of a headline it will contain some text\
    \ and links. Right now, it only contains pure text, so let’s add some links, as\
    \ shown in Listing [11-6](#A435433_1_En_11_Chapter.xhtml#PC8).\n\n###### Listing\
    \ 11-6 Book’s Footer\n\n```\n 1   ...\n 2     <footer>\n 3       &copy; Michael\
    \ Müller\n 4       |\n 5       <h:outputLink value=\"http://blog.mueller-bruehl.de\"\
    >\n 6         Michael's Blog\n 7       </h:outputLink>\n 8       |\n 9       <h:link\
    \ value=\"About\" outcome=\"index.xhtml\"/>\n10     </footer>\n11   ...\n```\n\
    \n&copy; is an HTML entity that refers to the copyright sign. Using HTML 4.x,\
    \ you could use it right this way—but we declared our doctype to be HTML5, which\
    \ doesn’t know such entities. So, we have to declare this entity first by enhancing\
    \ the doctype information at the first line of our XHTML file: <!DOCTYPE html\
    \ [<!ENTITY copy \"©\">]>.\n\nThe JSF tag <h:outputLink ...> renders an outgoing\
    \ link. This kind of link leaves the application. In this page, it simply would\
    \ be rendered as <a href=\"http://blog.mueller-bruehl.de\">Michael's Blog</a>,\
    \ which is a standard HTML link. Why should somebody use this JSF tag and not\
    \ the HTML version? Because it’s possible to enrich the tag with additional information.\
    \ For example, you could add attributes known by JSF, such as rendered = \"#{someCondition}\"\
    . Doing so, the link would be rendered if the condition evals to true only.\n\n\
    <h:link ...> renders to an <a href=...> also. It’s used as an internal link (within\
    \ the application) and might be enriched with JSF-specific attributes, too. Because\
    \ we don’t have an About page yet, it simply points to the source page. The differences\
    \ of the various links are discussed later on in Chapter [18](#A435433_1_En_18_Chapter.xhtml).\n\
    \nHaving added some “real” content, we can continue to apply styles, as shown\
    \ in Listing [11-7](#A435433_1_En_11_Chapter.xhtml#PC9).\n\n###### Listing 11-7\
    \ Basic CSS for the Page Layout and Menu (Add to books.css)\n\n```\n1   header,\
    \ footer {\n 2     opacity: 0.75;\n 3     border-radius: 1em;\n 4     background-color:\
    \ #000044;\n 5     padding: 1em;\n 6     text-align: center;\n 7     box-shadow:\
    \ 0 0 1em white;\n 8   }\n\n10   header {\n11     margin: 2em auto 1em auto;\n\
    12   }\n\n14   footer {\n15     margin: 0.5em auto 1em auto;\n16     color: white;\n\
    17   }\n\n19   header > h1{\n20     color: white;\n21     margin: 0;\n22     padding:\
    \ 0;\n23   }\n\n25   a {\n26     text-decoration: none;\n27     color: white;\n\
    28   }\n\n30   a:hover{\n31     color: red;\n32   } \n```\n\nAlthough we used\
    \ JSF tags , the style is always applied to the rendered HTML elements. The links\
    \ are rendered as an anchor tag, (<a href=...>). Setting text-decoration: none;\
    \ will omit the underlining. Rather, the link will turn red on a mouse over (by\
    \ defining hover).\n\npadding 1em; applies 1em padding to each side. Instead of\
    \ one parameter, you might apply two (padding top/bottom right/left) or four (padding\
    \ top right bottom left) parameters, as done for the margin. Or you may define\
    \ padding-top 1em; (-right, -bottom, -left) for a given side only.\n\nbox-shadow:\
    \ 0 0 1em white; defines a white “shadow.” In fact, this seems to be a bright\
    \ light. No value is added to the horizontal and vertical position. The width\
    \ from opacity 100 percent to 0 is 1em.\n\nThe other elements should be fairly\
    \ self-explanatory. The navigation will be placed left from the main part.\n\n\
    ###### Column Layout\n\nAn established way to calculate layout sizes is to divide\
    \ the whole content area into columns—for example, six columns with gaps in between.\
    \ If we take 2 percent of the full width for such a gap, we can calculate each\
    \ column width by (100% – 5 × 2%) / 6 = 15% per column. Long version: in between\
    \ six cols, there are five gaps. Each gap takes 2% of the width, which is a total\
    \ of 10% for the gaps. We need to subtract this from the 100% width. As a result,\
    \ 90% of the full width has to be devided by the six columns. In this example,\
    \ we use four columns for the main part, including three gaps, and two columns\
    \ for the navigation, including one gap. Last but not least, we have one remaining\
    \ gap between the main part and the navigation.\n\nI mention column layout because\
    \ it’s very popular and you may have heard or read about it. For Books, there’s\
    \ no need to arrange content in columns. The navigation will be “fixed” during\
    \ scrolling; this will be realized by position: fixed;. See Listing [11-8](#A435433_1_En_11_Chapter.xhtml#PC10).\n\
    \n###### Listing 11-8 CSS for Main Part and Navigation (Add to books.css)\n\n\
    ```\n 1   main {\n 2     min-height: 40em;\n 3     width: 53em;\n 4     opacity:\
    \ 0.95;\n 5     border-radius: 1em;\n 6     background-color: #eeeef3;\n 7     padding:\
    \ 1em;\n 8     margin-bottom: 1em;\n 9     box-shadow: 0.5em 0.5em 0.5em #004\n\
    10   }\n\n12   nav{\n13     min-height: 40em;\n14     position: fixed;\n15     margin-left:\
    \ 56em;\n16     width: 22em;\n17     padding: 1em;\n18     top: 7.5em;\n19     opacity:\
    \ 0.85;\n20     border-radius: 1em;\n21     background-color: #ccccd8;\n22     box-shadow:\
    \ 0.5em 0.5em 0.5em #004\n23   }\n```\n\nThe height of an element is usually calculated\
    \ by its content. The main part might get much longer than the navigation. Right\
    \ now, both parts contain only a few words. To balance the height, a minimum height\
    \ is defined for each of these parts. The main part’s width is simply set to 53em\
    \ (remember the wrapper being 80em wide). According to the box model, a padding\
    \ of 2 × 1em will be added. If we assume a gap of 1em between main and nav, nav\
    \ needs a left margin of 56em. And the width of nav is simply calculated by 80em –\
    \ 56em – 2 × 1em (padding) = 22em.\n\nFigure [11-5](#A435433_1_En_11_Chapter.xhtml#Fig5)\
    \ shows the app running .\n\n![A435433_1_En_11_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig5_HTML.jpg)\n\
    \n###### Figure 11-5 All styles applied"
  trans: "\n###### 清单 11-5 通过 CSS 固定宽度（添加到 books.css）\n\n```\n1   body > div {\n2     width:\
    \ 80em;\n3     margin: 0 auto;\n4     text-align: left;\n5   }\n```\n\n这些样式会影响文档中最顶层的\
    \ `div`，也就是我们的包裹元素。使用组合元素和 ID 选择器 `div#wrapper` 也能选中同一个 `div`。稍后在设计管理页面时，我们希望重用此样式。对于管理页面，第一个\
    \ `div` 会有一个不同的 ID。因此，如果使用 `div#wrapper` 选择器，我们就无法重用这个样式信息。\n\n`width: 80em;`\
    \ 通过相对大小限制了网页内容的尺寸。几年前，通常会将限制设置为固定的绝对大小，比如 `width: 960px;`。这样可以创建几乎完全控制精确尺寸的固定布局。但我们不仅仅为台式电脑开发。从相对大小开始，便于以后切换到响应式布局。`1em`\
    \ 是一个相对单位，其宽度大约等于当前所用字体和大小中大写字母 *M* 的宽度。稍后，我们会添加所谓的*媒体查询*，以考虑更小的屏幕（或窗口）尺寸。\n\n\
    ###### 检查包裹元素\n\n1.  向主要内容中添加一段长文本（例如 200 个字符）。\n\n2.  运行应用程序。\n\n3.  将浏览器窗口从全屏宽度调整为较窄的宽度。\n\
    \n请注意，文本保持居中。也就是说，每行文本的左右两侧会有大致相等的空间。当你缩小窗口尺寸时，这个空间会减少。一旦空间消失，就会出现水平滚动条。\n\n我们的页眉将与包裹区域同宽，带有圆角，显示的文本将是蓝底白字。为了获得流畅的设计，它会有一点透明，让背景略微透出。页脚看起来类似，但不会包含标题，而是包含一些文本和链接。目前，它只包含纯文本，所以让我们添加一些链接，如清单\
    \ 11-6 所示。\n\n###### 清单 11-6 书籍页脚\n\n```\n 1   ...\n 2     <footer>\n 3       &copy;\
    \ Michael Müller\n 4       |\n 5       <h:outputLink value=\"http://blog.mueller-bruehl.de\"\
    >\n 6         Michael's Blog\n 7       </h:outputLink>\n 8       |\n 9       <h:link\
    \ value=\"About\" outcome=\"index.xhtml\"/>\n10     </footer>\n11   ...\n```\n\
    \n`&copy;` 是一个 HTML 实体，代表版权符号。使用 HTML 4.x 时，你可以直接这样使用——但我们将文档类型声明为 HTML5，它不认识这种实体。因此，我们必须首先通过增强\
    \ XHTML 文件第一行的文档类型信息来声明此实体：`<!DOCTYPE html [<!ENTITY copy \"©\">]>`。\n\nJSF 标签\
    \ `<h:outputLink ...>` 渲染一个出站链接。这种链接会离开应用程序。在此页面中，它会被简单地渲染为 `<a href=\"http://blog.mueller-bruehl.de\"\
    >Michael's Blog</a>`，这是一个标准的 HTML 链接。为什么有人会使用这个 JSF 标签而不是 HTML 版本？因为可以用附加信息来丰富这个标签。例如，你可以添加\
    \ JSF 已知的属性，比如 `rendered = \"#{someCondition}\"`。这样做的话，只有当条件评估为 `true` 时，链接才会被渲染。\n\
    \n`<h:link ...>` 也会渲染成一个 `<a href=...>`。它被用作内部链接（在应用程序内部），并且也可以添加 JSF 特有的属性。因为我们还没有“关于”页面，它只是指向源页面。各种链接的区别将在后面的第\
    \ 18 章讨论。\n\n添加了一些“真实”内容后，我们可以继续应用样式，如清单 11-7 所示。\n\n###### 清单 11-7 页面布局和菜单的基本\
    \ CSS（添加到 books.css）\n\n```\n1   header, footer {\n 2     opacity: 0.75;\n 3     border-radius:\
    \ 1em;\n 4     background-color: #000044;\n 5     padding: 1em;\n 6     text-align:\
    \ center;\n 7     box-shadow: 0 0 1em white;\n 8   }\n\n10   header {\n11     margin:\
    \ 2em auto 1em auto;\n12   }\n\n14   footer {\n15     margin: 0.5em auto 1em auto;\n\
    16     color: white;\n17   }\n\n19   header > h1{\n20     color: white;\n21     margin:\
    \ 0;\n22     padding: 0;\n23   }\n\n25   a {\n26     text-decoration: none;\n\
    27     color: white;\n28   }\n\n30   a:hover{\n31     color: red;\n32   } \n```\n\
    \n尽管我们使用了 JSF 标签，但样式始终应用于渲染后的 HTML 元素。链接被渲染为锚点标签（`<a href=...>`）。设置 `text-decoration:\
    \ none;` 将去掉下划线。相反，鼠标悬停时链接会变成红色（通过定义 `hover`）。\n\n`padding 1em;` 为每边应用 1em 的内边距。与\
    \ `margin` 类似，你可以使用两个参数（上下内边距 左右内边距）或四个参数（上内边距 右内边距 下内边距 左内边距），而不是一个参数。或者，你可以只为特定的一边定义\
    \ `padding-top: 1em;`（`-right`、`-bottom`、`-left`）。\n\n`box-shadow: 0 0 1em white;`\
    \ 定义了一个白色的“阴影”。实际上，这看起来像是一束明亮的光。水平和垂直位置没有添加值。从不透明度 100% 到 0 的宽度是 1em。\n\n其他元素应该相当不言自明。导航将放置在主要部分的左侧。\n\
    \n###### 列布局\n\n一种计算布局尺寸的成熟方法是将整个内容区域划分为列——例如，六列，列之间有间隙。如果我们为这样的间隙取全宽的 2%，那么每列的宽度可以通过\
    \ `(100% – 5 × 2%) / 6 = 15%` 来计算。详细版本：六列之间有五个间隙。每个间隙占宽度的 2%，间隙总共占 10%。我们需要从 100%\
    \ 的宽度中减去这个值。结果，全宽的 90% 必须除以六列。在这个例子中，我们为主要部分使用四列，包括三个间隙，为导航使用两列，包括一个间隙。最后但同样重要的是，主要部分和导航之间还有一个剩余的间隙。\n\
    \n我提到列布局是因为它非常流行，你可能听说过或读到过。对于本书来说，不需要将内容排列成列。导航在滚动时会保持“固定”；这将通过 `position: fixed;`\
    \ 实现。参见清单 11-8。\n\n###### 清单 11-8 主要部分和导航的 CSS（添加到 books.css）\n\n```\n 1   main\
    \ {\n 2     min-height: 40em;\n 3     width: 53em;\n 4     opacity: 0.95;\n 5     border-radius:\
    \ 1em;\n 6     background-color: #eeeef3;\n 7     padding: 1em;\n 8     margin-bottom:\
    \ 1em;\n 9     box-shadow: 0.5em 0.5em 0.5em #004\n10   }\n\n12   nav{\n13     min-height:\
    \ 40em;\n14     position: fixed;\n15     margin-left: 56em;\n16     width: 22em;\n\
    17     padding: 1em;\n18     top: 7.5em;\n19     opacity: 0.85;\n20     border-radius:\
    \ 1em;\n21     background-color: #ccccd8;\n22     box-shadow: 0.5em 0.5em 0.5em\
    \ #004\n23   }\n```\n\n元素的高度通常由其内容计算得出。主要部分可能会比导航长得多。目前，两个部分都只包含几个词。为了平衡高度，为每个部分定义了最小高度。主要部分的宽度简单地设置为\
    \ 53em（记住包裹元素是 80em 宽）。根据盒模型，会加上 `2 × 1em` 的内边距。如果我们假设主要部分和导航之间的间隙为 1em，那么导航需要左边距为\
    \ 56em。导航的宽度简单地通过 `80em – 56em – 2 × 1em`（内边距）`= 22em` 计算得出。\n\n图 11-5 显示了正在运行的应用程序。\n\
    \n![A435433_1_En_11_Fig5_HTML.jpg](img/A435433_1_En_11_Fig5_HTML.jpg)\n\n######\
    \ 图 11-5 所有样式已应用\n"
- fmt: "# Design First Data Model\n\nNow we can implement a first dialog. In practice,\
    \ you might start implementing a big feature, like the book editor or review editor.\
    \ That would make sense, because these are valuable features for the customer.\
    \ But we want to assign every book to one or more categories. Thus, categories\
    \ need to be available when we enter the data of a new book. In real development,\
    \ we may omit this little feature to implement it later, once the customer is\
    \ satisfied with the overall editor.\n\nWe haven’t discussed persistence yet,\
    \ and a category is one of the simplest structures within our application, so\
    \ it’s a good starting point to introduce data storage and access. We start to\
    \ design the data model here. In Chapter [12](#A435433_1_En_12_Chapter.xhtml)\
    \ we will persist this data.\n\nIgnoring the fact of different display languages,\
    \ a *category* simply consists of an id and text only. So far, our data model\
    \ seems to be very simple: two properties with getters and setters. See Listing\
    \ [11-9](#A435433_1_En_11_Chapter.xhtml#PC11).\n\n###### Listing 11-9 Category\n\
    \n```\n 1   public class Category {\n 2     // <editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Property Id\">\n 3     private int _id = -1;\n\n 5     public int getId()\
    \ {\n 6       return _id;\n 7     }\n\n 9     public void setId(int id) {\n10       _id\
    \ = id;\n11     }\n12     // </editor-fold>\n\n14     // <editor-fold defaultstate=\"\
    collapsed\" desc=\"Property Name\">\n15     private String _name;\n\n17     public\
    \ String getName() {\n18       return _name;                                 \
    \                               \n19     }\n\n21     public void setName(String\
    \ name) {\n22       _name = name;\n23     }\n24     // </editor-fold>\n25   }\n\
    ```\n\nThe id is initialized with –1 to indicate there is no valid id yet.\n\n\
    By the way, the editor-fold comments are specific to NetBeans. They allow structuring\
    \ and collapsing the code. It’s a one-time presentation here.\n\nIs that all?\
    \ Nope. There’s something more we need to do. As a Java developer, you might miss\
    \ the `hashCode` and `equals` methods. Both are needed if objects of this class\
    \ will be used in any collection. NetBeans can generate both for you. This generated\
    \ code might be used as a starting point only. Using persistence, the id will\
    \ be generated by the database management system.\n\nOnly this id identifies the\
    \ category. There’s a valid id, `hashCode`, and `equals` depend on this id only,\
    \ ignoring the text. But if there’s no valid id, we probably need to distinguish\
    \ two different object instances. We do that by considering the text.\n\nUsually,\
    \ in our application we’ll display selected properties of our entities. But if\
    \ we simply put an entity onto a page, JSF would display it by its string representation.\
    \ Thus, we should override the `toString` method to gain more informative output,\
    \ as is done in Listing [11-10](#A435433_1_En_11_Chapter.xhtml#PC12).\n\n######\
    \ Listing 11-10 HashCode and Equals Need to Be Defined for Any Entity\n\n```\n\
     1   @Override\n 2   public int hashCode() {\n 3     if (_id < 0) {\n 4       return\
    \ _name.hashCode();\n 5     }\n 6     return _id;\n 7   }\n\n 9   @Override\n\
    10   public boolean equals(Object object) {\n11     if (!(object instanceof Category))\
    \ {\n12       return false;\n13     }\n14     Category other = (Category) object;\n\
    15     if (_id < 0 && other._id < 0) {\n16       return _name.equals(other._name);\n\
    17     }\n18     return _id == other._id;\n19   }\n\n21   @Override\n22   public\
    \ String toString() {\n23     return \"Category[ id=\" + _id + \"] \" + _name;\n\
    24   }\n```\n\nNow the data model for the first dialog is ready.\n\n## First Dialog\
    \ Box (Repeating Structure)\n\n`Category` is the simplest data structure to be\
    \ persisted and as such is a good starting point to discuss the data storage.\
    \ A *category* only consists of an id and text. We could certainly design a small\
    \ dialog box containing these two fields, plus two buttons, Save and Delete. Just\
    \ to edit every category by its own screen. In fact, the id doesn’t matter for\
    \ the user; it’s only used as the primary key once we move on to persistence.\
    \ So, we’ll put all categories into a list and edit them all at once.\n\nWe need\
    \ to:\n\n* Add a category\n* Modify a category’s text\n* Delete a category\n*\
    \ Save the list\n\nTo add a category or save the list, we use one button each.\n\
    \nIt’s very common to display a read-only list and add an Edit link to each row.\
    \ If you click the link, the Edit dialog will be displayed. Using applications\
    \ following this approach, though, I feel uncomfortable. So, we’ll allow a direct\
