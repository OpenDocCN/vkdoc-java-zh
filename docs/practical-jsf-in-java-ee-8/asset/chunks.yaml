    \n###### Figure 24-1 Extract of registration form\n\nIn this form we have a couple\
    \ input fields, each embedded in its own `div`, together with a label and a message.\
    \ For example, take a look at the first name (lines 3–12). We start with the label\
    \ (lines 4–6). After that label, a message (lines 7 and 8) will be displayed in\
    \ case of error. Finally, we have the appropriate input field where the user can\
    \ key in the information (lines 9–11).\n\nFor the password fields, we use `inputSecret`\
    \ in place of `inputText`. This renders a secret input field that displays dots\
    \ for every character, hiding the real input. Apart from that, it’s used like\
    \ the other input fields.\n\nAs mentioned, error messages will be displayed in\
    \ case of validation error. If a form is created like this, validation only takes\
    \ place when the user clicks the `Register` button.\n\nLooking at this code, some\
    \ questions may arise:\n\n*   How can we perform the validation?\n*   How can\
    \ we provide immediate feedback after entering each value?\n*   All input parts\
    \ look similar—is it possible to predefine and reuse such a structure?\n*   How\
    \ do we process the password?\n\nThe next few chapters answer these questions.\n\
    \n## Summary\n\nThis chapter introduced Alumni, a social media application that\
    \ depends on user input. That means we need all the dialogs to be fault-tolerant\
    \ and to provide immediate feedback.\n\nAlumni is mainly built up by different\
    \ software modules for GUI, business logic, and data. An independent microservice\
    \ manages the user both for Alumni and for the authentication. This chapter introduced\
    \ interesting parts of the required POMs, with special care given to Java EE 8.\n\
    \nDeveloping a registration form like we developed forms for Books would seem\
    \ tedious and brings up questions of how it could be done better.\n\n© Michael\
    \ Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_25](https://doi.org/10.1007/978-1-4842-3030-5_25)\n\
    \n# 25. Validation\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen, Germany\n\
    \nBefore JSF transfers data into the model, the raw data has to be converted and\
    \ validated. A short overview of *bean validation* was given in Chapter 15. As\
    \ stated there, JSF offers its own validation specification besides bean validation.\
    \ Although bean validation is the newer technique, it’s not a replacement for\
    \ the older JSF validation—sometimes it’s very handy to use this “old” validation.\n\
    \nThis chapter covers different kinds of validation.\n\n## Bean Validation\n\n\
    Bean validation uses special constraints that are applied to the fields or accessors\
    \ by annotations. Some of these were mentioned in earlier chapters, when describing\
    \ the `Book` entity in Books. You can get a table of these constraints as part\
    \ of the Java EE 8 tutorial ( [https://javaee.github.io/tutorial/bean-validation.html](https://javaee.github.io/tutorial/bean-validation.html)\
    \ ). A full description of the bean validation is also available at [http://beanvalidation.org](http://beanvalidation.org).\n\
    \nTo further our discussion, Listing 25-1 shows an excerpt of the `Account` entity\
    \ used for the registration process."
