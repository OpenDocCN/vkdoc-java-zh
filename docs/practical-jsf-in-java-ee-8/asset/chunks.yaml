    ###### 清单 12-2 混合字段与方法注解的 JPA 注解


    ```

     1   @Entity

     2   @Table(name = "Category")

     3   public class Category implements Serializable{

     4     @Id

     5     @GeneratedValue(strategy = GenerationType.IDENTITY)

     6     @Column(name = "Id")

     7     private int _id;


     9     private String _name;


    11     @Column(name = "Name")

    12     public String getName() {

    13         return _name;

    14     }

    15  ...

