    | `ul` | Unordered list, a container for list items. Unless overwritten by CSS,\
    \ the contained items are displayed with a bullet point. |\n| `li` | List item.\
    \ |\n| `a` | Anchor, defines a hyperlink. |\n\nOther semantic structure tags include\
    \ `nav` (navigation), `aside`, `main`, `section`, `article`, `footer`, `address`,\
