    50     other.setEmail1(this.getEmail1());\n51     other.setEmail2(this.getEmail2());\
    \                                                                \n52     return\
    \ other;\n53   }\n54   //</editor-fold>\n55 }\n```\n\nThis class is annotated\
    \ by our constraint (line 3). Because we use this interface for the group name,\
    \ too, its class is declared for `groups` again (line 4). Remember, we might have\
    \ used a different interface for the group name.\n\nThe bean implements both `RepeatedEntryHolder`\
    \ and `Clonable`. We need the first for passing into the validator—otherwise,\
    \ the validator would have needed to accept an instance of the `EmailBean` class,\
    \ which prevents generalization. Remember, validation in JSF takes place *before*\
    \ the data is transferred into the model (backing bean). Multi-field validation\
    \ takes place in a copy of the object, which is why we need to clone it. There’s\
    \ no need to copy the email fields because JSF will set them within the clone\
    \ to the current input fields.\n\nAs I hope you can see, this is a lot of effort\
    \ for just validating a field the user needs to repeat. In my opinion, such effort\
    \ is only worthwhile if the validation needs to perform more than just comparing\
    \ two fields. Because I didn’t use the password comparison for this explanation,\
    \ you can guess that I've chosen a different approach for comparing the passwords\
    \ in Alumni. In other words, we won’t use the built-in multi-validation for such\
    \ a simple scenario.\n\n## Self-Made\n\nThe backing bean for the registration\
    \ refers to an account that contains the target password field. This password\
    \ will be compared to another field that will be placed in the form before the\
