  raw: '###### Listing 12-2 Mixed Field and Method-Based JPA Annotation


    ```

     1   @Entity

     2   @Table(name = "Category")

     3   public class Category implements Serializable{

     4     @Id

     5     @GeneratedValue(strategy = GenerationType.IDENTITY)

     6     @Column(name = "Id")

     7     private int _id;


     9     private String _name;


    11     @Column(name = "Name")

    12     public String getName() {

    13         return _name;

    14     }

    15  ...

    ```


    Here the id is mapped by a field-based annotation , whereas the name is mapped
    by a method-based annotation (line 11). NetBeans indicates the problem, but it
    compiles properly! At runtime you may recognize a misbehavior—so why doesn’t it
    break at compile time? Because I didn’t tell the whole truth. The compiler accepts
    this mixed annotation because it might be possible. If and only if you tell JPA
    by special annotations that you’ll use both is it possible to mix it. So, never
    do it. (That’s why I don’t give these annotations away.)


    In developing Books, we need more sophisticated mappings. For example, a category
    will display in a different language. A book is associated with different categories.
    These need to include collections into an entity. As a result, a single Java object
    might map to more than one table.


    Imagine that one Java object describes a car. This object includes a few (for
    example, 3, 4, or 6) wheels held in a list. Now we need a table for all unique
    attributes of the car and a second one for the wheels. In Java, we annotate both
    the car class as well as the wheel class as an entity. We may store the car at
    once. As a rule of thumb, we need one SQL table for all non-transient attributes
    that are primitive types or strings, and another table for each referenced object.
    I talk more about this later in the book.


    ###### Declaring a Category as an Entity


    For Books*,* I used prefixes for the database columns. It’s up to you to enrich
    the existing Category class with the appropriate annotations:


    1.  For column names, use catId and catName.


    2.  Don’t forget to make the Category serializable.


    3.  If you’ve used NetBeans, observe the editor’s output.


    Have you noticed the bulb indicator on the @Entity line? You can see it in Figure
    [12-1](#A435433_1_En_12_Chapter.xhtml#Fig1).


    ![A435433_1_En_12_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_12_Fig1_HTML.jpg)


    ###### Figure 12-1 NetBeans bulb indicator before @Entity


    Hover your mouse pointer over this indicator, and NetBeans will show a popup telling
    you that the project has no “persistence unit” so far. In the next section, we’ll
    talk about that.


    ## Persistence Unit


    As its name suggests, a *persistence unit* (PU) groups together artifacts for
    storage. These are entities that are managed by so-called *entity* *manager* instances.
    Besides that, a PU refers to information about the database connection (*data
    source*) and is described by an XML file. Before continuing, try creating a PU
    in the following exercise.


    ###### Create an Entity with a Persistence Unit


    Using NetBeans, create a new project and add the JSF framework. If you haven’t
    added anything to the freshly created project Books, you can use it here.


    1.  Add a package with the name entities.


    2.  In NetBeans’s project tree, right-click the new package and choose New ➤ Other
    ➤ Persistence ➤ Entity Class.


    3.  NetBeans asks for the name. Choose Category.


    4.  Change the Primary Key Type to int.


    5.  Keep the Create Persistence Unit marker ticked (as shown in Figure [12-2](#A435433_1_En_12_Chapter.xhtml#Fig2))
    and follow NetBeans’s steps to create the persistence unit along with the database
    connection.


    ![A435433_1_En_12_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_12_Fig2_HTML.jpg)


    ###### Figure 12-2 NetBeans dialog to create an entity class


    The preceding exercise will create a persistence unit in conjunction with an entity
    class.


    Alternatively, you can add a persistence unit only by choosing New ➤ Other ➤ Persistence
    ➤ Persistence Unit. NetBeans takes you directly to the New Persistence Unit wizard,
    shown in Figure [12-3](#A435433_1_En_12_Chapter.xhtml#Fig3), which is part of
    the whole flow initiated by the preceding exercise.


    ![A435433_1_En_12_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_12_Fig3_HTML.jpg)


    ###### Figure 12-3 NetBeans dialog to create a persistence unit


    In the wizard, click BooksPU for Persistence Unit Name and EclipseLink for Persistence
    Provider. Don’t care about the current NetBeans (8.2) still offering JPA in version
    2.1\. You may change this later manually within the generated persistence unit.
    For Data Source, choose New Data Source to establish a data source pointing to
    your database. Enter the name **jdbc/books**. When you click Finish, NetBeans
    will create the persistence unit in the src/main/resources/META-INF folder.


    If you don’t use Netbeans or create the persistence unit manually, make sure to
    use this folder for the file persistence.xml. Listing [12-2](#A435433_1_En_12_Chapter.xhtml#PC4)
    shows this file.


    ###### Listing 12-2 persistence.xml


    ```

     1   <?xml version="1.0" encoding="UTF-8"?>

     2   <persistence version="2.2"

     3                            xmlns:="http://xmlns.jcp.org/xml/ns/persistence"

     4                            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

     5                            xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/persistence

     6                            http://xmlns.jcp.org/xml/ns/persistence/persistence_2_2.xsd">

     7        <persistence-unit name="BooksPU" transaction-type="JTA">

     8            <jta-data-source>jdbc/books</jta-data-source>

     9            <exclude-unlisted-classes>false</exclude-unlisted-classes>

    10       </persistence-unit>

    11   </persistence>

    ```


    The namespace definitions depend on the version used for this definition. In Listing
    [12-2](#A435433_1_En_12_Chapter.xhtml#PC4) I manually updated the JPA version
    to 2.2 (lines 2 and 6). The interesting part starts with the tag <persistence-unit>
    (line 7). As you can see, in this example, there are two attributes :


    *   name: In the code, the PU is accessed by this name. By convention, this name
    often ends with *PU*.


    *   transaction-type: In a Java EE environment, this is "JTA". The container manages
    the PU, the *entity* *manager* (EM, explained shortly), and the transactions.
    The alternative value is "RESOURCE_LOCAL". If you choose this, it’s the developer’s
    responsibility to manage the EM and the transactions. This type is intended for
    use with Java SE.


    Besides those two attributes, persistence-unit contains two elements. <jta-data-source>
    declares the data source (explained soon). If the tag <exclude-unlisted-classes>
    is set to false, no class is excluded from the PU. In other words, all classes
    are included by default. If set to true, a list of classes (entities) managed
    by this PU must be provided, as shown in the following lines:


    ```

        <class>de.muellerbruehl.books.entities.Category</class>

        <exclude-unlisted-classes>true</exclude-unlisted-classes>

    ```


    The PU as shown here can be used if your database contains all the tables needed
    for the application, so the tables must be created separately. This is the preferred
    way, if there’s a database administrator responsible for maintaining the database.
    And if you as a Java developer sometimes wear the DB admin cap, it might be your
    preferred way, too.


    But if you don’t like to create DB tables, JPA can perform this job for you. To
    configure a create table-generation strategy, you must add a property within the
    persistence-unit:


    ```

    1   <properties>

    2     <property name="javax.persistence.schema-generation.database.action"

    3               value="create"/>

    4   </properties>

    ```


    Instead of "create", you can use "drop-and-create", which re-creates the tables.


    If you don’t like to remember such long properties, you can usethe NetBeans graphical
    editor for the PU, as shown in Figure [12-4](#A435433_1_En_12_Chapter.xhtml#Fig4).


    ![A435433_1_En_12_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_12_Fig4_HTML.jpg)'
