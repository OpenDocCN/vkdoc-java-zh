  trans: "\n###### 清单 34-13 通过端点 URI 传递参数\n\n```\n 1   @ServerEndpoint(\"/classroomchat/{classroom}\"\
    )\n 2   public class ClassroomChat {\n\n 4     @OnOpen\n 5     public void onOpen(Session\
    \ peer) {\n 6       String classroom = peer.getRequestParameterMap().get(\"classroom\"\
    ).get(0);\n 7       [...]\n 8     }\n\n10     [...]\n\n12   }\n```\n\n这是 Java\
    \ EE 通过 JAX-RS（Java API for RESTful Web Services）所支持的一种风格：URI 的部分内容是可变的，并且可以通过请求参数映射进行访问，如\
    \ `onOpen` 方法所示。非常简单，不是吗？\n\nWebSocket 连接是客户端和服务器之间的一个通道。作为 HTTP 的升级，第一个请求由客户端发起。如果用户伪造\
    \ URI 并选择了一个不同的教室，会发生什么？而且我们希望在每条消息中包含用户信息。你希望有人冒充用户吗？无论如何，这里展示的方法确实很简单，但在安全方面可能无法满足我们的要求。为什么服务器已经知道的信息还要由客户端提供呢？\n\
    \n基于这些考虑，Alumni 采用了不同的方法。用户和教室在服务器端是已知的，因此它们会被注入到端点中。\n\n一旦用户登录到 Alumni，我们就会将会话范围内的对象中的一些信息存储起来，如清单\
    \ 34-14 所示。这里，用户账户和当前选定的毕业班是值得注意的。\n\n###### 清单 34-14 用于保存用户信息的会话范围对象\n\n```\n\
    1   @SessionScoped\n2   public class UserController implements Serializable {\n\
    \n4     private Account _account;\n5     private FinalYear _finalYear;\n\n7     [为简洁起见，省略了\
    \ Getter/Setter 和其他字段]\n8   }\n```\n\n我们将把这个类的一个实例注入到聊天端点中。通过账户可以访问用户的姓名。\n\n\
    ###### 通过 CDI 进行注入\n\n记住 CDI 的一些特性：你可以独立于 bean 的生命周期来注入它。例如，你可以将一个请求范围的 bean 注入到一个会话范围的\
    \ bean 中。尽管会话范围的 bean 通常存活时间超过一个请求，但被注入的 bean 仅在一个请求期间存活。然而，你可以在持有对象的生命周期内访问被注入的\
    \ bean。这难道不矛盾吗？\n\nCDI 通过注入一个代理对象来实现这个技巧。这个代理在包含它的 bean 的整个生命周期内都是可用的。在底层，这个代理在每个请求中指向一个不同的对象。\n\
    \n现在，如果我们尝试为来自用户的每条消息添加前缀，比如 `sendObject(_userController.GetAccount().getDisplayName()+\
    \ \": \" + message)`，我们会遇到一个错误：尽管已经注入，`_userController` 解析为 `null`。\n\n原因很简单：端点将在\
    \ HTTP 请求中创建，即当用户进入教室时。注入的用户控制器包含我们期望的所有值。CDI 实际上并没有注入 `UserController` 类的一个实例，而是注入了一个指向当前请求的活动用户控制器对象的代理。WebSocket\
    \ 通道是通过 HTTP 升级打开的。发起请求正常终止，而通道保持打开状态。现在，如果用户输入一条消息，它会通过 WebSocket 通道发送。由于此时没有\
    \ HTTP 请求，即使用户控制器是会话范围的，CDI 代理也无法引用任何 bean。因此，代理解析为 `null`。\n\n尽管用户控制器是作为代理注入的，但它包含“真正的”对象。Alumni\
    \ 只是将这些对象存储在端点中，瞧，我们就可以使用它们了。除了包和导入语句，清单 34-15 展示了完整的端点类：\n\n###### 清单 34-15 Alumni\
    \ 的教室聊天\n\n```\n 1   @ServerEndpoint(\"/classroomchat\")\n 2   public class ClassroomChat\
    \ {\n\n 4       private static final Map<Integer, Set<Session>> PEERS = new ConcurrentHa\\\
    \n 5   shMap<>();\n 6       private static final Logger LOGGER = Logger.getLogger(ClassroomChat.clas\\\
    \n 7   s.getName());\n\n 9       private ChatService _chatService;\n10       private\
    \ Account _account;\n11       private int _finalYearId;\n\n13       @Inject\n\
    14       public ClassroomChat(UserController user, ChatService chatService){\n\
    15           _account = user.getAccount();\n16           _finalYearId = user.getFinalYear().getId();\n\
    17           _chatService = chatService;\n18       }\n\n20       public ClassroomChat()\
    \ {\n21           LOGGER.log(Level.INFO, \"ctor ClassroomChat\");\n22       }\n\
    \n24       @OnMessage\n25       public void onMessage(String message, Session\
    \ session) {\n26           //String name = session.getUserPrincipal().getName();\n\
    27           for (Session peer : PEERS.get(_finalYearId)) {\n28               try\
    \ {\n29                   peer.getBasicRemote().sendObject(_account.getDisplayName()\
    \ +\\\n30   \": \" + message);\n31               } catch (IOException | EncodeException\
    \ ex) {\n32                   // 如果发生错误，记录问题并继续\n33                   LOGGER.log(Level.SEVERE,\
    \ null, ex);\n34               }\n35           }\n36       }\n\n38       @OnOpen\n\
    39       public void onOpen(Session peer) {\n40           LOGGER.log(Level.INFO,\
    \ \"onOpen ClassroomChat, user {0}\",\n41                                _account.getDisplayName());\n\
    42           if (!PEERS.containsKey(_finalYearId)){\n43             PEERS.put(_finalYearId,\n\
    44                              Collections.synchronizedSet(new HashSet<>()));\n\
    45           }\n46           PEERS.get(_finalYearId).add(peer);\n47           sendLatestMessages(peer);\n\
    48       }\n\n50       private void sendLatestMessages(Session peer) {\n51           List<String>\
    \ messages = _chatService.getLatestMessages(_finalYearId);\n52           for (String\
    \ message : messages) {\n53               try {\n54                   peer.getBasicRemote().sendObject(message);\
    \                                                          \n55               }\
    \ catch (IOException | EncodeException ex) {\n56                   // 如果发生错误，记录问题并继续\n\
    57                   LOGGER.log(Level.SEVERE, null, ex);\n58               }\n\
    \n60           }\n61       }\n\n63       @OnClose\n64       public void onClose(Session\
    \ peer) {\n65           LOGGER.log(Level.INFO, \"onClose ClassroomChat, user {0}\"\
    ,\n66                                 _account.getDisplayName());\n67           PEERS.get(_finalYearId).remove(peer);\n\
    68       }\n\n70   }\n```\n\n在第 13 和 14 行，我们存储了对用户和毕业班的引用，这些引用是作为 `userController`\
    \ 的一部分注入的。除了 `UserController` 的一个实例外，还注入了 `ChatService` 的一个实例。与用户控制器不同，这个代理直接存储在一个字段中（第\
    \ 15 行）。我们是否会遇到前面描述的代理问题？顾问的标准答案会是：“这取决于……”\n\n如果我们将 `ChatService` 定义为一个短（请求）范围的\
    \ CDI bean，如清单 34-16 所示，我们会遇到 `ContextNotActiveException` 异常。\n\n###### 清单 34-16\
    \ 作为请求范围 CDI Bean 的 ChatService\n\n```\n1   @RequestScoped\n2   @Transactional\n\
    3   public class ChatService extends AbstractService {\n4   ...\n5   }\n```\n\n\
    将范围扩展到会话范围并不能解决这个问题：这样的范围存储在请求的会话映射中，而可能没有请求存在。\n\n有两种可能的解决方案。你可以将服务定义在应用程序范围内。或者，如果你不想使用生命周期如此长的全局对象，你可以使用无状态\
    \ EJB，如清单 34-17 所示。\n"
- fmt: "###### Listing 34-17 `ChatService` as Stateless EJB\n\n```\n1   @Stateless\n\
    2   public class ChatService extends AbstractService {\n3   ...\n4   }\n```\n\n\
    Comparing this with the simple chat, there are three extensions: `Alumni` uses\
    \ a map to hold the peers per classroom. Every message is prefixed by the username.\
    \ And, last but not least, all messages are saved to the database, allowing us\
    \ to reply to the latest messages on entering the classroom.\n\nListing [34-18](#A435433_1_En_34_Chapter.xhtml#PC18)\
    \ shows the corresponding part from the service.\n\n###### Listing 34-18 `ChatService`\
    \ (Excerpt)\n\n```\n 1   @Stateless\n 2   public class ChatService extends AbstractService\
    \ {\n\n 4     public ChatEntry saveChatEntry(ChatEntry chatEntry) {\n 5      \
    \ return save(chatEntry);\n 6     }\n\n 8     public ChatEntry saveChatEntry(int\
    \ finalClassId, int accountId, String message) {\n 9       ChatEntry chatEntry\
    \ = new ChatEntry(finalClassId, accountId, message);\n10       return save(chatEntry);\n\
    11     }\n\n14     /**\n15      * retrieves latest 10 messages which are not older\
    \ than 2 hours\n16      *\n17      * @param finalYearId\n18      * @return\n19\
    \      */\n20     public List<String> getLatestMessages(int finalYearId) {\n21\
    \       String jpql = \"Select concat(a._firstName, ' ', a._lastName, ': ', e._message)\
    \ \"\n22               + \"from ChatEntry e \"\n23               + \"join Account\
    \ a \"\n24               + \"where e._accountId = a._id \"\n25               +\
    \ \"and e._finalYearId = :finalYearId \"\n26               + \"and e._moment >\
    \ :refMoment order by e._id desc\";\n27       TypedQuery<String> query = getEntityManager().createQuery(jpql,\
    \ String.class);\n28       query.setParameter(\"finalYearId\", finalYearId);\n\
    29       query.setMaxResults(10);\n30       Date refMoment = new Date(new Date().getTime()\
    \ - 2 * 3600 * 1000);\n31       query.setParameter(\"refMoment\", refMoment);\n\
    32       List<String> messages = query.getResultList();\n33       return Lists.reverse(messages);\n\
    34     }\n\n36   }\n```\n\n## JSF 2.3 websocket\n\nOne of the highlights of JSF\
    \ 2.3, as introduced in Java EE 8, has been its support for the WebSocket protocol.\
    \ Formerly, JSF only used one-way communication from client to server as caused\
    \ by the HTTP protocol. Sending data from server to client without any client\
    \ request was a challenge for many years. The WebSocket protocol is one solution\
    \ to this restriction. It was the main intention to push messages from server\
    \ to client when the `<f:websocket>` tag was introduced to JSF 2.3. Currently,\
    \ this tag doesn’t enable the full advantages of this bidirectional protocol.\
    \ Rather, it establishes one-way communication from server to client. If we need\
    \ a bidirectional communication with JSF functionality only, we might send data\
    \ from client to server the traditional way, by using an `inputText` in conjunction\
    \ with Ajax. We’ll receive data via websocket. Because this workaround only mimics\
    \ bidirectional communication using different protocols, `Alumni`’s chat doesn’t\
    \ use the new JSF websocket. To sketch for you the principle of this new tag,\
    \ Listing [34-19](#A435433_1_En_34_Chapter.xhtml#PC19) starts with the page.\n\
    \n###### Listing 34-19 Using websocket in a Page\n\n```\n 1        <f:websocket\
    \ channel=\"events\" onmessage=\"eventListener\" />\n\n 3        <script type=\"\
    text/javascript\">\n 4          function eventListener(message, channel, event)\
    \ {\n 5            document.getElementById(\"lastEvent\").innerHTML += message\
    \ + \"<br/>\";\n 6          }\n 7        </script>                           \
    \                               \n\n 9        <h:outputLabel value=\"Last event:\"\
    />\n10        <h:outputText id=\"lastEvent\" value=\"\"/>\n```\n\nIn line 1 the\
    \ websocket tag subscribes to the channel events. This name has to correspond\
    \ to the channel name you use on the server side. It may be any valid name of\
    \ your choice. The `onmessage` attribute refers to a JavaScript function you need\
    \ to implement for the data handling. In this simple demo code, we use the message\
    \ to replace the content of the `outputText` we declared in line 10.\n\nOn the\
    \ server side, we need a `PushContext`, which simply can be injected (see line\
    \ 5 of Listing [34-20](#A435433_1_En_34_Chapter.xhtml#PC20)). Here we need to\
    \ provide the channel name. Now we can send messages via this channel to the client\
    \ (lines 8–10).\n\n###### Listing 34-20 `PushContext` as Source for websocket\n\
    \n```\n 1  @Named\n 2  @ApplicationScoped\n 3  public class EventPatcher {\n\n\
    \ 5    @Inject @Push(channel = \"events\")\n 6    private PushContext _pushContext;\n\
    \n 8    public void sendMessage(String message){\n 9      _pushContext.send(message);\n\
    10   }\n\n12 }\n```\n\nWhen the first client uses this channel, the WebSocket\
    \ communication will be established. Sending a message is like a broadcast. All\
    \ clients that have subscribed to this channel will receive the message. The channel\
    \ automatically closes on application shutdown, so the `PushContext` needs to\
    \ be injected into an application scoped bean.\n\nLast but not least, you need\
    \ to enable the WebSocket endpoint via `web.xml`.\n\n###### Listing 34-21 context\
    \ param as Part of `web.xml`\n\n```\n 1   <context-param>\n 2     <param-name>javax.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>\n\
    \ 3     <param-value>true</param-value>\n 4   </context-param>\n```\n\nPushing\
    \ some content to all users is the most common operational area. Because of that,\
    \ application scope is the default scope for using websocket within JSF. Anyway,\
    \ you can restrict the channel to session or view. Or you can restrict it to a\
    \ specified user, which forces the session scope too. (For more information, read\
    \ the API doc at [https://javaserverfaces.github.io/docs/2.3/vdldoc/f/websocket.html](https://javaserverfaces.github.io/docs/2.3/vdldoc/f/websocket.html)\
    \ ).\n\nThe JSF websocket tag is great if you want to implement a news ticker\
    \ or something similar. There’s no such requirement for `Alumni`. Take the explanation\
    \ given here as starting point for your own experiments.\n\n## Summary\n\nThis\
    \ chapter introduced the main aspects of the WebSocket protocol and its use within\
    \ `Alumni`. This chat implementation of `Alumni` is fine with Java EE 8, but it\
    \ only uses techniques that are available in the former Java EE 7 implementation.\n\
    \nJSF 2.3, which is part of Java EE 8, now directly supports the WebSocket protocol,\
    \ but `Alumni` doesn’t use it. The primary intent of the current JSF WebSocket\
    \ implementation is to push messages from the server to the client. This adds\
    \ unidirectional communication from server to client. `Alumni`, on the other hand,\
    \ uses bidirectional communication.\n\n© Michael Müller 2018\n\nMichael Müller,\
    \ Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_35](#A435433_1_En_35_Chapter.xhtml)\n\
    \n# 35. Changing Look and Feel\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nSometimes users love to exchange the look and feel of an application,\
    \ for example by choosing a different theme. The question arises, how can we change\
    \ the look and feel of an application without changing the program code? If we\
    \ separated content and layout with CSS, it seems as easy as choosing a different\
    \ CSS file.\n\n## Resource Library\n\nIn practice, the layout might depend not\
    \ only on a single CSS file, but on a couple of CSS files as well as related script\
    \ files or other resources. Let’s recap Chapter [10](#A435433_1_En_10_Chapter.xhtml):\
    \ JSF is able to group a bundle of resources into a library. In fact, such a library\
    \ is represented by the content of a folder. If we use the same directory structure\
    \ for every library, we don’t need to provide different names for all the resource\
    \ files, just the library name.\n\nIn the Facelet template `alumniTemplate.xhtml`,\
    \ we’ll retrieve the appropriate library from a backing bean, as shown in Listing\
    \ [35-1](#A435433_1_En_35_Chapter.xhtml#PC1)."
