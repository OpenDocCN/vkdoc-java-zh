    .) Its new name is Jakarta EE.


    The transition of NetBeans from Oracle to Apache is an ongoing process. Instead
    of releasing new versions for Java 9 and for Java EE 8, the process has stuck
    on clearing license information. As a result, this great IDE is available as a
    beta version at the time of writing, but sadly without the Java EE 8 features.
    The Java EE stuff will be part of a second donation from Oracle. That’s why you
    still get NetBeans 8.2 as the latest release, which includes Java EE out of the
    box.


    Luckily it’s not a big problem to update the application server and prepare NetBeans
    for Java EE 8 development. I hope that by the time this book is in your hands,
    NetBeans will be available for Java EE 8 to prevent this upgrade step. I’m going
    to provide some updated information on my blog, when available.


    However, knowing how to update parts of the environment is always helpful.


    ## Upgrade the Application Server


    Although Oracle stopped its commercial support for GlassFish, this application
    server still is used for the Java EE 8 reference implementation (RI). GlassFish
    5 is available for download at [https://javaee.github.io/glassfish/download](https://javaee.github.io/glassfish/download)
    . Just download the GlassFish 5 full platform and unzip the file to any folder
