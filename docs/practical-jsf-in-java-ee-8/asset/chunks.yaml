    \ TinyCalculator 类的构造过程：\n\n    ```\n    1   private static final Logger LOGGER\
    \ = Logger.getLogger(\"TinyCalculator\");\n    2   public TinyCalculator() {\n\
    \    3       LOGGER .log(Level.INFO, \"ctor TinyCalculator\");\n    4   }\n  \
    \  ```\n\n2.  启动应用程序，并观察 NetBeans 控制台窗口。\n\n3.  执行一些计算，然后关闭并重新打开浏览器和应用程序。\n\n\
    4.  再执行一些计算。\n\n5.  现在，将 @RequestScoped 注解依次替换为 @SessionScoped 和 @ApplicationScoped，并执行相同的操作。\n\
    \n6.  观察不同的输出结果。\n\n您是否观察到控制台输出了 \"ctor TinyCalculator\" 这条消息（*ctor* 是 *constructor*\
    \ 的缩写）？您也会在日志中找到这条消息。使用 @RequestScoped 注解时，每次请求都会出现一次该消息。使用 @SessionScoped 时，该消息仅在新会话（例如关闭并重新启动浏览器后）中出现。使用\
    \ @ApplicationScoped 时，该消息仅在应用程序启动后首次调用该 bean 时出现。\n\n这些计算方法可能看起来很奇怪。它们不是返回计算值的函数，而是返回字符串并通过更改结果变量的状态来执行计算的方法。原因很简单：计算是在相应按钮的操作中调用的。此类操作会执行页面导航。返回空字符串或\
    \ null 会使浏览器“停留在”当前页面。实际上，此页面将被重新加载（我将在本书后续章节详细讨论页面导航）。如果使用 JSF 2.2 或更高版本，此类函数也可以声明为\
    \ void。\n\n### 页面\n\n我不想提前讨论下一章中将要出现的详细解释。我只想指出，页面将被渲染为 HTML 并发送到浏览器。如果您熟悉 HTML，您只会识别出一些\
    \ HTML 元素。JSF 最初的意图是为程序员提供一种熟悉的界面，从而隐藏 HTML 的那些细节。因此，JSF 提供了一组自己的标签，这些标签包含在页面中，并在页面发送到浏览器之前被替换。这些标签是常规的\
    \ XML 标签，分配给相应的命名空间：\n\n```\n1   <h:outputLabel value=\"Param1: \"/>\n2   <h:inputText\
    \ value=\"#{tinyCalculator.param1}\"/>\n```\n\n这是一个值为“Param1:”的标签（文本），后面跟着一个文本元素。文本元素的值从我们的\
    \ bean 中检索并发送回 bean。`#{…}` 表示表达式语言（EL），用于将用户界面的各个部分与托管 bean 连接起来。`tinyCalculator`\
    \ 引用我们的 bean——默认情况下，EL 使用首字母小写的 bean 名称，后跟点号表示法和引用的方法。对于属性，这建立了与 getter/setter\
    \ 对的双向通信。`Name` 指的是 `getName` 和 `setName`（省略了 get 和 set 前缀）。因此，文本元素读取和写入该属性：\n\
    \n```\n1   <h:commandButton value=\"Add\" action=\"#{tinyCalculator.add}\"/>\n\
    ```\n\n对于按钮，每个操作都定义了一个计算方法。\n\n###### 注意\n\n从 JSF 2.2 开始，引入了一种替代方法，减少了 JSF 特定的标签，并使用了更多纯\
    \ HTML。这被称为 *HTML 友好标记*，或者更常见的是 *HTML5 友好标记*，尽管它并非 HTML5 所特有。\n\n### 代码与视图之间的关系\n\
    \n从解释中应该可以理解浏览器视图、页面定义和托管 bean 之间的大致关系。但一张图片，如图 1-9 所示，胜过千言万语。\n\n![A435433_1_En_1_Fig9_HTML.jpg](img/A435433_1_En_1_Fig9_HTML.jpg)\n\
    \n###### 图 1-9 代码与视图之间的大致关系\n\n`<inputText ...>` 标签表示浏览器中的一个文本字段。其值绑定到 bean 的\
    \ getter/setter 对。当 JSF 渲染页面时，它会调用 getter 来检索输入字段的值。点击操作按钮后，页面内容会被发送到服务器（在底层使用\
    \ HTTP POST）。JSF 通过使用 setter 将数据传输到模型（我们的 bean）中。\n\n###### 注意\n\n前面展示的简化演示有助于初步理解\
    \ JSF，但它忽略了一个重要事实：组件树。在处理请求时，所有 JSF 组件都保存在一个树形数据结构中。根据应用程序的增强功能，直接访问或操作此组件树可能很有用。我将在本书后续章节更详细地讨论组件树。\n\
    \n## 总结\n\n在本章中，我们创建了第一个小型 JSF 应用程序。为了快速获得结果，本应用程序以分步教程的形式介绍，随后进行了简要讨论。\n\n还有很多需要解释的内容，包括\
    \ NetBeans 在底层为我们构建的配置，我们通过简单地更改项目属性对其进行了修改。本章只是一个开胃菜——一个快速入门。从下一章开始，我将讨论 JSF\
    \ 及其相关技术的基础知识。\n\n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java\
    \ EE 8 , `doi.org/10.1007/978-1-4842-3030-5_2`\n\n# 2. 基础\n\nMichael Müller^(1 )\n\
    \n(1)德国北莱茵-威斯特法伦州布吕尔\n\n对于 Web 开发，会用到几种不同的技术。本章讨论其中一些技术的基础知识，并提及其他重要技术，包括以下内容：\n\
    \n*   Web 应用程序\n\n*   超文本传输协议（HTTP）\n\n*   超文本标记语言（HTML）\n\n*   层叠样式表（CSS）\n\n\
    *   JavaScript\n\n*   Java\n\n*   Maven\n\n*   Selenium 和 Arquillian\n\n*   Servlet\n\
    \n*   部署\n\n## Web 应用程序\n\n当我在本书中使用 *Web 应用程序* 这个术语时，我遵循以下定义：\n\n> *Web 应用程序是一种通过\
    \ Web 浏览器与用户动态交互的客户端-服务器应用程序。*\n\n因此，我们讨论的是不同的部分：呈现用户界面的客户端，以及执行应用程序主要部分的服务器。客户端通过互联网连接到服务器。应用程序逻辑可以分层组织，并在客户端和服务器之间拆分。为了获得更灵敏的用户体验，一些代码在客户端执行。与使用专门编程的客户端的应用程序不同，这里使用通用的\
    \ Web 浏览器来显示表示层。这意味着我们无法管理每一个细节。相反，我们必须依赖浏览器的功能，其主要功能是检索和显示 HTML 页面等内容。HTML 页面不仅包含文本信息，还包括图像、媒体文件等。除了内容之外，浏览器还需要处理布局，并可选择执行脚本代码。我们将所有这些内容发送到浏览器，但我们无法完全控制其行为。\n\
    \n一个仅提供静态页面的简单 Web 服务器，对于本书的目的而言，并不是一个 Web 应用程序。但是，通过使用标准 Web 浏览器，Web 应用程序可以在任何（现代）浏览器可用的平台上使用。Web\
    \ 浏览器通过 HTTP 连接到 Web 服务器。因此，Web 应用程序必须处理此协议的一些限制，如下一节所述。\n"
- fmt: '# HTTP


    The Hypertext Transfer Protocol is a logical transport layer (*application protocol*),
    acting on a stack of other layers, down to the physical transport layer. Usually
    HTTP is used atop TCP/IP. As the name suggests, it was primarily designed to distribute
    hypertext information. As such, it is the foundation of the World Wide Web.


    HTTP is a stateless request-response protocol. A server is listening for a request
    and sends back a response, as illustrated in Figure [2-1](#A435433_1_En_2_Chapter.xhtml#Fig1).
    Then the communication terminates.


    ![A435433_1_En_2_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_2_Fig1_HTML.jpg)


    ###### Figure 2-1 HTTP request-response cycle


    The simplified illustration in Figure [2-1](#A435433_1_En_2_Chapter.xhtml#Fig1)
    shows a typical request-response cycle as triggered by the user when retrieving
    a page. In fact, the response is an HTTP response, composed of a message header
    and body, that might carry information other than HTML, such as JSON, XML, or
    something else.


    Any subsequent request acts independently of the prior ones. This kind of protocol
    affects the way a web application works with its clients. To proceed with a user
    session of the application, a session management needs to be implemented on top
    of HTTP. The goal of this session management is to remember the current state
    of the application. Either the server needs to store application’s state somewhere
    and provides key information to the client, or the server transfers the complete
    state information to the client.


    For the latter approach, there’s nothing to remember on the server side. Any status
    might be restored by the information the client provides during a subsequent request.
    Such an approach keeps memory consumption on the server lean. Sending lots of
    information over the web has some important drawbacks. Latency will slow down
    the application. Another drawback involves security. If the network transport
    isn’t secured by a protocol like Transport Layer Security (TLS), then the information
    sent might be read by unauthorized persons. Saving the whole state to the client
    avoids “sticky” sessions: the next request might be processed by a different server
    behind a load balancer.


    The first approach just mentioned is to keep all information on the server and
    send only an identifier to the client. Such an identifier is called a *session
    id*. Common possible ways to convey a session id are by using a hidden field or
    sending an HTTP cookie. If the server holds the state, the session needs to be
    continued by the same server unless you implement a solution to share this state
    information between different servers. For example, the app state might be saved
    within a shared key-value store and can be restored by any server that receives
    the session id. In practice, a modern server might serve a few dozens or a hundred
    thousand sessions per day. So, in many scenarios, such “sticky” sessions won’t
    matter.


    ###### Session Hijacking


    Due to the nature of the HTTP, the server needs information like the session id
    to determine how to proceed. If an unauthorized person (such as a cracker—meaning
    *criminal hacker*) captures this information, they could take over the session.
    That’s called *session hijacking*. JSF offers some additional features to secure
    your application.


    Luckily, session management is implemented by the Java environment. Within servlet/JSF
    configuration, it’s possible to choose between client or server state.


    During a request, HTTP addresses a Uniform Resource Identifier (URI). Additionally,
    it tells the server which HTTP method to use. This is often called a *verb*. The
    most interesting methods for use with JSF are GET and POST.


    ###### URI, URL, URN


    Some people say a Uniform Resource Identifier (URI) is commonly used in the context
    of REST (short for *REpresentational State Transfer,* discussed in Chapter [24](#A435433_1_En_24_Chapter.xhtml)),
    and a web page is addressed by something called a Uniform Resource Locator (URL).
    But indeed, a URI might be either a URL or a Uniform Resource Name (URN). You
    can read more about URNs at [www.ietf.org/rfc/rfc3986.txt](http://www.ietf.org/rfc/rfc3986.txt).


    Addressing web pages as well as addressing a resource according to the REST programming
    style deals with locations, not with names. Thus, in both contexts we use URLs.
    And because any URL is a URI, I use URI in this book.


    GET queries information from the server by use of a URI. Additional parameters
    might be appended to the URI—for example, [http://it-rezension.de/Books/books.xhtml?catId=2](http://it-rezension.de/Books/books.xhtml%3FcatId=2).
    That addresses the server found at it-rezension.de, and within that, the application
    and page Books/books.xhtml. A parameter `catId=2` is appended.


    With a POST request, information is sent to the server within the body of the
    request—for example, a web form (HTML) contains some input fields and a submit
    button. Hitting this button initiates a POST request.


    Within the context of REST, the methods (verbs) PUT and DELETE are important too.
    The idea behind REST is to assign defined actions to the verbs. Although this
    book is about JSF, and a pure JSF application won’t use REST, the Alumni application
    I describe in Chapter [24](#A435433_1_En_24_Chapter.xhtml) is not a monolithic
    application. Rather, it takes advantage of a service with an API that follows
    the REST concept.


    # HTML


    HTML is used to describe the content of a web page. Like XML, HTML is derived
    from the Standard Generalized Markup Language (SGML).


    As a Java developer, I assume you’re familiar with XML. Like XML, HTML uses tags
    to structure the content of a page. Within XML you may define any tag of your
    choice and assign any meaning to it. Unlike XML, HTML tags are predefined and
    have special relevance. For example, `<head>` denotes the header of a HTML file,
    `<p>` denotes a paragraph, and so forth. Thus, HTML is not extensible in the sense
    that XML is.


    ###### Tag Guessing


    In one way, HTML is less restrictive than XML: missing closing tags aren’t flagged
    as errors but are automatically closed. Browsers try to handle overlapping tags.
    Some people praise this behavior because it means writing less markup, takes less
    work, less data is transferred, and pages load faster (but will a few less characters
    really make a page load faster?).


    Different browsers may handle missing or interlaced tags in a different way, and
    guessing how to complete the missing parts sometimes results in dangerous code.
    (Check out *The Tangled Web* by Michael Zalewski (No Starch Press, 2011) for more
    on that.) To avoid this bunch of problems, I advise you to use XHTML, a variant
    of HTML redefined on XML. XML requests that you close every opened tag. Besides
    avoiding the problem just mentioned, this enforces well-formed documents that
    might be processed by XML tools if administrable.


    An HTML document starts with a `<DOCTYPE>`, followed by exactly one `<HTML>` tag.
    Then `<HEAD>` and `<BODY>` tags might be included. In the case of XHTML, the `<DOCTYPE>`
    is preceded by the XML version, as shown in Listing [2-1](#A435433_1_En_2_Chapter.xhtml#PC1).


    ###### Listing 2-1 Sample HTML Page with Form


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html>

     4       <head>

     5           <title>TinyCalculator</title>

     6       </head>

     7       <body>

     8           <h1>TinyCalculator</h1>

     9           <form>

    10               <div>

    11                   <label>Param1: </label>

    12                   <input type="text" value="0.0" />

    13               </div>

    14           </form>

    15       </body>

    16   </html>

    ```


    You can read more about HTML, including a commented list of important tags, in
    Appendix A.'
