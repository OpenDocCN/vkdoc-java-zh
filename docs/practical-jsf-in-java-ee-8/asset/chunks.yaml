    # 6. Configuration Files


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    When we created TinyCalculator, NetBeans generated some config files. Depending
    on the application, these files or some others are used by Java EE to configure
    its behavior. This chapter provides an overview of these configuration files.


    ## pom.xml


    POM stands for Project Object Model. This file is related to Maven, which is,
    as mentioned before, beyond this book’s scope. I can only explain the most important
    content to convey information about libraries used in the projects. This will
    enable you to include these libraries in the build tool of your choice.


    Thus, I’ll only list snippets of the POM—like Listing [6-1](#A435433_1_En_6_Chapter.xhtml#PC1),
    which is part of the TinyCalculator project. The POM is located in the root folder
    of each project.


    ###### Listing 6-1 Dependency within Maven POM


    ```

    1   ...

    2   <dependency>

    3       <groupId>javax</groupId>

    4       <artifactId>javaee-web-api</artifactId>

    5       <version>7.0</version>

    6       <scope>provided</scope>

    7   </dependency>

    8   ...

    ```


    Consider line 5 of listing [6-1](#A435433_1_En_6_Chapter.xhtml#PC1): I suggested
    downloading the NetBeans Java EE bundle. As the time of this writing, NetBeans
    8.2 is still the latest released version. It’s bundled with GlassFish 4.1, a Java
    EE 7-compliant server. Thus the version I showed earlier is still 7.


    Before moving on with the next application (called Books), I’ll show you how to
    update the server. For Java EE 8, you need to provide 8.0 for the version number.'
