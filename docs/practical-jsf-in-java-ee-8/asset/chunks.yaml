    \ the foundations of JSF and its related technologies.\n\n© Michael Müller 2018\n\
    \nMichael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_2](#A435433_1_En_2_Chapter.xhtml)\n\
    \n# 2. Foundations\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen, Germany\n\
    \nFor web development, a few different technologies are used. This chapter discusses\
    \ the basics of some of those and mentions other important technologies, including\
    \ the following:\n\n*   Web applications\n\n*   Hypertext Transfer Protocol (HTTP)\n\
    \n*   Hypertext Markup Language (HTML)\n\n*   Cascading Style Sheets (CSS)\n\n\
    *   JavaScript\n\n*   Java\n\n*   Maven\n\n*   Selenium and Arquillian\n\n*  \
    \ Servlets\n\n*   Deployment\n\n## Web Applications\n\nWhen I use the term *web\
    \ application* in this book, I’m going by the following definition :\n\n> *A web\
    \ application is a client-server application interacting dynamically with the\
    \ user via a web browser.*\n\nThus, we are talking about distinct parts: the client,\
    \ presenting the user interface, and the server, executing the main part of the\
    \ application. The client is linked to the server via the Internet. The application\
    \ logic may be organized in layers and split between client and server. To get\
    \ a more responsive user experience, some bits are executed on the client side.\
    \ Unlike an application using a specially programmed client, a common web browser\
    \ is used to display the presentation layer. That means we can’t manage every\
    \ detail. Instead, we have to rely on the browser’s functionality, which mainly\
    \ is to retrieve and display such content as HTML pages. An HTML page doesn’t\
    \ only include text information, but images, media files, and more. Besides the\
    \ content, the browser needs to handle the layout and, optionally, execute script\
    \ code. We send all this stuff to the browser, but we can’t control all of its\
    \ behavior.\n\nA simple web server, only delivering static pages, is not a web\
    \ application for the purposes of this book. But by using a standard web browser,\
    \ a web application might be used on any platform for which a (modern) browser\
    \ is available. A web browser is connected to a web server via HTTP. Because of\
    \ that, a web application has to deal with some of the restrictions of this protocol,\
    \ as described in the next section."
