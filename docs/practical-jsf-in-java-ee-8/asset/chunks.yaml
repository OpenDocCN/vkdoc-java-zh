    \ {\n40     websocket.send(element.value);\n41     element.value = \"\";\n42     return\
    \ true;\n43   }\n```\n\n现在我们的简易聊天应用已经准备就绪。编译并启动应用程序。输入一些文本并按回车键：文本会出现在输出区域。在第二个浏览器中打开该应用并输入更多文本：这些文本会出现在所有浏览器的输出字段中。\n\
    \n我们来谈谈这是如何工作的。当页面加载时，会调用 `invokeConnection` 方法。该方法会建立一个到服务器的 WebSocket 通信通道，并注册两个方法。`onMessage`\
    \ 用于处理常规消息，`onError` 用于处理错误。每当客户端收到来自服务器的消息（通过广播发送）时，它会获取用于输出的文本区域，并将消息追加进去。如果达到某个最大值，它会组合最后几条消息的输出。\n\
    \n每当用户在输入字段中按下回车键时，会调用 `acceptValue` 方法。消息被发送到服务器，输入字段被清空以接受新值。\n\n到目前为止，我们使用自\
    \ Java EE 7 以来就有的技术创建了一个非常简单的聊天应用。Java EE 8 为 JSF 添加了 WebSocket，我将在本章末尾讨论这一点。在简易聊天的第一个版本中，任何消息都由一个\
    \ Tyrus 会话广播。接下来，我将展示如何自行处理广播。你会意识到这实际上并不是广播：正如我所说，WebSocket 是两个对等端之间的全双工通信协议。为了模拟广播，服务器需要将消息发送给每个对等端。\n\
    \n每次在浏览器中打开 URL 时，都会创建我们服务器端点的一个实例。如果你停留在该页面上，可以重用现有的端点。如果你想验证这一行为，只需添加一个默认构造函数并报告构造过程，如清单\
    \ 34-8 所示。\n\n###### 清单 34-8 通过简短的构造函数消息观察对象创建\n\n```\n1   public SimpleChat()\
    \ {\n2     System.out.println(\"ctor SimpleChat\");\n3   }\n```\n\n使用 Glassfish/Payara\
    \ 时，输出会被记录。你也可以改用日志记录器。使用 NetBeans 时，你可以直接在 IDE 的输出窗口中观察此日志。\n\n每个用户都会创建该类的一个实例。每个对象都与一个客户端相关联。因此，如果我们想向所有客户端广播一条消息，那么每个端点都需要知道其他端点的存在。为此，每个想要参与聊天的对等端会话都需要在一个公共位置注册自己。执行此任务的最简单方法是使用一个静态的对等端会话集合，如清单\
    \ 34-9 所示。\n\n###### 清单 34-9 用于保存所有会话的 HashSet\n\n```\n1   private static final\
    \ Set<Session> peers =\n2         Collections.synchronizedSet(new HashSet<Session>());\n\
    ```\n\n在会话的开始和结束时，有一个我们可以观察到的事件。为了将一个方法连接到这些事件之一，我们需要用 `@OnOpen` 或 `@OnClose`\
    \ 注解一个方法。这些方法需要接受一个会话参数，这意味着这些方法是注册和注销对等端会话的完美候选。参见清单 34-10。\n\n###### 清单 34-10\
    \ 注册/注销对等端的方法\n\n```\n1   @OnOpen\n2   public void onOpen(Session peer) {\n3     peers.add(peer);\n\
    4   }\n\n6   @OnClose\n7   public void onClose(Session peer) {\n8     peers.remove(peer);\n\
    9   }\n```\n\n一旦我们注册了所有对等端，我们只需要在 `@OnMessage` 期间遍历它们，并将消息发送给每个对等端。为此，我们使用 `getBasicRemote()`\
    \ 来获取对远程端点的引用，以便同步发送数据，如清单 34-11 所示。还有第二种方法 `getAsyncRemote()`，可用于异步发送数据。\n\n\
    ###### 清单 34-11 通过向每个对等端发送消息来实现广播\n\n```\n 1   @OnMessage\n 2   public void onMessage(String\
    \ message) {\n 3     for (Session peer : peers) {\n 4       try {\n 5         peer.getBasicRemote().sendObject(message);\n\
     6       } catch (IOException | EncodeException ex) {\n 7         // 在此处记录、处理或忽略异常\n\
     8       }\n 9     }\n10   }\n```\n\n你可能已经注意到 `onMessage()` 方法的不同签名。我们不需要会话参数，因此可以使用不带该参数的重载方法签名。\n\
    \n为了方便起见，清单 34-12 显示了完整的端点类（不含导入语句）。\n\n###### 清单 34-12 完整的 SimpleChat（省略导入语句）\n\
    \n```\n1   @ServerEndpoint(\"/simplechat\")\n 2   public class SimpleChat {\n\n\
     4     private static final Set<Session> peers =\n 5           Collections.synchronizedSet(new\
    \ HashSet<Session>());\n\n 7     @OnMessage\n 8     public void onMessage(String\
    \ message) {\n 9       for (Session peer : peers) {\n10         try {\n11           peer.getBasicRemote().sendObject(message);\n\
    12         } catch (IOException | EncodeException ex) {\n13           // 在此处记录、处理或忽略异常\n\
    14         }\n15       }\n16     }\n\n18     @OnOpen\n19     public void onOpen(Session\
    \ peer) {\n20       peers.add(peer);\n21     }\n\n23     @OnClose\n24     public\
    \ void onClose(Session peer) {\n25       peers.remove(peer);\n26     }\n27   }\
    \ \n```\n\n## 教室聊天\n\n让我们回到 Alumni 应用。我们希望在每条消息前加上发送该消息的用户，并且需要为不同的班级处理不同的聊天室。\n\
    \n学生会长大并成为大学生。他们可能会改变居住地、学校和大学。总而言之，随着时间的推移，一个人可能属于不同的班级，由最终班级标识。一旦用户登录，他们可以选择一个班级并进入专用的虚拟教室。在每个教室中，Alumni\
    \ 提供一个黑板、一个活动日历和一个聊天功能。\n\n我们不想为每个班级实现一个单独的端点。相反，我们希望使用单个端点，并通过最终班级来区分聊天。\n\n\
    一种解决方案是在端点 URI 中提供教室信息。假设教室由一个名称标识。代码可能类似于清单 34-13 中的摘录。\n"
- fmt: "### Listing 34-13: Pass Parameter via Endpoint URI\n\n```java\n@ServerEndpoint(\"\
    /classroomchat/{classroom}\")\npublic class ClassroomChat {\n\n    @OnOpen\n \
    \   public void onOpen(Session peer) {\n        String classroom = peer.getRequestParameterMap().get(\"\
    classroom\").get(0);\n        [...]\n    }\n\n    [...]\n\n}\n```\n\nThis is quite\
    \ the style Java EE supports by JAX-RS (Java API for RESTful Web Services): parts\
    \ of the URI are variable and will be accessible via the request parameter map,\
    \ as shown in the `onOpen` method. Really easy, isn’t it?\n\nThe WebSocket connection\
    \ is a channel between the client and the server. As an upgrade from HTTP, the\
    \ first request is initiated by the client. What happens if the user fakes the\
    \ URI and chooses a different classroom? And we want to include the user in each\
    \ message. Do you want somebody to spoof the user? Regardless, the approach shown\
    \ here is really simple, but it might not fit our requirements with regard to\
    \ matters of security. Why should the client provide information the server already\
    \ knows?\n\nWith these thoughts in mind, Alumni uses a different approach. User\
    \ and classroom are well known on the server side, so they’ll be injected into\
    \ the endpoint.\n\nOnce the user is logged in to Alumni, we store some information\
    \ within a session scoped object, as shown in Listing [34-14](#A435433_1_En_34_Chapter.xhtml#PC14).\
    \ Here, the user account and the currently selected final class are of note.\n\
    \n### Listing 34-14: Session Scoped Object to Hold User Information\n\n```java\n\
    @SessionScoped\npublic class UserController implements Serializable {\n\n    private\
    \ Account _account;\n    private FinalYear _finalYear;\n\n    [Getter/Setter and\
    \ other fields omitted for brevity]\n}\n```\n\nWe’ll inject an instance of this\
    \ class into the chat endpoint. The account lets us access the user’s name.\n\n\
    #### Injection by CDI\n\nRemember some characteristics of CDI: you can inject\
    \ a bean independently from its lifespan. For example, you might inject a request\
    \ scoped bean into a session scoped bean. Although the session scoped bean is\
    \ usually alive for more than a request, the injected bean is alive for a single\
    \ request only. Yet you can access an injected bean during the lifetime of the\
    \ holding object. Isn’t that paradoxical?\n\nCDI accomplishes this trick by injecting\
    \ a proxy object. This proxy is available during the whole lifetime of the containing\
    \ bean. Under the hood, this proxy refers to a different object for each request.\n\
    \nNow if we try to prefix every message from the user, like `sendObject(_userController.GetAccount().getDisplayName()+\
    \ \": \" + message)`, we’ll run into an error: albeit injected, `_userController`\
    \ resolves to `null`.\n\nThe reason is quite simple: the endpoint will be created\
    \ within the HTTP request, when the user enters the classroom. The injected user\
    \ controller contains all the values we expect. CDI doesn’t really inject an instance\
    \ of the class `UserController`, but a proxy pointing to the active user controller\
    \ object of the current request. The WebSocket channels are opened by an upgrade\
    \ from HTTP. The initiating request terminates normally, while the channel remains\
    \ open. Now if the user enters a message, it’s sent via the WebSocket channel.\
    \ Because there’s no HTTP request at that time, the CDI proxy can’t refer to any\
    \ bean, even though the user controller is of session scope. So, the proxy resolves\
    \ to `null`.\n\nEven though the user controller is injected as a proxy, it contains\
    \ the “real” objects. Alumni simply stores these objects within the endpoint,\
    \ and voilà, we can use them. Besides package and imports, Listing [34-15](#A435433_1_En_34_Chapter.xhtml#PC15)\
    \ shows the complete endpoint class:\n\n### Listing 34-15: Classroom Chat of Alumni\n\
    \n```java\n@ServerEndpoint(\"/classroomchat\")\npublic class ClassroomChat {\n\
    \n    private static final Map<Integer, Set<Session>> PEERS = new ConcurrentHashMap<>();\n\
    \    private static final Logger LOGGER = Logger.getLogger(ClassroomChat.class.getName());\n\
    \n    private ChatService _chatService;\n    private Account _account;\n    private\
    \ int _finalYearId;\n\n    @Inject\n    public ClassroomChat(UserController user,\
    \ ChatService chatService){\n        _account = user.getAccount();\n        _finalYearId\
    \ = user.getFinalYear().getId();\n        _chatService = chatService;\n    }\n\
    \n    public ClassroomChat() {\n        LOGGER.log(Level.INFO, \"ctor ClassroomChat\"\
    );\n    }\n\n    @OnMessage\n    public void onMessage(String message, Session\
    \ session) {\n        //String name = session.getUserPrincipal().getName();\n\
    \        for (Session peer : PEERS.get(_finalYearId)) {\n            try {\n \
    \               peer.getBasicRemote().sendObject(_account.getDisplayName() + \"\
    : \" + message);\n            } catch (IOException | EncodeException ex) {\n \
    \               // in case of error, log problem and continue\n              \
    \  LOGGER.log(Level.SEVERE, null, ex);\n            }\n        }\n    }\n\n  \
    \  @OnOpen\n    public void onOpen(Session peer) {\n        LOGGER.log(Level.INFO,\
    \ \"onOpen ClassroomChat, user {0}\",\n                             _account.getDisplayName());\n\
    \        if (!PEERS.containsKey(_finalYearId)){\n            PEERS.put(_finalYearId,\n\
    \                      Collections.synchronizedSet(new HashSet<>()));\n      \
    \  }\n        PEERS.get(_finalYearId).add(peer);\n        sendLatestMessages(peer);\n\
    \    }\n\n    private void sendLatestMessages(Session peer) {\n        List<String>\
    \ messages = _chatService.getLatestMessages(_finalYearId);\n        for (String\
    \ message : messages) {\n            try {\n                peer.getBasicRemote().sendObject(message);\
    \                                                          \n            } catch\
    \ (IOException | EncodeException ex) {\n                // in case of error, log\
    \ problem and continue\n                LOGGER.log(Level.SEVERE, null, ex);\n\
    \            }\n        }\n    }\n\n    @OnClose\n    public void onClose(Session\
    \ peer) {\n        LOGGER.log(Level.INFO, \"onClose ClassroomChat, user {0}\"\
    ,\n                             _account.getDisplayName());\n        PEERS.get(_finalYearId).remove(peer);\n\
    \    }\n\n}\n```\n\nIn lines 13 and 14 we store references to user and final class\
    \ that have been injected as part of `userController`. Besides an instance of\
    \ the `UserController`, an instance of the `ChatService` is injected too. And\
    \ unlike the user controller, this proxy is directly stored within a field (line\
    \ 15). Will we face the same proxy problem described earlier? A consultant’s standard\
    \ answer would be, “It depends. . . .”\n\nIf we define the `ChatService` as a\
    \ CDI bean with a short (request) scope, as shown in Listing [34-16](#A435433_1_En_34_Chapter.xhtml#PC16),\
    \ we’ll run into a `ContextNotActiveException`.\n\n### Listing 34-16: ChatService\
    \ as Request Scoped CDI Bean\n\n```java\n@RequestScoped\n@Transactional\npublic\
    \ class ChatService extends AbstractService {\n...\n}\n```\n\nExtending the scope\
    \ to session scope doesn’t solve this problem: such a scope is stored within the\
    \ session map of a request, and there may be no request.\n\nThere are two possible\
    \ solutions. You may define the service within the application scope. Or, if you\
    \ don’t want to use a global object with such a long lifespan, you might use a\
    \ stateless EJB, as shown in Listing [34-17](#A435433_1_En_34_Chapter.xhtml#PC17)."
