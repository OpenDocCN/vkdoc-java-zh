    \      <?xml version='1.0' encoding='UTF-8' ?>                    \n         \
    \              2                         <!DOCTYPE html>                    \n\
    \                       3   <                      html                      >\
    \                    \n                       4       <                      head\
    \                      >                    \n                       5           <\
    \                      title                      >CSS demo</                \
    \      title                      >                    \n                    \
    \   6       </                      head                      >              \
    \      \n\n                       8       <                      style       \
    \               type=\"text/css\">                    \n                     \
    \  9                                 label                      {            \
    \        \n                      10                                     font-weight\
    \                      :                      bold                      ;    \
    \                \n11           }\n                      12                  \
    \               label                      ~                      label      \
    \                {                    \n                      13               \
    \                      color                      :                      green\
    \                      ;                    \n14           }\n               \
    \       15                                 label                      +      \
    \                label                      {                    \n          \
    \            16                                     font-size                \
    \      : 2                      em                      ;                    \n\
    17           }\n                      18       </                      style \
    \                     >                    \n\n                      20       <\
    \                      body                      >                    \n     \
    \                 21           <                      label                  \
    \    >first label</                      label                      >        \
    \            \n                      22           <                      label\
    \                      >second label</                      label            \
    \          >                    \n                      23           <       \
    \               br                      />                    \n             \
    \         24           <                      label                      >third\
    \ label</                      label                      >                  \
    \  \n                      25       <                      body              \
    \        >                    \n                      26   </                \
    \      html                      > \n```\n\n`label ~ label` is used to select\
    \ the second and third labels, which both are siblings of the first label. `label\
    \ + label` selects only the second label, which immediately follows the first\
    \ label, whereas the third is separated by a `<br/>` tag.\n\n### Box Model\n\n\
    Each element uses a space, which is determined by its display style and its content.\n\
    \nText elements like `label` or `input` are of display type `inline`. The width\
    \ of an element is determined by its content. Each element is arranged right of\
    \ the previous one. Depending on browser window size, line breaks may be inserted.\n\
    \nElements like `div` are block elements. These elements can have a `width` attribute\
    \ to define their width. Otherwise, the full width of the browser window is used.\
    \ Block elements are arranged vertically.\n\nWith CSS, it’s possible to define\
    \ a display type `inline-block`. (Valid values for the property `display` are\
    \ `none`, `inline`, `block`, and `inline-block`.) Such elements are arranged horizontally\
    \ like `inline`, but it’s possible to define a `width` independently from its\
    \ content. For example, consider a `label`, which usually ends where the text\
    \ finishes, regardless of a `width` declaration. If you use `display: inline-block;`\
    \ you may assign a `width` of your choice to that `label`.\n\nThe height of an\
    \ element is usually determined by its content.\n\nIn a *box model*, each element\
    \ has a width determined by its content, or in the case of a block (including\
    \ `inline-block`) element, by a `width` attribute. The height is usually determined\
    \ automatically. Surrounding the element is a `padding` of a defined size, which\
    \ might be `0`. Outside this `padding`, a `border` may be defined. And beyond\
    \ the `border` there is a `margin`.\n\nListing [B-7](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC66)\
    \ demonstrates this model, and its output is shown in Figure [B-5](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Fig7).\
    \ To make the `padding` visible, each `div` element has its own background color\
    \ that surrounds the inner `label`. The `margin`’s background is transparent.\
    \ It simply defines the gap between browser the elements as well as the distance\
    \ to the browser’s border. To make it visible in this book, the background color\
    \ of the whole HTML document is set to gray.\n\n![A435433_1_En_BookBackmatter_Fig7_HTML.jpg](OEBPS/Images/A435433_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
    \n###### Figure B-5 CSS box model example"
