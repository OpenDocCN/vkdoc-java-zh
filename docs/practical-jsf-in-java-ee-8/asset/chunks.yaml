    # 33. Account Handling


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    If you’ll recall from Chapter [32](#A435433_1_En_32_Chapter.xhtml)’s custom realm,
    I left the obtainPermittedGroups method empty and promised to describe it later.
    To authenticate the user, the custom realm needs to check the user’s credentials,
    which are stored in an account object. Or in terms of the database, stored in
    the account table. If we add a data access class to the realm, we need to access
    the account within Alumni, too.


    Thinking about the DRY principle (*don’t repeat yourself*) raises the question
    of whether it’s possible not to use the same code in two distinct places. We want
    to write the code to access an account only once and then reuse it in different
    places. Should we write a library that might be used by Alumni as well as the
    custom realm? Or should the custom realm call the appropriate data access of Alumni?
    Both solutions have their drawbacks, especially the latter, which forces the realm
    to know about Alumni. Would it be possible to run that account object independently?


    The good news is: yes it is.'
