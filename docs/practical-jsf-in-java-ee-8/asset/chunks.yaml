  trans: '

    ## 安全基础


    要授予用户对受保护应用程序的访问权限，首先必须对用户进行身份验证。用户必须告知系统其身份。这可以通过提供用户名（“是我”）和密码（“你可以通过检查只有我们共享的某些秘密信息来验证确实是我”）来实现。其他身份验证技术包括使用身份证、证书、指纹等。在本书中，我们主要关注用户名和密码。


    一旦系统验证了用户身份，它就会对用户进行授权，根据安全状态决定是允许他们访问整个应用程序还是仅访问部分内容。这是通过为用户分配一个或多个不同的*角色*来实现的。根据角色的不同，对应用程序的访问权限会受到控制。


    让我们回顾一下：


    1.  系统提供一个登录界面（例如表单）来查询用户名和密码。

    2.  用户提供这些信息。

    3.  系统验证这些信息。如果不匹配，则登录中止。

    4.  系统确定角色并根据这些角色授予访问权限。


    使用容器提供的安全机制，步骤 1 至少可以通过三种方式实现：


    *   用户的网络浏览器会显示一个简单的输入对话框。其外观和客户端数据处理由浏览器决定。开发者无需采取进一步操作。此模式称为*基本认证*。

    *   开发者提供一个包含两个输入字段以及提交或重置按钮的 HTML 表单。这些字段可以集成到具有应用程序外观和风格的网页中。输入字段的名称和操作必须严格遵循约定。此模式称为*基于表单的认证*。

    *   开发者使用预先安排好的 JSF 表单。在服务器端，应用程序调用容器的登录方法。这被称为*编程式认证*。


    用户名和密码必须从客户端发送到服务器。无论密码是以明文形式发送还是以哈希摘要形式发送（这可能在服务器属性中配置），结果都一样：如果有人截获了这些数据，他们可能会尝试利用它来获取访问权限。因此，一个常见的建议是使用安全的传输协议，例如
    TSL/SSL。用户可以通过 URL 中的 `https://` 协议部分来识别此类安全协议——其中的 *s* 代表安全。


    对于认证/授权过程的步骤 3，服务器必须根据存储在某个地方的信息来检查输入（用户名/密码）。这是通过所谓的*安全域*来实现的。通常，你的服务器上会预定义一个或多个域。例如，GlassFish
    提供了几个域。我们将讨论其中两个：`fileRealm`（用户信息存储在文件中）和 `jdbcRealm`（用户信息存储在数据库中）。最后但同样重要的是，我们将讨论一个自行编程的（自定义）域。


    尽管这些安全域有时以类似的方式实现，但它们仍然是特定于供应商的。术语约定也可能不同。有些称之为*域*，另一些则称之为*领域*、*区域*等。这同样适用于此上下文中的其他术语，例如*组*、*角色*、*主体*、*权限*等。


    为了消除这种混乱，创建了一个标准：Java 容器认证服务提供者接口（JASPIC，JSR 196）。尽管 JASPIC 的定义始于十多年前，但专有域仍然普遍存在。随着
    Java EE 6 的出现，这种情况开始改变，JASPIC 似乎成为了一等公民。然而，Java EE 7 并未引入足够多的改进，并且有一个正在进行的标准化过程（JSR
    375），它建立在 JASPIC 和 JACC（Java 容器授权服务提供者契约）之上。这个 Java 安全 API 部分计划用于 Java EE 8，并将随
    Java EE 9 完成。稍后我们将使用其参考实现 Soteria，以便比直接使用 JASPIC 更简单地访问。


    我们将从 HTTP 认证及其域开始。Java 认证和授权服务（JAAS）已集成到 Java 2 SDK 1.4 中。（要了解更多信息，请查看 [`docs.oracle.com/javase/8/docs/technotes/guides/security/jaas/JAASRefGuide.html`](https://docs.oracle.com/javase/8/docs/technotes/guides/security/jaas/JAASRefGuide.html)。）当我写到域时，请记住特定于供应商的实现。我将重点介绍
    GlassFish 和 NetBeans，你可能需要将某些信息转换到你的环境中。


    例如，NetBeans 提供了一些特殊的编辑器来配置基于容器的安全性。我将讨论这一点以及最终的配置，这通常是纯 XML。


    ## 基本认证与 fileRealm


    为了保护 Alumni 应用，我们需要向 `web.xml` 添加一个安全约束。在你的编辑器中打开此文件。使用 NetBeans，在你的项目树中选择 Web
    Pages、WEB-INF、`web.xml`。NetBeans 默认在源代码视图中打开此文件。要获得概览，请切换到 Security 选项卡。这样做会改变视图，并允许你轻松读取或定义安全设置。参见图
    32-1。


    ![A435433_1_En_32_Fig1_HTML.jpg](img/A435433_1_En_32_Fig1_HTML.jpg)


    ###### 图 32-1 web.xml 的安全选项卡。


    在顶部，注意不同的登录配置。如前所述，本教程将涵盖基本认证和表单认证。从用户的角度来看，摘要认证与基本认证几乎相同：两者都在浏览器中显示一个小型输入对话框，用户可以在其中输入用户名和密码。在底层，从密码派生出一个*摘要*（哈希值）。因此，没有明文发送到服务器。但这并不是一个真正的安全特性。如果摘要被某个犯罪分子截获，其效果几乎与密码被截获相同。因此，你必须使用
    SSL（安全套接层）或其现代继任者 TLS（传输层安全）来加密连接本身。使用其中任何一种都会产生 HTTPS 连接。


    表单登录配置将显示指定的表单来查询凭据。这允许你自定义该过程。


    客户端证书登录配置基于 SSL 以及服务器证书与客户端证书的结合。


    要继续进行基本认证，请选择 Basic 并在 Realm Name 字段中输入 **file**。此信息不会被 NetBeans 检查，因此请确保输入一个现有的域名称。请参考你的应用服务器以确定哪些值是有效的。因为我在此教程中使用
    GlassFish，所以 *file* 是一个有效的域名称。大多数应用服务器都提供文件域（也称为域、区域等）。


    接下来，转到 Security Roles 并添加两个角色。将它们命名为 **member** 和 **admin**。你可以根据需要定义任意数量的角色。这对于需要区分不同访问级别（如管理员、普通用户、经理、服务等）的应用程序可能很有用。对于
    Alumni 的完整版本，我们同样需要几个角色，但对于这第一个演示，还不需要定义更多角色。


    配置 `web.xml` 的下一步是添加安全约束。单击 Add Security Constraint 添加一个。显示名称是可选的，为了方便起见。我们在这里使用
    *member access*。如果你需要处理大量不同的约束，显示名称非常有用。


    现在添加一个 Web 资源集合（参见图 32-2）。给它一个名称并提供 URL 模式。**/member/*** 适用于 member 文件夹中的所有页面。单击
    OK 返回 Security 选项卡。


    ![A435433_1_En_32_Fig2_HTML.jpg](img/A435433_1_En_32_Fig2_HTML.jpg)

