    33   }\n```\n\nHelped by CDI, we get an instance of `Conversation` injected into\
    \ our `BookEditor` (line 6). For simplicity, we assume this is a fresh instance.\
    \ Such a fresh instance acts in the so-called *transient* mode and will terminate\
    \ with the current request. Until now, the `BookEditor` behaves like a request\
    \ scoped bean. But a `Conversation` might become long running, as requested by\
    \ our application. We’ll prolong the conversation within the `init()` method.\
    \ Due to the `@PostConstruct` annotation, this method is automatically called\
    \ when the construction of the `BookEditor` finishes.\n\nAnyway, it’s important\
    \ to first check whether the conversation is transient (not long running). Only\
    \ in this state is it allowed to start the long run. In line 12 of Listing [17-1](#A435433_1_En_17_Chapter.xhtml#PC1),\
    \ we perform the check of whether the conversion isn’t yet long-running as indicated\
    \ by `isTransient()`. If this isn’t the case, we start the long-running part by\
    \ calling `begin()`.\n\nStarting the long run is quite easy, but ending it can\
    \ become complicated. Of course, it’s nothing but calling `end()` on our conversation\
    \ object. The only question is: when do we terminate the long-running mode? If\
    \ the editor had a Save and Close button, this would be a wonderful candidate\
    \ to store the data and quit the long-running mode of the conversation—after saving\
    \ a book, the editor would be closed. But using Books, the user may save and stay\
    \ in the open dialog. He may continue to edit, and so we can’t end the conversation.\
    \ Or the user may hit any navigation button to move to a different location—to\
    \ create a new book, say, or edit another one. Having no single point for leaving\
    \ the editor requires some more effort.\n\nLet’s examine when JSF will reuse an\
    \ existing conversation or inject a new one. A book bean will be created every\
    \ time it’s used in a new request and either the conversation is transient, or,\
    \ in the case of a long-running conversation, a new conversation is used. In such\
    \ a case, the `init()` method is invoked. So we can track new conversations by\
    \ tracking calls to this method, as seen in Listing [17-2](#A435433_1_En_17_Chapter.xhtml#PC2).\n\
    \n###### Listing 17-2 `BookEditor.java`: log init\n\n```\n 1   [...]\n 2   @Named\n\
    \ 3   @ConversationScoped\n 4   public class BookEditor implements Serializable\
    \ {\n 5     [...]\n 6     private static final Logger LOGGER = Logger.getLogger(\"\
    BookEditor\");\n\n 8     @PostConstruct\n 9     private void init() {\n10    \
    \   LOGGER.log(Level.INFO, \"init in BookEditor\");\n11       [...]\n12     }\n\
    \n14   [...]\n15   }\n```\n\nOnce the bean is prepared as such, it will log every\
    \ creation (more precisely, it will log every time it’s created by CDI—if created\
    \ by a new, `init` wouldn’t be called). Now we can invoke our book editor in different\
    \ ways to observe the behavior.\n\nFor testing purposes, in Listing [17-3](#A435433_1_En_17_Chapter.xhtml#PC3)\
    \ we’ll add two links to the book editor to the navigation section of `adminTemplate.xhtml`.\n\
    \n###### Listing 17-3 Test Links: Navigation to `bookEditor.xhtml`\n\n```\n1 \
    \  <h:form>\n2     <h:commandLink styleClass=\"button\"\n3                   \
    \ value=\"#{msg.btnNewBook} commandLink\"\n4                    action=\"/admin/bookEditor.xhtml\"\
    />\n5   </h:form>\n6   <h:link styleClass=\"button\"\n7           value=\"#{msg.btnNewBook}\
    \ link\"\n8           outcome=\"/admin/bookEditor.xhtml\"/>\n```\n\n###### Differences\
    \ between the link tags: Try and Observe\n\n1.  Start Books and navigate to the\
    \ book editor via the `commandLink` button.\n2.  When the book editor opens, click\
    \ the `commandLink` button again.\n3.  Observe the log output live in NetBeans\
    \ output, the GlassFish window.\n4.  Restart the application and repeat your observations\
    \ using the `link` button.\n\n`commandLink` and `link` provide different navigation\
    \ models. `commandLink` implements a more traditional JSF navigation using a post\
    \ back, but `link`, introduced with JSF 2.0, realizes a navigation via get. In\
    \ the next section, we’ll discuss the differences and the impact on conversation\
    \ handling.\n\n## POST and GET Navigation\n\nIn HTML, you can use a form to gather\
    \ data. As part of the form you can place a button below the input fields to submit\
    \ the data to the server. In traditional HTML this data is transferred via an\
    \ HTTP POST request to the server. This is a request to the same URL, which is\
    \ why it’s called a *postback*. And as a result, the server often sends back a\
    \ confirmation that’s displayed on a different page. This kind of navigation is\
    \ called *postback navigation*. Before JSF 2.0, this was the common navigation\
    \ model of JSF.\n\nIf you read articles about REST, you may know that an HTTP\
    \ GET is used to retrieve a resource, whereas a POST is used to create one. And\
    \ you may have read about JSF not implementing the original design goals of HTTP\
    \ because of this postback navigation. As mentioned, postback navigation was the\
    \ common navigation type before REST, so it’s not against the principles of HTTP.\
    \ If some evangelists want to tell you something else, don’t believe them.\n\n\
    Although postback navigation feels like a natural navigation, there is one drawback:\
    \ data is posted to the original URL while the response might display a fresh\
    \ page. Thus, the URL shown in the browser is often one step behind. Because of\
    \ this, some purists argue, JSF isn’t bookmarkable. JSF often is used for applications,\
    \ so what do you think: should an application be bookmarkable in every state?\
    \ Or just for well-defined pages (entry points)?\n\nTo update the current URL\
    \ in the browser’s display, one strategy offered by JSF is a redirect: just after\
    \ the postback, a GET to the target page is invoked. Or you can use a GET navigation\
    \ with `link`.\n\nHave you observed the browser’s URL and the server’s log from\
    \ the previous exercise? Invoking the `commandLink` button for the first time\
    \ doesn’t update the URL to the book editor. This is a typical postback navigation.\
    \ When the book editor is displayed for the first time, a new conversation is\
    \ started (as indicated by the log). Subsequent clicks to this button will refresh\
    \ (reload) the page, but won’t start a conversation.\n\nBut if you use the `link`\
    \ button, the URL directly points to the book editor. This is navigation by GET\
    \ request. A new conversation is started with every click, and thus a new instance\
    \ of the book editor is created with every click. Behind the scenes, CDI holds\
    \ the former instances because the conversations are still running. We need to\
    \ handle this.\n\n###### Note\n\nUsing the postback navigation, JSF reuses an\
    \ existing conversation. Using the GET navigation, JSF will create a new conversation.\n\
    \nAs we will discuss later, it’s possible to keep an existing conversation during\
    \ a GET navigation."
