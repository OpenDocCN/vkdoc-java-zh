    # 4. 表达式语言


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    在构建 TinyCalculator 时，我们使用了一些特殊的表达式，这些表达式以分隔符 #{ 和 } 开头。这些始终采用 #{expr} 形式的表达式由表达式语言（EL）定义。JSR
    341：表达式语言 3.0 是 Java EE 8 的一部分（请访问 [`jcp.org/en/jsr/detail?id=341`](https://jcp.org/en/jsr/detail%3Fid=341)
    了解更多信息）。同一版本也曾是 Java EE 7 的一部分。


    ## 统一表达式语言


    最初，表达式语言是为 JSP 定义的，使用 ${expr} 形式（以 $ 开头）。随后 JSF 引入了一种略有不同的语法。主要目的是支持更高级别的 JSF
    生命周期。这种 JSF EL 使用以 '' 开头的表达式，正如我们在 TinyCalculator 中所做的那样。


    从 Java EE 5 开始，JSP EL 和 JSF EL 变得统一。因此，你有时可能会读到关于统一表达式语言的内容。尽管现在表达式已经统一，但两种格式约定（以
    $ 开头和以 # 开头）都得到支持，即使在使用 JSP 作为 VDL 时，开头的字符仍然表示略有不同的行为。${expr}（其中 expr 是 expression
    的缩写）在页面编译时求值（*即时表达式*），而 #{expr} 在运行时求值（*延迟表达式*）。请记住，JSP 被编译为 Servlet。并且 JSP 仍然作为
    JSF 的 VDL 得到支持。使用现代的 Facelets VDL 时，页面定义总是在运行时解释。没有编译时。因此，你可以将 TinyCalculator
    示例中的所有表达式替换为 ${expr} 形式，这不会有任何区别。本书中的所有示例都使用 #{expr} 形式。


    同样在 EL 中，你可能会读到*值表达式*和*方法表达式*。有什么区别？让我们回顾一下 TinyCalculator 中的一些表达式：#{tinyCalculator.param1}
    是一个值表达式，而 #{tinyCalculator.add} 是一个方法表达式。在这些简单的例子中，我们看不出任何语法上的区别。要识别哪个是哪个，你需要了解上下文。Java
    约定可能会帮助你：param1 是一个主语，而 add 是一个动词。Java 方法应以动词开头，并可能继续其他内容。对于属性，动词是 get 和 set，后跟一个名称（主语）。并且，正如对
    TinyCalculator 示例的简要解释，#{tinyCalculator.param1} 是一种双向绑定，省略了 get 和 set。


    ###### 注意


    更一般地说，我们可以说 #{myBean.myProperty} 是一个值表达式，而 #{myBean.myMethod} 是一个方法表达式。


    第一个点之前的部分（或者在其他示例中，第一个左方括号）称为*基*，而之后的部分称为*属性*——或者对于方法表达式，称为*方法*。在此示例中，基是一个 Bean。正如后面所解释的，基也可能是一个变量或一个隐式对象。


    在引用 Bean 的常见情况下，Bean 的名称（如果未定义为其他内容，则为 Bean 的类名——你可以在 @Named 注解中定义不同的名称，例如 @Named("myBaseName")）用于基，但首字母小写。


    如果需要，属性通过使用常见的点语法被分解成更小的部分。invoice.customer.street 指的是发票中客户对象的街道。在纯 Java 中，它可能看起来像清单
    4-1。

