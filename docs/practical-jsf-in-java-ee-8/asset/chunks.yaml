    \nThe `inputSecret` for the password repetition refers to the `checkPassword`\
    \ method of this bean: `validator=\"#{register.checkPassword}\"`. See Listing\
    \ [25-18](#A435433_1_En_25_Chapter.xhtml#PC20).\n\n### Listing 25-18 Excerpt of\
    \ the Registration Bean\n\n```java\n 1   private Account _account = new Account();\n\
    \n 3   public Account getAccount() {\n 4     return _account;\n 5   }\n\n 7   public\
    \ void setAccount(Account account) {                                         \
