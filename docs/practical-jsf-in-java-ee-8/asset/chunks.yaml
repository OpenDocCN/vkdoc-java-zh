    will be automatically saved when we save the category. Suppose we remove an entry
    of that map and save the category again. What will happen to the removed translation
    entry? Because we cascaded all operations, saving the category will affect the
    CategoryTranslation too. Without further definition, JPA will set the category
    id of the translation to NULL and update the appropriate database table. And if
    we delete the category, all translations will be kept in the database with a category
    id set to NULL. This behavior works well for aggregations. Imagine a shelf object
    containing a list of books. If the shelf were deleted, you’d still keep the books
    and put them on another shelf. Unlike category and its translation, this is a
    typical composition. Without its category, the translation becomes a useless orphan.
    orphanRemoval = true will ensure the deletion of such orphans.


