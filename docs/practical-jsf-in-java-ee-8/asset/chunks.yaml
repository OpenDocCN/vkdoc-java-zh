    \n22     <module>AlumniData</module>\n23     <module>AlumniAccount</module>\n\
    24   </modules>\n\n26   <build>\n27     <plugins>\n28       <plugin>\n29         <groupId>org.apache.maven.plugins</groupId>\n\
    30         <artifactId>maven-compiler-plugin</artifactId>\n31         <version>3.7.0</version>\n\
    32         <configuration>\n33           <source>${java.version}</source>\n34           <target>${java.version}</target>\n\
    35         </configuration>\n36       </plugin>\n37       <plugin>\n38         <groupId>org.apache.maven.plugins</groupId>\
    \                                                                            \
    \                              \n39         <artifactId>maven-war-plugin</artifactId>\n\
    40         <version>3.1.0</version>\n41       </plugin>\n42     </plugins>\n43   </build>\n\
    \n45   <dependencyManagement>\n46     <dependencies>\n47       <dependency>\n\
    48         <groupId>javax</groupId>\n49         <artifactId>javaee-api</artifactId>\n\
    50         <version>8.0</version>\n51         <scope>provided</scope>\n52       </dependency>\n\
    \n54      ... other dependencies go here ...\n\n56     </dependencies>\n57   </dependencyManagement>\n\
    \n59 </project>\n```\n\nBeginning with line 19, we define the modules of our application.\
    \ We’ll create three modules that will compose the Alumni application:\n\n*  \
    \ AlumniGui (GUI layer)\n*   AlumniBusiness (business layer)\n*   AlumniData (database\
    \ access)\n\nA fourth module, `AlumniAccount`, will be an independent service\
    \ used by Alumni (covered in detail in Chapter [33](#A435433_1_En_33_Chapter.xhtml)).\
    \ Within the dependency management, we predefine dependencies for our modules.\
    \ Here we refer to the Java EE 8 API (lines 47-52). Besides that parent POM, we\
    \ need to define a POM for each module. Listing [24-2](#A435433_1_En_24_Chapter.xhtml#PC2)\
    \ shows the POM of `AlumniGui`. (The other POMs are quite similar—it should be\
    \ no problem to derive them too. I'll explain some relevant details later on when\
    \ explaining selected aspects.)\n\n### Listing 24-2 POM of Module AlumniGui (Excerpt)\n\
    \n```\n01 <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n02 <project xmlns:=\"http://maven.apache.org/POM/4.0.0\"\
    \n03         xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n04         xsi:schemaLocation=\"\
    http://maven.apache.org/POM/4.0.0\n05          http://maven.apache.org/xsd/maven-4.0.0.xsd\"\
    >\n06   <modelVersion>4.0.0</modelVersion>\n\n08   <name>AlumniGui</name>\n\n\
    10   <parent>\n11     <groupId>de.mueller-bruehl</groupId>\n12     <artifactId>Alumni</artifactId>\n\
    13    <version>2017.0.0-SNAPSHOT</version>\n14     <relativePath>../pom.xml</relativePath>\n\
    15   </parent>\n\n17   <artifactId>AlumniGui</artifactId>\n18   <packaging>war</packaging>\n\
    \n20   <dependencies>\n21     <dependency>\n22       <groupId>javax</groupId>\n\
    23       <artifactId>javaee-api</artifactId>\n24       <scope>provided</scope>\n\
    25     </dependency>\n\n27     <dependency>\n28       <groupId>${project.groupId}</groupId>\n\
    29       <artifactId>AlumniBusiness</artifactId>\n30       <version>${project.version}</version>\n\
    31    </dependency>\n\n33     <dependency>\n34      <groupId>${project.groupId}</groupId>\n\
    35       <artifactId>AlumniData</artifactId>\n36       <version>${project.version}</version>\
    \                                                                            \
    \                              \n37    </dependency>\n\n39     <dependency>\n\
    40      <groupId>${project.groupId}</groupId>\n41       <artifactId>AlumniService</artifactId>\n\
    42      <version>${project.version}</version>\n43     </dependency>\n\n45    ...\
    \ other dependencies omitted for brevity ...\n\n47   <build>\n48     <finalName>${project.artifactId}</finalName>\n\
    49     <resources>\n50       <resource>\n51         <directory>src/main/resources</directory>\n\
    52         <filtering>true</filtering>\n53       </resource>\n54     </resources>\n\
    55   </build>\n\n57 </project>\n```\n\nThe GUI module depends on Java EE 8 as\
    \ well as on the other layers of the application.\n\nFor simple access to entities,\
    \ the business layer won’t add any value. We either use the business layer to\
    \ delegate all data access to the data layer or we allow the GUI to bypass the\
    \ business layer and directly access the data layer. Because we’re using JPA,\
    \ the application only deals with Java objects. So, the GUI never needs to know\
    \ about the database, even if we bypass the business layer. For simplicity’s sake,\
    \ I’ve chosen the later approach. Because of that, `AlumniGui` needs to depend\
    \ on both `AlumniBusiness` as well as `AlumniData`.\n\nThe other modules, as I’ve\
    \ mentioned, are defined by similar POMs. To avoid circular dependencies, no other\
    \ module will depend on `AlumniGui`.\n\n## Registration Form\n\nAlumni can be\
    \ used by members only. That means a user must register first. Once registered,\
    \ the user may log in at any time. We only collect a small amount of mandatory\
    \ personal data during this registration.\n\nThe welcome page of Alumni offers\
    \ a login form and a link to the registration dialog for new users. Although the\
    \ registration isn’t the first dialog of the application, it represents the first\
    \ action every user needs to perform before using Alumni. And it’s a good starting\
    \ point to introduce the next JSF and Java EE features.\n\nLike all other dialogs,\
    \ this form will validate user input and report potential problems by displaying\
    \ messages. That prevents the user from entering invalid data. It also protects\
    \ the system from unexpected behavior.\n\nIn Books, this validation takes place\
    \ when the user clicks the Submit button. That might be a good solution for small\
    \ pages, but it’s an imposition on bigger ones. Have you ever been miffed by pages\
    \ that alerted you a problem in the first input filled *after* you’ve filled a\
    \ few hundred more? To be user-friendly, we’ll provide feedback after every input\
    \ field. That’s where AJAX enters the game.\n\nJSF offers a set of components\
    \ that usually will be translated (rendered) into HTML components. Some people\
    \ believe this is an unnecessary abstraction layer. Why code `<h:inputText .../>`\
    \ where HTML expects `<input type = \"text .../>`? The answer is quite simple:\
    \ a JSF tag might be handled by a different rendering engine. For example, a PDF\
    \ renderer might translate the `inputText` into an interactive text field. JSF\
    \ tags are a kind of domain-specific language (DSL) to create different formats.\n\
    \nIf we only need to render HTML, we might omit a DSL and code our pages directly\
    \ using HTML, enriched with JSF information. (Chapter [5](#A435433_1_En_5_Chapter.xhtml)\
    \ offers a short introduction into this kind of coding.) We’ll develop two versions\
    \ of the registration: one using the traditional JSF tags and the second using\
    \ mainly HTML tags. And, of course, we have to consider security. To prevent the\
    \ user from injecting HTML code, we have to correctly escape the output. A JSF\
    \ tag will handle that automatically for us.\n\nListing [24-3](#A435433_1_En_24_Chapter.xhtml#PC3)\
    \ shows the first raw version of the registration form, and Figure [24-1](#A435433_1_En_24_Chapter.xhtml#Fig1)\
    \ shows the extract."
