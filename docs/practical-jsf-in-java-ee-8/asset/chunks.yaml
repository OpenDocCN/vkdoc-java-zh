    34       }\n35   }\n```\n\n这测试了模型，没有 GUI 的开销。那么，你是否应该优先选择单元测试而不是使用 Selenium 的测试呢？这取决于具体情况。\n\
    \n考虑一个使用注入的命名 bean。我将在本书后面讨论上下文和依赖注入（CDI），但现在我只说一件事：我们不想手动创建对象，而是希望容器来完成这项工作，并通过将对象“注入”到我们的类中来提供对对象的引用。你无法为这样的类编写一个简单的测试。你必须要么模拟对象引用，要么使用像\
