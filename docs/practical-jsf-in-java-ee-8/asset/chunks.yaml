    # 30. 激活邮件


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    在 Alumni 中，一旦账户创建完成，我们就会向用户发送一封激活邮件，其中包含一个带有通用唯一标识符（UUID）的链接。如果用户点击此链接，账户将被激活并可供使用。


