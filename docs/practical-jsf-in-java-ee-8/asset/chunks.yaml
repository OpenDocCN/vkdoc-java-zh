    \ with Listing [32-7](#A435433_1_En_32_Chapter.xhtml#PC9).\n\n###### Listing 32-6\
    \ Config for Basic Authentication\n\n```\n1   <login-config>\n2       <auth-method>BASIC</auth-method>\n\
    3       <realm-name>file</realm-name>\n4   </login-config>\n```\n\n###### Listing\
    \ 32-7 Config for Form Authentication\n\n```\n1   <login-config>\n2       <auth-method>FORM</auth-method>\n\
    3       <realm-name>file</realm-name>\n4       <form-login-config>\n5        \
    \   <form-login-page>/public/login.xhtml</form-login-page>\n6           <form-error-page>/public/loginError.xhtml</form-error-page>\n\
    7       </form-login-config>\n8   </login-config>\n```\n\nListing [32-8](#A435433_1_En_32_Chapter.xhtml#PC10)\
    \ shows a short login page.\n\n###### Listing 32-8 Simple Login Page\n\n```\n\
