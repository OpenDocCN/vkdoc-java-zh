    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_36](#A435433_1_En_36_Chapter.xhtml)\n\
    \n# 36. Handling Constants\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nJSF 2.3 introduced the ability to import constants for use within\
    \ the Expression Language (EL).\n\n## Navigation by Strings\n\nJSF supports internal\
    \ as well as external navigation. Internal navigation is defined in the source\
    \ code, whereas external navigation is described by an external XML file.\n\n\
    Let’s take a look at a simple internal navigation first in Listing [36-1](#A435433_1_En_36_Chapter.xhtml#PC1).\n\
    \n### Listing 36-1 Direct Navigation by String\n\n```\n 1   <h:commandLink styleClass=\"\
    button\"\n 2                          value=\"#{msg.btnWelcome}\"\n 3        \
    \                  action=\"/user/welcome.xhtml\"/>\n```\n\nIn line 3 we define\
    \ the navigation target. This is quite easy but can be error-prone. If you have\
    \ a typo in the action, JSF may display the page properly, but clicking the link\
    \ doesn’t perform any action. And if you want to move or rename the welcome page,\
    \ you have to update all occurrences within your code. It’s easy to forget one\
    \ of them. That’s why some developers prefer external navigation. Personally,\
    \ I don’t like to define my navigation in an XML file. For the Books application,\
    \ I used a different strategy to mitigate this problem.\n\nIn the page, we call\
    \ a navigation method that uses an enum. For the page we use a logical string\
    \ that’s automatically converted to an instance of the enum when calling that\
    \ method, as shown in Listing [36-2](#A435433_1_En_36_Chapter.xhtml#PC2).\n\n\
    ### Listing 36-2 Self-Made enum Navigation\n\n```\n 1   <h:commandLink styleClass=\"\
    button\"\n 2                          value=\"#{msg.btnWelcome}\"\n 3        \
    \                  action=\"/#{sessionTools.navigate('UserWelcome')}\"/>\n```\n\
    \nListing [36-3](#A435433_1_En_36_Chapter.xhtml#PC3) shows a shortened excerpt\
    \ of the Books navigation, and Listing [36-4](#A435433_1_En_36_Chapter.xhtml#PC4)\
    \ shows an excerpt of the enum.\n\n### Listing 36-3 Navigation Method (as Part\
    \ of the Backing Bean)\n\n```\n 1   public String navigate(Page page) {\n 2  \
    \   return page.getRedirectUrl();\n 3   }\n```\n\n### Listing 36-4 Excerpt of\
    \ the enum Page\n\n```\n 1  public enum Page {\n\n 3    UserTemplate(\"/user/booksTemplate\"\
    ),\n 4    <other pages here>\n 5    ;\n\n 7    private Page(String url) {\n 8\
    \      _url = url;\n 9    }\n10   private final String _url;\n\n12   public String\
    \ getUrl() {\n13     return _url + \".xhtml\";\n14   }\n\n16   public String getRedirectUrl()\
    \ {\n17     return _url + \".xhtml?faces-redirect=true\";\n18   }\n19   ...\n\
    20 }\n```\n\nNow if we have a typo in the page declaration we’ll get an error\
    \ immediately when the page is displayed. Such an obvious error helps discover\
    \ problems. And the main advantage of this approach is the use of a logical name.\
    \ If we want to relocate or rename the page, we only need to update the enum,\
    \ keeping all pages unchanged.\n\n## Importing Constants\n\nWith the current version\
    \ of Java EE 8/JSF 2.3, we can do even better—and this is what we use for Alumni’s\
    \ navigation. For example, we pick the forgot password link, as in Listing [36-5](#A435433_1_En_36_Chapter.xhtml#PC5).\n\
    \n### Listing 36-5 Navigation Using an enum\n\n```\n 1    <div>\n 2      #{msg.lblForgotPassword}\n\
    \ 3      <h:link value=\"#{msg.lblRequestPassword}\"\n 4                    outcome=\"\
    #{Page.RequestPassword.url()}\"/>\n 5    </div>\n```\n\nTake a look at line 4.\
    \ Here the outcome is directly composed by the enum’s url. We just use the enum\
    \ as we do in a Java source file. As a prerequisite, we need to tell the EL about\
    \ our enum. That’s where the new `importConstants` tag comes into play. Within\
    \ the metadata, we need to declare this tag in conjunction with the full class\
    \ name, as shown in Listing [36-6](#A435433_1_En_36_Chapter.xhtml#PC6).\n\n###\
    \ Listing 36-6 Import Constants for Use in the EL\n\n```\n 1    <f:metadata>\n\
    \ 2      <f:importConstants type=\"de.muellerbruehl.alumni.gui.enums.Page\"/>\n\
    \ 3    </f:metadata>\n```\n\nAlthough Alumni only imports enums, you can use the\
    \ `importConstants` tag for any kinds of constants.\n\n## Summary\n\nJSF 2.3 introduced\
    \ a new tag `importConstants`. As its name suggests, this tag is used to import\
    \ constants that can be used in the EL afterwards. In Alumni this feature is used,\
    \ among others, for easy, configurable internal page navigation.\n\n# Appendix\
    \ A: HTML\n\nThe HypertText Markup Language is used to describe the contents of\
    \ a web page. Like XML, HTML is a member of the Standard Generalized Markup Language\
    \ (SGML).\n\nI assume at least a basic knowledge of XML. Thus, this book won’t\
    \ go into detail about how to build an XML document. An HTML document has to consider\
    \ similar rules, but sometimes is less strict. Unlike XML, where you define your\
    \ own tags, HTML comes with a set of predefined tags. The most common tags are\
    \ briefly described in the following sections.\n\n### HTML Structure\n\nAn HTML\
    \ document starts with a document type, followed by an `<html>` tag, which is\
    \ comparable to the document root of an XML document. Within that, a tag for header\
    \ and body might be included. In the case of XHTML, which is HTML built with strict\
    \ XML rules, the doctype is preceded by the XML version.\n\nThis basic structure\
    \ is shown in Listing [A-1](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC5)."
