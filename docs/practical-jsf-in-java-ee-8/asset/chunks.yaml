    # 7. Testing with Selenium


    Michael Müller^(1)


    (1) Brühl, Nordrhein-Westfalen, Germany


    This book focuses on web development, not test-driven development (TDD). Of course,
    it’s good practice to write tests for each kind of application, whether you follow
    the TDD paradigm or write your unit tests just after your production code. But
    if a test for each piece of code described in this book were added, the book would
    probably double in size. There are good books on unit testing available, and I
    introduce some of the tools in this book, but I can’t cover much unit testing
    in this book.


    Developing web applications with Java and JSF, you’ll face some unfamiliar problems
    compared to Java SE applications: the user interface (UI) is presented by third-party
    software, the browser. And most of the business logic and persistence is managed
    by a container. So, we have some additional environment that needs to be considered
    for a couple of tests.


    The first problem, UI presentation within a browser, is tackled by Selenium.


    ## Selenium Overview


    What is Selenium? A look at the Selenium website ([http://docs.selenium.org](http://docs.selenium.org))
    provides this answer: “*Selenium automates browsers.* That’s it! What you do with
    that power is entirely up to you. Primarily, it is for automating web applications
    for testing purposes, but is certainly not limited to just that. Boring web-based
    administration tasks can (and should!) also be automated as well.”


    Selenium is available in two versions:


    * Selenium IDE

    * Selenium WebDriver


    The Selenium IDE comes with a macro recorder. You can start recording, call a
    web page, perform some operations, stop recording, and then replay these actions
    again and again. That might be useful to log in to an application and navigate
    to the page of interest. Then you may perform manual steps for testing a new feature.
    Or you define a piece of work that’s repeated in an “endless” loop to perform
    a stress test.


    Selenium WebDriver is a driver you can use in your Java program. Different drivers
    for popular web browsers are available. By the power of this driver, it’s possible
    to automate the browser with a self-written application. So far, Selenium can
    be used within a testing framework like JUnit.


    With both versions, it’s possible to define which pages to load and which UI components
    to control, and to read values from these components.


    ## Preparing TinyCalculator


    During the test, the Selenium WebDriver has to address the UI components. This
    might be done with various addressing schemes—for example, by name, by type, by
    id, or by path. Addressing elements is a topic for Cascading Style Sheets (CSS)
    too, which we haven’t discussed so far. Because the id of an HTML element has
    to be unique, the simplest way (without knowing the other addressing schemes)
    is to use this id.


    JSF assigns an id to every element under its control. Such an auto-generated id
    will be something ugly like `j_idt18`. The number depends on the element’s position
    and will change if elements are added or removed. To get a more readable and predictable
    id, Listing 7-1 enriches TinyCalculator with ids by adding `id="..."`.


    ###### Listing 7-1 TinyCalculator: More Readable Ids


    ```

     1   [everything outside form omitted for brevity]


     3   <h:form id="form">

     4       <div>

     5           <h:outputLabel value="Param1: "/>

     6           <h:inputText id="param1" value="#{tinyCalculator.param1}"/>

     7       </div>

     8       <div>

     9           <h:outputLabel value="Param2: "/>

    10           <h:inputText id="param2" value="#{tinyCalculator.param2}"/>

    11       </div>

    12       <div>

    13           <h:commandButton id="add" value="Add"

    14                            action="#{tinyCalculator.add}"/>

    15           <h:commandButton id="sub" value="Subtract"

    16                            action="#{tinyCalculator.subtract}"/>

    17           <h:commandButton id="mul" value="Multiply"

    18                            action="#{tinyCalculator.multiply}"/>

    19           <h:commandButton id="div" value="Divide"

    20                            action="#{tinyCalculator.divide}"/>

    21       </div>

    22       <div>

    23           <h:outputLabel value="Result: "/>

    24           <h:outputText id="result" value="#{tinyCalculator.result}"/>

    25       </div>

    26   </h:form>

    ```


    To claim that an id must be unique is only half of the truth. Like a Java variable,
    its name has to be unique within its scope, or (a bit simplified) within a nesting
    level. If we use the same id within a different scope, we can use a path built
    up by this id to get a unique addressing scheme.


    To address parameter 1, we may use `param1` within the same scope. This will be
    fine when we start to AJAXify an application (covered later in this book). Or
    we use the complete path `form:param1`. Here, `form` is the id we assigned to
    the containing element (the form). Suppose we assign an id to a `div` element
    (for example, `<div jsf:id="div1">`). Now, if we have two divs, each containing
    an element with the `id="param1"`, we may address them by `form:div1:param1` and
    `form:div2:param1`.


    Using Selenium to test TinyCalculator, we need the complete path `form:param1`
    to address this element.


    ## Creating the Test


    Using Maven, a test is usually created within the project under test and placed
    in the folder `test`, which is a sibling to the `main` folder below `src`. Without
    further configuration, Maven will execute the tests during compile time.


    Selenium automates browsers. The application, which is displayed within the browser,
    has to run at the same time. Thus we can’t use the standard test invocation of
    Maven. We need to run the test at the application’s runtime. One solution would
    be to create a separate project to run the tests on TinyCalculator. Another approach
    is to exclude the Selenium tests during compile time. We can reach this goal by
    configuring the Maven Surefire plugin. If we want to perform the tests, we need
    to launch the application first and then advise our IDE to run the tests.


    We need to distinguish between tests. To see which tests should be executed by
    the Maven plugin during runtime and which tests should be started at runtime,
    I created a package called `selenium` for the Selenium tests, shown in Figure
    7-1.


    ![A435433_1_En_7_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_7_Fig1_HTML.jpg)


    ###### Figure 7-1 TinyCalculator’s directory structure


    For the tests, I’m using JUnit 5. Unlike JUnit 4, this version is built up by
    different modules. So, we need to define a couple of dependencies, which may look
    a bit unfamiliar to you if you’ve only used JUnit 4 so far. To follow the project,
    Listing 7-2 shows the complete POM. I’ll only explain some details that are important
    with respect to the Selenium tests. If you need additional info on JUnit 5, please
    refer to the JUnit 5 user guide at [http://junit.org/junit5/docs/current/user-guide/](http://junit.org/junit5/docs/current/user-guide/).'
