- fmt: '## Summary


    During its validation phase, JSF doesn’t just perform a JSF-specific validation,
    it also invokes standard bean validation if defined within the data model. Thus,
    validation constraints might not only ensure that fields will fit the database
    during storage, but can also provide qualified feedback to the user.


    This chapter explained how to use bean validation on a fundamental level. We’ll
    dig into it a bit deeper later in the book.


    © Michael Müller 2018


    Michael Müller, *Practical JSF in Java EE 8*, [https://doi.org/10.1007/978-1-4842-3030-5_16](https://doi.org/10.1007/978-1-4842-3030-5_16)


    # 16. Contexts and Dependency Injection


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Sometimes you need an instance of an object with a type that might be changed
    or determined at runtime, and you need a reliable mechanism to perform that task.
    Luckily, Java EE 8 comes with Contexts and Dependency Injection (CDI), which can
    solve the problem.


    ## From `new()` to CDI


    If you write a class that needs access to an underlying object-oriented service,
    you need to obtain an instance of this service and call its methods. One simple
    approach is to create a new object of the service class:


    ```

    DataService dataService = new DataService();

    ```


    That approach has a couple of disadvantages. What would happen if you could choose
    between different compatible services? Let’s declare `DataService` as an abstract
    class or an interface and implement a concrete service. You could use


    ```

    DataService dataService = new MySQLDataService();

    ```


    or


    ```

    DataService dataService = new PostgreSQLDataService();

    ```


    Now your application still needs to know one of the concrete services. If you
    need the flexibility to choose the service at runtime, one solution would be to
    use an `if`-cascade or `switch` to select the concrete class depending on a configuration
    string. Your class still needs to know the concrete implementations. And if you
    want to add another implementation, your class needs to know that too. This is
    a dependency you usually don’t want to have.


    The trick is to move the decision into a static factory method of the service.
    This is one of the patterns Erich Gamma and coauthors discussed in their book
    *Design Patterns: Elements of Reusable Object-Oriented Software* (Addison-Wesley,
    1994).


    Now our class becomes independent from the concrete implementations:


    ```

    DataService dataService = DataService.createService("MySQL")

    ```


    But besides that interface (or abstract class), our class still has to know the
    service and is responsible for creating the object, even though we delegate the
    creation to the service. In traditional programming, our code is responsible for
    the flow of control.


    Now, imagine our class is an extension of a framework[¹](#A435433_1_En_16_Chapter.xhtml#Fn1)
    that includes the desired service. Then the framework might be responsible for
    the flow of control. So, our class is an extension point that’s called by the
    framework. And the framework might create the service and inject it into our class.
    The flow of control is inverted compared to traditional programming. This approach,
    called inversion of control (IoC), was described by Martin Fowler back in 2005
    (you can read more about it at [http://martinfowler.com/bliki/InversionOfControl.html](http://martinfowler.com/bliki/InversionOfControl.html)).


    CDI is an IoC provided by Java EE. Injection became quite easy by simply annotating
    the wanted object with `@Inject`. We’ve used it in our projects before.


    With CDI the container will create all desired objects and inject it into our
    classes. But it doesn’t only inject objects that belong to the framework into
    our class. CDI also injects particular objects of our application (or another
    one) into our class.


    But how does CDI know which object to inject? How does it figure out whether an
    object is to be created or if an existing instance might be used?


    You can annotate your classes with special keywords that will be recognized and
    interpreted by CDI. We’ve used such an annotation before: `@Named` of the `javax.inject`
    package, which declares a bean as a CDI bean. Such a named bean can be injected
    by Java EE into the consuming class. Besides CDI beans, CDI can also inject Enterprise
    Java Beans (EJBs).


    ###### Note


    Without discussing EJBs, we’ve used them before in our service classes by using
    the `@Stateless` annotation, which declares a class as a stateless EJB. Using
    this kind of bean, we benefit from the container’s automatic transaction management.
    On the other hand, using a CDI bean for such a service class used to force the
    developer to add the transaction handling manually. One general solution is to
    create an interceptor to add a transaction to every JPA access. Nowadays this
    is included in CDI with the `@Transactional` annotation.


    Besides such a static declaration of named beans, a developer may declare any
    method that returns an object as a producer method. This is the CDI equivalent
    of a factory method.


    Once CDI knows what to inject, it needs to know about the object’s lifecycle to
    determine whether an existing one can be used or a new object needs to be injected.
    CDI offers a couple of annotations for this purpose too. Building Books, we still
    used some of them. Remember the `xxxScoped` ones? Table [16-1](#A435433_1_En_16_Chapter.xhtml#Tab1)
    lists a short overview of common annotations of this group.'
