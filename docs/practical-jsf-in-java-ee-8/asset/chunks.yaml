    # 关于作者与技术审校


    # 关于作者


    ![A435433_1_En_BookFrontmatter_Figb_HTML.jpg](img/A435433_1_En_BookFrontmatter_Figb_HTML.jpg)


    Michael Müller 是一位拥有超过 30 年经验的 IT 专业人士，其中约 25 年深耕于医疗保健领域。在此期间，他涉足多个领域，尤其擅长项目与产品管理、咨询以及软件开发。他不仅通过开拓国际市场积累了国际视野，还通过领导来自东欧和印度的外部团队获得了国际经验。


    目前，他担任德国 DRG 研究所（[`inek.org`](http://inek.org)）的软件开发主管。在此职位上，他负责 Web 应用程序以及其他
    Java 和.NET 项目。Web 项目优先采用 Java 技术构建，例如借助 JavaScript 等辅助语言的 JSF。


    Michael 是一位专业的 JSF 用户，同时也是 JSR 344 和 JSR 372（JSF）专家组的成员。由于他在社区中的活跃表现，他于 2016 年
    1 月受邀加入 NetBeans 梦之队并成为其成员。您可以通过他的博客 [blog.mueller-bruehl.de](https://blog.mueller-bruehl.de)
    联系他。在 Twitter 上关注他：@muellermi。


    # 关于技术审校


    ![A435433_1_En_BookFrontmatter_Figc_HTML.jpg](img/A435433_1_En_BookFrontmatter_Figc_HTML.jpg)


    Manuel Jordan Elera 是一位自学成才的开发者和研究员，他热衷于为自己的实验学习新技术并创建新的集成方案。


    Manuel 曾荣获 2010 年 Springy 奖：社区冠军和 2013 年 Spring 冠军。在有限的空闲时间里，他阅读圣经并用吉他作曲。Manuel
    以 dr_pompeii 之名广为人知。他为 Apress 审校过多本技术书籍，包括《Pro Spring Messaging》（2017）、《Pro Spring》第四版（2014）、《Practical
    Spring LDAP》（2013）、《Pro JPA 2》第二版（2013）以及《Pro Spring Security》（2013）。


    您可以阅读他撰写的 13 篇关于众多 Spring 技术的详细教程，并通过他的博客 [www.manueljordanelera.blogspot.com](http://www.manueljordanelera.blogspot.com)
    联系他。在 Twitter 上关注他：@dr_pompeii。


    # 第一部分

    TinyCalculator


    © Michael Müller 2018


    Michael Müller, 《Java EE 8 实战 JSF》，`doi.org/10.1007/978-1-4842-3030-5_1`


    # 1. TinyCalculator


    Michael Müller¹


    (1) 德国，北莱茵-威斯特法伦州，布吕尔


    TinyCalculator 是本书中讨论的第一个也是最简单的应用程序。它不过是一个用于基本算术运算的简单计算器。但它对于展示使用 Java 和 JSF 开发
    Web 应用程序的一些基本概念非常有用。


    作为一种开胃菜，与我处理其他应用程序的方式不同，我将首先向您展示整个应用程序，然后稍作解释。接着，作为一种重新开始，我将讨论 Web 应用程序的基础知识，并解释
    TinyCalculator 以及不同的方法。


    您可以通过点击 [www.apress.com/9781484230299](http://www.apress.com/9781484230299) 上的“下载源代码”按钮来获取
    TinyCalculator 的源代码。您也可以在 [`webdevelopment-java.info`](http://webdevelopment-java.info)
    找到源代码。


    ## 创建应用程序


    使用 Java 和 JSF 的 Web 应用程序需要应用服务器才能运行。别担心——您的 IDE 通常会处理这个问题。稍后，我将更详细地讨论这一点。我们从应用程序开始。


    对于本书，我不得不决定在教程部分使用哪个 IDE。NetBeans，无论是 Java EE 版还是 All 版，都附带 GlassFish。在撰写本文时，下载页面的直接链接是
    [`netbeans.org/downloads/index.html`](https://netbeans.org/downloads/index.html)。由于
    NetBeans 已捐赠给 Apache，此位置可能会更改。如果该链接不再可用，请参考 [`apache.netbeans.org`](https://apache.netbeans.org)。只需安装它，无需进一步配置即可开始使用简单的应用程序。这非常简单。


    本书中的许多基本示例都基于 NetBeans 8（英文版），它捆绑了 GlassFish 4。GlassFish 4 是 Java EE 7 的参考实现，对于
    TinyCalculator 来说已经足够。要启用全新的 Java EE 8 特性，您需要 GlassFish 5 或任何其他兼容 Java EE 8 的服务器（一旦可用）。GlassFish
    5 将随 NetBeans 9 一起提供。由于第一次捐赠（IDE）仍在进行中，而 Java EE 是第二次 Java EE 8 捐赠的一部分，这可能是一个漫长的过程。我将在解释完
    TinyCalculator 后描述如何更新到 Java EE 8。


    本书中的所有应用程序都使用 Apache Maven（[`maven.apache.org`](http://maven.apache.org)）构建，该工具已捆绑在
    NetBeans 中。Maven 应用程序结构几乎与 IDE 无关。因此，您可以使用您选择的任何 IDE（另请参阅第 2 章）。根据您的 IDE，您可以直接打开
    Maven 项目（例如，使用 NetBeans），或者可能需要执行简单的导入（例如，使用 Eclipse）。


    作为 JSF 或 Java EE 的新手，您可能以前从未创建过基于 Java 的 Web 应用程序。因此，我将以逐步教程的形式从头开始创建这个应用程序。与后续章节不同，我将在此处涵盖整个应用程序而不做详细解释，然后在教程之后我们再补充说明：


    1.  启动 NetBeans。


    2.  从“文件”菜单中，选择“新建项目”。NetBeans 将显示“新建项目”向导，如图 1-1 所示。


    ![A435433_1_En_1_Fig1_HTML.jpg](img/A435433_1_En_1_Fig1_HTML.jpg)


    ###### 图 1-1 新建项目向导


    3.  点击类别“Maven”，点击“Web 应用程序”，然后点击“下一步”。NetBeans 将显示“新建 Web 应用程序”向导，如图 1-2 所示。


    ![A435433_1_En_1_Fig2_HTML.jpg](img/A435433_1_En_1_Fig2_HTML.jpg)


    ###### 图 1-2 新建 Web 应用程序向导


    4.  对于“项目名称”，输入 **TinyCalculator**。您可以根据需要调整其他字段，或者保持不变。最佳实践是将“组 ID”设置为您的域名的反向表示。点击“下一步”，在下一个对话框中保持设置不变，然后点击“完成”。


    NetBeans 会为您创建一个新的 Web 应用程序骨架，并将其显示在项目树中，如图 1-3 所示。


    ![A435433_1_En_1_Fig3_HTML.jpg](img/A435433_1_En_1_Fig3_HTML.jpg)


    ###### 图 1-3 项目树


    5.  在项目树中右键单击（辅助单击）TinyCalculator，然后从上下文菜单中选择“属性”。将出现“项目属性”屏幕，如图 1-4 所示。


    ![A435433_1_En_1_Fig4_HTML.jpg](img/A435433_1_En_1_Fig4_HTML.jpg)


    ###### 图 1-4 框架配置


    6.  选择“框架”类别。选择“JavaServer Faces”并点击“添加”按钮。点击“配置”选项卡，并将“JSF Servlet URL 模式”框的内容更改为
    ***.xhtml**。点击“确定”。


    在将 JSF 添加到项目时，NetBeans 会在网页中创建一个名为 index.xhtml 的网页，同时保留之前创建的 index.html 文件。

