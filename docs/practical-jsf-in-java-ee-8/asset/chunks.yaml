    该 bean 简单地使用了 `@SessionScoped` 注解（请记得导入正确的类——这是 CDI 作用域，而非旧的 JSF SessionScope！）。通常，这并非最佳选择。一旦实例化，此类
    bean 将与会话同生命周期。在高流量的服务器上，这种方法可能导致较高的内存消耗。


    `@SessionScoped` 的生命周期相对较长。服务器可能会*钝化*该 bean 以释放资源，并在需要时重新加载（激活）它。*钝化*是通过序列化对象，将对象临时持久化到某处（由服务器根据其实现自行选择位置）的过程。这就是为什么需要相应的标记接口。`serialVersionUID`
    用于区分不同的对象版本。此处，除了钝化之外，我们并未使用序列化。我们不期望加载由非钝化对象版本激活的数据。因此，我们简单地使用常量值 `1L`。这可以防止
    Java 自行计算对象版本。（你可以阅读 Java 文档以了解更多关于序列化的信息：[`docs.oracle.com/javase/8/docs/api/java/io/Serializable.html`](http://docs.oracle.com/javase/8/docs/api/java/io/Serializable.html)）。


    尽管钝化是一种减少内存消耗的策略，但它会使用额外的 IO 或其他资源。因此，生命周期更短的作用域通常是更好的选择。Books 应用程序仅面向一两位编辑和大量读者。此处延长
    bean 的生命周期并无大碍。我将在后面讨论其他作用域。


    为了模拟从数据库加载数据，分类列表将在 `PostConstruct` 时创建。容器会在创建类的实例并注入依赖项（如果有的话）之后立即调用此类注解方法。我们本可以在类构造函数中完成此初始化，但使用
    Java 持久化 API（JPA——下一章的主题）时，相应的服务类将在类构造*之后*被注入。然后我们需要稍后执行数据库检索，这就是 `PostConstruct`
    成为理想选择的原因。


    双花括号表示法是一种古老的 Java 惯用法。然而，许多开发者并不了解它。它只是在构造 `categories` 后立即调用 setter 的一种快捷方式。要为新建的类设置属性，最好使用一个允许将属性作为参数传递的特殊构造函数。正如你将在
