    *   A *property* is a field that is exposed by a pair of getter and setter.


    JavaServer Faces is designed to run both in Enterprise Java Beans (EJB) containers
    as well as in servlet containers. Both are called *application servers*. Whereas
    the first one contains a full or partial stack (besides the full platform, only
    one profile, the *web profile,* is defined) of Java EE technologies, including
    servlet, the latter only serves servlets. Thus, other Java EE technologies, like
    Contexts and Dependency Injection (CDI) , are not available in servlet containers.
    Some widely known examples of EJB containers are GlassFish and WildFly. Examples
    of servlet containers include Tomcat and Jetty.


    If JSF runs on a pure servlet container, JSF manages so-called *backing beans*.
    Such a bean will be annotated as @ManagedBean, and that’s where the term *managed
    bean* originates. Starting with Java EE 6/JSF 2.0, developers could use CDI *named
    beans* too, which is today’s recommended technology. In TinyCalculator, we use
    a CDI named bean. Such a bean is annotated by @Named. The current version, JSF
    2.3, deprecated the old JSF managed beans. If you want to use CDI managed beans,
    you either need to use an EJB container like GlassFish or add the CDI framework
    to the servlet container. A named or managed bean might be accessed by its name.


    The second annotation, @RequestScoped, declares the bean’s lifetime—with every
    request from your browser, an instance of this class is created and destroyed
    by the termination of the request. A longer lifetime might be declared by @SessionScoped
    (providing one instance of the bean per user session), @ApplicationScoped (one
    instance during the application’s lifetime), and more. I’ll talk more about this
    later in the book.


    In the example, we used a CDI named bean, as in Listing [1-2](#A435433_1_En_1_Chapter.xhtml#PC3).


    ###### Listing 1-2 CDI Annotation for a Request Scoped Bean


    ```

    1   import javax.inject.Named;

    2   import javax.enterprise.context.RequestScoped;


    4   @Named

    5   @RequestScoped

    6   public class TinyCalculator {...}

    ```


    A JSF managed bean, on the other hand, would be declared as in Listing [1-3](#A435433_1_En_1_Chapter.xhtml#PC4).


    ###### Listing 1-3 JSF Annotation for a Request Scoped Bean (Do Not Use)


    ```

    1   import javax.faces.bean.ManagedBean;

    2   import javax.faces.bean.RequestScoped;


    4   @ManagedBean

    5   @RequestScoped

    6   public class TinyCalculator {...}

    ```


    ###### Caution


    Always use the annotations for named/managed beans in conjunction with the appropriate
    scope annotations—for example, both JSF annotations or both CDI annotations. In
    particular, a named bean with JSF scope would result in a runtime error.


    Although you can’t mix these annotations within a single bean, it is possible
    to use both types (named and managed) beans within one application. That might
    be useful for migrating older applications that used JSF managed beans. It’s possible
    to add new features by implementing them as CDI named beans while keeping the
    existing beans. Then, over time, the existing beans might be changed to named
    beans too.


    But why should you prefer CDI named beans over JSF managed beans? As their name
    suggests, JSF managed beans are developed especially for and dedicated only to
    JSF.


    CDI (Contexts and Dependency Injection) is relatively new to Java EE and has made
    it into EE 6\. It allows the container to “inject” appropriate objects into your
    object. These objects may not be known at compile time, and the dependencies will
    be resolved at runtime. This allows loose coupling of objects. One essential part
    of this solution is a general naming concept.


    Because CDI named beans may be used in different Java EE technologies, JSF itself
    slowly migrates to CDI, which sometimes replaces the proprietary solution. JSF
    2.3 at last simply allows to inject JSF-related objects into places where it had
    been very tricky before to access these values. The migration to CDI is mostly
    complete for this version.


    ###### Note


    As of JSF 2.3 (Java EE 8), JSF managed beans (@ManagedBean) became deprecated.


    But is CDI available in pure servlet containers like Apache Tomcat? No, but JSF
    isn’t available either until you deploy the JSF library to enable it. Similarly,
    you may add CDI to a servlet container: just provide a CDI implementation—for
    example, Weld ( [http://repo1.maven.org/maven2/org/jboss/weld/servlet/weld-servlet/](http://repo1.maven.org/maven2/org/jboss/weld/servlet/weld-servlet/)
    ). In the case of Tomcat, there is a simpler solution: Use TomEE ( [http://tomee.apache.org/index.html](http://tomee.apache.org/index.html)
    ), which is Tomcat bundled with Java EE technologies, implementing the Java EE
    Web Profile.


    ###### Bean Passivation


    If the bean’s lifetime is expanded to more than one request, the server still
    has to manage this object, even though the next request may take a while or will
    never occur. The latter is mitigated by a session timeout. Until then, the bean
    is alive. Where there is a lot of traffic, this memory consumption may cause problems.


    To avoid memory problems, or for other reasons, depending on the implementation,
    the container might *passivate* a bean : the object is persisted somewhere, such
    as to disk, and during the next request, when needed, is restored into memory
    (*activated*).


    To enable this feature, the bean must implement the *Serializable* interface.'
