    # 5.  HTML 友好标记


    Michael Müller¹


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    在 JSF 早期，大多数开发者熟悉 Java，但不熟悉 HTML。JSF 标签旨在提供视图描述，无需深入了解 HTML。时代变了，如今许多开发者都熟悉 HTML。那么，为什么不直接用目标语言
    HTML 来定义页面呢？这就是 HTML 友好标记的用途。


    HTML 友好标记是 JSF 2.2 引入的特性之一。HTML5 友好标记，或者更准确地说，*直通元素*和*直通属性*，是为了支持 HTML5 的附加功能而引入的。例如，你可以添加一个直通属性来添加微数据或其他新的
    HTML5 特性。


    就个人而言，我倾向于省略*5*，因为这个特性也适用于其他 HTML 版本。将其称为*HTML5 友好*的问题在于，人们会认为某个特性是 HTML5 特有的，而实际上并非如此。


    ## HTML 友好的 TinyCalculator


    让我们重新设计 TinyCalculator 应用程序。回顾一下，清单 5-1 展示了使用传统 JSF 标签的原始页面。


    ###### 清单 5-1 使用 JSF 标签的 TinyCalculator


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5       <h:head>

     6           <title>TinyCalculator</title>

     7       </h:head>

     8       <h:body>

     9           <h1>TinyCalculator</h1>

    10           <h:form>

    11               <div>

    12                   <h:outputLabel value="Param1: "/>

    13                   <h:inputText value="#{tinyCalculator.param1}"/>

    14               </div>

    15               <div>

    16                   <h:outputLabel value="Param2: "/>

    17                   <h:inputText value="#{tinyCalculator.param2}"/>

    18               </div>

    19               <div>

    20                   <h:commandButton value="Add"

    21                                    action="#{tinyCalculator.add}"/>

    22                   <h:commandButton value="Subtract"

    23                                    action="#{tinyCalculator.subtract}"/>

    24                   <h:commandButton value="Multiply"

    25                                    action="#{tinyCalculator.multiply}"/>

    26                   <h:commandButton value="Divide"

    27                                    action="#{tinyCalculator.divide}"/>

    28               </div>

    29               <div>

    30                   <h:outputLabel value="Result: "/>

    31                   <h:outputText value="#{tinyCalculator.result}"/>

    32               </div>

    33           </h:form>

    34       </h:body>

    35   </html>

    ```


    清单 5-2 展示了一个更接近纯 HTML 的版本。


    ###### 清单 5-2 HTML 友好风格的 TinyCalculator


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns="http://www.w3.org/1999/xhtml"

     4         xmlns:jsf="http://xmlns.jcp.org/jsf">

     5       <head>

     6           <title>TinyCalculator</title>

     7       </head>

     8       <body>

     9           <h1>TinyCalculator</h1>

    10           <form jsf:id="calc">

    11               <div>

    12                   Param1: <input type="text"

    13                            jsf:value="#{tinyCalculator.param1}"/>

    14               </div>

    15               <div>

    16                   Param2: <input type="text"

    17                            jsf:value="#{tinyCalculator.param2}"/>

    18               </div>

    19               <div>

    20                   <input type="submit" value="Add"

    21                          jsf:action="#{tinyCalculator.add}"/>

    22                   <input type="submit" value="Subtract"

    23                          jsf:action="#{tinyCalculator.subtract}"/>

    24                   <!-- 或者，使用 button 元素： -->

    25                   <button jsf:action="#{tinyCalculator.multiply()}">

    26                       Multiply

    27                   </button>

    28                   <button jsf:action="#{tinyCalculator.divide()}">

    29                       Divide

    30                   </button>

    31               </div>

    32               <div>

    33                   Result: #{tinyCalculator.result}

    34               </div>

    35           </form>

    36       </body>

    37   </html>

    ```


    让我们仔细看看。在页面开头，你会找到 XML 命名空间定义 xmlns:jsf="http://xmlns.jcp.org/jsf"。在这个定义中，前缀 `jsf:`
    指向那个特殊的命名空间。现在，如果 JSF 发现一个元素带有任何以此命名空间别名为前缀的属性，它就会将该元素视为 JSF 将要处理的元素。JSF 会尝试将这些元素映射到已知元素，就像它们使用了传统的
    JSF 标签一样。例如，`"input type=submit"` 将以与 `h:inputText` 相同的方式处理。任何未知元素都被视为直通元素，并按原样渲染。这两种元素都会被收集到组件树中。


    HTML 友好标记自 JSF 2.2 起就已可用。我们将在 Books 应用程序（第二部分）中使用 JSF 标签，并在开发 Alumni（第四部分）时部分切换到更
    HTML 友好的风格。你可以根据自己喜欢使用 HTML 还是倾向于隐藏大部分 HTML 内容来选择其中一种风格。从技术上讲，随意混合使用这些风格没有问题，但如果你以一致的方式使用它们，代码的可读性通常会更好。


    ## 总结


    HTML 友好标记是一种比 JSF 标签更接近纯 HTML 的页面风格。只有需要由 JSF 处理的属性才会用特殊前缀标记，而页面的其余部分则使用 HTML
    编码。


    HTML 友好标记也意味着将 JSF 无法直接处理的 HTML 属性传递给浏览器。这里讨论的直通属性可用于向 JSF 标签添加 HTML 属性，这些属性将按原样渲染。因此，JSF
    标签可以丰富任何属性，即使 JSF 不认识它。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_6`


    # 6.  配置文件


    Michael Müller¹


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    当我们创建 TinyCalculator 时，NetBeans 生成了一些配置文件。根据应用程序的不同，Java EE 会使用这些文件或其他文件来配置其行为。本章概述了这些配置文件。


    ## pom.xml


    POM 代表项目对象模型。这个文件与 Maven 相关，如前所述，这超出了本书的范围。我只能解释最重要的内容，以传达项目中使用的库的信息。这将使你能够将这些库包含在你选择的构建工具中。


    因此，我只会列出 POM 的片段——比如清单 6-1，它是 TinyCalculator 项目的一部分。POM 位于每个项目的根文件夹中。


    ###### 清单 6-1 Maven POM 中的依赖项


    ```

    1   ...

    2   <dependency>

    3       <groupId>javax</groupId>

    4       <artifactId>javaee-web-api</artifactId>

    5       <version>7.0</version>

    6       <scope>provided</scope>

    7   </dependency>

    8   ...

    ```


    考虑清单 6-1 的第 5 行：我建议下载 NetBeans Java EE 捆绑包。在撰写本文时，NetBeans 8.2 仍然是最新的发布版本。它捆绑了
    GlassFish 4.1，一个符合 Java EE 7 标准的服务器。因此，我之前显示的版本仍然是 7。


    在继续下一个应用程序（称为 Books）之前，我将向你展示如何更新服务器。对于 Java EE 8，你需要为版本号提供 8.0。

    '
- fmt: '# `web.xml`


    `web.xml` is the servlet *deployment descriptor* file. JSF itself is implemented
    by Java servlet technology.


    This configuration file is located in the `ProjectRoot/src/main/webapp/WEB-INF`
    folder. Within NetBeans’ project tree, you’ll find it in the `Web Pages/WEB-INF`
    folder. `Web Pages` is an alias for the appropriate folder.


    Listing [6-2](#A435433_1_En_6_Chapter.xhtml#PC2) shows the `web.xml` file of TinyCalculator.


    ###### Listing 6-2 `web.xml`


    ```

     1   <?xml version="1.0" encoding="UTF-8"?>

     2   <web-app version="3.1"

     3       xmlns="http://xmlns.jcp.org/xml/ns/javaee"

     4       xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

     5       xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

     6       http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd">


     8       <context-param>

     9           <param-name>javax.faces.PROJECT_STAGE</param-name>

    10           <param-value>Development</param-value>

    11       </context-param>


    13       <servlet>

    14           <servlet-name>Faces Servlet</servlet-name>

    15           <servlet-class>javax.faces.webapp.FacesServlet</servlet-class>

    16           <load-on-startup>1</load-on-startup>

    17       </servlet>


    19       <servlet-mapping>

    20           <servlet-name>Faces Servlet</servlet-name>

    21           <url-pattern>*.xhtml</url-pattern>

    22       </servlet-mapping>


    24       <session-config>

    25           <session-timeout>

    26               30

    27           </session-timeout>

    28       </session-config>


    30       <welcome-file-list>

    31           <welcome-file>index.xhtml</welcome-file>

    32       </welcome-file-list>

    33   </web-app>

    ```


    The header with its version and namespaces is of the Java EE 7 version, which
    defines Servlets 3.1. A lot of Java EE 8 apps still use the same descriptor file.
    The Java EE 8 descriptor differs only in the versioning (using 4.0 instead of
    3.1 in line 2, and `web-app_4_0.xsd` in line 6). This version 4 refers to Servlets
    4.0. Sadly, GlassFish 5.0 (and 5.0.1 beta) doesn’t resolve some backing beans
    properly with the new version. You may either use the old descriptor format, which
    is fine for most Java EE 8 features, or you need to install a different app server,
    like Payara. I’ll show you how before moving on to the Books app.


    Table [6-1](#A435433_1_En_6_Chapter.xhtml#Tab1) describes some important elements
    of the descriptor file.


    ###### Table 6-1 Descriptor File


    | Element | Description |

    | --- | --- |

    | `context-param` | Defines a parameter, composed of a name-value pair. The param
    `javax.faces.PROJECT_STAGE` is used to distinguish between Development and Production.
    Within the development stage, JSF offers some debugging aid, like automated messages.
    This feature will display all JSF messages that aren’t displayed by an appropriate
    message element. |

    | `servlet` | Defines a name and the startup order for a servlet class. This order
    is needed in case of dependencies if more than one servlet is defined. |

    | `servlet-mapping` | Maps a URL pattern to a servlet, which is defined by this
    name. In the case of TinyCalculator, no special context is defined, thus the application
    runs within the context `//Server:port/TinyCalculator/...`. Within this context,
    all URLs ending with `.xhtml` are handled by the application. |

    | `session-config` | Config settings for the session context. Here, one sub-element
    for the session timeout (in minutes) is defined. Remember, a client might stop
    sending requests at any time, often without terminating the app. So a timeout
    is very important! |

    | `welcome-file-list` | Defines one or more welcome files. Within this tag, the
    developer needs to place a `welcome-file` tag for every welcome file. Beginning
    with the first entry, the server searches the URI `http(s)://server:port/appContext/welcomeFile`
    until it finds an appropriate file to display. A welcome file may contain a path
    within the app. If no welcome file is defined, GlassFish searches for `index.html`.
    |


    The `web.xml` file is used for a lot more settings. I discuss some of these later
    when they’re used for the applications, such as security settings for the Alumni
    app.


    ## `faces-config.xml`


    So far, there is no `faces-config.xml` in TinyCalculator. But this file is needed
    for a couple of configurations, so I cover it when discussing the particular applications.
    Books, for example, uses localized property files that are configured by the `faces-config.xml`
    file. Or, as mentioned in Chapter [5](#A435433_1_En_5_Chapter.xhtml), this configuration
    might be used to overwrite navigation rules.


    ## `beans.xml`


    Starting with Java EE 6, Contexts and Dependency Injection (CDI) became part of
    the Java Enterprise Edition. In those early days, CDI needed to be enabled by
    the `beans.xml` file, shown in Listing [6-3](#A435433_1_En_6_Chapter.xhtml#PC3).
    For this purpose, `beans.xml` might be completely empty or just contain the XML
    namespace declaration.


    ###### Listing 6-3 `beans.xml`


    ```

    1   <?xml version="1.0" encoding="UTF-8"?>

    2   <beans xmlns="http://xmlns.jcp.org/xml/ns/javaee"

    3          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    4          xsi:schemaLocation="http://xmlns.jcp.org/xml/ns/javaee

    5          http://xmlns.jcp.org/xml/ns/javaee/beans_1_1.xsd"

    6          bean-discovery-mode="annotated">

    7   </beans>

    ```


    Starting with Java EE 7, CDI is enabled by default, so you usually don’t need
    this file in Java EE 8. You may use it to control the bean discovery mode, which
    isn’t covered in this book.


    I just mention this file for completeness, but you may face a situation where
    you still need to develop for a Java EE 6 environment.


    ## `persistence.xml`


    This file, located in the `projectRoot/src/main/resources/META-INF` folder, is
    used to configure the Java Persistence API. We’ll need it to store information
    in a database. It’s first used and discussed in Chapter [12](#A435433_1_En_12_Chapter.xhtml).


    ## `glassfish-resources.xml`


    As its name suggests, this is a vendor-specific configuration file. The projects
    in this book are developed with GlassFish, so you’ll find `glassfish-resources.xml`
    in this book. This file describes resources like JDBC connections.


    Depending on the application server you use, your configuration may slightly differ.
    Usually it should be no problem to transfer the content for use in your environment.


    I discuss the settings of this file in Chapter [10](#A435433_1_En_10_Chapter.xhtml)’s
    discussion of the Books application, which uses the Java Persistence API to store
    data.


    ## `glassfish-web.xml`


    So far, there’s no `glassfish-web.xml` file in the TinyCalculator project. In
    an earlier section, I discussed the context path. By default, this context is
    the same as the project name. But let’s suppose we want to change that:


    1.  Using NetBeans, open the TinyCalculator project.

    2.  Open the project properties by right-clicking the project in the project tree
    and choosing Properties.

    3.  Click the Run category and change the context path to Calculator.

    4.  Click OK.


    NetBeans creates a `glassfish-web.xml` file, located in the `WEB-INF` folder.


    Alternatively, this file might be created with a (text) editor, as shown in Listing
    [6-4](#A435433_1_En_6_Chapter.xhtml#PC4).


    ###### Listing 6-4 `glassfish-web.xml`


    ```

     1   <?xml version="1.0" encoding="UTF-8"?>

     2   <!DOCTYPE glassfish-web-app PUBLIC

     3   "-//GlassFish.org//DTD GlassFish Application Server 3.1 Servlet 3.0//EN"

     4   "http://glassfish.org/dtds/glassfish-web-app_3_0-1.dtd">

     5   <glassfish-web-app error-url="">


     7       <context-root>/Calculator</context-root>


     9       <!-- omitted other context for brevity-->

    10   </glassfish-web-app>

    ```


    For brevity, I’ve omitted some config information. With `context-root`, the default
    context path is overwritten.


    The `glassfish-web.xml` is needed for a couple of other configurations. I’ll cover
    those when discussing the particular applications.


    ###### Note


    In existing projects, you may find a `sun-web.xml` file. This is an alternative
    (older) name for the same configuration done with `glassfish-web.xml`.'
