- fmt: '# Servlet


    A `servlet` is a Java class hosted in a servlet container that dynamically processes
    requests and constructs responses. This class must conform to the Java Servlet
    API. Like other Java EE components, it’s specified by the *Java Community Process*
    (JCP). The servlet version included in Java EE 7 is JSR 340: Java Servlet 3.1
    Specification ([https://jcp.org/en/jsr/detail?id=340](https://jcp.org/en/jsr/detail%3Fid=340)),
    respectively JSR 369 ([https://jcp.org/en/jsr/detail?id=369](https://jcp.org/en/jsr/detail%3Fid=369)):
    Java Servlet 4.0 in the case of Java EE 8. (JSR is short for Java Specification
    Request.)


    Although a servlet theoretically might respond to any request, the Java EE implementation
    responds to HTTP requests only. Thus, I use the term `servlet` as a synonym for
    `HTTP servlet`. The servlet’s lifecycle is maintained by the container. The web
    client (the browser) interacts with the servlet by request/response, as described
    in the section “HTTP.” A servlet is a class extending the abstract class `javax.servlet.http.HttpServlet`.
    In most common scenarios, at least two methods, `doGet` and `doPost`, will be
    overwritten to implement specific behavior and send back the response. These two
    methods refer to the appropriate HTTP methods GET and POST.


    A servlet is invoked by a client’s request to a specific path (of the URI). By
    using the simple annotation `@WebServlet("/path")`, this might be defined. While
    discussing JSF configuration, I’ll talk about configuring servlets by a configuration
    file (`web.xml`). JSF itself is implemented as servlet (`FacesServlet`).


    If you enhance the TinyCalculator by NetBeans 8’s Add Servlet wizard (New file
    ➤ Web ➤ Servlet) and provide Hello as the name, NetBeans generates the code shown
    in Listing [2-4](#A435433_1_En_2_Chapter.xhtml#PC4).


    ###### Listing 2-4 Programmatically Generating an HTML Page by a Servlet


    ```

     1   [imports omitted]


     3   @WebServlet(name = "Hello", urlPatterns = {"/Hello"})

     4   public class Hello extends HttpServlet {


     6       /**

     7        * Processes requests for both HTTP <code>GET</code>

     8        * and <code>POST</code> methods.

     9        *

    10        * @param request servlet request

    11        * @param response servlet response

    12        * @throws ServletException if a servlet-specific error occurs

    13        * @throws IOException if an I/O error occurs

    14        */

    15       protected void processRequest(HttpServletRequest request,

    16               HttpServletResponse response)

    17               throws ServletException, IOException {

    18           response.setContentType("text/html;charset=UTF-8");

    19           try (PrintWriter out = response.getWriter()) {

    20               /* TODO output your page here.

    21                  You may use following sample code. */

    22               out.println("<!DOCTYPE html>");

    23               out.println("<html>");

    24               out.println("<head>");

    25               out.println("<title>Servlet Hello</title>");

    26               out.println("</head>");

    27               out.println("<body>");

    28               out.println("<h1>Servlet Hello at "

    29                   + request.getContextPath() + "</h1>");    

    30               out.println("</body>");

    31               out.println("</html>");

    32           }

    33       }


    35       /**

    36        * Handles the HTTP <code>GET</code> method.

    37        *

    38        * @param request servlet request

    39        * @param response servlet response

    40        * @throws ServletException if a servlet-specific error occurs

    41        * @throws IOException if an I/O error occurs

    42        */

    43       @Override

    44       protected void doGet(HttpServletRequest request,

    45               HttpServletResponse response)

    46               throws ServletException, IOException {

    47           processRequest(request, response);

    48       }


    50       /**

    51        * Handles the HTTP <code>POST</code> method.

    52        *

    53        * @param request servlet request

    54        * @param response servlet response

    55        * @throws ServletException if a servlet-specific error occurs

    56        * @throws IOException if an I/O error occurs

    57        */

    58       @Override

    59       protected void doPost(HttpServletRequest request,

    60               HttpServletResponse response)

    61               throws ServletException, IOException {

    62           processRequest(request, response);

    63       }


    65       [...code omitted ...]

    66   }

    ```


    If you start this application and complete the URI with `/Hello`, you can verify
    the servlet responding to your request, as shown in Figure [2-2](#A435433_1_En_2_Chapter.xhtml#Fig2).


    ![A435433_1_En_2_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_2_Fig2_HTML.jpg)


    ###### Figure 2-2 Hello servlet in action


    As mentioned, we need to override the `doGet` and `doPost` methods. This is where
    we usually put our code to react on the HTTP methods. If there’s no difference
    between handling a GET or a POST request, both methods might delegate to a common
    handler. That’s how NetBeans generates this skeleton file. This common handler
    is the `processRequest` method (lines 15ff). This skeleton responds with a web
    page. All HTML tags are written to the output stream by Java instructions. Beside
    literal HTML code, NetBeans inserted a method call to this output: `request.getContextPath()`,
    which refers to the context path of the current application. The context path
    is the first part of the URI after server and port. It’s the place the application
    lives. In Figure [2-2](#A435433_1_En_2_Chapter.xhtml#Fig2), this is the `/TinyCalculator`
    output. We’ll use this method again for a service we use in Chapter [24](#A435433_1_En_24_Chapter.xhtml).


    Writing HTML code directly inside Java code is not a good approach for anything
    beyond a trivial example. One way is to separate the HTML page from the Java code
    using Java Server Pages (JSP). The page is stored on its own with embedded JSP
    tags and is compiled into a servlet at a later time. Even though still active,
    pure JSP might be considered as ancestor of JSF. In fact, the early versions of
    JSF used JSP for the view definition.


    ## Deployment


    All servlets, including JSF, run within a servlet container. When we launched
    TinyCalculator, NetBeans automatically started GlassFish (if not already running)
    and deployed the application to the application server.


    If we want to install an application to a production server, we may add this server
    to the NetBeans environment (or to your favorite IDE) and let the IDE perform
    the deployment to the production system. If, for some reason, it’s not possible
    to use the IDE for deployment, you might deploy the application by yourself. This
    process depends on the application server you use.


    In the case of GlassFish, you can either deploy at the command line using the
    `asadmin` command or use your browser to log in to the administrator console.
    GlassFish offers an Application menu intended to deploy, undeploy, start an application,
    and more. Last but not least, you may use Maven to deploy the application automatically
    subsequent to the build process.


    ## Summary


    This chapter introduced the technical foundations of web applications as developed
    during this book: HTTP, HTML, CSS, JavaScript, Java, Maven, Selenium and Arquillian,
    servlets, and deployment. Selected technologies were briefly explained, and others
    were just mentioned. I skipped over discussing Java EE and JSF, which are not
    part of the foundations but are the main subjects of this book.


    For readers unfamiliar with the browser parts of this technology stack, this book
    offers additional information about HTML in Appendix A and CSS in Appendix B.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_3](#A435433_1_En_3_Chapter.xhtml)'
