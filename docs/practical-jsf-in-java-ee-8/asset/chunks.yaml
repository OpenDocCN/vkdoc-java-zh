    as shown in Listing [25-16](#A435433_1_En_25_Chapter.xhtml#PC18). (For more, see
    [https://javaee.github.io/javaee-spec/javadocs/javax/validation/Constraint.html](https://javaee.github.io/javaee-spec/javadocs/javax/validation/Constraint.html)
    .)


    ###### Listing 25-16 RepeatedEntryConstraint


    ```

     1 @Constraint(validatedBy = RepeatedEntryValidator.class)

     2 @Documented

     3 @Target(TYPE)

     4 @Retention(RUNTIME)

     5 public @interface RepeatedEntryConstraint {


     7   String message() default "Both input fields must match";


     9   Class<?>[] groups() default {};


    11   Class<? extends Payload>[] payload() default {};

