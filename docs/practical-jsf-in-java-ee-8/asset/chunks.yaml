    来验证密码（登录时提供的）是否与哈希值匹配。


    ## 总结


    每次对数据库的访问都通过一个数据外观（data façade）来执行，该外观为一组方法提供接口，以访问一组相关数据。这个外观用于隐藏数据访问的细节。对于不同类型的数据，Alumni
    提供了多个从抽象外观派生而来的外观。


    本章还展示了使用外观存储、更新和删除数据的细节。密码一旦传递给实体就会被加密，并且永远不会以其原始值存储。


