  trans: '

    # 3. JavaServer Faces


    Michael Müller¹


    (1)德国北莱茵-威斯特法伦州布吕尔


    如果说 JavaServer Pages (JSP) 用于定义页面，这些页面会被编译成 Servlet，那么 JavaServer Faces (JSF)
    则是一个完整的 Web MVC（模型-视图-控制器）框架。有趣的是，它本身也是作为一个 Servlet 实现的。


    以下是该规范的一个简短摘录：


    *   使得从一组可复用的 UI 组件构建用户界面变得简单

    *   简化了应用程序数据与用户界面之间的迁移

    *   帮助管理跨服务器请求的 UI 状态

    *   为将客户端生成的事件连接到服务器端应用程序代码提供了一个简单的模型

    *   允许轻松构建和复用自定义 UI 组件


    JSF 旨在处理跨多个请求的组件状态。它可以用于处理复杂的表单，即使这些表单跨越多个页面。它为客户端创建的事件提供了一个强类型的事件模型，并实现了强大的页面导航功能。


    JSF 由一系列 JSR 定义：


    *   2004 年 JSR 127 JavaServer Faces

    *   2006 年 JSR 252 JavaServer Faces 1.2

    *   2009 年 JSR 314 JavaServer Faces 2.0

    *   2010 年及以后 JavaServer Faces 2.1，JSF 2.0 的维护版本

    *   2013 年 JSR 344 JavaServer Faces 2.2

    *   2016 年 JSR 372 JavaServer Faces 2.3


    如果你对 JSF 的完整历史感兴趣，包括哪个版本引入了哪些特性，你可能想阅读相应的 JSR。但请注意：规范主要是一个抽象的定义文档——它既不是入门指南，也不是实践手册。


    JSF 最初的一个意图是隐藏 HTML，并为程序员提供一个熟悉的事件处理编程概念。从 JSF 2.2 开始，你可以主要使用 JSF 标签，或者创建以 HTML
    为主的文档，并加入一些 JSF 特有的属性。


    在本书中，我们将从第一种（传统）方法开始，使用特定的标签。之后，我们将使用对 HTML 友好的标记，如果你熟悉 HTML，这可能是一个不错的选择。正如你将看到的，两种风格都有其特定的优势。


    ## 视图定义语言


    JSF 使用一种可交换的视图定义语言（VDL）来定义用户界面。目前，JSF 支持 JSP 和 Facelets。


    JSP 从第一个版本就开始使用。由于 JSF 的生命周期与 JSP 的生命周期略有不同，Jacob Hookom 开发了一种名为 *Facelets* 的替代
    VDL，它与 JSF 完美集成。Facelets 在 JSF 2.0 中成为标准的 VDL。从该版本开始的所有主要新特性，如模板、复合组件等，都仅适用于 Facelets。尽管为了兼容性仍然支持
    JSP，但你可以将其视为已弃用。


    本书中的所有应用程序都是使用 Facelets 构建的。


    ## Web 应用与传统应用


    在传统应用中，应用程序本身通常负责呈现。即使你使用了像 X Window 系统这样的专用显示服务器，它仍然由应用程序控制。


    但在 Web 应用中，数据被传递给浏览器，由浏览器负责呈现。为此，服务器将要显示的内容打包成浏览器能够理解的格式——例如，HTML 或 XHTML 文档。此外，服务器可能会以层叠样式表（CSS）的形式提供一些布局信息。其他一切都取决于浏览器。正如存在不同的浏览器一样，呈现方式也可能不同。幸运的是，标准的持续发展确保了逐渐趋同。但如果用户使用自己的浏览器配置，呈现方式可能又会不同。


    Web 应用不仅将输出委托给客户端浏览器，而且通常不会自行激活！只有当用户通过浏览器请求页面时，应用程序才会在服务器上激活，执行一些操作，并将内容传递给浏览器。根据用户的输入，页面的内容可能会在不导航到新
    URL 的情况下发生变化。这种（看似）主动的内容变化可能会让用户感觉是由服务器端主动发起的。实际上，这种处理通常是通过一个小的后台请求，借助异步 JavaScript
    和 XML（AJAX）来完成的。


    除了 (X)HTML 和 CSS，我们还提到了另一种浏览器端技术：JavaScript。浏览器使用 JavaScript 在后台请求一些数据，并交换浏览器内容的部分，即文档对象模型（DOM）。用
    JSF 的术语来说，这是通过部分处理和/或部分渲染来完成的。这种魔法给人的印象是服务器在更新屏幕，尽管实际上是由客户端向服务器请求信息（客户端拉取）。真正的*推送*，即服务器主动改变呈现，要稍微复杂一些。对客户端的响应被人为延迟，以便在服务器端出现新信息时，稍后传输更多信息。或者你可以使用像
    WebSockets 这样的新技术。WebSockets 需要更多解释，将在本书后面讨论。


    在传统应用中，程序通常立即响应用户输入。在 Web 应用中，程序只有在请求新页面或（通常结合 AJAX）请求部分新数据时，才会检测到用户输入。到此时，用户可能已经在各个字段中进行了输入。不难想象，应用程序必须以不同的方式处理这种情况。在这一点上，JSF
    为程序员提供了支持，并为每个输入在服务器上引发相应的事件，使得编程模型与开发者通常使用的模型并非完全不同。


    另一个区别：Web 应用通常运行在一个提供多种服务的执行环境中。这样的运行时环境被称为*容器*。在 JSF 的情况下，它是一个所谓的 Servlet 容器。这指向了
    Servlet 的底层技术。即使在使用 JSF 开发时，直接使用 Servlet 有时也可能是合适的，因此熟悉 Servlet 技术不会有坏处。


    Servlet 容器为应用程序提供了与其他服务的接口。它是应用服务器或 Web 服务器的一部分。许多服务器主要包含一个容器，因此容器和应用服务器的概念经常互换使用。实际上，一个服务器可以托管多个容器。例如，GlassFish
    不仅托管一个 Servlet 容器，还托管一个 EJB 容器。在下一节中，我们将首先从外部来看应用服务器。


    现在，当用户想要使用 Web 应用时，他会在浏览器中调用应用程序的 URI。客户端向 HTTP 服务器发出请求。HTTP 服务器根据 URI 识别出它不能简单地向浏览器提供静态页面。因此，服务器将请求通过容器转发给
    Web 应用，在本例中，是 JSF Servlet 与用户代码的结合体，并在那里进行处理。输出被生成为 (X)HTML 文档，发送到浏览器，并在那里显示。该过程如图
    3-1 所示。


    ![A435433_1_En_3_Fig1_HTML.jpg](img/A435433_1_En_3_Fig1_HTML.jpg)

    '
- fmt: '###### Figure 3-1 HTTP request-response cycle


    Technically speaking, the response is `HTTP`, which may contain information other
    than `HTML`. For example, the response might be an image embedded within an `HTML`
    page. Thus, many programmers think of an `HTML` response. Figure [3-1](#A435433_1_En_3_Chapter.xhtml#Fig1)
    shows this simplified view.


    From this perspective, we consider the application server to be a *black box*.
    What happens inside it is interesting. Recall briefly the previous applications—here
    you’ve defined a `JSF` page. We used `Facelets` as the page language. Besides
    `HTML`, every `Facelets` page definition contains some `JSF`-specific tags, such
    as `<h:inputText>`. Within the browser, we provided the `URI` of such a page.
    Stepping forward in the application, this `URI` won’t be provided by the user
    (by typing in the `URI`) but by the application itself.


    The server determines the page to be rendered based on the `URI`, parses its contents,
    and resolves the tags. In the simplest case, the tags are replaced by appropriate
    data, and the resulting page is sent to the browser. This is only half of the
    truth. The browser indeed could have displayed the data of the application before.
    So `JSF` first checks whether there’s already a session. If so, the component
    tree—the logical representation of the view model—is restored. Entries are validated,
    and the data model is updated. In total, `JSF` has six different phases for step
    2 in Figure [3-1](#A435433_1_En_3_Chapter.xhtml#Fig1).


    Let’s dig a bit deeper and take a brief look inside processing and the `JSF` lifecycle.


    ## JSF Lifecycle Overview


    The `JSF` lifecycle consists of six phases, illustrated in Figure [3-2](#A435433_1_En_3_Chapter.xhtml#Fig2):


    1.  Restore view

    2.  Apply request values

    3.  Process validations

    4.  Update model values

    5.  Invoke application

    6.  Render response


    ![A435433_1_En_3_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_3_Fig2_HTML.jpg)


    ###### Figure 3-2 JSF lifecycle


    Figure [3-2](#A435433_1_En_3_Chapter.xhtml#Fig2) shows the six main phases and
    some smaller boxes in between indicating event processing. The arrows show the
    sequential processing, indicating the normal flow. It may differ for a new page,
    as indicated by the curved arrow. Between some phases, events (of the preceding
    phase) are processed. As an exceptional result of this processing (not shown in
    the figure), you may leave the sequential flow.


    When a request encounters the server, at first the component tree is restored.
    If it’s a request for a new page, there is no existing component tree. Thus, there
    is nothing to restore, but to create a new component tree. In this case, phases
    2 through 5 are useless and will be skipped. The server simply renders the response
    and sends it back to the client.


    In phase 2, the incoming values will be applied to the components within the tree.
    I’ll explain the component tree soon—for now, just imagine the tree as an in-memory
    representation of each `JSF` tag of the page.


    The *process validations* phase (phase 3) will validate and convert the data.
    Imagine there’s an input field for a person’s age. In the browser, the user might
    enter any text, and that incoming string must be converted into a number. Then
    the valid range is checked—for example, from 0 up to 120 years.


    Once the values are converted and validated, the model values will be updated
    in phase 4. This is when the incoming values will be assigned to the model’s—for
    example, a managed bean’s properties.


    In phase 5, `JSF` will invoke the application by calling the appropriate events,
    such as change value events, action events, and more. In a traditional application,
    these events are fired by screen components like buttons, icons, menu items, and
    so on. In a web application, the browser only sends requests, and all events are
    generated on the server side to emulate the behavior of a non-web application.
    For example, if `JSF` detects a different value for an input element, it generates
    a “changed” event. Thus, you as the application developer can react on this event.


    During the *render response* phase (phase 6), the `HTTP` response, mostly `HTML`
    is created and then sent to the client.


    Usually, only if a phase is completed successfully is the next phase acted on.
    For example, if an error occurs during validation, the phases that follow are
    skipped, and `JSF` continues with the last phase, render response, and sends the
    response to the client. Between the main phases in the figure, you can see *process
    events* boxes. During such a process event you may programmatically quit the usual
    workflow and continue directly with the render response phase. For a complete
    picture, we need to add arrows pointing from each process events box to phase
    6. Such a bypassing of the normal workflow might be initiated by an exception.
    Depending on the kind of exception, `JSF` generates messages that are sent back
    to the client. Even more, but less often used, you can terminate the whole lifecycle
    during process events.


    As a consequence, if, for example, a single input field fails during validation,
    none of the other fields will be pushed to the model. This “all or none” approach
    helps to get mostly consistent data. But sometimes it may be worthwhile to receive
    partial data, even if some other parts of the data are erroneous. To achieve that,
    `JSF` offers an `immediate` attribute, which might be set to `true` to alter this
    behavior for the appropriate `UI` element.


    This has been a short overview about the `JSF` lifecycle. We’ll dig deeper into
    it while discussing diverse aspects of the example applications.


    ## JSF Namespaces and Tags


    So far, I’ve discussed `JSF` tags without much explanation. Tags like `<h:inputText
    ...>` or `<h:commandButton>` sound more familiar to a Java developer (for example,
    compare with `Swing`: `JTextField` or `JButton`) than the `HTML` equivalents `<input
    type="text">` or `<input type="button">` and are mostly self-explanatory. In fact,
    `JSF` was designed to present Java developers with an abstraction similar to known
    technologies, including powerful event processing.


    But the browser displays `HTML` pages, and that’s what must be sent from the server
    to it. As shown in the section about servlets, `HTML` tags can be embedded into
    Java code by writing out a series of `HTML` statements. The `JSF` way is to separate
    page from code and at the same time offer an abstraction using tags from the `JSF`
    tag library. The tags are included in the `HTML` pages in `XML` style.


    The tags shown so far belong to the Standard `JSF` Component Library. To declare
    `inputText` as belonging to that library and not to any other, it’s prefixed with
    `h:`. This prefix is defined as an alias of the `http://xmlns.jcp.org/jsf/html`
    namespace, which indicates the library. `xmlns:h="http://xmlns.jcp.org/jsf/html"`
    is a pure `XML` namespace declaration. Although the `URI` is specific to the library,
    you can choose your own prefixes, but I suggest using the recommended aliases.


    A namespace is used to avoid naming conflicts. In `XML`, you may define your own
    `<h1>` tag. In `XHTML`, you must distinguish between your tag and the standard
    head 1 tag. You need to define a new namespace and an alias. To use your `h1`
    tag, you need to prefix the tag with the alias—for example, `<my:h1>`. Read more
    on this at `https://en.wikipedia.org/wiki/XML_namespace` or `www.w3schools.com/xml/xml:namespaces.asp`.


    ###### Tip


    Prior to `JSF` 2.2, the standard namespace was `java.sun.com/jsf` instead of the
    current one, `xmlns.jcp.org/jsf`. For compatibility, the old namespace can still
    be used. I recommend using the new (`xmlns.jcp.org`) specification only. The former
    one might become deprecated.


    The Standard `JSF` Component Library consists of a few parts, as shown in Table
    [3-1](#A435433_1_En_3_Chapter.xhtml#Tab1).'
