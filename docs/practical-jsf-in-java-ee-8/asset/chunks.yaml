  raw: '## Summary


    The process of internationalization covers the preparation of software to be potentially
    usable in other countries and languages. Localization is the adaptation to a specific
    language or country (or region). Localization doesn’t just mean translation, but
    also adapting date and number formats, character sets, writing direction, images,
    and more.


    Java supports translation of literal text with message bundles. Sometimes content
    has to be translated too. The chapter demonstrated a possible solution by adding
    translation to objects and the database.


    This chapter also discussed a language switcher, HTML escaping, joining tables
    by JPA, and passing parameters between pages. It introduced some repeating structures
    of JSF (some based on the JSP tag library). Some differences were addressed, but
    a detailed discussion of repeating structures comes later in the book.


    ###### Note


    The complete source code for Books as developed from startup to internationalization
    is available from webdevelopment-java.info.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_15](#A435433_1_En_15_Chapter_split_000.xhtml)


    # 15. Bean Validation


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    As I’ve pointed out, Books is an application that’s maintained by just one author,
    who should know about the expected data. So there’s no user interface that gives
    an immediate response after each input or that offers lots of hints. Of course,
    those features are essential for an application intended for potentially unknown
    users. Later on, when developing a second application called Alumni , I’ll cover
    those features in detail. Right now, validation will be useful in preventing a
    user from entering data that might not fit the database.


    Remember the JSF lifecycle : during phase 3, the input values will be converted
    and validated. In the HTML page, every input is treated as simple text. With help
    from the EL, these inputs are bound by value expressions to the data model. Usually
    this is done by using the properties of a Java bean. In Java, all properties are
    strongly typed. That means conversions are needed, from text (string) to the target
    type and vice versa. This job is done by converters. JSF offers standard converters
    for a wide range of built-in Java types. Later on, we’ll discuss custom converters.
    If a conversion fails, JSF throws an exception. Accordingly, converters perform
    raw validation.


    JSF also includes a couple of standard validators that you can use to define a
    validation at a finer level. For example, you can allow positive numbers only,
    or force a string to a maximum length, and so on. I cover this kind of validator
    later on.


    A JSF validator will validate the input on the server side just after the user
    entered it and before applying values to the model. Sometimes only validating
    the input isn’t enough. Data might be changed at the business layer. When you
    want to persist that altered data to a database, the program might crash because
    the data doesn’t fit the database schema. In such a case, validating the data
    again just before storing would be very helpful. The same applies for validating
    at any other place within the application.


    Luckily, Java EE offers exactly this kind of validation: it’s known as *bean validation*.
    JSF takes advantage of it and uses this validation too, if defined in the model
    the data is applied to. In our application, we’ll edit and store information about
    books. We’re going to add bean validation by simply applying special annotations
    to the book entity. Now this validation will be used both by JSF and JPA. And
    if needed, you may additionally call the validation programmatically.


    ## Book Entity


    Every book is described by its title, subtitle, author, and by certain other information,
    including a short description. The description might be presented to the user
    in different languages. So, we’ll need a second table containing the translations,
    like we did for the categories. For brevity’s sake, I’m only going to talk about
    essential parts of the entities. You can download the complete files.


    Tables [15-1](#A435433_1_En_15_Chapter_split_001.xhtml#Tab1) and [15-2](#A435433_1_En_15_Chapter_split_001.xhtml#Tab2)
    show the two tables we’ll use for the book and the translation.


    ###### Table 15-1 Book


    | Column Name | Data Type |

    | --- | --- |

    | bookId | int |

    | bookTitle | varchar(200) |

    | bookSubtitle | varchar(200) |

    | bookAuthor | varchar(255) |

    | bookPublisher | varchar(45) |

    | bookYear | int |

    | bookLanguage | varchar(10) |

    | bookISBN | varchar(45) |

    | bookShorttext | varchar(500) |

    | bookReference | varchar(500) |

    | bookAdReference | varchar(50) |


    ###### Table 15-2 Book Translation


    | Column Name | Data Type |

    | --- | --- |

    | btId | int |

    | btBookId | int |

    | btLanguage | varchar(10) |

    | btShorttext | varchar(500) |

    | btReference | varchar(50) |


    Next we’ll define the book entity and implement a property (field plus getter
    and setter) for every column as we did before in Chapter [12](#A435433_1_En_12_Chapter.xhtml).
    Listing [15-1](#A435433_1_En_15_Chapter_split_001.xhtml#PC1) shows just one property.'
  trans: '

    ## 摘要


    国际化流程涵盖了使软件能够在其他国家/地区及语言环境中使用的准备工作。本地化则是针对特定语言或国家（或地区）的适配。本地化不仅意味着翻译，还包括调整日期和数字格式、字符集、书写方向、图像等内容。


    Java 通过消息资源包支持对文字文本的翻译。有时内容也需要翻译。本章通过向对象和数据库添加翻译功能，演示了一种可行的解决方案。


    本章还讨论了语言切换器、HTML 转义、通过 JPA 连接表以及在页面间传递参数。它介绍了 JSF 的一些重复结构（部分基于 JSP 标签库）。虽然提及了一些差异，但关于重复结构的详细讨论将在本书后续章节展开。


    ###### 注


    从项目启动到国际化阶段开发的 Books 完整源代码可从 webdevelopment-java.info 获取。


    © Michael Müller 2018


    Michael Müller, 《Java EE 8 中的实用 JSF》，`doi.org/10.1007/978-1-4842-3030-5_15`


    # 15. Bean 验证


    Michael Müller^(1 )


    (1)德国北莱茵-威斯特法伦州布吕尔


    正如我之前指出的，Books 是一个仅由一位作者维护的应用程序，该作者应该了解预期的数据格式。因此，并没有提供在每次输入后立即给出反馈或提供大量提示的用户界面。当然，对于面向潜在未知用户的应用程序来说，这些功能至关重要。稍后，在开发名为
    Alumni 的第二个应用程序时，我将详细讨论这些功能。目前，验证将有助于防止用户输入可能不符合数据库要求的数据。


    回顾 JSF 生命周期：在阶段 3，输入值将被转换和验证。在 HTML 页面中，每个输入都被视为纯文本。借助 EL，这些输入通过值表达式绑定到数据模型。通常，这是通过使用
    Java Bean 的属性来实现的。在 Java 中，所有属性都是强类型的。这意味着需要进行转换，即从文本（字符串）到目标类型，反之亦然。这个工作由转换器完成。JSF
    为多种内置 Java 类型提供了标准转换器。稍后，我们将讨论自定义转换器。如果转换失败，JSF 会抛出异常。因此，转换器执行了原始验证。


    JSF 还包含一些标准验证器，您可以使用它们在更精细的级别上定义验证。例如，您只允许正数，或强制字符串达到最大长度等。我将在后面介绍这类验证器。


    JSF 验证器会在用户输入后、将值应用到模型之前，在服务器端验证输入。有时仅验证输入是不够的。数据可能在业务层被更改。当您尝试将这些更改后的数据持久化到数据库时，程序可能会因为数据不符合数据库模式而崩溃。在这种情况下，在存储前再次验证数据将非常有帮助。同样的原则也适用于在应用程序中的任何其他位置进行验证。


    幸运的是，Java EE 恰好提供了这种验证：它被称为 *Bean 验证*。如果数据所应用的模型中定义了验证，JSF 会利用它并同样使用此验证。在我们的应用程序中，我们将编辑和存储关于书籍的信息。我们只需向书籍实体应用特殊的注解，即可添加
    Bean 验证。现在，JSF 和 JPA 都将使用此验证。如果需要，您还可以通过编程方式调用验证。


    ## 书籍实体


    每本书都由其标题、副标题、作者以及其他信息（包括简短描述）来描述。该描述可能以不同语言呈现给用户。因此，我们需要一个包含翻译内容的第二个表，就像我们为类别所做的那样。为简洁起见，我将只讨论实体的关键部分。您可以下载完整的文件。


    表 15-1 和 15-2 展示了我们将用于书籍和翻译的两个表。


    ###### 表 15-1 书籍


    | 列名 | 数据类型 |

    | --- | --- |

    | bookId | int |

    | bookTitle | varchar(200) |

    | bookSubtitle | varchar(200) |

    | bookAuthor | varchar(255) |

    | bookPublisher | varchar(45) |

    | bookYear | int |

    | bookLanguage | varchar(10) |

    | bookISBN | varchar(45) |

    | bookShorttext | varchar(500) |

    | bookReference | varchar(500) |

    | bookAdReference | varchar(50) |


    ###### 表 15-2 书籍翻译


    | 列名 | 数据类型 |

    | --- | --- |

    | btId | int |

    | btBookId | int |

    | btLanguage | varchar(10) |

    | btShorttext | varchar(500) |

    | btReference | varchar(50) |


    接下来，我们将定义书籍实体，并为每一列实现一个属性（字段加 getter 和 setter），就像我们在第 12 章中所做的那样。清单 15-1 仅展示了一个属性。

    '
- fmt: '###### Listing 15-1 Entity Class `Book`


    ```

     1   [...]


     3   @Entity

     4   @Table(name = "Book")

     5   public class Book implements Serializable {


     7   [...]


     9     // <editor-fold defaultstate="collapsed" desc="Property Title">

    10     @Size(max = 200)

    11     @Column(name = "bookTitle")

    12     public String getTitle() {

    13       return _title;

    14     }


    16     public void setTitle(String title) {

    17       _title = title;

    18     }


    20     private String _title;

    21     // </editor-fold>


    23   [...]

    24   }

    ```


    The `<editor fold>` tags are specific to NetBeans and are used to collapse the
    code. They’ll be ignored by most other IDEs.


    Let’s focus on the `@Size(max = 200)` annotation (line 10). It checks the size
    of the property, which is limited to a maximum of 200 characters. That’s exactly
    what we defined in the table. If the property title contains more characters,
    the validation will throw an exception. This validation takes place just before
    storing the data. Without bean validation, we would get an exception while inserting/updating
    the database with a string that exceeds that size.


    At first glance, it may seem not that valuable to replace an IO exception with
    a validation exception (we may save the database access). But as mentioned, bean
    validation will be invoked by JSF also. And bean validation isn’t restricted to
    entities. You can annotate your data access object (DAO) class or any other kind
    of data model you’ve chosen. The annotation might be placed to a field or a property
    (getter method).


    During lifecycle phase 3, conversion and validation, JSF will invoke the JSF validators
    as well as bean validation. If a value expression like `#{book.name}` points to
    a property or field that’s annotated for bean validation, this check will be invoked.
    Instead of simply (re-)throwing an exception, JSF recognizes possible violations.
    If a message tag is defined within the page, as shown in the next section, then
    this exception triggers the output of an appropriate message. And as a real benefit
    of bean validation in combination with JSF, the user gets an immediate response.


    There are a couple of annotations defined by bean validation—for example, `@Min`
    and `@Max` to define integer limitations, or `@Future` and `@Past` to define date
    constraints. As you can see, these constraints seem simple. Indeed they are, so
    I won’t explain them in detail. One of the most sophisticated constraints is `@Pattern`,
    which compares the value of a property or field with pattern matching. For a list
    of possible constraints (as of Java EE 8), take a look at the Java EE 8 tutorial
    at [https://javaee.github.io/tutorial/bean-validation002.html](https://javaee.github.io/tutorial/bean-validation002.html).
    Another useful source is [http://beanvalidation.org](http://beanvalidation.org).


    Bean validation is included with Java EE application server. It’s not part of
    a pure servlet container or Java SE. Adding bean validation just means adding
    an appropriate library to your classpath. At [http://beanvalidation.org](http://beanvalidation.org)
    you’ll find a list of certified implementations.


    ## Book Editor


    If a validation failure occurs, it should be reported to the user. To do that,
    we need a placeholder for the message in our editor page. Listing [15-2](#A435433_1_En_15_Chapter_split_002.xhtml#PC2)
    shows this page.


    ###### Listing 15-2 Extract of `bookEditor.xhtml`


    ```

    1   <div class="inputGroup">

    2     <h:outputLabel styleClass="label" for="title" value="#{msg.lblTitle}"/>

    3     <h:inputText id="title" styleClass="inputFull"

    4                  value="#{bookEditor.book.title}"/>

    5     <h:message id="msgTtitle" for="title" styleClass="warning"/>

    6   </div>

    ```


    In this extract, we have a label, an input field, and a message. This message
    will contain the validation message—if, and only if, there is one. There’s no
    need to place the message nearby the input field (somebody may group all messages
    together somewhere at the page). Both components (`inputText` and `message`) are
    bound together by `for="title"`. Here `"title"` is the `id` of the input field.


    The validation will be invoked in phase 3 of the JSF lifecycle. All possible exceptions
    will be collected under the hood, including the dedicated messages. If at least
    one exception occurs, the lifecycle will branch after phase 3 directly to phase
    6, *render response*. The previous page will be rerendered, including all messages.


    Sometimes the standard messages won’t fit, so you’ll need to customize them. One
    approach is to add a `ValidationMessages.properties` file to the default package
    in the `src/main/resources` folder. Now, with the right properties within that
    file, you can customize the messages. The property names follow the structure
    `javax.validation.constraints.XXX`, where *xxx* represents the constraint name,
    such as `javax.validation.constraints.Size.message`. You’ll find a list for example
    at [http://grepcode.com/file/repo1.maven.org/maven2/org.hibernate/hibernate-validator/4.0.0.CR1/org/hibernate/validator/ValidationMessages.properties](http://grepcode.com/file/repo1.maven.org/maven2/org.hibernate/hibernate-validator/4.0.0.CR1/org/hibernate/validator/ValidationMessages.properties).
    If you need to translate the messages, just add resource files with the proper
    locale code, as we did before.


    Especially in the case of the pattern matcher, a single message like `must match
    "{regexp}"` isn’t very useful to the user. Who outside the IT world would understand
    such a message? Depending on the pattern, we need different messages. For example,
    if we use a regular expression to define a valid email, then the message should
    reflect that bean validation offers a simple solution: the message can be defined
    within the annotation:


    ```

    @Pattern(regexp = ".*@.*", message = "Please enter a valid email address.")

    ```


    This simple regular expression isn’t a very sophisticated email checker, mind
    you—it’s just to show the principle. As you can see, it’s possible to define a
    different message for each constraint. Here, the message is just a literal. If
    we need to display the message in different languages, then we need to transform
    the message into a key that refers to the properties file. If we surround the
    message with curly braces, then the content within these curly braces is treated
    as a key:


    ```

    @Pattern(regexp = ".*@.*", message = "{validation.constraints.email.message}")

    ```


    Now we can add this key to the properties files. In `ValidationMessages_en.properties`,
    we add the following:


    ```

    validation.constraints.email.message=Please enter a valid email address

    ```


    And within `ValidationMessages_de.properties`, we add this line:


    ```

    validation.constraints.email.message=Bitte geben Sie eine gültige E-Mail-Adresse
    an

    ```


    Don’t forget about the `ValidationMessages.properties` file to place the text
    for your default language. Using NetBeans’s properties editor, you’ll see the
    default as well as the different languages at one glance.


    In the preceding example, we used the `message` attribute for just one key. Usually
    that’s what you want to do. In fact, you might mix literal text and keys. Every
    occurrence of a pair of curly braces is treated as a key. So, we may combine multiple
    keys and literal text. The following alerts the localized text about a wrong format,
    followed by the three hash signs and our message for the email:


    ```

    {validation.constraints.wrong.format.message} ### {validation.constraints.email.message}

    ```'
