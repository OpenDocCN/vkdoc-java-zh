- fmt: '# About the Author and About the Technical Reviewer


    ## About the Author


    ![A435433_1_En_BookFrontmatter_Figb_HTML.jpg](OEBPS/Images/A435433_1_En_BookFrontmatter_Figb_HTML.jpg)


    Michael Müller is an IT professional with more than 30 years of experience, including
    about 25 years in the healthcare sector. During this time, he has worked in different
    areas, especially project and product management, consulting, and software development.
    He gained international knowledge not only by targeting international markets
    but also by leading external teams (from Eastern Europe and India).


    Currently he is the head of software development at the German DRG institute ([http://inek.org](http://inek.org)).
    In this role, he is responsible for web applications and other Java and .NET projects.
    Web projects are preferably built with Java technologies such as JSF with the
    help of supporting languages like JavaScript.


    Michael is a professional JSF user and a member of the JSR 344 and JSR 372 (JSF)
    expert groups. Due to his community activities, he was invited to join the NetBeans
    Dream Team and became a member in January 2016. You may contact him through his
    blog [blog.mueller-bruehl.de](https://blog.mueller-bruehl.de). Follow him on Twitter
    at @muellermi.


    ## About the Technical Reviewer


    ![A435433_1_En_BookFrontmatter_Figc_HTML.jpg](OEBPS/Images/A435433_1_En_BookFrontmatter_Figc_HTML.jpg)


    Manuel Jordan Elera is an autodidactic developer and researcher who enjoys learning
    new technologies for his own experiments and creating new integrations.


    Manuel won the 2010 Springy Award: Community Champion and Spring Champion 2013.
    In his little free time, he reads the Bible and composes music on his guitar.
    Manuel is known as dr_pompeii. He has tech reviewed numerous books for Apress,
    including *Pro Spring Messaging* (2017), *Pro Spring*, 4th Edition (2014), *Practical
    Spring LDAP* (2013), *Pro JPA 2*, Second Edition (2013), and *Pro Spring Security*
    (2013).


    You can read his 13 detailed tutorials about many Spring technologies and contact
    him through his blog at [www.manueljordanelera.blogspot.com](http://www.manueljordanelera.blogspot.com).
    Follow him on Twitter at @dr_pompeii.


