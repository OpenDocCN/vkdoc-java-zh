    check ➤ Default Principal To Role Mapping。现在，组直接映射到角色（组名 = 角色名）——无需专门的映射。但请注意：这仅影响更改此设置后部署的应用程序！通常，用户和角色会满足要求，不需要变体组。因此，我建议使用此设置。


    现在，如果你启动应用程序，就可以登录 Alumni 了。


