- fmt: '# CSS


    HTML provides some little tags for styling the page with emphasis, italics, and
    more. Cascading Style Sheets (CSS) were developed as a much more powerful design
    tool. As a rule of thumb, you should separate layout from content. Thus, don’t
    use the HTML styling tags. Use CSS exclusively for the layout of a page.


    By using CSS, it’s possible to address an element and assign layout information
    within curly braces, as shown in Listing [2-2](#A435433_1_En_2_Chapter.xhtml#PC2).


    ###### Listing 2-2 Sample CSS Statements


    ```

    1   h1 {

    2       font-size: 2em;

    3   }


    5   h2 {

    6       font-size: 1.5em;

    7       font-style: italic;

    8   }

    ```


    Listing [2-2](#A435433_1_En_2_Chapter.xhtml#PC2) demonstrates how to apply layout
    information to the HTML header tags. In line 1, we address header 1 (`h1`). The
    statement in line 1 affects the font size, which is set to `2em`. This is a *relative*
    size, which is double the standard size (whatever is defined as standard—for example,
    by the browser’s setting or another CSS statement). Lines 5 to 8 define a smaller
    header with italic style. As you can see, a couple of layout directives, each
    terminated by a semicolon, might be placed within the curly braces. In this sense,
    CSS equals Java programming.


    In the preceding example, HTML tag names are used to address HTML elements. Often,
    we need to apply variable styles to different tags of the same name. To address
    the correct element we either need to build a kind of path by mentioning different
    tags (for example, `div div` to address a `div` within a `div`) or we assign a
    class or an `id` to the HTML element and use that for addressing. These addressing
    elements might be combined to define complex paths. Such an addressing element
    is called a *selector*. Certain rules exist to avoid ambiguity.


    With CSS, you may influence not only the layout of an element, but its position
    and visibility also. The layout information might differ depending on the output
    device or screen size. Combining all these features, we might create a *responsive
    web design*: the layout is changed and adjusted by the size of the browser window.


    Chapter [10](#A435433_1_En_10_Chapter.xhtml) discusses using CSS in a web application.
    I’ll show you how to create a responsive design with CSS. You may observe its
    behavior by opening Books (available at [https://it-rezension.de](https://it-rezension.de)
    ) with different devices or simulate this by changing the size of your browser
    window.


    Today, a couple of libraries exist that offer you aid for designing your web application.
    One popular library is Bootstrap ( [https://getbootstrap.com](https://getbootstrap.com)
    ), which doesn’t rest upon CCS only but on JavaScript too, and more.


    As with HTML, I don’t want to bore readers who are familiar with CSS. I provide
    an introduction to CSS in Appendix B.


    # JavaScript


    JavaScript is the programming language of the client side. Almost every modern
    browser has implemented a JavaScript interpreter or a just-in-time (JIT) compiler.
    Microsoft introduced VB Script some years ago, but JavaScript has emerged as the
    language of choice, and it’s well understood by the Microsoft browser too.


    ###### Note


    JavaScript was created by Netscape and became standardized by the European Computer
    Manufacturer’s Association. Thus, its official name is ECMAScript. *JavaScript*
    is the name of Netscape’s implementation of ECMAScript, whereas Microsoft’s implementation
    is officially called *JScript*. JavaScript is commonly used as synonym for ECMAScript,
    and I do that in this book.


    ###### Javascript and Java


    JavaScript is neither Java nor derived from Java! Previously it was called *LiveScript*,
    but was soon renamed. It is a full-fledged programming language and is used for
    server programming, too ( [http://nodejs.org](http://nodejs.org) ).


    Java 8 comes bundled with a JavaScript interpreter written in Java called *Nashorn*.
    It’s capable of accessing Java classes, and this enables running and testing portions
    of Java code without the need to compile. That’s especially useful when discovering
    new libraries or testing some new Java constructs. You’ll find an example of interpreting
    Java code by the aid of Nashorn at my blog: [https://blog.mueller-bruehl.de/netbeans/interactive-java-using-nashorn-part-i/](https://blog.mueller-bruehl.de/netbeans/interactive-java-using-nashorn-part-i/)
    .


    Even better, Java’s current version 9 includes the Java Shell (JShell), which
    realizes a real read-eval-print loop (REPL). You can read more about that also
    on my blog, at [https://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell/](https://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell/)
    .


    JavaScript is used to enhance client behavior or to initiate partial requests
    (AJAX). JSF hides JavaScript behind its AJAX tag. Sometimes it’s useful to develop
    a bit of JavaScript code. As a Java developer, it should be no problem for you
    to follow the simple examples described in this book, such as the one shown in
    Listing [2-3](#A435433_1_En_2_Chapter.xhtml#PC3).


    ###### Listing 2-3 JavaScript Example: Showing a Message


    ```

    1   alert("The information has been saved");

    ```


    Unlike Java, JavaScript is not a typed language. Thus you may assign an integer
    to a variable and later on replace its value with a string.


    # Java


    Java is the main technical foundation for programming web applications in this
    book. I assume you’re familiar with Java SE.


    All web applications discussed in this book are built using Java EE. The Java
    EE platform is built as a JSR (Java Specification Request, Java EE 7: JSR 342,
    Java EE 8: JSR 366). That’s an umbrella specification describing a complete architecture
    built up from a mass of technologies, each defined by its own JSR. Throughout
    this book I’ll introduce most of those technologies.


    # Maven


    For professional Java development, you need a build tool. Lots of developers never
    care about their build tool because it’s configured by their favorite IDE. Others
    know their build tool perfectly and like to tune every detail.


    For still other developers, there are three popular tools in the Java world: Apache
    Ant ( [http://ant.apache.org](http://ant.apache.org) ), which acts more imperatively,
    Gradle ( [https://gradle.org](https://gradle.org) ), and Apache Maven ( [http://maven.apache.org](http://maven.apache.org)
    ), which follows a more declarative approach. Apache’s website calls Maven a “software
    project management and comprehension tool.” Popular IDEs, like NetBeans, have
    built-in support for both tools. Nevertheless, whichever tool you prefer, Ant-based
    projects often use a configuration that’s specific to the IDE you use, whereas
    Maven projects follow a stricter convention, thus becoming mostly independent
    of the IDE. NetBeans, for example, is capable of opening Maven projects directly.
    Other IDEs (like Eclipse) offer an input feature for Maven-based projects.


    To ensure the most compatibility with your favorite IDE, all applications discussed
    in this book are built with Maven.


    # Selenium and Arquillian


    Selenium ( [http://docs.seleniumhq.org](http://docs.seleniumhq.org) ) automates
    browsers. Besides macro recording and replay, such automation may be fully controlled
    from within a Java application—for example, by a test. Doing so enables GUI testing
    of web applications.


    Testing beans or other components that are managed by a container can be a hassle.
    Arquillian ( [http://arquillian.org](http://arquillian.org) ) allows testing of
    the interesting parts of a web application within a container. It fully integrates
    with test frameworks like JUnit.


    Although this book doesn’t focus on unit testing or test-driven development, I
    will discuss some simple test scenarios with both tools.'
