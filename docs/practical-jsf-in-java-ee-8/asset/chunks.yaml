    启动您的应用，它应使用表单身份验证。如果您尝试访问需要身份验证的页面，系统会将您重定向到登录页面。输入有效凭据后，系统将打开所请求的页面。但使用用户 John（仅拥有成员访问权限）登录成员页面后，尝试导航到
    admin 文件夹。正如您所料，您会收到一条未授权消息，因为您需要管理员访问权限。系统不会将您重定向到登录页面，因为您已登录。自动重定向仅在用户未登录时可用。通常这正是您的意图。


    但您如何保护您的计算机？您在日常工作中是否以普通用户身份登录，并针对管理任务使用单独的登录？使用 Linux 时，这个单独的登录可能是 root，您在此类操作系统上执行
    `su` 或 `sudo`。因此，对于像 Alumni 这样的应用，您也可能拥有两个不同访问级别的账户。在这种情况下，您需要有机会以不同用户身份登录（无需关闭并重新打开浏览器）。为解决此问题，我们需要一个注销功能。不幸的是，HTTP
    身份验证不提供注销功能。但幸运的是，我们可以使用编程式登录和编程式注销，而不是使用之前显示的预定义字段和操作。


