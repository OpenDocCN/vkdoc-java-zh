    Alumni 不使用顺序数字作为主键（如 Books 那样），而是使用转换为字节数组的 UUID。由于对于给定的账户，此 ID 永远不会更改，因此在声明时（第
    12 行）就对其进行了赋值。第二个 UUID 用于创建访问密钥，该密钥用于激活账户。ID 和访问密钥都用作密码的盐值（有关密码加盐的更多信息，请参见第 28
    章）。每个都由 16 个字节构成，因此盐值的总长度为 32 字节，这对于密码加密来说足够了。


