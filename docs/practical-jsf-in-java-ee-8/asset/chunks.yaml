- fmt: '### `outputLink`


    `outputLink`标签是用于创建GET请求的HTML链接元素的经典标签。顾名思义，它用于导航到应用程序外部。使用此标签，您只需创建链接，而非JSF导航，但您也可以用它来在应用程序内部导航。


    ### 选择合适的链接


    如果用户通过定义的入口点（例如登录页面）启动我们的应用程序，则回发导航没有问题。也许您为用户提供了一些额外的应用程序启动点。一旦应用程序启动，它就会遵循其工作流程。用户在应用程序内操作，无需关心URI。在这种情况下，URI无关紧要——它处于次要地位。


    对于Books案例，评论列表应链接到评论。这些评论应该是可直接寻址的。它们还应该能被搜索引擎搜索到，因此我们需要通过GET请求访问它们。`commandLink`不符合这些要求。


    但另外两个链接元素中哪个最好？还是我们需要两者？在讨论它们之前，我邀请您在下一个练习中自行找出其行为。


