    \n![A435433_1_En_BookBackmatter_Fig2_HTML.png](img/A435433_1_En_BookBackmatter_Fig2_HTML.png)\n\
    \n###### 图 A-2 HTML 表格的输出\n\n通过使用适当的属性——或者更好的方式是使用 CSS——你可以为表格添加边框和其他装饰样式。\n\n\
    ### 标签补全/标签猜测\n\n考虑一个简单的输入标签 `<input type=\"text\" id=\"txtName\"/>`。该标签通过斜杠 `/`\
    \ 正确闭合。使用 HTML5 时，可以省略这个斜杠：`<input type=\"text\" id=\"txtName\">`。虽然在旧版本中，`<br>`\
    \ 可以代替正确的 `<br/>` 使用。\n\n以下是一些格式化元素：\n\n```\nThis text is <b> bold, <i> bold and\
    \ italics, </b> italics only.\n```\n\n大多数浏览器会渲染为：“This text is **bold,** bold\
    \ and italics, *italics only.* ” 在 XML 中，这段代码是无效的。你不能重叠标签，并且每个开始标签都需要一个对应的结束标签。\n\
    \n在 XML 中，以下写法才是正确的：\n\n```\nThis text is <b> bold, <i> bold and italics, </i></b>\
    \ <i>italics only.</i>\n```\n\n###### 提示\n\n请记住，HTML 应仅用于内容——格式化应由 CSS 完成。因此，不要在真实的\
    \ HTML 页面中使用这些元素。在宽松的版本中，如果某些文本跟在缺失的斜体结束标签之后，它将以斜体显示。\n\n正如这些示例所示，浏览器*会尝试*解释不严谨的\
    \ HTML 页面。有些人喜欢利用浏览器的这一特性。有些人则喜欢省略一切浏览器能自动补全的内容，以减少加载时间。但实际上，如果你省略这么一小部分字符（不到\
    \ 1%），*你*或许能测量出加载时间的缩短，但用户永远不会注意到。\n\n在他的著作 *Tangled Web*（No Starch Press, 2011）中，Michal\
    \ Zelewski 展示了这种标签补全（通常不过是标签*猜测*）可能导致的缺陷。出于安全原因，所有标签都应在 XML 意义上保持有效。这可以通过使用 XHTML\
    \ 来强制执行，XHTML 是将 HTML 精炼为有效 XML 代码的产物。\n\n对于那些刚接触 Web 开发、从未使用过 HTML 的程序员来说，本附录只是一个非常基础的介绍。要学习\
    \ HTML，市面上有很多好书，互联网上也有大量在线教程。\n\n###### 提示\n\nW3schools 提供了关于不同 Web 技术（包括 HTML）的优秀教程。你可以访问\
    \ [www.w3schools.com/html](http://www.w3schools.com/html) 查看。\n\n# 附录 B：层叠样式表\n\
    \nCSS 是一种为 HTML、XML 或其他类型文档添加样式信息的语言。它旨在支持内容（HTML）与样式（CSS）的分离。例如，无需再使用 HTML 中像\
    \ `<i>` 和 `<b>` 这样的旧式样式元素，因为所有样式都可以通过 CSS 更好地应用。\n\n简而言之，CSS 通过*选择器*（一种路径）定位 HTML（或\
    \ XML）元素，并向其应用一组或多组样式。不同的选择器可能指向同一个元素。CSS 会解析所谓的*层叠*规则，并将所有样式应用到该元素上。如果应用了相同的样式元素，CSS\
    \ 会确定最具体的选择器，如果仍然存在歧义，则采用最后定义的那个。\n\nCSS 可以包含在 HTML 页面的 `<style>` 标签内。我们在此仅用于演示目的。在实际应用（如本书中描述的\
    \ Books 和 Alumni 应用）中，所有 CSS 语句都按照这些应用的说明放置在一个单独的文件中。这允许在不同页面中复用相同的定义，并保持一致的视觉风格。\n\
    \n清单 B-1 展示了一个小示例，图 B-1 显示了输出结果。\n\n![A435433_1_En_BookBackmatter_Fig3_HTML.jpg](img/A435433_1_En_BookBackmatter_Fig3_HTML.jpg)\n\
    \n###### 图 B-1 应用 CSS 后的效果\n"
- fmt: "###### Listing B-1 HTML Page with Embedded CSS\n\n```\n 1                \
    \     <?xml version='1.0' encoding='UTF-8' ?>                \n              \
    \     2                     <!DOCTYPE html>                \n                \
    \   3   <                  html                  >                \n         \
    \          4       <                  head                  >                \n\
    \                   5           <                  title                  >CSS\
    \ demo</                  title                  >                \n         \
    \          6       </                  head                  >               \
    \ \n                   8       <                  style                  type=\"\
    text/css\">                \n                   9                            \
    \ label                  {                \n                  10               \
    \                  font-weight                  :                  bold      \
    \            ;                \n                  11                         \
    \        font-size                  : 2                  em                  ;\
    \                \n12           }\n                  13                      \
    \       form label                  {                \n                  14               \
    \                  color                  :                  red             \
    \     ;                \n                  15                                \
    \ font-size                  : 1                  em                  ;      \
    \          \n16           }\n                  17       </                  style\
    \                  >                \n                  19       <           \
    \       body                  >                \n                  20           <\
    \                  label                  >Enter your name</                 \
    \ label                  >                \n                  21           < \
    \                 br                  />                \n                  22           <\
    \                  form                  >                \n                 \
    \ 23               <                  label                  for=\"txtName\">Name:</\
    \                  label                  >                \n                \
    \  24               <                  input                  type=\"text\" id=\"\
    txtName\"/>                \n                  25               <            \
    \      input                  type=\"submit\" value=\"send\"/>               \
    \ \n                  26           </                  form                  >\
    \                \n                  27       </                  body       \
    \           >                \n                  28   </                  html\
    \                  > \n```\n\n`label` is an element selector. It simply selects\
    \ an HTML element. Other kinds of selectors include id selectors and class selectors\
    \ (discussed shortly). Following this selector, the styles are specified within\
    \ curly braces. The styles in this example are self-explanatory. The unit of the\
    \ font size is a relative unit: `2em` doubles the size within the current context.\n\
    \n`form label` is a composite element selector, addressing labels nested within\
    \ a form element. As you can see, the color style is added to the bold style,\
    \ while the `font-size` is overwritten, because the selector is more specific\
    \ than the standalone `label` selector. If you exchange the order, the result\
    \ will be the same.\n\nBut if you use a selector which is as specific as a selector\
    \ specified earlier in this file, it will overwrite the style, as shown in Listing\
    \ [B-2](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC56). Figure [B-2](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Fig4)\
    \ shows the output. Because the `font-size` in line 13 refers to `label` with\
    \ the same specifity as in line 5, the `font-size` will be set to this size, overwriting\
    \ (or simply ignoring) the format made in line 5.\n\n![A435433_1_En_BookBackmatter_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_BookBackmatter_Fig4_HTML.jpg)\n\
    \n###### Figure B-2 CSS applied\n\n###### Listing B-2 Example of CSS Overwriting\
    \ Former Instruction\n\n```\n 1   ...\n                   2       <          \
    \        style                  type=\"text/css\">                \n         \
    \          3                             label                  {            \
    \    \n                   4                                 font-weight      \
    \            :                  bold                  ;                \n    \
    \               5                                 font-size                  :\
    \ 2                  em                  ;                \n 6           }\n \
    \                  7                             form label                  {\
    \                \n                   8                                 color\
    \                  :                  red                  ;                \n\
    \                   9                                 font-size              \
    \    : 1                  em                  ;                \n10           }\n\
    \                  11                             label                  {   \
    \             \n                  12                                 font-weight\
    \                  :                  normal                  ;              \
    \  \n                  13                                 font-size          \
    \        : 1                  em                  ;                \n14           }\n\
    \                  15       </                  style                  >     \
    \           \n16   ...\n```\n\nLine breaks and spacing as used in the examples\
    \ are optional. This\n\n```\n 1                     form label               \
    \   {                \n                  2                         color     \
    \             :                  red                  ;                \n    \
    \              3                         font-size                  : 1      \
    \            em                  ;                \n4   }\n```\n\nis equivalent\
    \ to this:\n\n```\n 1                     form label                  {      \
    \            color                  :                  red                  ;\
    \                  font-size                  : 1                  em        \
    \          ;} \n```\n\nMultiple elements might be declared at the same time, using\
    \ a comma as separator. The following\n\n```\n 1                     label   \
    \               {                  font-size                  : 1            \
    \      em                  ;}                \n                  2           \
    \          input                  {                  font-size               \
    \   : 1                  em                  ;} \n```\n\nis equivalent to this:\n\
    \n```\n 1                     label                  ,                  input\
    \                  {                  font-size                  : 1         \
    \         em                  ;} \n```\n\n### Selectors\n\nAny CSS instruction\
    \ is applied to the element(s) addressed by a selector. In the former examples\
    \ the element names had been used as such a selector. CSS knows various kinds\
    \ of selectors.\n\n#### Type Selector\n\nAll selectors discussed so far have been\
    \ *type* selectors, sometimes known as *element* selectors. The elements are addressed\
    \ by their tag names.\n\n#### Id Selector\n\nHere an element is addressed by its\
    \ id. Id selectors start with a hash sign (`#`). Here’s an example:\n\n```\n 1   #\
    \                      txtName                      {                      color\
    \                      :                      red                      ;} \n```\n\
    \n#### Class Selector\n\nHere an element is addressed by its class name. Class\
    \ selectors start with a dot (`.`), as shown in Listing [B-3](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC62)."
