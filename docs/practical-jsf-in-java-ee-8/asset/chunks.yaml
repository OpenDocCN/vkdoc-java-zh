- fmt: '# Begin and End the Conversation


    As shown in this chapter, we started the conversation within the `init()` method
    during the `@PostConstruct`. If the user saves the book information, she may stay
    on the editor page to continue editing, which means we have to keep the conversation.
    And there’s no single exit point from the editor—the user may use any navigation
    offered by the navigation panel. To solve this issue, *every* navigation triggered
    by a navigation button will end the conversation.


    In such a navigation case, we call a method to finish the current conversation,
    as shown in Listing [17-4](#A435433_1_En_17_Chapter.xhtml#PC4).


    ###### Listing 17-4 Method to Stop a Long-Running Conversation


    ```

    1    public void endConversation(Conversation conversation) {

    2        if (!conversation.isTransient()) {

    3            LOGGER.log(Level.INFO,

    4            "Conversation stopping: {0}", conversation.getId());

    5            conversation.end();

    6        }

    7    }

    ```


    ## Summary


    Most of CDI’s predefined scopes have well-defined lifetimes that depend on the
    context of the request, session, or application. There is one scope (`@ConversationScoped`)
    that might be set into a programmatically controlled long-running mode. This allows
    the programmer to use a scope with a lifetime longer than a request, but different
    from a session or application.


    A conversation might be transitioned into the long-running mode by `begin()` and
    put back to its shorter lifetime by `end()`.


