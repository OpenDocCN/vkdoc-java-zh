    \ please click the following link {link}. \n```\n\n发送激活邮件变得很简单：检索邮件模板（清单 30-5\
    \ 的第 4 行），通过替换占位符来构建主题和正文（第 5–9 行），然后发送邮件（第 10 行）。最复杂的部分是构建替换其中一个占位符的 URL（第 13–30\
