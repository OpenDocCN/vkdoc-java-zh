    \nAlumni is a social network application. People may register for one or more\
    \ classes at their old school, university, or similar institution. They may use\
    \ bulletin boards, organize events, share photos, or engage in peer communication.\n\
    \nEvery user may enter and edit information. Because we can’t expect them to be\
