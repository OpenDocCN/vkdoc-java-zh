    ## JSF 链接


    JSF 提供了三种不同的标签来创建链接。它们有何不同，哪一种适合实现此目标？表 18-1 列出了这些标签。


    ###### 表 18-1 用于创建链接的 JSF 标签


    | 标签名称 | 描述 |

    | --- | --- |

    | commandLink | 渲染一个 HTML 链接 <a href=...>，同时执行提交操作。 |

    | link | 渲染一个 HTML 链接 <a href=...>，可用于可书签化的 JSF 导航。 |

    | outputLink | 渲染一个 HTML 链接 <a href=...>，主要用于导航到应用程序外部。 |


    ### commandLink


    commandLink 是经典的 JSF 链接。实际上，它渲染了一个 HTML 链接元素，但行为更像一个提交元素。在渲染 commandLink 时，JSF
    会向元素的 onClick 事件分配一个函数调用。这个位于 JSF JavaScript 库中的函数会动态添加一个隐藏的输入元素并执行提交。这种方法对开发者是透明的。


    提交元素会执行 POST 请求。这是 HTML 中提交表单的标准方式。因此，commandLink 需要嵌套在 `<h:form>` 元素内。POST 请求会为当前
    URI 发送数据。如果使用 commandLink 导航到另一个页面，浏览器在显示新页面时仍会显示之前的 URI。使用这种导航方式，浏览器标题栏中显示的 URI
    会落后一个页面。


    ### link


    link 标签是在 JSF 2.0 中引入的，用于支持使用 GET 请求进行 JSF 导航。GET 请求与您直接在浏览器中输入 URI 时使用的请求相同。服务器发送所请求页面的内容，并且使用
    GET 导航，浏览器会显示当前页面的 URI。因此，URI 变得可书签化。

