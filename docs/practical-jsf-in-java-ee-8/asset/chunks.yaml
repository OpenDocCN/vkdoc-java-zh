    30       </div>\n31     </ui:define>\n\n33   </ui:composition>\n```\n\n每个主题都被包裹在无序列表\
    \ `<ul>` 的一个列表项 `<li>` 中。使用 `<c: forEach>` 来遍历所有主题。为什么不像之前那样使用 `<ui:repeat value=\"\
    #{categoryEditor.topics}\" var=\"topic\">`？如果你尝试这样做，会得到一个错误。从技术上讲，`<c:forEach>`\
    \ 是一个标签处理器。因此，它不会成为组件树的一部分。它会被求值，重复的结果将用于构建组件树。另一方面，`<ui: repeat>` 是一个组件，它将成为组件树的一部分。无论重复多少次，其子组件只会被插入组件树一次。并且它会在\
    \ `topics` 映射还不存在的时候被求值。听起来很吓人？其实不然。但你需要考虑重复结构之间的一些差异。我将在第 23 章中详细讨论这些细节和差异。\n\
    \n现在，我们来谈谈这里其他值得注意的元素。对于每个列表项，我们根据它是否是活动主题来选择样式类。结合 CSS，这将模拟出标签页的效果。所有翻译都将由同一个页面（`categoryTranslator.xhtml`）处理。为了确定正确的语言，我们使用\
    \ `<f:param>` 标签将其作为参数传递到该页面，该标签通过名称和值定义一个参数，这实际上形成了一个键值对，可供被调用的页面访问。\n\n为了准备后续步骤并测试到目前为止的应用程序，请创建一个空的\
    \ `categoryTranslator.xhtml` 页面（更准确地说，是 `ui:composition`）。将你现有的分类编辑器作为模板。如果你手头没有代码，可以查看清单\
    \ 14-20。为了让我们的标签页能够正常运行，我们最后还需要添加一些 CSS 魔法。\n\n###### 清单 14-20 标签页外观格式化 (book.css)\n\
