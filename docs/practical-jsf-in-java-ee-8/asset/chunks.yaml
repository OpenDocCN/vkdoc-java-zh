    如果你启动此应用程序，并在 URI 后添加 /Hello，即可验证 Servlet 正在响应你的请求，如图 2-2 所示。


    ![A435433_1_En_2_Fig2_HTML.jpg](img/A435433_1_En_2_Fig2_HTML.jpg)


    ###### 图 2-2 Hello Servlet 运行效果


    如前所述，我们需要重写 doGet 和 doPost 方法。这是我们通常放置代码以响应 HTTP 方法的地方。如果处理 GET 或 POST 请求没有区别，这两个方法可以委托给一个公共处理器。NetBeans
    正是这样生成这个骨架文件的。这个公共处理器就是 processRequest 方法（第 15 行及之后）。这个骨架会响应一个网页。所有 HTML 标签都通过
    Java 指令写入输出流。除了字面 HTML 代码外，NetBeans 还向此输出中插入了一个方法调用：request.getContextPath()，它指向当前应用程序的上下文路径。上下文路径是
    URI 中服务器和端口之后的第一部分，是应用程序所在的位置。在图 2-2 中，输出为 "/TinyCalculator"。我们将在第 24 章使用的服务中再次用到此方法。


    对于任何超出简单示例的应用程序，直接在 Java 代码中编写 HTML 代码都不是一个好方法。一种替代方案是使用 Java 服务器页面（JSP）将 HTML
    页面与 Java 代码分离。页面独立存储，其中嵌入了 JSP 标签，并在稍后编译成 Servlet。尽管纯 JSP 仍在使用，但它可被视为 JSF 的前身。事实上，早期版本的
    JSF 使用 JSP 进行视图定义。


    ## 部署


    所有 Servlet，包括 JSF，都在 Servlet 容器内运行。当我们启动 TinyCalculator 时，NetBeans 会自动启动 GlassFish（如果尚未运行）并将应用程序部署到应用服务器。


    如果我们想将应用程序安装到生产服务器，可以将该服务器添加到 NetBeans 环境（或你喜欢的 IDE）中，并让 IDE 执行到生产系统的部署。如果由于某种原因无法使用
    IDE 进行部署，你也可以自行部署应用程序。此过程取决于你使用的应用服务器。


    以 GlassFish 为例，你可以使用 asadmin 命令在命令行进行部署，也可以使用浏览器登录管理控制台。GlassFish 提供了一个“应用程序”菜单，用于部署、取消部署、启动应用程序等操作。最后但同样重要的是，你可以使用
    Maven 在构建过程之后自动部署应用程序。


    ## 总结


    本章介绍了本书后续开发 Web 应用程序所需的技术基础：HTTP、HTML、CSS、JavaScript、Java、Maven、Selenium 和 Arquillian、Servlet
    以及部署。对选定的技术进行了简要说明，其他技术则仅提及。我跳过了对 Java EE 和 JSF 的讨论，因为它们不属于基础部分，而是本书的主要主题。


    对于不熟悉此技术栈中浏览器部分的读者，本书在附录 A 中提供了有关 HTML 的补充信息，在附录 B 中提供了有关 CSS 的补充信息。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_3`

    '
- fmt: '# 3. JavaServer Faces


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Whereas JavaServer Pages (`JSP`) is used to define pages, which are compiled to
    servlets, JavaServer Faces (`JSF`) is a complete web MVC (Model-View-Controller)
    framework. Interestingly, it is implemented as a servlet itself.


    Here is a short excerpt of the specification:


    - Makes it easy to construct a UI from a set of reusable UI components

    - Simplifies migration of application data to and from the UI

    - Helps manage UI state across server requests

    - Provides a simple model for wiring client-generated events to server-side application
    code

    - Allows custom UI components to be easily built and reused


    `JSF` is intended to handle component status across multiple requests. It can
    be used to process complex forms, even if they span multiple pages. It provides
    a strongly typed event model for events created on the client side and implements
    powerful page navigation.


    `JSF` defined by a series of JSRs:


    - 2004 JSR 127 JavaServer Faces

    - 2006 JSR 252 JavaServer Faces 1.2

    - 2009 JSR 314 JavaServer Faces 2.0

    - 2010ff JavaServer Faces 2.1, maintenance release of JSF 2.0

    - 2013 JSR 344 JavaServer Faces 2.2

    - 2016 JSR 372 JavaServer Faces 2.3


    If you’re interested in `JSF`’s full history, including which feature was introduced
    with which version, you may want to read the appropriate JSRs. But be warned:
    a specification is a mostly abstract defining document—it’s neither an introduction
    nor a practical guide.


    A former `JSF` intention was to hide away HTML and provide the programmer a familiar
    programming concept with event processing. Beginning with `JSF 2.2`, you may use
    mostly `JSF` tags, or create predominantly HTML documents, flavored with some
    `JSF`-specific attributes.


    In this book, we’ll start with the first (traditional) approach, using specific
    tags. Later on, we’ll work with HTML-friendly markup, which might be a good choice
    if you’re familiar with HTML. As you’ll see, both styles have specific advantages.


    ## View Definition Language


    `JSF` uses an exchangeable View Definition Language (`VDL`) to define the user
    interface. Currently, `JSF` supports `JSP` and `Facelets`.


    `JSP` was used from the first version on. Since the `JSF` lifecycle differs a
    bit from the `JSP` lifecycle, Jacob Hookom developed an alternative `VDL` called
    `Facelets` that integrates perfectly with `JSF`. `Facelets` became the standard
    `VDL` with `JSF 2.0`. All major new features from this version on, such as templating,
    composite components, and more, are only available for `Facelets`. Even though
    `JSP` is still supported for compatibility, you may treat it as deprecated.


    All applications in this book are built with `Facelets`.


    ## Web vs. Traditional Application


    In a traditional application, the application itself is usually responsible for
    the presentation. Even if you use a special display server such as the X Window
    System, it’s still controlled by the application.


    But in a web application, the data is passed to a browser, which takes care of
    the presentation. To do this, the server packs the content to be displayed into
    a format that the browser understands—for example, into an HTML or XHTML document.
    In addition, the server may provide some layout information in the form of Cascading
    Style Sheets (`CSS`). Everything else is up to the browser. Just as there are
    different browsers, the representation also can be different. The continuous development
    of standards fortunately ensures a gradual convergence. But if the user uses their
    own browser configuration, the presentation again might be different.


    Not only does a web application delegate the output to a client-side browser,
    the application normally doesn’t become active by itself! Only when the user requests
    a page via the browser does the application become active on the server, perform
    some operations, and deliver the content to the browser. Depending on the user’s
    input, the content of a page might be changed without navigating to a new URL.
    This (apparently) active change of content may feel to the user as initiated actively
    by the server side. In fact, this kind of processing is often done by a small
    background request with the aid of Asynchronous JavaScript and XML (`AJAX`).


    Besides (X)HTML and `CSS`, we’ve touched on another browser-side technology: JavaScript.
    The browser requests some data in between using JavaScript and exchanges parts
    of the browser content, known as the Document Object Model (`DOM`). In `JSF` terminology,
    this is done by partial processing and/or partial rendering. This kind of magic
    gives the impression that the server updates the screen, even though in reality
    it’s the client that makes the request to the server for information (client-side
    pull). A real *push*, meaning that the server actively changes the representation,
    is a little more complex. The response to the client is artificially delayed in
    order to transmit more information later on, when new information arises on the
    server side. Or you may use newer technologies like WebSockets. WebSockets requires
    more explanation and will be discussed later in this book.


    In a traditional application, the program usually responds immediately to a user
    input. In a web application, the program only detects user input when a new page
    or (usually in conjunction with `AJAX`) partial new data is requested. By this
    time, entries can already be made in various fields. It’s not hard to imagine
    that the application has to handle this in a different way. At this point, `JSF`
    supports the programmer and raises corresponding events on the server for each
    entry, so that the programming model is not entirely different from the one developers
    often use.


    Another difference: a web application usually runs in an execution environment
    that provides a number of services. Such a runtime environment is denoted as a
    *container*. In the case of `JSF`, it’s a so-called servlet container. This points
    to the underlying technology of the servlets. Even when developing with `JSF`,
    the direct use of servlets may sometimes be appropriate, so it can’t hurt if you
    familiarize yourself with servlet technology.


    The servlet container provides the application with interfaces to other services.
    It’s part of an application or web server. Many servers principally comprise a
    container, and then the container and application server concepts are often used
    interchangeably. In fact, a server can host multiple containers. For example,
    GlassFish does not only host a servlet container but an EJB container too. In
    the following section, we’ll first look at the application server from the outside.


    Now, when a user wants to use the web application, in his browser he calls the
    application URI. The client makes a request to the HTTP server. This recognizes,
    depending on the URI, that it must not simply deliver a static page to the browser.
    So the server forwards the request over the container to the web application,
    which in this case is the `JSF` servlet in conjunction with the user code, and
    there it’s processed. The output is generated as an (X)HTML document, which is
    sent to the browser, where it’s displayed. The process is illustrated in Figure
    [3-1](#A435433_1_En_3_Chapter.xhtml#Fig1).


    ![A435433_1_En_3_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_3_Fig1_HTML.jpg)'
