    ## Servlet


    *Servlet* 是一种托管在 Servlet 容器中的 Java 类，用于动态处理请求并构建响应。此类必须符合 Java Servlet API 规范。与其他
    Java EE 组件一样，它由 *Java 社区进程*（JCP）制定规范。Java EE 7 中包含的 Servlet 版本是 JSR 340：Java Servlet
    3.1 规范（[`jcp.org/en/jsr/detail?id=340`](https://jcp.org/en/jsr/detail%3Fid=340)），而
    Java EE 8 中对应的则是 JSR 369（[`jcp.org/en/jsr/detail?id=369`](https://jcp.org/en/jsr/detail%3Fid=369)）：Java
    Servlet 4.0 规范。（JSR 是 Java 规范请求的缩写。）


    尽管理论上 Servlet 可以响应任何请求，但 Java EE 实现仅响应 HTTP 请求。因此，我将 *Servlet* 一词用作 *HTTP Servlet*
    的同义词。Servlet 的生命周期由容器维护。Web 客户端（浏览器）通过请求/响应与 Servlet 交互，如“HTTP”一节所述。Servlet 是扩展抽象类
    javax.servlet.http.HttpServlet 的类。在大多数常见场景中，至少需要重写 doGet 和 doPost 这两个方法来实现特定行为并发送回响应。这两个方法分别对应
    HTTP 的 GET 和 POST 方法。


    Servlet 由客户端对特定路径（URI 的一部分）的请求调用。通过使用简单的注解 @WebServlet("/path") 即可定义此路径。在讨论 JSF
    配置时，我将介绍如何通过配置文件（web.xml）配置 Servlet。JSF 本身也是作为 Servlet（FacesServlet）实现的。


    如果你通过 NetBeans 8 的“添加 Servlet”向导（新建文件 ➤ Web ➤ Servlet）来增强 TinyCalculator，并将名称设为
    Hello，NetBeans 将生成如代码清单 2-4 所示的代码。


    ###### 代码清单 2-4 通过 Servlet 以编程方式生成 HTML 页面


    ```

     1   [imports omitted]


     3   @WebServlet(name = "Hello", urlPatterns = {"/Hello"})

     4   public class Hello extends HttpServlet {


     6       /**

     7        * Processes requests for both HTTP <code>GET</code>

     8        * and <code>POST</code> methods.

     9        *

    10        * @param request servlet request

    11        * @param response servlet response

    12        * @throws ServletException if a servlet-specific error occurs

    13        * @throws IOException if an I/O error occurs

    14        */

    15       protected void processRequest(HttpServletRequest request,

    16               HttpServletResponse response)

    17               throws ServletException, IOException {

    18           response.setContentType("text/html;charset=UTF-8");

    19           try (PrintWriter out = response.getWriter()) {

    20               /* TODO output your page here.

    21                  You may use following sample code. */

    22               out.println("<!DOCTYPE html>");

    23               out.println("<html>");

    24               out.println("<head>");

    25               out.println("<title>Servlet Hello</title>");

    26               out.println("</head>");

    27               out.println("<body>");

    28               out.println("<h1>Servlet Hello at "

    29                   + request.getContextPath() + "</h1>");    

    30               out.println("</body>");

    31               out.println("</html>");

    32           }

    33       }


    35       /**

    36        * Handles the HTTP <code>GET</code> method.

    37        *

    38        * @param request servlet request

    39        * @param response servlet response

    40        * @throws ServletException if a servlet-specific error occurs

    41        * @throws IOException if an I/O error occurs

    42        */

    43       @Override

    44       protected void doGet(HttpServletRequest request,

    45               HttpServletResponse response)

    46               throws ServletException, IOException {

    47           processRequest(request, response);

    48       }


