    ## Current Evolution


    In the past, new releases of NetBeans have been in sync with new releases of the
    core Java language as well as Java EE. But things change. Oracle donated NetBeans
    to the Apache foundation ([http://netbeans.apache.org](http://netbeans.apache.org)),
    and the next Java EE release, formerly known as Java EE 9, will be developed under
    the umbrella of the Eclipse foundation. (You can read the announcement at [https://blogs.oracle.com/theaquarium/ee4j-eclipse-enterprise-for-java](https://blogs.oracle.com/theaquarium/ee4j-eclipse-enterprise-for-java)
