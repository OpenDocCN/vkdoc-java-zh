    \ .\n\n![A435433_1_En_BookBackmatter_Fig2_HTML.png](OEBPS/Images/A435433_1_En_BookBackmatter_Fig2_HTML.png)\n\
    \n###### Figure A-2 Output of HTML table\n\nUsing appropriate attributes—or even\
    \ better, using CSS—you can style a table with borders and other decoration.\n\
    \n### Tag Completion/Tag Guessing\n\nConsider the simple input tag <input type=\"\
    text\" id=\"txtName\"/> . The tag is correctly closed by a slash / . Using HTML5,\
    \ it can omit this slash: <input type=\"text\" id=\"txtName\"> . Although in older\
    \ versions, <br> , could be used instead of the correct <br/> .\n\nHere are some\
    \ formatting elements:\n\n```\nThis text is <b> bold, <i> bold and italics, </b>\
    \ italics only.\n```\n\nMost browsers will render “This text is **bold,** bold\
    \ and italics, *italics only.* ” In XML, that code wouldn’t be valid. You can’t\
    \ overlap tags, and for every opening tag, a closing counterpart is required.\n\
    \nThis would be correct within XML:\n\n```\nThis text is <b> bold, <i> bold and\
    \ italics, </i></b> <i>italics only.</i>\n```\n\n###### Tip\n\nRemember that HTML\
    \ should be used for content only—formatting should be performed by CSS. So, don’t\
    \ use these elements in a real HTML page. In the sloppy version, if some text\
    \ follows the missing italics end tag, it will be displayed in italics.\n\nAs\
    \ these examples show, browsers *try* to interpret sloppy HTML pages. Some people\
    \ revel in this feature of browsers. Some love to omit everything a browser tries\
    \ to complete by itself to reduce load time. But really, if you omit such a small\
    \ fraction of characters, less than 1 percent, *you* might be able to measure\
    \ a shortened load time, but the user would never notice it.\n\nIn his book *Tangled\
    \ Web* (No Starch Press, 2011), Michal Zelewski shows which flaws might occur\
    \ by this attempted tag completion, which often amounts to simply tag *guessing*\
    \ . For security reasons, all tags should be valid in the sense of XML. This can\
    \ be enforced by using XHTML, which is HTML refined as valid XML code.\n\nFor\
    \ those programmers new to web development, who have never used HTML before, this\
    \ appendix is only a very basic introduction. For learning HTML, lots of good\
    \ books are available on the market, and you can find lots of online tutorials\
    \ on the Internet.\n\n###### Tip\n\nW3schools offers some nice tutorials into\
    \ different web technologies, including HTML. You can check it out at [www.w3schools.com/html](http://www.w3schools.com/html)\
    \ .\n\n# Appendix B: Cascading Style Sheets\n\nCSS is a language to add styling\
    \ information to HTML, XML, or other kinds of documents. It’s designed to support\
    \ the separation of content (HTML) and style (CSS). For example, there’s no need\
    \ to use old styling elements of HTML like <i> and <b> because all styling can\
    \ be applied better with CSS.\n\nIn short, CSS addresses an HTML (or XML) element\
    \ with a *selector* (a kind of path) and applies a group of one or more styles\
    \ to it. Different selectors may refer to the same element. CSS resolves the so-called\
    \ *cascade* and applies all styles to the element. If the same style element will\
    \ be applied, CSS determines the most specific selector, or if still ambiguous,\
    \ the last definition.\n\nCSS can be included within the style tag of the HTML\
    \ page . We’ll use this here for demonstration purpose only. In real applications\
    \ (like Books and Alumni, described in this book), all CSS statements are placed\
    \ into a separate file as described by these apps. This allows the reuse of the\
    \ same definition for different pages and applies a consistent look and feel.\n\
    \nListing [B-1](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC55) shows\
    \ a small example, and Figure  [B-1](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Fig3)\
    \ shows the output.\n\n![A435433_1_En_BookBackmatter_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_BookBackmatter_Fig3_HTML.jpg)\n\
    \n###### Figure B-1 CSS applied"
