  trans: "\n###### 清单 23-6 使用 Rendered 属性的 ui:repeat 示例\n\n```\n1   <ui:repeat value=\"\
    #{controller.friends}\" var=\"friend\">\n2     <h:panelGroup rendered=\"#{friend.name.length()\
    \ > 0}\"\n3                   layout=\"block\"  styleClass=\"dummy\">\n4     \
    \  <h:outputText value=\"#{friend.name}\"/>\n5     </h:panelGroup>\n6   </ui:repeat>\n\
    ```\n\n使用预定义的 JSF 标签（panelGroup）需要一些无用的工作。一种更符合 HTML 习惯的方法看起来清晰得多，如清单 23-7 所示。\n\
    \n###### 清单 23-7 使用 HTML 友好方法的 ui:repeat 示例\n\n```\n1   <ui:repeat value=\"#{controller.friends}\"\
    \ var=\"friend\">\n2     <div jsf:rendered=\"#{friend.name.length() > 0}\">\n\
    3       <h:outputText value=\"#{friend.name}\"/>\n4     </div>\n5   </ui:repeat>\n\
    ```\n\n## 性能问题\n\n看一下清单 23-8 中 loopDemo 的源代码，并回顾一下你对 forEach 循环的了解。在 getNames()\
    \ 方法内部，我们会打印一条简短的消息。你认为：单次调用 loopDemo 会调用该方法多少次？一次都没有、一次，还是三次？\n\n###### 清单 23-8\
    \ 循环谜题\n\n```\n 1   private static void loopDemo(){\n 2     for (String name :\
    \ getNames()){\n 3       System.out.println(\"Name is \" + name);\n 4     }\n\
    \ 5   }\n\n 7   private static List<String> getNames() {\n 8     System.out.println(\"\
    withing  getNames\");\n 9     List<String> names = new  ArrayList<>();\n10   \
    \  names.add(\"Bob\");\n11     names.add(\"Anne\");\n12     names.add(\"Eve\"\
    );\n13     return names;\n14   }\n```\n\n这其实并不难：列表只被构建了一次。\n\n在检索循环变量的值时，你可能会期望类似的行为。为了验证这些不同标签的行为，让我们进行一些测试。\n\
    \n我们将创建三个简单的类：一个（非持久化的）Friend 实体、一个用于处理 JSF 部分的命名 Bean “controller”，以及一个模拟对持久化数据（例如数据库）进行相对较慢访问的数据提供者。\n\
    \n###### 清单 23-9 Friend\n\n```\n 1   public class Friend {\n 2       private final\
    \ String _name;\n 3       private final List<Book> _books = new ArrayList<>();\n\
    \n 5       public Friend( String name){\n 6           _name = name;\n 7      \
    \ }\n\n 9       public String getName() {\n10           return _name;\n11    \
    \   }\n\n13       public List<Book> getBooks() {\n14           return _books;\n\
    15       }\n\n17   }\n```\n\n一个 Friend 有一个名字并持有一些书籍。为了尽可能保持简单，我们通过返回完整的列表来直接访问书籍列表。这种简单的方法让我们可以直接向列表中添加书籍。在实际应用中，你可能会隐藏列表并实现一个\
    \ addBook() 方法。尽管一本*书*包含除标题外的其他信息，但在此演示中我们将使用一个非常简单的 Book 类。创建一个新的 Book 类，只包含一个字段以及\
    \ Title 的 getter 和 setter。让 NetBeans 创建 hashCode 和 equals 方法。\n\n接下来，我们创建一个命名\
    \ Bean，它只是请求作用域的。它所做的就是向我们的页面提供好友列表。为此，必须从某个数据提供者那里获取数据。在实际应用中，这可能是一个 JPA 服务。参见清单\
    \ 23-10。\n\n###### 清单 23-10 Controller\n\n```\n 1   @Named\n 2   @RequestScoped\n\
    \ 3   public class Controller {\n\n 5     private int _counter;\n\n 7     public\
    \ int getCounter() {\n 8       return _counter;\n 9     }\n\n11     public List<Friend>\
    \ getFriends() {\n12       _counter++;\n13       return DataProvider.instance.getFriends();\n\
    14     }\n15   }\n```\n\n除了好友的 getter 之外，这个控制器还包含一个用于统计列表访问次数的字段。并且它提供了一个 getter\
    \ 来访问这个计数器。\n\n接下来，你会看到简单的数据提供者，如清单 23-11 所示。它创建了一个包含五个好友的固定列表，并为每个好友分配了随机数量的书籍。当有人试图访问好友列表时，我们会调用\
    \ retrieveDatafromDB() 方法。由于这应该模拟一个耗时较长的方法，线程会休眠 100 毫秒。在真实的 Java EE 应用中，我们不会使用\
    \ sleep()，因为服务器会为我们控制线程。但对于这个小测试来说，这完全没问题。\n\n###### 清单 23-11 DataProvider\n\n\
    ```\n 1   public class DataProvider {\n\n 3     private final List<Friend> _friends\
    \ = new ArrayList<>();\n\n 5     public static DataProvider instance = new DataProvider();\n\
    \n 7     private DataProvider() {\n 8       createData();\n 9     }\n\n11    \
    \ /**\n12      * 检索好友列表\n13      * @return 好友列表    \n14      */\n15     public\
    \ List<Friend> getFriends() {\n16       retrieveDatafromDB();\n17       return\
    \ _friends;\n18     }\n\n20     private void retrieveDatafromDB() {\n21      \
    \ // 这里可能是对数据库的访问\n22       // 通过 sleep 来模拟（是的，在 EE 环境中不应该使用 sleep）\n23      \
    \ try {\n24         Thread.sleep(100);  // 慢速数据库访问\n25       } catch (InterruptedException\
    \ ex) {\n26         // 忽略\n27       }\n28     }\n29     private void createData()\
    \ {\n30       _friends.clear();\n31       String[] names = {\"Sally\", \"Bob\"\
    , \"John\", \"Mary\", \"Jim\"};\n32       for (int i = 0; i < 5; i++){\n33   \
    \      addFriend(names[i]);\n34       }\n35     }\n\n37     private void addFriend(String\
    \ name) {                                                                    \
    \                  \n38       Friend friend = new Friend(name);\n39       Random\
    \ random = new Random();\n40       int count = random.nextInt(5);\n41       for\
    \ (int i = 0; i < count; i++) {\n42         String title = \"Book.\" + name.substring(0,\
    \ 1) + i;\n43         Book book = new Book(title);\n44         friend.getBooks().add(book);\n\
    45       }\n46       _friends.add(friend);\n47     }\n48   }\n```\n\n现在我们需要一个页面来显示好友列表。我们将以三种不同的风格创建这个页面，以检查不同的重复结构。目的是显示一个好友列表，并为每个好友显示一个包含其书籍的表格。参见清单\
    \ 23-12。\n\n###### 清单 23-12 通过 Repeat 显示好友（repeat.xhtml）\n\n```\n 1   <?xml  version='1.0'\
    \  encoding='UTF-8'  ?>\n 2   <!DOCTYPE html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\"\n 6         xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n 7         xmlns:c=\"http://xmlns.jcp.org/jsp/jstl/core\">\n 8     <h:head>\n\
    \ 9       <title>LoopCompare</title>\n10     </h:head>\n\n12     <h:body>\n13\
    \       <h1>测试循环 ui:repeat</h1>\n\n15       AccessCount:  #{controller.counter}\
    \                                                                            \
    \          \n\n17       <ui:repeat value=\"#{controller.friends}\" var=\"friend\"\
    >\n18         <div>\n19           #{friend.name} (Access no #{controller.counter})\n\
    20            <h:dataTable value=\"#{friend.books}\" var=\"book\">\n21       \
    \       <h:column>\n22                - #{book.title} (Access no #{controller.counter})\n\
    23              </h:column>\n24            </h:dataTable>\n25         </div>\n\
    26       </ui:repeat>\n\n28       AccessCount:  #{controller.counter}\n\n30  \
    \     <div>\n31         <h:button value=\"forEach\" outcome=\"forEach\"/>\n32\
    \         <h:button value=\"repeat\" outcome=\"repeat\"/>\n33         <h:button\
    \ value=\"table\" outcome=\"table\"/>\n34       </div>\n35     </h:body>\n36 \
    \  </html>\n```\n\n在第 15 行，我们在调用循环之前简单地显示计数器，在第 28 行则在之后显示。第 17-26 行展示了由 repeat\
    \ 组件构建的循环。这是我们在每个文件中都会采用的部分。第 31-33 行创建了三个按钮，用于在三个测试页面之间切换。\n\n对于另外两个页面，只有不同的部分显示在清单\
    \ 23-13 和 23-14 中。\n"
- fmt: "### Listing 23-13 Display Friends by `forEach` (`forEach.xhtml`)\n\n```\n\
    \ 1   [...]\n 2       <h1>Test loop c:forEach</h1>\n 4       AccessCount: #{controller.counter}\n\
    \ 6       <c:forEach items=\"#{controller.friends}\" var=\"friend\">\n 7     \
    \    <div>\n 8           #{friend.name}  (Access no #{controller.counter})\n 9\
    \           <h:dataTable value=\"#{friend.books}\" var=\"book\">\n10         \
    \    <h:column>\n11               - #{book.title} (Access no #{controller.counter})\n\
    12             </h:column>\n13           </h:dataTable>\n14         </div>\n15\
    \       </c:forEach>\n17       AccessCount: #{controller.counter}\n18   [...]\n\
    ```\n\n### Listing 23-14 Display Friends by `dataTable` (`table.xhtml`)\n\n```\n\
    \ 1   [...]\n 2       <h1>Test loop h:dataTable</h1>\n 4       AccessCount: #{controller.counter}\n\
    \ 6       <h:dataTable value=\"#{controller.friends}\" var=\"friend\">\n 7   \
    \      <h:column>\n 8           #{friend.name} (Access no #{controller.counter})\n\
    \ 9           <h:dataTable value=\"#{friend.books}\" var=\"book\">\n10       \
    \      <h:column>\n11               - #{book.title} (Access no #{controller.counter})\n\
    12             </h:column>\n13           </h:dataTable>\n14         </h:column>\n\
    15       </h:dataTable>\n17       AccessCount: #{controller.counter}\n18   [...]\n\
    ```\n\nEach of these pages contains a loop that retrieves the friend list from\
    \ the controller. Within this list, another loop is used to display the book list\
    \ of each friend. At various places, we print out the current counter. Because\
    \ the controller is request scoped, it will be re-created for every page, and\
    \ thus the counter starts at 0.\n\n### Run and Observe\n\nStart the project, click\
    \ another page, click the same page, and observe the results. Compare your observations\
    \ to your expectations.\n\nFigure [23-2](#A435433_1_En_23_Chapter.xhtml#Fig2)\
    \ takes a look at a sample output (using JSF 2.3 with GlassFish 5.0).\n\n![A435433_1_En_23_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_23_Fig2_HTML.jpg)\n\
    \n### Figure 23-2 Loop problem\n\nWithout digging into implementation details,\
    \ some results are obvious: `repeat` accesses the list only once, as you might\
    \ have expected, according to the access to a loop variable, whereas `forEach`\
    \ performs massive calls to the `getFriends` method. In fact, the number of calls\
    \ depends on the number of friends and on the nested table. If you omit the book\
    \ list, `forEach` calls `getFriends` 1 + *n* times. Including the book list, it\
    \ needs 1 + 4 × *n* accesses. `dataTable` calls the method three times, regardless\
    \ of how many friends and independently of whether we use it with or without the\
    \ inner table.\n\nIf you’re wondering why `forEach`’s counter starts with 1, it’s\
    \ a tag handler. Its loop is resolved while building the component tree. Thus\
    \ there’s a first access before the page is rendered.\n\nThe massive access count\
    \ may cause problems in your application. From this point of view, `repeat` might\
    \ be the best choice. But for specific applications, you might need to access\
    \ individual components within the loop. As a component, `repeat` doesn’t repeat\
    \ its children. It simply repeats the generated output. So, sometimes there’s\
    \ a need for a tag handler performing the loop.\n\nThe massive method calls depend\
    \ on the implementation of the `ForEachHandler`. Ed Burns (JSF spec lead) is going\
    \ to investigate this problem. I created a slightly bigger demo to show the problem,\
    \ which you can download from [webdevelopment-java.info](https://webdevelopment-java.info).\n\
    \nTo mitigate this problem, you might use a local caching, as seen in Listing\
    \ [23-15](#A435433_1_En_23_Chapter.xhtml#PC15).\n\n### Listing 23-15 Local Cache\n\
    \n```\n 1   private List<Friend> _friends;\n 2   public List<Friend> getFriends()\
    \ {\n 3     if (_friends == null) {\n 4       _friends = DataProvider.instance.getFriends();\n\
    \ 5     }\n 6     return _friends;\n 5   }\n```\n\nListing [23-15](#A435433_1_En_23_Chapter.xhtml#PC15)\
    \ shows how we might modify the `Controller` class. If, and only if, the friend\
    \ list is empty, we’ll perform the slow database access. This is a really short-term\
    \ cache because the `Controller` object is destroyed once the request is finished.\
    \ But if we use the `forEach` tag handler, that might boost performance significantly.\n\
    \n## Summary\n\nJSF offers a couple of different repetitive structures, and we\
    \ need to distinguish between components and tag handlers. Whereas tag handlers\
    \ are resolved during compile time, components are included into the component\
    \ tree. This difference has a great impact on how and when the repetition is performed\
    \ and may lead to performance problems. Caching might be a good practice to mitigate\
    \ such problems.\n\n# Part IV\nAlumni\n\n© Michael Müller 2018\n\nMichael Müller,\
    \ Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_24](#A435433_1_En_24_Chapter.xhtml)\n\
    \n# 24. Alumni\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen, Germany\n\
    \nAlumni is a social network application. People may register for one or more\
    \ classes at their old school, university, or similar institution. They may use\
    \ bulletin boards, organize events, share photos, or engage in peer communication.\n\
    \nEvery user may enter and edit information. Because we can’t expect them to be\
    \ experts, all dialogs need to be fault-tolerant and provide quick response. In\
    \ addition to the techniques discussed so far, we’ll be using the following (as\
    \ well as others):\n\n- Converters and validators\n- AJAX\n- Authentication and\
    \ authorization\n- Container-based security\n- Composing components\n- WebSockets\n\
    - Changing look and feel\n\nThere’s not enough room in this book to discuss the\
    \ entire application in every detail. Rather, I'll explain a few techniques in\
    \ depth, sometimes describing them in broader terms than we’ll need for Alumni.\
    \ I'll start with basic implementations to guide you from a simple to a customized\
    \ solution.\n\n## Preparing the Application\n\nEvery time we’ve created a new\
    \ application so far, we’ve used a NetBeans wizard to create a skeleton for us.\
    \ We may do that for Alumni too, but because NetBeans doesn’t support Java EE\
    \ 8 out of the box at the time of writing, we’ll need to modify the Project Object\
    \ Model (POM) for using Java EE 8 (as described in Chapter [9](#A435433_1_En_9_Chapter.xhtml)).\n\
    \nEven more, Alumni isn’t built as a single module application but is divided\
    \ into smaller parts for GUI, business layer, storage, and other services. Maven\
    \ supports such a split by a multi-modules project. We need to tweak the POM and\
    \ create sub POMs for each different module. The following excerpts of selected\
    \ POMs focus on the aspects of Java EE 8 as well as the modularization, omitting\
    \ other stuff like testing. Listing [24-1](#A435433_1_En_24_Chapter.xhtml#PC1)\
    \ starts with the main POM."
