- fmt: "###### Figure 14-8 Category editor, translation\n\nEach register tab has a\
    \ short headline—for example, `Category`, `en`, `es`, `fr`, and so on depending\
    \ on the language count we want to support. Or, instead of displaying the language\
    \ abbreviation, we might prefer to display a flag to indicate the language. (We’ll\
    \ ignore for now potential issues like different flags representing the same language.\
    \ Should the Union Jack or Stars and Stripes stand for English? Can one flag represent\
    \ different languages, such as Switzerland’s standing for German, French, or Italian,\
    \ or Canada’s standing for English or French?)\n\nOkay, for each register tab\
    \ we need some information like heading or flag, URL, and more. We’ll place that\
    \ information into a container called `Topic`. The topics of the editor will be\
    \ maintained in a collection structure we’ll call `Topics`. A topic might be used\
    \ not for the category editor only, so it contains some more elements than needed\
    \ for this editor. Depending on the editor, a topic needs to contain a heading\
    \ only or key, heading and URL, or another combination of elements. There are\
    \ different solutions for such a container class —for example, one parameterless\
    \ constructor and getters/setters for each field, or different constructors taking\
    \ different arguments. Or—and this is how it’s built for Books—we might use a\
    \ builder class, as shown in Listing [14-14](#A435433_1_En_14_Chapter.xhtml#PC17).\n\
    \n###### Listing 14-14 `Topic.java`\n\n```\n 1   public class Topic implements\
    \ Serializable {\n\n 3     private final String _key;\n 4     private final String\
    \ _title;\n 5     private final String _outcome;\n 6     private final String\
    \ _info;\n 7     private final String _imageEnabled;\n 8     private final String\
    \ _imageDisabled;\n 9     private boolean _isEnabled;\n\n11     private Topic(String\
    \ key, String title, String outcome,\n12                   String info, String\
    \ imageEnabled,\n13                   String imageDisabled, boolean isEnabled)\
    \ {\n14       _key = key;\n15       _title = title;\n16       _outcome = outcome;\n\
    17       _info = info;\n18       _imageEnabled = imageEnabled;\n19       _imageDisabled\
    \ = imageDisabled;\n20       _isEnabled = isEnabled;\n21     }\n\n24     public\
    \ String getKey() {\n25       return _key;\n26     }\n\n28     public String getTitle()\
    \ {\n29       return _title;\n30     }\n\n32     ... other getters omitted ...\n\
    \n34     public String getImageDisabled() {\n35       return _imageDisabled;\n\
    36     }\n\n38     public String getImage() {\n39       return _isEnabled ? _imageEnabled\
    \ : _imageDisabled;\n40     }\n\n42     public boolean isIsEnabled() {\n43       return\
    \ _isEnabled;\n44     }\n\n46     public void setIsEnabled(boolean isEnabled)\
    \ {\n47       _isEnabled = isEnabled;\n48     }                              \
    \                                                                \n\n50     ...\
    \ hashCode and equals omitted ...\n\n53     public static class TopicBuilder {\n\
    \n55       private final String _key;\n56       private String _title = \"\";\n\
