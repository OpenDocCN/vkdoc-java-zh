    \ its own application. Such an application that focuses on a solitary business\
    \ case is known as a micro service.\n\nJava EE supports two different kinds of\
    \ web services out of the box:\n\n*   WS* services\n\n*   RESTful services\n\n\
    We implemented AccountService as an independent RESTful service based on the JAX-RS\
    \ functionality. JAX-RS supports easy access to the information the client sends\
    \ via an HTTP request. We can extract information out of the URI by defining path\
    \ patterns, or we can access data sent via header—for example, POST data.\n\n\
    To test this service, we create an appropriate client and use a unit test framework\
    \ to call the service methods.\n\n© Michael Müller 2018\n\nMichael Müller, Practical\
    \ JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_34](#A435433_1_En_34_Chapter.xhtml)\n\
    \n# 34. Classroom Chat (WebSockets)\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nAlumni is built for former pupils or students who join one or more\
    \ classes. They may communicate within each class. The application supports two\
    \ different kinds of communication: messaging and chat .\n\nUsing the messaging\
    \ feature, the user can select a couple of recipients, write the message, and\
    \ send it. By clicking the Send button, the message is stored to a table. Some\
    \ metadata, including a link to that message, is stored for every recipient. They\
    \ may log in at any time and open their message box to read the messages. This\
    \ kind of communication is usually used for asynchronous communication between\
    \ individuals. It is realized by techniques described already in earlier chapters,\
    \ so I won’t dive further into its implementation.\n\nA chat, on the other hand,\
    \ is used for *synchronous* communication . You can compare chatting with speaking\
    \ in a room: all people in that room can listen to the words at the time of speaking,\
    \ assuming there is no considerable delay and people are able to hear. We often\
    \ use the term *chat room*, a colloquial synonym for a shared communication channel.\
    \ When any user writes a message, it’s displayed immediately to all users in the\
    \ same chat room. For this to work, either the client needs to pull new information\
    \ every few milliseconds or the server needs to push the information. So far,\
    \ we’ve used HTTP concept: the client initiates the communication, the server\
    \ sends the answer, and the communication terminates until the next request. Pure\
    \ HTTP can be used to implement this *pull* concept, but it’s not hard to imagine\
    \ the huge amount of traffic that approach can generate. So we need another technique\
    \ that allows us to implement the *push* approach.\n\nWhen someone enters a chat\
    \ room, it’s nice for them to be able to easily get a sense of the ongoing discussion.\
    \ Alumni stores a few of the latest messages and shows them to a user entering\
    \ the chat room as a kind of replay."
  trans: "\n###### 清单 33-3 AccountService（DELETE 方法节选）\n\n```\n01     @DELETE\n02\
    \     @Path(\"{id}\")\n03     public void delete(@PathParam(\"id\") String id)\
    \ {\n04       AccountFacade.getInstance().deleteAccount(id);\n05     }\n```\n\n\
    如果我们需要多个变量，只需将其添加到路径中即可。对于登录功能，相对路径包含字面量 `login` 以及用于登录名和密码的两个变量。如果用户能够通过身份验证，登录方法会返回该用户所属的所有用户组。这正是我们的自定义领域（realm）所需处理的内容。请参见清单\
    \ 33-4。\n\n###### 清单 33-4 AccountService（登录方法节选）\n\n```\n01     @GET\n02     @Produces(MediaType.APPLICATION_JSON)\n\
    03     @Path(\"login/{loginName}/{password}\")\n04    public String login(@PathParam(\"\
    loginName\") String loginName,\n05            @PathParam(\"password\") String\
    \ password) {\n06      try {\n07        Account account = AccountFacade.getInstance()\n\
    08                .findAccountByName(loginName);\n09        if (!account.checkPassword(password))\
    \ {\n10          return \"\";\n11        }\n12        return AccountFacade.getInstance().retrieveRoles(account.getId());\n\
    13      } catch (IllegalArgumentException ex) {\n14        LOGGER.log(Level.INFO,\
    \ ex.getMessage());\n15      }\n16      return \"\";\n17    } \n```\n\n## 测试\n\
    \n测试 Web 应用可能是一项挑战。通常，开发者会借助单元测试框架来测试代码单元，但 Web 应用的许多功能依赖于其他模块或其他 Java EE 技术。我们可以模拟（mock）掉应用的某些部分，以隔离待测试的单元。\n\
    \n有时我们无法模拟任何内容。如果我们需要容器提供的特性，那么使用简单的测试框架编写测试就会变得困难。除了用于自动化浏览器的 Selenium，我们还可以使用\
    \ Arquillian（[`arquillian.org`](http://arquillian.org)）。结合 ShrinkWrap，只有测试所需的应用部分会被打包成一个\
    \ Web 归档文件。Arquillian 会启动一个内嵌的应用服务器，并运行精简后的系统来执行测试。这种方法可以与单元测试框架结合使用。\n\n幸运的是，测试一个独立的微服务并不需要如此大的工作量。除了对单个类进行单元测试，我们还可以编写一个小型\
    \ REST 客户端，并使用测试框架来调用我们服务的方法。实际上，这并非单元测试——而是集成测试。\n\n清单 33-5 展示了我为 AccountService\
    \ 编写的测试的一个简短节选。\n\n###### 清单 33-5 AccountService 的集成测试（节选）\n\n```\n01     @Test\n\
    02     public void createAndDeleteAccount() {\n03       AccountClient client =\
    \ new AccountClient();\n04       Account account = createAccount();\n05      \
    \ Response postJson = client.createAccount(account);\n06       assertEquals(201,\
    \ postJson.getStatus());\n\n08       String path = postJson.getLocation().getPath();\n\
    09       String id = path.substring(path.lastIndexOf(\"/\") + 1);\n10       assertEquals(\"\
    testclient\", client.getAccount(id).getLoginName());\n11       client.deleteAccount(id);\n\
    12       assertEquals(null, client.getAccount(id));\n13     }\n```\n\n## 总结\n\n\
    Alumni 和自定义领域（realm）都使用了账户管理功能。为了避免领域对应用的依赖，我们将账户管理功能独立出来，形成自己的应用。这种专注于单一业务场景的应用被称为微服务。\n\
    \nJava EE 原生支持两种不同类型的 Web 服务：\n\n*   WS* 服务\n\n*   RESTful 服务\n\n我们基于 JAX-RS 功能，将\
    \ AccountService 实现为一个独立的 RESTful 服务。JAX-RS 支持轻松访问客户端通过 HTTP 请求发送的信息。我们可以通过定义路径模式从\
    \ URI 中提取信息，或者访问通过头部（header）发送的数据——例如，POST 数据。\n\n为了测试此服务，我们创建了一个合适的客户端，并使用单元测试框架来调用服务方法。\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_34`\n\
    \n# 34. 课堂聊天（WebSocket）\n\nMichael Müller^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\nAlumni\
    \ 是为加入一个或多个班级的校友或学生构建的。他们可以在每个班级内部进行交流。该应用支持两种不同的交流方式：消息和聊天。\n\n使用消息功能，用户可以选择若干收件人，编写消息并发送。点击“发送”按钮后，消息会被存储到一张表中。对于每个收件人，会存储一些元数据，包括指向该消息的链接。他们可以随时登录并打开消息箱阅读消息。这种交流方式通常用于个人之间的异步通信。它通过前面章节已描述的技术实现，因此我不再深入探讨其实现细节。\n\
    \n另一方面，聊天则用于*同步*通信。你可以将聊天比作在房间里说话：假设没有明显的延迟且人们能够听到，那么房间里的所有人当时都能听到所说的话。我们经常使用术语*聊天室*，它是共享通信渠道的口语化同义词。当任何用户发送一条消息时，该消息会立即显示给同一聊天室中的所有用户。要实现这一点，要么客户端需要每隔几毫秒拉取一次新信息，要么服务器需要推送信息。到目前为止，我们一直使用\
    \ HTTP 概念：客户端发起通信，服务器发送响应，通信终止直到下一次请求。纯 HTTP 可用于实现这种*拉取*概念，但很容易想象这种方法会产生巨大的流量。因此，我们需要另一种技术来实现*推送*方法。\n\
    \n当有人进入聊天室时，能够轻松了解正在进行的讨论是件好事。Alumni 会存储最近的一些消息，并在用户进入聊天室时将其显示出来，作为一种回放。\n"
- fmt: "# HTTP Protocol and Alternatives\n\nHTTP is one of the Internet protocols\
    \ that all current browsers support. HTTP (short for HyperText Transfer Protocol)\
    \ is the standard for Internet browsing. As its name suggests, it was developed\
    \ to transfer text from a server to a client. This text can contain hyperlinks\
    \ to other texts. HTTP was standardized by the World Wide Web Consortium (W3C),\
    \ and you can read more about this at [www.w3.org/Protocols/](http://www.w3.org/Protocols/).\n\
    \nHTTP is a stateless request-response protocol: a client sends a request to the\
    \ server. The server sends a response to the client and terminates the connection.\
    \ For every requested resource, a new connection is needed. For example, if a\
    \ web page contains some text and three images, then a total of four requests\
    \ is needed.\n\nBecause every request is initiated by the client, normally it’s\
    \ not possible to push information from server to client at any time. There are\
    \ some workarounds, such as *deferred answers*: the server delays its response\
    \ until certain information is available and then sends the answer. After that,\
    \ the connection is closed, and the server needs a new request before it can *push*\
    \ more information.\n\nAlthough widespread, HTTP has a few other limitations,\
    \ so some alternatives and extensions have been developed to overcome these restrictions.\n\
    \n`HTTP/2` ([https://tools.ietf.org/html/rfc7540](https://tools.ietf.org/html/rfc7540))\
    \ lets the client request resources more effectively because this protocol allows\
    \ multiple concurrent exchanges on the same connection. It allows the server to\
    \ preemptively push chunks of data using the same client-side initiated connection.\
    \ For a page with three images, the server answers the client’s request by sending\
    \ the page content and pushing the three images. This boosts the performance,\
    \ but it’s still not what we need to realize a chat. `HTTP/2` became standardized\
    \ by the Internet Engineering Task Force (IETF) in 2015 and became part of the\
    \ Java Enterprise Edition starting with version 8 (Java EE 8).\n\nServer Sent\
    \ Events (SSE) provide a way to really push information from the server to the\
    \ client. The core protocol is still HTTP: as with vanilla HTTP, the connection\
    \ is requested by the client. The server keeps the connection and is able to push\
    \ chunks of information in so-called *events*.\n\nSSEs provide a real server push\
    \ and are part of Java EE 8, too, but it’s one-way communication only, from server\
    \ to client. To create a chat with SSE, we can AJAXify an input field to send\
    \ the user’s input to the server. Then we push this message to all clients in\
    \ the chat room. Because SSE is realized on top of `JAX-RS`, we need to introduce\
    \ some other techniques that differ a bit from the usual JSF way. So SSE isn’t\
    \ used to realize Alumni’s chat room either.\n\nWebSockets ([https://html.spec.whatwg.org/multipage/web-sockets.html#network](https://html.spec.whatwg.org/multipage/web-sockets.html%23network))\
    \ represent a different approach to establishing a server push. The WebSocket\
    \ protocol enables a real bidirectional communication between two peers. It was\
    \ standardized by the IETF in 2011. Like SSE, its specification is part of the\
    \ HTML living standard.\n\nThis technique seems to fit best for the chat room,\
    \ so Alumni uses the WebSocket protocol. WebSocket became part of Java EE 7 and\
    \ is supported by JSF 2.3 or newer, which is part of Java EE 8. Although the WebSocket\
    \ protocol is directly supported by JSF, it’s implemented more like a pure server\
    \ push. To take advantage of the full bidirectional support, Alumni doesn’t use\
    \ WebSocket’s support of JSF. I’ll show you an alternative implementation with\
    \ JSF’s WebSocket feature later in this book.\n\n## WebSocket\n\nTechnically,\
    \ the WebSocket protocol is initiated as an upgrade of an HTTP request. This implies\
    \ that a connection needs to be initiated by a client. Once the WebSocket connection\
    \ is established after this upgrade request, both partners act as peers. The connection\
    \ becomes a full-duplex communication. Every peer can send data at any time.\n\
    \nThe bidirectional communication isn’t the only advantage of this protocol. Because\
    \ the connection stays active, it doesn’t need to be initiated again and again\
    \ for every chunk of information. That saves a couple of bits and increases performance.\n\
    \nThe switchover from HTTP to WebSocket is initiated by the WebSocket Opening-Handshake-Request,\
    \ which starts like Listing [34-1](#A435433_1_En_34_Chapter.xhtml#PC1).\n\n######\
    \ Listing 34-1 WebSocket Opening-Handshake-Request (Excerpt)\n\n```\n1   GET /endpoint\
    \ HTTP/1.1\n2   Host: mueller-bruehl.de\n3   Connection: Upgrade\n4   upgrade:\
    \ websocket\n5   ...\n```\n\n`GET /endpoint` refers to an endpoint of the WebSocket\
    \ server. `endpoint` isn’t a fixed term but the name of the endpoint you want\
    \ to connect to. Implementing a chat application, that might be `GET /chat`. Implementing\
    \ such an endpoint is essential.\n\nI don’t want to dive really deep into the\
    \ protocol. If you’re interested in such details, I recommend you read the spec.\
    \ Check out the resources I already mentioned or the detailed overview on Wikipedia.\n\
    \n### Endpoint\n\nFirst, I’ll demonstrate how to create a WebSocket endpoint with\
    \ NetBeans. Begin by creating a fresh web project. Then add a new file (`Ctrl+N`).\
    \ In the New File dialog, choose WebSocket Endpoint, as shown in Figure [34-1](#A435433_1_En_34_Chapter.xhtml#Fig1).\n\
    \n![A435433_1_En_34_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig1_HTML.jpg)\n\
    \n###### Figure 34-1 New File wizard, WebSocket endpoint\n\nClick Next to provide\
    \ a class name, package name, and endpoint name. After confirming with Finish,\
    \ NetBeans creates a skeleton class for you, as shown in Listing [34-2](#A435433_1_En_34_Chapter.xhtml#PC2).\n\
    \n###### Listing 34-2 Generated Skeleton Class for WebSocket Communication\n\n\
    ```\n 1   package de.muellerbruehl.chat;\n\n 3   import javax.websocket.OnMessage;\n\
    \ 4   import javax.websocket.server.ServerEndpoint;\n\n 6   /**\n 7    *\n 8 \
    \   * @author mmueller\n 9    */\n10   @ServerEndpoint(\"/chat\")\n11   public\
    \ class Chat {\n\n13     @OnMessage\n14     public String onMessage(String message)\
    \ {\n15       return null;\n16     }\n\n18   }\n```\n\nThe `@OnMessage` annotated\
    \ method is invoked when this endpoint receives data on its connection. Here we\
    \ need to implement the desired behavior. Before describing Alumni’s chat room,\
    \ I’m going to explain the use of WebSockets step by step using a small example\
    \ application.\n\n### Simple Chat\n\nFirst, I’ll describe the smallest possible\
    \ chat I could write with JSF and WebSockets so far. JSF is only used to handle\
    \ some elements within the browser. In such small applications, that might be\
    \ also handled with pure HTML/JavaScript, but this book is about Java EE and JSF,\
    \ so we’re going to learn about using WebSockets in Java EE.\n\nThis paragraph\
    \ offers a step-by-step tutorial with NetBeans. If the IDE of your choice is a\
    \ different one, it should be possible for you to transfer the steps. Or give\
    \ NetBeans a try. You’ll need to install the NetBeans Java EE (or the all) bundle.\n\
    \nFrom the NetBeans menu, choose File ➤ New Project (or press `Shift+Ctrl+N`)\
    \ to open the New Project window. Choose Maven ➤ Web Application and click Next,\
    \ as shown in Figure [34-2](#A435433_1_En_34_Chapter.xhtml#Fig2).\n\n![A435433_1_En_34_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig2_HTML.jpg)\n\
    \n###### Figure 34-2 New Project wizard\n\nIn the next screen, provide a project\
    \ name (`SimpleChat`), and in the last screen choose GlassFish (or Payara if installed)\
    \ as the application server. Then finish the wizard.\n\nOnce NetBeans creates\
    \ the project for you, right-click the project and open the Project Properties\
    \ dialog. Add the JavaServer Faces framework, as shown in Figure [34-3](#A435433_1_En_34_Chapter.xhtml#Fig3).\n\
    \n![A435433_1_En_34_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig3_HTML.jpg)"
  raw: '## HTTP Protocol and Alternatives


    HTTP is one of the Internet protocols that all current browsers support. HTTP
    (short for HyperText Transfer Protocol) is the standard for Internet browsing.
    As its name suggests, it was developed to transfer text from a server to a client.
    This text can contain hyperlinks to other texts. HTTP was standardized by the
    World Wide Web Consoritum (W3C) , and you can read more about this at [www.w3.org/Protocols/](http://www.w3.org/Protocols/)
    .


    HTTP is a stateless request-response protocol: a client sends a request to the
    server. The server sends a response to the client and terminates the connection.
    For every requested resource, a new connection is needed. For example, if a web
    page contains some text and three images, then a total of four requests is needed.


    Because every request is initiated by the client, normally it’s not possible to
    push information from server to client at any time. There are some workarounds,
    such as *deferred answers*: the server delays its response until certain information
    is available and then sends the answer. After that, the connection is closed,
    and the server needs a new request before it can *push* more information.


    Although widespread, HTTP has a few other limitations, so some alternatives and
    extensions have been developed to overcome these restrictions.


    HTTP/2 ( [https://tools.ietf.org/html/rfc7540](https://tools.ietf.org/html/rfc7540)
    ) lets the client request resources more effectively because this protocol allows
    multiple concurrent exchanges on the same connection. It allows the server to
    preemptively push chunks of data using the same client-side initiated connection.
    For a page with three images, the server answers the client’s request by sending
    the page content and pushing the three images. This boosts the performance, but
    it’s still not what we need to realize a chat. HTTP/2 became standardized by the
    Internet Engineering Task Force (IETF) in 2015 and became part of the Java Enterprise
    Edition starting with version 8 (Java EE 8).


    Server Sent Events (SSE) provide a way to really push information from the server
    to the client. The core protocol is still HTTP: as with vanilla HTTP, the connection
    is requested by the client. The server keeps the connection and is able to push
    chunks of information in so-called *events*.


    SSEs provide a real server push and are part of Java EE 8, too, but it’s one-way
    communication only, from server to client. To create a chat with SSE, we can AJAXify
    an input field to send the user’s input to the server. Then we push this message
    to all clients in the chat room. Because SSE is realized on top of JAX-RS, we
    need to introduce some other techniques that differ a bit from the usual JSF way.
    So SSE isn’t used to realize Alumni’s chat room either.


    WebSockets ( [https://html.spec.whatwg.org/multipage/web-sockets.html#network](https://html.spec.whatwg.org/multipage/web-sockets.html%23network)
    ) represent a different approach to establishing a server push. The WebSocket
    protocol enables a real bidirectional communication between two peers. It was
    standardized by the IEFT in 2011\. Like SSE, its specification is part of the
    HTML living standard.


    This technique seems to fit best for the chat room, so Alumni uses the WebSocket
    protocol. WebSocket became part of Java EE 7 and is supported by JSF 2.3 or newer,
    which is part of Java EE 8\. Although the WebSocket protocol is directly supported
    by JSF, it’s implemented more like a pure server push. To take advantage of the
    full bidirectional support, Alumni doesn’t use WebSocket’s support of JSF. I’ll
    show you an alternative implementation with JSF’s WebSocket feature later in this
    book.


    ## WebSocket


    Technically, the WebSocket protocol is initiated as an upgrade of an HTTP request.
    This implies that a connection needs to be initiated by a client. Once the WebSocket
    connection is established after this upgrade request, both partners act as peers.
    The connection becomes a full-duplex communication . Every peer can send data
    at any time.


    The bidirectional communication isn’t the only advantage of this protocol. Because
    the connection stays active, it doesn’t need to be initiated again and again for
    every chunk of information. That saves a couple of bits and increases performance.


    The switchover from HTTP to WebSocket is initiated by the WebSocket Opening-Handshake-Request,
    which starts like Listing [34-1](#A435433_1_En_34_Chapter.xhtml#PC1).


    ###### Listing 34-1 WebSocket Opening-Handshake-Request (Excerpt)


    ```

    1   GET /endpoint HTTP/1.1

    2   Host: mueller-bruehl.de

    3   Connection: Upgrade

    4   upgrade: websocket

    5   ...

    ```


    GET /endpoint refers to an endpoint of the WebSocket server. endpoint isn’t a
    fixed term but the name of the endpoint you want to connect to. Implementing a
    chat application, that might be GET /chat. Implementing such an endpoint is essential.


    I don’t want to dive really deep into the protocol. If you’re interested in such
    details, I recommend you read the spec. Check out the resources I already mentioned
    or the detailed overview on Wikipedia.


    ### Endpoint


    First, I’ll demonstrate how to create a WebSocket endpoint with NetBeans. Begin
    by creating a fresh web project. Then add a new file (Ctrl+N). In the New File
    dialog, choose WebSocket Endpoint, as shown in Figure [34-1](#A435433_1_En_34_Chapter.xhtml#Fig1).


    ![A435433_1_En_34_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig1_HTML.jpg)


    ###### Figure 34-1 New File wizard, WebSocket endpoint


    Click Next to provide a class name, package name, and endpoint name. After confirming
    with Finish, NetBeans creates a skeleton class for you, as shown in Listing [34-2](#A435433_1_En_34_Chapter.xhtml#PC2).


    ###### Listing 34-2 Generated Skeleton Class for WebSocket Communication


    ```

     1   package de.muellerbruehl.chat;


     3   import javax.websocket.OnMessage;

     4   import javax.websocket.server.ServerEndpoint;


     6   /**

     7    *

     8    * @author mmueller

     9    */

    10   @ServerEndpoint("/chat")

    11   public class Chat {


    13     @OnMessage

    14     public String onMessage(String message) {

    15       return null;

    16     }


    18   }

    ```


    The @OnMessage annotated method is invoked when this endpoint receives data on
    its connection. Here we need to implement the desired behavior. Before describing
    Alumni’s chat room, I’m going to explain the use of WebSockets step by step using
    a small example application.


    ### Simple Chat


    First, I’ll describe the smallest possible chat I could write with JSF and WebSockets
    so far. JSF is only used to handle some elements within the browser. In such small
    applications, that might be also handled with pure HTML/JavaScript, but this book
    is about Java EE and JSF, so we’re going to learn about using WebSockets in Java
    EE.


    This paragraph offers a step-by-step tutorial with NetBeans. If the IDE of your
    choice is a different one, it should be possible for you to transfer the steps.
    Or give NetBeans a try. You’ll need to install the NetBeans Java EE (or the all)
    bundle.


    From the NetBeans menu , choose File ➤ New Project (or press Shift+Ctrl+N) to
    open the New Project window. Choose Maven ➤ Web Application and click Next, as
    shown in Figure [34-2](#A435433_1_En_34_Chapter.xhtml#Fig2).


    ![A435433_1_En_34_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig2_HTML.jpg)


    ###### Figure 34-2 New Project wizard


    In the next screen, provide a project name (**SimpleChat**), and in the last screen
    choose GlassFish (or Payara if installed) as the application server. Then finish
    the wizard.


    Once NetBeans creates the project for you, right-click the project and open the
    Project Properties dialog . Add the JavaServer Faces framework, as shown in Figure
    [34-3](#A435433_1_En_34_Chapter.xhtml#Fig3).


    ![A435433_1_En_34_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_34_Fig3_HTML.jpg)'
  trans: '

    ## HTTP 协议及其替代方案


    HTTP 是当前所有浏览器都支持的互联网协议之一。HTTP（超文本传输协议）是互联网浏览的标准。顾名思义，它最初是为了将文本从服务器传输到客户端而开发的。这些文本可以包含指向其他文本的超链接。HTTP
    由万维网联盟（W3C）标准化，你可以在 [www.w3.org/Protocols/](http://www.w3.org/Protocols/) 了解更多信息。


    HTTP 是一种无状态的请求-响应协议：客户端向服务器发送请求，服务器向客户端发送响应并终止连接。对于每个请求的资源，都需要建立一个新的连接。例如，如果一个网页包含一些文本和三张图片，那么总共需要四次请求。


    由于每个请求都由客户端发起，通常无法随时将信息从服务器推送到客户端。有一些变通方法，例如*延迟应答*：服务器延迟其响应，直到某些信息可用，然后发送应答。之后，连接关闭，服务器需要一个新的请求才能*推送*更多信息。


    尽管 HTTP 应用广泛，但它还有一些其他限制，因此开发了一些替代方案和扩展来克服这些限制。


    HTTP/2（[`tools.ietf.org/html/rfc7540`](https://tools.ietf.org/html/rfc7540)）允许客户端更有效地请求资源，因为该协议允许在同一连接上进行多个并发交换。它允许服务器使用客户端发起的同一连接抢先推送数据块。对于一个包含三张图片的页面，服务器通过发送页面内容并推送这三张图片来响应客户端的请求。这提高了性能，但仍然不是我们实现聊天所需的功能。HTTP/2
    于 2015 年由互联网工程任务组（IETF）标准化，并从版本 8（Java EE 8）开始成为 Java 企业版的一部分。


    服务器发送事件（SSE）提供了一种真正将信息从服务器推送到客户端的方式。核心协议仍然是 HTTP：与普通 HTTP 一样，连接由客户端请求。服务器保持连接，并能够以所谓的*事件*形式推送信息块。


    SSE 提供了真正的服务器推送，也是 Java EE 8 的一部分，但它只是单向通信，即从服务器到客户端。要使用 SSE 创建聊天，我们可以对输入字段进行
    AJAX 化处理，将用户的输入发送到服务器。然后我们将此消息推送到聊天室中的所有客户端。由于 SSE 是在 JAX-RS 之上实现的，我们需要引入一些与通常的
    JSF 方式略有不同的其他技术。因此，Alumni 的聊天室也没有使用 SSE。


    WebSocket（[`html.spec.whatwg.org/multipage/web-sockets.html#network`](https://html.spec.whatwg.org/multipage/web-sockets.html%23network)）代表了建立服务器推送的一种不同方法。WebSocket
    协议实现了两个对等点之间的真正双向通信。它于 2011 年由 IETF 标准化。与 SSE 一样，其规范是 HTML 动态标准的一部分。


    这种技术似乎最适合聊天室，因此 Alumni 使用了 WebSocket 协议。WebSocket 成为 Java EE 7 的一部分，并得到 JSF 2.3
    或更新版本的支持，后者是 Java EE 8 的一部分。尽管 JSF 直接支持 WebSocket 协议，但其实现更像是一种纯粹的服务器推送。为了充分利用完整的双向支持，Alumni
    没有使用 JSF 对 WebSocket 的支持。我将在本书后面向你展示一种使用 JSF 的 WebSocket 功能的替代实现。


    ## WebSocket


    从技术上讲，WebSocket 协议是作为 HTTP 请求的升级而发起的。这意味着连接需要由客户端发起。一旦在此升级请求之后建立了 WebSocket 连接，双方都作为对等点。连接变为全双工通信。每个对等点都可以随时发送数据。


    双向通信并不是该协议的唯一优势。由于连接保持活动状态，因此无需为每个信息块反复发起连接。这节省了一些比特并提高了性能。


    从 HTTP 到 WebSocket 的切换由 WebSocket 打开握手请求发起，该请求如清单 34-1 所示。


    ###### 清单 34-1 WebSocket 打开握手请求（摘录）


    ```

    1   GET /endpoint HTTP/1.1

    2   Host: mueller-bruehl.de

    3   Connection: Upgrade

    4   upgrade: websocket

    5   ...

    ```


    `GET /endpoint` 指向 WebSocket 服务器的一个端点。`endpoint` 不是一个固定术语，而是你想要连接的端点的名称。实现一个聊天应用程序时，它可能是
    `GET /chat`。实现这样一个端点是至关重要的。


    我不想深入探讨协议细节。如果你对这些细节感兴趣，我建议你阅读规范。查看我已经提到的资源，或者维基百科上的详细概述。


    ### 端点


    首先，我将演示如何使用 NetBeans 创建一个 WebSocket 端点。首先创建一个新的 Web 项目。然后添加一个新文件（Ctrl+N）。在新建文件对话框中，选择
    WebSocket 端点，如图 34-1 所示。


    ![A435433_1_En_34_Fig1_HTML.jpg](img/A435433_1_En_34_Fig1_HTML.jpg)


    ###### 图 34-1 新建文件向导，WebSocket 端点


    点击下一步，提供类名、包名和端点名称。点击完成后，NetBeans 会为你创建一个骨架类，如清单 34-2 所示。


    ###### 清单 34-2 为 WebSocket 通信生成的骨架类


    ```

     1   package de.muellerbruehl.chat;


     3   import javax.websocket.OnMessage;

     4   import javax.websocket.server.ServerEndpoint;


     6   /**

     7    *

     8    * @author mmueller

     9    */

    10   @ServerEndpoint("/chat")

    11   public class Chat {


    13     @OnMessage

    14     public String onMessage(String message) {

    15       return null;

    16     }


    18   }

    ```


    当此端点在其连接上接收到数据时，会调用带有 `@OnMessage` 注解的方法。这里我们需要实现所需的行为。在描述 Alumni 的聊天室之前，我将通过一个小型示例应用程序逐步解释
    WebSocket 的使用。


    ### 简单聊天


    首先，我将描述目前我能用 JSF 和 WebSocket 编写的最简单的聊天。JSF 仅用于处理浏览器中的一些元素。在这种小型应用程序中，也可以使用纯 HTML/JavaScript
    来处理，但本书是关于 Java EE 和 JSF 的，因此我们将学习如何在 Java EE 中使用 WebSocket。


    本段提供了一个使用 NetBeans 的逐步教程。如果你选择的 IDE 不同，你应该能够迁移这些步骤。或者尝试一下 NetBeans。你需要安装 NetBeans
    Java EE（或全部）捆绑包。


    从 NetBeans 菜单中，选择文件 ➤ 新建项目（或按 Shift+Ctrl+N）打开新建项目窗口。选择 Maven ➤ Web 应用程序，然后点击下一步，如图
    34-2 所示。


    ![A435433_1_En_34_Fig2_HTML.jpg](img/A435433_1_En_34_Fig2_HTML.jpg)


    ###### 图 34-2 新建项目向导


    在下一个屏幕中，提供项目名称（**SimpleChat**），在最后一个屏幕中，选择 GlassFish（如果已安装，则选择 Payara）作为应用服务器。然后完成向导。


    一旦 NetBeans 为你创建了项目，右键单击项目并打开项目属性对话框。添加 JavaServer Faces 框架，如图 34-3 所示。


    ![A435433_1_En_34_Fig3_HTML.jpg](img/A435433_1_En_34_Fig3_HTML.jpg)

