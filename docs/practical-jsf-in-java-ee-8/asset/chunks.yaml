    ## Summary


    Changing the look and feel of an application is as simple as changing the resource
    library. To apply such a change at once, we need to trick the system a bit. This
    chapter also showed you how to find files in the application server file system
    during runtime. Last but not least, it demonstrated how JSF assigns the navigation
    capabilities to HTML elements.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_36](#A435433_1_En_36_Chapter.xhtml)


    # 36. Handling Constants


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    JSF 2.3 introduced the ability to import constants for use within the Expression
    Language (EL).


    ## Navigation by Strings


    JSF supports internal as well as external navigation. Internal navigation is defined
    in the source code, whereas external navigation is described by an external XML
    file.


    Let’s take a look at a simple internal navigation first in Listing [36-1](#A435433_1_En_36_Chapter.xhtml#PC1).


    ###### Listing 36-1 Direct Navigation by String


    ```

     1   <h:commandLink styleClass="button"

     2                          value="#{msg.btnWelcome}"

     3                          action="/user/welcome.xhtml"/>

    ```


    In line 3 we define the navigation target. This is quite easy but can be error-prone.
    If you have a typo in the action, JSF may display the page properly, but clicking
    the link doesn’t perform any action. And if you want to move or rename the welcome
    page, you have to update all occurrences within your code. It’s easy to forget
    one of them. That’s why some developers prefer external navigation. Personally,
    I don’t like to define my navigation in an XML file. For the Books application,
    I used a different strategy to mitigate this problem.


    In the page, we call a navigation method that uses an enum. For the page we use
    a logical string that’s automatically converted to an instance of the enum when
    calling that method, as shown in Listing [36-2](#A435433_1_En_36_Chapter.xhtml#PC2).


    ###### Listing 36-2 Self-Made enum Navigation


    ```

     1   <h:commandLink styleClass="button"

     2                          value="#{msg.btnWelcome}"

     3                          action="/#{sessionTools.navigate(''UserWelcome'')}"/>

    ```


    Listing [36-3](#A435433_1_En_36_Chapter.xhtml#PC3) shows a shortened excerpt of
    the Books navigation, and Listing [36-4](#A435433_1_En_36_Chapter.xhtml#PC4) shows
    an excerpt of the enum.


    ###### Listing 36-3 Navigation Method (as Part of the Backing Bean)


    ```

     1   public String navigate(Page page) {

     2     return page.getRedirectUrl();

     3   }

    ```


    ###### Listing 36-4 Excerpt of the enum Page


    ```

     1  public enum Page {


     3    UserTemplate("/user/booksTemplate"),

     4    <other pages here>

     5    ;


     7    private Page(String url) {

     8      _url = url;

     9    }

    10   private final String _url;


    12   public String getUrl() {

    13     return _url + ".xhtml";

    14   }


    16   public String getRedirectUrl() {

    17     return _url + ".xhtml?faces-redirect=true";

    18   }

    19   ...

    20 }

    ```


    Now if we have a typo in the page declaration we’ll get an error immediately when
    the page is displayed. Such an obvious error helps discover problems. And the
    main advantage of this approach is the use of a logical name. If we want to relocate
    or rename the page, we only need to update the enum, keeping all pages unchanged.


    ## Importing Constants


    With the current version of Java EE 8/JSF 2.3, we can do even better—and this
    is what we use for Alumni’s navigation. For example, we pick the forgot password
    link, as in Listing [36-5](#A435433_1_En_36_Chapter.xhtml#PC5).


    ###### Listing 36-5 Navigation Using an enum


    ```

     1    <div>

     2      #{msg.lblForgotPassword}

     3      <h:link value="#{msg.lblRequestPassword}"

     4                    outcome="#{Page.RequestPassword.url()}"/>

     5    </div>

    ```


    Take a look at line 4\. Here the outcome is directly composed by the enum’s url.
    We just use the enum as we do in a Java source file. As a prerequisite, we need
    to tell the EL about our enum. That’s where the new importConstants tag comes
    into play. Within the metadata, we need to declare this tag in conjunction with
    the full class name, as shown in Listing [36-6](#A435433_1_En_36_Chapter.xhtml#PC6).


    ###### Listing 36-6 Import Constants for Use in the EL


    ```

     1    <f:metadata>

     2      <f:importConstants type="de.muellerbruehl.alumni.gui.enums.Page"/>

     3    </f:metadata>

    ```


    Although Alumni only imports enums, you can use the importConstants tag for any
    kinds of constants.


    ## Summary


    JSF 2.3 introduced a new tag importConstants. As its name suggests, this tag is
    used to import constants that can be used in the EL afterwards. In Alumni this
    feature is used, among others, for easy, configurable internal page navigation.


    # Appendix A: HTML


    The HypertText Markup Language is used to describe the contents of a web page.
    Like XML, HTML is a member of the Standard Generalized Markup Language (SGML).


    I assume at least a basic knowledge of XML. Thus, this book won’t go into detail
    about how to build an XML document. An HTML document has to consider similar rules,
    but sometimes is less strict. Unlike XML, where you define your own tags, HTML
    comes with a set of predefined tags. The most common tags are briefly described
    in the following sections.


    ### HTML Structure


    An HTML document starts with a document type, followed by an < html > tag, which
    is comparable to the document root of an XML document. Within that, a tag for
    header and body might be included. In the case of XHTML, which is HTML built with
    strict XLM rules, the doctype is preceded by the XML version.


    This basic structure is shown in Listing [A-1](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#PC5)
    .'
