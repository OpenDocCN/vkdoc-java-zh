    \n2   student\n```\n\nEach line is built up by three columns: Username, password,\
    \ and group(s). For technical reasons the group is shown in line 2. For protection,\
    \ the password is stored as an encrypted hash value. See Chapter [28](#A435433_1_En_28_Chapter.xhtml)\
    \ if you need a refresher on secure passwords. With this in mind, the file realm\
    \ might be used for applications only where weak security is sufficient.\n\nIf\
    \ you start the application, you still can’t log in. Do you remember `web.xml`\
    \ dealing with roles and GlassFish storing groups? Although we used the same names\
    \ (`member` and `admin`), these are two slightly different objects. What’s missing\
    \ is a mapping from group (or principal) to role. That’s a task specific to GlassFish.\n\
    \nFor this mapping, you need a `glassfish-web.xml` (or `sun-web.xml`) file. You’ll\
    \ have to create one if it doesn’t exist yet. Using NetBeans, choose New ➤ Other\
    \ ➤ GlassFish ➤ GlassFish Descriptor to create this file. Or create it manually\
    \ in the `WEB-INF` folder.\n\nIn the Security tab, enter information as shown\
    \ in Figure [32-6](#A435433_1_En_32_Chapter.xhtml#Fig6).\n\n![A435433_1_En_32_Fig6_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig6_HTML.jpg)\n\
    \n###### Figure 32-6 NetBeans security editor\n\nThe information you entered in\
    \ the Security Role Mappings box simply adds the lines in Listing [32-4](#A435433_1_En_32_Chapter.xhtml#PC5)\
    \ to the file. If you prefer, you can edit them directly in XML mode.\n\n######\
    \ Listing 32-4 Map One Group to Each Role\n\n```\n1   <security-role-mapping>\n\
    2     <role-name>admin</role-name>\n3     <group-name>admin</group-name>\n4  \
    \ </security-role-mapping>\n5   <security-role-mapping>\n6     <role-name>member</role-name>\n\
    7     <group-name>member</group-name>\n8   </security-role-mapping>\n```\n\nYou\
    \ can map a couple of groups to one role, as shown in Listing [32-5](#A435433_1_En_32_Chapter.xhtml#PC6).\n\
    \n###### Listing 32-5 Map Multiple Groups to a Role\n\n```\n1   <security-role-mapping>\n\
    2     <role-name>member</role-name>\n3     <group-name>admin</group-name>\n4 \
    \    <group-name>member</group-name>\n5   </security-role-mapping>\n```\n\nThis\
    \ configuration maps both groups `member` and `admin` to the role `member`.\n\n\
    You can also map a user (principal) directly to a role:\n\n```\n1   <security-role-mapping>\n\
    2     <role-name>admin</role-name>\n3     <group-name>admin</group-name>\n4  \
    \   <principal-name>muellermi</principal-name>\n5   </security-role-mapping>\n\
    ```\n\nIf there’s no need for this flexible mapping, you can switch it off. In\
    \ GlassFish, choose Configurations ➤ server-config ➤ Security check ➤ Default\
    \ Principal To Role Mapping. Now a group is directly mapped to a role (group name\
    \ = role name)—no need for a dedicated mapping. But beware: this affects only\
    \ applications deployed after changing this setting! Usually users and roles will\
    \ fit the requirements. There’s no need for variant groups. So, I recommend using\
    \ this setting.\n\nNow if you start the application, login to Alumni is possible.\n\
    \n## Form Login\n\nNow that we’ve addressed basic login with simple file realm,\
    \ let’s move on and change the authentication method. Remember, this book is about\
    \ web development with JavaServer Faces. All I’ve showed for container-based security\
    \ so far is technology that’s entirely independent from JSF. The same applies\
    \ to simple form login. But it’s possible to embed this into some JSF techniques.\
    \ And, further on, programmatic login is done using JSF.\n\nFor the form-based\
    \ login, we have to change our `web.xml` slightly. Besides changing the authentication\
    \ method, we have to declare two pages, one for the login and one failure page\
