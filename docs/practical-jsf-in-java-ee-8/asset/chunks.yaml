- fmt: "# 19. Responsive Design\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nSome years ago, it was common to develop web applications with a\
    \ fixed-width page size of 960 pixels. This size was a good choice for the popular\
    \ 17-inch desktop monitor displays.\n\nTimes have changed. Desktops and modern\
    \ laptops have high-resolution screens, and many people are using quite large\
    \ screens. Full HD for example is 1920 pixels wide. Even if this allows more information\
    \ on the screen, you won’t use more than about 1200 pixels per line to keep the\
    \ text readable. The rise of mobile devices like tablets and smartphones dominates\
    \ the marketplace with applications running on smaller displays, starting with\
    \ less than 400 pixels. Although the physical resolution of a modern smartphone\
    \ sometimes is better than full HD, they often use *logical* pixels, which are\
    \ built up by a group of physical pixels. The challenge is to create web pages\
    \ and applications that automatically adapt to the resolutions of large, medium,\
    \ *and* small screens. This is achieved with *responsive design*. You may read\
    \ about *adaptive design*, which also adapts to the screen resolution. The two\
    \ techniques are a little different, but we’ll ignore these small differences\
    \ in this book.\n\nThis chapter introduces some techniques to make the application\
    \ responsive to various screen sizes.\n\n## Making Books Responsive\n\nThe application\
    \ Books uses an easy form of such a responsive design. On a PC, this can be simulated\
    \ by resizing the browser window. Figures [19-1](#A435433_1_En_19_Chapter.xhtml#Fig1)\
    \ through [19-4](#A435433_1_En_19_Chapter.xhtml#Fig4) show how the Books application\
    \ automatically changes its layout in response to the changing window size.\n\n\
    ![A435433_1_En_19_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig1_HTML.jpg)\n\
    \n###### Figure 19-1 Books on wide display\n\n![A435433_1_En_19_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig2_HTML.jpg)\n\
    \n###### Figure 19-2 Books on mid-sized display\n\n![A435433_1_En_19_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig3_HTML.jpg)\n\
    \n###### Figure 19-3 Books on tablet-sized display\n\n![A435433_1_En_19_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig4_HTML.jpg)\n\
    \n###### Figure 19-4 Books on smartphone-sized display\n\nTo make the application\
    \ responsive, there’s no need to change the code or content of the application.\
    \ The application is made responsive by modifying its CSS layout.\n\nAs the previous\
    \ figures show, there are different display strategies depending on the screen\
    \ size used. As a software developer, I assume you personally use a high-resolution\
    \ screen. You can simulate different device sizes by resizing your browser window.\
    \ Let’s start with a full screen and then reduce the window size.\n\nFor a wide\
    \ display, the content and navigation size are limited by a maximum size. We use\
    \ this maximum size to keep the content readable. If the browser window width\
    \ is more than that, we add a margin to center the content. If you reduce the\
    \ window size, the margins left and right will be reduced, keeping the size of\
    \ content and navigation. Then, at a certain width, the strategy changes: the\
    \ width of content and navigation will be reduced according to the window size.\
    \ At another particular width, the strategy changes again: the navigation is displayed\
    \ below the content. These special widths, where the display strategy is changed,\
    \ are called *breakpoints*.\n\nThe trick is to apply different styles depending\
    \ on the size of the screen. Especially for mobile devices, some manufacturers\
    \ apply a kind of logical pixel size to their *viewport* (the visible area of\
    \ the browser window), which may differ from the real pixel size. So, we need\
    \ to prepare this scaling with a simple entry in the `<h:head>` section of our\
    \ JSF template, as shown in Listing [19-1](#A435433_1_En_19_Chapter.xhtml#PC1).\n\
    \n###### Listing 19-1 Scaling of the Viewport in booksTemplate.xhtml\n\n```\n\
    1   <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    />\n```\n\nNext, we define the breakpoints using media queries. *Media queries*\
    \ start with `@media`, followed by the media’s name, such as `@media screen` or\
    \ `@media print`. There are also two more options: `speech` (for speech synthesizers)\
    \ and `all` (used for all devices). Although first recommended in 1994, media\
    \ queries were widely introduced with HTML 4 and CSS 2 for tailoring styles to\
    \ different media. Driving responsive design became possible when other attributes\
    \ like `width` were added. This scheme became a W3C recommended standard in 2012.\n\
    \nFor implementing a responsive design, we’ll use media queries for the screen\
    \ in conjunction with the viewport size to decide which styles we want to apply.\
    \ We’ll define the breakpoints, the discrete sizes at which the styles will change.\n\
    \nBut first, let’s take a look into the relevant excerpt of the CSS file, shown\
    \ in Listing [19-2](#A435433_1_En_19_Chapter.xhtml#PC2).\n\n###### Listing 19-2\
    \ Excerpt from books.css Before Becoming Responsive\n\n```\n 1   body > div {\n\
    \ 2     width: 80em;\n 3     margin: 0 auto;\n 4     text-align: left;\n 5   }\n\
    \n 7   main {\n 8     min-height: 40em;\n 9     width: 53em;\n10     opacity:\
    \ 0.95;\n11     border-radius: 1em;\n12     background-color: #eeeef3;\n13   \
    \  padding: 1em;\n14     margin-bottom: 1em;\n15     box-shadow: 0.5em 0.5em 0.5em\
    \ #004\n16   }\n\n18   nav{\n19     min-height: 40em;\n20     position: fixed;\n\
    21     margin-left: 56em;\n22     width: 22em;\n23     padding: 1em;\n24     top:\
    \ 7.5em;\n25     opacity: 0.85;\n26     border-radius: 1em;\n27     background-color:\
    \ #ccccd8;\n28     box-shadow: 0.5em 0.5em 0.5em #004\n29   }\n```\n\nRemember,\
    \ `body > div` declares some attributes of the application’s space. Using a relative\
    \ unit (`em`) for the width allows for growing or shrinking the space as the user\
    \ changes the browser’s font size. But we have to choose our breakpoints according\
    \ to the screen size, which is given in pixels.\n\nThe content of our application\
    \ on a wide viewport uses `80em`. If the viewport’s width is more than that, the\
    \ browser adds some empty space on the right or left. Shrinking the window will\
    \ reduce this space. If the viewport’s size becomes smaller than our maximum content\
    \ size, we need to shrink the content width. Thus, the first breakpoint seems\
    \ to be reached when the viewport width is equal or less than the width of the\
    \ `body div` element.\n\n###### Caution\n\nAlthough it’s possible to use `em`\
    \ for the media width, that results in some funny behavior. Suppose we define\
    \ a breakpoint at `60em`. Below that size, we’ll reduce the font size in pixels,\
    \ and that will change the width of `1em`. In other words, we’ll change our scale\
    \ base. Shrinking the viewport to less than these `60em` will suddenly result\
    \ in a viewport width of more than `60em`. Can you imagine what would happen?\
    \ It’s really unexpected. A rule of thumb: don’t alter the scale base of your\
    \ breakpoints.\n\nIt’s best to define exact pixels for the screen width. So, we\
    \ need to calculate pixels from our width:\n\n*   *Width in pixels = Width in\
    \ em × Font size in pixels*\n\nBecause we defined a default font size of 12 pixels,\
    \ the width is `80em × 12px = 960px`.\n\nIf the screen size is smaller than that,\
    \ the application size must be reduced. If no size is defined, the size is determined\
    \ by the browser’s display width. Thus, it’s possible to omit the width. We only\
    \ need to define a maximum width for large browser windows. To do that, we’ll\
    \ replace line 2’s `width: 80em` with `max-width: 80em`. No special breakpoint\
    \ is needed.\n\nThe `main` part is `53em` plus padding left and right, which is\
    \ `1em` each. Thus, we get a total width of `55em`. This is `55/80 × 100% = 68.75%`\
    \ of our `80em` width. If we shrink the window, we’d first like to shrink the\
    \ `main` part too by keeping this relative size. In our application, `1em` equates\
    \ to `1/80 × 100% = 1.25%`. Using this information, we can refine all widths by\
    \ replacing the `em` sizes with percent sizes."
  raw: '# 19. Responsive Design


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    Some years ago, it was common to develop web applications with a fixed-width page
    size of 960 pixels. This size was a good choice for the popular 17-inch desktop
    monitor displays.


    Times have changed. Desktops and modern laptops have high-resolution screens,
    and many people are using quite large screens. Full HD for example is 1920 pixels
    wide. Even if this allows more information on the screen, you won’t use more than
    about 1200 pixels per line to keep the text readable. The rise of mobile devices
    like tablets and smartphones dominates the marketplace with applications running
    on smaller displays, starting with less than 400 pixels. Although the physical
    resolution of a modern smartphone sometimes is better than full HD, they often
    use *logical* pixels, which are built up by a group of physical pixels. The challenge
    is to create web pages and applications that automatically adapt to the resolutions
    of large, medium, *and* small screens. This is achieved with *responsive design*.
    You may read about *adaptive design*, which also adapts to the screen resolution.
    The two techniques are a little different, but we’ll ignore these small differences
    in this book.


    This chapter introduces some techniques to make the application responsive to
    various screen sizes.


    ## Making Books Responsive


    The application Books uses an easy form of such a responsive design. On a PC,
    this can be simulated by resizing the browser window. Figures [19-1](#A435433_1_En_19_Chapter.xhtml#Fig1)
    through [19-4](#A435433_1_En_19_Chapter.xhtml#Fig4) show how the Books application
    automatically changes its layout in response to the changing window size.


    ![A435433_1_En_19_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig1_HTML.jpg)


    ###### Figure 19-1 Books on wide display


    ![A435433_1_En_19_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig2_HTML.jpg)


    ###### Figure 19-2 Books on mid-sized display


    ![A435433_1_En_19_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig3_HTML.jpg)


    ###### Figure 19-3 Books on tablet-sized display


    ![A435433_1_En_19_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig4_HTML.jpg)


    ###### Figure 19-4 Books on smartphone-sized display


    To make the application responsive, there’s no need to change the code or content
    of the application. The application is made responsive by modifying its CSS layout.


    As the previous figures show, there are different display strategies depending
    on the screen size used. As a software developer, I assume you personally use
    a high-resolution screen. You can simulate different device sizes by resizing
    your browser window. Let’s start with a full screen and the reduce the window
    size.


    For a wide display, the content and navigation size are limited by a maximum size.
    We use this maximum size to keep the content readable. If the browser window width
    is more than that, we add a margin to center the content. If you reduce the window
    size, the margins left and right will be reduced, keeping the size of content
    and navigation. Then, at a certain width, the strategy changes: the width of content
    and navigation will be reduced according to the window size. At another particular
    width, the strategy changes again: the navigation is displayed below the content.
    These special widths, where the display strategy is changed, are called *breakpoints*.


    The trick is to apply different styles depending on the size of the screen. Especially
    for mobile devices, some manufacturers apply a kind of logical pixel size to their
    *viewport* (the visible area of the browser window), which may differ from the
    real pixel size. So, we need to prepare this scaling with a simple entry in the
    <h:head> section of our JSF template, as shown in Listing [19-1](#A435433_1_En_19_Chapter.xhtml#PC1).


    ###### Listing 19-1 Scaling of the Viewport in booksTemplate.xhtml


    ```

    1   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    ```


    Next, we define the breakpoints using media queries. *Media queries* start with
    @media, followed by the media’s name, such as @media screen or @media print. There
    are also two more options: speech (for speech synthesizers) and all (used for
    all devices). Although first recommended in 1994, media queries were widely introduced
    with HTML 4 and CSS 2 for tailoring styles to different media. Driving responsive
    design became possible when other attributes like width were added. This scheme
    became a W3C recommended standard in 2012.


    For implementing a responsive design , we’ll use media queries for the screen
    in conjunction with the viewport size to decide which styles we want to apply.
    We’ll define the breakpoints, the discrete sizes at which the styles will change.


    But first, let’s take a look into the relevant excerpt of the CSS file, shown
    in Listing [19-2](#A435433_1_En_19_Chapter.xhtml#PC2).


    ###### Listing 19-2 Excerpt from books.css Before Becoming Responsive


    ```

     1   body > div {

     2     width: 80em;

     3     margin: 0 auto;

     4     text-align: left;

     5   }


     7   main {

     8     min-height: 40em;

     9     width: 53em;

    10     opacity: 0.95;

    11     border-radius: 1em;

    12     background-color: #eeeef3;

    13     padding: 1em;

    14     margin-bottom: 1em;

    15     box-shadow: 0.5em 0.5em 0.5em #004

    16   }


    18   nav{

    19     min-height: 40em;

    20     position: fixed;

    21     margin-left: 56em;

    22     width: 22em;

    23     padding: 1em;

    24     top: 7.5em;

    25     opacity: 0.85;

    26     border-radius: 1em;

    27     background-color: #ccccd8;

    28     box-shadow: 0.5em 0.5em 0.5em #004

    29   }

    ```


    Remember, body > div declares some attributes of the application’s space. Using
    a relative unit (em) for the width allows for growing or shrinking the space as
    the user changes the browser’s font size. But we have to choose our breakpoints
    according to the screen size, which is given in pixels.


    The content of our application on a wide viewport uses 80em. If the viewport’s
    width is more than that, the browser adds some empty space on the right or left.
    Shrinking the window will reduce this space. If the viewport’s size becomes smaller
    than our maximum content size , we need to shrink the content width. Thus, the
    first breakpoint seems to be reached when the viewport width is equal or less
    than the width of the body div element.


    ###### Caution


    Although it’s possible to use em for the media width, that results in some funny
    behavior. Suppose we define a breakpoint at 60em. Below that size, we’ll reduce
    the font size in pixels, and that will change the width of 1em. In other words,
    we’ll change our scale base. Shrinking the viewport to less than these 60em will
    suddenly result in a viewport with of more than 60em. Can you imagine what would
    happen? It’s really unexpected. A rule of thumb: don’t alter the scale base of
    your breakpoints.


    It’s best to define exact pixels for the screen width. So, we need to calculate
    pixels from our width:


    *   *Width in pixels = Width in em × Font size in pixels*


    Because we defined a default font size of 12 pixels, the width is 80em × 12px
    = 960px.


    If the screen size is smaller than that, the application size must be reduced.
    If no size is defined, the size is determined by the browser’s display width.
    Thus, it’s possible to omit the width. We only need to define a maximum width
    for large browser windows. To do that, we’ll replace line 2’s width: 80em with
    max-width: 80em. No special breakpoint is needed.


    The main part is 53em plus padding left and right, which is 1em each. Thus, we
    get a total width of 55em. This is 55/80 × 100% = 68.75% of our 80em width. If
    we shrink the window, we’d first like to shrink the main part too by keeping this
    relative size. In our application, 1em equates to 1/80 × 100% = 1.25%. Using this
    information, we can refine all widths by replacing the em sizes with percent sizes.'
  trans: "\n# 19. 响应式设计\n\nMichael Müller¹\n\n(1)德国北莱茵-威斯特法伦州布吕尔\n\n几年前，开发固定页面宽度为\
    \ 960 像素的 Web 应用还很常见。对于当时流行的 17 英寸台式机显示器来说，这个尺寸是个不错的选择。\n\n时代变了。台式机和现代笔记本电脑拥有高分辨率屏幕，许多人都在使用相当大的屏幕。例如，全高清屏幕宽度为\
    \ 1920 像素。即使这允许在屏幕上显示更多信息，为了保持文本可读性，每行也不应超过约 1200 像素。平板电脑和智能手机等移动设备的兴起主导了市场，这些设备上的应用运行在较小的显示屏上，宽度甚至不到\
    \ 400 像素。尽管现代智能手机的物理分辨率有时优于全高清，但它们通常使用*逻辑*像素，这些像素由一组物理像素构成。挑战在于创建能够自动适应大、中、小屏幕分辨率的网页和应用。这可以通过*响应式设计*来实现。你可能听说过*自适应设计*，它也能适应屏幕分辨率。这两种技术略有不同，但我们在本书中将忽略这些细微差别。\n\
    \n本章将介绍一些使应用能够适应各种屏幕尺寸的技术。\n\n## 使 Books 应用具有响应性\n\nBooks 应用采用了一种简单的响应式设计形式。在\
    \ PC 上，可以通过调整浏览器窗口大小来模拟。图 19-1 到 19-4 展示了 Books 应用如何根据窗口大小的变化自动改变其布局。\n\n![A435433_1_En_19_Fig1_HTML.jpg](img/A435433_1_En_19_Fig1_HTML.jpg)\n\
    \n###### 图 19-1 宽屏显示下的 Books\n\n![A435433_1_En_19_Fig2_HTML.jpg](img/A435433_1_En_19_Fig2_HTML.jpg)\n\
    \n###### 图 19-2 中屏显示下的 Books\n\n![A435433_1_En_19_Fig3_HTML.jpg](img/A435433_1_En_19_Fig3_HTML.jpg)\n\
    \n###### 图 19-3 平板尺寸显示下的 Books\n\n![A435433_1_En_19_Fig4_HTML.jpg](img/A435433_1_En_19_Fig4_HTML.jpg)\n\
    \n###### 图 19-4 智能手机尺寸显示下的 Books\n\n要使应用具有响应性，无需更改应用的代码或内容。通过修改其 CSS 布局即可实现应用的响应式。\n\
    \n如前图所示，根据所使用的屏幕尺寸，存在不同的显示策略。作为一名软件开发人员，我假设你个人使用的是高分辨率屏幕。你可以通过调整浏览器窗口大小来模拟不同设备的尺寸。让我们从全屏开始，然后缩小窗口。\n\
    \n对于宽屏显示，内容和导航区域的大小受最大尺寸限制。我们使用这个最大尺寸来保持内容的可读性。如果浏览器窗口宽度超过此尺寸，我们会添加外边距以使内容居中。如果缩小窗口，左右外边距会减小，而内容和导航区域的大小保持不变。然后，在某个特定宽度下，策略会改变：内容和导航区域的宽度将根据窗口大小而减小。在另一个特定宽度下，策略再次改变：导航区域显示在内容下方。这些改变显示策略的特殊宽度被称为*断点*。\n\
    \n诀窍在于根据屏幕尺寸应用不同的样式。特别是对于移动设备，一些制造商对其*视口*（浏览器窗口的可视区域）应用了一种逻辑像素尺寸，这可能与实际像素尺寸不同。因此，我们需要在\
    \ JSF 模板的 `<h:head>` 部分添加一个简单的条目来准备这种缩放，如清单 19-1 所示。\n\n###### 清单 19-1 booksTemplate.xhtml\
    \ 中的视口缩放\n\n```\n1   <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    />\n```\n\n接下来，我们使用媒体查询来定义断点。*媒体查询*以 `@media` 开头，后跟媒体名称，例如 `@media screen` 或 `@media\
    \ print`。还有另外两个选项：`speech`（用于语音合成器）和 `all`（用于所有设备）。尽管媒体查询早在 1994 年就被首次推荐，但随着 HTML\
    \ 4 和 CSS 2 的普及，它们被广泛用于为不同媒体定制样式。当添加了 `width` 等其他属性后，驱动响应式设计才成为可能。这种方案于 2012 年成为\
    \ W3C 推荐标准。\n\n为了实现响应式设计，我们将结合视口大小使用针对屏幕的媒体查询，以决定应用哪些样式。我们将定义断点，即样式发生变化的离散尺寸。\n\
    \n但首先，让我们看一下 CSS 文件的相关摘录，如清单 19-2 所示。\n\n###### 清单 19-2 响应式设计前的 books.css 摘录\n\
    \n```\n 1   body > div {\n 2     width: 80em;\n 3     margin: 0 auto;\n 4    \
    \ text-align: left;\n 5   }\n\n 7   main {\n 8     min-height: 40em;\n 9     width:\
    \ 53em;\n10     opacity: 0.95;\n11     border-radius: 1em;\n12     background-color:\
    \ #eeeef3;\n13     padding: 1em;\n14     margin-bottom: 1em;\n15     box-shadow:\
    \ 0.5em 0.5em 0.5em #004\n16   }\n\n18   nav{\n19     min-height: 40em;\n20  \
    \   position: fixed;\n21     margin-left: 56em;\n22     width: 22em;\n23     padding:\
    \ 1em;\n24     top: 7.5em;\n25     opacity: 0.85;\n26     border-radius: 1em;\n\
    27     background-color: #ccccd8;\n28     box-shadow: 0.5em 0.5em 0.5em #004\n\
    29   }\n```\n\n请记住，`body > div` 声明了应用空间的一些属性。对宽度使用相对单位 `em` 允许空间随着用户更改浏览器字体大小而增长或缩小。但我们必须根据以像素为单位的屏幕尺寸来选择断点。\n\
    \n在宽视口下，我们应用的内容使用 `80em`。如果视口宽度大于此值，浏览器会在右侧或左侧添加一些空白区域。缩小窗口会减少此空白区域。如果视口尺寸变得小于我们的最大内容尺寸，我们需要缩小内容宽度。因此，当视口宽度小于或等于\
    \ `body div` 元素的宽度时，似乎就达到了第一个断点。\n\n###### 注意\n\n虽然可以对媒体宽度使用 `em`，但这会导致一些奇怪的行为。假设我们在\
    \ `60em` 处定义一个断点。低于该尺寸时，我们会减小以像素为单位的字体大小，而这会改变 `1em` 的宽度。换句话说，我们改变了缩放基准。将视口缩小到小于这\
    \ `60em` 时，会突然导致视口宽度大于 `60em`。你能想象会发生什么吗？这确实出乎意料。一条经验法则：不要改变断点的缩放基准。\n\n最好为屏幕宽度定义精确的像素值。因此，我们需要根据我们的宽度计算像素：\n\
    \n*   *像素宽度 = em 宽度 × 像素字体大小*\n\n因为我们定义了默认字体大小为 12 像素，所以宽度为 `80em × 12px = 960px`。\n\
    \n如果屏幕尺寸小于此值，则必须减小应用尺寸。如果未定义尺寸，则尺寸由浏览器的显示宽度决定。因此，可以省略宽度。我们只需要为大型浏览器窗口定义一个最大宽度。为此，我们将第\
    \ 2 行的 `width: 80em` 替换为 `max-width: 80em`。不需要特殊的断点。\n\n`main` 部分为 `53em`，加上左右内边距各\
    \ `1em`。因此，总宽度为 `55em`。这占我们 `80em` 宽度的 `55/80 × 100% = 68.75%`。如果我们缩小窗口，我们首先希望保持这个相对比例来缩小\
    \ `main` 部分。在我们的应用中，`1em` 相当于 `1/80 × 100% = 1.25%`。利用这些信息，我们可以通过将 `em` 尺寸替换为百分比尺寸来细化所有宽度。\n"
- fmt: "###### Caution\n\nSizes in percent are relative sizes. Beware: these aren’t\
    \ relative to the screen but to the surrounding container.\n\nIf we shrink the\
    \ width, fewer characters of text may be displayed in each line. But we don’t\
    \ change the line’s height, so in many cases it’s best to keep vertical sizes\
    \ in `em`.\n\nFor the responsive design, we divide our `main` and `nav` classes\
    \ into two parts. One of them contains all styles that are independent from the\
    \ viewport width (see Listing [19-3](#A435433_1_En_19_Chapter.xhtml#PC3), lines\
    \ 7–20), whereas the other parts contain viewport-dependent styles. These parts\
    \ will be different for each breakpoint. Lines 23–37 use the original values as\
    \ seen in the previous listing.\n\n###### Listing 19-3 Excerpt from books.css,\
    \ First Responsive Approach\n\n```\n 1   body > div {\n 2     max-width: 80em;\n\
     3     margin: 0 auto;\n 4     text-align: left;\n 5   }\n\n 7   main {\n 8     opacity:\
    \ 0.95;\n 9     border-radius: 1em;\n10     background-color: #eeeef3;\n11     margin-bottom:\
    \ 1em;\n12     box-shadow: 0.5em 0.5em 0.5em #004;\n13   }\n\n15   nav{\n16     opacity:\
    \ 0.85;\n17     border-radius: 1em;\n18     background-color: #ccccd8;\n19     box-shadow:\
    \ 0.5em 0.5em 0.5em #004;\n20   }\n\n22   @media screen and (min-width: 960px){\n\
    23     main {\n24       min-height: 40em;\n25       width: 53em;\n26       padding:\
    \ 1em;\n27     }\n\n29     nav{\n30       min-height: 40em;\n31       position:\
    \ fixed;\n32       margin-left: 56em;\n33       width: 22em;\n34       top: 7.5em;\n\
    35       padding: 1em;\n36     }\n37   }\n\n39   @media screen and (min-width:\
    \ 600px) and (max-width: 960px){\n40     main {\n41       min-height: 45em;  \
    \                                                                            \
    \        \n42       width: 66.25%;\n43       padding: 1.25%;\n44     }\n\n46     nav{\n\
    47       min-height: 45em;\n48       position: fixed;\n49       margin-left: 70%;\n\
    50       width: 27.5%;\n51       padding: 1.25%;\n52       top: 7.5em;\n53     }\n\
    54   }\n\n56   @media screen and (max-width: 600px){\n57     main {\n58       width:\
    \ 97.5%;\n59       padding: 1.25%;\n60     }\n\n62     nav{\n63       width: 97.5%;\n\
    64       padding: 1.25%;\n65       bottom: 1em;\n66     }\n67   }\n```\n\nIn line\
    \ 22 you’ll find the first media query. It applies to a viewport size on the screen\
    \ with a minimum width of 960px. Every style declaration between the opening curly\
    \ brace on that line and the corresponding closing one on line 37 will be applied\
    \ to the HTML page if, and only if, that minimum width condition is true. The\
    \ next breakpoint is reached with a size of 960px. Within the condition of the\
    \ corresponding media query, we define the width as mentioned before in percent,\
    \ not in `em` (lines 39–54). If the size is less than 600px, we rearrange the\
    \ navigation now being displayed below the main content. As you can see, media\
    \ queries are enhanced by one or more width conditions. I assume these are mostly\
    \ self-explanatory.\n\nThere’s one important detail to talk about. Look at Listing\
    \ [19-4](#A435433_1_En_19_Chapter.xhtml#PC4).\n\n###### Listing 19-4 Cascaded\
    \ Media Queries\n\n```\n1   @media screen and (min-width: 960px){...}\n2   @media\
    \ screen and (min-width: 600px) and (max-width: 960px){...}\n3   @media screen\
    \ and (max-width: 600px){...}\n```\n\nIn this definition, `max-width` of the smaller\
    \ screen (or window) equals the `min-width` of the bigger screen. Are these overlappings\
    \ okay? Listing [19-5](#A435433_1_En_19_Chapter.xhtml#PC5) seems to show a better\
    \ way.\n\n###### Listing 19-5 Cascaded Media Queries, Nonoverlapping\n\n```\n\
    1   @media screen and (min-width: 960px){...}\n2   @media screen and (min-width:\
    \ 600px) and (max-width: 959px){...}\n3   @media screen and (max-width: 599px){...}\n\
    ```\n\nNow the sizes don’t overlap, and this is what you’ll find in some books\
    \ or blogs talking about responsive design. At a first glance, such a nonoverlapping\
    \ definition seems to be correct. But it really isn’t: we now have *two* gaps,\
    \ one between 959 and 960px, and the other between 599 and 600px. Eh?\n\n######\
    \ Try an experiment:\n\nreplace the media queries with the nonoverlapping version.\
    \ Start with a wide browser window and reduce its width. When you reach a breakpoint,\
    \ slowly increase and reduce the window size and observe what happens. Depending\
    \ on your system or browser settings (you may have fonts enlarged, or the browser\
    \ window zoomed), most browsers will display the navigation below the main content\
    \ when you reach the breakpoint. That’s because there’s a 1-pixel gap and a calculated\
    \ size just between both definitions. None of the definitions will be used, so\
    \ the navigation won’t be displayed as expected.\n\nTake a look at Figure [19-5](#A435433_1_En_19_Chapter.xhtml#Fig5).\
    \ Here the browser calculates a width of 959.167px, which falls into this 1-pixel\
    \ gap.\n\n![A435433_1_En_19_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig5_HTML.jpg)\n\
    \n###### Figure 19-5 Width = 959.167px\n\nDue to this problem, Books uses the\
    \ overlapping approach. To avoid ambiguity, CSS uses the last definition found\
    \ in the CSS file.\n\nIn our first responsive approach, we still use `em` for\
    \ the wide viewport size. But because the container is restricted to 80em, even\
    \ if the viewport is wider, relative sizes in percent in the main part can’t grow.\
    \ So we can use the same sizes as used for the smaller window in percent.\n\n\
    The navigation floats out of the `body > div` container. Its container is the\
    \ display area of your browser, and it will grow as the window grows. To keep\
    \ the navigation size, it still has to be defined using `em`. This said, we can\
    \ refactor the style sheet. See Listing [19-6](#A435433_1_En_19_Chapter.xhtml#PC6).\n\
    \n###### Listing 19-6 Excerpt from books.css, Refined Responsive Definition\n\n\
    ```\n 1   body > div {\n 2     max-width: 80em;\n 3     margin: 0 auto;\n 4     text-align:\
    \ left;\n 5   }\n\n 7   main {\n 8     opacity: 0.95;\n 9     border-radius: 1em;\n\
    10     background-color: #eeeef3;\n11     margin-bottom: 1em;\n12     box-shadow:\
    \ 0.5em 0.5em 0.5em #004;\n13   }\n\n15   nav{\n16     opacity: 0.85;\n17     border-radius:\
    \ 1em;\n18     background-color: #ccccd8;\n19     box-shadow: 0.5em 0.5em 0.5em\
    \ #004;\n20   }\n\n22   @media screen and (min-width: 600px){\n23     main {\n\
    24       width: 66.25%;\n25       padding: 1.25%;\n26     }\n\n28     nav{\n29       position:\
    \ fixed;\n30       top: 7.5em;\n31     }\n32   }\n\n34   @media screen and (min-width:\
