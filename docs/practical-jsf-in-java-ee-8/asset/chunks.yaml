- fmt: '###### Figure 34-3 Project Properties


    Click the `Configuration` tab and enter `***.xhtml` as URL pattern. Close the
    `Properties` dialog.


    So far, this is like creating any other Java web project with JSF, but this time
    we’ll add a dependency to the Tyrus server. Tyrus is the WebSocket reference implementation,
    included in GlassFish, WebLogic, and some other servers.


    Open the POM and add the dependency shown in Listing [34-3](#A435433_1_En_34_Chapter.xhtml#PC3).


    ###### Listing 34-3 Tyrus Dependency in the POM File


    ```

    1   <dependency>

    2     <groupId>org.glassfish.tyrus</groupId>

    3     <artifactId>tyrus-server</artifactId>

    4     <version>1.13</version>

    5   </dependency>

    ```


    We’ll create another version without this dependency on the Tyrus server later
    in this book. Using Tyrus, the endpoint will be the simplest.


    For those who don’t use NetBeans, Listing [34-4](#A435433_1_En_34_Chapter.xhtml#PC4)
    shows the complete POM created and edited so far.


    ###### Listing 34-4 POM of SimpleChat


    ```

    1   <?xml version="1.0" encoding="UTF-8"?>

    2   <project xmlns:="http://maven.apache.org/POM/4.0.0"

    3            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"

    4            xsi:schemaLocation="http://maven.apache.org/POM/4.0.0

    5            http://maven.apache.org/xsd/maven-4.0.0.xsd">

    6     <modelVersion>4.0.0</modelVersion>

    8     <groupId>de.muellerbruehl</groupId>

    9     <artifactId>SimpleChat</artifactId>

    10    <version>1.0-SNAPSHOT</version>

    11    <packaging>war</packaging>

    13    <name>SimpleChat</name>

    15    <properties>

    16      <endorsed.dir>${project.build.directory}/endorsed</endorsed.dir>

    17      <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>

    18    </properties>

    20    <dependencies>

    21      <dependency>

    22        <groupId>javax</groupId>

    23        <artifactId>javaee-web-api</artifactId>

    24        <version>8.0</version>

    25        <scope>provided</scope>

    26      </dependency>

    27      <dependency>

    28        <groupId>org.glassfish.tyrus</groupId>

    29        <artifactId>tyrus-server</artifactId>

    30        <version>1.13</version>

    31      </dependency>

    32    </dependencies>

    34    <build>

    35      <plugins>

    36        <plugin>

    37          <groupId>org.apache.maven.plugins</groupId>

    38          <artifactId>maven-compiler-plugin</artifactId>

    39          <version>3.1</version>

    40          <configuration>

    41            <source>1.8</source>

    42            <target>1.8</target>

    43            <compilerArguments>

    44              <endorseddirs>${endorsed.dir}</endorseddirs>

    45            </compilerArguments>

    46          </configuration>

    47        </plugin>

    48        <plugin>

    49          <groupId>org.apache.maven.plugins</groupId>

    50          <artifactId>maven-war-plugin</artifactId>

    51          <version>2.3</version>

    52          <configuration>

    53            <failOnMissingWebXml>false</failOnMissingWebXml>

    54          </configuration>

    55        </plugin>

    56        <plugin>

    57          <groupId>org.apache.maven.plugins</groupId>

    58          <artifactId>maven-dependency-plugin</artifactId>

    59          <version>2.6</version>

    60          <executions>

    61            <execution>

    62              <phase>validate</phase>

    63              <goals>

    64                <goal>copy</goal>

    65              </goals>

    66              <configuration>

    67                <outputDirectory>${endorsed.dir}</outputDirectory>

    68                <silent>true</silent>

    69                <artifactItems>

    70                  <artifactItem>

    71                    <groupId>javax</groupId>

    72                    <artifactId>javaee-endorsed-api</artifactId>

    73                    <version>8.0</version>

    74                    <type>jar</type>

    75                  </artifactItem>

    76                </artifactItems>

    77              </configuration>

    78            </execution>

    79          </executions>

    80        </plugin>

    81      </plugins>

    82    </build>

    84  </project>

    ```


    The next step is to create a server endpoint, as mentioned earlier. For the name,
    choose `SimpleChat` and provide the same name for the package. The endpoint URI
    will be `simplechat`.


    Next, modify the `onMessage` method, as shown in Listing [34-5](#A435433_1_En_34_Chapter.xhtml#PC5).


    ###### Listing 34-5 onMessage Method to Broadcast a Message


    ```

    1   @OnMessage

    2   public void onMessage(String message, Session session) {

    3     ((TyrusSession) session).broadcast(message);

    4   }

    ```


    Now fix the imports (`Ctrl+Shift+I`).


    This method will be invoked every time our endpoint receives a message. All it
    does is broadcast this message to all clients who have opened a WebSocket connection
    to this endpoint. Although it seems to be a broadcast, under the hood the server
    handles individual connections. We’ll handle this by ourselves within the Tyrus-less
    version.


    Next, modify the `index.xhtml` page as shown in Listing [34-6](#A435433_1_En_34_Chapter.xhtml#PC6).


    ###### Listing 34-6 SimpleChat Page (index.xhtml)


    ```

    1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

    2   <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

    3     "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

    4   <html xmlns:="http://www.w3.org/1999/xhtml"

    5         xmlns:h="http://xmlns.jcp.org/jsf/html">

    6     <h:head>

    7       <title>Chat</title>

    8       <h:outputScript name="simpleChat.js"/>

    9     </h:head>

    10    <h:body>

    12      <h1>Simple chat</h1>

    13      <h:form prependId="false">

    15        <div>

    16          Enter message:

    17          <h:inputTextarea style="height: 1em;"

    18              onkeypress="if (event.keyCode === 13) {

    19                acceptValue(this);

    20              }"

    21          />

    22        </div>

    23        <h:inputTextarea id="messages"

    24           style="width: 100%;

    25           min-height: 10em;"/>

    26        </h:form>

    27      </h:body>

    28  </html>

    ```


    This page defines two text areas. One is just a simple one-line input field. I’ve
    chosen a text area rather than a simple text field to stay within this field on
    hitting the Enter key. As you can see in line 18, something happens (calling `acceptValue`)
    on pressing Enter.


    The second text area is used for the common output. Here we’ll display all messages
    of the users in that chat. The glue code we need is provided in a JavaScript file,
    `simpleChat.js`.


    In the project’s Web Pages folder, create a new folder `resources`, and in that
    folder the file `simpleChat.js`. JSF will load this file according to the `outputScript`
    tag we have in our page.


    Add this content to the script file, as shown in Listing [34-7](#A435433_1_En_34_Chapter.xhtml#PC7).'
