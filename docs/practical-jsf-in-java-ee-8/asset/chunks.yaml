  trans: "\n###### 清单 12-11 控制器 Bean CategoryEditor\n\n```\n 1   @Named\n 2   @SessionScoped\n\
     3   public class CategoryEditor implements Serializable{\n 4     private static\
    \ final Logger _logger = Logger.getLogger(\"CategoryEditor\");\n\n 6     @Inject\
    \ CategoryService _categoryService;    \n\n 8     @PostConstruct\n 9     private\
    \ void init(){\n10       _categories = _categoryService.findAll();\n11       _deletedCategories\
    \ = new ArrayList<>();\n12     }\n\n14     private List<Category> _deletedCategories;\n\
    15     private List<Category> _categories;\n\n17     public List<Category> getCategories()\
    \ {\n18       return _categories;\n19     }\n\n21     public void setCategories(List<Category>\
    \ categories) {\n22       _categories = categories;\n23     }\n\n25     public\
    \ String deleteCategory(Category category){\n26       if (category.getId() >=\
    \ 0){\n27         _deletedCategories.add(category);\n28       }\n29       _categories.remove(category);\n\
    30       return \"\";\n31     }\n\n33     public String addCategory(){\n34       _categories.add(new\
    \ Category());\n35       return \"\";\n36     }\n\n38     public String save(){\n\
    39       for (Category category : _categories){\n40         _categoryService.save(category);\n\
    41     }\n42     for (Category category : _deletedCategories){\n43       _categoryService.delete(category);\n\
    44     }\n45     _deletedCategories = new ArrayList<>();\n\n47     return \"\"\
    ;                                                                            \
    \          \n48     }\n49   }\n```\n\n`@Inject` 是 CDI 的一部分。由容器负责将请求类型（类）的对象传递给带注解的变量。如有必要，容器会创建合适的对象并维护其生命周期。在\
    \ JSF 的旧时代，你只能注入生命周期比当前 Bean 更长的 JSF 托管 Bean（例如，将会话作用域的 Bean 注入到请求作用域的 Bean 中，反之则不行）。与注入请求类的实例不同，CDI\
    \ 会注入一个代理对象。一旦该代理被注入，你就可以用它来访问请求类的相应对象。真正的对象可能会在请求之间发生变化。\n\n例如，容器可以将一个请求作用域的\
    \ Bean 注入到会话作用域的 Bean 中。现在，如果你尝试访问那个请求作用域的 Bean，代理会在每次请求时为你呈现一个不同的真实对象。\n\n只有符合条件的\
    \ Bean 才能被注入。否则，NetBeans 会提醒你没有 Bean 匹配注入点。但哪些 Bean 是符合条件的呢？例如，EJB、命名 Bean 等。所有这些都通过特殊的注解或配置文件来标识。你也可以创建自己的注解来“生产”符合条件的\
    \ Bean。我稍后会更详细地讨论 CDI。新技术的问题可能在于 IDE 不了解它们——特别是对于某些 NetBeans 不了解的新 Java EE 可注入对象，它会发出此类警告信息。不用担心——尽管使用它。\n\
    \n到目前为止，分类编辑器的第一个版本已经就绪。稍后，我们将通过使用通用服务类、对 JSF 页面进行 AJAX 化等方式来完善它。\n\n###### 检查实体状态\n\
    \n在服务类中添加一个简单的方法来返回实体的状态：\n\n```\n1   public String checkState(Category entity){\n\
    2     return entity + (_em.contains(entity) ? \"attached\" : \"detached\");\n\
    3   }\n```\n\n在 `findAll`（CategoryService）和 `init`（CategoryEditor）方法中调用此方法，打印输出，并观察实体的状态。\n\
    \n## 总结\n\n本章我们涵盖了很多内容。Java 持久化 API 定义了一个用于对象关系映射（ORM）的框架。它基于由实体管理器（EM）管理的实体这一核心概念。实体是一个带有一些特殊注解的普通\
    \ Java 对象（POJO）。只有 `@Entity` 和 `@Id` 注解是必需的，而框架会为表和列名假定默认值。通常需要为不同的表名（`@Table`）或列名（`@Column`）提供映射。\n\
    \n一个实体将处于由 EM 管理的四种不同状态之一。建议将数据对象与数据访问分离。因此，实体不应包含（特定于数据库的）逻辑。数据访问由专门的服务类执行。\n\
    \nEM 依赖于持久化单元的定义，该单元配置了逻辑数据库访问。技术层面的数据库访问（驱动程序、服务器属性）由数据源配置。\n\n本章还解释了如何在支持 Bean\
    \ 中使用服务类。\n\n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE\
    \ 8 , `doi.org/10.1007/978-1-4842-3030-5_13`\n\n# 13. JSF 模板化\n\nMichael Müller^(1 )\n\
    \n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\n通常，应用程序会提供一致的外观和感觉。这样，整体布局保持不变，只有内容或其他次要元素在不同页面之间变化。JSF\
    \ 通过其简单而强大的模板功能支持这种整体布局。\n\n## 模板化图书\n\n*模板*就像一张图片，上面有一些（大多是）矩形的孔洞。通过在其他图片后面放置这些孔洞，你可以在保持基本布局的同时更改图片。\n\
    \n图 13-1 展示了图书应用程序的一些不同屏幕。\n\n![A435433_1_En_13_Fig1_HTML.jpg](img/A435433_1_En_13_Fig1_HTML.jpg)\n\
    \n###### 图 13-1 图书运行中\n\n如你所见，由于 JSF 模板化（见图 13-2），只有主要内容区域发生了变化。\n\n![A435433_1_En_13_Fig2_HTML.jpg](img/A435433_1_En_13_Fig2_HTML.jpg)\n\
    \n###### 图 13-2 图书运行中\n\n对于模板化，至少需要两个组件：模板文件和内容文件。由于内容文件使用了模板，因此它被称为*客户端*。\n\n\
    让我们从模板开始。还记得分类编辑器吗？第一个（原型）版本仍然叫做 index.xhtml。这个文件包含页眉、导航、主体和页脚。我们需要的“孔洞”正好是主体部分。创建模板最简单的方法是复制这个文件（在项目树的网页分支中，即\
    \ src/webapp 文件夹），剪切主体中的内容，并用一条指令替换它，该指令的意思是“在此插入可变内容”。这就是 `<ui:insert ...>` 标签的作用。不要忘记为\
    \ `ui:` 插入命名空间声明。然后——瞧——模板就准备好了，如清单 13-1 所示。\n"
- fmt: "### Listing 13-1 Draft of `booksTemplate.xhtml`\n\n```xml\n<?xml version='1.0'\
    \ encoding='UTF-8' ?>\n<!DOCTYPE html [<!ENTITY copy \"©\">]>\n<html xmlns:=\"\
    http://www.w3.org/1999/xhtml\"\n      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n    <h:head>\n        <title>Books</title>\n\
    \        <h:outputStylesheet library=\"css\" name=\"books.css\" />\n    </h:head>\n\
    \    <h:body>\n        <div id=\"wrapper\">\n            <header>\n          \
    \      <h1>Michael's book list</h1>\n            </header>\n            <main>\n\
    \                <ui:insert name=\"content\">Here the content goes</ui:insert>\n\
    \            </main>\n            <nav>\n                This is the navigation\n\
    \            </nav>\n            <footer>\n                &copy;  Michael Müller\n\
    \                |\n                <h:outputLink value=\"http://blog.mueller-bruehl.de\"\
    >\n                    Michael's Blog\n                </h:outputLink>\n     \
    \           |\n                <h:link value=\"About\" outcome=\"index.xhtml\"\
    />\n            </footer>\n        </div>\n    </h:body>\n</html>\n```\n\nThe\
    \ `<ui:insert ...>` tag defines a placeholder with the name `content`, as given\
    \ by the `name` attribute. This is the hole where the content will shine through.\
    \ In a given template, more than one insert tag might be defined. The text `Here\
    \ the content goes` in that tag will be replaced with the content provided by\
    \ the template client.\n\n### Browse the Template\n\n1.  Start the application.\n\
    2.  Open the template page. In the address (URL) bar of your browser, type `http://localhost:8080/Books/booksTemplate.xhtml`.\n\
    \nYou should get the basic layout with `Here the content goes` as the main part.\n\
    \nNow we need to refactor `index.xhtml` to transform it into a template client.\
    \ Instead of the `html` tag, we’ll use the `<ui:composition ...>` tag. Within\
    \ this tag we place `<ui:define name=\"content\">`. The name we provide here is\
    \ the same one we provided as the placeholder in our template. Whatever we want\
    \ to display for the content of our template, we simply place the appropriate\
    \ content in this tag.\n\nLast but not least, we need to declare which template\
    \ we want to use, as in Listing [13-2](#A435433_1_En_13_Chapter.xhtml#PC2).\n\n\
    ### Listing 13-2 Template Client\n\n```xml\n<?xml version='1.0' encoding='UTF-8'\
    \ ?>\n<!DOCTYPE html>\n<ui:composition xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n      template=\"/booksTemplate.xhtml\">\n    <ui:define name=\"content\">\n\
    \        <h1>Edit categories</h1>\n        <h:form>\n            <h:dataTable\
    \ value=\"#{categoryEditor.categories}\"\n                         var=\"cat\"\
    >\n                <h:column>\n                    <h:commandLink\n          \
    \              action=\"#{categoryEditor.deleteCategory(cat)}\">\n           \
    \             <h:graphicImage alt=\"delete\"\n                               \
    \         name=\"Delete.png\"\n                                        library=\"\
    icon/small\"\n                                        title=\"delete\"/>\n   \
    \                 </h:commandLink>\n                </h:column>\n            \
    \    <h:column>\n                    <h:inputText value=\"#{cat.name}\"/>\n  \
    \              </h:column>\n            </h:dataTable>\n            <h:commandLink\
    \ styleClass=\"button\"\n                           value=\"Add category\"\n \
    \                          action=\"#{categoryEditor.addCategory}\"/>\n      \
    \      <h:commandButton styleClass=\"button\"\n                             value=\"\
    Save\"                                                                \n     \
    \                        action=\"#{categoryEditor.save}\"/>\n        </h:form>\n\
    \    </ui:define>>\n</ui:composition>\n```\n\nIn this example, the namespaces\
    \ are defined as attributes of the `<ui:composition ...>` element. Sometimes you’ll\
    \ find JSF template clients with an `html` element and the namespaces declared\
    \ there. Then the `<ui:composition ...>` is defined somewhere in this page, for\
    \ example within the body. Everything outside the `<ui:composition ...>` will\
    \ be ignored for the client. Listing [13-3](#A435433_1_En_13_Chapter.xhtml#PC3)\
    \ shows this approach. In my opinion, it’s more concise, without such an overhead.\n\
    \n### Listing 13-3 Template Client with Superfluous `html` Tag\n\n```xml\n<?xml\
    \ version='1.0' encoding='UTF-8' ?>\n<!DOCTYPE html>\n<html xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n      xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n      xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    >\n\n    This will be ignored\n\n    <ui:composition  template=\"/booksTemplate.xhtml\"\
    >\n        <ui:define name=\"content\">\n\n            Content goes here\n   \
    \     </ui:define>>\n    </ui:composition>\n\n    This will be ignored\n\n</html>\n\
    ```\n\nAs we’ll see later in this book, a template might be the client of another\
    \ template. JSF allows you to define a cascade of nested templates.\n\n**Note**\n\
    \nThe complete source code for Books, as developed from startup to templating,\
    \ is available from [http://webdevelopment-java.info](http://webdevelopment-java.info)\
    \ .\n\n## Summary\n\nCreating an overall look and feel is possible through JSF’s\
    \ templating mechanism. It’s built up by a template, which defines the overall\
    \ layout. A client uses this template by replacing or adding content at predefined\
    \ places. A template might be used by a couple of clients, and a template might\
    \ be the client of another template, supporting cascading structures.\n\n© Michael\
    \ Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_14](#A435433_1_En_14_Chapter.xhtml)\n\
    \n# 14. Going International\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nAn application hosted on a web server that is part of the Internet\
    \ might be accessible from almost every part of the globe. Even if you don’t write\
    \ your application for everybody, you might address people in different countries\
    \ speaking different languages. That means you need to prepare your software for\
    \ an international market.\n\n## Internationalization and Localization\n\nBooks\
    \ will be prepared for different languages and formats (*internationalization*)\
    \ and implemented for the English (countries such as Australia, Canada, the United\
    \ States, and the UK) and German (Germany) languages. Making the book available\
    \ in different languages and adapting it to other surroundings is easier than\
    \ it sounds.\n\nJava does a lot of this job for us by simply letting you specify\
    \ a region. We just need to provide information about the region, providing texts\
    \ for all GUI elements and messages in the languages of our choice. The texts\
    \ for GUI elements and messages in the chosen language will be applied, depending\
    \ on the language settings of the user’s system. Additionally, we may want to\
    \ provide a language selector.\n\nSo far, we’ve developed a first version of the\
    \ category editor. This editor comes with a minimal user interface. There are\
    \ only a few elements to translate. But besides translating a page, we need to\
    \ translate the contents (categories) as well—imagine the application displayed\
    \ in a different language. So, let’s first introduce and localize the welcome\
    \ screen, which is a very simple page, and then come back to the category editor."
