    \ HTML 文件中省略该属性。\n\n你可能会问，为什么组件名称都以 `Validate` 结尾。如果我们不传入验证方法，就不会进行验证，即使我们在这里使用了\
    \ AJAX，也不会有任何值被传输到模型。我们需要么传入一个虚拟验证方法（方法体为空），要么对缺失的方法进行特殊处理。在这种情况下，我们必须省略 `validator`\
