    Although the convenience methods should need no further explanation, some information
    for the @OneToMany annotation is noteworthy. fetch = FetchType.LAZY will load
    the translation only when first accessed. EAGER will load it together with the
    category itself. Which one performs best depends on the data structure and usage.
    Imagine a big object graph, with many parts of it rarely used. In such a case,
    lazy loading would often be the better choice. In case of our categories, the
    translations are small and often used, so I prefer an eager loading (and introduced
    lazy first for didactic reasons).


    Depending on cascade, operations might be cascaded or not—for example, persisting
    a category will persist its translations or not. Here, we use CascadeType.ALL
    to cascade all operations. Other values are DETACH, MERGE, PERSIST, REFRESH, and
    REMOVE.


    In line 6 of Listing [14-26](#A435433_1_En_14_Chapter.xhtml#PC29) we use @MapKey(name
    = "_language"). This line tells JPA to use the field _language of the CategoryTranslation
    class. And to use its column name @Column(name = "ctLanguage"). If we omit the
    @MapKey annotation, JPA tries to guess the column name by adding _KEY to the uppercase
    field name. It would use _CATTRANSLATIONS_KEY, which slightly differs from the
    column name we use.


