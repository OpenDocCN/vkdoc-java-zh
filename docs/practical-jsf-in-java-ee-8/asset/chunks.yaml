    \ or create a fluent interface (such as a builder) to return itself. But here\
    \ it’s simply (mis)used to distinguish a field from a variable, which could be\
    \ better done by choosing a different name.\n\nLet’s take a look at copying a\
    \ file within a folder:\n\n```\ncopy file1 file2\n```\n\nIf you need to copy the\
    \ folder, you might use a dot:\n\n```\ncopy .\\otherFolder\n```\n\nAlthough it’s\
    \ technically possible to use the dot for a file in the current directory, you\
    \ usually won’t use\n\n```\ncopy .\\file1 .\\file2\n```\n\nor cp ./file1 ./file2\
    \ the UNIX way.\n\nThat looks strange and ugly—like this.field looks strange and\
    \ ugly to me.\n\nAnd if you’re a polyglot programmer, using C# too, you may know\
    \ that this prefix is very common in this Java sibling (both are C-like languages).\
    \ In rare cases, there might be a need to edit the source outside an IDE using\
    \ a simple editor without syntax coloring. As a side effect, the underscore is\
    \ very helpful in identifying a field in such situations.\n\nNow you know why\
    \ I’m using the underscore prefix for fields in all my projects, including this\
    \ book. But you are welcome to change it in your version of the downloaded sources.\n\
    \n# Afterword\n\nAlthough we just started with Alumni, the goal is not to describe\
    \ the whole application but interesting aspects with respect to JSF. Creating\
    \ a final class for example is similar to entering data as we did for Books. The\
    \ principle is the same, just the content is different.\n\nOf course, there might\
    \ be more JSF stuff to instruct. For example, JSF 2.2 introduced the flow scope.\
    \ [¹](#A435433_1_En_BookBackmatter_OnlinePDF_split_001.xhtml#Fn1) This kind of\
    \ scope has defined entry and exit points. It is really good if you like to define\
    \ a series of logically coupled pages like a wizard. Neither of my application\
    \ uses such a feature. They are designed in a way that the user might navigate\
    \ to any page at any time, improperly for the flow scope.\n\nInstead of focusing\
    \ on every JSF feature, this book focused on practical development by real applications.\
    \ You did not suffer every JSF detail, but you learned (I hope you did) a lot\
    \ of related Java EE technologies. These are the foundations for you to create\
    \ your own applications. I predict, enhancing your knowledge will be relatively\
    \ easily once you start developing with JSF. If you need more than we covered\
    \ within this book, please refer to the JSF and Java EE reference.\n\nI’m going\
    \ to finish this book before it gets oversized and boring. I hope you enjoyed\
    \ reading and found value in it.\n\nFollow my blog at [https://blog.mueller-bruehl.de](https://blog.mueller-bruehl.de)\
    \ . And maybe you can leave a comment there about this book.\n\nStay tuned!\n\n\
    —Michael\n\n# Index"
  trans: "\n# 附录 D：编程风格\n\n你可能已经注意到，我始终使用下划线作为字段的前缀。Oracle 建议不要使用下划线或美元符号作为变量名的开头（你可以在\
    \ [`docs.oracle.com/javase/tutorial/java/nutsandbolts/variables.html`](http://docs.oracle.com/javase/tutorial/java/nutsandbolts/variables.html)\
    \ 自行阅读该建议），尽管它指出这种做法在技术上是合法的。我的一位技术审阅者要求我严格遵守 Java 命名规范，认为这是一本面向初学者的书，应该遵循惯例。\n\
    \n但这本书并非面向编程初学者。它面向的是那些刚接触 JSF，或许也刚接触 Web 开发的、有经验的 Java 开发者。命名规范并非法律，而且，我们讨论的这个规范只是一个教程中的建议。如果你查看一下\
    \ Java 命名规范网站（[www.oracle.com/technetwork/java/codeconventions-135099.html](http://www.oracle.com/technetwork/java/codeconventions-135099.html)），你会发现它已经不再维护了：“此页面未得到积极维护……本文档的最后一次修订是在\
    \ 1999 年 4 月 20 日。”所以，它已经相当陈旧了。\n\n我使用下划线作为字段前缀是有一些原因的，我接下来会解释。我不想引发关于其优缺点的讨论。我只是想解释我为什么这样做。作为一名有经验的\
    \ Java 开发者，你应该能够将我的源代码转换成不同的风格。使用现代的 IDE，这只不过是一次小小的重命名操作。\n\n让我们回到几年前，那时所谓的*匈牙利命名法*还很流行且有用。使用这种命名法，每个变量都以它的类型作为前缀，例如\
    \ `intNumber`，这表示其底层类型是整数。这对于那些非强类型语言非常有帮助。`intNumber = 3.142` 可能是一个有效的赋值。在这种情况下，前缀应该提醒程序员只使用整数值。\n\
    \n对于拥有强类型系统的 Java 来说，没有必要使用这种匈牙利命名法。如果你声明 `int number`，编译器会拒绝 `number = 3.142`。\n\
    \n类似地，第二种前缀用于指示变量的更广泛作用域。例如，前缀 `mb_` 表示一个*成员变量*，我们称之为*字段*。毫无疑问，`mb_intNumber`\
    \ 是一个非常丑陋的变量名。所以，让我们抛弃这些过时的前缀。对于现代编程语言来说，它们是不必要的。\n\n但是属性（properties）怎么办呢？如果我们有一个字段\
    \ `number`，并且想通过 getter 为其赋一个新值呢？由于变量隐藏，你不能这样做：\n\n```\n 1                   \
    \  private int                  number;                \n                  2   \
    \                  public void                  setNumber(                  int\
    \                  number){                \n3     number = number;\n4   }\n```\n\
    \n为了区分字段和局部变量，你需要使用不同的名称。这是 C# 的方式，翻译成 Java 如下：\n\n```\n 1                   \
    \  private int                  number;                \n                  2   \
    \                  public void                  setNumber(                  int\
    \                  value){                \n3     number = value;\n4   }\n```\n\
    \n现在，方法签名中总是包含 `value`，这可能毫无意义。下一个方法：\n\n```\n 1                     private int\
    \                  fNumber;                \n                  2             \
    \        public void                  setNumber(                  int        \
    \          number){                \n3     fNumber = number;\n4   }\n```\n\n现在我们对字段和局部变量使用了不同的名称，但这使得代码更难阅读。而且根据驼峰命名法的“规则”，变量名变成了大写。让我们试试下划线：\n\
    \n```\n 1                     private int                  _number;          \
    \      \n                  2                     public void                 \
    \ setNumber(                  int                  number){                \n\
    3     _number = number;\n4   }\n```\n\n下划线比其他任何前缀都更不引人注目。字段名会像往常一样以小写形式书写。唯一的缺点是它不完全遵循完整的命名规范。\n\
    \n对于这个问题，还有另一种常见的解决方案：使用 `this`：\n\n```\n 1                     private int  \
    \                number;                \n                  2                \
    \     public void                  setNumber(                  int           \
    \       number){                \n                  3                       this\
    \                  .number = number;                \n4   }\n```\n\n在我看来，这符合命名规范，但却是对\
    \ `this` 的误用。`this` 指的是对象本身（其他语言使用 `self`）。当对象需要将自身传递给某个方法或创建流畅接口（如构建器）以返回自身时，它非常有用。但在这里，它仅仅被（误）用来区分字段和变量，而通过选择不同的名称可以更好地做到这一点。\n\
    \n让我们看看在文件夹内复制文件的操作：\n\n```\ncopy file1 file2\n```\n\n如果你需要复制文件夹，你可能会使用一个点：\n\n\
    ```\ncopy .\\otherFolder\n```\n\n尽管在技术上可以使用点来表示当前目录中的文件，但你通常不会使用\n\n```\ncopy\
    \ .\\file1 .\\file2\n```\n\n或者 UNIX 方式的 `cp ./file1 ./file2`。\n\n这看起来奇怪又丑陋——就像\
    \ `this.field` 在我看来奇怪又丑陋一样。\n\n如果你是一位多语言程序员，也使用 C#，你可能知道 `this` 前缀在 Java 的这个“兄弟”语言（两者都是类\
    \ C 语言）中非常常见。在极少数情况下，可能需要在没有语法高亮的 IDE 外部，使用简单的编辑器编辑源代码。在这种情况下，下划线作为副作用，对于识别字段非常有帮助。\n\
    \n现在你知道了为什么我在所有项目（包括本书）中都使用下划线作为字段前缀。当然，欢迎你在下载的源代码版本中更改它。\n\n# 后记\n\n虽然我们刚刚开始介绍\
    \ Alumni 应用，但目标并非描述整个应用程序，而是描述与 JSF 相关的有趣方面。例如，创建一个最终的类类似于我们为 Books 应用输入数据。原理是相同的，只是内容不同。\n\
    \n当然，可能还有更多 JSF 的内容需要讲解。例如，JSF 2.2 引入了流作用域。¹ 这种作用域有定义的入口和出口点。如果你喜欢定义一系列逻辑耦合的页面（比如向导），它非常有用。我的应用程序都没有使用这个特性。它们的设计方式允许用户随时导航到任何页面，这不适合流作用域。\n\
    \n本书没有关注每一个 JSF 特性，而是专注于通过真实应用程序进行实践开发。你没有经历每一个 JSF 细节，但你学到了（我希望你学到了）很多相关的 Java\
    \ EE 技术。这些是你创建自己应用程序的基础。我预测，一旦你开始使用 JSF 进行开发，扩展你的知识将会相对容易。如果你需要本书涵盖内容之外的更多信息，请参考\
    \ JSF 和 Java EE 参考文档。\n\n我打算在本书变得过于冗长和乏味之前结束它。我希望你喜欢阅读并从中发现价值。\n\n关注我的博客：[`blog.mueller-bruehl.de`](https://blog.mueller-bruehl.de)。也许你可以在那里留下关于这本书的评论。\n\
    \n敬请期待！\n\n——Michael\n\n# 索引\n"
