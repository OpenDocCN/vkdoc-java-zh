    借助 CDI，我们获得了一个注入到 BookEditor 中的 Conversation 实例（第 6 行）。为简单起见，我们假设这是一个全新的实例。这样的新实例运行在所谓的*临时*模式下，并将在当前请求结束时终止。到目前为止，BookEditor
