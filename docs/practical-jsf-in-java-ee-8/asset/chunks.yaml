  raw: '###### Observe the Editor


    As an exercise, add some categories: edit and delete.


    Click the Save button and observe the GlassFish console (or log). Add three categories
    named x, y, and again x. Now, for the last x, click Delete. The first x category
    will be deleted. Do you know why?


    A new category doesn’t contain a valid id. According to hashCode() and equals()
    , categories with the same text are treated as equal. _categories.remove(category);
    removes the first occurrence. Because of the same text, removing the “wrong” entry
    doesn’t really matter. But if we’d built the hashCode and equals method relying
    on the id only, then deleting any entry without a valid id would remove the first
    entry without a valid id, even though the text might differ.


    ## Summary


    The development of Books started with the general layout of the application. Because
    lots of Java developers are more familiar with desktop applications, this app
    starts with a “desktop first” approach rather than the currently popular “mobile
    first.” We considered responsive design and noted that CSS is the first choice
    in technology to apply those styles. This chapter showed CSS’s elementary usage
    in the application.


    We developed our first dialog. Mocking away the database access, we could concentrate
    on the UI and introduced the first repeating structure to create an editable table.


    In the next chapter, we’ll persist this data.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_12](#A435433_1_En_12_Chapter.xhtml)


    # 12. Java Persistence API


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    The data for the Books application is homogeneous, which means the overall structure
    is the same for every category, book, review, or piece of linking information.
    The classic storage method for such data (and usually the best choice) is a SQL
    database system.


    If you’re a Java SE developer and have accessed SQL DBs so far, you might have
    used Java Database Connectivity (JDBC) . JDBC is an abstraction for SQL statements.
    The database is queried and returns a result set, which is transformed to lists,
    objects, and other things by your program. The responsibility for the transformation
    of persistent data to objects falls to the developer. And it’s a repetitive, sometimes
    boring, job just to overcome the gap between relational data and objects.


    If it’s possible to define mapping rules, from relations to objects and vice versa,
    that job might be done by a piece of software. And that’s exactly what an *object
    relational mapper* (ORM) is for. Several JPA-compatible ORMs are available. In
    the world of Java EE, the ORM is defined by the Java Persistence API (JPA).


    ###### Note


    The current version of JPA as part of Java EE 8 is 2.2\. As a maintenance release
    of JPA 2.1, it’s still defined by JSR 338 (read more about it at [https://jcp.org/en/jsr/detail?id=338](https://jcp.org/en/jsr/detail%3Fid=338)
    ). In other words, there is no dedicated JSR for version 2.2.


    ## Entities


    If you’re familiar with SQL, you probably know that a database stores entities.
    An *entity* is a unit of information, or simply, a thing. Mostly, an entity is
    represented by the columns of a table. The relations between entities are modeled
    by an entity–relationship model.


    JPA also uses the term *entity* for a unit of information—in this case, a Java
    object. You may annotate a class as @Entity, but a Java object might be complex.
    Besides simple properties , such an object may contain collections or embedded
    other objects. For example, if your Java object models a car, then this entity
    may contain a list of seat objects. As you might imagine, such complex objects
    can’t be stored in a single table. A single Java object may be stored in a couple
    of different tables. A SQL entity is usually stored in a single table, whereas
    a JPA entity might become more complex.


    Technically, a JPA entity is a *plain old Java object* (POJO) that is mapped to
    one or more SQL table(s). To start defining this mapping, we pick one of the simplest
    structures of Books: the category. At first approach, ignoring different languages,
    a category consists of an id and a text.


    We’ve already created the Category class. To map this POJO to the database via
    JPA, it simply has to be annotated with @Entity. But here are two more important
    facts: an entity should implement Serializable, and declaring an id is essential.
    Usually this id refers to the primary key of the database table:


    ```

    1   @Entity

    2   public class Category implements Serializable{

    3     @Id

    4     private int id;

    5     private String name;


    7     [getters and setters omitted for brevity]

    8   }

    ```


    By default, an entity is mapped to a table with the table name equal to the uppercase
    class name and column names equal to the upercase attribute names. Because JPA
    uses *reflection* to convey database values into the objects, it can access private
    fields (attributes). If you let JPA create your table, you would recognize these
    uppercase names.


    ###### Note


    The term *attribute* is used for many different things, depending on context.
    In the terminology of object-oriented software design, an attribute is an *instance
    variable*. Sometimes it’s called a *field*, or, if used in conjunction with getters
    and setters, a *property*.


    If you define the database table on your own, you might prefer so-called camelcase
    names over uppercase names, or you may prefer names that differ from the ones
    you used in your Java class. For example, many DB admins prefer column names that
    contain a prefix, like catId and catName (those are in camelcase, by the way).
    I usually prefix Java attributes with an underscore, a convention in C#. Just
    make sure there’s a difference between the attribute name and the column name.


    If for some reason the aforementioned default mapping doesn’t fit, it’s possible
    to add annotations to map table and column names.


    Often, the primary key of the table is just a meaningless unique number generated
    by the database. JPA supports such a generation strategy. Here we need a special
    annotation too. Listing [12-1](#A435433_1_En_12_Chapter.xhtml#PC2) shows an excerpt
    of the class enriched with such annotations.


    ###### Listing 12-1 Entity with Column Mapping


    ```

     1   @Entity

     2   @Table(name = "Category")

     3   public class Category implements Serializable{

     4     @Id

     5     @GeneratedValue(strategy = GenerationType.IDENTITY)

     6     @Column(name = "Id")

     7     private int _id;


     9     @Column(name = "Name")

    10     private String _name;


    12     [getters and setters omitted for brevity]

    13   }

    ```


    In the listing, all attributes are annotated with @Column. I recommended annotating
    all the columns or none, but this isn’t crucial. You can mix annotated and non-annotated
    attributes within one class. In that case, all non-annotated attributes will match
    their uppercase names. Every attribute refers to a column within the table. If
    you need an attribute that shouldn’t be mapped to a column, the attribute must
    be annotated with @Transient.


    ###### Table-Specific Prefixes


    Some developers and/or DB admins prefer to add a table-specific prefix to every
    column name to reduce the need for aliases. Consider the following examples with
    and without a prefix:


    ```

    SELECT * FROM book b JOIN category c on b.CategoryId = c.CategoryId

    SELECT * FROM book JOIN category on bookCategoryId = catId

    ```


    Using the @Column annotation, both approaches might be used.


    Instead of annotating attributes, you can annotate the getter/setter pairs. You
    have to decide to either annotate the attributes or the getter/setter pairs. You
    can’t mix it. Consider the example in Listing [12-2](#A435433_1_En_12_Chapter.xhtml#PC4).'
