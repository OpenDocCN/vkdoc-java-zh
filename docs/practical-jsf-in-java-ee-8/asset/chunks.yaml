    logout.


    ## Programmatic Login


    I think this programmatic login I just mentioned is much more interesting. It
    lets us create our own form. The login is done within its backing bean. Let’s
    try it (Listing [32-10](#A435433_1_En_32_Chapter.xhtml#PC12)).


    ###### Listing 32-10 JSF Form for Programmatic Login


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0

     3       Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.d\

     4   td">

     5   <html xmlns:="http://www.w3.org/1999/xhtml"

     6         xmlns:h="http://xmlns.jcp.org/jsf/html">

     7       <h:head>

     8           <title>Login</title>

     9       </h:head>

    10       <h:body>

    11           <h:form>

    12               <div>

    13                   <h:outputLabel for="userName" value="User"/>

    14                   <h:inputText id="userName" value="#{login.userName}"

    15                                required="true"

    16                                requiredMessage="Please enter username"/>

    17               </div>

    18               <div>

    19                   <h:outputLabel for="password" value="Password"/>

    20                   <h:inputSecret id="password" value="#{login.password}"

    21                                  required="true"

    22                                  requiredMessage="Please enter password"/>

    23               </div>

    24               <div>

    25                   <h:commandButton action="#{login.login}" value="Login"/>

    26               </div>

    27           </h:form>

    28       </h:body>

    29   </html>

    ```


    Listing [32-10](#A435433_1_En_32_Chapter.xhtml#PC12) shows a fully fledged JSF
    page, and it’s up to you to design it as you like. Username and password fields
    are mandatory now, guaranteed by the use of the `required` property, and are stored
    into two properties of the backing bean. If the user clicks the Login button,
    the `login` action is performed. For this kind of login, no change to `web.xml`
    is necessary. See Listing [32-11](#A435433_1_En_32_Chapter.xhtml#PC13).


    ###### Listing 32-11 Login Method for Programmatic Login


    ```

     1   public String login() {

     2       FacesContext context = FacesContext.getCurrentInstance();

     3       HttpServletRequest request = (HttpServletRequest) context

     4                                                  .getExternalContext().getRequest();


     6       try {

     7           request.login(_userName, _password);

     8       } catch (ServletException e) {

     9           context.addMessage(null, new FacesMessage("Login failed."));

    10           return "/public/loginError";

    11       }

    12       return "/member/index";

    13   }

    ```


    First, you have to obtain the `HttpServletRequest` and then delegate the login
    by calling its `login` method. Quite simple, isn’t it? If the login fails, a `ServletException`
    exception is thrown. I simply created a `FacesMessage`, which will be displayed
    in the user’s browser. Instead of returning `/public/loginError`, it’s possible
    to return an empty string. Doing so, the login form will be redisplayed with the
    failure message (don’t forget to add a message tag to this page). Although this
    method doesn’t care about the `<form-error-page>` tag of `web.xml`, you can’t
    omit this tag. It’s still required, but its content doesn’t care.


    You may have recognized one important difference compared to the so-called form-based
    login: as before, the login page is displayed when you try to navigate to a protected
    page. Using form login, the page you tried to navigate to is called. Using the
    programmatic login, the page that’s returned by the `login` method is the target
    of our navigation. So, we can force the user to a specific entry page. Usually
    that’s what we want to do. To keep the behavior of the form-based login, we need
    to store the target page before opening the login dialog and call it on successful
    login.


    ### Programmatic Logout


    As mentioned earlier, to change the user, we need to log out first. We do that
    by calling the `logout` method of the servlet request, as shown in Listing [32-12](#A435433_1_En_32_Chapter.xhtml#PC14).


    ###### Listing 32-12 Logout Method for Programmatic Logout


    ```

     1   public void logout() {

     2       FacesContext context = FacesContext.getCurrentInstance();

     3       HttpServletRequest request = (HttpServletRequest) context

     4                                                .getExternalContext().getRequest();

     5       try {

     6           request.logout();

     7       } catch (ServletException e) {

     8           context.addMessage(null, new FacesMessage("Logout failed."));

     9       }

    10   }

    ```


    You only need to place a command link to this method somewhere on the page, as
    in Listing [32-13](#A435433_1_En_32_Chapter.xhtml#PC15).


    ###### Listing 32-13 Call Logout Method


    ```

    1   <h:commandLink action="#{login.logout}" value="Logout"/>

    ```


