    # Java EE 8 中的实用 JSF


    ## 企业级 Java Web 应用程序


    ![A435433_1_En_BookFrontmatter_Figa_HTML.png](img/A435433_1_En_BookFrontmatter_Figa_HTML.png)


    Michael Müller


    德国，北莱茵-威斯特法伦州，布吕尔


