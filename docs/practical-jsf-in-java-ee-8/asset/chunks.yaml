- fmt: '###### Listing 4-1 Java Equivalent to EL `invoice.customer.street`


    ```

    1    Invoice invoice = ...;

    2    ...

    3    String street = invoice.getCustomer().getStreet();

    4    ...

    5    invoice.getCustomer().setStreet(newValue);

    ```


    For a method expression, parentheses might be used `#{tinyCalculator.add()}` or
    omitted, as shown earlier. If the method called by EL has parameters, you need
    to add the parentheses.


    ## Value Expression


    So far, we’ve discussed a very common form of a value expression—to get or set
    values.


    To retrieve values, a value expression is an expression that delivers a value
    as its result. It’s possible to calculate this value, and the result might be
    of any type. In this section, we’ll dig into this a little.


    ### Operators


    The EL offers a couple of operators that are well known to you as a Java developer.
    I won’t explain them, I’ll just list them. As a specific feature, some operators
    may be noted as short textual abbreviations, to avoid conflicts that might occur
    by using characters that might be escaped within HTML. This alternate notation
    is listed within square brackets:


    *   `+`, `-`, `*`, `/` [`div`], `%` [`mod`]

    *   `<` [`lt`], `<=` [`le`], `==` [`eq`], `>=` [`ge`], `>` [`gt`], `!=` [`ne`]

    *   `&&` [`and`], `||` [`or`], `!` [`not`]

    *   `cond ? expr1 : expr2`

    *   `instanceof`, `empty` (test for empty string, collection, map, and so on)

    *   `+=` (string concatenation)

    *   `=` (assignment), `;` (semicolon), `()` (parentheses)

    *   Lambdas and streams


    Lambdas and streams are available in Java SE 8, but in EL 3.0 running on Java
    7, you can use them with the same syntax. As discussed later, this cool feature
    is useful for a couple of tasks.


    A simple `+` is just an arithmetic operator, whereas `+=` is a string concatenation.
    To demonstrate, let’s misuse the `TinyCalculator` result variable (remember, a
    `double`). Because EL is independent from JSF components, it is possible to insert
    EL expressions anywhere in a page. Insert them, without the line numbers, just
    before the `</h:form>` tag, as shown in Listing [4-2](#A435433_1_En_4_Chapter.xhtml#PC2),
    and run the application.


    ###### Listing 4-2 EL Demonstration


    ```

    1   <br/>

    2   #{tinyCalculator.result = 10}

    3   <br/>

    4   #{tinyCalculator.result = tinyCalculator.result + 10}

    5   <br/>

    6   #{tinyCalculator.result}

    7   <br/>

    8   #{tinyCalculator.result = 10}

    9   <br/>

    10  #{tinyCalculator.result += 10}

    11  <br/>

    12  #{tinyCalculator.result}

    ```


    Here’s a little explanation of Listing [4-2](#A435433_1_En_4_Chapter.xhtml#PC2):


    *   *Line 1*: `<br/>` is the (X)HTML tag for a line break. Without this, all output
    would have been concatenated.

    *   *Line 2*: This is an assignment of the value `10` to the bean property `result`
    (more precisely, the `result` is assigned by the setter `setResult`). Simultaneously,
    the evaluated expression value is displayed. Because the `result` is of type `double`,
    `10.0` is displayed.

    *   *Line 4*: Adds `10` to the `result`, and displays `20.0`. The right-hand term
    calls the getter, and the left-hand side (of the equal sign) calls the appropriate
    setter.

    *   *Line 6*: Just verifies the assignment. Displays `20.0`.

    *   *Line 8*: In line 8, we reset the `result`’s value to `10` (as we did in line
    2).

    *   *Line 10*: A Java developer might assume the same result as in line 4, but
    this isn’t an arithmetic operator. It’s a string concatenation. It appends the
    `10` to the existing value and displays `10.010`.

    *   *Line 12*: Because line 10 is a string concatenation and the `result` is of
    type `double`, the result of the concatenation could not be assigned. Instead,
    JSF threw an exception. We may use the `<h:message>` tag to display the exception’s
    message. Here we concentrate on EL, not JSF tags. The result is still `10.0`.


    ### Dot and Square Bracket


    In a Java object, you may dig down to details by using dot syntax. As seen already,
    the same applies to the EL:


    ```

    1   invoice.customer.street

    ```


    Alternatively, a square bracket syntax will do the same:


    ```

    1   invoice.customer["street"]

    ```


    Square brackets are also used to access members of maps.


    ## Method Expression


    Method expressions invoke public, non-static methods. If the method has no parameters,
    the parentheses may be omitted:


    ```

    action="#{tinyCalculator.add}"

    ```


    produces the same result as


    ```

    action="#{tinyCalculator.add()}"

    ```


    Unlike older versions, you may pass parameters to method expressions.


    Depending on the component, JSF expects either a value expression or a method
    expression. For example, in an `action` attribute, JSF expects a method expression,
    so `<h:commandButton value="Divide" action="#{tinyCalculator.param1}"/>` would
    cause an error.


    ## Implicit Objects


    The base might be a bean, a variable (discussed later in this book), or an implicit
    object. An *implicit* object is managed by the container. Table [4-1](#A435433_1_En_4_Chapter.xhtml#Tab1)
    provides a short overview.


    ###### Table 4-1 Implicit Objects


    | Implicit Object | Description |

    | --- | --- |

    | `application` | Refers to the `ApplicationContext` of the `ServletContext`.
    This is different from the JSF `Application` object! |

    | `applicationScope` | A map of data stored in the application scope. For example,
    application scoped beans are stored within this map. |

    | `cc` | The top-level JSF Composite Component that is currently processed. |

    | `component` | This implicit object refers to the currently processed `UIComponent`.
    |

    | `cookie` | A map of cookies in the HTTP `set-cookie` header. |

    | `facesContext` | Provides access to the current `FacesContext`. |

    | `flash` | Provides access to the so called flash object. This is an object which
    is stored by JSF for a short time only, till the next request. |

    | `flowScope` | Similar to `applicationScope`, but for flow scope. |

    | `header` | This refers to a map of HTTP headers for the current request. |

    | `headerValues` | A map of HTTP headers for the current request. Each value is
    an array `String[]` of all values for the key. |

    | `initParam` | A map containing the init parameter of the current application.
    |

    | `param` | A map of all parameters associated with the current request. |

    | `paramValues` | As before, with each value represented as an array `String[]`
    of all values for the key. |

    | `request` | The current `ServletRequest`. |

    | `requestScope` | Similar to `applicationScope`, but for request scope. |

    | `resource` | A map of resources (`javax.faces.application.ResourceHandler`).
    |

    | `session` | The current `HttpSession`. |

    | `sessionScope` | Similar to `applicationScope`, but for session scope. |

    | `view` | The current `UIViewRoot`. |

    | `viewScope` | Similar to `applicationScope`, but for view scope. |


    ## Summary


    The Expression Language (EL) is the glue between the page (presentation) and the
    code. It consists of expressions that get or set a value (value expressions) as
    well as method calls (method expressions). Both operate on Java beans, variables,
    or implicit objects. The EL is placed within the marker `#{...}` nearly anywhere
    within a page definition. It might be used within a JSF tag as well as for the
    pure HTML part.


