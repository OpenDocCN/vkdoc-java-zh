- fmt: '# 22. JSF Lifecycle Revisited


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Let’s recall JSF’s lifecycle. There are six phases, starting with the restore
    view phase. Or, in the case of a new page, the view has to be created. Figure
    [22-1](#A435433_1_En_22_Chapter.xhtml#Fig1) should refresh your memory of the
    JSF lifecycle.


    ![A435433_1_En_22_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_22_Fig1_HTML.jpg)


    ###### Figure 22-1 JSF lifecycle


    As a main part of the view, the component tree has to be (re-)created during phase
    1. This tree is a logical representation of the UI components. HTML components
    will be derived from the component tree during the render phase (phase 6). But
    there may not be a one-to-one relationship between UI components and HTML components.


    Among other things, a JSF tag is interpreted as *tag handler* or as *UI component*.
    A tag handler is processed while creating the component tree, but it wouldn’t
    be included itself within the tree. On the other hand, UI components *will* become
    part of the component tree. And during the render phase, one component might be
    used to create a couple HTML elements.


    You may imagine tag handlers as processing instructions to build the tree, and
    UI components as processing instructions to create the output. The next chapter
    will discuss such matters using the example of repetitive structures.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_23](#A435433_1_En_23_Chapter.xhtml)


    # 23. Repetitive Structures


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    So far, we’ve used three different tags for repetitive structures:


    * `c:forEach`

    * `ui:repeat`

    * `h:dataTable`


    In this chapter we’ll discuss the differences and coverage among these.


    The first two elements are used to repeat everything between the opening and closing
    tags. As a developer, it’s up to you to choose the right structure within the
    HTML. Without a special structure, you may simply concatenate strings to a paragraph.
    Or you may nest it within a table tag and repeat the rows to render a table. Or
    you might create a list using the HTML `<ul>` or `<ol>` elements with nested items
    (`<li>`). Whatever you choose to do, you have full control.


    As its name suggests, the third element, `h:dataTable`, repeats its content within
    the predefined structure of an HTML table. This offers fewer options but a simpler
    way to create tables.


    ## Tag Handler vs. Component


    `forEach` is a tag handler, whereas the other two elements are components. Remember,
    a tag handler comes to life during the compilation of the component tree. When
    the component tree is built, JSF adds the enclosed components for each cycle of
    the loop.


    Consider the `forEach` tag handler: it’s simply an instruction for a repetitive
    processing of its child elements, as shown in Listing [23-1](#A435433_1_En_23_Chapter.xhtml#PC1).


    ###### Listing 23-1 `c:forEach` Example, Facelets Source


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </c:forEach>

    ```


    Let’s assume the friend list contains three friends: three names are displayed.
    If you examine the rendered HTML page (in Firefox, for example, you can press
    `Ctrl+U` to display the HTML source), you’ll see three `div`s with the names,
    as you might have expected, as shown in Listing [23-2](#A435433_1_En_23_Chapter.xhtml#PC2).


    ###### Listing 23-2 `c:forEach` Example, Rendered HTML


    ```

    1   <div>Sally

    2   </div>

    3   <div>Bob

    4   </div>

    5   <div>John

    6   </div>

    ```


    In Listing [23-3](#A435433_1_En_23_Chapter.xhtml#PC3) you can take a look at similar
    logic, except using `repeat` instead of `forEach`.


    ###### Listing 23-3 `ui:repeat` Example


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </ui:repeat>

    ```


    If you run this example (as part of a complete page), you’ll get the same output,
    visually and as HTML code. Where is the difference?


    Well, one observable difference is the component tree. Figure [23-1](#A435433_1_En_23_Chapter.xhtml#Fig1)
    shows the component tree for both structures. As a result of the `forEach` (tag
    handler), three `outputText`s will be inserted into the component tree. The tag
    handler itself won’t be inserted. On the other hand, `repeat` (a component) itself
    is inserted into the component tree and just one nested `outputText`. That’s two
    components as defined in the source page, and no repetition.


    The repetition takes place as recently as the render output phase is invoked.
    If we want to display three friends, the body of `forEach` will be repeated three
    times and will insert three names belonging to three `div`s. As a result, the
    HTML source of both structures will be the same.


    If you use a tag handler for your loop, the loop is iterated while building the
    component tree. If you use a component, it will show up only once within the component
    tree. Iteration takes place while interpreting the tree (rendering the page).


    ![A435433_1_En_23_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_23_Fig1_HTML.jpg)


    ###### Figure 23-1 Component tree


    Other than the component tree, there’s no observable difference in this short
    example. But it wouldn’t be hard to imagine that the different timing and different
    component tree might result in distinctly different behavior, depending on the
    complexity of the application.


    Let’s examine a slightly modified example of the `forEach` loop, as shown in Listing
    [23-4](#A435433_1_En_23_Chapter.xhtml#PC4).


    ###### Listing 23-4 `c:forEach` Example with Condition


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </c:forEach>

    ```


    The only difference is an additional test for non-empty names. Because all friends
    have names, the output is still the same.


    Next, in Listing [23-5](#A435433_1_En_23_Chapter.xhtml#PC5), we’ll modify the
    `repeat` in the same manner.


    ###### Listing 23-5 `ui:repeat` Example with Condition


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </ui:repeat>

    ```


    If you run the preceding example, no name will be displayed.


    ###### Tag Handler vs. Component Puzzler


    Run the preceding examples and think about what happened. Try to figure it out
    on your own before you continue reading. How could you modify the display condition
    to get it right?


    Because a tag handler is interpreted during the compile time (of the component
    tree), all information must be available at that time too. At compile time, a
    component is simply inserted into the tree. It’s processed during the render phase.


    Although that’s a simplified view, it’s sufficient to describe what happened:
    `forEach` and `if` are both tag handlers. While compiling the tree, the loop is
    performed and the condition is checked. So far, everything is okay. But `repeat`
    is a component, which means the loop isn’t performed until the render phase. At
    compile time, no loop is performed, no variable `friend` is known, and thus, no
    test becomes true.


    One possible solution is to use the component `panelGroup`. Using `layout="block"`
    in conjunction with any style class, this will render a `div`, if and only if
    the rendered condition becomes true. Within a component, the condition is evaluated
    during the same phase as the loop is performed. If you omit either the `layout`
    or `styleClass`, then JSF won’t insert a `div` and your browser will display all
    names on a single line. See Listing [23-6](#A435433_1_En_23_Chapter.xhtml#PC6).'
  raw: '# 22. JSF Lifecycle Revisited


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    Let’s recall JSF’s lifecycle . There are six phases, starting with the restore
    view phase. Or, in the case of a new page, the view has to be created. Figure
    [22-1](#A435433_1_En_22_Chapter.xhtml#Fig1) should refresh your memory of the
    JSF lifecycle.


    ![A435433_1_En_22_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_22_Fig1_HTML.jpg)


    ###### Figure 22-1 JSF lifecycle


    As a main part of the view, the component tree has to be (re-)created during phase
    1\. This tree is a logical representation of the UI components. HTML components
    will be derived from the component tree during the render phase (phase 6). But
    there may not be a one-to-one relationship between UI components and HTML components.


    Among other things, a JSF tag is interpreted as *tag handler* or as *UI component*.
    A tag handler is processed while creating the component tree, but it wouldn’t
    be included itself within the tree. On the other hand, UI components *will* become
    part of the component tree. And during the render phase, one component might be
    used to create a couple HTML elements.


    You may imagine tag handlers as processing instructions to build the tree, and
    UI components as processing instructions to create the output. The next chapter
    will discuss such matters using the example of repetitive structures.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_23](#A435433_1_En_23_Chapter.xhtml)


    # 23. Repetitive Structures


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    So far, we’ve used three different tags for repetitive structures :


    *   c:forEach


    *   ui:repeat


    *   h:dataTable


    In this chapter we’ll discuss the differences and coverage among these.


    The first two elements are used to repeat everything between the opening and closing
    tags. As a developer, it’s up to you to choose the right structure within the
    HTML. Without a special structure, you may simply concatenate strings to a paragraph.
    Or you may nest it within a table tag and repeat the rows to render a table. Or
    you might create a list using the HTML <ul> or <ol> elements with nested items
    (<li>). Whatever you choose to do, you have full control.


    As its name suggests, the third element, h:dataTable, repeats its content within
    the predefined structure of an HTML table. This offers fewer options but a simpler
    way to create tables.


    ## Tag Handler vs. Component


    forEach is a tag handler , whereas the other two elements are components. Remember,
    a tag handler comes to life during the compilation of the component tree. When
    the component tree is built, JSF adds the enclosed components for each cycle of
    the loop.


    Consider the forEach tag handler : it’s simply an instruction for a repetitive
    processing of its child elements, as shown in Listing [23-1](#A435433_1_En_23_Chapter.xhtml#PC1).


    ###### Listing 23-1 c:forEach Example, Facelets Source


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </c:forEach>

    ```


    Let’s assume the friend list contains three friends: three names are displayed.
    If you examine the rendered HTML page (in Firefox, for example, you can press
    Ctrl+U to display the HTML source), you’ll see three divs with the names, as you
    might have expected, as shown in Listing [23-2](#A435433_1_En_23_Chapter.xhtml#PC2).


    ###### Listing 23-2 c:forEach Example, Rendered HTML


    ```

    1   <div>Sally

    2   </div>

    3   <div>Bob

    4   </div>

    5   <div>John

    6   </div>

    ```


    In Listing [23-3](#A435433_1_En_23_Chapter.xhtml#PC3) you can take a look at similar
    logic, except using repeat instead of forEach.


    ###### Listing 23-3 ui:repeat Example


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <div>

    3       <h:outputText value="#{friend.name}"/>

    4     </div>

    5   </ui:repeat>

    ```


    If you run this example (as part of a complete page), you’ll get the same output,
    visually and as HTML code. Where is the difference?


    Well, one observable difference is the component tree. Figure [23-1](#A435433_1_En_23_Chapter.xhtml#Fig1)
    shows the component tree for both structures. As a result of the forEach (tag
    handler), three outputTexts will be inserted into the component tree. The tag
    handler itself won’t be inserted. On the other hand, repeat (a component) itself
    is inserted into the component tree and just one nested outputText. That’s two
    components as defined in the source page, and no repetition.


    The repetition takes place as recently as the render output phase is invoked.
    If we want to display three friends, the body of forEach will be repeated three
    times and will insert three names belonging to three diffs. As a result, the HTML
    source of both structures will be the same.


    If you use a tag handler for your loop, the loop is iterated while building the
    component tree. If you use a component, it will show up only once within the component
    tree. Iteration takes place while interpreting the tree (rendering the page).


    ![A435433_1_En_23_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_23_Fig1_HTML.jpg)


    ###### Figure 23-1 Component tree


    Other than the component tree , there’s no observable difference in this short
    example. But it wouldn’t be hard to imagine that the different timing and different
    component tree might result in distinctly different behavior, depending on the
    complexity of the application .


    Let’s examine a slightly modified example of the forEach loop, as shown in Listing
    [23-4](#A435433_1_En_23_Chapter.xhtml#PC4).


    ###### Listing 23-4 c:forEach Example with Condition


    ```

    1   <c:forEach items="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </c:forEach>

    ```


    The only difference is an additional test for non-empty names. Because all friends
    have names, the output is still the same.


    Next, in Listing [23-5](#A435433_1_En_23_Chapter.xhtml#PC5), we’ll modify the
    repeat in the same manner.


    ###### Listing 23-5 ui:repeat Example with Condition


    ```

    1   <ui:repeat value="#{controller.friends}" var="friend">

    2     <c:if test="#{friend.name.length() > 0}">

    3       <div>

    4         <h:outputText value="#{friend.name}"/>

    5       </div>

    6     </c:if>

    7   </ui:repeat>

    ```


    If you run the preceding example, no name will be displayed.


    ###### Tag Handler vs. Component Puzzler


    Run the preceding examples and think about what happened. Try to figure it out
    on your own before you continue reading. How could you modify the display condition
    to get it right?


    Because a tag handler is interpreted during the compile time (of the component
    tree), all information must be available at that time too. At compile time, a
    component is simply inserted into the tree. It’s processed during the render phase.


    Although that’s a simplified view, it’s sufficient to describe what happened:
    forEach and if are both tag handlers. While compiling the tree, the loop is performed
    and the condition is checked. So far, everything is okay. But repeat is a component,
    which means the loop isn’t performed until the render phase. At compile time,
    no loop is performed, no variable friend is known, and thus, no test becomes true.


    One possible solution is to use the component panelGroup. Using layout="block"
    in conjunction with any style class, this will render a div, if and only if the
    rendered condition becomes true. Within a component, the condition is evaluated
    during the same phase as the loop is performed. If you omit either the layout
    or styleClass, then JSF won’t insert a div and your browser will display all names
    on a single line. See Listing [23-6](#A435433_1_En_23_Chapter.xhtml#PC6).'
