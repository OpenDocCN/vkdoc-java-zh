    ## JSF Links


    JSF offers three different tags to create a link. How do they differ, and which
    one would be appropriate to perform this goal? Table [18-1](#A435433_1_En_18_Chapter.xhtml#Tab1)
    lists these tags .


    ###### Table 18-1 JSF Tags for Creating a Link


    | Tag Name | Description |

    | --- | --- |

    | commandLink | Renders an HTML link <a href=...> that also performs a submit.
    |

    | link | Renders an HTML link <a href=...> that can be used for bookmarkable JSF
    navigation. |

    | outputLink | Renders an HTML link <a href=...> that’s mostly used to navigate
    outside the app. |


    ### commandLink


    commandLink is the classic JSF link. Indeed, it renders an HTML link element but
    acts more like a submit element. While rendering the commandLink, JSF assigns
    a function call to the element’s onClick event. This function, located in the
    JSF JavaScript library, dynamically adds a hidden input element and performs a
    submit. This approach is transparent to the developer.


    A Submit element would perform a POST request. This is HTML standard for submitting
    forms. Thus, the commandLink needs to be nested into an <h:form> element. A POST
    request sends data for the current URI. If a commandLink is used to navigate to
    another page, the browser still displays the former URI while displaying the new
    page. With this kind of navigation, the URI displayed in the browser’s headline
    is one page behind.


    ### link


    The link tag was introduced in JSF 2.0 to enable JSF navigation using GET requests.
    A GET request is the same one you use when you enter a URI directly into your
    browser. The server sends the content of the requested page, and using the GET
    navigation, the browser displays the URI of the current page. Because of that,
    the URI becomes bookmarkable.'
