- fmt: '| Tag name | Description |

    | --- | --- |

    | `body` | Counterpart to HTML `body` tag. It also offers resource relocation,
    for example for JavaScript or CSS files. |

    | `button` | Renders an HTML `input` element of type `submit`. This is used to
    perform a navigation by an HTTP GET to the URL specified by the `outcome` attribute.
    |

    | `column` | Represents the column of a `dataTable`. The content of the column
    as well as its header are defined within suitable sub-elements. |

    | `commandButton` | Renders an HTML `input` element of type `submit`, `reset`,
    or `image`. It may perform an action and/or a navigation. |

    | `commandLink` | Renders an HTML link (`<a href=...>`) and may perform an action
    on click. |

    | `dataTable` | Renders an HTML table with as many rows as provided by the collection
    or other suitable data structure. |

    | `doctype` | Renders a doctype declaration. |

    | `form` | Renders an HTML form and adds it to the JSF component tree. When the
    form is submitted, all the JSF components within that tag will be processed. A
    couple of JSF elements, including `commandLink`, need to be nested in a JSF form
    for proper function. |

    | `graphicImage` | Renders an image that’s provided in a resource folder. |

    | `head` | Not only renders a HTML `head` element, but is used as parent element
    when using resource relocation, for example to load a script or CSS file from
    one of the resource folders. |

    | `inputFile` | Used to browse for and upload a file. |

    | `inputHidden` | Renders an HTML `input` field of type `hidden`. Like the other
    input elements, a value from a backing bean may be assigned too. |

    | `inputSecret` | Renders an HTML `input` field of type `password`. All input
    characters will be displayed as asterisks. |

    | `inputText` | Renders an HTML `input` field of type `text`. This tag is the
    workhorse for most forms. |

    | `inputTextarea` | Renders an HTML `textarea`. Like the `inputText`, this might
    be used to display and query some text. It might contain multi-line text, which
    covers a bigger area on the screen. Most modern browsers allow the user to resize
    this element. |

    | `link` | Renders an HTML link (`<a href=...>`) that can be used for bookmarkable
    navigation. |

    | `message` | Used to display the first Faces message that is queued for an (`input`)
    element to which the `message` element refers. |

    | `messages` | Able to display all messages that are not displayed by a certain
    `message` tag or that will be displayed globally. |

    | `outputFormat` | Renders an HTML `span` element to display the text bound to
    this component by the `binding` attribute or value. This element might be parameterized
    by `param` subcomponents and will be formatted by a `MessageFormat.format()` method.
    |

    | `outputLabel` | Renders an HTML `label`. It might be assigned to an input element
    through its `for` attribute. |

    | `outputLink` | Renders an HTML link (`<a href=...>`), which is mostly used to
    navigate outside the app. |

    | `outputScript` | Used to include a script file via resource relocation. |

    | `outputStylesheet` | As before, but for a CSS file. |

    | `outputText` | Renders its value as text within the page. By default, the `<`
    will be escaped as `&lt;` to prevent HTML injection. |

    | `panelGrid` | This component renders an HTML table. Its child components become
    cell content of that table. |

    | `panelGroup` | This tag is rendered as an HTML `span` element containing all
    its child elements. It can be used to place a couple of elements somewhere only
    one element is expected, for example into one cell of a table. |

    | `selectBooleanCheckbox` | Renders an HTML `input` element of type `checkbox`.
    |

    | `selectManyCheckbox` | Renders an HTML table with a set of checkboxes, either
    in one row or one column, depending on the direction of the layout. |

    | `selectManyListbox` | Renders a listbox (HTML `select` element) where the user
    may choose from multiple entries. |

    | `selectManyMenu` | Renders an HTML `select` element with a height of 1. The
    user may open it like a drop-down list and choose multiple elements. |

    | `selectOneListbox` | Renders a listbox (HTML `select` element) where the user
    may choose from one entry. |

    | `selectOneMenu` | Renders an HTML `select` element with a height of 1, which
    acts as a drop-down list to select one element. |

    | `selectOneRadio` | Renders a set of radio buttons. Like the buttons on old car
    radios, the user may choose exactly one of them. |


    #### Common Attributes


    This section describes some attributes which are widely used in many tags described
    before. Table C-4 lists these tags.


    ###### Table C-4 Attributes


    | Tag Name | Description |

    | --- | --- |

    | `disabled` | If `true` (default is `false`), the element will be rendered “grayed,”
    indicating no input or other action is possible. |

    | `id` | Provides an `id` to the element. An element may be accessed by its `id`,
    which needs to be unique within its scope. |

    | `for` | Takes the `id` of another element the element containing this attribute
    refers to. Used for labels or messages. |

    | `readonly` | The component will be rendered as usual, but input is impossible.
    |

    | `rendered` | Defines a condition to render the component. The default is `true`.
    An element without this attribute will be rendered. |

    | `styleClass` | Defines the CSS class used for this element. Renders to the HTML
    `class` attribute. |


    ### Facelet Templating Tag Library


    The Standard Facelets Templating Library is available for the Facelets UI language,
    but not JSP. I recommended preferring Facelets over JSP because lots of new features
    are only available for this view declaration language. This library is declared
    by the `http://xmlns.jcp.org/jsf/facelets` namespace and is prefixed with a default
    prefix of `ui`. Table C-5 lists these tags.


    ###### Table C-5 Facelets Tags


    | Tag Name | Description |

    | --- | --- |

    | `component` | Former version of `composition` as used for Facelets prior to
    JSF 2.0. Unlike `composition`, this can’t specify a template. |

    | `composition` | This defines a composition of elements (part of a page) that
    can be included by `include` into other pages or compositions. A composition may
    define a template where it’s used from. In such a case, navigating to the composition
    will render the whole template. All markup outside `composition` will be ignored.
    |

    | `debug` | Provides some internal information for debugging purposes, like the
    component tree. Will be invoked by pressing `Ctrl+Shift+D` by default, or another
    hotkey if defined. |

    | `decorate` | A reusable fragment of a page, similar to `composition`. Unlike
    `composition`, any markup outside this element will be used too. |

    | `define` | Defines the part of a composition that will be inserted in the Facelets
    template at the place of an `insert` tag that defines the same name you provide
    the `define` tag. |

    | `fragment` | Defines a reusable part of a page, like `component`. Unlike `component`,
    any markup outside `fragment` is recognized too. |

    | `include` | Includes the file that’s defined by the `src` attribute into the
    current Facelets view. |

    | `insert` | Inserts content into a template. (See `composition`.) |

    | `param` | Used within the `include` tag, `param` is able to pass a parameter
    (key + value) into the included composition or other appropriate tag. |

    | `remove` | Removes the included markup at compile time. Might be used for comments,
    which won’t be rendered to the client. |

    | `repeat` | Iterates over a collection. For each iteration, a copy of all of
    its child elements will be included into the component tree. Used to repeat elements
    without the need for rendering a table. If a table is needed, prefer `dataTable`.
    |'
