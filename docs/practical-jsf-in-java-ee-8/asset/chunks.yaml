- fmt: '###### Figure 12-4 NetBeans’s Graphical PU Editor


    I recommend creating DB tables on their own. This separation of concerns usually
    increases quality. The drop-and-create strategy can be especially dangerous because
    it drops and re-creates your tables during app start (although it can be interesting
    for testing). Choosing `None` won’t alter your table schema during the startup
    of your application.


    ### Data Source


    The *data source* defines the connection parameters to access the database. It’s
    specific to the application server you use, as well to the database management
    system. In the case of GlassFish 4 or 5, this information is located in the file
    `glassfish-resources.xml` in the `src/main/setup` folder, shown in Listing [12-3](#A435433_1_En_12_Chapter.xhtml#PC8).
    If you’ve chosen to create a new data source as mentioned, NetBeans would have
    created this file properly.


    ###### Listing 12-3 `glassfish-resources.xml`


    ```

     1   <?xml version="1.0" encoding="UTF-8"?>

     2   <!DOCTYPE resources PUBLIC

     3   "-//GlassFish.org//DTD GlassFish Application Server 3.1 Resource Definitions\

     4   //EN"

     5   "http://glassfish.org/dtds/glassfish-resources_1_5.dtd">

     6   <resources>

     7     <jdbc-resource enabled="true"

     8                    jndi-name="jdbc/books"

     9                    object-type="user"

    10                    pool-name="mysql_Books_booksPool"/>

    11     <jdbc-connection-pool> <!-- attributes omitted for brevity -->

    12         <property name="serverName" value="192.168.1.11"/>

    13         <property name="portNumber" value="3306"/>

    14         <property name="databaseName" value="Books"/>

    15         <property name="User" value="books"/>

    16         <property name="Password" value="top secret"/>

    17         <property name="URL" value="jdbc:mysql://192.168.1.11:3306/Books"/>

    18         <property name="driverClass" value="com.mysql.jdbc.Driver"/>

    19     </jdbc-connection-pool>

    20   </resources>

    ```


    The database connection is defined in the tag `<jdbc-connection-pool>`. The content
    is almost self-explanatory. Remember to use your connection information. Using
    MySQL, you need to provide your server name or IP address in lines 12 and 17.
    Usually this file is generated either by creating the data source using the appropriate
    wizard, or by entering the information in the `JDCB` node on the GlassFish admin
    page.


    `<jdbc-resource>` is a mapping between the data source name as used in the PU
    and the connection pool. JNDI is used for configuration in the Java EE world.
    Lines 7–10 define a JDBC resource that is looked up at runtime. This refers to
    a JDBC connection pool. Now, if we’d like to change the database connection—for
    example, to distinguish between development and production—we simply create a
    second connection pool. Switching between connections will be no more than referencing
    the other pool within the resource definition.


    ###### Note


    The applications in this book (Books and Alumni) are designed to use the MySQL
    DBMS. The MySQL community server is available at [http://dev.mysql.com/downloads/](http://dev.mysql.com/downloads/).
    JPA is almost independent from a special DBMS, so you might use the Derby Server
    that comes along with NetBeans and GlassFish. Some native queries may have to
    be adopted.


    Usually, the user the application uses should have the minimum required rights.
    Thus, it’s not recommended to let JPA create any database or table.


    Listing [12-4](#A435433_1_En_12_Chapter.xhtml#PC9) shows the SQL script to generate
    the `Category` table.


    ###### Listing 12-4 Create Database Table for `Category`


    ```

    1   CREATE TABLE Books.Category (

    2    catId INT NOT NULL AUTO_INCREMENT,

    3    catName VARCHAR(255) NOT NULL,

    4    PRIMARY KEY (catId));

    ```


    If you let MySQL create this create script for you, it will be slightly different—MySQL
    surrounds each name by backticks. This is useful when you want to use names which
    are the same as reserved words or contain white space. You can open the MySQL
    Workbench and use its table editor to define a table. When you click Apply, MySQL
    generates and displays the script to be executed for table creation. See Listing
    [12-5](#A435433_1_En_12_Chapter.xhtml#PC10).


    ###### Listing 12-5 Create Database Table for `Category` with Framed Names


    ```

    1   CREATE TABLE `Books`.`Category` (

    2    `catId` INT NOT NULL AUTO_INCREMENT,

    3    `catName` VARCHAR(255) NOT NULL,

    4    PRIMARY KEY (`catId`));

    ```


    This kind of framing names may be vendor-specific. For example, the MS SQL Server
    uses square brackets instead (`create table [Category]...`). Talking in detail
    about SQL is beyond the scope of this book. I assume you have some knowledge of
    it. If not, you might read a tutorial like [www.w3schools.com/sql](http://www.w3schools.com/sql).


    ### Entity Manager


    The EM handles actions like create, read, update, and delete (often abbreviated
    as the CRUD operations). In the web application (`transaction-type="JTA"`), an
    instance of the EM can be provided via injection by the container, as shown in
    Listing [12-6](#A435433_1_En_12_Chapter.xhtml#PC11).


    ###### Listing 12-6 Inject `EntityManager`


    ```

     1   ...

     2   @PersistenceContext(unitName = "BooksPU")

     3   private EntityManager _em;


     5   protected EntityManager getEntityManager() {

     6     return _em;

     7   }


     9   public void create(Category category) {

    10     getEntityManager().persist(category);

    11   }

    12   ...

    ```


    Besides the injection, Listing [12-5](#A435433_1_En_12_Chapter.xhtml#PC9) shows
    how to create (*persist*) an entity. The use of the EM is explained within the
    service classes for the Books application.


    ## Service Class


    The entity is nothing but our data model enriched with some JPA-specific annotations.
    We need to add some methods to create, read, update, and delete data. Since we
    don’t like to pollute the entity with such features, we create a service class
    containing the methods. Earlier you just saw an excerpt of this class.


    Before we create this class, take a look at the entity lifecycle, shown in Figure
    [12-5](#A435433_1_En_12_Chapter.xhtml#Fig5).


    ![A435433_1_En_12_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_12_Fig5_HTML.jpg)'
