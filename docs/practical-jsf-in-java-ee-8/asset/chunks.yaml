  trans: "\n###### 图 14-8 分类编辑器，翻译\n\n每个注册标签页都有一个简短的标题——例如，根据我们想要支持的语言数量，显示为 Category、en、es、fr\
    \ 等。或者，我们可能更倾向于显示一面旗帜来表示语言，而不是显示语言缩写。（我们暂时忽略一些潜在问题，比如不同的旗帜代表同一种语言。英国国旗还是星条旗代表英语？一面旗帜能否代表不同的语言，例如瑞士国旗代表德语、法语或意大利语，或者加拿大国旗代表英语或法语？）\n\
    \n好的，对于每个注册标签页，我们需要一些信息，比如标题或旗帜、URL 等。我们将把这些信息放入一个名为 Topic 的容器中。编辑器的主题将维护在一个我们称之为\
    \ Topics 的集合结构中。一个主题可能不仅仅用于分类编辑器，因此它包含的元素比这个编辑器所需的要多。根据编辑器的不同，一个主题可能只需要包含一个标题，或者键、标题和\
    \ URL，或者其他元素的组合。对于这样的容器类，有不同的解决方案——例如，一个无参构造函数和每个字段的 getter/setter，或者接受不同参数的不同构造函数。或者——这也是\
    \ Books 的构建方式——我们可以使用一个构建器类，如代码清单 14-14 所示。\n\n###### 代码清单 14-14 Topic.java\n\n\
    ```\n 1   public class Topic implements Serializable {\n\n 3     private final\
