    1   <h:form>

    2     <h:commandLink styleClass="button"

    3                    value="#{msg.btnNewBook} commandLink"

    4                    action="/admin/bookEditor.xhtml"/>

    5   </h:form>

    6   <h:link styleClass="button"

    7           value="#{msg.btnNewBook} link"

    8           outcome="/admin/bookEditor.xhtml"/>

    ```


    ###### 链接标签之间的差异：尝试并观察


    1.  启动 Books 应用程序，并通过 `commandLink` 按钮导航到书籍编辑器。


    2.  当书籍编辑器打开时，再次点击 `commandLink` 按钮。


    3.  在 NetBeans 输出窗口（GlassFish 窗口）中实时观察日志输出。


    4.  重新启动应用程序，并使用 `link` 按钮重复你的观察。


    `commandLink` 和 `link` 提供了不同的导航模型。`commandLink` 使用回发实现了更传统的 JSF 导航，而 JSF 2.0 引入的
    `link` 则通过 GET 请求实现导航。在下一节中，我们将讨论这些差异及其对对话处理的影响。


    ## POST 与 GET 导航


    在 HTML 中，你可以使用表单来收集数据。作为表单的一部分，你可以在输入字段下方放置一个按钮，将数据提交到服务器。在传统 HTML 中，这些数据通过 HTTP
    POST 请求传输到服务器。这是一个指向相同 URL 的请求，因此被称为*回发*。结果，服务器通常会发回一个确认信息，该信息显示在另一个页面上。这种导航被称为*回发导航*。在
    JSF 2.0 之前，这是 JSF 常见的导航模型。


    如果你阅读过关于 REST 的文章，你可能知道 HTTP GET 用于获取资源，而 POST 用于创建资源。你可能也读到过，由于这种回发导航，JSF 并未实现
    HTTP 的原始设计目标。如前所述，回发导航是 REST 出现之前常见的导航类型，因此它并不违反 HTTP 的原则。如果有某些布道者想告诉你别的，不要相信他们。


    尽管回发导航感觉像是一种自然的导航方式，但它有一个缺点：数据被提交到原始 URL，而响应可能显示一个全新的页面。因此，浏览器中显示的 URL 通常滞后一步。正因为如此，一些纯粹主义者认为
    JSF 不可添加书签。JSF 通常用于应用程序，那么你怎么看：应用程序是否应该在每个状态下都可添加书签？还是只针对定义明确的页面（入口点）？


    为了更新浏览器显示中的当前 URL，JSF 提供的一种策略是重定向：就在回发之后，会调用一个指向目标页面的 GET 请求。或者你也可以使用带有 `link`
    的 GET 导航。


    你观察了之前练习中浏览器的 URL 和服务器的日志吗？第一次调用 `commandLink` 按钮时，URL 并未更新为书籍编辑器的地址。这是一个典型的回发导航。当书籍编辑器首次显示时，会启动一个新的对话（如日志所示）。随后点击此按钮将刷新（重新加载）页面，但不会启动新的对话。


    但是，如果你使用 `link` 按钮，URL 会直接指向书籍编辑器。这是通过 GET 请求进行的导航。每次点击都会启动一个新的对话，因此每次点击都会创建一个新的书籍编辑器实例。在幕后，CDI
    会保留之前的实例，因为这些对话仍在运行。我们需要处理这个问题。


    ###### 注意


    使用回发导航时，JSF 会重用现有的对话。使用 GET 导航时，JSF 会创建一个新的对话。


    正如我们稍后将讨论的，在 GET 导航期间保持现有对话是可能的。

