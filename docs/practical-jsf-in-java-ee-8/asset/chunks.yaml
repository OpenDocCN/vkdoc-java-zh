    The bean is simply @SessionScoped (remember to import the proper class—this is
    a CDI scope, not the old JSF SessionScope!). Usually, this is not the best choice.
    Once instantiated, such a bean will live as long as the session lasts. On a server
    with high traffic, this approach might result in high memory consumption.


    A @SessionScoped lives for a relative long time. The server might *passivate*
    the bean to free resources and reload (activate) it when needed again. *Passivating*
    is the process of temporarily persisting the object somewhere (at the server’s
    choice, depending on the server’s implementation) by serializing the object. That’s
    why the appropriate marker interface is needed. The serialVersionUID determines
    different object versions. Here, we don’t use serialization besides passivation.
    We don’t expect to load data that’s activated by an object version other than
    passivated. So, we simply use a constant value of 1L. This prevents Java from
    calculating its own object version. (You can read the Java documentation for more
    on serialization: [http://docs.oracle.com/javase/8/docs/api/java/io/Serializable.html](http://docs.oracle.com/javase/8/docs/api/java/io/Serializable.html)
    .


    Although passivating is a strategy to reduce memory consumption, it uses additional
    IO or other resources. Thus, a scope with a shorter lifetime is usually a better
    choice. The Books application is intended for only one or a few editors and lots
    of readers. Extending the bean’s lifetime doesn’t matter here. I discuss other
    scopes later on.


    To simulate a load from a database, the category list will be created at PostConstruct
    time. The container will call such an annotated method just after creating an
    instance of the class and injecting the dependencies (if any). We could have done
    this initialization within the class constructor, but using the Java Persistence
    API (JPA—the topic of the next chapter), the appropriate service class will be
    injected *after* the class construction. Then we need to perform the database
    retrieval later, and that’s why PostConstruct is ideal.


    The double curly braces notation is an old Java idiom. Nevertheless, it’s unknown
    to many developers. It’s simply a shortcut to call the setters right after construction
    of the categories. To set properties for a newly created class, it’s preferable
    to use a special constructor that allows attributes to pass as parameters. As
    you’ll see in the JPA , there’s no need for such a constructor, and because we’re
    mocking database access, the data model doesn’t contain it either.


