    # 30. Activation Mail


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    In Alumni, once the Account is created, we send an activation mail to the user,
    which contains a link with a universally unique identifier (UUID). If the user
    follows this link, the account will be activated and become ready for use.


    ## Config Mail Properties by Code


    The sending of the email is performed by an application scoped class called the
    `Mailer`. Within this class, some hardcoded properties are collected into a map.
    In the final version, a `JavaMail` session will be our choice to retrieve the
    config from (see the next section).'
