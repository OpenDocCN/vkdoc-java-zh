  trans: "\n###### 清单 34-17 将 ChatService 作为无状态 EJB\n\n```\n1   @Stateless\n2   public\
    \ class ChatService extends AbstractService {\n3   ...\n4   }\n```\n\n与简单聊天相比，这里有三个扩展点：Alumni\
    \ 使用一个映射来保存每个教室的对等节点。每条消息都以用户名作为前缀。最后但同样重要的是，所有消息都保存到数据库中，这样我们进入教室时就能回复最新的消息。\n\
    \n清单 34-18 展示了服务中的相应部分。\n\n###### 清单 34-18 ChatService（节选）\n\n```\n 1   @Stateless\n\
    \ 2   public class ChatService extends AbstractService {\n\n 4     public ChatEntry\
    \ saveChatEntry(ChatEntry chatEntry) {\n 5       return save(chatEntry);\n 6 \
    \    }\n\n 8     public ChatEntry saveChatEntry(int finalClassId, int accountId,\
    \ String mes\\\n 9   sage) {\n10       ChatEntry chatEntry = new ChatEntry(finalClassId,\
    \ accountId, message);\n11       return save(chatEntry);\n12     }\n\n14     /**\n\
    15      * 检索最近 10 条不超过 2 小时的消息\n16      *\n17      * @param finalYearId\n18  \
    \    * @return\n19      */\n20     public List<String> getLatestMessages(int finalYearId)\
    \ {\n21       String jpql = \"Select concat(a._firstName, ' ', a._lastName, ':\
    \ ', e._me\\\n22   ssage) \"\n23               + \"from ChatEntry e \"\n24   \
    \            + \"join Account a \"\n25               + \"where e._accountId =\
    \ a._id \"\n26               + \"and e._finalYearId = :finalYearId \"\n27    \
    \           + \"and e._moment > :refMoment order by e._id desc\";\n28       TypedQuery<String>\
    \ query = getEntityManager().createQuery(jpql, String.c\\\n29   lass);       \
    \                                                   \n30       query.setParameter(\"\
    finalYearId\", finalYearId);\n31       query.setMaxResults(10);\n32       Date\
    \ refMoment = new Date(new Date().getTime() - 2 * 3600 * 1000);\n33       query.setParameter(\"\
    refMoment\", refMoment);\n34       List<String> messages = query.getResultList();\n\
    35       return Lists.reverse(messages);\n36     }\n\n38   }\n```\n\n## JSF 2.3\
    \ websocket\n\nJSF 2.3 的亮点之一，正如 Java EE 8 所引入的，是其对 WebSocket 协议的支持。以前，由于 HTTP\
    \ 协议的限制，JSF 仅使用从客户端到服务器的单向通信。多年来，在没有任何客户端请求的情况下将数据从服务器发送到客户端一直是一个挑战。WebSocket\
    \ 协议是解决这一限制的方案之一。当 `<f:websocket>` 标签被引入 JSF 2.3 时，其主要意图是将消息从服务器推送到客户端。目前，这个标签并未启用这种双向协议的全部优势。相反，它建立了从服务器到客户端的单向通信。如果我们只需要使用\
    \ JSF 功能进行双向通信，我们可以通过使用 inputText 结合 Ajax 的传统方式将数据从客户端发送到服务器。我们将通过 websocket 接收数据。由于这种变通方法仅模拟了使用不同协议的双向通信，Alumni\
    \ 的聊天并未使用新的 JSF websocket。为了向您介绍这个新标签的原理，清单 34-19 从页面开始。\n\n###### 清单 34-19 在页面中使用\
    \ websocket\n\n```\n 1        <f:websocket channel=\"events\" onmessage=\"eventListener\"\
    \ />\n\n 3        <script type=\"text/javascript\">\n 4          function eventListener(message,\
    \ channel, event) {\n 5            document.getElementById(\"lastEvent\").innerHTML\
    \ += message + \"<br/>\";\n 6          }\n 7        </script>                \
    \                                          \n\n 9        <h:outputLabel value=\"\
    Last event:\"/>\n10       <h:outputText id=\"lastEvent\" value=\"\"/>\n```\n\n\
    在第 1 行，websocket 标签订阅了通道 events。此名称必须与您在服务器端使用的通道名称一致。它可以是您选择的任何有效名称。`onmessage`\
    \ 属性引用了一个您需要为实现数据处理而编写的 JavaScript 函数。在这个简单的演示代码中，我们使用消息来替换我们在第 10 行声明的 `outputText`\
    \ 的内容。\n\n在服务器端，我们需要一个 `PushContext`，它可以直接被注入（参见清单 34-20 的第 5 行）。这里我们需要提供通道名称。现在我们可以通过这个通道向客户端发送消息（第\
    \ 8-10 行）。\n\n###### 清单 34-20 作为 websocket 源的 PushContext\n\n```\n 1  @Named\n\
    \ 2  @ApplicationScoped\n 3  public class EventPatcher {\n\n 5    @Inject @Push(channel\
    \ = \"events\")\n 6    private PushContext _pushContext;\n\n 8    public void\
    \ sendMessage(String message){\n 9      _pushContext.send(message);\n10   }\n\n\
    12 }\n```\n\n当第一个客户端使用此通道时，WebSocket 通信将被建立。发送消息就像广播一样。所有订阅了此通道的客户端都将收到该消息。通道会在应用程序关闭时自动关闭，因此\
    \ `PushContext` 需要被注入到一个应用程序作用域的 bean 中。\n\n最后但同样重要的是，您需要通过 `web.xml` 启用 WebSocket\
    \ 端点。\n\n###### 清单 34-21 作为 web.xml 一部分的上下文参数\n\n```\n 1   <context-param>\n 2\
    \     <param-name>javax.faces.ENABLE_WEBSOCKET_ENDPOINT</param-name>\n 3     <param-value>true</param-value>\n\
    \ 4   </context-param>\n```\n\n向所有用户推送一些内容是最常见的操作领域。因此，应用程序作用域是在 JSF 中使用 websocket\
    \ 的默认作用域。无论如何，您可以将通道限制为会话或视图。或者，您可以将其限制为特定用户，这也会强制使用会话作用域。（更多信息，请阅读 [`javaserverfaces.github.io/docs/2.3/vdldoc/f/websocket.html`](https://javaserverfaces.github.io/docs/2.3/vdldoc/f/websocket.html)\
    \ 的 API 文档）。\n\n如果您想实现一个新闻滚动条或类似功能，JSF websocket 标签非常棒。Alumni 没有这样的需求。请将此处给出的解释作为您自己实验的起点。\n\
    \n## 总结\n\n本章介绍了 WebSocket 协议的主要方面及其在 Alumni 中的使用。Alumni 的这个聊天实现适用于 Java EE 8，但它仅使用了早期\
    \ Java EE 7 实现中可用的技术。\n\n作为 Java EE 8 一部分的 JSF 2.3 现在直接支持 WebSocket 协议，但 Alumni\
    \ 并未使用它。当前 JSF WebSocket 实现的主要意图是将消息从服务器推送到客户端。这增加了从服务器到客户端的单向通信。另一方面，Alumni 使用双向通信。\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_35`\n\
    \n# 35. 更改外观与感觉\n\nMichael Müller^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\n有时用户喜欢更换应用程序的外观与感觉，例如通过选择不同的主题。问题来了，我们如何在不更改程序代码的情况下更改应用程序的外观与感觉？如果我们使用\
    \ CSS 将内容与布局分离，那么选择不同的 CSS 文件似乎就很简单了。\n\n## 资源库\n\n在实践中，布局可能不仅依赖于单个 CSS 文件，还依赖于多个\
    \ CSS 文件以及相关的脚本文件或其他资源。让我们回顾一下第 10 章：JSF 能够将一组资源分组到一个库中。实际上，这样的库由一个文件夹的内容表示。如果我们为每个库使用相同的目录结构，我们就不需要为所有资源文件提供不同的名称，只需要提供库名称即可。\n\
    \n在 Facelet 模板 `alumniTemplate.xhtml` 中，我们将从后台 bean 中获取适当的库，如清单 35-1 所示。\n"
- fmt: "###### Listing 35-1 Get Library from Backing Bean\n\n```\n01     <h:outputStylesheet\
    \ library=\"#{sessionTools.theme}\" name=\"css/alumni.css\"/>\n02     <h:outputScript\
    \ library=\"#{sessionTools.theme}\" name=\"script/alumni.js\"/>\n```\n\nThis backing\
    \ bean is used to hold user-specific information as long as the session lasts.\
    \ Thus it is session scoped. See Listing [35-2](#A435433_1_En_35_Chapter.xhtml#PC2).\n\
    \n###### Listing 35-2 SessionTools\n\n```\n01   @Named\n02   @SessionScoped\n\
    03   public class SessionTools implements Serializable {\n\n05     private String\
    \ _theme = \"standard\";\n\n07     public String getTheme() {\n08       return\
    \ _theme;\n09     }\n\n11     public void setTheme(String theme) {\n12       _theme\
    \ = theme;\n13     }\n\n15     ...\n\n17   }\n```\n\nWhen the user logs in, we\
    \ need to read the theme from the appropriate user configuration and set the theme\
    \ within the backing bean. That’s it.\n\n## Immediately Change the Look and Feel\n\
    \nInstead of asking a user in a configuration dialog, we may want to enable them\
    \ to change the look and feel immediately. As a first approach, we’ll present\
    \ two buttons on the screen representing two different themes. If the user clicks\
    \ a button, we want the look and feel to change instantly.\n\nThe solution is\
    \ quite easy, too. All we need is to set the theme and then to reload the page.\
    \ If an action of a `commandLink` or `commandButton` returns an empty string or\
    \ nothing (`null` or `void`), then JSF reloads the same page. To perform this\
    \ task, we use setter of the theme as action of the link. See Listing [35-3](#A435433_1_En_35_Chapter.xhtml#PC3).\n\
    \n###### Listing 35-3 Buttons to Switch Theme\n\n```\n01    <h:commandLink styleClass=\"\
    button\"\n02                           immediate=\"true\"\n03                \
    \           value=\"standard\"\n04                           action=\"#{sessionTools.setTheme('standard')}\"\
    />\n05    <h:commandLink styleClass=\"button\"\n06                           immediate=\"\
    true\"\n07                           value=\"muellerbruehl\"\n08             \
    \              action=\"#{sessionTools.setTheme('muellerbruehl')}\"/>\n```\n\n\
    ## Read from Resources\n\nIncreasing the number of buttons in conformity with\
    \ the number of themes will create an ugly page. A more elegant solution can be\
    \ achieved by a menu, where the user chooses one of multiple entries. And if we\
    \ add a theme, then the system should automatically recognize it. For this task,\
    \ we need to examine the resources. For simplicity’s sake, we’ll assume that every\
    \ folder within the resources directory containing a CSS file is a resource library.\
    \ We’ll ignore possible versions below that folder.\n\nThe method `getThemes`\
    \ returns a list of strings with all the library folders we've found, as shown\
    \ in Listing [35-4](#A435433_1_En_35_Chapter.xhtml#PC4).\n\n###### Listing 35-4\
    \ Retrieve Themes from Resources\n\n```\n01     public List<String> getThemes()\
    \ throws IOException {\n02       String resourcePath = obtainResourcePath();\n\
    03       List<String> themes = obtainThemes(resourcePath);\n04       return themes;\n\
    05     }\n\n07     private String obtainResourcePath() {\n08       ServletContext\
    \ context = (ServletContext) FacesContext\n09               .getCurrentInstance()\n\
    10               .getExternalContext()\n11               .getContext();\n12  \
    \     return context.getRealPath(\"/resources\");\n13     }\n\n15     private\
    \ List<String> obtainThemes(String resourcePath){\n16       List<String> themes\
    \ = new ArrayList<>();\n17       for (File file : new File(resourcePath).listFiles())\
    \ {\n18         addFilenameIfContainsCss(file, themes);\n19       }\n20      \
    \ return themes;\n21     }\n\n23     private void addFilenameIfContainsCss(File\
    \ file, List<String> themes) {\n24       if (!file.isDirectory()) {\n25      \
    \   return;\n26       }\n27       try (Stream<Path> paths = Files.walk(Paths.get(file.getAbsolutePath())))\
    \ {\n28         boolean conatinsCss = paths\n29                 .filter(Files::isRegularFile)\n\
    30                 .anyMatch(f -> f.toString().toLowerCase().endsWith(\".css\"\
    ));\n31         if (conatinsCss) {\n32           themes.add(file.getName());\n\
    33         }\n34       } catch (IOException ex) {\n35         LOGGER.log(Level.SEVERE,\
    \ null, ex);\n36       }\n37     } \n```\n\nFigure [35-1](#A435433_1_En_35_Chapter.xhtml#Fig1)\
    \ shows an excerpt of the project tree. You’ll find a file `alumni.css` for each\
    \ theme (`muellerbruehl` and `standard` are themes too, but the tree is collapsed\
    \ here).\n\n![A435433_1_En_35_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_35_Fig1_HTML.jpg)\n\
    \n###### Figure 35-1 Resource files for different themes\n\nBecause we don’t know\
    \ where the application resides when it’s deployed, we need to figure out the\
    \ right path. Resources reside in the `\\resources` path. Although it looks like\
    \ an absolute path from the application’s view, it’s really a relative path. We\
    \ need to figure out its parent.\n\nThe interesting part of Listing [35-4](#A435433_1_En_35_Chapter.xhtml#PC4)\
    \ is the `obtainResourcePath` method (lines 7–13). Here we’ll retrieve the `ServletContext`.\
    \ We can use it to determine a real path. There are many situations in which it’s\
    \ needed to search the resources.\n\nIn another project, I needed to create reports.\
    \ Instead of creating report files from scratch, I added template files that would\
    \ be completed at runtime. I deployed these files in a resources folder and used\
    \ the same logic discussed here to retrieve the files’ location.\n\nThe rest of\
    \ Listing [35-4](#A435433_1_En_35_Chapter.xhtml#PC4) is simple Java code, searching\
    \ this path for CSS files. If you’re not familiar with streams, allow me to recommend\
    \ my book *Java Lambdas and Parallel Streams* (Apress, 2016) as a good source\
    \ of information.\n\nOnce we figure out the themes, we need to present them to\
    \ the user in a `selectOneMenu`, as shown in Listing [35-5](#A435433_1_En_35_Chapter.xhtml#PC5).\n\
    \n###### Listing 35-5 Select Theme (Incomplete)\n\n```\n01  <h:form id=\"theme\"\
    >\n02    <h:selectOneMenu value=\"#{sessionTools.theme}\">\n03      <f:selectItems\
    \ value=\"#{sessionTools.themes}\"/>\n04      <f:ajax/>\n05    </h:selectOneMenu>\n\
    06  </h:form>\n```\n\nThe preceding listing uses the getter/setter pair we created\
    \ before. If the user chooses a theme, it will be updated instantly within the\
    \ backing bean. During the next navigation, JSF will apply the new theme.\n\n\
    But how can we apply the theme immediately? Okay, we can add information to render\
    \ all: `<f:ajax render=\"@all\"/>`.\n\nNow when the user chooses a different theme,\
    \ the layout seems to change. But it’s not the layout as expected. Only by reloading\
    \ the page is the expected layout shown. It seems as if `@all` doesn’t really\
    \ load everything we need.\n\nWhat if we apply a listener method and add programmatic\
    \ navigation, as in Listing [35-6](#A435433_1_En_35_Chapter.xhtml#PC6)?\n\n######\
    \ Listing 35-6 Programmatic Navigation\n\n```\n01  public void themeChangeListener(AjaxBehaviorEvent\
    \ event) {\n02    FacesContext facesContext = FacesContext.getCurrentInstance();\n\
    03    NavigationHandler navigationHandler = facesContext\n04            .getApplication()\n\
    05            .getNavigationHandler();\n06    navigationHandler.handleNavigation(facesContext,\
    \ null, \"\");\n07  }\n```\n\nIn line 6, the third parameter denotes the target\
    \ page. We’ll leave it blank for reloading the current page.\n\nDon’t try it.\
    \ You might use such a fragment for navigation on a request, but not during a\
    \ partial request. A *partial* request only queries some info to update the current\
    \ page.\n\nThe `selectOneMenu` isn’t intended to trigger any navigation. Some\
    \ additional libraries—for example, PrimeFaces ( [www.primefaces.org](http://www.primefaces.org)\
    \ )—contain extensions for this use case. But, there may be a simple solution\
    \ to this problem: when the user has chosen a new theme, we need to trigger a\
    \ page navigation by clicking a `commandLink`. We use an invisible link and some\
    \ JavaScript voodoo to perform this task, as you can see in Listing [35-7](#A435433_1_En_35_Chapter.xhtml#PC7)."
