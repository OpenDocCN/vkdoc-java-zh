    # 7. 使用 Selenium 进行测试


    Michael Müller^(1 )


    (1)德国北莱茵-威斯特法伦州布吕尔


    本书专注于 Web 开发，而非*测试驱动开发*（TDD）。当然，无论你是遵循 TDD 范式，还是在编写生产代码之后才编写单元测试，为每种应用程序编写测试都是良好的实践。但如果为本书中描述的每一段代码都添加测试，本书的篇幅可能会翻倍。市面上已有关于单元测试的优秀书籍，我也会在本书中介绍一些工具，但无法涵盖过多的单元测试内容。


    使用 Java 和 JSF 开发 Web 应用程序时，你会遇到一些与 Java SE 应用程序不同的陌生问题：用户界面（UI）由第三方软件（浏览器）呈现。而且，大部分业务逻辑和持久化操作由容器管理。因此，我们有一些额外的环境需要在部分测试中加以考虑。


    第一个问题，即浏览器中的 UI 呈现，由 Selenium 来解决。


    ## Selenium 概述


    什么是 Selenium？查看 Selenium 网站（[`docs.selenium.org`](http://docs.selenium.org)）可以得到这样的答案：“*Selenium
    自动化浏览器。* 就这么简单！你用这种能力做什么完全取决于你自己。它主要用于自动化 Web 应用程序以进行测试，但当然不仅限于此。枯燥的基于 Web 的管理任务也可以（并且应该！）被自动化。”


    Selenium 有两个版本可用：


    *   Selenium IDE

    *   Selenium WebDriver


    Selenium IDE 带有一个宏记录器。你可以开始录制，调用一个网页，执行一些操作，停止录制，然后一遍又一遍地重放这些操作。这对于登录应用程序并导航到感兴趣的页面可能很有用。然后，你可以手动执行测试新功能的步骤。或者，你可以定义一个在“无限”循环中重复的工作，以执行压力测试。


    Selenium WebDriver 是一个可以在 Java 程序中使用的驱动程序。流行的 Web 浏览器都有对应的驱动程序。借助这个驱动程序的功能，可以通过自编写的应用程序来自动化浏览器。到目前为止，Selenium
    可以在像 JUnit 这样的测试框架中使用。


    使用这两个版本，都可以定义要加载哪些页面、要控制哪些 UI 组件，以及从这些组件中读取值。


    ## 准备 TinyCalculator


    在测试过程中，Selenium WebDriver 需要定位 UI 组件。这可以通过多种寻址方案来完成——例如，按名称、按类型、按 id 或按路径。寻址元素也是层叠样式表（CSS）的一个主题，我们之前尚未讨论过。由于
    HTML 元素的 id 必须是唯一的，最简单的方法（在不知道其他寻址方案的情况下）就是使用这个 id。


    JSF 会为其控制的每个元素分配一个 id。这种自动生成的 id 会像 `j_idt18` 这样丑陋。该数字取决于元素的位置，如果添加或删除元素，它就会改变。为了获得更易读且可预测的
    id，清单 7-1 通过添加 `id="..."` 为 TinyCalculator 丰富了 id。


    ###### 清单 7-1 TinyCalculator：更易读的 Id


    ```

     1   [为简洁起见，省略了表单外的所有内容]


     3   <h:form id="form">

     4       <div>

     5           <h:outputLabel value="参数 1: "/>

     6           <h:inputText id="param1" value="#{tinyCalculator.param1}"/>

     7       </div>

     8       <div>

     9           <h:outputLabel value="参数 2: "/>

    10           <h:inputText id="param2" value="#{tinyCalculator.param2}"/>

    11       </div>

    12       <div>

    13           <h:commandButton id="add" value="相加"

    14                            action="#{tinyCalculator.add}"/>

    15           <h:commandButton id="sub" value="相减"

    16                            action="#{tinyCalculator.subtract}"/>

    17           <h:commandButton id="mul" value="相乘"

    18                            action="#{tinyCalculator.multiply}"/>

    19           <h:commandButton id="div" value="相除"

    20                            action="#{tinyCalculator.divide}"/>

    21       </div>

    22       <div>

    23           <h:outputLabel value="结果: "/>

    24           <h:outputText id="result" value="#{tinyCalculator.result}"/>

    25       </div>

    26   </h:form>

    ```


    声称 id 必须是唯一的只是说对了一半。就像 Java 变量一样，其名称在其作用域内（或者，简化一点说，在一个嵌套层级内）必须是唯一的。如果我们在不同的作用域中使用相同的
    id，我们可以使用由该 id 构建的路径来获得唯一的寻址方案。


    要定位参数 1，我们可以在同一作用域内使用 `param1`。当我们开始对应用程序进行 AJAX 化（本书后面会介绍）时，这样做没问题。或者我们使用完整路径
    `form:param1`。这里，`form` 是我们分配给包含元素（表单）的 id。假设我们给一个 div 元素分配了一个 id（例如，`<div jsf:id="div1">`）。现在，如果我们有两个
    div，每个都包含一个 `id="param1"` 的元素，我们可以通过 `form:div1:param1` 和 `form:div2:param1` 来定位它们。


    使用 Selenium 测试 TinyCalculator 时，我们需要使用完整路径 `form:param1` 来定位这个元素。


    ## 创建测试


    使用 Maven 时，测试通常创建在待测试项目内，并放置在 `test` 文件夹中，该文件夹是 `src` 下 `main` 文件夹的同级目录。无需额外配置，Maven
    会在编译期间执行测试。


    Selenium 自动化浏览器。在浏览器中显示的应用程序必须同时运行。因此，我们不能使用 Maven 的标准测试调用。我们需要在应用程序运行时运行测试。一种解决方案是创建一个单独的项目来对
    TinyCalculator 运行测试。另一种方法是在编译期间排除 Selenium 测试。我们可以通过配置 Maven Surefire 插件来实现这个目标。如果我们想要执行测试，需要先启动应用程序，然后指示我们的
    IDE 运行测试。


    我们需要区分不同的测试。为了确定哪些测试应由 Maven 插件在编译期间执行，哪些测试应在运行时启动，我为 Selenium 测试创建了一个名为 `selenium`
    的包，如图 7-1 所示。


    ![A435433_1_En_7_Fig1_HTML.jpg](img/A435433_1_En_7_Fig1_HTML.jpg)


    ###### 图 7-1 TinyCalculator 的目录结构


    对于测试，我使用的是 JUnit 5。与 JUnit 4 不同，这个版本由不同的模块构建而成。因此，我们需要定义一些依赖项，如果你之前只使用过 JUnit
    4，这些依赖项可能看起来有点陌生。为了跟进项目，清单 7-2 展示了完整的 POM。我只会解释一些与 Selenium 测试相关的重要细节。如果你需要关于
    JUnit 5 的更多信息，请参考 [`junit.org/junit5/docs/current/user-guide/`](http://junit.org/junit5/docs/current/user-guide/)
    上的 JUnit 5 用户指南。

    '
