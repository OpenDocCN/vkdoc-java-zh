- fmt: "###### Previewing Scopes\n\nI discuss scopes in detail later in this book.\
    \ But to give you an initial feeling about scopes, you may perform a little task.\n\
    \n1.  Add a logger and log the construction of the `TinyCalculator` class:\n\n\
    \    ```\n    1   private static final Logger LOGGER = Logger.getLogger(\"TinyCalculator\"\
    );\n    2   public TinyCalculator() {\n    3       LOGGER.log(Level.INFO, \"ctor\
    \ TinyCalculator\");\n    4   }\n    ```\n\n2.  Launch the application and watch\
    \ the NetBeans console window.\n\n3.  Perform some calculations and then close\
    \ and reopen the browser and application.\n\n4.  Perform some more calculations.\n\
    \n5.  Now exchange the `@RequestScoped` annotation for `@SessionScoped`, and then\
    \ for `@ApplicationScoped`, and perform the same operations.\n\n6.  Observe the\
    \ different output.\n\nDid you observe the message `\"ctor TinyCalculator\"` printed\
    \ to the console (*ctor* is an abbreviation of *constructor*)? You’ll also find\
    \ the message in the log. It appeared once for every request when using the `@RequestScoped`\
    \ annotation. Using `@SessionScoped`, this message appears for a new session (such\
    \ as after closing and relaunching the browser) only. Using `@ApplicationScoped`,\
    \ the message appeared only for the first call to the bean after the app had been\
    \ launched.\n\nThe calculation methods may look quite strange. These are not functions\
    \ returning the calculated value, but methods returning a string and perform the\
    \ calculation by changing the status of the `result` variable. The simple reason\
    \ is that the calculation is called within the action of the appropriate button.\
    \ Such an action performs a page navigation. Returning an empty string or `null`\
    \ keeps the browser “staying” on the current page. In fact, this page will be\
    \ reloaded (I cover page navigation in detail later in the book). Using JSF 2.2\
    \ or later, such a function might be declared as `void`, alternatively.\n\n###\
    \ The Page\n\nI don’t want to anticipate the detailed explanation coming up in\
    \ the next chapters. I just want to point out that the page will be rendered as\
    \ HTML and sent to the browser. If you’re familiar with HTML, you would recognize\
    \ only some HTML elements. JSF’s former intention was to provide the programmer\
    \ a kind of known interface, hiding away that HTML stuff. Because of that, JSF\
    \ offers a set of its own tags, which are included in the page and are replaced\
    \ before sending the page to the browser. These tags are regular XML tags, assigned\
    \ to appropriate namespaces:\n\n```\n1   <h:outputLabel value=\"Param1: \"/>\n\
    2   <h:inputText value=\"#{tinyCalculator.param1}\"/>\n```\n\nThis is a label\
    \ with a value (text) of `\"Param1:\"` followed by a text element. The value of\
    \ the text element is retrieved from and sent back to our bean. `#{...}` denotes\
    \ the Expression Language (EL), which is used to glue parts of the user interface\
    \ to the managed bean. `tinyCalculator` refers to our bean—by default, the EL\
    \ uses the bean name with a lowercase first letter, followed by dot notation and\
    \ referring methods. In the case of properties, this establishes a two-way communication\
    \ with the getter/setter pair. `Name` refers to `getName` and `setName` (omitting\
    \ the `get` and `set` prefixes). Thus, the text element reads and writes the property:\n\
    \n```\n1   <h:commandButton value=\"Add\" action=\"#{tinyCalculator.add}\"/>\n\
    ```\n\nIn the case of the buttons, each action defines one of the calculating\
    \ methods.\n\n###### Note\n\nStarting with JSF 2.2, an alternative approach was\
    \ introduced, reducing the JSF-specific tags and using more pure HTML. This is\
    \ known as *HTML-friendly markup* or more often *HTML5-friendly markup*, even\
    \ though it is not HTML5 specific.\n\n### The Relationship Between Code and View\n\
    \nThe rough relationship between browser view, page definition, and managed bean\
    \ should be understandable from the explanation. But a picture, like Figure [1-9](#A435433_1_En_1_Chapter.xhtml#Fig9),\
    \ is worth a thousand words.\n\n![A435433_1_En_1_Fig9_HTML.jpg](OEBPS/Images/A435433_1_En_1_Fig9_HTML.jpg)\n\
    \n###### Figure 1-9 Rough relationship between code and view\n\nThe tag `<inputText\
    \ ...>` represents a text field in the browser. Its values are bound to a getter/setter\
    \ pair of the bean. When JSF renders the page, it calls the getter to retrieve\
    \ the value for the input field. And after clicking an operation button, the content\
    \ of the page is sent to the server (using an HTTP POST under the hood). JSF transfers\
    \ the data into the model (our bean) by using the setter.\n\n###### Note\n\nThe\
    \ simplified presentation shown earlier is useful for an initial understanding\
    \ of JSF, but it ignores one important fact: the component tree. When processing\
    \ a request, all JSF components are held within a tree data structure. Depending\
    \ on enhanced features of your application, it may be useful to access or manipulate\
    \ this component tree directly. I discuss the component tree in more detail later\
    \ in the book.\n\n## Summary\n\nIn this chapter we created our first small JSF\
    \ application. To provide a quick result, this application was introduced as a\
    \ step-by-step tutorial, followed by a brief discussion.\n\nThere is much more\
    \ to explain, including the configuration NetBeans built for us under the hood\
    \ and which we modified by simply changing the project’s properties. This chapter\
    \ is just an appetizer—a quick start. Beginning with the next chapter, I’ll discuss\
    \ the foundations of JSF and its related technologies.\n\n© Michael Müller 2018\n\
    \nMichael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_2](#A435433_1_En_2_Chapter.xhtml)\n\
    \n# 2. Foundations\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen, Germany\n\
    \nFor web development, a few different technologies are used. This chapter discusses\
    \ the basics of some of those and mentions other important technologies, including\
    \ the following:\n\n*   Web applications\n*   Hypertext Transfer Protocol (HTTP)\n\
    *   Hypertext Markup Language (HTML)\n*   Cascading Style Sheets (CSS)\n*   JavaScript\n\
    *   Java\n*   Maven\n*   Selenium and Arquillian\n*   Servlets\n*   Deployment\n\
    \n## Web Applications\n\nWhen I use the term *web application* in this book, I’m\
    \ going by the following definition:\n\n> *A web application is a client-server\
    \ application interacting dynamically with the user via a web browser.*\n\nThus,\
    \ we are talking about distinct parts: the client, presenting the user interface,\
    \ and the server, executing the main part of the application. The client is linked\
    \ to the server via the Internet. The application logic may be organized in layers\
    \ and split between client and server. To get a more responsive user experience,\
    \ some bits are executed on the client side. Unlike an application using a specially\
    \ programmed client, a common web browser is used to display the presentation\
    \ layer. That means we can’t manage every detail. Instead, we have to rely on\
    \ the browser’s functionality, which mainly is to retrieve and display such content\
    \ as HTML pages. An HTML page doesn’t only include text information, but images,\
    \ media files, and more. Besides the content, the browser needs to handle the\
    \ layout and, optionally, execute script code. We send all this stuff to the browser,\
    \ but we can’t control all of its behavior.\n\nA simple web server, only delivering\
    \ static pages, is not a web application for the purposes of this book. But by\
    \ using a standard web browser, a web application might be used on any platform\
    \ for which a (modern) browser is available. A web browser is connected to a web\
    \ server via HTTP. Because of that, a web application has to deal with some of\
    \ the restrictions of this protocol, as described in the next section."
