    ## 总结


    更改应用程序的外观和感觉就像更改资源库一样简单。为了立即应用这种更改，我们需要稍微欺骗一下系统。本章还向您展示了如何在运行时在应用服务器文件系统中查找文件。最后但同样重要的是，它演示了
    JSF 如何将导航能力分配给 HTML 元素。


