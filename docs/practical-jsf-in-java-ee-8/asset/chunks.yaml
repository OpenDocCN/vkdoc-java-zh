    ### 托管 Bean


    我猜想，作为一名 Java 开发者，托管 Bean 的代码是 TinyCalculator 应用程序中最让你熟悉的部分。在 JSF 中，开发者经常谈论*托管
    Bean*，NetBeans 在其新建文件对话框中也这样称呼它们。然而，这个术语其实并不准确。


    *Java Bean* 是一种可复用的软件组件。它本质上就是一个纯 Java 类，拥有无参构造器，并且其属性遵循特定的约定。*属性*是一个私有成员（字段），通过一对
    getter 和 setter 方法进行访问。这些方法遵循 `setName` 和 `getName` 的命名约定。


    从面向对象编程的抽象角度来看，对象的状态由属性（attribute）持有。*属性*是一个变量，可以拥有任何修饰符，例如 private、protected、public、static
    等。术语 *attribute* 使用广泛，几乎可以指代任何东西。尽管它是描述对象状态的正确术语，但在 Java 中经常使用其他术语（在其他语言中可能也有不同的叫法）。在本书中，我主要使用以下术语：


    *   *字段* 是一个 private（有时是 protected）的实例变量。


    *   *属性* 是通过一对 getter 和 setter 暴露出来的字段。


    JavaServer Faces 被设计为既可以在企业 Java Bean（EJB）容器中运行，也可以在 Servlet 容器中运行。两者都被称为*应用服务器*。前者包含
    Java EE 技术的完整或部分栈（除了完整平台外，还定义了一个配置文件，即 *Web 配置文件*），包括 Servlet；而后者仅提供 Servlet 服务。因此，其他
    Java EE 技术，如上下文和依赖注入（CDI），在 Servlet 容器中不可用。一些广为人知的 EJB 容器示例包括 GlassFish 和 WildFly。Servlet
    容器的示例包括 Tomcat 和 Jetty。


    如果 JSF 运行在纯 Servlet 容器上，JSF 管理所谓的*支持 Bean*。这种 Bean 会被注解为 `@ManagedBean`，这就是术语*托管
    Bean* 的起源。从 Java EE 6/JSF 2.0 开始，开发者也可以使用 CDI *命名 Bean*，这是当今推荐的技术。在 TinyCalculator
    中，我们使用了 CDI 命名 Bean。这种 Bean 通过 `@Named` 注解进行标注。当前版本 JSF 2.3 已弃用旧的 JSF 托管 Bean。如果你想使用
    CDI 托管 Bean，你需要使用像 GlassFish 这样的 EJB 容器，或者将 CDI 框架添加到 Servlet 容器中。命名 Bean 或托管
    Bean 可以通过其名称进行访问。


    第二个注解 `@RequestScoped` 声明了 Bean 的生命周期——对于来自浏览器的每个请求，都会创建该类的一个实例，并在请求结束时销毁。更长的生命周期可以通过
    `@SessionScoped`（为每个用户会话提供一个 Bean 实例）、`@ApplicationScoped`（在应用程序生命周期内提供一个实例）等来声明。我将在本书后面部分对此进行更多讨论。


    在示例中，我们使用了 CDI 命名 Bean，如代码清单 1-2 所示。


    ###### 代码清单 1-2 请求作用域 Bean 的 CDI 注解


    ```

    1   import javax.inject.Named;

    2   import javax.enterprise.context.RequestScoped;


    4   @Named

    5   @RequestScoped

    6   public class TinyCalculator {...}

    ```


    另一方面，JSF 托管 Bean 的声明方式如代码清单 1-3 所示。


    ###### 代码清单 1-3 请求作用域 Bean 的 JSF 注解（请勿使用）


    ```

    1   import javax.faces.bean.ManagedBean;

    2   import javax.faces.bean.RequestScoped;


    4   @ManagedBean

    5   @RequestScoped

    6   public class TinyCalculator {...}

    ```


    ###### 警告


    始终将命名/托管 Bean 的注解与适当的作用域注解结合使用——例如，要么都使用 JSF 注解，要么都使用 CDI 注解。特别是，命名 Bean 搭配 JSF
    作用域会导致运行时错误。


    虽然你不能在单个 Bean 中混合使用这些注解，但在一个应用程序中同时使用两种类型（命名 Bean 和托管 Bean）是可能的。这对于迁移使用了 JSF 托管
    Bean 的旧应用程序可能很有用。可以通过将新功能实现为 CDI 命名 Bean 来添加，同时保留现有的 Bean。然后，随着时间的推移，现有的 Bean
    也可以逐步更改为命名 Bean。


    但是，为什么你应该优先选择 CDI 命名 Bean 而不是 JSF 托管 Bean 呢？顾名思义，JSF 托管 Bean 是专门为 JSF 开发并仅用于 JSF
    的。


    CDI（上下文和依赖注入）对于 Java EE 来说相对较新，并已纳入 EE 6。它允许容器将合适的对象“注入”到你的对象中。这些对象在编译时可能未知，依赖关系将在运行时解析。这实现了对象的松散耦合。该解决方案的一个基本部分是通用的命名概念。


    由于 CDI 命名 Bean 可以在不同的 Java EE 技术中使用，JSF 本身也在逐步迁移到 CDI，这有时会取代专有解决方案。JSF 2.3 最终允许将
    JSF 相关对象注入到以前访问这些值非常棘手的地方。对于这个版本，向 CDI 的迁移基本完成。


    ###### 注意


    从 JSF 2.3（Java EE 8）开始，JSF 托管 Bean（`@ManagedBean`）已被弃用。


    但是，CDI 在像 Apache Tomcat 这样的纯 Servlet 容器中可用吗？不，但除非你部署 JSF 库来启用它，否则 JSF 也不可用。类似地，你可以将
    CDI 添加到 Servlet 容器：只需提供一个 CDI 实现——例如，Weld（[`repo1.maven.org/maven2/org/jboss/weld/servlet/weld-servlet/`](http://repo1.maven.org/maven2/org/jboss/weld/servlet/weld-servlet/)）。对于
    Tomcat，有一个更简单的解决方案：使用 TomEE（[`tomee.apache.org/index.html`](http://tomee.apache.org/index.html)），它是
    Tomcat 与 Java EE 技术的捆绑包，实现了 Java EE Web Profile。


    ###### Bean 钝化


    如果 Bean 的生命周期扩展到超过一个请求，服务器仍然需要管理这个对象，即使下一个请求可能需要一段时间才会发生，或者永远不会发生。后者通过会话超时来缓解。在此之前，Bean
    一直存活。在流量很大的情况下，这种内存消耗可能会引起问题。


    为了避免内存问题，或出于其他原因，根据具体实现，容器可能会*钝化*一个 Bean：将对象持久化到某个地方，例如磁盘，并在下一个请求需要时，将其恢复到内存中（*激活*）。


    要启用此功能，Bean 必须实现 *Serializable* 接口。

