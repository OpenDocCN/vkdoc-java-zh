    Alumni doesn’t use a sequential number as primary key (as Books does), but a UUID
    converted into a byte array. Because this id will never be changed for a given
    account, it’s assigned during its declaration (line 12). A second UUID is used
    to create an access key, which is used to activate the account. Both `id` and
    `accessKey` are used as salt for the password (see Chapter [28](#A435433_1_En_28_Chapter.xhtml)
    for more on salting passwords). Each is built with 16 bytes, so the total length
    of the salt is 32 bytes, which is fine for the password encryption.


    Two timestamps are used to indicate the creation time as well as the last change.
    The `lastChanged` is tagged before any update due to the `@PreUpdate` annotation.


    Lines 131–154 show the password handling. When the password is passed in, its
    hash is calculated and stored in the appropriate field. This hash will be stored
    in the database. The password has no getter; instead, `checkPassword` is used
    to verify whether the password (as provided during login) matches the hash.


    ## Summary


    Each access to the database is performed through a data façade, which offers an
    interface to a couple of methods to access a group of related data. This facade
    is used to hide the details of the data access. For different kinds of data, Alumni
    offers a couple of facades that are derived from an abstract facade.


    This chapter also showed details of the data that’s stored, updated, and deleted
    using the facade. The password is encrypted once it’s passed to the entity and
    will never be stored with its original value.


