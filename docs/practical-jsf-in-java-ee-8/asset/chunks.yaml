  trans: "\n###### 图 14-5 新建属性对话框\n\n在**键**处输入 **headWelcome**，在**值**处输入 **欢迎来到我的\
    \ IT 书评**。可选地提供一条注释。点击确定或按回车键。\n\nNetBeans 会将新属性插入到每个属性文件中——并非项目中的每个属性文件，而是资源包\
    \ messages。条目看起来像这样：headWelcome=欢迎来到我的 IT 书评。现在只需调整一个文件（德语版），可以直接在属性文件编辑器中完成：Willkommen\
    \ zu meinen IT-Rezensionen。\n\n接下来，创建一个键为 textWelcome 的属性。其值将变为包含一些换行的多行文本。例如：\n\
    \n*   浏览我评论过的书籍。获取印刷出版物的参考信息或在线评论的链接。\n\n*   请从分类中选择，或输入搜索词进行搜索。你也可以从本站发布的评论列表中选择。\n\
    \n*   为了部分抵消服务器费用，我参与了亚马逊合作伙伴计划。如果你通过封面图片的链接从亚马逊购买商品，将有助于资助本站。当然，你可以随意在任何地方购买书籍。\n\
    \n*   本站由 JavaServer Faces 技术驱动。在我的书《<a href=“ [`leanpub.com/jsf`](http://leanpub.com/jsf)\
    \ ”>使用 Java 和 JSF 进行 Web 开发</a>》以及我的博客 <a href=“ [`blog.mueller-bruehl.de/en/`](http://blog.mueller-bruehl.de/en/)\
    \ ”>[blog.mueller-bruehl.de]</a> 中了解实现细节。\n\n点击 *de – 德语* 列的相应字段，输入德语版本的欢迎文本，类似这样：\n\
    \n*   Durchstöbern Sie die Liste der von mir verfassten Buch-Rezensionen. Diese\
    \ ist mit Verweisen auf die entsprechende Publikation oder einem Online-Link versehen.\
    \ Diverse Rezensionen befinden sich gleich auf dieser WebSite.\n\n*   Wählen Sie\
    \ eine Kategorie oder geben Sie eine Suchbegriff ein, um die entsprechenden Bücher\
    \ aufzurufen. Oder wählen Sie aus der Liste der letzten Rezensionen.\n\n*   Um\
    \ einen Teil der Serverkosten zu decken, nehme ich am Amazon-Partnerprogramm teil.\
    \ Wenn Sie eines der Bücher, oder einen anderen Artikel bei Amazon bestellen möchten,\
    \ nutzen Sie einen Link von dieser Seite (Klick auf eine Buch-Abbildung). Sie\
    \ unterstützen damit den Betrieb dieser WebSite. Selbstverständlich steht Ihnen\
    \ frei, die Bücher auch von anderer Stelle zu beziehen.\n\n*   Diese WebSite ist\
    \ mit der JavaServer Faces Technologie realisiert. Erfahren Sie Details zur Implementierung\
    \ in meinem Buch <a href=“ [`leanpub.com/jsf`](http://leanpub.com/jsf) ”> “Web\
    \ Development with Java and JSF”</a> oder stöbern Sie in meinem JSF Turorial auf\
    \ meinem Blog <a href=“ [`blog.mueller-bruehl.de/en/`](http://blog.mueller-bruehl.de/en/)\
    \ ”> [blog.mueller-bruehl.de]</a>.\n\n创建好属性文件后，如何在 JSF 中使用它们呢？\n\n你需要在 WEB-INF\
    \ 文件夹中创建一个 faces-config.xml 文件（参见第一部分中的“配置文件”），如清单 14-1 所示。如果你使用 NetBeans 创建此文件，它将自动生成带有适当命名空间的文件。\n\
    \n###### 清单 14-1 faces-config.xml\n\n```\n 1   <?xml version='1.0' encoding='UTF-8'?>\n\
     2   <faces-config version=\"2.3\"\n 3                 xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\
    \n 4                 xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\n\
     5                 xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n 6                 http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_2.xsd\"\
    >\n\n 8     <application>\n 9       <locale-config>\n10         <default-locale>en</default-locale>\n\
    11         <supported-locale>de</supported-locale>\n12         <supported-locale>en</supported-locale>\n\
    13       </locale-config>\n14       <resource-bundle>\n15         <base-name>de.muellerbruehl.books.messages</base-name>\n\
    16         <var>msg</var>                                                    \
    \                                          \n17       </resource-bundle>\n18       <message-bundle>de.muellerbruehl.books.messages</message-bundle>\n\
    19     </application>\n\n21   </faces-config>\n```\n\n在 `<application>` 标签内，我们定义了要使用的不同区域设置（第\
    \ 9-14 行）。在 `<locale-config>` 中，我们可以定义默认语言以及其他语言。由于 Books 支持（至少）两种语言，我们需要在此声明英语和德语。英语（en）用作默认区域设置（第\
    \ 10 行），德语（de）定义为受支持的区域设置（第 11 行）。英语也被定义为受支持的区域设置（第 12 行）。虽然你可以使用英语而无需将其重新声明为受支持的区域设置，但此声明对于查询所有受支持的语言很有用。应用程序应支持的任何区域设置都需要在此声明。\n\
    \n接下来，我们定义一个资源包（`<resource-bundle>`，第 14 至 17 行）。这定义了我们要在页面中访问的资源。它由完整的包名和文件名定义，不带\
    \ properties 扩展名。`<var>` 定义了我们在 JSF 页面中用于引用此包的变量名。\n\n有时覆盖一些 JSF 的标准消息非常有用。我们将通过提供与\
    \ JSF 使用的键相同的本地化文本来实现这一点。`<message-bundle>`（第 18 行）声明了属性文件（不带区域设置和扩展名）。在 Books\
    \ 中，我们为所有文本使用一个文件组。因此，消息包指向相同的文件。它本可以是另一组不同的属性文件。\n\n在 web.xml（位于同一文件夹中）中，我们将欢迎文件条目更改为\
    \ `<welcome-file>welcome.xhtml</welcome-file>`。\n\n### 简单的欢迎页面实现\n\n欢迎页面应简单地显示标题和文本。与分类编辑器一样，它使用现有的模板。因此，我们必须定义一个\
    \ `<ui:composition>`。这是一个首次的简单实现，如清单 14-2 所示，输出结果如图 14-6 所示。\n\n###### 清单 14-2\
    \ welcome.xhtml 初稿\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE\
    \ html>\n 3   <ui:composition xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 5                   xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n 6                   template=\"/booksTemplate.xhtml\">\n\n 8     <ui:define\
    \ name=\"content\">\n 9       <h1>#{msg.headWelcome}</h1>\n10       <p>\n11         #{msg.textWelcome}\n\
    12       </p>\n13     </ui:define>\n\n15   </ui:composition>\n```\n\n如果你熟悉 HTML，可能能猜到问题所在：HTML\
    \ 会忽略由回车符或回车换行符造成的换行。并且嵌入的 HTML 元素（链接）不会被解释。结果，欢迎文本的格式会不正确。不过，你可以使用此页面来检查本地化。使用默认区域设置为德语的浏览器，页面将以德语显示，否则将以英语显示。\n\
    \n![A435433_1_En_14_Fig6_HTML.jpg](img/A435433_1_En_14_Fig6_HTML.jpg)\n\n######\
    \ 图 14-6 使用简单实现的欢迎页面（英文版）\n\n###### 检查其他区域设置\n\n尝试更改浏览器的语言设置。例如，在 Firefox 中选择选项\
    \ ➤ 内容 ➤ 语言。如果所需语言不存在，则添加并将其移至顶部。使用 Chrome 时，你需要先展开设置到扩展视图。将德语声明为默认语言（或者如果你的默认语言是德语，则将其设置为英语）。重新加载应用程序。语言应该会改变。\n\
    \n然后将默认语言设置为任何其他（非英语、非德语）语言并重新加载应用程序。它应该显示英文版本。\n"
- fmt: '### Use Paragraphs and `<ui:repeat>`


    Once the message bundle is set up properly, we can tackle the formatting problem.
    First, we chop down the text into single paragraphs by splitting the text into
    an array on every line break. On a Windows system, a line break is coded as CRLF,
    whereas on other systems it’s LF. So, the breaks have to be normalized first.


    Once we have an array, we can use the `<ui:repeat>` tag to iterate all elements,
    and to get the links working we need to switch off HTML escaping.


    #### HTML Escaping


    Simplified, HTML consists of text and tags. A tag is delimited by angle brackets,
    so the angle bracket has a special meaning. If someone wants to display an angle
    bracket, then, it must first be *escaped* from being a tag delimiter. To display
    `<`, you write `&lt;` (*lt* stands for less-than). The sequence `&xxx;` (where
    `xxx` is a symbolic name built of two or more characters) is called an HTML entity
    and is used to escape special characters. A character might be escaped by its
    code too. `<` is also the less-than sign.


    In a web application, often text that’s persisted to a database is displayed.
    The origin of this text might be a user input. Now, if that text is treated as
    HTML, a vicious person could insert code pointing to a malicious website or containing
    a malicious script. To prevent such injection attacks, JSF commonly escapes the
    output by default.


    The text for our welcome page doesn’t depend on any user input. It’s stored in
    a resource file. We’ll trust our own content (someone could hack the application
    server, but for our purposes here we’ll assume they don’t) and switch off HTML
    escaping, as shown in Listing [14-3](#A435433_1_En_14_Chapter.xhtml#PC3).


    ##### Listing 14-3 Refined Welcome Page


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <ui:composition xmlns:="http://www.w3.org/1999/xhtml"

     4                   xmlns:h="http://xmlns.jcp.org/jsf/html"

     5                   xmlns:ui="http://xmlns.jcp.org/jsf/facelets"

     6                   template="/booksTemplate.xhtml">


     8     <ui:define name="content">

     9       <h1>#{msg.headWelcome}</h1>

    10       <ui:repeat value="#{msg.textWelcome.replace(''\\r'', '''').split(''\\n'')}"

    11                  var="text">

    12         <p>

    13           <h:outputText value="#{text}" escape="false"/>

    14         </p>

    15       </ui:repeat>

    16     </ui:define>


    18   </ui:composition>

    ```


    The trick is to split the output text into an array that’s traversed by the `<ui:repeat...>`
    element. `<ui:repeat...>` might be used to traverse arrays, collections, or maps.


    Each element will be available in a variable named `text`. Each paragraph is surrounded
    by a paragraph tag (`<p>`).


    So far, we’ve used `<h:dataTable...>` and `<ui:repeat...>` as repeating elements.
    Later in the book, we’ll look at more repeating structures and discuss the advantages
    and pitfalls of each.


    All we need now for a pretty format is some CSS code to introduce padding above
    and below a paragraph. Because we defined links to be displayed with white color,
    and the content background is a bright one, we have to choose a dark color, as
    is done in Listing [14-4](#A435433_1_En_14_Chapter.xhtml#PC4).


    ##### Listing 14-4 Additional Formating Statements of `books.css`


    ```

    1   p {

    2     margin: 5px  0 5px  0;

    3   }


    5   p > a {

    6     color: blue;

    7   }

    ```


    ###### Note


    Run the application and check the formatting behavior. You should get a couple
    of paragraphs with a short gap in between and real links.


    ## Language Switcher


    Usually it’s adequate to choose the display language, depending on the user’s
    environment. I use a language switcher on my web site, [http://it-rezension.de](http://it-rezension.de).
    Switching the language seems to be straightforward:


    ```

    1   FacesContext.getCurrentInstance().getViewRoot()

    2               .setLocale(new  Locale(getLanguageCode()));

    ```


    Get the view root of the current `FacesContext` instance and set the locale to
    a new locale. Seems easy! But if you switch the language that way, you’ll find
    that the old language is soon restored. What happened?


    The JSF specification states that the locale has to be set with every request
    to the user’s setting. This will overwrite the language switcher. So, `#{msg.headWelcome}`
    will display the language according to the user’s setting, and not according to
    the result of the switcher. The trick I originally used for Books was to remember
    the language selection in a session scoped bean and retrieve all values with a
    utility class.


    Listing [4-5](#A435433_1_En_14_Chapter.xhtml#PC6) shows the excerpt of the page.


    ##### Listing 14-5 Insert Localized String into Web Page


    ```

    1   ...

    2   <h1>#{sessionTools.getMessage(''headWelcome'')}</h1>

    3   ...

    ```


    And Listing [14-6](#A435433_1_En_14_Chapter.xhtml#PC7) shows the relevant Java
    code.


    ##### Listing 14-6 Refer a Locale Specific String by Its Key


    ```

    1   public String getMessage(String key) {

    2     ResourceBundle messageBundle;

    3     Locale locale = new Locale(getLanguageCode());

    4     messageBundle = ResourceBundle

    5                     .getBundle("de.muellerbruehl.books.messages", locale);

    6     return messageBundle.getString(key);

    7   }

    ```


    For brevity, only the principle is shown here.


    Since JSF 2.0, it’s been possible to register listeners to System Events. I’ll
    discuss these events in detail further on. Here I’ll just show how to use it for
    a better version of the language switcher. The trick still is to remember the
    selected language in a `@SessionScoped` bean, because once the user changes the
    language, we want to remember that setting. But just before rendering the page,
    we switch to the selected language. JSF will then use the strings from the appropriate
    resource bundle. So, we simply can access the message bundle within the page definition
    via `#{msg.XXX}`.


    To do that, we need to register a listener to the `preRenderView` event, as in
    Listing [14-7](#A435433_1_En_14_Chapter.xhtml#PC8). This event occurs whenever
    the page should be rendered. A companion `preRenderComponent` event will be fired
    before rendering a single component.


    ##### Listing 14-7 Embed Listener for the Language Switcher


    ```

    1   ...

    2   <f:metadata>

    3     <f:event type="preRenderView"

    4       listener="#{sessionTools.preRenderView}"/>

    5   </f:metadata>

    6   ...

    7   <h1>#{msg.headWelcome}</h1>

    8   ...

    ```


    A listener for a system event is a method of type `void` with a parameter of type
    `ComponentSystemEvent`, as in Listing [14-8](#A435433_1_En_14_Chapter.xhtml#PC9).


    ##### Listing 14-8 SystemEvent Listener to Set the Locale Before Rendering


    ```

    1   public void preRenderView(ComponentSystemEvent event) {

    2     Locale locale = new Locale(getLanguageCode());

    3     FacesContext.getCurrentInstance().getViewRoot().setLocale(locale);

    4   }

    ```


    Last but not least, you might use the `<f:view>` tag to define the locale. This
    defines the `ViewRoot`, the root of the component tree. So, all other JSF components
    must be included within a `<f:view>`. Using Facelets as VDL, the view root is
    defined implicitly. Usually the explicit definition would only be used in conjunction
    with JSP as VDL.


    Nevertheless you can use a view root definition with Facelets. A page definition
    would be similar to Listing [14-9](#A435433_1_En_14_Chapter.xhtml#PC10).'
