- fmt: "## `jdbcRealm`\n\n我们已经通过使用 JSF 表单保护了 JSF Web 应用程序。用户信息仍然存储在纯文本文件中。但正如我所说，你的应用服务器提供了更多功能。让我们继续了解\
    \ GlassFish 的 `JDBCRealm`，它允许你将用户信息存储在数据库中。\n\n在你的应用程序中，你可以提供一个注册表单，用户在其中输入用户名、其他一些数据和密码。你可以将这些数据全部存储在一个名为\
    \ `account` 的表中。或者，你也可以将凭据存储在一个单独的表中，例如名为 `user` 的表。请根据你的应用程序需求自由地持久化数据。你可以将密码存储为明文（不推荐——仅用于测试目的），或者使用像\
    \ SHA-256 这样的知名算法进行哈希处理。容器所需要的就是访问一个包含用户名和密码在同一行中的表（或视图）。\n\n为了从你的应用程序和 `JDBCRealm`\
    \ 访问此表，你需要设置一个连接池和一个适当的 JDBC 资源。除了用户表之外，还需要第二个表来访问用户的角色。需要一个用于用户名的列，以及另一个用于组的列。一个用户可以是多个组的成员。如果一个用户被分配到一个组，你可以将此信息存储在与密码相同的表中。\n\
    \n让我们设置领域。打开 GlassFish 控制台，选择 **Configurations** ➤ **server-config** ➤ **Security**\
    \ ➤ **Realms**。参见图 [32-7](#A435433_1_En_32_Chapter.xhtml#Fig7)。\n\n![A435433_1_En_32_Fig7_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig7_HTML.jpg)\n\
    \n###### 图 32-7 GlassFish 配置\n\nGlassFish 会显示现有领域的概览。点击 **New** 创建一个新领域。**New\
    \ Realm** 对话框打开，如图 [32-8](#A435433_1_En_32_Chapter.xhtml#Fig8) 所示。\n\n![A435433_1_En_32_Fig8_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig8_HTML.jpg)\n\
    \n###### 图 32-8 GlassFish 的新建领域对话框\n\n以下是填写对话框的一些要点：\n\n*   提供一个你选择的名称。此名称将在你的\
    \ `web.xml` 配置中被引用。\n*   从 **Class Name** 下拉列表中选择 `JDBCRealm`。\n*   对于 **JAAS\
    \ Context**，输入 `jdbcRealm`。\n*   对于 **JNDI**，输入你为 JDBC 资源选择的名称。\n*   对于 **User\
    \ Table**，提供你存储凭据的表名。\n*   对于 **User Name Column**，输入你存储用户名的列名。\n*   对于 **Password\
    \ Column**，输入你存储密码的列名。\n*   对于 **Group Table**，提供你存储组信息的表名。如果一个用户只能属于一个组，并且你将组信息存储在与凭据相同的表中，请在此处输入相同的名称。\n\
    *   **Group Table User Name Column** 列提供与 **User Table** 相同的用户名，即使其列名可能不同。\n*\
    \   对于 **Group Name Column**，输入包含组名的列名。\n*   **Password Encryption Algorithm**：如前所述，你可以将密码存储为纯文本或加密形式。强烈建议你使用加密。选择你使用的算法。请记住，MD5\
    \ 或 SHA1 已知是不安全的，因此请选择例如 SHA-256 或 SHA-512。\n*   **Digest Algorithm**：提供相同的算法。\n\
    *   **Encoding**：你可以将加密后的密码存储为十六进制字符串或 base64 编码。此属性定义编码方式（`Hex` 或 `Base64`）。\n\
    *   **Charset**：选择你用于存储密码的字符集。你可以使用 `UTF-8`。\n\n点击 **OK** 保存你的配置。如果你更喜欢通过编辑配置文件来配置\
    \ GlassFish，请打开文件 `YourGlassRoot/glassfish/domains/yourDomain/config/domain.xml`。找到标签\
    \ `security-service` 并添加 `auth-realm`，如清单 [32-14](#A435433_1_En_32_Chapter.xhtml#PC16)\
    \ 所示。（注意，`[...]` 表示为了简洁而省略的文本。）此标签会出现两次，分别用于默认配置和活动配置！\n\n###### 清单 32-14 `domain.xml`（节选）\n\
    \n```\n 1   [...]\n 2   <security-service activate-default-principal-to-role-mapping=\"\
    true\">\n 3     <auth-realm classname=\"com.sun.enterprise.security.ee.auth.realm.jdbc.JDBC\\\
    \n 4   Realm\"\n 5           name=\"jdbcRealm\">\n 6       <property name=\"jaas-context\"\
    \ value=\"jdbcRealm\"></property>\n 7       <property name=\"encoding\" value=\"\
    Hex\"></property>\n 8       <property name=\"password-column\" value=\"Hash\"\
    ></property>\n 9       <property name=\"datasource-jndi\" value=\"jdbc/tutorial\"\
    ></property>\n10       <property name=\"group-table\" value=\"Group\"></property>\n\
    11       <property name=\"charset\" value=\"UTF-8\"></property>\n12       <property\
    \ name=\"user-table\" value=\"User\"></property>\n13       <property name=\"group-name-column\"\
    \ value=\"GroupName\"></property>\n14       <property name=\"digestrealm-password-enc-algorithm\"\
    \ value=\"SHA-256\">\n15       </property>\n16       <property name=\"group-table-user-name-column\"\
    \ value=\"UserName\">\n17       </property>\n18       <property name=\"digest-algorithm\"\
    \ value=\"SHA-256\"></property>\n19       <property name=\"user-name-column\"\
    \ value=\"UserName\"></property>\n20     </auth-realm>\n21   [...]\n22   </security-service>\n\
    23   [...]\n```\n\n确保在编辑此文件之前停止你的 GlassFish，并在编辑后重新启动它。\n\n一旦我们定义了领域（并将一些凭据和组存储到表中），唯一要做的就是编辑\
    \ `web.xml` 中的安全配置。你所需要做的就是更换领域。将文件替换为 `JDBCRealm`，如图 [32-9](#A435433_1_En_32_Chapter.xhtml#Fig9)\
    \ 所示。\n\n![A435433_1_En_32_Fig9_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig9_HTML.jpg)\n\
    \n###### 图 32-9 NetBeans 安全配置\n\n或者在 NetBeans 提供的 XML 视图中进行操作（其他 IDE 可能只提供 XML\
    \ 视图）：\n\n```\n1   <realm-name>JDBCRealm</realm-name>\n```\n\n就是这样。\n\n## `CustomRealm`\n\
    \n还记得安全密码的要求吗？\n\n*   我们需要一种需要一定时间计算的算法，以防止暴力破解攻击（或至少降低其成功几率）。`JDBCRealm` 允许你确定算法。\n\
    *   我们需要为每个密码添加一个盐值，以防止彩虹表攻击。`JDBCRealm` 未能满足此要求。\n\n这就是自定义领域发挥作用的地方。它使开发人员能够使用任何算法将密码保存在任何存储中。这样的自定义领域可能是特定于供应商的。清单\
    \ [32-15](#A435433_1_En_32_Chapter.xhtml#PC18) 中的领域是为 GlassFish 服务器开发的。你可以检查它是否适用于你的服务器。首先，我们需要从\
    \ `AppservRealm` 派生一个自定义领域。\n\n###### 清单 32-15 用于 Alumni 的自定义领域\n\n```\n01   public\
    \ class AlumniRealm extends AppservRealm {\n\n03     @Override\n04     public\
    \ String getAuthType() {\n05       return \"alumniRealm\";\n06     }\n\n08   \
    \ @Override\n09    public String getJAASContext() {\n10      return \"alumniRealm\"\
    ;\n11    }\n\n13    @Override\n14    public Enumeration getGroupNames(String username)\
    \ {\n15      List<String> groups = new ArrayList<>();\n16      groups.add(\"member\"\
    );\n17      groups.add(\"admin\");\n18      return Collections.enumeration(groups);\n\
    19    }\n\n21  }\n```\n\n我们需要重写三个方法。对于 `getAuthType()` 和 `getJAASContext()`，此领域简单地返回其名称。这对于在服务器配置中标识此领域是必要的。\n\
    \n`getGroupNames()` 的意图是提供解决方案的所有可能组。为了演示和简单起见，所有名称都硬编码在方法中。这对于用于特定应用程序的身份验证领域来说可能是可以的。更好的是，你可以在某些属性中定义组名，或者从数据库中获取它们。\n\
    \n接下来，我们需要一个 `LoginModule`，它需要从 `AppservPasswordLoginModule` 派生。参见清单 [32-16](#A435433_1_En_32_Chapter.xhtml#PC19)。"
  raw: '## jdbcRealm


    Okay, we’ve secured our JSF web application by using a JSF form. The user information
    is still stored in a flat text file. But as I said, your application server provides
    more. Let’s move on to GlassFish’s JDBCRealm, which allows you to store the user
    information in the database.


    In your application you may provide a registration form where the user enters
    their username, some other data, and a password. You may store this data all together
    in a table named account. Or you might store the credentials in a separate table
    called user, for example. Feel free to persist the data as it’s relevant to your
    application. You might store the password as clear text (not recommended—use only
    for testing purpose) or hashed by a well-known algorithm like SHA-256\. All the
    container needs is access to a table (or view) that contains the username and
    password in one row.


    To access this table from your application and from the JDBCRealm, you need to
    set up a connection pool and an appropriate JDBC resource. Besides the user table,
    a second one is used to access the user’s role. A column for the username is needed,
    plus a second one for the group. A user may be member in a couple of groups. If
    a user is assigned to exactly one group, you can store this information in the
    same table as the password.


    Let’s set up the realm. Open the GlassFish console and choose Configurations ➤
    server-config ➤ Security ➤ Realms. See Figure [32-7](#A435433_1_En_32_Chapter.xhtml#Fig7).


    ![A435433_1_En_32_Fig7_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig7_HTML.jpg)


    ###### Figure 32-7 GlassFish configuration


    GlassFish displays an overview of existing realms. Click New to create a new one.
    The New Realm dialog opens, as shown in Figure [32-8](#A435433_1_En_32_Chapter.xhtml#Fig8).


    ![A435433_1_En_32_Fig8_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig8_HTML.jpg)


    ###### Figure 32-8 New realm dialog of GlassFish


    Here are some pointers on filling out the dialog :


    *   Provide a name of your choice. This name will be referenced in your web.xml
    configuration.


    *   Choose JDBCRealm from the Class Name drop-down list.


    *   For JAAS Context, enter **jdbcRealm**.


    *   For JNDI, enter the name you’ve chosen for your JDBC resource.


    *   For User Table, provide the name of the table where you store the credentials.


    *   For User Name Column, enter the column name where you store the username.


    *   For Password Column, enter the column name where you store the password.


    *   For Group Table, provide the name where you store the group information. If
    a user can be in exactly one group and you store the group information in the
    same table as the credentials, enter the same name here.


    *   Group Table User Name Column column provides the same username as the User
    Table, even though its name may be different.


    *   For Group Name Column, enter the column name that contains the group name.


    *   Password Encryption Algorithm : As stated before, you can store your password
    as plain text or encrypted. It’s highly recommended that you use encryption. Choose
    the algorithm you use. Remember, MD5 or SHA1 are known to be insecure, so choose
    SHA-256 or SHA-512, for example.


    *   Digest Algorithm: Provide the same algorithm.


    *   Encoding: You can store the encrypted password as a hex string or base 64
    encoded. This property defines the encoding (Hex or Base64).


    *   Charset: Choose the charset you use to store the password. You may use UTF-8.


    Store your config by clicking OK. If you prefer to configure GlassFish by editing
    a config file, open the file YourGlassFishRoot/glassfish/domains/yourDomain/config/domain.xml.
    Locate the tag security-service and add the auth-realm, as shown in Listing [32-14](#A435433_1_En_32_Chapter.xhtml#PC16).
    (Note that [...] indicates text omitted for brevity.) This tag appears twice,
    for default and active config!


    ###### Listing 32-14 domain.xml (Excerpt)


    ```

     1   [...]

     2   <security-service activate-default-principal-to-role-mapping="true">

     3     <auth-realm classname="com.sun.enterprise.security.ee.auth.realm.jdbc.JDBC\

     4   Realm"

     5           name="jdbcRealm">

     6       <property name="jaas-context" value="jdbcRealm"></property>

     7       <property name="encoding" value="Hex"></property>

     8       <property name="password-column" value="Hash"></property>

     9       <property name="datasource-jndi" value="jdbc/tutorial"></property>

    10       <property name="group-table" value="Group"></property>

    11       <property name="charset" value="UTF-8"></property>

    12       <property name="user-table" value="User"></property>

    13       <property name="group-name-column" value="GroupName"></property>

    14       <property name="digestrealm-password-enc-algorithm" value="SHA-256">

    15       </property>

    16       <property name="group-table-user-name-column" value="UserName">

    17       </property>

    18       <property name="digest-algorithm" value="SHA-256"></property>

    19       <property name="user-name-column" value="UserName"></property>

    20     </auth-realm>

    21   [...]

    22   </security-service>

    23   [...]

    ```


    Make sure you stopped your GlassFish before editing this file and restart it afterwards.


    Once we’ve defined the realm (and stored some credentials and groups into the
    tables), the only thing to do is to edit the security configuration in web.xml.
    All you have to do is exchange the realm. Replace the file with JDBCRealm, as
    shown in Figure [32-9](#A435433_1_En_32_Chapter.xhtml#Fig9).


    ![A435433_1_En_32_Fig9_HTML.jpg](OEBPS/Images/A435433_1_En_32_Fig9_HTML.jpg)


    ###### Figure 32-9 NetBeans Security


    Or do it within the XML view NetBeans offers to you (other IDEs might offer the
    XML view only):


    ```

    1   <realm-name>JDBCRealm</realm-name>

    ```


    That’s it.


    ## Custom Realm


    Remember the requirements for secure passwords ?


    *   We need an algorithm that takes some time to calculate to protect from brute
    force attacks (or at least reduce their chance of success). JDBCRealm lets you
    determine the algorithm.


    *   We need to add a salt to every password to protect against rainbow tables.
    JDBCRealm fails on this requirement.


    Here’s where a custom realm comes into play. It enables the developer to save
    the passwords in any store with any algorithm. Such a custom realm might be vendor
    specific. The realm in Listing [32-15](#A435433_1_En_32_Chapter.xhtml#PC18) was
    developed for the GlassFish server . You can check to see whether it’s applicable
    to your server. First, we need to derive a custom realm from AppservRealm.


    ###### Listing 32-15 Custom Realm for Alumni


    ```

    01   public class AlumniRealm extends AppservRealm {


    03     @Override

    04     public String getAuthType() {

    05       return "alumniRealm";

    06     }


    08    @Override

    09    public String getJAASContext() {

    10      return "alumniRealm";

    11    }


    13    @Override

    14    public Enumeration getGroupNames(String username) {

    15      List<String> groups = new ArrayList<>();

    16      groups.add("member");

    17      groups.add("admin");

    18      return Collections.enumeration(groups);

    19    }


    21  }

    ```


    We need to override three methods. For AuthType and JAASContext, this realm simply
    returns its name. This is necessary to identify this realm in the server’s configuration.


    The intention of GroupNames is to provide all possible groups of the solution.
    For demonstration purposes and simplicity’s sake, all the names are coded within
    the method. This might be okay for an authentication realm that’s used for a certain
    application. Even better, you might define the group names within some properties,
    or get it from a database.


    Next, we need a LoginModule, which needs to be derived from AppservPasswordLoginModule.
    See Listing [32-16](#A435433_1_En_32_Chapter.xhtml#PC19).'
  trans: '

    ## jdbcRealm


    好了，我们已经通过使用 JSF 表单保护了我们的 JSF Web 应用程序。用户信息仍然存储在纯文本文件中。但正如我所说，你的应用服务器提供了更多功能。让我们继续了解
    GlassFish 的 JDBCRealm，它允许你将用户信息存储在数据库中。


    在你的应用程序中，你可以提供一个注册表单，用户在其中输入用户名、其他一些数据和密码。你可以将这些数据全部存储在一个名为 `account` 的表中。或者，你也可以将凭据存储在一个单独的表中，例如名为
    `user` 的表。请根据你的应用程序需求自由地持久化数据。你可以将密码存储为明文（不推荐——仅用于测试目的），或者使用像 SHA-256 这样的知名算法进行哈希处理。容器所需要的只是一个包含用户名和密码的表格（或视图）的访问权限。


    为了从你的应用程序和 JDBCRealm 访问这个表，你需要设置一个连接池和一个合适的 JDBC 资源。除了用户表之外，还需要第二个表来访问用户的角色。需要一个用于用户名的列，再加上一个用于组的列。一个用户可以是多个组的成员。如果一个用户只属于一个组，你可以将此信息存储在与密码相同的表中。


    让我们来设置这个 realm。打开 GlassFish 控制台，选择 **配置** ➤ **server-config** ➤ **安全** ➤ **领域**。参见图
    32-7。


    ![A435433_1_En_32_Fig7_HTML.jpg](img/A435433_1_En_32_Fig7_HTML.jpg)


    ###### 图 32-7 GlassFish 配置


    GlassFish 会显示现有领域的概览。点击 **新建** 来创建一个新的领域。将打开 **新建领域** 对话框，如图 32-8 所示。


    ![A435433_1_En_32_Fig8_HTML.jpg](img/A435433_1_En_32_Fig8_HTML.jpg)


    ###### 图 32-8 GlassFish 的新建领域对话框


    以下是填写该对话框的一些要点：


    *   提供一个你选择的名称。此名称将在你的 `web.xml` 配置中被引用。


    *   从 **类名** 下拉列表中选择 **JDBCRealm**。


    *   对于 **JAAS 上下文**，输入 **jdbcRealm**。


    *   对于 **JNDI**，输入你为 JDBC 资源选择的名称。


    *   对于 **用户表**，提供你存储凭据的表的名称。


    *   对于 **用户名列**，输入你存储用户名的列名。


    *   对于 **密码列**，输入你存储密码的列名。


    *   对于 **组表**，提供你存储组信息的名称。如果一个用户只能属于一个组，并且你将组信息存储在与凭据相同的表中，请在此处输入相同的名称。


    *   **组表用户名列** 提供与 **用户表** 相同的用户名，即使其列名可能不同。


    *   对于 **组名列**，输入包含组名的列名。


    *   **密码加密算法**：如前所述，你可以将密码存储为纯文本或加密形式。强烈建议你使用加密。选择你使用的算法。请记住，MD5 或 SHA1 已知是不安全的，因此请选择例如
    SHA-256 或 SHA-512。


    *   **摘要算法**：提供相同的算法。


    *   **编码**：你可以将加密后的密码存储为十六进制字符串或 base64 编码。此属性定义了编码方式（Hex 或 Base64）。


    *   **字符集**：选择你用于存储密码的字符集。你可以使用 UTF-8。


