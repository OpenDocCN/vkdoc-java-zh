    \ is specific to inputSecret.\n\n###### Listing 27-9 Complete Composite Component\
    \ InputSecretValidate\n\n```\n01   <?xml version='1.0' encoding='UTF-8' ?>\n02   <html\
    \ xmlns=\"http://www.w3.org/1999/xhtml\"\n03         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
    \n04         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n05         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">\n\n07     <!-- INTERFACE -->\n08     <cc:interface>\n\
    09       <cc:attribute name=\"label\" />\n10       <cc:attribute name=\"value\"\
    />\n11       <cc:attribute name=\"required\" default=\"true\"/>\n12       <cc:attribute\
    \ name=\"componentStyleClass\" default=\"inputPart\"/>\n13       <cc:attribute\
    \ name=\"labelStyleClass\" default=\"label\"/>\n14       <cc:attribute name=\"\
    textStyleClass\" default=\"inputMedium\"/>\n15       <cc:attribute name=\"messageStyleClass\"\
    \ default=\"errorMessage\"/>\n16       <cc:attribute name=\"readonly\" default=\"\
    false\"/>\n17       <cc:attribute name=\"disabled\" default=\"false\"/>\n18       <cc:attribute\
    \ name=\"redisplay\" default=\"false\"/>\n19       <cc:attribute name=\"renderElement\"\
    \ default=\"@this\"/>\n20       <cc:attribute name=\"validationMethod\"\n21                     method-signature=\"\
    void validate(\n22                     javax.faces.context.FacesContext,\n23                     javax.faces.component.UIComponent,\n\
    24                     Object)\"/>\n25       <cc:actionSource name=\"input\"/>\n\
    26     </cc:interface>\n\n28     <!-- IMPLEMENTATION -->\n29     <cc:implementation>\n\
    30       <cc:editableValueHolder name=\"#{cc.id}\" targets=\"input\"/>    \n\n\
    32       <div class=\"#{cc.attrs.componentStyleClass}\">                     \
    \                                           \n\n34         <h:outputLabel for=\"\
    input\"\n35                        value=\"#{cc.attrs.label}\"\n36                        styleClass=\"\
    #{cc.attrs.labelStyleClass}\"/>\n\n38         <h:inputSecret id=\"input\"\n39                        value=\"\
    #{cc.attrs.value}\"\n40                        validator=\"#{cc.attrs.validationMethod}\"\
    \n41                        required=\"#{cc.attrs.required}\"\n42                        requiredMessage=\"\
    #{msg.msgValueRequired}\"\n43                        readonly=\"#{cc.attrs.readonly}\"\
    \n44                        disabled=\"#{cc.attrs.disabled}\"\n45                        redisplay=\"\
    #{cc.attrs.redisplay}\"\n46                        styleClass=\"#{cc.attrs.textStyleClass}\"\
    >\n47           <f:ajax event=\"change\" render=\"#{cc.attrs.renderElement} msgInput\"\
    />\n48         </h:inputSecret>\n\n50         <h:message id=\"msgInput\"\n51                    for=\"\
    input\"\n52                    styleClass=\"#{cc.attrs.messageStyleClass}\"/>\n\
    \n54       </div>\n\n56     </cc:implementation>\n57   </html>\n```\n\nWatch out\
    \ for the interface section: if needed, can define reasonable defaults for the\
    \ attributes. If you don’t need a different value than this default, you might\
    \ omit that attribute within the HTML file which uses this component.\n\nYou may\
    \ ask why the component names end with Validate. If we don’t pass in a validation\
    \ method, no validation takes place, and no value is transferred to the model,\
    \ even though we use AJAX here. We either need to pass in a dummy validation method\
    \ (with an empty body) or implement a special handling of the absent method. In\
    \ such a case, we have to omit the validator property. Such handling would inflate\
    \ the component, so Alumni uses two more components, LabeledText and LabeledSecret,\
    \ without the ability to pass in a validation method .\n\n## Summary\n\nWhen a\
    \ couple of components are used together in a similar manner, they might be composed\
    \ into a reusable composite component. A composite component consists of an (optional)\
    \ interface and an implementation. This chapter demonstrated how to transform\
    \ existing code into such components.\n\nSpecial attention is needed to allow\
    \ child components for a composite component. We need to define which internal\
    \ component(s) act as editable value holder.\n\nThe interface defines the attributes\
    \ that can be passed into the composite. For nontrivial types, JSF needs to be\
    \ informed about the attribute’s type or, in the case of a method, about the method\
    \ signature.\n\nFinally, this chapter showed a reusable ubiquitous input component.\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_28](#A435433_1_En_28_Chapter.xhtml)\n\
    \n# 28. Secure Passwords\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nAccess to special areas of Alumni will be restricted to members only.\
    \ That means we need to restrict access to authorized persons only. During the\
    \ registration process , we ask the user to enter a password that we store together\
    \ with the account entity.\n\nBecause Alumni is exposed to the web, there’s a\
    \ potential risk that somebody might tamper with the system. Passwords need special\
    \ protection —they should never be stored in plain text format. Although there\
    \ is no such things as 100% protection against *crackers* (malicious hackers—there\
    \ are nice hackers), it’s possible to store passwords in a reasonably safe way\
    \ by following these guidelines :\n\n*   Strongly encrypt all passwords\n\n* \
    \  Grant no access to any decrypted passwords\n\n*   Use an algorithm that takes\
    \ some time to calculate\n\n*   Calculate different hashes even though two users\
    \ may have chosen the same password\n\n*   Use an algorithm to verify the password\
    \ that takes almost the same time regardless of password length"
