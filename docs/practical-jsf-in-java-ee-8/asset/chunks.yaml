    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    如果您还记得第 32 章的自定义领域，我当时将 `obtainPermittedGroups` 方法留空，并承诺稍后描述。为了对用户进行身份验证，自定义领域需要检查用户的凭据，这些凭据存储在账户对象中。或者用数据库的术语来说，存储在账户表中。如果我们向领域添加一个数据访问类，我们也需要在
    Alumni 中访问该账户。


    考虑到 DRY 原则（*不要重复自己*），这就提出了一个问题：是否可能不在两个不同的地方使用相同的代码？我们希望只编写一次访问账户的代码，然后在不同的地方重用。我们是应该编写一个可供
    Alumni 和自定义领域使用的库？还是应该让自定义领域调用 Alumni 的相应数据访问方法？这两种解决方案都有其缺点，尤其是后者，它强制领域了解 Alumni。是否有可能独立运行该账户对象？


    好消息是：是的，可以。

