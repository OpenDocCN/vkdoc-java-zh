- fmt: '# Accounts API Documentation


    An account may have one of four different states:


    - New

    - Active

    - Inactive

    - Retired


    Creating an account will initially set the status to *new*. If the user activates
    their account within three days from creation, the status will be set to *active*—otherwise,
    the account will be removed (deleted from the database).


    If, and only if, the account is in the active state, the user may:


    - Log in to their account

    - Update account information

    - Delete their account


    `DELETE` may remove the account from the database or set the account''s status
    to the status *retired* and remove essential information identifying the user
    (name, email, and so on).


    This behavior depends on the data that''s linked to this account. If some data
    has to be kept as information within the system, then the account remains anonymized
    in the retired state. Otherwise, it''s completely removed from the database.


    If, and only if, the account is in an active state, the administrator can make
    it *inactive*. This might be done to temporarily disable an account, for example
    while investigating a case of abusing the account. Then the administrator might
    switch the status back to active.


    For this kind of reason, the account service (`AlumniAccount`) offers this API:


    ```

    AlumniAccount/api/account

    ```


    - `POST`: Create an account.

    - Returns `409` conflict if the database contains an account with the given email.

    - Returns `201` created if the account could be created. If the given `loginName`
    existed in the database, the system will change the `loginName` to a unique one.


    ```

    AlumniAccount/api/account/{id}

    ```


    - `GET`: Retrieve account.


    ```

    AlumniAccount/api/account/{id}

    ```


    - `PUT`: Update account.


    ```

    AlumniAccount/api/account/{id}

    ```


    - `DELETE`: Delete account (either anonymize and set to retired or totally remove
    from DB).


    ```

    AlumniAccount/api/account/activate/{id}

    ```


    - `PUT`: Set account status to active.


    ```

    AlumniAccount/api/account/login/{loginName}/{password}

    ```


    - `GET`: Return a list of groups, if the user is allowed to log in.


    Although `AccountService` is a separate web application, it derives its project
    object model (POM) from `Alumni`.


    NetBeans supports the creation of RESTful services out of the box. You can choose
    to create a new RESTful web service from pattern, database, or entity. If you
    want to create it from an entity class, for example, NetBeans creates a class
    for the data access as well as the service and its configuration. Usually this
    is a good starting point for your further development.


    To configure the REST service, we need a class that derives from `Application`.
    Add the `@ApplicationPath` annotation with the path to your REST API. This path
    will be appended to the application''s context path. I simply use `api`.


    Within our class, we need to override the `getClasses` method, which returns all
    classes we want to expose for the service. If you use NetBeans to create your
    REST service, the configuration class contains an `addRestResourceClasses` method
    to add the service classes. Don''t alter this method because it''s been generated
    and will be administered by NetBeans if you add or remove REST service classes.
    See Listing [33-1](#A435433_1_En_33_Chapter.xhtml#PC7).


    ## Listing 33-1 REST Service Configuration


    ```

    01   @javax.ws.rs.ApplicationPath("api")

    02   public class ApplicationConfig extends Application {


    04     @Override

    05     public Set<Class<?>> getClasses() {

    06       Set<Class<?>> resources = new java.util.HashSet<>();

    07       addRestResourceClasses(resources);

    08       return resources;

    09    }


    11     private void addRestResourceClasses(Set<Class<?>> resources) {

    12       resources.add(de.muellerbruehl.alumniaccount.rest.AccountService.class);

    13     }


    15   }

    ```


    In that listing, we only add one Service class. Let''s take a look at it in Listing
    [33-2](#A435433_1_En_33_Chapter.xhtml#PC8).


    ## Listing 33-2 AccountService (Excerpt)


    ```

    01  @Path("/account")

    02  public class AccountService {


    04    @Context private UriInfo context;


    06    @POST

    07    @Consumes(MediaType.APPLICATION_JSON)

    08    @Produces(MediaType.APPLICATION_JSON)

    09    public Response createAccount(Account account) {

    10      try {

    11        AccountFacade.getInstance().createAccount(account);

    12        URI path = context.getAbsolutePath().resolve(account.getId());

    13        return Response.created(path).entity(account.getAccessKey()).build();

    14      } catch (IllegalArgumentException ex) {

    15        return Response.status(Status.CONFLICT).build();

    16      } catch (Exception ex) {

    17        return Response.notAcceptable(null).build();

    18      }

    19    }


    21    @GET

    22    @Path("{id}")

    23    @Produces(MediaType.APPLICATION_JSON)

    24    public Account getAccount(@PathParam("id") String id) {

    25      Account account = AccountFacade.getInstance().findAccount(id);

    26      return account;

    27    }

    28    ...

    29  }

    ```


    In line 1, there is a `@Path` annotation. This declares the relative path within
    our API. The full path is a combination of protocol, server, port, context path,
    API path as configured, and last but not least the relative path to the account
    resource. Thus the full path to access the `AccountService` on a local machine
    would be `http://localhost:8082/AlumniAccount/api/account`. You may wonder why
    the port differs from the usual `8080`. I operate this service on its own application
    server. (Yes, it''s possible to Docker-ize it, but that''s beyond this book''s
    scope.)


    The excerpt contains two methods: `createAccount` takes an account via API and
    passes it to the `AccountFacade`, which performs some checks and persists the
    account. In line 4, we''ve got a `UriInfo` object injected. We''ll use it to create
    a path for our response in case of successful creation. Within this response,
    we return the newly created id of the account.


    If the new (not yet existing) account comes with an email that exists in the account
    table, an `IllegalArgumentException` will be thrown. Once we catch it here (line
    14), we return an HTTP error code `409` (conflict). In any other case, we return
    a not-acceptable state.


    When a client calls this method, it doesn''t need to pass an object of the `Account`
    class like the server uses. All data of the client''s account is converted to
    its JSON representation. On the server side, the data is converted to an object
    in the server''s `Account` class. This conversion works because both classes use
    the same getter and setter names. Although the password of the client''s account
    comes as clear text (as entered by the user), the server''s password is hashed
    within its setter. That''s because we only want to store encrypted passwords in
    the data base.


    To protect the password during transport, we need to use a secure transport protocol
    such as TLS between the browser and our application server. If we assume that
    both our application server and the `AccountService` reside on the same network
    behind a firewall, then we don''t need to secure the transport between both servers.
    That''s why the service is available at a non-secured (`http:`) URI.


    The second method, `getAccount`, accepts an id and retrieves the appropriate account
    from the database. Look at line 22: here the path is surrounded by curly braces.
    That means "expect a variable id as part of the URI." Within the method signature
    we refer this part of the path to assign its value to the parameter. Because we
    annotated this method with `@GET`, it reacts only to the HTTP `GET` method.


    Now if we keep the path but change the HTTP method, we can implement a `DELETE`
    method, as shown in Listing [33-3](#A435433_1_En_33_Chapter.xhtml#PC9).'
