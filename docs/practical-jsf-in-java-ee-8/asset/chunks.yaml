    \n## 总结\n\n当多个组件以类似方式一起使用时，可以将它们组合成一个可复用的复合组件。一个复合组件由一个（可选的）接口和一个实现组成。本章演示了如何将现有代码转换为这样的组件。\n\
    \n需要特别注意如何允许复合组件拥有子组件。我们需要定义哪个（些）内部组件充当可编辑值持有者。\n\n接口定义了可以传入复合组件的属性。对于非简单类型，需要告知\
    \ JSF 属性的类型，或者对于方法，需要告知方法签名。\n\n最后，本章展示了一个可复用的通用输入组件。\n\n© Michael Müller 2018\n\
    \nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_28`\n\
    \n# 28. 安全密码\n\nMichael Müller^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\nAlumni 项目中特殊区域的访问权限将仅限于会员。这意味着我们需要将访问权限限制在授权人员范围内。在注册过程中，我们要求用户输入密码，并将其与账户实体一起存储。\n\
    \n由于 Alumni 项目暴露于网络环境中，存在有人可能篡改系统的潜在风险。密码需要特殊保护——它们绝不应以明文格式存储。虽然不存在 100% 抵御*破解者*（恶意黑客——也有善良的黑客）的方法，但通过遵循以下准则，可以以相当安全的方式存储密码：\n\
    \n*   对所有密码进行强加密\n\n*   不授予任何访问解密后密码的权限\n\n*   使用需要一定计算时间的算法\n\n*   即使两个用户选择了相同的密码，也要计算出不同的哈希值\n\
    \n*   使用验证密码的算法，该算法所需时间几乎与密码长度无关\n"
- fmt: "# Hash\n\nEncryption without any possible decryption can be achieved by a\
    \ hash function. A *hash* is the output of a hash function that maps text (or\
    \ other data) of arbitrary size to an output string of a fixed size. A cryptographic\
    \ useful hash function will produce an output that differs in almost all characters\
    \ even if the input only has little changes. A hash function is a one-way function:\
    \ you may calculate the hash from the text but you cannot calculate the text from\
    \ the hash. Different input may produce the same hash. This situation is called\
    \ a *collision*. A good hash function will produce as few collisions as possible.\
    \ A purist may claim that a hash is something other than an encryption, but it\
    \ still calculates an encrypted value. By choosing the right algorithm, we can\
    \ reduce the risk of retrieving the same hash for two different passwords. For\
    \ example, if you use Secure Hash Algorithm (SHA), say, `SHA-512`, the risk for\
    \ such a collision tends to zero. Implementing such a hash function is quite easy,\
    \ as you can see in Listing [28-1](#A435433_1_En_28_Chapter.xhtml#PC1).\n\n######\
    \ Listing 28-1 Simple Encryption (Hashing) of a Password\n\n```\n 1   public static\
    \ byte[] getSHAHash(String secret) {\n 2     try {\n 3       MessageDigest md\
    \ = MessageDigest.getInstance(\"SHA\");\n 4       byte[] digest = md.digest(secret.getBytes(\"\
    utf-8\"));\n 5       return digest;\n 6     } catch (UnsupportedEncodingException\
    \ | NoSuchAlgorithmException ex) {\n 7       Logger.getLogger(\"HashUtils\").log(Level.SEVERE,\
    \ null, ex);\n 8       throw new RuntimeException(ex);\n 9     }\n10   }\n```\n\
    \nThe strategy would be to store a hash into the database. That way, even if an\
    \ unauthorized person gets access to the database, they can’t read the passwords,\
    \ only the hashes. But using a simple algorithm as shown in the preceding listing\
    \ isn’t advisable. There are some drawbacks we have to consider. If the hash algorithm\
    \ tends to have lots of collisions, then it might become easier to produce the\
    \ same hash as stored in the password hash table without knowing the correct password.\
    \ `SHA-1` for example is treated as being not really secure, even if only a few\
    \ known huge documents produce the same hash. Other algorithms like `MD5` are\
    \ much less secure. But this obvious issue isn’t the only problem.\n\n## Security\
    \ Issues and Mitigation\n\nA cracker might try to start a brute force attack by\
    \ sending a massive amount of different password combinations until they hit the\
    \ right one. The simple hash is calculated very fast, and the attacker can try\
    \ many passwords in a short period of time. One thing we can do is slow down the\
    \ process of user authentication and authorization. If the whole turnaround takes\
    \ approximately 0.5–1.0 second, that wouldn’t hinder the user. But it dramatically\
    \ slows down the attacker.\n\n###### Tip\n\n*Authentication:* Is this the right\
    \ user? *Authorization:* Which rights does this user have?\n\nSuppose a cracker\
    \ has stolen the hashes. If he knows which algorithm is used to calculate them,\
    \ he can use a brute force attack against the hashes. Again, we need to slow down\
    \ the process to prevent the cracker from finding valid passwords. We can delay\
    \ the user authentication at any point in the process, but now the only chance\
    \ is to use a hashing algorithm that takes a long time. Pure `SHA` is much too\
    \ fast for this.\n\nIf the cracker finds a valid password, and the hash is used\
    \ by more than one user, the cracker gains access to multiple accounts. To prevent\
    \ that, we need to generate a different hash for different users, even if they’ve\
    \ chosen the same password. You can do this by “salting” the password. Suppose\
    \ you have a string `salt` with a random value. You can calculate the hash by\
    \ adding that salt to the password, like this:\n\n```\nbyte[] hash = getSHAHash(salt\
    \ + secret)\n```\n\nBecause we need the salt to calculate the correct hash, we\
    \ need to store the salt somewhere. That might be within the same table where\
    \ we store the password hash.\n\nFor a given password, the hash function always\
    \ calculates the same hash. Thus, it would be possible to store phrases and their\
    \ hashes. Then you can look up the password by querying the database with a hash.\
    \ Such tables are known as *rainbow tables* and are available online for download\
    \ from several sources (a search for “rainbow tables download” will list a lot\
    \ of URLs). A salted password offers protection against such rainbow tables, too.\n\
    \nThe user enters the password using the browser. But the database with the hashes\
    \ resides somewhere else on a server. That means the password needs to be transferred\
    \ from a browser to a server. To protect the password during transport, it is\
    \ essential to choose a secure transport layer, such as Transport Layer Security\
    \ (TLS), a cryptographic protocol for communication security. In conjunction with\
    \ a certificate, an application server or upstream HTTP server can use `HTTPS`.\
    \ Configuring the server is beyond this book’s scope.\n\n## Password Algorithm\n\
    \nPutting all this together, Alumni uses the Password-Based Key Derivation Function\
    \ 2 (`PBKDF2`) algorithm, as illustrated in Listing [28-2](#A435433_1_En_28_Chapter.xhtml#PC3).\n\
    \n###### Listing 28-2 Revised Encryption (Hashing) of a Password\n\n```\n 1  \
    \ public static byte[] hashPassword(String password, byte[] salt,\n 2        \
    \                             int iterations, int keyLength) {\n 3     try {\n\
    \ 4       SecretKeyFactory skf = SecretKeyFactory.\n 5           getInstance(\"\
    PBKDF2WithHmacSHA512\");\n 6       PBEKeySpec spec = new PBEKeySpec(password.toCharArray(),\
    \ salt,\n 7                                        iterations, keyLength);\n 8\
    \       SecretKey key = skf.generateSecret(spec);\n 9       return key.getEncoded();\n\
    10     } catch (NoSuchAlgorithmException | InvalidKeySpecException ex) {\n11 \
    \      Logger.getLogger(\"HashUtils\").log(Level.SEVERE, null, ex);\n12      \
    \ throw new RuntimeException(ex);\n13     }\n14   }\n```\n\nBy setting the `iterations`\
    \ to a high value, the calculation is slowed by additional rounds of calculation.\
    \ On my development computer, a value of around 100,000 iterations will take 0.5\
    \ seconds. Using a value of 100,047 or a similar unexpected number of iterations\
    \ won’t affect the felt time but produces a different hash. Such numbers are used\
    \ more rarely than big even numbers, which further helps improve security.\n\n\
    The delay depends on your machine, so don’t copy this exact value. You need to\
    \ figure out the best value for your machine.\n\n`KeyLength` determines the length\
    \ of the output. Alumni uses a key length of 1024, which is 1024 bits / 8 = 128\
    \ bytes.\n\nThis sketched-out approach might not meet the high requirements of\
    \ a banking application, but it’s fine for a social application like Alumni. (If\
    \ you want to read more about this, check out the interesting article “Secure\
    \ Password Storage” at [http://goo.gl/Spvzs](http://goo.gl/Spvzs).)\n\nBesides\
    \ securely storing the password, the password also has to be checked during user\
    \ authentication. Usually, comparing two values will fail at the first difference.\
    \ If two strings are either different at the first or the last character, the\
    \ comparison for the latter case would take a bit longer. This fact might help\
    \ a cracker to guess a password. Later on, when we perform the user authentication\
    \ and authorization, we’ll compare the hash byte by byte to its end without shortcutting\
    \ this process."
  raw: '## Hash


    Encryption without any possible decryption can be achieved by a hash function.
    A *hash* is the output of a hash function that maps text (or other data) of arbitrary
    size to an output string of a fixed size. A cryptographic useful hash function
    will produce an output that differs in almost all characters even if the input
    only has little changes. A hash function is a one-way function: you may calculate
    the hash from the text but you cannot calculate the text from the hash. Different
    input may produce the same hash. This situation is called a *collision*. A good
    hash function will produce as few collisions as possible. A purist may claim that
    a hash is something other than an encryption, but it still calculates an encrypted
    value. By choosing the right algorithm, we can reduce the risk of retrieving the
    same hash for two different passwords. For example, if you use Secure Hash Algorithm
    (SHA) , say, SHA-512, the risk for such a collision tends to zero. Implementing
    such a hash function is quite easy, as you can see in Listing [28-1](#A435433_1_En_28_Chapter.xhtml#PC1).


    ###### Listing 28-1 Simple Encryption (Hashing) of a Password


    ```

     1   public static byte[] getSHAHash(String secret) {

     2     try {

     3       MessageDigest md = MessageDigest.getInstance("SHA");

     4       byte[] digest = md.digest(secret.getBytes("utf-8"));

     5       return digest;

     6     } catch (UnsupportedEncodingException | NoSuchAlgorithmException ex) {

     7       Logger.getLogger("HashUtils").log(Level.SEVERE, null, ex);

     8       throw new RuntimeException(ex);

     9     }

    10   }

    ```


    The strategy would be to store a hash into the database. That way, even if an
    unauthorized person gets access to the database, they can’t read the passwords,
    only the hashes. But using a simple algorithm as shown in the preceding listing
    isn’t advisable. There are some drawbacks we have to consider. If the hash algorithm
    tends to have lots of collisions, then it might become easier to produce the same
    hash as stored in the password hash table without knowing the correct password.
    SHA-1 for example is treated as being not really secure, even if only a few known
    huge documents produce the same hash. Other algorithms like MD5 are much less
    secure. But this obvious issue isn’t the only problem.


    ## Security Issues and Mitigation


    A cracker might try to start a brute force attack by sending a massive amount
    of different password combinations until they hit the right one. The simple hash
    is calculated very fast, and the attacker can try many passwords in a short period
    of time. One thing we can do is slow down the process of user authentication and
    authorization. If the whole turnaround takes approximately 0.5–1.0 second, that
    wouldn’t hinder the user. But it dramatically slows down the attacker.


    ###### Tip


    *Authentication:* Is this the right user? *Authorization:* Which rights does this
    user have?


    Suppose a cracker has stolen the hashes. If he knows which algorithm is used to
    calculate them, he can use a brute force attack against the hashes. Again, we
    need to slow down the process to prevent the cracker from finding valid passwords.
    We can delay the user authentication at any point in the process, but now the
    only chance is to use a hashing algorithm that takes a long time. Pure SHA is
    much too fast for this.


    If the cracker finds a valid password, and the hash is used by more than one user,
    the cracker gains access to multiple accounts. To prevent that, we need to generate
    a different hash for different users, even if they’ve chosen the same password.
    You can do this by “salting” the password. Suppose you have a string salt with
    a random value. You can calculate the hash by adding that salt to the password,
    like this:


    ```

    byte[] hash = getSHAHash(salt + secret)

    ```


    Because we need the salt to calculate the correct hash, we need to store the salt
    somewhere. That might be within the same table where we store the password hash.


    For a given password, the hash function always calculates the same hash. Thus,
    it would be possible to store phrases and their hashes. Then you can look up the
    password by querying the database with a hash. Such tables are known as *rainbow
    tables* and are available online for download from several sources (a search for
    “rainbow tables download” will list a lot of URLs). A salted password offers protection
    against such rainbow tables, too.


    The user enters the password using the browser. But the database with the hashes
    resides somewhere else on a server. That means the password needs to be transferred
    from a browser to a server. To protect the password during transport, it is essential
    to choose a secure transport layer, such as Transport Layer Security (TLS) , a
    cryptographic protocol for communication security. In conjunction with a certificate,
    an application server or upstream HTTP server can use HTTPS. Configuring the server
    is beyond this book’s scope.


    ## Password Algorithm


    Putting all this together, Alumni uses the Password-Based Key Derivation Function
    2 (PBKDF2) algorithm, as illustrated in Listing [28-2](#A435433_1_En_28_Chapter.xhtml#PC3).


    ###### Listing 28-2 Revised Encryption (Hashing) of a Password


    ```

     1   public static byte[] hashPassword(String password, byte[] salt,

     2                                     int iterations, int keyLength) {

     3     try {

     4       SecretKeyFactory skf = SecretKeyFactory.

     5           getInstance("PBKDF2WithHmacSHA512");

     6       PBEKeySpec spec = new PBEKeySpec(password.toCharArray(), salt,

     7                                        iterations, keyLength);

     8       SecretKey key = skf.generateSecret(spec);

     9       return key.getEncoded();

    10     } catch (NoSuchAlgorithmException | InvalidKeySpecException ex) {

    11       Logger.getLogger("HashUtils").log(Level.SEVERE, null, ex);

    12       throw new RuntimeException(ex);

    13     }

    14   }

    ```


    By setting the iterations to a high value, the calculation is slowed by additional
    rounds of calculation. On my development computer, a value of around 100,000 iterations
    will take 0.5 seconds. Using a value of 100,047 or a similar unexpected number
    of iterations won’t affect the felt time but produces a different hash. Such numbers
    are used more rarely than big even numbers, which further helps improve security.


    The delay depends on your machine, so don’t copy this exact value. You need to
    figure out the best value for your machine.


    KeyLength determines the length of the output. Alumni uses a key length of 1024,
    which is 1024 bits / 8 = 128 bytes.


    This sketched-out approach might not meet the high requirements of a banking application,
    but it’s fine for a social application like Alumni. (If you want to read more
    about this, check out the interesting article “Secure Password Storage” at [http://goo.gl/Spvzs](http://goo.gl/Spvzs)
    .)


    Besides securely storing the password , the password also has to be checked during
    user authentication. Usually, comparing two values will fail at the first difference.
    If two strings are either different at the first or the last character, the comparison
    for the latter case would take a bit longer. This fact might help a cracker to
    guess a password. Later on, when we perform the user authentication and authorization,
    we’ll compare the hash byte by byte to its end without shortcutting this process.'
