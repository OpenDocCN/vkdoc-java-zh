    The lastChanged is tagged before any update due to the @PreUpdate annotation.


    Lines 131–154 show the password handling . When the password is passed in, its
    hash is calculated and stored in the appropriate field. This hash will be stored
    in the database. The password has no getter; instead, checkPassword is used to
    verify whether the password (as provided during login) matches the hash.


    ## Summary


    Each access to the database is performed through a data façade, which offers an
    interface to a couple of methods to access a group of related data. This facade
    is used to hide the details of the data access. For different kinds of data, Alumni
    offers a couple of facades that are derived from an abstract facade.


    This chapter also showed details of the data that’s stored, updated, and deleted
    using the facade. The password is encrypted once it’s passed to the entity and
    will never be stored with its original value.


