    \ you can see, this is a lot of effort for just validating a field the user needs\
    \ to repeat. In my opinion, such effort is only worthwhile if the validation needs\
    \ to perform more than just comparing two fields. Because I didn’t use the password\
    \ comparison for this explanation, you can guess that I've chosen a different\
    \ approach for comparing the passwords in Alumni. In other words, we won’t use\
    \ the built-in multi-validation for such a simple scenario.\n\n## Self-Made\n\n\
    The backing bean for the registration refers to an account that contains the target\
    \ password field. This password will be compared to another field that will be\
    \ placed in the form before the account’s password. This first password field\
    \ is held by the backing bean.\n\nThe inputSecret for the password repetition\
    \ refers to the checkPassword method of this bean: validator=\"#{register.checkPassword}\"\
    . See Listing [25-18](#A435433_1_En_25_Chapter.xhtml#PC20).\n\n###### Listing\
    \ 25-18 Excerpt of the Registration Bean\n\n```\n 1   private Account _account\
    \ = new Account();\n\n 3   public Account getAccount() {\n 4     return _account;\n\
     5   }\n\n 7   public void setAccount(Account account) {                     \
    \                                           \n 8     this._account = account;\n\
     9   }\n\n11   String _password;\n\n13   public String getPassword() {\n14     return\
    \ _password;\n15   }\n\n17   public void setPassword(String password) {\n18     _password\
    \ = password;\n19   }\n\n21   public void checkPassword(FacesContext context,\n\
    22           UIComponent component,\n23           Object value) {\n24     if (_password\
    \ != null && !_password.equals(\"\" + value)) {\n25       String msg = Helper.getMessage(\"\
    msgPasswordMismatch\");\n25       throw new ValidatorException(new FacesMessage(msg));\n\
    27     }\n28  }\n```\n\nFor the password check, our validator needs to compare\
    \ the value of the second entry with the first one. Because the data isn’t transferred\
    \ to the model yet (it will be after the successful validation), we need to compare\
    \ the raw values of the input component. In the solution given, the raw value\
    \ is compared to the password field, which needs to be transferred to the bean\
    \ before. This is what AJAX , the topic of the next chapter, is used for.\n\n\
    Without using AJAX, we also need to retrieve the raw value of the first password\
    \ field. We'll get it out of the component tree, as shown in Listing [25-19](#A435433_1_En_25_Chapter.xhtml#PC21).\n\
    \n###### Listing 25-19 Example of Multi-Component Validation\n\n```\n 1     public\
    \ void checkPassword(FacesContext context, UIComponent component, Obj\\\n 2   ect\
    \ value) {\n 3       UIViewRoot root = context.getViewRoot();\n 4       String\
    \ targetId = component.getNamingContainer().getClientId() + \":passw\\\n 5   ord\"\
    ;\n 6       Object password = ((HtmlInputSecret) root.findComponent(targetId))\n\
     7                .getValue();\n 8       if (!password.equals(\"\" + value)) {\n\
     9         String msg = Helper.getMessage(\"msgPasswordMismatch\");\n10         throw\
    \ new ValidatorException(new FacesMessage(msg));\n11       }\n12   }\n```\n\n\
    This method shown in Listing [25-19](#A435433_1_En_25_Chapter.xhtml#PC21) replaces\
    \ the one in Listing [25-18](#A435433_1_En_25_Chapter.xhtml#PC20).\n\n## Summary\n\
    \nEven though JSF has offered its own validation since the early days, it’s now\
    \ possible to use Java EE’s bean-validation feature. JSF invokes bean validation\
    \ automatically if the data model is annotated with validation constraints. Since\
    \ JSF 2.3 (Java EE 8), a multi-component validation based on bean validation groups\
    \ is available. It needs a lot of boilerplate code, so it’s best used if you need\
    \ complex validations. Simply comparing two fields for identical values might\
    \ be implemented easier without this new feature.\n\n© Michael Müller 2018\n\n\
    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_26](#A435433_1_En_26_Chapter.xhtml)\n\
    \n# 26. AJAX Components\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nIn a normal request, the browser queries for a whole page. By contrast,\
    \ AJAX (Asynchronous JavaScript and XML ) is commonly used to query only small\
    \ portions of data with a special object called the XMLHttpRequest. That object\
    \ is used to query data in the background (asynchronous) while the page is still\
    \ displayed. Depending on the response, parts of the page might be rerendered.\
    \ In JSF, this is called a *partial request*.\n\nWhen the term was first used,\
    \ the response was some XML data. Nowadays, the most preferred format for the\
    \ response’s payload is a JSON string, which is more compact than an XML document.\
    \ Or, if desired, a developer might send plain text as payload. But the technique\
    \ behind the scenes is still called AJAX.\n\n## Using AJAX for Immediate Feedback\n\
    \nAJAXifying a dialog can help improve the user experience. For example, the content\
    \ of each single input component may be sent to the server and provide an immediate\
    \ feedback to the user. Although AJAX can also be useful for smaller dialogs,\
    \ such as the category editor of Books, I’ll introduce AJAX for JSF by way of\
    \ the registration form.\n\nJSF offers a special tag, <f:ajax>. One way to AJAXify\
    \ a component is to embed this tag into the component. In the case of the registration\
    \ form, we simply put it into the <h:inputText> elements, as shown in Listing\
    \ [26-1](#A435433_1_En_26_Chapter.xhtml#PC1)."
  trans: "\n###### 清单 25-17 EmailBean\n\n```\n 1 @Named\n 2 @RequestScoped\n 3 @RepeatedEntryConstraint(groups\
    \ = RepeatedEntryConstraint.class)\n 4 public class EmailBean implements RepeatedEntryHolder,\
    \ Cloneable {\n\n 6   //<editor-fold defaultstate=\"collapsed\" desc=\"Property\
    \ Email1\">\n 7   private String _email1 = \"\";                             \
    \                                   \n\n 9   @NotNull\n10   @Pattern(regexp =\
    \ \"(\\\\w+|\\\\w(\\\\w|[+-.])*\\\\w)@(\\\\w+|\\\\w(\\\\w|[-.])*\\\\w)\\\\.[a-zA-Z]+\"\
    ,\n11           message = \"This is not a valid email\")\n12   public String getEmail1()\
    \ {\n13     return _email1;\n14   }\n\n16   public void setEmail1(String email1)\
    \ {\n17     _email1 = email1;\n18   }\n19   //</editor-fold>\n\n21   //<editor-fold\
    \ defaultstate=\"collapsed\" desc=\"Property Email2\">\n22   private String _email2\
    \ = \"\";\n\n24   @NotNull\n25   public String getEmail2() {\n26     return _email2;\n\
    27   }\n\n29   public void setEmail2(String email2) {\n30     _email2 = email2;\n\
    31   }\n32   //</editor-fold>\n\n34   //<editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Implement RepeatedEntryHolder\">\n35   @Override\n36   public String\
    \ getValue1() {\n37     return _email1;\n38   }\n\n40   @Override\n41   public\
    \ String getValue2() {\n42     return _email2;\n43   }\n44   //</editor-fold>\n\
    \n46   //<editor-fold defaultstate=\"collapsed\" desc=\"Implement Cloneable\"\
    >\n47   @Override\n48   protected Object clone() throws CloneNotSupportedException\
    \ {\n49     EmailBean other = (EmailBean) super.clone();\n50     other.setEmail1(this.getEmail1());\n\
    51     other.setEmail2(this.getEmail2());                                    \
    \                            \n52     return other;\n53   }\n54   //</editor-fold>\n\
    55 }\n```\n\n该类由我们的约束注解（第 3 行）。由于我们也使用此接口作为组名，因此其类再次为组声明（第 4 行）。请记住，我们本可以使用不同的接口作为组名。\n\
    \n该 Bean 同时实现了 `RepeatedEntryHolder` 和 `Clonable`。我们需要前者将其传递给验证器——否则，验证器将需要接受\
    \ `EmailBean` 类的实例，这阻碍了泛化。请记住，JSF 中的验证发生在数据被传输到模型（支持 Bean）*之前*。多字段验证在对象的副本上进行，这就是为什么我们需要克隆它。无需复制电子邮件字段，因为\
    \ JSF 会在克隆中将这些字段设置为当前的输入字段。\n\n我希望你能看到，仅仅为了验证用户需要重复输入的字段，就需要付出如此多的努力。在我看来，只有当验证需要执行的操作不仅仅是比较两个字段时，这种努力才值得。由于我没有在此解释中使用密码比较，你可以猜到我在\
    \ Alumni 中选择了不同的方法来比较密码。换句话说，对于如此简单的场景，我们不会使用内置的多重验证。\n\n## 自行实现\n\n用于注册的支持 Bean\
    \ 引用了一个包含目标密码字段的账户。该密码将与另一个字段进行比较，该字段将放置在表单中账户密码字段之前。这第一个密码字段由支持 Bean 持有。\n\n\
    用于密码重复输入的 `inputSecret` 引用了此 Bean 的 `checkPassword` 方法：`validator=\"#{register.checkPassword}\"\
    `。请参见清单 25-18。\n\n###### 清单 25-18 注册 Bean 的摘录\n\n```\n 1   private Account _account\
    \ = new Account();\n\n 3   public Account getAccount() {\n 4     return _account;\n\
     5   }\n\n 7   public void setAccount(Account account) {                     \
    \                                           \n 8     this._account = account;\n\
     9   }\n\n11   String _password;\n\n13   public String getPassword() {\n14     return\
    \ _password;\n15   }\n\n17   public void setPassword(String password) {\n18     _password\
    \ = password;\n19   }\n\n21   public void checkPassword(FacesContext context,\n\
    22           UIComponent component,\n23           Object value) {\n24     if (_password\
    \ != null && !_password.equals(\"\" + value)) {\n25       String msg = Helper.getMessage(\"\
    msgPasswordMismatch\");\n25       throw new ValidatorException(new FacesMessage(msg));\n\
    27     }\n28  }\n```\n\n对于密码检查，我们的验证器需要将第二次输入的值与第一次进行比较。由于数据尚未传输到模型（将在成功验证后进行），我们需要比较输入组件的原始值。在给出的解决方案中，原始值与密码字段进行比较，而密码字段需要在此之前传输到\
    \ Bean。这就是下一章主题 AJAX 的用途。\n\n如果不使用 AJAX，我们还需要检索第一个密码字段的原始值。我们将从组件树中获取它，如清单 25-19\
    \ 所示。\n\n###### 清单 25-19 多组件验证示例\n\n```\n 1     public void checkPassword(FacesContext\
    \ context, UIComponent component, Obj\\\n 2   ect value) {\n 3       UIViewRoot\
    \ root = context.getViewRoot();\n 4       String targetId = component.getNamingContainer().getClientId()\
    \ + \":passw\\\n 5   ord\";\n 6       Object password = ((HtmlInputSecret) root.findComponent(targetId))\n\
     7                .getValue();\n 8       if (!password.equals(\"\" + value)) {\n\
     9         String msg = Helper.getMessage(\"msgPasswordMismatch\");\n10         throw\
    \ new ValidatorException(new FacesMessage(msg));\n11       }\n12   }\n```\n\n\
    清单 25-19 中显示的方法替换了清单 25-18 中的方法。\n\n## 总结\n\n尽管 JSF 从早期就提供了自己的验证功能，但现在也可以使用 Java\
    \ EE 的 Bean 验证特性。如果数据模型使用验证约束进行注解，JSF 会自动调用 Bean 验证。自 JSF 2.3（Java EE 8）起，提供了基于\
    \ Bean 验证组的多组件验证。它需要大量样板代码，因此最好在需要复杂验证时使用。对于简单地比较两个字段值是否相同，不使用此新功能可能更容易实现。\n\n\
    © Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_26`\n\
    \n# 26. AJAX 组件\n\nMichael Müller^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\n在普通请求中，浏览器会请求整个页面。相比之下，AJAX（异步\
    \ JavaScript 和 XML）通常用于通过一个名为 `XMLHttpRequest` 的特殊对象仅查询少量数据。该对象用于在后台（异步）查询数据，同时页面仍然显示。根据响应，页面的部分内容可能会被重新渲染。在\
    \ JSF 中，这被称为*部分请求*。\n\n当这个术语首次被使用时，响应是一些 XML 数据。如今，响应负载最常用的格式是 JSON 字符串，它比 XML\
    \ 文档更紧凑。或者，如果需要，开发人员可以发送纯文本作为负载。但幕后的技术仍然被称为 AJAX。\n\n## 使用 AJAX 实现即时反馈\n\n对对话框进行\
    \ AJAX 化有助于改善用户体验。例如，每个输入组件的内容都可以发送到服务器，并向用户提供即时反馈。尽管 AJAX 对于较小的对话框（例如 Books 的类别编辑器）也很有用，但我将通过注册表单来介绍\
    \ JSF 的 AJAX。\n\nJSF 提供了一个特殊的标签 `<f:ajax>`。对组件进行 AJAX 化的一种方法是将此标签嵌入到组件中。以注册表单为例，我们只需将其放入\
    \ `<h:inputText>` 元素中，如清单 26-1 所示。\n"
- fmt: "### Listing 26-1 Registration Form, AJAXified (Excerpt)\n\n```\n 1   <h:form>\n\
    \n 3     <div class=\"inputPart\">\n 4       <h:outputLabel for=\"firstName\"\n\
    \ 5                      value=\"#{msg.lblFirstName}\"\n 6                   \
    \   styleClass=\"label\"/>\n 7       <h:message id=\"msgFirstName\" for=\"firstName\"\
    \n 8                  styleClass=\"errorMessage\"/>\n 9       <h:inputText id=\"\
    firstName\"\n10                    value=\"#{register.account.firstName}\"\n11\
    \                    styleClass=\"inputFull\">\n12         <f:ajax render=\"@this\
    \ msgFirstName\"/>                                                           \
    \     \n13       </h:inputText>\n14     </div>\n\n16     <div class=\"inputPart\"\
    >\n17       <h:outputLabel for=\"lastName\"\n18                      value=\"\
    #{msg.lblLastName}\"\n19                      styleClass=\"label\"/>\n20     \
    \  <h:message id=\"msgLastName\"\n21                  for=\"lastName\"\n22   \
    \               styleClass=\"errorMessage\"/>\n23       <h:inputText id=\"lastName\"\
    \n24                    value=\"#{register.account.lastName}\"\n25           \
    \         styleClass=\"inputFull\">\n26          <f:ajax render=\"@this msgLastName\"\
    />\n27        </h:inputText>\n28     </div>\n\n30     <div class=\"inputPart\"\
    >\n31       <h:outputLabel for=\"email\"\n32                      value=\"#{msg.lblEmail}\"\
    \n33                      styleClass=\"label\"/>\n34       <h:message id=\"msgEmail\"\
    \n35                  for=\"email\"\n36                  styleClass=\"errorMessage\"\
    />\n37       <h:inputText id=\"email\"\n38                    value=\"#{register.account.email}\"\
    \n39                    styleClass=\"inputFull\">\n40         <f:ajax render=\"\
    @this msgEmail\"/>\n41       </h:inputText>\n42     </div>\n\n44     <div class=\"\
    buttonBar\">\n45       <h:commandButton value=\"#{msg.btnRegister}\"         \
    \                                                       \n46                 \
    \       action=\"#{register.register()}\"\n47                        styleClass=\"\
    button\"/>\n48     </div>\n\n50   </h:form>\n```\n\nThis form contains three AJAXified\
    \ elements (see lines 12, 26, and 40). The `render` attribute tells JSF which\
    \ components should be rendered when the data is sent back from the server. `@this`\
    \ is a special keyword that refers to the surrounding (parent) component. `msgXXX`\
    \ is the name of the associated message.\n\nWhen the user leaves an input field,\
    \ JSF invokes an asynchronous request and sends the content of this field to the\
    \ server. This value will be converted, validated, and if validation succeeded,\
    \ transferred to the model. Then the server sends back the new content of the\
    \ two mentioned components (each `@this` and the message) to render. Doing so,\
    \ we provide immediate feedback to the user, similar to a desktop application.\n\
    \nUsing the `ajax` tag is quite simple and hides away all the JavaScript code.\
    \ JSF completely handles the server side, so no special programming is needed.\n\
    \nThe form shows a very basic use of the `<f:ajax>` tag, which almost uses some\
    \ default values. For example, we omit the `event` and the component on which\
    \ this request executes. By default, the parent component of `<f:ajax>` is executed\
    \ (sent to the server) during its change event. The default event depends on the\
    \ component’s type. If the component holds a value (such as `inputText`, `selectOneMenu`,\
    \ and so on), then the default is `onChange`. For components that are clicked,\
    \ like buttons or links, it defaults to `onClick`.\n\nAll these defaults might\
    \ be changed. Let’s assume we want to act on the `repeatPassword` field’s `onBlur`\
    \ event and execute both password fields:\n\n```\n<f:ajax event=\"blur\" execute=\"\
    @this password\" render=\"msgRepeatPassword\"/>\n```\n\nWe’ll go over these and\
    \ other options and attributes when we discuss more complex forms.\n\nBesides\
    \ nesting this tag into a component’s tag, it’s possible to nest one or more components\
    \ inside the `<f:ajax>` tag, as seen in Listing [26-2](#A435433_1_En_26_Chapter.xhtml#PC3).\n\
    \n### Listing 26-2 AJAX as Parent for Other Components\n\n```\n01 <f:ajax>\n02\
    \   <component1/>                                                            \
    \    \n03   <component2/>\n04   ...\n05 </f:ajax>\n```\n\nInstead of using the\
    \ `ajax` tag, you might use the JSF JavaScript API—for example, if implementing\
    \ a form using HTML-friendly markup, or when you like to combine the partial request\
    \ with other scripts, such as performing some JavaScript validation and sending\
    \ the partial request afterwards.\n\nListing [26-3](#A435433_1_En_26_Chapter.xhtml#PC4)\
    \ shows an example of an HTML-friendly markup, omitting the JSF tags.\n\n### Listing\
    \ 26-3 AJAX with HTML-Friendly Markup\n\n```\n<input type=\"input\"\n       jsf:value=\"\
    #{register.password}\"\n       onchange=\"jsf.ajax.request(this, event);\"/>\n\
    ```\n\nHTML uses `onchange` to react on the change event. In JSF’s `ajax` tag,\
    \ the `on` prefix is omitted.\n\nDepending on the requirements, it’s possible\
    \ to receive and process the response directly via JavaScript without using the\
    \ simplicity of the `ajax` tag. See Listing [26-4](#A435433_1_En_26_Chapter.xhtml#PC5).\n\
    \n### Listing 26-4 Skeleton for a Self-Made AJAX Response Handler\n\n```\n 1 \
    \  <script>\n 2   function handleAjax(data) {\n 3     var status = data.status;\n\
    \n 5     switch (status) {\n 6       case \"begin\":\n 7           // start of\
    \ the Ajax request\n 8           break;\n\n10       case \"complete\":\n11   \
    \        // Ajax response is completed\n12           break;\n\n14       case \"\
    success\":\n15           // Ajax response is processed and HTML DOM updated\n\
    16           alert(data.responseText);\n17           break;\n18     }\n19   }\n\
    \n21   jsf.ajax.addOnEvent(handleAjax);\n22   </script>\n```\n\nListing [26-4](#A435433_1_En_26_Chapter.xhtml#PC5)\
    \ shows the principle of such a handler. Line 21 registers the `handleAjax` function\
    \ to the `onEvent` handler. Now this function will be called several times with\
    \ its current status: at the start of the request (line 6), when the response\
    \ is completed (line 10), and just after the HTML DOM has been updated after successfully\
    \ processing the response (line 14). In this example we simply alert the response’s\
    \ text.\n\nUsing the JavaScript approach might be helpful for special requirements.\
    \ I mention it here for completeness. (Within the Java EE 8 tutorial, there’s\
    \ one page about JavaScript AJAX, at [https://javaee.github.io/tutorial/jsf-ajax010.html](https://javaee.github.io/tutorial/jsf-ajax010.html).)\
    \ We’ll use the JSF `ajax` tag.\n\nListing [26-1](#A435433_1_En_26_Chapter.xhtml#PC1)\
    \ showed basic use of the `ajax` tag only. Besides defining the elements that\
    \ will be rendered during the response, we can define the event to react on or\
    \ the GUI elements that will be processed by invoking their setters on the server\
    \ side. We can also define a *listener*—a method that will be invoked on the server\
    \ side. I’ll explain such features later in this book when they’re used for Alumni.\n\
    \n## Summary\n\nAJAX can be used to send partial requests to the server. Because\
    \ only small parts of the page are used in such a request-respond cycle, the communication\
    \ usually performs quickly. This technique allows transfer of a single field into\
    \ the data model and/or provides immediate feedback to the user.\n\nAJAXifying\
    \ a JSF application is as simple as adding the `<f:ajax>` tag to a component.\
    \ Due to defaults, this is sufficient in many cases. For more complete control,\
    \ the application developer may add attributes to override the defaults.\n\nA\
    \ partial request might be initiated by a script, too. JSF offers an appropriate\
    \ library.\n\n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE\
    \ 8, [https://doi.org/10.1007/978-1-4842-3030-5_27](#A435433_1_En_27_Chapter.xhtml)"
