    11       [...]

    12     }


    14   [...]

    15   }

    ```


    一旦 Bean 如此准备好，它就会记录每一次创建（更准确地说，它会记录每次由 CDI 创建的情况——如果是由 `new` 创建的，则不会调用 `init`）。现在，我们可以通过不同的方式调用我们的书籍编辑器来观察其行为。


    为了测试目的，在清单 17-3 中，我们将在 `adminTemplate.xhtml` 的导航部分添加两个指向书籍编辑器的链接。


    ###### 清单 17-3 测试链接：导航到 bookEditor.xhtml


