    #{register.register()}\"\n47                        styleClass=\"button\"/>\n\
    48     </div>\n\n50   </h:form>\n```\n\nThis form contains three AJAXified elements\
    \ (see lines 12, 26, and 40). The render attribute tells JSF which components\
    \ should be rendered when the data is sent back from the server. @this is a special\
    \ keyword that refers to the surrounding (parent) component. msgXXX is the name\
    \ of the associated message.\n\nWhen the user leaves an input field, JSF invokes\
    \ an asynchronous request and sends the content of this field to the server .\
    \ This value will be converted, validated, and if validation succeeded, transferred\
    \ to the model. Then the server sends back the new content of the two mentioned\
    \ components (each @this and the message) to render. Doing so, we provide immediate\
    \ feedback to the user, similar to a desktop application.\n\nUsing the ajax tag\
    \ is quite simple and hides away all the JavaScript code. JSF completely handles\
    \ the server side, so no special programming is needed.\n\nThe form shows a very\
    \ basic use of the <f:ajax> tag, which almost uses some default values. For example,\
    \ we omit the event and the component on which this request executes. By default,\
    \ the parent component of <f:ajax> is executed (sent to the server) during its\
    \ change event. The default event depends on the component’s type. If the component\
    \ holds a value (such as inputText, selectOneMenu, and so on), then the default\
    \ is onChange. For components that are clicked, like buttons or links, it defaults\
    \ to onClick.\n\nAll these defaults might be changed. Let’s assume we want to\
    \ act on the repeatPassword field’s onBlur event and execute both password fields:\n\
    \n```\n<f:ajax event=\"blur\" execute=\"@this password\" render=\"msgRepeatPassword\"\
    />\n```\n\nWe’ll go over these and other options and attributes when we discuss\
    \ more complex forms.\n\nBesides nesting this tag into a component’s tag, it’s\
    \ possible to nest one or more components inside the <f:ajax> tag, as seen in\
    \ Listing [26-2](#A435433_1_En_26_Chapter.xhtml#PC3).\n\n###### Listing 26-2 AJAX\
    \ as Parent for Other Components\n\n```\n01 <f:ajax>\n02   <component1/>     \
    \                                                           \n03   <component2/>\n\
    04   ...\n05 </f:ajax>\n```\n\nInstead of using the ajax tag, you might use the\
    \ JSF JavaScript API—for example, if implementing a form using HTML-friendly markup,\
    \ or when you like to combine the partial request with other scripts, such as\
    \ performing some JavaScript validation and sending the partial request afterwards.\n\
    \nListing [26-3](#A435433_1_En_26_Chapter.xhtml#PC4) shows an example of an HTML-friendly\
    \ markup , omitting the JSF tags.\n\n###### Listing 26-3 AJAX with HTML-Friendly\
    \ Markup\n\n```\n<input type=\"input\"\n       jsf:value=\"#{register.password}\"\
    \n       onchange=\"jsf.ajax.request(this, event);\"/>\n```\n\nHTML uses onchange\
    \ to react on the change event. In JSF’s ajax tag, the on prefix is omitted.\n\
    \nDepending on the requirements , it’s possible to receive and process the response\
    \ directly via JavaScript without using the simplicity of the ajax tag. See Listing\
    \ [26-4](#A435433_1_En_26_Chapter.xhtml#PC5).\n\n###### Listing 26-4 Skeleton\
    \ for a Self-Made AJAX Response Handler\n\n```\n 1   <script>\n 2   function handleAjax(data)\
    \ {\n 3     var status = data.status;\n\n 5     switch (status) {\n 6       case\
    \ \"begin\":\n 7           // start of the Ajax request\n 8           break;\n\
    \n10       case \"complete\":\n11           // Ajax response is completed\n12           break;\n\
    \n14       case \"success\":\n15           // Ajax response is processed and HTML\
    \ DOM updated\n16           alert(data.responseText);\n17           break;\n18     }\n\
    19   }\n\n21   jsf.ajax.addOnEvent(handleAjax);\n22   </script>\n```\n\nListing\
    \ [26-4](#A435433_1_En_26_Chapter.xhtml#PC5) shows the principle of such a handler.\
    \ Line 21 registers the handleAjax function to the onEvent handler. Now this function\
    \ will be called several times with its current status: at the start of the request\
    \ (line 6), when the response is completed (line 10), and just after the HTML\
    \ DOM has been updated after successfully processing the response (line 14). In\
    \ this example we simply alert the response’s text.\n\nUsing the JavaScript approach\
    \ might be helpful for special requirements. I mention it here for completeness.\
    \ (Within the Java EE 8 tutorial, there’s one page about JavaScript AJAX, at [https://javaee.github.io/tutorial/jsf-ajax010.html](https://javaee.github.io/tutorial/jsf-ajax010.html)\
    \ .) We’ll use the JSF ajax tag.\n\nListing [26-1](#A435433_1_En_26_Chapter.xhtml#PC1)\
    \ showed basic use of the ajax tag only. Besides defining the elements that will\
    \ be rendered during the response, we can define the event to react on or the\
    \ GUI elements that will be processed by invoking their setters on the server\
    \ side. We can also define a *listener*—a method that will be invoked on the server\
    \ side. I’ll explain such features later in this book when they’re used for Alumni\
    \ .\n\n## Summary\n\nAJAX can be used to send partial requests to the server.\
    \ Because only small parts of the page are used in such a request-respond cycle,\
    \ the communication usually performs quickly. This technique allows transfer of\
    \ a single field into the data model and/or provides immediate feedback to the\
    \ user.\n\nAJAXifying a JSF application is as simple as adding the <f:ajax> tag\
    \ to a component. Due to defaults, this is sufficient in many cases. For more\
    \ complete control, the application developer may add attributes to override the\
    \ defaults.\n\nA partial request might be initiated by a script, too. JSF offers\
    \ an appropriate library.\n\n© Michael Müller 2018\n\nMichael Müller, Practical\
    \ JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_27](#A435433_1_En_27_Chapter.xhtml)"
  trans: "\n###### 清单 26-1 注册表单，AJAX 化（节选）\n\n```\n 1   <h:form>\n\n 3     <div class=\"\
    inputPart\">\n 4       <h:outputLabel for=\"firstName\"\n 5                      value=\"\
    #{msg.lblFirstName}\"\n 6                      styleClass=\"label\"/>\n 7       <h:message\
    \ id=\"msgFirstName\" for=\"firstName\"\n 8                  styleClass=\"errorMessage\"\
    />\n 9       <h:inputText id=\"firstName\"\n10                    value=\"#{register.account.firstName}\"\
    \n11                    styleClass=\"inputFull\">\n12         <f:ajax render=\"\
    @this msgFirstName\"/>                                                       \
    \         \n13       </h:inputText>\n14     </div>\n\n16     <div class=\"inputPart\"\
    >\n17       <h:outputLabel for=\"lastName\"\n18                      value=\"\
    #{msg.lblLastName}\"\n19                      styleClass=\"label\"/>\n20       <h:message\
    \ id=\"msgLastName\"\n21                  for=\"lastName\"\n22                  styleClass=\"\
    errorMessage\"/>\n23       <h:inputText id=\"lastName\"\n24                    value=\"\
    #{register.account.lastName}\"\n25                    styleClass=\"inputFull\"\
    >\n26          <f:ajax render=\"@this msgLastName\"/>\n27        </h:inputText>\n\
    28     </div>\n\n30     <div class=\"inputPart\">\n31       <h:outputLabel for=\"\
    email\"\n32                      value=\"#{msg.lblEmail}\"\n33                      styleClass=\"\
    label\"/>\n34       <h:message id=\"msgEmail\"\n35                  for=\"email\"\
    \n36                  styleClass=\"errorMessage\"/>\n37       <h:inputText id=\"\
    email\"\n38                    value=\"#{register.account.email}\"\n39                    styleClass=\"\
    inputFull\">\n40         <f:ajax render=\"@this msgEmail\"/>\n41       </h:inputText>\n\
    42     </div>\n\n44     <div class=\"buttonBar\">\n45       <h:commandButton value=\"\
    #{msg.btnRegister}\"                                                         \
    \       \n46                        action=\"#{register.register()}\"\n47                        styleClass=\"\
    button\"/>\n48     </div>\n\n50   </h:form>\n```\n\n该表单包含三个 AJAX 化元素（见第 12、26\
    \ 和 40 行）。`render` 属性告诉 JSF 当数据从服务器返回时应渲染哪些组件。`@this` 是一个特殊关键字，指代其所在的（父级）组件。`msgXXX`\
    \ 是关联消息的名称。\n\n当用户离开某个输入字段时，JSF 会发起一个异步请求，并将该字段的内容发送到服务器。该值将被转换、验证，如果验证成功，则传输到模型。然后服务器会发回上述两个组件（每个\
    \ `@this` 和消息）的新内容进行渲染。通过这种方式，我们为用户提供了即时反馈，类似于桌面应用程序。\n\n使用 ajax 标签非常简单，并且隐藏了所有\
    \ JavaScript 代码。JSF 完全处理服务器端，因此无需特殊编程。\n\n该表单展示了 `<f:ajax>` 标签非常基础的使用方式，几乎使用了默认值。例如，我们省略了事件以及执行此请求的组件。默认情况下，`<f:ajax>`\
    \ 的父组件会在其 `change` 事件期间被执行（发送到服务器）。默认事件取决于组件的类型。如果组件包含值（例如 `inputText`、`selectOneMenu`\
    \ 等），则默认事件是 `onChange`。对于被点击的组件，如按钮或链接，默认事件是 `onClick`。\n\n所有这些默认值都可以更改。假设我们想对\
    \ `repeatPassword` 字段的 `onBlur` 事件做出响应，并执行两个密码字段：\n\n```\n<f:ajax event=\"blur\"\
    \ execute=\"@this password\" render=\"msgRepeatPassword\"/>\n```\n\n我们将在讨论更复杂的表单时详细介绍这些及其他选项和属性。\n\
    \n除了将此标签嵌套在组件标签内，还可以将一个或多个组件嵌套在 `<f:ajax>` 标签内，如清单 26-2 所示。\n\n###### 清单 26-2\
    \ AJAX 作为其他组件的父级\n\n```\n01 <f:ajax>\n02   <component1/>                     \
    \                                           \n03   <component2/>\n04   ...\n05\
    \ </f:ajax>\n```\n\n除了使用 ajax 标签，您还可以使用 JSF JavaScript API——例如，在使用 HTML 友好标记实现表单时，或者当您希望将部分请求与其他脚本结合使用时，例如执行一些\
    \ JavaScript 验证，然后再发送部分请求。\n\n清单 26-3 展示了一个 HTML 友好标记的示例，省略了 JSF 标签。\n\n######\
    \ 清单 26-3 使用 HTML 友好标记的 AJAX\n\n```\n<input type=\"input\"\n       jsf:value=\"\
    #{register.password}\"\n       onchange=\"jsf.ajax.request(this, event);\"/>\n\
    ```\n\nHTML 使用 `onchange` 来响应 `change` 事件。在 JSF 的 ajax 标签中，`on` 前缀被省略了。\n\n根据需求，可以直接通过\
    \ JavaScript 接收和处理响应，而无需使用简单的 ajax 标签。请参见清单 26-4。\n\n###### 清单 26-4 自定义 AJAX 响应处理程序的框架\n\
    \n```\n 1   <script>\n 2   function handleAjax(data) {\n 3     var status = data.status;\n\
    \n 5     switch (status) {\n 6       case \"begin\":\n 7           // Ajax 请求开始\n\
     8           break;\n\n10       case \"complete\":\n11           // Ajax 响应完成\n\
    12           break;\n\n14       case \"success\":\n15           // Ajax 响应已处理，HTML\
    \ DOM 已更新\n16           alert(data.responseText);\n17           break;\n18     }\n\
    19   }\n\n21   jsf.ajax.addOnEvent(handleAjax);\n22   </script>\n```\n\n清单 26-4\
    \ 展示了此类处理程序的原理。第 21 行将 `handleAjax` 函数注册到 `onEvent` 处理程序。现在，该函数将根据其当前状态被多次调用：在请求开始时（第\
    \ 6 行），在响应完成时（第 10 行），以及在成功处理响应后 HTML DOM 刚刚更新时（第 14 行）。在此示例中，我们简单地弹出了响应的文本。\n\
    \n使用 JavaScript 方法可能对特殊需求有所帮助。我在此提及它只是为了完整性。（在 Java EE 8 教程中，有一页关于 JavaScript\
    \ AJAX 的内容，网址为 [`javaee.github.io/tutorial/jsf-ajax010.html`](https://javaee.github.io/tutorial/jsf-ajax010.html)。）我们将使用\
    \ JSF ajax 标签。\n\n清单 26-1 仅展示了 ajax 标签的基本用法。除了定义在响应期间要渲染的元素外，我们还可以定义要响应的事件，或者通过调用服务器端的\
    \ setter 方法来处理的 GUI 元素。我们还可以定义一个 *监听器*——一个将在服务器端调用的方法。我将在本书后面介绍 Alumni 时解释这些功能。\n\
    \n## 总结\n\nAJAX 可用于向服务器发送部分请求。由于在此类请求-响应周期中只使用页面的一小部分，因此通信通常执行得很快。此技术允许将单个字段传输到数据模型，和/或向用户提供即时反馈。\n\
    \n将 JSF 应用程序 AJAX 化就像向组件添加 `<f:ajax>` 标签一样简单。由于默认值的存在，这在许多情况下已经足够。为了更全面的控制，应用程序开发人员可以添加属性来覆盖默认值。\n\
    \n部分请求也可以由脚本发起。JSF 提供了相应的库。\n\n© Michael Müller 2018\n\nMichael Müller, Practical\
    \ JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_27`\n"
- fmt: "# 27. Building Composite Components\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nRemember the questions at the end of Chapter [24](#A435433_1_En_24_Chapter.xhtml)?\
    \ Is it possible to predefine and reuse such similar input structures? This chapter\
    \ shows how to build such components.\n\nBefore JSF 2.0, you could still create\
    \ your own components. These custom components follow a special convention to\
    \ programmatically implement behavior with Java code. Sometimes that’s useful\
    \ to create components with completely new behavior.\n\nBeginning with JSF 2.0,\
    \ a new feature was introduced: *composite components*. With this feature you\
    \ simply use Facelets to compose reusable components of existing elements —you\
    \ can treat them as kind of lightweight custom components.\n\n## Transform into\
    \ a Composition\n\nIn the registration form, we use a label, input field, and\
    \ message for almost every data field. The goal is to transform this coherent\
    \ series of components into a composition—a composite component.\n\nListing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1)\
    \ takes a look at the input part for `firstName`.\n\n###### Listing 27-1 Input\
    \ Part for `firstName`\n\n```\n  1     <div class=\"inputPart\">\n  2       <h:outputLabel\
    \ for=\"firstName\"\n  3                      value=\"#{msg.lblFirstName}\"\n\
      4                      styleClass=\"label\"/>\n  5       <h:inputText id=\"\
    firstName\"\n  6                    value=\"#{register.account.firstName}\"\n\
      7                    styleClass=\"inputMedium\">\n  8         <f:ajax render=\"\
    @this msgFirstName\"/>\n  9       </h:inputText>\n10       <h:message id=\"msgFirstName\"\
    \ for=\"firstName\"\n11                  styleClass=\"errorMessage\"/>       \
    \                                                                            \
    \   \n12     </div>\n```\n\nThis is composed of a label, an AJAXified input field,\
    \ and a message, all nested within a `div`. The same structure applies to `lastName`.\
    \ `Email` is similar but contains an additional validator. We’ll focus on the\
    \ names first to create a simple version of a reusable composite component.\n\n\
    Now let’s treat the part shown in Listing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1)\
    \ as a component. It displays a label and offers an input field for a variable.\
    \ If we want to use it for the last name, we have to exchange these two values\
    \ from outside of this component. Both the `ajax` and the `message` tags are used\
    \ inside the component only. There’s no need to pass some value from the outside\
    \ into these tags.\n\nIf we want to convert this snippet into a component, we\
    \ need to define something to pass the label text as well as the input variable\
    \ into. We need to define an interface with two attributes. For the interface\
    \ definition of composite components, JSF offers some special tags from the composite\
    \ library. Usually the related namespace `http://xmlns.jcp.org/jsf/composite`\
    \ would be assigned to the alias `cc`.\n\nBesides the interface, Listing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1)\
    \ would become the implementation. We need to replace the concrete expressions\
    \ with the two defined within the interface. Because the ids aren’t related to\
    \ concrete values anymore, we may choose some generalized names.\n\nWhew! It seems\
    \ there’s a lot to do. But even though it may sound complicated, it’s only a little\
    \ change, as demonstrated by the code of this component, shown in Listing [27-2](#A435433_1_En_27_Chapter.xhtml#PC2).\n\
    \n###### Listing 27-2 Input Part as Composite Component\n\n```\n 1   <?xml version='1.0'  encoding='UTF-8'  ?>\n\
     2   <html xmlns=\"http://www.w3.org/1999/xhtml\"\n 3         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">                                             \
    \                                         \n\n 7     <!-- INTERFACE -->\n 8     <cc:interface>\n\
     9       <cc:attribute name=\"label\"/>\n10       <cc:attribute name=\"value\"\
    />\n11     </cc:interface>\n\n13     <!-- IMPLEMENTATION -->\n14     <cc:implementation>\n\
    15       <div class=\"inputPart\">\n16         <h:outputLabel for=\"input\"\n\
    17                        value=\"#{cc.attrs.label}\"\n18                        styleClass=\"\
    label\"/>\n19         <h:inputText id=\"input\"\n20                      value=\"\
    #{cc.attrs.value}\"\n21                      requiredMessage=\"#{msg.msgValueRequired}\"\
    \n22                      styleClass=\"inputMedium\">\n23           <f:ajax render=\"\
    @this msgInput\"/>\n24         </h:inputText>\n25         <h:message id=\"msgInput\"\
    \ for=\"input\" styleClass=\"errorMessage\"/>\n26       </div>\n27     </cc:implementation>\n\
    28   </html>\n```\n\nWithin the `<cc:implementation>` tag, you’ll find the transformed\
    \ code snippet. It really looks similar. But instead of concrete values referring\
    \ to the label and input field, we now use `#{cc.attrs.XXX}`, where `XXX` represents\
    \ each an attribute of the interface.\n\nAlthough the HTML is ready, we still\
    \ have to perform some more (simple) tasks to use this component. First of all,\
    \ JSF looks for components in certain places. Remember the resources folder under\
    \ the `webapp` folder? We have to place the component into this or another valid\
    \ resources location. Let’s create a subfolder called `components` and save our\
    \ file into that location. As a name for our component, we’ll choose `LabeledText`.\n\
    \nSo far, we’ve prepared the component. Now let’s use it. First we have to reference\
    \ our component file by a special namespace: `http://xmlns.jcp.org/jsf/composite`.\
    \ We need to append the folder we used to store our components under the resources.\
    \ We’ve chosen `components`, so we have to add that. And, as usual for a namespace\
    \ declaration, we have to use an alias. I’ve chosen `mm` for my components. So,\
    \ the whole namespace declaration becomes this:\n\n```\nxmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n```\n\nListing [27-3](#A435433_1_En_27_Chapter.xhtml#PC4) shows our page and\
    \ shows how to use our component.\n\n###### Listing 27-3 Refactored Page That\
    \ Uses Composite Components\n\n```\n 1   <?xml version='1.0' encoding='UTF-8'\
    \ ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n 4                   template=\"/common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\
    \n 7                   xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n 8                   xmlns:mm=\"\
    http://xmlns.jcp.org/jsf/composite/components\">\n\n10     <ui:define name=\"\
    content\">\n11       <h1>Register</h1>\n\n13       <h:form>\n\n15         <mm:LabeledText\
    \ label=\"#{msg.lblFirstName}\"\n16                         value=\"#{register.accountRequest.firstName}\"\
      />\n17         <mm:LabeledText label=\"#{msg.lblLastName}\"\n18                         value=\"\
    #{register.accountRequest.lastName}\"  />\n\n20         [other markup omitted\
    \ for brevity]\n\n22       </h:form>\n23     </ui:define>\n24   </ui:composition>\n\
    ```\n\nThe preceding listing shows how to use our component for both the first\
    \ name and the last name input parts. All we need to do is to reference the component\
    \ by the namespace alias plus the filename we’ve chosen (lines 15–18) and then\
    \ to each pass two values by the names we’ve defined in the interface. The code\
    \ became quite short and concise. Each component (`firstName`, `lastName`) needs\
    \ just 2 lines instead of the 12 lines we needed before as seen in Listing [27-2](#A435433_1_En_27_Chapter.xhtml#PC2).\
    \ Really nice, isn’t it?"
  raw: "# 27. Building Composite Components\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nRemember the questions at the end of Chapter [24](#A435433_1_En_24_Chapter.xhtml)?\
    \ Is it possible to predefine and reuse such similar input structures? This chapter\
    \ shows how to build such components.\n\nBefore JSF 2.0, you could still create\
    \ your own components. These custom components follow a special convention to\
    \ programmatically implement behavior with Java code. Sometimes that’s useful\
    \ to create components with completely new behavior.\n\nBeginning with JSF 2.0,\
    \ a new feature was introduced: *composite components*. With this feature you\
    \ simply use Facelets to compose reusable components of existing elements —you\
    \ can treat them as kind of lightweight custom components.\n\n## Transform into\
    \ a Composition\n\nIn the registration form, we use a label, input field, and\
    \ message for almost every data field. The goal is to transform this coherent\
    \ series of components into a composition—a composite component.\n\nListing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1)\
    \ takes a look at the input part for firstName.\n\n###### Listing 27-1 Input Part\
    \ for firstName\n\n```\n  1     <div class=\"inputPart\">\n  2       <h:outputLabel\
    \ for=\"firstName\"\n  3                      value=\"#{msg.lblFirstName}\"\n\
      4                      styleClass=\"label\"/>\n  5       <h:inputText id=\"\
    firstName\"\n  6                    value=\"#{register.account.firstName}\"\n\
      7                    styleClass=\"inputMedium\">\n  8         <f:ajax render=\"\
    @this msgFirstName\"/>\n  9       </h:inputText>\n10       <h:message id=\"msgFirstName\"\
    \ for=\"firstName\"\n11                  styleClass=\"errorMessage\"/>       \
    \                                                                            \
    \   \n12     </div>\n```\n\nThis is composed of a label, an AJAXified input field,\
    \ and a message, all nested within a div. The same structure applies to lastName.\
    \ Email is similar but contains an additional validator. We’ll focus on the names\
    \ first to create a simple version of a reusable composite component.\n\nNow let’s\
    \ treat the part shown in Listing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1) as\
    \ a component. It displays a label and offers an input field for a variable. If\
    \ we want to use it for the last name, we have to exchange these two values from\
    \ outside of this component. Both the ajax and the message tags are used inside\
    \ the component only. There’s no need to pass some value from the outside into\
    \ these tags.\n\nIf we want to convert this snippet into a component, we need\
    \ to define something to pass the label text as well as the input variable into.\
    \ We need to define an interface with two attributes. For the interface definition\
    \ of composite components, JSF offers some special tags from the composite library.\
    \ Usually the related namespace [http://xmlns.jcp.org/jsf/composite](http://xmlns.jcp.org/jsf/composite)\
    \ would be assigned to the alias cc.\n\nBesides the interface, Listing [27-1](#A435433_1_En_27_Chapter.xhtml#PC1)\
    \ would become the implementation. We need to replace the concrete expressions\
    \ with the two defined within the interface. Because the ids aren’t related to\
    \ concrete values anymore, we may choose some generalized names.\n\nWhew! It seems\
    \ there’s a lot to do. But even though it may sound complicated, it’s only a little\
    \ change, as demonstrated by the code of this component , shown in Listing [27-2](#A435433_1_En_27_Chapter.xhtml#PC2).\n\
    \n###### Listing 27-2 Input Part as Composite Component\n\n```\n 1   <?xml version='1.0'  encoding='UTF-8'  ?>\n\
     2   <html xmlns=\"http://www.w3.org/1999/xhtml\"\n 3         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">                                             \
    \                                         \n\n 7     <!-- INTERFACE -->\n 8     <cc:interface>\n\
     9       <cc:attribute name=\"label\"/>\n10       <cc:attribute name=\"value\"\
    />\n11     </cc:interface>\n\n13     <!-- IMPLEMENTATION -->\n14     <cc:implementation>\n\
    15       <div class=\"inputPart\">\n16         <h:outputLabel for=\"input\"\n\
    17                        value=\"#{cc.attrs.label}\"\n18                        styleClass=\"\
    label\"/>\n19         <h:inputText id=\"input\"\n20                      value=\"\
    #{cc.attrs.value}\"\n21                      requiredMessage=\"#{msg.msgValueRequired}\"\
    \n22                      styleClass=\"inputMedium\">\n23           <f:ajax render=\"\
    @this msgInput\"/>\n24         </h:inputText>\n25         <h:message id=\"msgInput\"\
    \ for=\"input\" styleClass=\"errorMessage\"/>\n26       </div>\n27     </cc:implementation>\n\
    28   </html>\n```\n\nWithin the <cc: implementation> tag , you’ll find the transformed\
    \ code snippet. It really looks similar. But instead of concrete values referring\
    \ to the label and input field, we now use #{cc.attrs.XXX}, where XXX represents\
    \ each an attribute of the interface.\n\nAlthough the HTML is ready, we still\
    \ have to perform some more (simple) tasks to use this component. First of all,\
    \ JSF looks for components in certain places. Remember the resources folder under\
    \ the webapp folder? We have to place the component into this or another valid\
    \ resources location. Let’s create a subfolder called components and save our\
    \ file into that location. As a name for our component, we’ll choose LabeledText.\n\
    \nSo far, we’ve prepared the component. Now let’s use it. First we have to reference\
    \ our component file by a special namespace: [http://xmlns.jcp.org/jsf/composite](http://xmlns.jcp.org/jsf/composite)\
    \ . We need to append the folder we used to store our components under the resources.\
    \ We’ve chosen components, so we have to add that. And, as usual for a namespace\
    \ declaration, we have to use an alias. I’ve chosen mm for my components. So,\
    \ the whole namespace declaration becomes this:\n\n```\nxmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n```\n\nListing [27-3](#A435433_1_En_27_Chapter.xhtml#PC4) shows our page and\
    \ shows how to use our component.\n\n###### Listing 27-3 Refactored Page That\
    \ Uses Composite Components\n\n```\n 1   <?xml version='1.0' encoding='UTF-8'\
    \ ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\
    \n 4                   template=\"/common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\
    \n 7                   xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\n 8                   xmlns:mm=\"\
    http://xmlns.jcp.org/jsf/composite/components\">\n\n10     <ui:define name=\"\
    content\">\n11       <h1>Register</h1>\n\n13       <h:form>\n\n15         <mm:LabeledText\
    \ label=\"#{msg.lblFirstName}\"\n16                         value=\"#{register.accountRequest.firstName}\"\
      />\n17         <mm:LabeledText label=\"#{msg.lblLastName}\"\n18                         value=\"\
    #{register.accountRequest.lastName}\"  />\n\n20         [other markup omitted\
    \ for brevity]\n\n22       </h:form>\n23     </ui:define>\n24   </ui:composition>\n\
    ```\n\nThe preceding listing shows how to use our component for both the first\
    \ name and the last name input parts . All we need to do is to reference the component\
    \ by the namespace alias plus the filename we’ve chosen (lines 15–18) and then\
    \ to each pass two values by the names we’ve defined in the interface . The code\
    \ became quite short and concise. Each component (firstName, lastName) needs just\
    \ 2 lines instead of the 12 lines we needed before as seen in Listing [27-2](#A435433_1_En_27_Chapter.xhtml#PC2).\
    \ Really nice, isn’t it?"
  trans: "\n# 27. 构建复合组件\n\nMichael Müller¹\n\n(1)德国北莱茵-威斯特法伦州布吕尔\n\n还记得第 24 章末尾提出的问题吗？是否可以预定义并复用这种相似的输入结构？本章将展示如何构建此类组件。\n\
    \n在 JSF 2.0 之前，你仍然可以创建自己的组件。这些自定义组件遵循特殊约定，通过 Java 代码以编程方式实现行为。有时这对于创建具有全新行为的组件很有用。\n\
    \n从 JSF 2.0 开始，引入了一项新特性：*复合组件*。借助此特性，你可以直接使用 Facelets 将现有元素组合成可复用的组件——你可以将它们视为轻量级的自定义组件。\n\
    \n## 转换为组合\n\n在注册表单中，几乎每个数据字段都使用了标签、输入字段和消息。目标是将这一系列连贯的组件转换为一个组合——即一个复合组件。\n\n\
    清单 27-1 展示了 firstName 的输入部分。\n\n###### 清单 27-1 firstName 的输入部分\n\n```\n  1     <div\
    \ class=\"inputPart\">\n  2       <h:outputLabel for=\"firstName\"\n  3                      value=\"\
    #{msg.lblFirstName}\"\n  4                      styleClass=\"label\"/>\n  5       <h:inputText\
    \ id=\"firstName\"\n  6                    value=\"#{register.account.firstName}\"\
    \n  7                    styleClass=\"inputMedium\">\n  8         <f:ajax render=\"\
    @this msgFirstName\"/>\n  9       </h:inputText>\n10       <h:message id=\"msgFirstName\"\
    \ for=\"firstName\"\n11                  styleClass=\"errorMessage\"/>       \
    \                                                                            \
    \   \n12     </div>\n```\n\n这段代码由标签、一个支持 AJAX 的输入字段和一条消息组成，全部嵌套在一个 div 中。同样的结构也适用于\
    \ lastName。Email 类似，但包含一个额外的验证器。我们将首先关注名字部分，以创建一个简单版本的可复用复合组件。\n\n现在，让我们将清单 27-1\
    \ 中显示的部分视为一个组件。它显示一个标签，并为变量提供一个输入字段。如果我们想将其用于姓氏，就必须从组件外部交换这两个值。ajax 和 message\
    \ 标签仅在组件内部使用，无需从外部向这些标签传递任何值。\n\n如果我们想将此代码片段转换为组件，就需要定义一些内容，以便将标签文本和输入变量传递进去。我们需要定义一个包含两个属性的接口。对于复合组件的接口定义，JSF\
    \ 提供了复合库中的一些特殊标签。通常，相关命名空间 [`xmlns.jcp.org/jsf/composite`](http://xmlns.jcp.org/jsf/composite)\
    \ 会被分配给别名 cc。\n\n除了接口之外，清单 27-1 将成为实现部分。我们需要将具体的表达式替换为接口中定义的两个表达式。由于 id 不再与具体值相关，我们可以选择一些通用的名称。\n\
    \n哇！看起来要做的事情很多。但尽管听起来可能很复杂，实际上只需做一点改动，如该组件的代码所示，见清单 27-2。\n\n###### 清单 27-2 作为复合组件的输入部分\n\
    \n```\n 1   <?xml version='1.0'  encoding='UTF-8'  ?>\n 2   <html xmlns=\"http://www.w3.org/1999/xhtml\"\
    \n 3         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\n 4         xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    >                                                                            \
    \          \n\n 7     <!-- 接口 -->\n 8     <cc:interface>\n 9       <cc:attribute\
    \ name=\"label\"/>\n10       <cc:attribute name=\"value\"/>\n11     </cc:interface>\n\
    \n13     <!-- 实现 -->\n14     <cc:implementation>\n15       <div class=\"inputPart\"\
    >\n16         <h:outputLabel for=\"input\"\n17                        value=\"\
    #{cc.attrs.label}\"\n18                        styleClass=\"label\"/>\n19         <h:inputText\
    \ id=\"input\"\n20                      value=\"#{cc.attrs.value}\"\n21                      requiredMessage=\"\
    #{msg.msgValueRequired}\"\n22                      styleClass=\"inputMedium\"\
    >\n23           <f:ajax render=\"@this msgInput\"/>\n24         </h:inputText>\n\
    25         <h:message id=\"msgInput\" for=\"input\" styleClass=\"errorMessage\"\
    />\n26       </div>\n27     </cc:implementation>\n28   </html>\n```\n\n在 `<cc:implementation>`\
    \ 标签内，你会看到转换后的代码片段。它看起来确实很相似。但现在我们不再使用引用标签和输入字段的具体值，而是使用 `#{cc.attrs.XXX}`，其中\
    \ XXX 代表接口的每个属性。\n\n虽然 HTML 已经就绪，但我们还需要完成一些（简单的）任务才能使用此组件。首先，JSF 会在特定位置查找组件。还记得\
    \ webapp 文件夹下的 resources 文件夹吗？我们必须将组件放入此文件夹或其他有效的资源位置。让我们创建一个名为 components 的子文件夹，并将文件保存到该位置。我们将组件命名为\
    \ LabeledText。\n\n到目前为止，我们已经准备好了组件。现在让我们使用它。首先，我们需要通过一个特殊的命名空间来引用我们的组件文件：[`xmlns.jcp.org/jsf/composite`](http://xmlns.jcp.org/jsf/composite)。我们需要附加用于存储组件的\
    \ resources 下的文件夹。我们选择了 components，因此需要添加它。并且，与命名空间声明的惯例一样，我们必须使用一个别名。我为我的组件选择了\
    \ mm。因此，整个命名空间声明变为：\n\n```\nxmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n```\n\n清单 27-3 展示了我们的页面以及如何使用我们的组件。\n\n###### 清单 27-3 使用复合组件的重构页面\n\n```\n 1   <?xml\
    \ version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition\
    \ xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 4                   template=\"\
    /common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\n 7                   xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\"\n 8                   xmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    >\n\n10     <ui:define name=\"content\">\n11       <h1>注册</h1>\n\n13       <h:form>\n\
    \n15         <mm:LabeledText label=\"#{msg.lblFirstName}\"\n16                         value=\"\
    #{register.accountRequest.firstName}\"  />\n17         <mm:LabeledText label=\"\
    #{msg.lblLastName}\"\n18                         value=\"#{register.accountRequest.lastName}\"\
      />\n\n20         [为简洁起见，省略了其他标记]\n\n22       </h:form>\n23     </ui:define>\n\
    24   </ui:composition>\n```\n\n上面的清单展示了如何将我们的组件用于名字和姓氏的输入部分。我们只需要通过命名空间别名加上我们选择的文件名来引用组件（第\
    \ 15–18 行），然后通过我们在接口中定义的名称向每个组件传递两个值。代码变得非常简短和简洁。每个组件（firstName、lastName）只需要 2\
    \ 行代码，而不是像清单 27-2 中那样需要 12 行。真的很棒，不是吗？\n"
- fmt: "## Enable Child Element for the Composition\n\nNext we have to tackle the\
    \ email input component. In addition to the parts we’ve used so far, we have to\
    \ consider the validator. One possible solution would be to define a validator\
    \ inside our component. But there are a couple of different validators that might\
    \ be used to validate an input. To consider all of them could result in messy\
    \ code, with conditions to display none or just one of them. It would be more\
    \ flexible if we just could nest a validator or other components into our `labeledText`\
    \ as we do with other components. See Listing [27-4](#A435433_1_En_27_Chapter.xhtml#PC5).\n\
    \n###### Listing 27-4 Use Component `LabeledText`\n\n```\n1   <mm:LabeledText\
    \ label=\"#{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"input\"/>\n4   </mm:LabeledText>\n\
    ```\n\nIn Listing [27-4](#A435433_1_En_27_Chapter.xhtml#PC5), I simply nested\
    \ the validator into `labeledText` as we nested the validator into the `inputText`\
    \ tag of the original registration form. Yet if we run the application with this\
    \ code in the registration, the validator wouldn’t be invoked.\n\nWhy not? Imagine\
    \ a composite component composed of a couple of input elements—a common scenario.\
    \ For which of these elements is the validator for? Yes, we used an id `input`\
    \ for the internal `inputText`. As with a local variable in a Java method, we\
    \ can’t reach the internal element from outside. Rather, we have to define a kind\
    \ of forwarding of the validator to the desired internal element. And that’s what\
    \ `editableValueHolder` is for. As its name suggests, this tag links to the internal\
    \ component that’s used to hold the value. But more than that, it may point to\
    \ multiple targets:\n\n```\n<cc:editableValueHolder  name=\"input\"/>\n```\n\n\
    `name` is the name we need to use in the `for` of the validator. Defining targets,\
    \ we can redirect from an “outside name” to the internal component(s):\n\n```\n\
    <cc:editableValueHolder name=\"input\" targets=\"input\"/>\n```\n\nIf we omit\
    \ the `targets` attribute, it defaults to the same as defined for `name`. So,\
    \ the preceding code is semantically the same as before. But we may use a different\
    \ name:\n\n```\n<cc:editableValueHolder name=\"email\" targets=\"input\"/>\n```\n\
    \nThis defines a name that can be used outside the component and its internal\
    \ target(s). Now we have to declare `for=\"email\"` within the validator. In most\
    \ JSF tutorials or code snippets, you’ll find the `editableValueHolder` nested\
    \ into the `<cc:interface>` tag. But you can also place it within `<cc:implementation>`.\
    \ I recommend doing that because it enables more variable usage.\n\nTake a look\
    \ at the Facelets fragment in Listing [27-5](#A435433_1_En_27_Chapter.xhtml#PC9).\n\
    \n###### Listing 27-5 Use `id` for Composite Component\n\n```\n1   <mm:LabeledText\
    \ id=\"myId\" label=\"#{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"myId\"/>\n4   </mm:LabeledText>\n\
    ```\n\nWe’ve defined an `id` for our element. And as usual we used this `id` at\
    \ the `for` attribute of the validator. Until now, we can’t use it this way because\
    \ our `editableValueHolder` has the name `\"email\"` and that’s what we need to\
    \ use. Can’t we use the component’s `id` as name of the `editableValueHolder`?\
    \ The good news is yes, that’s possible if we use it within the implementation.\
    \ The EL has two predefined variables pointing to the `id`: either `#{cc.attrs.id}`\
    \ or simply `#{cc.id}`. See Figure 27-6.\n\n###### Listing 27-6 Component `LabeledText`\
    \ Using Variable `id` for `editableValueHolder`\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8' ?>\n 2   <html xmlns=\"http://www.w3.org/1999/xhtml\"\n 3 \
    \        xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\n 4         xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"http://xmlns.jcp.org/jsf/core\"\
    >\n\n 7     <!-- INTERFACE -->\n 8     <cc:interface>\n 9       <cc:attribute\
    \ name=\"label\"/>\n10       <cc:attribute name=\"value\"/>\n11     </cc:interface>\n\
    \n13     <!-- IMPLEMENTATION -->\n14     <cc:implementation>\n15       <cc:editableValueHolder\
    \ name=\"#{cc.id}\" targets=\"input\"/>\n16       <div class=\"inputPart\">\n\
    17         <h:outputLabel for=\"input\"\n18                        value=\"#{cc.attrs.label}\"\
    \                                                                \n19        \
    \                styleClass=\"label\"/>\n20         <h:message id=\"msgInput\"\
    \ for=\"input\" styleClass=\"errorMessage\"/>\n21         <h:inputText id=\"input\"\
    \n22                      value=\"#{cc.attrs.value}\"\n23                    \
    \  requiredMessage=\"#{msg.msgValueRequired}\"\n24                      styleClass=\"\
    inputMedium\">\n25           <f:ajax render=\"@this msgInput\"/>\n26         </h:inputText>\n\
    27       </div>\n28     </cc:implementation>\n29   </html>\n```\n\nUsing the component,\
    \ the final register form would become quite short. See Listing [27-7](#A435433_1_En_27_Chapter.xhtml#PC11).\n\
    \n###### Listing 27-7 Register Form Using the Composite Component (Excerpt)\n\n\
    ```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3  \
    \ <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 4         \
    \          template=\"/common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\
    \n 7                   xmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n 8                   xmlns:f=\"http://xmlns.jcp.org/jsf/core\">\n\n10     <ui:define\
    \ name=\"content\">\n11       <h1>Register</h1>\n\n13       <h:form>\n\n15   \
    \      <mm:LabeledText label=\"#{msg.lblFirstName}\"\n16                     \
    \    value=\"#{register.accountRequest.firstName}\"  />\n17         <mm:LabeledText\
    \ label=\"#{msg.lblLastName}\"\n18                         value=\"#{register.accountRequest.lastName}\"\
    />\n\n20         <mm:LabeledText id=\"email\" label=\"#{msg.lblEmail}\"\n21  \
    \                       value=\"#{register.accountRequest.email}\">\n22      \
    \     <f:validator validatorId=\"EmailValidator\" for=\"email\"/>\n23        \
    \ </mm:LabeledText>\n\n25         [other fields omitted for brevity]         \
    \                                                       \n\n27         <div class=\"\
    buttonBar\">\n28           <h:commandButton value=\"#{msg.btnRegister}\"\n29 \
    \                           action=\"#{register.register()}\"\n30            \
    \                styleClass=\"button\"/>\n31         </div>\n\n33       </h:form>\n\
    34     </ui:define>\n35   </ui:composition>\n```\n\n## Pass In Validation Method\n\
    \nFor the multi-component validation of the password fields, Alumni uses a validation\
    \ method (see Chapter [25](#A435433_1_En_25_Chapter.xhtml)). This simple approach\
    \ can’t be moved into a general validator because it needs to know about another\
    \ password field. Because we can’t use a child component for validation as we\
    \ did for the email, we need to pass in a reference to the validation method to\
    \ the composite component.\n\nThe principle should be like passing the value of\
    \ the input field. See Listing [27-8](#A435433_1_En_27_Chapter.xhtml#PC12)."
  raw: "## Enable Child Element for the Composition\n\nNext we have to tackle the\
    \ email input component. In addition to the parts we’ve used so far, we have to\
    \ consider the validator. One possible solution would be to define a validator\
    \ inside our component. But there are a couple of different validators that might\
    \ be used to validate an input. To consider all of them could result in messy\
    \ code, with conditions to display none or just one of them. It would be more\
    \ flexible if we just could nest a validator or other components into our labeledText\
    \ as we do with other components. See Listing [27-4](#A435433_1_En_27_Chapter.xhtml#PC5).\n\
    \n###### Listing 27-4 Use Component LabeledText\n\n```\n1   <mm:LabeledText label=\"\
    #{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"input\"/>\n4   </mm:LabeledText>\n\
    ```\n\nIn Listing [27-4](#A435433_1_En_27_Chapter.xhtml#PC5), I simply nested\
    \ the validator into labeledText as we nested the validator into the inputText\
    \ tag of the original registration form. Yet if we run the application with this\
    \ code in the registration, the validator wouldn’t be invoked.\n\nWhy not? Imagine\
    \ a composite component composed of a couple of input elements—a common scenario.\
    \ For which of these elements is the validator for? Yes, we used an id input for\
    \ the internal inputText. As with a local variable in a Java method, we can’t\
    \ reach the internal element from outside. Rather, we have to define a kind of\
    \ forwarding of the validator to the desired internal element. And that’s what\
    \ editableValueHolder is for. As its name suggests, this tag links to the internal\
    \ component that’s used to hold the value. But more than that, it may point to\
    \ multiple targets:\n\n```\n<cc:editableValueHolder  name=\"input\"/>\n```\n\n\
    name is the name we need to use in the for of the validator. Defining targets,\
    \ we can redirect from an “outside name” to the internal component(s):\n\n```\n\
    <cc:editableValueHolder name=\"input\" targets=\"input\"/>\n```\n\nIf we omit\
    \ the targets attribute, it defaults to the same as defined for name. So, the\
    \ preceding code is semantically the same as before. But we may use a different\
    \ name :\n\n```\n<cc:editableValueHolder name=\"email\" targets=\"input\"/>\n\
    ```\n\nThis defines a name that can be used outside the component and its internal\
    \ target(s). Now we have to declare for=\"email\" within the validator. In most\
    \ JSF tutorials or code snippets, you’ll find the editableValueHolder nested into\
    \ the <cc:interface> tag. But you can also place it within <cc:implementation>.\
    \ I recommend doing that because it enables more variable usage.\n\nTake a look\
    \ at the Facelets fragment in Listing [27-5](#A435433_1_En_27_Chapter.xhtml#PC9).\n\
    \n###### Listing 27-5 Use id for Composite Component\n\n```\n1   <mm:LabeledText\
    \ id=\"myId\" label=\"#{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"myId\"/>\n4   </mm:LabeledText>\n\
    ```\n\nWe’ve defined an id for our element. And as usual we used this id at the\
    \ for attribute of the validator. Until now, we can’t use it this way because\
    \ our editableValueHolder has the name \"email\" and that’s what we need to use.\
    \ Can’t we use the component’s id as name of the editableValueHolder? The good\
    \ news is yes, that’s possible if we use it within the implementation . The EL\
    \ has two predefined variables pointing to the id: either #{cc.attrs.id} or simply\
    \ #{cc.id}. See Figure 27-6.\n\n###### Listing 27-6 Component LabeledText Using\
    \ Variable Id for editableValueHolder\n\n```\n 1   <?xml version='1.0' encoding='UTF-8'\
    \ ?>\n 2   <html xmlns=\"http://www.w3.org/1999/xhtml\"\n 3         xmlns:cc=\"\
    http://xmlns.jcp.org/jsf/composite\"\n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n 5         xmlns:f=\"http://xmlns.jcp.org/jsf/core\">\n\n 7     <!-- INTERFACE\
    \ -->\n 8     <cc:interface>\n 9       <cc:attribute name=\"label\"/>\n10       <cc:attribute\
    \ name=\"value\"/>\n11     </cc:interface>\n\n13     <!-- IMPLEMENTATION -->\n\
    14     <cc:implementation>\n15       <cc:editableValueHolder name=\"#{cc.id}\"\
    \ targets=\"input\"/>\n16       <div class=\"inputPart\">\n17         <h:outputLabel\
    \ for=\"input\"\n18                        value=\"#{cc.attrs.label}\"       \
    \                                                         \n19                        styleClass=\"\
    label\"/>\n20         <h:message id=\"msgInput\" for=\"input\" styleClass=\"errorMessage\"\
    />\n21         <h:inputText id=\"input\"\n22                      value=\"#{cc.attrs.value}\"\
    \n23                      requiredMessage=\"#{msg.msgValueRequired}\"\n24                      styleClass=\"\
    inputMedium\">\n25           <f:ajax render=\"@this msgInput\"/>\n26         </h:inputText>\n\
    27       </div>\n28     </cc:implementation>\n29   </html>\n```\n\nUsing the component\
    \ , the final register form would become quite short. See Listing [27-7](#A435433_1_En_27_Chapter.xhtml#PC11).\n\
    \n###### Listing 27-7 Register Form Using the Composite Component (Excerpt)\n\n\
    ```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition\
    \ xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 4                   template=\"\
    /common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    \n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\n 7                   xmlns:mm=\"\
    http://xmlns.jcp.org/jsf/composite/components\"\n 8                   xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">\n\n10     <ui:define name=\"content\">\n11       <h1>Register</h1>\n\
    \n13       <h:form>\n\n15         <mm:LabeledText label=\"#{msg.lblFirstName}\"\
    \n16                         value=\"#{register.accountRequest.firstName}\"  />\n\
    17         <mm:LabeledText label=\"#{msg.lblLastName}\"\n18                         value=\"\
    #{register.accountRequest.lastName}\"/>\n\n20         <mm:LabeledText id=\"email\"\
    \ label=\"#{msg.lblEmail}\"\n21                         value=\"#{register.accountRequest.email}\"\
    >\n22           <f:validator validatorId=\"EmailValidator\" for=\"email\"/>\n\
    23         </mm:LabeledText>\n\n25         [other fields omitted for brevity]\
    \                                                                \n\n27         <div\
    \ class=\"buttonBar\">\n28           <h:commandButton value=\"#{msg.btnRegister}\"\
    \n29                            action=\"#{register.register()}\"\n30                            styleClass=\"\
    button\"/>\n31         </div>\n\n33       </h:form>\n34     </ui:define>\n35   </ui:composition>\n\
    ```\n\n## Pass In Validation Method\n\nFor the multi-component validation of the\
    \ password fields, Alumni uses a validation method (see Chapter [25](#A435433_1_En_25_Chapter.xhtml)).\
    \ This simple approach can’t be moved into a general validator because it needs\
    \ to know about another password field. Because we can’t use a child component\
    \ for validation as we did for the email, we need to pass in a reference to the\
    \ validation method to the composite component.\n\nThe principle should be like\
    \ passing the value of the input field. See Listing [27-8](#A435433_1_En_27_Chapter.xhtml#PC12)."
  trans: "\n## 为组合组件启用子元素\n\n接下来我们需要处理电子邮件输入组件。除了目前已经使用的部分外，我们还需要考虑验证器。一种可能的解决方案是在组件内部定义一个验证器。但可能存在多种不同的验证器用于验证输入。如果全部考虑在内，可能会导致代码混乱，需要编写条件语句来显示无验证器或仅显示其中一个。如果我们能像处理其他组件一样，将验证器或其他组件嵌套到\
    \ `labeledText` 中，会更加灵活。请参见清单 27-4。\n\n###### 清单 27-4 使用 LabeledText 组件\n\n```\n\
    1   <mm:LabeledText label=\"#{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"input\"/>\n4   </mm:LabeledText>\n\
    ```\n\n在清单 27-4 中，我简单地将验证器嵌套到了 `labeledText` 中，就像我们在原始注册表单中将验证器嵌套到 `inputText`\
    \ 标签中一样。然而，如果我们在注册页面中使用这段代码运行应用程序，验证器将不会被调用。\n\n为什么不会呢？想象一个由多个输入元素组成的组合组件——这是一个常见场景。验证器是针对这些元素中的哪一个呢？是的，我们为内部的\
    \ `inputText` 使用了 `id input`。就像 Java 方法中的局部变量一样，我们无法从外部访问内部元素。相反，我们必须定义一种将验证器转发到所需内部元素的方式。这正是\
    \ `editableValueHolder` 的作用。顾名思义，这个标签用于链接到负责保存值的内部组件。但不仅如此，它还可以指向多个目标：\n\n```\n\
    <cc:editableValueHolder  name=\"input\"/>\n```\n\n`name` 是我们在验证器的 `for` 属性中需要使用的名称。通过定义目标，我们可以将“外部名称”重定向到内部组件：\n\
    \n```\n<cc:editableValueHolder name=\"input\" targets=\"input\"/>\n```\n\n如果省略\
    \ `targets` 属性，则默认与 `name` 的定义相同。因此，上述代码在语义上与之前相同。但我们也可以使用不同的名称：\n\n```\n<cc:editableValueHolder\
    \ name=\"email\" targets=\"input\"/>\n```\n\n这定义了一个可以在组件外部使用的名称及其内部目标。现在，我们需要在验证器中声明\
    \ `for=\"email\"`。在大多数 JSF 教程或代码片段中，你会发现 `editableValueHolder` 被嵌套在 `<cc:interface>`\
    \ 标签内。但你也可以将其放在 `<cc:implementation>` 中。我建议这样做，因为它可以实现更灵活的用法。\n\n请查看清单 27-5 中的\
    \ Facelets 片段。\n\n###### 清单 27-5 为组合组件使用 id\n\n```\n1   <mm:LabeledText id=\"\
    myId\" label=\"#{msg.lblEmail}\"\n2                   value=\"#{register.accountRequest.email}\"\
    >\n3     <f:validator validatorId=\"EmailValidator\" for=\"myId\"/>\n4   </mm:LabeledText>\n\
    ```\n\n我们为元素定义了一个 `id`。并且像往常一样，我们在验证器的 `for` 属性中使用了这个 `id`。到目前为止，我们还不能这样使用，因为我们的\
    \ `editableValueHolder` 的名称为 `\"email\"`，而我们需要使用这个名称。难道我们不能将组件的 `id` 用作 `editableValueHolder`\
    \ 的名称吗？好消息是，如果我们在 `implementation` 中使用它，这是可行的。EL 有两个预定义变量指向 `id`：`#{cc.attrs.id}`\
    \ 或简单的 `#{cc.id}`。请参见图 27-6。\n\n###### 清单 27-6 使用变量 id 作为 editableValueHolder\
    \ 的 LabeledText 组件\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2  \
    \ <html xmlns=\"http://www.w3.org/1999/xhtml\"\n 3         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">\n\n 7     <!-- INTERFACE -->\n 8     <cc:interface>\n\
    \ 9       <cc:attribute name=\"label\"/>\n10       <cc:attribute name=\"value\"\
    />\n11     </cc:interface>\n\n13     <!-- IMPLEMENTATION -->\n14     <cc:implementation>\n\
    15       <cc:editableValueHolder name=\"#{cc.id}\" targets=\"input\"/>\n16   \
    \    <div class=\"inputPart\">\n17         <h:outputLabel for=\"input\"\n18  \
    \                      value=\"#{cc.attrs.label}\"                           \
    \                                     \n19                        styleClass=\"\
    label\"/>\n20         <h:message id=\"msgInput\" for=\"input\" styleClass=\"errorMessage\"\
    />\n21         <h:inputText id=\"input\"\n22                      value=\"#{cc.attrs.value}\"\
    \n23                      requiredMessage=\"#{msg.msgValueRequired}\"\n24    \
    \                  styleClass=\"inputMedium\">\n25           <f:ajax render=\"\
    @this msgInput\"/>\n26         </h:inputText>\n27       </div>\n28     </cc:implementation>\n\
    29   </html>\n```\n\n使用该组件后，最终的注册表单将变得相当简洁。请参见清单 27-7。\n\n###### 清单 27-7 使用组合组件的注册表单（节选）\n\
    \n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3\
    \   <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 4       \
    \            template=\"/common/alumniTemplate.xhtml\"\n 5                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 6                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\
    \n 7                   xmlns:mm=\"http://xmlns.jcp.org/jsf/composite/components\"\
    \n 8                   xmlns:f=\"http://xmlns.jcp.org/jsf/core\">\n\n10     <ui:define\
    \ name=\"content\">\n11       <h1>注册</h1>\n\n13       <h:form>\n\n15         <mm:LabeledText\
    \ label=\"#{msg.lblFirstName}\"\n16                         value=\"#{register.accountRequest.firstName}\"\
    \  />\n17         <mm:LabeledText label=\"#{msg.lblLastName}\"\n18           \
    \              value=\"#{register.accountRequest.lastName}\"/>\n\n20         <mm:LabeledText\
    \ id=\"email\" label=\"#{msg.lblEmail}\"\n21                         value=\"\
    #{register.accountRequest.email}\">\n22           <f:validator validatorId=\"\
    EmailValidator\" for=\"email\"/>\n23         </mm:LabeledText>\n\n25         [为简洁起见，省略其他字段]\
    \                                                                \n\n27      \
    \   <div class=\"buttonBar\">\n28           <h:commandButton value=\"#{msg.btnRegister}\"\
    \n29                            action=\"#{register.register()}\"\n30        \
    \                    styleClass=\"button\"/>\n31         </div>\n\n33       </h:form>\n\
    34     </ui:define>\n35   </ui:composition>\n```\n\n## 传入验证方法\n\n对于密码字段的多组件验证，Alumni\
    \ 使用了一个验证方法（参见第 25 章）。这种简单的方法无法迁移到通用验证器中，因为它需要了解另一个密码字段。由于我们无法像处理电子邮件那样使用子组件进行验证，因此需要将对验证方法的引用传入组合组件。\n\
    \n其原理应该类似于传入输入字段的值。请参见清单 27-8。\n"
- fmt: "### Listing 27-8 Principle to Pass in a Validation Method (Malfunction)\n\n\
    ```\n 1    <cc:interface>\n 2      <cc:attribute name=\"value\"/>\n 3      <cc:attribute\
    \ name=\"validator\"/>\n 4   </cc:interface>\n\n 6   <cc:implementation>\n 7     ...\n\
     8     <h:inputSecret id=\"input\"\n 9                    value=\"#{cc.attrs.value}\"\
    \n10                   validator=\"#{cc.attrs.validator}\"\n11                   ...>\n\
    12      ...            \n13    </h:inputText>\n14    ...\n15  </cc:implementation>\n\
    ```\n\nDon’t try the preceding code —it can demonstrate the goal, but it doesn’t\
    \ work. In line 2 we define an attribute (`value`) to transfer a simple string\
    \ into the component. Let’s assume we want to pass in an object of the `Account`\
    \ class, which is more complex than a simple string. We need to inform JSF about\
    \ the fully qualified type of this object. As a rule of thumb, use the fully qualified\
    \ class when you need it in Java code too, or if you need to import the class\
    \ to omit the package name:\n\n```\n<cc:attribute name=\"account\" type=\"de.muellerbruehl.alumni.business.dto.Account\"\
    >\n```\n\nTo pass in a method, we also need to inform JSF. In this case, we need\
    \ to add a method signature with the appropriate attribute:\n\n```\n<cc:attribute\
    \ name=\"validator\"\n          method-signature=\"void validate(\n          javax.faces.context.FacesContext,\n\
              javax.faces.component.UIComponent,\n          Object)\"/>\n```\n\nWe\
    \ also need to declare the return type and the parameter types. This is done the\
    \ standard Java way for a file without imports. So, we need to pass the fully\
    \ qualified class names for non-simple objects. As method name, we’re free to\
    \ choose any valid name—it doesn’t matter.\n\nNormally in the interface section\
    \ we can reuse the attribute names of the internal components. But for `validator`,\
    \ we need to choose a different name to get it to work. I called it `validationMethod`.\n\
    \n## Ubiquitous Input Component\n\nTo get a ubiquitous input component, we have\
    \ to add some more attributes that can be passed from the outside. Listing [27-9](#A435433_1_En_27_Chapter.xhtml#PC15)\
    \ shows the complete `LabeledSecretValidate` composite component of Alumni. It’s\
    \ a sibling of `LabeledTextValidate` with an additional attribute, `redisplay`,\
    \ which is specific to `inputSecret`.\n\n### Listing 27-9 Complete Composite Component\
    \ InputSecretValidate\n\n```\n01   <?xml version='1.0' encoding='UTF-8' ?>\n02   <html\
    \ xmlns=\"http://www.w3.org/1999/xhtml\"\n03         xmlns:cc=\"http://xmlns.jcp.org/jsf/composite\"\
    \n04         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n05         xmlns:f=\"\
    http://xmlns.jcp.org/jsf/core\">\n\n07     <!-- INTERFACE -->\n08     <cc:interface>\n\
    09       <cc:attribute name=\"label\" />\n10       <cc:attribute name=\"value\"\
    />\n11       <cc:attribute name=\"required\" default=\"true\"/>\n12       <cc:attribute\
    \ name=\"componentStyleClass\" default=\"inputPart\"/>\n13       <cc:attribute\
    \ name=\"labelStyleClass\" default=\"label\"/>\n14       <cc:attribute name=\"\
    textStyleClass\" default=\"inputMedium\"/>\n15       <cc:attribute name=\"messageStyleClass\"\
    \ default=\"errorMessage\"/>\n16       <cc:attribute name=\"readonly\" default=\"\
    false\"/>\n17       <cc:attribute name=\"disabled\" default=\"false\"/>\n18       <cc:attribute\
    \ name=\"redisplay\" default=\"false\"/>\n19       <cc:attribute name=\"renderElement\"\
    \ default=\"@this\"/>\n20       <cc:attribute name=\"validationMethod\"\n21                     method-signature=\"\
    void validate(\n22                     javax.faces.context.FacesContext,\n23                     javax.faces.component.UIComponent,\n\
    24                     Object)\"/>\n25       <cc:actionSource name=\"input\"/>\n\
    26     </cc:interface>\n\n28     <!-- IMPLEMENTATION -->\n29     <cc:implementation>\n\
    30       <cc:editableValueHolder name=\"#{cc.id}\" targets=\"input\"/>    \n\n\
    32       <div class=\"#{cc.attrs.componentStyleClass}\">                     \
    \                                           \n\n34         <h:outputLabel for=\"\
    input\"\n35                        value=\"#{cc.attrs.label}\"\n36                        styleClass=\"\
    #{cc.attrs.labelStyleClass}\"/>\n\n38         <h:inputSecret id=\"input\"\n39                        value=\"\
    #{cc.attrs.value}\"\n40                        validator=\"#{cc.attrs.validationMethod}\"\
    \n41                        required=\"#{cc.attrs.required}\"\n42                        requiredMessage=\"\
    #{msg.msgValueRequired}\"\n43                        readonly=\"#{cc.attrs.readonly}\"\
    \n44                        disabled=\"#{cc.attrs.disabled}\"\n45                        redisplay=\"\
    #{cc.attrs.redisplay}\"\n46                        styleClass=\"#{cc.attrs.textStyleClass}\"\
    >\n47           <f:ajax event=\"change\" render=\"#{cc.attrs.renderElement} msgInput\"\
    />\n48         </h:inputSecret>\n\n50         <h:message id=\"msgInput\"\n51                    for=\"\
    input\"\n52                    styleClass=\"#{cc.attrs.messageStyleClass}\"/>\n\
    \n54       </div>\n\n56     </cc:implementation>\n57   </html>\n```\n\nWatch out\
    \ for the interface section: if needed, can define reasonable defaults for the\
    \ attributes. If you don’t need a different value than this default, you might\
    \ omit that attribute within the HTML file which uses this component.\n\nYou may\
    \ ask why the component names end with `Validate`. If we don’t pass in a validation\
    \ method, no validation takes place, and no value is transferred to the model,\
    \ even though we use AJAX here. We either need to pass in a dummy validation method\
    \ (with an empty body) or implement a special handling of the absent method. In\
    \ such a case, we have to omit the `validator` property. Such handling would inflate\
    \ the component, so Alumni uses two more components, `LabeledText` and `LabeledSecret`,\
    \ without the ability to pass in a validation method.\n\n## Summary\n\nWhen a\
    \ couple of components are used together in a similar manner, they might be composed\
    \ into a reusable composite component. A composite component consists of an (optional)\
    \ interface and an implementation. This chapter demonstrated how to transform\
    \ existing code into such components.\n\nSpecial attention is needed to allow\
    \ child components for a composite component. We need to define which internal\
    \ component(s) act as editable value holder.\n\nThe interface defines the attributes\
    \ that can be passed into the composite. For nontrivial types, JSF needs to be\
    \ informed about the attribute’s type or, in the case of a method, about the method\
    \ signature.\n\nFinally, this chapter showed a reusable ubiquitous input component.\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_28](#A435433_1_En_28_Chapter.xhtml)\n\
    \n# 28. Secure Passwords\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nAccess to special areas of Alumni will be restricted to members only.\
    \ That means we need to restrict access to authorized persons only. During the\
    \ registration process, we ask the user to enter a password that we store together\
    \ with the account entity.\n\nBecause Alumni is exposed to the web, there’s a\
    \ potential risk that somebody might tamper with the system. Passwords need special\
    \ protection —they should never be stored in plain text format. Although there\
    \ is no such things as 100% protection against *crackers* (malicious hackers—there\
    \ are nice hackers), it’s possible to store passwords in a reasonably safe way\
    \ by following these guidelines:\n\n*   Strongly encrypt all passwords\n\n*  \
    \ Grant no access to any decrypted passwords\n\n*   Use an algorithm that takes\
    \ some time to calculate\n\n*   Calculate different hashes even though two users\
    \ may have chosen the same password\n\n*   Use an algorithm to verify the password\
    \ that takes almost the same time regardless of password length"
