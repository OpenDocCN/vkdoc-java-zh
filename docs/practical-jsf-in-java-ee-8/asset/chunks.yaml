  raw: "## Design First Data Model\n\nNow we can implement a first dialog. In practice,\
    \ you might start implementing a big feature, like the book editor or review editor.\
    \ That would make sense, because these are valuable features for the customer.\
    \ But we want to assign every book to one or more categories. Thus, categories\
    \ need to be available when we enter the data of a new book. In real development,\
    \ we may omit this little feature to implement it later, once the customer is\
    \ satisfied with the overall editor.\n\nWe haven’t discussed persistence yet,\
    \ and a category is one of the simplest structures within our application, so\
    \ it’s a good starting point to introduce data storage and access. We start to\
    \ design the data model here. In Chapter [12](#A435433_1_En_12_Chapter.xhtml)\
    \ we will persist this data.\n\nIgnoring the fact of different display languages,\
    \ a *category* simply consists of an id and text only. So far, our data model\
    \ seems to be very simple: two properties with getters and setters. See Listing\
    \ [11-9](#A435433_1_En_11_Chapter.xhtml#PC11).\n\n###### Listing 11-9 Category\n\
    \n```\n 1   public class Category {\n 2     // <editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Property Id\">\n 3     private int _id = -1;\n\n 5     public int getId()\
    \ {\n 6       return _id;\n 7     }\n\n 9     public void setId(int id) {\n10       _id\
    \ = id;\n11     }\n12     // </editor-fold>\n\n14     // <editor-fold defaultstate=\"\
    collapsed\" desc=\"Property Name\">\n15     private String _name;\n\n17     public\
    \ String getName() {\n18       return _name;                                 \
    \                               \n19     }\n\n21     public void setName(String\
    \ name) {\n22       _name = name;\n23     }\n24     // </editor-fold>\n25   }\n\
    ```\n\nThe id is initialized with –1 to indicate there is no valid id yet.\n\n\
    By the way, the editor-fold comments are specific to NetBeans. They allow structuring\
    \ and collapsing the code. It’s a one-time presentation here.\n\nIs that all?\
    \ Nope. There’s something more we need to do. As a Java developer, you might miss\
    \ the hashCode and equals methods. Both are needed if objects of this class will\
    \ be used in any collection. NetBeans can generate both for you. This generated\
    \ code might be used as a starting point only. Using persistence, the id will\
    \ be generated by the database management system.\n\nOnly this id identifies the\
    \ category. There’s a valid id, hashCode, and equals depend on this id only, ignoring\
    \ the text. But if there’s no valid id, we probably need to distinguish two different\
    \ object instances. We do that by considering the text.\n\nUsually, in our application\
    \ we’ll display selected properties of our entities. But if we simply put an entity\
    \ onto a page, JSF would display it by its string representation. Thus, we should\
    \ override the toString method to gain more informative output, as is done in\
    \ Listing [11-10](#A435433_1_En_11_Chapter.xhtml#PC12).\n\n###### Listing 11-10\
    \ HashCode and Equals Need to Be Defined for Any Entity\n\n```\n 1   @Override\n\
     2   public int hashCode() {\n 3     if (_id < 0) {\n 4       return _name.hashCode();\n\
     5     }\n 6     return _id;\n 7   }\n\n 9   @Override\n10   public boolean equals(Object\
    \ object) {\n11     if (!(object instanceof Category)) {\n12       return false;\n\
    13     }\n14     Category other = (Category) object;\n15     if (_id < 0 && other._id\
    \ < 0) {\n16       return _name.equals(other._name);\n17     }\n18     return\
    \ _id == other._id;\n19   }\n\n21   @Override\n22   public String toString() {\n\
    23     return \"Category[ id=\" + _id + \"] \" + _name;\n24   }\n```\n\nNow the\
    \ data model for the first dialog is ready.\n\n## First Dialog Box (Repeating\
    \ Structure)\n\nCategory is the simplest data structure to be persisted and as\
    \ such is a good starting point to discuss the data storage. A *category* only\
    \ consists of an id and text. We could certainly design a small dialog box containing\
    \ these two fields, plus two buttons, Save and Delete. Just to edit every category\
    \ by its own screen. In fact, the id doesn’t matter for the user; it’s only used\
    \ as the primary key once we move on to persistence. So, we’ll put all categories\
    \ into a list and edit them all at once.\n\nWe need to\n\n*   Add a category\n\
    \n*   Modify a category’s text\n\n*   Delete a category\n\n*   Save the list\n\
    \nTo add a category or save the list, we use one button each.\n\nIt’s very common\
    \ to display a read-only list and add an Edit link to each row. If you click the\
    \ link, the Edit dialog will be displayed. Using applications following this approach,\
    \ though, I feel uncomfortable. So, we’ll allow a direct and random access to\
    \ each category.\n\nEach category will be displayed as an input field. In front\
    \ of this, we place a Delete icon, to delete the category of this line. Figure\
    \ [11-6](#A435433_1_En_11_Chapter.xhtml#Fig6) gives you an impression of the completed\
    \ category editor. We’ll start with the core functionality on the left side in\
    \ the rest of this chapter and continue with other subjects (navigation and internationalization)\
    \ in subsequent chapters.\n\n![A435433_1_En_11_Fig6_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig6_HTML.jpg)\n\
    \n###### Figure 11-6 Category editor\n\nWe don’t have a service class to retrieve\
    \ categories from a database or to save them. So let’s create a list with some\
    \ initial categories to simulate database access. And the Save button will only\
    \ perform a log, which you can observe on the NetBeans console (the Output, GlassFish\
    \ Server window). See Listing [11-11](#A435433_1_En_11_Chapter.xhtml#PC13).\n\n\
    ###### Listing 11-11 CategoryEditor\n\n```\n 1   @Named\n 2   @SessionScoped\n\
     3   public class CategoryEditor implements Serializable{\n 4     private static\
    \ final long serialVersionUID = 1L;\n 5     private static final Logger _logger\
    \ = Logger.getLogger(\"CategoryEditor\");\n\n 7     @PostConstruct\n 8     private\
    \ void init(){\n 9       _categories = new ArrayList<>();\n10       _categories.add(new\
    \ Category(){{setId(1); setName(\"Java\");}});\n11       _categories.add(new Category(){{setId(2);\
    \ setName(\"Web\");}});\n12     }\n\n14     private List<Category> _categories;\n\
    \n16     public List<Category> getCategories() {\n17       return _categories;\n\
    18     }\n\n20     public void setCategories(List<Category> categories) {\n21       _categories\
    \ = categories;\n22     }\n\n24     public String addCategory(){\n25       _categories.add(new\
    \ Category());\n26       return \"\";\n27     }\n\n29     public String deleteCategory(Category\
    \ category){\n30       _categories.remove(category);\n31       return \"\";  \
    \                                                              \n32     }\n\n\
    34     public String save(){\n35       String categories = _categories\n36               .stream()\n\
    37               .filter(cat -> !cat.getName().isEmpty())\n38               .map(cat\
    \ -> cat.toString())\n39               .collect(Collectors.joining(\", \"));\n\
    40       _logger.log(Level.INFO, \"Save categories: {0}\", categories);\n41       return\
    \ \"\";\n42     }\n43   }\n```\n\nThe code in the preceding listing uses the *lambda*\
    \ and *stream* features introduced in Java 8 (my book *Java Lambdas and Parallel\
    \ Streams* (Apress, 2016) is a good introduction to those, if I do say so myself).\
    \ If you’re not familiar with lambdas and streams , you can use a more traditional\
    \ approach with a for loop. As mentioned, the save method doesn’t perform a save\
    \ yet, but instead does logging. See Listing [11-12](#A435433_1_En_11_Chapter.xhtml#PC14)."
  trans: "\n## 优先设计数据模型\n\n现在我们可以实现第一个对话框了。在实际开发中，你可能会先着手实现一个大型功能，比如图书编辑器或评论编辑器。这很合理，因为这些功能对客户来说很有价值。但我们希望将每本书分配到一个或多个类别中。因此，在录入新书数据时，类别必须已经可用。在真实开发中，我们可能会先跳过这个小功能，等客户对整体编辑器满意后再实现它。\n\
    \n我们还没有讨论持久化，而类别是应用程序中最简单的结构之一，因此它是介绍数据存储和访问的良好起点。我们在此开始设计数据模型。在第 12 章中，我们将持久化这些数据。\n\
    \n忽略不同显示语言的因素，一个*类别*仅由 id 和文本组成。到目前为止，我们的数据模型看起来非常简单：两个属性，带有 getter 和 setter。参见清单\
    \ 11-9。\n\n###### 清单 11-9 类别\n\n```\n 1   public class Category {\n 2     // <editor-fold\
    \ defaultstate=\"collapsed\" desc=\"Property Id\">\n 3     private int _id = -1;\n\
    \n 5     public int getId() {\n 6       return _id;\n 7     }\n\n 9     public\
    \ void setId(int id) {\n10       _id = id;\n11     }\n12     // </editor-fold>\n\
    \n14     // <editor-fold defaultstate=\"collapsed\" desc=\"Property Name\">\n\
    15     private String _name;\n\n17     public String getName() {\n18       return\
    \ _name;                                                                \n19     }\n\
    \n21     public void setName(String name) {\n22       _name = name;\n23     }\n\
    24     // </editor-fold>\n25   }\n```\n\nid 初始化为 -1，表示尚无有效 id。\n\n顺便提一下，`editor-fold`\
    \ 注释是 NetBeans 特有的。它们允许对代码进行结构化和折叠。这里仅作一次性展示。\n\n这就够了吗？不。我们还需要做更多。作为 Java 开发者，你可能会发现缺少\
    \ `hashCode` 和 `equals` 方法。如果该类的对象将用于任何集合中，这两个方法都是必需的。NetBeans 可以为你生成它们。生成的代码可能仅作为起点。使用持久化后，id\
    \ 将由数据库管理系统生成。\n\n只有这个 id 能标识类别。存在有效 id 时，`hashCode` 和 `equals` 仅依赖于这个 id，忽略文本。但如果没有有效\
    \ id，我们可能需要区分两个不同的对象实例。我们通过考虑文本来实现这一点。\n\n通常，在我们的应用程序中，我们会显示实体的选定属性。但如果简单地将实体放到页面上，JSF\
    \ 会通过其字符串表示形式来显示它。因此，我们应该重写 `toString` 方法以获得更具信息性的输出，如清单 11-10 所示。\n\n###### 清单\
    \ 11-10 任何实体都需要定义 HashCode 和 Equals\n\n```\n 1   @Override\n 2   public int hashCode()\
    \ {\n 3     if (_id < 0) {\n 4       return _name.hashCode();\n 5     }\n 6     return\
    \ _id;\n 7   }\n\n 9   @Override\n10   public boolean equals(Object object) {\n\
    11     if (!(object instanceof Category)) {\n12       return false;\n13     }\n\
    14     Category other = (Category) object;\n15     if (_id < 0 && other._id <\
    \ 0) {\n16       return _name.equals(other._name);\n17     }\n18     return _id\
    \ == other._id;\n19   }\n\n21   @Override\n22   public String toString() {\n23     return\
    \ \"Category[ id=\" + _id + \"] \" + _name;\n24   }\n```\n\n现在，第一个对话框的数据模型已经准备就绪。\n\
    \n## 第一个对话框（重复结构）\n\n类别是最简单的待持久化数据结构，因此是讨论数据存储的良好起点。一个*类别*仅由 id 和文本组成。我们当然可以设计一个包含这两个字段以及“保存”和“删除”两个按钮的小对话框，为每个类别提供独立的编辑界面。实际上，id\
    \ 对用户来说无关紧要；它仅在我们进行持久化时用作主键。因此，我们将所有类别放入一个列表中，并一次性编辑它们。\n\n我们需要：\n\n*   添加一个类别\n\
    *   修改类别的文本\n*   删除一个类别\n*   保存列表\n\n添加类别和保存列表各使用一个按钮。\n\n通常的做法是显示一个只读列表，并为每一行添加一个“编辑”链接。点击链接后，会显示编辑对话框。不过，使用这种方法的应用程序让我感到不太舒服。因此，我们将允许直接、随机地访问每个类别。\n\
    \n每个类别将显示为一个输入字段。在其前面，我们放置一个删除图标，用于删除该行的类别。图 11-6 展示了完成后的类别编辑器概貌。我们将在本章剩余部分从左侧的核心功能开始，并在后续章节中继续讨论其他主题（导航和国际化）。\n\
    \n![A435433_1_En_11_Fig6_HTML.jpg](img/A435433_1_En_11_Fig6_HTML.jpg)\n\n######\
    \ 图 11-6 类别编辑器\n\n我们还没有用于从数据库检索或保存类别的服务类。因此，让我们创建一个包含一些初始类别的列表来模拟数据库访问。而“保存”按钮仅执行日志记录，你可以在\
    \ NetBeans 控制台（输出、GlassFish Server 窗口）中观察到。参见清单 11-11。\n\n###### 清单 11-11 CategoryEditor\n\
    \n```\n 1   @Named\n 2   @SessionScoped\n 3   public class CategoryEditor implements\
    \ Serializable{\n 4     private static final long serialVersionUID = 1L;\n 5     private\
    \ static final Logger _logger = Logger.getLogger(\"CategoryEditor\");\n\n 7     @PostConstruct\n\
     8     private void init(){\n 9       _categories = new ArrayList<>();\n10       _categories.add(new\
    \ Category(){{setId(1); setName(\"Java\");}});\n11       _categories.add(new Category(){{setId(2);\
    \ setName(\"Web\");}});\n12     }\n\n14     private List<Category> _categories;\n\
    \n16     public List<Category> getCategories() {\n17       return _categories;\n\
    18     }\n\n20     public void setCategories(List<Category> categories) {\n21       _categories\
    \ = categories;\n22     }\n\n24     public String addCategory(){\n25       _categories.add(new\
    \ Category());\n26       return \"\";\n27     }\n\n29     public String deleteCategory(Category\
    \ category){\n30       _categories.remove(category);\n31       return \"\";  \
    \                                                              \n32     }\n\n\
    34     public String save(){\n35       String categories = _categories\n36               .stream()\n\
    37               .filter(cat -> !cat.getName().isEmpty())\n38               .map(cat\
    \ -> cat.toString())\n39               .collect(Collectors.joining(\", \"));\n\
    40       _logger.log(Level.INFO, \"Save categories: {0}\", categories);\n41       return\
    \ \"\";\n42     }\n43   }\n```\n\n上述代码使用了 Java 8 中引入的 *lambda* 和 *stream* 特性（我的书《Java\
    \ Lambdas and Parallel Streams》（Apress, 2016）是这些内容的良好入门介绍，恕我直言）。如果你不熟悉 lambda\
    \ 和 stream，可以使用更传统的 for 循环方法。如前所述，`save` 方法尚未执行保存操作，而是进行日志记录。参见清单 11-12。\n"
- fmt: "### Listing 11-12 Java 7 Version of `save` Method\n\n```\n 1   ...\n 2   \
    \  public String save(){\n 3       String categories = \"\";\n 4       for (Category\
    \ category : _categories){\n 5         if (!category.getName().isEmpty()){\n 6\
    \           if (categories.length() > 0){\n 7             categories += \", \"\
    ;\n 8           }\n 9           categories += category;\n10         }\n11    \
    \   }\n12       _logger.log(Level.INFO, \"Save categories: {0}\", categories);\n\
    13       return \"\";\n14     }\n15   ...\n```\n\nThe bean is simply `@SessionScoped`\
    \ (remember to import the proper class—this is a CDI scope, not the old JSF `SessionScope`!).\
    \ Usually, this is not the best choice. Once instantiated, such a bean will live\
    \ as long as the session lasts. On a server with high traffic, this approach might\
    \ result in high memory consumption.\n\nA `@SessionScoped` lives for a relative\
    \ long time. The server might *passivate* the bean to free resources and reload\
    \ (activate) it when needed again. *Passivating* is the process of temporarily\
    \ persisting the object somewhere (at the server’s choice, depending on the server’s\
    \ implementation) by serializing the object. That’s why the appropriate marker\
    \ interface is needed. The `serialVersionUID` determines different object versions.\
    \ Here, we don’t use serialization besides passivation. We don’t expect to load\
    \ data that’s activated by an object version other than passivated. So, we simply\
    \ use a constant value of `1L`. This prevents Java from calculating its own object\
    \ version. (You can read the Java documentation for more on serialization: [http://docs.oracle.com/javase/8/docs/api/java/io/Serializable.html](http://docs.oracle.com/javase/8/docs/api/java/io/Serializable.html)).\n\
    \nAlthough passivating is a strategy to reduce memory consumption, it uses additional\
    \ IO or other resources. Thus, a scope with a shorter lifetime is usually a better\
    \ choice. The Books application is intended for only one or a few editors and\
    \ lots of readers. Extending the bean’s lifetime doesn’t matter here. I discuss\
    \ other scopes later on.\n\nTo simulate a load from a database, the category list\
    \ will be created at `PostConstruct` time. The container will call such an annotated\
    \ method just after creating an instance of the class and injecting the dependencies\
    \ (if any). We could have done this initialization within the class constructor,\
    \ but using the Java Persistence API (JPA—the topic of the next chapter), the\
    \ appropriate service class will be injected *after* the class construction. Then\
    \ we need to perform the database retrieval later, and that’s why `PostConstruct`\
    \ is ideal.\n\nThe double curly braces notation is an old Java idiom. Nevertheless,\
    \ it’s unknown to many developers. It’s simply a shortcut to call the setters\
    \ right after construction of the categories. To set properties for a newly created\
    \ class, it’s preferable to use a special constructor that allows attributes to\
    \ pass as parameters. As you’ll see in the JPA, there’s no need for such a constructor,\
    \ and because we’re mocking database access, the data model doesn’t contain it\
    \ either.\n\nThe code contains three methods to add, delete, and save categories.\
    \ All of them return an empty string to reload the same page. For simplicity’s\
    \ sake, this named bean is set into the session scope. Later on, when I introduce\
    \ AJAX, we’ll refine both.\n\nNext, we need to add some content to the main part\
    \ of our page, as shown in Listing [11-13](#A435433_1_En_11_Chapter.xhtml#PC15).\n\
    \n### Listing 11-13 Main Section of Category Editor\n\n```\n 1   ...\n 2   <main>\n\
    \ 3     <h1>Edit categories</h1>\n 4     <h:form>\n 5       <h:dataTable value=\"\
    #{categoryEditor.categories}\"\n 6                    var=\"cat\">\n 7       \
    \  <h:column>\n 8           <h:commandLink\n 9             action=\"#{categoryEditor.deleteCategory(cat)}\"\
    >\n10             <h:graphicImage alt=\"delete\"\n11                         \
    \    name=\"Delete.png\"\n12                             library=\"icon/small\"\
    \n13                             title=\"delete\"/>\n14           </h:commandLink>\n\
    15         </h:column>\n16         <h:column>\n17            <h:inputText value=\"\
    #{cat.name}\"/>\n18         </h:column>\n19       </h:dataTable>\n20       <h:commandLink\
    \ styleClass=\"button\"\n21                        value=\"Add category\"\n22\
    \                        action=\"#{categoryEditor.addCategory}\"/>\n23      \
    \ <h:commandButton styleClass=\"button\"\n24                        value=\"Save\"\
    \n25                        action=\"#{categoryEditor.save}\"/>\n26     </h:form>\n\
    27   </main>\n28   ...\n```\n\nBesides a heading, the main part now contains a\
    \ form containing three children:\n\n*   `<h:dataTable...>`: Renders an HTML table\n\
