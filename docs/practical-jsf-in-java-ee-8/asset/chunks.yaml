  trans: "\n###### 清单 23-13 使用 forEach 显示好友 (forEach.xhtml)\n\n```\n 1   [...]\n 2       <h1>测试循环\
    \ c:forEach</h1>\n\n 4       访问计数: #{controller.counter}\n\n 6       <c:forEach  items=\"\
    #{controller.friends}\" var=\"friend\">\n 7         <div>\n 8           #{friend.name}  (访问编号\
    \ #{controller.counter})\n 9           <h:dataTable value=\"#{friend.books}\"\
    \ var=\"book\">\n10             <h:column>\n11               - #{book.title} (访问编号\
    \ #{controller.counter})\n12             </h:column>\n13           </h:dataTable>\n\
    14         </div>\n15       </c:forEach>\n\n17       访问计数:  #{controller.counter}\
    \                                                                            \
    \          \n18   [...]\n```\n\n###### 清单 23-14 使用 dataTable 显示好友 (table.xhtml)\n\
    \n```\n 1   [...]\n 2       <h1>测试循环 h:dataTable</h1>\n\n 4       访问计数: #{controller.counter}\n\
    \n 6       <h:dataTable value=\"#{controller.friends}\" var=\"friend\">\n 7         <h:column>\n\
     8           #{friend.name} (访问编号 #{controller.counter})\n 9           <h:dataTable\
    \ value=\"#{friend.books}\" var=\"book\">\n10             <h:column>\n11               -\
    \ #{book.title} (访问编号 #{controller.counter})\n12             </h:column>\n13           </h:dataTable>\n\
    14         </h:column>\n15       </h:dataTable>\n\n17       访问计数: #{controller.counter}\n\
    18   [...]\n```\n\n每个页面都包含一个循环，用于从控制器中检索好友列表。在此列表中，又使用了另一个循环来显示每位好友的书籍列表。我们在多处打印了当前的计数器。由于控制器是请求作用域的，每个页面都会重新创建它，因此计数器从\
    \ 0 开始。\n\n###### 运行并观察\n\n启动项目，点击另一个页面，再点击同一个页面，并观察结果。将你的观察结果与预期进行比较。\n\n图 23-2\
    \ 展示了一个示例输出（使用 JSF 2.3 和 GlassFish 5.0）。\n\n![A435433_1_En_23_Fig2_HTML.jpg](img/A435433_1_En_23_Fig2_HTML.jpg)\n\
    \n###### 图 23-2 循环问题\n\n在不深入探讨实现细节的情况下，一些结果是显而易见的：根据对循环变量的访问，`repeat` 仅访问列表一次，这正如你可能预期的那样；而\
    \ `forEach` 则对 `getFriends` 方法进行了大量调用。事实上，调用次数取决于好友数量和嵌套表格。如果省略书籍列表，`forEach`\
    \ 会调用 `getFriends` 1 + *n* 次。包含书籍列表时，则需要 1 + 4 × *n* 次访问。无论好友数量多少，也无论是否使用内部表格，`dataTable`\
    \ 都只调用该方法三次。\n\n如果你想知道为什么 `forEach` 的计数器从 1 开始，那是因为它是一个标签处理器。它的循环在构建组件树时就被解析了。因此，在页面渲染之前就发生了第一次访问。\n\
    \n大量的访问次数可能会在你的应用程序中引发问题。从这个角度来看，`repeat` 可能是最佳选择。但对于特定的应用程序，你可能需要在循环内访问单个组件。作为一个组件，`repeat`\
    \ 不会重复其子组件。它只是重复生成输出。因此，有时需要一个标签处理器来执行循环。\n\n大量的方法调用取决于 `ForEachHandler` 的实现。Ed\
    \ Burns（JSF 规范负责人）将调查此问题。我创建了一个稍大的演示来展示这个问题，你可以从 [webdevelopment-java.info](https://webdevelopment-java.info)\
    \ 下载。\n\n为了缓解这个问题，你可以使用本地缓存，如清单 23-15 所示。\n\n###### 清单 23-15 本地缓存\n\n```\n 1   private\
    \ List<Friend> _friends;\n 2   public List<Friend> getFriends() {\n 3     if (_friends\
    \ == null) {\n 4       _friends = DataProvider.instance.getFriends();\n 5     }\n\
     6     return _friends;\n 5   }\n```\n\n清单 23-15 展示了我们如何修改 `Controller` 类。当且仅当好友列表为空时，我们才会执行缓慢的数据库访问。这是一个非常短期的缓存，因为一旦请求完成，`Controller`\
    \ 对象就会被销毁。但如果我们使用 `forEach` 标签处理器，这可能会显著提升性能。\n\n## 总结\n\nJSF 提供了几种不同的重复结构，我们需要区分组件和标签处理器。标签处理器在编译时被解析，而组件则被包含在组件树中。这种差异对重复执行的方式和时间有很大影响，并可能导致性能问题。缓存可能是缓解此类问题的一个好方法。\n\
    \n# 第四部分\n校友\n\n© Michael Müller 2018\n\nMichael Müller, 《Java EE 8 中的实用 JSF》,\
    \ `doi.org/10.1007/978-1-4842-3030-5_24`\n\n# 24. 校友\n\nMichael Müller^(1 )\n\n\
    (1)德国北莱茵-威斯特法伦州布吕尔\n\n校友是一个社交网络应用程序。人们可以在他们的母校、大学或类似机构注册一个或多个班级。他们可以使用公告板、组织活动、分享照片或进行同伴交流。\n\
    \n每个用户都可以输入和编辑信息。由于我们不能期望他们是专家，所有对话框都需要容错并提供快速响应。除了目前讨论的技术之外，我们还将使用以下技术（以及其他技术）：\n\
    \n*   转换器和验证器\n\n*   AJAX\n\n*   身份验证和授权\n\n*   基于容器的安全性\n\n*   组合组件\n\n*   WebSockets\n\
    \n*   更改外观和感觉\n\n本书没有足够的篇幅来详细讨论整个应用程序的每一个细节。相反，我将深入解释一些技术，有时会以比校友应用所需更宽泛的术语来描述它们。我将从基本实现开始，引导你从简单的解决方案走向定制化的解决方案。\n\
    \n## 准备应用程序\n\n到目前为止，每次我们创建新应用程序时，都使用 NetBeans 向导为我们创建骨架。我们也可以为校友应用这样做，但由于在撰写本文时\
    \ NetBeans 不直接支持 Java EE 8，我们需要修改项目对象模型（POM）以使用 Java EE 8（如第 9 章所述）。\n\n更重要的是，校友应用不是作为单个模块应用程序构建的，而是被划分为更小的部分，用于\
    \ GUI、业务层、存储和其他服务。Maven 通过多模块项目支持这种拆分。我们需要调整 POM，并为每个不同的模块创建子 POM。以下选定的 POM 摘录侧重于\
    \ Java EE 8 的方面以及模块化，省略了测试等其他内容。清单 24-1 从主 POM 开始。\n"
- fmt: "### Listing 24-1 Main POM of Alumni (Excerpt)\n\n```\n01 <?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n02 <project xmlns:=\"http://maven.apache.org/POM/4.0.0\"\
