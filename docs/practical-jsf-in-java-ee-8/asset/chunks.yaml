    ## HTTP


    超文本传输协议是一个逻辑传输层（*应用层协议*），它作用于其他协议层之上，直至物理传输层。HTTP 通常运行在 TCP/IP 之上。顾名思义，它最初设计用于分发超文本信息。因此，它是万维网的基础。


    HTTP 是一种无状态的请求-响应协议。服务器监听请求并发送回响应，如图 2-1 所示。随后通信终止。


    ![A435433_1_En_2_Fig1_HTML.jpg](img/A435433_1_En_2_Fig1_HTML.jpg)


    ###### 图 2-1 HTTP 请求-响应周期


    图 2-1 中的简化图示展示了用户在检索页面时触发的典型请求-响应周期。实际上，响应是一个 HTTP 响应，由消息头和消息体组成，它可能携带 HTML 以外的信息，例如
    JSON、XML 或其他内容。


    任何后续请求都独立于之前的请求。这种协议会影响 Web 应用程序与其客户端的工作方式。为了处理应用程序的用户会话，需要在 HTTP 之上实现会话管理。此会话管理的目标是记住应用程序的当前状态。要么服务器需要在某处存储应用程序状态并向客户端提供关键信息，要么服务器将完整的状态信息传输给客户端。


    对于后一种方法，服务器端无需记住任何内容。任何状态都可以通过客户端在后续请求中提供的信息来恢复。这种方法使服务器的内存消耗保持在较低水平。通过网络发送大量信息有一些重要的缺点。延迟会降低应用程序的速度。另一个缺点是安全性。如果网络传输未通过传输层安全性（TLS）等协议进行保护，则发送的信息可能会被未经授权的人员读取。将完整状态保存到客户端可以避免“粘性”会话：下一个请求可以由负载均衡器后面的不同服务器处理。


    刚才提到的第一种方法是将所有信息保存在服务器上，只向客户端发送一个标识符。这种标识符称为*会话 ID*。传递会话 ID 的常见方式包括使用隐藏字段或发送 HTTP
    Cookie。如果服务器持有状态，则会话需要由同一台服务器继续，除非你实现了在不同服务器之间共享此状态信息的解决方案。例如，应用程序状态可以保存在共享的键值存储中，并且可以由任何接收到会话
    ID 的服务器恢复。在实践中，现代服务器每天可能处理几十个或十万个会话。因此，在许多场景下，这种“粘性”会话无关紧要。


    ###### 会话劫持


    由于 HTTP 的特性，服务器需要会话 ID 等信息来确定如何继续处理。如果未经授权的人员（例如破解者——意为*犯罪黑客*）捕获了此信息，他们可能会接管会话。这被称为*会话劫持*。JSF
    提供了一些额外的功能来保护你的应用程序。


    幸运的是，会话管理由 Java 环境实现。在 Servlet/JSF 配置中，可以选择客户端状态或服务器状态。


    在请求期间，HTTP 会定位一个统一资源标识符（URI）。此外，它会告知服务器要使用哪个 HTTP 方法。这通常被称为*动词*。与 JSF 相关的最常用的方法是
    GET 和 POST。


    ###### URI、URL、URN


    有些人说，统一资源标识符（URI）通常用于 REST（*表述性状态转移*的缩写，在第 24 章讨论）的上下文中，而网页是通过称为统一资源定位符（URL）的东西来寻址的。但实际上，URI
    可以是 URL 或统一资源名称（URN）。你可以在 [www.ietf.org/rfc/rfc3986.txt](http://www.ietf.org/rfc/rfc3986.txt)
    阅读更多关于 URN 的信息。


    根据 REST 编程风格，寻址网页以及寻址资源都涉及位置，而非名称。因此，在这两种上下文中，我们都使用 URL。并且由于任何 URL 都是一个 URI，我在本书中使用
    URI。


    GET 通过使用 URI 从服务器查询信息。额外的参数可以附加到 URI 上——例如，[`it-rezension.de/Books/books.xhtml?catId=2`](http://it-rezension.de/Books/books.xhtml%3FcatId=2)。这定位了位于
    it-rezension.de 的服务器，以及其中的应用程序和页面 Books/books.xhtml。附加了一个参数 catId=2。


    通过 POST 请求，信息在请求体中被发送到服务器——例如，一个 Web 表单（HTML）包含一些输入字段和一个提交按钮。点击此按钮会发起一个 POST 请求。


    在 REST 的上下文中，方法（动词）PUT 和 DELETE 也很重要。REST 背后的思想是将定义好的操作分配给这些动词。虽然本书是关于 JSF 的，并且一个纯
    JSF 应用程序不会使用 REST，但我在第 24 章中描述的 Alumni 应用程序并非一个单体应用程序。相反，它利用了一个遵循 REST 概念的 API
    服务。


    ## HTML


    HTML 用于描述网页的内容。与 XML 一样，HTML 源自标准通用标记语言（SGML）。


    作为一名 Java 开发者，我假设你熟悉 XML。与 XML 类似，HTML 使用标签来组织页面内容。在 XML 中，你可以定义任何你选择的标签并为其赋予任何含义。与
    XML 不同，HTML 标签是预定义的，并具有特殊意义。例如，`<head>` 表示 HTML 文件的头部，`<p>` 表示一个段落，等等。因此，HTML
    不像 XML 那样具有可扩展性。


    ###### 标签猜测


    在某种程度上，HTML 比 XML 限制更少：缺失的闭合标签不会被标记为错误，而是会自动闭合。浏览器会尝试处理重叠的标签。有些人称赞这种行为，因为它意味着编写更少的标记、更少的工作量、传输更少的数据，并且页面加载更快（但少几个字符真的能让页面加载更快吗？）。


    不同的浏览器可能以不同的方式处理缺失或交错的标签，猜测如何补全缺失部分有时会导致危险的代码。（关于这一点，请参阅 Michael Zalewski 的 *The
    Tangled Web*（No Starch Press, 2011）。）为了避免这一系列问题，我建议你使用 XHTML，这是一种基于 XML 重新定义的
    HTML 变体。XML 要求你闭合每一个打开的标签。除了避免刚才提到的问题之外，这还能强制生成格式良好的文档，如果可管理的话，这些文档可以被 XML 工具处理。


    一个 HTML 文档以 `<!DOCTYPE>` 开头，后面紧跟一个 `<html>` 标签。然后可以包含 `<head>` 和 `<body>` 标签。对于
    XHTML，`<!DOCTYPE>` 之前是 XML 版本声明，如代码清单 2-1 所示。


    ###### 代码清单 2-1 包含表单的示例 HTML 页面


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html>

     4       <head>

     5           <title>TinyCalculator</title>

     6       </head>

     7       <body>

     8           <h1>TinyCalculator</h1>

     9           <form>

    10               <div>

    11                   <label>Param1: </label>

    12                   <input type="text" value="0.0" />

    13               </div>

    14           </form>

    15       </body>

    16   </html>

    ```


    你可以在附录 A 中阅读更多关于 HTML 的内容，包括一个带有注释的重要标签列表。

