    This appendix gives a brief overview of and quick reference to tags from the Standard
    JSF Component Library and JSP Standard Tag Library. Full references are available
    online ( [https://javaserverfaces.github.io/docs/2.3/index.html](https://javaserverfaces.github.io/docs/2.3/index.html)
    ), or check out *JavaServer Faces 2.0* by Ed Burns and Chris Schalk (McGraw-Hill,
    2010). Note that although that book was written for JSF 2.0, it’s still useful
    for JSF 2.3.


    The tags are grouped by library and listed alphabetically. Additionally, some
    common attributes are described.


    ### Pass-through Elements


    This is only a marker namespace. JSF tries to detect components, which are marked
    by `jsf:` (or whatever alias you’ve chosen with the namespace declaration). Known
    components are added to the component tree as if defined in one of the other libraries.
    Unknown components are added as pass-through elements.


    ### JSF Core Library


    Elements of the JSF core library are usually prefixed with `f:`, but you can change
    that during the declaration of the namespace. The tags (as well as those of the
    other libraries) are listed in Table C-2 without any prefix.


    ###### Table C-2 Namespaces


    | Tag Name | Description |

    | --- | --- |

    | `actionListener` | Declarative registers an `ActionListener` to the closest
    parent `UIComponent`. |

    | `ajax` | Declarative adds an `AjaxBehavior` to the parent `UIComponent` or to
    its child `UIComponents`. |

    | `attribute` | Adds an attribute to the surrounding UI component. |

    | `attributes` | Adds attributes to a map for the surrounding UI component. |

    | `convertDateTime` | Registers a `DateTimeConverter` for a `UIComponent`. |

    | `converter` | Registers a named (self-written) converter for a `UIComponent`.
    |

    | `convertNumber` | Registers a `NumberConverter` for a `UIComponent`. |

    | `event` | Registers a `ComponentSystemEventListener` for a `UIComponent`. |

    | `facet` | Registers a named facet for a `UIComponent`. |

    | `importConstants` | Imports constants so they can be used within the EL. |

    | `loadBundle` | Loads a localized resource bundle if available, otherwise the
    default resource bundle. |

    | `metadata` | Declares metadata for a Facelets view. Using Facelets, a view corresponds
    to a (HTML) page, if not specified by the optional `f:view`. |

    | `param` | Adds a parameter to the closest parent `UIComponent`. |

    | `passThroughAttribute` | Defines a pass-through attribute. Such an attribute
    would be passed to a browser without interpretation by JSF. |

    | `passThroughAttributes` | Pass through a group of parameters delivered by EL
    as a `Map<String, Object>`. |

    | `phaseListener` | Adds a listener to phase events. |

    | `resetValues` | Resets the values of the components declared in the render attribute,
    for example to clear input fields of a form. |

    | `selectItem` | Adds an item to a select box, or combo box. |

    | `selectItems` | Adds multiple items provided by an EL expression to a select
    box. |

    | `setPropertyActionListener` | Registers an action listener to the closest parent
    `UIComponent`. |

    | `subview` | Defines a subview component for pages with JSP. Has no purpose on
    modern Facelets pages. |

    | `validateBean` | Causes the closest parent `UIComponent` or all nested `UIComponent`s
    to be validated by bean validation. |

    | `validateDoubleRange` | Validates a range (minimum to maximum, both optional)
    of values of an `inputText` component with a backing field of type `double`. |

    | `validateLength` | Validates the length of the closest parent `UIComponent`.
    |

    | `validateLongRange` | Same as `validateDoubleRange`, but for a `Long`. |

    | `validateRegex` | Validates the input against a regular expression. |

    | `validateRequired` | Declares the closest parent `UIComponent` being required.
    Same effect as the `required="true"` attribute. |

    | `validator` | Registers a validator for the closest parent `EditableValueHolder`,
    for example input text. |

    | `valueChangeListener` | Registers a listener to the `valueChange` event of the
    closest parent `UIComponent`. |

    | `verbatim` | Registers a child `UIOutput` element for JSP. No purpose for modern
    Facelets pages. |

    | `view` | The container for all JSF components. Using Facelets, the view is implicitly
    declared, so there is no need for an explicit `view` tag. But you might use it
    to pass additional information like language and so on. |

    | `viewAction` | Register an action (method) to be invoked in a given phase. To
    be used within the `metadata` tag. |

    | `viewParam` | Retrieve a parameter (id and value) from a get request. To be
    used within the `metadata` tag. |

    | `websocket` | Registers a websocket connection that receives push messages sent
    by the server. |


    ### JSF HTML Library


    The HTML library contains tags that are rendered to HTML elements. HTML elements
    are not only rendered, JSF-specific features are added too. The common namespace
    is `h` (prefix `h:`). Table C-3 lists these tags.


    ###### Table C-3 JSF HTML Library'
