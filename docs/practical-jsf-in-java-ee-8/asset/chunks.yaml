  raw: "###### Caution\n\nSizes in percent are relative sizes. Beware: these aren’t\
    \ relative to the screen but to the surrounding container.\n\nIf we shrink the\
    \ width, fewer characters of text may be displayed in each line. But we don’t\
    \ change the line’s height, so in many cases it’s best to keep vertical sizes\
    \ in em.\n\nFor the responsive design, we divide our main and nav classes into\
    \ two parts. One of them contains all styles that are independent from the viewport\
    \ width (see Listing [19-3](#A435433_1_En_19_Chapter.xhtml#PC3), lines 7–20),\
    \ whereas the other parts contain viewport-dependent styles. These parts will\
    \ be different for each breakpoint. Lines 23–37 use the original values as seen\
    \ in the previous listing.\n\n###### Listing 19-3 Excerpt from books.css, First\
    \ Responsive Approach\n\n```\n 1   body > div {\n 2     max-width: 80em;\n 3     margin:\
    \ 0 auto;\n 4     text-align: left;\n 5   }\n\n 7   main {\n 8     opacity: 0.95;\n\
     9     border-radius: 1em;\n10     background-color: #eeeef3;\n11     margin-bottom:\
    \ 1em;\n12     box-shadow: 0.5em 0.5em 0.5em #004;\n13   }\n\n15   nav{\n16     opacity:\
    \ 0.85;\n17     border-radius: 1em;\n18     background-color: #ccccd8;\n19     box-shadow:\
    \ 0.5em 0.5em 0.5em #004;\n20   }\n\n22   @media screen and (min-width: 960px){\n\
    23     main {\n24       min-height: 40em;\n25       width: 53em;\n26       padding:\
    \ 1em;\n27     }\n\n29     nav{\n30       min-height: 40em;\n31       position:\
    \ fixed;\n32       margin-left: 56em;\n33       width: 22em;\n34       top: 7.5em;\n\
    35       padding: 1em;\n36     }\n37   }\n\n39   @media screen and (min-width:\
    \ 600px) and (max-width: 960px){\n40     main {\n41       min-height: 45em;  \
    \                                                                            \
    \        \n42       width: 66.25%;\n43       padding: 1.25%;\n44     }\n\n46     nav{\n\
    47       min-height: 45em;\n48       position: fixed;\n49       margin-left: 70%;\n\
    50       width: 27.5%;\n51       padding: 1.25%;\n52       top: 7.5em;\n53     }\n\
    54   }\n\n56   @media screen and (max-width: 600px){\n57     main {\n58       width:\
    \ 97.5%;\n59       padding: 1.25%;\n60     }\n\n62     nav{\n63       width: 97.5%;\n\
    64       padding: 1.25%;\n65       bottom: 1em;\n66     }\n67   }\n```\n\nIn line\
    \ 22 you’ll find the first media query. It applies to a viewport size on the screen\
    \ with a minimum width of 960px. Every style declaration between the opening curly\
    \ brace on that line and the corresponding closing one on line 37 will be applied\
    \ to the HTML page if, and only if, that minimum width condition is true. The\
    \ next breakpoint is reached with a size of 960px. Within the condition of the\
    \ corresponding media query, we define the width as mentioned before in percent,\
    \ not in em (lines 39–54). If the size is less than 600px, we rearrange the navigation\
    \ now being displayed below the main content. As you can see, media queries are\
    \ enhanced by one or more width conditions. I assume these are mostly self-explanatory.\n\
    \nThere’s one important detail to talk about. Look at Listing [19-4](#A435433_1_En_19_Chapter.xhtml#PC4).\n\
    \n###### Listing 19-4 Cascaded Media Queries\n\n```\n1   @media screen and (min-width:\
    \ 960px){...}\n2   @media screen and (min-width: 600px) and (max-width: 960px){...}\n\
    3   @media screen and (max-width: 600px){...}\n```\n\nIn this definition, max-width\
    \ of the smaller screen (or window) equals the min-width of the bigger screen.\
    \ Are these overlappings okay? Listing [19-5](#A435433_1_En_19_Chapter.xhtml#PC5)\
    \ seems to show a better way.\n\n###### Listing 19-5 Cascaded Media Queries, Nonoverlapping\n\
    \n```\n1   @media screen and (min-width: 960px){...}\n2   @media screen and (min-width:\
    \ 600px) and (max-width: 959px){...}\n3   @media screen and (max-width: 599px){...}\n\
    ```\n\nNow the sizes don’t overlap, and this is what you’ll find in some books\
    \ or blogs talking about responsive design. At a first glance, such a nonoverlapping\
    \ definition seems to be correct. But it really isn’t: we now have *two* gaps,\
    \ one between 959 and 960px, and the other between 599 and 600px. Eh?\n\n######\
    \ Try an experiment:\n\nreplace the media queries with the nonoverlapping version.\
    \ Start with a wide browser window and reduce its width. When you reach a breakpoint,\
    \ slowly increase and reduce the window size and observe what happens. Depending\
    \ on your system or browser settings (you may have fonts enlarged, or the browser\
    \ window zoomed), most browsers will display the navigation below the main content\
    \ when you reach the breakpoint. That’s because there’s a 1-pixel gap and a calculated\
    \ size just between both definitions. None of the definitions will be used, so\
    \ the navigation won’t be displayed as expected.\n\nTake a look at Figure [19-5](#A435433_1_En_19_Chapter.xhtml#Fig5).\
    \ Here the browser calculates a width of 959.167px, which falls into this 1-pixel\
    \ gap.\n\n![A435433_1_En_19_Fig5_HTML.jpg](OEBPS/Images/A435433_1_En_19_Fig5_HTML.jpg)\n\
    \n###### Figure 19-5 Width = 959.167px\n\nDue to this problem, Books uses the\
    \ overlapping approach. To avoid ambiguity, CSS uses the last definition found\
    \ in the CSS file.\n\nIn our first responsive approach, we still use em for the\
    \ wide viewport size. But because the container is restricted to 80em, even if\
    \ the viewport is wider, relative sizes in percent in the main part can’t grow.\
    \ So we can use the same sizes as used for the smaller window in percent.\n\n\
    The navigation floats out of the body > div container. Its container is the display\
    \ area of your browser, and it will grow as the window grows. To keep the navigation\
    \ size, it still has to be defined using em. This said, we can refactor the style\
    \ sheet. See Listing [19-6](#A435433_1_En_19_Chapter.xhtml#PC6).\n\n###### Listing\
    \ 19-6 Excerpt from books.css, Refined Responsive Definition\n\n```\n 1   body\
    \ > div {\n 2     max-width: 80em;\n 3     margin: 0 auto;\n 4     text-align:\
    \ left;\n 5   }\n\n 7   main {\n 8     opacity: 0.95;\n 9     border-radius: 1em;\n\
    10     background-color: #eeeef3;\n11     margin-bottom: 1em;\n12     box-shadow:\
    \ 0.5em 0.5em 0.5em #004;\n13   }\n\n15   nav{\n16     opacity: 0.85;\n17     border-radius:\
    \ 1em;\n18     background-color: #ccccd8;\n19     box-shadow: 0.5em 0.5em 0.5em\
    \ #004;\n20   }\n\n22   @media screen and (min-width: 600px){\n23     main {\n\
    24       width: 66.25%;\n25       padding: 1.25%;\n26     }\n\n28     nav{\n29       position:\
    \ fixed;\n30       top: 7.5em;\n31     }\n32   }\n\n34   @media screen and (min-width:\
    \ 960px){\n35     main, nav {\n36       min-height: 40em;\n37     }\n\n39     nav{\n\
    40       margin-left: 56em;                                                  \
    \                                    \n41       width: 22em;\n42       padding:\
    \ 1em;\n43     }\n44   }\n\n46   @media screen and (min-width: 600px) and (max-width:\
    \ 960px){\n47     main, nav {\n48       min-height: 45em;\n49     }\n\n51     nav{\n\
    52       margin-left: 70%;\n53       width: 27.5%;\n54       padding: 1.25%;\n\
    55     }\n56   }\n\n58   @media screen and (max-width: 600px){\n59     main {\n\
    60       width: 97.5%;\n61       padding: 1.25%;\n62     }\n\n64     nav{\n65       width:\
    \ 97.5%;\n66       padding: 1.25%;\n67       bottom: 1em;\n68     }\n69   }\n\
    ```\n\nIn line 22 you’ll find a common definition for all sizes greater than or\
    \ equal to 600px.\n\n## Responsive Pixel Layouts\n\nAs we’ve seen, making a layout\
    \ that’s responsive isn’t too hard. Luckily, we created our first (nonresponsive)\
    \ version of the layout sizes relative not to the screen, but to the font size.\
    \ However, many pages are designed with pixel dimensions. Here the transition\
    \ needs a little more effort, as Listing [19-7](#A435433_1_En_19_Chapter.xhtml#PC7)\
    \ shows.\n\nLet’s assume the original layout had been designed to be accurate\
    \ using pixels."
  trans: "\n###### 注意\n\n百分比尺寸是相对尺寸。请注意：这些尺寸并非相对于屏幕，而是相对于外层容器。\n\n如果我们缩小宽度，每行显示的文本字符数可能会减少。但我们不会改变行高，因此在许多情况下，最好使用\
    \ `em` 单位来保持垂直尺寸。\n\n对于响应式设计，我们将 `main` 和 `nav` 类分为两部分。其中一部分包含所有与视口宽度无关的样式（参见代码清单\
    \ 19-3 第 7–20 行），而另一部分则包含与视口相关的样式。这些部分在每个断点处都会有所不同。第 23–37 行使用了与前一个代码清单中相同的原始值。\n\
    \n###### 代码清单 19-3 摘自 books.css，首个响应式方案\n\n```\n 1   body > div {\n 2     max-width:\
    \ 80em;\n 3     margin: 0 auto;\n 4     text-align: left;\n 5   }\n\n 7   main\
    \ {\n 8     opacity: 0.95;\n 9     border-radius: 1em;\n10     background-color:\
    \ #eeeef3;\n11     margin-bottom: 1em;\n12     box-shadow: 0.5em 0.5em 0.5em #004;\n\
    13   }\n\n15   nav{\n16     opacity: 0.85;\n17     border-radius: 1em;\n18     background-color:\
    \ #ccccd8;\n19     box-shadow: 0.5em 0.5em 0.5em #004;\n20   }\n\n22   @media\
    \ screen and (min-width: 960px){\n23     main {\n24       min-height: 40em;\n\
    25       width: 53em;\n26       padding: 1em;\n27     }\n\n29     nav{\n30       min-height:\
    \ 40em;\n31       position: fixed;\n32       margin-left: 56em;\n33       width:\
    \ 22em;\n34       top: 7.5em;\n35       padding: 1em;\n36     }\n37   }\n\n39   @media\
    \ screen and (min-width: 600px) and (max-width: 960px){\n40     main {\n41       min-height:\
    \ 45em;                                                                      \
    \                \n42       width: 66.25%;\n43       padding: 1.25%;\n44     }\n\
    \n46     nav{\n47       min-height: 45em;\n48       position: fixed;\n49       margin-left:\
    \ 70%;\n50       width: 27.5%;\n51       padding: 1.25%;\n52       top: 7.5em;\n\
    53     }\n54   }\n\n56   @media screen and (max-width: 600px){\n57     main {\n\
    58       width: 97.5%;\n59       padding: 1.25%;\n60     }\n\n62     nav{\n63       width:\
    \ 97.5%;\n64       padding: 1.25%;\n65       bottom: 1em;\n66     }\n67   }\n\
    ```\n\n在第 22 行，你会找到第一个媒体查询。它适用于屏幕视口宽度最小为 960px 的情况。只有当最小宽度条件为真时，从该行左花括号到第 37 行对应右花括号之间的所有样式声明才会应用于\
    \ HTML 页面。下一个断点出现在宽度为 960px 时。在相应媒体查询的条件中，我们像之前提到的那样，使用百分比而非 `em` 来定义宽度（第 39–54\
    \ 行）。如果宽度小于 600px，我们会重新排列导航，使其显示在主内容下方。如你所见，媒体查询通过一个或多个宽度条件进行了增强。我认为这些条件大多不言自明。\n\
    \n有一个重要的细节需要讨论。请看代码清单 19-4。\n\n###### 代码清单 19-4 级联媒体查询\n\n```\n1   @media screen\
    \ and (min-width: 960px){...}\n2   @media screen and (min-width: 600px) and (max-width:\
    \ 960px){...}\n3   @media screen and (max-width: 600px){...}\n```\n\n在这个定义中，较小屏幕（或窗口）的\
    \ `max-width` 等于较大屏幕的 `min-width`。这些重叠可以接受吗？代码清单 19-5 似乎展示了一种更好的方式。\n\n######\
    \ 代码清单 19-5 级联媒体查询，无重叠\n\n```\n1   @media screen and (min-width: 960px){...}\n\
    2   @media screen and (min-width: 600px) and (max-width: 959px){...}\n3   @media\
    \ screen and (max-width: 599px){...}\n```\n\n现在尺寸不再重叠，这也是你在一些讨论响应式设计的书籍或博客中会看到的方式。乍一看，这种无重叠的定义似乎是正确的。但事实并非如此：我们现在有了*两个*间隙，一个在\
    \ 959px 和 960px 之间，另一个在 599px 和 600px 之间。嗯？\n\n###### 尝试一个实验：\n\n将媒体查询替换为无重叠版本。从一个宽浏览器窗口开始，然后缩小其宽度。当到达一个断点时，缓慢增大和缩小窗口大小，观察会发生什么。根据你的系统或浏览器设置（你可能放大了字体，或者缩放了浏览器窗口），大多数浏览器在到达断点时会将导航显示在主内容下方。这是因为存在一个\
    \ 1 像素的间隙，并且计算出的尺寸恰好位于两个定义之间。两个定义都不会被使用，因此导航不会按预期显示。\n\n请看图 19-5。这里浏览器计算出的宽度为\
    \ 959.167px，正好落在这个 1 像素的间隙中。\n\n![A435433_1_En_19_Fig5_HTML.jpg](img/A435433_1_En_19_Fig5_HTML.jpg)\n\
    \n###### 图 19-5 宽度 = 959.167px\n\n由于这个问题，Books 采用了重叠方法。为了避免歧义，CSS 会使用 CSS 文件中找到的最后一个定义。\n\
    \n在我们的首个响应式方案中，对于宽视口尺寸，我们仍然使用 `em`。但由于容器被限制为 80em，即使视口更宽，主内容部分中基于百分比的相对尺寸也无法增长。因此，我们可以使用与较小窗口相同的百分比尺寸。\n\
    \n导航浮动在 `body > div` 容器之外。它的容器是浏览器的显示区域，并且会随着窗口的增大而增大。为了保持导航尺寸，仍然需要使用 `em` 来定义。说到这里，我们可以重构样式表。参见代码清单\
    \ 19-6。\n\n###### 代码清单 19-6 摘自 books.css，优化后的响应式定义\n\n```\n 1   body > div {\n\
     2     max-width: 80em;\n 3     margin: 0 auto;\n 4     text-align: left;\n 5   }\n\
    \n 7   main {\n 8     opacity: 0.95;\n 9     border-radius: 1em;\n10     background-color:\
    \ #eeeef3;\n11     margin-bottom: 1em;\n12     box-shadow: 0.5em 0.5em 0.5em #004;\n\
    13   }\n\n15   nav{\n16     opacity: 0.85;\n17     border-radius: 1em;\n18     background-color:\
    \ #ccccd8;\n19     box-shadow: 0.5em 0.5em 0.5em #004;\n20   }\n\n22   @media\
    \ screen and (min-width: 600px){\n23     main {\n24       width: 66.25%;\n25       padding:\
    \ 1.25%;\n26     }\n\n28     nav{\n29       position: fixed;\n30       top: 7.5em;\n\
    31     }\n32   }\n\n34   @media screen and (min-width: 960px){\n35     main, nav\
    \ {\n36       min-height: 40em;\n37     }\n\n39     nav{\n40       margin-left:\
    \ 56em;                                                                      \
    \                \n41       width: 22em;\n42       padding: 1em;\n43     }\n44   }\n\
    \n46   @media screen and (min-width: 600px) and (max-width: 960px){\n47     main,\
    \ nav {\n48       min-height: 45em;\n49     }\n\n51     nav{\n52       margin-left:\
    \ 70%;\n53       width: 27.5%;\n54       padding: 1.25%;\n55     }\n56   }\n\n\
    58   @media screen and (max-width: 600px){\n59     main {\n60       width: 97.5%;\n\
    61       padding: 1.25%;\n62     }\n\n64     nav{\n65       width: 97.5%;\n66       padding:\
    \ 1.25%;\n67       bottom: 1em;\n68     }\n69   }\n```\n\n在第 22 行，你会找到一个适用于所有宽度大于等于\
    \ 600px 的通用定义。\n\n## 响应式像素布局\n\n正如我们所见，制作响应式布局并不太难。幸运的是，我们创建的第一个（非响应式）布局版本中，尺寸是相对于字体大小而非屏幕的。然而，许多页面是使用像素尺寸设计的。这里的转换需要更多功夫，如代码清单\
    \ 19-7 所示。\n\n假设原始布局是使用像素精确设计的。\n"
- fmt: '###### Listing 19-7 Excerpt of a Pixel-Dimensioned Layout


    ```

     1   main {

     2     min-height: 500px;

     3     width: 640px;

     4     opacity: 0.95;

     5     border-radius: 10px;

     6     background-color: #eeeef3;

     7     padding: 10px;

     8     margin-bottom: 10px;

     9     box-shadow: 5px 5px 5px #004

    10   }


    12   nav{

    13     min-height: 500px;

    14     position: fixed;

    15     margin-left: 670px;

    16     width: 270px;

    17     padding: 10px;

    18     top: 90px;

    19     opacity: 0.85;

    20     border-radius: 10px;

    21     background-color: #ccccd8;

    22     box-shadow: 5px 5px 5px #004

    23   }

    ```


    Beware, it’s not the same! For example, `nav`’s left margin is `670px`, whereas
    the original layout used `56em = 672px`. Here, the designer preferred sizes that
    can be divided by 10, or at least by 5. In my experience, this is typical for
    a layout that’s been designed on fixed pixel counts.


    Most books on responsive design start with an example of how to make a pixel layout
    responsive. The common method suggested is to calculate the relative width of
    one pixel and multiply every pixel width by that accurate factor. Let’s do that:


    - Total width = 960 pixels, thus one pixel is `1/960 × 100% = 0.1041666666666667%`.

    - `640px = 640 × 0.1041666666666667% = 66.66666666666667%`.

    - `670px = 670 × 0.1041666666666667% = 69.79166666666667%`.


    And so on.


    Now the CSS looks ugly. In most instances, such accuracy isn’t needed. Get up
    the nerve to round these values to, at most, two-fraction digits. Trust me when
    I say users won’t notice any difference.


    ## Calculating Sizes


    Listing [19-8](#A435433_1_En_19_Chapter.xhtml#PC8) calculates some sizes.


    ###### Listing 19-8 Excerpt of Navigation Layout


    ```

     1   @media screen and (min-width: 960px){

     2     nav{

     3       margin-left: 56em;

     4       width: 22em;

     5       padding: 1em;

     6     }

     7   }


     9   @media screen and (min-width: 600px) and (max-width: 960px){

    10     nav{

    11       margin-left: 70%;

    12       width: 27.5%;

    13       padding: 1.25%;

    14     }

    15   }

    ```


    By shrinking the screen size, we switched from a padding, which is relative to
    the current font size, to the percent dimension, which is relative to the surrounding
    container. That means the padding itself will be diminished. Sometimes it’s useful
    to keep the padding relative to the font size. Using CSS 3, it’s no problem to
    mix different dimensions and keep accuracy.


    In our example, the element width plus its padding will result into a total width
    of `1.25% + 27.5% + 1.25% = 30%`. Let’s assume we have a requirement to keep the
    padding of `1em`. Then the element width has to be 30 percent minus `2em`. And
    that’s exactly what you can do:


    ```

    width: calc(30% - 2em);

    ```


    I assumed the padding will be added to the box width. That’s what most browsers
    do. (Old versions of Internet Explorer declare width including the padding and
    border.) Using CSS 3, you can change the behavior of box sizing in such a way
    that the width includes the padding and the borders (by `box-sizing: border-box;`).


    ###### Tip


    You can read about the CSS box model at W3Schools. Check out [www.w3schools.com/css/css_boxmodel.asp](http://www.w3schools.com/css/css_boxmodel.asp)
    and [www.w3schools.com/cssref/css3_pr_box-sizing.asp](http://www.w3schools.com/cssref/css3_pr_box-sizing.asp).


    ## Mobile-First and Desktop-First


    At first Books was developed for desktop computers only. Then with the rise of
    mobile devices came a need to adapt it to smaller screen sizes. This procedure
    is what today is called a *desktop-first* approach.


    Books simply places the navigation at the bottom when the screen size shrinks.
    Usually, for a small-sized screen, the height is very limited. It may be a good
    idea to replace the navigation by a folding menu to save some space. This can
    be solved by CSS also. Mobile devices sometimes only have smaller bandwidth (cellular
    network speed) available. So, often I advise reducing the user interface. For
    example, you may omit the background image. Or you may have to reduce content.


    The latter might become a hard job. Which parts are less important and can be
    eliminated? With that question in mind, lots of people prefer a *mobile-first*
    approach: develop an application with a minimal interface, and then adapt it to
    larger screens, adding some decorative padding.


    Don’t worry about people saying one or the other approach is best. Just do it
    your way.


    ## Summary


    Some years ago an application could be designed for a certain screen resolution,
    but today we need to consider different kinds of screens and sizes. Users may
    not use a desktop PC only. We have to consider laptop sizes, tablets, and other
    mobile devices. Because we can’t expect the user to scroll long content on small
    screens, we need to adapt the content of our application pages to different screen
    sizes.


    One key technique to make a web application *responsive* is to define different
    breakpoints within CSS’s media queries. This chapter showed a pure CSS approach.
    That might be complemented by the aid of JavaScript, which we’ll use for the Alumni
    application.


    To create a responsive application, you can start with a mobile layout first (mobile-first)
    or a desktop layout (desktop-first).


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_20](#A435433_1_En_20_Chapter.xhtml)


    # 20. Summary and Perspective


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Books is an application intended to be managed by mainly one author, publishing
    for many readers. We expect the author of the reviews (that’s me) to know how
    to interact with the application. That means we can have a reduced set of requirements
    regarding the user interface, especial with regard to validating input. Nevertheless,
    Books is a fully fledged interactive web application.


    After going over basic JSF tags for forms and text (in our discussions of TinyCalculator),
    we discussed more JSF features like loops, conditions, tables, and the different
    kinds of links, as well as more advanced features like templating. We outlined
    how JSF integrates with other Java EE technologies. Books takes advantage of the
    Java Persistence API (JPA), Context and Dependency Injection (CDI), and bean validation.
    We discussed some aspects of internationalization and how to make the application
    responsive to different screen sizes using CSS.


    The source code for the Books application is available as a zip file for download
    from [http://webdevelopment-java.info/webdevelopment/resources/download/BooksComplete.zip](http://webdevelopment-java.info/webdevelopment/resources/download/BooksComplete.zip).
    To open the compressed archive, use the password `MdkJ47(kq!`. If you check the
    code, you’ll find some techniques not discussed so far. For example, there’s a
    rare usage of `<f:ajax>`. These techniques will be described in the next part.


    Speaking of the next part, the next application, Alumni, is designed to be a social
    platform. All users need to be registered and will enter data. We’ll need to discuss
    security and increase our requirements for the user interface. All user input
    has to be validated, and the user should obtain immediate responses. Validators,
    AJAX, authentication, custom components, and more will all be introduced in the
    context of working with Alumni.


    # Part III

    Intermezzo


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_21](#A435433_1_En_21_Chapter.xhtml)


    # 21. Intermezzo


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    So far, we’ve talked about two web applications, TinyCalculator and Books. In
    this part, we will discuss some aspects of web development with JSF detached from
    developing concrete applications.


