- fmt: "###### Listing 14-26 Translation Enhancement of `Category.java`\n\n```\n 1\
    \   ...\n 2     @OneToMany(fetch = FetchType.LAZY,\n 3               cascade =\
    \ CascadeType.ALL,\n 4               orphanRemoval = true)\n 5     @JoinColumn(name\
    \ = \"ctCategoryId\", referencedColumnName = \"catId\")\n 6     @MapKey(name =\
    \ \"_language\")\n 7     private Map<String, CategoryTranslation> _catTranslations\
    \ =\n 8                       new HashMap<>();\n\n10     public Map<String, CategoryTranslation>\
    \ getCategoryTranslations() {\n11       return _catTranslations;\n12     }\n\n\
    14     public void setCategoryTranslations(\n15           Map<String, CategoryTranslation>\
    \ catTranslations) {\n16       _catTranslations = catTranslations;\n17   }\n\n\
    19     public String getTranslatedName(String langCode) {\n20       if (_catTranslations.containsKey(langCode))\
    \ {\n21         return _catTranslations.get(langCode).getName();\n22       }\n\
    23       return \"\";\n24     }\n\n26     public void setTranslatedName(String\
    \ langCode, String name) {\n27       if (_catTranslations.containsKey(langCode))\
    \ {\n28         _catTranslations.get(langCode).setName(name);\n29       } else\
    \ {\n30         CategoryTranslation translation = new CategoryTranslation();\n\
    31         translation.setLanguage(langCode);\n32         translation.setCategoryId(_id);\n\
    33         translation.setName(name);\n34         _catTranslations.put(langCode,\
    \  translation);\n35       }\n36     }\n\n38     public String getTranslatedNameOrDefault(String\
    \ langCode) {\n39       if (_catTranslations.containsKey(langCode)) {\n40    \
    \     String name = _catTranslations.get(langCode).getName();\n41         if (name.isEmpty())\
    \ {\n42           return _name;\n43         }\n44         return name;\n45   \
    \    }\n46       return _name;\n47     }\n48   ...\n```\n\nAlthough the convenience\
    \ methods should need no further explanation, some information for the `@OneToMany`\
    \ annotation is noteworthy. `fetch = FetchType.LAZY` will load the translation\
    \ only when first accessed. `EAGER` will load it together with the category itself.\
    \ Which one performs best depends on the data structure and usage. Imagine a big\
    \ object graph, with many parts of it rarely used. In such a case, lazy loading\
    \ would often be the better choice. In case of our categories, the translations\
    \ are small and often used, so I prefer an eager loading (and introduced lazy\
    \ first for didactic reasons).\n\nDepending on `cascade`, operations might be\
    \ cascaded or not—for example, persisting a category will persist its translations\
    \ or not. Here, we use `CascadeType.ALL` to cascade all operations. Other values\
    \ are `DETACH`, `MERGE`, `PERSIST`, `REFRESH`, and `REMOVE`.\n\nIn line 6 of Listing\
