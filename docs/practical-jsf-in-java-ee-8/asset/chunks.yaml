    `link`为`/page2`和`/page2.xhtml`创建链接，但不为其他路径创建。如果省略文件扩展名，JSF会自动添加`.xhtml`。斜杠`/`确定我们应用程序内的根目录——*不是*绝对路径。


    `/testLink`是应用程序的上下文路径，是一种“应用程序外部”的路径。而指向我的评论页面的链接则指向一个不同的网站。`link`用于JSF导航，因此对于任何其他链接，它都无法找到导航。


    另一方面，`outputLink`会按照指定方式创建我们提供的每个链接。如果未提供，JSF会自动在当前主机前添加前缀以完成链接。因此，`/page2`会变成`http://localhost:8080/page2`。这样的链接将指向一个不存在的页面。只有`/testLinks/page2.xhtml`和`http://itrezension.de`指向现有页面。


    ### 得出结论


    `link`只能用于内部导航。`outputLink`可用于外部链接，也可用于内部链接。对于内部链接，需要添加上下文路径。


    对于评论列表，（至少）可以使用两种替代解决方案：


    *   同时使用`link`和`outputLink`，并附带一个条件，根据链接类型选择适当的元素。清单[18-4](#A435433_1_En_18_Chapter.xhtml#PC4)展示了这种方法的原则。

    *   或者始终使用`outputLink`处理内部和外部链接。对于内部链接，您需要将上下文路径添加到页面地址中，使URI成为完全限定地址。


    Books使用了第二种方法。


    ###### 清单18-4 确定内部链接与外部链接的原则


    ```

    1   <h:link rendered="#{review.intern}" .../>

    2   <h:outputLink rendered="#{not review.intern}" .../>

    ```


    ###### 清单18-5 `reviewList.xhtml`的摘录


    ```

    1   <h:outputLink value="#{review.url}"

    2                 target="#{review.intern ? ''_self'' : ''_blank''}">

    3     #{review.title}

    4   </h:outputLink>

    ```


    外部链接存储在`ReviewLink`表中。它们定义了完整的URI，并按原样存储在数据库中。内部链接是通过将`bookId`和`language`附加到页面，并在前面加上上下文路径来动态创建的。上下文路径可从Faces上下文的ExternalContext中获取，如清单[18-6](#A435433_1_En_18_Chapter.xhtml#PC6)所示。


    ###### 清单18-6 创建内部链接


    ```

    1   private String buildUrl(int bookId, String language) {

    2     String path = FacesContext.getCurrentInstance()

    3             .getExternalContext().getRequestContextPath();

    4     return path + Page.UserReview.getUrl() +

    5             "?bookId=" + bookId + "&language=" + language;

    6   }

    ```


    `buildUrl`是`ReviewInfo.class`的一部分。


    ## 总结


    JSF提供了三种不同类型的链接。`commandLink`渲染一个HTML链接（`href`元素）。在渲染此链接时，JSF会添加一个`onClick`处理程序，将此链接重定向到一个输入提交元素。因此，这样的链接会发起一次回发导航。


    `link`渲染一个用于JSF导航案例（内部导航）的真实链接，而`outputLink`则创建一个不用于常规JSF导航，而是用于导航到外部页面的链接元素。无论如何，我们都可以用它来在应用程序内部进行导航。


