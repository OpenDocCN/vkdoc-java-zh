- fmt: '### Listing 14-21 Important Parts of `CategoryTranslation.java`


    ```java

    1   @Entity

    2   @Table(name = "CategoryTranslation")

    3   public class CategoryTranslation implements Serializable {


    5     @Id

    6     @GeneratedValue(strategy = GenerationType.IDENTITY)

    7     @Column(name = "ctId")

    8     private int _id = -1;


    10     @Column(name = "ctCategoryId")

    11     private int _categoryId = -1;


    13     @Column(name = "ctLanguage")

    14     private String _language;


    16     @Column(name = "ctName")

    17     private String _name;


    19     ... getters and setters omitted for brevity ...


    21     @Override

    22     public int hashCode() {

    23       if (_id < 0) {

    24         int hash = 3;

    25         hash = 89 * hash + _categoryId;

    26         hash = 89 * hash + Objects.hashCode(_language);

    27         return hash;

    28       }

    29       return _id;

    30     }


    32     @Override

    33     public boolean equals(Object object) {

    34       if (!(object instanceof CategoryTranslation)) {

    35         return false;

    36       }

    37       CategoryTranslation other = (CategoryTranslation) object;

    38       if (_id < 0 && other._id < 0) {

    39         return _categoryId == other._categoryId

    40                 && _language.equals(other._language);

    41       }

    42       return _id == other._id;

    43     }

    44   }

    ```


    Again, we need `hashCode` and `equals` to be the same for two objects with the
    same valid id. Otherwise, both are determined by `_categoryId` and `_language`.
    See Listing [14-22](#A435433_1_En_14_Chapter.xhtml#PC25).


    ### Listing 14-22 Create Statement for `CategoryTranslation` (MySQL)


    ```sql

    1   CREATE TABLE `CategoryTranslation` (

    2     `ctId` int(11) NOT NULL AUTO_INCREMENT,

    3     `ctCategoryId` int(11) NOT NULL,

    4     `ctLanguage` varchar(10) NOT NULL,

    5     `ctName` varchar(45) NOT NULL,

    6     PRIMARY KEY (`ctId`),

    7     KEY `FK_CategoryTranslation_Category2` (`ctCategoryId`),

    8     CONSTRAINT `FK_CategoryTranslation_Category2`

    9       FOREIGN KEY (`ctCategoryId`)

    10       REFERENCES `Category` (`catId`)

    11   );

    ```


    The preceding statement creates the table for a MySQL database—if you use another
    DBMS, you may need to adapt it. See Listings [14-23](#A435433_1_En_14_Chapter.xhtml#PC26)
    and [14-24](#A435433_1_En_14_Chapter.xhtml#PC27).


    ### Listing 14-23 Create Statement for `CategoryTranslation` (MS SQL Server Version)


    ```sql

    1   CREATE TABLE CategoryTranslation(

    2           ctId int IDENTITY(1,1) NOT NULL,

    3           ctCategoryId int NOT NULL

    4             CONSTRAINT FK_CategoryTranslation_Category2

    5             FOREIGN KEY(ctCategoryId) REFERENCES Category (catId),

    6           ctLanguage varchar(10) NOT NULL,

    7           ctName varchar(45) NOT NULL,

    8     PRIMARY KEY (ctId)

    9   )

    ```


    ### Listing 14-24 Create Statement for `CategoryTranslation` (MySQL Version)


    ```sql

    1  CREATE TABLE Books.CategoryTranslation (

    2     ctId INT NOT NULL AUTO_INCREMENT,

    3    ctCategoryId INT NOT NULL,

    4    ctLanguage VARCHAR(10) NOT NULL,

    5    ctName VARCHAR(45) NOT NULL,

    6    PRIMARY KEY (ctId),

    7    INDEX fk_CategoryTranslation_1_idx (ctCategoryId ASC),

    8    CONSTRAINT fk_CategoryTranslation_1

    9      FOREIGN KEY (ctCategoryId)

    10      REFERENCES Books.Category (catId)

    11      ON DELETE NO ACTION

    12      ON UPDATE NO ACTION);

    ```


    As you can see, a foreign key is defined to add referential integrity to the existing
    `Category` table. We may translate it into “this translation belongs to a category.”
    In fact, to one category no, one, or many translations may belong. Each category
    contains a collection of translations, which might be empty.


    Listing [14-25](#A435433_1_En_14_Chapter.xhtml#PC28) enhances the category entity
    to model this one-to-many relationship.


    ### Listing 14-25 One-To-Many Relationship with `List`


    ```java

    1   ...

    2     @OneToMany

    3     @JoinColumn(name = "ctCategoryId", referencedColumnName = "catId")

    4     private List<CategoryTranslation> _catTranslations;

    5   ...

    ```


    This relationship is defined by the `@OneToMany` annotation. We use a second table
    with a foreign key. This is modeled by the `@JoinColumn` annotation with the two
    columns that are used to join these tables. This should be pretty self-explanatory.
    All translations will be held by a list.


    With JPA, you might model other kinds of one-to-many relationships, such as using
    a dedicated join table. Usually such a dedicated join table is superfluous for
    a one-to-many relationship. You’ll need it for a many-to-many relationship.


    Thinking about the category translations, it would be useful to access a translation
    directly by its language code. Thus a `Map<String, CategoryTranslation>` would
    fit better than a list. No problem—we only have to define which field of the translation
    would become the map’s key.


    We also need accessors to this map, and for future use some convenience methods
    to access a single translation. See Listing [14-26](#A435433_1_En_14_Chapter.xhtml#PC29).'
