    ###### 观察编辑器


    作为练习，添加一些类别：编辑和删除。


    点击“保存”按钮，观察 GlassFish 控制台（或日志）。添加三个类别，分别命名为 x、y 和 x。现在，针对最后一个 x，点击“删除”。第一个 x 类别将被删除。你知道为什么吗？


    新创建的类别不包含有效的 id。根据 `hashCode()` 和 `equals()` 方法，文本相同的类别被视为相等。`_categories.remove(category);`
    会移除第一个匹配项。由于文本相同，删除“错误”条目实际上无关紧要。但如果我们构建的 `hashCode` 和 `equals` 方法仅依赖于 id，那么删除任何没有有效
    id 的条目都会移除第一个没有有效 id 的条目，即使文本可能不同。


    ## 总结


    Books 应用的开发始于应用程序的整体布局。由于许多 Java 开发者更熟悉桌面应用程序，因此本应用采用“桌面优先”的方法，而非当前流行的“移动优先”。我们考虑了响应式设计，并指出
    CSS 是应用这些样式的首选技术。本章展示了 CSS 在应用程序中的基本用法。


    我们开发了第一个对话框。通过模拟数据库访问，我们可以专注于用户界面，并引入了第一个重复结构来创建可编辑表格。


    在下一章中，我们将持久化这些数据。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_12`


    # 12. Java 持久化 API


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    Books 应用的数据是同构的，这意味着每个类别、书籍、评论或链接信息的整体结构都是相同的。此类数据的经典存储方法（通常也是最佳选择）是 SQL 数据库系统。


    如果您是 Java SE 开发者，并且到目前为止一直在访问 SQL 数据库，那么您可能使用过 Java 数据库连接（JDBC）。JDBC 是 SQL 语句的一种抽象。程序查询数据库并返回一个结果集，然后由您的程序将其转换为列表、对象等。将持久化数据转换为对象的责任落在了开发者身上。这是一项重复性、有时甚至是枯燥的工作，只是为了弥合关系型数据和对象之间的鸿沟。


    如果可以定义从关系到对象以及反向的映射规则，那么这项工作就可以由软件来完成。而这正是*对象关系映射器*（ORM）的用途。有几种兼容 JPA 的 ORM 可用。在
    Java EE 世界中，ORM 由 Java 持久化 API（JPA）定义。


    ###### 注意


    作为 Java EE 8 的一部分，JPA 的当前版本是 2.2。作为 JPA 2.1 的维护版本，它仍然由 JSR 338 定义（更多信息请访问 [`jcp.org/en/jsr/detail?id=338`](https://jcp.org/en/jsr/detail%3Fid=338)）。换句话说，没有专门针对
    2.2 版本的 JSR。


    ## 实体


    如果您熟悉 SQL，您可能知道数据库存储实体。*实体*是一个信息单元，或者简单地说，是一个事物。通常，实体由表的列表示。实体之间的关系通过实体-关系模型来建模。


    JPA 也使用术语*实体*来表示信息单元——在这种情况下，是一个 Java 对象。您可以将一个类注解为 @Entity，但一个 Java 对象可能很复杂。除了简单的属性之外，这样的对象可能包含集合或嵌入的其他对象。例如，如果您的
    Java 对象模拟一辆汽车，那么这个实体可能包含一个座椅对象列表。正如您可能想象的那样，如此复杂的对象无法存储在单个表中。一个 Java 对象可能存储在几个不同的表中。SQL
    实体通常存储在一个表中，而 JPA 实体可能变得更复杂。


    从技术上讲，JPA 实体是一个*普通的旧式 Java 对象*（POJO），它被映射到一个或多个 SQL 表。为了开始定义这种映射，我们选择 Books 中最简单的结构之一：类别。在初步方法中，忽略不同语言，一个类别由一个
    id 和一个文本组成。


    我们已经创建了 Category 类。要通过 JPA 将此 POJO 映射到数据库，只需使用 @Entity 对其进行注解即可。但这里还有两个更重要的事实：实体应该实现
    Serializable，并且声明 id 是必不可少的。通常，此 id 指的是数据库表的主键：


    ```

    1   @Entity

    2   public class Category implements Serializable{

    3     @Id

    4     private int id;

    5     private String name;


    7     [为简洁起见，省略了 getter 和 setter]

    8   }

    ```


    默认情况下，实体被映射到一个表，表名等于大写的类名，列名等于大写的属性名。因为 JPA 使用*反射*将数据库值传递到对象中，所以它可以访问私有字段（属性）。如果您让
    JPA 创建您的表，您会注意到这些大写名称。


    ###### 注意


    术语*属性*根据上下文用于许多不同的事物。在面向对象软件设计的术语中，属性是一个*实例变量*。有时它被称为*字段*，或者，如果与 getter 和 setter
    一起使用，则称为*属性*。


    如果您自己定义数据库表，您可能更喜欢所谓的驼峰式名称而不是大写名称，或者您可能更喜欢与 Java 类中使用的名称不同的名称。例如，许多数据库管理员更喜欢包含前缀的列名，例如
    catId 和 catName（顺便说一下，这些是驼峰式）。我通常用下划线作为 Java 属性的前缀，这是 C# 中的一种约定。只需确保属性名和列名之间存在差异即可。


    如果由于某种原因上述默认映射不合适，可以添加注解来映射表和列名。


    通常，表的主键只是一个由数据库生成的、无意义的唯一数字。JPA 支持这种生成策略。这里我们也需要一个特殊的注解。清单 12-1 显示了使用此类注解增强的类的摘录。


    ###### 清单 12-1 带有列映射的实体


    ```

     1   @Entity

     2   @Table(name = "Category")

     3   public class Category implements Serializable{

     4     @Id

     5     @GeneratedValue(strategy = GenerationType.IDENTITY)

     6     @Column(name = "Id")

     7     private int _id;


     9     @Column(name = "Name")

    10     private String _name;


    12     [为简洁起见，省略了 getter 和 setter]

    13   }

    ```


    在清单中，所有属性都使用 @Column 进行了注解。我建议要么注解所有列，要么都不注解，但这并不关键。您可以在一个类中混合使用注解和非注解属性。在这种情况下，所有未注解的属性将匹配它们的大写名称。每个属性都引用表中的一个列。如果您需要一个不应映射到列的属性，则该属性必须使用
    @Transient 进行注解。


    ###### 表特定前缀


    一些开发者和/或数据库管理员更喜欢为每个列名添加一个表特定的前缀，以减少对别名的需求。考虑以下带前缀和不带前缀的示例：


    ```

    SELECT * FROM book b JOIN category c on b.CategoryId = c.CategoryId

    SELECT * FROM book JOIN category on bookCategoryId = catId

    ```


    使用 @Column 注解，两种方法都可以使用。


    除了注解属性，您还可以注解 getter/setter 对。您必须决定是注解属性还是注解 getter/setter 对。不能混合使用。请考虑清单 12-2
    中的示例。

