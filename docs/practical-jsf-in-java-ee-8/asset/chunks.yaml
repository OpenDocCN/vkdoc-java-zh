    >\n 6     <modelVersion>4.0.0</modelVersion>\n\n 8     <groupId>de.muellerbruehl</groupId>\n\
     9     <artifactId>SimpleChat</artifactId>\n10     <version>1.0-SNAPSHOT</version>\n\
    11     <packaging>war</packaging>\n\n13     <name>SimpleChat</name>\n\n15     <properties>\n\
    16       <endorsed.dir>${project.build.directory}/endorsed</endorsed.dir>\n17       <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>\n\
    18     </properties>\n\n20     <dependencies>\n21       <dependency>\n22         <groupId>javax</groupId>\n\
    23         <artifactId>javaee-web-api</artifactId>\n24         <version>8.0</version>\n\
    25         <scope>provided</scope>\n26       </dependency>\n27       <dependency>\n\
    28         <groupId>org.glassfish.tyrus</groupId>\n29         <artifactId>tyrus-server</artifactId>\n\
    30         <version>1.13</version>\n31       </dependency>\n32     </dependencies>\n\
    \n34     <build>\n35       <plugins>\n36         <plugin>\n37           <groupId>org.apache.maven.plugins</groupId>\n\
    38           <artifactId>maven-compiler-plugin</artifactId>\n39           <version>3.1</version>\n\
    40           <configuration>\n41             <source>1.8</source>\n42             <target>1.8</target>\n\
    43             <compilerArguments>\n44               <endorseddirs>${endorsed.dir}</endorseddirs>\n\
    45             </compilerArguments>\n46           </configuration>\n47         </plugin>\n\
    48         <plugin>\n49           <groupId>org.apache.maven.plugins</groupId>\n\
    50           <artifactId>maven-war-plugin</artifactId>\n51           <version>2.3</version>\n\
    52           <configuration>\n53             <failOnMissingWebXml>false</failOnMissingWebXml>\n\
    54           </configuration>                                                \
    \                \n55         </plugin>\n56         <plugin>\n57           <groupId>org.apache.maven.plugins</groupId>\n\
    58           <artifactId>maven-dependency-plugin</artifactId>\n59           <version>2.6</version>\n\
    60           <executions>\n61             <execution>\n62               <phase>validate</phase>\n\
    63               <goals>\n64                 <goal>copy</goal>\n65               </goals>\n\
    66               <configuration>\n67                 <outputDirectory>${endorsed.dir}</outputDirectory>\n\
    68                 <silent>true</silent>\n69                 <artifactItems>\n\
    70                   <artifactItem>\n71                     <groupId>javax</groupId>\n\
    72                     <artifactId>javaee-endorsed-api</artifactId>\n73                     <version>8.0</version>\n\
    74                     <type>jar</type>\n75                   </artifactItem>\n\
    76                 </artifactItems>\n77               </configuration>\n78             </execution>\n\
    79           </executions>\n80         </plugin>\n81       </plugins>\n82     </build>\n\
    \n84   </project> \n```\n\n下一步是创建一个服务器端点，如前所述。名称选择 SimpleChat，并为包提供相同的名称。端点 URI\
    \ 将是 simplechat。\n\n接下来，修改 onMessage 方法，如清单 34-5 所示。\n\n###### 清单 34-5 用于广播消息的\
    \ onMessage 方法\n\n```\n1   @OnMessage\n2   public void onMessage(String message,\
    \ Session session) {\n3     ((TyrusSession) session).broadcast(message);\n4   }\n\
    ```\n\n现在修复导入（Ctrl+Shift+I）。\n\n每当我们的端点收到消息时，都会调用此方法。它所做的就是将这条消息广播给所有已打开与此端点 WebSocket\
    \ 连接的客户端。虽然看起来是广播，但在底层，服务器处理的是单个连接。我们将在不使用 Tyrus 的版本中自行处理这个问题。\n\n接下来，修改 index.xhtml\
    \ 页面，如清单 34-6 所示。\n\n###### 清单 34-6 SimpleChat 页面（index.xhtml）\n\n```\n 1   <?xml\
    \ version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE html PUBLIC \"-//W3C//DTD\
    \ XHTML 1.0 Transitional//EN\"\n 3     \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n 4   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\n 5         xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\
    >\n 6     <h:head>\n 7       <title>聊天</title>\n 8       <h:outputScript name=\"\
    simpleChat.js\"/>\n 9     </h:head>\n10     <h:body>\n\n12       <h1>简单聊天</h1>\n\
    13       <h:form prependId=\"false\">\n\n15         <div>\n16           输入消息：\n\
    17           <h:inputTextarea style=\"height: 1em;\"\n18               onkeypress=\"\
    if (event.keyCode === 13) {\n19                 acceptValue(this);\n20               }\"\
    \n21           />\n22         </div>\n23         <h:inputTextarea id=\"messages\"\
    \n24            style=\"width: 100%;\n25            min-height: 10em;\"/>\n26         </h:form>\n\
    27       </h:body>\n28   </html>\n```\n\n此页面定义了两个文本区域。一个只是简单的单行输入字段。我选择文本区域而不是简单的文本字段，是为了在按下回车键时能停留在该字段内。正如你在第\
    \ 18 行所见，按下回车键时会触发某些操作（调用 acceptValue）。\n\n第二个文本区域用于公共输出。这里我们将显示聊天中所有用户的消息。我们需要的粘合代码包含在一个\
    \ JavaScript 文件 simpleChat.js 中。\n\n在项目的 Web Pages 文件夹中，创建一个新文件夹 resources，然后在该文件夹中创建文件\
    \ simpleChat.js。JSF 将根据我们页面中的 outputScript 标签加载此文件。\n\n将以下内容添加到脚本文件中，如清单 34-7\
    \ 所示。\n"
- fmt: "###### Listing 34-7 The JavaScript Part of SimpleChat\n\n```\n 1   var websocket;\n\
    \n 3   window.onload = function () {\n 4     invokeConnection();\n 5   }\n\n 7\
    \   function invokeConnection() {\n 8     websocket = new WebSocket(obtainUri());\n\
    \ 9     websocket.onerror = function (evt) {\n10       onError(evt)\n11     };\n\
    12     websocket.onmessage = function (evt) {\n13       onMessage(evt)\n14   \
    \  };\n15     return true;\n16   }\n\n18   function obtainUri() {\n19     return\
    \ \"ws://\" + document.location.host + \"/SimpleChat/simplechat\";\n20   }\n\n\
    22   function onError(evt) {\n23     writeToScreen('<span style=\"color: red;\"\
    >ERROR:</span> ' + evt.data);\n24   }\n\n27   function onMessage(evt) {\n28  \
    \   element = document.getElementById(\"messages\");\n29     if (element.value.length\
    \ === 0) {\n30       element.value = evt.data;\n31     } else {\n32       oldTexts\
    \ = element.value.split(\"\\n\").slice(-19);\n33       element.value = oldTexts.join(\"\
    \\n\") + evt.data;\n34       element.scrollTop = element.scrollHeight;\n35   \
    \  }\n36     return;                                                         \
    \       \n37   }\n\n39   function acceptValue(element) {\n40     websocket.send(element.value);\n\
    41     element.value = \"\";\n42     return true;\n43   }\n```\n\nOur simple chat\
    \ is ready now. Compile and start the application. Enter some text and press Enter:\
    \ the text appears in the output area. Open the app in a second browser and enter\
    \ some more text: it will appear in the output field in all browsers.\n\nLet’s\
    \ talk about how this works. When the page is loaded, `invokeConnection` is being\
    \ called. This method establishes a WebSocket communication channel to the server\
    \ and registers two methods. `onMessage` is called for regular messages, and `onError`\
    \ handles errors. Every time the client receives a message from the server (as\
    \ sent by the broadcast), it gets the text area we use for the output and appends\
    \ the message. If a certain maximum is reached, it composes the output of the\
    \ last few messages.\n\nThe method `acceptValue` is called every time the user\
    \ hits the Enter key in the input field. The message is sent to the server, and\
    \ the input field is cleared to accept a fresh value.\n\nSo far, we’ve created\
    \ a very simple chat application using technologies that have been available since\
    \ Java EE 7. Java EE 8 added WebSocket for JSF, which I’ll talk about at the end\
    \ of this chapter. In the first version of the simple chat, any message had been\
    \ broadcasted by a Tyrus session. Next, I’ll show how to handle the broadcast\
    \ by yourself. You’ll recognize that in fact this is no broadcast: WebSocket,\
    \ as I’ve said, is a full-duplex communication protocol between two peers. To\
    \ emulate the broadcast, the server needs to send the message to every peer.\n\
    \nAn instance of our server endpoint is created every time the URL is opened in\
    \ your browser. If you stay on that page, you can reuse the existing endpoint.\
    \ If you want to verify that behavior, simply add a default constructor and report\
    \ the construction, as shown in Listing [34-8](#A435433_1_En_34_Chapter.xhtml#PC8).\n\
    \n###### Listing 34-8 Observe Object Creation by a Short Constructor Message\n\
    \n```\n1   public SimpleChat() {\n2     System.out.println(\"ctor SimpleChat\"\
    );\n3   }\n```\n\nUsing Glassfish/Payara, the output is logged. You can call the\
    \ logger instead. Using NetBeans, you may observe this log directly in the output\
    \ window of the IDE.\n\nFor every user, an instance of this class is created.\
    \ Each object is associated with one client. So if we want to broadcast a message\
    \ to all clients, then any endpoint needs to know about the others. To do that,\
    \ each peer session that wants to participate in the chat needs to register itself\
    \ at a common place. The simplest way to perform this task is to use a static\
    \ set of peer sessions, as shown in Listing [34-9](#A435433_1_En_34_Chapter.xhtml#PC9).\n\
    \n###### Listing 34-9 HashSet to Hold All Sessions\n\n```\n1   private static\
    \ final Set<Session> peers =\n2         Collections.synchronizedSet(new HashSet<Session>());\n\
    ```\n\nAt the beginning and the termination of a session, there’s an event we\
    \ can observe. To connect a method to one of these events, we need to annotate\
    \ a method either with `@OnOpen` or `@OnClose`. These methods need to accept a\
    \ session argument, which means these methods are the perfect candidates to register\
    \ and unregister the peer sessions. See Listing [34-10](#A435433_1_En_34_Chapter.xhtml#PC10).\n\
    \n###### Listing 34-10 Methods to Register/Unregister Peers\n\n```\n1   @OnOpen\n\
    2   public void onOpen(Session peer) {\n3     peers.add(peer);\n4   }\n\n6   @OnClose\n\
    7   public void onClose(Session peer) {\n8     peers.remove(peer);\n9   }\n```\n\
    \nOnce we’ve registered all peers, we just need to iterate them during `@OnMessage`\
    \ and send the message to every peer. To do that, we use `getBasicRemote()` to\
    \ get a reference to the remote endpoint where we want to send data synchronously,\
    \ as shown in Listing [34-11](#A435433_1_En_34_Chapter.xhtml#PC11). There’s a\
    \ second method, `getAsyncRemote()`, that can be used to send data asynchronously.\n\
    \n###### Listing 34-11 Broadcast Message by Sending It to Every Peer\n\n```\n\
    \ 1   @OnMessage\n 2   public void onMessage(String message) {\n 3     for (Session\
    \ peer : peers) {\n 4       try {\n 5         peer.getBasicRemote().sendObject(message);\n\
    \ 6       } catch (IOException | EncodeException ex) {\n 7         // log, handle,\
    \ or ingnore exceptions here\n 8       }\n 9     }\n10   }\n```\n\nYou may have\
    \ recognized the different signatures of the `onMessage()` method. We don’t need\
    \ the session argument, so we can use the overloaded method signature without\
    \ it.\n\nFor your convenience, Listing [34-12](#A435433_1_En_34_Chapter.xhtml#PC12)\
    \ shows the whole endpoint class (without imports).\n\n###### Listing 34-12 Complete\
    \ SimpleChat (Imports Omitted)\n\n```\n1   @ServerEndpoint(\"/simplechat\")\n\
    \ 2   public class SimpleChat {\n\n 4     private static final Set<Session> peers\
    \ =\n 5           Collections.synchronizedSet(new HashSet<Session>());\n\n 7 \
    \    @OnMessage\n 8     public void onMessage(String message) {\n 9       for\
    \ (Session peer : peers) {\n10         try {\n11           peer.getBasicRemote().sendObject(message);\n\
    12         } catch (IOException | EncodeException ex) {\n13           // log,\
    \ handle, or ingnore exceptions here\n14         }\n15       }\n16     }\n\n18\
    \     @OnOpen\n19     public void onOpen(Session peer) {\n20       peers.add(peer);\n\
    21     }\n\n23     @OnClose\n24     public void onClose(Session peer) {\n25  \
    \     peers.remove(peer);\n26     }\n27   } \n```\n\n## ClassRoom Chat\n\nLet’s\
    \ get back to Alumni. We want to prefix any message with the user who sent it,\
    \ and we need to handle different chat rooms for different classes.\n\nPupils\
    \ grow up and become students. They may change their domicile, school, and university.\
    \ All in all, over time somebody may belong to different classes, identified by\
    \ the final class. Once the user is logged in, they may choose a class and enter\
    \ the dedicated virtual classroom. In each classroom, Alumni offers a blackboard,\
    \ a calendar of events, and a chat.\n\nWe don’t want to implement a separate endpoint\
    \ for each class. Rather, we want to use a single endpoint and distinguish the\
    \ chat by the final class.\n\nOne solution would be to provide information about\
    \ the classroom with the endpoint URI. Let’s assume the classroom is identified\
    \ by a name. The code might look like the excerpt in Listing [34-13](#A435433_1_En_34_Chapter.xhtml#PC13)."
