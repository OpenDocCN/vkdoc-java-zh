    02     @Path(\"{id}\")\n03     public void delete(@PathParam(\"id\") String id)\
    \ {\n04       AccountFacade.getInstance().deleteAccount(id);\n05     }\n```\n\n\
    If we need more than one variable, we simply add it to the path. For the login,\
    \ the relative path contains the literal `login` and two variables for login name\
    \ and password. If the user can be authenticated, the `login` method returns all\
    \ the groups the user belongs to. That’s what our custom realm needs to proceed.\
    \ See Listing [33-4](#A435433_1_En_33_Chapter.xhtml#PC10).\n\n###### Listing 33-4\
    \ `AccountService` (Excerpt: `login`)\n\n```\n01     @GET\n02     @Produces(MediaType.APPLICATION_JSON)\n\
    03     @Path(\"login/{loginName}/{password}\")\n04    public String login(@PathParam(\"\
    loginName\") String loginName,\n05            @PathParam(\"password\") String\
    \ password) {\n06      try {\n07        Account account = AccountFacade.getInstance()\n\
    08                .findAccountByName(loginName);\n09        if (!account.checkPassword(password))\
    \ {\n10          return \"\";\n11        }\n12        return AccountFacade.getInstance().retrieveRoles(account.getId());\n\
    13      } catch (IllegalArgumentException ex) {\n14        LOGGER.log(Level.INFO,\
    \ ex.getMessage());\n15      }\n16      return \"\";\n17    } \n```\n\n## Testing\n\
    \nTesting a web application can be a challenge. Usually developers test their\
    \ units of code with the aid of a unit test framework, but lots of a web application’s\
    \ functionality relies on other modules or other Java EE technologies. We can\
    \ mock away parts of the application to isolate our unit under test.\n\nSometime\
    \ we can’t mock away anything. If we need features provided by the container,\
    \ it becomes hard to write a test with a simple test framework. Besides Selenium,\
    \ which automates the browser, we might use Arquillian ( [http://arquillian.org](http://arquillian.org)\
    \ ). In conjunction with ShrinkWrap, only those parts of an application needed\
    \ for the test are packed together into a web archive. Arquillian launches an\
    \ embedded app server with the reduced system to perform the test. This approach\
    \ might be combined with a unit test framework.\n\nLuckily, testing an isolated\
    \ micro service doesn’t require such an effort. Besides unit testing single classes,\
    \ we can write a small REST client and use the test framework to call our service’s\
    \ methods. Indeed, this isn’t unit testing—it’s integration testing.\n\nListing\
    \ [33-5](#A435433_1_En_33_Chapter.xhtml#PC11) shows a short excerpt of my tests\
    \ for the `AccountService`.\n\n###### Listing 33-5 Integration Test of the `AccountService`\
    \ (Excerpt)\n\n```\n01     @Test\n02     public void createAndDeleteAccount()\
    \ {\n03       AccountClient client = new AccountClient();\n04       Account account\
    \ = createAccount();\n05       Response postJson = client.createAccount(account);\n\
    06       assertEquals(201, postJson.getStatus());\n\n08       String path = postJson.getLocation().getPath();\n\
    09       String id = path.substring(path.lastIndexOf(\"/\") + 1);\n10       assertEquals(\"\
    testclient\", client.getAccount(id).getLoginName());\n11       client.deleteAccount(id);\n\
    12       assertEquals(null, client.getAccount(id));\n13     }\n```\n\n## Summary\n\
    \nBoth Alumni and the custom realm use account management. To avoid dependencies\
    \ from the realm to the application, we sourced out the account management into\
    \ its own application. Such an application that focuses on a solitary business\
    \ case is known as a micro service.\n\nJava EE supports two different kinds of\
    \ web services out of the box:\n\n*   WS* services\n*   RESTful services\n\nWe\
    \ implemented `AccountService` as an independent RESTful service based on the\
    \ JAX-RS functionality. JAX-RS supports easy access to the information the client\
    \ sends via an HTTP request. We can extract information out of the URI by defining\
    \ path patterns, or we can access data sent via header—for example, POST data.\n\
    \nTo test this service, we create an appropriate client and use a unit test framework\
    \ to call the service methods.\n\n© Michael Müller 2018\n\nMichael Müller, Practical\
    \ JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_34](#A435433_1_En_34_Chapter.xhtml)\n\
    \n# 34. Classroom Chat (WebSockets)\n\nMichael Müller^(1 )\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nAlumni is built for former pupils or students who join one or more\
    \ classes. They may communicate within each class. The application supports two\
    \ different kinds of communication: messaging and chat.\n\nUsing the messaging\
    \ feature, the user can select a couple of recipients, write the message, and\
    \ send it. By clicking the Send button, the message is stored to a table. Some\
    \ metadata, including a link to that message, is stored for every recipient. They\
    \ may log in at any time and open their message box to read the messages. This\
    \ kind of communication is usually used for asynchronous communication between\
    \ individuals. It is realized by techniques described already in earlier chapters,\
    \ so I won’t dive further into its implementation.\n\nA chat, on the other hand,\
    \ is used for *synchronous* communication. You can compare chatting with speaking\
    \ in a room: all people in that room can listen to the words at the time of speaking,\
    \ assuming there is no considerable delay and people are able to hear. We often\
    \ use the term *chat room*, a colloquial synonym for a shared communication channel.\
    \ When any user writes a message, it’s displayed immediately to all users in the\
    \ same chat room. For this to work, either the client needs to pull new information\
    \ every few milliseconds or the server needs to push the information. So far,\
    \ we’ve used HTTP concept: the client initiates the communication, the server\
    \ sends the answer, and the communication terminates until the next request. Pure\
    \ HTTP can be used to implement this *pull* concept, but it’s not hard to imagine\
    \ the huge amount of traffic that approach can generate. So we need another technique\
    \ that allows us to implement the *push* approach.\n\nWhen someone enters a chat\
    \ room, it’s nice for them to be able to easily get a sense of the ongoing discussion.\
    \ Alumni stores a few of the latest messages and shows them to a user entering\
    \ the chat room as a kind of replay."
