    \n###### 图 24-1 注册表单片段\n\n在这个表单中，我们有多个输入字段，每个字段都嵌入在独立的 div 中，并附带一个标签和一个消息。例如，查看名字字段（第\
    \ 3–12 行）。我们从标签开始（第 4–6 行）。在该标签之后，如果出现错误，将显示一条消息（第 7 行和第 8 行）。最后，我们有适当的输入字段，用户可以在其中输入信息（第\
    \ 9–11 行）。\n\n对于密码字段，我们使用 `inputSecret` 代替 `inputText`。这会渲染一个秘密输入字段，每个字符显示为圆点，隐藏实际输入。除此之外，它的用法与其他输入字段相同。\n\
    \n如前所述，如果验证错误，将显示错误消息。如果像这样创建表单，则只有在用户单击“注册”按钮时才会进行验证。\n\n查看这段代码，可能会产生一些问题：\n\n\
    *   我们如何执行验证？\n\n*   我们如何在输入每个值后提供即时反馈？\n\n*   所有输入部分看起来都很相似——是否可以预定义并重用这样的结构？\n\
    \n*   我们如何处理密码？\n\n接下来的几章将回答这些问题。\n\n## 总结\n\n本章介绍了 Alumni，一个依赖用户输入的社交媒体应用程序。这意味着我们需要所有对话框都具有容错性，并能提供即时反馈。\n\
    \nAlumni 主要由不同的软件模块构建，用于 GUI、业务逻辑和数据。一个独立的微服务为 Alumni 和身份验证管理用户。本章介绍了所需 POM 文件的有趣部分，并特别关注了\
    \ Java EE 8。\n\n像为 Books 开发表单那样开发注册表单会显得繁琐，并引发如何做得更好的问题。\n\n© Michael Müller 2018\n\
    \nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_25`\n\
    \n# 25. 验证\n\nMichael Müller^(1 )\n\n(1)德国北莱茵-威斯特法伦州布吕尔\n\n在 JSF 将数据传输到模型之前，原始数据必须经过转换和验证。第\
    \ 15 章简要介绍了*Bean 验证*。如前所述，除了 Bean 验证之外，JSF 还提供了自己的验证规范。尽管 Bean 验证是较新的技术，但它并不能替代较旧的\
    \ JSF 验证——有时使用这种“旧”验证非常方便。\n\n本章涵盖不同类型的验证。\n\n## Bean 验证\n\nBean 验证使用特殊的约束，这些约束通过注解应用于字段或访问器。其中一些约束在前面的章节中已经提到过，当时在描述\
    \ Books 中的 Book 实体时。你可以在 Java EE 8 教程（ [`javaee.github.io/tutorial/bean-validation.html`](https://javaee.github.io/tutorial/bean-validation.html)\
    \ ）中找到这些约束的表格。Bean 验证的完整描述也可在 [`beanvalidation.org`](http://beanvalidation.org)\
    \ 上找到。\n\n为了进一步讨论，清单 25-1 显示了用于注册过程的 Account 实体的一个片段。\n"
- fmt: "### Listing 25-1 Data Model for the Registration\n\n```\n01   @Entity\n02\
    \   @Table(name = \"Account\")\n03   public class Account implements Serializable\
    \ {\n\n05     // <editor-fold defaultstate=\"collapsed\" desc=\"Property Id\"\
    >\n06     @Id\n07     @Column(name = \"id\")\n08     private byte[] _id = UuidUtil.toBytes(UUID.randomUUID());\n\
    \n10     public String getId() {\n11       return HashUtils.byte2hex(_id);\n12\
    \     }\n13     // </editor-fold>\n\n15     // <editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Property Status\">\n16     @Column(name = \"status\")\n17     private\
    \ AccountStatus _status = AccountStatus.New;\n\n19     public AccountStatus getStatus()\
    \ {\n20       return _status;\n21     }\n\n23     public void setStatus(AccountStatus\
    \ status) {                                                                  \
    \                                                                            \
    \        \n24       _status = status;\n25     }\n26     // </editor-fold>\n\n\
    28     // <editor-fold defaultstate=\"collapsed\" desc=\"Property LoginName\"\
    >\n29     @Column(name = \"loginName\")\n30     private String _loginName;\n\n\
    32     @Size(min = 1, max = 50)\n33     public String getLoginName() {\n34   \
    \    return _loginName;\n35     }\n\n37     public void setLoginName(String loginName)\
    \ {\n38       _loginName = loginName;\n39     }\n40     // </editor-fold>\n\n\
    42     // <editor-fold defaultstate=\"collapsed\" desc=\"Property FirstName\"\
    >\n43     @Column(name = \"firstName\")\n44     private String _firstName = \"\
    \";\n\n46     @Size(min = 1, max = 50)\n47     public String getFirstName() {\n\
    48       return _firstName;\n49     }\n\n51     public void setFirstName(String\
    \ firstName) {                                                               \
    \                                                                            \
    \           \n52       _firstName = firstName;\n53     }\n54     // </editor-fold>\n\
    \n56     // <editor-fold defaultstate=\"collapsed\" desc=\"Property LastName\"\
    >\n57     @Column(name = \"lastName\")\n58     private String _lastName;\n\n60\
    \     @Size(min = 1, max = 50, message = \"{validation.lastname.size}\")\n61 \
    \    public String getLastName() {\n62       return _lastName;\n63     }\n\n65\
    \     public void setLastName(String lastName) {\n66       _lastName = lastName;\n\
    67     }\n68     // </editor-fold>\n\n70     // <editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Property Email\">\n71     @Column(name = \"email\")\n72     private String\
    \ _email = \"\";\n\n74     @Size(min = 6, max = 100)\n75     public String getEmail()\
    \ {\n76       return _email;\n77     }\n\n79     public void setEmail(String email)\
    \ {\n80       _email = email;\n81     }\n82     // </editor-fold>\n83   }\n```\n\
    \nBesides the `id`, this excerpt shows some—but not all—fields that correspond\
    \ to the appropriate input fields of the UI. The names must be from 1–50 characters\
    \ in length. The email has to follow a special pattern, which is enforced by a\
    \ regular expression (covered later in this chapter). The size of the email is\
    \ restricted to 100 characters.\n\n> **Note:** There are stories of impossible\
    \ registration because the system validated a minimum length of 3, but the valid\
    \ name (as far as I remember, this can occur with some African names) was only\
    \ 1 character long.\n\nJSF automatically invokes bean validation. Behind the scenes,\
    \ there’s a lot to do: JSF must discover whether bean validation is used and invoke\
    \ it if needed. The essence of this invocation is shown in Listing [25-2](#A435433_1_En_25_Chapter.xhtml#PC2),\
    \ a short code snippet that demonstrates the principle.\n\n### Listing 25-2 Programmatic\
    \ Invocation of Bean Validation\n\n```\n1   @Inject private Account _account;\n\
    \n3   Validator validator = Validation.buildDefaultValidatorFactory()\n4     \
    \                              .getValidator();\n5   Set<ConstraintViolation<Accountt>>\
    \ violations =\n6                                        validator.validate(_account);\n\
    ```\n\nThis snippet only shows how to check the violations and assign them to\
    \ a set. What JSF performs behind the scenes is much more than this.\n\nIf JSF\
    \ discovers one or more constraint violations, it will generate the appropriate\
    \ messages and rerender the current page to display them. The data isn’t transferred\
    \ to the model, and whatever should happen when the user clicks the Register button\
    \ won’t be executed.\n\nBean validation offers an option to annotate a customized\
    \ message:\n\n```\n1   @Size(min = 1, max = 50,\n2   message = \"Length of first\
    \ name must be between {min} and {max} characters\")\n```\n\nYou may want to develop\
    \ an international application. By the approach shown here, it’s possible to customize\
    \ the message, but not to localize it. You do that by creating a `ValidationMessages.properties`\
    \ file and its localized variants (for example, `ValidationMessages_de.properties`)\
    \ in the default package. In this file, you can override the default values or\
    \ create your own customized messages, including their localized variants.\n\n\
    ### Creating a Customized Message\n\n1.  (Optional) In the project tree, select\
    \ the `Other Sources/src/main/resources` folder.\n\n2.  To create a properties\
    \ file using NetBeans, choose New File (or press `Ctrl+N`). The New File dialog\
    \ opens (Figure [25-1](#A435433_1_En_25_Chapter.xhtml#Fig1)).\n\n    ![A435433_1_En_25_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_25_Fig1_HTML.jpg)\n\
    \n    > **Figure 25-1** New File dialog\n\n3.  In the dialog, choose the category\
    \ Other and then Properties File.\n\n4.  Click Next.\n\n5.  In the Name field,\
    \ enter `ValidationMessages`.\n\n6.  If you did step 1, the folder should be prepopulated\
    \ with `src\\main\\resources`. Otherwise, enter this value or browse to the desired\
    \ folder.\n\n7.  Click Finish. NetBeans creates the properties file for you.\n\
    \n8.  Right-click the properties file and choose Customize. NetBeans opens the\
    \ Customizer dialog, shown in Figure [25-2](#A435433_1_En_25_Chapter.xhtml#Fig2).\n\
    \n    ![A435433_1_En_25_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_25_Fig2_HTML.jpg)\n\
    \n    > **Figure 25-2** Customizer dialog\n\n9.  Add locale(s) of your choice.\n\
    \n10.  Right-click any of these new files and choose Open (not Edit). NetBeans\
    \ opens the properties editor with all locales.\n\n11.  Click New Property.\n\n\
    12.  For Key, enter `javax.validation.constraints.Size.message`.\n\n13.  For Value,\
    \ enter your customized message. For example, `The length must be between {min}\
    \ and {max} characters`.\n\n14.  Run the app and enter a name that’s either too\
    \ short or too long. JSF displays the customized message.\n\n### Details of Customized\
    \ Messages\n\nSo, how can you determine that magic key? And how do you create\
    \ other customized messages for the same constraint (on other fields or getters)?\
    \ You’ll find the answer in this book—or by browsing the Java source code. Using\
    \ NetBeans, place the cursor on the `@Size` annotation and invoke press `Ctrl+B`\
    \ (`Ctrl+Enter` if you’re using Eclipse). This is a shortcut for Go To Declaration.\
    \ NetBeans opens `Size.java` in its editor, shown in Listing [25-3](#A435433_1_En_25_Chapter.xhtml#PC4).\n\
    \n### Listing 25-3 Size.java (Excerpt)\n\n```\n 1   [...]\n 2   public @interface\
    \ Size {\n 3    [...]\n 4     public String message()\n 5                   default\
    \ \"{javax.validation.constraints.Size.message}\";\n\n 7     public int min()\
    \ default 0;\n\n 9     public int max() default 2147483647;\n10    [...]\n11 \
    \  }\n```\n\nHere you’ll find the declaration of `message` with a default value.\
    \ Look at the properties `min` and `max`. Both are public and may be referenced\
    \ in the value of the `message` if placed in the message within curly braces.\n\
    \nWith that knowledge, we can create different keys at different locations. See\
    \ Listing [25-4](#A435433_1_En_25_Chapter.xhtml#PC5)."
