  trans: "\n###### 列表 B-6 兄弟选择器示例\n\n```\n 1                         <?xml version='1.0'\
    \ encoding='UTF-8' ?>                    \n                       2          \
    \               <!DOCTYPE html>                    \n                       3   <\
    \                      html                      >                    \n     \
    \                  4       <                      head                      >\
    \                    \n                       5           <                  \
    \    title                      >CSS demo</                      title       \
    \               >                    \n                       6       </     \
    \                 head                      >                    \n\n        \
    \               8       <                      style                      type=\"\
    text/css\">                    \n                       9                    \
    \             label                      {                    \n             \
    \         10                                     font-weight                 \
    \     :                      bold                      ;                    \n\
    11           }\n                      12                                 label\
    \                      ~                      label                      {   \
    \                 \n                      13                                 \
    \    color                      :                      green                 \
    \     ;                    \n14           }\n                      15           \
    \                      label                      +                      label\
    \                      {                    \n                      16               \
    \                      font-size                      : 2                    \
    \  em                      ;                    \n17           }\n           \
    \           18       </                      style                      >    \
    \                \n\n                      20       <                      body\
    \                      >                    \n                      21           <\
    \                      label                      >first label</             \
    \         label                      >                    \n                 \
    \     22           <                      label                      >second label</\
    \                      label                      >                    \n    \
    \                  23           <                      br                    \
    \  />                    \n                      24           <              \
    \        label                      >third label</                      label\
    \                      >                    \n                      25       <\
    \                      body                      >                    \n     \
    \                 26   </                      html                      > \n\
    ```\n\n`label ~ label` 用于选择第二个和第三个标签，它们都是第一个标签的兄弟元素。`label + label` 仅选择第二个标签，因为它紧跟在第一个标签之后，而第三个标签则被一个\
    \ `<br/>` 标签分隔开。\n\n### 盒模型\n\n每个元素都占用一个空间，该空间由其显示样式及其内容决定。\n\n像 `label` 或 `input`\
    \ 这样的文本元素属于 `inline`（内联）显示类型。元素的宽度由其内容决定。每个元素都排列在前一个元素的右侧。根据浏览器窗口的大小，可能会插入换行符。\n\
    \n像 `div` 这样的元素是块级元素。这些元素可以有一个 `width` 属性来定义其宽度。否则，将使用浏览器窗口的完整宽度。块级元素是垂直排列的。\n\
    \n使用 CSS，可以定义 `inline-block`（内联块）显示类型。（`display` 属性的有效值包括 `none`、`inline`、`block`\
    \ 和 `inline-block`。）此类元素像 `inline` 元素一样水平排列，但可以独立于其内容定义宽度。例如，考虑一个 `label`，它通常会在文本结束处结束，无论是否声明了宽度。如果你使用\
    \ `display: inline-block;`，你可以为该 `label` 分配任意宽度。\n\n元素的高度通常由其内容决定。\n\n在*盒模型*中，每个元素的宽度由其内容决定，或者对于块级（包括\
    \ `inline-block`）元素，由 `width` 属性决定。高度通常自动确定。元素周围是定义大小的内边距（`padding`），可能为 `0`。在内边距之外，可以定义边框（`border`）。而在边框之外是外边距（`margin`）。\n\
    \n列表 B-7 演示了此模型，其输出如图 B-5 所示。为了使内边距可见，每个 `div` 元素都有其自己的背景色，该背景色包围着内部的 `label`。外边距的背景是透明的。它只是定义了浏览器元素之间的间隙以及到浏览器边框的距离。为了使它在本书中可见，整个\
    \ HTML 文档的背景色被设置为灰色。\n\n![A435433_1_En_BookBackmatter_Fig7_HTML.jpg](img/A435433_1_En_BookBackmatter_Fig7_HTML.jpg)\n\
    \n###### 图 B-5 CSS 盒模型示例\n"
- fmt: "###### Listing B-7 CSS Box Model\n\n```\n 1                       <?xml version='1.0'\
    \ encoding='UTF-8' ?>                  \n                     2              \
    \         <!DOCTYPE html>                  \n                     3   <      \
    \              html                    >                  \n                 \
    \    4       <                    style                    type=\"text/css\">\
    \                  \n                     5                               html\
    \                    {                  \n                     6               \
    \                    background-color                    :                   \
    \ lightgray                    ;                  \n 7           }\n         \
    \            8                               div                    {        \
    \          \n                     9                                   display\
    \                    :                    inline-block                    ;  \
    \                \n                    10                                   width\
    \                    : 60                    px                    ;         \
    \         \n                    11                                   padding \
    \                   : 10                    px                    ;          \
    \        \n                    12                                   border-style\
    \                    :                    solid                    ;         \
    \         \n                    13                                   border-color\
    \                    :                    blue                    ;          \
    \        \n                    14                                   border-width\
    \                    : 10                    px                    ;         \
    \         \n                    15                                   margin  \
    \                  : 20                    px                    ;           \
    \       \n                    16                                   background-color\
    \                    :                    red                    ;           \
    \       \n17           }\n                    18                             \
    \  div                    +                    div                    {      \
    \            \n                    19                                   background-color\
    \                    :                    orange                    ;        \
    \          \n20           }\n                    21                          \
    \     br                    +                    div                    {    \
    \              \n                    22                                   width\
    \                    : 200                    px                    ;        \
    \          \n                    23                                   background-color\
    \                    :                    green                    ;         \
    \         \n24           }\n                    25                           \
    \    label                    {                  \n                    26               \
    \                    background-color                    :                   \
    \ white                    ;                  \n27           }\n             \
    \       28                               div                    +            \
    \        div                    >                    label                   \
    \ {                  \n                    29                                \
    \   display                    :                    inline-block             \
    \       ;                  \n                    30                          \
    \         width                    : 60                    px                \
    \    ;                  \n31           }\n                    32       </    \
    \                style                    >\n\n34       <                    body\
    \                    >                  \n                    35           < \
    \                   div                    ><                    label       \
    \             >content<                    label                    ></      \
    \              div                    >                  \n                  \
    \  36           <                    div                    ><               \
    \     label                    >content<                    label            \
    \        ></                    div                    >                  \n \
    \                   37           <                    br                    />\
    \                  \n                    38           <                    div\
    \                    ><                    label                    >content<\
    \                    label                    ></                    div     \
    \               >                  \n                    39       <          \
    \          body                    >                  \n                    40   </\
    \                    html                    > \n```\n\nThe boxes in the first\
    \ line both have a width of 60 pixels. This is more than the width of the `label`\
    \ contained in this `div`. For the second `div`, the `label` display is re-defined\
    \ as `inline-block`. This allows defining a width for this `label`. As you can\
    \ see, the `label` (white background) gets wider, but the width of the `div` (which\
    \ is of the same width) doesn’t change.\n\nThe two elements of the first line\
    \ seems to have the same width as the third box. But `2*60` is not equal to `200`!\n\
    \nCharacteristic of the box model is that it defines the content size, not the\
    \ whole display size. So we have to add `padding`, `border`, and `margin`, both\
    \ on the left and right side. `2*(60+2*padding+2*border+2*margin) = 2*(60+20+20+40)\
    \ = 280`, and this equals the second line, `200+20+20+40 = 280`.\n\nThe understanding\
    \ of this box model is essential for calculating a layout. With CSS3, it’s possible\
    \ to change this default model by `box-sizing: border-box;`. Applying `border-box`,\
    \ the width determines the width including `padding` and `border`.\n\n###### Note\n\
    \nTo enable a simple calculation, the example for the box model uses a fixed size,\
    \ given in pixels. For real applications, relative sizes like `em` (as used in\
    \ the other examples) or percent should be preferred. Relative sizes simply allow\
    \ changing the size globally and are essential for a responsive design.\n\n###\
    \ Enhanced Styling\n\nWith CSS, it’s possible to reorder the content. Or to add\
    \ text or images. Or to change the design depending on the display size. This\
    \ appendix merely introduced the basics of CSS.\n\nThe applications in this book\
    \ sometimes use such enhanced styling features, such as pseudo elements, divers\
    \ positioning, background, media queries, and more. They’re described in the appropriate\
    \ chapters.\n\n###### Note\n\nIf you want to learn CSS, lots of good books are\
    \ available on the market, and plenty of good online tutorials are on the Internet.\
    \ W3schools’s CSS tutorial is worth a look: [www.w3schools.com/css](http://www.w3schools.com/css).\n\
    \n# Appendix C: Tag Libraries\n\nWhen developing a web application, you always\
    \ have to create some HTML pages to be displayed in the browser. One approach\
    \ is to hide the HTML handling and fully generate the pages. The other extreme\
    \ is to mix the application code into a HTML page.\n\nBut the most common solution\
    \ is to separate page from code. To do that, some instructions are placed into\
    \ the page that invoke your code. Technically, these instructions are HTML/XML\
    \ tags or attributes, although some may call them something else. For example,\
    \ AngularJS instructions are HTML attributes, but they call them *directives*.\
    \ “Traditional” JSF apps are usually built with tags, but since JSF 2.2, you can\
    \ waive some tags and use pass-through elements instead.\n\nAll those tags are\
    \ grouped together and are available using different namespaces. Table [C-1](#A435433_1_En_BookBackmatter_OnlinePDF_split_000.xhtml#Tab1)\
    \ provides an overview about these namespaces."
