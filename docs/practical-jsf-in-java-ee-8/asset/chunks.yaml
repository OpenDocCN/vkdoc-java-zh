    ###### 注意


    JSF 提供了一个用于调试的标签（别忘了合适的命名空间）：<ui:debug hotkey="1"/>。如果包含此标签的页面在浏览器中显示，按下 Ctrl+Shift+1
    即可获取一些有用信息，例如组件树、变量和视图状态。将 1 替换为你选择的任意键。如果省略了 key 属性，则默认为 d。根据你的浏览器和已安装的插件，此默认键可能已被用于其他用途。


    ## 导航


    导航是应用程序的重要组成部分。在桌面应用程序中，你可能通过点击菜单选项或选择注册标签页来打开一个对话框。在 Web 应用程序中，我们总是处理页面。尽管我们可能为用户提供类似标签控件的外观和感觉，但一切仍然是页面。


    HTML 的标准导航元素是链接。但在 JSF 应用程序中，导航也可能由按钮点击触发。在 JSF 2.0 之前，导航规则必须在 faces-config.xml
    文件中定义（更多信息请参见第 6 章）。


    导航可以这样定义：


    ```

    1   <navigation-rule>

    2       <from-view-id>/index.xhtml</from-view-id>

    3       <navigation-case>

    4           <from-outcome>add</from-outcome>

    5           <to-view-id>/index.xhtml</to-view-id>

    6       </navigation-case>

    7   </navigation-rule>

    ```


    假设页面上有一个“添加”按钮。该按钮被分配到一个方法，该方法返回字符串 add。如果从 index.xhtml 页面开始，点击该按钮，则接下来应打开 index.xhtml
    页面。在这种情况下，它只是同一个页面——这正是我们在 TinyCalculator 中所做的。


    但我们的例子更简单。没有定义导航规则。从 JSF 2.0 开始，操作方法的结果可以直接用作下一个 URL。因此，我们的 add 方法简单地返回 index.xhtml
    以导航到此页面。或者更简单，它返回一个空字符串（或 null）以停留在当前页面。此功能称为*内部导航*（或*隐式导航*）。但由 XML 定义的*外部导航*仍然允许，并且会覆盖内部导航规则。


    在本书的示例应用程序中，我们将主要使用内部导航。


    ## 总结


    JSF 是在 Java 规范请求（JSR）的开放过程中开发的。最新版本是 JSF 2.3。JSF 支持两种不同的视图定义语言：JSP（JavaServer
    Pages）和 Facelets。由于新功能仅适用于 Facelets，因此本书主要省略 JSP 而采用 Facelets。


    Web 开发的一个挑战是底层 HTTP 协议的无状态行为。虽然 JSF 大多隐藏了这一点，但具备最低限度的知识仍然是有帮助的。JSF 通过其生命周期阶段来应对这一挑战。JSF
    提供了一些命名空间和标签来描述应用程序的页面（视图），并在处理请求时构建这些元素的组件树。网页之间的导航可以在外部（通过 XML 配置文件）或内部定义。本书主要使用内部导航。


