  trans: '

    ###### 图 3-1 HTTP 请求-响应周期


    从技术上讲，响应是 HTTP 协议，其中可能包含 HTML 之外的其他信息。例如，响应可能是嵌入在 HTML 页面中的一张图片。因此，许多程序员将其视为 HTML
    响应。图 3-1 展示了这种简化视图。


    从这个角度来看，我们将应用服务器视为一个*黑盒*。其内部发生的事情很有趣。简要回顾一下之前的应用程序——这里你定义了一个 JSF 页面。我们使用 Facelets
    作为页面语言。除了 HTML，每个 Facelets 页面定义都包含一些 JSF 特定的标签，例如 `<h:inputText>`。在浏览器中，我们提供了这样一个页面的
    URI。在应用程序的后续步骤中，这个 URI 将不再由用户（通过输入 URI）提供，而是由应用程序本身提供。


    服务器根据 URI 确定要渲染的页面，解析其内容，并解析这些标签。在最简单的情况下，标签会被替换为相应的数据，然后生成的页面被发送到浏览器。但这只是部分情况。浏览器之前确实可能已经显示了应用程序的数据。因此，JSF
    首先会检查是否已存在会话。如果存在，则会恢复组件树——即视图模型的逻辑表示。接着验证输入项，并更新数据模型。总的来说，对于图 3-1 中的步骤 2，JSF
    有六个不同的阶段。


    让我们深入一点，简要了解一下处理过程以及 JSF 生命周期。


    ## JSF 生命周期概述


    JSF 生命周期包含六个阶段，如图 3-2 所示：


    1.  恢复视图

    2.  应用请求值

    3.  处理验证

    4.  更新模型值

    5.  调用应用程序

    6.  渲染响应


    ![A435433_1_En_3_Fig2_HTML.jpg](img/A435433_1_En_3_Fig2_HTML.jpg)


    ###### 图 3-2 JSF 生命周期


    图 3-2 展示了六个主要阶段以及它们之间表示事件处理的小方框。箭头表示顺序处理流程，指示了正常流程。对于新页面，流程可能会有所不同，如弯曲箭头所示。在某些阶段之间，会处理（前一阶段的）事件。作为此处理的异常结果（图中未显示），你可能会跳出顺序流程。


    当请求到达服务器时，首先会恢复组件树。如果是对新页面的请求，则不存在现有的组件树。因此，无需恢复，而是创建一个新的组件树。在这种情况下，阶段 2 到阶段 5
    是无用的，将被跳过。服务器只需渲染响应并将其发送回客户端。


    在阶段 2，传入的值将被应用到组件树中的组件上。我稍后会解释组件树——现在，只需将组件树想象成页面中每个 JSF 标签在内存中的表示。


    *处理验证*阶段（阶段 3）将验证并转换数据。假设有一个用于输入年龄的字段。在浏览器中，用户可能输入任何文本，这个传入的字符串必须被转换为数字。然后检查有效范围——例如，从
    0 到 120 岁。


    一旦值被转换和验证，模型值将在阶段 4 被更新。此时，传入的值将被分配给模型——例如，托管 Bean 的属性。


    在阶段 5，JSF 将通过调用适当的事件（例如值更改事件、动作事件等）来调用应用程序。在传统应用程序中，这些事件由屏幕组件（如按钮、图标、菜单项等）触发。在
    Web 应用程序中，浏览器只发送请求，所有事件都在服务器端生成，以模拟非 Web 应用程序的行为。例如，如果 JSF 检测到输入元素的值不同，它会生成一个“已更改”事件。因此，作为应用程序开发者，你可以对此事件做出反应。


    在*渲染响应*阶段（阶段 6），会创建 HTTP 响应（主要是 HTML），然后发送给客户端。


    通常，只有当一个阶段成功完成后，才会执行下一个阶段。例如，如果在验证期间发生错误，后续阶段将被跳过，JSF 会继续执行最后一个阶段——渲染响应，并将响应发送给客户端。在图中主要阶段之间，你可以看到*处理事件*方框。在此类事件处理过程中，你可以通过编程方式退出常规工作流，并直接继续执行渲染响应阶段。为了完整描述，我们需要添加从每个处理事件方框指向阶段
    6 的箭头。这种绕过正常流程的情况可能由异常触发。根据异常的类型，JSF 会生成消息并发送回客户端。此外，虽然不太常用，但你可以在处理事件期间终止整个生命周期。


    因此，例如，如果单个输入字段在验证期间失败，则其他字段都不会被推送到模型中。这种“全有或全无”的方法有助于获得基本一致的数据。但有时，即使数据的其他部分有误，接收部分数据也可能是有价值的。为了实现这一点，JSF
    提供了一个 `immediate` 属性，可以将其设置为 `true` 来改变相应 UI 元素的这种行为。


    以上是对 JSF 生命周期的简要概述。在讨论示例应用程序的各个方面时，我们将更深入地探讨它。


    ## JSF 命名空间和标签


    到目前为止，我已经讨论了 JSF 标签，但没有过多解释。像 `<h:inputText ...>` 或 `<h:commandButton>` 这样的标签，对于
    Java 开发者来说（例如，与 Swing 的 `JTextField` 或 `JButton` 相比）比 HTML 等效标签 `<input type="text">`
    或 `<input type="button">` 更熟悉，并且大多不言自明。事实上，JSF 旨在为 Java 开发者提供一种类似于已知技术的抽象，包括强大的事件处理。


    但是浏览器显示的是 HTML 页面，而这正是必须从服务器发送给浏览器的内容。正如关于 Servlet 的章节所示，HTML 标签可以通过编写一系列 HTML
    语句嵌入到 Java 代码中。JSF 的方式是将页面与代码分离，同时使用 JSF 标签库中的标签提供一种抽象。这些标签以 XML 风格包含在 HTML 页面中。


    到目前为止展示的标签属于标准 JSF 组件库。为了声明 `inputText` 属于该库而不是其他库，它带有前缀 `h:`。这个前缀被定义为命名空间 `http://xmlns.jcp.org/jsf/html`
    的别名，该命名空间指明了库。`xmlns:h="http://xmlns.jcp.org/jsf/html"` 是一个纯 XML 命名空间声明。尽管 URI
    特定于该库，但你可以选择自己的前缀，但我建议使用推荐的别名。


    命名空间用于避免命名冲突。在 XML 中，你可以定义自己的 `<h1>` 标签。在 XHTML 中，你必须区分你的标签和标准的标题 1 标签。你需要定义一个新的命名空间和一个别名。要使用你的
    `h1` 标签，你需要用别名作为标签的前缀——例如，`<my:h1>`。更多信息请阅读 [`en.wikipedia.org/wiki/XML_namespace`](https://en.wikipedia.org/wiki/XML_namespace)
    或 [www.w3schools.com/xml/xml:namespaces.asp](http://www.w3schools.com/xml/xml:namespaces.asp)。


    ###### 提示


    在 JSF 2.2 之前，标准命名空间是 `java.sun.com/jsf`，而不是当前的 `xmlns.jcp.org/jsf`。为了兼容性，仍然可以使用旧的命名空间。我建议只使用新的（`xmlns.jcp.org`）规范。前者可能会被弃用。


    标准 JSF 组件库由几个部分组成，如表 3-1 所示。

    '
- fmt: "### Table 3-1 Standard JSF Component Library Parts\n\n| URI | Prefix | Name\
    \ |\n| --- | --- | --- |\n| `http://xmlns.jcp.org/jsf` | `jsf:` | Pass-through\
    \ elements |\n| `http://xmlns.jcp.org/jsf/core` | `f:` | Core library, not specific\
    \ to HTML |\n| `http://xmlns.jcp.org/jsf/html` | `h:` | HTML library |\n| `http://xmlns.jcp.org/jsf/facelets/`\
    \ | `ui:` | Facelet Templating tag library |\n| `http://xmlns.jcp.org/jsf/composite`\
    \ | `cc:` | Composite Component tag library |\n| `http://xmlns.jcp.org/jsf/passthrough`\
    \ | `p:` | Pass-through attributes |\n\n**Note:** PrimeFaces, a popular way to\
    \ extend JSF, used the `p:` prefix long before JSF was extended by pass-through\
    \ attributes. To avoid conflicts if you use both, you have to choose a different\
    \ prefix for one of them. Developers with an existing codebase often keep the\
    \ `p:` prefix and use something like `pt:` for the pass-through attributes.\n\n\
    As the namespace suggests, the next libraries aren’t part of the Standard JSF\
    \ Component Library, but remain from JSP times. It offers some useful tags that\
    \ are used in this book. (The first versions of JSF were built upon JSP, which\
    \ is a slightly older technology that you still can use outside the JSF context,\
    \ too. Thus, these libraries aren’t related to JSF itself, but might be used within\
    \ JSF.)\n\nStarting with JSF 2.0, Facelets became the preferred VDL, and most\
    \ of the improvements in this and newer versions are available for Facelets only.\
    \ Only the core and HTML library are available for pages built with JSP. On the\
    \ other hand, the JSP Standard Tag Library offers useful tags, shown in Table\
    \ 3-2, that are used in this book’s applications.\n\n### Table 3-2 JSP Standard\
    \ Tag Library Tags\n\n| URI | Prefix | Name |\n| --- | --- | --- |\n| `http://xmlns.jcp.org/jsp/jstl/core`\
    \ | `c:` | JSP Standard Tag Library (JSTL) |\n| `http://xmlns.jcp.org/jsp/jstl/functions`\
    \ | `fn:` | JSTL functions |\n\nIn Appendix C, you’ll find an overview of all\
    \ the tags with short descriptions. A full description is available online at\
    \ `https://docs.oracle.com/javaee/7/javaserver-faces-2-2/vdldocs-facelets/toc.htm`.\
    \ If you prefer a printed reference, check out *JavaServer Faces 2.0*, by Ed Burns\
    \ and Chris Schalk (McGraw-Hill, 2010).\n\n## Component Tree\n\nWhen processing\
    \ a request, JSF searches for the requested page and scans its content. Apart\
    \ from pure HTML, the page can contain special tags, like `<h:inputText value=\"\
    ...\"/>`. As I explain in Chapter 5, an element is enhanced by a special XML namespace,\
    \ which indicates handling by JSF. All those UI elements will be collected into\
    \ a tree data structure. This is the *component tree* that’s built up or restored\
    \ in the restore view phase.\n\nListing 3-1 shows a reduced page.\n\n### Listing\
    \ 3-1 Reduced Page Example\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n\
     2   <!DOCTYPE html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4         xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\">\n 5       <h:head>\n 6           <h:outputLabel\
    \ value=\"Demo\"/>\n 7       </h:head>\n 8       <h:body>\n 9           <h:form>\n\
    10               <h:outputLabel value=\"Param1: \"/>\n11               <h:inputText\
    \ value=\"#{tinyCalculator.param1}\"/>\n12           </h:form>\n13       </h:body>\n\
    14   </html>\n```\n\nIn the restore view phase, JSF will build a component tree\
    \ like the one shown in Listing 3-2 (which is a simplified presentation).\n\n\
    ### Listing 3-2 Simplified Component Tree\n\n```\n1             [UIViewRoot]\n\
    2              |\n3   [UIOutput (Head)] --|-- [UIOutput (Body)]\n4        |              |\n\
    5   [HtmlOutputLabel]        [HtmlForm]\n6                       |\n7           [HtmlOutputLabel]\
    \ --|-- [HtmlInputText]\n```\n\nAs you can see, the root of this tree (always)\
    \ is `UIViewRoot`. Below that, you’ll find two siblings representing the head\
    \ and body of that page, and below that, the other elements nested within that\
    \ page.\n\nIn this example, all elements with the special tags of the `jsf/html`\
    \ namespace (prefixed by `h:`) show up in the component tree (Listing 3-3). If\
    \ you omit this namespace, these elements will be treated as pure HTML and won’t\
    \ be included in the component tree.\n\n### Listing 3-3 Reduced Page Example with\
    \ Fewer JSF Prefixes\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE\
    \ html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\n 4         xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\">\n 5       <head>\n 6           Demo\n 7       </head>\n\
     8       <body>\n 9         <form>\n10             <h:outputLabel value=\"Param1:\
    \ \"/>\n11             <h:inputText value=\"#{tinyCalculator.param1}\"/>\n12         </form>\n\
    13       </body>\n14   </html>\n```\n\nAnd Listing 3-4 is the simplified tree\
    \ resulting from the page.\n\n### Listing 3-4 Component Tree of HTML Page with\
    \ Standard (non-JSF) Tags\n\n```\n1             [UIViewRoot]\n2               |\n\
    3   [HtmlOutputLabel] --|-- [HtmlInputText]\n```\n\nThis seems to be a much simpler\
    \ tree, doesn’t it? So, should you prefer those simple forms? It depends. Sometimes\
    \ it’s helpful to traverse the component tree. Traversing a slim tree may be easier\
    \ and/or faster, but in the first version, all elements were represented by tags,\
    \ which are handled by JSF. If you replace the render engine, these tags might\
    \ be rendered in a different way, while the second version mixes tags and pure\
    \ HTML. Thus, it can be used only with an HTML renderer. Because JSF is commonly\
    \ used for (X)HTML pages, that’s not a really big drawback. A couple of JSF elements,\
    \ like `commandLink`, need to be embedded within a JSF managed form.\n\n**Note:**\
    \ JSF is designed to work independently from HTML. Thus, somebody might create\
    \ a different render engine—for example, to render a PDF from the tags. But I\
    \ don’t know any other render engine than HTML.\n\nAgain, if you prefer purer\
    \ HTML, to keep the component tree small, you should prefer HTML-friendly markup.\n\
    \nSome elements, like buttons, can only invoke an action if embedded in a form,\
    \ which is included in the component tree. So you should always prefer to declare\
    \ the form with a JSF tag, as shown in the earlier example, or with HTML-friendly\
    \ markup.\n\nAs mentioned, the trees here are simplified. Performing the following\
    \ exercise, you’ll notice some `UIInstructions`. These contain the other (HTML)\
    \ elements to hold the whole page.\n\n### Traversing the Component Tree\n\n1.\
    \  Add a button to the `TinyCalculator` with the following code:\n\n    ```\n\
    \    value=\"Print component tree\" action=\"#{tinyCalculator.printTree}\".\n\
    \    ```\n\n2.  Launch the application.\n\n3.  Click the button and observe the\
    \ output.\n\nIf you like, you can replace the simple output method `logElement`\
    \ by an exchangeable algorithm, such as by using Strategy or Visitor pattern.\
    \ See Listing 3-5."
