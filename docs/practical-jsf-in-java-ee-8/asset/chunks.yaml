    ## 摘要


    Selenium 是一款用于浏览器自动化的工具。因此，它可以用来对你的应用程序执行黑盒测试。幸运的是，它很容易使用，因为本章只能对 Selenium 略窥一二，而它的功能远比这些简单测试所能展示的要强大得多。Selenium
    可以自动截图、控制远程浏览器等等。除了对应用程序进行黑盒测试，你还可以使用 Selenium 在不同类型的浏览器中测试图形用户界面。标准化在不断发展，但浏览器模型之间仍然存在差异。因此，在一个浏览器中运行良好的应用程序，在另一个浏览器或系统中可能会表现出意外行为。


    本章的目的仅仅是作为 Selenium 的快速入门指南。由于本书是关于 JSF 和 Java EE 的，我没有更多篇幅来深入讨论它。但请记住，它可以用于你的
    Web 应用程序测试场景。


