    ###### 表 16-1 预定义的 CDI 作用域


    | 注解 | 描述 |

    | --- | --- |

    | @ApplicationScoped | Bean 绑定到应用程序生命周期：它在应用程序启动时（至少是在首次使用该 Bean 时）被创建，并在应用程序关闭时被销毁。
    |

    | @SessionScoped | 带有该标记的 Bean 绑定到当前会话的生命周期。 |

    | @RequestScoped | 带有 @RequestScoped 注解的 Bean 绑定到单个 HTTP 请求。 |

    | @ConversationScoped | 这将生命周期绑定到所谓的*会话*期间。默认情况下，会话处于*瞬态*模式，这意味着它绑定到单个请求。但通过调用其
    start 方法，会话会被设置为*长期运行*模式，并一直存在直到调用 end 方法。这允许开发者控制生命周期。 |

    | @Dependent | 这是一个伪作用域：Bean 的生命周期依赖于其所有者的生命周期。这意味着它的生命周期依赖于它被注入到的 Bean。如果未定义作用域，这是默认值。
    |


    你也可以定义自己的作用域。JSF 基于 CDI 作用域定义了另外两个作用域：@ViewScoped 和 @FlowScoped。前者绑定到一个页面，无论对该页面发起多少次后续请求。后者可用于一系列页面（称为*流程*）。


    不要将其与旧的 JSF 作用域混淆，后者在 Java EE 8 中已被弃用，本书将不会涉及。使用这些 JSF 作用域时，有一条规则：只有生命周期上下文更宽的
    Bean 才能被用在另一个 Bean 中。使用 CDI，可以将生命周期较短的 Bean 注入到生命周期较长的 Bean 中。


    乍一看，很难想象这如何工作。生命周期较短的 Bean 可能在我想要在另一个 Bean 中使用它时已经被销毁了。CDI 使用了一个简单的技巧：除了依赖模式外，CDI
    不会注入对象的直接引用。相反，会创建一个代理对象，并注入对该代理的引用。因此，当访问生命周期较短的对象时，它可能在底层被一个新对象替换。


    还记得我们用来打印组件树的 `FacesContext.getCurrentInstance()` 吗？尽管直到 JSF 2.2（是的，在 JSF 2.3
    中是可能的），FacesContext 都不可被注入，但我们有类似的行为：每次你访问 FacesContext 的 `getExternalContext()`
    时，你都会获得当前请求的信息，即使你可能是在几个请求之前获取的引用。


    讨论 CDI 的所有方面远远超出了本书的范围。但我们将在接下来的几章中使用（并讨论）CDI 的某些方面。在开发图书编辑器时，我们将使用 `@ConversationScoped`。


    ## 总结


    CDI 是控制反转模式的一种实现。它使框架能够创建类或接口的适当实例，并为我们的应用程序提供（注入）该实例。带有 `@Named` 注解的 Java 类自动符合注入条件，并将通过
    `@Inject` 注解在适当的位置被注入。


    CDI 本身提供了更多功能。例如，你可以通过为生产者定义接口来定义自己的注解。这超出了本书的范围。在本书中，我们将普遍使用预定义的注入。


    # 脚注


    1 当然，这是框架的意图：虽然我们在使用库的方法时控制应用程序的流程，但框架会向我们规定其流程。它提供了扩展点，开发者可以在其中添加或更改行为。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_17`


    # 17. 会话作用域


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    上下文和依赖注入（CDI）提供了几种不同的作用域，你可以使用它们来定义对象的生命周期。大多数作用域（如请求作用域）都绑定到预定义的周期，例如单个请求、会话或应用程序生命周期。其中一个预定义作用域——*会话作用域*——的生命周期可以通过编程方式控制，因此该作用域对于某些功能来说变得很有趣。


    ## 多页面编辑器


    我们的下一个任务是创建一个新的图书条目或编辑现有条目。图书编辑器将由一个选项卡面板组成，该面板提供一个页面用于图书的元数据，包括标题、作者、出版商，以及每种语言一个页面，你可以在其中编辑评论。必须能够在这些页面之间切换而不丢失数据，因此不难想象我们需要一个生命周期比单个请求更长的后台
    Bean。


    在一个会话期间，用户可能会编辑多本图书。与类别（所有类别一起编辑）不同，我们必须提供一个功能来逐一编辑图书。这意味着会话作用域在这里不适用。我们需要一个比单个请求长但比会话短的作用域。根据第
    16 章的表格，使用内置的 CDI 作用域 `@ConversationScoped` 将是合适的选择。


    图书编辑器将通过一个表示图书 ID 的参数来调用。bookId 从请求映射（第 22 行）中提取，我们可以通过外部上下文（第 19-20 行）访问该映射。为简单起见，如果
    bookId 未知或不是整数，我们将始终创建一本新书（第 24 行和第 28 行）。在关键任务应用程序中，我们会选择不同的策略，但对于本书来说，这已经足够了。一旦图书被加载或创建，我们将会话转换为长期运行模式，如清单
    17-1 所示。

