    # 18. Links


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Books isn’t just a list of reviewed books. You can also use it to create and display
    reviews. Aside from these *internal* reviews, most reviews are published somewhere
    else, in printed media and/or online. The goal of this chapter is to create a
    list of reviews that contains links to both internal and *external* reviews.


    ## Internal Reviews


    Links to internal reviews will be created from the review entities. Such an entity
    contains these properties:


    *   `Id`

    *   `BookId`

    *   `Date`

    *   `Language`

    *   `Text`

    *   `Book`


    The last property isn’t stored in the appropriate SQL table. The only reference
    to a book stored in the database is the `BookId`. But using the `Book` as additional
    property will enable us to display some information about the book itself without
    the need to code an additional database call. In SQL terms, we do a kind of `select
    ...from Review join Book...`. We simply need to define a relation, as shown in
    Listing [18-1](#A435433_1_En_18_Chapter.xhtml#PC1). JPA will perform the SQL stuff.
    Listing [18-1](#A435433_1_En_18_Chapter.xhtml#PC1) shows an excerpt of the `Review`
    class.


    ###### Listing 18-1 Entity for Internal Reviews


    ```

     1 @Entity

     2 @Table(name = "Review")

     3 public class Review implements Serializable {


     5   private static final long serialVersionUID = 1L;


     7   // <editor-fold defaultstate="collapsed" desc="Property Id">

     8   @Id

     9   @GeneratedValue(strategy = GenerationType.IDENTITY)

    10   @Column(name = "rvId")

    11   private Integer _id;


    13   public Integer getId() {

    14     return _id;

    15   }


    17   public void setId(Integer id) {

    18     _id = id;

    19   }

    20     // </editor-fold>


    22   // <editor-fold defaultstate="collapsed" desc="Property BookId">

    23   @Column(name = "rvBookId")

    24   private Integer _bookId;


    26   public Integer getBookId() {

    27     return _bookId;

    28   }


    30   public void setBookId(Integer bookId) {

    31     _bookId = bookId;

    32   }

    33     // </editor-fold>


    35  // <editor-fold defaultstate="collapsed" desc="Property Book">

    36   @ManyToOne

    37   @JoinColumn(name = "rvBookId", insertable = false, updatable = false)

    38   private Book _book;


    40   public Book getBook() {

    41     return _book;

    42   }

    43  // </editor-fold>


    45   [... other fields, hashCode etc. omitted for brevity...]


    47 }

    ```


    The book is referenced in lines 36–42. You can write a couple reviews (for example,
    using different languages) for the same book. That’s why we use a many-to-one
    relationship here. We assume that the book we write a review for exists in the
    database. When we store the review, we need to include a reference to the book.
    In the database table, we only need a column for the `BookId` (lines 23–32). The
    property `book` I mentioned before is retrieved from the database by exactly this
    id.


    So far, we have two properties that depend on that one property. JPA doesn’t allow
    two properties writing the same column. We need to declare one of them as not
    writeable. Because we only want to save the `bookId` and not the entire book,
    we advise JPA to ignore the `bookId` of the `book` property for inserts and updates
    (line 37).


    ## External Reviews


    The external links are stored in their own table. As for reviews, we create a
    convenient property of type `Book`. Listing [18-2](#A435433_1_En_18_Chapter.xhtml#PC2)
    shows how.


    ###### Listing 18-2 Entity to Manage Links to External Reviews


    ```

     1   @Entity

     2   @Table(name = "ReviewLink")

     3   public class ReviewLink implements Serializable {


     5     private static final long serialVersionUID = 1L;


     7     @Id

     8     @GeneratedValue(strategy = GenerationType.IDENTITY)

     9     @Column(name = "Id")

    10     private Integer _id;


    12     @Column(name = "BookId")

    13     private Integer _bookId;


    15     @Column(name = "LanguageCode")

    16     private String _language;


    18     @Column(name = "URI")

    19     private String _URI;


    21     [getter/setter omitted]


    23     @ManyToOne

    24     @JoinColumn(name = "BookId", insertable = false, updatable = false)

    25     private Book _book;


    27     public Book getBook() {

    28       return _book;

    29     }


    31     [HashCode and more omitted]

    32   }

    ```


    Listing [18-2](#A435433_1_En_18_Chapter.xhtml#PC2) shows an excerpt of the `ReviewLink`
    class. Accessing the `book` (lines 23ff) is quite similar that described for the
    `Review` class.


    ## JSF Links


    JSF offers three different tags to create a link. How do they differ, and which
    one would be appropriate to perform this goal? Table [18-1](#A435433_1_En_18_Chapter.xhtml#Tab1)
    lists these tags.


    ###### Table 18-1 JSF Tags for Creating a Link


    | Tag Name | Description |

    | --- | --- |

    | `commandLink` | Renders an HTML link `<a href=...>` that also performs a submit.
    |

    | `link` | Renders an HTML link `<a href=...>` that can be used for bookmarkable
    JSF navigation. |

    | `outputLink` | Renders an HTML link `<a href=...>` that’s mostly used to navigate
    outside the app. |


    ### commandLink


    `commandLink` is the classic JSF link. Indeed, it renders an HTML link element
    but acts more like a submit element. While rendering the `commandLink`, JSF assigns
    a function call to the element’s `onClick` event. This function, located in the
    JSF JavaScript library, dynamically adds a hidden input element and performs a
    submit. This approach is transparent to the developer.


    A Submit element would perform a POST request. This is HTML standard for submitting
    forms. Thus, the `commandLink` needs to be nested into an `<h:form>` element.
    A POST request sends data for the current URI. If a `commandLink` is used to navigate
    to another page, the browser still displays the former URI while displaying the
    new page. With this kind of navigation, the URI displayed in the browser’s headline
    is one page behind.


    ### link


    The `link` tag was introduced in JSF 2.0 to enable JSF navigation using GET requests.
    A GET request is the same one you use when you enter a URI directly into your
    browser. The server sends the content of the requested page, and using the GET
    navigation, the browser displays the URI of the current page. Because of that,
    the URI becomes bookmarkable.'
