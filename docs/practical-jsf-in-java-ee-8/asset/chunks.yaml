    ## 摘要


    在验证阶段，JSF 不仅会执行 JSF 特有的验证，还会在数据模型中定义了标准 Bean 验证时调用它。因此，验证约束不仅可以确保字段在存储时适合数据库，还能向用户提供合格的反馈。


    本章介绍了如何在基础层面上使用 Bean 验证。我们将在本书后面更深入地探讨这一主题。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_16`


    # 16. 上下文与依赖注入


    Michael Müller^(1 )


    (1)德国北莱茵-威斯特法伦州布吕尔


    有时，你需要一个类型可能在运行时更改或确定的对象实例，并且需要一个可靠的机制来执行该任务。幸运的是，Java EE 8 提供了上下文与依赖注入（CDI），可以解决这个问题。


    ## 从 new() 到 CDI


    如果你编写一个需要访问底层面向对象服务的类，你需要获取该服务的一个实例并调用其方法。一种简单的方法是创建服务类的一个新对象：


    ```

    DataService dataService = new DataService();

    ```


    这种方法有几个缺点。如果你可以在不同的兼容服务之间进行选择，会发生什么？让我们将 DataService 声明为抽象类或接口，并实现一个具体的服务。你可以使用


    ```

    DataService dataService = new MySQLDataService();

    ```


    或


    ```

    DataService dataService = new PostgreSQLDataService();

    ```


    现在，你的应用程序仍然需要知道其中一个具体服务。如果你需要在运行时灵活选择服务，一种解决方案是使用 if 级联或 switch 语句，根据配置字符串选择具体的类。你的类仍然需要知道具体的实现。如果你想添加另一个实现，你的类也需要知道它。这是一种你通常不希望拥有的依赖关系。


    诀窍在于将决策转移到服务的静态工厂方法中。这是 Erich Gamma 及其合著者在他们的书 *设计模式：可复用面向对象软件的基础*（Addison-Wesley，1994）中讨论的模式之一。


    现在，我们的类变得独立于具体实现：


    ```

    DataService dataService = DataService.createService("MySQL")

    ```


    但除了那个接口（或抽象类）之外，我们的类仍然需要知道该服务，并负责创建对象，尽管我们将创建过程委托给了服务。在传统编程中，我们的代码负责控制流程。


    现在，想象一下我们的类是一个包含所需服务的框架¹的扩展。那么框架可能负责控制流程。因此，我们的类是一个被框架调用的扩展点。并且框架可能会创建服务并将其注入到我们的类中。与传统编程相比，控制流程被反转了。这种方法被称为控制反转（IoC），由
    Martin Fowler 在 2005 年描述（你可以在 [`martinfowler.com/bliki/InversionOfControl.html`](http://martinfowler.com/bliki/InversionOfControl.html)
    阅读更多内容）。


    CDI 是 Java EE 提供的一种 IoC。通过简单地用 @Inject 注解所需对象，注入变得非常容易。我们之前在项目中使用过它。


    使用 CDI，容器将创建所有所需的对象并将其注入到我们的类中。但它不仅将属于框架的对象注入到我们的类中。CDI 还将我们应用程序（或其他应用程序）的特定对象注入到我们的类中。


    但是 CDI 如何知道要注入哪个对象？它如何判断是要创建一个新对象，还是可以使用现有实例？


    你可以用 CDI 能够识别和解释的特殊关键字来注解你的类。我们之前使用过这样的注解：javax.inject 包中的 @Named，它将 bean 声明为
    CDI bean。这样的命名 bean 可以被 Java EE 注入到消费类中。除了 CDI bean，CDI 还可以注入企业 Java Bean（EJB）。


    ###### 注意


    在不讨论 EJB 的情况下，我们之前在服务类中使用过它们，通过使用 @Stateless 注解，该注解将类声明为无状态 EJB。使用这种 bean，我们可以受益于容器的自动事务管理。另一方面，为此类服务类使用
    CDI bean 过去迫使开发人员手动添加事务处理。一种通用的解决方案是创建一个拦截器，为每次 JPA 访问添加事务。如今，这已通过 @Transactional
    注解包含在 CDI 中。


    除了这种命名 bean 的静态声明之外，开发人员可以将任何返回对象的方法声明为生产者方法。这相当于 CDI 中的工厂方法。


    一旦 CDI 知道要注入什么，它就需要了解对象的生命周期，以确定是使用现有对象还是需要注入新对象。CDI 也为此提供了一些注解。在构建 Books 时，我们仍然使用了一些。还记得那些
    xxxScoped 的吗？表 16-1 简要列出了该组常见注解的概述。

    '
- fmt: '###### Table 16-1 Predifined CDI Scopes


    | Annotation | Description |

    | --- | --- |

    | `@ApplicationScoped` | A bean is bound to the application lifecycle: it’s created
    when the application starts (at least on the first usage of the bean) and destroyed
    when the application shuts down. |

    | `@SessionScoped` | A bean annotated with that marker is bound to the lifecycle
    of the current session. |

    | `@RequestScoped` | A bean annotated with `@RequestScoped` is bound to a single
    HTTP request. |

    | `@ConversationScoped` | This binds the lifecycle to the period of a so-called
    *conversation*. By default, a conversation is in *transient* mode, which means
    it’s bound to a single request. But by invoking its start method, a conversation
    is set into *long-running* mode and will live until the end method is called.
    This allows the developer to control the lifecycle. |

    | `@Dependent` | This is a pseudo scope: the bean’s lifecycle depends on its owner’s
    lifecycle. This means its lifecycle depends on the bean it’s injected into. This
    is the default if no scope is defined. |


    You can also define your own scopes. JSF has defined two other scopes based on
    the CDI scopes: `@ViewScoped` and `@FlowScoped`. The first is bound to one page,
    regardless of how many subsequent requests are made to this. The latter can be
    used for a series of pages (called a *flow*).


    Don’t mix this up with the older JSF scopes, which became deprecated with Java
    EE 8 and which won’t be covered in this book. Using these JSF scopes, there had
    been one rule: only beans with a wider lifecycle context could be used in another
    bean. With CDI, it’s possible to inject beans with a short lifecycle into one
    with a longer lifecycle.


    At a first glance, it’s hard to imagine how that would work. The bean with the
    shorter lifecycle might have been destroyed by the time I want to use it in a
    bean. CDI uses a simple trick: except in dependent mode, CDI doesn’t inject a
    direct reference to an object. Rather, a proxy object is created and a reference
    to the proxy gets injected. As a result, when accessing the object with the shorter
    lifecycle, it might be replaced under the hood by a new one.


    Remember `FacesContext.getCurrentInstance()`, which we used for printing the component
    tree? Although the `FacesContext` hadn’t been injectable up to JSF 2.2 (yeah,
    it’s possible in JSF 2.3), we have similar behavior: every time you access the
    `getExternalContext()` of the `FacesContext`, you get information about the current
    request, even though you may have gotten your reference some requests ago.


    Discussing all aspects of CDI is far beyond the scope of this book. But we’ll
    use (and discuss) some aspects of CDI in some upcoming chapters. Developing the
    book editor, we’re going to use `@ConversationScoped`.


