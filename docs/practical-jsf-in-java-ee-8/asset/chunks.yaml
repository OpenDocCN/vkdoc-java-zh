    34               .findAny();\n35     }\n\n37     /* Java 8 之前的代码示例\n38      public\
    \ Topic findTopic(String key) {\n39      for (Topic topic : _topics) {\n40      if\
    \ (topic.getKey().equals(key)) {\n41      return topic;\n42      }\n43      }\n\
    44      return Topic.TopicBuilder.createBuilder(\"\").build();\n45      }\n46      */\n\
    47     public Optional<Topic> getActiveTopic() {\n48       return _activeTopic;\n\
    49     }\n\n51     public void setActive(String key) {\n52       _activeTopic\
    \ = findTopic(key);                                                          \
    \                                    \n53     }\n\n55   }\n```\n\n每个主题旨在保存特定标签页的信息。第一个标签页将是我们现有的分类编辑器页面，只需稍作调整。对于每个支持的语言环境，我们将添加另一个标签页。要执行此任务，我们需要有关支持的语言的信息，因此我们将创建一个小的收集方法。并且由于我们可能会重用此方法，我们将把它放入一个\
    \ Utilities 类中，如代码清单 14-16 所示。\n\n###### 代码清单 14-16 Utilities.java\n\n```\n 1   public\
    \ class Utilities {\n 2     public static Set<String> getSupportedLocales(HandleDefault\
    \ defHandler) {\n 3       Application app = FacesContext.getCurrentInstance().getApplication();\n\
     4       Set<String> languageCodes = new HashSet<>();\n 5       for (Iterator<Locale>\
    \ itr = app.getSupportedLocales(); itr.hasNext();) {\n 6         Locale locale\
    \ = itr.next();\n 7         languageCodes.add(locale.getLanguage());\n 8       }\n\
    \n10       String defaultLang = app.getDefaultLocale().getLanguage();\n11       if\
    \ (defHandler == HandleDefault.Exclude) {\n12         languageCodes.remove(defaultLang);\n\
    13       } else {\n14         languageCodes.add(defaultLang);\n15       }\n16       return\
    \ languageCodes;                                                             \
    \                                 \n17     }\n\n19     public enum HandleDefault\
    \ {\n\n21       Include, Exclude\n22     }\n23   }\n```\n\n语言环境在 `faces-config.xml`\
    \ 文件中定义，该文件对整个应用程序有效。因此，我们需要查询的是应用程序对象。`getSupportedLocales()` 返回的是一个迭代器，而不是可迭代对象，所以我们不能使用\
    \ for each 循环。根据配置文件的不同，默认语言可能包含在支持的语言环境中，也可能不包含。我们将通过根据参数 `defHandler` 显式排除或包含默认语言环境来解决这个问题。\n\
    \n由于应用程序可能需要支持多种语言，并且我们需要节省空间，主题将只包含语言环境代码本身。但第一个标签页将被命名为 Category，或者德语中的 *Kategorie*。它需要被翻译，因此我们必须从中获取消息包和相应的翻译。为此，我们将向\
    \ Utilities 类添加另一个方法，如代码清单 14-17 所示。\n"
- fmt: "###### Listing 14-17 Retrieve Localized Message with Key\n\n```\n1   public\
    \ static String getMessage(String key) {\n2     ResourceBundle messageBundle =\
    \ ResourceBundle\n3             .getBundle(\"de.muellerbruehl.books.messages\"\
    );\n4     try {\n5       return messageBundle.getString(key);\n6     } catch (MissingResourceException\
    \ e) {\n7       return \"<unknown resource: \" + key + \">\";\n8     }\n9   }\n\
    ```\n\nNow we can initialize and use the topics within the `CategoryEditor` class.\
    \ `initTopics()` will be called from the existing `init()` method, as shown in\
    \ Listing [14-18](#A435433_1_En_14_Chapter.xhtml#PC21).\n\n###### Listing 14-18\
    \ Topic Handling in CategoryEditor.java\n\n```\n 1   ...\n 2     private static\
    \ final String CATEGORY = \"category\";\n 3     private Topics _topics;\n\n 5\
    \     private void initTopics() {\n 6       _topics = new Topics();\n 7      \
    \ Topic topic = Topic.TopicBuilder\n 8               .createBuilder(CATEGORY)\n\
    \ 9               .setTitle(Utilities.getMessage(\"lblCategory\"))\n10       \
    \        .setOutcome(\"categoryEditor.xhtml\")\n11               .build();\n12\
    \       _topics.addTopic(topic);\n13       for (String lang : Utilities.getSupportedLocales(HandleDefault.Exclude))\n\
    14       {\n15         topic = Topic.TopicBuilder\n16                 .createBuilder(lang)\n\
    17                 .setOutcome(\"categoryTranslator.xhtml\")\n18             \
    \    .build();\n19         _topics.addTopic(topic);\n20       }\n21       _topics.setActive(CATEGORY);\n\
    22     }\n\n24     public String changeTab(String newTopicKey) {\n25       if\
    \ (_topics.getActiveTopic().get().getKey().equals(newTopicKey)) {\n26        \
    \ return \"\";\n27       }\n28       _topics.setActive(newTopicKey);\n29     \
    \  return _topics.getActiveTopic().get().getOutcome();\n30     }\n\n32     public\
    \ Set<Topic> getTopics() {\n33       return _topics.getTopics();\n34     }\n\n\
    36     public boolean isActive(Topic topic) {\n37     Optional<Topic> activeTopic\
    \ = _topics.getActiveTopic();\n38     if (activeTopic.isPresent()) {\n39     \
    \  return activeTopic.get().equals(topic);\n40     }\n41     return false;   \
    \                                                                            \
    \               \n42   }\n```\n\nIf the user clicks a topic, it performs a call\
    \ to `changeTab` that returns the page to navigate to. The topics will be displayed,\
    \ and to grant access to them we have to expose them by `getTopics`. The last\
    \ method shown is a convenience method to check whether the parameter is currently\
    \ the active topic.\n\nOnce we prepare the topics, we can use them within our\
    \ page layout. The existing `CategoryEditor` now becomes one of diverse tab pages.\
    \ To do that, we introduce a new template `categoryTemplate.xhtml` and make `categoryEditor.xhtml`\
    \ become a client of this. And we move the heading from the existing editor into\
    \ the new template. See Listing [14-19](#A435433_1_En_14_Chapter.xhtml#PC22).\n\
    \n###### Listing 14-19 categoryTemplate.xhtml\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8' ?>\n 2   <!DOCTYPE composition PUBLIC \"-//W3C//DTD XHTML 1.0\
    \ Transitional//EN\"\n 3     \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n 4   <ui:composition xmlns:ui=\"http://xmlns.jcp.org/jsf/facelets\"\n 5   \
    \                template=\"adminTemplate.xhtml\"\n 6                   xmlns:h=\"\
    http://xmlns.jcp.org/jsf/html\"\n 7                   xmlns:c=\"http://java.sun.com/jsp/jstl/core\"\
    \n 8                   xmlns:f=\"http://xmlns.jcp.org/jsf/core\">\n\n10     <ui:define\
    \ name=\"content\">\n\n12       <h1>Edit categories</h1>\n\n14       <h:form id=\"\
    form\">\n15         <div class=\"tab\">\n16           <ul class=\"tab\">\n17 \
    \            <c:forEach items=\"#{categoryEditor.topics}\" var=\"topic\">\n18\
    \               <li class=\"#{categoryEditor.isActive(topic) ?'activetab':'tab'}\"\
    >\n19                 <h:commandLink value=\"#{topic.title}\"\n20            \
    \                    action=\"#{categoryEditor.changeTab(topic.key)}\">\n21  \
    \                 <f:param name=\"langCode\" value=\"#{topic.key}\"/>\n22    \
    \             </h:commandLink>\n23               </li>\n24             </c:forEach>\n\
    25           </ul>                                                           \
    \                                   \n26         </div>\n27       </h:form>\n\
    28       <div class=\"editor\">\n29         <ui:insert name=\"editContent\">Content</ui:insert>\n\
    30       </div>\n31     </ui:define>\n\n33   </ui:composition>\n```\n\nEach topic\
    \ is wrapped into a list item `<li>` of an unordered list `<ul>`. `<c:forEach>`\
    \ is used to iterate through all topics. Why not `<ui:repeat value=\"#{categoryEditor.topics}\"\
    \ var=\"topic\">` like we used before? If you try that, you’ll get an error. Technically,\
    \ `<c:forEach>` is a tag handler. As such, it doesn’t become part of the component\
    \ tree. It’s evaluated, and the result of the repetition will be used to build\
    \ up the component tree. On the other hand, `<ui:repeat>` is a component that\
    \ will be part of the component tree. Its child components will be inserted only\
    \ once into the component tree, independent of the repetition. And it will be\
    \ evaluated at a time when the topics map doesn’t exist. Scary? Nope. But you\
    \ have to consider a couple of differences between repeating structures. I’ll\
    \ discuss the details and differences in Chapter [23](#A435433_1_En_23_Chapter.xhtml).\n\
    \nFor now, let’s talk about the other noteworthy elements here. For each list\
    \ item, we choose the style class depending on whether it’s the active topic or\
    \ not. In conjunction with CSS, this will mimic the tabs. All translations will\
    \ be handled by the same page (`categoryTranslator.xhtml`). To determine the right\
    \ language, we pass this as a parameter into this page using the `<f:param>` tag,\
    \ which defines a parameter by its name and its value, which in fact become a\
    \ key-value pair, accessible by the called page.\n\nTo prepare the next steps\
    \ and test the application so far, create an empty `categoryTranslator.xhtml`\
    \ page (more precisely, `ui:composition`). Use your existing category editor as\
    \ your boilerplate. If you don’t have the code at your disposal, take a look at\
    \ Listing [14-20](#A435433_1_En_14_Chapter.xhtml#PC23). To get our tabs up and\
    \ running, we finally need to add some CSS voodoo.\n\n###### Listing 14-20 Tab\
    \ Lookalike Formatting (book.css)\n\n```\n 1   main div.tab {\n 2     display:\
    \ block;\n 3   }\n\n 5   main ul.tab {\n 6     list-style-type: none;\n 7    \
    \ display: inline;\n 8   }\n\n10   main li.tab,\n11   main li.activetab {\n12\
    \     list-style-type: none;\n13     display: inline;\n14     border-style: solid;\n\
    15     border-width: 2px 2px 1px 2px;\n16     border-top-left-radius: 0.5em;\n\
    17     border-top-right-radius: 0.5em;\n18     background-color: #ccccd8;\n19\
    \   }\n\n21   main li.tab {\n22     border-color:  #cccccc #aaaaaa #aaaaaa #cccccc;\n\
    23   }\n\n25   main li.activetab {\n26     border-color:  #cccccc #aaaaaa #ccccd8\
    \ #cccccc;\n27   }\n\n29   main li.tab a,\n30   main li.activetab a {\n31    \
    \ padding: 0 0.5em 0 0.5em;\n32     font-size: 1.2em;\n33     text-decoration:\
    \ none;\n34     font-weight: bold;\n35   }\n\n37   main li.activetab a {\n38 \
    \    color: #000044;\n39   }                                                 \
    \                                             \n\n41   .editor {\n42     background-color:\
    \ #ccccd8;\n43     border-radius: 0.5em;\n44     border-top-left-radius: 0;\n\
    45     padding: 1em;\n46   }\n```\n\nFigure [14-9](#A435433_1_En_14_Chapter.xhtml#Fig9)\
    \ shows the result of our efforts.\n\n![A435433_1_En_14_Fig9_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig9_HTML.jpg)\n\
    \n###### Figure 14-9 Category editor using a tab control lookalike\n\n### Enhancing\
    \ the Category Entity\n\nBefore we can realize the category translator, we need\
    \ to prepare an appropriate translation entity and enhance the category entity.\
    \ The translation entity refers to the category id and provides the translated\
    \ name for one language. See Listing [14-21](#A435433_1_En_14_Chapter.xhtml#PC24)."
