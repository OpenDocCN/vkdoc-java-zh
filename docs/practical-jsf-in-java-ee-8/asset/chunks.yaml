     8           <h1>TinyCalculator</h1>

     9           <form>

    10               <div>

    11                   <label>Param1: </label>

    12                   <input type="text" value="0.0" />

    13               </div>

    14           </form>

    15       </body>

    16   </html>

    ```


    You can read more about HTML , including a commented list of important tags, in
    Appendix A.'
