    如您所见，这个具体门面要么简单地将任务委托给抽象门面，要么添加更复杂的功能，例如 `findAccountbyAccessKey`。虽然可以通过 `saveAccount`
    方法（第 5 行）保存一个新实例，但第 17 行开始有一个专门用于创建账户的方法。该方法会检查电子邮件是否已存在，以确保每个电子邮件只能分配给一个账户。在账户创建过程中，登录名可能会被更新，以确保登录名的唯一性。最后但同样重要的是，账户状态被设置为“新建”。这表示一个未激活的账户。只有激活的账户才能登录。


    从第 52 行开始，有一个删除方法。它可以根据 id 删除一个账户，而无需事先将其加载到内存中。


    为简洁起见，清单 29-2 并未展示整个类。


    ## 账户实体


    Account 实体收集注册表单中的所有信息，并添加一个创建日期。如果用户在该日期之后的规定期限内未激活其账户，我们将删除该账户。请参见清单 29-3。

