- fmt: "### Figure 12-5 Entity lifecycle (simplified)\n\nAn entity that’s created\
    \ using the `new` keyword is in the state `New`. The same applies if the fresh\
    \ entity is created by the Context and Dependency Injection (CDI) framework (using\
    \ `@Inject`). By calling `persist(entity)` it’s transitioned to the `Managed`\
    \ (or attached) state. The `Managed` state reflects the persisted state. Thus,\
    \ any change of an entity in the `Managed` state will be automatically stored\
    \ (updated) in the database. A database retrieval might create an entity in memory\
    \ that will be in the managed state. Invoking `remove(entity)` will delete the\
    \ entity from the database.\n\nSo far, we’ve seen all four CRUD operations: create\
    \ (`persist`), read (DB retrieval), update (change managed entity), and delete\
    \ (`remove`). But Figure [12-5](#A435433_1_En_12_Chapter.xhtml#Fig5) shows something\
    \ else—that an entity might be in detached state. Beside these operations, the\
    \ figure shows a special `Detached` state. An entity becomes detached when it\
    \ exists in memory but gets unmanaged. That may be explicitly done by calling\
    \ the `detach(entity)` method. But there are other reasons, omitted in the simplified\
    \ diagram: an entity will be detached if the EM is closed or if it’s serialized\
    \ and de-serialized. The latter will restore the entity in memory without being\
    \ managed. For example, if the application server runs out of memory, it might\
    \ passivate beans (saving somewhere, usually by serializing the values) and activate\
    \ them at another time. A special method, `merge(entity)`, will transition the\
    \ entity into managed state again.\n\nAs the figure shows, a `remove()` will delete\
    \ that entity. A friend of mine declined to use JPA because “a framework that\
    \ needs to load an entity to perform a delete operation isn’t useful, it’s crazy.”\
    \ That’s a big misunderstanding that I have seen several times. The `remove()`\
    \ method is useful to delete an entity that still resides in memory. For example,\
    \ the app user loads some data that’s displayed on the screen—then she decides\
    \ to delete that data. On the other hand, if you want to delete one entity or\
    \ a batch of them that don’t reside in memory, you’ll use a delete operation.\n\
    \nThe EM provides the method `contains(entity)` to check whether an entity is\
    \ in the managed state or not. This method simply returns `true` or `false`.\n\
    \nIf we inject the service class into our editor bean, the `Categories` might\
    \ become detached! Thus, to perform an update or delete, we need to merge the\
    \ entity first.\n\nListing [12-7](#A435433_1_En_12_Chapter.xhtml#PC12) shows the\
    \ preliminary service class.\n\n### Listing 12-7 CategoryService\n\n```\n 1  \
    \ @Stateless\n 2   public class CategoryService {\n 3     @PersistenceContext(unitName\
    \ = \"BooksPU\")\n 4     private EntityManager _em;\n\n 7     protected EntityManager\
    \ getEntityManager() {\n 8       return _em;\n 9     }\n\n11     public Category\
    \ create(Category entity) {\n12       getEntityManager().persist(entity);\n13\
    \       return entity;\n14     }\n\n16     public Category read(Object id) {\n\
    17       return getEntityManager().find(Category.class, id);\n18     }\n\n20 \
    \    public Category update(Category entity) {\n21       return getEntityManager().merge(entity);\n\
    22     }\n\n24     public void delete(Category entity) {\n25       getEntityManager().remove(getEntityManager().merge(entity));\n\
    26     }\n\n28     /**\n29      * Convenience method, to create or update automatically\n\
    30      * @param entity\n31      * @return managed entity\n32      */\n33    \
    \ public Category save(Category entity) {\n34       if (entity.getId() < 0){\n\
    35           return create(entity);\n36       }\n37       return update(entity);\
    \                                                                            \
    \          \n38     }\n\n40     public List<Category> findAll() {\n41       CriteriaQuery\
    \ cq = getEntityManager().getCriteriaBuilder().createQuery();\n42       cq.select(cq.from(Category.class));\n\
    43       return getEntityManager().createQuery(cq).getResultList();\n44     }\n\
    \n46   }\n```\n\nAs shown before, an `EntityManager` will be injected using the\
    \ PU as given in the annotation.\n\nUsing the annotation `Stateless` automatically\
    \ declares the bean to be an Enterprise JavaBean (EJB). Using an EJB automatically\
    \ puts the database access into a transaction scope. This simple approach assumes\
    \ a fully fledged Java EE container, like GlassFish. On a servlet-only container,\
    \ we have to use a different approach. Nowadays, CDI can inject an `EntityManager`.\
    \ If you add the Weld CDI implementation to a servlet container (Listing [12-8](#A435433_1_En_12_Chapter.xhtml#PC13)),\
    \ you need to change the class annotation (Listing [12-9](#A435433_1_En_12_Chapter.xhtml#PC14)).\n\
    \n### Listing 12-8 Maven Coordinates for Weld (as Defined in Java EE)\n\n```\n\
    1   <dependency>\n2     <groupId>javax.enterprise</groupId>\n3     <artifactId>cdi-api</artifactId>\n\
    4     <version>2.0</version>\n5     <scope>provided</scope>\n6   </dependency>\n\
    ```\n\n### Listing 12-9 CategoryService\n\n```\n1   @RequestScoped\n2   @Transactional\n\
    3   public class CategoryService {\n```\n\nThis changes the service class from\
    \ being an Enterprise JavaBean into a pure CDI bean. Because no transaction is\
    \ automatically added, we need to add it with a special annotation (or manage\
    \ transactions with our code). This CDI annotation also performs on a fully fledged\
    \ application server.\n\nThe `EntityManager` has some methods for the CRUD (create,\
    \ read, update, delete) operations. They are called `persist`, `find`, `merge`\
    \ (just to reattach to managed state) and `remove`. The service class will expose\
    \ them using the CRUD names. For brevity, the class doesn’t yet contain any exception\
    \ handling.\n\nThe `findAll()` method will retrieve all categories from the database.\
    \ It’s implemented by using the criteria API. Alternatively, we could have just\
    \ used a JPA Query Language (JPQL) query to get the categories. I’ll explain both\
    \ later.\n\n`merge` doesn’t just reattach entities into the managed state. If\
    \ an entity didn’t exist before, it will be created. In Figure [12-5](#A435433_1_En_12_Chapter.xhtml#Fig5),\
    \ `persist` is used to get into managed state. This is what `persist` is intended\
    \ for. But you may use `merge` instead.\n\nWith this knowledge, we can simplify\
    \ our service. Just omit the `create` and `update` methods and replace `save`\
    \ with Listing [12-10](#A435433_1_En_12_Chapter.xhtml#PC15).\n\n### Listing 12-10\
    \ save Method\n\n```\n1   public Category save(Category entity) {\n2     return\
    \ getEntityManager().merge(entity);\n3   }\n```\n\n## Using the CategoryService/Injection\n\
    \nIn our category editor, we need to inject the service class we just created\
    \ and adopt the `init` and `change` methods, as shown in Listing [12-11](#A435433_1_En_12_Chapter.xhtml#PC16)."
