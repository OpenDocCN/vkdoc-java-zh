  trans: '

    ## CSS


    HTML 提供了一些用于通过强调、斜体等方式设置页面样式的小标签。层叠样式表（CSS）是作为一种更强大的设计工具而开发的。根据经验法则，你应该将布局与内容分离。因此，不要使用
    HTML 样式标签。请专门使用 CSS 进行页面布局。


    通过使用 CSS，可以在花括号内定位一个元素并为其分配布局信息，如清单 2-2 所示。


    ###### 清单 2-2 CSS 语句示例


    ```

    1   h1 {

    2       font-size: 2em;

    3   }


    5   h2 {

    6       font-size: 1.5em;

    7       font-style: italic;

    8   }

    ```


    清单 2-2 演示了如何将布局信息应用于 HTML 标题标签。在第 1 行，我们定位了标题 1（h1）。第 1 行的语句影响字体大小，设置为 2em。这是一个*相对*大小，是标准大小的两倍（无论标准是如何定义的——例如，通过浏览器设置或其他
    CSS 语句）。第 5 到 8 行定义了一个带有斜体样式的较小标题。如你所见，多个布局指令（每个指令以分号结尾）可以放在花括号内。从这个意义上说，CSS 等同于
    Java 编程。


    在前面的示例中，使用 HTML 标签名称来定位 HTML 元素。通常，我们需要对相同名称的不同标签应用可变的样式。为了定位正确的元素，我们需要通过提及不同的标签来构建某种路径（例如，`div
    div` 用于定位 div 内部的 div），或者为 HTML 元素分配一个类或 id，并使用它进行定位。这些定位元素可以组合起来定义复杂的路径。这种定位元素被称为*选择器*。存在某些规则来避免歧义。


    使用 CSS，你不仅可以影响元素的布局，还可以影响其位置和可见性。布局信息可能因输出设备或屏幕尺寸而异。结合所有这些特性，我们可以创建*响应式网页设计*：布局会根据浏览器窗口的大小进行更改和调整。


    第 10 章讨论了如何在 Web 应用程序中使用 CSS。我将向你展示如何使用 CSS 创建响应式设计。你可以通过使用不同设备打开 Books（可在 [`it-rezension.de`](https://it-rezension.de)
    获取）或通过更改浏览器窗口的大小来模拟其行为。


    如今，有许多库可以帮助你设计 Web 应用程序。一个流行的库是 Bootstrap（[`getbootstrap.com`](https://getbootstrap.com)），它不仅依赖于
    CSS，还依赖于 JavaScript 等。


    与 HTML 一样，我不想让熟悉 CSS 的读者感到厌烦。我在附录 B 中提供了 CSS 的介绍。


    ## JavaScript


    JavaScript 是客户端的编程语言。几乎所有现代浏览器都实现了 JavaScript 解释器或即时（JIT）编译器。微软几年前引入了 VB Script，但
    JavaScript 已成为首选语言，并且微软的浏览器也很好地支持它。


    ###### 注意


    JavaScript 由 Netscape 创建，并由欧洲计算机制造商协会标准化。因此，其官方名称是 ECMAScript。*JavaScript* 是 Netscape
    对 ECMAScript 实现的名称，而微软的实现官方称为 *JScript*。JavaScript 通常用作 ECMAScript 的同义词，我在本书中也这样使用。


    ###### JavaScript 和 Java


    JavaScript 既不是 Java，也不是从 Java 派生出来的！它以前被称为 *LiveScript*，但很快就被重命名了。它是一种成熟的编程语言，也用于服务器端编程（[`nodejs.org`](http://nodejs.org)）。


    Java 8 附带了一个用 Java 编写的 JavaScript 解释器，称为 *Nashorn*。它能够访问 Java 类，这使得无需编译即可运行和测试部分
    Java 代码。这在探索新库或测试一些新的 Java 结构时特别有用。你可以在我的博客上找到一个借助 Nashorn 解释 Java 代码的示例：[`blog.mueller-bruehl.de/netbeans/interactive-java-using-nashorn-part-i/`](https://blog.mueller-bruehl.de/netbeans/interactive-java-using-nashorn-part-i/)。


    更棒的是，Java 的当前版本 9 包含了 Java Shell（JShell），它实现了一个真正的读取-求值-打印循环（REPL）。你也可以在我的博客上阅读更多相关内容，网址是
    [`blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell/`](https://blog.mueller-bruehl.de/netbeans/interactive-java-with-jshell/)。


    JavaScript 用于增强客户端行为或发起部分请求（AJAX）。JSF 在其 AJAX 标签背后隐藏了 JavaScript。有时编写一些 JavaScript
    代码是很有用的。作为一名 Java 开发人员，理解本书中描述的简单示例（如清单 2-3 所示的示例）对你来说应该没有问题。


    ###### 清单 2-3 JavaScript 示例：显示一条消息


    ```

    1   alert("The information has been saved");

    ```


    与 Java 不同，JavaScript 不是一种类型化语言。因此，你可以将一个整数赋值给一个变量，然后稍后用字符串替换其值。


    ## Java


    Java 是本书中用于 Web 应用程序编程的主要技术基础。我假设你熟悉 Java SE。


    本书中讨论的所有 Web 应用程序都是使用 Java EE 构建的。Java EE 平台是作为 JSR（Java 规范请求，Java EE 7：JSR 342，Java
    EE 8：JSR 366）构建的。这是一个总括性规范，描述了一个由大量技术构建的完整架构，每种技术都由其自己的 JSR 定义。在本书中，我将介绍其中的大部分技术。


    ## Maven


    对于专业的 Java 开发，你需要一个构建工具。许多开发人员从不关心他们的构建工具，因为它是由他们最喜欢的 IDE 配置的。其他人则非常了解他们的构建工具，并喜欢调整每一个细节。


    对于其他开发人员来说，Java 世界中有三种流行的工具：Apache Ant（[`ant.apache.org`](http://ant.apache.org)），它更倾向于命令式；Gradle（[`gradle.org`](https://gradle.org)）；以及
    Apache Maven（[`maven.apache.org`](http://maven.apache.org)），它遵循更声明式的方法。Apache
    的网站称 Maven 为“软件项目管理和理解工具”。流行的 IDE，如 NetBeans，对这两种工具都有内置支持。然而，无论你更喜欢哪种工具，基于 Ant
    的项目通常使用特定于你所使用的 IDE 的配置，而 Maven 项目遵循更严格的约定，因此大多独立于 IDE。例如，NetBeans 能够直接打开 Maven
    项目。其他 IDE（如 Eclipse）为基于 Maven 的项目提供了导入功能。


    为了确保与你最喜欢的 IDE 的最大兼容性，本书中讨论的所有应用程序都是使用 Maven 构建的。


    ## Selenium 和 Arquillian


    Selenium（[`docs.seleniumhq.org`](http://docs.seleniumhq.org)）可以自动化浏览器。除了宏录制和回放之外，这种自动化可以完全从
    Java 应用程序内部进行控制——例如，通过测试。这样做可以启用 Web 应用程序的 GUI 测试。


    测试由容器管理的 Bean 或其他组件可能很麻烦。Arquillian（[`arquillian.org`](http://arquillian.org)）允许在容器内测试
    Web 应用程序中感兴趣的部分。它与 JUnit 等测试框架完全集成。


    虽然本书不侧重于单元测试或测试驱动开发，但我将使用这两种工具讨论一些简单的测试场景。

