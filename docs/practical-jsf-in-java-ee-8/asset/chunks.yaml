  trans: "\n###### 图 32-2 添加 Web 资源\n\n我们希望限制只有特定角色的成员才能访问，因此勾选“启用身份验证约束”（Enable Authentication\
    \ Constraint）并编辑“角色名称”（Role Name）。选择我们之前定义的 *member* 和 *admin* 这两个角色。这建立了一个授权要求，而“启用用户数据约束”（Enable\
    \ User Data Constraint）则强制要求传输层。\n\n现在创建第二个安全约束，仅允许 admin 角色的成员访问 admin 页面。\n\n\
    没有 NetBeans？或者你更倾向于直接编辑 XML 文件？让我们来看看。使用 NetBeans，选择“源”（Source）选项卡。你的 `web.xml`\
    \ 文件应该类似于清单 32-1。\n\n###### 清单 32-1 web.xml 中的 security-constraint 部分\n\n```\n\
     1   <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n 2   <web-app version=\"3.1\"\
    \ xmlns:=\"http://xmlns.jcp.org/xml/ns/javaee\"\n 3       xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n 4       xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n 5       http://xmlns.jcp.org/xml/ns/javaee/web-app_3_1.xsd\"\
    >\n\n 8       [... 省略条目...]\n\n10       <security-constraint>\n11           <display-name>member\
    \ access</display-name>\n12           <web-resource-collection>\n13               <web-resource-name>member</web-resource-name>\n\
    14               <description>member access</description>\n15               <url-pattern>/member/*</url-pattern>\n\
    16           </web-resource-collection>\n17           <auth-constraint>\n18               <description>Member\
    \ pages are available to all roles</description\\>\n\n20               <role-name>member</role-name>\n\
    21               <role-name>admin</role-name>\n22           </auth-constraint>\n\
    23       </security-constraint>\n24       <security-constraint>\n25           <display-name>admin\
    \ access</display-name>\n26           <web-resource-collection>\n27               <web-resource-name>admin</web-resource-name>\n\
    28               <description>admin access</description>\n29               <url-pattern>/admin/*</url-pattern>\n\
    30           </web-resource-collection>\n31           <auth-constraint>\n32               <description>Admin\
    \ pages are restricted to people of the admin role only</description>\n\n34               <role-name>admin</role-name>\n\
    35           </auth-constraint>\n36       </security-constraint>\n37       <login-config>\n\
    38           <auth-method>BASIC</auth-method>\n39           <realm-name>file</realm-name>\n\
    40       </login-config>\n41       <security-role>\n42           <description/>\n\
    43           <role-name>member</role-name>\n44           </security-role>\n45       <security-role>\n\
    46           <description/>                                                  \
    \        \n47           <role-name>admin</role-name>\n48       </security-role>\n\
    49   </web-app>\n```\n\n找到标签 `security-constraint`、`login-config`、`security-role`\
    \ 及其子标签。这就是之前配置的结果。因此，这些标签的意图应该很明确。如果你熟悉这些标签，直接编辑 XML 文件可能会更快。要应用更多约束，可以添加一个同级元素。在一个约束内部，你可以添加更多的\
    \ Web 资源集合。并且你可以将其限制为一个或多个特定的 HTTP 方法，如清单 32-2 所示。\n\n###### 清单 32-2 特定 HTTP 方法示例\n\
    \n```\n1   <web-resource-collection>\n2       <web-resource-name>All web pages</web-resource-name>\n\
    3       <description/>\n4       <url-pattern>*.xhtml</url-pattern>\n5       <http-method>PUT</http-method>\n\
    6       <http-method>POST</http-method>\n7   </web-resource-collection>\n```\n\
    \n如果你选择了不同的身份验证方式（例如表单验证）或不同的域（realm），则需要在 `<login-config>` 中进行更改。更改方法通常不会影响安全约束或角色，因此当我们转向不同的域或身份验证方法时，我不会再重复解释这一点。\n\
    \n为了测试安全行为，我们创建三个简单的网页，分别放在 `admin`、`member` 和 `public` 文件夹中。始终将它们命名为 `test.xhtml`。对于这个简单的测试，我们不需要任何\
    \ JSF 特定的标签。只需在页面中放置一些文本来标识文件夹即可。清单 32-3 显示了我放在 `admin` 文件夹中的测试页面。\n\n###### 清单\
    \ 32-3 简单测试页面\n\n```\n 1   <?xml version='1.0' encoding='UTF-8' ?>\n 2   <!DOCTYPE\
    \ html PUBLIC \"-//W3C//DTD XHTML 1.0 Transitional//EN\"\n 3       \"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd\"\
    >\n 4   <html xmlns:=\"http://www.w3.org/1999/xhtml\">\n 5       <head>\n 6           <title>Admin\
    \ Test Page</title>\n 7       </head>\n 8       <body>\n 9           <h1>Admin\
    \ Page</h1>\n10       </body>\n11   </html>\n```\n\n现在，如果你启动应用程序并导航到这些页面，会发生什么？首先尝试公共页面\
    \ `http://localhost:8080/Alumni/public/test.xhtml` 或其 TLS 对应页面 `https://localhost:8181/Alumni/public/test.xhtml`。如果你没有安装自己验证过的证书，后者将使用\
    \ GlassFish 服务器的自签名证书，因此你的浏览器会抱怨证书不受信任。因为你知道这是你自己的服务器，所以可以接受它。连接将被完全加密。\n\n你的浏览器会按预期显示页面。但是，如果你尝试导航到\
    \ `member` 或 `admin` 文件夹中的测试页面，行为就会改变：你的浏览器会显示一个小的登录对话框，要求输入用户名和密码，如图 32-3 所示。\n\
    \n![A435433_1_En_32_Fig3_HTML.jpg](img/A435433_1_En_32_Fig3_HTML.jpg)\n\n######\
    \ 图 32-3 基本身份验证的登录对话框\n\n输入一些凭据，按回车键（或单击“确定”），此对话框将重新显示，直到（取决于你的浏览器）你输入有效的用户名/密码组合。但我们没有定义任何用户，所以唯一的选择是取消。你将看到浏览器显示的\
    \ *401 – 未授权* 页面。应用程序现在已受到保护。\n\n想让某些用户进入？好的，我们来定义他们。\n\n打开 GlassFish 管理控制台。确保\
    \ GlassFish 正在运行（它将随你的应用程序一起启动）。使用 NetBeans，打开“服务”（Services）视图（Ctrl+5），选择“服务器”（Servers），然后打开你的\
    \ GlassFish 的上下文菜单。选择“查看域管理控制台”（View Domain Admin Console）。或者，在浏览器中访问 `http://localhost:4848/`。\n\
    \n在导航窗格中，选择“配置”（Configurations）➤ `server-config` ➤ “安全”（Security）➤ “域”（Realms）➤\
    \ `file`，如图 32-4 所示。\n\n![A435433_1_En_32_Fig4_HTML.jpg](img/A435433_1_En_32_Fig4_HTML.jpg)\n\
    \n###### 图 32-4 GlassFish 配置树\n\nGlassFish 会显示“编辑域”（Edit Realm）页面。单击“管理用户”（Manage\
    \ Users）➤ “新建”（New）。现在输入一些凭据，如图 32-5 所示。单击“确定”（OK）确认。\n\n![A435433_1_En_32_Fig5_HTML.jpg](img/A435433_1_En_32_Fig5_HTML.jpg)\n"
