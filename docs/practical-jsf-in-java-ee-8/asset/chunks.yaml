    \ URL(request.getScheme(),\n17                 request.getServerName(),\n18                 request.getServerPort(),\n\
    19                 request.getContextPath() + Page.Activate.url() + \"?key=\"\
    \ + key);\n20         return url.toString();\n21       } catch (MalformedURLException\
    \ ex) {\n22         Logger.getLogger(Register.class.getName()).log(Level.SEVERE,\
    \ null, ex);\n23         return \"\";\n24       }\n25  }\n\n27     private HttpServletRequest\
    \ obtainServletRequest() {\n28       FacesContext context = FacesContext.getCurrentInstance();\n\
    29       return (HttpServletRequest) context.getExternalContext().getRequest();\n\
    30     }\n```\n\n通常，我们会在应用程序中导航到页面。这样的路径会自动附加到上下文路径之后。但对于激活邮件，我们需要向用户发送一个完整的 URL（URI），包括域名（或在开发环境中为服务器名称）和上下文路径。这个\
    \ URL 在第 16–20 行构建。如果你的服务器运行在标准 HTTP 端口（端口 80，或 HTTPS 的 430 端口）上，则可以省略端口号。\n\n\
    用户收到此激活邮件后，会点击其中的链接。\n\n## 总结\n\n通过 JavaMail，你拥有一个处理电子邮件的 API，既可以在 Java SE 中使用，也可以在\
    \ Java EE 中使用。它已包含在 Java EE 中，因此在 Java EE 项目中无需在 POM 中添加额外的引用。\n\nJavaMail 需要一些属性来配置传输，包括邮件服务器、协议等。本章展示了使用硬编码解决方案的这些属性。更好的做法是，将这些属性设置在应用程序外部。符合\
    \ Java EE 规范的服务器提供了通过其控制台或 `.properties` 文件定义邮件会话的能力。Alumni 正是利用这种方式，使用邮件功能向用户发送激活邮件或其他信息。\n\
    \n© Michael Müller 2018\n\nMichael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_31`\n\
    \n# 31. 定时任务\n\nMichael Müller^(1 )\n\n(1)德国，北莱茵-威斯特法伦州，布吕尔\n\n如果用户没有激活他们的账户，我们就会得到一个*孤立*的注册（或账户）。我们必须定期清理数据库，对于周期性任务来说，还有什么比定时器更好的工具呢？这就是定时任务的用武之地。由于定时器在同一线程内可能对错误非常敏感，我们将异步执行此调度。\n"
- fmt: "# Scheduler\n\nTimers are available within Enterprise Java Beans (EJBs). Alumni\
    \ uses a central class to invoke timed events: the `Scheduler` class, annotated\
    \ as `@Singleton`. Any method that should be invoked by a timer will be annotated\
    \ with `@Schedule`. See Listing [31-1](#A435433_1_En_31_Chapter.xhtml#PC1).\n\n\
    ###### Listing 31-1 Scheduler Class\n\n```java\n@Singleton\npublic class Scheduler\
    \ {\n\n    @Inject DatabaseCleaner _dbCleaner;\n\n    @Schedule(hour = \"*/1\"\
    )\n    private void cleanDatabase() {\n        _dbCleaner.cleanAccountRequests();\n\
    \    }\n}\n```\n\nLine 6 shows a schedule for every hour. The server will create\
    \ an appropriate timer. If we write `hour = \"1\"`, the timer will fire once a\
    \ day, at 1 o’clock. Using the asterisk and a number after the slash, `*/n` stands\
    \ for every *n* hours (you can also use minutes, seconds, and so on). An asterisk\
    \ on its own stands for “doesn’t care.” So, if we want to schedule a task every\
    \ ten seconds, the hours and minutes “don’t care.” We annotate the method like\
    \ this:\n\n```java\n@Schedule(hour = \"*\", minute = \"*\", second = \"*/10\"\
    )\n```\n\nThe `DatabaseCleaner` class is used to bundle a couple of database-cleaning\
    \ task starters. At first glance, this class does nothing but delegate to the\
    \ register service and log in case of error. See Listing [31-2](#A435433_1_En_31_Chapter.xhtml#PC3).\n\
    \n###### Listing 31-2 DatabaseCleaner Class\n\n```java\n@Stateless\npublic class\
    \ DatabaseCleaner {\n\n    @Inject private AccountService _registerService;\n\n\
    \    public void cleanAccountRequests() {\n        try {\n            _registerService.deleteOldAccountRequests();\n\
    \        } catch (Exception ex) {\n            Logger.getLogger(Scheduler.class.getName())\n\
    \                    .log(Level.SEVERE, null, ex.getMessage());\n        }\n \
    \   }\n}\n```\n\nOnce a timer is created, the application server ensures that\
    \ it will be triggered. If the server goes down, that won’t stop the timer: after\
    \ a reboot, the server restores all timers. After any downtime, the server tries\
    \ to catch up on everything.\n\n## Delete Query\n\nUsing the Java Persistence\
    \ API (JPA), people become acquainted with CRUD (create, read, update, delete)\
    \ operations: `persist`, `find`, `merge`, and `remove`. To delete a single entity,\
    \ you usually use the `remove(entity)` method. With this approach, you first have\
    \ to load the entity and then pass it as a parameter to the `remove` method. It’s\
    \ only suitable when you want to delete an entity that was loaded into memory\
    \ before for some other reason.\n\nBut why should you load an entity if you only\
    \ want to delete it? I know people who dislike JPA because of that. However, JPA\
    \ offers more than the well-known CRUD operations. For example, there’s `executeUpdate()`,\
    \ which you can use for other SQL-like operations. We use it to delete all requests\
    \ that are older than one day. We’ll have to calculate this date. Although the\
    \ new `LocalDate` is very handy, we can’t use it here. We need the old-fashioned\
    \ `Date`. Or at least we need to convert a `LocalDate` into that type (the good\
    \ news about JPA 2.2 is that defining an entity, you might use the Java 8 date\
    \ API). See Listing [31-3](#A435433_1_En_31_Chapter.xhtml#PC4).\n\n###### Listing\
    \ 31-3 AccountService Class (Excerpt)\n\n```java\npublic void deleteOldAccountRequests()\
    \ {\n    String jpql = \"DELETE FROM Account a \"\n            + \"WHERE a._created\
    \ < :date and a._status = :status\";\n    Query query = getEntityManager().createQuery(jpql);\n\
    \    Date deleteBefore = new Date();\n    query.setParameter(\"date\", getDateWithDayOffset(-1));\n\
    \    query.setParameter(\"status\", AccountStatus.New);\n    query.executeUpdate();\n\
    }\n\npublic Date getDateWithDayOffset(int offset) {\n    return new Date(System.currentTimeMillis()\
    \ + offset * 24 * 60 * 60 * 1000);\n}\n```\n\nNow if we start the application,\
    \ the application server will create a timer; every hour, the cleaning operation\
    \ will be called. And in case of an error, the error will be logged. So far, everything\
    \ seems to work fine.\n\n###### ![A435433_1_En_31_Figa_HTML.jpg](OEBPS/Images/A435433_1_En_31_Figa_HTML.jpg) Provoke\
    \ an error\n\nBut let’s enforce an exception. We’re going to provoke an error.\n\
    \nModify the `jpql` statement: `WHERE a.createdXXX < :date`. Note that appending\
    \ the three Xs makes the field name invalid. Change the time to be invoked every\
    \ 5 seconds (you don’t want to have to wait for hours).\n\nThen start the application\
    \ and observe the server log.\n\nAs you might have expected, the server reports\
    \ an error:\n\n```\nInfo:   Error during transaction processing\njava.lang.IllegalArgumentException:\
    \ An exception occurred while creating a query in EntityManager:\nException Description:\
    \ Problem compiling [DELETE FROM Account a WHERE a._createdXXX < :date and a._status\
    \ = :status].\n[28, 41] The state field path 'a._createdXXX' cannot be resolved\
    \ to a valid type.\n```\n\nBut after the second attempt to invoke the database\
    \ cleaner, the timer stops, and the server logs the following:\n\n```\nInfo: EJB5119:Expunging\
    \ timer [...] after [2] failed deliveries\n```\n\nAs reported in the log, the\
    \ timer stops. This happens even though we catch the error. This apparent strange\
    \ behavior is by design with EJB. Usually our code would be correct, but imagine\
    \ the database server is down unexpectedly. After some time it comes back up and\
    \ is running again. We want our scheduled server to operate on the database again,\
    \ but by this time the timer might be expunged.\n\nHow can we solve this problem?\
    \ Catching the exception isn’t an option, as we just showed. Luckily, there *is*\
    \ a simple solution: the timer won’t be expunged if the exception occurs in a\
    \ different thread.\n\n## Becoming Asynchronous\n\nIf we want to trigger long-running\
    \ tasks, it might be great to start without waiting for results.\n\nThe recent\
    \ version of Java EE supports *asynchronous method calls*: the method is invoked\
    \ in a different thread, and control immediately returns to the caller. All you\
    \ need to do is to declare the method that’s called by the timer as `Asynchronous`\
    \ by using the appropriate annotation, as shown in Listing [31-4](#A435433_1_En_31_Chapter.xhtml#PC7).\n\
    \n###### Listing 31-4 Asynchronous Method\n\n```java\n@Asynchronous\npublic void\
    \ cleanAccountRequests() {\n    ...\n}\n```\n\nEven though the deletion task we\
    \ defined is very short, it gets its benefit from the `Asynchronous` call: the\
    \ timer won’t stop any more due to the error in the `jpql` statement. Besides\
    \ running asynchronous, we’ll get a stable timer.\n\n## Summary\n\nThis chapter\
    \ provided a lean introduction into scheduled events. Java EE supports timed events\
    \ by simply adding the `@Schedule` annotation to a method. The first use in Alumni\
    \ is a periodically database-cleaning process that uses a delete query. Thus,\
    \ there’s no need to load any entity before it becomes deleted. Timers are vulnerable\
    \ to exceptions, even though this exception might be caught. Using an `Asynchronous`\
    \ method call helps to increase the timer’s stability.\n\n© Michael Müller 2018\n\
    \nMichael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_32](#A435433_1_En_32_Chapter.xhtml)\n\
    \n# 32. Authentication and Authorization\n\nMichael Müller^(1)\n\n(1)Brühl, Nordrhein-Westfalen,\
    \ Germany\n\nSometimes it’s crucial to protect an application or data against\
    \ unauthorized access. Although Alumni offers some public pages, most are restricted\
    \ to members. The system will grant access to certain features for well-known\
    \ users only. Luckily, the application server provides some security features,\
    \ like authentication and authorization, and controls access to parts of the program\
    \ with the concept of user roles.\n\nContainer-provided security isn’t specific\
    \ to JSF. It’s part of the HTTP handling and can be used by a simple servlet too.\
    \ Before integrating it into Alumni, let’s go over some basic information about\
    \ security."
  raw: '## Scheduler


    Timers are available within Enterprise Java Beans (EJBs). Alumni uses a central
    class to invoke timed events: the Scheduler class*,* annotated as @Singleton.
    Any method that should be invoked by a timer will be annotated with @Schedule.
    See Listing [31-1](#A435433_1_En_31_Chapter.xhtml#PC1).


    ###### Listing 31-1 Scheduler Class


    ```

     1   @Singleton

     2   public class Scheduler {


     4     @Inject DatabaseCleaner _dbCleaner;


     6     @Schedule(hour = "*/1")

     7     private void cleanDatabase() {

     8         _dbCleaner.cleanAccountRequests();

     9     }

    10   }

    ```


    Line 6 shows a schedule for every hour. The server will create an appropriate
    timer. If we write hour = "1", the timer will fire once a day, at 1 o’clock. Using
    the asterisk and a number after the slash, */n stands for every *n* hours (you
    can also use minutes, seconds, and so on). An asterisk on its own stands for “doesn’t
    care.” So, if we want to schedule a task every ten seconds, the hours and minutes
    “don’t care.” We annotate the method like this:


    ```

    @Schedule(hour = "*", minute = "*", second = "*/10")

    ```


    The DatabaseCleaner class is used to bundle a couple of database-cleaning task
    starters. At first glance, this class does nothing but delegate to the register
    service and log in case of error. See Listing [31-2](#A435433_1_En_31_Chapter.xhtml#PC3).


    ###### Listing 31-2 DatabaseCleaner Class


    ```

     1   @Stateless

     2   public class DatabaseCleaner {


     4     @Inject private AccountService _registerService;


     6     public void cleanAccountRequests() {

     7       try {

     8         _registerService.deleteOldAccountRequests();

     9       } catch (Exception ex) {

    10         Logger.getLogger(Scheduler.class.getName())

    11                 .log(Level.SEVERE, null, ex.getMessage());

    12       }

    13     }


    15   }

    ```


    Once a timer is created, the application server ensures that it will be triggered.
    If the server goes down, that won’t stop the timer: after a reboot, the server
    restores all timers. After any downtime, the server tries to catch up on everything.


    ## Delete Query


    Using the Java Persistence API (JPA), people become acquainted with CRUD (create,
    read, update, delete) operations: persist, find, merge, and remove. To delete
    a single entity, you usually use the remove(entity) method. With this approach,
    you first have to load the entity and then pass it as a parameter to the remove
    method. It’s only suitable when you want to delete an entity that was loaded into
    memory before for some other reason.


    But why should you load an entity if you only want to delete it? I know people
    who dislike JPA because of that. However, JPA offers more than the well-known
    CRUD operations. For example, there’s executeUpdate(), which you can use for other
    SQL-like operations. We use it to delete all requests that are older than one
    day. We’ll have to calculate this date. Although the new LocalDate is very handy,
    we can’t use it here. We need the old-fashioned Date. Or at least we need to convert
    a LocalDate into that type (the good news about JPA 2.2 is that defining an entity,
    you might use the Java 8 date API). See Listing [31-3](#A435433_1_En_31_Chapter.xhtml#PC4).


    ###### Listing 31-3 AccountService Class (Excerpt)


    ```

    01     public void deleteOldAccountRequests() {

    02       String jpql = "DELETE FROM Account a "

    03               + "WHERE a._created < :date and a._status = :status";

    04       Query query = getEntityManager().createQuery(jpql);

    05       Date deleteBefore = new Date();

    06       query.setParameter("date", getDateWithDayOffset(-1));

    07       query.setParameter("status", AccountStatus.New);

    08       query.executeUpdate();

    09     }


    11     public Date getDateWithDayOffset(int offset) {

    12       return new Date(System.currentTimeMillis()+ offset*24*60*60*1000);

    13     }

    ```


    Now if we start the application, the application server will create a timer; every
    hour, the cleaning operation will be called. And in case of an error, the error
    will be logged. So far, everything seems to work fine.


    ###### ![A435433_1_En_31_Figa_HTML.jpg](OEBPS/Images/A435433_1_En_31_Figa_HTML.jpg) Provoke
    an error


    But let’s enforce an exception. We’re going to provoke an error.


    Modify the jpql statement: WHERE a.createdXXX < :date. Note that appending the
    three Xs makes the field name invalid. Change the time to be invoked every 5 seconds
    (you don’t want to have to wait for hours).


    Then start the application and observe the server log.


    As you might have expected, the server reports an error:


    ```

    Info:   Error during transaction processing

    java.lang.IllegalArgumentException: An exception occurred while creating a query
    in EntityManager:

    Exception Description: Problem compiling [DELETE FROM Account a WHERE a._createdXXX
    < :date and a._status = :status].

    [28, 41] The state field path ''a._createdXXX'' cannot be resolved to a valid
    type.

    ```


    But after the second attempt to invoke the database cleaner , the timer stops,
    and the server logs the following:


    ```

    Info: EJB5119:Expunging timer [...] after [2] failed deliveries

    ```


    As reported in the log, the timer stops. This happens even though we catch the
    error. This apparent strange behavior is by design with EJB. Usually our code
    would be correct, but imagine the database server is down unexpectedly. After
    some time it comes back up and is running again. We want our scheduled server
    to operate on the database again, but by this time the timer might be expunged.


    How can we solve this problem? Catching the exception isn’t an option, as we just
    showed. Luckily, there *is* a simple solution: the timer won’t be expunged if
    the exception occurs in a different thread.


    ## Becoming Asynchronous


    If we want to trigger long-running tasks, it might be great to start without waiting
    for results.


    The recent version of Java EE supports *asynchronous method calls*: the method
    is invoked in a different thread, and control immediately returns to the caller.
    All you need to do is to declare the method that’s called by the timer as Asynchronous
    by using the appropriate annotation, as shown in Listing [31-4](#A435433_1_En_31_Chapter.xhtml#PC7).


    ###### Listing 31-4 Asynchronous Method


    ```

    1   @Asynchronous

    2   public void cleanAccountRequests() {

    3     ...

    4   }

    ```


    Even though the deletion task we defined is very short, it gets its benefit from
    the Asynchronous call: the timer won’t stop any more due to the error in the jpql
    statement. Besides running asynchronous, we’ll get a stable timer.


    ## Summary


    This chapter provided a lean introduction into scheduled events. Java EE supports
    timed events by simply adding the @Schedule annotation to a method. The first
    use in Alumni is a periodically database-cleaning process that uses a delete query.
    Thus, there’s no need to load any entity before it becomes deleted. Timers are
    vulnerable to exceptions, even though this exception might be caught. Using an
    Asynchronous method call helps to increase the timer’s stability.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_32](#A435433_1_En_32_Chapter.xhtml)


    # 32. Authentication and Authorization


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    Sometimes it’s crucial to protect an application or data against unauthorized
    access. Although Alumni offers some public pages, most are restricted to members.
    The system will grant access to certain features for well-known users only. Luckily,
    the application server provides some security features, like authentication and
    authorization, and controls access to parts of the program with the concept of
    user roles.


    Container-provided security isn’t specific to JSF. It’s part of the HTTP handling
    and can be used by a simple servlet too. Before integrating it into Alumni, let’s
    go over some basic information about security.'
  trans: '

    ## 调度器


    企业 Java Bean（EJB）中提供了定时器功能。Alumni 使用一个中心类来调用定时事件：即标注为 `@Singleton` 的 Scheduler
    类。任何应由定时器调用的方法都将使用 `@Schedule` 进行注解。请参见清单 31-1。


    ###### 清单 31-1 调度器类


    ```

     1   @Singleton

     2   public class Scheduler {


     4     @Inject DatabaseCleaner _dbCleaner;


     6     @Schedule(hour = "*/1")

     7     private void cleanDatabase() {

     8         _dbCleaner.cleanAccountRequests();

     9     }

    10   }

    ```


    第 6 行显示了一个每小时执行一次的调度。服务器将创建一个相应的定时器。如果我们写成 `hour = "1"`，定时器将每天在 1 点钟触发一次。使用星号和斜杠后的数字，`*/n`
    表示每 *n* 小时执行一次（你也可以使用分钟、秒等单位）。单独的星号表示“不关心”。因此，如果我们想每十秒调度一个任务，小时和分钟就“不关心”了。我们像这样注解方法：


    ```

    @Schedule(hour = "*", minute = "*", second = "*/10")

    ```


    DatabaseCleaner 类用于捆绑几个数据库清理任务的启动器。乍一看，这个类除了委托给注册服务并在出错时记录日志外，什么也不做。请参见清单 31-2。


    ###### 清单 31-2 DatabaseCleaner 类


    ```

     1   @Stateless

     2   public class DatabaseCleaner {


     4     @Inject private AccountService _registerService;


     6     public void cleanAccountRequests() {

     7       try {

     8         _registerService.deleteOldAccountRequests();

     9       } catch (Exception ex) {

    10         Logger.getLogger(Scheduler.class.getName())

    11                 .log(Level.SEVERE, null, ex.getMessage());

    12       }

    13     }


    15   }

    ```


    一旦创建了定时器，应用服务器就会确保它被触发。如果服务器宕机，这并不会阻止定时器：重启后，服务器会恢复所有定时器。在任何停机时间之后，服务器会尝试补上所有未执行的任务。


    ## 删除查询


    使用 Java 持久化 API（JPA），人们会熟悉 CRUD（创建、读取、更新、删除）操作：`persist`、`find`、`merge` 和 `remove`。要删除单个实体，通常使用
    `remove(entity)` 方法。使用这种方法，你首先必须加载实体，然后将其作为参数传递给 `remove` 方法。这仅在你出于其他原因之前已将实体加载到内存中时才适用。


    但是，如果你只想删除一个实体，为什么还要加载它呢？我知道有些人因此不喜欢 JPA。然而，JPA 提供的功能远不止众所周知的 CRUD 操作。例如，还有 `executeUpdate()`，你可以将其用于其他类似
    SQL 的操作。我们用它来删除所有超过一天期限的请求。我们需要计算这个日期。虽然新的 `LocalDate` 非常方便，但我们在这里不能使用它。我们需要老式的
    `Date`。或者至少我们需要将 `LocalDate` 转换为该类型（关于 JPA 2.2 的好消息是，在定义实体时，你可以使用 Java 8 日期 API）。请参见清单
    31-3。


    ###### 清单 31-3 AccountService 类（节选）


    ```

    01     public void deleteOldAccountRequests() {

    02       String jpql = "DELETE FROM Account a "

    03               + "WHERE a._created < :date and a._status = :status";

    04       Query query = getEntityManager().createQuery(jpql);

    05       Date deleteBefore = new Date();

    06       query.setParameter("date", getDateWithDayOffset(-1));

    07       query.setParameter("status", AccountStatus.New);

    08       query.executeUpdate();

    09     }


    11     public Date getDateWithDayOffset(int offset) {

    12       return new Date(System.currentTimeMillis()+ offset*24*60*60*1000);

    13     }

    ```


    现在，如果我们启动应用程序，应用服务器将创建一个定时器；每小时都会调用清理操作。如果发生错误，错误将被记录。到目前为止，一切似乎都运行正常。


    ###### ![A435433_1_En_31_Figa_HTML.jpg](img/A435433_1_En_31_Figa_HTML.jpg) 引发一个错误


    但让我们强制产生一个异常。我们将故意引发一个错误。


    修改 jpql 语句：`WHERE a.createdXXX < :date`。请注意，追加三个 X 会使字段名称无效。将调用时间改为每 5 秒一次（你肯定不想等上几个小时）。


    然后启动应用程序并观察服务器日志。


    正如你可能预料的那样，服务器报告了一个错误：


    ```

    Info:   Error during transaction processing

    java.lang.IllegalArgumentException: An exception occurred while creating a query
    in EntityManager:

    Exception Description: Problem compiling [DELETE FROM Account a WHERE a._createdXXX
    < :date and a._status = :status].

    [28, 41] The state field path ''a._createdXXX'' cannot be resolved to a valid
    type.

    ```


    但在第二次尝试调用数据库清理器后，定时器停止了，服务器记录了以下信息：


    ```

    Info: EJB5119:Expunging timer [...] after [2] failed deliveries

    ```


    正如日志中所报告的，定时器停止了。即使我们捕获了错误，这种情况也会发生。这种看似奇怪的行为是 EJB 的设计使然。通常我们的代码是正确的，但想象一下数据库服务器意外宕机的情况。过了一段时间它又恢复并重新运行。我们希望我们的调度服务器能再次对数据库进行操作，但此时定时器可能已被清除。


    我们如何解决这个问题？正如我们刚才展示的，捕获异常并不是一个选项。幸运的是，*确实*有一个简单的解决方案：如果异常发生在不同的线程中，定时器就不会被清除。


    ## 变为异步


    如果我们想触发长时间运行的任务，最好能立即启动而无需等待结果。


    最新版本的 Java EE 支持*异步方法调用*：该方法在不同的线程中被调用，控制权立即返回给调用者。你所要做的就是用适当的注解将定时器调用的方法声明为异步，如清单
    31-4 所示。


    ###### 清单 31-4 异步方法


    ```

    1   @Asynchronous

    2   public void cleanAccountRequests() {

    3     ...

    4   }

    ```


    尽管我们定义的删除任务非常短，但它从异步调用中获益：定时器将不再因为 jpql 语句中的错误而停止。除了异步运行之外，我们还将获得一个稳定的定时器。


    ## 总结


    本章简要介绍了定时事件。Java EE 支持通过简单地向方法添加 `@Schedule` 注解来实现定时事件。在 Alumni 中的首次应用是一个使用删除查询的定期数据库清理过程。因此，在删除实体之前无需加载任何实体。定时器容易受到异常的影响，即使这些异常可能被捕获。使用异步方法调用有助于提高定时器的稳定性。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_32`


    # 32. 认证与授权


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    有时保护应用程序或数据免受未经授权的访问至关重要。尽管 Alumni 提供了一些公共页面，但大多数页面仅限于成员访问。系统将仅向已知用户授予对某些功能的访问权限。幸运的是，应用服务器提供了一些安全特性，例如认证和授权，并通过用户角色的概念控制对程序部分的访问。


    容器提供的安全性并非 JSF 所特有。它是 HTTP 处理的一部分，也可以被简单的 Servlet 使用。在将其集成到 Alumni 之前，让我们先了解一些关于安全性的基本信息。

