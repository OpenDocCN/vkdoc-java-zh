    As you can see, this concrete facade either simply delegates to the abstract facade
    or adds more complex functions like findAccountbyAccessKey. Although a new instance
    might be saved by the saveAccount method (line 5), there’s a special method to
    create an account starting at line 17. This method checks whether the email exists
    to ensure that each email can be assigned to one account only. The login name
    might be updated during account creation to ensure a unique login name. Last but
    not least, the account status is set to new. This indicates a nonactivated account.
    Login is possible for activated accounts only.


    Starting at line 52, there’s a delete method. It deletes an account that is identified
    by its id without any need to load it into memory beforehand.


    For brevity’s sake, Listing [29-2](#A435433_1_En_29_Chapter.xhtml#PC2) doesn’t
    show the whole class.


