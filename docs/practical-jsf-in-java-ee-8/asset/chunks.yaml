    Listing [5-2](#A435433_1_En_5_Chapter.xhtml#PC2) shows a version that’s closer
    to pure HTML.


    ###### Listing 5-2 TinyCalculator in HTML-Friendly Style


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns="http://www.w3.org/1999/xhtml"

     4         xmlns:jsf="http://xmlns.jcp.org/jsf">

     5       <head>

     6           <title>TinyCalculator</title>

     7       </head>

     8       <body>

     9           <h1>TinyCalculator</h1>

    10           <form jsf:id="calc">

    11               <div>

    12                   Param1: <input type="text"

    13                            jsf:value="#{tinyCalculator.param1}"/>

    14               </div>

    15               <div>

    16                   Param2: <input type="text"

    17                            jsf:value="#{tinyCalculator.param2}"/>

    18               </div>

    19               <div>

    20                   <input type="submit" value="Add"

    21                          jsf:action="#{tinyCalculator.add}"/>

    22                   <input type="submit" value="Subtract"

    23                          jsf:action="#{tinyCalculator.subtract}"/>

    24                   <!-- or, using the button element: -->

    25                   <button jsf:action="#{tinyCalculator.multiply()}">

    26                       Multiply

    27                   </button>

    28                   <button jsf:action="#{tinyCalculator.divide()}">

    29                       Divide

    30                   </button>

    31               </div>

    32               <div>

    33                   Result: #{tinyCalculator.result}

    34               </div>

    35           </form>

    36       </body>

    37   </html>

    ```


    Let’s take a closer look. At the beginning of this page, you’ll find the XML namespace
    definition `xmlns:jsf="http://xmlns.jcp.org/jsf"`. In this definition, the prefix
    `jsf:` refers to that special namespace. Now, if JSF finds an element with any
    attribute of it prefixed with that namespace alias, it treats the element as one
    that JSF will handle. JSF tries to map such elements to well-known elements, as
    if they used the traditional JSF tags. For example, `"input type=submit"` will
    be handled the same way as `h:inputText`. Any unknown element is treated as a
    pass-through element and rendered as is. Both kinds of elements will be collected
    into the component tree.


    HTML-friendly markup has been available since JSF 2.2. We’ll use JSF tags for
    the Books application (Part II) and partially switch to a more HTML-friendly style
    by developing Alumni (Part IV). You may choose one of these styles, depending
    on whether you like to use HTML or prefer to hide most of the HTML stuff. Technically,
    it’s no problem to mix the styles as you like, but usually your code will read
    better if you use it in a consistent way.


    ## Summary


    HTML-friendly markup is a page style that is far closer to pure HTML than JSF
    tags. Only attributes that have to be processed by JSF will be marked by a special
    prefix, while the rest of the page will be coded using HTML.


    HTML-friendly markup also means passing HTML attributes that can’t be processed
    by JSF directly to the browser. The pass-through attributes discussed here might
    be used to add HTML attributes to JSF tags, which will be rendered as is. Thus,
    JSF tags might be enriched with any attribute, even if it’s unknown to JSF.


