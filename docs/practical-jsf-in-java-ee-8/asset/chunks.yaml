- fmt: "### Listing 7-3 Sample Unit Test for Browser Automation with Selenium\n\n\
    ```\n 1   public class TinyCalculatorTest {\n 2       private static WebDriver\
    \ _driver;\n\n4       @BeforeClass\n 5       public static void setUpClass() {\n\
     6           _driver = new FirefoxDriver();\n 7       }\n\n9       @AfterClass\n\
    10       public static void tearDownClass() {\n11           _driver.quit();\n\
    12       }\n\n14       @Before\n15       public void setUp() {\n16           _driver.get(\"\
    http://localhost:8080/TinyCalculator/index.xhtml\");\n17           setValue(\"\
    form:param1\", \"6\");\n18           setValue(\"form:param2\", \"4\");\n19       }\n\
    \n21       private void setValue(String id, String value){\n22           WebElement\
    \ element = _driver.findElement(By.id(id));\n23           element.clear();\n24           element.sendKeys(value);\n\
    25       }\n\n27       @Test\n28       public void testAdd() {\n29           _driver.findElement(By.id(\"\
    form:add\")).click();\n30           String text = _driver.findElement(By.id(\"\
    form:result\")).getText();\n31           assertThat(text, equalTo(\"10.0\"));\n\
    32       }\n\n34       @Test\n35       public void testSubstract() {\n36           _driver.findElement(By.id(\"\
    form:sub\")).click();\n37           String text = _driver.findElement(By.id(\"\
    form:result\")).getText();\n38           assertThat(text, equalTo(\"2.0\"));\n\
    39       }\n\n41       @Test\n42       public void testMultiply() {\n43           _driver.findElement(By.id(\"\
    form:mul\")).click();\n44           String text = _driver.findElement(By.id(\"\
    form:result\")).getText();\n45           assertThat(text, equalTo(\"24.0\"));\n\
    46       }\n\n48       @Test\n49       public void testDivide() {\n50           _driver.findElement(By.id(\"\
    form:div\")).click();\n51           String text = _driver.findElement(By.id(\"\
    form:result\")).getText();\n52           assertThat(text, equalTo(\"1.5\"));\n\
    53       }\n54   }\n 1  package de.muellerbruehl.selenium;\n\n3  import org.junit.jupiter.api.AfterAll;\n\
     4  import static org.junit.jupiter.api.Assertions.assertEquals;\n 5  import org.junit.jupiter.api.BeforeAll;\n\
     6  import org.junit.jupiter.api.BeforeEach;\n 7  import org.junit.jupiter.api.Test;\n\
     8  import org.openqa.selenium.By;\n 9  import org.openqa.selenium.WebDriver;\n\
    10  import org.openqa.selenium.WebElement;\n11  import org.openqa.selenium.firefox.FirefoxDriver;\n\
    \n13  public class TinyCalculatorSeleniumTest {\n\n15    private static WebDriver\
    \ _driver;\n\n17    @BeforeAll\n18    public static void setUpClass() {\n19      System.setProperty(\"\
    webdriver.gecko.driver\", \"/home/mmueller/.local/geckodriver\");\n20      _driver\
    \ = new FirefoxDriver();\n21    }\n\n23    @AfterAll\n24    public static void\
    \ tearDownClass() {\n25      _driver.quit();\n26    }\n\n28    @BeforeEach\n29    public\
    \ void setUp() {\n30      _driver.get(\"http://localhost:8080/TinyCalculator/index.xhtml\"\
    );\n31      setValue(\"form:param1\", \"6\");\n32      setValue(\"form:param2\"\
    , \"4\");\n33    }\n\n35    private void setValue(String id, String value) {\n\
    36      WebElement element = _driver.findElement(By.id(id));\n37      element.clear();\n\
    38      element.sendKeys(value);\n39    }\n\n41    @Test\n42    public void testAdd()\
    \ {\n43      _driver.findElement(By.id(\"form:add\")).click();\n44      String\
    \ text = _driver.findElement(By.id(\"form:result\")).getText();\n45      assertEquals(\"\
    10.0\", text);\n46    }\n\n48    @Test\n49    public void testSubstract() {\n\
    50      _driver.findElement(By.id(\"form:sub\")).click();\n51      String text\
    \ = _driver.findElement(By.id(\"form:result\")).getText();\n52      assertEquals(\"\
    2.0\", text);\n53    }\n\n55    @Test\n56    public void testMultiply() {\n57      _driver.findElement(By.id(\"\
    form:mul\")).click();\n58      String text = _driver.findElement(By.id(\"form:result\"\
    )).getText();\n59      assertEquals(\"24.0\", text);\n60    }\n\n62    @Test\n\
    63    public void testDivide() {\n64      _driver.findElement(By.id(\"form:div\"\
    )).click();\n65      String text = _driver.findElement(By.id(\"form:result\")).getText();\n\
    66      assertEquals(\"1.5\", text);                                         \
    \                                             \n67    }\n68  }\n```\n\nHere are\
    \ some notes on that long listing:\n\n*   In `setUpClass`, a new driver object\
    \ is instantiated. In line 19 we need to define the path to the gecko driver you\
    \ downloaded. As a result of this method, a browser window will open.\n*   Before\
    \ every test (the method `setUp`), the TinyCalculator page is opened. The parameters\
    \ are set to the values 6 and 4.\n*   There are four tests for the basic arithmetic\
    \ supported by TinyCalculator. Each test clicks the appropriate button and checks\
    \ the result.\n*   At last, in `tearDownClass`, the driver is quit. This closes\
    \ the browser window.\n\nAs you may have noticed, the basic use of Selenium is\
    \ quite simple. You navigate to the URL of your choice, locate elements, and perform\
    \ actions:\n\n```\nWebElement element = _driver.findElement(By.id(id));\n```\n\
    \nThe `findElement` method expects a parameter of type `By`, which is defined\
    \ as an abstract class. `By.id` invokes a static factory method that creates a\
    \ concrete type of `By`:\n\n```\npublic static By id(final String id){...}\n```\n\
    \n`By` contains several factory methods to create an instance of `By`, which you\
    \ may use to select an element. Besides `By.id`, you might use `By.name`, `By.linkText`,\
    \ `By.tagName`, and more. Thus, it provides you with various ways to locate the\
    \ element of interest.\n\nTo set up our tests, we have to locate the input parameters\
    \ and enter some values. `sendKeys` emulates a user’s input. Because we reuse\
    \ the running browser window, it’s essential to clear the input fields beforehand.\
    \ Otherwise, the new text would be appended. On the other side, it’s possible\
    \ to read text from a field, with `String text = _driver.findElement(By.id(\"\
    form:result\")).getText();`.\n\n## Unit Test without Selenium\n\nWith our Selenium-based\
    \ test, we checked the GUI and by this the underlying model. Isn’t it a rule of\
    \ thumb to test the model separately with a unit test? Of course, and in case\
    \ of TinyCalculator, that’s no problem. Listing [7-4](#A435433_1_En_7_Chapter.xhtml#PC6)\
    \ shows a simple test (within the TinyCalculator project).\n\n### Listing 7-4\
    \ Unit Test for the Calculator Model\n\n```\n 1   public class TinyCalculatorTest\
