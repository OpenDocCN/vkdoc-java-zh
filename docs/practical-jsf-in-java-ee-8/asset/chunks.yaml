    15  </cc:implementation>\n```\n\n不要尝试上述代码——它能演示目标，但无法正常工作。在第 2 行，我们定义了一个属性（value）用于将简单字符串传入组件。假设我们要传入一个\
    \ `Account` 类的对象，它比简单字符串更复杂。我们需要告知 JSF 该对象的完全限定类型。根据经验法则，当你在 Java 代码中也需要使用完全限定类时，或者需要导入该类以省略包名时，就使用完全限定类：\n\
    \n```\n<cc:attribute name=\"account\" type=\"de.muellerbruehl.alumni.business.dto.Account\"\
    >\n```\n\n要传入一个方法，我们也需要告知 JSF。在这种情况下，我们需要添加一个带有相应属性的方法签名：\n\n```\n<cc:attribute\
    \ name=\"validator\"\n          method-signature=\"void validate(\n          javax.faces.context.FacesContext,\n\
              javax.faces.component.UIComponent,\n          Object)\"/>\n```\n\n我们还需要声明返回类型和参数类型。对于没有导入语句的文件，这采用标准的\
    \ Java 方式。因此，对于非简单对象，我们需要传入完全限定的类名。至于方法名，我们可以自由选择任何有效的名称——这无关紧要。\n\n通常，在接口部分，我们可以复用内部组件的属性名。但对于验证器，我们需要选择一个不同的名称才能使其正常工作。我将其命名为\
    \ `validationMethod`。\n\n## 通用输入组件\n\n要获得一个通用输入组件，我们必须添加一些可以从外部传入的属性。清单 27-9 展示了\
    \ Alumni 项目中完整的 `LabeledSecretValidate` 复合组件。它是 `LabeledTextValidate` 的兄弟组件，多了一个特定于\
    \ `inputSecret` 的属性 `redisplay`。\n\n###### 清单 27-9 完整的复合组件 InputSecretValidate\n\
