    \ \"{validation.lastname.size}\")\n61     public String getLastName() {\n62       return\
    \ _lastName;\n63     }\n\n65     public void setLastName(String lastName) {\n\
    66       _lastName = lastName;\n67     }\n68     // </editor-fold>\n\n70     //\
    \ <editor-fold defaultstate=\"collapsed\" desc=\"Property Email\">\n71     @Column(name\
    \ = \"email\")\n72     private String _email = \"\";\n\n74     @Size(min = 6,\
    \ max = 100)\n75     public String getEmail() {\n76       return _email;\n77     }\n\
    \n79     public void setEmail(String email) {\n80       _email = email;\n81     }\n\
    82     // </editor-fold>\n83   }\n```\n\nBesides the id, this excerpt shows some—but\
    \ not all—fields that correspond to the appropriate input fields of the UI. The\
    \ names must be from 1–50 characters in length. The email has to follow a special\
    \ pattern, which is enforced by a regular expression (covered later in this chapter).\
    \ The size of the email is restricted to 100 characters.\n\n###### Note\n\nThere\
    \ are stories of impossible registration because the system validated a minimum\
    \ length of 3, but the valid name (as far as I remember, this can occur with some\
    \ African names) was only 1 character long.\n\nJSF automatically invokes bean\
    \ validation. Behind the scenes, there’s a lot to do: JSF must discover whether\
    \ bean validation is used and invoke it if needed. The essence of this invocation\
    \ is shown in Listing [25-2](#A435433_1_En_25_Chapter.xhtml#PC2), a short code\
    \ snippet that demonstrates the principle .\n\n###### Listing 25-2 Programmatic\
    \ Invocation of Bean Validation\n\n```\n1   @Inject private Account _account;\n\
    \n3   Validator validator = Validation.buildDefaultValidatorFactory()\n4                                   .getValidator();\n\
    5   Set<ConstraintViolation<Accountt>> violations =\n6                                        validator.validate(_account);\n\
    ```\n\nThis snippet only shows how to check the violations and assign them to\
    \ a set. What JSF performs behind the scenes is much more than this.\n\nIf JSF\
    \ discovers one or more constraint violations, it will generate the appropriate\
    \ messages and rerender the current page to display them. The data isn’t transferred\
    \ to the model, and whatever should happen when the user clicks the Register button\
    \ won’t be executed.\n\nBean validation offers an option to annotate a customized\
    \ message:\n\n```\n1   @Size(min = 1, max = 50,\n2   message = \"Length of first\
    \ name must be between {min} and {max} characters\")\n```\n\nYou may want to develop\
    \ an international application. By the approach shown here, it’s possible to customize\
    \ the message , but not to localize it. You do that by creating a ValidationMessages.properties\
    \ file and its localized variants (for example, ValidationMessages_de.properties)\
    \ in the default package. In this file, you can override the default values or\
    \ create your own customized messages , including their localized variants.\n\n\
    ### Creating a Customized Message\n\n1.  (Optional) In the project tree, select\
    \ the Other Sources/src/main/resources folder .\n\n2.  To create a properties\
    \ file using NetBeans, choose New File (or press Ctrl+N). The New File dialog\
    \ opens (Figure [25-1](#A435433_1_En_25_Chapter.xhtml#Fig1)).\n\n    ![A435433_1_En_25_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_25_Fig1_HTML.jpg)\n\
    \n    ###### Figure 25-1 New File dialog\n\n3.  In the dialog, choose the category\
    \ Other and then Properties File.\n\n4.  Click Next.\n\n5.  In the Name field,\
    \ enter **ValidationMessages**.\n\n6.  If you did step 1, the folder should be\
    \ prepopulated with src\\main\\resources. Otherwise, enter this value or browse\
    \ to the desired folder.\n\n7.  Click Finish. NetBeans creates the properties\
    \ file for you.\n\n8.  Right-click the properties file and choose Customize. NetBeans\
    \ opens the Customizer dialog, shown in Figure [25-2](#A435433_1_En_25_Chapter.xhtml#Fig2).\n\
    \n    ![A435433_1_En_25_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_25_Fig2_HTML.jpg)\n\
    \n    ###### Figure 25-2 Customizer dialog\n\n9.  Add locale(s) of your choice.\n\
    \n10.  Right-click any of these new files and choose Open (not Edit). NetBeans\
    \ opens the properties editor with all locales.\n\n11.  Click New Property .\n\
    \n12.  For Key, enter **javax.validation.constraints.Size.message**.\n\n13.  For\
    \ Value, enter your customized message. For example, **The length must be between\
    \ {min} and {max} characters**.\n\n14.  Run the app and enter a name that’s either\
    \ too short or too long. JSF displays the customized message.\n\n### Details of\
    \ Customized Messages\n\nSo, how can you determine that magic key? And how do\
    \ you create other customized messages for the same constraint (on other fields\
    \ or getters)? You’ll find the answer in this book—or by browsing the Java source\
    \ code. Using NetBeans, place the cursor on the @Size annotation and invoke press\
    \ Ctrl+B (Ctrl+Enter if you’re using Eclipse). This is a shortcut for Go To Declaration.\
    \ NetBeans opens Size.java in its editor, shown in Listing [25-3](#A435433_1_En_25_Chapter.xhtml#PC4).\n\
    \n###### Listing 25-3 Size.java (Excerpt)\n\n```\n 1   [...]\n 2   public @interface\
    \ Size {\n 3    [...]\n 4     public String message()\n 5                   default\
    \ \"{javax.validation.constraints.Size.message}\";\n\n 7     public int min()\
    \ default 0;\n\n 9     public int max() default 2147483647;\n10    [...]\n11   }\n\
    ```\n\nHere you’ll find the declaration of message with a default value. Look\
    \ at the properties min and max. Both are public and may be referenced in the\
    \ value of the message if placed in the message within curly braces.\n\nWith that\
    \ knowledge, we can create different keys at different locations. See Listing\
    \ [25-4](#A435433_1_En_25_Chapter.xhtml#PC5)."
  trans: "\n###### 清单 25-1 注册的数据模型\n\n```\n01   @Entity\n02   @Table(name = \"Account\"\
    )\n03   public class Account implements Serializable {\n\n05     // <editor-fold\
    \ defaultstate=\"collapsed\" desc=\"Property Id\">\n06     @Id\n07     @Column(name\
    \ = \"id\")\n08     private byte[] _id = UuidUtil.toBytes(UUID.randomUUID());\n\
    \n10     public String getId() {\n11       return HashUtils.byte2hex(_id);\n12     }\n\
    13     // </editor-fold>\n\n15     // <editor-fold defaultstate=\"collapsed\"\
    \ desc=\"Property Status\">\n16     @Column(name = \"status\")\n17     private\
    \ AccountStatus _status = AccountStatus.New;\n\n19     public AccountStatus getStatus()\
    \ {\n20       return _status;\n21     }\n\n23     public void setStatus(AccountStatus\
    \ status) {                                                                  \
    \                                                                            \
    \        \n24       _status = status;\n25     }\n26     // </editor-fold>\n\n\
    28     // <editor-fold defaultstate=\"collapsed\" desc=\"Property LoginName\"\
    >\n29     @Column(name = \"loginName\")\n30     private String _loginName;\n\n\
    32     @Size(min = 1, max = 50)\n33     public String getLoginName() {\n34       return\
    \ _loginName;\n35     }\n\n37     public void setLoginName(String loginName) {\n\
    38       _loginName = loginName;\n39     }\n40     // </editor-fold>\n\n42     //\
    \ <editor-fold defaultstate=\"collapsed\" desc=\"Property FirstName\">\n43     @Column(name\
    \ = \"firstName\")\n44     private String _firstName = \"\";\n\n46     @Size(min\
    \ = 1, max = 50)\n47     public String getFirstName() {\n48       return _firstName;\n\
    49     }\n\n51     public void setFirstName(String firstName) {              \
    \                                                                            \
    \                                                            \n52       _firstName\
    \ = firstName;\n53     }\n54     // </editor-fold>\n\n56     // <editor-fold defaultstate=\"\
    collapsed\" desc=\"Property LastName\">\n57     @Column(name = \"lastName\")\n\
    58     private String _lastName;\n\n60     @Size(min = 1, max = 50, message =\
    \ \"{validation.lastname.size}\")\n61     public String getLastName() {\n62       return\
    \ _lastName;\n63     }\n\n65     public void setLastName(String lastName) {\n\
    66       _lastName = lastName;\n67     }\n68     // </editor-fold>\n\n70     //\
    \ <editor-fold defaultstate=\"collapsed\" desc=\"Property Email\">\n71     @Column(name\
    \ = \"email\")\n72     private String _email = \"\";\n\n74     @Size(min = 6,\
    \ max = 100)\n75     public String getEmail() {\n76       return _email;\n77     }\n\
    \n79     public void setEmail(String email) {\n80       _email = email;\n81     }\n\
    82     // </editor-fold>\n83   }\n```\n\n除了 id 之外，此代码片段还展示了一些（但并非全部）与 UI 相应输入字段对应的字段。名称长度必须在\
    \ 1 到 50 个字符之间。电子邮件必须遵循一种特殊模式，该模式通过正则表达式强制执行（本章后面会介绍）。电子邮件的长度限制为 100 个字符。\n\n\
    ###### 注意\n\n有些注册无法完成的故事，是因为系统验证了最小长度为 3，但有效名称（据我所知，某些非洲名字可能会出现这种情况）只有 1 个字符长。\n\
    \nJSF 会自动调用 Bean 验证。在幕后，有很多工作要做：JSF 必须发现是否使用了 Bean 验证，并在需要时调用它。此调用的本质如清单 25-2\
    \ 所示，这是一个演示原理的简短代码片段。\n\n###### 清单 25-2 Bean 验证的程序化调用\n\n```\n1   @Inject private\
    \ Account _account;\n\n3   Validator validator = Validation.buildDefaultValidatorFactory()\n\
    4                                   .getValidator();\n5   Set<ConstraintViolation<Accountt>>\
    \ violations =\n6                                        validator.validate(_account);\n\
    ```\n\n此代码片段仅展示了如何检查违规并将其分配给一个集合。JSF 在幕后执行的操作远不止这些。\n\n如果 JSF 发现一个或多个约束违规，它将生成相应的消息并重新渲染当前页面以显示它们。数据不会传输到模型，并且用户单击“注册”按钮时应发生的任何操作都不会执行。\n\
    \nBean 验证提供了一种注释自定义消息的选项：\n\n```\n1   @Size(min = 1, max = 50,\n2   message =\
    \ \"名字长度必须在 {min} 到 {max} 个字符之间\")\n```\n\n您可能想要开发一个国际化应用程序。通过此处展示的方法，可以自定义消息，但无法进行本地化。您可以通过在默认包中创建\
    \ `ValidationMessages.properties` 文件及其本地化变体（例如 `ValidationMessages_de.properties`）来实现本地化。在此文件中，您可以覆盖默认值或创建自己的自定义消息，包括其本地化变体。\n\
    \n### 创建自定义消息\n\n1.  （可选）在项目树中，选择 **Other Sources/src/main/resources** 文件夹。\n\n\
    2.  要使用 NetBeans 创建属性文件，请选择“新建文件”（或按 Ctrl+N）。此时将打开“新建文件”对话框（图 25-1）。\n\n    ![A435433_1_En_25_Fig1_HTML.jpg](img/A435433_1_En_25_Fig1_HTML.jpg)\n\
    \n    ###### 图 25-1 新建文件对话框\n\n3.  在对话框中，选择类别 **Other**，然后选择 **Properties File**。\n\
    \n4.  单击“下一步”。\n\n5.  在“名称”字段中，输入 **ValidationMessages**。\n\n6.  如果您执行了步骤 1，则文件夹应预先填充为\
    \ `src\\main\\resources`。否则，请输入此值或浏览到所需文件夹。\n\n7.  单击“完成”。NetBeans 会为您创建属性文件。\n\
    \n8.  右键单击属性文件并选择“自定义”。NetBeans 将打开“自定义器”对话框，如图 25-2 所示。\n\n    ![A435433_1_En_25_Fig2_HTML.jpg](img/A435433_1_En_25_Fig2_HTML.jpg)\n\
    \n    ###### 图 25-2 自定义器对话框\n\n9.  添加您选择的区域设置。\n\n10. 右键单击这些新文件中的任何一个，然后选择“打开”（不要选择“编辑”）。NetBeans\
    \ 会打开包含所有区域设置的属性编辑器。\n\n11. 单击“新建属性”。\n\n12. 对于“键”，输入 **javax.validation.constraints.Size.message**。\n\
    \n13. 对于“值”，输入您的自定义消息。例如，**长度必须在 {min} 到 {max} 个字符之间**。\n\n14. 运行应用程序并输入一个过短或过长的名称。JSF\
    \ 将显示自定义消息。\n\n### 自定义消息的详细信息\n\n那么，如何确定那个神奇的键呢？以及如何为同一约束（在其他字段或 getter 上）创建其他自定义消息？您可以在本书中找到答案——或者通过浏览\
    \ Java 源代码。使用 NetBeans，将光标放在 `@Size` 注解上，然后按 Ctrl+B（如果使用 Eclipse，则按 Ctrl+Enter）。这是“转到声明”的快捷键。NetBeans\
    \ 会在其编辑器中打开 `Size.java`，如清单 25-3 所示。\n\n###### 清单 25-3 Size.java（摘录）\n\n```\n\
     1   [...]\n 2   public @interface Size {\n 3    [...]\n 4     public String message()\n\
     5                   default \"{javax.validation.constraints.Size.message}\";\n\
    \n 7     public int min() default 0;\n\n 9     public int max() default 2147483647;\n\
    10    [...]\n11   }\n```\n\n在这里，您将找到带有默认值的 `message` 声明。查看属性 `min` 和 `max`。两者都是公共的，如果放在消息的花括号内，则可以在消息的值中引用它们。\n\
    \n有了这些知识，我们可以在不同位置创建不同的键。请参见清单 25-4。\n"
- fmt: "###### Listing 25-4 Customized Message with Customized Key\n\n```\n1   @Size(min\
    \ = 3, max = 50, message = \"{validation.lastname.size}\")\n2   public String\
    \ getLastName() {\n3     return _lastName;\n4   }\n```\n\nWatch out for the curly\
    \ braces, which indicate the key. Without them, the message would be treated as\
    \ plain text. The curly braces are not part of the key. In `ValidationMessages.properties`,\
    \ we now can add the key `validation.lastname.size` and a value like this:\n\n\
    ```\nThe length of LastName must be between {min} and {max} characters.\n```\n\
    \n### Null Handling\n\nBean validation offers two constraints to handle null (`@Null`)\
    \ or non-null (`@NotNull`) values. Before conversion, all UI input is treated\
    \ as strings by JSF. Thus, an empty input field is an empty string, which is something\
    \ else than `null`. You may instruct JSF to treat empty strings as `null` in the\
    \ `web.xml` file. See Listing [25-5](#A435433_1_En_25_Chapter.xhtml#PC7).\n\n\
    ###### Listing 25-5 Context Parameter to Treat Empty Input as null\n\n```\n1 \
    \  <context-param>\n2     <param-name>\n3       javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\n\
    4     </param-name>\n5     <param-value>true</param-value>\n6   </context-param>\n\
    ```\n\nBecause it’s always good to avoid `null`s, I recommend not using this option.\
    \ If an empty input isn’t allowed, define a minimum length or set the attribute\
    \ `required` to `true`. See Listing [25-6](#A435433_1_En_25_Chapter.xhtml#PC8).\n\
    \n###### Listing 25-6 required Attribute (Including Customized Message)\n\n```\n\
    1   <h:inputText id=\"lastName\"\n2                value=\"#{register.accountRequest.lastName}\"\
    \n3                required=\"true\"\n4                requiredMessage=\"#{msg.msgValueRequired}\"\
    \n5                styleClass=\"inputFull\">\n```\n\n## Validation Method\n\n\
    The validation method is one of JSF’s own validation features. By defining the\
    \ Facelets (JSF page), it’s possible to add the attribute `validator`, which takes\
    \ the name of a method to validate the input, as in Listing [25-7](#A435433_1_En_25_Chapter.xhtml#PC9).\n\
    \n###### Listing 25-7 Add validator to Markup\n\n```\n1   <h:inputText id=\"email\"\
    \n2                value=\"#{register.accountRequest.email}\"\n3             \
    \   required=\"true\"\n4                requiredMessage=\"#{msg.msgValueRequired}\"\
    \n5                validator=\"#{register.checkEmail}\"\n6                styleClass=\"\
    inputFull\">\n```\n\nIn line 5, the method `checkEmail` of the `Register` bean\
    \ is called. Three parameters are passed to this method: The `FacesContext`, the\
    \ `UIComponent`, and the converted value as `Object`, which you have to cast to\
    \ the appropriate type. See Listing [25-8](#A435433_1_En_25_Chapter.xhtml#PC10).\n\
    \n###### Listing 25-8 validator Method to Check the Email\n\n```\n 1   public\
    \ void checkEmail(FacesContext context,\n 2                          UIComponent\
    \ component,\n 3                          Object value) {\n 4     String address\
    \ = (String) value;\n 5     if (!address.matches(\n 6        \"(\\\\w[a-zA-Z_0-9+-.]*\\\
    \\w|\\\\w+)@(\\\\w(\\\\w|-|\\\\.)*\\\\w|\\\\w+)\\\\.[a-zA-Z]+\"))\\\n 7     {\n\
    \ 8        String msg = Helper.getMessage(\"errEmail\");\n 9        throw new\
    \ ValidatorException(new FacesMessage(msg));\n10     }\n11   }\n```\n\nIn the\
    \ case of a converting problem, the validator method throws a `ValidatorException`,\
    \ which takes a message of your choice. JSF will collect all messages (there may\
    \ be exceptions from other components) and display them while rerendering the\
    \ page, if you’ve defined appropriate message tags within the page. If you missed\
    \ such a message tag, JSF will display all messages when you define the development\
    \ stage in the `web.xml` file (see Chapter [6](#A435433_1_En_6_Chapter.xhtml)).\n\
    \n## Validator\n\nBesides specifying a validation method, you may declare a validator\
    \ with a special tag. Such a validator has to be inserted into the desired component,\
    \ as in Listing [25-9](#A435433_1_En_25_Chapter.xhtml#PC11).\n\n###### Listing\
    \ 25-9 validateLength\n\n```\n1   <h:inputText id=\"lastName\"\n2            \
    \    value=\"#{register.accountRequest.lastName}\"\n3                styleClass=\"\
    inputFull\">\n4     <f:validateLength minimum=\"3\" maximum=\"50\"/>\n5   </h:inputText>\n\
    ```\n\nListing [25-9](#A435433_1_En_25_Chapter.xhtml#PC11) demonstrates this in\
    \ line 4. `validateLength` is a predefined validator that performs the same validation\
    \ that we did before using bean validation with the `@Size` constraint.\n\nIf\
    \ you want to override or localize the messages, you can put the desired keys\
    \ into your `messages.properties` file. For the length validator, the key is `javax.faces.Length`.\n\
    \nJSF comes with a couple of predefined validators. For a list, see the JSF core\
    \ library section in Appendix C. You can also define your own validators. Your\
    \ validator needs to implement `Validator` and override the `validate` method.\
    \ It will be registered by a `@FacesValidator` annotation, as shown in Listing\
    \ [25-10](#A435433_1_En_25_Chapter.xhtml#PC12). I assume the remaining part of\
    \ that class is really self-explanatory. Listing [25-11](#A435433_1_En_25_Chapter.xhtml#PC13)\
    \ demonstrates the usage of our validator (line 4).\n\n###### Listing 25-10 Custom\
    \ validator\n\n```\n 1   @FacesValidator(value = \"EmailValidator\")\n 2   public\
    \ class EmailValidator implements Validator {\n\n 4     @Override\n 5     public\
    \ void validate(FacesContext context, UIComponent component,\n 6             \
    \             Object value) throws ValidatorException {\n 7       if (value ==\
    \ null) {\n 8         return;\n 9       }\n10       if (!isValidEmail(\"\" + value))\
    \ {                                                                \n11      \
    \   String msg = Helper.getMessage(\"msgNoEmail\");\n12         throw new ValidatorException(new\
    \ FacesMessage(msg));\n13       }\n14     }\n\n16     public static boolean isValidEmail(String\
    \ address) {\n17       return address.matches(\n18          \"(\\\\w+|\\\\w(\\\
    \\w|[+-.])*\\\\w)@(\\\\w+|\\\\w(\\\\w|[-.])*\\\\w)\\\\.[a-zA-Z]+\");\n19     }\n\
    20   }\n```\n\n###### Listing 25-11 Usage of Custom Validator\n\n```\n1   <h:inputText\
    \ id=\"email\"\n2                value=\"#{register.accountRequest.email}\"\n\
    3                styleClass=\"inputFull\">\n4     <f:validator validatorId=\"\
    EmailValidator\"/>\n5   </h:inputText> \n```\n\n## Multi-Component Validation\n\
    \nOn the registration page, a password is queried from the user. To prevent a\
    \ typo, the user has to reenter the password a second time. The validator needs\
    \ to check the second input against the first one. This is a kind of *multi-component*\
    \ validation.\n\nJSF 2.3 introduced a multi-component validation. It’s not a special\
    \ JSF validation feature but is built on standard bean validation.\n\nUsually\
    \ every field must be validated before it’s transferred to the data model. To\
    \ perform the multi-component validation, we may need access to the value of another\
    \ field of the model. But this field also will be transferred into the model only\
    \ if it could be validated before. In other words, we need a validation to transfer\
    \ a field into the model and we need the value inside the model to perform the\
    \ validation. A kind of deadlock.\n\nJSF uses a simple trick: the data model is\
    \ temporarily copied, and this copy receives the new values before the validation\
    \ takes place. If the copy could be validated, then the values are pushed to the\
    \ data model.\n\nMulti-component validation needs to be configured within `web.xml`,\
    \ as shown in Listing [25-12](#A435433_1_En_25_Chapter.xhtml#PC14)."
  raw: "###### Listing 25-4 Customized Message with Customized Key\n\n```\n1   @Size(min\
    \ = 3, max = 50, message = \"{validation.lastname.size}\")\n2   public String\
    \ getLastName() {\n3     return _lastName;\n4   }\n```\n\nWatch out for the curly\
    \ braces, which indicate the key. Without them, the message would be treated as\
    \ plain text. The curly braces are not part of the key. In ValidationMessages.properties,\
    \ we now can add the key validation.lastname.size and a value like this:\n\n```\n\
    The length of LastName must be between {min} and {max} characters.\n```\n\n###\
    \ Null Handling\n\nBean validation offers two constraints to handle null (@Null)\
    \ or non-null (@NotNull) values. Before conversion, all UI input is treated as\
    \ strings by JSF. Thus, an empty input field is an empty string , which is something\
    \ else than null. You may instruct JSF to treat empty strings as null in the web.xml\
    \ file. See Listing [25-5](#A435433_1_En_25_Chapter.xhtml#PC7).\n\n###### Listing\
    \ 25-5 Context Parameter to Treat Empty Input as null\n\n```\n1   <context-param>\n\
    2     <param-name>\n3       javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\n\
    4     </param-name>\n5     <param-value>true</param-value>\n6   </context-param>\n\
    ```\n\nBecause it’s always good to avoid nulls, I recommend not using this option.\
    \ If an empty input isn’t allowed, define a minimum length or set the attribute\
    \ required to true. See Listing [25-6](#A435433_1_En_25_Chapter.xhtml#PC8).\n\n\
    ###### Listing 25-6 required Attribute (Including Customized Message)\n\n```\n\
    1   <h:inputText id=\"lastName\"\n2                value=\"#{register.accountRequest.lastName}\"\
    \n3                required=\"true\"\n4                requiredMessage=\"#{msg.msgValueRequired}\"\
    \n5                styleClass=\"inputFull\">\n```\n\n## Validation Method\n\n\
    The validation method is one of JSF’s own validation features. By defining the\
    \ Facelets (JSF page), it’s possible to add the attribute validator, which takes\
    \ the name of a method to validate the input, as in Listing [25-7](#A435433_1_En_25_Chapter.xhtml#PC9).\n\
    \n###### Listing 25-7 Add validator to Markup\n\n```\n1   <h:inputText id=\"email\"\
    \n2                value=\"#{register.accountRequest.email}\"\n3                required=\"\
    true\"\n4                requiredMessage=\"#{msg.msgValueRequired}\"\n5                validator=\"\
    #{register.checkEmail}\"\n6                styleClass=\"inputFull\">\n```\n\n\
    In line 5, the method checkEmail of the Register bean is called. Three parameters\
    \ are passed to this method: The FacesContext, the Uicomponent, and the converted\
    \ value as object, which you have to cast to the appropriate type . See Listing\
    \ [25-8](#A435433_1_En_25_Chapter.xhtml#PC10).\n\n###### Listing 25-8 validator\
    \ Method to Check the Email\n\n```\n 1   public void checkEmail(FacesContext context,\n\
     2                          UIComponent component,\n 3                          Object\
    \ value) {\n 4     String address = (String) value;\n 5     if (!address.matches(\n\
     6        \"(\\\\w[a-zA-Z_0-9+-.]*\\\\w|\\\\w+)@(\\\\w(\\\\w|-|\\\\.)*\\\\w|\\\
    \\w+)\\\\.[a-zA-Z]+\"))\\\n 7     {\n 8        String msg = Helper.getMessage(\"\
    errEmail\");\n 9        throw new ValidatorException(new FacesMessage(msg));\n\
    10     }\n11   }\n```\n\nIn the case of a converting problem, the validator method\
    \ throws a ValidatorException, which takes a message of your choice. JSF will\
    \ collect all messages (there may be exceptions from other components) and display\
    \ them while rerendering the page, if you’ve defined appropriate message tags\
    \ within the page. If you missed such a message tag, JSF will display all messages\
    \ when you define the development stage in the web.xml file (see Chapter [6](#A435433_1_En_6_Chapter.xhtml)).\n\
    \n## Validator\n\nBesides specifying a validation method , you may declare a validator\
    \ with a special tag. Such a validator has to be inserted into the desired component,\
    \ as in Listing [25-9](#A435433_1_En_25_Chapter.xhtml#PC11).\n\n###### Listing\
    \ 25-9 validateLength\n\n```\n1   <h:inputText id=\"lastName\"\n2                value=\"\
    #{register.accountRequest.lastName}\"\n3                styleClass=\"inputFull\"\
    >\n4     <f:validateLength minimum=\"3\" maximum=\"50\"/>\n5   </h:inputText>\n\
    ```\n\nListing [25-9](#A435433_1_En_25_Chapter.xhtml#PC11) demonstrates this in\
    \ line 4\\. validateLength is a predefined validator that performs the same validation\
    \ that we did before using bean validation with the @Size constraint.\n\nIf you\
    \ want to override or localize the messages , you can put the desired keys into\
    \ your messages.properties file. For the length validator, the key is javax.faces.Length.\n\
    \nJSF comes with a couple of predefined validators. For a list, see the JSF core\
    \ library section in Appendix C. You can also define your own validators. Your\
    \ validator needs to implement Validator and override the validate method. It\
    \ will be registered by a @FacesValidator annotation, as shown in Listing [25-10](#A435433_1_En_25_Chapter.xhtml#PC12).\
    \ I assume the remaining part of that class is really self-explanatory. Listing\
    \ [25-11](#A435433_1_En_25_Chapter.xhtml#PC13) demonstrates the usage of our validator\
    \ (line 4).\n\n###### Listing 25-10 Custom validator\n\n```\n 1   @FacesValidator(value\
    \ = \"EmailValidator\")\n 2   public class EmailValidator implements Validator\
    \ {\n\n 4     @Override\n 5     public void validate(FacesContext context, UIComponent\
    \ component,\n 6                          Object value) throws ValidatorException\
    \ {\n 7       if (value == null) {\n 8         return;\n 9       }\n10       if\
    \ (!isValidEmail(\"\" + value)) {                                            \
    \                    \n11         String msg = Helper.getMessage(\"msgNoEmail\"\
    );\n12         throw new ValidatorException(new FacesMessage(msg));\n13       }\n\
    14     }\n\n16     public static boolean isValidEmail(String address) {\n17       return\
    \ address.matches(\n18          \"(\\\\w+|\\\\w(\\\\w|[+-.])*\\\\w)@(\\\\w+|\\\
    \\w(\\\\w|[-.])*\\\\w)\\\\.[a-zA-Z]+\");\n19     }\n20   }\n```\n\n###### Listing\
    \ 25-11 Usage of Custom Validator\n\n```\n1   <h:inputText id=\"email\"\n2                value=\"\
    #{register.accountRequest.email}\"\n3                styleClass=\"inputFull\"\
    >\n4     <f:validator validatorId=\"EmailValidator\"/>\n5   </h:inputText> \n\
    ```\n\n## Multi-Component Validation\n\nOn the registration page , a password\
    \ is queried from the user. To prevent a typo, the user has to reenter the password\
    \ a second time. The validator needs to check the second input against the first\
    \ one. This is a kind of *multi-component* validation.\n\nJSF 2.3 introduced a\
    \ multi-component validation. It’s not a special JSF validation feature but is\
    \ built on standard bean validation.\n\nUsually every field must be validated\
    \ before it’s transferred to the data model. To perform the multi-component validation,\
    \ we may need access to the value of another field of the model. But this field\
    \ also will be transferred into the model only if it could be validated before.\
    \ In other words, we need a validation to transfer a field into the model and\
    \ we need the value inside the model to perform the validation. A kind of deadlock.\n\
    \nJSF uses a simple trick: the data model is temporarily copied, and this copy\
    \ receives the new values before the validation takes place. If the copy could\
    \ be validated, then the values are pushed to the data model.\n\nMulti-component\
    \ validation needs to be configured within web.xml, as shown in Listing [25-12](#A435433_1_En_25_Chapter.xhtml#PC14)."
  trans: "\n###### 清单 25-4 使用自定义键的自定义消息\n\n```\n1   @Size(min = 3, max = 50, message\
    \ = \"{validation.lastname.size}\")\n2   public String getLastName() {\n3    \
    \ return _lastName;\n4   }\n```\n\n注意花括号，它们表示键。如果没有花括号，消息将被视为纯文本。花括号本身不是键的一部分。现在，在\
    \ `ValidationMessages.properties` 文件中，我们可以添加键 `validation.lastname.size` 和如下所示的值：\n\
    \n```\nThe length of LastName must be between {min} and {max} characters.\n```\n\
    \n### 空值处理\n\nBean 验证提供了两个约束来处理空值（`@Null`）或非空值（`@NotNull`）。在转换之前，所有 UI 输入在 JSF\
    \ 中都被视为字符串。因此，空的输入字段是一个空字符串，这与 null 不同。你可以指示 JSF 在 `web.xml` 文件中将空字符串视为 null。参见清单\
    \ 25-5。\n\n###### 清单 25-5 将空输入视为 null 的上下文参数\n\n```\n1   <context-param>\n2  \
    \   <param-name>\n3       javax.faces.INTERPRET_EMPTY_STRING_SUBMITTED_VALUES_AS_NULL\n\
    4     </param-name>\n5     <param-value>true</param-value>\n6   </context-param>\n\
    ```\n\n由于避免 null 总是好的，我建议不要使用此选项。如果不允许空输入，请定义最小长度或将 `required` 属性设置为 `true`。参见清单\
    \ 25-6。\n\n###### 清单 25-6 required 属性（包含自定义消息）\n\n```\n1   <h:inputText id=\"\
    lastName\"\n2                value=\"#{register.accountRequest.lastName}\"\n3\
    \                required=\"true\"\n4                requiredMessage=\"#{msg.msgValueRequired}\"\
    \n5                styleClass=\"inputFull\">\n```\n\n## 验证方法\n\n验证方法是 JSF 自身的验证特性之一。通过定义\
    \ Facelets（JSF 页面），可以添加 `validator` 属性，该属性接受一个用于验证输入的方法名称，如清单 25-7 所示。\n\n######\
    \ 清单 25-7 向标记添加验证器\n\n```\n1   <h:inputText id=\"email\"\n2                value=\"\
    #{register.accountRequest.email}\"\n3                required=\"true\"\n4    \
    \            requiredMessage=\"#{msg.msgValueRequired}\"\n5                validator=\"\
    #{register.checkEmail}\"\n6                styleClass=\"inputFull\">\n```\n\n\
    在第 5 行，调用了 `Register` bean 的 `checkEmail` 方法。该方法接收三个参数：`FacesContext`、`UIComponent`\
    \ 以及转换后的值（作为对象），你需要将其转换为适当的类型。参见清单 25-8。\n\n###### 清单 25-8 用于检查电子邮件的验证器方法\n\n\
    ```\n 1   public void checkEmail(FacesContext context,\n 2                   \
    \       UIComponent component,\n 3                          Object value) {\n\
    \ 4     String address = (String) value;\n 5     if (!address.matches(\n 6   \
    \     \"(\\\\w[a-zA-Z_0-9+-.]*\\\\w|\\\\w+)@(\\\\w(\\\\w|-|\\\\.)*\\\\w|\\\\w+)\\\
    \\.[a-zA-Z]+\"))\\\n 7     {\n 8        String msg = Helper.getMessage(\"errEmail\"\
    );\n 9        throw new ValidatorException(new FacesMessage(msg));\n10     }\n\
    11   }\n```\n\n在转换问题的情况下，验证器方法会抛出一个 `ValidatorException`，该异常接收你选择的消息。如果你在页面中定义了适当的消息标签，JSF\
    \ 将收集所有消息（可能来自其他组件的异常）并在重新渲染页面时显示它们。如果你遗漏了这样的消息标签，JSF 将在你在 `web.xml` 文件中定义开发阶段时显示所有消息（参见第\
    \ 6 章）。\n\n## 验证器\n\n除了指定验证方法之外，你还可以使用特殊标签声明一个验证器。这样的验证器必须插入到所需的组件中，如清单 25-9 所示。\n\
    \n###### 清单 25-9 validateLength\n\n```\n1   <h:inputText id=\"lastName\"\n2  \
    \              value=\"#{register.accountRequest.lastName}\"\n3              \
    \  styleClass=\"inputFull\">\n4     <f:validateLength minimum=\"3\" maximum=\"\
    50\"/>\n5   </h:inputText>\n```\n\n清单 25-9 在第 4 行演示了这一点。`validateLength` 是一个预定义的验证器，它执行与我们之前使用\
    \ `@Size` 约束进行 Bean 验证相同的验证。\n\n如果你想覆盖或本地化消息，可以将所需的键放入你的 `messages.properties`\
    \ 文件中。对于长度验证器，键是 `javax.faces.Length`。\n\nJSF 附带了一些预定义的验证器。有关列表，请参见附录 C 中的 JSF\
    \ 核心库部分。你也可以定义自己的验证器。你的验证器需要实现 `Validator` 并重写 `validate` 方法。它将通过 `@FacesValidator`\
    \ 注解进行注册，如清单 25-10 所示。我认为该类的其余部分是不言自明的。清单 25-11 演示了我们验证器的用法（第 4 行）。\n\n######\
    \ 清单 25-10 自定义验证器\n\n```\n 1   @FacesValidator(value = \"EmailValidator\")\n 2\
    \   public class EmailValidator implements Validator {\n\n 4     @Override\n 5\
    \     public void validate(FacesContext context, UIComponent component,\n 6  \
    \                        Object value) throws ValidatorException {\n 7       if\
    \ (value == null) {\n 8         return;\n 9       }\n10       if (!isValidEmail(\"\
    \" + value)) {                                                               \
    \ \n11         String msg = Helper.getMessage(\"msgNoEmail\");\n12         throw\
    \ new ValidatorException(new FacesMessage(msg));\n13       }\n14     }\n\n16 \
    \    public static boolean isValidEmail(String address) {\n17       return address.matches(\n\
    18          \"(\\\\w+|\\\\w(\\\\w|[+-.])*\\\\w)@(\\\\w+|\\\\w(\\\\w|[-.])*\\\\\
    w)\\\\.[a-zA-Z]+\");\n19     }\n20   }\n```\n\n###### 清单 25-11 自定义验证器的使用\n\n```\n\
    1   <h:inputText id=\"email\"\n2                value=\"#{register.accountRequest.email}\"\
    \n3                styleClass=\"inputFull\">\n4     <f:validator validatorId=\"\
    EmailValidator\"/>\n5   </h:inputText> \n```\n\n## 多组件验证\n\n在注册页面上，会向用户询问密码。为了防止输入错误，用户需要再次输入密码。验证器需要将第二次输入与第一次输入进行核对。这是一种*多组件*验证。\n\
    \nJSF 2.3 引入了多组件验证。这不是一个特殊的 JSF 验证特性，而是建立在标准 Bean 验证之上。\n\n通常，每个字段在传输到数据模型之前都必须经过验证。为了执行多组件验证，我们可能需要访问模型另一个字段的值。但该字段也只有在其之前能够通过验证时才会被传输到模型中。换句话说，我们需要一个验证来将字段传输到模型中，同时我们需要模型中的值来执行验证。这形成了一种死锁。\n\
    \nJSF 使用了一个简单的技巧：数据模型被临时复制，并且这个副本在验证发生之前接收新值。如果副本能够通过验证，那么这些值就会被推送到数据模型中。\n\n\
    多组件验证需要在 `web.xml` 中进行配置，如清单 25-12 所示。\n"
- fmt: '###### Listing 25-12 Context Parameter within `web.xml` to Enable Multi-Component
    Validation


    ```

    01  <context-param>

    02    <param-name>javax.faces.validator.ENABLE_VALIDATE_WHOLE_BEAN</param-name>

    03    <param-value>true</param-value>

    04  </context-param>

    ```


    We need to define different validation groups within our data model—for example,
    `entity`. JSF allows definition of different validation groups in the `validateBean`
    tag. Suppose we want the user to repeat his email. In the page representation,
    we define two fields, belonging both to the default validation group and to a
    special validation group for the multi-component validation. Here, this special
    group is `de.muellerbruehl.demo.RepeatedEntryConstraint`. You may declare any
    interface you like to use as the group name.


    Assigning an input field to multiple validation groups isn’t a new feature. But
    JSF 2.3 introduced the new tag `validateWholeBean`, which must be placed after
    all the input fields. This is where the new action takes place—see lines 23–25
    in Listing [25-13](#A435433_1_En_25_Chapter.xhtml#PC15)).


    ###### Listing 25-13 Example of Repeated Input (Must be Placed in an `h:form`)


    ```

     1 <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2 <!DOCTYPE html>

     3 <html xmlns:="http://www.w3.org/1999/xhtml"

     4       xmlns:h="http://xmlns.jcp.org/jsf/html"

     5       xmlns:f="http://xmlns.jcp.org/jsf/core">

     6   <h:body>

     7     <h:form>


     9       <div>

    10         <h:outputLabel value="Enter email"/>

    11         <h:inputText id="email1" value="#{emailBean.email1}"/>

    12         <h:message id="msgEmail1" for="email1"/>

    13       </div>


    15       <div>

    16         <h:outputLabel value="Repeat email"/>

    17         <h:inputText id="email2" value="#{emailBean.email2}"/>

    18         <h:message for="emailValidator"/>

    19       </div>


    21       <h:commandButton value="check" actionListener="null"/>


    23       <f:validateWholeBean value="#{emailBean}"

    24                            validationGroups="de.muellerbruehl.demo.RepeatedEntryConstraint"

    25                            id="emailValidator"/>


    27     </h:form>    

    28   </h:body>

    29 </html>

    ```


    The preceding listing creates a form with two input fields labeled “Enter email”
    and “Repeat email.” The first one contains an `h:message`, which is assigned directly
    to it, whereas the message tag that’s placed nearby the second input field is
    assigned for the `validateWholeBean` tag. This validator will validate both input
    fields. If they differ, a “Both input fields must match” message will be displayed
    just after the second input. The validation will be performed when the user clicks
    the check button (line 21). This button performs no special action—the only purpose
    of this form is to show how multi-field validation works.


    In this example, we check whether an email is entered the same twice. We might
    also check a password repetition. To create a more generic validator, we don’t
    create an `EmailValidator` but a `RepeatedEntryValidator`. This validator will
    receive a copy of our data model—here, an instance of the class `EmailBean` (line
    23). With the generalization in mind, the validator will accept an interface `RepeatedValueHolder`.
    The duty of this interface is to provide the two input fields. See Listing [25-14](#A435433_1_En_25_Chapter.xhtml#PC16).


    ###### Listing 25-14 Interface `RepeatedValueHolder`


    ```

     1 public interface RepeatedEntryHolder {


     3   String getValue1();


     5   String getValue2();

     6 }

    ```


    The validator needs to implement a `ConstraintValidator`, which takes two arguments
    (Listing [25-15](#A435433_1_En_25_Chapter.xhtml#PC17), line 2): our constraint
    definition and our value holder.


    ###### Listing 25-15 Validator


    ```

     1 public class RepeatedEntryValidator

     2         implements ConstraintValidator<RepeatedEntryConstraint, RepeatedEntryHolder>
    {


     4   @Override

     5   public void initialize(RepeatedEntryConstraint constraintAnnotation) {

     6   }


     8   @Override

     9   public boolean isValid(RepeatedEntryHolder other,

    10           ConstraintValidatorContext context) {

    11     return other.getValue1().equals(other.getValue2());

    12   }


    14 }

    ```


