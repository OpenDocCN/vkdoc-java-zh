    # 10. 图书应用简介


    迈克尔·穆勒¹


    (1)德国北莱茵-威斯特法伦州布吕尔


    Books 是一款用于帮助管理和列出书评的应用。本章涵盖以下内容：


    *   JSF 模板化


    *   在 Web 应用中使用 CSS


    *   使用 Java 持久化 API (JPA) 持久化数据


    *   使用上下文和依赖注入 (CDI) 注入 Bean


    *   处理列表和表格


    *   处理文本资源


    *   国际化与本地化


    *   语言切换器


    *   验证


    ## 图书需求


    Books 应用旨在向用户展示由某位作者撰写的书评概览。对于每本书，可以链接外部或在本应用中发布的评论。这些链接可能指向外部在线资源（例如其他网站），或者只是指向评论所发表的印刷媒介的相关信息。用户可以按类别列出图书并进行搜索。需求相当多，可以整理成小型用户故事：


    *   作为评论作者，我希望输入图书信息

    *   作为评论作者，我希望输入评论

    *   作为评论作者，我希望维护类别等基础数据

    *   作为用户，我希望阅读图书信息和评论

    *   作为用户，我希望按标题、作者和 ISBN 搜索图书

    *   作为用户，我希望按类别列出图书

    *   作为用户，我希望检索并从所有图书和所有评论的列表中进行选择

    *   作为用户，我希望选择我偏好的语言（如果可用）


    所有面向用户的功能都使用相同的外观风格——也就是说，无论当前显示的是图书还是评论，导航栏都保持在相同位置。管理后台的外观风格则有所不同，以区分不同的领域。管理页面使用不同的背景色来标识管理区域。为此，使用了
    JSF 模板化。稍后，在第四部分“校友”的章节中，我将讨论根据用户选择更改外观风格的方法。


    每本书都将以表格形式显示，包含以下信息：


    *   标题

    *   副标题

    *   作者

    *   出版商

    *   出版年份

    *   语言

    *   ISBN

    *   简短描述文本

    *   封面图片

    *   外部和/或内部评论的引用

    *   一个或多个类别的引用


    尽管标题、作者、出版商等大部分信息在不同语言中保持不变，但其他信息（如简短描述文本和类别）可能会以不同语言显示。Books 的当前在线版本支持英语和德语。这并非技术限制——仅受限于翻译能力。


    除了图书，Books 应用还显示评论。其结构很简单：


    *   评论所涉及的图书

    *   评论的语言

    *   评论内容


    该应用会自动适应不同的显示尺寸（得益于*响应式设计*）。


    尽管需求相当简单，但这个应用展示了许多技术。Books 不仅仅是一个演示应用，它已上线运行在我的网站 [`it-rezension.de`](http://it-rezension.de)
    上。


    由于应用的数据结构良好且同质化，因此非常适合使用 SQL 数据库。Books 使用 JPA 来访问数据库。


    外观风格以及对各种显示尺寸的适配是通过使用层叠样式表 (CSS) 实现的。


    你可以在我的网站上看到 Books 的在线版本。顺便提一下，除了本书之外，你还可以将其用作参考书目。


    ## 开发顺序


    那么——从哪里开始呢？是从一个可以提供给客户进一步评审的 GUI 原型开始？在许多项目中，这可能是首选方案。可以先草拟一些对话框，包括一些导航按钮，以展示软件的预期行为。这些原型可以使用演示软件构建，或者直接用目标语言（此处为
    Java 与 JSF）实现。后一种方法能给客户带来更好的感受。


    或者，我们应该通过绘制 UML 或其他图表来建模整体蓝图和活动？还是先设计数据模型（例如，使用实体图）？


    在实践中，你会看到所有这些方法以及更多其他方法。哪种是启动项目的最佳方式取决于项目属性以及相关人员的个人偏好。


    以下是我们称之为瀑布模型的过程：


    1.  收集并记录所有需求

    2.  设计并记录整体软件架构

    3.  详细记录所有计划的功能

    4.  编写所有代码

    5.  测试整个系统

    6.  编写用户文档并交付


    这似乎是一种详尽的方法。但到系统交付时，需求可能已经发生变化，或者某些功能的表现可能与客户的预期不符（如果客户对预期有清晰的认识的话）。一个教训是：瀑布模型大多会失败。敏捷方法更可取。敏捷宣言（请阅读
    [`agilemanifesto.org`](http://agilemanifesto.org) ）是这场运动中的一个里程碑。


    将项目分解为可迭代、可增量实现的多个部分。对于每次迭代，我们都需要一个简短的规划会议。开发或完善一部分软件并进行测试，然后——非常重要的一点——交付给客户，或者至少交付给客户内部的替代者。这样，开发过程中就可以包含一个短反馈循环。客户可以快速了解软件的概况。需求变更可以迅速纳入。许多敏捷实践者不喜欢这种比较，但在敏捷中，每次迭代内的开发实际上遵循了类似于瀑布模型的过程，尽管是一个（非常）小的瀑布，并带有短反馈循环。


    作为迭代过程的结果，开发顺序可能会因影响因素而改变。而详细的顺序变得不那么重要，因为在每次迭代之后，有时甚至在迭代之内，都可能进行修正。


    对于像 Books 这样的数据驱动型应用（主要向用户展示存储在某个地方的数据），我倾向于尽快创建对话框。由于第一个对话框应该向用户展示一些未来的外观风格，我们需要一个整体布局，一种用于嵌入对话框的框架。


    这个对话框应该使用什么数据？这取决于项目规模、参与人数、他们的经验等等。无论如何，数据模型是一个很好的起点。根据团队结构，对话框可以使用此模型并模拟任何持久化操作。数据库专家可能通过服务层将数据模型连接到数据库。


    模拟数据可能对测试有用，或者当不同的人为一个功能的各个部分（例如，数据库部分、服务部分或表示部分）进行实现时有用。为了向用户展示正在进行的工作，通常使用一些真实的数据处理会更好。正如我们在下一章实现第一个对话框后所看到的，用于访问数据的服务层可以被泛化和重用。因此，从一开始就为每个对话框使用持久化数据是没有问题的。


    就 Books 而言，数据结构并不难设计——我们从数据模型和数据库访问开始，然后创建使用这些数据的对话框。通过迭代工作，每个对话框都类似地重复此过程。


    由于第一个对话框没有服务层，我们一次性填充了伪持久化数据。为了让你在学习过程中更清晰，实际操作有时可能与实际开发略有不同。

    '
- fmt: '# Creating the Books Project


    To start programming Books, we need to create our project. The project creation
    steps are the same ones explained in Chapter [1](#A435433_1_En_1_Chapter.xhtml),
    so I assume you''re able to create the project without further assistance (or
    reread that first chapter if necessary).


    1. Using NetBeans or your favorite IDE, create a new Maven web project named `Books`.

    2. Add the JSF framework to your project.

    3. As long as NetBeans doesn''t support Java EE 8 out of the box, you need to
    slightly update some generated files—notably `pom.xml` and `web.xml` (see Chapter
    [6](#A435433_1_En_6_Chapter.xhtml) for more).


    ## Summary


    This chapter outlined the main features and requirements of the Books application
    and discussed some aspects of iterative development. In the next chapter, we''ll
    start with a first dialog box, mocking away persistence. To begin that chapter,
    you should have created a fresh web application.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8, [https://doi.org/10.1007/978-1-4842-3030-5_11](#A435433_1_En_11_Chapter.xhtml)


    # 11. Starting the Books App


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    Let''s recap the steps for the first dialog:


    1. Sketch and implement a preliminary overall layout

    2. Design the data model for the first dialog

    3. Implement the first dialog

    4. Add persistence


    ## Page Layout


    For the first step, we have to answer an essential question: which devices will
    future users of the application use? Preferably a desktop or laptop computer?
    Or mostly a mobile device? Or any of those?


    The screen layout for a small screen usually must differ from the layout for a
    large screen. For Books, we''ll assume the user wants to access the application
    from a personal computer as well as from a smartphone. That means we need a flexible
    design that fits all sizes by dynamically changing the size of some elements and/or
    reordering the element positions. In other words, it needs to be *responsive*.
    How to create such a responsive design is the topic of Chapter [19](#A435433_1_En_19_Chapter.xhtml).


    To prepare a responsive design, we split the screen layout into logical groups—for
    example, main content and navigation. On a desktop screen, both groups might be
    arranged side by side, whereas for a mobile device they might be arranged vertically.
    Or the navigation might be hidden and displayed only on demand. For mobile devices,
    the content of each group might also be reduced.


    Although starting out "mobile first" is popular, I assume my readers are Java
    developers. In that role, you usually use a desktop or laptop computer with a
    screen resolution of at least 1280 pixels horizontally. Thus, we''ll start with
    a design for that kind of device.


    Besides the main content and navigation, Books will have a headline and a footer.
    The layout is sketched in Figure [11-1](#A435433_1_En_11_Chapter.xhtml#Fig1).


    ![A435433_1_En_11_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig1_HTML.jpg)


    ###### Figure 11-1 Overall desktop screen layout of Books


    For development, I use screens with a horizontal size of 1680, 1920, and 2560
    pixels. Have you ever read a document in the browser with text lines extended
    to those sizes? It''s a mess. So, we want to restrict the horizontal size of our
    layout and center it in the browser window. We''ll replace the white space outside
    with it a nice picture. Note that this approach also reduces the gap to small
    (mobile) devices, which need to be covered by this responsive design too.


    ### HTML Structure


    First we need to create a page. NetBeans created the page `index.xhtml`, which
    can be used and renamed. This page will contain four sections for the different
    areas and one container element (`div id="wrapper"`), containing the four parts
    mentioned earlier, which is used to limit the width of the whole page.


    Before HTML5, usually a `div` was used for this purpose. Every `div` became its
    own `id`. Because this approach is still widely used, Listing [11-1](#A435433_1_En_11_Chapter.xhtml#PC1)
    demonstrates such a page.


    ###### Listing 11-1 Rough Page Structure by `div` Elements


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Books</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <div id="header">

    11           <h1>Michael''s book list</h1>

    12         </div>

    13         <div id="main">

    14           Main content goes here

    15         </div>

    16         <div id="navigation">

    17           This is the navigation

    18         </div>

    19         <div id="footer">

    20           This is the footer

    21         </div>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    HTML5 knows a few more specific tags for structuring a page. We can replace some
    of the `div` elements with new semantic elements. For example, we may use `<header>`
    in favor of a `div` to indicate the header part of the page, as shown in Listing
    [11-2](#A435433_1_En_11_Chapter.xhtml#PC2)—but don''t mix with the HTML `head`!


    ###### Listing 11-2 HTML Page Structured by Specific Elements


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Books</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <header>

    11           <h1>Michael''s book list</h1>

    12         </header>

    13         <main>

    14           Main content goes here

    15         </main>

    16         <nav>

    17           This is the navigation

    18         </nav>

    19         <footer>

    20           This is the footer

    21         </footer>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    Only the `div`, which is used as a container element for the page, comes with
    an `id`. `div`s are broadly used and will be used in this application. A unique
    `id` helps to address the right `div`. As you''ll see, we don''t need the `id`
    right here, but for admin pages we will use such an `id`.


    The other elements, like `<header>`, are unique within our application. By definition,
    these elements may occur multiple times. In such a case, an `id` would help again.


    If we run this application, the browser would show a kind of boring page, like
    Figure [11-2](#A435433_1_En_11_Chapter.xhtml#Fig2).


    ![A435433_1_En_11_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig2_HTML.jpg)


    ###### Figure 11-2 Structured page without layout definition


    We''ve defined some container elements for the future content. For `<main>`, `<nav>`,
    and `<footer>`, the page simply contains some placeholder text.


    ### Basic Styling with CSS


    As mentioned, content and style should be separated. A web page, like a web application,
    is more than just content and functionality—a pleasant look and feel are also
    important. Cascading Style Sheets (CSS) is the technology we''ll use to create
    that look and feel. If you''re not familiar with CSS, you may want to check out
    Appendix B, which serves as a basic introduction.


    Although it''s possible to include styles in the `<style>` element of the `<html>`
    header of a page, it''s better to put the styles into one or more separate file(s).
    That simplifies reuse and, due to browser caching, reduces page load time. The
    CSS is loaded just once instead of being loaded with every page.


    Using NetBeans, right-click any folder of the project within the Projects view
    and choose New ➤ Other ➤ Web ➤ Cascading Style Sheet. Enter the name `books` and
    set the folder to `resources/css`, as shown in Figure [11-3](#A435433_1_En_11_Chapter.xhtml#Fig3).


    ![A435433_1_En_11_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig3_HTML.jpg)'
  raw: '###### Creating the Books Project


    To start programming Books, we need to create our project. The project creation
    steps are the same ones explained in Chapter [1](#A435433_1_En_1_Chapter.xhtml),
    so I assume you''re able to create the project without further assistance (or
    reread that first chapter if necessary).


    1.  Using NetBeans or your favorite IDE, create a new Maven web project named
    Books.


    2.  Add the JSF framework to your project.


    3.  As long as NetBeans doesn’t support Java EE 8 out of the box, you need to
    slightly update some generated files—notably pom.xml and web.xml (see Chapter
    [6](#A435433_1_En_6_Chapter.xhtml) for more).


    ## Summary


    This chapter outlined the main features and requirements of the Books application
    and discussed some aspects of iterative development. In the next chapter, we’ll
    start with a first dialog box, mocking away persistence. To begin that chapter,
    you should have created a fresh web application.


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , [https://doi.org/10.1007/978-1-4842-3030-5_11](#A435433_1_En_11_Chapter.xhtml)


    # 11. Starting the Books App


    Michael Müller^(1 )


    (1)Brühl, Nordrhein-Westfalen, Germany


    Let’s recap the steps for the first dialog:


    1.  Sketch and implement a preliminary overall layout


    2.  Design the data model for the first dialog


    3.  Implement the first dialog


    4.  Add persistence


    ## Page Layout


    For the first step, we have to answer an essential question: which devices will
    future users of the application use? Preferably a desktop or laptop computer?
    Or mostly a mobile device? Or any of those?


    The screen layout for a small screen usually must differ from the layout for a
    large screen. For Books, we’ll assume the user wants to access the application
    from a personal computer as well as from a smartphone. That means we need a flexible
    design that fits all sizes by dynamically changing the size of some elements and/or
    reordering the element positions. In other words, it needs to be *responsive*.
    How to create such a responsive design is the topic of Chapter [19](#A435433_1_En_19_Chapter.xhtml).


    To prepare a responsive design , we split the screen layout into logical groups—for
    example, main content and navigation. On a desktop screen, both groups might be
    arranged side by side, whereas for a mobile device they might be arranged vertically.
    Or the navigation might be hidden and displayed only on demand. For mobile devices,
    the content of each group might also be reduced.


    Although starting out “mobile first” is popular, I assume my readers are Java
    developers. In that role, you usually use a desktop or laptop computer with a
    screen resolution of at least 1280 pixels horizontally. Thus, we’ll start with
    a design for that kind of device.


    Besides the main content and navigation , Books will have a headline and a footer
    . The layout is sketched in Figure [11-1](#A435433_1_En_11_Chapter.xhtml#Fig1).


    ![A435433_1_En_11_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig1_HTML.jpg)


    ###### Figure 11-1 Overall desktop screen layout of Books


    For development , I use screens with a horizontal size of 1680, 1920, and 2560
    pixels. Have you ever read a document in the browser with text lines extended
    to those sizes? It’s a mess. So, we want to restrict the horizontal size of our
    layout and center it in the browser window. We’ll replace the white space outside
    with it a nice picture. Note that this approach also reduces the gap to small
    (mobile) devices, which need to be covered by this responsive design too.


    ### HTML Structure


    First we need to create a page. NetBeans created the page index.xhtml, which can
    be used and renamed. This page will contain four sections for the different areas
    and one container element (div id="wrapper"), containing the four parts mentioned
    earlier, which is used to limit the width of the whole page.


    Before HTML5, usually a div was used for this purpose. Every div became its own
    id. Because this approach is still widely used, Listing [11-1](#A435433_1_En_11_Chapter.xhtml#PC1)
    demonstrates such a page.


    ###### Listing 11-1 Rough Page Structure by div Elements


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Books</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <div id="header">

    11           <h1>Michael''s book list</h1>

    12         </div>

    13         <div id="main">

    14           Main content goes here

    15         </div>

    16         <div id="navigation">

    17           This is the navigation

    18         </div>

    19         <div id="footer">

    20           This is the footer

    21         </div>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    HTML5 knows a few more specific tags for structuring a page. We can replace some
    of the div elements with new semantic elements. For example, we may use <header>
    in favor of a div to indicate the header part of the page, as shown in Listing
    [11-2](#A435433_1_En_11_Chapter.xhtml#PC2)—but don’t mix with the HTML head!


    ###### Listing 11-2 HTML Page Structured by Specific Elements


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>Books</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <header>

    11           <h1>Michael''s book list</h1>

    12         </header>

    13         <main>

    14           Main content goes here

    15         </main>

    16         <nav>

    17           This is the navigation

    18         </nav>

    19         <footer>

    20           This is the footer

    21         </footer>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    Only the div, which is used as a container element for the page, comes with an
    id. divs are broadly used and will be used in this application. A unique id helps
    to address the right div. As you’ll see, we don’t need the id right here, but
    for admin pages we will use such an id.


    The other elements , like header, are unique within our application. By definition,
    these elements may occur multiple times. In such a case, an id would help again.


    If we run this application, the browser would show a kind of boring page, like
    Figure [11-2](#A435433_1_En_11_Chapter.xhtml#Fig2).


    ![A435433_1_En_11_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig2_HTML.jpg)


    ###### Figure 11-2 Structured page without layout definition


    We’ve defined some container elements for the future content. For main, nav, and
    footer, the page simply contains some placeholder text.


    ### Basic Styling with CSS


    As mentioned, content and style should be separated. A web page , like a web application,
    is more than just content and functionality—a pleasant look and feel are also
    important. Cascading Style Sheets (CSS) is the technology we’ll use to create
    that look and feel. If you’re not familiar with CSS, you may want to check out
    Appendix B, which serves as a basic introduction.


    Although it’s possible to include styles in the <style> element of the <html>
    header of a page, it’s better to put the styles into one or more separate file(s).
    That simplifies reuse and, due to browser caching, reduces page load time. The
    CSS is loaded just once instead of being loaded with every page.


    Using NetBeans , right-click any folder of the project within the Projects view
    and choose New ➤ Other ➤ Web ➤ Cascading Style Sheet. Enter the name **books**
    and set the folder to resources/css, as shown in Figure [11-3](#A435433_1_En_11_Chapter.xhtml#Fig3).


    ![A435433_1_En_11_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig3_HTML.jpg)'
  trans: '

    ###### 创建图书项目


    要开始编写图书程序，我们需要先创建项目。项目创建步骤与第 1 章所述相同，因此我假设你无需额外帮助即可自行创建项目（如有必要，可重读第一章）。


    1.  使用 NetBeans 或你喜欢的 IDE，创建一个名为 Books 的新 Maven Web 项目。


    2.  将 JSF 框架添加到项目中。


    3.  由于 NetBeans 默认不支持 Java EE 8，你需要稍微更新一些生成的文件——特别是 pom.xml 和 web.xml（更多信息请参见第
    6 章）。


    ## 总结


    本章概述了图书应用程序的主要功能和需求，并讨论了迭代开发的某些方面。在下一章中，我们将从第一个对话框开始，模拟持久化。开始下一章之前，你应该已经创建了一个全新的
    Web 应用程序。


    © Michael Müller 2018


    Michael Müller, Practical JSF in Java EE 8 , `doi.org/10.1007/978-1-4842-3030-5_11`


    # 11. 启动图书应用


    Michael Müller^(1 )


    (1)德国，北莱茵-威斯特法伦州，布吕尔


    让我们回顾一下第一个对话框的步骤：


    1.  草拟并实现初步的整体布局


    2.  设计第一个对话框的数据模型


    3.  实现第一个对话框


    4.  添加持久化


    ## 页面布局


    第一步，我们需要回答一个关键问题：应用程序的未来用户将使用哪些设备？是台式机或笔记本电脑？还是主要是移动设备？或者两者都有？


    小屏幕的屏幕布局通常必须与大屏幕的布局不同。对于图书应用，我们假设用户既想通过个人电脑访问，也想通过智能手机访问。这意味着我们需要一个灵活的设计，通过动态改变某些元素的大小和/或重新排列元素位置来适应所有尺寸。换句话说，它需要是*响应式*的。如何创建这样的响应式设计是第
    19 章的主题。


    为了准备响应式设计，我们将屏幕布局拆分为逻辑组——例如，主要内容区和导航区。在桌面屏幕上，这两个组可能并排排列，而在移动设备上，它们可能垂直排列。或者导航可能被隐藏，仅在需要时显示。对于移动设备，每个组的内容也可能被精简。


    虽然“移动优先”的方法很流行，但我假设我的读者是 Java 开发者。作为 Java 开发者，你通常使用屏幕分辨率水平方向至少为 1280 像素的台式机或笔记本电脑。因此，我们将从针对这类设备的设计开始。


    除了主要内容和导航，图书应用还将包含一个标题栏和一个页脚。布局草图如图 11-1 所示。


    ![A435433_1_En_11_Fig1_HTML.jpg](img/A435433_1_En_11_Fig1_HTML.jpg)


    ###### 图 11-1 图书应用的桌面屏幕整体布局


    在开发过程中，我使用的屏幕水平尺寸为 1680、1920 和 2560 像素。你是否曾在浏览器中阅读过文本行延伸到这些尺寸的文档？那简直是一团糟。因此，我们希望限制布局的水平尺寸，并将其在浏览器窗口中居中。我们将用一张漂亮的图片替换外部的空白区域。请注意，这种方法也缩小了与小型（移动）设备的差距，这些设备也需要被这个响应式设计所覆盖。


    ### HTML 结构


    首先，我们需要创建一个页面。NetBeans 创建了 index.xhtml 页面，我们可以使用并重命名它。这个页面将包含四个区域，分别对应不同的区域，以及一个容器元素（div
    id="wrapper"），它包含了前面提到的四个部分，用于限制整个页面的宽度。


    在 HTML5 之前，通常使用 div 来实现此目的。每个 div 都有自己的 id。由于这种方法仍被广泛使用，清单 11-1 演示了这样一个页面。


    ###### 清单 11-1 使用 div 元素的粗略页面结构


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>图书</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <div id="header">

    11           <h1>迈克尔的图书列表</h1>

    12         </div>

    13         <div id="main">

    14           主要内容在此

    15         </div>

    16         <div id="navigation">

    17           这是导航区

    18         </div>

    19         <div id="footer">

    20           这是页脚

    21         </div>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    HTML5 提供了一些更具体的标签来构建页面结构。我们可以用新的语义元素替换部分 div 元素。例如，我们可以使用 `<header>` 代替 div 来表示页面的标题部分，如清单
    11-2 所示——但不要与 HTML 的 head 混淆！


    ###### 清单 11-2 使用特定元素构建的 HTML 页面结构


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html>

     3   <html xmlns:="http://www.w3.org/1999/xhtml"

     4         xmlns:h="http://xmlns.jcp.org/jsf/html">

     5     <h:head>

     6       <title>图书</title>

     7     </h:head>

     8     <h:body>

     9       <div id="wrapper">

    10         <header>

    11           <h1>迈克尔的图书列表</h1>

    12         </header>

    13         <main>

    14           主要内容在此

    15         </main>

    16         <nav>

    17           这是导航区

    18         </nav>

    19         <footer>

    20           这是页脚

    21         </footer>

    22       </div>

    23     </h:body>

    24   </html>

    ```


    只有用作页面容器元素的 div 带有 id。div 被广泛使用，并且将在此应用程序中使用。唯一的 id 有助于定位正确的 div。正如你将看到的，我们在这里并不需要这个
    id，但对于管理页面，我们将使用这样的 id。


    其他元素，如 header，在我们的应用程序中是唯一的。根据定义，这些元素可能多次出现。在这种情况下，id 将再次发挥作用。


    如果我们运行这个应用程序，浏览器将显示一个相当单调的页面，如图 11-2 所示。


    ![A435433_1_En_11_Fig2_HTML.jpg](img/A435433_1_En_11_Fig2_HTML.jpg)


    ###### 图 11-2 未定义布局的结构化页面


    我们已经为未来的内容定义了一些容器元素。对于 main、nav 和 footer，页面仅包含一些占位符文本。


    ### 使用 CSS 进行基本样式设计


    如前所述，内容和样式应该分离。一个网页，就像一个 Web 应用程序，不仅仅是内容和功能——愉悦的外观和感觉也很重要。层叠样式表（CSS）是我们用来创建这种外观和感觉的技术。如果你不熟悉
    CSS，可以查看附录 B，它提供了基本的介绍。


    虽然可以将样式包含在页面 `<html>` 头部的 `<style>` 元素中，但更好的做法是将样式放在一个或多个单独的文件中。这简化了重用，并且由于浏览器缓存，减少了页面加载时间。CSS
    只加载一次，而不是随每个页面加载。


    使用 NetBeans，在项目视图中的任意项目文件夹上右键单击，选择新建 ➤ 其他 ➤ Web ➤ 层叠样式表。输入名称 **books**，并将文件夹设置为
    resources/css，如图 11-3 所示。


    ![A435433_1_En_11_Fig3_HTML.jpg](img/A435433_1_En_11_Fig3_HTML.jpg)

    '
- fmt: "###### Figure 11-3 Creating CSS with NetBeans\n\nYou’re creating a nesting\
    \ subfolder structure and a file within the `Web Pages` folder. Alternatively,\
    \ in the `Web Pages` folder you could create a folder called `resources`, then\
    \ a subfolder `css`, and within that folder a new file, `books.css`.\n\nNow we’ll\
    \ add a reference to that file to the JSF page, as shown in Listing [11-3](#A435433_1_En_11_Chapter.xhtml#PC3).\n\
    \n###### Listing 11-3 Embedding CSS with a JSF Tag\n\n```\n1   ...\n2     <h:head>\n\
    3       <title>Books</title>\n4       <h:outputStylesheet name=\"css/books.css\"\
    />\n5     </h:head>\n6   ...\n```\n\nThe tag `<h:outputStylesheet>` will be rendered\
    \ by JSF as `<link type=\"text/css\" rel=\"stylesheet\" href=\"/Books/javax.faces.resource/css/books.css.xhtml\"\
    />`, which is the HTML syntax to include as CSS.\n\nExamine this tag. You may\
    \ recognize `javax.faces.resource`, although we placed the stylesheet below `resources`.\
    \ JSF uses a symbolic name, whereas the real resource might reside at different\
    \ locations, which have to be inside a folder named `resources`.\n\n###### JSF\
    \ Resource Management\n\n```\n1   <h:outputStylesheet ... />\n2   <h:outputScript\
    \ ... />\n3   <h:graphicImage ... />\n```\n\nThe preceding three JSF tags refer\
    \ to resources. A *resource* might reside in any folder within a `resources` folder.\
    \ The `resources` folder might be at the top level within the `webapp` folder\
    \ (that’s where you find the pages too). Or it might be located within the `META-INF`\
    \ directory of the jar file. If you compose your application of different jar\
    \ files, each may contain (its own) resources. This approach enables you to exchange\
    \ the resources at deploy time.\n\nIf you use lots of resources, you may logically\
    \ group them together into a *library* and add an attribute `library=\"yourLibrary\"\
    `. This attribute is treated as a folder—for example, `<h:outputStylesheet library=\"\
    muellerbruehl\" name=\"css/books.css\"/>` refers to `resource/muellerbruehl/css/books.css`.\
    \ You may ask why you can’t use `<h:outputStylesheet name=\"muellerbruehl/css/books.css\"\
    />`? That does point to the same folder and will be functional, but the intent\
    \ is different. By using the `library` attribute, your intent is not only to point\
    \ to a specific resource file, but to a group of resources that fit together—for\
    \ example, CSS, icons, and script that belong to a special theming. I cover this\
    \ near the end of this book when we change an application’s look and feel.\n\n\
    Also, using the `library` attribute, you can place an optional version folder\
    \ between the library folder and your resource file path. The version folder is\
    \ named according to the `\\d+(_\\d+)*` pattern. By default, JSF always loads\
    \ the latest version (highest number).\n\nWithout any version, `<h:outputStylesheet\
    \ library=\"muellerbruehl\" name=\"css/books.css\"/>` refers to the file `resources/muellerbruehl/css/books.css`.\n\
    \nAssuming a version `1_0`, this file must be in `resources/muellerbruehl/1_0/css/books.css`.\
    \ The full path to your library is composed by `resources/<library>/<version>/<name>`,\
    \ where `name` may contain additional folders.\n\nLet’s assume we have two versions,\
    \ `1_0` and `1_1`, as follows:\n\n```\nresources/muellerbruehl/1_0/css/books.css\n\
    resources/muellerbruehl/1_1/css/books.css\n```\n\nNow the tag I mentioned automatically\
    \ resolves to the second folder because it contains the latest version. There\
    \ is no version attribute within the `<h:outputStylesheet>` tag. Thus, you may\
    \ add a newer version to your folder structure, which would be resolved automatically,\
    \ but you can’t select a specific version.\n\nFor further info, check out the\
    \ article by Bauke Scholtz at [http://stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used](http://stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used).\n\
    \nListing [11-4](#A435433_1_En_11_Chapter.xhtml#PC6) adds some content to the\
    \ `books.css` file.\n\n###### Listing 11-4 Basic CSS for Books\n\n```\n 1   *\
    \ {\n 2     margin: 0px;\n 3     padding: 0px;\n 4     border: 0px;\n 5     color:\
    \ #000044;\n 6   }\n\n 8   body {\n 9     font-size: 12px; /* base size */\n10\
    \     text-align: left;\n11     font-family: Verdana, \"Verdana CE\",\n12    \
    \              Arial, \"Arial CE\", \"Lucida Grande CE\",\n13                \
    \  lucida, \"Helvetica CE\", sans-serif;\n14     background-image: url(/Books/resources/images/books1.png);\n\
    15     background-repeat: repeat;\n16     background-position: top left;\n17 \
    \    background-attachment: fixed;\n18   }\n\n20   h1, h2, h3, h4, h5, h6 {\n\
    21     color: red;\n22     padding: 1.0em 0em 1.0em 0em;\n23   }\n\n25   h1 {\n\
    26     font-size: 2em;\n27   }\n\n29   h2 {\n30     font-size: 1.5em;\n31    \
    \ font-style: italic;\n32   }\n\n34   h3 {\n35     font-size: 1.2em;\n36   }\n\
    ```\n\nWith the universal selector `*`, some reset actions are performed. Because\
    \ some default values differ from browser to browser, we set them to defined values\
    \ to achieve the same (or at least similar) layout in almost every browser. This\
    \ is well known as a *CSS reset* (you can read more about it at [http://cssreset.com/what-is-a-css-reset/](http://cssreset.com/what-is-a-css-reset/)).\
    \ Here, we overwrite the browser settings for `padding`, `margin`, and `border`.\
    \ We also set the default text color to a dark blue.\n\nWithin `body`, we’ll set\
    \ the basic font size. Doing so, the font becomes independent from the browser’s\
    \ default font size. And we choose a font from the list of fonts. The browser\
    \ tries to apply a font from this list, beginning with the first. The last one,\
    \ `sans-serif`, is usually known by every browser and will be applied if the browser\
    \ couldn’t find any other font family of this list. This ensures a font without\
    \ serifs. The background statements load an image as background, with a fixed\
    \ (non-scrolling) positioning, which is repeated endlessly.\n\nNext, some standard\
    \ settings for the heading tags (`h1` through `h6`) are applied. The unit `em`,\
    \ a typesetting term meaning “width of the letter *M*,” is a relative size. As\
    \ font size, `2em` doubles the size of the font. The base of this size is the\
    \ size that’s applied in the container element, not the size we defined in the\
    \ `body`! The size of the `body` is simply the base for all other relative sizes.\n\
    \nFor example, if we have a basic font size of `12px` and define a `div` to which\
    \ we apply a size of `2em`, the resulting font size within this `div` would be\
    \ `24px`. Now, if we place a header 1 before that `div`, `h1` would create a font\
    \ of `24px` (12px × 2). But if we place a header 1 within this `div`, then `h1`\
    \ would create a font size of `48px` (12px × 2[by div] × 2[by h1]), because the\
    \ `2em` of `h1` is a relative size to the font within the `div`, which is scaled\
    \ by `2em` itself.\n\nAs you can see in Figure [11-4](#A435433_1_En_11_Chapter.xhtml#Fig4),\
    \ all content is still displayed left aligned, whatever window size you use for\
    \ your browser.\n\n![A435433_1_En_11_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig4_HTML.jpg)\n\
    \n###### Figure 11-4 Reset, background, and header styles applied\n\nIf you were\
    \ to insert a long line of text for any part, such as the main content, you would\
    \ see this text being extended to the right border of your browser window. Our\
    \ goal is to restrict the length of our content and center it. To that end, add\
    \ the content of Listing [11-5](#A435433_1_En_11_Chapter.xhtml#PC7) to the `books.css`\
    \ file."
  raw: '###### Figure 11-3 Creating CSS with NetBeans


    You’re creating a nesting subfolder structure and a file within the Web Pages
    folder. Alternatively, in the Web Pages folder you could create a folder called
    resources, then a subfolder css, and within that folder a new file, books.css.


    Now we’ll add a reference to that file to the JSF page, as shown in Listing [11-3](#A435433_1_En_11_Chapter.xhtml#PC3).


    ###### Listing 11-3 Embedding CSS with a JSF Tag


    ```

    1   ...

    2     <h:head>

    3       <title>Books</title>

    4       <h:outputStylesheet name="css/books.css"/>

    5     </h:head>

    6   ...

    ```


    The tag <h:outputStylesheet> will be rendered by JSF as <link type="text/css"
    rel="stylesheet" href="/Books/javax.faces.resource/css/books.css.xhtml"/>, which
    is the HTML syntax to include as CSS.


    Examine this tag. You may recognize javax.faces.resource, although we placed the
    stylesheet below resources. JSF uses a symbolic name, whereas the real resource
    might reside at different locations, which have to be inside a folder named resources.


    ###### JSF Resource Management


    ```

    1   <h:outputStylesheet ... />

    2   <h:outputScript ... />

    3   <h:graphicImage ... />

    ```


    The preceding three JSF tags refer to resources. A *resource* might reside in
    any folder within a resources folder. The resources folder might be at the top
    level within the webapp folder (that’s where you find the pages too). Or it might
    be located within the META-INF directory of the jar file. If you compose your
    application of different jar files, each may contain (its own) resources. This
    approach enables you to exchange the resources at deploy time.


    If you use lots of resources , you may logically group them together into a *library*
    and add an attribute library="yourLibrary". This attribute is treated as a folder—for
    example, <h:outputStylesheet library="muellerbruehl" name="css/books.css"/> refers
    to resource/muellerbruehl/css/books.css. You may ask why you can’t use <h:outputStylesheet
    name="muellerbruehl/css/books.css"/>? That does point to the same folder and will
    be functional, but the intent is different. By using the library attribute, your
    intent is not only to point to a specific resource file, but to a group of resources
    that fit together—for example, CSS, icons, and script that belong to a special
    theming. I cover this near the end of this book when we change an application’s
    look and feel.


    Also, using the library attribute , you can place an optional version folder between
    the library folder and your resource file path. The version folder is named according
    to the \d+(_\d+)* pattern. By default, JSF always loads the latest version (highest
    number).


    Without any version, <h:outputStylesheet library="muellerbruehl" name=css/"books.css"/>
    refers to the file resources/muellerbruehl/css/books.css.


    Assuming a version 1_0, this file must be in resources/muellerbruehl/1_0/css/books.css.
    The full path to your library is composed by resources/<library>/<version>/<name>,
    where name may contain additional folders.


    Let’s assume we have two versions, 1_0 and 1_1, as follows:


    ```

    resources/muellerbruehl/1_0/css/books.css

    resources/muellerbruehl/1_1/css/books.css

    ```


    Now the tag I mentioned automatically resolves to the second folder because it
    contains the latest version. There is no version attribute within the h:outputStyle
    tag. Thus, you may add a newer version to your folder structure, which would be
    resolved automatically, but you can’t select a specific version.


    For further info, check out the article by Bauke Scholtz at [http://stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used](http://stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used)
    .


    Listing [11-4](#A435433_1_En_11_Chapter.xhtml#PC6) adds some content to the books.css
    file.


    ###### Listing 11-4 Basic CSS for Books


    ```

     1   * {

     2     margin: 0px;

     3     padding: 0px;

     4     border: 0px;

     5     color: #000044;

     6   }


     8   body {

     9     font-size: 12px; /* base size */

    10     text-align: left;

    11     font-family: Verdana, "Verdana CE",

    12                  Arial, "Arial CE", "Lucida Grande CE",

    13                  lucida, "Helvetica CE", sans-serif;

    14     background-image: url(/Books/resources/images/books1.png);

    15     background-repeat: repeat;

    16     background-position: top left;

    17     background-attachment: fixed;

    18   }


    20   h1, h2, h3, h4, h5, h6 {

    21     color: red;

    22     padding: 1.0em 0em 1.0em 0em;

    23   }


    25   h1 {

    26     font-size: 2em;

    27   }


    29   h2 {

    30     font-size: 1.5em;

    31     font-style: italic;

    32   }


    34   h3 {

    35     font-size: 1.2em;

    36   }

    ```


    With the universal selector *, some reset actions are performed. Because some
    default values differ from browser to browser, we set them to defined values to
    achieve the same (or at least similar) layout in almost every browser. This is
    well known as a *CSS* *reset* (you can read more about it at [http://cssreset.com/what-is-a-css-reset/](http://cssreset.com/what-is-a-css-reset/)
    ). Here, we overwrite the browser settings for padding, margin, and border. We
    also set the default text color to a dark blue.


    Within body, we’ll set the basic font size . Doing so, the font becomes independent
    from the browser’s default font size. And we choose a font from the list of fonts.
    The browser tries to apply a font from this list, beginning with the first. The
    last one, sans-serif, is usually known by every browser and will be applied if
    the browser couldn’t find any other font family of this list. This ensures a font
    without serifs. The background statements load an image as background, with a
    fixed (non-scrolling) positioning, which is repeated endlessly.


    Next, some standard settings for the heading tags (h1 through h6) are applied.
    The unit *em*, a typesetting term meaning “width of the letter *M*,” is a relative
    size. As font size, 2em doubles the size of the font. The base of this size is
    the size that’s applied in the container element, not the size we defined in the
    body! The size of the body is simply the base for all other relative sizes.


    For example, if we have a basic font size of 12px and define a div to which we
    apply a size of 2em, the resulting font size within this div would be 24px. Now,
    if we place a header 1 before that div, h1 would create a font of 24px (12px ×
    2). But if we place a header 1 within this div, then h1 would create a font size
    of 48px (12px × 2[by div] × 2[by h1]), because the 2em of h1 is a relative size
    to the font within the div, which is scaled by 2em itself.


    As you can see in Figure [11-4](#A435433_1_En_11_Chapter.xhtml#Fig4), all content
    is still displayed left aligned, whatever window size you use for your browser.


    ![A435433_1_En_11_Fig4_HTML.jpg](OEBPS/Images/A435433_1_En_11_Fig4_HTML.jpg)


    ###### Figure 11-4 Reset, background, and header styles applied


    If you were to insert a long line of text for any part, such as the main content,
    you would see this text being extended to the right border of your browser window.
    Our goal is to restrict the length of our content and center it. To that end,
    add the content of Listing [11-5](#A435433_1_En_11_Chapter.xhtml#PC7) to the books.css
    file.'
  trans: '

    ###### 图 11-3 使用 NetBeans 创建 CSS


    你正在 Web Pages 文件夹内创建一个嵌套的子文件夹结构和一个文件。或者，你也可以在 Web Pages 文件夹中创建一个名为 resources 的文件夹，然后在其下创建子文件夹
    css，并在该文件夹中创建一个新文件 books.css。


    现在，我们将向 JSF 页面添加对该文件的引用，如清单 11-3 所示。


    ###### 清单 11-3 使用 JSF 标签嵌入 CSS


    ```

    1   ...

    2     <h:head>

    3       <title>Books</title>

    4       <h:outputStylesheet name="css/books.css"/>

    5     </h:head>

    6   ...

    ```


    标签 `<h:outputStylesheet>` 将被 JSF 渲染为 `<link type="text/css" rel="stylesheet" href="/Books/javax.faces.resource/css/books.css.xhtml"/>`，这是用于包含
    CSS 的 HTML 语法。


    检查这个标签。你可能会认出 `javax.faces.resource`，尽管我们将样式表放在了 resources 目录下。JSF 使用一个符号名称，而实际资源可能位于不同的位置，但这些位置必须位于名为
    resources 的文件夹内。


    ###### JSF 资源管理


    ```

    1   <h:outputStylesheet ... />

    2   <h:outputScript ... />

    3   <h:graphicImage ... />

    ```


    上述三个 JSF 标签引用资源。一个*资源*可以位于 resources 文件夹内的任何文件夹中。resources 文件夹可以位于 webapp 文件夹的顶层（你也能在那里找到页面）。或者，它也可以位于
    jar 文件的 META-INF 目录内。如果你的应用程序由多个不同的 jar 文件组成，每个 jar 文件都可以包含（其自身的）资源。这种方法使你能够在部署时交换资源。


    如果你使用大量资源，你可以按逻辑将它们分组到一个*库*中，并添加属性 `library="yourLibrary"`。该属性被视为一个文件夹——例如，`<h:outputStylesheet
    library="muellerbruehl" name="css/books.css"/>` 指向 `resource/muellerbruehl/css/books.css`。你可能会问，为什么不能使用
    `<h:outputStylesheet name="muellerbruehl/css/books.css"/>`？这确实指向同一个文件夹，并且也能正常工作，但意图不同。通过使用
    library 属性，你的意图不仅仅是指向一个特定的资源文件，而是指向一组相互配合的资源——例如，属于某个特定主题的 CSS、图标和脚本。我将在本书末尾更改应用程序外观时介绍这一点。


    此外，使用 library 属性，你可以在库文件夹和资源文件路径之间放置一个可选的版本文件夹。版本文件夹的命名遵循 `\d+(_\d+)*` 模式。默认情况下，JSF
    总是加载最新版本（编号最高）。


    如果没有版本号，`<h:outputStylesheet library="muellerbruehl" name="css/books.css"/>` 指向文件
    `resources/muellerbruehl/css/books.css`。


    假设有一个版本 `1_0`，该文件必须位于 `resources/muellerbruehl/1_0/css/books.css`。你的库的完整路径由 `resources/<library>/<version>/<name>`
    组成，其中 name 可能包含额外的文件夹。


    假设我们有两个版本，`1_0` 和 `1_1`，如下所示：


    ```

    resources/muellerbruehl/1_0/css/books.css

    resources/muellerbruehl/1_1/css/books.css

    ```


    那么我提到的标签会自动解析到第二个文件夹，因为它包含最新版本。`h:outputStyle` 标签内没有版本属性。因此，你可以向文件夹结构中添加一个更新的版本，它会被自动解析，但你无法选择特定版本。


    更多信息，请查看 Bauke Scholtz 在 [`stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used`](http://stackoverflow.com/questions/11988415/what-is-the-jsf-resource-library-for-and-how-should-it-be-used)
    上发表的文章。


    清单 11-4 向 books.css 文件添加了一些内容。


    ###### 清单 11-4 书籍的基本 CSS


    ```

     1   * {

     2     margin: 0px;

     3     padding: 0px;

     4     border: 0px;

     5     color: #000044;

     6   }


     8   body {

     9     font-size: 12px; /* 基础大小 */

    10     text-align: left;

    11     font-family: Verdana, "Verdana CE",

    12                  Arial, "Arial CE", "Lucida Grande CE",

    13                  lucida, "Helvetica CE", sans-serif;

    14     background-image: url(/Books/resources/images/books1.png);

    15     background-repeat: repeat;

    16     background-position: top left;

    17     background-attachment: fixed;

    18   }


    20   h1, h2, h3, h4, h5, h6 {

    21     color: red;

    22     padding: 1.0em 0em 1.0em 0em;

    23   }


    25   h1 {

    26     font-size: 2em;

    27   }


    29   h2 {

    30     font-size: 1.5em;

    31     font-style: italic;

    32   }


    34   h3 {

    35     font-size: 1.2em;

    36   }

    ```


    通过通用选择器 `*`，执行了一些重置操作。由于某些默认值因浏览器而异，我们将它们设置为定义好的值，以便在几乎所有浏览器中实现相同（或至少相似）的布局。这被称为*CSS
    重置*（你可以在 [`cssreset.com/what-is-a-css-reset/`](http://cssreset.com/what-is-a-css-reset/)
    阅读更多相关信息）。在这里，我们覆盖了浏览器对内边距、外边距和边框的设置。我们还将默认文本颜色设置为深蓝色。


    在 body 中，我们将设置基本字体大小。这样做可以使字体独立于浏览器的默认字体大小。我们从字体列表中选择一种字体。浏览器会尝试应用此列表中的字体，从第一个开始。最后一个
    `sans-serif` 通常被所有浏览器识别，如果浏览器找不到此列表中的任何其他字体系列，则会应用它。这确保了字体没有衬线。背景语句加载一张图片作为背景，采用固定（不滚动）定位，并无限重复。


    接下来，应用了标题标签（h1 到 h6）的一些标准设置。单位 *em* 是一个排版术语，意为“字母 *M* 的宽度”，它是一个相对大小。作为字体大小，2em
    将字体大小加倍。此大小的基准是应用于容器元素的大小，而不是我们在 body 中定义的大小！body 的大小仅仅是所有其他相对大小的基准。


    例如，如果我们有一个 12px 的基本字体大小，并定义一个 div，对其应用 2em 的大小，那么该 div 内的最终字体大小将是 24px。现在，如果我们在该
    div 之前放置一个 h1，h1 将创建一个 24px 的字体（12px × 2）。但是，如果我们将 h1 放置在该 div 内部，那么 h1 将创建一个
    48px 的字体大小（12px × 2[由 div] × 2[由 h1]），因为 h1 的 2em 是相对于 div 内字体的相对大小，而 div 内的字体本身已被缩放
    2em。


    如图 11-4 所示，无论你使用何种浏览器窗口大小，所有内容仍然左对齐显示。


    ![A435433_1_En_11_Fig4_HTML.jpg](img/A435433_1_En_11_Fig4_HTML.jpg)


    ###### 图 11-4 应用了重置、背景和标题样式


    如果你为任何部分（例如主要内容）插入一长行文本，你会看到该文本延伸到浏览器窗口的右边界。我们的目标是限制内容的长度并将其居中。为此，请将清单 11-5 的内容添加到
    books.css 文件中。

