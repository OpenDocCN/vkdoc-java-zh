  trans: '

    ## 微服务


    创建、检索和删除用户账户，以及设置其状态和登录功能，将由一个独立于 Alumni 和自定义领域运行的小型应用程序处理。通常，这样的单元被称为*服务*。你可以独立于其他单元来开发和部署此类服务。在
    Web 开发领域，我们通常使用两种服务：


    *   使用 SOAP 通信的 WS* 服务

    *   基于 REST 架构风格的服务


    SOAP（[www.w3.org/TR/soap/](http://www.w3.org/TR/soap/)）是 WS* 系列中 Web 服务通信的协议标准。通常
    SOAP 通过 HTTP 进行隧道传输。*SOAP* 最初代表简单对象访问协议，但如今仅使用其缩写。目前已有更简单的协议可用。


    我们之所以谈论 WS* 系列，是因为这类服务使用 Web 服务描述语言（WSDL）。（你可以在 [www.w3schools.com/xml/xml:wsdl.asp](http://www.w3schools.com/xml/xml:wsdl.asp)
    阅读更多关于 WSDL 的内容。）当 Web 服务在 21 世纪初与面向服务的架构（SOA）一起流行时，它们通常与一种注册表结合使用，该注册表可用于查找服务目录。从使用
    WS* 服务的应用程序角度来看，它可以被视为一种远程方法调用。调用此类服务就像调用本地方法一样简单。我们可以传递参数并接收结果对象。就个人而言，我经常使用
    WS* 服务，但在 Alumni 项目中，我选择遵循类似 REST 的风格，这种风格通常更轻量级。


    如今，我们谈论的是微服务。人们常常误解这个术语。*微服务*并不是一个“小”服务。它是一个提供一组完整、高内聚相关功能的应用程序。其功能通过公共接口提供，并可通过网络访问。微服务是独立的；它不需要任何支持组件（例如为
    WS* 服务设计的注册表）的开销。


    这个定义将微服务限制为既不是特殊协议，也不是特殊架构。如果我们省略支持基础设施，WS* 服务也可以充当微服务。


    另一种流行的服务是遵循 REST 架构风格的服务。当然，还有更多类型的服务，但我在本章中讨论的这两种是 Web 开发领域中最重要的。


    ###### 注意


    顺便提一下，*REST* 是 *REpresentational State Transfer*（表述性状态转移）的缩写，由 Roy Thomas Fielding
    在其论文“架构风格与基于网络的软件架构设计”中描述，你可以在 [www.ics.uci.edu/~fielding/pubs/dissertation/top.htm](http://www.ics.uci.edu/%7Efielding/pubs/dissertation/top.htm)
    阅读该论文。


    在 REST 中，资源由标识符表示。使用 HTTP 作为传输介质，资源由 URI 标识。对此类资源的操作与 HTTP 方法（如 POST、GET、PUT 或
    DELETE）相关联。通常，POST 用于创建对象，GET 用于读取，PUT 用于更新，DELETE 用于删除。因此，所有众所周知的 CRUD 操作都可以得到支持。


    有关 REST 和 HTTP 方法的更多信息，你可以阅读“为 RESTful 服务使用 HTTP 方法”（[www.restapitutorial.com/lessons/httpmethods.html](http://www.restapitutorial.com/lessons/httpmethods.html)）或“RESTFUL
    API 教程”（[`restfulapi.net/http-methods/`](https://restfulapi.net/http-methods/)）。还有许多其他文章和优秀书籍可供参考。讨论
    RESTful 服务的所有基础知识远远超出了本书的范围。


    假设我们要处理客户。可以使用 GET 方法通过 <baseAddress>/customers 访问客户列表。使用 POST 方法向同一地址传递客户数据将创建一个新客户并返回其
    ID。对 <baseAddress>/customers/<id>（其中 <id> 代表相应的 ID）执行 GET 操作将检索该客户，而对同一地址使用 DELETE
    方法则会将其删除。


    Java EE 包含用于 RESTful Web 服务的 Java API（JAX-RS）。当前版本 Java EE 8 包含 JAX-RS 2.1，该版本已被定义为
    JSR370（[`jcp.org/en/jsr/detail?id=370`](https://jcp.org/en/jsr/detail%3Fid=370)）。


    对于 Alumni，账户信息的访问由基于 JAX-RS 的微服务处理。


    ## 账户服务


    许多较旧的 JSF 应用程序（包括我早期的项目）倾向于变得庞大。编译和部署不断增长的应用程序需要越来越长的时间。这样的单体应用变得更难维护，因此最好使用一组较小的部分来组成整个应用程序。我们可以使用*门户组件*（参见
    JSR 362 的门户组件规范，网址为 [`jcp.org/en/jsr/detail?id=362`](https://jcp.org/en/jsr/detail%3Fid=362)）集成几个独立的
    JSF 应用程序。或者，我们可以设计几个 JSF 应用程序，通过共享会话来无缝交互。或者，我们可以调用服务。


    让我们看看 *Alumni* 如何处理其账户。访问其 API 的地址将是 http://<server:port>/AccountService/Accounts。Alumni
    可以使用 POST 方法调用此地址，并传递一些账户数据来创建一个新账户。与前面提到的客户示例不同，我插入了一个额外的 id 子路径来访问特定账户（希望 RESTful
    纯粹主义者不会责怪我）。这使我能够为启用登录和禁用账户等特定功能添加其他子分支。

