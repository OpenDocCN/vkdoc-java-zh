    In NetBeans, click Tools ➤ Servers ➤ Add Server. NetBeans starts a wizard to add
    a new server. From the available server types, choose GlassFish Server and enter
    the name **GlassFish Server 5** (or any other name of your choice), as shown in
    Figure [9-1](#A435433_1_En_9_Chapter.xhtml#Fig1).


    ![A435433_1_En_9_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_9_Fig1_HTML.jpg)


    ###### Figure 9-1 Add new server


    Click Next.


    ![A435433_1_En_9_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_9_Fig2_HTML.jpg)


    ###### Figure 9-2 Define the server location


    Type in your installation location or browse to the newly created folder containing
    the downloaded server. If everything is okay, NetBeans displays that it detected
    the server. Again, click Next > (All shown in Figure [9-2](#A435433_1_En_9_Chapter.xhtml#Fig2)).
    In this last screen of this wizard (not shown here), NetBeans asks for the domain.
