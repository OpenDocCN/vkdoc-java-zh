    ## Localized Content


    Now we’re going to translate our content using an enhanced version of the category
    editor. For Books we have to distinguish two kind of users:


    *   The administrator, the editor who edits and maintains the data

    *   Visitors to the website who want to gather some information


    The administer area should be indicated by an optical effect.


    ### Preparing the Administer Area


    There are different solutions for the administer pages. All of them need the same
    look and feel, consistent with the overall feel of the application. So, a different
    background color is chosen while keeping the rest. But there is one part that
    differs from the reader’s point of view: the navigation.


    One approach is to exchange the navigation part. We may include a *visitor navigation*
    or a *administer navigation,* depending on the pages we display. Another approach
    is to use a different template, and that’s the approach Books takes.


    To preparing the pages, follow these steps:


    1.  In your Web Pages (`webapp`) folder, create a subfolder and give it the name
    `admin`.

    2.  Copy `booksTemplate.xhtml` into the `admin` folder and rename the target to
    `adminTemplate.xhtml`.

    3.  Move the `index.xhtml` file into the `admin` folder and rename it to `categoryEditor.xhtml`.

    4.  In the header of this page, change `booksTemplate` to `adminTemplate`.

    5.  In the `admin` folder create a `welcome.xhtml` page. As in the existing welcome
    page, put some welcome text for the administrator in there.


    ### Include into Page


    By copying the template, we’ve doubled the markup for the footer. In this case,
    it’s only a small part, but it’s good practice to reuse code. Just to remind you,
    the footer is shown in Listing [14-10](#A435433_1_En_14_Chapter.xhtml#PC11).


    ###### Listing 14-10 Footer


    ```

     1   ...

     2     <footer>

     3       &copy; Michael Müller

     4       |

     5       <h:outputLink value="http://blog.mueller-bruehl.de">

     6         Michael''s Blog

     7       </h:outputLink>

     8       |

     9       <h:link value="About" outcome="/welcome.xhtml"/>

    10     </footer>

    11   ...

    ```


    JSF offers the `<ui:include src="..."/>` tag to include (what else?) a portion
    of one page into another.


    We’ll put the common parts into their own directory. Thus, we create a folder
    in our Web Pages folder and name it `common`.


    Next, let’s create a new file `footer.xhtml` in that folder. This file contains
    a `<ui:composition>`, as seen before, and contains our footer, as shown in Listing
    [14-11](#A435433_1_En_14_Chapter.xhtml#PC12).


    ###### Listing 14-11 Footer Refactored as HTML Fragment


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html [<!ENTITY copy "©">]>

     3   <ui:composition xmlns:="http://www.w3.org/1999/xhtml"

     4                   xmlns:h="http://xmlns.jcp.org/jsf/html"

     5                   xmlns:ui="http://xmlns.jcp.org/jsf/facelets">


     7     &copy; Michael Müller

     8     |

     9     <h:outputLink value="http://blog.mueller-bruehl.de">

    10       Michael''s Blog

    11     </h:outputLink>

    12     |

    13     <h:link value="About" outcome="/welcome.xhtml"/>

    14   </ui:composition>

    ```


    The footer part in both templates (`booksTemplate` as well as `adminTemplate`)
    can now be rewritten to reference the new file, as shown in Listing [14-12](#A435433_1_En_14_Chapter.xhtml#PC13).


    ###### Listing 14-12 Include HTML File


    ```

    1   ...

    2     <footer>

    3       <ui:include src="/common/footer.xhtml"/>

    4     </footer>

    5   ...

    ```


    That will insert the part within the `<ui:composition>` tag into the template.
    Pretty easy and straightforward, isn’t it?


    Besides a static include, it’s possible to get the file to be included from an
    EL expression:


    ```

    1   <ui:include src="#{someBean.someProperty}"/>

    ```


    Now if you calculate the property, you might dynamically determine which source
    to include. For example, you can mimic a tab control and insert the content of
    a tab depending on the current selection.


    Back to the category editor. Figure [14-7](#A435433_1_En_14_Chapter.xhtml#Fig7)
    shows two different tabs, one for Category, the other for a translation. Clicking
    one of the tab’s captions will trigger a reload and include a different part of
    the view description.


    ![A435433_1_En_14_Fig7_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig7_HTML.jpg)


    ###### Figure 14-7 Category editor


    ### Common Navigation


    Create a file `include\commonNavigation.xhtml` and insert it into the `<nav>`
    areas of both templates. In the admin template, add two buttons within one `div`
    above the common navigation, to navigate to `\admin\categoryEditor.xhtml` and
    `\admin\bookEditor.xhtml`. Create a new file `\admin\bookEditor.xhtml` (which
    will be used in Chapter [15](#A435433_1_En_15_Chapter_split_000.xhtml)). See Listing
    [14-13](#A435433_1_En_14_Chapter.xhtml#PC15).


    ###### Listing 14-13 Simple Navigation


    ```

     1   <?xml version=''1.0'' encoding=''UTF-8'' ?>

     2   <!DOCTYPE html [<!ENTITY copy "©">]>

     3   <ui:composition xmlns:="http://www.w3.org/1999/xhtml"

     4                   xmlns:h="http://xmlns.jcp.org/jsf/html"

     5                   xmlns:ui="http://xmlns.jcp.org/jsf/facelets">


     7     <div>

     8       <h:link styleClass="button"

     9               value="#{msg.btnWelcome}"

    10               outcome="/welcome.xhtml"/>

    11       <h:link styleClass="button"

    12               value="#{msg.btnAdmin}"

    13               outcome="/admin/welcome.xhtml"/>

    14     </div>


    16   </ui:composition>

    ```


    In the admin template, replace `<div id="wrapper">` with `<div id="adminWrapper">`
    and add this snippet to the CSS:


    ```

    1   body > div#adminWrapper {

    2     background-color: rosybrown;

    3     border-radius: 1em;

    4   }

    ```


    ### Topics


    Although the original version of Books was created to support two languages only,
    we want to design the category editor to support any language in principle. For
    the translation, we need the category in the original (default) language and one
    additional column for each additional language we want to support. Every category
    will be displayed on its own row. It might become quite a wide table, so let’s
    implement another solution: with a couple of pages we’ll build up a look and feel
    of a tab control, one register tab for every language (as shown in Figures [14-7](#A435433_1_En_14_Chapter.xhtml#Fig7)
    and [14-8](#A435433_1_En_14_Chapter.xhtml#Fig8)).


    The first page is similar to our existing editor. It’s used to add (edit, delete)
    categories in default language. All other tabs will display two columns for each
    category. The first one is read only and displays the existing categories in default
    language. The second column is editable to enter the translation in one of the
    target languages. Because most of my reviews are written in German, I defined
    `de` as the default language. Figure [14-8](#A435433_1_En_14_Chapter.xhtml#Fig8)
    shows the editor for the English translation.


    ![A435433_1_En_14_Fig8_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig8_HTML.jpg)'
