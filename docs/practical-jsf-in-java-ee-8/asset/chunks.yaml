    \                    html                    > \n```\n\n第一行中的两个盒子宽度均为 60 像素。这比该\
    \ div 中包含的标签宽度要大。对于第二个 div，标签的显示方式被重新定义为 `inline-block`。这允许为该标签定义宽度。如你所见，标签（白色背景）变宽了，但\
    \ div 的宽度（与之相同）并未改变。\n\n第一行的两个元素看起来与第三个盒子宽度相同。但 2*60 并不等于 200！\n\n盒模型的特点是它定义的是内容尺寸，而非整个显示尺寸。因此，我们必须在左右两侧都加上内边距、边框和外边距。2*(60+2*内边距+2*边框+2*外边距)\
    \ = 2*(60+20+20+40) = 280，这与第二行相等：200+20+20+40 = 280。\n\n理解这个盒模型对于计算布局至关重要。使用\
    \ CSS3，可以通过 `box-sizing: border-box;` 来改变这个默认模型。应用 `border-box` 后，宽度将决定包含内边距和边框在内的宽度。\n\
    \n###### 注意\n\n为了便于计算，盒模型的示例使用了以像素为单位的固定尺寸。在实际应用中，应优先使用相对尺寸，如 `em`（如其他示例中所用）或百分比。相对尺寸可以方便地全局调整大小，并且对于响应式设计至关重要。\n\
    \n### 增强样式\n\n使用 CSS，可以重新排列内容，或者添加文本或图像，还可以根据显示尺寸改变设计。本附录仅介绍了 CSS 的基础知识。\n\n本书中的应用程序有时会使用此类增强样式特性，例如伪元素、多种定位方式、背景、媒体查询等。这些内容将在相应章节中描述。\n\
    \n###### 注意\n\n如果你想学习 CSS，市面上有很多好书，互联网上也有大量优秀的在线教程。W3schools 的 CSS 教程值得一看：[www.w3schools.com/css](http://www.w3schools.com/css)。\n\
    \n# 附录 C：标签库\n\n在开发 Web 应用程序时，你总是需要创建一些要在浏览器中显示的 HTML 页面。一种方法是隐藏 HTML 处理过程并完全生成页面。另一种极端做法是将应用程序代码混入\
    \ HTML 页面中。\n\n但最常见的解决方案是将页面与代码分离。为此，需要在页面中放置一些调用代码的指令。从技术上讲，这些指令是 HTML/XML 标签或属性，尽管有些人可能用其他名称称呼它们。例如，AngularJS\
    \ 的指令是 HTML 属性，但它们称之为*指令*。“传统”的 JSF 应用程序通常使用标签构建，但从 JSF 2.2 开始，你可以省略一些标签，转而使用透传元素。\n\
    \n所有这些标签都被分组在一起，并可通过不同的命名空间使用。表 C-1 概述了这些命名空间。\n"
