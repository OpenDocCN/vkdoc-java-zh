  trans: "\n###### 表 3-1 标准 JSF 组件库部件\n\n| URI | 前缀 | 名称 |\n| --- | --- | --- |\n\
    | [`xmlns.jcp.org/jsf`](http://xmlns.jcp.org/jsf) | jsf: | 透传元素 |\n| [`xmlns.jcp.org/jsf/core`](http://xmlns.jcp.org/jsf/core)\
    \ | f: | 核心库，非 HTML 专用 |\n| [`xmlns.jcp.org/jsf/html`](http://xmlns.jcp.org/jsf/html)\
    \ | h: | HTML 库 |\n| [`xmlns.jcp.org/jsf/facelets/`](http://xmlns.jcp.org/jsf/facelets/)\
    \ | ui: | Facelet 模板标签库 |\n| [`xmlns.jcp.org/jsf/composite`](http://xmlns.jcp.org/jsf/composite)\
    \ | cc: | 复合组件标签库 |\n| [`xmlns.jcp.org/jsf/passthrough`](http://xmlns.jcp.org/jsf/passthrough)\
    \ | p: | 透传属性 |\n\n###### 注意\n\nPrimeFaces 是一种流行的 JSF 扩展方式，早在 JSF 通过透传属性进行扩展之前，它就已经使用了\
    \ `p:` 前缀。如果同时使用两者，为避免冲突，必须为其中之一选择不同的前缀。拥有现有代码库的开发人员通常会保留 `p:` 前缀，并为透传属性使用类似 `pt:`\
    \ 的前缀。\n\n正如命名空间所示，接下来的几个库并非标准 JSF 组件库的一部分，而是 JSP 时代的遗留产物。它们提供了一些本书中会用到的有用标签。（JSF\
    \ 的最初版本构建于 JSP 之上，JSP 是一种稍旧的技术，你仍然可以在 JSF 上下文之外使用它。因此，这些库与 JSF 本身无关，但可以在 JSF 内部使用。）\n\
    \n从 JSF 2.0 开始，Facelets 成为首选的视图声明语言（VDL），此版本及更新版本中的大多数改进仅适用于 Facelets。只有核心库和 HTML\
    \ 库可用于使用 JSP 构建的页面。另一方面，JSP 标准标签库提供了有用的标签，如表 3-2 所示，这些标签将在本书的应用程序中使用。\n\n######\
    \ 表 3-2 JSP 标准标签库标签\n\n| URI | 前缀 | 名称 |\n| --- | --- | --- |\n| [`xmlns.jcp.org/jsp/jstl/core`](http://xmlns.jcp.org/jsp/jstl/core)\
    \ | c: | JSP 标准标签库 (JSTL) |\n| [`xmlns.jcp.org/jsp/jstl/functions`](http://xmlns.jcp.org/jsp/jstl/functions)\
    \ | fn: | JSTL 函数 |\n\n在附录 C 中，你将找到所有标签及其简短描述的概览。完整的描述可在线查阅：[`docs.oracle.com/javaee/7/javaserver-faces-2-2/vdldocs-facelets/toc.htm`](https://docs.oracle.com/javaee/7/javaserver-faces-2-2/vdldocs-facelets/toc.htm)。如果你更喜欢印刷版参考资料，可以查阅\
    \ Ed Burns 和 Chris Schalk 合著的 *JavaServer Faces 2.0*（McGraw-Hill, 2010）。\n\n##\
    \ 组件树\n\n在处理请求时，JSF 会搜索请求的页面并扫描其内容。除了纯 HTML 之外，页面还可以包含特殊标签，例如 `<h:inputText value=\"\
    ...\"/>`。正如我在第 5 章中解释的那样，元素通过特殊的 XML 命名空间得到增强，这表示由 JSF 处理。所有这些 UI 元素将被收集到一个树形数据结构中。这就是在恢复视图阶段构建或恢复的*组件树*。\n\
    \n清单 3-1 展示了一个精简的页面。\n\n###### 清单 3-1 精简页面示例\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n 5       <h:head>\n 6           <h:outputLabel\
    \ value=\"Demo\"/>\n 7       </h:head>\n 8       <h:body>\n 9           <h:form>\n\
    10               <h:outputLabel value=\"Param1: \"/>\n11               <h:inputText\
    \ value=\"#{tinyCalculator.param1}\"/>\n12           </h:form>\n13       </h:body>\n\
    14   </html>\n```\n\n在恢复视图阶段，JSF 将构建一个如清单 3-2 所示的组件树（这是一个简化的表示）。\n\n###### 清单\
    \ 3-2 简化组件树\n\n```\n1             [UIViewRoot]\n2              |\n3   [UIOutput (Head)] --|-- [UIOutput\
    \ (Body)]\n4        |              |\n5   [HtmlOutputLabel]        [HtmlForm]\n\
    6                       |\n7           [HtmlOutputLabel] --|-- [HtmlInputText]\n\
    ```\n\n如你所见，这棵树的根节点（始终）是 `UIViewRoot`。在其下方，你会找到两个兄弟节点，分别代表页面的 head 和 body，再往下则是嵌套在该页面中的其他元素。\n\
    \n在此示例中，所有带有 `jsf/html` 命名空间（以 `h:` 为前缀）的特殊标签的元素都会出现在组件树中（清单 3-3）。如果省略此命名空间，这些元素将被视为纯\
    \ HTML，并且不会包含在组件树中。\n\n###### 清单 3-3 使用较少 JSF 前缀的精简页面示例\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8' ?>\n 2   <!DOCTYPE html>\n 3   <html xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n 4         xmlns:h=\"http://xmlns.jcp.org/jsf/html\">\n 5       <head>\n 6           Demo\n\
     7       </head>\n 8       <body>\n 9         <form>\n10             <h:outputLabel\
    \ value=\"Param1: \"/>\n11             <h:inputText value=\"#{tinyCalculator.param1}\"\
    />\n12         </form>\n13       </body>\n14   </html>\n```\n\n清单 3-4 是该页面生成的简化树。\n\
    \n###### 清单 3-4 包含标准（非 JSF）标签的 HTML 页面的组件树\n\n```\n1             [UIViewRoot]\n\
    2               |\n3   [HtmlOutputLabel] --|-- [HtmlInputText]\n```\n\n这看起来是一棵简单得多的树，不是吗？那么，你是否应该优先选择这些简单的形式呢？这取决于具体情况。有时遍历组件树很有帮助。遍历一棵精简的树可能更容易和/或更快，但在第一个版本中，所有元素都由标签表示，并由\
    \ JSF 处理。如果你替换渲染引擎，这些标签可能会以不同的方式渲染，而第二个版本则混合了标签和纯 HTML。因此，它只能与 HTML 渲染器一起使用。由于\
    \ JSF 通常用于 (X)HTML 页面，这算不上一个很大的缺点。一些 JSF 元素，例如 `commandLink`，需要嵌入在 JSF 管理的表单中。\n\
    \n###### 注意\n\nJSF 被设计为独立于 HTML 工作。因此，有人可能会创建不同的渲染引擎——例如，根据标签渲染 PDF。但我除了 HTML\
    \ 渲染引擎之外，不知道任何其他渲染引擎。\n\n再次强调，如果你更喜欢更纯粹的 HTML，以保持组件树较小，你应该优先选择 HTML 友好的标记。\n\n\
