- fmt: "# Appendix D: Programming Style\n\nAs you may have noticed, I always use an\
    \ underscore to prefix fields. Oracle recommends against starting a variable with\
    \ an underscore or a dollar sign (you can read this recommendation for yourself\
    \ at [http://docs.oracle.com/javase/tutorial/java/nutsandbolts/variables.html](http://docs.oracle.com/javase/tutorial/java/nutsandbolts/variables.html)),\
    \ although it says that the practice is technically legal. One of my technical\
    \ reviewers requested that I strictly follow the Java naming conventions, arguing\
    \ that this is a book for novices and should follow convention.\n\nBut this is\
    \ not a book for programming novices. It’s for experienced Java developers who\
    \ are new to JSF and, perhaps, to web development. A naming convention is not\
    \ a law, and anyway, the convention in question is just a recommendation in a\
    \ tutorial. If you take a look at the Java naming convention site ([www.oracle.com/technetwork/java/codeconventions-135099.html](http://www.oracle.com/technetwork/java/codeconventions-135099.html)),\
    \ you’ll can see that it’s not maintained anymore: “This page is not being actively\
    \ maintained. . . . The last revision to this document was made on April 20, 1999.”\
    \ So, it’s quite old.\n\nI have some reasons to prefix fields, which I’m going\
    \ to explain. I don’t want to start a discussion about the pros and cons. I just\
    \ to explain why I do it this way. As an experienced Java developer, you should\
    \ be able to transform my source code into a different style. Using a modern IDE,\
    \ that would involve nothing more than a small rename.\n\nLet’s go back a few\
    \ years in history, to when the so-called *Hungarian notation* was useful and\
    \ popular. Using this notation, every variable is prefixed by its type, for example\
    \ `intNumber`, which should indicate that the underlying type is an integer. This\
    \ had been very helpful for languages that aren’t strongly typed. `intNumber =\
    \ 3.142` might be a valid assignment. In such a case, the prefix should remind\
    \ the programmer to use integer values only.\n\nFor Java, with its strong type\
    \ system, there’s no need to use this Hungarian notation. If you declare `int\
    \ number`, the compiler would reject `number = 3.142`.\n\nSimilarly, a second\
    \ prefix was used to indicate a broader scope of a variable. For example, a prefix\
    \ `mb_` indicated a *member variable*, which we call a *field*. No question, `mb_intNumber`\
    \ is a really ugly variable name. So let’s throw away these old-fashioned prefixes.\
    \ For a modern programming language, there is no need for them.\n\nBut what happens\
    \ to properties? If we have a field `number` and we want to assign a new value\
    \ with a getter? Because of variable hiding, you can’t do it this way:\n\n```\n\
    \ 1                     private int                  number;                \n\
    \                  2                     public void                  setNumber(\
    \                  int                  number){                \n3     number\
    \ = number;\n4   }\n```\n\nTo distinguish field and local variables, you need\
    \ different names. This is the C# way, translated into Java:\n\n```\n 1      \
    \               private int                  number;                \n       \
    \           2                     public void                  setNumber(    \
    \              int                  value){                \n3     number = value;\n\
    4   }\n```\n\nNow, the method signature always contains `value`, which might be\
    \ meaningless. Next approach:\n\n```\n 1                     private int     \
    \             fNumber;                \n                  2                  \
    \   public void                  setNumber(                  int             \
    \     number){                \n3     fNumber = number;\n4   }\n```\n\nNow we\
    \ have different names for field and local variables, but it’s harder to read.\
    \ And according to the “rules” of camelCase, the variable name becomes uppercase.\
    \ Let’s try the underscore:\n\n```\n 1                     private int       \
    \           _number;                \n                  2                    \
    \ public void                  setNumber(                  int               \
    \   number){                \n3     _number = number;\n4   }\n```\n\nThe underscore\
    \ is less disturbing than any other prefix. The field name will be written in\
    \ lowercase as usual. The only drawback is that it doesn’t follow the full naming\
    \ convention.\n\nThere’s another common solution to this problem: using `this`:\n\
    \n```\n 1                     private int                  number;           \
    \     \n                  2                     public void                  setNumber(\
    \                  int                  number){                \n           \
    \       3                       this                  .number = number;      \
    \          \n4   }\n```\n\nIn my opinion, that fits the naming convention but\
    \ is a misuse of `this`. `this` refers to the object itself (other languages use\
    \ `self`). It’s very useful if an object needs to pass itself to some method or\
    \ create a fluent interface (such as a builder) to return itself. But here it’s\
    \ simply (mis)used to distinguish a field from a variable, which could be better\
    \ done by choosing a different name.\n\nLet’s take a look at copying a file within\
    \ a folder:\n\n```\ncopy file1 file2\n```\n\nIf you need to copy the folder, you\
    \ might use a dot:\n\n```\ncopy .\\otherFolder\n```\n\nAlthough it’s technically\
    \ possible to use the dot for a file in the current directory, you usually won’t\
    \ use\n\n```\ncopy .\\file1 .\\file2\n```\n\nor `cp ./file1 ./file2` the UNIX\
    \ way.\n\nThat looks strange and ugly—like `this.field` looks strange and ugly\
    \ to me.\n\nAnd if you’re a polyglot programmer, using C# too, you may know that\
    \ `this` prefix is very common in this Java sibling (both are C-like languages).\
    \ In rare cases, there might be a need to edit the source outside an IDE using\
    \ a simple editor without syntax coloring. As a side effect, the underscore is\
    \ very helpful in identifying a field in such situations.\n\nNow you know why\
    \ I’m using the underscore prefix for fields in all my projects, including this\
    \ book. But you are welcome to change it in your version of the downloaded sources.\n\
    \n# Afterword\n\nAlthough we just started with Alumni, the goal is not to describe\
    \ the whole application but interesting aspects with respect to JSF. Creating\
    \ a final class for example is similar to entering data as we did for Books. The\
    \ principle is the same, just the content is different.\n\nOf course, there might\
    \ be more JSF stuff to instruct. For example, JSF 2.2 introduced the flow scope.\
    \ This kind of scope has defined entry and exit points. It is really good if you\
    \ like to define a series of logically coupled pages like a wizard. Neither of\
    \ my application uses such a feature. They are designed in a way that the user\
    \ might navigate to any page at any time, improperly for the flow scope.\n\nInstead\
    \ of focusing on every JSF feature, this book focused on practical development\
    \ by real applications. You did not suffer every JSF detail, but you learned (I\
    \ hope you did) a lot of related Java EE technologies. These are the foundations\
    \ for you to create your own applications. I predict, enhancing your knowledge\
    \ will be relatively easily once you start developing with JSF. If you need more\
    \ than we covered within this book, please refer to the JSF and Java EE reference.\n\
    \nI’m going to finish this book before it gets oversized and boring. I hope you\
    \ enjoyed reading and found value in it.\n\nFollow my blog at [https://blog.mueller-bruehl.de](https://blog.mueller-bruehl.de).\
    \ And maybe you can leave a comment there about this book.\n\nStay tuned!\n\n\
    —Michael\n\n# Index"
