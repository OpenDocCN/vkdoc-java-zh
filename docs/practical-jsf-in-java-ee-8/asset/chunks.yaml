    of the current session. |

    | @RequestScoped | A bean annotated with @RequestScoped is bound to a single HTTP
    request. |

    | @ ConversationScoped | This binds the lifecycle to the period of a so-called
    *conversation*. By default, a conversation is in *transient* mode, which means
    it’s bound to a single request. But by invoking its start method, a conversation
    is set into *long-running* mode and will live until the end method is called.
    This allows the developer to control the lifecycle. |

    | @Dependent | This is a pseudo scope: the bean’s lifecycle depends on its owner’s
    lifecycle. This means its lifecycle depends on the bean it’s injected into. This
    is the default if no scope is defined. |


