    \ Selenium 的用途。\n"
- fmt: '# Summary


    `Selenium` is a tool for automating browsers. As such, it can be used to perform
    black box testing of your application. Luckily, it’s easy to use because this
    chapter could only provide a small peek at `Selenium`, which is much more powerful
    than these simple tests could show. `Selenium` can take automated snapshots, control
    remote browsers, and more. Besides black box testing of your application, you
    can use `Selenium` to test the GUI within different types of browsers. Standardization
    moves on, but there are still differences between the browser models. Thus, an
    application running well in one browser may show unexpected behavior in another
    browser or system.


    The intention of this chapter is simply to act as a kick-start for `Selenium`.
    Because this book is about JSF and Java EE, I don’t have room to discuss it further.
    But remember it for your testing scenarios of your web applications.


    © Michael Müller 2018


    Michael Müller, *Practical JSF in Java EE 8*, [https://doi.org/10.1007/978-1-4842-3030-5_8](https://doi.org/10.1007/978-1-4842-3030-5_8)


    # 8. TinyCalculator Recap


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    So far, we’ve discussed `TinyCalculator`, a small application developed for educational
    purposes. Using this application as an example, we’ve taken a short tour of some
    technical foundations, including the following:


    *   HTTP

    *   HTML

    *   CSS

    *   JavaScript

    *   Java

    *   Maven


    We discussed a sample servlet, the technology that implements JSF. Then we went
    on and looked at JSF itself, including these areas:


    *   View definition language

    *   JSF lifecycle

    *   JSF component libraries

    *   Component tree

    *   JSF markup versus HTML-friendly markup


    I introduced some essential configuration files used for JSF, Java EE, and GlassFish.
    Last but not least, we went over black box or GUI testing with `Selenium`.


    We’ve looked at the JSF environment as a big picture. Next, we’ll move on to bigger
    applications and dig deeper into the various aspects of web development with Java
    and JSF.


    The source code for `TinyCalculator` is available from [www.apress.com/book/9781484230299](http://www.apress.com/book/9781484230299).


    # Part II

    Books


    © Michael Müller 2018


    Michael Müller, *Practical JSF in Java EE 8*, [https://doi.org/10.1007/978-1-4842-3030-5_9](https://doi.org/10.1007/978-1-4842-3030-5_9)


    # 9. Preparing for Java EE 8


    Michael Müller^(1)


    (1)Brühl, Nordrhein-Westfalen, Germany


    So far, we’ve used NetBeans 8.2 with the bundled Glassfish 4.1 (the latest version
    at the time of writing). Java EE 7 was sufficient for `TinyCalculator` and the
    technical foundations, but now it’s time set up an Java EE 8-compliant environment.


    ## Current Evolution


    In the past, new releases of NetBeans have been in sync with new releases of the
    core Java language as well as Java EE. But things change. Oracle donated NetBeans
    to the Apache foundation ([http://netbeans.apache.org](http://netbeans.apache.org)),
    and the next Java EE release, formerly known as Java EE 9, will be developed under
    the umbrella of the Eclipse foundation. (You can read the announcement at [https://blogs.oracle.com/theaquarium/ee4j-eclipse-enterprise-for-java](https://blogs.oracle.com/theaquarium/ee4j-eclipse-enterprise-for-java)
    and its update at [https://blogs.oracle.com/theaquarium/opening-up-ee-update](https://blogs.oracle.com/theaquarium/opening-up-ee-update).)
    Its new name is Jakarta EE.


    The transition of NetBeans from Oracle to Apache is an ongoing process. Instead
    of releasing new versions for Java 9 and for Java EE 8, the process has stuck
    on clearing license information. As a result, this great IDE is available as a
    beta version at the time of writing, but sadly without the Java EE 8 features.
    The Java EE stuff will be part of a second donation from Oracle. That’s why you
    still get NetBeans 8.2 as the latest release, which includes Java EE out of the
    box.


    Luckily it’s not a big problem to update the application server and prepare NetBeans
    for Java EE 8 development. I hope that by the time this book is in your hands,
    NetBeans will be available for Java EE 8 to prevent this upgrade step. I’m going
    to provide some updated information on my blog, when available.


    However, knowing how to update parts of the environment is always helpful.


    ## Upgrade the Application Server


    Although Oracle stopped its commercial support for GlassFish, this application
    server still is used for the Java EE 8 reference implementation (RI). GlassFish
    5 is available for download at [https://javaee.github.io/glassfish/download](https://javaee.github.io/glassfish/download).
    Just download the GlassFish 5 full platform and unzip the file to any folder on
    your computer.


    In NetBeans, click Tools ➤ Servers ➤ Add Server. NetBeans starts a wizard to add
    a new server. From the available server types, choose GlassFish Server and enter
    the name **GlassFish Server 5** (or any other name of your choice), as shown in
    Figure [9-1](#A435433_1_En_9_Chapter.xhtml#Fig1).


    ![A435433_1_En_9_Fig1_HTML.jpg](OEBPS/Images/A435433_1_En_9_Fig1_HTML.jpg)


    ###### Figure 9-1 Add new server


    Click Next.


    ![A435433_1_En_9_Fig2_HTML.jpg](OEBPS/Images/A435433_1_En_9_Fig2_HTML.jpg)


    ###### Figure 9-2 Define the server location


    Type in your installation location or browse to the newly created folder containing
    the downloaded server. If everything is okay, NetBeans displays that it detected
    the server. Again, click Next > (All shown in Figure [9-2](#A435433_1_En_9_Chapter.xhtml#Fig2)).
    In this last screen of this wizard (not shown here), NetBeans asks for the domain.
    Leave this dialog untouched and click Finish. NetBeans adds the newly defined
    server to its repository. Now right-click onto the newly created project within
    the Projects tree view and choose Properties. In the project properties (Figure
    [9-3](#A435433_1_En_9_Chapter.xhtml#Fig3)), you can now choose this new server:
    right-click the project name in the Projects tree and choose Properties.


    Click Run. On the right you can now select the new server, as shown in Figure
    [9-3](#A435433_1_En_9_Chapter.xhtml#Fig3). Because NetBeans doesn’t know about
    Java EE 8, leave the Java EE Version box set to *Java EE 7 Web*. Remember, we’ll
    define the Java EE version in the project’s POM.


    ![A435433_1_En_9_Fig3_HTML.jpg](OEBPS/Images/A435433_1_En_9_Fig3_HTML.jpg)


    ###### Figure 9-3 Project properties


    ## Payara Server


    After Oracle stopped its commercial support for GlassFish, the Payara server came
    to life. This server is derived from GlassFish and adds frequent support to this
    project. A free version is available as well as a version with commercial support.
    Because it’s directly derived from GlassFish, you can use it instead. As a direct
    replacement, download your version from [www.payara.fish](http://www.payara.fish).
    At the time of writing, Payara 5 is available as beta version ([www.payara.fish/upstream_builds](http://www.payara.fish/upstream_builds)).
    Once you’ve downloaded it, follow the same installation steps described for GlassFish
    in the preceding paragraph.


    As I write, both GlassFish 5.0 and 5.0.1 betas have problems accessing CDI backing
    beans for JSF if using Servlet 4. If you’d like to use GlassFish 5, you need to
    provide Servlet version 3.1 in the `web.xml` configuration (see Chapter [6](#A435433_1_En_6_Chapter.xhtml)).
    It’s possible that this problem will be solved by the time you read this book.


    There’s no such problem if you use Payara 5, so I use this server for the next
    applications.


    ## Summary


    The current version of NetBeans doesn’t support Java EE 8 out of the box. To prepare
    for Java EE 8 development, you need to upgrade the application server to a Java
    EE 8-compliant version. This short chapter showed how to perform this upgrade.


