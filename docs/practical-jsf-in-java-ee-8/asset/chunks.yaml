  trans: '

    ###### 国际化与本地化


    *国际化*（常缩写为 *i18n*）是指让软件能够适配其他语言和地区的过程，而*本地化*（*L10n*）则是针对特定语言和地区进行适配。


    这两者都不仅仅是简单地将图形界面元素翻译成另一种语言。还需要考虑不同的日期格式、不同的符号（德国邮箱与美国邮箱的外观差异很大）、同一语言内因地区不同而产生的用词差异（如
    mailbox/postbox、localization/localisation、cellular phone/mobile phone）等等。


    ## 欢迎页面


    欢迎页面（或称着陆页）仅向访问者介绍应用程序的用途，并包含一些静态文本。考虑到国际用户，该文本以多种语言提供。


    在我的网站（it-rezension.de）上，我提供德语和英语两种语言，因为我阅读这两种语言的书籍。我对德语书籍的评论用德语撰写。我对英语书籍的评论则根据出版媒介（如印刷杂志或在线平台）用德语和/或英语撰写。因此，仅提供这两种语言对我的网站来说就足够了。但
    Books 应用程序的设计目标是能够根据需要以其他语言呈现。


    欢迎页面上只有文本。我们可以将国际化工作的重点放在以不同语言提供这些文本上。目前无需调整日期、数字格式或图标。我们将在处理 Alumni 应用程序时再探讨这些方面。


    ### 消息包


    为了实现目标，我们将使用所谓的*消息包*。这本质上是一个为 JSF 提供的资源包。*资源包*是一组遵循特殊命名约定的属性文件。即使你从未为国际市场开发过应用程序，也可能使用过属性文件来配置应用程序。每个文件都是一种键值存储。对于国际化和本地化，我们需要为每种语言准备这样一个文件。每个文件包含相同的键，但值已翻译成目标区域设置。如果用户的区域设置未知，应用程序必须提供一个默认值。惯例是使用简单的文件名作为默认值，并附加语言代码（ISO-639
    语言代码）以及可选的地区代码（ISO-3166 国家代码，极少数情况下还会加上变体）。你可以在互联网上的不同站点找到这些代码，例如在 Oracle 网站，ISO-3166
    国家代码和 ISO-639 语言代码可在 [`docs.oracle.com/cd/E13214_01/wli/docs92/xref/xqisocodes.html`](http://docs.oracle.com/cd/E13214_01/wli/docs92/xref/xqisocodes.html)
    找到。


    表 14-1 展示了一个示例。


    ###### 表 14-1 语言代码


    | 文件名 | 用途 |

    | --- | --- |

    | messages.properties | 默认 |

    | messages_de.properties | 德语 |

    | messages_en.properties | 英语 |

    | messages_en_US.properties | 英语（美国） |

    | messages_en_GB.properties | 英语（英国） |


    在此示例中，messages 是文件名。你可以选择任何你喜欢的其他名称。语言和地区（国家）代码附加在下划线之后。


    现在，让我们创建一个资源包，并讨论如何在我们的 Web 应用程序中使用它。


    使用 NetBeans，选择 New File ➤ Other ➤ Properties File，然后点击 Next。将出现 New Properties
    File 对话框，如图 14-1 所示。提供名称 **messages**，并在文件夹名称字段中输入 **src/main/resources/de/muellerbruehl/books**。你可以将
    de/muellerbruehl/books 替换为你选择的包名。点击 Browse 先浏览到现有的 src/main/resources 目录，然后补全名称。请注意，在
    Windows 系统上浏览时，你会看到 src\main\resources，因为 Windows 使用反斜杠作为文件夹分隔符。你可以输入正斜杠或反斜杠——对话框都能识别。点击
    Finish 创建属性文件。


    ![A435433_1_En_14_Fig1_HTML.jpg](img/A435433_1_En_14_Fig1_HTML.jpg)


    ###### 图 14-1 New Properties File 对话框


    NetBeans 会创建一个新文件并在编辑器中打开它。如果 NetBeans 在此文件中放置了任何内容，请将其删除，保存文件，然后在编辑器中关闭它。


    在项目树中，右键点击 messages.properties 文件（图 14-2），然后选择 Add ➤ Locale。


    ![A435433_1_En_14_Fig2_HTML.jpg](img/A435433_1_En_14_Fig2_HTML.jpg)


    ###### 图 14-2 项目树


    NetBeans 会显示 New Locale 向导，如图 14-3 所示。


    ![A435433_1_En_14_Fig3_HTML.jpg](img/A435433_1_En_14_Fig3_HTML.jpg)


    ###### 图 14-3 New Locale 向导


    如你所见，你可以选择一种语言和一个地区（国家和变体）。对于 Books，输入 **en** 并点击 OK 或按 Enter 键。NetBeans 会为你创建相应的属性文件（messages.properties
    和 messages_en.properties）。再为 **de**（德语）添加第二个文件，从而创建一个 messages_de.properties 文件。如果你了解语言代码，则无需使用
    New Locale 向导；你可以直接按照正确的名称创建文件，这只需在属性文件名后附加正确的语言代码即可。如果你偏好的 IDE 不提供此类向导，你也可以这样做。要提供同一语言的不同版本，你需要附加正确的变体，例如
    messages_en_US.properties（美国英语）或 messages_en_GB.properties（英国英语）。


    我们打算提供两种语言，但总共创建了三个属性文件。当然，我们可以将默认文件用于德语，另一个用于英语，但我建议为每种语言使用一个特定的文件，并将默认文件作为后备。


    我们页面标题的文本位于键 headWelcome 中。你可以像图 14-4 那样编辑属性文件，但你必须将键输入到每个文件中以保持文件同步，这可能是一项繁琐的工作。为了方便编辑，NetBeans
    提供了一个特殊的属性编辑器，如图 14-4 所示。右键点击任意一个属性文件，选择 Open——不要选择 Edit，因为那会在文本编辑器中打开单个文件。你可以通过选择
    New Property 来创建新的键值对，如图 14-5 所示。


    ![A435433_1_En_14_Fig4_HTML.jpg](img/A435433_1_En_14_Fig4_HTML.jpg)


    ###### 图 14-4 属性文件编辑器


    ![A435433_1_En_14_Fig5_HTML.jpg](img/A435433_1_En_14_Fig5_HTML.jpg)

    '
- fmt: "###### Figure 14-5 New Property dialog\n\nFor Key enter `headWelcome`, and\
    \ for Value enter `Welcome to my IT book-reviews`. Optionally provide a comment.\
    \ Click OK or press Enter.\n\nNetBeans inserts the new property into every properties\
    \ file—not into every properties file of the project, but the resource bundle\
    \ `messages`. An entry looks like this: `headWelcome=Welcome to my IT book-reviews`.\
    \ Now only one file, for German, has to be adapted, which might be done directly\
    \ in the properties files editor: `Willkommen zu meinen IT-Rezensionen`.\n\nNext,\
    \ create a property with the key `textWelcome`. Its value will become a multi-line\
    \ text with some line breaks. For example:\n\n* Discover the books I’ve reviewed.\
    \ Get references to the printed publication or links to online reviews.\n* Please\
    \ choose from the categories or enter a term for searching. Or you might choose\
    \ from the list of reviews published on this site.\n* To help offset parts of\
    \ the server fees, I participate the Amazon partner program. If you follow a link\
    \ from a cover image to buy something from Amazon, you will help to finance this\
    \ site. Of course, you may buy the books wherever you like.\n* This site is powered\
    \ by JavaServer Faces technology. Read about the implementation in my book <a\
    \ href=\"http://leanpub.com/jsf\"> Web Development with Java and JSF</a> and in\
    \ my blog <a href=\"http://blog.mueller-bruehl.de/en/\">[blog.mueller-bruehl.de]</a>.\n\
    \nClick the appropriate field of the `de – German` column and enter a German version\
    \ of the welcome text, something like this:\n\n* Durchstöbern Sie die Liste der\
    \ von mir verfassten Buch-Rezensionen. Diese ist mit Verweisen auf die entsprechende\
    \ Publikation oder einem Online-Link versehen. Diverse Rezensionen befinden sich\
    \ gleich auf dieser WebSite.\n* Wählen Sie eine Kategorie oder geben Sie eine\
    \ Suchbegriff ein, um die entsprechenden Bücher aufzurufen. Oder wählen Sie aus\
    \ der Liste der letzten Rezensionen.\n* Um einen Teil der Serverkosten zu decken,\
    \ nehme ich am Amazon-Partnerprogramm teil. Wenn Sie eines der Bücher, oder einen\
    \ anderen Artikel bei Amazon bestellen möchten, nutzen Sie einen Link von dieser\
    \ Seite (Klick auf eine Buch-Abbildung). Sie unterstützen damit den Betrieb dieser\
    \ WebSite. Selbstverständlich steht Ihnen frei, die Bücher auch von anderer Stelle\
    \ zu beziehen.\n* Diese WebSite ist mit der JavaServer Faces Technologie realisiert.\
    \ Erfahren Sie Details zur Implementierung in meinem Buch <a href=\"http://leanpub.com/jsf\"\
    > “Web Development with Java and JSF”</a> oder stöbern Sie in meinem JSF Turorial\
    \ auf meinem Blog <a href=\"http://blog.mueller-bruehl.de/en/\"> [blog.mueller-bruehl.de]</a>.\n\
    \nOnce you’ve created the properties files, how do you use it with JSF?\n\nYou\
    \ need to create a `faces-config.xml` file (see “Configuration files” in Part\
    \ I) in the `WEB-INF` folder, shown in Listing [14-1](#A435433_1_En_14_Chapter.xhtml#PC1).\
    \ If you create this file with NetBeans, it will be generated with the appropriate\
    \ namespaces.\n\n###### Listing 14-1 faces-config.xml\n\n```\n 1   <?xml version='1.0'\
    \ encoding='UTF-8'?>\n 2   <faces-config version=\"2.3\"\n 3                 xmlns:=\"\
    http://xmlns.jcp.org/xml/ns/javaee\"\n 4                 xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
    \n 5                 xsi:schemaLocation=\"http://xmlns.jcp.org/xml/ns/javaee\n\
     6                 http://xmlns.jcp.org/xml/ns/javaee/web-facesconfig_2_2.xsd\"\
    >\n\n 8     <application>\n 9       <locale-config>\n10         <default-locale>en</default-locale>\n\
    11         <supported-locale>de</supported-locale>\n12         <supported-locale>en</supported-locale>\n\
    13       </locale-config>\n14       <resource-bundle>\n15         <base-name>de.muellerbruehl.books.messages</base-name>\n\
    16         <var>msg</var>                                                    \
    \                                          \n17       </resource-bundle>\n18       <message-bundle>de.muellerbruehl.books.messages</message-bundle>\n\
    19     </application>\n\n21   </faces-config>\n```\n\nWithin the `<application>`\
    \ tag, we define the different locales we want to use (lines 9-14). Within `<locale-config>`,\
    \ we can define our default language as well as other languages. Because Books\
    \ supports (at least) two languages, we need to declare English and German here.\
    \ English (`en`) is used as the default locale (line 10), and German (`de`) is\
    \ defined as supported locale (line 11). English is defined as supported locale,\
    \ too (line 12). Although you could use English without re-declaring it as supported\
    \ locale, this declaration is useful to query all the supported languages. Any\
    \ locale that should be supported by the application needs to be declared here.\n\
    \nNext, we define a resource bundle (`<resource-bundle>`, lines 14 to 17). This\
    \ defines the resources we want to access in our pages. It’s defined by the full\
    \ package and filename, without the properties extension. `<var>` defines the\
    \ variable name we can use within a JSF page to address this bundle.\n\nSometimes\
    \ it’s very useful to overwrite a couple of JSF’s standard messages. We’ll do\
    \ this by providing a localized text stored together with the same key JSF uses.\
    \ `<message-bundle>` (line 18) declares the properties files (without locale and\
    \ extension). Within Books we use one file group for all of our texts. Thus, the\
    \ message bundle points to the same files. It could have been a different group\
    \ of properties files.\n\nIn `web.xml` (located in the same folder), we change\
    \ the welcome file entry to `<welcome-file>welcome.xhtml</welcome-file>`.\n\n\
    ### Naive Welcome Page Implementation\n\nThe welcome page should simply display\
    \ the heading and the text. Like the category editor, it uses the existing template.\
    \ Thus, we have to define a `<ui:composition>`. This is a first naive implementation,\
    \ as shown in Listing [14-2](#A435433_1_En_14_Chapter.xhtml#PC2), with the output\
    \ shown in Figure [14-6](#A435433_1_En_14_Chapter.xhtml#Fig6).\n\n###### Listing\
    \ 14-2 First Draft of welcome.xhtml\n\n```\n 1   <?xml version='1.0' encoding='UTF-8'\
    \ ?>\n 2   <!DOCTYPE html>\n 3   <ui:composition xmlns:=\"http://www.w3.org/1999/xhtml\"\
    \n 4                   xmlns:h=\"http://xmlns.jcp.org/jsf/html\"\n 5                   xmlns:ui=\"\
    http://xmlns.jcp.org/jsf/facelets\"\n 6                   template=\"/booksTemplate.xhtml\"\
    >\n\n 8     <ui:define name=\"content\">\n 9       <h1>#{msg.headWelcome}</h1>\n\
    10       <p>\n11         #{msg.textWelcome}\n12       </p>\n13     </ui:define>\n\
    \n15   </ui:composition>\n```\n\nIf you’re familiar with HTML, you might be able\
    \ to guess what the problem will be: HTML ignores line breaks made by CR or CRLF.\
    \ And the embedded HTML elements (links) wouldn’t be interpreted. As a result,\
    \ the welcome text wouldn’t be properly formatted. Anyway, you can use this page\
    \ to check the localization. Using a browser with German as default locale, the\
    \ page would be displayed in German, otherwise it would be shown in English.\n\
    \n![A435433_1_En_14_Fig6_HTML.jpg](OEBPS/Images/A435433_1_En_14_Fig6_HTML.jpg)\n\
    \n###### Figure 14-6 Welcome page with innocent implementation (English version)\n\
    \n###### Check Another Locale\n\nTry changing the language setting of your browser.\
    \ For example, in Firefox choose Options ➤ Content ➤ Languages. Add the desired\
    \ language if not present and move it to the top. Using Chrome, you have to expand\
    \ the settings to the extended view first. Declare German as the default (or if\
    \ your default had been German, set it to English). Reload the application. The\
    \ language should change.\n\nThen set the default to any other (non-English, non-German)\
    \ language and reload the app. It should display the English version."
