  **</hibernate-mapping>**\n\n**如果你从数据库 GUI 工具（本例中为 Squirrel）打印 **CREATE TABLE** 脚本，它看起来像这样：\n\
  \n****CREATE TABLE \"BOOK6\".\"BOOK61_CHAPTER\"**\n\n**(**\n\n**BOOK_ID bigint NOT\
  \ NULL,**\n\n**CHAPTER_NAME varchar(255) NOT NULL,**\n\nCONSTRAINT SQL091222210546110\
