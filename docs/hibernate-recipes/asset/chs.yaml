  \nSrinivas Guruzu\n\n*亚利桑那州斯科茨代尔*\n\nxxi\n\n**第 1 章**\n\n■ ■ ■\n\n**Hibernate 入门**\n\
  \n\n\n*对象模型*运用了抽象、封装、模块化、层次结构、类型化、并发、多态和持久化等原则。对象模型使你能够创建结构良好、复杂的系统。在对象模型系统中，*对象*是系统的组成部分。对象是类的实例，而类通过继承关系与其他类相关联。对象具有标识、状态和行为。对象模型有助于你创建可重用的应用程序框架和能够随时间演进的系统。此外，面向对象系统通常比非面向对象实现更小。\n\
  \n*关系模型*定义了数据的结构、数据操作和数据完整性。数据以表的形式组织，不同的表通过参照完整性（外键）关联。主键、唯一检查约束和非空等完整性约束用于在关系模型中维护实体的完整性。\n\
  \n关系数据模型并不专注于支持实体类型的继承：来自对象模型的基于实体的多态关联无法转换为关系模型中的类似实体。在对象模型中，你使用模型的状态来定义对象之间的相等性。但在关系模型中，你使用实体的主键来定义实体的相等性。对象引用用于在对象模型中关联不同的对象，而外键则用于在关系模型中建立关联。对象模型中的对象引用有助于更轻松地遍历对象图。\n\
  \n由于这两种模型截然不同，你需要一种方法将对象实体（Java 对象）持久化到关系数据库中。图 1-1 和图 1-2 提供了对象模型和关系模型的简单表示。\n\n\
  *图 1-1\\. Book 和 Publisher 的实体关系（ER）图*\n\n第 1 章 ■ 从 Hibernate 开始\n\n*图 1-2\\. Book\
  \ 和 Publisher 的类图*\n\n对象/关系映射（ORM）框架帮助你利用对象模型（如 Java）和关系模型（如数据库管理系统 [DBMS]）中的特性。借助\
  \ ORM 框架，你可以使用描述对象与数据库之间映射的元数据，将 Java 中的对象持久化到关系表中。元数据屏蔽了直接处理 SQL 的复杂性，并帮助你以业务对象的方式开发解决方案。\n\
  \nORM 解决方案可以在不同层次实现：\n\n• *纯关系型：* 应用程序围绕关系模型设计。\n\n• *轻量对象映射：* 实体表示为类，并手动映射到关系表。\n\
  \n• *中等对象映射：* 应用程序使用对象模型设计，并在构建时通过代码生成工具生成 SQL。\n\n• *完全对象映射：* 此映射支持复杂的对象建模，包括组合、继承、多态以及通过可达性实现的持久化。\n\
  \n使用 ORM 框架的好处如下：\n\n• *生产力：* 由于你使用元数据来持久化和查询数据，开发时间减少，生产力提高。\n\n• *原型开发：* 使用 ORM\
  \ 框架对于快速原型开发极为有用。\n\n• *可维护性：* 由于大部分工作通过配置完成，你的代码行数更少，因此维护需求也更少。\n\n第 1 章 ■ 从 Hibernate\
  \ 开始\n\n• *供应商无关性：* ORM 将应用程序与底层 SQL 数据库和 SQL 方言抽象开来。这为你提供了支持多个数据库的可移植性。\n\nORM\
  \ 框架也有一些缺点：\n\n• *学习曲线：* 在学习如何映射以及可能学习新的查询语言时，你可能会经历陡峭的学习曲线。\n\n• *开销：* 对于使用单一数据库且数据没有复杂查询业务需求的简单应用程序，ORM\
  \ 框架可能是额外的开销。\n\n• *性能较慢：* 对于大型批量更新，性能较慢。\n\nHibernate 是业界使用最广泛的 ORM 框架之一。它提供了 ORM\
  \ 解决方案的所有好处，并实现了 Enterprise JavaBeans (EJB) 3.0 规范中定义的 Java Persistence API (JPA)。\n\
  \n其主要组件如下：\n\n• *Hibernate Core：* Core 生成 SQL，使你免于手动处理 Java 数据库连接（JDBC）结果集和对象转换。元数据在简单的\
  \ XML 文件中定义。Core 提供了多种编写查询的选项：纯 SQL；Hibernate 特有的 Hibernate 查询语言（HQL）；编程式条件查询，或按示例查询（QBE）。它可以通过各种抓取和缓存选项来优化对象加载。\n\
  \n• *Hibernate Annotations：* 随着 JDK 5.0 中注解的引入，Hibernate 提供了使用注解定义元数据的选项。这减少了使用\
  \ XML 文件的配置，并使得直接在 Java 源代码中定义所需的元数据变得简单。\n\n• *Hibernate EntityManager：* JPA 规范定义了编程接口、持久化对象的生命周期规则以及查询特性。Hibernate\
  \ 对 JPA 这一部分的实现以 Hibernate EntityManager 的形式提供。\n\n本书为每个问题提供了使用 Hibernate Core 和\
  \ Annotations 的解决方案。使用的 Hibernate 版本是 3.3.2。\n\n1.1 设置 Hibernate\n\n问题\n\n设置 Hibernate\
  \ 并开始使用需要哪些工具和库？\n\n解决方案\n\n你需要 JDK 1.5+、一个 IDE（如 Eclipse）、一个数据库（本书使用 Apache Derby）以及\
  \ SQL Squirrel 来提供使用数据库的 GUI。你也可以使用 Maven 来配置你的项目。Maven 是一个软件项目管理和理解工具。基于项目对象模型（POM）的概念，Maven\
  \ 可以从一个中心信息点管理项目的构建、报告和文档。在 Maven 中，POM.XML 是存储所有信息的核心文件。\n\nHibernate 3.3.2 设置需要以下库：\n\
  \n• **Hibernate3.jar**\n\n• **Hibernate-commons-annotations.jar**\n\n• **Hibernate-annotations.jar**\n\
  \n• **Hibernate-entitymanager.jar**\n\n• **Antlr-2.7.6.jar**\n\n• **Commons-collections-3.1.jar**\n\
  \n• **Dom4j-1.6.1.jar**\n\n• **Javassist-3.9.0.GA.jar**\n\n• **Jta-1.1.jar**\n\n\
  • **Slf4j-api-1.5.8.jar**\n\n• **Ejb3-persistence.jar**\n\n• **Slf4j-simple1.5.8.jar**\n\
  \nDerby 设置需要以下库：\n\n• **Derby.jar**\n\n• **Derbyclient.jar**\n\n• **Derbynet.jar**\n\
  \n• **Derbytools**。\n\n工作原理\n\n接下来的几节将描述如何设置每个必需的工具，然后提供问题的解决方案。所有解决方案均在 Windows\
  \ 平台上提供。它们也可以在 UNIX 上实现，前提是你安装并下载适用于 UNIX 平台的库和可执行文件（如适用）。\n\n安装 JDK\n\nJDK 是为 Java\
  \ 应用程序开发提供的基本工具包。你可以访问 [**http://java.sun.com/j2se/1.5.0/download.jsp**](http://java.sun.com/j2se/1.5.0/download.jsp)\
  \ 下载 JDK 5.0。将其安装到诸如 **C:\\jdk1.5.0** 的文件夹中。\n\n第 1 章 ■ 从 Hibernate 开始\n\n安装 Eclipse\
  \ Web 工具平台（WTP）\n\nEclipse 是用于开发 Java 应用程序的 IDE。最新版本是 Galileo。你可以从以下 URL 安装它：\n\n\
  [**www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/galileo/SR1/ecli**](http://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/galileo/SR1/ecli)\n\
  \n**pse-jee-galileo-SR1-win32.zip**。\n\n**安装 Derby\n\nDerby 是一个用 Java 编写的开源 SQL\
  \ 关系数据库引擎。你可以访问\n\n\n\n请访问[**http://db.apache.org/derby/derby_downloads.html** 并下载](http://db.apache.org/derby/derby_downloads.html)最新版本。Derby\
  \ 还为 Eclipse 提供了插件。该插件不仅提供了开发所需的 jar 文件，还在 Eclipse 中提供了一个命令提示符（**ij**），用于执行数据定义语言（DDL）和数据操作语言（DML）语句。\n\
  \n创建 Derby 数据库实例\n\n要在 **ij** 提示符下创建一个名为 BookShopDB 的新 Derby 数据库，请使用以下命令：\n\n****connect\
  \ 'jdbc:derby://localhost:1527/BookShopDB;create=true;**\n\n**user=book;password=book';**\n\
  \n**数据库创建完成后，请执行下一节中的 SQL 脚本来创建表。\n\n创建表（关系模型）\n\n这些解决方案以书店为例。图书由出版社出版，图书的内容由章节定义。**Book**、**Publisher**\
  \ 和 **Chapter** 这些实体存储在数据库中；您可以执行各种操作，例如读取、更新和删除。\n\n由于 ORM 是对象模型和关系模型之间的映射，因此您首先通过执行\
  \ DDL 语句来创建关系模型，从而在数据库中创建表/实体。稍后您将看到 Java 中的对象模型，最后看到关系模型与对象模型之间的映射。\n\n使用以下 SQL\
