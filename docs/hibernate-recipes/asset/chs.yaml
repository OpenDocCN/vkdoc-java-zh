  \n第 6 章 ■ 集合映射\n\n*图 6-2\\. **BOOK**与**BOOK_CHAPTER**之间通过**idbag**关联的实体关系图* JPA\
  \ 注解的**Book**类使用**CollectionId**和**GenericGenerator**注解来定义主键：\n\n****@Entity**\n\
  \n**@Table (name=\"BOOK6_21\", schema=\"BOOK6\")**\n\n**public class Book_6_21 implements\
