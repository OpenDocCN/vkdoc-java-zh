  Contact\">**\n\n**<property name=\"recipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\"\
  \ />**\n\n**<component name=\"phone\" class=\"Phone\">**\n\n**<property name=\"\
  areaCode\" type=\"string\" column=\"WEEKDAY_AREACODE\" />** 60\n\n第 3 章 ■ 组件映射\n\
  \n**<property name=\"telNo\" type=\"string\" column=\"WEEKDAY_TELEPHONE\" />**\n\
  \n**</component>**\n\n<many-to-one name=\"address\" class=\"Address\" column=\"\
  WEEKDAY_ADDRESS_ID\" />\n\n**</component>**\n\n**<component name=\"holidayContact\"\
  \ class=\"Contact\">**\n\n**<property name=\"recipient\" type=\"string\" column=\"\
  HOLIDAY_RECIPIENT\" />**\n\n**<component name=\"phone\" class=\"Phone\">**\n\n**<property\
  \ name=\"areaCode\" type=\"string\" column=\"HOLIDAY_AREACODE\" />**\n\n**<property\
  \ name=\"telNo\" type=\"string\" column=\"HOLIDAY_TELEPHONE\" />**\n\n**</component>**\n\
