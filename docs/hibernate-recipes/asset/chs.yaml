  \ 内存 是\n\nEHCache\n\n**org.hibernate.cache.EHCacheProvider**\n\n内存，\n\n是\n\n磁盘\n\
  \nOSCache\n\n**org.hibernate.cache.OSCacheProvider**\n\n内存，\n\n是\n\n磁盘\n\nJBoss\
  \ Cache\n\n**org.hibernate.cache.JBossCacheProvider**\n\n集群化，\n\n是\n\nIP 多播\n\n\
