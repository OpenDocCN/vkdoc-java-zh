  \ 启用乐观并发控制**\n\n**问题**\n\n假设两个事务正在尝试更新数据库中的一条记录。第一个事务成功更新并提交。第二个事务尝试更新但失败，因此该事务被回滚。问题是第一次更新丢失了。或者，如果第二个事务成功更新，如表\
  \ 13-1 所示，会发生什么？第一个事务所做的更改会被覆盖。\n\n*表 13-1. 丢失更新：事务 1 的更新丢失*\n\n\n\n**时间事务**\n\n\
  **账户**\n\nT1\n\n事务 1 开始。\n\nT2\n\n事务 2 开始。\n\nT3\n\n事务 1 更新记录 R1。\n\nT4\n\n事务 2\
  \ 更新记录 R1。\n\nT5\n\n事务 1 提交。\n\nT6\n\n事务 2 提交。\n\n如何处理此类更新丢失的情况？以及如何在 Hibernate\
  \ 中启用版本控制？\n\n解决方案\n\n你需要理解隔离级别，以便选择合适的并发控制机制。对数据库记录的访问分为读取和写入。并发控制机制定义了决定何时允许读取和写入的规则。\n\
  \n当一个事务读取了另一个事务尚未提交的更改时，就会发生*脏读*（参见表 13-2）。基本上，脏读意味着读取未提交的数据。\n\n第 13 章 ■ 事务与并发\n\
  \n*表 13-2. 脏读：事务读取未提交的数据*\n\n**时间 事务**\n\n**账户**\n\nT1\n\n事务 1 开始。\n\nT2\n\n事务 2\
  \ 开始。\n\nT3\n\n事务 1 更新记录 R1。\n\nT4\n\n事务 2 读取未提交的记录 R1。\n\nT5\n\n事务 1 回滚其更新。\n\n\
  T6\n\n事务 2 提交。\n\n当一个事务两次读取同一条记录，且第一次和第二次读取时记录的状态不同，就会发生*不可重复读*。这通常发生在两次读取之间，另一个事务更新了该记录的状态（参见表\
  \ 13-3）。\n\n*表 13-3. 不可重复读：事务两次读取同一条记录*\n\n**时间 事务**\n\n**账户**\n\nT1\n\n事务 1 开始。\n\
  \nT2\n\n事务 1 读取记录 R1。\n\nT3\n\n事务 2 开始。\n\nT4\n\n事务 2 更新记录 R1。\n\nT5\n\n事务 2 提交。\n\
  \nT6\n\n事务 1 读取记录 R1（在时间 T2 读取的记录 R1\n\n与在时间 T6 读取时的状态不同）。\n\nT7\n\n事务 1 提交。\n\n\
  当一个事务执行两个相同的查询，而第二个查询返回的行集合与第一个不同时，就会发生*幻读*。这通常发生在两次读取之间，另一个事务向表中插入了记录或删除了记录。\n\n\
  第 13 章 ■ 事务与并发\n\n*表 13-4. 幻读：在事务期间读取大小发生变化的数据范围* **时间 事务**\n\n**账户**\n\nT1\n\n\
  事务 1 开始。\n\nT2\n\n事务 1 读取记录范围 RG1。\n\nT3\n\n事务 2 开始。\n\nT4\n\n事务 2 插入记录。\n\nT5\n\
  \n事务 2 提交。\n\nT6\n\n事务 1 读取记录范围 RG1\n\n（RG1 的大小从时间 T2 到 T6 发生了变化）。\n\nT7\n\n事务 1\
  \ 提交。\n\n*隔离性*定义了一个事务所做的更改如何以及何时对其他事务可见。隔离性是 ACID 属性之一。为了获得更好的性能和并发控制，ANSI SQL 标准将隔离性划分为多个级别，这些级别定义了选择数据时的锁定程度。四个隔离级别如下（另见表\
  \ 13-5）：\n\n• *可串行化：* 事务串行执行，一个接一个。此隔离级别允许事务对其影响的整个数据范围获取读锁或写锁。可串行化隔离级别可防止脏读、不可重复读和幻读，但可能导致应用程序出现可伸缩性问题。\n\
  \n• *可重复读：* 获取读锁和写锁。此隔离级别不允许脏读或不可重复读。它也不获取范围锁，这意味着它允许幻读。读锁可防止其他并发事务获取任何写锁。此级别仍可能存在一些可伸缩性问题。\n\
  \n• *读已提交：* 读锁被获取并立即释放，写锁在事务结束时获取并释放。此隔离级别不允许脏读，但允许不可重复读和幻读。通过结合使用持久化上下文和版本控制，你可以实现可重复读隔离级别。\n\
  \n\n\n• *读未提交：* 一个事务所做的更改在提交之前就对其他事务可见。允许所有类型的读取，包括脏读。不建议使用此隔离级别。如果事务未提交的更改被回滚，其他并发事务可能会受到严重影响。\n\
  \n第 13 章 ■ 事务与并发\n\n*表 13-5\\. 总结各种隔离级别允许的读取操作* **隔离级别**\n\n**脏读**\n\n**不可重复读**\n\
  \n**幻读**\n\n可序列化\n\n- - -\n\n可重复读\n\n- - 允许\n\n读已提交\n\n-\n\n允许\n\n允许\n\n读未提交\n\n\
  允许 允许 允许\n\n每个数据库管理系统都有默认的隔离级别设置。你可以在数据库管理系统配置中更改默认隔离级别。在 JDBC 上，你可以通过名为**hibernate.connection.isolation**的属性来设置隔离级别。Hibernate\
  \ 使用以下值来设置特定的隔离级别：\n\n• 8：可序列化隔离\n\n• 4：可重复读隔离\n\n• 2：读已提交隔离\n\n• 1：读未提交隔离\n\n此设置仅当连接不是从应用服务器获取时适用。在这种情况下，你需要在应用服务器配置中更改隔离级别。\n\
  \n现在，让我们回到本方案开头描述的丢失更新案例（也在表 13-1 中）。你已经看到了一个案例，其中事务 1 所做的更新在事务 2 提交时丢失。大多数应用程序使用读已提交隔离的数据库连接，并采用乐观并发控制。实现乐观控制的一种方法是使用版本控制。\n\
  \n工作原理\n\nHibernate 提供自动版本控制。每个实体都可以有一个版本，可以是数字或时间戳。当实体被修改时，Hibernate 会递增该数字。如果你使用旧版本进行保存（就像丢失更新问题中的事务\
  \ 2 那样），Hibernate 会自动比较版本并抛出异常。\n\n要向实体添加版本号，你需要添加一个名为**version**、类型为**int**或**Integer**的属性：\n\
  \n**public class BookCh2 {**\n\n**private long isbn;**\n\n**private String name;**\n\
  \n**private Date publishDate;**\n\n**private int price;**\n\nprivate int version;\n\
  \n**}**\n\n**231\n\n第 13 章 ■ 事务与并发\n\n在**book.xml**配置文件中，添加**version**元素。请注意，**version**元素必须紧跟在**id**元素之后：\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter2\" auto-import=\"\
  false\" >**\n\n**<import class=\"BookCh2\" rename=\"bkch2\"/>**\n\n**<class name=\"\
  BookCh2\" table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\"**\n\n**schema=\"\
  BOOK\">**\n\n**<id name=\"isbn\" column=\"isbn\" type=\"long\">**\n\n**<generator\
  \ class=\"hilo\">**\n\n**</generator>**\n\n**</id>**\n\n<version name=\"version\"\
  \ access=\"field\" column=\"version\"></version>\n\n**<property name=\"name\" type=\"\
  string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**在**BOOK**表中会创建一个名为**version**的新列。使用\
  \ JPA 时，将**version**变量添加到**Book**类，并使用**Version**元素对其进行注解：\n\n**@Entity (name=\"\
  bkch2\")**\n\n**@org.hibernate.annotations.Entity(dynamicInsert = true, dynamicUpdate\
  \ = true)**\n\n**@Table (name=\"BOOK\")**\n\n**public class BookCh2 {**\n\n****@Id**\n\
  \n**@GeneratedValue (strategy=GenerationType.TABLE)**\n\n**@Column (name=\"ISBN\"\
  )**\n\n**private long isbn;**\n\n**@Version\n\n@Column (name=\"version\")\n\nprivate\
  \ Integer version;\n\n****@Column (name=\"book_Name\")**\n\n**private String bookName;**\n\
  \n****/*@Column (name=\"publisher_code\")**\n\n**String publisherCode;*/**\n\n****@Column\
  \ (name=\"publish_date\")**\n\n**private Date publishDate;**\n\n****@Column (name=\"\
  price\")**\n\n**private Long price;**\n\n**// getters and setters**\n\n**}**\n\n\
  **你也可以通过添加**Date**类型的变量来使用时间戳进行版本控制：\n\n**232\n\n第 13 章 ■ 事务与并发\n\n**public class\
  \ BookCh2 implements Serializable{**\n\n**private long isbn;**\n\n**private String\
  \ name;**\n\n**private Date publishDate;**\n\n**private int price;**\n\n**private\
  \ Date timestamp;**\n\n**// getters and setters**\n\n**}**\n\n**XML 映射文件包含一个**timestamp**元素，如下所示：\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter2\" auto-import=\"\
  false\" >**\n\n**<import class=\"BookCh2\" rename=\"bkch2\"/>**\n\n**<class name=\"\
  BookCh2\" table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\"**\n\n**schema=\"\
  BOOK\">**\n\n**<id name=\"isbn\" column=\"isbn\" type=\"long\">**\n\n**<generator\
  \ class=\"hilo\">**\n\n**</generator>**\n\n**</id>**\n\n<timestamp name=\"timestamp\"\
  \ access=\"field\" column=\"timestamp\"></timestamp>\n\n**<property name=\"name\"\
  \ type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"\
  int\" column=\"PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**你也可以通过在类映射上使用**optimistic-lock**属性来实现版本控制，而无需版本或时间戳。这仅在实体在同一会话中被检索和修改时有效。它不适用于分离对象。如果你需要对分离对象使用乐观并发控制，则必须使用版本或时间戳：\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter2\" auto-import=\"\
  false\" >**\n\n**<import class=\"BookCh2\" rename=\"bkch2\"/>**\n\n<class name=\"\
  BookCh2\" table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\"\n\nschema=\"\
  BOOK\" optimistic-lock=\"all\">\n\n**<id name=\"isbn\" column=\"isbn\" type=\"long\"\
  >**\n\n**<generator class=\"hilo\">**\n\n**</generator>**\n\n**</id>**\n\n**<property\
  \ name=\"name\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"\
