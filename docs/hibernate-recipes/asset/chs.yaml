  ,\n\nschema=\"BOOK6\",\n\njoinColumns=@JoinColumn(name=\"BOOK_ID\")\n\n)\n\n@Column(name=\"\
  chapter_name\")\n\n第 6 章 ■ 集合映射\n\nprivate Set chapters;\n\n**// getters and setters**\n\
  \n**}**\n\n**@CollectionOfElements** 注解用于声明正在映射的集合中存放的对象类型。**@JoinTable** 注解提供了关联表的详细信息，并包含用于映射两个表的连接列。**@Column**\
  \ 注解提供了列名。\n\n6.2 映射 Bag\n\n问题\n\n\n\n*包（bag）*是一个允许包含重复对象的集合。它没有任何顺序。它有点像 **ArrayList**，但不保留索引。如何将**值**类型映射为**包**类型的集合？**包**和**标识包（idbag）**之间有什么区别？如何使用**标识包**进行映射？\n\
  \n解决方案\n\nJava 集合 API 中并没有称为**包**的东西。想要使用类似包语义的 Java 开发者会使用 **java.util.List** 实现。Hibernate\
  \ 也采用相同方式，要求实现为 **ArrayList**。Hibernate 建议使用 **java.util.Collection** 或 **java.util.List**\
  \ 作为映射**包**的接口。当使用 **<bag>** 元素进行映射时，连接表没有主键。**标识包**与**包**类似，但它为连接表添加了一个主键。\n\n\
  工作原理\n\n**Book** 类有一个名为 **chapters** 的属性，其类型为 **java.util.Collection**。该属性被初始化为\
  \ **ArrayList**：\n\n```java\npublic class Book6_2 implements Serializable{\n\n \
  \   private Long book_id;\n\n    private String isbn;\n\n    private String name;\n\
  \n    private Date publishDate;\n\n    private Integer price;\n\n    private Collection\
  \ chapters = new ArrayList();\n\n    // getters and setters\n\n}\n```\n\n在书的 Hibernate\
  \ 映射文件中，使用 **bag** 元素将章节与书关联起来。该关联映射到一个没有主键的单独表中。这就是允许集合中存在重复元素所带来的影响：\n\n```xml\n\
  <!-- 第 6 章 集合映射 -->\n<hibernate-mapping package=\"com.hibernaterecipes.chapter6\"\
  >\n    <class name=\"Book6_2\" table=\"Book6_2\" schema=\"BOOK6\">\n        <id\
  \ name=\"book_id\" type=\"long\" column=\"BOOK_ID\" >\n            <generator class=\"\
  native\">\n            </generator>\n        </id>\n        <property name=\"isbn\"\
  \ type=\"string\">\n            <column name=\"ISBN\" length=\"50\" not-null=\"\
  true\" unique=\"true\" />\n        </property>\n        <property name=\"name\"\
  \ type=\"string\">\n            <column name=\"BOOK_NAME\" length=\"100\" not-null=\"\
  true\" />\n        </property>\n        <property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />\n        <property name=\"price\" type=\"int\" column=\"\
  PRICE\" />\n        <bag name=\"chapters\" table=\"Book62_Chapter\" schema=\"BOOK6\"\
  >\n            <key column=\"BOOK_ID\"></key>\n            <element type=\"string\"\
  \ column=\"CHAPTER_NAME\" not-null=\"true\"></element>\n        </bag>\n    </class>\n\
  </hibernate-mapping>\n```\n\n在 JPA 中，**Book** 类具有以下注解：\n\n```java\n@Entity\n@Table\
  \ (name=\"BOOK6_2\", schema=\"BOOK6\")\npublic class Book_6_2 implements Serializable{\n\
  \n    @Id\n    @Column (name=\"BOOK_ID\")\n    @GeneratedValue (strategy=GenerationType.AUTO)\n\
  \    private Long book_id;\n\n    @Column (name=\"isbn\")\n    private String isbn;\n\
  \n    @Column (name=\"BOOK_NAME\")\n    private String name;\n\n    @Column (name=\"\
  price\")\n    private Integer price;\n\n    @CollectionOfElements (targetElement=java.lang.String.class)\n\
  \    @JoinTable(\n        name=\"Book62_Chapter\",\n        schema=\"BOOK6\",\n\
  \        joinColumns=@JoinColumn(name=\"BOOK_ID\")\n    )\n    @Column(name=\"chapter_name\"\
  )\n    private Collection chapters;\n\n    // getters and setters\n}\n```\n\n**CREATE\
  \ TABLE** 查询如下所示。请注意，它没有主键，并且书 ID 是连接表中的外键：\n\n```sql\nCREATE TABLE \"BOOK6\".\"\
  BOOK62_CHAPTER\"\n(\n    BOOK_ID bigint NOT NULL,\n    CHAPTER_NAME varchar(255)\
  \ NOT NULL\n);\n\nALTER TABLE BOOK62_CHAPTER\n    ADD CONSTRAINT FKD04B7D739C936CDA\n\
  \    FOREIGN KEY (BOOK_ID)\n    REFERENCES BOOK6_2(BOOK_ID);\n\nCREATE INDEX SQL091227211955140\
  \ ON BOOK62_CHAPTER(BOOK_ID);\n```\n\n当使用**标识包**进行映射时，Hibernate XML 文件包含 **collection-id**\
  \ 元素：\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter6\">\n\
  \    <class name=\"Book6_21\" table=\"Book6_21\" schema=\"BOOK6\">\n        <id\
  \ name=\"book_id\" type=\"long\" column=\"BOOK_ID\" >\n            <generator class=\"\
  native\">\n            </generator>\n        </id>\n        <property name=\"isbn\"\
  \ type=\"string\">\n            <column name=\"ISBN\" length=\"50\" not-null=\"\
  true\" unique=\"true\" />\n        </property>\n        <property name=\"name\"\
  \ type=\"string\">\n```\n\n\n\n**<column name=\"BOOK_NAME\" length=\"100\" not-null=\"\
