  \ price;**\n\n**@CollectionOfElements (targetElement=java.lang.String.class)\n@JoinTable(\n\
  name=\"Book621_Chapter\",\nschema=\"BOOK6\",\njoinColumns=@JoinColumn(name=\"BOOK_ID\"\
  )\n)\n@GenericGenerator (name=\"hilo-gen\",strategy=\"hilo\")\n@CollectionId (columns=@Column(name\
  \ = \"Book621_Chapter_id\"),\ntype=@Type(type=\"long\"),\ngenerator=\"hilo-gen\"\
  )\n@Column(name=\"chapter_name\")\nprivate Collection chapters = new ArrayList();\n\
  \n**// getters and setters**\n\n**}**\n\n**CREATE TABLE**查询语句大致如下：\n\n第 6 章 ■ 集合映射\n\
  \n**CREATE TABLE \"BOOK6\".\"BOOK621_CHAPTER\"**\n**(**\n**BOOK_ID bigint NOT NULL,**\n\
  **CHAPTER_NAME varchar(255) NOT NULL,**\nBOOK621_CHAPTER_ID bigint PRIMARY KEY NOT\
  \ NULL\n**);**\n\n**ALTER TABLE BOOK621_CHAPTER**\n**ADD CONSTRAINT FK574F883A8233ACD9**\n\
  **FOREIGN KEY (BOOK_ID)**\n**REFERENCES BOOK6_21(BOOK_ID);**\n\n**CREATE INDEX SQL091227214019670\
  \ ON BOOK621_CHAPTER(BOOK_ID);**\n**CREATE UNIQUE INDEX SQL091227214017400 ON BOOK621_CHAPTER(BOOK621_CHAPTER_ID);**\
  \ 6.3 映射列表（List）\n\n问题\n\n*列表*是一组对象的列表，它是一个有序集合。列表的使用者可以精确控制每个元素在列表中的插入位置。使用者可以通过元素的整数索引（在列表中的位置）来访问元素，并在列表中搜索元素。如何将**值**类型映射为**list**类型的集合？\n\
  \n解决方案\n\n使用列表元素**<list>**来映射**java.util.List**属性。该属性必须初始化为**ArrayList**。列表的索引会被保留，并且会添加一个额外的列来定义该索引。\n\
  \n工作原理\n\n**Book** Java 类有一个名为**chapters**的属性，其类型为**java.util.List**。该属性被初始化为**ArrayList**：\n\
  \n****public class Book6_3 implements Serializable{**\n****private Long book_id;**\n\
  **private String isbn;**\n**private String name;**\n**private Date publishDate;**\n\
  **private Integer price;**\nprivate List chapters;\n\n**// getters and setters**\n\
  **}**\n\n**<list>**元素映射了 chapters，而**index**元素定义了**list**的索引。**key**元素将图书 ID 定义为外键：\n\
  \n第 6 章 ■ 集合映射\n\n**<hibernate-mapping package=\"com.hibernaterecipes.chapter6\"\
  >**\n**<class name=\"Book6_3\" table=\"Book6_3\" schema=\"BOOK6\">**\n**<id name=\"\
  book_id\" type=\"long\" column=\"BOOK_ID\" >**\n**<generator class=\"native\">**\n\
  **</generator>**\n**</id>**\n**<property name=\"isbn\" type=\"string\">**\n**<column\
  \ name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"true\" />**\n**</property>**\n\
  **<property name=\"name\" type=\"string\">**\n**<column name=\"BOOK_NAME\" length=\"\
  100\" not-null=\"true\" />**\n**</property>**\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\" />**\n**<property name=\"price\" type=\"\
  int\" column=\"PRICE\" />**\n<list name=\"chapters\" table=\"Book63_Chapter\" schema=\"\
  BOOK6\">\n\n\n\n<key column=\"BOOK_ID\"></key>\n\n<index column=\"CHAPTER_INDEX\"\
  ></index>\n\n<element type=\"string\" column=\"CHAPTER_NAME\" not-null=\"true\"\
  ></element>\n\n</list>\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**在 JPA 注解映射的\
  \ **Book** 类中，**IndexColumn** 定义了列表的索引。请注意注解的 **Base** 属性：它使索引从 1 或你希望的任何数字开始。该属性的默认值为零。所有其他注解与\
  \ **set** 映射的注解非常相似：**\n\n****@Entity**\n\n**@Table (name=\"BOOK6_3\", schema=\"\
  BOOK6\")**\n\n**public class Book_6_3 implements Serializable{**\n\n****@Id**\n\n\
  **@Column (name=\"BOOK_ID\")**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\
  \n**private Long book_id;**\n\n****@Column (name=\"isbn\")**\n\n**private String\
  \ isbn;**\n\n****@Column (name=\"BOOK_NAME\")**\n\n**private String name;**\n\n\
  ****@Column (name=\"price\")**\n\n**private Integer price;**\n\n**@CollectionOfElements\
  \ (targetElement=java.lang.String.class)\n@JoinTable(\nname=\"Book63_Chapter\",\n\
  schema=\"BOOK6\",\njoinColumns=@JoinColumn(name=\"BOOK_ID\")\n)\n@IndexColumn(\n\
  name=\"CHAPTER_INDEX\",\nbase=0)\n@Column(name=\"chapter_name\")\n**private List\
  \ chapters;**\n\n**// getters and setters**\n\n**}**\n\n**CREATE TABLE 查询语句如下：**\n\
  \n****CREATE TABLE \"BOOK6\".\"BOOK63_CHAPTER\"**\n\n**(**\n\n**BOOK_ID bigint NOT\
  \ NULL,**\n\n**CHAPTER_NAME varchar(255) NOT NULL,**\n\nCHAPTER_INDEX int NOT NULL,\n\
  \nCONSTRAINT SQL091227211951510 PRIMARY KEY (BOOK_ID,CHAPTER_INDEX)\n\n**);**\n\n\
  **ALTER TABLE BOOK63_CHAPTER**\n\n**ADD CONSTRAINT FK648FEC749C936CDB**\n\nFOREIGN\
  \ KEY (BOOK_ID)\n\n**REFERENCES BOOK6_3(BOOK_ID);**\n\n**CREATE INDEX SQL091227214019790\
  \ ON BOOK63_CHAPTER(BOOK_ID);**\n\n**CREATE UNIQUE INDEX SQL091227211951510 ON BOOK63_CHAPTER**\n\
  \n**(**\n\n**BOOK_ID,**\n\n## CHAPTER_INDEX\n\n**);**\n\n6.4 映射数组\n\n问题\n\n如何将**值**类型映射为**数组**？\n\
  \n解决方案\n\n**<array>** 的用法与 **<list>** 相同。唯一的区别在于它对应 Java 中的数组类型，而不是 **java.util.List**。除非你是在为遗留应用程序进行映射，否则很少使用它。大多数情况下，你应该使用\
  \ **<list>**，因为数组的大小不能动态增加或减少，而列表可以。\n\n工作原理\n\n**Book** Java 类有一个名为 **chapters**\
  \ 的属性，其类型为 **String[]**：\n\n**public class Book6_4 implements Serializable{**\n\n\
  ****private Long book_id;**\n\n**private String isbn;**\n\n**private String name;**\n\
  \n**private Date publishDate;**\n\n**private Integer price;**\n\nprivate String[]\
  \ chapters;\n\n**// getters and setters**\n\n**}**\n\n**你使用 **<array>** 元素来映射该属性。所有其他映射元素与\
  \ **List** 映射的元素类似：**\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter6\"\
  >**\n\n**<class name=\"Book6_4\" table=\"Book6_4\" schema=\"BOOK6\">**\n\n**<id\
  \ name=\"book_id\" type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator class=\"\
  native\">**\n\n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"\
  string\">**\n\n**<column name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"\
  true\" />**\n\n**</property>**\n\n**<property name=\"name\" type=\"string\">**\n\
  \n**<column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />**\n\n**</property>**\n\
  \n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n\
  **<property name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n<array name=\"\
  chapters\" table=\"Book64_Chapter\" schema=\"BOOK6\">\n\n<key column=\"BOOK_ID\"\
  ></key>\n\n<index column=\"CHAPTER_INDEX\"></index>\n\n<element type=\"string\"\
  \ column=\"CHAPTER_NAME\" not-null=\"true\"></element>\n\n</array>\n\n****</class>**\n\
  \n**</hibernate-mapping>**\n\n**JPA 注解与 **List** 映射注解完全相同。**chapters** 的类型从 **List**\
  \ 改为 **String[]**，并且在数据库层面上的创建查询与 **List** 相同：**\n\n****@Entity**\n\n**@Table (name=\"\
  BOOK6_4\", schema=\"BOOK6\")**\n\n**public class Book_6_4 implements Serializable{**\n\
  \n****@Id**\n\n**@Column (name=\"BOOK_ID\")**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\
  \n**private Long book_id;**\n\n****@Column (name=\"isbn\")**\n\n**private String\
  \ isbn;**\n\n\n\n****@Column (name=\"BOOK_NAME\")**\n\n**private String name;**\n\
  \n****@Column (name=\"price\")**\n\n**private Integer price;**\n\n**@CollectionOfElements\
  \ (targetElement=java.lang.String.class)\n\n@JoinTable(\n\nname=\"Book64_Chapter\"\
  ,\n\nschema=\"BOOK6\",\n\njoinColumns=@JoinColumn(name=\"BOOK_ID\")\n\n)\n\n@IndexColumn(\n\
  \nname=\"CHAPTER_INDEX\",\n\nbase=0)\n\n@Column(name=\"chapter_name\")\n\nprivate\
  \ String[] chapters;\n\n**// getters and setters**\n\n**}**\n\n6.5 映射 Map\n\n问题\n\
  \n如何将**值**类型映射为**映射**？\n\n解决方案\n\n**<map>** 与 **<list>** 非常相似。区别在于，映射使用任意键来索引集合，而不是列表中所用的整数索引。映射以键/值对的形式存储条目。你可以通过键来查找值，键可以是任意数据类型。与\
  \ **<map>** 对应的 Java 类型是 **java.util.Map**。\n\n工作原理\n\n在 **Book** 类中，**chapters**\
  \ 属性被声明为 **Map** 类型：\n\n****public class Book6_5 implements Serializable{**\n\n\
  ****private Long book_id;**\n\n**private String isbn;**\n\n**private String name;**\n\
  \n**private Date publishDate;**\n\n**private Integer price;**\n\n第 6 章 ■ 集合映射\n\n\
  private Map chapters;\n\n**// getters and settes**\n\n**}**\n\n**你可以使用 **<map>**\
  \ 元素来映射 chapters。**<map-key>** 元素定义了每个章节的键。所有其他元素与 **List** 实现中的元素类似：\n\n****<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter6\">**\n\n**<class name=\"Book6_5\" table=\"\
  Book6_5\" schema=\"BOOK6\">**\n\n**<id name=\"book_id\" type=\"long\" column=\"\
  BOOK_ID\" >**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\
  \n**<property name=\"isbn\" type=\"string\">**\n\n**<column name=\"ISBN\" length=\"\
  50\" not-null=\"true\" unique=\"true\" />**\n\n**</property>**\n\n**<property name=\"\
  name\" type=\"string\">**\n\n**<column name=\"BOOK_NAME\" length=\"100\" not-null=\"\
  true\" />**\n\n**</property>**\n\n**<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n<map name=\"chapters\" table=\"Book65_Chapter\" schema=\"BOOK6\"\
  >\n\n<key column=\"BOOK_ID\" />\n\n<map-key column=\"CHAPTER_KEY\" type=\"string\"\
  \ />\n\n<element column=\"CHAPTER\" type=\"string\" length=\"100\" />\n\n</map>\n\
  \n****</class>**\n\n**</hibernate-mapping>**\n\n**在 JPA 中，**MapKey** 注解定义了键：\n\n\
  ****@Entity**\n\n**@Table (name=\"BOOK6_5\", schema=\"BOOK6\")**\n\n**public class\
  \ Book_6_5 implements Serializable{**\n\n**@Id**\n\n**@Column (name=\"BOOK_ID\"\
  )**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\n**private Long book_id;**\n\
  \n****@Column (name=\"isbn\")**\n\n**private String isbn;**\n\n****@Column (name=\"\
  BOOK_NAME\")**\n\n**private String name;**\n\n****@Column (name=\"price\")**\n\n\
  **private Integer price;**\n\n**@CollectionOfElements (targetElement=java.lang.String.class)\n\
  \n@JoinTable(name=\"Book65_Chapter\",\n\n第 6 章 ■ 集合映射\n\nschema=\"BOOK6\",\n\njoinColumns=@JoinColumn(name=\"\
  BOOK_ID\")\n\n)\n\n@MapKey (columns=@Column(name=\"CHAPTER_KEY\"),\n\ntargetElement=java.lang.String.class)\n\
  \n@Column(name=\"chapter\")\n\nprivate Map chapters;\n\n**// getters and setters**\n\
  \n**}**\n\n**CREATE TABLE** 查询语句大致如下：\n\n****CREATE TABLE \"BOOK6\".\"BOOK65_CHAPTER\"\
  **\n\n**(**\n\n**BOOK_ID bigint NOT NULL,**\n\n**CHAPTER varchar(100),**\n\nCHAPTER_KEY\
  \ varchar(255) NOT NULL,\n\nCONSTRAINT SQL091227211951730 PRIMARY KEY (BOOK_ID,CHAPTER_KEY)\n\
  \n**);**\n\n**ALTER TABLE BOOK65_CHAPTER**\n\n**ADD CONSTRAINT FK8D18CA769C936CDD**\n\
  \n**FOREIGN KEY (BOOK_ID)**\n\nREFERENCES BOOK6_5(BOOK_ID);\n\n**CREATE INDEX SQL091227214020070\
  \ ON BOOK65_CHAPTER(BOOK_ID);**\n\n**CREATE UNIQUE INDEX SQL091227211951730 ON BOOK65_CHAPTER**\n\
  \n**(**\n\n**BOOK_ID,**\n\n## CHAPTER_KEY\n\n**);**\n\n6.6 对集合进行排序\n\n问题\n\n有哪些方法可以对集合进行排序？\n\
  \n解决方案\n\n一种方法是使用 Java 集合框架提供的排序功能。\n\n当 Hibernate 从数据库读取数据后，排序操作会在 Java 虚拟机（JVM）的内存中进行。请注意，对于大型集合，这种排序方式可能效率不高。\n\
  \n只有 **<set>** 和 **<map>** 支持这种排序方式。\n\n\n\n你也可以在查询层面使用 **order-by** 子句对集合进行排序。如果集合非常大，在数据库中进行排序效率更高。你可以指定\
  \ **order-by** 条件，在检索时对该集合进行排序。请注意，**order-by** 属性应为 SQL 列名，而非 Hibernate 中的属性名。\n\
  \n第 6 章 ■ 集合映射\n\n工作原理\n\n我们将介绍多种对集合进行排序的方法，首先从自然顺序开始。\n\n使用自然顺序\n\n要对集合进行自然顺序排序，你需要在集合中将\
  \ **sort** 属性定义为 **natural**。\n\nHibernate 使用 **java.lang.Comparable** 接口中定义的 **compareTo()**\
  \ 方法来比较元素。许多基本数据类型，如 **String**、**Integer** 和 **Double**，都实现了该接口。\n\n**chapters**\
  \ 的实现从 **HashSet** 变更为 **TreeSet**。对于 **Map** 的情况，实现类需要变更为 **TreeMap**：\n\n**public\
  \ class Book6_1 implements Serializable{**\n\n****private Long book_id;**\n\n**private\
  \ String isbn;**\n\n**private String name;**\n\n**private Date publishDate;**\n\n\
  **private Integer price;**\n\nprivate Set chapters = new TreeSet();\n\n**// getters\
  \ 和 setters**\n\n**}**\n\n**在 Hibernate 映射文件中，属性 **sort** 被定义为 **natural**：\n\n\
  ****<hibernate-mapping package=\"com.hibernaterecipes.chapter6\">**\n\n**<class\
  \ name=\"Book6_1\" table=\"Book6_1\" schema=\"BOOK6\">**\n\n**<id name=\"book_id\"\
  \ type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"isbn\" type=\"string\">**\n\n**<column name=\"\
  ISBN\" length=\"50\" not-null=\"true\" unique=\"true\" />**\n\n**</property>**\n\
  \n**<property name=\"name\" type=\"string\">**\n\n**<column name=\"BOOK_NAME\" length=\"\
  100\" not-null=\"true\" />**\n\n**</property>**\n\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"\
  int\" column=\"PRICE\" />**\n\n<set name=\"chapters\" table=\"Book61_Chapter\" schema=\"\
  BOOK6\" sort=\"natural\" lazy=\"false\">\n\n<key column=\"BOOK_ID\"></key>\n\n<element\
  \ type=\"string\" column=\"CHAPTER_NAME\" not-null=\"true\"></element>\n\n</set>\n\
  \n**</class>**\n\n**</hibernate-mapping>**\n\n**在 JPA 映射文件中，你需要将实现类变更为 **TreeSet**，并将注解\
  \ **sort** 声明为 **natural**。同时请注意，你禁用了延迟加载。（延迟加载将在本章后面讨论。）\n\n**129\n\n第 6 章 ■ 集合映射\n\
  \n**@Entity**\n\n**@Table (name=\"BOOK6_1\", schema=\"BOOK6\")**\n\n**public class\
  \ Book_6_1 implements Serializable{**\n\n**@Id**\n\n**@Column (name=\"BOOK_ID\"\
  )**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\n**private Long book_id;**\n\
  \n**@Column (name=\"isbn\")**\n\n**private String isbn;**\n\n**@Column (name=\"\
  BOOK_NAME\")**\n\n**private String name;**\n\n**@Column (name=\"price\")**\n\n**private\
  \ Integer price;**\n\n@CollectionOfElements (targetElement=java.lang.String.class)\n\
  \n@JoinTable(\n\nname=\"Book61_Chapter\",\n\nschema=\"BOOK6\",\n\njoinColumns=@JoinColumn(name=\"\
  BOOK_ID\")\n\n)\n\n@Column(name=\"chapter_name\")\n\n@Sort (type=SortType.NATURAL)\n\
  \n@LazyCollection (LazyCollectionOption.FALSE)\n\nprivate Set chapters = new TreeSet();\n\
  \n**// getters 和 setters**\n\n**}**\n\n编写你自己的比较器\n\n如果你对自然顺序不满意，可以通过实现 **java.util.Comparator**\
  \ 接口来编写自己的比较器。比较逻辑应放在重写的 **compare()** 方法中。要使用此比较器，你需要将其传递给集合的 **sort** 属性。以下是比较器的一个示例实现：\n\
  \n**public class ChapterComparator implements Comparator<String> {**\n\n****public\
  \ int compare(String o1, String o2) {**\n\n**// 如果 o1 和 o2 不是同一个类的实例，则抛出异常**\n\n\
  **// 如果 o1 小于 o2，返回负数**\n\n**// 如果 o1 等于 o2，返回零**\n\n**// 如果 o1 大于 o2，返回正数**\n\n\
  **if(o1.compareTo(o2)<1)**\n\n**{**\n\n**return 1;**\n\n**}else**\n\n**{**\n\n**return\
  \ -1;**\n\n**}**\n\n**}**\n\n**}**\n\n第 6 章 ■ 集合映射\n\n\n\n**在 Hibernate XML 映射文件中，你通过声明比较器实现来指定排序机制：**\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter6\">**\n\n**<class\
  \ name=\"Book6_1\" table=\"Book6_1\" schema=\"BOOK6\">**\n\n**<id name=\"book_id\"\
  \ type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"isbn\" type=\"string\">**\n\n**<column name=\"\
  ISBN\" length=\"50\" not-null=\"true\" unique=\"true\" />**\n\n**</property>**\n\
  \n**<property name=\"name\" type=\"string\">**\n\n**<column name=\"BOOK_NAME\" length=\"\
  100\" not-null=\"true\" />**\n\n**</property>**\n\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"\
  int\" column=\"PRICE\" />**\n\n**<set name=\"chapters\" table=\"Book61_Chapter\"\
  \ schema=\"BOOK6\"**\n\nsort=\"com.hibernaterecipes.annotations.dao.ch6.ChapterComparator\"\
  \n\n**lazy=\"false\">**\n\n**<key column=\"BOOK_ID\"></key>**\n\n**<element type=\"\
  string\" column=\"CHAPTER_NAME\" not-null=\"true\"></element>**\n\n**</set>**\n\n\
  **</class>**\n\n**</hibernate-mapping>**\n\n**同样，在 JPA 注解中，你也通过声明比较器实现来指定排序机制：**\n\
  \n****@Entity**\n\n**@Table (name=\"BOOK6_1\", schema=\"BOOK6\")**\n\n**public class\
  \ Book_6_1 implements Serializable{**\n\n**@Id**\n\n**@Column (name=\"BOOK_ID\"\
  )**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\n**private Long book_id;**\n\
  \n**@Column (name=\"isbn\")**\n\n**private String isbn;**\n\n**@Column (name=\"\
  BOOK_NAME\")**\n\n**private String name;**\n\n**@Column (name=\"price\")**\n\n**private\
  \ Integer price;**\n\n**@CollectionOfElements (targetElement=java.lang.String.class)**\n\
  \n**@JoinTable(**\n\n**name=\"Book61_Chapter\",**\n\n**schema=\"BOOK6\",**\n\n**joinColumns=@JoinColumn(name=\"\
  BOOK_ID\")**\n\n****)**\n\n**@Column(name=\"chapter_name\")**\n\n第 6 章 ■ 集合映射\n\n\
  @Sort (type=SortType.COMPARATOR,\n\ncomparator=com.hibernaterecipes.annotations.dao.ch6.ChapterComparator.class)\n\
  \n**@LazyCollection (LazyCollectionOption.FALSE)**\n\n**private Set chapters = new\
  \ TreeSet();**\n\n**// getters and setters**\n\n**}**\n\n在数据库中进行排序\n\n如果你的集合非常大，那么在数据库中进行排序效率更高。你可以在检索集合时指定\
  \ **order-by** 条件来进行排序。请注意，**order-by** 属性应使用 SQL 列名，而不是属性名：\n\n****<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter6\">**\n\n**<class name=\"Book6_1\" table=\"\
  Book6_1\" schema=\"BOOK6\">**\n\n**:**\n\n**:**\n\n**<set name=\"chapters\" table=\"\
  Book61_Chapter\" schema=\"BOOK6\"**\n\nlazy=\"false\" order-by=\" CHAPTER_NAME\"\
  >\n\n**<key column=\"BOOK_ID\"></key>**\n\n**<element type=\"string\" column=\"\
  CHAPTER_NAME\" not-null=\"true\"></element>**\n\n**</set>**\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**你可以在此 **order-by** 属性中使用任何在 **order by** 子句中有效的 SQL\
  \ 表达式——例如，使用逗号分隔多个列，或使用 **asc** 或 **desc** 指定升序或降序排序。Hibernate 在生成 SQL 时会将 **order-by**\
  \ 属性复制到 **order by** 子句中：**\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter6\"\
  >**\n\n**<class name=\"Book6_1\" table=\"Book6_1\" schema=\"BOOK6\">**\n\n**<id\
  \ name=\"book_id\" type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator class=\"\
  native\">**\n\n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"\
  string\">**\n\n**<column name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"\
  true\" />**\n\n**</property>**\n\n**<property name=\"name\" type=\"string\">**\n\
  \n**<column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />**\n\n**</property>**\n\
  \n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n\
  **<property name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n**<set name=\"\
  chapters\" table=\"Book61_Chapter\" schema=\"BOOK6\"**\n\nlazy=\"false\" order-by=\"\
  CHAPTER_NAME desc\">\n\n**<key column=\"BOOK_ID\"></key>**\n\n**<element type=\"\
  string\" column=\"CHAPTER_NAME\" not-null=\"true\"></element>**\n\n**</set>**\n\n\
  **</class>**\n\n第 6 章 ■ 集合映射\n\n**</hibernate-mapping>**\n\n**在 JPA 注解中，你使用 **OrderBy**\
  \ 注解来声明列名：**\n\n****@Entity**\n\n**@Table (name=\"BOOK6_1\", schema=\"BOOK6\")**\n\
  \n**public class Book_6_1 implements Serializable{**\n\n\n\n**@Id**\n\n**@Column\
  \ (name=\"BOOK_ID\")**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\n\
  **private Long book_id;**\n\n**@Column (name=\"isbn\")**\n\n**private String isbn;**\n\
  \n**@Column (name=\"BOOK_NAME\")**\n\n**private String name;**\n\n**@Column (name=\"\
  price\")**\n\n**private Integer price;**\n\n**@CollectionOfElements (targetElement=java.lang.String.class)**\n\
  \n**@JoinTable(**\n\n**name=\"Book61_Chapter\",**\n\n**schema=\"BOOK6\",**\n\n**joinColumns=@JoinColumn(name=\"\
  BOOK_ID\")**\n\n****)**\n\n**@Column(name=\"chapter_name\")**\n\n@OrderBy (clause=\"\
  chapter_name asc\")\n\n**@LazyCollection (LazyCollectionOption.FALSE)**\n\n**private\
  \ Set chapters = new TreeSet();**\n\n**//getters and setters**\n\n**}**\n\n6.6 使用延迟初始化\n\
  \n问题\n\n延迟初始化在集合中是如何工作的？如何避免 **LazyInitializationException**？\n\n解决方案\n\n实体的映射集合并非每次将实体从数据库加载到\
  \ JVM 内存时都需要用到。这个映射集合会在内存中占用不必要的空间。为了解决这个问题，Hibernate 提供了*延迟初始化*的概念，即关联和映射集合只有在用户/应用程序需要时才会被检索。映射集合的检索对应用程序来说是透明的。Hibernate\
  \ 默认将延迟初始化设置为 true，这节省了大量内存使用。\n\n因此，当获取一本书时，章节集合不会被检索。如果会话仍然打开，你可以使用 **Hibernate.initialize(book.getChapters())**\
  \ 获取章节集合。如果会话未打开，则必须在加载拥有实体时加载该集合；你可以通过在拥有实体的映射文件中将属性 **lazy** 设置为 **false** 来配置这一点。\n\
  \n**工作原理\n\n你可以使用以下代码从数据库中检索一个 **book** 对象。章节集合会同时被检索：\n\n****Session session =\
  \ factory.openSession();**\n\n**try {**\n\n**Book book = (Book) session.get(Book.class,\
  \ id);**\n\n**return book;**\n\n**} finally {**\n\n**session.close();**\n\n**}**\n\
  \n**但是，当你在会话外部通过 **book.getChapters()** 访问章节集合时，会发生异常：\n\n**for (Iterator iter =\
  \ book.getChapters().iterator(); iter.hasNext();) {**\n\nString chapter = (String)\
  \ iter.next();\n\n**System.out.println(chapter);**\n\n**}**\n\n**发生此异常的原因是集合的延迟初始化。你可以显式地初始化它，以便在会话外部访问：\n\
  \n****Session session = factory.openSession();**\n\n**try {**\n\n**Book book = (Book)\
  \ session.get(Book.class, id);**\n\nHibernate.initialize(book.getChapters());\n\n\
  **return book;**\n\n**} finally {**\n\n**session.close();**\n\n**}**\n\n**或者，你可以关闭此集合的延迟初始化。在这样做之前，你必须仔细考虑，特别是对于集合：\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter6\">**\n\n**<class\
  \ name=\"Book6_1\" table=\"Book6_1\" schema=\"BOOK6\">**\n\n**<id name=\"book_id\"\
  \ type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"isbn\" type=\"string\">**\n\n**<column name=\"\
  ISBN\" length=\"50\" not-null=\"true\" unique=\"true\" />**\n\n**</property>**\n\
  \n**<property name=\"name\" type=\"string\">**\n\n**<column name=\"BOOK_NAME\" length=\"\
  100\" not-null=\"true\" />** 134\n\n第 6 章 ■ 集合映射\n\n**</property>**\n\n**<property\
  \ name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property\
  \ name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n**<set name=\"chapters\"\
  \ table=\"Book61_Chapter\" schema=\"BOOK6\"**\n\nlazy=\"false\" order-by=\"CHAPTER_NAME\
  \ desc\">\n\n**<key column=\"BOOK_ID\"></key>**\n\n**<element type=\"string\" column=\"\
  CHAPTER_NAME\" not-null=\"true\"></element>**\n\n**</set>**\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**在 JPA 中，则简单如下：\n\n**@Entity**\n\n**@Table (name=\"\
  BOOK6_1\", schema=\"BOOK6\")**\n\n**public class Book_6_1 implements Serializable{**\n\
  \n**@Id**\n\n**@Column (name=\"BOOK_ID\")**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\
  \n**private Long book_id;**\n\n****@CollectionOfElements (targetElement=java.lang.String.class)**\n\
  \n**@JoinTable(**\n\n\n\n**name=\"Book61_Chapter\",**\n\n**schema=\"BOOK6\",**\n\
  \n**joinColumns=@JoinColumn(name=\"BOOK_ID\")**\n\n****)**\n\n**@Column(name=\"\
  chapter_name\")**\n\n**@OrderBy (clause=\"chapter_name asc\")**\n\n@LazyCollection\
  \ (LazyCollectionOption.FALSE)\n\n**private Set chapters = new TreeSet();**\n\n\
  **// getters and setters**\n\n**}**\n\n总结\n\n本章展示了如何将**值**类型对象的集合映射到实体。你已经了解了 **<set>**、**<bag>**、**<idbag>**、**<list>**\
  \ 和 **<map>** 元素的实现及其对应的 JPA 注解。你学习了每种集合映射元素的优势，以及何时适合使用这些元素。你还了解了如何使用比较器和 **order-by**\
  \ 子句对集合进行排序。最后，你学习了何时以及如何关闭延迟初始化。\n\n**第 7 章**\n\n■ ■ ■\n\n**多值关联**\n\n多值关联，顾名思义，是对实体的引用集合。在\
  \ Java 中，该集合可以是 **List**、**Set**、**Map** 等类型。\n\n为什么需要引用集合？当存在父/子关系，且一个父对象可以与多个子对象关联时，父对象会包含一个对子实体引用的集合。在关系模型中，假设两个表相互依赖，这可以通过在依赖表中添加一个外键列来表示。对于父表中的一行，子表中存在多行与之对应。\n\
  \n你在前面的章节中已经看到如何指定使用集合。本章详细讨论一对多和多对多关系，包括它们的定义方式，以及如何在 Hibernate 中使用 XML 配置和 JPA\
  \ 注解来表示它们。你还将学习在定义此类关系时，如何从数据库加载和更新数据。\n\n一对多关联是最常见且最重要的类型。多对多关联可以表示为两个多对一关联。这种模型更具扩展性，因此在应用程序中使用更广泛。这些关联可以是单向的，也可以是双向的。\n\
  \n7.1 使用外键映射一对多关联\n\n问题\n\n如何使用外键通过一对多关联映射对象？能否仅从一个方向建立此关联（单向关联）？当对父对象执行更新等操作时，用户有时希望子对象也能被更新；这在\
  \ Hibernate 中称为*级联*。如何在一对多关联中使用级联功能？\n\n解决方案\n\n在数据库中，可以通过两种方式实现一对多关系：在依赖表中设置外键列，或者在两个表之间创建连接表。每种关系都可以是单向或双向的。单向的一对多关系并不常见，也不是\
  \ Hibernate 推荐使用的映射方式。\n\n第 7 章 ■ 多值关联\n\n实现原理\n\n在之前的示例中，你将一本书的每一章都视为一个字符串，并将其存储在集合中。现在，你将扩展这个方案，使每一章成为一个持久化对象类型。由于一个\
  \ **book** 对象可以关联多个 **chapter** 对象，因此从 **book** 到 **chapter** 的关联是一对多关联。你首先将此关联定义为单向的——仅能从\
  \ **book** 导航到 **chapter**——然后将其扩展为双向的。\n\n请记住，你的应用程序中有一个尚未映射到数据库的 **Chapter** 类。你首先为其创建一个\
  \ Hibernate 映射，然后定义一个自动生成的标识符：\n\n****public class Chapter {**\n\n****private Long\
  \ id;**\n\n**private String title;**\n\n**private int noOfPages;**\n\n**// getters\
  \ and setters**\n\n**}**\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class name=\"Chapter\" table=\"CHAPTER\" dynamic-insert=\"true\" dynamic-update=\"\
  true\"**\n\n**schema=\"BookShop\">**\n\n****<id name=\"id\" column=\"id\" type=\"\
  long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\
  \n**<property name=\"title\" type=\"string\" column=\"title\" />**\n\n**<property\
  \ name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />**\n\n****</class>**\n\
  \n**</hibernate-mapping>**\n\n**由于你向应用程序添加了一个新的持久化对象，因此还需要在 Hibernate 配置文件中指定它：\n\
  \n****<mapping resource=\"com/hibernaterecipes/chapter7/chapter.xml\" />**\n\n**对于\
  \ **Book** 类，你已经有一个用于存储章节的集合，尽管之前只存储了标题。你仍然可以使用这个集合，但这次存储的是 **chapter** 对象。应该使用哪种集合类型？由于一本书不能包含重复的章节，你选择\
  \ **<set>** 集合类型：\n\n****public class Book {**\n\n****private Long book_id;**\n\n\
  ****private String isbn;**\n\n****private String bookName;**\n\n****private Date\
  \ publishDate;**\n\n**138\n\n第 7 章 ■ 多值关联\n\n**private Long price;**\n\n**private\
  \ Set chapters;\n\n**// getters and setters**\n\n**}**\n\n**要告诉 Hibernate 你在集合中存储的是\
  \ **chapter** 对象而不是字符串，可以使用 **<one-to-many>** 映射元素代替 **<element>**：\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter7\">**\n\n**<class name=\"Book\" table=\"\
  BOOK\" schema=\"BookShop7\">**\n\n**<id name=\"book_id\" column=\"BOOK_ID\" type=\"\
  long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\
  \n**<property name=\"isbn\" type=\"string\" column=\"ISBN\" />**\n\n**<property\
  \ name=\"bookName\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"\
  publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"\
  price\" type=\"long\" column=\"PRICE\" />**\n\n<set name=\"chapters\">\n\n<key column=\"\
  BOOK_ID\" />\n\n<one-to-many class=\"Chapter\" />\n\n</set>\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**以下是保存 **book** 和 **chapter** 对象的示例代码：**Transaction\
  \ tx = session.beginTransaction();**\n\n****Book book = new Book();**\n\n**book.setIsbn(\"\
  234234wef2323\");**\n\n**book.setBookName(\"Hibernate Recipes \");**\n\n**book.setPrice(79l);**\n\
  \n**book.setPublishDate(new Date());**\n\nsession.save(book);\n\n****Chapter chapter\
  \ = new Chapter();**\n\n**chapter.setBook_id(book.getBook_id());**\n\n**chapter.setNoOfPages(10);**\n\
  \n**chapter.setTitle(\"One-To-Many Association\");**\n\nsession.save(chapter);\n\
  \n****Set chapters = new HashSet<Chapter>();**\n\n**chapters.add(chapter);**\n\n\
  book.setChapters(chapters);\n\n**在这段代码中，你分别保存了 **book** 和 **chapter**：**session.save(book)**\
  \ 和 **session.save(chapter)**。\n\n同时，你通过编程方式将章节与书籍关联起来：**book.setChapters(chapters)**。\n\
  \nHibernate 将这些语句解析为三个查询，并按如下方式执行：\n\n**139\n\n第 7 章 ■ 多值关联\n\n**insert into BookShop7.BOOK\
  \ (ISBN, BOOK_NAME, PUBLISH_DATE, PRICE, BOOK_ID) values (?, ?, ?,**\n\n**?, ?)**\n\
  \n****insert into BookShop7.CHAPTER (BOOK_ID, title, NUM_OF_PAGES, id) values (?,\
  \ ?, ?, ?)**\n\n****update BookShop7.CHAPTER set BOOK_ID=? where id=?**\n\n**第一条\
  \ SQL 语句将 **book** 记录插入到 **BOOK** 表中。这是直接的 SQL 操作，与语句 **session.save(book)** 相关联。\n\
  \n第二条 SQL 语句将 **chapter** 对象插入到 **CHAPTER** 表中。对应的代码是 **session.save(chapter)**。\n\
  \n第三条 SQL 语句是值得关注的部分。它在分别加载 **book** 和 **chapter** 对象后，将它们关联起来。这是一条 **update** 语句，用\
  \ **book_id** 更新 **CHAPTER** 表中的外键列，从而将 **Book** 和 **Chapter** 绑定在一起。\n\n\n\n现在，让我们看看如何使用\
  \ **cascade** 选项进行保存。该选项指定了哪些操作应从父对象级联到关联对象。例如，如果你想将 **chapter** 与 **book** 一起保存，可以使用\
  \ **cascade=saveUpdate**。使用此选项，你无需调用 **session.save**，而只需传递 **book** 对象，调用一次 **session.saveUpdate**\
  \ 即可。**chapters** 集合被设置到 **book** 对象上，最后 **book** 对象被插入：\n\n****<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter7\">**\n\n**<class name=\"Book\" table=\"\
  BOOK\" schema=\"BookShop7\">**\n\n**<id name=\"book_id\" column=\"BOOK_ID\" type=\"\
  long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\
  \n**<property name=\"isbn\" type=\"string\" column=\"ISBN\" />**\n\n**<property\
  \ name=\"bookName\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"\
  publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"\
  price\" type=\"long\" column=\"PRICE\" />**\n\n<set name=\"chapters\" cascade=\"\
  save-update\">\n\n**<key column=\"BOOK_ID\" />**\n\n**<one-to-many class=\"Chapter\"\
  \ />**\n\n**</set>**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**以下是代码示例：\n\
  \n****Book book = new Book();**\n\n**book.setIsbn(\"234234wef2323\");**\n\n**book.setBookName(\"\
  Hibernate Recipes \");**\n\n**book.setPrice(79l);**\n\n**book.setPublishDate(new\
  \ Date());**\n\n****Chapter chapter = new Chapter();**\n\n**chapter.setBook_id(book.getBook_id());**\n\
  \n**chapter.setNoOfPages(10);**\n\n**chapter.setTitle(\"One-To-Many Association\"\
  );**\n\n****Set chapters = new HashSet<Chapter>();**\n\n第 7 章 ■ 多值关联\n\n**chapters.add(chapter);**\n\
  \n****book.setChapters(chapters);**\n\nsession.saveOrUpdate(book);\n\n**语句 **session.saveOrUpdate**\
  \ 生成了两个查询，而不是你在之前示例中看到的三个：\n\n****insert into BookShop7.BOOK7_1 (ISBN, BOOK_NAME,\
  \ PUBLISH_DATE, PRICE, BOOK_ID) values (?, ?,**\n\n**?, ?, ?)**\n\n**insert into\
  \ BookShop7.CHAPTER7_1 (title, NUM_OF_PAGES, book_id, id) values (?, ?, ?, ?)**\n\
  \n**现在，假设你对 **book** 调用 **delete**，如下所示：\n\n****Transaction tx = session.beginTransaction();**\n\
  \n**Book book = (Book) session.load(com.hibernaterecipes.chapter7.Book.class, new\
  \ Long(294913));**\n\n****session.delete(book);**\n\n**tx.commit();**\n\n**Hibernate\
  \ 针对此 **delete** 操作发出了两条 SQL 语句：\n\n• 一条用于更新关联的章节记录，将其书籍 ID 设为 null\n\n• 一条用于删除书籍\n\
  \n**delete** 完成后，你会留下一个孤立的章节记录。这并非理想情况。为了避免此类孤立记录，你需要在 **cascade** 上使用 **delete-orphan**\
  \ 选项，如下所示：\n\n**<hibernate-mapping package=\"com.hibernaterecipes.chapter7\">**\n\
  \n**<class name=\"Book7_1\" table=\"BOOK7_1\" schema=\"BookShop7\">**\n\n**<id name=\"\
  book_id\" column=\"BOOK_ID\" type=\"long\">**\n\n**<generator class=\"native\">**\n\
  \n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"string\" column=\"\
  ISBN\" />**\n\n**<property name=\"bookName\" type=\"string\" column=\"BOOK_NAME\"\
  \ />**\n\n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
  \ />**\n\n**<property name=\"price\" type=\"long\" column=\"PRICE\" />**\n\n<set\
  \ name=\"chapters\" cascade=\"save-update,delete-orphan\">\n\n**<key column=\"BOOK_ID\"\
  \ />**\n\n**<one-to-many class=\"Chapter\" />**\n\n**</set>**\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**在 JPA 中，映射如下：\n\n****@Entity (name=\"bkch2\")**\n\n\
  **@Table (name=\"BOOK7_1\", schema=\"BOOKSHOP\")**\n\n**public class Book7_1 {**\n\
  \n**141\n\n第 7 章 ■ 多值关联\n\n**@Id**\n\n**@GeneratedValue (strategy=GenerationType.\
  \ *TABLE*)**\n\n**@Column (name=\"BOOK_ID\")**\n\n**private long book_id;**\n\n\
  ****@Column (name=\"ISBN\")**\n\n**private String isbn;**\n\n****@Column (name=\"\
  book_Name\")**\n\n**private String bookName;**\n\n****/*@Column (name=\"publisher_code\"\
  )**\n\n**String publisherCode;*/**\n\n****@Column (name=\"publish_date\")**\n\n\
  **private Date publishDate;**\n\n****@Column (name=\"price\")**\n\n**private Long\
  \ price;**\n\n**@OneToMany(targetEntity=Chapter7_1.class)\n\n@JoinColumn(name=\"\
  book_id\")\n\n@Cascade (value={CascadeType. *SAVE_UPDATE*,CascadeType. *DELETE_ORPHAN*})\
  \ Set chapters;\n\n****// setters and gettes**\n\n**}**\n\n\n\n7.2 使用外键映射一对多双向关联\n\
  \n问题\n\n如何使用外键通过一对多双向关联来映射对象？\n\n解决方案\n\n在某些情况下，你需要让关联是双向的。假设有一个页面用于显示**书籍**中某个**章节**的详细信息。给定一个**章节**对象，你需要知道这个**章节**属于哪本**书籍**。你可以通过在**章节**类中添加对**书籍**的引用来实现这一点。这种关联是一对多关联。书籍到章节以及章节到书籍的关联组合起来就形成了一个双向关联。\n\
  \n第 7 章 ■ 多值关联\n\n实现原理\n\n在前面的示例中，你将**书籍**的每个章节都视为一个字符串，并将其存储在一个集合中。现在，你通过将每个**章节**设为持久化对象类型来扩展这个方案。一个**书籍**对象可以关联多个**章节**对象，因此这是一对多关联。你首先将此关联定义为单向的——仅能从**书籍**导航到**章节**——然后将其扩展为双向的。\n\
  \n**章节**类更新后，包含对**书籍**的引用，如下所示：\n\n**public class Chapter7_1 {**\n\n****private\
  \ Long id;**\n\nprivate Book7_1 book;\n\n**private String title;**\n\n**private\
  \ int noOfPages;**\n\n**// Getters 和 Setters**\n\n****}**\n\n**章节**的 Hibernate 映射如下：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\">**\n\n**<class**\n\
  \n**name=\"Chapter7_1\"**\n\n**table=\"CHAPTER7_1\"**\n\n**dynamic-insert=\"true\"\
  **\n\n**dynamic-**\n\n**update=\"true\" schema=\"BookShop7\">**\n\n****<id name=\"\
  id\" column=\"id\" type=\"long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"title\" type=\"string\" column=\"title\" />**\n\
  \n**<property name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />**\n\n<many-to-one\
  \ name=\"book\"\n\ncolumn=\"book_id\" class=\"Book7_1\"\n\n></many-to-one>\n\n**</class>**\n\
  \n**</hibernate-mapping>**\n\n**从单向关联保存一本带有一个章节的书籍时，你会得到三条 SQL 语句。理想情况下，你希望避免更新查询。这可以通过在书籍映射类中将\
  \ **inverse** 属性设置为 **true** 来实现：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class name=\"Book7_1\" table=\"BOOK7_1\" schema=\"BookShop7\">**\n\n**<id\
  \ name=\"book_id\" column=\"BOOK_ID\" type=\"long\">**\n\n**<generator class=\"\
  native\">**\n\n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"\
  string\" column=\"ISBN\" />**\n\n**<property name=\"bookName\" type=\"string\" column=\"\
  BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
  \ />**\n\n**<property name=\"price\" type=\"long\" column=\"PRICE\" />**\n\n<set\
  \ name=\"chapters\" inverse=\"true\">\n\n第 7 章 ■ 多值关联\n\n**<key column=\"BOOK_ID\"\
  \ />**\n\n**<one-to-many class=\"Chapter7_1\" />**\n\n**</set>**\n\n**</class>**\n\
  \n**</hibernate-mapping>**\n\n**外键 **BOOK_ID** 在内存中有两种表示形式：**章节**的 **Book** 属性和**书籍**持有的\
  \ **chapters** 集合中的元素。假设你向一个**书籍**对象添加了一个**章节**。同时，假设你最初没有设置 **inverse=\"true\"\
  ** ，并且你按如下方式建立了双向性：\n\n****chapter.setBook(book);**\n\n**book.getChapters().add(chapter);**\n\
  \n**如果你保存**章节**对象，会执行两条 SQL 语句，因为 Hibernate 不知道**书籍**和**章节**映射文件中的 **BOOK_ID** 映射指向的是同一个数据库列。\n\
  \n执行的 SQL 语句如下所示：\n\n****insert into BookShop7.CHAPTER7_1 (title, NUM_OF_PAGES,\
  \ book_id, id) values (?, ?, ?, ?)** **update BookShop7.CHAPTER7_1 set BOOK_ID=?\
  \ where id=?**\n\n**现在，添加 **inverse=\"true\"** 。当你保存**章节**时，你会发现只对**章节**执行了一次插入操作。这是因为你告诉\
  \ Hibernate，**BOOK_ID** 在两个映射文件中是相同的。\n\n在 JPA 中，**章节**类如下所示：\n\n****@Entity (name=\"\
  chapter\")**\n\n**@Table (name=\"Chapter7_1\", schema=\"BOOKSHOP\")**\n\n**public\
  \ class Chapter7_1 {**\n\n****@Id**\n\n\n\n**@GeneratedValue (strategy=GenerationType.\
  \ *TABLE*)**\n\n**@Column (name=\"id\")**\n\n**private long id;**\n\n**@ManyToOne\n\
  \n@JoinColumn (name=\"book_id\")\n\nprivate Book7_1 book;\n\n****@Column (name=\"\
  title\")**\n\n**private String title;**\n\n****@Column (name=\"NUM_OF_PAGES\")**\n\
  \n**private int numOfPages;**\n\n****// getters and setters**\n\n**}**\n\n**在注解中，**inverse**\
  \ 属性被 **mappedBy** 属性所取代：\n\n****@Entity (name=\"bkch2\")**\n\n**@Table (name=\"\
  BOOK7_1\", schema=\"BOOKSHOP\")**\n\n**public class Book7_1 {**\n\n第 7 章 ■ 多值关联\n\
  \n****@Id**\n\n**@GeneratedValue (strategy=GenerationType. *TABLE*)**\n\n**@Column\
  \ (name=\"BOOK_ID\")**\n\n**private long book_id;**\n\n****@Column (name=\"ISBN\"\
  )**\n\n**private String isbn;**\n\n****@Column (name=\"book_Name\")**\n\n**private\
  \ String bookName;**\n\n****/*@Column (name=\"publisher_code\")**\n\n**String publisherCode;*/**\n\
  \n****@Column (name=\"publish_date\")**\n\n**private Date publishDate;**\n\n****@Column\
  \ (name=\"price\")**\n\n**private Long price;**\n\n**@OneToMany(targetEntity=Chapter7_1.class,mappedBy=\"\
  book\")\n\n**@JoinColumn(name=\"BOOK_ID\")**\n\n**@Cascade (value={CascadeType.\
  \ *SAVE_UPDATE*,CascadeType. *DELETE_ORPHAN*})** **Set chapters;**\n\n**// getters\
  \ and setters**\n\n**}**\n\n**7.3 使用连接表映射一对多双向关联**\n\n**问题**\n\n如何使用连接表通过一对多关联来映射对象？\n\
  \n**解决方案**\n\n请记住，你可以为多对一关联以及一对多关联使用连接表。具体做法是使用 **<many-to-many>** 关联类型，并标记 **unique=\"\
  true\"**。\n\n**工作原理**\n\n一个 **book** 对象可以关联多个 **chapter** 对象，因此从 **Book** 到 **Chapter**\
  \ 的关联是一对多的。你首先将此关联定义为单向的（仅能从 **book** 导航到 **chapter**），然后将其扩展为双向的。\n\n第 7 章 ■ 多值关联\n\
  \n**Book** 的映射如下：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class name=\"Book7_3\" table=\"BOOK7_3\" schema=\"BookShop7\">**\n\n**<id\
  \ name=\"book_id\" column=\"BOOK_ID\" type=\"long\">**\n\n**<generator class=\"\
  native\">**\n\n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"\
  string\" column=\"ISBN\" />**\n\n**<property name=\"bookName\" type=\"string\" column=\"\
  BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
  \ />**\n\n**<property name=\"price\" type=\"long\" column=\"PRICE\" />**\n\n<set\
  \ name=\"chapters\" table=\"BOOK_CHAPTER\" schema=\"BookShop7\" cascade=\"save-update,delete-orphan\"\
  >\n\n<key column=\"BOOK_ID\" />\n\n<many-to-many column=\"CHAPTER_ID\" class=\"\
  Chapter7_3\" unique=\"true\"/>\n\n</set>\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n****连接表 **BOOK_CHAPTER** 被定义为集合表。**BOOK_ID** 和 **CHAPTER_ID** 构成了连接表的复合主键。你需要使用\
  \ **<many-to-many>** 元素，而不是一对多，因为一对多不了解连接表。通过将 **unique** 属性设置为 **true**，你表明一个 **Book**\
  \ 只能拥有一个 **Chapter** 一次（由 **hashCode()** 和 **equals()** 方法决定），从而间接实现了一对多关联。\n\n\
  使用 JPA 注解时，**Book** 类的映射如下。请注意，**mappedby** 属性未被设置，因为这是一个单向示例。此外，**Chapter** 不包含\
  \ **Book** 的实例：\n\n**@Entity (name=\"bkch73\")**\n\n**@Table (name=\"BOOK7_3\",\
  \ schema=\"BOOKSHOP7\")**\n\n**public class Book7_3 {**\n\n****@Id**\n\n**@GeneratedValue\
  \ (strategy=GenerationType.TABLE)**\n\n**@Column (name=\"BOOK_ID\")**\n\n**private\
  \ long book_id;**\n\n****@Column (name=\"ISBN\")**\n\n**private String isbn;**\n\
  \n****@Column (name=\"book_Name\")**\n\n**private String bookName;**\n\n****/*@Column\
  \ (name=\"publisher_code\")**\n\n**String publisherCode;*/**\n\n****@Column (name=\"\
  publish_date\")**\n\n**private Date publishDate;**\n\n****@Column (name=\"price\"\
  )**\n\n第 7 章 ■ 多值关联\n\n**private Long price;**\n\n**@OneToMany(targetEntity=Chapter7_3.class)\n\
  \n@JoinTable(name = \"Book_Chapter\",schema=\"BOOKSHOP7\",\n\njoinColumns = {\n\n\
  @JoinColumn(name=\"book_id\")\n\n}\n\n)\n\n\n\n@Cascade (value={CascadeType.SAVE_UPDATE,CascadeType.DELETE_ORPHAN})\n\
  \nprivate Set chapters;\n\n****// getters and setters**\n\n**}**\n\n**如果你想使用连接表建立双向的一对多/多对一关联，可以像之前一样定义多对一端。需要注意的是，你应该将双向关联的一端标记为\
  \ **inverse**。这次，我们将 **Chapter** 端设为 inverse，但选择另一端也是可以的：\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter7\">**\n\n**<class**\n\n**name=\"Chapter7_3\"\
  **\n\n**table=\"CHAPTER7_3\"**\n\n**dynamic-insert=\"true\"**\n\n**dynamic-**\n\n\
  **update=\"true\" schema=\"BookShop7\">**\n\n**<id name=\"id\" column=\"id\" type=\"\
  long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\
  \n**<property name=\"title\" type=\"string\" column=\"title\" />**\n\n**<property\
