  \n}\n\n\n\npublic void setWeekdayContact(ContactCh4_5 weekdayContact) {\n\nthis.weekdayContact\
  \ = weekdayContact;\n\n}\n\n@Embedded\n\n@AttributeOverrides (\n\n{@AttributeOverride(name=\"\
  recipient\",column=@Column(name=\"HOLIDAY_RECIPIENT\")),\n\n@AttributeOverride(name=\"\
  phone.areaCode\",column=@Column(name=\"HOLIDAY_AREACODE\")),\n\n@AttributeOverride(name=\"\
  phone.telNo\",column=@Column(name=\"HOLIDAY_TELEPHONE\")),\n\n@AttributeOverride(name=\"\
  address\",column=@Column(name=\"HOLIDAY_ADDRESS\"))}\n\n)\n\npublic ContactCh4_5\
  \ getHolidayContact() {\n\nreturn holidayContact;\n\n}\n\npublic void setHolidayContact(ContactCh4_5\
  \ holidayContact) {\n\nthis.holidayContact = holidayContact;\n\n}\n\n}\n\n**总结**\n\
  \n在本章中，你学习了四种基本的继承策略：每个类层次结构一张表、每个子类一张表、每个具体类一张表（使用联合）以及每个具体类一张表（使用隐式多态）。\n\n你了解了这四种继承映射策略的实现方式，并学习了如何选择合适的策略。表\
  \ 4-1 总结了继承策略与多态关联之间的关系。\n\n**第 4 章 ■ 继承与自定义映射**\n\n*表 4-1. 各种继承策略支持的多态关联*\n\n|\
  \ **继承策略** | **多态多对一** | **多态一对一** | **多态一对多** | **多态多对多** |\n| :--- | :--- | :---\
  \ | :--- | :--- |\n| 每个类层次结构一张表 | `<many-to-one>` | `<one-to-one>` | `<one-to-many>`\
  \ | `<many-to-many>` |\n| 每个子类一张表 | `<many-to-one>` | `<one-to-one>` | `<one-to-many>`\
  \ | `<many-to-many>` |\n| 每个具体类一张表（使用联合） | `<many-to-one>` | `<one-to-one>` | `<one-to-many>`（仅限\
  \ `Inverse=\"true\"`） | `<many-to-many>` |\n| 每个具体类一张表（使用隐式多态） | `<any>` | 不支持 |\
  \ 不支持 | `<many-to-any>` |\n\n你已经了解了继承映射如何实现多态查询；表 4-2 总结了各种继承策略支持的多态查询能力。你还学习了 Hibernate\
  \ 支持的基本数据类型以及一些自定义数据类型的实现。\n\n*表 4-2. 各种继承策略支持的多态查询*\n\n| **继承策略** | **多态 load()/get()**\
  \ | **多态查询** | **多态连接** | **外连接抓取** |\n| :--- | :--- | :--- | :--- | :--- |\n| 每个类层次结构一张表\
  \ | 支持 | 支持 | 支持 | 支持 |\n| 每个子类一张表 | 支持 | 支持 | 支持 | 支持 |\n| 每个具体类一张表（使用联合） | 支持\
  \ | 支持 | 支持 | 支持 |\n| 每个具体类一张表（使用隐式多态） | 支持 | 支持 | 不支持 | 不支持 |\n\n**第 5 章**\n\n\
  ■ ■ ■\n\n**多对一和一对一映射**\n\n通常，实体之间是相互关联的。例如，一个**客户**与一个**地址**相关联。一个**客户**可以有一个或多个**地址**（例如，**账单地址**和**送货地址**）。这些关系或关联在关系模型和领域/对象模型中的表示方式不同。\n\
  \n在关系模型中，外键列表示一个表对另一个表的依赖关系。**客户**表有一个**AddressId**作为外键列，它是**地址**表的主键。\n\n从**客户**的角度来看，因为一个**客户**可以有多个地址，所以这是一个多对一关系。另一方面，从**地址**的角度来看，一个地址只能属于一个客户，所以这是一个一对一关系。\n\
  \n在对象模型中，相同的关系通过类和属性来表示。**客户**类有一个属性来保存属于该**客户**的多个地址（在 Java 中，这表示为集合——**List**、**Set**等）。**地址**类有一个**Customer**类型的属性。\n\
  \n在**客户**和**地址**的例子中，你同时从**客户**实体和**地址**实体的角度来考虑关联，因此这是一个*双向关联*。如果你只从一个实体的角度使用关联，那么它是一个*单向关联*。在对象/关系映射（ORM）框架中，这些关系通过配置文件中的元数据以及实体/对象来表示。\n\
  \n本章将向你展示这些关联在 Hibernate 中是如何表示的，并讨论以下特性：\n\n• 使用多对一和一对一映射的各种方法\n\n• 如何将单向关联转换为双向关联\n\
  \n• 如何使用延迟初始化和级联等特性\n\n• 如何映射关联表或连接表\n\n**5.1 使用多对一关联**\n\n**问题**\n\n回到在线书店的例子，一个出版商可以出版多本书。书籍和出版商之间的关系是多对一关系。在这种情况下，如何使用多对一关联来映射对象？如何使用级联选项来持久化类层次结构？\n\
  \n**解决方案**\n\n如前所述，从书籍到出版商的关联是多对一关联。由于这种关联只能从书籍导航到出版商，因此它也是一个单向关联。你使用 **<many-to-one>**\
  \ 元素来建立这种关联。\n\n**工作原理**\n\n你的应用程序有一个尚未映射到数据库的 **Publisher** 类。遵循第 4 章讨论的对象标识符最佳实践，你可以在该类上添加一个自动生成的\
  \ **id** 属性。图 5-1 展示了多对一单向关联的实体关系图。\n\n*图 5-1. 展示多对一单向关联的实体关系图*\n\n```java\npublic\
  \ class Publisher implements Serializable{\n    private Long publisher_id;\n   \
  \ private String code;\n    private String name;\n    private String address;\n\
  \    // getters and setters\n}\n```\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
  >\n    <class name=\"Publisher\" table=\"Publisher\" schema=\"BOOK5\">\n       \
  \ <id name=\"Publisher_id\" type=\"long\" column=\"PUBLISHER_ID\" >\n          \
  \  <generator class=\"native\">\n            </generator>\n        </id>\n     \
  \   <property name=\"code\" type=\"string\">\n            <column name=\"CODE\"\
  \ length=\"4\" not-null=\"true\" unique=\"true\" />\n        </property>\n     \
  \   <property name=\"name\" type=\"string\">\n            <column name=\"PUBLISHER_NAME\"\
  \ length=\"100\" not-null=\"true\" />\n        </property>\n        <property name=\"\
  address\" type=\"string\">\n            <column name=\"ADDRESS\" length=\"200\"\
  \ />\n        </property>\n    </class>\n</hibernate-mapping>\n```\n\n因为你向应用程序添加了一个新的持久化对象，所以需要在\
  \ Hibernate 配置文件中指定它：\n\n```xml\n<mapping resource=\"com/hibernaterecipes/chapter5/Publisher.xml\"\
  \ />\n```\n\n对于 **Book** 类，你已经有一个类型为 **Publisher** 的 **Publisher** 属性，该属性在之前的示例中未被使用：\n\
  \n```java\npublic class Book_5_1 implements Serializable{\n    private Long book_id;\n\
  \    private String isbn;\n    private String name;\n    private Publisher publisher;\n\
  \    private Date publishDate;\n    private Integer price;\n    // getters and setters\n\
  }\n```\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes/chapter5\">\n\
  \    <class name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">\n        <id name=\"\
  book_id\" type=\"long\" column=\"BOOK_ID\" >\n            <generator class=\"native\"\
  >\n            </generator>\n        </id>\n        <property name=\"isbn\" type=\"\
  string\">\n            <column name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"\
  true\" />\n        </property>\n        <property name=\"name\" type=\"string\"\
  >\n            <column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />\n\
  \        </property>\n        <property name=\"publishDate\" type=\"date\" column=\"\
  PUBLISH_DATE\" />\n```\n\n\n\n******<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n<many-to-one name=\"publisher\" class=\"Publisher\" column=\"PUBLISHER_ID\"\
  />\n\n********</class>**\n\n**</hibernate-mapping>**\n\n**当你创建了一个新的 **book** 对象和一个新的\
  \ **publisher** 对象后，你想将它们保存到数据库中。Hibernate 会在保存 **book** 对象时自动保存 **publisher** 对象吗？\n\
  \n遗憾的是，如果只保存 **book** 对象，就会发生异常。这意味着你必须逐个保存它们：\n\n**Session session = factory.openSession();**\n\
  \n**Transaction tx = null;**\n\n**try {**\n\n第 5 章 ■ 多对一与一对一映射\n\n**tx = session.beginTransaction();**\n\
  \nsession.save(publisher);\n\nsession.save(book);\n\n**tx.commit();**\n\n**} catch\
  \ (HibernateException e) {**\n\n**if (tx != null) tx.rollback();**\n\n**throw e;**\n\
  \n**} finally {**\n\n**session.close();**\n\n**}**\n\n**逐个保存所有对象非常麻烦，尤其是当对象图很大时。因此，Hibernate\
  \ 提供了一种一次性保存它们的方法。让我们在 **<many-to-one>** 映射中添加一个 **cascade=\"save-update\"** 属性，让\
  \ Hibernate 将保存/更新操作级联到关联对象：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
  >**\n\n****<class name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">**\n\n**.**\n\
  \n**.**\n\n**.**\n\n**.**\n\n**.**\n\n**.**\n\n<many-to-one name=\"publisher\" class=\"\
  Publisher\" column=\"PUBLISHER_ID\"\n\ncascade=\"save-update\"/>\n\n********</class>**\n\
  \n**</hibernate-mapping>**\n\n**当你持久化一个对象图时，其中一些对象是新创建的，另一些是已更新的，此时保存/更新级联非常有用。你可以使用\
  \ **saveOrUpdate()** 方法，让 Hibernate 决定哪些对象应该被创建，哪些应该被更新：\n\n**session.saveOrUpdate(book);**\n\
  \n**除了保存/更新级联，你还可以**级联**删除操作：\n\n****<many-to-one name=\"publisher\" class=\"Publisher\"\
  \ column=\"PUBLISHER_ID\" cascade=\"save-update,delete\" />**\n\n**在 JPA 中，book\
  \ 和 publisher 类的注解如下：\n\n****@Entity**\n\n@Table (name=\"PUBLISHER\", schema=\"\
  BOOK5\")\n\npublic class Publisher implements Serializable{\n\n******@Id**\n\n****@Column**\n\
  \n**(name=\"PUBLISHER_ID\")**\n\n**@GeneratedValue**\n\n**(strategy=GenerationType.AUTO)**\n\
  \n****private Long publisher_id;**\n\n第 5 章 ■ 多对一与一对一映射\n\n**@Column**\n\n**(name=\"\
  CODE\")**\n\n****private String code;**\n\n**@Column**\n\n**(name=\"PUBLISHER_NAME\"\
  )**\n\n****private String name;**\n\n**@Column**\n\n**(name=\"ADDRESS\")**\n\n****private\
  \ String address;**\n\n****// getters and setters**\n\n**}**\n\n****@Entity**\n\n\
  **@Table (name=\"BOOK\", schema=\"BOOK5\")**\n\npublic class Book_5_1 implements\
  \ Serializable{\n\n**@Id**\n\n****@Column**\n\n**(name=\"BOOK_ID\")**\n\n**@GeneratedValue**\n\
  \n**(strategy=GenerationType.AUTO)**\n\n****private Long book_id;**\n\n**@Column**\n\
  \n**(name=\"isbn\")**\n\n****private String isbn;**\n\n**@Column**\n\n**(name=\"\
  BOOK_NAME\")**\n\n****private String name;**\n\n@ManyToOne\n\n@Cascade\n\n(value=CascadeType.SAVE_UPDATE)\n\
  \n@JoinColumn\n\n(name=\"PUBLISHER_ID\")\n\n****private Publisher publisher;**\n\
  \n******@Column**\n\n**(name=\"price\")**\n\n****private Integer price;**\n\n****//\
  \ getters and setters**\n\n}\n\n5.2 使用连接表实现多对一关联\n\n问题\n\n假设有一组书已被确定将要出版，但尚未为这些书分配出版商。同样，你可能有一些出版商已准备好出版书籍，但书籍尚未编写完成。在这种情况下，如果你使用相同的\
  \ **Book** 和 **Publisher** 实体，那么在 **PUBLISHER** 表中会出现 **Book_Id** 为 null 的行，在 **BOOK**\
  \ 表中也会出现 **Publisher_Id** 为 null 的行。这不是在关系数据库中存储数据的有效方式，也无法提供规范化的模式。\n\n在这种情况下，你可以使用一个额外的表，称为*连接表*，该表包含外键\
  \ **Book_id** 和 **Publisher_Id** 作为列。这个表包含了所有 **Book** 有 **Publisher** 且 **Publisher**\
  \ 已出版 **Book** 的行。\n\n\n\n如何在 Hibernate 中表示这种数据结构？它又提供了哪些额外功能来管理这种关联？\n\n第 5 章 ■\
  \ 多对一和一对一映射\n\n解决方案\n\nHibernate 提供了 **<join>** 映射元素来表示连接表。\n\n工作原理\n\n使用以下 SQL\
  \ 查询来生成表：\n\n****CREATE TABLE \"BOOK5\".\"BOOK_PUBLISHER\"**\n\n**(**\n\n**BOOK_ID\
  \ bigint PRIMARY KEY NOT NULL,**\n\n**PUBLISHER_ID bigint NOT NULL**\n\n**);**\n\
  \n**;**\n\n**CREATE UNIQUE INDEX SQL091217230605770 ON BOOK_PUBLISHER(BOOK_ID)**\n\
  \n**;CREATE TABLE \"BOOK5\".\"BOOK5_2\"**\n\n**(**\n\n**BOOK_ID bigint PRIMARY KEY\
  \ NOT NULL,**\n\n**ISBN varchar(50) NOT NULL,**\n\n**BOOK_NAME varchar(100) NOT\
  \ NULL,**\n\n**PUBLISH_DATE date,**\n\n**PRICE int**\n\n**);**\n\n****CREATE UNIQUE\
  \ INDEX SQL091217225248451 ON BOOK5_2(BOOK_ID);**\n\n****CREATE UNIQUE INDEX SQL091217225248450\
  \ ON BOOK5_2(ISBN);**\n\n******CREATE TABLE \"BOOK5\".\"PUBLISHER5_2\"**\n\n**(**\n\
  \n**PUBLISHER_ID bigint PRIMARY KEY NOT NULL,**\n\n**CODE varchar(4) NOT NULL,**\n\
  \n**PUBLISHER_NAME varchar(100) NOT NULL,**\n\n**ADDRESS varchar(200)**\n\n**);**\n\
  \n****CREATE UNIQUE INDEX SQL091217225248980 ON PUBLISHER5_2(CODE);**\n\n****CREATE\
  \ UNIQUE INDEX SQL091217225248981 ON PUBLISHER5_2(PUBLISHER_ID);**\n\n**书籍映射文件如下：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">**\n\n****<class\
  \ name=\"Book5_2\" table=\"Book5_2\" schema=\"BOOK5\">**\n\n******<id name=\"book_id\"\
  \ type=\"long\" column=\"BOOK_ID\" >**\n\n**<generator**\n\n**class=\"native\">**\n\
  \n**</generator>**\n\n**</id>**\n\n**<property**\n\n**name=\"isbn\"**\n\n**type=\"\
  string\">**\n\n第 5 章 ■ 多对一和一对一映射\n\n******<column name=\"ISBN\" length=\"50\" not-null=\"\
  true\" unique=\"true\" />**\n\n**</property>**\n\n**<property**\n\n**name=\"name\"\
  **\n\n**type=\"string\">**\n\n******<column name=\"BOOK_NAME\" length=\"100\" not-null=\"\
  true\" />**\n\n**</property>**\n\n******<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n******<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n<join table=\"BOOK_PUBLISHER\" optional=\"true\" schema=\"BOOK5\"\
  >\n\n<key\n\ncolumn=\"BOOK_ID\"\n\nunique=\"true\"\n\n/>\n\n<many-to-one\n\nname=\"\
  publisher\"\n\nclass=\"Publisher5_2\"\n\ncolumn=\"PUBLISHER_ID\" not-null=\"true\"\
  \n\ncascade=\"save-update\"\n\nlazy=\"false\"/>\n\n</join>\n\n********</class>**\n\
  \n**</hibernate-mapping>**\n\n**在 **<join>** 映射元素中，**table** 属性保存连接表的名称——此处为 **BOOK_PUBLISHER**。通过设置\
  \ **optional=true**，你告诉 Hibernate 仅当映射分组的属性非空时，才向连接表中插入一行。**Book_Id** 是连接表中的主键，并且隐式唯一。**<many-to-one>**\
  \ 属性指定该连接表与 **Publisher** 实体之间存在多对一关系，且键列为 **Publisher_id**。图 5-2 展示了带连接表的多对一关联的实体关系图。\n\
  \n*图 5-2\\. 展示带连接表的多对一关联的实体关系图* 书籍类的 JPA 映射如下。你使用 **JoinTable** 注解来映射连接表 **BOOK_PUBLISHER**：\n\
  \n**@Entity**\n\n**@Table (name=\"BOOK5_2\", schema=\"BOOK5\")**\n\n**public class\
  \ Book_5_2 implements Serializable{**\n\n**@Id**\n\n****@Column**\n\n**(name=\"\
  BOOK_ID\")**\n\n**@GeneratedValue**\n\n**(strategy=GenerationType.AUTO)**\n\n****private\
  \ Long book_id;**\n\n第 5 章 ■ 多对一和一对一映射\n\n**@Column**\n\n**(name=\"isbn\")**\n\n\
  ****private String isbn;**\n\n**@Column**\n\n**(name=\"BOOK_NAME\")**\n\n****private\
  \ String name;**\n\n@ManyToOne\n\n@Cascade\n\n(value=CascadeType.SAVE_UPDATE)\n\n\
  @JoinTable\n\n(schema=\"BOOK5\",name=\"BOOK_PUBLISHER\",\n\njoinColumns=@JoinColumn(name=\"\
  BOOK_ID\"),\n\ninverseJoinColumns=@JoinColumn(name=\"PUBLISHER_ID\"))\n\n****private\
  \ Publisher5_2 publisher;**\n\n******@Column**\n\n**(name=\"price\")**\n\n****private\
  \ Integer price;**\n\n**// getters and setters**\n\n**}**\n\n**连接表 **BOOK_PUBLISHER**\
  \ 有一个名为 **PUBLISHER_ID** 的外键列，指向由 **inverseJoinColumns** 具体化的 **PUBLISHER** 表；还有一个名为\
  \ **BOOK_ID** 的外键列，指向由 **joinColumns** 属性具体化的 **BOOK** 表。\n\n\n\n5.3 在多对一关联中使用懒加载\n\
  \n问题\n\n在 ORM 框架中两个实体之间的关联里，当从数据库加载一个实体的数据时，依赖实体的数据可能会被一并获取，也可能按需加载。\n\n例如，在**图书**和**出版社**的案例中，**图书**表包含外键列**出版社\
  \ ID**。如果从数据库获取**图书**详情，是否应该同时加载**出版社**详情？还是只在显式获取时才检索**出版社**详情？当依赖对象的详情仅在需要时加载，这被称为*懒加载*。通过懒加载数据，可以提升性能，因为不必要的查询不会被执行。\n\
  \nHibernate 是如何实现懒加载的？在检索对象图时它有什么影响？又有哪些处理方式？\n\n解决方案\n\n启用懒加载定义了在脱管对象上哪些对象是可用的。它通过关键字**lazy**来定义，这与关键字**fetch**不同。关键字**fetch**用于定义获取策略以优化性能。\n\
  \nHibernate 提供了对集合、关联、甚至属性或值类型的懒加载。你将在下一章学习集合的懒加载。实体的值类型也可以懒加载，但通常不需要；它可用于拥有数百列数据的数据库。\n\
  \n第五章 ■ 多对一和一对一映射\n\n工作原理\n\n假设你有一个根据**ID**检索**图书**对象的方法。因为你添加了**<many-to-one>**映射，与**图书**相关的**出版社**对象应该同时被检索：\n\
  \n**Session session = factory.openSession();**\n\n**try {**\n\n**Book book = (Book)\
  \ session.get(Book.class, id);**\n\n**return book;**\n\n**} finally {**\n\n**session.close();**\n\
  \n**}**\n\n**但是当你在该方法外部通过**book.getPublisher()**访问**出版社**对象时，会发生异常：\n\n****System.out.println(book.getName());**\n\
  \n**System.out.println(book.getPublisher().getName());**\n\n**如果将访问代码放在方法体的**try**块内，一切正常。这个异常的原因是什么？这是因为\
  \ Hibernate 直到你在**session**关闭前首次访问**出版社**时，才会从数据库加载**出版社**对象。这种懒加载可以避免不必要的数据库查询，从而提升性能。由于**出版社**是在**session**（已关闭）外部首次被访问，因此抛出了异常。\n\
  \n如果希望从**session**外部访问**出版社**对象，有两种可能的解决方案。一种是通过调用**Hibernate.initialize()**方法显式初始化**出版社**。\n\
  \n这样做会强制从数据库加载**出版社**对象：\n\n****Session session = factory.openSession();**\n\n**try\
  \ {**\n\n**Book book = (Book) session.get(Book.class, id);**\n\n**Hibernate.initialize(book.getPublisher());**\n\
  \n**return book;**\n\n**} finally {**\n\n**session.close();**\n\n**}**\n\n**另一种解决方案是关闭此关联的懒加载。这样做可能会降低性能，因为每次都会将**出版社**对象与**图书**对象一起加载：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">**\n\n****<class\
  \ name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">**\n\n**.**\n\n**.**\n\n**.**\n\
  \n**.**\n\n**.**\n\n<many-to-one name=\"publisher\" class=\"Publisher\" column=\"\
  PUBLISHER_ID\"\n\ncascade=\"save-update\" lazy=\"false\" />\n\n第五章 ■ 多对一和一对一映射\n\
  \n********</class>**\n\n**</hibernate-mapping>**\n\n5.4 共享主键关联\n\n问题\n\n在什么场景下需要共享主键，以及如何映射它？\n\
  \n解决方案\n\n\n\n当两个表中的行与某一行的主键值相关联时，就称它们*共享*主键。当两个对象之间需要紧密耦合时，可以使用这种实现方式。\n\n工作原理\n\
  \n让我们使用 **Customer** 和 **Address** 类，通过共享主键来创建一对一映射：\n\n****public class Customer5_1\
  \ implements Serializable {**\n\n******private static final long *serialVersionUID***\
  \ **= -3534434932962734600L;**\n\n****private Long id;**\n\n****private String countryCode;**\n\
  \n****private String idCardNo;**\n\n****private String firstName;**\n\n****private\
  \ String lastName;**\n\n****private Address5_1 address;**\n\n**private String email;**\n\
  \n**//getters and setters**\n\n**}**\n\n****public class Address5_1 implements Serializable{**\n\
  \n********private static final long *serialVersionUID*** **= -605474766287314591L;**\n\
  \n****private Long id;**\n\n****private String city;**\n\n****private String street;**\n\
  \n****private String doorplate;**\n\n****private Customer5_1 customer;**\n\n**//getters\
  \ and setters**\n\n**}**\n\n**Customer** 类的映射方式与常规类相同。它还包含一个一对一映射元素，用于将 **Customer**\
  \ 映射到 **Address**。你将 **cascade** 选项设置为 **save-update**，因为希望在保存 **Customer** 对象时也保存\
  \ **Address**：\n\n第 5 章 ■ 多对一和一对一映射\n\n**<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
  >**\n\n****<class name=\"Customer5_1\" table=\"CUSTOMER\" schema=\"BOOK5\">**\n\n\
  ******<id name=\"id\" type=\"long\" column=\"ID\">**\n\n**<generator**\n\n**class=\"\
  native\"></generator>**\n\n**</id>**\n\n******<property name=\"firstName\" type=\"\
  string\" column=\"FIRST_NAME\" />**\n\n******<property name=\"lastName\" type=\"\
  string\" column=\"LAST_NAME\" />**\n\n******<property name=\"idCardNo\" type=\"\
  string\" column=\"ID_CARD_NO\" />**\n\n******<property name=\"countryCode\" type=\"\
  string\" column=\"COUNTRY_CODE\" />**\n\n******<property name=\"email\" type=\"\
  string\" column=\"EMAIL\" />**\n\n<one-to-one\n\nname=\"address\"\n\nclass=\"com.hibernaterecipes.chapter5.Address5_1\"\
  \n\ncascade=\"save-update\"></one-to-one>\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**仅凭这个映射，只要 **Address** 类被映射为独立的实体，就能建立单向的一对一映射。为了实现主键共享，你需要像下面这样映射 **Address**\
  \ 类：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">**\n\n\
  ****<class name=\"Address5_1\" table=\"ADDRESS\" schema=\"BOOK5\">**\n\n<id name=\"\
  id\" type=\"long\" column=\"ID\" >\n\n<generator\n\nclass=\"foreign\">\n\n<param\n\
  \nname=\"property\">customer</param>\n\n</generator>\n\n</id>\n\n******<property\
  \ name=\"city\" type=\"string\" column=\"CITY\" />**\n\n******<property name=\"\
  street\" type=\"string\" column=\"STREET\" />**\n\n******<property name=\"doorplate\"\
  \ type=\"string\" column=\"DOOR_PLATE\" />**\n\n<one-to-one name=\"customer\" class=\"\
  Customer5_1\" constrained=\"true\"></one-to-one>\n\n********</class>**\n\n**</hibernate-mapping>**\n\
  \n**在 **Address** 映射文件中，你通过 one-to-one 元素建立了双向关联。同时请注意，你将 **constrained** 设置为 **true**，这会添加一个外键约束。该约束将\
  \ **ADDRESS** 表的主键链接到 **CUSTOMER** 表的主键。**Address** 类的主键 **generator** 被设置为 **foreign**，并带有一个指向\
  \ **Customer** 实例的属性映射；这会导致 **Customer** 和 **Address** 类之间共享主键。此外，你不能在不删除 **Address**\
  \ 类的情况下删除 **Customer** 类。\n\nJPA 规范没有处理共享主键的方法。它在建立双向关联和外键方面存在严重问题。在 JPA 注解中，**Customer**\
  \ 类的 **Address** 属性必须使用 **OneToOne** 和 **PrimaryKeyJoinColumn** 注解进行映射：\n\n**@Entity**\n\
  \n**@Table (name=\"CUSTOMER\",schema=\"BOOK5\")**\n\n**public class Customer5_1\
  \ implements Serializable {**\n\n******private static final long *serialVersionUID***\
  \ **= -3534434932962734600L;**\n\n**@Column**\n\n**(name=\"ID\")**\n\n\n\n第 5 章\
  \ ■ 多对一与一对一映射\n\n**@Id**\n\n**@GeneratedValue**\n\n**(strategy=GenerationType. *AUTO*)**\n\
  \n****private Long id;**\n\n******@Column**\n\n**(name=\"COUNTRY_CODE\")**\n\n****private\
  \ String countryCode;**\n\n******@Column**\n\n**(name=\"ID_CARD_NO\")**\n\n****private\
  \ String idCardNo;**\n\n******@Column**\n\n**(name=\"FIRST_NAME\")**\n\n****private\
  \ String firstName;**\n\n******@Column**\n\n**(name=\"LAST_NAME\")**\n\n****private\
  \ String lastName;**\n\n****@OneToOne\n\n@PrimaryKeyJoinColumn\n\n(name=\"ID\")\n\
  \n****private Address5_1 address;**\n\n**// getters 和 setters**\n\n**}**\n\n**Address**\
  \ 类的 **ID** 属性没有使用任何标识生成策略进行注解。同时请注意，**Address** 类没有将 **customer** 作为属性：\n\n****@Entity**\n\
  \n**@Table (name=\"ADDRESS\",schema=\"BOOK5\")**\n\n**public class Address5_1 implements\
  \ Serializable**\n\n**{**\n\n********private static final long *serialVersionUID***\
  \ **= -605474766287314591L;**\n\n@Id\n\n@Column\n\n(name=\"ADDRESS_ID\")\n\n****private\
  \ Long id;**\n\n******@Column(name=\"CITY\")**\n\n****private String city;**\n\n\
  ******@Column(name=\"STREET\")**\n\n****private String street;**\n\n******@Column(name=\"\
  DOOR_PLATE\")**\n\n****private String doorplate;**\n\n**// getters 和 setters**\n\
  \n**}**\n\n**要持久化 **Address** 对象，你必须手动将关联的 **Customer** ID 设置为 **Address** 对象的主键。\n\
  \n第 5 章 ■ 多对一与一对一映射\n\n5.5 使用外键创建一对一关联\n\n问题\n\n假设一个 **Customer** 只有一个 **Address**，并且一个\
  \ **Address** 只属于一个 **Customer**。这意味着 **Customer** 和 **Address** 之间存在一对一关系。如何在 Hibernate\
  \ 中表示一对一关联？\n\n解决方案\n\n映射一对一关联最简单的方法是将其视为多对一关联，但为其添加唯一约束。你可以以相同的方式声明 **lazy**、**fetch**\
  \ 和 **cascade** 属性。\n\n工作原理\n\n你可以使用 **Customer** 和 **Address** 类通过外键关联创建一对一映射。（**Customer**\
  \ 和 **Address** 类保持不变——为了演示目的而重命名。）**Customer** 的 Hibernate 映射将 **Address** 属性映射为多对一关联。\n\
  \n将 **unique** 约束设置为 **true**，以将此关联从多对一更改为一对一：\n\n****<hibernate-mapping package=\"\
  com.hibernaterecipes.chapter5\">**\n\n****<class name=\"Customer5_2\" table=\"CUSTOMER\"\
  \ schema=\"BOOK5\">**\n\n******<id name=\"id\" type=\"long\" column=\"ID\">**\n\n\
  **<generator**\n\n**class=\"native\"></generator>**\n\n**</id>**\n\n******<property\
  \ name=\"firstName\" type=\"string\" column=\"FIRST_NAME\" />**\n\n******<property\
  \ name=\"lastName\" type=\"string\" column=\"LAST_NAME\" />**\n\n******<property\
  \ name=\"idCardNo\" type=\"string\" column=\"ID_CARD_NO\" />**\n\n******<property\
  \ name=\"countryCode\" type=\"string\" column=\"COUNTRY_CODE\" />**\n\n******<property\
  \ name=\"email\" type=\"string\" column=\"EMAIL\" />**\n\n<many-to-one\n\nname=\"\
  address\"\n\nclass=\"com.hibernaterecipes.chapter5.Address5_2\"\n\ncolumn=\"ADDRESS_ID\"\
  \n\ncascade=\"save-update\"\n\nunique=\"true\">\n\n</many-to-one>\n\n**</class>**\n\
  \n**</hibernate-mapping>**\n\n**为了实现双向性，你在 **Address** 类的 **customer** 属性中添加一个一对一映射。你使用\
  \ **property_ref** 属性来指示 Hibernate 关联所指向的属性；这被称为*反向属性引用*：\n\n****<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter5\">**\n\n****<class name=\"Address5_2\"\
  \ table=\"ADDRESS\" schema=\"BOOK5\">**\n\n******<id name=\"id\" type=\"long\" column=\"\
  ADDRESS_ID\" >**\n\n**<generator**\n\n**class=\"native\">**\n\n第 5 章 ■ 多对一与一对一映射\n\
  \n**</generator>**\n\n**</id>**\n\n******<property name=\"city\" type=\"string\"\
  \ column=\"CITY\" />**\n\n******<property name=\"street\" type=\"string\" column=\"\
  STREET\" />**\n\n******<property name=\"doorplate\" type=\"string\" column=\"DOOR_PLATE\"\
  \ />**\n\n<one-to-one name=\"customer\" class=\"Customer5_2\" property-\n\nref=\"\
  address\"></one-to-one>\n\n********</class>**\n\n**</hibernate-mapping>**\n\n\n\n\
  **在 JPA 注解中，**Customer** 类的 **Address** 属性通过 **OneToOne** 和 **JoinColumn** 注解进行映射。同时请注意，你启用了\
  \ **cascade** 特性，该特性会保存与客户关联的地址：\n\n****@Entity**\n\n**@Table (name=\"CUSTOMER\"\
  ,schema=\"BOOK5\")**\n\n**public class Customer5_2 implements Serializable {**\n\
  \n******private static final long *serialVersionUID*** **= -3534434932962734600L;**\n\
  \n@Column\n\n(name=\"ID\")\n\n@Id\n\n@GeneratedValue\n\n(strategy=GenerationType.\
  \ *AUTO*)\n\n****private Long id;**\n\n******@Column**\n\n**(name=\"COUNTRY_CODE\"\
  )**\n\n****private String countryCode;**\n\n******@Column**\n\n**(name=\"ID_CARD_NO\"\
  )**\n\n****private String idCardNo;**\n\n******@Column**\n\n**(name=\"FIRST_NAME\"\
  )**\n\n****private String firstName;**\n\n******@Column**\n\n**(name=\"LAST_NAME\"\
  )**\n\n****private String lastName;**\n\n****@OneToOne\n\n(cascade=CascadeType.\
  \ *ALL*)\n\n@JoinColumn\n\n(name=\"ADDRESS_ID\")\n\n****private Address5_2 address;**\n\
  \n******@Column**\n\n**(name=\"EMAIL\")**\n\n****private String email;**\n\n**//\
  \ getters and setters**\n\n**}**\n\n**如下所示是 **Address** 类。**customer** 通过另一个一对一注解进行映射，从而形成双向关联。反向属性引用通过\
  \ **mappedBy** 属性实现：\n\n第 5 章 ■ 多对一和一对一映射\n\n**@Entity**\n\n**@Table (name=\"ADDRESS\"\
  ,schema=\"BOOK5\")**\n\n**public class Address5_2 implements Serializable**\n\n\
  **{**\n\n********private static final long *serialVersionUID*** **= -605474766287314591L;**\n\
  \n**@Id**\n\n****@Column**\n\n**(name=\"ADDRESS_ID\")**\n\n**@GeneratedValue**\n\
  \n**(strategy=GenerationType. *AUTO*)**\n\n****private Long id;**\n\n******@Column(name=\"\
  CITY\")**\n\n****private String city;**\n\n******@Column(name=\"STREET\")**\n\n\
  ****private String street;**\n\n******@Column(name=\"DOOR_PLATE\")**\n\n****private\
  \ String doorplate;**\n\n****@OneToOne\n\n(mappedBy=\"address\")\n\n****private\
  \ Customer5_2 customer;**\n\n****// getters and setters**\n\n**}**\n\n5.6 使用连接表创建一对一关联\n\
  \n问题\n\n另一种表示一对一关联的策略是使用连接表。如配方 5.2 所述，在某些场景下，表中的外键为空。为了避免存储带有空外键的行，你可以创建一个连接表，用于保存两个依赖实体的\
  \ ID。如何在 Hibernate 中使用连接表来建立一对一关联？\n\n解决方案\n\n映射一对一关联的最后一种方法是在多对一关联中使用连接表元素。除非 **<key>**\
  \ 和 **<many-to-one>** 映射都需要唯一约束，否则没有区别。这种方法很少使用。\n\n工作原理\n\n你需要通过脚本创建表，而不是将 **hbm2ddl.auto**\
  \ 选项设置为 Create。你按如下方式创建 **ADDRESS**、**CUSTOMER** 和连接表（**CUSTOMERADDRESS**）：**create\
  \ table \"BOOK5\".\"ADDRESS\" ( address_Id bigint not null primary key,** 109\n\n\
  第 5 章 ■ 多对一和一对一映射\n\n**CITY**\n\n**VARCHAR(50),**\n\n**STREET**\n\n**VARCHAR(50),**\n\
  \n****DOOR_PLATE**\n\n**VARCHAR(50));**\n\n******************create table \"BOOK5\"\
  .\"CUSTOMER\" ( Id bigint not null primary key,** **FIRST_NAME**\n\n**VARCHAR(50),**\n\
  \n**LAST_NAME**\n\n**VARCHAR(50),**\n\n****ID_CARD_NO**\n\n**VARCHAR(50),**\n\n\
  **COUNTRY_CODE**\n\n**VARCHAR(50),**\n\n**EMAIL**\n\n**VARCHAR(50));**\n\n****************************create\
  \ table \"BOOK5\".\"CUSTOMERADDRESS\" ( Id bigint not null primary key,**\n\n**********address_Id\
  \ bigint not null unique );**\n\n**用于单向关联的 **Address** 和 **Customer** 类如下所示：public\
  \ class Address5_3 implements Serializable{\n\n********private static final long\
  \ serialVersionUID = -605474766287314591L;**\n\n****private Long addressId;**\n\n\
  ****private String city;**\n\n****private String street;**\n\n****private String\
  \ doorplate;**\n\n**// getters and setters**\n\n**}**\n\n**public class Customer5_3\
  \ implements Serializable {\n\n******private static final long serialVersionUID\
  \ = -3534434932962734600L;**\n\n****private Long id;**\n\n****private String countryCode;**\n\
  \n****private String idCardNo;**\n\n****private String firstName;**\n\n****private\
  \ String lastName;**\n\n****private Address5_3 address;**\n\n\n\n****private String\
  \ email;**\n\n**// getters 和 setters**\n\n**}**\n\n**Address** 类的 Hibernate 映射文件与任何简单的实体映射文件类似，因为这是一个单向映射：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">**\n\n<class\
  \ name=\"Address5_3\" table=\"Address\" schema=\"BOOK5\">\n\n******<id name=\"addressId\"\
  \ type=\"long\" column=\"ADDRESS_ID\" >**\n\n**<generator**\n\n**class=\"native\"\
  >**\n\n**</generator>**\n\n**</id>**\n\n第 5 章 ■ 多对一和一对一映射\n\n******<property name=\"\
  city\" type=\"string\" column=\"CITY\" />**\n\n******<property name=\"street\" type=\"\
  string\" column=\"STREET\" />**\n\n******<property name=\"doorplate\" type=\"string\"\
  \ column=\"DOOR_PLATE\" />**\n\n****************</class>**\n\n**</hibernate-mapping>**\n\
  \n客户的 Hibernate 映射文件包含 **join** 元素。**join** 元素映射到 **CUSTOMERADDRESS** 连接表；它被映射为以客户\
  \ **ID** 作为主键（参见创建查询）。\n\n连接表包含映射到 **ADDRESS** 表的 **many-to-one** 元素。在 **many-to-one**\
  \ 映射元素中，**unique** 属性被设置为 **true**，该属性与键列一起建立了一对一映射。另请注意，由于您正在处理多个模式，因此在 **join**\
  \ 元素中使用了 **schema** 属性：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
  >**\n\n<class name=\"Customer5_3\" table=\"Customer\" schema=\"BOOK5\">\n\n******<id\
  \ name=\"id\" type=\"long\" column=\"ID\">**\n\n**<generator**\n\n**class=\"native\"\
  ></generator>**\n\n**</id>**\n\n******<property name=\"firstName\" type=\"string\"\
  \ column=\"FIRST_NAME\" />**\n\n******<property name=\"lastName\" type=\"string\"\
  \ column=\"LAST_NAME\" />**\n\n******<property name=\"idCardNo\" type=\"string\"\
  \ column=\"ID_CARD_NO\" />**\n\n******<property name=\"countryCode\" type=\"string\"\
  \ column=\"COUNTRY_CODE\" />**\n\n******<property name=\"email\" type=\"string\"\
  \ column=\"EMAIL\" />**\n\n<join table=\"CustomerAddress\" optional=\"true\" schema=\"\
  BOOK5\" >\n\n<key\n\ncolumn=\"ID\"\n\nunique=\"true\">\n\n**</key>**\n\n<many-to-one\n\
  \nname=\"address\"\n\n**column=\"ADDRESS_ID\"**\n\n****not-null=\"true\"**\n\n**cascade=\"\
  save-update\"**\n\n**unique=\"true\">**\n\n**</many-to-one>**\n\n**</join>**\n\n\
  ********</class>**\n\n**</hibernate-mapping>**\n\n现在，谈到双向性，您必须在 **address** 对象中添加\
  \ **customer** 作为属性：\n\n****public class Address5_3 implements Serializable{**\n\
  \n********private static final long *serialVersionUID*** **= -605474766287314591L;**\n\
  \n****private Long addressId;**\n\n****private String city;**\n\n****private String\
  \ street;**\n\n****private String doorplate;**\n\nprivate Customer5_3 customer;\n\
  \n**// getters 和 setters**\n\n**}**\n\n第 5 章 ■ 多对一和一对一映射\n\n并且地址映射文件必须包含一个与 **CUSTOMER**\
  \ 表中类似的 **join** 元素，以使其成为双向一对一映射：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
  >**\n\n<class name=\"Address5_3\" table=\"Address\" schema=\"BOOK5\">\n\n******<id\
  \ name=\"addressId\" type=\"long\" column=\"ADDRESS_ID\" >**\n\n**<generator**\n\
  \n**class=\"native\">**\n\n**</generator>**\n\n**</id>**\n\n******<property name=\"\
  city\" type=\"string\" column=\"CITY\" />**\n\n******<property name=\"street\" type=\"\
  string\" column=\"STREET\" />**\n\n******<property name=\"doorplate\" type=\"string\"\
  \ column=\"DOOR_PLATE\" />**\n\n<join table=\"CustomerAddress\" optional=\"true\"\
  \ inverse=\"true\">\n\n<key\n\ncolumn=\"ADDRESS_ID\"\n\nunique=\"true\"\n\n/>\n\n\
  **<many-to-one**\n\n**name=\"customer\"**\n\n**class=\"com.hibernaterecipes.chapter5.Customer5_3\"\
  **\n\n**column=\"ID\"**\n\n**unique=\"true\"\n\n**not-null=\"true\">**\n\n**</many-to-one>**\n\
  \n**</join>**\n\n**************</class>**\n\n**</hibernate-mapping>**\n\n使用 JPA\
  \ 注解，**Address** 类通过 **OneToOne** 注解映射到其 **customer** 属性：\n\n****@Entity**\n\n**@Table\
  \ (name=\"ADDRESS\",schema=\"BOOK5\")**\n\n**public class Address5_3 implements\
  \ Serializable**\n\n**{**\n\n****private static final long *serialVersionUID***\
  \ **= -605474766287314591L;**\n\n**@Id**\n\n****@Column**\n\n**(name=\"ADDRESS_ID\"\
  )**\n\n**@GeneratedValue**\n\n**(strategy=GenerationType. *AUTO*)**\n\n****private\
  \ Long id;**\n\n******@Column(name=\"CITY\")**\n\n****private String city;**\n\n\
  \n\n**@Column(name=\"STREET\")**\n\n****private String street;**\n\n**@Column(name=\"\
  DOOR_PLATE\")**\n\n****private String doorplate;**\n\n****@OneToOne\n\n(mappedBy=\"\
  address\")\n\nprivate Customer5_2 customer;\n\n**// getters and setters**\n\n**}**\n\
  \n第 5 章 ■ 多对一和一对一映射\n\n**Customer** 表使用 **JoinTable** 注解来映射 **address** 对象：\n\n\
  ****@Entity**\n\n**@Table (name=\"CUSTOMER\",schema=\"BOOK5\")**\n\n**public class\
  \ Customer5_3 implements Serializable {**\n\n******private static final long *serialVersionUID***\
  \ **= -3534434932962734600L;**\n\n**@Column**\n\n**(name=\"ID\")**\n\n**@Id**\n\n\
  **@GeneratedValue**\n\n**(strategy=GenerationType. *AUTO*)**\n\n****private Long\
