  \n**@Table (name=\"BOOK\")**\n\n**public class BookCh2 {**\n\n****@Id**\n\n**@GeneratedValue\
  \ (strategy=GenerationType.TABLE)**\n\n**@Column (name=\"ISBN\")**\n\n**private\
  \ long isbn;**\n\n****@Version**\n\n**@Column (name=\"version\")**\n\n**private\
  \ Integer version;**\n\n****@Column (name=\"book_Name\")**\n\n**private String bookName;**\n\
  \n****/*@Column (name=\"publisher_code\")**\n\n**String publisherCode;*/**\n\n****@Column\
  \ (name=\"publish_date\")**\n\n**private Date publishDate;**\n\n****@Column (name=\"\
  price\")**\n\n**private Long price;**\n\n**// getters and setters**\n\n**}**\n\n\
  13.4 使用悲观并发控制\n\n问题\n\n如何在应用程序中实现悲观并发控制以保存**book**实体？\n\n解决方案\n\n大多数应用程序的隔离级别是读已提交。此隔离级别允许不可重复读，这是不可取的。避免不可重复读的一种方法是在应用程序中实现版本控制。这种将隔离级别从读已提交升级到可重复读的做法会带来可扩展性问题。因此，作为应用程序开发者，你可能不希望进行全应用范围的版本控制升级——你可能只想按单元升级隔离级别。为此，Hibernate\
  \ 在 Hibernate **session**对象中提供了**lock()**方法。\n\n第 13 章 ■ 事务与并发\n\n工作原理\n\n\n\n以下代码演示了不可重复读是如何发生的。首先使用\
  \ **session.get()** 获取图书对象，然后通过查询读取图书名称。如果在这两次调用之间，另一个并发事务更新了数据库中该图书记录，就会发生不可重复读的情况：\n\
  \n****Session session = getSession();**\n\n**Transaction tx = null;**\n\n**tx =\
  \ session.beginTransaction();**\n\n**BookCh2 book = (BookCh2)session.get(BookCh2.class,\
  \ new Long(32769));**\n\n**String name = (String) session.createQuery(\"select b.name\
  \ from bkch2 b where b.isbn =**\n\n**:isbn\")**\n\n**.setParameter(\"isbn\", book.getIsbn()).uniqueResult();**\
  \ **System.out.println(\"BOOk's Name- \"+name);**\n\n**tx.commit();**\n\n**session.close();**\n\
  \n你可以使用 **session.lock** 来提升隔离级别。上述代码更新如下：\n\n****Session session = getSession();**\n\
  \n**Transaction tx = null;**\n\n**tx = session.beginTransaction();**\n\n**BookCh2\
  \ book = (BookCh2)session.get(BookCh2.class, new Long(32769));**\n\nsession.lock(book,\
  \ LockMode.UPGRADE);\n\n**String name = (String) session.createQuery(\"select b.name\
  \ from bkch2 b where b.isbn =**\n\n**:isbn\")**\n\n**.setParameter(\"isbn\", book.getIsbn()).uniqueResult();**\
  \ **System.out.println(\"BOOk's Name- \"+name);**\n\n**tx.commit();**\n\n**session.close();**\n\
  \n或者，你也可以直接调用\n\n**BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769),LockMode.UPGRADE);\
  \ **LockMode.UPGRADE** 会在数据库中对特定图书记录创建锁。这样一来，其他并发事务就无法修改该图书记录了。\n\nHibernate 支持以下锁模式：\n\
  \n• **LockMode.NONE**：这是默认的锁模式。如果以该锁模式请求对象，当需要从数据库（而非缓存）读取状态时，会获取一个 **READ** 锁。\n\
  \n• **LockMode.READ**：在该锁模式下，对象从数据库中被读取。对象的版本会被检查，就像在内存中一样。\n\n• **LockMode.UPGRADE**：以该锁模式加载的对象，会通过\
  \ SQL 语句 **select ... for update** 实现。它等同于 Java Persistence 中的 **LockModeType.READ**。\n\
  \n第 13 章 ■ 事务与并发\n\n• **LockMode.UPGRADE_NOWAIT**：该锁模式尝试使用 Oracle 风格的 **select for\
  \ update nowait** 来获取升级锁。一旦获取成功，该锁模式的语义与 **UPGRADE** 相同。\n\n• **LockMode.FORCE**：该锁模式会导致强制版本递增。它等同于\
  \ Java Persistence 中的 **LockModeType.Write**。\n\n• **LockMode.WRITE**：当对象被更新或插入时，会获取一个\
  \ **WRITE** 锁。该锁模式仅供内部使用，不是 **load()** 或 **lock()** 方法的有效模式。\n\n小结\n\n在本章中，你了解了如何以编程方式管理事务。你学会了使用\
  \ Hibernate Transaction API 和 Java Transaction API 进行事务划分。\n\n乐观并发控制和悲观并发控制是实现并发控制的两种方法。乐观并发控制涉及使用版本号或时间戳，将版本作为数据库列来维护。悲观控制则基于每个事务进行，通过使用\
  \ **session.lock()** 并指定锁模式为 **UPGRADE** 或 **UPGRADE_NOWAIT** 来实现。\n\n**第 14 章**\n\
  \n■ ■ ■\n\n**Web 应用程序**\n\n软件工程师使用分层来分解复杂的应用程序或系统。*分层* 是将代码组织成独立的功能组件，这些组件以某种顺序和层次化的方式相互交互。每一层都位于另一层之上，并且通常只与紧邻的上下层交互。每一层都可以被视为一个单一的、连贯的组件，可用于提供许多高级服务。你可以在不了解其他层细节的情况下处理某一层。通过将层之间的依赖关系保持在最低限度，可以轻松地重构或替换单个层，而不会影响所有其他层。添加过多的层可能会对性能产生影响。\n\
  \n*模式* 用于创建层并为每一层增加结构。流行的模式包括模型-视图-控制器（MVC）模式、单例模式、工厂模式、观察者模式和装饰器模式等。毫无疑问，MVC 是用于创建分层\
  \ Web 应用程序的最流行模式。MVC 将代码拆分为三个不同的组件：数据访问代码、业务逻辑代码和表示层代码（见图 14-1）。通过将代码分类到这三个层中，可以实现层之间的解耦。解耦使得维护某一层更容易，而无需更改其他层。依赖关系的方向非常重要：模型不依赖于视图/表示层或控制器。如果你在模型层工作，你无需了解视图层。\n\
  \n*图 14-1\\. 模型-视图-控制器模式将代码拆分为三个不同的角色* 本章演示了如何基于此模型构建 Web 应用程序。\n\n第 14 章 ■ Web\
