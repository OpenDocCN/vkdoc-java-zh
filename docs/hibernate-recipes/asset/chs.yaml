  \n并非每个缓存提供程序都与每种并发策略兼容。兼容性矩阵如表 12-2 所示。\n\n*表 12-2. 缓存提供程序的并发策略*\n\n**缓存提供程序 只读型\
  \ 非严格读写型 读写型 事务型**\n\nEHCache 是 是\n\n是\n\nOSCache 是 是\n\n是\n\nSwarmCache 是\n\n是\n\
  \n是\n\nJBoss Cache\n\n是\n\n是\n\n你可以为特定的类或集合配置缓存。**<cache>** 元素用于在 **hibernate.cfg.xml**\
  \ 文件中配置缓存。**<cache>** 元素的定义如下：\n\n****<cache usage=\"transactional|read-write|nonstrict-read-write|read-only\"\
  **\n\n**region=\"RegionName\" include=\"all|lazy\"/>**\n\n**表 12-3 定义了其属性。\n\n第\
  \ 12 章 ■ HIBERNATE 中的缓存\n\n*表 12-3. **<cache>** 元素属性*\n\n**属性 描述**\n\n**usage**\n\
  \n缓存策略。\n\n**region**\n\n区域名称。区域名称是对实际缓存数据的引用。\n\n**include**\n\n指定当启用了属性级别的**延迟加载**时，映射了\
  \ **lazy=true** 的实体的属性不能被缓存。\n\n什么是缓存区域？\n\n\n\n*缓存区域*是用于在缓存提供程序配置中引用类和集合，并设置适用于该区域的过期策略的句柄。区域是两种类型的数据桶：一种包含实体实例的反汇编数据，另一种仅包含通过集合链接的实体的标识符。\n\
  \n对于类缓存，区域名称是类名；对于集合缓存，区域名称是类名加上属性名。\n\n缓存查询结果\n\n可以配置查询的结果集进行缓存。默认情况下，缓存是禁用的，每个\
  \ HQL、JPA QL 和 Criteria 查询都会访问数据库。按如下方式启用查询缓存：\n\n****hibernate.cache.use_query_cache\
  \ = true**\n\n**除了设置此配置属性外，还应使用 **org.hibernate.Query** 接口：\n\n****Query bookQuery\
  \ = session.createQuery(\"from Book book where book.name < ?\");** **bookQuery.setString(\"\
  name\",\"HibernateRecipes\");**\n\n**bookQuery.setCacheable(true);**\n\n**setCacheable()**\
  \ 方法用于启用结果缓存。\n\n12.1 使用一级缓存\n\n问题\n\n什么是一级缓存？它在 Hibernate 中如何使用？\n\n第 12 章 ■ HIBERNATE\
  \ 中的缓存\n\n解决方案\n\n一级缓存位于事务级别或工作单元级别。它在 Hibernate 中默认启用。\n\n一级缓存与会话相关联。如果在同一会话中多次执行相同的查询，与该查询关联的数据会被缓存。\n\
  \n工作原理\n\n缓存持久化对象的一般概念是，当对象首次从外部存储读取时，其副本会存储在缓存中。后续对同一对象的读取可以直接从缓存中获取。由于缓存通常存储在内存或本地磁盘中，从缓存读取对象比从外部存储更快。如果使用得当，缓存可以显著提高应用程序的性能。\n\
  \n作为一个高性能的 ORM 框架，Hibernate 支持在不同级别缓存持久化对象。假设你在一个会话中多次检索同一个对象：Hibernate 会随着查询的调用次数而多次查询数据库吗？\n\
  \n****Session session = factory.openSession();**\n\n**try {**\n\n**Book book1 =\
  \ (Book) session.get(Book.class, id);**\n\n**Book book2 = (Book) session.get(Book.class,\
  \ id);**\n\n**} finally {**\n\n**session.close();**\n\n**}**\n\n**如果你检查 Hibernate\
  \ 执行的 SQL 语句，你会发现只执行了一次数据库查询。这意味着 Hibernate 在同一会话中缓存了你的对象。这种缓存称为*一级缓存*，其缓存范围是一个会话。\n\
  \n但是，在两个不同的会话中多次获取具有相同标识符的对象会怎样呢？\n\n****Session session1 = factory.openSession();**\n\
  \n**try {**\n\n**Book book1 = (Book) session1.get(Book.class, id);**\n\n**} finally\
  \ {**\n\n**session1.close();**\n\n**}**\n\n**Session session2 = factory.openSession();**\n\
  \n**try {**\n\n**Book book2 = (Book) session2.get(Book.class, id);**\n\n**} finally\
  \ {**\n\n**session2.close();**\n\n**}**\n\n**这里执行了两次数据库查询。这意味着 Hibernate 默认不会跨不同会话缓存持久化对象。你需要启用这种*二级缓存*，其缓存范围是一个会话工厂。\n\
  \n第 12 章 ■ HIBERNATE 中的缓存\n\n12.2 配置二级缓存\n\n问题\n\n什么是二级缓存？它在 Hibernate 中如何配置和使用？\n\
  \n解决方案\n\n二级缓存配置在进程级别或集群级别。在 Hibernate 中，你可以为特定类或集合配置它以提高性能。你可以将二级缓存用于可能经常加载的大型复杂对象图。它与一个\
  \ **SessionFactory** 相关联，并且可以在从同一 **SessionFactory** 创建的多个 **Session** 中重用。\n\n\
  工作原理\n\n\n\n要开启二级缓存，第一步是在 Hibernate 配置文件 **hibernate.cfg.xml** 中选择一个缓存提供者。如前所述，Hibernate\
  \ 支持多种缓存实现，例如 EHCache、OSCache、SwarmCache 和 JBoss Cache。在非分布式环境中，你可以选择 EHCache，它是\
  \ Hibernate 的默认缓存提供者：\n\n****<hibernate-configuration>**\n\n**<session-factory>**\n\
  \n**...**\n\n<property name=\"cache.provider_class\">\n\norg.hibernate.cache.EhCacheProvider\n\
  \n</property>\n\n**...**\n\n**</session-factory>**\n\n**</hibernate-configuration>**\n\
  \n**你可以通过位于源码根目录的配置文件 **ehcache.xml** 来配置 EHCache。你可以为不同的缓存区域指定不同的设置，这些区域用于存储不同类型的对象。如果参数\
  \ **eternal** 设置为 false，元素将在一定时间后过期。参数 **timeToIdleSeconds** 是元素过期前的空闲时间；它表示元素在过期前两次访问之间的最大时间间隔，并且仅在元素不是永久的时才生效。\n\
  \n参数 **timeToLiveSeconds** 是元素过期前的存活时间；它表示从创建到元素过期之间的最大时间，并且仅在元素不是永久的时才生效：\n\n****<ehcache>**\n\
  \n**<diskStore path=\"java.io.tmpdir\" />**\n\n**<defaultCache maxElementsInMemory=\"\
  10000\" eternal=\"false\" timeToIdleSeconds=\"120\"**\n\n**timeToLiveSeconds=\"\
  120\" overflowToDisk=\"true\"**\n\n**/>**\n\n**<cache name=\"com.metaarchit.bookshop.Book\"\
  \ maxElementsInMemory=\"10000\"**\n\n**eternal=\"false\" timeToIdleSeconds=\"300\"\
  \ timeToLiveSeconds=\"600\"**\n\n**overflowToDisk=\"true\"**\n\n**/>**\n\n第 12 章\
  \ ■ HIBERNATE 中的缓存\n\n**</ehcache>**\n\n要在运行时监控 Hibernate 的缓存活动，请将以下行添加到 log4j 配置文件\
  \ **log4j.properties** 中：\n\n****log4j.logger.org.hibernate.cache=debug**\n\n**现在，你需要为特定的持久化类启用缓存。让我们看看在\
  \ Hibernate 中启用缓存时，幕后发生了什么。\n\n当你为一个类启用二级缓存时，Hibernate 并不会在缓存中存储实际的实例。相反，它会缓存该对象的各个属性。在示例中，**Book**\
  \ 的实例并未被缓存——而是 **book** 对象中的属性（如 **name** 和 **price**）被缓存了。缓存的对象存储在与持久化类同名的区域中，例如\n\
  \n**com.metaarchit.bookshop.Book**。\n\n你可以为持久化类选择几种缓存用法。如果持久化对象是只读的且从不修改，最高效的用法是\
  \ **read-only**：\n\n****<hibernate-mapping package=\"com.metaarchit.bookshop\">**\n\
  \n**<class name=\"Book\" table=\"BOOK\">**\n\n<cache usage=\"read-only\" />\n\n\
  **...**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**当 **Book** 类被缓存后，即使 **book**\
  \ 对象在两个不同的会话中被多次加载，也只会执行一次 SQL 查询。由于避免了对数据库的第二次调用，查询性能得到了提升：\n\n****Session session1\
  \ = factory.openSession();**\n\n**try {**\n\n**Book book1 = (Book) session1.get(Book.class,\
  \ id);**\n\n**} finally {**\n\n**session1.close();**\n\n**}**\n\n**Session session2\
  \ = factory.openSession();**\n\n**try {**\n\n**Book book2 = (Book) session2.get(Book.class,\
  \ id);**\n\n**} finally {**\n\n**session2.close();**\n\n**}**\n\n**然而，如果你在一个会话中修改了\
  \ **book** 对象并刷新更改，将会抛出一个异常，提示更新只读对象。\n\n****Session session1 = factory.openSession();**\n\
  \n**try {**\n\n**Book book1 = (Book) session1.get(Book.class, id);**\n\nbook1.setName(\"\
  New Book\");\n\nsession1.save(book1);\n\nsession1.flush();\n\n**} finally {**\n\n\
  第 12 章 ■ HIBERNATE 中的缓存\n\n****session1.close();**\n\n**}**\n\n**因此，对于可更新的对象，你应该选择另一种缓存用法：**read-write**。Hibernate\
  \ 会在对象更新前将其从缓存中失效：\n\n****<hibernate-mapping package=\"com.metaarchit.bookshop\"\
  >**\n\n**<class name=\"Book\" table=\"BOOK\">**\n\n<cache usage=\"read-write\" />\n\
  \n**...**\n\n\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**在某些情况下，例如当数据库被其他应用程序更新时，你可能希望手动使缓存对象失效。你可以通过会话工厂提供的方法来实现。你可以使持久化类的单个实例或所有实例失效：\n\
  \n****factory.evict(Book.class);**\n\n**factory.evict(Book.class, id);**\n\n**factory.evictEntity(\"\
  com.metaarchit.bookshop.Book\");**\n\n**factory.evictEntity(\"com.metaarchit.bookshop.Book\"\
  , id);**\n\n**缓存对象从缓存中逐出后，当你需要从数据库获取数据时，会执行查询并检索更新后的数据。这可以避免缓存中出现过时数据。请注意，从二级缓存中逐出是非事务性的，这意味着在逐出过程中缓存区域不会被锁定。\n\
  \n**提供了**CacheMode**选项来控制 Hibernate 与二级缓存的交互：\n\n****Session session1 = factory.openSession();**\n\
  \nSession.setCacheMode(CacheMode.IGNORE);\n\n**try {**\n\n**Book book1 = new Book();**\n\
  \n**book1.setName(\"New Book\");**\n\n**session1.save(book1);**\n\n**session1.flush();**\n\
  \n**} finally {**\n\n**session1.close();**\n\n**}**\n\n****CacheMode.IGNORE**告诉\
  \ Hibernate 在该会话中不要与二级缓存交互。**CacheMode**中可用的选项如下：\n\n• **CacheMode.NORMAL**：默认行为。\n\
  \n• **CacheMode.IGNORE**：Hibernate 不与二级缓存交互。当二级缓存中缓存的实体被更新时，Hibernate 会使它们失效。\n\n\
  • **CacheMode.GET**：Hibernate 仅从二级缓存读取，不添加条目。当二级缓存中缓存的实体被更新时，Hibernate 会使它们失效。\n\
  \n第 12 章 ■ HIBERNATE 中的缓存\n\n• **CacheMode.PUT**：Hibernate 仅向二级缓存添加条目，不从二级缓存读取。当二级缓存中缓存的实体被更新时，Hibernate\
  \ 会使它们失效。\n\n• **CacheMode.REFRESH**：Hibernate 仅向二级缓存添加条目，不从二级缓存读取。在此模式下，会绕过 **hibernate.cache.use_minimal_puts**\
  \ 的设置，因为强制进行了刷新。\n\n12.3 缓存关联\n\n问题\n\n关联对象可以被缓存吗？如何配置？\n\n解决方案\n\n关联对象在数据库中具有父子关系。在这种情况下，缓存是如何工作的？\n\
  \n如果父对象被缓存，子对象是否也被缓存？默认情况下，关联对象不会被缓存。如果需要缓存这些对象，可以显式配置。缓存关联的主要原因是避免对数据库的额外调用。\n\n\
  工作原理\n\n当**图书**的父对象**book**被缓存时，其关联的**publisher**对象是否也被缓存？\n\n****<hibernate-mapping\
  \ package=\"com.metaarchit.bookshop\">**\n\n**<class name=\"Book\" table=\"BOOK\"\
  >**\n\n**<cache usage=\"read-write\" />**\n\n**...**\n\n**<many-to-one name=\"publisher\"\
  \ class=\"Publisher\" column=\"PUBLISHER_ID\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**如果你在两个不同的会话中初始化该关联，那么每次初始化时都会加载它。这是因为 Hibernate 仅在**Book**的区域中缓存了**publisher**的标识符：\n\
  \n****Session session1 = factory.openSession();**\n\n**try {**\n\n**Book book1 =\
  \ (Book) session1.get(Book.class, id);**\n\nHibernate.initialize(book1.getPublisher());\n\
  \n**} finally {**\n\n**session1.close();**\n\n**}**\n\n**Session session2 = factory.openSession();**\n\
  \n**try {**\n\n**Book book2 = (Book) session2.get(Book.class, id);**\n\nHibernate.initialize(book2.getPublisher());\n\
  \n第 12 章 ■ HIBERNATE 中的缓存\n\n**} finally {**\n\n**session2.close();**\n\n**}**\n\
  \n**要将**publisher**对象缓存到它们自己的区域中，你需要为**Publisher**类启用缓存。你可以采用与**Book**类相同的方式来实现。缓存的**publisher**对象存储在一个名为**com.metaarchit.bookshop.Publisher**的区域中：\n\
  \n****<hibernate-mapping package=\"com.metaarchit.bookshop\">**\n\n**<class name=\"\
  Publisher\" table=\"PUBLISHER\">**\n\n<cache usage=\"read-write\" />\n\n**...**\n\
  \n**</class>**\n\n\n\n**</hibernate-mapping>**\n\n**当 **Publisher** 类与 **Book**\
  \ 一起配置为缓存时，对于 **Publisher** 和 **Book** 之间的所有连接查询，如果 **Publisher** 数据已被缓存，则不会从数据库获取数据，而是从缓存中获取。\n\
  \n12.4 缓存集合\n\n问题\n\n如何缓存集合？\n\n解决方案\n\n在 Hibernate 中，集合也可以显式地缓存。如果一个持久化对象在集合中包含关联对象，那么该集合也可以显式地缓存。如果集合包含**值**类型，则按值存储。如果集合包含对象，则缓存对象的标识符。\n\
  \n工作原理\n\n为了缓存一本书的关联章节，你需要为 **Chapter** 类启用缓存。缓存的 **chapter** 对象存储在一个名为 **com.metaarchit.bookshop.Chapter**\
  \ 的区域中：\n\n****<hibernate-mapping package=\"com.metaarchit.bookshop\">**\n\n**<class\
  \ name=\"Book\" table=\"BOOK\">**\n\n**<cache usage=\"read-write\" />**\n\n**...**\n\
  \n**<set name=\"chapters\" table=\"BOOK_CHAPTER\">**\n\n**<key column=\"BOOK_ID\"\
  \ />**\n\n**<one-to-many class=\"Chapter\" />**\n\n**</set>**\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n第 12 章 ■ HIBERNATE 中的缓存\n\n**<hibernate-mapping package=\"\
  com.metaarchit.bookshop\">**\n\n**<class name=\"Chapter\" table=\"CHAPTER\">**\n\
  \n<cache usage=\"read-write\" />\n\n**...**\n\n**<many-to-one name=\"book\" class=\"\
  Book\" column=\"BOOK_ID\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**然后，你可以尝试在两个不同的会话中初始化该集合。第二个会话不应执行任何查询：\n\
  \n****Session session1 = factory.openSession();**\n\n**try {**\n\n**Book book1 =\
  \ (Book) session1.get(Book.class, id);**\n\nHibernate.initialize(book1.getChapters());\n\
  \n**} finally {**\n\n**session1.close();**\n\n**}**\n\n**Session session2 = factory.openSession();**\n\
  \n**try {**\n\n**Book book2 = (Book) session2.get(Book.class, id);**\n\nHibernate.initialize(book2.getChapters());\n\
  \n**} finally {**\n\n**session2.close();**\n\n**}**\n\n**检查 SQL 语句，你会发现仍然执行了一个查询。原因是，与多对一关联不同，集合默认不会被缓存。你需要通过为集合指定缓存用法来手动开启缓存。对于一本书的章节集合，它存储在一个名为\
  \ **com.metaarchit.bookshop.Book.chapters** 的区域中。\n\nHibernate 如何缓存集合？如果集合存储的是简单值，则缓存这些值本身。如果集合存储的是持久化对象，则对象的标识符会被缓存在集合区域中，而持久化对象则缓存在它们自己的区域中：\n\
  \n****<hibernate-mapping package=\"com.metaarchit.bookshop\">**\n\n**<class name=\"\
  Book\" table=\"BOOK\">**\n\n**<cache usage=\"read-write\" />**\n\n**...**\n\n**<set\
  \ name=\"chapters\" table=\"BOOK_CHAPTER\">**\n\n<cache usage=\"read-write\" />\n\
  \n**<key column=\"BOOK_ID\" />**\n\n**<one-to-many class=\"Chapter\" />**\n\n**</set>**\n\
  \n**</class>**\n\n**</hibernate-mapping>**\n\n**要使特定集合或某个区域中的所有集合失效，你可以使用会话工厂提供的以下方法：\n\
  \n****factory.evictCollection(\"com.metaarchit.bookshop.Book.chapters\");**\n\n\
  **factory.evictCollection(\"com.metaarchit.bookshop.Book.chapters\", id);** 214\n\
  \n第 12 章 ■ HIBERNATE 中的缓存\n\n**对于双向的一对多/多对一关联，你应该在单端更新后，在集合端调用 **evictCollection()**\
  \ 方法。这意味着你需要先从 **Chapter** 中移除 **Book** 引用，并首先更新 **Chapter**。然后，调用 **evictCollection()**\
  \ 方法：\n\n****Session session1 = factory.openSession();**\n\n**try {**\n\n**Book\
  \ book1 = (Book) session1.get(Book.class, id);**\n\nChapter chapter = (Chapter)\
  \ book1.getChapters().iterator().next();\n\nchapter.setBook(null);\n\nsession1.saveOrUpdate(chapter);\n\
  \nsession1.flush();\n\nfactory.evictCollection(\"com.metaarchit.bookshop.Book.chapters\"\
  , id);\n\n**} finally {**\n\n**session1.close();**\n\n**}**\n\n**Session session2\
  \ = factory.openSession();**\n\n**try {**\n\n**Book book2 = (Book) session2.get(Book.class,\
  \ id);**\n\n\n\n**Hibernate.initialize(book2.getChapters());**\n\n**} finally {**\n\
  \n**session2.close();**\n\n**}**\n\n12.5 缓存查询\n\n问题\n\n查询可以被缓存吗？在 Hibernate 中如何实现？\n\
  \n解决方案\n\n查询结果集可以被缓存。当你经常使用相同参数运行特定查询时，这非常有用。\n\n工作原理\n\n除了缓存由会话加载的对象外，使用 HQL 的查询也可以被缓存。假设你在两个不同的会话中运行相同的查询：\n\
  \n****Session session1 = factory.openSession();**\n\n**try {**\n\n**Query query\
  \ = session1.createQuery(\"from Book where name like ?\");** **query.setString(0,\
  \ \"%Hibernate%\");**\n\n**List books = query.list();**\n\n**} finally {**\n\n第\
  \ 12 章 ■ HIBERNATE 中的缓存\n\n**session1.close();**\n\n**}**\n\n**Session session2\
  \ = factory.openSession();**\n\n**try {**\n\n**Query query = session2.createQuery(\"\
  from Book where name like ?\");** **query.setString(0, \"%Hibernate%\");**\n\n**List\
  \ books = query.list();**\n\n**} finally {**\n\n**session2.close();**\n\n**}**\n\
  \n**默认情况下，HQL 查询不会被缓存。你必须先在 Hibernate 配置文件中启用查询缓存：\n\n****<hibernate-configuration>**\n\
  \n**<session-factory>**\n\n**...**\n\n<property name=\"cache.use_query_cache\">true</property>\n\
  \n**...**\n\n**</session-factory>**\n\n**</hibernate-configuration>**\n\n**设置项 **cache.use_query_cache**\
  \ 会创建两个缓存区域：一个用于存放缓存的查询结果集，另一个用于存放对可查询表进行最近更新的时间戳。\n\n默认情况下，查询不会被缓存。除了使用上述设置外，要启用缓存，你还需要调用\
  \ **Query.setCacheable(true)**。这允许查询查找现有的缓存结果，或将查询结果添加到缓存中。\n\n然后，你需要在执行前将查询设置为可缓存。默认情况下，查询结果会缓存在名为\
  \ **org.hibernate.cache.QueryCache** 的区域中。\n\nHibernate 如何缓存查询？如果查询返回简单值，则缓存这些值本身。如果查询返回持久化对象，则对象的标识符会缓存在查询区域中，而持久化对象则缓存在它们自己的区域中：\n\
  \n****Session session1 = factory.openSession();**\n\n**try {**\n\n**Query query\
  \ = session1.createQuery(\"from Book where name like ?\");** **query.setString(0,\
  \ \"%Hibernate%\");**\n\nquery.setCacheable(true);\n\n**List books = query.list();**\n\
  \n**} finally {**\n\n**session1.close();**\n\n**}**\n\n**Session session2 = factory.openSession();**\n\
  \n**try {**\n\n**Query query = session2.createQuery(\"from Book where name like\
  \ ?\");** **query.setString(0, \"%Hibernate%\");**\n\nquery.setCacheable(true);\n\
  \n**List books = query.list();**\n\n**} finally {**\n\n**session2.close();**\n\n\
  **}**\n\n第 12 章 ■ HIBERNATE 中的缓存\n\n**你也可以为查询指定缓存区域。这样做可以将查询缓存分离到不同的区域，并减少特定区域中的缓存数量：\n\
  \n****...**\n\n**query.setCacheable(true);**\n\nquery.setCacheRegion(\"com.metaarchit.bookshop.BookQuery\"\
  );\n\n总结\n\n在本章中，你已经了解了什么是缓存以及 Hibernate 中不同级别的缓存。缓存可以在事务级别启用，此时数据为一个工作单元缓存；这是 Hibernate\
  \ 中的默认行为。特定会话中的多个查询共享缓存数据。\n\n你已经了解到，在第二级别，缓存是为一个进程启用的，并且缓存与 **SessionFactory**\
  \ 相关联。一个 **SessionFactory** 内的多个会话共享相同的数据。配置二级缓存是一个两步过程：首先，你决定并发策略，然后你选择实现该缓存策略的提供者。\n\
  \n你还了解到，你可以使用四种并发策略：只读、读写、事务性和非严格读写。有许多开源缓存提供者，包括 OSCache、EHCache、SwarmCache 和 JBoss\
  \ Cache。每个都提供不同的并发策略。\n\n查询结果集也可以被缓存。你可以通过配置并调用 **setCacheable(true)** 来实现。关联的对象和集合也可以被显式缓存。\n\
  \n**第 13 章**\n\n■ ■ ■\n\n**事务与并发**\n\n假设一个买家登录到书店应用程序并购买一本书。购买事件中应发生以下操作：\n\n• 向买家收取书款\n\
  \n• 减少该书的库存\n\n如果信用卡扣款失败，则不应减少库存。同样，当书缺货时，不应向买家收费。这意味着要么两个操作都成功完成，要么它们都不产生任何影响。这些操作合起来称为一个*事务*或*工作单元*。本质上，事务提供了一种“要么全做，要么全不做”的机制。\n\
  \n事务的概念继承自数据库管理系统。根据定义，一个事务必须满足原子性、一致性、隔离性和持久性（ACID）：\n\n• *原子性*意味着如果一步失败，则整个工作单元失败。\n\
  \n• *一致性*意味着事务操作的数据集在事务前后是一致的。事务之后数据必须是干净的。\n\n从数据库的角度来看，干净且一致的状态由完整性约束来维护。从应用程序的角度来看，一致的状态由业务规则来维护。\n\
  \n• *隔离性*意味着一个事务对其他事务不可见。隔离性确保一个事务的执行不会影响其他事务。\n\n• *持久性*意味着当数据被持久化后，它不会丢失。\n\n\
  在应用程序中，你需要识别事务何时开始以及何时结束。事务的起点和终点被称为*事务边界*，而在应用程序中识别它们的技术称为*事务划分*。你可以通过编程方式或声明式方式来设置事务边界。本章将向你展示如何操作。\n\
  \n像数据库这样的多用户系统需要实现并发控制以维护数据完整性。\n\n有两种主要的并发控制方法：\n\n• *乐观锁：* 涉及某种版本控制来实现控制\n\n•\
  \ *悲观锁：* 使用锁定机制来获得控制\n\n并发控制中使用的一些方法如下：\n\n第 13 章 ■ 事务与并发\n\n• *两阶段锁定：* 这是一种锁定机制，使用两个不同的阶段来实现并发。在事务执行的第一阶段，称为*扩展阶段*，获取锁，并且不释放任何锁。在第二阶段，称为*收缩阶段*，释放锁，并且不获取新锁。这保证了可串行化。事务按照获取锁的顺序被串行化。*严格两阶段锁定*是两阶段锁定的一个子集。所有写锁仅在结束时（提交或中止后）释放，而读锁在阶段\
  \ 2 中正常释放。对于这两种锁定机制，都可能发生死锁，但如果你保持获取锁的规范顺序，则可以避免死锁。因此，如果两个进程需要对 A 和 B 加锁，那么它们都应该先请求\
  \ A，然后请求 B。\n\n• *串行化：* *事务调度*是两个或多个并发事务的顺序表示。事务调度具有一个称为*可串行化*的属性。两个更新同一条记录的事务会一个接一个地执行，并且在时间上不重叠。\n\
  \n• *基于时间戳的控制：* 这是一种用于并发控制的非锁定机制。每个事务在启动时都会被赋予一个时间戳。数据库中的每个对象或记录也有一个读取时间戳和一个写入时间戳。这三个时间戳用于定义此类并发控制中使用的隔离规则。\n\
  \n\n\n•   *多版本并发控制*：当事务对数据库执行读取操作时，会创建一个快照，并从该快照中读取数据。这会将数据与其他并发事务隔离开来。当事务修改一条记录时，数据库会创建一个新的记录版本，而不是覆盖旧记录。这种机制性能良好，因为它最大限度地减少了并发事务之间的锁争用——实际上，它消除了读锁和写锁之间的锁争用，这意味着读锁永远不会阻塞写锁。目前大多数数据库，如\
  \ Oracle、MySQL、SQL Server 和 PostgreSQL，都实现了多版本并发控制。\n\n本章展示了 Hibernate 如何实现乐观并发和悲观并发方法。\n\
  \n13.1 在独立 Java 应用程序中使用编程式事务\n\n问题\n\n如果你正在开发一个独立的 Java 应用程序，如何实现事务划分？\n\n解决方案\n\
  \n在多用户应用程序中，你需要多个连接来支持多个并发用户。当你需要与数据库交互时，创建新连接的成本也很高。为此，你需要一个连接池来创建和管理数据库连接。每个需要与数据库交互的线程都会从池中请求一个连接并执行其查询。完成后，连接会返回给池。然后，如果另一个线程请求连接，连接池可能会为其提供同一个连接。\n\
  \n通常，应用服务器会提供连接池。当你在独立的 Java 应用程序中工作时，你需要使用提供连接池的第三方解决方案。Hibernate 自带了一个名为 C3P0\
  \ 的开源第三方连接池框架。Apache 也提供了一个名为 Commons DBCP 的连接池框架。你需要配置 Hibernate 来使用这些框架之一。配置好连接池后，你可以使用\
  \ Hibernate 的 Transaction API 进行事务划分，并使用连接池中的连接。\n\n工作原理\n\n你需要将 Hibernate 附带的 Java\
  \ **c3p0-0.9.1.jar** 文件添加到构建路径中。在你的 Eclipse IDE 中，选择你的 Java 项目，右键单击以编辑构建路径。（如果你在将\
  \ jar 添加到构建路径时遇到问题，请参阅第 1 章中的说明。）在 **Hibernate.cfg.xml** 文件中，添加以下配置：\n\n**<property\
  \ name=\"connection.provider_class\">org.hibernate.connection.C3P0ConnectionProvider</property>**\n\
  \n**<property name=\"hibernate.c3p0.min_size\">5</property>**\n\n**<property name=\"\
  hibernate.c3p0.max_size\">10</property>**\n\n**<property name=\"hibernate.c3p0.timeout\"\
  >300</property>**\n\n**<property name=\"hibernate.c3p0.max_statements\">50</property>**\n\
  \n**<property name=\"hibernate.c3p0.acquire_increment\">1</property>**\n\n**<property\
  \ name=\"hibernate.c3p0.idle_test_period\">3000</property>**\n\n**以下是你设置的每个参数的说明：\n\
  \n• **connection.provider_class** 指定 **C3P0ConnectionProvider** 是提供连接的类。\n\n• **min_size**\
  \ 是始终保持就绪状态的最小连接数。\n\n• **max_size** 是池中的最大连接数。这是启用 C3P0 所需的唯一属性。\n\n• **timeout**\
  \ 是连接的最大空闲时间，超过此时间后连接将从池中移除。\n\n• **max_statements** 是可以缓存的最大预编译语句数。\n\n• **idle_test_period**\
  \ 是自动验证连接之前的时间（以秒为单位）。\n\n• **acquire_increment** 是池耗尽时获取的连接数。\n\n这些是配置文件中所需的所有设置。Hibernate\
  \ 还提供了一个名为 **hibernate.transaction.factory_class** 的属性，你可以在配置文件中设置它。它提供了用于实例化事务的工厂，默认为\
  \ **JDBCTransactionFactory**：\n\n**SessionFactory sessionFactory = new Configuration().configure().buildSessionFactory();**\n\
  **Session session = sessionFactory.openSession();**\n\n**Transaction tx = null;**\n\
  \n**try {**\n\n**tx = session.beginTransaction();**\n\n**BookCh2 book = new BookCh2();**\n\
  \n**book.setName(\"Hibernate Recipes Book \");**\n\n**book.setPrice(200);**\n\n\
  **book.setPublishDate(new Date());**\n\n**session.saveOrUpdate(book);**\n\n**tx.commit();**\n\
  \n**} catch (RuntimeException e) {**\n\n**try{**\n\n**if(tx != null)**\n\n**{**\n\
  \n**tx.rollback();**\n\n**}**\n\n**}catch(RuntimeException ex)**\n\n**{**\n\n**log.error(\"\
  Cannot rollback transaction\");**\n\n**}**\n\n**throw e;**\n\n**} finally {**\n\n\
  **session.close();**\n\n**}**\n\n**session** 由 **sessionFactory.openSession()**\
  \ 调用提供。创建会话时不会打开数据库连接；这使会话创建成为一项低成本任务。当调用 **session.beginTransaction()** 时，会从连接池中检索数据库连接，并且所有查询都使用此连接执行。要持久化的实体被缓存在会话的持久化上下文中。**Transaction**\
  \ 上的 **commit()** 会刷新持久化上下文并完成实体的保存。在当前 **Transaction** 提交后，可以打开另一个 **Transaction**。然后，连接池会提供一个新连接。当在\
  \ **Session** 上调用 **close()** 时，所有资源和连接都会被释放。\n\nHibernate 抛出的异常是 **RuntimeExceptions**\
  \ 及其子类型。这些异常是致命的，因此你必须回滚事务。因为回滚事务也可能抛出异常，所以你必须在 **try/catch** 块中调用 **rollback**\
  \ 方法。\n\n在 JPA 中，你必须定义与 Hibernate 相同的配置，并使用 EntityTransaction API 来管理事务：\n\n**EntityManager\
  \ manager = null;**\n**EntityTransaction tx = null;**\n\n**try {**\n\n**EntityManagerFactory\
  \ managerFactory =**\n\n**Persistence.createEntityManagerFactory(\"book\");**\n\n\
  **manager = managerFactory.createEntityManager();**\n\n**tx = manager.getTransaction();**\n\
  \n**tx.begin();**\n\n**BookCh2 newBook = new BookCh2();**\n\n**newBook.setBookName(\"\
  Hibernate Recipes Phase1\");**\n\n**newBook.setPublishDate(new Date());**\n\n**newBook.setPrice(new\
  \ Long(50));**\n\n**manager.persist(newBook);**\n\n**tx.commit();**\n\n**log.debug(\"\
  Transaction committed\");**\n\n**}catch (RuntimeException e)**\n\n**{**\n\n**try**\n\
  \n**{**\n\n**if(tx != null)**\n\n**{**\n\n**tx.rollback();**\n\n**}**\n\n**}catch(RuntimeException\
  \ ex)**\n\n**{**\n\n**log.error(\"Cannot rollback transaction\");**\n\n**}**\n\n\
  **throw e;**\n\n**} finally**\n\n**{**\n\n**manager.close();**\n\n**}**\n\n在 EntityManager\
  \ 上调用 **getTransaction()** 来获取一个事务。实际连接是在事务的 **begin()** 方法中从池中请求的。事务上的 **commit()**\
  \ 会刷新持久化上下文并完成实体的保存。在 **finally** 块中调用 EntityManager 的 **close()** 方法，以确保即使在发生异常的情况下也会关闭会话。\n\
  \n13.2 使用 JTA 进行编程式事务\n\n问题\n\n假设你正在使用一个提供资源管理支持的应用服务器。像 WebLogic、WebSphere 和 JBoss\
  \ 这样的应用服务器可以从连接池提供连接并管理事务。如何使用 Java 事务 API (JTA) 实现编程式事务划分？\n\n解决方案\n\n\n\n你需要配置一个以\
  \ Hibernate 作为持久化框架的 Java 企业级应用。同时，还需要配置 Hibernate 使用 **JTATransactionFactory**\
  \ 来提供 **JTATransaction** 对象。接着，你需要通过 **UserTransaction** 接口以编程方式管理事务。\n\n第 13 章\
  \ ■ 事务与并发\n\n工作原理\n\n我们使用 WebLogic（9.2 版本）作为应用服务器来演示如何利用 JTA 进行编程式事务划分。前提是你已熟练掌握应用的构建与部署流程。\n\
  \n首先，你需要在应用服务器上配置数据源。为此，需要启动 WebLogic 服务器，登录控制台，然后配置数据源。你还必须将数据库驱动程序添加到服务器库中。对于\
  \ Derby，你需要将 **derbyClient.jar** 添加到服务器库。请确保从控制台测试连接！\n\n你需要提供以下信息（请填入你自己的值）：\n\n\
  • *JNDI 名称：* **local_derby**。应用通过此名称获取数据库连接。\n\n• *数据库名称：* **BookShopDB**\n\n• *主机名：*\
  \ **localhost**。如果你指向的是远程数据库，则该值应为该机器的 IP 地址。\n\n• *端口：* **1527**。\n\n• *用户：* **book**。\n\
  \n• *密码：* **book**。\n\n在应用服务器上成功配置数据源后，你需要配置 Hibernate。需要提供的关键属性如下：\n\n• **Hibernate.connection.datasource**：此属性的值必须与你配置在应用服务器上的数据源的\
  \ JNDI 名称一致。\n\n• **Hibernate.transaction.factory_class**：此属性的默认值是 **JDBCTransactionFactory**。但由于你想使用\
  \ JTA 事务进行事务划分，你需要将其定义为 **JTATransactionFactory**。\n\n• **Hibernate.transaction.manager_lookup_class**：此事务管理器的值取决于应用服务器。每个应用服务器都有不同的\
  \ JTA 实现，因此你必须告知 Hibernate 使用哪个 JTA 实现。Hibernate 支持大多数主流应用服务器的实现；对于 WebLogic，你使用\
  \ **org.hibernate.transaction.WeblogicTransactionManagerLookup**。\n\n以下是 Hibernate\
  \ 的配置：\n\n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-configuration\
