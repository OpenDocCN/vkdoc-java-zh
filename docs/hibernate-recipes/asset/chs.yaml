  , schema=\"BOOKSHOP7\")**\n\n**public class Chapter7_3 {**\n\n****@Id**\n\n**@GeneratedValue\
  \ (strategy=GenerationType. *TABLE*)**\n\n**@Column (name=\"id\")**\n\n**private\
