  \ book.name, book.publisher.name)**\n\n**from Book book**\n\n**结果可以封装在集合中，例如列表和映射。然后，查询结果就是一个集合的列表。例如，如果你使用列表，结果就是一个\
  \ **List** 的 **List** 对象，如下所示： **String queryString = “select new list(book.isbn,\
