  解决方案\n\n前面的示例查询的是整个持久化对象。你可以通过使用 **select** 子句来查询特定字段。**select** 子句选择要在查询结果集中返回哪些对象和属性。\n\
  \n工作原理\n\n以下查询返回一个包含所有书名的列表：\n\n****select book.name**\n\n**from Book book**\n\n\
  **你可以在 HQL 中使用 SQL 聚合函数，例如 **count()**、**sum()**、**avg()**、**max()** 和 **min()**。\n\
  \n它们会被转换到生成的 SQL 中：\n\n****select avg(book.price)**\n\n**from Book book**\n\n**隐式连接也可以在\
