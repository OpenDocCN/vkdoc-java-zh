  \ findByIsbn(String isbn);\n\n第 14 章 ■ Web 应用程序\n\npublic List findByPriceRange(int\
  \ fromPrice, int toPrice);\n\n****}**\n\n**public class HibernateBookDao implements\
  \ BookDao {\n\n**...**\n\n**}**\n\n\n\n使用通用数据访问对象\n\n由于不同的 DAO 共享常见操作（例如 **findById**、**saveOrUpdate**、**delete**\
  \ 和 **findAll**），你应该为这些操作提取一个通用 DAO 以避免代码重复：\n\n**public interface GenericDao {\n\
