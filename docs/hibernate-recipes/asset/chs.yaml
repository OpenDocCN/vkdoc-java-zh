  \ chapter{ Key- \"+key+\" },{ Value- \"+book.get(key)+\"}\");**\n\n**}**\n\n**System.out.println(\"\
  \ \");**\n\n**}**\n\n**}**\n\n8.3 连接\n\n问题\n\n如何在 HQL 和 JPA QL 中创建各种类型的连接？\n\n解决方案\n\
  \nHibernate 和 JPA 都支持内连接和外连接。你可以使用点运算符（**.**）来表示隐式关联连接。\n\n**工作原理\n\n让我们看看你可以利用的所有不同类型的连接。\n\
  \n显式连接\n\n在 HQL 中，你可以使用 **join** 关键字来连接关联对象。以下查询查找所有由出版社“Apress”出版的书籍。结果以 **Objects(Object[])**\
  \ 数组的形式包含一组对象对。每一对由一个 **book** 对象和一个 **publisher** 对象组成：\n\n****from Book book join\
  \ book.publisher publisher**\n\n**where publisher.name = 'Apress'**\n\n**除了多对一关联，所有其他类型的关联都可以进行连接。例如，你可以连接从\
  \ **book** 到 **chapters** 的一对多关联。以下查询查找所有包含标题为“Hibernate 基础”章节的书籍。结果包含一组对象对；每一对由一个\
  \ **book** 对象和一个 **chapter** 集合组成：\n\n****from Book book join book.chapters chapter**\n\
  \n**where chapter.title = 'Hibernate Basics'**\n\n第 8 章 ■ HQL 与 JPA 查询语言\n\n隐式连接\n\
  \n在前面的连接中，你指定了 **join** 关键字来连接关联对象。这种连接称为*显式连接*。你也可以直接通过名称引用关联：这会导致*隐式连接*。例如，前面的两个查询可以表示如下。结果只包含一个\
  \ **book** 对象的列表，因为在 **from** 子句中没有指定连接：\n\n****from Book book**\n\n**where book.publisher.name\
  \ = 'Manning'**\n\n**请注意，隐式连接是沿着多对一或一对一关联进行的。它们永远不会沿着多对多关联进行。这意味着你永远不能使用类似这样的写法：\n\
  \n**String QueryString3 =\n\n\"from Book8_1 book where book.chapters.title = 'Many-To-Many\
  \ Association'\"; **Query query1 = session.createQuery(QueryString3);**\n\n**List<Chapter8_1>\
  \ chptrs = query1.list();**\n\n**正确的用法如下：\n\n**String queryString =\n\n\"from Book8_1\
  \ book join book.chapters chapter where chapter.title=:title\"; **Query query =\
  \ session.createQuery(queryString);**\n\n**query.setString(\"title\", \"Many-To-Many\
  \ Association\");**\n\n**List books = query.list();**\n\n外连接\n\n如果你使用以下 HQL 查询与出版社连接的书籍，则不会包含出版社为空的书籍。这种连接称为*内连接*，如果你不指定连接类型或指定\
  \ **inner join**，则它是默认的连接方式。它与 SQL 中的内连接含义相同：\n\n****from Book book join book.publisher**\n\
  \n**如果你想获取所有书籍，无论出版社是否为空，你可以通过指定 **left join** 或 **left outer join** 来使用左连接：\n\n\
  ****from Book book left join book.publisher**\n\n**HQL 支持另外两种类型的连接：右连接和全连接。它们与 SQL\
  \ 中的含义相同，但很少使用。\n\n匹配文本\n\n\n\n以下 HQL 查询用于检索书籍及其关联章节，其中至少一个章节标题包含单词 *Hibernate*。结果由**书籍**和**章节**组成的配对构成：\n\
  \n****from Book book join book.chapters chapter**\n\n**where chapter.title like\
  \ '%Hibernate%'**\n\n第 8 章 ■ HQL 与 JPA 查询语言\n\n获取关联\n\n你可以使用 **join fetch** 强制初始化一个懒加载的关联。它与纯\
  \ **join** 的区别在于，结果中只包含父对象：\n\n****from Book book join fetch book.publisher publisher**\n\
  \n**一个 **inner join fetch** 查询不会返回 **publisher** 为 null 的 **book** 对象。如果你想包含它们，必须使用\
  \ **left join fetch**：\n\n****from Book book left join fetch book.publisher publisher**\n\
  \n8.4 创建报表查询\n\n问题\n\n如何创建对数据进行分组和聚合的查询？\n\n解决方案\n\n使用 **select** 子句来生成报表查询。**groupby**\
  \ 和 **having** 子句用于聚合。本章前面部分已经介绍了如何使用 **select** 子句。\n\n工作原理\n\n让我们看看如何聚合和分组数据。\n\
  \n使用聚合函数进行投影\n\nHQL 和 JPA QL 支持聚合函数 **count()**、**min()**、**max()**、**sum()** 和\
  \ **avg()**。如果你想知道书店里有多少本书，可以这样做：\n\n****String q2 = \"select count(i) from Book\
  \ i\";**\n\n**Query query = session.createQuery(q2);**\n\n**Long count = (Long)\
  \ query.uniqueResult();**\n\n**要查找书店中书籍的最低和最高价格，可以使用如下查询：\n\n****String q3 = \"\
  select min(i.price),max(i.price) from Book i\";**\n\n**Query query = session.createQuery(q3);**\n\
  \n**Object[] count = (Object[]) query.uniqueResult();**\n\n**System.out.println(\"\
  最低价格- \"+count[0]);**\n\n**System.out.println(\"最高价格- \"+count[1]);**\n\n**165\n\
  \n第 8 章 ■ HQL 与 JPA 查询语言\n\n请注意，此查询的返回类型是一个 **Object[]** 数组。\n\n对聚合结果进行分组\n\n你可以使用\
  \ **order by** 子句对结果列表进行排序。可以指定多个字段以及升序/降序：\n\n****from Book book**\n\n**order by\
  \ book.name asc, book.publishDate desc**\n\n**HQL 也支持 **group by** 和 **having**\
  \ 子句。它们会被 Hibernate 转换为 SQL：\n\n****select book.publishDate, avg(book.price)**\n\
  \n**from Book book**\n\ngroup by book.publishDate\n\n**select book.publishDate,\
  \ avg(book.price)**\n\n**from Book book group by book.publishDate**\n\nhaving avg(book.price)\
  \ > 10\n\n总结\n\n在本章中，你学习了如何使用 Hibernate 查询语言查询数据库。你了解了如何使用构成大多数查询核心的 **from**、**select**\
  \ 和 **where** 子句。并且你学习了如何将参数绑定到查询参数。你应该能够通过使用命名查询来外部化查询。如果结果集很大，你可以使用分页来检索原始结果集的子集。你学习了使用点（**.**）运算符创建隐式连接，以及使用\
  \ **join** 关键字创建显式连接。你还了解了如何使用聚合函数，如 **min()**、**max()**、**avg()**、**count()** 和\
  \ **sum()**。\n\n**第 9 章**\n\n■ ■ ■\n\n**使用 Criteria 和 Example**\n\n**进行查询**\n\n\
  在上一章中，你了解了如何使用 Hibernate 查询语言（HQL）和 Java 持久化查询语言（JPA QL）。HQL 强制你使用类似 SQL 的语法与数据库交互。你必须具备一些\
  \ SQL 知识才能创建复杂的查询，这使得开发使用多条件查询的应用程序变得困难。\n\n使用 HQL 和 JPA QL，很容易在字符串拼接和 SQL 语法上犯错。\n\
  \n有时，错误仅仅是因为 SQL 中两个子句之间没有空格而导致的。\n\n因为这些错误只在运行时才会被发现，如果你没有单元测试，就必须经历在应用服务器上构建和部署的漫长过程来捕获它们。\n\
  \n与 HQL 不同，Hibernate Criteria 是完全面向对象的。它使用对象及其接口从 Hibernate 支持的数据库中加载数据。它提供了一种优雅且更清晰的方式来构建动态查询。例如，以下代码调用\
  \ Criteria API，根据给定的书名和出版商从数据库中获取 **Book** 详细信息：\n\n****Criteria criteria = session.createCriteria(Book.class);**\n\
  \n**if (startDate != null) {**\n\n**criteria.add(Expression.ge(\"bookName\",bookName);**\n\
  \n**}**\n\n**if (endDate != null) {**\n\n**criteria.add(Expression.le(\"publisher\"\
  ,publisher);**\n\n**}**\n\n**List results = criteria.list();**\n\n**同样的代码在使用 HQL\
  \ 时，必须处理字符串拼接和设置参数：\n\n****String queryString = \"from Book where bookName=? and\
  \ publisher=?\";**\n\n****Session session = SessionManager.getSessionFactory().getCurrentSession();**\
  \ **Query query = session.createQuery(arg0);**\n\n****query.setParameter(0, \"Recipes\"\
  );**\n\n**query.setParameter(1, \"APress\");**\n\n**List<Book7_1> list = query.getResultList();**\n\
  \n**如你所见，使用 Criteria 访问数据更简单、更容易。\n\n**在本章中，你将学习如何使用 Criteria 和 Example API。Java\
  \ 持久化 API 2.0 版本（JSR-317 JPA 2.0）引入了类似的 Criteria API 来支持动态查询。这仍在 167\n\n第 9 章 ■\
  \ 使用 Criteria 和 Example 进行查询\n\n发展中；你可以在以下位置找到文档：\n\n[**http://openjpa.apache.org/builds/latest/docs/manual/jpa_overview_criteria.html**](http://openjpa.apache.org/builds/latest/docs/manual/jpa_overview_criteria.html)\n\
  \n本章展示了如何将限制条件应用于 criterion 对象以获取数据。这些限制条件的作用类似于 HQL 或 SQL 中的 **where** 子句。你将学习如何使用不在会话中的\
  \ **criteria** 对象：这被称为 **DetachedCriteria**。\n\n9.1 使用 Criteria\n\n问题\n\n如何创建一个基本的\
  \ **criteria** 对象并使用它从数据库加载数据？\n\n解决方案\n\n与 HQL 类似，你从会话中获取 **criteria** 对象。如果你没有会话来创建\
  \ **criteria** 对象，那么可以使用 **DetachedCriteria**。这个 **DetachedCriteria** 对象稍后会与会话一起使用以获取结果。本方案演示了\
  \ Criteria API 的基本实现。\n\n工作原理\n\n一个基本的 Criteria 查询如下所示：\n\n****Criteria criteria\
  \ = session.createCriteria(Book.class)**\n\n**List books = criteria.list();**\n\n\
  **此查询对应于以下 HQL 查询：\n\n****from Book book**\n\n**Criteria** 类中的大多数方法都返回自身的实例，因此你可以像下面这样构建你的\
  \ criteria。这里你向 criteria 添加了一个限制条件，该条件表示书名应等于“Hibernate Quickly”：\n\n****Criteria\
  \ criteria = session.createCriteria(Book.class)**\n\n**.add(Restrictions.eq(\"name\"\
  , \"Hibernate Quickly\"));**\n\n**List books = criteria.list();**\n\n**如果你没有打开的会话，你可以通过使用\
  \ **forClass()** 方法实例化一个 detached criteria，然后将其附加到一个会话上执行。当你有一个会话来运行查询时，你调用 **getExecutableCriteria()**\
  \ 并将会话作为方法参数传递。**getExecutableCriteria()** 方法返回一个可执行的 **criteria** 实例：\n\n****DetachedCriteria\
  \ criteria = DetachedCriteria.forClass(Book.class);**\n\n**List books = criteria.getExecutableCriteria(session).list();**\n\
  \n第 9 章 ■ 使用 Criteria 和 Example 进行查询\n\n9.2 使用限制条件\n\n问题\n\n使用 criteria 时如何过滤数据？如何将限制条件应用于\
  \ criteria？\n\n解决方案\n\n你可以向 Criteria 查询添加一系列限制条件来过滤结果，就像在 HQL 中构建 **where** 子句一样。**Restrictions**\
  \ 类提供了多种方法来构建限制条件。\n\n工作原理\n\n\n\n您添加的每个限制条件都被视为逻辑合取。**Criterion** 接口是查询条件的面向对象表示，可用作\
  \ Criteria 查询中的限制条件。**Restrictions** 类提供了返回内置条件类型的静态工厂方法。**org.hibernate.criterion**\
  \ 包提供了用于创建复杂查询的 API：\n\n****Criteria criteria = session.createCriteria(Book.class);**\n\
  \nCriterion nameRest = Restrictions.eq(\"name\", \"Hibernate Recipes\"); criteria.add(nameRest);\n\
  \n**List books = criteria.list();**\n\n**这等价于以下 HQL：\n\n****from Book book where\
  \ name='Hibernate Recipes'**\n\n****eq** 是一个相等性实现，它接受两个输入方法参数：**Book** 类的属性名称和要与之比较的值。要获取唯一结果，可以使用\
  \ **uniqueResult()** 方法：\n\n****Criteria criteria = session.createCriteria(Book.class);**\n\
  \n**Criterion nameRest = Restrictions.eq(\"name\", \"Hibernate Recipes\");** **criteria.add(nameRest);**\n\
  \nBook book = (Book)criteria.uniqueResult();\n\n**您可以使用 **ignoreCase()** 方法为查询添加不区分大小写的功能：\n\
  \n**Criterion nameRest = Restrictions.eq(\"name\", \"Hibernate Recipes\").ignoreCase();\n\
  \n**Restrictions** 类还有许多其他方法，包括以下方法：\n\n• **gt**（大于）\n\n• **lt**（小于）\n\n• **ge**（大于或等于）\n\
  \n第 9 章 ■ 使用 Criteria 和 Example 进行查询\n\n• **idEq**（ID 等于）\n\n• **ilike**（不区分大小写的\
  \ **like**，类似于 PostgreSQL 的 **ilike** 运算符）\n\n• **isNull**\n\n• **isNotNull**\n\n\
  • **isEmpty**\n\n• **isNotEmpty**\n\n• **between**\n\n• **in**（对指定属性应用“in”约束）\n\n\
  • **le**（小于或等于）\n\n以下是一个示例：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\
  \n.add(Restrictions.like(\"name\", \"%Hibernate%\"))\n\n.add(Restrictions.between(\"\
  price\", new Integer(100), new Integer(200))); **List books = criteria.list();**\n\
  \n**此 Criteria 查询对应于以下 HQL 查询：\n\n****from Book book**\n\n**where (book.name like\
  \ '%Hibernate%') and (book.price between 100 and 200)**\n\n**%** 字符是一个通配符。由于它被添加在单词\
  \ *Hibernate* 的前后，因此可以搜索所有书名中包含单词 *Hibernate* 的书籍。如果您想查找所有书名以 *Hibernate* 开头的书籍，查询如下：\n\
  \n****Criteria criteria = session.createCriteria(Book.class)**\n\n.add(Restrictions.like(\"\
  name\", \"Hibernate%\"))\n\n**.add(Restrictions.between(\"price\", new Integer(100),\
  \ new Integer(200)));** **List books = criteria.list();**\n\n**请注意，搜索字符串中单词 *Hibernate*\
  \ 之前没有 **%** 字符。您还可以使用逻辑析取对某些限制条件进行分组。如何使用 Criteria API 实现以下查询？\n\n****from Book\
  \ book**\n\n**where (book.name like '%Hibernate%' or book.name like '%Java%') and\
  \ (book.price between 100**\n\n**and 200)**\n\n**您可以直接将其翻译为如下形式：\n\n****Criteria\
  \ criteria = session.createCriteria(Book.class)**\n\n.add(Restrictions.or(\n\n**Restrictions.like(\"\
  name\", \"%Hibernate%\"),** **Restrictions.like(\"name\", \"%Java%\")**\n\n**)**\n\
  \n第 9 章 ■ 使用 Criteria 和 Example 进行查询\n\n**)**\n\n.add(Restrictions.between(\"price\"\
  , new Integer(100), new Integer(200))); **List books = criteria.list();**\n\n**此查询也可以使用\
  \ **Restrictions** 的 **disjunction()** 方法来编写：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\
  \n.add(Restrictions.disjunction()\n\n.add(Restrictions.like(\"name\", \"%Hibernate%\"\
  ))\n\n.add(Restrictions.like(\"name\", \"%Java%\"))\n\n)\n\n.add(Restrictions.between(\"\
  price\", new Integer(100), new Integer(200))); **List books = criteria.list();**\n\
  \n**如果您想使用通配符进行搜索，可以使用 **MatchMode** 类。它提供了一种便捷的方式来表达子字符串匹配，而无需使用字符串操作：\n\n****Criteria\
  \ criteria = session.createCriteria(Book.class);**\n\n\n\n条件名称限制 = Restrictions.like(\"\
  name\", \"Hibernate\", MatchMode.START); **criteria.add(nameRest);**\n\n**Book books\
  \ = (Book)criteria.uniqueResult();**\n\n**这条 Criteria 语句等同于：\n\n**Criterion nameRest\
  \ = Restrictions.like(\"name\", \"Hibernate%\");\n\n**以下 **MatchMode** 值可供使用：\n\n\
  • **START**：将字符串开头与模式匹配\n• **END**：将字符串结尾与模式匹配\n• **ANYWHERE**：将模式匹配到字符串中的任意位置\n\
  • **EXACT**：将模式与字符串完全匹配\n\n编写子查询\n\n使用 Criteria，你还可以执行子查询。*子查询*是嵌套在另一个查询内部的查询，也被称为*内查询*或*内层\
  \ select*。\n\n例如，以下是 SQL 中的子查询：\n\n**select publisher_name, address from Publisher\
  \ pub where pub.code=(select publisher_code from** **Book book where book.publish_date=current_timestamp)**\n\
  \n**该查询获取任何在今天有图书出版的出版社的名称和地址。第二个 **select** 查询嵌套在主 SQL 查询中。\n\n你可以使用 Criteria 编写如下：\n\
  \n**171\n\n第 9 章 ■ 使用 Criteria 和示例进行查询\n\n**DetachedCriteria todaysBook = DetachedCriteria.forClass(Book.class)**\n\
  \n**.setProjection( (Projection) Property.forName(\"publishDate\").eq(\"current_timestamp\"\
  ) );** **List =manager.createCriteria(Publisher.class)**\n\n**.add( Property.forName(\"\
  publisherCode\").eq(todaysBook) )**\n\n**.list();**\n\n9.3 在关联中使用 Criteria\n\n问题\n\
  \n当存在关联对象时，如何使用 Criteria API 表达连接限制？如何使用动态抓取？\n\n解决方案\n\n当存在关联对象时，你需要连接它们以从中检索数据。在\
  \ HQL 中，你在 **where** 子句中使用别名和基于外键的等值连接：\n\n****from Book b, Publisher p where b.publisherId\
  \ = p.publisherId**\n\n**该查询通过 **publisherId**（即 **Book** 中的外键）连接 **Publisher**\
  \ 对象和 **Book** 对象。\n\n让我们看看如何使用 Criteria API 实现这一点。Hibernate 提供了两种方法来启用关联实体的连接：**createCriteria()**\
  \ 和 **createAlias()**。两者的区别在于，**createCriteria()** 返回一个新的 **Criteria** 实例，这意味着你可以嵌套调用\
  \ **createCriteria()**。而 **createAlias()** 方法不会创建新的 **Criteria** 实例，它与你在 HQL 的 **from**\
  \ 子句中声明的别名非常相似。\n\n工作原理\n\n你可以通过引用关联属性的名称来触发隐式连接。例如，假设你有一个 **Order** 类，其中包含一个 **Price**\
  \ 对象，该对象持有 **unitPrice** 和 **currency** 等详细信息：\n\n****public class Order {**\n\n\
  ****Price price;**\n\n**}**\n\n****public class Price {**\n\n****String currency;**\n\
  \n**float unitPrice;**\n\n**}**\n\n**如果你需要获取 **Order** 的 **unitPrice**，可以在 HQL 中使用\
  \ **Order.price.unitPrice**：\n\n**172\n\n第 9 章 ■ 使用 Criteria 和示例进行查询\n\n**from Order\
  \ order where order.price.unitPrice > 50**\n\n**使用 **Criteria** 能否实现相同的隐式连接？\n\n\
  ****Criteria criteria = session.createCriteria(Book.class,”book”)**\n\n**.add(Restrictions.like(\"\
  name\", \"%Hibernate%\"))**\n\n**.add(Restrictions.eq(\"book.publisher.name\", \"\
  Manning\"));**\n\n**List books = criteria.list();**\n\n**如果执行这段代码，会抛出以下异常：\n\n**Exception\
  \ in thread \"main\" org.hibernate.QueryException: could not resolve property: publisher.name\
  \ of: com.hibernaterecipes.chapter5.Book\n\nat\n\norg.hibernate.persister.entity.AbstractPropertyMapping.propertyException(AbstractPropertyMap\
  \ ping.java:67)\n\n**Hibernate 无法解析属性 **publisher.name**。这意味着 Criteria 查询不支持隐式连接。要显式连接关联，你需要为其创建一个新的\
  \ **criteria** 对象：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\
  \n**.add(Restrictions.like(\"name\", \"%Hibernate%\"))**\n\n.createCriteria(\"publisher\"\
  )\n\n**.add(Restrictions.eq(\"name\", \"Manning\"));**\n\n\n\n**List books = criteria.list();**\n\
  \n**在这个例子中，**createCriteria()** 方法有一个 **string** 类型的属性，你需要在此传入关联属性的名称。由于你正在 **Book**\
  \ 对象的 **publisher** 属性上创建 **criteria**，因此在这种情况下需要传入 \"publisher\"。你也可以使用 **createAlias()**\
  \ 来生成相同的查询：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\n\
  .createAlias(\"publisher\", \"publisherAlias\")\n\n**.add(Restrictions. *like*(\"\
  name\", \"%Hibernate%\"))**\n\n.add(Restrictions.eq(\"publisherAlias.name\", \"\
  Manning\"));\n\n**List books = criteria.list();**\n\n**在 HQL 中，查询语句如下：\n\n****from\
  \ Book book**\n\n**where book.name like '%Hibernate%' and book.publisher.name =\
  \ 'Manning'**\n\n**与 HQL 一样，你可以指定 Hibernate 在加载关联数据时应遵循的抓取策略。该策略也可以在元数据配置文件中设置。如果需要覆盖配置，那么在使用\
  \ **Criteria** 检索数据时，可以使用 FetchMode **API**。\n\n以下是可用的 FetchMode 选项：\n\n• **DEFAULT**：使用配置文件中的默认设置。\n\
  \n• **EAGER**：已弃用。请改用 **FetchMode.JOIN**。\n\n• **JOIN**：通过使用外连接检索关联对象的数据。\n\n第 9\
  \ 章 ■ 使用 Criteria 和 Example 进行查询\n\n• **LAZY**：已弃用。请改用 **FetchMode.SELECT**。\n\n\
  • **SELECT**：通过额外的 **SELECT** *查询进行立即抓取。除非在配置文件中显式禁用了 **lazy** 选项，否则在访问关联时会执行第二个\
  \ **SELECT** *查询。**\n\n**以下代码使用了 **FetchMode.JOIN** 和 **FetchMode.SELECT** 选项：\n\
  \n****Criteria criteria = session.createCriteria(Book.class)**\n\n**.add(Restrictions.like(\"\
  name\", \"%Hibernate%\"))**\n\n.setFetchMode(\"publisher\", FetchMode.JOIN)\n\n\
  .setFetchMode(\"chapters\", FetchMode.SELECT);\n\n**List books = criteria.list();**\n\
  \n**在这种情况下，关联的 **Publisher** 对象通过外连接进行抓取，而 **Chapters** 则通过第二个 **SELECT** 查询进行检索。\n\
  \n9.4 使用 Projections\n\n问题\n\n什么是 projections，如何在 Criteria API 中使用它们？\n\n解决方案\n\n\
  到目前为止，当你使用 Criteria 检索对象时，你获取的是结果集中的完整对象。\n\n如果你只想获取表中的某些字段或列，而不需要完整的对象，该怎么办？\n\n\
  Projections 帮助你过滤数据，只返回你需要的那些字段。当你不需要获取整个实体及其关联时，可以使用 projections。当需要以扁平方式（而非对象图形式）获取结果时，也可以使用它们。这种方法能提升性能，尤其是在处理大量列且对象图非常深的情况下。\n\
  \n工作原理\n\n要自定义结果的字段，你可以使用 projections 来指定要返回的字段：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\
  \n.setProjection(Projections.property(\"name\"));\n\n**List books = criteria.list();**\n\
  \n**这类似于以下 SQL 语句：\n\n****select book.name from Book book**\n\n**174\n\n第 9 章 ■\
  \ 使用 Criteria 和 Example 进行查询\n\n这比\n\n**from Book book\n\n**更好，因为后者会获取完整的 **book**\
  \ 对象，尽管你只需要书名。\n\n使用 Projections 的聚合函数和分组\n\nSQL 中的聚合函数通过计算列中的值来汇总数据并返回单个值。以下是一些示例：\n\
  \n• **SUM**：返回应用该函数的列值的总和\n\n• **AVG**：返回列值的平均值\n\n• **MIN**：返回指定列值的最小值\n\n• **MAX**：返回指定列值的最大值\n\
  \n在 HQL 中，你可以像在 SQL 中一样直接使用它们：\n\n****select min(book.price) from Book book**\n\n\
  **此查询返回 **BOOK** 表中所有书籍的最低价格。\n\n\n\n当您使用 Criteria API 进行查询时，可以利用投影来应用聚合函数。这些函数被封装在\
  \ **Projections** 类中，作为静态方法：\n\n****Criteria criteria = session.createCriteria(Book.class)**\n\
  \n.setProjection(Projections.avg(\"price\"));\n\n**List books = criteria.list();**\n\
  \n**这类似于以下 SQL：\n\n****select avg(book.price) from Book book**\n\n**结果可以按升序或降序排序：\n\
  \n****Criteria criteria = session.createCriteria(Book.class)**\n\n.addOrder(Order.asc(\"\
  name\"))\n\n.addOrder(Order.desc(\"publishDate\"));\n\n**List books = criteria.list();**\n\
  \n**这类似于\n\n****from Book book**\n\n**order by book.name asc, book.publishDate desc**\n\
  \n**Criteria 查询也支持分组。您可以将任何属性指定为分组属性，它们会出现在 **group by** 子句中：\n\n****Criteria criteria\
  \ = session.createCriteria(Book.class)**\n\n**.setProjection(Projections.projectionList()**\n\
  \n第 9 章 ■ 使用 Criteria 和 Example 进行查询\n\n.add(Projections.groupProperty(\"publishDate\"\
  ))\n\n**.add(Projections.avg(\"price\")));**\n\n**List books = criteria.list();**\n\
  \n**这将产生\n\n****select book.publishDate, avg(book.price)**\n\n**from Book book**\n\
  \n**group by book.publishDate**\n\n9.5 通过示例进行查询\n\n问题\n\n什么是示例查询（QBE），以及如何使用它来检索数据？\n\
  \n解决方案\n\n假设您需要根据不同的输入来检索数据。搜索条件可能是在多个列上进行复杂的过滤。使用 **Criteria**，代码可能如下所示：\n\n****Criteria\
  \ criteria = getSession().createCriteria(Book.class);**\n\n**criteria.add(Restrictions.eq(“name”,\
  \ “Hibernate”)).**\n\n**add(Restrictions.eq(“price”,100))**\n\n**如果有更多需要过滤的列，列表会随之增加。QBE\
  \ 为您简化了这一过程。\n\nQBE 根据被查询类实例上设置的属性返回结果集。您还可以指定需要排除的属性。这种方法大大减少了您需要编写的代码量。\n\n工作原理\n\
  \n可以通过 **Example** 对象来构建 Criteria 查询。该对象应该是您要查询的持久化类的一个实例。默认情况下，所有 null 属性都会被忽略：\n\
  \n****Book book = new Book();**\n\n**book.setName(\"Hibernate\");**\n\n**book.setPrice(new\
  \ Integer(100));**\n\nExample exampleBook = Example.create(book);\n\n**Criteria\
  \ criteria = session.createCriteria(Book.class)**\n\n**.add(exampleBook);**\n\n\
  **List books = criteria.list();**\n\n**对应的 HQL 类似于以下内容：\n\n****from Book book**\n\
  \n第 9 章 ■ 使用 Criteria 和 Example 进行查询\n\n**where book.name = 'Hibernate' and book.price\
  \ = 100**\n\n**在这个例子中，创建了 **Book** 的实例，并设置了搜索条件：包括 **name** 和 **price**。然后，在创建 **Example**\
  \ 对象时传入了这个 **Book** 实例。最后，**Criteria** 接口接受 **Example** 实例，根据 **Book** 实例上设置的值来检索数据。\n\
  \n您可以为 **Example** 对象的构建指定创建规则。例如，您可以排除某些属性，或者为字符串比较启用 **like**：\n\n****Book book\
  \ = new Book();**\n\n**book.setName(\"%Hibernate%\");**\n\n**book.setPrice(new Integer(100));**\n\
  \nExample exampleBook = Example.create(book)\n\n.excludeProperty(\"price\")\n\n\
  .enableLike();\n\n**Criteria criteria = session.createCriteria(Book.class)**\n\n\
  **.add(exampleBook);**\n\n**List books = criteria.list();**\n\n**对应的 HQL 如下：\n\n\
  ****from Book book**\n\n**where book.name like '%Hibernate%'**\n\n总结\n\n本章介绍了 Criteria\
  \ API 以及如何使用它来检索数据。您可以使用限制条件来过滤数据。**Restrictions** 接口提供了多种方法来过滤数据：**equal**、**like**、**greater\
  \ than** 和 **less than**。它还提供了析取功能。**MatchMode** 接口提供了可用于字符串比较的变量。子查询也可以使用 **DetachedCriteria**\
  \ 对象来实现。\n\n当存在关联对象时，您可以使用 **createCriteria()** 和 **createAlias()** 方法来获取数据。并且，您可以使用投影来实现聚合函数和分组。最后，当需要根据多种搜索条件过滤数据时，示例查询（QBE）使得数据获取变得简单。\n\
  \n**第 10 章**\n\n■ ■ ■\n\n**处理对象**\n\n本章讨论对象在其生命周期中所经历的状态。在 Hibernate 中，会话负责管理对象状态，而在\
  \ Java Persistence 中，EntityManager 执行相同的职责。\n\nHibernate 提供了一种对实体和应用程序透明的持久化机制；应用程序需要了解对象的状态。\n\
  \n本章还讨论了 Hibernate 提供的持久化上下文。持久化上下文管理对象并在事务（工作单元）内缓存对象状态。您将学习如何使用数据过滤和拦截器。\n\n10.1\
  \ 识别持久化对象状态\n\n问题\n\n在 Hibernate 中，对象可以有哪些状态？对象生命周期是如何工作的？\n\n解决方案\n\nHibernate\
  \ 定义了四种对象状态：瞬时态、持久态、游离态和移除态。我们将逐一探讨每种状态，以及 Hibernate 或 JPA 中哪些方法会将对象带入该状态。\n\n**工作原理\n\
  \n让我们从瞬时对象开始，然后再看其他状态。\n\n瞬时对象\n\n使用 **new** 运算符实例化的对象称为*瞬时对象*。Hibernate 持久化上下文不感知对瞬时对象执行的操作。当它们不被任何其他对象引用时，其状态就会丢失，并变得可供垃圾回收。它们与任何数据库表行都没有关联。JPA\
  \ 没有这种状态。图 10-1 提供了图形化表示。\n\n第 10 章 ■ 处理对象\n\n*图 10-1\\. 使用 **new** 运算符实例化的对象称为瞬时对象*\n\
  \n持久对象\n\n具有关联数据库标识的对象称为*持久对象*。对象处于持久状态的关键是要与*持久化上下文*相关联。持久化上下文会缓存对象状态，并能识别所做的任何更改（如果有的话）。\n\
  \n您可以通过两种方式创建持久对象：您可以通过调用 API 方法（如 **get()**、**load()** 和 **list()**）将数据库表行作为实体检索出来；或者，您可以使用\
  \ API 方法（如 **save()** 和 **saveOrUpdate()**）持久化一个瞬时对象。图 10-2 说明了对象变为持久状态的可能方式。\n\n\
  *图 10-2\\. 对象变为持久状态的可能方式*\n\n游离对象\n\n在上一节中，您了解到持久对象与持久化上下文相关联。事务关闭后，持久化上下文不再存在。如果应用程序保留了对持久对象的引用，则该对象被称为处于*游离态*。游离对象的状态可以被修改，并且可以持久化回数据库。这在处理具有多层架构的应用程序时非常常见。\n\
  \n第 10 章 ■ 处理对象\n\nHibernate 提供了重新关联模式和合并模式来使游离对象变为持久对象。\n\nJPA 只有合并模式。图 10-3 说明了游离对象和持久对象之间的关系。\n\
  \n*图 10-3\\. 游离对象和持久对象之间的关系*\n\n移除对象\n\n当对持久对象调用 **delete()** 或 **remove()** 操作时，该对象被视为处于*移除态*。**delete()**\
  \ 方法由 Hibernate 会话提供，而 **remove()** 方法由 JPA EntityManager 提供。\n\n\n\n请注意，当对象被移除时，持久化上下文会将该对象从数据库中删除。这意味着你不应在应用程序中使用任何对已移除对象的引用。例如，在以下代码中，**book**\
  \ 对象被删除后，代码试图调用 **update()** 来使用对已删除书籍的引用，但这是不正确的：\n\n****public static void deletePersistentObject()**\n\
  \n**{**\n\n**Session session = getSession();**\n\n**Transaction tx = session.beginTransaction();**\n\
  \n**Book book = (Book) session.get(Book.class, new Long(294912));**\n\n**session.delete(book);**\n\
  \n**tx.commit();**\n\n// 无法使用对 book 的引用，因为它已从数据库中删除。\n\nsession.update(book);\n\n\
  **session.close();**\n\n**}**\n\n**图 10-4 展示了如何进入移除状态。\n\n第 10 章 ■ 处理对象\n\n*图 10-4\\\
  . 创建处于移除状态的对象*\n\n10.2 处理持久化对象\n\n问题\n\n如何创建一个持久化对象？如何对其执行 CRUD 操作？\n\n解决方案\n\n\
  **Session** 接口提供了对实体执行 CRUD 操作的方法，使其成为持久化对象。\n\n**工作原理\n\n让我们先看看如何创建一个持久化对象，然后对其执行其他操作。\n\
  \n创建持久化对象\n\n在 Hibernate 中，你需要从应用程序的会话工厂中获取一个会话实例。会话是事务的工厂，并跟踪其范围内对象的所有更改。会话工厂是单个数据库已编译映射的不可变缓存；它是提供会话实例的工厂。因此，如果你的应用程序与两个数据库交互，你需要配置两个独立的会话工厂。\n\
  \n以下是在 Hibernate 中的实现方式：\n\n****sessionFactory = new Configuration().configure().buildSessionFactory();**\n\
  \n**Session hibernateSession = sessionFactory.openSession();**\n\n**这段代码的第一行会在其路径中查找\
  \ **hibernate.cfg.xml** 文件。它会编译并加载该文件中列出的映射。创建会话工厂是一项昂贵的任务，因此你应该只创建一次——最好在应用程序启动时进行。创建会话相对廉价；它甚至不会打开数据库连接。\n\
  \n让我们创建持久化对象：\n\n**Transaction tx = session.beginTransaction();\n\n**Book book =\
  \ new Book();**\n\n**book.setName(\"Book Name - hibernate \");**\n\n**book.setPrice(79);**\n\
  \n**book.setPublishDate(new Date());**\n\nSerializable bookId = session.save(book);\n\
  \ntx.commit();\n\nsession.close();\n\n**在第一行，从会话中获取了一个 **Transaction** 实例。默认情况下，会话提供\
  \ Java 数据库连接 (JDBC) 事务。会话可以提供的另外两种可能的事务类型是 Java 事务 API (JTA) 和容器管理事务。要让会话提供这两种类型中的任何一种，你需要在\
  \ **hibernate.cfg.xml** 文件中声明 **hibernate.transaction_factory** 属性。\n\n接下来的几行使用\
  \ **new** 关键字创建了一个临时的 **book** 对象。通过调用 **save()** 方法，你将临时对象变为持久化对象。然后，**book** 对象与会话及其持久化上下文关联。请注意，直到此时，尚未创建数据库记录。\n\
  \n**save()** 方法返回新插入记录的主键。只有对事务调用 **commit()** 时，才会创建数据库连接并将记录插入数据库。最后一行关闭会话，这意味着其持久化上下文不再活动。**book**\
  \ 对象现在处于脱管状态。\n\n接下来，这是在 JPA 中的实现方式：\n\n****EntityManagerFactory managerFactory\
  \ = Persistence.createEntityManagerFactory(\"book\");** **EntityManager manager\
  \ = managerFactory.createEntityManager();**\n\n**在 JPA 中，你使用 **javax.persistence.Persistence**\
  \ 类的 **createEntityManagerFactory()** 方法来获取 **EntityManagerFactory** 类的实例。此方法调用会在\
  \ **META-INF** 文件夹中查找 **persistence.xml** 文件。**EntityManagerFactory** 类似于 Hibernate\
  \ 的 **sessionFactory** 类；它为你提供一个 EntityManager。EntityManager 拥有一个新的持久化上下文，用于保存和加载对象：\n\
  \n****Book newBook = new Book();**\n\n**newBook.setBookName(\"HIbernate Recipes\
  \ Phase1\");**\n\n**newBook.setPublishDate(new Date());**\n\n**newBook.setPrice(50l);**\n\
  \nEntityTransaction tran = manager.getTransaction();\n\ntran.begin();\n\nmanager.persist(book);\n\
  \ntran.commit();\n\nmanager.close();\n\n**在 JPA 中，EntityManager 取代了会话：它是一个提供事务（此处为\
  \ **EntityTransaction**）的工厂。**save()** 方法被 **persist()** 方法取代，后者将 **book** 对象从临时状态转变为持久化状态。调用\
  \ **persist()** 方法后，**book** 对象的状态由持久化上下文管理。请注意，**persist()** 不会返回新创建记录的可序列化 ID。\n\
  \n检索持久化对象\n\n在 Hibernate 中，你需要一个会话实例来通过 ID 检索实体。Hibernate 为此提供了两种方法：**get()** 和\
  \ **load()**。这两种方法都将实体类和 ID 作为输入参数：\n\n****Session session = getSession();**\n\n\
  **Transaction tx = session.beginTransaction();**\n\n//Book book = (Book) session.load(Book.class,\
  \ new Long(294912));\n\nBook book1 = (Book) session.get(Book.class, new Long(294912));\n\
  \n**tx.commit();**\n\n**session.close();**\n\n**System.out.println(book1);**\n\n\
  **get()** 方法会调用数据库并查找主键。如果找到主键，它会检索并返回该对象。如果找不到，则返回 **null**。\n\n另一方面，**load()**\
  \ 方法会在当前持久化上下文中查找。如果它能找到该实体，则返回实体对象。如果该对象不在当前持久化上下文中管理，则会返回一个代理占位符，而不会访问数据库。这意味着，如果你请求一个数据库中不存在的实体对象（或者当然，也不在当前持久化上下文中），那么\
  \ **load()** 方法会返回一个代理。当你尝试在同一持久化上下文中读取/检索除主键之外的属性时，会得到一个 **org.hibernate.ObjectNotFoundException**；当你尝试在会话关闭后（持久化上下文已结束）读取/检索属性时，会得到一个\
  \ **org.hibernate.LazyInitializationException**。当你只需要一个代理且无需进行数据库调用时，**load()**\
  \ 方法非常有用。当你需要在给定的持久化上下文中，在持久化之前关联一个实体时，你只需要一个代理。\n\n在 JPA 中，你使用 EntityManager 来读取/检索持久化实体。JPA\
  \ 提供了两种方法：**find()** 和 **getReference()**。这两种方法都将实体类和 ID 作为输入参数：\n\n****EntityManager\
  \ manager = SessionManager.getEntityManager();**\n\n**EntityTransaction tran = manager.getTransaction();**\n\
  \n**tran.begin();**\n\nBook book = manager.find(Book.class, new Long(294912));\n\
  \n//Book book1 = manager.getReference(Book.class, new Long(294912));\n\n**tran.commit();**\n\
  \n**manager.close();**\n\n**find()** 方法类似于 Hibernate 中的 **get()** 方法。调用此方法时会进行数据库调用。如果找不到持久化实体，**find()**\
  \ 方法返回 **null**。请注意，你没有对 **find()** 方法的返回值进行强制类型转换。这不是必需的，因为 **find()** 是一个泛型方法，并且第一个参数被设置为返回类型。\n\
  \n**getReference()** 方法类似于 Hibernate 中的 **load()** 方法。当你只需要一个代理时，应该使用它。\n\n第 10\
  \ 章 ■ 处理对象\n\n修改持久化对象\n\n\n\n您可以修改与会话和持久化上下文关联的任何持久化对象。其状态随后会与数据库同步：\n\n****Session\
  \ session = getSession();**\n\n**Transaction tx = session.beginTransaction();**\n\
  \n**Book book = (Book) session.get(Book.class, new Long(294912));**\n\nbook.setName(\"\
  Book Name - hibernate 2\");\n\n**tx.commit();**\n\n**session.close();**\n\n**该实体从数据库中检索，并在同一事务中进行修改。当调用\
  \ **commit()** 方法时，这些修改会传播到数据库。持久化上下文会识别出对实体状态所做的更改，并与数据库同步。这被称为*自动脏检查*。\n\n在 JPA\
  \ 中的实现如下：\n\n****EntityManager manager = SessionManager.getEntityManager();**\n\n\
  **EntityTransaction tran = manager.getTransaction();**\n\n**tran.begin();**\n\n\
  **Book book = manager.find(Book.class, new Long(294912));**\n\n**book.setBookName(\"\
  Book Name - hibernate 22\");**\n\n**tran.commit();**\n\n**manager.close();**\n\n\
  删除持久化对象\n\n您可以删除数据库中与会话和持久化上下文关联的任何持久化对象。为此，需要调用 **delete()** 方法：\n\n****Session\
  \ session = getSession();**\n\n**Transaction tx = session.beginTransaction();**\n\
  \n**Book book = (Book) session.get(Book.class, new Long(294912));**\n\nsession.delete(book);\n\
  \n**tx.commit();**\n\n**session.close();**\n\n**调用 **delete()** 后，实体处于已移除状态。事务提交后，数据库记录被删除，会话关闭后，对象处于瞬时状态。\n\
  \n在 JPA 中，**remove()** 方法执行与 **delete()** 方法相同的功能：\n\n****EntityManager manager\
  \ = SessionManager.getEntityManager();**\n\n**EntityTransaction tran = manager.getTransaction();**\n\
  \n**tran.begin();**\n\n**Book book = manager.find(Book.class, new Long(294912));**\n\
  \nmanager.remove(book);\n\n**tran.commit();**\n\n**manager.close();**\n\n第 10 章\
  \ ■ 处理对象\n\n10.3 持久化游离对象\n\n问题\n\n如何持久化一个游离对象？\n\n解决方案\n\n您可以通过两种方式持久化游离对象：重新附加或合并。\n\
  \n**工作原理\n\n首先重新附加一个游离对象，然后合并另一个。\n\n重新附加游离对象\n\n在 Hibernate 中，您使用会话的 **update()**\
  \ 方法将游离对象重新附加到会话和持久化上下文：\n\n****Session session = getSession();**\n\n**Transaction\
  \ tx = session.beginTransaction();**\n\n**Book book = (Book) session.get(Book.class,\
  \ new Long(294912));**\n\n**tx.commit();**\n\n**session.close();**\n\nbook.setName(\"\
  Detached Hibernate\");\n\nSession session2 = getSession();\n\nTransaction tx2 =\
  \ session2.beginTransaction();\n\nsession2.update(book);\n\ntx2.commit();\n\n**session2.close();**\n\
  \n**Hibernate 会跟踪对游离对象所做的修改。因此，当调用 **update()** 方法时，它总是会调度一个 **update** SQL 命令。如果您不想执行\
  \ **update** 调用，可以将类映射配置为 **select-before-update='true'**。**然后，在调用 **update()**\
  \ 方法之前，会先执行一次 **get()** 调用来检查对象是否已被更新。**\n\n**JPA 没有 **update()** 方法。它只支持合并游离对象。\n\
  \n合并游离对象\n\n在 Hibernate 中，您使用会话的 **merge()** 方法来持久化游离对象。调用 **merge()** 方法会导致一系列复杂的操作。Hibernate\
  \ 首先会检查该实体的实例是否存在于当前持久化上下文中。如果找到与游离对象相等的实体实例，则会将游离对象的状态复制到持久化上下文中的实例：\n\n****Session\
  \ session = getSession();**\n\n第 10 章 ■ 处理对象\n\n**Transaction tx = session.beginTransaction();**\n\
  \n**Book book = (Book) session.get(Book.class, new Long(294912));**\n\n**tx.commit();**\n\
  \n**session.close();**\n\n**book.setName(\"Detached Hibernate\");**\n\nSession session2\
  \ = getSession();\n\n\n\nTransaction tx2 = session2.beginTransaction();\n\nBook\
  \ book2 = (Book) session2.merge(book);\n\n**tx2.commit();**\n\n**session2.close();**\n\
  \n如果持久化上下文中不包含该实体的等效实例，Hibernate 会在内部调用 **get()** 方法，将持久化实体对象加载到持久化上下文中。然后，将脱管对象的状态复制到新创建的持久化实体对象上。\n\
  \n请注意，如果将一个瞬时对象传递给 **merge()** 方法，则会创建一个新的持久化实例，并将状态复制到该新实例。这同样适用于 JPA。以下是实现代码：\n\
  \n****EntityManager manager = SessionManager.getEntityManager();**\n\n**EntityTransaction\
  \ tran = manager.getTransaction();**\n\n**tran.begin();**\n\n**Book book = manager.find(Book.class,\
  \ new Long(262144));**\n\n**tran.commit();**\n\n**manager.close();**\n\nbook.setBookName(\"\
  Detached Hibernate merged\");\n\nEntityManager manager2 = SessionManager.getEntityManager();\n\
  \nEntityTransaction tran2 = manager2.getTransaction();\n\ntran2.begin();\n\nBook\
  \ book2 = (Book) manager2.merge(book);\n\ntran2.commit();\n\n**manager2.close();**\n\
  \n10.4 使用数据过滤器\n\n问题\n\n假设你的书店有很多儿童和青少年用户。你想通过根据用户的年龄段对用户进行分类，使书店对儿童友好。（你不希望儿童能够购买面向成人读者的书籍。）如何利用\
  \ Hibernate 提供的数据过滤机制来实现这一点？\n\n解决方案\n\n每个 **Book** 类都有一个 **UserRank** 类，用于指定可以访问某本书的最低等级。成人书籍的用户等级为\
  \ 3，儿童书籍的用户等级为 1。\n\n你在元数据中定义一个过滤器定义（**<filter-def>**），只要位于 **<hibernate-mapping>**\
  \ 元素内，就可以在任何 XML 映射文件中声明该定义。你需要为过滤器定义提供一个全局唯一的名称。你在 **Book** 的映射 XML 文件中应用并实现该过滤器。最后，你在用于查询的会话上启用该过滤器。\n\
  \n工作原理\n\n首先，创建 **UserRank** 类和 **Book** 类。**UserRank** 类包含用户等级和用户类型。**Book** 类与\
  \ **UserRank** 类关联：\n\n****public class UserRank {**\n\n****private long rank;**\n\
  \n**private String userType;**\n\n****// getters and setters**\n\n**}**\n\n****public\
  \ class Book {**\n\n****private Long book_id;**\n\n**private String isbn;**\n\n\
  **private String name;**\n\n**private String publisher;**\n\n**private Date publishDate;**\n\
  \n**private Integer price;**\n\n**private UserRank userRank;**\n\n**// getters and\
  \ setters**\n\n**}**\n\n**接下来是 **UserRank** 和 **Book** 的映射文件。你在 **UserRank** 映射文件中定义过滤器，提供一个全局唯一的名称及其所需的过滤器参数。你使用\
  \ **<filter-def>** 元素和 **<filter-param>** 元素来定义过滤器：\n\n**<hibernate-mapping package=\"\
  com.hibernaterecipes.chapter10\" auto-import=\"false\" >\n\n**<import class=\"UserRank\"\
  \ rename=\"userRank\"/>**\n\n**<class name=\"UserRank\" table=\"UserRank\" dynamic-insert=\"\
  true\" dynamic-update=\"true\"**\n\n**schema=\"BOOK\">**\n\n**<id name=\"rank\"\
  \ column=\"RANK\" type=\"long\">**\n\n**<generator class=\"assigned\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"userType\" type=\"string\" column=\"USERTYPE\"\
  \ />**\n\n****</class>**\n\n<filter-def name=\"filterByRank\">\n\n<filter-param\
  \ name=\"currentRank\" type=\"long\"/>\n\n<filter-param name=\"requestedRank\" type=\"\
  long\"/>\n\n</filter-def>\n\n</hibernate-mapping>\n\n**188\n\n第 10 章 ■ 处理对象\n\n\
  在 **Book** 映射类中，你将定义的过滤器应用于 **Book** 类的实例。你使用 **<filter>** 来实现过滤器。**condition**\
  \ 属性是一个 SQL 表达式，如果结果必须通过过滤器，则该表达式必须求值为 true。在这种情况下，你将用户的等级与用户请求的书籍的等级进行比较。如果用户的当前等级大于或等于请求书籍的等级，则结果将返回给用户：\n\
  \n\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter10\" auto-import=\"\
  false\" >**\n\n**<import class=\"Book\" rename=\"book\"/>**\n\n**<class name=\"\
  Book\" table=\"Book\" dynamic-insert=\"true\" dynamic-update=\"true\" schema=\"\
  BOOK\">**\n\n**<id name=\"isbn\" type=\"string\" column=\"ISBN\" />**\n\n**<property\
  \ name=\"name\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"\
  publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"\
  price\" type=\"int\" column=\"PRICE\" />**\n\n**<many-to-one name=\"userRank\" class=\"\
  UserRank\" column=\"RANK\" cascade=\"save-update\"/>**\n\n**<filter name=\"filterByRank\"\
  \n\ncondition=\":currentRank>=(select distinct(b.RANK)\n\nfrom Book b\n\nwhere b.rank=:requestedRank)\"\
  >\n\n</filter>\n\n**</class>**\n\n**</hibernate-mapping>**\n\n到目前为止，你所做的只是定义并应用了过滤器。查询结果只有在应用程序中为特定会话启用过滤器并设置参数后，才会被过滤。`EntityManager`\
  \ 不支持此 API，因此你必须使用 Hibernate 提供的接口。你可以通过调用会话上的 **`enableFilter()`** 方法来启用过滤器，该方法将全局唯一的过滤器名称作为输入参数，并返回一个\
  \ **`Filter`** 实例。返回的 **`Filter`** 实例接受运行时参数；你可以设置已定义的参数。会话还提供了其他方法：**`getEnabledFilter(String\
  \ filterName)`** 和 **`disableFilter(String filterName)`**。实现方法如下：\n\n****static\
  \ void fetchKidsbooks(Long userRank,Long requestedRank)**\n\n**{**\n\n**Session\
  \ session = getSession();**\n\nFilter filter = session.enableFilter(\"filterByRank\"\
  );\n\nfilter.setParameter(\"currentRank\", userRank);\n\nfilter.setParameter(\"\
  requestedRank\", requestedRank);\n\n**List<Book> books =**\n\n**session.createQuery(\"\
  from book where userRank<=\"+requestedRank.toString()).list();** **if(books != null)**\n\
  \n**{**\n\n**for(Book book:books)**\n\n**{**\n\n**System.out.println(\"Name \"+book.getName());**\n\
  \n**}**\n\n**}**\n\n**}**\n\n**189\n\n第 10 章 对象操作\n\n**`Filter`** 提供的其他方法如下：\n\n\
  • **`getFilterDefinition()`** 获取包含过滤器附加信息（如其默认条件和预期参数名称/类型）的过滤器定义。\n\n• **`validate()`**\
  \ 执行过滤器状态的验证。此方法用于在启用过滤器后、使用前验证其状态。如果过滤器无效，则会抛出 Hibernate 异常。\n\n你还可以将过滤器应用于集合：\n\
  \n****<set ...>**\n**<filter name=\"myFilter\" condition=\":myFilterParam = MY_FILTERED_COLUMN\"\
  />**\n**</set>**\n\n数据过滤也可用于过滤区域或时间数据。\n\n10.5 使用拦截器\n\n问题\n\n你希望在向 **`BookShop`**\
  \ 数据库执行任何插入操作时保存日期。例如，如果插入了一个新的出版商，你希望保存创建日期。对于书籍也是如此：如果向数据库添加了一本新书，你希望通过查看创建日期来了解其创建时间。如何使用\
  \ Hibernate 提供的拦截器来实现这一点？\n\n解决方案\n\n由于创建日期是许多类中都会使用的属性，你可以创建一个 **`Auditable`**\
  \ 类，并让所有需要创建日期的类继承该类。然后创建一个继承 Hibernate 的 **`EmptyInterceptor`** 的拦截器，并重写 **`onSave()`**\
  \ 方法。在 **`onSave()`** 方法中，如果对象是 **`Auditable`** 的实例，则为其分配日期。由于拦截器是会话作用域的，因此每次从 **`sessionFactory`**\
  \ 请求会话时，都需要在打开会话时将拦截器分配给该会话。\n\n**工作原理**\n\n首先创建一个简单的 **`Auditable`** 类，其中包含一个属性：**`createDate`**。需要在数据库中持久化创建日期的实体类继承此类：\n\
  \n****public class Auditable {**\n**private Date createDate;**\n**// getter 和 setter**\n\
  **}**\n\n在此案例中，我们使用 **`Book`** 类。更新 **`Book`** 类，使其继承 **`Auditable`**：\n\n190\n\n\
  第 10 章 对象操作\n\n\n\n****public class Book extends Auditable implements Serializable{**\n\
  \n**...**\n\n**}**\n\n**然后，更新 XML 映射文件以包含创建日期：\n\n****<hibernate-mapping package=\"\
  com.hibernaterecipes.chapter10\" auto-import=\"false\" >**\n\n**<import class=\"\
  Book\" rename=\"book\"/>**\n\n**<class name=\"Book\" table=\"Book\" dynamic-insert=\"\
  true\" dynamic-update=\"true\" schema=\"BOOK\">**\n\n**<id name=\"isbn\" type=\"\
  string\" column=\"ISBN\" />**\n\n**<property name=\"name\" type=\"string\" column=\"\
  BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
  \ />**\n\n**<property name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n<property\
  \ name=\"createDate\" type=\"date\" column=\"CREATE_DATE\" />\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**现在，创建拦截器类。对于书店应用程序，它被命名为**BookShopInterceptor**，并继承\
  \ Hibernate 的 **EmptyInterceptor** 类。**EmptyInterceptor** 不执行任何操作——它由 Hibernate\
  \ 提供，用作应用程序自定义拦截器的基类。\n\n在 **BookShopInterceptor** 实现中，你需要重写 **onSave()** 方法。在此方法中，如果对象是\
  \ **Auditable** 类型，则设置 **createDate**：\n\n****public class BookShopInterceptor extends\
  \ EmptyInterceptor {**\n\n****@Override**\n\n**public boolean onSave(Object entity,\
  \ Serializable id, Object[] state,**\n\n**String[] propertyNames, Type[] types)\
  \ {**\n\n**if ( entity instanceof Auditable ) {**\n\n**for ( int i=0; i<propertyNames.length;\
  \ i++ ) {**\n\n**if ( \"createDate\".equals( propertyNames[i] ) ) {**\n\n**state[i]\
  \ = new Date();**\n\n**return true;**\n\n**}**\n\n**}**\n\n**}**\n\n**return false;**\n\
  \n**}**\n\n**}**\n\n**打开会话时，你需要将拦截器分配给 Hibernate **session**：\n\n****Session hibernateSession\
  \ = sessionFactory.openSession(new BookShopInterceptor());** **Transaction tx =\
  \ session.beginTransaction();**\n\n**System.out.println(\" 已开始 \");**\n\n**Book2\
  \ book = new Book2();**\n\n**book.setIsbn(\"PBN123\");**\n\n**book.setName(\"Spring\
  \ Recipes \");**\n\n**book.setPrice(30);**\n\n**book.setPublishDate(new Date());**\n\
  \n第 10 章 ■ 处理对象\n\n**book.setPublisher(\"Apress\");**\n\n**session.saveOrUpdate(book);**\n\
  \n**tx.commit();**\n\n**session.close();**\n\n**如果必须使用 **sessionFactory.getCurrentSession()**，则无法控制会话的打开。你必须编写一个继承\
  \ Hibernate 的 **CurrentSessionContext** 实现的实现。\n\n你也可以在全局级别分配拦截器。如果选择这样做，则所有会话都将分配该拦截器：\n\
  \n****Configuration config = new Configuration();**\n\nconfig.setInterceptor(new\
  \ BookShopInterceptor());\n\n**sessionFactory = config.configure().buildSessionFactory();**\n\
  \n**Session hibernateSession = sessionFactory.openSession();**\n\n**拦截器也用于审计日志记录。\n\
  \n总结\n\n现在你已经很好地理解了持久化生命周期以及对象在其生命周期中可以拥有的状态。当处理分离对象时，你可以重新附加或合并该对象。\n\n你应该能够使用动态数据过滤来提供安全性或访问时间/区域数据。\n\
  \n你还学会了使用拦截器来持久化公共属性，例如创建日期和创建者。\n\n**第 11 章**\n\n■ ■ ■\n\n**批处理与原生 SQL**\n\n*批处理*\
  \ 是执行一系列程序。从应用程序的角度来看，批处理意味着从持久化存储中读取数据，对数据进行处理，然后可能将处理后的数据存储回持久化存储。批处理允许自动化和共享计算机资源。它通常在计算机资源不太繁忙时运行。\n\
  \n假设对于书店应用程序，你希望通过在每月的 27 日和 28 日对商店中的所有图书进行促销来增加销售额。这是实现批处理的经典案例。\n\n在 27 日的前一晚，你列出所有库存图书并实施所需的折扣。然后在\
  \ 28 日的晚上，移除折扣。\n\n\n\n在批量处理过程中，通常需要大量插入、更新和删除数据库记录。\n\n本章讨论 Hibernate 的批量更新和批量删除功能。例如，以下代码片段尝试插入一百万本书。这不是一个好方法——它可能导致\
  \ **OutOfMemory** 问题，因为 Hibernate 会在其缓存中缓存这些实例：\n\n****Session session = getSession();**\n\
  \n**Transaction tx = session.beginTransaction();**\n\nfor(int i =0;i<100000;i++)\n\
  \n**{**\n\n**BookCh2 book = new BookCh2();**\n\n**book.setName(\"Book Name \"+(i+1));**\n\
  \n**book.setPrice(79);**\n\n**book.setPublishDate(new Date());**\n\nsession.save(book);\n\
  \n**}**\n\n****tx.commit();**\n\n**session.close();**\n\n如果你在一个会话中处理一百万本书，你应该在每处理\
  \ 100 或 200 本书后调用 **session** 的 **flush()** 和 **clear()** 方法；**flush()** 和 **clear()**\
  \ 会清除一级缓存。如果在实体级别启用了二级缓存，并且你希望为批量插入方法禁用它，则需要调用 **session.setCacheMode (CacheMode.IGNORE)**。通过将\
  \ **session** 的 **cacheMode** 设置为 **IGNORE**，你告诉 Hibernate 不要与该特定会话的二级缓存进行交互。\n\n\
  在全局级别，你可以通过设置 **jdbc.batch_size** 属性（推荐值为 5 到 30）来启用 JDBC 批量大小。你还可以在映射文件中通过将 **cache.use_second_level_cache**\
  \ 属性设置为 **false** 来在全局级别禁用二级缓存：\n\n**193\n\n第 11 章 ■ 批量处理与原生 SQL\n\n<property name=\"\
  hibernate.jdbc.batch_size\">25</property>\n\n<property name=\"hibernate.cache.use_second_level_cache\"\
  >false</property>\n\n**本章还探讨了使用原生 SQL 查询数据库。当你想要使用数据库特定的功能时，原生 SQL 非常有用。你可以使用在映射文档中定义的命名\
  \ SQL 查询，其使用方式与 Hibernate Query 相同。\n\n11.1 执行批量插入\n\n问题\n\n如何执行批量插入？\n\n解决方案\n\n\
  要执行批量插入，你可以使用 Session API 的 **flush()** 和 **clear()** 方法。定期调用这些方法可以控制一级缓存的大小。要让\
  \ Hibernate 不与二级缓存交互，你需要调用 **session.setCacheMode.(CacheMode.IGNORE)**。\n\n**工作原理\n\
  \n批量插入的代码如下所示。添加了一个额外的 **if** 条件，以便在迭代达到 JDBC 批量大小时调用 **flush()** 和 **clear()**\
  \ 方法：\n\n****Session session = getSession();**\n\n**Transaction tx = session.beginTransaction();**\n\
  \nsession.setCacheMode(CacheMode.IGNORE);\n\n**for(int i =0;i<100;i++)**\n\n**{**\n\
  \n****BookCh2 book = new BookCh2();**\n\n**book.setName(\"Book Name \"+(i+1));**\n\
  \n**book.setPrice(79);**\n\n**book.setPublishDate(new Date());**\n\n**session.save(book);**\n\
  \nif(i % 25 == 0)\n\n**{**\n\n**System.out.println(\"Flushing in batches\");**\n\
  \nsession.flush();\n\nsession.clear();\n\n**System.out.println(\"get isbn \"+book.getIsbn());**\n\
  \n**}**\n\n****}**\n\n**tx.commit();**\n\n**session.close();**\n\n第 11 章 ■ 批量处理与原生\
  \ SQL\n\n通过将 **CacheMode** 设置为 **Ignore**，你告诉 Hibernate 不要与二级缓存交互。仅当在全局或实体级别启用了二级缓存时，才需要执行此操作。\n\
  \n11.2 执行批量更新和删除\n\n问题\n\n如何执行批量更新和删除？\n\n解决方案\n\n可以通过两种方式完成批量更新。一种方式是使用 **flush()**\
  \ 和 **clear()** 方法来释放一级缓存并分批保存。第二种方式是使用带有 **where** 子句的 **update** 语句。\n\n**工作原理\n\
  \n假设你正在为在线书店中的 Hibernate 书籍策划一次促销活动。所有名称中包含 *Hibernate* 一词的书籍都将享受 10 美元的折扣。你可以先查询匹配的书籍，然后逐一更新它们：\n\
  \n****Session session = getSession();**\n\n**Transaction tx = null;**\n\n**try {**\n\
  \n**tx = session.beginTransaction();**\n\n\n\nQuery query = session.createQuery(\"\
  from bkch2 where name like ?\");\n\n**query.setString(0, \"%Hibernate%\");**\n\n\
  **List books = query.list();**\n\nfor (Iterator iter = books.iterator(); iter.hasNext();)\n\
  \n**{**\n\n**BookCh2 book = (BookCh2) iter.next();**\n\n**book.setPrice(new Integer(book.getPrice()-\
  \ 10));**\n\nsession.saveOrUpdate(book);\n\n**}**\n\n**tx.commit();**\n\n**} catch\
  \ (HibernateException e) {**\n\n**if (tx != null)**\n\n**tx.rollback();**\n\n****throw\
  \ e;**\n\n**} finally {**\n\n**session.close();**\n\n**}**\n\n**195\n\n第 11 章 ■\
  \ 批处理与原生 SQL\n\n这种技术的缺点在于，你会将**query.list()**返回的完整结果集加载到内存中，然后逐条保存记录。相反，你可以使用**session.flush()**和**session.clear()**方法进行批量更新。你也可以使用**scroll**来获取一个\
  \ JDBC **ResultSet**，它是一个代表数据库结果集的数据表，通常由执行查询数据库的语句生成。默认的**ResultSet**维护一个从第一行导航到最后一行的游标。设置**CacheMode.IGNORE**会使\
  \ Hibernate 在特定会话中不与二级缓存交互：\n\n****Session session = getSession();**\n\n**Transaction\
  \ tx = null;**\n\n**tx = session.beginTransaction();**\n\n**ScrollableResults books\
  \ = session.createQuery(\"from bkch2 where name like 'Book%'\")**\n\n**.setCacheMode(CacheMode.IGNORE)**\n\
  \n.scroll(ScrollMode.FORWARD_ONLY);\n\n****int count=0;**\n\n**while ( books.next()\
  \ ) {**\n\n**BookCh2 book = (BookCh2) books.get(0);**\n\n**book.setPrice(new Integer(book.getPrice()-\
  \ 10));**\n\n**if ( ++count % 25 == 0 ) {**\n\n**//刷新一批更新并释放内存：**\n\n**System.out.println(\"\
  正在分批刷新\");**\n\nsession.flush();\n\nsession.clear();\n\n**}**\n\n**}**\n\n**tx.commit();**\n\
  \n**session.close();**\n\n**你也可以通过使用**UPDATE**查询来完成批量更新。该查询在 SQL 级别执行，不涉及更改内存中的对象状态。HQL\
  \ 支持参数绑定。**UPDATE**或**DELETE**的语法如下：\n\n****( UPDATE | DELETE ) FROM? EntityName\
  \ (WHERE where_conditions)?.**\n\n**以下规则适用于此查询：\n\n• **FROM**子句是可选的。\n\n• **WHERE**子句是可选的。\n\
  \n• 在批量 HQL 查询中，不能指定隐式或显式的连接。\n\n• **FROM**子句中只能命名一个实体。\n\n所以这里是**UPDATE**：\n\n\
  ****Session session = getSession();**\n\n**Transaction tx = null;**\n\n**try {**\n\
  \n**tx = session.beginTransaction();**\n\nQuery query = session.createQuery(\"update\
  \ bkch2 set price = price - ? where name like ?\"); 196\n\n第 11 章 ■ 批处理与原生 SQL\n\
  \nquery.setInteger(0, 10);\n\nquery.setString(1, \"%Hibernate%\");\n\n**int count\
  \ = query.executeUpdate();**\n\n****tx.commit();**\n\n**} catch (HibernateException\
  \ e) {**\n\n**if (tx != null)**\n\n**tx.rollback();**\n\n****throw e;**\n\n**} finally\
  \ {**\n\n**session.close();**\n\n**}**\n\n**DELETE**查询看起来与**UPDATE**查询非常相似：\n\n\
  ****Session session = getSession();**\n\n**Transaction tx = null;**\n\n**try {**\n\
  \n**tx = session.beginTransaction();**\n\nQuery query = session.createQuery(\"delete\
  \ from Book where name like ?\"); query.setString(0, \"%Hibernate%\");\n\nint count\
  \ = query.executeUpdate();\n\n**tx.commit();**\n\n**} catch (HibernateException\
  \ e) {**\n\n**if (tx != null) tx.rollback();**\n\n**throw e;**\n\n**} finally {**\n\
  \n**session.close();**\n\n**}**\n\n11.3 使用原生 SQL\n\n问题\n\nHibernate 提供了 HQL，并且支持\
  \ JPA QL 和条件查询来执行大多数查询。但如果需要使用数据库特定的功能，比如查询提示或关键字，该怎么办？在这种情况下，你需要使用 Hibernate 对原生\
  \ SQL 的支持。如何使用原生 SQL 进行查询？\n\n解决方案\n\nSession API 提供了**createSQLQuery()**方法，该方法返回**SQLQuery**接口。此接口提供了你可以用来使用原生\
  \ SQL 查询数据库的方法。\n\n第 11 章 ■ 批处理与原生 SQL\n\n工作原理\n\n\n\n假设你需要为畅销书籍编译一些统计数据。这个过程非常复杂，需要用到数据库提供的一些原生特性。在这种情况下，HQL\
  \ 的帮助不大。但 Hibernate 支持使用原生 SQL 来查询对象。为了演示，本技巧不实现复杂的统计——你只需创建一个视图来模拟查询结果。通过连接 **BOOK**\
  \ 和 **PUBLISHER** 表，创建视图 **TOP_SELLING_BOOK**：\n\n****CREATE VIEW TOP_SELLING_BOOK\
  \ (**\n\n**ID, ISBN, BOOK_NAME, PUBLISH_DATE, PRICE,**\n\n**PUBLISHER_ID, PUBLISHER_CODE,\
  \ PUBLISHER_NAME, PUBLISHER_ADDRESS**\n\n**) AS**\n\n**SELECT book.ID, book.ISBN,\
  \ book.BOOK_NAME, book.PUBLISH_DATE, book.PRICE,**\n\n**book.PUBLISHER_ID, pub.CODE,\
  \ pub.PUBLISHER_NAME, pub.ADDRESS**\n\n**FROM BOOK book LEFT OUTER JOIN PUBLISHER\
  \ pub ON book.PUBLISHER_ID = pub.ID**\n\n**首先，你仅从该视图中检索 **book** 对象，并忽略关联的出版商。你使用原生\
  \ SQL 来选择与书籍相关的所有列。**addEntity()** 方法指定了结果持久化对象的类型：\n\n****String sql = \"SELECT\
  \ ID, ISBN, BOOK_NAME, PUBLISH_DATE, PRICE, PUBLISHER_ID**\n\n**FROM TOP_SELLING_BOOK**\n\
  \n**WHERE BOOK_NAME LIKE ?\";**\n\nQuery query = session.createSQLQuery(sql)\n\n\
  .addEntity(Book.class)\n\n**.setString(0, \"%Hibernate%\");**\n\n**List books =\
  \ query.list();**\n\n**由于结果中的所有列名与 **Book** 映射定义中的列名相同，你可以在 **SELECT** 子句中指定 **{book.*}**。Hibernate\
  \ 会将 **{book.*}** 替换为映射定义中的所有列名：\n\n****String sql = \"SELECT {book.*}**\n\n**FROM\
  \ TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME LIKE ?\";**\n\nQuery query = session.createSQLQuery(sql)\n\
  \n.addEntity(\"book\", Book.class)\n\n.setString(0, \"%Hibernate%\");\n\n**List\
  \ books = query.list();**\n\n**接下来，考虑关联的出版商。由于并非所有列名都与 **Publisher** 映射定义中的列名相同，你需要在\
  \ SQL **SELECT** 子句中手动映射它们。\n\n**addjoin()** 方法指定了连接的关联：\n\n****String sql = \"\
  SELECT {book.*},**\n\n**book.PUBLISHER_ID as {publisher.id},**\n\n**book.PUBLISHER_CODE\
  \ as {publisher.code},**\n\n**book.PUBLISHER_NAME as {publisher.name},**\n\n**book.PUBLISHER_ADDRESS\
  \ as {publisher.address}**\n\n**FROM TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME\
  \ LIKE ?\";**\n\n第 11 章 ■ 批处理与原生 SQL\n\nQuery query = session.createSQLQuery(sql)\n\
  \n.addEntity(\"book\", Book.class)\n\n.addJoin(\"publisher\", \"book.publisher\"\
  )\n\n.setString(0, \"%Hibernate%\");\n\n**List books = query.list();**\n\n**如果你只想查询一些简单的值，可以使用\
  \ **addScalar()** 方法：**String sql = \"SELECT max(book.PRICE) as maxPrice**\n\n**FROM\
  \ TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME LIKE ?\";**\n\nQuery query = session.createSQLQuery(sql)\n\
  \n.addScalar(\"maxPrice\", Hibernate.INTEGER)\n\n**.setString(0, \"%Hibernate%\"\
  );**\n\n**Integer maxPrice = (Integer) query.uniqueResult();**\n\n11.4 使用命名 SQL\
  \ 查询\n\n问题\n\n如何使用命名查询？\n\n解决方案\n\n你可以在映射文档中定义命名 SQL 查询，并像调用命名 HQL 查询一样调用它们。\n\n\
  工作原理\n\n原生 SQL 语句也可以放在映射定义中，并在 Java 代码中通过名称引用。你可以使用 **<return>** 和 **<return-join>**\
  \ 来描述结果对象。**return-join** 元素用于连接关联。注意，Hibernate 不支持对存储过程使用 **return-join**。在以下查询中，书籍的出版商与书籍一起被检索：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.bookstore\">**\n\n<sql-query\
  \ name=\"TopSellingBook.by.name\">\n\n<return alias=\"book\" class=\"Book\" />\n\
  \n<return-join alias=\"publisher\" property=\"book.publisher\"/>\n\n<![CDATA[\n\n\
  SELECT {book.*},\n\nbook.PUBLISHER_ID as {publisher.id},\n\nbook.PUBLISHER_CODE\
  \ as {publisher.code},\n\nbook.PUBLISHER_NAME as {publisher.name},\n\nbook.PUBLISHER_ADDRESS\
  \ as {publisher.address}\n\nFROM TOP_SELLING_BOOK book\n\nWHERE BOOK_NAME LIKE ?\n\
  \n]]>\n\n\n\n第 11 章 ■ 批处理与原生 SQL\n\n</sql-query>\n\n**</hibernate-mapping>**\n\n\
  **Query query = session.getNamedQuery(\"TopSellingBook.by.name\")**\n\n**.setString(0,\
  \ \"%Hibernate%\");**\n\n**List books = query.list();**\n\n**你也可以将返回简单值的查询包装为命名查询。此时，应使用**<return-scalar>**代替：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.bookstore\">**\n\n**...**\n\
  \n**<sql-query name=\"TopSellingBook.maxPrice.by.name\">**\n\n<return-scalar column=\"\
  maxPrice\" type=\"int\" />\n\n**<![CDATA[**\n\n**SELECT max(book.PRICE) as maxPrice**\n\
  \n**FROM TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME LIKE ?**\n\n**]]>**\n\n**</sql-query>**\n\
  \n**</hibernate-mapping>**\n\n**Query query = session.getNamedQuery(\"TopSellingBook.maxPrice.by.name\"\
  )**\n\n**.setString(0, \"%Hibernate%\");**\n\n**Integer maxPrice = (Integer) query.uniqueResult();**\n\
  \n**对于命名 SQL 查询，你可以将**<return>**和**<return-join>**分组到一个*结果集映射*中，并在**<sql-query>**中引用它们。结果集映射的优势在于它可以被多个查询复用：\n\
  \n****<hibernate-mapping package=\" com.hibernaterecipes.bookstore \">**\n\n<resultset\
  \ name=\"bookPublisher\">\n\n<return alias=\"book\" class=\"Book\" />\n\n<return-join\
  \ alias=\"publisher\" property=\"book.publisher\" />\n\n</resultset>\n\n**<sql-query\
  \ name=\"TopSellingBook.by.name\" resultset-ref=\"bookPublisher\">**\n\n**<![CDATA[**\n\
  \n**SELECT {book.*},**\n\n**book.PUBLISHER_ID as {publisher.id},**\n\n**book.PUBLISHER_CODE\
  \ as {publisher.code},**\n\n**book.PUBLISHER_NAME as {publisher.name},**\n\n**book.PUBLISHER_ADDRESS\
  \ as {publisher.address}**\n\n**FROM TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME\
  \ LIKE ?**\n\n**]]>**\n\n**</sql-query>**\n\n**</hibernate-mapping>**\n\n**在结果集映射中，你可以进一步将每个数据库列映射到对象属性。这样做可以通过从**SELECT**子句中移除映射来简化你的\
  \ SQL 语句：\n\n****<hibernate-mapping package=\" com.hibernaterecipes.bookstore \"\
  >**\n\n<resultset name=\"bookPublisher\">\n\n第 11 章 ■ 批处理与原生 SQL\n\n<return alias=\"\
  book\" class=\"Book\" />\n\n<return-join alias=\"publisher\" property=\"book.publisher\"\
  >\n\n<return-property name=\"id\" column=\"PUBLISHER_ID\" />\n\n<return-property\
  \ name=\"code\" column=\"PUBLISHER_CODE\" />\n\n<return-property name=\"name\" column=\"\
  PUBLISHER_NAME\" />\n\n<return-property name=\"address\" column=\"PUBLISHER_ADDRESS\"\
  \ />\n\n</return-join>\n\n</resultset>\n\n**<sql-query name=\"TopSellingBook.by.name\"\
  \ resultset-ref=\"bookPublisher\">**\n\n**<![CDATA[**\n\n**SELECT {book.*},**\n\n\
  **book.PUBLISHER_ID as {publisher.id},**\n\n**book.PUBLISHER_CODE as {publisher.code},**\n\
  \n**book.PUBLISHER_NAME as {publisher.name},**\n\n**book.PUBLISHER_ADDRESS as {publisher.address}**\n\
  \n**FROM TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME LIKE ?**\n\n**]]>**\n\n**</sql-query>**\n\
  \n**</hibernate-mapping>**\n\n**将列映射移至结果集映射后，你可以将**SELECT**子句简化为“全选”：\n\n****<hibernate-mapping\
  \ package=\" com.hibernaterecipes.bookstore \">**\n\n**...**\n\n**<sql-query name=\"\
  TopSellingBook.by.name\" resultset-ref=\"bookPublisher\">**\n\n**<![CDATA[**\n\n\
  **SELECT ***\n\n**FROM TOP_SELLING_BOOK book**\n\n**WHERE BOOK_NAME LIKE ?**\n\n\
  **]]>**\n\n**</sql-query>**\n\n**</hibernate-mapping>**\n\n本章小结\n\n在本章中，你已经了解了何时使用批处理。你学习了如何执行批量插入、更新和删除。你还学习了如何在批处理过程中管理一级和二级缓存。现在，你可以将原生\
  \ SQL 和命名查询与其他 Hibernate HQL 和条件查询结合使用了。\n\n**第 12 章**\n\n■ ■ ■\n\n**Hibernate 中的缓存**\n\
  \n缓存是应用程序为获得更好性能而实现的重要特性之一。从 ORM 的角度来看，从数据库检索到的数据会被缓存在内存或磁盘中，这样就不必为每个请求都调用数据库。*缓存*是数据库信息的本地副本，在以下情况下可用于避免数据库调用：\n\
  \n• 应用程序通过标识符执行查找。\n\n• 持久化层延迟解析关联或集合。\n\n在图 12-1 中，当应用程序查询数据时，第一次 Hibernate 会从数据库获取数据；此后，如果请求相同的数据，它会从缓存中获取数据。\n\
  \n*图 12-1. Hibernate 如何缓存*\n\nHibernate 提供了在类级别、集合级别以及查询结果集级别配置缓存的方法。缓存数据在应用程序中可在三个不同的范围内使用：203\n\
  \n第 12 章 ■ HIBERNATE 中的缓存\n\n• *事务范围：* 正如你在前面章节中所见，事务被定义为一个工作单元。缓存如何影响事务中的数据？如果在一个会话中获取了数据，并且在该工作单元完成之前，同一会话中再次执行了相同的查询，这些数据会存储在内存/磁盘中吗？这会避免对数据库的调用吗？是的。默认情况下，这些数据会存储在内存/磁盘中，因此避免了第二次查询对数据库的调用。由于一个工作单元对应一个请求，这些数据不会被共享或并发访问。\n\
  \n• *进程范围：* 数据在会话之间或工作单元之间被缓存。如果在一个会话中执行了一个查询，并且在关闭第一个会话后，在第二个会话中执行了相同的查询，这些数据会被缓存，从而避免第二次对数据库的调用。由于两个请求在这两个会话中可以访问相同的数据，因此这些数据会被并发访问。使用此范围时应谨慎。\n\
  \n• *集群范围：* 数据在同一台机器或集群中不同机器上的多个进程之间共享。\n\n进程范围的缓存使得在一个工作单元中从数据库检索到的数据对另一个工作单元可见。这可能会带来一些需要避免的不良后果。如果应用程序对数据库具有非独占访问权限，则不应使用进程范围。这意味着应用程序可以并发访问数据库，并且一个请求可以与另一个请求共享数据。\n\
  \n在这种情况下，当数据不经常更改，并且本地缓存过期时可以安全刷新时，应使用进程范围。\n\n任何设计为可扩展的应用程序都应支持集群级别的缓存。进程范围不维护机器之间数据的一致性，因此应使用集群级别的缓存。\n\
  \nHibernate 具有两级缓存架构：\n\n• 一级缓存是*持久化上下文缓存*。它处于工作单元级别。对于单个请求，它对应于 Hibernate 中的一个会话，并且默认情况下对\
  \ Hibernate 会话启用。\n\n• 二级缓存要么处于*进程范围*，要么处于*集群范围*。这是持久化实体状态的缓存。缓存并发策略定义了特定数据项的事务隔离细节，而缓存提供程序则代表了物理缓存的实现。\n\
  \nHibernate 还实现了查询结果集的缓存。这需要两个额外的物理缓存区域，用于保存缓存的查询结果集以及表最后更新的时间戳。\n\n本章首先介绍如何使用和配置二级缓存，然后介绍\
  \ Hibernate 中的查询级缓存。\n\n在 Hibernate 中使用二级缓存\n\n在二级缓存中，所有从同一个**SessionFactory**启动的持久化上下文共享相同的缓存数据。不同类型的数据需要不同的缓存策略：例如，在驱逐数据之前缓存应维持多长时间、数据应在什么范围内缓存、数据是否应缓存在内存中等等。缓存策略涉及设置以下内容：\n\
  \n• 是否启用二级缓存\n\n• Hibernate 并发策略\n\n第 12 章 ■ HIBERNATE 中的缓存\n\n• 缓存过期策略（例如超时、最近最少使用和内存敏感）\n\
  \n\n\n• 缓存的物理格式（内存、索引文件或集群复制）需要重申的是，当经常更新的数据较少时，二级缓存更为有用。换句话说，当只读数据较多时，它很有用。\n\n\
  设置二级缓存需要两个步骤。首先，你必须决定并发策略；然后，使用缓存提供程序配置缓存过期时间和物理缓存属性。\n\n并发策略\n\n有四种内置的并发策略：\n\n\
  • *事务型（Transactional）：* 当需要读取较多数据时应使用此策略。它能防止并发策略中出现过期数据。它等同于隔离级别：可重复读。\n\n• *读写型（Read-write）：*\
  \ 此策略维护读已提交隔离级别。\n\n• *非严格读写型（Non-strict read-write）：* 此策略不保证你不会读到过期数据。它不保证缓存与数据库之间的一致性。\n\
  \n• *只读型（Read-only）：* 此策略适用于从不更改的数据。\n\n缓存提供程序\n\nHibernate 中提供了以下内置提供程序：\n\n• *EHCache：*\
  \ 这是一个基于标准的开源缓存，支持进程范围缓存。它可以在内存或磁盘中进行缓存，并支持查询缓存。\n\nEHCache Distributed 支持集群范围缓存。它有自己的配置文件（**ehcache.xml**），其中设置了缓存所需的所有参数。你可以查看\
  \ [**http://ehcache.org/**](http://ehcache.org) 上的教程。\n\n• *OSCache：* 这也是一个开源缓存提供程序，可写入内存和磁盘。它还支持集群缓存。文档位于\
  \ [**www.opensymphony.com/oscache/**](http://www.opensymphony.com/oscache)。\n\n\
  • *SwarmCache：* 这是一个简单但有效的分布式缓存。它使用 IP 多播与分布式系统中的任意数量的主机进行通信。文档位于 [**http://swarmcache.sourceforge.net**](http://swarmcache.sourceforge.net)。\n\
  \n• *JBoss cache：* 这是一个分布式缓存系统。它在分布式系统中的不同节点之间复制数据。状态始终与系统中的其他服务器保持同步。文档位于 [**www.jboss.org/jbosscache/**](http://www.jboss.org/jbosscache)。\n\
  \n表 12-1 总结了这些缓存提供程序。\n\n第 12 章 ■ HIBERNATE 中的缓存\n\n*表 12-1. 缓存提供程序*\n\n**缓存提供程序**\n\
