  \n**}**\n\n总结\n\n在本章中，你了解了如何使用 Hibernate 表示和处理多对一和一对一关联。对于多对一关联，你在关系中处于“多”方的类中定义\
  \ **<many-to-one>** 映射元素。当外键值可能为空时，你使用连接表来映射两个依赖对象；连接表包含两个依赖对象的 ID。\n\n你了解到可以使用延迟初始化来提高性能：依赖对象的数据仅在需要时才从数据库中检索。你还了解到，当两个表中的行通过主键关联相关联时，会使用共享主键。\n\
  \n你看到了如何使用 **<many-to-one>** 元素映射一对一关联，然后对“一”方关系设置唯一约束。一对一关联也可以使用连接表进行映射。\n\n**第\
  \ 6 章**\n\n■ ■ ■\n\n**集合映射**\n\n**值**类型的对象没有数据库标识，并且**值**类型的对象依赖于所属的实体对象。**值**类型的生命周期受所属实体生命周期的约束。拥有**值**类型集合的实体需要映射到\
  \ Java API 中适当的集合接口。为了让实体拥有**值**类型的集合，你需要一个单独的表，该表以实体的主键作为外键。\n\nHibernate 支持 Java\
  \ API 提供的大部分集合接口。建议使用集合接口来声明属性的类型，并使用匹配的实现。\n\nHibernate 建议使用接口来声明集合，因为它支持 Java\
  \ 集合、映射和数组；它有一个 **<set>** 标签来支持所有 **java.util.Set** 集合，以及 **<bag>** 或 **<idbag>**\
  \ 来支持 **java.util.Collection**。你应该在声明时初始化实现，以避免未初始化的集合。以下代码将 **chapters** 声明为 **java.util.Set**\
  \ 类型（这是一个接口），并将匹配的实现声明为 **java.util.HashSet**：\n\n**Private Set<String> chapters\
  \ = new HashSet<String>();**\n\n本章向你展示如何为**值**类型映射集合。在 Hibernate 中，集合可以被延迟初始化，这意味着集合对象的状态仅在应用程序需要时才从数据库加载。这种初始化对用户来说是透明的。本章还涉及在内存和数据库级别对集合进行排序。作为示例，你向\
  \ **Book** 类添加了一个章节集合。\n\n6.1 映射 Set\n\n问题\n\n如何将**值**类型映射为 **java.util.Set** 类型的集合？\n\
  \n解决方案\n\n**<set>** 映射是最常用的集合映射。你使用 **<set>** 元素来映射 **java.util.Set**。该属性应初始化为 **HashSet**。该实现不允许重复元素，并且不保留元素的顺序。\n\
  \n第 6 章 ■ 集合映射\n\n工作原理\n\n**Book** 类有一个名为 **chapters** 的属性，其类型为 **java.util.Set**。该属性被初始化为\
  \ **HashSet**：\n\n****public class Book6_1 implements Serializable{**\n\n****private\
  \ Long book_id;**\n\n**private String isbn;**\n\n**private String name;**\n\n**private\
  \ Date publishDate;**\n\n**private Integer price;**\n\nprivate Set chapters = new\
  \ HashSet();\n\n**// getters and setters**\n\n**}**\n\n**图 6-1 展示了本方案中 **BOOK**\
  \ 表和 **BOOK_CHAPTER** 表之间的关联。\n\n*图 6-1\\. **BOOK** 和 **BOOK_CHAPTER** 之间具有集合关联的实体关系图*\
