  \ String title;**\n\n****@Column (name=\"NUM_OF_PAGES\")**\n\n**private int numOfPages;**\n\
  \n**// getters and setters**\n\n**}**\n\n7.4 使用连接表映射多对多单向关联\n\n问题\n\n如何使用连接表通过多对多单向关联来映射对象？\n\
  \n第 7 章 ■ 多值关联\n\n解决方案\n\n本章讨论的最后一种关联类型是多对多关联。假设 **Book** 和 **Chapter** 可以存在多对多关系。这意味着一个章节可以属于多本书。这种情况并不常见，但确实是可能的。让我们看看它是如何工作的。\n\
  \n工作原理\n\n**Book** 的 XML 映射文件使用带有 many-to-many 关联的 **set** 元素 **(<set>** ) 来映射一组章节。**Chapter**\
  \ 类和 XML 文件都没有引用 **book**，因为这种关联是单向的：\n\n**<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class name=\"Book7_4\" table=\"BOOK7_4\" schema=\"BookShop7\">**\n\n**<id\
  \ name=\"book_id\" column=\"BOOK_ID\" type=\"long\">**\n\n**<generator class=\"\
  native\">**\n\n**</generator>**\n\n**</id>**\n\n**<property name=\"isbn\" type=\"\
  string\" column=\"ISBN\" />**\n\n**<property name=\"bookName\" type=\"string\" column=\"\
  BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
  \ />**\n\n**<property name=\"price\" type=\"long\" column=\"PRICE\" />**\n\n<set\
  \ name=\"chapters\" table=\"BOOK_CHAPTER\" schema=\"BookShop7\" cascade=\"save-update,delete-orphan\"\
  >\n\n<key column=\"BOOK_ID\" />\n\n<many-to-many column=\"ID\" class=\"Chapter7_4\"\
  \ unique=\"true\"/>\n\n</set>\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**Chapter**\
  \ 的 XML 文件保持不变：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class**\n\n**name=\"Chapter7_4\"**\n\n**table=\"CHAPTER7_4\"**\n\n**dynamic-insert=\"\
  true\"**\n\n**dynamic-**\n\n**update=\"true\" schema=\"BookShop7\">**\n\n**<id name=\"\
  id\" column=\"id\" type=\"long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n\n\n**<property name=\"title\" type=\"string\" column=\"title\" />**\n\
  \n**<property name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />**\n\n****</class>**\n\
  \n**</hibernate-mapping>**\n\n在 JPA 中，**Book** 类如下所示：\n\n**@Entity (name=\"bkch74\"\
  )**\n\n**@Table (name=\"BOOK7_4\", schema=\"BOOKSHOP7\")**\n\n**public class Book7_4\
  \ {**\n\n第 7 章 ■ 多值关联\n\n****@Id**\n\n**@GeneratedValue (strategy=GenerationType.\
  \ *TABLE*)**\n\n**@Column (name=\"BOOK_ID\")**\n\n**private long book_id;**\n\n\
  ****@Column (name=\"ISBN\")**\n\n**private String isbn;**\n\n****@Column (name=\"\
  book_Name\")**\n\n**private String bookName;**\n\n****/*@Column (name=\"publisher_code\"\
  )**\n\n**String publisherCode;*/**\n\n****@Column (name=\"publish_date\")**\n\n\
  **private Date publishDate;**\n\n****@Column (name=\"price\")**\n\n**private Long\
  \ price;**\n\n**@ManyToMany(targetEntity=Chapter7_4.class)\n\n@JoinTable(name =\
  \ \"Book_Chapter\",schema=\"BOOKSHOP7\",\n\njoinColumns = {@JoinColumn(name=\"book_id\"\
  )},\n\ninverseJoinColumns={@JoinColumn(name=\"chapter_id\")}\n\n)\n\n@Cascade (value={CascadeType.\
  \ *SAVE_UPDATE*,CascadeType. *DELETE_ORPHAN*}) private Set chapters;\n\n**}**\n\n\
  **连接表 **BOOK_CHAPTER** 包含两列，这两列构成了该表的复合主键。\n\n7.5 使用连接表创建多对多双向关联\n\n问题\n\n如何使用连接表通过多对多双向关联来映射对象？\n\
  \n解决方案\n\n要实现双向性，你需要更新 **Chapter** 类，使其包含一个 **book** 对象的集合。你使用 **set** 元素来映射双方。\n\
  \n第 7 章 ■ 多值关联\n\n工作原理\n\n更新 **Chapter** 类，使其包含一个集合：\n\n**public class Chapter7_41\
  \ {**\n\n****private Long id;**\n\nprivate Set book;\n\n**private String title;**\n\
  \n**private int noOfPages;**\n\n**// getters and setters**\n\n**}**\n\n**Chapter**\
  \ 类的 XML 映射如下：\n\n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
  >**\n\n**<class name=\"Chapter7_41\" table=\"CHAPTER7_41\" dynamic-insert=\"true\"\
  \ dynamic-update=\"true\" schema=\"BookShop7\">**\n\n**<id name=\"id\" column=\"\
  id\" type=\"long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\n\
  **</id>**\n\n**<property name=\"title\" type=\"string\" column=\"title\" />**\n\n\
  **<property name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />**\n\n<set\
  \ name=\"book\" table=\"BOOK_CHAPTER\" inverse=\"true\" cascade=\"save-update\"\
  >\n\n<key column=\"id\"></key>\n\n<many-to-many class=\"Book7_41\" column=\"BOOK_ID\"\
  \ />\n\n</set>\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**Book** 类的 XML 如下：\n\
  \n****<hibernate-mapping package=\"com.hibernaterecipes.chapter7\">**\n\n****<class\
  \ name=\"Book7_41\" table=\"BOOK7_41\" schema=\"BookShop7\">**\n\n******<id name=\"\
  book_id\" column=\"BOOK_ID\" type=\"long\">**\n\n**<generator**\n\n**class=\"native\"\
  >**\n\n**</generator>**\n\n**</id>**\n\n******<property name=\"isbn\" type=\"string\"\
  \ column=\"ISBN\" />**\n\n******<property name=\"bookName\" type=\"string\" column=\"\
  BOOK_NAME\" />**\n\n******<property name=\"publishDate\" type=\"date\" column=\"\
  PUBLISH_DATE\" />**\n\n******<property name=\"price\" type=\"long\" column=\"PRICE\"\
  \ />**\n\n******<set name=\"chapters\" table=\"BOOK_CHAPTER\" schema=\"BookShop7\"\
  \ cascade=\"save-update,delete-orphan\">**\n\n**<key**\n\n**column=\"BOOK_ID\"**\n\
  \n**/>**\n\n**<many-to-many**\n\n**column=\"ID\"**\n\n**class=\"Chapter7_41\"**\n\
  \n**unique=\"true\"/>**\n\n**</set>**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n第 7 章 ■ 多值关联\n\n**在 JPA 中，**Book** 和 **Chapter** 类如下所示：\n\n****@Entity (name=\"\
  bkch741\")**\n\n**@Table (name=\"BOOK7_41\", schema=\"BOOKSHOP7\")**\n\n**public\
  \ class Book7_41 {**\n\n****@Id**\n\n**@GeneratedValue (strategy=GenerationType.\
  \ *TABLE*)**\n\n**@Column (name=\"BOOK_ID\")**\n\n**private long book_id;**\n\n\
  ****@Column (name=\"ISBN\")**\n\n**private String isbn;**\n\n****@Column (name=\"\
  book_Name\")**\n\n**private String bookName;**\n\n****/*@Column (name=\"publisher_code\"\
  )**\n\n**String publisherCode;*/**\n\n****@Column (name=\"publish_date\")**\n\n\
  **private Date publishDate;**\n\n****@Column (name=\"price\")**\n\n**private Long\
  \ price;**\n\n**@ManyToMany\n\n@JoinTable(name = \"Book_Chapter\",schema=\"BOOKSHOP7\"\
  ,\n\njoinColumns = {@JoinColumn(name=\"book_id\")},\n\ninverseJoinColumns={@JoinColumn(name=\"\
  id\")}\n\n)\n\n@Cascade (value={CascadeType. *SAVE_UPDATE*})\n\n\n\nprivate Set<Chapter7_41>\
  \ chapters = new HashSet<Chapter7_41>();\n\n**// getters and setters（获取器和设置器）**\n\
  \n**}**\n\n******@Entity (name=\"chapter741\")**\n\n**@Table (name=\"Chapter7_41\"\
  , schema=\"BOOKSHOP7\")**\n\n**public class Chapter7_41 {**\n\n****@Id**\n\n**@GeneratedValue\
  \ (strategy=GenerationType. *TABLE*)**\n\n**@Column (name=\"id\")**\n\n**private\
  \ long id;**\n\n**@ManyToMany (mappedBy=\"chapters\")\n\nprivate Set<Book7_41> book\
  \ = new HashSet<Book7_41>();\n\n****@Column (name=\"title\")**\n\n第 7 章 ■ 多值关联\n\
  \n**private String title;**\n\n****@Column (name=\"NUM_OF_PAGES\")**\n\n**private\
  \ int numOfPages;**\n\n**// getters and setters（获取器和设置器）**\n\n**}**\n\n总结\n\n在本章中，您学习了如何创建和使用多值关联。多值关联包括一对多关联和多对多关联。其中使用更广泛的是**一对多关联**。一对多和多对多关联都可以通过两种方式进行映射：使用外键或使用连接表。\n\
  \n当使用外键时，您需要在父表中使用 **<set>** 映射元素来映射该键，并将 key 属性作为外键列。与之关联的类通过 **<one-to-many>**\
  \ 映射元素指定。使用 **cascade** 选项时，操作会从父实体级联到关联实体。\n\n多对多关联使用连接表进行映射。您需要创建一个连接表来保存父实体和关联实体的\
  \ ID。\n\n在一对多和多对多映射中，双向关联使用 **inverse=\"true\"** 表示，这指定了从关联实体到父实体的反向方向映射可以被遍历。\n\
  \n**第 8 章**\n\n■ ■ ■\n\n**HQL 与 JPA 查询语言**\n\n当您使用 JDBC 访问数据库时，需要编写 SQL 语句来执行查询和更新任务。在这种情况下，您处理的是表、列和连接。当您使用\
  \ Hibernate 时，大多数更新任务可以通过 Hibernate 提供的 API 完成。然而，您仍然需要使用查询语言来执行查询任务。Hibernate 提供了一种强大的查询语言，称为\
  \ Hibernate 查询语言（HQL）。\n\nHQL 与数据库无关，并在运行时由 Hibernate 转换为 SQL。当您编写 HQL 时，可以专注于对象和属性，而无需了解底层数据库的太多细节。您可以将\
  \ HQL 视为 SQL 的面向对象变体。\n\n在本章中，您将了解如何使用 HQL 和 JPA 查询语言（JPA QL）查询数据库。\n\nHibernate\
  \ 基本上提供了三种查询数据库的方式：\n\n• HQL 和 JPA QL（后者是 HQL 的子集）\n• Criteria API（Criteria 和 Example）\n\
  • 直接 SQL\n\n本章将介绍 HQL、JPA QL 和直接 SQL。您将学习如何构建查询、绑定参数（命名参数和位置参数）以及执行查询。您还将学习如何操作结果集，这有助于处理大型结果集。此外，您还将学习如何查询关联对象。\n\
  \n8.1 使用查询对象\n\n问题\n\n如何在 Hibernate 中创建 **Query** 对象？如何启用分页？将参数绑定到查询有哪些不同方式？\n\n\
  解决方案\n\n**Query** 是实际查询的面向对象表示。Hibernate 接口 **org.hibernate.Query** 和 JPA 接口 **javax.persistence.Query**\
  \ 提供了控制查询执行以及将值绑定到查询参数的方法。在 Hibernate 中，您可以通过调用 **Session.createQuery()** 来获取 **Query**\
  \ 对象的实例。而在 JPA 中，EntityManager 通过调用 **EntityManager.createQuery()** 来提供 **Query**\
  \ 对象的实例。\n\n第 8 章 ■ HQL 与 JPA 查询语言\n\n工作原理\n\n让我们看看如何使用 **Query** 对象，首先从如何创建它开始。\n\
  \n创建查询对象\n\n在前面的章节中，您已经看到了一些用于查询对象的基本 HQL 语句。例如，回到书店示例，您可以使用以下 HQL 查询所有书籍，然后调用 **list()**\
  \ 方法来检索包含 **book** 对象的结果列表：\n\n\n\n****Query query = session.createQuery(\"from\
  \ Book\");**\n\n**List books = query.list();**\n\nfrom 子句\n\n现在，让我们来看一下 **from**\
  \ **子句**，它是 HQL 语句中唯一必需的部分。以下 HQL 语句用于查询名称为“Hibernate”的书籍。请注意，**name** 是 **Book**\
  \ 对象的一个属性：\n\n****from Book**\n\n**where name = 'Hibernate'**\n\n**或者，你可以为对象指定一个别名。当你在一个查询中查询多个对象时，这非常有用。你应该遵循\
  \ Java 中类和实例的命名约定。请注意，**as** 关键字是可选的：\n\n****from Book as book**\n\n**where book.name\
  \ = 'Hibernate'**\n\n**然后，你可以将别名与查询整合在一起：\n\n****Query query = session.createQuery(\"\
  from Book where book.name='Hibernate'\");** **List books = query.list();**\n\n**在\
  \ JPA QL 中，你需要使用 EntityManager 来创建一个 **javax.persistence.Query** 实例。在 Java 持久化中，**select**\
  \ 子句是必需的，如下所示：\n\n**public List<Book> readFromManager() {**\n\n****EntityManager\
  \ manager = SessionManager.getEntityManager();**\n\n**EntityTransaction tran = manager.getTransaction();**\n\
  \n**tran.begin();**\n\nQuery query = manager.createQuery(\"select b from Book b\"\
  );\n\n**List<Book> list = query.getResultList();**\n\n**return list;**\n\n**}**\n\
  \n**请注意，你需要将 **persistence.xml** 文件放置在 **META-INF** 文件夹中。同时，记得将所有必需的 jar 包放在类路径中。\n\
  \n第 8 章 ■ HQL 和 JPA 查询语言\n\nwhere 子句\n\n在 HQL 中，你可以像在 SQL 中一样使用 **where** 子句来过滤结果。对于多个条件，你可以使用\
  \ ***and***、***or*** 和 ***not*** 来组合它们。这被称为*应用限制条件*：\n\n****from Book book**\n\n\
  **where book.name like '%Hibernate%' and book.price between 100 and 200**\n\n**你可以通过使用\
  \ **is null** 或 **is not null** 来检查关联对象是否为空：\n\n****from Book book**\n\n**where\
  \ book.publisher is not null**\n\n**请注意，不能对集合执行空值检查。因此，如果你执行如下查询，Hibernate 会抛出异常：\n\
  \n****from Book8_1 book**\n\n**where book.chapters is not null**\n\n**Hibernate\
  \ 提供了 **empty** 关键字，你可以用它来检查集合是否为空：\n\n****from Book8_1 book**\n\n**where book.chapters\
  \ is not empty**\n\n**假设你想检索所有由出版社“Apress”和“friendsOfED”出版的书籍。用技术术语来说，你想基于关联（publisher）的属性（出版社名称）进行检索。对于这种需求，你可以在\
  \ **where** 子句中使用*隐式连接*。你可以通过使用 **.** *点*运算符来创建隐式连接：\n\n****from Book book**\n\n\
  **where book.publisher.name in ('Apress', 'friendsOfED')**\n\n**请记住，对于集合关联，如果你多次引用它，应该使用*显式连接*来避免重复连接。显式连接需要使用\
  \ **join** 关键字。本章后面会详细描述使用连接进行查询。\n\nHibernate 提供了一个函数，让你可以检查集合的大小。你可以使用特殊属性 **size**\
  \ 或特殊的 **size()** 函数。Hibernate 使用 **select count(...)** 子查询来获取集合的大小：\n\n****from\
  \ Book book**\n\n**where book.chapters.size > 10**\n\n**from Book book**\n\n**where\
  \ size(book.chapters) > 10**\n\n分页\n\n当查询返回的记录数很大时，只检索实际记录数的一个子集是可取的。这个子集通常等于页面大小（记录数）；这个特性被称为*分页*。Hibernate\
  \ 和 JPA 的 **Query** 接口提供了两个方法来实现分页：157\n\n第 8 章 ■ HQL 和 JPA 查询语言\n\n• **setFirstResult(int\
  \ beginPoint)**：设置起始行为给定的 **beginPoint**\n\n• **setMaxResult(int size)**：设置返回的结果集大小\n\
  \n实现如下所示：\n\n****public List<Book> readFromManager() {**\n\n****EntityManager manager\
  \ = SessionManager.getEntityManager();**\n\n**EntityTransaction tran = manager.getTransaction();**\n\
  \n**tran.begin();**\n\n**Query query = manager.createQuery(\"select b from Book\
  \ b\");**\n\nquery.setFirstResult(5);\n\nquery.setMaxResults(15);\n\n**List<Book>\
  \ list = query.getResultList();**\n\n**return list;**\n\n**}**\n\n**在这个例子中，检索的是从第五行开始及其后的\
  \ 15 条记录。\n\n参数绑定\n\n你使用*参数绑定*来将值绑定到查询参数。参数绑定使代码看起来更整洁；代码也更安全。不建议使用字符串拼接将用户输入注入到查询中；这可能导致一个称为\
  \ *SQL 注入*的安全问题。\n\n**SQL 注入**\n\nSQL 注入攻击是通过用户输入将 SQL 查询“注入”到应用程序中。成功的 SQL 注入攻击可以（除其他外）从数据库读取敏感数据、修改数据库数据（插入/更新/删除）以及在数据库上执行管理操作。\n\
  \n让我们看一个简单的例子。下面的 **main()** 方法调用了一个名为 **exampleSQLInjection()** 的方法，该方法接收一个用户输入的字符串：\n\
  \n****public static void main(String[] args) {**\n\n****List books = exampleSQLInjection(\"\
  Hibernate\");**\n\n**if(books!=null)**\n\n**{**\n\n**System.out.println(\"Size-\
  \ \"+books.size());**\n\n**Iterator it = books.iterator();**\n\n**while(it.hasNext())**\n\
  \n**{**\n\n**System.out.println(\"book- \"+it.next());**\n\n**}**\n\n**}**\n\n第\
  \ 8 章 ■ HQL 和 JPA 查询语言\n\n**}**\n\n**exampleSQLInjection()** 方法的实现如下：\n\n****public\
  \ static List exampleSQLInjection(String userInput)**\n\n**{**\n\n**Session session\
  \ = getSession();**\n\n**String q=\"from Book8_1 book where book.bookName='\"+userInput+\"\
  '\";** **Query query = session.createQuery(q);**\n\n**List books = query.list();**\n\
  \n**return books;**\n\n**}**\n\n****exampleSQLInjection()** 本应只返回名称为“Hibernate”的书籍列表。如果用户输入从“Hibernate”变为类似\n\
  \n****Hibernate' or 'x'='x**\n\n**并且方法像这样被调用\n\n****List books = exampleSQLInjection(\"\
  Hibernate' or 'x'='x\");**\n\n**那么它将返回表中的所有书籍，这违反了查询的初衷。想象一下对包含密码或其他安全信息的用户表进行类似的攻击。\n\
  \n这是一个非常基础的 SQL 注入示例。当然，用户输入在到达这一点之前应该被验证，但你绝不应该完全依赖它被正确验证。因此，使用参数绑定是一个非常好的习惯。\n\
  \nHibernate 和 JPA 支持两种类型的参数绑定：\n\n• 命名参数绑定\n\n• 位置参数绑定\n\n你可以像为 SQL 查询指定参数一样指定查询参数。如果你确定只有一个唯一对象会作为结果返回，你可以调用\
  \ **uniqueResult()** 方法来检索它。如果没有匹配项，则返回 null：\n\n**159\n\n第 8 章 ■ HQL 和 JPA 查询语言\n\
  \n**query = session.createQuery(\"from Book where isbn = ?\");**\n\n**query.setLong(0,\
  \ 520);**\n\n**Book bookCh8 = (Book) query.uniqueResult();**\n\n这个例子使用 **?** 来表示一个查询参数，并通过索引（从零开始，而不是像\
  \ JDBC 那样从一开始）来设置它。这种参数绑定被称为*位置*参数绑定。你也可以对查询使用*命名*参数绑定。使用命名参数的优点是它们易于理解，并且可以多次出现：\n\
  \n**Query query = session.createQuery(\"from Book where isbn =:isbn\");**\n\n**query.setLong(\"\
  isbn\", 520);**\n\n**Book bookCh8 = (Book) query.uniqueResult();**\n\n**System.out.println(bookCh8);**\n\
  \n命名查询\n\n\n\n你可以在任何映射定义中放置查询语句，并在代码中通过名称引用它们。这些被称为*命名查询*。但为了便于维护，你应该将所有命名查询集中在一个映射定义中，例如\
  \ **NamedQuery.hbm.xml**。此外，建立命名查询的机制也很有益——你需要为每个查询分配一个唯一的名称。你还应将查询字符串放在\n\n**<![CDATA[...]]>**\
  \ 块中，以避免与特殊的 XML 字符冲突。命名查询不一定是 HQL 或 JPA QL 字符串——它们可以是原生 SQL 查询：\n\n****<hibernate-mapping>**\n\
  \n**<query name=\"Book.by.isbn\">**\n\n**<![CDATA[from Book where isbn = ?]]>**\n\
  \n**</query>**\n\n**</hibernate-mapping>**\n\n**要引用命名查询，你可以使用 **session.getNamedQuery()**\
  \ 方法：\n\n****Query query = session.getNamedQuery(\"Book.by.isbn\");**\n\n**query.setString(0,\
  \ \"1932394419\");**\n\n**Book book = (Book) query.uniqueResult();**\n\nJPA 规定了\
  \ **@NamedQuery** 和 **@NamedNativeQuery** 注解。**name** 和 **query** 属性是必需的。你可以将这些注解放在特定实体的元数据中，或放入\
  \ JPA XML 文件中：\n\n**@NamedQueries({**\n\n**@NamedQuery(**\n\nname=\"Book.by.isbn\"\
  ,\n\nquery=\"from Book where isbn = ?\"\n\n)\n\n})\n\n**@Entity (name=\"book\")**\n\
  \n**@Table (name=\"BOOK\", schema=\"BOOKSHOP\")**\n\n**public class Book{…}**\n\n\
