  \ : \" + count);**\n\n**stmt.close();**\n\n创建领域模型\n\n你可以使用普通的 JavaBean 来构建对象/领域模型。这些\
  \ JavaBean 被称为 Plain Old Java Objects (POJOs)。这个术语用于将它们与 Enterprise JavaBeans (EJBs)\
  \ 区分开来。EJB 是实现 **javax.ejb** 接口之一并需要部署在 EJB 容器中的 Java 对象。请注意，每个 POJO 都必须有一个无参构造函数：\n\
  \n**public class Publisher {**\n\n**private String code;**\n\n**private String name;**\n\
  \n**private String address;**\n\n**// Getters and Setters**\n\n**}**\n\n**public\
  \ class Book {**\n\n**private String isbn;**\n\n**private String name;**\n\n**private\
  \ Publisher publisher;**\n\n**private Date publishDate;**\n\n**private int price;**\n\
  \n**private List chapters;**\n\n**// Getters and Setters**\n\n**}**\n\n**public\
  \ class Chapter {**\n\n\n\n**private int index;**\n\n**private String title;**\n\
  \n**private int numOfPages;**\n\n**// Getters 和 Setters**\n\n**}**\n\n你使用外键从 BOOK\
  \ 表引用 PUBLISHER，但在 **Book** 类中，这是通过章节列表表示的多对一关联。你使用外键从 CHAPTER 表引用 BOOK，但 **Chapter**\
  \ 类中没有任何内容引用 **Book** 类。相反，**Book** 对象包含一个 **Chapter** 对象列表（一对多关联）。这是一个*对象-关系不匹配*的案例，其核心在于两个类或表在其对应模型中的关联方式。为了处理这些模型的不兼容性，在检索和保存对象模型时，你需要进行一些转换/翻译工作。这被称为对象/关系映射（O/R\
  \ Mapping 或 ORM）。\n\n假设你的书店销售音频和视频光盘。在面向对象模型中，这可以通过使用一个 **Disc** 超类和两个名为 **AudioDisc**\
  \ 和 **VideoDisc** 的子类来表示（见图 1-4）。在关系数据库方面，你无法映射这种继承关系。\n\n这是一个主要的对象-关系系统不匹配问题。\n\
  \n第 1 章 ■ 从 Hibernate 开始\n\n你可能还想使用一个*多态查询*来引用 **Disc** 类，并让查询返回其子类。SQL 不支持这种需求——这是另一个对象-关系系统不匹配问题。\n\
  \n*图 1-4\\. 对象模型中的继承*\n\n你可以看到对象模型和关系模型之间存在差异。对象模型基于对业务领域的分析，因此构成了领域模型。关系模型或表则是根据数据在行和列中的组织方式来定义的。像\
  \ Hibernate 这样的 ORM 框架提供了策略来克服关联不匹配、继承不匹配和多态不匹配问题。\n\n检索对象图\n\n假设你的应用程序中有一个网页，用于显示一本书的详细信息（包括\
