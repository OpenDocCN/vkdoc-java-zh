  \n**这不是一个流行的选项，因为它速度较慢且实现复杂。此外，JPA 并未标准化此技术。因此，如果你需要在 JPA 中使用乐观锁定，则必须使用 Hibernate\
  \ 的注解，如下所示：\n\n**@Entity (name=\"bkch2\")**\n\n@org.hibernate.annotations.Entity\n\
