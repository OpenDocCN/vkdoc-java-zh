  \ />\n\n**</component>**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n3.4 映射组件集合\n\
  \n问题\n\nHibernate 是否支持映射依赖对象的集合？如何映射组件集合？\n\n解决方案\n\nHibernate 提供了 **<composite-element>**\
  \ 来映射组件集合。集合元素/标签 **<set>** 、 **<list>** 、 **<map>** 、 **<bag>** 和 **<idbag>** 可以容纳\
  \ **<composite-element>** 来映射依赖对象的集合。\n\n工作原理\n\n\n\n假设你需要为图书订单支持一种更灵活的联系机制。客户可以为一次图书配送指定多个联系点，因为他们可能不确定在特定时间段内哪个联系点最合适。你的员工在配送图书时会逐一尝试这些联系点。你可以使用\
  \ **java.util.Set** 来保存一个订单的所有联系点：\n\n**public class Orders {**\n\n**private Contact\
  \ weekdayContact;**\n\n**private Contact holidayContact;**\n\nprivate Set contacts;\n\
  \n**// Getters 和 Setters**\n\n**}**\n\n**你需要创建一个单独的表，如下所示：\n\n**CREATE TABLE ORDERS_CONTACT\
  \ (ORDER_ID bigint NOT NULL, RECIPIENT varchar(100),AREACODE**\n\n**varchar(100),TELEPHONE\
  \ varchar(100),ADDRESS varchar(100))**\n\n第 3 章 ■ 组件映射\n\n**要在 Hibernate 中映射一个订单的多个联系点，你可以使用组件集合。你使用\
  \ **<composite-element>** 来定义集合中的组件。为简单起见，首先将你的 Contact 类恢复为其原始形式：\n\n**public class\
  \ Contact {**\n\n**private String recipient;**\n\n**private String phone;**\n\n\
  **private String address;**\n\n**// Getters 和 Setters**\n\n**// equals 和 hashCode\
  \ 实现**\n\n**}**\n\n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE\
  \ hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\
  **\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\">**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">**\n\n**<class\
  \ name=\"Orders\" table=\"ORDERS\">**\n\n**<id name=\"id\" type=\"long\" column=\"\
  ID\">**\n\n**<generator class=\"native\" />**\n\n**</id>**\n\n<set name=\"contacts\"\
  \ table=\"ORDERS_CONTACT\">\n\n**<key column=\"ORDER_ID\" />**\n\n**<composite-element\
  \ class=\"Contact\">**\n\n**<property name=\"recipient\" type=\"string\" column=\"\
  RECIPIENT\" />**\n\n**<property name=\"phone\" type=\"string\" column=\"TELEPHONE\"\
  \ />**\n\n**<property name=\"address\" type=\"string\" column=\"ADDRESS\" />**\n\
  \n**</composite-element>**\n\n</set>\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**在这个实现中，你使用了 **<set>** 标签。因为 **java.util.Set** 不允许重复元素，所以你需要实现 **equals()** 和\
  \ **hashCode()** 方法。在 **equals()** 和 **hashCode()** 的实现中，不应仅使用数据库主键作为比较属性。\n\n如果在\
  \ **equals()** 和 **hashCode()** 的实现中仅使用数据库主键，那么用户将无法向 **set** 中添加多个 **contacts**，因为在持久化之前主键将为\
  \ **null**。建议你同时使用其他属性来确保对象间的唯一性。\n\n因此，需要正确实现 **equals()** 和 **hashCode()** 以确保不会添加重复元素。请注意，当外层集合标签是\
  \ **<set>** 时，**<composite-element>** 不允许空值，因为对于删除操作，Hibernate 需要识别每个复合元素才能删除该特定元素。\n\
  \n除了普通属性之外，你还可以在集合中定义嵌套组件和关联。你使用 **<nested-composite-element>** 来定义集合中的嵌套组件。首先对\
  \ **Contact** 类进行必要的修改：\n\n**public class Contact {**\n\n**private String recipient;**\n\
  \n**private Phone phone;**\n\n**private Address address;**\n\n第 3 章 ■ 组件映射\n\n**//\
  \ Getters 和 Setters**\n\n**}**\n\n**<hibernate-mapping package=\" com.hibernaterecipes.chapter3\"\
  >**\n\n**<class name=\"Orders\" table=\"ORDERS\">**\n\n<set name=\"contacts\" table=\"\
  ORDERS_CONTACT\">\n\n**<key column=\"ORDER_ID\" />**\n\n**<composite-element class=\"\
  Contact\">**\n\n**<property name=\"recipient\" type=\"string\" column=\"RECIPIENT\"\
  \ />**\n\n**<property name=\"phone\" type=\"string\" column=\"PHONE\" />**\n\n<nested-composite-element\
  \ name=\"phone\" class=\"Phone\">\n\n**<property name=\"areaCode\" type=\"string\"\
  \ column=\"PHONE_AREA_CODE\" />**\n\n**<property name=\"telNo\" type=\"string\"\
  \ column=\"PHONE_TEL_NO\" />**\n\n</nested-composite-element>\n\n\n\n**<property\
  \ name=\"address\" type=\"string\" column=\"ADDRESS\" />**\n\n**<many-to-one name=\"\
  address\" class=\"Address\" column=\"ADDRESS_ID\" />**\n\n**</composite-element>**\n\
  \n</set>\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**在 JPA 中，按如下所示修改 **Orders**\
  \ 类：\n\n****package com.hibernaterecipes.annotations.domain;**\n\n****import java.io.Serializable;**\n\
  \n**import java.util.Set;**\n\n**import javax.persistence.CascadeType;**\n\n**import\
  \ javax.persistence.Column;**\n\n**import javax.persistence.Entity;**\n\n**import\
  \ javax.persistence.FetchType;**\n\n**import javax.persistence.GeneratedValue;**\n\
  \n**import javax.persistence.GenerationType;**\n\n**import javax.persistence.Id;**\n\
  \n**import javax.persistence.JoinColumn;**\n\n**import javax.persistence.JoinTable;**\n\
  \n**import javax.persistence.OneToMany;**\n\n**import javax.persistence.Table;**\n\
  \n**import org.hibernate.annotations.CollectionOfElements;**\n\n**import org.hibernate.annotations.Target;**\n\
  \n****@Entity**\n\n**@org.hibernate.annotations.Entity(dynamicInsert = true, dynamicUpdate\
  \ = true)**\n\n**@Table (name=\"ORDERS\")**\n\n**public class Orders implements\
  \ Serializable{**\n\n****private Long id;**\n\n**private Set<Contact> contacts;**\n\
  \n****/****\n\n*** @return the id**\n\n***/**\n\n第 3 章 ■ 组件映射\n\n**@Id**\n\n**@GeneratedValue\
  \ (strategy=GenerationType.AUTO)**\n\n**@Column (name=\"ID\")**\n\n**public Long\
  \ getId() {**\n\n**return id;**\n\n**}**\n\n****public void setId(Long id) {**\n\
  \n**this.id = id;**\n\n**}**\n\n**/****\n\n*** @return the contacts**\n\n***/**\n\
  \n@CollectionOfElements (targetElement=Contact.class,fetch=FetchType.EAGER)\n\n\
  @JoinTable (name = \"ORDERS_CONTACT\" ,\n\njoinColumns = @JoinColumn(name=\"ORDER_ID\"\
  ))\n\n**public Set<Contact> getContacts() {**\n\n**return contacts;**\n\n**}**\n\
  \n****public void setContacts(Set<Contact> contacts) {**\n\n**this.contacts = contacts;**\n\
  \n**}**\n\n**/* (non-Javadoc)**\n\n*** @see java.lang.Object#toString()**\n\n***/**\n\
  \n**@Override**\n\n**public String toString() {**\n\n**return \"Orders [contacts=\"\
  \ + contacts + \", id=\" + id + \"]\";**\n\n**}**\n\n**}**\n\n**必须为 **Contact**\
  \ 表提供新的表名。另请注意，新表 **ORDERS_CONTACT** 仍然没有主键：\n\n****package com.hibernaterecipes.annotations.domain;**\n\
  \n****import java.io.Serializable;**\n\n**import javax.persistence.Column;**\n\n\
  **import javax.persistence.Embeddable;**\n\n**import javax.persistence.Table;**\n\
  \n**import org.hibernate.annotations.Parent;**\n\n****@Embeddable**\n\n@Table (name=\"\
  ORDERS_CONTACT\")\n\n**public class Contact implements Serializable{**\n\n****private\
  \ String recipient;**\n\n**private String phone;**\n\n**private String address;**\n\
  \n**private Orders order;**\n\n第 3 章 ■ 组件映射\n\n**/****\n\n*** @return the recipient**\n\
  \n***/**\n\n**@Column (name = \"RECIPIENT\")**\n\n**public String getRecipient()\
  \ {**\n\n**return recipient;**\n\n**}**\n\n**/****\n\n*** @param recipient the recipient\
  \ to set**\n\n***/**\n\n**public void setRecipient(String recipient) {**\n\n**this.recipient\
  \ = recipient;**\n\n**}**\n\n**/****\n\n*** @return the phone**\n\n***/**\n\n**@Column\
  \ (name = \"TELEPHONE\")**\n\n**public String getPhone() {**\n\n**return phone;**\n\
  \n**}**\n\n**/****\n\n*** @param phone the phone to set**\n\n***/**\n\n**public\
  \ void setPhone(String phone) {**\n\n**this.phone = phone;**\n\n**}**\n\n**/****\n\
  \n*** @return the address**\n\n***/**\n\n**@Column (name = \"ADDRESS\")**\n\n**public\
  \ String getAddress() {**\n\n**return address;**\n\n**}**\n\n**/****\n\n*** @param\
  \ address the address to set**\n\n***/**\n\n**public void setAddress(String address)\
  \ {**\n\n**this.address = address;**\n\n**}**\n\n****/****\n\n*** @return the order**\n\
  \n***/**\n\n**@Parent**\n\npublic Orders getOrder() {\n\n**return order;**\n\n**}**\n\
  \n**/****\n\n*** @param order the order to set**\n\n***/**\n\npublic void setOrder(Orders\
  \ order) {\n\n**this.order = order;**\n\n第 3 章 ■ 组件映射\n\n**}**\n\n**/* (non-Javadoc)**\n\
  \n*** @see java.lang.Object#toString()**\n\n***/**\n\n**@Override**\n\n**public\
  \ String toString() {**\n\n**return \"Contact [address=\" + address + \", phone=\"\
  \ + phone**\n\n**+ \", recipient=\" + recipient + \"]\";**\n\n**}**\n\n**}**\n\n\
  3.5 将组件用作 Map 的键\n\n问题\n\n\n\n通常情况下，Map 的键可以是 **String**、**Long**、**Integer** 等类型。但如果你需要实现自定义的\
  \ Map 键呢？Hibernate 是否允许将组件类映射为 Map 的键？如果允许，又该如何将组件映射为 Map 的键？\n\n解决方案\n\nHibernate\
  \ 提供了 **<composite-map-key>** 元素，允许你将组件用作 Map 的键。\n\n工作原理\n\n假设你想将联系人集合扩展为 **java.util.Map**\
  \ 类型。你可以使用日期区间作为 Map 的键。创建一个 **Period** 类来封装区间的开始日期和结束日期，并将其用作 Map 的键类型。然后在 **Orders**\
  \ 类中将该周期定义为一个组件。这样，客户就可以为特定的日期区间指定最合适的联系人：\n\n**public class Period {**\n\n**private\
  \ Date startDate;**\n\n**private Date endDate;**\n\n**// Getter 和 Setter 方法**\n\n\
  **}**\n\n**<hibernate-mapping package=\"com.metaarchit.bookshop\">**\n\n**<class\
  \ name=\"Orders\" table=\"ORDERS\">**\n\n**...**\n\n**<map name=\"contacts\" table=\"\
  ORDERS_CONTACT\">**\n\n**<key column=\"ORDER_ID\" />**\n\n<composite-map-key class=\"\
  Period\">\n\n<key-property name=\"startDate\" type=\"date\" column=\"START_DATE\"\
  \ />\n\n<key-property name=\"endDate\" type=\"date\" column=\"END_DATE\" />\n\n\
  </composite-map-key>\n\n**<composite-element class=\"Contact\">**\n\n**<property\
  \ name=\"recipient\" type=\"string\" column=\"RECIPIENT\" />** 66\n\n第 3 章 ■ 组件映射\n\
  \n**<nested-composite-element name=\"phone\" class=\"Phone\">**\n\n**<property name=\"\
  areaCode\" type=\"string\" column=\"PHONE_AREA_CODE\" />**\n\n**<property name=\"\
  telNo\" type=\"string\" column=\"PHONE_TEL_NO\" />**\n\n**</nested-composite-element>**\n\
  \n**<many-to-one name=\"address\" class=\"Address\" column=\"ADDRESS_ID\" />**\n\
  \n**</composite-element>**\n\n**</map>**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**为了使 map-key 组件正常工作，你需要重写组件类的 **equals()** 和 **hashCode()** 方法：\n\n**public class\
  \ Period {**\n\n**...**\n\n**public boolean equals(Object obj) {**\n\n**if (!(obj\
  \ instanceof Period)) return false;**\n\n**Period other = (Period) obj;**\n\n**return\
  \ new EqualsBuilder().append(startDate, other.startDate)**\n\n**.append(endDate,\
  \ other.endDate)**\n\n**.isEquals();**\n\n**}**\n\n**public int hashCode() {**\n\
  \n**return new HashCodeBuilder().append(startDate)**\n\n**.append(endDate)**\n\n\
  **.toHashCode();**\n\n**}**\n\n**}**\n\n总结\n\n在本章中，你学习了通过将值类型用作组件来实现更细粒度对象模型的方法。你实际上创建了一个用于应用程序的对象图，但在数据库中它仅表示为表中的一条记录。你还了解了通过使用简单的\
  \ **value** 类型来弥合关系模型与对象模型之间差距的方法。你学习了如何在其他组件中嵌套组件，以及如何在组件中添加父引用。此外，你还看到了如何在实体中映射组件集合，以及如何将组件用作\
  \ **java.util.Map** 的键。\n\n**第 4 章**\n\n■ ■ ■\n\n**继承与自定义映射**\n\n实体支持继承、多态关联和多态查询。JPA\
  \ 规范指出，具体类和抽象类都可以作为实体，并可以使用 Entity 注解进行映射。非实体类和实体类可以相互继承。Hibernate 提供了 MappedSuperClass\
  \ 注解（@MappedSuperclass）来实现继承映射，并允许你映射抽象或具体的实体子类。映射的超类没有自己独立的表。\n\nHibernate 提供了四种映射继承层次结构的策略：\n\
  \n• *每个类层次结构一张表：* 整个类层次结构表示在一张表中。使用一个鉴别器列来标识类型和子类。\n\n• *每个子类一张表：* 超类有一张表，每个子类也有一张表，该表仅包含未继承的属性：子类表的主键是超类表的外键。\n\
  \n\n\n*   **按具体类联合（Table per concrete class with unions）：** 超类可以是抽象类，甚至可以是接口。如果超类是具体类，则需要一个额外的表来映射该类的属性。\n\
  \n*   **按具体类隐式多态（Table per concrete class with implicit polymorphism）：** 每个表都包含具体类的所有属性以及从其超类继承的属性。在这里，所有子类都被映射为独立的实体。\n\
  \n*本章将详细讨论这些策略，并展示如何实现它们。\n\n所有持久化实体的属性都属于特定类型，例如 `String`。Hibernate 支持的一些重要基本类型如下：\n\
  \n*   `integer`、`long`、`short`、`float`、`double`、`character`、`byte`、`boolean`、`yes_no`\
  \ 和 `true_false`。用于 Java 基本类型和包装类的类型映射。\n*   `string`。从 `java.lang.String` 到类似 `VARCHAR`\
  \ 的类型映射。\n*   `date`、`time` 和 `timestamp`。从 `java.util.Date` 及其子类到相应 SQL 类型的类型映射。\n\
  \nHibernate 支持的其他基本映射包括 `calendar`、`calendar_date`、`big_decimal`、`big_integer`、`locale`、`timezone`、`currency`、`class`、`binary`、`text`\
  \ 和 `serializable`。Hibernate 还提供了一个 API 来实现你自己的自定义类型。你可以使用 `org.hibernate.type`\
  \ 和 `org.hibernate.userType` 这两个包来定义对象类型。你可以通过直接实现 `org.hibernate.type.Type`，或扩展\
  \ `org.hibernate.type` 包中提供的某个抽象类，或实现 `org.hibernate.userType` 包中的某个接口来定义自己的自定义类型。本章将讨论\
  \ Hibernate 的 `org.hibernate.userType` 包中可用的自定义映射类型。你将了解 `userType` 和 `CompositeUserType`\
  \ 扩展的实现细节。\n\n### 4.1 使用每个类层次结构一张表映射实体\n\n#### 问题\n\n如何使用每个类层次结构一张表的策略来映射实体？以及何时应该使用它？\n\
  \n#### 解决方案\n\n要使用每个类层次结构一张表的策略，你需要创建一个包含完整类层次结构状态的单一表。关键在于，子类的状态不能有非空约束。这是一个缺点，因为数据完整性会受到影响。由于所有状态都在同一个表中，因此这是一个非规范化的模型。\n\
  \n使用此策略，你可以获得在多态和非多态查询中都具有良好性能的优势。在关系模型中对类层次结构进行非规范化可能会导致数据稳定性和可维护性问题，因此最好与你的 DBA\
  \ 沟通一下。\n\n你将使用书店中的音频和视频部分来了解继承映射。假设你的书店也销售 CD 和 DVD。图 4-1 显示了你要映射为每个类层次结构一张表的对象模型的类图。\n\
  \n*图 4-1. 对象模型的类图*\n\n首先，创建一个 `Disc` 类并为其提供映射定义：\n\n```java\npublic class Disc {\n\
  \n    private Long id;\n\n    private String name;\n\n    private Integer price;\n\
  \n    // Getters and Setters\n\n}\n```\n\n```xml\n<hibernate-mapping package=\"\
  com.hibernaterecipes.chapter4.tablePerClassHierarchy\">\n\n    <class name=\"Disc\"\
  \ table=\"Disc_1\">\n\n        <id name=\"discId\" type=\"long\" column=\"DISC_ID\"\
  >\n\n            <generator class=\"native\"/>\n\n        </id>\n\n        <discriminator\
  \ column=\"DISC_TYPE\" type=\"string\" />\n\n        <property name=\"name\" type=\"\
  java.lang.String\" column=\"NAME\" />\n\n        <property name=\"price\" type=\"\
  java.lang.Integer\" column=\"PRICE\" />\n\n    </class>\n\n</hibernate-mapping>\n\
  ```\n\n你主要销售两种光盘：音频光盘和视频光盘。每种光盘都有不同的属性。\n\n从面向对象的角度来看，你应该将这两种光盘 `AudioDisc` 和 `VideoDisc`\
  \ 建模为 `Disc` 的*子类*，以表示“是一个”关系。在 Java 中，你使用 `extends` 关键字来定义一个类的子类。相反，类 `Disc` 被称为\
  \ `AudioDisc` 和 `VideoDisc` 的*超类*或*父类*：\n\n```java\npublic class AudioDisc extends\
  \ Disc {\n```\n\n\nprivate String singer;\n\nprivate Integer numOfSongs;\n\n// Getters\
  \ and Setters（获取器和设置器）\n\n}\n\npublic class VideoDisc extends Disc {\n\nprivate\
  \ String director;\n\nprivate String language;\n\n// Getters and Setters（获取器和设置器）\n\
  \n}\n\n子类（如 AudioDisc 或 VideoDisc）与其父类（Disc）之间的关系称为*继承*。所有子类及其父类共同构成一个*类层次结构*。关系模型没有继承的概念——这意味着你必须定义一种映射机制来持久化对象模型中的继承关系。\n\
  \n对于光盘层次结构，你可以使用以下查询来查找系统中所有类型的光盘，包括音频和视频。这种查询称为*多态查询*：\n\nSession session = factory.openSession();\n\
  \ntry {\n\nQuery query = session.createQuery(\"from Disc\");\n\nList discs = query.list();\n\
  \nreturn discs;\n\n第 4 章 ■ 继承与自定义映射\n\n} finally {\n\nsession.close();\n\n}\n\n\
  假设你想为在线书店支持光盘预订功能。你可以创建一个 Reservation 类，并定义与 Disc 类的多对一关联。由于光盘的具体类可能是 AudioDisc\
  \ 或 VideoDisc，且这只能在运行时确定，因此这种关联称为*多态关联*：\n\npublic class Reservation {\n\nprivate\
  \ Long id;\n\nprivate Disc disc;\n\nprivate Customer customer;\n\nprivate int quantity;\n\
  \n}\n\n工作原理\n\n在 Hibernate 中，`subclass` 元素用于创建每个类层次结构一张表的映射。`discriminator` 元素用于将子类与超类关联起来。以下查询用于创建该表：\n\
  \nCREATE TABLE \"BOOK\".\"DISC_1\"\n\n( \"DISC_ID\" BIGINT NOT NULL ,\n\n\"NAME\"\
  \ VARCHAR(250 ) NOT NULL ,\n\n\"PRICE\" BIGINT,\n\n\"DISC_TYPE\" VARCHAR(50),\n\n\
  \"SINGER\" VARCHAR(50),\n\n\"NO_OF_SONGS\" BIGINT,\n\n\"DIRECTOR\" VARCHAR(50),\n\
  \n\"LANGUAGE\" VARCHAR(50),\n\nCONSTRAINT \"DISC_1_PK\" PRIMARY KEY (\"DISC_ID\"\
  ) );\n\nHibernate 映射文件如下所示：\n\n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\"\
  >\n\n<class name=\"Disc\" table=\"Disc_1\">\n\n<id name=\"discId\" type=\"long\"\
  \ column=\"DISC_ID\">\n\n<generator class=\"native\"/>\n\n</id>\n\n<discriminator\
  \ column=\"DISC_TYPE\" type=\"string\" />\n\n<property name=\"name\" type=\"java.lang.String\"\
  \ column=\"NAME\" />\n\n<property name=\"price\" type=\"java.lang.Integer\" column=\"\
  PRICE\" />\n\n<subclass name=\"AudioDisc\" discriminator-value=\"AUDIO\">\n\n<property\
  \ name=\"singer\" type=\"java.lang.String\" column=\"SINGER\" />\n\n<property name=\"\
  noOfSongs\" type=\"java.lang.Integer\" column=\"NO_OF_SONGS\" />\n\n</subclass>\n\
  \n<subclass name=\"VideoDisc\" discriminator-value=\"VIDEO\">\n\n<property name=\"\
  director\" type=\"java.lang.String\" column=\"DIRECTOR\" />\n\n<property name=\"\
  language\" type=\"java.lang.String\" column=\"LANGUAGE\" /> 72\n\n第 4 章 ■ 继承与自定义映射\n\
  \n</subclass>\n\n</class>\n\n</hibernate-mapping>\n\n该类被映射到顶层类 Disc。持久化类 AudioDisc\
  \ 和 VideoDisc 通过鉴别器（映射到 DISC_TYPE 列）相互区分。超类的其他属性使用 `property` 元素进行映射。\n\n持久化类使用\
  \ `subclass` 元素进行映射，该元素包含一个 `discriminator-value` 属性，用于将其与其他持久化类区分开来。因此，当保存一个 AudioDisc\
  \ 时，该记录的 DISC_TYPE 列的值为 AUDIO。类似地，对于 VideoDisc 记录，DISC_TYPE 列的值为 VIDEO。`subclass`\
  \ 元素包含持久化类的属性。它还可以包含嵌套的 `subclass` 元素；集合元素如 list、map 和 set；以及一对一或多对一元素。\n\n要在 JPA\
  \ 中实现这一点，你需要让 Disc 类使用 `@Inheritance` 和 `@DiscriminatorColumn` 注解，如下所示：\n\n@Entity\n\
  \n@Inheritance (strategy=InheritanceType.SINGLE_TABLE)\n\n@DiscriminatorColumn(name=\"\
  DISC_TYPE\",\n\ndiscriminatorType=DiscriminatorType.STRING)\n\npublic class Disc_1\
  \ implements Serializable {\n\n@Id\n\n@GeneratedValue (strategy=GenerationType.AUTO)\n\
  \n@Column (name=\"DISC_ID\")\n\nprivate Long discId;\n\n@Column (name=\"NAME\")\n\
  \nprivate String name;\n\n@Column (name=\"PRICE\")\n\n\n\nprivate Integer price;\n\
  \n//Getters and Setters\n\n}\n\n这种继承策略通过继承类型 `SINGLE_TABLE` 来描述；鉴别器列的名称和类型也在父类中定义。像\
  \ `AudioDisc` 这样的子类使用 `Discriminator` 注解来描述要使用的值：\n\n@Entity\n\n@DiscriminatorValue\
  \ (\"AUDIO\")\n\npublic class AudioDisc_1 extends Disc_1 implements Serializable\
  \ {\n\nprivate static final long serialVersionUID = 8510682776718466795L;\n\n@Column\
  \ (name=\"NO_OF_SONGS\")\n\nprivate Integer noOfSongs;\n\n@Column (name=\"SINGER\"\
  )\n\nprivate String singer;\n\n第 4 章 ■ 继承与自定义映射\n\n//Getters and Setters\n\n}\n\n\
  类似地，`VideoDisc` 类如下所示：\n\n@Entity\n\n@DiscriminatorValue (\"VIDEO\")\n\npublic class\
  \ VideoDisc_1 extends Disc_1 implements Serializable {\n\nprivate static final long\
  \ serialVersionUID = -3637473456207740684L;\n\n@Column (name=\"DIRECTOR\")\n\nprivate\
  \ String director;\n\n@Column (name=\"LANGUAGE\")\n\nprivate String language;\n\n\
  //Getters and Setters\n\n}\n\n为了保存一条音频光盘记录，Hibernate 会执行一条类似这样的 SQL 语句：\n\ninsert\
  \ into Disc_1 (NAME, PRICE, SINGER, NO_OF_SONGS, DISC_TYPE, DISC_ID)\n\nvalues (?,\
  \ ?, ?, ?, 'AUDIO', ?)\n\n如果你要查询音频光盘，可以使用类似 `session.createQuery(\"from AudioDisc\"\
  ).list();` 的查询语句。Hibernate 会将其转换为如下查询：`select a.DISC_ID, a.NAME , a.PRICE , a.SINGER\
  \ , a.NO_OF_SONGS from Disc_1 a where a.DISC_TYPE='AUDIO'`\n\n如果你使用 `session.createQuery(\"\
  from Disc\").list();` 查询父类 `Disc`，Hibernate 执行的查询语句是：\n\nselect a.DISC_ID , a.NAME,\
  \ a.PRICE , a.SINGER , a.NO_OF_SONGS , a.DIRECTOR, a.LANGUAGE , a.DISC_TYPE from\
  \ Disc_1 a _\n\n你可以看到，使用这种策略进行多态查询非常容易。对于所有简单问题，这应该是你的默认选择。当子类属性较少且继承了大部分属性时，也应使用此策略。其理念是尽量减少所有子类中可为空的列。\n\
  \n4.2 使用每个子类一张表的策略映射实体\n\n问题\n\n如何使用每个子类一张表的策略来映射实体？以及何时应该使用它？\n\n第 4 章 ■ 继承与自定义映射\n\
  \n解决方案\n\n要使用每个子类一张表的策略，你需要创建一个父类 `Disc`（以及对应的表），并为每个子类创建一个只包含未继承属性的表。这两个表通过外键关联：子类表的主键是父类表的外键。这种策略的优势在于模型是规范化的。\n\
  \n工作原理\n\n首先，使用以下查询语句创建表：\n\nCREATE TABLE \"BOOK\".\"DISC_2\"\n\n( \"DISC_ID\" BIGINT\
  \ NOT NULL ,\n\n\"NAME\" VARCHAR(250 ) NOT NULL ,\n\n\"PRICE\" BIGINT,\n\nCONSTRAINT\
  \ \"DISC_2_PK\" PRIMARY KEY (\"DISC_ID\") )\n\nCREATE TABLE \"BOOK\".\"AUDIO_DISC_2\"\
  \n\n( \"DISC_ID\" BIGINT NOT NULL ,\n\n\"SINGER\" VARCHAR(50),\"NO_OF_SONGS\" BIGINT,\n\
  \nCONSTRAINT \"DISC_2_FK\" FOREIGN KEY (\"DISC_ID\") REFERENCES DISC_2(DISC_ID))\
  \ CREATE TABLE \"BOOK\".\"VIDEO_DISC_2\"\n\n( \"DISC_ID\" BIGINT NOT NULL ,\n\n\"\
  DIRECTOR\" VARCHAR(50),\"LANGUAGE\" VARCHAR(50),\n\nCONSTRAINT \"DISC_2_1_FK\" FOREIGN\
  \ KEY (\"DISC_ID\") REFERENCES DISC_2(DISC_ID)) 在 Hibernate 中，父类元素如下所示：\n\npublic\
  \ class Disc_2 implements Serializable {\n\nprivate static final long *serialVersionUID*\
  \ = -5119119376751110049L;\n\nprivate Long discId;\n\nprivate String name;\n\nprivate\
  \ Integer price;\n\n// getters and setters\n\n}\n\n而音频和视频子类如下所示：\n\npublic class\
  \ AudioDisc_2 extends Disc_2 implements Serializable {\n\nprivate static final long\
  \ *serialVersionUID* = 1542177945025584005L;\n\nprivate Integer noOfSongs;\n\nprivate\
  \ String singer;\n\n// getters and setters\n\n第 4 章 ■ 继承与自定义映射\n\n}\n\npublic class\
  \ VideoDisc_2 extends Disc_2 implements Serializable {\n\nprivate static final long\
  \ *serialVersionUID* = 3052184294723526581L;\n\nprivate String director;\n\nprivate\
  \ String language;\n\n// getters and setters\n\n}\n\n映射文件如下所示：\n\n<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter4.tablePerSubClass\">\n\n<class name=\"\
  Disc_2\" table=\"Disc_2\">\n\n\n\n<id name=\"discId\" type=\"long\" column=\"DISC_ID\"\
  >\n\n<generator class=\"native\"/>\n\n</id>\n\n<property name=\"name\" type=\"java.lang.String\"\
  \ column=\"NAME\" />\n\n<property name=\"price\" type=\"java.lang.Integer\" column=\"\
  PRICE\" />\n\n<joined-subclass name=\"AudioDisc_2\" table=\"AUDIO_DISC_2\">\n\n\
  <key column=\"DISC_ID\"></key>\n\n<property name=\"singer\" type=\"java.lang.String\"\
  \ column=\"SINGER\" />\n\n<property name=\"noOfSongs\" type=\"java.lang.Integer\"\
  \ column=\"NO_OF_SONGS\" />\n\n</joined-subclass>\n\n<joined-subclass name=\"VideoDisc_2\"\
  \ table=\"VIDEO_DISC_2\">\n\n<key column=\"DISC_ID\"></key>\n\n<property name=\"\
  director\" type=\"java.lang.String\" column=\"DIRECTOR\" />\n\n<property name=\"\
  language\" type=\"java.lang.String\" column=\"LANGUAGE\" />\n\n</joined-subclass>\n\
  \n</class>\n\n</hibernate-mapping>\n\n超类 Disc 被定义为根类，并拥有一个主键 DISC_ID。子类使用 `joined-subclass`\
  \ 元素进行映射，该元素通过 `table` 属性定义了子类的表。像 AudioDisc 这样的 `joined-subclass` 类包含一个 `key` 元素，用于建立自身与父类之间的关联。\n\
  \n使用 JPA 注解时，超类（此处为 Disc）使用 `@Inheritance` 注解，并将继承策略类型指定为 `JOINED`：\n\n@Entity\n\
  \n@Inheritance (strategy=InheritanceType. *JOINED*)\n\npublic abstract class Disc_2\
  \ implements Serializable {\n\nprivate static final long *serialVersionUID* = 3087285416805917315L;\n\
  \n@Id\n\n@GeneratedValue (strategy=GenerationType. *AUTO*)\n\n@Column (name=\"DISC_ID\"\
  )\n\nprivate Long discId;\n\n@Column (name=\"NAME\")\n\n第 4 章 ■ 继承与自定义映射\n\nprivate\
  \ String name;\n\n@Column (name=\"PRICE\")\n\nprivate Integer price;\n\n// getters\
  \ and setters\n\n}\n\n音频和视频子类像普通实体类一样进行注解，并通过 `@PrimaryKeyJoinColumn` 注解与父类关联。仅当子类中列的名称与超类不同时，才需要使用\
  \ `@PrimaryKeyJoinColumn`。当两个类中主列的名称相同时，Hibernate 会从超类继承属性和列：\n\n@Entity\n\n@Table\
  \ (name=\"AUDIO_DISC_2\")\n\n@PrimaryKeyJoinColumn (name=\"DISC_ID\")\n\npublic\
  \ class AudioDisc_2 extends Disc_2 implements Serializable {\n\nprivate static final\
  \ long *serialVersionUID* = 8510682776718466795L;\n\n@Column (name=\"NO_OF_SONGS\"\
  )\n\nprivate Integer noOfSongs;\n\n@Column (name=\"SINGER\")\n\nprivate String singer;\n\
  \n// getter and setters\n\n}\n\n@Entity\n\n@Table (name=\"VIDEO_DISC_2\")\n\n@PrimaryKeyJoinColumn\
  \ (name=\"DISC_ID\")\n\npublic class VideoDisc_2 extends Disc_2 implements Serializable\
  \ {\n\nprivate static final long *serialVersionUID* = -3637473456207740684L;\n\n\
  @Column (name=\"DIRECTOR\")\n\nprivate String director;\n\n@Column (name=\"LANGUAGE\"\
  )\n\nprivate String language;\n\n// getter and setters\n\n}\n\n如果你查询一个 disc，Hibernate\
  \ 会使用外连接来确定相关的子类。所使用的查询如下所示；如你所见，它可能并不简单——至少不像你提供给 Hibernate 的映射看起来那么简单：\n\nselect\
  \ a.DISC_ID , a.NAME , a.PRICE , b.SINGER , b.NO_OF_SONGS , c.DIRECTOR , c.LANGUAGE\
  \ , case when b.DISC_ID is not null then 1\n\nwhen c.DISC_ID is not null then 2\n\
  \nwhen a.DISC_ID is not null then 0 else -1 end as clazz_\n\nfrom Disc_2 a\n\n第\
  \ 4 章 ■ 继承与自定义映射\n\nleft outer join AUDIO_DISC_2 b on a.DISC_ID=b.DISC_ID\n\nleft\
  \ outer join VIDEO_DISC_2 c on a.DISC_ID=c.DISC_ID\n\n为了查询子类，Hibernate 使用以下内连接：\n\
  \nselect b.DISC_ID , a.NAME , a.PRICE , b.SINGER b.NO_OF_SONGS\n\nfrom AUDIO_DISC_2\
  \ b inner join Disc_2 a\n\non b.DISC_ID=a.DISC_ID\n\n当需要使用多态关联和多态查询时，你应该采用这种策略。子类的状态差异很大：即一个子类所持有的属性与其他子类所持有的属性非常不同。此外，当类层次结构跨越多个类（继承深度较大）时，这种策略可能会对性能产生影响。\n\
  \n4.3 使用每个具体类一张表的方式映射实体\n\n问题\n\n\n\n如何使用每个具体类一张表的策略来映射实体？以及何时应该使用这种策略？\n\n解决方案\n\
  \n你可以通过两种方式使用每个具体类一张表的策略：\n\n• 每个具体类一张表，采用隐式多态\n\n• 每个具体类一张表，采用联合\n\n采用隐式多态的每个具体类一张表策略时，表中包含具体类的所有属性以及从其超类继承的属性。所有子类都映射为独立的实体。当对多态关联或多态查询的需求最小时，应使用此策略。该策略的另一个问题是列会被重复；这可能导致维护问题，因为对超类的更改需要你修改多个表。\n\
  \n这种映射与常规实体类似，因此这里不通过示例进行讲解。\n\n采用联合的每个具体类一张表策略时，超类可以是抽象类，甚至可以是接口。子类使用 `union-subclass`\
  \ 元素进行映射。如果超类是具体的，则需要一个额外的表来映射该类的属性。\n\n工作原理\n\n首先，使用以下数据定义语言（DDL）创建表：\n\n```sql\n\
  CREATE TABLE \"BOOK\".\"AUDIO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL ,\n\"NAME\"\
  \ VARCHAR(250 ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"SINGER\" VARCHAR(50),\"NO_OF_SONGS\"\
  \ BIGINT,\nCONSTRAINT \"DISC_3_0_PK\" PRIMARY KEY (\"DISC_ID\") )\n\nCREATE TABLE\
  \ \"BOOK\".\"VIDEO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL ,\n\"NAME\" VARCHAR(250\
  \ ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"DIRECTOR\" VARCHAR(50),\"LANGUAGE\" VARCHAR(50),\n\
  CONSTRAINT \"DISC_3_1_PK\" PRIMARY KEY (\"DISC_ID\") )\n```\n\n`Disc`、`AudioDisc`\
  \ 和 `VideoDisc` 类如下所示：\n\n```java\npublic abstract class Disc_3 implements Serializable\
  \ {\n    private static final long serialVersionUID = -5119119376751110049L;\n \
  \   private Long discId;\n    private String name;\n    private Integer price;\n\
  \    //getters and setters\n}\n\npublic class AudioDisc3 extends Disc_3 implements\
  \ Serializable {\n    private static final long serialVersionUID = -8314602929677976050L;\n\
  \    private Integer noOfSongs;\n    private String singer;\n    //getters and setters\n\
  }\n\npublic class VideoDisc_3 extends Disc_3 implements Serializable {\n    private\
  \ static final long serialVersionUID = -6857479057343664829L;\n    private String\
  \ director;\n    private String language;\n    //getters and setters\n}\n```\n\n\
  请注意，`Disc_3` 类是一个抽象类。Hibernate 映射文件如下：\n\n```xml\n<hibernate-mapping package=\"\
  com.hibernaterecipes.chapter4.tablePerClassHierarchy\">\n    <class name=\"Disc_3\"\
  \ abstract=\"true\">\n        <id name=\"discId\" type=\"long\" column=\"DISC_ID\"\
  >\n            <generator class=\"native\"/>\n        </id>\n        <property name=\"\
  name\" type=\"java.lang.String\" column=\"NAME\" />\n        <property name=\"price\"\
  \ type=\"java.lang.Integer\" column=\"PRICE\" />\n        <union-subclass name=\"\
  AudioDisc_3\" table=\"AUDIO_DISC_3\">\n            <property name=\"singer\" type=\"\
  java.lang.String\" column=\"SINGER\" />\n            <property name=\"noOfSongs\"\
  \ type=\"java.lang.Integer\" column=\"NO_OF_SONGS\" />\n        </union-subclass>\n\
  \        <union-subclass name=\"VideoDisc_3\" table=\"VIDEO_DISC_3\">\n        \
  \    <property name=\"director\" type=\"java.lang.String\" column=\"DIRECTOR\" />\n\
  \            <property name=\"language\" type=\"java.lang.String\" column=\"LANGUAGE\"\
  \ />\n        </union-subclass>\n    </class>\n</hibernate-mapping>\n```\n\n超类 `Disc_3`\
  \ 必须声明为 `abstract=\"true\"`。如果你选择不使用抽象超类，那么你需要一个单独的表来存放超类的属性。主键在层次结构中的所有具体类之间共享。主键和继承的属性使用根类元素进行映射。这样，就不需要在每个子类中重复继承的属性。\n\
  \n具体类映射到单个表，就像 `AudioDisc_3` 映射到 `AUDIO_DISC_3` 表一样；它继承了超类的属性和标识符。具体类使用 `union-subclass`\
  \ 元素进行映射。\n\n\n\nJPA 规范指出，每个具体类一张表的策略是可选的。不过，Hibernate 提供了该策略的实现。在 JPA 注解中，你需要让超类\
  \ Disc（如下例中的 Disc_4）使用`Inheritance`注解，并指定`TABLE_PER_CLASS`继承类型策略：\n\n```java\n@Entity\n\
  @Inheritance(strategy=InheritanceType.TABLE_PER_CLASS)\npublic abstract class Disc_4\
  \ implements Serializable {\n    private static final long serialVersionUID = 3087285416805917315L;\n\
  \    @Id\n    @GeneratedValue(strategy=GenerationType.AUTO)\n    @Column(name=\"\
  DISC_ID\")\n    private Long discId;\n    @Column(name=\"NAME\")\n    private String\
  \ name;\n    @Column(name=\"PRICE\")\n    private Integer price;\n    // getters\
  \ and setters\n}\n```\n\n所有具体类只需使用`@Entity`注解声明自身为实体即可：\n\n```java\n@Entity\n@Table(name=\"\
  AUDIO_DISC_4\")\npublic class AudioDisc_4 extends Disc_4 implements Serializable\
  \ {\n    private static final long serialVersionUID = 8510682776718466795L;\n  \
  \  @Column(name=\"NO_OF_SONGS\")\n    private Integer noOfSongs;\n    @Column(name=\"\
  SINGER\")\n    private String singer;\n    // getters and setters\n}\n```\n\n由于映射策略是每个具体类一张表，因此创建的查询直接针对具体类。如果你需要多态查询能力，则必须将超类设为持久化类（拥有自己的表）。\n\
  \n**第 4 章 ■ 继承与自定义映射**\n\n### 4.4 自定义映射\n\n**问题**\n\nHibernate 提供了哪些扩展来实现自定义映射类型？如何创建`UserType`自定义映射？\n\
  \n**解决方案**\n\nHibernate 提供了一个接口，你可以通过实现该接口来定义自己的自定义映射类型。这些扩展列在`org.hibernate.usertype`包中，具体如下：\n\
  \n*   **`CompositeUserType`**：此用户类型向 Hibernate 暴露值类型的内部结构，允许你查询特定的内部属性。\n*   **`EnhancedUserType`**：当需要将值类型与\
  \ XML 进行编组/解组时使用。它允许你在标识符和鉴别器映射中使用自定义类型。\n*   **`LoggableUserType`**：当你希望对相应的值类型进行自定义日志记录时使用此类型。\n\
  *   **`ParameterizedType`**：你可以通过为映射文件中的`property`元素使用嵌套的`type`元素，或通过定义`typedef`来为类型设置参数。\n\
  *   **`UserCollectionType`**：当你想要实现自定义集合映射类型，并且必须持久化非 JDK 类型的集合时，使用此类型。\n*   **`UserType`**：这是一个基本的扩展点。它提供了一个基本框架，用于实现值类型实例的自定义加载和存储。\n\
  *   **`UserVersionType`**：此类型用于版本属性。\n\n**工作原理**\n\n假设你的对象模型中有一个电话对象。该电话对象有两个属性：`areaCode`和`telNo`。数据库中针对此电话对象只有一个列，格式为`areaCode-telNo`。Hibernate\
  \ 建议将电话类设为不可变，这意味着你需要将属性设为`final`，并提供一个在初始化时设置这些属性的构造函数。使用不可变类可以使实现更简单。\n\n以下示例演示了可变类的实现：\n\
  \n```java\npublic class PhoneCh4_4 {\n    private String areaCode;\n    private\
  \ String telNo;\n    // getters and setters\n}\n```\n\n**第 4 章 ■ 继承与自定义映射**\n\n\
  你可以编写自己的、实现了`UserType`接口的电话类型。该实现（稍后展示）使用了以下方法：\n\n*   **`assemble`**：从可缓存的表示形式重建对象。如果对象是不可变的，那么你可以直接返回缓存的对象。对于可变对象，至少期望执行一次深拷贝。\n\
  *   **`disassemble`**：当 Hibernate 将对象作为序列化对象存储到二级内存或缓存中时调用。（缓存将在第 12 章进一步讨论。）对于不可变对象，你将对象类型转换为`Serializable`并返回。对于可变对象，你应该返回一个深拷贝。此外，如果可变对象有其他关联，情况可能不会这么简单。关联应作为标识符值进行缓存。\n\
  \n\n\n• deepCopy：返回对象的持久化状态。对于不可变对象，可以直接返回对象本身。\n\n• Equals：检查两个实例的持久化状态是否相等。\n\n\
  • hashCode：为实例实现哈希码。\n\n• isMutable：指定此类型的对象是否为可变对象。\n\n• nullSafeGet：从 JDBC 结果集中检索对象。\n\
  \n• nullSafeSet：将对象属性值写入 JDBC 预处理语句。\n\n• replace：在合并分离实例时使用。对于不可变对象，可以返回第一个参数（原始对象）。对于可变对象，返回第一个参数的副本。如果可变对象包含组件字段，则应执行递归复制。\n\
  \n• returnedClass：指定 `nullSafeGet` 方法返回的类。\n\n• sqlTypes：返回此类型映射的列的 SQL 类型。类型以代码标识，代码定义在\
  \ `java.sql.Types` 中。\n\n实现如下：\n\n```java\npackage com.hibernaterecipes.chapter4.custommappings;\n\
  \nimport java.io.Serializable;\n\nimport java.sql.PreparedStatement;\n\nimport java.sql.ResultSet;\n\
  \nimport java.sql.SQLException;\n\nimport java.util.StringTokenizer;\n\nimport org.hibernate.Hibernate;\n\
  \nimport org.hibernate.HibernateException;\n\nimport org.hibernate.type.SerializationException;\n\
  \nimport org.hibernate.usertype.UserType;\n\nimport com.hibernaterecipes.chapter4.custommappings.PhoneCh4_4;\n\
  \n/**\n\nCHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING\n\n* @author Guruzu\n\n*\n\n\
  */\n\npublic class PhoneUserType implements UserType {\n\n/* (non-Javadoc)\n\n*\
  \ @see org.hibernate.usertype.UserType#assemble(java.io.Serializable, java.lang.Object)\n\
  \n*/\n\n@Override\n\npublic Object assemble(Serializable cached, Object owner)\n\
  \nthrows HibernateException {\n\nreturn deepCopy(cached);\n\n}\n\n/* (non-Javadoc)\n\
  \n* @see org.hibernate.usertype.UserType#deepCopy(java.lang.Object)\n\n*/\n\n@Override\n\
  \npublic Object deepCopy(Object value) throws HibernateException {\n\nif(value==null)\n\
  \nreturn null;\n\nPhoneCh4_4 phoneValue = (PhoneCh4_4)value;\n\nPhoneCh4_4 phoneCopied\
  \ = new PhoneCh4_4();\n\nphoneCopied.setAreaCode(phoneValue.getAreaCode());\n\n\
  phoneCopied.setTelNo(phoneValue.getTelNo());\n\nreturn phoneCopied;\n\n}\n\n/* (non-Javadoc)\n\
  \n* @see org.hibernate.usertype.UserType#disassemble(java.lang.Object)\n\n*/\n\n\
  @Override\n\npublic Serializable disassemble(Object value) throws HibernateException\
  \ {\n\nObject deepCopy = deepCopy(value);\n\nif (!(deepCopy instanceof Serializable))\
  \ {\n\nthrow new SerializationException(value.getClass().getName()\n\n+ \" is not\
  \ serializable \",null);\n\n}\n\nreturn (Serializable) deepCopy;\n\n}\n\n/* (non-Javadoc)\n\
  \n* @see org.hibernate.usertype.UserType#equals(java.lang.Object, java.lang.Object)\n\
  \n*/\n\n@Override\n\npublic boolean equals(Object x, Object y) throws HibernateException\
  \ {\n\nif(x == y)\n\nreturn true;\n\nCHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING\n\
  \nif(x ==null || y == null)\n\nreturn false;\n\nreturn x.equals(y);\n\n}\n\n/* (non-Javadoc)\n\
  \n* @see org.hibernate.usertype.UserType#hashCode(java.lang.Object)\n\n*/\n\n@Override\n\
  \npublic int hashCode(Object PhoneCh4_4) throws HibernateException {\n\nassert (PhoneCh4_4\
  \ != null);\n\nreturn PhoneCh4_4.hashCode();\n\n}\n\n/* (non-Javadoc)\n\n* @see\
  \ org.hibernate.usertype.UserType#isMutable()\n\n*/\n\n@Override\n\npublic boolean\
  \ isMutable() {\n\nreturn true;\n\n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.UserType#nullSafeGet(java.sql.ResultSet,\n\
  \njava.lang.String[], java.lang.Object)\n\n*/\n\n@Override\n\npublic Object nullSafeGet(ResultSet\
  \ resultSet, String[] names, Object owner)\n\nthrows HibernateException, SQLException\
  \ {\n\nString completeTelNo = resultSet.getString(names[0]);\n\nif(resultSet.wasNull())\
  \ {\n\nreturn null;\n\n}\n\nString areaCode = null;\n\nString telNo = null;\n\n\
  StringTokenizer st = new StringTokenizer(completeTelNo,\"-\");\n\nwhile (st.hasMoreTokens())\
  \ {\n\nif(areaCode == null)\n\n{\n\nareaCode = st.nextToken();\n\n}else\n\n{\n\n\
  telNo = st.nextToken();\n\n}\n\n}\n\nPhoneCh4_4 phn = new PhoneCh4_4();\n\nphn.setAreaCode(areaCode);\n\
  \nCHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING\n\nphn.setTelNo(telNo);\n\nreturn phn;\n\
  \n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.UserType#nullSafeSet(java.sql.PreparedStatement,\n\
  \njava.lang.Object, int)\n\n*/\n\n@Override\n\n\n\npublic void nullSafeSet(PreparedStatement\
  \ statement, Object value, int index)\n\nthrows HibernateException, SQLException\
  \ {\n\nif(value == null) {\n\nstatement.setNull(index, Hibernate.STRING.sqlType());\n\
  \n} else {\n\nPhoneCh4_4 phone = (PhoneCh4_4)value;\n\nstatement.setString(index,\
  \ phone.convertToCompleteTelNum());\n\n}\n\n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.UserType#replace(java.lang.Object,\
  \ java.lang.Object, java.lang.Object)\n\n*/\n\n@Override\n\npublic Object replace(Object\
  \ original, Object target, Object owner)\n\nthrows HibernateException {\n\nreturn\
  \ deepCopy(original);\n\n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.UserType#returnedClass()\n\
  \n*/\n\n@Override\n\npublic Class returnedClass() {\n\nreturn com.hibernaterecipes.chapter4.custommappings.PhoneCh4_4.class;\n\
  \n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.UserType#sqlTypes()\n\n\
  */\n\n@Override\n\npublic int[] sqlTypes() {\n\nreturn new int [] {java.sql.Types.VARCHAR};\n\
  \n第 4 章 ■ 继承与自定义映射\n\n}\n\n}\n\n现在你已经完成了`UserType`接口的实现，订单类的 Hibernate 映射文件如下所示：\n\
  \n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.custommappings\">\n\
  \n<class name=\"OrdersCh4_4\" table=\"ORDERS\">\n\n<id name=\"id\" type=\"long\"\
  \ column=\"ID\">\n\n<generator class=\"native\" />\n\n</id>\n\n<property name=\"\
  weekdayRecipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\" />\n\n<property\
  \ name=\"weekdayPhone\"\n\ntype=\"com.hibernaterecipes.chapter4.custommappings.PhoneUserType\"\
  \n\ncolumn=\"WEEKDAY_PHONE\" />\n\n<property name=\"weekdayAddress\" type=\"string\"\
  \ column=\"WEEKDAY_ADDRESS\" />\n\n<property name=\"holidayRecipient\" type=\"string\"\
  \ column=\"HOLIDAY_RECIPIENT\" />\n\n<property name=\"holidayPhone\" type=\"string\"\
  \ column=\"HOLIDAY_PHONE\" />\n\n<property name=\"holidayAddress\" type=\"string\"\
  \ column=\"HOLIDAY_ADDRESS\" />\n\n</class>\n\n</hibernate-mapping>\n\n在 JPA 注解中，订单类使用注解`org.hibernate.annotations.Type`并将类型定义为`PhoneUserType`：\n\
  \n@Entity (name=\"OrderCh4_4\")\n\n@Table (name=\"ORDERS\")\n\npublic class OrdersCh4_4\
  \ {\n\n@Id\n\n@GeneratedValue (strategy=GenerationType. *AUTO*)\n\n@Column (name=\"\
  ID\")\n\nprivate Long id;\n\n//private Book book;\n\n@Column (name=\"WEEKDAY_RECIPIENT\"\
  )\n\nprivate String weekdayRecipient;\n\n@org.hibernate.annotations.Type\n\n(type\
  \ = \"com.hibernaterecipes.annotations.custommapping.PhoneUserType\")\n\n@Column\
  \ (name=\"WEEKDAY_PHONE\")\n\nprivate PhoneCh4_4 weekdayPhone;\n\n@Column (name=\"\
  WEEKDAY_ADDRESS\")\n\nprivate String weekdayAddress;\n\n@Column (name=\"HOLIDAY_RECIPIENT\"\
  )\n\nprivate String holidayRecipient;\n\n@org.hibernate.annotations.Type\n\n(type\
  \ = \"com.hibernaterecipes.annotations.custommapping.PhoneUserType\")\n\n@Column\
  \ (name=\"HOLIDAY_PHONE\")\n\nprivate PhoneCh4_4 holidayPhone;\n\n第 4 章 ■ 继承与自定义映射\n\
  \n@Column (name=\"HOLIDAY_ADDRESS\")\n\nprivate String holidayAddress;\n\n// getters\
  \ and setters\n\n}\n\n你可以使用这个`UserType`来处理遗留数据库带来的问题。它还可以执行验证或与 LDAP 目录通信。该实现不支持正确的查询，这意味着你无法创建条件对象并搜索所有具有特定区号的订单。此外，要缓存`UserType`类型的对象，该对象必须是可序列化的。\n\
  \n4.5 CompositeUserType 映射\n\n问题\n\n如果你只想查询一个电话号码，或者获取所有属于同一区号的电话号码，该怎么办？你之前实现了`UserType`接口来映射到单个数据库列，这使得在这种场景下查询不够灵活。`CompositeUserType`接口允许你将属性映射到多个列。如何创建`CompositeUserType`自定义映射呢？\n\
  \n解决方案\n\n你需要实现`CompositeUserType`接口，以获得 Hibernate 查询的能力。通过实现`CompositeUserType`接口，`UserType`的属性将对\
  \ Hibernate 查询暴露。在这里，你将电话对象的属性映射到两个独立的列：一个用于区号，一个用于电话号码。\n\n工作原理\n\n\n\n`CompositeUserType`\
  \ 的实现方法与 `UserType` 非常相似，但它没有 `sqlTypes()` 方法。具体实现如下：\n\n```java\npackage com.hibernaterecipes.chapter4.custommappings;\n\
  \nimport java.io.Serializable;\n\nimport java.sql.PreparedStatement;\n\nimport java.sql.ResultSet;\n\
  \nimport java.sql.SQLException;\n\nimport org.hibernate.Hibernate;\n\nimport org.hibernate.HibernateException;\n\
  \nimport org.hibernate.engine.SessionImplementor;\n\nimport org.hibernate.type.SerializationException;\n\
  \nimport org.hibernate.type.Type;\n\nimport org.hibernate.usertype.CompositeUserType;\n\
  \n// 第 4 章 继承与自定义映射\n\nimport com.hibernaterecipes.chapter4.custommappings.PhoneCh4_4;\n\
  \n/**\n\n* @author Guruzu\n\n*\n\n*/\n\npublic class PhoneCompositeUserType implements\
  \ CompositeUserType {\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#assemble(java.io.Serializable,\n\
  \     * org.hibernate.engine.SessionImplementor, java.lang.Object)\n     */\n  \
  \  @Override\n    public Object assemble(Serializable cached, SessionImplementor\
  \ implementor,\n                           Object obj) throws HibernateException\
  \ {\n        return deepCopy(cached);\n    }\n\n    /* (non-Javadoc)\n     * @see\
  \ org.hibernate.usertype.CompositeUserType#deepCopy(java.lang.Object)\n     */\n\
  \    @Override\n    public Object deepCopy(Object value) throws HibernateException\
  \ {\n        if(value==null)\n            return null;\n        PhoneCh4_4 phoneValue\
  \ = (PhoneCh4_4)value;\n        PhoneCh4_4 phoneCopied = new PhoneCh4_4();\n   \
  \     phoneCopied.setAreaCode(phoneValue.getAreaCode());\n        phoneCopied.setTelNo(phoneValue.getTelNo());\n\
  \        return phoneCopied;\n    }\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#disassemble(java.lang.Object,\n\
  \     * org.hibernate.engine.SessionImplementor)\n     */\n    @Override\n    public\
  \ Serializable disassemble(Object value, SessionImplementor implementor)\n     \
  \       throws HibernateException {\n        Object deepCopy = deepCopy(value);\n\
  \        if (!(deepCopy instanceof Serializable)) {\n            throw new SerializationException(value.getClass().getName()\n\
  \                    + \" is not serializable \",null);\n        }\n        return\
  \ (Serializable) deepCopy;\n    }\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#equals(java.lang.Object,\n\
  \     * java.lang.Object)\n     */\n    @Override\n    public boolean equals(Object\
  \ x, Object y) throws HibernateException {\n        if(x == y)\n            return\
  \ true;\n        if(x ==null || y == null)\n            return false;\n        return\
  \ x.equals(y);\n    }\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#getPropertyNames()\n\
  \     */\n    @Override\n    public String[] getPropertyNames() {\n        return\
  \ new String[]{\"areaCode\", \"telNo\"};\n    }\n\n    /* (non-Javadoc)\n     *\
  \ @see org.hibernate.usertype.CompositeUserType#getPropertyTypes()\n     */\n  \
  \  @Override\n    public Type[] getPropertyTypes() {\n        return new Type[]\
  \ {Hibernate.STRING, Hibernate.STRING};\n    }\n\n    /* (non-Javadoc)\n     * @see\
  \ org.hibernate.usertype.CompositeUserType#getPropertyValue(java.lang.Object, int)\n\
  \     */\n    @Override\n    public Object getPropertyValue(Object component, int\
  \ property)\n            throws HibernateException {\n        PhoneCh4_4 phone =\
  \ (PhoneCh4_4)component;\n        if(property == 0)\n            return phone.getAreaCode();\n\
  \        else\n            return phone.getTelNo();\n    }\n\n    /* (non-Javadoc)\n\
  \     * @see org.hibernate.usertype.CompositeUserType#hashCode(java.lang.Object)\n\
  \     */\n    @Override\n    public int hashCode(Object phone) throws HibernateException\
  \ {\n        assert (phone != null);\n        return phone.hashCode();\n    }\n\n\
  \    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#isMutable()\n\
  \     */\n    @Override\n    public boolean isMutable() {\n        return true;\n\
  \    }\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.CompositeUserType#nullSafeGet(java.sql.ResultSet,\n\
  \     * java.lang.String[], org.hibernate.engine.SessionImplementor, java.lang.Object)\n\
  \     */\n    @Override\n    public Object nullSafeGet(ResultSet resultSet, String[]\
  \ names,\n                             SessionImplementor session, Object owner)\
  \ throws HibernateException,\n            SQLException {\n        String areaCode\
  \ = resultSet.getString(names[0]);\n        if(resultSet.wasNull()) {\n        \
  \    return null;\n        }\n        String telNo = resultSet.getString(names[1]);\n\
  \        return new PhoneCh4_4(areaCode, telNo);\n    }\n\n    /* (non-Javadoc)\n\
  \     * @see org.hibernate.usertype.CompositeUserType#nullSafeSet(java.sql.PreparedStatement,\
  \ java.lang.Object, int, org.hibernate.engine.SessionImplementor)\n     */\n   \
  \ @Override\n```\n\n\n\npublic void nullSafeSet(PreparedStatement statement, Object\
  \ value, int index,\n\nSessionImplementor session) throws HibernateException, SQLException\
  \ {\n\nif(value == null) {\n\nstatement.setNull(index, Hibernate.STRING.sqlType());\n\
  \nstatement.setNull(index+1, Hibernate.STRING.sqlType());\n\n} else {\n\nPhoneCh4_4\
  \ phone = (PhoneCh4_4)value;\n\nstatement.setString(index, phone.getAreaCode());\n\
  \nstatement.setString(index+1, phone.getTelNo());\n\n}\n\n}\n\n/* (non-Javadoc)\n\
  \n* @see org.hibernate.usertype.CompositeUserType#replace(java.lang.Object,\n\n\
  java.lang.Object, org.hibernate.engine.SessionImplementor, java.lang.Object)\n\n\
  */\n\n@Override\n\n第 4 章 ■ 继承与自定义映射\n\npublic Object replace(Object original, Object\
  \ target, SessionImplementor owner,\n\nObject arg3) throws HibernateException {\n\
  \nreturn deepCopy(original);\n\n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.CompositeUserType#returnedClass()\n\
  \n*/\n\n@Override\n\npublic Class returnedClass() {\n\nreturn com.hibernaterecipes.chapter4.custommappings.PhoneCh4_4.class;\n\
  \n}\n\n/* (non-Javadoc)\n\n* @see org.hibernate.usertype.CompositeUserType#setPropertyValue(java.lang.Object,\
  \ int, java.lang.Object)\n\n*/\n\n@Override\n\npublic void setPropertyValue(Object\
  \ component, int index, Object value)\n\nthrows HibernateException {\n\nString columnValue\
  \ = (String) value;\n\nPhoneCh4_4 phone = (PhoneCh4_4)component;\n\nif(index ==\
  \ 0)\n\n{\n\nphone.setAreaCode(columnValue);\n\n}else if (index == 1)\n\n{\n\nphone.setTelNo(columnValue);\n\
  \n}else\n\n{\n\nthrow new IllegalArgumentException(\"未知属性 - \"+index);\n\n}\n\n\
  }\n\n}\n\n`nullSafetGet` 和 `nullSafetSet` 方法已更新，用于处理两个属性。以下是新增的方法：\n\n• `getPropertyNames`：指定查询中使用的属性名称。显然，它们必须与对象属性的名称匹配。\n\
  \n• `getPropertyValue`：获取属性值。\n\n• `setPropertyValue`：设置属性值。\n\n订单类的 Hibernate 映射现在如下所示：\n\
  \n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.custommappings\">\n\
  \n<class name=\"OrdersCh4_5\" table=\"BOOK_ORDERS_2\">\n\n<id name=\"id\" type=\"\
  long\" column=\"ID\">\n\n<generator class=\"native\" />\n\n第 4 章 ■ 继承与自定义映射\n\n\
  </id>\n\n<component name=\"weekdayContact\" class=\"ContactCh4_5\">\n\n<property\
  \ name=\"recipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\" />\n\n<property\
  \ name=\"phone\"\n\ntype=\"com.hibernaterecipes.chapter4.custommappings.PhoneCompositeUserType\"\
  >\n\n<column name=\"WEEKDAY_AREACODE\"></column>\n\n<column name=\"WEEKDAY_TELEPHONE\"\
  ></column>\n\n</property>\n\n<many-to-one name=\"address\" class=\"com.hibernaterecipes.chapter3.Address\"\
  \n\ncolumn=\"WEEKDAY_ADDRESS_ID\" />\n\n</component>\n\n<component name=\"holidayContact\"\
  \ class=\"ContactCh4_5\">\n\n<property name=\"recipient\" type=\"string\" column=\"\
  HOLIDAY_RECIPIENT\" />\n\n<property name=\"phone\"\n\ntype=\"com.hibernaterecipes.chapter4.custommappings.PhoneCompositeUserType\"\
  >\n\n<column name=\"HOLIDAY_AREACODE\"></column>\n\n<column name=\"HOLIDAY_TELEPHONE\"\
  ></column>\n\n</property>\n\n<many-to-one name=\"address\" class=\"com.hibernaterecipes.chapter3.Address\"\
  \n\ncolumn=\"HOLIDAY_ADDRESS_ID\" />\n\n</component>\n\n</class>\n\n</hibernate-mapping>\n\
  \n现在，phone 对象映射到两个列：一个用于存储区号，另一个用于存储电话号码。\n\n使用 JPA 注解，订单类如下所示：\n\n@Entity\n\n@org.hibernate.annotations.Entity(dynamicInsert\
  \ = true, dynamicUpdate = true)\n\n@Table (name=\"BOOK_ORDERS_2\")\n\npublic class\
  \ OrdersCh4_5 {\n\nprivate Long id;\n\nprivate ContactCh4_5 weekdayContact;\n\n\
  private ContactCh4_5 holidayContact;\n\n@Id\n\n@GeneratedValue (strategy=GenerationType.AUTO)\n\
  \n@Column (name=\"ID\")\n\npublic Long getId() {\n\nreturn id;\n\n}\n\npublic void\
  \ setId(Long id) {\n\nthis.id = id;\n\n}\n\n@Embedded\n\n@AttributeOverrides (\n\
  \n第 4 章 ■ 继承与自定义映射\n\n{@AttributeOverride(name=\"recipient\",column=@Column(name=\"\
  WEEKDAY_RECIPIENT\")),\n\n@AttributeOverride(name=\"phone.areaCode\",column=@Column(name=\"\
  WEEKDAY_AREACODE\")),\n\n@AttributeOverride(name=\"phone.telNo\",column=@Column(name=\"\
  WEEKDAY_TELEPHONE\")),\n\n@AttributeOverride(name=\"address\",column=@Column(name=\"\
