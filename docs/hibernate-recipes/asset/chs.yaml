  \nproperty>\n\n第 13 章 ■ 事务与并发\n\n<property\n\nname=\"hibernate.transaction.manager_lookup_class\"\
  >org.hibernate.transaction.WeblogicTransact ionManagerLookup</property>\n\n**<property\
