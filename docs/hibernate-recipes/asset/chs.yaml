  \n由于这两个关联是惰性的，访问此页面时会引发惰性初始化异常。为避免此异常，你需要显式初始化这些关联。为此，创建一个新的 `findById()` 方法，以区分新的关联与原始关联：\n\
  \n**public interface BookDao extends GenericDao {\n\n**...**\n\npublic Book findWithPublisherAndChaptersById(Long\
  \ id);\n\n**}**\n\n**public class HibernateBookDao extends HibernateGenericDao implements\
  \ BookDao {\n\n**...**\n\npublic Book findWithPublisherAndChaptersById(Long id)\
  \ {\n\n**261\n\n第 14 章 ■ WEB 应用程序\n\n**SessionFactory factory = HibernateUtil.getSessionFactory();**\n\
  \n**Session session = factory.openSession();**\n\n**try {**\n\n**Book book = (Book)\
  \ session.get(Book.class, id);**\n\n**Hibernate.initialize(book.getPublisher());**\n\
  \n**Hibernate.initialize(book.getChapters());**\n\n**return book;**\n\n**} finally\
  \ {**\n\n**session.close();**\n\n**}**\n\n**}**\n\n**}**\n\n**public class BookEditServlet\
  \ extends HttpServlet {\n\n**...**\n\nprotected void doGet(HttpServletRequest request,\
  \ HttpServletResponse response)\n\nthrows ServletException, IOException {\n\n**String\
  \ bookId = request.getParameter(\"bookId\");**\n\n**if (bookId != null) {**\n\n\
  **BookDao dao = DaoFactory.getInstance().getBookDao();**\n\n\n\n**Book book = (Book)dao.findWithPublisherAndChaptersById(Long.parseLong(bookId));**\
  \ **request.setAttribute(\"book\", book);**\n\n**}**\n\n**RequestDispatcher dispatcher\
  \ = request.getRequestDispatcher(\"bookedit.jsp\");** **dispatcher.forward(request,\
  \ response);**\n\n**}**\n\n**}**\n\n使用视图中的开放会话模式\n\n显式初始化惰性关联是否很麻烦？如何让关联在首次访问时按需初始化？\n\
  \n惰性初始化异常的根本原因在于，在 JSP 渲染期间首次访问惰性关联之前，会话已经关闭。如果你能在整个请求处理过程（包括 Servlet 处理和 JSP 渲染）中保持会话打开，那么该异常应该能够解决。要实现这个想法，你可以在\
  \ J2EE Web 应用程序中使用一个*过滤器*。\n\n过滤器是在用户请求到达 Servlet 或 JSP 之前被调用的代码。你可以将一个过滤器附加到一个或多个\
  \ Servlet 或 JSP 上；它会查看**请求**对象，并在允许请求传递到 Servlet 或 JSP 之前验证该请求。你在过滤器中打开和关闭 Hibernate\
  \ 会话，使得它在整个请求处理过程中都可访问。这被称为“视图中的开放会话”模式。\n\nHibernate 提供了 **factory.getCurrentSession()**\
  \ 方法来检索当前会话。第一次调用此方法时会打开一个新会话，当事务完成时（无论提交还是回滚）会关闭该会话。但*当前会话*是什么意思？你需要告诉 Hibernate，这是绑定到当前线程的会话：\n\
  \n****<hibernate-configuration>**\n\n**<session-factory>**\n\n**...**\n\n<property\
  \ name=\"current_session_context_class\">thread</property>\n\n**...**\n\n第 14 章\
  \ ■ Web 应用程序\n\n**</session-factory>**\n\n**</hibernate-configuration>**\n\n****public\
  \ class HibernateSessionFilter implements Filter {**\n\n**...**\n\npublic void doFilter(ServletRequest\
  \ request, ServletResponse response, FilterChain chain) throws IOException, ServletException\
  \ {\n\n****SessionFactory factory = HibernateUtil.getSessionFactory();**\n\n**Session\
  \ session = factory.getCurrentSession();**\n\n**try {**\n\n**session.beginTransaction();**\n\
