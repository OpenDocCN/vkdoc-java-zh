  \ list.size());** 1.6 在 Hibernate 中启用日志记录\n\n问题\n\n如何确定 Hibernate 正在执行哪个 SQL 查询？如何查看\
  \ Hibernate 的内部运行机制？如何启用日志记录来排查与 Hibernate 相关的复杂问题？\n\n解决方案\n\n\n\nHibernate 使用\
  \ Java 简易日志门面（SLF4J）来记录各种系统事件。SLF4J 以自由软件许可证的形式发布。它抽象了应用程序所使用的实际日志框架。\n\nSLF4J 可以将你的日志输出定向到多个日志框架：\n\
  \n• *NOP:* 空日志记录器实现\n\n• *Simple:* 一个非常易于使用的反日志框架，它试图在一个包中解决所有日志问题\n\n• *Log4j 版本\
  \ 1.2:* 一个广泛使用的开源日志框架\n\n• *JDK 1.4 日志:* Java 提供的一个日志 API\n\n第 1 章 ■ 开始使用 Hibernate\n\
  \n• *JCL:* 一个开源的 Commons 日志框架，它为其他日志工具提供了带有薄包装器实现的接口\n\n• *Logback:* 一个可序列化的日志记录器，使用时，它会根据你选择的绑定在反序列化后进行日志记录\n\
  \n要设置日志，你需要在类路径中包含 **slf4j-api.jar** 以及你首选绑定的 jar 文件——如果使用 log4j，则是 **slf4j-log4j12.jar**。你还可以启用一个名为\
  \ **showsql** 的属性来查看正在执行的确切查询。你可以配置像 Apache log4j 这样的日志层来启用 Hibernate 类级别或包级别的日志记录。并且你可以使用\
  \ Hibernate 提供的 Statistics 接口来获取一些详细信息。\n\n工作原理\n\n你需要配置 Hibernate 属性 `show_sql`\
  \ 和 log4J 来启用日志记录。\n\n检查 Hibernate 发出的 SQL 语句\n\nHibernate 会生成 SQL 语句，让你在后台访问数据库。你可以在\
  \ **hibernate.cfg.xml** XML 配置文件中将 **show_sql** 属性设置为 true，以将 SQL 语句打印到标准输出：\n\n\
  **<property name=\"show_sql\">true</property>**\n\n配置 Log4j\n\nHibernate 也可以使用 log4j\
  \ 日志库来记录 SQL 语句和参数。确保 **log4j.jar** 文件包含在你的项目类路径中。在源根文件夹中创建一个名为 **log4j.properties**\
  \ 的属性文件；该文件用于配置 log4j 库：\n\n**### 将日志消息直接输出到标准输出 ###**\n\n**log4j.appender.stdout=org.apache.log4j.ConsoleAppender**\n\
  \n**log4j.appender.stdout.Target=System.out**\n\n**log4j.appender.stdout.layout=org.apache.log4j.PatternLayout**\n\
  \n**log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %5p %c{1}:%L\
  \ - %m%n**\n\n**### 将消息直接输出到文件 hibernate.log ###**\n\n**#log4j.appender.file=org.apache.log4j.FileAppender**\n\
  \n**#log4j.appender.file.File=hibernate.log**\n\n**#log4j.appender.file.layout=org.apache.log4j.PatternLayout**\n\
  \n**#log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %5p %c{1}:%L\
  \ - %m%n** **log4j.rootLogger=error, stdout**\n\n**log4j.logger.org.hibernate.SQL=debug**\n\
  \n**log4j.logger.org.hibernate.type=debug**\n\n启用实时统计\n\n你可以通过在配置文件中设置属性 **hibernate.generate_statistics**\
  \ *来启用实时统计：*\n\n*28\n\n第 1 章 ■ 开始使用 Hibernate\n\n****<property name=\"hibernate.generate_statistics\"\
  >true</property>**\n\n**你也可以通过使用 Statistics 接口以编程方式启用实时统计：\n\n****Statistics stats\
  \ = sessionFactory.getStatistics();**\n\n**stats.setStatisticsEnabled(true);**\n\
  \n**Transaction tx = session.beginTransaction();**\n\n**List<Book> books = session.createQuery(\"\
  from Book\").list();**\n\n**for(Book bo : books)**\n\n**{**\n\n**System.out.println(bo);**\n\
  \n**}**\n\n**stats.getSessionOpenCount();**\n\n**stats.logSummary();**\n\n**session.close();**\n\
  \n1.7 使用 Hibernate 生成数据库模式\n\n问题\n\nHibernate 如何帮助你生成或更新模式？\n\n解决方案\n\nHibernate\
  \ 使用 Apache Ant 任务定义来创建和更新数据库模式。\n\n工作原理\n\n创建 Ant 构建文件\n\n你使用 Apache Ant 来定义构建过程。（有关\
  \ Ant 的更多信息，请参见\n\n[**http://ant.apache.org/**](http://ant.apache.org)）在项目根目录下创建以下\
  \ **build.xml** 文件：\n\n**<project name=\"BookShop\" default=\"schemaexport\">**\n\
  \n**<property name=\"build.dir\" value=\"bin\" />**\n\n**<property name=\"hibernate.home\"\
  \ value=\"c:/hibernate-3.1\" />**\n\n**<property name=\"derby.home\" value=\"c:/derby\"\
  \ />**\n\n**<path id=\"hibernate-Classpath\">**\n\n**<fileset dir=\"${hibernate.home}\"\
  >**\n\n**<include name=\"**/*.jar\" />**\n\n**</fileset>**\n\n**<fileset dir=\"\
  ${derby.home}\">**\n\n**<include name=\"lib/*.jar\" />**\n\n**</fileset>**\n\n第\
  \ 1 章 ■ 开始使用 Hibernate\n\n**<pathelement path=\"${build.dir}\" />**\n\n**</path>**\n\
  \n**<!-- 定义 Ant 目标 -->**\n\n**</project>**\n\n使用 SchemaExport 生成数据库模式\n\n你使用 Hibernate\
  \ 提供的 **schemaexport** 任务来生成创建数据库模式的 SQL 语句。它会从 Hibernate 配置文件（**hibernate.cfg.xml**）中读取\
  \ **dialect** 属性，以确定你正在使用的数据库类型：\n\n**<target name=\"schemaexport\">**\n\n**<taskdef\
  \ name=\"schemaexport\"**\n\n**classname=\"org.hibernate.tool.hbm2ddl.SchemaExportTask\"\
  **\n\n**Classpathref=\"hibernate-Classpath\" />**\n\n**<schemaexport config=\"${build.dir}/hibernate.cfg.xml\"\
  **\n\n**output=\"BookShop.sql\" />**\n\n**</target>**\n\n使用 SchemaUpdate 更新数据库模式\n\
  \n在开发周期中，你可能会频繁更改对象模型。每次都销毁并重建模式效率不高。**schemaupdate** 任务用于更新现有的数据库模式：\n\n**<target\
  \ name=\"schemaupdate\">**\n\n**<taskdef name=\"schemaupdate\"**\n\n**classname=\"\
  org.hibernate.tool.hbm2ddl.SchemaUpdateTask\"**\n\n**Classpathref=\"hibernate-Classpath\"\
  \ />**\n\n**<schemaupdate config=\"${build.dir}/hibernate.cfg.xml\" text=\"no\"\
  />**\n\n**</target>**\n\n指定数据库模式的详细信息\n\n在前面的映射示例中，你省略了一些表细节，例如列长度和非空约束。如果从此映射生成数据库模式，则必须提供这些类型的详细信息：\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.bookshop\">**\n\n**<class\
  \ name=\"Book\" table=\"BOOK\">**\n\n**<id name=\"isbn\" type=\"string\">**\n\n\
  **<column name=\"ISBN\" length=\"50\" />**\n\n**</id>**\n\n**<property name=\"name\"\
  \ type=\"string\">**\n\n**<column name=\"BOOK_NAME\" length=\"100\" not-null=\"\
  true\" />**\n\n**</property>**\n\n**<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />** 30\n\n第 1 章 ■ 开始使用 Hibernate\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n总结\n\n在本章中，你了解了什么是对象/关系映射，以及它相对于 JDBC 的优势。\n\nHibernate 是业界使用最广泛的 ORM 框架之一。直接使用\
  \ JDBC 有许多缺点，包括对 **ResultSet** 的复杂处理以及它在不同数据库之间不可移植的事实。为了克服这些问题，你可以使用 ORM 来简化开发并高效维护软件。\n\
  \n要配置 Hibernate，你需要各种第三方 jar 包，这些 jar 包必须在类路径中指定。\n\n需要 **.hbm** 和 **.hibernate.cfg.cml**\
  \ XML 文件来配置映射到表的对象；它们还包含数据库连接详细信息。你使用\n\n**org.hibernate.SessionFactory** 来创建代表工作单元的\
  \ **org.hibernate.Session** 对象。\n\n其他数据库操作使用 **Session** 对象执行。\n\n你也可以使用注解来执行 Hibernate\
  \ 配置和数据库操作。这些是 Hibernate 注解，它们实现了 EJB3.0 规范定义的 Java 持久化标准，因此所有细节都可以通过注解来指定。\n\n\
  **第 2 章**\n\n■ ■ ■\n\n**基本映射与对象标识**\n\n\n\n数据库表中的主键用于唯一标识该表中的一条记录。主键值不能为空，并且在表内是唯一的。主键还用于建立两个表之间的关系——它在关联表中被定义为外键。由于主键用于标识特定记录，因此它也可以被称为*数据库标识符*。Hibernate\
  \ 通过持久化实体的标识符属性将数据库标识符暴露给应用程序。本章讨论为数据库记录生成标识符（主键）的各种方法。你将了解元数据配置及其对持久化机制的影响。\n\n\
  2.1 为持久化提供 ID\n\n问题\n\n如何为数据库实体生成标识符？有哪些可行的策略？\n\n解决方案\n\n使用 id 元素（**<id>** ）在 Hibernate\
  \ XML 文件中创建映射。id 元素具有诸如 **column**、**type** 和 **generator** 等属性，用于生成标识符。JPA 规范要求每个实体都必须有一个主键。从\
  \ JPA 的角度来看，**@id** 用于定义标识符的生成方式。\n\n当使用继承映射时，多个类可以映射到同一个表。这些类（子类和超类）被称为处于一个*实体层次结构*中。主键必须在实体层次结构中精确地定义一次，要么在作为实体层次结构根的实体上定义，要么在实体层次结构的映射超类上定义。诸如\
  \ **@GeneratedValue** 和 **@column** 等属性用于定义列映射和策略。\n\n工作原理\n\n你需要在持久化到数据库之前，让 Hibernate\
  \ 为你生成这个 ID。Hibernate 提供了许多内置的 ID 生成策略：\n\n第 2 章 ■ 基本映射与对象标识\n\n• 数据库序列\n\n• 原生生成器\n\
  \n• 递增生成器\n\n• HiLo 生成器\n\n其中一些策略仅适用于特定的数据库；例如，序列策略在 MYSQL 中不受支持，但由 Oracle 提供。\n\
  \nJPA 也提供了一种生成标识符的方式。\n\nHibernate XML 映射\n\n我们将依次介绍每种策略，从数据库序列开始。在本节中，我们将向数据库中插入三本书。以下是用于向\
  \ **Book** 表插入记录的 **Launch** 类：\n\n****package com.hibernaterecipes.chapter2;**\n\
  \n****import java.util.Date;**\n\n**import java.util.List;**\n\n****import org.hibernate.Session;**\n\
  \n**import org.hibernate.SessionFactory;**\n\n**import org.hibernate.Transaction;**\n\
  \n**import org.hibernate.cfg.Configuration;**\n\n**import org.hibernate.stat.Statistics;**\n\
  \n******/****\n\n*** @author Guruzu**\n\n*****\n\n***/**\n\n**public class Launch_2_1\
  \ {**\n\n**private static SessionFactory sessionFactory;**\n\n****public static\
  \ Session getSession() {**\n\n**if(sessionFactory == null)**\n\n**{**\n\n**sessionFactory\
  \ = new Configuration().configure()**\n\n**.buildSessionFactory();**\n\n**}**\n\n\
  **Session hibernateSession = sessionFactory.openSession();**\n\n**return hibernateSession;**\n\
  \n**}**\n\n****public static void main(String[] args) {**\n\n**Session session =\
  \ getSession();**\n\n**Statistics stats = sessionFactory.getStatistics();**\n\n\
  **stats.setStatisticsEnabled(true);**\n\n**Transaction tx = session.beginTransaction();**\n\
  \n第 2 章 ■ 基本映射与对象标识\n\n****for(int i =0;i<3;i++)**\n\n**{**\n\n**BookCh2 book =\
  \ new BookCh2();**\n\n**book.setName(\"Book Name \"+(i+1));**\n\n**book.setPrice(39);**\n\
  \n**book.setPublishDate(new Date());**\n\n**session.save(book);**\n\n**}**\n\n**tx.commit();**\n\
  \n**stats.getSessionOpenCount();**\n\n**stats.logSummary();**\n\n**session.close();**\n\
  \n**}**\n\n**}**\n\n**使用数据库序列**\n\n生成 ID 最常用的方式是使用自动递增的序列号。对于某些类型的数据库，包括超结构化查询语言数据库（HSQLDB），你可以使用序列/生成器来生成这个序列号。HSQLDB\
  \ 是一个用 Java 编写的关系数据库管理系统；它支持 SQL-92 和 SQL-2003 标准的大部分子集。这种策略被称为*序列*。\n\n让我们再次以书店为例。由于一个持久化对象不能拥有多个\
  \ ID，你需要将 ISBN 改为一个简单的属性，并对其添加非空和唯一约束。\n\n****<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate\
  \ Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\" >**\n\n**<import\
  \ class=\"BookCh2\" rename=\"bkch2\"/>**\n\n**<class name=\"BookCh2\" table=\"BOOK\"\
  \ dynamic-insert=\"true\" dynamic-update=\"true\">**\n\n**<id name=\"isbn\" column=\"\
  isbn\" type=\"long\">**\n\n<generator class=\"sequence\">\n\n<param name=\"sequence\"\
  >BOOK_SEQUENCE</param>\n\n</generator>\n\n**</id>**\n\n**<property name=\"name\"\
  \ type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"\
  int\" column=\"PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**使用原生生成器**\n\
  \n原生生成器提供了可移植性，因为 Hibernate 可以确定底层数据库支持的生成器方法。使用原生类的生成器会根据可用的数据库支持，使用 identity 或\
  \ sequence 列。如果这两种方法都不受支持，原生生成器会回退到 hi/lo 生成器方法来创建唯一的主键值。\n\n第 2 章 ■ 基本映射与对象标识\n\
  \n让我们看看这是如何工作的。在 **BookCh2.java** 类中，将 **isbn** 属性的类型从 **String** 改为 **long**，如下所示：\n\
  \n****public class BookCh2 {**\n\nprivate long isbn;\n\n****private String name;**\n\
  \n**private Date publishDate;**\n\n**private int price;**\n\n**private Publisher\
  \ publisher;**\n\n**private List chapters;**\n\n****// getters and setters**\n\n\
  **}**\n\n**然后编辑 **Book.xml** 映射文件，使其包含 **id** 元素：\n\n****<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate\
  \ Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">**\n\n**<class\
  \ name=\"BookCh2\" table=\"BOOK\">**\n\n<id column=\"ISBN\" type=\"long\">\n\n<generator\
  \ class=\"native\">\n\n</generator>\n\n</id>\n\n**<property name=\"name\" type=\"\
  string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**你在这里使用的原生生成器会使用其他标识生成器，例如\
  \ identity、sequence、hilo 和 increment。选择使用哪个生成器取决于底层数据库。**Identifier** 的类型为 **long**、**short**\
  \ 或 **int**。\n\n**使用递增生成器**\n\n递增生成器会从表中读取主键列的最大值，并将该值加一。当应用程序部署在服务器集群中时，不建议使用此方法，因为每个服务器都会生成一个\
  \ ID，并且可能会与其他服务器上生成的 ID 发生冲突。递增生成器在 JPA 中不可用。\n\n按如下方式编辑 **Book.xml** Hibernate\
  \ 映射文件：\n\n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">**\n\n**<class\
  \ name=\"BookCh2\" table=\"BOOK\">**\n\n第 2 章 ■ 基本映射与对象标识\n\n<id column=\"ISBN\"\
  \ type=\"long\">\n\n<generator class=\"increment\">\n\n</generator>\n\n</id>\n\n\
  **<property name=\"name\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property\
  \ name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n**<property\
  \ name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**标识符**的类型为**long**、**short**或**int**。\n\n使用 increment 生成器时，记录所在表的主键会递增。而使用 sequence\
  \ 生成器时，数据库序列会递增。你也可以使用一个序列为多个表生成主键，而 increment 生成器只能用于为其自身表创建主键。\n\n**使用 Hilo 生成器**\n\
  \nhilo 生成器采用 hi/lo 算法生成特定数据库唯一的标识符。它从全局源（默认是 **hibernate_unique_key** 表和 **next_hi**\
  \ 列）获取高位值，并从本地源获取低位值。**max_lo** 值选项用于定义在获取高位值之前，需要添加多少个低位值。这两个值相加后生成一个唯一的标识符。\n\n\
  按如下所示编辑 **Book.xml** 映射文件：\n\n**<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n\
  **<!DOCTYPE hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD\
  \ 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">**\n\n**<class\
  \ name=\"BookCh2\" table=\"BOOK\">**\n\n<id column=\"ISBN\" type=\"long\">\n\n<generator\
  \ class=\"hilo\">\n\n</generator>\n\n</id>\n\n**<property name=\"name\" type=\"\
  string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\" type=\"date\"\
  \ column=\"PUBLISH_DATE\" />**\n\n**<property name=\"price\" type=\"int\" column=\"\
  PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**hilo 生成器的类型为 **long**。\n\
  \n此生成器*不应*与用户提供的连接一起使用。高位值*必须*在与 **Session** 事务分离的单独事务中获取，因此生成器必须能够获取新连接并提交它。因此，当用户提供连接时，可能无法使用此实现。在这种情况下，**SequenceHiLoGenerator**\
  \ 是更好的选择（在支持的情况下）。\n\nhilo 生成器用于批量操作。当 Hibernate 使用应用服务器数据源获取与 JTA 绑定的连接时，你必须正确配置\n\
  \n**hibernate.transaction.manager_lookup_property**。**hibernate.transaction.manager_lookup**\
  \ 是 **TransactionManagerLookup** 的类名。\n\n第 2 章 ■ 基本映射与对象标识\n\n使用 JPA 生成标识符\n\n对于使用\
  \ JPA 注解的实体类，按如下所示更新 **Book** 类，添加 **@id**、**@GeneratedValue** 和\n\n**@column**\
  \ 注解。**GeneratedValue** 的 **strategy** 值为 **GenerationType.AUTO**，这对应于 Hibernate\
  \ XML 映射中的 native 选项：\n\n**package com.hibernaterecipes.annotations.domain;**\n\n\
  ****import java.util.Date;**\n\n**import javax.persistence.Column;**\n\n**import\
  \ javax.persistence.Entity;**\n\n**import javax.persistence.GeneratedValue;**\n\n\
  **import javax.persistence.GenerationType;**\n\n**import javax.persistence.Id;**\n\
  \n**import javax.persistence.Table;**\n\n****@Entity**\n\n**@Table (name=\"BOOK\"\
  )**\n\n**public class BookCh2 {**\n\n**@Id\n\n@GeneratedValue (strategy=GenerationType.AUTO)\n\
  \n@Column (name=\"ISBN\")\n\n**private long isbn;**\n\n****@Column (name=\"book_Name\"\
  )**\n\n**private String bookName;**\n\n****/*@Column (name=\"publisher_code\")**\n\
  \n**String publisherCode;*/**\n\n****@Column (name=\"publish_date\")**\n\n**private\
  \ Date publishDate;**\n\n****@Column (name=\"price\")**\n\n**private Long price;**\n\
  \n****// getters and setters**\n\n**}**\n\n2.2 在 Hibernate 中创建复合键\n\n问题\n\n\n\n\
  如何在 Hibernate 中创建复合主键？\n\n第 2 章 ■ 基本映射与对象标识\n\n解决方案\n\n包含复合主键的表可以通过将类的多个属性映射为标识属性来实现。**<composite-id>**\
  \ 元素接受 **<key-property>** 属性映射和 **<key-many-to-one>** 映射作为子元素。持久化类必须重写 **equals()**\
  \ 和 **hashCode()** 方法以实现复合标识的相等性判断，同时必须实现 **Serializable** 接口。\n\n工作原理\n\n在某些情况下，你可能需要使用\
  \ Hibernate 访问包含 *复合主键*（由多个列组成的主键）的遗留数据库表。对于这类遗留表，添加一个用作主键的 ID 列并不容易。假设你有一个使用以下\
  \ SQL 语句创建的遗留 **CUSTOMER** 表：\n\n**CREATE TABLE CUSTOMER (**\n\n**COUNTRY_CODE VARCHAR(2)\
  \ NOT NULL,**\n\n**ID_CARD_NO VARCHAR(30) NOT NULL,**\n\n**FIRST_NAME VARCHAR(30)\
  \ NOT NULL,**\n\n**LAST_NAME VARCHAR(30) NOT NULL,**\n\n**ADDRESS VARCHAR(100),**\n\
  \n**EMAIL VARCHAR(30),**\n\n**PRIMARY KEY (COUNTRY_CODE, ID_CARD_NO)**\n\n**);**\n\
  \n**然后你使用以下 SQL 语句向该表插入了一些数据：\n\n**INSERT INTO CUSTOMER (COUNTRY_CODE, ID_CARD_NO,\
  \ FIRST_NAME, LAST_NAME, ADDRESS, EMAIL)**\n\n**VALUES ('mo', '1234567(8)', 'Gary',\
  \ 'Mak', 'Address for Gary', 'gary@mak.com');**\n\n对于对象模型，你为 **CUSTOMER** 表开发了以下持久化类。每个列都映射为一个\
  \ **String** 类型的属性：\n\n**public class Customer {**\n\n**private String countryCode;**\n\
  \n**private String idCardNo;**\n\n**private String firstName;**\n\n**private String\
  \ lastName;**\n\n**private String address;**\n\n**private String email;**\n\n**//\
  \ Getters 和 Setters**\n\n**}**\n\n**然后，你为 **Customer** 类创建映射定义。使用 **<composite-id>**\
  \ 来定义对象 ID，该 ID 由两个属性 **countryCode** 和 **idCardNo** 组成：\n\n**<hibernate-mapping>**\n\
  \n**<class name=\"Customer\" table=\"CUSTOMER\">**\n\n<composite-id>\n\n<key-property\
  \ name=\"countryCode\" type=\"string\" column=\"COUNTRY_CODE\" /> 39\n\n第 2 章 ■\
  \ 基本映射与对象标识\n\n<key-property name=\"idCardNo\" type=\"string\" column=\"ID_CARD_NO\"\
  />\n\n</composite-id>\n\n**<property name=\"firstName\" type=\"string\" column=\"\
  FIRST_NAME\" />**\n\n**<property name=\"lastName\" type=\"string\" column=\"LAST_NAME\"\
  \ />**\n\n**<property name=\"address\" type=\"string\" column=\"ADDRESS\" />**\n\
  \n**<property name=\"email\" type=\"string\" column=\"EMAIL\" />**\n\n**</class>**\n\
  \n**</hibernate-mapping>**\n\n**当新的持久化对象被添加到应用程序中时，你需要在 **hibernate.cfg.xml** 配置文件中定义它：\n\
  \n**<mapping resource=\"com/metaarchit/bookshop/Customer.hbm.xml\" />**\n\n**当你使用\
  \ **load()** 或 **get()** 从数据库中检索指定对象时，需要提供该对象的 ID。那么应该传递哪种类型的对象作为 ID 呢？目前，你可以传递一个设置了\
  \ **countryCode** 和 **idCardNo** 的新创建的 **Customer** 对象。请注意，Hibernate 要求任何 ID 类都必须实现\
  \ **java.io.Serializable** 接口：\n\n**public class Customer implements Serializable\
  \ {**\n\n**...**\n\n**}**\n\n**Customer customerId = new Customer();**\n\n**customerId.setCountryCode(\"\
  mo\");**\n\n**customerId.setIdCardNo(\"1234567(8)\");**\n\n**Customer customer =\
  \ (Customer) session.get(Customer.class, customerId);**\n\n**将整个持久化对象作为 ID 传递并不合理。更好的做法是将构成\
  \ ID 的字段提取出来，作为一个单独的类：\n\n**public class CustomerId implements Serializable {**\n\
  \n**private String countryCode;**\n\n**private String idCardNo;**\n\n**public CustomerId(String\
  \ countryCode, String idCardNo) {**\n\n**this.countryCode = countryCode;**\n\n**this.idCardNo\
  \ = idCardNo;**\n\n**}**\n\n**}**\n\n**然后，修改 **Customer** 持久化类以使用这个新的 ID 类：\n\n\
  **public class Customer implements Serializable {**\n\nprivate CustomerId id;\n\n\
  **private String firstName;**\n\n**private String lastName;**\n\n**private String\
  \ address;**\n\n**private String email;**\n\n\n\n**// 获取器和设置器**\n\n**}**\n\n**映射定义也应修改为使用\
  \ ID 类：\n\n第 2 章 ■ 基本映射与对象标识\n\n****<hibernate-mapping>**\n\n**<class name=\"Customer\"\
  \ table=\"CUSTOMER\">**\n\n<composite-id name=\"id\" class=\"CustomerId\">\n\n<key-property\
  \ name=\"countryCode\" type=\"string\" column=\"COUNTRY_CODE\" />\n\n<key-property\
  \ name=\"idCardNo\" type=\"string\" column=\"ID_CARD_NO\"/>\n\n</composite-id>\n\
  \n**<property name=\"firstName\" type=\"string\" column=\"FIRST_NAME\" />**\n\n\
  **<property name=\"lastName\" type=\"string\" column=\"LAST_NAME\" />**\n\n**<property\
  \ name=\"address\" type=\"string\" column=\"ADDRESS\" />**\n\n**<property name=\"\
  email\" type=\"string\" column=\"EMAIL\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**要检索一个**Customer**对象，你需要指定 ID。这次，你传入一个**CustomerId**类型的实例：\n\n****CustomerId\
  \ customerId = new CustomerId(\"mo\", \"1234567(8)\");** **Customer customer = (Customer)\
  \ session.get(Customer.class, customerId);**\n\n**要持久化一个**Customer**对象，你使用一个**CustomerId**类型的实例作为其\
  \ ID：\n\n****Customer customer = new Customer();**\n\n**customer.setId(new CustomerId(\"\
  mo\", \"9876543(2)\"));**\n\n**customer.setFirstName(\"Peter\");**\n\n**customer.setLastName(\"\
  Lou\");**\n\n**customer.setAddress(\"Address for Peter\");**\n\n**customer.setEmail(\"\
  peter@lou.com\");**\n\n**session.save(customer);**\n\n**为了使 Hibernate 缓存正常工作，你需要重写自定义\
  \ ID 类的**equals()**和**hashCode()**方法。**equals()**方法用于比较两个对象是否相等，而**hashCode()**方法提供对象的哈希码。你可以使用**EqualsBuilder**和**HashCodeBuilder**来简化**equals()**和**hashCode()**的实现。这些类由\
  \ Jakarta Commons Lang 库提供；你可以从以下网址下载：\n\n[**http://jakarta.apache.org/site/downloads/downloads_commons-lang.cgi**。下载该库后，](http://jakarta.apache.org/site/downloads/downloads_commons-lang.cgi)将**commons-lang-2.1.jar**包含到项目的\
  \ Java 构建路径中：\n\n****public class CustomerId implements Serializable {**\n\n**...**\n\
  \n**public boolean equals(Object obj) {**\n\n**if (!(obj instanceof CustomerId))\
  \ return false;**\n\n**CustomerId other = (CustomerId) obj;**\n\n**return new EqualsBuilder().append(countryCode,\
  \ other.countryCode)**\n\n**.append(idCardNo, other.idCardNo)**\n\n**.isEquals();**\n\
  \n**}**\n\n****public int hashCode() {**\n\n**return new HashCodeBuilder().append(countryCode)**\n\
  \n**.append(idCardNo)**\n\n第 2 章 ■ 基本映射与对象标识\n\n**.toHashCode();**\n\n**}**\n\n\
  **}**\n\n**然而，如果这个**Customer**持久化类是从头开始设计的，你应该为其提供一个自动生成的主 ID。将业务键**countryCode**和**idCardNo**定义为非空，并添加一个多列唯一约束。**<properties>**标签可用于将多个属性分组：**public\
  \ class Customer {**\n\n**private Long id;**\n\n**private String countryCode;**\n\
  \n**private String idCardNo;**\n\n**private String firstName;**\n\n**private String\
  \ lastName;**\n\n**private String address;**\n\n**private String email;**\n\n**//\
  \ 获取器和设置器**\n\n**}**\n\n****<hibernate-mapping>**\n\n**<class name=\"Customer\"\
  \ table=\"CUSTOMER\">**\n\n**<id name=\"id\" type=\"long\" column=\"ID\">**\n\n\
  **<generator class=\"native\"/>**\n\n**</id>**\n\n**<properties name=\"customerKey\"\
  \ unique=\"true\">**\n\n**<property name=\"countryCode\" type=\"string\" column=\"\
  COUNTRY_CODE\" not-null=\"true\" />**\n\n**<property name=\"idCardNo\" type=\"string\"\
  \ column=\"ID_CARD_NO\" not-null=\"true\" />**\n\n**</properties>**\n\n**...**\n\
  \n**</class>**\n\n**</hibernate-mapping>**\n\n2.3 Hibernate 中的 SaveOrUpdate\n\n\
  问题\n\n在 Hibernate 中，**saveOrUpdate()**方法的保存和更新是如何工作的？\n\n解决方案\n\nHibernate 提供了一个用于持久化对象的方法**saveOrUpdate()**。它决定一个对象应该被保存还是更新。这个方法对于传递性对象持久化非常有用。\n\
  \n****session.saveOrUpdate(book);**\n\n第 2 章 ■ 基本映射与对象标识\n\n工作原理\n\n\n\n如果使用自动生成\
  \ ID 类型的持久化对象，在调用 **saveOrUpdate()** 方法时传入空的 ID 值，它会被视为需要插入数据库的新对象。Hibernate 会先为该对象生成一个\
  \ ID，然后执行 **INSERT** 语句。反之，如果 ID 值不为空，Hibernate 会将其视为已存在的对象，并为其执行 **UPDATE** 语句。\n\
  \nHibernate 如何判断 ID 为空？对于 **Book** 类，**isbn** 类型是原始类型 **long**。你需要指定一个数字作为未保存的值。通常，你会选择“0”作为未保存的值，因为它是\
  \ **long** 数据类型的默认值。但问题在于，你无法拥有一个 ID 值真正为“0”的对象：\n\n****<id name=\"isbn\" type=\"\
  long\" column=\"ISBN\" unsaved-value=\"0\">**\n\n**<generator class=\"native\"/>**\n\
  \n**</id>**\n\n**这个问题的解决方案是使用原始类型的包装类作为你的 ID 类型（本例中为 **java.lang.Long**）。这样，null\
  \ 就会被视为未保存的值。你可以使用 **long** 数据类型范围内的任何数字作为 ID 值：\n\n****public class Book {**\n\n\
  private Long isbn;\n\n**private String name;**\n\n**private Publisher publisher;**\n\
  \n**private Date publishDate;**\n\n**private int price;**\n\n**private List chapters;**\n\
  \n**// Getters and Setters**\n\n**}**\n\n**其他持久化属性也是如此，例如 **Book** 类中的 **price**\
  \ 属性。\n\n当一本书的价格未知时，应该给这个字段赋什么值？是“0”还是负数？两者似乎都不合适。相反，你可以将类型改为原始类型的包装类（本例中为 **java.lang.Integer**），并使用\
  \ null 来表示未知值：\n\n****public class Book {**\n\n**private Long isbn;**\n\n**private\
  \ String name;**\n\n**private Publisher publisher;**\n\n**private Date publishDate;**\n\
  \nprivate Integer price;\n\n**private List chapters;**\n\n**// Getters and Setters**\n\
  \n**}**\n\n2.4 Hibernate 中的动态 SQL 生成\n\n问题\n\n动态 SQL 生成是什么意思？为什么需要启用它，以及如何启用？\n\n\
  第 2 章 ■ 基本映射与对象标识\n\n解决方案\n\n在应用程序启动时，Hibernate 会为其每个持久化类创建 SQL 语句。这意味着 Hibernate\
  \ 会为创建、读取、更新和删除（CRUD）操作创建 SQL 语句，但不会执行这些语句。因此，在应用程序启动时，会创建一条插入语句（创建）、一条删除语句、一条读取语句和一条更新语句。更新语句用于更新每一个字段。在运行时，如果值没有改变，则会用旧值进行更新。这些\
  \ CRUD 语句会被 Hibernate 缓存在内存中。\n\n动态 SQL 生成意味着关闭 Hibernate 的这一特性。你可能想要这样做，因为该特性可能导致应用程序启动时间变长。启动时间的长短取决于应用程序中实体类的数量。将这些\
  \ SQL 语句缓存在内存中，可能会在不必要的内存占用方面影响对性能敏感的应用程序。\n\n工作原理\n\n对于 class 元素，添加 **dynamic-insert**\
  \ 和 **dynamic-update** 属性，并将其设置为 true。**Book.xml** 映射文件变为以下内容：\n\n****<?xml version=\
  \ *\"1.0\"*** **encoding= *\"UTF-8\"*** **?>**\n\n**<!DOCTYPE hibernate-mapping\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">**\n\n<class name=\"\
  BookCh2\" table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\">\n\n**<id\
  \ column=\"isbn\" type=\"long\">**\n\n**<generator class=\"native\">**\n\n**</generator>**\n\
  \n**</id>**\n\n**<property name=\"name\" type=\"string\" column=\"BOOK_NAME\" />**\n\
  \n**<property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />**\n\n\
  **<property name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n**</class>**\n\n\
  **</hibernate-mapping>**\n\n**注解映射如下：\n\n****package com.hibernaterecipes.annotations.domain;**\n\
  \n\n\n```java\nimport java.util.Date;\nimport javax.persistence.Column;\nimport\
  \ javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport javax.persistence.GenerationType;\n\
  import javax.persistence.Id;\nimport javax.persistence.Table;\nimport org.hibernate.annotations.AccessType;\n\
  ```\n\n/**\n\n第 2 章 ■ 基本映射与对象标识\n\n* @author Guruzu\n\n*\n\n*/\n\n@Entity\n\n@org.hibernate.annotations.Entity(dynamicInsert\
  \ = true, dynamicUpdate = true)\n\n@Table (name=\"BOOK\")\n\npublic class BookCh2\
  \ {\n\n    @Id\n\n    @GeneratedValue (strategy=GenerationType.TABLE)\n\n    @Column\
  \ (name=\"ISBN\")\n\n    private long isbn;\n\n    @Column (name=\"book_Name\")\n\
  \n    private String bookName;\n\n    @Column (name=\"publish_date\")\n\n    private\
  \ Date publishDate;\n\n    @Column (name=\"price\")\n\n    private Long price;\n\
  \n    // getters and setters\n\n}\n\n将 **dynamic-insert** 属性设置为 **true** 后，Hibernate\
  \ 在 **INSERT** 操作期间*不会*包含属性（即应用程序未设置的属性）的 null 值。将 **dynamic-update** 属性设置为 true\
  \ 后，Hibernate 在 **UPDATE** 操作期间*不会*包含未修改的属性。\n\n2.5 在 Hibernate 中为实体命名\n\n问题\n\n\
  当两个实体同名时，如何区分它们？**hibernate-mapping** 元素中的 **Package** 属性有什么用途？\n\n解决方案\n\n关闭 **auto-import**\
  \ 选项可以防止 Hibernate 在启动时加载类名。你可以使用 **import** 元素（**hibernate-mapping** 的子元素）将实体重命名为更独特的名称。**package**\
  \ 选项让你在每次访问实体时无需输入完整的包名。\n\n第 2 章 ■ 基本映射与对象标识\n\n工作原理\n\n在 **Book.xml** 映射文件中，将\
  \ **auto-import** 设置为 false，提供包名，并添加 **import** 元素，如下所示：\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate\
  \ Mapping DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >\n<hibernate-mapping package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\"\
  \ >\n    <import class=\"BookCh2\" rename=\"bkch2\"/>\n    <class name=\"BookCh2\"\
  \ table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\">\n        <id name=\"\
  isbn\" column=\"isbn\" type=\"long\">\n            <generator class=\"native\">\n\
  \            </generator>\n        </id>\n        <property name=\"name\" type=\"\
  string\" column=\"BOOK_NAME\" />\n        <property name=\"publishDate\" type=\"\
  date\" column=\"PUBLISH_DATE\" />\n        <property name=\"price\" type=\"int\"\
  \ column=\"PRICE\" />\n    </class>\n</hibernate-mapping>\n```\n\n现在，你可以按如下方式访问该实体：\n\
  \n```java\npackage com.hibernaterecipes.chapter2;\n\nimport java.util.List;\nimport\
  \ org.hibernate.Session;\nimport org.hibernate.SessionFactory;\nimport org.hibernate.Transaction;\n\
  import org.hibernate.cfg.Configuration;\n\npublic class Launch_2_4 {\n    private\
  \ static SessionFactory sessionFactory;\n\n    public static Session getSession()\
  \ {\n        if(sessionFactory == null)\n        {\n            sessionFactory =\
  \ new Configuration().configure()\n                    .buildSessionFactory();\n\
  \        }\n        Session hibernateSession = sessionFactory.openSession();\n \
  \       return hibernateSession;\n    }\n\n    public static void main(String[]\
  \ args) {\n        Session session = getSession();\n        List<BookCh2> booksList\
  \ = session.createQuery(\"from bkch2\").list();\n        for(BookCh2 bo : booksList)\n\
  \        {\n```\n\n第 2 章 ■ 基本映射与对象标识\n\n```java\n            System.out.println(bo);\n\
  \        }\n        session.close();\n    }\n}\n```\n\n在 JPA 实体中，你需要添加以下内容：\n\n\
  ```java\n@Entity (name=\"bkch2\")\n@org.hibernate.annotations.Entity(dynamicInsert\
  \ = true, dynamicUpdate = true)\n@Table (name=\"BOOK\")\npublic class BookCh2 {\n\
  \    //所有常规字段\n}\n```\n\n然后，**BookDAO** 类可以使用该实体名称来访问它：\n\n/**\n\n\n\n*** Book DAO**\n\
  \n***/**\n\n**package com.hibernaterecipes.annotations.dao.ch2;**\n\n****import\
  \ java.util.List;**\n\n****import javax.persistence.Query;**\n\n**import javax.persistence.EntityManager;**\n\
  \n**import javax.persistence.EntityTransaction;**\n\n**import org.hibernate.Session;**\n\
  \n**import com.hibernaterecipes.annotations.dao.SessionManager;**\n\n**import com.hibernaterecipes.annotations.domain.BookCh2;**\n\
  \n******/****\n\n*** @author Guruzu**\n\n*****\n\n***/**\n\n**public class BookDAO\
  \ {**\n\n****/****\n\n*** 查询一本书的所有详细信息**\n\n*** @return**\n\n***/**\n\n**public\
  \ List<BookCh2> readAll() {**\n\n****Session session = SessionManager.getSessionFactory().getCurrentSession();**\n\
  \n****session.beginTransaction();**\n\n**List<BookCh2> booksList = session.createQuery(\"\
  from bkch2\").list(); 47\n\n第 2 章 ■ 基本映射与对象标识\n\n****session.getTransaction().commit();**\n\
  \n****return booksList;**\n\n**}**\n\n****public List<BookCh2> readFromManager()\
  \ {**\n\n****EntityManager manager = SessionManager.getEntityManager();**\n\n**EntityTransaction\
  \ tran = manager.getTransaction();**\n\n**tran.begin();**\n\nQuery query = manager.createQuery(\"\
  select b from bkch2 b\");\n\n**List<BookCh2> list = query.getResultList();**\n\n\
  **return list;**\n\n**}**\n\n**}**\n\n总结\n\n在本章中，你学习了如何以及何时使用各种标识符生成器。本章还演示了复合键的实现。你已经了解了\
  \ Hibernate 如何保存持久化实体并在数据库中创建新记录。并且你学会了如何使用像 **dynamic-insert** 和 **dynamic-update**\
  \ 这样的元数据来配置你的持久化机制。\n\n**第 3 章**\n\n■ ■ ■\n\n**组件映射**\n\nHibernate 使得采用细粒度领域模型变得简单。这意味着你可以拥有比表更多的类。换句话说，你可以将表中的一条记录映射到多个类。这是通过让一个类属于**实体**类型，而其他类属于**值**类型来实现的。\n\
  \nHibernate 将对象分为**实体**类型和**值**类型。**实体**类型的对象是一个独立的实体，拥有自己的生命周期。它有自己的主键，因此也有自己的数据库标识。**值**类型没有标识符。**值**类型属于某个实体。**值**类型对象的生命周期受所属实体实例的生命周期约束。当持久化一个**值**类型时，该**值**类型的状态会被持久化到所属实体的表行中。Hibernate\
  \ 使用 **component** 元素，而 JPA 则使用 **@Embeddable** 和 **@Embedded** 注解来实现细粒度模型。本章将详细介绍其实现细节。\n\
  \n3.1 将值类型实现为组件\n\n问题\n\n如何创建一个组件？如何创建一个细粒度的对象模型来映射关系模型中的单行数据？\n\n解决方案\n\n**组件**元素（**<Component>**\
  \ ）用于映射**值**类型对象。你从“组合”（*Composition*）一词中得到**名称**组件，因为该组件包含在一个实体中。在 JPA 的情况下，则使用可嵌入和嵌入注解。\n\
  \n工作原理\n\n我们将在下面的章节中探讨 Hibernate 和 JPA 如何解决这个问题。然而，两种解决方案都需要一个新的订单表。使用以下 **CREATE**\
  \ 语句创建一个名为 **ORDERS** 的新表：\n\n****CREATE TABLE ORDERS (id bigint NOT NULL, WEEKDAY_RECIPIENT\
  \ varchar(100),WEEKDAY_PHONE**\n\n**varchar(100),WEEKDAY_ADDRESS varchar(100), HOLIDAY_RECIPIENT\
  \ varchar(100),HOLIDAY_PHONE**\n\n**varchar(100),HOLIDAY_ADDRESS varchar(100),PRIMARY\
  \ KEY (id));**\n\n第 3 章 ■ 组件映射\n\n使用 Hibernate XML 映射\n\n在在线书店应用中，客户可以下订单购买一些书籍。你的员工处理订单并配送书籍。客户可以为不同时间段（工作日和节假日）指定不同的收件人和联系方式。\n\
  \n首先，你向应用添加一个新的持久化类 **Orders**：\n\n****package com.hibernaterecipes.chapter3;**\n\
  \n****import com.hibernaterecipes.bookstore.Book;**\n\n****/****\n\n*** @author\
  \ Guruzu**\n\n*****\n\n***/**\n\n**public class Orders {**\n\n****private Long id;**\n\
  \n**private BookCh2 book;**\n\n**private String weekdayRecipient;**\n\n**private\
  \ String weekdayPhone;**\n\n**private String weekdayAddress;**\n\n**private String\
  \ holidayRecipient;**\n\n**private String holidayPhone;**\n\n**private String holidayAddress;**\n\
  \n****// getters and setters**\n\n**}**\n\n**然后，你为这个持久化类创建一个映射定义。你像往常一样映射该类的属性：\n\
  \n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter3\">**\n\n**<class name=\"Orders\" table=\"\
  ORDERS\">**\n\n**<id name=\"id\" type=\"long\" column=\"ID\">**\n\n**<generator\
  \ class=\"native\" />**\n\n**</id>**\n\n**<property name=\"weekdayRecipient\" type=\"\
  string\" column=\"WEEKDAY_RECIPIENT\" />**\n\n**<property name=\"weekdayPhone\"\
  \ type=\"string\" column=\"WEEKDAY_PHONE\" />**\n\n**<property name=\"weekdayAddress\"\
  \ type=\"string\" column=\"WEEKDAY_ADDRESS\" />**\n\n**<property name=\"holidayRecipient\"\
  \ type=\"string\" column=\"HOLIDAY_RECIPIENT\" />**\n\n**<property name=\"holidayPhone\"\
  \ type=\"string\" column=\"HOLIDAY_PHONE\" />**\n\n**<property name=\"holidayAddress\"\
  \ type=\"string\" column=\"HOLIDAY_ADDRESS\" />**\n\n**<many-to-one name=\"book\"\
  \ class=\"com.hibernaterecipes.chapter2.BookCh2\"**\n\n**column=\"isbn\" cascade=\"\
  save-update\"/>**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n**50\n\n第 3 章 ■\
  \ 组件映射\n\n你可能会觉得 **Orders** 类的设计不佳，因为 **recipient**、**phone** 和 **address** 属性在工作日和节假日是重复的。从面向对象的角度来看，你应该创建一个类（比如叫做\
  \ **Contact**）来封装它们：\n\n**package com.hibernaterecipes.chapter3;**\n\n****public\
  \ class Contact {**\n\n**private long id;**\n\n**private String recipient;**\n\n\
  **private String phone;**\n\n**private String address;**\n\n****// getters and setters**\n\
  \n**}**\n\n****package com.hibernaterecipes.chapter3;**\n\n****import com.hibernaterecipes.bookstore.Book;**\n\
  \n****public class Orders {**\n\n****private Long id;**\n\n**private Book book;**\n\
  \nprivate Contact weekdayContact;\n\nprivate Contact holidayContact;\n\n****// getters\
  \ and setters**\n\n**}**\n\n**现在 Java 方面的修改已经完成。但是如何修改 Hibernate 映射定义以反映这些变化呢？根据你学到的技术，你可以将\
  \ **Contact** 指定为一个新的持久化类，并使用一对一关联（最简单的方法是使用带有 **unique=\"true\"** 的 **<many-to-one>**\
  \ 关联）来关联 **Orders** 和 **Contact**：\n\n****<hibernate-mapping package=\" com.hibernaterecipes.chapter3\"\
  >**\n\n**<class name=\"Contact\" table=\"CONTACT\">**\n\n**<id name=\"id\" type=\"\
  long\" column=\"ID\">**\n\n**<generator class=\"native\" />**\n\n**</id>**\n\n**<property\
  \ name=\"recipient\" type=\"string\" column=\"RECIPIENT\" />**\n\n**<property name=\"\
  phone\" type=\"string\" column=\"PHONE\" />**\n\n**<property name=\"address\" type=\"\
  string\" column=\"ADDRESS\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\n\
  ****<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">**\n\n**<class\
  \ name=\"Orders\" table=\"ORDERS\">**\n\n**...**\n\n<many-to-one name=\"weekdayContact\"\
  \ class=\"Contact\" column=\"CONTACT_ID\"\n\nunique=\"true\" />\n\n<many-to-one\
  \ name=\"holidayContact\" class=\"Contact\" column=\"CONTACT_ID\"\n\n第 3 章 ■ 组件映射\n\
  \nunique=\"true\" />\n\n**</class>**\n\n**</hibernate-mapping>**\n\n\n\n**在这种情况下，将\
  \ **Contact** 类建模为独立的持久化类似乎没有必要。这是因为 **Contact** 对象一旦与订单对象分离就失去了意义。**Contact** 类的功能是提供某种逻辑分组。联系详情完全依赖于\
  \ **Orders** 类。对于书店应用程序而言，将联系信息作为独立实体（具有数据库标识或主键的实体）来保存并没有太大意义。对于这种可以将一个对象与一个依赖对象关联的需求，你可以使用\
  \ Hibernate 所谓的*组件*：\n\n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE\
  \ hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\
  **\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\">**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\
  \n**<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">**\n\n**<class\
  \ name=\"Orders\" table=\"ORDERS\">**\n\n**<id name=\"id\" type=\"long\" column=\"\
  ID\">**\n\n**<generator class=\"native\" />**\n\n**</id>**\n\n<component name=\"\
  weekdayContact\" class=\"Contact\">\n\n<property name=\"recipient\" type=\"string\"\
  \ column=\"WEEKDAY_RECIPIENT\" />\n\n<property name=\"phone\" type=\"string\" column=\"\
  WEEKDAY_PHONE\" />\n\n<property name=\"address\" type=\"string\" column=\"WEEKDAY_ADDRESS\"\
  \ />\n\n</component>\n\n<component name=\"holidayContact\" class=\"Contact\">\n\n\
  <property name=\"recipient\" type=\"string\" column=\"HOLIDAY_RECIPIENT\" />\n\n\
  <property name=\"phone\" type=\"string\" column=\"HOLIDAY_PHONE\" />\n\n<property\
  \ name=\"address\" type=\"string\" column=\"HOLIDAY_ADDRESS\" />\n\n</component>\n\
  \n**</class>**\n\n**</hibernate-mapping>**\n\n**没有引入新的持久化对象。为这些组件映射的所有列都与它们的父对象位于同一张表中。组件没有标识，并且仅当父对象存在时才存在。它们最适合将多个属性分组为单个对象。\n\
  \n使用 JPA 注解\n\n当使用 JPA 注解时，对于 **Contact** 类，你需要将该类注解为 **Embeddable**。\n\n你还需要将列映射到常规的默认数据库列：\n\
  \n****package com.hibernaterecipes.annotations.domain;**\n\n****import javax.persistence.Column;**\n\
  \n**import javax.persistence.Embeddable;**\n\n**import javax.persistence.Entity;**\n\
  \n**@Embeddable\n\n**public class Contact {**\n\n第 3 章 ■ 组件映射\n\n****private String\
  \ recipient;**\n\n**private String phone;**\n\n**private String address;**\n\n**/****\n\
  \n*** @return 收件人**\n\n***/**\n\n@Column (name = \"WEEKDAY_RECIPIENT\")\n\n**public\
  \ String getRecipient() {**\n\n**return recipient;**\n\n**}**\n\n**/****\n\n***\
  \ @param recipient 要设置的收件人**\n\n***/**\n\n**public void setRecipient(String recipient)\
  \ {**\n\n**this.recipient = recipient;**\n\n**}**\n\n**/****\n\n*** @return 电话**\n\
  \n***/**\n\n@Column (name = \"WEEKDAY_PHONE\")\n\n**public String getPhone() {**\n\
  \n**return phone;**\n\n**}**\n\n**/****\n\n*** @param phone 要设置的电话**\n\n***/**\n\
  \n**public void setPhone(String phone) {**\n\n**this.phone = phone;**\n\n**}**\n\
  \n**/****\n\n*** @return 地址**\n\n***/**\n\n@Column (name = \"WEEKDAY_ADDRESS\")\n\
  \n**public String getAddress() {**\n\n**return address;**\n\n**}**\n\n**/****\n\n\
  *** @param address 要设置的地址**\n\n***/**\n\n**public void setAddress(String address)\
  \ {**\n\n**this.address = address;**\n\n**}**\n\n**/* (非 Javadoc)**\n\n*** @see\
  \ java.lang.Object#toString()**\n\n***/**\n\n**@Override**\n\n**public String toString()\
  \ {**\n\n**return \"Contact [address=\" + address + \", phone=\" + phone**\n\n**+\
  \ \", recipient=\" + recipient + \"]\";**\n\n第 3 章 ■ 组件映射\n\n**}**\n\n****}**\n\n\
  **对于 **Orders** 类，你将工作日联系人注解为嵌入式。对于假日联系人，你将访问器注解为嵌入式，并覆盖 **Contact** 类中提供的值，如下所示：\n\
  \n****package com.hibernaterecipes.annotations.domain;**\n\n****import javax.persistence.AttributeOverride;**\n\
  \n**import javax.persistence.AttributeOverrides;**\n\n**import javax.persistence.Column;**\n\
  \n**import javax.persistence.Embedded;**\n\n**import javax.persistence.Entity;**\n\
  \n**import javax.persistence.GeneratedValue;**\n\n\n\n**import javax.persistence.GenerationType;**\n\
  \n**import javax.persistence.Id;**\n\n**import javax.persistence.Table;**\n\n**@Entity\n\
  \n@org.hibernate.annotations.Entity(dynamicInsert = true, dynamicUpdate = true)\n\
  \n@Table (name=\"ORDERS\")\n\n**public class Orders {**\n\n****private Long id;**\n\
  \n**private Contact weekdayContact;**\n\n**private Contact holidayContact;**\n\n\
  **/****\n\n*** @return the id**\n\n***/**\n\n**@Id**\n\n**@GeneratedValue (strategy=GenerationType.AUTO)**\n\
  \n**@Column (name=\"ID\")**\n\n**public Long getId() {**\n\n**return id;**\n\n**}**\n\
  \n**/****\n\n*** @param id the id to set**\n\n***/**\n\n**public void setId(Long\
  \ id) {**\n\n**this.id = id;**\n\n**}**\n\n****/****\n\n*** @return the weekdayContact**\n\
  \n***/**\n\n@Embedded\n\n**public Contact getWeekdayContact() {**\n\n**return weekdayContact;**\n\
  \n**}**\n\n**/****\n\n第 3 章 ■ 组件映射\n\n*** @param weekdayContact the weekdayContact\
  \ to set**\n\n***/**\n\n**public void setWeekdayContact(Contact weekdayContact)\
  \ {**\n\n**this.weekdayContact = weekdayContact;**\n\n**}**\n\n**/****\n\n*** @return\
  \ the holidayContact**\n\n***/**\n\n@Embedded\n\n@AttributeOverrides({@AttributeOverride(name=\"\
  recipient\",\n\ncolumn=@Column(name=\"HOLIDAY_RECIPIENT\")),\n\n@AttributeOverride(name=\"\
  phone\",\n\ncolumn=@Column(name=\"HOLIDAY_PHONE\")),\n\n@AttributeOverride(name=\"\
  address\",\n\ncolumn=@Column(name=\"HOLIDAY_ADDRESS\"))})\n\n**public Contact getHolidayContact()\
  \ {**\n\n**return holidayContact;**\n\n**}**\n\n**/****\n\n*** @param holidayContact\
  \ the holidayContact to set**\n\n***/**\n\n**public void setHolidayContact(Contact\
  \ holidayContact) {**\n\n**this.holidayContact = holidayContact;**\n\n**}**\n\n\
  **/* (non-Javadoc)**\n\n*** @see java.lang.Object#toString()**\n\n***/**\n\n**@Override**\n\
  \n**public String toString() {**\n\n**return \"Orders [holidayContact=\" + holidayContact\
  \ + \", id=\" + id**\n\n**+ \", weekdayContact=\" + weekdayContact + \"]\";**\n\n\
  **}**\n\n******}**\n\n3.2 嵌套组件\n\n问题\n\n如何在一个组件中嵌套另一个组件？\n\n解决方案\n\n组件可以被定义为*嵌套*的——即嵌入到其他组件中。根据\
  \ JPA 规范，仅要求支持一层嵌入。\n\n第 3 章 ■ 组件映射\n\n工作原理\n\n你可以将 **Phone** 属性定义为一个组件，并将其嵌入到 contact\
  \ 组件中：\n\n****package com.hibernaterecipes.chapter3;**\n\n**public class Phone {\n\
  \n****private String areaCode;**\n\n**private String telNo;**\n\n****// getters\
  \ and setters**\n\n**}**\n\n**将 **phone** 的类型从 **String** 改为 **Phone**。\n\n****package\
  \ com.hibernaterecipes.chapter3;**\n\n****public class Contact {**\n\n**private\
  \ String recipient;**\n\nprivate Phone phone;\n\n**private String address;**\n\n\
  ****// getters and setters**\n\n**}**\n\n**同时创建一个名为 **Orders.xml** 的新 XML 文件，并按如下所示添加嵌套组件：\n\
  \n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter3\">**\n\n**<class name=\"Orders\" table=\"\
  BOOK_ORDERS\">**\n\n**<id name=\"id\" type=\"long\" column=\"ID\">**\n\n**<generator\
  \ class=\"native\" />**\n\n**</id>**\n\n**<component name=\"weekdayContact\" class=\"\
  Contact\">**\n\n**<property name=\"recipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\"\
  \ />**\n\n<component name=\"phone\" class=\"Phone\">\n\n<property name=\"areaCode\"\
  \ type=\"string\" column=\"WEEKDAY_AREACODE\" />\n\n<property name=\"telNo\" type=\"\
  string\" column=\"WEEKDAY_TELEPHONE\" />\n\n</component>\n\n**<property name=\"\
  address\" type=\"string\" column=\"WEEKDAY_ADDRESS\" />**\n\n**</component>**\n\n\
  <component name=\"holidayContact\" class=\"Contact\">\n\n**<property name=\"recipient\"\
  \ type=\"string\" column=\"HOLIDAY_RECIPIENT\" />**\n\n<component name=\"phone\"\
  \ class=\"Phone\">\n\n<property name=\"areaCode\" type=\"string\" column=\"HOLIDAY_AREACODE\"\
  \ />\n\n<property name=\"telNo\" type=\"string\" column=\"HOLIDAY_TELEPHONE\" />\n\
  \n</component>\n\n第 3 章 ■ 组件映射\n\n**<property name=\"address\" type=\"string\" column=\"\
  HOLIDAY_ADDRESS\" />**\n\n</component>\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n\n\n**现在，将这个新的 XML 添加到 Hibernate XML 映射文件中。你可以在 main 方法中像这样使用嵌套组件：\n\n****package\
  \ com.hibernaterecipes.chapter3;**\n\n****import org.hibernate.Session;**\n\n**import\
  \ org.hibernate.SessionFactory;**\n\n**import org.hibernate.Transaction;**\n\n**import\
  \ org.hibernate.cfg.Configuration;**\n\n**import org.hibernate.stat.Statistics;**\n\
  \n****public class Launch {**\n\n**private static SessionFactory sessionFactory;**\n\
  \n****public static Session getSession() {**\n\n**if(sessionFactory == null)**\n\
  \n**{**\n\n**sessionFactory = new Configuration().configure()**\n\n**.buildSessionFactory();**\n\
  \n**}**\n\n**Session hibernateSession = sessionFactory.openSession();**\n\n**return\
  \ hibernateSession;**\n\n**}**\n\n**public static void main(String[] args) {**\n\
  \n**Session session = getSession();**\n\n**Statistics stats = sessionFactory.getStatistics();**\n\
  \n**stats.setStatisticsEnabled(true);**\n\n**Transaction tx = session.beginTransaction();**\n\
  \n**Orders ord = new Orders();**\n\n**Phone wdPhn = new Phone();**\n\n**Phone hlPhn\
  \ = new Phone();**\n\n**wdPhn.setAreaCode(\"480\");**\n\n**wdPhn.setTelNo(\"5463152\"\
  );**\n\n**hlPhn.setAreaCode(\"702\");**\n\n**hlPhn.setTelNo(\"5643569\");**\n\n\
  **Contact cnt = new Contact();**\n\n**Contact weekDayCnt = new Contact();**\n\n\
  **cnt.setAddress(\"132,vacation street, Miami, Fl - 23232\");**\n\n**cnt.setPhone(wdPhn);**\n\
  \n**cnt.setRecipient(\"John Doe 1\");**\n\n**weekDayCnt.setRecipient(\"John Doe\"\
  );**\n\n**weekDayCnt.setAddress(\"512364, Permanent home, Scottsdale, AZ - 85254\"\
  );** **weekDayCnt.setPhone(hlPhn);**\n\n**ord.setWeekdayContact(weekDayCnt);**\n\
  \n**ord.setHolidayContact(cnt);**\n\n**session.save(ord);**\n\n**tx.commit();**\n\
  \n第 3 章 ■ 组件映射\n\n**stats.getSessionOpenCount();**\n\n**stats.logSummary();**\n\n\
  **session.close();**\n\n****}**\n\n****}**\n\n3.3 在组件中添加引用\n\n问题\n\n如何添加对组件父对象的引用？如何在组件内提供关联？\n\
  \n解决方案\n\n你可以通过使用 **<parent>** 标签来添加对父对象的引用。组件标签允许与其他表建立多对一和一对一关联。\n\n工作原理\n\n一个组件可以通过\
  \ **<parent>** 映射来拥有对其父对象的引用：\n\n****public class Contact {**\n\nprivate Orders\
  \ order;\n\n**private String recipient;**\n\n**private Phone phone;**\n\n**private\
  \ String address;**\n\n**// 获取器和设置器**\n\n**}**\n\n**<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping PUBLIC**\n\n**\"-//Hibernate/Hibernate\
  \ Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.hibernaterecipes.chapter3\">**\n\n**<class name=\"Orders\" table=\"\
  ORDERS\">**\n\n**<id name=\"id\" type=\"long\" column=\"ID\">**\n\n**<generator\
  \ class=\"native\" />**\n\n**</id>**\n\n**<component name=\"weekdayContact\" class=\"\
  Contact\">**\n\n<parent name=\"order\" />\n\n**<property name=\"recipient\" type=\"\
  string\" column=\"WEEKDAY_RECIPIENT\" />**\n\n**<property name=\"phone\" type=\"\
  string\" column=\"WEEKDAY_PHONE\" />**\n\n**<property name=\"address\" type=\"string\"\
  \ column=\"WEEKDAY_ADDRESS\" />**\n\n**</component>**\n\n第 3 章 ■ 组件映射\n\n**<component\
  \ name=\"holidayContact\" class=\"Contact\">**\n\n<parent name=\"order\" />\n\n\
  **<property name=\"recipient\" type=\"string\" column=\"HOLIDAY_RECIPIENT\" />**\n\
  \n**<property name=\"phone\" type=\"string\" column=\"HOLIDAY_PHONE\" />**\n\n**<property\
  \ name=\"address\" type=\"string\" column=\"HOLIDAY_ADDRESS\" />**\n\n**</component>**\n\
  \n**</class>**\n\n**</hibernate-mapping>**\n\n**在 JPA 中，你添加对父实体的引用，并使用 **@Parent**\
  \ 注解访问器方法：\n\n****package com.hibernaterecipes.annotations.domain;**\n\n****import\
  \ javax.persistence.Column;**\n\n**import javax.persistence.Embeddable;**\n\n**import\
  \ javax.persistence.Entity;**\n\n****import org.hibernate.annotations.Parent;**\n\
  \n**@Embeddable\n\n**public class Contact {**\n\n****private String recipient;**\n\
  \n**private String phone;**\n\n**private String address;**\n\n**private Orders order;**\n\
  \n**@Parent\n\n**public Orders getOrder() {**\n\n**return order;**\n\n**}**\n\n\
  ****// 其他获取器和设置器**\n\n**}**\n\n**组件不仅可以用于对普通属性进行分组，还可以用于多对一和一对一关联。假设你想将订单的地址与客户数据库中的地址关联起来。为此，请使用以下查询创建一个地址表：\n\
  \n****CREATE TABLE ADDRESS (id bigint NOT NULL,STREET_ADDRESS_1 varchar(100),STREET_ADDRESS_2**\n\
  \n**varchar(100),CITY varchar(100),STATE varchar(2),ZIP_CODE INT,PRIMARY KEY (id))**\n\
  \n**现在，创建实体类和 Hibernate 映射 XML 文件：\n\n****package com.hibernaterecipes.chapter3;**\n\
  \n****public class Address {**\n\n**private Long id;**\n\n**private String address1;**\n\
  \n**private String address2;**\n\n**private String city;**\n\n第 3 章 ■ 组件映射\n\n**private\
  \ String state;**\n\n**private Integer zipCode;**\n\n****// 获取器和设置器**\n\n**}**\n\
  \n******<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping\
