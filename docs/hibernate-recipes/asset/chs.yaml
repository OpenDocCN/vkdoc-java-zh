  \n使用 JDBC 的问题\n\n使用 JDBC 意味着你可以执行任何类型的 SQL 语句。对于一个简单的任务，你必须重复编写许多**SELECT**、**INSERT**、**UPDATE**和**DELETE**语句。这会导致以下问题：\n\
  \n• *过多的复制代码：* 当执行对象检索时，你需要将**ResultSet**中的字段复制到对象的属性中。当执行对象持久化时，你需要将对象的属性复制到**PreparedStatement**的参数中。\n\
  \n• *手动处理关联：* 当执行对象检索时，你必须执行表连接或从多个表中读取数据以获取对象图。当执行对象持久化时，你必须相应地更新多个表。\n\n• *数据库依赖性：*\
  \ 你为一个数据库编写的 SQL 语句可能无法在另一种品牌的数据库上运行。虽然可能性很小，但你可能需要迁移到另一个数据库。\n\n1.3 配置 Hibernate\n\
  \n问题\n\n如何配置一个使用像 Hibernate 这样的对象/关系框架作为持久化框架的 Java 项目？如何以编程方式配置 Hibernate？\n\n\
  解决方案\n\nHibernate 是一个用于开发 Java 应用程序的强大 ORM 框架。你需要将所需的 jar 包导入到项目的类路径中，并创建映射文件，将\
  \ Java 实体的状态映射到其对应表的列。从你的 Java 应用程序中，你对对象实体执行 CRUD 操作。Hibernate 负责将对象状态从对象模型转换为关系模型。\n\
  \n工作原理\n\n要配置一个 Java 项目以使用 Hibernate 框架，你需要从下载所需的 jar 包并将其配置到构建路径开始。\n\n第 1 章 ■\
  \ 从 Hibernate 开始\n\n获取所需的 Jar 包\n\n你可以访问[**www.hibernate.org/**](http://www.hibernate.org)并下载\
  \ Hibernate Core 3.3.2。下载完压缩的 Hibernate 发行版后，将其解压到一个目录，例如**C:\\hibernate**。在 Eclipse\
  \ 中，转到 Windows  Preferences  Java  Build Path  User Libraries，添加一个名为**Hibernate**的自定义库，并将以下\
  \ jar 包添加到其中：\n\n****${Hibernate_Install_Dir}/hibernate3.jar**\n\n**${Hibernate_Install_Dir}/lib/antlr.jar**\n\
  \n**${Hibernate_Install_Dir}/lib/asm.jar**\n\n**${Hibernate_Install_Dir}/lib/asm-attrs.jars**\n\
  \n**${Hibernate_Install_Dir}/lib/cglib.jar**\n\n**${Hibernate_Install_Dir}/lib/commons-collections.jar**\n\
  \n**${Hibernate_Install_Dir}/lib/commons-logging.jar**\n\n**${Hibernate_Install_Dir}/lib/dom4j.jar**\n\
  \n**${Hibernate_Install_Dir}/lib/ehcache.jar**\n\n**${Hibernate_Install_Dir}/lib/jta.jar**\n\
  \n**${Hibernate_Install_Dir}/lib/log4j.jar**\n\n**以这种方式定义自定义库可以使其易于在其他项目中重用。如果你有另一个使用\
  \ Hibernate 的项目，可以将此用户库导入到该项目中。按照以下步骤将此用户库添加到项目的构建路径：\n\n1. 在 Eclipse 中右键单击你的项目。\n\
  2. 选择 BuildPath  Configure Build Path  Libraries 选项卡。\n3. 单击 Add Library 按钮。\n\
  4. 选择 User Library，然后单击 Next。\n5. 选择 Hibernate，然后单击 Finish。\n\n现在，自定义库已配置到项目的构建路径中。\n\
  \n创建映射定义\n\n首先，你让 Hibernate 为你检索和持久化 book 对象。为简单起见，我们暂时忽略 publisher 和 chapters。你在与**Book**类相同的包中创建一个\
  \ XML 文件**Book.hbm.xml**。这个文件被称为**Book**类的*映射定义*。**Book**对象被称为*持久化对象*或*实体*，因为它们可以持久化到数据库中，并代表现实世界中的实体：\n\
  \n****<?xml version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-mapping\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"**\n\n[**\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)\n\n**<hibernate-mapping\
  \ package=\"com.metaarchit.bookshop\">**\n\n**<class name=\"Book\" table=\"BOOK\"\
  >**\n\n**<id name=\"isbn\" type=\"string\" column=\"ISBN\" />**\n\n**<property name=\"\
  name\" type=\"string\" column=\"BOOK_NAME\" />**\n\n**<property name=\"publishDate\"\
  \ type=\"date\" column=\"PUBLISH_DATE\"/>** 13\n\n第 1 章 ■ 从 Hibernate 开始\n\n**<property\
  \ name=\"price\" type=\"int\" column=\"PRICE\" />**\n\n**</class>**\n\n**</hibernate-mapping>**\n\
  \n**每个持久化对象必须有一个标识符。Hibernate 用它来唯一标识该对象。在这里，你使用 ISBN 作为**Book**对象的标识符。\n\n配置\n\n\
  在 Hibernate 可以为你检索和持久化对象之前，你需要告诉它你的应用程序设置。\n\n例如，哪些类型的对象是持久化对象？你使用哪种数据库？你如何连接到数据库？你可以通过三种方式配置\
  \ Hibernate：\n\n• *编程式配置：* 使用 API 加载**hbm**文件，加载数据库驱动程序，并指定数据库连接详细信息。\n\n• *XML\
  \ 配置：* 在与**hbm**文件一起加载的 XML 文件中指定数据库连接详细信息。默认文件名是**hibernate.cfg.xml**。你可以通过显式指定名称来使用其他名称。\n\
  \n• *属性文件配置：* 这与 XML 配置类似，但使用**.properties**文件。默认名称是**hibernate.properties**。\n\n\
  本解决方案仅介绍前两种方法（编程式和 XML 配置）。属性文件配置与 XML 配置非常相似。\n\n编程式配置\n\n以下代码以编程方式加载配置。**Configuration**类提供了加载**hbm**文件、指定用于数据库连接的驱动程序以及提供其他连接详细信息的\
  \ API：\n\n****Configuration configuration = new Configuration()**\n\n**.addResource(\"\
  com/metaarchit/bookshop/Book.hbm.xml\")**\n\n**.setProperty(\"hibernate.dialect\"\
  , \"org.hibernate.dialect.DerbyDialect\")**\n\n**.setProperty(\"hibernate.connection.driver_class\"\
  , \"org.apache.derby.jdbc.EmbeddedDriver\")**\n\n**.setProperty(\"hibernate.connection.url\"\
  , \"jdbc:derby://localhost:1527/BookShopDB\")**\n\n**.setProperty(\"hibernate.connection.username\"\
  , \"book\")**\n\n**.setProperty(\"hibernate.connection.password\", \"book\");**\n\
  \n**SessionFactory factory = configuration.buildSessionFactory();**\n\n**除了使用**addResource()**添加映射文件，你还可以使用**addClass()**添加一个持久化类，并让\
  \ Hibernate 加载该类的映射定义：\n\n****Configuration configuration = new Configuration()**\n\
  \n**.addClass(com.metaarchit.bookshop.Book.class)**\n\n\n\n**.setProperty(\"hibernate.dialect\"\
  , \"org.hibernate.dialect.DerbyDialect\")**\n\n**.setProperty(\"hibernate.connection.driver_class\"\
  , \"org.apache.derby.jdbc.EmbeddedDriver\")**\n\n**.setProperty(\"hibernate.connection.url\"\
  , \"jdbc:derby://localhost:1527/BookShopDB\")**\n\n**.setProperty(\"hibernate.connection.username\"\
  , \"book\")**\n\n第 1 章 ■ 初识 Hibernate\n\n**.setProperty(\"hibernate.connection.password\"\
  , \"book\");**\n\n**SessionFactory factory = configuration.buildSessionFactory();**\n\
  \n**如果你的应用程序有成百上千个映射定义，你可以将它们打包成一个 jar 文件，并添加到 Hibernate 配置中。这个 jar 文件必须位于应用程序的类路径下：**Configuration\
  \ configuration = new Configuration()**\n\n**.addJar(new File(\"mapping.jar\"))**\n\
  \n**.setProperty(\"hibernate.dialect\", \"org.hibernate.dialect.DerbyDialect\")**\n\
  \n**.setProperty(\"hibernate.connection.driver_class\", \"org.apache.derby.jdbc.EmbeddedDriver\"\
  )**\n\n**.setProperty(\"hibernate.connection.url\", \"jdbc:derby://localhost:1527/BookShopDB\"\
  )**\n\n**.setProperty(\"hibernate.connection.username\", \"book\")**\n\n**.setProperty(\"\
  hibernate.connection.password\", \"book\");**\n\n**SessionFactory factory = configuration.buildSessionFactory();**\n\
  \nSessionFactory\n\n以下语句创建了一个 Hibernate **SessionFactory**：\n\n****SessionFactory\
  \ factory = configuration.buildSessionFactory();**\n\n**一个*会话工厂*是用于维护**org.hibernate.Session**对象的全局对象。它只被实例化一次，并且是线程安全的。你可以从**ApplicationServer**或其他任何位置的\
  \ Java 命名和目录接口（JNDI）上下文中查找**SessionFactory**。\n\nXML 配置\n\n另一种配置 Hibernate 的方式是使用\
  \ XML 文件。你在源目录中创建**hibernate.cfg.xml**文件，这样 Eclipse 会将其复制到类路径的根目录下：\n\n****<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>**\n\n**<!DOCTYPE hibernate-configuration\
  \ PUBLIC**\n\n**\"-//Hibernate/Hibernate Configuration DTD 3.0//EN\"**\n\n[**\"\
  http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd\">**](http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd)\n\
  \n**<hibernate-configuration>**\n\n**<session-factory>**\n\n**<property name=\"\
  connection.driver_class\">**\n\n**org.apache.derby.jdbc.EmbeddedDriver**\n\n**</property>**\n\
  \n**<property name=\"connection.url\">jdbc:derby://localhost:1527/BookShopDB</property>**\n\
  \n**<property name=\"connection.username\">book</property>**\n\n**<property name=\"\
  connection.password\">book</property>**\n\n**<property name=\"dialect\">org.hibernate.dialect.DerbyDialect</property>**\n\
  \n**<mapping resource=\"com/metaarchit/bookshop/Book.hbm.xml\" />**\n\n**</session-factory>**\n\
  \n**</hibernate-configuration>**\n\n**现在，构建会话工厂的代码片段可以简化。配置从类路径的根目录加载你的**hibernate.cfg.xml**文件：\n\
  \n**15\n\n第 1 章 ■ 初识 Hibernate\n\n**Configuration configuration = new Configuration().configure();**\n\
  \n**此方法从根类路径加载默认的**hibernate.cfg.xml**。**new Configuration()**加载**hibernate.properties**文件，而**configure()**方法在未找到**hibernate.properties**时加载**hibernate.cfg.xml**。如果你需要加载位于其他位置（不在根类路径中）的配置文件，可以使用以下代码：\n\
  \n****new Configuration().configure(\"/config/recipes.cfg.xml\")**\n\n**此代码会在类路径的**config**子目录中查找**recipes.cfg.xml**。\n\
  \n打开和关闭会话\n\n一个 Hibernate **Session**对象代表一个工作单元，并绑定到当前线程。它代表数据库中的一个事务。当在当前线程上首次调用**getCurrentSession()**时，会话开始。**Session**对象随后被绑定到当前线程。当事务以提交或回滚结束时，Hibernate\
  \ 会将会话从线程中解除绑定并关闭它。\n\n\n\n就像使用 JDBC 时需要做一些初始化清理工作一样，使用 Hibernate 也需要。首先，你需要让会话工厂为你打开一个新的会话。完成工作后，必须记得关闭会话：\n\
  \n**Session session = factory.openSession();**\n\n**try {**\n\n**// 使用会话检索对象**\n\
  \n**}catch(Exception e)**\n\n**{**\n\n**e.printStackTrace();**\n\n**} finally {**\n\
  \n**session.close();**\n\n**}**\n\n检索对象\n\n给定一本书的 ID（此处为 ISBN），你可以从数据库中检索唯一的 **Book**\
  \ 对象。\n\n有两种方法可以实现：\n\n**Book book = (Book) session.load(Book.class, isbn);**\n\n\
  **以及**\n\n**Book book = (Book) session.get(Book.class, isbn);**\n\n**load()** 和\
  \ **get()** 有什么区别？首先，当给定的 ID 找不到时，**load()** 会抛出异常 **org.hibernate.ObjectNotFoundException**，而\
  \ **get()** 则返回 null 对象。其次，**load()** 默认只返回一个代理；直到首次调用该代理时才会访问数据库。**get()** 会立即访问数据库。当你只需要一个代理而不需要发起数据库调用时，**load**\
  \ 方法非常有用。当你在某个会话中需要在持久化之前关联一个实体时，你只需要一个代理。\n\n第 1 章 ■ 开始使用 Hibernate\n\n就像你可以使用\
  \ SQL 查询数据库一样，你也可以使用 Hibernate 通过 Hibernate 查询语言（HQL）来查询对象。例如，以下代码查询所有 **Book**\
  \ 对象：**Query query = session.createQuery(\"from Book\");**\n\n**List books = query.list();**\n\
  \n**如果你确定只有一个对象会匹配，可以使用 **uniqueResult()** 方法来检索唯一的结果对象：\n\n**Query query = session.createQuery(\"\
  from Book where isbn = ?\");**\n\n**query.setString(0, isbn);**\n\n**Book book =\
  \ (Book) query.uniqueResult();**\n\n1.4 配置 JPA 项目\n\n问题\n\n如何管理 ORM 所需的元数据？除了在 XML\
  \ 文件中指定元数据之外，还能使用其他机制吗？如何配置一个 JPA 项目？\n\n解决方案\n\nEJB3.0 规范定义了 Java 持久化 API（JPA），它通过使用\
  \ Java 领域模型来管理关系数据库，从而提供 ORM 功能。不同的供应商实现了这个 API：\n\n• *TopLink:* 这是一个目前由 Oracle\
  \ 拥有的 Java ORM 解决方案。以下是关于 TopLink 更多详情的网址：\n\n[**www.oracle.com/technology/products/ias/toplink/index.html**。](http://www.oracle.com/technology/products/ias/toplink/index.html)\n\
  \n• *JDO:* JDO API 是一种基于标准接口的 Java 模型持久化抽象，由 Java 社区流程开发。当前的 JDO 2.0 是 Java 规范请求\
  \ 243。从 JDO 2.0 开始，该 API 的开发在 Apache JDO 开源项目中进行。\n\n• *Hibernate:* 这是一个非常流行的 ORM\
  \ 框架。Hibernate 提供了 Hibernate 注解，它实现了 JPA 标准，同时也提供了更高级的映射特性。我们将演示如何配置一个使用 Hibernate\
  \ 注解的 JPA 项目。\n\n工作原理\n\n要使用 Hibernate 注解，请从 Hibernate 网站下载 **HibernateAnnotation**\
  \ 包：\n\n[**www.hibernate.org/6.html**。](http://www.hibernate.org/6.html)除了 Hibernate\
  \ 核心 jar 文件之外，以下 jar 文件也需要放在你的 Eclipse 项目构建路径中：\n\n第 1 章 ■ 开始使用 Hibernate\n\n• **hibernate-annotations.jar**\n\
  \n• **lib/hibernate-comons-annotations.jar**\n\n• **lib/ejb3-persistence.jar**\n\
  \n在 **hibernate.cfg.xml** 中配置会话工厂。（注意，如果你将此文件的名称更改为 **hibernate.cfg.xml** 以外的任何名称，则必须以编程方式上传该文件。）**dialect**\
  \ 属性用于定义数据库的名称。这使得 Hibernate 能够生成针对特定关系数据库优化的 SQL。本例中你使用 Derby 作为数据库，因此使用 **org.hibernate.dialect.DerbyDialect**。此外，如果你更换了数据库——例如，从\
  \ Derby 换成 Oracle——则必须将值从 **org.hibernate.dialect.DerbyDialect** 改为\n\n\n\n**org.hibernate.dialect.Oracle9Dialect**。这就是使用\
  \ Hibernate 实现可移植性的方式。Hibernate 支持的一些常见方言如下：\n\n• DB2Dialect（支持 DB2）\n• FrontBaseDialect\n\
  • HSQLDialect\n• InformixDialect\n• IngresDialect\n• InterbaseDialect\n• MySQLDialect\n\
  • Oracle8Dialect\n• Oracle9Dialect\n• Oracle10Dialect\n• PointbaseDialect\n• PostgreSQLDialect\n\
  • ProgressDialect\n• ProgressDialect\n• SybaseDialect\n\n以下是数据库 BookShopDB 的示例配置：\n\
  \n**<?xml version='1.0' encoding='utf-8'?>**\n**<!DOCTYPE hibernate-configuration\
  \ PUBLIC**\n**\"-//Hibernate/Hibernate Configuration DTD 3.0//EN\"**\n[**\"http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd\"\
  >**](http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd)\n**<hibernate-configuration>**\n\
  **<session-factory>**\n**<!-- 数据库连接设置 -->**\n**<property name=\"connection.driver_class\"\
  >**\n**org.apache.derby.jdbc.EmbeddedDriver**\n第 1 章 ■ HIBERNATE 入门\n**</property>**\n\
  **<property name=\"connection.url\">**\n**jdbc:derby://localhost:1527/BookShopDB**\n\
  **</property>**\n**<property name=\"connection.username\">book</property>**\n**<property\
  \ name=\"connection.password\">book</property>**\n**<!-- JDBC 连接池（使用内置连接池） -->**\n\
  **<property name=\"connection.pool_size\">1</property>**\n**<!-- SQL 方言 -->**\n\
  **<property name=\"dialect\">**\n**org.hibernate.dialect.DerbyDialect**\n**</property>**\n\
  **<!-- 启用 Hibernate 的自动会话上下文管理 -->**\n**<property name=\"current_session_context_class\"\
  >thread</property>**\n**<!-- 禁用二级缓存 -->**\n**<property name=\"cache.provider_class\"\
  >**\n**org.hibernate.cache.NoCacheProvider**\n**</property>**\n**<!-- 将所有执行的 SQL\
  \ 输出到标准输出 -->**\n**<property name=\"show_sql\">true</property>**\n**<!-- 启动时删除并重新创建数据库模式\
  \ -->**\n**<!-- property name=\"hbm2ddl.auto\">update</property> -->**\n**<mapping\
  \ class=\"com.hibernaterecipes.annotations.domain.Book\"/>**\n**</session-factory>**\n\
  **</hibernate-configuration>**\n\n当您使用注解时，不需要额外的映射文件（***.hbm.xml**）。ORM 的元数据在单独的类中指定。您只需要在\
  \ **hibernate.cfg.xml** 中添加类映射。在上面的例子中，这一行\n\n**<mapping class=\"com.hibernaterecipes.annotations.domain.Book\"\
  />**\n\n负责处理类映射。接下来，让我们看看带有表名、列名和其他属性注解的 **Book.java**：\n\n**package com.hibernaterecipes.annotations.domain**;\n\
  **import java.util.Date**;\n**import javax.persistence.Column**;\n**import javax.persistence.*;**\n\
  **import javax.persistence.Entity**;\n**import javax.persistence.Table**;\n**/**\
  \ * @author Guruzu * */**\n**@Entity**\n**@Table (name=\"BOOK\")**\n第 1 章 ■ HIBERNATE\
  \ 入门\n**public class Book {**\n**@Column (name=\"isbn\")**\n**@Id**\n**String isbn;**\n\
  **@Column (name=\"book_Name\")**\n**String bookName;**\n**@Column (name=\"publisher_code\"\
  )**\n**String publisherCode;**\n**@Column (name=\"publish_date\")**\n**Date publishDate;**\n\
  **@Column (name=\"price\")**\n**Long price;**\n**/** * @return the isbn */**\n**public\
  \ String getIsbn() {**\n**return isbn;**\n**}**\n**/** * @param isbn the isbn to\
  \ set */**\n**public void setIsbn(String isbn) {**\n**this.isbn = isbn; }**\n**/**\
  \ * @return the bookName */**\n**public String getBookName() {**\n**return bookName;**\n\
  **}**\n**/** * @param bookName the bookName to set */**\n**public void setBookName(String\
  \ bookName) {**\n**this.bookName = bookName;**\n**}**\n**/** * @return the publisherCode\
  \ */**\n**public String getPublisherCode() {**\n**return publisherCode;**\n**}**\n\
  **/** * @param publisherCode the publisherCode to set */**\n**public void setPublisherCode(String\
  \ publisherCode) {**\n**this.publisherCode = publisherCode;**\n第 1 章 ■ HIBERNATE\
  \ 入门\n**}**\n**/** * @return the publishDate */ public Date getPublishDate() {**\n\
  **return publishDate;**\n**}**\n**/** * @param publishDate the publishDate to set\
  \ */**\n**public void setPublishDate(Date publishDate) {**\n**this.publishDate =\
  \ publishDate;**\n**}**\n**/** * @return the price */**\n**public Long getPrice()\
  \ {**\n**return price;**\n**}**\n**/** * @param price the price to set */**\n**public\
  \ void setPrice(Long price) {**\n**this.price = price;**\n**}**\n**}**\n\n\n\n***\
  \ @param publishDate 要设置的发布日期**\n\n***/**\n\n**public void setPublishDate(Date publishDate)\
  \ {**\n\n**this.publishDate = publishDate;**\n\n**}**\n\n**/****\n\n*** @return\
  \ 价格**\n\n***/**\n\n**public Long getPrice() {**\n\n**return price;**\n\n**}**\n\
  \n**/****\n\n*** @param price 要设置的价格**\n\n***/**\n\n**public void setPrice(Long\
  \ price) {**\n\n**this.price = price;**\n\n**}**\n\n****}**\n\n**@Entity** 由 EJB3.0\
  \ 规范定义，用于注解实体 Bean。实体代表一个轻量级的持久化领域对象。\n\n实体类必须有一个公共或受保护的无参构造方法。它也可以有其他构造方法。实体类应为顶层类，且不能是\
  \ final 类型。如果实体需要通过值传递（即通过远程接口），则必须实现 **Serializable**。\n\n实体的状态由其实例变量表示。实例变量只能从实体类内部访问。实体的客户端不应直接访问实体的状态。实例变量必须具有\
  \ private、protected 或 package 可见性。\n\n每个实体都必须有一个主键。主键在实体层次结构中只能声明一次。\n\n你可以使用 Eclipse\
  \ IDE 生成 set 和 get 方法。选择需要生成方法的实例变量，右键单击所选内容，然后选择 Source → Generate Getters and\
  \ Setters。此时会显示所有需要生成方法的变量。选择所需的变量，然后单击 OK。getter 和 setter 就会生成在你的源代码中。\n\n在前面的类中，表名\
  \ BOOK 是通过 **Table** 注解的 **name** 属性指定的。变量 **isbn** 是主键，由 **@Id** 标签指定。其余列由 **@column**\
  \ 注解指定。如果未指定 **@column** 注解，则实例变量的名称将被视为列名。除非指定了 **@Transient**，否则实体 Bean 的每个非静态且非瞬时的属性都被视为持久化属性。当你映射持久化属性时，**@Transient**\
  \ 属性会被 EntityManager 忽略。\n\n第 1 章 ■ 开始使用 Hibernate\n\n打开会话\n\n打开会话与在常规 Hibernate\
  \ 中打开会话类似，区别在于你需要使用 **AnnotationConfiguration** 来构建会话工厂：\n\n**public class SessionManager\
  \ {**\n\n****private static final SessionFactory sessionFactory = buildSessionFactory();**\n\
  \n****private static SessionFactory buildSessionFactory() {**\n\n**try {**\n\n**//\
  \ 从 hibernate.cfg.xml 创建 SessionFactory**\n\n**return new**\n\n********AnnotationConfiguration()**\n\
  \n**.configure().buildSessionFactory();**\n\n**}**\n\n**catch (Throwable ex) {**\n\
  \n**// 确保记录异常，因为它可能被吞掉** **ex.printStackTrace();**\n\n****throw new ExceptionInInitializerError(ex);**\n\
  \n**}**\n\n**}**\n\n****public static SessionFactory getSessionFactory() {**\n\n\
  **return sessionFactory;**\n\n**}**\n\n**}**\n\n如果配置文件名不是 **hibernate.cfg.xml**（在本例中，它被命名为\
  \ **annotation.cfg.xml**），则使用以下语句构建会话工厂：\n\n**new AnnotationConfiguration()**\n\n\
  **.configure(\"annotation.cfg.xml\")**\n\n**.buildSessionFactory();**\n\n还有其他重载的\
  \ **configure()** 方法可供你适当使用。\n\n本节使用数据访问对象（DAO）进行数据库操作。DAO 是一种设计模式，用于抽象和封装对数据源的所有访问。在本例中，它包含创建\
  \ **SessionFactory** 和 **Session** 对象以及从数据库中获取和更新数据的代码：\n\n**public **class **BookDAO\
  \ {****\n\n******/****\n\n*** 查询一本书的所有详细信息**\n\n***** @return\n\n***/**\n\n**public\
  \ **List<Book> readAll() {****\n\n**********Session session = SessionManager.**\
  \ *getSessionFactory***().getCurrentSession();** **session.beginTransaction();**\n\
  \n**List<Book> booksList = session.createQuery(\"from Book\").list();** 22\n\n第\
  \ 1 章 ■ 开始使用 Hibernate\n\n\n\n**session.getTransaction().commit();**\n\n**return\
  \ **booksList;****\n\n****}**\n\n****/****\n\n*** 创建一本书**\n\n***** @return\n\n***/**\n\
  \n**public **void **create(Book bookObj) {******\n\n********Session session=SessionManager.**\
  \ *getSessionFactory***().getCurrentSession();** **session.beginTransaction();**\n\
  \n**session.saveOrUpdate(bookObj);**\n\n**session.getTransaction().commit();**\n\
  \n****}**\n\n****}**\n\n**readAll** 方法从映射在 **hibernate.cfg.xml** 中的 BOOK 表中查询所有数据。**create**\
  \ 方法向 BOOK 表中插入新的一行。\n\n1.5 使用实体管理器\n\n问题\n\n是否存在一种通用机制来配置 ORM，从而减少对 Hibernate、TopLink\
  \ 等特定提供商的依赖？\n\n解决方案\n\nJPA 规范将*持久化上下文*定义为一组受管理的实体实例，其中实体实例及其生命周期由实体管理器管理。每个 ORM\
  \ 供应商都提供自己的实体管理器，它是对核心 API 的封装，因此支持 JPA 编程接口、JPA 实体实例生命周期以及查询语言。这为对象/关系开发与配置提供了一种通用机制。\n\
  \n工作原理\n\n您从实体管理器工厂获取 Hibernate EntityManager。当使用容器管理的实体管理器时，应用程序不会直接与实体管理器工厂交互。此类实体管理器主要通过\
  \ JNDI 查找获得。对于应用程序管理的实体管理器，应用程序必须使用实体管理器工厂来管理实体管理器和持久化上下文的生命周期。本示例使用应用程序管理的实体管理器。\n\
  \n**EntityManagerFactory** 与 Hibernate 中的 **SessionFactory** 角色相同。它充当工厂类，向应用程序提供\
  \ **EntityManager** 类。它可以通过编程方式或使用 XML 进行配置。当您使用 XML 进行配置时，文件必须命名为 **persistence.xml**，并且必须位于您的类路径中。\n\
  \n以下是 **Book** 示例的 **persistence.xml** 文件：\n\n****<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>**\n\n[**<persistence**](http://java.sun.com/xml/ns/persistence)\n\n[](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n****xsi:schemaLocation=**\n\n[**\"http://java.sun.com/xml/ns/persistence**](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n[**http://java.sun.com/xml/ns/persistence/persistence_1_0.xsd\"**](http://www.w3.org/2001/XMLSchema-instance)\n\
  \n**version=\"1.0\">**\n\n**<persistence-unit name=\"book\" transaction-type=\"\
  RESOURCE_LOCAL\">\n\n<provider>org.hibernate.ejb.HibernatePersistence</provider>\n\
  \n<class>com.hibernaterecipes.annotations.domain.Book</class>\n\n****<properties>**\n\
  \n**<property name=\"hibernate.connection.driver_class\"**\n\n**value=\"org.apache.derby.jdbc.EmbeddedDriver\"\
  />**\n\n**<property name=\"hibernate.connection.username\"**\n\n**value=\"book\"\
  />**\n\n**<property name=\"hibernate.connection.password\"**\n\n**value=\"book\"\
  />**\n\n**<property name=\"hibernate.connection.url\"**\n\n**value=\"jdbc:derby://localhost:1527/BookShopDB\"\
  />**\n\n**<property name=\"hibernate.dialect\"**\n\n**value=\"org.hibernate.dialect.DerbyDialect\"\
  />**\n\n**</properties>**\n\n**</persistence-unit>**\n\n**</persistence>**\n\n**在此\
  \ **persistence.xml** 文件中，整个单元由 **<persistence-unit>** 定义。此名称应与创建 **EntityManagerFactory**\
  \ 时使用的名称匹配。\n\n此处使用了事务类型 **RESOURCE_LOCAL**。两种事务类型定义了事务行为：JTA 和 **RESOURCE_LOCAL**。JTA\
  \ 用于 J2EE 管理的应用程序，其中容器负责事务传播。对于应用程序管理的事务，您可以使用 **RESOURCE_LOCAL**。\n\n**<provider>**\
  \ 标签指定您使用的第三方 ORM 实现。在此例中，它被配置为使用 Hibernate Persistence 提供程序。\n\n实体实例通过 **<class>**\
  \ 标签进行配置。\n\n\n\n其余属性与你之前在 **hibernate.cfg.xml** 中配置的内容类似，包括所连接数据库的驱动类、连接 URL、用户名、密码以及方言。\n\
  \n以下是从配置创建 **EntityManagerFactory**（EMF**）** 并从 EMF 获取 **EntityManager** 的代码：\n\n\
  ****package com.hibernaterecipes.annotations.dao;**\n\n****import javax.persistence.EntityManager;**\n\
  \n**import javax.persistence.EntityManagerFactory;**\n\n**import javax.persistence.Persistence;**\n\
  \n第 1 章 ■ 从 Hibernate 开始\n\n****public class SessionManager {**\n\n****public static\
  \ EntityManager getEntityManager() {**\n\n**EntityManagerFactory managerFactory\
  \ =**\n\n**Persistence.createEntityManagerFactory(\"book\");**\n\n**EntityManager\
  \ manager = managerFactory.createEntityManager();**\n\n****return manager;**\n\n\
  **}**\n\n**}**\n\n****Persistence.createEntityManagerFactory** 用于创建 EMF。它接受的参数是持久化单元的名称——在本例中为“book”。该名称应与\
  \ **persistence.xml** 文件中 **persistence-unit** 标签指定的名称一致：\n\n****<persistence-unit\
  \ name=\"book\" transaction-type=\"RESOURCE_LOCAL\">**\n\n实体实例 **Book** 与 JPA 中定义的一致：\n\
