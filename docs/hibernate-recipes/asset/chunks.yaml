    \n## 1.5 Using Entity Manager\n\n### Problem\n\nIs there a generalized mechanism\
    \ to configure ORM with less dependency on individual providers like Hibernate,\
    \ TopLink, and so on?\n\n### Solution\n\nA *persistence context* is defined by\
    \ the JPA specification as a set of managed entity instances where the entity\
    \ instances and their lifecycles are managed by an entity manager. Each ORM vendors\
    \ provides its own entity manager, which is a wrapper around the core API and\
    \ thus supports the JPA programming interfaces, JPA entity instance lifecycles,\
    \ and the query language. This provides a generalized mechanism for object/relational\
    \ development and configuration.\n\n### How It Works\n\nYou obtain the Hibernate\
    \ EntityManager from an entity manager factory. When container-managed entity\
    \ managers are used, the application doesn’t interact directly with the entity\
    \ manager factory. Such entity managers are obtained mostly through JNDI lookup.\
    \ In the case of application-managed entity managers, the application must use\
    \ the entity manager factory to manage the entity manager and the persistence\
    \ context lifecycle. This example uses the application-managed entity manager.\n\
    \n`EntityManagerFactory` has the same role as the `SessionFactory` in Hibernate.\
    \ It acts a factory class that provides the `EntityManager` class to the application.\
    \ It can be configured either programmatically or using XML. When you use XML\
    \ to configure it, the file must be named `persistence.xml` and must be located\
    \ in your classpath.\n\nHere’s the `persistence.xml` file for the `Book` example:\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<persistence xmlns=\"http://java.sun.com/xml/ns/persistence\"\
