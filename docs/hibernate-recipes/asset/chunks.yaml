    3.4 Mapping a Collection of Components


    Problem


    Does Hibernate support mapping a collection of dependent objects? How do you map
    a collection of components?


    Solution


    Hibernate provides **<composite-element>** for mapping a collection of components.
    The collection elements/tags **<set>** , **<list>** , **<map>** , **<bag>** ,
    and **<idbag>** can accommodate the **<composite-element>** to map a collection
    of dependent objects.


    How It Works'
