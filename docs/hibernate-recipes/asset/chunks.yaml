  trans: "\n*   **按具体类联合（Table per concrete class with unions）：** 超类可以是抽象类，甚至可以是接口。如果超类是具体类，则需要一个额外的表来映射该类的属性。\n\
    \n*   **按具体类隐式多态（Table per concrete class with implicit polymorphism）：** 每个表都包含具体类的所有属性以及从其超类继承的属性。在这里，所有子类都被映射为独立的实体。\n\
    \n*本章将详细讨论这些策略，并展示如何实现它们。\n\n所有持久化实体的属性都属于特定类型，例如 `String`。Hibernate 支持的一些重要基本类型如下：\n\
    \n*   `integer`、`long`、`short`、`float`、`double`、`character`、`byte`、`boolean`、`yes_no`\
    \ 和 `true_false`。用于 Java 基本类型和包装类的类型映射。\n*   `string`。从 `java.lang.String` 到类似\
    \ `VARCHAR` 的类型映射。\n*   `date`、`time` 和 `timestamp`。从 `java.util.Date` 及其子类到相应\
    \ SQL 类型的类型映射。\n\nHibernate 支持的其他基本映射包括 `calendar`、`calendar_date`、`big_decimal`、`big_integer`、`locale`、`timezone`、`currency`、`class`、`binary`、`text`\
    \ 和 `serializable`。Hibernate 还提供了一个 API 来实现你自己的自定义类型。你可以使用 `org.hibernate.type`\
    \ 和 `org.hibernate.userType` 这两个包来定义对象类型。你可以通过直接实现 `org.hibernate.type.Type`，或扩展\
    \ `org.hibernate.type` 包中提供的某个抽象类，或实现 `org.hibernate.userType` 包中的某个接口来定义自己的自定义类型。本章将讨论\
    \ Hibernate 的 `org.hibernate.userType` 包中可用的自定义映射类型。你将了解 `userType` 和 `CompositeUserType`\
    \ 扩展的实现细节。\n\n### 4.1 使用每个类层次结构一张表映射实体\n\n#### 问题\n\n如何使用每个类层次结构一张表的策略来映射实体？以及何时应该使用它？\n\
    \n#### 解决方案\n\n要使用每个类层次结构一张表的策略，你需要创建一个包含完整类层次结构状态的单一表。关键在于，子类的状态不能有非空约束。这是一个缺点，因为数据完整性会受到影响。由于所有状态都在同一个表中，因此这是一个非规范化的模型。\n\
    \n使用此策略，你可以获得在多态和非多态查询中都具有良好性能的优势。在关系模型中对类层次结构进行非规范化可能会导致数据稳定性和可维护性问题，因此最好与你的\
    \ DBA 沟通一下。\n\n你将使用书店中的音频和视频部分来了解继承映射。假设你的书店也销售 CD 和 DVD。图 4-1 显示了你要映射为每个类层次结构一张表的对象模型的类图。\n\
    \n*图 4-1. 对象模型的类图*\n\n首先，创建一个 `Disc` 类并为其提供映射定义：\n\n```java\npublic class Disc\
    \ {\n\n    private Long id;\n\n    private String name;\n\n    private Integer\
    \ price;\n\n    // Getters and Setters\n\n}\n```\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\">\n\n    <class\
    \ name=\"Disc\" table=\"Disc_1\">\n\n        <id name=\"discId\" type=\"long\"\
    \ column=\"DISC_ID\">\n\n            <generator class=\"native\"/>\n\n       \
    \ </id>\n\n        <discriminator column=\"DISC_TYPE\" type=\"string\" />\n\n\
    \        <property name=\"name\" type=\"java.lang.String\" column=\"NAME\" />\n\
    \n        <property name=\"price\" type=\"java.lang.Integer\" column=\"PRICE\"\
    \ />\n\n    </class>\n\n</hibernate-mapping>\n```\n\n你主要销售两种光盘：音频光盘和视频光盘。每种光盘都有不同的属性。\n\
    \n从面向对象的角度来看，你应该将这两种光盘 `AudioDisc` 和 `VideoDisc` 建模为 `Disc` 的*子类*，以表示“是一个”关系。在\
    \ Java 中，你使用 `extends` 关键字来定义一个类的子类。相反，类 `Disc` 被称为 `AudioDisc` 和 `VideoDisc`\
    \ 的*超类*或*父类*：\n\n```java\npublic class AudioDisc extends Disc {\n```"
- fmt: "```java\nprivate String singer;\n\nprivate Integer numOfSongs;\n\n// Getters\
    \ and Setters\n\n}\n\npublic class VideoDisc extends Disc {\n\nprivate String\
    \ director;\n\nprivate String language;\n\n// Getters and Setters\n\n}\n```\n\n\
    The relationship between a subclass (such as `AudioDisc` or `VideoDisc`) to its\
    \ parent class (`Disc`) is called *inheritance*. All the subclasses and their\
    \ parents make up a *class hierarchy*. A relational model has no concept of inheritance—that\
    \ means you must define a mapping mechanism to persist the inheritance relationships\
    \ of your object model.\n\nFor the disc hierarchy, you can use the following query\
    \ to find all the discs in your system, both audio and video. This kind of query\
    \ is called a *polymorphic query*:\n\n```java\nSession session = factory.openSession();\n\
    try {\n    Query query = session.createQuery(\"from Disc\");\n    List discs =\
    \ query.list();\n    return discs;\n} finally {\n    session.close();\n}\n```\n\
    \nSuppose you want to support disc reservation for your online bookshop. You can\
    \ create a class `Reservation` and define a many-to-one association to the `Disc`\
    \ class. Because the concrete class of the disc may be `AudioDisc` or `VideoDisc`,\
    \ and this can only be determined at runtime, this kind of association is called\
    \ *polymorphic association*:\n\n```java\npublic class Reservation {\n    private\
    \ Long id;\n    private Disc disc;\n    private Customer customer;\n    private\
    \ int quantity;\n}\n```\n\n## How It Works\n\nIn Hibernate, the `subclass` element\
    \ is used to create a table per class hierarchy mapping. The `discriminator` element\
    \ is used to associate the subclasses with the superclass. The following query\
    \ creates the table:\n\n```sql\nCREATE TABLE \"BOOK\".\"DISC_1\"\n( \"DISC_ID\"\
    \ BIGINT NOT NULL ,\n  \"NAME\" VARCHAR(250 ) NOT NULL ,\n  \"PRICE\" BIGINT,\n\
    \  \"DISC_TYPE\" VARCHAR(50),\n  \"SINGER\" VARCHAR(50),\n  \"NO_OF_SONGS\" BIGINT,\n\
    \  \"DIRECTOR\" VARCHAR(50),\n  \"LANGUAGE\" VARCHAR(50),\n  CONSTRAINT \"DISC_1_PK\"\
    \ PRIMARY KEY (\"DISC_ID\") );\n```\n\nThe Hibernate mapping file looks like this:\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\"\
    >\n    <class name=\"Disc\" table=\"Disc_1\">\n        <id name=\"discId\" type=\"\
    long\" column=\"DISC_ID\">\n            <generator class=\"native\"/>\n      \
    \  </id>\n        <discriminator column=\"DISC_TYPE\" type=\"string\" />\n   \
    \     <property name=\"name\" type=\"java.lang.String\" column=\"NAME\" />\n \
    \       <property name=\"price\" type=\"java.lang.Integer\" column=\"PRICE\" />\n\
    \        <subclass name=\"AudioDisc\" discriminator-value=\"AUDIO\">\n       \
    \     <property name=\"singer\" type=\"java.lang.String\" column=\"SINGER\" />\n\
    \            <property name=\"noOfSongs\" type=\"java.lang.Integer\" column=\"\
    NO_OF_SONGS\" />\n        </subclass>\n        <subclass name=\"VideoDisc\" discriminator-value=\"\
    VIDEO\">\n            <property name=\"director\" type=\"java.lang.String\" column=\"\
    DIRECTOR\" />\n            <property name=\"language\" type=\"java.lang.String\"\
    \ column=\"LANGUAGE\" />\n        </subclass>\n    </class>\n</hibernate-mapping>\n\
    ```\n\nThe class is mapped to the top-level class, which is `Disc`. The persistent\
    \ classes `AudioDisc` and `VideoDisc` are distinguished from each other by the\
    \ discriminator, which is mapped to a column `DISC_TYPE`. The other properties\
    \ of the superclass are mapped using the `property` element.\n\nThe persistent\
    \ classes are mapped with the `subclass` element, which has a `discriminator-value`\
    \ attribute that differentiates it from other persistent classes. So, when an\
    \ `AudioDisc` is saved, the `DISC_TYPE` column for that record has the value `AUDIO`.\
    \ Similarly, for `VideoDisc` records, the `DISC_TYPE` column holds the value `VIDEO`.\
    \ The `subclass` element contains properties of the persistent class. It can also\
    \ contain nested `subclass` elements; collection elements like `list`, `map`,\
    \ and `set`; and a `one-to-one` or `many-to-one` element.\n\nTo implement this\
    \ in JPA, you have the `Disc` class use the `Inheritance` and `DiscriminatorColumn`\
    \ annotations as shown here:\n\n```java\n@Entity\n@Inheritance (strategy=InheritanceType.SINGLE_TABLE)\n\
    @DiscriminatorColumn(name=\"DISC_TYPE\",\n                     discriminatorType=DiscriminatorType.STRING)\n\
    public class Disc_1 implements Serializable {\n    @Id\n    @GeneratedValue (strategy=GenerationType.AUTO)\n\
    \    @Column (name=\"DISC_ID\")\n    private Long discId;\n\n    @Column (name=\"\
    NAME\")\n    private String name;\n\n    @Column (name=\"PRICE\")\n```"
