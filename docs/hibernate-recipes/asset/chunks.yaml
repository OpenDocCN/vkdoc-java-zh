    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    5.5 Creating a One-to-One Association Using a Foreign Key


    Problem


    Let’s say that one **Customer** has only one **Address** and one **Address** belongs
    to only one **Customer**. This means there is a one-to-one relationship between
    **Customer** and an **Address**. How do you represent a one-to-one association
    in Hibernate?


    Solution


    The simplest way to map a one-to-one association is to treat it as a many-to-one
    association but add a unique constraint on it. You can declare the **lazy**, **fetch**,
    and **cascade** attributes in the same way.


    How It Works


    You can use the **Customer** and **Address** classes to create a one-to-one mapping
    with a foreign key association. (The classes **Customer** and **Address** remain
    the same—they’re renamed for the sake of demonstration.) **Customer**’s Hibernate
    mapping maps the **Address** property as many-to-one association.


    The **unique** constraint is set to **true** to change this association from many-to-one
    to one-to-one:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Customer5_2" table="CUSTOMER" schema="BOOK5">**


    ******<id name="id" type="long" column="ID">**


    **<generator**


    **class="native"></generator>**


    **</id>**


    ******<property name="firstName" type="string" column="FIRST_NAME" />**


    ******<property name="lastName" type="string" column="LAST_NAME" />**


    ******<property name="idCardNo" type="string" column="ID_CARD_NO" />**


    ******<property name="countryCode" type="string" column="COUNTRY_CODE" />**


    ******<property name="email" type="string" column="EMAIL" />**


    <many-to-one


    name="address"


    class="com.hibernaterecipes.chapter5.Address5_2"


    column="ADDRESS_ID"


    cascade="save-update"


    unique="true">


    </many-to-one>


    **</class>**


    **</hibernate-mapping>**


    **To obtain bidirectionality, you add a one-to-one mapping to the **customer**
    property in the **Address** class. You use the **property_ref** attribute to point
    Hibernate to the property to which the association is one-to-one; this is called
    an *inverse property reference*:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Address5_2" table="ADDRESS" schema="BOOK5">**


    ******<id name="id" type="long" column="ADDRESS_ID" >**


    **<generator**


    **class="native">**


    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    **</generator>**


