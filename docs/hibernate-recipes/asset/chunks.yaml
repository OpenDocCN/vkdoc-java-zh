- fmt: "Suppose you need to support a more flexible contact mechanism for book orders.\
    \ A customer can specify several contact points for a book delivery, because they\
    \ may not sure which one is most suitable for a specified time period. Your staff\
    \ tries these contact points one by one when they deliver books. You can use a\
    \ `java.util.Set` to hold all the contact points for an order:\n\n```\npublic\
    \ class Orders {\n\n    private Contact weekdayContact;\n\n    private Contact\
    \ holidayContact;\n\n    private Set contacts;\n\n    // Getters and Setters\n\
    \n}\n```\n\nYou need to create a separate table as follows:\n\n```\nCREATE TABLE\
    \ ORDERS_CONTACT (ORDER_ID bigint NOT NULL, RECIPIENT varchar(100),AREACODE\n\
    varchar(100),TELEPHONE varchar(100),ADDRESS varchar(100))\n```\n\n## Component\
    \ Mapping\n\nTo map many contact points for an order in Hibernate, you can use\
    \ a collection of components. You use `<composite-element>` to define the components\
    \ in a collection. For simplicity, you first roll back your `Contact` class to\
    \ its original form:\n\n```\npublic class Contact {\n\n    private String recipient;\n\
    \n    private String phone;\n\n    private String address;\n\n    // Getters and\
    \ Setters\n\n    // equals and hashCode implementation\n\n}\n```\n\n```\n<?xml\
