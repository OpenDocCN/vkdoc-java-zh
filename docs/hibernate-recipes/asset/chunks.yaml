    <id column="ISBN" type="long">


    <generator class="native">


    </generator>


    </id>


    **<property name="name" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="int" column="PRICE" />**


    **</class>**


    **</hibernate-mapping>**


    **The native generator that you use here uses other identity generators such as
    identity, sequence, hilo, and increment. The choice of which generator to use
    depends on the underlying database. The **Identifier** type is of type **long**,
    **short**, or **int**.


    **Using an Increment Generator**


    The increment generator reads the maximum primary key column value from the table
    and increments the value by one. It isn’t advisable to use this when the application
    is deployed in a cluster of servers because each server generates an ID and it
    may conflict with the generation on the other server. The increment generator
    isn’t available in JPA.


    Edit the **Book.xml** Hibernate mapping file as follows:


