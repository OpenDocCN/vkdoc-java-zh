    **C H A P T E R 5**


    ■ ■ ■


    **Many-to-One and One-to-One**


    **Mapping**


    In general, entities are related or associated to each other. For example, a **Customer**
    is associated with an **Address**. A **Customer** can have one or more than one
    **Address** (for example, **Billing** and **Shipping**). These relationships or
    associations are represented differently in a relational model and the domain/object
    model.


    In a relational model, a foreign key column represents the dependency of one table
    on another. The **Customer** table has an **AddressId** as the foreign key column,
    which is the primary key of the **Address** table.


    From the **Customer** perspective, because a **Customer** can have multiple addresses,
    so it’s a many-to-one relationship. On the other hand, from the **Address** perspective,
    one address can belong to only one customer, so it’s a one-to-one relationship.


    The same relationship is represented in terms of classes and attributes in an
    object model. The **Customer** class has an attribute to hold multiple addresses
    belonging to that **Customer** (in Java, this is represented as a collection—**List**,
    **Set**, and so on). The **Address** class has an attribute of **Customer** type.


    In the case of **Customer** and **Address** example, you consider the association
    from the view of both the **Customer** entity and the **Address** entity, so it’s
    a *bidirectional association*. If you use the association from only one entity,
    it’s a *unidirectional association*. In an object/relational mapping (ORM) framework,
    these relationships are represented using metadata in the configuration file as
    well using the entities/objects.


    This chapter shows you how these associations are represented in Hibernate and
    also discusses the following features:


    • Various ways to use the many-to-one and one-to-one mappings


    • How to make unidirectional associations into bidirectional associations


    • How to use features like lazy initialization and cascade


    • How to map an association or a join table


    5.1 Using Many-To-One Associations


    Problem


    Coming back to the online bookshop example, a publisher can publish many books.
    This relationship between the books and the publisher is a many-to-one relationship.
    How do you map objects in this 95


    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    case using the many-to-one association? How do you use the cascade option to persist
    the class hierarchy?


    Solution


    As already mentioned, the association from books to publisher is a many-to-one
    association. Because this association is navigable from book to publisher only,
    it’s also a unidirectional association. You use the **<many-to-one>** element
    to establish this association.


    How It Works


    Your application has a **Publisher** class that hasn’t been mapped to the database.
    Following the best practice of object identifiers discussed in Chapter 4, you
    can add an autogenerated **id** property on the class. Figure 5-1 shows the entity
    relationship drawing for a many-to-one unidirectional association.


