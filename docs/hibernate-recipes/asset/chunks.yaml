    **集合映射**


    **值**类型的对象没有数据库标识，并且**值**类型的对象依赖于所属的实体对象。**值**类型的生命周期受所属实体生命周期的约束。拥有**值**类型集合的实体需要映射到
    Java API 中适当的集合接口。为了让实体拥有**值**类型的集合，你需要一个单独的表，该表以实体的主键作为外键。


    Hibernate 支持 Java API 提供的大部分集合接口。建议使用集合接口来声明属性的类型，并使用匹配的实现。


    Hibernate 建议使用接口来声明集合，因为它支持 Java 集合、映射和数组；它有一个 **<set>** 标签来支持所有 **java.util.Set**
    集合，以及 **<bag>** 或 **<idbag>** 来支持 **java.util.Collection**。你应该在声明时初始化实现，以避免未初始化的集合。以下代码将
    **chapters** 声明为 **java.util.Set** 类型（这是一个接口），并将匹配的实现声明为 **java.util.HashSet**：


    **Private Set<String> chapters = new HashSet<String>();**


