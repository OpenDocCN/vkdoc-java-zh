    provides connection pools. Hibernate comes with an open source third-party connection
    pooling framework called C3P0\. Apache also provides a connection-pooling framework
    called Commons DBCP. You need to configure Hibernate to use one of these frameworks.
    After the connection pool is configured, you can use the Hibernate’s Transaction
    API for transaction demarcation and use connections from the connection pool.


