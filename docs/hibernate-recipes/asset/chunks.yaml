  raw: '• The physical format of the cache (memory, indexed files, or cluster-replicated)
    To reiterate, the second-level cache is more useful when there is less data that
    is often updated. In other words, it’s useful when there is more read-only data.


    You set up the second-level cache in two steps. First, you have to decide on the
    concurrency strategy; then, you configure the cache expiration and physical cache
    attributes using the cache provider.


    Concurrency Strategies


    There are four built-in concurrency strategies:


    • *Transactional:* This strategy should be used when there is more data to read.
    It prevents stale data in concurrency strategies. It’s equivalent to isolation
    level: repeatable read.


    • *Read-write:* This maintains a read-committed isolation level.


    • *Non-strict read-write:* This doesn’t guarantee that you won’t read stale data.
    It doesn’t guarantee consistency between cache and database.


    • *Read-only:* This is appropriate for data that never changes.


    Cache Providers


    The following built-in providers are available in Hibernate:


    • *EHCache:* This is an open source standards-based cache that supports process-scope
    cache. It can cache in memory or to disk, and it supports query cache.


    EHCache Distributed supports the cluster-scope cache. It has its own


    configuration file (**ehcache.xml**) where all the required parameters are set
    for caching. You can check out the tuto[rial at **http://ehcache.org/**](http://ehcache.org).


    • *OSCache:* This is also open source caching provider that writes to memory and
    disk. It also has cluster cache support. The URL [**www.opensymphony.com/oscache/**](http://www.opensymphony.com/oscache)


    has documentation.


    • *SwarmCache:* This is a simple but effective distributed cache. It uses IP multicast
    to communicate with any number of hosts in a distributed system. The


    documentation is at [**http://swarmcache.sourceforge.net**.](http://swarmcache.sourceforge.net)


    • *JBoss cache:* This is a distributed cache system. It replicates data across
    different nodes in a distributed system. State is always kept in synch with other
    servers in the system. The documentation is at [**www.jboss.org/jbosscache/**.](http://www.jboss.org/jbosscache)


    Table 12-1 summarizes these cache providers.


    CHAPTER 12 ■ CACHING IN HIBERNATE


    *Table 12-1\. Cache Providers*


    **Cache Provider**


