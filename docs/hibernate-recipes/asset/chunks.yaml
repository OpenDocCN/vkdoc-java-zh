- fmt: '# 对象模型与关系模型


    ## 对象模型


    一个*对象模型*使用了抽象、封装、模块化、层次化、类型化、并发、多态和持久化的原则。对象模型使你能够创建结构良好、复杂的系统。在对象模型系统中，*对象*是系统的组成部分。对象是类的实例，而类通过继承关系与其他类相关联。对象具有标识、状态和行为。对象模型帮助你创建可重用的应用程序框架和能够随时间演进的系统。此外，面向对象系统通常比非面向对象实现更小。


    ## 关系模型


    一个*关系模型*定义了数据的结构、数据操作和数据完整性。数据以表的形式组织，不同的表通过参照完整性（外键）相互关联。主键、唯一检查约束和非空等完整性约束用于在关系模型中维护实体的完整性。


    关系数据模型不专注于支持实体类型继承：对象模型中的基于实体多态关联无法转换为关系模型中的类似实体。在对象模型中，你使用模型的状态来定义对象之间的相等性。但在关系模型中，你使用实体的主键来定义实体的相等性。对象引用用于在对象模型中关联不同的对象，而外键用于在关系模型中建立关联。对象模型中的对象引用有助于更轻松地遍历对象图。


    由于这两种模型截然不同，你需要一种方法将对象实体（Java 对象）持久化到关系数据库中。图 1-1 和图 1-2 提供了对象模型和关系模型的简单表示。


    *图 1-1. Book 和 Publisher 的实体关系（ER）图*


    *图 1-2. Book 和 Publisher 的类图*


    ## 对象/关系映射（ORM）


    对象/关系映射（ORM）框架帮助你利用对象模型（如 Java）和关系模型（如数据库管理系统 [DBMS]）中的特性。借助 ORM 框架，你可以使用描述对象与数据库之间映射的元数据，将
    Java 中的对象持久化到关系表中。元数据屏蔽了直接处理 SQL 的复杂性，并帮助你以业务对象的方式开发解决方案。


    ORM 解决方案可以在不同级别实现：


    - **纯关系型**：应用程序围绕关系模型设计。

    - **轻量对象映射**：实体表示为类，并手动映射到关系表。

    - **中等对象映射**：应用程序使用对象模型设计，并在构建时使用代码生成工具生成 SQL。

    - **完全对象映射**：此映射支持复杂的对象建模，包括组合、继承、多态和通过可达性的持久化。


    使用 ORM 框架的好处如下：


    - **生产力**：由于你使用元数据来持久化和查询数据，开发时间减少，生产力提高。

    - **原型开发**：使用 ORM 框架对于快速原型开发非常有用。

    - **可维护性**：由于大部分工作通过配置完成，你的代码行数更少，因此需要更少的维护。

    - **供应商独立性**：ORM 将应用程序与底层 SQL 数据库和 SQL 方言抽象开来。这使你能够支持多个数据库，具有可移植性。


    ORM 框架也有一些缺点：


    - **学习曲线**：在学习如何映射以及可能学习新的查询语言时，你可能会经历陡峭的学习曲线。

    - **开销**：对于使用单个数据库且数据没有复杂查询业务需求的简单应用程序，ORM 框架可能是额外的开销。

    - **性能较慢**：对于大型批量更新，性能较慢。


    ## Hibernate 简介


    Hibernate 是业界使用最广泛的 ORM 框架之一。它提供了 ORM 解决方案的所有好处，并实现了 Enterprise JavaBeans（EJB）3.0
    规范中定义的 Java 持久化 API（JPA）。


    其主要组件如下：


    - **Hibernate Core**：Core 生成 SQL，并让你免于手动处理 Java 数据库连接（JDBC）结果集和对象转换。元数据在简单的 XML
    文件中定义。Core 提供了多种编写查询的选项：纯 SQL；Hibernate 查询语言（HQL），这是 Hibernate 特有的；编程式条件查询，或按示例查询（QBE）。它可以通过各种获取和缓存选项来优化对象加载。

    - **Hibernate Annotations**：随着 JDK 5.0 中注解的引入，Hibernate 提供了使用注解定义元数据的选项。这减少了使用
    XML 文件的配置，并使得直接在 Java 源代码中定义所需的元数据变得简单。

    - **Hibernate EntityManager**：JPA 规范定义了编程接口、持久化对象的生命周期规则和查询特性。Hibernate 对 JPA
    这一部分的实现以 Hibernate EntityManager 的形式提供。


    本书为每个问题提供了使用 Hibernate Core 和 Annotations 的解决方案。使用的 Hibernate 版本是 3.3.2。


    ## 1.1 设置 Hibernate


    ### 问题


    设置 Hibernate 并开始使用需要哪些工具和库？


    ### 解决方案


    你需要 JDK 1.5+、一个 IDE（如 Eclipse）、一个数据库（本书使用 Apache Derby）以及 SQL Squirrel 来提供使用数据库的
    GUI。你也可以使用 Maven 来配置你的项目。Maven 是一个软件项目管理和理解工具。基于项目对象模型（POM）的概念，Maven 可以从一个中心信息点管理项目的构建、报告和文档。在
    Maven 中，`POM.XML` 是存储所有信息的中心文件。


    Hibernate 3.3.2 设置需要以下库：


    - `Hibernate3.jar`

    - `Hibernate-commons-annotations.jar`

    - `Hibernate-annotations.jar`

    - `Hibernate-entitymanager.jar`

    - `Antlr-2.7.6.jar`

    - `Commons-collections-3.1.jar`

