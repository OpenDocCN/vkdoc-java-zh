- fmt: "# 12.5 Caching Queries\n\n## Problem\n\nCan queries be cached? How is this\
    \ achieved in Hibernate?\n\n## Solution\n\nQuery result sets can be cached. This\
    \ is useful when you run a particular query often with the same parameters.\n\n\
    ## How It Works\n\nIn addition to caching objects loaded by a session, a query\
    \ with HQL can be cached. Suppose you’re running the same query in two different\
    \ sessions:\n\n```\nSession session1 = factory.openSession();\ntry {\n    Query\
    \ query = session1.createQuery(\"from Book where name like ?\");\n    query.setString(0,\
    \ \"%Hibernate%\");\n    List books = query.list();\n} finally {\n    session1.close();\n\
    }\n\nSession session2 = factory.openSession();\ntry {\n    Query query = session2.createQuery(\"\
    from Book where name like ?\");\n    query.setString(0, \"%Hibernate%\");\n  \
    \  List books = query.list();\n} finally {\n    session2.close();\n}\n```\n\n\
    By default, the HQL queries aren’t cached. You must first enable the query cache\
    \ in the Hibernate configuration file:\n\n```\n<hibernate-configuration>\n   \
    \ <session-factory>\n        ...\n        <property name=\"cache.use_query_cache\"\
    >true</property>\n        ...\n    </session-factory>\n</hibernate-configuration>\n\
    ```\n\nThe setting `cache.use_query_cache` creates two cache regions: one holding\
    \ the cached query result sets and the other holding timestamps of the more recent\
    \ updates to queryable tables.\n\nBy default, the queries aren’t cached. In addition\
    \ to using the previous setting, to enable caching, you need to call `Query.setCacheable(true)`.\
    \ This allows the query to look for existing cache results or add the results\
    \ of the query to the cache.\n\nThen, you need to set the query to be cacheable\
    \ before execution. The query result is cached in a region named `org.hibernate.cache.QueryCache`\
    \ by default.\n\nHow can a query be cached by Hibernate? If the query returns\
    \ simple values, the values themselves are cached. If the query returns persistent\
    \ objects, the identifiers of the objects are cached in the query region, and\
    \ the persistent objects are cached in their own region:\n\n```\nSession session1\
    \ = factory.openSession();\ntry {\n    Query query = session1.createQuery(\"from\
    \ Book where name like ?\");\n    query.setString(0, \"%Hibernate%\");\n    query.setCacheable(true);\n\
    \    List books = query.list();\n} finally {\n    session1.close();\n}\n\nSession\
    \ session2 = factory.openSession();\ntry {\n    Query query = session2.createQuery(\"\
    from Book where name like ?\");\n    query.setString(0, \"%Hibernate%\");\n  \
    \  query.setCacheable(true);\n    List books = query.list();\n} finally {\n  \
    \  session2.close();\n}\n```\n\nYou can also specify the cache region for a query.\
    \ Doing so lets you separate query caches in different regions and reduce the\
    \ number of caches in one particular region:\n\n```\n...\nquery.setCacheable(true);\n\
    query.setCacheRegion(\"com.metaarchit.bookshop.BookQuery\");\n```\n\n## Summary\n\
    \nIn this chapter, you’ve seen what caching is and the different levels of caching\
    \ in Hibernate. Caching can be enabled at the transaction level, where data is\
    \ cached for one unit of work; this is the default behavior in Hibernate. Multiple\
    \ queries in a particular session share the cached data.\n\nYou’ve learned that\
    \ at the second level, caching is enabled for a process, and the cache is associated\
    \ with a `SessionFactory`. Multiple sessions within a `SessionFactory` share the\
    \ same data. Configuring the second-level cache is a two step process: first,\
    \ you decide on the concurrent strategy, and then you choose the provider that\
    \ implements the caching strategy.\n\nYou’ve also learned that you can use four\
    \ concurrent strategies: read-only, read-write, transactional, and not-strict\
    \ read-write. There are many open source cache providers, including OSCache, EHCache,\
    \ SwarmCache, and JBoss Cache. Each of these provides different concurrent strategies.\n\
    \nQuery result sets also can be cached. You do so through configuration and by\
    \ invoking `setCacheable(true)`. Associated objects and collections can also be\
    \ cached explicitly.\n\n---\n\n# Chapter 13: Transactions and Concurrency\n\n\
    Let’s say a buyer logs in to the bookshop application and purchases a book. The\
    \ following actions should take place in the event of purchase:\n\n- Charge the\
    \ buyer the cost of the book\n- Reduce the stock of the book\n\nIf the charge\
    \ on the credit card fails, the stock shouldn’t be reduced. Also, when the book\
    \ is out of stock, the buyer shouldn’t be charged. That means either both actions\
    \ should be successfully completed, or they should have no effect. These actions\
    \ collectively are called a *transaction* or *unit of work*. In essence, transactions\
    \ provide an all-or-nothing proposition.\n\nThe concept of transactions is inherited\
    \ from database management systems. By definition, a transaction must be atomic,\
    \ consistent, isolated, and durable (ACID):\n\n- *Atomicity* means that if one\
    \ step fails, then the whole unit of work fails.\n- *Consistency* means that the\
    \ transaction works on a set of data that is consistent before and after the transaction.\
    \ The data must be clean after the transaction.\n\nFrom a database perspective,\
    \ the clean and consistent state is maintained by integrity constraints. From\
    \ an applications perspective, the consistent state is maintained by the business\
    \ rules.\n\n- *Isolation* means one transaction isn’t visible to other transactions.\
    \ Isolation makes sure the execution of a transaction doesn’t affect other transactions.\n\
    - *Durability* means that when data has been persisted, it isn’t lost.\n\nIn an\
    \ application, you need to identify when a transaction begins and when it ends.\
    \ The starting point and ending point of a transaction are called *transaction\
    \ boundaries*, and the technique of identifying them in an application is called\
    \ *transaction demarcation*. You can set the transaction boundaries either programmatically\
    \ or declaratively. This chapter shows you how.\n\nMultiuser systems like databases\
    \ need to implement concurrency control to maintain data integrity.\n\nThere are\
    \ two main approaches to concurrency control:\n\n- *Optimistic:* Involves some\
    \ kind of versioning to achieve control\n- *Pessimistic:* Uses a locking mechanism\
    \ to obtain control\n\nSome of the methods that are used in concurrency control\
    \ are as follows:\n\n- *Two-phase locking:* This is a locking mechanism that uses\
    \ two distinct phases to achieve concurrency. In the first phase of transaction\
    \ execution, called the *expanding* phase, locks are acquired, and no locks are\
    \ released. In the second phase, called the *shrinking* phase, locks are released,\
    \ and no new locks acquired. This guarantees serializability. The transactions\
    \ are serialized in the order in which the locks are acquired. *Strict two-phase\
    \ locking* is a subset of two-phase locking. All the write locks are released\
    \ only at the end (after committing or aborting), and read locks are released\
    \ regularly during phase 2. With both these locking mechanisms, a deadlock is\
    \ possible but can be avoided if you maintain a canonical order for obtaining\
    \ locks. So, if two processes need locks on A and B, then they both request first\
    \ A and then B.\n\n- *Serialization:* A *transaction schedule* is a sequential\
    \ representation of two or more concurrent transactions. The transaction schedules\
    \ have a property called *serializability*. Two transactions that are updating\
    \ the same record are executed one after the other and don’t overlap in time.\n\
    \n- *Time-stamp-based control:* This is a nonlocking mechanism for concurrency\
    \ control. Every transaction is given a timestamp when it starts. Every object\
    \ or record in the database also has a read timestamp and a write timestamp. These\
    \ three timestamps are used to define the isolation rules that are used in this\
    \ type of concurrency control."
