    **Query** 接口提供了两个方法来实现分页：157


    第 8 章 ■ HQL 和 JPA 查询语言


    • **setFirstResult(int beginPoint)**：设置起始行为给定的 **beginPoint**


    • **setMaxResult(int size)**：设置返回的结果集大小


