- fmt: "# Using JTA for Transaction Demarcation\n\nNow you’re ready to use JTA for\
    \ transaction demarcation. You get the `UserTransaction` by looking up the JNDI\
    \ registry:\n\n```\npublic void saveBook(Book book) throws NotSupportedException,\
    \ SystemException, NamingException, Exception {\n    System.out.println(\"Enter\
    \ DAO Impl\");\n    Session session = null;\n    UserTransaction tx = (UserTransaction)new\
    \ InitialContext()\n        .lookup(\"java:comp/UserTransaction\");\n    try {\n\
    \        SessionFactory factory = HibernateUtil.getSessionFactory();\n       \
    \ tx.begin();\n        session = factory.openSession();\n        session.saveOrUpdate(book);\n\
    \        session.flush();\n        tx.commit();\n    } catch (RuntimeException\
    \ e) {\n        try {\n            tx.rollback();\n        } catch(RuntimeException\
    \ ex) {\n            System.out.println(\"RuntimeException in BookDaoImpl \");\n\
    \        }\n        throw e;\n    } finally {\n        session.close();\n    }\n\
    }\n```\n\nNote that you explicitly call `session.flush()`. You need to do an explicit\
    \ flush because Hibernate’s default implementation doesn’t flush the session.\
    \ You can, however, override the default implementation by configuring the `hibernate.transaction.flush_before_completion`\
    \ property. You also configure the `hibernate.transaction.auto_close_session`\
    \ property to avoid calling `session.close()` explicitly in every method. The\
    \ Hibernate configuration file is as follows:\n\n```\n<session-factory name=\"\
    book\">\n    <property name=\"hibernate.connection.datasource\">local_derby</property>\n\
    \    <property name=\"hibernate.transaction.factory_class\">org.hibernate.transaction.JTATransactionFactory</property>\n\
    \    <property name=\"hibernate.transaction.manager_lookup_class\">org.hibernate.transaction.WeblogicTransactionManagerLookup</property>\n\
    \    <property name=\"hibernate.transaction.flush_before_completion\">true</property>\n\
    \    <property name=\"hibernate.transaction.auto_close_session\">true</property>\n\
