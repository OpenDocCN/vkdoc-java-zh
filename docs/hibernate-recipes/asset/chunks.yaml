- fmt: 'The following code demonstrates how an unrepeatable read can happen. You first
    get the book using `session.get()`, and then you use a query to read the name
    of the book. If an update happens between these two calls to the book’s record
    in the database by a concurrent transaction, you have a case of unrepeatable reads:


    ```

    Session session = getSession();

    Transaction tx = null;

    tx = session.beginTransaction();

    BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769));

    String name = (String) session.createQuery("select b.name from bkch2 b where b.isbn
    = :isbn")

    .setParameter("isbn", book.getIsbn()).uniqueResult();

    System.out.println("BOOk''s Name- "+name);

    tx.commit();

    session.close();

    ```


    You can use `session.lock` to upgrade the isolation level. The previous code is
    updated as follows:


    ```

    Session session = getSession();

    Transaction tx = null;

    tx = session.beginTransaction();

    BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769));

    session.lock(book, LockMode.UPGRADE);

    String name = (String) session.createQuery("select b.name from bkch2 b where b.isbn
    = :isbn")

    .setParameter("isbn", book.getIsbn()).uniqueResult();

    System.out.println("BOOk''s Name- "+name);

    tx.commit();

    session.close();

    ```


    Or you can directly call


    ```

    BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769),LockMode.UPGRADE);

    ```


    `LockMode.UPGRADE` creates a lock on the specific book record in the database.
    Now, other concurrent transactions can’t modify the book record.


    Hibernate supports the following lock modes:


    - `LockMode.NONE`: This is the default lock mode. If an object is requested with
    this lock mode, a `READ` lock is obtained if it’s necessary to read the state
    from the database, rather than pull it from a cache.

    - `LockMode.READ`: In this lock mode, an object is read from the database. The
    object’s version is checked, just as in memory.

    - `LockMode.UPGRADE`: Objects loaded in this lock mode are materialized using
    an SQL `select ... for update`. It’s equivalent to `LockModeType.READ` in Java
    Persistence.

    - `LockMode.UPGRADE_NOWAIT`: This lock mode attempts to obtain an upgrade lock
    using an Oracle-style `select for update nowait`. The semantics of this lock mode,
    once obtained, are the same as `UPGRADE`.

    - `LockMode.FORCE`: This lock mode results in a forced version increment. It’s
    equivalent to `LockModeType.Write` in Java Persistence.

    - `LockMode.WRITE`: A `WRITE` lock is obtained when an object is updated or inserted.
    This lock mode is for internal use only and isn’t a valid mode for `load()` or
    `lock()`.


    ## Summary


    In this chapter, you’ve seen how to manage transactions programmatically. You’ve
    learned to use the Hibernate Transaction API and the Java Transaction API for
    transaction demarcation.


    Optimistic concurrency control and pessimistic concurrency control are the two
    approaches used to achieve concurrency control. Optimistic concurrency control
    involves using either a version or a timestamp to maintain the version as a database
    column. Pessimistic control is used on a per-transaction basis and is achieved
    by using `session.lock()` with a lock mode of `UPGRADE` or `UPGRADE_NOWAIT`.


    # Chapter 14: Web Applications


    Software engineers use layering to break down complex applications or systems.
    *Layering* is the organization of code into separate functional components that
    interact in some sequential and hierarchical way. Each layer sits on top of another
    layer and usually interacts only with the layers that are immediately above and
    below it. Each layer can be considered a single coherent component that can be
    used to provide many high-level services. You can work on each layer without knowing
    the details of other layers. By keeping the dependency between layers at a minimum,
    it’s easy to refractor or replace single layer without affecting all the other
    layers. Adding too many layers can have an impact on performance.


    *Patterns* are used to create layers and add structure to each layer. Popular
    patterns include the Model-View-Controller (MVC) pattern, Singleton pattern, Factory
    pattern, Observer pattern, and Decorator pattern, among many others. MVC is without
    doubt the most popular pattern used to create layered web applications. MVC splits
    code into three distinct components: data-access code, business-logic code, and
    presentation code (see Figure 14-1). By classifying code into these three layers,
    you achieve decoupling between the layers. Decoupling makes it easier to maintain
    one layer without requiring you to change other layers. The direction of dependencies
    is very important: the model doesn’t depend on view/presentation or controller.
    If you’re working in the model, you’re unaware of the view.


    *Figure 14-1. The Model-View-Controller pattern splits code into three distinct
    roles*


    This chapter demonstrates how to build a web application with this model in mind.


    ## 14.1 Creating a Controller for the Bookshop Web Application


    ### Problem


    How do you create a simple web application that uses a database as the persistent
    store?


    ### Solution


    To access a web application, you need to deploy it. Web applications are deployed
    on an application server. Common application servers include WebLogic, WebSphere,
    JBoss, and Tomcat. In this recipe, you install and deploy on a Tomcat server.


    ### How It Works


    Tomcat is an open source application server for running J2EE web applications.
    You can go to [http://tomcat.apache.org/](http://tomcat.apache.org) and download
    Tomcat 5.5. Install it into a folder called `C:\Tomcat`. Note that during the
    installation, you need to specify the Java Development Kit (JDK) installation
    path, not the Java Runtime Environment (JRE).


    #### Creating a Dynamic Web Project


    To develop a web application, you first create a dynamic web project `BookShopWeb`
    in Eclipse Web Tools Platform (WTP). To do so, select File → New → Dynamic Web
    Project as shown in Figure 14-2.


    ![Image 6](index-263_1.png)


    *Figure 14-2. Create a dynamic web project in the Eclipse IDE*


    A wizard opens, in which you create your dynamic web project. For the project
    name, enter `BookShopWeb`. Use the default project directory, and choose Apache
    Tomcat as the target runtime (see Figure 14-3). Click the Finish button.


    ![Image 7](index-264_1.png)


    *Figure 14-3. The New Dynamic Web Project wizard in the Eclipse IDE*


    You need to configure an Apache Tomcat v5.5 runtime environment for this application.
    After you finish the wizard, copy the following jars to the `WebContent/WEB-INF/lib`
    directory. They’re added to your project’s `CLASSPATH` automatically:


    ```

    ${Hibernate_Install_Dir}/hibernate3.jar

    ${Hibernate_Install_Dir}/lib/antlr.jar

    ${Hibernate_Install_Dir}/lib/asm.jar

    ${Hibernate_Install_Dir}/lib/asm-attrs.jars

    ${Hibernate_Install_Dir}/lib/cglib.jar

    ${Hibernate_Install_Dir}/lib/commons-collections.jar

    ${Hibernate_Install_Dir}/lib/commons-logging.jar

    ${Hibernate_Install_Dir}/lib/dom4j.jar

    ${Hibernate_Install_Dir}/lib/ehcache.jar

    ${Hibernate_Install_Dir}/lib/jta.jar

    ${Hibernate_Install_Dir}/lib/log4j.jar

    ${Hsqldb_Install_Dir}/lib/hsqldb.jar

    ```'
