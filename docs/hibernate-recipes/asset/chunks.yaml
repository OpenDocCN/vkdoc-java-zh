    ## Summary


    In this chapter, you''ve seen when to use batch processing. You''ve learned how
    to perform batch inserts, updates, and deletes. You''ve also learned how to manage
    the first-level and second-level cache during batch processing. And you can now
    use native SQL and named queries with other Hibernate HQL and criteria queries.


    # CHAPTER 12 ■ CACHING IN HIBERNATE


    Caching is one of the important features implemented by an application for better
    performance. In an ORM perspective, data retrieved from a database is cached in
    memory or to disk so that there is no need to make a call to the database for
    every request. A *cache* is a local copy of the information from the database
    that may be used to avoid a database call whenever:


    - The application performs a lookup by identifier.

    - The persistence layer resolves an association or collection lazily.


    In Figure 12-1, when an application queries for data, the first time Hibernate
    fetches it from the database; from then on, it fetches data from the cache if
    the same data is requested.


    *Figure 12-1. How Hibernate caches*


    Hibernate provides a way to configure caching at the class level, at the collection
    level, and also at the query result-set level. Cached data is available at three
    different scopes in an application:


    - **Transaction scope:** As you''ve seen in earlier chapters, a transaction is
    defined as a unit of work. How does caching affect data in a transaction? If data
    is fetched in one session, and the same query is executed again in that same session
    before that unit of work is completed, is that data stored in memory/disk? Does
    this avoid a call to the database? Yes. This data is stored in memory/disk by
    default, so the call to the database for the second query is avoided. Because
    a unit of work is for one request, this data isn''t shared or accessed concurrently.


    - **Process scope:** Data is cached across sessions or across units of work. If
    a query is executed in one session and the same query is executed in a second
    session after closing the first, this data is cached so that the second call to
    the database is avoided. Because two requests can access the same data in these
    two sessions, this data is accessed concurrently. You should use this scope with
    caution.


    - **Cluster scope:** Data is shared between multiple processes on the same machine
    or different machines in a cluster.


    A process-scoped cache makes data retrieved from the database in one unit of work
    visible to another unit of work. This may have some unwanted consequences that
    you need to avoid. If an application has non-exclusive access to the database,
    you shouldn''t use process scope. That means the application has concurrent access
    to the database, and one request can share data with another request. In this
    case, process scope should be used when data doesn''t change often and also if
    it can be refreshed safely when the local cache expires.


    Any application that is designed to be scalable should support caching at the
    cluster level. Process scope doesn''t maintain consistency of data between machines,
    so you should use cluster-level caching.


    Hibernate has a two-level cache architecture:


    - The first-level cache is the *persistence context cache*. This is at the unit-of-work
    level. It corresponds to one session in Hibernate for a single request and is
    by default enabled for the Hibernate session.


    - The second-level cache is either at the *process scope or the cluster scope*.
    This is the cache of the state of the persistence entities. A cache-concurrency
    strategy defines the transaction isolation details for a particular item of data,
    and the cache provider represents the physical cache implementation.


    Hibernate also implements caching for query result sets. This requires two additional
    physical cache regions that hold the cached query result sets and the timestamp
    when a table was last updated.


    This chapter first shows how to use and configure the second-level cache and then
    looks at the query-level cache in Hibernate.


    ## Using the Second-Level Cache in Hibernate


    At the second-level cache, all persistence contexts that have been started from
    the same `SessionFactory` share the same cached data. Different kinds of data
    require different cache policies: for example, how long the cache should be maintained
    before evicting data, at what scope the data should be cached, whether the data
    should be cached in memory, and so on. The cache policy involves setting the following:


    - Whether the second-level cache is enabled

    - The Hibernate concurrency strategy

    - Cache expiration policies (such as timeout, least recently used, and memory
