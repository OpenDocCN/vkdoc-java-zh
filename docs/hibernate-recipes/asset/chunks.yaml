- fmt: 'Let’s say you need to compile some statistics for your top-selling books.
    This process is very complicated and requires some native features provided by
    the database. `HQL` isn’t much help in this case. But `Hibernate` supports using
    native SQL to query for objects. For demonstration purposes, this recipe doesn’t
    implement complicated statistics—you just create a view to emulate the result
    of the query. You create the view `TOP_SELLING_BOOK` by joining the `BOOK` and
    `PUBLISHER` tables:


    ```

    CREATE VIEW TOP_SELLING_BOOK (

    ID, ISBN, BOOK_NAME, PUBLISH_DATE, PRICE,

    PUBLISHER_ID, PUBLISHER_CODE, PUBLISHER_NAME, PUBLISHER_ADDRESS

    ) AS

    SELECT book.ID, book.ISBN, book.BOOK_NAME, book.PUBLISH_DATE, book.PRICE,

    book.PUBLISHER_ID, pub.CODE, pub.PUBLISHER_NAME, pub.ADDRESS

    FROM BOOK book LEFT OUTER JOIN PUBLISHER pub ON book.PUBLISHER_ID = pub.ID

    ```


    First, you retrieve the `book` objects from that view only and ignore the associated
    publishers. You use native SQL to select all the columns related to a book. The
    `addEntity()` method specifies the type of resulting persistent objects:


    ```

    String sql = "SELECT ID, ISBN, BOOK_NAME, PUBLISH_DATE, PRICE, PUBLISHER_ID

    FROM TOP_SELLING_BOOK

    WHERE BOOK_NAME LIKE ?";


    Query query = session.createSQLQuery(sql)

    .addEntity(Book.class)

    .setString(0, "%Hibernate%");


    List books = query.list();

    ```


    Because all the columns in the result have the same names as in the mapping definition
    of `Book`, you can specify `{book.*}` in the `SELECT` clause. `Hibernate` replaces
    `{book.*}` with all the column names in your mapping definition:


    ```

    String sql = "SELECT {book.*}

    FROM TOP_SELLING_BOOK book

    WHERE BOOK_NAME LIKE ?";


    Query query = session.createSQLQuery(sql)

    .addEntity("book", Book.class)

    .setString(0, "%Hibernate%");


    List books = query.list();

    ```


    Next, let’s consider the associated publishers. Because not all the column names
    are identical to those in the mapping definition of `Publisher`, you need to map
    them manually in the SQL `SELECT` clause.


    The `addjoin()` method specifies the joined associations:


    ```

    String sql = "SELECT {book.*},

    book.PUBLISHER_ID as {publisher.id},

    book.PUBLISHER_CODE as {publisher.code},

    book.PUBLISHER_NAME as {publisher.name},

    book.PUBLISHER_ADDRESS as {publisher.address}

    FROM TOP_SELLING_BOOK book

    WHERE BOOK_NAME LIKE ?";


    Query query = session.createSQLQuery(sql)

    .addEntity("book", Book.class)

    .addJoin("publisher", "book.publisher")

    .setString(0, "%Hibernate%");


    List books = query.list();

    ```


    If you want to query for some simple values only, you can use the `addScalar()`
    method:


    ```

    String sql = "SELECT max(book.PRICE) as maxPrice

    FROM TOP_SELLING_BOOK book

    WHERE BOOK_NAME LIKE ?";


    Query query = session.createSQLQuery(sql)

    .addScalar("maxPrice", Hibernate.INTEGER)

    .setString(0, "%Hibernate%");


    Integer maxPrice = (Integer) query.uniqueResult();

    ```


    ## 11.4 Using Named SQL Queries


    ### Problem


    How do you use named queries?


    ### Solution


    You can define named SQL queries in the mapping document and call them exactly
    like named HQL queries.


    ### How It Works


    Native SQL statements can also be put in a mapping definition and referred to
    by name in the Java code. You can use `<return>` and `<return-join>` to describe
    the resulting objects. The `return-join` element is used to join associations.
    Note that `Hibernate` doesn’t support `return-join` on stored procedures. In the
    following query, the publisher of a book is retrieved with the book:


    ```

    <hibernate-mapping package="com.hibernaterecipes.bookstore">

    <sql-query name="TopSellingBook.by.name">

    <return alias="book" class="Book" />

    <return-join alias="publisher" property="book.publisher"/>

    <![CDATA[

    SELECT {book.*},

    book.PUBLISHER_ID as {publisher.id},

    book.PUBLISHER_CODE as {publisher.code},

    book.PUBLISHER_NAME as {publisher.name},

    book.PUBLISHER_ADDRESS as {publisher.address}

    FROM TOP_SELLING_BOOK book

    WHERE BOOK_NAME LIKE ?

    ]]>

    ```'
