- fmt: "Just as when you use JDBC, you need to do some initial cleanup for Hibernate.\
    \ First, you ask the session factory to open a new session for you. After you\
    \ finishing your work, you must remember to close the session:\n\n```\nSession\
    \ session = factory.openSession();\n\ntry {\n    // Using the session to retrieve\
    \ objects\n} catch(Exception e) {\n    e.printStackTrace();\n} finally {\n   \
    \ session.close();\n}\n```\n\n## Retrieving Objects\n\nGiven the ID (an ISBN,\
    \ in this case) of a book, you can retrieve the unique `Book` object from the\
    \ database.\n\nThere are two ways to do that:\n\n```\nBook book = (Book) session.load(Book.class,\
    \ isbn);\n```\n\nand\n\n```\nBook book = (Book) session.get(Book.class, isbn);\n\
    ```\n\nWhat’s the difference between `load()` and `get()`? First, when the given\
    \ ID can’t be found, `load()` throws an exception `org.hibernate.ObjectNotFoundException`,\
    \ whereas `get()` returns a null object. Second, `load()` just returns a proxy\
    \ by default; the database isn’t hit until the proxy is first invoked. `get()`\
    \ hits the database immediately. The `load` method is useful when you only need\
    \ a proxy and don’t need to make a database call. You just need a proxy, when\
    \ in a given session you need to associate an entity before persisting.\n\nJust\
    \ as you can use SQL to query a database, you can use Hibernate to query objects,\
    \ using Hibernate Query Language (HQL). For example, the following codes queries\
    \ for all the `Book` objects:\n\n```\nQuery query = session.createQuery(\"from\
    \ Book\");\nList books = query.list();\n```\n\nIf you’re sure only one object\
    \ will match, you can use the `uniqueResult()` method to retrieve the unique result\
    \ object:\n\n```\nQuery query = session.createQuery(\"from Book where isbn = ?\"\
    );\nquery.setString(0, isbn);\nBook book = (Book) query.uniqueResult();\n```\n\
    \n## 1.4 Configuring a JPA Project\n\n### Problem\n\nHow do you manage the metadata\
    \ required for ORM? Can you use any mechanism other than specifying the metadata\
    \ in XML files? How do you configure a JPA project?\n\n### Solution\n\nThe EJB3.0\
    \ specification defines the Java Persistence API, which provides ORM using a Java\
    \ domain model to manage a relational database. Different providers implement\
    \ this API:\n\n- *TopLink:* This is a Java ORM solution currently owned by Oracle.\
    \ Here’s the URL for more details about TopLink: [www.oracle.com/technology/products/ias/toplink/index.html](http://www.oracle.com/technology/products/ias/toplink/index.html).\n\
    \n- *JDO:* The JDO API is a standard interface-based Java model abstraction of\
    \ persistence developed by the Java Community Process. The current JDO 2.0 is\
    \ Java Specification Request 243. Beginning with JDO 2.0, the development of the\
    \ API is taking place within Apache JDO open source.\n\n- *Hibernate:* This is\
    \ a very popular ORM framework. Hibernate provides Hibernate Annotations, which\
    \ implement JPA standard and also provide more advanced mapping features. We will\
    \ be demonstrating configuring a JPA project that uses Hibernate Annotations.\n\
    \n### How It Works\n\nTo use Hibernate Annotations, download the `HibernateAnnotation`\
    \ package from the Hibernate site: [www.hibernate.org/6.html](http://www.hibernate.org/6.html).\
    \ The following jars need to be in your Eclipse project build path in addition\
    \ to the Hibernate core jar files:\n\n- `hibernate-annotations.jar`\n- `lib/hibernate-commons-annotations.jar`\n\
    - `lib/ejb3-persistence.jar`\n\nConfigure the session factory in `hibernate.cfg.xml`.\
    \ (Note that if you change the name of this file to anything other than `hibernate.cfg.xml`,\
    \ you must upload the file programmatically.) The `dialect` property is used to\
    \ define the name of the database. This enables Hibernate to generate SQL optimized\
    \ for a particular relational database. You use Derby as a database in this case,\
    \ so you use `org.hibernate.dialect.DerbyDialect`. Also, if you change the database—say,\
    \ from Derby to Oracle—you must change the value from `org.hibernate.dialect.DerbyDialect`\
    \ to"
