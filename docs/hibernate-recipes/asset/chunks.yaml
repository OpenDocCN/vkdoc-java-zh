    ADDRESS_ID\"))\n    private Address5_3 address;\n    // getters and setters\n\
    }\n```\n\n## Summary\n\nIn this chapter, you’ve seen how to represent and work\
    \ with many-to-one and one-to-one associations using Hibernate. For a many-to-one\
    \ association, you define the `<many-to-one>` mapping element in the class that\
    \ has the many side of the relationship. In the case where there can be null foreign\
    \ key values, you use a join table to map between the two dependent objects; the\
    \ join table contains IDs of both the dependent objects.\n\nYou learned that you\
    \ can use lazy initialization to increase performance: the data of the dependent\
    \ object is retrieved from the database only on demand. You also learned that\
    \ shared primary keys are used when rows in two tables are related by a primary\
    \ key association.\n\nYou saw how to map a one-to-one association with a `<many-to-one>`\
    \ element and then have a unique constraint on the one relationship. A one-to-one\
    \ association can also be mapped using a join table.\n\n## CHAPTER 6 ■ COLLECTION\
    \ MAPPING\n\nAn object of `value` type has no database identity, and objects of\
    \ `value` type are dependent on the owning entity object. The lifespan of the\
    \ `value` type is bound by the lifespan of the owning entity. Entities that have\
    \ a collection of `value` types need to be mapped to an appropriate collection\
    \ interface from the Java API. For entities to have a collection of `value` types,\
    \ you need to have a separate table with the entity’s primary key as a foreign\
    \ key.\n\nHibernate supports most of the collection interfaces provided by Java\
    \ API. It’s recommended that you use the collection interface to declare the type\
    \ of the property and a matching implementation.\n\nHibernate suggests using interfaces\
    \ to declare collections because it supports Java collection, maps, and arrays;\
    \ it has a `<set>` tag to support for all `java.util.Set` collections and `<bag>`\
    \ or `<idbag>` to support `java.util.Collection`. You should initialize the implementation\
    \ at the time of declaration to avoid uninitialized collections. The following\
    \ code declares `chapters` to be type `java.util.Set` (which is an interface)\
    \ and the matching implementation as `java.util.HashSet`:\n\n```java\nPrivate\
    \ Set<String> chapters = new HashSet<String>();\n```\n\nThis chapter shows you\
    \ how to map collections for `value` types. In Hibernate, collections can be lazily\
    \ initialized, which means the state of the collection objects is loaded from\
    \ the database only when the application needs it. This initialization is done\
    \ transparently from the user. The chapter also deals with sorting collections\
    \ in memory and at database level. You add a collection of chapters to your `Book`\
    \ class as an example.\n\n### 6.1 Mapping a Set\n\n#### Problem\n\nHow do you\
    \ map `value` types as collections of type `java.util.Set`?\n\n#### Solution\n\
    \nThe `<set>` mapping is the most common collection mapping that is used. You\
    \ use the `<set>` element to map for `java.util.Set`. The property should be initialized\
    \ to `HashSet`. The implementation doesn’t allow duplicate elements, and the order\
    \ of the elements isn’t retained.\n\n#### How It Works\n\nThe `Book` class has\
    \ a property called `chapters` that is of type `java.util.Set`. The property is\
    \ initialized as a `HashSet`:\n\n```java\npublic class Book6_1 implements Serializable{\n\
    \    private Long book_id;\n    private String isbn;\n    private String name;\n\
    \    private Date publishDate;\n    private Integer price;\n    private Set chapters\
    \ = new HashSet();\n    // getters and setters\n}\n```\n\nFigure 6-1 shows the\
    \ association between the `BOOK` table and the `BOOK_CHAPTER` table for this recipe.\n\
    \n*Figure 6-1. Entity-relationship drawing between `BOOK` and `BOOK_CHAPTER` with\
    \ a set association*\n\nIn `Book`’s Hibernate mapping file, the `<set>` element\
    \ associates the chapters with the book. The `<set>` element contains the `key`\
    \ column element that sets the book’s ID (primary key as the foreign key). The\
    \ association is mapped to a separate table, which has a composite key of the\
    \ book’s ID and the chapter name as the primary key.\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter6\">\n    <class name=\"Book6_1\" table=\"\
    Book6_1\" schema=\"BOOK6\">\n        <id name=\"book_id\" type=\"long\" column=\"\
    BOOK_ID\" >\n            <generator class=\"native\">\n            </generator>\n\
    \        </id>\n        <property name=\"isbn\" type=\"string\">\n           \
    \ <column name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"true\" />\n \
    \       </property>\n        <property name=\"name\" type=\"string\">\n      \
    \      <column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />\n      \
    \  </property>\n        <property name=\"publishDate\" type=\"date\" column=\"\
    PUBLISH_DATE\" />\n        <property name=\"price\" type=\"int\" column=\"PRICE\"\
    \ />\n        <set name=\"chapters\" table=\"Book61_Chapter\" schema=\"BOOK6\"\
    >\n            <key column=\"BOOK_ID\"></key>\n            <element type=\"string\"\
    \ column=\"CHAPTER_NAME\" not-null=\"true\"></element>\n        </set>\n    </class>\n\
    </hibernate-mapping>\n```\n\nIf you print the `CREATE TABLE` script from the database\
    \ GUI tool (Squirrel, in this case), it looks something like this:\n\n```sql\n\
    CREATE TABLE \"BOOK6\".\"BOOK61_CHAPTER\"\n(\n    BOOK_ID bigint NOT NULL,\n \
    \   CHAPTER_NAME varchar(255) NOT NULL,\n    CONSTRAINT SQL091222210546110 PRIMARY\
    \ KEY (BOOK_ID,CHAPTER_NAME)\n);\nALTER TABLE BOOK61_CHAPTER\n    ADD CONSTRAINT\
    \ FK3C070E729C936CD9\n    FOREIGN KEY (BOOK_ID)\n    REFERENCES BOOK6_1(BOOK_ID);\n\
    CREATE UNIQUE INDEX SQL091222210546110 ON BOOK61_CHAPTER\n(\n    BOOK_ID,\n  \
    \  CHAPTER_NAME\n);\nCREATE INDEX SQL091222210548040 ON BOOK61_CHAPTER(BOOK_ID);\n\
    ```\n\nIn JPA, the `Book` class has the following annotations:\n\n```java\n@Entity\n\
    @Table (name=\"BOOK6_1\", schema=\"BOOK6\")\npublic class Book_6_1 implements\
    \ Serializable{\n    @Id\n    @Column (name=\"BOOK_ID\")\n    @GeneratedValue\
    \ (strategy=GenerationType.AUTO)\n    private Long book_id;\n    @Column (name=\"\
    isbn\")\n    private String isbn;\n    @Column (name=\"BOOK_NAME\")\n    private\
    \ String name;\n    @Column (name=\"price\")\n    private Integer price;\n   \
    \ @CollectionOfElements (targetElement=java.lang.String.class)\n    @JoinTable(\n\
    \        name=\"Book61_Chapter\",\n        schema=\"BOOK6\",\n        joinColumns=@JoinColumn(name=\"\
    BOOK_ID\")\n    )\n    @Column(name=\"chapter_name\")\n    private Set chapters;\n\
    \    // getters and setters\n}\n```\n\nThe `CollectionOfElements` annotation is\
    \ used to declare what types of objects are being put in the collection that is\
    \ being mapped. The `JoinTable` annotation provides details about the associated\
    \ table and contains the join column that is used to map the two tables. The `Column`\
    \ annotation provides the column name.\n\n### 6.2 Mapping a Bag\n\n#### Problem"
