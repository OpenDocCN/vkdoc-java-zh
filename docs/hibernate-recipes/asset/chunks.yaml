    For a named SQL query, you can group `<return>` and `<return-join>` in a *result
    set mapping* and reference them in `<sql-query>`. The advantage of a result set
    mapping is that it can be reused for multiple queries:


    ```xml

    <hibernate-mapping package="com.hibernaterecipes.bookstore">

