    使用视图中的开放会话模式


    显式初始化惰性关联是否很麻烦？如何让关联在首次访问时按需初始化？


    惰性初始化异常的根本原因在于，在 JSP 渲染期间首次访问惰性关联之前，会话已经关闭。如果你能在整个请求处理过程（包括 Servlet 处理和 JSP 渲染）中保持会话打开，那么该异常应该能够解决。要实现这个想法，你可以在
    J2EE Web 应用程序中使用一个*过滤器*。


    过滤器是在用户请求到达 Servlet 或 JSP 之前被调用的代码。你可以将一个过滤器附加到一个或多个 Servlet 或 JSP 上；它会查看**请求**对象，并在允许请求传递到
    Servlet 或 JSP 之前验证该请求。你在过滤器中打开和关闭 Hibernate 会话，使得它在整个请求处理过程中都可访问。这被称为“视图中的开放会话”模式。


    Hibernate 提供了 **factory.getCurrentSession()** 方法来检索当前会话。第一次调用此方法时会打开一个新会话，当事务完成时（无论提交还是回滚）会关闭该会话。但*当前会话*是什么意思？你需要告诉
    Hibernate，这是绑定到当前线程的会话：


    ****<hibernate-configuration>**


    **<session-factory>**


    **...**


    <property name="current_session_context_class">thread</property>


    **...**


    第 14 章 ■ Web 应用程序


    **</session-factory>**


    **</hibernate-configuration>**


