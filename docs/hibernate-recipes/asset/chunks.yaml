    ip-multicast


    You can develop an adapter for your application by implementing


    **org.hibernate.cache.CacheProvider**. All of the listed cache providers implement
    this interface.


    Not every cache provider is compatible with every concurrency strategies. The
    compatibility matrix is given in Table 12-2.


    *Table 12-2\. Cache Providers’ Concurrency Strategies*


    **Cache Provider Read-Only Non-Strict Read-Write Read-Write Transactional**


