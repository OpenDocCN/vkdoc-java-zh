- fmt: "# Component Mapping\n\n## 3.3 Adding References in Components\n\n### Problem\n\
    \nHow do you add a reference to a component’s parent object? How do you provide\
    \ associations within a component?\n\n### Solution\n\nYou can add a reference\
    \ to the parent object by using the `<parent>` tag. The component tag allows for\
    \ many-to-one and one-to-one associations with other tables.\n\n### How It Works\n\
    \nA component can have a reference to its parent object through a `<parent>` mapping:\n\
    \n```java\npackage com.hibernaterecipes.chapter3;\n\npublic class Contact {\n\
    \    private Orders order;\n    private String recipient;\n    private Phone phone;\n\
    \    private String address;\n    // Getters and Setters\n}\n```\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE hibernate-mapping PUBLIC\n \
    \   \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">\n    <class name=\"\
    Orders\" table=\"ORDERS\">\n        <id name=\"id\" type=\"long\" column=\"ID\"\
    >\n            <generator class=\"native\" />\n        </id>\n        <component\
    \ name=\"weekdayContact\" class=\"Contact\">\n            <parent name=\"order\"\
    \ />\n            <property name=\"recipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\"\
    \ />\n            <property name=\"phone\" type=\"string\" column=\"WEEKDAY_PHONE\"\
    \ />\n            <property name=\"address\" type=\"string\" column=\"WEEKDAY_ADDRESS\"\
    \ />\n        </component>\n        <component name=\"holidayContact\" class=\"\
    Contact\">\n            <parent name=\"order\" />\n            <property name=\"\
    recipient\" type=\"string\" column=\"HOLIDAY_RECIPIENT\" />\n            <property\
    \ name=\"phone\" type=\"string\" column=\"HOLIDAY_PHONE\" />\n            <property\
    \ name=\"address\" type=\"string\" column=\"HOLIDAY_ADDRESS\" />\n        </component>\n\
    \    </class>\n</hibernate-mapping>\n```\n\nIn JPA, you add the reference to the\
    \ parent entity and annotate the accessor method with `@Parent`:\n\n```java\n\
    package com.hibernaterecipes.annotations.domain;\n\nimport javax.persistence.Column;\n\
    import javax.persistence.Embeddable;\nimport javax.persistence.Entity;\nimport\
    \ org.hibernate.annotations.Parent;\n\n@Embeddable\npublic class Contact {\n \
    \   private String recipient;\n    private String phone;\n    private String address;\n\
    \    private Orders order;\n\n    @Parent\n    public Orders getOrder() {\n  \
    \      return order;\n    }\n    // other getters and setters\n}\n```\n\nA component\
    \ can be used to group not only normal properties, but also many-to-one and one-to-one\
    \ associations. Suppose you want to associate the address of an order to the address\
    \ in your customer database. To do this, create an address table using the following\
    \ query:\n\n```sql\nCREATE TABLE ADDRESS (\n    id bigint NOT NULL,\n    STREET_ADDRESS_1\
    \ varchar(100),\n    STREET_ADDRESS_2 varchar(100),\n    CITY varchar(100),\n\
    \    STATE varchar(2),\n    ZIP_CODE INT,\n    PRIMARY KEY (id)\n)\n```\n\nNow,\
    \ create the entity class and the Hibernate mapping XML file:\n\n```java\npackage\
    \ com.hibernaterecipes.chapter3;\n\npublic class Address {\n    private Long id;\n\
    \    private String address1;\n    private String address2;\n    private String\
    \ city;\n    private String state;\n    private Integer zipCode;\n    // getters\
    \ and setters\n}\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <!DOCTYPE hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\
    \n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\">\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter3\">\n    <class name=\"Address\" table=\"\
    ADDRESS\">\n        <id name=\"id\" type=\"long\" column=\"ID\">\n           \
    \ <generator class=\"native\" />\n        </id>\n        <property name=\"address1\"\
    \ type=\"string\" column=\"STREET_ADDRESS_1\" />\n        <property name=\"address2\"\
    \ type=\"string\" column=\"STREET_ADDRESS_2\" />\n        <property name=\"city\"\
    \ type=\"string\" column=\"CITY\" />\n        <property name=\"state\" type=\"\
    string\" column=\"STATE\" />\n        <property name=\"zipCode\" type=\"integer\"\
    \ column=\"ZIP_CODE\" />\n    </class>\n</hibernate-mapping>\n```\n\nAnd now,\
    \ edit the `Contact` class as follows:\n\n```java\npackage com.hibernaterecipes.chapter3;\n\
    \npublic class Contact {\n    private String recipient;\n    private Phone phone;\n\
    \    private Address address;\n    // getters and setters\n}\n```\n\nChange the\
    \ `Orders` XML mapping file to include the association:\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate\
    \ Mapping DTD 3.0//EN\"\n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">\n    <class name=\"\
    Orders\" table=\"ORDERS\">\n        <id name=\"id\" type=\"long\" column=\"ID\"\
    >\n            <generator class=\"native\" />\n        </id>\n        <component\
    \ name=\"weekdayContact\" class=\"Contact\">\n            <property name=\"recipient\"\
    \ type=\"string\" column=\"WEEKDAY_RECIPIENT\" />\n            <component name=\"\
    phone\" class=\"Phone\">\n                <property name=\"areaCode\" type=\"\
    string\" column=\"WEEKDAY_AREACODE\" />\n                <property name=\"telNo\"\
    \ type=\"string\" column=\"WEEKDAY_TELEPHONE\" />\n            </component>\n\
    \            <many-to-one name=\"address\" class=\"Address\" column=\"WEEKDAY_ADDRESS_ID\"\
    \ />\n        </component>\n        <component name=\"holidayContact\" class=\"\
    Contact\">\n            <property name=\"recipient\" type=\"string\" column=\"\
    HOLIDAY_RECIPIENT\" />\n            <component name=\"phone\" class=\"Phone\"\
    >\n                <property name=\"areaCode\" type=\"string\" column=\"HOLIDAY_AREACODE\"\
    \ />\n                <property name=\"telNo\" type=\"string\" column=\"HOLIDAY_TELEPHONE\"\
    \ />\n            </component>\n            <many-to-one name=\"address\" class=\"\
    Address\" column=\"HOLIDAY_ADDRESS_ID\" />\n        </component>\n    </class>\n\
    </hibernate-mapping>\n```\n\n## 3.4 Mapping a Collection of Components\n\n###\
    \ Problem\n\nDoes Hibernate support mapping a collection of dependent objects?\
    \ How do you map a collection of components?\n\n### Solution\n\nHibernate provides\
    \ `<composite-element>` for mapping a collection of components. The collection\
    \ elements/tags `<set>`, `<list>`, `<map>`, `<bag>`, and `<idbag>` can accommodate\
    \ the `<composite-element>` to map a collection of dependent objects.\n\n### How\
    \ It Works\n\nAnd now, add this new XML to the Hibernate XML mapping file. You\
    \ can use the nested components as shown here in the main method:\n\n```java\n\
    package com.hibernaterecipes.chapter3;\n\nimport org.hibernate.Session;\nimport\
    \ org.hibernate.SessionFactory;\nimport org.hibernate.Transaction;\nimport org.hibernate.cfg.Configuration;\n\
    import org.hibernate.stat.Statistics;\n\npublic class Launch {\n    private static\
    \ SessionFactory sessionFactory;\n\n    public static Session getSession() {\n\
    \        if(sessionFactory == null) {\n            sessionFactory = new Configuration().configure()\n\
    \                .buildSessionFactory();\n        }\n        Session hibernateSession\
    \ = sessionFactory.openSession();\n        return hibernateSession;\n    }\n\n\
    \    public static void main(String[] args) {\n        Session session = getSession();\n\
    \        Statistics stats = sessionFactory.getStatistics();\n        stats.setStatisticsEnabled(true);\n\
    \        Transaction tx = session.beginTransaction();\n        Orders ord = new\
    \ Orders();\n        Phone wdPhn = new Phone();\n        Phone hlPhn = new Phone();\n\
    \        wdPhn.setAreaCode(\"480\");\n        wdPhn.setTelNo(\"5463152\");\n \
    \       hlPhn.setAreaCode(\"702\");\n        hlPhn.setTelNo(\"5643569\");\n  \
    \      Contact cnt = new Contact();\n        Contact weekDayCnt = new Contact();\n\
    \        cnt.setAddress(\"132,vacation street, Miami, Fl - 23232\");\n       \
    \ cnt.setPhone(wdPhn);\n        cnt.setRecipient(\"John Doe 1\");\n        weekDayCnt.setRecipient(\"\
    John Doe\");\n        weekDayCnt.setAddress(\"512364, Permanent home, Scottsdale,\
    \ AZ - 85254\");\n        weekDayCnt.setPhone(hlPhn);\n        ord.setWeekdayContact(weekDayCnt);\n\
    \        ord.setHolidayContact(cnt);\n        session.save(ord);\n        tx.commit();\n\
    \        stats.getSessionOpenCount();\n        stats.logSummary();\n        session.close();\n\
    \    }\n}\n```"
