    \ = holidayContact;\n}\n```\n\n## Summary\n\nIn this chapter, you learned the\
    \ four basic inheritance strategies: table per class hierarchy, table per subclass,\
    \ table per concrete class with unions, and table per concrete class with implicit\
    \ polymorphism.\n\nYou saw the implementation of these four inheritance mapping\
    \ strategies and learned how to choose the appropriate strategy. Table 4-1 summarizes\
    \ the relationship between the inheritance strategies and polymorphic associations.\n\
    \n**Table 4-1. Polymorphic Associations Supported by Various Inheritance Strategies**\n\
    \n| Inheritance Strategy | Polymorphic Many-to-One | Polymorphic One-to-One |\
    \ Polymorphic One-to-Many | Polymorphic Many-to-Many |\n|----------------------|------------------------|------------------------|-------------------------|--------------------------|\n\
    | Table per class hierarchy | `<many-to-one>` | `<one-to-one>` | `<one-to-many>`\
    \ | `<many-to-many>` |\n| Table per subclass | `<many-to-one>` | `<one-to-one>`\
    \ | `<one-to-many>` | `<many-to-many>` |\n| Table per concrete class with unions\
    \ | `<many-to-one>` | `<one-to-one>` | `<one-to-many>` (for `inverse=\"true\"\
    ` only) | `<many-to-many>` |\n| Table per concrete class with implicit polymorphism\
    \ | `<any>` | Not supported | Not supported | `<many-to-any>` |\n\nYou’ve seen\
    \ how inheritance mapping enables polymorphic queries; Table 4-2 summarizes the\
    \ polymorphic query capabilities supported by various inheritance strategies.\
    \ You’ve also learned about the basic data types that Hibernate supports and the\
    \ implementation of some custom data types.\n\n**Table 4-2. Polymorphic Queries\
    \ Supported by Various Inheritance Strategies**\n\n| Inheritance Strategy | Polymorphic\
    \ `load()`/`get()` | Polymorphic Queries | Polymorphic Joins | Outer Join Fetching\
    \ |\n|----------------------|------------------------------|---------------------|-------------------|---------------------|\n\
    | Table per class hierarchy | Supported | Supported | Supported | Supported |\n\
    | Table per subclass | Supported | Supported | Supported | Supported |\n| Table\
    \ per concrete class with unions | Supported | Supported | Supported | Supported\
    \ |\n| Table per concrete class with implicit polymorphism | Supported | Supported\
    \ | Not supported | Not supported |\n\n# Chapter 5: Many-to-One and One-to-One\
    \ Mapping\n\nIn general, entities are related or associated to each other. For\
    \ example, a `Customer` is associated with an `Address`. A `Customer` can have\
    \ one or more than one `Address` (for example, `Billing` and `Shipping`). These\
    \ relationships or associations are represented differently in a relational model\
    \ and the domain/object model.\n\nIn a relational model, a foreign key column\
    \ represents the dependency of one table on another. The `Customer` table has\
    \ an `AddressId` as the foreign key column, which is the primary key of the `Address`\
    \ table.\n\nFrom the `Customer` perspective, because a `Customer` can have multiple\
    \ addresses, so it’s a many-to-one relationship. On the other hand, from the `Address`\
    \ perspective, one address can belong to only one customer, so it’s a one-to-one\
    \ relationship.\n\nThe same relationship is represented in terms of classes and\
    \ attributes in an object model. The `Customer` class has an attribute to hold\
    \ multiple addresses belonging to that `Customer` (in Java, this is represented\
    \ as a collection—`List`, `Set`, and so on). The `Address` class has an attribute\
    \ of `Customer` type.\n\nIn the case of `Customer` and `Address` example, you\
    \ consider the association from the view of both the `Customer` entity and the\
    \ `Address` entity, so it’s a *bidirectional association*. If you use the association\
    \ from only one entity, it’s a *unidirectional association*. In an object/relational\
    \ mapping (ORM) framework, these relationships are represented using metadata\
    \ in the configuration file as well using the entities/objects.\n\nThis chapter\
    \ shows you how these associations are represented in Hibernate and also discusses\
    \ the following features:\n\n- Various ways to use the many-to-one and one-to-one\
    \ mappings\n- How to make unidirectional associations into bidirectional associations\n\
    - How to use features like lazy initialization and cascade\n- How to map an association\
    \ or a join table\n\n## 5.1 Using Many-To-One Associations\n\n### Problem\n\n\
    Coming back to the online bookshop example, a publisher can publish many books.\
    \ This relationship between the books and the publisher is a many-to-one relationship.\
    \ How do you map objects in this case using the many-to-one association? How do\
    \ you use the cascade option to persist the class hierarchy?\n\n### Solution\n\
    \nAs already mentioned, the association from books to publisher is a many-to-one\
    \ association. Because this association is navigable from book to publisher only,\
    \ it’s also a unidirectional association. You use the `<many-to-one>` element\
    \ to establish this association.\n\n### How It Works\n\nYour application has a\
    \ `Publisher` class that hasn’t been mapped to the database. Following the best\
    \ practice of object identifiers discussed in Chapter 4, you can add an autogenerated\
    \ `id` property on the class. Figure 5-1 shows the entity relationship drawing\
    \ for a many-to-one unidirectional association.\n\n*Figure 5-1. Entity-relationship\
    \ drawing showing a many-to-one unidirectional association*\n\n```java\npublic\
    \ class Publisher implements Serializable {\n    private Long publisher_id;\n\
    \    private String code;\n    private String name;\n    private String address;\n\
    \    // getters and setters\n}\n```\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
    >\n    <class name=\"Publisher\" table=\"Publisher\" schema=\"BOOK5\">\n     \
    \   <id name=\"Publisher_id\" type=\"long\" column=\"PUBLISHER_ID\">\n       \
    \     <generator class=\"native\"></generator>\n        </id>\n        <property\
    \ name=\"code\" type=\"string\">\n            <column name=\"CODE\" length=\"\
    4\" not-null=\"true\" unique=\"true\" />\n        </property>\n        <property\
