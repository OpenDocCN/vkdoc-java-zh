    forward to the view **booklist.jsp** when you finish querying the books. Note
    that the list of books you get from the database is set as an attribute on the
    **request** object with the method **setAttribute()**. JSPs have implicit variables
    that help simplify code: the available variables are **request**, **response**,
    **out**, **session**, **application**, **config**, **pageContext**, and **page**.
    You set the list of books you receive from the database to the **books** attribute.
    And in the JSP, you read from this attribute:


    public class BookListServlet extends HttpServlet {


    protected void doGet(HttpServletRequest request, HttpServletResponse response)


    throws ServletException, IOException {


    **SessionFactory factory = HibernateUtil.getSessionFactory();**


    **Session session = factory.openSession();**


    **try {**


    CHAPTER 14 ■ WEB APPLICATIONS


    **Query query = session.createQuery("from Book");**


    **List books = query.list();**


    **request.setAttribute("books", books);**


    **} finally {**


    **session.close();**


    **}**


    **RequestDispatcher dispatcher = request.getRequestDispatcher("booklist.jsp");**
    **dispatcher.forward(request, response);**


    **}**


    **}**


