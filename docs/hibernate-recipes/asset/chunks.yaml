    Summary


    Now you have a good understanding of the persistence lifecycle and the states
    an object can have during its lifecycle. When you’re working with a detached object,
    you can either reattach or merge the object.


    You should be able to use dynamic data filtering to provide security or to access
    temporal/regional data.


    You’ve also learned to use interceptors to persist common properties like created
    date and created by.


    **C H A P T E R 11**


    ■ ■ ■


    **Batch Processing and Native SQL**


    *Batch processing* is the execution of a series of programs. From an application
    standpoint, batch processing means reading data from a persistent store, doing
    something with the data, and then possibly storing the processed data in the persistent
    store. Batch processing allows for the automation and sharing of computer resources.
    It’s usually run when computer resources are less busy.


    Let’s say that for the bookshop application, you want to increase sales by putting
    all books in the shop on sale on the 27th and 28th of the month. This is a classic
    case for implementing batch processing.


    The night before 27th, you list all the books that are in stock and implement
    the required discount. And on the night of 28th, the discount is removed.'
