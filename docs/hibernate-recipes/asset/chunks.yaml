    Problem


    How do you cache collections?


    Solution


    Collections also can be cached explicitly in Hibernate. If a persistent object
    contains associated objects in a collection, the collection can also be cached
    explicitly. If the collection contains **value** types, they’re stored by their
    values. If the collection contains objects, the object’s identifiers are cached.


    How It Works


    For the associated chapters of a book to be cached, you enable caching for the
    **Chapter** class. The cached **chapter** objects are stored in a region names
    **com.metaarchit.bookshop.Chapter**:


    ****<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Book" table="BOOK">**


    **<cache usage="read-write" />**


    **...**


    **<set name="chapters" table="BOOK_CHAPTER">**


    **<key column="BOOK_ID" />**


    **<one-to-many class="Chapter" />**


    **</set>**


    **</class>**


    **</hibernate-mapping>**


    CHAPTER 12 ■ CACHING IN HIBERNATE


    **<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Chapter" table="CHAPTER">**


    <cache usage="read-write" />


    **...**


    **<many-to-one name="book" class="Book" column="BOOK_ID" />**


    **</class>**


    **</hibernate-mapping>**


