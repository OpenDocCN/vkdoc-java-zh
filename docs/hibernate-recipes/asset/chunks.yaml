- fmt: '# HQL and JPA Query Language


    ## Map Collection


    For the map collection, you need to use the keyword `as` to specify the map key
    for each field. In the case of a map, the result is a `List` of `Map` objects:


    ```

    String queryString =

    "select new map(

    book.isbn as bookIsbn, book.name as bookName, book.publisher.name as publisherName

    ) from Book book";

    Query query = session.createQuery(queryString);

    List books = query.list();


    if(books!=null)

    {

    System.out.println("Size- "+books.size());

    Iterator it = books.iterator();

    while(it.hasNext())

    {

    Map book = (Map)it.next();

    Set bookSet = book.keySet();


    Iterator listIt = bookSet.iterator();

    while(listIt.hasNext())

    {

    String key = (String)listIt.next();

    System.out.println("Inside chapter{ Key- "+key+" },{ Value- "+book.get(key)+"}");

    }

    System.out.println(" ");

    }

    }

    ```


    ## Joining


    ### Problem


    How do you create various types of joins in HQL and JPA QL?


    ### Solution


    Hibernate and JPA support both inner and outer joins. You use the dot operator
    (`.`) to express implicit association joins.


    ### How It Works


    Let''s look at all the different types of joins you can take advantage of.


    #### Explicit Joins


    In HQL, you can use the `join` keyword to join associated objects. The following
    query finds all the books published by the publisher "Apress". The result contains
    a list of object pairs in the form of an array of `Objects(Object[])`. Each pair
    consists of a `book` object and a `publisher` object:


    ```

    from Book book join book.publisher publisher

    where publisher.name = ''Apress''

    ```


    In addition to many-to-one associations, all other kinds of associations can be
    joined. For example, you can join the one-to-many association from `book` to `chapters`.
    The following query finds all the books containing a chapter titled "Hibernate
    Basics". The result contains a list of object pairs; each pair consists of a `book`
    object and a collection of `chapters`:


    ```

    from Book book join book.chapters chapter

    where chapter.title = ''Hibernate Basics''

    ```


    #### Implicit Joins


    In the previous joins, you specify the `join` keyword to join associated objects.
    This kind of join is called an *explicit join*. You can also reference an association
    directly by name: this causes an *implicit join*. For example, the previous two
    queries can be expressed as follows. The result contains only a list of `book`
    objects, because no join is specified in the `from` clause:


    ```

    from Book book

    where book.publisher.name = ''Manning''

    ```


    Note that implicit joins are directed along many-to-one or one-to-one associations.
    They''re never directed along many-to-many associations. This means you can never
    use something like:


    ```

    String QueryString3 =

    "from Book8_1 book where book.chapters.title = ''Many-To-Many Association''";

    Query query1 = session.createQuery(QueryString3);

    List<Chapter8_1> chptrs = query1.list();

    ```


    The correct usage is as follows:


    ```

    String queryString =

    "from Book8_1 book join book.chapters chapter where chapter.title=:title";

    Query query = session.createQuery(queryString);

    query.setString("title", "Many-To-Many Association");

    List books = query.list();

    ```


    #### Outer Joins


    If you use the following HQL to query for books joined with publishers, books
    with null publisher aren''t included. This type of join is called an *inner join*,
    and it''s the default if you don''t specify a join type or if you specify `inner
    join`. It has the same meaning as an inner join in SQL:


    ```

    from Book book join book.publisher

    ```


    If you want to get all books regardless of whether the publisher is null, you
    can use a left join by specifying `left join` or `left outer join`:


    ```

    from Book book left join book.publisher

    ```


    HQL supports two other types of joins: right joins and full joins. They have the
    same meaning as in SQL but are seldom used.


