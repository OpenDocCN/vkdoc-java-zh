    [**http://tomcat.apache.org/**](http://tomcat.apache.org) 并下载 Tomcat 5.5。将其安装到名为
    **C:\Tomcat** 的文件夹中。请注意，在安装过程中，你需要指定 Java 开发工具包（JDK）的安装路径，而不是 Java 运行时环境（JRE）。


