    a persistence context. Its state is then synchronized with the database:


    ```

    Session session = getSession();

    Transaction tx = session.beginTransaction();

    Book book = (Book) session.get(Book.class, new Long(294912));

    book.setName("Book Name - hibernate 2");

    tx.commit();

    session.close();

    ```


    The entity is retrieved from the database and modified in the same transaction.
    The modifications are propagated to the database when the `commit()` method is
    called. The persistence context identifies the changes that have been made to
    the entity’s state and synchronizes with the database. This is called *automatic
    dirty checking*.


    The implementation in JPA is as follows:


    ```

    EntityManager manager = SessionManager.getEntityManager();

    EntityTransaction tran = manager.getTransaction();

    tran.begin();

    Book book = manager.find(Book.class, new Long(294912));

    book.setBookName("Book Name - hibernate 22");

    tran.commit();

    manager.close();

    ```


    ## Deleting a Persistent Object


    You can delete from the database any persistent object that is associated with
    a session and a persistence context. To do so, you call the `delete()` method:


    ```

    Session session = getSession();

    Transaction tx = session.beginTransaction();

    Book book = (Book) session.get(Book.class, new Long(294912));

    session.delete(book);

    tx.commit();

    session.close();

    ```


    The entity is in the removed state after the call to `delete()`. The database
    record is deleted after the transaction is committed, and the object is in the
    transient state after the session is closed.


    In JPA, the `remove()` method performs the same function as the `delete()` method:


    ```

    EntityManager manager = SessionManager.getEntityManager();

    EntityTransaction tran = manager.getTransaction();

    tran.begin();

    Book book = manager.find(Book.class, new Long(294912));

    manager.remove(book);

    tran.commit();

    manager.close();

    ```


    ## 10.3 Persisting Detached Objects


    ### Problem


    How do you persist a detached object?


    ### Solution


    You can persist a detached object two ways: by reattaching it or by merging it.


    ### How It Works


    You first reattach a detached object and then merge one.


    #### Reattaching a Detached Object


    In Hibernate, you use the session’s `update()` method to reattach a detached object
    to the session and persistence context:


    ```

    Session session = getSession();

    Transaction tx = session.beginTransaction();

    Book book = (Book) session.get(Book.class, new Long(294912));

    tx.commit();

    session.close();

    book.setName("Detached Hibernate");

    Session session2 = getSession();

    Transaction tx2 = session2.beginTransaction();

    session2.update(book);

    tx2.commit();

    session2.close();

    ```


    Hibernate keeps track of modifications made to the detached object. Hence, when
    the `update()` method is called, it always schedules an `update` SQL command.
    If you don’t want to make an `update` call, you can configure the class mapping
    to have `select-before-update=''true''`. Then, a `get()` call is made to check
    whether the object has been updated, before the call to the `update()` method.


    JPA doesn’t have an `update()` method. It only supports merging detached objects.


    #### Merging a Detached Object


    In Hibernate, you use the session’s `merge()` method to persist a detached object.
    The `merge()` method call results in a complex set of actions. Hibernate first
    looks to see if the instance of the entity is in the current persistence context.
    If it finds an instance of the entity equal to the detached object, then it copies
    the state from the detached object to the instance in the persistence context:


    ```

    Session session = getSession();

    Transaction tx = session.beginTransaction();

    Book book = (Book) session.get(Book.class, new Long(294912));

    tx.commit();

    session.close();

    book.setName("Detached Hibernate");

    Session session2 = getSession();

    ```'
