    1.5 Using Entity Manager


    Problem


    Is there a generalized mechanism to configure ORM with less dependency on individual
    providers like Hibernate, TopLink, and so on?


    Solution


    A *persistence context* is defined by the JPA specification as a set of managed
    entity instances where the entity instances and their lifecycles are managed by
    an entity manager. Each ORM vendors provides its own entity manager, which is
    a wrapper around the core API and thus supports the JPA programming interfaces,
    JPA entity instance lifecycles, and the query language. This provides a generalized
    mechanism for object/relational development and configuration.


    How It Works


    You obtain the Hibernate EntityManager from an entity manager factory. When container-managed
    entity managers are used, the application doesn’t interact directly with the entity
    manager factory. Such entity managers are obtained mostly through JNDI lookup.
    In the case of application-managed entity managers, the application must use the
    entity manager factory to manage the entity manager and the persistence context
    lifecycle. This example uses the application-managed entity manager.


    **EntityManagerFactory** has the same role as the **SessionFactory** in Hibernate.
    It acts a factory class that provides the **EntityManager** class to the application.
    It can be configured either programmatically or 23


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    using XML. When you use XML to configure it, the file must be named **persistence.xml**
    and must be located in your classpath.


    Here’s the **persistence.xml** file for the **Book** example:


    ****<?xml version="1.0" encoding="UTF-8"?>**


    [**<persistence**](http://java.sun.com/xml/ns/persistence)


    [](http://www.w3.org/2001/XMLSchema-instance)


    ****xsi:schemaLocation=**


    [**"http://java.sun.com/xml/ns/persistence**](http://www.w3.org/2001/XMLSchema-instance)


    [**http://java.sun.com/xml/ns/persistence/persistence_1_0.xsd"**](http://www.w3.org/2001/XMLSchema-instance)


    **version="1.0">**


    **<persistence-unit name="book" transaction-type="RESOURCE_LOCAL">


    <provider>org.hibernate.ejb.HibernatePersistence</provider>


    <class>com.hibernaterecipes.annotations.domain.Book</class>


    ****<properties>**


    **<property name="hibernate.connection.driver_class"**


    **value="org.apache.derby.jdbc.EmbeddedDriver"/>**


    **<property name="hibernate.connection.username"**


    **value="book"/>**


    **<property name="hibernate.connection.password"**


    **value="book"/>**


    **<property name="hibernate.connection.url"**


    [**value="jdbc:derby://localhost:1527/BookShopDB"/>**](derby://localhost:1527/BookShopDB)


    **<property name="hibernate.dialect"**


    **value="org.hibernate.dialect.DerbyDialect"/>**


    **</properties>**


    **</persistence-unit>**


    **</persistence>**


    **In this **persistence.xml** file, the complete unit is defined by **<persistence-unit>**
    . This name should match the name used when you create a **EntityManagerFactory**.


    The transaction-type **RESOURCE_LOCAL** is used here. Two transaction types define
    transactional behavior: JTA and **RESOURCE_LOCAL**. JTA is used in J2EE managed
    applications where the container is responsible for transaction propagation. For
    application-managed transactions, you can use **RESOURCE_LOCAL**.


    The **<provider>** tag specifies the third-party ORM implementation you use. In
    this case, it’s configured to use the Hibernate Persistence provider.


    The entity instances are configured with the **<class>** tag.'
