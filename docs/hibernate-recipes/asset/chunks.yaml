    数据库表中的主键用于唯一标识该表中的一条记录。主键值不能为空，并且在表内是唯一的。主键还用于建立两个表之间的关系——它在关联表中被定义为外键。由于主键用于标识特定记录，因此它也可以被称为*数据库标识符*。Hibernate
    通过持久化实体的标识符属性将数据库标识符暴露给应用程序。本章讨论为数据库记录生成标识符（主键）的各种方法。你将了解元数据配置及其对持久化机制的影响。


    2.1 为持久化提供 ID


    问题


    如何为数据库实体生成标识符？有哪些可行的策略？


    解决方案


    使用 id 元素（**<id>** ）在 Hibernate XML 文件中创建映射。id 元素具有诸如 **column**、**type** 和 **generator**
    等属性，用于生成标识符。JPA 规范要求每个实体都必须有一个主键。从 JPA 的角度来看，**@id** 用于定义标识符的生成方式。


    当使用继承映射时，多个类可以映射到同一个表。这些类（子类和超类）被称为处于一个*实体层次结构*中。主键必须在实体层次结构中精确地定义一次，要么在作为实体层次结构根的实体上定义，要么在实体层次结构的映射超类上定义。诸如
    **@GeneratedValue** 和 **@column** 等属性用于定义列映射和策略。


    工作原理


    你需要在持久化到数据库之前，让 Hibernate 为你生成这个 ID。Hibernate 提供了许多内置的 ID 生成策略：


    第 2 章 ■ 基本映射与对象标识


    • 数据库序列


    • 原生生成器


    • 递增生成器


    • HiLo 生成器


    其中一些策略仅适用于特定的数据库；例如，序列策略在 MYSQL 中不受支持，但由 Oracle 提供。


    JPA 也提供了一种生成标识符的方式。


    Hibernate XML 映射


    我们将依次介绍每种策略，从数据库序列开始。在本节中，我们将向数据库中插入三本书。以下是用于向 **Book** 表插入记录的 **Launch** 类：


    ****package com.hibernaterecipes.chapter2;**


