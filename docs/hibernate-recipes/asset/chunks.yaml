- fmt: "### 7.2 Mapping a One-to-Many Bidirectional Association Using a Foreign Key\n\
    \n#### Problem\n\nHow do you map objects using a one-to-many bidirectional association\
    \ with a foreign key?\n\n#### Solution\n\nIn some cases, you want your associations\
    \ to be bidirectional. Suppose you have a page that displays the detail of a `Chapter`\
    \ inside a `Book`. You need to know which `Book` this `Chapter` belongs to, given\
    \ a `chapter` object. You can do this by adding a reference to `Book` in the `Chapter`\
    \ class. This association is a one-to-many association. The book-to-chapter and\
    \ chapter-to-book associations combine to form a bidirectional association.\n\n\
    #### How It Works\n\nIn the previous example, you treated each chapter of a `Book`\
    \ as a string and stored it in a collection. Now, you extend this recipe by making\
    \ each `Chapter` of a persistent object type. One `book` object can relate to\
    \ many `chapter` objects, so this is a one-to-many association. You first define\
    \ this association as unidirectional—navigable from `book` to `chapter` only—and\
    \ then extend it to be bidirectional.\n\nThe `Chapter` class is updated to include\
    \ the `book` as follows:\n\n```java\npublic class Chapter7_1 {\n    private Long\
    \ id;\n    private Book7_1 book;\n    private String title;\n    private int noOfPages;\n\
    \    // Getters and Setters\n}\n```\n\nThe Hibernate mapping for `Chapter` is\
    \ as follows:\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter7\"\
    >\n    <class\n        name=\"Chapter7_1\"\n        table=\"CHAPTER7_1\"\n   \
    \     dynamic-insert=\"true\"\n        dynamic-update=\"true\"\n        schema=\"\
    BookShop7\">\n        <id name=\"id\" column=\"id\" type=\"long\">\n         \
    \   <generator class=\"native\">\n            </generator>\n        </id>\n  \
    \      <property name=\"title\" type=\"string\" column=\"title\" />\n        <property\
    \ name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />\n        <many-to-one\
    \ name=\"book\"\n            column=\"book_id\" class=\"Book7_1\"\n        ></many-to-one>\n\
    \    </class>\n</hibernate-mapping>\n```\n\nYou get three SQL statements to save\
    \ one book with one chapter from the unidirectional association. Ideally, you\
    \ want to avoid the update query. This can be achieved by setting the `inverse`\
    \ attribute to `true` in the book mapping class:\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter7\">\n    <class name=\"Book7_1\" table=\"\
    BOOK7_1\" schema=\"BookShop7\">\n        <id name=\"book_id\" column=\"BOOK_ID\"\
    \ type=\"long\">\n            <generator class=\"native\">\n            </generator>\n\
    \        </id>\n        <property name=\"isbn\" type=\"string\" column=\"ISBN\"\
    \ />\n        <property name=\"bookName\" type=\"string\" column=\"BOOK_NAME\"\
    \ />\n        <property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
    \ />\n        <property name=\"price\" type=\"long\" column=\"PRICE\" />\n   \
    \     <set name=\"chapters\" inverse=\"true\">\n            <key column=\"BOOK_ID\"\
    \ />\n            <one-to-many class=\"Chapter7_1\" />\n        </set>\n    </class>\n\
    </hibernate-mapping>\n```\n\nThe foreign key `BOOK_ID` has two representations\
    \ in memory: the `Book` property of `Chapter` and the element of the `chapters`\
    \ collection held by `Book`. Suppose you add a `chapter` to a `book` object. Also\
    \ say you haven’t initially set `inverse=\"true\"`, and you established bidirectionality\
    \ as follows:\n\n```java\nchapter.setBook(book);\nbook.getChapters().add(chapter);\n\
    ```\n\nIf you save the `chapter` object, two SQL statements are executed, because\
    \ Hibernate doesn’t know that the mapping of `BOOK_ID` in the `book` and `chapter`\
    \ mapping files refers to the same database column.\n\nThe SQL statements executed\
    \ are shown here:\n\n```sql\ninsert into BookShop7.CHAPTER7_1 (title, NUM_OF_PAGES,\
    \ book_id, id) values (?, ?, ?, ?)\nupdate BookShop7.CHAPTER7_1 set BOOK_ID=?\
    \ where id=?\n```\n\nNow, add `inverse=\"true\"`. When you save the `chapter`,\
    \ you see that only one insert on the `chapter` is executed. This is because you\
    \ tell Hibernate that `BOOK_ID` is the same in both mapping files.\n\nIn JPA,\
    \ the `Chapter` class is as follows:\n\n```java\n@Entity (name=\"chapter\")\n\
    @Table (name=\"Chapter7_1\", schema=\"BOOKSHOP\")\npublic class Chapter7_1 {\n\
    \    @Id\n```"
