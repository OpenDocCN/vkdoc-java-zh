- fmt: "# JPA 注解中的一对一双向关联\n\n在 JPA 注解中，`Customer` 类的 `Address` 属性使用 `@OneToOne` 和\
    \ `@JoinColumn` 注解进行映射。同时请注意，您启用了 `cascade` 特性，该特性会保存与客户关联的地址：\n\n```java\n@Entity\n\
    @Table(name=\"CUSTOMER\", schema=\"BOOK5\")\npublic class Customer5_2 implements\
    \ Serializable {\n\n    private static final long serialVersionUID = -3534434932962734600L;\n\
    \n    @Column(name=\"ID\")\n    @Id\n    @GeneratedValue(strategy=GenerationType.AUTO)\n\
    \    private Long id;\n\n    @Column(name=\"COUNTRY_CODE\")\n    private String\
    \ countryCode;\n\n    @Column(name=\"ID_CARD_NO\")\n    private String idCardNo;\n\
    \n    @Column(name=\"FIRST_NAME\")\n    private String firstName;\n\n    @Column(name=\"\
    LAST_NAME\")\n    private String lastName;\n\n    @OneToOne(cascade=CascadeType.ALL)\n\
    \    @JoinColumn(name=\"ADDRESS_ID\")\n    private Address5_2 address;\n\n   \
    \ @Column(name=\"EMAIL\")\n    private String email;\n\n    // getters and setters\n\
    }\n```\n\n`Address` 类如下所示。`customer` 使用另一个 `@OneToOne` 注解进行映射，这使其成为双向关联。通过 `mappedBy`\
    \ 属性实现反向属性引用：\n\n```java\n@Entity\n@Table(name=\"ADDRESS\", schema=\"BOOK5\")\n\
    public class Address5_2 implements Serializable {\n\n    private static final\
    \ long serialVersionUID = -605474766287314591L;\n\n    @Id\n    @Column(name=\"\
    ADDRESS_ID\")\n    @GeneratedValue(strategy=GenerationType.AUTO)\n    private\
    \ Long id;\n\n    @Column(name=\"CITY\")\n    private String city;\n\n    @Column(name=\"\
    STREET\")\n    private String street;\n\n    @Column(name=\"DOOR_PLATE\")\n  \
    \  private String doorplate;\n\n    @OneToOne(mappedBy=\"address\")\n    private\
    \ Customer5_2 customer;\n\n    // getters and setters\n}\n```\n\n## 使用连接表创建一对一的关联\n\
    \n### 问题\n\n表示一对一关联的另一种策略是使用连接表。如配方 5.2 所述，在某些场景中，表中的外键为 `null`。为了避免存储带有 `null`\
    \ 外键的行，您可以创建一个连接表，该表保存两个依赖实体的 ID。如何在 Hibernate 中使用连接表建立一对一关联？\n\n### 解决方案\n\n\
    映射一对一关联的最后一种方法是将连接表元素与多对一关联一起使用。除非 `<key>` 和 `<many-to-one>` 映射都需要唯一约束，否则没有区别。这种方法很少使用。\n\
    \n### 工作原理\n\n您需要使用脚本创建表，而不是将 `hbm2ddl.auto` 选项设置为 `Create`。您按如下方式创建 `ADDRESS`、`CUSTOMER`\
    \ 和连接表（`CUSTOMERADDRESS`）：\n\n```sql\ncreate table \"BOOK5\".\"ADDRESS\" (\n \
    \   address_Id bigint not null primary key,\n    CITY VARCHAR(50),\n    STREET\
    \ VARCHAR(50),\n    DOOR_PLATE VARCHAR(50)\n);\n\ncreate table \"BOOK5\".\"CUSTOMER\"\
    \ (\n    Id bigint not null primary key,\n    FIRST_NAME VARCHAR(50),\n    LAST_NAME\
    \ VARCHAR(50),\n    ID_CARD_NO VARCHAR(50),\n    COUNTRY_CODE VARCHAR(50),\n \
    \   EMAIL VARCHAR(50)\n);\n\ncreate table \"BOOK5\".\"CUSTOMERADDRESS\" (\n  \
    \  Id bigint not null primary key,\n    address_Id bigint not null unique\n);\n\
    ```\n\n用于单向关联的 `Address` 和 `Customer` 类如下所示：\n\n```java\npublic class Address5_3\
    \ implements Serializable {\n\n    private static final long serialVersionUID\
    \ = -605474766287314591L;\n    private Long addressId;\n    private String city;\n\
    \    private String street;\n    private String doorplate;\n\n    // getters and\
    \ setters\n}\n\npublic class Customer5_3 implements Serializable {\n\n    private\
    \ static final long serialVersionUID = -3534434932962734600L;\n    private Long\
    \ id;\n    private String countryCode;\n    private String idCardNo;\n    private\
    \ String firstName;\n    private String lastName;\n    private Address5_3 address;\n\
    \n    // getters and setters\n}\n```"
