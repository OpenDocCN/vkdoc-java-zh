    criteria.add(nameRest);\n\nBook books = (Book) criteria.uniqueResult();\n```\n\
    \nThis `Criteria` statement is the same as:\n\n```java\nCriterion nameRest = Restrictions.like(\"\
    name\", \"Hibernate%\");\n```\n\nThe following `MatchMode` values are available:\n\
    \n- **START**: Matches the start of the string with the pattern\n- **END**: Matches\
    \ the end of the string with the pattern\n- **ANYWHERE**: Matches the pattern\
    \ anywhere in the string\n- **EXACT**: Matches the complete pattern in the string\n\
    \n## Writing Subqueries\n\nUsing `Criteria`, you can also execute subqueries.\
    \ A *subquery* is a query that is nested inside another query. It’s also called\
    \ as *inner query* or *inner select*.\n\nFor example, here’s a subquery in SQL:\n\
    \n```sql\nselect publisher_name, address from Publisher pub where pub.code=(select\
    \ publisher_code from Book book where book.publish_date=current_timestamp)\n```\n\
    \nThis query fetches the name and address of any publisher whose book was published\
    \ today. The second `select` query is nested in the main SQL query.\n\nYou can\
    \ write this using `Criteria` as follows:\n\n```java\nDetachedCriteria todaysBook\
    \ = DetachedCriteria.forClass(Book.class)\n    .setProjection( (Projection) Property.forName(\"\
    publishDate\").eq(\"current_timestamp\") );\nList = manager.createCriteria(Publisher.class)\n\
    \    .add( Property.forName(\"publisherCode\").eq(todaysBook) )\n    .list();\n\
    ```\n\n## 9.3 Using Criteria in Associations\n\n### Problem\n\nHow do you express\
    \ a join restriction using the `Criteria` API when there are associated objects?\
    \ How do you use dynamic fetching?\n\n### Solution\n\nWhen you have associated\
    \ objects, you need to join them in order to retrieve data from them. In HQL,\
    \ you use an alias and an equijoin on the foreign key in the `where` clause:\n\
    \n```sql\nfrom Book b, Publisher p where b.publisherId = p.publisherId\n```\n\n\
    This query joins the `Publisher` object and `Book` object with `publisherId`,\
    \ which is the foreign key in `Book`.\n\nLet’s see how this is achieved using\
    \ the `Criteria` API. Hibernate provides two methods to enable joining of associated\
    \ entities: `createCriteria()` and `createAlias()`. The difference between the\
    \ two is that `createCriteria()` returns a new instance of `Criteria`. It means\
    \ you can nest calls to `createCriteria()`. The `createAlias()` method doesn’t\
    \ create a new instance of `Criteria` and is very similar to the alias you declare\
    \ in the HQL `from` clause.\n\n### How It Works\n\nYou can reference an association\
    \ property by its name to trigger an implicit join. For example, suppose you have\
    \ an `Order` class that contains a `Price` object, which holds details as `unitPrice`\
    \ and `currency`:\n\n```java\npublic class Order {\n    Price price;\n}\n\npublic\
    \ class Price {\n    String currency;\n    float unitPrice;\n}\n```\n\nIf you\
    \ need to fetch the `unitPrice` of an `Order`, you can use `Order.price.unitPrice`\
    \ in HQL:\n\n```sql\nfrom Order order where order.price.unitPrice > 50\n```\n\n\
    Can the same implicit join work using `Criteria`?\n\n```java\nCriteria criteria\
    \ = session.createCriteria(Book.class, \"book\")\n    .add(Restrictions.like(\"\
    name\", \"%Hibernate%\"))\n    .add(Restrictions.eq(\"book.publisher.name\", \"\
    Manning\"));\nList books = criteria.list();\n```\n\nIf you execute this code,\
    \ the following exception is thrown:\n\n```\nException in thread \"main\" org.hibernate.QueryException:\
    \ could not resolve property: publisher.name of: com.hibernaterecipes.chapter5.Book\n\
    at org.hibernate.persister.entity.AbstractPropertyMapping.propertyException(AbstractPropertyMap\
    \ ping.java:67)\n```\n\nHibernate can’t resolve the property `publisher.name`.\
    \ That means an implicit join isn’t supported for `Criteria` queries. To join\
    \ an association explicitly, you need to create a new `criteria` object for it:\n\
    \n```java\nCriteria criteria = session.createCriteria(Book.class)\n    .add(Restrictions.like(\"\
    name\", \"%Hibernate%\"))\n    .createCriteria(\"publisher\")\n    .add(Restrictions.eq(\"\
    name\", \"Manning\"));\n```"
