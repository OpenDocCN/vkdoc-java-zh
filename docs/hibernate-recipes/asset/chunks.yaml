    You can configure the cache for a specific class or a collection. The **<cache>**
    element is used to configure cache in the **hibernate.cfg.xml** file. The **<cache>**
    element is defined as follows:


    ****<cache usage="transactional|read-write|nonstrict-read-write|read-only"**


    **region="RegionName" include="all|lazy"/>**


    **Table 12-3 defines its attributes.


    CHAPTER 12 ■ CASHING IN HIBERNATE


    *Table 12-3\. **<cache>** Element Attributes*


    **Attribute Description**


    **usage**


    The caching strategy.


    **region**


    The region name. Region names are references to actual cached data.


    **include**


    Specifies that properties of the entity mapped with **lazy=true** can’t be


    cached when the attribute level **lazy fetching** is enabled.


