    whether the book **identifier(isbn)** is null. If it is, the action should be
    **add**; otherwise, it should be **update**. The generation of an identifier depends
    on the strategy you pick: you can let Hibernate generate one or have the application
    generate the identifier itself. The **session.saveOrUpdate()** method is very
    helpful for distinguishing the correct action:


