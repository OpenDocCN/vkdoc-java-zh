    -


    Permitted


    Permitted


    Read


    Uncommitted


    Permitted Permitted Permitted


    Every database management system has a default setting for the isolation level.
    You can change the default isolation level in the DBMS configuration. On JDBC,
    you can set the isolation level by using a property called **hibernate.connection.isolation**.
    Hibernate uses the following values to set a particular isolation level:


    • 8: Serializable isolation


    • 4: Repeatable Read isolation


    • 2: Read Committed isolation


    • 1: Read Uncommitted isolation


    This setting is applicable only when the connection isn’t obtained from an application
    server. In this scenario, you need to change the isolation level in the application
    server configuration.


    Now, let’s come back to the case of lost updates described at the beginning of
    this recipe (also in Table 13-1). You’ve seen a case where an update made by transaction
    1 is lost when transaction 2


    commits. Most applications are database connections with Read Committed isolation
    and use the optimistic concurrency control. One way of implementing optimistic
    control is to use versioning.


    How It Works


    Hibernate provides automatic versioning. Each entity can have a version, which
    can be a number or a timestamp. Hibernate increments the number when the entity
    is modified. If you’re saving with an older version (which is the case for transaction
    2 in the lost-update problem), Hibernate compares the versions automatically and
    throws an exception.


    To add a version number to an entity, you add a property called **version** of
    type **int** or **Integer**:


