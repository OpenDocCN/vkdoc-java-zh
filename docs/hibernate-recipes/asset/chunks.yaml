- fmt: "# HQL and JPA Query Language\n\n## Fetching Associations\n\nYou can use `join\
    \ fetch` to force a lazy association to be initialized. It differs from a pure\
    \ `join` in that only the parent objects are included in the result:\n\n```\n\
    from Book book join fetch book.publisher publisher\n```\n\nAn `inner join fetch`\
    \ query doesn't return `book` objects with a null `publisher`. If you want to\
    \ include them, you must use `left join fetch`:\n\n```\nfrom Book book left join\
    \ fetch book.publisher publisher\n```\n\n## Creating Report Queries\n\n### Problem\n\
    \nHow do you create queries that group and aggregate data?\n\n### Solution\n\n\
    You use the `select` clause to generate report queries. The `groupby` and `having`\
    \ clauses are used for aggregation. You saw how to use the `select` clause earlier\
    \ in this chapter.\n\n### How It Works\n\nLet's see how to aggregate and group\
    \ data.\n\n#### Projection with Aggregation Functions\n\nHQL and JPA QL support\
    \ the aggregate functions `count()`, `min()`, `max()`, `sum()`, and `avg()`. If\
    \ you want to know how many books are in your bookshop, you have to do something\
    \ like this:\n\n```\nString q2 = \"select count(i) from Book i\";\nQuery query\
    \ = session.createQuery(q2);\nLong count = (Long) query.uniqueResult();\n```\n\
    \nTo find the minimum and maximum prices of the books in the bookshop, you can\
    \ use a query like the following:\n\n```\nString q3 = \"select min(i.price),max(i.price)\
    \ from Book i\";\nQuery query = session.createQuery(q3);\nObject[] count = (Object[])\
    \ query.uniqueResult();\nSystem.out.println(\"Minimum price- \"+count[0]);\nSystem.out.println(\"\
    Maximum price- \"+count[1]);\n```\n\nNote that this query's return type is an\
    \ `Object[]` array.\n\n#### Grouping Aggregated Results\n\nYou can sort the result\
    \ list with an `order by` clause. Multiple fields and ascending/descending order\
    \ can be specified:\n\n```\nfrom Book book\norder by book.name asc, book.publishDate\
    \ desc\n```\n\nHQL also supports the `group by` and `having` clauses. They're\
    \ translated into SQL by Hibernate:\n\n```\nselect book.publishDate, avg(book.price)\n\
    from Book book\ngroup by book.publishDate\n```\n\n```\nselect book.publishDate,\
    \ avg(book.price)\nfrom Book book group by book.publishDate\nhaving avg(book.price)\
    \ > 10\n```\n\n## Summary\n\nIn this chapter, you've learned how to query a database\
    \ using Hibernate Query Language. You've seen how to use the `from`, `select`,\
    \ and `where` clauses that form the backbone of most queries. And you've learned\
    \ how to bind parameters to the query parameters. You should be able to externalize\
    \ queries by using named queries. If the result set size is large, you can use\
    \ pagination to retrieve a subset of the original result set. You've learned to\
    \ use the dot (`.`) operator to create implicit joins and the `join` keyword to\
    \ create explicit joins. You've also seen how to use aggregate functions like\
    \ `min()`, `max()`, `avg()`, `count()`, and `sum()`.\n\n# Querying with Criteria\
    \ and Example\n\nIn the previous chapter, you saw how to use Hibernate Query Language\
    \ (HQL) and Java Persistence Query Language (JPA QL). HQL forces you to interact\
    \ with the database using SQL-like syntax. You must have some knowledge of SQL\
    \ to create complex queries, which makes it difficult to develop applications\
    \ that use multicriteria queries.\n\nWith HQL and JPA QL, it's easy to make mistakes\
    \ with string concatenation and SQL syntax. Sometimes, errors occur due to the\
    \ simple fact that there is no space between two clauses in SQL. Because these\
    \ errors are uncovered only at runtime, if you have no unit test, you must go\
    \ through the long process of build and deployment on an application server to\
    \ catch them.\n\nUnlike HQL, Hibernate Criteria is completely object oriented.\
    \ It uses objects and their interfaces to load data from Hibernate-supported databases.\
    \ It presents an elegant and cleaner way to build dynamic queries. For example,\
    \ the following code invokes the Criteria API to fetch the `Book` details from\
    \ the database given a book's name and publisher:\n\n```\nCriteria criteria =\
    \ session.createCriteria(Book.class);\nif (startDate != null) {\n    criteria.add(Expression.ge(\"\
    bookName\",bookName);\n}\nif (endDate != null) {\n    criteria.add(Expression.le(\"\
    publisher\",publisher);\n}\nList results = criteria.list();\n```\n\nThe same code\
    \ when used with HQL must deal with string concatenation and setting parameters:\n\
    \n```\nString queryString = \"from Book where bookName=? and publisher=?\";\n\
    Session session = SessionManager.getSessionFactory().getCurrentSession();\nQuery\
    \ query = session.createQuery(arg0);\nquery.setParameter(0, \"Recipes\");\nquery.setParameter(1,\
    \ \"APress\");\nList<Book7_1> list = query.getResultList();\n```\n\nAs you can\
    \ see, accessing the data using Criteria is simpler and easy.\n\nIn this chapter,\
    \ you learn how to use Criteria and the Example API. The Java Persistence API\
    \ version 2.0 (JSR-317 JPA 2.0) has introduced a similar Criteria API to support\
    \ dynamic queries. This is still evolving; you can find the documentation at [http://openjpa.apache.org/builds/latest/docs/manual/jpa_overview_criteria.html](http://openjpa.apache.org/builds/latest/docs/manual/jpa_overview_criteria.html).\n\
    \nThe chapter shows how to apply restrictions to criterion objects to fetch data.\
    \ These restrictions act like the `where` clause in HQL or SQL. You learn how\
    \ to use a `criteria` object that isn't in a session: this is called a `DetachedCriteria`.\n\
    \n## Using Criteria\n\n### Problem\n\nHow do you create a basic `criteria` object\
    \ and use it to load data from a database?\n\n### Solution\n\nAs with HQL, you\
    \ get the `criteria` object from the session. If you don't have a session to create\
    \ a `criteria` object, then you can use `DetachedCriteria`. This `DetachedCriteria`\
    \ object is later used with the session to get the results. This recipe demonstrates\
    \ the basic implementation of the Criteria API.\n\n### How It Works\n\nA basic\
    \ Criteria query looks like this:\n\n```\nCriteria criteria = session.createCriteria(Book.class)\n\
    List books = criteria.list();\n```\n\nThis query corresponds to the following\
    \ HQL query:\n\n```\nfrom Book book\n```\n\nMost methods in the `Criteria` class\
    \ return an instance of themselves, so you can build up your criteria as follows.\
    \ Here you add a restriction to your criteria, which says that the name of the\
    \ book should be equal to \"Hibernate Quickly\":\n\n```\nCriteria criteria = session.createCriteria(Book.class)\n\
    \    .add(Restrictions.eq(\"name\", \"Hibernate Quickly\"));\nList books = criteria.list();\n\
    ```\n\nIf you don't have an open session, you can instantiate a detached criteria\
    \ by using the `forClass()` method and later attach it to a session for execution.\
    \ When you have a session to run the query, you call `getExecutableCriteria()`\
    \ and pass the session as a method argument. The `getExecutableCriteria()` method\
    \ returns an executable instance of `criteria`:\n\n```\nDetachedCriteria criteria\
    \ = DetachedCriteria.forClass(Book.class);\nList books = criteria.getExecutableCriteria(session).list();\n\
    ```\n\n## Using Restrictions\n\n### Problem\n\nHow do you filter data when using\
    \ criteria? How do you apply restriction to criteria?\n\n### Solution\n\nYou can\
    \ add a series of restrictions to your Criteria query to filter the results, just\
    \ as you build up the `where` clause in HQL. The `Restrictions` class provides\
    \ a variety of methods to build restrictions.\n\n### How It Works"
