    \ this case, it’s named `annotation.cfg.xml`), build the session factory using\
    \ the following statement:\n\n```\nnew AnnotationConfiguration()\n    .configure(\"\
    annotation.cfg.xml\")\n    .buildSessionFactory();\n```\n\nThere are other overloaded\
    \ `configure()` methods that you can use appropriately.\n\nThis section uses a\
