    13.4 Using Pessimistic Concurrency Control


    Problem


    How do you implement pessimistic concurrency control in your application to save
    the **book** entity?


    Solution


    Most applications have Read Committed as the isolation level. This isolation level
    permits unrepeatable reads, which isn’t desirable. One way to avoid unrepeatable
    reads is to implement versioning in the application. This upgrading of the isolation
    level from Read Committed to Repeatable Read comes with scalability issues. So,
    as an application developer, you may not want to make an application-wide upgrade
    to versioning—you may just want to upgrade the isolation level on a per-unit basis.
    To do so, Hibernate provides the **lock()** method in the Hibernate **session**
    object.


    CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY


