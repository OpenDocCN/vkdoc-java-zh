    The superclass Disc is defined as the root class and has a primary key of DISC_ID.
    The subclass is mapped using the joined-subclass element, and the joined-subclass
    element defines the subclass table with the attribute table. The joined-subclass
    classes like the AudioDisc class have a key element that provides for the association
    between itself and its parent.


    Using JPA annotation, the superclass (Disc in this case) uses the Inheritance
    annotation with the inheritance strategy type of JOINED:


    @Entity


    @Inheritance (strategy=InheritanceType. *JOINED*)


    public abstract class Disc_2 implements Serializable {


    private static final long *serialVersionUID* = 3087285416805917315L;


    @Id


    @GeneratedValue (strategy=GenerationType. *AUTO*)


    @Column (name="DISC_ID")


    private Long discId;


    @Column (name="NAME")


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    private String name;


    @Column (name="PRICE")


    private Integer price;


    //getters and settes


    }


    The audio and video subclasses are annotated like regular entity classes and are
    associated with the parent class with the PrimaryKeyJoinColumn annotation. PrimaryKeyJoinColumn
    is required only when the name of the column in the subclass is different from
    that of the superclass. When the name of the primary column is the same in both
    classes, Hibernate inherits the property and column from the superclass:


    @Entity


    @Table (name="AUDIO_DISC_2")


    @PrimaryKeyJoinColumn (name="DISC_ID")


    public class AudioDisc_2 extends Disc_2 implements Serializable {


    private static final long *serialVersionUID* = 8510682776718466795L;


    @Column (name="NO_OF_SONGS")


    private Integer noOfSongs;


    @Column (name="SINGER")


    private String singer;


    // getter and setters


    }


    @Entity


    @Table (name="VIDEO_DISC_2")


    @PrimaryKeyJoinColumn (name="DISC_ID")


    public class VideoDisc_2 extends Disc_2 implements Serializable {


    private static final long *serialVersionUID* = -3637473456207740684L;


    @Column (name="DIRECTOR")


    private String director;


    @Column (name="LANGUAGE")


    private String language;


    // getter and setters


    }


    If you query for a disc, Hibernate uses an outer join to determine the associated
    subclasses. The query that is used is as follows; as you can see, it may not be
    simple—at least, not as simple as it looks from the mapping you gave Hibernate:


    select a.DISC_ID , a.NAME , a.PRICE , b.SINGER , b.NO_OF_SONGS , c.DIRECTOR ,
    c.LANGUAGE , case when b.DISC_ID is not null then 1


    when c.DISC_ID is not null then 2


    when a.DISC_ID is not null then 0 else -1 end as clazz_


    from Disc_2 a


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    left outer join AUDIO_DISC_2 b on a.DISC_ID=b.DISC_ID


    left outer join VIDEO_DISC_2 c on a.DISC_ID=c.DISC_ID


    To query the subclasses, Hibernate uses the following inner join:


    select b.DISC_ID , a.NAME , a.PRICE , b.SINGER b.NO_OF_SONGS


    from AUDIO_DISC_2 b inner join Disc_2 a


    on b.DISC_ID=a.DISC_ID


    You should use this strategy when there is a requirement to use polymorphic associations
    and polymorphic queries. The subclasses’ state varies a great deal: that is, the
    properties that one subclass holds are very different from the properties that
    other subclasses hold. Also, when the class hierarchy is spread across many classes
    (depth of inheritance), this strategy can have an impact on performance.


