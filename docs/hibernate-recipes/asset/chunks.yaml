    问题


    Hibernate 提供了 HQL，并且支持 JPA QL 和条件查询来执行大多数查询。但如果需要使用数据库特定的功能，比如查询提示或关键字，该怎么办？在这种情况下，你需要使用
    Hibernate 对原生 SQL 的支持。如何使用原生 SQL 进行查询？


    解决方案


    Session API 提供了**createSQLQuery()**方法，该方法返回**SQLQuery**接口。此接口提供了你可以用来使用原生 SQL
