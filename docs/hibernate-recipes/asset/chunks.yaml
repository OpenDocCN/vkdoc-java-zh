    \ setRecipient(String recipient) {\n        this.recipient = recipient;\n    }\n\
    \n    /**\n     * @return the phone\n     */\n    @Column(name = \"WEEKDAY_PHONE\"\
    )\n    public String getPhone() {\n        return phone;\n    }\n\n    /**\n \
    \    * @param phone the phone to set\n     */\n    public void setPhone(String\
    \ phone) {\n        this.phone = phone;\n    }\n\n    /**\n     * @return the\
    \ address\n     */\n    @Column(name = \"WEEKDAY_ADDRESS\")\n    public String\
    \ getAddress() {\n        return address;\n    }\n\n    /**\n     * @param address\
    \ the address to set\n     */\n    public void setAddress(String address) {\n\
    \        this.address = address;\n    }\n\n    /* (non-Javadoc)\n     * @see java.lang.Object#toString()\n\
    \     */\n    @Override\n    public String toString() {\n        return \"Contact\
    \ [address=\" + address + \", phone=\" + phone\n                + \", recipient=\"\
    \ + recipient + \"]\";\n    }\n}\n```\n\nFor the `Orders` class, you annotate\
    \ the weekday contact as embedded. For the holiday contact, you annotate the access\
    \ as embedded and override the values provided in the `Contact` class as follows:\n\
    \n```java\npackage com.hibernaterecipes.annotations.domain;\n\nimport javax.persistence.AttributeOverride;\n\
    import javax.persistence.AttributeOverrides;\nimport javax.persistence.Column;\n\
    import javax.persistence.Embedded;\nimport javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\n\
    ```"
