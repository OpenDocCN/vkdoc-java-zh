    Parameter Binding


    You use *parameter binding* to bind values to the query parameters. Parameter
    binding makes the code look cleaner; the code is also safer. It isn’t recommended
    that you inject user input into a query using string concatenation; this can lead
    to a security issue called *SQL injection*.


    **SQL Injection**


    A SQL injection attack is an "injection" of a SQL query into the application via
    user input. A successful SQL


    injection exploit can, among other things, read sensitive data from the database,
    modify database data (insert/update/delete), and execute administrative operations
    on the database.


    Let’s look at a simple example. The following **main()** method invokes a method
    called **exampleSQLInjection()**, which takes a user input string:


