- fmt: '### Time Transaction


    **Account**


    - **T1**: Transaction 1 begins.

    - **T2**: Transaction 2 begins.

    - **T3**: Transaction 1 updates record `R1`.

    - **T4**: Transaction 2 updates record `R1`.

    - **T5**: Transaction 1 commits.

    - **T6**: Transaction 2 commits.


    How do you handle such cases of lost updates? And how do you enable versioning
    in Hibernate?


    ### Solution


    You need to understand isolation levels in order to choose a concurrency control
    mechanism. Access to database records is classified as reads and writes. The concurrency
    control mechanisms define the rules that dictate when to allow reads and writes.


    A *dirty read* occurs when one transaction reads changes made by another transaction
    that haven’t yet been committed (see Table 13-2). Basically, a dirty read means
    reading uncommitted data.


    **CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY**


    *Table 13-2. Dirty Read: A Transaction Reading Uncommitted Data*


    **Time Transaction**


    **Account**


    - **T1**: Transaction 1 begins.

    - **T2**: Transaction 2 begins.

    - **T3**: Transaction 1 updates record `R1`.

    - **T4**: Transaction 2 reads uncommitted record `R1`.

    - **T5**: Transaction 1 rolls back its update.

    - **T6**: Transaction 2 commits.


    An *unrepeatable read* occurs when a transaction reads a record twice and the
    record state is different between the first and the second read. This happens
    when another transaction updates the state of the record between the two reads
    (see Table 13-3).


    *Table 13-3. Unrepeatable Read: A Transaction Reading a Record Twice*


    **Time Transaction**


    **Account**


    - **T1**: Transaction 1 begins.

    - **T2**: Transaction 1 reads record `R1`.

    - **T3**: Transaction 2 begins.

    - **T4**: Transaction 2 updates record `R1`.

    - **T5**: Transaction 2 commits.

    - **T6**: Transaction 1 reads record `R1` (the record `R1` read at time `T2` is
    in a different state than at time `T6`).

    - **T7**: Transaction 1 commits.


    A *phantom read* occurs when a transaction executes two identical queries, and
    the collection of rows returned by the second query is different from the first.
    This also happens when another transaction inserts records into or deletes records
    from the table between the two reads.


    **CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY**


    *Table 13-4. Phantom Read: Reading a Range of Data That Changes in Size During
    a Transaction*


    **Time Transaction**


    **Account**


    - **T1**: Transaction 1 begins.

    - **T2**: Transaction 1 reads a range of records `RG1`.

    - **T3**: Transaction 2 begins.

    - **T4**: Transaction 2 inserts records.

    - **T5**: Transaction 2 commits.

    - **T6**: Transaction 1 reads the range of records `RG1` (`RG1`’s size has changed
    from time `T2` to `T6`).

    - **T7**: Transaction 1 commits.


    *Isolation* defines how and when changes made by one transaction are made visible
    to other transactions. Isolation is one of the ACID properties. For better performance
    and concurrency control, isolation is divided by the ANSI SQL standard into levels
    that define the degree of locking when you select data. The four isolation levels
    are as follows (see also Table 13-5):


    - **Serializable**: Transactions are executed serially, one after the other. This
    isolation level allows a transaction to acquire read locks or write locks for
    the entire range of data that it affects. The Serializable isolation level prevents
    dirty reads, unrepeatable reads, and phantom reads, but it can cause scalability
    issues for an application.

    - **Repeatable Read**: Read locks and write locks are acquired. This isolation
    level doesn’t permit dirty reads or unrepeatable reads. It also doesn’t acquire
    a range lock, which means it permits phantom reads. A read lock prevents any write
    locks from being acquired by other concurrent transactions. This level can still
    have some scalability issues.

    - **Read Committed**: Read locks are acquired and released immediately, and write
    locks are acquired and released at the end of the transaction. Dirty reads aren’t
    allowed in this isolation level, but unrepeatable reads and phantom reads are
    permitted. By using the combination of persistent context and versioning, you
    can achieve the Repeatable Read isolation level.'
