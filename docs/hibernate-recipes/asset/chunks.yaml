    **In some cases, such as when the database updated by other applications, you
    may want to invalidate the cached objects manually. You can do it through the
    methods provided by the session factory. You can invalidate either one instance
    or all instances of a persistent class:


    ****factory.evict(Book.class);**


    **factory.evict(Book.class, id);**


    **factory.evictEntity("com.metaarchit.bookshop.Book");**


    **factory.evictEntity("com.metaarchit.bookshop.Book", id);**


    **After the cached object is evicted from cache, when you need to fetch data from
    the database, the query is executed and the updated data is retrieved. This avoids
    having stale data in cache. Note that the eviction from the second-level cache
    is nontransactional, meaning that the cache region isn’t locked during the eviction
    process.


    **CacheMode** options are provided to control the interaction of Hibernate with
    the second level cache:


    ****Session session1 = factory.openSession();**


    Session.setCacheMode(CacheMode.IGNORE);


    **try {**


    **Book book1 = new Book();**


    **book1.setName("New Book");**


    **session1.save(book1);**


    **session1.flush();**


    **} finally {**


    **session1.close();**


    **}**


    ****CacheMode.IGNORE** tells Hibernate not to interact with second level cache
    for that session. Options available in **CacheMode** are as follows:


    • **CacheMode.NORMAL**: The default behavior.


    • **CacheMode.IGNORE**: Hibernate doesn’t interact with the second-level cache.
    When entities cached in the second-level cache are updated, Hibernate invalidates


    them.


    • **CacheMode.GET**: Hibernate only reads and doesn’t add items to the second-level
    cache. When entities cached in the second-level cache are updated, Hibernate


    invalidates them.


    CHAPTER 12 ■ CACHING IN HIBERNATE


    • **CacheMode.PUT**: Hibernate only adds and doesn’t add read from the second-level
    cache. When entities cached in the second-level cache are updated, Hibernate


    invalidates them.


    • **CacheMode.REFRESH**: Hibernate only adds and doesn’t read from the second-level
    cache. In this mode, the setting of **hibernate.cache.use_minimal_puts** is bypassed,
    as the refresh is forced.


    12.3 Caching Associations


    Problem


    Can associated objects be cached? How do you configure them?


    Solution


    Associated objects have a parent-child relationship in the database. How does
    caching work in this case?


    If the parent object is cached, is the child object also cached? By default, associated
    objects aren’t cached. If you need to cache these objects, you can configure it
    explicitly. The primary reason to cache associations is to avoid additional calls
    to the database.


    How It Works


    Is a **book**’s associated **publisher** object cached when its parent **book**
    object is cached?


    ****<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Book" table="BOOK">**


    **<cache usage="read-write" />**


    **...**


    **<many-to-one name="publisher" class="Publisher" column="PUBLISHER_ID" />**


    **</class>**


    **</hibernate-mapping>**


    **If you initialize the association in two different sessions, it’s loaded as
    many times as the initialization is made. This is because Hibernate caches only
    the identifier of **publisher** in **Book**’s region:


    ****Session session1 = factory.openSession();**


    **try {**


    **Book book1 = (Book) session1.get(Book.class, id);**


    Hibernate.initialize(book1.getPublisher());


    **} finally {**


    **session1.close();**


    **}**


    **Session session2 = factory.openSession();**


    **try {**


    **Book book2 = (Book) session2.get(Book.class, id);**


    Hibernate.initialize(book2.getPublisher());


    CHAPTER 12 ■ CASHING IN HIBERNATE


    **} finally {**


    **session2.close();**


    **}**


    **To cache the **publisher** objects in their own region, you need to enable caching
    for the **Publisher** class. You can do it the same way as for the **Book** class.
    The cached **publisher** objects are stored in a region with the name **com.metaarchit.bookshop.Publisher**:


    ****<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Publisher" table="PUBLISHER">**


    <cache usage="read-write" />


    **...**


    **</class>**'
