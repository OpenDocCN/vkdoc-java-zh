    Using the Open Session in View Pattern


    Is it much trouble to initialize lazy associations explicitly? How can you ask
    the associations to be initialized on demand—when they’re accessed for the first
    time?


    The root cause of the lazy initialization exception is that the session is closed
    before the lazy association is first accessed during the rendering of the JSP.
    If you can keep the session open for the entire request-handling process, including
    servlet processing and JSP rendering, the exception should be able to resolve.
    To implement this idea, you can use a *filter* in a J2EE web application.


    A filter is code that is invoked before the user request reaches the servlet or
    JSP. You can attach a filter to one or more servlets or JSPs; it looks at the
    **request** object and validates the request before letting the request pass to
    the servlet or JSP. You open and close the Hibernate session in a filter such
    that it’s accessible for the entire request-handling process. This is called the
    Open Session in View pattern.


    Hibernate provides the **factory.getCurrentSession()** method to retrieve the
    current session. A new session is opened the first time you call this method and
    closed when the transaction is finished, regardless of whether it’s committed
    or rolled back. But what does *current session* mean? You need to tell Hibernate
    that this is the session bound with the current thread:


    ****<hibernate-configuration>**


    **<session-factory>**


    **...**


    <property name="current_session_context_class">thread</property>


    **...**


    CHAPTER 14 ■ WEB APPLICATIONS


    **</session-factory>**


    **</hibernate-configuration>**


