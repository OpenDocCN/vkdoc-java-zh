  raw: 'The JPA specifications state that the table per concrete class is optional.
    However, Hibernate provides the implementation. In JPA annotations, you have the
    superclass Disc (Disc_4 in the following case) use the Inheritance annotation
    and the TABLE_PER_CLASS inheritance type strategy:


    @Entity


    @Inheritance (strategy=InheritanceType. *TABLE_PER_CLASS*)


    public abstract class Disc_4 implements Serializable {


    private static final long *serialVersionUID* = 3087285416805917315L;


    @Id


    @GeneratedValue (strategy=GenerationType. *AUTO*)


    @Column (name="DISC_ID")


    private Long discId;


    @Column (name="NAME")


    private String name;


    @Column (name="PRICE")


    private Integer price;


    //getters and setters


    }


    All the concrete class has to do is to declare itself as an Entity with the Entity
    annotation:


    @Entity


    @Table (name="AUDIO_DISC_4")


    public class AudioDisc_4 extends Disc_4 implements Serializable {


    private static final long *serialVersionUID* = 8510682776718466795L;


    @Column (name="NO_OF_SONGS")


    private Integer noOfSongs;


    @Column (name="SINGER")


    private String singer;


    //getters and setters


    }


    Because the mapping is table per concrete class, the query created is for direct
    concrete class. If you need a polymorphic querying capability, you must make the
    superclass a persistent class (have a table of its own).


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    4.4 Custom Mappings


    Problem


    What are the various extensions that Hibernate provides to implement custom mapping
    types? How do you create UserType custom mapping?


    Solution


    Hibernate provides an interface that you can implement to define your own custom
    mapping types. The extensions are listed in the org.hibernate.usertype package
    and are as follows:


    • CompositeUserType: This user type exposes the internals of the value type to


    Hibernate, which allows you to query for specific internal properties.


    • EnhancedUserType: This is used when marshalling of value types to and from XML


    is required. It lets you use the custom type in identifier and discriminator


    mappings.


    • LoggableUserType: This type is used when you want custom logging of the


    corresponding value types.


    • ParameterizedType: You can set parameters for a type by using a nested type


    element for the property element in the mapping file or by defining a typedef.


    • UserCollectionType: Use this type when you want to implement a custom


    collection mapping type and when you have to persist a non-JDK type collection.


    • UserType: This is a basic extension point. It provides a basic framework to


    implement custom loading and storing of value type instances.


    • UserVersionType: This type is used for a version property.


    How It Works


    Let’s say your object model has a phone object. The phone object has two properties:
    areaCode and telNo. The database has a single column for this phone object, of
    the format areaCode-telNo. It’s recommended by Hibernate that the phone class
    be immutable, which means you need to make the properties final and have a constructor
    that sets these properties on initialization. Using an immutable class makes the
    implementation easier.


    The following example demonstrates the implementation for a mutable class:


    public class PhoneCh4_4 {


    private String areaCode;


    private String telNo;


    // getters and setters


    }


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    You can write your own phone type that implements the UserType interface. The
    implementation, shown in a moment, uses the following methods:


    • Assemble: Reconstructs an object from the cacheable representation. If the object
    is immutable, then you can return the cached object. Mutable objects are


    expected to at least perform a deep copy.


    • Disassemble: Called when Hibernate is storing the object as a serialized object
    in second-level memory or cache. (Caching in discussed further in Chapter 12.)
    For


    immutable objects, you typecast the object as serializable and return it. For


    mutable objects, you should return a deep copy. Also, it may not as simple if
    the mutable object has other associations. Associations should be cached as identifier
    values.'
  trans: "\nJPA 规范指出，每个具体类一张表的策略是可选的。不过，Hibernate 提供了该策略的实现。在 JPA 注解中，你需要让超类 Disc（如下例中的\
    \ Disc_4）使用`Inheritance`注解，并指定`TABLE_PER_CLASS`继承类型策略：\n\n```java\n@Entity\n@Inheritance(strategy=InheritanceType.TABLE_PER_CLASS)\n\
    public abstract class Disc_4 implements Serializable {\n    private static final\
    \ long serialVersionUID = 3087285416805917315L;\n    @Id\n    @GeneratedValue(strategy=GenerationType.AUTO)\n\
    \    @Column(name=\"DISC_ID\")\n    private Long discId;\n    @Column(name=\"\
    NAME\")\n    private String name;\n    @Column(name=\"PRICE\")\n    private Integer\
    \ price;\n    // getters and setters\n}\n```\n\n所有具体类只需使用`@Entity`注解声明自身为实体即可：\n\
    \n```java\n@Entity\n@Table(name=\"AUDIO_DISC_4\")\npublic class AudioDisc_4 extends\
    \ Disc_4 implements Serializable {\n    private static final long serialVersionUID\
    \ = 8510682776718466795L;\n    @Column(name=\"NO_OF_SONGS\")\n    private Integer\
    \ noOfSongs;\n    @Column(name=\"SINGER\")\n    private String singer;\n    //\
    \ getters and setters\n}\n```\n\n由于映射策略是每个具体类一张表，因此创建的查询直接针对具体类。如果你需要多态查询能力，则必须将超类设为持久化类（拥有自己的表）。\n\
    \n**第 4 章 ■ 继承与自定义映射**\n\n### 4.4 自定义映射\n\n**问题**\n\nHibernate 提供了哪些扩展来实现自定义映射类型？如何创建`UserType`自定义映射？\n\
    \n**解决方案**\n\nHibernate 提供了一个接口，你可以通过实现该接口来定义自己的自定义映射类型。这些扩展列在`org.hibernate.usertype`包中，具体如下：\n\
    \n*   **`CompositeUserType`**：此用户类型向 Hibernate 暴露值类型的内部结构，允许你查询特定的内部属性。\n*   **`EnhancedUserType`**：当需要将值类型与\
    \ XML 进行编组/解组时使用。它允许你在标识符和鉴别器映射中使用自定义类型。\n*   **`LoggableUserType`**：当你希望对相应的值类型进行自定义日志记录时使用此类型。\n\
    *   **`ParameterizedType`**：你可以通过为映射文件中的`property`元素使用嵌套的`type`元素，或通过定义`typedef`来为类型设置参数。\n\
    *   **`UserCollectionType`**：当你想要实现自定义集合映射类型，并且必须持久化非 JDK 类型的集合时，使用此类型。\n*   **`UserType`**：这是一个基本的扩展点。它提供了一个基本框架，用于实现值类型实例的自定义加载和存储。\n\
    *   **`UserVersionType`**：此类型用于版本属性。\n\n**工作原理**\n\n假设你的对象模型中有一个电话对象。该电话对象有两个属性：`areaCode`和`telNo`。数据库中针对此电话对象只有一个列，格式为`areaCode-telNo`。Hibernate\
    \ 建议将电话类设为不可变，这意味着你需要将属性设为`final`，并提供一个在初始化时设置这些属性的构造函数。使用不可变类可以使实现更简单。\n\n以下示例演示了可变类的实现：\n\
    \n```java\npublic class PhoneCh4_4 {\n    private String areaCode;\n    private\
    \ String telNo;\n    // getters and setters\n}\n```\n\n**第 4 章 ■ 继承与自定义映射**\n\n\
    你可以编写自己的、实现了`UserType`接口的电话类型。该实现（稍后展示）使用了以下方法：\n\n*   **`assemble`**：从可缓存的表示形式重建对象。如果对象是不可变的，那么你可以直接返回缓存的对象。对于可变对象，至少期望执行一次深拷贝。\n\
    *   **`disassemble`**：当 Hibernate 将对象作为序列化对象存储到二级内存或缓存中时调用。（缓存将在第 12 章进一步讨论。）对于不可变对象，你将对象类型转换为`Serializable`并返回。对于可变对象，你应该返回一个深拷贝。此外，如果可变对象有其他关联，情况可能不会这么简单。关联应作为标识符值进行缓存。\n"
