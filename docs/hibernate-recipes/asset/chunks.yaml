    CHAPTER 12 ■ CASHING IN HIBERNATE


    **You can also specify the cache region for a query. Doing so lets you separate
    query caches in different regions and reduce the number of caches in one particular
    region:


    ****...**


    **query.setCacheable(true);**


    query.setCacheRegion("com.metaarchit.bookshop.BookQuery");


    Summary


    In this chapter, you’ve seen what caching is and the different levels of caching
    in Hibernate. Caching can be enabled at the transaction level, where data is cached
    for one unit of work; this is the default behavior in Hibernate. Multiple queries
    in a particular session share the cached data.


    You’ve learned that at the second level, caching is enabled for a process, and
    the cache is associated with a **SessionFactory**. Multiple sessions within a
    **SessionFactory** share the same data. Configuring the second-level cache is
    a two step process: first, you decide on the concurrent strategy, and then you
    choose the provider that implements the caching strategy.


    You’ve also learned that you can use four concurrent strategies: read-only, read-write,
    transactional, and not-strict read-write. There are many open source cache providers,
    including OSCache, EHCache, SwarmCache, and JBoss Cache. Each of these provides
    different concurrent strategies.


    Query result sets also can be cached. You do so through configuration and by invoking
    **setCacheable(true)**. Associated objects and collections can also be cached
    explicitly.


    **C H A P T E R 13**


    ■ ■ ■


    **Transactions and Concurrency**


    Let’s say a buyer logs in to the bookshop application and purchases a book. The
    following actions should take place in the event of purchase:


    • Charge the buyer the cost of the book


    • Reduce the stock of the book


    If the charge on the credit card fails, the stock shouldn’t be reduced. Also,
    when the book is out of stock, the buyer shouldn’t be charged. That means either
    both actions should be successfully completed, or they should have no effect.
    These actions collectively are called a *transaction* or *unit of work*. In essence,
    transactions provide an all-or-nothing proposition.


    The concept of transactions is inherited from database management systems. By
    definition, a transaction must be atomic, consistent, isolated, and durable (ACID):


    • *Atomicity* means that if one step fails, then the whole unit of work fails.


    • *Consistency* means that the transaction works on a set of data that is consistent
    before and after the transaction. The data must be clean after the transaction.


    From a database perspective, the clean and consistent state is maintained by


    integrity constraints. From an applications perspective, the consistent state
    is


    maintained by the business rules.


    • *Isolation* means one transaction isn’t visible to other transactions. Isolation
    makes sure the execution of a transaction doesn’t affect other transactions.


    • *Durability* means that when data has been persisted, it isn’t lost.


    In an application, you need to identify when a transaction begins and when it
    ends. The starting point and ending point of a transaction are called *transaction
    boundaries*, and the technique of identifying them in an application is called
    *transaction demarcation*. You can set the transaction boundaries either programmatically
    or declaratively. This chapter shows you how.


    Multiuser systems like databases need to implement concurrency control to maintain
    data integrity.


    There are two main approaches to concurrency control:


    • *Optimistic:* Involves some kind of versioning to achieve control


    • *Pessimistic:* Uses a locking mechanism to obtain control


    Some of the methods that are used in concurrency control are as follows:


    CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY


    • *Two-phase locking:* This is a locking mechanism that uses two distinct phases
    to achieve concurrency. In the first phase of transaction execution, called the


    *expanding* phase, locks are acquired, and no locks are released. In the second
    phase, called the *shrinking phase*, locks are released, and no new locks acquired.


    This guarantees serializability. The transactions are serialized in the order
    in


    which the locks are acquired. *Strict two-phase locking* is a subset of two-phase
    locking. All the write locks are released only at the end (after committing or


    aborting), and read locks are released regularly during phase 2\. With both these


    locking mechanisms, a deadlock is possible but can be avoided if you maintain
    a


    canonical order for obtaining locks. So, if two processes need locks on A and
    B,


    then they both request first A and then B.


    • *Serialization:* A *transaction schedule* is a sequential representation of
    two or more concurrent transactions. The transaction schedules have a property
    called


    *serializability*. Two transactions that are updating the same record are executed
    one after the other and don’t overlap in time.


    • *Time-stamp-based control:* This is a nonlocking mechanism for concurrency control.
    Every transaction is given a timestamp when it starts. Every object or


    record in the database also has a read timestamp and a write timestamp. These


    three timestamps are used to define the isolation rules that are used in this
    type of concurrency control.'
