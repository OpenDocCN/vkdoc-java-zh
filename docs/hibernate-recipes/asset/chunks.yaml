    **The **find()** method is similar to the **get()** method in Hibernate. A call
    to the database is made when this method is invoked. If it doesn’t find the persistent
    entity, the **find()** method returns **null**. Note that you haven’t cast the
    return value from the **find()** method. It isn’t required, because **find()**
    is a generic method, and the first parameter is set as the return type.


    The **getReference()** method is similar to the **load()** method in Hibernate.
    You should use it when you only need a proxy.


