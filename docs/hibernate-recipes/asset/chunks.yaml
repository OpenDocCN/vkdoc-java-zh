    \        return phoneCopied;\n    }\n\n    /* (non-Javadoc)\n     * @see org.hibernate.usertype.UserType#disassemble(java.lang.Object)\n\
    \     */\n    @Override\n    public Serializable disassemble(Object value) throws\
