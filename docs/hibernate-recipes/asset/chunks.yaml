    假设你需要为图书订单支持一种更灵活的联系机制。客户可以为一次图书配送指定多个联系点，因为他们可能不确定在特定时间段内哪个联系点最合适。你的员工在配送图书时会逐一尝试这些联系点。你可以使用
    **java.util.Set** 来保存一个订单的所有联系点：


    **public class Orders {**


    **private Contact weekdayContact;**


    **private Contact holidayContact;**


    private Set contacts;


    **// Getters 和 Setters**


    **}**


    **你需要创建一个单独的表，如下所示：


    **CREATE TABLE ORDERS_CONTACT (ORDER_ID bigint NOT NULL, RECIPIENT varchar(100),AREACODE**


    **varchar(100),TELEPHONE varchar(100),ADDRESS varchar(100))**


    第 3 章 ■ 组件映射


    **要在 Hibernate 中映射一个订单的多个联系点，你可以使用组件集合。你使用 **<composite-element>** 来定义集合中的组件。为简单起见，首先将你的
    Contact 类恢复为其原始形式：


    **public class Contact {**


