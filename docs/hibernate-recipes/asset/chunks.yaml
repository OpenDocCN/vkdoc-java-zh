- fmt: "*Cache regions* are handles by which you can reference classes and collections\
    \ in the cache provider configuration and set the expiration policies applicable\
    \ to that region. Regions are buckets of data of two types: one type contains\
    \ disassembled data of entity instances, and the other contains only identifiers\
    \ of entities that are linked through a collection.\n\nThe name of the region\
    \ is the class name in the case of a class cache or the class name together with\
    \ the property name in the case of a collection cache.\n\n## Caching Query Results\n\
    \nA query’s result set can be configured to be cached. By default, caching is\
    \ disabled, and every HQL, JPA QL, and Criteria query hits the database. You enable\
    \ the query cache as follows:\n\n`hibernate.cache.use_query_cache = true`\n\n\
    In addition to setting this configuration property, you should use the `org.hibernate.Query`\
    \ interface:\n\n```\nQuery bookQuery = session.createQuery(\"from Book book where\
    \ book.name < ?\");\nbookQuery.setString(\"name\",\"HibernateRecipes\");\nbookQuery.setCacheable(true);\n\
    ```\n\nThe `setCacheable()` method enables the result to be cached.\n\n## 12.1\
    \ Using the First-Level Cache\n\n### Problem\n\nWhat is the first-level cache,\
    \ and how is it used in Hibernate?\n\n### Solution\n\nThe first-level cache is\
    \ at the transaction level or the unit of work. It’s enabled by default in Hibernate.\n\
    \nCaching at the first level is associated with a session. If the same query is\
    \ executed multiple times in the same session, the data associated with the query\
    \ is cached.\n\n### How It Works\n\nThe general concept of caching persistent\
    \ objects is that when an object is first read from external storage, a copy of\
    \ it is stored in the cache. Subsequent readings of the same object can be retrieved\
    \ from the cache directly. Because caches are typically stored in memory or on\
    \ local disk, it’s faster to read an object from cache than external storage.\
    \ If you use it properly, caching can greatly improve the performance of your\
    \ application.\n\nAs a high-performance ORM framework, Hibernate supports the\
    \ caching of persistent objects at different levels. Suppose you retrieve an object\
    \ more than once within a session: does Hibernate query the database as many times\
    \ as the query is invoked?\n\n```\nSession session = factory.openSession();\n\
    try {\n    Book book1 = (Book) session.get(Book.class, id);\n    Book book2 =\
    \ (Book) session.get(Book.class, id);\n} finally {\n    session.close();\n}\n\
    ```\n\nIf you inspect the SQL statements executed by Hibernate, you find that\
    \ only one database query is made. That means Hibernate is caching your objects\
    \ in the same session. This kind of caching is called *first-level caching*, and\
    \ its caching scope is a session.\n\nBut how about getting an object with same\
    \ identifier more than once in two different sessions?\n\n```\nSession session1\
    \ = factory.openSession();\ntry {\n    Book book1 = (Book) session1.get(Book.class,\
    \ id);\n} finally {\n    session1.close();\n}\n\nSession session2 = factory.openSession();\n\
    try {\n    Book book2 = (Book) session2.get(Book.class, id);\n} finally {\n  \
    \  session2.close();\n}\n```\n\nTwo database queries are made. That means Hibernate\
    \ isn’t caching the persistent objects across different sessions by default. You\
    \ need to turn on this *second-level caching*, whose caching scope is a session\
    \ factory.\n\n## 12.2 Configuring the Second-Level Cache\n\n### Problem\n\nWhat\
    \ is the second-level cache, and how is it configured and used in Hibernate?\n\
    \n### Solution\n\nSecond-level cache is configured at the process level or the\
    \ cluster level. In Hibernate, you can configure it for a particular class or\
    \ for a collection to improve performance. You can use the second-level cache\
    \ with large and complex object graphs that may be loaded often. It’s associated\
    \ with one `SessionFactory` and can be reused in multiple `Sessions` created from\
    \ the same `SessionFactory`.\n\n### How It Works"
  raw: '*Cache regions* are handles by which you can reference classes and collections
    in the cache provider configuration and set the expiration policies applicable
    to that region. Regions are buckets of data of two types: one type contains disassembled
    data of entity instances, and the other contains only identifiers of entities
    that are linked through a collection.


    The name of the region is the class name in the case of a class cache or the class
    name together with the property name in the case of a collection cache.


    Caching Query Results


    A query’s result set can be configured to be cached. By default, caching is disabled,
    and every HQL, JPA QL, and Criteria query hits the database. You enable the query
    cache as follows:


    ****hibernate.cache.use_query_cache = true**


    **In addition to setting this configuration property, you should use the **org.hibernate.Query**
    interface:


    ****Query bookQuery = session.createQuery("from Book book where book.name < ?");**
    **bookQuery.setString("name","HibernateRecipes");**


    **bookQuery.setCacheable(true);**


    **The **setCacheable()** method enables the result to be cached.


    12.1 Using the First-Level Cache


    Problem


    What is the first-level cache, and how is it used in Hibernate?


    CHAPTER 12 ■ CACHING IN HIBERNATE


    Solution


    The first-level cache is at the transaction level or the unit of work. It’s enabled
    by default in Hibernate.


    Caching at the first level is associated with a session. If the same query is
    executed multiple times in the same session, the data associated with the query
    is cached.


    How It Works


    The general concept of caching persistent objects is that when an object is first
    read from external storage, a copy of it is stored in the cache. Subsequent readings
    of the same object can be retrieved from the cache directly. Because caches are
    typically stored in memory or on local disk, it’s faster to read an object from
    cache than external storage. If you use it properly, caching can greatly improve
    the performance of your application.


    As a high-performance ORM framework, Hibernate supports the caching of persistent
    objects at different levels. Suppose you retrieve an object more than once within
    a session: does Hibernate query the database as many times as the query is invoked?


    ****Session session = factory.openSession();**


    **try {**


    **Book book1 = (Book) session.get(Book.class, id);**


    **Book book2 = (Book) session.get(Book.class, id);**


    **} finally {**


    **session.close();**


    **}**


    **If you inspect the SQL statements executed by Hibernate, you find that only
    one database query is made. That means Hibernate is caching your objects in the
    same session. This kind of caching is called *first-level caching*, and its caching
    scope is a session.


    But how about getting an object with same identifier more than once in two different
    sessions?


    ****Session session1 = factory.openSession();**


    **try {**


    **Book book1 = (Book) session1.get(Book.class, id);**


    **} finally {**


    **session1.close();**


    **}**


    **Session session2 = factory.openSession();**


    **try {**


    **Book book2 = (Book) session2.get(Book.class, id);**


    **} finally {**


    **session2.close();**


    **}**


    **Two database queries are made. That means Hibernate isn’t caching the persistent
    objects across different sessions by default. You need to turn on this *second-level
    caching*, whose caching scope is a session factory.


    CHAPTER 12 ■ CASHING IN HIBERNATE


    12.2 Configuring the Second-Level Cache


    Problem


    What is the second-level cache, and how is it configured and used in Hibernate?


    Solution


    Second-level cache is configured at the process level or the cluster level. In
    Hibernate, you can configure it for a particular class or for a collection to
    improve performance. You can use the second-level cache with large and complex
    object graphs that may be loaded often. It’s associated with one **SessionFactory**
    and can be reused in multiple **Sessions** created from the same **SessionFactory**.


    How It Works'
  trans: '

    *缓存区域*是用于在缓存提供程序配置中引用类和集合，并设置适用于该区域的过期策略的句柄。区域是两种类型的数据桶：一种包含实体实例的反汇编数据，另一种仅包含通过集合链接的实体的标识符。


    对于类缓存，区域名称是类名；对于集合缓存，区域名称是类名加上属性名。


    缓存查询结果


    可以配置查询的结果集进行缓存。默认情况下，缓存是禁用的，每个 HQL、JPA QL 和 Criteria 查询都会访问数据库。按如下方式启用查询缓存：


    ****hibernate.cache.use_query_cache = true**


    **除了设置此配置属性外，还应使用 **org.hibernate.Query** 接口：


    ****Query bookQuery = session.createQuery("from Book book where book.name < ?");**
    **bookQuery.setString("name","HibernateRecipes");**


    **bookQuery.setCacheable(true);**


    **setCacheable()** 方法用于启用结果缓存。


    12.1 使用一级缓存


    问题


    什么是一级缓存？它在 Hibernate 中如何使用？


    第 12 章 ■ HIBERNATE 中的缓存


    解决方案


    一级缓存位于事务级别或工作单元级别。它在 Hibernate 中默认启用。


    一级缓存与会话相关联。如果在同一会话中多次执行相同的查询，与该查询关联的数据会被缓存。


    工作原理


    缓存持久化对象的一般概念是，当对象首次从外部存储读取时，其副本会存储在缓存中。后续对同一对象的读取可以直接从缓存中获取。由于缓存通常存储在内存或本地磁盘中，从缓存读取对象比从外部存储更快。如果使用得当，缓存可以显著提高应用程序的性能。


    作为一个高性能的 ORM 框架，Hibernate 支持在不同级别缓存持久化对象。假设你在一个会话中多次检索同一个对象：Hibernate 会随着查询的调用次数而多次查询数据库吗？


    ****Session session = factory.openSession();**


    **try {**


    **Book book1 = (Book) session.get(Book.class, id);**


    **Book book2 = (Book) session.get(Book.class, id);**


    **} finally {**


    **session.close();**


    **}**


    **如果你检查 Hibernate 执行的 SQL 语句，你会发现只执行了一次数据库查询。这意味着 Hibernate 在同一会话中缓存了你的对象。这种缓存称为*一级缓存*，其缓存范围是一个会话。


    但是，在两个不同的会话中多次获取具有相同标识符的对象会怎样呢？


    ****Session session1 = factory.openSession();**


    **try {**


    **Book book1 = (Book) session1.get(Book.class, id);**


    **} finally {**


    **session1.close();**


    **}**


    **Session session2 = factory.openSession();**


    **try {**


    **Book book2 = (Book) session2.get(Book.class, id);**


    **} finally {**


    **session2.close();**


    **}**


    **这里执行了两次数据库查询。这意味着 Hibernate 默认不会跨不同会话缓存持久化对象。你需要启用这种*二级缓存*，其缓存范围是一个会话工厂。


    第 12 章 ■ HIBERNATE 中的缓存


    12.2 配置二级缓存


    问题


    什么是二级缓存？它在 Hibernate 中如何配置和使用？


    解决方案


    二级缓存配置在进程级别或集群级别。在 Hibernate 中，你可以为特定类或集合配置它以提高性能。你可以将二级缓存用于可能经常加载的大型复杂对象图。它与一个
    **SessionFactory** 相关联，并且可以在从同一 **SessionFactory** 创建的多个 **Session** 中重用。


    工作原理

