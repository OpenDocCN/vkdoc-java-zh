    )\n@LazyCollection(LazyCollectionOption.FALSE)\nprivate Set<Chapter> chapters\
    \ = new TreeSet<Chapter>();\n// getters and setters\n}\n```\n\n## Summary\n\n\
    This chapter has shown how to map a collection of value type objects to an entity.\
    \ You’ve seen the implementation of `<set>`, `<bag>`, `<idbag>`, `<list>`, and\
    \ `<map>` elements and their corresponding JPA annotations. You’ve learned the\
    \ advantage of each collection mapping element and when it’s a good idea to use\
    \ each of these elements. You’ve also seen how to sort a collection using a comparator\
    \ and using the `order-by` clause. Finally, you’ve learned how and when lazy initialization\
    \ should be turned off.\n\n# CHAPTER 7\n\n## Many-Valued Associations\n\nA many-valued\
    \ association is by definition a collection of references to entities. The collection\
    \ can be of type `List`, `Set`, `Map`, and so on in Java.\n\nWhy would you have\
    \ a collection of references? When there is a parent/child relationship, and one\
    \ parent can be associated to many children, the parent contains a collection\
    \ of references to the child entities. In the case of a relational model, suppose\
    \ two tables are dependent on each other, this can be represented as a foreign\
    \ key column in the dependent table. For one row in the parent table, there exist\
    \ many rows in the child table.\n\nYou’ve seen this in earlier chapters that specified\
    \ how to use collections. This chapter discusses one-to-many and many-to-many\
    \ relationships in detail, including how they’re defined and how they’re represented\
    \ in Hibernate using the XML configuration and using JPA annotations. You also\
    \ learn how data is loaded and updated from/in the database when such relationships\
    \ are defined.\n\nA one-to-many association is the most common and important type.\
    \ A many-to-many association can be represented as two many-to-one associations.\
    \ This model is more extensible, so it’s used more widely in applications. These\
    \ associations can be unidirectional as well as bidirectional.\n\n### 7.1 Mapping\
    \ a One-to-Many Association with a Foreign Key\n\n#### Problem\n\nHow do you map\
    \ objects using a one-to-many association with a foreign key? Can you establish\
    \ this association from one direction only (unidirectional association)? When\
    \ an operation such as update is executed on the parent object, users sometimes\
    \ want the child object to be updated as well; this is called *cascading* in Hibernate.\
    \ How do you use the cascading feature with a one-to-many association?\n\n####\
    \ Solution\n\nYou can achieve a one-to-many relationship two ways in the database:\
    \ by having a foreign key column in the dependent table or by creating a join\
    \ table between the two tables. Each of these relationships can be unidirectional\
    \ or bidirectional. The one-to-many unidirectional relationship is uncommon and\
    \ isn’t a recommended way to map using Hibernate.\n\n#### How It Works\n\nIn the\
    \ previous example, you treated each chapter of a book as a string and stored\
    \ it in a collection. Now you extend this recipe by making each chapter a persistent\
    \ object type. Because one `book` object can relate to many `chapter` objects,\
    \ the association from `book` to `chapter` is a one-to-many association. You first\
    \ define this association as unidirectional—navigable from `book` to `chapter`\
    \ only—and then extend it to be bidirectional.\n\nRemember that you have a `Chapter`\
    \ class in your application that hasn’t been mapped to the database. You first\
    \ create a Hibernate mapping for it and then define an autogenerated identifier:\n\
    \n```java\npublic class Chapter {\n    private Long id;\n    private String title;\n\
    \    private int noOfPages;\n    // getters and setters\n}\n```\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter7\">\n    <class name=\"Chapter\" table=\"\
    CHAPTER\" dynamic-insert=\"true\" dynamic-update=\"true\"\n           schema=\"\
    BookShop\">\n        <id name=\"id\" column=\"id\" type=\"long\">\n          \
    \  <generator class=\"native\">\n            </generator>\n        </id>\n   \
    \     <property name=\"title\" type=\"string\" column=\"title\" />\n        <property\
    \ name=\"noOfPages\" type=\"int\" column=\"NUM_OF_PAGES\" />\n    </class>\n</hibernate-mapping>\n\
    ```\n\nBecause you added a new persistent object to the application, you also\
    \ need to specify it in the Hibernate configuration file:\n\n```xml\n<mapping\
    \ resource=\"com/hibernaterecipes/chapter7/chapter.xml\" />\n```\n\nFor the `Book`\
    \ class, you already have a collection for storing chapters, although only the\
    \ titles are stored. You can still use this collection, but with `chapter` objects\
    \ instead. Which collection type should you use? Because a book can’t contain\
    \ duplicated chapters, you choose the `<set>` collection type:\n\n```java\npublic\
    \ class Book {\n    private Long book_id;\n    private String isbn;\n    private\
    \ String bookName;\n    private Date publishDate;\n    private Long price;\n \
    \   private Set<Chapter> chapters;\n    // getters and setters\n}\n```\n\nTo tell\
    \ Hibernate that you’re storing `chapter` objects and not strings in the collection,\
    \ you can use the `<one-to-many>` mapping element instead of `<element>`:\n\n\
    ```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter7\">\n    <class\
    \ name=\"Book\" table=\"BOOK\" schema=\"BookShop7\">\n        <id name=\"book_id\"\
    \ column=\"BOOK_ID\" type=\"long\">\n            <generator class=\"native\">\n\
    \            </generator>\n        </id>\n        <property name=\"isbn\" type=\"\
    string\" column=\"ISBN\" />\n        <property name=\"bookName\" type=\"string\"\
    \ column=\"BOOK_NAME\" />\n        <property name=\"publishDate\" type=\"date\"\
    \ column=\"PUBLISH_DATE\" />\n        <property name=\"price\" type=\"long\" column=\"\
    PRICE\" />\n        <set name=\"chapters\">\n            <key column=\"BOOK_ID\"\
    \ />\n            <one-to-many class=\"Chapter\" />\n        </set>\n    </class>\n\
    </hibernate-mapping>\n```\n\nThe following is the sample code to save the `book`\
    \ and `chapter` objects:\n\n```java\nTransaction tx = session.beginTransaction();\n\
    \nBook book = new Book();\nbook.setIsbn(\"234234wef2323\");\nbook.setBookName(\"\
    Hibernate Recipes \");\nbook.setPrice(79l);\nbook.setPublishDate(new Date());\n\
    session.save(book);\n\nChapter chapter = new Chapter();\nchapter.setBook_id(book.getBook_id());\n\
    chapter.setNoOfPages(10);\nchapter.setTitle(\"One-To-Many Association\");\nsession.save(chapter);\n\
    \nSet<Chapter> chapters = new HashSet<Chapter>();\nchapters.add(chapter);\nbook.setChapters(chapters);\n\
    ```\n\nIn this code, you save `book` and `chapter` separately: `session.save(book)`\
    \ and `session.save(chapter)`. Also, you programmatically associate the chapters\
    \ with the book: `book.setChapters(chapters)`.\n\nHibernate resolves these statements\
    \ into three queries and executes them as follows:\n\n```sql\ninsert into BookShop7.BOOK\
    \ (ISBN, BOOK_NAME, PUBLISH_DATE, PRICE, BOOK_ID) values (?, ?, ?, ?, ?)\ninsert\
    \ into BookShop7.CHAPTER (BOOK_ID, title, NUM_OF_PAGES, id) values (?, ?, ?, ?)\n\
    update BookShop7.CHAPTER set BOOK_ID=? where id=?\n```\n\nThe first SQL statement\
    \ inserts the `book` record into the `BOOK` table. This is straightforward SQL\
    \ and is associated with the statement `session.save(book)`.\n\nThe second SQL\
    \ statement inserts the `chapter` object into the `CHAPTER` table. The code for\
    \ this is `session.save(chapter)`.\n\nThe third SQL statement is the interesting\
    \ one. It associates the `book` and `chapter` objects after they have been loaded\
