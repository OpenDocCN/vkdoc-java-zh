    6.6 使用延迟初始化


    问题


    延迟初始化在集合中是如何工作的？如何避免 **LazyInitializationException**？


    解决方案


    实体的映射集合并非每次将实体从数据库加载到 JVM 内存时都需要用到。这个映射集合会在内存中占用不必要的空间。为了解决这个问题，Hibernate 提供了*延迟初始化*的概念，即关联和映射集合只有在用户/应用程序需要时才会被检索。映射集合的检索对应用程序来说是透明的。Hibernate
    默认将延迟初始化设置为 true，这节省了大量内存使用。


    因此，当获取一本书时，章节集合不会被检索。如果会话仍然打开，你可以使用 **Hibernate.initialize(book.getChapters())**
    获取章节集合。如果会话未打开，则必须在加载拥有实体时加载该集合；你可以通过在拥有实体的映射文件中将属性 **lazy** 设置为 **false** 来配置这一点。


    **工作原理


    你可以使用以下代码从数据库中检索一个 **book** 对象。章节集合会同时被检索：


    ****Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    **return book;**


    **} finally {**


    **session.close();**


    **}**


    **但是，当你在会话外部通过 **book.getChapters()** 访问章节集合时，会发生异常：


    **for (Iterator iter = book.getChapters().iterator(); iter.hasNext();) {**


    String chapter = (String) iter.next();


    **System.out.println(chapter);**


    **}**


    **发生此异常的原因是集合的延迟初始化。你可以显式地初始化它，以便在会话外部访问：


    ****Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    Hibernate.initialize(book.getChapters());


    **return book;**


    **} finally {**


    **session.close();**


    **}**


