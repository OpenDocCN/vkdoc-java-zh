- fmt: '# Querying with Criteria and Example


    When you’re querying with the Criteria API, you can use projections to apply the
    aggregated functions. These functions are encapsulated in the `Projections` class
    as static methods:


    ```

    Criteria criteria = session.createCriteria(Book.class)

    .setProjection(Projections.avg("price"));

    List books = criteria.list();

    ```


    This is similar to the following:


    ```

    select avg(book.price) from Book book

    ```


    The results can be sorted in ascending or descending order:


    ```

    Criteria criteria = session.createCriteria(Book.class)

    .addOrder(Order.asc("name"))

    .addOrder(Order.desc("publishDate"));

    List books = criteria.list();

    ```


    This is something like:


    ```

    from Book book

    order by book.name asc, book.publishDate desc

    ```


    Grouping is also supported for Criteria queries. You can assign any properties
    as group properties, and they appear in the `group by` clause:


    ```

    Criteria criteria = session.createCriteria(Book.class)

    .setProjection(Projections.projectionList()

    .add(Projections.groupProperty("publishDate"))

    .add(Projections.avg("price")));

    List books = criteria.list();

    ```


    This results in:


    ```

    select book.publishDate, avg(book.price)

    from Book book

    group by book.publishDate

    ```


    ## 9.5 Querying by Example


    ### Problem


    What is Query by Example (QBE), and how do you use it to retrieve data?


    ### Solution


    Suppose you need to retrieve data based on different input. The search criteria
    can be complex filtering data on various columns. Using `Criteria`, it might look
    like this:


    ```

    Criteria criteria = getSession().createCriteria(Book.class);

    criteria.add(Restrictions.eq("name", "Hibernate"))

    .add(Restrictions.eq("price", 100));

    ```


    If you have more columns to be filtered, the list increases. QBE makes this easy
    for you.


    QBE returns a result set depending on the properties that were set on an instance
    of the queried class. You can also specify the properties that need to be excluded.
    This approach greatly reduces the amount of code you have to write.


    ### How It Works


    Criteria queries can be constructed through an `Example` object. The object should
    be an instance of the persistent class you want to query. All null properties
    are ignored by default:


    ```

    Book book = new Book();

    book.setName("Hibernate");

    book.setPrice(new Integer(100));

    Example exampleBook = Example.create(book);

    Criteria criteria = session.createCriteria(Book.class)

    .add(exampleBook);

    List books = criteria.list();

    ```


    The HQL is similar to the following:


    ```

    from Book book

    where book.name = ''Hibernate'' and book.price = 100

    ```


    In this example, the instance of `Book` is created, and the search criteria are
    set: they include `name` and `price`. This `Book` instance is then passed while
    creating an `Example` object. Finally, the `Criteria` interface accepts the `Example`
    instance to retrieve the data based on the values set on the `Book` instance.


    You can specify creation rules for the construction of the `Example` object. For
    example, you can exclude some of the properties or enable `like` for a string
    comparison:


    ```

    Book book = new Book();

    book.setName("%Hibernate%");

    book.setPrice(new Integer(100));

    Example exampleBook = Example.create(book)

    .excludeProperty("price")

    .enableLike();

    Criteria criteria = session.createCriteria(Book.class)

    .add(exampleBook);

    List books = criteria.list();

    ```


    The corresponding HQL is as follows:


    ```

    from Book book

    where book.name like ''%Hibernate%''

    ```


    ## Summary


    This chapter has introduced the Criteria API and how to use it to retrieve data.
    You can use restrictions to filter data. The `Restrictions` interface has several
    methods that let you filter data: `equal`, `like`, `greater than`, and `less than`.
    It also provides disjunctions. The `MatchMode` interface provides variables that
    you can use for string comparisons. Subqueries also can be implemented using the
    `DetachedCriteria` object.


    You can use the `createCriteria()` and `createAlias()` methods to fetch data when
    there are associated objects. And you can use projections for aggregated functions
    and groupings. Finally, Query by Example makes it easy to fetch data when the
    data has to be filtered on various search criteria.


    ---


    # Chapter 10: Working with Objects


    This chapter discusses the states an object goes through during its lifecycle.
    The session is responsible for managing object state in Hibernate, and the `EntityManager`
    does the same in Java Persistence.


    Hibernate provides a persistence mechanism that is transparent to the entities
    and the application; the application has to know the state of an object.


    The chapter also discusses the persistence context provided by Hibernate. The
    persistence context manages objects and caches object states within a transaction
    (unit of work). You will learn how to use data filtering and interceptors.


    ## 10.1 Identifying Persistent Object States


    ### Problem


    What are the states that an object can have in Hibernate? How does the object
    lifecycle work?


    ### Solution


    Hibernate defines four object states: transient, persistent, detached, and removed.
    You look into each state and what methods in Hibernate or JPA take an object to
    that state.


    ### How It Works


    Let''s begin with the transient object before moving on to look at the other states.


    #### Transient Objects


    Objects instantiated using the `new` operator are called *transient objects*.
    The Hibernate persistence context isn’t aware of operations performed on transient
    objects. Their state is lost when they aren’t referenced by any other object and
    become available for garbage collection. They don’t have any association with
    any database table row. JPA doesn’t have this state. Figure 10-1 provides a graphical
    representation.


    *Figure 10-1. Objects instantiated using the `new` operator are called transient*


    #### Persistent Objects


    An object that has a database identity associated with it is called a *persistent
    object*. The key for an object to be in a persistent state is to be associated
    with a *persistent context*. The persistent context caches the object state and
    can identify changes made, if any.


    You can create persistent objects two ways: you can retrieve a database table
    row as an entity by calling API methods like `get()`, `load()`, and `list()`;
    or you can persist a transient object using API methods like `save()` and `saveOrUpdate()`.
    Figure 10-2 illustrates the possible ways for an object to become persistent.


    *Figure 10-2. Possible ways for an object to become persistent*


    #### Detached Objects


    In the previous section, you learned that a persistent object is associated with
    a persistent context. The persistent context no longer exists after the transaction
    is closed. If the application retains a reference to the persistent object, then
    the object is said to be in the *detached state*. The state of a detached object
    can be modified and can be persisted back to the database. This is very common
    when you’re working with applications that have a multilayered architecture.


    Hibernate provides a reattached mode and a merging mode to make a detached object
    persistent.


    JPA has merging mode only. Figure 10-3 illustrates the relationship between detached
    and persistent objects.


    *Figure 10-3. Relationship between detached and persistent objects*


    #### Removed Objects


    A persistent object is considered to be in the *removed* state when a `delete()`
    or `remove()` operation is called on it. The `delete()` method is provided by
    a Hibernate session, whereas the `remove()` method is provided by the JPA `EntityManager`.'
