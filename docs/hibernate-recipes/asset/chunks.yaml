    method with an empty ID value, it’s treated as a new object that should be inserted
    into the database. Hibernate first generates an ID for this object and then issues
    an **INSERT** statement. Otherwise, if the ID value isn’t empty, Hibernate treats
    it as an existing object and issues an **UPDATE** statement for it.


    How does Hibernate treat an ID as empty? For the **Book** class, the **isbn**
    type is a primitive **long**. You should assign a number as the unsaved value.
    Typically, you choose “0” as unsaved, because it’s the default value for the **long**
    data type. But it’s a problem that you can’t have an object whose ID value is
    really “0”:


    ****<id name="isbn" type="long" column="ISBN" unsaved-value="0">**


    **<generator class="native"/>**


    **</id>**


    **The solution to this problem is to use a primitive wrapper class as your ID
    type (**java.lang.Long** in this case). Then, null is treated as the unsaved value.
    You can use any number within the range of the **long** data type as the ID value:


    ****public class Book {**


    private Long isbn;


    **private String name;**


    **private Publisher publisher;**


    **private Date publishDate;**


    **private int price;**


    **private List chapters;**


    **// Getters and Setters**


