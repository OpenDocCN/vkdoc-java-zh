- fmt: '您需要配置一个使用 Hibernate 作为持久化框架的 Java 企业级应用程序。您还需要配置 Hibernate 使用`JTATransactionFactory`来提供`JTATransaction`对象。然后，您需要使用`UserTransaction`接口以编程方式管理事务。


    ## 工作原理


    我们使用 WebLogic（版本 9.2）作为应用服务器来演示如何使用 JTA 进行编程式事务划分。假设您已经非常熟悉如何构建和部署应用程序。


    首先，您需要在应用服务器上配置数据源。为此，您需要启动 WebLogic 服务器，登录控制台，然后配置数据源。您还必须将数据库驱动程序添加到服务器库中。对于
    Derby，您需要将`derbyClient.jar`添加到服务器库中。请确保从控制台测试连接！


    您需要提供以下信息（使用您自己的值）：


    - *JNDI 名称：* `local_derby`。应用程序使用此名称获取数据库连接。

    - *数据库名称：* `BookShopDB`

    - *主机名：* `localhost`。如果您指向远程数据库，则该值类似于该机器的 IP。

    - *端口：* `1527`

    - *用户：* `book`

    - *密码：* `book`


    在应用服务器上成功配置数据源后，您需要配置 Hibernate。您需要提供的关键属性如下：


    - `Hibernate.connection.datasource`：此属性的值必须与应用服务器上配置的数据源的 JNDI 名称相同。

    - `Hibernate.transaction.factory_class`：此属性的默认值是`JDBCTransactionFactory`。但是，由于您想使用
    JTA 事务进行事务划分，因此需要将其定义为`JTATransactionFactory`。

    - `Hibernate.transaction.manager_lookup_class`：此事务管理器的值取决于应用服务器。每个应用服务器都有不同的 JTA
    实现，因此您必须告诉 Hibernate 使用哪个 JTA 实现。Hibernate 支持大多数主流应用服务器实现；对于 WebLogic，您使用`org.hibernate.transaction.WeblogicTransactionManagerLookup`。


    以下是 Hibernate 配置：


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE hibernate-configuration PUBLIC

    "-//Hibernate/Hibernate Configuration DTD 3.0//EN"

    "http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd">

    <hibernate-configuration>

    <session-factory name="book">

    <property name="hibernate.connection.datasource">local_derby</property>

    <property

    name="hibernate.transaction.factory_class">org.hibernate.transaction.JTATransactionFactory</property>

    <property

    name="hibernate.transaction.manager_lookup_class">org.hibernate.transaction.WeblogicTransactionManagerLookup</property>

    <property name="hibernate.dialect">org.hibernate.dialect.DerbyDialect</property>

    <property name="hibernate.show_sql">true</property>

    <property name="hibernate.cache.use_second_level_cache">false</property>

    <mapping resource="book.xml" />

    </session-factory>

    </hibernate-configuration>

    ```


    现在，您需要编写一个为整个应用程序提供`SessionFactory`的类。为此，您定义了一个工具类，其中包含一个返回`SessionFactory`的`static`方法。以下是代码实现：


    ```java

    import org.hibernate.SessionFactory;

    import org.hibernate.cfg.Configuration;


    public class HibernateUtil {


    private HibernateUtil(){}


    public static SessionFactory getSessionFactory()

    {

    SessionFactory factory = null;;

    try {

    factory = new Configuration().configure().buildSessionFactory();

    } catch (Exception e) {

    e.printStackTrace();

    }

    return factory;

    }

    }

    ```'
