    \ for both polymorphic and nonpolymorphic queries. The denormalization of the\
    \ class hierarchy in the relational model can cause data stability and maintainability\
    \ issues, so it’s a good idea to run this by your DBA.\n\nYou use the audio and\
    \ video section of your bookshop to learn about inheritance mapping. Suppose that\
