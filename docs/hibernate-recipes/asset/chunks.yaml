- fmt: "# 在 Hibernate 中启用二级缓存\n\n要启用二级缓存，第一步是在 Hibernate 配置文件`hibernate.cfg.xml`中选择一个缓存提供者。Hibernate\
    \ 支持多种缓存实现，例如 EHCache、OSCache、SwarmCache 和 JBoss Cache，如前所述。在非分布式环境中，你可以选择 EHCache，它是\
    \ Hibernate 的默认缓存提供者：\n\n```\n<hibernate-configuration>\n  <session-factory>\n\
    \    ...\n    <property name=\"cache.provider_class\">\n      org.hibernate.cache.EhCacheProvider\n\
    \    </property>\n    ...\n  </session-factory>\n</hibernate-configuration>\n\
    ```\n\n你可以通过位于源根目录的配置文件`ehcache.xml`来配置 EHCache。你可以为不同的缓存区域指定不同的设置，这些区域存储不同类型的对象。如果参数`eternal`设置为`false`，元素将在一定时间后过期。参数`timeToIdleSeconds`是元素过期前的空闲时间；它是元素在过期前两次访问之间的最大时间间隔，并且仅在元素不是永久的时使用。\n\
    \n参数`timeToLiveSeconds`是元素过期前的生存时间；它是从创建到元素过期之间的最大时间，并且仅在元素不是永久的时使用：\n\n```\n\
    <ehcache>\n  <diskStore path=\"java.io.tmpdir\" />\n  <defaultCache maxElementsInMemory=\"\
    10000\" eternal=\"false\" timeToIdleSeconds=\"120\"\n    timeToLiveSeconds=\"\
    120\" overflowToDisk=\"true\"\n  />\n  <cache name=\"com.metaarchit.bookshop.Book\"\
    \ maxElementsInMemory=\"10000\"\n    eternal=\"false\" timeToIdleSeconds=\"300\"\
    \ timeToLiveSeconds=\"600\"\n    overflowToDisk=\"true\"\n  />\n</ehcache>\n```\n\
    \n要在运行时监控 Hibernate 的缓存活动，请将以下行添加到 log4j 配置文件`log4j.properties`中：\n\n```\nlog4j.logger.org.hibernate.cache=debug\n\
    ```\n\n现在，你需要为特定的持久化类启用缓存。让我们看看在 Hibernate 中启用缓存时幕后发生了什么。\n\n当你为一个类启用二级缓存时，Hibernate\
    \ 不会在缓存中存储实际的实例。相反，它会缓存该对象的各个属性。在示例中，`Book`的实例不会被缓存，而是`book`对象中的属性（如`name`和`price`）被缓存。缓存的对象存储在与持久化类同名的区域中，例如`com.metaarchit.bookshop.Book`。\n\
    \n你可以为持久化类选择几种缓存用法。如果持久化对象是只读的且从未修改，最有效的用法是`read-only`：\n\n```\n<hibernate-mapping\
    \ package=\"com.metaarchit.bookshop\">\n  <class name=\"Book\" table=\"BOOK\"\
    >\n    <cache usage=\"read-only\" />\n    ...\n  </class>\n</hibernate-mapping>\n\
    ```\n\n当`Book`类被缓存时，即使`book`对象在两个不同的会话中被多次加载，也只会执行一次 SQL 查询。由于避免了对数据库的第二次调用，查询性能得到了提升：\n\
    \n```\nSession session1 = factory.openSession();\ntry {\n  Book book1 = (Book)\
    \ session1.get(Book.class, id);\n} finally {\n  session1.close();\n}\n\nSession\
    \ session2 = factory.openSession();\ntry {\n  Book book2 = (Book) session2.get(Book.class,\
    \ id);\n} finally {\n  session2.close();\n}\n```\n\n然而，如果你在一个会话中修改了`book`对象并刷新更改，将会抛出一个异常，因为更新只读对象是不允许的。\n\
    \n```\nSession session1 = factory.openSession();\ntry {\n  Book book1 = (Book)\
    \ session1.get(Book.class, id);\n  book1.setName(\"New Book\");\n  session1.save(book1);\n\
    \  session1.flush();\n} finally {\n  session1.close();\n}\n```\n\n因此，对于可更新的对象，你应该选择另一种缓存用法：`read-write`。Hibernate\
    \ 会在对象更新之前将其从缓存中失效：\n\n```\n<hibernate-mapping package=\"com.metaarchit.bookshop\"\
    >\n  <class name=\"Book\" table=\"BOOK\">\n    <cache usage=\"read-write\" />\n\
    \    ...\n```"
  raw: 'To turn on the second-level cache, the first step is to choose a cache provider
    in the Hibernate configuration file **hibernate.cfg.xml**. Hibernate supports
    several cache implementations, such as EHCache, OSCache, SwarmCache and JBoss
    Cache, as discussed earlier. In a nondistributed environment, you can choose EHCache,
    which is Hibernate’s default cache provider:


    ****<hibernate-configuration>**


    **<session-factory>**


    **...**


    <property name="cache.provider_class">


    org.hibernate.cache.EhCacheProvider


    </property>


    **...**


    **</session-factory>**


    **</hibernate-configuration>**


    **You can configure EHCache through the configuration file **ehcache.xml**, located
    in the source root folder. You can specify different settings for different cache
    regions, which store different kinds of objects. If the parameter **eternal**
    is set to false, the elements will be expired in a time period. The parameter
    **timeToIdleSeconds** is the time to idle for an element before it expires; it’s
    the maximum amount of time between accesses before an element expires and is used
    only if the element isn’t eternal.


    The parameter **timeToLiveSeconds** is time to live for an element before it expires;
    it’s the maximum time between creation and when the element expires and is used
    only if the element isn’t eternal:


    ****<ehcache>**


    **<diskStore path="java.io.tmpdir" />**


    **<defaultCache maxElementsInMemory="10000" eternal="false" timeToIdleSeconds="120"**


    **timeToLiveSeconds="120" overflowToDisk="true"**


    **/>**


    **<cache name="com.metaarchit.bookshop.Book" maxElementsInMemory="10000"**


    **eternal="false" timeToIdleSeconds="300" timeToLiveSeconds="600"**


    **overflowToDisk="true"**


    **/>**


    CHAPTER 12 ■ CACHING IN HIBERNATE


    **</ehcache>**


    To monitor Hibernate’s caching activities at runtime, add the following line to
    the log4j configuration file **log4j.properties**:


    ****log4j.logger.org.hibernate.cache=debug**


    **Now, you need to enable caching for a particular persistent class. Let’s look
    at what goes on behind the scenes when caching is enabled in Hibernate.


    When you enable a class with the second-level cache, Hibernate doesn’t store the
    actual instances in cache. Instead it caches the individual properties of that
    object. In the example, the instance of **Book** isn’t cached—rather, the properties
    in the **book** object like **name** and **price** are cached. The cached objects
    are stored in a region that has the same name as the persistent class, such as


    **com.metaarchit.bookshop.Book**.


    You can choose several cache usages for a persistent class. If the persistent
    objects are read-only and never modified, the most efficient usage is **read-only**:


    ****<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Book" table="BOOK">**


    <cache usage="read-only" />


    **...**


    **</class>**


    **</hibernate-mapping>**


    **When the **Book** class is cached, only one SQL query is made, even though the
    **book** object is loaded more than once in two different sessions. Because the
    second call to the database is avoided, the query’s performance improves:


    ****Session session1 = factory.openSession();**


    **try {**


    **Book book1 = (Book) session1.get(Book.class, id);**


    **} finally {**


    **session1.close();**


    **}**


    **Session session2 = factory.openSession();**


    **try {**


    **Book book2 = (Book) session2.get(Book.class, id);**


    **} finally {**


    **session2.close();**


    **}**


    **However, if you modify the **book** object in one session and flush the changes,
    an exception will be thrown for updating a read-only object.


    ****Session session1 = factory.openSession();**


    **try {**


    **Book book1 = (Book) session1.get(Book.class, id);**


    book1.setName("New Book");


    session1.save(book1);


    session1.flush();


    **} finally {**


    CHAPTER 12 ■ CASHING IN HIBERNATE


    ****session1.close();**


    **}**


    **So, for an updatable object, you should choose another cache usage: **read-write**.
    Hibernate invalidates the object from cache before it’s updated:


    ****<hibernate-mapping package="com.metaarchit.bookshop">**


    **<class name="Book" table="BOOK">**


    <cache usage="read-write" />


    **...**'
