    \n## Batch Processing and Native SQL\n\nThe disadvantage of this technique is\
    \ that you load the complete result set returned by `query.list()` into memory\
    \ and then save the records one at a time. Instead, you can use the `session.flush()`\
    \ and `session.clear()` methods to update in batches. You can also use `scroll`\
    \ to get a JDBC `ResultSet`, which is a table of data representing a database\
    \ result set that is usually generated by executing a statement that queries the\
    \ database. A default `ResultSet` maintains a cursor that is navigated from the\
    \ first row to the last row. Setting `CacheMode.IGNORE` makes Hibernate not interact\
    \ with the second-level cache for that particular session:\n\n```java\nSession\
    \ session = getSession();\nTransaction tx = null;\ntx = session.beginTransaction();\n\
    ScrollableResults books = session.createQuery(\"from bkch2 where name like 'Book%'\"\
    )\n    .setCacheMode(CacheMode.IGNORE)\n    .scroll(ScrollMode.FORWARD_ONLY);\n\
    \nint count = 0;\nwhile (books.next()) {\n    BookCh2 book = (BookCh2) books.get(0);\n\
    \    book.setPrice(new Integer(book.getPrice() - 10));\n    if (++count % 25 ==\
    \ 0) {\n        //flush a batch of updates and release memory:\n        System.out.println(\"\
    Flushing in batches\");\n        session.flush();\n        session.clear();\n\
    \    }\n}\n\ntx.commit();\nsession.close();\n```\n\nYou can also accomplish batch\
    \ updates by using the `UPDATE` query. The execution of the query is at the SQL\
    \ level and doesn’t involve changing the object state in memory. HQL supports\
    \ parameter binding. The syntax for an `UPDATE` or `DELETE` is as follows:\n\n\
    ```\n( UPDATE | DELETE ) FROM? EntityName (WHERE where_conditions)?\n```\n\nThe\
    \ following rules apply to this query:\n\n- The `FROM` clause is optional.\n-\
    \ The `WHERE` clause is optional.\n- No joins, either implicit or explicit, can\
    \ be specified in a bulk HQL query.\n- Only a single entity can be named in the\
    \ `FROM` clause.\n\nSo here is `UPDATE`:\n\n```java\nSession session = getSession();\n\
