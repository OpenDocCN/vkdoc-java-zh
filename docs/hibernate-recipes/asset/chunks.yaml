    10.3 持久化游离对象


    问题


    如何持久化一个游离对象？


    解决方案


    您可以通过两种方式持久化游离对象：重新附加或合并。


    **工作原理


    首先重新附加一个游离对象，然后合并另一个。


    重新附加游离对象


    在 Hibernate 中，您使用会话的 **update()** 方法将游离对象重新附加到会话和持久化上下文：


    ****Session session = getSession();**


    **Transaction tx = session.beginTransaction();**


    **Book book = (Book) session.get(Book.class, new Long(294912));**


    **tx.commit();**


    **session.close();**


    book.setName("Detached Hibernate");


    Session session2 = getSession();


    Transaction tx2 = session2.beginTransaction();


    session2.update(book);


    tx2.commit();


    **session2.close();**


    **Hibernate 会跟踪对游离对象所做的修改。因此，当调用 **update()** 方法时，它总是会调度一个 **update** SQL 命令。如果您不想执行
    **update** 调用，可以将类映射配置为 **select-before-update=''true''**。**然后，在调用 **update()**
    方法之前，会先执行一次 **get()** 调用来检查对象是否已被更新。**


    **JPA 没有 **update()** 方法。它只支持合并游离对象。


    合并游离对象


