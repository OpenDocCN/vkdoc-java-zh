    \n在本章中，你学习了四种基本的继承策略：每个类层次结构一张表、每个子类一张表、每个具体类一张表（使用联合）以及每个具体类一张表（使用隐式多态）。\n\n\
    你了解了这四种继承映射策略的实现方式，并学习了如何选择合适的策略。表 4-1 总结了继承策略与多态关联之间的关系。\n\n**第 4 章 ■ 继承与自定义映射**\n\
    \n*表 4-1. 各种继承策略支持的多态关联*\n\n| **继承策略** | **多态多对一** | **多态一对一** | **多态一对多** | **多态多对多**\
    \ |\n| :--- | :--- | :--- | :--- | :--- |\n| 每个类层次结构一张表 | `<many-to-one>` | `<one-to-one>`\
    \ | `<one-to-many>` | `<many-to-many>` |\n| 每个子类一张表 | `<many-to-one>` | `<one-to-one>`\
    \ | `<one-to-many>` | `<many-to-many>` |\n| 每个具体类一张表（使用联合） | `<many-to-one>` |\
    \ `<one-to-one>` | `<one-to-many>`（仅限 `Inverse=\"true\"`） | `<many-to-many>` |\n\
    | 每个具体类一张表（使用隐式多态） | `<any>` | 不支持 | 不支持 | `<many-to-any>` |\n\n你已经了解了继承映射如何实现多态查询；表\
    \ 4-2 总结了各种继承策略支持的多态查询能力。你还学习了 Hibernate 支持的基本数据类型以及一些自定义数据类型的实现。\n\n*表 4-2. 各种继承策略支持的多态查询*\n\
    \n| **继承策略** | **多态 load()/get()** | **多态查询** | **多态连接** | **外连接抓取** |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| 每个类层次结构一张表 | 支持 | 支持 | 支持 | 支持 |\n| 每个子类一张表\
    \ | 支持 | 支持 | 支持 | 支持 |\n| 每个具体类一张表（使用联合） | 支持 | 支持 | 支持 | 支持 |\n| 每个具体类一张表（使用隐式多态）\
    \ | 支持 | 支持 | 不支持 | 不支持 |\n\n**第 5 章**\n\n■ ■ ■\n\n**多对一和一对一映射**\n\n通常，实体之间是相互关联的。例如，一个**客户**与一个**地址**相关联。一个**客户**可以有一个或多个**地址**（例如，**账单地址**和**送货地址**）。这些关系或关联在关系模型和领域/对象模型中的表示方式不同。\n\
    \n在关系模型中，外键列表示一个表对另一个表的依赖关系。**客户**表有一个**AddressId**作为外键列，它是**地址**表的主键。\n\n从**客户**的角度来看，因为一个**客户**可以有多个地址，所以这是一个多对一关系。另一方面，从**地址**的角度来看，一个地址只能属于一个客户，所以这是一个一对一关系。\n\
    \n在对象模型中，相同的关系通过类和属性来表示。**客户**类有一个属性来保存属于该**客户**的多个地址（在 Java 中，这表示为集合——**List**、**Set**等）。**地址**类有一个**Customer**类型的属性。\n\
    \n在**客户**和**地址**的例子中，你同时从**客户**实体和**地址**实体的角度来考虑关联，因此这是一个*双向关联*。如果你只从一个实体的角度使用关联，那么它是一个*单向关联*。在对象/关系映射（ORM）框架中，这些关系通过配置文件中的元数据以及实体/对象来表示。\n\
    \n本章将向你展示这些关联在 Hibernate 中是如何表示的，并讨论以下特性：\n\n• 使用多对一和一对一映射的各种方法\n\n• 如何将单向关联转换为双向关联\n\
    \n• 如何使用延迟初始化和级联等特性\n\n• 如何映射关联表或连接表\n\n**5.1 使用多对一关联**\n\n**问题**\n\n回到在线书店的例子，一个出版商可以出版多本书。书籍和出版商之间的关系是多对一关系。在这种情况下，如何使用多对一关联来映射对象？如何使用级联选项来持久化类层次结构？\n\
    \n**解决方案**\n\n如前所述，从书籍到出版商的关联是多对一关联。由于这种关联只能从书籍导航到出版商，因此它也是一个单向关联。你使用 **<many-to-one>**\
    \ 元素来建立这种关联。\n\n**工作原理**\n\n你的应用程序有一个尚未映射到数据库的 **Publisher** 类。遵循第 4 章讨论的对象标识符最佳实践，你可以在该类上添加一个自动生成的\
    \ **id** 属性。图 5-1 展示了多对一单向关联的实体关系图。\n\n*图 5-1. 展示多对一单向关联的实体关系图*\n\n```java\npublic\
    \ class Publisher implements Serializable{\n    private Long publisher_id;\n \
    \   private String code;\n    private String name;\n    private String address;\n\
    \    // getters and setters\n}\n```\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
    >\n    <class name=\"Publisher\" table=\"Publisher\" schema=\"BOOK5\">\n     \
    \   <id name=\"Publisher_id\" type=\"long\" column=\"PUBLISHER_ID\" >\n      \
    \      <generator class=\"native\">\n            </generator>\n        </id>\n\
    \        <property name=\"code\" type=\"string\">\n            <column name=\"\
    CODE\" length=\"4\" not-null=\"true\" unique=\"true\" />\n        </property>\n\
    \        <property name=\"name\" type=\"string\">\n            <column name=\"\
    PUBLISHER_NAME\" length=\"100\" not-null=\"true\" />\n        </property>\n  \
    \      <property name=\"address\" type=\"string\">\n            <column name=\"\
    ADDRESS\" length=\"200\" />\n        </property>\n    </class>\n</hibernate-mapping>\n\
    ```\n\n因为你向应用程序添加了一个新的持久化对象，所以需要在 Hibernate 配置文件中指定它：\n\n```xml\n<mapping resource=\"\
    com/hibernaterecipes/chapter5/Publisher.xml\" />\n```\n\n对于 **Book** 类，你已经有一个类型为\
    \ **Publisher** 的 **Publisher** 属性，该属性在之前的示例中未被使用：\n\n```java\npublic class Book_5_1\
    \ implements Serializable{\n    private Long book_id;\n    private String isbn;\n\
    \    private String name;\n    private Publisher publisher;\n    private Date\
    \ publishDate;\n    private Integer price;\n    // getters and setters\n}\n```\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes/chapter5\">\n    <class\
    \ name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">\n        <id name=\"book_id\"\
    \ type=\"long\" column=\"BOOK_ID\" >\n            <generator class=\"native\"\
    >\n            </generator>\n        </id>\n        <property name=\"isbn\" type=\"\
    string\">\n            <column name=\"ISBN\" length=\"50\" not-null=\"true\" unique=\"\
    true\" />\n        </property>\n        <property name=\"name\" type=\"string\"\
    >\n            <column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />\n\
    \        </property>\n        <property name=\"publishDate\" type=\"date\" column=\"\
    PUBLISH_DATE\" />\n```\n"
- fmt: "```xml\n<property name=\"price\" type=\"int\" column=\"PRICE\" />\n<many-to-one\
    \ name=\"publisher\" class=\"Publisher\" column=\"PUBLISHER_ID\"/>\n</class>\n\
    </hibernate-mapping>\n\nAfter you created a new `book` object together with a\
    \ new `publisher` object, you want to save them into the database. Will Hibernate\
    \ save the `publisher` object when you save the `book` object?\n\nUnfortunately,\
    \ an exception occurs if you save only the `book` object. That means you must\
    \ save them one by one:\n\n```\nSession session = factory.openSession();\nTransaction\
    \ tx = null;\ntry {\n    tx = session.beginTransaction();\n    session.save(publisher);\n\
    \    session.save(book);\n    tx.commit();\n} catch (HibernateException e) {\n\
    \    if (tx != null) tx.rollback();\n    throw e;\n} finally {\n    session.close();\n\
    }\n```\n\nIt’s a lot of trouble to save all the objects individually, especially\
    \ for a large object graph. So, Hibernate provides a way to save them in one shot.\
    \ Let’s add a `cascade=\"save-update\"` attribute to the `<many-to-one>` mapping,\
    \ to make Hibernate cascade the save/update operations to the associated object:\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">\n    <class\
    \ name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">\n        .\n        .\n \
    \       .\n        .\n        .\n        .\n        <many-to-one name=\"publisher\"\
    \ class=\"Publisher\" column=\"PUBLISHER_ID\"\n                     cascade=\"\
    save-update\"/>\n    </class>\n</hibernate-mapping>\n```\n\nThe save/update cascade\
    \ is very useful when you persist a graph of objects, some of which are newly\
    \ created and some of which have been updated. You can use the `saveOrUpdate()`\
    \ method and let Hibernate decide which objects should be created and which should\
    \ be updated:\n\n```\nsession.saveOrUpdate(book);\n```\n\nIn addition to the save/update\
    \ cascade, you can also cascade the delete operation:\n\n```xml\n<many-to-one\
    \ name=\"publisher\" class=\"Publisher\" column=\"PUBLISHER_ID\" cascade=\"save-update,delete\"\
    \ />\n```\n\nIn JPA, the book and publisher classes are annotated as follows:\n\
    \n```java\n@Entity\n@Table (name=\"PUBLISHER\", schema=\"BOOK5\")\npublic class\
    \ Publisher implements Serializable{\n\n    @Id\n    @Column(name=\"PUBLISHER_ID\"\
    )\n    @GeneratedValue(strategy=GenerationType.AUTO)\n    private Long publisher_id;\n\
    \n    @Column(name=\"CODE\")\n    private String code;\n\n    @Column(name=\"\
    PUBLISHER_NAME\")\n    private String name;\n\n    @Column(name=\"ADDRESS\")\n\
    \    private String address;\n\n    // getters and setters\n}\n\n@Entity\n@Table\
    \ (name=\"BOOK\", schema=\"BOOK5\")\npublic class Book_5_1 implements Serializable{\n\
    \n    @Id\n    @Column(name=\"BOOK_ID\")\n    @GeneratedValue(strategy=GenerationType.AUTO)\n\
    \    private Long book_id;\n\n    @Column(name=\"isbn\")\n    private String isbn;\n\
    \n    @Column(name=\"BOOK_NAME\")\n    private String name;\n\n    @ManyToOne\n\
    \    @Cascade(value=CascadeType.SAVE_UPDATE)\n    @JoinColumn(name=\"PUBLISHER_ID\"\
    )\n    private Publisher publisher;\n\n    @Column(name=\"price\")\n    private\
    \ Integer price;\n\n    // getters and setters\n}\n```\n\n## 5.2 Using a Many-to-One\
    \ Association with a Join Table\n\n### Problem\n\nLet’s say a set of books has\
    \ been identified that will be published, but publishers haven’t yet been allocated\
    \ for those books. In the same way, you may have publishers that are ready to\
    \ publish books, but the books haven’t yet been written. In this case, if you\
    \ use the same `Book` and `Publisher` entities, there will be rows in which the\
    \ `Book_Id` is null in the `PUBLISHER` table and the `Publisher_Id` is null in\
    \ the `BOOK` table. This isn’t an efficient way to store data in a relational\
    \ database and doesn’t provide a normalized schema.\n\nIn this case, you use an\
    \ additional table called a *join table* that contains the foreign key’s `Book_id`\
    \ and `Publisher_Id` as columns. This table includes all rows where a `Book` has\
    \ a `Publisher` and a `Publisher` has published a `Book`."
