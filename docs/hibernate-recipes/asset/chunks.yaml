    7.3 Mapping a One-to-Many Bidirectional Association Using a


    Join Table


    Problem


    How do you map objects using a one-to-many association with a join table?


    Solution


    Remember that you can use a join table for a many-to-one association and also
    for a one-to-many association. You can do so by using a **<many-to-many>** association
    type and marking **unique="true"** .


    How It Works


    One **book** object can relate to many **chapter** objects, so the association
    from **Book** to **Chapter** is one-to-many. You first define this association
    as unidirectional—navigable from **book** to **chapter** only—and then extend
    it to be bidirectional.


    CHAPTER 7 ■ MANY-VALUED ASSOCIATIONS


    The **Book** mapping is as follows:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter7">**


    **<class name="Book7_3" table="BOOK7_3" schema="BookShop7">**


    **<id name="book_id" column="BOOK_ID" type="long">**


    **<generator class="native">**


    **</generator>**


    **</id>**


    **<property name="isbn" type="string" column="ISBN" />**


    **<property name="bookName" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="long" column="PRICE" />**


    <set name="chapters" table="BOOK_CHAPTER" schema="BookShop7" cascade="save-update,delete-orphan">


    <key column="BOOK_ID" />


    <many-to-many column="CHAPTER_ID" class="Chapter7_3" unique="true"/>


    </set>


    **</class>**


    **</hibernate-mapping>**


    ****The join table **BOOK_CHAPTER** is defined as the collection table. **BOOK_ID**
    and **CHAPTER_ID** form the composite primary key of the join table. Instead of
    one-to-many, you need to use the **<many-to-many>** element, because one-to-many
    doesn’t know about join tables. By setting the **unique** attribute to **true**,
    you say that one **Book** can have a **Chapter** only once (determined by the
    **hashCode()** and **equals()** methods), and you indirectly implement a one-to-many
    association.


