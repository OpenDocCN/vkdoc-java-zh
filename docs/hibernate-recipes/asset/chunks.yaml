    3.3 Adding References in Components


    Problem


    How do you add a reference to a component’s parent object? How do you provide
    associations within a component?


    Solution


    You can add a reference to the parent object by using the **<parent>** tag. The
    component tag allows for many-to-one and one-to-one associations with other tables.


    How It Works


    A component can have a reference to its parent object through a **<parent>** mapping:


