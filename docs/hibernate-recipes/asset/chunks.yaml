    \ String doorplate;`\n\n`// getters and setters`\n\n`}`\n\nTo persist the `Address`\
    \ object, you have to manually set the associated `Customer` ID as the primary\
    \ key of the `Address` object.\n\n# CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING\n\
    \n## 5.5 Creating a One-to-One Association Using a Foreign Key\n\n### Problem\n\
    \nLet’s say that one `Customer` has only one `Address` and one `Address` belongs\
    \ to only one `Customer`. This means there is a one-to-one relationship between\
    \ `Customer` and an `Address`. How do you represent a one-to-one association in\
    \ Hibernate?\n\n### Solution\n\nThe simplest way to map a one-to-one association\
    \ is to treat it as a many-to-one association but add a unique constraint on it.\
    \ You can declare the `lazy`, `fetch`, and `cascade` attributes in the same way.\n\
    \n### How It Works\n\nYou can use the `Customer` and `Address` classes to create\
    \ a one-to-one mapping with a foreign key association. (The classes `Customer`\
