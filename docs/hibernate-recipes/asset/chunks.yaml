    b.isbn =**


    **:isbn")**


    **.setParameter("isbn", book.getIsbn()).uniqueResult();** **System.out.println("BOOk''s
    Name- "+name);**


    **tx.commit();**


    **session.close();**


    你可以使用 **session.lock** 来提升隔离级别。上述代码更新如下：


    ****Session session = getSession();**


    **Transaction tx = null;**


    **tx = session.beginTransaction();**


    **BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769));**


    session.lock(book, LockMode.UPGRADE);


    **String name = (String) session.createQuery("select b.name from bkch2 b where
    b.isbn =**


    **:isbn")**


    **.setParameter("isbn", book.getIsbn()).uniqueResult();** **System.out.println("BOOk''s
    Name- "+name);**


    **tx.commit();**


    **session.close();**


    或者，你也可以直接调用


    **BookCh2 book = (BookCh2)session.get(BookCh2.class, new Long(32769),LockMode.UPGRADE);
    **LockMode.UPGRADE** 会在数据库中对特定图书记录创建锁。这样一来，其他并发事务就无法修改该图书记录了。


    Hibernate 支持以下锁模式：


    • **LockMode.NONE**：这是默认的锁模式。如果以该锁模式请求对象，当需要从数据库（而非缓存）读取状态时，会获取一个 **READ** 锁。


    • **LockMode.READ**：在该锁模式下，对象从数据库中被读取。对象的版本会被检查，就像在内存中一样。


    • **LockMode.UPGRADE**：以该锁模式加载的对象，会通过 SQL 语句 **select ... for update** 实现。它等同于
    Java Persistence 中的 **LockModeType.READ**。


    第 13 章 ■ 事务与并发


    • **LockMode.UPGRADE_NOWAIT**：该锁模式尝试使用 Oracle 风格的 **select for update nowait**
    来获取升级锁。一旦获取成功，该锁模式的语义与 **UPGRADE** 相同。


    • **LockMode.FORCE**：该锁模式会导致强制版本递增。它等同于 Java Persistence 中的 **LockModeType.Write**。


    • **LockMode.WRITE**：当对象被更新或插入时，会获取一个 **WRITE** 锁。该锁模式仅供内部使用，不是 **load()** 或 **lock()**
    方法的有效模式。


    小结


    在本章中，你了解了如何以编程方式管理事务。你学会了使用 Hibernate Transaction API 和 Java Transaction API 进行事务划分。


    乐观并发控制和悲观并发控制是实现并发控制的两种方法。乐观并发控制涉及使用版本号或时间戳，将版本作为数据库列来维护。悲观控制则基于每个事务进行，通过使用 **session.lock()**
    并指定锁模式为 **UPGRADE** 或 **UPGRADE_NOWAIT** 来实现。


