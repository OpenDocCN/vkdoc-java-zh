- fmt: "In this case, modeling the `Contact` class as a standalone persistent class\
    \ seems unnecessary. This is because a `Contact` object is meaningless when it’s\
    \ separated from an order object. The function of the `Contact` class is to provide\
    \ some kind of logical grouping. The contact details are completely dependent\
    \ on the `Orders` class. For a bookshop application, it doesn’t make much sense\
    \ to hold contact information as separate entities (entities that have a database\
    \ identity or primary key). For this kind of requirement, where you can associate\
    \ an object with a dependent object, you use what Hibernate calls *components*:\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE hibernate-mapping\
    \ PUBLIC\n\"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\n\"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\"\
    >\n<hibernate-mapping package=\"com.hibernaterecipes.chapter3\">\n<class name=\"\
    Orders\" table=\"ORDERS\">\n<id name=\"id\" type=\"long\" column=\"ID\">\n<generator\
    \ class=\"native\" />\n</id>\n<component name=\"weekdayContact\" class=\"Contact\"\
    >\n<property name=\"recipient\" type=\"string\" column=\"WEEKDAY_RECIPIENT\" />\n\
    <property name=\"phone\" type=\"string\" column=\"WEEKDAY_PHONE\" />\n<property\
    \ name=\"address\" type=\"string\" column=\"WEEKDAY_ADDRESS\" />\n</component>\n\
    <component name=\"holidayContact\" class=\"Contact\">\n<property name=\"recipient\"\
    \ type=\"string\" column=\"HOLIDAY_RECIPIENT\" />\n<property name=\"phone\" type=\"\
    string\" column=\"HOLIDAY_PHONE\" />\n<property name=\"address\" type=\"string\"\
    \ column=\"HOLIDAY_ADDRESS\" />\n</component>\n</class>\n</hibernate-mapping>\n\
    ```\n\nNo new persistent object is introduced. All the columns mapped for these\
    \ components are in the same table as their parent object. Components don’t have\
    \ an identity, and they exist only if their parent does. They’re most suitable\
    \ for grouping several properties as a single object.\n\n### Using JPA Annotations\n\
    \nWhen you’re using JPA annotations, for the `Contact` class, you need to annotate\
    \ the class as `Embeddable`.\n\nYou also map the columns to the regular default\
    \ database columns:\n\n```java\npackage com.hibernaterecipes.annotations.domain;\n\
    \nimport javax.persistence.Column;\nimport javax.persistence.Embeddable;\nimport\
    \ javax.persistence.Entity;\n\n@Embeddable\npublic class Contact {\n\n    private\
    \ String recipient;\n    private String phone;\n    private String address;\n\n\
    \    /**\n     * @return the recipient\n     */\n    @Column(name = \"WEEKDAY_RECIPIENT\"\
    )\n    public String getRecipient() {\n        return recipient;\n    }\n\n  \
