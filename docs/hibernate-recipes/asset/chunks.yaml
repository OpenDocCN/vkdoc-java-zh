    How It Works


    You use WebLogic (version 9.2) as the application server to demonstrate using
    JTA for programmatic transaction demarcation. The assumption is that you’re well
    versed with building and deploying your application.


    To begin, you need to configure the data source on the application server. To
    do so, you need to start the WebLogic server, log in to the console, and configure
    the data source. You must also add the database driver to the server library.
    For Derby, you add **derbyClient.jar** to the server library. Make sure you test
    connectivity from the console!


