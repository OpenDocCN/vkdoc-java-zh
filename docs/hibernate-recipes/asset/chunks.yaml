    \ the object model you map as table per class hierarchy.\n\n*Figure 4-1. Class\
    \ diagram of the object model*\n\nYou first create a class `Disc` and provide\
    \ a mapping definition for it:\n\n```java\npublic class Disc {\n  private Long\
    \ id;\n  private String name;\n  private Integer price;\n  // Getters and Setters\n\
    }\n```\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\"\
    >\n  <class name=\"Disc\" table=\"Disc_1\">\n    <id name=\"discId\" type=\"long\"\
    \ column=\"DISC_ID\">\n      <generator class=\"native\"/>\n    </id>\n    <discriminator\
    \ column=\"DISC_TYPE\" type=\"string\" />\n    <property name=\"name\" type=\"\
    java.lang.String\" column=\"NAME\" />\n    <property name=\"price\" type=\"java.lang.Integer\"\
    \ column=\"PRICE\" />\n  </class>\n</hibernate-mapping>\n```\n\nYou primarily\
    \ sell two kinds of discs: audio discs and video discs. Each kind has different\
