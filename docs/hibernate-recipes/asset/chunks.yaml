    1.2 Programming with Basic JDBC


    Problem


    The traditional way to access a relational database is to use Java Database Connectivity
    (JDBC). Some common problems with using JDBC directly are as follows:


    • You must manually handle database connections. There is always the risk that


    connections aren’t closed, which can lead to other problems.


    • You have to write a lot of bulky code, because all the fields required for inserts,
    updates, and queries must be explicitly mentioned.


    • You have to manually handle associations. For complex data, this can be a major
    issue.


    • The code isn’t portable to other databases.


    Solution


    This section shows how you perform basic Create, Read, Update, and Delete (CRUD)
    operations using JDBC and describes the problems with using basic JDBC. You see
    how the object model is translated into the relational data model.


    How It Works


    To Start, you will need to create an eclipse project. You will need to install
    Derby jars and configure Creating an Eclipse Project'
