- fmt: "# How do you map entities using the table per concrete class strategy? And\
    \ when should you use it?\n\n## Solution\n\nYou can use the table per concrete\
    \ class strategy two ways:\n\n- Table per concrete class with implicit polymorphism\n\
    - Table per concrete class with unions\n\nUsing table per concrete class with\
    \ implicit polymorphism, the table contains all the properties of the concrete\
    \ class and the properties that are inherited from its superclasses. All subclasses\
    \ are mapped as separate entities. You should use this strategy when the requirement\
    \ for polymorphic association or polymorphic query is minimal. Another issue with\
    \ this strategy is that columns are duplicated; this can cause maintenance problems\
    \ because a change to the superclass requires you to change multiple tables.\n\
    \nThe mapping is similar to a regular entity, so you don’t work through an example\
    \ of it.\n\nUsing table per concrete class with unions, the superclass can be\
    \ an abstract class or even an interface. The subclasses are mapped using the\
    \ `union-subclass` element. If the superclass is concrete, an additional table\
    \ is required to map the properties of that class.\n\n## How It Works\n\nYou begin\
    \ by creating the tables using the following Data Definition Language (DDL):\n\
    \n```sql\nCREATE TABLE \"BOOK\".\"AUDIO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL\
    \ ,\n\"NAME\" VARCHAR(250 ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"SINGER\" VARCHAR(50),\"\
    NO_OF_SONGS\" BIGINT,\nCONSTRAINT \"DISC_3_0_PK\" PRIMARY KEY (\"DISC_ID\") )\n\
    \nCREATE TABLE \"BOOK\".\"VIDEO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL ,\n\"\
    NAME\" VARCHAR(250 ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"DIRECTOR\" VARCHAR(50),\"\
    LANGUAGE\" VARCHAR(50),\nCONSTRAINT \"DISC_3_1_PK\" PRIMARY KEY (\"DISC_ID\")\
    \ )\n```\n\nThe `Disc`, `AudioDisc`, and `VideoDisc` classes are as follows:\n\
    \n```java\npublic abstract class Disc_3 implements Serializable {\n    private\
    \ static final long serialVersionUID = -5119119376751110049L;\n    private Long\
    \ discId;\n    private String name;\n    private Integer price;\n    //getters\
    \ and setters\n}\n\npublic class AudioDisc3 extends Disc_3 implements Serializable\
    \ {\n    private static final long serialVersionUID = -8314602929677976050L;\n\
    \    private Integer noOfSongs;\n    private String singer;\n    //getters and\
    \ setters\n}\n\npublic class VideoDisc_3 extends Disc_3 implements Serializable\
    \ {\n    private static final long serialVersionUID = -6857479057343664829L;\n\
    \    private String director;\n    private String language;\n    //getters and\
    \ setters\n}\n```\n\nNote that the `Disc_3` class is an abstract class. The Hibernate\
    \ mapping file is as follows:\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\"\
    >\n    <class name=\"Disc_3\" abstract=\"true\">\n        <id name=\"discId\"\
    \ type=\"long\" column=\"DISC_ID\">\n            <generator class=\"native\"/>\n\
    \        </id>\n        <property name=\"name\" type=\"java.lang.String\" column=\"\
    NAME\" />\n        <property name=\"price\" type=\"java.lang.Integer\" column=\"\
    PRICE\" />\n        <union-subclass name=\"AudioDisc_3\" table=\"AUDIO_DISC_3\"\
    >\n            <property name=\"singer\" type=\"java.lang.String\" column=\"SINGER\"\
    \ />\n            <property name=\"noOfSongs\" type=\"java.lang.Integer\" column=\"\
    NO_OF_SONGS\" />\n        </union-subclass>\n        <union-subclass name=\"VideoDisc_3\"\
    \ table=\"VIDEO_DISC_3\">\n            <property name=\"director\" type=\"java.lang.String\"\
    \ column=\"DIRECTOR\" />\n            <property name=\"language\" type=\"java.lang.String\"\
    \ column=\"LANGUAGE\" />\n        </union-subclass>\n    </class>\n</hibernate-mapping>\n\
    ```\n\nThe superclass `Disc_3` must be declared `abstract=\"true\"`. If you choose\
    \ not to have an abstract superclass, then you need a separate table for the superclass\
    \ properties. The primary key is shared among all the concrete classes in the\
    \ hierarchy. The primary key and inherited properties are mapped with the root\
    \ class element. This way, duplication of inherited properties in each subclass\
    \ isn’t required.\n\nThe concrete class is mapped to a single table the way `AudioDisc_3`\
    \ is mapped to the `AUDIO_DISC_3` table; it inherits the superclass properties\
    \ and the identifier. The concrete class is mapped using the `union-subclass`\
    \ element."
  raw: 'How do you map entities using the table per concrete class strategy? And when
    should you use it?


    Solution


    You can use the table per concrete class strategy two ways:


    • Table per concrete class with implicit polymorphism


    • Table per concrete class with unions


    Using table per concrete class with implicit polymorphism, the table contains
    all the properties of the concrete class and the properties that are inherited
    from its superclasses. All subclasses are mapped as separate entities. You should
    use this strategy when the requirement for polymorphic association or polymorphic
    query is minimal. Another issue with this strategy is that columns are duplicated;
    this can cause maintenance problems because a change to the superclass requires
    you to change multiple tables.


    The mapping is similar to a regular entity, so you don’t work through an example
    of it.


    Using table per concrete class with unions, the superclass can be an abstract
    class or even an interface. The subclasses are mapped using the union-subclass
    element. If the superclass is concrete, an additional table is required to map
    the properties of that class.


    How It Works


    You begin by creating the tables using the following Data Definition Language
    (DDL): CREATE TABLE "BOOK"."AUDIO_DISC_3"


    ( "DISC_ID" BIGINT NOT NULL ,


    "NAME" VARCHAR(250 ) NOT NULL ,


    "PRICE" BIGINT,


    “SINGER" VARCHAR(50),"NO_OF_SONGS" BIGINT,


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    CONSTRAINT "DISC_3_0_PK" PRIMARY KEY ("DISC_ID") )


    CREATE TABLE "BOOK"."VIDEO_DISC_3"


    ( "DISC_ID" BIGINT NOT NULL ,


    "NAME" VARCHAR(250 ) NOT NULL ,


    "PRICE" BIGINT,


    "DIRECTOR" VARCHAR(50),"LANGUAGE" VARCHAR(50),


    CONSTRAINT "DISC_3_1_PK" PRIMARY KEY ("DISC_ID") )


    The Disc, AudioDisc, and VideoDisc classes are as follows:


    public abstract class Disc_3 implements Serializable {


    private static final long *serialVersionUID* = -5119119376751110049L;


    private Long discId;


    private String name;


    private Integer price;


    //getters and setters


    }


    public class AudioDisc3 extends Disc_3 implements Serializable {


    private static final long *serialVersionUID* = -8314602929677976050L;


    private Integer noOfSongs;


    private String singer;


    //getters and setters


    }


    public class VideoDisc_3 extends Disc_3 implements Serializable {


    private static final long *serialVersionUID* = -6857479057343664829L;


    private String director;


    private String language;


    //getters and setters


    }


    Note that the Disc_3 class is an abstract class. The Hibernate mapping file is
    as follows:


    <hibernate-mapping package="com.hibernaterecipes.chapter4.tablePerClassHierarchy">


    <class name="Disc_3" abstract="true">


    <id name="discId" type="long" column="DISC_ID">


    <generator class="native"/>


    </id>


    <property name="name" type="java.lang.String" column="NAME" />


    <property name="price" type="java.lang.Integer" column="PRICE" />


    <union-subclass name="AudioDisc_3" table="AUDIO_DISC_3">


    <property name="singer" type="java.lang.String" column="SINGER" />


    <property name="noOfSongs" type="java.lang.Integer" column="NO_OF_SONGS" />


    </union-subclass>


    <union-subclass name="VideoDisc_3" table="VIDEO_DISC_3">


    <property name="director" type="java.lang.String" column="DIRECTOR" />


    <property name="language" type="java.lang.String" column="LANGUAGE" />


    </union-subclass>


    </class>


    CHAPTER 4 ■ INHERITANCE AND CUSTOM MAPPING


    </hibernate-mapping>


    The superclass Disc_3 must be declared abstract="true”. If you choose not to have
    an abstract superclass, then you need a separate table for the superclass properties.
    The primary key is shared among all the concrete classes in the hierarchy. The
    primary key and inherited properties are mapped with the root class element. This
    way, duplication of inherited properties in each subclass isn’t required.


    The concrete class is mapped to a single table the way AudioDisc_3 is mapped to
    the AUDIO_DISC_3 table; it inherits the superclass properties and the identifier.
    The concrete class is mapped using the union-subclass element.'
  trans: "\n如何使用每个具体类一张表的策略来映射实体？以及何时应该使用这种策略？\n\n解决方案\n\n你可以通过两种方式使用每个具体类一张表的策略：\n\
    \n• 每个具体类一张表，采用隐式多态\n\n• 每个具体类一张表，采用联合\n\n采用隐式多态的每个具体类一张表策略时，表中包含具体类的所有属性以及从其超类继承的属性。所有子类都映射为独立的实体。当对多态关联或多态查询的需求最小时，应使用此策略。该策略的另一个问题是列会被重复；这可能导致维护问题，因为对超类的更改需要你修改多个表。\n\
    \n这种映射与常规实体类似，因此这里不通过示例进行讲解。\n\n采用联合的每个具体类一张表策略时，超类可以是抽象类，甚至可以是接口。子类使用 `union-subclass`\
    \ 元素进行映射。如果超类是具体的，则需要一个额外的表来映射该类的属性。\n\n工作原理\n\n首先，使用以下数据定义语言（DDL）创建表：\n\n```sql\n\
    CREATE TABLE \"BOOK\".\"AUDIO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL ,\n\"NAME\"\
    \ VARCHAR(250 ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"SINGER\" VARCHAR(50),\"NO_OF_SONGS\"\
    \ BIGINT,\nCONSTRAINT \"DISC_3_0_PK\" PRIMARY KEY (\"DISC_ID\") )\n\nCREATE TABLE\
    \ \"BOOK\".\"VIDEO_DISC_3\"\n( \"DISC_ID\" BIGINT NOT NULL ,\n\"NAME\" VARCHAR(250\
    \ ) NOT NULL ,\n\"PRICE\" BIGINT,\n\"DIRECTOR\" VARCHAR(50),\"LANGUAGE\" VARCHAR(50),\n\
    CONSTRAINT \"DISC_3_1_PK\" PRIMARY KEY (\"DISC_ID\") )\n```\n\n`Disc`、`AudioDisc`\
    \ 和 `VideoDisc` 类如下所示：\n\n```java\npublic abstract class Disc_3 implements Serializable\
    \ {\n    private static final long serialVersionUID = -5119119376751110049L;\n\
    \    private Long discId;\n    private String name;\n    private Integer price;\n\
    \    //getters and setters\n}\n\npublic class AudioDisc3 extends Disc_3 implements\
    \ Serializable {\n    private static final long serialVersionUID = -8314602929677976050L;\n\
    \    private Integer noOfSongs;\n    private String singer;\n    //getters and\
    \ setters\n}\n\npublic class VideoDisc_3 extends Disc_3 implements Serializable\
    \ {\n    private static final long serialVersionUID = -6857479057343664829L;\n\
    \    private String director;\n    private String language;\n    //getters and\
    \ setters\n}\n```\n\n请注意，`Disc_3` 类是一个抽象类。Hibernate 映射文件如下：\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter4.tablePerClassHierarchy\">\n    <class\
    \ name=\"Disc_3\" abstract=\"true\">\n        <id name=\"discId\" type=\"long\"\
    \ column=\"DISC_ID\">\n            <generator class=\"native\"/>\n        </id>\n\
    \        <property name=\"name\" type=\"java.lang.String\" column=\"NAME\" />\n\
    \        <property name=\"price\" type=\"java.lang.Integer\" column=\"PRICE\"\
    \ />\n        <union-subclass name=\"AudioDisc_3\" table=\"AUDIO_DISC_3\">\n \
    \           <property name=\"singer\" type=\"java.lang.String\" column=\"SINGER\"\
    \ />\n            <property name=\"noOfSongs\" type=\"java.lang.Integer\" column=\"\
    NO_OF_SONGS\" />\n        </union-subclass>\n        <union-subclass name=\"VideoDisc_3\"\
    \ table=\"VIDEO_DISC_3\">\n            <property name=\"director\" type=\"java.lang.String\"\
    \ column=\"DIRECTOR\" />\n            <property name=\"language\" type=\"java.lang.String\"\
    \ column=\"LANGUAGE\" />\n        </union-subclass>\n    </class>\n</hibernate-mapping>\n\
    ```\n\n超类 `Disc_3` 必须声明为 `abstract=\"true\"`。如果你选择不使用抽象超类，那么你需要一个单独的表来存放超类的属性。主键在层次结构中的所有具体类之间共享。主键和继承的属性使用根类元素进行映射。这样，就不需要在每个子类中重复继承的属性。\n\
    \n具体类映射到单个表，就像 `AudioDisc_3` 映射到 `AUDIO_DISC_3` 表一样；它继承了超类的属性和标识符。具体类使用 `union-subclass`\
    \ 元素进行映射。\n"
- fmt: "# The JPA specifications state that the table per concrete class is optional.\
    \ However, Hibernate provides the implementation. In JPA annotations, you have\
    \ the superclass `Disc` (`Disc_4` in the following case) use the `Inheritance`\
    \ annotation and the `TABLE_PER_CLASS` inheritance type strategy:\n\n```java\n\
    @Entity\n@Inheritance (strategy=InheritanceType.TABLE_PER_CLASS)\npublic abstract\
    \ class Disc_4 implements Serializable {\n    private static final long serialVersionUID\
    \ = 3087285416805917315L;\n    @Id\n    @GeneratedValue (strategy=GenerationType.AUTO)\n\
    \    @Column (name=\"DISC_ID\")\n    private Long discId;\n    @Column (name=\"\
    NAME\")\n    private String name;\n    @Column (name=\"PRICE\")\n    private Integer\
    \ price;\n    //getters and setters\n}\n```\n\nAll the concrete class has to do\
    \ is to declare itself as an `Entity` with the `Entity` annotation:\n\n```java\n\
    @Entity\n@Table (name=\"AUDIO_DISC_4\")\npublic class AudioDisc_4 extends Disc_4\
    \ implements Serializable {\n    private static final long serialVersionUID =\
    \ 8510682776718466795L;\n    @Column (name=\"NO_OF_SONGS\")\n    private Integer\
    \ noOfSongs;\n    @Column (name=\"SINGER\")\n    private String singer;\n    //getters\
    \ and setters\n}\n```\n\nBecause the mapping is table per concrete class, the\
    \ query created is for direct concrete class. If you need a polymorphic querying\
    \ capability, you must make the superclass a persistent class (have a table of\
    \ its own).\n\n## Custom Mappings\n\n### Problem\n\nWhat are the various extensions\
    \ that Hibernate provides to implement custom mapping types? How do you create\
    \ `UserType` custom mapping?\n\n### Solution\n\nHibernate provides an interface\
    \ that you can implement to define your own custom mapping types. The extensions\
    \ are listed in the `org.hibernate.usertype` package and are as follows:\n\n-\
    \ `CompositeUserType`: This user type exposes the internals of the value type\
    \ to Hibernate, which allows you to query for specific internal properties.\n\
    - `EnhancedUserType`: This is used when marshalling of value types to and from\
    \ XML is required. It lets you use the custom type in identifier and discriminator\
    \ mappings.\n- `LoggableUserType`: This type is used when you want custom logging\
    \ of the corresponding value types.\n- `ParameterizedType`: You can set parameters\
    \ for a type by using a nested type element for the property element in the mapping\
    \ file or by defining a `typedef`.\n- `UserCollectionType`: Use this type when\
    \ you want to implement a custom collection mapping type and when you have to\
    \ persist a non-JDK type collection.\n- `UserType`: This is a basic extension\
    \ point. It provides a basic framework to implement custom loading and storing\
    \ of value type instances.\n- `UserVersionType`: This type is used for a version\
    \ property.\n\n### How It Works\n\nLet’s say your object model has a phone object.\
