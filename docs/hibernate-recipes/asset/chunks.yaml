    **Transaction tx = null;**


    **try {**


    **tx = session.beginTransaction();**


    **BookCh2 book = new BookCh2();**


    **book.setName("Hibernate Recipes Book ");**


    **book.setPrice(200);**


    **book.setPublishDate(new Date());**


    **session.saveOrUpdate(book);**


    **tx.commit();**


    ****} catch (RuntimeException e) {**


    **try{**


    **if(tx != null)**


    **{**


    **tx.rollback();**


    **}**


    **}catch(RuntimeException ex)**


    **{**


    **log.error("Cannot rollback transaction");**


    **}**


    **throw e;**


    **} finally {**


    **session.close();**


    **}**


    **The **session** is provided by the **sessionFactory.openSession()** call. A
    database connection isn’t opened when the session is created; this keeps the session
    creation a non-expensive task. The database connection is retrieved from the connection
    pool when the call **session.beginTransaction()** is made, and all queries are
    executed using this connection. The entities to be persisted are cached in the
    persistent context of the session. The **commit()** on the **Transaction** flushes
    the persistent context and completes the save of the entities. Another **Transaction**
    can be opened after the current **Transaction** is committed. Then, a new connection
    is provided by the connection pool. All resources and connections are release
    when **close()** is called on the **Session**.


    The exceptions thrown by Hibernate are **RuntimeExceptions** and subtypes of **RuntimeExceptions**.


    These exceptions are fatal, and hence you have to roll back your transactions.
    Because rolling back a transaction can also throw an exception, you have to call
    the **rollback** method within a **try/catch** block.


    In JPA, you have to define the same configurations as for Hibernate, and the EntityTransaction
    API is used to manage transactions:


    ****EntityManager manager = null;**


    **EntityTransaction tx = null;**


    **try {**


    **EntityManagerFactory managerFactory =**


    **Persistence.createEntityManagerFactory("book");**


    **manager = managerFactory.createEntityManager();**


    **tx = manager.getTransaction();**


    **tx.begin();**


    **BookCh2 newBook = new BookCh2();**


    CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY


    **newBook.setBookName("Hibernate Recipes Phase1");**


    **newBook.setPublishDate(new Date());**


    **newBook.setPrice(new Long(50));**


    **manager.persist(newBook);**


    **tx.commit();**


    **log.debug("Transaction committed");**


    **}catch (RuntimeException e)**


    **{**


    **try**


    **{**


    **if(tx != null)**


    **{**


    **tx.rollback();**


    **}**


    **}catch(RuntimeException ex)**


    **{**


    **log.error("Cannot rollback transaction");**


    **}**


    ****throw e;**


    **} finally**


    **{**


    **manager.close();**


    **}**


    ****getTransaction()** is called on the EntityManager to get a transaction. The
    actual connection is requested from the pool with the transaction’s **begin()**
    method. The **commit()** on the transaction flushes the persistent context and
    completes the save of the entities. The EntityManager’s **close()** method is
    called in the **finally** block to make sure the session is closed even in the
    case of an exception.


    13.2 Using Programmatic Transactions with JTA


    Problem


    Suppose you’re using an application server that provides support to manage resources.
    Application servers like WebLogic, WebSphere, and JBoss can provide connections
    from a connection pool and manage transactions. How do you achieve programmatic
    transaction demarcation using the Java Transaction API (JTA)?


