    10.2 处理持久化对象


    问题


    如何创建一个持久化对象？如何对其执行 CRUD 操作？


    解决方案


    **Session** 接口提供了对实体执行 CRUD 操作的方法，使其成为持久化对象。


    **工作原理


    让我们先看看如何创建一个持久化对象，然后对其执行其他操作。


    创建持久化对象


    在 Hibernate 中，你需要从应用程序的会话工厂中获取一个会话实例。会话是事务的工厂，并跟踪其范围内对象的所有更改。会话工厂是单个数据库已编译映射的不可变缓存；它是提供会话实例的工厂。因此，如果你的应用程序与两个数据库交互，你需要配置两个独立的会话工厂。


    以下是在 Hibernate 中的实现方式：


    ****sessionFactory = new Configuration().configure().buildSessionFactory();**


    **Session hibernateSession = sessionFactory.openSession();**


    **这段代码的第一行会在其路径中查找 **hibernate.cfg.xml** 文件。它会编译并加载该文件中列出的映射。创建会话工厂是一项昂贵的任务，因此你应该只创建一次——最好在应用程序启动时进行。创建会话相对廉价；它甚至不会打开数据库连接。


    让我们创建持久化对象：


    **Transaction tx = session.beginTransaction();


    **Book book = new Book();**


    **book.setName("Book Name - hibernate ");**


    **book.setPrice(79);**


    **book.setPublishDate(new Date());**


    Serializable bookId = session.save(book);


    tx.commit();


    session.close();


    **在第一行，从会话中获取了一个 **Transaction** 实例。默认情况下，会话提供 Java 数据库连接 (JDBC) 事务。会话可以提供的另外两种可能的事务类型是
    Java 事务 API (JTA) 和容器管理事务。要让会话提供这两种类型中的任何一种，你需要在 **hibernate.cfg.xml** 文件中声明 **hibernate.transaction_factory**
    属性。


    接下来的几行使用 **new** 关键字创建了一个临时的 **book** 对象。通过调用 **save()** 方法，你将临时对象变为持久化对象。然后，**book**
    对象与会话及其持久化上下文关联。请注意，直到此时，尚未创建数据库记录。


    **save()** 方法返回新插入记录的主键。只有对事务调用 **commit()** 时，才会创建数据库连接并将记录插入数据库。最后一行关闭会话，这意味着其持久化上下文不再活动。**book**
    对象现在处于脱管状态。


    接下来，这是在 JPA 中的实现方式：


    ****EntityManagerFactory managerFactory = Persistence.createEntityManagerFactory("book");**
    **EntityManager manager = managerFactory.createEntityManager();**


    **在 JPA 中，你使用 **javax.persistence.Persistence** 类的 **createEntityManagerFactory()**
    方法来获取 **EntityManagerFactory** 类的实例。此方法调用会在 **META-INF** 文件夹中查找 **persistence.xml**
    文件。**EntityManagerFactory** 类似于 Hibernate 的 **sessionFactory** 类；它为你提供一个 EntityManager。EntityManager
    拥有一个新的持久化上下文，用于保存和加载对象：


    ****Book newBook = new Book();**


    **newBook.setBookName("HIbernate Recipes Phase1");**


    **newBook.setPublishDate(new Date());**


    **newBook.setPrice(50l);**


    EntityTransaction tran = manager.getTransaction();


    tran.begin();


    manager.persist(book);


    tran.commit();


    manager.close();


    **在 JPA 中，EntityManager 取代了会话：它是一个提供事务（此处为 **EntityTransaction**）的工厂。**save()**
    方法被 **persist()** 方法取代，后者将 **book** 对象从临时状态转变为持久化状态。调用 **persist()** 方法后，**book**
    对象的状态由持久化上下文管理。请注意，**persist()** 不会返回新创建记录的可序列化 ID。


    检索持久化对象


    在 Hibernate 中，你需要一个会话实例来通过 ID 检索实体。Hibernate 为此提供了两种方法：**get()** 和 **load()**。这两种方法都将实体类和
    ID 作为输入参数：


    ****Session session = getSession();**


    **Transaction tx = session.beginTransaction();**


    //Book book = (Book) session.load(Book.class, new Long(294912));


    Book book1 = (Book) session.get(Book.class, new Long(294912));


    **tx.commit();**


    **session.close();**


    **System.out.println(book1);**


    **get()** 方法会调用数据库并查找主键。如果找到主键，它会检索并返回该对象。如果找不到，则返回 **null**。


    另一方面，**load()** 方法会在当前持久化上下文中查找。如果它能找到该实体，则返回实体对象。如果该对象不在当前持久化上下文中管理，则会返回一个代理占位符，而不会访问数据库。这意味着，如果你请求一个数据库中不存在的实体对象（或者当然，也不在当前持久化上下文中），那么
    **load()** 方法会返回一个代理。当你尝试在同一持久化上下文中读取/检索除主键之外的属性时，会得到一个 **org.hibernate.ObjectNotFoundException**；当你尝试在会话关闭后（持久化上下文已结束）读取/检索属性时，会得到一个
    **org.hibernate.LazyInitializationException**。当你只需要一个代理且无需进行数据库调用时，**load()**
    方法非常有用。当你需要在给定的持久化上下文中，在持久化之前关联一个实体时，你只需要一个代理。


    在 JPA 中，你使用 EntityManager 来读取/检索持久化实体。JPA 提供了两种方法：**find()** 和 **getReference()**。这两种方法都将实体类和
    ID 作为输入参数：


    ****EntityManager manager = SessionManager.getEntityManager();**


    **EntityTransaction tran = manager.getTransaction();**


    **tran.begin();**


    Book book = manager.find(Book.class, new Long(294912));


    //Book book1 = manager.getReference(Book.class, new Long(294912));


    **tran.commit();**


    **manager.close();**


    **find()** 方法类似于 Hibernate 中的 **get()** 方法。调用此方法时会进行数据库调用。如果找不到持久化实体，**find()**
    方法返回 **null**。请注意，你没有对 **find()** 方法的返回值进行强制类型转换。这不是必需的，因为 **find()** 是一个泛型方法，并且第一个参数被设置为返回类型。


    **getReference()** 方法类似于 Hibernate 中的 **load()** 方法。当你只需要一个代理时，应该使用它。


