    \ (name=\"bkch2\")`\n\n`@Table (name=\"BOOK7_1\", schema=\"BOOKSHOP\")`\n\n`public\
    \ class Book7_1 {`\n\n## CHAPTER 7 ■ MANY-VALUED ASSOCIATIONS\n\n`@Id`\n\n`@GeneratedValue\
    \ (strategy=GenerationType.TABLE)`\n\n`@Column (name=\"BOOK_ID\")`\n\n`private\
