    **.append(endDate)**


    **.toHashCode();**


    **}**


    **}**


    总结


    在本章中，你学习了通过将值类型用作组件来实现更细粒度对象模型的方法。你实际上创建了一个用于应用程序的对象图，但在数据库中它仅表示为表中的一条记录。你还了解了通过使用简单的
    **value** 类型来弥合关系模型与对象模型之间差距的方法。你学习了如何在其他组件中嵌套组件，以及如何在组件中添加父引用。此外，你还看到了如何在实体中映射组件集合，以及如何将组件用作
    **java.util.Map** 的键。


    **第 4 章**


    ■ ■ ■


    **继承与自定义映射**


    实体支持继承、多态关联和多态查询。JPA 规范指出，具体类和抽象类都可以作为实体，并可以使用 Entity 注解进行映射。非实体类和实体类可以相互继承。Hibernate
    提供了 MappedSuperClass 注解（@MappedSuperclass）来实现继承映射，并允许你映射抽象或具体的实体子类。映射的超类没有自己独立的表。


    Hibernate 提供了四种映射继承层次结构的策略：


    • *每个类层次结构一张表：* 整个类层次结构表示在一张表中。使用一个鉴别器列来标识类型和子类。


    • *每个子类一张表：* 超类有一张表，每个子类也有一张表，该表仅包含未继承的属性：子类表的主键是超类表的外键。

