- fmt: "# Basic Mapping and Object Identity\n\nA primary key in a database table is\
    \ used to uniquely identify a record in that table. The primary key value can’t\
    \ be null and is unique within a table. The primary key is also used to establish\
    \ a relationship between two tables—it’s defined as a foreign key in the associated\
    \ table. Because the primary key is used to identify a particular record, it can\
    \ also be called the *database identifier*. The database identifier is exposed\
    \ to the application by Hibernate through an identifier property of the persistent\
    \ entity. This chapter discusses the various ways to generate an identifier (primary\
    \ key) for a database record. You learn about metadata configurations and their\
    \ effect on the persistence mechanism.\n\n## 2.1 Providing an ID for Persistence\n\
    \n### Problem\n\nHow do you generate an identifier for a database entity? What\
    \ are the possible strategies?\n\n### Solution\n\nAn `id` element (`<id>`) is\
    \ used to create a mapping in the Hibernate XML file. The `id` element has attributes\
    \ such as `column`, `type`, and `generator` that you use to generate the identifier.\
    \ The JPA specification requires that every entity must have a primary key. From\
    \ JPA’s perspective, an `@id` is used to define how an identifier is generated.\n\
    \nWhen you use inheritance mapping, more than one class can be mapped to a table.\
    \ These classes (subclass and superclass) are said to be in an *entity hierarchy*.\
    \ The primary key must be defined exactly once in an entity hierarchy, either\
    \ on the entity that is the root of the entity hierarchy or on a mapped superclass\
    \ of the entity hierarchy. Attributes such as `@GeneratedValue` and `@column`\
    \ are used to define column mapping and strategy.\n\n### How It Works\n\nYou need\
    \ to ask Hibernate to generate this ID for you before persisting to the database.\
    \ Hibernate provides many built-in strategies for ID generation:\n\n- Database\
    \ sequence\n- Native generator\n- Increment generator\n- Hilo generator\n\nSome\
    \ of them are available only for specified databases; for instance, the sequence\
    \ strategy isn’t supported in MYSQL but is provided by Oracle.\n\nJPA also provides\
    \ a way to generate identifiers.\n\n#### Hibernate XML Mapping\n\nWe'll look at\
    \ each of these strategies in turn, starting with the database sequence. For this\
    \ section, we'll insert three books into the database. Below is the `Launch` class\
    \ used to insert records into the `Book` table:\n\n```java\npackage com.hibernaterecipes.chapter2;\n\
