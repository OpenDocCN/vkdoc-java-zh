    Summary


    In this chapter, you’ve seen how to represent and work with many-to-one and one-to-one
    associations using Hibernate. For a many-to-one association, you define the **<many-to-one>**
    mapping element in the class that has the many side of the relationship. In the
    case where there can be null foreign key values, you use a join table to map between
    the two dependent objects; the join table contains IDs of both the dependent objects.


    You learned that you can use lazy initialization to increase performance: the
    data of the dependent object is retrieved from the database only on demand. You
    also learned that shared primary keys are used when rows in two tables are related
    by a primary key association.


    You saw how to map a one-to-one association with a **<many-to-one>** element and
    then have a unique constraint on the one relationship. A one-to-one association
    can also be mapped using a join table.


    **C H A P T E R 6**


    ■ ■ ■


    **Collection Mapping**


    An object of **value** type has no database identity, and objects of **value**
    type are dependent on the owning entity object. The lifespan of the **value**
    type is bound by the lifespan of the owning entity. Entities that have a collection
    of **value** types need to be mapped to an appropriate collection interface from
    the Java API. For entities to have a collection of **value** types, you need to
    have a separate table with the entity’s primary key as a foreign key.


    Hibernate supports most of the collection interfaces provided by Java API. It’s
    recommended that you use the collection interface to declare the type of the property
    and a matching implementation.


    Hibernate suggests using interfaces to declare collections because it supports
    Java collection, maps, and arrays; it has a **<set>** tag to support for all **java.util.Set**
    collections and **<bag>** or **<idbag>** to support **java.util.Collection**.
    You should initialize the implementation at the time of declaration to avoid uninitialized
    collections. The following code declares **chapters** to be type **java.util.Set**
    (which is an interface) and the matching implementation as **java.util.HashSet**:


    **Private Set<String> chapters = new HashSet<String>();**


    This chapter shows you how to map collections for **value** types. In Hibernate,
    collections can be lazily initialized, which means the state of the collection
    objects is loaded from the database only when the application needs it. This initialization
    is done transparently from the user. The chapter also deals with sorting collections
    in memory and at database level. You add a collection of chapters to your **Book**
    class as an example.


    6.1 Mapping a Set


    Problem


    How do you map **value** types as collections of type **java.util.Set**?


    Solution


    The **<set>** mapping is the most common collection mapping that is used. You
    use the **<set>** element to map for **java.util.Set**. The property should be
    initialized to **HashSet**. The implementation doesn’t allow duplicate elements,
    and the order of the elements isn’t retained.


