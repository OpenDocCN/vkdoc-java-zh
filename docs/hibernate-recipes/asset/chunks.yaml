    ## 总结


    现在你已经很好地理解了持久化生命周期以及对象在其生命周期中可以拥有的状态。当处理分离对象时，你可以重新附加或合并该对象。


    你应该能够使用动态数据过滤来提供安全性或访问时间/区域数据。


    你还学会了使用拦截器来持久化公共属性，例如创建日期和创建者。


