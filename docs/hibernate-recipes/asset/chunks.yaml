    **HQL and JPA Query Language**


    When you use JDBC to access databases, you write SQL statements for the query
    and update tasks. In such cases, you’re dealing with tables, columns, and joins.
    When you use Hibernate, most update tasks can be accomplished through the APIs
    provided by Hibernate. However, you still need to use a query language for the
    query tasks. Hibernate provides a powerful query language called Hibernate Query
    Language (HQL).


    HQL is database independent and translated into SQL by Hibernate at runtime. When
    you write HQL, you can concentrate on the objects and properties without knowing
    much detail about the underlying database. You can treat HQL as an object-oriented
    variant of SQL.


    In this chapter, you see how to query the database using HQL and JPA Query Language
    (JPA QL).


    Hibernate basically provides three ways to query a database:


    • HQL and JPA QL, which is a subset of HQL


    • Criteria API (Criteria and Example)


    • Direct SQL


    This chapter looks at HQL, JPA QL, and Direct SQL. You see how to form a query,
    bind parameters (named and position), and execute the query. You learn how to
    manipulate the result, which can help you deal with large result sets. You also
    query associated objects.


    8.1 Using the Query Object


    Problem


    How do you create a **Query** object in hibernate? How do you enable pagination?
    What are the various ways to bind parameters to a query?


    Solution


    A **Query** is an object-oriented representation of an actual query. The Hibernate
    interface **org.hibernate.Query** and the JPA interface **javax.persistence.Query**
    provide methods to control the execution of a query and bind values to query parameters.
    In Hibernate, you can obtain an instance of the **Query** object by calling **Session.createQuery()**.
    And in JPA, the EntityManager provide an instance of the **Query** object with
    a call like **EntityManager.createQuery()**.


