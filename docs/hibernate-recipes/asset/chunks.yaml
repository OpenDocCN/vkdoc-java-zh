    Configuring the Connection Pool


    In previous recipes, you established a database connection each time a session
    was created and closed it at the end of the session. Because creating a physical
    database connection is very time consuming, you should use a connection pool to
    reuse your connections, especially for a multiuser environment.


    As a web application server, Tomcat supports connection pooling. To configure
    a connection pool in Tomcat, you need to first copy the following JDBC driver
    to the **${Tomcat_Install_Dir}/common/lib** directory:


    ****${Hsqldb_Install_Dir}/lib/hsqldb.jar**


    **After the first launch of Tomcat from WTP, a new project called **Servers**
    is created. You can modify the settings there for your Tomcat runtime. Open the
    **server.xml** configuration file, and locate the context **BookShopWeb**. You
    create a connection pool for this context by adding the following resource definition
    inside the **<Context>** node:


    ****<Resource name="jdbc/BookShopDB"**


    **type="javax.sql.DataSource"**


    **driverClassName="org.hsqldb.jdbcDriver"**


    [**url="jdbc:hsqldb:hsql://localhost/BookShopDB"**](hsql://localhost/BookShopDB)


    **username="sa"**


    **password=""**


    **maxActive="5"**


    **maxIdle="2" />**


    **Now the connection pool is ready to be used. You modify the **hibernate.cfg.xml**
    file to use this connection pool instead of creating a database connection each
    time. For the **connection.datasource** property, you provide the Java Naming
    and Directory Interface (JNDI) name of the connection pool configured with Tomcat.
    Also notice that you need to add the namespace **java:/comp/env/** to the JNDI
    name:


    ****<hibernate-configuration>**


    **<session-factory>**


    **<property name="connection.driver_class">org.hsqldb.jdbcDriver</property>**


    [**<property name="connection.url">jdbc:hsqldb:hsql://localhost/BookShopDB</property>**](hsql://localhost/BookShopDB%3C/property)


    **<property name="connection.username">sa</property>**


    **<property name="connection.password"></property>**


    <property name="connection.datasource">java:/comp/env/jdbc/BookShopDB</property>


    **<property name="dialect">org.hibernate.dialect.HSQLDialect</property>**


    **...**


    **</session-factory>**


    **</hibernate-configuration>**


