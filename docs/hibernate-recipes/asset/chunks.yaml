    Problems with Using JDBC


    Using JDBC means you can execute any kind of SQL statements. For a simple task,
    you have to code many **SELECT**, **INSERT**, **UPDATE**, and **DELETE** statements
    repeatedly. This results in the following issues:


    • *Too much copy code:* When you perform object retrieval, you need to copy the
    fields in a **ResultSet** to the properties of an object. When you perform object
    persistence, you need to copy the properties of an object to the parameters in


    **PreparedStatement**.


    • *Manually handled associations:* When you perform object retrieval, you have
    to perform a table join or read from several tables to get an object graph. When
    you perform object persistence, you must update several tables accordingly.


    • *Database dependent:* The SQL statements you wrote for one database may not
    work with another brand of database. Although the chance is very small, you may


    have to migrate to another database.


    1.3 Configuring Hibernate


    Problem


    How do you configure a Java project that uses an object/relational framework like
    Hibernate as a persistence framework? How do you configure Hibernate programmatically?


    Solution


    Hibernate is a powerful ORM framework for developing Java applications. You need
    to import the required jars into your project’s classpath and create mapping files
    that map the state of a Java entity to the columns of its corresponding table.
    From your Java application, you execute CRUD operations on the object entities.
    Hibernate takes care of translating the object state from the object model to
    the relational model.


    How It Works


    To configure a Java project to use Hibernate framework, you need to start with
    downloading the required jars and configuring them in the build path.


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    Getting the Required Jars


    You can go to [**www.hibernate.org/**](http://www.hibernate.org) and download
    Hibernate Core 3.3.2\. After you download the compressed Hibernate distribution,
    extract it to a directory such as **C:\hibernate**. In Eclipse, go to Windows
     Preferences  Java  Build Path  User Libraries, add a custom library named
    **Hibernate**, and add the following jars to it:


    ****${Hibernate_Install_Dir}/hibernate3.jar**


    **${Hibernate_Install_Dir}/lib/antlr.jar**


    **${Hibernate_Install_Dir}/lib/asm.jar**


    **${Hibernate_Install_Dir}/lib/asm-attrs.jars**


    **${Hibernate_Install_Dir}/lib/cglib.jar**


    **${Hibernate_Install_Dir}/lib/commons-collections.jar**


    **${Hibernate_Install_Dir}/lib/commons-logging.jar**


    **${Hibernate_Install_Dir}/lib/dom4j.jar**


    **${Hibernate_Install_Dir}/lib/ehcache.jar**


    **${Hibernate_Install_Dir}/lib/jta.jar**


    **${Hibernate_Install_Dir}/lib/log4j.jar**


    **Defining a custom library this way makes it easy to reuse in another project.
    If you have another project that uses Hibernate, you can import this user library
    into that project. Follow these steps to add this user library to a project’s
    build path:


    1\. Right-click your project in Eclipse.


    2\. Select BuildPath  Configure Build Path  Libraries tab.


    3\. Click the Add Library button.


    4\. Select User Library, and click Next.


    5\. Select Hibernate, and click Finish.


    The custom library is now configured to your project’s build path.


    Creating Mapping Definitions


    First, you ask Hibernate to retrieve and persist the book objects for you. For
    simplicity, let’s ignore the publisher and chapters at this moment. You create
    an XML file **Book.hbm.xml** in the same package as the **Book** class. This file
    is called the *mapping definition* for the **Book** class. The **Book** objects
    are called *persistent objects* or *entities* because they can be persisted in
    a database and represent the real-world entities:


    ****<?xml version="1.0" encoding="UTF-8"?>**


    **<!DOCTYPE hibernate-mapping PUBLIC**


