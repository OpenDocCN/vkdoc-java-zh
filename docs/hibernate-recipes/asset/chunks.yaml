  raw: 'You can also sort a collection at the query level using the **order-by** clause.
    If your collection is very large, it’s more efficient to sort it in the database.
    You can specify the **order-by** condition to sort this collection upon retrieval.
    Notice that the **order-by** attribute should be a SQL column, not a property
    name in Hibernate.


    CHAPTER 6 ■ COLLECTION MAPPING


    How It Works


    We''ll see a number of ways to sort a collection, starting with the natural order.


    Using the Natural Order


    To sort a collection in natural order, you define the **sort** attribute to be
    **natural** in the collection.


    Hibernate uses the **compareTo()** method defined in the **java.lang.Comparable**
    interface to compare the elements. Many basic data types, such as **String**,
    **Integer**, and **Double** implement this interface.


    The implementation for **chapters** is changed from **HashSet** to **TreeSet**.
    In the case of a **Map**, the implementation class needs to be changed to **TreeMap**:


    **public class Book6_1 implements Serializable{**


    ****private Long book_id;**


    **private String isbn;**


    **private String name;**


    **private Date publishDate;**


    **private Integer price;**


    private Set chapters = new TreeSet();


    **//getters and setters**


    **}**


    **In the Hibernate mapping file, the attribute **sort** is defined as **natural**:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter6">**


    **<class name="Book6_1" table="Book6_1" schema="BOOK6">**


    **<id name="book_id" type="long" column="BOOK_ID" >**


    **<generator class="native">**


    **</generator>**


    **</id>**


    **<property name="isbn" type="string">**


    **<column name="ISBN" length="50" not-null="true" unique="true" />**


    **</property>**


    **<property name="name" type="string">**


    **<column name="BOOK_NAME" length="100" not-null="true" />**


    **</property>**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="int" column="PRICE" />**


    <set name="chapters" table="Book61_Chapter" schema="BOOK6" sort="natural" lazy="false">


    <key column="BOOK_ID"></key>


    <element type="string" column="CHAPTER_NAME" not-null="true"></element>


    </set>


    **</class>**


    **</hibernate-mapping>**


    **In the JPA mapping file, you need to change the implementation to **TreeSet**
    and declare the annotation **sort** as **natural**. Also note that you disable
    lazy initialization. (Lazy initialization is discussed later in this chapter.)


    **129


    CHAPTER 6 ■ COLLECTION MAPPING


    **@Entity**


    **@Table (name="BOOK6_1", schema="BOOK6")**


    **public class Book_6_1 implements Serializable{**


    **@Id**


    **@Column (name="BOOK_ID")**


    **@GeneratedValue (strategy=GenerationType.AUTO)**


    **private Long book_id;**


    **@Column (name="isbn")**


    **private String isbn;**


    **@Column (name="BOOK_NAME")**


    **private String name;**


    **@Column (name="price")**


    **private Integer price;**


    @CollectionOfElements (targetElement=java.lang.String.class)


    @JoinTable(


    name="Book61_Chapter",


    schema="BOOK6",


    joinColumns=@JoinColumn(name="BOOK_ID")


    )


    @Column(name="chapter_name")


    @Sort (type=SortType.NATURAL)


    @LazyCollection (LazyCollectionOption.FALSE)


    private Set chapters = new TreeSet();


    **//getters and setters**


    **}**


    Writing Your Own Comparator


    If you aren’t satisfied with the natural ordering, you can write your own comparator
    instead by implementing the **java.util.Comparator** interface. The comparing
    logic should be put inside the overridden **compare()** method. To use this comparator,
    you pass it to the collection’s **sort** attribute. The following is a sample
    implementation of the comparator:


    **public class ChapterComparator implements Comparator<String> {**


    ****public int compare(String o1, String o2) {**


    **// if o1 and o2 don''t instantiate the same class, throw an exception**


    **// if o1 is less than o2, return a negative number**


    **// if o1 is equal to o2, return a zero**


    **// if o1 is greater than o2, return a positive number**


    **if(o1.compareTo(o2)<1)**


    **{**


    **return 1;**


    **}else**


    **{**


    **return -1;**


    **}**


    **}**


    **}**


    CHAPTER 6 ■ COLLECTION MAPPING'
