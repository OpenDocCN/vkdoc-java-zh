    \n`chapters`的实现从`HashSet`更改为`TreeSet`。对于`Map`，实现类需要更改为`TreeMap`：\n\n```java\n\
    public class Book6_1 implements Serializable {\n    private Long book_id;\n  \
    \  private String isbn;\n    private String name;\n    private Date publishDate;\n\
    \    private Integer price;\n    private Set chapters = new TreeSet();\n    //getters\
    \ and setters\n}\n```\n\n在Hibernate映射文件中，属性`sort`被定义为`natural`：\n\n```xml\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter6\">\n    <class name=\"Book6_1\" table=\"\
    Book6_1\" schema=\"BOOK6\">\n        <id name=\"book_id\" type=\"long\" column=\"\
    BOOK_ID\" >\n            <generator class=\"native\">\n            </generator>\n\
