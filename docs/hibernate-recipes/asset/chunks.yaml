- fmt: "### 5.3 Using Lazy Initialization on Many-to-One Associations\n\n#### Problem\n\
    \nIn an association between two entities in an ORM framework, when the data of\
    \ one entity is loaded from the database, the data of the dependent entity may\
    \ be fetched along with it or loaded on demand.\n\nFor example, in the case of\
    \ `Book` and `Publisher`, the `BOOK` table has the foreign key column `Publisher_Id`.\
    \ If `Book` details are fetched from the database, should the `Publisher` details\
    \ be loaded along with them, or should the `Publisher` details be retrieved only\
    \ when you explicitly fetch them? When the dependent object’s details are loaded\
    \ only on demand, they’re said to be *lazily loaded*. By lazily loading data,\
    \ you can improve performance, because unnecessary queries aren’t executed.\n\n\
    How is lazy initialization achieved in Hibernate? How effect does it have when\
    \ you’re retrieving an object graph? And what are the ways to deal with it?\n\n\
    #### Solution\n\nEnabling lazy initialization defines what objects are available\
    \ on the detached object. It’s defined with the keyword `lazy`, which is different\
    \ from the keyword `fetch`. The keyword `fetch` is used to define fetching strategies\
    \ for tuning performance.\n\nHibernate provides lazy initialization of collections,\
    \ associations, and even properties or value types. You learn about lazy initialization\
    \ of collections in the next chapter. The value types of an entity can also be\
    \ lazy initialized, but it’s usually not required; it can be used with databases\
    \ that have hundreds of columns.\n\n#### How It Works\n\nSuppose you have a method\
    \ for retrieving a `Book` object given its `ID`. Because you added the `<many-to-one>`\
    \ mapping, the `Publisher` object related to the `Book` should be retrieved at\
    \ the same time:\n\n```\nSession session = factory.openSession();\ntry {\n   \
    \ Book book = (Book) session.get(Book.class, id);\n    return book;\n} finally\
    \ {\n    session.close();\n}\n```\n\nBut when you access the `Publisher` object\
    \ through `book.getPublisher()` outside this method, an exception occurs:\n\n\
    ```\nSystem.out.println(book.getName());\nSystem.out.println(book.getPublisher().getName());\n\
    ```\n\nIf you put the access code inside the `try` block of the method body, everything\
    \ is OK. What’s the reason for this exception? It happens because Hibernate doesn’t\
    \ load your `Publisher` object from the database until you first access the `Publisher`\
    \ before the `session` is closed. This lazy initialization can avoid unnecessary\
    \ database queries and thus enhance performance. Because the `Publisher` is first\
    \ accessed outside the `session` (which has been closed), an exception is thrown.\n\
    \nIf you want the `Publisher` object to be accessed from outside the `session`,\
    \ there are two possible solutions. One is to initialize the `Publisher` explicitly\
    \ by calling the method `Hibernate.initialize()`. Doing so forces the `Publisher`\
    \ object to be loaded from the database:\n\n```\nSession session = factory.openSession();\n\
    try {\n    Book book = (Book) session.get(Book.class, id);\n    Hibernate.initialize(book.getPublisher());\n\
    \    return book;\n} finally {\n    session.close();\n}\n```\n\nAnother solution\
    \ is to turn off lazy initialization for this association. Doing so may decrease\
    \ performance because the `Publisher` object is loaded together with the `Book`\
    \ object every time:\n\n```\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\"\
    >\n    <class name=\"Book_5_1\" table=\"Book\" schema=\"BOOK5\">\n        .\n\
    \        .\n        .\n        .\n        .\n        <many-to-one name=\"publisher\"\
    \ class=\"Publisher\" column=\"PUBLISHER_ID\"\n                     cascade=\"\
    save-update\" lazy=\"false\" />\n    </class>\n</hibernate-mapping>\n```\n\n###\
    \ 5.4 Sharing Primary Key Associations\n\n#### Problem\n\nIn what scenarios do\
    \ you need to share the primary key, and how do you map it?\n\n#### Solution"
  raw: '5.3 Using Lazy Initialization on Many-to-One Associations


    Problem


    In an association between two entities in an ORM framework, when the data of one
    entity is loaded from the database, the data of the dependent entity may be fetched
    along with it or loaded on demand.


    For example, in the case of **Book** and **Publisher**, the **BOOK** table has
    the foreign key column **Publisher_Id**. If **Book** details are fetched from
    the database, should the **Publisher** details be loaded along with them, or should
    the **Publisher** details be retrieved only when you explicitly fetch them? When
    the dependent object’s details are loaded only on demand, they’re said to be *lazily
    loaded*. By lazily loading data, you can improve performance, because unnecessary
    queries aren’t executed.


    How is lazy initialization achieved in Hibernate? How effect does it have when
    you’re retrieving an object graph? And what are the ways to deal with it?


    Solution


    Enabling lazy initialization defines what objects are available on the detached
    object. It’s defined with the keyword **lazy**, which is different from the keyword
    **fetch**. The keyword **fetch** is used to define fetching strategies for tuning
    performance.


    Hibernate provides lazy initialization of collections, associations, and even
    properties or value types. You learn about lazy initialization of collections
    in the next chapter. The value types of an entity can also be lazy initialized,
    but it’s usually not required; it can be used with databases that have hundreds
    of columns.


    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    How It Works


    Suppose you have a method for retrieving a **Book** object given its **ID**. Because
    you added the **<many-to-one>** mapping, the **Publisher** object related to the
    **Book** should be retrieved at the same time: **Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    **return book;**


    **} finally {**


    **session.close();**


    **}**


    **But when you access the **Publisher** object through **book.getPublisher()**
    outside this method, an exception occurs:


    ****System.out.println(book.getName());**


    **System.out.println(book.getPublisher().getName());**


    **If you put the access code inside the **try** block of the method body, everything
    is OK. What’s the reason for this exception? It happens because Hibernate doesn’t
    load your **Publisher** object from the database until you first access the **Publisher**
    before the **session** is closed. This lazy initialization can avoid unnecessary
    database queries and thus enhance performance. Because the **Publisher** is first
    accessed outside the **session** (which has been closed), an exception is thrown.


    If you want the **Publisher** object to be accessed from outside the **session**,
    there are two possible solutions. One is to initialize the **Publisher** explicitly
    by calling the method **Hibernate.initialize()**.


    Doing so forces the **Publisher** object to be loaded from the database:


    ****Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    **Hibernate.initialize(book.getPublisher());**


    **return book;**


    **} finally {**


    **session.close();**


    **}**


    **Another solution is to turn off lazy initialization for this association. Doing
    so may decrease performance because the **Publisher** object is loaded together
    with the **Book** object every time:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Book_5_1" table="Book" schema="BOOK5">**


    **.**


    **.**


    **.**


    **.**


    **.**


    <many-to-one name="publisher" class="Publisher" column="PUBLISHER_ID"


    cascade="save-update" lazy="false" />


    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    ********</class>**


    **</hibernate-mapping>**


    5.4 Sharing Primary Key Associations


    Problem


    In what scenarios do you need to share the primary key, and how do you map it?


    Solution'
  trans: '

    5.3 在多对一关联中使用懒加载


    问题


    在 ORM 框架中两个实体之间的关联里，当从数据库加载一个实体的数据时，依赖实体的数据可能会被一并获取，也可能按需加载。


    例如，在**图书**和**出版社**的案例中，**图书**表包含外键列**出版社 ID**。如果从数据库获取**图书**详情，是否应该同时加载**出版社**详情？还是只在显式获取时才检索**出版社**详情？当依赖对象的详情仅在需要时加载，这被称为*懒加载*。通过懒加载数据，可以提升性能，因为不必要的查询不会被执行。


    Hibernate 是如何实现懒加载的？在检索对象图时它有什么影响？又有哪些处理方式？


    解决方案


    启用懒加载定义了在脱管对象上哪些对象是可用的。它通过关键字**lazy**来定义，这与关键字**fetch**不同。关键字**fetch**用于定义获取策略以优化性能。


    Hibernate 提供了对集合、关联、甚至属性或值类型的懒加载。你将在下一章学习集合的懒加载。实体的值类型也可以懒加载，但通常不需要；它可用于拥有数百列数据的数据库。


    第五章 ■ 多对一和一对一映射


    工作原理


    假设你有一个根据**ID**检索**图书**对象的方法。因为你添加了**<many-to-one>**映射，与**图书**相关的**出版社**对象应该同时被检索：


    **Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    **return book;**


    **} finally {**


    **session.close();**


    **}**


    **但是当你在该方法外部通过**book.getPublisher()**访问**出版社**对象时，会发生异常：


    ****System.out.println(book.getName());**


    **System.out.println(book.getPublisher().getName());**


    **如果将访问代码放在方法体的**try**块内，一切正常。这个异常的原因是什么？这是因为 Hibernate 直到你在**session**关闭前首次访问**出版社**时，才会从数据库加载**出版社**对象。这种懒加载可以避免不必要的数据库查询，从而提升性能。由于**出版社**是在**session**（已关闭）外部首次被访问，因此抛出了异常。


    如果希望从**session**外部访问**出版社**对象，有两种可能的解决方案。一种是通过调用**Hibernate.initialize()**方法显式初始化**出版社**。


    这样做会强制从数据库加载**出版社**对象：


    ****Session session = factory.openSession();**


    **try {**


    **Book book = (Book) session.get(Book.class, id);**


    **Hibernate.initialize(book.getPublisher());**


    **return book;**


    **} finally {**


    **session.close();**


    **}**


    **另一种解决方案是关闭此关联的懒加载。这样做可能会降低性能，因为每次都会将**出版社**对象与**图书**对象一起加载：


    ****<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Book_5_1" table="Book" schema="BOOK5">**


    **.**


    **.**


    **.**


    **.**


    **.**


    <many-to-one name="publisher" class="Publisher" column="PUBLISHER_ID"


    cascade="save-update" lazy="false" />


    第五章 ■ 多对一和一对一映射


    ********</class>**


    **</hibernate-mapping>**


    5.4 共享主键关联


    问题


    在什么场景下需要共享主键，以及如何映射它？


    解决方案

    '
- fmt: "# 共享主键的一对一映射\n\n当两个表中的行与某一行的主键值关联时，它们被称为*共享*主键。当两个对象之间存在紧密耦合的需求时，你可以使用这种实现方式。\n\
    \n## 工作原理\n\n让我们使用`Customer`和`Address`类来创建一个具有共享主键的一对一映射：\n\n```java\npublic class\
    \ Customer5_1 implements Serializable {\n\n    private static final long serialVersionUID\
    \ = -3534434932962734600L;\n\n    private Long id;\n\n    private String countryCode;\n\
    \n    private String idCardNo;\n\n    private String firstName;\n\n    private\
    \ String lastName;\n\n    private Address5_1 address;\n\n    private String email;\n\
    \n    //getters and setters\n\n}\n```\n\n```java\npublic class Address5_1 implements\
    \ Serializable{\n\n    private static final long serialVersionUID = -605474766287314591L;\n\
    \n    private Long id;\n\n    private String city;\n\n    private String street;\n\
    \n    private String doorplate;\n\n    private Customer5_1 customer;\n\n    //getters\
    \ and setters\n\n}\n```\n\n`Customer`类的映射方式与常规类相同。它还包含将`Customer`映射到`Address`的一对一映射元素。你将`cascade`选项设置为`save-update`，因为当你保存`Customer`对象时，希望同时保存`Address`：\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">\n    <class\
    \ name=\"Customer5_1\" table=\"CUSTOMER\" schema=\"BOOK5\">\n        <id name=\"\
    id\" type=\"long\" column=\"ID\">\n            <generator\n                class=\"\
    native\"></generator>\n        </id>\n        <property name=\"firstName\" type=\"\
    string\" column=\"FIRST_NAME\" />\n        <property name=\"lastName\" type=\"\
    string\" column=\"LAST_NAME\" />\n        <property name=\"idCardNo\" type=\"\
    string\" column=\"ID_CARD_NO\" />\n        <property name=\"countryCode\" type=\"\
    string\" column=\"COUNTRY_CODE\" />\n        <property name=\"email\" type=\"\
    string\" column=\"EMAIL\" />\n        <one-to-one\n            name=\"address\"\
    \n            class=\"com.hibernaterecipes.chapter5.Address5_1\"\n           \
    \ cascade=\"save-update\"></one-to-one>\n    </class>\n</hibernate-mapping>\n\
    ```\n\n仅凭这个映射，只要`Address`类被映射为独立的实体，就建立了一个单向的一对一映射。为了实现主键共享，你需要像下面这样映射`Address`类：\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter5\">\n    <class\
    \ name=\"Address5_1\" table=\"ADDRESS\" schema=\"BOOK5\">\n        <id name=\"\
    id\" type=\"long\" column=\"ID\" >\n            <generator\n                class=\"\
    foreign\">\n                <param\n                    name=\"property\">customer</param>\n\
    \            </generator>\n        </id>\n        <property name=\"city\" type=\"\
    string\" column=\"CITY\" />\n        <property name=\"street\" type=\"string\"\
    \ column=\"STREET\" />\n        <property name=\"doorplate\" type=\"string\" column=\"\
    DOOR_PLATE\" />\n        <one-to-one name=\"customer\" class=\"Customer5_1\" constrained=\"\
    true\"></one-to-one>\n    </class>\n</hibernate-mapping>\n```\n\n在`Address`映射文件中，你通过`one-to-one`元素建立了双向性。同时请注意，你将`constrained`设置为`true`，这会添加一个外键约束。该约束将`ADDRESS`表的主键链接到`CUSTOMER`表的主键。`Address`类的主键生成器被设置为`foreign`，并带有指向`Customer`实例的属性映射；这导致主键在`Customer`和`Address`类之间共享。此外，你不能在不删除`Address`类的情况下删除`Customer`类。\n\
    \nJPA规范没有处理共享主键的方法。它在建立双向性和外键方面存在严重问题。在JPA注解中，`Customer`类的`Address`属性必须使用`@OneToOne`和`@PrimaryKeyJoinColumn`注解进行映射：\n\
    \n```java\n@Entity\n@Table (name=\"CUSTOMER\",schema=\"BOOK5\")\npublic class\
    \ Customer5_1 implements Serializable {\n\n    private static final long serialVersionUID\
    \ = -3534434932962734600L;\n\n    @Column\n    (name=\"ID\")\n```"
  raw: 'When rows in two tables are associated with the primary key value of one row,
    they’re said to be *sharing* the primary key. You can use this kind of implementation
    when there is a requirement for tight coupling between two objects.


    How It Works


    Let’s use the **Customer** and **Address** classes to create a one-to-one mapping
    with a shared primary key:


    ****public class Customer5_1 implements Serializable {**


    ******private static final long *serialVersionUID*** **= -3534434932962734600L;**


    ****private Long id;**


    ****private String countryCode;**


    ****private String idCardNo;**


    ****private String firstName;**


    ****private String lastName;**


    ****private Address5_1 address;**


    **private String email;**


    **//getters and setters**


    **}**


    ****public class Address5_1 implements Serializable{**


    ********private static final long *serialVersionUID*** **= -605474766287314591L;**


    ****private Long id;**


    ****private String city;**


    ****private String street;**


    ****private String doorplate;**


    ****private Customer5_1 customer;**


    **//getters and setters**


    **}**


    **The **Customer** class is mapped like a regular class. It also contains the
    one-to-one mapping element that maps **Customer** to **Address**. You add the
    **cascade** option to **save-update** because you want to save the **Address**
    when you save the **Customer** object:


    CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING


    **<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Customer5_1" table="CUSTOMER" schema="BOOK5">**


    ******<id name="id" type="long" column="ID">**


    **<generator**


    **class="native"></generator>**


    **</id>**


    ******<property name="firstName" type="string" column="FIRST_NAME" />**


    ******<property name="lastName" type="string" column="LAST_NAME" />**


    ******<property name="idCardNo" type="string" column="ID_CARD_NO" />**


    ******<property name="countryCode" type="string" column="COUNTRY_CODE" />**


    ******<property name="email" type="string" column="EMAIL" />**


    <one-to-one


    name="address"


    class="com.hibernaterecipes.chapter5.Address5_1"


    cascade="save-update"></one-to-one>


    **</class>**


    **</hibernate-mapping>**


    **By itself, this mapping establishes a unidirectional one-to-one mapping, provided
    the **Address** class is mapped as a separate entity. To achieve the sharing of
    the primary key, you need to map the **Address** class as shown here:


    ****<hibernate-mapping package="com.hibernaterecipes.chapter5">**


    ****<class name="Address5_1" table="ADDRESS" schema="BOOK5">**


    <id name="id" type="long" column="ID" >


    <generator


    class="foreign">


    <param


    name="property">customer</param>


    </generator>


    </id>


    ******<property name="city" type="string" column="CITY" />**


    ******<property name="street" type="string" column="STREET" />**


    ******<property name="doorplate" type="string" column="DOOR_PLATE" />**


    <one-to-one name="customer" class="Customer5_1" constrained="true"></one-to-one>


    ********</class>**


    **</hibernate-mapping>**


    **In the **Address** mapping file, you establish bidirectionality with the one-to-one
    element. Also note that you make **constrained** **true**, which adds a foreign
    key constraint. The constraint links the primary key of the **ADDRESS** table
    to the primary key of the **CUSTOMER** table. The **generator** of the primary
    key of the **Address** class is set to **foreign** with a property mapping to
    the **Customer** instance; this causes the primary key to be shared between the
    **Customer** and **Address** classes. In addition, you can’t delete the **Customer**
    class without also deleting the **Address** class.


    The JPA specification doesn’t have a way to deal with a shared primary key. It
    has serious issues with establishing bidirectionality and a foreign key. In JPA
    annotations, the **Customer** class’s **Address** property must be mapped with
    the annotations **OneToOne** and **PrimaryKeyJoinColumn**:


    **@Entity**


    **@Table (name="CUSTOMER",schema="BOOK5")**


    **public class Customer5_1 implements Serializable {**


    ******private static final long *serialVersionUID*** **= -3534434932962734600L;**


    **@Column**


    **(name="ID")**'
