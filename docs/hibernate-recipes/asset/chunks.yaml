  raw: 'A primary key in a database table is used to uniquely identify a record in
    that table. The primary key value can’t be null and is unique within a table.
    The primary key is also used to establish a relationship between two tables—it’s
    defined as a foreign key in the associated table. Because the primary key is used
    to identify a particular record, it can also be called the *database identifier*.
    The database identifier is exposed to the application by Hibernate through an
    identifier property of the persistent entity. This chapter discusses the various
    ways to generate an identifier (primary key) for a database record. You learn
    about metadata configurations and their effect on the persistence mechanism.


    2.1 Providing an ID for Persistence


    Problem


    How do you generate an identifier for a database entity? What are the possible
    strategies?


    Solution


    An id element (**<id>** ) is used to create a mapping in the Hibernate XML file.
    The id element has attributes such as **column**, **type**, and **generator**
    that you use to generate the identifier. The JPA specification requires that every
    entity must have a primary key. From JPA’s perspective, an **@id** is used to
    define how an identifier is generated.


    When you use inheritance mapping, more than one class can be mapped to a table.
    These classes (subclass and superclass) are said to be in an *entity hierarchy*.
    The primary key must be defined exactly once in an entity hierarchy, either on
    the entity that is the root of the entity hierarchy or on a mapped superclass
    of the entity hierarchy. Attributes such as **@GeneratedValue** and **@column**
    are used to define column mapping and strategy.


    How It Works


    You need to ask Hibernate to generate this ID for you before persisting to the
    database. Hibernate provides many built-in strategies for ID generation:


    CHAPTER 2 ■ BASIC MAPPING AND OBJECT IDENTITY


    • Database sequence


    • Native generator


    • Increment generator


    • Hilo generator


    Some of them are available only for specified databases; for instance, the sequence
    strategy isn’t supported in MYSQL but is provided by Oracle.


    JPA also provides a way to generate identifiers.


    Hibernate XML Mapping


    We''ll look at each of these strategies in turn, starting with the database sequence.
    For this section, we''ll insert three books into the database. Below is the **Launch**
    class used to insert records into the **Book** table:


    ****package com.hibernaterecipes.chapter2;**


    ****import java.util.Date;**


    **import java.util.List;**


    ****import org.hibernate.Session;**


    **import org.hibernate.SessionFactory;**


    **import org.hibernate.Transaction;**


    **import org.hibernate.cfg.Configuration;**


    **import org.hibernate.stat.Statistics;**


    ******/****


    *** @author Guruzu**


    *****


    ***/**


    **public class Launch_2_1 {**


    **private static SessionFactory sessionFactory;**


    ****public static Session getSession() {**


    **if(sessionFactory == null)**


    **{**


    **sessionFactory = new Configuration().configure()**


    **.buildSessionFactory();**


    **}**


    **Session hibernateSession = sessionFactory.openSession();**


    **return hibernateSession;**


    **}**


    ****public static void main(String[] args) {**


    **Session session = getSession();**


    **Statistics stats = sessionFactory.getStatistics();**


    **stats.setStatisticsEnabled(true);**


    **Transaction tx = session.beginTransaction();**


    CHAPTER 2 ■ BASIC MAPPING AND OBJECT IDENTITY


    ****for(int i =0;i<3;i++)**


    **{**


    **BookCh2 book = new BookCh2();**


    **book.setName("Book Name "+(i+1));**


    **book.setPrice(39);**


    **book.setPublishDate(new Date());**


    **session.save(book);**


    **}**


    **tx.commit();**


    **stats.getSessionOpenCount();**


    **stats.logSummary();**


    **session.close();**


    **}**


    **}**


    **Using the Database Sequence**


    The most common way to generate an ID uses an auto-incremented sequence number.
    For some kinds of databases, including Hyper Structured Query Language Database
    (HSQLDB), you can use a sequence/generator to generate this sequence number. HSQLDB
    is a relational database management system written in Java; it supports a large
    subset of SQL-92 and SQL-2003 standards. This strategy is called *sequence*.


    Let''s use the book shop as an example again. Because a single persistent object
    can’t have more than one ID, you need to change the ISBN to a simple property
    and add a not-null and unique constraint on it.


    ****<?xml version="1.0" encoding="UTF-8"?>**


    **<!DOCTYPE hibernate-mapping PUBLIC**


    **"-//Hibernate/Hibernate Mapping DTD 3.0//EN"**


    [**"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)


    **<hibernate-mapping package="com.hibernaterecipes.chapter2" auto-import="false"
    >**


    **<import class="BookCh2" rename="bkch2"/>**


    **<class name="BookCh2" table="BOOK" dynamic-insert="true" dynamic-update="true">**


    **<id name="isbn" column="isbn" type="long">**


    <generator class="sequence">


    <param name="sequence">BOOK_SEQUENCE</param>


    </generator>


    **</id>**


    **<property name="name" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="int" column="PRICE" />**


    **</class>**


    **</hibernate-mapping>**


    **Using a Native Generator**


    Native generators provide portability, because Hibernate can determine the generator
    method supported by the underlying database. Generators using the native class
    use identity or sequence columns depending on the available database support.
    If neither method is supported, the native generator falls back to a hi/lo generator
    method to create unique primary key values.


    CHAPTER 2 ■ BASIC MAPPING AND OBJECT IDENTITY


    Let''s see how this works. In the **BookCh2.java** class, change the **isbn**
    **p**roperty from type **String** to **long**, as shown here:


    ****public class BookCh2 {**


    private long isbn;


    ****private String name;**


    **private Date publishDate;**


    **private int price;**


    **private Publisher publisher;**


    **private List chapters;**


    ****// getters and setters**


    **}**


    **And edit the **Book.xml** mapping file to contain the **id** element:


