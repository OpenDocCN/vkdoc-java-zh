  trans: '

    •   *多版本并发控制*：当事务对数据库执行读取操作时，会创建一个快照，并从该快照中读取数据。这会将数据与其他并发事务隔离开来。当事务修改一条记录时，数据库会创建一个新的记录版本，而不是覆盖旧记录。这种机制性能良好，因为它最大限度地减少了并发事务之间的锁争用——实际上，它消除了读锁和写锁之间的锁争用，这意味着读锁永远不会阻塞写锁。目前大多数数据库，如
    Oracle、MySQL、SQL Server 和 PostgreSQL，都实现了多版本并发控制。


    本章展示了 Hibernate 如何实现乐观并发和悲观并发方法。


    13.1 在独立 Java 应用程序中使用编程式事务


    问题


    如果你正在开发一个独立的 Java 应用程序，如何实现事务划分？


    解决方案


    在多用户应用程序中，你需要多个连接来支持多个并发用户。当你需要与数据库交互时，创建新连接的成本也很高。为此，你需要一个连接池来创建和管理数据库连接。每个需要与数据库交互的线程都会从池中请求一个连接并执行其查询。完成后，连接会返回给池。然后，如果另一个线程请求连接，连接池可能会为其提供同一个连接。


    通常，应用服务器会提供连接池。当你在独立的 Java 应用程序中工作时，你需要使用提供连接池的第三方解决方案。Hibernate 自带了一个名为 C3P0
    的开源第三方连接池框架。Apache 也提供了一个名为 Commons DBCP 的连接池框架。你需要配置 Hibernate 来使用这些框架之一。配置好连接池后，你可以使用
    Hibernate 的 Transaction API 进行事务划分，并使用连接池中的连接。


    工作原理


    你需要将 Hibernate 附带的 Java **c3p0-0.9.1.jar** 文件添加到构建路径中。在你的 Eclipse IDE 中，选择你的 Java
    项目，右键单击以编辑构建路径。（如果你在将 jar 添加到构建路径时遇到问题，请参阅第 1 章中的说明。）在 **Hibernate.cfg.xml** 文件中，添加以下配置：


    **<property name="connection.provider_class">org.hibernate.connection.C3P0ConnectionProvider</property>**


    **<property name="hibernate.c3p0.min_size">5</property>**


    **<property name="hibernate.c3p0.max_size">10</property>**


    **<property name="hibernate.c3p0.timeout">300</property>**


    **<property name="hibernate.c3p0.max_statements">50</property>**


    **<property name="hibernate.c3p0.acquire_increment">1</property>**


    **<property name="hibernate.c3p0.idle_test_period">3000</property>**


    **以下是你设置的每个参数的说明：


    • **connection.provider_class** 指定 **C3P0ConnectionProvider** 是提供连接的类。


    • **min_size** 是始终保持就绪状态的最小连接数。


    • **max_size** 是池中的最大连接数。这是启用 C3P0 所需的唯一属性。


    • **timeout** 是连接的最大空闲时间，超过此时间后连接将从池中移除。


    • **max_statements** 是可以缓存的最大预编译语句数。


    • **idle_test_period** 是自动验证连接之前的时间（以秒为单位）。


    • **acquire_increment** 是池耗尽时获取的连接数。


    这些是配置文件中所需的所有设置。Hibernate 还提供了一个名为 **hibernate.transaction.factory_class** 的属性，你可以在配置文件中设置它。它提供了用于实例化事务的工厂，默认为
    **JDBCTransactionFactory**：


    **SessionFactory sessionFactory = new Configuration().configure().buildSessionFactory();**

    **Session session = sessionFactory.openSession();**


    **Transaction tx = null;**


    **try {**


    **tx = session.beginTransaction();**


    **BookCh2 book = new BookCh2();**


    **book.setName("Hibernate Recipes Book ");**


    **book.setPrice(200);**


    **book.setPublishDate(new Date());**


    **session.saveOrUpdate(book);**


    **tx.commit();**


    **} catch (RuntimeException e) {**


    **try{**


    **if(tx != null)**


    **{**


    **tx.rollback();**


    **}**


    **}catch(RuntimeException ex)**


    **{**


    **log.error("Cannot rollback transaction");**


    **}**


    **throw e;**


    **} finally {**


    **session.close();**


    **}**


    **session** 由 **sessionFactory.openSession()** 调用提供。创建会话时不会打开数据库连接；这使会话创建成为一项低成本任务。当调用
    **session.beginTransaction()** 时，会从连接池中检索数据库连接，并且所有查询都使用此连接执行。要持久化的实体被缓存在会话的持久化上下文中。**Transaction**
    上的 **commit()** 会刷新持久化上下文并完成实体的保存。在当前 **Transaction** 提交后，可以打开另一个 **Transaction**。然后，连接池会提供一个新连接。当在
    **Session** 上调用 **close()** 时，所有资源和连接都会被释放。


    Hibernate 抛出的异常是 **RuntimeExceptions** 及其子类型。这些异常是致命的，因此你必须回滚事务。因为回滚事务也可能抛出异常，所以你必须在
    **try/catch** 块中调用 **rollback** 方法。


    在 JPA 中，你必须定义与 Hibernate 相同的配置，并使用 EntityTransaction API 来管理事务：


    **EntityManager manager = null;**

    **EntityTransaction tx = null;**


    **try {**


    **EntityManagerFactory managerFactory =**


    **Persistence.createEntityManagerFactory("book");**


    **manager = managerFactory.createEntityManager();**


    **tx = manager.getTransaction();**


    **tx.begin();**


    **BookCh2 newBook = new BookCh2();**


    **newBook.setBookName("Hibernate Recipes Phase1");**


    **newBook.setPublishDate(new Date());**


    **newBook.setPrice(new Long(50));**


    **manager.persist(newBook);**


    **tx.commit();**


    **log.debug("Transaction committed");**


    **}catch (RuntimeException e)**


    **{**


    **try**


    **{**


    **if(tx != null)**


    **{**


    **tx.rollback();**


    **}**


    **}catch(RuntimeException ex)**


    **{**


    **log.error("Cannot rollback transaction");**


    **}**


    **throw e;**


    **} finally**


    **{**


    **manager.close();**


    **}**


    在 EntityManager 上调用 **getTransaction()** 来获取一个事务。实际连接是在事务的 **begin()** 方法中从池中请求的。事务上的
    **commit()** 会刷新持久化上下文并完成实体的保存。在 **finally** 块中调用 EntityManager 的 **close()**
    方法，以确保即使在发生异常的情况下也会关闭会话。


    13.2 使用 JTA 进行编程式事务


    问题


    假设你正在使用一个提供资源管理支持的应用服务器。像 WebLogic、WebSphere 和 JBoss 这样的应用服务器可以从连接池提供连接并管理事务。如何使用
    Java 事务 API (JTA) 实现编程式事务划分？


    解决方案

