  trans: '

    **时间事务**


    **账户**


    T1


    事务 1 开始。


    T2


    事务 2 开始。


    T3


    事务 1 更新记录 R1。


    T4


    事务 2 更新记录 R1。


    T5


    事务 1 提交。


    T6


    事务 2 提交。


    如何处理此类更新丢失的情况？以及如何在 Hibernate 中启用版本控制？


    解决方案


    你需要理解隔离级别，以便选择合适的并发控制机制。对数据库记录的访问分为读取和写入。并发控制机制定义了决定何时允许读取和写入的规则。


    当一个事务读取了另一个事务尚未提交的更改时，就会发生*脏读*（参见表 13-2）。基本上，脏读意味着读取未提交的数据。


    第 13 章 ■ 事务与并发


    *表 13-2. 脏读：事务读取未提交的数据*


    **时间 事务**


    **账户**


    T1


    事务 1 开始。


    T2


    事务 2 开始。


    T3


    事务 1 更新记录 R1。


    T4


    事务 2 读取未提交的记录 R1。


    T5


    事务 1 回滚其更新。


    T6


    事务 2 提交。


    当一个事务两次读取同一条记录，且第一次和第二次读取时记录的状态不同，就会发生*不可重复读*。这通常发生在两次读取之间，另一个事务更新了该记录的状态（参见表
    13-3）。


    *表 13-3. 不可重复读：事务两次读取同一条记录*


    **时间 事务**


    **账户**


    T1


    事务 1 开始。


    T2


    事务 1 读取记录 R1。


    T3


    事务 2 开始。


    T4


    事务 2 更新记录 R1。


    T5


    事务 2 提交。


    T6


    事务 1 读取记录 R1（在时间 T2 读取的记录 R1


    与在时间 T6 读取时的状态不同）。


    T7


    事务 1 提交。


    当一个事务执行两个相同的查询，而第二个查询返回的行集合与第一个不同时，就会发生*幻读*。这通常发生在两次读取之间，另一个事务向表中插入了记录或删除了记录。


    第 13 章 ■ 事务与并发


    *表 13-4. 幻读：在事务期间读取大小发生变化的数据范围* **时间 事务**


    **账户**


    T1


    事务 1 开始。


    T2


    事务 1 读取记录范围 RG1。


    T3


    事务 2 开始。


    T4


    事务 2 插入记录。


    T5


    事务 2 提交。


    T6


    事务 1 读取记录范围 RG1


    （RG1 的大小从时间 T2 到 T6 发生了变化）。


    T7


    事务 1 提交。


    *隔离性*定义了一个事务所做的更改如何以及何时对其他事务可见。隔离性是 ACID 属性之一。为了获得更好的性能和并发控制，ANSI SQL 标准将隔离性划分为多个级别，这些级别定义了选择数据时的锁定程度。四个隔离级别如下（另见表
    13-5）：


    • *可串行化：* 事务串行执行，一个接一个。此隔离级别允许事务对其影响的整个数据范围获取读锁或写锁。可串行化隔离级别可防止脏读、不可重复读和幻读，但可能导致应用程序出现可伸缩性问题。


    • *可重复读：* 获取读锁和写锁。此隔离级别不允许脏读或不可重复读。它也不获取范围锁，这意味着它允许幻读。读锁可防止其他并发事务获取任何写锁。此级别仍可能存在一些可伸缩性问题。


    • *读已提交：* 读锁被获取并立即释放，写锁在事务结束时获取并释放。此隔离级别不允许脏读，但允许不可重复读和幻读。通过结合使用持久化上下文和版本控制，你可以实现可重复读隔离级别。

    '
- fmt: "# 事务与并发\n\n## 隔离级别\n\n- **Read Uncommitted:** 一个事务所做的修改在提交之前就对其他事务可见。允许所有类型的读取，包括脏读。不建议使用此隔离级别。如果事务未提交的更改被回滚，其他并发事务可能会受到严重影响。\n\
    \n**表 13-5 总结了各种隔离级别允许的读取操作**\n\n| 隔离级别 | 脏读 | 不可重复读 | 幻读 |\n| --- | --- | ---\
    \ | --- |\n| Serializable | - | - | - |\n| Repeatable Read | - | - | 允许 |\n| Read\
    \ Committed | - | 允许 | 允许 |\n| Read Uncommitted | 允许 | 允许 | 允许 |\n\n每个数据库管理系统都有默认的隔离级别设置。您可以在\
    \ DBMS 配置中更改默认隔离级别。在 JDBC 上，您可以通过名为`hibernate.connection.isolation`的属性来设置隔离级别。Hibernate\
    \ 使用以下值来设置特定的隔离级别：\n\n- `8`: Serializable 隔离\n- `4`: Repeatable Read 隔离\n- `2`:\
