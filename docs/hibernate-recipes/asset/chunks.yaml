    PUBLISH_DATE\" />\n        <property name=\"price\" type=\"int\" column=\"PRICE\"\
    \ />\n        <set name=\"chapters\" table=\"Book61_Chapter\" schema=\"BOOK6\"\
    \ sort=\"natural\" lazy=\"false\">\n            <key column=\"BOOK_ID\"></key>\n\
    \            <element type=\"string\" column=\"CHAPTER_NAME\" not-null=\"true\"\
    ></element>\n        </set>\n    </class>\n</hibernate-mapping>\n```\n\n在JPA映射文件中，您需要将实现更改为`TreeSet`，并将注解`sort`声明为`natural`。同时请注意禁用延迟初始化。（延迟初始化将在本章后面讨论。）\n\
