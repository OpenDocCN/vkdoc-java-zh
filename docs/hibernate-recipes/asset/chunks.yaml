    ## 批处理与原生 SQL


    *批处理*是执行一系列程序。从应用程序的角度来看，批处理意味着从持久化存储中读取数据，对数据进行处理，然后可能将处理后的数据存储回持久化存储中。批处理允许自动化和共享计算机资源。它通常在计算机资源不太繁忙时运行。


    假设对于书店应用程序，你希望通过在每月的 27 日和 28 日对商店中的所有图书进行促销来增加销售额。这是实现批处理的经典案例。


    在 27 日的前一晚，你列出所有库存图书并实施所需的折扣。而在 28 日晚上，折扣被取消。'
