    \n`@Entity` is defined by the EJB3.0 specification to annotate an entity bean.\
    \ An entity represents a lightweight persistent domain object.\n\nAn entity class\
    \ must have a public or protected no-arg constructor. It may have other constructors\
    \ as well. It should be a top level class and must not be final. If the entity\
    \ is to be passed by value (that is, through a remote interface) it must implement\
    \ `Serializable`.\n\nThe state of the entity is represented by the entity’s instance\
    \ variables. The instance variables must be accessed only from within the entity\
    \ class. The client of the entity shouldn’t be able to access the state of the\
    \ entity directly. The instance variables must have private, protected, or package\
    \ visibility.\n\nEvery entity must have a primary key. The primary key must be\
    \ declared only once in the entity hierarchy.\n\nYou can generate the set and\
    \ get methods using the Eclipse IDE. Select the instance variables for which you\
    \ need to generate the methods, right-click the selection, and select Source →\
    \ Generate Getters and Setters. Doing so displays all the variables for which\
    \ the methods must be generated. Select the required variables, and click OK.\
    \ The getter and setter are generated in your source code.\n\nIn the previous\
    \ class, the name of the table `BOOK` is specified with the `name` attribute of\
    \ the `Table` annotation. The variable `isbn` is the primary key, which is specified\
    \ by the `@Id` tag. The rest of the columns are specified by the `@column` annotation.\
    \ If the `@column` annotation isn’t specified, the names of the instance variables\
    \ are considered column names. Every nonstatic and nontransient properties of\
    \ an entity bean are considered persistent unless you specify `@Transient`. `@Transient`\
    \ properties are ignored by the `EntityManager` when you map persistent properties.\n\
