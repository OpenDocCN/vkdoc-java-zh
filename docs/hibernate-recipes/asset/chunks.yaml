    \n# Chapter 8: HQL and JPA Query Language\n\nWhen you use JDBC to access databases,\
    \ you write SQL statements for the query and update tasks. In such cases, you’re\
    \ dealing with tables, columns, and joins. When you use Hibernate, most update\
    \ tasks can be accomplished through the APIs provided by Hibernate. However, you\
    \ still need to use a query language for the query tasks. Hibernate provides a\
    \ powerful query language called Hibernate Query Language (HQL).\n\nHQL is database\
    \ independent and translated into SQL by Hibernate at runtime. When you write\
    \ HQL, you can concentrate on the objects and properties without knowing much\
    \ detail about the underlying database. You can treat HQL as an object-oriented\
    \ variant of SQL.\n\nIn this chapter, you see how to query the database using\
