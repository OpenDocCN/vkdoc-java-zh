    你了解到可以使用延迟初始化来提高性能：依赖对象的数据仅在需要时才从数据库中检索。你还了解到，当两个表中的行通过主键关联相关联时，会使用共享主键。


    你看到了如何使用 **<many-to-one>** 元素映射一对一关联，然后对“一”方关系设置唯一约束。一对一关联也可以使用连接表进行映射。


