    recipe appears to work fine? How do you add a data-access layer to the previous
    recipe?


    Solution


    A Data Access Object (DAO) layer abstracts the access to data from a persistent
    store. The persistent store can be a database or a file system. The DAO layer
    hides this persistent store from the application. A DAO layer may return a reference
    to objects instead of rows of fields from the database, which allows for 254


