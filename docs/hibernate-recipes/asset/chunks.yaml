    **As in HQL, you can specify the fetching strategy that Hibernate should follow
    when it loads data in case of associations. This strategy can also be set in the
    metadata configuration file. If the configuration needs to be overridden, then
    you can use the FetchMode **API** when you retrieve data using **Criteria**.


    Following are the FetchMode options are available:


    • **DEFAULT**: The default setting that is used from the configuration file.


    • **EAGER**: Deprecated. Use **FetchMode.JOIN** instead.


    • **JOIN**: Retrieves the associated object’s data by using an outer join.


    CHAPTER 9 ■ QUERYING WITH CRITERIA AND EXAMPLE


    • **LAZY**: Deprecated. Use **FetchMode.SELECT** instead.


    • **SELECT**: Fetches eagerly using an additional **SELECT** *query. Unless the
    **lazy** option is disabled explicitly in the configuration file, the second **SELECT**
    *query is executed when the association is accessed.**


    **The following code uses the **FetchMode.JOIN** and **FetchMode.SELECT** options:


    ****Criteria criteria = session.createCriteria(Book.class)**


    **.add(Restrictions.like("name", "%Hibernate%"))**


    .setFetchMode("publisher", FetchMode.JOIN)


    .setFetchMode("chapters", FetchMode.SELECT);


    **List books = criteria.list();**


    **In this case, the associated **Publisher** object is fetched using an outer
    join, where **Chapters** is retrieved with a second **SELECT** query.


    9.4 Using Projections


    Problem


    What are projections, and how do you use them in the Criteria API?


    Solution


    Until now, when you retrieved objects using Criteria, you fetched the complete
    object in the result set.


    What if you want to fetch only certain fields or columns in a table, and you don’t
    want the complete object?


    Projections help you filter data and return only those fields you need. You can
    use projections when you don’t want the entire fetched entity and its associations.
    You can also use them when there is a requirement to get the results in a flat
    manner (not in an object graph). This approach improves performance, especially
    when you’re dealing with lot of columns and the object graph is very deep.


    How It Works


    To customize the fields of the result, you can use projections to specify the
    fields to be returned:


    ****Criteria criteria = session.createCriteria(Book.class)**


    .setProjection(Projections.property("name"));


    **List books = criteria.list();**


    **This is similar to the following SQL statement:


    ****select book.name from Book book**


    **174


    CHAPTER 9 ■ QUERYING WITH CRITERIA AND EXAMPLE


    This is better than


    **from Book book


    **which fetches the complete **book** object although you need only the book name.


    Aggregate Functions and Groupings with Projections


    Aggregate functions in SQL summarize data and return a single value by calculating
    it from values in a column. Here are some examples:


    • **SUM**: Returns the summation of the column values on which it’s applied


    • **AVG**: Returns the average of the column values


    • **MIN**: Returns the minimum of the specified column values


    • **MAX**: Returns the maximum of the specified column values


    In HQL, you can use these directly just as in SQL:


    ****select min(book.price) from Book book**


    **This query returns the minimum price of all the books in the **BOOK** table.'
