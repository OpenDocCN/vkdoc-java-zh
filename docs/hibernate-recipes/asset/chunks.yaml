    \ class or even an interface. If the superclass is concrete, an additional table\
    \ is required to map the properties of that class.\n\n# Table per Concrete Class\
    \ with Implicit Polymorphism\n\nEach table contains all the properties of the\
    \ concrete class and the properties that are inherited from its superclasses.\
    \ Here, all the subclasses are mapped as separate entities.\n\n*This chapter discusses\
    \ these strategies in detail and shows how to implement them.*\n\nThe properties\
    \ of all persistent entities are of certain types, such as `String`. Some of the\
    \ important basic types supported by Hibernate are as follows:\n\n- `integer`,\
    \ `long`, `short`, `float`, `double`, `character`, `byte`, `boolean`, `yes_no`,\
    \ and `true_false`. Type mappings for Java primitives and wrapper classes.\n-\
    \ `string`. Type mappings from `java.lang.String` to something like a `VARCHAR`.\n\
    - `date`, `time`, and `timestamp`. Type mapping from `java.util.Date` and its\
    \ subclasses to their appropriate SQL types.\n\nOther basic mappings supported\
    \ by Hibernate include `calendar`, `calendar_date`, `big_decimal`, `big_integer`,\
    \ `locale`, `timezone`, `currency`, `class`, `binary`, `text`, and `serializable`.\
    \ Hibernate also provides an API to implement your own custom types. You can use\
    \ two packages, `org.hibernate.type` and `org.hibernate.userType`, to define object\
    \ types. You can define your own custom types either by implementing `org.hibernate.type.Type`\
    \ directly or by extending one of the abstract classes provided in the `org.hibernate.type`\
    \ package; or you can implement one of the interfaces in the `org.hibernate.userType`\
    \ package. This chapter discusses the custom mapping types available in Hibernate’s\
    \ `org.hibernate.userType` package. You go through the implementation details\
    \ of the `userType` and `CompositeUserType` extensions.\n\n## 4.1 Mapping Entities\
    \ with Table per Class Hierarchy\n\n### Problem\n\nHow do you map entities using\
