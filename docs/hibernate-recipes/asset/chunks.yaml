    1.5 使用实体管理器


    问题


    是否存在一种通用机制来配置 ORM，从而减少对 Hibernate、TopLink 等特定提供商的依赖？


    解决方案


    JPA 规范将*持久化上下文*定义为一组受管理的实体实例，其中实体实例及其生命周期由实体管理器管理。每个 ORM 供应商都提供自己的实体管理器，它是对核心
    API 的封装，因此支持 JPA 编程接口、JPA 实体实例生命周期以及查询语言。这为对象/关系开发与配置提供了一种通用机制。


    工作原理


    您从实体管理器工厂获取 Hibernate EntityManager。当使用容器管理的实体管理器时，应用程序不会直接与实体管理器工厂交互。此类实体管理器主要通过
    JNDI 查找获得。对于应用程序管理的实体管理器，应用程序必须使用实体管理器工厂来管理实体管理器和持久化上下文的生命周期。本示例使用应用程序管理的实体管理器。


    **EntityManagerFactory** 与 Hibernate 中的 **SessionFactory** 角色相同。它充当工厂类，向应用程序提供
    **EntityManager** 类。它可以通过编程方式或使用 XML 进行配置。当您使用 XML 进行配置时，文件必须命名为 **persistence.xml**，并且必须位于您的类路径中。


    以下是 **Book** 示例的 **persistence.xml** 文件：


    ****<?xml version="1.0" encoding="UTF-8"?>**


    [**<persistence**](http://java.sun.com/xml/ns/persistence)


    [](http://www.w3.org/2001/XMLSchema-instance)


    ****xsi:schemaLocation=**


    [**"http://java.sun.com/xml/ns/persistence**](http://www.w3.org/2001/XMLSchema-instance)


    [**http://java.sun.com/xml/ns/persistence/persistence_1_0.xsd"**](http://www.w3.org/2001/XMLSchema-instance)


    **version="1.0">**


    **<persistence-unit name="book" transaction-type="RESOURCE_LOCAL">


    <provider>org.hibernate.ejb.HibernatePersistence</provider>


    <class>com.hibernaterecipes.annotations.domain.Book</class>


    ****<properties>**


    **<property name="hibernate.connection.driver_class"**


    **value="org.apache.derby.jdbc.EmbeddedDriver"/>**


    **<property name="hibernate.connection.username"**


    **value="book"/>**


    **<property name="hibernate.connection.password"**


    **value="book"/>**


    **<property name="hibernate.connection.url"**


    **value="jdbc:derby://localhost:1527/BookShopDB"/>**


    **<property name="hibernate.dialect"**


    **value="org.hibernate.dialect.DerbyDialect"/>**


    **</properties>**


    **</persistence-unit>**


    **</persistence>**


    **在此 **persistence.xml** 文件中，整个单元由 **<persistence-unit>** 定义。此名称应与创建 **EntityManagerFactory**
    时使用的名称匹配。


    此处使用了事务类型 **RESOURCE_LOCAL**。两种事务类型定义了事务行为：JTA 和 **RESOURCE_LOCAL**。JTA 用于 J2EE
    管理的应用程序，其中容器负责事务传播。对于应用程序管理的事务，您可以使用 **RESOURCE_LOCAL**。


    **<provider>** 标签指定您使用的第三方 ORM 实现。在此例中，它被配置为使用 Hibernate Persistence 提供程序。


    实体实例通过 **<class>** 标签进行配置。

