    }\nrs.close();\nstmt.close();\n```\n\n## Using JDBC to Update a Database\n\nLet’s\
    \ update the title of the book whose ISBN is 1932394419. Here’s the JDBC code:\n\
    \n```\nPreparedStatement stmt = connection.prepareStatement(\"UPDATE BOOK SET\
