  raw: 'An *object model* uses the principles of abstraction, encapsulation, modularity,
    hierarchy, typing, concurrency, polymorphism, and persistence. The object model
    enables you to create well-structured, complex systems. In an object model system,
    *objects* are the components of the system. Objects are instances of classes,
    and classes are related to other classes via inheritance relationships. An object
    has an identity, a state, and behavior. An object model helps you create reusable
    application frameworks and systems that can evolve over time. In addition, object-oriented
    systems are usually smaller than non-object-oriented implementations.


    A *relational model* defines the structure of data, data manipulation, and data
    integrity. Data is organized in the form of tables, and different tables are associated
    by means of referential integrity (a foreign key). Integrity constraints such
    as a primary key, unique check constraints, and not null are used to maintain
    an entity’s integrity in the relational model.


    A relational data model isn’t focused on supporting entity-type inheritance: entity-based
    polymorphic association from an object model can’t be translated into similar
    entities in a relational model. In an object model, you use the state of the model
    to define equality between objects. But in a relational model, you use an entity’s
    primary key to define equality of entities. Object references are used to associate
    different objects in an object model, whereas a foreign key is used to establish
    associations in a relational model. Object references in the object model facilitate
    easier navigation through the object graph.


    Because these two models are distinctly different, you need a way to persist object
    entities (Java objects) into a relational database. Figures 1-1 and 1-2 provide
    a simple representation of the object model and the relational model.


    *Figure 1-1\. Entity-relationship (ER) diagram of Book and Publisher*


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    *Figure 1-2\. Class diagram of Book and Publisher*


    Object/relational mapping (ORM) frameworks help you take advantage of the features
    present in the object model (like Java) and the relational model (like database
    management systems [DBMS]). With the help of ORM frameworks, you can persist objects
    in Java to relational tables using metadata that describes the mapping between
    the objects and the database. The metadata shields the complexity of dealing directly
    with SQL and helps you develop solutions in terms of business objects.


    An ORM solution can be implemented at various levels:


    • *Pure relational:* An application is designed around the relational model.


    • *Light object mapping:* Entities are represented as classes and are mapped manually
    to relational tables.


    • *Medium object mapping:* An application is designed using an object model, and
    SQL is generated during build time using code-generation utilities.


    • *Full object mapping:* This mapping supports sophisticated object modeling including
    composition, inheritance, polymorphism, and persistence by


    reachability.


    The following are the benefits of using an ORM framework:


    • *Productivity:* Because you use metadata to persist and query data, development
    time decreases and productivity increases.


    • *Prototyping:* Using an ORM framework is extremely useful for quick prototyping.


    • *Maintainability:* Because much of the work is done through configuration, your
    code has fewer lines and thus requires less maintenance.


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    • *Vendor independence:* An ORM abstracts an application from the underlying SQL


    database and SQL dialect. This gives you the portability to support multiple


    databases.


    ORM frameworks also have some disadvantages:


    • *Learning curve:* You may experience a steep learning curve as you learn how
    to map and, possibly, learn a new query language.


    • *Overhead:* For simple applications that use a single database and data without
    many business requirements for complex querying, an ORM framework can be


    extra overhead.


    • *Slower performance:* For large batch updates, performance is slower.


    Hibernate is one of the most widely used ORM frameworks in the industry. It provides
    all the benefits of an ORM solution and implements the Java Persistence API (JPA)
    defined in the Enterprise JavaBeans (EJB) 3.0 specification.


    Its main components are as follows:


    • *Hibernate Core:* The Core generates SQL and relieves you from manually handling
    Java Database Connectivity (JDBC) result sets and object conversions. Metadata
    is defined in simple XML files. The Core offers various options for writing queries:
    plain SQL; Hibernate Query Language (HQL), which is specific to Hibernate;


    programmatic criteria, or Query by Example (QBE). It can optimize object loading


    with various fetching and caching options.


    • *Hibernate Annotations:* With the introduction of Annotations in JDK 5.0, Hibernate
    provides the option of defining metadata using annotations. This


    reduces configuration using XML files and makes it simple to define required


    metadata directly in the Java source code.


    • *Hibernate EntityManager:* The JPA specification defines programming interfaces,
    lifecycle rules for persistent objects, and query features. The Hibernate


    implementation for this part of the JPA is available as Hibernate EntityManager.


    This book provides solutions using Hibernate Core and Annotations for each problem.
    The Hibernate version used is 3.3.2.


    1.1 Setting Up Hibernate


    Problem


    What tools and libraries are required to set up Hibernate and get started?


    Solution


    You need JDK 1.5+, an IDE such as Eclipse, a database (this book uses Apache Derby),
    and SQL Squirrel to provide a GUI to use the database. You can also use Maven
    to configure your project. Maven is a software project-management and comprehension
    tool. Based on the concept of a project object model 3


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    (POM), Maven can manage a project’s build, reporting, and documentation from a
    central piece of information. In Maven, the POM.XML is the central piece where
    all the information is stored.


    The following libraries are required for the Hibernate 3.3.2 setup:


    • **Hibernate3.jar**


    • **Hibernate-commons-annotations.jar**


    • **Hibernate-annotations.jar**


    • **Hibernate-entitymanager.jar**


    • **Antlr-2.7.6.jar**


    • **Commons-collections-3.1.jar**


    • **Dom4j-1.6.1.jar**


    • **Javassist-3.9.0.GA.jar**


    • **Jta-1.1.jar**


    • **Slf4j-api-1.5.8.jar**


    • **Ejb3-persistence.jar**


    • **Slf4j-simple1.5.8.jar**


    The following are required for the Derby setup :


    • **Derby.jar**


    • **Derbyclient.jar**


    • **Derbynet.jar**


    • **Derbytools**.


    How It Works


    The next few sections describe how to set up each of the required tools and then
    provide the solution to the problem. All the solutions are provided on a Windows
    platform. They can also be implemented on UNIX, provided you install and download
    the libraries and executables specific to the UNIX platform wherever applicable.


    Installing the JDK


    The JDK is an essential toolkit provided for Java application development. You
    can go to


    [**http://java.sun.com/j2se/1.5.0/download.jsp** to](http://java.sun.com/j2se/1.5.0/download.jsp)
    download JDK 5.0\. Install it into a folder such as **C:\jdk1.5.0**.


    CHAPTER 1 ■ STARTING WITH HIBERNATE


    Installing the Eclipse Web Tools Platform (WTP)


    Eclipse is an IDE for developing Java applications. The latest version is Galileo.
    You can install it from the following URL:


    **[**www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/galileo/SR1/ecli**](http://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/galileo/SR1/ecli)


