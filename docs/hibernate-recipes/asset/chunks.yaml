  raw: '• deepCopy: Returns the persistent state of the object. For immutable objects,
    it can return the object itself.


    • Equals: Checks the equality of two instances for persistent state.


    • hashCode: Performs a hash-code implementation for the instance.


    • isMutable: Specifies whether objects of this type are immutable.


    • nullSafeGet: Retrieves the object from the JDBC resultset.


    • nullSafeSet: Writes the object property value to the JDBC prepared statement.


    • replace: Used when you’re merging with a detached instance. For immutable


    objects, you can return the first parameter (original). For mutable objects, you


    return a copy of the first parameter. A recursive copy should be performed if
    the mutable objects have component fields.


    • returnedClass: Specifies the class returned by the nullSafeGet method.


    • sqlTypes: Returns the SQL types for the columns mapped by this type. The types
    are indentified as codes, and codes are defined in java.sql.Types.


