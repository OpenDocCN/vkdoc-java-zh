    >1</property>\n        <!-- SQL dialect -->\n        <property name=\"dialect\"\
    >\n            org.hibernate.dialect.DerbyDialect\n        </property>\n     \
    \   <!-- Enable Hibernate's automatic session context management -->\n       \
