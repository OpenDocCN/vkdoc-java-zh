- fmt: "If a persistent object using an autogenerated ID type is passed to the `saveOrUpdate()`\
    \ method with an empty ID value, it’s treated as a new object that should be inserted\
    \ into the database. Hibernate first generates an ID for this object and then\
    \ issues an `INSERT` statement. Otherwise, if the ID value isn’t empty, Hibernate\
    \ treats it as an existing object and issues an `UPDATE` statement for it.\n\n\
    How does Hibernate treat an ID as empty? For the `Book` class, the `isbn` type\
    \ is a primitive `long`. You should assign a number as the unsaved value. Typically,\
    \ you choose “0” as unsaved, because it’s the default value for the `long` data\
    \ type. But it’s a problem that you can’t have an object whose ID value is really\
    \ “0”:\n\n```\n<id name=\"isbn\" type=\"long\" column=\"ISBN\" unsaved-value=\"\
    0\">\n<generator class=\"native\"/>\n</id>\n```\n\nThe solution to this problem\
    \ is to use a primitive wrapper class as your ID type (`java.lang.Long` in this\
    \ case). Then, null is treated as the unsaved value. You can use any number within\
    \ the range of the `long` data type as the ID value:\n\n```\npublic class Book\
    \ {\n    private Long isbn;\n    private String name;\n    private Publisher publisher;\n\
    \    private Date publishDate;\n    private int price;\n    private List chapters;\n\
    \    // Getters and Setters\n}\n```\n\nThis is also the case for other persistent\
    \ properties, such as the `price` property in the `Book` class.\n\nWhen the price\
    \ of a book is unknown, which value should be assigned to this field? Should it\
    \ be “0” or a negative number? Neither seems suitable. Instead, you can change\
    \ the type to a primitive wrapper class (`java.lang.Integer` in this case) and\
    \ use null to represent an unknown value:\n\n```\npublic class Book {\n    private\
    \ Long isbn;\n    private String name;\n    private Publisher publisher;\n   \
    \ private Date publishDate;\n    private Integer price;\n    private List chapters;\n\
    \    // Getters and Setters\n}\n```\n\n## 2.4 Dynamic SQL Generation in Hibernate\n\
    \n### Problem\n\nWhat does dynamic SQL generation mean? Why do you need to enable\
    \ it, and how do you do so?\n\n### Solution\n\nOn application startup, Hibernate\
    \ creates SQL statements for each of its persistent classes. That means Hibernate\
    \ creates SQL statements for the Create, Read, Update, and Delete (CRUD) operations\
    \ but doesn’t execute these statements. So, on application startup, an insert\
    \ statement (create), a delete, a read, and an update are created. The update\
    \ statement is created to update each and every field. At runtime, if the value\
    \ isn’t changed, it’s updated with the old value. The CRUD statements are cached\
    \ in memory by Hibernate.\n\nDynamic SQL generation means turning off this Hibernate\
    \ feature. You may want to do so because the feature can mean a longer startup\
    \ time for the application. The amount of time depends on the number of entity\
    \ classes in the application. Caching these SQL statements in memory can impact\
    \ the performance of sensitive application more in terms of unnecessary memory.\n\
    \n### How It Works\n\nFor the class element, add the attributes `dynamic-insert`\
    \ and `dynamic-update` and set them to true. The `Book.xml` mapping file becomes\
    \ the following:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\
    \n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\">\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">\n    <class\
    \ name=\"BookCh2\" table=\"BOOK\" dynamic-insert=\"true\" dynamic-update=\"true\"\
    >\n        <id column=\"isbn\" type=\"long\">\n            <generator class=\"\
    native\">\n            </generator>\n        </id>\n        <property name=\"\
    name\" type=\"string\" column=\"BOOK_NAME\" />\n        <property name=\"publishDate\"\
    \ type=\"date\" column=\"PUBLISH_DATE\" />\n        <property name=\"price\" type=\"\
    int\" column=\"PRICE\" />\n    </class>\n</hibernate-mapping>\n```\n\nThe annotation\
    \ mapping is as follows:\n\n```\npackage com.hibernaterecipes.annotations.domain;\n\
    ```"
