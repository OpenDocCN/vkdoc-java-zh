    5.2 Using a Many-to-One Association with a Join Table


    Problem


    Let’s say a set of books has been identified that will be published, but publishers
    haven’t yet been allocated for those books. In the same way, you may have publishers
    that are ready to publish books, but the books haven’t yet been written. In this
    case, if you use the same **Book** and **Publisher** entities, there will be rows
    in which the **Book_Id** is null in the **PUBLISHER** table and the **Publisher_Id**
    is null in the **BOOK**


    table. This isn’t an efficient way to store data in a relational database and
    doesn’t provide a normalized schema.


    In this case, you use an additional table called a *join table* that contains
    the foreign key’s **Book_id** and **Publisher_Id** as columns. This table includes
    all rows where a **Book** has a **Publisher** and a **Publisher** has published
    a **Book**.'
