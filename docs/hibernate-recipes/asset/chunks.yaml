    If your application has hundreds of mapping definitions, you can pack it in a
    jar file and add it to the Hibernate configuration. This jar file must be found
    in your application’s classpath:


    ```

    Configuration configuration = new Configuration()

    .addJar(new File("mapping.jar"))

    .setProperty("hibernate.dialect", "org.hibernate.dialect.DerbyDialect")

    .setProperty("hibernate.connection.driver_class", "org.apache.derby.jdbc.EmbeddedDriver")

    .setProperty("hibernate.connection.url", "jdbc:derby://localhost:1527/BookShopDB")

    .setProperty("hibernate.connection.username", "book")

    .setProperty("hibernate.connection.password", "book");

    SessionFactory factory = configuration.buildSessionFactory();

    ```


    ## SessionFactory


    The following statement creates a Hibernate `SessionFactory`:


    ```

    SessionFactory factory = configuration.buildSessionFactory();

    ```


    A *session factory* is a global object for maintaining `org.hibernate.Session`
    objects. It’s instantiated once, and it’s thread-safe. You can look up the `SessionFactory`
    from a Java Naming and Directory Interface (JNDI) context in an `ApplicationServer`
    or any other location.


    ## XML Configuration


    Another way to configure Hibernate is to use an XML file. You create the file
    `hibernate.cfg.xml` in the source directory, so Eclipse copies it to the root
    of your classpath:


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE hibernate-configuration PUBLIC

    "-//Hibernate/Hibernate Configuration DTD 3.0//EN"

    "http://hibernate.sourceforge.net/hibernate-configuration-3.0.dtd">

    <hibernate-configuration>

    <session-factory>

    <property name="connection.driver_class">

    org.apache.derby.jdbc.EmbeddedDriver

    </property>

    <property name="connection.url">jdbc:derby://localhost:1527/BookShopDB</property>

    <property name="connection.username">book</property>

    <property name="connection.password">book</property>

    <property name="dialect">org.hibernate.dialect.DerbyDialect</property>

    <mapping resource="com/metaarchit/bookshop/Book.hbm.xml" />

    </session-factory>

    </hibernate-configuration>

    ```


    Now, the code fragment to build up a session factory can be simplified. The configuration
    loads your `hibernate.cfg.xml` file from the root of the classpath:


    ```

    Configuration configuration = new Configuration().configure();

    ```


