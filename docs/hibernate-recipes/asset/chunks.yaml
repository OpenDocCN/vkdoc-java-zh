    ****List books = exampleSQLInjection("Hibernate");**


    **if(books!=null)**


    **{**


    **System.out.println("Size- "+books.size());**


    **Iterator it = books.iterator();**


    **while(it.hasNext())**


    **{**


    **System.out.println("book- "+it.next());**


    **}**


    **}**


