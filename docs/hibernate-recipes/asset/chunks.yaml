    is incremented. You can also use a sequence to generate a primary key for multiple
    tables, whereas an increment generator can only be used to create a primary key
    for its own table.


    **Using the Hilo Generator**


    The hilo generator uses the hi/lo algorithm to generate the identifiers that are
    unique to a particular database. It retrieves the high value from a global source
    (by default, the **hibernate_unique_key** table and **next_hi** column) and the
    low value from a local source. The **max_lo** value option is provided to define
    how many low values are added before a high value is fetched. The two values are
    added to generate a unique identifier.


