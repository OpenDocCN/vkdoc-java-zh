- fmt: "Normally, the key to a map can be a `String`, a `Long`, an `Integer`, and\
    \ so on. But what if you need to implement your own map key? Does Hibernate allow\
    \ you to map a component class as a key to a map? If so, how do you map components\
    \ as keys to a map?\n\n## Solution\n\nHibernate provides `<composite-map-key>`,\
    \ which lets you use components as map keys.\n\n## How It Works\n\nSuppose you\
    \ want to extend your collection of contact points to be of `java.util.Map` type.\
    \ You can use date periods as the keys of the map. You create a class `Period`\
    \ to encapsulate the start date and end date of a period, and you use that as\
    \ your map’s key type. You then define this period as a component in the `Orders`\
    \ class. The customer can now specify the most suitable contact point for a particular\
    \ date period:\n\n```\npublic class Period {\n\n    private Date startDate;\n\n\
    \    private Date endDate;\n\n    // Getters and Setters\n\n}\n```\n\n```\n<hibernate-mapping\
    \ package=\"com.metaarchit.bookshop\">\n\n    <class name=\"Orders\" table=\"\
    ORDERS\">\n\n        ...\n\n        <map name=\"contacts\" table=\"ORDERS_CONTACT\"\
    >\n\n            <key column=\"ORDER_ID\" />\n\n            <composite-map-key\
    \ class=\"Period\">\n\n                <key-property name=\"startDate\" type=\"\
    date\" column=\"START_DATE\" />\n\n                <key-property name=\"endDate\"\
    \ type=\"date\" column=\"END_DATE\" />\n\n            </composite-map-key>\n\n\
    \            <composite-element class=\"Contact\">\n\n                <property\
    \ name=\"recipient\" type=\"string\" column=\"RECIPIENT\" />\n\n             \
    \   <nested-composite-element name=\"phone\" class=\"Phone\">\n\n            \
    \        <property name=\"areaCode\" type=\"string\" column=\"PHONE_AREA_CODE\"\
    \ />\n\n                    <property name=\"telNo\" type=\"string\" column=\"\
    PHONE_TEL_NO\" />\n\n                </nested-composite-element>\n\n         \
    \       <many-to-one name=\"address\" class=\"Address\" column=\"ADDRESS_ID\"\
    \ />\n\n            </composite-element>\n\n        </map>\n\n    </class>\n\n\
    </hibernate-mapping>\n```\n\nFor the map-key component to work properly, you need\
    \ to override the `equals()` and `hashCode()` methods of the component class:\n\
    \n```\npublic class Period {\n\n    ...\n\n    public boolean equals(Object obj)\
    \ {\n\n        if (!(obj instanceof Period)) return false;\n\n        Period other\
    \ = (Period) obj;\n\n        return new EqualsBuilder().append(startDate, other.startDate)\n\
    \n                .append(endDate, other.endDate)\n\n                .isEquals();\n\
    \n    }\n\n    public int hashCode() {\n\n        return new HashCodeBuilder().append(startDate)\n\
    \n                .append(endDate)\n\n                .toHashCode();\n\n    }\n\
    \n}\n```\n\n## Summary\n\nIn this chapter, you’ve learned a way to achieve a finer-grained\
    \ object model by using value types as components. You’ve effectively created\
    \ an object graph for use in an application, but it’s represented in the database\
    \ as a single record in a table. You’ve also seen a way to bridge the gap between\
    \ relational model and object model by using simple `value` types. You’ve learned\
    \ how to nest components within other components and how to add the parent reference\
    \ in a component. And you’ve seen how to map a collection of components in an\
    \ entity and use components as key to a `java.util.Map`.\n\n# Inheritance and\
    \ Custom Mapping\n\nInheritance, polymorphic associations, and polymorphic queries\
    \ are supported by entities. The JPA specification says that both concrete and\
    \ abstract classes can be entities and can be mapped with the `Entity` annotation.\
    \ Non-entity classes and entity classes can extend each other. Hibernate provides\
    \ the `MappedSuperClass` annotation (`@MappedSuperclass`) to enable inheritance\
    \ mapping and to let you map abstract or concrete entity subclasses. The mapped\
    \ superclass doesn’t have its own separate table.\n\nHibernate provides four strategies\
    \ for mapping an inheritance hierarchy:\n\n- *Table per class hierarchy:* The\
    \ class hierarchy is represented in one table. A discriminator column identifies\
    \ the type and the subclass.\n- *Table per subclass:* The superclass has a table\
    \ and each subclass has a table that contains only un-inherited properties: the\
    \ subclass tables have a primary key that is a foreign key of the superclass."
