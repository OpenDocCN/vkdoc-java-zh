    ## 4.2 Mapping Entities with Table per Subclass


    ### Problem


    How do you map entities using the table per subclass strategy? And when should
    you use it?


    ### Solution


    To use the table per subclass strategy, you need to create a superclass `Disc`
    (and a corresponding table) and create a table per subclass that contains only
    un-inherited properties. The two tables are associated with a foreign key: the
    subclass tables have a primary key that is a foreign key of the superclass. The
    advantage of this strategy is that the model is normalized.


