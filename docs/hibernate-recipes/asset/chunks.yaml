    Summary


    This chapter has shown how to map a collection of **value** type objects to an
    entity. You’ve seen the implementation of **<set>** , **<bag>** , **<idbag>**
    , **<list>** , and **<map>** elements and their corresponding JPA annotations.
    You’ve learned the advantage of each collection mapping element and when it’s
    a good idea to use each of these elements. You’ve also seen how to sort a collection
    using a comparator and using the **order-by** clause. Finally, you’ve learned
    how and when lazy initialization should be turned off.


    **C H A P T E R 7**


    ■ ■ ■


    **Many-Valued Associations**


    A many-valued association is by definition a collection of references to entities.
    The collection can be of type **List**, **Set**, **Map**, and so on in Java.


    Why would you have a collection of references? When there is a parent/child relationship,
    and one parent can be associated to many children, the parent contains a collection
    of references to the child entities. In the case of a relational model, suppose
    two tables are dependent on each other, this can be represented as a foreign key
    column in the dependent table. For one row in the parent table, there exist many
    rows in the child table.


    You’ve seen this in earlier chapters that specified how to use collections. This
    chapter discusses one-to-many and many-to-many relationships in detail, including
    how they’re defined and how they’re represented in Hibernate using the XML configuration
    and using JPA annotations. You also learn how data is loaded and updated from/in
    the database when such relationships are defined.


    A one-to-many association is the most common and important type. A many-to-many
    association can be represented as two many-to-one associations. This model is
    more extensible, so it’s used more widely in applications. These associations
    can be unidirectional as well as bidirectional.


    7.1 Mapping a One-to-Many Association with a Foreign Key


    Problem


    How do you map objects using a one-to-many association with a foreign key? Can
    you establish this association from one direction only (unidirectional association)?
    When an operation such as update is executed on the parent object, users sometimes
    want the child object to be updated as well; this is called *cascading* in Hibernate.
    How do you use the cascading feature with a one-to-many association?


    Solution


    You can achieve a one-to-many relationship two ways in the database: by having
    a foreign key column in the dependent table or by creating a join table between
    the two tables. Each of these relationships can be unidirectional or bidirectional.
    The one-to-many unidirectional relationship is uncommon and isn’t a recommended
    way to map using Hibernate.


