    Summary


    In this chapter, you’ve learned how to create and use many-valued associations.
    The many-valued associations are of type one-to-many and many-to-many. The more
    widely used of these is the one-to-many association. Both one-to-many and many-to-many
    can be mapped in two ways: using a foreign key or using a join table.


    When you use a foreign key, you map the key in the parent table using the **<set>**
    mapping element with the key attribute as the foreign key column. The class to
    which it’s associated is specified by the


    **<one-to-many>** mapping element. With the **cascade** option, operations are
    cascaded from the parent entity to the associated entity.


    A many-to-many association is mapped using a join table. You create a join table
    to hold the IDs from the parent entity and the associated entity.


    A bidirectional association in both one-to-many and many-to-many mappings is represented
    using **inverse="true"** , which specifies that the inverse directional mapping
    from the associated entity to the parent entity can be traversed.


