- fmt: "Hibernate utilizes Simple Logging Facade for Java (`SLF4J`) to log various\
    \ system events. `SLF4J` is distributed as a free software license. It abstracts\
    \ the actual logging framework that an application uses.\n\n`SLF4J` can direct\
    \ your logging output to several logging frameworks:\n\n- `NOP`: Null logger implementation\n\
    - `Simple`: A logging antiframework that is very simple to use and that attempts\
    \ to solve every logging problem in one package\n- `Log4j version 1.2`: A widely\
    \ used open source logging framework\n- `JDK 1.4 logging`: A logging API provided\
    \ by Java\n- `JCL`: An open source Commons logging framework that provides an\
    \ interface with thin wrapper implementations for other logging tools\n- `Logback`:\
    \ A serializable logger that, when used, logs after its deserialization depending\
    \ on your chosen binding\n\nTo set up logging, you need `slf4j-api.jar` in your\
    \ classpath together with the jar file for your preferred binding—`slf4j-log4j12.jar`\
    \ in the case of log4j. You can also enable a property called `showsql` to see\
    \ the exact query being executed. You can configure a logging layer like Apache\
    \ log4j to enable Hibernate class- or package-level logging. And you can use the\
    \ Statistics Interface provided by Hibernate to obtain some detailed information.\n\
    \n## How It Works\n\nYou will have to configure the Hibernate property `show_sql`\
    \ and `log4J` to enable logging.\n\n### Inspecting the SQL Statements Issued by\
    \ Hibernate\n\nHibernate generates SQL statements that let you access the database\
    \ behind the scene. You can set the `show_sql` property to `true` in the `hibernate.cfg.xml`\
    \ XML configuration file to print the SQL statements to stdout:\n\n```\n<property\
    \ name=\"show_sql\">true</property>\n```\n\n### Configuring Log4j\n\nHibernate\
    \ can also use the log4j logging library to log SQL statements and parameters.\
    \ Make sure the `log4j.jar` file is included in your project’s classpath. Create\
    \ a properties file named `log4j.properties` in the source root folder; this file\
    \ is used to configure the log4j library:\n\n```\n### direct log messages to stdout\
    \ ###\nlog4j.appender.stdout=org.apache.log4j.ConsoleAppender\nlog4j.appender.stdout.Target=System.out\n\
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout\nlog4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd\
    \ HH:mm:ss} %5p %c{1}:%L - %m%n\n\n### direct messages to file hibernate.log ###\n\
    #log4j.appender.file=org.apache.log4j.FileAppender\n#log4j.appender.file.File=hibernate.log\n\
    #log4j.appender.file.layout=org.apache.log4j.PatternLayout\n#log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd\
    \ HH:mm:ss} %5p %c{1}:%L - %m%n\n\nlog4j.rootLogger=error, stdout\nlog4j.logger.org.hibernate.SQL=debug\n\
    log4j.logger.org.hibernate.type=debug\n```\n\n### Enabling Live Statistics\n\n\
    You can enable live statistics by setting the property `hibernate.generate_statistics`\
    \ in the configuration file:\n\n```\n<property name=\"hibernate.generate_statistics\"\
    >true</property>\n```\n\nYou can also enable live statistics programmatically\
    \ by using the Statistics Interface:\n\n```\nStatistics stats = sessionFactory.getStatistics();\n\
    stats.setStatisticsEnabled(true);\nTransaction tx = session.beginTransaction();\n\
    List<Book> books = session.createQuery(\"from Book\").list();\nfor(Book bo : books)\n\
    {\n    System.out.println(bo);\n}\nstats.getSessionOpenCount();\nstats.logSummary();\n\
    session.close();\n```\n\n## Generating a Database Schema Using Hibernate\n\n###\
    \ Problem\n\nHow can Hibernate help you generate or update a schema?\n\n### Solution\n\
    \nHibernate uses Apache Ant task definitions to create and update database schema.\n\
    \n### How It Works\n\n#### Creating an Ant Build File\n\nYou use Apache Ant to\
    \ define the building process. (For more information about Ant, see [http://ant.apache.org/](http://ant.apache.org/).)\
    \ Create the following `build.xml` file in the project root:\n\n```\n<project\
    \ name=\"BookShop\" default=\"schemaexport\">\n    <property name=\"build.dir\"\
    \ value=\"bin\" />\n    <property name=\"hibernate.home\" value=\"c:/hibernate-3.1\"\
    \ />\n    <property name=\"derby.home\" value=\"c:/derby\" />\n    <path id=\"\
    hibernate-Classpath\">\n        <fileset dir=\"${hibernate.home}\">\n        \
    \    <include name=\"**/*.jar\" />\n        </fileset>\n        <fileset dir=\"\
    ${derby.home}\">\n            <include name=\"lib/*.jar\" />\n        </fileset>\n\
    \        <pathelement path=\"${build.dir}\" />\n    </path>\n    <!-- Defining\
    \ Ant targets -->\n</project>\n```\n\n#### Generating Database Schema Using SchemaExport\n\
    \nYou use the `schemaexport` task provided by Hibernate to generate the SQL statements\
    \ to create a database schema. It reads the `dialect` property from the Hibernate\
    \ configuration file (`hibernate.cfg.xml`) to determine which brand of database\
    \ you’re using:\n\n```\n<target name=\"schemaexport\">\n    <taskdef name=\"schemaexport\"\
    \n        classname=\"org.hibernate.tool.hbm2ddl.SchemaExportTask\"\n        classpathref=\"\
    hibernate-Classpath\" />\n    <schemaexport config=\"${build.dir}/hibernate.cfg.xml\"\
    \n        output=\"BookShop.sql\" />\n</target>\n```\n\n#### Updating a Database\
    \ Schema Using SchemaUpdate\n\nDuring the development cycle, you may change your\
    \ object model frequently. It isn’t efficient to destroy and rebuild the schema\
    \ every time. The `schemaupdate` task updates an existing database schema:\n\n\
    ```\n<target name=\"schemaupdate\">\n    <taskdef name=\"schemaupdate\"\n    \
    \    classname=\"org.hibernate.tool.hbm2ddl.SchemaUpdateTask\"\n        classpathref=\"\
    hibernate-Classpath\" />\n    <schemaupdate config=\"${build.dir}/hibernate.cfg.xml\"\
    \ text=\"no\"/>\n</target>\n```\n\n#### Specifying the Details of a Database Schema\n\
    \nIn the previous mapping example, you discarded some table details, such as column\
    \ length and the not-null constraint. If you generate a database schema from this\
    \ mapping, you must provide these kinds of details:\n\n```\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.bookshop\">\n    <class name=\"Book\" table=\"\
    BOOK\">\n        <id name=\"isbn\" type=\"string\">\n            <column name=\"\
    ISBN\" length=\"50\" />\n        </id>\n        <property name=\"name\" type=\"\
    string\">\n            <column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\"\
    \ />\n        </property>\n        <property name=\"publishDate\" type=\"date\"\
    \ column=\"PUBLISH_DATE\" />\n        <property name=\"price\" type=\"int\" column=\"\
    PRICE\" />\n    </class>\n</hibernate-mapping>\n```\n\n## Summary\n\nIn this chapter,\
    \ you’ve learned what object/relational mapping is and what its benefits are over\
    \ JDBC. Hibernate is one of the most widely used ORM frameworks in the industry.\
    \ Using JDBC directly has many disadvantages, including complicated handling of\
    \ the `ResultSet` and the fact that it isn’t portable against different databases.\
    \ To overcome these issues, you can use ORM for ease of development and to maintain\
    \ software efficiently.\n\nTo configure Hibernate, you need various third-party\
    \ jars that must be specified in the classpath. The `.hbm` and `.hibernate.cfg.cml`\
    \ XML files are required in order to configure the objects that are mapped to\
    \ tables; they also contain the database connection details. You use `org.hibernate.SessionFactory`\
    \ to create `org.hibernate.Session` objects that represent units of work. Other\
    \ database operations are performed using the `Session` object.\n\nYou can also\
    \ perform Hibernate configuration and database operations with annotations. These\
    \ are Hibernate Annotations which implement the Java Persistence standards defined\
    \ by the EJB3.0 specification, and thus all details can be specified through annotations.\n\
    \n## Basic Mapping and Object Identity"
