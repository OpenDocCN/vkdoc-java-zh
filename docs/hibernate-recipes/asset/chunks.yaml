    \ Date publishDate;`\n\n`@Column (name=\"price\")`\n\n`private Long price;`\n\n\
    `@OneToMany(targetEntity=Chapter7_1.class,mappedBy=\"book\")`\n\n`@JoinColumn(name=\"\
    BOOK_ID\")`\n\n`@Cascade (value={CascadeType.SAVE_UPDATE,CascadeType.DELETE_ORPHAN})`\
    \ `Set chapters;`\n\n`// getters and setters`\n\n`}`\n\n## 7.3 Mapping a One-to-Many\
    \ Bidirectional Association Using a Join Table\n\n### Problem\n\n如何映射使用连接表的一对多关联的对象？\n\
    \n### Solution\n\n记住，你可以为多对一关联以及一对多关联使用连接表。通过使用`<many-to-many>`关联类型并标记`unique=\"\
    true\"`即可实现。\n\n### How It Works\n\n一个`book`对象可以关联多个`chapter`对象，因此从`Book`到`Chapter`的关联是一对多的。你首先将此关联定义为单向的——仅能从`book`导航到`chapter`——然后扩展为双向的。\n\
    \n## CHAPTER 7 ■ MANY-VALUED ASSOCIATIONS\n\n`Book`的映射如下：\n\n```\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter7\">\n  <class name=\"Book7_3\" table=\"\
    BOOK7_3\" schema=\"BookShop7\">\n    <id name=\"book_id\" column=\"BOOK_ID\" type=\"\
    long\">\n      <generator class=\"native\">\n      </generator>\n    </id>\n \
    \   <property name=\"isbn\" type=\"string\" column=\"ISBN\" />\n    <property\
    \ name=\"bookName\" type=\"string\" column=\"BOOK_NAME\" />\n    <property name=\"\
    publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />\n    <property name=\"\
    price\" type=\"long\" column=\"PRICE\" />\n    <set name=\"chapters\" table=\"\
    BOOK_CHAPTER\" schema=\"BookShop7\" cascade=\"save-update,delete-orphan\">\n \
    \     <key column=\"BOOK_ID\" />\n      <many-to-many column=\"CHAPTER_ID\" class=\"\
    Chapter7_3\" unique=\"true\"/>\n    </set>\n  </class>\n</hibernate-mapping>\n\
    ```\n\n连接表`BOOK_CHAPTER`被定义为集合表。`BOOK_ID`和`CHAPTER_ID`构成连接表的复合主键。你需要使用`<many-to-many>`元素，而不是`<one-to-many>`，因为一对多不知道连接表。通过将`unique`属性设置为`true`，你表明一个`Book`只能拥有一个`Chapter`一次（由`hashCode()`和`equals()`方法决定），从而间接实现了一对多关联。\n\
    \n使用JPA注解，`Book`类的映射如下。注意，`mappedBy`属性未设置，因为这是一个单向示例。此外，`Chapter`没有`Book`的实例：\n\
    \n`@Entity (name=\"bkch73\")`\n\n`@Table (name=\"BOOK7_3\", schema=\"BOOKSHOP7\"\
    )`\n\n`public class Book7_3 {`\n\n`@Id`\n\n`@GeneratedValue (strategy=GenerationType.TABLE)`\n\
    \n`@Column (name=\"BOOK_ID\")`\n\n`private long book_id;`\n\n`@Column (name=\"\
    ISBN\")`\n\n`private String isbn;`\n\n`@Column (name=\"book_Name\")`\n\n`private\
    \ String bookName;`\n\n`/*@Column (name=\"publisher_code\")`\n\n`String publisherCode;*/`\n\
