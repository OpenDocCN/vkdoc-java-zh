- fmt: "# Hibernate Mapping and Object Identity\n\n## Basic Mapping Configuration\n\
    \n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter2\" auto-import=\"\
    false\">\n    <class name=\"BookCh2\" table=\"BOOK\">\n        <id column=\"ISBN\"\
    \ type=\"long\">\n            <generator class=\"increment\" />\n        </id>\n\
    \        <property name=\"name\" type=\"string\" column=\"BOOK_NAME\" />\n   \
    \     <property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />\n\
    \        <property name=\"price\" type=\"int\" column=\"PRICE\" />\n    </class>\n\
    </hibernate-mapping>\n```\n\nThe `Identifier` is of type `long`, `short`, or `int`.\n\
    \nUsing the `increment` generator, the primary key of the table in which the record\
    \ is created is incremented. And using the `sequence` generator, the database\
    \ sequence is incremented. You can also use a sequence to generate a primary key\
    \ for multiple tables, whereas an `increment` generator can only be used to create\
    \ a primary key for its own table.\n\n## Using the Hilo Generator\n\nThe `hilo`\
    \ generator uses the hi/lo algorithm to generate the identifiers that are unique\
    \ to a particular database. It retrieves the high value from a global source (by\
    \ default, the `hibernate_unique_key` table and `next_hi` column) and the low\
    \ value from a local source. The `max_lo` value option is provided to define how\
    \ many low values are added before a high value is fetched. The two values are\
    \ added to generate a unique identifier.\n\nEdit the `Book.xml` mapping file as\
    \ shown here:\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ hibernate-mapping PUBLIC\n    \"-//Hibernate/Hibernate Mapping DTD 3.0//EN\"\
    \n    \"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd\">\n<hibernate-mapping\
    \ package=\"com.hibernaterecipes.chapter2\" auto-import=\"false\">\n    <class\
    \ name=\"BookCh2\" table=\"BOOK\">\n        <id column=\"ISBN\" type=\"long\"\
    >\n            <generator class=\"hilo\" />\n        </id>\n        <property\
    \ name=\"name\" type=\"string\" column=\"BOOK_NAME\" />\n        <property name=\"\
    publishDate\" type=\"date\" column=\"PUBLISH_DATE\" />\n        <property name=\"\
    price\" type=\"int\" column=\"PRICE\" />\n    </class>\n</hibernate-mapping>\n\
    ```\n\nThe `hilo` generator is of type `long`.\n\nThis generator should *not*\
    \ be used with a user-supplied connection. The high value *must* be fetched in\
    \ a separate transaction from the `Session` transaction, so the generator must\
    \ be able to obtain a new connection and commit it. Hence this implementation\
    \ may not be used when the user is supplying connections. In that case, a `SequenceHiLoGenerator`\
    \ is a better choice (where supported).\n\nThe `hilo` generator is used for batch\
    \ operations. When Hibernate is using an application server data source to obtain\
    \ connections enlisted with JTA, you must properly configure the `hibernate.transaction.manager_lookup_property`.\
    \ The `hibernate.transaction.manager_lookup` is the classname of a `TransactionManagerLookup`.\n\
    \n## Using JPA to Generate Identifiers\n\nFor the entity class using JPA annotations,\
    \ update the `Book` class to add the `@Id`, `@GeneratedValue`, and `@Column` annotations,\
    \ as shown next. The `strategy` value for `@GeneratedValue` is `GenerationType.AUTO`,\
