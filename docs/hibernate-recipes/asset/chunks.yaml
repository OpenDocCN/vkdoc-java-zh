    8.3 连接


    问题


    如何在 HQL 和 JPA QL 中创建各种类型的连接？


    解决方案


    Hibernate 和 JPA 都支持内连接和外连接。你可以使用点运算符（**.**）来表示隐式关联连接。


    **工作原理


    让我们看看你可以利用的所有不同类型的连接。


    显式连接


    在 HQL 中，你可以使用 **join** 关键字来连接关联对象。以下查询查找所有由出版社“Apress”出版的书籍。结果以 **Objects(Object[])**
    数组的形式包含一组对象对。每一对由一个 **book** 对象和一个 **publisher** 对象组成：


    ****from Book book join book.publisher publisher**


    **where publisher.name = ''Apress''**


    **除了多对一关联，所有其他类型的关联都可以进行连接。例如，你可以连接从 **book** 到 **chapters** 的一对多关联。以下查询查找所有包含标题为“Hibernate
    基础”章节的书籍。结果包含一组对象对；每一对由一个 **book** 对象和一个 **chapter** 集合组成：


    ****from Book book join book.chapters chapter**


    **where chapter.title = ''Hibernate Basics''**


    第 8 章 ■ HQL 与 JPA 查询语言


    隐式连接


    在前面的连接中，你指定了 **join** 关键字来连接关联对象。这种连接称为*显式连接*。你也可以直接通过名称引用关联：这会导致*隐式连接*。例如，前面的两个查询可以表示如下。结果只包含一个
    **book** 对象的列表，因为在 **from** 子句中没有指定连接：


    ****from Book book**


    **where book.publisher.name = ''Manning''**


    **请注意，隐式连接是沿着多对一或一对一关联进行的。它们永远不会沿着多对多关联进行。这意味着你永远不能使用类似这样的写法：


    **String QueryString3 =


    "from Book8_1 book where book.chapters.title = ''Many-To-Many Association''";
    **Query query1 = session.createQuery(QueryString3);**


    **List<Chapter8_1> chptrs = query1.list();**


    **正确的用法如下：


    **String queryString =


    "from Book8_1 book join book.chapters chapter where chapter.title=:title"; **Query
    query = session.createQuery(queryString);**


    **query.setString("title", "Many-To-Many Association");**


    **List books = query.list();**


    外连接


    如果你使用以下 HQL 查询与出版社连接的书籍，则不会包含出版社为空的书籍。这种连接称为*内连接*，如果你不指定连接类型或指定 **inner join**，则它是默认的连接方式。它与
    SQL 中的内连接含义相同：


    ****from Book book join book.publisher**


    **如果你想获取所有书籍，无论出版社是否为空，你可以通过指定 **left join** 或 **left outer join** 来使用左连接：


    ****from Book book left join book.publisher**


    **HQL 支持另外两种类型的连接：右连接和全连接。它们与 SQL 中的含义相同，但很少使用。


