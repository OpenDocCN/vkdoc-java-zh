    \n```\nfactory.evict(Book.class);\nfactory.evict(Book.class, id);\nfactory.evictEntity(\"\
    com.metaarchit.bookshop.Book\");\nfactory.evictEntity(\"com.metaarchit.bookshop.Book\"\
    , id);\n```\n\nAfter the cached object is evicted from cache, when you need to\
    \ fetch data from the database, the query is executed and the updated data is\
    \ retrieved. This avoids having stale data in cache. Note that the eviction from\
    \ the second-level cache is nontransactional, meaning that the cache region isn’t\
    \ locked during the eviction process.\n\n`CacheMode` options are provided to control\
    \ the interaction of Hibernate with the second level cache:\n\n```\nSession session1\
    \ = factory.openSession();\nSession.setCacheMode(CacheMode.IGNORE);\ntry {\n \
    \   Book book1 = new Book();\n    book1.setName(\"New Book\");\n    session1.save(book1);\n\
    \    session1.flush();\n} finally {\n    session1.close();\n}\n```\n\n`CacheMode.IGNORE`\
    \ tells Hibernate not to interact with second level cache for that session. Options\
