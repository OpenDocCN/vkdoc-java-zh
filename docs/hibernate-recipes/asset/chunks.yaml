    \ MAPPING AND OBJECT IDENTITY\n\n## Solution\n\nA table with a composite key can\
    \ be mapped with multiple properties of the class as identifier properties. The\
    \ `<composite-id>` element accepts `<key-property>` property mappings and `<key-many-to-one>`\
    \ mappings as child elements. The persistent class must override `equals()` and\
    \ `hashCode()` to implement composite identifier equality. It must also implement\
    \ `Serializable`.\n\n## How It Works\n\nIn some cases, you can use Hibernate to\
    \ access a legacy database that includes tables using a *composite key* (a primary\
    \ key composed of multiple columns). With this kind of legacy table, it isn’t\
    \ easy to add an ID column for use as primary key. Suppose you have a legacy `CUSTOMER`\
    \ table that was created using the following SQL statement:\n\n```sql\nCREATE\
    \ TABLE CUSTOMER (\n  COUNTRY_CODE VARCHAR(2) NOT NULL,\n  ID_CARD_NO VARCHAR(30)\
    \ NOT NULL,\n  FIRST_NAME VARCHAR(30) NOT NULL,\n  LAST_NAME VARCHAR(30) NOT NULL,\n\
    \  ADDRESS VARCHAR(100),\n  EMAIL VARCHAR(30),\n  PRIMARY KEY (COUNTRY_CODE, ID_CARD_NO)\n\
    );\n```\n\nYou input some data for this table using the following SQL statements:\n\
    \n```sql\nINSERT INTO CUSTOMER (COUNTRY_CODE, ID_CARD_NO, FIRST_NAME, LAST_NAME,\
    \ ADDRESS, EMAIL)\nVALUES ('mo', '1234567(8)', 'Gary', 'Mak', 'Address for Gary',\
    \ 'gary@mak.com');\n```\n\nFor the object model, you develop the following persistent\
    \ class for the `CUSTOMER` table. Each column is mapped to a `String`-type property:\n\
    \n```java\npublic class Customer {\n  private String countryCode;\n  private String\
    \ idCardNo;\n  private String firstName;\n  private String lastName;\n  private\
    \ String address;\n  private String email;\n  // Getters and Setters\n}\n```\n\
    \nThen, you create a mapping definition for the `Customer` class. You use `<composite-id>`\
    \ to define the object ID, which consists of two properties, `countryCode` and\
    \ `idCardNo`:\n\n```xml\n<hibernate-mapping>\n  <class name=\"Customer\" table=\"\
    CUSTOMER\">\n    <composite-id>\n      <key-property name=\"countryCode\" type=\"\
    string\" column=\"COUNTRY_CODE\" />\n      <key-property name=\"idCardNo\" type=\"\
    string\" column=\"ID_CARD_NO\"/>\n    </composite-id>\n    <property name=\"firstName\"\
    \ type=\"string\" column=\"FIRST_NAME\" />\n    <property name=\"lastName\" type=\"\
    string\" column=\"LAST_NAME\" />\n    <property name=\"address\" type=\"string\"\
    \ column=\"ADDRESS\" />\n    <property name=\"email\" type=\"string\" column=\"\
    EMAIL\" />\n  </class>\n</hibernate-mapping>\n```\n\nWhen a new persistent object\
    \ is added to your application, you need to define it in the `hibernate.cfg.xml`\
    \ configuration file:\n\n```xml\n<mapping resource=\"com/metaarchit/bookshop/Customer.hbm.xml\"\
    \ />\n```\n\nWhen you use `load()` or `get()` to retrieve a specified object from\
    \ the database, you need to provide that object’s ID. Which type of object should\
    \ be passed as the ID? At the moment, you can pass a newly created `Customer`\
    \ object with `countryCode` and `idCardNo` set. Note that Hibernate requires that\
    \ any ID class must implement the `java.io.Serializable` interface:\n\n```java\n\
    public class Customer implements Serializable {\n  ...\n}\n\nCustomer customerId\
    \ = new Customer();\ncustomerId.setCountryCode(\"mo\");\ncustomerId.setIdCardNo(\"\
    1234567(8)\");\nCustomer customer = (Customer) session.get(Customer.class, customerId);\n\
    ```\n\nIt doesn’t make sense to pass a whole persistent object as the ID. A better\
    \ way is to extract the fields that form the ID as a separate class:\n\n```java\n\
    public class CustomerId implements Serializable {\n  private String countryCode;\n\
    \  private String idCardNo;\n\n  public CustomerId(String countryCode, String\
    \ idCardNo) {\n    this.countryCode = countryCode;\n    this.idCardNo = idCardNo;\n\
    \  }\n}\n```\n\nThen, modify the `Customer` persistent class to use this new ID\
    \ class:\n\n```java\npublic class Customer implements Serializable {\n  private\
    \ CustomerId id;\n  private String firstName;\n  private String lastName;\n  private\
    \ String address;\n  private String email;\n```"
