    **<class name="Book" table="BOOK">**


    **<id name="isbn" type="string" column="ISBN" />**


    **<property name="name" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE"/>** 13


