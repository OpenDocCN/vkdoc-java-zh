    2.4 Dynamic SQL Generation in Hibernate


    Problem


    What does dynamic SQL generation mean? Why do you need to enable it, and how do
    you do so?


    CHAPTER 2 ■ BASIC MAPPING AND OBJECT IDENTITY


    Solution


    On application startup, Hibernate creates SQL statements for each of its persistent
    classes. That means Hibernate creates SQL statements for the Create, Read, Update,
    and Delete (CRUD) operations but doesn’t execute these statements. So, on application
    startup, an insert statement (create), a delete, a read, and an update are created.
    The update statement is created to update each and every field. At runtime, if
    the value isn’t changed, it’s updated with the old value. The CRUD statements
    are cached in memory by Hibernate.


    Dynamic SQL generation means turning off this Hibernate feature. You may want
    to do so because the feature can mean a longer startup time for the application.
    The amount of time depends on the number of entity classes in the application.
    Caching these SQL statements in memory can impact the performance of sensitive
    application more in terms of unnecessary memory.


    How It Works


    For the class element, add the attributes **dynamic-insert** and **dynamic-update**
    and set them to true. The **Book.xml** mapping file becomes the following:


    ****<?xml version= *"1.0"*** **encoding= *"UTF-8"*** **?>**


    **<!DOCTYPE hibernate-mapping PUBLIC**


    **"-//Hibernate/Hibernate Mapping DTD 3.0//EN"**


    [**"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)


    **<hibernate-mapping package="com.hibernaterecipes.chapter2" auto-import="false">**


    <class name="BookCh2" table="BOOK" dynamic-insert="true" dynamic-update="true">


    **<id column="isbn" type="long">**


    **<generator class="native">**


    **</generator>**


    **</id>**


    **<property name="name" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="int" column="PRICE" />**


    **</class>**


    **</hibernate-mapping>**


    **The annotation mapping is as follows:


    ****package com.hibernaterecipes.annotations.domain;**'
  trans: '

    如果使用自动生成 ID 类型的持久化对象，在调用 **saveOrUpdate()** 方法时传入空的 ID 值，它会被视为需要插入数据库的新对象。Hibernate
    会先为该对象生成一个 ID，然后执行 **INSERT** 语句。反之，如果 ID 值不为空，Hibernate 会将其视为已存在的对象，并为其执行 **UPDATE**
    语句。


    Hibernate 如何判断 ID 为空？对于 **Book** 类，**isbn** 类型是原始类型 **long**。你需要指定一个数字作为未保存的值。通常，你会选择“0”作为未保存的值，因为它是
    **long** 数据类型的默认值。但问题在于，你无法拥有一个 ID 值真正为“0”的对象：


    ****<id name="isbn" type="long" column="ISBN" unsaved-value="0">**


    **<generator class="native"/>**


    **</id>**


    **这个问题的解决方案是使用原始类型的包装类作为你的 ID 类型（本例中为 **java.lang.Long**）。这样，null 就会被视为未保存的值。你可以使用
    **long** 数据类型范围内的任何数字作为 ID 值：


    ****public class Book {**


    private Long isbn;


    **private String name;**


    **private Publisher publisher;**


    **private Date publishDate;**


    **private int price;**


    **private List chapters;**


    **// Getters and Setters**


    **}**


    **其他持久化属性也是如此，例如 **Book** 类中的 **price** 属性。


    当一本书的价格未知时，应该给这个字段赋什么值？是“0”还是负数？两者似乎都不合适。相反，你可以将类型改为原始类型的包装类（本例中为 **java.lang.Integer**），并使用
    null 来表示未知值：


    ****public class Book {**


    **private Long isbn;**


    **private String name;**


    **private Publisher publisher;**


    **private Date publishDate;**


    private Integer price;


    **private List chapters;**


    **// Getters and Setters**


    **}**


    2.4 Hibernate 中的动态 SQL 生成


    问题


    动态 SQL 生成是什么意思？为什么需要启用它，以及如何启用？


    第 2 章 ■ 基本映射与对象标识


    解决方案


    在应用程序启动时，Hibernate 会为其每个持久化类创建 SQL 语句。这意味着 Hibernate 会为创建、读取、更新和删除（CRUD）操作创建 SQL
    语句，但不会执行这些语句。因此，在应用程序启动时，会创建一条插入语句（创建）、一条删除语句、一条读取语句和一条更新语句。更新语句用于更新每一个字段。在运行时，如果值没有改变，则会用旧值进行更新。这些
    CRUD 语句会被 Hibernate 缓存在内存中。


    动态 SQL 生成意味着关闭 Hibernate 的这一特性。你可能想要这样做，因为该特性可能导致应用程序启动时间变长。启动时间的长短取决于应用程序中实体类的数量。将这些
    SQL 语句缓存在内存中，可能会在不必要的内存占用方面影响对性能敏感的应用程序。


    工作原理


    对于 class 元素，添加 **dynamic-insert** 和 **dynamic-update** 属性，并将其设置为 true。**Book.xml**
    映射文件变为以下内容：


    ****<?xml version= *"1.0"*** **encoding= *"UTF-8"*** **?>**


    **<!DOCTYPE hibernate-mapping PUBLIC**


    **"-//Hibernate/Hibernate Mapping DTD 3.0//EN"**


    [**"http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd">**](http://hibernate.sourceforge.net/hibernate-mapping-3.0.dtd)


    **<hibernate-mapping package="com.hibernaterecipes.chapter2" auto-import="false">**


    <class name="BookCh2" table="BOOK" dynamic-insert="true" dynamic-update="true">


    **<id column="isbn" type="long">**


    **<generator class="native">**


    **</generator>**


    **</id>**


    **<property name="name" type="string" column="BOOK_NAME" />**


    **<property name="publishDate" type="date" column="PUBLISH_DATE" />**


    **<property name="price" type="int" column="PRICE" />**


    **</class>**


    **</hibernate-mapping>**


    **注解映射如下：


    ****package com.hibernaterecipes.annotations.domain;**

    '
- fmt: "```java\nimport java.util.Date;\nimport javax.persistence.Column;\nimport\
    \ javax.persistence.Entity;\nimport javax.persistence.GeneratedValue;\nimport\
    \ javax.persistence.GenerationType;\nimport javax.persistence.Id;\nimport javax.persistence.Table;\n\
    import org.hibernate.annotations.AccessType;\n```\n\n```java\n/**\n * CHAPTER\
    \ 2 ■ BASIC MAPPING AND OBJECT IDENTITY\n * @author Guruzu\n */\n@Entity\n@org.hibernate.annotations.Entity(dynamicInsert\
    \ = true, dynamicUpdate = true)\n@Table(name = \"BOOK\")\npublic class BookCh2\
    \ {\n\n    @Id\n    @GeneratedValue(strategy = GenerationType.TABLE)\n    @Column(name\
    \ = \"ISBN\")\n    private long isbn;\n\n    @Column(name = \"book_Name\")\n \
    \   private String bookName;\n\n    @Column(name = \"publish_date\")\n    private\
    \ Date publishDate;\n\n    @Column(name = \"price\")\n    private Long price;\n\
    \n    // getters and setters\n}\n```\n\nWith the `dynamic-insert` property set\
    \ to `true`, Hibernate does *not* include null values for properties (for properties\
    \ that aren’t set by the application) during an `INSERT` operation. With the `dynamic-update`\
    \ property set to `true`, Hibernate does *not* include unmodified properties in\
    \ the `UPDATE` operation.\n\n## 2.5 Naming Entities in Hibernate\n\n### Problem\n\
