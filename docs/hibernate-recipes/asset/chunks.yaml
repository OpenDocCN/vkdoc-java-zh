    ## About the Authors


    **Srinivas Guruzu** is a Developer who has been coding for more than 8 years.
    After completing his MS in Mechanical Engineering, Srinivas worked on high traffic
    payment systems in the banking domain. He also has experience working in the insurance
    domain. Lately, he’s been working with Spring and Hibernate building applications
    that integrate with other products as a part of large customer enrollment and
    file transmission system.


    **Gary Mak**, founder and chief consultant of Meta-Archit Software Technology
    Limited, has been a technical architect and application developer on the enterprise
    Java platform for over seven years. He is the author of the Apress books *Spring
    Recipes: A Problem-Solution Approach* and *Pro SpringSource dm Server*. In his
    career, Gary has developed a number of Java-based software projects, most of which
    are application frameworks, system infrastructures, and software tools. He enjoys
    designing and implementing the complex parts of software projects. Gary has a
    master’s degree in computer science. His research interests include object-oriented
    technology, aspect-oriented technology, design patterns, software reuse, and domain-driven
    development.


    Gary specializes in building enterprise applications on technologies including
    Spring, Hibernate, JPA, JSF, Portlet, AJAX, and OSGi. He has been using the Spring
    Framework in his projects for five years, since Spring version 1.0. Gary has been
    an instructor of courses on enterprise Java, Spring, Hibernate, Web Services,
    and agile development. He has written a series of Spring and Hibernate tutorials
    as course materials, parts of which are open to the public, and they’re gaining
    popularity in the Java community.


    In his spare time, he enjoys playing tennis and watching tennis competitions.


    ## About the Technical Reviewer


    Sumit Pal has about 16 years of experience with Software Architecture, Design
    & Development on a variety of platforms including Java, J2EE. Sumit has worked
    in SQLServer Replication group, while with Microsoft for 2 years & with Oracle''s
    OLAP Server group, while with Oracle for 7 years. Apart from Certifications like
    IEEE-CSDP and J2EE Architect, Sumit also has an MS in Computer Science from the
    Asian Institute of Technology, Thailand.


    Sumit has keen interest in Database Internals, Algorithms and Search Engine Technology
    Data Mining and Machine Learning. He has invented both basic generalized algorithms
    to find divisibility between numbers, as well as divisibility rules for prime
    numbers less than 100.


    Sumit loves badminton and swimming, is an amateur astrophysicist, and is inculcating
    green habits into his daily life.


    Sumit works as the Architect at Leapfrogrx.com


    ## Acknowledgments


    Would I do it again? Writing a book, I mean. Of course, Yes! However, anyone who
    believes a book project is a simple effort does not have any idea what goes into
    it. It takes a lot of commitment, focus, and support from family and friends.


    Josh Long, thank you, thank you, thank you very much for introducing me to Apress;
    for believing in me and guiding me through everything that a new author like me
    needed to know. Gary Mak, thank you, for trusting me and letting me be a co-author
    for this book. Thank you, Apress and Steve Anglin for giving me the opportunity
    to write this book and trusting Josh Long’s instincts. Tom Welsh, Sumit Pal, and
    Dionysios G. Synodinos, thank you, for reviewing and providing excellent suggestions.
    Being a first time author, the suggestions provided were of immense help in developing
    the book. Anita Castro answered the book and non-book related questions very patiently.
    Tiffany Taylor helped with grammar, spelling and consistency throughout the book.
    I am very grateful for support and help provided by the Apress team.


    To my lovely wife, Usha, without whom I would not have been able to complete this
    book.


    Srinivas Guruzu


    *Scottsdale, AZ*


