    ```\n\n## 10.4 Using Data Filters\n\n### Problem\n\nSuppose your bookshop has\
    \ a lot of children and teenagers as users. You want to make the bookshop kid\
    \ friendly by classifying users according to their age range. (You don’t want\
    \ a child to be able to buy a book meant for an adult reader.) How can you achieve\
    \ this by using the data-filtering mechanism provided by Hibernate?\n\n### Solution\n\
    \nEvery `Book` class has a `UserRank` class that specifies the lowest rank that\
    \ can access a book. Books for adults have a user rank of 3, and books for children\
    \ have a user rank of 1.\n\nYou define a filter definition (`<filter-def>`) in\
    \ the metadata, which can be declared in any XML mapping file as long as it’s\
    \ inside a `<hibernate-mapping>` element. You need to provide a globally unique\
    \ name to the filter definition. You apply and implement the filter in `Book`’s\
    \ mapping XML file. And finally, you enable the filter on the session that is\
    \ used to query.\n\n### How It Works\n\nFirst, you create the `UserRank` class\
    \ and the `Book` class. The `UserRank` class includes the user rank and the user\
    \ type. The `Book` class is associated with the `UserRank` class:\n\n```java\n\
    public class UserRank {\n\n    private long rank;\n    private String userType;\n\
    \n    // getters and setters\n}\n```\n\n```java\npublic class Book {\n\n    private\
    \ Long book_id;\n    private String isbn;\n    private String name;\n    private\
    \ String publisher;\n    private Date publishDate;\n    private Integer price;\n\
    \    private UserRank userRank;\n\n    // getters and setters\n}\n```\n\nThe mapping\
    \ files for `UserRank` and `Book` are shown next. You define the filter in the\
    \ `UserRank` mapping file by providing a globally unique name and the filter parameters\
    \ it requires. You use the `<filter-def>` element and `<filter-param>` elements\
    \ to define a filter:\n\n```xml\n<hibernate-mapping package=\"com.hibernaterecipes.chapter10\"\
    \ auto-import=\"false\" >\n    <import class=\"UserRank\" rename=\"userRank\"\
    />\n    <class name=\"UserRank\" table=\"UserRank\" dynamic-insert=\"true\" dynamic-update=\"\
    true\"\n           schema=\"BOOK\">\n        <id name=\"rank\" column=\"RANK\"\
    \ type=\"long\">\n            <generator class=\"assigned\">\n            </generator>\n\
    \        </id>\n        <property name=\"userType\" type=\"string\" column=\"\
    USERTYPE\" />\n    </class>\n\n    <filter-def name=\"filterByRank\">\n      \
    \  <filter-param name=\"currentRank\" type=\"long\"/>\n        <filter-param name=\"\
    requestedRank\" type=\"long\"/>\n    </filter-def>\n</hibernate-mapping>\n```\n\
    \nIn the `Book` mapping class, you apply the defined filter to instances of the\
    \ `Book` class. You use `<filter>` to implement the filter. The `condition` attribute\
    \ is a SQL expression that must evaluate to true if the results must pass the\
