  raw: '• *Read Uncommitted:* Changes made by one transaction are made visible to
    other transactions before they’re committed. All types of reads, including dirty
    reads, are permitted. This isolation level isn’t recommended for use. If a transaction’s
    uncommitted changes are rolled back, other concurrent transactions may be


    seriously affected.


    CHAPTER 13 ■ TRANSACTIONS AND CONCURRENCY


    *Table 13-5\. Summarizing the Reads That Are Permitted for Various Isolation Levels*
    **Isolation level**


    **Dirty Read**


    **Unrepeated Read**


