    14.2 创建数据访问层


    问题


    什么是数据访问层？既然之前的方案看起来运行良好，为什么还需要数据访问层？如何为之前的方案添加数据访问层？


    解决方案


    数据访问对象（DAO）层抽象了对持久化存储中数据的访问。持久化存储可以是数据库或文件系统。DAO 层对应用程序隐藏了持久化存储的细节。DAO 层可以返回对象的引用，而不是数据库中的字段行，这实现了
    254


    第 14 章 ■ Web 应用程序


    更高层次的抽象。它实现了与数据源交互的机制。业务层使用 DAO 提供的接口来与数据源进行交互。


    工作原理


    让我们看看如何创建数据访问层。


    在数据访问对象中组织数据访问


    到目前为止，你将 Hibernate 相关的代码放在了 servlet 内部。换句话说，你将表示逻辑和数据访问逻辑混在了一起。这绝对不是一个好习惯。在多层的应用程序中，表示逻辑和数据访问逻辑应该分离，以实现更好的可重用性和可维护性。DAO
    设计模式封装了数据访问逻辑。它管理与数据源的连接，以存储、检索和更新数据。使用此模式的一个良好实践是为每个持久化类创建一个 DAO，并将与该类相关的所有数据操作都放在这个
    DAO 内部：


