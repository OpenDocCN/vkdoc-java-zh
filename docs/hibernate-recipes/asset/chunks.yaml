    属性设置为 true，以将 SQL 语句打印到标准输出：


    **<property name="show_sql">true</property>**


    配置 Log4j


    Hibernate 也可以使用 log4j 日志库来记录 SQL 语句和参数。确保 **log4j.jar** 文件包含在你的项目类路径中。在源根文件夹中创建一个名为
    **log4j.properties** 的属性文件；该文件用于配置 log4j 库：


