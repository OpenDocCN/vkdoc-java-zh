    和 **Address** 之间存在一对一关系。如何在 Hibernate 中表示一对一关联？


    解决方案


    映射一对一关联最简单的方法是将其视为多对一关联，但为其添加唯一约束。你可以以相同的方式声明 **lazy**、**fetch** 和 **cascade**
