- fmt: "# How do you represent this data structure in Hibernate? And what are the\
    \ additional features that it provides to manage this kind of association?\n\n\
    ## CHAPTER 5 ■ MANY-TO-ONE AND ONE-TO-ONE MAPPING\n\n### Solution\n\nHibernate\
    \ provides the `<join>` mapping element to represent a join table.\n\n### How\
    \ It Works\n\nUse the following SQL queries to generate the tables:\n\n```sql\n\
    CREATE TABLE \"BOOK5\".\"BOOK_PUBLISHER\"\n(\n  BOOK_ID bigint PRIMARY KEY NOT\
    \ NULL,\n  PUBLISHER_ID bigint NOT NULL\n);\n\nCREATE UNIQUE INDEX SQL091217230605770\
    \ ON BOOK_PUBLISHER(BOOK_ID);\n\nCREATE TABLE \"BOOK5\".\"BOOK5_2\"\n(\n  BOOK_ID\
    \ bigint PRIMARY KEY NOT NULL,\n  ISBN varchar(50) NOT NULL,\n  BOOK_NAME varchar(100)\
    \ NOT NULL,\n  PUBLISH_DATE date,\n  PRICE int\n);\n\nCREATE UNIQUE INDEX SQL091217225248451\
    \ ON BOOK5_2(BOOK_ID);\nCREATE UNIQUE INDEX SQL091217225248450 ON BOOK5_2(ISBN);\n\
    \nCREATE TABLE \"BOOK5\".\"PUBLISHER5_2\"\n(\n  PUBLISHER_ID bigint PRIMARY KEY\
    \ NOT NULL,\n  CODE varchar(4) NOT NULL,\n  PUBLISHER_NAME varchar(100) NOT NULL,\n\
    \  ADDRESS varchar(200)\n);\n\nCREATE UNIQUE INDEX SQL091217225248980 ON PUBLISHER5_2(CODE);\n\
    CREATE UNIQUE INDEX SQL091217225248981 ON PUBLISHER5_2(PUBLISHER_ID);\n```\n\n\
    The book mapping file is as follows:\n\n```xml\n<hibernate-mapping package=\"\
    com.hibernaterecipes.chapter5\">\n  <class name=\"Book5_2\" table=\"Book5_2\"\
    \ schema=\"BOOK5\">\n    <id name=\"book_id\" type=\"long\" column=\"BOOK_ID\"\
    \ >\n      <generator class=\"native\">\n      </generator>\n    </id>\n    <property\
    \ name=\"isbn\" type=\"string\">\n      <column name=\"ISBN\" length=\"50\" not-null=\"\
    true\" unique=\"true\" />\n    </property>\n    <property name=\"name\" type=\"\
    string\">\n      <column name=\"BOOK_NAME\" length=\"100\" not-null=\"true\" />\n\
    \    </property>\n    <property name=\"publishDate\" type=\"date\" column=\"PUBLISH_DATE\"\
    \ />\n    <property name=\"price\" type=\"int\" column=\"PRICE\" />\n    <join\
    \ table=\"BOOK_PUBLISHER\" optional=\"true\" schema=\"BOOK5\">\n      <key column=\"\
    BOOK_ID\" unique=\"true\" />\n      <many-to-one name=\"publisher\" class=\"Publisher5_2\"\
    \ column=\"PUBLISHER_ID\" not-null=\"true\" cascade=\"save-update\" lazy=\"false\"\
    />\n    </join>\n  </class>\n</hibernate-mapping>\n```\n\nIn the `<join>` mapping\
    \ element, the `table` attribute holds the name of the join table—here it’s `BOOK_PUBLISHER`.\
    \ By setting `optional=true`, you tell Hibernate that it should insert a row into\
    \ the join table only if the properties grouped by the mapping are non-null. `Book_Id`\
    \ is the primary key in the join table and is implicitly unique. The `<many-to-one>`\
    \ attribute specifies that this join table has a many-to-one relationship with\
    \ the `Publisher` entity and the key column is `Publisher_id`. Figure 5-2 shows\
    \ the entity relationship drawing for a many-to-one association with a join table.\n\
    \n*Figure 5-2. Entity-relationship drawing showing a many-to-one association with\
    \ a join table*\n\nThe JPA mapping for the book class is as follows. You use the\
    \ `JoinTable` annotation to map the join table `BOOK_PUBLISHER`:\n\n```java\n\
    @Entity\n@Table (name=\"BOOK5_2\", schema=\"BOOK5\")\npublic class Book_5_2 implements\
    \ Serializable{\n  @Id\n  @Column(name=\"BOOK_ID\")\n  @GeneratedValue(strategy=GenerationType.AUTO)\n\
    \  private Long book_id;\n\n  @Column(name=\"isbn\")\n  private String isbn;\n\
    \n  @Column(name=\"BOOK_NAME\")\n  private String name;\n\n  @ManyToOne\n  @Cascade(value=CascadeType.SAVE_UPDATE)\n\
    \  @JoinTable(schema=\"BOOK5\",name=\"BOOK_PUBLISHER\",\n    joinColumns=@JoinColumn(name=\"\
    BOOK_ID\"),\n    inverseJoinColumns=@JoinColumn(name=\"PUBLISHER_ID\"))\n  private\
    \ Publisher5_2 publisher;\n\n  @Column(name=\"price\")\n  private Integer price;\n\
    \n  // getters and setters\n}\n```\n\nThe join table `BOOK_PUBLISHER` has a foreign\
    \ key column named `PUBLISHER_ID` that points to the `PUBLISHER` table materialized\
    \ by `inverseJoinColumns`, and a foreign key column named `BOOK_ID` pointing to\
    \ the `BOOK` table materialized by the `joinColumns` attribute."
