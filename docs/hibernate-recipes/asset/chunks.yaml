    5.2 使用连接表实现多对一关联


    问题


    假设有一组书已被确定将要出版，但尚未为这些书分配出版商。同样，你可能有一些出版商已准备好出版书籍，但书籍尚未编写完成。在这种情况下，如果你使用相同的 **Book**
    和 **Publisher** 实体，那么在 **PUBLISHER** 表中会出现 **Book_Id** 为 null 的行，在 **BOOK** 表中也会出现
    **Publisher_Id** 为 null 的行。这不是在关系数据库中存储数据的有效方式，也无法提供规范化的模式。


    在这种情况下，你可以使用一个额外的表，称为*连接表*，该表包含外键 **Book_id** 和 **Publisher_Id** 作为列。这个表包含了所有
    **Book** 有 **Publisher** 且 **Publisher** 已出版 **Book** 的行。

