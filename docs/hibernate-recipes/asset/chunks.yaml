    \ name in the code. These are called *named queries*. But for easier maintenance,\
    \ you should centralize all your named queries in one mapping definition, say\
    \ `NamedQuery.hbm.xml`. In addition, setting up a mechanism for naming queries\
    \ is also beneficial—you need to assign each query a unique name. You should also\
    \ put the query string in a `<![CDATA[...]]>` block to avoid conflicts with special\
    \ XML characters. Named queries don’t have to be HQL or JPA QL strings—they can\
    \ be native SQL queries:\n\n```xml\n<hibernate-mapping>\n  <query name=\"Book.by.isbn\"\
    >\n    <![CDATA[from Book where isbn = ?]]>\n  </query>\n</hibernate-mapping>\n\
    ```\n\nTo reference a named query, you use the `session.getNamedQuery()` method:\n\
    \n```java\nQuery query = session.getNamedQuery(\"Book.by.isbn\");\nquery.setString(0,\
    \ \"1932394419\");\nBook book = (Book) query.uniqueResult();\n```\n\nThe JPA specifies\
    \ the `@NamedQuery` and `@NamedNativeQuery` annotations. The `name` and `query`\
    \ attributes are required. You can place these annotations in the metadata of\
    \ a particular entity or into a JPA XML file:\n\n```java\n@NamedQueries({\n  @NamedQuery(\n\
    \    name=\"Book.by.isbn\",\n    query=\"from Book where isbn = ?\"\n  )\n})\n\
