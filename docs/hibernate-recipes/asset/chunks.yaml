    the **Chapter** class. In contrast, a **Book** object has a list of **Chapter**
    objects (one-to-many association). This is a case of an *object-relational mismatch*,
    which focuses on the association between two classes or tables in their corresponding
    model. To handle the incompatibility of these models, you need to do some conversion/translation
    when you retrieve and save your object model. This is called object/relational
    mapping (O/R Mapping or ORM).


    Let’s say your Bookshop sells audio and video discs. In the object-oriented model,
    this can be represented by using a **Disc** superclass and two subclasses called
    **AudioDisc** and **VideoDisc** (see Figure 1-4). On the relational database side,
    you don’t have a way to map this inheritance relationship.


    This is a major object-relational system mismatch.


    CHAPTER 1 ■ STARTING WITH HIBERNATE


