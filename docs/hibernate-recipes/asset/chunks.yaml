    Hibernate 使用 Java 简易日志门面（SLF4J）来记录各种系统事件。SLF4J 以自由软件许可证的形式发布。它抽象了应用程序所使用的实际日志框架。


    SLF4J 可以将你的日志输出定向到多个日志框架：


    • *NOP:* 空日志记录器实现


    • *Simple:* 一个非常易于使用的反日志框架，它试图在一个包中解决所有日志问题


    • *Log4j 版本 1.2:* 一个广泛使用的开源日志框架


    • *JDK 1.4 日志:* Java 提供的一个日志 API


