- fmt: "# Sending Scripts Output to a File\n\nYou can customize the input source,\
    \ output destination, and error output destination of a script execution. You\
    \ need to set appropriate reader and writers for the `ScriptContext` that is used\
    \ to execute a script. The following snippet of code will write the script output\
    \ to a file named `jsoutput.txt` in the current directory:\n\n```\n// Create a\
    \ FileWriter\nFileWriter writer = new FileWriter(\"jsoutput.txt\");\n\n// Get\
    \ the default context of the engine\nScriptContext defaultCtx = engine.getContext();\n\
    \n// Set the output writer for the default context of the engine\ndefaultCtx.setWriter(writer);\n\
    ```\n\nThe code sets a custom output writer for the default context of the `ScriptEngine`\
    \ that will be used during the execution of scripts that use the default context.\
    \ If you want to use a custom output writer for a specific execution of a script,\
    \ you need to use a custom `ScriptContext` and set its writer.\n\n**Tip:** Setting\
    \ a custom output writer for a `ScriptContext` does not affect the destination\
    \ of the standard output of the Java application. To redirect the standard output\
    \ of the Java application, you need to use the `System.setOut()` method.\n\nListing\
    \ 3-7 shows how to write output of a script execution to a file named `jsoutput.txt`.\
    \ The program prints the full path of the output file on the standard output.\
    \ You may get a different output when you run the program. You need to open the\
    \ output file in a text editor to see the script’s output.\n\n## Listing 3-7.\
    \ Writing the Output of Scripts to a File\n\n```\n// CustomScriptOutput.java\n\
    package com.jdojo.script;\n\nimport java.io.File;\nimport java.io.FileWriter;\n\
    import java.io.IOException;\nimport javax.script.ScriptContext;\nimport javax.script.ScriptEngine;\n\
    import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
    \npublic class CustomScriptOutput {\n    public static void main(String[] args)\
    \ {\n        // Get the Nashorn engine\n        ScriptEngineManager manager =\
    \ new ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n\n        // Print the absolute path of the output file\n    \
    \    File outputFile = new File(\"jsoutput.txt\");\n        System.out.println(\"\
    Script output will be written to \" +\n            outputFile.getAbsolutePath());\n\
    \n        FileWriter writer = null;\n        try {\n            writer = new FileWriter(outputFile);\n\
    \n            // Set a custom output writer for the engine\n            ScriptContext\
    \ defaultCtx = engine.getContext();\n            defaultCtx.setWriter(writer);\n\
    \n            // Execute a script\n            String script = \"print('Hello\
    \ custom output writer')\";\n            engine.eval(script);\n        }\n   \
    \     catch (IOException | ScriptException e) {\n            e.printStackTrace();\n\
    \        }\n        finally {\n            if (writer != null) {\n           \
    \     try {\n                    writer.close();\n                }\n        \
    \        catch (IOException e) {\n                    e.printStackTrace();\n \
    \               }\n            }\n        }\n    }\n}\n```\n\n`Script output will\
    \ be written to C:\\jsoutput.txt`\n\n## Summary\n\nYou can pass parameters to\
    \ the script using the `ScriptContext`. An instance of the `Bindings` interface\
    \ serves as the parameter holder. The `Bindings` interface inherits from the `Map`\
    \ interface imposing a restriction that its keys must be nonempty, non-null `String`s.\
    \ The `SimpleBinding` class is an implementation of the `Bindings` interface.\
    \ It is preferred to use the `createBindings()` method of `ScriptEngine` to get\
    \ an instance of the `Bindings` interface giving `ScriptEngine` a chance to returned\
    \ a specialized implementation of the `Bindings` interface. A `Bindings` is associated\
    \ with a scope that can be an engine scope or a global scope. Parameters passed\
    \ in the engine scope takes precedence over the parameters passed in the global\
    \ scope. Parameters passed can be local to a script engine, local to a script\
    \ execution, or global to all script engines created by a `ScriptManager`.\n\n\
    A script engine executes a script in a context that consists of four components:\
    \ a set of `Bindings`, where each `Bindings` is associated with a different scope,\
    \ a `Reader` that is used by the script engine to read inputs, a `Writer` that\
    \ is used by the script engine to write outputs, and an error `Writer` that is\
    \ used by the script engine to write error outputs. An instance of the `ScriptContext`\
    \ interface represents a context for the script execution. The `SimpleScriptContext`\
    \ class is an implementation of the `ScriptContext` interface.\n\nThe set of `Bindings`\
    \ in a context is used to pass parameters to the script. A reader and writers\
    \ in a context control input source and output destinations of the script, respectively.\
    \ For example, by setting a file writer as a writer, you can send all outputs\
    \ from a script to a file. Every `ScriptEngine` has a default `ScriptContext`\
    \ that is used to execute scripts when no `ScriptContext` is passed to the `eval()`\
    \ method. The `getContext()` method of `ScriptEngine` returns the default context\
    \ of the engine. You can also pass a separate `ScriptContext` with the `eval()`\
    \ method that will be used to execute your script, leaving the default `ScriptContext`\
    \ of the engine untouched.\n\n# Writing Scripts in Nashorn\n\nIn this chapter,\
    \ you will learn:\n\n- How to write scripts in Nashorn\n- The difference between\
    \ running the script in strict mode and nonstrict mode\n- How to declare variables\
    \ and write comments\n- Primitive and object data types, and how to convert values\
    \ of one data type to another data type\n- Operators, statements, and creating\
    \ and invoking functions in Nashorn\n- Different ways of creating and using objects\n\
    - Variable scoping and hoisting\n- About built-in global objects and functions\n\
    \nNashorn is a runtime implementation of the ECMAScript 5.1 specification on the\
    \ JVM. ECMAScript defines its own syntax and constructs for declaring variables,\
    \ writing statements, operators, creating and using objects, collections, iterating\
    \ over collections of data, and so on. Nashorn is 100 percent compliant with the\
    \ ECMAScript 5.1, so you have a new set of language syntax to learn when you work\
    \ with Nashorn. For example, working with objects in Nashorn is entirely different\
    \ from working with objects in Java.\n\nThis chapter assumes that you have at\
    \ least a beginner-level understanding of the Java programming language. I will\
    \ not explain details of the constructs and syntax offered by Nashorn that work\
    \ the same way as they work in Java. For example, I will not explain what the\
    \ assignment operator `=` in Nashorn does. Rather, I will simply mention that\
    \ the assignment operator `=` works the same in Nashorn and Java. The power of\
    \ Nashorn is that it lets you use Java libraries inside scripts. However, to use\
    \ Java libraries inside Nashorn, you must know the Nashorn syntax and constructs.\
    \ This chapter gives you a brief overview of Nashorn syntax and constructs."
  raw: '## Sending Scripts Output to a File


    You can customize the input source, output destination, and error output destination
    of a script execution. You need to set appropriate reader and writers for the
    `ScriptContext` that is used to execute a script. The following snippet of code
    will write the script output to a file named `jsoutput.txt` in the current directory:


    `// Create a FileWriter`


    `FileWriter writer = new FileWriter("jsoutput.txt");`


    `// Get the default context of the engine`


    `ScriptContext defaultCtx = engine.getContext();`


    `// Set the output writer for the default context of the engine`


    `defaultCtx.setWriter(writer);`


    The code sets a custom output writer for the default context of the `ScriptEngine`
    that will be used during the execution of scripts that use the default context.
    If you want to use a custom output writer for a specific execution of a script,
    you need to use a custom `ScriptContext` and set its writer.


    Tip


    Setting a custom output writer for a `ScriptContext` does not affect the destination
    of the standard output of the Java application. To redirect the standard output
    of the Java application, you need to use the `System.setOut()` method.


    Listing 3-7 shows how to write output of a script execution to a file named `jsoutput.txt`.
    The program prints the full path of the output file on the standard output. You
    may get a different output when you run the program. You need to open the output
    file in a text editor to see the script’s output.


    Listing 3-7\. Writing the Output of Scripts to a File


    `// CustomScriptOutput.java`


    `package com.jdojo.script;`


    `import java.io.File;`


    `import java.io.FileWriter;`


    `import java.io.IOException;`


    `import javax.script.ScriptContext;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class CustomScriptOutput {`


    `public static void main(String[] args) {`


    `// Get the Nashorn engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// Print the absolute path of the output file`


    `File outputFile = new File("jsoutput.txt");`


    `System.out.println("Script output will be written to " +`


    `outputFile.getAbsolutePath());`


    `FileWriter writer = null;`


    `try {`


    `writer = new FileWriter(outputFile);`


    `// Set a custom output writer for the engine`


    `ScriptContext defaultCtx = engine.getContext();`


    `defaultCtx.setWriter(writer);`


    `// Execute a script`


    `String script =                                  "print(''Hello custom output
    writer'')";`


    `engine.eval(script);`


    `}`


    `catch (IOException | ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `finally {`


    `if (writer != null) {`


    `try {`


    `writer.close();`


    `}`


    `catch (IOException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `}`


    `}`


    `Script output will be written to C:\jsoutput.txt`


    ## Summary


    You can pass parameters to the script using the `ScriptContext`. An instance of
    the `Bindings` interface serves as the parameter holder. The `Bindings` interface
    inherits from the `Map` interface imposing a restriction that its keys must be
    nonempty, non-null `String`s. The `SimpleBinding` class is an implementation of
    the `Bindings` interface. It is preferred to use the `createBindings()` method
    of `ScriptEngine` to get an instance of the `Bindings` interface giving `ScriptEngine`
    a chance to returned a specialized implementation of the `Bindings` interface.
    A `Bindings` is associated with a scope that can be an engine scope or a global
    scope. Parameters passed in the engine scope takes precedence over the parameters
    passed in the global scope. Parameters passed can be local to a script engine,
    local to a script execution, or global to all script engines created by a `ScriptManager`.


    A script engine executes a script in a context that consists of four components:
    a set of `Bindings`, where each `Bindings` is associated with a different scope,
    a `Reader` that is used by the script engine to read inputs, a `Writer` that is
    used by the script engine to write outputs, and an error `Writer` that is used
    by the script engine to write error outputs. An instance of the `ScriptContext`
    interface represents a context for the script execution. The `SimpleScriptContext`
    class is an implementation of the `ScriptContext` interface.


    The set of `Bindings` in a context is used to pass parameters to the script. A
    reader and writers in a context control input source and output destinations of
    the script, respectively. For example, by setting a file writer as a writer, you
    can send all outputs from a script to a file. Every `ScriptEngine` has a default
    `ScriptContext` that is used to execute scripts when no `ScriptContext` is passed
    to the `eval()` method. The `getContext()` method of `ScriptEngine` returns the
    default context of the engine. You can also pass a separate `ScriptContext` with
    the `eval()` method that will be used to execute your script, leaving the default
    `ScriptContext` of the engine untouched.


    # 4. Writing Scripts in Nashorn


    In this chapter, you will learn:


    *   How to write scripts in Nashorn

    *   The difference between running the script in strict mode and nonstrict mode

    *   How to declare variables and write comments

    *   Primitive and object data types, and how to convert values of one data type
    to another data type

    *   Operators, statements, and creating and invoking functions in Nashorn

    *   Different ways of creating and using objects

    *   Variable scoping and hoisting

    *   About built-in global objects and functions


    Nashorn is a runtime implementation of the ECMAScript 5.1 specification on the
    JVM. ECMAScript defines its own syntax and constructs for declaring variables,
    writing statements, operators, creating and using objects, collections, iterating
    over collections of data, and so on. Nashorn is 100 percent compliant with the
    ECMAScript 5.1, so you have a new set of language syntax to learn when you work
    with Nashorn. For example, working with objects in Nashorn is entirely different
    from working with objects in Java.


    This chapter assumes that you have at least a beginner-level understanding of
    the Java programming language. I will not explain details of the constructs and
    syntax offered by Nashorn that work the same way as they work in Java. For example,
    I will not explain what the assignment operator `=` in Nashorn does. Rather, I
    will simply mention that the assignment operator `=` works the same in Nashorn
    and Java. The power of Nashorn is that it lets you use Java libraries inside scripts.
    However, to use Java libraries inside Nashorn, you must know the Nashorn syntax
    and constructs. This chapter gives you a brief overview of Nashorn syntax and
    constructs.'
  trans: '

    ## 将脚本输出发送到文件


    你可以自定义脚本执行的输入源、输出目标和错误输出目标。你需要为用于执行脚本的 `ScriptContext` 设置合适的读取器和写入器。以下代码片段会将脚本输出写入当前目录下名为
    `jsoutput.txt` 的文件中：


    `// 创建一个 FileWriter`


    `FileWriter writer = new FileWriter("jsoutput.txt");`


    `// 获取引擎的默认上下文`


    `ScriptContext defaultCtx = engine.getContext();`


    `// 为引擎的默认上下文设置输出写入器`


    `defaultCtx.setWriter(writer);`


    该代码为 `ScriptEngine` 的默认上下文设置了一个自定义输出写入器，该写入器将在执行使用默认上下文的脚本时被使用。如果你想为某次特定的脚本执行使用自定义输出写入器，则需要使用自定义的
    `ScriptContext` 并设置其写入器。


    提示


    为 `ScriptContext` 设置自定义输出写入器不会影响 Java 应用程序标准输出的目标。要重定向 Java 应用程序的标准输出，你需要使用 `System.setOut()`
    方法。


    清单 3-7 展示了如何将脚本执行的输出写入名为 `jsoutput.txt` 的文件。该程序会在标准输出上打印输出文件的完整路径。运行程序时，你可能会得到不同的输出。你需要在文本编辑器中打开输出文件才能看到脚本的输出。


    清单 3-7. 将脚本输出写入文件


    `// CustomScriptOutput.java`


    `package com.jdojo.script;`


    `import java.io.File;`


    `import java.io.FileWriter;`


    `import java.io.IOException;`


    `import javax.script.ScriptContext;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class CustomScriptOutput {`


    `public static void main(String[] args) {`


    `// 获取 Nashorn 引擎`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// 打印输出文件的绝对路径`


    `File outputFile = new File("jsoutput.txt");`


    `System.out.println("脚本输出将被写入 " +`


    `outputFile.getAbsolutePath());`


    `FileWriter writer = null;`


    `try {`


    `writer = new FileWriter(outputFile);`


    `// 为引擎设置自定义输出写入器`


    `ScriptContext defaultCtx = engine.getContext();`


    `defaultCtx.setWriter(writer);`


    `// 执行一个脚本`


    `String script =                                  "print(''Hello custom output
    writer'')";`


    `engine.eval(script);`


    `}`


    `catch (IOException | ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `finally {`


    `if (writer != null) {`


    `try {`


    `writer.close();`


    `}`


    `catch (IOException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `}`


    `}`


    `脚本输出将被写入 C:\jsoutput.txt`


    ## 总结


    你可以使用 `ScriptContext` 向脚本传递参数。`Bindings` 接口的实例充当参数持有者。`Bindings` 接口继承自 `Map` 接口，并施加了一个限制：其键必须是非空、非
    `null` 的 `String`。`SimpleBinding` 类是 `Bindings` 接口的一个实现。建议使用 `ScriptEngine` 的
    `createBindings()` 方法来获取 `Bindings` 接口的实例，这给了 `ScriptEngine` 一个返回 `Bindings` 接口专用实现的机会。一个
    `Bindings` 与一个作用域相关联，该作用域可以是引擎作用域或全局作用域。在引擎作用域中传递的参数优先于在全局作用域中传递的参数。传递的参数可以是脚本引擎局部的、脚本执行局部的，或者是由一个
    `ScriptManager` 创建的所有脚本引擎全局的。


    脚本引擎在一个上下文中执行脚本，该上下文由四个组件组成：一组 `Bindings`（每个 `Bindings` 与一个不同的作用域相关联）、一个供脚本引擎读取输入的
    `Reader`、一个供脚本引擎写入输出的 `Writer`，以及一个供脚本引擎写入错误输出的错误 `Writer`。`ScriptContext` 接口的实例代表脚本执行的上下文。`SimpleScriptContext`
    类是 `ScriptContext` 接口的一个实现。


    上下文中的 `Bindings` 集合用于向脚本传递参数。上下文中的读取器和写入器分别控制脚本的输入源和输出目标。例如，通过将文件写入器设置为写入器，你可以将脚本的所有输出发送到文件。每个
    `ScriptEngine` 都有一个默认的 `ScriptContext`，当没有 `ScriptContext` 传递给 `eval()` 方法时，将使用该默认上下文来执行脚本。`ScriptEngine`
    的 `getContext()` 方法返回引擎的默认上下文。你也可以向 `eval()` 方法传递一个单独的 `ScriptContext`，该上下文将用于执行你的脚本，而引擎的默认
    `ScriptContext` 保持不变。


    # 4. 在 Nashorn 中编写脚本


    在本章中，你将学习：


    *   如何在 Nashorn 中编写脚本

    *   在严格模式和非严格模式下运行脚本的区别

    *   如何声明变量和编写注释

    *   原始数据类型和对象数据类型，以及如何将一种数据类型的值转换为另一种数据类型

    *   Nashorn 中的运算符、语句以及创建和调用函数

    *   创建和使用对象的不同方式

    *   变量作用域和提升

    *   关于内置的全局对象和函数


    Nashorn 是 ECMAScript 5.1 规范在 JVM 上的运行时实现。ECMAScript 定义了其自身的语法和结构，用于声明变量、编写语句、运算符、创建和使用对象、集合、遍历数据集合等。Nashorn
    100% 兼容 ECMAScript 5.1，因此当你使用 Nashorn 时，需要学习一套新的语言语法。例如，在 Nashorn 中处理对象与在 Java
    中处理对象完全不同。


    本章假设你至少具备 Java 编程语言的入门级理解。我不会解释 Nashorn 提供的、与 Java 中工作方式相同的结构和语法细节。例如，我不会解释 Nashorn
    中的赋值运算符 `=` 的作用。相反，我只会简单提及赋值运算符 `=` 在 Nashorn 和 Java 中的工作方式相同。Nashorn 的强大之处在于它允许你在脚本内部使用
    Java 库。然而，要在 Nashorn 中使用 Java 库，你必须了解 Nashorn 的语法和结构。本章将为你简要介绍 Nashorn 的语法和结构。

    '
- fmt: "# Strict and Nonstrict Modes\n\nNashorn can operate in two modes: strict and\
    \ nonstrict. Some features of ECMAScript cannot be used in strict mode. Typically,\
    \ features that are error-prone are not allowed in strict mode. Some features\
    \ that work in nonstrict mode will generate an error in strict mode. I will list\
    \ the features that are applicable to strict mode while explaining the specific\
    \ features. You can enable strict mode in your scripts in two ways:\n\n* Using\
    \ the `–strict` option with the `jjs` command\n* Using the `\"use strict\"` or\
    \ `'use strict'` directive\n\nThe following command invokes the `jjs` command-line\
    \ tool in strict mode and attempts to assign a value of 10 to a variable named\
    \ `empId` without declaring the variable. You receive an error that says that\
    \ the variable `empId` is not defined:\n\n```\nC:\\> jjs -strict\njjs> empId =\
    \ 10;\n<shell>:1 ReferenceError: \"empId\" is not defined\njjs> exit()\n```\n\n\
    The solution is to use the keyword `var` (discussed shortly) to declare the `empId`\
    \ variable in strict mode.\n\nThe following command invokes the `jjs` command-line\
    \ tool in nonstrict mode (without the `–strict` option) and attempts to assign\
    \ a value of 10 to a variable named `empId` without declaring the variable. This\
    \ time, you do not receive an error; rather, the value of the variable (that is,\
    \ `10`) is printed:\n\n```\nC:\\> jjs\njjs> empId = 10;\n10\njjs> exit()\n```\n\
    \nListing 4-1 shows a script using the `use strict` directive. The directive is\
    \ specified in the beginning of the script or functions. The `use strict` directive\
    \ is simply the string `\"use strict\"`. You can also enclose the directive in\
    \ single quotes like `'use strict'`. The script assigns a value to a variable\
    \ without declaring the variable, which will generate an error because strict\
    \ mode is enabled.\n\n**Listing 4-1.** A Script with the Strict Mode Directive\n\
    \n```\n// strict.js\n\"use strict\"; // This is the use strict directive.\nempId\
    \ = 10;   // This will generate an error.\n```\n\n## Identifiers\n\nAn identifier\
    \ is a name given to variables, functions, labels, and so on in scripts. An identifier\
    \ in Nashorn is a sequence of Unicode characters with the following rules:\n\n\
    * It may contain letters, digits, underscores, and dollar signs\n* It must not\
    \ start with a digit\n* It must not be one of the reserved words\n* Characters\
    \ in the identifier may be replaced with a Unicode escape sequence that would\
    \ be of the form `\\uxxxx` where `xxxx` is the Unicode numeric value of the character\
    \ in hexadecimal format\n\nThe following are examples of valid identifiers:\n\n\
