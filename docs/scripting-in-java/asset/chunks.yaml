    year = \" + year);\n\n        // Remove year from Bindings\n        params.remove(\"\
    year\");\n        year = params.get(\"year\");\n        boolean containsYear =\
    \ params.containsKey(\"year\");\n\n        System.out.println(\"year = \" + year);\n\
    \        System.out.println(\"params contains year = \" + containsYear);\n   \
    \ }\n}\n```\n\n```\nmsg = Hello\nyear = 1969\nyear = null\nparams contains year\
    \ = false\n```\n\nYou will not use a `Bindings` by itself. Often, you will use\
