    ### 使用 Java 全局对象


    在 Java 7 的 Rhino JavaScript 中也支持将包作为 `Packages` 对象的属性进行访问。使用 `Packages` 对象速度较慢且容易出错。Nashorn
    定义了一个名为 `Java` 的新全局对象，其中包含许多用于处理 Java 包和类的实用函数。如果你使用的是 Java 8 或更高版本，应优先使用 `Java`
