    ### Boolean 类型


    Boolean 类型表示一个逻辑实体，其值可以为 true 或 false。与 Java 类似，Nashorn 有两个 Boolean 类型的字面量：`true`
    和 `false`：


    `Var isProcessing = true;`


    `var isProcessed = false;`


    `print("isProcessing =", isProcessing);`


    `print("isProcessed =", isProcessed);`


    `isProcessing = true`


    `isProcessed = false`


    ### String 类型


    String 类型包含所有有限的、有序的零个或多个 Unicode 字符序列。用双引号或单引号括起来的字符序列称为字符串字面量。序列中的字符数称为字符串的长度。以下是使用字符串字面量的示例：


    `var greetings = "Hi there";     // 一个长度为 8 的字符串字面量`


    `var title = ''Scripting in Java''; // 一个用单引号括起来的字符串字面量`


    `var emptyMsg = "";              // 一个长度为零的空字符串`


    如果字符串字面量用双引号括起来，它可以包含单引号，反之亦然。如果字符串字面量用双引号括起来，并且你想在字符串中包含双引号，则需要使用反斜杠对双引号进行转义。对于用单引号括起来的字符串也是如此。以下代码片段向你展示了一些示例：


    `var msg1 = "It''s here and now.";`


    `var msg2 = ''He said, "He is happy."'';`


    `var msg3 = ''It\''s here and now.'';`


    `var msg4 = "He said, \"He is happy.\"";`


    `print(msg1);`


    `print(msg2);`


    `print(msg3);`


    `print(msg4);`


    `It''s here and now.`


    `He said, "He is happy."`


    `It''s here and now.`


    `He said, "He is happy."`


    与 Java 不同，Nashorn 中的字符串字面量可以跨越多行。你需要在行尾使用反斜杠作为续行符。请注意，反斜杠和行终止符不属于字符串字面量的一部分。以下是一个将字符串字面量
    `Hello World!` 写成三行的示例：


    `// 使用多行字符串字面量将字符串 Hello world! 赋值给 msg`


    `var msg = "Hello \`


    `world\`


    `!";`


    `print(msg);`


    `Hello world!`


    如果你想在多行字符串字面量中插入换行符，则需要使用转义序列 `\n`，如下所示。请注意，我将开始和结束的引号放在了单独的行中，这使得多行文本更具可读性：


    `// 使用带有嵌入换行符的多行字符串`


    `var lucyPoem = "\`


    `STRANGE fits of passion have I known:\n\`


    `And I will dare to tell,\n\`


    `But in the lover''s ear alone,\n\`


    `What once to me befell.\`


    `";`


    `print(lucyPoem);`


    `STRANGE fits of passion have I known:`


    `And I will dare to tell,`


    `But in the lover''s ear alone,`


    `What once to me befell.`


    字符串字面量中的字符可以以字面形式出现，也可以以转义序列的形式出现。你可以使用 Unicode 转义序列来表示任何字符。某些字符（如行分隔符、回车符等）不能以字面形式表示，它们必须以转义序列的形式出现。表
    4-4 列出了 Nashorn 中定义的转义序列。


    表 4-4.


    Nashorn 中的单字符转义序列


    | 字符转义序列 | Unicode 转义序列 | 字符名称 |

    | --- | --- | --- |

    | \b | \u0008 | 退格 |

    | \t | \u0009 | 水平制表符 |

    | \n | \u000A | 换行 |

    | \v | \u000B | 垂直制表符 |

    | \f | \u000C | 换页 |

    | \r | \u000D | 回车 |

    | \” | \u0022 | 双引号 |

    | \’ | \u0027 | 单引号 |

    | \\ | \u005C | 反斜杠 |


    Nashorn 和 Java 在解释 Unicode 转义序列方面存在显著差异。与 Java 不同，Nashorn 不会在执行代码之前将 Unicode 转义序列解释为实际字符。Java
    中的以下单行注释、字符字面量和字符串字面量将无法编译，因为编译器在编译程序之前会将 `\u000A` 转换为新行：


    `// This, \u000A, is a new line, making the single line comment invalid`


    `char c = ''\u000A'';`


    `String str = "Hello\u000Aworld!";`


    在 Java 中，你必须在此代码中将 `\u000A` 替换为 `\n` 才能正常工作。以下 Nashorn 代码片段可以正常工作：


    `// This, \u000A, is a new line that is valid in Nashorn`


    `var str = "Hello\u000AWorld!";`


    `print(str);`


    `Hello`


    `World!`


    我将把关于 Object 类型的讨论推迟到完成 Nashorn 中基本结构（如运算符、语句、循环等）的解释之后。


    ## 运算符


    Nashorn 支持许多运算符。其中大部分与 Java 运算符相同。我将在本节中列出所有运算符，并在此讨论其中几个。我将在后续章节中适时讨论其他运算符。表
    4-5 列出了 Nashorn 中的运算符。


    表 4-5.


    Nashorn 中的运算符列表

    '
- fmt: '| Operator | Name | Syntax | Description |

    | --- | --- | --- | --- |

    | `++` | Increment | `++i` `i++` | Increments the operand by 1. |

    | `--` | Decrement | `--i` `i--` | Decrements the operand by 1. |

    | `delete` | | `delete prop` | Deletes the specified property from an object.
    |

    | `void` | | `void expr` | Discards the return value of the specified expression.
    |

    | `typeof` | | `typeof expr` | Returns a String describing the type of the specified
    expression. |

    | `+` | Unary Plus | `+op` | Converts the operand to the Number type. |

    | `-` | Unary Negation | `-op` | Converts the operand to the Number type and then
    negates the converted value. |

    | `∼` | Bitwise NOT | `∼op` | Uses the operand as a 32-bit signed integer, flips
    its bits, and returns the result as a 32-bit signed integer. |

    | `!` | Logical NOT | `!expr` | Returns `true` if `expr` evaluates to `false`.
    Returns `false` if `expr` evaluates to `true`. |

    | `+` | Numeric addition/string concatenation | `op1 + op2` | Performs a string
    concatenation if one of the operands is a string or they can be converted to string.
    Otherwise, performs numeric addition. |

    | `-` | Subtraction | `op1 - op2` | Performs numeric subtraction on the two operands,
    converting them to numbers if they are not numbers. |

    | `/` | Division | `op1 / op2` | Preforms division and returns the quotient of
    the two operands. |

    | `*` | Multiplication | `op1 * op2` | Performs multiplication and returns product
    of the operands. |

    | `%` | Remainder | `op1 % op2` | Uses the left operand as the dividend and the
    right operand as the divisor of a division operation and returns the remainder.
    |

    | `in` | | `prop in obj` | Returns `true` if the `obj` contains a property named
    `prop`. Otherwise, returns false. Here, `prop` is a string or a value convertible
    to string and `obj` is an object. |

    | `instanceof` | | `obj instanceof cls` | Returns `true` of `obj` is an instance
    of the class `cls`. Otherwise, return `false`. |

    | `<` | Less-than | `op1 < op2` | Returns `true` of `op1` is less than `op2`.
    Otherwise, returns `false`. |

    | `<=` | Less-than-or-equal | `op1 <= op2` | Returns `true` of `op1` is less than
    or equal to `op2`. Otherwise, returns `false`. |

    | `>` | Greater-than | `op1 > op2` | Returns `true` of `op1` is greater than `op2`.
    Otherwise, returns `false`. |

