- fmt: "### The Undefined Type\n\nThe Undefined type has only one value that is called\
    \ `undefined`. A variable in Nashorn that is declared but is assigned a value\
    \ has the value `undefined`. You can also assign the value `undefined` to a variable\
    \ explicitly. In addition, you can compare another value with `undefined`. The\
    \ following snippet of code shows how to use the value `undefined`:\n\n```\n//\
    \ empId is initialized to undefined implicitly\nvar empId;\n\n// deptId is initilaized\
    \ to undefined explicitly\nvar deptId = undefined;\n\n// Print the values of empId\
    \ and deptId\nprint(\"empId is\", empId)\nprint(\"deptId is\", deptId);\n\nif\
    \ (empId == undefined) {\n    print(\"empId is undefined\")\n}\n\nif (deptId ==\
    \ undefined) {\n    print(\"deptId is undefined\")\n}\n\nempId is undefined\n\
    deptId is undefined\nempId is undefined\ndeptId is undefined\n```\n\n### The Null\
    \ Type\n\nThe Null type has only one value that is called `null`. Even though\
    \ the value `null` is considered to be of primitive type, it is typically used\
    \ where an object is expected but there is no valid object to be specified. The\
    \ following snippet of code shows how to use the value `null`:\n\n```\nvar person\
    \ = null;\nprint(\"person is\", person);\n\nperson is null\n```\n\n### The Number\
    \ Type\n\nUnlike Java, Nashorn does not distinguish between integers and floating-point\
    \ numbers. It has only one type called Number to represent both types of numeric\
    \ values. Numbers are stored in a double-precision 64-bit IEEE floating-point\
    \ format. All numeric constants are called number literals. Like Java, you can\
    \ represent number literals in decimal, hexadecimal, octal, and scientific notations.\
    \ Nashorn defines three special values of number type: non-a-number, positive\
    \ infinity, and negative infinity. In scripts, these special values are represented\
    \ by `NaN`, `+Infinity`, and `-Infinity`, respectively. The positive infinity\
    \ value can also be represented as simply `Infinity`, without a leading `+` sign.\
    \ The following snippet of code shows how to use number literals and special number\
    \ type values:\n\n```\nvar empId = 100;               // An integer of type Number\n\
    var salary = 1500.678;         // A lfoating-point number of type Number\nvar\
    \ hexNumber = 0x0061;        // Same as 97 is decimal\nvar octalNumber = 0141;\
    \        // Same 97 in decimal\nvar scientificNumber = 0.97E2; // Same 97 in decimal\n\
    var notANumber = NaN;\nvar posInfinity = Infinity;\nvar negInfinity = -Infinity;\n\
    \n// Print all values\nprint(\"empId =\", empId);\nprint(\"salary =\", salary);\n\
    print(\"hexNumber =\", hexNumber);\nprint(\"octalNumber =\", octalNumber);\nprint(\"\
    scientificNumber =\", scientificNumber);\nprint(\"notANumber =\", notANumber);\n\
    print(\"posInfinity =\", posInfinity);\nprint(\"negInfinity =\", negInfinity);\n\
    \nempId = 100\nsalary = 1500.678\nhexNumber = 97\noctalNumber = 97\nscientificNumber\
    \ = 97\nnotANumber = NaN\nposInfinity = Infinity\nnegInfinity = -Infinity\n```\n\
    \n### The Boolean Type\n\nThe Boolean type represents a logical entity that be\
    \ either true or false. Like Java, Nashorn has two literals, `true` and `false`,\
    \ of the Boolean type:\n\n```\nVar isProcessing = true;\nvar isProcessed = false;\n\
    \nprint(\"isProcessing =\", isProcessing);\nprint(\"isProcessed =\", isProcessed);\n\
