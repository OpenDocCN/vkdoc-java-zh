    ## 使用列表、映射和集合


    Nashorn 并未提供内置对象来表示通用的映射和集合。你可以将 Nashorn 中的任何对象用作键为字符串的映射。也可以在 Nashorn 中创建对象来表示映射和集合，但这无异于重新发明轮子。Java
    编程语言提供了多种集合类型，包括映射和集合。你可以直接在 Nashorn 中使用这些集合。关于如何在 Nashorn 脚本中使用 Java 类的更多细节，请参考`第
    6 章`。本节将讨论在 Nashorn 中得到特殊处理的 Java `List`和`Map`。


    ### 将 Java 列表用作 Nashorn 数组


    Nashorn 允许你将 Java `List` 当作 Nashorn 数组来读取和更新其中的元素。请注意，它不允许你使用数组索引向 `List` 添加元素。你可以使用索引来访问和更新
    `List` 中的元素。Nashorn 会为 Java `List` 的实例添加一个 `length` 属性，因此你可以将 `List` 视为一个类数组对象。清单
    7-4 展示了在 Nashorn 脚本中使用 Java `List` 的示例。


    清单 7-4\. 在 Nashorn 脚本中将 java.util.List 作为数组对象访问和更新


    `// list.js`


    `var ArrayList = Java.type("java.util.ArrayList");`


    `var nameList = new ArrayList();`


    `// 使用 List.add() Java 方法添加几个名字`


    `nameList.add("Lu");`


    `nameList.add("Do");`


    `nameList.add("Yu");`


    `// 打印列表`


    `print("添加名字后：");`


    `for(var i = 0, len = nameList.size(); i < len; i++) {`


    `print(nameList.get(i));`


    `}`


    `// 使用数组索引更新名字`


    `nameList[0] = "Su";`


    `nameList[1] = "So";`


    `nameList[2] = "Bo";`


    `// 以下语句将抛出 IndexOutOfBoundsException，因为`


    `// 它试图使用数组语法添加新元素。使用数组语法只能`


    `// 更新元素，不能添加新元素。`


    `// nameList[3] = "An";`


    `print("更新名字后：");`


    `for(var i = 0, len = nameList.length; i < len; i++) {`


    `print(nameList[i]);`


    `}`


    `// 按自然顺序对列表排序`


    `nameList.sort(null);`


    `// 使用 Array.prototype.forEach() 方法打印列表`


    `print("排序后：");`


    `Array.prototype.forEach.call(nameList, function (value, index, data) {`


    `print(value);`


    `});`


    `添加名字后：`


    `Lu`


    `Do`


    `Yu`


    `更新名字后：`


    `Su`


    `So`


    `Bo`


    `排序后：`


    `Bo`


    `So`


    `Su`


    该示例执行了以下几项操作：


    *   创建了一个 `java.util.ArrayList` 的实例

    *   使用 Java `List` 接口的 `add()` 方法向列表中添加了三个元素

    *   使用 `List` 接口的 `size()` 和 `get()` 方法打印元素

    *   更新元素并使用 Nashorn 语法访问数组元素来打印它们。它使用 Nashorn 属性 `length` 来获取列表的大小

    *   使用 Java `List.sort()` 方法按自然顺序对元素进行排序

    *   使用 `Array.prototype.forEach()` 方法打印排序后的元素


    ### 将 Java 映射用作 Nashorn 对象


    你已经了解到，Nashorn 对象本质上是存储字符串-对象对的映射。Nashorn 允许将 Java `Map` 用作 Nashorn 对象，这样你可以将
    `Map` 中的键用作对象的属性。清单 7-5 展示了如何将 Java `Map` 用作 Nashorn 对象。


    清单 7-5\. 将 Java 映射用作 Nashorn 对象


    `// map.js`


    `// 创建一个 Map 实例`


    `var HashMap = Java.type("java.util.HashMap");`


    `var map = new HashMap();`


    `// 使用 Java 方法向映射添加键值对`


    `map.put("Li", "999-11-0001");`


    `map.put("Su", "999-11-0002");`


    `// 你可以将 Map 视为一个对象，并像添加对象属性一样添加键值对`


    `map["Yu"] = "999-11-0003";`


    `map["Do"] = "999-11-0004";`


    `// 使用 Java Map.get() 方法和方括号表示法访问值`


    `var liPhone = map.get("Li");  // Java 方式`


    `var suPhone = map.get("Su");  // Java 方式`


    `var yuPhone = map["Yu"];      // Nashorn 方式`


    `var doPhone = map["Do"];      // Nashorn 方式`


    `print("李的电话：" + liPhone);`


    `print("苏的电话：" + suPhone);`


    `print("余的电话：" + yuPhone);`


    `print("杜的电话：" + doPhone);`


    `李的电话：999-11-0001`


    `苏的电话：999-11-0002`


    `余的电话：999-11-0003`


    `杜的电话：999-11-0004`

