    | 运算符 | 名称 | 语法 | 描述 |

    | --- | --- | --- | --- |

    | `++` | 自增 | `++i` `i++` | 将操作数增加 1。 |

    | `--` | 自减 | `--i` `i--` | 将操作数减少 1。 |

    | `delete` | 删除 | `delete prop` | 从对象中删除指定的属性。 |

    | `void` | 空值 | `void expr` | 丢弃指定表达式的返回值。 |

    | `typeof` | 类型检测 | `typeof expr` | 返回一个描述指定表达式类型的字符串。 |

    | `+` | 一元正号 | `+op` | 将操作数转换为 Number 类型。 |

    | `-` | 一元负号 | `-op` | 将操作数转换为 Number 类型，然后对转换后的值取反。 |

    | `∼` | 按位非 | `∼op` | 将操作数作为 32 位有符号整数，翻转其二进制位，并将结果作为 32 位有符号整数返回。 |

    | `!` | 逻辑非 | `!expr` | 如果 `expr` 计算结果为 `false`，则返回 `true`。如果 `expr` 计算结果为 `true`，则返回
    `false`。 |

    | `+` | 数值加法/字符串拼接 | `op1 + op2` | 如果其中一个操作数是字符串或可以转换为字符串，则执行字符串拼接。否则，执行数值加法。
    |

    | `-` | 减法 | `op1 - op2` | 对两个操作数执行数值减法，如果它们不是数字则将其转换为数字。 |

    | `/` | 除法 | `op1 / op2` | 执行除法并返回两个操作数的商。 |

    | `*` | 乘法 | `op1 * op2` | 执行乘法并返回操作数的乘积。 |

    | `%` | 取余 | `op1 % op2` | 将左操作数作为被除数，右操作数作为除数进行除法运算，并返回余数。 |

    | `in` | 存在性检查 | `prop in obj` | 如果 `obj` 包含名为 `prop` 的属性，则返回 `true`。否则返回 `false`。此处
    `prop` 是一个字符串或可转换为字符串的值，`obj` 是一个对象。 |

    | `instanceof` | 实例检查 | `obj instanceof cls` | 如果 `obj` 是类 `cls` 的实例，则返回 `true`。否则返回
    `false`。 |

    | `<` | 小于 | `op1 < op2` | 如果 `op1` 小于 `op2`，则返回 `true`。否则返回 `false`。 |

    | `<=` | 小于或等于 | `op1 <= op2` | 如果 `op1` 小于或等于 `op2`，则返回 `true`。否则返回 `false`。
    |

    | `>` | 大于 | `op1 > op2` | 如果 `op1` 大于 `op2`，则返回 `true`。否则返回 `false`。 |

    | `>=` | 大于或等于 | `op1 >= op2` | 如果 `op1` 大于或等于 `op2`，则返回 `true`。否则返回 `false`。
    |

    | `==` | 相等 | `op1 == op2` | 如果 `op1` 和 `op2` 相等，则返回 `true`。否则返回 `false`。必要时会进行类型转换。例如，`"2"
    == 2` 返回 `true`，因为字符串 `"2"` 被转换为数字 `2`，然后两个操作数相等。 |

    | `!=` | 不等 | `op1 != op2` | 如果 `op1` 和 `op2` 不相等，则返回 `true`。否则返回 `false`。必要时会进行类型转换。
    |

    | `===` | 恒等或严格相等 | `op1 === op2` | 如果两个操作数的类型和值都相同，则返回 `true`。否则返回 `false`。表达式
    `"2" === 2` 返回 `false`，因为 `"2"` 是字符串而 `2` 是数字。表达式 `"2" === "2"` 和 `2 === 2` 都返回
    `true`。 |

    | `!==` | 非恒等或严格不等 | `op1 !== op2` | 如果操作数不相等和/或类型不同，则返回 `true`。表达式 `"2" !== 2`
    和 `2 !== 3` 都返回 `true`。在第一个表达式中，操作数的类型不匹配（字符串和数字）；在第二个表达式中，操作数的值不匹配。 |

    | `<<` | 按位左移 | `op1 << op2` | 对 `op1` 执行按位左移操作，移动位数由 `op2` 指定。在执行左移之前，`op1` 被转换为
    32 位有符号整数。结果也是一个 32 位有符号整数。 |

    | `>>` | 按位有符号右移 | `op1 >> op2` | 对 `op1` 执行符号位填充的按位右移操作，移动位数由 `op2` 指定。左侧新增的位用原始的最高有效位填充，以保持
    `op1` 的符号，结果符号相同。将 `op1` 转换为 32 位有符号整数，结果也是一个 32 位有符号整数。 |

    | `>>>` | 按位无符号右移 | `op1 >>> op2` | 对 `op1` 执行零填充的按位右移操作，移动位数由 `op2` 指定。左侧新增的位用
    0 填充，这使得结果成为一个无符号 32 位整数。 |

    | `&` | 按位与 | `op1 & op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位与操作。如果两个位都是 1，则结果位为 1。否则，结果位为
    0。 |

    | `&#124;` | 按位或 | `op1 &#124; op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位或操作。如果任意一个位是
    1，则结果位为 1。如果两个位都是 0，则结果位为 0。 |

    | `^` | 按位异或 | `op1 ^ op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位异或操作。如果两个位不同，则结果位为 1。否则，结果位为
    0。 |

    | `&&` | 逻辑与 | `op1 && op2` | 返回 `op1` 或 `op2`。如果 `op1` 为 `false` 或可转换为 `false`，则返回
    `op1`。否则，返回 `op2`。 |

    | `&#124;&#124;` | 逻辑或 | `op1 &#124;&#124; op2` | 返回 `op1` 或 `op2`。如果 `op1` 为
    `true` 或可转换为 `true`，则返回 `op1`。否则，返回 `op2`。 |

    | `?:` | 条件（三元）运算符 | `op1 ? op2 : op3` | 如果 `op1` 计算结果为 true，则返回 op2 的值。否则，返回
    op3 的值。 |

    | `=` | 赋值 | `op1 = op2` | 将 `op2` 的值赋给 `op1` 并返回 `op2`。 |

    | `+=, -=, *=, /=, %=, <<=, >>=, >>>=, &=, ^=, &#124;=` | 复合赋值 | `op1 op= op2`
    | 其执行效果类似于语句 `op1 = op1 op op2`。对 `op1` 和 `op2` 应用运算（+、-、*、/、% 等），将结果赋给 op1 并返回该结果。
    |

    | `,` | 逗号运算符 | `op1, op2, op3...` | 从左到右依次计算每个操作数，并返回最后一个操作数的值。用于需要一个表达式但希望使用多个表达式的地方，例如在
    `for` 循环的头部。 |

