    \ sets it to `true`.\n\n### The Constructor\n\nThe constructor of the `Expression`\
    \ class accepts an expression and a `ScriptContext`. It makes sure that they are\
    \ not `null` and stores them in the instance variables. It trims the leading and\
    \ trailing whitespaces from the expression before storing it in the instance variable\
    \ named `exp`.\n\n### The `parse()` Method\n\nThe `parse()` method parses the\
    \ expression into operands and operations. It uses a regular expression to parse\
    \ the expression text. The regular expression expects the expression text in the\
    \ following form:\n\n- An optional sign `+` or `-` for the first operand\n- The\
    \ first operand that may consist of a combination of alphanumeric letters, currency\
    \ signs, underscores, and decimal points\n- Any number of whitespaces\n- An operation\
    \ sign that may be `+`, `-`, `*`, or `/`\n- An optional sign `+` or `-` for the\
    \ second operand\n- The second operand that may consist of a combination of alphanumeric\
    \ letters, currency signs, underscores, and decimal points\n\nThe regular expression\
    \ `([+-]?)` will match the optional sign for the operand. The regular expression\
    \ `([\\\\p{Alnum}\\\\p{Sc}_.]+)` will match an operand, which may be a decimal\
    \ number or a name. The regular expression `([\\\\s]*)` will match any number\
    \ of whitespaces. The regular expression `([+*/-])` will match an operation sign.\
    \ All regular expressions are enclosed in parentheses to form groups, so you can\
    \ capture the matched parts of the expression.\n\nIf an expression matches the\
    \ regular expression, the `parse()` method stores the matched parts into respective\
    \ instance variables.\n\nNotice that the regular expression to match operands\
    \ is not perfect. It will allow several invalid cases, such as an operand having\
