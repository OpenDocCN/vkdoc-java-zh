- fmt: "# Using Other Scripting Languages\n\nIt is very simple to use a scripting\
    \ language, other than Nashorn, in a Java program. You need to perform only one\
    \ task before you can use a script engine: include the JAR files for a particular\
    \ script engine in your application `CLASSPATH`. Implementers of script engines\
    \ provide those JAR files.\n\nJava uses a discovery mechanism to list all script\
    \ engines whose JAR files have been included in the application `CLASSPATH`. An\
    \ instance of the `ScriptEngineFactory` interface is used to create and describe\
    \ a script engine. The provider of a script engine provides an implementation\
    \ for the `ScriptEngineFactory` interface. The `getEngineFactories()` method of\
    \ the `ScriptEngineManager` returns a `List<ScriptEngineFactory>` of all available\
    \ script engines factories. The `getScriptEngine()` method of the `ScriptEngineFactory`\
    \ returns an instance of the `ScriptEngine`. Several other methods of the factory\
    \ return metadata about the engine.\n\nTable [1-1](#A978-1-4842-0713-0_1_Chapter.html#Tab1)\
    \ lists details on how to install script engines before you can use them in your\
    \ Java application. The list of websites and instructions are valid at the time\
    \ of this writing; they may become invalid at the time of reading. However, they\
    \ show you how a script engine for a scripting language is installed. If you are\
    \ interested in using Nashorn, you do not need to install anything on your machine.\
    \ Nashorn is available in JDK 8.\n\n**Table 1-1.** Installation Details for Installing\
    \ Some Script Engines\n\n| Script Engine | Version | Website | Installation Instructions\
    \ |\n| --- | --- | --- | --- |\n| Groovy | 2.3 | `groovy.codehaus.org` | Download\
    \ the installation file for Groovy; it’s a ZIP file. Unzip it. Look for a JAR\
    \ file named `groovy-all-2.0.0-rc-2.jar` in the `embeddable` folder. Add this\
    \ JAR file to the `CLASSPATH`. |\n| Jython | 2.5.3 | [`www.jython.org`](http://www.jython.org/)\
    \ | Download the Jython installer file that is a JAR file. Extract the `jython.jar`\
    \ file and add it to the `CLASSPATH`. |\n| JRuby | 1.7.13 | [`www.jruby.org`](http://www.jruby.org/)\
    \ | Download the JRuby installation file. You have an option to download a ZIP\
    \ file. Unzip it. In the `lib` folder, you will find a `jruby.jar` file that you\
    \ need to include in the `CLASSPATH`. |\n\nListing 1-3 shows how to print details\
    \ of all available script engines. The output shows that the script engine for\
    \ Groovy, Jython, and JRuby are available. They are available because I have added\
    \ the JAR files for their engines to the `CLASSPATH` on my machine. This program\
    \ is helpful when you have included the JAR files for a script engine in the `CLASSPATH`\
    \ and you want to know the short name of the script engine. You may get a different\
    \ output when you run the program.\n\n**Listing 1-3.** Listing All Available Script\
    \ Engines\n\n```\n// ListingAllEngines.java\npackage com.jdojo.script;\n\nimport\
    \ java.util.List;\nimport javax.script.ScriptEngineFactory;\nimport javax.script.ScriptEngineManager;\n\
    \npublic class ListingAllEngines {\n    public static void main(String[] args)\
    \ {\n        ScriptEngineManager manager = new ScriptEngineManager();\n\n    \
    \    // Get the list of all available engines\n        List<ScriptEngineFactory>\
    \ list = manager.getEngineFactories();\n\n        // Print the details of each\
    \ engine\n        for (ScriptEngineFactory f : list) {\n            System.out.println(\"\
    Engine Name:\" + f.getEngineName());\n            System.out.println(\"Engine\
    \ Version:\" + f.getEngineVersion());\n            System.out.println(\"Language\
    \ Name:\" + f.getLanguageName());\n            System.out.println(\"Language Version:\"\
    \ + f.getLanguageVersion());\n            System.out.println(\"Engine Short Names:\"\
    \ + f.getNames());\n            System.out.println(\"Mime Types:\" + f.getMimeTypes());\n\
    \            System.out.println(\"----------------------------\");\n        }\n\
    \    }\n}\n```\n\n```\nEngine Name:jython\nEngine Version:2.5.3\nLanguage Name:python\n\
    Language Version:2.5\nEngine Short Names:[python, jython]\nMime Types:[text/python,\
    \ application/python, text/x-python, application/x-python]\n----------------------------\n\
    Engine Name:JSR 223 JRuby Engine\nEngine Version:1.7.0.preview1\nLanguage Name:ruby\n\
    Language Version:jruby 1.7.0.preview1\nEngine Short Names:[ruby, jruby]\nMime\
    \ Types:[application/x-ruby]\n----------------------------\nEngine Name:Groovy\
    \ Scripting Engine\nEngine Version:2.0\nLanguage Name:Groovy\nLanguage Version:2.0.0-rc-2\n\
    Engine Short Names:[groovy, Groovy]\nMime Types:[application/x-groovy]\n----------------------------\n\
    Engine Name:Oracle Nashorn\nEngine Version:1.8.0_05\nLanguage Name:ECMAScript\n\
    Language Version:ECMA - 262 Edition 5.1\nEngine Short Names:[nashorn, Nashorn,\
    \ js, JS, JavaScript, javascript, ECMAScript, ecmascript]\nMime Types:[application/javascript,\
    \ application/ecmascript, text/javascript, text/ecmascript]\n----------------------------\n\
    ```\n\nListing 1-4 shows how to print a message on the standard output using JavaScript,\
    \ Groovy, Jython, and JRuby. If a script engine is not available, the program\
    \ prints a message to that effect.\n\n**Listing 1-4.** Printing a Message on the\
    \ Standard Output Using Different Scripting Languages\n\n```\n// HelloEngines.java\n\
    package com.jdojo.script;\n\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n\npublic class HelloEngines {\n    public\
    \ static void main(String[] args) {\n        // Get the script engine manager\n\
    \        ScriptEngineManager manager = new ScriptEngineManager();\n\n        //\
    \ Try executing scripts in Nashorn, Groovy, Jython, and JRuby\n        execute(manager,\
    \ \"JavaScript\", \"print('Hello JavaScript')\");\n        execute(manager, \"\
    Groovy\", \"println('Hello Groovy')\");\n        execute(manager, \"jython\",\
    \ \"print 'Hello Jython'\");\n        execute(manager, \"jruby\", \"puts('Hello\
    \ JRuby')\");\n    }\n\n    public static void execute(ScriptEngineManager manager,\n\
    \                               String engineName,\n                         \
    \      String script) {\n        // Try getting the engine\n        ScriptEngine\
    \ engine = manager.getEngineByName(engineName);\n        if (engine == null) {\n\
    \            System.out.println(engineName + \" is not available.\");\n      \
    \      return;\n        }\n\n        // If we get here, it means we have the engine\
    \ installed.\n        // So, run the script\n        try {\n            engine.eval(script);\n\
    \        }\n        catch (ScriptException e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n```\n\n```\nHello JavaScript\nHello Groovy\nHello Jython\n\
    Hello JRuby\n```\n\nSometimes you may want to play with a scripting language just\
    \ for fun, and you do not know the syntax that is used to print a message on the\
    \ standard output. The `ScriptEngineFactory` class contains a method named `getOutputStatement(String\
    \ toDisplay)` that you can use to find the syntax for printing text on the standard\
    \ output. The following snippet of code shows how to get the syntax for Nashorn:\n\
    \n```\n// Get the script engine factory for Nashorn\nScriptEngineManager manager\
    \ = new ScriptEngineManager();\nScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\nScriptEngineFactory factory = engine.getFactory();\n\n// Get the\
    \ script\nString script = factory.getOutputStatement(\"\\\"Hello JavaScript\\\"\
    \");\nSystem.out.println(\"Syntax: \" + script);\n\n// Evaluate the script\nengine.eval(script);\n\
    ```\n\n```\nSyntax: print(\"Hello JavaScript\")\nHello JavaScript\n```\n\nFor\
    \ other scripting languages, use their engine factories to get the syntax.\n\n\
    ## Exploring the `javax.script` Package\n\nThe Java Scripting API in Java consists\
    \ of a small number of classes and interfaces. They are in the `javax.script`\
    \ package. This chapter contains a brief description of classes and interfaces\
    \ in this package. I will discuss their usage in subsequent chapters. Figure [1-1](#A978-1-4842-0713-0_1_Chapter.html#Fig1)\
    \ shows the class diagram for the classes and interfaces in the Java Scripting\
    \ API.\n\n![A978-1-4842-0713-0_1_Fig1_HTML.jpg](A978-1-4842-0713-0_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1.** The class diagram for classes and interfaces in the Java Scripting\
    \ API"
