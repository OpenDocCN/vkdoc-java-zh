- fmt: "Suppose that you want to create a function for the `Point` objects that will\
    \ compute the distance of a `Point` from the origin. You can create a `Point`\
    \ to represent the origin and bind the `Point.prototype.distance` function to\
    \ this object to get a new function. Listing 4-23 demonstrates this technique.\n\
    \n**Listing 4-23.** Binding a Function to an Object\n\n```\n// functionbind.js\n\
    load(\"Point.js\");\n\n// Create a 2D origin\nvar origin = new Point(0, 0);\n\n\
    // Create a new method called distanceFromOrigin() by binding\n// the distance()\
    \ method of the Point to the origin object\nvar distanceFromOrigin = Point.prototype.distance.bind(origin);\n\
    \nvar dist = distanceFromOrigin(new Point(0, 10));\nprint(dist);\n\n// The above\
    \ distanceFromOrigin() is the same as follows\nvar dist2 = origin.distance(new\
    \ Point(0, 10));\nprint(dist2);\n\n10\n10\n```\n\nAn important point about the\
    \ `Function()` constructor is that the functions it creates do not use lexical\
    \ scoping; instead, they are always compiled as if they were top-level functions.\
    \ Listing 4-24 demonstrates this subtle point.\n\n**Listing 4-24.** Testing the\
    \ Captured Scoping of Functions Created by the Function Object\n\n```\n// functioncapture.js\n\
    var empId = 100; // Global\n\nfunction createFunction1() {\n  var empId = 200;\
    \  // Local\n  // Does not capture local empId\n  var test = new Function(\"print(empId)\"\
    );\n  return test;\n}\n\nfunction createFunction2() {\n  var empId = 200; // Local\n\
    \  function test () {\n    print(empId); // Captures local empId\n  }\n  return\
    \ test;\n}\n\ncreateFunction1()(); // Prints 100 (the global empId)\ncreateFunction2()();\
    \ // Prints 200 (the local empId)\n\n100\n200\n```\n\nWhen the `createFunction1()`\
    \ creates a new function using the `Function` object, the new function doesn’t\
    \ capture the local `empId`, rather it captures the global `empId`. However, when\
    \ a nested function is declared inside the `createFunction2()` function, the new\
    \ function captures the local `empId`. The output verifies this rule.\n\n### The\
    \ String Object\n\nThe `String` object is a function. It can be used simply as\
    \ a function or a constructor. When it is used as a function, it converts the\
    \ argument to a primitive type string value. The following is an example of using\
    \ `String` as a function:\n\n```\nvar str1 = String(100); // Returns \"100\"\n\
    var str2 = String();    // Returns \"\"\n```\n\nWhen `String` is used as a constructor,\
    \ it creates a new `String` object with its contents as the passed argument:\n\
    \n```\n// Create a String object\nvar str = new String(\"Hello\");\n```\n\nEach\
    \ character in the `String` object is assigned an index. The first character is\
    \ assigned an index of 0, the second 1, and so on. Every `String` object has a\
    \ read-only property named `length` that contains the number of characters in\
    \ the string.\n\n`String.prototype` contains many useful methods to manipulate\
    \ `String` objects and get its contents in different ways. Table 4-12 lists those\
    \ methods. Notice that you can use all `String` object methods on a primitive\
    \ string value; the primitive string will be automatically converted to a `String`\
    \ object before applying the method.\n\n**Table 4-12.** The List of Methods in\
    \ `String.prototype` with Their Descriptions\n\n| Method | Description |\n| ---\
    \ | --- |\n| `charAt(index)` | Returns the character at the specified `index`\
    \ as a primitive string value |\n| `charCodeAt(index)` | Returns the Unicode value\
    \ of the character at the specified `index` |\n| `concat(arg1, arg2, ...)` | Returns\
    \ a primitive string concatenating the contents of the object and the specified\
    \ arguments |\n| `indexOf(substring, start)` | Returns the index of the first\
    \ occurrence of the substring in the object. The search starts at `start`. If\
    \ `start` is not passed, the search starts at index 0 |\n| `lastIndexOf(substring,\
    \ start)` | It works the same way as the `indexOf()` method, except that it searches\
    \ for the `substring` from the end of the string |\n| `localeCompare(target)`\
    \ | Returns a number. If the string is less than `target`, it returns a negative\
    \ number; if string is greater than `target`, it returns a positive number; otherwise,\
    \ it returns zero |\n| `match(regexp)` | Searches the string for the specified\
    \ regular expression `regexp` and returns the results in an array |\n| `replace(regexp,\
    \ replacement)` | Searches the string using the regular expression `regexp`, replaces\
    \ the matched substrings with the replacement, and returns the result as a primitive\
    \ string value |\n| `search(regexp)` | Searches the string for the specified regular\
    \ expression and returns the index of the first occurrence. Returns –1 if no match\
    \ is found |\n| `slice(start, end)` | Returns a substring contains characters\
    \ from `start` and `end` indexes in the string where `start` is inclusive and\
    \ `end` is exclusive. If `end` is not specified, it returns all characters from\
    \ `start`. If `end` is negative, the index is counted from the end. `\"Hello\"\
    .slice(1, 2)` returns `\"e\"` and `\"Hello\".slice(1, -2)` returns `\"el\"` |\n\
    | `split(delimiter, limit)` | Returns an array by splitting the string around\
    \ the specified `delimiter`. The `limit` is optional and it specifies the maximum\
    \ number of elements returned in the array |\n| `substring(start, end)` | Returns\
    \ a substring of the string starting at the `start` and up to, but not including,\
