    ### debugger 语句


    `debugger` 语句用于调试目的。它本身不执行任何操作。如果调试器处于活动状态，实现可能会触发一个断点，但在遇到 `debugger` 语句时并非必须如此。其语法为：


    `debugger;`


    NetBeans 8.0 IDE 在调试模式下支持 `debugger` 语句。我将在第 13 章中展示如何使用 `debugger` 语句调试 Nashorn
    脚本。


    ## 定义函数


    在 Nashorn 中，函数是一段可执行的、参数化的代码块，它被声明一次，但可以被多次执行。执行一个函数被称为调用该函数。函数是一个对象；它可以拥有属性，可以作为参数传递给另一个函数；也可以赋值给一个变量。一个函数可以包含以下部分：


    *   一个名称

    *   形式参数

    *   一个函数体


    函数可以选择性地指定一个名称。当调用函数时，你可以传递一些值，这些值被称为该函数的参数。这些参数会被复制到函数的形式参数中。函数体由一系列语句组成。函数可以选择性地使用
    `return` 语句返回一个值。如果没有使用 `return` 语句从函数返回，默认情况下会返回值 `undefined`。在 Nashorn 中，可以通过多种方式定义函数，后续章节将对此进行描述。


    提示


    你可以将 Nashorn 中的 `function` 视为 Java 中的方法。但是，请注意，Nashorn 中的函数是一个对象，并且它的使用方式多种多样，其中一些方式是
    Java 中的方法所不能使用的。


    ### 函数声明


    你可以使用 `function` 语句声明一个函数，如下所示：


    `function functionName(param1, param2...) {`


    `function-body`


    `}`


    关键字 `function` 用于声明一个函数。`functionName` 是函数的名称，可以是任何标识符。`param1`、`param2` 等是形式参数名称。一个函数可以有零个形式参数，在这种情况下，函数名后面直接跟一对圆括号。函数体由零个或多个语句组成，并用花括号括起来。


    提示


    在严格模式下，你不能使用 `eval` 和 `arguments` 作为函数名或函数的形式参数名。


    到目前为止，函数声明中的一切看起来都像 Java 中的方法声明。然而，有两个显著的区别：


    *   函数声明没有返回类型

    *   函数只指定形式参数的名称，而不指定它们的类型


    以下是一个名为 `adder` 的函数的示例，它接受两个参数，并对它们应用 `+` 运算符后返回一个值：


    `// 对名为 x 和 y 的参数应用 + 运算符，`


    `// 并返回结果`


    `function adder(x, y) {`


    `return x + y;`


    `}`


    调用函数与在 Java 中调用方法相同。你需要使用函数名，后跟用圆括号括起来的、以逗号分隔的参数列表。以下代码片段使用两个参数（值分别为 5 和 10）调用
    `adder` 函数，并将函数返回的值赋给一个名为 `sum` 的变量：


    `var sum = adder(5, 10); // 将 15 赋值给 sum`


    考虑以下代码片段及其输出：


    `var sum1 = adder(5, true); // 将 6 赋值给 sum1`


    `var sum2 = adder(5, "10"); // 将 "510" 赋值给 sum2`


    `print(sum1, typeof sum1);`


    `print(sum2, typeof sum2);`


    `6 number`


    `510 string`


    这可能会让你感到惊讶。你可能在编写 `adder()` 函数时，心里想的是对两个数字进行加法运算。然而，你却能够传递 Number、Boolean 和 String
    类型的参数。实际上，你可以向这个函数传递任何类型的参数。这是因为 Nashorn 是一种松散类型的语言，类型检查是在运行时执行的。在给定的上下文中，所有值都会被转换为预期的类型。在第一次调用
    `adder(5, true)` 中，布尔值 `true` 被自动转换为数字 1；在第二次调用 `adder(5, "10")` 中，数字 5 被转换为字符串
    "5"，并且 `+` 运算符作为字符串连接运算符工作。如果你希望函数中的参数具有类型安全性，你需要像在清单 4-2 的 `factorial()` 函数内部所做的那样，自己进行验证。


    提示


    每个函数都有一个名为 `length` 的只读属性，它包含函数的形式参数数量。在我们的例子中，`adder.length` 将返回 2，因为 `adder()`
    函数声明了两个名为 `x` 和 `y` 的形式参数。


    函数是一个对象。函数名是对函数对象的引用。你可以将函数名赋值给另一个变量，并将其传递给其他函数。以下代码片段将 `adder()` 函数的引用赋值给一个名为
    `myAdder` 的变量，并使用 `myAdder` 变量调用该函数：


    `// 将 adder 函数的引用赋值给变量 myAdder`


    `var myAdder = adder;`


    `// 调用 myAdder 引用的函数 (adder())`


    `var sum = myAdder(5, 10);`


    `print(sum);`


    `15`

