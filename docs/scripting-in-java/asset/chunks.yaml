    # 1. 入门指南


    在本章中，你将学习：


    *   什么是 Java 中的脚本编程

    *   如何从 Java 执行你的第一个脚本

    *   如何在 Java 中使用其他脚本语言，如 JRuby、Jython

    *   `javax.script` API

    *   脚本引擎是如何被发现和实例化的


    ## 什么是 Java 中的脚本编程？


    有些人认为 Java 虚拟机（JVM）只能执行用 Java 编程语言编写的程序。然而，事实并非如此。JVM 执行的是与语言无关的字节码。只要程序能被编译成
    Java 字节码，JVM 就能执行用任何编程语言编写的程序。


    脚本语言是一种编程语言，它使你能够编写由称为脚本引擎（或解释器）的运行时环境评估（或解释）的脚本。脚本是一系列字符，使用脚本语言的语法编写，并作为由解释器执行的程序的源代码。解释器解析脚本，生成中间代码（即程序的内部表示），然后执行中间代码。解释器将脚本中使用的变量存储在称为符号表的数据结构中。


    通常，与编译型编程语言不同，脚本语言中的源代码（称为脚本）不会被编译，而是在运行时被解释。然而，用某些脚本语言编写的脚本可能会被编译成可由 JVM 运行的
    Java 字节码。


    Java 6 为 Java 平台增加了脚本支持，使得 Java 应用程序能够执行用 Rhino JavaScript、Groovy、Jython、JRuby、Nashorn
    JavaScript 等脚本语言编写的脚本。它支持双向通信。它还允许脚本访问宿主应用程序创建的 Java 对象。Java 运行时和脚本语言运行时可以相互通信并利用彼此的特性。


    Java 对脚本语言的支持是通过 Java 脚本 API 实现的。Java 脚本 API 中的所有类和接口都在 `javax.script` 包中。


    在 Java 应用程序中使用脚本语言有几个优点：


    *   大多数脚本语言是动态类型的，这使得编写程序更简单。

    *   它们提供了一种更快速开发和测试小型应用程序的方法。

    *   最终用户可以进行定制。

    *   脚本语言可能提供 Java 中没有的领域特定功能。


    脚本语言也有一些缺点。例如，动态类型有利于编写更简单的代码；然而，当类型被错误解释，并且你必须花费大量时间调试时，它就变成了一个缺点。


    Java 中的脚本支持让你能够两全其美：它允许你使用 Java 编程语言开发应用程序中静态类型、可扩展和高性能的部分，同时使用适合其他部分领域特定需求的脚本语言。


    我将在本书中频繁使用术语“脚本引擎”。脚本引擎是一个软件组件，用于执行用特定脚本语言编写的程序。通常（但不一定），脚本引擎是某种脚本语言解释器的实现。几种脚本语言的解释器已经在
    Java 中实现。它们公开了编程接口，以便 Java 程序可以与它们交互。


    JDK 7 附带了一个名为 Rhino JavaScript 的脚本引擎。JDK 8 将 Rhino JavaScript 引擎替换为一个更轻量、更快的脚本引擎，称为
    Nashorn JavaScript。本书讨论的是 Nashorn JavaScript，而非 Rhino JavaScript。有关 Rhino JavaScript
    文档的更多详细信息，请访问 [`www.mozilla.org/rhino`](http://www.mozilla.org/rhino)。如果你想将用 Rhino
    JavaScript 编写的程序迁移到 Nashorn，请访问位于 [`https://wiki.openjdk.java.net/display/Nashorn/Rhino+Migration+Guide`](https://wiki.openjdk.java.net/display/Nashorn/Rhino+Migration+Guide)
    的 Rhino 迁移指南。如果你有兴趣在 JDK 8 中使用 Rhino JavaScript，请访问页面 [`https://wiki.openjdk.java.net/display/Nashorn/Using+Rhino+JSR-223+engine+with+JDK8`](https://wiki.openjdk.java.net/display/Nashorn/Using+Rhino+JSR-223+engine+with+JDK8)。


    Java 包含一个名为 `jrunscript` 的命令行 shell，可用于以交互模式或批处理模式运行脚本。`jrunscript` shell 是与脚本语言无关的；在
    JDK 7 中默认语言是 Rhino JavaScript，在 JDK 8 中是 Nashorn。我将在第 9 章中详细讨论 `jrunscript` shell。JDK
    8 还包含另一个名为 `jjs` 的命令行工具，它调用 Nashorn 引擎并提供 Nashorn 特定的命令行选项。如果你使用 Nashorn，你应该优先使用
    `jjs` 命令行工具而不是 `jrunscript`。我将在第 10 章中讨论 `jjs` 命令行工具。


    Java 可以执行任何提供了脚本引擎实现的脚本语言编写的脚本。例如，Java 可以执行用 Nashorn JavaScript、Rhino JavaScript、Groovy、Jython、JRuby
    等编写的脚本。本书中的示例使用 Nashorn JavaScript 语言。


    在本书中，术语“Nashorn”、“Nashorn 引擎”、“Nashorn JavaScript”、“Nashorn JavaScript 引擎”、“Nashorn
    脚本语言”和“JavaScript”被同义使用。


    Nashorn 脚本引擎可以通过两种方式调用：


    *   将引擎嵌入到 JVM 中

    *   使用 `jjs` 命令行工具


    在本章中，我将讨论使用 Nashorn 脚本引擎的这两种方式。

    '
- fmt: "# Executing Your First Script\n\nIn this section, you will use Nashorn to\
    \ print a message on the standard output. You will access the Nashorn engine from\
    \ Java code. The same steps can be used to print a message using any other scripting\
    \ languages, with one difference: you will need to use the scripting language-specific\
    \ code to print the message. You need to perform three steps to run a script in\
    \ Java:\n\n- Create a script engine manager.\n- Get an instance of a script engine\
    \ from the script engine manager.\n- Call the `eval()` method of the script engine\
    \ to execute a script.\n\nA script engine manager is an instance of the `ScriptEngineManager`\
    \ class. You can create a script engine, like so:\n\n```\n// Create a script engine\
    \ manager\nScriptEngineManager manager = new ScriptEngineManager();\n```\n\nAn\
    \ instance of the `ScriptEngine` interface represents a script engine in a Java\
    \ program. The `getEngineByName(String engineShortName)` method of a `ScriptEngineManager`\
    \ is used to get an instance of a script engine. To get an instance of the Nashorn\
    \ engine, use `JavaScript` as the short name of the engine as shown:\n\n```\n\
    // Get the reference of a Nashorn engine\nScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n```\n\n**Tip**\n\nThe short name of a script engine is case-sensitive.\
    \ Sometimes a script engine has multiple short names. Nashorn engine has the following\
    \ short names: `nashorn`, `Nashorn`, `js`, `JS`, `JavaScript`, `javascript`, `ECMAScript`,\
    \ `ecmascript`. You can use any of the short names of an engine to get its instance\
    \ using the `getEngineByName()` method of the `ScriptEngineManager` class.\n\n\
    In Nashorn, the `print()` function prints a message on the standard output and\
    \ a string literal is a sequence of characters enclosed in single or double quotes.\
    \ The following snippet of code stores a script in a `String` object that prints\
    \ `Hello Scripting!` on the standard output:\n\n```\n// Store a Nashorn script\
    \ in a string\nString script = \"print('Hello Scripting!')\";\n```\n\nIf you want\
    \ to use double quotes to enclose the string literal in Nashorn, the statement\
    \ will look as shown:\n\n```\n// Store a Nashorn script in a string\nString script\
    \ = \"print(\\\"Hello Scripting!\\\")\";\n```\n\nTo execute the script, you need\
    \ to pass it to the `eval()` method of the script engine. A script engine may\
    \ throw a `ScriptException` when it runs a script. For this reason, you need to\
    \ handle this exception when you call the `eval()` method of the `ScriptEngine`.\
    \ The following snippet of code executes the script stored in the `script` variable:\n\
    \n```\ntry {\n    engine.eval(script);\n}\ncatch (ScriptException e) {\n    e.printStackTrace();\n\
    }\n```\n\nListing 1-1 contains the complete code for the program to print a message\
    \ on the standard output.\n\n**Listing 1-1.** Printing a Message on the Standard\
    \ Output Using Nashorn\n\n```\n// HelloScripting.java\npackage com.jdojo.script;\n\
    \nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n\npublic class HelloScripting {\n    public\
    \ static void main(String[] args) {\n        // Create a script engine manager\n\
    \        ScriptEngineManager manager = new ScriptEngineManager();\n\n        //\
    \ Obtain a Nashorn script engine from the manager\n        ScriptEngine engine\
    \ = manager.getEngineByName(\"JavaScript\");\n\n        // Store the script in\
    \ a String\n        String script = \"print('Hello Scripting!')\";\n\n       \
    \ try {\n            // Execute the script\n            engine.eval(script);\n\
    \        }\n        catch (ScriptException e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n```\n\n`Hello Scripting!`\n\n# Using the `jjs` Command-line\
    \ Tool\n\nIn the previous section, you saw how use the Nashorn scripting engine\
    \ from the Java programs. In this section, I will show you how to perform the\
    \ same task using the `jjs` command-line tool. The tool is stored in the `JDK_HOME\\\
    bin` and `JRE_HOME\\bin` directories. For example, if you have installed JDK8\
    \ in `C:\\java8` directory on Windows, the path for the `jjs` tool will be `C:\\\
    java8\\bin\\jjs.exe`. The `jjs` tool can be used to execute Nashorn script in\
    \ a file or execute scripts interactively.\n\nThe following is an invocation of\
    \ the `jjs` tool on a Windows command-prompt. The script is entered and executed.\
    \ You can use `quit()` or `exit()` function to exit the `jjs` tool:\n\n```\nC:\\\
    >jjs\njjs> print('Hello Scripting!');\nHello Scripting!\njjs> quit()\nC:\\>\n\
    ```\n\nYou may get the following error executing the `jjs` command:\n\n```\n'jjs'\
    \ is not recognized as an internal or external command, operable program or batch\
    \ file.\n```\n\nThe error indicates that the command prompt was not able to locate\
    \ the `jjs` tool. In this case, you can either enter the full path of the `jjs`\
    \ tool or add the directory containing the too in the system PATH.\n\nConsider\
    \ the code listed in Listing 1-2. It is Nashorn code that uses the `print()` function\
    \ to print a message on the standard output. The code is saved in a file named\
    \ `helloscripting.js`.\n\n**Listing 1-2.** The Contents of the `helloscripting.js`\
    \ File\n\n```\n// helloscripting.js\n// Print a message on the standard output\n\
    print('Hello Scripting!');\n```\n\nThe following command executes the script stored\
    \ in the `helloscripting.js` file assuming that the file is stored in the current\
    \ directory:\n\n```\nC:\\>jjs helloscripting.js\nHello Scripting!\nC:\\>\n```\n\
    \nIf this command gives you an error similar to the following, it means that the\
    \ command was not able to find the specified file and you need to specify the\
    \ full path of the `helloscritping.js` file:\n\n```\njava.io.FileNotFoundException:\
    \ C:\\helloscripting.js (The system cannot find the file specified)\n```\n\nThe\
    \ `jjs` command-line tool is a big topic and I will devote a complete chapter\
    \ to it. I will discuss it in detail in [Chapter 10](#A978-1-4842-0713-0_10_Chapter.html).\n\
    \n# Printing Text in Nashorn\n\nNashorn provides you three functions to print\
    \ text on the standard output:\n\n- The `print()` function\n- The `printf()` function\n\
    - The `echo()` function\n\nThe `print()` function is a varargs function. You can\
    \ pass any number of arguments to it. It converts its arguments to string and\
    \ prints them separating them by a space. At the end, it prints a new line. The\
    \ following two invocations of the `print()` function are the same:\n\n```\nprint(\"\
    Hello\", \"World!\"); // Prints Hello World!\nprint(\"Hello World!\");    // Prints\
    \ Hello World!\n```\n\nThe `printf()` function is used to use the printf-style\
    \ formatted printing. It is the same as invoking the Java method `System.out.printf()`:\n\
    \n```\nprintf(\"%d + %d = %d\", 10, 20, 10 + 20); // Prints 10 + 20 = 30\n```\n\
    \nThe `echo()` function is the same as the `print()` function, except that it\
    \ works only in scripting mode. Scripting mode is discussed in [Chapter 10](#A978-1-4842-0713-0_10_Chapter.html)."
  raw: '## Executing Your First Script


    In this section, you will use Nashorn to print a message on the standard output.
    You will access the Nashorn engine from Java code. The same steps can be used
    to print a message using any other scripting languages, with one difference: you
    will need to use the scripting language-specific code to print the message. You
    need to perform three steps to run a script in Java:


    *   Create a script engine manager.

    *   Get an instance of a script engine from the script engine manager.

    *   Call the `eval()` method of the script engine to execute a script.


    A script engine manager is an instance of the `ScriptEngineManager` class. You
    can create a script engine, like so:


    `// Create a script engine manager`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    An instance of the `ScriptEngine` interface represents a script engine in a Java
    program. The `getEngineByName(String engineShortName)` method of a `ScriptEngineManager`
    is used to get an instance of a script engine. To get an instance of the Nashorn
    engine, use `JavaScript` as the short name of the engine as shown:


    `// Get the reference of a Nashorn engine`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    Tip


    The short name of a script engine is case-sensitive. Sometimes a script engine
    has multiple short names. Nashorn engine has the following short names: `nashorn`,
    `Nashorn`, `js`, `JS`, `JavaScript`, `javascript`, `ECMAScript`, `ecmascript`.
    You can use any of the short names of an engine to get its instance using the
    `getEngineByName()` method of the `ScriptEngineManager` class.


    In Nashorn, the `print()` function prints a message on the standard output and
    a string literal is a sequence of characters enclosed in single or double quotes.
    The following snippet of code stores a script in a `String` object that prints
    `Hello Scripting!` on the standard output:


    `// Store a Nashorn script in a string`


    `String script = "print(''Hello Scripting!'')";`


    If you want to use double quotes to enclose the string literal in Nashorn, the
    statement will look as shown:


    `// Store a Nashorn script in a string`


    `String script = "print(\"Hello Scripting!\")";`


    To execute the script, you need to pass it to the `eval()` method of the script
    engine. A script engine may throw a `ScriptException` when it runs a script. For
    this reason, you need to handle this exception when you call the `eval()` method
    of the `ScriptEngine`. The following snippet of code executes the script stored
    in the `script` variable:


    `try {`


    `engine.eval(script);`


    `}`


    `catch (ScriptException e) {`


    `e.printStackTrace();`


    `}`


    Listing 1-1 contains the complete code for the program to print a message on the
    standard output.


    Listing 1-1\. Printing a Message on the Standard Output Using Nashorn


    `// HelloScripting.java`


    `package com.jdojo.script;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class HelloScripting {`


    `public static void main(String[] args) {`


    `// Create a script engine manager`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `// Obtain a Nashorn script engine from the manager`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// Store the script in a String`


    `String script = "print(''Hello Scripting!'')";`


    `try {`


    `// Execute the script`


    `engine.eval(script);`


    `}`


    `catch (ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `Hello Scripting!`


    ## Using the jjs Command-line Tool


    In the previous section, you saw how use the Nashorn scripting engine from the
    Java programs. In this section, I will show you how to perform the same task using
    the `jjs` command-line tool. The tool is stored in the `JDK_HOME\bin` and `JRE_HOME\bin`
    directories. For example, if you have installed JDK8 in `C:\java8` directory on
    Windows, the path for the `jjs` tool will be `C:\java8\bin\jjs.exe`. The `jjs`
    tool can be used to execute Nashorn script in a file or execute scripts interactively.


    The following is an invocation of the `jjs` tool on a Windows command-prompt.
    The script is entered and executed. You can use q`uit()` or `exit()` function
    to exit the `jjs` tool:


    `C:\>jjs`


    `jjs> print(''Hello Scripting!'');`


    `Hello Scripting!`


    `jjs> quit()`


    `C:\>`


    You may get the following error executing the `jjs` command:


    `''jjs'' is not recognized as an internal or external command, operable program
    or batch file.`


    The error indicates that the command prompt was not able to locate the `jjs` tool.
    In this case, you can either enter the full path of the `jjs` tool or add the
    directory containing the too in the system PATH.


    Consider the code listed in Listing 1-2\. It is Nashorn code that uses the `print()`
    function to print a message on the standard output. The code is saved in a file
    named `helloscripting.js`.


    Listing 1-2: The Contents of the helloscripting.js File


    `// helloscripting.js`


    `// Print a message on the standard output`


    `print(''Hello Scripting!'');`


    The following command executes the script stored in the `helloscripting.js` file
    assuming that the file is stored in the current directory:


    `C:\>jjs helloscripting.js`


    `Hello Scripting!`


    `C:\>`


    If this command gives you an error similar to the following, it means that the
    command was not able to find the specified file and you need to specify the full
    path of the helloscritping.js file:


    `java.io.FileNotFoundException: C:\helloscripting.js (The system cannot find the
    file specified)`


    The `jjs` command-line tool is a big topic and I will devote a complete chapter
    to it. I will discuss it in detail in [Chapter 10](#A978-1-4842-0713-0_10_Chapter.html).


    ## Printing Text in Nashorn


    Nashorn provides you three functions to print text on the standard output:


    *   The `print()` function

    *   The `printf()` function

    *   The `echo()` function


    The `print()` function is a varargs function. You can pass any number of arguments
    to it. It converts its arguments to string and prints them separating them by
    a space. At the end, it prints a new line. The following two invocations of the
    `print()` function are the same:


    `print("Hello", "World!"); // Prints Hello World!`


    `print("Hello World!");    // Prints Hello World!`


    The `printf()` function is used to use the printf-style formatted printing. It
    is the same as invoking the Java method `System.out.printf()`:


    `printf("%d + %d = %d", 10, 20, 10 + 20); // Prints 10 + 20 = 30`


    The `echo()` function is the same as the `print()` function, except that it works
    only in scripting mode. Scripting mode is discussed in [Chapter 10](#A978-1-4842-0713-0_10_Chapter.html).'
