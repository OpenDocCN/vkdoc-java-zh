- fmt: "# Tracing and Profiling Scripts\n\nNashorn supports callsite tracing and profiling.\
    \ You can enable these options in the `jjs` command-line tool as well as in the\
    \ embedded Nashorn engine. You can enable tracing and profiling for all scripts\
    \ run by the engine or per script/function. The `–tcs` option enables callsite\
    \ tracing for all scripts and prints the callsite tracing information on the standard\
    \ output. The `-pcs` option enables callsite profiling for all scripts and prints\
    \ the callsite profiling data in a file called `NashornProfile.txt` in the current\
    \ directory.\n\nYou can use the following four Nashorn directives in the beginning\
    \ of scripts or functions to selectively trace and profile the entire script or\
    \ functions:\n\n- `\"nashorn callsite trace enterexit\"; // Equivalent to -tcs=enterexit`\n\
    - `\"nashorn callsite trace miss\";      // Equivalent to -tcs=miss`\n- `\"nashorn\
    \ callsite trace objects\";   // Equivalent to -tcs=objects`\n- `\"nashorn callsite\
    \ profile\";         // Equivalent to -pcs`\n\n**Tip**\n\nThe `–tcs` and `–pcs`\
    \ options work on per script engine basis, whereas the four tracing and profiling\
    \ directives work on per script and per function basis.\n\nThese Nashorn directives\
    \ are enabled only in debug mode. You can enable Nashorn debug mode by setting\
    \ the `nashorn.debug` system property to true. These directive are available in\
    \ JDK8u40 and later. JDK8u40 is still in development at the time of writing of\
    \ this book. Listing 13-3 shows a script with a Nashorn callsite profile option\
    \ enabled for a function. The script has been saved in the file named `primeprofiler.js`.\n\
    \n**Listing 13-3. A Script with a Nashorn Callsite Profile Directive Enabled for\
    \ a Function**\n\n```\n// primeprofiler.js\n\nfunction isPrime(n) {\n    // Profile\
    \ this function only\n    \"nashorn callsite profile\";\n\n    // Integers <=\
    \ 2, floating-point numbers, and even numbers are not primes\n    if (n <= 2 ||\
    \ Math.floor(n) !== n || n % 2 === 0) {\n        return false;\n    }\n\n    //\
    \ Check if n is divisible by any odd integers between 3 and sqrt(n).\n    var\
    \ sqrt = Math.sqrt(n);\n    for (var i = 3; i <= sqrt; i += 2) {\n        if (n\
    \ % i === 0) {\n            return false;\n        }\n    }\n\n    return true;\
    \ // If we get here, it is a prime number.\n}\n\n// Check few nubmers for being\
    \ primes\nvar num = 8;\nvar isPrimeNum = isPrime(num);\nprint(num + \" is a prime\
    \ number: \" + isPrimeNum);\n\nnum = 37;\nisPrimeNum = isPrime(num);\nprint(num\
    \ + \" is a prime number: \" + isPrimeNum);\n```\n\nThe following command runs\
    \ the script in the `primeprofile.js` file with Nashorn debug option enabled:\n\
    \n```\nc:\\>jjs -J-Dnashorn.debug=true primeprofile.js\n8 is a prime number: false\n\
    37 is a prime number: true\nC:\\\n```\n\nThe command will generate a file named\
    \ `NashornProfile.txt` in the current directly that contains the profile data\
    \ for the `isPrime()` function call. The contents of this file are shown in Listing\
    \ 13-4.\n\n**Listing 13-4. The Contents of the NashornProfile.txt File**\n\n```\n\
    0        dyn:getProp|getElem|getMethod:Math        438462        2\n1        dyn:getMethod|getProp|getElem:floor\
    \       433936        2\n2        dyn:call                                  650602\
    \        2\n3        dyn:getProp|getElem|getMethod:Math        313834        1\n\
    4        dyn:getMethod|getProp|getElem:sqrt        283356        1\n5        dyn:call\
    \                                       0        1\n```\n\nListing 13-5 contains\
    \ the Java program that sets the `nashorn.debug` system property and runs the\
    \ script shown in Listing 13-3. Running the program will create a `NashornProfile.txt`\
    \ file in the current directory, and the contents of the file will be the same\
    \ as shown in Listing 13-2.\n\n**Listing 13-5. Setting the nashorn.debug System\
    \ Property and Profiling Scripts**\n\n```\n// ProfilerTest.java\npackage com.jdojo.script;\n\
    \nimport java.io.IOException;\nimport java.io.Reader;\nimport java.nio.file.Files;\n\
    import java.nio.file.Path;\nimport java.nio.file.Paths;\nimport javax.script.ScriptEngine;\n\
    import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
    \npublic class ProfilerTest {\n    public static void main(String[] args) {\n\
    \        // Set the nashorn.debug system property, so the tracing and\n      \
    \  // profiling directives will be recognized\n        System.setProperty(\"nashorn.debug\"\
    , \"true\");\n\n        // Construct the script file path\n        String scriptFileName\
    \ = \"primeprofiler.js\";\n        Path scriptPath = Paths.get(scriptFileName);\n\
    \n        // Make sure the script file exists. If not, print the full\n      \
    \  // path of the script file and terminate the program.\n        if (!Files.exists(scriptPath))\
    \ {\n            System.out.println(scriptPath.toAbsolutePath() +\n          \
    \      \"does not exist.\");\n            return;\n        }\n\n        // Get\
    \ the Nashorn script engine\n        ScriptEngineManager manager = new ScriptEngineManager();\n\
    \        ScriptEngine engine = manager.getEngineByName(\"JavaScript\");\n\n  \
    \      try {\n            // Get a Reader for the script file\n            Reader\
    \ scriptReader = Files.newBufferedReader(scriptPath);\n\n            // Execute\
    \ the script in the file\n            engine.eval(scriptReader);\n        }\n\
    \        catch (IOException | ScriptException e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n8 is a prime number: false\n37 is a prime number: true\n\
    ```\n\n## Summary\n\nNetBeans 8 with JDK 8 or later supports debugging Nashorn\
    \ scripts in the NetBeans IDE. You can run and debug standalone Nashorn scripts\
    \ from within the NetBeans IDE. You can also debug Nashorn scripts when they are\
    \ called from Java code. The debugger jumps from Java code to Nashorn scripts\
    \ seamlessly.\n\nNashorn supports callsite tracing and profiling. You can enable\
    \ these options in the `jjs` command-line tool as well as in the embedded Nashorn\
    \ engine. You can enable tracing and profiling for all scripts run by the engine\
    \ or per script/function. The `–tcs` option enables callsite tracing for all scripts\
    \ run by the engine. The `-pcs` option enables callsite profiling for all scripts\
    \ run by the engine and prints the callsite profiling data in a file called `NashornProfile.txt`\
    \ in the current directory. JDK8u40 adds four Nashorn directives: `\"nashorn callsite\
    \ trace enterexit\"`, `\"nashorn callsite trace miss\"`, `\"nashorn callsite trace\
    \ objects\"`, and `\"nashorn callsite profile\"`. These directives can be added\
    \ in the beginning of scripts and functions to trace and profile scripts and functions\
    \ selectively. They work only in debug mode, which can be enabled setting the\
    \ system property `nashorn.debug` to true."
  raw: '## Tracing and Profiling Scripts


    Nashorn supports callsite tracing and profiling. You can enable these options
    in the `jjs` command-line tool as well as in the embedded Nashorn engine. You
    can enable tracing and profiling for all scripts run by the engine or per script/function.
    The `–tcs` option enables callsite tracing for all scripts and prints the callsite
    tracing information on the standard output. The `-pcs` option enables callsite
    profiling for all scripts and prints the callsite profiling data in a file called
    `NashornProfile.txt` in the current directory.


    You can use the following four Nashorn directives in the beginning of scripts
    or functions to selectively trace and profile the entire script or functions:


    *   `"nashorn callsite trace enterexit"; // Equivalent to -tcs=enterexit`

    *   `"nashorn callsite trace miss";      // Equivalent to -tcs=miss`

    *   `"nashorn callsite trace objects";   // Equivalent to -tcs=objects`

    *   `"nashorn callsite profile";         // Equivalent to -pcs`


    Tip


    The `–tcs` and `–pcs` options work on per script engine basis, whereas the four
    tracing and profiling directives work on per script and per function basis.


    These Nashorn directives are enabled only in debug mode. You can enable Nashorn
    debug mode by setting the `nashorn.debug` system property to true. These directive
    are available in JDK8u40 and later. JDK8u40 is still in development at the time
    of writing of this book. Listing 13-3 shows a script with a Nashorn callsite profile
    option enabled for a function. The script has been saved in the file named `primeprofiler.js`.


    Listing 13-3\. A Script with a Nashorn Callsite Profile Directive Enabled for
    a Function


    `// primeprofiler.js`


    `function isPrime(n) {`


    `// Profile this function only`


    `"nashorn callsite profile";`


    `// Integers <= 2, floating-point numbers, and even numbers are not primes`


    `if (n <= 2 || Math.floor(n) !== n || n % 2 === 0) {`


    `return false;`


    `}`


    `// Check if n is divisible by any odd integers between 3 and sqrt(n).`


    `var sqrt = Math.sqrt(n);`


    `for (var i = 3; i <= sqrt; i += 2) {`


    `if (n % i === 0) {`


    `return false;`


    `}`


    `}`


    `return true; // If we get here, it is a prime number.`


    `}`


    `// Check few nubmers for being primes`


    `var num = 8;`


    `var isPrimeNum = isPrime(num);`


    `print(num + " is a prime number: " + isPrimeNum);`


    `num = 37;`


    `isPrimeNum = isPrime(num);`


    `print(num + " is a prime number: " + isPrimeNum);`


    The following command runs the script in the `primeprofile.js` file with Nashorn
    debug option enabled:


    `c:\>jjs -J-Dnashorn.debug=true primeprofile.js`


    `8 is a prime number: false`


    `37 is a prime number: true`


    `C:\`


    The command will generate a file named `NashornProfile.txt` in the current directly
    that contains the profile data for the `isPrime()` function call. The contents
    of this file are shown in Listing 13-4.


    Listing 13-4\. The Contents of the NashornProfile.txt File


    `0        dyn:getProp|getElem|getMethod:Math        438462        2`


    `1        dyn:getMethod|getProp|getElem:floor       433936        2`


    `2        dyn:call                                  650602        2`


    `3        dyn:getProp|getElem|getMethod:Math        313834        1`


    `4        dyn:getMethod|getProp|getElem:sqrt        283356        1`


    `5        dyn:call                                       0        1`


    Listing 13-5 contains the Java program that sets the `nashorn.debug` system property
    and runs the script shown in Listing 13-3\. Running the program will create a
    `NashornProfile.txt` file in the current directory, and the contents of the file
    will be the same as shown in Listing 13-2.


    Listing 13-5\. Setting the nashorn.debug System Property and Profiling Scripts


    `// ProfilerTest.java`


    `package com.jdojo.script;`


    `import java.io.IOException;`


    `import java.io.Reader;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class ProfilerTest {`


    `public static void main(String[] args) {`


    `// Set the nashorn.debug system property, so the tracing and`


    `// profiling directives will be recognized`


    `System.setProperty("nashorn.debug", "true");`


    `// Construct the script file path`


    `String scriptFileName = "primeprofiler.js";`


    `Path scriptPath = Paths.get(scriptFileName);`


    `// Make sure the script file exists. If not, print the full`


    `// path of the script file and terminate the program.`


    `if (!Files.exists(scriptPath)) {`


    `System.out.println(scriptPath.toAbsolutePath() +                    "does not
    exist.");`


    `return;`


    `}`


    `// Get the Nashorn script engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `try {`


    `// Get a Reader for the script file`


    `Reader scriptReader = Files.newBufferedReader(scriptPath);`


    `// Execute the script in the file`


    `engine.eval(scriptReader);`


    `}`


    `catch (IOException | ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `8 is a prime number: false`


    `37 is a prime number: true`


    ## Summary


    NetBeans 8 with JDK 8 or later supports debugging Nashorn scripts in the NetBeans
    IDE. You can run and debug standalone Nashorn scripts from within the NetBeans
    IDE. You can also debug Nashorn scripts when they are called from Java code. The
    debugger jumps from Java code to Nashorn scripts seamlessly.


    Nashorn supports callsite tracing and profiling. You can enable these options
    in the `jjs` command-line tool as well as in the embedded Nashorn engine. You
    can enable tracing and profiling for all scripts run by the engine or per script/function.
    The `–tcs` option enables callsite tracing for all scripts run by the engine.
    The `-pcs` option enables callsite profiling for all scripts run by the engine
    and prints the callsite profiling data in a file called `NashornProfile.txt` in
    the current directory. JDK8u40 adds four Nashorn directives: `"nashorn callsite
    trace enterexit"`, `"nashorn callsite trace miss"`, `"nashorn callsite trace objects"`,
    and `"nashorn callsite profile"`. These directives can be added in the beginning
    of scripts and functions to trace and profile scripts and functions selectively.
    They work only in debug mode, which can be enabled setting the system property
    `nashorn.debug` to true.'
