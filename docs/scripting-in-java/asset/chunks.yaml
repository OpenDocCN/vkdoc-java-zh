    ### 搜索数组


    有两个方法，`indexOf()` 和 `lastIndexOf()`，允许你在数组中搜索指定的元素。它们的签名是：


    *   `indexOf(searchElement, fromIndex)`

    *   `lastIndexOf(searchElement, fromIndex)`


    `indexOf()` 方法从 `fromIndex` 开始，在数组中搜索指定的 `searchElement`。如果未指定 `fromIndex`，则假定为
    0，这意味着搜索整个数组。该方法使用 `===` 运算符返回数组中第一个等于 `searchElement` 的元素的索引。如果未找到 `searchElement`，则返回
    -1。


    `lastIndexOf()` 方法的工作方式与 `indexOf()` 方法相同，区别在于它从末尾向开头进行搜索。也就是说，它返回数组中最后一个找到的等于
    `searchElement` 的元素的索引。以下代码展示了如何使用这些方法：


    `var ids = [10, 20, 30, 20];`


    `print("ids = " + ids);`


    `print("ids.indexOf(20) = " + ids.indexOf(20));`


    `print("ids.indexOf(20, 2) = " + ids.indexOf(20, 2));`


    `print("ids.lastIndexOf(20) = " + ids.lastIndexOf(20));`


    `print("ids.indexOf(25) = " + ids.lastIndexOf(25));`


    `ids = 10,20,30,20`


    `ids.indexOf(20) = 1`


    `ids.indexOf(20, 2) = 3`


    `ids.lastIndexOf(20) = 3`


    `ids.indexOf(25) = -1`


    ### 评估谓词


    你可以检查一个谓词对于数组中的所有或部分元素是否求值为 `true`。以下两个方法允许你执行此操作：


    *   `every(predicate, thisArg)`

    *   `some(predicate, thisArg)`


    第一个参数 `predicate` 是一个函数，它会为数组中的每个现有元素调用一次。该函数接收三个参数：元素的值、元素的索引和数组对象。第二个参数 `thisArg`，如果指定，则用作
    `predicate` 指定的函数调用中的 `this` 值。


    如果指定的 `predicate` 函数为数组中的每个现有元素都返回一个真值，则 `every()` 方法返回 `true`。否则，返回 `false`。一旦
    `predicate` 为某个元素返回假值，该方法就会返回 `false`。


    如果 `predicate` 至少为一个元素返回真值，则 `some()` 方法返回 `true`。否则，返回 `false`。一旦 `predicate`
    为某个元素返回真值，该方法就会返回 `true`。以下示例展示了如何检查一个数字数组是否包含任何/全部偶数/奇数：


    `var ids = [10, 20, 30, 20];`


    `print("ids = " + ids);`


    `var hasAnyEven = ids.some(function (value, index, array) {`


    `return value %2 === 0;`


    `});`


    `var hasAllEven = ids.every(function (value, index, array) {`


    `return value %2 === 0;`


    `});`


    `var hasAnyOdd = ids.some(function (value, index, array) {`


    `return value %2 === 1;`


    `});`


    `var hasAllOdd = ids.every(function (value, index, array) {`


    `return value %2 === 1;`


    `});`


    `print("ids has any even numbers: " + hasAnyEven);`


    `print("ids has all even numbers: " + hasAllEven);`


    `print("ids has any odd numbers: " + hasAnyOdd);`


    `print("ids has all odd numbers: " + hasAllOdd);`


    `ids = 10,20,30,20`


    `ids has any even numbers: true`


    `ids has all even numbers: true`


    `ids has any odd numbers: false`


    `ids has all odd numbers: false`


    ## 将数组转换为字符串


    你可以以任何想要的方式将数组转换为字符串。然而，`toString()` 和 `toLocaleString()` 方法提供了两种内置的实现来将数组元素转换为字符串。`toString()`
    方法返回一个字符串，该字符串是通过在数组上调用 `join()` 方法而不指定任何分隔符得到的。也就是说，它返回元素列表作为字符串，其中元素由逗号分隔。`toLocaleString()`
    方法调用所有数组元素的 `toLocaleString()` 方法，使用特定于语言环境的分隔符连接返回的字符串，并返回最终的字符串。当你将数组对象用作 `print()`
    方法的参数或将其与字符串连接运算符一起使用时，你一直在使用 `Array` 对象的 `toString()` 方法。

