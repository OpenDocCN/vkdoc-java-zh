  raw: '## Summary


    A scripting language is a programming language that provides you the ability to
    write scripts that are evaluated (or interpreted) by a runtime environment called
    a script engine (or an interpreter). A script is a sequence of characters that
    is written using the syntax of a scripting language and used as the source for
    a program executed by an interpreter. The Java Scripting API allows you to execute
    scripts written in any scripting language that can be compiled to Java bytecode
    from the Java application. JDK 6 and 7 shipped with a script engine called Rhino
    JavaScript engine. In JDK 8, the Rhino JavaScript engine has been replaced with
    a script engine called Nashorn.


    Nashorn engine can be used in two ways; it can be embedded into the JVM and invoked
    from the Java programs directly or it can be invoked from a command prompt using
    the `jjs` command-line tool.


    Nashorn provides three functions to print text on the standard output: `print()`,
    `printf()`, and `echo()`. The `print()` function takes a variable number of arguments;
    it prints all arguments separating them with a space and at the end, prints a
    new line. The `printf()` function prints formatted text; it works the same way
    the printf-style formatting works in the Java programming language. The `echo()`
    function is works the same way the `print()` function works, except that the former
    is available only when Nashorn engine is invoked in scripting mode.


    Scripts are executed using a script engine that is an instance of the `ScriptEngine`
    interface. The implementer of the `ScriptEngine` interface also provides an implementation
    of the `ScriptEngineFactory` interface whose job is to create instances of the
    script engine and provide details about the script engine. The `ScriptEngineManager`
    class provides a discovery and instantiation mechanism for script engines. A `ScriptManager`
    maintains a mapping of key-value pairs as an instance of the `Bindings` interface
    that is shared by all script engines that it creates.


    # 2. Executing Scripts


    In this chapter, you will learn:


    *   How to use the `eval()` method of `ScriptEngine` to execute scripts

    *   How to pass parameters from Java code to Nashorn engine

    *   How to pass parameters from Nashorn engine to Java


    ## Using the eval( ) Method


    A `ScriptEngine` can execute a script in a `String` and a `Reader`. Using a `Reader`,
    you can execute a script stored on the network or in a file. One of the following
    versions of the `eval()` method of the `ScriptEngine` interface is used to execute
    a script:


    *   `Object eval(String script)`

    *   `Object eval(Reader reader)`

    *   `Object eval(String script, Bindings bindings)`

    *   `Object eval(Reader reader, Bindings bindings)`

    *   `Object eval(String script, ScriptContext context)`

    *   `Object eval(Reader reader, ScriptContext context)`


    The first argument of the `eval()` method is the source of the script. The second
    argument lets you pass information from the host application to the script engine
    that can be used during the execution of the script.


    In [Chapter 1](#A978-1-4842-0713-0_1_Chapter.html), you saw how to use a `String`
    object to execute a script using the first version of the `eval()` method. In
    this chapter, you will store your script in a file and use a `Reader` object as
    the source of the script, which will use the second version of the `eval()` method.
    The next section discusses the other four versions of the `eval()` method. Typically,
    a script file is given a `.js` extension.


    Listing 2-1 shows the contents of a file named `helloscript.js`. It contains only
    one statement in Nashorn that prints a message on the standard output.


    Listing 2-1\. The Contents of the helloscript.js File


    `// helloscript.js`


    `// Print a message`


    `print(''Hello from JavaScript!'');`


    Listing 2-2 contains the Java program that executes the script stored in the `helloscript.js`
    file, which should be stored in the current directory. If the script file is not
    found, the program prints the full path of the `helloscript.js` file where it
    is expected. If you have trouble executing the script file, try using the absolute
    path in the `main()` method such as `C:\scripts\helloscript.js` on Windows, assuming
    that the `helloscript.js` file is saved in the `C:\scripts` directory.


    Listing 2-2\. Executing a Script Stored in a File


    `// ReaderAsSource.java`


    `package com.jdojo.script;`


    `import java.io.IOException;`


    `import java.io.Reader;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class ReaderAsSource {`


    `public static void main(String[] args) {`


    `// Construct the script file path`


    `String scriptFileName = "helloscript.js";`


    `Path scriptPath = Paths.get(scriptFileName);`


    `// Make sure the script file exists. If not, print the full`


    `// path of the script file and terminate the program.`


    `if (! Files.exists(scriptPath) ) {`


    `System.out.println(scriptPath.toAbsolutePath() +`


    `" does not exist.");`


    `return;`


    `}`


    `// Get the Nashorn script engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `try {`


    `// Get a Reader for the script file`


    `Reader scriptReader = Files.                        newBufferedReader(scriptPath);`


    `// Execute the script in the file`


    `engine.eval(scriptReader);`


    `}`


    `catch (IOException | ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `Hello from JavaScript!`


    In a real-world application, you should store all scripts in files that allow
    modifying scripts without modifying and recompiling your Java code. You will not
    follow this rule in most of the examples in this chapter; you will store your
    scripts in `String` objects to keep the code short and simple.


    ## Passing Parameters


    The Java Scripting API allows you to pass parameters from the host environment
    (Java application) to the script engine and vice versa. In this section, you will
    see the technical details of parameter passing mechanisms between the host application
    and the script engine. There are several way to pas parameters to scripts from
    Java programs. In this chapter, I will explain the simplest form of parameter
    passing. I will discuss all other forms in [Chapter 3](#A978-1-4842-0713-0_3_Chapter.html).'
