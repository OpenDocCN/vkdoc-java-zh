- fmt: "# Using Compiled Scripts\n\nA script engine may allow compiling a script and\
    \ executing it repeatedly. Executing compiled scripts may increase the performance\
    \ of an application. A script engine may compile and store scripts in the form\
    \ of Java classes, Java class files, or in a language-specific form.\n\nNot all\
    \ script engines are required to support script compilation. Script engines that\
    \ support script compilation must implement the `Compilable` interface. Nashorn\
    \ engine supports script compilation. The following snippet of code checks if\
    \ a script engine implements the `Compilable` interface:\n\n```\n// Get the script\
    \ engine reference\nScriptEngineManager manager = new ScriptEngineManager();\n\
    ScriptEngine engine = manager.getEngineByName(\"YOUR_ENGINE_NAME\");\nif (engine\
    \ instanceof Compilable) {\n    System.out.println(\"Script compilation is supported.\"\
    );\n}\nelse {\n    System.out.println(\"Script compilation is not supported.\"\
    );\n}\n```\n\nOnce you know that a script engine implements the `Compilable` interface,\
    \ you can cast its reference to a `Compilable` type, like so:\n\n```\n// Cast\
    \ the engine reference to the Compilable type\nCompilable comp = (Compilable)engine;\n\
    ```\n\nThe `Compilable` interface contains two methods:\n\n- `CompiledScript compile(String\
    \ script) throws ScriptException`\n- `CompiledScript compile(Reader script) throws\
    \ ScriptException`\n\nThe two versions of the method differ only in the type of\
    \ the source of the script. The first version accepts the script as a `String`\
    \ and the second one as a `Reader`.\n\nThe `compile()` method returns an object\
    \ of the `CompiledScript` class. `CompiledScript` is an abstract class. The provider\
    \ of the script engine provides the concrete implementation of this class. A `CompiledScript`\
    \ is associated with the `ScriptEngine` that creates it. The `getEngine()` method\
    \ of the `CompiledScript` class returns the reference of the `ScriptEngine` to\
    \ which it is associated.\n\nTo execute a compiled script, you need to call one\
    \ of the following `eval()` methods of the `CompiledScript` class:\n\n- `Object\
    \ eval() throws ScriptException`\n- `Object eval(Bindings bindings) throws ScriptException`\n\
    - `Object eval(ScriptContext context) throws ScriptException`\n\nThe `eval()`\
    \ method without any arguments uses the default script context of the script engine\
    \ to execute the compiled script. The other two versions work the same as the\
    \ `eval()` method of the `ScriptEngine` interface when you pass a `Bindings` or\
    \ a `ScriptContext` to them.\n\n**Tip**\n\nWhen you evaluate scripts using the\
    \ `eval()` method of the `CompiledScript` class, changes in the state of the engine\
    \ made during the execution of the compiled script may be visible in the subsequent\
    \ execution of the scripts by the engine.\n\nListing 5-8 shows how to compile\
    \ a script and execute it. It executes the same compiled script twice with different\
    \ parameters.\n\n**Listing 5-8. Using Compiled Scripts**\n\n```\n// CompilableTest\
    \ .java\npackage com.jdojo.script;\n\nimport javax.script.Bindings;\nimport javax.script.Compilable;\n\
    import javax.script.CompiledScript;\nimport javax.script.ScriptEngine;\nimport\
    \ javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\n\
    public class CompilableTest {\n    public static void main(String[] args) {\n\
    \        // Get the Nashorn engine\n        ScriptEngineManager manager = new\
    \ ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n        if (!(engine instanceof Compilable)) {\n            System.out.println(\"\
    Script compilation not supported.\");\n            return;\n        }\n      \
    \  // Cast the engine reference to the Compilable type\n        Compilable comp\
    \ = (Compilable)engine;\n        try {\n            // Compile a script\n    \
    \        String script = \"print(n1 + n2)\";\n            CompiledScript cScript\
    \ = comp.compile(script);\n            // Store n1 and n2 script variables in\
    \ a Bindings\n            Bindings scriptParams = engine.createBindings();\n \
    \           scriptParams.put(\"n1\", 2);\n            scriptParams.put(\"n2\"\
    , 3);\n            cScript.eval(scriptParams);\n            // Execute the script\
    \ again with different values // for n1 and n2\n            scriptParams.put(\"\
    n1\", 9);\n            scriptParams.put(\"n2\", 7);\n            cScript.eval(scriptParams);\n\
    \        }\n        catch (ScriptException e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n5\n16\n```\n\n## Summary\n\nThe Java Scripting API supports\
    \ invoking procedures, functions, and methods written in a scripting language\
    \ directly from Java. This is made possible through the `Invocable` interface.\
    \ If a script engine supports procedure invocation, it implements the `Invocable`\
    \ interface. Nashorn engine supports procedure invocation. The procedure being\
    \ invoked may be implemented as top-level functions or methods of an object. The\
    \ `invokeFunction()` method of the `Invocable` interface is used to invoke top-level\
    \ functions in scripts. The `invokeMethod()` method of the `Invocable` interface\
    \ is used to invoke a method of an object. The top-level functions and the objects\
    \ whose methods are invoked must be evaluated by the engine before invoking them.\n\
    \nThe Java Script API also lets you implement Java interfaces in scripting languages.\
    \ The methods of a Java interface may be implemented as top-level functions or\
    \ methods of an object. The `getInterface()` method of the `Invocable` interface\
    \ is used to get the implementation of a Java interface.\n\nThe Java scripting\
    \ API also let you compile a script once, store it in the script engine, and execute\
    \ the script multiple times. It is supported through the `Compilable` interface.\
    \ A script engine supporting script compilation needs to implement the `Compilable`\
    \ interface. You need to call the `compile()` method of the `Compilable` interface\
    \ to compile a script. The `compile()` method returns an instance of the `CompiledScript`\
    \ whose `eval()` method is called to execute the script.\n\nNote that implementing\
    \ the `Invocable` and `Compilable` interfaces by a script engine is optional.\
    \ Before invoking procedures and compiling scripts, you need to check if the script\
    \ engine is an instance of these interfaces, cast the engine to these types, and,\
    \ then, execute methods of these interfaces.\n\n# Using Java in Scripting Languages\n\
    \nIn this chapter, you will learn:\n\n- How to import Java classes into scripts\n\
    - How to create Java objects and use them in scripts\n- How to call overloaded\
    \ methods of Java objects\n- How to create Java arrays\n- How to extend a Java\
    \ class and implement Java interfaces in scripts\n- How to invoke superclass methods\
    \ of an object from scripts\n\nScripting languages allow using Java class libraries\
    \ in scripts. Each scripting language has its own syntax for using Java classes.\
    \ It is not possible, and is outside the scope of this book, to discuss the syntax\
    \ of all scripting languages. In this chapter, I will discuss the syntax of using\
    \ Java constructs in Nashorn.\n\n## Importing Java Types\n\nThere are four ways\
    \ to import Java types into Nashorn script:\n\n- Using the `Packages` global object\n\
    - Using the `type()` method of the `Java` global object\n- Using the `importPackage()`\
    \ and `importClass()` functions\n- Using a `JavaImporter` in a `with` clause\n\
    \nOf the four types of importing Java types, the second type, using the `type()`\
    \ method of the global `Java` object, is preferred. The following sections will\
    \ describe the four ways of importing Java type in script in detail."
  raw: '## Using Compiled Scripts


    A script engine may allow compiling a script and executing it repeatedly. Executing
    compiled scripts may increase the performance of an application. A script engine
    may compile and store scripts in the form of Java classes, Java class files, or
    in a language-specific form.


    Not all script engines are required to support script compilation. Script engines
    that support script compilation must implement the `Compilable` interface. Nashorn
    engine supports script compilation. The following snippet of code checks if a
    script engine implements the `Compilable` interface:


    `// Get the script engine reference`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("YOUR_ENGINE_NAME");`


    `if (engine instanceof Compilable) {`


    `System.out.println("Script compilation is supported.");`


    `}`


    `else {`


    `System.out.println("Script compilation is not supported.");`


    `}`


    Once you know that a script engine implements the `Compilable` interface, you
    can cast its reference to a `Compilable` type, like so:


    `// Cast the engine reference to the Compilable type`


    `Compilable comp = (Compilable)engine;`


    The `Compilable` interface contains two methods:


    *   `CompiledScript compile(String script) throws ScriptException`

    *   `CompiledScript compile(Reader script) throws ScriptException`


    The two versions of the method differ only in the type of the source of the script.
    The first version accepts the script as a `String` and the second one as a `Reader`.


    The `compile()` method returns an object of the `CompiledScript` class. `CompiledScript`
    is an abstract class. The provider of the script engine provides the concrete
    implementation of this class. A `CompiledScript` is associated with the `ScriptEngine`
    that creates it. The `getEngine()` method of the `CompiledScript` class returns
    the reference of the `ScriptEngine` to which it is associated.


    To execute a compiled script, you need to call one of the following `eval()` methods
    of the `CompiledScript` class:


    *   `Object eval() throws ScriptException`

    *   `Object eval(Bindings bindings) throws ScriptException`

    *   `Object eval(ScriptContext context) throws ScriptException`


    The `eval()` method without any arguments uses the default script context of the
    script engine to execute the compiled script. The other two versions work the
    same as the `eval()` method of the `ScriptEngine` interface when you pass a `Bindings`
    or a `ScriptContext` to them.


    Tip


    When you evaluate scripts using the `eval()` method of the `CompiledScript` class,
    changes in the state of the engine made during the execution of the compiled script
    may be visible in the  subsequent execution of the scripts by the engine.


    Listing 5-8 shows how to compile a script and execute it. It executes the same
    compiled script twice with different parameters.


    Listing 5-8\. Using Compiled Scripts


    `// CompilableTest .java`


    `package com.jdojo.script;`


    `import javax.script.Bindings;`


    `import javax.script.Compilable;`


    `import javax.script.CompiledScript;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class CompilableTest {`


    `public static void main(String[] args) {`


    `// Get the Nashorn engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `if (!(engine instanceof Compilable)) {`


    `System.out.println("Script compilation not supported.");`


    `return;`


    `}`


    `// Cast the engine reference to the Compilable type`


    `Compilable comp = (Compilable)engine;`


    `try {`


    `// Compile a script`


    `String script = "print(n1 + n2)";`


    `CompiledScript cScript = comp.compile(script);`


    `// Store n1 and n2 script variables in a Bindings`


    `Bindings scriptParams = engine.createBindings();`


    `scriptParams.put("n1", 2);`


    `scriptParams.put("n2", 3);`


    `cScript.eval(scriptParams);`


    `// Execute the script again with different values // for n1 and n2`


    `scriptParams.put("n1", 9);`


    `scriptParams.put("n2", 7);`


    `cScript.eval(scriptParams);`


    `}`


    `catch (ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `5`


