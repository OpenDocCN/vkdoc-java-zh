    `engine1.put("engineName", "Engine-1");`


    The `get(String key)` method of the `ScriptEngine` returns the value of the specified
    `key` from its engine scope `Bindings`. The following statement returns “Engine-1”,
    which is the value for the `engineName` key:


    `String eName = (String)engine1.get("engineName");`


    It is a two-step process to get to the key-value pairs of the global scope `Bindings`
    in the default context of a `ScriptEngine`. First, you need to get the reference
    of the global scope `Bindings` using its `getBindings()` method, as shown:


    `Bindings e1Global = engine1.getBindings(ScriptContext.GLOBAL_SCOPE);`


    Now you can modify the global scope `Bindings` of the engine using the `e1Global`
    reference. The following statement adds a key-value pair to the `e1Global Bindings`:


    `e1Global.put("id", 89999);`


    Because of the sharing of the global scope `Bindings` of a `ScriptEngine` by all
    `ScriptEngine`s, this snippet of code will add the key `"id"` with its value to
    the global scope `Bindings` of the default context of all `ScriptEngine`s created
