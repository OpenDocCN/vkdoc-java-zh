- fmt: "# 8\\. Implementing a Script Engine\n\nIn this chapter, you will learn:\n\n\
    - The components of a script engine that need to be developed when implementing\
    \ a new script engine\n- How to implement the different components of a simple\
    \ script engine that will perform addition, subtraction, multiplication, and division\
    \ on two numbers\n- How to package the code of the script engine\n- How to deploy\
    \ and test the script engine\n\n## Introduction\n\nImplementing a full-blown script\
    \ engine is no simple task and it is outside the scope of this book. This chapter\
    \ is meant to give you a brief, but complete, overview of the setup needed to\
    \ implement a script engine. In this section, you will implement a simple script\
    \ engine called the `JKScript` engine. It will evaluate arithmetic expressions\
    \ with the following rules:\n\n- It will evaluate an arithmetic expression that\
    \ consists of two operands and one operator\n- The expression may have two number\
    \ literals, two variables, or one number literal and one variable as operands.\
    \ The number literals must be in decimal format. Hexadecimal, octal, and binary\
    \ number literals are not supported\n- The arithmetic operations in an expression\
    \ are limited to add, subtract, multiply, and divide\n- It will recognize `+`,\
    \ `-`, `*`, and `/` as arithmetic operators\n- The engine will return a `Double`\
    \ object as the result of the expression\n- Operands in an expression may be passed\
    \ to the engine using global scope or engine scope bindings of the engine\n- It\
    \ should allow executing scripts from a `String` object and a `java.io.Reader`\
    \ object. However, a `Reader` should have only one expression as its contents\n\
    - It will not implement the `Invocable` and `Compilable` interfaces\n\nUsing these\
