    \ 作为其全局作用域 `Bindings`。\n\n![A978-1-4842-0713-0_3_Fig2_HTML.jpg](A978-1-4842-0713-0_3_Fig2_HTML.jpg)\n\
    \n**图 3-2.** 由同一个 `ScriptEngineManager` 创建的三个 `ScriptEngine` 的示意图\n\n`ScriptEngineManager`\
    \ 中的 `Bindings` 可以通过以下方式修改：\n\n- 使用 `ScriptEngineManager` 的 `put()` 方法\n- 通过 `ScriptEngineManager`\
    \ 的 `getBindings()` 方法获取 `Bindings` 引用，然后对 `Bindings` 使用 `put()` 和 `remove()`\
    \ 方法\n- 通过 `ScriptEngine` 的 `getBindings()` 方法获取其默认上下文全局作用域中的 `Bindings` 引用，然后对\
    \ `Bindings` 使用 `put()` 和 `remove()` 方法"
