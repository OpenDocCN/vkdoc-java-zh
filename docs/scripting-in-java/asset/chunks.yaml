    | `Object` | If the object is a wrapper for a primitive value, it returns the
    primitive value as a String; otherwise, the String representation of the object
    by calling the `toString()` method is returned. If `toString()` method does not
    exist in the object, the string representation of the returned value of the `valueOf()`
    method is returned |


    You can use the `String()` global function to explicitly convert a value to the
