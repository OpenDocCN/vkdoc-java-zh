- fmt: "### Listing 5-1 shows how to invoke a function. It invokes a function written\
    \ in Nashorn JavaScript. It loads the scripts in the files named `factorial.js`\
    \ and `avg.js`. These files contain the Nashorn code for the functions named `factorial()`\
    \ and `avg()`. Later, the program invokes these function using the `invokeFunction()`\
    \ of the `Invocable` interface.\n\n**Listing 5-1\\. Invoking a Function Written\
    \ in Nashorn JavaScript**\n\n```java\n// InvokeFunction.java\npackage com.jdojo.script;\n\
    \nimport javax.script.Invocable;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n\npublic class InvokeFunction {\n    public\
    \ static void main(String[] args) {\n        ScriptEngineManager manager = new\
    \ ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n\n        // Make sure the script engine implements the Invocable\
    \ interface\n        if (!(engine instanceof Invocable)) {\n            System.out.println(\"\
    Invoking procedures is not supported.\");\n            return;\n        }\n\n\
    \        // Cast the engine reference to the Invocable type\n        Invocable\
    \ inv = (Invocable) engine;\n\n        try {\n            String scriptPath1 =\
    \ \"factorial.js\";\n            String scriptPath2 = \"avg.js\";\n\n        \
    \    // Evaluate the scripts first, so the factorial() and avg() functions are\n\
    \            // compiled and are available to be invoked\n            engine.eval(\"\
    load('\" + scriptPath1 + \"');\");\n            engine.eval(\"load('\" + scriptPath2\
    \ + \"');\");\n\n            // Invoke the add function twice\n            Object\
    \ result1 = inv.invokeFunction(\"factorial\", 10);\n            System.out.println(\"\
    factorial(10) = \" + result1);\n\n            Object result2 = inv.invokeFunction(\"\
    avg\", 10, 20, 30);\n            System.out.println(\"avg(10, 20, 30) = \" + result2);\n\
    \        }\n        catch (ScriptException | NoSuchMethodException e) {\n    \
    \        e.printStackTrace();\n        }\n    }\n}\n```\n\n```\nfactorial(10)\
    \ = 3628800.0\navg(10, 20, 30) = 20.0\n```\n\nAn object-oriented or object-based\
    \ scripting language may let you define objects and their methods. You can invoke\
    \ methods of such objects using the `invokeMethod(Object obj, String name, Object...\
    \ args)` method of the `Invocable` interface. The first argument is the reference\
    \ of the object, the second argument is the name of the method that you want to\
    \ invoke on the object, and the third argument is a varargs argument that is used\
    \ to pass arguments to the method being invoked.\n\nListing 5-2 contains a Nashorn\
    \ script that creates an object named `calculator` and adds four methods to add,\
    \ subtract, multiply, and divide two numbers. Notice that I have used the Nashorn\
    \ syntax extension to define the function expressions in which the braces and\
    \ `return` statements are not specified.\n\n**Listing 5-2\\. A Calculator Object\
    \ Created in Nashorn Script**\n\n```javascript\n// calculator.js\n// Create an\
    \ object\nvar calculator = new Object();\n\n// Add four methods to the prototype\
    \ to the calculator object\ncalculator.add = function (n1, n2) n1 + n2;\ncalculator.subtract\
    \ = function (n1, n2) n1 - n2;\ncalculator.multiply = function (n1, n2) n1 * n2;\n\
    calculator.divide = function (n1, n2) n1 / n2;\n```\n\nListing 5-3 demonstrates\
    \ the invocation of a method on the `calculator` object that is created in Nashorn.\
    \ Note that the object is created inside the Nashorn script. To invoke the method\
    \ of the object from Java, you need to obtain the reference of the object through\
    \ the script engine. The program evaluates the script in the `calculator.js` file\
    \ that creates the `calculator` object and stores its reference in a variable\
    \ named `calculator`. The `engine.get(\"calculator\")` method returns the reference\
    \ of the `calculator` object to the Java code.\n\n**Listing 5-3\\. Invoking a\
    \ Method on an Object Created in Nashorn**\n\n```java\n// InvokeMethod.java\n\
    package com.jdojo.script;\n\nimport javax.script.Invocable;\nimport javax.script.ScriptEngine;\n\
    import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
    \npublic class InvokeMethod {\n    public static void main(String[] args) {\n\
    \        // Get the Nashorn engine\n        ScriptEngineManager manager = new\
    \ ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n\n        // Make sure the script engine implements the Invocable\
    \ interface\n        if (!(engine instanceof Invocable)) {\n            System.out.println(\"\
    Invoking methods is not supported.\");\n            return;\n        }\n\n   \
    \     // Cast the engine reference to the Invocable type\n        Invocable inv\
    \ = (Invocable) engine;\n\n        try {\n            // Declare a global object\
    \ with an add() method\n            String scriptPath = \"calculator.js\";\n\n\
    \            // Evaluate the script first\n            engine.eval(\"load('\"\
    \ + scriptPath + \"')\");\n\n            // Get the calculator object reference\
    \ that was created in the script\n            Object calculator = engine.get(\"\
    calculator\");\n\n            // Invoke the methods on the calculator object\n\
    \            int x = 30;\n            int y = 40;\n\n            Object addResult\
    \ = inv.invokeMethod(calculator, \"add\", x, y);\n            Object subResult\
    \ = inv.invokeMethod(calculator, \"subtract\", x, y);\n            Object mulResult\
    \ = inv.invokeMethod(calculator, \"multiply\", x, y);\n            Object divResult\
    \ = inv.invokeMethod(calculator, \"divide\", x, y);\n\n            System.out.printf(\"\
    calculator.add(%d, %d) = %s%n\", x, y, addResult);\n            System.out.printf(\"\
    calculator.subtract(%d, %d) = %s%n\", x, y, subResult);\n            System.out.printf(\"\
    calculator.multiply(%d, %d) = %s%n\", x, y, mulResult);\n            System.out.printf(\"\
    calculator.divide(%d, %d) = %s%n\", x, y, divResult);\n        }\n        catch\
    \ (ScriptException | NoSuchMethodException e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n```\n\n```\ncalculator.add(30, 40) = 70\ncalculator.subtract(30,\
    \ 40) = -10.0\ncalculator.multiply(30, 40) = 1200.0\ncalculator.divide(30, 40)\
    \ = 0.75\n```\n\n> **Tip:** Use the `Invocable` interface to execute procedures,\
    \ functions, and methods repeatedly. Evaluation of the script, having procedures,\
    \ functions, and methods, stores the intermediate code in the engine that results\
    \ in performance gain on their repeated execution."
