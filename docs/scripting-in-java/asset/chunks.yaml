    ```\n\n输出：\n```\nSupported Scopes: [100, 200]\nyearValue = 1969\nnameValue = Boni\n\
    engineScopeYear = 1969\nglobalScopeYear = 1982\n```\n\n## 整合在一起\n\n在本节中，我将展示 `Bindings`\
    \ 及其作用域、`ScriptContext`、`ScriptEngine`、`ScriptEngineManager` 和宿主应用程序的实例如何协同工作。重点将放在如何使用\
    \ `ScriptEngine` 和 `ScriptEngineManager` 操作存储在不同作用域 `Bindings` 中的键值对。\n\n`ScriptEngineManager`\
    \ 在 `Bindings` 中维护一组键值对。它允许你通过以下四个方法操作这些键值对：\n\n- `void put(String key, Object\
    \ value)`\n- `Object get(String key)`\n- `void setBindings(Bindings bindings)`\n\
    - `Bindings getBindings()`\n\n`put()` 方法向 `Bindings` 添加一个键值对。`get()` 方法返回指定键的值；如果未找到该键，则返回\
    \ `null`。可以使用 `setBindings()` 方法替换引擎管理器的 `Bindings`。`getBindings()` 方法返回 `ScriptEngineManager`\
    \ 的 `Bindings` 引用。\n\n每个 `ScriptEngine` 默认都有一个 `ScriptContext`，称为其默认上下文。回想一下，除了读取器和写入器之外，`ScriptContext`\
    \ 有两个 `Bindings`：一个在引擎作用域，一个在全局作用域。当创建 `ScriptEngine` 时，其引擎作用域 `Bindings` 为空，其全局作用域\
    \ `Bindings` 引用创建它的 `ScriptEngineManager` 的 `Bindings`。\n\n默认情况下，由同一个 `ScriptEngineManager`\
    \ 创建的所有 `ScriptEngine` 实例共享该 `ScriptEngineManager` 的 `Bindings`。在同一个 Java 应用程序中可以存在多个\
    \ `ScriptEngineManager` 实例。在这种情况下，由同一个 `ScriptEngineManager` 创建的所有 `ScriptEngine`\
    \ 实例共享该 `ScriptEngineManager` 的 `Bindings` 作为其默认上下文的全局作用域 `Bindings`。\n\n以下代码片段创建了一个\
    \ `ScriptEngineManager`，用于创建三个 `ScriptEngine` 实例：\n\n```java\n// Create a ScriptEngineManager\n\
    ScriptEngineManager manager = new ScriptEngineManager();\n\n// Create three ScriptEngines\
    \ using the same ScriptEngineManager\nScriptEngine engine1 = manager.getEngineByName(\"\
    JavaScript\");\nScriptEngine engine2 = manager.getEngineByName(\"JavaScript\"\
    );\nScriptEngine engine3 = manager.getEngineByName(\"JavaScript\");\n```\n\n现在，让我们向\
