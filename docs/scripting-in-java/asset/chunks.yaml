    ### Date 对象


    Date 对象是一个函数。它可以作为函数或构造函数调用。其签名如下：


    `Date(year, month, date, hours, minutes, seconds, milliseconds)`


    Date 对象中的所有参数都是可选的。当它作为函数调用时，会以字符串形式返回当前的日期和时间。作为函数调用时，你可以向其传递参数；但是，所有参数都会被忽略。当它作为构造函数调用时，参数代表日期组件，并用于初始化
    Date 对象。以下代码展示了如何将 Date 对象作为函数使用，以获取当前日期和时间。运行代码时，你可能会得到不同的输出：


    `// 将 Date 作为函数调用`


    `print(Date());`


    `print(Date(2014, 10, 4, 19, 2)); // 传递给 Date 的参数被忽略`


    `Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)`


    `Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)`


    Date 对象可以作为构造函数调用，并以以下形式传递参数：


    *   `new Date()`

    *   `new Date(milliseconds)`

    *   `new Date(dateString)`

    *   `new Date(year, month, day, hours, minutes, seconds, milliseconds)`


    如果参数数量少于两个，则使用前三种形式之一。如果参数数量为两个或更多，则使用第四种形式。如果没有传递参数，它会创建一个包含当前日期和时间的 Date 对象。如果只传递一个数字参数，它将被视为自
    1970 年 1 月 1 日午夜（UTC）以来经过的毫秒数。如果只传递一个字符串参数，则会解析该字符串中的日期和时间，并将其用作新 Date 对象的日期和时间值。如果传递了两个或更多参数，则会构造一个
    Date 对象；剩余的值中，日期默认为 1，小时、分钟、秒和毫秒默认为 0。Date 对象有一个静态方法 `Date.now()`，它返回自 1970 年
    1 月 1 日午夜（UTC）到当前时间之间经过的毫秒数。


    以下代码展示了如何通过向构造函数传递不同数量的参数来创建 Date 对象：


    `// 当前日期和时间`


    `print("new Date() =", new Date());`


    `// 传递 2000 毫秒`


    `print("new Date(2000) =", new Date(2000));`


    `// 传递 2000 毫秒并转换为 UTC 日期时间字符串`


    `print("new Date(2000).toUTCString() =", new Date(2000).toUTCString());`


    `// 将日期作为字符串传递。日期被视为 UTC 时间`


    `print(''new Date("2014-14-04") ='', new Date("2014-14-04"));`


    `// 传递年份和月份。日期将默认为 1`


    `print("new Date(2014, 10) = ", new Date(2014, 10));`


    `// 传递年份、月份、日期和小时。其他部分将默认为 0`


    `print("new Date(2014, 10, 4, 10) = ", new Date(2014, 10, 4, 10));`


    `// 自 1970 年 1 月午夜以来经过的毫秒数`


    `print("Date.now() = ", Date.now());`


    `new Date() = Sat Oct 04 2014 19:38:46 GMT-0500 (CDT)`


    `new Date(2000) = Wed Dec 31 1969 18:00:02 GMT-0600 (CST)`


    `new Date(2000).toUTCString() = Thu, 01 Jan 1970 00:00:02 GMT`


    `new Date("2014-14-04") = Fri Oct 03 2014 19:00:00 GMT-0500 (CDT)`


    `new Date(2014, 10) =  Sat Nov 01 2014 00:00:00 GMT-0500 (CDT)`


    `new Date(2014, 10, 4, 10) =  Tue Nov 04 2014 10:00:00 GMT-0600 (CST)`


    `Date.now() =` `1412469527013`


    Date 对象有超过四十种方法。我将简要解释它们。这些方法的工作方式相同，只是作用于日期和时间的不同组件。它包含 `getYear()`、`getFullYear()`、`getDate()`、`getMonth()`、`getHours()`、`getMinutes()`、`getSeconds()`
    和 `getMilliseconds()` 方法，这些方法分别返回 Date 对象的两位数年份、完整年份、日期、月份、小时、分钟、秒和毫秒组件。它还包含一个
    `getDay()` 方法，该方法返回星期几（0 代表星期日，6 代表星期六）。还有相应的 setter 方法，例如 `setHours()`、`setDate()`
    等，用于设置日期和时间组件。还有另一组 getter 和 setter 方法用于处理 UTC 日期和时间；它们的名称基于 `getUTCXxx` 和 `setUTCXxx`
    模式，例如 `getUTCYear()`、`getUTCHours()`、`setUTCYears()`、`setUTCHours()` 等。`getTime()`
    和 `setTime()` 方法用于处理自 1970 年 1 月午夜以来经过的毫秒数。`Date` 对象包含几个名为 `toXxxString()` 的方法，用于将日期转换为特定的字符串格式。例如，`toDateString()`
    返回日期部分的人类可读字符串格式，而 `toTimeString()` 的工作方式相同，但作用于时间部分。


    `Date.parse(str)` 静态方法将指定的 `str` 解析为 `YYYY-MM-DDTHH:mm:ss.sssZ` 格式的日期和时间，并返回自
    1970 年 1 月 1 日午夜（UTC）到解析出的日期和时间之间经过的毫秒数。


    ### Math 对象


    Math 对象包含作为数学常量和函数的属性。表 4-14 列出了 Math 对象的属性及其描述。Math 对象的属性不言自明；我将不讨论使用它们的任何示例。


    表 4-14.


    Math 对象的属性和方法列表


    | 属性/方法 | 描述 |

    | --- | --- |

    | `Math.E` | 自然对数的底数 e 的数值，约等于 2.7182818284590452354 |

    | `Math.LN10` | 10 的自然对数的数值，约等于 2.302585092994046 |

    | `Math.LN2` | 2 的自然对数的数值，约等于 0.6931471805599453 |

    | `Math.LOG2E` | 以 2 为底的 e 的对数的数值，约等于 1.4426950408889634 |

    | `Math.LOG10E` | 以 10 为底的 e 的对数的数值，约等于 0.4342944819032518 |

    | `Math.PI` | 圆周率 π 的数值，即圆的周长与其直径之比，约等于 3.1415926535897932 |

    | `Math.SQRT1_2` | 0.50 的平方根的数值，约等于 0.7071067811865476 |

    | `Math.SQRT2` | 2 的平方根的数值，约等于 1.4142135623730951 |

    | `Math.abs(x)` | 返回 x 的绝对值。例如，`Math.abs(2)` 和 `Math.abs(-2)` 都返回 2 |

    | `Math.acos(x), Math.asin(x), Math.atan(x)` | 返回 x 的反余弦、反正弦和反正切 |

    | `Math.atan(y, x)` | 返回参数 y 和 x 的商 y/x 的反正切，其中 y 和 x 的符号用于确定结果的象限 |

    | `Math.ceil(x)` | 返回大于或等于 x 的最接近整数 |

    | `Math.cos(x), Math.sin(x), Math.tan(x)` | 返回 x 的余弦、正弦和正切 |

    | `Math.exp(x)` | 返回 e 的 x 次幂，其中 e 是 `Math.E` |

    | `Math.floor(x)` | 返回小于或等于 x 的最接近整数 |

    | `Math.log(x)` | 返回 x 的自然对数。即计算以 e 为底的 x 的对数 |

    | `Math.max(v1, v2,...)` | 返回所有参数 v1、v2 等的最大值，必要时将参数转换为 Number 类型。如果没有传递参数，则返回
    `–Infinity` |

    | `Math.min(v1, v2,...)` | 返回所有参数 v1、v2 等的最小值，必要时将参数转换为 Number 类型。如果没有传递参数，则返回
    `Infinity` |

    | `Math.pow(x, y)` | 返回 x 的 y 次幂的结果 |

    | `Math.random()` | 返回一个介于 0（包含）和 1（不包含）之间的随机数 |

    | `Math.round(x)` | 返回最接近 x 的整数。如果两个整数同样接近，则返回更接近正无穷大的整数。例如，`Math.round(2.3)`
    返回 2，`Math.round(2.9)` 返回 3，`Math.round(2.5)` 返回 3 |

    | `Math.sqrt(x)` | 返回 x 的平方根 |

    '
- fmt: '### The `RegExp` Object


    A regular expression represents a pattern in input text. The `RegExp` object is
    a function. It represents a regular expression and contains several methods and
    properties to match the pattern in input text. `RegExp` can be used as a function
    or a constructor. Its signature is:


    `RegExp(pattern, flags)`


    Here, `pattern` is the pattern to be matched in the input text. It can be another
    `RegExp` object or a string representing the pattern. `flags` is a string that
    defines the text-matching rules. It may be an empty string, `undefined`, or a
    string containing one or all of the characters: `g`, `i`, and `m`. It is a `SyntaxError`
    to repeat the flags in a `RegExp` object. Table [4-15](#A978-1-4842-0713-0_4_Chapter.html#Tab15)
    contains the list of flags and their descriptions.


    **Table 4-15.** The List of Flags Used in Regular Expressions


    | Flag | Description |

    | --- | --- |

    | `g` | Performs a global match. The default is to stop the match after the first
    match |

    | `i` | Performs a case-insensitive match. The default is to perform a case-sensitive
    match |

    | `m` | Enables multiline mode. The default is single-line mode. In single-line
    mode, the `^` and `$` characters in the pattern match the beginning and end of
    the input text, respectively. In multiline mode, they match the beginning and
    end of the input text as well as the beginning and end of lines |


    The `RegExp` object can be used as a function or a constructor with the following
    rules:


    *   If `pattern` is a `RegExp` object and `flags` is `undefined`, `pattern` is
    returned

    *   If `pattern` is a `RegExp` object and `flags` is not `undefined`, a `SyntaxError`
    is generated

    *   Otherwise, a `RegExp` object is returned that represents a pattern specified
    by `pattern` and `flags`


    The following are examples of creating `RegExp` objects:


    ```

    // Creates a RegExp object with a pattern to match the word

    // "Java" in the input text. The g flag will perform the match

    // globally and the m flag will use multiline mode.

    var pattern1 = new RegExp("Java", "gm");


    // Assigns pattern1 to pattern2. The constructor returns

    // pattern1 because its first argument, pattern1, is a RegExp object.

    var pattern2 = new RegExp(pattern1);


    // Prints true

    print(pattern1 === pattern2);

    ```


    You can also create regular expressions using regular expression literals. The
    syntax to use a regular expression literal is:


    `/pattern/flags`


    The following are examples of creating regular expressions using the regular expression
    literals:


    ```

    var pattern1 = /Java/gm;  // The same as new RegExp("Java", "gm")

    var pattern2 = /Nashorn/; // The same as new RegExp("Nashorn")

    ```


    A regular expression literal is converted to a `RegExp` object every time is it
    evaluated. According to this rule, if two regular expression literals with the
    same contents appear in the same program, they will evaluate to two different
    `RegExp` objects, as shown:


    ```

    // pattern1 and pattern2 have the same contents, but they evaluate to

    // different RegExp objects

    var pattern1 = /Java/gm;

    var pattern2 = /Java/gm;


    // Prints false in both cases

    print(pattern1 === pattern2);

    print(/Nashoern/ === /Nashorn/);

    ```


    The `RegExp.prototype` object contains three methods as listed in Table [4-16](#A978-1-4842-0713-0_4_Chapter.html#Tab16).
    The `test()` method is a specialized case of the `exec()` method. The `toString()`
    method returns the string form of the regular expression. You only need to learn
    the `exec()` method in detail.


    **Table 4-16.** The List of Methods in the `RegExp.prototype` Object


    | Method | Description |

    | --- | --- |

    | `exec(string)` | Performs a match on `string` against the regular expression.
    Returns an `Array` object containing the results of the match or `null` if there
    was no match |

    | `test(string)` | Calls the `exec(string)` method. Returns `true` if the `exec()`
    method returns not `null`, `false` otherwise. Use this method instead of the `exec()`
    method if you care about only to know whether there is a match |

    | `toString()` | Returns a string of the form `/pattern/gim`, where `gim` is the
    flags that were specified when the `RegExp` object was created |


    Regular expressions are very powerful features of any programming language. Java
    supports regular expressions. If you are familiar with regular expression in Java
    or Perl, the following discussion will be easy to follow. The pattern in a regular
    expression may be very complex. Typically, the letters and digits in the pattern
    match the input text literally. For example, the regular expression `/Java/` will
    try to match the word `Java` at any position in the input text. The following
    code uses the `test()` method to check if a regular expression matches the input
    text:


    ```

    var pattern = new RegExp("Java"); // Same as var pattern = /Java/;

    var match = pattern.test("JavaScript");

    print(pattern + " matches \"JavaScript\": " + match);


    // Perfoms a case-sensitive match that is the default

    var match2 = /java/.test("JavaScript");

    print("/java/ matches \"JavaScript\": " + match2);


    // Performs a case-insensitive match using the i flag

    var match3 = /java/i.test("JavaScript");

    print("/java/i matches \"JavaScript\": " + match3);


    /Java/ matches "JavaScript": true

    /java/ matches "JavaScript": false

    /java/i matches "JavaScript": true

    ```


    The `RegExp` object has four properties, as listed in Table [4-17](#A978-1-4842-0713-0_4_Chapter.html#Tab17).
    The `source`, `global`, `ignoreCase`, and `multiline` properties are read-only,
    nonenumerable, and nonconfigurable, and they are set at the time you create the
    regular expression. The `lastIndex` property is writable, nonenumerable, and nonconfigurable.


    **Table 4-17.** The List of Properties in the `RegExp.prototype` Object


    | Property | Description |

    | --- | --- |

    | `source` | A string that is the pattern part of the `RegExp` object. If you
    create a regular expression using `new RegExp("Java", "gm")`, the `source` property
    of the object is set to “Java” |

    | `global` | It is a Boolean value that is set to `true` if the flag `g` is used,
    `false` otherwise |

    | `ignoreCase` | It is a Boolean value that is set to `true` if the flag `i` is
    used, `false` otherwise |

    | `multiline` | It is a Boolean value that is set to `true` if the flag `m` is
    used, `false` otherwise |

    | `lastIndex` | It is an integer value that specifies the position in the input
    text where the next match will start. It is set to zero when the `RegExp` object
    is created. It may change automatically when you perform a match or you can change
    it in code |


    The `exec()` method searches the input text against the pattern and returns `null`
    or an `Array` object. When a match is not found, it returns `null`. When a match
    is found, the returned `Array` object has the following pieces of information:


    *   The first element of the array is the matched text of the input text. Subsequent
    elements in the array, if any, are the matched text by the capturing parentheses
    in the pattern. (I will discuss capturing parentheses later in this chapter.)

    *   The array has an `index` property that is set to position where the match
    started.

    *   The array has an `input` property that is set to the input text.

    *   If the search is global (using the flag `g`), the `lastIndex` property of
    the `RegExp` object is set to position in the input text immediately following
    the matched text. If, for a global search, a match is not found, the `lastIndex`
    property of the `RegExp` object is set to zero. For a nonglobal match, the `lastIndex`
    property is untouched.'
