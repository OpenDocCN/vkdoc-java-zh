- fmt: "# Iterating Over Array Elements\n\nIf you are interested in iterating all\
    \ properties, including elements, of an array, you can simply use the `for..in`\
    \ and `for..each..in` statements. These statements are not supposed to iterate\
    \ arrays in any specific order. As the title of this section suggests, I am going\
    \ to discuss how to iterate over only the elements of arrays, particularly when\
    \ arrays are sparse. If you add only elements to an array (not any nonelement\
    \ properties), which you will do in most cases, using the `for..in` and `for..each..in`\
    \ statements work fine for both dense and sparse.\n\n## Using the `for` Loop\n\
    \nIf you know that the array is dense, you can use the simple `for` loop to iterate\
    \ the array, like so:\n\n```\n// Create a dense array\nvar names = new Array(\"\
    Fu\", \"Li\", \"Do\");\n\n// Use a for loop to iterate all elements of an array\n\
    for(var i = 0, len = names.length; i < len; i++) {\n    print(\"names[\" + i +\
    \ \"]=\" + names[i]);\n}\n\nnames[0]=Fu\nnames[1]=Li\nnames[2]=Do\n```\n\nThe\
    \ `for` loop does not work if you have a sparse array. If you try accessing the\
    \ missing elements in the sparse array, it will return `undefined` that does not\
    \ tell you whether the element is missing or the value for the existing element\
    \ is `undefined`. You can get rid of this limitation by using the `in` operator\
    \ to check if the index being iterated exists. If the index exists, the element\
    \ exists; if the index does not exist, it is a missing element in a sparse array.\
    \ The following code demonstrates this approach:\n\n```\n// Create a sparse array\
    \ with an element set to undefined\nvar names = [\"Fu\", \"Li\", , \"Do\", undefined,\
    \ , \"Lu\"];\n\n// Use a for lop to iterate all elements of an array\nfor (var\
    \ i = 0, len = names.length; i < len; i++) {\n    // Check if the index being\
    \ visited exists in the array\n    if (i in names) {\n        print(\"names[\"\
    \ + i + \"]=\" + names[i]);\n    }\n}\n\nnames[0]=Fu\nnames[1]=Li\nnames[3]=Do\n\
    names[4]=undefined\nnames[6]=Lu\n```\n\nConsider the following code. It creates\
    \ a sparse array with only one element. The array is the biggest possible array\
    \ in Nashorn and the element is added at the last index in the array. In practice,\
    \ you will never have this big array. I used it just to prove the point that using\
    \ the `for` loop is not the most efficient way to access all elements in a sparse\
    \ array:\n\n```\n// Create an empty array\nvar names = new Array();\n\n// Add\
    \ one element to the end of the biggest possible  array\nnames[4294967294] = \"\
    almost lost\";\n\n// Use a for loop to iterate all elements of an array\nfor (var\
    \ i = 0, len = names.length; i < len; i++) {\n    // Check if the index being\
    \ visited exists in the array\n    if (i in names) {\n        print(\"names[\"\
    \ + i + \"]=\" + names[i]);\n    }\n}\n```\n\nUsing the `for` loop in this example\
    \ is very inefficient, because it has to visit 4294967293 indexes, before it can\
    \ get to the last one that has the value. It takes too long to get to just one\
    \ element of the array. I will solve this slow performing `for` loop problem shortly\
    \ using the `for..in` loop.\n\n## Using the `forEach()` Method\n\nThe `Array.prototype`\
    \ object contains a method named `forEach()` that invokes a callback function\
    \ for each element in the array in ascending order. It visits only the existing\
    \ elements in the sparse array. Its signature is:\n\n`forEach (callbackFunc [,\
    \ thisArg])`\n\nHere, `callbackFunc` is a function that is called once for each\
    \ element in the array in ascending order. It is passed three arguments: the value\
    \ of the element, the index of the element, and the object being iterated. The\
    \ `thisArg` is optional; if it is specified, it is used as the `this` value for\
    \ each invocation to `callbackFunc`.\n\nThe `forEach()` method sets the range\
    \ of indexes it will visit before it starts executing. If elements are added beyond\
    \ that range during its execution, those elements are not visited. If elements\
    \ in the initially set range are deleted, those elements are not visited either:\n\
    \n```\n// Create a sparse array with an element set to undefined\nvar names =\
    \ [\"Fu\", \"Li\", , \"Do\", undefined, , \"Lu\"];\n\n// Define the callback function\n\
    var visitor = function (value, index, array) {\n    print(\"names[\" + index +\
    \ \"]=\" + value);\n};\n\n// Print all elements\nnames.forEach(visitor);\n\nnames[0]=Fu\n\
    names[1]=Li\nnames[3]=Do\nnames[4]=undefined\nnames[6]=Lu\n```\n\nIf you use the\
    \ `forEach()` method to visit a big sparse array, you will have the same problem\
    \ as using the `for` loop that I discussed in the previous section.\n\n## Using\
    \ the `for-in` Loop\n\nLet us solve the inefficiency in accessing the elements\
    \ in long sparse array using the `for..in` loop. Using the `for..in` loop brings\
    \ in another problem that it iterates over all properties of the array, not just\
    \ the elements. It does not iterate over the missing elements though. You will\
    \ need a way to differentiate between a simple property and an existing element.\
    \ You can do this by simply using the definition of an array index. An array index\
    \ is an integer between 0 and 2^(32)-2. If the property is an array index, it\
    \ is an element; otherwise, it is simply a property, not an element. Listing 7-1\
    \ contains the code for a function named `isValidArrayIndex()`. The function takes\
    \ a property name as an argument. It returns `true` if the property name is a\
    \ valid array index; otherwise, it returns `false`.\n\nListing 7-1. The Code for\
    \ the `isValidArrayIndex()` Function\n\n```\n// arrayutil.js\nvar UPPER_ARRAY_INDEX\
    \ = Math.pow(2, 32) - 2;\nObject.defineProperty(this, \"UPPER_ARRAY_INDEX\", {writable:\
    \ false});\n\nfunction isValidArrayIndex(prop) {\n    // Convert the prop to a\
    \ Number\n    var numericProp = Number(prop);\n    // Check if prop is a number\n\
    \    if (String(numericProp) === prop) {\n        // Check if is an integer\n\
    \        if (Math.floor(numericProp) === numericProp) {\n            // Check\
    \ if it is in the valid array index range\n            if (numericProp >= 0 &&\
    \ numericProp <= UPPER_ARRAY_INDEX) {\n                return true;\n        \
    \    }\n        }\n    }\n    return false;\n}\n```\n\nThe following code uses\
    \ the `for..in` loop to iterate over only the elements of a sparse array. It makes\
    \ use of the `isValidArrayIndex()` function to determine if a property is a valid\
    \ array index. Note that the code adds an element at the largest possible index\
    \ in the array. The `for..in` loop gets to all elements of the array very quickly.\n\
    \n```\n// load the script that contains isValidArrayIndex() function\nload(\"\
    arrayutil.js\");\n\n// Create a sparse array with an element set to undefined\n\
    var names = [\"Fu\", \"Li\", , \"Do\", undefined, , \"Lu\"];\n\n// Add some properties\
    \ to the array\nnames[\"nationality\"] = \"Chinese\";  // A property\nnames[4294967294]\
    \ = \"almost lost\"; // An element at the largest\n                          \
    \         // possible array index\nnames[3.2] = \"3.2\";   // A property\nnames[7.00]\
    \ = \"7.00\"; // An element\n\n// Print all elements, ignoring the non-element\
    \ properties\nfor(var prop in names) {\n    if (isValidArrayIndex(prop)) {\n \
    \       // It is an element\n        print(\"names[\" + prop + \"]=\" + names[prop]);\n\
    \    }\n}\n\nnames[0]=Fu\nnames[1]=Li\nnames[3]=Do\nnames[4]=undefined\nnames[6]=Lu\n\
    names[7]=7.00\nnames[4294967294]=almost lost\n```\n\n## Checking for an Array\n\
    \nThe `Array` object contains an `isArray()` static method that can be used to\
    \ check whether an object is an array. The following code demonstrates its use:\n\
    \n```\nvar obj1 = [10, 20];     // An array\nvar obj2 = {x:10, y:20}; // An object,\
    \ but not an array\n\nprint(\"Array.isArray(obj1) =\",  Array.isArray(obj1));\n\
    print(\"Array.isArray(obj2) =\",  Array.isArray(obj2));\n\nArray.isArray(obj1)\
    \ = true\nArray.isArray(obj2) = false\n```"
  raw: '## Iterating Over Array Elements


    If you are interested in iterating all properties, including elements, of an array,
    you can simply use the `for..in` and `for..each..in` statements. These statements
    are not supposed to iterate arrays in any specific order. As the title of this
    section suggests, I am going to discuss how to iterate over only the elements
    of arrays, particularly when arrays are sparse. If you add only elements to an
    array (not any nonelement properties), which you will do in most cases, using
    the `for..in` and `for..each..in` statements work fine for both dense and sparse.


    ### Using the for Loop


    If you know that the array is dense, you can use the simple `for` loop to iterate
    the array, like so:


    `// Create a dense array`


    `var names = new Array("Fu", "Li", "Do");`


    `// Use a for loop to iterate all elements of an array`


    `for(var i = 0, len = names.length; i < len; i++) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[2]=Do`


    The `for` loop does not work if you have a sparse array. If you try accessing
    the missing elements in the sparse array, it will return `undefined` that does
    not tell you whether the element is missing or the value for the existing element
    is `undefined`. You can get rid of this limitation by using the `in` operator
    to check if the index being iterated exists. If the index exists, the element
    exists; if the index does not exist, it is a missing element in a sparse array.
    The following code demonstrates this approach:


    `// Create a sparse array with an element set to undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// Use a for lop to iterate all elements of an array`


    `for (var i = 0, len = names.length; i < len; i++) {`


    `// Check if the index being visited exists in the array`


    `if (i in names) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    Consider the following code. It creates a sparse array with only one element.
    The array is the biggest possible array in Nashorn and the element is added at
    the last index in the array. In practice, you will never have this big array.
    I used it just to prove the point that using the `for` loop is not the most efficient
    way to access all elements in a sparse array:


    `// Create an empty array`


    `var names = new Array();`


    `// Add one element to the end of the biggest possible  array`


    `names[4294967294] = "almost lost";`


    `// Use a for loop to iterate all elements of an array`


    `for (var i = 0, len = names.length; i < len; i++) {`


    `// Check if the index being visited exists in the array`


    `if (i in names) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `}`


    Using the `for` loop in this example is very inefficient, because it has to visit
    4294967293 indexes, before it can get to the last one that has the value. It takes
    too long to get to just one element of the array. I will solve this slow performing
    `for` loop problem shortly using the `for..in` loop.


    ### Using the forEach() Method


    The `Array.prototype` object contains a method named `forEach()` that invokes
    a callback function for each element in the array in ascending order. It visits
    only the existing elements in the sparse array. Its signature is:


    `forEach (callbackFunc [, thisArg])`


    Here, `callbackFunc` is a function that is called once for each element in the
    array in ascending order. It is passed three arguments: the value of the element,
    the index of the element, and the object being iterated. The `thisArg` is optional;
    if it is specified, it is used as the `this` value for each invocation to `callbackFunc`.


    The `forEach()` method sets the range of indexes it will visit before it starts
    executing. If elements are added beyond that range during its execution, those
    elements are not visited. If elements in the initially set range are deleted,
    those elements are not visited either:


    `// Create a sparse array with an element set to undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// Define the callback function`


    `var visitor = function (value, index, array) {`


    `print("names[" + index + "]=" + value);`


    `};`


    `// Print all elements`


    `names.forEach(visitor);`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    If you use the `forEach()` method to visit a big sparse array, you will have the
    same problem as using the `for` loop that I discussed in the previous section.


    ### Using the for-in Loop


    Let us solve the inefficiency in accessing the elements in long sparse array using
    the `for..in` loop. Using the `for..in` loop brings in another problem that it
    iterates over all properties of the array, not just the elements. It does not
    iterate over the missing elements though. You will need a way to differentiate
    between a simple property and an existing element. You can do this by simply using
    the definition of an array index. An array index is an integer between 0 and 2^(32)-2\.
    If the property is an array index, it is an element; otherwise, it is simply a
    property, not an element. Listing 7-1 contains the code for a function named `isValidArrayIndex()`.
    The function takes a property name as an argument. It returns `true` if the property
    name is a valid array index; otherwise, it returns `false`.


    Listing 7-1\. The Code for the isValidArrayIndex( ) Function


    `// arrayutil.js`


    `var UPPER_ARRAY_INDEX = Math.pow(2, 32) - 2;`


    `Object.defineProperty(this, "UPPER_ARRAY_INDEX", {writable: false});`


    `function isValidArrayIndex(prop) {`


    `// Convert the prop to a Number`


    `var numericProp = Number(prop);`


    `// Check if prop is a number`


    `if (String(numericProp) === prop) {`


    `// Check if is an integer`


    `if (Math.floor(numericProp) === numericProp) {`


    `// Check if it is in the valid array index range`


    `if (numericProp >= 0 &&                             numericProp <= UPPER_ARRAY_INDEX)
    {`


    `return true;`


    `}`


    `}`


    `}`


    `return false;`


    `}`


    The following code uses the `for..in` loop to iterate over only the elements of
    a sparse array. It makes use of the `isValidArrayIndex()` function to determine
    if a property is a valid array index. Note that the code adds an element at the
    largest possible index in the array. The `for..in` loop gets to all elements of
    the array very quickly.


    `// load the script that contains isValidArrayIndex() function`


    `load("arrayutil.js");`


    `// Create a sparse array with an element set to undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// Add some properties to the array`


    `names["nationality"] = "Chinese";  // A property`


    `names[4294967294] = "almost lost"; // An element at the largest`


    `// possible array index`


    `names[3.2] = "3.2";   // A property`


    `names[7.00] = "7.00"; // An element`


    `// Print all elements, ignoring the non-element properties`


    `for(var prop in names) {`


    `if (isValidArrayIndex(prop)) {`


    `// It is an element`


    `print("names[" + prop + "]=" + names[prop]);`


    `}`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    `names[7]=7.00`


    `names[4294967294]=almost lost`


    ## Checking for an Array


    The `Array` object contains an `isArray()` static method that can be used to check
    whether an object is an array. The following code demonstrates its use:


    `var obj1 = [10, 20];     // An array`


    `var obj2 = {x:10, y:20}; // An object, but not an array`


    `print("Array.isArray(obj1) =",  Array.isArray(obj1));`


    `print("Array.isArray(obj2) =",  Array.isArray(obj2));`


    `Array.isArray(obj1) = true`


    `Array.isArray(obj2) = false`'
