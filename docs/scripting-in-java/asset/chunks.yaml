  raw: '## Summary


    The Java APIs for Nashorn provide Java classes and interfaces that let you deal
    with the Nashorn scripting engine and Nashorn objects directly in Java code. All
    classes for Java APIs for Nashorn are in the `jdk.nashorn.api.scripting` package.
    Notice that the Nashorn scripting engine internally uses a lot of other classes
    in other packages. However, you are not supposed to use them in your application
    directly, except for classes from the `jdk.nashorn.api.scripting` package.


    A Nashorn script can use different types of values and objects such as Number,
    String, Boolean types of primitive values, and Object, String, Date, and custom
    objects. You can also create Java objects in scripts. The script values of type
    Number and Boolean are represented in Java as `java.lang.Number` and `java.lang.Boolean`.
    The Null type in a script is represented as `null` in Java. The String primitive
    type in a script is represented as `java.lang.String` in Java. A script object
    is represented as an object of the `ScriptObjectMirror` class in Java.


    The `NashornScriptEngineFactory` and `ScriptEngine` classes in the `jdk.nashorn.api.scripting`
    package represent the Nashorn script engine factory and script engine, respectively.
    You will need to work with these classes directly if you want to pass options
    to the Nashorn engine. You can also pass options to the Nashorn engine using `-Dnashorn.args="<options>"`
    on the command-line. If you pass the `--globals-per-engine`, to a Nashorn engine,
    all script contexts will share the globals. By default, script contexts do not
    share globals.


    The `ScriptObjectMirror` class contains several methods to add, update, and delete
    properties from the script object. The class implements the `JSObject` and `Bindings`
    interfaces. The `JSObject` interface lets you treat a script object as a simple
    Java class, whereas the `Bindings` interface lets you treat a script object as
    a map. You can use `getMember()`, `getSlot()`, and `get()` methods to get the
    value of the property of a script object. You can use `setMember()`, `setSlot()`,
    and `put()` methods to add or update the value of a property. You can use the
    `callMember()` method to call a method of the script object. The `call()` method
    lets you call a script function, allowing you to pass the `this` value for the
    function invocation. The `ScriptObjectMirror` class contains several other methods
    that let you work with script objects in Java programs.


    # 13. Debugging, Tracing, and Profiling Scripts


    In this chapter, you will learn:


    *   How to debug standalone Nashorn scripts in the NetBeans IDE

    *   How to debug Nashorn scripts that are called from Java code in the NetBeans
    IDE

    *   How to trace and profile Nashorn scripts


    NetBeans 8 with JDK 8 or later supports debugging, tracing, and profiling Nashorn
    scripts. You can run and debug standalone Nashorn scripts from within the NetBeans
    IDE. You can also debug Nashorn scripts when they are called from Java code. You
    can use all the debugging features for debugging scripts that you can use for
    debugging Java code; you can set breakpoints, display variables’ values, add watches,
    monitor call stacks, and so on. When debugging Nashorn scripts, the debugger shows
    the Nashorn stack.


    In NetBeans, all debugger-related panes can be opened using the menu item `Windows
    ➤ Debugging`. For a list of the complete debugging features in NetBeans, please
    refer to the help page in NetBeans. You can open the help page by pressing the
    `F1` key while the NetBeans application is active. I will use the script in Listing
    13-1 as an example of debugging scripts in this chapter.


    Listing 13-1\. A Test Script Containing an isPrime( ) Function and Calls to That
    Function


    `// primetest.js`


    `function isPrime(n) {`


    `// Integers <= 2, floating-point numbers, and even numbers are not         //
    primes`


    `if (n <= 2 || Math.floor(n) !== n || n % 2 === 0) {`


    `return false;`


    `}`


    `// Check if n is divisible by any odd integers between 3 and sqrt(n).`


    `var sqrt = Math.sqrt(n);`


    `for (var i = 3; i <= sqrt; i += 2) {`


    `if (n % i === 0) {`


    `return false;`


    `}`


    `}`


    `return true; // If we get here, it is a prime number.`


    `}`


    `// Check few nubmers for being primes`


    `var num = 8;`


    `var isPrimeNum = isPrime(num);`


    `print(num + " is a prime number: " + isPrimeNum);`


    `debugger;`


    `num = 37;`


    `isPrimeNum = isPrime(num);`


    `print(num + " is a prime number: " + isPrimeNum);`


    ## Debugging Standalone Scripts


    To run or debug a standalone Nashorn script in NetBeans, first you need to open
    the script file in the NetBeans IDE. Figure [13-1](#A978-1-4842-0713-0_13_Chapter.html#Fig1)
    shows the script shown in Listing 13-1 open in NetBeans. To run the script, right
    click in the editor showing the script and select the `Run File` menu item. Alternatively,
    press `Shift + F6` while the script pane is active.


    ![A978-1-4842-0713-0_13_Fig1_HTML.jpg](A978-1-4842-0713-0_13_Fig1_HTML.jpg)


    Figure 13-1.


    A Nashorn script opened in the NetBeans IDE


    To debug scripts, you need to add breakpoints using one of the following three
    methods:


    *   Place the cursor in the line where you want to set/unset the breakpoint. Right
    click and select the menu item `Toggle Line Breakpoint` to set and unset the breakpoint.

    *   Place the cursor in the line where you want to set/unset the breakpoint and
    press `Ctrl + F8`. Pressing this key combination for the first time sets the breakpoint.
    If the breakpoint is already set, pressing the same key combination unsets the
    breakpoint.

    *   Add the `debugger` statement in the script. The `debugger` statement acts
    like a breakpoint when a debugging session is active. Otherwise, it has no effect.


    Figure [13-2](#A978-1-4842-0713-0_13_Chapter.html#Fig2) shows the same script
    with two breakpoints at lines 21 and 26.


    ![A978-1-4842-0713-0_13_Fig2_HTML.jpg](A978-1-4842-0713-0_13_Fig2_HTML.jpg)


    Figure 13-2.


    A Nashorn script opened in the NetBeans IDE that has two breakpoints


    Now you are ready to debug the script. Right click in the script pane and select
    the `Debug File` menu item. Alternatively, press `Ctrl + Shift + F5` when the
    script pane is active. It will start the debugging session as shown in Figure
    [13-3](#A978-1-4842-0713-0_13_Chapter.html#Fig3). The debugger stops at the first
    breakpoint, as shown in the figure. At the bottom, you see the `Variables` pane
    open that shows all the variables with their values in scope. If you want to view
    other details of the debugging session, use one of the menu items under the main
    menu `Window ➤ Debugging`. If you close any debugging panes such as the `Variables`
    pane, you can reopen them using the `Window ➤ Debugging` menu.


    ![A978-1-4842-0713-0_13_Fig3_HTML.jpg](A978-1-4842-0713-0_13_Fig3_HTML.jpg)


    Figure 13-3.


    A Nashorn script opened in the NetBeans IDE in an active debugging session


    When the debugger session is active, you can use the debugging actions such as
    step into, step over, step out, continue, and so on. These actions are available
    from the main menu item named `Debug` as well as from the debugger toolbar. Figure
    [13-4](#A978-1-4842-0713-0_13_Chapter.html#Fig4) shows the debugger toolbar. It
    appears by default when the debugger session is active. If it is not visible when
    the debugger session is active, right click in the toolbar area and select the
    `Debug` menu item to make it visible. Table [13-1](#A978-1-4842-0713-0_13_Chapter.html#Tab1)
    contains the debugging actions available for scripts with their shortcuts and
    descriptions.


