    ## 多维数组


    Nashorn 并没有特殊的结构来支持多维数组。你需要使用数组的数组（即锯齿数组）来创建多维数组，其中数组的元素可以是数组。通常，你需要使用嵌套的 `for`
    循环来填充和访问多维数组的元素。以下代码演示了如何创建、填充并打印一个 3x3 矩阵的元素。该代码使用了 `Array` 对象的 `join()` 方法，以制表符作为分隔符来连接数组的元素：


    `var ROWS = 3;`


    `var COLS = 3;`


    `// 创建一个 3x3 数组，预先分配内存`


    `var matrix = new Array(ROWS);`


    `for(var i = 0; i < ROWS; i++) {`


    `matrix[i] = new Array(COLS);`


    `}`


    `// 填充数组`


    `for(var i = 0; i < ROWS; i++) {`


    `for(var j = 0; j < COLS; j++) {`


    `matrix[i][j] = i + "" + j;`


    `}`


    `}`


    `// 打印数组元素`


    `for(var i = 0; i < ROWS; i++) {`


    `var rowData = matrix[i].join("\t");`


    `print(rowData);`


    `}`


    `00        01        02`


    `10        11        12`


    `20        21        22`


    ## Array 对象的方法


    `Array.prototype` 对象定义了几个方法，这些方法可作为所有 `Array` 对象的实例方法使用。在本节中，我将讨论这些方法。所有数组方法都是有意设计为通用的，因此它们不仅可以应用于数组，还可以应用于任何类数组对象。


    ### 连接元素


    `concat(arg1, arg2,...)` 方法创建并返回一个新数组，该数组包含调用该方法的数组对象的所有元素，后跟按顺序指定的参数。如果某个参数是数组，则会连接该数组的元素。如果某个参数是嵌套数组，则会将其展平一层。此方法不会修改原始数组和作为参数传入的数组。如果原始数组或参数包含对象，则会进行对象的浅拷贝。使用
    `concat()` 方法的示例如下：


    `var names = ["Fu", "Li"];`


    `// 将 ["Fu", "Li", "Do", "Su"] 赋值给 names2`


    `var names2 = names.concat("Do", "Su");`


    `// 将 ["Fu", "Li", "Do", "Su", ["Lu", "Zu"], "Yu"] 赋值给 names3`


    `var names3 = names.concat("Do", ["Su", ["Lu","Zu"]], "Yu");`


    ### 连接数组元素


    `join(separator)` 方法将数组的所有元素转换为字符串，使用 `separator` 将它们连接起来，并返回结果字符串。如果未指定 `separator`，则使用逗号作为分隔符。该方法作用于数组中从索引
    0 到索引 `length - 1` 的所有元素。如果某个元素是 `undefined` 或 `null`，则使用空字符串。以下是使用 `join()` 方法的一些示例：


    `var names = ["Fu", "Li", "Su"];`


    `var namesList1 = names.join();    // 将 "Fu,Li,Su" 赋值给 namesList1`


    `var namesList2 = names.join("-"); // 将 "Fu-Li-Su" 赋值给 namesList2`


    `var ids = [10, 20, , 30, undefined, 40, null]; // 一个稀疏数组`


    `var idsList1 = ids.join();    // 将 "10,20,,30,,40," 赋值给 idsList1`


    `var idsList2 = ids.join("-"); // 将 "10-20--30--40-" 赋值给 idsList2`


    ### 反转数组元素


    `reverse()` 方法将数组的元素按相反顺序重新排列，并返回该数组。使用此方法的示例如下：


    `var names = ["Fu", "Li", "Su"];`


    `names.reverse(); // 现在，names 数组包含 ["Su","Li","Fu"]`


    `// 将 "Fu,Li,Su" 赋值给 reversedList`


    `var reversedList = names.reverse().join();`


    ### 切片数组


    `slice(start, end)` 方法返回一个数组，该数组包含原始数组中从索引 `start` 到 `end`（不包括 `end`）之间的子数组。如果
    `start` 和 `end` 为负数，则它们分别被视为 `start + length` 和 `end + length`，其中 `length` 是数组的长度。`start`
    和 `end` 都被限制在 0 到 `length`（包含）之间。如果未指定 `end`，则假定为 `length`。如果 `start` 和 `end`（不包括
    `end`）包含一个稀疏范围，则生成的子数组将是稀疏的。以下是使用 `slice()` 方法的示例：


    `var names = ["Fu", "Li", "Su"];`


    `// 将 ["Li","Su"] 赋值给 subNames1。end = 5 将被替换为 end = 3。`


    `var subNames1 = names.slice(1, 5);`


    `// 将 ["Li","Su"] 赋值给 subNames2。start = -1 被用作 start = 1 (-2 + 3)。`


    `var subNames12 = names.slice(-2, 3);`


    `var ids = [10, 20,,,30, 40, 40]; // 一个稀疏数组`


    `// 将 [20,,,30,40] 赋值给 idsSubList，其 length = 5`


    `var idsSubList = ids.slice(1, 6);`


    ### 拼接数组


    `splice()` 方法可以根据传入的参数执行插入、删除或同时执行两种操作。其签名是：


    `splice (start, deleteCount, value1, value2,...)`


    该方法从索引 `start` 开始删除 `deleteCount` 个元素，并在索引 `start` 处插入指定的参数（`value1`、`value2`
    等）。它返回一个包含从原始数组中删除的元素的数组。删除、插入或两者之后，现有元素的索引会被调整，以使它们连续。如果 `deleteCount` 为 0，则插入指定的值而不删除任何元素。以下是使用该方法的示例：


    `var ids = [10, 20, 30, 40, 50];`


    `// 将数组中的 10 和 20 替换为 100 和 200`


    `var deletedIds  = ids.splice(1, 2, 100, 200);`


    `print("ids = " + ids);`


    `print("deletedIds = " + deletedIds);`


    `// 保留前 3 个元素，删除其余元素`


    `var deletedIds2  = ids.splice(3, 2);`


    `print("ids = " + ids);`


    `print("deletedIds2 = " + deletedIds2);`


    `ids = 10,100,200,40,50`


    `deletedIds = 20,30`


    `ids = 10,100,200`


    `deletedIds2 = 40,50`


    ### 排序数组


    `sort(compareFunc)` 方法对数组进行原地排序，并返回排序后的数组。`compareFunc` 参数是一个带有两个参数的函数，它是可选的。如果未指定，则数组按字母顺序排序，在比较期间必要时会将元素转换为字符串。未定义的元素会被排序到末尾。


    如果指定了 `compareFunc`，则会向其传递两个元素，其返回值决定了这两个元素的顺序。假设传递给它的是 x 和 y。如果 x < y，则返回负值；如果
    `x = y`，则返回零；如果 `x > y`，则返回正值。以下代码通过不指定 `compareFunc` 对整数数组进行升序排序。随后，通过指定 `compareFunc`
    对同一数组进行降序排序：


    `var ids = [30, 10, 40, 20];`


    `print("ids = " + ids);`


    `// 对数组进行排序`


    `ids.sort();`


    `print("Sorted ids = " + ids);`


    `// 用于对 ids 进行降序排序的比较函数`


    `var compareDescending = function (x, y) {`


    `if (x > y) {`


    `return -1;`


    `}`


    `else if (x < y) {`


    `return 1;`


    `}`


    `else {`


    `return 0;`


    `}`


    `};`


    `ids.sort(compareDescending);`


    `print("Sorted in descending order, ids = " + ids);`


    `ids = 30,10,40,20`


    `Sorted ids = 10,20,30,40`


    `Sorted in descending order, ids = 40,30,20,10`

