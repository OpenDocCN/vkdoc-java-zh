  raw: 'Operators have precedence. In an expression, operators with the higher precedence
    are evaluated before operators with the lower precedence. Like Java, you can enclose
    part of an expression in parentheses that has the highest precedence. The following
    is the list of precedence of operators. Operators at level 1 have higher precedence
    than those at level 2\. Operators at the same level have the same precedence:


    `++` (Postfix increment), `--` (postfix decrement)   `!, ∼, +` (Unary plus), `-`
    (Unary negation), `++` (Prefix increment), `--` (Prefix decrement), `typeof`,
    `void`, `delete`   `*, /, %`   `+` (Addition), `-` (Subtraction)   `<< , >>, >>>`
      `<, <=, >, >=, in, instanceof`   `==, !=, ===, !==`   `&`   `^`   `|`   `&&`
      `||`   `? :`   `=, +=, -=, *=, /=, %=, <<=, >>=, >>>=, &=,  ^=,  |=`   `,` (Comma
    operator)


    I will discuss a few of the operators in this section. These operators in Nashorn
    are either not in Java or work very differently:


    *   The equality operator (`==`) and strict equality operator (`===`)

    *   The Logical AND (`&&`) and Logical OR (`||`) Operators


    The `==` operator works almost the same way as it works in Java. It checks both
    operands for equality, performing the type conversions such as string to number,
    if possible. For example, `"2" == 2` returns `true` because the string `"2"` is
    converted to the number 2 and then both operands are equal. The expression `2
    == 2` also returns `true` because both operands are of type number and they are
    equal in values. By contrast, the `===` operator checks the types as well as values
    of both operands for equality. If either of them are not the same, it returns
    `false`. For example, “2” === 2 returns `false` because one operand is a string
    and another is a number. Their types do not match, even though their values, when
    converted to either string or number, match.


    In Java, the `&&` and `||` operators work with Boolean operands and they return
    `true` or `false`. In Nashorn, that is not the case; these operators return one
    of the operands’ value that can be of any type. In Nashorn, any type of values
    can be converted to the Boolean value `true` or `false`. Values that can be converted
    to `true` are called truthy and values that can be converted to `false` are called
    falsy. I will provide the complete list of truthy and falsy values in the next
    section of this chapter.


    The `&&` and `||` operators work with truthy and falsy operands and return one
    of the operands value that may not be necessarily a Boolean value. The `&&` and
    `||` operators also known as short circuit operators because they do not evaluate
    the second operand if the first operand itself can determine the result.


    The `&&` operator returns the first operand if it is falsy. Otherwise, it returns
    the second operand. Consider the following statement:


    `var result = true && 120; // Assigns 120 to result`


    The statement assigns 120 to `result`. The first operand to `&&` is true, so it
    evaluates the second operand and returns it. Consider another statement:


    `var result = false && 120; // Assigns false to result`


    The statement assigns `false` to result. The first operand to `&&` is `false`,
    so it does not evaluate the second operand. It simply returns the first operand.


    The `||` operator returns the first operand if it is truthy. Otherwise, it returns
    the second operand. Consider the following statement:


    `var result = true || 120; // Assigns true to result`


    The statement assigns true to `result`. The first operand to `||` is `true`, so
    it returns the first operand. Consider another statement:


    `var result = false || 120; // Assigns 120 to result`


    The statement assigns `120` to result. The first operand to `||` is `false`, so
    it evaluates the second operand and returns its value.


    ## Type Conversion


    Things that are not allowed in Java are allowed in Nashorn, such as using a number
    or a string where a Boolean value is expected. Consider the following snippet
    of code in Nashorn, which adds a Boolean value to a number:


    `var n1 = true + 120;`


    `var n2 = false + 120;`


    `print("n1 = " + n1);`


    `print("n2 = " + n2);`


    `n1 = 121`


    `n2 = 120`


    The expression `true + 120` is not allowed in Java. However, it is allowed in
    Nashorn. Notice that Nashorn implicitly converts `true` is to the number 1 and
    `false` to the number 0\. There are a lot of implicit conversions performed by
    Nashorn. You need to have a good understanding of them to write a bug-free code
    in Nashorn. The following sections explain those conversions in detail.


    ### To Boolean Conversion


    In Nashorn, you can use a truthy or falsy value whenever a Boolean value is required.
    For example, the condition in an `if` statement does not need to yield a Boolean
    value. It can be any truthy or falsy value. Table [4-6](#A978-1-4842-0713-0_4_Chapter.html#Tab6)
    lists the types of values and their corresponding converted Boolean values.


    Table 4-6.


    The List of Value Types and Their Corresponding Converted Boolean Values


    | Value Type | Converted Boolean Value |

    | --- | --- |

    | `Undefined` | `false` |

    | `Null` | `false` |

    | `Boolean` | Identity conversion |

    | `Number` | Evaluates to `false` if the argument is `+0`, `-0`, or `NaN`; otherwise,
    evaluates to `true` |

    | `String` | The empty string evaluates to `false`. All other strings evaluate
    to `true` |

    | `Object` | `true` |


    You can also use the `Boolean()` global function to explicitly convert a value
    to the Boolean type. The function takes the value to be converted as an argument.
    The following snippet of code contains some examples of implicit and explicit
    conversions to the Boolean type:


    `var result;`


    `result = undefined ? "undefined is truthy" : "undefined is falsy";`


    `print(result);`


    `result = null ? "null is truthy" : "null is falsy";`


    `print(result);`


    `result = 100 ? "100 is truthy" : "100 is falsy";`


    `print(result);`


    `result = 0 ? "0 is truthy" : "0 is falsy";`


    `print(result);`


    `result = Boolean("") ? "The empty string is truthy"`


    `: "The empty string is falsy";`


    `print(result);`


    `result = ''Hello'' ? "''Hello'' is truthy" : "''Hello'' is falsy";`


    `print(result);`


    `undefined is falsy`


    `null is falsy`


    `100 is truthy`


    `0 is falsy`


    `The empty string is falsy`


    `''Hello'' is truthy`'
