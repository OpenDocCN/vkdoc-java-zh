- fmt: '`jjs`工具支持在脚本模式下运行的脚本文件中使用 heredoc。heredoc 也称为 here document、here-string 或
    here-script。它是一种保留空白字符的多行字符串。heredoc 以双尖括号（`<<`）和一个分隔标识符开头。通常，`EOF`或`END`被用作分隔标识符。但是，你可以使用脚本中其他地方未用作标识符的任何其他标识符。多行字符串从结束行开始。该字符串以相同的分隔标识符结束。以下是在
    Nashorn 中使用 heredoc 的示例：


    ```

    var str = <<EOF

    This is a multi-line string using the heredoc syntax.

    Bye Heredoc!

    EOF

    ```


    清单 10-2 包含在 Nashorn 中使用 heredoc 的脚本。`$ARG`属性仅在脚本模式下定义，其值是使用`jjs`工具传递给脚本的参数：


    **清单 10-2. 使用 Heredoc 样式多行字符串的 heredoc.js 文件内容**


    ```

    // heredoc.js

    var str = <<EOF

    This is a multiline string.

    Number of arguments passed to this

    script is ${$ARG.length}

    Arguments are ${$ARG}

    Bye Heredoc!

    EOF

    print(str);

    ```


    你可以按如下方式执行`heredoc.js`脚本文件：


    ```

    c:\> jjs -scripting heredoc.js

    This is a multi-line string.

    Number of arguments passed to this

    script is 0

    Arguments are

    Bye Heredoc!

    c:\> jjs -scripting heredoc.js -- Kishori Sharan

    This is a multi-line string.

    Number of arguments passed to this

    script is 2

    Arguments are Kishori,Sharan

    Bye Heredoc!

    ```


    除了 Nashorn 支持的两种注释样式（`//`和`/* */`）之外，`jjs`工具还支持一种额外的单行注释样式，该样式以井号（`#`）开头。如果由`jjs`工具运行的脚本文件以`#`开头，则`jjs`工具会自动启用脚本模式，并在脚本模式下执行整个脚本。请考虑清单
    10-3 中所示的脚本。


    **清单 10-3. jjs 工具的特殊注释。内容存储在 jjscomments.js 文件中**


    ```

    # This script will run in scripting mode by the jjs tool

    # because it starts with a number sign

    // Set the current directory to C:\kishori

    $ENV.PWD = "C:\\kishori";

    // Get the list of files and directories in the current directory

    var str = `ls -F`;

    print(str);

    ```


    以下命令运行`jjscomments.js`文件中的脚本。该脚本以`#`开头，因此`jjs`工具将自动启用脚本模式：


    ```

    c:\>jjs jjscomments.js

    books/

    ejb/

    hello.txt

    important/

    programs/

    rmi.log

    rmi.policy

    scripts/

    c:\>

    ```


    通过`jjs`工具将脚本文件中的第一个`#`解释为 shell 可执行文件，你可以在脚本文件的开头使用 shebang（`#!`）将其作为脚本可执行文件运行。请注意，shebang
    在类 Unix 操作系统上直接受支持。你需要在 shebang 中包含`jjs`工具的路径，以便脚本由`jjs`工具执行。脚本文件将被传递给`jjs`工具执行。由于脚本文件以`#`开头（shebang`#!`的一部分），`jjs`工具将自动启用脚本模式。以下是一个使用
    shebang 的脚本示例，假设`jjs`工具位于`/usr/bin`目录：


    ```

    #!/usr/bin/jjs

    var str = `ls -F`;

    print(str);

    ```


    ## 总结


    Java 8 附带了一个名为`jjs`的命令行工具。它位于`JDK_HOME\bin`目录中。它用于在命令行上运行 Nashorn 脚本。`jjs`工具支持许多选项。它可以被调用来运行文件中的脚本、交互模式以及脚本模式。


    如果你未指定任何选项或脚本文件，`jjs`将以交互模式运行。在交互模式下，脚本在输入时即被解释。


    如果你使用`–scripting`选项调用`jjs`，它将以脚本模式运行，允许你使用任何操作系统特定的 shell 命令。Shell 命令用反引号括起来。在脚本模式下，`jjs`工具支持脚本文件中的
    heredoc。如果脚本文件以`#`开头，运行该脚本文件会自动启用脚本模式。这支持执行包含 shebang（文件开头的`#!`）的脚本。


    # 11. 在 Nashorn 中使用 JavaFX


    在本章中，你将学习：


    *   `jjs`命令行工具中的 JavaFX 支持

    *   为 JavaFX `Application`类的`init()`、`start()`和`stop()`方法在脚本中提供实现

    *   如何使用预定义脚本加载和使用 JavaFX 包和类

    *   使用 Nashorn 脚本创建和启动一个简单的 JavaFX 应用程序


    在本章中，假设你具有 JavaFX 8 的初级经验。如果你没有 JavaFX 经验，请在阅读本章之前学习 JavaFX。


    ## jjs 中的 JavaFX 支持


    `jjs`命令行工具允许你启动在 Nashorn 脚本中创建的 JavaFX 应用程序。你需要使用`–fx`选项与`jjs`工具一起运行脚本作为 JavaFX
    应用程序。以下命令将存储在`myfxapp.js`文件中的脚本作为 JavaFX 应用程序运行：


    ```

    jjs –fx myfxapp.js

    ```'
  raw: 'The `jjs` tool supports heredocs in script files that can be run in scripting
    mode. A heredoc is also known as a here document, here-string, or here-script.
    It is a multiline string in which whitespaces are preserved. A heredoc starts
    with a double angle bracket (<<) and a delimiting identifier. Typically, `EOF`
    or `END` is used as the delimiting identifier. However, you can use any other
    identifier that is not used as an identifier elsewhere in the script. The multiline
    string starts at the end line. The string ends with the same delimiting identifier.
    The following is an example of using a heredoc in Nashorn:


    `var str = <<EOF`


    `This is a multi-line string using the heredoc syntax.`


    `Bye Heredoc!`


    `EOF`


    Listing 10-2 contains the script that uses a heredoc in Nashorn. The `$ARG` property
    is defined only in scripting mode, and its value is the arguments passed to the
    script using the `jjs` tool:


    Listing 10-2\. The Contents of the heredoc.js File That Using Heredoc Style a
    Multiline String


    `// heredoc.js`


    `var str = <<EOF`


    `This is a multiline string.`


    `Number of arguments passed to this`


    `script is ${$ARG.length}`


    `Arguments are ${$ARG}`


    `Bye Heredoc!`


    `EOF`


    `print(str);`


    You can execute the `heredoc.js` script file as shown:


    `c:\> jjs -scripting heredoc.js`


    `This is a multi-line string.`


    `Number of arguments passed to this`


    `script is 0`


    `Arguments are`


    `Bye Heredoc!`


    `c:\> jjs -scripting heredoc.js -- Kishori Sharan`


    `This is a multi-line string.`


    `Number of arguments passed to this`


    `script is 2`


    `Arguments are Kishori,Sharan`


    `Bye Heredoc!`


    In addition to two styles of comments (`//` and `/* */`) supported by Nashorn,
    the `jjs` tool supports an additional single-line comment style that starts with
    a number sign (`#`). If a script file run by the `jjs` tool starts with the sign
    #, the `jjs` tool automatically enables the scripting mode and executes the entire
    script in scripting mode. Consider the script shown in Listing 10-3.


    Listing 10-3\. Special Comments for the jjs Tool. Contents Are Stored in jjscomments.js
    File


    `# This script will run in scripting mode by the jjs tool`


    `# because it starts with a number sign`


    `// Set the current directory to C:\kishori`


    `$ENV.PWD = "C:\\kishori";`


    `// Get the list of files and directories in the current directory`


    ``var str = `ls -F`;``


    `print(str);`


    The following command runs the script in the `jjscomments.js` file. The script
    starts with the `#` sign, so the `jjs` tool will automatically enable the scripting
    mode:


    `c:\>jjs` `jjscomments.js`


    `books/`


    `ejb/`


    `hello.txt`


    `important/`


    `programs/`


    `rmi.log`


    `rmi.policy`


    `scripts/`


    `c:\>`


    With the `jjs` tool interpreting a script file with the first `#` sign as a shell
    executable, you can use a shebang (`#!`) at the beginning of the script file to
    run it as a script executable. Notice that a shebang is directly supported on
    Unix-like operating systems. You will need to include the path to the jjs tool
    in the shebang, so the script will be executed by the `jjs` tool. The script file
    will be passed to the jjs tool to execute. Because the script file starts with
    a # sign (part of the shebang `#!`), the `jjs` tool will automatically enable
    the scripting mode. The following is an example of a script using a shebang, assuming
    that the `jjs` tool is located at `/usr/bin` directory:


    `#!/usr/bin/jjs`


    ``var str = `ls -F`;``


    `print(str);`


    ## Summary


    The Java 8 ships a command-line tool called `jjs`. It is located in the `JDK_HOME\bin`
    directory. It is used to run Nashorn scripts on a command line. The `jjs` tool
    supports many options. It can be invoked to run scripts in a file, in interactive
    mode, and in scripting mode.


    If you do not specify any options or script files, `jjs` is run in interactive
    mode. In interactive mode, scripts are interpreted as they are entered.


    If you invoke `jjs` using the `–scripting` option, it is run in scripting mode,
    allowing you to use any operating system–specific shell commands. Shell commands
    are enclosed in back quotes. In scripting mode, the `jjs` tool supports heredocs
    in script files. If a script file starts with the `#` sign, running the script
    file automatically enables scripting mode. This supports executing scripts that
    contains a shebang (`#!` at the beginning of the script).


    # 11. Using JavaFX in Nashorn


    In this chapter, you will learn:


    *   The JavaFX support in the `jjs` command-line tool

    *   Providing an implementation for the `init()`, `start()`, and `stop()` methods
    of the JavaFX `Application` class in scripts

    *   How to load and use JavaFX packages and classes using the predefined scripts

    *   Creating and launching a simple JavaFX application using a Nashorn script


    Throughout this chapter, it is assumed that you have beginner-level experience
    in JavaFX 8\. If you do not have experience in JavaFX, please learn JavaFX before
    reading this chapter.


    ## JavaFX Support in jjs


    The `jjs` command-line tool lets you launch JavaFX applications created in Nashorn
    scripts. You need to use the `–fx` option with the `jjs` tool to run a script
    as a JavaFX application. The following command runs a script stored in the `myfxapp.js`
    file as a JavaFX application:


    `jjs –fx myfxapp.js`'
