    `var distanceFromOrigin = Point.prototype.distance.bind(origin);`


    `var dist = distanceFromOrigin(new Point(0, 10));`


    `print(dist);`


    `// 上述 distanceFromOrigin() 等同于以下写法`


    `var dist2 = origin.distance(new Point(0, 10));`


    `print(dist2);`


    `10`


