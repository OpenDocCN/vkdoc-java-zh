    method of the `NashornScriptEngineFactory` class:


    *   `ScriptEngine getScriptEngine()`

    *   `ScriptEngine getScriptEngine(String... args)`

    *   `ScriptEngine getScriptEngine(ClassFilter classFilter)`

    *   `ScriptEngine getScriptEngine(ClassLoader appLoader)`

    *   `ScriptEngine getScriptEngine(String[] args, ClassLoader appLoader)`

    *   `ScriptEngine getScriptEngine(String[] args, ClassLoader appLoader, ClassFilter
    classFilter)`


    ## Sharing the Engine Globals


    By default, the Nashorn engine maintains the global objects per script context.
    In this discussion, the term “globals” means the global variables and declarations
    stored in the global scope of the Nashorn script, which you refer to by `this`
    in the top-level scripts. Do not mix up the global scope bindings in the script
    context with the globals in the script. The script globals are searched first
    when you reference any variables or create variables in your script. If you reference
    a variable in a script that is not found in the script globals, the engine will
    search for it in the global scope `bindings` of the script context. For example,
    the script objects `Object`, `Math`, `String`, and so on are part of the script
