    \ or `0X` (ignoring the leading spaces) in which case `radix` is assumed to be\
    \ `16`. If `radix` is less than `2` or greater than `36`, the function returns\
    \ `NaN`.\n\nThe `parseInt()` function parses only the leading portion of `string`\
    \ that can be a valid digit in an integer represented in the specified `radix`.\
    \ When it encounters an invalid character, it stops parsing and returns the so\
    \ far parsed integer value. It returns `NaN`, if no leading characters can be\
    \ parsed into an integer. Notice that you do not get any error when `string` contains\
    \ invalid characters. The function always returns a value.\n\n**Tip**  \nThe `parseInt()`\
    \ function in Nashorn works similar to the `Integer.parseInt()` method in Java,\
    \ except that the former is very lenient and does not throw an exception.\n\n\
