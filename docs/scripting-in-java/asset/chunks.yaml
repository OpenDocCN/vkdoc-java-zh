    ### Null 类型


    Null 类型只有一个值，即 `null`。尽管 `null` 值被认为是原始类型，但它通常用于期望一个对象但没有有效对象可指定的场景。以下代码片段展示了如何使用
    `null` 值：


    `var person = null;`


    `print("person is", person);`


    `person is null`


    ### Number 类型


    与 Java 不同，Nashorn 不区分整数和浮点数。它只有一种称为 Number 的类型来表示这两种数值。数字以双精度 64 位 IEEE 浮点格式存储。所有数值常量都称为数字字面量。与
    Java 类似，你可以用十进制、十六进制、八进制和科学记数法表示数字字面量。Nashorn 定义了三种特殊的 Number 类型值：非数字、正无穷大和负无穷大。在脚本中，这些特殊值分别由
    `NaN`、`+Infinity` 和 `–Infinity` 表示。正无穷大值也可以简单地表示为 `Infinity`，不带前导的 `+` 号。以下代码片段展示了如何使用数字字面量和特殊的
    Number 类型值：


    `var empId = 100;               // 一个 Number 类型的整数`


    `var salary = 1500.678;         // 一个 Number 类型的浮点数`


    `var hexNumber = 0x0061;        // 等同于十进制 97`


    `var octalNumber = 0141;        // 等同于十进制 97`


    `var scientificNumber = 0.97E2; // 等同于十进制 97`


    `var notANumber = NaN;`


    `var posInfinity = Infinity;`


    `var negInfinity = -Infinity;`


    `// 打印所有值`


    `print("empId =", empId);`


    `print("salary =", salary);`


    `print("hexNumber =", hexNumber);`


    `print("octalNumber =", octalNumber);`


    `print("scientificNumber =", scientificNumber);`


    `print("notANumber =", notANumber);`


    `print("posInfinity =", posInfinity);`


