    `}`


    `names.length = 4`


    `使用 for..in 循环:`


    `names[0] = Fu`


    `names[1] = Li`


    `names[2] = Su`


    `names[3] = Do`


    `names[2.0] = Bo`


    你可以向数组添加一个负数的属性。请注意，负数作为属性名称不符合索引的条件，因此它只会添加一个属性，而不是一个元素：


    `// 创建一个包含两个元素的数组`


    `var names = ["Fu", "Li"]`


    `// 添加名称为 "-1" 的属性，而不是元素。`


    `names[-1] = "Do"; // names.length 仍然是 2`


    `print("names.length = " + names.length);`


    `names.length = 2`


    你也可以使用数组字面量创建一个稀疏数组。在元素列表中使用逗号而不指定元素会创建一个稀疏数组。请注意，在稀疏数组中，元素的索引不是连续的。以下代码创建了一个稀疏数组：


    `var names = ["Fu",,"Lo"];`


    `names` 数组包含两个元素。它们位于索引 0 和 2。索引 1 处的元素缺失，这由两个连续的逗号表示。`names` 数组的 `length` 是多少？是
    3，而不是 2。回想一下，数组的 `length` 总是大于所有元素的最大索引。数组中的最大索引是 2，所以 `length` 是 3。当你尝试读取不存在的元素
    `names[1]` 时会发生什么？读取 `names[1]` 被简单地视为从 `names` 对象中读取一个名为“1”的属性，而该属性“1”并不存在。回想一下`第
    4 章`，读取对象的不存在属性会返回 `undefined`。因此，`names[1]` 将简单地返回 `undefined`，而不会引起任何错误。如果你给
    `names[1]` 赋值，你就是在索引 1 处创建一个新元素，并且该数组将不再是稀疏数组。以下代码展示了此规则：


    `// 创建一个包含 2 个现有元素和 1 个缺失元素的稀疏数组`


    `var names = ["Fu",,"Lo"]; // names.length 是 3`


    `print("names.length = " + names.length);`


    `for(var prop in names) {`


    `print("names[" + prop + "] = " + names[prop]);`


    `}`


    `// 在索引 1 处添加一个元素。`


    `names[1] = "Do";  // names.length 仍然是 3`


    `print("names.length = " + names.length);`


    `for(var prop in names) {`


    `print("names[" + prop + "] = " + names[prop]);`


    `}`


    `names.length = 3`


    `names[0] = Fu`


    `names[2] = Lo`


    `names.length = 3`


    `names[0] = Fu`


    `names[1] = Do`


    `names[2] = Lo`


    以下是更多稀疏数组的示例。注释解释了这些数组：


    `var names = [,];   // 一个稀疏数组。length = 1 且没有元素`


    `names = [,,];      // 一个稀疏数组。length = 2 且没有元素`


    `names = [,,,];     // 一个稀疏数组。length = 3 且没有元素`


    `names = [,,,7,,2]; // 一个稀疏数组。length = 6 且有 2 个元素`


    你能区分以下两个数组吗？


    `var names1 = [,,];`


    `var names2 = [undefined,undefined];`


    两个数组的 `length` 都是 2。名为 `names1` 的数组是一个稀疏数组。`names1` 中索引 0 和 1 处的元素不存在。读取 `names1[0]`
    和 `names1[1]` 将返回 `undefined`。名为 `names2` 的数组是一个密集数组。`names2` 中索引 0 和 1 处的元素存在，并且都被设置为
    `undefined`。读取 `names2[0]` 和 `names2[1]` 将返回 `undefined`。


    你如何知道一个数组是否是稀疏的？`Array` 对象中没有内置的方法来检查稀疏数组。你需要自己检查，记住如果一个属性名称（从 0 到 `length`）在数组中不存在，那么它就是一个稀疏数组。我将在“遍历数组元素”一节中讨论几种检查稀疏数组的方法。


    ### 使用 Array 对象


    Nashorn 包含一个名为 `Array` 的内置函数对象。它用于创建和初始化数组。它可以作为函数或构造函数调用。它作为函数或构造函数的使用方式相同。其签名是：


    `Array(arg1, arg2, arg3,...)`


    `Array` 对象可以接受零个或多个参数。其初始化行为取决于传递参数的数量和类型，可分为三类：


    *   未传递参数

    *   传递一个参数

    *   传递两个或更多参数


    ### 不传递参数


    当没有参数传递给 `Array` 构造函数时，它会创建一个空数组，并将数组的 `length` 设置为零：


    `var names1 = new Array(); // 等同于：var names = [];`

