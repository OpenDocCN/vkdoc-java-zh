  raw: '## Strict and Nonstrict Modes


    Nashorn can operate in two modes: strict and nonstrict. Some features of ECMAScript
    cannot be used in strict mode. Typically, features that are error-prone are not
    allowed in strict mode. Some features that work in nonstrict mode will generate
    an error in strict mode. I will list the features that are applicable to strict
    mode while explaining the specific features. You can enable strict mode in your
    scripts in two ways:


    *   Using the `–strict` option with the `jjs` command

    *   Using the `"use strict"` or `''use strict''` directive


    The following command invokes the `jjs` command-line tool in strict mode and attempts
    to assign a value of 10 to a variable named `empId` without declaring the variable.
    You receive an error that says that the variable `empId` is not defined:


    `C:\> jjs -strict`


    `jjs> empId = 10;`


    `<shell>:1 ReferenceError: "empId" is not defined`


    `jjs> exit()`


    The solution is to use the keyword `var` (discussed shortly) to declare the `empId`
    variable in strict mode.


    The following command invokes the `jjs` command-line tool in nonstrict mode (without
    the `–strict` option) and attempts to assign a value of 10 to a variable named
    `empId` without declaring the variable. This time, you do not receive an error;
    rather, the value of the variable (that is, `10`) is printed:


    `C:\> jjs`


    `jjs> empId = 10;`


    `10`


    `jjs>exit()`


    Listing 4-1 shows a script using the use strict directive. The directive is specified
    in the beginning of the script or functions. The use strict directive is simply
    the string `"use strict"`. You can also enclose the directive in single quotes
    like `''use strict''`. The script assigns a value to a variable without declaring
    the variable, which will generate an error because strict mode is enabled.


    Listing 4-1\. A Script with the Strict Mode Directive


    `// strict.js`


    `"use strict"; // This is the use strict directive.`


    `empId = 10;   // This will generate an error.`


    ## Identifiers


    An identifier is a name given to variables, functions, labels, and so on in scripts.
    An identifier in Nashorn is a sequence of Unicode characters with the following
    rules:


    *   It may contain letters, digits, underscores, and dollar signs

    *   It must not start with a digit

    *   It must not be one of the reserved words

    *   Characters in the identifier may be replaced with a Unicode escape sequence
    that would be of the form `\uxxxx` where `xxxx` is the Unicode numeric value of
    the character in hexadecimal format


    The following are examples of valid identifiers:


    *   `empId`

    *   `emp_id`

    *   `_empId`

    *   `emp$Id`

    *   `num1`

    *   `\u0061bc` (same as `abc` because `\u0061` is the Unicode escape sequence
    for the character `a`)


    The following are examples of invalid identifiers:


    *   `4num` (Cannot start with a digit)

    *   `emp id` (Cannot contain spaces)

    *   `emp+id` (Cannot contains the + sign)

    *   `break` (`break` is a reserved word and cannot be used as an identifier)


    Tables [4-1](#A978-1-4842-0713-0_4_Chapter.html#Tab1), [4-2](#A978-1-4842-0713-0_4_Chapter.html#Tab2),
    and [4-3](#A978-1-4842-0713-0_4_Chapter.html#Tab3) list the reserved words in
    Nashorn. Reserved words listed in Table [4-1](#A978-1-4842-0713-0_4_Chapter.html#Tab1)
    are already in use as keywords. You are familiar with most of these keywords in
    Java. In Nashorn, they have the same meaning; for example, `for`, `do`, and `while`
    are used to denote looping constructs, whereas `break` and `continue` are used
    to break out of loops and continue with the next iteration in the loop. I will
    explain the keywords specific to Nashorn in this chapter briefly. Tables [4-2](#A978-1-4842-0713-0_4_Chapter.html#Tab2)
    and [4-3](#A978-1-4842-0713-0_4_Chapter.html#Tab3) list keywords that are not
    in use yet, but they will be used in the future.


    Using any reserved words as identifiers generates an error. The reserved words
    in Table [4-3](#A978-1-4842-0713-0_4_Chapter.html#Tab3) will generate an error
    only in strict mode. They can be used in nonstrict mode without any errors.


    Table 4-3.


    The List of Future Reserved Words in Strict-Mode in Nashorn


    | `implements` | `let` | `private` | `public` |

    | --- | --- | --- | --- |

    | `yield` | `interface` | `package` | `protected` |

    | `static` |   |   |   |


    Table 4-2.


    The List of Future Reserved Words in Nashorn


    | `class` | `enum` | `extends` | `super` |

    | --- | --- | --- | --- |

    | `const` | `export` | `import` |   |


    Table 4-1.


    The List of Reserved Words in Nashorn Used as Keywords


    | `break` | `do` | `instanceof` | `typeof` |

    | --- | --- | --- | --- |

    | `case` | `else` | `new` | `var` |

    | `catch` | `finally` | `return` | `void` |

    | `continue` | `for` | `switch` | `while` |

    | `debugger` | `function` | `this` | `with` |

    | `default` | `if` | `throw` |   |

    | `delete` | `in` | `try` |   |


    ## Comments


    Nashorn supports two types of comments:


    *   Single-line comments

    *   Multi-line comments


    The syntax for writing comments in Nashorn is the same as that of Java. The following
    are examples of comments:


    `// Let us declare a variable named empId (A single-line comment)`


    `var empId;`


    `/* Let us declare a variable named empList`


    `and another variable named deptId (A multi-line comment)`


    `*/`


    `var empList;`


    `var deptId;`


    ## Declaring Variables


    Scripting languages are loosely typed. The type of a variable is not known at
    compile-time. The type of a variable can change during the execution of the program.
    The type of a variable is determined at runtime based on the value stored in the
    variable. For example, the same variable can store a number at one point and a
    string at another. This rule in Nashorn is significantly different from Java that
    is a strongly typed language and type of a variable is known at its declaration.


    In Nashorn, the keyword `var` is used to declare a variable. Variable declaration
    is known as a variable statement in ECMAScript terminology:


    `// Declare a variable named msg`


    `var msg;`


    Note that, unlike Java, you do not specify the data type of the declared variable
    in Nashorn. You can declare multiple variables in one variable statement. The
    variable names are separated by a comma:


    `// Declare three variables`


    `var empId, deptId, emplList;`


    Tip


    In strict mode, it is an error to name a variable either `eval` or `arguments`.


    A variable is initialized to `undefined` when declared. I will discuss data types
    and the `undefined` value in the next section. You can also initialize a variable
    with a value at the time of declaration:


    `/* Declare and initialize variables deptId, and empList. deptId is`


    `initialized to the number 400 and empList is initialized to an`


    `array of strings.`


    `*/`


    `var deptId = 400, emplList = ["Ken", "Lydia", "Simon"];`


    Note that you can create an array in Nashorn using an array literal that contains
    a comma-separated list of array elements enclosed in brackets. I will discuss
    arrays in detail in [Chapter 7](#A978-1-4842-0713-0_7_Chapter.html).


    In nonstrict mode, you can omit the keyword `var` in the variable declaration:


    `// Declare a variable named greeting without using the keyword var`


    `greeting = "Hello";`


    ## Data Types


    Data types in can be divided into two categories: Primitive types and Object types.
    Primitive types include the following five data types:


    *   Undefined

    *   Null

    *   Number

    *   Boolean

    *   String'
