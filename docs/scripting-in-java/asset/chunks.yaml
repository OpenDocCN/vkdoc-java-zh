    ## 遍历数组元素


    如果你有兴趣遍历数组的所有属性（包括元素），可以直接使用 `for..in` 和 `for..each..in` 语句。这些语句不会按特定顺序遍历数组。正如本节标题所示，我将讨论如何仅遍历数组的元素，尤其是在数组稀疏的情况下。如果你只向数组添加元素（不添加任何非元素属性），这在大多数情况下都会这样做，那么使用
    `for..in` 和 `for..each..in` 语句对于密集数组和稀疏数组都能很好地工作。


    ### 使用 for 循环


    如果你知道数组是密集的，可以使用简单的 `for` 循环来遍历数组，如下所示：


    `// 创建一个密集数组`


    `var names = new Array("Fu", "Li", "Do");`


    `// 使用 for 循环遍历数组的所有元素`


    `for(var i = 0, len = names.length; i < len; i++) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[2]=Do`


    如果你有一个稀疏数组，`for` 循环就无法正常工作。如果你尝试访问稀疏数组中缺失的元素，它会返回 `undefined`，但这无法告诉你该元素是缺失的，还是现有元素的值为
    `undefined`。你可以通过使用 `in` 运算符来检查正在遍历的索引是否存在，从而摆脱这个限制。如果索引存在，则元素存在；如果索引不存在，则它是稀疏数组中的一个缺失元素。以下代码演示了这种方法：


    `// 创建一个稀疏数组，其中一个元素设置为 undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// 使用 for 循环遍历数组的所有元素`


    `for (var i = 0, len = names.length; i < len; i++) {`


    `// 检查正在访问的索引是否存在于数组中`


    `if (i in names) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    考虑以下代码。它创建了一个只有一个元素的稀疏数组。该数组是 Nashorn 中可能的最大数组，并且该元素被添加在数组的最后一个索引处。在实践中，你永远不会拥有这么大的数组。我使用它只是为了证明使用
    `for` 循环并不是访问稀疏数组中所有元素的最有效方式：


    `// 创建一个空数组`


    `var names = new Array();`


    `// 在最大可能数组的末尾添加一个元素`


    `names[4294967294] = "almost lost";`


    `// 使用 for 循环遍历数组的所有元素`


    `for (var i = 0, len = names.length; i < len; i++) {`


    `// 检查正在访问的索引是否存在于数组中`


    `if (i in names) {`


    `print("names[" + i + "]=" + names[i]);`


    `}`


    `}`


    在这个例子中使用 `for` 循环效率非常低，因为它必须访问 4294967293 个索引，才能到达最后一个有值的索引。要获取数组中的这一个元素需要花费太长时间。稍后我将使用
    `for..in` 循环来解决这个性能低下的 `for` 循环问题。


    ### 使用 forEach() 方法


    `Array.prototype` 对象包含一个名为 `forEach()` 的方法，该方法按升序为数组中的每个元素调用一个回调函数。它只访问稀疏数组中存在的元素。其签名是：


    `forEach (callbackFunc [, thisArg])`


    这里，`callbackFunc` 是一个函数，按升序为数组中的每个元素调用一次。它接收三个参数：元素的值、元素的索引以及正在被遍历的对象。`thisArg`
    是可选的；如果指定了它，它将被用作每次调用 `callbackFunc` 时的 `this` 值。


    `forEach()` 方法在开始执行之前会设置它将访问的索引范围。如果在执行过程中添加了超出该范围的元素，这些元素将不会被访问。如果删除了初始设置范围内的元素，这些元素也不会被访问：


    `// 创建一个稀疏数组，其中一个元素设置为 undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// 定义回调函数`


    `var visitor = function (value, index, array) {`


    `print("names[" + index + "]=" + value);`


    `};`


    `// 打印所有元素`


    `names.forEach(visitor);`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    如果你使用 `forEach()` 方法访问一个大型稀疏数组，你会遇到与上一节讨论的 `for` 循环相同的问题。


    ### 使用 for-in 循环


    让我们使用 `for..in` 循环来解决访问长稀疏数组中元素的低效问题。使用 `for..in` 循环会带来另一个问题，即它会遍历数组的所有属性，而不仅仅是元素。不过，它不会遍历缺失的元素。你需要一种方法来区分简单属性和现有元素。你可以简单地使用数组索引的定义来做到这一点。数组索引是介于
    0 和 2³²-2 之间的整数。如果该属性是一个数组索引，那么它就是一个元素；否则，它只是一个属性，而不是一个元素。清单 7-1 包含一个名为 `isValidArrayIndex()`
    的函数的代码。该函数接受一个属性名作为参数。如果该属性名是一个有效的数组索引，则返回 `true`；否则返回 `false`。


    清单 7-1. isValidArrayIndex( ) 函数的代码


    `// arrayutil.js`


    `var UPPER_ARRAY_INDEX = Math.pow(2, 32) - 2;`


    `Object.defineProperty(this, "UPPER_ARRAY_INDEX", {writable: false});`


    `function isValidArrayIndex(prop) {`


    `// 将 prop 转换为数字`


    `var numericProp = Number(prop);`


    `// 检查 prop 是否为数字`


    `if (String(numericProp) === prop) {`


    `// 检查是否为整数`


    `if (Math.floor(numericProp) === numericProp) {`


    `// 检查是否在有效的数组索引范围内`


    `if (numericProp >= 0 &&                             numericProp <= UPPER_ARRAY_INDEX)
    {`


    `return true;`


    `}`


    `}`


    `}`


    `return false;`


    `}`


    以下代码使用 `for..in` 循环仅遍历稀疏数组的元素。它利用 `isValidArrayIndex()` 函数来确定一个属性是否为有效的数组索引。请注意，该代码在数组中可能的最大索引处添加了一个元素。`for..in`
    循环非常快速地访问了数组的所有元素。


    `// 加载包含 isValidArrayIndex() 函数的脚本`


    `load("arrayutil.js");`


    `// 创建一个稀疏数组，其中一个元素设置为 undefined`


    `var names = ["Fu", "Li", , "Do", undefined, , "Lu"];`


    `// 向数组添加一些属性`


    `names["nationality"] = "Chinese";  // 一个属性`


    `names[4294967294] = "almost lost"; // 在最大可能数组索引处的元素`


    `names[3.2] = "3.2";   // 一个属性`


    `names[7.00] = "7.00"; // 一个元素`


    `// 打印所有元素，忽略非元素属性`


    `for(var prop in names) {`


    `if (isValidArrayIndex(prop)) {`


    `// 这是一个元素`


    `print("names[" + prop + "]=" + names[prop]);`


    `}`


    `}`


    `names[0]=Fu`


    `names[1]=Li`


    `names[3]=Do`


    `names[4]=undefined`


    `names[6]=Lu`


    `names[7]=7.00`


    `names[4294967294]=almost lost`


    ## 检查是否为数组


    `Array` 对象包含一个名为 `isArray()` 的静态方法，可用于检查一个对象是否为数组。以下代码演示了其用法：


    `var obj1 = [10, 20];     // 一个数组`


    `var obj2 = {x:10, y:20}; // 一个对象，但不是数组`


    `print("Array.isArray(obj1) =",  Array.isArray(obj1));`


    `print("Array.isArray(obj2) =",  Array.isArray(obj2));`


    `Array.isArray(obj1) = true`


    `Array.isArray(obj2) = false`

