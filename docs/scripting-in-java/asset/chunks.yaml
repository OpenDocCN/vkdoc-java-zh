    ## 传递参数


    Java 脚本 API 允许你将参数从宿主环境（Java 应用程序）传递到脚本引擎，反之亦然。在本节中，你将看到宿主应用程序和脚本引擎之间参数传递机制的技术细节。有多种方法可以从
