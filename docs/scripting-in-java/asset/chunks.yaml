  raw: '#### Typed Arrays


    Typed array views are array-like objects that deal with a specific type of values
    such as 32-bit signed integers. They provides a means to read and write the specific
    type of data to the `ArrayBuffer`. In a typed array view, all data values are
    of the same size. Table [7-1](#A978-1-4842-0713-0_7_Chapter.html#Tab1) contains
    the list of typed array views, their sizes and descriptions. The size in the table
    is the size of one element of the typed array view. For example, `Int8Array` contains
    elements that are 1 byte in length each. You can think of the `Int8Array` as a
    `byte` array type in Java, the `Int16Array` as the `short` array type in Java,
    and `Int32Array` as the `int` array type in Java.


    Tip


    A typed array is a fixed-length, dense array-like object, whereas an `Array` object
    is a variable-length array that may be sparse or dense.


    Table 7-1.


    The List of Typed Array Views, Their Sizes, and Descriptions


    | Typed Array View | Size in Byte | Description |

    | --- | --- | --- |

    | `Int8Array` | 1 | 8-bit 2’s complement signed integer |

    | `Uint8Array` | 1 | 8-bit unsigned integer |

    | `Uint8ClampedArray` | 1 | 8-bit unsigned integer (clamped) |

    | `Int16Array` | 2 | 16-bit 2’s complement signed integer |

    | `Uint16Array` | 2 | 16-bit unsigned integer |

    | `Int32Array` | 4 | 32-bit 2’s complement signed integer |

    | `Uint32Array` | 4 | 32-bit unsigned integer |

    | `Float32Array` | 4 | 32-bit IEEE floating point |

    | `Float64Array` | 8 | 64-bit IEEE floating point |


    Let us differentiate between two array types: `Uint8Array` and `Uint8ClampedArray`.
    Elements in both arrays contain 8-bit unsigned integers ranging from 0 to 255\.
    `Uint8Array` uses modulo 256 to store values in the array whereas `Uint8ClampedArray`
    clamps the values between 0 and 255 (inclusive). For example, if you store 260
    in a `UInt8array`, 4 is stored because 260 modulo 256 is 4\. If you store 260
    in a `Uint8ClampedArray`, 255 is stored because 260 is greater than 255 and the
    upper limit is clamped at 255\. Similarly, storing -2 stores 254 in a `Uint8Array`
    and 0 in a `Uint8ClampedArray`.


    Each of the typed array view object defined the following two properties:


    *   `BYTES_PER_ELEMENT`

    *   `name`


    The `BYTES_PER_ELEMENT` property contains the size of the elements of the types
    array in bytes. Its value for a view type is the same as in the “Size in Bytes”
    column in Table 0-1\. The `name` property contains a string that is the name of
    the view and it is the same as the “Typed array View” column in the table. For
    example, `Int16Array.BYTES_PR_ELEMNET` is 2 and `Int16Array.name` is `"Int16Array"`.


    All typed array views provide four constructors. The following are four constructors
    for `Int8Array`. You can replace the name `Int8Array` with the name of other typed
    array views to get their constructors:


    *   `Int8Array(arrayBuffer, byteOffset, elementCount)`

    *   `Int8Array(length)`

    *   `Int8Array(typedArray)`

    *   `Int8Array(arrayObject)`


    The first constructor creates a typed array view from an `ArrayBuffer`. You can
    create a full or a partial view of the specified `ArrayBuffer`. If `byteOffset`
    and `elementCount` are unspecified, it creates a full view of the `ArrayBuffer.
    byteOffset` is the byte offset in the buffer from beginning and the `elementCount`
    is the number of elements of the array that will occupy the buffer.


    The second constructor takes the `length` of the typed array an argument and creates
    an `ArrayBuffer` of the appropriate size and returns a view of the full `ArrayBuffer`.


    The third and fourth constructors let you create a typed array from another typed
    array and an `Array` object; the contents of the new typed array are initialized
    from the contents of the specified array. A new `ArrayBuffer` of the appropriate
    size to hold the copied contents is created.


    The following code shows how to create `Int8Array` objects (arrays of bytes) using
    different constructors:


    `// Create an ArrayBuffer of 8 bytes`


    `var buffer = new ArrayBuffer(8);`'
  trans: '

    #### 类型化数组


    类型化数组视图是类似数组的对象，用于处理特定类型的值，例如 32 位有符号整数。它们提供了一种向`ArrayBuffer`读写特定类型数据的方法。在类型化数组视图中，所有数据值的大小相同。表
    7-1 列出了类型化数组视图及其大小和描述。表中的大小是类型化数组视图中一个元素的大小。例如，`Int8Array`包含每个长度为 1 字节的元素。你可以将`Int8Array`视为
    Java 中的`byte`数组类型，将`Int16Array`视为 Java 中的`short`数组类型，将`Int32Array`视为 Java 中的`int`数组类型。


    提示


    类型化数组是固定长度的密集数组类对象，而`Array`对象是可变长度的数组，可能是稀疏或密集的。


    表 7-1. 类型化数组视图列表、大小及描述


    | 类型化数组视图 | 字节大小 | 描述 |

    | --- | --- | --- |

    | `Int8Array` | 1 | 8 位二进制补码有符号整数 |

    | `Uint8Array` | 1 | 8 位无符号整数 |

    | `Uint8ClampedArray` | 1 | 8 位无符号整数（钳位） |

    | `Int16Array` | 2 | 16 位二进制补码有符号整数 |

    | `Uint16Array` | 2 | 16 位无符号整数 |

    | `Int32Array` | 4 | 32 位二进制补码有符号整数 |

    | `Uint32Array` | 4 | 32 位无符号整数 |

    | `Float32Array` | 4 | 32 位 IEEE 浮点数 |

    | `Float64Array` | 8 | 64 位 IEEE 浮点数 |


    让我们区分两种数组类型：`Uint8Array`和`Uint8ClampedArray`。两种数组中的元素都包含 0 到 255 范围内的 8 位无符号整数。`Uint8Array`使用模
    256 将值存储到数组中，而`Uint8ClampedArray`将值钳制在 0 到 255（含）之间。例如，如果你在`UInt8array`中存储 260，则存储
    4，因为 260 模 256 等于 4。如果你在`Uint8ClampedArray`中存储 260，则存储 255，因为 260 大于 255，上限被钳制在
    255。类似地，存储-2 时，`Uint8Array`中存储 254，而`Uint8ClampedArray`中存储 0。


    每个类型化数组视图对象都定义了以下两个属性：


    *   `BYTES_PER_ELEMENT`

    *   `name`


    `BYTES_PER_ELEMENT`属性包含类型化数组元素的大小（以字节为单位）。对于某个视图类型，其值与表 0-1 中的“字节大小”列相同。`name`属性包含一个字符串，即视图的名称，与表中的“类型化数组视图”列相同。例如，`Int16Array.BYTES_PR_ELEMNET`为
    2，`Int16Array.name`为`"Int16Array"`。


    所有类型化数组视图都提供四个构造函数。以下是`Int8Array`的四个构造函数。你可以将名称`Int8Array`替换为其他类型化数组视图的名称，以获取它们的构造函数：


    *   `Int8Array(arrayBuffer, byteOffset, elementCount)`

    *   `Int8Array(length)`

    *   `Int8Array(typedArray)`

    *   `Int8Array(arrayObject)`


    第一个构造函数从`ArrayBuffer`创建类型化数组视图。你可以创建指定`ArrayBuffer`的完整视图或部分视图。如果未指定`byteOffset`和`elementCount`，则创建`ArrayBuffer`的完整视图。`byteOffset`是缓冲区中从开头算起的字节偏移量，`elementCount`是数组中将要占用缓冲区的元素数量。


    第二个构造函数将类型化数组的`length`作为参数，创建适当大小的`ArrayBuffer`，并返回完整`ArrayBuffer`的视图。


    第三个和第四个构造函数允许你从另一个类型化数组和`Array`对象创建类型化数组；新类型化数组的内容从指定数组的内容初始化。会创建一个新的、大小合适的`ArrayBuffer`来容纳复制的内容。


    以下代码展示了如何使用不同的构造函数创建`Int8Array`对象（字节数组）：


    `// 创建一个 8 字节的 ArrayBuffer`


    `var buffer = new ArrayBuffer(8);`

