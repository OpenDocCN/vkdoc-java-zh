    \ `Map` with a restriction that its keys must be nonempty, non-null Strings.\n\
    \nListing 3-1 shows how to use a `Bindings`. It creates an instance of `SimpleBindings`,\
    \ adds some key-value pairs to it, retrieves the values of the keys, removes a\
    \ key-value pair, etc. The `get()` method of the `Bindings` interface returns\
    \ `null` if the key does not exist or the key exists and its value is `null`.\
    \ If you want to test if a key exists, you need to use its `contains()` method.\n\
    \nListing 3-1. Using Bindings Objects\n\n```\n// BindingsTest.java\npackage com.jdojo.script;\n\
    \nimport javax.script.Bindings;\nimport javax.script.SimpleBindings;\n\npublic\
    \ class BindingsTest {\n    public static void main(String[] args) {\n       \
