    Enter a name and press the `Enter` key or click the `Say Hello` button. A message
    with a greeting will be displayed.


    ![A978-1-4842-0713-0_11_Fig4_HTML.jpg](A978-1-4842-0713-0_11_Fig4_HTML.jpg)


    Figure 11-4.


    The greeter JavaFX aplication in action


    Developing a JavaFX application is much easier in Nashorn. In the script, you
    are able to call the getters and setters of Java objects using properties. You
    can access properties directly for all Java objects, not just for JavaFX objects.
    For example, instead of writing `root.setSpacing(5)` in Java, you can write `root.spacing
    = 5` in Nashorn.


    Adding the event handler for buttons is also easier. You can set an anonymous
    function as the event handler for the buttons. Notice that you are able to use
    `onAction` property to set the event handler rather than calling the `setOnAction()`
    method of the `Button` class. The following snippet of code shows how to set the
    `ActionEvent` handler for a button using a function reference `sayHello`:


    ```

    // Add the event handler for the Say Hello button

    sayHelloBtn.onAction = sayHello

    ```


    Notice that, in the example, you used a nested function `sayHello()` inside the
    `start()` function. The reference to the function is used as the event handler.
    An event handler takes an argument and the `evt` formal parameter in the `sayHello()`
    function is that event object.


    ## Summary


    The `jjs` command-line tool in Nashorn supports launching a JavaFX application
    written in scripts. The `–fx` option is used with `jjs` to launch a JavaFX application.
    The script for a JavaFX application can have `init()`, `start()`, and `stop()`
    functions that correspond to the `init()`, `start()`, and `stop()` methods of
    the JavaFX `Application` class. Nashorn calls these functions in the same order
    as they are called in a JavaFX application.


    The `start()` function is passed a reference to the primary stage. If you do not
    provide a `start()` function, the entire script is considered the `start()` function.
    Nashorn provides a global object named `$STAGE`, which is the reference to the
    primary stage. If you do not provide a `start()` function, you need to use the
    `$STAGE` global variable to access the primary stage. If you do not provide a
    `start()` method and do not show the primary stage, Nashorn will call the `$STAGE.show()`
    method for you.


    # 12. Java APIs for Nashorn


    In this chapter, you will learn:


    *   What Java APIs for Nashorn are

    *   How to instantiate the Nashorn engine directly

    *   How to pass options to the Nashorn engine in Java code and on the command-line

    *   How to share globals among script contexts in a Nashorn engine

    *   How to add, update, delete, and read properties of script objects in Java
    code

    *   How to create script objects and invoke their methods in Java code

    *   How to invoke script functions from Java code

    *   How to convert script dates to Java dates


    ## What Are Java APIs for Nashorn?


    It is straightforward to use Java classes in Nashorn scripts. Sometimes you may
    want to use Nashorn objects in Java code. You may pass Nashorn objects to Java
    code or Java code may evaluate a Nashorn script and retrieve the reference of
    Nashorn objects. When Nashorn objects cross the boundary (script-to-Java), they
    need to be represented as objects of a Java class and you should be able to use
    them like any other Java objects.


    If your application uses only Nashorn, to take full advantage of the Nashorn engine
    you may want to use options and extensions available in Nashorn. You will need
    to instantiate the Nashorn engine in Java code, using the classes that are specific
    to the Nashorn engine, not using the classes in the Java Scripting API.


    The Java APIs for Nashorn provide Java classes and interfaces that let you deal
    with the Nashorn scripting engine and Nashorn objects directly in Java code. Figure
    [12-1](#A978-1-4842-0713-0_12_Chapter.html#Fig1) depicts a class diagram of those
    classes and interfaces that you are supposed to use in the client code when you
    are dealing with the Nashorn engine. They are in the `jdk.nashorn.api.scripting`
    package.


    ![A978-1-4842-0713-0_12_Fig1_HTML.jpg](A978-1-4842-0713-0_12_Fig1_HTML.jpg)


    Figure 12-1.


    A class diagram of Java APIs for Nashorn in the `jdk.nashorn.api.scripting` package


    Note that the Nashorn scripting engine internally uses a lot of other classes
    in other packages. However, you are not supposed to use them in your application
    directly, except for classes from the `jdk.nashorn.api.scripting` package. The
    webpage at [https://wiki.openjdk.java.net/display/Nashorn/Nashorn+jsr223+engine+notes](https://wiki.openjdk.java.net/display/Nashorn/Nashorn+jsr223+engine+notes)
    contains the links for the documentation for the `jdk.nashorn.api.scripting` package.


    Note


    The `ClassFilter` interface in the `jdk.nashorn.api.scripting` package has been
    added in JDK8u40, which is planned to be shipped at the end of the first quarter
    of 2015. If you want to use this interface earlier, you will need to download
    the early access build for JDK8u40.


    I will discuss some Nashorn-specific Java classes and interfaces in detail in
    subsequent sections. Table [12-1](#A978-1-4842-0713-0_12_Chapter.html#Tab1) lists
    the classes and interfaces in the `jdk.nashorn.api.scripting` package with their
    descriptions.


    Table 12-1.


    The List of Java Classes/Interfaces to be Used with Nashorn Scripting Engine


    | Class/Interface | Description |

    | --- | --- |

    | `NashornScriptEngineFactory` | This is a script engine factory implementation
    for the Nashorn engine. You need to instantiate this class when you want to create
    a Nashorn engine that uses Nashorn-specific options and extensions. |

    | `NashornScriptEngine` | This is the script engine implementation class for the
    Nashorn engine. You do not instantiate this class directly. Its instance is obtained
    using the `getScriptEngine()` method of a `NashornScriptEngineFactory` object.
    |

    | `NashornException` | This is the base exception class for all exceptions thrown
    from Nashorn scripts. When you use the Java Scripting API, your Java code receives
    an instance of the `ScriptException` class that will be a wrapper for the `NashornException`.
    An instance of the `NashornException` may be thrown directly in Java code if you
    access scripts directly from Java code such as by implementing a Java interface
    in scripts and using that interface’s instance in Java code. This class contains
    many methods that give you access to the details of the script error such as line
    number, column number, the script’s error object, and so on. |

    | `ClassFilter` | `ClassFilter` is an interface. You can use its instance to restrict
    the availability of some or all Java classes in the Nashorn script. You will need
    to pass an instance of this interface when instantiating a `NashornScriptEngine`
    using a `NashornScriptEngineFactory`. |

    | `ScriptUtils` | A utility class intended to be used in Nashorn scripts. |

    | `URLReader` | Reads contents of a URL. It inherits from the `java.io.Reader`
    class. |

    | `JSObject` | An instance of this interface represents a Nashorn object in Java
    code. If you want to pass a Java object to a Nashorn script that should be treated
    as a Nashorn object, you need to pass an instance of this interface. You can use
    the bracket notation in Nashorn scripts to access and set properties of such Java
    objects. |

    | `AbstractJSObject` | This is an abstract class that implements the `JSObject`
    interface. |

    | `ScriptObjectMirror` | This is a mirror object that wraps a Nashorn script object.
    It inherits from the `AbstractJSObject` class and implements the `Bindings` interface.
    When Java code receives a Nashorn object from scripts, the script object is wrapped
    in a `ScriptObjectMirror` instance before being passed to the Java code. |'
