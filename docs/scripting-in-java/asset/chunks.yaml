    在现实世界的应用程序中，你应该将所有脚本存储在文件中，这样可以在不修改和重新编译 Java 代码的情况下修改脚本。在本章的大多数示例中，你不会遵循此规则；为了保持代码简短和简单，你会将脚本存储在
