    ### 使用 JavaScript 函数


    有时 Java 接口只有一个方法。在这种情况下，你可以传递一个 JavaScript 函数对象来代替接口的实现。Java 中的 `Runnable` 接口只有一个方法
    `run()`。当你在 JavaScript 中需要使用 `Runnable` 接口的实例时，可以传递一个 JavaScript 函数对象。以下代码片段展示了如何创建一个
    `Thread` 对象并启动它。在 `Thread` 类的构造函数中，传递了一个 JavaScript 函数对象 `myRunFunc`，而不是 `Runnable`
    接口的实例：


    `function myRunFunc() {`


    `print("A thread is running.");`


    `}`


    `// 调用 Thread(Runnable) 构造函数，并传递 myRunFunc 函数对象`


    `// 该对象将作为 Runnable 接口中 run() 方法的实现。`


    `var thread = new java.lang.Thread(myRunFunc);`


    `thread.start();`


    `A thread is running.`


    ### 访问超类的方法


    在 Java 中，你可以使用关键字 `super` 访问超类的方法。当你在 JavaScript 中扩展一个类时，你也可以使用 `Java.super()`
    方法访问超类的方法。该方法接受一个在 JavaScript 中被扩展的 JavaScript 对象，并返回一个可用于调用超类方法的引用。请考虑如清单 6-4
    所示的 `Person` 类代码。


    清单 6-4\. Person 类


    `// Person.java`


    `package com.jdojo.script;`


    `public class Person {`


    `private String firstName;`


    `private String lastName;`


    `public Person(String firstName, String lastName){`


    `this.firstName = firstName;`


    `this.lastName = lastName;`


    `}`


    `public String getFirstName() {`


    `return firstName;`


    `}`


    `public void setFirstName(String firstName) {`


    `this.firstName = firstName;`


    `}`


    `public String getLastName() {`


    `return lastName;`


    `}`


    `public void setLastName(String lastName) {`


    `this.lastName = lastName;`


    `}`


    `public String getFullName() {`


    `return firstName + " " + lastName;`


    `}`


    `}`


    请考虑清单 6-5 中的代码。它扩展了 `Person` 类并重写了 `getFullName()` 方法。


    清单 6-5\. 使用 Java.super() 方法访问超类方法


    `// supermethod.js`


    `var Person = Java.type("com.jdojo.script.Person");`


    `var PersonExtender = Java.extend(Person);`


    `// 扩展 Person 类并重写 getFullName() 方法`


    `var john = new PersonExtender("John", "Jacobs") {`


    `getFullName: function () {`


    `// 你可以在此处使用外部声明的变量 john。`


    `var _super_ = Java.super(john);`


    `var fullName = _super_.getFullName();`


    `return fullName.toUpperCase();`


    `}`


    `}`


    `// 使用扩展类的实现获取 john 的全名`


    `var johnFullName = john.getFullName() ;`


    `// 获取 john 的超类引用`


    `var johnSuper = Java.super(john);`


    `// 从 Person 类获取 john 的全名`


    `var johnSuperFullName = johnSuper.getFullName();`


    `// 打印姓名`


    `print("Extended full name:", johnFullName);`


    `print("Super full name:", johnSuperFullName);`


    `Extended full name: JOHN JACOBS`


    `Super full name: John Jacobs`


    请注意，扩展后的 `Person` 类的 `getFullName()` 方法引用了在函数外部声明的变量 `john`。以下语句分配了一个对象的引用，该对象可用于调用
    `john` 对象的超类方法。


    `var _super_ = Java.super(john);`


    重写后的方法调用了 `Person` 类的 `getFullName()` 方法，将姓名转换为大写，并返回结果。代码再次获取了超类引用，如下所示：


    `// 获取 john 的超类引用`


    `var johnSuper = Java.super(john);`


    最后，代码打印了从 `Person` 类和扩展后的 `Person` 类返回的值，以证明你确实能够调用超类方法。


    提示


    除了使用 `Java.super(obj)` 方法获取 `obj` 的超类对象引用并调用其方法外，你还可以使用 `obj.super$MethodName(args)`
    语法来调用名为 `obj` 的对象的超类方法。例如，在示例中，你可以使用 `john.super$getFullName()` 来调用对象 `john` 上
    `Person` 类的 `getFullName()` 方法。


    ## 使用 Lambda 表达式


    JavaScript 支持可用作 lambda 表达式的匿名函数。以下是一个匿名函数，它接受一个数字作为参数并返回其平方：


    `function (n) {`


    `return n * n;`


    `}`


    以下是一个在 JavaScript 中使用匿名函数作为 lambda 表达式创建 `Runnable` 对象的示例。该 `Runnable` 对象用于 `Thread`
    类的构造函数中。


    `var Thread = Java.type("java.lang.Thread");`


    `// 使用 Runnable 对象创建一个 Thread。该 Runnable 对象`


    `// 是使用匿名函数作为 lambda 表达式创建的。`


    `var thread = new Thread(function () {`


    `print("Hello Thread");`


    `});`


    `// 启动线程`


    `thread.start();`


    使用 lambda 表达式的 JavaScript 代码对应的 Java 代码如下：


    `// 使用 Runnable 对象创建一个 Thread。该 Runnable 对象`


    `// 是使用 lambda 表达式创建的。`


    `Thread thread = new Thread(() -> {`


    `System.out.println("Hello Thread");`


    `});`


    `// 启动线程`


    `thread.start();`


    ## 总结


    在脚本中使用 Java 类型创建对象之前，需要先将 Java 类型导入脚本。在脚本中导入类型有四种方法：使用 `Packages` 全局对象、使用 `Java.type()`
    方法、使用 `importPackage()` 和 `importClass()` 函数，以及在 `with` 子句中使用 `JavaImporter`。Nashorn
    将 `java`、`javax`、`org`、`com`、`edu` 和 `net` 声明为全局变量，它们分别是 `Packages.java`、`Packages.javax`、`Packages.org`、`Packages.com`、`Packages.edu`
    和 `Packages.net` 的别名。因此，你可以使用这些包中任何类型的完全限定名来引用该类型。


    在脚本中创建 Java 对象时，需要将 `new` 运算符与 Java 类型一起使用。使用 `Java.type()` 方法可以统一地导入 Java 类型（包括数组类型）。你可以像创建任何其他类型的对象一样创建数组对象。


    大多数情况下，重载的 Java 方法调用由 Nashorn 解析。如果你想从脚本中调用重载方法的特定版本，可以使用方括号表示法指定具体的方法签名。例如，`pt"print(java.lang.Object)"`
    会在名为 `pt` 的对象引用上调用 `print(java.lang.Object)` 方法，并将 10.5 作为参数传递给该方法。


    Nashorn 允许你在脚本中使用 `Java.extend()` 方法扩展接口、抽象类和具体类。它还允许你使用 `Java.super()` 方法在对象上调用超类方法。


    # 7. 集合


    在本章中，你将学习：


    *   Nashorn 中的数组是什么

    *   如何使用数组字面量和 `Array` 对象在 Nashorn 中创建数组

    *   如何使用 `Array` 对象的不同方法

    *   如何处理类数组对象

    *   如何在 Nashorn 中创建和使用类型化数组

    *   如何在 Nashorn 中使用 Java 集合

    *   如何在 Nashorn 中创建 Java 数组

    *   如何将 Java 数组转换为 Nashorn 数组，反之亦然

