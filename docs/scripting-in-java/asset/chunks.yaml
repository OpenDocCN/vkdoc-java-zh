    ### The `Function()` Constructor


    You can also create a function object using the `Function` constructor or the
    `Function` function. It lets you creates a function object from a string. A constructor
    in Nashorn is a function that is used to create a new object using the `new` operator.
    Nashorn has a built-in function, named `Function`, which can be used as a constructor
    function. The syntax to create a function using the `Function` constructor is:


    `var func = new Function("param1", "param2"..., "function-body");`


    You can also simply use `Function` as a function, as shown:


    `var func = Function("param1", "param2"..., "function-body");`


    `param1`, `param2`, and so on are names of the formal parameters of the new function
    being defined. The function body is the body of the function. All parameters to
    `Function` are passed as strings. If you pass only one parameter, it is considered
    the body of the function. You can also specify all parameter names in one string
    by separating the names with a comma, as shown:


    `var func = Function("param1, param2,...", "function-body");`


