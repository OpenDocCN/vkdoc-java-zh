- fmt: "### Using a Constructor Function\n\nA constructor function (or simply a constructor)\
    \ is a function that is used with the `new` operator to create an object. It is\
    \ customary to start a constructor with an uppercase letter. The following code\
    \ creates a function named `Person` that is intended to be used as a constructor:\n\
    \n```\n// Declare a constructor named Person\nfunction Person(fName, lName) {\n\
    \    this.fName = fName;\n    this.lName = lName;\n    this.fullName = function\
    \ () {\n        return this.fName + \" \" + this.lName;\n    }\n}\n```\n\nNotice\
    \ that a constructor is simply a function like any other function, and it can\
    \ also be called as a function without using the `new` keyword. The outcome may\
    \ be very different, depending on how the function is written. I will discuss\
    \ such scenarios shortly.\n\nThe keyword `this` inside a constructor refers to\
    \ the object being constructed when the function is called with the `new` operator.\
    \ In this case, `this.fName` inside the `Person` function refers to the `fName`\
    \ property of the new object being constructed. So are `lName` and `toString`.\
    \ The `Person` constructor simply adds three properties to the object being created.\
    \ The following snippet of code creates two objects using the `Person` constructor\
    \ and prints their string representations:\n\n```\n// Create few Person objects\n\
    var john = new Person(\"John\", \"Jacobs\");\nvar ken = new Person(\"Ken\", \"\
    McEwen\");\n\n// The print() function calls the toString() method when\n// it\
    \ needs to convert an object to a string\nprint(john);\nprint(ken);\n```\n\n```\n\
    John Jacobs\nKen McEwen\n```\n\nLet’s try using `Person` simply as a function,\
    \ not as a constructor:\n\n```\n// Print details\nprintf(\"fName = %s, lName =\
    \ %s\", this.fName, this.lName);\n\n// Call the Person function\nvar john = Person(\"\
    John\", \"Jacobs\");\n\n// Print details\nprintf(\"fName = %s, lName = %s, full\
    \ name = %s\", this.fName, this.lName, this.fullName());\n\n// Call the Person\
    \ function\nvar ken = Person(\"Ken\", \"McEwen\");\n\n// The print two person\
    \ references\nprint(\"john = \" + john);\nprint(\"ken = \" + ken);\n\nprintf(\"\
    fName = %s, lName = %s, full name = %s\", this.fName, this.lName, this.fullName());\n\
    ```\n\n```\nfName = undefined, lName = undefined\nfName = John, lName = Jacobs,\
    \ full name = John Jacobs\njohn = undefined\nken = undefined\nfName = Ken, lName\
    \ = McEwen, full name = Ken McEwen\n```\n\nYou can observe the following points\
    \ in the code:\n\n- The code prints the value of `this.fName` and `this.lName`.\
    \ The `printf()` function is called in the global context and the keyword `this`\
    \ refers to the global object. Because you have not defined any `fName` and `lName`\
    \ properties for the global object, values for both properties are returned as\
    \ `undefined`.\n- The `Person()` function is called and its return value is stored\
    \ in the `john` variable. The `Person()` function is called in the global context,\
    \ so the keyword `this` inside the function refers to the global object. The function\
    \ adds three properties to the global object.\n- The `printf()` function is used\
    \ to print the details of the global object (referred to by `this`) to confirm\
    \ that the previous call to the `Person()` function added those properties to\
    \ the global object.\n- The `Person()` function is called again with different\
    \ arguments. The first call had already added three properties to the global object.\
    \ This call simply updates them with new values. This is confirmed by reading\
    \ these properties from the global object again.\n- Because the `Person()` function\
    \ does not return a value explicitly, it returns `undefined` by default that is\
    \ confirmed by the last two lines in the output.\n\nIf you do not pass any arguments\
    \ to a constructor, you can omit the parentheses in the new object creation expression.\
    \ The following code calls `Person` as a constructor function without passing\
    \ any arguments that will default the actual parameters inside the function to\
    \ `undefined`. Notice that the `new` operator is simply followed with the constructor\
    \ name:\n\n```\n// Create a person with both names as undefined\nvar person =\
    \ new Person;  // No arguments list\n```"
  raw: '### Using a Constructor Function


    A constructor function (or simply a constructor) is a function that is used with
    the `new` operator to create an object. It is customary to start a constructor
    with an uppercase letter. The following code creates a function named `Person`
    that is intended to be used as a constructor:


    `// Declare a constructor named Person`


    `function Person(fName, lName) {`


    `this.fName = fName;`


    `this.lName = lName;`


    `this.fullName = function () {`


    `return this.fName + " " + this.lName;`


    `}`


    `}`


    Notice that a constructor is simply a function like any other function, and it
    can also be called as a function without using the `new` keyword. The outcome
    may be very different, depending on how the function is written. I will discuss
    such scenarios shortly.


    The keyword `this` inside a constructor refers to the object being constructed
    when the function is called with the `new` operator. In this case, `this.fName`
    inside the `Person` function refers to the `fName` property of the new object
    being constructed. So are `lName` and `toString`. The `Person` constructor simply
    adds three properties to the object being created. The following snippet of code
    creates two objects using the `Person` constructor and prints their string representations:


    `// Create few Person objects`


    `var john = new Person("John", "Jacobs");`


    `var ken = new Person("Ken", "McEwen");`


    `// The print() function calls the toString() method when`


    `// it needs to convertan object to a string`


    `print(john);`


    `print(ken);`


    `John Jacobs`


    `Ken McEwen`


    Let’s try using `Person`simply as a function, not as a constructor:


    `// Print details`


    `printf("fName = %s, lName = %s", this.fName, this.lName);`


    `// Call the Person function`


    `var john = Person("John", "Jacobs");`


    `// Print details`


    `printf("fName = %s, lName = %s, full name = %s", this.fName, this.lName, this.fullName());`


    `// Call the Person function`


    `var ken = Person("Ken", "McEwen");`


    `// The print two person references`


    `print("john = " + john);`


    `print("ken = " + ken);`


    `printf("fName = %s, lName = %s, full name = %s", this.fName, this.lName, this.fullName());`


    `fName = undefined, lName = undefined`


    `fName = John, lName = Jacobs, full name = John Jacobs`


    `john = undefined`


    `ken = undefined`


    `fName = Ken, lName = McEwen, full name = Ken McEwen`


    You can observe the following points in the code:


    *   The code prints the value of `this.fName` and `this.lName`. The `printf()`
    function is called in the global context and the keyword `this` refers to the
    global object. Because you have not defined any `fName` and `lName` properties
    for the global object, values for both properties are returned as `undefined`.

    *   The `Person()` function is called and its return value is stored in the `john`
    variable. The `Person()` function is called in the global context, so the keyword
    `this` inside the function refers to the global object. The function adds three
    properties to the global object.

    *   The `printf()` function is used to print the details of the global object
    (referred to by `this`) to confirm that the previous call to the `Person()` function
    added those properties to the global object.

    *   The `Person()` function is called again with different arguments. The first
    call had already added three properties to the global object. This call simply
    updates them with new values. This is confirmed by reading these properties from
    the global object again.

    *   Because the `Person()` function does not return a value explicitly, it returns
    `undefined` by default that is confirmed by the last two lines in the output.


    If you do not pass any arguments a constructor, you can omit the parentheses in
    the new object creation expression. The following code calls `Person` as a constructor
    function without passing any arguments that will default the actual parameters
    inside the function to `undefined`. Notice that the `new` operator is simply followed
    with the constructor name:


    `// Create a person with both names as undefined`


    `var person = new Person;  // No arguments list`'
