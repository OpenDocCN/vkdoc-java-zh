  raw: '### Passing One Argument


    When one argument is passed to the `Array` constructor, the type of the argument
    determines how the new array is created:


    *   If the argument is a Number and it is an integer in the range from 0 to 2^(32)-1
    (inclusive), the argument is considered the `length` of the array. Otherwise,
    a `RangeError` exception is throw.

    *   If the argument is not a Number, an array with the passed argument as the
    sole element of the array is created. The `length` of the array is set to 1.


    The following code creates the biggest possible array in Nashorn:


    `var names = new Array(Math.pow(2, 32) -1); // The biggest possible array`


    `print("names.length = " + names.length);`


    `names.length = 4294967295`


    The following statement creates an array with `length` as 10\. No elements exist
    in the array yet:


    `var names = new Array(10);`


    The following array creation expressions throws a `RangeError` exception, because
    the argument is a Number and it is either not an integer in the valid range or
    out of range:


    `var names1 = new Array(34.89);           // Not an integer`


    `var names1 = new Array(Math.pow(2, 32)); // Out of range`


    `var namess = new Array(-10);             // Out of range`


    The following code passes a nonnumeric argument to the `Array` constructor that
    creates an array with the passed argument as its sole element and sets the `length`
    of the array to 1:


    `var names1 = new Array("Fu"); // Creates an array with one element "Fu"`


    `var names2 = new Array(true); // Creates an array with one element true`


    ### Passing Two or More Arguments


    When two or more arguments are passed to the `Array` constructor, it creates a
    dense array with the specified arguments. The `length` is set to the number of
    arguments passed. The following statement creates an array with three passed arguments
    and sets the `length` to 3:


    `var names = new Array("Fu", "Li". "Do");`


    You cannot create a sparse array using the `Array` constructor. Using consecutive
    commas or trailing commas in the `Array` constructor throws a `SyntaxError` exception:


    `var names1 = new Array("Fu", "Li",, "Do");  // A SyntaxError`


    `var names2 = new Array("Fu", "Li", "Do", ); // A SyntaxError`


    You can create a sparse array by adding elements at noncontiguous indexes or deleting
    the existing elements, so the indexes become noncontiguous. I will discuss deleting
    the elements of an array in the next section. The following code creates a dense
    array and adds a noncontiguous element to make it a sparse array:


    `// Creates a dense array with elements at indexes 0 and 1.`


    `var names = new Array("Fu", "Li");  // names.length is set to 2`


    `print("After creating the array: names.length = " + names.length);`


    `// Add an element at index 4, skipping index 2 and 3.`


    `names[4] = "Do"; // names.length is set to 5, making names a sparse array`


    `print("After adding an element at index 4: names.length = " + names.length);`


    `for(var prop in names) {`


    `print("names[" + prop + "] = " + names[prop]);`


    `}`


    `After creating the array: names.length = 2`


    `After adding an element at index 4: names.length = 5`


    `names[0] = Fu`


    `names[1] = Li`


    `names[4] = Do`


    ## Deleting Array Elements


    Deleting an array element or nonelement properties of an array is the same as
    deleting properties of an object. Use the `delete` operator to delete an array
    element. If you delete an element from middle or beginning of a dense array, the
    array becomes sparse. The following code shows how to delete elements from an
    array:


    `// Creates a dense array with elements at indexes 0, 1, and 2.`


    `var names = new Array("Fu", "Li", "Do");`


    `print("Before deleting:");`


    `print("names.length = " + names.length + ", Elements = " + names);`


    `// Delete the element at index 1`


    `delete names[1]; // names.length remains 3`


    `print("AFter deleting:");`


    `print("names.length = " + names.length + ", Elements = " + names);`


    `Before deleting:`


    `names.length = 3, Elements = Fu,Li,Do`


    `AFter deleting:`


    `names.length = 3, Elements = Fu,,Do`


    You can make elements of an array nonconfigurable and nonwritable, so they cannot
