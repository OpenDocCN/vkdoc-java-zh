- fmt: "# Locking Objects\n\n`Object` provides several methods that let you lock down\
    \ objects. These methods give you finer control as to what parts or features of\
    \ the object are locked down:\n\n- You can prevent extensions of the object (or\
    \ make it nonextensible) so new properties cannot be added to it\n- You can seal\
    \ the object so that the existing properties cannot be deleted and new properties\
    \ cannot be added\n- You can freeze the object so that the existing properties\
    \ cannot be deleted, new properties cannot be added, and properties are read-only\n\
    \nThe `Object.preventExtensions(obj)` method lets you make the specified object\
    \ nonextensible. The `Object.seal(obj)` method seals the specified object. The\
    \ `Object.freeze(obj)` method freezes the specified object. Notice that once you\
    \ make an object nonextensible, sealed, or frozen, there is no way to reverse\
    \ these properties. You can use the `Object.isExtensible(obj)`, `Object.isSealed(obj)`,\
    \ and `Object.isFrozen(obj)` methods to check if the specified object is extensible,\
    \ sealed, and frozen, respectively. In strict mode, an error is thrown if you\
    \ try to make changes to the object that are not allowed; for example, adding\
    \ a new property to a nonextensible object throws an error.\n\n**Tip**\n\nPreventing\
    \ extensions, sealing, and freezing an object affects only that object, not its\
    \ prototype. It is still possible to make changes to its prototype and the object\
    \ will inherit those changes. If you want to freeze the object completely, you\
    \ will need to freeze all objects along the object’s prototype chain.\n\nListing\
    \ 4-17 shows how to prevent extensions of an object. It also shows that you can\
    \ add a property to the prototype of an otherwise nonextensible object and the\
    \ object will inherit that property. The code makes the `point` object nonextensible\
    \ and adding a property named `z` does not add the property to the object. However,\
    \ you are able to add the same property to `Object.prototype` and the `point`\
    \ object inherits it.\n\n**Listing 4-17. Preventing Extensions of Objects**\n\n\
    ```\n// preventextensions.js\n\nvar point = {x:1, y:1};\n\nprint(\"isExtensible()\
    \ = \" + Object.isExtensible(point));\n\n// Make point non-extensible\nObject.preventExtensions(point);\n\
    \nprint(\"isExtensible() = \" + Object.isExtensible(point));\n\n// Try adding\
    \ a new property to point\npoint.z = 1; // Will throw an error in strict mode\n\
    \n// Check if the property z was added to point\nprint(\"point has property z\
    \ = \" + (\"z\" in point));\n\n// point inherits from Object.prototype. Let us\
    \ add a property\n// named z in Object.prototype\nObject.prototype.z = 1;\n\n\
    // Check if the property z was added to point. Now point inherits\n// the proeprty\
    \ named z from Object.prototype.\nprint(\"point has property z = \" + (\"z\" in\
    \ point));\n\n// The following statement has no effect as the point object\n//\
    \ is still non-extensible.\npoint.z = 100;\n\nprint(\"z = \" + point.z); // Reads\
    \ the Object.prototype.z\n\nisExtensible() = true\nisExtensible() = false\npoint\
    \ has property z = false\npoint has property z = true\nz = 1\n```\n\n# Accessing\
    \ Missing Properties\n\nNashorn provides an extension to allow you to add a method\
    \ to an object that is called when a nonexistent property of an object is accessed.\
    \ You can also provide such a method for nonexistent methods. The property names\
    \ are `__noSuchProperty__` and `__noSuchMethod__`. Notice the two underscores\
    \ before and after the property names. Both properties are functions. If you are\
    \ working on a project and need this behavior everywhere, you should add these\
    \ hooks to the `Object.prototype`, so they are available in all objects by default.\
    \ Listing 4-18 shows how to add these properties to the `Object.prototype`. The\
    \ function for the `__noSuchProperty__` is passed the property name being accessed.\
    \ The function for the `__noSuchMethod__` is passed the method name and all arguments\
    \ used in the method call. You can access all arguments using the `arguments`\
    \ object inside the function.\n\n**Listing 4-18. Adding Missing Property and Method\
    \ Hooks**\n\n```\n// missingprops.js\n\nvar point = {x:10, y:20};\n\n// Add no\
    \ such property and no such method hooks\nObject.prototype.__noSuchProperty__\
    \ = function (prop) {\n    throw Error(\"No such property: \" + prop);\n};\n\n\
    Object.prototype.__noSuchMethod__ = function () {\n    var desc = arguments[0]\
    \ + \"(\";\n    if (arguments.length > 1) {\n        desc += arguments[1];\n \
    \   }\n    for (var i = 2; i < arguments.length; i++) {\n        desc += \", \"\
    \ + arguments[i];\n    }\n    desc += \")\";\n    throw Error(\"No matching method\
    \ found: \" + desc);\n};\n\n// Try accessing point.z. Will throw an Error.\ntry\
    \ {\n    var z = point.z;\n}\ncatch(e) {\n    print(e.message);\n}\n\n// try calling\
    \ a ono-existent method named dustance\ntry {\n    point.distance(10, 20);\n}\n\
    catch(e) {\n    print(e.message);\n}\n\nNo such property: z\nNo matching method\
    \ found: distance(10, 20)\n```"
  raw: '## Locking Objects


    `Object` provides several methods that let you lock down objects. These methods
    give you finer control as to what parts or features of the object are locked down:


    *   You can prevent extensions of the object (or make it nonextensible) so new
    properties cannot be added to it

    *   You can seal the object so that the existing properties cannot be deleted
    and new properties cannot be added

    *   You can freeze the object so that the existing properties cannot be deleted,
    new properties cannot be added, and properties are read-only


    The `Object.preventExtensions(obj)` method lets you make the specified object
    nonextensible. The `Object.seal(obj)` method seals the specified object. The `Object.freeze(obj)`
    method freezes the specified object. Notice that once you make an object nonextensible,
    sealed, or frozen, there is no way to reverse these properties. You can use the
    `Object.isExtensible(obj)`, `Object.isSealed(obj)`, and `Object.isFrozen(obj)`
    methods to check if the specified object is extensible, sealed, and frozen, respectively.
    In strict mode, an error is thrown if you try to make changes to the object that
    are not allowed; for example, adding a new property to a nonextensible object
    throws an error.


    Tip


    Preventing extensions, sealing, and freezing an object affects only that object,
    not its prototype. It is still possible to make changes to its prototype and the
    object will inherit those changes. If you want to freeze the object completely,
    you will need to freeze all objects along the object’s prototype chain.


    Listing 4-17 shows how to prevent extensions of an object. It also shows that
    you can add a property to the prototype of an otherwise nonextensible object and
    the object will inherit that property. The code makes the `point` object nonextensible
    and adding a property named `z` does not add the property to the object. However,
    you are able to add the same property to `Object.prototype` and the `point` object
    inherits it.


    Listing 4-17\. Preventing Extensions of Objects


    `// preventextensions.js`


    `var point = {x:1, y:1};`


    `print("isExtensible() = " + Object.isExtensible(point));`


    `// Make point non-extensible`


    `Object.preventExtensions(point);`


    `print("isExtensible() = " + Object.isExtensible(point));`


    `// Try adding a new property to point`


    `point.z = 1; // Will throw an error in strict mode`


    `// Check if the property z was added to point`


    `print("point has property z = " + ("z" in point));`


    `// point inherits from Object.prototype. Let us add a property`


    `// named z in Object.prototype`


    `Object.prototype.z = 1;`


    `// Check if the property z was added to point. Now point inherits`


    `// the proeprty named z from Object.prototype.`


    `print("point has property z = " + ("z" in point));`


    `// The following statement has no effect as the point object`


    `// is still non-extensible.`


    `point.z = 100;`


    `print("z = " + point.z); // Reads the Object.prototype.z`


    `isExtensible() = true`


    `isExtensible() = false`


    `point has property z = false`


    `point has property z = true`


    `z = 1`


    ## Accessing Missing Properties


    Nashorn provides an extension to allow you to add a method to an object that is
    called when a nonexistent property of an object is accessed. You can also provide
    such a method for nonexistent methods. The property names are `__noSuchProperty__`
    and `__noSuchMethod__`. Notice the two underscores before and after the property
    names. Both properties are functions. If you are working on a project and need
    this behavior everywhere, you should add these hooks to the `Object.prototype`,
    so they are available in all objects by default. Listing 4-18 shows how to add
    these properties to the `Object.prototype`. The function for the `__noSuchProperty__`
    is passed the property name being accessed. The function for the `__noSuchMethod__`
    is passed the method name and all arguments used in the method call. You can access
    all arguments using the `arguments` object inside the function.


    Listing 4-18\. Adding Missing Property and Method Hooks


    `// missingprops.js`


    `var point = {x:10, y:20};`


    `// Add no such property and no such method hooks`


    `Object.prototype.__noSuchProperty__ = function (prop) {`


    `throw Error("No such property: " + prop);`


    `};`


    `Object.prototype.__noSuchMethod__ = function () {`


    `var desc = arguments[0] + "(";`


    `if (arguments.length > 1) {`


    `desc += arguments[1];`


    `}`


    `for (var i = 2; i < arguments.length; i++) {`


    `desc += ", " + arguments[i];`


    `}`


    `desc += ")";`


    `throw Error("No matching method found: " + desc);`


    `};`


    `// Try accessing point.z. Will throw an Error.`


    `try {`


    `var z = point.z;`


    `}`


    `catch(e) {`


    `print(e.message);`


    `}`


    `// try calling a ono-existent method named dustance`


    `try {`


    `point.distance(10, 20);`


    `}`


    `catch(e) {`


    `print(e.message);`


    `}`


    `No such property: z`


    `No matching method found: distance(10, 20)`'
