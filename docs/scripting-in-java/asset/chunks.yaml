  raw: '### Using a JavaScript Function


    Sometimes a Java interface has only one method. In those cases, you can pass a
    JavaScript function object in place of an implementation of the interface. The
    `Runnable` interface in Java has only one method `run()`. When you need to use
    an instance of the `Runnable` interface in JavaScript, you can pass a JavaScript
    function object. The following snippet of code shows how to create a `Thread`
    object and start it. In the constructor of the `Thread` class, a JavaScript function
    object `myRunFunc` is passed instead of an instance of the `Runnable` interface:


    `function myRunFunc() {`


    `print("A thread is running.");`


    `}`


    `// Call Thread(Runnable) constructor and pass the myRunFunc function`


    `// object that will serve as an implementation for the run() method of`


    `// the Runnable interface.`


    `var thread = new java.lang.Thread(myRunFunc);`


    `thread.start();`


    `A thread is running.`


    ### Accessing Methods of a Superclass


    In Java, when you can access the methods of a superclass using the keyword `super`.
    When you extend a class in JavaScript, you can also access the methods of the
    superclass using the `Java.super()` method. The method takes the JavaScript object
    that has been extended in JavaScript and it returns a reference that can be used
    to call the method of the superclass. Consider the code for a `Person` class as
    shown in Listing 6-4.


    Listing 6-4\. A Person Class


    `// Person.java`


    `package com.jdojo.script;`


    `public class Person {`


    `private String firstName;`


    `private String lastName;`


    `public Person(String firstName, String lastName){`


    `this.firstName = firstName;`


    `this.lastName = lastName;`


    `}`


    `public String getFirstName() {`


    `return firstName;`


    `}`


    `public void setFirstName(String firstName) {`


    `this.firstName = firstName;`


    `}`


    `public String getLastName() {`


    `return lastName;`


    `}`


    `public void setLastName(String lastName) {`


    `this.lastName = lastName;`


    `}`


    `public String getFullName() {`


    `return firstName + " " + lastName;`


    `}`


    `}`


    Consider the code in Listing 6-5\. It extends the `Person` class and override
    the `getFullName()` method.


    Listing 6-5\. Using the Java.super() Method to Access Superclass Methods


    `// supermethod.js`


    `var Person = Java.type("com.jdojo.script.Person");`


    `var PersonExtender = Java.extend(Person);`


    `// Extend the Person class and override the getFullName() method`


    `var john = new PersonExtender("John", "Jacobs") {`


    `getFullName: function () {`


    `// You can use the variable john here that is declared outside.`


    `var _super_ = Java.super(john);`


    `var fullName = _super_.getFullName();`


    `return fullName.toUpperCase();`


    `}`


    `}`


    `// Get john''s full name using the extended class implementation`


    `var johnFullName = john.getFullName() ;`


    `// Get the reference of john''s super`


    `var johnSuper = Java.super(john);`


    `// Get john''s full name from the Person class`


    `var johnSuperFullName = johnSuper.getFullName();`


    `// Print Names`


    `print("Extended full name:", johnFullName);`


    `print("Super full name:", johnSuperFullName);`


    `Extended full name: JOHN JACOBS`


    `Super full name: John Jacobs`


    Notice that the `getFullName()` method of the extended `Person` class refers to
    the variable named `john` that has been declared outside the function. The following
    statement assigns the reference of an object that can be used to call the methods
    of the superclass of the `john` object.


    `var _super_ = Java.super(john);`


    The overridden method calls the `Person` class’ `getFullName()` method, converts
    the name to uppercase, and returns it. The code get the superclass reference again,
    as shown:


    `// Get the reference of john''s super`


    `var johnSuper = Java.super(john);`


    Finally, the code prints the returned value from the `Person` class and the extended
    `Person` class to show that you were really able to call the superclass method.


    Tip


    Instead of using `Java.super(obj)` method to get the superclass object reference
    of `obj` and call methods on it, you can also use `obj.super$MethodName(args)`
    syntax to call the method of the superclass of the object named `obj`. For example,
    in the example, you could have used `john.super$getFullName()` to call the `getFullName()`
    method of the `Person` class on the object `john`.


    ## Using Lambda Expressions


    JavaScript supports anonymous functions that can be used as lambda expressions.
    The following is an anonymous function that takes a number as an argument and
    returns its square:


    `function (n) {`


    `return n * n;`


    `}`


    The following is an example of creating a `Runnable` object in JavaScript using
    an anonymous function as a lambda expression. The `Runnable` object is used in
    the constructor of the `Thread` class.


    `var Thread = Java.type("java.lang.Thread");`


    `// Create a Thread using a Runnable object. The Runnable object is`


    `// created using an anonymous function as a lambda expressions.`


    `var thread = new Thread(function () {`


    `print("Hello Thread");`


    `});`


    `// Start the thread`


    `thread.start();`


    The Java equivalent of the JavaScript code using a lambda expression is as follows:


    `// Create a Thread using a Runnable object. The Runnable object is`


    `// created using a lambda expression.`


    `Thread thread = new Thread(() -> {`


    `System.out.println("Hello Thread");`


    `});`


    `// Start the thread`


    `thread.start();`


    ## Summary


    You will need to import Java types into scripts before you can use create objects
    of that Java in scripts. There are four ways to import a type in a script: using
    the `Packages` global object, using the `Java.type()` method, using the `importPackage()`
    and `importClass()` functions, and using `JavaImporter` in a `with` clause. Nashorn
    declares `java`, `javax`, `org`, `com`, `edu`, and `net` as global variables that
    are aliases for `Packages.java`, `Packages.javax`, `Packages.org`, `Packages.com`,
    `Packages.edu`, and `Packages.net`, respectively. Therefore, you can use the fully
    qualified names of any types in these packages to refer to the type.


    You need to use the `new` operator along with the Java type to create Java objects
    in scripts. Using the `Java.type()` method lets you import the Java types including
    array type in uniform way. You can create an array object the same way you can
    create an object of any other type.


    Most of the time, calling overloaded Java methods are resolved by Nashorn. If
    you want to call a specific version of an overloaded method from script, you can
    use the bracket notation to specify the specific method signature. For example,
    `pt["print(java.lang.Object)"](10.5) calls the print(java.lang.Object)` method
    on the object reference named `pt` passing 10.5 as the argument to the method.


    Nashorn lets you extends interfaces, abstract classes, and concrete classes in
    scripts using the `Java.extend()` method. It lets you invoke the superclass methods
    on an object using the `Java.super()` method.


    # 7. Collections


    In this chapter, you will learn:


    *   What arrays in Nashorn are

    *   How to create arrays in Nashorn using array literals and the `Array` object

    *   How to use different methods of the `Array` object

    *   How to work with array-like objects

    *   How to create and use typed arrays in Nashorn

    *   How to use Java collections in Nashorn

    *   How to create Java arrays in Nashorn

    *   How to convert Java arrays to Nashorn arrays and vice versa'
