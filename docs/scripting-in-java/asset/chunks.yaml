    ## 使用编译脚本


    脚本引擎可能允许编译脚本并重复执行。执行编译后的脚本可以提高应用程序的性能。脚本引擎可以以 Java 类、Java 类文件或特定于语言的形式编译和存储脚本。


    并非所有脚本引擎都需要支持脚本编译。支持脚本编译的脚本引擎必须实现 `Compilable` 接口。Nashorn 引擎支持脚本编译。以下代码片段检查脚本引擎是否实现了
    `Compilable` 接口：


    `// 获取脚本引擎引用`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("YOUR_ENGINE_NAME");`


    `if (engine instanceof Compilable) {`


    `System.out.println("支持脚本编译。");`


    `}`


    `else {`


    `System.out.println("不支持脚本编译。");`


    `}`


    一旦知道脚本引擎实现了 `Compilable` 接口，就可以将其引用转换为 `Compilable` 类型，如下所示：


    `// 将引擎引用转换为 Compilable 类型`


    `Compilable comp = (Compilable)engine;`


    `Compilable` 接口包含两个方法：


    *   `CompiledScript compile(String script) throws ScriptException`

    *   `CompiledScript compile(Reader script) throws ScriptException`


    这两个版本的方法仅在脚本来源的类型上有所不同。第一个版本接受一个 `String` 类型的脚本，第二个版本接受一个 `Reader` 类型的脚本。


    `compile()` 方法返回一个 `CompiledScript` 类的对象。`CompiledScript` 是一个抽象类。脚本引擎的提供者提供了该类的具体实现。`CompiledScript`
    与创建它的 `ScriptEngine` 相关联。`CompiledScript` 类的 `getEngine()` 方法返回与之关联的 `ScriptEngine`
    的引用。


    要执行编译后的脚本，需要调用 `CompiledScript` 类中的以下 `eval()` 方法之一：


    *   `Object eval() throws ScriptException`

    *   `Object eval(Bindings bindings) throws ScriptException`

    *   `Object eval(ScriptContext context) throws ScriptException`


    不带任何参数的 `eval()` 方法使用脚本引擎的默认脚本上下文来执行编译后的脚本。其他两个版本的工作方式与 `ScriptEngine` 接口的 `eval()`
    方法在向其传递 `Bindings` 或 `ScriptContext` 时相同。


    提示


    当使用 `CompiledScript` 类的 `eval()` 方法评估脚本时，在编译脚本执行期间对引擎状态所做的更改可能会在引擎后续执行脚本时可见。


    清单 5-8 展示了如何编译脚本并执行它。它使用不同的参数两次执行相同的编译脚本。


    清单 5-8. 使用编译脚本


    `// CompilableTest .java`


    `package com.jdojo.script;`


    `import javax.script.Bindings;`


    `import javax.script.Compilable;`


    `import javax.script.CompiledScript;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class CompilableTest {`


    `public static void main(String[] args) {`


    `// 获取 Nashorn 引擎`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `if (!(engine instanceof Compilable)) {`


    `System.out.println("不支持脚本编译。");`


    `return;`


    `}`


    `// 将引擎引用转换为 Compilable 类型`


    `Compilable comp = (Compilable)engine;`


    `try {`


    `// 编译一个脚本`


    `String script = "print(n1 + n2)";`


    `CompiledScript cScript = comp.compile(script);`


    `// 将 n1 和 n2 脚本变量存储在 Bindings 中`


    `Bindings scriptParams = engine.createBindings();`


    `scriptParams.put("n1", 2);`


    `scriptParams.put("n2", 3);`


    `cScript.eval(scriptParams);`


    `// 使用不同的 n1 和 n2 值再次执行脚本`


    `scriptParams.put("n1", 9);`


    `scriptParams.put("n2", 7);`


    `cScript.eval(scriptParams);`


    `}`


    `catch (ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `5`


    `16`


    ## 总结


    Java 脚本 API 支持直接从 Java 调用以脚本语言编写的过程、函数和方法。这通过 `Invocable` 接口实现。如果脚本引擎支持过程调用，则它实现
    `Invocable` 接口。Nashorn 引擎支持过程调用。被调用的过程可以实现为顶层函数或对象的方法。`Invocable` 接口的 `invokeFunction()`
    方法用于调用脚本中的顶层函数。`Invocable` 接口的 `invokeMethod()` 方法用于调用对象的方法。在调用它们之前，必须由引擎评估顶层函数和其方法被调用的对象。


    Java 脚本 API 还允许您在脚本语言中实现 Java 接口。Java 接口的方法可以实现为顶层函数或对象的方法。`Invocable` 接口的 `getInterface()`
    方法用于获取 Java 接口的实现。


    Java 脚本 API 还允许您一次编译脚本，将其存储在脚本引擎中，并多次执行该脚本。这通过 `Compilable` 接口支持。支持脚本编译的脚本引擎需要实现
    `Compilable` 接口。您需要调用 `Compilable` 接口的 `compile()` 方法来编译脚本。`compile()` 方法返回一个
    `CompiledScript` 实例，调用其 `eval()` 方法来执行脚本。


    请注意，脚本引擎实现 `Invocable` 和 `Compilable` 接口是可选的。在调用过程和编译脚本之前，您需要检查脚本引擎是否是这些接口的实例，将引擎转换为这些类型，然后执行这些接口的方法。


    # 6. 在脚本语言中使用 Java


    在本章中，您将学习：


    *   如何将 Java 类导入脚本

    *   如何创建 Java 对象并在脚本中使用它们

    *   如何调用 Java 对象的重载方法

    *   如何创建 Java 数组

    *   如何在脚本中扩展 Java 类并实现 Java 接口

    *   如何从脚本调用对象的超类方法


    脚本语言允许在脚本中使用 Java 类库。每种脚本语言都有自己使用 Java 类的语法。讨论所有脚本语言的语法是不可能的，也超出了本书的范围。在本章中，我将讨论在
    Nashorn 中使用 Java 构造的语法。


    ## 导入 Java 类型


    有四种方法可以将 Java 类型导入 Nashorn 脚本：


    *   使用 `Packages` 全局对象

    *   使用 `Java` 全局对象的 `type()` 方法

    *   使用 `importPackage()` 和 `importClass()` 函数

    *   在 `with` 子句中使用 `JavaImporter`


    在这四种导入 Java 类型的方法中，第二种方法，即使用全局 Java 对象的 `type()` 方法，是首选方法。以下各节将详细描述在脚本中导入 Java
    类型的四种方法。

