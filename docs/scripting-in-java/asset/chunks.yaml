    Listing 1-4 shows how to print a message on the standard output using JavaScript,
    Groovy, Jython, and JRuby. If a script engine is not available, the program prints
    a message to that effect.


    Listing 1-4\. Printing a Message on the Standard Output Using Different Scripting
    Languages


    `// HelloEngines.java`


    `package com.jdojo.script;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class HelloEngines {`


    `public static void main(String[] args) {`


    `// Get the script engine manager`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `// Try executing scripts in Nashorn, Groovy, Jython, and JRuby`


    `execute(manager, "JavaScript", "print(''Hello JavaScript'')");`


    `execute(manager, "Groovy", "println(''Hello Groovy'')");`


    `execute(manager, "jython", "print ''Hello Jython''");`


    `execute(manager, "jruby", "puts(''Hello JRuby'')");`


    `}`


    `public static void execute(ScriptEngineManager manager,`


    `String engineName,`


    `String script) {`


    `// Try getting the engine`


    `ScriptEngine engine = manager.getEngineByName(engineName);`


    `if (engine == null) {`


    `System.out.println(engineName + " is not available.");`


    `return;`


    `}`


    `// If we get here, it means we have the engine installed.                 //
    So, run the script`


    `try {`


    `engine.eval(script);`


    `}`


    `catch (ScriptException e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `Hello JavaScript`


    `Hello Groovy`


    `Hello Jython`


    `Hello JRuby`


    Sometimes you may want to play with a scripting language just for fun, and you
    do not know the syntax that is used to print a message on the standard output.
    The `ScriptEngineFactory` class contains a method named `getOutputStatement(String
    toDisplay)` that you can use to find the syntax for printing text on the standard
    output. The following snippet of code shows how to get the syntax for Nashorn:


    `// Get the script engine factory for Nashorn`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `ScriptEngineFactory factory = engine.getFactory();`


    `// Get the script`


    `String script = factory.getOutputStatement("\"Hello JavaScript\"");`


    `System.out.println("Syntax: " + script);`


    `// Evaluate the script`


    `engine.eval(script);`


    `Syntax: print("Hello JavaScript")`


    `Hello JavaScript`


    For other scripting languages, use their engine factories to get the syntax.


    ## Exploring the javax.script Package


    The Java Scripting API in Java consists of a small number of classes and interfaces.
    They are in the `javax.script` package. This chapter contains a brief description
    of classes and interfaces in this package. I will discuss their usage in subsequent
    chapters. Figure [1-1](#A978-1-4842-0713-0_1_Chapter.html#Fig1) shows the class
    diagram for the classes and interfaces in the Java Scripting API.


