    \ = 150.00\ncalc.divide(15.00, 10.00) = 1.50\n```\n\nHow did the Nashorn engine\
    \ find the implementation for the `Calculator` interface? When you call the `getInterface(Class<T>\
    \ cls)` of `Invocable`, the engine looks for compiled functions with the matching\
    \ names as the abstract methods in the specified class. In our case, the engine\
    \ looks for compiled functions named `add`, `subtract`, `multiply`, and `divide`\
    \ in the engine. Note that it is necessary to call the `eval()` method of the\
    \ engine to compile the functions in the `calculatorasfunctions.js` file. The\
    \ Nashorn engine does not match the number of formal parameters in the Java interface\
    \ methods and script functions in the engine.\n\nThe second version of the `getInterface()`\
    \ method is used to obtain an instance of a Java interface whose methods are implemented\
    \ as instance methods of an object. Its first argument is the reference of the\
    \ object that is created in the scripting language. The instance methods of the\
    \ object implement the interface type passed in as the second argument. The code\
    \ in Listing 5-2 creates an object named `calculator` whose instance methods implement\
    \ the `Calculator` interface. You will the methods of the `calculator` object\
    \ as an implementation of the `Calculator` interface in Java.\n\nWhen instance\
    \ methods of a script object implements methods of a Java interface, you need\
    \ to perform an extra step. You need to get the reference of the script object\
    \ before you can get the instance of the interface, as shown:\n\n```java\n// Load\
