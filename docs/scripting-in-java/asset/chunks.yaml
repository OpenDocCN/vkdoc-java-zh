    \ the `isFinite(value)` function returns `false`; otherwise it returns `true`.\
    \ The following code shows how to use the `isFinite()` function:\n\n```\nprintf(\"\
    isFinite(%s) = %b\", NaN, isFinite(NaN));\nprintf(\"isFinite(%s) = %b\", Infinity,\
