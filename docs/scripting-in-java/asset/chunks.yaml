  trans: '

    清单 5-1 展示了如何调用函数。它调用了一个用 Nashorn JavaScript 编写的函数，并加载了名为`factorial.js`和`avg.js`的文件中的脚本。这些文件包含了名为`factorial()`和`avg()`函数的
    Nashorn 代码。随后，程序通过`Invocable`接口的`invokeFunction()`方法调用了这些函数。


    清单 5-1\. 调用用 Nashorn JavaScript 编写的函数


    `// InvokeFunction.java`


    `package com.jdojo.script;`


    `import javax.script.Invocable;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class InvokeFunction {`


    `public static void main(String[] args) {`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// 确保脚本引擎实现了 Invocable 接口`


    `if (!(engine instanceof Invocable)) {`


    `System.out.println("不支持调用过程。");`


    `return;`


    `}`


    `// 将引擎引用转换为 Invocable 类型`


    `Invocable inv = (Invocable) engine;`


    `try {`


    `String scriptPath1 = "factorial.js";`


    `String scriptPath2 = "avg.js";`


    `// 首先执行脚本，以便编译 factorial()和 avg()函数`


    `// 并使其可供调用`


