- fmt: "# Variable Scoping and Hoisting\n\nJava supports block-level scoping. A variable\
    \ declared in a block is local to that block and it is not accessible before and\
    \ after the block. Nashorn (and all JavaScript implementations) support two scopes:\n\
    \n- Global Scope\n- Function Scope\n\nVariable and function declarations in the\
    \ global code are available everywhere in the global scope. Similarly, variable\
    \ and function declarations in a function are available everywhere inside the\
    \ function.\n\nConsider the code and its output in Listing 4-21. The output will\
    \ surprise you if you have not worked with JavaScript before.\n\n**Listing 4-21.**\
    \ Declaration Hoisting in Nashorn\n\n```\n// beforehoisting.js\n\n// Try accessing\
    \ empId variable before declaring it\nprint(\"1. empId = \" + empId);\n\n// Declare\
    \ and initialize empId now\nvar empId = 100;\n\nfunction test() {\n    if (empId\
    \ === undefined) {\n        var empId = 200;\n    }\n    print(\"2. empId = \"\
    \ + empId);\n}\n\n// Call the test function\ntest();\n\nprint(\"3. empId = \"\
    \ + empId);\n\n1. empId = undefined\n2. empId = 200\n3. empId = 100\n```\n\nThe\
    \ first output shows that you can access a variable before declaring it. The variable\
    \ value is `undefined`. Inside the `test()` function, you would expect that expression\
    \ `empId === undefined` will read the value of `empId` from the global scope and\
    \ it will evaluate to `false`. However, the output shows otherwise. The second\
    \ output shows that the `if` condition inside the `test()` function evaluated\
    \ to `true` and the `empId` local variable was set to 200. The third output shows\
    \ that the function call did not affect the global variable `empId` and its value\
    \ remained 100.\n\nYou can understand this variable's scoping behavior in two\
    \ ways:\n\n- As a two-phase process: First, all declarations are processed. Second,\
    \ the code is executed. Because all declarations are processed before executing\
    \ the code, all variable and function declarations are available when the code\
    \ is executed, irrespective of the place where they were declared. Of course,\
    \ you need to take into account the global and function scopes of those declarations.\n\
    - As declaration hoisting: This simply means that all variable and function declarations\
    \ are moved to the top in their respective scope. This is the same as saying that\
    \ you have declared all variables and functions at the top in the global and function\
    \ scopes.\n\nListing 4-22 shows the same code as in Listing 4-21 but after the\
    \ declarations are hoisted. This time, you will not have any problem in understanding\
    \ the output.\n\n**Listing 4-22.** Reorganized Code after Declaration Hoisting\n\
    \n```\n// afterhoisting.js\n\nvar empId; // Hoisted\n\nfunction test() {\n   \
    \ var empId; // Hoisted\n    if (empId === undefined) {\n        empId = 200;\
    \ // Left after hoisting\n    }\n    print(\"2. empId = \" + empId);\n}\n\n//\
    \ Try accessing empId variable before declaring it\nprint(\"1. empId = \" + empId);\n\
    \n// Declare and initialize empId now\nempId = 100; // Left after hoisting\n\n\
    // Call the test function\ntest();\n\nprint(\"3. empId = \" + empId);\n\n1. empId\
    \ = undefined\n2. empId = 200\n3. empId = 100\n```\n\nNotice that hoisting occurs\
    \ for function declarations, not for function expressions, which enables you to\
    \ call functions before they are declared. One more thing to remember: only variable\
    \ declarations are hoisted, not the assignment part in the variable declarations,\
    \ as shown in Listing 4-22.\n\n# Using Strict Mode\n\nYou can use the strict mode\
    \ in Nashorn script by using the `\"use strict\"` directive. It is used in the\
