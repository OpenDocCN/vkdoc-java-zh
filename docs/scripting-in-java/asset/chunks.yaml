  raw: '#### Defining Accessor Properties


    An accessor property is also called getter and setter methods. You can think of
    an accessor property as a set of `getXxx()` and `setXxx()` methods in a Java class.
    When the `xxx` property is read, the getter method with the `xxx` name is called;
    when the `xxx` property is set, the setter method with the `xxx` name is called.
    The getter method declares no formal parameters. The setter method declares one
    formal parameter. A property can have only a getter method, only a setter method,
    or both. The following is the syntax for defining the accessor property:


    `{ prop1: value1, /* A data property */`


    `prop2: value2, /* A data property */`


    `/* The getter for the property propName */`


    `get propName() {`


    `// Getter method''s body goes here`


    `},`


    `/* The setter for the property propName */`


    `set propName(propValue) {`


    `// Setter method''s body goes here`


    `}`


    `}`


    Defining an accessor property is the same as declaring functions with the keyword
    `function` replaced with the keywords `get` and `set`. The keywords `get` and
    `set` are used to define the getter and setter methods, respectively. Notice that
    you do not use a colon to define the accessor property, but you still need to
    use a comma to separate two properties of the object. The following code defines
    an object with two data properties named `fName` and `lName`, and an accessor
    property named `fullName`:


    `// A person object with fName and lName as data proeprties`


    `// and fullName as an accessor property`


    `var john = {fName: "John",`


    `lName: "Jacobs",`


    `get fullName() {`


    `return this.fName + " " + this.lName;`


    `},`


    `set fullName(name) {`


    `names = name.split(" ");`


    `if(names.length === 2) {`


    `this.fName = names[0];`


    `this.lName = names[1];`


    `}`


    `else {`


    `throw new Error("Full name must be in the form ''fName lName''.");`


    `}`


    `}`


    `};`


    `// Get the full name using the fullName accessor property and print it`


    `print("Full name is " + john.fullName);`


    `// Set a new full name`


    `john.fullName = "Ken McEwen";`


    `// Get the new full name and print it`


    `print("New full name is " + john.fullName);`


    `Full name is John Jacobs`


    `New full name is Ken McEwen`


    Notice that you set the first and the last names of the person by setting the
    `fullName` property. When you set the value of the `fullName` property, the value
    is passed to the setter method of the property that sets the first and last names,
    provided the value follows the `"fName lName"` format.


    #### Setting Property Attributes


    You can set attributes for data and accessor properties of an object. Table [4-10](#A978-1-4842-0713-0_4_Chapter.html#Tab10)
    lists the attributes of properties. Note that not all attributes are applicable
    to all types of properties.


    Table 4-10.


    The List of Property Attributes and Their Descriptions


    | Attribute | Type | Applicable To | Description |

    | --- | --- | --- | --- |

    | `value` | Any type | Data Property Only | The value of the property |

    | `writable` | Boolean | Data Property Only | Specifies whether the value of the
    property can be changed. If `false`, the property is read-only. Otherwise, the
    property is read-write. The default is `true` |

    | `get` | function | Accessor Property Only | The getter method for the property
    or `undefined`. The default is `undefined` |

    | `set` | function | Accessor Property Only | The setter method of the property
    of `undefined`. The default is `undefined` |

    | `enumerable` | Boolean | Both | If set to `false`, the property of the object
    cannot be enumerated using the `for..in` and `for..each..in` loops. The default
    is `true` |

    | `configurable` | Boolean | Both | It set to `false`, the property cannot be
    deleted and attributes for the property cannot be changed. The default is `true`
    |


    You can read and set the property attributes using an object called the property
    descriptor. The following statement create a property descriptor that has the
    `value` property to 10 and `writable` property to `false`:


    `var descriptor = {value:10, writable:false};`


    Creating a property descriptor does not do anything. It just creates an object.
    You need to use one of the following three methods of `Object` to define a new
    property with attributes, to change the attributes of an already defined property,
    and to read the property descriptor of an existing property:


    *   `Object.defineProperty(object, "propertyName", propertyDescriptor)`

    *   `Object.defineProperty(object, "propertyName", attributeObject)`

    *   `Object.getOwnPropertyDescriptor(object, "propertyName")`


    The `defineProperty()` function lets you define a new property with attributes
    or change attributes of an existing property. Using the `defineProperties()` function,
    you can do the same but with multiple properties. The `getOwnPropertyDescriptor()`
    function returns the descriptor for the specified property of the object. All
    three functions work with the own properties of an object.


    The following code defines an `origin2D` object to define the origin in a 2D coordinate
    system and makes both `x` and `y` properties nonwritable:


    `// Define an object`


    `var origin2D = {x:0, y:0};`


    `// Read the property descriptors for x and y`


    `var xDesc = Object.getOwnPropertyDescriptor(origin2D, "x");`


    `var yDesc = Object.getOwnPropertyDescriptor(origin2D, "y");`


    `printf("x.value = %d, x.writable = %b", xDesc.value, xDesc.writable);`


    `printf("y.value = %d, y.writable = %b", yDesc.value, yDesc.writable);`


    `// Make x and y non-writable`


    `Object.defineProperty(origin2D, "x", {writable:false});`


    `Object.defineProperty(origin2D, "y", {writable:false});`


    `print("After setting x and y non-writable... ")`


    `// Read the property descriptors for x and y again`


    `var xDesc = Object.getOwnPropertyDescriptor(origin2D, "x");`


    `var yDesc = Object.getOwnPropertyDescriptor(origin2D, "y");`


    `printf("x.value = %d, x.writable = %b", xDesc.value, xDesc.writable);`


    `printf("y.value = %d, y.writable = %b", yDesc.value, yDesc.writable);`


    `x.value = 0, x.writable = true`


    `y.value = 0, y.writable = true`


    `After setting x and y non-writable...`


    `x.value = 0, x.writable = false`


    `y.value = 0, y.writable = false`


    The following code shows you how to add a new property using the `Object.defineProperty()`
    function:


    `// Define an object with no properties`


    `var origin2D = {};`


    `// Add two non-writable x and y properties to origina2D with their value set
    to 0.`


    `Object.defineProperty(origin2D, "x", {value:0, writable:false});`


    `Object.defineProperty(origin2D, "y", {value:0, writable:false});`'
