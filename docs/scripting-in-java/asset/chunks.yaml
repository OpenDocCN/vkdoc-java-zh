    ## 总结


    你可以使用 Java 脚本 API 实现一个脚本引擎。你需要为 `ScriptEngine` 和 `ScriptEngineFactory` 接口提供实现。你需要以特定方式打包你的脚本引擎代码，以便
    `ScriptManager` 在运行时能够发现该引擎。引擎的 JAR 文件应包含一个名为 `META-INF\services\javax.script.ScriptEngineFactory`
