    method on the `Point` constructor

    *   Invokes the `callMember()` method on `p1` to invoke its `distance()` method
    to compute the distance between `p1` and `p2`

    *   Invokes the `callMember()` method on `p1` and `p2` to get their string representation
    by calling their `toString()` method declared in the `Point` constructor

    *   Finally, prints the distance between the two points


    Listing 12-7\. Creating Nashorn Objects in Java Code


