    \ | Reads one line of input from standard input. The specified argument is displayed\
    \ as a prompt. By default, the read input is displayed on the standard output.\
    \ The function returns the read input. |\n| `readFully(filePath)` | Reads the\
    \ entire contents of the specified file. The contents are displayed on the standard\
    \ output by default. You can assign the returned value of the function to a variable.\
    \ |\n\nThe following script shows how to use the `$ARG` global object:\n\n```\n\
