    \ following syntax:\n\n`objectExpression.property`\n\nThe `objectExpression` is\
    \ an expression that evaluates to the reference to the object and the `property`\
    \ is the property name.\n\nThe bracket notation uses an array-like syntax:\n\n\
    `objectExpression[propertyExpression]`\n\nThe `objectExpression` is an expression\
    \ that evaluates to the reference to the object. It is followed with an opening\
    \ bracket and a closing bracket. The `propertyExpression` is an expression that\
    \ is convertible to a string and that is the property name being accessed.\n\n\
    > **Tip**  \n> If the property name contains whitespaces or stored in a variable,\
    \ you must use the bracket notation, not the dot notation, to access the property.\n\
    \nConsider the following object from the previous section:\n\n```\n// An object\
    \ with whitespaces in the property names\nvar redColor = {\"red value\": 1.0,\n\
    \                green: 0.0,\n                \"black Value\": 0.0,\n        \
    \        alpha: 1.0};\n```\n\nThe following statement reads the value of the `alpha`\
    \ property of the object into a variable named `alphaValue`:\n\n```\n// Assigns\
    \ 1.0 to alphaValue\nvar alphaValue = redColor.alpha;\n```\n\nIf the property\
    \ accessor expression appears on the right side of the assignment operator, you\
    \ are setting a new value for the property. The following statement sets the `alpha`\
    \ property of the `redColor` object to 0.5:\n\n```\n// Make the color semi-transparent\n\
    redColor.alpha = 0.5;\n```\n\nThe following snippet of code performs the same\
    \ actions using the bracket notation:\n\n```\n// Assigns 1.0 to alphaValue\nvar\
    \ alphaValue = redColor[\"alpha\"];\n\n// Make the color semi-transparent\nredColor[\"\
    alpha\"] = 0.5;\n```\n\nThe `\"red value\"` and `\"black value\"` properties contain\
    \ a space, so you can use only the bracket notation to access them:\n\n```\n//\
    \ Assigns 1.0 to redValue\nvar redValue = redColor[\"red value\"];\n\n// Assigns\
    \ 0.8 to the \"red value\" property\nredColor[\"red value\"] = 0.8\n```\n\nWhen\
    \ you use the bracket notation, you can use any expression that can be converted\
    \ to the property name as a string. The following snippet of code assigns the\
    \ value 0.8 to the `\"red Value\"` property in two ways:\n\n```\nvar prop = \"\
    red value\";\nredColor[prop] = 0.8;                   // Using a variable\nredColor[\"\
    red\" + \" \" + \"value\"] = 0.8;  // Using an expression\n```\n\nConsider the\
    \ following code that defines a `point2D` object with two properties named `x`\
    \ and `y`, and attempts to read a nonexisting property named `z`:\n\n```\n// Define\
    \ a point2D object\nvar point2D = {x:10, y:-20};\n\n// Try accessing x, y, and\
    \ z properties\nvar x = point2D.x;\nvar y = point2D.y;\nvar z = point2D.z;\n\n\
    print(\"x = \" + x + \", y =\" + y + \", z = \" + z);\n```\n\n`x = 10, y =-20,\
    \ z = undefined`\n\nAre you surprised by the output? Accessing a nonexisting property\
    \ of an object in Nashorn does not generate an error. If you read a nonexisting\
    \ property, `undefined` is returned; if you set a nonexisting property, a new\
    \ property with the same name is created with the new value. The following code\
    \ shows this behavior:\n\n```\n// Create an object with one property x\nvar point3D\
    \ = {x:10};\n\n// Create a new property named y and assign -20 to it\npoint3D.y\
    \ = -20;\n\n// Create a new property named z and assign 35 to it\npoint3D.z =\
    \ 35;\n\n// Print all properties of point3D\nprint(\"x = \" + point3D.x + \",\
    \ y =\" + point3D.y + \", z = \" + point3D.z);\n```\n\n`x = 10, y =-20, z = 35`\n\
    \nHow do you know the difference between a nonexisting property and an existing\
    \ property with the value `undefined`? You can use the `in` operator to know whether\
    \ a property exists in an object. The syntax is:\n\n`propertyNameExpression in\
    \ objectExpression`\n\nThe `propertyNameExpression` evaluates to a string that\
    \ is the name of the property. The `objectExpression` evaluates to an object.\
    \ The `in` operator returns `true` if the object has a property with the specified\
    \ name; otherwise, it returns `false`. The `in` operator searches own as well\
    \ as inherited properties of the object. The following code shows how to use the\
    \ `in` operator:\n\n```\n// Create an object with x and y properties\nvar colorPoint2D\
    \ = {x:10, y:20};\n\n// Check if the object has a property named x\nvar xExists\
    \ = \"x\" in colorPoint2D;\nprint(\"Property x exists: \" + xExists + \", x =\
    \ \" + colorPoint2D.x);\n\n// Check if the object has a property named color\n\
    var colorExists = \"color\" in colorPoint2D;\nprint(\"Property color exists: \"\
    \ + colorExists + \", color = \" + colorPoint2D.color);\n\n// Add a color property\
    \ and set it to undefined, and then, perform the check\ncolorPoint2D.color = undefined;\n\
    colorExists = \"color\" in colorPoint2D;\nprint(\"Property color exists: \" +\
    \ colorExists + \", color = \" + colorPoint2D.color);\n```\n\n`Property x exists:\
    \ true, x = 10`  \n`Property color exists: false, color = undefined`  \n`Property\
    \ color exists: true, color = undefined`\n\nThe following statement creates an\
    \ object with three properties; two of them contain data values and another a\
    \ function. It shows you how to use the property that is a function. You need\
    \ to call the function passing the arguments, if any:\n\n```\n// A person object\
    \ with fName, lName, and getFullName properties\nvar john = {fName: \"John\",\n\
    \            lName: \"Jacobs\",\n            getFullName: function () {\n    \
    \            return this.fName + \" \" + this.lName;\n            }\n        \
    \   };\n\nvar fullName = john.getFullName();\nprint(\"Full name is \" + fullName);\n\
    ```\n\n`Full name is John Jacobs`\n\nNotice the use of the keyword `this` inside\
    \ the function. The keyword `this` refers to the object on which the function\
    \ is called.\n\n> **Tip**  \n> If the data property of an object has a function\
    \ as its value, such a function is known as a method of the object. In other words,\
    \ a method is a function defined as a property of an object.\n\nYou can also access\
    \ the property that is a function using the bracket notation. The syntax looks\
    \ a bit awkward. This function call that uses the dot notation can be replaced\
    \ with the bracket notation, as shown:\n\n```\nvar fullName = john[\"getFullName\"\
    ]();\nprint(\"Full name is \" + fullName);\n```\n\n`Full name is John Jacobs`"
