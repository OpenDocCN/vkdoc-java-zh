    ```\n\n当您通过提供`ArrayBuffer`的长度来创建类型化数组时，`ArrayBuffer`的长度或大小必须是元素大小的倍数。例如，当您创建`Int32Array`时，其缓冲区的大小必须是4的倍数（32位等于4字节）。以下代码将抛出异常：\n\
    \n```javascript\nvar buffer = new ArrayBuffer(15);\n\n// Throws an exception because\
