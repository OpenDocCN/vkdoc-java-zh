    ## 在 Java 代码中使用脚本对象


    当 Nashorn 中的对象和值跨越脚本-Java 边界进入 Java 代码时，它们需要被表示为 Java 对象和值。表 12-2 列出了脚本对象类与其对应
    Java 对象类之间的映射关系。


    **表 12-2. 脚本对象类与 Java 对象类之间的映射列表**


    | 脚本对象类型 | Java 对象类型 |

    | --- | --- |

    | Undefined | `jdk.nashorn.internal.runtime.Undefined` |

    | Null | `null` |

    | Number | `java.lang.Number` |

    | Boolean | `java.lang.Boolean` |

    | 原始字符串类型 | `java.lang.String` |

    | 任意脚本对象 | `jdk.nashorn.api.scripting.ScriptObjectMirror` |

    | 任意 Java 对象 | `与脚本中的 Java 对象相同` |


    请注意，你不应该使用 `jdk.nashorn.internal` 包及其子包中的类和接口。表中列出它们仅用于提供信息。在此表中，Nashorn Number
    类型的映射显示为 `java.lang.Number` 类型。尽管 Nashorn 会尽可能为数值传递 `java.lang.Integer` 和 `java.lang.Double`
    对象，但依赖这些特定的 Java 类型并不可靠。当 Nashorn Number 从脚本传递到 Java 代码时，你应该期望得到一个 `java.lang.Number`
    实例。必要时，Nashorn 中的 Number 和 Boolean 类型的值会被转换为相应的 Java 原始类型，例如 `int`、`double`、`boolean`
    等。


    在 Nashorn 中，脚本对象被表示为 `jdk.nashorn.internal.runtime.ScriptObject` 类的实例。当脚本对象被传递给
    Java 代码时，它会被包装在一个 `ScriptObjectMirror` 对象中。在 JDK8u40 之前，如果你将一个脚本对象传递给一个声明其参数为
    `java.lang.Object` 类型的 Java 方法，传递的是 `ScriptObject`，而不是 `ScriptObjectMirror`。JDK8u40
    改变了这一行为，每次都将脚本对象作为 `ScriptObjectMirror` 传递给 Java 代码。如果你在 Java 中将方法的参数声明为 `JSObject`
    或 `ScriptObjectMirror`，Nashorn 始终会将脚本对象作为 `ScriptObjectMirror` 传递给 Java。


    **提示**


    脚本有可能将值 `undefined` 传递给 Java 代码。你可以使用 `ScriptObjectMirror` 类的 `isUndefined(Object
    obj)` 静态方法来检查传递给 Java 的脚本对象是否为 `undefined`。如果指定的 `obj` 是 `undefined`，该方法返回 true；否则返回
    false。


    `ScriptObjectMirror` 类实现了 `JSObject` 和 `Bindings` 接口。该类添加了更多方法来处理脚本对象。你可以在 Java
    代码中使用三种类型的变量来存储脚本对象的引用：`JSObject`、`Bindings` 或 `ScriptObjectMirror`。使用哪种类型取决于你的需求。使用
    `ScriptObjectMirror` 类型可以提供更大的灵活性，并允许访问脚本对象的所有特性。表 12-3 包含了 `JSObject` 接口中声明的方法列表。


    我将在后续章节中展示如何使用这些方法以及 `ScriptObjectMirror` 类的一些方法。任何 Java 类都可以实现 `JSObject` 接口。此类对象可以像脚本对象一样使用，并且可以在脚本中使用
    `obj.func()`、`obj[prop]`、`delete obj.prop` 等语法来操作其方法和属性。


