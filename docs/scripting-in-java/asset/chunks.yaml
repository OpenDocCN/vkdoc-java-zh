    \ method to support numeric literals in hexadecimal, octal, and binary formats.\n\
    \n### The `eval()` Method\n\nThe `eval()` method evaluates the expression and\
    \ returns a `double` value. First, it parses the expression if it has not already\
    \ been parsed. Note that multiple calls to the `eval()` parses the expression\
    \ only once.\n\nIt obtains values for both operands, performs the operation, and\
    \ returns the value of the expression.\n\n## The `JKScriptEngine` Class\n\nListing\
    \ 8-2 contains the implementation for the `JKScript` script engine. Its `eval(String,\
    \ ScriptContext)` method contains the main logic, as shown:\n\n```\nExpression\
    \ exp = new Expression(script, context);\nObject result = exp.eval();\n```\n\n\
