    Nashorn does have any special construct to support multidimensional arrays. You
    need to use an array of arrays (a zagged array) to create a multidimensional arrays
    in which elements of an array can be arrays. Typically, you will need nested `for`
    loops to populate and access the elements of a multidimensional array. The following
    code demonstrates how to create, populate, and print the elements of a 3x3 matrix.
    The code uses the `join()` method of the `Array` object to concatenate elements
    of the array using a tab as a separator:


    `var ROWS = 3;`


    `var COLS = 3;`


    `// Create a 3x3 array, so you pre-allocate the memory`


    `var matrix = new Array(ROWS);`


    `for(var i = 0; i < ROWS; i++) {`


    `matrix[i] = new Array(COLS);`


    `}`


    `// Populate the array`


    `for(var i = 0; i < ROWS; i++) {`


    `for(var j = 0; j < COLS; j++) {`


    `matrix[i][j] = i + "" + j;`


    `}`


    `}`


    `// Print the array elements`


    `for(var i = 0; i < ROWS; i++) {`


    `var rowData = matrix[i].join("\t");`


    `print(rowData);`


    `}`


    `00        01        02`


    `10        11        12`


    `20        21        22`


    ## Methods of the Array Object


    The `Array.prototype` object defines several methods that are available as an
    instance methods for all `Array` objects. In this section, I will discuss those
    methods. All array methods are intentionally generic, so they can be applied to
    not just arrays but to any array-like objects.


    ### Concatenating Elements


    The `concat(arg1, arg2,...)` method creates and returns a new array that contains
    the elements of the array object on which the method is invoked followed by the
    specified arguments in order. If an argument is an array, the array’s elements
    are concatenated. If an argument is a nested array, it is flattened one level.
    The original array and arrays passed as arguments are not modified by this method.
    If the original array or arguments contain objects, a shallow copy of objects
    is made. Examples of using the `concat()` method are as follows:


    `var names = ["Fu", "Li"];`


    `// Assigns ["Fu", "Li", "Do", "Su"] to names2`


    `var names2 = names.concat("Do", "Su");`


    `// Assigns ["Fu", "Li", "Do", "Su", ["Lu", "Zu"], "Yu"] to names3`


    `var names3 = names.concat("Do", ["Su", ["Lu","Zu"]], "Yu");`


    ### Joining Array Elements


    The `join(separator)` method converts all elements of the array to Strings, concatenates
    them using `separator`, and returns the resulting string. If `separator` is unspecified,
    a comma is used as the separator. The method works on all elements of the array
    starting from the index 0 to the index equal to `length - 1`. If an element is
    `undefined` or `null`, the empty string is used. Here are some examples of using
    the `join()` method:


    `var names = ["Fu", "Li", "Su"];`


    `var namesList1 = names.join();    // Assigns "Fu,Li,Su" to namesList1`


    `var namesList2 = names.join("-"); // Assigns "Fu-Li-Su" to namesList2`


    `var ids = [10, 20, , 30, undefined, 40, null]; // A sparse array`


    `var idsList1 = ids.join();    // Assigns "10,20,,30,,40," to idsList1`


    `var idsList2 = ids.join("-"); // Assigns "10-20--30--40-" to idsList2`


    ### Reversing Array Elements


    The `reverse()` method rearranges the elements of the array in reverse order and
    returns the array. Examples of using this method are as follows:


    `var names = ["Fu", "Li", "Su"];`


    `names.reverse(); // Now, the names array contains ["Su","Li","Fu"]`


    `// Assigns "Fu,Li,Su" to reversedList`


    `var reversedList = names.reverse().join();`


    ### Slicing an Array


    The `slice(start, end)` method returns an array containing a subarray of the original
    array from index between `start` and `end` (exclusive). If `start` and `end` are
    negative, they are treated as `start + length` and `end + length`, respectively,
    where `length` is the length of the array. Both `start` and `end` are capped between
    0 and `length` (inclusive). If `end` is unspecified, it is assumed as `length`.
    If `start` and `end` (exclusive) include a sparse range, the resulting subarray
    will be sparse. Here are examples of using the `slice()` method:


    `var names = ["Fu", "Li", "Su"];`


    `// Assigns ["Li","Su"] to subNames1\. end = 5 will be replaced with end = 3.`


    `var subNames1 = names.slice(1, 5);`


    `// Assigns ["Li","Su"] to subNames2\. start = -1 is used as start = 1 (-2 + 3).`


    `var subNames12 = names.slice(-2, 3);`


    `var ids = [10, 20,,,30, 40, 40]; // A sparse array`


    `// Assigns [20,,,30,40] to idsSubList whose length = 5`


    `var idsSubList = ids.slice(1, 6);`


    ### Splicing an Array


    The `splice()` method can perform insertion, deletion, or both, depending on the
    arguments passed. Its signature is:


    `splice (start, deleteCount, value1, value2,...)`


    The method deletes `deleteCount` elements starting at index `start` and inserts
    the specified arguments (`value1`, `value2`, etc.) at index `start`. It returns
    an array that contains the deleted elements from the original array. The indexes
    of the existing elements after the deletion, insertion, or both are adjusted,
    so they are contiguous. If `deleteCount` is 0, specified values are inserted without
    deleting any elements. Here are examples of using the method:


    `var ids = [10, 20, 30, 40, 50];`


    `// Replace 10 and 20 in the array with 100 and 200`


    `var deletedIds  = ids.splice(1, 2, 100, 200);`


    `print("ids = " + ids);`


    `print("deletedIds = " + deletedIds);`


    `// Keep the first 3 elements and delete the rest`


    `var deletedIds2  = ids.splice(3, 2);`


    `print("ids = " + ids);`


    `print("deletedIds2 = " + deletedIds2);`


    `ids = 10,100,200,40,50`


    `deletedIds = 20,30`


    `ids = 10,100,200`


    `deletedIds2 = 40,50`


    ### Sorting an Array


    The `sort(compareFunc)` method sorts the array in place and returns the sorted
    array. The `compareFunc` argument, which is a function with two arguments, is
    optional. If it is not specified, the array is sorted in alphabetical order, converting
    the elements to strings, if necessary, during comparison. Undefined elements are
    sorted to the end.


    If `compareFunc` is specified, it is passed two elements and its returns value
    determines the order of the two elements. Suppose that it is passed x and y. It
    returns a negative value if x < y, zero if `x = y`, and a positive value if `x
    > y`. The following code sorts an integer array in ascending order by not specifying
    a `compareFunc`. Later, it sorts the same array in descending order by specifying
    a `compareFunc`:


    `var ids = [30, 10, 40, 20];`


    `print("ids = " + ids);`


    `// Sort the array`


    `ids.sort();`


    `print("Sorted ids = " + ids);`


    `// A comparison function to sort ids in descending order`


    `var compareDescending = function (x, y) {`


    `if (x > y) {`


    `return -1;`


    `}`


    `else if (x < y) {`


    `return 1;`


    `}`


    `else {`


    `return 0;`


    `}`


    `};`


    `ids.sort(compareDescending);`


    `print("Sorted in descending order, ids = " + ids);`


    `ids = 30,10,40,20`


    `Sorted ids = 10,20,30,40`


    `Sorted in descending order, ids = 40,30,20,10`'
