- fmt: "### Defining Accessor Properties\n\nAn accessor property is also called getter\
    \ and setter methods. You can think of an accessor property as a set of `getXxx()`\
    \ and `setXxx()` methods in a Java class. When the `xxx` property is read, the\
    \ getter method with the `xxx` name is called; when the `xxx` property is set,\
    \ the setter method with the `xxx` name is called. The getter method declares\
    \ no formal parameters. The setter method declares one formal parameter. A property\
    \ can have only a getter method, only a setter method, or both. The following\
    \ is the syntax for defining the accessor property:\n\n```\n{ prop1: value1, /*\
    \ A data property */\n  prop2: value2, /* A data property */\n  /* The getter\
    \ for the property propName */\n  get propName() {\n    // Getter method's body\
    \ goes here\n  },\n  /* The setter for the property propName */\n  set propName(propValue)\
    \ {\n    // Setter method's body goes here\n  }\n}\n```\n\nDefining an accessor\
    \ property is the same as declaring functions with the keyword `function` replaced\
    \ with the keywords `get` and `set`. The keywords `get` and `set` are used to\
    \ define the getter and setter methods, respectively. Notice that you do not use\
    \ a colon to define the accessor property, but you still need to use a comma to\
    \ separate two properties of the object. The following code defines an object\
    \ with two data properties named `fName` and `lName`, and an accessor property\
    \ named `fullName`:\n\n```\n// A person object with fName and lName as data properties\n\
    // and fullName as an accessor property\nvar john = {fName: \"John\",\n      \
    \      lName: \"Jacobs\",\n            get fullName() {\n              return\
    \ this.fName + \" \" + this.lName;\n            },\n            set fullName(name)\
    \ {\n              names = name.split(\" \");\n              if(names.length ===\
    \ 2) {\n                this.fName = names[0];\n                this.lName = names[1];\n\
    \              }\n              else {\n                throw new Error(\"Full\
    \ name must be in the form 'fName lName'.\");\n              }\n            }\n\
    \           };\n\n// Get the full name using the fullName accessor property and\
    \ print it\nprint(\"Full name is \" + john.fullName);\n\n// Set a new full name\n\
    john.fullName = \"Ken McEwen\";\n\n// Get the new full name and print it\nprint(\"\
    New full name is \" + john.fullName);\n\nFull name is John Jacobs\nNew full name\
    \ is Ken McEwen\n```\n\nNotice that you set the first and the last names of the\
    \ person by setting the `fullName` property. When you set the value of the `fullName`\
    \ property, the value is passed to the setter method of the property that sets\
    \ the first and last names, provided the value follows the `\"fName lName\"` format.\n\
    \n### Setting Property Attributes\n\nYou can set attributes for data and accessor\
    \ properties of an object. Table [4-10](#A978-1-4842-0713-0_4_Chapter.html#Tab10)\
    \ lists the attributes of properties. Note that not all attributes are applicable\
    \ to all types of properties.\n\n**Table 4-10.** The List of Property Attributes\
    \ and Their Descriptions\n\n| Attribute | Type | Applicable To | Description |\n\
    | --- | --- | --- | --- |\n| `value` | Any type | Data Property Only | The value\
    \ of the property |\n| `writable` | Boolean | Data Property Only | Specifies whether\
    \ the value of the property can be changed. If `false`, the property is read-only.\
    \ Otherwise, the property is read-write. The default is `true` |\n| `get` | function\
    \ | Accessor Property Only | The getter method for the property or `undefined`.\
    \ The default is `undefined` |\n| `set` | function | Accessor Property Only |\
    \ The setter method of the property of `undefined`. The default is `undefined`\
    \ |\n| `enumerable` | Boolean | Both | If set to `false`, the property of the\
    \ object cannot be enumerated using the `for..in` and `for..each..in` loops. The\
    \ default is `true` |\n| `configurable` | Boolean | Both | It set to `false`,\
    \ the property cannot be deleted and attributes for the property cannot be changed.\
    \ The default is `true` |\n\nYou can read and set the property attributes using\
    \ an object called the property descriptor. The following statement create a property\
    \ descriptor that has the `value` property to 10 and `writable` property to `false`:\n\
    \n```\nvar descriptor = {value:10, writable:false};\n```\n\nCreating a property\
    \ descriptor does not do anything. It just creates an object. You need to use\
    \ one of the following three methods of `Object` to define a new property with\
    \ attributes, to change the attributes of an already defined property, and to\
