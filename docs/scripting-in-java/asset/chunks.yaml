- fmt: "# Using Java Arrays\n\nYou can use Java arrays in Nashorn scripts. The way\
    \ that Java arrays can be created in JavaScript differs in Rhino and Nashorn.\
    \ In Rhino, you need to create a Java array using the `newInstance()` static method\
    \ of the `java.lang.reflect.Array` class, which is inefficient and limited. Nashorn\
    \ supports a new way of creating Java arrays that I will discuss shortly. This\
    \ syntax is also supported in Nashorn. The following code shows how to create\
    \ and access Java arrays using the Rhino syntax:\n\n```\n// Create a java.lang.String\
    \ array of 2 elements, populate it, and print the\n// elements. In Rhino, you\
    \ were able to use java.lang.String as the first\n// argument; in Nashorn, you\
    \ need to use java.lang.String.class instead.\nvar strArray = java.lang.reflect.Array.newInstance(java.lang.String.class,\
    \ 2);\nstrArray[0] = \"Hello\";\nstrArray[1] = \"Array\";\nfor(var i = 0; i <\
    \ strArray.length; i++) {\n    print(strArray[i]);\n}\nHello\nArray\n```\n\nTo\
    \ create primitive type arrays such as arrays of `int`, `double`, and so on, you\
    \ need to use their `TYPE` constants for their corresponding wrapper classes,\
    \ as shown:\n\n```\n// Create an int array of 2 elements, populate it, and print\
    \ the elements\nvar intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE,\
    \ 2);\nintArray[0] = 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length;\
    \ i++) {\n    print(intArray[i]);\n}\n100\n200\n```\n\nNashorn supports a new\
    \ syntax to create Java arrays. First, create the appropriate Java array type\
    \ using the `Java.type()` method, and then use the familiar `new` operator to\
    \ create the array. The following code shows how to create a `String[]` of two\
    \ elements in Nashorn:\n\n```\n// Get the java.lang.String[] type\nvar StringArray\
    \ = Java.type(\"java.lang.String[]\");\n// Create a String[] array of 2 elements\n\
    var strArray = new StringArray(2);\n// Populate the array\nstrArray[0] = \"Hello\"\
    ;\nstrArray[1] = \"Array\";\nfor(var i = 0; i < strArray.length; i++) {\n    print(strArray[i]);\n\
    }\nHello\nArray\n```\n\nNashorn supports creating the arrays of primitive types\
    \ the same way. The following code creates an `int[]` of two elements in Nashorn:\n\
    \n```\n// Get the int[] type\nvar IntArray = Java.type(\"int[]\");\n// Create\
    \ a int[] array of 2 elements\nvar intArray = new IntArray(2);\nintArray[0] =\
    \ 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length; i++) {\n    print(intArray[i]);\n\
    }\n100\n200\n```\n\n**Tip**\n\nIf you want to create multidimensional Java arrays\
    \ in Nashorn, the array type will be as you declare the array in Java. For example,\
    \ `Java.type(\"int[][]\")` will import a Java `int[][]` array type; using the\
    \ `new` operator on the imported type will create the `int[][]` array.\n\nYou\
    \ can use a Nashorn array when a Java array is expected. Nashorn will perform\
    \ the necessary conversion. Suppose that you have a `PrintArray` class, as shown\
    \ in Listing 7-6, that contains a `print()` method that accepts a `String` array\
    \ as an argument.\n\n**Listing 7-6.** A `PrintArray` Class\n\n```\n// PrintArray.java\n\
    package com.jdojo.script;\npublic class PrintArray {\n    public void print(String[]\
    \ list) {\n        System.out.println(\"Inside print(String[] list):\" + list.length);\n\
    \        for(String s : list) {\n            System.out.println(s);\n        }\n\
    \    }\n}\n```\n\nThe following script passes a Nashorn array to the `PrintArray.print(String[])`\
    \ method. Nashorn takes care of converting the native array to a `String` array,\
    \ as shown in the output:\n\n```\n// Create a JavaScript array and populate it\
    \ with three strings\nvar names = new Array();\nnames[0] = \"Rhino\";\nnames[1]\
    \ = \"Nashorn\";\nnames[2] = \"JRuby\";\n// Create an object of the PrintArray\
    \ class\nvar PrintArray = Java.type(\"com.jdojo.script.PrintArray\");\nvar pa\
    \ = new PrintArray();\n// Pass a JavaScript array to the PrintArray.print(String[]\
    \ list) method\npa.print(names);\nInside print(String[] list):3\nRhino\nNashorn\n\
    JRuby\n```\n\nNashorn supports array type conversions between Java and Nashorn\
    \ arrays using the `Java.to()` and `Java.from()` methods. The `Java.to()` method\
    \ converts a Nashorn array type to a Java array type; it takes the array object\
    \ as the first argument and the target Java array type as the second argument.\
    \ The target array type can be specified as a string or a type object. The following\
    \ snippet of code converts a Nashorn array to a Java `String[]`:\n\n```\n// Create\
    \ a JavaScript array and populate it with three integers\nvar personIds = [100,\
    \ 200, 300];\n// Convert the JavaScript integer array to Java String[]\nvar JavaStringArray\
    \ = Java.to(personIds, \"java.lang.String[]\")\n```\n\nIf the second argument\
    \ in the `Java.to()` function is omitted, the Nashorn array is converted to a\
    \ Java `Object[]`.\n\nThe `Java.from()` method converts a Java array type to a\
    \ Nashorn array. The method takes the Java array as an argument. The following\
    \ snippet of code shows how to convert a Java `int[]` to a JavaScript array:\n\
    \n```\n// Create a Java int[]\nvar IntArray = Java.type(\"int[]\");\nvar personIds\
    \ = new IntArray(3);\npersonIds[0] = 100;\npersonIds[1] = 200;\npersonIds[2] =\
    \ 300;\n// Convert the Java int[] array to a Nashorn array\nvar jsArray = Java.from(personIds);\n\
    // Print the elements in the Nashorn array\nfor(var i = 0; i < jsArray.length;\
    \ i++) {\n    print(jsArray[i]);\n}\n100\n200\n300\n```\n\n**Tip**\n\nIt is possible\
    \ to return a Nashorn array to Java code from a Nashorn function. You need to\
    \ extract the elements of the native array in Java code, and therefore, you need\
    \ to use Nashorn-specific classes in Java. This approach is not advised. You should\
    \ convert the Nashorn array to a Java array and return the Java array from a Nashorn\
    \ function instead, so the Java code deals only with Java classes."
  raw: '## Using Java Arrays


    You can use Java arrays in Nashorn scripts. The way that Java arrays can be created
    in JavaScript differs in Rhino and Nashorn. In Rhino, you need to create a Java
    array using the `newInstance()` static method of the `java.lang.reflect.Array`
    class, which is inefficient and limited. Nashorn supports a new way of creating
    Java arrays that I will discuss shortly. This syntax is also supported in Nashorn.
    The following code shows how to create and access Java arrays using the Rhino
    syntax:


    `// Create a java.lang.String array of 2 elements, populate it, and print the`


    `// elements. In Rhino, you were able to use java.lang.String as the first`


    `// argument; in Nashorn, you need to use java.lang.String.class instead.`


    `var strArray = java.lang.reflect.Array.newInstance(java.lang.String.class, 2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    To create primitive type arrays such as arrays of `int`, `double`, and so on,
    you need to use their `TYPE` constants for their corresponding wrapper classes,
    as shown:


    `// Create an int array of 2 elements, populate it, and print the elements`


    `var intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE, 2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    Nashorn supports a new syntax to create Java arrays. First, create the appropriate
    Java array type using the `Java.type()` method, and then use the familiar `new`
    operator to create the array. The following code shows how to create a `String[]`
    of two elements in Nashorn:


    `// Get the java.lang.String[] type`


    `var StringArray = Java.type("java.lang.String[]");`


    `// Create a String[] array of 2 elements`


    `var strArray = new StringArray(2);`


    `// Populate the array`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    Nashorn supports creating the arrays of primitive types the same way. The following
    code creates an `int[]` of two elements in Nashorn:


    `// Get the int[] type`


    `var IntArray = Java.type("int[]");`


    `// Create a int[] array of 2 elements`


    `var intArray = new IntArray(2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    Tip


    If you want to create multidimensional Java arrays in Nashorn, the array type
    will be as you declare the array in Java. For example, `Java.type("int[][]")`
    will import a Java `int[][]` array type; using the new operator on the imported
    type will create the `int[][]` array.


    You can use a Nashorn array when a Java array is expected. Nashorn will perform
    the necessary conversion. Suppose that you have a `PrintArray` class, as shown
    in Listing 7-6, that contains a `print()` method that accepts a `String` array
    as an argument.


    Listing 7-6\. A PrintArray Class


    `// PrintArray.java`


    `package com.jdojo.script;`


    `public class PrintArray {`


    `public void print(String[] list) {`


    `System.out.println("Inside print(String[] list):" + list.length);`


    `for(String s : list) {`


    `System.out.println(s);`


    `}`


    `}`


    `}`


    The following script passes a Nashorn array to the `PrintArray.print(String[])`
    method. Nashorn takes care of converting the native array to a `String` array,
    as shown in the output:


    `// Create a JavaScript array and populate it with three strings`


    `var names = new Array();`


    `names[0] = "Rhino";`


    `names[1] = "Nashorn";`


    `names[2] = "JRuby";`


    `// Create an object of the PrintArray class`


    `var PrintArray = Java.type("com.jdojo.script.PrintArray");`


    `var pa = new PrintArray();`


    `// Pass a JavaScript array to the PrintArray.print(String[] list) method`


    `pa.print(names);`


    `Inside print(String[] list):3`


    `Rhino`


    `Nashorn`


    `JRuby`


    Nashorn supports array type conversions between Java and Nashorn arrays using
    the `Java.to()` and `Java.from()` methods. The `Java.to()` method converts a Nashorn
    array type to a Java array type; it takes the array object as the first argument
    and the target Java array type as the second argument. The target array type can
    be specified as a string or a type object. The following snippet of code converts
    a Nashorn array to a Java `String[]`:


    `// Create a JavaScript array and populate it with three integers`


    `var personIds = [100, 200, 300];`


    `// Convert the JavaScript integer array to Java String[]`


    `var JavaStringArray = Java.to(personIds, "java.lang.String[]")`


    If the second argument in the `Java.to()` function is omitted, the Nashorn array
    is converted to a Java `Object[]`.


    The `Java.from()` method converts a Java array type to a Nashorn array. The method
    takes the Java array as an argument. The following snippet of code shows how to
    convert a Java `int[]` to a JavaScript array:


    `// Create a Java int[]`


    `var IntArray = Java.type("int[]");`


    `var personIds = new IntArray(3);`


    `personIds[0] = 100;`


    `personIds[1] = 200;`


    `personIds[2] = 300;`


    `// Convert the Java int[] array to a Nashorn array`


    `var jsArray = Java.from(personIds);`


    `// Print the elements in the Nashorn array`


    `for(var i = 0; i < jsArray.length; i++) {`


    `print(jsArray[i]);`


    `}`


    `100`


    `200`


    `300`


    Tip


    It is possible to return a Nashorn array to Java code from a Nashorn function.
    You need to extract the elements of the native array in Java code, and therefore,
    you need to use Nashorn-specific classes in Java. This approach is not advised.
    You should convert the Nashorn array to a Java array and return the Java array
    from a Nashorn function instead, so the Java code deals only with Java classes.'
  trans: '

    ## 使用 Java 数组


    你可以在 Nashorn 脚本中使用 Java 数组。在 Rhino 和 Nashorn 中，创建 Java 数组的方式有所不同。在 Rhino 中，你需要使用
    `java.lang.reflect.Array` 类的 `newInstance()` 静态方法来创建 Java 数组，这种方式效率低下且功能有限。Nashorn
    支持一种创建 Java 数组的新方法，我稍后会讨论。这种语法在 Nashorn 中也受支持。以下代码展示了如何使用 Rhino 语法创建和访问 Java 数组：


    `// 创建一个包含 2 个元素的 java.lang.String 数组，填充它，并打印`


    `// 元素。在 Rhino 中，你可以使用 java.lang.String 作为第一个`


    `// 参数；在 Nashorn 中，你需要改用 java.lang.String.class。`


    `var strArray = java.lang.reflect.Array.newInstance(java.lang.String.class, 2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    要创建基本类型数组，例如 `int`、`double` 等类型的数组，你需要使用它们对应包装类的 `TYPE` 常量，如下所示：


    `// 创建一个包含 2 个元素的 int 数组，填充它，并打印元素`


    `var intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE, 2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    Nashorn 支持一种创建 Java 数组的新语法。首先，使用 `Java.type()` 方法创建相应的 Java 数组类型，然后使用熟悉的 `new`
    运算符来创建数组。以下代码展示了如何在 Nashorn 中创建一个包含两个元素的 `String[]`：


    `// 获取 java.lang.String[] 类型`


    `var StringArray = Java.type("java.lang.String[]");`


    `// 创建一个包含 2 个元素的 String[] 数组`


    `var strArray = new StringArray(2);`


    `// 填充数组`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    Nashorn 支持以相同方式创建基本类型数组。以下代码在 Nashorn 中创建了一个包含两个元素的 `int[]`：


    `// 获取 int[] 类型`


    `var IntArray = Java.type("int[]");`


    `// 创建一个包含 2 个元素的 int[] 数组`


    `var intArray = new IntArray(2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    提示


    如果你想在 Nashorn 中创建多维 Java 数组，数组类型将与你用 Java 声明数组时一致。例如，`Java.type("int[][]")` 会导入一个
    Java `int[][]` 数组类型；对导入的类型使用 `new` 运算符将创建 `int[][]` 数组。


    当需要 Java 数组时，你可以使用 Nashorn 数组。Nashorn 会执行必要的转换。假设你有一个 `PrintArray` 类，如清单 7-6 所示，其中包含一个接受
    `String` 数组作为参数的 `print()` 方法。


    清单 7-6. PrintArray 类


    `// PrintArray.java`


    `package com.jdojo.script;`


    `public class PrintArray {`


    `public void print(String[] list) {`


    `System.out.println("Inside print(String[] list):" + list.length);`


    `for(String s : list) {`


    `System.out.println(s);`


    `}`


    `}`


    `}`


    以下脚本将一个 Nashorn 数组传递给 `PrintArray.print(String[])` 方法。Nashorn 负责将原生数组转换为 `String`
    数组，如输出所示：


    `// 创建一个 JavaScript 数组并用三个字符串填充它`


    `var names = new Array();`


    `names[0] = "Rhino";`


    `names[1] = "Nashorn";`


    `names[2] = "JRuby";`


    `// 创建一个 PrintArray 类的对象`


    `var PrintArray = Java.type("com.jdojo.script.PrintArray");`


    `var pa = new PrintArray();`


    `// 将 JavaScript 数组传递给 PrintArray.print(String[] list) 方法`


    `pa.print(names);`


    `Inside print(String[] list):3`


    `Rhino`


    `Nashorn`


    `JRuby`


    Nashorn 支持使用 `Java.to()` 和 `Java.from()` 方法在 Java 数组和 Nashorn 数组之间进行类型转换。`Java.to()`
    方法将 Nashorn 数组类型转换为 Java 数组类型；它接受数组对象作为第一个参数，目标 Java 数组类型作为第二个参数。目标数组类型可以指定为字符串或类型对象。以下代码片段将一个
    Nashorn 数组转换为 Java `String[]`：


    `// 创建一个 JavaScript 数组并用三个整数填充它`


    `var personIds = [100, 200, 300];`


    `// 将 JavaScript 整数数组转换为 Java String[]`


    `var JavaStringArray = Java.to(personIds, "java.lang.String[]")`


    如果省略 `Java.to()` 函数中的第二个参数，Nashorn 数组将被转换为 Java `Object[]`。


    `Java.from()` 方法将 Java 数组类型转换为 Nashorn 数组。该方法接受 Java 数组作为参数。以下代码片段展示了如何将 Java
    `int[]` 转换为 JavaScript 数组：


    `// 创建一个 Java int[]`


    `var IntArray = Java.type("int[]");`


    `var personIds = new IntArray(3);`


    `personIds[0] = 100;`


    `personIds[1] = 200;`


    `personIds[2] = 300;`


    `// 将 Java int[] 数组转换为 Nashorn 数组`


    `var jsArray = Java.from(personIds);`


    `// 打印 Nashorn 数组中的元素`


    `for(var i = 0; i < jsArray.length; i++) {`


    `print(jsArray[i]);`


    `}`


    `100`


    `200`


    `300`


    提示


    从 Nashorn 函数向 Java 代码返回一个 Nashorn 数组是可行的。你需要在 Java 代码中提取原生数组的元素，因此需要在 Java 中使用
    Nashorn 特定的类。不建议采用这种方法。你应该将 Nashorn 数组转换为 Java 数组，然后从 Nashorn 函数返回 Java 数组，这样
    Java 代码就只处理 Java 类。

    '
- fmt: "# Arrays to Java Collections Conversions\n\nWhenever possible, Nashorn provides\
    \ automatic conversion from Nashorn arrays to Java arrays, `List`s, and `Map`s.\
    \ Converting Nashorn arrays to Java arrays and `List`s is straightforward. When\
    \ a Nashorn array is converted to a Java `Map`, the indexes of array elements\
    \ become keys in the `Map` and element’s values become the values for the corresponding\
    \ indexes. Consider a Java class named `ArrayConversion` as shown in Listing 7-7.\
    \ It contains four methods that accept arrays, `List`s, and `Map`s as arguments.\n\
    \n**Listing 7-7.** A Java Class Named `ArrayConversion`\n\n```java\n// ArrayConversion.java\n\
    package com.jdojo.script;\n\nimport java.util.Arrays;\nimport java.util.List;\n\
    import java.util.Map;\n\npublic class ArrayConversion {\n    public static void\
    \ printInts(int[] ids) {\n        System.out.print(\"Inside printInts():\");\n\
    \        System.out.println(Arrays.toString(ids));\n    }\n\n    public static\
    \ void printDoubles(double[] salaries) {\n        System.out.print(\"Inside printDoubles(double[]):\"\
    );\n        System.out.println(Arrays.toString(salaries));\n    }\n\n    public\
    \ static void printList(List<Integer> idsList) {\n        System.out.print(\"\
    Inside printList():\");\n        System.out.println(idsList);\n    }\n\n    public\
    \ static void printMap(Map<?,?> phoneMap) {\n        System.out.println(\"Inside\
    \ printMap():\");\n        phoneMap.forEach((key, value) -> {\n            System.out.println(\"\
    key = \" + key + \", value = \" + value);\n        });\n    }\n}\n```\n\nConsider\
    \ the Nashorn script as shown in Listing 7-8. It passes Nashorn arrays to Java\
    \ methods that expects arrays, `List`s, and `Map`s. The output proves that all\
    \ methods are called and Nashorn runtime provides automatic conversions. Notice\
    \ that when a Nashorn array contains elements of types not matching Java types,\
    \ those elements are converted to appropriate Java types according to Nashorn\
    \ type conversion rules. For example, a string in Nashorn is converted to 0 as\
    \ Java `int`.\n\n**Listing 7-8.** A Nashorn Script to test the `ArrayConversion`\
    \ Class\n\n```javascript\n// arrayconversion.js\nvar ArrayConversion = Java.type(\"\
    com.jdojo.script.ArrayConversion\");\n\nArrayConversion.printInts([1, 2, 3]);\n\
    ArrayConversion.printInts([1, \"Hello\", 3]); // \"hello\" is converted to 0\n\
    \n// Non-integers will be converted to corresponding integers per Nashorn rules\n\
    // when a Nashorn array is converted to a Java array. true and false are\n// converted\
    \ to 1 and 0, and 10.3 is converted to 10.\nArrayConversion.printInts([1, true,\
    \ false, 10.3]);\n\n// Nashorn array to Java double[] conversion\nArrayConversion.printDoubles([10.89,\
    \ \"Hello\", 3]);\n\n// Nashorn array to Java List conversion\nArrayConversion.printList([10.89,\
    \ \"Hello\", 3]);\n\n// Nashorn array to Java Map conversion\nArrayConversion.printMap([10.89,\
    \ \"Hello\", 3]);\n```\n\nOutput:\n\n```\nInside printInts():[1, 2, 3]\nInside\
    \ printInts():[1, 0, 3]\nInside printInts():[1, 1, 0, 10]\nInside printDoubles(double[]):[10.89,\
    \ NaN, 3.0]\nInside printList():[10.89, Hello, 3]\nInside printMap():\nkey = 0,\
    \ value = 10.89\nkey = 1, value = Hello\nkey = 2, value = 10.89\n```\n\nSometimes\
    \ it is not possible for Nashorn to automatically convert a Nashorn array to a\
    \ Java array automatically—particularly when Java methods are overloaded. Consider\
    \ the following code that throws an exception:\n\n```javascript\nvar Arrays =\
    \ Java.type(\"java.util.Arrays\");\nvar str = Arrays.toString([0, 1, 2]); // Throws\
    \ a java.lang.NoSuchMethodException\n```\n\nThe `Arrays.toString()` method is\
    \ overloaded and Nashorn cannot make a decision which version of the method to\
    \ call. In this case, you must either explicitly convert the Nashorn array to\
    \ the specific Java array type or choose the specific Java method to call. The\
    \ following code shows both approaches:\n\n```javascript\nvar Arrays = Java.type(\"\
    java.util.Arrays\");\n\n// Explicitly convert Nashorn array to Java int[]\nvar\
    \ str1 = Arrays.toString(Java.to([1, 2, 3], \"int[]\"));\n\n// Explicitly choose\
    \ the Arrays.toString(int[]) method to call\nvar str2 = Arrays[\"toString(int[])\"\
    ]([1, 2, 3]);\n```\n\n## Summary\n\nAn array in Nashorn is a specialized object,\
    \ called an `Array` object, which is used to represent an ordered collection of\
    \ values. An `Array` object treats certain property names in a special way. If\
    \ a property name can be converted to an integer that is between 0 and 2^(32)-2\
    \ (inclusive), such a property name is known as an array index and the property\
    \ is known as an element. An `Array` object has a special property called `length`\
    \ that represents the number of elements in the array.\n\nAn array can be created\
    \ using an array literal or using the constructor of the `Array` object. An array\
    \ literal is a comma-separated list of expressions enclosed in brackets that constitute\
    \ the elements of the array. Arrays in Nashorn are variable-length and may be\
    \ dense or sparse. Elements in an array can also be of different types.\n\nYou\
    \ can access the array elements using the bracket notation and the index of the\
    \ array elements. You can delete an array element using the `delete` operator.\
    \ You can iterate array elements using the `for` loop, `for..in` loop, and `for..each..in`\
    \ loop. The `for..in` and `for..each..in` loops iterate over elements as well\
    \ as nonelement properties of the array. The `Array.prototype` object contains\
    \ a `forEach()` method that iterates over only array elements and calls back the\
    \ passed function for each element.\n\nThe `Array` object contains several useful\
    \ methods to work with array elements. The `Array.isArray(object)` static method\
    \ returns `true` if the specified `object` is an array; otherwise, it returns\
    \ `false`. Other methods such as `concat()`, `join()`, `slice()`, `splice()`,\
    \ `sort()`, and so on are in the `Array.prototype` object.\n\nAn array-like object\
    \ is a Nashorn object that has a `length` property and property names that are\
    \ valid array indexes. String objects and `arguments` object are examples of array-like\
    \ objects. Most of the methods in the `Array` object are generic and they can\
    \ be used on any array-like object.\n\nNashorn supports typed arrays. A typed\
    \ array is a typed view of an `ArrayBuffer` object that contains raw binary data.\
    \ Different types of typed arrays are available such as `Int8Array` to deal with\
    \ 8-bit signed integers, `Int32Array` to deal with 32-bit signed integers, etc.\
    \ Once you create a typed array, you can use it like an array to deal with the\
    \ specific types of values. The `DataView` object provides a low-level interface\
    \ to deal with an `ArrayBuffer` object whose binary data may contain different\
    \ types of numeric values.\n\nAll Nashorn objects are maps. Nashorn lets you treat\
    \ Java `Map`s in a special way by allowing you to access their values using the\
    \ bracket notation with keys as indexes. Nashorn lets you treat Java `List`s like\
    \ Nashorn arrays. You can read and update elements of Java `List`s using the bracket\
    \ notation where element’s indexes are treated as indexes in the arrays. Nashorn\
    \ creates a special property named `length` for Java `List` objects that represents\
    \ the number of elements in the `List`. If you need any other types of collections\
    \ in Nashorn, you can use the corresponding collections from Java.\n\nNashorn\
    \ lets you use Java arrays in scripts. You need to use the `Java.type()` method\
    \ to import the Java array type in the script. For example, `Java.type(\"int[]\"\
    )` returns a Java type that represents a Java `int[]`. Once you get the Java array\
    \ type, you need to use the `new` operator to create the array. Nashorn also supports\
    \ Nashorn-to-Java and Java-to-Nashorn array conversions. The `Java.to()` method\
    \ converts a Nashorn array to a Java array and the `Java.from()` method converts\
    \ a Java array to a Nashorn array. Nashorn attempts to perform automatic conversion\
    \ from Nashorn arrays to Java arrays, `List`s, and `Map`s, provided the choice\
    \ of type conversion is unique. In other cases, you will need to perform explicit\
    \ conversion from Nashorn arrays to collections."
  raw: '## Arrays to Java Collections Conversions


    Whenever possible, Nashorn provides automatic conversion from Nashorn arrays to
    Java arrays, `List`s, and `Map`s. Converting Nashorn arrays to Java arrays and
    `List`s is straightforward. When a Nashorn array is converted to a Java `Map`,
    the indexes of array elements become keys in the `Map` and element’s values become
    the values for the corresponding indexes. Consider a Java class named `ArrayConversion`
    as shown in Listing 7-7\. It contains four methods that accept arrays, `List`s,
    and `Map`s as arguments.


    Listing 7-7\. A Java Class Named ArrayConversion


    `// ArrayConversion.java`


    `package com.jdojo.script;`


    `import java.util.Arrays;`


    `import java.util.List;`


    `import java.util.Map;`


    `public class ArrayConversion {`


    `public static void printInts(int[] ids) {`


    `System.out.print("Inside printInts():");`


    `System.out.println(Arrays.toString(ids));`


    `}`


    `public static void printDoubles(double[] salaries) {`


    `System.out.print("Inside printDoubles(double[]):");`


    `System.out.println(Arrays.toString(salaries));`


    `}`


    `public static void printList(List<Integer> idsList) {`


    `System.out.print("Inside printList():");`


    `System.out.println(idsList);`


    `}`


    `public static void printMap(Map<?,?> phoneMap) {`


    `System.out.println("Inside printMap():");`


    `phoneMap.forEach((key, value) -> {`


    `System.out.println("key = " + key + ", value = " + value);`


    `});`


    `}`


    `}`


    Consider the Nashorn script as shown in Listing 7-8\. It passes Nashorn arrays
    to Java methods that expects arrays, `List`s, and `Map`s. The output proves that
    all methods are called and Nashorn runtime provides automatic conversions. Notice
    that when a Nashorn array contains elements of types not matching Java types,
    those elements are converted to appropriate Java types according to Nashorn type
    conversion rules. For example, a string in Nashorn is converted to 0 as Java `int`.


    Listing 7-8\. A Nashorn Script to test the ArrayConversion Class


    `// arrayconversion.js`


    `var ArrayConversion = Java.type("com.jdojo.script.ArrayConversion");`


    `ArrayConversion.printInts([1, 2, 3]);`


    `ArrayConversion.printInts([1, "Hello", 3]); // "hello" is converted to 0`


    `// Non-integers will be converted to corresponding integers per Nashorn rules`


    `// when a Nashorn array is converted to a Java array. true and false are`


    `// converted to 1 and 0, and 10.3 is converted to 10.`


    `ArrayConversion.printInts([1, true, false, 10.3]);`


    `// Nashorn array to Java double[] conversion`


    `ArrayConversion.printDoubles([10.89, "Hello", 3]);`


    `// Nashorn array to Java List conversion`


    `ArrayConversion.printList([10.89, "Hello", 3]);`


    `// Nashorn array to Java Map conversion`


    `ArrayConversion.printMap([10.89, "Hello", 3]);`


    `Inside printInts():[1, 2, 3]`


    `Inside printInts():[1, 0, 3]`


    `Inside printInts():[1, 1, 0, 10]`


    `Inside printDoubles(double[]):[10.89, NaN, 3.0]`


    `Inside printList():[10.89, Hello, 3]`


    `Inside printMap():`


    `key = 0, value = 10.89`


    `key = 1, value = Hello`


    `key = 2, value = 3`


    Sometimes it is not possible for Nashorn to automatically convert a Nashorn array
    to a Java array automatically—particularly when Java methods are overloaded. Consider
    the following code that throws an exception:


    `var Arrays = Java.type("java.util.Arrays");`


    `var str = Arrays.toString([0, 1, 2]); // Throws a java.lang.NoSuchMethodException`


    The `Arrays.toString()` method is overloaded and Nashorn cannot make a decision
    which version of the method to call. In this case, you must either explicitly
    convert the Nashorn array to the specific Java array type or choose the specific
    Java method to call. The following code shows both approaches:


    `var Arrays = Java.type("java.util.Arrays");`


    `// Explicitly convert Nashorn array to Java int[]`


    `var str1 = Arrays.toString(Java.to([1, 2, 3], "int[]"));`


    `// Explicitly choose the Arrays.toString(int[]) method to call`


    `var str2 = Arrays["toString(int[])"]([1, 2, 3]);`


    ## Summary


    An array in Nashorn is a specialized object, called an `Array` object, which is
    used to represent an ordered collection of values. An `Array` object treats certain
    property names in a special way. If a property name can be converted to an integer
    that is between 0 and 2^(32)-2 (inclusive), such a property name is known as an
    array index and the property is known as an element. An `Array` object has a special
    property called `length` that represents the number of elements in the array.


    An array can be created using an array literal or using the constructor of the
    `Array` object. An array literal is a comma-separated list of expressions enclosed
    in brackets that constitute the elements of the array. Arrays in Nashorn are variable-length
    and may be dense or sparse. Elements in an array can also be of different types.


    You can access the array elements using the bracket notation and the index of
    the array elements. You can delete an array element using the `delete` operator.
    You can iterate array elements using the `for` loop, `for..in` loop, and `for..each..in`
    loop. The `for..in` and `for..each..in` loops iterate over elements as well as
    nonelement properties of the array. The `Array.prototype` object contains a `forEach()`
    method that iterates over only array elements and calls back the passed function
    for each element.


    The `Array` object contains several useful methods to work with array elements.
    The `Array.isArray(object)` static method returns `true` if the specified `object`
    is an array; otherwise, it returns `false`. Other methods such as `concat()`,
    `join()`, `slice()`, `splice()`, `sort()`, and so on are in the `Array.prototype`
    object.


    An array-like object is a Nashorn object that has a `length` property and property
    names that are valid array indexes. String objects and `arguments` object are
    examples of array-like objects. Most of the methods in the `Array` object are
    generic and they can be used on any array-like object.


    Nashorn supports typed arrays. A typed array is a typed view of an `ArrayBuffer`
    object that contains raw binary data. Different types of typed arrays are available
    such as `Int8Array` to deal with 8-bit signed integers, `Int32Array` to deal with
    32-bit signed integers, etc. Once you create a typed array, you can use it like
    an array to deal with the specific types of values. The `DataView` object provides
    a low-level interface to deal with an `ArrayBuffer` object whose binary data may
    contain different types of numeric values.


    All Nashorn objects are maps. Nashorn lets you treat Java `Map`s in a special
    way by allowing you to access their values using the bracket notation with keys
    as indexes. Nashorn lets you treat Java `List`s like Nashorn arrays. You can read
    and update elements of Java `List`s using the bracket notation where element’s
    indexes are treated as indexes in the arrays. Nashorn creates a special property
    named `length` for Java `List` objects that represents the number of elements
    in the `List`. If you need any other types of collections in Nashorn, you can
    use the corresponding collections from Java.


    Nashorn lets you use Java arrays in scripts. You need to use the `Java.type()`
    method to import the Java array type in the script. For example. `Java.type("int[]")`
    returns a Java type that represents a Java `int[]`. Once you get the Java array
    type, you need to use the `new` operator to create the array. Nashorn also supports
    Nashorn-to-Java and Java-to-Nashorn array conversions. The `Java.to()` method
    converts a Nashorn array to a Java array and the `Java.from()` method converts
    a Java array to a Nashorn array. Nashorn attempts to perform automatic conversion
    from Nashorn arrays to Java arrays, `List`s, and `Map`s, provided the choice of
    type conversion is unique. In other cases, you will need to perform explicit conversion
    from Nashorn arrays to collections.'
