- fmt: "# What Is an Array in Nashorn?\n\nAn array in Nashorn is a specialized object,\
    \ called an `Array` object, which is used to represent an ordered collection of\
    \ values. An `Array` object treats certain property names in a special way. If\
    \ a property name can be converted to an integer that is between 0 and 2^(32)-2\
    \ (inclusive), such a property name is known as an array index and the property\
    \ is known as an element. In other words, an element in an array is a special\
    \ property whose name is an array index. Apart from adding elements to an array,\
    \ you can add any other properties as you have been doing to Nashorn objects.\
    \ Notice that, in an `Array` object, every array index is a property, but every\
    \ property is not an array index. For example, you can add two properties named\
    \ `\"0\"` and `\"name\"` to an array where `\"0\"` is an array index because it\
    \ can be converted to an integer, whereas `\"name\"` is simply a property.\n\n\
    Every `Array` object has a property named `length` whose value is greater than\
    \ the index of all elements. When elements are added, `length` is automatically\
    \ adjusted. If `length` is changed, the elements whose indexes are greater than\
    \ or equal to the new `length` are deleted. Note that, unlike Java arrays, Nashorn\
    \ arrays are variable-length arrays. That is, Nashorn arrays are not fix-length\
    \ arrays; they can expand and shrink when elements are added and removed, or the\
    \ `length` property is changed.\n\nThere are two types of arrays: dense and sparse.\
    \ In a dense array, the indexes of all elements are contiguous. Java arrays are\
    \ always dense arrays. In a sparse array, indexes of all elements may not be contiguous.\
    \ Nashorn arrays are sparse arrays. For example, you can have an array in Nashorn\
    \ that has an element at index 1000 without having any elements from indexes 0\
    \ to 999.\n\nUnlike in Java, arrays in Nashorn does not have a type. The elements\
    \ in an array can be of mixed types—one element can be a Number, another a String,\
    \ another an Object, and so on. Nashorn also supports typed-arrays, but they work\
    \ quite differently than Java arrays. I will discuss typed arrays in the Typed\
    \ Arrays section in this chapter.\n\n# Creating an Array\n\nThere are two ways\
    \ to create an array in Nashorn:\n\n* Using an array literal\n* Using the `Array`\
    \ object\n\n## Using an Array Literal\n\nAn array literal is an expression that\
    \ represents an `Array` object. An array literal is also known as an array initializer.\
    \ It is a comma-separated list of expressions enclosed in brackets; each expression\
    \ in the list represents an element of the array. The following are examples of\
    \ using array literals:\n\n```\n// An array with no elements, also called an empty\
    \ array\nvar emptyArray = [];\n\n// An array with two elements\nvar names = [\"\
    Ken\", \"Li\"];\n\n// An array with four element. Elements are of mixed types.\n\
    var misc = [1001, \"Ken\", 1003, new Object()];\n\n// Print the array length and\
    \ its elements\nprint(\"Array's length: \" + emptyArray.length + \", elements:\
    \ \" + emptyArray);\nprint(\"Array's length: \" + names.length + \", elements:\
    \ \" + names);\nprint(\"Array's length: \" + misc.length + \", elements: \" +\
    \ misc);\n```\n\n```\nArray's length: 0, elements:\nArray's length: 2, elements:\
    \ Ken,Li\nArray's length: 4, elements: 1001,Ken,1003,[object Object]\n```\n\n\
    Every `Array` object contains a `toString()` method that returns a comma-separated\
    \ list of array elements as a string. Before adding to the list, each element\
    \ is converted to a string. The `toString()` method of all arrays are called in\
    \ the example to print their contents.\n\nA trailing comma in the array literal\
    \ is ignored. The following two array literals are considered the same. Both have\
    \ three elements:\n\n```\nvar empIds1 = [10, 20, 30];  // Without a trailing comma.\
    \ empIds1.length is 3\nvar empIds2 = [10, 20, 30,]; // Same as [10, 20, 30]. empIds2.length\
    \ is 3\n```\n\nThe elements in the array literal are indexed properties of the\
    \ array object. For a dense array, the first element is assigned an index of 0,\
    \ the second an index of 1, the third an index of 3, and so on. I will discuss\
    \ the indexing scheme for sparse arrays shortly. Consider the following dense\
    \ array with three elements. Figure [7-1](#A978-1-4842-0713-0_7_Chapter.html#Fig1)\
    \ shows the element’s values and their indexes in the array.\n\n```\nvar names\
    \ = [\"Fu\", \"Li\", \"Ho\"]\n```\n\n![A978-1-4842-0713-0_7_Fig1_HTML.jpg](A978-1-4842-0713-0_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. Array elements and their indexes in a three-element dense array\n\
    \nYou can access the elements of an array the same way you access properties of\
    \ an object. The only difference will be that the property name for the element\
    \ is an integer. For example, in the `names` array, `names[0]` refers to the first\
    \ element `\"Fu\"`, `names[1]` refers to the second element `\"Li\"`, and `names[2]`\
    \ refers to the third element `\"Ho\"`. The following code creates a dense array\
    \ and uses a `for` loop to access and print all elements of the array:\n\n```\n\
    // Create an array with three elements\nvar names = [\"Fu\", \"Li\", \"Ho\"]\n\
    \n// Print all array elements\nfor(var i = 0, len = names.length; i < len; i++)\
    \ {\n    print(\"names[\" + i + \"] = \" + names[i]);\n}\n```\n\n```\nnames[0]\
    \ = Fu\nnames[1] = Li\nnames[2] = Ho\n```\n\nAdding an element to an array is\
    \ the same as assigning a value at a nonexisting index. The following code creates\
    \ an array with three elements and adds the fourth and fifth elements. Finally,\
    \ the code prints all elements in the array:\n\n```\n// Create an array with three\
    \ elements\nvar names = [\"Fu\", \"Li\", \"Ho\"]\n\n// Add fourth element\nnames[3]\
    \ = \"Su\"; // Adds an element at index 3\n\n// Add fifth element\nnames[4] =\
    \ \"Bo\"; // Adds an element at index 4\n\n// Print all array elements\nfor(var\
    \ i = 0, len = names.length; i < len; i++) {\n    print(\"names[\" + i + \"] =\
    \ \" + names[i]);\n}\n```\n\n```\nnames[0] = Fu\nnames[1] = Li\nnames[2] = Ho\n\
    names[3] = Su\nnames[4] = Bo\n```\n\nRecall that an array is an object, so you\
    \ can add properties to an array just as you add properties to any other objects.\
    \ If the property name is not an index, the property will be simply a property,\
    \ not an element. A nonelement property does not contribute to `length` of the\
    \ array. The following code creates an array, adds an element and a nonelement\
    \ property, and prints the details:\n\n```\n// Create an array with three elements\n\
    var names = [\"Fu\", \"Li\", \"Ho\"]\n\n// Add fourth element\n```"
  raw: '## What Is an Array in Nashorn?


    An array in Nashorn is a specialized object, called an `Array` object, which is
    used to represent an ordered collection of values. An `Array` object treats certain
    property names in a special way. If a property name can be converted to an integer
    that is between 0 and 2^(32)-2 (inclusive), such a property name is known as an
    array index and the property is known as an element. In other words, an element
    in an array is a special property whose name is an array index. Apart from adding
    elements to an array, you can add any other properties as you have been doing
    to Nashorn objects. Notice that, in an `Array` object, every array index is a
    property, but every property is not an array index. For example, you can add two
    properties named “0” and “name” to an array where “0” is an array index because
    it can be converted to an integer, whereas “name” is simply a property.


    Every `Array` object has a property named `length` whose value is greater than
    the index of all elements. When elements are added, `length` is automatically
    adjusted. If `length` is changed, the elements whose indexes are greater than
    or equal to the new `length` are deleted. Note that, unlike Java arrays, Nashorn
    arrays are variable-length arrays. That is, Nashorn arrays are not fix-length
    arrays; they can expand and shrink when elements are added and removed, or the
    `length` property is changed.


    There are two types of arrays: dense and sparse. In a dense array, the indexes
    of all elements are contiguous. Java arrays are always dense arrays. In a sparse
    array, indexes of all elements may not be contiguous. Nashorn arrays are sparse
    arrays. For example, you can have an array in Nashorn that has an element at index
    1000 without having any elements from indexes 0 to 999.


    Unlike in Java, arrays in Nashorn does not have a type. The elements in an array
    can be of mixed types—one element can be a Number, another a String, another an
    Object, and so on. Nashorn also supports typed-arrays, but they work quite differently
    than Java arrays. I will discuss typed arrays in the Typed Arrays section in this
    chapter.


    ## Creating an Array


    There are two ways to create an array in Nashorn:


    *   Using an array literal

    *   Using the `Array` object


    ### Using an Array Literal


    An array literal is an expression that represents an `Array` object. An array
    literal is also known as an array initializer. It is a comma-separated list of
    expressions enclosed in brackets; each expression in the list represents an element
    of the array. The following are examples of using array literals:


    `// An array with no elements, also called an empty array`


    `var emptyArray = [];`


    `// An array with two elements`


    `var names = ["Ken", "Li"];`


    `// An array with four element. Elements are of mixed types.`


    `var misc = [1001, "Ken", 1003, new Object()];`


    `// Print the array length and its elements`


    `print("Array''s length: " + emptyArray.length + ", elements: " + emptyArray);`


    `print("Array''s length: " + names.length + ", elements: " + names);`


    `print("Array''s length: " + misc.length + ", elements: " + misc);`


    `Array''s length: 0, elements:`


    `Array''s length: 2, elements: Ken,Li`


    `Array''s length: 4, elements: 1001,Ken,1003,[object Object]`


    Every `Array` object contains a `toString()` method that returns a comma-separated
    list of array elements as a string. Before adding to the list, each element is
    converted to a string. The `toString()` method of all arrays are called in the
    example to print their contents.


    A trailing comma in the array literal is ignored. The following two array literals
    are considered the same. Both have three elements:


    `var empIds1 = [10, 20, 30];  // Without a trailing comma. empIds1.length is 3`


    `var empIds2 = [10, 20, 30,]; // Same as [10, 20, 30]. empIds2.length is 3`


    The elements in the array literal are indexed properties of the array object.
    For a dense array, the first element is assigned an index of 0, the second an
    index of 1, the third an index of 3, and so on. I will discuss the indexing scheme
    for sparse arrays shortly. Consider the following dense array with three elements.
    Figure [7-1](#A978-1-4842-0713-0_7_Chapter.html#Fig1) shows the element’s values
    and their indexes in the array.


    `var names = ["Fu", "Li", "Ho"]`


    ![A978-1-4842-0713-0_7_Fig1_HTML.jpg](A978-1-4842-0713-0_7_Fig1_HTML.jpg)


    Figure 7-1.


    Array elements and their indexes in a three-element dense array


    You can access the elements of an array the same way you access properties of
    an object. The only difference will be that the property name for the element
    is an integer. For example, in the `names` array, `names[0]` refers to the first
    element `"Fu"`, `names[1]` refers to the second element `"Li"`, and `names[2]`
    refers to the third element `"Ho"`. The following code creates a dense array and
    uses a `for` loop to access and print all elements of the array:


    `// Create an array with three elements`


    `var names = ["Fu", "Li", "Ho"]`


    `// Print all array elements`


    `for(var i = 0, len = names.length; i < len; i++) {`


    `print("names[" + i + "] = " + names[i]);`


    `}`


    `names[0] = Fu`


    `names[1] = Li`


    `names[2] = Ho`


    Adding an element to an array is the same as assigning a value at a nonexisting
    index. The following code creates an array with three elements and adds the fourth
    and fifth elements. Finally, the code prints all elements in the array:


    `// Create an array with three elements`


    `var names = ["Fu", "Li", "Ho"]`


    `// Add fourth element`


    `names[3] = "Su"; // Adds an element at index 3`


    `// Add fifth element`


    `names[4] = "Bo"; // Adds an element at index 4`


    `// Print all array elements`


    `for(var i = 0, len = names.length; i < len; i++) {`


    `print("names[" + i + "] = " + names[i]);`


    `}`


    `names[0] = Fu`


    `names[1] = Li`


    `names[2] = Ho`


    `names[3] = Su`


    `names[4] = Bo`


    Recall that an array is an object, so you can add properties to an array just
    as you add properties to any other objects. If the property name is not an index,
    the property will be simply a property, not an element. A nonelement property
    does not contribute to `length` of the array. The following code creates an array,
    adds an element and a nonelement property, and prints the details:


    `// Create an array with three elements`


    `var names = ["Fu", "Li", "Ho"]`


    `// Add fourth element`'
