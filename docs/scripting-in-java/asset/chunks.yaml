    ];\n// Use the for..in statement to iterate over indices of the array\nfor(var\
    \ index in empNames) {\n  var empName = empNames[index];\n  printf(\"empNames[%s]=%s\"\
    , index, empName);\n}\nempNames[0]=Ken\nempNames[1]=Fred\nempNames[2]=Li\n```\n\
    \n> **Tip**  \n> The `index` in the `for...in` statement is of `String` type,\
