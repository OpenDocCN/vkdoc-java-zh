    ## 数组到 Java 集合的转换


    只要可能，Nashorn 会自动将 Nashorn 数组转换为 Java 数组、`List` 和 `Map`。将 Nashorn 数组转换为 Java 数组和
    `List` 是直接的。当 Nashorn 数组转换为 Java `Map` 时，数组元素的索引会成为 `Map` 中的键，元素的值会成为对应索引的值。考虑一个名为
    `ArrayConversion` 的 Java 类，如清单 7-7 所示。它包含四个方法，分别接受数组、`List` 和 `Map` 作为参数。


    **清单 7-7. 一个名为 ArrayConversion 的 Java 类**


    `// ArrayConversion.java`


    `package com.jdojo.script;`


    `import java.util.Arrays;`


    `import java.util.List;`


    `import java.util.Map;`


    `public class ArrayConversion {`


    `public static void printInts(int[] ids) {`


    `System.out.print("Inside printInts():");`


    `System.out.println(Arrays.toString(ids));`


    `}`


    `public static void printDoubles(double[] salaries) {`


    `System.out.print("Inside printDoubles(double[]):");`


    `System.out.println(Arrays.toString(salaries));`


    `}`


    `public static void printList(List<Integer> idsList) {`


    `System.out.print("Inside printList():");`


    `System.out.println(idsList);`


    `}`


    `public static void printMap(Map<?,?> phoneMap) {`


    `System.out.println("Inside printMap():");`


    `phoneMap.forEach((key, value) -> {`


    `System.out.println("key = " + key + ", value = " + value);`


    `});`


    `}`


    `}`


    考虑如清单 7-8 所示的 Nashorn 脚本。它将 Nashorn 数组传递给期望数组、`List` 和 `Map` 的 Java 方法。输出证明所有方法都被调用，并且
    Nashorn 运行时提供了自动转换。请注意，当 Nashorn 数组包含与 Java 类型不匹配的元素时，这些元素会根据 Nashorn 类型转换规则转换为适当的
    Java 类型。例如，Nashorn 中的字符串会被转换为 Java `int` 类型的 0。


    **清单 7-8. 用于测试 ArrayConversion 类的 Nashorn 脚本**


    `// arrayconversion.js`


    `var ArrayConversion = Java.type("com.jdojo.script.ArrayConversion");`


    `ArrayConversion.printInts([1, 2, 3]);`


    `ArrayConversion.printInts([1, "Hello", 3]); // "hello" 被转换为 0`


    `// 根据 Nashorn 规则，非整数在 Nashorn 数组转换为 Java 数组时会被转换为相应的整数。true 和 false 被`


    `// 转换为 1 和 0，10.3 被转换为 10。`


    `ArrayConversion.printInts([1, true, false, 10.3]);`


    `// Nashorn 数组到 Java double[] 的转换`


    `ArrayConversion.printDoubles([10.89, "Hello", 3]);`


    `// Nashorn 数组到 Java List 的转换`


    `ArrayConversion.printList([10.89, "Hello", 3]);`


    `// Nashorn 数组到 Java Map 的转换`


    `ArrayConversion.printMap([10.89, "Hello", 3]);`


    `Inside printInts():[1, 2, 3]`


    `Inside printInts():[1, 0, 3]`


    `Inside printInts():[1, 1, 0, 10]`


    `Inside printDoubles(double[]):[10.89, NaN, 3.0]`


    `Inside printList():[10.89, Hello, 3]`


    `Inside printMap():`


    `key = 0, value = 10.89`


    `key = 1, value = Hello`


    `key = 2, value = 3`


    有时，Nashorn 无法自动将 Nashorn 数组转换为 Java 数组——尤其是在 Java 方法被重载时。考虑以下会抛出异常的代码：


    `var Arrays = Java.type("java.util.Arrays");`


    `var str = Arrays.toString([0, 1, 2]); // 抛出 java.lang.NoSuchMethodException`


    `Arrays.toString()` 方法被重载，Nashorn 无法决定调用哪个版本的方法。在这种情况下，你必须显式地将 Nashorn 数组转换为特定的
    Java 数组类型，或者选择要调用的特定 Java 方法。以下代码展示了这两种方法：


    `var Arrays = Java.type("java.util.Arrays");`


    `// 显式地将 Nashorn 数组转换为 Java int[]`


    `var str1 = Arrays.toString(Java.to([1, 2, 3], "int[]"));`


    `// 显式选择调用 Arrays.toString(int[]) 方法`


    `var str2 = Arrays["toString(int[])"]([1, 2, 3]);`


    ## 总结


    Nashorn 中的数组是一个专门的对象，称为 `Array` 对象，用于表示有序的值集合。`Array` 对象以特殊方式处理某些属性名称。如果属性名称可以转换为介于
    0 和 2³²-2（含）之间的整数，则此类属性名称称为数组索引，该属性称为元素。`Array` 对象有一个名为 `length` 的特殊属性，表示数组中的元素数量。


    可以使用数组字面量或 `Array` 对象的构造函数创建数组。数组字面量是用方括号括起来的逗号分隔的表达式列表，这些表达式构成数组的元素。Nashorn 中的数组长度可变，可以是密集的或稀疏的。数组中的元素也可以是不同类型的。


    你可以使用方括号表示法和数组元素的索引来访问数组元素。你可以使用 `delete` 运算符删除数组元素。你可以使用 `for` 循环、`for..in` 循环和
    `for..each..in` 循环来迭代数组元素。`for..in` 和 `for..each..in` 循环会迭代数组的元素以及非元素属性。`Array.prototype`
    对象包含一个 `forEach()` 方法，该方法仅迭代数组元素，并为每个元素回调传递的函数。


    `Array` 对象包含几个有用的方法来处理数组元素。`Array.isArray(object)` 静态方法如果指定的 `object` 是数组则返回 `true`；否则返回
    `false`。其他方法如 `concat()`、`join()`、`slice()`、`splice()`、`sort()` 等位于 `Array.prototype`
    对象中。


    类数组对象是一个具有 `length` 属性和有效数组索引属性名称的 Nashorn 对象。`String` 对象和 `arguments` 对象是类数组对象的例子。`Array`
    对象中的大多数方法是通用的，可以在任何类数组对象上使用。


    Nashorn 支持类型化数组。类型化数组是包含原始二进制数据的 `ArrayBuffer` 对象的类型化视图。可以使用不同类型的类型化数组，例如用于处理
    8 位有符号整数的 `Int8Array`、用于处理 32 位有符号整数的 `Int32Array` 等。一旦创建了类型化数组，就可以像使用数组一样处理特定类型的值。`DataView`
    对象提供了一个低级接口来处理 `ArrayBuffer` 对象，其二进制数据可能包含不同类型的数值。


    所有 Nashorn 对象都是映射。Nashorn 允许你以特殊方式处理 Java `Map`，允许你使用方括号表示法以键作为索引来访问它们的值。Nashorn
    允许你将 Java `List` 视为 Nashorn 数组。你可以使用方括号表示法读取和更新 Java `List` 的元素，其中元素的索引被视为数组中的索引。Nashorn
    为 Java `List` 对象创建一个名为 `length` 的特殊属性，该属性表示 `List` 中的元素数量。如果你在 Nashorn 中需要任何其他类型的集合，可以使用
    Java 中的相应集合。


    Nashorn 允许你在脚本中使用 Java 数组。你需要使用 `Java.type()` 方法在脚本中导入 Java 数组类型。例如，`Java.type("int[]")`
    返回一个表示 Java `int[]` 的 Java 类型。一旦获得 Java 数组类型，你需要使用 `new` 运算符来创建数组。Nashorn 还支持
    Nashorn 到 Java 以及 Java 到 Nashorn 的数组转换。`Java.to()` 方法将 Nashorn 数组转换为 Java 数组，`Java.from()`
    方法将 Java 数组转换为 Nashorn 数组。只要类型转换的选择是唯一的，Nashorn 就会尝试自动将 Nashorn 数组转换为 Java 数组、`List`
    和 `Map`。在其他情况下，你需要执行从 Nashorn 数组到集合的显式转换。

