    \n## Preparing for Deployment\n\nBefore you package the classes for the `JKScript`\
    \ script engine, you need to perform one more step: Create a directory named `META-INF`.\
    \ Under the `META-INF` directory, create a subdirectory named `services`. In the\
    \ `services` directory, create a text file named `javax.script.ScriptEngineFactory`.\
    \ Notice that the filename must be the way it is mentioned and should not have\
    \ any extension such as `.txt`.\n\nEdit the `javax.script.ScriptEngineFactory`\
    \ file and enter the contents as shown in Listing 8-4. The first line in the file\
    \ is a comment that starts with a `#` sign. The second line is the fully qualified\
    \ name of the `JKScript` script engine factory class.\n\nListing 8-4. Contents\
    \ of the File Named `javax.script.ScriptEngineFactory`\n\n```\n#The factory class\
    \ for the JKScript engine\ncom.jdojo.script.JKScriptEngineFactory\n```\n\nWhy\
    \ do you have to perform this step? You will package the `javax.script.ScriptEngineFactory`\
    \ file along with the class files for the `JKScript` engine in a JAR file. The\
    \ discovery mechanism for script engines searches for this file in the `META-INF/services`\
    \ directory in all JAR files in the `CLASSPATH`. If this file is found, its contents\
    \ are read and all script factory classes in this file are instantiated and included\
    \ in the list of script engine factories. Therefore, this step is necessary to\
    \ make your `JKScript` engine autodiscoverable by the `ScriptEngineManager`.\n\
    \n## Packaging the JKScript Files\n\nYou need to package all files for the `JKScript`\
    \ script engine in a JAR file named `jkscript.jar`. You can name the file anything\
    \ else as well. The following is the list of files with their directories. Note\
    \ that an empty `manifest.mf` file will work in this case:\n\n- `com\\jdojo\\\
    script\\Expression.class`\n- `com\\jdojo\\script\\JKScriptEngine.class`\n- `com\\\
