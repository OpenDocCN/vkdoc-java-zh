    ## 数组的流式处理


    Java 8 引入了 Streams API，它允许你使用 map-filter-reduce 等多种模式将 Java 集合作为流来处理。Nashorn 中的
    `Array` 对象提供了对数组进行流式处理的方法。这些方法包括：


    *   `map()`

    *   `filter()`

    *   `reduce()`

    *   `reduceRight()`

    *   `forEach()`

    *   `some()`

    *   `every()`


    我已经在上一节中详细讨论了最后三种方法。本节将讨论其他方法。


    `map()` 方法将数组的元素映射为其他值，并返回一个包含映射后值的新数组。原始数组不会被修改。其签名如下：


    `map(callback, thisArg)`


    第一个参数 `callback` 是一个函数，它会为数组中的每个元素调用；该函数接收三个参数：元素的值、元素的索引以及数组本身。函数的返回值是新（映射后）数组的元素。第二个参数用作函数调用中的
    `this` 值。以下是使用 `map()` 方法的示例。它将数字数组的每个元素映射为其平方：


    `var nums = [1, 2, 3, 4, 5];`


    `// 将 nums 数组中的每个元素映射为其平方`


    `var squaredNums = nums.map(function (value, index, data) value * value);`


    `print(nums);`


    `print(squaredNums);`


    `1,2,3,4,5`


    `1,4,9,16,25`


    `filter()` 方法返回一个新数组，其中包含原始数组中通过谓词测试的元素。其签名如下：


    `filter(callback, thisArg)`


    第一个参数 `callback` 是一个函数，它会为数组中的每个元素调用；该函数接收三个参数：元素的值、元素的索引以及数组本身。如果函数返回一个真值，则该元素会被包含在返回的数组中；否则，该元素会被排除。第二个参数用作函数调用中的
    `this` 值。以下代码展示了如何使用 `filter()` 方法从数组中过滤出偶数：


    `var nums = [1, 2, 3, 4, 5];`


    `// 过滤出偶数，只保留奇数`


    `var oddNums = nums.filter(function (value, index, data) (value % 2 !== 0));`


    `print(nums);`


    `print(oddNums);`


    `1,2,3,4,5`


    `1,3,5`


    `reduce()` 方法对数组执行归约操作，将其归约为单个值，例如计算数字数组中所有元素的总和。它返回一个计算后的值。其签名如下：


    `reduce(callback, initialValue)`


    第一个参数 `callback` 是一个函数，它接收四个参数：前一个值、当前值、当前索引以及数组本身。


    如果未指定 `initialValue`：


    *   对于第一次调用 `callback`，数组的第一个元素作为前一个值传递，第二个元素作为当前值传递；第二个元素的索引作为索引传递

    *   对于后续对 `callback` 的调用，前一次调用的返回值作为前一个值传递。当前值和索引是当前元素的值和索引


    如果指定了 `initialValue`：


    *   对于第一次调用 `callback`，`initialValue` 作为前一个值传递，第一个元素作为当前值传递；第一个元素的索引作为索引传递

    *   对于后续对 `callback` 的调用，前一次调用的返回值作为前一个值传递；当前值和索引是当前元素的值和索引


    `reduceRight()` 方法的工作方式与 `reduce()` 方法相同，区别在于它从末尾到开头处理数组的元素。以下代码展示了如何使用 `reduce()`
    和 `reduceRight()` 方法计算数组中所有数字的总和以及连接字符串数组的元素：


    `var nums = [1, 2, 3, 4, 5];`


    `// 定义一个归约器函数来计算数组元素的总和`


    `var sumReducer = function(previous, current, index, data) {`


    `return previous + current;`


    `};`


    `var sum = nums.reduce(sumReducer);`


    `print("Numbers :" + nums);`


    `print("Sum: " + sum);`


    `// 定义一个归约器函数来连接数组的元素`


    `var concatReducer = function(previous, current, index, data) {`


    `return previous + "-" + current;`


    `};`


    `var names = ["Fu", "Li", "Su"];`


    `var namesList = names.reduce(concatReducer);`


    `var namesListRight = names.reduceRight(concatReducer);`


    `print("Names: " + names);`


    `print("Names Reduced List: " + namesList);`


    `print("Names Reduced Right List: " + namesListRight);`


    `Numbers :1,2,3,4,5`


    `Sum: 15`


    `Names: Fu,Li,Su`


    `Names Reduced List: Fu-Li-Su`


    `Names Reduced Right List: Su-Li-Fu`


    你还可以链式调用这些方法，对数组执行复杂的处理。以下代码展示了如何在一个语句中计算数组中所有正奇数的平方和：


    `var nums = [-2, 1, 2, 3, 4, 5, -11];`


    `// 计算所有正奇数的平方和`


    `var sum = nums.filter(function (value, index, data) value > 0 && value % 2 !==
    0)`


    `.map(function (value, index, data) value * value)`


    `.reduce(function (prev, curr, index, data) prev + curr, 0);`


    `print("Numbers: " + nums);`


    `print("Sum of squares of positive odd elements: " + sum);`


    `Numbers: -2,1,2,3,4,5,-11`


    `Sum of squares of positive odd elements: 35`


    ## 类数组对象


    数组有两个特性使其区别于普通对象：


    *   它有一个 `length` 属性

    *   它的元素具有整数形式的特殊属性名


    你可以定义任何具有这两个特性的对象，并将其称为类数组对象。以下代码定义了一个名为 `list` 的对象，它是一个类数组对象：


    `// 创建一个类数组对象`


    `var list = {"0":"Fu", "1":"Su", "2":"Li", length:3};`


    Nashorn 包含一些类数组对象，例如 String 和 `arguments` 对象。`Array.prototype` 对象中的大多数方法都是通用的，这意味着它们可以在任何类数组对象上调用，而不仅仅限于数组。以下代码展示了如何在类数组对象上调用
    `Array.prototype` 对象的 `join()` 方法：


    `// 一个类数组对象`


    `var list = {"0":"Fu", "1":"Su", "2":"Li", length:3};`


    `var joinedList = Array.prototype.join.call(list, "-");`


    `print(joinedList);`


    `Fu-Su-Li`


    String 对象也是一个类数组对象。它维护一个只读的 `length` 属性，并且每个字符都有一个索引作为其属性名。你可以对字符串执行以下类数组操作：


    `// 一个 String 对象`


    `var str = new String("ZIP");`


    `print("str[0] = " + str[0]);`


    `print("str[1] = " + str[1]);`


    `print("str[2] = " + str[2]);`


    `print(''str["length"] = '' + str["length"]);`


    你也可以使用 String 对象的 `charAt()` 和 `length()` 方法获得相同的结果。以下代码将字符串转换为大写，移除英文字母中的元音，并使用连字符作为分隔符连接所有字符。所有这些操作都使用
    `Array.prototype` 对象上的方法完成，就好像该字符串是一个字符数组一样：


    `// 一个 String 对象`


    `var str = new String("Nashorn");`


    `// 在字符串上使用 map-filter-reduce 模式`


    `var newStr = Array.prototype.map.call(str, (function (v, i, d) v.toUpperCase()))`


    `.filter(function (v, i, d) (v !== "A" && v !== ''E'' && v !== ''I'' && v !==
    ''O'' && v !== ''U''))`


    `.reduce(function(prev, cur, i, data) prev + "-" + cur);`


    `print("Original string: " + str);`


    `print("New string: " + newStr);`


    `Original string: Nashorn`


    `New string: N-S-H-R-N`

    '
- fmt: '# Typed Arrays


    Typed arrays in Nashorn are array-like objects. They provide views of raw binary
    data called the buffer. You can have multiple typed views of the same buffer.
    Suppose you have a buffer of 4 bytes. You can have an 8-bit signed integer typed
    array view of the buffer that will represent four 8-bit signed integers. At the
    same time, you can have a 32-bit unsigned integer typed array view of the same
    buffer that can represent one 32-bit unsigned integer.


    **Tip**


    A typed array is an array-like object providing a typed view of raw binary data
    in memory. The specification for typed arrays implementation in Nashorn can be
    found at [`https://www.khronos.org/registry/typedarray/specs/latest/`](https://www.khronos.org/registry/typedarray/specs/latest/).


    The buffer in a typed array is represented by an `ArrayBuffer` object. Using an
    `ArrayBuffer` object directly or indirectly, you can create a typed array view.
    Once you have a typed array view, you can write or read data of the specific type
    supported by the typed array view, using the array-like syntax. In the next section,
    I will discuss how to work with `ArrayBuffer` objects. In the subsequent sections,
    I will discuss different types of typed array views (or simply called typed arrays).


    ## The `ArrayBuffer` Object


    An `ArrayBuffer` object represents a fixed-length buffer of raw binary data. The
    contents of an `ArrayBuffer` does not have a type. You cannot directly modify
    the data in an `ArrayBuffer`; you must create and use one of the typed views on
    it to do so. It contains few properties and methods to copy its contents into
    another `ArrayBuffer` and to query its size.


    The `ArrayBuffer` constructor takes one argument that is the length of the buffer
    in bytes. The length of an `ArrayBuffer` object cannot be changed, after it is
    created. The object has a read-only property named `byteLength` that represents
    the length of the buffer. The following statement creates a buffer of 32 bytes
    and prints its length:


    ```

    // Create a ArrayBuffer of 32 bytes

    var buffer = new ArrayBuffer(32);


    // Assigns 32 to len

    var len = buffer.byteLength;

    ```


    **Tip**


    When you create an `ArrayBuffer`, its contents are initialized to zero. There
    is no way to initialize its contents with values other than zero, at the time
    of creation. Each byte in the `ArrayBuffer` uses a zero-based index. The first
    byte has indexed 0, second 1, third 2, and so on.


    The specification for typed array implemented by Nashorn contains an `isView(args)`
    static method in the `ArrayBuffer` object. However, it does not seem to be implemented
    by Nashorn in Java 8u40. A bug has been filed at [https://bugs.openjdk.java.net/browse/JDK-8061959](https://bugs.openjdk.java.net/browse/JDK-8061959).
    The method returns `true` if the specified argument represents an array buffer
    view. For example, if you pass an object like `Int8Array`, `Int16Array`, `DataView`,
    and so on to this method, it returns `true`, because these objects represent an
    array buffer view. If you pass a simple object or a primitive value to this method,
    it returns `false`. The following code shows how to use this method. Note that
    as of Java 8u40, this method does not exist in Nashorn and the code will throw
    an exception:


    ```

    // Creates an array buffer view of length 4

    var int8View = new Int8Array(4);


    // Assigns true to isView1

    var isView1 = ArrayBuffer.isView(int8View);


    // Assigns false to isView2

    var isView2 = ArrayBuffer.isView({});

    ```


    The `ArrayBuffer` object contains a `slice(start, end)` method that creates and
    returns a new `ArrayBuffer` whose contents are a copy of the original `ArrayBuffer`
    from the index `start`, inclusive, up to `end`, exclusive. If `start` or `end`
    is negative, it refers to an index from the end of the buffer. If `end` is unspecified,
    it defaults to the `byteLength` property of the `ArrayBuffer`. Both `start` and
    `end` are clamped between 0 and `byteLength—1`. The following code shows how to
    use the `slice()` method:


    ```

    // Create an ArrayBuffer of 4 bytes. Bytes have indexes 0, 1, 2, and 3

    var buffer = new ArrayBuffer(4);


    // Manipulate buffer using one of the typed views here...


    // Copy the last 2 bytes from buffer to buffer2

    var buffer2 = buffer.slice(2, 4);


    // Copy the bytes from buffer from index 1 to the end (last 3 bytes)

    // to buffer3

    var buffer3 = buffer.slice(1);

    ```


    ## Views of an `ArrayBuffer`


    There are two types of views of an `ArrayBuffer`:


    - Typed Array Views

    - `DataView` Views'
