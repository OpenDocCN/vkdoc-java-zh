- fmt: "# Serializing Objects\n\nNashorn supports serializing and desterilizing of\
    \ object using a built-in object called `JSON`. JSON is also an acronym that stands\
    \ for JavaScript Object Notation that specifies how a JavaScript object is converted\
    \ to a string and vice versa. JSON is a Data Interchange Format described in RFC\
    \ 4627 at [`http://www.ietf.org/rfc/rfc4627.txt`](http://www.ietf.org/rfc/rfc4627.txt).\
    \ The `JSON` object contains two methods:\n\n- `JSON.stringify(value, replacer,\
    \ indentation)`\n- `JSON.parse(text, reviver)`\n\nThe `JSON.stringify()` method\
    \ converts a Nashorn value into a string. The `JSON.parse()` method converts a\
    \ string in JSON format into a Nashorn value.\n\nThe `value` parameter in the\
    \ `stringify()` method can be an object or a primitive value. Not all types of\
    \ values can be stringified. For example, `undefined` cannot be stringified. `NaN`\
    \ and `Infinity` are stringified as `null`.\n\nThe `replacer` argument is a `function`\
    \ or an array. If `replacer` is a function, it takes two parameters. The first\
    \ parameter is the name of the property being stringified and the second one is\
    \ the value of the property. The returned value of the function is used as the\
    \ final value to be stringified. If the function returns `undefined` or no value,\
    \ the property is not stringified. The first time `replacer` is called with the\
    \ empty string as the property name and the object being stringified as the value.\
    \ Subsequent calls pass the property name and the property value of the property\
    \ being stringified. If `replacer` is an array, it contains the names of the properties\
    \ to be stringified. Any properties not appearing in the array will not be stringified.\n\
    \nThe `indentation` is a number or a string used for indentation in the output.\
    \ If it is a number, it is the number of spaces to be used for indentation. Its\
    \ value is capped at 10. If it is a string such as `\"\\t\"`, it is used for indentation\
    \ at each level. The `replacer` and `indentation` parameters are optional in the\
    \ `stringify()` method.\n\nThe `reviver` is a function that is called when the\
    \ JSON text is being parsed into an object. It takes two parameters. The first\
    \ parameter is the name of the property being parsed and the second one is the\
    \ value of the property. If the function returns `null` or `undefined`, the corresponding\
    \ property is deleted.\n\nListing 4-19 demonstrates the use of the `JSON` object.\
    \ It stringifies an object. During stringification, it multiplies the values of\
    \ the properties by 2. During parsing, it applies the reverse logic to restore\
    \ the object.\n\n**Listing 4-19.** Using the JSON Object to Stringify and Parse\
    \ Objects\n\n```\n// json.js\n\nvar point = {x: 10, y: 20};\n\nfunction replacer\
    \ (key, value) {\n    if (key === \"x\" || key === \"y\") {\n        // Multiply\
    \ the value by 2\n        return value * 2;\n    }\n    else {\n        // Simply\
    \ return the value\n        return value;\n    }\n}\n\nfunction reviver (key,\
    \ value) {\n    if (key === \"x\" || key === \"y\") {\n        // Divide the value\
    \ by 2\n        return value / 2;\n    }\n    else {\n        return value;\n\
    \    }\n}\n\nvar pointString = JSON.stringify(point, replacer, \"  \");\nprint(\"\
    Stringified object is\");\nprint(pointString);\n\nvar obj = JSON.parse(pointString,\
    \ reviver);\nprint(\"Parsed object properties are\");\nfor(var prop in obj) {\n\
    \    print(\"obj[\" + prop + \"] =  \" + obj[prop]);\n}\n```\n\nOutput:\n```\n\
    Stringified object is\n{\n  \"x\": 20,\n  \"y\": 40\n}\nParsed object properties\
    \ are\nobj[x] =  10\nobj[y] =  20\n```\n\n## Dynamically Evaluating Scripts\n\n\
    Nashorn contains a global function called `eval(string)`. It takes a string containing\
    \ Nashorn code as an argument, executes the code, and returns the last evaluated\
    \ value in the code. The following snippet of code shows a trivial example of\
    \ adding two numbers using the `eval()` function:\n\n```\n// Assigns 300 to sum\n\
    var sum = eval(\"100 + 200\");\n```\n\nYou will not use the `eval()` function\
    \ for such a trivial computation. Nashorn can execute an arithmetic expression\
    \ like `100 + 200` without using the `eval()` function. You will use it when you\
    \ get Nashorn code as a string at runtime.\n\nThe `eval()` function is executed\
    \ in the context of the caller. If it is called from the global context, it executes\
    \ in the global context. If it is called from a function, it executes in the context\
    \ of the function.\n\nListing 4-20 demonstrates the context of the `eval()` function\
    \ execution. The first time, it is called in the global context, so it defines\
    \ a new variable `z` and sets it to 300 in the global context. It reads the value\
    \ of `x` from the global context, multiplies it with 2, and returns 200 that is\
    \ set to `y`. The second time, it is called from the function and it works on\
    \ local variables `x`, `y`, and `z` of the function.\n\n**Listing 4-20.** The\
    \ Contents of the EvalTest.js File\n\n```\n// EvalTest.js\n\nvar x = 100;\nvar\
    \ y = eval(\"var z = 300; x * 2;\"); // Called from the global context\nprint(x,\
    \ y, z);\n\nfunction testEval() {\n    var x = 300;\n    // Called from the function\
    \ context\n    var y = eval(\"var z = 900; x * 2;\");\n    print(x, y, z);\n}\n\
    \ntestEval();\n```\n\nOutput:\n```\n100 200 300\n300 600 900\n```"
  raw: '## Serializing Objects


    Nashorn supports serializing and desterilizing of object using a built-in object
    called `JSON`. JSON is also an acronym that stands for JavaScript Object Notation
    that specifies how a JavaScript object is converted to a string and vice versa.
    JSON is a Data Interchange Format described in RFC 4627 at [`http://www.ietf.org/rfc/rfc4627.txt`](http://www.ietf.org/rfc/rfc4627.txt)
    . The `JSON` object contains two methods:


    *   `JSON.stringify(value, replacer, indentation)`

    *   `JSON.parse(text, reviver)`


    The `JSON.stringify()` method converts a Nashorn value into a string. The `JSON.parse()`
    method converts a string in JSON format into a Nashorn value.


    The `value` parameter in the `stringify()` method can be an object or a primitive
    value. Not all types of values can be stringified. For example, `undefined` cannot
    be stringified. `NaN` and `Infinity` are stringified as `null`.


    The `replacer` argument is a `function` or an array. If `replacer` is a function,
    it is takes two parameter. The first parameter is the name of the property being
    stringified and the second one is the value of the property. The returned value
    of the function is used as the final value to be stringified. If the function
    returns `undefined` or no value, the property is not stringified. The first time
    `replacer` is called with the empty string as the property name and the object
    being stringified as the value. Subsequent calls pass the property name and the
    property value of the property being stringified. If `replacer` is an array, it
    contains the names of the properties to be stringified. Any properties not appearing
    in the array will not be stringified.


    The `indentation` is a number or a string used for indentation in the output.
    If it is a number, it is the number of spaces to be used for indentation. Its
    value is capped at 10\. If it is a string such as `"\t"`, it is used for indentation
    at each level. The `replacer` and `indentation` parameters are optional in the
    `stringify()` method.


    The `reviver` is a function that is called when the JSON text is being parsed
    into an object. It takes two parameters. The first parameter is the name of the
    property being parsed and the second one is the value of the property. If the
    function returns `null` or `undefined`, the corresponding property is deleted.


    Listing 4-19 demonstrates the use of the `JSON` object. It stringifies an object.
    During stringification, it multiplies the values of the properties by 2\. During
    parsing, it applies the reverse logic to restore the object.


    Listing 4-19\. Using the JSON Object to Stringify and Parse Objects


    `// json.` `js`


    `var point = {x: 10, y: 20};`


    `function replacer (key, value) {`


    `if (key === "x" || key === "y") {`


    `// Multiply the value by 2`


    `return value * 2;`


    `}`


    `else {`


    `// Simply return the value`


    `return value;`


    `}`


    `}`


    `function reviver (key, value) {`


    `if (key === "x" || key === "y") {`


    `// Divide the value by 2`


    `return value / 2;`


    `}`


    `else {`


    `return value;`


    `}`


    `}`


    `var pointString = JSON.stringify(point, replacer, "  ");`


    `print("Stringified object is");`


    `print(pointString);`


    `var obj = JSON.parse(pointString, reviver);`


    `print("Parsed object proeprties are");`


    `for(var prop in obj) {`


    `print("obj[" + prop + "] =  " + obj[prop]);`


    `}`


    `Stringified object is`


    `{`


    `"x": 20,`


    `"y": 40`


    `}`


    `Parsed object proeprties are`


    `obj[x] =  10`


    `obj[y] =` `20`


    ## Dynamically Evaluating Scripts


    Nashorn contains a global function called `eval(string)`. It takes a string containing
    Nashorn code as an argument, executes the code, and returns the last evaluated
    value in the code. The following snippet of code shows a trivial example of adding
    two numbers using the `eval()` function:


    `// Assigns 300 to sum`


    `var sum = eval("100 + 200");`


    You will not use the `eval()` function for such a trivial computation. Nashorn
    can execute an arithmetic expression like 100 + 200 without using the `eval()`
    function. You will use it when you get Nashorn code as a string at runtime.


    The `eval()` function is executed in the context of the caller. If it is called
    from the global context, it executes in the global context. If it is called from
    a function, it executes in the context of the function.


    Listing 4-20 demonstrates the context of the `eval()` function execution. The
    first time, it is called in the global context, so it defined a new variable `z`
    and sets it to 300 in the global context. It reads the value of `x` from the global
    context, multiplies it with 2, and returns 200 that is set to `y`. The second
    time, it is called from the function and it works on local variables `x`, `y`,
    and `x` of the function.


    Listing 4-20\. The Contents of the EvalTest.js File


    `// EvalTest.js`


    `var x = 100;`


    `var y = eval("var z = 300; x * 2;"); // Called from the global context`


    `print(x, y, z);`


    `function testEval() {`


    `var x = 300;`


    `// Called from the function context`


    `var y = eval("var z = 900; x * 2;");`


    `print(x, y, z);`


    `}`


    `testEval();`


    `100 200 300`


    `300 600 900`'
  trans: '

    ## 序列化对象


    Nashorn 支持使用名为 `JSON` 的内置对象来序列化和反序列化对象。JSON 也是一个缩写，全称为 JavaScript Object Notation，它规定了如何将
    JavaScript 对象转换为字符串，反之亦然。JSON 是一种数据交换格式，在 [`http://www.ietf.org/rfc/rfc4627.txt`](http://www.ietf.org/rfc/rfc4627.txt)
    的 RFC 4627 中进行了描述。`JSON` 对象包含两个方法：


    *   `JSON.stringify(value, replacer, indentation)`

    *   `JSON.parse(text, reviver)`


    `JSON.stringify()` 方法将 Nashorn 值转换为字符串。`JSON.parse()` 方法将 JSON 格式的字符串转换为 Nashorn
    值。


    `stringify()` 方法中的 `value` 参数可以是一个对象或一个原始值。并非所有类型的值都能被字符串化。例如，`undefined` 不能被字符串化。`NaN`
    和 `Infinity` 会被字符串化为 `null`。


    `replacer` 参数是一个 `function` 或一个数组。如果 `replacer` 是一个函数，它接受两个参数。第一个参数是被字符串化的属性名称，第二个参数是该属性的值。该函数的返回值将作为最终被字符串化的值。如果函数返回
    `undefined` 或不返回任何值，则该属性不会被字符串化。第一次调用 `replacer` 时，属性名称为空字符串，值为被字符串化的对象。后续调用则传入被字符串化属性的属性名称和属性值。如果
    `replacer` 是一个数组，它包含要字符串化的属性名称。数组中未出现的任何属性都不会被字符串化。


    `indentation` 是一个数字或字符串，用于输出中的缩进。如果它是一个数字，则表示用于缩进的空格数。其值上限为 10。如果它是一个字符串，例如 `"\t"`，则用于每一级的缩进。`replacer`
    和 `indentation` 参数在 `stringify()` 方法中是可选的。


    `reviver` 是一个函数，在将 JSON 文本解析为对象时调用。它接受两个参数。第一个参数是被解析的属性名称，第二个参数是该属性的值。如果函数返回 `null`
    或 `undefined`，则相应的属性会被删除。


    清单 4-19 演示了 `JSON` 对象的使用。它序列化一个对象。在序列化过程中，它将属性的值乘以 2。在解析过程中，它应用反向逻辑来恢复对象。


    清单 4-19\. 使用 JSON 对象序列化和解析对象


    `// json.js`


    `var point = {x: 10, y: 20};`


    `function replacer (key, value) {`


    `if (key === "x" || key === "y") {`


    `// 将值乘以 2`


    `return value * 2;`


    `}`


    `else {`


    `// 直接返回值`


    `return value;`


    `}`


    `}`


    `function reviver (key, value) {`


    `if (key === "x" || key === "y") {`


    `// 将值除以 2`


    `return value / 2;`


    `}`


    `else {`


    `return value;`


    `}`


    `}`


    `var pointString = JSON.stringify(point, replacer, "  ");`


    `print("序列化后的对象是");`


    `print(pointString);`


    `var obj = JSON.parse(pointString, reviver);`


    `print("解析后的对象属性是");`


    `for(var prop in obj) {`


    `print("obj[" + prop + "] =  " + obj[prop]);`


    `}`


    `序列化后的对象是`


    `{`


    `"x": 20,`


    `"y": 40`


    `}`


    `解析后的对象属性是`


    `obj[x] =  10`


    `obj[y] = 20`


    ## 动态评估脚本


    Nashorn 包含一个名为 `eval(string)` 的全局函数。它接受一个包含 Nashorn 代码的字符串作为参数，执行该代码，并返回代码中最后一个被评估的值。以下代码片段展示了一个使用
    `eval()` 函数将两个数字相加的简单示例：


    `// 将 300 赋值给 sum`


    `var sum = eval("100 + 200");`


    你不会为了如此简单的计算而使用 `eval()` 函数。Nashorn 可以在不使用 `eval()` 函数的情况下执行像 100 + 200 这样的算术表达式。当你需要在运行时获取
    Nashorn 代码字符串时，才会使用它。


    `eval()` 函数在调用者的上下文中执行。如果从全局上下文中调用，它就在全局上下文中执行。如果从一个函数中调用，它就在该函数的上下文中执行。


    清单 4-20 演示了 `eval()` 函数执行的上下文。第一次，它在全局上下文中被调用，因此它在全局上下文中定义了一个新变量 `z` 并将其设置为 300。它从全局上下文中读取
    `x` 的值，将其乘以 2，并返回 200 赋值给 `y`。第二次，它从函数内部被调用，并作用于该函数的局部变量 `x`、`y` 和 `z`。


    清单 4-20\. EvalTest.js 文件的内容


    `// EvalTest.js`


    `var x = 100;`


    `var y = eval("var z = 300; x * 2;"); // 从全局上下文调用`


    `print(x, y, z);`


    `function testEval() {`


    `var x = 300;`


    `// 从函数上下文调用`


    `var y = eval("var z = 900; x * 2;");`


    `print(x, y, z);`


    `}`


    `testEval();`


    `100 200 300`


    `300 600 900`

