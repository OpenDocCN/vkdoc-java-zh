    The `jrunscript` shell allows passing arguments to scripts. The arguments are
    made available to the script in an array-like object named `arguments`. You can
    access the `arguments` array inside the script in a language-specific way. The
    following command passes three arguments of 10, 20, and 30, and prints the value
    of the first argument:


    `C:\>jrunscript -e "print(''First argument is '' + arguments[0])" 10 20 30`


    `First argument is 10`


    Consider the Nashorn JavaScript file `nashornargstest.js` shown in Listing 9-2,
    which prints the number of arguments and their values that are passed to the script.


    Listing 9-2\. A nashornargstest.js File Written in Nashorn JavaScript to Print
    Command-Line Arguments


    `// nashornargstest.js`


    `print("Number of arguments:" + arguments.length);`


    `print("Arguments are ") ;`


    `for(var i = 0; i < arguments.length; i++) {`


    `print(arguments[i]);`


    `}`


    The following commands run the `nashornargstest.js` file using the `jrunscript`
    shell:


    `C:\>jrunscript nashornargstest.js`


    `Number of arguments:0`


    `Arguments are`


    `C:\>jrunscript nashornargstest.js 10 20 30`


    `Number of arguments:3`


    `Arguments are`


    `10`


    `20`


    `30`


    If you want to run the `nashornargstest.js` file from a Java application, you
    need to pass an argument named `arguments` to the engine. The argument named `arguments`
    is passed to the script by the shell automatically, not by a Java application.


    ## Global Functions


    The `jrunscript` command-line shell makes several global functions available for
    use as listed in Table [9-3](#A978-1-4842-0713-0_9_Chapter.html#Tab3).


    Table 9-3.


    The List of Global Objects Loaded by the jrunscript Command-Line Shell


    | Function | Description |

    | --- | --- |

    | `cat(path, pattern)` | Shows the content of a file, URL, or InputStream specified
    by `path`. Optionally, you can specify `pattern` to show only the matching contents.
    |

    | `cd(target)` | Changes the present working directory to the `target` directory.
    |

    | `cp(from, to)` | Copies a file, URL, or stream to another file or stream. |

    | `date()` | Prints the current date using the current locale. |

    | `del(pathname)` | A synonym for the `rm` command. |

    | `dir(d, filter)` | A synonym for the `ls` command. |

    | `dirname(pathname)` | Returns the directory part of the specified `pathname`.
    |

    | `echo(str)` | Echoes the specified string arguments. |

    | `exec(cmd)` | Starts a child process, executes the specified command, waits
    for completion, and returns the exit code. |

    | `exit(code)` | Exit the shell program with the specified `code` as the exit
    code. |

    | `find(dir, pattern, callback)` | Find files in `dir` with file names matching
    the specified `pattern`. When a match is found, the `callback` function is called
    passing the found file. Search is performed recursively in all subdirectories.
    You can pass some functions listed in this table as `callback`. If `callback`
    is not specified, the default is to print the found files path. If `pattern` is
    not specified, all files are printed. |

    | `grep(pattern, files)` | Unix-like `grep`, but accepts JavaScript regex patterns.
    |

    | `ip(name)` | Prints the IP addresses of a given domain name. |

    | `load(path)` | Loads and evaluates JavaScript code from a stream, file, or URL.
    |

    | `ls(dir, filter)` | Lists the files in `dir` matching the `filter` regular expression.
    |

    | `mkdir(dir)` | Creates a new directory with the name `dir`. |

    | `mkdirs(dir)` | Creates a directory named `dir`, including any necessary but
    nonexistent parent directories. |

    | `mv(from, to)` | Moves a file to another directory. |

    | `printf(format, args)` | A C-like printf. |

    | `pwd()` | Prints the working directory. |

    | `quit(code)` | A synonym for `exit(code)`. |

    | `read(prompt, multiline)` | Reads and returns one or more lines from standard
    input after printing the specified `prompt`. The default prompt is a `>`. If `multiline`
    is 0, it reads one line. If `multiline` is other than 0, it reads multiple lines.
    You need to press `Enter` to stop entering text. |

    | `ren(from, to)` | A synonym for `mv`. |

    | `rm(filePath)` | Removes the file with the specified `filePath`. |

    | `rmdir(dirPath)` | Removes the directory with the specified `dirPath`. |

    | `which(cmd)` | Unix-like which `command` to print the path of the specified
    `cmd` command based on the PATH environment variable. |

    | `XMLDocument(input)` | Converts `input` that can be a filepath or a `Reader`
    to DOM Document object. If `input` is not specified, an empty DOM document is
    returned. |

    | `XMLResult(input)` | Convert an arbitrary stream or file to an `XMLResult`.
    If `input` is an instance of `javax.xml.transform.Result`, `input` is returned;
    if `input` is an instance of `org.w3c.dom.Document`, a `javax.xml.transform.dom.DOMResult`
    is returned; otherwise, a `javax.xml.transform.stream.StreamResult` is returned.
    |

    | `XMLSource(input)` | Converts an arbitrary stream, file, URL to an `XMLSource`.
    If `input` is an instance of `javax.xml.transform.Source`, `input` is returned;
    if `input` is an instance of `org.w3c.dom.Document`, a `javax.xml.transform.dom.DOMSource`
    is returned; otherwise, a `javax.xml.transform.stream.StreamSource` is returned.
    |

    | `XSLTransform(input, style, output)` | Perform an XSLT transform; `input` is
    the input XML; `style` is the XML stylesheet; `output` is the output XML. `Input`
    and `style` can be a `URL`, a `File` or an `InputStream`; output can be a `File`
    or an `OutputStream`. |


    The following is the output of using some of the utility functions provided by
    `jrunscript`:


    `C:\>jrunscript`


    `nashorn> cat("` [`http://jdojo.com/about`](http://jdojo.com/about) `", "ksharan")`'
