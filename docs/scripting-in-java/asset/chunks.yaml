    ## 实例化 Nashorn 引擎


    在前面的章节中，你一直在 Java 代码中使用标准的 Java Scripting API 来实例化 Nashorn 引擎。Nashorn 引擎提供了若干自定义特性。要利用这些特性，你需要直接实例化
    Nashorn 引擎。首先，你需要创建一个 `NashornScriptEngineFactory` 类的对象，然后调用 `getScriptEngine()`
    方法的某个重载版本来创建 Nashorn 引擎：


    `// 创建一个 Nashorn 引擎工厂`


    `NashornScriptEngineFactory factory = new NashornScriptEngineFactory();`


    `// 使用默认选项创建一个 Nashorn 引擎`


    `ScriptEngine engine = factory.getScriptEngine();`


    默认情况下，Nashorn 引擎工厂会创建一个启用了 `--dump-on-error` 选项的 Nashorn 引擎。我将在下一个示例中向你展示如何为 Nashorn
    引擎设置其他选项。


    以下代码片段创建了一个带有 `--no-java` 和 `–strict` 选项的 Nashorn 引擎：


    `// 创建一个 Nashorn 引擎工厂`


    `NashornScriptEngineFactory factory = new NashornScriptEngineFactory();`


    `// 将 Nashorn 选项存储在一个字符串数组中`


    `String[] options = {"--no-java", "-strict"};`


    `// 使用这些选项创建 Nashorn 引擎`


    `ScriptEngine engine = factory.getScriptEngine(options);`


    由于 `--no-java` 选项的存在，你无法在此引擎执行的脚本中使用任何 Java 类。`–strict` 选项将强制引擎以严格模式执行所有脚本。


    你也可以在命令行中使用 `nashorn.args` 系统属性将选项传递给 Nashorn 引擎。以下命令运行 `com.jdojo.script.Test`
    类，并向 Nashorn 引擎传递了四个选项：


    `java -Dnashorn.args="--global-per-engine -strict --no-java --language=es5" com.jdojo.script.Test`


    请注意，选项之间用空格分隔，并且它们都作为一个字符串传递。如果你只需要传递一个选项，可以省略选项值周围的双引号。以下命令只向引擎传递了一个选项 `--no-java`：


    `java -Dnashorn.args=--no-java com.jdojo.script.Test`


    以下代码片段使用一个类过滤器（即 `ClassFilter` 接口的实例）来创建 Nashorn 引擎，以限制使用 `com.jdojo` 包及其子包中的任何类。请注意，`ClassFilter`
    接口是在 JDK8u40 中添加的；它在 JDK8 中不可用：


    `NashornScriptEngineFactory factory = new NashornScriptEngineFactory();`


    `ScriptEngine engine = factory.getScriptEngine(clsName -> clsName.startsWith("com.jdojo"));`


    `ClassFilter` 是一个函数式接口。它的方法接收 Nashorn 脚本试图使用的 Java 类的完全限定名。如果该方法返回 `true`，则该类可以在脚本中使用；否则，该类不能在脚本中使用。


    提示


    如果你不希望脚本中暴露任何 Java 类，可以使用 `clsName -> false` 作为 `ClassFilter` 的 lambda 表达式。在脚本中使用被
    `ClassFilter` 限制的 Java 类会抛出 `java.lang.ClassNotFound` 异常。


    以下是 `NashornScriptEngineFactory` 类中 `getScriptEngine()` 方法的重载版本列表：


    *   `ScriptEngine getScriptEngine()`

    *   `ScriptEngine getScriptEngine(String... args)`

    *   `ScriptEngine getScriptEngine(ClassFilter classFilter)`

    *   `ScriptEngine getScriptEngine(ClassLoader appLoader)`

    *   `ScriptEngine getScriptEngine(String[] args, ClassLoader appLoader)`

    *   `ScriptEngine getScriptEngine(String[] args, ClassLoader appLoader, ClassFilter
    classFilter)`


    ## 共享引擎全局变量


    默认情况下，Nashorn 引擎会为每个脚本上下文维护全局对象。在此讨论中，术语“全局变量”指的是存储在 Nashorn 脚本全局作用域中的全局变量和声明，你在顶层脚本中通过
    `this` 来引用它们。不要将脚本上下文中的全局作用域绑定与脚本中的全局变量混淆。当你在脚本中引用任何变量或创建变量时，会首先搜索脚本全局变量。如果你在脚本中引用一个在脚本全局变量中找不到的变量，引擎将在脚本上下文的全局作用域
    `bindings` 中搜索它。例如，脚本对象 `Object`、`Math`、`String` 等都属于脚本全局变量。请考虑清单 12-1 中的程序及其输出。


    清单 12-1\. 每个 Nashorn 引擎使用多个脚本全局变量


    `// MultiGlobals.java`


    `package com.jdojo.script;`


    `import javax.script.ScriptContext;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.SimpleScriptContext;`


    `public class MultiGlobals {`


    `public static void main(String[] args) {`


    `// 获取 Nashorn 脚本引擎`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `try {`


    `// 向脚本全局变量添加一个名为 msg 的变量`


    `engine.eval("var msg = ''Hello globals''");`


    `// 打印 msg 变量的值`


    `engine.eval("print(this.msg);");`


    `// 使用一个新的 ScriptContext 对象执行与上面相同的脚本。`


    `// 引擎将使用一份全新的全局变量副本，并且找不到之前`


    `// 创建并与引擎默认脚本上下文关联的 this.msg。`


    `ScriptContext ctx = new SimpleScriptContext();`


    `engine.eval("print(this.msg);", ctx);`


    `}`


    `catch (Exception e) {`


    `e.printStackTrace();`


    `}`


    `}`


    `}`


    `Hello globals`


    `undefined`


    该程序执行了以下步骤：


    *   使用默认选项创建一个 Nashorn 引擎。

    *   使用 `eval()` 方法执行一个脚本，该方法使用引擎的默认脚本上下文。该脚本创建了一个名为 `msg` 的全局变量，该变量存储在脚本全局变量中。你可以在全局作用域中使用其简单名称
    `msg` 或 `this.msg` 来引用该变量。

