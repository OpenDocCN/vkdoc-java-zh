    printf(\"isFinite(%s) = %b\", 1089, isFinite(1089));\nprintf(\"isFinite('%s')\
    \ = %b\", \"1089\", isFinite('1089'));\nprintf(\"isFinite('%s') = %b\", \"Hello\"\
    , isFinite('Hello'));\nprintf(\"isFinite(%s) = %b\", \"true\", isFinite(true));\n\
    printf(\"isFinite(%s) = %b\", \"new Object()\", isFinite(new Object()));\nprintf(\"\
    isFinite(%s) = %b\", \"new Object(7889)\", isFinite(new Object(7889)));\n```\n\
    \n```\nisFinite(NaN) = false\nisFinite(Infinity) = false\nisFinite(-Infinity)\
    \ = false\nisFinite(1089) = true\nisFinite('1089') = true\nisFinite('Hello') =\
    \ false\nisFinite(true) = true\nisFinite(new Object()) = false\nisFinite(new Object(7889))\
    \ = true\n```\n\n### The `decodeURI()` Function\n\nThe `decodeURI()` function\
    \ has the following signature:\n\n`decodeURI(encodedURI)`\n\nThe `decodeURI()`\
    \ function returns `encodedURI` after replacing the escape sequences by the characters\
    \ they represent. The following code decodes a URI that contains `%20` as an escape\
    \ sequence that is converted to a space:\n\n```\nvar encodedUri = \"http://www.jdojo.com/hi%20there\"\
    ;\nvar decodedUri = decodeURI(encodedUri);\nprint(\"Encoded URI:\", encodedUri);\n\
    print(\"Decoded URI:\", decodedUri);\n```\n\n```\nEncoded URI: http://www.jdojo.com/hi%20there\n\
    Decoded URI: http://www.jdojo.com/hi there\n```\n\n### The `decodeURIComponent()`\
    \ Function\n\nThe `decodeURIComponent()` function has the following signature:\n\
    \n`decodeURIComponent(encodedURIComponent)`\n\nThe `decodeURIComponent()` function\
    \ is used to replace the escape sequences in the URI components (values in the\
    \ URI’s query part) with the corresponding characters. For example, `%26` needed\
    \ to be used as an escape sequence in the value for an ampersand. This function\
    \ will convert `%26` to an ampersand. The following code shows how to use this\
    \ function:\n\n```\nvar encodedUriComponent = \"Ken%26Donna\";\nvar decodedUriComponent\
    \ = decodeURIComponent(encodedUriComponent);\nprint(\"Encoded URI Component:\"\
    , encodedUriComponent);\nprint(\"Decoded URI Component:\", decodedUriComponent);\n\
    ```\n\n```\nEncoded URI Component: Ken%26Donna\nDecoded URI Component: Ken&Donna\n\
    ```"
