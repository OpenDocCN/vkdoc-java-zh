    The `switch` statement in Nashorn works pretty much the same as the `switch` statement
    in Java works. Its syntax is:


    `switch(expression) {`


    `case expression-1:`


    `statement-1;`


    `case expression-2:`


    `statement-2;`


    `default:`


    `statement-3;`


    `}`


