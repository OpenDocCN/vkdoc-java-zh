    \ that uses a new script context. The script tries to print the value of the global\
    \ variable `msg`. The second line in the output, by printing `undefined`, confirms\
    \ that the variable named `msg` does not exist in the script globals.\n\nThis\
    \ is the default behavior of the Nashorn engine. It creates a fresh copy of the\
    \ globals per script context. If you want to use the globals of the default context\
    \ (if you want to share globals), you can do so by copying the engine scope `Bindings`\
    \ of the default context to your new script context. Listing 12-2 uses this approach\
    \ to share the script globals between two script contexts.\n\n**Listing 12-2.**\
    \ Sharing Script Globals by Copying the Engine Scope Bindings of the Engine’s\
    \ Default Context\n\n```\n// CopyingGlobals.java\npackage com.jdojo.script;\n\n\
    import javax.script.Bindings;\nimport javax.script.ScriptContext;\nimport static\
    \ javax.script.ScriptContext.ENGINE_SCOPE;\nimport javax.script.ScriptEngine;\n\
    import javax.script.ScriptEngineManager;\nimport javax.script.SimpleScriptContext;\n\
    \npublic class CopyingGlobals {\n    public static void main(String[] args) {\n\
    \        // Get the Nashorn script engine\n        ScriptEngineManager manager\
    \ = new ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n\n        try {\n            // Add a variable named msg to the\
    \ global scope of the script\n            engine.eval(\"var msg = 'Hello globals'\"\
    );\n\n            // Print the value of the msg value\n```"
