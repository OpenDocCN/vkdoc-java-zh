  raw: 'Notice that the `exec()` method starts the search from the position defined
    by the `lastIndex` property of the `RegExp` object. If you are performing a global
    search, you can use a loop to find all matches in the input text. Listing 4-25
    demonstrates how to use the `exec()` method.


    Listing 4-25\. Using the exec() Method of the RegExp Object for a Global Match


    `// regexexec.js`


    `var pattern = /Java/g;`


    `var text = "Java and JavaScript are not the same";`


    `var result;`


    `while((result = pattern.exec(text)) !== null) {`


    `var msg = "Matched ''" + result[0] + "''" + " at " + result.index +`


    `". Next match will begin at " + pattern.lastIndex;`


    `print(msg);`


    `}`


    `print("After the search finishes, lastIndex = " + pattern.lastIndex);`


    `Matched ''Java'' at 0\. Next match will begin at 4`


    `Matched ''Java'' at 9\. Next match will begin at 13`


    `After the search finishes, lastIndex = 0`


    Be careful not to use the `exec()` method in a loop when the search is not global,
    because for the nonglobal match, it does not change the `lastIndex` property that
    will make the loop an infinite loop. You should call the method only once for
    the nonglobal match. The following code will run forever:


    `var pattern = /Java/; // A non-global pattern`


    `var text = "Java and JavaScript are not the same";`


    `var result;`


    `/* Do not use this loop. It will run forever because`


    `pattern is non-global.`


    `*/`


    `while((result = pattern.exec(text)) !== null) {`


    `// Code goes here`


    `}`


    Some characters when used in certain contexts have special meaning. These characters
    are known as metacharacters and they are `(, )`, `[`, `]`, `{`, `}`, `\`, `^`,
    `$`, `|`, `?`, `*`, `+`, and the dot. I will discuss the special meanings of these
    characters at appropriate places in this section.


    In a regular expression, a set of characters enclosed within a pair of brackets
    is known as a character class. The regular expression will match any of the characters
    in the set. For example, `/[abc]/` will match `a`, `b`, or `c` in the input text.
    You can also specify a range of characters using a character class. The range
    is expressed using a hyphen. For example, `[a-z]` represents any lowercase English
    letters; `[0-9]` represents any digit between 0 and 9\. If you use the character
    `^` in the beginning of a character class, it means complement (meaning not).
    For example, `[^abc]` means any character except `a`, `b`, and `c`. The character
    class `[^a-z]` represents any character except lowercase English letters. If you
    use the character `^` anywhere in a character class, except in the beginning,
    it loses the special meaning and it matches just a `^` character. For example,
    `[abc^]` will match `a`, `b`, `c`, or `^`. Character classes also support multiple
    ranges and operations such as union, intersection, subtraction on those ranges.
    Table [4-18](#A978-1-4842-0713-0_4_Chapter.html#Tab18) shows a few examples of
    using ranges in character classes. Nashorn has some predefined character classes
    as listed in Table [4-19](#A978-1-4842-0713-0_4_Chapter.html#Tab19).


    Table 4-19.


    The List of the Predefined Character Classes


    | Predefined Character Classes | Meaning |

    | --- | --- |

    | . (a dot) | Any character (may or may not match line terminators) |

    | `\d` | A digit. Same as `[0-9]` |

    | `\D` | A non-digit. Same as `[^0-9]` |

    | `\s` | A whitespace character. Same as `[\t\n\x0B\f\r]`. The list includes a
    space, a tab, a new line, a vertical tab, a form feed, and a carriage return characters
    |

    | `\S` | A non-whitespace character. Same as `[^\s]` |

    | `\w` | A word character. Same as `[a-zA-Z_0-9]`. The list includes lowercase
    letters, uppercase letter, underscore, and decimal digits |

    | `\W` | A nonword character. Same as `[^\w]` |


    Table 4-18.


    A Few Examples of Character Classes


    | Character Classes | Meaning | Category |

    | --- | --- | --- |

    | `[abc]` | Character `a`, `b,` or `c` | Simple character class |

    | `[^xyz]` | A character except `x`, `y,` and `z` | Complement or negation |

    | `[a-p]` | Characters `a` through `p` | Range |

    | `[a-cx-z]` | Characters `a` through `c`, or `x` through `z`, which would include
    `a`, `b`, `c`, `x`, `y`, or `z`. | Union |

    | `[0-9&&[4-8]]` | Intersection of two ranges (`4`, `5`, `6`, `7`, or `8`) | Intersection
    |

    | `[a-z&&[^aeiou]]` | All lowercase letters minus vowels. In other words, a lowercase
    letter that is not a vowel. That is, all lowercase consonants. | Subtraction |


    You can also specify the number of times a character in a regular expression may
    match the sequence of characters. If you want to match all two digit integers,
    the regular expression would be `/\d\d/`, which is the same as `/[0-9][0-9]/`.
    What would be the regular expression to match an integer? You cannot write the
    regular expression to match an integer with the knowledge you have gained so far.
    You need to be able to express a pattern “one digit or more” using a regular expression.
    Quantifiers and their meanings have been listed in Table [4-20](#A978-1-4842-0713-0_4_Chapter.html#Tab20).


    Table 4-20.


    Quantifiers and Their Meanings


    | Quantifiers | Meaning |

    | --- | --- |

    | `*` | Zero or more times |

    | `+` | One or more times |

    | `?` | Once or not at all |

    | `{m}` | Exactly `m` times |

    | `{m, }` | At least `m` times |

    | `{m, n}` | At least m`,` but not more than n times |


    It is important to notice that quantifiers must follow a character or character
    class for which it specifies the quantity. The regular expression to match any
    integer would be `/\d+/`, which specifies: “match one or more number of digits”.
    Is this solution for matching integer correct? No, it is not. Suppose that the
    text is “This is text123 which contains 10 and 120”. If we match the pattern `/\d+/`
    against the text, it will match against 123, 10, and 120\. The following code
    demonstrates this:


    `var pattern = /\d+/g;`


    `var text = "This is text123 which contains 10 and 120";`


    `var result;`


    `while((result = pattern.exec(text)) !== null) {`


    `print("Matched ''" + result[0] + "'' at " + result.index +`


    `". Next match will begin at " + pattern.lastIndex);`


    `}`


    `Matched ''123'' at 12\. Next match will begin at 15`


    `Matched ''10'' at 31\. Next match will begin at 33`


    `Matched ''120'' at 38\. Next match will begin at 41`


    Notice that 123 is not used as an integer rather it is part of the word text123\.
    If you are looking for integers inside the text, certainly 123 in text123 does
    not qualify to be an integer. You want to match all integers, which form a word
    in the text. You need to specify that the match should be performed only on word
    boundaries, not inside text having embedded integers. This is necessary to exclude
    integer 123 from the result. Table [4-21](#A978-1-4842-0713-0_4_Chapter.html#Tab21)
    lists metacharacters that match boundaries in a regular expression.


    Table 4-21.


    List of Boundary Matchers Inside Regular Expressions


    | Boundary Matchers | Meaning |

    | --- | --- |

    | ^ | The beginning of a line |

    | `$` | The end of a line |

    | `\b` | A word boundary |

    | `\B` | A nonword boundary |

    | `\A` | The beginning of the input |

    | `\G` | The end of previous match |

    | `\Z` | The end of the input but for the final terminator, if any |

    | `\z` | The end of the input |


    With the knowledge of boundary matchers, you can rewrite the previous example
    to match only integers in the input text:


    `var pattern = /\b\d+\b/g;`


    `var text = "This is text123 which contains 10 and 120";`


    `var result;`


    `while((result = pattern.exec(text)) !== null) {`


    `print("Matched ''" + result[0] + "'' at " + result.index +`


    `". Next match will begin at " + pattern.lastIndex);`


    `}`


    `Matched ''10'' at 31\. Next match will begin at 33`


    `Matched ''120'' at 38\. Next match will begin at 41`'
