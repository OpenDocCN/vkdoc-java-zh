- fmt: "`print(person.fullName());`\n\n```\n// Set the names for the person\nperson.fName\
    \ = \"Ken\";\nperson.lName = \"Smith\";\nprint(person.fullName());\n```\n\n`undefined\
    \ undefined`\n\n`Ken Smith`\n\nTypically, a constructor does not use a `return`\
    \ statement in its body. If it returns no value or a primitive value, the new\
    \ object is used, ignoring the primitive value. If it returns an object, the returned\
    \ object is used as the value of the invocation of the `new` operator. It may\
    \ sound odd that the return value of the constructor may change the returned object\
    \ of the `new` operator; however, it is a powerful feature of the language. You\
    \ can use this to implement a function that can be used as a function as well\
    \ as a constructor and both return an object. You can use it for caching an object\
    \ and returning the cached object when a new object already exists in the cache.\
    \ Listing 4-6 shows such a technique.\n\n**Listing 4-6.** The Contents of the\
    \ Logger.js File\n\n```\n// Logger.js\n\n// Declare a function object named Logger\n\
    function Logger() {\n    // A private method\n    function getLogger() {\n   \
    \     if (!Logger.logger) {\n            // Create a new logger and store its\
    \ reference in\n            // the logger property of the Logger function\n  \
    \          Logger.logger = {log: function(msg) {\n                print(msg);\n\
    \            }\n            };\n        }\n        return Logger.logger;\n   \
    \ }\n    return getLogger();\n}\n\n// Create two logger objects\nvar logger1 =\
    \ new Logger(); // A constructor call\nvar logger2 = new Logger(); // A constructor\
    \ call\nvar logger3 = Logger();     // A function call\n\n// Check if the logger\
    \ is cached\nprint(\"logger1 === logger2 is \" + (logger1 === logger2));\nprint(\"\
    logger1 === logger3 is \" + (logger1 === logger3));\n\nlogger1.log(\"Hello 1\"\
    );\nlogger2.log(\"Hello 2\");\nlogger3.log(\"Hello 3\");\n```\n\n`logger1 ===\
    \ logger2 is true`\n\n`logger1 === logger3 is true`\n\n`Hello 1`\n\n`Hello 2`\n\
    \n`Hello 3`\n\nWhen `Logger` is called for the first time, as a function or a\
    \ constructor, it creates an object with a `log()` method, caches the object in\
    \ the `logger` property of the `Logger` function, and returns the object. When\
    \ `Logger` is called again, it simply returns the cached object.\n\nUsing a constructor,\
    \ you can maintain private state for objects. This is done using closure. If you\
    \ define a variable with the keyword `var` inside a function, that variable has\
    \ local scope. It is only accessible inside the function. A nested function captures\
    \ its enclosing scope including the local variables declared in its outer function.\
    \ Listing 4-7 demonstrates the concept of maintaining the private state for an\
    \ object using a constructor. It creates a `Sequence` object that maintains the\
    \ current value that is accessible only through the methods `curValue()` and `nextValue()`.\
    \ Notice that when the object is created, the local variable `currentValue` is\
    \ captured by both function. When the functions are called, they work on the same\
    \ captured variables, as shown in the output.\n\n**Listing 4-7.** The Contents\
    \ of the Sequence.js File\n\n```\n// Sequence.js\n\n// This object generates strictly\
    \ increasing sequence numbers\nfunction Sequence() {\n    var currentValue = 0;\n\
    \n    // Using Nashorn extension syntax to define one-liner functions\n    this.nextValue\
    \ = function () ++currentValue;\n    this.curValue = function () currentValue;\n\
    }\n\n// Create a Sequence object\nvar empId = new Sequence();\n\nprint(\"empId\
    \ sequence...\");\nprintf(\"Current Value = %d, next Value = %d\", empId.curValue(),\
    \ empId.nextValue());\nprintf(\"Current Value = %d, next Value = %d\", empId.curValue(),\
    \ empId.nextValue());\nprintf(\"Current Value = %d, next Value = %d\", empId.curValue(),\
    \ empId.nextValue());\n\n// Create a Sequence object\nvar deptId = new Sequence();\n\
    \nprint(\"deptId sequence...\");\nprintf(\"Current Value = %d, next Value = %d\"\
    , deptId.curValue(), deptId.nextValue());\nprintf(\"Current Value = %d, next Value\
    \ = %d\", deptId.curValue(), deptId.nextValue());\nprintf(\"Current Value = %d,\
    \ next Value = %d\", deptId.curValue(), deptId.nextValue());\n```\n\n`empId sequence...`\n\
    \n`Current Value = 0, next Value = 1`\n\n`Current Value = 1, next Value = 2`\n\
    \n`Current Value = 2, next Value = 3`\n\n`deptId sequence...`\n\n`Current Value\
    \ = 0, next Value = 1`\n\n`Current Value = 1, next Value = 2`\n\n`Current Value\
    \ = 2, next Value = 3`\n\n## Object Inheritance\n\nUnlike Java, Nashorn does not\
    \ have classes. Nashorn works with objects only. It supports prototype-based object\
    \ inheritance. Apart from the collection of properties, every object in Nashorn\
    \ has a prototype that is an object or the `null` value. You can access the reference\
    \ of the prototype of an object using the `__proto__` property. Notice that there\
    \ are two underscores before and after the word `proto` in the property name `__proto__`.\
    \ This property is deprecated and you can use the following two functions to get\
    \ and set the prototype of an object:\n\n*   `Object.getPrototypeOf(object)`\n\
    *   `Object.setPrototypeOf(object, newPrototype)`\n\nIf a property in an object\
    \ is accessed, first its own properties are searched. If the property is found,\
    \ it is returned. If the property is not found, the prototype of the object is\
    \ searched. If the property is not found, the prototype of the prototype of the\
    \ object is searched, and so on. The search continues until the property is found\
    \ in the prototype chain or the entire prototype chain is searched. This search\
    \ is the same as in class-based inheritance in Java, where properties are searched\
    \ up the class inheritance chain until the `java.lang.Object` class is searched.\n\
    \n> **Tip**\n> In Java, the class inheritance always extends up to the `java.lang.Object`\
    \ class. In Nashorn, `Object.prototype` is the default prototype of an object.\
