    ### 定义脚本上下文


    脚本引擎在上下文中执行脚本。你可以将上下文视为脚本执行的环境。Java 宿主应用程序向脚本引擎提供两样东西：脚本以及脚本需要执行的上下文。`ScriptContext`
    接口的实例代表脚本的上下文。`SimpleScriptContext` 类是 `ScriptContext` 接口的一个实现。一个脚本上下文由四个组件组成：


    *   一组 `Bindings`，其中每个 `Bindings` 都与一个不同的作用域相关联

    *   一个供脚本引擎读取输入的 `Reader`

    *   一个供脚本引擎写入输出的 `Writer`

    *   一个供脚本引擎写入错误输出的错误 `Writer`


    上下文中的 `Bindings` 集合用于向脚本传递参数。上下文中的读取器和写入器分别控制脚本的输入源和输出目标。例如，通过将文件写入器设置为写入器，你可以将脚本的所有输出发送到一个文件。


    每个脚本引擎都维护一个默认的脚本上下文，并使用它来执行脚本。到目前为止，你已经执行了几个脚本，但并未提供脚本上下文。在这些情况下，脚本引擎使用的是它们的默认脚本上下文来执行脚本。在本节中，我将介绍如何单独使用
    `ScriptContext` 接口的实例。在下一节中，我将介绍如何在脚本执行期间将 `ScriptContext` 接口的实例传递给 `ScriptEngine`。


    你可以使用 `SimpleScriptContext` 类创建 `ScriptContext` 接口的实例，如下所示：


    `// 创建一个脚本上下文`


    `ScriptContext ctx = new SimpleScriptContext();`


    `SimpleScriptContext` 类的实例维护两个 `Bindings` 实例：一个用于引擎作用域，一个用于全局作用域。当你创建 `SimpleScriptContext`
    实例时，引擎作用域中的 `Bindings` 会被创建。要使用全局作用域的 `Bindings`，你需要创建一个 `Bindings` 接口的实例。


    默认情况下，`SimpleScriptContext` 类将上下文的输入读取器、输出写入器和错误写入器分别初始化为标准输入 `System.in`、标准输出
    `System.out` 和标准错误输出 `System.err`。你可以使用 `ScriptContext` 接口的 `getReader()`、`getWriter()`
    和 `getErrorWriter()` 方法分别从 `ScriptContext` 获取读取器、写入器和错误写入器的引用。还提供了设置方法来设置读取器和写入器。以下代码片段展示了如何获取读取器和写入器。它还展示了如何将写入器设置为
    `FileWriter`，以便将脚本输出写入文件：


    `// 从脚本上下文获取读取器和写入器`


    `Reader inputReader = ctx.getReader();`


    `Writer outputWriter = ctx.getWriter();`


    `Writer errWriter = ctx.getErrorWriter();`


    `// 将所有脚本输出写入 out.txt 文件`


    `Writer fileWriter = new FileWriter("out.txt");`


    `ctx.setWriter(fileWriter);`


    创建 `SimpleScriptContext` 后，你可以开始将键值对存储在引擎作用域的 `Bindings` 中，因为当你创建 `SimpleScriptContext`
    对象时，引擎作用域中会创建一个空的 `Bindings`。`setAttribute()` 方法用于向 `Bindings` 添加键值对。你必须提供键名、值以及
    `Bindings` 的作用域。以下代码片段添加了三个键值对：


    `// 向引擎作用域绑定添加三个键值对`


    `ctx.setAttribute("year", 1969, ScriptContext.ENGINE_SCOPE);`


    `ctx.setAttribute("month", 9, ScriptContext.ENGINE_SCOPE);`


    `ctx.setAttribute("day", 19, ScriptContext.ENGINE_SCOPE);`


    如果你想向全局作用域的 `Bindings` 添加键值对，你需要先创建并设置 `Bindings`，如下所示：


    `// 向上下文添加一个全局作用域绑定`


    `Bindings globalBindings = new SimpleBindings();`


    `ctx.setBindings(globalBindings, ScriptContext.GLOBAL_SCOPE);`


    现在，你可以使用 `setAttribute()` 方法向全局作用域的 `Bindings` 添加键值对，如下所示：


    `// 向全局作用域绑定添加两个键值对`


    `ctx.setAttribute("year", 1982, ScriptContext.GLOBAL_SCOPE);`


    `ctx.setAttribute("name", "Boni", ScriptContext.GLOBAL_SCOPE);`


    此时，你可以将 `ScriptContext` 实例的状态可视化为图 3-1 所示。


    ![A978-1-4842-0713-0_3_Fig1_HTML.jpg](img/A978-1-4842-0713-0_3_Fig1_HTML.jpg)


    图 3-1.


    SimpleScriptContext 类实例的图示


    你可以对 `ScriptContext` 执行多种操作。你可以使用 `setAttribute(String name, Object value, int
    scope)` 方法为已存储的键设置不同的值。你可以使用 `removeAttribute(String name, int scope)` 方法移除指定键和作用域的键值对。你可以使用
    `getAttribute(String name, int scope)` 方法获取指定作用域中某个键的值。


    使用 `ScriptContext` 最有趣的事情是，你可以通过其 `getAttribute(String name)` 方法在不指定作用域的情况下检索键值。`ScriptContext`
    会首先在引擎作用域的 `Bindings` 中搜索该键。如果在引擎作用域中未找到，则会在全局作用域的 `Bindings` 中搜索。如果在该作用域中找到了该键，则返回最先找到该键的作用域中的对应值。如果两个作用域都不包含该键，则返回
    `null`。


    在你的示例中，你将名为 `year` 的键同时存储在引擎作用域和全局作用域中。以下代码片段为键 `year` 返回 1969，该值来自引擎作用域，因为引擎作用域首先被搜索。`getAttribute()`
    方法的返回类型是 `Object`。


    `// 获取键 year 的值，不指定作用域。`


    `// 它从引擎作用域的绑定中返回 1969。`


    `int yearValue = (Integer)ctx.getAttribute("year");`


    你仅将名为 `name` 的键存储在全局作用域中。如果你尝试检索其值，会首先搜索引擎作用域，但不会返回匹配项。随后，会搜索全局作用域并返回值 `"Boni"`，如下所示：


    `// 获取键 name 的值，不指定作用域。`


    `// 它从全局作用域的绑定中返回 "Boni"。`


    `String nameValue = (String)ctx.getAttribute("name");`


    你也可以检索特定作用域中某个键的值。以下代码片段从引擎作用域和全局作用域中检索键“`year`”的值：


    `// 将 1969 赋值给 engineScopeYear，将 1982 赋值给 globalScopeYear`


    `int engineScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.ENGINE_SCOPE);`


    `int globalScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.GLOBAL_SCOPE);`


    提示


    Java 脚本 API 仅定义了两个作用域：引擎作用域和全局作用域。`ScriptContext` 接口的子接口可能会定义额外的作用域。`ScriptContext`
    接口的 `getScopes()` 方法以 `List<Integer>` 的形式返回支持的作用域列表。请注意，作用域用整数表示。`ScriptContext`
    接口中的两个常量 `ENGINE_SCOPE` 和 `GLOBAL_SCOPE` 分别被赋值为 100 和 200。当在多个作用域的多个 `Bindings`
    中搜索一个键时，会首先搜索整数值较小的作用域。由于引擎作用域的值 100 小于全局作用域的值 200，因此当你未指定作用域时，会首先在引擎作用域中搜索键。

