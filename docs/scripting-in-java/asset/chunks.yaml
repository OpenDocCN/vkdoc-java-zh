- fmt: "# Stream-Like Processing of Arrays\n\nJava 8 introduced the Streams API that\
    \ lets you process Java collections as stream using several patterns such as map-filter-reduce.\
    \ The `Array` object in Nashorn provides methods to apply stream-like processing\
    \ to arrays. Such methods are:\n\n- `map()`\n- `filter()`\n- `reduce()`\n- `reduceRight()`\n\
    - `forEach()`\n- `some()`\n- `every()`\n\nI have already discussed the last three\
    \ methods in detail in previous section. I will discuss other methods in this\
    \ section.\n\nThe `map()` method maps elements of an array to another values and\
    \ returns a new array containing the mapped values. The original array is not\
    \ modified. Its signature is:\n\n`map(callback, thisArg)`\n\nThe first argument,\
    \ `callback`, is a function that is called for each element in the array; the\
    \ function is passed three arguments: the value of the element, the index of the\
    \ element, and the array itself. The returned value from the function is the element\
    \ of the new (mapped) array. The second argument is used as the `this` value in\
    \ the function invocation. The following is an example of using the `map()` method.\
    \ It maps each element of a number array to their squares:\n\n```\nvar nums =\
    \ [1, 2, 3, 4, 5];\n\n// Map each element in the nums array to their squares\n\
    var squaredNums = nums.map(function (value, index, data) value * value);\n\nprint(nums);\n\
    print(squaredNums);\n```\n\n```\n1,2,3,4,5\n1,4,9,16,25\n```\n\nThe `filter()`\
    \ method returns a new array containing the elements of the original array that\
    \ pass a predicate. Its signature is:\n\n`filter(callback, thisArg)`\n\nThe first\
    \ argument, `callback`, is a function that is called for each element in the array;\
    \ the function is passed three arguments: the value of the element, the index\
    \ of the element, and the array itself. If the function returns a truthy value,\
    \ the element is included in the returned array; otherwise, the element is excluded.\
    \ The second argument is used as the `this` value in the function invocation.\
    \ The following code shows how to use the `filter()` method to filter out even\
    \ numbers from an array:\n\n```\nvar nums = [1, 2, 3, 4, 5];\n\n// Filter out\
    \ even numbers, keep odd numbers only\nvar oddNums = nums.filter(function (value,\
    \ index, data) (value % 2 !== 0));\n\nprint(nums);\nprint(oddNums);\n```\n\n```\n\
    1,2,3,4,5\n1,3,5\n```\n\nThe `reduce()` method applies a reduction operation on\
    \ the array, reducing it to a single value such as computing the sum of all elements\
    \ in a number array. It returns a computed value. Its signature is:\n\n`reduce(callback,\
    \ initialValue)`\n\nThe first argument, `callback`, is a function that is called\
    \ with four arguments: the previous value, the current value, the current index,\
    \ and the array itself.\n\nIf `initialValue` is unspecified:\n\n- For the first\
    \ call to `callback`, the first element of the array is passed as the previous\
    \ value and the second element as the current value; the index of the second element\
    \ is passed as the index\n- For subsequent calls to `callback`, the value returned\
    \ from the previous call is passed as the previous value. The current value and\
    \ index are the value and index of the current element\n\nIf `initialValue` is\
    \ specified:\n\n- For the first call to `callback`, `initialValue` is passed as\
    \ the previous value and the first element as the current value; the index of\
    \ the first element is passed as the index\n- For subsequent calls to `callback`,\
    \ the value returned from the previous call is passed as the previous value; the\
    \ current value and index are the value and index of the current element\n\nThe\
    \ `reduceRight()` method works the same as the `reduce()` method, except that\
    \ it processes the elements of the array from end to start. The following code\
    \ shows how to use the `reduce()` and `reduceRight()` methods to compute the sum\
    \ of all numbers in an array and to join elements of a string array:\n\n```\n\
    var nums = [1, 2, 3, 4, 5];\n\n// Defines a reducer function to compute sum of\
    \ elements of an array\nvar sumReducer = function(previous, current, index, data)\
    \ {\n    return previous + current;\n};\n\nvar sum = nums.reduce(sumReducer);\n\
    \nprint(\"Numbers :\" + nums);\nprint(\"Sum: \" + sum);\n\n// Defines a reducer\
    \ function to concatenate elements of an array\nvar concatReducer = function(previous,\
    \ current, index, data) {\n    return previous + \"-\" + current;\n};\n\nvar names\
    \ = [\"Fu\", \"Li\", \"Su\"];\nvar namesList = names.reduce(concatReducer);\n\
    var namesListRight = names.reduceRight(concatReducer);\n\nprint(\"Names: \" +\
    \ names);\nprint(\"Names Reduced List: \" + namesList);\nprint(\"Names Reduced\
    \ Right List: \" + namesListRight);\n```\n\n```\nNumbers :1,2,3,4,5\nSum: 15\n\
    Names: Fu,Li,Su\nNames Reduced List: Fu-Li-Su\nNames Reduced Right List: Su-Li-Fu\n\
    ```\n\nYou can also chain these methods to perform complex processing on arrays.\
    \ The following code shows how to compute the sum of squares of all positive odd\
    \ numbers in an array in one statement:\n\n```\nvar nums = [-2, 1, 2, 3, 4, 5,\
    \ -11];\n\n// Compute the sum of squares of all positive odd numbers\nvar sum\
    \ = nums.filter(function (value, index, data) value > 0 && value % 2 !== 0)\n\
    \    .map(function (value, index, data) value * value)\n    .reduce(function (prev,\
    \ curr, index, data) prev + curr, 0);\n\nprint(\"Numbers: \" + nums);\nprint(\"\
    Sum of squares of positive odd elements: \" + sum);\n```\n\n```\nNumbers: -2,1,2,3,4,5,-11\n\
    Sum of squares of positive odd elements: 35\n```\n\n## Array-Like Objects\n\n\
    Arrays have two features that make them distinct from regular objects:\n\n- It\
    \ has a `length` property\n- Its elements have special property names that are\
    \ integers\n\nYou can define any object with these two characteristics and call\
    \ them array-like objects. The following code defines an object named `list` that\
    \ is an array-like object:\n\n```\n// Creates an array-like object\nvar list =\
    \ {\"0\":\"Fu\", \"1\":\"Su\", \"2\":\"Li\", length:3};\n```\n\nNashorn contains\
    \ few array-like objects such as the String and `arguments` objects. Most of the\
    \ methods in the `Array.prototype` object are generic, meaning that they can be\
    \ invoked on any array-like objects, not necessarily only on arrays. The following\
    \ code shows how to call the `join()` method of the `Array.prototype` object on\
    \ an array-like object:\n\n```\n// An array-like object\nvar list = {\"0\":\"\
    Fu\", \"1\":\"Su\", \"2\":\"Li\", length:3};\nvar joinedList = Array.prototype.join.call(list,\
    \ \"-\");\n\nprint(joinedList);\n```\n\n```\nFu-Su-Li\n```\n\nThe String object\
    \ is also an array-like object. It maintains a read-only `length` property and\
    \ each character has an index as its property name. You can perform the following\
    \ array-like operations on strings:\n\n```\n// A String object\nvar str = new\
    \ String(\"ZIP\");\n\nprint(\"str[0] = \" + str[0]);\nprint(\"str[1] = \" + str[1]);\n\
    print(\"str[2] = \" + str[2]);\nprint('str[\"length\"] = ' + str[\"length\"]);\n\
    ```\n\nYou could have achieved the same results using the `charAt()` and `length()`\
    \ methods of the String object. The following code converts a string to uppercase,\
    \ removes vowels of English alphabets, and joins all characters using a hyphen\
    \ as the separator. All are done using the methods on the `Array.prototype` object\
    \ as if the string is an array of characters:\n\n```\n// A String object\nvar\
    \ str = new String(\"Nashorn\");\n\n// Use the map-filter-reduce pattern on the\
    \ string\nvar newStr = Array.prototype.map.call(str, (function (v, i, d) v.toUpperCase()))\n\
    \    .filter(function (v, i, d) (v !== \"A\" && v !== 'E' && v !== 'I' && v !==\
    \ 'O' && v !== 'U'))\n    .reduce(function(prev, cur, i, data) prev + \"-\" +\
    \ cur);\n\nprint(\"Original string: \" + str);\nprint(\"New string: \" + newStr);\n\
    ```\n\n```\nOriginal string: Nashorn\nNew string: N-S-H-R-N\n```"
  raw: '## Stream-Like Processing of Arrays


    Java 8 introduced the Streams API that lets you process Java collections as stream
    using several patterns such as map-filter-reduce. The `Array` object in Nashorn
    provides methods to apply stream-like processing to arrays. Such methods are:


    *   `map()`

    *   `filter()`

    *   `reduce()`

    *   `reduceRight()`

    *   `forEach()`

    *   `some()`

    *   `every()`


    I have already discussed the last three methods in detail in previous section.
    I will discuss other methods in this section.


    The `map()` method maps elements of an array to another values and returns a new
    array containing the mapped values. The original array is not modified. Its signature
    is:


    `map(callback, thisArg)`


    The first argument, `callback`, is a function that is called for each element
    in the array; the function is passed three arguments: the value of the element,
    the index of the element, and the array itself. The returned value from the function
    is the element of the new (mapped) array. The second argument is used as the `this`
    value in the function invocation. The following is an example of using the `map()`
    method. It maps each element of a number array to their squares:


    `var nums = [1, 2, 3, 4, 5];`


    `// Map each element in the nums array to their squares`


    `var squaredNums = nums.map(function (value, index, data) value * value);`


    `print(nums);`


    `print(squaredNums);`


    `1,2,3,4,5`


    `1,4,9,16,25`


    The `filter()` method returns a new array containing the elements of the original
    array that pass a predicate. Its signature is:


    `filter(callback, thisArg)`


    The first argument, `callback`, is a function that is called for each element
    in the array; the function is passed three arguments: the value of the element,
    the index of the element, and the array itself. If the function returns a truthy
    value, the element is included in the returned array; otherwise, the element is
    excluded. The second argument is used as the `this` value in the function invocation.
    The following code shows how to use the `filter()` method to filter out even numbers
    from an array:


    `var nums = [1, 2, 3, 4, 5];`


    `// Filter out even numbers, keep odd numbers only`


    `var oddNums = nums.filter(function (value, index, data) (value % 2 !== 0));`


    `print(nums);`


    `print(oddNums);`


    `1,2,3,4,5`


    `1,3,5`


    The `reduce()` method applies a reduction operation on the array, reducing it
    to a single value such as computing the sum of all elements in a number array.
    It returns a computed value. Its signature is:


    `reduce(callback, initialValue)`


    The first argument, `callback`, is a function that is called with four arguments:
    the previous value, the current value, the current index, and the array itself.


    If `initialValue` is unspecified:


    *   For the first call to `callback`, the first element of the array is passed
    as the previous value and the second element as the current value; the index of
    the second element is passed as the index

    *   For subsequent calls to `callback`, the value returned from the previous call
    is passed as the previous value. The current value and index are the value and
    index of the current element


    If `initialValue` is specified:


    *   For the first call to `callback`, `initialValue` is passed as the previous
    value and the first element as the current value; the index of the first element
    is passed as the index

    *   For subsequent calls to `callback`, the value returned from the previous call
    is passed as the previous value; the current value and index are the value and
    index of the current element


    The `reduceRight()` method works the same as the `reduce()` method, except that
    it processes the elements of the array from end to start. The following code shows
    how to use the `reduce()` and `reduceRight()` methods to compute the sum of all
    numbers in an array and to join elements of a string array:


    `var nums = [1, 2, 3, 4, 5];`


    `// Defines a reducer function to compute sum of elements of an array`


    `var sumReducer = function(previous, current, index, data) {`


    `return previous + current;`


    `};`


    `var sum = nums.reduce(sumReducer);`


    `print("Numbers :" + nums);`


    `print("Sum: " + sum);`


    `// Defines a reducer function to concatenate elements of an array`


    `var concatReducer = function(previous, current, index, data) {`


    `return previous + "-" + current;`


    `};`


    `var names = ["Fu", "Li", "Su"];`


    `var namesList = names.reduce(concatReducer);`


    `var namesListRight = names.reduceRight(concatReducer);`


    `print("Names: " + names);`


    `print("Names Reduced List: " + namesList);`


    `print("Names Reduced Right List: " + namesListRight);`


