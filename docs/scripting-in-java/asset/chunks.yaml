- fmt: "以下代码声明了一个全局变量`x`并为其赋值`100`。它加载了一个脚本对象，该对象也声明了一个同名的全局变量`x`并为其赋值`200`。当使用`load()`函数加载脚本对象时，它会覆盖现有全局变量`x`的值，如输出所示：\n\
