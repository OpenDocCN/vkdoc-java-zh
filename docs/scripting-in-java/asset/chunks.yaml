- fmt: "运算符具有优先级。在表达式中，优先级较高的运算符会先于优先级较低的运算符被求值。与 Java 类似，你可以将表达式的一部分用括号括起来，括号拥有最高优先级。以下是运算符的优先级列表。第\
    \ 1 级的运算符优先级高于第 2 级的运算符。同一级的运算符具有相同的优先级：\n\n`++`（后缀递增），`--`（后缀递减）  \n`!`, `∼`,\
    \ `+`（一元正号），`-`（一元负号），`++`（前缀递增），`--`（前缀递减），`typeof`, `void`, `delete`  \n`*`,\
    \ `/`, `%`  \n`+`（加法），`-`（减法）  \n`<<`, `>>`, `>>>`  \n`<`, `<=`, `>`, `>=`, `in`,\
    \ `instanceof`  \n`==`, `!=`, `===`, `!==`  \n`&`  \n`^`  \n`|`  \n`&&`  \n`||`\
    \  \n`? :`  \n`=`, `+=`, `-=`, `*=`, `/=`, `%=`, `<<=`, `>>=`, `>>>=`, `&=`, `^=`,\
    \ `|=`  \n`,`（逗号运算符）\n\n我将在本节中讨论其中的几个运算符。这些在 Nashorn 中的运算符要么在 Java 中不存在，要么工作方式非常不同：\n\
    \n*   相等运算符（`==`）和严格相等运算符（`===`）\n*   逻辑与（`&&`）和逻辑或（`||`）运算符\n\n`==` 运算符的工作方式与\
    \ Java 中几乎相同。它检查两个操作数是否相等，并在可能的情况下执行类型转换，例如将字符串转换为数字。例如，`\"2\" == 2` 返回 `true`，因为字符串\
    \ `\"2\"` 被转换为数字 2，然后两个操作数相等。表达式 `2 == 2` 也返回 `true`，因为两个操作数都是数字类型且值相等。相比之下，`===`\
    \ 运算符会同时检查两个操作数的类型和值是否相等。如果其中任何一个不相同，则返回 `false`。例如，`\"2\" === 2` 返回 `false`，因为一个操作数是字符串，另一个是数字。即使它们的值在转换为字符串或数字后相等，它们的类型也不匹配。\n\
    \n在 Java 中，`&&` 和 `||` 运算符处理布尔操作数并返回 `true` 或 `false`。在 Nashorn 中，情况并非如此；这些运算符返回其中一个操作数的值，该值可以是任何类型。在\
    \ Nashorn 中，任何类型的值都可以转换为布尔值 `true` 或 `false`。可以转换为 `true` 的值称为真值（truthy），可以转换为\
    \ `false` 的值称为假值（falsy）。我将在本章的下一节中提供真值和假值的完整列表。\n\n`&&` 和 `||` 运算符处理真值和假值操作数，并返回其中一个操作数的值，该值不一定是布尔值。`&&`\
    \ 和 `||` 运算符也称为短路运算符，因为如果第一个操作数本身就能确定结果，它们就不会对第二个操作数求值。\n\n`&&` 运算符在第一个操作数为假值时返回它。否则，返回第二个操作数。考虑以下语句：\n\
    \n```\nvar result = true && 120; // 将 120 赋值给 result\n```\n\n该语句将 120 赋值给 `result`。`&&`\
    \ 的第一个操作数是 `true`，因此它对第二个操作数求值并返回它。考虑另一条语句：\n\n```\nvar result = false && 120;\
    \ // 将 false 赋值给 result\n```\n\n该语句将 `false` 赋值给 `result`。`&&` 的第一个操作数是 `false`，因此它不对第二个操作数求值。它直接返回第一个操作数。\n\
    \n`||` 运算符在第一个操作数为真值时返回它。否则，返回第二个操作数。考虑以下语句：\n\n```\nvar result = true || 120;\
    \ // 将 true 赋值给 result\n```\n\n该语句将 `true` 赋值给 `result`。`||` 的第一个操作数是 `true`，因此它返回第一个操作数。考虑另一条语句：\n\
    \n```\nvar result = false || 120; // 将 120 赋值给 result\n```\n\n该语句将 `120` 赋值给 `result`。`||`\
