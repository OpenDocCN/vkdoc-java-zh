  raw: '## Variable Scoping and Hoisting


    Java supports block-level scoping. A variable declared in a block is local to
    that block and it is not accessible before and after the block. Nashorn (and all
    JavaScript implementations) support two scopes:


    *   Global Scope

    *   Function Scope


    Variable and function declarations in the global code are available everywhere
    in the global scope. Similarly, variable and function declarations in a function
    are available everywhere inside the function.


    Consider the code and its output in Listing 4-21\. The output will surprise you
    if you have not worked with JavaScript before.


    Listing 4-21\. Declaration Hoisting in Nashorn


    `// beforehoisting.js`


    `// Try accessing empId variable before declaring it`


    `print("1\. empId = " + empId);`


    `// Declare and initialize empId now`


    `var empId = 100;`


    `function test() {`


    `if (empId === undefined) {`


    `var empId = 200;`


    `}`


    `print("2\. empId = " + empId);`


    `}`


    `// Call the test` `function`


    `test();`


    `print("3\. empId = " + empId);`


    `1\. empId = undefined`


    `2\. empId = 200`


    `3\. empId = 100`


    The first output shows that you can access a variable before declaring it. The
    variable value is `undefined`. Inside the `test()` function, you would expect
    that expression `empId === undefined` will read the value of `empId` from the
    global scope and it will evaluate to `false`. However, the output shows otherwise.
    The second output shows that the `if` condition inside the `test()` function evaluated
    to `true` and the `empId` local variable was set to 200\. The third output shows
    that the function call did not affect the global variable `empId` and its value
    remained 100.


    You can understand this variable’s scoping behavior in two ways:


    *   As a two-phase process: First, all declarations are processed. Second, the
    code is executed. Because all declarations are processed before executing the
    code, all variable and function declarations are available when the code is executed,
    irrespective of the place where they were declared. Of course, you need to take
    into account the global and function scopes of those declarations.

    *   As declaration hoisting: This simply means that all variable and function
    declarations are moved to the top in their respective scope. This is the same
    as saying that you have declared all variables and functions at the top in the
    global and function scopes.


    Listing 4-22 shows the same code as in Listing 4-21 but after the declarations
    are hoisted. This time, you will not have any problem in understanding the output.


    Listing 4-22\. Reorganized Code after Declaration Hoisting


    `// afterhoisting.js`


    `var empId; // Hoisted`


    `function test() {`


    `var empId; // Hoisted`


    `if (empId === undefined) {`


    `empId = 200; // Left after hoisting`


    `}`


    `print("2\. empId = " + empId);`


    `}`


    `// Try accessing empId variable before declaring it`


    `print("1\. empId = " + empId);`


    `// Declare and initialize empId now`


    `empId = 100; // Left after hoisting`


    `// Call the test function`


    `test();`


    `print("3\. empId = " + empId);`


    `1\. empId = undefined`


    `2\. empId = 200`


    `3\. empId = 100`


    Notice that hoisting occurs for function declarations, not for function expressions,
    which enables you to call functions before they are declared. One more thing to
    remember: only variable declarations are hoisted, not the assignment part in the
    variable declarations, as shown in Listing 4-22.


    ## Using Strict Mode


    You can use the strict mode in Nashorn script by using the `"use strict"` directive.
    It is used in the beginning of the global code or the beginning of the function
    code. If it is used in the beginning of the global code, all code is considered
    executing in string mode. If it occurs in the beginning of the function code,
    only that function code executes in the strict mode. You can also use the `"use
    strict"` directive in the script executed by the `eval()` function.


    The following snippet of code uses the `"use strict"`directive for the global
    scope:


    `"use strict";`


    `// An error. Using a variable without declaring it with var`


    `x = 10;`


    `// other code goes here`


    The following code will throw an error when the `test()` function is called because
    the function uses the `"use strict"` directive and it uses a variable named `y`
    without declaring it with the keyword `var`:


    `x = 10; // OK. The global code is not in strict mode`


    `function test() {`


    `"use strict";`


    `y = 100; // Will cause an error when executed`


    `}`


    `test();`


    ## Built-in Global Objects


    Nashorn defines many built-in objects. I will discuss some of them in the subsequent
    sections.


    ### The Object Object


    Nashorn provides a built-in object called `Object`. You can think of it similar
    to the `java.lang.Object` class in Java. `Object` in Nashorn serves as the base
    object for other objects. It has several useful properties that are used to work
    with all types of objects. I have already discussed many of them in previous sections.


    `Object` is a function that can also be used as a constructor. It accepts an optional
    parameter. If you call the `Object` function, it has the same effect of calling
    the `Object` constructor with the `new` operator. If you pass an object to the
    function, it returns the reference of the same object. If you pass a primitive
    value, it returns a wrapper object that wraps the primitive value. You can get
    the primitive value using the `valueOf()` method on the returned object. Calling
    the function without an argument creates an empty object. The following code illustrates
    how to use `Object`:


    `var str = "Hello";`


    `// Assigns a wrapper for str to p1 because str is a primitive type`


    `var p1 = new Object(str);`


    `print("p1.valueOf() is", p1.valueOf());`


    `print("typeof p1 is", typeof p1);`


    `print("p1.valueOf() === str is", p1.valueOf() === str);`


    `var msg = new String("Hello");`


    `// Assigns the reference of msg to p2\. new Object(msg) returns`


    `// the reference of msg because msg is an object.`


    `var p2 = new Object(msg);`


    `print("p2 === msg is", p2 === msg);`


    `print("p2.valueOf() is", p2.valueOf());`


    `print("typeof p2 is", typeof p2);`


    `print("p2.valueOf() === msg is", p2.valueOf() === msg);`


    `p1.valueOf() is Hello`


    `typeof p1 is object`


    `p1.valueOf() === str is true`


    `p2 === msg is true`


    `p2.valueOf() is Hello`


    `typeof p2 is object`


    `p2.valueOf() === msg is` `false`


    Table [4-11](#A978-1-4842-0713-0_4_Chapter.html#Tab11) contains the list of properties
    and methods of `Object` with their descriptions.


    Table 4-11.


    The List of Properties and Methods of Object with Their Descriptions'
  trans: '

    ## 变量作用域与提升


    Java 支持块级作用域。在块中声明的变量是该块的局部变量，在块之前和之后都无法访问。Nashorn（以及所有 JavaScript 实现）支持两种作用域：


    *   全局作用域

    *   函数作用域


    全局代码中的变量和函数声明在全局作用域内的任何地方都是可用的。同样，函数内部的变量和函数声明在该函数内部的任何地方都是可用的。


    请查看清单 4-21 中的代码及其输出。如果你之前没有接触过 JavaScript，这个输出会让你感到惊讶。


    清单 4-21\. Nashorn 中的声明提升


    `// beforehoisting.js`


    `// 尝试在声明 empId 变量之前访问它`


    `print("1\. empId = " + empId);`


    `// 现在声明并初始化 empId`


    `var empId = 100;`


    `function test() {`


    `if (empId === undefined) {`


    `var empId = 200;`


    `}`


    `print("2\. empId = " + empId);`


    `}`


    `// 调用 test 函数`


    `test();`


    `print("3\. empId = " + empId);`


    `1\. empId = undefined`


    `2\. empId = 200`


    `3\. empId = 100`


    第一个输出显示，你可以在声明变量之前访问它。该变量的值是 `undefined`。在 `test()` 函数内部，你可能会期望表达式 `empId ===
    undefined` 会从全局作用域读取 `empId` 的值，并且计算结果为 `false`。然而，输出结果却相反。第二个输出显示 `test()` 函数内部的
    `if` 条件计算结果为 `true`，并且局部变量 `empId` 被设置为 200。第三个输出显示函数调用并未影响全局变量 `empId`，其值仍为 100。


    你可以通过两种方式来理解这种变量的作用域行为：


    *   作为一个两阶段过程：首先，处理所有声明。其次，执行代码。由于所有声明都在执行代码之前处理完毕，因此当代码执行时，所有变量和函数声明都是可用的，无论它们声明在何处。当然，你需要考虑这些声明的全局作用域和函数作用域。

    *   作为声明提升：这仅仅意味着所有变量和函数声明都被移动到其各自作用域的顶部。这等同于说，你已经在全局作用域和函数作用域的顶部声明了所有变量和函数。


    清单 4-22 展示了与清单 4-21 相同的代码，但这是在声明被提升之后。这一次，你在理解输出时将不会有任何问题。


    清单 4-22\. 声明提升后的重组代码


    `// afterhoisting.js`


    `var empId; // 已提升`


    `function test() {`


    `var empId; // 已提升`


    `if (empId === undefined) {`


    `empId = 200; // 提升后保留`


    `}`


    `print("2\. empId = " + empId);`


    `}`


    `// 尝试在声明 empId 变量之前访问它`


    `print("1\. empId = " + empId);`


    `// 现在声明并初始化 empId`


    `empId = 100; // 提升后保留`


    `// 调用 test 函数`


    `test();`


    `print("3\. empId = " + empId);`


    `1\. empId = undefined`


    `2\. empId = 200`


    `3\. empId = 100`


    请注意，提升发生在函数声明上，而不是函数表达式上，这使得你可以在函数声明之前调用它们。还有一点需要记住：只有变量声明被提升，而不是变量声明中的赋值部分，如清单
    4-22 所示。


    ## 使用严格模式


    你可以通过使用 `"use strict"` 指令在 Nashorn 脚本中使用严格模式。它被用在全局代码的开头或函数代码的开头。如果它被用在全局代码的开头，则所有代码都被视为在严格模式下执行。如果它出现在函数代码的开头，则只有该函数代码在严格模式下执行。你也可以在由
    `eval()` 函数执行的脚本中使用 `"use strict"` 指令。


    以下代码片段为全局作用域使用了 `"use strict"` 指令：


    `"use strict";`


    `// 错误。使用变量时未用 var 声明`


    `x = 10;`


    `// 其他代码在此处`


    当调用 `test()` 函数时，以下代码将抛出错误，因为该函数使用了 `"use strict"` 指令，并且它使用了一个名为 `y` 的变量，但未使用关键字
    `var` 进行声明：


    `x = 10; // 没问题。全局代码不在严格模式下`


    `function test() {`


    `"use strict";`


    `y = 100; // 执行时会导致错误`


    `}`


    `test();`


    ## 内置全局对象


    Nashorn 定义了许多内置对象。我将在后续章节中讨论其中的一些。


    ### Object 对象


    Nashorn 提供了一个名为 `Object` 的内置对象。你可以将其视为类似于 Java 中的 `java.lang.Object` 类。Nashorn
    中的 `Object` 充当其他对象的基对象。它有几个有用的属性，用于处理所有类型的对象。我已在之前的章节中讨论过其中许多属性。


    `Object` 是一个函数，也可以用作构造函数。它接受一个可选参数。如果你调用 `Object` 函数，其效果与使用 `new` 运算符调用 `Object`
    构造函数相同。如果你向该函数传递一个对象，它将返回同一对象的引用。如果你传递一个原始值，它将返回一个包装该原始值的包装器对象。你可以使用返回对象上的 `valueOf()`
    方法获取原始值。不带参数调用该函数会创建一个空对象。以下代码说明了如何使用 `Object`：


    `var str = "Hello";`


    `// 为 str 分配一个包装器给 p1，因为 str 是原始类型`


    `var p1 = new Object(str);`


    `print("p1.valueOf() is", p1.valueOf());`


    `print("typeof p1 is", typeof p1);`


    `print("p1.valueOf() === str is", p1.valueOf() === str);`


    `var msg = new String("Hello");`


    `// 将 msg 的引用分配给 p2。new Object(msg) 返回`


    `// msg 的引用，因为 msg 是一个对象。`


    `var p2 = new Object(msg);`


    `print("p2 === msg is", p2 === msg);`


    `print("p2.valueOf() is", p2.valueOf());`


    `print("typeof p2 is", typeof p2);`


    `print("p2.valueOf() === msg is", p2.valueOf() === msg);`


    `p1.valueOf() is Hello`


    `typeof p1 is object`


    `p1.valueOf() === str is true`


    `p2 === msg is true`


    `p2.valueOf() is Hello`


    `typeof p2 is object`


    `p2.valueOf() === msg is` `false`


    表 4-11 包含了 `Object` 的属性及方法列表及其描述。


    表 4-11.


    Object 的属性及方法列表及其描述

    '
- fmt: '| Property/Method | Description |

    | --- | --- |

    | `Object.prototype` | It is the prototype object for `Object`. Its `writable`,
    `enumerable`, and `configurable` properties are set to `false` |

    | `Object.prototype.constructor` | Contains reference to the `constructor` function
    that creates the object |

    | `Object.create(p, descriptor)` | Creates a new object setting the specified
    `p` as the prototype and adding all properties in the `descriptor` to the new
    object. The `descriptor` parameter is optional |

    | `Object.defineProperties(obj, descriptors)` | Creates or updates properties
    of the specified object |

    | `Object.defineProperty(obj, prop, descriptor)` | Creates or updates the specified
    property with of the specified object |

    | `Object.freeze(obj)` | Freezes the specified object by making it nonextensible,
    nonconfigurable, and making all its properties read-only |

    | `Object.getOwnPropertyDescriptor(obj, prop)` | Returns a property descriptor
    for the specified property of the specified object |

    | `Object.getOwnPropertyNames(obj)` | Returns an array containing names of all
    own properties of the specified object. The array also includes the nonenumerable
    properties |

    | `Object.getPrototypeOf(obj)` | Returns the prototype of the specified object
    |

    | `Object.isExtensible(obj)` | Returns `true` of the specified object is extensible,
    `false` otherwise |

    | `Object.isFrozen(obj)` | Returns `true` of the specified object is frozen, `false`
    otherwise |

    | `Object.isSealed(obj)` | Returns `true` of the specified object is sealed, `false`
    otherwise |

    | `Object.keys(obj)` | Returns an array containing the names of all enumerable,
    noninherited properties of the specified object |

    | `Object.preventExtensions(object)` | Makes the specified object nonextensible
    so that no new properties can be added to the object |

    | `Object.prototype.hasOwnProperty(prop)` | Returns `true` if the object has the
    specified property as its own property; returns `false` otherwise |

    | `Object.prototype.isPrototypeOf(obj)` | Returned `true` if the specified object
    is the prototype of the object on which the `isPrototypeOf()` method is called
    |

    | `Object.prototype.propertyIsEnumerable(prop)` | Returns `true` if the specified
    property is enumerable; returns `false` otherwise |

    | `Object.prototype.toLocaleString()` | Returned a localized string representation
    of the object. It is intended to be overridden by objects. By default, it returns
    a string returned by the `toString()` method |

    | `Object.prototype.toString()` | Returns a string representation of the object.
    It is intended to be overridden by objects. By default, it returns a string `[object
    class]` where `class` is the class name of the object such as `String`, `Date`,
    `Object`, and so on |

    | `Object.prototype.valueOf()` | If the object wraps a primitive value, it returns
    that primitive value. Otherwise, it returns the object itself |

    | `Object.seal(obj)` | Seals the specified object |

    | `Object.setPrototypeOf(obj, proto)` | Sets the specified `proto` as the prototype
    of the specified `obj` |


    ## The Function Object


    The `Function` object is a function that can be called as a function or a constructor.
    Calling it as a function works the same way as calling it as a constructor. It
    creates a new function object from a string. It takes variable number of arguments
    and it has the following signature:


    `Function(p1, p2, p3,..., body);`


    Here, `p1`, `p2`, `p3`, and so on are the names of the formal parameters of the
    new function and `body` is the body of the function. The last argument is always
    the body of the function. If it is called without any arguments, it creates an
    empty function with no formal parameters and an empty body. The following snippet
    of code creates a function that takes two parameters and returns the result of
    applying the `+` operator on both arguments. Calling `adder(10, 20)` will return
    30:


    `var adder = new Function("p1", "p2", "return p1 + p2");`


    `Function.prototype` is an object that itself is a `Function` object. `Function.prototype`
    is set as the prototype object for all functions you create. So, all properties
    available in `Function.prototype` are available in all functions. The following
    properties are defined in `Function.prototype`:


    * `Function.prototype.constructor`

    * `Function.prototype.toString()`

    * `Function.prototype.apply(thisArg, argArray)`

    * `Function.prototype.call(thisArg, arg1, arg2,...)`

    * `Function.prototype.bind(thisArg, arg1, arg2,...)`


    The `Function.prototype.constructor` property is set to the built-in `Function`
    constructor.


    The `Function.prototype.toString()` method returns an implementation-dependent
    representation of the function object. The following code shows how to use this
    method and the values it returns for different types of object. Note that for
    the user-defined functions, it returns the function declaration as a string and
    for built-in function the body of the function is returned as `[native code]`:


    ```

    function adder(n1, n2) {

    return n1 + n2;

    }


    // Call the toString() method of the user-defined adder function

    var adderStr = adder.toString();


    // Call the toString() method of the built-in print function

    var printStr = print.toString;


    print("adderStr: \n" + adderStr);

    print("printstr:\n" + printStr);


    adderStr:

    function adder(n1, n2) {

    return n1 + n2;

    }


    printstr:

    function toString() { [native code] }

    ```


    The `apply()` and `call()` methods are used for the same purpose. Both are used
    to call a method for an object. They differ only in argument types. The first
    argument to both methods are an object in whose context the method is called.
    The `apply()` method lets you specify the arguments to the method in an array
    whereas the `call()` method lets you specify each argument separately. These methods
    let you call a method of an object on any other objects. You can use these methods
    to call the overridden methods of an object.


    The following code shows how to call the `toString()` method of the `Object.prototype`
    on a `String` object:


    ```

    // Create a String object

    var str = new String("Hello");


    // Call the toString() method of the String object

    var stringToString = str.toString();


    // Call the toString() method of the Object.prototype object on str

    var objectToString = Object.prototype.toString.call(str);


    print("String.toString(): " + stringToString);

    print("Object.prototype.toString(): " + objectToString);


    String.toString(): Hello

    Object.prototype.toString(): [object String]

    ```


    The `bind()` method binds a function to an object and returns a new function object.
    When the new function is called, it executes in the context of the bound object.
    It takes variable-length arguments. The first argument is the object that you
    want to bind with the function. The rest of the arguments are the arguments you
    want to bind with the function. If you bind any arguments to the function, those
    arguments will be used when you call the bound function.'
