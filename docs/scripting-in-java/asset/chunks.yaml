    \ name. You cannot import all classes from the `java.lang` package. The following\
    \ snippet of code generates an error because the `String` class name is already\
    \ defined in JavaScript:\n\n```\n// Load the compatibility module. It is needed\
    \ in Nashorn, not in Rhino.\nload(\"nashorn:mozilla_compat.js\");\n\n// Will cause\
    \ a conflict with String object in Nashorn\nimportClass(java.lang.String);\n```\n\
