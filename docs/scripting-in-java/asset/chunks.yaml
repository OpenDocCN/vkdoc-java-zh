    | `Object.isFrozen(obj)` | Returns `true` of the specified object is frozen, `false`
    otherwise |

    | `Object.isSealed(obj)` | Returns `true` of the specified object is sealed, `false`
    otherwise |

    | `Object.keys(obj)` | Returns an array containing the names of all enumerable,
    noninherited properties of the specified object |

    | `Object.preventExtensions(object)` | Makes the specified object nonextensible
    so that no new properties can be added to the object |

    | `Object.prototype.hasOwnProperty(prop)` | Returns `true` if the object has the
    specified property as its own property; returns `false` otherwise |

    | `Object.prototype.isPrototypeOf(obj)` | Returned `true` if the specified object
    is the prototype of the object on which the `isPrototypeOf()` method is called
    |

    | `Object.prototype.propertyIsEnumerable(prop)` | Returns `true` if the specified
    property is enumerable; returns `false` otherwise |

    | `Object.prototype.toLocaleString()` | Returned a localized string representation
    of the object. It is intended to be overridden by objects. By default, it returns
    a string returned by the `toString()` method |

    | `Object.prototype.toString()` | Returns a string representation of the object.
    It is intended to be overridden by objects. By default, it returns a string `[object
    class]` where `class` is the class name of the object such as `String`, `Date`,
    `Object`, and so on |

    | `Object.prototype.valueOf()` | If the object wraps a primitive value, it returns
    that primitive value. Otherwise, it returns the object itself |

    | `Object.seal(obj)` | Seals the specified object |

    | `Object.setPrototypeOf(obj, proto)` | Sets the specified `proto` as the prototype
    of the specified `obj` |


    ### The Function Object


    The `Function` object is a function that can be called as a function or a constructor.
    Calling it as a function works the same way as calling it as a constructor. It
    creates a new function object from a string. It takes variable number of arguments
    and it has the following signature:


    `Function(p1, p2, p3,..., body);`


    Here, `p1`, `p2`, `p3`, and so on are the names of the formal parameters of the
    new function and `body` is the body of the function. The last argument is always
    the body of the function. If it is called without any arguments, it creates an
    empty function with no formal parameters and an empty body. The following snippet
    of code creates a function that takes two parameters and returns the result of
    applying the `+` operator on both arguments. Calling `adder(10, 20)` will return
    30:


    `var adder = new Function("p1", "p2", "return p1 + p2");`


    `Function.prototype` is an object that itself is a `Function` object. `Function.prototype`
    is set as the prototype object for all functions you create. So, all properties
    available in `Function.prototype` are available in all functions. The following
    properties are defined in `Function.prototype`:


    *   `Function.prototype.constructor`

    *   `Function.prototype.toString()`

    *   `Function.prototype.apply(thisArg, argArray)`

    *   `Function.prototype.call(thisArg, arg1, arg2,...)`

    *   `Function.prototype.bind(thisArg, arg1, arg2,...)`


    The `Function.prototype.constructor` property is set to the built-in `Function`
    constructor.


    The `Function.prototype.toString()` method returns an implementation-dependent
    representation of the function object. The following code shows how to use this
    method and the values it returns for different types of object. Note that for
    the user-defined functions, it returns the function declaration as a string and
    for built-in function the body of the function is returned as `[native code]`:


    `function adder(n1, n2) {`


    `return n1 + n2;`


    `}`


    `// Call the toString() method of the user-defined adder function`


    `var adderStr = adder.toString();`


    `// Call the toString() method of the built-in print function`


    `var printStr = print.toString;`


    `print("adderStr: \n" + adderStr);`


    `print("printstr:\n" + printStr);`


    `adderStr:`


    `function adder(n1, n2) {`


    `return n1 + n2;`


    `}`


    `printstr:`


    `function toString() { [native code] }`


    The `apply()` and `call()` methods are used for the same purpose. Both are used
    to call a method for an object. They differ only in argument types. The first
    argument to both methods are an object in whose context the method is called.
    The `apply()` method lets you specify the arguments to the method in an array
    whereas the `call()` method lets you specify each argument separately. These methods
    let you call a method of an object on any other objects. You can use these methods
    to call the overridden methods of an object.


    The following code shows how to call the `toString()` method of the `Object.prototype`
    on a `String` object:


    `// Create a String object`


    `var str = new String("Hello");`


    `// Call the toString() method of the String object`


    `var stringToString = str.toString();`


    `// Call the toString() method of the Object.prototype object on str`


    `var objectToString = Object.prototype.toString.call(str);`


    `print("String.toString(): " + stringToString);`


    `print("Object.prototype.toString(): " + objectToString);`


    `String.toString(): Hello`


    `Object.prototype.toString(): [object String]`


    The `bind()` method binds a function to an object and returns a new function object.
    When the new function is called, it executes in the context of the bound object.
    It takes variable-length arguments. The first argument is the object that you
    want to bind with the function. The rest of the arguments are the arguments you
    want to bind with the function. If you bind any arguments to the function, those
    arguments will be used when you call the bound function.'
