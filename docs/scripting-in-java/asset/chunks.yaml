    `// 声明一个名为 greeting 的变量，不使用关键字 var`


    `greeting = "Hello";`


    ## 数据类型


    数据类型可以分为两类：原始类型和对象类型。原始类型包括以下五种数据类型：


    *   Undefined

    *   Null

    *   Number

    *   Boolean

    *   String

