    10\n20\n30\n```\n\n```\njjs>\n```\n\nThe following script shows how to use the\
    \ `$ENV` global object. It prints the value of the OS environment variable on\
    \ Windows, and lists all environment variables:\n\n```\njjs> print($ENV.OS);\n\
