    | `{m}` | 恰好 `m` 次 |

    | `{m, }` | 至少 `m` 次 |

    | `{m, n}` | 至少 `m` 次，但不超过 `n` 次 |


    需要注意的是，量词必须跟在为其指定数量的字符或字符类之后。匹配任何整数的正则表达式是 `/\d+/`，它指定：“匹配一个或多个数字”。这个匹配整数的解决方案正确吗？不，不正确。假设文本是“This
    is text123 which contains 10 and 120”。如果我们用模式 `/\d+/` 匹配文本，它将匹配 123、10 和 120。以下代码演示了这一点：


    `var pattern = /\d+/g;`


    `var text = "This is text123 which contains 10 and 120";`


    `var result;`


    `while((result = pattern.exec(text)) !== null) {`


    `print("Matched ''" + result[0] + "'' at " + result.index +`


    `". Next match will begin at " + pattern.lastIndex);`


    `}`


    `Matched ''123'' at 12\. Next match will begin at 15`


    `Matched ''10'' at 31\. Next match will begin at 33`


    `Matched ''120'' at 38\. Next match will begin at 41`


    请注意，123 并未用作整数，而是单词 text123 的一部分。如果您在文本中查找整数，text123 中的 123 当然不符合整数的条件。您希望匹配所有构成文本中单词的整数。您需要指定匹配应仅在单词边界上执行，而不是在包含嵌入整数的文本内部。这对于从结果中排除整数
    123 是必要的。表 4-21 列出了在正则表达式中匹配边界的元字符。


    表 4-21.


    正则表达式内部边界匹配器列表


    | 边界匹配器 | 含义 |

    | --- | --- |

    | ^ | 一行的开头 |

    | `$` | 一行的结尾 |

    | `\b` | 一个单词边界 |

    | `\B` | 一个非单词边界 |

    | `\A` | 输入的开头 |

    | `\G` | 上一个匹配的结尾 |

    | `\Z` | 输入的结尾，但如果有最终终止符，则在其之前 |

    | `\z` | 输入的结尾 |


    了解了边界匹配器后，您可以重写前面的示例，以仅匹配输入文本中的整数：


    `var pattern = /\b\d+\b/g;`


    `var text = "This is text123 which contains 10 and 120";`


    `var result;`


    `while((result = pattern.exec(text)) !== null) {`


    `print("Matched ''" + result[0] + "'' at " + result.index +`


    `". Next match will begin at " + pattern.lastIndex);`


    `}`


    `Matched ''10'' at 31\. Next match will begin at 33`


    `Matched ''120'' at 38\. Next match will begin at 41`

