    ### 整合在一起


    在本节中，我将向你展示 `Bindings` 及其作用域、`ScriptContext`、`ScriptEngine`、`ScriptEngineManager`
    以及宿主应用程序的实例是如何协同工作的。重点将放在如何使用 `ScriptEngine` 和 `ScriptEngineManager` 来操作存储在不同作用域
    `Bindings` 中的键值对。


    一个 `ScriptEngineManager` 在一个 `Bindings` 中维护一组键值对。它允许你通过以下四种方法来操作这些键值对：


    *   `void put(String key, Object value)`

    *   `Object get(String key)`

    *   `void setBindings(Bindings bindings)`

    *   `Bindings getBindings()`


    `put()` 方法向 `Bindings` 中添加一个键值对。`get()` 方法返回指定键的值；如果未找到该键，则返回 `null`。可以使用 `setBindings()`
    方法替换引擎管理器的 `Bindings`。`getBindings()` 方法返回 `ScriptEngineManager` 的 `Bindings`
    的引用。


    默认情况下，每个 `ScriptEngine` 都有一个 `ScriptContext`，称为其默认上下文。回想一下，除了读取器和写入器之外，`ScriptContext`
    还有两个 `Bindings`：一个在引擎作用域中，一个在全局作用域中。当创建一个 `ScriptEngine` 时，其引擎作用域的 `Bindings`
    是空的，而其全局作用域的 `Bindings` 引用的是创建它的 `ScriptEngineManager` 的 `Bindings`。


    默认情况下，由同一个 `ScriptEngineManager` 创建的所有 `ScriptEngine` 实例共享该 `ScriptEngineManager`
    的 `Bindings`。在同一个 Java 应用程序中可以有多个 `ScriptEngineManager` 实例。在这种情况下，由同一个 `ScriptEngineManager`
    创建的所有 `ScriptEngine` 实例，都会共享该 `ScriptEngineManager` 的 `Bindings` 作为其默认上下文的全局作用域
    `Bindings`。


    以下代码片段创建了一个 `ScriptEngineManager`，并用它创建了三个 `ScriptEngine` 实例：


    `// 创建一个 ScriptEngineManager`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `// 使用同一个 ScriptEngineManager 创建三个 ScriptEngine`


    `ScriptEngine engine1 = manager.getEngineByName("JavaScript");`


    `ScriptEngine engine2 = manager.getEngineByName("JavaScript");`


    `ScriptEngine engine3 = manager.getEngineByName("JavaScript");`


    现在，让我们向 `ScriptEngineManager` 的 `Bindings` 中添加三个键值对，并向每个 `ScriptEngine` 的引擎作用域
    `Bindings` 中添加两个键值对：


    `// 向 manager 的 Bindings 中添加三个键值对`


    `manager.put("K1", "V1");`


    `manager.put("K2", "V2");`


    `manager.put("K3", "V3");`


    `// 向每个引擎添加两个键值对`


    `engine1.put("KE11", "VE11");`


    `engine1.put("KE12", "VE12");`


    `engine2.put("KE21", "VE21");`


    `engine2.put("KE22", "VE22");`


    `engine3.put("KE31", "VE31");`


    `engine3.put("KE32", "VE32");`


