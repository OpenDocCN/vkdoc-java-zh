    ## Nashorn 中的数组是什么？


    Nashorn 中的数组是一种特殊对象，称为 `Array` 对象，用于表示有序的值集合。`Array` 对象会以特殊方式处理某些属性名。如果一个属性名可以转换为介于
    0 到 2³²-2（含）之间的整数，则该属性名被称为数组索引，该属性被称为元素。换句话说，数组中的元素是一种特殊的属性，其名称是一个数组索引。除了向数组添加元素外，你还可以像操作
    Nashorn 对象一样添加任何其他属性。请注意，在 `Array` 对象中，每个数组索引都是一个属性，但并非每个属性都是数组索引。例如，你可以向数组添加两个名为“0”和“name”的属性，其中“0”是数组索引，因为它可以转换为整数，而“name”则只是一个普通属性。


    每个 `Array` 对象都有一个名为 `length` 的属性，其值大于所有元素的索引。当添加元素时，`length` 会自动调整。如果更改了 `length`，则索引大于或等于新
    `length` 的元素将被删除。请注意，与 Java 数组不同，Nashorn 数组是可变长度数组。也就是说，Nashorn 数组不是固定长度的数组；当添加或删除元素，或更改
    `length` 属性时，它们可以扩展和收缩。


    数组有两种类型：密集数组和稀疏数组。在密集数组中，所有元素的索引是连续的。Java 数组始终是密集数组。在稀疏数组中，所有元素的索引可能不连续。Nashorn
    数组是稀疏数组。例如，你可以在 Nashorn 中拥有一个数组，该数组在索引 1000 处有一个元素，而从索引 0 到 999 没有任何元素。


    与 Java 不同，Nashorn 中的数组没有类型。数组中的元素可以是混合类型——一个元素可以是 Number，另一个是 String，另一个是 Object，等等。Nashorn
    也支持类型化数组，但它们的工作方式与 Java 数组截然不同。我将在本章的“类型化数组”部分讨论类型化数组。


    ## 创建数组


    在 Nashorn 中创建数组有两种方法：


    *   使用数组字面量

    *   使用 `Array` 对象


    ### 使用数组字面量


    数组字面量是表示 `Array` 对象的表达式。数组字面量也称为数组初始化器。它是一个用方括号括起来的、逗号分隔的表达式列表；列表中的每个表达式代表数组的一个元素。以下是使用数组字面量的示例：


    `// 没有元素的数组，也称为空数组`


    `var emptyArray = [];`


    `// 包含两个元素的数组`


    `var names = ["Ken", "Li"];`


    `// 包含四个元素的数组。元素类型混合。`


    `var misc = [1001, "Ken", 1003, new Object()];`


    `// 打印数组长度及其元素`


    `print("数组长度: " + emptyArray.length + ", 元素: " + emptyArray);`


    `print("数组长度: " + names.length + ", 元素: " + names);`


    `print("数组长度: " + misc.length + ", 元素: " + misc);`


    `数组长度: 0, 元素:`


    `数组长度: 2, 元素: Ken,Li`


    `数组长度: 4, 元素: 1001,Ken,1003,[object Object]`


