- fmt: '# The Syntax


    The syntax to use the `jrunscript` shell is:


    `jrunscript [options] [arguments]`


    Both `[options]` and `[arguments]` are optional. However, if both are specified,
    `[options]` must precede `[arguments]`. Table [9-1](#A978-1-4842-0713-0_9_Chapter.html#Tab1)
    lists all available options for the `jrunscript` shell.


    Table 9-1. The List of Options for the `jrunscript` Shell


    | Option | Description |

    | --- | --- |

    | `-classpath <path>` | Used to specify the CLASSPATH. |

    | `-cp <path>` | The same as the `-classpath` option. |

    | `-D<name>=<value>` | Sets a system property for Java runtime. |

    | `-J<flag>` | Passes the specified `<flag>` to the JVM on which `jrunscript`
    is run. |

    | `-l <language>` | Allows you to specify a scripting language that you want to
    use with the `jrunscript`. By default, Rhino JavaScript is used in JDK 6 and JDK
    7. In JDK 8, Nashorn is the default. If you want to use a language other than
    JavaScript, say `JKScript`, you will need to use `-cp` or `-classpath` option
    to include the JAR file that contains the script engine. |

    | `-e <script>` | Executes the specified script. Typically, it is used to execute
    a one-liner script. |

    | `-encoding <encoding>` | Specifies the character encoding used while reading
    script files. |

    | `-f <script-file>` | Evaluates the specified `script-file` in batch mode. |

    | `-f -` | Allows you to evaluate scripts in interactive mode. It reads scripts
    from the standard input and executes it. |

    | `-help` | Outputs the help message and exits. |

    | `-?` | Outputs the help message and exits. |

    | `-q` | Lists all available script engines and exits. Note that script engines
    other than JavaScript are available only when you include their JAR files using
    the `-cp` or `-classpath` option. |


    The `[arguments]` part of the command is a list of arguments, which are interpreted
    depending on whether the `-e` or `-f` option is used or not. Arguments that are
    passed to the script are available inside the script as an object named `arguments`.
    Please refer to [Chapter 4](#A978-1-4842-0713-0_4_Chapter.html) for more details
    on using the `arguments` object in scripts. Table [9-2](#A978-1-4842-0713-0_9_Chapter.html#Tab2)
    lists interpretations of the arguments when they are used with the `-e` or `-f`
    option.


    Table 9-2. Interpretation of `[arguments]` in Combination of the `-e` or `-f`
    Option


    | `-e` or `-f` option | Arguments | Interpretation |

    | --- | --- | --- |

    | `Yes` | `Yes` | If `-e` or `-f` option is specified, all arguments are passed
    to the script as script arguments. |

    | `No` | `Yes` | If arguments are specified with no `-e` or `-f` option, the first
    argument is considered a script file to run. The rest of the arguments, if any,
    are passed to the script as script arguments. |

    | `No` | `No` | If arguments and `-e` or `-f` option are missing, the shell works
    in interactive mode, where the shell executes the script entered in the standard
    input interactively. |


    ## Execution Modes of the Shell


    You can use the `jrunscript` shell in the following three modes:


    * One-liner mode

    * Batch mode

    * Interactive mode


    ### One-liner Mode


    The `-e` option lets you use the shell in one-liner mode. It executes one line
    of script. The following command prints a message on the standard output using
    the Nashorn engine:


    ```

    C:\>jrunscript -e "print(''Hello Nashorn!'');"

    Hello Nashorn!

    C:\>

    ```


    In one-liner mode, the entire script must be entered on one line. However, a one-liner
    script may contain multiple statements.


    ### Batch Mode


    The `-f` option lets you use the shell in batch mode. It executes a script file.
    Consider a script file named `jrunscripttest.js` as shown in Listing 9-1.


    Listing 9-1. A `jrunscripttest.js` Script File Written in Nashorn JavaScript


    ```

    // jrunscripttest.js


    // Print a message

    print("Hello Nashorn!");


    // Add two integers and print the value

    var x = 10;

    var y = 20;

    var z = x + y;

    printf("x + y = z", x, y, z);

    ```


    The following command runs the script in the `jrunscripttest.js` file in a batch
    mode. You may need to specify the full path of the `jrunscripttest.js` file if
    it is not in the current directory.


    ```

    C:\>jrunscript -f jrunscripttest.js

    Hello Nashorn!

    10 + 20 = 30

    C:\>

    ```


    ### Interactive Mode


    In interactive mode, the shell reads and evaluates a script as it is entered on
    the standard input. There are two ways to use the shell in interactive mode:


    * Using no `-e` or `-f` options and no arguments

    * Using the `-f -` option


    The following command uses no options and arguments to enter into interactive
    mode. Pressing the Enter key makes the shell evaluate the entered script. Notice
    that you will need to execute the `exit()` or `quit()` function to exit from the
    interactive mode:


    ```

    c:\>jrunscript

    nashorn> print("Hello Interactive mode!");

    Hello Interactive mode!

    nashorn> var num = 190;

    nashorn> print("num is " + num);

    num is 190

    nashorn> exit();

    C:\>

    ```


    ## Listing Available Script Engines


    The `jrunscript` shell is a scripting-language-neutral shell. You can use it to
    run scripts in any scripting language for which the script engine JAR files are
    available. By default, the Nashorn JavaScript engine is available. To list all
    available script engines, use the `-q` option as shown:


    ```

    c:\>jrunscript -q

    Language ECMAScript ECMA - 262 Edition 5.1 implementation "Oracle Nashorn" 1.8.0_05

    ```


    Please refer to the next section on how to add a script engine to the shell.


    ## Adding a Script Engine to the Shell


    How do you make script engines other than the Nashorn engine available to the
    shell? To make a script engine available to the shell, you need to provide the
    list of JAR files for the script engine using the `-classpath` or `-cp` option.
    The following command makes `JKScript` and `jython` script engines available to
    the shell by providing the list of JAR files for `Jython` and `JKScript` engines.
    Notice that the Nashorn engine is always available by default. The command uses
    the `-q` option to list all available script engines:


    ```

    c:\> jrunscript -cp C:\jython-standalone-2.5.3.jar;C:\jkscript.jar -q

    Language python 2.5 implementation "jython" 2.5.3

    Language ECMAScript ECMA - 262 Edition 5.1 implementation "Oracle Nashorn" 1.8.0_05

    Language JKScript 1.0 implementation "JKScript Engine" 1.0

    ```


    Tip


    The CLASSPATH set using the `-cp` or `-classpath` option is effective only for
    the command in which the option is used. If you run the shell in interactive mode,
    the CLASSPATH is effective for the entire interactive session.


    ## Using Other Script Engines


    You can use other script engines by specifying the script engine name with the
    `-l` option. You must use the `-cp` or `-classpath` option to specify the JAR
    files for the script engine, so the shell has access to the engine. The following
    command uses the `JKScript` engine in interactive mode:


    ```

    C:\>jrunscript -cp C:\jkscript.jar -l JKScript

    jks> 10 + 30

    40.0

    jks> +89.7 + -9.7

    80.0

    jks>

    ```'
