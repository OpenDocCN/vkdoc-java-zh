    to javafx.scene.Parent`


    `at java.lang.invoke.MethodHandleImpl.newClassCastException(MethodHandleImpl.java:364)`


    `...`


    The exception is thrown when you try to create the scene using the global variable
    `sp`, which is a reference to a `StackPane`. Contrary to expectations, the `init()`
    method is not called before running the code in the global scope. The code in
    the global scope is called before the `init()` function is automatically called.
    In the script, the `init()` method creates the controls to be added to the scene.
    When the scene is being created, the variable `sp` is still `undefined`, which
    causes the exception. If you show the primary stage in the script, the `init()`
    function is called after the primary stage is already shown. If you let Nashorn
    show the primary stage for you, the `init()` function is called before the primary
    stage.


    Tip


    If you do not provide a `start()` function in a JavaFX script, providing the `init()`
    function is almost useless because such an `init()` function will be called after
    the primary stage has been constructed. If you want to use the `init()` function
    to initialize your JavaFX application, you should provide both `init()` and `start()`
    methods so that they are called in order.


    Finally, I will show you the simplest JavaFX application, which can be written
    in just one line of script. It will show a message in a window. The window will
    not have title text, however. Listing 11-6 contains the one-liner script. It shows
    the beauty of Nashorn, which shrinks 10 to 15 lines of Java code into 1 line of
    script! The following command runs the script that displays a window, as shown
    in Figure [11-2](#A978-1-4842-0713-0_11_Chapter.html#Fig2):


    `jjs –fx simplestfxapp.js`


    Listing 11-6\. The Simplest JavaFX Application in Nashorn


    `// simplestfxapp.js`


    `$STAGE.scene = new javafx.scene.Scene(new javafx.scene.control.Label("Hello JavaFX
    Scripting"));`


    ![A978-1-4842-0713-0_11_Fig2_HTML.jpg](A978-1-4842-0713-0_11_Fig2_HTML.jpg)


    Figure 11-2.


    The simplest JavaFX application using Nashorn script


    It was an understatement that you need to write one line of code for the simplest
    JavaFX application in Nashorn. The true statement is that you do not need to write
    even one line of code in Nashorn to display a window. Create a script file named
    `empty.js` and do not write any code in it. You can name the file anything else.
    Use the following command to run the `empty.js` file:


    `jjs –fx empty.js`


    The command will display a window as shown in Figure [11-3](#A978-1-4842-0713-0_11_Chapter.html#Fig3).
    How did Nashorn display a window without you writing even one line of code? Recall
    that Nashorn creates the primary stage and a global object `$STAGE` to represent
    that primary stage. If it sees that you have not shown the primary stage, it shows
    it for you. That is what happened in this case. The script file is empty and Nashorn
    automatically displayed the empty primary stage.


    ![A978-1-4842-0713-0_11_Fig3_HTML.jpg](A978-1-4842-0713-0_11_Fig3_HTML.jpg)


    Figure 11-3.


    The simplest JavaFX application using a Nashorn script without writing even one
    line of code


    ## Importing JavaFX Types


    You can use the fully qualified name of the JavaFX classes or import them using
    the `Java.type()` function. In the previous section, you used the fully qualified
    names of all JavaFX classes. The following snippet of code shows the two approaches
    to create a `Label` in JavaFX:


    `// Using the` `fully qualified name` `of the Label class`


    `var msg = new javafx.scene.control.Label("Hello JavaFX!");`


    `// Using Java.type() function`


    `var Label = Java.type("javafx.scene.control.Label");`


    `var msg = new Label("Hello JavaFX!");`


    It may be cumbersome to type the fully qualified names of all JavaFX classes.
    Aren’t scripts supposed to be shorter than Java code? Nashorn has a way to make
    your JavaFX script shorter. It includes several script files that import the JavaFX
    types as their simple names. You will need to load those script files using the
    `load()` method before using the simple names of JavaFX classes in your script.
    For example, Nashorn includes a `fx:controls.js` script file that imports all
    JavaFX control classes as their simple class names. Table [11-1](#A978-1-4842-0713-0_11_Chapter.html#Tab1)
    contains the list of script files and the classes/packages that they import.


    Table 11-1.


    The List of Nashorn Script Files and the Classes/Packages That They Import


    | Nashorn Script File | Imported Classes/Packages |

    | --- | --- |

    | `fx:base.js` | `javafx.stage.Stage` `javafx.scene.Scene` `javafx.scene.Group`
    `javafx/beans` `javafx/collections` `javafx/events javafx/util` |

    | `fx:graphics.js` | `javafx/animation` `javafx/application` `javafx/concurrent`
    `javafx/css` `javafx/geometry` `javafx/print` `javafx/scene` `javafx/stage` |

    | `fx:controls.js` | `javafx/scene/chartjavafx/scene/control` |

    | `fx:fxml.js` | `javafx/fxml` |

    | `fx:web.js` | `javafx/scene/web` |

    | `fx:media.js` | `javafx/scene/media` |

    | `fx:swing.js` | `javafx/embed/swing` |

    | `fx:swt.js` | `javafx/embed/swt` |


    The following snippet of code shows how to load this script file and use the simple
    name of the `javafx.scene.control.Label` class:


    `// Import all JavaFX control class names`


    `load("fx:controls.js")`


    `// Use the simple name of the Label control`


    `var msg = new Label("Hello JavaFX!");`


