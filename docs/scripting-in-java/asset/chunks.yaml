    ### 实例变量


    名为 `exp` 和 `context` 的实例变量分别表示表达式和用于求值的 `ScriptContext`。它们会被传递给此类的构造方法。


    名为 `op1` 和 `op2` 的实例变量分别表示表达式中的第一个和第二个操作数。实例变量 `op1Sign` 和 `op2Sign` 分别表示第一个和第二个操作数的符号，可以是
    `''+''` 或 `''-''`。当使用 `parse()` 方法解析表达式时，会填充这些操作数及其符号。


    名为 `operation` 的实例变量表示要对操作数执行的算术运算（`+`、`-`、`*` 或 `/`）。


    名为 `parsed` 的实例变量用于跟踪表达式是否已被解析。`parse()` 方法会将其设置为 `true`。


    ### 构造方法


    `Expression` 类的构造方法接受一个表达式和一个 `ScriptContext`。它会确保它们不为 `null`，并将它们存储在实例变量中。在将表达式存储到名为
    `exp` 的实例变量之前，它会去除表达式开头和结尾的空白字符。


    ### parse() 方法


    `parse()` 方法将表达式解析为操作数和运算。它使用正则表达式来解析表达式文本。该正则表达式期望表达式文本具有以下形式：


    *   第一个操作数的可选符号 `+` 或 `-`

    *   第一个操作数，可由字母数字、货币符号、下划线和十进制小数点的组合构成

    *   任意数量的空白字符

    *   一个运算符号，可以是 `+`、`-`、`*` 或 `/`

    *   第二个操作数的可选符号 `+` 或 `-`

    *   第二个操作数，可由字母数字、货币符号、下划线和十进制小数点的组合构成


    正则表达式 `([+-]?)` 将匹配操作数的可选符号。正则表达式 `([\\p{Alnum}\\p{Sc}_.]+)` 将匹配一个操作数，它可以是十进制数或名称。正则表达式
    `([\\s]*)` 将匹配任意数量的空白字符。正则表达式 `([+*/-])` 将匹配一个运算符号。所有正则表达式都用括号括起来以形成组，这样你就可以捕获表达式中匹配的部分。


    如果表达式与正则表达式匹配，`parse()` 方法会将匹配的部分存储到各自的实例变量中。


    请注意，用于匹配操作数的正则表达式并不完美。它会允许一些无效情况，例如操作数包含多个小数点等。不过，就本次演示而言，这已经足够了。


    ### getOperandValue() 方法


    `getOperandValue()` 方法在表达式解析后，用于表达式求值过程中。如果操作数是一个 `double` 数字，它会应用操作数的符号后返回该值。否则，它会在
    `ScriptContext` 中查找操作数的名称。如果在 `ScriptContext` 中未找到操作数的名称，它会抛出一个 `RuntimeException`。如果在
    `ScriptContext` 中找到了操作数的名称，它会检查该值是否为数字。如果该值是数字，它会应用符号后返回该值；否则，它会抛出一个 `RuntimeException`。


    该方法不支持十六进制、八进制和二进制格式的操作数。例如，像 “0x2A + 0b1011” 这样的表达式不会被当作包含两个 `int` 字面量的表达式来处理。留给读者去增强此方法，以支持十六进制、八进制和二进制格式的数字字面量。


    ### eval() 方法


    `eval()` 方法对表达式进行求值并返回一个 `double` 值。首先，如果表达式尚未被解析，它会解析该表达式。请注意，多次调用 `eval()` 只会解析表达式一次。


    它获取两个操作数的值，执行运算，并返回表达式的值。


    ## JKScriptEngine 类


    清单 8-2 包含了 `JKScript` 脚本引擎的实现。其 `eval(String, ScriptContext)` 方法包含了主要逻辑，如下所示：


    `Expression exp = new Expression(script, context);`


    `Object result = exp.eval();`


    它创建了一个 `Expression` 类的对象。它调用 `Expression` 对象的 `eval()` 方法，该方法对表达式求值并返回结果。


    `eval(Reader`, `ScriptContext)` 方法从 `Reader` 中读取所有行，将它们连接起来，并将生成的 `String` 传递给
    `eval(String, ScriptContext)` 方法以对表达式求值。请注意，`Reader` 中只能包含一个表达式。一个表达式可以跨越多行。`Reader`
    中的空白字符会被忽略。


    清单 8-2\. JKScript 脚本引擎的一个实现


    `// JKScriptEngine.java`


    `package com.jdojo.script;`


    `import java.io.BufferedReader;`


    `import java.io.IOException;`


    `import java.io.Reader;`


    `import javax.script.AbstractScriptEngine;`


    `import javax.script.Bindings;`


    `import javax.script.ScriptContext;`


    `import javax.script.ScriptEngineFactory;`


    `import javax.script.ScriptException;`


    `import javax.script.SimpleBindings;`


    `public class JKScriptEngine extends AbstractScriptEngine {`


    `private ScriptEngineFactory factory;`


    `public JKScriptEngine(ScriptEngineFactory factory) {`


    `this.factory = factory;`


    `}`


    `@Override`


    `public Object eval(String script, ScriptContext context)`


    `throws ScriptException {`


    `try {`


    `Expression exp = new Expression(script, context);`


    `Object result = exp.eval();`


    `return result;`


    `}`


    `catch (Exception e) {`


    `throw new ScriptException(e.getMessage());`


    `}`


    `}`


    `@Override`


    `public Object eval(Reader reader, ScriptContext context) throws ScriptException
    {`


    `// 从 Reader 中读取所有行`


    `BufferedReader br = new BufferedReader(reader);`


    `String script = "";`


    `String str = null;`


    `try {`


    `while ((str = br.readLine()) != null) {`


    `script = script + str;`


    `}`


    `}`


    `catch (IOException e) {`


    `throw new ScriptException(e);`


    `}`


    `// 使用 eval() 的 String 版本`


    `return eval(script, context);`


    `}`


    `@Override`


    `public Bindings createBindings() {`


    `return new SimpleBindings();`


    `}`


    `@Override`


    `public ScriptEngineFactory getFactory() {`


    `return factory;`


    `}`


    `}`

