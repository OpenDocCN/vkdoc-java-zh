    ## Summary


    The Java Scripting API supports invoking procedures, functions, and methods written
    in a scripting language directly from Java. This is made possible through the
    `Invocable` interface. If a script engine supports procedure invocation, it implements
    the `Invocable` interface. Nashorn engine supports procedure invocation. The procedure
    being invoked may be implemented as top-level functions or methods of an object.
    The `invokeFunction()` method of the `Invocable` interface is used to invoke top-level
    functions in scripts. The `invokeMethod()` method of the `Invocable` interface
    is used to invoke a method of an object. The top-level functions and the objects
    whose methods are invoked must be evaluated by the engine before invoking them.


    The Java Script API also lets you implement Java interfaces in scripting languages.
    The methods of a Java interface may be implemented as top-level functions or methods
    of an object. The `getInterface()` method of the `Invocable` interface is used
    to get the implementation of a Java interface.


    The Java scripting API also let you compile a script once, store it in the script
    engine, and execute the script multiple times. It is supported through the `Compilable`
    interface. A script engine supporting script compilation needs to implement the
    `Compilable` interface. You need to call the `compile()` method of the `Compilable`
    interface to compile a script. The `compile()` method returns an instance of the
    `CompiledScript` whose `eval()` method is called to execute the script.


    Note that implementing the `Invocable` and `Compilable` interfaces by a script
    engine is optional. Before invoking procedures and compiling scripts, you need
    to check if the script engine is an instance of these interfaces, cast the engine
    to these types, and, then, execute methods of these interfaces.


    # 6. Using Java in Scripting Languages


    In this chapter, you will learn:


    *   How to import Java classes into scripts

    *   How to create Java objects and use them in scripts

    *   How to call overloaded methods of Java objects

    *   How to create Java arrays

    *   How to extend a Java class and implement Java interfaces in scripts

    *   How to invoke superclass methods of an object from scripts


    Scripting languages allow using Java class libraries in scripts. Each scripting
    language has its own syntax for using Java classes. It is not possible, and is
    outside the scope of this book, to discuss the syntax of all scripting languages.
    In this chapter, I will discuss the syntax of using Java constructs in Nashorn.


    ## Importing Java Types


    There are four ways to import Java types into Nashorn script:


    *   Using the `Packages` global object

    *   Using the `type()` method of the `Java` global object

    *   Using the `importPackage()` and `importClass()` functions

    *   Using a `JavaImporter` in a `with` clause


    Of the four types of importing Java types, the second type, using the `type()`
    method of the global Java object, is preferred. The following sections will describe
    the four ways of importing Java type in script in detail.'
