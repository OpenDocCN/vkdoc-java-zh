    ## Using Script Objects in Java Code


    When objects and values from Nashorn cross the script-Java boundary to enter Java
    code, they need to be represented as Java objects and values. Table [12-2](#A978-1-4842-0713-0_12_Chapter.html#Tab2)
    lists the mapping of classes between script objects and their corresponding Java
    objects.


    Table 12-2.


    The List of Mapping Between Classes of Script Objects and Java Objects


    | Script Object’s Type | Java Object’s Type |

    | --- | --- |

    | Undefined | `jdk.nashorn.internal.runtime.Undefined` |

    | Null | `null` |

    | Number | `java.lang.Number` |

    | Boolean | `java.lang.Boolean` |

    | Primitive String type | `java.lang.String` |

    | Any script object | `jdk.nashorn.api.scripting.ScriptObjectMirror` |

    | Any Java object | `The same as the Java object in the script` |


    Note that you are not supposed to use the classes and interfaces in the `jdk.nashorn.internal`
    package and its subpackages. They are listed in the table only for informational
    purposes. In this table, the mapping for the Nashorn Number type is shown as `java.lang.Number`
    type. Although Nashorn tries to pass `java.lang.Integer` and j`ava.lang.Double`
    objects for numeric value whenever possible, it is not reliable to depend on such
    specialized Java types. You should expect a `java.lang.Number` instance when a
    Nashorn Number is passed from a script to Java code. Whenever necessary, values
    of Number and Boolean types in Nashorn are converted to the corresponding Java
    primitive types, such as `int`, `double`, `boolean`, and so on.


    In Nashorn, a script object is represented as an instance of the `jdk.nashorn.internal.runtime.ScriptObject`
    class. When the script object is passed to Java code, it is wrapped in a `ScriptObjectMirror`
    object. Before JDK8u40, if you passed a script object to a Java method that declared
    its parameter as `java.lang.Object` type, a `ScriptObject` was passed, not a `ScriptObjectMirror`.
