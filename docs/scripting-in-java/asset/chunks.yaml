    文件夹中查找名为 `groovy-all-2.0.0-rc-2.jar` 的 JAR 文件。将此 JAR 文件添加到 CLASSPATH。 |

    | Jython | 2.5.3 | [`www.jython.org`](http://www.jython.org/) | 下载 Jython 安装程序文件，它是一个
    JAR 文件。解压 `jython.jar` 文件并将其添加到 CLASSPATH。 |

    | JRuby | 1.7.13 | [`www.jruby.org`](http://www.jruby.org/) | 下载 JRuby 安装文件。你可以选择下载一个
    ZIP 文件。解压它。在 `lib` 文件夹中，你会找到一个 `jruby.jar` 文件，你需要将其包含到 CLASSPATH 中。 |


