    \ with a name of `jks`, `JKScript`, or `jkscript` as coded in the `getNames()`\
    \ method.\n\nListing 8-3. A ScriptEngineFactory Implementation for JKScript Script\
    \ Engine\n\n```\n// JKScriptEngineFactory.java\npackage com.jdojo.script;\n\n\
    import java.util.ArrayList;\nimport java.util.Arrays;\nimport java.util.Collections;\n\
    import java.util.List;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineFactory;\n\
    \npublic class JKScriptEngineFactory implements ScriptEngineFactory {\n    @Override\n\
    \    public String getEngineName() {\n        return \"JKScript Engine\";\n  \
    \  }\n\n    @Override\n    public String getEngineVersion() {\n        return\
    \ \"1.0\";\n    }\n\n    @Override\n    public List<String> getExtensions() {\n\
    \        return Collections.unmodifiableList(Arrays.asList(\"jks\"));\n    }\n\
