  raw: '### The Instance Variables


    Instance variables named `exp` and `context` are the expression and the `ScriptContext`
    to evaluate the expression, respectively. They are passed to the constructor of
    this class.


    The instance variables named `op1` and `op2` represent the first and the second
    operands in the expression, respectively. The instance variables `op1Sign` and
    `op2Sign` represent signs, which could be ‘+’ or ‘-’, for the first and the second
    operands in the expression, respectively. The operands and their signs are populated
    when the expression is parsed using the `parse()` method.


    The instance variable named `operation` represents an arithmetic operation (`+`,
    `-`, `*`, or `/`)) to be performed on the operands.


    The instance variable named `parsed` is used to keep track of the fact whether
    the expression has been parsed or not. The `parse()` method sets it to `true`.


    ### The Constructor


    The constructor of the `Expression` class accepts an expression and a `ScriptContext`.
    It makes sure that they are not `null` and stores them in the instance variables.
    It trims the leading and trailing whitespaces from the expression before storing
    it in the instance variable named `exp`.


    ### The parse() Method


    The `parse()` method parses the expression into operands and operations. It uses
    a regular expression to parse the expression text. The regular expression expects
    the expression text in the following form:


    *   An optional sign `+` or `-` for the first operand

    *   The first operand that may consist of a combination of alphanumeric letters,
    currency signs, underscores, and decimal points

    *   Any number of whitespaces

    *   An operation sign that may be `+`, `-`, `*`, or `/`

    *   An optional sign `+` or `-` for the second operand

    *   The second operand that may consist of a combination of alphanumeric letters,
    currency signs, underscores, and decimal points


    The regular expression `([+-]?)` will match the optional sign for the operand.
    The regular expression `([\\p{Alnum}\\p{Sc}_.]+)` will match an operand, which
    may be a decimal number or a name. The regular expression `([\\s]*)` will match
    any number of whitespaces. The regular expression `([+*/-])` will match an operation
    sign. All regular expressions are enclosed in parentheses to form groups, so you
    can capture the matched parts of the expression.


    If an expression matches the regular expression, the `parse()` method stores the
    matched parts into respective instance variables.


    Notice that the regular expression to match operands is not perfect. It will allow
    several invalid cases, such as an operand having multiple decimal points, and
    so on. However, for the purposes of this demonstration, it will do.


    ### The getOperandValue() Method


    The `getOperandValue()` method is used during an expression evaluation after the
    expression has been parsed. If the operand is a `double` number, it returns the
    value by applying the sign of the operand. Otherwise, it looks up the name of
    the operand in the `ScriptContext`. If the name of the operand is not found in
    the `ScriptContext`, it throws a `RuntimeException`. If the name of the operand
    is found in the `ScriptContext`, it checks if the value is a number. It the value
    is a number, it returns the value after applying the sign to the value; otherwise,
    it throws a `RuntimeException`.


    The method does not support operands in hexadecimal, octal, and binary formats.
    For example, an expression like “0x2A + 0b1011” will not be treated as an expression
    having two operands with `int` literals. It is left to readers to enhance this
    method to support numeric literals in hexadecimal, octal, and binary formats.


    ### The eval() Method


    The `eval()` method evaluates the expression and returns a `double` value. First,
    it parses the expression if it has not already been parsed. Note that multiple
    calls to the `eval()` parses the expression only once.


    It obtains values for both operands, performs the operation, and returns the value
    of the expression.


    ## The JKScriptEngine Class


    Listing 8-2 contains the implementation for the `JKScript` script engine. Its
    `eval(String, ScriptContext)` method contains the main logic, as shown:


    `Expression exp = new Expression(script, context);`


    `Object result = exp.eval();`


    It creates an object of the `Expression` class. It calls the `eval()` method of
    the `Expression` object that evaluates the expression and returns the result.


    The `eval(Reader`, `ScriptContext)` method reads all lines from the `Reader`,
    concatenates them, and passes the resulting `String` to the `eval(String, ScriptContext)`
    method to evaluate the expression. Notice that a `Reader` must have only one expression.
    An expression may be split into multiple lines. Whitespaces in the `Reader` are
    ignored.


    Listing 8-2\. An Implementation of JKScript Script Engine


    `// JKScriptEngine.java`


    `package com.jdojo.script;`


    `import java.io.BufferedReader;`


    `import java.io.IOException;`


    `import java.io.Reader;`


    `import javax.script.AbstractScriptEngine;`


    `import javax.script.Bindings;`


    `import javax.script.ScriptContext;`


    `import javax.script.ScriptEngineFactory;`


    `import javax.script.ScriptException;`


    `import javax.script.SimpleBindings;`


    `public class JKScriptEngine extends AbstractScriptEngine {`


    `private ScriptEngineFactory factory;`


    `public JKScriptEngine(ScriptEngineFactory factory) {`


    `this.factory = factory;`


    `}`


    `@Override`


    `public Object eval(String script, ScriptContext context)`


    `throws ScriptException {`


    `try {`


    `Expression exp = new Expression(script, context);`


    `Object result = exp.eval();`


    `return result;`


    `}`


    `catch (Exception e) {`


    `throw new ScriptException(e.getMessage());`


    `}`


    `}`


    `@Override`


    `public Object eval(Reader reader, ScriptContext context) throws ScriptException
    {`


    `// Read all lines from the Reader`


    `BufferedReader br = new BufferedReader(reader);`


    `String script = "";`


    `String str = null;`


    `try {`


    `while ((str = br.readLine()) != null) {`


    `script = script + str;`


    `}`


    `}`


    `catch (IOException e) {`


    `throw new ScriptException(e);`


    `}`


    `// Use the String version of eval()`


    `return eval(script, context);`


    `}`


    `@Override`


    `public Bindings createBindings() {`


    `return new SimpleBindings();`


    `}`


    `@Override`


    `public ScriptEngineFactory getFactory() {`


    `return factory;`


    `}`


    `}`'
