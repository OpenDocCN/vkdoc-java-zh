    `var deptId = 400, emplList = ["Ken", "Lydia", "Simon"];`


    请注意，你可以在 Nashorn 中使用数组字面量创建数组，该字面量包含一个用逗号分隔的数组元素列表，并括在方括号中。我将在第 7 章中详细讨论数组。


