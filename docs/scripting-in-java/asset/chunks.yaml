- fmt: "# Return Value of the `eval()` Method\n\nThe `eval()` method of the `ScriptEngine`\
    \ returns an `Object`, which is the last value in the script. It returns `null`\
    \ if there is no last value in the script. It is error-prone, and confusing at\
    \ the same time, to depend on the last value in a script. The following snippet\
    \ of code shows some examples of using the return value of the `eval()` method\
    \ for Nashorn. The comments in the code indicate the returned value from the `eval()`\
    \ method:\n\n```\nObject result = null;\n\n// Assigns 3 to result because the\
    \ last expression 1 + 2 evaluates to 3\nresult = engine.eval(\"1 + 2;\");\n\n\
    // Assigns 7 to result because the last expression 3 + 4 evaluates to 7\nresult\
    \ = engine.eval(\"1 + 2; 3 + 4;\");\n\n// Assigns 6 to result because the last\
    \ statement v = 6 evaluates to 6\nresult = engine.eval(\"1 + 2; 3 + 4; var v =\
    \ 5; v = 6;\");\n\n// Assigns 7 to result. The last statement \"var v = 5\" is\
    \ a\n// declaration and it does not evaluate to a value. So, the last\n// evaluated\
    \ value is 3 + 4 (=7).\nresult = engine.eval(\"1 + 2; 3 + 4; var v = 5;\");\n\n\
    // Assigns null to result because the print() function returns undefined\n// that\
    \ is translated to null in Java.\nresult = engine.eval(\"print(1 + 2)\");\n```\n\
    \nIt is better not to depend on the returned value from the `eval()` method. You\
    \ should pass a Java object to the script as a parameter and let the script store\
    \ the returned value of the script in that object. After the `eval()` method is\
    \ executed, you can query that Java object for the returned value. Listing 3-5\
    \ contains the code for a `Result` class that wraps an integer. You will pass\
    \ an object of the `Result` class to the script that will store the returned value\
    \ in it. After the script finishes, you can read the integer value stored in the\
    \ `Result` object in your Java code. The `Result` needs to be declared public\
    \ so it is accessible to the script engine. The program in Listing 3-6 shows how\
    \ to pass a `Result` object to a script that populates the `Result` object with\
    \ a value. The program contains a `throws` clause in the `main()` method’s declaration\
    \ to keep the code short.\n\n**Listing 3-5.** A `Result` Class That Wraps an Integer\n\
    \n```\n// Result.java\npackage com.jdojo.script;\n\npublic class Result {\n  \
    \  private int val = -1;\n\n    public void setValue(int x) {\n        val = x;\n\
    \    }\n\n    public int getValue() {\n        return val;\n    }\n}\n```\n\n\
    **Listing 3-6.** Collecting the Return Value of a Script in a `Result` Object\n\
    \n```\n// ResultBearingScript.java\npackage com.jdojo.script;\n\nimport javax.script.ScriptEngine;\n\
    import javax.script.ScriptEngineManager;\nimport javax.script.ScriptException;\n\
    \npublic class ResultBearingScript {\n    public static void main(String[] args)\
    \ throws ScriptException {\n        // Get the Nashorn engine\n        ScriptEngineManager\
    \ manager = new ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JavaScript\");\n\n        // Pass a Result object to the script. The script will\
    \ store the\n        // result of the script in the result object\n        Result\
    \ result = new Result();\n        engine.put(\"result\", result);\n\n        //\
    \ Store the script in a String\n        String script = \"3 + 4; result.setValue(101);\"\
    ;\n\n        // Execute the script, which uses the passed in\n        // Result\
    \ object to return a value\n        engine.eval(script);\n\n        // Use the\
    \ result object to get the returned value from the script\n        int returnedValue\
    \ = result.getValue(); // Will be 101\n        System.out.println(\"Returned value\
    \ is \" + returnedValue);\n    }\n}\n```\n\n```\nReturned value is 101\n```\n\n\
    ## Reserved Keys for Engine Scope Bindings\n\nTypically, a key in the engine scope\
    \ `Bindings` represents a script variable. Some keys are reserved and they have\
    \ special meanings. Their values may be passed to the engine by the implementation\
    \ of the engine. An implementation may define additional reserved keys.\n\nTable\
    \ 3-1 contains the list of all reserved keys. Those keys are also declared as\
    \ constants in the `ScriptEngine` interface. An implementation of a script engine\
    \ is not required to pass all these keys to the engine in the engine scope bindings.\
    \ As a developer, you are not supposed to use these keys to pass parameters from\
