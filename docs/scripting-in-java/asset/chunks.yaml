    `===` operator. The statements in the first matched `case` clause are executed.
    If the `case` clause contains a `break` statement, the control is transferred
    to the end of the `switch` statement; otherwise, the statements following the
    matched `case` clause are executed. If no match is found, the statements in the
    `default` clause are executed. If there are multiple matches, only the statements
    in the first matched `case` clause are executed. In Java, the `expression` must
    be of type `int`, `String`, or `enum,` whereas in Nashorn the `expression` can
    be of any type including the Object, Null, and Undefined types. The following
    snippet of code demonstrates how to use a `switch` statement:


    `// Define a match function that matches the passed in argument`


    `// using a switch statement`


    `function match(value) {`


    `switch (value) {`


    `case undefined:`


    `print("Matched undefined:", value);`


    `break;`


    `case null:`


    `print("Matched null:", value);`


    `break;`


    `case ''2'':`


    `print("Matched string ''2'':", value);`


    `break;`


    `case 2:`


    `print("Matched number 2: ", value);`


    `break;`


    `default:`


    `print("No match:", value);`


    `break;`


    `}`


    `}`


    `// Call the match function with different arguments`


    `match(undefined);`


    `match(null);`


    `match(2);`


    `match(''2'');`


    `match("Hello");`


    `Matched undefined: undefined`


    `Matched null: null`


    `Matched number 2: 2`


    `Matched string ''2'': 2`


    `No match: Hello`


    ### Labelled Statements


    A label is simply an identifier followed with a colon. Any statement in Nashorn
    can be labelled by putting a label before the statement. In fact, Nashorn lets
    you have multiple labels for a statement. Once you have labelled a statement,
    you can use the same label with `break` and `continue` statements to break and
    continue to the label. Typically, you label outer iteration statements so that
    you can continue or break out of nested loops. Labelled statements work the same
    way as they do in Java. The following is an example of using a labeled statement
