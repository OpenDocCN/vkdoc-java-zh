- fmt: "# Using the JKScript Script Engine\n\nIt is time to test your `JKScript` script\
    \ engine. The first and most important step is to include the `jkscript.jar`,\
    \ which you created the previous section, to the application CLASSPATH. Once you\
    \ have included the `jkscript.jar` file in your application CLASSPATH, using `JKScript`\
    \ is no different from using any other script engines.\n\nThe following snippet\
    \ of code creates an instance of the `JKScript` script engine using `JKScript`\
    \ as its name. You can also use its other names such as `jks` and `jkscript`:\n\
    \n```\n// Create the JKScript engine\nScriptEngineManager manager = new ScriptEngineManager();\n\
    ScriptEngine engine = manager.getEngineByName(\"JKScript\");\nif (engine == null)\
    \ {\n    System.out.println(\"JKScript engine is not available. \" +\n       \
    \ \"Add jkscript.jar to CLASSPATH.\");\n}\nelse {\n    // Evaluate your JKScript\n\
    }\n```\n\nListing 8-5 contains a program that uses the `JKScript` script engine\
    \ to evaluate different types of expressions. Expressions stored in `String` objects\
    \ and files are executed. Some expressions use numeric literals and some bind\
    \ variables whose values are passed in bindings in engine scope and global scope\
    \ of the default `ScriptContext` of the engine. Note that this program expects\
    \ a file named `jkscript.txt` in the current directory that contains an arithmetic\
    \ expression that can be understood by the `JKScript` script engine. If the script\
    \ file does not exist, the program prints a message on the standard output with\
    \ the path of the expected script file. You may get a different output in the\
    \ last line.\n\n## Listing 8-5. Using the JKScript Script Engine\n\n```\n// JKScriptTest.java\n\
    package com.jdojo.script;\n\nimport java.io.FileNotFoundException;\nimport java.io.IOException;\n\
    import java.io.Reader;\nimport java.nio.file.Files;\nimport java.nio.file.Path;\n\
    import java.nio.file.Paths;\nimport javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n\npublic class JKScriptTest {\n    public\
    \ static void main(String[] args) throws FileNotFoundException, IOException {\n\
    \        // Create JKScript engine\n        ScriptEngineManager manager = new\
    \ ScriptEngineManager();\n        ScriptEngine engine = manager.getEngineByName(\"\
    JKScript\");\n        if (engine == null) {\n            System.out.println(\"\
    JKScript engine is not available. \" +\n                \"Add jkscript.jar to\
    \ CLASSPATH.\");\n            return;\n        }\n\n        // Test scripts as\
    \ String\n        testString(manager, engine);\n        // Test scripts as a Reader\n\
    \        testReader(manager, engine);\n    }\n\n    public static void testString(ScriptEngineManager\
    \ manager, ScriptEngine engine) {\n        try {\n            // Use simple expressions\
    \ with numeric literals\n            String script = \"12.8 + 15.2\";\n      \
    \      Object result = engine.eval(script);\n            System.out.println(script\
    \ + \" = \" + result);\n\n            script = \"-90.0 - -10.5\";\n          \
    \  result = engine.eval(script);\n            System.out.println(script + \" =\
    \ \" + result);\n\n            script = \"5 * 12\";\n            result = engine.eval(script);\n\
    \            System.out.println(script + \" = \" + result);\n\n            script\
    \ = \"56.0 / -7.0\";\n            result = engine.eval(script);\n            System.out.println(script\
    \ + \" = \" + result);\n\n            // Use global scope bindings variables\n\
    \            manager.put(\"num1\", 10.0);\n            manager.put(\"num2\", 20.0);\n\
    \            script = \"num1 + num2\";\n            result = engine.eval(script);\n\
    \            System.out.println(script + \" = \" + result);\n\n            //\
    \ Use global and engine scopes bindings. num1 from\n            // engine scope\
    \ and num2 from global scope will be used.\n            engine.put(\"num1\", 70.0);\n\
    \            script = \"num1 + num2\";\n            result = engine.eval(script);\n\
    \            System.out.println(script + \" = \" + result);\n\n            //\
    \ Try mixture of number literal and bindings. num1\n            // from the engine\
    \ scope bindings will be used\n            script = \"10 + num1\";\n         \
    \   result = engine.eval(script);\n            System.out.println(script + \"\
    \ = \" + result);\n        }\n        catch (ScriptException e) {\n          \
    \  e.printStackTrace();\n        }\n    }\n\n    public static void testReader(ScriptEngineManager\
    \ manager, ScriptEngine engine) {\n        try {\n            Path scriptPath\
    \ = Paths.get(\"jkscript.txt\").toAbsolutePath();\n            if (!Files.exists(scriptPath))\
    \ {\n                System.out.println(scriptPath +\n                    \" script\
    \ file does not exist.\");\n                return;\n            }\n         \
    \   try(Reader reader = Files.newBufferedReader(scriptPath);) {\n            \
    \    Object result = engine.eval(reader);\n                System.out.println(\"\
    Result of \" +\n                    scriptPath + \" = \" + result);\n        \
    \    }\n        }\n        catch(ScriptException | IOException e) {\n        \
    \    e.printStackTrace();\n        }\n    }\n}\n```\n\n```\n12.8 + 15.2 = 28.0\n\
    -90.0 - -10.5 = -79.5\n5 * 12 = 60.0\n56.0 / -7.0 = -8.0\nnum1 + num2 = 30.0\n\
    num1 + num2 = 90.0\n10 + num1 = 80.0\nResult of C:\\jkscript.txt = 190.0\n```\n\
    \n## Summary\n\nYou can implement a script engine using the Java Script API. You\
    \ will need to provide the implementation for the `ScriptEngine` and the `ScriptEngineFactory`\
    \ interfaces. You need to package your script engine code in a certain way, so\
    \ the engine can be discovered by the `ScriptManager` at runtime. The JAR file\
    \ for the engine should contain a file named `META-INF\\services\\javax.script.ScriptEngineFactory`\
    \ that should contain the fully qualified names of all script engine factory classes;\
    \ the Java Script API discovers those script engine factories automatically. Once\
    \ you package and deploy the script engine code, you can access it the same way\
    \ you have been accessing Nashorn and other script engines.\n\n# The `jrunscript`\
    \ Command-Line Shell\n\nIn this chapter, you will learn:\n\n*   What the `jrunscript`\
    \ command-line shell is\n*   How to invoke the `jrunscript` command-line shell\n\
    *   The different modes in which the `jrunscript` command-line shell can be invoked\n\
    *   How to list the available script engines with the `jrunscript` command-line\
    \ shell\n*   How to add a script engine to the `jrunscript` command-line shell\n\
    *   How to pass arguments to the `jrunscript` command-line shell\n*   The global\
    \ functions made available by the `jrunscript` command-line shell\n\nThe JDK includes\
    \ a command-line script shell called `jrunscript`. It is script-engine-independent\
    \ and it can be used to evaluate any script including your `JKScript` that you\
    \ developed in Chapter 8. You can find this shell in the `JAVA_HOME\\bin` directory,\
    \ where `JAVA_HOME` is the directory in which you have installed the JDK. In this\
    \ section, I will discuss how to use the `jrunscript` shell to evaluate scripts\
    \ using different script engines."
