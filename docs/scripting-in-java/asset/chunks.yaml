- fmt: "# Extending Java Classes Implementing Interfaces\n\nJavaScript lets you extend\
    \ Java classes and implement Java interfaces in JavaScript. The following sections\
    \ describe different ways of achieving this.\n\n## Using a Script Object\n\nYou\
    \ need to create a script object that contains implementations of the methods\
    \ of the interface and pass it to the constructor of the Java interface using\
    \ the `new` operator. In Java, an interface does not have a constructor and it\
    \ cannot be used with the `new` operator, except when creating an anonymous class.\
    \ However, JavaScript lets you do that.\n\nIn Chapter 5, we had created the `Calculator`\
    \ interface with four abstract methods. The code for the interface is shown again\
    \ in Listing 6-2 for your reference.\n\n**Listing 6-2.** The `Calculator` Interface\
    \ in Java\n\n```java\n// Calculator.java\npackage com.jdojo.script;\n\npublic\
    \ interface Calculator {\n    double add(double n1, double n2);\n    double subtract(double\
    \ n1, double n2);\n    double multiply(double n1, double n2);\n    double divide(double\
    \ n1, double n2);\n}\n```\n\nIn Chapter 5, we have created a `calculator` JavaScript\
    \ object whose script is shown again in Listing 6-3.\n\n**Listing 6-3.** The `Calculator`\
    \ Interface in Java\n\n```javascript\n// calculator.js\n// Create an object\n\
    var calculator = new Object();\n\n// Add four methods to the prototype to the\
    \ calculator object\ncalculator.add = function(n1, n2) n1 + n2;\ncalculator.subtract\
    \ = function(n1, n2) n1 - n2;\ncalculator.multiply = function(n1, n2) n1 * n2;\n\
    calculator.divide = function(n1, n2) n1 / n2;\n```\n\nNotice that the `calculator`\
    \ object in JavaScript contains the implementation of all abstract methods of\
    \ the Java `Calculator` interface. The following statement creates an implementation\
    \ of the `Calculator` interface:\n\n```javascript\n// Load the calculator object\n\
    load(\"calculator.js\");\n\n// Get the Java interface type\nvar Calculator = Java.type(\"\
    com.jdojo.script.Calculator\");\n\n// Create an instance of the com.jdojo.script.Calculator\
    \ interface\n// passing its constructor a calculator JavaScript object\nvar calc\
    \ = new Calculator(calculator);\n```\n\nNow you can start using the `calc` object\
    \ as if it were an implementation of the `Calculator` interface, as shown:\n\n\
    ```javascript\n// Use the instance of the Calculator interface\nvar x = 15.0,\
    \ y = 10.0;\nvar addResult = calc.add(x, y);\nvar subResult = calc.subtract(x,\
    \ y);\nvar mulResult = calc.multiply(x, y);\nvar divResult = calc.divide(x, y);\n\
    \nprintf(\"calc.add(%.2f, %.2f) = %.2f\", x, y, addResult);\nprintf(\"calc.subtract(%.2f,\
    \ %.2f) = %.2f\", x, y, subResult);\nprintf(\"calc.multiply(%.2f, %.2f) = %.2f\"\
    , x, y, mulResult);\nprintf(\"calc.divide(%.2f, %.2f) = %.2f\", x, y, divResult);\n\
    ```\n\nOutput:\n\n```\ncalc.add(15.00, 10.00) = 25.00\ncalc.subtract(15.00, 10.00)\
    \ = 5.00\ncalc.multiply(15.00, 10.00) = 150.00\ncalc.divide(15.00, 10.00) = 1.50\n\
    ```\n\n## Using the Anonymous Class–Like Syntax\n\nThis method uses a syntax that\
    \ is very similar to the syntax of creating an anonymous class in Java. The following\
    \ statement implements the Java `Calculator` interface and creates an instance\
    \ of that implementation:\n\n```javascript\n// Get the Java interface type\nvar\
    \ Calculator = Java.type(\"com.jdojo.script.Calculator\");\n\n// Create an instance\
    \ of the com.jdojo.script.Calculator interface\n// using an anonymous class-like\
    \ syntax\nvar calc = new Calculator() {\n    add: (function(n1, n2) n1 + n2),\n\
    \    subtract: (function(n1, n2) n1 - n2),\n    multiply: (function(n1, n2) n1\
    \ * n2),\n    divide: (function(n1, n2) n1 / n2)\n};\n```\n\nNow you can use the\
    \ `calc` object the same way as you did before.\n\n## Using the JavaAdapter Object\n\
    \nJavaScript lets you implement multiple interfaces and extend a class using the\
    \ `JavaAdapter` class. However, the Rhino JavaScript implementation that is bundled\
    \ with JDK has overridden the implementation of `JavaAdapter`, which allows you\
    \ to implement only one interface; it does not let you extend a class. The first\
    \ argument to the `JavaAdapter` constructor is the interface to implement and\
    \ the second argument is the script object that implements the interface’s abstract\
    \ methods. To use the `JavaAdapter` object in Nashorn, you need to load the Rhino\
    \ compatibility module. The following snippet of code implements the `Calculator`\
    \ interface using `JavaAdapter`:\n\n```javascript\n// Need to load the compatibility\
    \ module in Nashorn.\n// You do not need to the following load() call in Rhino.\n\
    load(\"nashorn:mozilla_compat.js\");\n\n// Load the script that creates the calculator\
    \ JavaScript object\nload(\"calculator.js\");\n\nvar calc = new JavaAdapter(com.jdojo.script.Calculator,\
    \ calculator);\n```\n\nNow you can use the `calc` object the same way as you did\
    \ before. It is an instance of the `com.jdojo.script.Calculator` interface whose\
    \ implementation has been provided by the methods declared in the `calculator`\
    \ object as defined in script in the `calculator.js` file.\n\n## Using the Java.extend()\
    \ Method\n\nNashorn provides a better way to extend a class and implement multiple\
    \ interfaces using the `Java.extend()` method. In the `Java.extend()` method,\
    \ you can pass maximum one class type and multiple interface types. It returns\
    \ a type that combines all passed in types. You need to use the previously discussed\
    \ anonymous class–like syntax to provide the implementation for the abstract methods\
    \ of the new type or override the existing method of the types being extended.\
    \ The following snippet of code uses the `Java.extend()` method to implement the\
    \ `Calculator` interface:\n\n```javascript\n// Get the Calculator interface type\n\
    var Calculator = Java.type(\"com.jdojo.script.Calculator\");\n\n// Get a type\
    \ that extends the Calculator type\nvar CalculatorExtender = Java.extend(Calculator);\n\
    \n// Implement the abstract methods in CalculatorExtender\n// using an anonymous\
    \ class like syntax\nvar calc = new CalculatorExtender() {\n    add: (function(n1,\
    \ n2) n1 + n2),\n    subtract: (function(n1, n2) n1 - n2),\n    multiply: (function(n1,\
    \ n2) n1 * n2),\n    divide: (function(n1, n2) n1 / n2)\n};\n\n// Use the instance\
    \ of the Calculator interface\nvar x = 15.0, y = 10.0;\nvar addResult = calc.add(x,\
    \ y);\nvar subResult = calc.subtract(x, y);\nvar mulResult = calc.multiply(x,\
    \ y);\nvar divResult = calc.divide(x, y);\n\nprintf(\"calc.add(%.2f, %.2f) = %.2f\"\
    , x, y, addResult);\nprintf(\"calc.subtract(%.2f, %.2f) = %.2f\", x, y, subResult);\n\
    printf(\"calc.multiply(%.2f, %.2f) = %.2f\", x, y, mulResult);\nprintf(\"calc.divide(%.2f,\
    \ %.2f) = %.2f\", x, y, divResult);\n```\n\nOutput:\n\n```\ncalc.add(15.00, 10.00)\
    \ = 25.00\ncalc.subtract(15.00, 10.00) = 5.00\ncalc.multiply(15.00, 10.00) = 150.00\n\
    calc.divide(15.00, 10.00) = 1.50\n```\n\nYou can use the `Java.extend()` method\
    \ to extend concrete classes, abstract classes, and interfaces. The following\
    \ code extends the concrete class `java.lang.Thread` and implements the `Calculator`\
    \ interface. The new implementation overrides the `run()` method of the `Thread`\
    \ class:\n\n```javascript\n// Get the Calculator interface type\nvar Calculator\
    \ = Java.type(\"com.jdojo.script.Calculator\");\nvar Thread = Java.type(\"java.lang.Thread\"\
    );\n\n// Get a type that extends the Calculator type\nvar ThreadCalcExtender =\
    \ Java.extend(Thread, Calculator);\n\n// Implement the abstract methods in CalculatorExtender\n\
    // using an anonymous class like syntax\nvar calcThread = new ThreadCalcExtender()\
    \ {\n    add: (function(n1, n2) n1 + n2),\n    subtract: (function(n1, n2) n1\
    \ - n2),\n    multiply: (function(n1, n2) n1 * n2),\n    divide: (function(n1,\
    \ n2) n1 / n2),\n    run: function() {\n        var n1 = Math.random();\n    \
    \    var n2 = Math.random();\n        printf(\"n1 = %.2f, n2 = %.2f\", n1, n2);\n\
    \        var addResult = this.add(n1, n2);\n        printf(\"calc.add(%.2f, %.2f)\
    \ = %.2f\", n1, n2, addResult);\n    }\n};\n\n// Start the thread\ncalcThread.start();\n\
    ```\n\nOutput:\n\n```\nn1 = 0.61, n2 = 0.66\ncalc.add(0.61, 0.66) = 1.27\n```"
  raw: '## Extending Java Classes Implementing Interfaces


    JavaScript lets you extend Java classes and implement Java interfaces in JavaScript.
    The following sections describe different ways of achieving this.


    ### Using a Script Object


    You need to create a script object that contains implementations of the methods
    of the interface and pass it to the constructor of the Java interface using the
    `new` operator. In Java, an interface does not have a constructor and it cannot
    be used with the `new` operator, except when creating an anonymous class. However,
    JavaScript lets you do that.


    In [Chapter 5](#A978-1-4842-0713-0_5_Chapter.html), we had created the `Calculator`
    interface with four abstract methods. The code for the interface is shown again
    in Listing 6-2 for your reference.


    Listing 6-2\. The Calculator Interface in Java


    `// Calculator.java`


    `package com.jdojo.script;`


    `public interface Calculator {`


    `double add (double n1, double n2);`


    `double subtract (double n1, double n2);`


    `double multiply (double n1, double n2);`


    `double divide (double n1, double n2);`


    `}`


    In [Chapter 5](#A978-1-4842-0713-0_5_Chapter.html), we have created a `calculator`
    JavaScript object whose script is shown again in Listing 6-3.


    Listing 6-3\. The Calculator Interface in Java


    `// calculator.js`


    `// Create an object`


    `var calculator = new Object();`


    `// Add four methods to the prototype to the calculator object`


    `calculator.add = function (n1, n2) n1 + n2;`


    `calculator.subtract = function (n1, n2) n1 - n2;`


    `calculator.multiply = function (n1, n2) n1 * n2;`


    `calculator.divide = function (n1, n2) n1 / n2;`


    Notice that the `calculator` object in JavaScript contains the implementation
    of all abstract methods of the Java `Calculator` interface. The following statement
    creates an implementation of the `Calculator` interface:


    `// Load the calculator object`


    `load("calculator.js");`


    `// Get the Java interface type`


    `var Calculator = Java.type("com.jdojo.script.Calculator");`


    `// Create an instance of the com.jdojo.script.Calculator interface`


    `// passing its constructor a calculator JavaScript object`


    `var calc = new Calculator(calculator);`


    Now you can start using the `calc` object as if it were an implementation of the
    `Calculator` interface, as shown:


    `// Use the instance of teh Calculator interface`


    `var x = 15.0, y = 10.0;`


    `var addResult = calc.add(x, y);`


    `var subResult = calc.subtract(x, y);`


    `var mulResult = calc.multiply(x, y);`


    `var divResult = calc.divide(x, y);`


    `printf("calc.add(%.2f, %.2f) = %.2f", x, y, addResult);`


    `printf("calc.subtract(%.2f, %.2f) = %.2f", x, y, subResult);`


    `printf("calc.multiply(%.2f, %.2f) = %.2f", x, y, mulResult);`


    `printf("calc.divide(%.2f, %.2f) = %.2f", x, y, divResult);`


    `calc.add(15.00, 10.00) = 25.00`


    `calc.subtract(15.00, 10.00) = 5.00`


    `calc.multiply(15.00, 10.00) = 150.00`


    `calc.divide(15.00, 10.00) = 1.50`


    ### Using the Anonymous Class–Like Syntax


    This method uses a syntax that is very similar to the syntax of creating an anonymous
    class in Java. The following statement implements the Java `Calculator` interface
    and creates an instance of that implementation:


    `// Get the Java interface type`


    `var Calculator = Java.type("com.jdojo.script.Calculator");`


    `// Create an instance of the com.jdojo.script.Calculator interface`


    `// using an anonymous class-like syntax`


    `var calc = new Calculator() {`


    `add: (function (n1, n2) n1 + n2),`


    `subtract: (function (n1, n2) n1 - n2),`


    `multiply: (function (n1, n2) n1 * n2),`


    `divide: (function (n1, n2) n1 / n2)`


    `};`


    Now you can use the `calc` object the same way as you did before.


    ### Using the JavaAdapter Object


    JavaScript lets you implement multiple interfaces and extend a class using the
    `JavaAdapter` class. However, the Rhino JavaScript implementation that is bundled
    with JDK has overridden the implementation of `JavaAdapter`, which allows you
    to implement only one interface; it does not let you extend a class. The first
    argument to the `JavaAdapter` constructor is the interface to implement and the
    second argument is the script object that implements the interface’s abstract
    methods. To use the `JavaAdapter` object in Nashorn, you need to load the Rhino
    compatibility module. The following snippet of code implements the `Calculator`
    interface using `JavaAdapter`:


    `// Need to load the compatibility module in Nashorn.`


    `// You do not need to the following load() call in Rhino.`


    `load("nashorn:mozilla_compat.js");`


    `// Load the script that creates the calculator JavaScript object`


    `load("calculator.js");`


    `var calc = new JavaAdapter(com.jdojo.script.Calculator, calculator);`


    Now you can use the `calc` object the same way as you did before. It is an instance
    of the `com.jdojo.script.Calculator` interface whose implementation has been provided
    by the methods declared in the `calculator` object as defined in script in the
    `calculator.js` file.


    ### Using the Java.extend() Method


    Nashorn provides a better way to extend a class and implement multiple interfaces
    using the `Java.extend()` method. In the `Java.extend()` method, you can pass
    maximum one class type and multiple interface types. It returns a type that combines
    all passed in types. You need to use the previously discussed anonymous class–like
    syntax to provide the implementation for the abstract methods of the new type
    or override the existing method of the types being extended. The following snippet
    of code uses the `Java.extend()` method to implement the `Calculator` interface:


    `// Get the Calculator interface type`


    `var Calculator = Java.type("com.jdojo.script.Calculator");`


    `// Get a type that extends the Calculator type`


    `var CalculatorExtender = Java.extend(Calculator);`


    `// Implement the abstract methods in CalculatorExtender`


    `// using an anonymous class like syntax`


    `var calc = new CalculatorExtender() {`


    `add: (function (n1, n2) n1 + n2),`


    `subtract: (function (n1, n2) n1 - n2),`


    `multiply: (function (n1, n2) n1 * n2),`


    `divide: (function (n1, n2) n1 / n2)`


    `};`


    `// Use the instance of teh Calculator interface`


    `var x = 15.0, y = 10.0;`


    `var addResult = calc.add(x, y);`


    `var subResult = calc.subtract(x, y);`


    `var mulResult = calc.multiply(x, y);`


    `var divResult = calc.divide(x, y);`


    `printf("calc.add(%.2f, %.2f) = %.2f", x, y, addResult);`


    `printf("calc.subtract(%.2f, %.2f) = %.2f", x, y, subResult);`


    `printf("calc.multiply(%.2f, %.2f) = %.2f", x, y, mulResult);`


    `printf("calc.divide(%.2f, %.2f) = %.2f", x, y, divResult);`


    `calc.add(15.00, 10.00) = 25.00`


    `calc.subtract(15.00, 10.00) = 5.00`


    `calc.multiply(15.00, 10.00) = 150.00`


    `calc.divide(15.00, 10.00) = 1.50`


    You can use the `Java.extend()` method to extends concrete classes, abstract classes,
    and interfaces. The following code extends the concrete class `java.lang.Thread`
    and implements the `Calculator` interface. The new implementation overrides the
    `run()` method of the `Thread` class:


    `// Get the Calculator interface type`


    `var Calculator = Java.type("com.jdojo.script.Calculator");`


    `var Thread = Java.type("java.lang.Thread");`


    `// Get a type that extends the Calculator type`


    `var ThreadCalcExtender = Java.extend(Thread, Calculator);`


    `// Implement the abstract methods in CalculatorExtender`


    `// using an anonymous class like syntax`


    `var calcThread = new ThreadCalcExtender() {`


    `add: (function (n1, n2) n1 + n2),`


    `subtract: (function (n1, n2) n1 - n2),`


    `multiply: (function (n1, n2) n1 * n2),`


    `divide: (function (n1, n2) n1 / n2),`


    `run: function () {`


    `var n1 = Math.random();`


    `var n2 = Math.random();`


    `printf("n1 = %.2f, n2 = %.2f", n1, n2);`


    `var addResult = this.add(n1, n2);`


    `printf("calc.add(%.2f, %.2f) = %.2f", n1, n2, addResult);`


    `}`


    `};`


    `// Start the thread`


    `calcThread.start();`


