    ## 使用其他脚本语言


    在 Java 程序中使用除 Nashorn 之外的脚本语言非常简单。在使用脚本引擎之前，你只需要完成一项任务：将特定脚本引擎的 JAR 文件包含到应用程序的
    CLASSPATH 中。脚本引擎的实现者会提供这些 JAR 文件。


    Java 使用一种发现机制来列出所有其 JAR 文件已包含在应用程序 CLASSPATH 中的脚本引擎。`ScriptEngineFactory` 接口的实例用于创建和描述脚本引擎。脚本引擎的提供者会为
    `ScriptEngineFactory` 接口提供实现。`ScriptEngineManager` 的 `getEngineFactories()` 方法会返回一个包含所有可用脚本引擎工厂的
    `List<ScriptEngineFactory>`。`ScriptEngineFactory` 的 `getScriptEngine()` 方法会返回一个
    `ScriptEngine` 实例。工厂的其他几个方法会返回关于引擎的元数据。


    表 1-1 列出了在 Java 应用程序中使用脚本引擎之前如何安装它们的详细信息。这些网站和说明列表在撰写本文时是有效的；在阅读时它们可能已失效。不过，它们展示了如何安装某种脚本语言的脚本引擎。如果你有兴趣使用
    Nashorn，则无需在机器上安装任何东西。Nashorn 在 JDK 8 中可用。


