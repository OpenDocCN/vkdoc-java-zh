    \ not contain a number. The following code shows the output of calling the `parseFloat()`\
    \ function with different arguments:\n\n```\nprintf(\"parseFloat('%s') = %f\"\
    , \"1969.0919\", parseFloat('1969.0919'));\nprintf(\"parseFloat('%s') = %f\",\
    \ \"  1969.0919\", parseFloat('  1969.0919'));\nprintf(\"parseFloat('%s') = %f\"\
    , \"-1969.0919\", parseFloat('-1969.0919'));\nprintf(\"parseFloat('%s') = %f\"\
    , \"-1.9690919e3\", parseFloat('1.9690919e3'));\nprintf(\"parseFloat('%s') = %f\"\
    , \"1969Hello\", parseFloat('1969Hello'));\nprintf(\"parseFloat('%s') = %f\",\
    \ \"Hello\", parseFloat('Hello'));\n```\n\n```\nparseFloat('1969.0919') = 1969.091900\n\
    parseFloat('  1969.0919') = 1969.091900\nparseFloat('-1969.0919') = -1969.091900\n\
    parseFloat('-1.9690919e3') = 1969.091900\nparseFloat('1969Hello') = 1969.000000\n\
    parseFloat('Hello') = NaN\n```\n\n### The `isNaN()` Function\n\nThe `isNaN()`\
    \ function has the following signature:\n\n`isNaN(value)`\n\nIt returns `true`\
    \ if `value` results in `NaN` when converted to a Number; that is, it returns\
    \ `true` if `Number(value)` returns `NaN`. If the value represents a number, `isNaN()`\
    \ returns `false`. Notice that `isNaN()` does not only check if `value` is `NaN`;\
    \ it checks if `value` is a number or not. `NaN` is not considered a number, so\
