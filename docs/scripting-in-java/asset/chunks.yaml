  raw: '## Invoking Procedures in Scripts


    In previous chapters, you have seen how to invoke scripts using the `eval()` method
    of the `ScriptEngine`. It is also possible to invoke procedures written in a scripting
    language directly from the Java program, provided the `ScriptEngine` supports
    procedure invocation.


    A scripting language may allow creating procedures, functions, and methods. The
    Java Scripting API lets you invoke such procedures, functions, and methods from
    a Java application. I will use the term “procedure” to mean procedure, function,
    and method in this section. I will use the specific term when the context of the
    discussion requires it.


    Not all script engines are required to support procedure invocation. The Nashorn
    JavaScript engine supports procedure invocation. If a script engine supports it,
    the implementation of the script engine class must implement the `Invocable` interface.
    The `Invocable` interface contains the following four methods:


    *   `<T> T getInterface(Class<T> cls)`

    *   `<T> T getInterface(Object obj, Class<T> cls)`

    *   `Object invokeFunction(String name, Object... args) throws ScriptException,
    NoSuchMethodException`

    *   `Object invokeMethod(Object obj, String name, Object... args) throws ScriptException,
    NoSuchMethodException`


    The two versions of the `getInterface()` method let you get an instance of a Java
    interface that is implemented in a scripting languages. I will discuss these functions
    in details in the next section. The `invokeFunction()` method lets you invoke
    a top-level function written in a scripting language. The `invokeMethod()` method
    lets you invoke methods of objects written in a scripting language.


    It is the responsibility of the developer to check if a script engine implements
    the `Invocable` interface, before invoking a procedure. Invoking a procedure is
    a four-step process:


    *   Check if the script engine supports procedure invocation

    *   Cast the engine reference to the `Invocable` type

    *   Evaluate the script that contains the source code for the procedure, so the
    engine compiles and caches the script

    *   Use the `invokeFunction()` method of the `Invocable` interface to invoke procedures
    and functions; use the `invokeMethod()` method to invoke methods of the objects
    created in a scripting language


    The following snippet of code performs the check that the script engine implementation
    class implements the `Invocable` interface:


    `// Get the Nashorn engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// Make sure the script engine implements the Invocable interface`


    `if (engine instanceof Invocable) {`


    `System.out.println("Invoking procedures is supported.");`


    `}`


    `else  {`


    `System.out.println("Invoking procedures is not supported.");`


    `}`


    The second step is to cast the engine reference to the `Invocable`interface type:


    `if (engine instanceof Invocable) {`


    `Invocable inv = (Invocable)engine;`


    `// More code goes here`


    `}`


    The third step is to evaluate the script, so the script engine compiles and stores
    the compiled form of the procedure for later invocation. The following snippet
    of code performs this step:


    `// Declare a function named add that adds two numbers`


    `String script = "function add(n1, n2) { return n1 + n2; }";`


    `// Evaluate the function. Call to eval() does not invoke the function. // It
    just compiles it.`


    `engine.eval(script);`


    The last step is to invoke the procedure, as shown:


    `// Invoke the add function with 30 and 40 as the function''s arguments.`


    `// It is as if you called add(30, 40) in the script.`


    `Object result = inv.invokeFunction("add", 30, 40);`


    The first argument to the `invokeFunction()` is the name of the procedure. The
    second argument is a varargs that is used to specify arguments to the procedure.
    The `invokeFunction()` method returns the value returned by the procedure.'
  trans: '

    ## 在脚本中调用过程


    在前面的章节中，你已经了解了如何使用 `ScriptEngine` 的 `eval()` 方法来调用脚本。如果 `ScriptEngine` 支持过程调用，也可以直接从
    Java 程序调用用脚本语言编写的过程。


    脚本语言可能允许创建过程、函数和方法。Java 脚本 API 允许你从 Java 应用程序中调用这些过程、函数和方法。在本节中，我将使用术语“过程”来指代过程、函数和方法。当讨论的上下文需要时，我会使用具体的术语。


    并非所有脚本引擎都需要支持过程调用。Nashorn JavaScript 引擎支持过程调用。如果脚本引擎支持，那么该脚本引擎类的实现必须实现 `Invocable`
    接口。`Invocable` 接口包含以下四个方法：


    *   `<T> T getInterface(Class<T> cls)`

    *   `<T> T getInterface(Object obj, Class<T> cls)`

    *   `Object invokeFunction(String name, Object... args) throws ScriptException,
    NoSuchMethodException`

    *   `Object invokeMethod(Object obj, String name, Object... args) throws ScriptException,
    NoSuchMethodException`


    `getInterface()` 方法的两个版本允许你获取用脚本语言实现的 Java 接口的实例。我将在下一节详细讨论这些函数。`invokeFunction()`
    方法允许你调用用脚本语言编写的顶层函数。`invokeMethod()` 方法允许你调用用脚本语言编写的对象的方法。


    在调用过程之前，开发者有责任检查脚本引擎是否实现了 `Invocable` 接口。调用过程是一个四步流程：


    *   检查脚本引擎是否支持过程调用

    *   将引擎引用转换为 `Invocable` 类型

    *   评估包含过程源代码的脚本，以便引擎编译并缓存该脚本

    *   使用 `Invocable` 接口的 `invokeFunction()` 方法来调用过程和函数；使用 `invokeMethod()` 方法来调用在脚本语言中创建的对象的各个方法


    以下代码片段执行了检查脚本引擎实现类是否实现了 `Invocable` 接口的操作：


    `// 获取 Nashorn 引擎`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// 确保脚本引擎实现了 Invocable 接口`


    `if (engine instanceof Invocable) {`


    `System.out.println("支持调用过程。");`


    `}`


    `else  {`


    `System.out.println("不支持调用过程。");`


    `}`


    第二步是将引擎引用转换为 `Invocable` 接口类型：


    `if (engine instanceof Invocable) {`


    `Invocable inv = (Invocable)engine;`


    `// 此处添加更多代码`


    `}`


    第三步是评估脚本，以便脚本引擎编译并存储过程的编译形式以供后续调用。以下代码片段执行此步骤：


    `// 声明一个名为 add 的函数，用于将两个数字相加`


    `String script = "function add(n1, n2) { return n1 + n2; }";`


    `// 评估该函数。调用 eval() 并不会调用该函数。 // 它只是编译它。`


    `engine.eval(script);`


    最后一步是调用该过程，如下所示：


    `// 以 30 和 40 作为函数参数调用 add 函数。`


    `// 这就像在脚本中调用了 add(30, 40) 一样。`


    `Object result = inv.invokeFunction("add", 30, 40);`


    `invokeFunction()` 的第一个参数是过程的名称。第二个参数是一个可变参数，用于指定传递给过程的参数。`invokeFunction()` 方法返回过程返回的值。

