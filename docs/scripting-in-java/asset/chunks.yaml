    printed because it has been deleted:


    `// Create an object with two properties x and y`


    `var point = {x:10, y:20};`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `// Delete property x from the point object`


    `delete point.x;`


    `print("After deleting x");`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `point[x] = 10`


    `point[y] = 20`


    `After deleting x`


    `point[y] = 20`


    In strict mode, it is an error to delete to a property whose `configurable` attribute
    is set to `false`. Deleting a nonconfigurable property in nonstrict mode has no
    effect.'
