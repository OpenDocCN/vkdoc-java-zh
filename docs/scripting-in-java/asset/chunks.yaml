    `// Create an Int8Array using elements from an Array object`


    `var ids = new Int8Array([10, 20, 30]);`


    All typed array objects have the following properties:


    *   `length`: It is the number of elements in the array

    *   `byteLength`: It is the length of the array in bytes

    *   `buffer`: It is the reference of the underlying `ArrayBuffer` object used
    by the typed array

    *   `byteOffset`: It is the offset in bytes from the start of its `ArrayBuffer`


    Once you create a typed array, you can use it as a simple array object. You can
    set and read its elements using the bracket notation using indexes. If you set
    a value that is not of the type of the typed array type, the value is converted
    appropriately. For example, setting 23.56 to an element in an `Int8Array` will
    set 23 as the value. The following code shows how to read and write contents of
    a typed array:


    `// Create an Int8Array of 3 elements. Each element is an 8-bit sign integer.`


    `var ids = new Int8Array(3);`


    `// Populate the array`


    `ids[0] = 10;`


    `ids[1] = 20.89; // 20 will be stored`


    `ids[2] = 140;   // -116 is stored as byte''s range is -128 to 127.`


    `// Read the elements`


    `print("ids[0] = " + ids[0]);`


    `print("ids[1] = " + ids[1]);`


    `print("ids[2] = " + ids[2]);`


    `ids[0] = 10`


    `ids[1] = 20`


    `ids[2] = -116`


    The following code creates an `Int32Array` from an `Array` object and reads all
    elements:


    `// An Array object`


    `var ids = [10, 20, 30];`


    `// Create an Int32Array from ids`


    `var typedIds = new Int32Array(ids);`


    `// Read elements from typedids`


    `for(var i = 0, len = typedIds.length; i < len; i++) {`


    `print("typedIds[" + i + "] = " + typedIds[i]);`


    `}`


    `typedIds[0] = 10`


    `typedIds[1] = 20`


    `typedIds[2] = 30`


    It is also possible to use the same `ArrayBuffer` to store different types of
    values. Recall that the views on the `ArrayBuffer` are typed, not the `ArrayBuffer`
    itself; it simply contains raw binary data. The following code creates an 8-byte
    `ArrayBuffer` to store a 32-bit signed integer in the first 4 bytes and a 32-bit
    signed floating point number in the last 4 bytes:


    `// Create an 8=byte buffer`


    `var buffer = new ArrayBuffer(8);`


    `// Create an Int32Array view for the first 4 bytes. byteOffset is 0`


    `// and element count is 1`


    `var id = new Int32Array(buffer, 0, 1);`


    `// Create a Float32Array view for the second 4 bytes. The first 4 bytes`


    `// will be used for integer value. byteOffset is 4 and element count is 1`


    `var salary = new Float32Array(buffer, 4, 1);`


    `// Use the Int32Array view to store an integer`


    `id[0] = 1001;`


    `// Use the Float32Array view to store a floating-point number`


    `salary[0] = 129019.50;`


    `// Read and print the two values using the two views`


    `print("id = " + id[0]);`


    `print("salary = " + salary[0]);`


    `id = 1001`


    `salary = 129019.5`


    When you create a typed array by supplying the length of an `ArrayBuffer`, the
    length or the size of the `ArrayBuffer` must be a multiple of element’s size.
    For example, when you are creating an `Int32Array`, the size of its buffer must
    be a multiple of 4 (32-bit is 4 bytes). The following code will throw an exception:


    `var buffer = new ArrayBuffer(15);`


    `// Throws an exception because an element of Int32Array takes 4 bytes and`


    `// 15, which is the buffer size for the view, is not a multiple of 4`


    `var id = new Int32Array(buffer);`


    The following code shows how to copy part of an `ArrayBuffer` using its `slice()`
    method and create a new view on the copied buffer:


    `// Create an ArrayBuffer of 4 bytes`


    `var buffer = new ArrayBuffer(4);`


    `// Create an Int8Array from buffer`


    `var int8View1 = new Int8Array(buffer);`


    `// Populate the array`


    `int8View1[0] = 10;`


    `int8View1[1] = 20;`


    `int8View1[2] = 30;`


    `int8View1[3] = 40;`


    `print("In original buffer:")`


    `for(var i = 0; i < int8View1.length; i++) {`


    `print(int8View1[i]);`


    `}`


    `// Copy the last two bytes from buffer to buffer2`


    `var buffer2 = buffer.slice(2, 4);`


    `// Create an Int8Array from buffer2`


    `var int8View2 = new Int8Array(buffer2);`


    `print("In copied buffer:");`


    `for(var i = 0; i < int8View2.length; i++) {`


    `print(int8View2[i]);`


    `}`


    `In original buffer:`


    `10`


    `20`


    `30`


    `40`


    `In copied buffer:`


    `30`


    `40`


    Because typed arrays are array-like objects, you can use most of the methods of
    the `Array` object on typed arrays. The following code shows how to use the `join()`
    method to concatenate elements of an `Int32Array`:


    `// Create an Int32Array of 4 elements`


    `var ids = new Int32Array(4);`


    `// Populate the array`


    `ids[0] = 101;`


    `ids[1] = 102;`


    `ids[2] = 103;`


    `ids[3] = 104;`


    `// Call the join() method of the Array.prototype object and print the result`


    `var idsList = Array.prototype.join.call(ids);`


    `print(idsList);`


    `101,102,103,104`


    #### DataView View


    The `DataView` view provides low-level interface to read and write different types
    of data from an `ArrayBuffer`. Typically, you use a `DataView` when the data in
    an `ArrayBuffer` contains different types of data in different regions of the
    same `ArrayBuffer`. Notice that `DataView` is not a typed array; it is simply
    a view of an `ArrayBuffer`. The signature of the `DataView` constructor is:


    `DataView(arrayBuffer, byteOffset, byteLength)`


    It creates a view of the specified `arrayBuffer` referencing `byteLength` bytes
    from `byteOffset` index. If `byteLength` is unspecified, it references `arrayBuffer`
    starting at `byteOffset` and to the end. If both `byteOffset` and `byteLength`
    are unspecified, it references the entre `arrayBuffer`.


    Unlike typed array view types, the `DataView` object can use mixed data types
    values, so it does not have a `length` property. Like typed arrays, it has `buffer`,
    `byteOffset`, and `byteLength` properties. It contains the following getter and
    setter methods for reading and writing different types of values:


    *   `getInt8(byteOffset)`

    *   `getUint8(byteOffset)`

    *   `getInt16(byteOffset, littleEndian)`

    *   `getUint16(byteOffset, littleEndian)`

    *   `getInt32(byteOffset, littleEndian)`

    *   `getUint32(byteOffset, littleEndian)`

    *   `getFloat32(byteOffset, littleEndian)`

    *   `getFloat64(byteOffset, littleEndian)`

    *   `setInt8(byteOffset, value)`

    *   `setUint8(byteOffset, value)`

    *   `setInt16(byteOffset, value, littleEndian)`

    *   `setUint16(byteOffset, value, littleEndian)`

    *   `setInt32(byteOffset, value, littleEndian)`

    *   `setUint32(byteOffset, value, littleEndian)`

    *   `setFloat32(byteOffset, value, littleEndian)`

    *   `setFloat64(byteOffset, value, littleEndian)`


    The getters and setters for multibyte value types have a Boolean, optional last
    parameter named `littleEndian`. It specifies whether the value being read and
    set is in little-endian or big-endian format, If it is unspecified, the value
    is assumed to be big-endian. It is useful if the data you read come from different
    sources in different endian-ness. The following code uses a `DataView` to write
    and read a 32-bit signed integer and a 32-bit floating-point number from an `ArrayBuffer`:


    `// Create an ArrayBuffer of 8 bytes`


    `var buffer = new ArrayBuffer(8);`


    `// Create a DataView from the ArrayBuffer`


    `var data = new DataView(buffer);`


    `// Use the first 4 bytes to store a 32-bit signed integer`


    `data.setInt32(0, 1001);`


    `// Use the second 4 bytes to store a 32-bit floating-point number`


    `data.setFloat32(4, 129019.50);`


    `var id = data.getInt32(0);`


    `var salary = data.getFloat32(4);`


    `print("id = " + id);`


    `print("salary = " + salary);`


    `id = 1001`


    `salary = 129019.5`'
