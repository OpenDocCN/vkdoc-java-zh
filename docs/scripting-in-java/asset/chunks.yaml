    \ for the view, is not a multiple of 4\nvar id = new Int32Array(buffer);\n```\n\
    \n以下代码展示了如何使用`ArrayBuffer`的`slice()`方法复制其一部分，并在复制的缓冲区上创建新视图：\n\n```javascript\n\
