    ### switch 语句


    Nashorn 中的 `switch` 语句与 Java 中的 `switch` 语句工作方式基本相同。其语法如下：


    `switch(expression) {`


    `case expression-1:`


    `statement-1;`


    `case expression-2:`


    `statement-2;`


    `default:`


    `statement-3;`


    `}`


    `expression` 会使用 `===` 运算符与 `case` 子句中的表达式进行匹配。第一个匹配的 `case` 子句中的语句会被执行。如果该 `case`
    子句包含 `break` 语句，则控制权会转移到 `switch` 语句的末尾；否则，会继续执行匹配到的 `case` 子句之后的语句。如果没有找到匹配项，则执行
    `default` 子句中的语句。如果存在多个匹配项，则仅执行第一个匹配的 `case` 子句中的语句。在 Java 中，`expression` 必须是
    `int`、`String` 或 `enum` 类型，而在 Nashorn 中，`expression` 可以是任何类型，包括 Object、Null 和
    Undefined 类型。以下代码片段演示了如何使用 `switch` 语句：


    `// 定义一个 match 函数，使用 switch 语句匹配传入的参数`


    `function match(value) {`


    `switch (value) {`


    `case undefined:`


    `print("匹配到 undefined:", value);`


    `break;`


    `case null:`


    `print("匹配到 null:", value);`


    `break;`


    `case ''2'':`


    `print("匹配到字符串 ''2'':", value);`


    `break;`


    `case 2:`


    `print("匹配到数字 2: ", value);`


    `break;`


    `default:`


    `print("无匹配:", value);`


    `break;`


    `}`


    `}`


    `// 使用不同的参数调用 match 函数`


    `match(undefined);`


    `match(null);`


    `match(2);`


    `match(''2'');`


    `match("Hello");`


    `匹配到 undefined: undefined`


    `匹配到 null: null`


    `匹配到数字 2: 2`


    `匹配到字符串 ''2'': 2`


    `无匹配: Hello`


    ### 带标签的语句


    标签就是一个标识符后跟一个冒号。Nashorn 中的任何语句都可以通过在语句前放置一个标签来标记。实际上，Nashorn 允许一个语句拥有多个标签。一旦你标记了一个语句，就可以在
    `break` 和 `continue` 语句中使用相同的标签来跳转到该标签处。通常，你会标记外层迭代语句，以便能够从嵌套循环中继续或跳出。带标签的语句的工作方式与
    Java 中相同。以下是一个使用带标签的语句和带有标签的 `continue` 语句来打印 3x3 矩阵左下三角部分的示例：


    `// 使用数组的数组创建一个 3x3 矩阵`


    `var matrix = [[11, 12, 13],`


    `[21, 22, 23],`


    `[31, 32, 33]];`


    `outerLoop:`


    `for(var i = 0; i < matrix.length; i++) {`


    `for(var j = 0; j < matrix[i].length; j++) {`


    `java.lang.System.out.printf("%d ", matrix[i][j]);`


    `if (i === j) {`


    `print();`


    `continue outerLoop;`


    `}`


    `}`


    `}`


    `11`


    `21` `22`


    `31 32 33`


    ### throw 语句


    `throw` 语句用于抛出一个用户定义的异常。它的工作方式与 Java 中的 `throw` 语句类似。其语法如下：


    `throw expression;`


    在 Java 中，`throw` 语句抛出的是 `Throwable` 类或其子类的对象；`expression` 必须求值为一个 `Throwable`
    实例。在 Nashorn 中，`throw` 语句可以抛出任何类型的值，可能包括数字或字符串。Nashorn 有一些内置对象，可以用作在 `throw` 语句中抛出的错误对象。这些对象包括
    `Error`、`TypeError`、`RangeError`、`SyntaxError` 等。以下代码片段展示了当 `empId` 不在 1 到 10000
    之间时如何抛出 `RangeError`：


    `var empId = -900;`


    `if (empId <= 0 || empId >= 10000) {`


    `throw new RangeError(`


    `"empId 必须在 1 到 10000 之间。发现: " + empId);`


    `}`


    当你运行这段代码时，它会在标准错误输出上打印错误的堆栈跟踪。与 Java 类似，Nashorn 允许你处理抛出的错误。你需要使用 `try-catch-finally`
    语句来处理抛出的错误，我将在下一节讨论这一点。


    ### try 语句


    Nashorn 中的 `try-catch-finally` 语句与 Java 中的工作方式相同。`try` 块包含一个或多个可能抛出错误的待执行语句。如果这些语句抛出错误，控制权会转移到
    `catch` 块。最后，`finally` 块中的语句会被执行。与 Java 一样，你可以有三种 `try`、`catch` 和 `finally` 块的组合：`try-catch`、`try-finally`
    和 `try-catch-finally`。与 Java 不同的是，ECMAScript 每个 `try` 块只支持一个 `catch` 块。Nashorn
    支持 Mozilla JavaScript 1.4 扩展，该扩展允许每个 `try` 块有多个 `catch` 块。使用 `try` 块的语法如下：


    `/* 一个 try-catch 块 */`


    `try {`


    `// 可能抛出错误的语句`


    `}`


    `catch(identifier) {`


    `// 在此处处理错误`


    `}`


    `/* 一个 try-finally 块 */`


    `try {`


    `// 可能抛出错误的语句`


    `}`


    `finally {`


    `// 在此处执行清理工作`


    `}`


    `/* 一个 try-catch-finally 块 */`


    `try {`


    `// 可能抛出错误的语句`


    `}`


    `catch(identifier) {`


    `// 在此处处理错误`


    `}`


    `finally {`


    `// 在此处执行清理工作`


    `}`


    提示


    在严格模式下，在 `catch` 块中使用 `eval` 或 `arguments` 作为标识符会导致 `SyntaxError`。


    以下是一个带有多个 `catch` 块的 `try` 块，这是 Nashorn 扩展支持的，其中 `e` 是一个标识符。你可以使用任何其他标识符代替 `e`：


    `/* 一个带有多个 catch 块的 try 块 */`


    `try {`


    `// 可能抛出错误的语句`


    `}`


    `catch (e if e instanceof RangeError) {`


    `// 在此处处理 RangeError`


    `}`


    `catch (e if e instanceof TypeError) {`


    `// 在此处处理 TypeError`


    `}`


    `catch (e) {`


    `// 在此处处理其他错误`


    `}`


    考虑清单 4-2 中的代码。它定义了两个函数：`isInteger()` 和 `factorial()`。`isInteger()` 函数在其参数是整数时返回
    `true`；否则返回 `false`。`factorial()` 函数计算并返回一个自然数的阶乘。如果其参数不是数字，则抛出 `TypeError`；如果其参数不是大于或等于
    1 的数字，则抛出 `RangeError`。


    清单 4-2\. factorial.js 文件的内容


    `// factorial.js`


    `// 如果 n 是整数则返回 true。否则返回 false。`


    `function isInteger(n) {`


    `return typeof n === "number" && isFinite(n) && n%1 === 0;`


    `}`


    `// 定义一个计算并返回整数阶乘的函数`


    `function factorial(n) {`


    `if (!isInteger(n)) {`


    `throw new TypeError(`


    `"数字必须是整数。发现:" + n);`


    `}`


    `if(n < 0) {`


    `throw new RangeError(`


    `"数字必须大于 0。发现: " + n);`


    `}`


    `var fact = 1;`


    `for(var counter = n; counter > 1; fact *= counter--);`


    `return fact;`


    `}`


    清单 4-3 中的程序使用 `factorial()` 函数计算一个数字和一个字符串的阶乘。`load()` 函数用于从 `factorial.js` 文件加载程序。`Error`
    对象（或其子类型）的 `message` 属性包含错误消息。该程序使用 `message` 属性来显示错误消息。当将“Hello”作为参数传递给 `factorial()`
    函数时，它会抛出一个 `TypeError`。程序处理该错误并显示错误消息。


    清单 4-3\. 文件 factorial_test.js 的内容


    `// factorial_test.js`


    `// 加载包含 factorial() 函数的 factorial.js 文件`


    `load("factorial.js");`


    `try {`


    `var fact3 = factorial(3);`


    `print("3 的阶乘是", fact3);`


    `var factHello = factorial("Hello");`


    `print("3 的阶乘是", factHello);`


    `}`


    `catch (e if e instanceof RangeError) {`


    `print("发生了一个 RangeError。", e.message);`


    `print("错误:", e.message);`


    `}`


    `catch (e if e instanceof TypeError) {`


    `print("发生了一个 TypeError。", e.message);`


    `}`


    `catch (e) {`


    `print(e.message);`


    `}`


    `3 的阶乘是 6`


    `发生了一个 TypeError。数字必须是整数。发现:Hello`

    '
- fmt: 'Nashorn 扩展了 ECMAScript 提供的 `Error` 对象。它添加了几个有用的属性来获取所抛出错误的详细信息。表 [4-9](#A978-1-4842-0713-0_4_Chapter.html#Tab9)
    列出了这些属性及其描述。


    表 4-9. Nashorn 中 `Error` 对象属性列表


    | 属性 | 类型 | 描述 |

    | --- | --- | --- |

    | `lineNumber` | Number | 抛出错误对象时，在源代码中的行号 |

    | `columnNumber` | Number | 抛出错误对象时，在源代码中的列号 |

    | `fileName` | String | 源脚本的文件名 |

    | `stack` | String | 作为字符串的脚本堆栈跟踪 |

    | `printStackTrace()` | function | 打印完整的堆栈跟踪，包括所有 Java 帧，从抛出错误的位置开始 |

    | `getStackTrace()` | function | 仅返回 ECMAScript 帧的 `java.lang.StackTraceElement`
    实例数组 |

    | `dumpStack()` | function | 打印当前线程的堆栈跟踪，如同 Java 中的 `java.lang.Thread.dumpStack()`
    方法。`dumpStack()` 是 `Error` 对象的一个函数属性，你需要将其作为 `Error.dumpStack()` 调用 |


    清单 4-4 展示了清单 4-3 中程序的另一个版本。这次，你只使用 `catch` 块，并利用 Nashorn 对 `Error` 对象的扩展来打印错误的详细信息。


    清单 4-4. 文件 `factorial_test2.js` 的内容


    ```

    // factorial_test2.js


    load("factorial.js");


    try {


    // throw new TypeError("A type error occurred.");


    var fact3 = factorial(3);


    print("Factorial of 3 is", fact3);


    var factHello = factorial("Hello");


    print("Factorial of 3 is", factHello);


    }


    catch (e) {


    printf("Line %d, column %d, file %s. %s",


    e.lineNumber, e.columnNumber, e.fileName, e.message);


    }


    Factorial of 3 is 6


    Line 10, column 8, file factorial.js. The number must be an integer. Found:Hello

    ```


    ### `debugger` 语句


    `debugger` 语句用于调试目的。它本身不执行任何操作。如果调试器处于活动状态，实现可能会触发一个断点，但在遇到 `debugger` 语句时，它并非必须这样做。其语法为：


    ```

    debugger;

    ```


    NetBeans 8.0 IDE 在调试模式下支持 `debugger` 语句。我将在[第 13 章](#A978-1-4842-0713-0_13_Chapter.html)中展示如何使用
    `debugger` 语句调试 Nashorn 脚本。


    ## 定义函数


    在 Nashorn 中，函数是一段可执行的、参数化的代码块，它被声明一次，但可以被多次执行。执行一个函数被称为调用或唤起该函数。函数是一个对象；它可以拥有属性，可以作为参数传递给另一个函数；也可以赋值给一个变量。一个函数可以包含以下部分：


    *   一个名称

    *   形式参数

    *   一个函数体


    函数可以选择性地被赋予一个名称。当调用一个函数时，你可以传递一些值，这些值被称为该函数的参数。这些参数会被复制到函数的形式参数中。函数体由一系列语句组成。函数可以选择性地使用
    `return` 语句返回一个值。如果没有使用 `return` 语句从函数返回，默认情况下会返回值 `undefined`。在 Nashorn 中，函数可以通过多种方式定义，后续章节将对此进行描述。


    提示


    你可以将 Nashorn 中的 `function` 视为 Java 中的方法。然而，请注意，Nashorn 中的函数是一个对象，并且其使用方式多种多样，远非
    Java 中的方法可比。


    ### 函数声明


    你可以使用 `function` 语句声明一个函数，如下所示：


    ```

    function functionName(param1, param2...) {


    function-body


    }

    ```


    关键字 `function` 用于声明一个函数。`functionName` 是函数的名称，可以是任何标识符。`param1`、`param2` 等是形式参数名称。一个函数可以有零个形式参数，在这种情况下，函数名后面直接跟一对圆括号。函数体由零个或多个语句组成，并用花括号括起来。


    提示


    在严格模式下，你不能使用 `eval` 和 `arguments` 作为函数名或函数的形式参数名。


    到目前为止，函数声明中的一切看起来都像 Java 中的方法声明。然而，有两个显著的区别：


    *   函数声明没有返回类型

    *   函数只指定形式参数的名称，而不指定它们的类型


    以下是一个名为 `adder` 的函数的示例，它接受两个参数，并通过对其应用 `+` 运算符来返回一个值：


    ```

    // Applies the + operator on parameters named x and y,


    // and returns the result


    function adder(x, y) {


    return x + y;


    }

    ```


    调用函数与在 Java 中调用方法相同。你需要使用函数名，后跟用圆括号括起来的、以逗号分隔的参数列表。以下代码片段使用两个参数（值分别为 5 和 10）调用
    `adder` 函数，并将函数返回的值赋给一个名为 `sum` 的变量：


    ```

    var sum = adder(5, 10); // Assigns 15 to sum

    ```


    考虑以下代码片段及其输出：


    ```

    var sum1 = adder(5, true); // Assigns 6 to sum1


    var sum2 = adder(5, "10"); // Assigns "510" to sum2


    print(sum1, typeof sum1);


    print(sum2, typeof sum2);


    6 number


    510 string

    ```


    这可能会让你感到惊讶。你可能在编写 `adder()` 函数时，心里想的是对两个数字进行加法运算。然而，你却能够传递 `Number`、`Boolean`
    和 `String` 类型的参数。事实上，你可以向此函数传递任何类型的参数。这是因为 Nashorn 是一种松散类型的语言，类型检查是在运行时执行的。在给定的上下文中，所有值都会被转换为预期的类型。在第一次调用
    `adder(5, true)` 中，布尔值 `true` 被自动转换为数字 1；在第二次调用 `adder(5, "10")` 中，数字 5 被转换为字符串
    `"5"`，并且 `+` 运算符作为字符串连接运算符工作。如果你希望函数中的参数具有类型安全性，你需要像在清单 4-2 的 `factorial()` 函数中那样，自己进行验证。


    提示


    每个函数都有一个名为 `length` 的只读属性，它包含函数的形式参数数量。在我们的例子中，`adder.length` 将返回 2，因为 `adder()`
    函数声明了两个名为 `x` 和 `y` 的形式参数。


    函数是一个对象。函数名是对函数对象的引用。你可以将函数名赋值给另一个变量，并将其传递给其他函数。以下代码片段将 `adder()` 函数的引用赋给一个名为
    `myAdder` 的变量，并使用 `myAdder` 变量调用该函数：


    ```

    // Assigns the reference of the adder function to the variable myAdder


    var myAdder = adder;


    // Call the function (adder()) referenced by myAdder


    var sum = myAdder(5, 10);


    print(sum);


    15

    ```'
  raw: 'Nashorn extends the `Error` object provided by ECMAScript. It add several
    useful properties to get the details of the error thrown. Table [4-9](#A978-1-4842-0713-0_4_Chapter.html#Tab9)
    lists such properties with their descriptions.


    Table 4-9.


    The List of the Proeprties of Error Object in Nashorn


    | Property | Type | Description |

    | --- | --- | --- |

    | `lineNumber` | Number | The line number in the source code from where the error
    object was thrown |

    | `columnNumber` | Number | The column number in the source code from where the
    error object was thrown |

    | `fileName` | String | The file name of the source script |

    | `stack` | String | The script stack trace as a string |

    | `printStackTrace()` | function | Prints full stack trace, including all Java
    frames, from where error was thrown from |

    | `getStackTrace()` | function | Returns an array of `java.lang.StackTraceElement`
    instance for ECMAScript frames only |

    | `dumpStack()` | function | Prints stack trace of the current thread as the `java.lang.Thread.dumpStack()`
    method does in Java. The `dumpStack()` is a function property of the `Error` object
    and you will need to call it as `Error.dumpStack()` |


    Listing 4-4 shows another version of the program in Listing 4-3\. This time, you
    use only `catch` block and print the error’s details using the Nashorn extensions
    for the `Error` object.


    Listing 4-4\. The Contents of the File factorial_test2.js


    `// factorial_test2.js`


    `load("factorial.js");`


    `try {`


    `// throw new TypeError("A type error occurred.");`


    `var fact3 = factorial(3);`


    `print("Factorial of 3 is", fact3);`


    `var factHello = factorial("Hello");`


    `print("Factorial of 3 is", factHello);`


    `}`


    `catch (e) {`


    `printf("Line %d, column %d, file %s. %s",`


    `e.lineNumber, e.columnNumber, e.fileName, e.message);`


    `}`


    `Factorial of 3 is 6`


    `Line 10, column 8, file factorial.js. The number must be an integer. Found:Hello`


    ### The debugger Statement


    The `debugger` statement is for debugging purpose. It does not take any action
    by itself. If a debugger is active, the implementation may cause a breakpoint
    but it is not required to do so when it encounters a `debugger` statement. The
    syntax is:


    `debugger;`


    The NetBeans 8.0 IDE supports the `debugger` statement in debug mode. I will show
    how to debug Nashorn scripts using a `debugger` statement in [Chapter 13](#A978-1-4842-0713-0_13_Chapter.html).


    ## Defining Functions


    In Nashorn, a function is a block of executable, parameterized code that is declared
    once and can be executed multiple times. Executing a function is called calling
    or invoking the function. A function is an object; it can have properties, and
    it can be passed around as an argument to another function; it can be assigned
    to a variable. A function can have the following parts:


    *   A name

    *   Formal parameters

    *   A body


    A function may optionally be given a name. When a function is called, you can
    pass some values that are called arguments of that function. The arguments are
    copied to the function’s formal parameters. The body of the function consists
    of a series of statements. A function may optionally return a value using a `return`
    statement. If no `return` statement is used to return from the function, by default,
    the value `undefined` is returned. A function in Nashorn can be defined in many
    ways, as described in subsequent sections.


    Tip


    You may think of a `function` in Nashorn as a method in Java. However, be aware
    that a function in Nashorn is an object and it is used in many different ways
    that a method in Java cannot be used.


    ### Function Declaration


    You can declare a function using the `function` statement as follows:


    `function functionName(param1, param2...) {`


    `function-body`


    `}`


    The keyword `function` is used to declare a function. The `functionName` is the
    name of the function that can be any identifier. The `param1`, `param2`, and so
    on are formal parameter names. A function may have zero formal parameters and,
    in that case, the function name is followed with an opening and a closing parentheses.
    The body of the function that consists of zero or more statements is enclosed
    in braces.


    Tip


    In strict mode, you cannot use eval and arguments as the function name or the
    name of formal parameters of the function.


    So far, everything in a function declaration seems like a method declaration in
    Java. However, there are two significant differences:


    *   A function declaration does not have a return type

    *   A function specifies only the names of the formal parameters, not their types


    The following is an example of a function named `adder` that takes two parameters
    and returns a value by applying the `+` operator on them:


    `// Applies the + operator on parameters named x and y,`


    `// and returns the result`


    `function adder(x, y) {`


    `return x + y;`


    `}`


    Calling a function is the same as calling a method in Java. You need to use the
    function name followed with the comma-separated list of arguments enclosed in
    parentheses. The following snippet of code calls the `adder` function with two
    arguments with values 5 and 10, and assigns the returned value from the function
    to a variable named `sum`:


    `var sum = adder(5, 10); // Assigns 15 to sum`


    Consider the following snippet of code and the output:


    `var sum1 = adder(5, true); // Assigns 6 to sum1`


    `var sum2 = adder(5, "10"); // Assigns "510" to sum2`


    `print(sum1, typeof sum1);`


    `print(sum2, typeof sum2);`


    `6 number`


    `510 string`


    This will be a surprise for you. You might have written the `adder()` function
    keeping in mind to add two numbers. However, you were able to pass arguments of
    type Number, Boolean, and String. In fact, you can pass any type of arguments
    to this function. This is because Nashorn is a loosely typed language and type-checking
    is performed at runtime. All values are converted to the expected types in a given
    context. In the first call, `adder(5, true)`, the Boolean value `true` was converted
    automatically to the number 1; in the second call, `adder(5, "10")`, the number
    5 was converted to the String “5” and the + operator worked as the string concatenation
    operator. If you want type-safety for the parameters in functions, you will need
    to validate them yourself as you did inside the `factorial()` function in Listing
    4-2.


    Tip


    Every function has a read-only property, named `length`, which contains the ­number
    of formal parameters of the function. In our case, `adder.length` will return
    2 because the `adder()` function declares two formal parameters named `x` and
    `y`.


    A function is an object. The function name is the reference to the function object.
    You can assign the function name to another variable and pass it to other functions.
    The following snippet of code assigns the reference of the `adder()` function
    to a variable named `myAdder` and calls the function using the `myAdder` variable:


    `// Assigns the reference of the adder function to the variable myAdder`


    `var myAdder = adder;`


    `// Call the function (adder()) referenced by myAdder`


    `var sum = myAdder(5, 10);`


    `print(sum);`


    `15`'
  trans: '

    Nashorn 扩展了 ECMAScript 提供的 `Error` 对象。它添加了几个有用的属性来获取所抛出错误的详细信息。表 4-9 列出了这些属性及其描述。


    表 4-9.


    Nashorn 中 Error 对象的属性列表


    | 属性 | 类型 | 描述 |

    | --- | --- | --- |

    | `lineNumber` | Number | 抛出错误对象时在源代码中的行号 |

    | `columnNumber` | Number | 抛出错误对象时在源代码中的列号 |

    | `fileName` | String | 源脚本的文件名 |

