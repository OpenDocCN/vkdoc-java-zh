    *   通过 `ScriptEngineManager` 的 `getBindings()` 方法获取 `Bindings` 的引用，然后对 `Bindings`
    使用 `put()` 和 `remove()` 方法

    *   通过 `ScriptEngine` 的 `getBindings()` 方法获取其默认上下文全局作用域中 `Bindings` 的引用，然后对 `Bindings`
    使用 `put()` 和 `remove()` 方法

