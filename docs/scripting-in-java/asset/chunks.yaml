    `ScriptContext` interface. Note that you do not use a `ScriptContext` in your
    application by itself. It is used by script engines during script execution. Most
    often, you manipulate a `ScriptContext` indirectly through a `ScriptEngine` and
    a `ScriptEngineManager`, which is discussed in detail in the next section.


    Listing 3-2\. Using an Instance of the ScriptContext Interface


