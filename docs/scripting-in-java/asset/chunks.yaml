  trans: '

    ## 摘要


    JDK 包含一个独立于脚本引擎的命令行 shell，名为 `jrunscript`。它可用于评估在命令行或文件中输入的脚本。你可以在 `JAVA_HOME\bin`
    目录中找到此 shell，其中 `JAVA_HOME` 是你安装 JDK 的目录。


    `jrunscript` 命令行 shell 可以运行由 Java 支持的任何脚本语言编写的脚本。默认情况下，它运行 Nashorn 脚本。要使用 Nashorn
    以外的脚本语言，你需要使用 `–cp` 或 `–classpath` 选项将语言的 JAR 文件与 `jrunscript` 一起包含。`–l` 选项允许你选择要使用的脚本语言。


    你可以在单行模式、批处理模式和交互模式下使用 `jrunscript`。单行模式允许你执行一行脚本。使用 `–e` 选项调用单行模式。批处理模式允许你执行存储在文件中的脚本。使用
    `–f` 选项调用批处理模式。交互模式允许你交互式地执行在命令行输入的脚本。通过不使用 `–e` 和 `–f` 选项，或使用 `–f –` 选项（注意 `–f`
    后跟一个 `–`）来调用交互模式。


    你可以使用 `–q` 选项列出 `jrunscript` 所有可用的脚本引擎。请注意，你必须包含 Nashorn 以外的语言的脚本引擎 JAR 文件，才能使它们与
    `jrunscript` 一起使用。`jrunscript` shell 提供了几个有用的全局函数和对象。例如，`cat()` 函数可用于打印文件或 URL
    的内容，并可选择应用过滤器。


    # 10. jjs 命令行工具


    在本章中，你将学习：


    *   什么是 `jjs` 命令行工具

    *   如何调用 `jjs` 命令行工具

    *   如何向 `jjs` 命令行工具传递参数

    *   如何在交互模式和脚本模式下使用 `jjs` 命令行工具


    为了使用 Nashorn 脚本引擎，JDK 8 包含了一个名为 `jjs` 的新命令行工具。如果你想知道 `jjs` 代表什么，它代表 Java JavaScript。该命令位于
    `JDK_HOME\bin` 目录中。该命令可用于运行文件中的脚本或在交互模式下在命令行输入的脚本。它也可用于执行 shell 脚本。


    ## 语法


    调用该命令的语法是：


    `jjs [options] [script-files] [-- arguments]`


    其中：


    *   `[options]` 是 `jjs` 命令的选项。多个选项用空格分隔

    *   `[script-files]` 是要由 Nashorn 引擎解释的脚本文件列表

    *   `[-- arguments]` 是要作为参数传递给脚本或交互式 shell 的参数列表。参数在双连字符后指定，并且可以在脚本内部使用 `arguments`
    属性访问


    ## 选项


    `jjs` 工具支持多个选项。表 10-1 列出了 `jjs` 工具的所有选项。某些选项具有功能相同的变体；例如，选项 `-classpath` 和 `-cp`
    是同义词。两者都用于设置 CLASSPATH。请注意，某些选项以两个连字符开头。要打印所有选项的列表，请在命令提示符下使用 `–xhelp` 选项运行该工具：


    `jjs –xhelp`


    表 10-1.


    jjs 命令行工具的选项

    '
- fmt: '| Option | Description |

    | --- | --- |

    | `-D<name>=<value>` | Sets a system property for the Java runtime. This option
    can be repeated to set multiple runtime property values. |

    | `-ccs=<size>` `--class-cache-size=<size>` | Sets the class cache size (in bytes).
    By default, the class cache size is set to 50 bytes. You can use `k`/`K`, `m`/`M`
    and `g`/`G` with the size to mean KB, MB, and GB in size. The options `-css=200`
    and `-css=2M` set the class cache size to 200 bytes and 2 MB, respectively. |

    | `-classpath <path>` `-cp <path>` | Specifies CLASSPATH. |

    | `-co` `--compile-only` | Compiles the script without running. By default, it
    is disabled, which means that scripts are compiled and run. |

    | `--const-as-var` | Replaces the keyword `const` in scripts with the keyword
    `var`. This option is available if a script uses the `const` keyword, which is
    not recognized by Nashorn. By default, it is disabled. |

    | `-d=<path>` `--dump-debug-dir=<path>` | Specifies a destination directory to
    dump class files for scripts. |

    | `--debug-lines` | Generates a line number table in `.class` files. By default,
    it is enabled. Specify `--debug-lines=false` to disable this feature. |

    | `--debug-locals` | Generates a local variable table in `.class` files. By default,
    it is set to `false`. |

    | `-doe` `––dump-on-error` | When this is specified, a full stack trace of the
    error is printed. By default, a brief error message is printed. |

    | `--early-lvalue-error` | Reports invalid `lvalue` expressions as early errors
    when the code is parsed. By default, it is set to `true`. When set to `false`,
    invalid `lvalue` expressions are reported when the code is executed. |

    | `--empty-statements` | Preserves empty statements in the Java abstract syntax
    tree (AST). By default, it is set to `false`. |

    | `-fv` `–fullversion` | Prints the full version of the Nashorn engine. |

    | `--function-statement-error` | Prints an error message when a function declaration
    is used as a statement. The default is set to `false`. |

    | `--function-statement-warning` | Prints a warning message when a function declaration
    is used as a statement. The default is set to `false`. |

    | `-fx` | Launches the script as a JavaFX application. |

    | `--global-per-engine` | Uses a single global instance per script engine instance.
    The default is `false`. |

    | `-help` `-h` | Outputs the help message and exits. |

    | `-J<flag>` | Passes the specified `<flag>` to the JVM. |

    | `-language` | Specifies the ECMAScript language version. Valid values are `es5`
    and `es6`. The default is `es5`. |

    | `--lazy-compilation` | Enables lazy code generation strategies by not compiling
    the entire script at once. The default is `true`. |

    | `--loader-per-compile` | Creates a new class loader per compile. The default
    is `true`. |

    | `-l` `--locale` | Sets the locale for script execution. The default is `en-US`.
    |

    | `--log=subsystem:lebel` | Enables logging of a given level for a given number
    of subsystems, for example, `--log=fields:finest,codegen:info`. Logging for multiple
    subsystems are separated by commas. |

    | `-nj` `--no-java` | Disables Java support. The default is `false`, meaning that
    using Java classes in scripts are allowed. |

    | `-nse` `--no-syntax-extensions` | Disallows nonstandard syntax extensions. The
    default is `false`. |

    | `-nta` `--no-typed-arrays` | Disables typed arrays support. The default is `false`.
    |

    | `--optimistic-types` | Uses optimistic type assumptions with deoptimizing recompilation.
    The default is `true`. |

    | `--parse-only` | Parses the code without compiling. The default is `false`.
    |

    | `-pcc` `--persistent-code-cache` | Enables disk cache for compiled scripts.
    The default is `false`. |

    | `--print-ast` | Prints the abstract syntax tree. The default is `false`. |

    | `-pc` `--print-code` | Prints the generated bytecode on standard error or to
    the specified directory. You can specify a function name for which to print the
    bytecode. The syntax to specify directory and function is: `-pc=dir:<output-directory-path>,function:<function-name>`
    |

    | `--print-lower-ast` | Prints the lowered abstract syntax tree. The default is
    `false`. |

    | `-plp` `--print-lower-parse` | Prints the lowered parse tree. The default is
    `false`. |

    | `--print-mem-usage` | Prints the memory usage of instruction register (IR) after
    each compile stage. The default is `false`. |

    | `--print-no-newline` | The `print()` function will not print a newline character
    after printing its arguments. The default is `false`. |

    | `-pp` `--print-parse` | Prints the parse tree. The default is `false`. |

    | `--print-symbols` | Prints the symbol table. The default is `false`. |

    | `-pcs` `--profile-callsites` | Dumps callsite profile data. The default is `false`.
    |

    | `-scripting` | Enables shell scripting features. The default is `false`. |

    | `--stderr=<filename&#124;stream&#124;tty>` | Redirects `stderr` to the specified
    filename, stream, or text terminal. |

    | `--stdout=<filename&#124;stream&#124;tty>` | Redirects `stdout` to the specified
    filename, stream, or text terminal. |

    | `-strict` | Enables strict mode where the scripts are executed using the ECMAScript
    Edition 5.1 standards. The default is `false`. |

    | `-t=<timezone>` `–timezone=<timezone>` | Sets the time zone for the script execution.
    The default time zone is Chicago/America. |

    | `-tcs=<option>` `--trace-callsites=<option>` | Enables the callsite trace mode.
    Valid options are `miss` (traces callsite misses), `enterexit` (traces callsite
    enter/exit), and `objects` (prints object properties). Specify multiple options
    by separating them with commas: `-tcs=miss,enterexit,objects` |

    | `--verify-code` | Verifies the bytecode before running. The default is `false`.
    |

    | `-v` `–version` | Prints the version of the Nashorn engine. The default is `false`.
    |

    | `-xhelp` | Prints extended help. The default is `false`. |


    ## Using jjs in Interactive Mode


    If you run `jjs` without specifying any options or script files, it is run in
    interactive mode. The script is interpreted as you enter it. Recall that strings
    in Nashorn can be enclosed in single quotes or double quotes.


    The following are some examples of using the `jjs` tool in interactive mode. It
    is assumed that you have included the path to the `jjs` tool in the PATH environment
    variable on your machine. If you have not done so, you can replace `jjs` with
    `JDK_HOME\bin\jjs` in the following command. Remember to execute the `quit()`
    or `exit()` function to exit the `jjs` tool:


    ```

    c:\>jjs

    jjs> "Hello Nashorn"

    Hello Nashorn

    jjs> "Hello".toLowerCase();

    hello

    jjs> var list = [1, 2, 3, 4, 5]

    jjs> var sum = 0;

    jjs> for each (x in list) { sum = sum + x};

    15

    jjs> quit()

    c:\>

    ```'
