    \ is executed, `Bindings` and their scopes play a similar role."
  raw: '# 3. Passing Parameters to Scripts


    In this chapter, you will learn:


    *   Classes used in passing parameters from Java programs to scripts

    *   How to create and use `Bindings` object to hold the parameters

    *   How to define the scope of parameters

    *   How to pass parameters to scripts using different objects and scopes

    *   The advantages and disadvantages of different ways of passing parameters

    *   How to write script’s output to a file


    ## Bindings, Scope, and Context


    To understand the details of the parameter passing mechanism, three terms must
    be understood clearly: bindings, scope, and context. These terms are confusing
    at first. This chapter explains the parameter passing mechanism using the following
    steps:


    *   First, it defines these terms

    *   Second, it defines the relationship between these terms

    *   Third, it explains how to use them in Java programs


    ### Bindings


    A `Bindings` is a set of key-value pairs where all keys must be nonempty, non-null
    Strings. In Java code, a `Bindings` is an instance of the `Bindings` interface.
    The `SimpleBindings` class is an implementation of the `Bindings` interface. A
    script engine may provide its own implementation of the `Bindings` interface.


    Tip


    If you are familiar with the `java.util.Map` interface, it is easy to understand
    `Bindings`. The `Bindings` interface inherits from the `Map<String,Object>` interface.
    Therefore, a `Bindings` is simply a `Map` with a restriction that its keys must
    be nonempty, non-null Strings.


    Listing 3-1 shows how to use a `Bindings`. It creates an instance of `SimpleBindings`,
    adds some key-value pairs to it, retrieves the values of the keys, removes a key-value
    pair, etc. The `get()` method of the `Bindings` interface returns `null` if the
    key does not exist or the key exists and its value is `null`. If you want to test
    if a key exists, you need to use its `contains()` method.


    Listing 3-1\. Using Bindings Objects


    `// BindingsTest.java`


    `package com.jdojo.script;`


    `import javax.script.Bindings;`


    `import javax.script.SimpleBindings;`


    `public class BindingsTest {`


    `public static void main(String[] args) {`


    `// Create a Bindings instance`


    `Bindings params = new SimpleBindings();`


    `// Add some key-value pairs`


    `params.put("msg", "Hello");`


    `params.put("year", 1969);`


    `// Get values`


    `Object msg = params.get("msg");`


    `Object year = params.get("year");`


    `System.out.println("msg = " + msg);`


    `System.out.println("year = " + year);`


    `// Remove year from Bindings`


    `params.remove("year");`


    `year = params.get("year");`


    `boolean containsYear = params.containsKey("year");`


    `System.out.println("year = " + year);`


    `System.out.println("params contains year = " + containsYear);`


    `}`


    `}`


    `msg = Hello`


    `year = 1969`


    `year = null`


    `params contains year = false`


    You will not use a `Bindings` by itself. Often, you will use it to pass parameters
    from Java code to a script engine. The `ScriptEngine` interface contains a `createBindings()`
    method that returns an instance of the `Bindings` interface. This method gives
    a script engine a chance to return an instance of the specialized implementation
    of the `Bindings` interface. You can use this method, as shown:


    `// Get the Nashorn engine`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// Do not instantiate the SimpleBindings class, use the`


    `// createBindings() method of the engine instead`


    `Bindings params = engine.createBindings();`


    `// Work with params as usual`


    ### Scope


    Let’s move to the next term, which is scope. A scope is used for a `Bindings`.
    The scope of a `Bindings` determines the visibility of its key-value pairs. You
    can have multiple `Bindings` occurring in multiple scopes. However, one `Bindings`
    may occur only in one scope. How do you specify the scope for a `Bindings`? I
    will cover this shortly.


    Using the scope for a `Bindings` lets you define parameter variables for script
    engines in a hierarchical order. If a variable name is searched in an engine state,
    the `Bindings` with a higher precedence is searched first, followed by `Bindings`
    with lower precedence. The first found value of the variable is returned.


    The Java Scripting API defines two scopes. They are defined as two `int` constants
    in the `ScriptContext` interface. They are:


    *   `ScriptContext.ENGINE_SCOPE`

    *   `ScriptContext.GLOBAL_SCOPE`


    The engine scope has higher precedence than the global scope. If you add two key-value
    pairs with the same key to two `Bindings` (one in engine scope and one in global
    scope), the key-value pair in the engine scope will be used whenever a variable
    with the same name as the key has to be resolved.


    Understanding the role of the scope for a `Bindings` is so important that I will
    run through another analogy to explain it. Think about a Java class that has two
    sets of variables: one set contains all instance variables in the class and another
    contains all local variables in a method. These two sets of variables with their
    values are two `Bindings`. The type of variables in a `Bindings` defines the scope.
    Just for the sake of this discussion, I will define two scopes: instance scope
    and local scope. When a method is executed, a variable name is looked up in the
    local scope `Bindings` first because the local variables take precedence over
    instance variables. If a variable name is not found in the local scope `Bindings`,
    it is looked up in the instance scope `Bindings`. When a script is executed, `Bindings`
    and their scopes play a similar role.'
  trans: '

    # 3. 向脚本传递参数


    在本章中，你将学习：


    *   用于从 Java 程序向脚本传递参数的类

    *   如何创建并使用 `Bindings` 对象来保存参数

    *   如何定义参数的作用域

    *   如何使用不同的对象和作用域向脚本传递参数

    *   不同参数传递方式的优缺点

    *   如何将脚本输出写入文件


    ## 绑定、作用域与上下文


    要理解参数传递机制的细节，必须清晰理解三个术语：绑定、作用域和上下文。这些术语起初容易混淆。本章通过以下步骤解释参数传递机制：


    *   首先，定义这些术语

    *   其次，定义这些术语之间的关系

    *   第三，解释如何在 Java 程序中使用它们


    ### 绑定


    `Bindings` 是一组键值对，其中所有键必须是非空、非 null 的字符串。在 Java 代码中，`Bindings` 是 `Bindings` 接口的一个实例。`SimpleBindings`
    类是 `Bindings` 接口的一个实现。脚本引擎可能提供其自身的 `Bindings` 接口实现。


    提示


    如果你熟悉 `java.util.Map` 接口，就很容易理解 `Bindings`。`Bindings` 接口继承自 `Map<String,Object>`
    接口。因此，`Bindings` 本质上就是一个 `Map`，只是其键必须是非空、非 null 的字符串。


    清单 3-1 展示了如何使用 `Bindings`。它创建了一个 `SimpleBindings` 实例，向其添加一些键值对，检索键的值，移除一个键值对等。如果键不存在，或者键存在但其值为
    `null`，`Bindings` 接口的 `get()` 方法会返回 `null`。如果要测试键是否存在，需要使用其 `contains()` 方法。


    清单 3-1. 使用 Bindings 对象


    `// BindingsTest.java`


    `package com.jdojo.script;`


    `import javax.script.Bindings;`


    `import javax.script.SimpleBindings;`


    `public class BindingsTest {`


    `public static void main(String[] args) {`


    `// 创建一个 Bindings 实例`


    `Bindings params = new SimpleBindings();`


    `// 添加一些键值对`


    `params.put("msg", "Hello");`


    `params.put("year", 1969);`


    `// 获取值`


    `Object msg = params.get("msg");`


    `Object year = params.get("year");`


    `System.out.println("msg = " + msg);`


    `System.out.println("year = " + year);`


    `// 从 Bindings 中移除 year`


    `params.remove("year");`


    `year = params.get("year");`


    `boolean containsYear = params.containsKey("year");`


    `System.out.println("year = " + year);`


    `System.out.println("params contains year = " + containsYear);`


    `}`


    `}`


    `msg = Hello`


    `year = 1969`


    `year = null`


    `params contains year = false`


    你不会单独使用 `Bindings`。通常，你会用它来将参数从 Java 代码传递给脚本引擎。`ScriptEngine` 接口包含一个 `createBindings()`
    方法，该方法返回 `Bindings` 接口的一个实例。此方法让脚本引擎有机会返回 `Bindings` 接口的专用实现实例。你可以像下面这样使用此方法：


    `// 获取 Nashorn 引擎`


    `ScriptEngineManager manager = new ScriptEngineManager();`


    `ScriptEngine engine = manager.getEngineByName("JavaScript");`


    `// 不要实例化 SimpleBindings 类，而是使用引擎的 createBindings() 方法`


    `Bindings params = engine.createBindings();`


    `// 像往常一样使用 params`


    ### 作用域


    接下来看下一个术语：作用域。作用域用于 `Bindings`。`Bindings` 的作用域决定了其键值对的可见性。你可以有多个 `Bindings` 分布在多个作用域中。但是，一个
    `Bindings` 只能出现在一个作用域中。如何为 `Bindings` 指定作用域？我稍后会介绍。


    使用 `Bindings` 的作用域可以让你按层次顺序为脚本引擎定义参数变量。如果在引擎状态中搜索变量名，会先搜索优先级较高的 `Bindings`，然后搜索优先级较低的
    `Bindings`。返回的是该变量第一个找到的值。


    Java 脚本 API 定义了两个作用域。它们在 `ScriptContext` 接口中定义为两个 `int` 常量。它们是：


    *   `ScriptContext.ENGINE_SCOPE`

    *   `ScriptContext.GLOBAL_SCOPE`


    引擎作用域的优先级高于全局作用域。如果你向两个 `Bindings`（一个在引擎作用域，一个在全局作用域）中添加了具有相同键的键值对，那么每当需要解析与该键同名的变量时，将使用引擎作用域中的键值对。


    理解 `Bindings` 作用域的角色非常重要，我将用另一个类比来解释。想象一个 Java 类有两组变量：一组包含类中的所有实例变量，另一组包含方法中的所有局部变量。这两组变量及其值就是两个
    `Bindings`。`Bindings` 中变量的类型定义了作用域。仅为了讨论方便，我将定义两个作用域：实例作用域和局部作用域。当执行一个方法时，会先在局部作用域的
    `Bindings` 中查找变量名，因为局部变量的优先级高于实例变量。如果在局部作用域的 `Bindings` 中找不到变量名，则会在实例作用域的 `Bindings`
    中查找。当执行脚本时，`Bindings` 及其作用域扮演着类似的角色。'
- fmt: '# Defining the Script Context


    A script engine executes a script in a context. You can think of the context as
    the environment in which a script is executed. A Java host application provides
    two things to a script engine: a script and the context in which the script needs
    to be executed. An instance of the `ScriptContext` interface represents the context
    for a script. The `SimpleScriptContext` class is an implementation of the `ScriptContext`
    interface. A script context consists of four components:


    - A set of `Bindings`, in which each `Bindings` is associated with a different
    scope

    - A `Reader` that is used by the script engine to read inputs

    - A `Writer` that is used by the script engine to write outputs

    - An error `Writer` that is used by the script engine to write error outputs


    The set of `Bindings` in a context is used to pass parameters to the script. A
    reader and writers in a context control input source and output destinations of
    the script, respectively. For example, by setting a file writer as a writer, you
    can send all outputs from a script to a file.


    Each script engine maintains a default script context, which it uses to execute
    scripts. So far, you have executed several scripts without providing script contexts.
    In those cases, script engines were using their default script contexts to execute
    scripts. In this section, I will cover how to use an instance of the `ScriptContext`
    interface by itself. In the next section, I will cover how an instance of the
    `ScriptContext` interface is passed to a `ScriptEngine` during script execution.


    You can create an instance of the `ScriptContext` interface using the `SimpleScriptContext`
    class, like so:


    ```

    // Create a script context

    ScriptContext ctx = new SimpleScriptContext();

    ```


    An instance of the `SimpleScriptContext` class maintains two instances of `Bindings`:
    one for engine scope and one for global scope. The `Bindings` in the engine scope
    is created when you create the instance of the `SimpleScriptContext`. To work
    with the global scope `Bindings`, you will need to create an instance of the `Bindings`
    interface.


    By default, the `SimpleScriptContext` class initializes the input reader, the
    output writer, and the error writer for the context to the standard input `System.in`,
    the standard output `System.out`, and standard error output `System.err`, respectively.
    You can use the `getReader()`, `getWriter()`, and `getErrorWriter()` methods of
    the `ScriptContext` interface to get the references of the reader, writer, and
    the error writer from the `ScriptContext`, respectively. Setter methods are also
    provided to set a reader and writers. The following snippet of code shows how
    to obtain the reader and writers. It also shows how to set a writer to a `FileWriter`
    to write the script output to a file:


    ```

    // Get the reader and writers from the script context

    Reader inputReader = ctx.getReader();

    Writer outputWriter = ctx.getWriter();

    Writer errWriter = ctx.getErrorWriter();


    // Write all script outputs to an out.txt file

    Writer fileWriter = new FileWriter("out.txt");

    ctx.setWriter(fileWriter);

    ```


    After you create a `SimpleScriptContext`, you can start storing key-value pairs
    in the engine scope `Bindings` because an empty `Bindings` in the engine scope
    is created when you create the `SimpleScriptContext` object. The `setAttribute()`
    method is used to add a key-value pair to a `Bindings`. You must provide the key
    name, value, and the scope for the `Bindings`. The following snippet of code adds
    three key-value pairs:


    ```

    // Add three key-value pairs to the engine scope bindings

    ctx.setAttribute("year", 1969, ScriptContext.ENGINE_SCOPE);

    ctx.setAttribute("month", 9, ScriptContext.ENGINE_SCOPE);

    ctx.setAttribute("day", 19, ScriptContext.ENGINE_SCOPE);

    ```


    If you want to add key-value pairs to a `Bindings` in global scope, you will need
    to create and set the `Bindings` first, like so:


    ```

    // Add a global scope Bindings to the context

    Bindings globalBindings = new SimpleBindings();

    ctx.setBindings(globalBindings, ScriptContext.GLOBAL_SCOPE);

    ```


    Now you can add key-value pairs to the `Bindings` in global scope using the `setAttribute()`
    method, like so:


    ```

    // Add two key-value pairs to the global scope bindings

    ctx.setAttribute("year", 1982, ScriptContext.GLOBAL_SCOPE);

    ctx.setAttribute("name", "Boni", ScriptContext.GLOBAL_SCOPE);

    ```


    At this point, you can visualize the state of the `ScriptContext` instance as
    shown in Figure 3-1.


    ![A978-1-4842-0713-0_3_Fig1_HTML.jpg](A978-1-4842-0713-0_3_Fig1_HTML.jpg)


    Figure 3-1. A pictorial view of an instance of the SimpleScriptContext class


    You can perform several operations on a `ScriptContext`. You can set a different
    value for an already stored key using the `setAttribute(String name, Object value,
    int scope)` method. You can remove a key-value pair using the `removeAttribute(String
    name, int scope)` method for a specified key and a scope. You can get the value
    of a key in the specified scope using the `getAttribute(String name, int scope)`
    method.


    The most interesting thing that you can do with a `ScriptContext` is to retrieve
    a key value without specifying its scope using its `getAttribute(String name)`
    method. A `ScriptContext` searches for the key in the engine scope `Bindings`
    first. If it is not found in the engine scope, the `Bindings` in the global scope
    is searched. If the key is found in these scopes, the corresponding value from
    the scope, in which it is found first, is returned. If neither scope contains
    the key, `null` is returned.


    In your example, you have stored the key named `year` in the engine scope as well
    as in the global scope. The following snippet of code returns 1969 for the key
    `year` from the engine scope as the engine scope is searched first. The return
    type of the `getAttribute()` method is `Object`.


    ```

    // Get the value of the key year without specifying the scope.

    // It returns 1969 from the Bindings in the engine scope.

    int yearValue = (Integer)ctx.getAttribute("year");

    ```


    You have stored the key named `name` only in the global scope. If you attempt
    to retrieve its value, the engine scope is searched first, which does not return
    a match. Subsequently, the global scope is searched and the value `"Boni"` is
    returned, as shown:


    ```

    // Get the value of the key named name without specifying the scope.

    // It returns "Boni" from the Bindings in the global scope.

    String nameValue = (String)ctx.getAttribute("name");

    ```


    You can also retrieve the value of a key in a specific scope. The following snippet
    of code retrieves values for the key `year` from the engine scope and the global
    scope:


    ```

    // Assigns 1969 to engineScopeYear and 1982 to globalScopeYear

    int engineScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.ENGINE_SCOPE);

    int globalScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.GLOBAL_SCOPE);

    ```


    **Tip:** The Java Scripting API defines only two scopes: engine and global. A
    subinterface of the `ScriptContext` interface may define additional scopes. The
    `getScopes()` method of the `ScriptContext` interface returns a list of supported
    scopes as a `List<Integer>`. Note that a scope is represented as an integer. The
    two constants, `ENGINE_SCOPE` and `GLOBAL_SCOPE` in the `ScriptContext` interface,
    are assigned values 100 and 200, respectively. When a key is searched in multiple
    `Bindings` occurring in multiple scopes, the scope with the lower integer value
    is searched first. Because the value 100 for the engine scope is lower than the
    value 200 for the global scope, the engine scope is searched for a key first when
    you do not specify the scope.'
