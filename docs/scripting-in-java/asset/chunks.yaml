    `Result of C:\jkscript.txt = 190.0`


    ## Summary


    You can implement a script engine using the Java Script API. You will need to
    provide the implementation for the `ScriptEngine` and the `ScriptEngineFactory`
    interfaces. You need to package your script engine code in a certain way, so the
    engine can be discovered by the `ScriptManager` at runtime. The JAR file for the
    engine should contain a file named `META-INF\services\javax.script.ScriptEngineFactory`
    that should contain the fully qualified names of all script engine factory classes;
    the Java Script API discovers those script engine factories automatically. Once
    you package and deploy the script engine code, you can access it the same way
    you have been accessing Nashorn and other script engines.


    # 9. The jrunscript Command-Line Shell


    In this chapter, you will learn:


    *   What the `jrunscript` command-line shell is

    *   How to invoke the `jrunscript` command-line shell

    *   The different modes in which the `jrunscript` command-line shell can be invoked

    *   How to list the available script engines with the `jrunscript` command-line
    shell

    *   How to add a script engine to the `jrunscript` command-line shell

    *   How to pass arguments to the `jrunscript` command-line shell

    *   The global functions made available by the `jrunscript` command-line shell


    The JDK includes a command-line script shell called `jrunscript`. It is script-engine-independent
    and it can be used to evaluate any script including your `JKScript` that you developed
    in [Chapter 8](#A978-1-4842-0713-0_8_Chapter.html). You can find this shell in
    the `JAVA_HOME\bin` directory, where `JAVA_HOME` is the directory in which you
    have installed the JDK. In this section, I will discuss how to use the `jrunscript`
    shell to evaluate scripts using different script engines.'
