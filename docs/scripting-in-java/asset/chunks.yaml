    \ `ScriptEngine` has a default script context. The `get()`, `put()`, `getBindings()`,\
    \ and `setBindings()` methods of the `ScriptEngine` operate on its default `ScriptContext`.\
    \ When no `ScriptContext` is specified to the `eval()` method of the `ScriptEngine`,\
    \ the default context of the engine is used. The following two versions of the\
    \ `eval()` method of the `ScriptEngine` use its default context to execute the\
    \ script:\n\n- `Object eval(String script)`\n- `Object eval(Reader reader)`\n\n\
    You can pass a `Bindings` to the following two versions of the `eval()` method:\n\
    \n- `Object eval(String script, Bindings bindings)`\n- `Object eval(Reader reader,\
    \ Bindings bindings)`\n\nThese versions of the `eval()` method do not use the\
    \ default context of the `ScriptEngine`. They use a new `ScriptContext` whose\
    \ engine scope `Bindings` is the one passed to these methods and the global scope\
    \ `Bindings` is the same as for the default context of the engine. Note that these\
    \ two versions of the `eval()` method keep the default context of the `ScriptEngine`\
    \ untouched.\n\nYou can pass a `ScriptContext` to the following two versions of\
    \ the `eval()` method:\n\n- `Object eval(String script, ScriptContext context)`\n\
    - `Object eval(Reader reader, ScriptContext context)`\n\nThese versions of the\
    \ `eval()` method use the specified context to execute the script. They keep the\
    \ default context of the `ScriptEngine` untouched.\n\nThe three sets of the `eval()`\
    \ method let you execute scripts using different isolation levels:\n\n- The first\
    \ set lets you share the default context by all scripts\n- The second set lets\
    \ scripts use different engine scope `Bindings` and share the global scope `Bindings`\n\
    - The third set lets scripts execute in an isolated `ScriptContext`\n\nListing\
    \ 3-4 shows how scripts are executed in different isolation levels using the different\
