- fmt: '### The `ScriptEngine` and `ScriptEngineFactory` Interfaces


    The `ScriptEngine` interface is the main interface of the Java Scripting API whose
    instances facilitate the execution of scripts written in a particular scripting
    language.


    The implementer of the `ScriptEngine` interface also provides an implementation
    of the `ScriptEngineFactory` interface. A `ScriptEngineFactory` performs two tasks:


    - It creates instances of the script engine.

    - It provides information about the script engine such as engine name, version,
    language, and so on.


    ### The `AbstractScriptEngine` Class


    The `AbstractScriptEngine` class is an abstract class. It provides a partial implementation
    for the `ScriptEngine` interface. You will not use this class directly unless
    you are implementing a script engine.


    ### The `ScriptEngineManager` Class


    The `ScriptEngineManager` class provides a discovery and instantiation mechanism
    for script engines. It also maintains a mapping of key-value pairs as an instance
    of the `Bindings` interface storing state that is shared by all script engines
    that it creates.


    ### The `Compilable` Interface and the `CompiledScript` Class


    The `Compilable` interface may optionally be implemented by a script engine that
    allows compiling scripts for their repeated execution without recompilation.


    The `CompiledScript` class is an abstract class. It is extended by the providers
    of a script engine. It stores a script in a compiled form, which may be executed
    repeatedly without recompilation. Note that using a `ScriptEngine` to execute
    a script repeatedly causes the script to recompile every time, thus slowing down
    the performance.


    A script engine is not required to support script compilation. It must implement
    the `Compilable` interface if it supports script compilation.


    ### The `Invocable` Interface


    The `Invocable` interface may optionally be implemented by a script engine that
    may allow invoking procedures, functions, and methods in scripts that have been
    compiled previously.


    ### The `Bindings` Interface and the `SimpleBindings` Class


    An instance of a class that implements the `Bindings` interface is a mapping of
    key-value pairs with a restriction that a key must be non-null, non-empty `String`.
    It extends the `java.util.Map` interface. The `SimpleBindings` class is an implementation
    of the `Bindings` interface.


    ### The `ScriptContext` Interface and the `SimpleScriptContext` Class


    An instance of the `ScriptContext` interface acts as a bridge between the Java
    host application and the script engine. It is used to pass the execution context
    of the Java host application to the script engine. The script engine may use the
    context information while executing a script. A script engine may store its state
    in an instance of a class that implements the `ScriptContext` interface, which
    may be accessible to the Java host application.


    The `SimpleScriptContext` class is an implementation of the `ScriptContext` interface.


    ### The `ScriptException` Class


    The `ScriptException` class is an exception class. A script engine throws a `ScriptException`
    if an error occurs during the execution, compilation, or invocation of a script.
    The class contains three useful methods called `getLineNumber()`, `getColumnNumber()`,
    and `getFileName()`. These methods report the line number, the column number,
    and the file name of the script in which the error occurs. The `ScriptException`
    class overrides the `getMessage()` method of the `Throwable` class and includes
    the line number, column number, and the file name in the message that it returns.


    ## Discovering and Instantiating Script Engines


    You can create a script engine using a `ScriptEngineFactory` or `ScriptEngineManager`.
    Who is actually responsible for creating a script engine: `ScriptEngineFactory`,
    `ScriptEngineManager`, or both? The short answer is that a `ScriptEngineFactory`
    is always responsible for creating instances of a script engine. The next question
    is “What is the role of a `ScriptEngineManager`?”


    A `ScriptEngineManager` uses the service provider mechanism to locate all available
    script engine factories. It searches all JAR files in the CLASSPATH and other
    standard directories. It looks for a resource file, which is a text file named
    `javax.script.ScriptEngineFactory` under a directory named `META-INF/services`.
    The resource file consists of the fully qualified names of the classes implementing
    the `ScriptEngineFactory` interface. Each class name is specified in a separate
    line. The file may include comments that start with a `#` character. A sample
    resource file may have the following contents that include class names for two
    script engine factories:


    `#Java Kishori Script Engine Factory class`


    `com.jdojo.script.JKScriptEngineFactory`


    `#Another factory class`


    `com.jdojo.script.FunScriptFactory`


    A `ScriptEngineManager` locates and instantiates all available `ScriptEngineFactory`
    classes. You can get a list of instances of all factory classes using the `getEngineFactories()`
    method of the `ScriptEngineManager` class. When you call a method of the manager
    to get a script engine based on a criterion such as the `getEngineByName(String
    shortName)` method to get an engine by name, the manager searches all factories
    for that criterion and returns the matching script engine reference. If no factories
    are able to provide a matching engine, the manager returns `null`. Please refer
    to Listing 1-3 for more details on listing all available factories and describing
    script engines that they can create.


    Now you know that a `ScriptEngineManager` does not create instances of a script
    engine. Rather, it queries all available factories and passes the reference of
    a script engine created by the factory back to the caller.


    To make the discussion complete, let’s add a twist to the ways a script engine
    can be created. You can create an instance of a script engine in three ways:


    - Instantiate the script engine class directly.

    - Instantiate the script engine factory class directly and call its `getScriptEngine()`
    method.

    - Use one of the `getEngineByXxx()` methods of the `ScriptEngineManager` class.


    It is advised to use the `ScriptEngineManager` class to get instances of a script
    engine. This method allows all engines created by the same manager to share a
    state that is a set of key-value pairs stored as an instance of the `Bindings`
    interface. The `ScriptEngineManager` instance stores this state.


    **Tip**


    It is possible to have more than one instance of the `ScriptEngineManager` class
    in an application. In that case, each `ScriptEngineManager` instance maintains
    a state common to all engines that it creates. That is, if two engines are obtained
    by two different instances of the `ScriptEngineManager` class, those engines will
    not share a common state maintained by their managers unless you make it happen
    programmatically.'
