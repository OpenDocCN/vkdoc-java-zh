  raw: '## Structure of JavaFX Applications in Scripts


    In a JavaFX application, you override the following three methods of the `Application`
    class to manage the lifecycle of the application:


    *   The `init()` method

    *   The `start()` method

    *   The `stop()` method


    In a Nashorn script, you can manage the lifecycle of a JavaFX application the
    same way as you do in Java. You can have three functions named `init()`, `start()`,
    and `stop()` in the script. Notice that all three functions are optional in a
    Nashorn script. These functions correspond to the three methods in the Java class
    and they are called as follows, in order:


    The `init()` function is called. You can initialize the application in this function.
      The `start()` function is called. As is the case in a Java application, the
    `start()` function is passed the reference to the primary stage of the application.
    You need to populate the scene, add the scene to the primary stage, and show the
    stage.   The `stop()` function is called when the JavaFX application exits.  
    Tip


    If you do not have the `start()` function in a script for a JavaFX application,
    the entire script in the global scope is considered the code for the `start()`
    function. You can have functions other than these three functions. They will be
    treated as functions without assigning any special meaning to them. Those functions
    will not be called automatically; you will need to call them in your script.


    Listing 11-1 contains code for a simple JavaFX application in Java. It displays
    a window with a `Text` node in a `StackPane`. The `HelloFX` class contains the
    `init()`, `start()`, and `stop()` methods. Figure [11-1](#A978-1-4842-0713-0_11_Chapter.html#Fig1)
    shows the window displayed by the `HelloFX` application. When you exit the application
    the `stop()` method displays a message on the standard output.


    Listing 11-1\. The HelloFX Application in Java


    `// HelloFX.java`


    `package com.jdojo.script;`


    `import javafx.application.Application;`


    `import javafx.scene.Scene;`


    `import javafx.scene.layout.StackPane;`


    `import javafx.scene.text.Font;`


    `import javafx.scene.text.Text;`


    `import javafx.stage.Stage;`


    `public class HelloFX extends Application {`


    `private Text msg;`


    `private StackPane sp;`


    `public static void main(String[] args) {`


    `Application.launch(HelloFX.class);`


    `}`


    `@Override`


    `public void init() {`


    `msg = new Text("Hello JavaFX from Nashorn!");`


    `msg.setFont(Font.font("Helvetica", 18));`


    `sp = new StackPane(msg);`


    `}`


    `@Override`


    `public void start(Stage stage) throws Exception {`


    `stage.setTitle("Hello FX");`


    `stage.setScene(new Scene(sp, 300, 100));`


    `stage.sizeToScene();`


    `stage.show();`


    `}`


    `@Override`


    `public void stop() {`


    `System.out.println("Hello FX application is stopped.");`


    `}`


    `}`


    `Hello FX application is stopped.`


    ![A978-1-4842-0713-0_11_Fig1_HTML.jpg](A978-1-4842-0713-0_11_Fig1_HTML.jpg)


    Figure 11-1.


    The Windows Displayed by the HelloFX Application


    Listing 11-2 contains the Nashorn script for the `HelloFX` application. It is
    a one-to-one translation of the Java code in Listing 11-1\. Notice that the code
    for the same application is much shorter when written in Nashorn. The script is
    stored in the `hellofx.js` file. You can run the script using the command prompt
    as follows and it will display the same window as shown in Figure [11-1](#A978-1-4842-0713-0_11_Chapter.html#Fig1):


    `jjs –fx hellofx.js`


    Listing 11-2\. The Nashorn Script for the HelloFX Application Stored in hellofx.js


    `// hellofx.js`


    `var msg;`


    `var sp;`


    `function init() {`


    `msg = new javafx.scene.control.Label("Hello JavaFX from Nashorn!");`


    `msg.font = javafx.scene.text.Font.font("Helvetica", 18);`


    `sp = new javafx.scene.layout.StackPane(msg);`


    `}`


    `function start(stage) {`


    `stage.setTitle("Hello FX");`


    `stage.setScene(new javafx.scene.Scene(sp, 300, 100));`


    `stage.sizeToScene();`


    `stage.show();`


    `}`


    `function stop() {`


    `java.lang.System.out.println("Hello FX application is stopped.");`


    `}`


    You are not required to have any of the `init()`, `start()`, and `stop()` functions
    in the script. Listing 11-3 contains another version of the `HelloFX` application.
    The `init()` and `stop()` functions are not included. The code from the `init()`
    function has been moved to global scope. The `stop()` method has been removed,
    so you will not see a message on the standard output when the application is exited.
    Nashorn will execute the code in the global scope first, and then call the `start()`
    method. The script is stored in the `hellofx2.js` file. Running it displays the
    same window as shown in Figure [11-1](#A978-1-4842-0713-0_11_Chapter.html#Fig1).
    You can run the script:


    `jjs –fx hellofx2.js`


    Listing 11-3\. Another Version of the HelloFX Application without init() and stop()
    Methods


    `// hellofx2.js`


    `var msg = new javafx.scene.control.Label("Hello JavaFX from Nashorn!");`


    `msg.font = javafx.scene.text.Font.font("Helvetica", 18);`


    `var sp = new javafx.scene.layout.StackPane(msg);`


    `function start(stage) {`


    `stage.setTitle("Hello FX");`


    `stage.setScene(new javafx.scene.Scene(sp, 300, 100));`


    `stage.sizeToScene();`


    `stage.show();`


    `}`


    You can simplify the script for the HelloFX application a bit more. You can remove
    the `start()` function from the script. The JavaFX runtime creates and passes
    the reference of the primary stage to the `start()` function. How will you get
    the reference to the primary stage if you do not have the `start()` function?
    Nashorn creates a global object named `$STAGE`, which is the reference to the
    primary stage. You can use this global object to work with the primary stage.
    You do not even need to show the primary stage; Nashorn will automatically show
    it for you.


    Listing 11-3 contains the script that is another version for the same HelloFX
    application. It uses the global object `$STAGE` to reference the primary stage.
    I have removed the `init()` function. This time, you are not even calling the
    `show()` method of the primary stage. You are letting Nashorn show the primary
    stage automatically for you. The script is saved in the `hellofx3.js` file. You
    can run the script:


    `jjs –fx hellofx3.js`


    Listing 11-4\. Another Version of the HelloFX Application without init(), start(),
    and stop() Functions


    `// hellofx3.js`


    `var msg = new javafx.scene.control.Label("Hello JavaFX from Nashorn!");`


    `msg.font = javafx.scene.text.Font.font("Helvetica", 18);`


    `var sp = new javafx.scene.layout.StackPane(msg);`


    `$STAGE.setTitle("Hello FX");`


    `$STAGE.setScene(new javafx.scene.Scene(sp, 300, 100));`


    `$STAGE.sizeToScene();`


    `// $STAGE.show(); // No need to show the primary stage. Nashorn will // automatically
    show it.`


    Let’s try one more combination of functions. You will provide the `init()` function
    but not the `start()` function. Listing 11-5 contains the code for the same HelloFX
    application. It contains the `init()` method that creates the controls, but the
    `start()` method is removed.


    Listing 11-5\. Incorrect Implementation of JavaFX Application in a Nashorn Script


    `//` `incorrectfxapp.js`


    `var msg;`


    `var sp;`


    `function init() {`


    `msg = new javafx.scene.control.Label("Hello JavaFX from Nashorn!");`


    `msg.font = javafx.scene.text.Font.font("Helvetica", 18);`


    `sp = new javafx.scene.layout.StackPane(msg);`


    `}`


    `$STAGE.setTitle("Hello FX");`


    `$STAGE.setScene(new javafx.scene.Scene(sp, 300, 100));`


    `$STAGE.sizeToScene();`


    When you run the script in Listing 11-5, it throws an exception, as shown:


    `jjs –fx incorrectfxapp.js`


    `Exception in Application start method`


    `Exception in thread "main" java.lang.RuntimeException: Exception in Application
    start method`


    `at com.sun.javafx.application.LauncherImpl.launchApplication1(LauncherImpl.java:875)`


    `at com.sun.javafx.application.LauncherImpl.lambda$launchApplication$149(LauncherImpl.java:157)`


    `at com.sun.javafx.application.LauncherImpl$$Lambda$1/23211803.run(Unknown Source)`


    `at java.lang.Thread.run(Thread.java:745)`'
