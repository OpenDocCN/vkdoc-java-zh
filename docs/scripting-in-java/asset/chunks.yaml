    \ of an array is the same as deleting properties of an object. Use the `delete`\
    \ operator to delete an array element. If you delete an element from middle or\
    \ beginning of a dense array, the array becomes sparse. The following code shows\
    \ how to delete elements from an array:\n\n```\n// Creates a dense array with\
    \ elements at indexes 0, 1, and 2.\nvar names = new Array(\"Fu\", \"Li\", \"Do\"\
    );\nprint(\"Before deleting:\");\nprint(\"names.length = \" + names.length + \"\
    , Elements = \" + names);\n\n// Delete the element at index 1\ndelete names[1];\
    \ // names.length remains 3\nprint(\"AFter deleting:\");\nprint(\"names.length\
