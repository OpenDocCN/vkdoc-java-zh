- fmt: "`String`对象有一个`replace(regExp, replacement)`方法，可用于在文本中执行查找和替换操作。以下代码查找文本中所有单词`apple`的出现，并将其替换为单词`orange`：\n\
    \n```\nvar pattern = /\\bapple\\b/g;\nvar text = \"I have an apple and five pineapples.\"\
    ;\nvar replacement = \"orange\";\nvar newText = text.replace(pattern, replacement);\n\
    print(\"Regular Expression: \" + pattern + \", Input Text: \" + text);\nprint(\"\
    Replacement Text: \" + replacement + \", New Text: \" + newText);\n```\n\n```\n\
    Regular Expression: /\\bapple\\b/g, Input Text: I have an apple and five pineapples.\n\
    Replacement Text: orange, New Text: I have an orange and five pineapples.\n```\n\
    \n您可以通过将多个字符作为一个组来将它们视为一个单元。在正则表达式中，通过将一个或多个字符括在括号内来创建组。`(ab)`、`ab(z)`、`ab(ab)(xyz)`和`(the((is)(are)))`是组的示例。正则表达式中的每个组都有一个组号。组号从1开始。左括号开始一个新组。您可以在正则表达式中反向引用组号。假设您想要匹配以`ab`开头，后跟`xy`，再后跟`ab`的文本。您可以将正则表达式写为`/abxyab/`。您也可以通过形成一个包含`ab`的组并将其反向引用来实现相同的结果，如`/(ab)xy\\\
    1/`，其中`\\1`引用组1，在本例中为`(ab)`。请注意，从`RegExp`对象的`exec()`方法返回的`Array`对象在第一个元素中包含匹配的文本，在后续元素中包含所有匹配的组。如果您想要一个组但不想捕获其结果或反向引用它，您可以将字符序列`?:`添加到组的开头；例如，`(?:ab)xy`包含一个模式为`ab`的组，但您不能将其引用为`\\\
    1`，并且其匹配的文本不会填充到由`exec()`方法返回的`Array`对象中。以`?:`开头的组称为非捕获组，不以`?:`开头的组称为捕获组。您还可以在`String`对象的`replace()`方法的替换文本中将捕获的文本引用为`$1`、`$2`、`$3`等，其中1、2、3是组号。表[4-22](#A978-1-4842-0713-0_4_Chapter.html#Tab22)列出了可在替换文本中用于引用匹配文本的所有字符组合。\n\
    \n**表 4-22.** 正则表达式中的边界匹配器列表\n\n| 字符 | 替换文本 |\n| --- | --- |\n| `$$` | `$` |\n\
    | `$&` | 匹配的子字符串 |\n| `` $` `` | 匹配子字符串之前的字符串部分。它是一个`$`后跟一个反引号 |\n| `$'` | 匹配子字符串之后的字符串部分。它是一个`$`后跟一个单引号\
    \ |\n| `$n` | 引用组`n`的匹配文本，其中`n`是1到99范围内的整数。如果组`n`是`undefined`，则使用空字符串。如果`n`大于组数，则结果为`$n`\
    \ |\n\n使用组和在替换文本中进行反向引用，您可以将10位电话号码`nnnnnnnnnn`格式化为`(nnn) nnn-nnnn`，如清单4-26所示。\n\
    \n**清单 4-26.** 格式化10位电话号码\n\n```\n// tendigitsphonesformatter.js\nvar pattern\
    \ = /\\b(\\d{3})(\\d{3})(\\d{4})\\b/g;\nvar text = \"3342449999, 2229822, and\
    \ 6152534734\";\nvar replacement = \"($1) $2-$3\";\nvar formattedPhones = text.replace(pattern,\
    \ replacement);\nprint(\"Phones: \" + text);\nprint(\"Formatted Phones: \" + formattedPhones);\n\
    ```\n\n```\nPhones: 3342449999, 2229822, and 6152534734\nFormatted Phones: (334)\
    \ 244-9999, 2229822, and (615) 253-4734\n```\n\n在该示例中，7位电话号码未被格式化。假设您想将7位电话号码格式化为`nnn-nnnn`。您可以通过使用替换函数作为`String`对象的`replace()`方法的第二个参数来实现这一点。对于每个匹配项，将使用以下参数调用替换函数：\n\
    \n*   参数数量是正则表达式中的组数加3\n*   第一个参数是匹配的文本\n*   第二个及后续参数是组的匹配文本（如果有），从组1开始\n*   最后一个组的匹配文本之后是输入文本中找到匹配项的位置\n\
    *   最后一个参数是输入文本本身\n\n替换函数的返回值替换`replace()`方法返回的结果中的匹配文本。清单4-27展示了如何使用替换函数来格式化7位和10位电话号码。请注意，模式中的第一个三位数组是可选的。如果某个组在匹配文本中不匹配，则反向引用该组会返回`undefined`。此逻辑在`phoneFormatter()`函数中使用。如果名为`group1`的参数是`undefined`，则表示匹配了7位电话号码；否则，匹配了10位电话号码。\n\
    \n**清单 4-27.** 使用替换函数格式化7位和10位电话号码\n\n```\n// phoneformatter.js\n// Formats 10-digit\
    \ and 7-digit phone numbers\nfunction phoneFormatter(macthedText, group1, group2,\
    \ group3, startIndex, inputText) {\n    if (group1 === undefined) {\n        //\
    \ Matched a 7-digit phone number\n        return group2 + \"-\" + group3;\n  \
    \  }\n    else {\n        // Matched a 10-digit phone number\n        return \"\
    (\" + group1 + \") \" + group2 + \"-\" + group3;\n    }\n}\n\n// Make the first\
    \ group of 3-digits optional using the ? metacharacter\nvar pattern = /\\b(\\\
    d{3})?(\\d{3})(\\d{4})\\b/g;\nvar text = \"3342449999, 2229822, and 6152534734\"\
    ;\n\n// Use the phoneFormatter() function as the replacement in the replace()\
    \ method\nvar formattedPhones = text.replace(pattern, phoneFormatter);\nprint(\"\
    Phones: \" + text);\nprint(\"Formatted Phones: \" + formattedPhones);\n```\n\n\
    ```\nPhones: 3342449999, 2229822, and 6152534734\nFormatted Phones: (334) 244-9999,\
    \ 222-9822, and (615) 253-4734\n```\n\n### 了解脚本位置\n\nNashorn 提供了三个全局对象：\n\n* \
    \  `__FILE__`\n*   `__DIR__`\n*   `__LINE__`\n\n请注意这些属性名称前后的两个下划线。它们包含脚本文件名、脚本文件的目录名以及读取`__LINE__`属性的脚本的行号。如果`__FILE__`和`__DIR__`属性不可用（例如从标准输入读取脚本时），它们可能被报告为`null`。有时，您会得到一个不是脚本真实文件名的文件名。您可能使用`Reader`从Java程序运行脚本文件，在这种情况下，文件名将被报告为`<eval>`。清单4-28包含打印这些属性的代码。该代码存储在一个名为`scriptdetails.js`的文件中。\n\
    \n**清单 4-28.** `scriptdetails.js`文件的内容\n\n```\n// scriptdetails.js\n// Print the\
    \ location details of the following statement\nprint(\"File Name =\", __FILE__,\
    \ \", Directory =\",__DIR__, \", Line # =\" ,__LINE__);\n```\n\n以下命令使用`jjs`命令在命令行上运行`scriptdetails.js`文件，该命令会打印脚本详细信息：\n\
    \n```\nc:\\>jjs c:\\kishori\\scriptdetails.js\nFile Name = c:\\kishori\\scriptdetails.js,\
    \ Directory = c:\\kishori\\, Line # = 4\n```\n\n**提示**\n\n通常，`__FILE__`、`__DIR__`和`__LINE__`全局属性用于调试目的。您也可以使用`__DIR__`属性从相对于当前正在运行的脚本文件的位置加载脚本。\n\
    \n## 内置全局函数\n\nNashorn 定义了内置的全局函数。我已经讨论过其中一个名为`eval()`的函数，它用于评估存储在字符串中的脚本。在本节中，我将讨论更多内置的全局函数。"
  raw: 'The `String` object has a `replace(regExp, replacement)` method that you can
    use to perform find-and-replace operation in text. The following code finds all
    occurrences of the word `apple` in text and replaces it with the word `orange`:


    `var pattern = /\bapple\b/g;`


    `var text = "I have an apple and five pineapples.";`


    `var replacement = "orange";`


    `var newText = text.replace(pattern, replacement);`


    `print("Regular Expression: " + pattern + ", Input Text: " + text);`


    `print("Replacement Text: " + replacement + ", New Text: " + newText);`


    `Regular Expression: /\bapple\b/g, Input Text: I have an apple and five pineapples.`


    `Replacement Text: orange, New Text: I have an orange and five pineapples.`


    You can treat multiple characters as a unit by using them as a group. A group
    is created inside a regular expression by enclosing one or more characters inside
    parentheses. `(ab)`, `ab(z)`, `ab(ab)(xyz)`, and `(the((is)(are)))` are examples
    of groups. Each group in a regular expression has a group number. The group number
    starts at 1\. A left parenthesis starts a new group. You can back-reference group
    numbers in a regular expression. Suppose that you want to match text, which starts
    with `ab` followed by `xy`, which is followed by `ab`. You can write the regular
    expression as `/abxyab/`. You can also achieve the same result by forming a group
    that contains `ab` and back-reference it as `/(ab)xy\1/`, where `\1` refers to
    group 1, which is `(ab)` in this case. Notice that the returned `Array` object
    from the `exec()` method of the `RegExp` object contains the matched text in the
    first element and all matched groups in subsequent elements. If you want to have
    a group but do not want to capture its result or back reference it, you can add
    the character sequence `?:` to the beginning of the group; for example, `(?:ab)xy`
    contains a group with the pattern `ab`, but you cannot reference it as \1 and
    its matched text will not be populated in the `Array` object returned by the `exec()`
    method. A group starting with `?:` is called a noncapturing group and a group
    not starting with `?:` is called capturing group. You can also reference the captured
    text in the replacement text in the `replace()` method of the `String` object
    as $1, `$2`, `$3`, and so on, where 1, 2, 3 are the group numbers. Table [4-22](#A978-1-4842-0713-0_4_Chapter.html#Tab22)
    lists all character combinations that can be used in the replacement text to refer
    back to the matched text.


    Table 4-22.


    List of Boundary Matchers Inside Regular Expressions


    | Characters | Replacement Text |

    | --- | --- |

    | `$$` | $ |

    | `$&` | The matched substring |

    | `` $` `` | The portion of string that precedes the matched substring. It is
    a $ followed by a back quote |

    | `$''` | The portion of string that follows the matched substring. It is a $
    followed by a single quote |

    | `$n` | Refers to the matched text for group `n`, where `n` an integer in the
    range 1 to 99\. If group `n` is `undefined`, uses the empty String. If n is greater
    that the number of groups, the result is $n |


    Using groups and back referencing in the replacement text, you can format 10-digit
    phone numbers `nnnnnnnnnn` as `(nnn) nnn-nnnn`, as shown Listing 4-26.


    Listing 4-26\. Formatting 10-Digit Phone Numbers


    `// tendigitsphonesformatter.js`


    `var pattern = /\b(\d{3})(\d{3})(\d{4})\b/g;`


    `var text = "3342449999, 2229822, and 6152534734";`


    `var replacement = "($1) $2-$3";`


    `var formattedPhones = text.replace(pattern, replacement);`


    `print("Phones: " + text);`


    `print("Formatted Phones: " + formattedPhones);`


    `Phones: 3342449999, 2229822, and 6152534734`


    `Formatted Phones: (334) 244-9999, 2229822, and (615) 253-4734`


    In the example, the 7-digit phone number was left unformatted. Suppose that you
    want to format a 7-digit phone as `nnn-nnnn`. You can achieve this using a replacement
    function as the second argument to the `replace()` method of the `String` object.
    The replacement function is called with the following arguments for each match:


    *   The number of arguments is the number of groups in the regular expression
    plus 3

    *   The first argument is the matched text

    *   The second and subsequent arguments are the matched text for the groups, if
    any, starting at group 1

    *   The matched text for the last group is followed by the position in the input
    text where the match was found

    *   The last argument is the input text itself


    The returned value from the replacement function replaces the matched text in
    the result returned by the `replace()` method. Listing 4-27 shows how to use a
    replacement function to format 7-digit and 10-digit phone numbers. Notice that
    the first group of three digits is optional in the pattern. If a group does not
    match in the matched text, back-referencing the group returns `undefined`. This
    logic is used in the `phoneFormatter()` function. If the argument named `group1`
    is `undefined`, it means that a 7-digit phone number was matched; otherwise, a
    10-digit phone number was matched.


    Listing 4-27\. Formatting 7-Digit and 10-Digit Phone Numbers Using a Replacement
    Function


    `// phoneformatter.js`


    `// Formats 10-digit and 7-digit phone numbers`


    `function phoneFormatter(macthedText, group1, group2, group3, startIndex, inputText)
    {`


    `if (group1 === undefined) {`


    `// Matched a 7-digit phone number`


    `return group2 + "-" + group3;`


    `}`


    `else {`


    `// Matched a 10-digit phone number`


    `return "(" + group1 + ") " + group2 + "-" + group3;`


    `}`


    `}`


    `// Make the first group of 3-digits optional using the ? metacharacter`


    `var pattern = /\b(\d{3})?(\d{3})(\d{4})\b/g;`


    `var text = "3342449999, 2229822, and 6152534734";`


    `// Use the phoneFormatter() function as the replacement in the replace() // method`


    `var formattedPhones = text.replace(pattern, phoneFormatter);`


    `print("Phones: " + text);`


    `print("Formatted Phones: " + formattedPhones);`


    `Phones: 3342449999, 2229822, and 6152534734`


    `Formatted Phones: (334) 244-9999, 222-9822, and (615) 253-4734`


    ### Knowing Script Location


    Nashorn provides three global objects:


    *   `__FILE__`

    *   `__DIR__`

    *   `__LINE__`


    Notice the two underscores before and after the names of these properties. They
    contain the script file name, script file’s directory name, and the line number
    of the script that reads the `__LINE__` property. The properties `__FILE__`, and
    `__DIR__` may be reported as `null` if they are not available such as when reading
    scripts from standard input. Sometimes, you will get a file name that is not the
    real file name of your script. You may run your script in a file from a Java program
    using a `Reader`, and in that case, the file name will be reported as `<eval>`.
    Listing 4-28 contains code that prints these properties. The code is stored in
    a file named `scriptdetails.js`.


    Listing 4-28\. The Contents of the scriptdetails.js File


    `// scriptdetails.js`


    `// Print the location details of the following statement`


    `print("File Name =", __FILE__, ", Directory =",__DIR__, ", Line # =" ,__LINE__);`


    The following command runs the `scriptdetails.js` file on the command-line using
    the `jjs` command that prints the script details:


    `c:\>jjs c:\kishori\scriptdetails.js`


    `File Name = c:\kishori\scriptdetails.js, Directory = c:\kishori\, Line # =` `4`


    Tip


    Typically, the `__FILE__`, `__DIR__`, and `__LINE__` global properties are used
    for debugging purposes. You can also use `__DIR__` property to load scripts from
    locations ­relative to the currently running script file.


    ## Built-in Global Functions


    Nashorn defines built-in global functions. I have discussed one of such functions,
    named `eval()` that is used to evaluate a script stored in a string. In this section,
    I will discuss some more built-in global functions.'
