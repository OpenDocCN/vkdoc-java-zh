- fmt: "# Passing Arguments to Scripts\n\nThe `jrunscript` shell allows passing arguments\
    \ to scripts. The arguments are made available to the script in an array-like\
    \ object named `arguments`. You can access the `arguments` array inside the script\
    \ in a language-specific way. The following command passes three arguments of\
    \ 10, 20, and 30, and prints the value of the first argument:\n\n```\nC:\\>jrunscript\
    \ -e \"print('First argument is ' + arguments[0])\" 10 20 30\n```\n\n```\nFirst\
    \ argument is 10\n```\n\nConsider the Nashorn JavaScript file `nashornargstest.js`\
    \ shown in Listing 9-2, which prints the number of arguments and their values\
    \ that are passed to the script.\n\n**Listing 9-2.** A `nashornargstest.js` File\
    \ Written in Nashorn JavaScript to Print Command-Line Arguments\n\n```\n// nashornargstest.js\n\
    print(\"Number of arguments:\" + arguments.length);\nprint(\"Arguments are \"\
    ) ;\nfor(var i = 0; i < arguments.length; i++) {\n    print(arguments[i]);\n}\n\
    ```\n\nThe following commands run the `nashornargstest.js` file using the `jrunscript`\
    \ shell:\n\n```\nC:\\>jrunscript nashornargstest.js\nNumber of arguments:0\nArguments\
    \ are\n```\n\n```\nC:\\>jrunscript nashornargstest.js 10 20 30\nNumber of arguments:3\n\
    Arguments are\n10\n20\n30\n```\n\nIf you want to run the `nashornargstest.js`\
    \ file from a Java application, you need to pass an argument named `arguments`\
    \ to the engine. The argument named `arguments` is passed to the script by the\
    \ shell automatically, not by a Java application.\n\n## Global Functions\n\nThe\
    \ `jrunscript` command-line shell makes several global functions available for\
    \ use as listed in Table 9-3.\n\n**Table 9-3.** The List of Global Objects Loaded\
    \ by the `jrunscript` Command-Line Shell\n\n| Function | Description |\n| ---\
    \ | --- |\n| `cat(path, pattern)` | Shows the content of a file, URL, or InputStream\
    \ specified by `path`. Optionally, you can specify `pattern` to show only the\
    \ matching contents. |\n| `cd(target)` | Changes the present working directory\
    \ to the `target` directory. |\n| `cp(from, to)` | Copies a file, URL, or stream\
    \ to another file or stream. |\n| `date()` | Prints the current date using the\
    \ current locale. |\n| `del(pathname)` | A synonym for the `rm` command. |\n|\
    \ `dir(d, filter)` | A synonym for the `ls` command. |\n| `dirname(pathname)`\
    \ | Returns the directory part of the specified `pathname`. |\n| `echo(str)` |\
    \ Echoes the specified string arguments. |\n| `exec(cmd)` | Starts a child process,\
    \ executes the specified command, waits for completion, and returns the exit code.\
    \ |\n| `exit(code)` | Exit the shell program with the specified `code` as the\
    \ exit code. |\n| `find(dir, pattern, callback)` | Find files in `dir` with file\
    \ names matching the specified `pattern`. When a match is found, the `callback`\
    \ function is called passing the found file. Search is performed recursively in\
    \ all subdirectories. You can pass some functions listed in this table as `callback`.\
    \ If `callback` is not specified, the default is to print the found files path.\
    \ If `pattern` is not specified, all files are printed. |\n| `grep(pattern, files)`\
    \ | Unix-like `grep`, but accepts JavaScript regex patterns. |\n| `ip(name)` |\
    \ Prints the IP addresses of a given domain name. |\n| `load(path)` | Loads and\
    \ evaluates JavaScript code from a stream, file, or URL. |\n| `ls(dir, filter)`\
    \ | Lists the files in `dir` matching the `filter` regular expression. |\n| `mkdir(dir)`\
    \ | Creates a new directory with the name `dir`. |\n| `mkdirs(dir)` | Creates\
    \ a directory named `dir`, including any necessary but nonexistent parent directories.\
    \ |\n| `mv(from, to)` | Moves a file to another directory. |\n| `printf(format,\
    \ args)` | A C-like printf. |\n| `pwd()` | Prints the working directory. |\n|\
    \ `quit(code)` | A synonym for `exit(code)`. |\n| `read(prompt, multiline)` |\
    \ Reads and returns one or more lines from standard input after printing the specified\
    \ `prompt`. The default prompt is a `>`. If `multiline` is 0, it reads one line.\
    \ If `multiline` is other than 0, it reads multiple lines. You need to press `Enter`\
    \ to stop entering text. |\n| `ren(from, to)` | A synonym for `mv`. |\n| `rm(filePath)`\
    \ | Removes the file with the specified `filePath`. |\n| `rmdir(dirPath)` | Removes\
    \ the directory with the specified `dirPath`. |\n| `which(cmd)` | Unix-like which\
    \ `command` to print the path of the specified `cmd` command based on the PATH\
    \ environment variable. |\n| `XMLDocument(input)` | Converts `input` that can\
    \ be a filepath or a `Reader` to DOM Document object. If `input` is not specified,\
    \ an empty DOM document is returned. |\n| `XMLResult(input)` | Convert an arbitrary\
    \ stream or file to an `XMLResult`. If `input` is an instance of `javax.xml.transform.Result`,\
    \ `input` is returned; if `input` is an instance of `org.w3c.dom.Document`, a\
    \ `javax.xml.transform.dom.DOMResult` is returned; otherwise, a `javax.xml.transform.stream.StreamResult`\
    \ is returned. |\n| `XMLSource(input)` | Converts an arbitrary stream, file, URL\
    \ to an `XMLSource`. If `input` is an instance of `javax.xml.transform.Source`,\
    \ `input` is returned; if `input` is an instance of `org.w3c.dom.Document`, a\
    \ `javax.xml.transform.dom.DOMSource` is returned; otherwise, a `javax.xml.transform.stream.StreamSource`\
    \ is returned. |\n| `XSLTransform(input, style, output)` | Perform an XSLT transform;\
    \ `input` is the input XML; `style` is the XML stylesheet; `output` is the output\
    \ XML. `Input` and `style` can be a `URL`, a `File` or an `InputStream`; output\
    \ can be a `File` or an `OutputStream`. |\n\nThe following is the output of using\
    \ some of the utility functions provided by `jrunscript`:\n\n```\nC:\\>jrunscript\n\
    nashorn> cat(\"http://jdojo.com/about\", \"ksharan\")\n```"
