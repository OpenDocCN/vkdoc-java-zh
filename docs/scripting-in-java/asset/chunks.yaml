    two methods of a Java class, as shown in Listing 12-5\. The script passes the
    script objects to the Java methods. The Java methods print the properties of the
    passed objects and add a new property to both script objects. The script prints
    the properties after the method returns to confirm that the new properties added
    to script objects in Java code still exist.


