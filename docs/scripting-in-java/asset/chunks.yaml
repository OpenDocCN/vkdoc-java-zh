- fmt: '### To Number Conversion


    Values of all types in Nashorn can be implicitly or explicitly converted to the
    `Number` type. Table [4-7](#A978-1-4842-0713-0_4_Chapter.html#Tab7) lists the
    types of values and their corresponding converted numeric values.


    Table 4-7. The List of Value Types and Their Corresponding Converted Numeric Values


    | Value Type | Converted Number Value |

    | --- | --- |

    | `Undefined` | `NaN` |

    | `Null` | `+0` |

    | `Boolean` | The Boolean value `true` is converted to 1 and `false` to 0 |

    | `Number` | Identity conversion |

    | `String` | The empty string and a string containing only whitespaces are converted
    to zero. A string whose contents after trimming the leading and trailing whitespaces
    can be interpreted as a number is converted to the corresponding numeric value.
    If the numeric content of the string is too large or too small, it is converted
    to `+Infinity` or `–Infinity`, respectively. All other strings are converted to
    `NaN` |

    | `Object` | If the contents of the object can be interpreted as a number, the
    object is converted to the corresponding numeric value; otherwise, the object
    is converted to `NaN` |


    You can use the `Number()` global function to explicitly convert a value to the
    `Number` type. The function takes the value to be converted as an argument and
    returns a number. The following snippet of code contains some examples of implicit
    and explicit conversions to the `Number` type:


    ```

    var result;

    result = Number(undefined);

    print("undefined is converted to", result);

    // Any number + NaN is NaN

    result = 10 + undefined;

    print("10 + undefined is", result);

    result = Number("");

    print("The empty string is converted to", result);

    result = Number(''Hello'');

    print("''Hello'' is converted to", result);

    // Convertes to the number 1982, ignoring leading and trailing whitespaces

    result = Number('' 1982 '');

    print("'' 1982 '' is converted to", result);

    result = Number(new Object(88));

    print("new Object(88) is converted to", result);

    result = Number(new Object());

    print("new Object() is converted to", result);

    // A very big number in a string

    result = Number("10E2000");

    print("10E2000 is converted to", result);

    undefined is converted to NaN

    10 + undefined is NaN

    The empty string is converted to 0

    ''Hello'' is converted to NaN

    '' 1982 '' is converted to 1982

    new Object(88) is converted to 88

    new Object() is converted to NaN

    10E2000 is converted to Infinity

    ```


    ### To String Conversion


    Values of all types in Nashorn can be implicitly or explicitly converted to the
    `String` type. Table [4-8](#A978-1-4842-0713-0_4_Chapter.html#Tab8) lists the
    types of values and their corresponding converted String values.


    Table 4-8. The List of Value Types and Their Corresponding Converted String Values


    | Value Type | Converted String Value |

    | --- | --- |

    | `Undefined` | `"undefined"` |

    | `Null` | `"null"` |

    | `Boolean` | The Boolean value `true` is converted to “true” and `false` to “false”
    |

    | `Number` | `+0`, `0`, and `-0` are converted to “0”; `NaN` is converted to “NaN”;
    `Infinity` (or `+Infinity`) is converted to “Infinity”; `-Infinity` is converted
    to “-Infinity”. All other numbers are converted to their corresponding string
    representation in either decimal or scientific notation. Bigger numbers may not
    be converted exactly |

    | `String` | Identity conversion |

    | `Object` | If the object is a wrapper for a primitive value, it returns the
    primitive value as a `String`; otherwise, the `String` representation of the object
    by calling the `toString()` method is returned. If `toString()` method does not
    exist in the object, the string representation of the returned value of the `valueOf()`
    method is returned |


    You can use the `String()` global function to explicitly convert a value to the
    `String` type. The function takes the value to be converted as an argument and
    returns a `String`. The following snippet of code contains some examples of implicit
    and explicit conversions to the `String` type:


    ```

    var result;

    result = String(undefined);

    print("undefined is converted to", result);

    result = String(true);

    print("true is converted to", result);

    result = String(9088);

    print("9088 is converted to", result);

    result = String(0x786A);

    print("0x786A is converted to", result);

    result = String(900000000000000000000);

    print("900000000000000000000 is converted to", result);

    result = String(9000000000000000000000);

    print("9000000000000000000000 is converted to", result);

    result = String(new Object(1982));

    print("new Object(1982) is converted to", result);

    result = String(new Object());

    print("new Object() is converted to", result);

    undefined is converted to undefined

    true is converted to true

    9088 is converted to 9088

    0x786A is converted to 30826

    900000000000000000000 is converted to 900000000000000000000

    9000000000000000000000 is converted to 9e+21

    new Object(1982) is converted to 1982

    new Object() is converted to [object Object]

    ```'
