    ### 使用构造函数


    构造函数（或简称为构造器）是一种与 `new` 运算符配合使用来创建对象的函数。按照惯例，构造函数名称应以大写字母开头。以下代码创建了一个名为 `Person`
    的函数，旨在用作构造函数：


    `// 声明一个名为 Person 的构造函数`


    `function Person(fName, lName) {`


    `this.fName = fName;`


    `this.lName = lName;`


    `this.fullName = function () {`


    `return this.fName + " " + this.lName;`


    `}`


    `}`


    请注意，构造函数与其他任何函数一样，只是一个普通函数，它也可以在不使用 `new` 关键字的情况下作为普通函数调用。根据函数的编写方式，其结果可能大相径庭。我稍后将讨论此类情况。


    当使用 `new` 运算符调用构造函数时，构造函数内部的 `this` 关键字指向正在构造的对象。在这种情况下，`Person` 函数内部的 `this.fName`
    指向正在构造的新对象的 `fName` 属性。`lName` 和 `toString` 也是如此。`Person` 构造函数只是向正在创建的对象添加了三个属性。以下代码片段使用
    `Person` 构造函数创建了两个对象，并打印了它们的字符串表示形式：


    `// 创建几个 Person 对象`


    `var john = new Person("John", "Jacobs");`


    `var ken = new Person("Ken", "McEwen");`


    `// 当需要将对象转换为字符串时，print() 函数会调用 toString() 方法`


    `print(john);`


    `print(ken);`


    `John Jacobs`


    `Ken McEwen`


    让我们尝试将 `Person` 作为普通函数（而非构造函数）来使用：


    `// 打印详细信息`


    `printf("fName = %s, lName = %s", this.fName, this.lName);`


    `// 调用 Person 函数`


    `var john = Person("John", "Jacobs");`


    `// 打印详细信息`


    `printf("fName = %s, lName = %s, full name = %s", this.fName, this.lName, this.fullName());`


    `// 调用 Person 函数`


    `var ken = Person("Ken", "McEwen");`


    `// 打印两个 person 引用`


    `print("john = " + john);`


    `print("ken = " + ken);`


    `printf("fName = %s, lName = %s, full name = %s", this.fName, this.lName, this.fullName());`


    `fName = undefined, lName = undefined`


    `fName = John, lName = Jacobs, full name = John Jacobs`


    `john = undefined`


    `ken = undefined`


    `fName = Ken, lName = McEwen, full name = Ken McEwen`


    您可以在代码中观察到以下几点：


    *   代码打印了 `this.fName` 和 `this.lName` 的值。`printf()` 函数在全局上下文中被调用，关键字 `this` 指向全局对象。由于您尚未为全局对象定义任何
    `fName` 和 `lName` 属性，因此这两个属性的值都返回为 `undefined`。

    *   `Person()` 函数被调用，其返回值存储在 `john` 变量中。`Person()` 函数在全局上下文中被调用，因此函数内部的 `this`
    关键字指向全局对象。该函数向全局对象添加了三个属性。

    *   使用 `printf()` 函数打印全局对象（由 `this` 引用）的详细信息，以确认之前对 `Person()` 函数的调用已将这些属性添加到了全局对象中。

    *   使用不同的参数再次调用了 `Person()` 函数。第一次调用已经向全局对象添加了三个属性。这次调用只是用新值更新了它们。通过再次从全局对象读取这些属性可以确认这一点。

    *   由于 `Person()` 函数没有显式返回值，因此默认返回 `undefined`，输出中的最后两行证实了这一点。


    如果在创建新对象时不为构造函数传递任何参数，则可以省略括号。以下代码将 `Person` 作为构造函数调用，且未传递任何参数，这将导致函数内部的形参默认为
    `undefined`。请注意，`new` 运算符后面直接跟了构造函数名称：


    `// 创建一个两个名字都为 undefined 的 person 对象`


    `var person = new Person;  // 无参数列表`

