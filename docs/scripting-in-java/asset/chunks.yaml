    calculator\");\n// Get the implementation of the Calculator interface\nCalculator\
    \ calculator = inv.getInterface(calc, Calculator.class);\n```\n\nListing 5-7 shows\
    \ how to implement methods of a Java interface as instance methods of an object\
    \ using Nashorn.\n\n**Listing 5-7.** Implementing Methods of a Java Interface\
    \ as Instance Methods of an Object in a Script\n\n```java\n// ScriptObjectImplInterface.java\n\
    package com.jdojo.script;\n\nimport javax.script.Invocable;\nimport javax.script.ScriptEngine;\n\
