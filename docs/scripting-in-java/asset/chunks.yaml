    ![A978-1-4842-0713-0_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0713-0_BookFrontmatter_Fig1_HTML.jpg)
    Kishori Sharan is a Senior Software Consultant. He holds a Master of Science degree
    in Computer Information Systems from Troy State University in Montgomery, Alabama.
    He is a Sun Certified Java Programmer and Sybase Certified PowerBuilder Developer
    Professional. He specializes in developing enterprise applications using Java
    SE, Java EE, PowerBuilder, and Oracle database. He has been working in the software
    industry for over 17 years. He has helped several clients migrate legacy applications
    to the web. He loves writing technical books in his free time. He maintains his
    website at [www.​jdojo.​com](http://www.jdojo.com/), where he posts blogs on Java
    and JavaFX.


    About the Technical Reviewers


    ![A978-1-4842-0713-0_BookFrontmatter_Fig2_HTML.jpg](A978-1-4842-0713-0_BookFrontmatter_Fig2_HTML.jpg)
    Vinay Kumar is a Technology Evangelist. He has extensive experience of more than
    seven years in designing and implementing large-scale projects in enterprise technologies
    in various consulting and system integration companies. His passion helped him
    achieve certifications in Oracle ADF, Webcenter Portal, and Java. Experience and
    in-depth knowledge has helped him evolve into a focused domain expert and a well-known
    technical blogger. He loves to spend his time mentoring and writing technical
    blogs, publishing white papers, and maintaining a dedicated education channel
    at YouTube for ADF/Webcenter. Vinay has contributed to the Java/Oracle ADF/Webcenter
    Community by publishing over 250 technical articles on his personal blog, Techartifact.com.
    He was awarded an Oracle ACE in June 2014\. You can follow him at @vinaykuma201
    or [in.​linkedin.​com/​in/​vinaykumar2](http://in.linkedin.com/in/vinaykumar2).


    ![A978-1-4842-0713-0_BookFrontmatter_Fig3_HTML.jpg](A978-1-4842-0713-0_BookFrontmatter_Fig3_HTML.jpg)
    Massimo Nardone holds a Master of Science degree in Computing Science from the
    University of Salerno, Italy. He worked as a PCI QSA and Senior Lead IT Security/Cloud/SCADA
    Architect for many years and currently works as Security, Cloud, and SCADA Lead
    IT Architect for Hewlett Packard Finland. He has more than 20 years of work experience
    in IT, including in security, SCADA, cloud computing, IT infrastructure, mobile
    security, and WWW technology areas for both national and international projects.
    Massimo has worked as a project manager, Cloud/SCADA Lead IT Architect, software
    engineer, research engineer, chief security architect, and software specialist.
    He was a visiting lecturer and supervisor for exercises at the Networking Laboratory
    of the Helsinki University of Technology (Aalto University). He programmed and
    has taught how to program with Perl, PHP, Java, VB, Python, C/C++, and MySQL.
    He is the author of Beginning PHP and MySQL (Apress, 2014) and Pro Android Games
    (Apress, 2015).


    He holds four international patents (PKI, SIP, SAML and Proxy areas). This book
    is dedicated to Pia, Luna, Leo, and Neve, who are the beautiful reasons for his
    life.


    Introduction


    When I wrote the three volumes of Harnessing Java 7 in 2012, I did not include
    a chapter on the Java Scripting API because of the limited space that I had for
    each volume. Note the phrase “Java Scripting,” which uses two separate words:
    “Java” and “Scripting.” “JavaScript” is the name of a scripting language, which
    has nothing to do with the Java programming language, whereas the phrase “Java
    Scripting API” is the Java API that lets Java applications interact with scripting
    languages.'
