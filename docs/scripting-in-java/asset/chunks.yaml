    those constructors. The `newObject()` method of the `ScriptObjectMirror` class
    lets you create script objects in Java. The method declaration is:


    `Object newObject(Object... args)`


    The arguments to the method are the arguments to be passed to the constructor.
    The method returns the new object reference. This method needs to be invoked on
    a constructor. First, you will need to get the reference of the constructor in
    Java as a `ScriptObjectMirror` object, and then call this method to create a new
    script object using that constructor.


    You can call the methods of a script object using the `callMember()` method of
    the `ScriptObjectMirror` class. The method’s declaration is:


    `Object callMember(String methodName, Object... args)`


    In [Chapter 4](#A978-1-4842-0713-0_4_Chapter.html), you created a constructor
    called `Point`. Its declaration is shown in Listing 12-6 for your reference. In
    this example, you will create objects of the `Point` type in Java.


