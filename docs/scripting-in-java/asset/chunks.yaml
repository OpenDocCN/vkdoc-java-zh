    JavaScript\");\n\n// Do not instantiate the SimpleBindings class, use the\n//\
    \ createBindings() method of the engine instead\nBindings params = engine.createBindings();\n\
    \n// Work with params as usual\n```\n\n### Scope\n\nLet’s move to the next term,\
    \ which is scope. A scope is used for a `Bindings`. The scope of a `Bindings`\
    \ determines the visibility of its key-value pairs. You can have multiple `Bindings`\
    \ occurring in multiple scopes. However, one `Bindings` may occur only in one\
    \ scope. How do you specify the scope for a `Bindings`? I will cover this shortly.\n\
    \nUsing the scope for a `Bindings` lets you define parameter variables for script\
    \ engines in a hierarchical order. If a variable name is searched in an engine\
    \ state, the `Bindings` with a higher precedence is searched first, followed by\
    \ `Bindings` with lower precedence. The first found value of the variable is returned.\n\
    \nThe Java Scripting API defines two scopes. They are defined as two `int` constants\
    \ in the `ScriptContext` interface. They are:\n\n- `ScriptContext.ENGINE_SCOPE`\n\
    - `ScriptContext.GLOBAL_SCOPE`\n\nThe engine scope has higher precedence than\
    \ the global scope. If you add two key-value pairs with the same key to two `Bindings`\
    \ (one in engine scope and one in global scope), the key-value pair in the engine\
