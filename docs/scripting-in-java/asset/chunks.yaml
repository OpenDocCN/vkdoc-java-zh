    `Bindings` in the default context of all `ScriptEngine`s created by this `ScriptEngineManager`
    are modified because they share the same `Bindings`.


    The default context of each `ScriptEngine` maintains an engine scope `Bindings`
    separately. To add a key-value pair to the engine scope `Bindings` of a `ScriptEngine`,
    use its `put()` method, as shown:


    `ScriptEngine engine1 = null; // get an engine`


    `// Add an "engineName" key with its value as "Engine-1" to the`


