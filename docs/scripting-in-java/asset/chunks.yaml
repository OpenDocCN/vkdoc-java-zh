    \ + \", Elements = \" + names);\n\nprint(\"Setting length to 0...\");\nnames.length\
    \ = 0;\nprint(\"names.length = \" + names.length + \", Elements = \" + names);\n\
    \nprint(\"Recreating the array...\");\nnames = new Array(\"Fu\", \"Li\", \"Do\"\
