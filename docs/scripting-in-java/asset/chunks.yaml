    | `Null` | `"null"` |

    | `Boolean` | The Boolean value `true` is converted to “true” and `false` to “false”
    |

    | `Number` | `+0`, `0`, and `-0` are converted to “0”; `NaN` is converted to “NaN”;
    `Infinity` (or `+Infinity`) is converted to “Infinity”; `-Infinity` is converted
    to “-Infinity”. All other numbers are converted to their corresponding string
    representation in either decimal or scientific notation. Bigger numbers may not
    be converted exactly |

