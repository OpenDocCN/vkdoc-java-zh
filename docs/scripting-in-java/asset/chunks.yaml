    引言


    在 2012 年撰写三卷本的《Harnessing Java 7》时，由于每卷篇幅有限，我没有包含关于 Java 脚本 API 的章节。请注意短语“Java
    Scripting”，它由两个独立的单词组成：“Java”和“Scripting”。“JavaScript”是一种脚本语言的名称，与 Java 编程语言无关；而短语“Java
    Scripting API”是允许 Java 应用程序与脚本语言交互的 Java API。

