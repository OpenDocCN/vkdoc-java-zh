  raw: '### The Undefined Type


    The Undefined type has only one value that is called `undefined`. A variable in
    Nashorn that is declared but is assigned a value has the value `undefined`. You
    can also assign the value `undefined` to a variable explicitly. In addition, you
    can compare another value with `undefined`. The following snippet of code shows
    how to use the value `undefined`:


    `// empId is initialized to undefined implicitly`


    `var empId;`


    `// deptId is initilaized to undefined explicitly`


    `var deptId = undefined;`


    `// Print the values of empId and deptId`


    `print("empId is", empId)`


    `print("deptId is", deptId);`


    `if (empId == undefined) {`


    `print("empId is undefined")`


    `}`


    `if (deptId == undefined) {`


    `print("deptId is undefined")`


    `}`


    `empId is undefined`


    `deptId is undefined`


    `empId is undefined`


    `deptId is undefined`


    ### The Null Type


    The Null type has only one value that is called `null`. Even though the value
    `null` is considered to be of primitive type, it is typically used where an object
    is expected but there is no valid object to be specified. The following snippet
    of code shows how to use the value `null`:


    `var person = null;`


    `print("person is", person);`


    `person is null`


    ### The Number Type


    Unlike Java, Nashorn does not distinguish between integers and floating-point
    numbers. It has only one type called Number to represent both types of numeric
    values. Numbers are stored in a double-precision 64-bit IEEE floating-point format.
    All numeric constants are called number literals. Like Java, you can represent
    number literals in decimal, hexadecimal, octal, and scientific notations. Nashorn
    defines three special values of number type: non-a-number, positive infinity,
    and negative infinity. In scripts, these special values are represented by `NaN`,
    +`Infinity`, and `–Infinity`, respectively. The positive infinity value can also
    be represented as simply `Infinity`, without a leading `+` sign. The following
    snippet of code shows how to use number literals and special number type values:


    `var empId = 100;               // An integer of type Number`


    `var salary = 1500.678;         // A lfoating-point number of type Number`


    `var hexNumber = 0x0061;        // Same as 97 is decimal`


    `var octalNumber = 0141;        // Same 97 in decimal`


    `var scientificNumber = 0.97E2; // Same 97 in decimal`


    `var notANumber = NaN;`


    `var posInfinity = Infinity;`


    `var negInfinity = -Infinity;`


    `// Print all values`


    `print("empId =", empId);`


    `print("salary =", salary);`


    `print("hexNumber =", hexNumber);`


    `print("octalNumber =", octalNumber);`


    `print("scientificNumber =", scientificNumber);`


    `print("notANumber =", notANumber);`


    `print("posInfinity =", posInfinity);`


    `print("negInfinity =", negInfinity);`


    `empId = 100`


    `salary = 1500.678`


    `hexNumber = 97`


    `octalNumber = 97`


    `scientificNumber = 97`


    `notANumber = NaN`


    `posInfinity = Infinity`


    `negInfinity = -` `Infinity`


    ### The Boolean Type


    The Boolean type represents a logical entity that be either true or false. Like
    Java, Nashorn has two literals, `true` and `false`, of the Boolean type:


    `Var isProcessing = true;`


    `var isProcessed = false;`


    `print("isProcessing =", isProcessing);`


    `print("isProcessed =", isProcessed);`


    `isProcessing = true`


    `isProcessed = false`


    ### The String Type


    The String type includes all finite, ordered sequences of zero or more Unicode
    characters. A sequence of characters enclosed in double quotes or single quotes
    is known as a string literal. The number of characters in the sequence is known
    as the length of the string. The following are examples of using string literals:


    `var greetings = "Hi there";     // A string literal of length 8`


    `var title = ''Scripting in Java''; // A string literal enclosed in single quotes`


    `var emptyMsg = "";              // An empty string of length zero`


    A string literal can contain single quotes if it is enclosed in double quotes
    and vice versa. If a string literal is enclosed in double quotes, you need to
    escape the double quote using a backslash if you want to include a double quote
    inside the string. The same is true for strings enclosed in single quotes. The
    following snippet of code shows you some examples:


    `var msg1 = "It''s here and now.";`


    `var msg2 = ''He said, "He is happy."'';`


    `var msg3 = ''It\''s here and now.'';`


    `var msg4 = "He said, \"He is happy.\"";`


    `print(msg1);`


    `print(msg2);`


    `print(msg3);`


    `print(msg4);`


    `It''s here and now.`


    `He said, "He is happy."`


    `It''s here and now.`


    `He said, "He is happy."`


    Unlike Java, a string literal in Nashorn can be written in mutiple lines. You
    need to use a backslash at the end of the line as the continuation character.
    Notice that the backslash and the line terminator are not part of the string literal.
    Here is an example that writes the string literal, `Hello World!` in three lines:


    `// Assigns the string, Hello world!, to msg using a multi-line string literal`


    `var msg = "Hello \`


    `world\`


    `!";`


    `print(msg);`


    `Hello world!`


    If you want to insert a newline character in a multiline string literal, you will
    need to use the escape sequence `\n` as follows. Notice that I have placed the
    beginning and last quotes at a separate line that makes the multiline text more
    readable:


    `// Uses a multi-line string with embedded newlines`


    `var lucyPoem = "\`


    `STRANGE fits of passion have I known:\n\`


    `And I will dare to tell,\n\`


    `But in the lover''s ear alone,\n\`


    `What once to me befell.\`


    `";`


    `print(lucyPoem);`


    `STRANGE fits of passion have I known:`


    `And I will dare to tell,`


    `But in the lover''s ear alone,`


    `What once to me befell.`


    A character in a string literal may appear literally or in the form of an escape
    sequence. You can use Unicode escape sequences to represent any character. Some
    of the characters such as line separator, carriage return, and so on cannot be
    represented literally and they must appear as escape sequences. Table [4-4](#A978-1-4842-0713-0_4_Chapter.html#Tab4)
    lists the escape sequences defined in Nashorn.


    Table 4-4.


    Single Character Escape Sequences in Nashorn


    | Character Escape Sequence | Unicode Escape Sequence | Character Name |

    | --- | --- | --- |

    | \b | \u0008 | backspace |

    | \t | \u0009 | horizontal tab |

    | \n | \u000A | line feed (new line) |

    | \v | \u000B | vertical tab |

    | \f | \u000C | form feed |

    | \r | \u000D | carriage return |

    | \” | \u0022 | double quote |

    | \’ | \u0027 | single quote |

    | \\ | \u005C | backslash |


    There is a significant difference in how Nashorn and Java interpret Unicode escape
    sequences. Unlike Java, Nashorn does not interpret Unicode escape sequences as
    the actual character before executing the code. The following single-line comment,
    character literal, and string literal in Java will not compile because the compiler
    converts the `\u000A` as a new line before compiling the program:


    `// This, \u000A, is a new line, making the single line comment invalid`


    `char c = ''\u000A'';`


    `String str = "Hello\u000Aworld!";`


    In Java, you must replace `\u000A` with `\n` in this code to work. The following
    snippet of code in Nashorn works fine:


    `// This, \u000A, is a new line that is valid in Nashorn`


    `var str = "Hello\u000AWorld!";`


    `print(str);`


    `Hello`


    `World!`


    I will defer the discussion of the Object type until I finish explaining the basic
    constructs in Nashorn such as operators, statements, loops, and so on.


    ## Operators


    Nashorn supports many operators. Most of them are the same as Java operators.
    I will list all operators in this section and discuss a few of them here. I will
    discuss others in subsequent sections when appropriate. Table [4-5](#A978-1-4842-0713-0_4_Chapter.html#Tab5)
    lists operators in Nashorn.


