    ### Using Properties of Script Objects


    The `ScriptObjectMirror` class implements `JSObject` and `Bindings` interfaces.
    You can use methods of both interfaces to access properties. You can use the `getMember()`
    and `getSlot()` methods of `JSObject` to read the named and indexed properties
    of the script object. You can use the `get()` method of `Bindings` to get the
    value of a property. You can use the `setMember()` and `setSlot()` methods of
    `JSObject` to add and update a property. The `put()` method of `Bindings` lets
    you do the same.


    You can use the `hasMember()` and `hasSlot()` methods of `JSObject` to check whether
    a named property and an indexed property exist. At the same time, you can use
    the `containsKey()` method of the `Bindings` interface to check whether a property
    exists. You can think of the `JSObject` and `Bindings` interfaces implemented
    by the `ScriptObjectMirror` class providing two views of the same script object—the
    former as a simple object and the latter as a map.


