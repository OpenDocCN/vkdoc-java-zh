- fmt: "# Passing Arguments to `jjs`\n\nThe following is an example of passing arguments\
    \ to the `jjs` tool. The first five natural numbers are passed to the `jjs` tool\
    \ as arguments and they are accessed using the `arguments` property later. Notice\
    \ that you must add a space between the two hyphens and the first argument:\n\n\
    ```\nc:\\>jjs -- 1 2 3 4 5\n```\n\n```\njjs> for each (x in arguments) print(x)\n\
    ```\n\n```\n1\n2\n3\n4\n5\n```\n\n```\njjs> quit()\n```\n\n```\nc:\\>\n```\n\n\
    Consider the script in Listing 10-1. The script has been saved in a file named\
    \ `stream.js`. The script works on a list of integers. The list can be passed\
    \ to the script as the command-line arguments. If the list is not passed as arguments,\
    \ it uses the first five natural numbers as the list. It computes the sum of the\
    \ squares of odd integers in the list. It prints the list and the sum.\n\n**Listing\
    \ 10-1.** A Script to Compute the Sum of the Squares of Odd Integers in a List\n\
    \n```\n// stream.js\nvar list;\nif (arguments.length == 0) {\n    list = [1, 2,\
    \ 3, 4, 5];\n}\nelse {\n    list = arguments;\n}\nprint(\"List of numbers: \"\
    \ + list);\nvar sumOfSquaredOdds = list.filter(function(n) {return n % 2 == 1;})\n\
    \    .map(function(n) {return n * n;})\n    .reduce(function(sum, n) {return sum\
    \ + n;}, 0);\nprint(\"Sum of the squares of odd numbers: \" + sumOfSquaredOdds);\n\
    ```\n\nUsing the `jjs` tool, you can run the script in the `stream.js` file as\
    \ follows. It is assumed that the `stream.js` file is in the current directory.\
    \ Otherwise, you need to specify the full path of the file:\n\n```\nc:\\>jjs stream.js\n\
    List of numbers: 1,2,3,4,5\nSum of the squares of odd numbers: 35\n```\n\n```\n\
    c:\\>jjs stream.js -- 10 11 12 13 14 15\nList of numbers: 10,11,12,13,14,15\n\
    Sum of the squares of odd numbers: 515\n```\n\n```\nc:\\>\n```\n\n# Using `jjs`\
    \ in Scripting Mode\n\nThe `jjs` tool can be invoked in scripting mode, which\
    \ allows you to run shell commands. You can start the `jjs` tool in scripting\
    \ mode using the `–scripting` option. The shell commands are enclosed in back\
    \ quotes, not single/double quotes. The following are examples of using the `date`\
    \ and `ls` shell commands using the `jjs` tool in scripting mode:\n\n```\nc:\\\
    >jjs -scripting\n```\n\n```\njjs> `date`\nWed Oct 15 15:27:07 CDT 2014\n```\n\n\
    ```\njjs> `ls -l`\ntotal 3102\ndrwxr-xr-x  4 ksharan Administrators       0 Jan\
    \ 11  2014 $AVG\ndrwxr-xr-x  5 ksharan Administrators       0 Jan 22  2014 $Recycle.Bin\n\
    -rw-r--r--  1 ksharan Administrators       1 Jun 18  2013 BOOTNXT\n-rw-r--r--\
    \  1 ksharan Administrators      94 May 23  2013 DBAR_Ver.txt\nMore output goes\
    \ here...\n```\n\n```\njjs> exit()\nc:\\>\n```\n\nNashorn defines several global\
    \ objects and functions in scripting mode, as listed in Table 10-2.\n\n**Table\
    \ 10-2.** Global Objects and Functions Available in Scripting Mode\n\n| Global\
    \ Object | Description |\n| --- | --- |\n| `$ARG` | Stores the arguments passed\
    \ to the script. Works the same way as `arguments`. |\n| `$ENV` | Maps all environment\
    \ variables to an object. |\n| `$EXEC(cmd, input)` | A global function used to\
    \ run a command in a new process passing `input` to `cmd`. Both arguments can\
    \ be commands, and in that case, the output of `input` will be passed as input\
    \ to `cmd`. |\n| `$OUT` | Stores the latest standard output of the process. For\
    \ example, the result of executing the `$EXEC()` is saved in `$OUT`. |\n| `$ERR`\
    \ | Stores the latest standard output of the process. |\n| `$EXIT` | Stores the\
    \ exit code of the process. A nonzero value indicates that the process failed.\
    \ |\n| `echo(arg1, arg2,...)` | The `echo()` function works the same as the `print()`\
