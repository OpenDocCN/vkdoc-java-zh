    ## 严格模式与非严格模式


    Nashorn 可以在两种模式下运行：严格模式和非严格模式。ECMAScript 的某些特性不能在严格模式下使用。通常，容易出错的特性在严格模式下是不允许的。一些在非严格模式下可以工作的特性，在严格模式下会产生错误。在解释具体特性时，我会列出适用于严格模式的特性。你可以通过两种方式在脚本中启用严格模式：


    *   使用 `jjs` 命令的 `–strict` 选项

    *   使用 `"use strict"` 或 `''use strict''` 指令


    以下命令在严格模式下调用 `jjs` 命令行工具，并尝试将值 10 赋给一个名为 `empId` 的变量，但未声明该变量。你会收到一个错误，提示变量 `empId`
    未定义：


    `C:\> jjs -strict`


    `jjs> empId = 10;`


    `<shell>:1 ReferenceError: "empId" is not defined`


    `jjs> exit()`


    解决方案是在严格模式下使用关键字 `var`（稍后讨论）来声明 `empId` 变量。


    以下命令在非严格模式下（不带 `–strict` 选项）调用 `jjs` 命令行工具，并尝试将值 10 赋给一个名为 `empId` 的变量，但未声明该变量。这次，你不会收到错误；相反，会打印出该变量的值（即
    `10`）：


    `C:\> jjs`


    `jjs> empId = 10;`


    `10`


    `jjs>exit()`


    清单 4-1 展示了一个使用 `use strict` 指令的脚本。该指令在脚本或函数的开头指定。`use strict` 指令就是字符串 `"use strict"`。你也可以用单引号将指令括起来，像
    `''use strict''` 这样。该脚本将一个值赋给一个未声明的变量，由于启用了严格模式，这会产生一个错误。


