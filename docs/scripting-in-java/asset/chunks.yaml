    在这段代码中，你可以使用 `defineProperties()` 函数一次性定义 `x` 和 `y` 属性。`defineProperty()` 和 `defineProperties()`
    这两个函数都会返回正在设置属性的对象，以便你可以链式调用它们。以下代码重写了前面的示例：


    `// 创建一个空对象`


    `var origin2D = {};`


    `// 向 origin2D 添加两个不可写的 x 和 y 属性`


    `// 并将其值设置为 0`


    `Object.defineProperties(origin2D, {x: {value:0, writable: false},`


    `y: {value:0, writable: false}});`


    提示


    当你通过对象字面量或为属性赋值的方式向对象添加属性时，`writable`、`enumerable` 和 `configurable` 属性的默认值会被设置为
    `true`。当你使用属性描述符来定义属性或修改属性特性时，这些特性在属性描述符中的默认值为 `false`。使用属性描述符时，请确保为所有需要设置为 `true`
    的特性指定值。


    一旦将属性的 `writable` 特性设置为 `false`，更改其值将不会生效。在严格模式下，更改不可写属性的值会生成错误：


    `var point = {x:0, y:10};`


    `printf("x = %d", point.x);`


    `// 将 x 设置为不可写`


    `Object.defineProperty(point, "x", {writable: false});`


    `// 尝试更改 x 的值`


    `point.x = 100; // 无效，因为 x 不可写`


    `printf("x = %d", point.x);`


    `x = 0`


    `x = 0`


    在 Nashorn 中定义常量并不直接。你需要使用 `Object.defineProperty()` 函数来定义常量。以下代码在全局作用域中定义了一个名为
    `MAX_SIZE` 的常量。在以下代码中，关键字 `this` 指向全局对象：


    `// 定义一个名为 MAX_SIZE 的常量，值为 100`


    `Object.defineProperty(this, "MAX_SIZE", {value:100, writable:false, configurable:false});`


    `printf("MAX_SIZE = %d", MAX_SIZE);`


    `MAX_SIZE = 100`


    你可以使用 `for..in` 和 `for..each..in` 迭代语句来遍历对象的 `enumerable` 属性。以下代码创建了一个包含两个默认可枚举属性的对象，使用
    `for..in` 和 `for..each..in` 语句遍历这些属性，将其中一个属性改为不可枚举，然后再次遍历这些属性：


    `// 创建一个包含 x 和 y 两个属性的对象`


    `var point = {x:10, y:20};`


    `// 使用 for..in 会报告 x 和 y 为属性`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `// 将 x 设置为不可枚举`


    `Object.defineProperty(point, "x", {enumerable: false});`


    `print("将 x 设置为不可枚举后");`


    `// 使用 for..in 只会报告 y 为属性`


    `// 因为 x 现在不可枚举`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `point[x] = 10`


    `point[y] = 20`


    `将 x 设置为不可枚举后`


    `point[y] = 20`


    #### 删除对象的属性


    你可以使用 `delete` 运算符删除对象的 `configurable` 属性。其语法为：


    `delete property;`


    以下代码片段创建了一个包含 `x` 和 `y` 两个属性的对象，遍历这些属性，删除名为 `x` 的属性，然后再次遍历这些属性。第二次遍历时，属性 `x` 及其值不会被打印，因为它已被删除：


    `// 创建一个包含 x 和 y 两个属性的对象`


    `var point = {x:10, y:20};`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `// 从 point 对象中删除属性 x`


    `delete point.x;`


    `print("删除 x 后");`


    `for(var prop in point) {`


    `printf("point[%s] = %d", prop, point[prop]);`


    `}`


    `point[x] = 10`


    `point[y] = 20`


    `删除 x 后`


    `point[y] = 20`


    在严格模式下，删除 `configurable` 特性设置为 `false` 的属性会报错。在非严格模式下，删除不可配置的属性无效。

