- fmt: "### The `switch` Statement\n\nThe `switch` statement in Nashorn works pretty\
    \ much the same as the `switch` statement in Java works. Its syntax is:\n\n```\n\
    switch(expression) {\ncase expression-1:\n    statement-1;\ncase expression-2:\n\
    \    statement-2;\ndefault:\n    statement-3;\n}\n```\n\nThe `expression` is matched\
    \ against the expressions in `case` clauses using the `===` operator. The statements\
    \ in the first matched `case` clause are executed. If the `case` clause contains\
    \ a `break` statement, the control is transferred to the end of the `switch` statement;\
    \ otherwise, the statements following the matched `case` clause are executed.\
    \ If no match is found, the statements in the `default` clause are executed. If\
    \ there are multiple matches, only the statements in the first matched `case`\
    \ clause are executed. In Java, the `expression` must be of type `int`, `String`,\
    \ or `enum`, whereas in Nashorn the `expression` can be of any type including\
    \ the Object, Null, and Undefined types. The following snippet of code demonstrates\
    \ how to use a `switch` statement:\n\n```\n// Define a match function that matches\
    \ the passed in argument\n// using a switch statement\nfunction match(value) {\n\
    \    switch (value) {\n    case undefined:\n        print(\"Matched undefined:\"\
    , value);\n        break;\n    case null:\n        print(\"Matched null:\", value);\n\
    \        break;\n    case '2':\n        print(\"Matched string '2':\", value);\n\
    \        break;\n    case 2:\n        print(\"Matched number 2: \", value);\n\
    \        break;\n    default:\n        print(\"No match:\", value);\n        break;\n\
    \    }\n}\n\n// Call the match function with different arguments\nmatch(undefined);\n\
    match(null);\nmatch(2);\nmatch('2');\nmatch(\"Hello\");\n\nMatched undefined:\
    \ undefined\nMatched null: null\nMatched number 2: 2\nMatched string '2': 2\n\
    No match: Hello\n```\n\n### Labelled Statements\n\nA label is simply an identifier\
    \ followed with a colon. Any statement in Nashorn can be labelled by putting a\
    \ label before the statement. In fact, Nashorn lets you have multiple labels for\
    \ a statement. Once you have labelled a statement, you can use the same label\
    \ with `break` and `continue` statements to break and continue to the label. Typically,\
    \ you label outer iteration statements so that you can continue or break out of\
    \ nested loops. Labelled statements work the same way as they do in Java. The\
    \ following is an example of using a labeled statement and a `continue` statement\
    \ with a label to print the lower-left half of a 3x3 matrix:\n\n```\n// Create\
    \ a 3x3 matrix using an array of arrays\nvar matrix = [[11, 12, 13],\n       \
    \       [21, 22, 23],\n              [31, 32, 33]];\n\nouterLoop:\nfor(var i =\
    \ 0; i < matrix.length; i++) {\n    for(var j = 0; j < matrix[i].length; j++)\
    \ {\n        java.lang.System.out.printf(\"%d \", matrix[i][j]);\n        if (i\
    \ === j) {\n            print();\n            continue outerLoop;\n        }\n\
    \    }\n}\n\n11\n21 22\n31 32 33\n```\n\n### The `throw` Statement\n\nA `throw`\
    \ statement is used to throw a user-defined exception. It works similar to the\
    \ `throw` statement in Java. Its syntax is:\n\n```\nthrow expression;\n```\n\n\
    In Java, a `throw` statement throws an object of the `Throwable` class or one\
    \ of its subclasses; the `expression` must evaluate to a `Throwable` instance.\
    \ In Nashorn, a `throw` statement can throw a value of any type that may include\
    \ a number or a string. Nashorn has few built-in objects that can be used as error\
    \ objects to be thrown in the `throw` statement. Such objects are `Error`, `TypeError`,\
    \ `RangeError`, `SyntaxError`, etc. The following snippet of code shows how to\
    \ throw a `RangeError` when `empId` is not between 1 and 10000:\n\n```\nvar empId\
    \ = -900;\nif (empId <= 0 || empId >= 10000) {\n    throw new RangeError(\n  \
    \      \"empId must be between 1 and 10000. Found: \" + empId);\n}\n```\n\nWhen\
    \ you run the code, it will print the stack trace of the error on the standard\
    \ error. Like Java, Nashorn lets you handle the errors that are thrown. You will\
    \ need to use a `try-catch-finally` statement to handle the thrown errors, which\
    \ I will discuss in the next section.\n\n### The `try` Statement\n\nThe `try-catch-finally`\
    \ statement in Nashorn works the same way as it works in Java. The `try` block\
    \ contains one or more statements to execute that may throw errors. If the statements\
    \ throw an error, the control is transferred to the `catch` block. Finally, the\
    \ statements in the `finally` block are executed. Like in Java, you can have three\
    \ combination of `try`, `catch`, and `finally` blocks: `try-catch`, `try-finally`,\
    \ and `try-catch-finally`. Unlike Java, ECMAScript supports only one `catch` block\
    \ per `try` block. Nashorn supports Mozilla JavaScript 1.4 extension that allows\
    \ multiple `catch` block per `try` block. The syntax for using the `try` block\
    \ is:\n\n```\n/* A try-catch block */\ntry {\n    // Statements that may throw\
    \ errors\n}\ncatch(identifier) {\n    // Handle the error here\n}\n\n/* A try-finally\
    \ block */\ntry {\n    // Statements that may throw errors\n}\nfinally {\n   \
    \ // Perform cleanup work here\n}\n\n/* A try-catch-finally block */\ntry {\n\
    \    // Statements that may throw errors\n}\ncatch(identifier) {\n    // Handle\
    \ the error here\n}\nfinally {\n    // Perform cleanup work here\n}\n```\n\n>\
    \ **Tip**  \n> In strict mode, it is a `SyntaxError` to use `eval` or `arguments`\
    \ as the identifier in a `catch` block.\n\nThe following is a `try` block with\
    \ multiple `catch` blocks supported as a Nashorn extension where `e` is an identifier.\
    \ You can use any other identifier in place of `e`:\n\n```\n/* A try block with\
    \ multiple catch blocks */\ntry {\n    // Statements that may throw errors\n}\n\
    catch (e if e instanceof RangeError) {\n    // Handle RangeError here\n}\ncatch\
    \ (e if e instanceof TypeError) {\n    // Handle TypeError here\n}\ncatch (e)\
    \ {\n    // Handle other errors here\n}\n```\n\nConsider the code in Listing 4-2.\
    \ It defines two functions: `isInteger()` and `factorial()`. The `isInteger()`\
    \ function returns `true` if its argument is an integer; otherwise, it returns\
    \ `false`. The `factorial()` function computes and returns the factorial of a\
    \ natural number. It throws a `TypeError` if its argument is not a number and\
    \ a `RangeError` if its argument is not a number greater than or equal to 1.\n\
    \n**Listing 4-2.** The Contents of the `factorial.js` file\n\n```\n// factorial.js\n\
    // Returns true if n is an integer. Otherwise, returns false.\nfunction isInteger(n)\
    \ {\n    return typeof n === \"number\" && isFinite(n) && n%1 === 0;\n}\n\n//\
    \ Define a function that computes and returns the factorial of an integer\nfunction\
    \ factorial(n) {\n    if (!isInteger(n)) {\n        throw new TypeError(\n   \
    \         \"The number must be an integer. Found:\" + n);\n    }\n    if(n < 0)\
    \ {\n        throw new RangeError(\n            \"The number must be greater than\
    \ 0. Found: \" + n);\n    }\n    var fact = 1;\n    for(var counter = n; counter\
    \ > 1; fact *= counter--);\n    return fact;\n}\n```\n\nThe program in Listing\
    \ 4-3 uses the `factorial()` function to compute factorial for a number and a\
    \ String. The `load()` function is used to load the program from the `factorial.js`\
    \ file. The `message` property of the `Error` object (or its subtype) contains\
    \ the error message. The program uses the `message` property to display the error\
    \ message. The `factorial()` function throws a `TypeError` when \"Hello\" is passed\
    \ to it as an argument. The program handles the error and displays the error message.\n\
    \n**Listing 4-3.** The Contents of the File `factorial_test.js`\n\n```\n// factorial_test.js\n\
    // Load the factorial.js file that contains the factorial() function\nload(\"\
    factorial.js\");\n\ntry {\n    var fact3 = factorial(3);\n    print(\"Factorial\
    \ of 3 is\", fact3);\n    var factHello = factorial(\"Hello\");\n    print(\"\
    Factorial of 3 is\", factHello);\n}\ncatch (e if e instanceof RangeError) {\n\
    \    print(\"A RangeError has occurred.\", e.message);\n    print(\"Error:\",\
    \ e.message);\n}\ncatch (e if e instanceof TypeError) {\n    print(\"A TypeError\
    \ has occurred.\", e.message);\n}\ncatch (e) {\n    print(e.message);\n}\n\nFactorial\
    \ of 3 is 6\nA TypeError has occurred. The number must be an integer. Found:Hello\n\
    ```"
