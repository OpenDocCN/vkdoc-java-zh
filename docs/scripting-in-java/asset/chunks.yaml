    `var addResult = calc.add(x, y); // 将调用 calcDelegate.invoke("add", [x, y])`


    `var subResult = calc.subtract(x, y);`


    `var mulResult = calc.multiply(x, y);`


    `var divResult = calc.divide(x, y);`


    `printf("calc.add(%.2f, %.2f) = %.2f%n", x, y, addResult);`


    `printf("calc.sub(%.2f, %.2f) = %.2f%n", x, y, subResult);`


    `printf("calc.mul(%.2f, %.2f) = %.2f%n", x, y, mulResult);`


    `printf("calc.div(%.2f, %.2f) = %.2f", x, y, divResult);`


    该代码创建了一个名为 `calcDelegate` 的对象，其中包含一个 `invoke()` 方法。`JSInvoker` 对象包装了 `calcDelegate`
    对象。当在 `calc` 对象上调用一个函数时，`calcDelegate` 对象的 `invoke()` 方法会被调用，函数名作为其第一个参数，函数参数作为数组作为其第二个参数。`invoke()`
    函数对参数执行加法、减法、乘法和除法运算。以下命令展示了如何执行该代码：


    `c:\>jrunscript -f jsinvokertest.js`


    `calc.add(20.44, 30.56) = 51.00`


    `calc.sub(20.44, 30.56) = -10.12`


    `calc.mul(20.44, 30.56) = 624.65`


    `calc.div(20.44, 30.56) = 0.67`


    `JSInvoker` 对象在 Java 7 中可以正常工作，但在 Java 8 中运行此示例时会产生以下错误。这似乎是 Java 8 中引入的一个错误：


    `c:\>jrunscript -f jsinvokertest.js`


    `script error in file jsinvoker.js : TypeError: [object JSAdapter] has no such
    function "add" in jsinvoker.js at line number 25`


    `jrunscript` shell 还为几个 Java 类创建了别名，例如 `java.io.File`、`java.io.Reader`、`java.net.URL`
    等，因此您可以通过它们的简单名称来引用它们。`jrunscript` 还将其他几个对象暴露为全局对象。您可以使用以下命令在命令行上打印全局对象及其类型的完整列表。这里仅显示了部分输出。请注意，输出还将包含一个名为
    `p` 的属性，这是在 `for` 循环中声明的变量名。


    `c:\>jrunscript`


    `nashorn> for(var p in this) print(p, typeof this[p]);`


    `engine object`


    `JSInvoker function`


    `jmap function`


    `jlist function`


    `inStream function`


    `outStream function`


    `streamClose function`


    `javaByteArray function`


    `pwd function`


    `...`


    `nashorn>exit()`


    `c:\`

    '
- fmt: '# Summary


    The JDK includes a script-engine-independent command-line shell called `jrunscript`.
    It can be used to evaluate scripts entered on the command-line or from files.
    You can find this shell in the `JAVA_HOME\bin` directory, where `JAVA_HOME` is
    the directory in which you have installed the JDK.


    The `jrunscript` command-line shell can run scripts written in any scripting language
    supported by Java. By default, it runs Nashorn scripts. To use a scripting language
    other than Nashorn, you need to include the language''s JAR file with `jrunscript`
    using the `–cp` or `–classpath` option. The `–l` option lets you choose the scripting
    language you want to use.


    You can use `jrunscript` in one-liner mode, batch mode, and interactive mode.
    The one-liner mode lets you execute one line of script. You invoke the one-liner
    mode using the `–e` option. The batch mode lets you execute scripts stored in
    a file. You invoke the batch mode using the `–f` option. The interactive mode
    lets you execute scripts entered on the command-line interactively. You invoke
    interactive mode by not using the `–e` and `–f` options, or by using the `–f –`
    option (note a following `–` after `–f`).


    You can list all of the available script engines with `jrunscript` using the `–q`
    option. Notice that you must include the script engine''s JAR files for languages
    other than Nashorn to make them available with `jrunscript`. Several useful global
    functions and objects are made available by the `jrunscript` shell. For example,
    the `cat()` function can be used to print the contents of a file or URL, optionally
    applying a filter.


    # 10. The `jjs` Command-Line Tool


    In this chapter, you will learn:


    * What the `jjs` command-line tool is

    * How to invoke the `jjs` command-line tool

    * How to pass arguments to the `jjs` command-line tool

    * How to use the `jjs` command-line tool in interactive and scripting mode


    To work with the Nashorn script engine, JDK 8 includes a new command-line tool
    called `jjs`. If you wonder what `jjs` stands for, it stands for Java JavaScript.
    The command is located in the `JDK_HOME\bin` directory. The command can be used
    to run scripts in files or scripts entered on the command-line in interactive
    mode. It can also be used to execute shell scripts.


    ## The Syntax


    The syntax to invoke the command is:


    `jjs [options] [script-files] [-- arguments]`


    Here:


    * `[options]` are options for the `jjs` command. Multiple options are separated
    by a space

    * `[script-files]` is the list of script files to be interpreted by the Nashorn
    engine

    * `[-- arguments]` is the list of arguments to be passed to the scripts or the
    interactive shell as arguments. Arguments are specified after double hyphens and
    they can be accessed using the `arguments` property inside the script


    ## The Options


    The `jjs` tool supports several options. Table 10-1 lists all the options for
    the `jjs` tool. Some of the options have a variant that work the same way; for
    example, the options `-classpath` and `-cp` are synonymous. Both are used to set
    CLASSPATH. Notice that some of the options start with two hyphens. To print the
    list of all options, run the tool on the command prompt with the `–xhelp` option:


    `jjs –xhelp`


    **Table 10-1.** Options for the `jjs` Command-Line Tool'
