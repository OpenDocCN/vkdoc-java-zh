  raw: '# 8. Implementing a Script Engine


    In this chapter, you will learn:


    *   The components of a script engine that need to be developed when implementing
    a new script engine

    *   How to implement the different components of a simple script engine that will
    perform addition, subtraction, multiplication, and division on two numbers

    *   How to package the code of the script engine

    *   How to deploy and test the script engine


    ## Introduction


    Implementing a full-blown script engine is no simple task and it is outside the
    scope of this book. This chapter is meant to give you a brief, but complete, overview
    of the setup needed to implement a script engine. In this section, you will implement
    a simple script engine called the `JKScript` engine. It will evaluate arithmetic
    expressions with the following rules:


    *   It will evaluate an arithmetic expression that consists of two operands and
    one operator

    *   The expression may have two number literals, two variables, or one number
    literal and one variable as operands. The number literals must be in decimal format.
    Hexadecimal, octal, and binary number literals are not supported

    *   The arithmetic operations in an expression are limited to add, subtract, multiply,
    and divide

    *   It will recognize `+`, `-`, `*`, and `/` as arithmetic operators

    *   The engine will return a `Double` object as the result of the expression

    *   Operands in an expression may be passed to the engine using global scope or
    engine scope bindings of the engine

    *   It should allow executing scripts from a `String` object and a `java.io.Reader`
    object. However, a `Reader` should have only one expression as its contents

    *   It will not implement the `Invocable` and `Compilable` interfaces


    Using these rules, some valid expressions for your script engine are as follows:


    *   `10 + 90`

    *   `10.7 + 89.0`

    *   `+10 + +90`

    *   `num1 + num2`

    *   `num1 * num2`

    *   `78.0 / 7.5`


    You need to provide implementation for the following two interfaces when you implement
    a script engine:


    *   `javax.script.ScriptEngineFactory`

    *   `javax.script.ScriptEngine`


    As part of your implementation for the `JKScript` script engine, you will develop
    three classes as listed in Table [8-1](#A978-1-4842-0713-0_8_Chapter.html#Tab1).
    In subsequent sections, you will develop these classes.


    Table 8-1.


    The List of Classes to be Developed for the JKScript Script Engine


    | Class | Description |

    | --- | --- |

    | `Expression` | The `Expression` class is the heart of your script engine. It
    performs the work of parsing and evaluating an arithmetic expression. It is used
    inside the `eval()` methods of the `JKScriptEngine` class. |

    | `JKScriptEngine` | An implementation of the `ScriptEngine` interface. It extends
    the `AbstractScriptEngine` class that implements the `ScriptEngine` interface.
    The `AbstractScriptEngine` class provides a standard implementation for several
    versions of the `eval()` methods of the `ScriptEngine` interface. You need to
    implement the following two versions of the `eval()` method: `Object eval(String,
    ScriptContext)` `Object eval(Reader, ScriptContext)` |

    | `JKScriptEngineFactory` | An implementation of the `ScriptEngineFactory` interface.
    |


    ## The Expression Class


    The `Expression` class contains the main logic for parsing and evaluating an arithmetic
    expression. Listing 8-1 contains the complete code for the `Expression` class.


    Listing 8-1\. The Expression Class That Parses and Evaluates an Arithmetic Expression


    `// Expression.java`


    `package com.jdojo.script;`


