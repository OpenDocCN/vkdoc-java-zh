- fmt: "# Instantiating the Nashorn Engine\n\nIn previous chapters, you have been\
    \ instantiating the Nashorn engine in Java code using the standard Java Scripting\
    \ API. The Nashorn engine provides several custom features. To take advantage\
    \ of those features, you will need to instantiate the Nashorn engine directly.\
    \ First, you will need to create an object of the `NashornScriptEngineFactory`\
    \ class, and then call one of the overloaded versions of the `getScriptEngine()`\
    \ method to create a Nashorn engine:\n\n```\n// Create a Nashorn engine factory\n\
    NashornScriptEngineFactory factory = new NashornScriptEngineFactory();\n\n// Create\
    \ a Nashorn engine with default options\nScriptEngine engine = factory.getScriptEngine();\n\
    ```\n\nBy default, the Nashorn engine factory creates a Nashorn engine with the\
    \ `--dump-on-error` option enabled. I will show you how to set other options for\
    \ the Nashorn engine in the next example.\n\nThe following snippet of code creates\
    \ a Nashorn engine with the `--no-java` and `--strict` options:\n\n```\n// Create\
    \ a Nashorn engine factory\nNashornScriptEngineFactory factory = new NashornScriptEngineFactory();\n\
    \n// Store the Nashorn options in a String array\nString[] options = {\"--no-java\"\
    , \"-strict\"};\n\n// Create the Nashorn engine with the options\nScriptEngine\
    \ engine = factory.getScriptEngine(options);\n```\n\nBecause of the `--no-java`\
    \ option, you cannot use any Java classes inside the scripts executed by this\
    \ engine. The `--strict` option will force the engine to execute all scripts in\
    \ strict mode.\n\nYou can also pass options to the Nashorn engine using the `nashorn.args`\
    \ system property on the command-line. The following command runs the `com.jdojo.script.Test`\
    \ class, passing four options to the Nashorn engine:\n\n```\njava -Dnashorn.args=\"\
    --global-per-engine -strict --no-java --language=es5\" com.jdojo.script.Test\n\
    ```\n\nNotice that options are separated by a space and they all are passed as\
    \ one string. If you have only one option to pass, you can omit the double quotes\
    \ around the option’s value. The following command passes only one option, `--no-java`,\
    \ to the engine:\n\n```\njava -Dnashorn.args=--no-java com.jdojo.script.Test\n\
    ```\n\nThe following snippet of code creates a Nashorn engine using a class filter,\
    \ which is an instance of the `ClassFilter` interface, to restrict the usage of\
    \ any classes from the `com.jdojo` package and its subpackages. Notice that the\
    \ `ClassFilter` interface was added in JDK8u40; it is not available in JDK8:\n\
    \n```\nNashornScriptEngineFactory factory = new NashornScriptEngineFactory();\n\
    ScriptEngine engine = factory.getScriptEngine(clsName -> clsName.startsWith(\"\
    com.jdojo\"));\n```\n\n`ClassFilter` is a functional interface. Its method is\
    \ passed the fully qualified name of the Java class that the Nashorn script is\
    \ trying to use. If the method returns `true`, the class can be used in the script;\
    \ otherwise, the class cannot be used in the script.\n\n**Tip:** If you do not\
    \ want any Java classes to be exposed in scripts, you can use `clsName -> false`\
    \ as the lambda expression for the `ClassFilter`. Using a Java class in the script\
    \ that is restricted by the `ClassFilter` throws a `java.lang.ClassNotFound` exception.\n\
    \nThe following is a list of the overloaded versions of the `getScriptEngine()`\
    \ method of the `NashornScriptEngineFactory` class:\n\n- `ScriptEngine getScriptEngine()`\n\
    - `ScriptEngine getScriptEngine(String... args)`\n- `ScriptEngine getScriptEngine(ClassFilter\
    \ classFilter)`\n- `ScriptEngine getScriptEngine(ClassLoader appLoader)`\n- `ScriptEngine\
    \ getScriptEngine(String[] args, ClassLoader appLoader)`\n- `ScriptEngine getScriptEngine(String[]\
    \ args, ClassLoader appLoader, ClassFilter classFilter)`\n\n# Sharing the Engine\
    \ Globals\n\nBy default, the Nashorn engine maintains the global objects per script\
    \ context. In this discussion, the term “globals” means the global variables and\
    \ declarations stored in the global scope of the Nashorn script, which you refer\
    \ to by `this` in the top-level scripts. Do not mix up the global scope bindings\
    \ in the script context with the globals in the script. The script globals are\
    \ searched first when you reference any variables or create variables in your\
    \ script. If you reference a variable in a script that is not found in the script\
    \ globals, the engine will search for it in the global scope `bindings` of the\
    \ script context. For example, the script objects `Object`, `Math`, `String`,\
    \ and so on are part of the script globals. Consider the program and its output\
    \ in Listing 12-1.\n\n**Listing 12-1.** Using Multiple Script Globals Per Nashorn\
    \ Engine\n\n```\n// MultiGlobals.java\npackage com.jdojo.script;\n\nimport javax.script.ScriptContext;\n\
    import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.SimpleScriptContext;\n\npublic class MultiGlobals {\n    public\
    \ static void main(String[] args) {\n        // Get the Nashorn script engine\n\
    \        ScriptEngineManager manager = new ScriptEngineManager();\n        ScriptEngine\
    \ engine = manager.getEngineByName(\"JavaScript\");\n\n        try {\n       \
    \     // Add a variable named msg to the script globals\n            engine.eval(\"\
    var msg = 'Hello globals'\");\n\n            // Print the value of the msg variable\n\
    \            engine.eval(\"print(this.msg);\");\n\n            // Execute the\
    \ same script as above, but using a new\n            // ScriptContext object.\
    \ The engine will use a fresh\n            // copy of the globals and will not\
    \ find this.msg that\n            // was created and associated with the default\
    \ script\n            // context of the engine previously.\n            ScriptContext\
    \ ctx = new SimpleScriptContext();\n            engine.eval(\"print(this.msg);\"\
    , ctx);\n        }\n        catch (Exception e) {\n            e.printStackTrace();\n\
    \        }\n    }\n}\n```\n\n```\nHello globals\nundefined\n```\n\nThe program\
    \ performs the following steps:\n\n- Creates a Nashorn engine with default options.\n\
    - Executes a script using the `eval()` method that uses the default script context\
    \ of the engine. The script creates a global variable named `msg` that is stored\
