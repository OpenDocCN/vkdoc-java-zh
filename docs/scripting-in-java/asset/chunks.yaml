    - `getFloat32(byteOffset, littleEndian)`\n- `getFloat64(byteOffset, littleEndian)`\n\
    - `setInt8(byteOffset, value)`\n- `setUint8(byteOffset, value)`\n- `setInt16(byteOffset,\
    \ value, littleEndian)`\n- `setUint16(byteOffset, value, littleEndian)`\n- `setInt32(byteOffset,\
    \ value, littleEndian)`\n- `setUint32(byteOffset, value, littleEndian)`\n- `setFloat32(byteOffset,\
    \ value, littleEndian)`\n- `setFloat64(byteOffset, value, littleEndian)`\n\n多字节值类型的\
    \ getter 和 setter 有一个名为`littleEndian`的可选布尔型最后一个参数。它指定正在读取和设置的值是小端还是大端格式。如果未指定，则假定该值为大端格式。当您读取的数据来自不同字节序的不同源时，这很有用。以下代码使用`DataView`从`ArrayBuffer`写入和读取一个32位有符号整数和一个32位浮点数：\n\
    \n```javascript\n// Create an ArrayBuffer of 8 bytes\nvar buffer = new ArrayBuffer(8);\n\
    \n// Create a DataView from the ArrayBuffer\nvar data = new DataView(buffer);\n\
    \n// Use the first 4 bytes to store a 32-bit signed integer\ndata.setInt32(0,\
