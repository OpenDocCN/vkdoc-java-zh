    text/jkscript\"));\n    }\n\n    @Override\n    public List<String> getNames()\
    \ {\n        List<String> names = new ArrayList<>();\n        names.add(\"jks\"\
    );\n        names.add(\"JKScript\");\n        names.add(\"jkscript\");\n     \
    \   return Collections.unmodifiableList(names);\n    }\n\n    @Override\n    public\
