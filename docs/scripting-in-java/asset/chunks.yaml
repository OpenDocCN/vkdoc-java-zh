- fmt: "## Structure of JavaFX Applications in Scripts\n\nIn a JavaFX application,\
    \ you override the following three methods of the `Application` class to manage\
    \ the lifecycle of the application:\n\n- The `init()` method\n- The `start()`\
    \ method\n- The `stop()` method\n\nIn a Nashorn script, you can manage the lifecycle\
