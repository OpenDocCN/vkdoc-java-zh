- fmt: "# Invoking Procedures in Scripts\n\nIn previous chapters, you have seen how\
    \ to invoke scripts using the `eval()` method of the `ScriptEngine`. It is also\
    \ possible to invoke procedures written in a scripting language directly from\
    \ the Java program, provided the `ScriptEngine` supports procedure invocation.\n\
    \nA scripting language may allow creating procedures, functions, and methods.\
    \ The Java Scripting API lets you invoke such procedures, functions, and methods\
    \ from a Java application. I will use the term “procedure” to mean procedure,\
    \ function, and method in this section. I will use the specific term when the\
    \ context of the discussion requires it.\n\nNot all script engines are required\
    \ to support procedure invocation. The Nashorn JavaScript engine supports procedure\
    \ invocation. If a script engine supports it, the implementation of the script\
    \ engine class must implement the `Invocable` interface. The `Invocable` interface\
    \ contains the following four methods:\n\n- `<T> T getInterface(Class<T> cls)`\n\
    - `<T> T getInterface(Object obj, Class<T> cls)`\n- `Object invokeFunction(String\
    \ name, Object... args) throws ScriptException, NoSuchMethodException`\n- `Object\
    \ invokeMethod(Object obj, String name, Object... args) throws ScriptException,\
    \ NoSuchMethodException`\n\nThe two versions of the `getInterface()` method let\
    \ you get an instance of a Java interface that is implemented in a scripting languages.\
    \ I will discuss these functions in details in the next section. The `invokeFunction()`\
    \ method lets you invoke a top-level function written in a scripting language.\
    \ The `invokeMethod()` method lets you invoke methods of objects written in a\
    \ scripting language.\n\nIt is the responsibility of the developer to check if\
    \ a script engine implements the `Invocable` interface, before invoking a procedure.\
    \ Invoking a procedure is a four-step process:\n\n- Check if the script engine\
    \ supports procedure invocation\n- Cast the engine reference to the `Invocable`\
    \ type\n- Evaluate the script that contains the source code for the procedure,\
    \ so the engine compiles and caches the script\n- Use the `invokeFunction()` method\
    \ of the `Invocable` interface to invoke procedures and functions; use the `invokeMethod()`\
    \ method to invoke methods of the objects created in a scripting language\n\n\
    The following snippet of code performs the check that the script engine implementation\
    \ class implements the `Invocable` interface:\n\n```\n// Get the Nashorn engine\n\
    ScriptEngineManager manager = new ScriptEngineManager();\nScriptEngine engine\
    \ = manager.getEngineByName(\"JavaScript\");\n\n// Make sure the script engine\
    \ implements the Invocable interface\nif (engine instanceof Invocable) {\n   \
    \ System.out.println(\"Invoking procedures is supported.\");\n}\nelse  {\n   \
    \ System.out.println(\"Invoking procedures is not supported.\");\n}\n```\n\nThe\
    \ second step is to cast the engine reference to the `Invocable` interface type:\n\
    \n```\nif (engine instanceof Invocable) {\n    Invocable inv = (Invocable)engine;\n\
    \    // More code goes here\n}\n```\n\nThe third step is to evaluate the script,\
