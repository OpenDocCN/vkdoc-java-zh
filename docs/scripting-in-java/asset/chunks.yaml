    \ `length` value. That is, setting `length` to a smaller value makes the array\
    \ shrink up to a nondeletable element. The following examples will make this rule\
    \ clear:\n\n```\nvar names = new Array(\"Fu\", \"Li\", \"Do\", \"Ho\");\nprint(\"\
