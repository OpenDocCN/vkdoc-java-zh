    Most of these utility functions have been written as Nashorn scripts taking advantage
    of the Java class libraries. The best way to learn about how these functions work
    is to read the source code. You can print the source of nonnative functions by
    simply entering the function name at the `nashorn` command prompt. The following
    sequence of commands shows you how to print the source code for the `exec(cmd)`
    function. The output shows that the function uses the Java `Runtime` class internally
    to run the command:


    ```

    c:\>jrunscript

    nashorn> exec

    function exec(cmd) {

    var process = java.lang.Runtime.getRuntime().exec(cmd);

    var inp = new DataInputStream(process.getInputStream());

    var line = null;

    while ((line = inp.readLine()) != null) {

    println(line);

    }

    process.waitFor();

    $exit = process.exitValue();

    }

    nashorn> exit()

    c:\>

    ```


    There are three other global functions provided by `jrunscript` that are worth
    mentioning. These functions can be used as functions and constructors:


    *   `jlist(javaList)`

    *   `jmap(javaMap)`

    *   `JSInvoker(object)`


    The `jlist()` function takes an instance of `java.util.List` and returns a JavaScript
    object that you can use to access the `List` as if it is an array. You can use
    the bracket notation with indexes to access the elements of the `List`. The returned
    object contains a `length` property that gives you the size of the `List`. Listing
    9-3 contains the code showing how to use the `jlist()` function.


    **Listing 9-3.** Using the `jlist()` Function


    ```

    // jlisttest.js

    // Create an ArrayList and add two elements to it

    var ArrayList = Java.type("java.util.ArrayList");

    var list = new ArrayList();

    list.add("Ken");

    list.add("Li");

    // Convert the ArrayList into a Nashorn array

    var names = jlist(list);

    print("Accessing an ArrayList as a Nashorn array...");

    for(var i = 0; i < names.length; i++) {

    printf("names[%d] = %s", i, names[i]);

    }

    ```


    The following command executes the code in Listing 9-3 using the `jrunscript`
    command-line shell:


    ```

    C:\>jrunscript -f jlisttest.js

    Accessing an ArrayList as a Nashorn array...

    names[0] = Ken

    names[1] = Li

    ```


    The `jmap()` function takes an instance of `java.util.Map` and returns a JavaScript
    object that you can use to access the `Map`. The keys in the `Map` becomes the
    properties of the JavaScript object. Listing 9-4 contains the code showing how
    to use the `jmap()` function.


    **Listing 9-4.** Using the `jmap()` Function


    ```

    // jmaptest.js

    // Create an HashMap and add two elements to it

    var HashMap = Java.type("java.util.HashMap");

    var map = new HashMap();

    map.put("Ken", "(999) 777-3331");

    map.put("Li", "(888) 444-1111");

    // Convert the HashMap into a Nashorn object

    var phoneDir = jmap(map);

    print("Accessing a HashMap as a Nashorn object...");

    for(var prop in phoneDir) {

    printf("phoneDir[''%s''] = %s", prop, phoneDir[prop]);

    }

    // Use dot notation to access the proeprty

    var kenPhone = phoneDir.Ken; // Same as phoneDir["Ken"]

    printf("phoneDir.Ken = %s", kenPhone)

    ```


    The following command executes the code in Listing 9-4 using the `jrunscript`
    command-line shell:


    ```

    C:\>jrunscript -f jmaptest.js

    Accessing a HashMap as a Nashorn object...

    phoneDir[''Ken''] = (999) 777-3331

    phoneDir[''Li''] = (888) 444-1111

    phoneDir.Ken = (999) 777-3331

    ```


    The `JSInvoker()` function takes a delegate object as an argument. When a function
    is invoked on the `JSInvoker` object, the `invoke(name, args)` method is called
    on the delegate object. The name of the function being called is passed as the
    first argument to the `invoke()` method; the passed argument to the function call
    is passed as the second argument to the `invoke()` method. Listing 9-5 shows how
    to use the `JSInvoker` object.


    **Listing 9-5.** Using the `JSInvoker` Object


    ```

    // jsinvokertest.js

    var calcDelegate = { invoke: function(name, args) {

    if (args.length !== 2) {

    throw new Error("Must pass 2 arguments to " + name);

    }

    var value = 0;

    if (name === "add")

    value = args[0] + args[1];

    else if (name === "subtract")

    value = args[0] - args[1];

    else if (name === "multiply")

    value = args[0] * args[1];

    else if (name === "divide")

    value = args[0] / args[1];

    else

    throw new Error("Operation " + name + " not supported.");

    return value;

    }

    };

    var calc = new JSInvoker(calcDelegate);

    var x = 20.44, y = 30.56;

    var addResult = calc.add(x, y); // Will call calcDelegate.invoke("add", [x, y])

    var subResult = calc.subtract(x, y);

    var mulResult = calc.multiply(x, y);

    var divResult = calc.divide(x, y);

    printf("calc.add(%.2f, %.2f) = %.2f%n", x, y, addResult);

    printf("calc.sub(%.2f, %.2f) = %.2f%n", x, y, subResult);

    printf("calc.mul(%.2f, %.2f) = %.2f%n", x, y, mulResult);

    printf("calc.div(%.2f, %.2f) = %.2f", x, y, divResult);

    ```


    The code creates an object named `calcDelegate` that contains an `invoke()` method.
    The `JSInvoker` object wraps the `calcDelegate` object. When a function is called
    on the `calc` object, the `invoke()` method of the `calcDelegate` object is called
    with the function name as its first argument and function arguments passed as
    an array as the second argument. The `invoke()` function performs addition, subtraction,
    multiplication, and division on the arguments. The following command shows how
    to execute the code:


    ```

    c:\>jrunscript -f jsinvokertest.js

    calc.add(20.44, 30.56) = 51.00

    calc.sub(20.44, 30.56) = -10.12

    calc.mul(20.44, 30.56) = 624.65

    calc.div(20.44, 30.56) = 0.67

    ```


    The `JSInvoker` object works in Java 7 but generates the following error in Java
    8 when you run this example. It seems to be a bug introduced in Java 8:


    ```

    c:\>jrunscript -f jsinvokertest.js

    script error in file jsinvoker.js : TypeError: [object JSAdapter] has no such
    function "add" in jsinvoker.js at line number 25

    ```


