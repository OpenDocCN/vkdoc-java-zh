    \ classes from a package and a class from a package, respectively. For compatibility\
    \ reasons, Nashorn keeps these functions. To use these functions in Nashorn, you\
    \ need to load the compatibility module from `mozilla_compat.js` file using the\
    \ `load()` function. The following snippet of code rewrites the above logic in\
    \ the previous section these functions:\n\n```\n// Load the compatibility module.\
