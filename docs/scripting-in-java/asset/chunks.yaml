    data.setFloat32(4, 129019.50);\n\nvar id = data.getInt32(0);\nvar salary = data.getFloat32(4);\n\
    \nprint(\"id = \" + id);\nprint(\"salary = \" + salary);\n```\n\n输出：\n```\nid\
    \ = 1001\nsalary = 129019.5\n```"
  raw: '`// Create an Int8Array that is a full view of buffer`


    `var fullView = new Int8Array(buffer);`


    `// Create an Int8Array that is the first half view of buffer`


    `var firstHalfView = new Int8Array(buffer, 0, 4);`


    `// Create an Int8Array that is the copy of the firstHalfView array`


