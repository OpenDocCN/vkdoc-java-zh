    \nprint('Making \"Do\" non-configurable...');\n// Makes \"Do\" non-configurable\
    \ (non-deletable)\nObject.defineProperty(names, \"2\", {configurable:false});\n\
    \nprint(\"Setting length to 0...\");\nnames.length = 0; // Will delete only \"\
