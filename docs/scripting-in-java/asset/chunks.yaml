    \ the array\nint8View1[0] = 10;\nint8View1[1] = 20;\nint8View1[2] = 30;\nint8View1[3]\
    \ = 40;\n\nprint(\"In original buffer:\")\nfor(var i = 0; i < int8View1.length;\
    \ i++) {\n    print(int8View1[i]);\n}\n\n// Copy the last two bytes from buffer\
    \ to buffer2\nvar buffer2 = buffer.slice(2, 4);\n\n// Create an Int8Array from\
    \ buffer2\nvar int8View2 = new Int8Array(buffer2);\n\nprint(\"In copied buffer:\"\
    );\nfor(var i = 0; i < int8View2.length; i++) {\n    print(int8View2[i]);\n}\n\
    ```\n\n输出：\n```\nIn original buffer:\n10\n20\n30\n40\nIn copied buffer:\n30\n\
    40\n```\n\n由于类型化数组是类数组对象，您可以在类型化数组上使用`Array`对象的大多数方法。以下代码展示了如何使用`join()`方法连接`Int32Array`的元素：\n\
    \n```javascript\n// Create an Int32Array of 4 elements\nvar ids = new Int32Array(4);\n\
    \n// Populate the array\nids[0] = 101;\nids[1] = 102;\nids[2] = 103;\nids[3] =\
    \ 104;\n\n// Call the join() method of the Array.prototype object and print the\
    \ result\nvar idsList = Array.prototype.join.call(ids);\nprint(idsList);\n```\n\
    \n输出：\n```\n101,102,103,104\n```\n\n### `DataView`视图\n\n`DataView`视图提供了从`ArrayBuffer`读取和写入不同类型数据的低级接口。通常，当同一个`ArrayBuffer`的不同区域包含不同类型的数据时，您会使用`DataView`。请注意，`DataView`不是类型化数组；它只是`ArrayBuffer`的一个视图。`DataView`构造函数的签名是：\n\
    \n```\nDataView(arrayBuffer, byteOffset, byteLength)\n```\n\n它创建一个指定`arrayBuffer`的视图，引用从`byteOffset`索引开始的`byteLength`个字节。如果未指定`byteLength`，则引用从`byteOffset`开始到末尾的`arrayBuffer`。如果`byteOffset`和`byteLength`都未指定，则引用整个`arrayBuffer`。\n\
    \n与类型化数组视图类型不同，`DataView`对象可以使用混合数据类型值，因此它没有`length`属性。与类型化数组一样，它具有`buffer`、`byteOffset`和`byteLength`属性。它包含以下用于读取和写入不同类型值的\
