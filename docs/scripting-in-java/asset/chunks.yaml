- fmt: "### Adding and Removing Elements at Ends\n\nThe following four methods let\
    \ you add and remove elements at the beginning and end of an array:\n\n- `unshift(value1,\
    \ value2,...)`: The `unshift()` method prepends the arguments to the array, so\
    \ they appear in the beginning of the array in the same order they appear as arguments.\
    \ It returns the new `length` of the array. Indexes of the existing elements are\
    \ adjusted to make room for new elements.\n- `shift()`: The `shift()` method removes\
    \ and returns the first element of the array, shifting all other elements one\
    \ position to the left.\n- `push(value1, value2,...)`: The `push()` method works\
    \ the same as the `unshift()` method, except that it adds elements at the end\
    \ of the array.\n- `pop()`: The `pop()` method works the same as the `shift()`\
    \ method, except it removes and returns the last element of the array\n\nHere\
    \ are examples of using these methods:\n\n```\nvar ids = [10, 20, 30];\nprint(\"\
    ids: \" + ids);\nids.unshift(100, 200, 300);\nprint(\"After ids.unshift(100, 200,\
    \ 300): \" + ids);\nids.shift();\nprint(\"After ids.shift(): \" + ids);\nids.push(1,\
    \ 2, 3);\nprint(\"After ids.push(1, 2, 3): \" + ids);\nids.pop();\nprint(\"After\
    \ ids.pop(): \" + ids);\n```\n\n```\nids: 10,20,30\nAfter ids.unshift(100, 200,\
    \ 300): 100,200,300,10,20,30\nAfter ids.shift(): 200,300,10,20,30\nAfter ids.push(1,\
    \ 2, 3): 200,300,10,20,30,1,2,3\nAfter ids.pop(): 200,300,10,20,30,1,2\n```\n\n\
    Using these methods, you can implement a stack, a queue, and a doubly-ended queue.\
    \ Let us implement a stack using the `push()` and `pop()` methods. Listing 7-2\
    \ contains the code for the `Stack` object. It holds the stack’s data in a private\
    \ `Array` object. It provides `isEmpty()`, `push()`, `pop()`, and `peek()` methods\
    \ to perform stack operations. It override the `toString()` method of the `Object.prototype`\
    \ to return the current elements in the stack as a string. Listing 7-3 contains\
    \ the code to test the `Stack` object.\n\n**Listing 7-2\\. A Stack Object Declaration**\n\
    \n```\n// stack.js\n// Define the constructor for the Stack object\nfunction Stack(/*varargs*/)\
    \ {\n    // Define a private array to keep the stack elements\n    var data =\
    \ new Array();\n    // If any arguments were passed to the constructor, add them\
    \ to the stack\n    for (var i in arguments) {\n        data.push(arguments[i]);\n\
    \    }\n    // Define methods\n    this.isEmpty = function () {\n        return\
    \ (data.length === 0);\n    };\n    this.pop = function () {\n        if (this.isEmpty())\
    \ {\n            throw new Error(\"Stack is empty.\");\n        }\n        return\
    \ data.pop();\n    };\n    this.push = function (arg) {\n        data.push(arg);\n\
    \        return arg;\n    };\n    this.peek = function () {\n        if (this.isEmpty())\
    \ {\n            throw new Error(\"Stack is empty.\");\n        }\n        else\
    \ {\n            return data[data.length - 1];\n        }\n    };\n    this.toString\
    \ = function () {\n        return data.toString();\n    };\n}\n```\n\n**Listing\
    \ 7-3\\. Testing the Stack Object**\n\n```\n// stacktest.js\nload(\"stack.js\"\
    );\n// Create a Stack with initial 2 elements\nvar stack = new Stack(10, 20);\n\
    print(\"Stack = \" + stack);\n// Push an element\nstack.push(40);\nprint(\"After\
    \ push(40), Stack = \" + stack);\n// Pop two elements\nstack.pop();\nstack.pop();\n\
    print(\"After 2 pops, Stack = \" + stack);\nprint(\"stack.peek() = \" + stack.peek());\n\
    print(\"stack.isEmpty() = \" + stack.isEmpty());\n// Pop the last element\nstack.pop();\n\
    print(\"After another pop(), stack.isEmpty() = \" + stack.isEmpty());\n```\n\n\
    ```\nStack = 10,20\nAfter push(40), Stack = 10,20,40\nAfter 2 pops, Stack = 10\n\
    stack.peek() = 10\nstack.isEmpty() = false\nAfter another pop(), stack.isEmpty()\
    \ = true\n```\n\n### Searching an Array\n\nTwo methods, `indexOf()` and `lastIndexOf()`,\
    \ let you search an array for a specified element. Their signatures are:\n\n-\
    \ `indexOf(searchElement, fromIndex)`\n- `lastIndexOf(searchElement, fromIndex)`\n\
    \nThe `indexOf()` method searches for the specified `searchElement` in the array\
    \ starting at `fromIndex`. If `fromIndex` is not specified, 0 is assumed, meaning\
    \ that the entire array is searched. The method returns the index of the first\
    \ element in the array that is equal to the `searchElement` using the `===` operator.\
    \ If the `searchElement` is not found, -1 is returned.\n\nThe `lastIndexOf()`\
    \ method works the same as the `indexOf()` method, except that it performs the\
    \ search from the end to the beginning. That is, it returns the index of the last\
    \ found element in the array that is equal to the `searchElement`. The following\
    \ code shows how to use these methods:\n\n```\nvar ids = [10, 20, 30, 20];\nprint(\"\
    ids = \" + ids);\nprint(\"ids.indexOf(20) = \" + ids.indexOf(20));\nprint(\"ids.indexOf(20,\
    \ 2) = \" + ids.indexOf(20, 2));\nprint(\"ids.lastIndexOf(20) = \" + ids.lastIndexOf(20));\n\
    print(\"ids.indexOf(25) = \" + ids.lastIndexOf(25));\n```\n\n```\nids = 10,20,30,20\n\
    ids.indexOf(20) = 1\nids.indexOf(20, 2) = 3\nids.lastIndexOf(20) = 3\nids.indexOf(25)\
    \ = -1\n```\n\n### Evaluating Predicates\n\nYou can check if a predicate evaluates\
    \ to `true` for all or some of the elements in an array. The following two methods\
    \ let you perform this:\n\n- `every(predicate, thisArg)`\n- `some(predicate, thisArg)`\n\
    \nThe first argument, `predicate`, is a function that is called once for every\
    \ existing elements in the array. The function is passed three arguments: the\
    \ value of the element, the index of the element, and the array object. The second\
    \ argument, `thisArg`, if specified, is used as the `this` value for the function\
    \ invocation specified by `predicate`.\n\nThe `every()` method returns `true`\
    \ if the specified `predicate` function returns a truthy value for every existing\
    \ elements in the array. Otherwise, it returns `false`. The method returns `false`\
    \ as soon as `predicate` returns a falsy value for an element.\n\nThe `some()`\
    \ method returns `true` if `predicate` returns a truthy value for at least one\
    \ element. Otherwise, it returns `false`. The method returns `true` as soon as\
    \ `predicate` returns a truthy value for an element. The following example shows\
    \ how to check if an array of numbers contains any/all even/odd numbers:\n\n```\n\
    var ids = [10, 20, 30, 20];\nprint(\"ids = \" + ids);\nvar hasAnyEven = ids.some(function\
    \ (value, index, array) {\n    return value %2 === 0;\n});\nvar hasAllEven = ids.every(function\
    \ (value, index, array) {\n    return value %2 === 0;\n});\nvar hasAnyOdd = ids.some(function\
    \ (value, index, array) {\n    return value %2 === 1;\n});\nvar hasAllOdd = ids.every(function\
    \ (value, index, array) {\n    return value %2 === 1;\n});\nprint(\"ids has any\
    \ even numbers: \" + hasAnyEven);\nprint(\"ids has all even numbers: \" + hasAllEven);\n\
    print(\"ids has any odd numbers: \" + hasAnyOdd);\nprint(\"ids has all odd numbers:\
    \ \" + hasAllOdd);\n```\n\n```\nids = 10,20,30,20\nids has any even numbers: true\n\
    ids has all even numbers: true\nids has any odd numbers: false\nids has all odd\
    \ numbers: false\n```\n\n## Converting an Array to a String\n\nYou can convert\
    \ an array to a string in any way you want. However, the `toString()` and `toLocaleString()`\
    \ methods provide two built-in implementations to convert the array elements to\
    \ a string. The `toString()` method returns a string that is returned by calling\
    \ the `join()` method on the array without specifying any separator. That is,\
    \ it returns the list of elements as a string where elements are separated by\
    \ commas. The `toLocaleString()` method calls the `toLocaleString()` method of\
    \ all array elements, concatenates the returned strings using a local-specific\
    \ separator and return the final string. You have been using the `toString()`\
    \ method of the `Array` object whenever you used the array object as an argument\
    \ to the `print()` method or used it with the string concatenation operator."
  raw: '### Adding and Removing Elements at Ends


    The following four methods let you add and remove elements at the beginning and
    end of an array:


    *   `unshift(value1, value2,...)`: The `unshift()` method prepends the arguments
    to the array, so they appear in the beginning of the array in the same order they
    appear as arguments. It returns the new `length` of the array. Indexes of the
    existing elements are adjusted to make room for new elements.

    *   `shift()`: The `shift()` method removes and returns the first element of the
    array, shifting all other elements one position to the left.

    *   `push(value1, value2,...)`: The `push()` method works the same as the `unshift()`
    method, except that it adds elements at the end of the array.

    *   `pop()`: The `pop()` method works the same as the `shift()` method, except
    it removes and returns the last element of the array


    Here are examples of using these methods:


    `var ids = [10, 20, 30];`


    `print("ids: " + ids);`


    `ids.unshift(100, 200, 300);`


    `print("After ids.unshift(100, 200, 300): " + ids);`


    `ids.shift();`


    `print("After ids.shift(): " + ids);`


    `ids.push(1, 2, 3);`


    `print("After ids.push(1, 2, 3): " + ids);`


    `ids.pop();`


    `print("After ids.pop(): " + ids);`


    `ids: 10,20,30`


    `After ids.unshift(100, 200, 300): 100,200,300,10,20,30`


    `After ids.shift(): 200,300,10,20,30`


    `After ids.push(1, 2, 3): 200,300,10,20,30,1,2,3`


    `After ids.pop(): 200,300,10,20,30,1,2`


    Using these methods, you can implement a stack, a queue, and a doubly-ended queue.
    Let us implement a stack using the `push()` and `pop()` methods. Listing 7-2 contains
    the code for the `Stack` object. It holds the stack’s data in a private `Array`
    object. It provides `isEmpty()`, `push()`, `pop()`, and `peek()` methods to perform
    stack operations. It override the `toString()` method of the `Object.prototype`
    to return the current elements in the stack as a string. Listing 7-3 contains
    the code to test the `Stack` object.


    Listing 7-2\. A Stack Object Declaration


    `// stack.js`


    `// Define the constructor for the Stack object`


    `function Stack(/*varargs*/) {`


    `// Define a private array to keep the stack elements`


    `var data = new Array();`


    `// If any arguments were passed to the constructor, add them to the stack`


    `for (var i in arguments) {`


    `data.push(arguments[i]);`


    `}`


    `// Define methods`


    `this.isEmpty = function () {`


    `return (data.length === 0);`


    `};`


    `this.pop = function () {`


    `if (this.isEmpty()) {`


    `throw new Error("Stack is empty.");`


    `}`


    `return data.pop();`


    `};`


    `this.push = function (arg) {`


    `data.push(arg);`


    `return arg;`


    `};`


    `this.peek = function () {`


    `if (this.isEmpty()) {`


    `throw new Error("Stack is empty.");`


    `}`


    `else {`


    `return data[data.length - 1];`


    `}`


    `};`


    `this.toString = function () {`


    `return data.toString();`


    `};`


    `}`


    Listing 7-3\. Testing the Stack Object


    `// stacktest.js`


    `load("stack.js");`


    `// Create a Stack with initial 2 elements`


    `var stack = new Stack(10, 20);`


    `print("Stack = " + stack);`


    `// Push an element`


    `stack.push(40);`


    `print("After push(40), Stack = " + stack);`


    `// Pop two elements`


    `stack.pop();`


    `stack.pop();`


    `print("After 2 pops, Stack = " + stack);`


    `print("stack.peek() = " + stack.peek());`


    `print("stack.isEmpty() = " + stack.isEmpty());`


