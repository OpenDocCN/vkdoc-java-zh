    ## 摘要


    Nashorn 的 Java API 提供了 Java 类和接口，让你能够在 Java 代码中直接处理 Nashorn 脚本引擎和 Nashorn 对象。Nashorn
    的 Java API 中的所有类都位于 `jdk.nashorn.api.scripting` 包中。请注意，Nashorn 脚本引擎在内部使用了其他包中的许多其他类。但是，除了
    `jdk.nashorn.api.scripting` 包中的类之外，你不应该在应用程序中直接使用它们。


    Nashorn 脚本可以使用不同类型的值和对象，例如 Number、String、Boolean 类型的原始值，以及 Object、String、Date
    和自定义对象。你也可以在脚本中创建 Java 对象。Number 和 Boolean 类型的脚本值在 Java 中表示为 `java.lang.Number`
    和 `java.lang.Boolean`。脚本中的 Null 类型在 Java 中表示为 `null`。脚本中的 String 原始类型在 Java 中表示为
    `java.lang.String`。脚本对象在 Java 中表示为 `ScriptObjectMirror` 类的对象。


    `jdk.nashorn.api.scripting` 包中的 `NashornScriptEngineFactory` 和 `ScriptEngine`
    类分别代表 Nashorn 脚本引擎工厂和脚本引擎。如果你想向 Nashorn 引擎传递选项，则需要直接使用这些类。你也可以在命令行中使用 `-Dnashorn.args="<options>"`
    向 Nashorn 引擎传递选项。如果你向 Nashorn 引擎传递 `--globals-per-engine`，则所有脚本上下文将共享全局变量。默认情况下，脚本上下文不共享全局变量。


    `ScriptObjectMirror` 类包含多个用于添加、更新和删除脚本对象属性的方法。该类实现了 `JSObject` 和 `Bindings` 接口。`JSObject`
    接口允许你将脚本对象视为一个简单的 Java 类，而 `Bindings` 接口允许你将脚本对象视为一个映射。你可以使用 `getMember()`、`getSlot()`
    和 `get()` 方法来获取脚本对象属性的值。你可以使用 `setMember()`、`setSlot()` 和 `put()` 方法来添加或更新属性的值。你可以使用
    `callMember()` 方法来调用脚本对象的方法。`call()` 方法允许你调用脚本函数，并允许你为函数调用传递 `this` 值。`ScriptObjectMirror`
    类还包含其他几个方法，让你能够在 Java 程序中处理脚本对象。


    # 13. 调试、跟踪和分析脚本


    在本章中，你将学习：


    *   如何在 NetBeans IDE 中调试独立的 Nashorn 脚本

    *   如何在 NetBeans IDE 中调试从 Java 代码调用的 Nashorn 脚本

    *   如何跟踪和分析 Nashorn 脚本


    JDK 8 或更高版本中的 NetBeans 8 支持调试、跟踪和分析 Nashorn 脚本。你可以在 NetBeans IDE 中运行和调试独立的 Nashorn
    脚本。当 Nashorn 脚本从 Java 代码调用时，你也可以对其进行调试。你可以使用所有用于调试 Java 代码的调试功能来调试脚本；你可以设置断点、显示变量值、添加监视、监控调用堆栈等。在调试
    Nashorn 脚本时，调试器会显示 Nashorn 堆栈。


    在 NetBeans 中，所有与调试器相关的窗格都可以通过菜单项 `Windows ➤ Debugging` 打开。有关 NetBeans 中完整调试功能的列表，请参考
    NetBeans 中的帮助页面。当 NetBeans 应用程序处于活动状态时，你可以按 `F1` 键打开帮助页面。在本章中，我将使用清单 13-1 中的脚本作为调试脚本的示例。


    **清单 13-1. 一个包含 `isPrime()` 函数及对该函数调用的测试脚本**


    `// primetest.js`


    `function isPrime(n) {`


    `// 整数 <= 2、浮点数和偶数不是质数`

    `if (n <= 2 || Math.floor(n) !== n || n % 2 === 0) {`


    `return false;`


    `}`


    `// 检查 n 是否能被 3 到 sqrt(n) 之间的任何奇数整除。`

    `var sqrt = Math.sqrt(n);`

    `for (var i = 3; i <= sqrt; i += 2) {`


    `if (n % i === 0) {`


    `return false;`


    `}`


    `}`


    `return true; // 如果执行到这里，它是一个质数。`

    `}`


    `// 检查几个数字是否为质数`

    `var num = 8;`

    `var isPrimeNum = isPrime(num);`

    `print(num + " is a prime number: " + isPrimeNum);`


    `debugger;`


    `num = 37;`

    `isPrimeNum = isPrime(num);`

    `print(num + " is a prime number: " + isPrimeNum);`


    ## 调试独立脚本


    要在 NetBeans 中运行或调试独立的 Nashorn 脚本，首先需要在 NetBeans IDE 中打开脚本文件。图 13-1 显示了在 NetBeans
    中打开的清单 13-1 中的脚本。要运行该脚本，请在显示脚本的编辑器中右键单击，然后选择 `Run File` 菜单项。或者，在脚本窗格处于活动状态时按 `Shift
    + F6`。


