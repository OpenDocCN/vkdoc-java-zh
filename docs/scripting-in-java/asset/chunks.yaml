- fmt: "### `encodeURI()` 函数\n\n`encodeURI()` 函数的签名如下：\n\n`encodeURI(uri)`\n\n它返回将某些字符替换为转义序列后的\
    \ `uri`。以下代码编码了一个包含空格的 URI。空格字符被编码为 `%20`。\n\n```\nvar uri = \"http://www.jdojo.com/hi\
    \ there\";\nvar encodedUri = encodeURI(uri);\nprint(\"URI:\", uri);\nprint(\"\
    Encoded URI:\", encodedUri);\n```\n\n输出：\n```\nURI: http://www.jdojo.com/hi there\n\
    Encoded URI: http://www.jdojo.com/hi%20there\n```\n\n### `encodeURIComponent()`\
    \ 函数\n\n`encodeURIComponent()` 函数的签名如下：\n\n`encodeURIComponent(uriComponent)`\n\
    \n它用于将 URI 组件（URI 查询部分中的值）中的某些字符替换为转义序列。例如，URI 组件中的 & 符号被转义为 `%26`。以下代码展示了如何使用此函数：\n\
    \n```\nvar uriComponent = \"Ken&Donna\";\nvar encodedUriComponent = encodeURIComponent(uriComponent);\n\
    print(\"URI Component:\", uriComponent);\nprint(\"Encoded URI Component:\", encodedUriComponent);\n\
    ```\n\n输出：\n```\nURI Component: Ken&Donna\nEncoded URI Component: Ken%26Donna\n\
    ```\n\n### `load()` 和 `loadWithNewGlobal()` 函数\n\n`load()` 和 `loadWithNewGlobal()`\
    \ 函数用于加载并评估存储在文件（本地或远程）或脚本对象中的脚本。它们的签名如下：\n\n- `load(scriptPath)`\n- `load(scriptObject)`\n\
    - `loadWithNewGlobal(scriptPath, args1, arg2, ...)`\n- `loadWithNewGlobal(scriptObject,\
    \ arg1, arg2, ...)`\n\n这两个函数都会加载并评估脚本。`load()` 函数在相同的全局作用域中加载脚本。全局作用域中的现有名称与加载脚本中的名称可能会发生冲突，加载的脚本可能会覆盖现有的全局值。\n\
    \n`loadWithNewGlobal()` 函数在新的全局作用域中加载脚本，加载脚本中的名称不会与加载该脚本的全局作用域中已有的名称冲突。该函数允许你向新的全局作用域传递参数。你可以在脚本路径或脚本对象之后指定参数。这样，现有的全局作用域可以向新的全局作用域传递信息。传递的参数可以在加载的脚本中通过全局对象\
    \ `arguments` 访问。当新全局作用域中的加载脚本修改了内置全局对象（如 `String`、`Object` 等）时，这些修改在调用者的全局作用域中不可用。\n\
    \n提示\n\n`loadWithNewGlobal()` 函数有助于在新线程中使用新的全局作用域执行脚本，从而消除线程覆盖现有全局变量的可能性。两个函数都返回一个值，该值是加载脚本中最后一个评估表达式的值。\n\
    \n你在本章中已经使用过 `load()` 函数来加载脚本。你可以指定脚本的本地路径（绝对路径或相对路径）或 URL：\n\n```\n// 从当前目录的本地路径加载脚本\n\
    load(\"Point.js\");\n\n// 使用 Windows 上的绝对路径从本地路径加载脚本\nload(\"C:\\\\scripts\\\\\
    Point.js\");\n\n// 从互联网加载脚本\nload(\"http://jdojo.com/scripts/Point.js\");\n```\n\
    \n`load()` 和 `loadWithNewGlobal()` 函数还支持伪 URL 方案，例如 `nashorn` 和 `fx`。`nashorn`\
    \ 方案用于加载 Nashorn 脚本；例如，`load(\"nashorn:mozilla_compat.js\")` 加载内置的 Mozilla 兼容性脚本，以便你可以在\
    \ Nashorn 中使用 Mozilla 功能。`fx` 方案用于加载 JavaFX 相关脚本；例如，`load(\"fx:controls.js\")`\
    \ 加载内置的 JavaFX 脚本，该脚本将所有 JavaFX 控件类名导入到 Nashorn 代码中，因此你可以使用它们的简单名称。\n\n`load()`\
    \ 和 `loadWithNewGlobal()` 方法还可以加载并评估一个称为脚本对象的对象中的脚本。脚本对象应包含两个属性：`name` 和 `script`。`name`\
    \ 属性为脚本指定一个名称，当抛出错误时，该名称用作脚本名称。你可以为脚本指定任何你想要的名称。`script` 属性包含要加载和评估的脚本。这两个属性都是必需的。以下代码创建了一个脚本对象，该对象在标准输出上打印当前日期，并使用\
    \ `load()` 函数加载并评估该脚本。由于脚本打印当前日期和时间，你可能会得到不同的输出：\n\n```\n// 创建一个脚本对象\nvar scriptObject\
    \ = {\n    name: \"myscript\",\n    script: \"var today = new Date; print('Today\
    \ is', today);\"\n};\n\n// 加载并评估脚本对象\nload(scriptObject);\n```\n\n输出：\n```\nToday\
    \ is Wed Oct 08 2014 11:56:50 GMT-0500 (CDT)\n```\n\n让我们看一些示例，以了解 `load()` 和 `loadWithNewGlobal()`\
    \ 函数之间的区别。我在示例中使用了脚本对象，以保持整个代码简短且集中。你也可以从文件或 URL 加载脚本。"
  raw: '### The encodeURI( ) Function


    The `encodeURI()` function has the following signature:


    `encodeURI(uri)`


    It returns `uri` after replacing certain characters with escape sequences. The
    following code encodes a URI that contains a space. The space character is encoded
    as %20.


    `var uri = "` [`http://www.jdojo.com/hi`](http://www.jdojo.com/hi) `there";`


    `var encodedUri = encodeURI(uri);`


    `print("URI:", uri);`


    `print("Encoded URI:", encodedUri);`


    `URI:` [`http://www.jdojo.com/hi`](http://www.jdojo.com/hi) `there`


    `Encoded URI:` [`http://www.jdojo.com/hi%20there`](http://www.jdojo.com/hi%20there)


    ### The encodeURIComponent() Function


    The `encodeURIComponent()` function has the following signature:


    `encodeURIComponent(uriComponent)`


    It is used to replace certain characters in the URI components (values in the
    URI’s query parts) with escape sequences. For example, an ampersand in the URI
    component is escaped as %26\. The following code shows how to use this function:


    `var uriComponent = "Ken&Donna";`


    `var encodedUriComponent = encodeURIComponent(uriComponent);`


    `print("URI Component:", uriComponent);`


    `print("Encoded URI Component:", encodedUriComponent);`


    `URI Component: Ken&Donna`


    `Encoded URI Component: Ken%26Donna`


    ### The load( ) and loadWithNewGlobal Functions


    The `load()` and `loadWIthNewGlobal()` function are used to load and evaluate
    scripts stored in a file (locally or remotely) and a script object. Their signatures
    are:


    *   `load(scriptPath)`

    *   `load(scriptObject)`

    *   `loadWIthNewGlobal(scriptPath, args1, arg2, ...)`

    *   `loadWIthNewGlobal(scriptObject, arg1, arg2,...)`


    Both functions load and evaluate a script. The `load()` function loads the script
    in the same global scope. Existing names in the global scope and the names in
    the loaded script may collide and the loaded script may overwrite the existing
    global values.


    The `loadWithNewGlobal()` function loads the script in a new global scope and
    the names in the loaded script will not collide with the already existing names
    in the global scope that loads the script. The function lets you pass arguments
    to the new global scope. You can specify the arguments after the script path or
    script object. This way, the existing global scope can pass information to the
    new global scope. The passed arguments can be accessed in the loaded script using
    the `arguments` global object. When the loaded script in the new global scope
    modifies the built-in global objects, such as `String`, `Object`, and so on, those
    modification are not available in the caller’s global scope.


    Tip


    The `loadWithNewGlobal()` function is useful in executing script in a new thread
    using a new global scope, thus eliminating the possibility of the thread overwriting
    the existing global variables. Both functions return a value that is the value
    of the last evaluated expression in the loaded script.


    You have used the `load()` function to load the scripts in this chapter. You can
    specify the local path (absolute or relative) or a URL of a script:


    `// Load a script from a local path from the current directory`


    `load("Point.js");`


    `// Load a script from a local path using an absolute path on Windows`


    `load("C:\\scripts\\Point.js");`


    `// Load a script from Internet`


    `load("` [`http://jdojo.com/scripts/Point.js`](http://jdojo.com/scripts/Point.js)
    `");`


    The `load()` and `loadWithNewGlobal()`functions also support pseudo URL schemes
    such as n`ashorn` and `fx`. The `nashorn` scheme is used to load Nashorn scripts;
    for example, `load("nashorn:mozilla_compat.js")` loads the built-in Mozilla compatibility
    script so that you can use Mozilla functionalities in Nashorn. The `fx` scheme
    is used to load JavaFX related scripts; for example, `load("fx:controls.js")`
    loads the built-in JavaFX script that imports all JavaFX control class names into
    the Nashorn code, so you can use their simple names.


    The `load()` and `loadWithNewGlobal()` method can also load and evaluate a script
    in an object called a script object. A script object should contain two properties
    named `name` and `script`. The `name` property specifies a name for the script
    that is used as the script name when an error is thrown. You can give any name
    for your script you want. The `script` property contains the script to be loaded
    and evaluated. Both properties are mandatory. The following code creates a script
    object that prints the current date on the standard output, loads, and evaluates
    the script using the `load()` function. You may get a different output as the
    script prints the current date and time:


    `// Create a script object`


    `var scriptObject = {`


    `name: "myscript",`


    `script: "var today = new Date; print(''Today is'', today);"`


    `};`


    `// Load and evaluate the script object`


    `load(scriptObject);`


    `Today is Wed Oct 08 2014 11:56:50 GMT-0500 (CDT)`


    Let’s look at some examples to see the difference between the `load()` and `loadWithNewGlobal()`
    functions. I have used a script object in examples to keep the entire code short
    and at one place. You can load scripts from files or URLs as well.'
