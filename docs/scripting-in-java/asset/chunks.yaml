    \ that let you deal with the Nashorn scripting engine and Nashorn objects directly\
    \ in Java code. All classes for Java APIs for Nashorn are in the `jdk.nashorn.api.scripting`\
    \ package. Notice that the Nashorn scripting engine internally uses a lot of other\
    \ classes in other packages. However, you are not supposed to use them in your\
    \ application directly, except for classes from the `jdk.nashorn.api.scripting`\
    \ package.\n\nA Nashorn script can use different types of values and objects such\
    \ as `Number`, `String`, `Boolean` types of primitive values, and `Object`, `String`,\
    \ `Date`, and custom objects. You can also create Java objects in scripts. The\
    \ script values of type `Number` and `Boolean` are represented in Java as `java.lang.Number`\
    \ and `java.lang.Boolean`. The `Null` type in a script is represented as `null`\
    \ in Java. The `String` primitive type in a script is represented as `java.lang.String`\
    \ in Java. A script object is represented as an object of the `ScriptObjectMirror`\
    \ class in Java.\n\nThe `NashornScriptEngineFactory` and `ScriptEngine` classes\
    \ in the `jdk.nashorn.api.scripting` package represent the Nashorn script engine\
    \ factory and script engine, respectively. You will need to work with these classes\
    \ directly if you want to pass options to the Nashorn engine. You can also pass\
    \ options to the Nashorn engine using `-Dnashorn.args=\"<options>\"` on the command-line.\
    \ If you pass the `--globals-per-engine` to a Nashorn engine, all script contexts\
    \ will share the globals. By default, script contexts do not share globals.\n\n\
    The `ScriptObjectMirror` class contains several methods to add, update, and delete\
    \ properties from the script object. The class implements the `JSObject` and `Bindings`\
    \ interfaces. The `JSObject` interface lets you treat a script object as a simple\
    \ Java class, whereas the `Bindings` interface lets you treat a script object\
    \ as a map. You can use `getMember()`, `getSlot()`, and `get()` methods to get\
    \ the value of the property of a script object. You can use `setMember()`, `setSlot()`,\
    \ and `put()` methods to add or update the value of a property. You can use the\
    \ `callMember()` method to call a method of the script object. The `call()` method\
    \ lets you call a script function, allowing you to pass the `this` value for the\
    \ function invocation. The `ScriptObjectMirror` class contains several other methods\
    \ that let you work with script objects in Java programs.\n\n# Debugging, Tracing,\
    \ and Profiling Scripts\n\nIn this chapter, you will learn:\n\n* How to debug\
    \ standalone Nashorn scripts in the NetBeans IDE\n* How to debug Nashorn scripts\
    \ that are called from Java code in the NetBeans IDE\n* How to trace and profile\
    \ Nashorn scripts\n\nNetBeans 8 with JDK 8 or later supports debugging, tracing,\
    \ and profiling Nashorn scripts. You can run and debug standalone Nashorn scripts\
    \ from within the NetBeans IDE. You can also debug Nashorn scripts when they are\
    \ called from Java code. You can use all the debugging features for debugging\
    \ scripts that you can use for debugging Java code; you can set breakpoints, display\
    \ variables’ values, add watches, monitor call stacks, and so on. When debugging\
    \ Nashorn scripts, the debugger shows the Nashorn stack.\n\nIn NetBeans, all debugger-related\
    \ panes can be opened using the menu item `Windows ➤ Debugging`. For a list of\
    \ the complete debugging features in NetBeans, please refer to the help page in\
    \ NetBeans. You can open the help page by pressing the `F1` key while the NetBeans\
    \ application is active. I will use the script in Listing 13-1 as an example of\
    \ debugging scripts in this chapter.\n\n**Listing 13-1.** A Test Script Containing\
    \ an `isPrime()` Function and Calls to That Function\n\n```\n// primetest.js\n\
    \nfunction isPrime(n) {\n    // Integers <= 2, floating-point numbers, and even\
    \ numbers are not primes\n    if (n <= 2 || Math.floor(n) !== n || n % 2 === 0)\
    \ {\n        return false;\n    }\n    // Check if n is divisible by any odd integers\
    \ between 3 and sqrt(n).\n    var sqrt = Math.sqrt(n);\n    for (var i = 3; i\
    \ <= sqrt; i += 2) {\n        if (n % i === 0) {\n            return false;\n\
    \        }\n    }\n    return true; // If we get here, it is a prime number.\n\
    }\n\n// Check few numbers for being primes\nvar num = 8;\nvar isPrimeNum = isPrime(num);\n\
    print(num + \" is a prime number: \" + isPrimeNum);\ndebugger;\nnum = 37;\nisPrimeNum\
    \ = isPrime(num);\nprint(num + \" is a prime number: \" + isPrimeNum);\n```\n\n\
    ## Debugging Standalone Scripts\n\nTo run or debug a standalone Nashorn script\
    \ in NetBeans, first you need to open the script file in the NetBeans IDE. Figure\
