- fmt: '### The Date Object


    The `Date` object is a function. It can be called as a function or constructor.
    Its signature is:


    `Date(year, month, date, hours, minutes, seconds, milliseconds)`


    All parameters in the `Date` object are optional. When it is called as a function,
    it returns the current date and time as a string. You can pass arguments to it
    when calling it as a function; however, all arguments are always ignored. When
    it is called as a constructor, arguments represent the date components and are
    used to initialize the `Date` object. The following code shows how to use the
    `Date` object as a function to get the current date and time. You may get a different
    output when you run the code:


    ```

    // Call Date as a function

    print(Date());

    print(Date(2014, 10, 4, 19, 2)); // Arguments to Date are ignored

    ```


    ```

    Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)

    Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)

    ```


    The `Date` object can be called as a constructor passing arguments in the following
    forms:


    *   `new Date()`

    *   `new Date(milliseconds)`

    *   `new Date(dateString)`

    *   `new Date(year, month, day, hours, minutes, seconds, milliseconds)`


    If the number of arguments is less than two, one of the first three forms is used.
    If the number of arguments is two or more, the fourth form is used. If no argument
    is passed, it creates a `Date` object with the current date and time. If only
    one number argument is passed, it is considered the number of milliseconds passed
    since midnight January 1, 1970 UTC. If only one string argument is passed, the
    date and time in the string is parsed and used as the date and time value for
    the new `Date` object. If two or more arguments are passed, a `Date` object is
    constructed; remaining values are set to 1 for day and 0 for hours, minutes, seconds,
    and milliseconds. The `Date` object has a static method `Date.now()` that returns
    the number of milliseconds elapsed between the midnight January 1, 1970 UTC and
    the current time.


    The following code shows how to create `Date` objects passing different number
    of arguments to the constructor:


    ```

    // Current date and time

    print("new Date() =", new Date());


    // Pass 2000 milliseconds

    print("new Date(2000) =", new Date(2000));


    // Pass 2000 milliseconds and convert to UTC date time string

    print("new Date(2000).toUTCString() =", new Date(2000).toUTCString());


    // Pass a date as a string. Date is considered in UTC

    print(''new Date("2014-14-04") ='', new Date("2014-14-04"));


    // Pass year and month. day will default to 1

    print("new Date(2014, 10) = ", new Date(2014, 10));


    // Pass year, month, day, and hour. Other parts will default to 0

    print("new Date(2014, 10, 4, 10) = ", new Date(2014, 10, 4, 10));


    // Milliseconds elapsed from midnight January 1970 and now

    print("Date.now() = ", Date.now());

    ```


    ```

    new Date() = Sat Oct 04 2014 19:38:46 GMT-0500 (CDT)

    new Date(2000) = Wed Dec 31 1969 18:00:02 GMT-0600 (CST)

    new Date(2000).toUTCString() = Thu, 01 Jan 1970 00:00:02 GMT

    new Date("2014-14-04") = Fri Oct 03 2014 19:00:00 GMT-0500 (CDT)

    new Date(2014, 10) =  Sat Nov 01 2014 00:00:00 GMT-0500 (CDT)

    new Date(2014, 10, 4, 10) =  Tue Nov 04 2014 10:00:00 GMT-0600 (CST)

    Date.now() = 1412469527013

    ```


    There are over forty methods in the `Date` objects. I will briefly explain them.
    These methods work the same way, although on different components of the date
    and time. It contains `getYear()`, `getFullYear()`, `getDate()`, `getMonth()`,
    `getHours()`, `getMinutes()`, `getSeconds()`, and `getMilliseconds()` method that
    returns the 2-digit year, full year, date, month, hours, minutes, seconds, and
    milliseconds components of the `Date` object, respectively. It contains a `getDay()`
    method that returns the day of the week (0 for Sunday and 6 for Saturday). There
    are corresponding setter methods such as `setHours()`, `setDate()`, and so on
    to set the date and time components. There are another set of getters and setters
    that work with UTC date and time; their names are based on the pattern `getUTCXxx`
    and `setUTCXxx` such as `getUTCYear()`, `getUTCHours()`, `setUTCYears()`, `setUTCHours()`,
    and so on. The `getTime()` and `setTime()` methods work with milliseconds elapsed
    since midnight January 1970. The `Date` object contains several methods named
    such as `toXxxString()` to convert the date in a specific string format. For example,
    the `toDateString()` returns a human-readable string format of the date portion
    whereas `toTimeString()` works the same way but on the time portion.


    The `Date.parse(str)` static method parses the specified `str` considering it
    as a date and time in the `YYYY-MM-DDTHH:mm:ss.sssZ` format and returns the number
    of milliseconds elapsed since midnight January 1, 1970 UTC and the parsed date
    and time.


    ### The Math Object


    The `Math` object contains properties that are mathematical constants and functions.
    Table 4-14 lists the properties of the `Math` object with their descriptions.
    The properties of the `Math` object are self-explanatory; I will not discuss any
    examples of using them.


    **Table 4-14.** The List of Properties and Methods of the Math Object


    | Property/Method | Description |

    | --- | --- |

    | `Math.E` | The Number value for e, the base of the natural logarithms, which
    is approximately 2.7182818284590452354 |

    | `Math.LN10` | The Number value for the natural logarithm of 10, which is approximately
    2.302585092994046 |

    | `Math.LN2` | The Number value for the natural logarithm of 2, which is approximately
    0.6931471805599453 |

    | `Math.LOG2E` | The Number value for the base-2 logarithm of e, which is approximately
    1.4426950408889634 |

    | `Math.LOG10E` | The Number value for the base-10 logarithm of e which is approximately
    0.4342944819032518 |

    | `Math.PI` | The Number value for π, the ratio of the circumference of a circle
    to its diameter, which is approximately 3.1415926535897932 |

    | `Math.SQRT1_2` | The Number value for the square root of 0.50 which is approximately
    0.7071067811865476 |

    | `Math.SQRT2` | The Number value for the square root of 2, which is approximately
    1.4142135623730951 |

    | `Math.abs(x)` | Returns the absolute value of x. For example, both `Math.abs(2)`
    and `Math.abs(-2)` return 2 |

    | `Math.acos(x)`, `Math.asin(x)`, `Math.atan(x)` | Returns arc cosine, arc sine,
    and arc tangent of `x` |

    | `Math.atan(y, x)` | Returns the arc tangent of the quotient `y/x` of the arguments
    `y` and `x`, where the signs of `y` and `x` are used to determine the quadrant
    of the result |

    | `Math.ceil(x)` | Returns the closest integer that is greater than or equal to
    x |

    | `Math.cos(x)`, `Math.sin(x)`, `Math.tan(x)` | Returns cosine, sine, and tangent
    of `x` |

    | `Math.exp(x)` | Returns `e` raised to the power of x, where `e` is `Math.E`
    |

    | `Math.floor(x)` | Returns the closest integer that is less than or equal to
    x |

    | `Math.log(x)` | Returns the natural logarithm of x. That is, computes the logarithm
    of x base-`e` |

    | `Math.max(v1, v2,...)` | Returns the maximum of all arguments `v1`, `v2`, and
    so on, converting the arguments to Number type if necessary. If no arguments are
    passed, `–Infinity` is returned |

    | `Math.min(v1, v2,...)` | Returns the minimum of all arguments `v1`, `v2`, and
    so on, converting the arguments to Number type if necessary. If no arguments are
    passed, `Infinity` is returned |

    | `Math.pow(x, y)` | Returns the result of raising `x` to the power `y` |

    | `Math.random()` | Returns a random number between 0 (inclusive) and 1 (exclusive)
    |

    | `Math.round(x)` | Returns an integer closed to `x`. If two integers are equally
    close, returns the integer that is closer to `+Infinity`. For example, `Math.round(2.3)`
    returns 2, `Math.round(2.9)` returns 3, and `Math.round(2.5)` returns 3 |

    | `Math.sqrt(x)` | Returns the square root of x |'
