- fmt: "## Implementing Java Interfaces in Scripts\n\nThe Java Scripting API lets\
    \ you implement Java interfaces in a scripting language. The advantage of implementing\
    \ a Java interface in a scripting language is that you can use instances of the\
    \ interface in Java code as if the interface was implemented in Java. You can\
    \ pass instances of the interface as arguments to Java methods. Methods of the\
    \ Java interface may be implemented in scripts using top-level procedures or methods\
    \ of an object.\n\nThe `getInterface()` method of the `Invocable` interface is\
    \ used to obtain the instances of a Java interface that is implemented in scripts.\
    \ The method has two versions:\n\n*   `<T> T getInterface(Class<T> cls)`\n*  \
    \ `<T> T getInterface(Object obj, Class<T> cls)`\n\nThe first version is used\
    \ to obtain an instance of a Java interface whose methods are implemented as top-level\
    \ procedures in scripts. The interface type is passed to this method as its argument.\
    \ Suppose that you have a `Calculator` interface, as declared in Listing 5-4,\
    \ that contains four methods called `add()`, `subtract()`, `multiply()` and `divide()`.\n\
    \n**Listing 5-4. A Calculator Interface**\n\n```\n// Calculator.java\npackage\
    \ com.jdojo.script;\n\npublic interface Calculator {\n    double add (double n1,\
    \ double n2);\n    double subtract (double n1, double n2);\n    double multiply\
    \ (double n1, double n2);\n    double divide (double n1, double n2);\n}\n```\n\
    \nConsider the top-level functions written in Nashorn as shown in Listing 5-5.\
    \ The script contains four functions that correspond to the functions in the `Calculator`\
    \ interface.\n\n**Listing 5-5. The Contents of the calculatorasfunctions.js File**\n\
    \n```\n// calculatorasfunctions.js\nfunction add(n1, n2) {\n    n1 + n2;\n}\n\n\
    function subtract(n1, n2) {\n    n1 - n2;\n}\n\nfunction multiply(n1, n2) {\n\
    \    n1 * n2;\n}\n\nfunction divide(n1, n2) {\n    n1 / n2;\n}\n```\n\nThese two\
    \ functions provide the implementations for the four methods of the `Calculator`\
    \ interface. After the functions are compiled by a JavaScript engine, you can\
    \ obtain an instance of the `Calculator` interface, as shown:\n\n```\n// Cast\
    \ the engine reference to the Invocable type\nInvocable inv = (Invocable)engine;\n\
    \n// Get the reference of the Calculator interface\nCalculator calc = inv.getInterface(Calculator.class);\n\
    \nif (calc == null) {\n    System.err.println(\"Calculator interface implementation\
    \ not found.\");\n} else {\n    // Use calc to call the methods of the Calculator\
    \ interface\n}\n```\n\nYou can add two numbers, as shown:\n\n```\nint sum = calc.add(15,\
    \ 10);\n```\n\nListing 5-6 shows how to implement a Java interface using top-level\
    \ procedures in Nashorn. Please consult the documentation of a scripting language\
    \ (other than Nashorn) to learn how it supports this functionality.\n\n**Listing\
    \ 5-6. Implementing a Java Interface Using Top-Level Functions in Script**\n\n\
    ```\n// UsingInterfaces.java\npackage com.jdojo.script;\n\nimport javax.script.Invocable;\n\
    import javax.script.ScriptEngine;\nimport javax.script.ScriptEngineManager;\n\
    import javax.script.ScriptException;\n\npublic class UsingInterfaces {\n    public\
    \ static void main(String[] args) {\n        // Get the Nashorn engine\n     \
    \   ScriptEngineManager manager = new ScriptEngineManager();\n        ScriptEngine\
    \ engine = manager.getEngineByName(\"JavaScript\");\n\n        // Make sure the\
    \ script engine implements Invocable interface\n        if (!(engine instanceof\
    \ Invocable)) {\n            System.out.println(\"Interface implementation in\
    \ script\" +\n                \"is not supported.\");\n            return;\n \
    \       }\n\n        // Cast the engine reference to the Invocable type\n    \
    \    Invocable inv = (Invocable) engine;\n\n        // Create the script for add()\
    \ and subtract() functions\n        String scriptPath  = \"calculatorasfunctions.js\"\
    ;\n\n        try {\n            // Compile the script that will be stored in the\
    \ engine\n            engine.eval(\"load('\" + scriptPath + \"')\");\n\n     \
    \       // Get the interface implementation\n            Calculator calc = inv.getInterface(Calculator.class);\n\
    \n            if (calc == null) {\n                System.err.println(\"Calculator\
    \ interface \" +\n                    \"implementation not found.\");\n      \
    \          return;\n            }\n\n            double x = 15.0;\n          \
    \  double y = 10.0;\n            double addResult = calc.add(x, y);\n        \
    \    double subResult = calc.subtract(x, y);\n```"
