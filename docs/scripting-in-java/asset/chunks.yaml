- fmt: "# Binding Object Properties\n\nNashorn lets you bind properties of one object\
    \ to another object using the `Object.bindProperties(target, source)` method where\
    \ `target` is the object whose properties will be bound to the properties of `source`.\
    \ Listing 4-14 shows how to bind properties of one object to another object.\n\
    \n**Listing 4-14.** Binding Properties of One Object to Another Object\n\n```\n\
    // bindproperties.js\n\nvar trg = {};\nvar src = {x:100, y:200, z:300};\n\n//\
    \ Bind properties of sourceObject to targetObject\nObject.bindProperties(trg,\
    \ src);\n\n// Print properties using trg\nprintf(\"trg-1: x=%d, y=%d,z=%d\", trg.x,\
    \ trg.y, trg.z);\n\n// Now change z using trg\ntrg.z = 30;  // Using src.z = 30\
    \ will have the same efect\n\n// Print the properties using both objects and both\n\
    // should have the new value of z as 30\nprintf(\"trg-2: x=%d, y=%d,z=%d\", trg.x,\
    \ trg.y, trg.z);\nprintf(\"src-2: x=%d, y=%d,z=%d\", src.x, src.y, src.z);\n\n\
    // Now add a new property to trg\ntrg.u = 30;\n\n// At this point, trg has the\
    \ property named u, but src does not.\nprintf(\"trg-3: x=%d, y=%d,z=%d, u=%d\"\
    , trg.x, trg.y, trg.z, trg.u);\nprintf(\"src-3: x=%d, y=%d,z=%d, u=%s\", src.x,\
    \ src.y, src.z, src.u);\n\n// Now add a new property to src\nsrc.v = 30;\n\n//\
    \ Contrary to our expectation, trg.v does not exist. It may indicate a bug.\n\
    printf(\"trg-4: x=%d, y=%d,z=%d, u=%d, v=%s\", trg.x, trg.y, trg.z, trg.u, trg.v);\n\
    printf(\"src-4: x=%d, y=%d,z=%d, u=%s, v=%d\", src.x, src.y, src.z, src.u, src.v);\n\
    ```\n\n```\ntrg-1: x=100, y=200,z=300\ntrg-2: x=100, y=200,z=30\nsrc-2: x=100,\
    \ y=200,z=30\ntrg-3: x=100, y=200,z=30, u=30\nsrc-3: x=100, y=200,z=30, u=undefined\n\
    trg-4: x=100, y=200,z=30, u=30, v=undefined\nsrc-4: x=100, y=200,z=30, u=undefined,\
    \ v=30\n```\n\nThere are two practical uses of the `Object.bindProperties()` method:\n\
    \n* To enumerate the properties of Java objects inside Nashorn scripts\n* You\
    \ can import an object’s properties into global scope as if those properties are\
    \ declared globally\n\nYou cannot enumerate the properties of Java objects using\
    \ the `for..in` or `for..each..in` statements in Nashorn. Notice that we are talking\
    \ about Java objects, not Nashorn objects. The solution is to bind the properties\
    \ of Java objects to a Nashorn object and use one of these iteration statements\
    \ on the Nashorn object. Listing 4-15 shows how to iterate over the properties\
    \ of `java.util.HashSet` object.\n\n**Listing 4-15.** Iterating Over Properties\
    \ of Java Objects\n\n```\n// bindjavaobject.js\n\nvar trg = {};\nvar src = new\
    \ java.util.HashSet();\n\n// Try iterating src properties\nprint(\"Iterating over\
    \ src properties:\");\nfor (var propName in src) {\n    print(propName); // Will\
    \ not get here\n}\n\n// Bind properties of the java.util.HashSet object referenced\
    \ by src to trg\nObject.bindProperties(trg, src);\n\n// Try iterating src properties\n\
    print(\"Iterating over trg properties:\");\nfor (var propName in trg) {\n    print(propName);\n\
    }\n```\n\n```\nIterating over src properties:\nIterating over trg properties:\n\
    getClass\nwait\nnotifyAll\nnotify\nremove\nremoveAll\niterator\nstream\nhashCode\n\
    toArray\nparallelStream\nadd\nspliterator\nforEach\ncontainsAll\nclear\nisEmpty\n\
    removeIf\ncontains\nsize\naddAll\nequals\nclone\ntoString\nretainAll\nclass\n\
    empty\n```\n\nListing 4-16 show code that creates a logger object that has only\
    \ one property called `log` that is a function. It uses the `Object.bindProperties()`\
    \ method to bind the property of the object to the global object referenced by\
    \ `this`. Once, the bind takes place, you can use the function `log()` as if it\
    \ is a global function. When the code is loaded, it prints the location of the\
    \ log file.\n\n**Listing 4-16.** Binding an Object’s Properties to the Global\
    \ Object\n\n```\n// loadglobals.js\n\n// Create a function obejct using a function\
    \ expression\nvar Logger = function () {\n    var LOG_FILE = new java.io.File(\"\
    nashorn_app.log\");\n    var printer = new java.io.PrintWriter(\n        new java.io.FileWriter(LOG_FILE,\
    \ true /*append*/), true /*autoflush*/);\n    this.log = function (msg) {\n  \
    \      printer[\"println(String)\"](java.time.LocalDateTime.now() + \": \" + msg);\n\
    \    };\n    // Print the path for the log file\n    print(\"Logs using the log(msg)\
    \ global function will be written to \" +\n        LOG_FILE.absolutePath);\n};\n\
    \n// Bind a Logger object to the global object.\n// Here, this refers to the global\
    \ object\nObject.bindProperties(this, new Logger());\n```\n\nThe following code\
    \ loads the `loadglobals.js` file and uses the `log()` function as if it is a\
    \ global function. You may get a different output. The logged messages will be\
    \ stored in the file located printed in the output. You can use this technique\
    \ to import as many global objects int the global scope you need. All that you\
    \ need to do is to add all such properties to an object and bind that object to\
    \ the global object `this`:\n\n```\n// Load the globals\nload(\"loadglobals.js\"\
    );\n\n// Now you can use the log() method as a global function\nlog(\"Hello logger!\"\
    );\n```\n\n```\nLogs using the log(msg)  global function will be written to C:\\\
    nashorn_app.log\n```"
