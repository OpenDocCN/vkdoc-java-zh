  raw: 'Suppose that you want to create a function for the `Point` objects that will
    compute the distance of a `Point` from the origin. You can create a `Point` to
    represent the origin and bind the `Point.prototype.distance` function to this
    object to get a new function. Listing 4-23 demonstrates this technique.


    Listing 4-23\. Binding a Function to an Object


    `// functionbind.js`


    `load("Point.js");`


    `// Create a 2D origin`


    `var origin = new Point(0, 0);`


    `// Create a new method called distanceFromOrigin() by binding`


    `// the distance() method of the Point to the origin object`


    `var distanceFromOrigin = Point.prototype.distance.bind(origin);`


    `var dist = distanceFromOrigin(new Point(0, 10));`


    `print(dist);`


    `// The above distanceFromOrigin() is the same as follows`


    `var dist2 = origin.distance(new Point(0, 10));`


    `print(dist2);`


    `10`


    `10`


    An important point about the `Function()` constructor is that the functions it
    creates do not use lexical scoping; instead, they are always compiled as if they
    were top-level functions. Listing 4-24 demonstrates this subtle point.


    Listing 4-24\. Testing the Captured Scoping of Functions Created by the Function
    Object


    `// functioncapture.js`


    `var empId = 100; // Global`


    `function createFunction1() {`


    `var empId = 200;  // Local`


    `// Does not capture local empId`


    `var test = new Function("print(empId)");`


    `return test;`


    `}`


    `function createFunction2() {`


    `var empId = 200; // Local`


    `function test () {`


    `print(empId); // Captures local empId`


    `}`


    `return test;`


    `}`


    `createFunction1()(); // Prints 100 (the global empId)`


    `createFunction2()(); // Prints 200 (the local empId)`


    `100`


    `200`


    When the `createFunction1()` creates a new function using the `Function` object,
    the new function doesn’t capture the local `empId`, rather it captures the global
    `empId`. However, when a nested function is declared inside the `createFunction2()`
    function, the new function captures the local `empId`. The output verifies this
    rule.


    ### The String Object


    The String object is a function. It can be used simply as a function or a constructor.
    When it is used as a function, it converts the argument to a primitive type string
    value. The following is an example of using `String` as a function:


    `var str1 = String(100); // Returns "100"`


    `var str2 = String();    // Returns ""`


    When `String` is used as a constructor, it creates a new `String` object with
    its contents as the passed argument:


    `// Create a String object`


    `var str = new String("Hello");`


    Each character in the String object is assigned an index. The first character
    is assigned an index of 0, the second 1, and so on. Every String object has a
    read-only property named `length` that contains the number of characters in the
    string.


    `String.prototype` contains many useful methods to manipulate String objects and
    get its contents in different ways. Table [4-12](#A978-1-4842-0713-0_4_Chapter.html#Tab12)
    lists those methods. Notice that you can use all String object methods on a primitive
    string value; the primitive string will be automatically converted to a String
    object before applying the method.


    Table 4-12.


    The List of Methods of in String.prototype with Their Descriptions


    | Method | Description |

    | --- | --- |

    | `charAt(index)` | Returns the character at the specified `index` as a primitive
    string value |

    | `charCodeAt(index)` | Returns the Unicode value of the character at the specified
    `index` |

    | `concat(arg1, arg2, ...)` | Returns a primitive string concatenating the contents
    of the object and the specified arguments |

    | `indexOf(substring, start)` | Returns the index of the first occurrence of the
    substring in the object. The search starts at `start`. If `start` is not passed,
    the search starts at index 0 |

    | `lastIndexOf(substring, start)` | It works the same way as the `indexOf()` method,
    except that it searches for the `substring` from the end of the string |

    | `localeCompare(target)` | Returns a number. If the string is less than `target`,
    it returns a negative number; if string is greater than `target`, it returns a
    positive number; otherwise, it returns zero |

    | `match(regexp)` | Searches the string for the specified regular expression `regexp`
    and returns the results in an array |

    | `replace(regexp, replacement)` | Searches the string using the regular expression
    `regexp`, replaces the matched substrings with the replacement, and returns the
    result as a primitive string value |

    | `search(regexp)` | Searches the string for the specified regular expression
    and returns the index of the first occurrence. Returns –1 if no match is found
    |

    | `slice(start, end)` | Returns a substring contains characters from `start` and
    `end` indexes in the string where `start` is inclusive and `end` is exclusive.
    If `end` is not specified, it returns all characters from `start`. If `end` is
    negative, the index is counted from the end. `"Hello".slice(1, 2)` returns `"e"`
    and `"Hello".slice(1, -2)` returns `"el"` |

    | `split(delimiter, limit)` | Returns an array by splitting the string around
    the specified `delimiter`. The `limit` is optional and it specifies the maximum
    number of elements returned in the array |

    | `substring(start, end)` | Returns a substring of the string starting at the
    `start` and up to, but not including, the `end`. If either argument is `NaN` or
    negative, it is replaced with zero. If they are larger than the length of the
    string, they are replaced with the length of the string. If `start` is greater
    than `end`, they are swapped. `"Hello".slice(1, 2)` returns `"e"` and `"Hello".slice(1,
    -2)` returns `"H"` |

    | `toLowerCase()` | Returns the lowercase equivalent of the string by replacing
    uppercase characters with the corresponding lowercase characters |

    | `toLocaleLowerCase()` | Works the same as the `toLowerCase()`, except that it
    uses locale specific uppercase to lowercase character mapping |

    | `toUpperCase()` | Returns the uppercase equivalent of the string by replacing
    lowercase characters with the corresponding uppercase characters |

    | `toLocaleUpperCase()` | Works the same as the `toUpperCase()`, except that it
    uses locale specific lowercase to uppercase character mapping |

    | `toString()` | Returns the contents of the String object as a primitive string
    value |

    | `trim()` | Returns a primitive string value by removing the whitespaces from
    the string |

    | `valueOf()` | Same as `toString()` |'
