    ## JKScriptEngineFactory 类


    清单 8-3 包含了 `JKScript` 引擎对 `ScriptEngineFactory` 接口的实现。其中一些方法返回 `"Not Implemented"`
    字符串，因为你并不支持这些方法所暴露的功能。`JKScriptEngineFactory` 类中的代码不言自明。可以通过 `ScriptEngineManager`
    使用 `getNames()` 方法中编码的名称 `jks`、`JKScript` 或 `jkscript` 来获取 `JKScript` 引擎的实例。


    清单 8-3\. JKScript 脚本引擎的 ScriptEngineFactory 实现


    `// JKScriptEngineFactory.java`


    `package com.jdojo.script;`


    `import java.util.ArrayList;`


    `import java.util.Arrays;`


    `import java.util.Collections;`


