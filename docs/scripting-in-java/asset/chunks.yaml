    \ iteration. The `break` statement jumps to the end of the iteration and `switch`\
    \ statement in which it appears. The `return` statement in a function returns\
    \ the control to the caller of the function. Optionally, the `return` statement\
    \ can also return a value to the caller.\n\n### The `with` Statement\n\nNashorn\
    \ executes a script in a context called execution context. It looks up an unqualified\
    \ name in the script using the scope chain associated with the execution context.\
    \ The name is searched in the closest scope first. If it is not found, the search\
