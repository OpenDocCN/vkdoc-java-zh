    When you use the bracket notation, you can use any expression that can be converted
    to the property name as a string. The following snippet of code assigns the value
    0.8 to the `"red Value"` property in two ways:


    `var prop = "red value";`


    `redColor[prop] = 0.8;                   // Using a variable`


    `redColor["red" + " " + "value"] = 0.8;  // Using an expression`


    Consider the following code that defines a `point2D` object with two properties
    named `x` and `y`, and attempts to read a nonexisting property named `z`:


