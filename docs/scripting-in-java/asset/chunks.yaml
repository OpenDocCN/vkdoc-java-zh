    F5`。这将启动调试会话，如图 13-3 所示。如图所示，调试器在第一个断点处停止。在底部，你会看到 `Variables` 窗格打开，其中显示了作用域内所有变量及其值。如果你想查看调试会话的其他详细信息，请使用主菜单
    `Window ➤ Debugging` 下的某个菜单项。如果你关闭了任何调试窗格（例如 `Variables` 窗格），可以使用 `Window ➤ Debugging`
    菜单重新打开它们。


