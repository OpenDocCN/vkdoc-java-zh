    问候应用会显示一个窗口，如图 11-4 所示。输入姓名后按下 `Enter` 键或点击 `Say Hello` 按钮，便会显示一条包含问候语的消息。


    ![A978-1-4842-0713-0_11_Fig4_HTML.jpg](img/A978-1-4842-0713-0_11_Fig4_HTML.jpg)


    图 11-4.


    正在运行的问候 JavaFX 应用


    在 Nashorn 中开发 JavaFX 应用要容易得多。在脚本中，你可以使用属性来调用 Java 对象的 getter 和 setter 方法。你可以直接访问所有
    Java 对象的属性，而不仅仅是 JavaFX 对象。例如，在 Java 中你需要编写 `root.setSpacing(5)`，而在 Nashorn 中你可以直接编写
    `root.spacing = 5`。


    为按钮添加事件处理器也更加简单。你可以将一个匿名函数设置为按钮的事件处理器。请注意，你可以使用 `onAction` 属性来设置事件处理器，而无需调用 `Button`
    类的 `setOnAction()` 方法。以下代码片段展示了如何使用函数引用 `sayHello` 为按钮设置 `ActionEvent` 处理器：


    `// 为 Say Hello 按钮添加事件处理器`


    `sayHelloBtn.onAction = sayHello`


    请注意，在示例中，你在 `start()` 函数内部使用了一个嵌套函数 `sayHello()`。该函数的引用被用作事件处理器。事件处理器接收一个参数，而
    `sayHello()` 函数中的 `evt` 形式参数就是这个事件对象。


    ## 总结


    Nashorn 中的 `jjs` 命令行工具支持启动用脚本编写的 JavaFX 应用。`–fx` 选项与 `jjs` 一起使用，用于启动 JavaFX 应用。JavaFX
    应用的脚本可以包含 `init()`、`start()` 和 `stop()` 函数，这些函数对应于 JavaFX `Application` 类的 `init()`、`start()`
    和 `stop()` 方法。Nashorn 会按照与 JavaFX 应用中相同的顺序调用这些函数。


    `start()` 函数会接收到一个对主舞台（primary stage）的引用。如果你没有提供 `start()` 函数，那么整个脚本将被视为 `start()`
    函数。Nashorn 提供了一个名为 `$STAGE` 的全局对象，它是对主舞台的引用。如果你没有提供 `start()` 函数，则需要使用 `$STAGE`
    全局变量来访问主舞台。如果你既没有提供 `start()` 方法，也没有显示主舞台，Nashorn 将为你调用 `$STAGE.show()` 方法。


    # 12. Nashorn 的 Java API


    在本章中，你将学习：


    *   什么是 Nashorn 的 Java API

    *   如何直接实例化 Nashorn 引擎

    *   如何在 Java 代码和命令行中向 Nashorn 引擎传递选项

    *   如何在 Nashorn 引擎中的脚本上下文之间共享全局变量

    *   如何在 Java 代码中添加、更新、删除和读取脚本对象的属性

    *   如何在 Java 代码中创建脚本对象并调用其方法

    *   如何从 Java 代码调用脚本函数

    *   如何将脚本日期转换为 Java 日期


    ## 什么是 Nashorn 的 Java API？


    在 Nashorn 脚本中使用 Java 类非常直接。有时你可能希望在 Java 代码中使用 Nashorn 对象。你可以将 Nashorn 对象传递给 Java
    代码，或者 Java 代码可以评估 Nashorn 脚本并获取 Nashorn 对象的引用。当 Nashorn 对象跨越边界（脚本到 Java）时，它们需要被表示为
    Java 类的对象，并且你应该能够像使用任何其他 Java 对象一样使用它们。


    如果你的应用仅使用 Nashorn，为了充分利用 Nashorn 引擎，你可能希望使用 Nashorn 中可用的选项和扩展。你将需要在 Java 代码中实例化
    Nashorn 引擎，使用特定于 Nashorn 引擎的类，而不是使用 Java 脚本 API 中的类。


    Nashorn 的 Java API 提供了 Java 类和接口，让你能够在 Java 代码中直接处理 Nashorn 脚本引擎和 Nashorn 对象。图
    12-1 描绘了当你处理 Nashorn 引擎时，在客户端代码中应该使用的那些类和接口的类图。它们位于 `jdk.nashorn.api.scripting`
    包中。


    ![A978-1-4842-0713-0_12_Fig1_HTML.jpg](img/A978-1-4842-0713-0_12_Fig1_HTML.jpg)


    图 12-1.


    jdk.nashorn.api.scripting 包中 Nashorn Java API 的类图


    请注意，Nashorn 脚本引擎在内部使用了其他包中的许多其他类。但是，除了 `jdk.nashorn.api.scripting` 包中的类之外，你不应该在应用中直接使用它们。[`wiki.openjdk.java.net/display/Nashorn/Nashorn+jsr223+engine+notes`](https://wiki.openjdk.java.net/display/Nashorn/Nashorn+jsr223+engine+notes)
    上的网页包含了 `jdk.nashorn.api.scripting` 包的文档链接。


    注意


    `jdk.nashorn.api.scripting` 包中的 `ClassFilter` 接口是在 JDK8u40 中添加的，该版本计划于 2015 年第一季度末发布。如果你想更早使用此接口，则需要下载
    JDK8u40 的早期访问构建版本。


    我将在后续章节中详细讨论一些特定于 Nashorn 的 Java 类和接口。表 12-1 列出了 `jdk.nashorn.api.scripting` 包中的类和接口及其描述。


    表 12-1.


    与 Nashorn 脚本引擎一起使用的 Java 类/接口列表


    | 类/接口 | 描述 |

    | --- | --- |

    | `NashornScriptEngineFactory` | 这是 Nashorn 引擎的脚本引擎工厂实现。当你想要创建使用 Nashorn 特定选项和扩展的
    Nashorn 引擎时，需要实例化此类。 |

    | `NashornScriptEngine` | 这是 Nashorn 引擎的脚本引擎实现类。你不直接实例化此类。其实例是通过 `NashornScriptEngineFactory`
    对象的 `getScriptEngine()` 方法获得的。 |

    | `NashornException` | 这是从 Nashorn 脚本抛出的所有异常的基础异常类。当你使用 Java 脚本 API 时，你的 Java
    代码会收到一个 `ScriptException` 类的实例，该实例将是 `NashornException` 的包装器。如果你直接从 Java 代码访问脚本（例如，通过在脚本中实现
    Java 接口并在 Java 代码中使用该接口的实例），则可能会在 Java 代码中直接抛出 `NashornException` 的实例。此类包含许多方法，使你可以访问脚本错误的详细信息，例如行号、列号、脚本的错误对象等。
    |

    | `ClassFilter` | `ClassFilter` 是一个接口。你可以使用其实例来限制 Nashorn 脚本中某些或所有 Java 类的可用性。当你使用
    `NashornScriptEngineFactory` 实例化 `NashornScriptEngine` 时，需要传递此接口的一个实例。 |

    | `ScriptUtils` | 一个旨在 Nashorn 脚本中使用的工具类。 |

    | `URLReader` | 读取 URL 的内容。它继承自 `java.io.Reader` 类。 |

    | `JSObject` | 此接口的实例表示 Java 代码中的 Nashorn 对象。如果你想将一个 Java 对象传递给 Nashorn 脚本，并且该对象应被视为
    Nashorn 对象，则需要传递此接口的一个实例。你可以在 Nashorn 脚本中使用方括号表示法来访问和设置此类 Java 对象的属性。 |

    | `AbstractJSObject` | 这是一个实现 `JSObject` 接口的抽象类。 |

    | `ScriptObjectMirror` | 这是一个包装 Nashorn 脚本对象的镜像对象。它继承自 `AbstractJSObject` 类并实现
    `Bindings` 接口。当 Java 代码从脚本接收 Nashorn 对象时，该脚本对象在被传递给 Java 代码之前会被包装在 `ScriptObjectMirror`
    实例中。 |

