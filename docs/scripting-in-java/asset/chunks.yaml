    ## 使用 jjs 命令行工具


    在上一节中，你了解了如何从 Java 程序中使用 Nashorn 脚本引擎。在本节中，我将向你展示如何使用 `jjs` 命令行工具执行相同的任务。该工具存储在
    `JDK_HOME\bin` 和 `JRE_HOME\bin` 目录中。例如，如果你在 Windows 上将 JDK8 安装在 `C:\java8` 目录中，那么
    `jjs` 工具的路径将是 `C:\java8\bin\jjs.exe`。`jjs` 工具可用于执行文件中的 Nashorn 脚本，或以交互方式执行脚本。


