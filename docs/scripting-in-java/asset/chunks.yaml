    ### Searching an Array


    Two methods, `indexOf()` and `lastIndexOf()`, let you search an array for a specified
    element. Their signatures are:


    *   `indexOf(searchElement, fromIndex)`

    *   `lastIndexOf(searchElement, fromIndex)`


    The `indexOf()` method searches for the specified `searchElement` in the array
    starting at `fromIndex`. If `fromIndex` is not specified, 0 is assumed, meaning
    that the entire array is searched. The method returns the index of the first element
    in the array that is equal to the `searchElement` using the `===` operator. If
    the `searchElement` is not found, -1 is returned.


    The `lastIndexOf()` method works the same as the `indexOf()` method, except that
    it performs the search from the end to the beginning. That is, it returns the
    index of the last found element in the array that is equal to the `searchElement`.
    The following code shows how to use these methods:


    `var ids = [10, 20, 30, 20];`


    `print("ids = " + ids);`


    `print("ids.indexOf(20) = " + ids.indexOf(20));`


    `print("ids.indexOf(20, 2) = " + ids.indexOf(20, 2));`


    `print("ids.lastIndexOf(20) = " + ids.lastIndexOf(20));`


    `print("ids.indexOf(25) = " + ids.lastIndexOf(25));`


    `ids = 10,20,30,20`


    `ids.indexOf(20) = 1`


    `ids.indexOf(20, 2) = 3`


    `ids.lastIndexOf(20) = 3`


    `ids.indexOf(25) = -1`


    ### Evaluating Predicates


    You can check if a predicate evaluates to `true` for all or some of the elements
    in an array. The following two methods let you perform this:


    *   `every(predicate, thisArg)`

    *   `some(predicate, thisArg)`


    The first argument, `predicate`, is a function that is called once for every existing
    elements in the array. The function is passed three arguments: the value of the
    element, the index of the element, and the array object. The second argument,
    `thisArg`, if specified, is used as the `this` value for the function invocation
    specified by `predicate`.


    The `every()` method returns `true` if the specified `predicate` function returns
    a truthy value for every existing elements in the array. Otherwise, it returns
    `false`. The method returns `false` as soon as `predicate` returns a falsy value
    for an element.


    The `some()` method returns `true` if `predicate` returns a truthy value for at
    least one element. Otherwise, it returns `false`. The method returns `true` as
    soon as `predicate` returns a truthy value for an element. The following example
    shows how to check if an array of numbers contains any/all even/odd numbers:


    `var ids = [10, 20, 30, 20];`


    `print("ids = " + ids);`


    `var hasAnyEven = ids.some(function (value, index, array) {`


    `return value %2 === 0;`


    `});`


    `var hasAllEven = ids.every(function (value, index, array) {`


    `return value %2 === 0;`


    `});`


    `var hasAnyOdd = ids.some(function (value, index, array) {`


    `return value %2 === 1;`


    `});`


    `var hasAllOdd = ids.every(function (value, index, array) {`


    `return value %2 === 1;`


    `});`


    `print("ids has any even numbers: " + hasAnyEven);`


    `print("ids has all even numbers: " + hasAllEven);`


    `print("ids has any odd numbers: " + hasAnyOdd);`


    `print("ids has all odd numbers: " + hasAllOdd);`


    `ids = 10,20,30,20`


    `ids has any even numbers: true`


    `ids has all even numbers: true`


    `ids has any odd  numbers: false`


    `ids has all odd  numbers: false`


    ## Converting an Array to a String


    You can convert an array to a string in any way you want. However, the `toString()`
    and `toLocaleString()` methods provide two built-in implementations to convert
    the array elements to a string. The `toString()` method returns a string that
    is returned by calling the `join()` method on the array without specifying any
    separator. That is, it returns the list of elements as a string where elements
    are separated by commas. The `toLocaleString()` method calls the `toLocaleString()`
    method of all array elements, concatenates the returned strings using a local-specific
    separator and return the final string. You have been using the `toString()` method
    of the `Array` object whenever you used the array object as an argument to the
    `print()` method or used it with the string concatenation operator.'
