    ## 总结


    `ScriptEngine` 可以执行 `String` 和 `Reader` 中的脚本。`ScriptEngine` 的 `eval()` 方法用于执行脚本。该方法已被重载，共有六个版本。它允许你将脚本作为第一个参数传递，并将参数作为第二个参数传递给引擎。


    `ScriptEngine` 的 `eval()` 方法用于执行脚本。你可以向脚本传递参数，并从脚本中读取值返回给 Java 程序。有多种方式可以从 Java
    程序向脚本传递参数。你可以使用 `ScriptEngine` 的 `put(String key, Object value)` 方法向脚本传递一个名为 key
    的参数。你可以使用 `get(String key)` 方法获取脚本中存储的名为 `key` 的全局变量。

