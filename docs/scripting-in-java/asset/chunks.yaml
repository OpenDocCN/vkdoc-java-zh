    *   `for..each..in` 语句


    Nashorn 中的 `while`、`do-while` 和 `for` 语句与 Java 中的工作方式相同。我不会详细讨论它们，因为作为 Java 开发者，你知道如何使用它们。以下代码演示了它们的用法：


    `// 使用 while、do-while 和 for 语句打印前 3 个自然数`


