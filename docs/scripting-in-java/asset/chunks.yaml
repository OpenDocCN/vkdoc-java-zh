    ## 摘要


    脚本语言是一种编程语言，它使你能够编写由称为脚本引擎（或解释器）的运行时环境评估（或解释）的脚本。脚本是使用脚本语言的语法编写的一系列字符，并作为由解释器执行的程序的源代码。Java
    脚本 API 允许你从 Java 应用程序执行任何可编译为 Java 字节码的脚本语言编写的脚本。JDK 6 和 7 附带了一个名为 Rhino JavaScript
    引擎的脚本引擎。在 JDK 8 中，Rhino JavaScript 引擎已被名为 Nashorn 的脚本引擎取代。


    Nashorn 引擎可以通过两种方式使用：它可以嵌入到 JVM 中并从 Java 程序直接调用，或者可以使用 `jjs` 命令行工具从命令提示符调用。


    Nashorn 提供了三个在标准输出上打印文本的函数：`print()`、`printf()` 和 `echo()`。`print()` 函数接受可变数量的参数；它会打印所有参数，用空格分隔，并在末尾打印一个新行。`printf()`
    函数打印格式化文本；其工作方式与 Java 编程语言中 printf 风格的格式化相同。`echo()` 函数的工作方式与 `print()` 函数相同，区别在于前者仅在脚本模式下调用
    Nashorn 引擎时可用。


    脚本使用 `ScriptEngine` 接口的实例（即脚本引擎）来执行。`ScriptEngine` 接口的实现者还提供了 `ScriptEngineFactory`
    接口的实现，其职责是创建脚本引擎的实例并提供有关脚本引擎的详细信息。`ScriptEngineManager` 类为脚本引擎提供了发现和实例化机制。`ScriptManager`
    维护一个键值对映射，作为 `Bindings` 接口的实例，该映射由其创建的所有脚本引擎共享。


    # 2. 执行脚本


    在本章中，你将学习：


    *   如何使用 `ScriptEngine` 的 `eval()` 方法执行脚本

    *   如何将参数从 Java 代码传递给 Nashorn 引擎

    *   如何将参数从 Nashorn 引擎传递给 Java


    ## 使用 eval() 方法


    `ScriptEngine` 可以执行 `String` 和 `Reader` 中的脚本。使用 `Reader`，你可以执行存储在网络或文件中的脚本。使用
    `ScriptEngine` 接口的 `eval()` 方法的以下版本之一来执行脚本：


    *   `Object eval(String script)`

    *   `Object eval(Reader reader)`

    *   `Object eval(String script, Bindings bindings)`

    *   `Object eval(Reader reader, Bindings bindings)`

    *   `Object eval(String script, ScriptContext context)`

    *   `Object eval(Reader reader, ScriptContext context)`


    `eval()` 方法的第一个参数是脚本的源代码。第二个参数允许你将信息从宿主应用程序传递到脚本引擎，这些信息可以在脚本执行期间使用。


    在第 1 章中，你看到了如何使用 `String` 对象通过 `eval()` 方法的第一个版本来执行脚本。在本章中，你将把脚本存储在文件中，并使用 `Reader`
    对象作为脚本的源代码，这将使用 `eval()` 方法的第二个版本。下一节将讨论 `eval()` 方法的其他四个版本。通常，脚本文件的扩展名为 `.js`。


    清单 2-1 显示了一个名为 `helloscript.js` 的文件的内容。它只包含一条 Nashorn 语句，用于在标准输出上打印一条消息。


    清单 2-1. helloscript.js 文件的内容


    `// helloscript.js`


    `// 打印一条消息`


    `print(''来自 JavaScript 的问候！'');`


    清单 2-2 包含一个 Java 程序，该程序执行存储在 `helloscript.js` 文件中的脚本，该文件应存储在当前目录中。如果未找到脚本文件，程序将打印期望的
    `helloscript.js` 文件的完整路径。如果在执行脚本文件时遇到问题，请尝试在 `main()` 方法中使用绝对路径，例如在 Windows 上使用
    `C:\scripts\helloscript.js`，假设 `helloscript.js` 文件保存在 `C:\scripts` 目录中。


    清单 2-2. 执行存储在文件中的脚本


    `// ReaderAsSource.java`


    `package com.jdojo.script;`


    `import java.io.IOException;`


    `import java.io.Reader;`


    `import java.nio.file.Files;`


    `import java.nio.file.Path;`


    `import java.nio.file.Paths;`


    `import javax.script.ScriptEngine;`


    `import javax.script.ScriptEngineManager;`


    `import javax.script.ScriptException;`


    `public class ReaderAsSource {`


    `public static void main(String[] args) {`


    `// 构造脚本文件路径`


    `String scriptFileName = "helloscript.js";`


    `Path scriptPath = Paths.get(scriptFileName);`


    `// 确保脚本文件存在。如果不存在，则打印脚本文件的完整路径并终止程序。`


