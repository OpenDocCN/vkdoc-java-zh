    error. Like Java, Nashorn lets you handle the errors that are thrown. You will
    need to use a `try-catch-finally` statement to handle the thrown errors, which
    I will discuss in the next section.


    ### The try Statement


    The `try-catch-finally` statement in Nashorn works the same way as it works in
    Java. The `try` block contains one or more statements to execute that may throw
    errors. If the statements throw an error, the control is transferred to the `catch`
    block. Finally, the statements in the `finally` block are executed. Like in Java,
