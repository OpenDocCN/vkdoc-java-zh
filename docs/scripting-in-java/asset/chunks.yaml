    ```\n\n输出：\n```\nids[0] = 10\nids[1] = 20\nids[2] = -116\n```\n\n以下代码从`Array`对象创建`Int32Array`并读取所有元素：\n\
    \n```javascript\n// An Array object\nvar ids = [10, 20, 30];\n\n// Create an Int32Array\
    \ from ids\nvar typedIds = new Int32Array(ids);\n\n// Read elements from typedids\n\
    for(var i = 0, len = typedIds.length; i < len; i++) {\n    print(\"typedIds[\"\
    \ + i + \"] = \" + typedIds[i]);\n}\n```\n\n输出：\n```\ntypedIds[0] = 10\ntypedIds[1]\
    \ = 20\ntypedIds[2] = 30\n```\n\n也可以使用同一个`ArrayBuffer`存储不同类型的值。回想一下，`ArrayBuffer`上的视图是类型化的，而`ArrayBuffer`本身不是；它只包含原始二进制数据。以下代码创建一个8字节的`ArrayBuffer`，在前4个字节中存储一个32位有符号整数，在后4个字节中存储一个32位有符号浮点数：\n\
    \n```javascript\n// Create an 8-byte buffer\nvar buffer = new ArrayBuffer(8);\n\
    \n// Create an Int32Array view for the first 4 bytes. byteOffset is 0\n// and\
    \ element count is 1\nvar id = new Int32Array(buffer, 0, 1);\n\n// Create a Float32Array\
    \ view for the second 4 bytes. The first 4 bytes\n// will be used for integer\
    \ value. byteOffset is 4 and element count is 1\nvar salary = new Float32Array(buffer,\
    \ 4, 1);\n\n// Use the Int32Array view to store an integer\nid[0] = 1001;\n\n\
    // Use the Float32Array view to store a floating-point number\nsalary[0] = 129019.50;\n\
    \n// Read and print the two values using the two views\nprint(\"id = \" + id[0]);\n\
