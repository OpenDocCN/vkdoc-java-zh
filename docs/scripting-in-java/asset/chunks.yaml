  trans: '

    ## 类型化数组


    Nashorn 中的类型化数组是类数组对象。它们提供了对称为缓冲区的原始二进制数据的视图。你可以对同一个缓冲区拥有多个类型化视图。假设你有一个 4 字节的缓冲区。你可以拥有该缓冲区的
    8 位有符号整数类型化数组视图，它将表示四个 8 位有符号整数。同时，你也可以拥有同一个缓冲区的 32 位无符号整数类型化数组视图，它可以表示一个 32 位无符号整数。


    提示


    类型化数组是一种类数组对象，它提供了对内存中原始二进制数据的类型化视图。Nashorn 中类型化数组实现的规范可以在 [`https://www.khronos.org/registry/typedarray/specs/latest/`](https://www.khronos.org/registry/typedarray/specs/latest/)
    找到。


    类型化数组中的缓冲区由一个 `ArrayBuffer` 对象表示。直接或间接地使用 `ArrayBuffer` 对象，你可以创建一个类型化数组视图。一旦你拥有了一个类型化数组视图，你就可以使用类数组语法，写入或读取该类型化数组视图支持的特定类型的数据。在下一节中，我将讨论如何使用
    `ArrayBuffer` 对象。在随后的章节中，我将讨论不同类型的类型化数组视图（或简称为类型化数组）。


    ### ArrayBuffer 对象


    一个 `ArrayBuffer` 对象表示一个固定长度的原始二进制数据缓冲区。`ArrayBuffer` 的内容没有类型。你不能直接修改 `ArrayBuffer`
    中的数据；你必须在其上创建并使用一个类型化视图才能这样做。它包含少量属性和方法，用于将其内容复制到另一个 `ArrayBuffer` 以及查询其大小。


    `ArrayBuffer` 构造函数接受一个参数，即缓冲区的字节长度。`ArrayBuffer` 对象的长度在创建后无法更改。该对象有一个名为 `byteLength`
    的只读属性，表示缓冲区的长度。以下语句创建一个 32 字节的缓冲区并打印其长度：


    `// 创建一个 32 字节的 ArrayBuffer`


    `var buffer = new ArrayBuffer(32);`


    `// 将 32 赋值给 len`


    `var len = buffer.byteLength;`


    提示


    当你创建一个 `ArrayBuffer` 时，其内容会被初始化为零。在创建时，无法将其内容初始化为非零值。`ArrayBuffer` 中的每个字节使用从零开始的索引。第一个字节的索引为
    0，第二个为 1，第三个为 2，依此类推。


    Nashorn 实现的类型化数组规范在 `ArrayBuffer` 对象中包含一个 `isView(args)` 静态方法。然而，在 Java 8u40 中，Nashorn
    似乎并未实现此方法。已在 [`bugs.openjdk.java.net/browse/JDK-8061959`](https://bugs.openjdk.java.net/browse/JDK-8061959)
    提交了一个错误报告。如果指定的参数表示一个数组缓冲区视图，该方法返回 `true`。例如，如果你将 `Int8Array`、`Int16Array`、`DataView`
    等对象传递给此方法，它会返回 `true`，因为这些对象表示一个数组缓冲区视图。如果你将一个简单对象或原始值传递给此方法，它会返回 `false`。以下代码展示了如何使用此方法。请注意，截至
    Java 8u40，此方法在 Nashorn 中不存在，代码将抛出异常：


    `// 创建一个长度为 4 的数组缓冲区视图`


    `var int8View = new Int8Array(4);`


    `// 将 true 赋值给 isView1`


    `var isView1 = ArrayBuffer.isView(int8View);`


    `// 将 false 赋值给 isView2`


    `var isView2 = ArrayBuffer.isView({});`


    `ArrayBuffer` 对象包含一个 `slice(start, end)` 方法，该方法创建并返回一个新的 `ArrayBuffer`，其内容是原始
    `ArrayBuffer` 从索引 `start`（包含）到 `end`（不包含）的副本。如果 `start` 或 `end` 为负数，则它引用缓冲区末尾的索引。如果未指定
    `end`，则默认为 `ArrayBuffer` 的 `byteLength` 属性。`start` 和 `end` 都被限制在 0 和 `byteLength—1`
    之间。以下代码展示了如何使用 `slice()` 方法：


    `// 创建一个 4 字节的 ArrayBuffer。字节的索引为 0、1、2 和 3`


    `var buffer = new ArrayBuffer(4);`


    `// 在此处使用某个类型化视图操作缓冲区...`


    `// 将 buffer 的最后 2 个字节复制到 buffer2`


    `var buffer2 = buffer.slice(2, 4);`


    `// 将 buffer 中从索引 1 到末尾（最后 3 个字节）的字节复制到 buffer3`


    `var buffer3 = buffer.slice(1);`


    ### ArrayBuffer 的视图


    `ArrayBuffer` 有两种类型的视图：


    *   类型化数组视图

    *   DataView 视图

