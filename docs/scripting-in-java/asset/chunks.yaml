    reader and writers in a context control input source and output destinations of
    the script, respectively. For example, by setting a file writer as a writer, you
    can send all outputs from a script to a file.


    Each script engine maintains a default script context, which it uses to execute
    scripts. So far, you have executed several scripts without providing script contexts.
    In those cases, script engines were using their default script contexts to execute
    scripts. In this section, I will cover how to use an instance of the `ScriptContext`
    interface by itself. In the next section, I will cover how an instance of the
    `ScriptContext` interface is passed to a `ScriptEngine` during script execution.


    You can create an instance of the `ScriptContext` interface using the `SimpleScriptContext`
    class, like so:


    `// Create a script context`


    `ScriptContext ctx = new SimpleScriptContext();`


    An instance of the `SimpleScriptContext` class maintains two instances of `Bindings`:
    one for engine scope and one for global scope. The `Bindings` in the engine scope
    is created when you create the instance of the `SimpleScriptContext`. To work
    with the global scope `Bindings`, you will need to create an instance of the `Bindings`
    interface.


    By default, the `SimpleScriptContext` class initializes the input reader, the
    output writer, and the error writer for the context to the standard input `System.in`,
    the standard output `System.out`, and standard error output `System.err`, respectively.
    You can use the `getReader()`, `getWriter()`, and `getErrorWriter()` methods of
    the `ScriptContext` interface to get the references of the reader, writer, and
    the error writer from the `ScriptContext`, respectively. Setter methods are also
    provided to set a reader and writers. The following snippet of code shows how
    to obtain the reader and writers. It also shows how to set a writer to a `FileWriter`
    to write the script output to a file:


    `// Get the reader and writers from the script context`


    `Reader inputReader = ctx.getReader();`


    `Writer outputWriter = ctx.getWriter();`


    `Writer errWriter = ctx.getErrorWriter();`


    `// Write all script outputs to an out.txt file`


    `Writer fileWriter = new FileWriter("out.txt");`


    `ctx.setWriter(fileWriter);`


    After you create a `SimpleScriptContext`, you can start storing key-value pairs
    in the engine scope `Bindings` because an empty `Bindings` in the engine scope
    is created when you create the `SimpleScriptContext` object. The `setAttribute()`
    method is used to add a key-value pair to a `Bindings`. You must provide the key
    name, value, and the scope for the `Bindings`. The following snippet of code adds
    three key-value pairs:


    `// Add three key-value pairs to the engine scope bindings`


    `ctx.setAttribute("year", 1969, ScriptContext.ENGINE_SCOPE);`


    `ctx.setAttribute("month", 9, ScriptContext.ENGINE_SCOPE);`


    `ctx.setAttribute("day", 19, ScriptContext.ENGINE_SCOPE);`


    If you want to add key-value pairs to a `Bindings` in global scope, you will need
    to create and set the `Bindings` first, like so:


    `// Add a global scope Bindings to the context`


    `Bindings globalBindings = new SimpleBindings();`


    `ctx.setBindings(globalBindings, ScriptContext.GLOBAL_SCOPE);`


    Now you can add key-value pairs to the `Bindings` in global scope using the `setAttribute()`
    method, like so:


    `// Add two key-value pairs to the global scope bindings`


    `ctx.setAttribute("year", 1982, ScriptContext.GLOBAL_SCOPE);`


    `ctx.setAttribute("name", "Boni", ScriptContext.GLOBAL_SCOPE);`


    At this point, you can visualize the state of the `ScriptContext` instance as
    shown in Figure [3-1](#A978-1-4842-0713-0_3_Chapter.html#Fig1).


    ![A978-1-4842-0713-0_3_Fig1_HTML.jpg](A978-1-4842-0713-0_3_Fig1_HTML.jpg)


    Figure 3-1.


    A pictorial view of an instance of the SimpleScriptContext class


    You can perform several operations on a `ScriptContext`. You can set a different
    value for an already stored key using the `setAttribute(String name, Object value,
    int scope)` method. You can remove a key-value pair using the `removeAttribute(String
    name, int scope)` method for a specified key and a scope. You can get the value
    of a key in the specified scope using the `getAttribute(String name`, `int scope)`
    method.


    The most interesting thing that you can do with a `ScriptContext` is to retrieve
    a key value without specifying its scope using its `getAttribute(String name)`
    method. A `ScriptContext` searches for the key in the engine scope `Bindings`
    first. If it is not found in the engine scope, the `Bindings` in the global scope
    is searched. If the key is found in these scopes, the corresponding value from
    the scope, in which it is found first, is returned. If neither scope contains
    the key, `null` is returned.


    In your example, you have stored the key named `year` in the engine scope as well
    as in the global scope. The following snippet of code returns 1969 for the key
    `year` from the engine scope as the engine scope is searched first. The return
    type of the `getAttribute()` method is `Object`.


    `// Get the value of the key year without specifying the scope.`


    `// It returns 1969 from the Bindings in the engine scope.`


    `int yearValue = (Integer)ctx.getAttribute("year");`


    You have stored the key named `name` only in the global scope. If you attempt
    to retrieve its value, the engine scope is searched first, which does not return
    a match. Subsequently, the global scope is searched and the value `"Boni"` is
    returned, as shown:


    `// Get the value of the key named name without specifying the scope.`


    `// It returns "Boni" from the Bindings in the global scope.`


    `String nameValue = (String)ctx.getAttribute("name");`


    You can also retrieve the value of a key in a specific scope. The following snippet
    of code retrieves values for the key “`year`” from the engine scope and the global
    scope:


    `// Assigns 1969 to engineScopeYear and 1982 to globalScopeYear`


    `int engineScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.ENGINE_SCOPE);`


    `int globalScopeYear = (Integer)ctx.getAttribute("year", ScriptContext.GLOBAL_SCOPE);`


    Tip


    The Java Scripting API defines only two scopes: engine and global. A subinterface
    of the `ScriptContext` interface may define additional scopes. The `getScopes()`
    method of the `ScriptContext` interface returns a list of supported scopes as
    a `List<Integer>`. Note that a scope is represented as an integer. The two constants,
    `ENGINE_SCOPE` and `GLOBAL_SCOPE` in the `ScriptContext` interface, are assigned
    values 100 and 200, respectively. When a key is searched in multiple `Bindings`
    occurring in multiple scopes, the scope with the lower integer value is searched
    first. Because the value 100 for the engine scope is lower than the value 200
    for the global scope, the engine scope is searched for a key first when you do
    not specify the scope.'
