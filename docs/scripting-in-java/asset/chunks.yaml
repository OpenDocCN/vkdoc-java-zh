    \ passed to the `System.out.println()` Java method that accepts a `java.lang.String`\
    \ type. JavaScript takes care of the conversion from a JavaScript type to a Java\
    \ type automatically in such cases.\n\n### Using the JavaImporter Object\n\nIn\
    \ JavaScript, you can use the simple names of classes using a `JavaImporter` object\
    \ in a `with` statement. Please refer to Chapter 4 for more details in the `with`\
    \ statement. `JavaImporter` is a Nashorn function object that can be used as a\
    \ function or a constructor. It accepts a list of Java packages and classes. You\
    \ can create a `JavaImporter` object as shown:\n\n```\n// Import all classes from\
    \ the java.lang package\nvar langPkg = new JavaImporter(Packages.java.lang);\n\
    \n// Import all classes from the java.lang and java.util packages and the\n//\
