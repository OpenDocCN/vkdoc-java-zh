- fmt: "# Creating and Using Java Objects\n\nUse the `new` operator with a constructor\
    \ to create a new Java object in scripts. The following snippet of code creates\
    \ a `String` object in Nashorn:\n\n```\n// Create a Java String object\nvar JavaString\
    \ = Java.type(\"java.lang.String\");\nvar greeting = new JavaString(\"Hello\"\
    );\n```\n\nAccessing methods and properties of Java objects is similar in most\
    \ scripting languages. Some scripting languages let you invoke getter and setter\
    \ methods on an object using the property name. The following code in Nashorn\
    \ creates a `java.util.Date` object and accesses the object’s method using both\
    \ the property names and the method names. You may get a different output because\
    \ the code operates on the current date:\n\n```\nvar LocalDate = Java.type(\"\
    java.time.LocalDate\");\nvar dt = LocalDate.now();\nvar year = dt.year;      \
    \       // Use as a property\nvar month = dt.month;           // Use as a property\n\
    var date = dt.getDayOfMonth();  // Use as a method\nprint(\"Date:\" + dt);\nprint(\"\
    Year:\" + year + \", Month:\" + month + \", Day:\" + date);\nDate:2014-10-12\n\
    Year:2014, Month:OCTOBER, Day:12\n```\n\nIn JavaScript, you can use the methods\
    \ of Java objects as if they are properties. When you are reading the property\
    \ named `xxx`, JavaScript will automatically call the `getXxx()` method. When\
    \ you are setting the property named `xxx`, the `setXxx()` method will be called.\
    \ The JavaBeans method convention is used to find the corresponding method. For\
    \ example, if you read the `leapYear` property of a `LocalDate` object, the object’s\
    \ `isLeapYear()` method will be called because the property is of the `boolean`\
    \ type.\n\nWhen using JavaScript, it is important to understand the different\
    \ types of `String` objects. A `String` object may be a JavaScript `String` object\
    \ or a Java `java.lang.String` object. JavaScript defines a `length` property\
    \ for its `String` object, whereas Java has a `length()` method for its `java.lang.String`\
    \ class. The following snippet of code shows the difference in creating and accessing\
    \ the length of a JavaScript `String` and a Java `java.lang.String` objects:\n\
    \n```\n// JavaScript String\nvar jsStr = new String(\"Hello JavaScript String\"\
    );\nprint(\"JavaScript String: \" + jsStr);\nprint(\"JavaScript String Length:\
    \ \" + jsStr.length);\n\n// Java String\nvar javaStr = new java.lang.String(\"\
    Hello Java String\");\nprint(\"Java String: \" + javaStr);\nprint(\"Java String\
    \ Length: \" + javaStr.length());\nJavaScript String: Hello JavaScript String\n\
    JavaScript String Length: 23\nJava String: Hello Java String\nJava String Length:\
    \ 17\n```\n\n# Using Overloaded Java Methods\n\nJava resolves the method call\
    \ for an overloaded method at compile time. That is, the Java compiler determines\
    \ the signature of the method that will be called when the code is run. Consider\
    \ the code for a `PrintTest` class shown in Listing 6-1. You may get a different\
    \ output in the second line.\n\nListing 6-1. Using Overloaded Methods in Java\n\
    \n```\n// PrintTest.java\npackage com.jdojo.script;\n\npublic class PrintTest\
    \ {\n    public void print(String str) {\n        System.out.println(\"print(String):\
    \ \" + str);\n    }\n\n    public void print(Object obj) {\n        System.out.println(\"\
    print(Object): \" + obj);\n    }\n\n    public void print(Double num) {\n    \
    \    System.out.println(\"print(Double): \" + num);\n    }\n\n    public static\
    \ void main(String[] args) {\n        PrintTest pt = new PrintTest();\n      \
    \  Object[] list = new Object[]{\"Hello\", new Object(), 10.5};\n        for(Object\
    \ arg : list) {\n            pt.print(arg);\n        }\n    }\n}\nprint(Object):\
    \ Hello\nprint(Object): java.lang.Object@affc70\nprint(Object): 10.5\n```\n\n\
    When the `PrintTest` class is run, all three calls to the `print()` method call\
    \ the same version, `print(Object)` of the `PrintTest` class. When the code is\
    \ compiled, the Java compiler sees the call `pt.print(arg)` as a call to the `print()`\
    \ method with an `Object` type argument (which is the type of `arg`) and therefore\
    \ binds this call to `print(Object)` method.\n\nIn a scripting language, the type\
    \ of a variable is known at runtime, not at compile time. The interpreters of\
    \ scripting languages resolve an overloaded method call appropriately depending\
    \ on the runtime type of the arguments in a method call. The output of the following\
    \ JavaScript code shows that the call to the `print()` method of the `PrintTest`\
    \ class is resolved at runtime depending on the type of the argument. You may\
    \ get a bit different output in the second line:\n\n```\n// JavaScript Code\n\
    // Create an object of the Java class called PrintTest\nvar PrintTest = Java.type(\"\
    com.jdojo.script.PrintTest\");\nvar pt = new PrintTest();\n\n// Create a JavaScript\
    \ array with three elements\nvar list = [\"Hello\", new Object(), 10.5];\n\n//\
    \ Call the overloaded method print() of the PrintTest class\n// passing each object\
    \ in an array at time\nfor each(var element in list) {\n    pt.print(element);\n\
    }\nprint(String): Hello\nprint(Object): jdk.nashorn.internal.scripts.JO@405818\n\
    print(Double): 10.5\n```\n\nJavaScript lets you select a specific version of the\
    \ overloaded method explicitly. You can pass the signature of the overloaded method\
    \ to be invoked with the object reference. The following snippet of code selects\
    \ the `print(Object)` version:\n\n```\n// JavaScript Code\nvar PrintTest = Java.type(\"\
    com.jdojo.script.PrintTest\");\nvar pt = new PrintTest();\npt[\"print(java.lang.Object)\"\
    ](10.5); // Calls print(Object)\npt[\"print(java.lang.Double)\"](10.5); // Calls\
    \ print(Double)\nprint(Object): 10.5\nprint(Double): 10.5\n```\n\n# Using Java\
    \ Arrays\n\nThe way Java arrays can be created in JavaScript differs in Rhino\
    \ and Nashorn. In Rhino, you need to create a Java array using the `newInstance()`\
    \ static method of the `java.lang.reflect.Array` class. This syntax is also supported\
    \ in Nashorn. The following snippet of code shows how to create and access Java\
    \ arrays using the Rhino syntax:\n\n```\n// Create a java.lang.String array of\
    \ 2 elements, populate it, and print\n// the elements. In Rhino, you were able\
    \ to use java.lang.String as\n// the first argument, but in Nashorn, you need\
    \ to use\n// java.lang.String.class instead.\nvar strArray = java.lang.reflect.Array.newInstance(java.lang.String.class,\
    \ 2);\nstrArray[0] = \"Hello\";\nstrArray[1] = \"Array\";\nfor(var i = 0; i <\
    \ strArray.length; i++) {\n    print(strArray[i]);\n}\nHello\nArray\n```\n\nTo\
    \ create primitive type arrays such as `int`, `double`, and so on, you need to\
    \ use their `TYPE` constants for their corresponding wrapper classes, as shown:\n\
    \n```\n// Create an int array of 2 elements, populate it, and print the elements\n\
    var intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE, 2);\n\
    intArray[0] = 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length; i++)\
    \ {\n    print(intArray[i]);\n}\n100\n200\n```\n\nNashorn supports a new syntax\
    \ to create Java arrays. First, create the appropriate Java array type using the\
    \ `Java.type()` method, and then use the familiar `new` operator to create the\
    \ array. The following snippet of code shows how to create a `String[]` of two\
    \ elements in Nashorn:\n\n```\n// Get the java.lang.String[] type\nvar StringArray\
    \ = Java.type(\"java.lang.String[]\");\n\n// Create a String[] array of 2 elements\n\
    var strArray = new StringArray(2);\nstrArray[0] = \"Hello\";\nstrArray[1] = \"\
    Array\";\nfor(var i = 0; i < strArray.length; i++) {\n    print(strArray[i]);\n\
    }\nHello\nArray\n```\n\nNashorn supports creating the arrays of primitive types\
    \ the same way. The following snippet of code creates an `int[]` of two elements\
    \ in Nashorn:\n\n```\n// Get the int[] type\nvar IntArray = Java.type(\"int[]\"\
    );\n\n// Create a int[] array of 2 elements\nvar intArray = new IntArray(2);\n\
    intArray[0] = 100;\nintArray[1] = 200;\nfor(var i = 0; i < intArray.length; i++)\
    \ {\n    print(intArray[i]);\n}\n100\n200\n```\n\nI will discuss working with\
    \ Java and JavaScript arrays in [Chapter 7](#A978-1-4842-0713-0_7_Chapter.html)\
    \ in details."
  raw: '## Creating and Using Java Objects


    Use the `new` operator with a constructor to create a new Java object in scripts.
    The following snippet of code creates a `String` object in Nashorn:


    `// Create a Java String object`


    `var JavaString = Java.type("java.lang.String");`


    `var greeting = new JavaString("Hello");`


    Accessing methods and properties of Java objects is similar in most scripting
    languages. Some scripting languages let you invoke getter and setter methods on
    an object using the property name. The following code in Nashorn creates a `java.util.Date`
    object and accesses the object’s method using both the property names and the
    method names. You may get a different output because the code operates on the
    current date:


    `var LocalDate = Java.type("java.time.LocalDate");`


    `var dt = LocalDate.now();`


    `var year = dt.year;             // Use as a property`


    `var month = dt.month;           // Use as a property`


    `var date = dt.getDayOfMonth();  // Use as a method`


    `print("Date:" + dt);`


    `print("Year:" + year + ", Month:" + month + ", Day:" + date);`


    `Date:2014-10-12`


    `Year:2014, Month:OCTOBER, Day:12`


    In JavaScript, you can use the methods of Java objects as if they are properties.
    When you are reading the property named `xxx`, JavaScript will automatically call
    the `getXxx()` method. When you are setting the property named `xxx`, the `setXxx()`
    method will be called. The JavaBeans method convention is used to find the corresponding
    method. For example, if you read the `leapYear` property of a `LocalDate` object,
    the object’s `isLeapYear()` method will be called because the property is of the
    `boolean` type.


    When using JavaScript, it is important to understand the different types of `String`
    objects. A `String` object may be a JavaScript `String` object or a Java `java.lang.String`
    object. JavaScript defines a `length` property for its `String` object, whereas
    Java has a `length()` method for its `java.lang.String` class. The following snippet
    of code shows the difference in creating and accessing the length of a JavaScript
    `String` and a Java `java.lang.String` objects:


    `// JavaScript String`


    `var jsStr = new String("Hello JavaScript String");`


    `print("JavaScript String: " + jsStr);`


    `print("JavaScript String Length: " + jsStr.length);`


    `// Java String`


    `var javaStr = new java.lang.String("Hello Java String");`


    `print("Java String: " + javaStr);`


    `print("Java String Length: " + javaStr.length());`


    `JavaScript String: Hello JavaScript String`


    `JavaScript String Length: 23`


    `Java String: Hello Java String`


    `Java String Length: 17`


    ## Using Overloaded Java Methods


    Java resolves the method call for an overloaded method at compile time. That is,
    the Java compiler determines the signature of the method that will be called when
    the code is run. Consider the code for a `PrintTest` class shown in Listing 6-1\.
    You may get a different output in the second line.


    Listing 6-1\. Using Overloaded Methods in Java


    `// PrintTest.java`


    `package com.jdojo.script;`


    `public class PrintTest {`


    `public void print(String str) {`


    `System.out.println("print(String): " + str);`


    `}`


    `public void print(Object obj) {`


    `System.out.println("print(Object): " + obj);`


    `}`


    `public void print(Double num) {`


    `System.out.println("print(Double): " + num);`


    `}`


    `public static void main(String[] args) {`


    `PrintTest pt = new PrintTest();`


    `Object[] list = new Object[]{"Hello", new Object(), 10.5};`


    `for(Object arg : list) {`


    `pt.print(arg);`


    `}`


    `}`


    `}`


    `print(Object): Hello`


    `print(Object): java.lang.Object@affc70`


    `print(Object): 10.5`


    When the `PrintTest` class is run, all three calls to the `print()` method call
    the same version, `print(Object)` of the `PrintTest` class. When the code is compiled,
    the Java compiler sees the call `pt.print(arg)` as a call to the `print()` method
    with an `Object` type argument (which is the type of `arg`) and therefore binds
    this call to `print(Object)` method.


    In a scripting language, the type of a variable is known at runtime, not at compile
    time. The interpreters of scripting languages resolve an overloaded method call
    appropriately depending on the runtime type of the arguments in a method call.
    The output of the following JavaScript code shows that the call to the `print()`
    method of the `PrintTest` class is resolved at runtime depending on the type of
    the argument. You may get a bit different output in the second line:


    `// JavaScript Code`


    `// Create an object of the Java class called PrintTest`


    `var PrintTest = Java.type("com.jdojo.script.PrintTest");`


    `var pt = new PrintTest();`


    `// Create a JavaScript array with three elements`


    `var list = ["Hello", new Object(), 10.5];`


    `// Call the overloaded method print() of the PrintTest class`


    `// passing each object in an array at time`


    `for each(var element in list) {`


    `pt.print(element);`


    `}`


    `print(String): Hello`


    `print(Object): jdk.nashorn.internal.scripts.JO@405818`


    `print(Double): 10.5`


    JavaScript lets you select a specific version of the overloaded method explicitly.
    You can pass the signature of the overloaded method to be invoked with the object
    reference. The following snippet of code selects the `print(Object)` version:


    `// JavaScript Code`


    `var PrintTest = Java.type("com.jdojo.script.PrintTest");`


    `var pt = new PrintTest();`


    `pt["print(java.lang.Object)"](10.5); // Calls print(Object)`


    `pt["print(java.lang.Double)"](10.5); // Calls print(Double)`


    `print(Object): 10.5`


    `print(Double): 10.` `5`


    ## Using Java Arrays


    The way Java arrays can be created in JavaScript differs in Rhino and Nashorn.
    In Rhino, you need to create a Java array using the `newInstance()` static method
    of the `java.lang.reflect.Array` class. This syntax is also supported in Nashorn.
    The following snippet of code shows how to create and access Java arrays using
    the Rhino syntax:


    `// Create a java.lang.String array of 2 elements, populate it, and print`


    `// the elements. In Rhino, you were able to use java.lang.String as`


    `// the first argument, but in Nashorn, you need to use`


    `// java.lang.String.class instead.`


    `var strArray = java.lang.reflect.Array.newInstance(java.lang.String.class, 2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    To create primitive type arrays such as `int`, `double`, and so on, you need to
    use their `TYPE` constants for their corresponding wrapper classes, as shown:


    `// Create an int array of 2 elements, populate it, and print the elements`


    `var intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE, 2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    Nashorn supports a new syntax to create Java arrays. First, create the appropriate
    Java array type using the `Java.type()` method, and then use the familiar `new`
    operator to create the array. The following snippet of code shows how to create
    a `String[]` of two elements in Nashorn:


    `// Get the java.lang.String[] type`


    `var StringArray = Java.type("java.lang.String[]");`


    `// Create a String[] array of 2 elements`


    `var strArray = new StringArray(2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    Nashorn supports creating the arrays of primitive types the same way. The following
    snippet of code creates an `int[]` of two elements in Nashorn:


    `// Get the int[] type`


    `var IntArray = Java.type("int[]");`


    `// Create a int[] array of 2 elements`


    `var intArray = new IntArray(2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    I will discuss working with Java and JavaScript arrays in [Chapter 7](#A978-1-4842-0713-0_7_Chapter.html)
    in details.'
  trans: '

    ## 创建和使用 Java 对象


    在脚本中使用 `new` 运算符和构造器来创建新的 Java 对象。以下代码片段在 Nashorn 中创建了一个 `String` 对象：


    `// 创建一个 Java String 对象`


    `var JavaString = Java.type("java.lang.String");`


    `var greeting = new JavaString("Hello");`


    访问 Java 对象的方法和属性在大多数脚本语言中都是类似的。有些脚本语言允许你使用属性名来调用对象的 getter 和 setter 方法。以下 Nashorn
    代码创建了一个 `java.util.Date` 对象，并使用属性名和方法名两种方式访问该对象的方法。由于代码基于当前日期运行，你可能会得到不同的输出：


    `var LocalDate = Java.type("java.time.LocalDate");`


    `var dt = LocalDate.now();`


    `var year = dt.year;             // 作为属性使用`


    `var month = dt.month;           // 作为属性使用`


    `var date = dt.getDayOfMonth();  // 作为方法使用`


    `print("Date:" + dt);`


    `print("Year:" + year + ", Month:" + month + ", Day:" + date);`


    `Date:2014-10-12`


    `Year:2014, Month:OCTOBER, Day:12`


    在 JavaScript 中，你可以将 Java 对象的方法当作属性来使用。当你读取名为 `xxx` 的属性时，JavaScript 会自动调用 `getXxx()`
    方法。当你设置名为 `xxx` 的属性时，则会调用 `setXxx()` 方法。系统会遵循 JavaBeans 方法约定来查找对应的方法。例如，如果你读取一个
    `LocalDate` 对象的 `leapYear` 属性，由于该属性是 `boolean` 类型，因此会调用该对象的 `isLeapYear()` 方法。


    使用 JavaScript 时，理解不同类型的 `String` 对象非常重要。一个 `String` 对象可能是 JavaScript 的 `String`
    对象，也可能是 Java 的 `java.lang.String` 对象。JavaScript 为其 `String` 对象定义了一个 `length` 属性，而
    Java 为其 `java.lang.String` 类定义了一个 `length()` 方法。以下代码片段展示了创建和访问 JavaScript `String`
    与 Java `java.lang.String` 对象长度的区别：


    `// JavaScript String`


    `var jsStr = new String("Hello JavaScript String");`


    `print("JavaScript String: " + jsStr);`


    `print("JavaScript String Length: " + jsStr.length);`


    `// Java String`


    `var javaStr = new java.lang.String("Hello Java String");`


    `print("Java String: " + javaStr);`


    `print("Java String Length: " + javaStr.length());`


    `JavaScript String: Hello JavaScript String`


    `JavaScript String Length: 23`


    `Java String: Hello Java String`


    `Java String Length: 17`


    ## 使用重载的 Java 方法


    Java 在编译时解析重载方法的调用。也就是说，Java 编译器会确定代码运行时将要调用的方法签名。考虑清单 6-1 中所示的 `PrintTest` 类代码。第二行输出可能有所不同。


    清单 6-1. 在 Java 中使用重载方法


    `// PrintTest.java`


    `package com.jdojo.script;`


    `public class PrintTest {`


    `public void print(String str) {`


    `System.out.println("print(String): " + str);`


    `}`


    `public void print(Object obj) {`


    `System.out.println("print(Object): " + obj);`


    `}`


    `public void print(Double num) {`


    `System.out.println("print(Double): " + num);`


    `}`


    `public static void main(String[] args) {`


    `PrintTest pt = new PrintTest();`


    `Object[] list = new Object[]{"Hello", new Object(), 10.5};`


    `for(Object arg : list) {`


    `pt.print(arg);`


    `}`


    `}`


    `}`


    `print(Object): Hello`


    `print(Object): java.lang.Object@affc70`


    `print(Object): 10.5`


    当 `PrintTest` 类运行时，对 `print()` 方法的三次调用都调用了 `PrintTest` 类的同一个版本 `print(Object)`。在代码编译时，Java
    编译器将调用 `pt.print(arg)` 视为对参数类型为 `Object`（即 `arg` 的类型）的 `print()` 方法的调用，因此将此调用绑定到
    `print(Object)` 方法。


    在脚本语言中，变量的类型是在运行时而非编译时确定的。脚本语言的解释器会根据方法调用中参数的运行时类型，适当地解析重载方法的调用。以下 JavaScript
    代码的输出显示，对 `PrintTest` 类的 `print()` 方法的调用是在运行时根据参数类型解析的。第二行输出可能略有不同：


    `// JavaScript Code`


    `// 创建一个名为 PrintTest 的 Java 类的对象`


    `var PrintTest = Java.type("com.jdojo.script.PrintTest");`


    `var pt = new PrintTest();`


    `// 创建一个包含三个元素的 JavaScript 数组`


    `var list = ["Hello", new Object(), 10.5];`


    `// 调用 PrintTest 类的重载方法 print()`


    `// 每次传递数组中的一个对象`


    `for each(var element in list) {`


    `pt.print(element);`


    `}`


    `print(String): Hello`


    `print(Object): jdk.nashorn.internal.scripts.JO@405818`


    `print(Double): 10.5`


    JavaScript 允许你显式选择重载方法的特定版本。你可以将要调用的重载方法的签名与对象引用一起传递。以下代码片段选择了 `print(Object)`
    版本：


    `// JavaScript Code`


    `var PrintTest = Java.type("com.jdojo.script.PrintTest");`


    `var pt = new PrintTest();`


    `pt"print(java.lang.Object)"; // 调用 print(Object)`


    `pt"print(java.lang.Double)"; // 调用 print(Double)`


    `print(Object): 10.5`


    `print(Double): 10.` `5`


    ## 使用 Java 数组


    在 Rhino 和 Nashorn 中，创建 Java 数组的方式有所不同。在 Rhino 中，你需要使用 `java.lang.reflect.Array`
    类的 `newInstance()` 静态方法来创建 Java 数组。Nashorn 也支持这种语法。以下代码片段展示了如何使用 Rhino 语法创建和访问
    Java 数组：


    `// 创建一个包含 2 个元素的 java.lang.String 数组，填充并打印`


    `// 这些元素。在 Rhino 中，你可以将 java.lang.String 作为`


    `// 第一个参数，但在 Nashorn 中，你需要使用`


    `// java.lang.String.class 代替。`


    `var strArray = java.lang.reflect.Array.newInstance(java.lang.String.class, 2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    要创建诸如 `int`、`double` 等基本类型数组，你需要使用其对应包装类的 `TYPE` 常量，如下所示：


    `// 创建一个包含 2 个元素的 int 数组，填充并打印这些元素`


    `var intArray = java.lang.reflect.Array.newInstance(java.lang.Integer.TYPE, 2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    Nashorn 支持一种创建 Java 数组的新语法。首先，使用 `Java.type()` 方法创建适当的 Java 数组类型，然后使用熟悉的 `new`
    运算符来创建数组。以下代码片段展示了如何在 Nashorn 中创建一个包含两个元素的 `String[]`：


    `// 获取 java.lang.String[] 类型`


    `var StringArray = Java.type("java.lang.String[]");`


    `// 创建一个包含 2 个元素的 String[] 数组`


    `var strArray = new StringArray(2);`


    `strArray[0] = "Hello";`


    `strArray[1] = "Array";`


    `for(var i = 0; i < strArray.length; i++) {`


    `print(strArray[i]);`


    `}`


    `Hello`


    `Array`


    Nashorn 以相同的方式支持创建基本类型数组。以下代码片段在 Nashorn 中创建了一个包含两个元素的 `int[]`：


    `// 获取 int[] 类型`


    `var IntArray = Java.type("int[]");`


    `// 创建一个包含 2 个元素的 int[] 数组`


    `var intArray = new IntArray(2);`


    `intArray[0] = 100;`


    `intArray[1] = 200;`


    `for(var i = 0; i < intArray.length; i++) {`


    `print(intArray[i]);`


    `}`


    `100`


    `200`


    我将在第 7 章中详细讨论如何使用 Java 和 JavaScript 数组。

