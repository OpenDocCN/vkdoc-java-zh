- fmt: '### The Number Object


    The `Number` object is a function. It can be called as a function or a constructor.
    When it is called as a function, it converts the supplied argument to a primitive
    number value. If it is called with no argument, it returns the primitive number
    zero. When it is called as a constructor, it returns a `Number` object that wraps
    the specified argument. You can think of the `Number` object as the wrapper objects
    `Integer`, `Long`, `Float`, `Double`, `Short`, and `Byte` types in Java. The `valueOf()`
    method of the `Number` object returns the primitive number value stored in the
    object. The following code shows how to use the `Number` object as a function
    and a constructor:


    ```

    // Converts the string "24" to a number 24 and assigns 24 to n1

    var n1 = Number("24");


    // Asigns zero to n2

    var n2 = Number();


    // Create a Number object for the nuembr 100.43

    var n3 = new Number(100.43);


    printf("n1 = %d, n2 = %d, n3 = %f", n1, n2, n3.valueOf());

    n1 = 24, n2 = 0, n3 = 100.430000

    ```


    The `Number` object contains several useful properties to work with numbers. They
    are listed in Table [4-13](#A978-1-4842-0713-0_4_Chapter.html#Tab13). All listed
    methods are defined in `Number.prototype` object.


    **Table 4-13.** The List of Properties and Method of the Number Object with Their
    Descriptions


    | Property/Method | Description |

    | --- | --- |

    | `Number.MAX_VALUE` | It is the largest positive, finite value of the `Number`
    type. It is approximately 1.7976931348623157e+308 |

    | `Number.MIN_VALUE` | It is the smallest positive, finite value of the `Number`
    type. It is approximately 4.9e-324 |

    | `Number.NaN` | It is same as the global variable `NaN` that represents non-a-number
    |

    | `Number.NEGATIVE_INFINITY` | Represents a negative infinity. It is the same
    as the global variable `–Infinity` |

    | `Number.POSITIVE_INFINITY` | Represents a positive infinity. It is the same
    as the global variable `Infinity` |

    | `toString(radix)` | Converts the `Number` into the specified `radix`. If `radix`
    is not specified, 10 is used. The `radix` must be a number between 2 and 36, both
    inclusive |

    | `toLocaleString()` | Formats the number into a local specific format and returns
    it as a primitive string value. Currently, it returns the same value as the `toString()`
    method |

    | `valueOf()` | Returns the primitive value stored in the `Number` object |

    | `toFixed(digits)` | Returns a string representation of the number that contains
    exactly the specified `digits` after the decimal point. The number is rounded
    if necessary. The number is zero-padded if the digits after the decimal is less
    than the specified `digits`. If the number is greater than 1e+21, it will return
    a string representing the number in exponential notation. If `digits` is not specified,
    zero is assumed. The `digits` can be between 0 and 20 |

    | `toExponential(digits)` | Returns a string representation of the number in exponential
    notation. Contains one digit before the decimal and `digits` number of digits
    after the decimal. The `digits` can be between 0 and 20 |

    | `toPrecision(precision)` | Returns a string representation of the number with
    `precision` significant digits. It may return the number in decimal or exponential
    notation. If `precision` is not specified, it converts the number to a string
    and returns the result |


    You can call all methods of the `Number` object on all primitive numbers. However,
    you have to be careful when calling methods on primitive number values. A number
    can have decimal as well. The parser gets confused in the following statement:


    ```

    var x = 1969.toString(16); // A SyntaxError

    ```


    The parser does not know if the decimal after 1969 is part of the number or the
    dot to call the `toString()` method. You have two ways to fix it:


    - You need to use two decimals in the number. The last decimal will be considered
    as the dot to call the following method such as `1969..toString(16)`.

    - Enclose the number inside a pair of parenthesis such as `(1969).toString(16)`.


    The following code shows how to use methods of the `Number` object with primitive
    numbers:


    ```

    var n1 = 1969..toString(16);

    print("1969..toString(16) is " + n1);


    var n2 = (1969).toString(16);

    print("(1969).toString(16) is " + n2);


    var n3 = (1969.79).toFixed(1);

    print("(1969.79).toFixed(1) is " + n3);


    1969..toString(16) is 7b1

    (1969).toString(16) is 7b1

    (1969.79).toFixed(1) is 1969.8

    ```


    ### The Boolean Object


    The `Boolean` object is a function. It can be called as a function or a constructor.
    It takes an optional argument. If it is called as a function, it converts the
    specified argument to a Boolean primitive value (`true` or `false`). If the argument
    is not specified, the function returns `false`. As a constructor, it wraps the
    specified argument into a `Boolean` object. Notice that if the argument is not
    of the `Boolean` type, first the argument is converted to a Boolean primitive
    value. For example, an argument of 100 will be converted to a Boolean `true` and
    stored as `true`, not as 100. Its `toString()` method returns a string "true"
    or "false", depending on the value wrapped in the `Boolean` object. The `valueOf()`
    method returns the primitive Boolean value wrapped in the object. The `Boolean`
    object does not have any other interesting properties or methods. The following
    code shows how to use the `Boolean` object:


    ```

    var b1 = Boolean(100);      // Assins true to b1

    var b2 = Boolean(0);        // Assins false to b1

    var b3 = Boolean();         // Assigns false to b3

    var b4 = new Boolean(true); // Assign a Boolean object to b4


    print("Boolean(100) returns " + b1);

    print("Boolean(0) returns " + b2);

    print("Boolean() returns " + b3);

    print("b4.valueOf() returns " + b4.valueOf());


    Boolean(100) returns true

    Boolean(0) returns false

    Boolean() returns false

    b4.valueOf() returns true

    ```'
