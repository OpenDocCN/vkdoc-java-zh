    \ the while,\n// do-while, and for statements\nvar count;\nprint(\"Using the while\
    \ statement...\");\ncount = 1;\nwhile (count <= 3) {\n  print(count);\n  count++;\n\
    }\nprint(\"Using the do-while statement...\");\ncount = 1;\ndo {\n  print(count);\n\
    \  count++;\n} while (count <= 3);\nprint(\"Using the for statement...\");\nfor(var\
    \ i = 1; i <= 3; i++) {\n  print(i);\n}\nUsing the while statement...\n1\n2\n\
    3\nUsing the do-while statement...\n1\n2\n3\nUsing the for statement...\n1\n2\n\
    3\n```\n\nThe `for..in` statement is used to iterate over indices of arrays or\
    \ property names of objects. It can be used with collections such as arrays, lists,\
    \ maps, any Nashorn objects, and so on. Its syntax is:\n\n```\nfor(var index in\
    \ object)\nStatement;\n```\n\nFirst, the `object` is evaluated. If it evaluates\
    \ to `null` or `undefined`, the entire `for..in` statement is skipped. If it evaluates\
    \ to an object, the statement assigns the enumerable property to the `index` and\
