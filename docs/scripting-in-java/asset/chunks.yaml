    \ Int8Array(firstHalfView);\n\n// Create an Int8Array using elements from an Array\
    \ object\nvar ids = new Int8Array([10, 20, 30]);\n```\n\n所有类型化数组对象都具有以下属性：\n\n\
    - `length`：数组中元素的数量\n- `byteLength`：数组的字节长度\n- `buffer`：类型化数组所使用的底层`ArrayBuffer`对象的引用\n\
    - `byteOffset`：从其`ArrayBuffer`起始位置的字节偏移量\n\n创建类型化数组后，您可以像使用普通数组对象一样使用它。您可以使用带索引的方括号表示法设置和读取其元素。如果您设置的值与类型化数组的类型不匹配，该值将被适当转换。例如，将`23.56`设置为`Int8Array`中的元素，将存储值`23`。以下代码展示了如何读写类型化数组的内容：\n\
    \n```javascript\n// Create an Int8Array of 3 elements. Each element is an 8-bit\
    \ sign integer.\nvar ids = new Int8Array(3);\n\n// Populate the array\nids[0]\
    \ = 10;\nids[1] = 20.89; // 20 will be stored\nids[2] = 140;   // -116 is stored\
    \ as byte's range is -128 to 127.\n\n// Read the elements\nprint(\"ids[0] = \"\
