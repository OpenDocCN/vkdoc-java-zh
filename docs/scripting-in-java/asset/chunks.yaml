    `Called back from new global. x = 100`


    ## Summary


    Nashorn is a runtime implementation of the ECMAScript 5.1 specification on the
    JVM. ECMAScript defines its own syntax and constructs for declaring variables,
    writing statements and operators, creating and using objects and collections,
    iterating over collections of data, and so on. Nashorn is 100 percent compliant
    with the ECMAScript 5.1 specification, so you have a new set of language syntax
    to learn when you work with Nashorn.


    Nashorn operates in two modes: strict mode and nonstrict mode. Typically, features
    that are error-prone are not allowed in strict mode. You can use the `"use strict"`
    directive at the start of a script or a function to execute the script or the
    function in strict mode.


    Nashorn syntax supports two types of comments: single-line comments and multiline
    comments. They have the same syntax as single-line and multiline comments in Java.
    Single-line comments start with `//` and extend up to the end of the line. Multi-line
    comments start with `/*` and end with `*/`; they may extend to multiple lines.


    Nashorn defines several keywords and reserved words. You cannot use them as an
    identifier to name variables and functions. The keyword `var` is used to declare
    a variable. The keyword `function` is used to declare a function.


    Nashorn defines two types of data type: primitive types and object types. Undefined,
    Null, Number, Boolean, and String are primitive data types; everything else is
    of the object type. Functions in Nashorn are also objects. Primitive values are
    converted to objects automatically if needed.


    Nashorn defines several operators and statements that let you write scripts. Most
    of them are the same as in Java. One of the biggest differences between Nashorn
    and Java is the way in which Nashorn works with Boolean expressions. Nashorn works
    with truthy and falsy values that can be converted to the Boolean values `true`
    or `false`. This makes it possible to use any value where a Boolean value is expected
    in Nashorn.


    A function is a parameterized, named block of code that is defined once and executed
    on demand. A function is a first-class object. You can also define a function
    as a function expression or using a string that contains the code for the function.
    A function can also be used as a constructor with the `new` operator to create
    new objects. When a function is assigned as a value to an object’s property, the
    function is known as a method.


    An object in Nashorn is simply a map that is a collection of named properties.
    The properties of an object can have values that are simple data values, objects,
    or functions. Nashorn supports three ways to create a new object: using object
    literals, using constructors, and using the `Object.create()` method. Properties
    of an object may also have attributes that control how the properties can be used.
    For example, setting the `writable` attribute of a property to `false` makes the
    property read-only. You can access properties of an object using the dot notation
    or the bracket notation. Assigning a value to a nonexisting property of an object
    creates a new property with the name and assign the value to it. Nashorn supports
    prototype-based inheritance of objects.


    Nashorn contains a built-in object called `JSON`, which supports the stringification
    and parsing of a Nashorn object to a string and a string to a Nashorn object,
    respectively.


    In Nashorn, variable and function declarations do not have block scope. That is,
    declarations inside a block are visible outside the block as well. This is known
    as declaration hoisting. You can think of declaration hoisting as if all declarations
    are made at the top of the scope in which they are declared.


    Nashorn contains several built-in global objects and functions. `Object`, `Function`,
    `String`, `Number`, and `Boolean` are examples of built-in objects. `parseInt()`,
    `parseFloat()`, `load()`, and `loadWithNewGlobal()` are examples of global functions.


    A regular expression represents a pattern in text. Nashorn contains a `RegExp`
    built-in object whose instances represent regular expressions. You can also use
    regular expression literals to represent `RegExp` objects. A regular expression
    literal is enclosed in forward slashes and optionally followed by flags that define
    high-level text matching rules. `/Java/gi` is an example of a regular expression
    literal that will perform a global, case-insensitive match for the text `Java`.
    The `RegExp` object contains `test()` and `exec()` method to perform matches on
    input text. Several methods such as `replace()` and `match()` of the `String`
    object take regular expressions as arguments to perform operation such as match
    and find-and-replace.


    # 5. Procedures and Compiled Scripts


    In this chapter, you will learn:


    *   How to invoke procedures written in scripts from Java programs

    *   How to implement Java interfaces in Nashorn script

    *   How to compile Nashorn scripts and execute them repeatedly'
