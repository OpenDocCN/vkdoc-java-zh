  raw: '## Using Lists, Maps, and Sets


    Nashorn does not provide built-in objects to represent general-purpose maps and
    sets. You can use any object in Nashorn as a map whose keys are strings. It is
    possible to create objects in Nashorn to represent maps and sets. However, doing
    so will be like reinventing the wheel. The Java programming language provides
    many types of collections, including maps and sets. You can use those collections
    in Nashorn directly. Please refer to `Chapter 6` for more details on how to use
    Java classes in Nashorn scripts. I will discuss Java `List`s and `Map`s in this
    section that are given special treatment in Nashorn.


    ### Using a Java List as a Nashorn Array


    Nashorn allows you to treat a Java `List` as a Nashorn array to read and update
    elements of the `List`. Note that it does not let you add elements to the `List`
    using the array indexes. You can use indexes to access and update elements of
    the `List`. Nashorn adds a `length` property to instances of Java `List`, so you
    can treat the `List` as an array-like object. Listing 7-4 shows you an example
    of using Java `List` in a Nashorn script.


    Listing 7-4\. Accessing and Updating a java.util.List as an Array Object in Nashorn
    Script


    `// list.js`


    `var ArrayList = Java.type("java.util.ArrayList");`


    `var nameList = new ArrayList();`


    `// Add few names using List.add() Java method`


    `nameList.add("Lu");`


    `nameList.add("Do");`


    `nameList.add("Yu");`


    `// Print the List`


    `print("After adding names:");`


    `for(var i = 0, len = nameList.size(); i < len; i++) {`


    `print(nameList.get(i));`


    `}`


    `// Update names using array indexes`


    `nameList[0] = "Su";`


    `nameList[1] = "So";`


    `nameList[2] = "Bo";`


    `// The following statement will throw an IndexOutOfBoundsException because`


    `// it is trying to add a new element using teh array syntax. You can only`


    `// update an element, not add a new element, using the array syntax.`


    `// nameList[3] = "An";`


    `print("After updating names:");`


    `for(var i = 0, len = nameList.length; i < len; i++) {`


    `print(nameList[i]);`


    `}`


    `// Sort the list in natural order`


    `nameList.sort(null);`


    `// Use the Array.prototype.forEach() method to print the list`


    `print("After sorting names:");`


    `Array.prototype.forEach.call(nameList, function (value, index, data) {`


    `print(value);`


    `});`


    `After adding names:`


    `Lu`


    `Do`


    `Yu`


    `After updating names:`


    `Su`


    `So`


    `Bo`


    `After sorting names:`


    `Bo`


    `So`


    `Su`


    The example performs several things:


    *   Creates an instance of the `java.util.ArrayList`

    *   Use the `add()` method of the Java `List` interface to add three elements
    to the list

    *   Prints the elements using the `size()` and `get()` method of the `List` interface

    *   Updates the elements and prints them using the Nashorn syntax for accessing
    array elements. It uses the Nashorn property `length` to get the size of the list

    *   Uses the Java `List.sort()` method to sort the elements in natural order

    *   Uses the `Array.prototype.forEach()` method to print the sorted elements


    ### Using a Java Map as a Nashorn Object


    You have seen that Nashorn objects are simply maps storing string-object pairs.
    Nashorn allows using a Java `Map` as a Nashorn object in which you can use keys
    in the `Map` as the properties of the object. Listing 7-5 shows how to use a Java
    `Map` as a Nashorn object.


    Listing 7-5\. Using a Java Map as a Nashorn Object


    `// map.js`


    `// Create a Map instance`


    `var HashMap = Java.type("java.util.HashMap");`


    `var map = new HashMap();`


    `// Add key-value pairs to the map using Java methods`


    `map.put("Li", "999-11-0001");`


    `map.put("Su", "999-11-0002");`


    `// You can treat the Map as an object and add key-value pairs`


    `// as if you are adding proeprties to the object`


    `map["Yu"] = "999-11-0003";`


    `map["Do"] = "999-11-0004";`


    `// Access values using the Java Map.get() method and the bracket notation`


    `var liPhone = map.get("Li");  // Java way`


    `var suPhone = map.get("Su");  // Java way`


    `var yuPhone = map["Yu"];      // Nashorn way`


    `var doPhone = map["Do"];      // Nashorn way`


    `print("Li''s Phone: " + liPhone);`


    `print("su''s Phone: " + suPhone);`


    `print("Yu''s Phone: " + yuPhone);`


    `print("Do''s Phone: " + doPhone);`


    `Li''s Phone: 999-11-0001`


    `su''s Phone: 999-11-0002`


    `Yu''s Phone: 999-11-0003`


    `Do''s Phone: 999-11-0004`'
