    It is possible for a script to pass the value `undefined` to Java code. You can
    check if a script object passed to Java is `undefined` using the `isUndefined(Object
    obj)` static method of the `ScriptObjectMirror` class. The method returns true
    if the specified `obj` is `undefined`; otherwise, it returns false.


    The `ScriptObjectMirror` class implements the `JSObject` and `Bindings` interfaces.
    The class adds more methods to deal with script objects. You can store the reference
    of a script object in Java code in any of the three types of variables: `JSObject`,
    `Bindings`, or `ScriptObjectMirror`. What type you use depends on your needs.
    Using the `ScriptObjectMirror` type gives you more flexibility and access to all
    features of the script object. Table [12-3](#A978-1-4842-0713-0_12_Chapter.html#Tab3)
    contains the list of methods declared in the `JSObject` interface.


    I will show how to use these methods and some methods of the `ScriptObjectMirror`
    class in the subsequent section. The `JSObject` interface can be implemented by
    any Java class. Objects of such a class can be used just as if they are script
    objects and can use the syntax `obj.func()`, `obj[prop]`, `delete obj.prop`, and
    so on to work with their methods and properties in scripts.


