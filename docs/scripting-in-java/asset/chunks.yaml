    \ is enclosed in single quotes:\n\n```\nc:\\ >jjs -scripting\n```\n\n```\njjs>\
    \ var today = `date`\n```\n\n```\njjs> \"Today is ${today}\"\nToday is Mon Jul\
    \ 14 22:48:26 CDT 2014\n```\n\n```\njjs> 'Today is ${today}'\nToday is ${today}\n\
    ```\n\n```\njjs> quit()\nc:\\>\n```\n\nYou can also execute the shell script stored\
    \ in a file using the scripting mode:\n\n```\nC:\\> jjs –scripting myscript.js\n\
    ```"
