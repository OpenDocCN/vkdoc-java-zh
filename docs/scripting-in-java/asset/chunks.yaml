- fmt: '# Statements


    Nashorn contains most of the statements that you have in Java. Most of the statement
    types work in a very similar way to Java. The following is the list of statement
    types in Nashorn:


    - Block Statement

    - Variable Statement

    - Empty Statement

    - Expression Statement

    - The `if` Statement

    - Iteration (or loop) Statements

    - The `continue` Statement

    - The `break` Statement

    - The `return` Statement

    - The `with` Statement

    - The `switch` Statement

    - Labelled Statements

    - The `throw` Statement

    - The `try` Statement

    - The debugger Statement


    As in Java, you can use a semicolon to terminate a statement. Unlike Java, however,
    a statement terminator is optional. Nashorn will insert semicolons in many cases.
    Most of the time, you can omit the semicolon as the statement terminator without
    any problem. Nashorn will insert them automatically as it feels necessary. In
    some cases, the automatic insertion of a semicolon may cause a misinterpretation
    of the program. The following rules are used to insert a semicolon automatically:


    - A semicolon in automatically inserted if the parser encounters source text that
    is not allowed in the statement currently being parsed and the text is preceded
    by at least one line terminator

    - A semicolon is inserted after a statement if the statement is followed by a
    closing brace (`}`)

    - A semicolon is inserted at the end of the program

    - A semicolon is not inserted automatically if it will be parsed as an empty statement
    (I will explain empty statements later in this chapter). A semicolon is also not
    inserted in the header of a `for` statement


    Consider the following code:


    ```

    var x = 1, y = 3, z = 5

    x = y

    z++

    printf("x = %d, y = %d, z = %d", x, y, z)

    ```


    The parser will automatically insert semicolons as statement terminators as if
    you have written the code as follows:


    ```

    var x = 1, y = 3, z = 5;

    x = y;

    z++;

    printf("x = %d, y = %d, z = %d", x, y, z);

    ```


    Consider the following code:


    ```

    var x = 10, y = 20

    if (x > y)

    else x = y

    ```


    The parser will insert a semicolon after the variable statement and the assignment
    statement `x = y`, but not after the `if` statement. The transformed code will
    be as follows:


    ```

    var x = 10, y = 20;

    if (x > y)

    else x = y;

    ```


    A semicolon is not automatically inserted after the `if` statement because the
    inserted semicolon will be interpreted as an empty statement. This code will not
    compile because the `if` statement has a condition but a statement is missing.


    The parser keeps parsing the source code until it finds an offending token. It
    does not always insert a semicolon before a line terminator. Consider the following
    code:


    ```

    var x

    x

    =

    200

    printf("x = %d", x)

    ```


    The parser will treat the three lines of source code (second to fourth) as one
    assignment statement (`x = 200`) and insert a semicolon after 200. The transformed
    code will be as follows:


    ```

    var x;

    x

    =

    200;

    printf("x = %d", x);

    ```


    Consider the following code that prints 20:


    ```

    var x = 200, y = 200, z

    z = Math.sqrt

    (x + y).toString()

    print(z)

    ```


    The parser does not insert a semicolon at the end of the third line (`z = Math.sqrt`).
    It thinks that the `(` in the following line is the start of the argument list
    for a function `Math.sqrt`. The transformed code looks as follows:


    ```

    var x = 200, y = 200, z;

    z = Math.sqrt

    (x + y).toString();

    print(z);

    ```


    However, the writer of the code might have meant to assign the function reference
    `Math.sqrt` to the variable named `z`. In that case, the automatic insertion of
    semicolons changes the intended meaning of the code. If you insert the semicolon
    yourself after the assignment statement, the code output is different:


    ```

    var x = 200, y = 200, z;

    z = Math.sqrt;      // Assigns Math.sqrt function reference to z

    (x + y).toString(); // Converts x + y to a string and ignores the result

    print(z);

    function sqrt() { [native code] }

    ```


    If you had written the same code using the keyword `void` to ignore the result
    of the expression `(x + y).toString()`, the parser would have added a semicolon
    after the text `z = Math.sqrt`. The following code works as if you intended to
    assign the function reference `Math.sqrt` to the variable named `z`:


    ```

    var x = 200, y = 200, z   // A semicolon is inserted here

    z = Math.sqrt             // A semicolon is inserted here

    void (x + y).toString()   // A semicolon is inserted here

    print(z)                  // A semicolon is inserted here

    function sqrt() { [native code] }

    ```


    The reason that a semicolon was inserted at the end of the second line is that
    the keyword `void` is an offending token in the third line. The keyword `void`
    cannot be part of the assignment statement that started in the second line.


    > **Tip:** I advise using a semicolon as the statement terminator everywhere it
    is required. Depending on the automatic insertion of semicolons may sometimes
    lead to subtle bugs.


    I will discuss these statement types briefly in the following sections.


    ## Block Statement


    A block statement works similar to that of in Java. It is a group of zero or more
    statements enclosed in braces (`{ }`). Unlike Java, variables declared inside
    a block statement does not have a local scope to that block. They can be accessed
    before and after the block statement in which they are declared. The following
    snippet of code demonstrates this:


    ```

    var empId = 100;

    // Print empId and deptId. Note that deptId has not been

    // declared yet, but you can access it.

    print("empId = " + empId + ", deptId = " + deptId);

    // A block statement

    {

    var deptId = 200;

    print("empId = " + empId + ", deptId = " + deptId);

    // Compute the area of a circle

    var radius = 2.3;

    var area = Math.PI * radius * radius;

    printf("Radius = %.2f, Area = %.2f", radius, area);

    }

    print("empId = " + empId + ", deptId = " + deptId);

    empId = 100, deptId = undefined

    empId = 100, deptId = 200

    Radius = 2.30, Area = 16.62

    empId = 100, deptId = 200

    ```


    In the code, the variable `deptId` is declared local to the block. However, you
    were able to access it outside (before as well as after) the block. This is not
    a bug in Nashorn. This works as designed, based on the variable scoping rules.
    Variable scoping in Nashorn works quite differently from that of in Java. I will
    discuss variable’s scoping in the section Variable Scoping and Hoisting.


    ## Variable Statement


    A variable statement is used to declare and, optionally, initialize variables.
    I have already discussed the variable statement in the section Declaring Variables.
    Examples of variable statements are as follows:


    ```

    // Declare a variable named empId

    var empId;

    // Declare a variable named deptId and initialize it to 200

    var deptId = 200;

    ```


    ## Empty Statement


    A semicolon is used as an empty statement. The empty statement in Nashorn works
    the same way as that of in Java. It has no effect. It can be used anywhere a statement
    is required. Like Java, a `for` statement in Nashorn is used for iteration purpose.
    The following code uses a `for` statement to print integers 1 through 10. An empty
    statement is used as the body of the statement:


    ```

    // The semicolon at the end is the empty statement

    for(var i = 1; i <= 10; print(i++));

    ```


    ## Expression Statement


    An expression statement is a statement that consists of an expression with/without
    side effects. The following are some examples of expression statements:


    ```

    var i = 100; // A variable statement

    i++;         // An expression statement

    print(i);    // An expression statement

    ```'
