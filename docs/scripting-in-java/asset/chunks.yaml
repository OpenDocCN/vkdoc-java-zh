    `if` statement. The `print()` function prints the value of the variable `x` and
    returns `undefined`. The value `undefined` is converted to the Boolean `false`
    (please refer to the section To Boolean Conversion) that will execute the statement
    associated with the `else` part.


    ### Iteration Statements


    Nashorn supports five types of iteration statements:


    *   The `while` Statement

    *   The `do-while` Statement

    *   The `for` Statement

    *   The `for..in` Statement

    *   The `for..each..in` Statement


    The `while`, `do-while`, and `for`statements in Nashorn works the same as in Java.
    I will not discuss them in detail because as a Java developer you know how to
    use them. The following code demonstrates their use:


    `// Print first 3 natural numbers using the while,`


    `// do-while, and for statements`


