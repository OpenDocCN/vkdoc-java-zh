    \ maps and sets. You can use those collections in Nashorn directly. Please refer\
    \ to `Chapter 6` for more details on how to use Java classes in Nashorn scripts.\
    \ I will discuss Java `List`s and `Map`s in this section that are given special\
    \ treatment in Nashorn.\n\n## Using a Java List as a Nashorn Array\n\nNashorn\
    \ allows you to treat a Java `List` as a Nashorn array to read and update elements\
    \ of the `List`. Note that it does not let you add elements to the `List` using\
    \ the array indexes. You can use indexes to access and update elements of the\
    \ `List`. Nashorn adds a `length` property to instances of Java `List`, so you\
    \ can treat the `List` as an array-like object. Listing 7-4 shows you an example\
    \ of using Java `List` in a Nashorn script.\n\n**Listing 7-4.** Accessing and\
    \ Updating a `java.util.List` as an Array Object in Nashorn Script\n\n```\n//\
    \ list.js\n\nvar ArrayList = Java.type(\"java.util.ArrayList\");\nvar nameList\
    \ = new ArrayList();\n\n// Add few names using List.add() Java method\nnameList.add(\"\
    Lu\");\nnameList.add(\"Do\");\nnameList.add(\"Yu\");\n\n// Print the List\nprint(\"\
    After adding names:\");\nfor(var i = 0, len = nameList.size(); i < len; i++) {\n\
    \    print(nameList.get(i));\n}\n\n// Update names using array indexes\nnameList[0]\
