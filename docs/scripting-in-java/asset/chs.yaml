  `calc.add(15.00, 10.00) = 25.00`


  `calcr.subtract(15.00, 10.00) = 5.00`


  `calcr.multiply(15.00, 10.00) = 150.00`


  `calc.divide(15.00, 10.00) = 1.50`


  Nashorn 引擎是如何找到 `Calculator` 接口的实现呢？当你调用 `Invocable` 的 `getInterface(Class<T> cls)`
  方法时，引擎会在已编译的函数中查找与指定类中抽象方法名称相匹配的函数。在我们的例子中，引擎会在其中查找名为 `add`、`subtract`、`multiply`
  和 `divide` 的已编译函数。请注意，必须调用引擎的 `eval()` 方法来编译 `calculatorasfunctions.js` 文件中的函数。Nashorn
  引擎不会匹配 Java 接口方法中的形式参数数量与引擎中脚本函数的参数数量。


  `getInterface()` 方法的第二个版本用于获取一个 Java 接口的实例，该接口的方法被实现为某个对象的实例方法。它的第一个参数是在脚本语言中创建的对象的引用。该对象的实例方法实现了作为第二个参数传入的接口类型。清单
  5-2 中的代码创建了一个名为 `calculator` 的对象，其实例方法实现了 `Calculator` 接口。你将把 `calculator` 对象的方法作为
  Java 中 `Calculator` 接口的实现来使用。


  当脚本对象的实例方法实现了 Java 接口的方法时，你需要额外执行一个步骤。在获取接口的实例之前，你需要先获取脚本对象的引用，如下所示：


  `// 在引擎中加载 calculator 对象`


  `engine.load(''calculator.js'');`


  `// 获取全局脚本对象 calculator 的引用`


  `Object calc = engine.get("calculator");`


  `// 获取 Calculator 接口的实现`


  `Calculator calculator = inv.getInterface(calc, Calculator.class);`


