  Hello FX\");`\n\n`$STAGE.setScene(new javafx.scene.Scene(sp, 300, 100));`\n\n`$STAGE.sizeToScene();`\n\
  \n`// $STAGE.show(); // 无需显示主舞台。Nashorn 将 // 自动显示它。`\n\n让我们再尝试一种函数组合。您将提供 `init()`\
  \ 函数，但不提供 `start()` 函数。清单 11-5 包含了同一个 HelloFX 应用程序的代码。它包含了创建控件的 `init()` 方法，但 `start()`\
