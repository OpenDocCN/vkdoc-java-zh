  引言


  在 2012 年撰写三卷本的《Harnessing Java 7》时，由于每卷篇幅有限，我没有包含关于 Java 脚本 API 的章节。请注意短语“Java Scripting”，它由两个独立的单词组成：“Java”和“Scripting”。“JavaScript”是一种脚本语言的名称，与
  Java 编程语言无关；而短语“Java Scripting API”是允许 Java 应用程序与脚本语言交互的 Java API。




  在最初版本中，我将本书命名为《驾驭 Java 脚本编程》，内容仅涵盖 Java 脚本 API 和 Rhino 脚本引擎。该版本并未涉及 JavaScript 语言。JDK
  8 搭载了一个名为 Nashorn 的轻量级高性能 JavaScript 引擎，它取代了 JDK 7 中附带的 Rhino 引擎。本书全面介绍了 JavaScript
  语言，并对 Nashorn 引擎进行了详尽阐述。


  学习 Java 6 中引入的 Java 脚本 API，并非对所有 Java 开发者都必不可少，但如果你熟悉 Rhino JavaScript、Groovy、Jython、JRuby
  等脚本语言，并希望在这些 Java 应用中充分利用这些脚本语言，那么它就显得非常重要且实用。


  我最初通过阅读一些在线博客和文章来学习 Java 脚本 API；它们虽有所帮助，但未能全面清晰地描绘出 Java 脚本 API 如何帮助 Java 应用与脚本语言交互的全貌。学习过程的下一步是阅读
  JSR-223（Java 平台脚本规范）以及 `javax.script` 包的 Java API 文档。阅读 JSR-223 规范让我对 Java 脚本 API
  有了完整的认识；然而，我仍未准备好撰写本书。我仍缺少一些关键拼图。因此，我决定阅读 `javax.script` 包中类的源代码。我还阅读了一些脚本语言的源代码。最后，在学习该
  API 的过程中，我开发了一个简单的脚本引擎，并将其命名为 JKScript。最终，我阅读了 ECMAScript 5.1 规范，以全面了解 JavaScript
  语言本身。撰写本书时面临的主要困难是获取关于 Nashorn 引擎及其特性的信息。在 [`​wiki.​openjdk.​java.​net/​display/​Nashorn/​Main`](https://wiki.openjdk.java.net/display/Nashorn/Main)
  上维护着一个 Wiki，它零散地提供了关于 Nashorn 引擎的信息。如何将这些信息与书中的连贯示例整合在一起，是一项挑战。


  我衷心希望读者能喜欢本书并从中受益。


  ## 本书结构


  本书包含 13 章：每章都介绍 Java 脚本 API 和 JavaScript 语言的一个新主题。每章都会用到前面章节介绍的内容。


  第 1 章“入门”向您介绍 Java 脚本 API，并演示如何编写第一个 Java 程序来执行用 Nashorn 编写的脚本。它逐步介绍了下载和安装其他脚本语言（如
  Groovy、Jython 和 JRuby）所需的步骤。最后，本章简要介绍了 `javax.script` 包中包含的类和接口，描述了它们的用法以及与其他类的关系。


  第 2 章“执行脚本”展示了如何执行存储在文件中的脚本。它还演示了如何将参数从 Java 应用传递到脚本引擎，反之亦然。


  第 3 章“向脚本传递参数”讨论了在 Java 应用和脚本引擎之间传递参数所涉及的高级技术和所有内部设置。它从详细描述绑定、作用域和脚本上下文这些术语开始。随后，通过多个示例详细解释了绑定、作用域和脚本上下文如何在
  Java 脚本 API 中协同工作。每个解释都配有一段代码片段、一个完整程序，或两者兼有。本章以一个演示如何将脚本输出重定向到文件的程序结束。


  第 4 章“在 Nashorn 中编写脚本”非常详细地介绍了 JavaScript 语言，内容涵盖 Nashorn 引擎所支持的 ECMAScript 5.1
  规范。


  第 5 章“过程与编译脚本”解释了如何从 Java 应用调用用脚本语言编写的顶层过程、函数和对象级方法。它解释了如何在脚本引擎支持的情况下，以中间形式编译脚本并重复执行它们。


  第 6 章“在 Nashorn 中使用 Java”解释了如何在脚本语言内部使用 Java 编程语言的特性与结构。讨论的 Java 特性包括导入 Java 类、创建
  Java 对象、使用 Java 重载方法、实现 Java 接口等。


  第 7 章“集合”解释了 Nashorn 中的无类型数组和类型化数组。它还解释了如何在 Nashorn 中使用 Java 集合类，例如 `java.util.Set`
  和 `java.util.Map`。


  第 8 章“实现脚本引擎”讨论了实现新脚本引擎所需的步骤。它解释了 Java 脚本 API 中涉及创建新脚本引擎的所有类和接口。它逐步介绍了使脚本引擎能被脚本引擎管理器自动发现的部署设置。在此过程中，它创建了一个简单的脚本引擎，我们称之为
  JKScript，它能够执行算术表达式。


  第 9 章“jrunscript 命令行 Shell”解释了如何使用 `jrunscript` 命令行 Shell 通过不同的脚本引擎执行脚本。


  第 10 章“jjs 命令行工具”解释了如何使用 `jjs` 命令行工具以不同模式执行 Nashorn 脚本。它详细介绍了该命令行工具的语法和选项。提供了多个示例来说明该
  Shell 的用法。


  第 11 章“在 Nashorn 中使用 JavaFX”解释了如何使用 `jjs` 命令行工具编写和运行 JavaFX 程序。


  第 12 章“Nashorn 的 Java API”涵盖了可用于在 Java 程序中处理 JavaScript 对象的 Java 类和接口。


  第 13 章“调试、跟踪和分析脚本”解释了 NetBeans 8.0 中对调试 Nashorn 脚本的支持。它还解释了如何跟踪和分析 Nashorn 脚本。


  ### 目标读者


  本书旨在为任何希望学习 Java 中的 Java 脚本 API 和 Nashorn JavaScript 的人提供帮助。使用本书需要具备 Java 基础知识。虽然事先了解
  Rhino JavaScript、Groovy、JRuby、Jython 等脚本语言会有所帮助，但并非必需。


  本书中的示例均使用 Nashorn JavaScript 编写。示例特意保持简单短小，以便读者无需任何脚本语言经验即可理解。如果你没有使用脚本语言的经验，则需要按章节顺序依次阅读本书。


