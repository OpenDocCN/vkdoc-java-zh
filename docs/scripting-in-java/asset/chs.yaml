  ## 准备部署


  在打包 `JKScript` 脚本引擎的类之前，你还需要执行一步：创建一个名为 `META-INF` 的目录。在该目录下，创建一个名为 `services` 的子目录。在
  `services` 目录中，创建一个名为 `javax.script.ScriptEngineFactory` 的文本文件。请注意，文件名必须完全按照上述方式命名，且不应包含任何扩展名（如
  `.txt`）。


  编辑 `javax.script.ScriptEngineFactory` 文件，并输入清单 8-4 所示的内容。文件中的第一行是以 `#` 号开头的注释。第二行是
  `JKScript` 脚本引擎工厂类的完全限定名。


  清单 8-4\. 名为 javax.script.ScriptEngineFactory 的文件内容


  `#JKScript 引擎的工厂类`


  `com.jdojo.script.JKScriptEngineFactory`


  为什么必须执行这一步？你将把 `javax.script.ScriptEngineFactory` 文件与 `JKScript` 引擎的类文件一起打包到一个 JAR
  文件中。脚本引擎的发现机制会在 CLASSPATH 中所有 JAR 文件的 `META-INF/services` 目录下搜索此文件。如果找到该文件，则会读取其内容，并实例化该文件中的所有脚本工厂类，将其包含在脚本引擎工厂列表中。因此，这一步对于使你的
  `JKScript` 引擎能够被 `ScriptEngineManager` 自动发现是必要的。


  ## 打包 JKScript 文件


  你需要将 `JKScript` 脚本引擎的所有文件打包到一个名为 `jkscript.jar` 的 JAR 文件中。你也可以将其命名为其他任何名称。以下是包含其目录的文件列表。请注意，在这种情况下，一个空的
  `manifest.mf` 文件即可正常工作：


  *   `com\jdojo\script\Expression.class`

  *   `com\jdojo\script\JKScriptEngine.class`

  *   `com\jdojo\script\JKScriptEngineFactory.class`

  *   `META-INF\manifest.mf`

  *   `META-INF\services\javax.script.ScriptEngineFactory`


  你可以手动创建 `jkscript.jar` 文件，方法是将除 `manifest.mf` 文件之外的所有这些文件复制到一个目录中（例如 Windows 下的
  `C:\build`），然后从 `C:\build` 目录执行以下命令：


  `C:\build> jar cf jkscript.jar com\jdojo\script\*.class META-INF\services\*.*`


  `jkscript.jar` 文件位于本书可下载包中的 `src\JavaScripts` 目录下。可下载的源代码包含一个 NetBeans 8.0 项目，并且
  `jkscript.jar` 文件已添加到该项目的 CLASSPATH 中。如果你从附带的 NetBeans IDE 中运行该引擎，则无需执行打包和部署步骤即可使用
  `JKScript` 引擎。




  ## 使用 JKScript 脚本引擎


  现在是时候测试你的 `JKScript` 脚本引擎了。首要且最重要的一步是将你在上一节创建的 `jkscript.jar` 文件包含到应用程序的 CLASSPATH
  中。一旦你将 `jkscript.jar` 文件包含到应用程序的 CLASSPATH 中，使用 `JKScript` 就与使用任何其他脚本引擎没有区别。


  以下代码片段使用 `JKScript` 作为其名称创建了一个 `JKScript` 脚本引擎的实例。你也可以使用它的其他名称，例如 `jks` 和 `jkscript`：


  `// 创建 JKScript 引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JKScript");`


  `if (engine == null) {`


  `System.out.println("JKScript 引擎不可用。" +`


  `"请将 jkscript.jar 添加到 CLASSPATH。");`


  `}`


  `else {`


  `// 评估你的 JKScript`


  `}`


  清单 8-5 包含一个使用 `JKScript` 脚本引擎评估不同类型表达式的程序。存储在 `String` 对象和文件中的表达式会被执行。一些表达式使用数字字面量，另一些则使用绑定变量，这些变量的值通过引擎作用域和引擎默认
  `ScriptContext` 的全局作用域中的绑定传入。请注意，该程序期望在当前目录下存在一个名为 `jkscript.txt` 的文件，该文件包含一个 `JKScript`
  脚本引擎可以理解的算术表达式。如果脚本文件不存在，程序会在标准输出上打印一条消息，其中包含预期脚本文件的路径。最后一行输出可能有所不同。


  清单 8-5. 使用 JKScript 脚本引擎


  `// JKScriptTest.java`


  `package com.jdojo.script;`


  `import java.io.FileNotFoundException;`


  `import java.io.IOException;`


  `import java.io.Reader;`


  `import java.nio.file.Files;`


