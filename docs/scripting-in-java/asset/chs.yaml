  \ 应用程序，你应该同时提供 `init()` 和 `start()` 方法，以便它们按顺序被调用。\n\n最后，我将向你展示最简单的 JavaFX 应用程序，它只需一行脚本即可编写。它会在一个窗口中显示一条消息。不过，该窗口将没有标题文本。清单\
