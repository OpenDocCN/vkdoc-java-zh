  `engine1.eval(script);`


  `engine2.eval(script);`




  `// 现在为每个引擎设置不同的 n2 值`


  `engine1.put("n2", 1000);`


  `engine2.put("n2", 2000);`


  `// 再次在两个引擎中执行脚本`


  `engine1.eval(script);`


  `engine2.eval(script);`


  `}`


  `catch (ScriptException e) {`


  `e.printStackTrace();`


  `}`


  `}`


  `}`


