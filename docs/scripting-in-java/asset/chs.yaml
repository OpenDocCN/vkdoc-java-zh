  ## 总结


  在脚本中使用 Java 类型创建对象之前，需要先将 Java 类型导入脚本。在脚本中导入类型有四种方法：使用 `Packages` 全局对象、使用 `Java.type()`
  方法、使用 `importPackage()` 和 `importClass()` 函数，以及在 `with` 子句中使用 `JavaImporter`。Nashorn
  将 `java`、`javax`、`org`、`com`、`edu` 和 `net` 声明为全局变量，它们分别是 `Packages.java`、`Packages.javax`、`Packages.org`、`Packages.com`、`Packages.edu`
  和 `Packages.net` 的别名。因此，你可以使用这些包中任何类型的完全限定名来引用该类型。


  在脚本中创建 Java 对象时，需要将 `new` 运算符与 Java 类型一起使用。使用 `Java.type()` 方法可以统一地导入 Java 类型（包括数组类型）。你可以像创建任何其他类型的对象一样创建数组对象。


  大多数情况下，重载的 Java 方法调用由 Nashorn 解析。如果你想从脚本中调用重载方法的特定版本，可以使用方括号表示法指定具体的方法签名。例如，`pt"print(java.lang.Object)"`
  会在名为 `pt` 的对象引用上调用 `print(java.lang.Object)` 方法，并将 10.5 作为参数传递给该方法。


  Nashorn 允许你在脚本中使用 `Java.extend()` 方法扩展接口、抽象类和具体类。它还允许你使用 `Java.super()` 方法在对象上调用超类方法。


