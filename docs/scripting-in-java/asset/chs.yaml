  清单 4-11 包含了 `ColoredPoint` 构造函数的代码。我将在清单之后对此进行更多解释。


  清单 4-11. ColoredPoint.js 文件的内容


  `// ColoredPoint.js`


  `load("Point.js");`


  `function ColoredPoint(x, y, color) {`


  `// 调用 Point 构造函数，绑定 this，`


  `// 即当前的 ColoredPoint 对象上下文`


  `// 作为 Point 调用的 this，因此 x 和 y`


  `// 属性将被添加到当前的 ColoredPoint 对象中`


  `Point.call(this, x, y);`


  `// 向新对象添加一个 color 属性`


  `this.color = color;`


  `};`


  `// 将一个原型为 Point.prototype 的新对象设置为`


  `// ColoredPoint 函数的原型`


  `ColoredPoint.prototype = Object.create(Point.prototype);`


  `// 设置原型的 constructor 属性`


  `ColoredPoint.prototype.constructor = ColoredPoint;`




  `// 重写 Point.prototype 对象的 toString() 方法`


  `ColoredPoint.prototype.toString = function() {`


  `return "ColoredPoint(" + this.x + ", " + this.y + ", " + this.color + ")";`


  `};`


  首先，代码加载了包含 `Point` 构造函数定义的 `Point.js` 文件。


  `ColoredPoint` 构造函数中的第一条语句调用了 `Point()` 函数，并传入了 `x` 和 `y` 参数。理解这条语句的意图非常重要。它类似于在
  Java 中从子类构造函数调用父类构造函数。此时你正在创建一个 `ColoredPoint` 对象，并希望将 `Point` 函数作为构造函数来调用，因此正在创建的
  `ColoredPoint` 对象会先被初始化为一个 `Point`。你可能会倾向于使用 `Point(x, y)` 而不是 `Point.call(this,
  x, y)`。然而，这样是行不通的。这种混淆源于关键字 `this` 的含义。当你从 `ColoredPoint` 函数中调用 `Point()` 函数时，需要将
  `Point()` 函数中的关键字 `this` 指向正在创建的新 `ColoredPoint` 对象。当你调用 `Point(x, y)` 时，`Point()`
  函数内部的关键字 `this` 指向的是全局对象，而不是正在创建的 `ColoredPoint` 对象。函数的 `call()` 方法允许你将 `this` 引用作为第一个参数传入。在这种情况下，你传入了
  `ColoredPoint()` 函数中可用的 `this` 引用，因此 `Point()` 函数会在与 `ColoredPoint` 函数相同的上下文中执行。`Point()`
  函数内部的语句 `this.x = x` 和 `this.y = y` 会将 `x` 和 `y` 属性添加到新的 `ColoredPoint` 对象上。


  现在，你需要为将要使用 `ColoredPoint` 函数创建的对象设置原型链。这是通过将 `ColoredPoint` 函数的 `prototype` 属性设置为一个原型为
  `Point.prototype` 的对象来实现的。`Object.create()` 函数可以完成此操作，如下所示：


  `// 设置一个新对象，其原型为 Point.prototype，作为`


  `// ColoredPoint 函数的原型`


  `ColoredPoint.prototype = Object.create(Point.prototype);`


  这条语句替换了 `ColoredPoint` 函数的 `prototype` 属性，这也会重置 `prototype` 属性的 `constructor` 属性。下面的语句恢复了
  `constructor` 属性：


  `// 设置原型的 constructor 属性`


  `ColoredPoint.prototype.constructor = ColoredPoint;`


  `ColoredPoint` 对象将继承 `Point.prototype` 的 `toString()` 方法。为了确保当在 `ColoredPoint` 对象上调用
  `toString()` 方法时，它能返回其颜色分量。为了实现这一点，你需要重写 `toString()` 方法，如下所示：


  `// 重写 Point.prototype 对象的 toString() 方法`


  `ColoredPoint.prototype.toString = function() {`


  `return "ColoredPoint(" + this.x + ", " + this.y + ", " + this.color + ")";`


  `};`


