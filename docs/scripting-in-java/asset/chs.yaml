  ### 使用 Object.create( ) 方法


  `Object.create()` 方法是另一种通过指定对象的原型和初始属性来创建对象的方式。其语法为：


  `Object.create(prototypeObject, propertiesObject)`


  该函数返回新对象的引用。`prototypeObject` 是一个对象或 `null`，它被设置为新对象的原型。`propertiesObject` 是可选的；它是一个属性描述符，包含新对象的初始属性列表。以下两条语句是等价的。两者都创建了一个原型为
  `Object.prototype` 的空对象：


  `var obj1 = {};`


  `var obj2 = Object.create(Object.prototype);`


  下面的语句创建了一个原型为 `null` 的空对象：


  `var obj = Object.create(null);`


