  和 `configurable` 属性默认设置为 `false`。因此，`origin2D` 对象是不可变的。代码还打印了新对象的属性，这证明了 `x` 和 `y`
  属性是不可枚举的。请注意，新对象从 `Point.prototype` 对象继承了 `toString` 和 `distance` 属性。


