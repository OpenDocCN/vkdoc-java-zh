  ## 锁定对象


  `Object` 提供了几种方法来锁定对象。这些方法让你能够更精细地控制对象的哪些部分或特性被锁定：


  *   你可以阻止对象扩展（或使其不可扩展），这样就不能向其添加新属性。

  *   你可以密封对象，这样现有属性不能被删除，也不能添加新属性。

  *   你可以冻结对象，这样现有属性不能被删除，不能添加新属性，并且属性是只读的。


  `Object.preventExtensions(obj)` 方法让你能够使指定对象不可扩展。`Object.seal(obj)` 方法密封指定对象。`Object.freeze(obj)`
  方法冻结指定对象。请注意，一旦你使对象不可扩展、密封或冻结，就无法逆转这些属性。你可以使用 `Object.isExtensible(obj)`、`Object.isSealed(obj)`
  和 `Object.isFrozen(obj)` 方法来分别检查指定对象是否可扩展、已密封和已冻结。在严格模式下，如果你试图对对象进行不允许的更改，则会抛出错误；例如，向不可扩展对象添加新属性会抛出错误。


  提示


  阻止扩展、密封和冻结对象只会影响该对象本身，而不会影响其原型。仍然可以对其原型进行更改，并且该对象将继承这些更改。如果你想完全冻结对象，则需要冻结对象原型链上的所有对象。


  清单 4-17 展示了如何阻止对象扩展。它还展示了你可以向一个原本不可扩展的对象的原型添加属性，并且该对象会继承该属性。代码使 `point` 对象不可扩展，添加一个名为
  `z` 的属性并不会将该属性添加到该对象。但是，你可以将相同的属性添加到 `Object.prototype`，并且 `point` 对象会继承它。


  清单 4-17\. 阻止对象扩展


  `// preventextensions.js`


  `var point = {x:1, y:1};`


  `print("isExtensible() = " + Object.isExtensible(point));`


  `// 使 point 不可扩展`


  `Object.preventExtensions(point);`


  `print("isExtensible() = " + Object.isExtensible(point));`


  `// 尝试向 point 添加新属性`


  `point.z = 1; // 在严格模式下会抛出错误`


  `// 检查属性 z 是否已添加到 point`


  `print("point has property z = " + ("z" in point));`


  `// point 继承自 Object.prototype。让我们在 Object.prototype 中添加一个名为 z 的属性`


  `Object.prototype.z = 1;`


  `// 检查属性 z 是否已添加到 point。现在 point 从 Object.prototype 继承了名为 z 的属性。`


  `print("point has property z = " + ("z" in point));`


  `// 以下语句无效，因为 point 对象仍然不可扩展。`


  `point.z = 100;`


  `print("z = " + point.z); // 读取 Object.prototype.z`


  `isExtensible() = true`


  `isExtensible() = false`


  `point has property z = false`


  `point has property z = true`


  `z = 1`


  ## 访问缺失属性


  Nashorn 提供了一个扩展，允许你向对象添加一个方法，当访问该对象的不存在属性时，会调用此方法。你也可以为不存在的方法提供这样的方法。属性名称是 `__noSuchProperty__`
  和 `__noSuchMethod__`。请注意属性名称前后的两个下划线。这两个属性都是函数。如果你正在处理一个项目并且到处都需要此行为，你应该将这些钩子添加到
  `Object.prototype` 中，这样默认情况下所有对象都可以使用它们。清单 4-18 展示了如何将这些属性添加到 `Object.prototype`。`__noSuchProperty__`
  的函数会接收正在被访问的属性名称。`__noSuchMethod__` 的函数会接收方法名称以及方法调用中使用的所有参数。你可以在函数内部使用 `arguments`
  对象访问所有参数。


  清单 4-18\. 添加缺失属性和方法钩子


  `// missingprops.js`


  `var point = {x:10, y:20};`


  `// 添加无此属性和无此方法的钩子`


  `Object.prototype.__noSuchProperty__ = function (prop) {`


  `throw Error("No such property: " + prop);`


  `};`


  `Object.prototype.__noSuchMethod__ = function () {`


  `var desc = arguments[0] + "(";`


  `if (arguments.length > 1) {`


  `desc += arguments[1];`


  `}`


  `for (var i = 2; i < arguments.length; i++) {`


  `desc += ", " + arguments[i];`


  `}`


  `desc += ")";`


  `throw Error("No matching method found: " + desc);`


  `};`


  `// 尝试访问 point.z。将抛出错误。`


  `try {`


  `var z = point.z;`


  `}`


  `catch(e) {`


  `print(e.message);`


  `}`


  `// 尝试调用一个名为 dustance 的不存在方法`


  `try {`


  `point.distance(10, 20);`


  `}`


  `catch(e) {`


  `print(e.message);`


  `}`


  `No such property: z`


  `No matching method found: distance(10, 20)`




  ## 序列化对象


  Nashorn 支持使用名为 `JSON` 的内置对象来序列化和反序列化对象。JSON 也是一个缩写，全称为 JavaScript Object Notation，它规定了如何将
  JavaScript 对象转换为字符串，反之亦然。JSON 是一种数据交换格式，在 [`http://www.ietf.org/rfc/rfc4627.txt`](http://www.ietf.org/rfc/rfc4627.txt)
  的 RFC 4627 中进行了描述。`JSON` 对象包含两个方法：


  *   `JSON.stringify(value, replacer, indentation)`

  *   `JSON.parse(text, reviver)`


  `JSON.stringify()` 方法将 Nashorn 值转换为字符串。`JSON.parse()` 方法将 JSON 格式的字符串转换为 Nashorn
  值。


  `stringify()` 方法中的 `value` 参数可以是一个对象或一个原始值。并非所有类型的值都能被字符串化。例如，`undefined` 不能被字符串化。`NaN`
  和 `Infinity` 会被字符串化为 `null`。


  `replacer` 参数是一个 `function` 或一个数组。如果 `replacer` 是一个函数，它接受两个参数。第一个参数是被字符串化的属性名称，第二个参数是该属性的值。该函数的返回值将作为最终被字符串化的值。如果函数返回
  `undefined` 或不返回任何值，则该属性不会被字符串化。第一次调用 `replacer` 时，属性名称为空字符串，值为被字符串化的对象。后续调用则传入被字符串化属性的属性名称和属性值。如果
  `replacer` 是一个数组，它包含要字符串化的属性名称。数组中未出现的任何属性都不会被字符串化。


  `indentation` 是一个数字或字符串，用于输出中的缩进。如果它是一个数字，则表示用于缩进的空格数。其值上限为 10。如果它是一个字符串，例如 `"\t"`，则用于每一级的缩进。`replacer`
  和 `indentation` 参数在 `stringify()` 方法中是可选的。


  `reviver` 是一个函数，在将 JSON 文本解析为对象时调用。它接受两个参数。第一个参数是被解析的属性名称，第二个参数是该属性的值。如果函数返回 `null`
  或 `undefined`，则相应的属性会被删除。


  清单 4-19 演示了 `JSON` 对象的使用。它序列化一个对象。在序列化过程中，它将属性的值乘以 2。在解析过程中，它应用反向逻辑来恢复对象。


  清单 4-19\. 使用 JSON 对象序列化和解析对象


  `// json.js`


  `var point = {x: 10, y: 20};`


  `function replacer (key, value) {`


  `if (key === "x" || key === "y") {`


  `// 将值乘以 2`


  `return value * 2;`


  `}`


  `else {`


  `// 直接返回值`


  `return value;`


  `}`


  `}`


  `function reviver (key, value) {`


  `if (key === "x" || key === "y") {`


  `// 将值除以 2`


  `return value / 2;`


  `}`


  `else {`


  `return value;`


  `}`


  `}`


  `var pointString = JSON.stringify(point, replacer, "  ");`


  `print("序列化后的对象是");`


  `print(pointString);`


  `var obj = JSON.parse(pointString, reviver);`


  `print("解析后的对象属性是");`


  `for(var prop in obj) {`


  `print("obj[" + prop + "] =  " + obj[prop]);`


  `}`


  `序列化后的对象是`


  `{`


  `"x": 20,`


  `"y": 40`


  `}`


  `解析后的对象属性是`


  `obj[x] =  10`


  `obj[y] = 20`


  ## 动态评估脚本


  Nashorn 包含一个名为 `eval(string)` 的全局函数。它接受一个包含 Nashorn 代码的字符串作为参数，执行该代码，并返回代码中最后一个被评估的值。以下代码片段展示了一个使用
  `eval()` 函数将两个数字相加的简单示例：


  `// 将 300 赋值给 sum`


  `var sum = eval("100 + 200");`


  你不会为了如此简单的计算而使用 `eval()` 函数。Nashorn 可以在不使用 `eval()` 函数的情况下执行像 100 + 200 这样的算术表达式。当你需要在运行时获取
  Nashorn 代码字符串时，才会使用它。


  `eval()` 函数在调用者的上下文中执行。如果从全局上下文中调用，它就在全局上下文中执行。如果从一个函数中调用，它就在该函数的上下文中执行。


  清单 4-20 演示了 `eval()` 函数执行的上下文。第一次，它在全局上下文中被调用，因此它在全局上下文中定义了一个新变量 `z` 并将其设置为 300。它从全局上下文中读取
  `x` 的值，将其乘以 2，并返回 200 赋值给 `y`。第二次，它从函数内部被调用，并作用于该函数的局部变量 `x`、`y` 和 `z`。


  清单 4-20\. EvalTest.js 文件的内容


  `// EvalTest.js`


  `var x = 100;`


  `var y = eval("var z = 300; x * 2;"); // 从全局上下文调用`


  `print(x, y, z);`


  `function testEval() {`


  `var x = 300;`


  `// 从函数上下文调用`


  `var y = eval("var z = 900; x * 2;");`


  `print(x, y, z);`


  `}`


  `testEval();`


  `100 200 300`


  `300 600 900`




  ## 变量作用域与提升


  Java 支持块级作用域。在块中声明的变量是该块的局部变量，在块之前和之后都无法访问。Nashorn（以及所有 JavaScript 实现）支持两种作用域：


  *   全局作用域

  *   函数作用域


  全局代码中的变量和函数声明在全局作用域内的任何地方都是可用的。同样，函数内部的变量和函数声明在该函数内部的任何地方都是可用的。


  请查看清单 4-21 中的代码及其输出。如果你之前没有接触过 JavaScript，这个输出会让你感到惊讶。


  清单 4-21\. Nashorn 中的声明提升


  `// beforehoisting.js`


  `// 尝试在声明 empId 变量之前访问它`


  `print("1\. empId = " + empId);`


  `// 现在声明并初始化 empId`


  `var empId = 100;`


  `function test() {`


  `if (empId === undefined) {`


  `var empId = 200;`


  `}`


  `print("2\. empId = " + empId);`


  `}`


  `// 调用 test 函数`


  `test();`


  `print("3\. empId = " + empId);`


  `1\. empId = undefined`


  `2\. empId = 200`


  `3\. empId = 100`


  第一个输出显示，你可以在声明变量之前访问它。该变量的值是 `undefined`。在 `test()` 函数内部，你可能会期望表达式 `empId === undefined`
  会从全局作用域读取 `empId` 的值，并且计算结果为 `false`。然而，输出结果却相反。第二个输出显示 `test()` 函数内部的 `if` 条件计算结果为
  `true`，并且局部变量 `empId` 被设置为 200。第三个输出显示函数调用并未影响全局变量 `empId`，其值仍为 100。


  你可以通过两种方式来理解这种变量的作用域行为：


  *   作为一个两阶段过程：首先，处理所有声明。其次，执行代码。由于所有声明都在执行代码之前处理完毕，因此当代码执行时，所有变量和函数声明都是可用的，无论它们声明在何处。当然，你需要考虑这些声明的全局作用域和函数作用域。

  *   作为声明提升：这仅仅意味着所有变量和函数声明都被移动到其各自作用域的顶部。这等同于说，你已经在全局作用域和函数作用域的顶部声明了所有变量和函数。


  清单 4-22 展示了与清单 4-21 相同的代码，但这是在声明被提升之后。这一次，你在理解输出时将不会有任何问题。


  清单 4-22\. 声明提升后的重组代码


  `// afterhoisting.js`


  `var empId; // 已提升`


  `function test() {`


  `var empId; // 已提升`


  `if (empId === undefined) {`


  `empId = 200; // 提升后保留`


  `}`


  `print("2\. empId = " + empId);`


  `}`


  `// 尝试在声明 empId 变量之前访问它`


  `print("1\. empId = " + empId);`


  `// 现在声明并初始化 empId`


  `empId = 100; // 提升后保留`


  `// 调用 test 函数`


  `test();`


  `print("3\. empId = " + empId);`


  `1\. empId = undefined`


  `2\. empId = 200`


  `3\. empId = 100`


  请注意，提升发生在函数声明上，而不是函数表达式上，这使得你可以在函数声明之前调用它们。还有一点需要记住：只有变量声明被提升，而不是变量声明中的赋值部分，如清单
  4-22 所示。


  ## 使用严格模式


  你可以通过使用 `"use strict"` 指令在 Nashorn 脚本中使用严格模式。它被用在全局代码的开头或函数代码的开头。如果它被用在全局代码的开头，则所有代码都被视为在严格模式下执行。如果它出现在函数代码的开头，则只有该函数代码在严格模式下执行。你也可以在由
  `eval()` 函数执行的脚本中使用 `"use strict"` 指令。


  以下代码片段为全局作用域使用了 `"use strict"` 指令：


  `"use strict";`


  `// 错误。使用变量时未用 var 声明`


  `x = 10;`


  `// 其他代码在此处`


  当调用 `test()` 函数时，以下代码将抛出错误，因为该函数使用了 `"use strict"` 指令，并且它使用了一个名为 `y` 的变量，但未使用关键字
  `var` 进行声明：


  `x = 10; // 没问题。全局代码不在严格模式下`


  `function test() {`


  `"use strict";`


  `y = 100; // 执行时会导致错误`


  `}`


  `test();`


  ## 内置全局对象


  Nashorn 定义了许多内置对象。我将在后续章节中讨论其中的一些。


  ### Object 对象


  Nashorn 提供了一个名为 `Object` 的内置对象。你可以将其视为类似于 Java 中的 `java.lang.Object` 类。Nashorn 中的
  `Object` 充当其他对象的基对象。它有几个有用的属性，用于处理所有类型的对象。我已在之前的章节中讨论过其中许多属性。


  `Object` 是一个函数，也可以用作构造函数。它接受一个可选参数。如果你调用 `Object` 函数，其效果与使用 `new` 运算符调用 `Object`
  构造函数相同。如果你向该函数传递一个对象，它将返回同一对象的引用。如果你传递一个原始值，它将返回一个包装该原始值的包装器对象。你可以使用返回对象上的 `valueOf()`
  方法获取原始值。不带参数调用该函数会创建一个空对象。以下代码说明了如何使用 `Object`：


  `var str = "Hello";`


  `// 为 str 分配一个包装器给 p1，因为 str 是原始类型`


  `var p1 = new Object(str);`


  `print("p1.valueOf() is", p1.valueOf());`


  `print("typeof p1 is", typeof p1);`


  `print("p1.valueOf() === str is", p1.valueOf() === str);`


  `var msg = new String("Hello");`


  `// 将 msg 的引用分配给 p2。new Object(msg) 返回`


  `// msg 的引用，因为 msg 是一个对象。`


  `var p2 = new Object(msg);`


  `print("p2 === msg is", p2 === msg);`


  `print("p2.valueOf() is", p2.valueOf());`


  `print("typeof p2 is", typeof p2);`


  `print("p2.valueOf() === msg is", p2.valueOf() === msg);`


  `p1.valueOf() is Hello`


  `typeof p1 is object`


  `p1.valueOf() === str is true`


  `p2 === msg is true`


  `p2.valueOf() is Hello`


  `typeof p2 is object`


  `p2.valueOf() === msg is` `false`


  表 4-11 包含了 `Object` 的属性及方法列表及其描述。


  表 4-11.


  Object 的属性及方法列表及其描述




  | 属性/方法 | 描述 |

  | --- | --- |

  | `Object.prototype` | 它是 `Object` 的原型对象。其 `writable`、`enumerable` 和 `configurable`
  属性均被设置为 `false` |

  | `Object.prototype.constructor` | 包含对创建该对象的 `constructor` 函数的引用 |

  | `Object.create(p, descriptor)` | 创建一个新对象，将指定的 `p` 设置为原型，并将 `descriptor` 中的所有属性添加到新对象中。`descriptor`
  参数是可选的 |

  | `Object.defineProperties(obj, descriptors)` | 创建或更新指定对象的属性 |

  | `Object.defineProperty(obj, prop, descriptor)` | 创建或更新指定对象的指定属性 |

  | `Object.freeze(obj)` | 冻结指定对象，使其不可扩展、不可配置，并将其所有属性设置为只读 |

  | `Object.getOwnPropertyDescriptor(obj, prop)` | 返回指定对象指定属性的属性描述符 |

  | `Object.getOwnPropertyNames(obj)` | 返回一个数组，包含指定对象所有自有属性的名称。该数组也包含不可枚举的属性 |

  | `Object.getPrototypeOf(obj)` | 返回指定对象的原型 |

  | `Object.isExtensible(obj)` | 如果指定对象是可扩展的，返回 `true`，否则返回 `false` |

  | `Object.isFrozen(obj)` | 如果指定对象是冻结的，返回 `true`，否则返回 `false` |

  | `Object.isSealed(obj)` | 如果指定对象是密封的，返回 `true`，否则返回 `false` |

  | `Object.keys(obj)` | 返回一个数组，包含指定对象所有可枚举、非继承属性的名称 |

  | `Object.preventExtensions(object)` | 使指定对象不可扩展，从而无法向该对象添加新属性 |

  | `Object.prototype.hasOwnProperty(prop)` | 如果对象拥有指定的自有属性，返回 `true`；否则返回 `false`
  |

  | `Object.prototype.isPrototypeOf(obj)` | 如果指定对象是调用 `isPrototypeOf()` 方法的对象的原型，返回
  `true`；否则返回 `false` |

  | `Object.prototype.propertyIsEnumerable(prop)` | 如果指定属性是可枚举的，返回 `true`；否则返回 `false`
  |

  | `Object.prototype.toLocaleString()` | 返回对象的本地化字符串表示。此方法旨在被子类重写。默认情况下，它返回 `toString()`
  方法返回的字符串 |

  | `Object.prototype.toString()` | 返回对象的字符串表示。此方法旨在被子类重写。默认情况下，它返回字符串 `[object class]`，其中
  `class` 是对象的类名，例如 `String`、`Date`、`Object` 等 |

  | `Object.prototype.valueOf()` | 如果对象包装了一个原始值，则返回该原始值。否则，返回对象本身 |

  | `Object.seal(obj)` | 密封指定对象 |

  | `Object.setPrototypeOf(obj, proto)` | 将指定的 `proto` 设置为指定 `obj` 的原型 |


  ### 函数对象


  `Function` 对象是一个可以作为函数或构造函数调用的函数。将其作为函数调用与作为构造函数调用的方式相同。它根据字符串创建一个新的函数对象。它接受可变数量的参数，并具有以下签名：


  `Function(p1, p2, p3,..., body);`


  其中，`p1`、`p2`、`p3` 等是新函数的形式参数名称，`body` 是函数体。最后一个参数始终是函数体。如果调用时不带任何参数，它将创建一个没有形式参数和空函数体的空函数。以下代码片段创建了一个接受两个参数并返回对两个参数应用
  `+` 运算符结果的函数。调用 `adder(10, 20)` 将返回 30：


  `var adder = new Function("p1", "p2", "return p1 + p2");`


  `Function.prototype` 是一个对象，它本身也是一个 `Function` 对象。`Function.prototype` 被设置为所有你创建的函数的原型对象。因此，`Function.prototype`
  中所有可用的属性在所有函数中都是可用的。`Function.prototype` 中定义了以下属性：


  *   `Function.prototype.constructor`

  *   `Function.prototype.toString()`

  *   `Function.prototype.apply(thisArg, argArray)`

  *   `Function.prototype.call(thisArg, arg1, arg2,...)`

  *   `Function.prototype.bind(thisArg, arg1, arg2,...)`


  `Function.prototype.constructor` 属性被设置为内置的 `Function` 构造函数。


  `Function.prototype.toString()` 方法返回函数对象的与实现相关的表示。以下代码展示了如何使用此方法以及它为不同类型对象返回的值。请注意，对于用户定义的函数，它返回函数声明字符串；对于内置函数，函数体返回为
  `[native code]`：


  `function adder(n1, n2) {`


  `return n1 + n2;`


  `}`


  `// 调用用户定义的 adder 函数的 toString() 方法`


  `var adderStr = adder.toString();`


  `// 调用内置 print 函数的 toString() 方法`


  `var printStr = print.toString;`


  `print("adderStr: \n" + adderStr);`


  `print("printstr:\n" + printStr);`


  `adderStr:`


  `function adder(n1, n2) {`


  `return n1 + n2;`


  `}`


  `printstr:`


  `function toString() { [native code] }`


  `apply()` 和 `call()` 方法用于相同的目的。两者都用于为对象调用方法。它们仅在参数类型上有所不同。这两个方法的第一个参数都是调用该方法的上下文对象。`apply()`
  方法允许你以数组形式指定方法的参数，而 `call()` 方法允许你分别指定每个参数。这些方法允许你在任何其他对象上调用一个对象的方法。你可以使用这些方法来调用对象的被重写方法。


  以下代码展示了如何在 `String` 对象上调用 `Object.prototype` 的 `toString()` 方法：


  `// 创建一个 String 对象`


  `var str = new String("Hello");`


  `// 调用 String 对象的 toString() 方法`


  `var stringToString = str.toString();`


  `// 在 str 上调用 Object.prototype 对象的 toString() 方法`


  `var objectToString = Object.prototype.toString.call(str);`


  `print("String.toString(): " + stringToString);`


  `print("Object.prototype.toString(): " + objectToString);`


  `String.toString(): Hello`


  `Object.prototype.toString(): [object String]`


  `bind()` 方法将一个函数绑定到一个对象，并返回一个新的函数对象。当调用新函数时，它会在绑定对象的上下文中执行。它接受可变长度的参数。第一个参数是你想要绑定到函数的对象。其余参数是你想要绑定到函数的参数。如果你将任何参数绑定到函数，那么当你调用绑定函数时，这些参数将被使用。




  假设你想为 `Point` 对象创建一个函数，用于计算某个 `Point` 到原点的距离。你可以创建一个 `Point` 来表示原点，并将 `Point.prototype.distance`
  函数绑定到这个对象上，从而得到一个新函数。清单 4-23 演示了这种技术。


  清单 4-23\. 将函数绑定到对象


  `// functionbind.js`


  `load("Point.js");`


  `// 创建一个二维原点`


  `var origin = new Point(0, 0);`


  `// 通过将 Point 的 distance() 方法绑定到 origin 对象，创建一个名为 distanceFromOrigin() 的新方法`


  `var distanceFromOrigin = Point.prototype.distance.bind(origin);`


  `var dist = distanceFromOrigin(new Point(0, 10));`


  `print(dist);`


  `// 上述 distanceFromOrigin() 等同于以下写法`


  `var dist2 = origin.distance(new Point(0, 10));`


  `print(dist2);`


  `10`


  `10`


  关于 `Function()` 构造函数，一个重要的点是：它创建的函数不使用词法作用域；相反，它们总是被编译成顶级函数。清单 4-24 演示了这个微妙的点。


  清单 4-24\. 测试由 Function 对象创建的函数的捕获作用域


  `// functioncapture.js`


  `var empId = 100; // 全局变量`


  `function createFunction1() {`


  `var empId = 200;  // 局部变量`


  `// 不捕获局部变量 empId`


  `var test = new Function("print(empId)");`


  `return test;`


  `}`


  `function createFunction2() {`


  `var empId = 200; // 局部变量`


  `function test () {`


  `print(empId); // 捕获局部变量 empId`


  `}`


  `return test;`


  `}`


  `createFunction1()(); // 输出 100（全局变量 empId）`


  `createFunction2()(); // 输出 200（局部变量 empId）`


  `100`


  `200`


  当 `createFunction1()` 使用 `Function` 对象创建一个新函数时，新函数不会捕获局部变量 `empId`，而是捕获全局变量 `empId`。然而，当在
  `createFunction2()` 函数内部声明一个嵌套函数时，新函数会捕获局部变量 `empId`。输出结果验证了这一规则。


  ### String 对象


  String 对象是一个函数。它可以简单地作为函数或构造函数使用。当它作为函数使用时，它会将参数转换为原始类型的字符串值。以下是使用 `String` 作为函数的示例：


  `var str1 = String(100); // 返回 "100"`


  `var str2 = String();    // 返回 ""`


  当 `String` 作为构造函数使用时，它会创建一个新的 `String` 对象，其内容为传入的参数：


  `// 创建一个 String 对象`


  `var str = new String("Hello");`


  String 对象中的每个字符都被分配了一个索引。第一个字符的索引为 0，第二个为 1，依此类推。每个 String 对象都有一个名为 `length` 的只读属性，其中包含字符串中的字符数。


  `String.prototype` 包含许多有用的方法，用于操作 String 对象并以不同方式获取其内容。表 4-12 列出了这些方法。请注意，你可以在原始字符串值上使用所有
  String 对象方法；在应用方法之前，原始字符串会自动转换为 String 对象。


  表 4-12.


  String.prototype 中的方法列表及其描述


  | 方法 | 描述 |

  | --- | --- |

  | `charAt(index)` | 返回指定 `index` 处的字符，作为原始字符串值 |

  | `charCodeAt(index)` | 返回指定 `index` 处字符的 Unicode 值 |

  | `concat(arg1, arg2, ...)` | 返回一个原始字符串，该字符串由对象的内容和指定的参数拼接而成 |

  | `indexOf(substring, start)` | 返回子字符串在对象中首次出现的索引。搜索从 `start` 开始。如果未传递 `start`，则从索引
  0 开始搜索 |

  | `lastIndexOf(substring, start)` | 与 `indexOf()` 方法的工作方式相同，区别在于它从字符串末尾开始搜索 `substring`
  |

  | `localeCompare(target)` | 返回一个数字。如果字符串小于 `target`，则返回负数；如果字符串大于 `target`，则返回正数；否则返回零
  |

  | `match(regexp)` | 在字符串中搜索指定的正则表达式 `regexp`，并将结果以数组形式返回 |

  | `replace(regexp, replacement)` | 使用正则表达式 `regexp` 搜索字符串，将匹配的子字符串替换为 replacement，并将结果作为原始字符串值返回
  |

  | `search(regexp)` | 在字符串中搜索指定的正则表达式，并返回首次出现的索引。如果未找到匹配项，则返回 –1 |

  | `slice(start, end)` | 返回一个子字符串，包含字符串中从 `start` 到 `end` 索引之间的字符，其中 `start` 包含在内，`end`
  不包含在内。如果未指定 `end`，则返回从 `start` 开始的所有字符。如果 `end` 为负数，则从末尾开始计算索引。`"Hello".slice(1,
  2)` 返回 `"e"`，`"Hello".slice(1, -2)` 返回 `"el"` |

  | `split(delimiter, limit)` | 通过围绕指定的 `delimiter` 分割字符串来返回一个数组。`limit` 是可选的，它指定数组中返回的最大元素数量
  |

  | `substring(start, end)` | 返回字符串的一个子字符串，从 `start` 开始，到 `end` 结束（但不包括 `end`）。如果任一参数为
  `NaN` 或负数，则将其替换为零。如果它们大于字符串的长度，则将其替换为字符串的长度。如果 `start` 大于 `end`，则交换它们。`"Hello".slice(1,
  2)` 返回 `"e"`，`"Hello".slice(1, -2)` 返回 `"H"` |

  | `toLowerCase()` | 通过将大写字符替换为对应的小写字符，返回字符串的小写形式 |

  | `toLocaleLowerCase()` | 与 `toLowerCase()` 工作方式相同，区别在于它使用特定于区域设置的大写字母到小写字母的映射 |

  | `toUpperCase()` | 通过将小写字符替换为对应的大写字符，返回字符串的大写形式 |

  | `toLocaleUpperCase()` | 与 `toUpperCase()` 工作方式相同，区别在于它使用特定于区域设置的小写字母到大写字母的映射 |

  | `toString()` | 将 String 对象的内容作为原始字符串值返回 |

  | `trim()` | 通过移除字符串中的空白字符，返回一个原始字符串值 |

  | `valueOf()` | 与 `toString()` 相同 |




  ### Number 对象


  `Number` 对象是一个函数。它可以作为函数或构造函数调用。当作为函数调用时，它会将提供的参数转换为原始数值。如果不带参数调用，则返回原始数值零。当作为构造函数调用时，它会返回一个包装了指定参数的
  Number 对象。你可以将 Number 对象视为 Java 中的包装对象 `Integer`、`Long`、`Float`、`Double`、`Short`
  和 `Byte` 类型。Number 对象的 `valueOf()` 方法返回存储在对象中的原始数值。以下代码展示了如何将 Number 对象用作函数和构造函数：


  `// 将字符串 "24" 转换为数字 24，并将 24 赋值给 n1`


  `var n1 = Number("24");`


  `// 将零赋值给 n2`


  `var n2 = Number();`


  `// 为数字 100.43 创建一个 Number 对象`


  `var n3 = new Number(100.43);`


  `printf("n1 = %d, n2 = %d, n3 = %f", n1, n2, n3.valueOf());`


  `n1 = 24, n2 = 0, n3 = 100.430000`


  Number 对象包含几个用于处理数字的有用属性。它们列在表 4-13 中。所有列出的方法都定义在 `Number.prototype` 对象中。


  表 4-13.


  Number 对象的属性和方法列表及其描述


  | 属性/方法 | 描述 |

  | --- | --- |

  | `Number.MAX_VALUE` | 这是 Number 类型中最大的正有限值。大约为 1.7976931348623157e+308 |

  | `Number.MIN_VALUE` | 这是 Number 类型中最小的正有限值。大约为 4.9e-324 |

  | `Number.NaN` | 与表示非数字的全局变量 `NaN` 相同 |

  | `Number.NEGATIVE_INFINITY` | 表示负无穷大。与全局变量 `–Infinity` 相同 |

  | `Number.POSITIVE_INFINITY` | 表示正无穷大。与全局变量 `Infinity` 相同 |

  | `toString(radix)` | 将 Number 转换为指定的 `radix`（进制）。如果未指定 radix，则使用 10。radix 必须是介于
  2 到 36（含）之间的数字 |

  | `toLocaleString()` | 将数字格式化为本地特定格式，并作为原始字符串值返回。目前，它返回与 `toString()` 方法相同的值 |

  | `valueOf()` | 返回存储在 Number 对象中的原始值 |

  | `toFixed(digits)` | 返回数字的字符串表示形式，该表示形式在小数点后恰好包含指定的 `digits`（位数）。必要时会对数字进行四舍五入。如果小数点后的位数少于指定的
  `digits`，则用零填充。如果数字大于 1e+21，它将返回以指数表示法表示的数字字符串。如果未指定 `digits`，则假定为零。`digits` 可以在
  0 到 20 之间 |

  | `toExponential(digits)` | 返回以指数表示法表示的数字字符串。小数点前包含一位数字，小数点后包含 `digits` 位数字。`digits`
  可以在 0 到 20 之间 |

  | `toPrecision(precision)` | 返回具有 `precision`（精度）个有效数字的数字字符串表示形式。它可能以十进制或指数表示法返回数字。如果未指定
  `precision`，则会将数字转换为字符串并返回结果 |


  你可以在所有原始数字上调用 Number 对象的所有方法。但是，在原始数值上调用方法时必须小心。数字也可以有小数部分。解析器在以下语句中会混淆：


  `var x = 1969.toString(16); // 语法错误`


  解析器不知道 1969 后面的小数点是数字的一部分，还是用于调用 `toString()` 方法的点。你有两种方法可以解决这个问题：


  *   你需要在数字中使用两个小数点。最后一个小数点将被视为调用后续方法的点，例如 `1969..toString(16)`。

  *   将数字括在一对括号中，例如 `(1969).toString(16)`。


  以下代码展示了如何将 Number 对象的方法与原始数字一起使用：


  `var n1 = 1969..toString(16);`


  `print("1969..toString(16) 的结果是 " + n1);`


  `var n2 = (1969).toString(16);`


  `print("(1969).toString(16) 的结果是 " + n2);`


  `var n3 = (1969.79).toFixed(1);`


  `print("(1969.79).toFixed(1) 的结果是 " + n3);`


  `1969..toString(16) 的结果是 7b1`


  `(1969).toString(16) 的结果是 7b1`


  `(1969.79).toFixed(1) 的结果是 1969.8`


  ### Boolean 对象


  Boolean 对象是一个函数。它可以作为函数或构造函数调用。它接受一个可选参数。如果作为函数调用，它会将指定的参数转换为布尔原始值（`true` 或 `false`）。如果未指定参数，该函数返回
  `false`。作为构造函数，它将指定的参数包装到 Boolean 对象中。请注意，如果参数不是布尔类型，则首先将参数转换为布尔原始值。例如，参数 100 将被转换为布尔值
  `true` 并存储为 `true`，而不是 100。它的 `toString()` 方法根据 Boolean 对象中包装的值返回字符串 “true” 或 “false”。`valueOf()`
  方法返回包装在对象中的原始布尔值。Boolean 对象没有任何其他有趣的属性或方法。以下代码展示了如何使用 Boolean 对象：


  `var b1 = Boolean(100);      // 将 true 赋值给 b1`


  `var b2 = Boolean(0);        // 将 false 赋值给 b2`


  `var b3 = Boolean();         // 将 false 赋值给 b3`


  `var b4 = new Boolean(true); // 将一个 Boolean 对象赋值给 b4`


  `print("Boolean(100) 返回 " + b1);`


  `print("Boolean(0) 返回 " + b2);`


  `print("Boolean() 返回 " + b3);`


  `print("b4.valueOf() 返回 " + b4.valueOf());`


  `Boolean(100) 返回 true`


  `Boolean(0) 返回 false`


  `Boolean() 返回 false`


  `b4.valueOf() 返回 true`




  ### Date 对象


  Date 对象是一个函数。它可以作为函数或构造函数调用。其签名如下：


  `Date(year, month, date, hours, minutes, seconds, milliseconds)`


  Date 对象中的所有参数都是可选的。当它作为函数调用时，会以字符串形式返回当前的日期和时间。作为函数调用时，你可以向其传递参数；但是，所有参数都会被忽略。当它作为构造函数调用时，参数代表日期组件，并用于初始化
  Date 对象。以下代码展示了如何将 Date 对象作为函数使用，以获取当前日期和时间。运行代码时，你可能会得到不同的输出：


  `// 将 Date 作为函数调用`


  `print(Date());`


  `print(Date(2014, 10, 4, 19, 2)); // 传递给 Date 的参数被忽略`


  `Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)`


  `Sat Oct 04 2014 19:07:20 GMT-0500 (CDT)`


  Date 对象可以作为构造函数调用，并以以下形式传递参数：


  *   `new Date()`

  *   `new Date(milliseconds)`

  *   `new Date(dateString)`

  *   `new Date(year, month, day, hours, minutes, seconds, milliseconds)`


  如果参数数量少于两个，则使用前三种形式之一。如果参数数量为两个或更多，则使用第四种形式。如果没有传递参数，它会创建一个包含当前日期和时间的 Date 对象。如果只传递一个数字参数，它将被视为自
  1970 年 1 月 1 日午夜（UTC）以来经过的毫秒数。如果只传递一个字符串参数，则会解析该字符串中的日期和时间，并将其用作新 Date 对象的日期和时间值。如果传递了两个或更多参数，则会构造一个
  Date 对象；剩余的值中，日期默认为 1，小时、分钟、秒和毫秒默认为 0。Date 对象有一个静态方法 `Date.now()`，它返回自 1970 年 1
  月 1 日午夜（UTC）到当前时间之间经过的毫秒数。


  以下代码展示了如何通过向构造函数传递不同数量的参数来创建 Date 对象：


  `// 当前日期和时间`


  `print("new Date() =", new Date());`


  `// 传递 2000 毫秒`


  `print("new Date(2000) =", new Date(2000));`


  `// 传递 2000 毫秒并转换为 UTC 日期时间字符串`


  `print("new Date(2000).toUTCString() =", new Date(2000).toUTCString());`


  `// 将日期作为字符串传递。日期被视为 UTC 时间`


  `print(''new Date("2014-14-04") ='', new Date("2014-14-04"));`


  `// 传递年份和月份。日期将默认为 1`


  `print("new Date(2014, 10) = ", new Date(2014, 10));`


  `// 传递年份、月份、日期和小时。其他部分将默认为 0`


  `print("new Date(2014, 10, 4, 10) = ", new Date(2014, 10, 4, 10));`


  `// 自 1970 年 1 月午夜以来经过的毫秒数`


  `print("Date.now() = ", Date.now());`


  `new Date() = Sat Oct 04 2014 19:38:46 GMT-0500 (CDT)`


  `new Date(2000) = Wed Dec 31 1969 18:00:02 GMT-0600 (CST)`


  `new Date(2000).toUTCString() = Thu, 01 Jan 1970 00:00:02 GMT`


  `new Date("2014-14-04") = Fri Oct 03 2014 19:00:00 GMT-0500 (CDT)`


  `new Date(2014, 10) =  Sat Nov 01 2014 00:00:00 GMT-0500 (CDT)`


  `new Date(2014, 10, 4, 10) =  Tue Nov 04 2014 10:00:00 GMT-0600 (CST)`


  `Date.now() =` `1412469527013`


  Date 对象有超过四十种方法。我将简要解释它们。这些方法的工作方式相同，只是作用于日期和时间的不同组件。它包含 `getYear()`、`getFullYear()`、`getDate()`、`getMonth()`、`getHours()`、`getMinutes()`、`getSeconds()`
  和 `getMilliseconds()` 方法，这些方法分别返回 Date 对象的两位数年份、完整年份、日期、月份、小时、分钟、秒和毫秒组件。它还包含一个 `getDay()`
  方法，该方法返回星期几（0 代表星期日，6 代表星期六）。还有相应的 setter 方法，例如 `setHours()`、`setDate()` 等，用于设置日期和时间组件。还有另一组
  getter 和 setter 方法用于处理 UTC 日期和时间；它们的名称基于 `getUTCXxx` 和 `setUTCXxx` 模式，例如 `getUTCYear()`、`getUTCHours()`、`setUTCYears()`、`setUTCHours()`
  等。`getTime()` 和 `setTime()` 方法用于处理自 1970 年 1 月午夜以来经过的毫秒数。`Date` 对象包含几个名为 `toXxxString()`
  的方法，用于将日期转换为特定的字符串格式。例如，`toDateString()` 返回日期部分的人类可读字符串格式，而 `toTimeString()` 的工作方式相同，但作用于时间部分。


  `Date.parse(str)` 静态方法将指定的 `str` 解析为 `YYYY-MM-DDTHH:mm:ss.sssZ` 格式的日期和时间，并返回自 1970
  年 1 月 1 日午夜（UTC）到解析出的日期和时间之间经过的毫秒数。


