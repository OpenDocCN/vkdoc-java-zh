- "# 11. 在 Nashorn 中使用 JavaFX\n\n在本章中，你将学习：\n\n*   `jjs` 命令行工具中的 JavaFX 支持\n*   在脚本中为\
  \ JavaFX `Application` 类的 `init()`、`start()` 和 `stop()` 方法提供实现\n*   如何使用预定义脚本加载和使用\
  \ JavaFX 包和类\n*   使用 Nashorn 脚本创建并启动一个简单的 JavaFX 应用程序\n\n在本章中，假设你具备 JavaFX 8 的初级经验。如果你没有\
  \ JavaFX 经验，请在阅读本章之前先学习 JavaFX。\n\n## jjs 中的 JavaFX 支持\n\n`jjs` 命令行工具允许你启动在 Nashorn\
  \ 脚本中创建的 JavaFX 应用程序。你需要使用 `jjs` 工具的 `–fx` 选项来将脚本作为 JavaFX 应用程序运行。以下命令将存储在 `myfxapp.js`\
  \ 文件中的脚本作为 JavaFX 应用程序运行：\n\n`jjs –fx myfxapp.js`\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n## 脚本中 JavaFX 应用程序的结构\n\n在 JavaFX 应用程序中，您需要重写 `Application` 类的以下三个方法来管理应用程序的生命周期：\n\
  \n*   `init()` 方法\n*   `start()` 方法\n*   `stop()` 方法\n\n在 Nashorn 脚本中，您可以像在 Java\
  \ 中一样管理 JavaFX 应用程序的生命周期。您可以在脚本中定义三个名为 `init()`、`start()` 和 `stop()` 的函数。请注意，在 Nashorn\
  \ 脚本中，这三个函数都是可选的。这些函数对应于 Java 类中的三个方法，并按以下顺序调用：\n\n首先调用 `init()` 函数。您可以在此函数中初始化应用程序。\
  \  \n然后调用 `start()` 函数。与 Java 应用程序一样，`start()` 函数会接收到应用程序主舞台（primary stage）的引用。您需要填充场景（scene），将场景添加到主舞台，并显示舞台。\
  \  \n当 JavaFX 应用程序退出时，会调用 `stop()` 函数。  \n提示\n\n如果您的 JavaFX 应用程序脚本中没有 `start()`\
  \ 函数，那么全局作用域中的整个脚本将被视为 `start()` 函数的代码。您可以拥有除这三个函数之外的其他函数。它们将被视为普通函数，不会赋予任何特殊含义。这些函数不会被自动调用；您需要在脚本中手动调用它们。\n\
  \n清单 11-1 包含一个用 Java 编写的简单 JavaFX 应用程序的代码。它显示一个窗口，其中包含一个 `StackPane` 中的 `Text` 节点。`HelloFX`\
  \ 类包含了 `init()`、`start()` 和 `stop()` 方法。图 11-1 显示了 `HelloFX` 应用程序显示的窗口。当您退出应用程序时，`stop()`\
  \ 方法会在标准输出上显示一条消息。\n\n清单 11-1\\. Java 中的 HelloFX 应用程序\n\n`// HelloFX.java`\n\n`package\
  \ com.jdojo.script;`\n\n`import javafx.application.Application;`\n\n`import javafx.scene.Scene;`\n\
  \n`import javafx.scene.layout.StackPane;`\n\n`import javafx.scene.text.Font;`\n\n\
  `import javafx.scene.text.Text;`\n\n`import javafx.stage.Stage;`\n\n`public class\
  \ HelloFX extends Application {`\n\n`private Text msg;`\n\n`private StackPane sp;`\n\
  \n`public static void main(String[] args) {`\n\n`Application.launch(HelloFX.class);`\n\
  \n`}`\n\n`@Override`\n\n`public void init() {`\n\n`msg = new Text(\"Hello JavaFX\
  \ from Nashorn!\");`\n\n`msg.setFont(Font.font(\"Helvetica\", 18));`\n\n`sp = new\
  \ StackPane(msg);`\n\n`}`\n\n`@Override`\n\n`public void start(Stage stage) throws\
  \ Exception {`\n\n`stage.setTitle(\"Hello FX\");`\n\n`stage.setScene(new Scene(sp,\
  \ 300, 100));`\n\n`stage.sizeToScene();`\n\n`stage.show();`\n\n`}`\n\n`@Override`\n\
  \n`public void stop() {`\n\n`System.out.println(\"Hello FX application is stopped.\"\
  );`\n\n`}`\n\n`}`\n\n`Hello FX application is stopped.`\n\n![A978-1-4842-0713-0_11_Fig1_HTML.jpg](img/A978-1-4842-0713-0_11_Fig1_HTML.jpg)\n\
  \n图 11-1.\n\nHelloFX 应用程序显示的窗口\n\n清单 11-2 包含了 `HelloFX` 应用程序的 Nashorn 脚本。它是清单 11-1\
  \ 中 Java 代码的一对一翻译。请注意，用 Nashorn 编写的同一应用程序的代码要短得多。该脚本存储在 `hellofx.js` 文件中。您可以使用如下命令提示符运行该脚本，它将显示与图\
  \ 11-1 相同的窗口：\n\n`jjs –fx hellofx.js`\n\n清单 11-2\\. 存储在 hellofx.js 中的 HelloFX 应用程序的\
  \ Nashorn 脚本\n\n`// hellofx.js`\n\n`var msg;`\n\n`var sp;`\n\n`function init() {`\n\
