  \ javafx.scene.Scene(sp, 300, 100));`\n\n`stage.sizeToScene();`\n\n`stage.show();`\n\
  \n`}`\n\n您可以进一步简化 HelloFX 应用程序的脚本。您可以从脚本中移除 `start()` 函数。JavaFX 运行时创建主舞台并将其引用传递给\
  \ `start()` 函数。如果没有 `start()` 函数，您将如何获取主舞台的引用？Nashorn 会创建一个名为 `$STAGE` 的全局对象，它就是主舞台的引用。您可以使用这个全局对象来处理主舞台。您甚至不需要显示主舞台；Nashorn\
  \ 会自动为您显示它。\n\n清单 11-3 包含了同一 HelloFX 应用程序的另一个版本的脚本。它使用全局对象 `$STAGE` 来引用主舞台。我已经移除了\
  \ `init()` 函数。这次，您甚至没有调用主舞台的 `show()` 方法。您让 Nashorn 自动为您显示主舞台。该脚本保存在 `hellofx3.js`\
  \ 文件中。您可以运行该脚本：\n\n`jjs –fx hellofx3.js`\n\n清单 11-4\\. 没有 init()、start() 和 stop()\
  \ 函数的 HelloFX 应用程序的另一个版本\n\n`// hellofx3.js`\n\n`var msg = new javafx.scene.control.Label(\"\
  Hello JavaFX from Nashorn!\");`\n\n`msg.font = javafx.scene.text.Font.font(\"Helvetica\"\
