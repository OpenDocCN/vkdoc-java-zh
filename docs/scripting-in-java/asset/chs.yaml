  提示


  默认情况下，`ScriptEngineManager` 创建的所有 `ScriptEngine` 都共享其 `Bindings` 作为它们的全局作用域 `Bindings`。如果你使用
  `ScriptEngine` 的 `setBindings()` 方法来设置其全局作用域 `Bindings`，或者使用 `ScriptEngineManager`
  的 `setBindings()` 方法来设置其 `Bindings`，就会像本节讨论的那样打破“全局性”链条。为了保持“全局性”链条的完整性，你应该始终使用
  `ScriptEngineManager` 的 `put()` 方法向其 `Bindings` 添加键值对。要从由 `ScriptEngineManager`
  创建的所有 ScriptEngine 的全局作用域中移除一个键值对，你需要使用 `ScriptEngineManager` 的 `getBindings()`
  方法获取 `Bindings` 的引用，然后对该 `Bindings` 使用 `remove()` 方法。




  ## 使用自定义 ScriptContext


  在上一节中，您了解到每个 `ScriptEngine` 都有一个默认脚本上下文。`ScriptEngine` 的 `get()`、`put()`、`getBindings()`
  和 `setBindings()` 方法操作的是其默认的 `ScriptContext`。当 `ScriptEngine` 的 `eval()` 方法未指定 `ScriptContext`
  时，将使用引擎的默认上下文。`ScriptEngine` 的 `eval()` 方法的以下两个版本使用其默认上下文来执行脚本：


  *   `Object eval(String script)`

  *   `Object eval(Reader reader)`


  您可以将 `Bindings` 传递给 `eval()` 方法的以下两个版本：


  *   `Object eval(String script, Bindings bindings)`

  *   `Object eval(Reader reader, Bindings bindings)`


  这些版本的 `eval()` 方法不使用 `ScriptEngine` 的默认上下文。它们使用一个新的 `ScriptContext`，其引擎作用域的 `Bindings`
  是传递给这些方法的那个，而全局作用域的 `Bindings` 与引擎默认上下文中的相同。请注意，这两个版本的 `eval()` 方法不会修改 `ScriptEngine`
  的默认上下文。


  您可以将 `ScriptContext` 传递给 `eval()` 方法的以下两个版本：


  *   `Object eval(String script, ScriptContext context)`

  *   `Object eval(Reader reader, ScriptContext context)`


  这些版本的 `eval()` 方法使用指定的上下文来执行脚本。它们不会修改 `ScriptEngine` 的默认上下文。


  这三组 `eval()` 方法允许您使用不同的隔离级别来执行脚本：


  *   第一组允许所有脚本共享默认上下文

  *   第二组允许脚本使用不同的引擎作用域 `Bindings`，并共享全局作用域 `Bindings`

  *   第三组允许脚本在隔离的 `ScriptContext` 中执行


  清单 3-4 展示了如何使用不同版本的 `eval()` 方法在不同隔离级别下执行脚本。该程序使用了三个名为 `msg`、`n1` 和 `n2` 的变量。它显示存储在
  `msg` 变量中的值。`n1` 和 `n2` 的值相加，并显示总和。脚本会打印出计算总和时使用的 `n1` 和 `n2` 的值。`n1` 的值存储在 `ScriptEngineManager`
  的 `Bindings` 中，该 `Bindings` 被所有 `ScriptEngine` 的默认上下文共享。`n2` 的值存储在默认上下文和自定义上下文的引擎作用域中。脚本使用引擎的默认上下文执行两次，一次在开头，一次在结尾，以证明在
  `eval()` 方法中使用自定义 `Bindings` 或 `ScriptContext` 不会影响 `ScriptEngine` 默认上下文中的 `Bindings`。该程序在其
  `main()` 方法中声明了一个 `throws` 子句，以使代码更简洁。


  清单 3-4\. 使用不同的隔离级别执行脚本


  `// CustomContext.java`


  `package com.jdojo.script;`


  `import javax.script.Bindings;`


  `import javax.script.ScriptContext;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `import javax.script.SimpleScriptContext;`


  `import static javax.script.SimpleScriptContext.ENGINE_SCOPE;`


  `import static javax.script.SimpleScriptContext.GLOBAL_SCOPE;`


  `public class CustomContext {`


  `public static void main(String[] args) throws ScriptException {`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 将 n1 添加到管理器的 Bindings 中，该 Bindings 将作为所有引擎的全局作用域 Bindings 被共享`


  `manager.put("n1", 100);`


  `// 准备脚本`


  `String script = "var sum = n1 + n2;" +`


  `"print(msg + " +`


  `"'' n1='' + n1 + '', n2='' + n2 + " +`


  `"'', sum='' + sum);";`


  `// 将 n2 添加到引擎默认上下文的引擎作用域中`


  `engine.put("n2", 200);`


  `engine.put("msg", "使用默认上下文:");`


  `engine.eval(script);`


  `// 使用 Bindings 执行脚本`


  `Bindings bindings = engine.createBindings();`


  `bindings.put("n2", 300);`


  `bindings.put("msg", "使用 Bindings:");`


  `engine.eval(script, bindings);`


  `// 使用 ScriptContext 执行脚本`


  `ScriptContext ctx = new SimpleScriptContext();`


  `Bindings ctxGlobalBindings = engine.createBindings();`


  `ctx.setBindings(ctxGlobalBindings, GLOBAL_SCOPE);`


  `ctx.setAttribute("n1", 400, GLOBAL_SCOPE);`


  `ctx.setAttribute("n2", 500, ENGINE_SCOPE);`


  `ctx.setAttribute("msg", "使用 ScriptContext:", ENGINE_SCOPE);`


  `engine.eval(script, ctx);`


  `// 再次使用默认上下文执行脚本，以证明默认上下文未受影响。`


  `engine.eval(script);`


  `}`


  `}`


  `使用默认上下文: n1=100, n2=200, sum=300`


  `使用 Bindings: n1=100, n2=300, sum=400`


  `使用 ScriptContext: n1=400, n2=500, sum=900`


  `使用默认上下文: n1=100, n2=200, sum=300`




  ## eval() 方法的返回值


  `ScriptEngine` 的 `eval()` 方法返回一个 `Object`，即脚本中的最后一个值。如果脚本中没有最后一个值，则返回 `null`。依赖脚本中的最后一个值既容易出错，又令人困惑。以下代码片段展示了在
  Nashorn 中使用 `eval()` 方法返回值的一些示例。代码中的注释指明了 `eval()` 方法的返回值：


  `Object result = null;`


  `// 将 3 赋值给 result，因为最后一个表达式 1 + 2 的计算结果为 3`


  `result = engine.eval("1 + 2;");`


  `// 将 7 赋值给 result，因为最后一个表达式 3 + 4 的计算结果为 7`


  `result = engine.eval("1 + 2; 3 + 4;");`


  `// 将 6 赋值给 result，因为最后一个语句 v = 6 的计算结果为 6`


  `result = engine.eval("1 + 2; 3 + 4; var v = 5; v = 6;");`


  `// 将 7 赋值给 result。最后一个语句 "var v = 5" 是一个`

  `// 声明，它不会计算出一个值。因此，最后一个`

  `// 被计算的值是 3 + 4 (=7)。`


  `result = engine.eval("1 + 2; 3 + 4; var v = 5;");`


  `// 将 null 赋值给 result，因为 print() 函数返回 undefined`

  `// 在 Java 中会被转换为 null。`


  `result = engine.eval("print(1 + 2)");`


  最好不要依赖 `eval()` 方法的返回值。你应该将一个 Java 对象作为参数传递给脚本，并让脚本将脚本的返回值存储在该对象中。执行 `eval()` 方法后，你可以查询该
  Java 对象以获取返回值。清单 3-5 包含一个包装整数的 `Result` 类的代码。你将把一个 `Result` 类的对象传递给脚本，脚本会将返回值存储在其中。脚本执行完毕后，你可以在
  Java 代码中读取存储在 `Result` 对象中的整数值。`Result` 需要声明为 public，以便脚本引擎可以访问它。清单 3-6 中的程序展示了如何将一个
  `Result` 对象传递给脚本，该脚本会用值填充 `Result` 对象。为了保持代码简洁，该程序在 `main()` 方法的声明中包含了一个 `throws`
  子句。


  清单 3-5. 包装整数的 Result 类


  `// Result.java`


  `package com.jdojo.script;`


  `public class Result {`


  `private int val = -1;`


  `public void setValue(int x) {`


  `val = x;`


  `}`


  `public int getValue() {`


  `return val;`


  `}`


  `}`


  清单 3-6. 在 Result 对象中收集脚本的返回值


  `// ResultBearingScript.java`


  `package com.jdojo.script;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `public class ResultBearingScript {`


  `public static void main(String[] args) throws ScriptException {`


  `// 获取 Nashorn 引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 将一个 Result 对象传递给脚本。脚本会将`

  `// 脚本的结果存储在 result 对象中`


  `Result result = new Result();`


  `engine.put("result", result);`


  `// 将脚本存储在一个字符串中`


  `String script = "3 + 4; result.setValue(101);";`


  `// 执行脚本，该脚本使用传入的`

  `// Result 对象来返回一个值`


  `engine.eval(script);`


  `// 使用 result 对象从脚本中获取返回值`


  `int returnedValue = result.getValue(); // 将会是 101`


  `System.out.println("Returned value is " + returnedValue);`


  `}`


  `}`


  `Returned value is 101`


  ## 引擎作用域绑定的保留键


  通常，引擎作用域 `Bindings` 中的一个键代表一个脚本变量。有些键是保留的，具有特殊含义。它们的值可能由引擎的实现传递给引擎。一个实现可以定义额外的保留键。


  表 3-1 包含了所有保留键的列表。这些键也在 `ScriptEngine` 接口中被声明为常量。脚本引擎的实现不需要在引擎作用域绑定中将所有这些键都传递给引擎。作为开发者，你不应该使用这些键将参数从
  Java 应用程序传递给脚本引擎。


  表 3-1. 引擎作用域绑定的保留键列表


  | 键 | ScriptEngine 接口中的常量 | 键值的含义 |

  | --- | --- | --- |

  | “javax.script.argv” | `ScriptEngine.ARGV` | 用于传递一个 Object 数组，以传递一组位置参数 |

  | “javax.script.engine” | `ScriptEngine.ENGINE` | 脚本引擎的名称 |

  | “javax.script.engine_version” | `ScriptEngine.ENGINE_VERSION` | 脚本引擎的版本 |

  | “javax.script.filename” | `ScriptEngine.FILENAME` | 用于传递脚本来源的文件或资源的名称 |

  | “javax.script.language” | `ScriptEngine.LANGUAGE` | 脚本引擎支持的语言名称 |

  | “javax.script.language_version” | `ScriptEngine.LANGUAGE_VERSION` | 引擎支持的脚本语言的版本
  |

  | “javax.script.name” | `ScriptEngine.NAME` | 脚本语言的短名称 |


  ## 更改默认的 ScriptContext


  你可以分别使用 `ScriptEngine` 的 `getContext()` 和 `setContext()` 方法来获取和设置其默认上下文，如下所示：


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 获取 ScriptEngine 的默认上下文`


  `ScriptContext defaultCtx = engine.getContext();`


  `// 在此处使用 defaultCtx`


  `// 创建一个新的上下文`


  `ScriptContext ctx = new SimpleScriptContext();`


  `// 在此处配置 ctx`


  `// 将 ctx 设置为引擎的新默认上下文`


  `engine.setContext(ctx);`


  请注意，为 `ScriptEngine` 设置新的默认上下文不会使用 `ScriptEngineManager` 的 `Bindings` 作为其全局作用域 `Bindings`。如果你希望新的默认上下文使用
  `ScriptEngineManager` 的 `Bindings`，你需要像下面这样显式设置：


  `// 创建一个新的上下文`


  `ScriptContext ctx = new SimpleScriptContext();`


  `// 将 ctx 的全局作用域 Bindings 设置为与 manager 的 Bindings 相同`


  `ctx.setBindings(manager.getBindings(), ScriptContext.GLOBAL_SCOPE);`


  `// 将 ctx 设置为引擎的新默认上下文`


  `engine.setContext(ctx);`




  ## 将脚本输出发送到文件


  你可以自定义脚本执行的输入源、输出目标和错误输出目标。你需要为用于执行脚本的 `ScriptContext` 设置合适的读取器和写入器。以下代码片段会将脚本输出写入当前目录下名为
  `jsoutput.txt` 的文件中：


  `// 创建一个 FileWriter`


  `FileWriter writer = new FileWriter("jsoutput.txt");`


  `// 获取引擎的默认上下文`


  `ScriptContext defaultCtx = engine.getContext();`


  `// 为引擎的默认上下文设置输出写入器`


  `defaultCtx.setWriter(writer);`


  该代码为 `ScriptEngine` 的默认上下文设置了一个自定义输出写入器，该写入器将在执行使用默认上下文的脚本时被使用。如果你想为某次特定的脚本执行使用自定义输出写入器，则需要使用自定义的
  `ScriptContext` 并设置其写入器。


  提示


  为 `ScriptContext` 设置自定义输出写入器不会影响 Java 应用程序标准输出的目标。要重定向 Java 应用程序的标准输出，你需要使用 `System.setOut()`
  方法。


  清单 3-7 展示了如何将脚本执行的输出写入名为 `jsoutput.txt` 的文件。该程序会在标准输出上打印输出文件的完整路径。运行程序时，你可能会得到不同的输出。你需要在文本编辑器中打开输出文件才能看到脚本的输出。


  清单 3-7. 将脚本输出写入文件


  `// CustomScriptOutput.java`


  `package com.jdojo.script;`


  `import java.io.File;`


  `import java.io.FileWriter;`


  `import java.io.IOException;`


  `import javax.script.ScriptContext;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `public class CustomScriptOutput {`


  `public static void main(String[] args) {`


  `// 获取 Nashorn 引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 打印输出文件的绝对路径`


  `File outputFile = new File("jsoutput.txt");`


  `System.out.println("脚本输出将被写入 " +`


  `outputFile.getAbsolutePath());`


  `FileWriter writer = null;`


  `try {`


  `writer = new FileWriter(outputFile);`


  `// 为引擎设置自定义输出写入器`


  `ScriptContext defaultCtx = engine.getContext();`


  `defaultCtx.setWriter(writer);`


  `// 执行一个脚本`


  `String script =                                  "print(''Hello custom output writer'')";`


  `engine.eval(script);`


  `}`


  `catch (IOException | ScriptException e) {`


  `e.printStackTrace();`


  `}`


  `finally {`


  `if (writer != null) {`


  `try {`


  `writer.close();`


  `}`


  `catch (IOException e) {`


  `e.printStackTrace();`


  `}`


  `}`


  `}`


  `}`


  `}`


  `脚本输出将被写入 C:\jsoutput.txt`


  ## 总结


  你可以使用 `ScriptContext` 向脚本传递参数。`Bindings` 接口的实例充当参数持有者。`Bindings` 接口继承自 `Map` 接口，并施加了一个限制：其键必须是非空、非
  `null` 的 `String`。`SimpleBinding` 类是 `Bindings` 接口的一个实现。建议使用 `ScriptEngine` 的 `createBindings()`
  方法来获取 `Bindings` 接口的实例，这给了 `ScriptEngine` 一个返回 `Bindings` 接口专用实现的机会。一个 `Bindings`
  与一个作用域相关联，该作用域可以是引擎作用域或全局作用域。在引擎作用域中传递的参数优先于在全局作用域中传递的参数。传递的参数可以是脚本引擎局部的、脚本执行局部的，或者是由一个
  `ScriptManager` 创建的所有脚本引擎全局的。


  脚本引擎在一个上下文中执行脚本，该上下文由四个组件组成：一组 `Bindings`（每个 `Bindings` 与一个不同的作用域相关联）、一个供脚本引擎读取输入的
  `Reader`、一个供脚本引擎写入输出的 `Writer`，以及一个供脚本引擎写入错误输出的错误 `Writer`。`ScriptContext` 接口的实例代表脚本执行的上下文。`SimpleScriptContext`
  类是 `ScriptContext` 接口的一个实现。


  上下文中的 `Bindings` 集合用于向脚本传递参数。上下文中的读取器和写入器分别控制脚本的输入源和输出目标。例如，通过将文件写入器设置为写入器，你可以将脚本的所有输出发送到文件。每个
  `ScriptEngine` 都有一个默认的 `ScriptContext`，当没有 `ScriptContext` 传递给 `eval()` 方法时，将使用该默认上下文来执行脚本。`ScriptEngine`
  的 `getContext()` 方法返回引擎的默认上下文。你也可以向 `eval()` 方法传递一个单独的 `ScriptContext`，该上下文将用于执行你的脚本，而引擎的默认
  `ScriptContext` 保持不变。


  '
- '# 4. 在 Nashorn 中编写脚本


  在本章中，你将学习：


  *   如何在 Nashorn 中编写脚本

  *   在严格模式和非严格模式下运行脚本的区别

  *   如何声明变量和编写注释

  *   原始数据类型和对象数据类型，以及如何将一种数据类型的值转换为另一种数据类型

  *   Nashorn 中的运算符、语句以及创建和调用函数

  *   创建和使用对象的不同方式

  *   变量作用域和提升

  *   关于内置的全局对象和函数


  Nashorn 是 ECMAScript 5.1 规范在 JVM 上的运行时实现。ECMAScript 定义了其自身的语法和结构，用于声明变量、编写语句、运算符、创建和使用对象、集合、遍历数据集合等。Nashorn
  100% 兼容 ECMAScript 5.1，因此当你使用 Nashorn 时，需要学习一套新的语言语法。例如，在 Nashorn 中处理对象与在 Java 中处理对象完全不同。


  本章假设你至少具备 Java 编程语言的入门级理解。我不会解释 Nashorn 提供的、与 Java 中工作方式相同的结构和语法细节。例如，我不会解释 Nashorn
  中的赋值运算符 `=` 的作用。相反，我只会简单提及赋值运算符 `=` 在 Nashorn 和 Java 中的工作方式相同。Nashorn 的强大之处在于它允许你在脚本内部使用
  Java 库。然而，要在 Nashorn 中使用 Java 库，你必须了解 Nashorn 的语法和结构。本章将为你简要介绍 Nashorn 的语法和结构。




  ## 严格模式与非严格模式


  Nashorn 可以在两种模式下运行：严格模式和非严格模式。ECMAScript 的某些特性不能在严格模式下使用。通常，容易出错的特性在严格模式下是不允许的。一些在非严格模式下可以工作的特性，在严格模式下会产生错误。在解释具体特性时，我会列出适用于严格模式的特性。你可以通过两种方式在脚本中启用严格模式：


  *   使用 `jjs` 命令的 `–strict` 选项

  *   使用 `"use strict"` 或 `''use strict''` 指令


  以下命令在严格模式下调用 `jjs` 命令行工具，并尝试将值 10 赋给一个名为 `empId` 的变量，但未声明该变量。你会收到一个错误，提示变量 `empId`
  未定义：


  `C:\> jjs -strict`


  `jjs> empId = 10;`


  `<shell>:1 ReferenceError: "empId" is not defined`


  `jjs> exit()`


  解决方案是在严格模式下使用关键字 `var`（稍后讨论）来声明 `empId` 变量。


  以下命令在非严格模式下（不带 `–strict` 选项）调用 `jjs` 命令行工具，并尝试将值 10 赋给一个名为 `empId` 的变量，但未声明该变量。这次，你不会收到错误；相反，会打印出该变量的值（即
  `10`）：


  `C:\> jjs`


  `jjs> empId = 10;`


  `10`


  `jjs>exit()`


  清单 4-1 展示了一个使用 `use strict` 指令的脚本。该指令在脚本或函数的开头指定。`use strict` 指令就是字符串 `"use strict"`。你也可以用单引号将指令括起来，像
  `''use strict''` 这样。该脚本将一个值赋给一个未声明的变量，由于启用了严格模式，这会产生一个错误。


  清单 4-1\. 包含严格模式指令的脚本


  `// strict.js`


  `"use strict"; // 这是 use strict 指令。`


  `empId = 10;   // 这将产生一个错误。`


  ## 标识符


  标识符是脚本中给变量、函数、标签等起的名称。Nashorn 中的标识符是一系列 Unicode 字符，遵循以下规则：


  *   它可以包含字母、数字、下划线和美元符号

  *   不能以数字开头

  *   不能是保留字之一

  *   标识符中的字符可以用 Unicode 转义序列替换，其形式为 `\uxxxx`，其中 `xxxx` 是该字符的十六进制 Unicode 数值


  以下是有效标识符的示例：


  *   `empId`

  *   `emp_id`

  *   `_empId`

  *   `emp$Id`

  *   `num1`

  *   `\u0061bc`（等同于 `abc`，因为 `\u0061` 是字符 `a` 的 Unicode 转义序列）


  以下是无效标识符的示例：


  *   `4num`（不能以数字开头）

  *   `emp id`（不能包含空格）

  *   `emp+id`（不能包含 + 号）

  *   `break`（`break` 是保留字，不能用作标识符）


  表 4-1、4-2 和 4-3 列出了 Nashorn 中的保留字。表 4-1 中列出的保留字已被用作关键字。你对 Java 中的大多数这些关键字都很熟悉。在
  Nashorn 中，它们具有相同的含义；例如，`for`、`do` 和 `while` 用于表示循环结构，而 `break` 和 `continue` 用于跳出循环或继续循环的下一次迭代。我将在本章中简要解释
  Nashorn 特有的关键字。表 4-2 和 4-3 列出了尚未使用但将来会使用的关键字。


  使用任何保留字作为标识符都会产生错误。表 4-3 中的保留字仅在严格模式下会产生错误。在非严格模式下使用它们不会产生任何错误。


  表 4-3.


  Nashorn 严格模式下的未来保留字列表


  | `implements` | `let` | `private` | `public` |

  | --- | --- | --- | --- |

  | `yield` | `interface` | `package` | `protected` |

  | `static` |   |   |   |


  表 4-2.


  Nashorn 中的未来保留字列表


  | `class` | `enum` | `extends` | `super` |

  | --- | --- | --- | --- |

  | `const` | `export` | `import` |   |


  表 4-1.


  Nashorn 中用作关键字的保留字列表


  | `break` | `do` | `instanceof` | `typeof` |

  | --- | --- | --- | --- |

  | `case` | `else` | `new` | `var` |

  | `catch` | `finally` | `return` | `void` |

  | `continue` | `for` | `switch` | `while` |

  | `debugger` | `function` | `this` | `with` |

  | `default` | `if` | `throw` |   |

  | `delete` | `in` | `try` |   |


  ## 注释


  Nashorn 支持两种类型的注释：


  *   单行注释

  *   多行注释


  在 Nashorn 中编写注释的语法与 Java 相同。以下是注释的示例：


  `// 让我们声明一个名为 empId 的变量（单行注释）`


  `var empId;`


  `/* 让我们声明一个名为 empList 的变量`


  `和另一个名为 deptId 的变量（多行注释）`


  `*/`


  `var empList;`


  `var deptId;`


  ## 声明变量


  脚本语言是弱类型的。变量的类型在编译时是未知的。变量的类型可以在程序执行期间改变。变量的类型是根据存储在变量中的值在运行时确定的。例如，同一个变量可以在某一时刻存储数字，在另一时刻存储字符串。Nashorn
  中的这条规则与 Java 显著不同，Java 是一种强类型语言，变量的类型在其声明时就是已知的。


  在 Nashorn 中，关键字 `var` 用于声明变量。变量声明在 ECMAScript 术语中被称为变量语句：


  `// 声明一个名为 msg 的变量`


  `var msg;`


  请注意，与 Java 不同，在 Nashorn 中你不需要指定所声明变量的数据类型。你可以在一个变量语句中声明多个变量。变量名之间用逗号分隔：


  `// 声明三个变量`


  `var empId, deptId, emplList;`


  提示


  在严格模式下，将变量命名为 `eval` 或 `arguments` 是错误的。


  变量在声明时会被初始化为 `undefined`。我将在下一节讨论数据类型和 `undefined` 值。你也可以在声明时用值初始化变量：


  `/* 声明并初始化变量 deptId 和 empList。deptId 被`


  `初始化为数字 400，empList 被初始化为一个字符串数组。`


  `*/`


  `var deptId = 400, emplList = ["Ken", "Lydia", "Simon"];`


  请注意，你可以在 Nashorn 中使用数组字面量创建数组，该字面量包含一个用逗号分隔的数组元素列表，并括在方括号中。我将在第 7 章中详细讨论数组。


  在非严格模式下，你可以在变量声明中省略关键字 `var`：


  `// 声明一个名为 greeting 的变量，不使用关键字 var`


  `greeting = "Hello";`


  ## 数据类型


  数据类型可以分为两类：原始类型和对象类型。原始类型包括以下五种数据类型：


  *   Undefined

  *   Null

  *   Number

  *   Boolean

  *   String




  ### Undefined 类型


  Undefined 类型只有一个值，即 `undefined`。在 Nashorn 中，声明但未赋值的变量，其值为 `undefined`。你也可以显式地将 `undefined`
  赋值给一个变量。此外，你还可以将其他值与 `undefined` 进行比较。以下代码片段展示了如何使用 `undefined` 值：


  `// empId 被隐式初始化为 undefined`


  `var empId;`


  `// deptId 被显式初始化为 undefined`


  `var deptId = undefined;`


  `// 打印 empId 和 deptId 的值`


  `print("empId is", empId)`


  `print("deptId is", deptId);`


  `if (empId == undefined) {`


  `print("empId is undefined")`


  `}`


  `if (deptId == undefined) {`


  `print("deptId is undefined")`


  `}`


  `empId is undefined`


  `deptId is undefined`


  `empId is undefined`


  `deptId is undefined`


  ### Null 类型


  Null 类型只有一个值，即 `null`。尽管 `null` 值被认为是原始类型，但它通常用于期望一个对象但没有有效对象可指定的场景。以下代码片段展示了如何使用
  `null` 值：


  `var person = null;`


  `print("person is", person);`


  `person is null`


  ### Number 类型


  与 Java 不同，Nashorn 不区分整数和浮点数。它只有一种称为 Number 的类型来表示这两种数值。数字以双精度 64 位 IEEE 浮点格式存储。所有数值常量都称为数字字面量。与
  Java 类似，你可以用十进制、十六进制、八进制和科学记数法表示数字字面量。Nashorn 定义了三种特殊的 Number 类型值：非数字、正无穷大和负无穷大。在脚本中，这些特殊值分别由
  `NaN`、`+Infinity` 和 `–Infinity` 表示。正无穷大值也可以简单地表示为 `Infinity`，不带前导的 `+` 号。以下代码片段展示了如何使用数字字面量和特殊的
  Number 类型值：


  `var empId = 100;               // 一个 Number 类型的整数`


  `var salary = 1500.678;         // 一个 Number 类型的浮点数`


  `var hexNumber = 0x0061;        // 等同于十进制 97`


  `var octalNumber = 0141;        // 等同于十进制 97`


  `var scientificNumber = 0.97E2; // 等同于十进制 97`


  `var notANumber = NaN;`


  `var posInfinity = Infinity;`


  `var negInfinity = -Infinity;`


  `// 打印所有值`


  `print("empId =", empId);`


  `print("salary =", salary);`


  `print("hexNumber =", hexNumber);`


  `print("octalNumber =", octalNumber);`


  `print("scientificNumber =", scientificNumber);`


  `print("notANumber =", notANumber);`


  `print("posInfinity =", posInfinity);`


  `print("negInfinity =", negInfinity);`


  `empId = 100`


  `salary = 1500.678`


  `hexNumber = 97`


  `octalNumber = 97`


  `scientificNumber = 97`


  `notANumber = NaN`


  `posInfinity = Infinity`


  `negInfinity = -` `Infinity`


  ### Boolean 类型


  Boolean 类型表示一个逻辑实体，其值可以为 true 或 false。与 Java 类似，Nashorn 有两个 Boolean 类型的字面量：`true`
  和 `false`：


  `Var isProcessing = true;`


  `var isProcessed = false;`


  `print("isProcessing =", isProcessing);`


  `print("isProcessed =", isProcessed);`


  `isProcessing = true`


  `isProcessed = false`


  ### String 类型


  String 类型包含所有有限的、有序的零个或多个 Unicode 字符序列。用双引号或单引号括起来的字符序列称为字符串字面量。序列中的字符数称为字符串的长度。以下是使用字符串字面量的示例：


  `var greetings = "Hi there";     // 一个长度为 8 的字符串字面量`


  `var title = ''Scripting in Java''; // 一个用单引号括起来的字符串字面量`


  `var emptyMsg = "";              // 一个长度为零的空字符串`


  如果字符串字面量用双引号括起来，它可以包含单引号，反之亦然。如果字符串字面量用双引号括起来，并且你想在字符串中包含双引号，则需要使用反斜杠对双引号进行转义。对于用单引号括起来的字符串也是如此。以下代码片段向你展示了一些示例：


  `var msg1 = "It''s here and now.";`


  `var msg2 = ''He said, "He is happy."'';`


  `var msg3 = ''It\''s here and now.'';`


  `var msg4 = "He said, \"He is happy.\"";`


  `print(msg1);`


  `print(msg2);`


  `print(msg3);`


  `print(msg4);`


  `It''s here and now.`


  `He said, "He is happy."`


  `It''s here and now.`


  `He said, "He is happy."`


  与 Java 不同，Nashorn 中的字符串字面量可以跨越多行。你需要在行尾使用反斜杠作为续行符。请注意，反斜杠和行终止符不属于字符串字面量的一部分。以下是一个将字符串字面量
  `Hello World!` 写成三行的示例：


  `// 使用多行字符串字面量将字符串 Hello world! 赋值给 msg`


  `var msg = "Hello \`


  `world\`


  `!";`


  `print(msg);`


  `Hello world!`


  如果你想在多行字符串字面量中插入换行符，则需要使用转义序列 `\n`，如下所示。请注意，我将开始和结束的引号放在了单独的行中，这使得多行文本更具可读性：


  `// 使用带有嵌入换行符的多行字符串`


  `var lucyPoem = "\`


  `STRANGE fits of passion have I known:\n\`


  `And I will dare to tell,\n\`


  `But in the lover''s ear alone,\n\`


  `What once to me befell.\`


  `";`


  `print(lucyPoem);`


  `STRANGE fits of passion have I known:`


  `And I will dare to tell,`


  `But in the lover''s ear alone,`


  `What once to me befell.`


  字符串字面量中的字符可以以字面形式出现，也可以以转义序列的形式出现。你可以使用 Unicode 转义序列来表示任何字符。某些字符（如行分隔符、回车符等）不能以字面形式表示，它们必须以转义序列的形式出现。表
  4-4 列出了 Nashorn 中定义的转义序列。


  表 4-4.


  Nashorn 中的单字符转义序列


  | 字符转义序列 | Unicode 转义序列 | 字符名称 |

  | --- | --- | --- |

  | \b | \u0008 | 退格 |

  | \t | \u0009 | 水平制表符 |

  | \n | \u000A | 换行 |

  | \v | \u000B | 垂直制表符 |

  | \f | \u000C | 换页 |

  | \r | \u000D | 回车 |

  | \” | \u0022 | 双引号 |

  | \’ | \u0027 | 单引号 |

  | \\ | \u005C | 反斜杠 |


  Nashorn 和 Java 在解释 Unicode 转义序列方面存在显著差异。与 Java 不同，Nashorn 不会在执行代码之前将 Unicode 转义序列解释为实际字符。Java
  中的以下单行注释、字符字面量和字符串字面量将无法编译，因为编译器在编译程序之前会将 `\u000A` 转换为新行：


  `// This, \u000A, is a new line, making the single line comment invalid`


  `char c = ''\u000A'';`


  `String str = "Hello\u000Aworld!";`


  在 Java 中，你必须在此代码中将 `\u000A` 替换为 `\n` 才能正常工作。以下 Nashorn 代码片段可以正常工作：


  `// This, \u000A, is a new line that is valid in Nashorn`


  `var str = "Hello\u000AWorld!";`


  `print(str);`


  `Hello`


  `World!`


  我将把关于 Object 类型的讨论推迟到完成 Nashorn 中基本结构（如运算符、语句、循环等）的解释之后。


  ## 运算符


  Nashorn 支持许多运算符。其中大部分与 Java 运算符相同。我将在本节中列出所有运算符，并在此讨论其中几个。我将在后续章节中适时讨论其他运算符。表 4-5
  列出了 Nashorn 中的运算符。


  表 4-5.


  Nashorn 中的运算符列表




  | 运算符 | 名称 | 语法 | 描述 |

  | --- | --- | --- | --- |

  | `++` | 自增 | `++i` `i++` | 将操作数增加 1。 |

  | `--` | 自减 | `--i` `i--` | 将操作数减少 1。 |

  | `delete` | 删除 | `delete prop` | 从对象中删除指定的属性。 |

  | `void` | 空值 | `void expr` | 丢弃指定表达式的返回值。 |

  | `typeof` | 类型检测 | `typeof expr` | 返回一个描述指定表达式类型的字符串。 |

  | `+` | 一元正号 | `+op` | 将操作数转换为 Number 类型。 |

  | `-` | 一元负号 | `-op` | 将操作数转换为 Number 类型，然后对转换后的值取反。 |

  | `∼` | 按位非 | `∼op` | 将操作数作为 32 位有符号整数，翻转其二进制位，并将结果作为 32 位有符号整数返回。 |

  | `!` | 逻辑非 | `!expr` | 如果 `expr` 计算结果为 `false`，则返回 `true`。如果 `expr` 计算结果为 `true`，则返回
  `false`。 |

  | `+` | 数值加法/字符串拼接 | `op1 + op2` | 如果其中一个操作数是字符串或可以转换为字符串，则执行字符串拼接。否则，执行数值加法。 |

  | `-` | 减法 | `op1 - op2` | 对两个操作数执行数值减法，如果它们不是数字则将其转换为数字。 |

  | `/` | 除法 | `op1 / op2` | 执行除法并返回两个操作数的商。 |

  | `*` | 乘法 | `op1 * op2` | 执行乘法并返回操作数的乘积。 |

  | `%` | 取余 | `op1 % op2` | 将左操作数作为被除数，右操作数作为除数进行除法运算，并返回余数。 |

  | `in` | 存在性检查 | `prop in obj` | 如果 `obj` 包含名为 `prop` 的属性，则返回 `true`。否则返回 `false`。此处
  `prop` 是一个字符串或可转换为字符串的值，`obj` 是一个对象。 |

  | `instanceof` | 实例检查 | `obj instanceof cls` | 如果 `obj` 是类 `cls` 的实例，则返回 `true`。否则返回
  `false`。 |

  | `<` | 小于 | `op1 < op2` | 如果 `op1` 小于 `op2`，则返回 `true`。否则返回 `false`。 |

  | `<=` | 小于或等于 | `op1 <= op2` | 如果 `op1` 小于或等于 `op2`，则返回 `true`。否则返回 `false`。 |

  | `>` | 大于 | `op1 > op2` | 如果 `op1` 大于 `op2`，则返回 `true`。否则返回 `false`。 |

  | `>=` | 大于或等于 | `op1 >= op2` | 如果 `op1` 大于或等于 `op2`，则返回 `true`。否则返回 `false`。 |

  | `==` | 相等 | `op1 == op2` | 如果 `op1` 和 `op2` 相等，则返回 `true`。否则返回 `false`。必要时会进行类型转换。例如，`"2"
  == 2` 返回 `true`，因为字符串 `"2"` 被转换为数字 `2`，然后两个操作数相等。 |

  | `!=` | 不等 | `op1 != op2` | 如果 `op1` 和 `op2` 不相等，则返回 `true`。否则返回 `false`。必要时会进行类型转换。
  |

  | `===` | 恒等或严格相等 | `op1 === op2` | 如果两个操作数的类型和值都相同，则返回 `true`。否则返回 `false`。表达式
  `"2" === 2` 返回 `false`，因为 `"2"` 是字符串而 `2` 是数字。表达式 `"2" === "2"` 和 `2 === 2` 都返回
  `true`。 |

  | `!==` | 非恒等或严格不等 | `op1 !== op2` | 如果操作数不相等和/或类型不同，则返回 `true`。表达式 `"2" !== 2`
  和 `2 !== 3` 都返回 `true`。在第一个表达式中，操作数的类型不匹配（字符串和数字）；在第二个表达式中，操作数的值不匹配。 |

  | `<<` | 按位左移 | `op1 << op2` | 对 `op1` 执行按位左移操作，移动位数由 `op2` 指定。在执行左移之前，`op1` 被转换为
  32 位有符号整数。结果也是一个 32 位有符号整数。 |

  | `>>` | 按位有符号右移 | `op1 >> op2` | 对 `op1` 执行符号位填充的按位右移操作，移动位数由 `op2` 指定。左侧新增的位用原始的最高有效位填充，以保持
  `op1` 的符号，结果符号相同。将 `op1` 转换为 32 位有符号整数，结果也是一个 32 位有符号整数。 |

  | `>>>` | 按位无符号右移 | `op1 >>> op2` | 对 `op1` 执行零填充的按位右移操作，移动位数由 `op2` 指定。左侧新增的位用
  0 填充，这使得结果成为一个无符号 32 位整数。 |

  | `&` | 按位与 | `op1 & op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位与操作。如果两个位都是 1，则结果位为 1。否则，结果位为
  0。 |

  | `&#124;` | 按位或 | `op1 &#124; op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位或操作。如果任意一个位是 1，则结果位为
  1。如果两个位都是 0，则结果位为 0。 |

  | `^` | 按位异或 | `op1 ^ op2` | 对 `op1` 和 `op2` 的每一对二进制位执行按位异或操作。如果两个位不同，则结果位为 1。否则，结果位为
  0。 |

  | `&&` | 逻辑与 | `op1 && op2` | 返回 `op1` 或 `op2`。如果 `op1` 为 `false` 或可转换为 `false`，则返回
  `op1`。否则，返回 `op2`。 |

  | `&#124;&#124;` | 逻辑或 | `op1 &#124;&#124; op2` | 返回 `op1` 或 `op2`。如果 `op1` 为 `true`
  或可转换为 `true`，则返回 `op1`。否则，返回 `op2`。 |

  | `?:` | 条件（三元）运算符 | `op1 ? op2 : op3` | 如果 `op1` 计算结果为 true，则返回 op2 的值。否则，返回 op3
  的值。 |

  | `=` | 赋值 | `op1 = op2` | 将 `op2` 的值赋给 `op1` 并返回 `op2`。 |

  | `+=, -=, *=, /=, %=, <<=, >>=, >>>=, &=, ^=, &#124;=` | 复合赋值 | `op1 op= op2` |
  其执行效果类似于语句 `op1 = op1 op op2`。对 `op1` 和 `op2` 应用运算（+、-、*、/、% 等），将结果赋给 op1 并返回该结果。
  |

  | `,` | 逗号运算符 | `op1, op2, op3...` | 从左到右依次计算每个操作数，并返回最后一个操作数的值。用于需要一个表达式但希望使用多个表达式的地方，例如在
  `for` 循环的头部。 |




  运算符具有优先级。在表达式中，优先级高的运算符会先于优先级低的运算符被求值。与 Java 类似，你可以将表达式的一部分用括号括起来，括号拥有最高优先级。以下是运算符的优先级列表。级别
  1 的运算符优先级高于级别 2 的运算符。同一级别的运算符优先级相同：


  `++`（后缀自增）, `--`（后缀自减）   `!, ∼, +`（一元正号）, `-`（一元负号）, `++`（前缀自增）, `--`（前缀自减）, `typeof`,
  `void`, `delete`   `*, /, %`   `+`（加法）, `-`（减法）   `<< , >>, >>>`   `<, <=, >, >=,
  in, instanceof`   `==, !=, ===, !==`   `&`   `^`   `|`   `&&`   `||`   `? :`   `=,
  +=, -=, *=, /=, %=, <<=, >>=, >>>=, &=,  ^=,  |=`   `,`（逗号运算符）


  在本节中，我将讨论其中的几个运算符。这些在 Nashorn 中的运算符要么在 Java 中不存在，要么工作方式截然不同：


  *   相等运算符（`==`）和严格相等运算符（`===`）

  *   逻辑与（`&&`）和逻辑或（`||`）运算符


  `==` 运算符的工作方式与 Java 中几乎相同。它会检查两个操作数是否相等，并在可能的情况下执行类型转换，例如将字符串转换为数字。例如，`"2" == 2`
  返回 `true`，因为字符串 `"2"` 被转换为数字 2，然后两个操作数相等。表达式 `2 == 2` 也返回 `true`，因为两个操作数都是数字类型且值相等。相比之下，`===`
  运算符会同时检查两个操作数的类型和值是否相等。如果两者中任何一个不相同，则返回 `false`。例如，`"2" === 2` 返回 `false`，因为一个操作数是字符串，另一个是数字。它们的类型不匹配，即使它们的值在转换为字符串或数字后是匹配的。


  在 Java 中，`&&` 和 `||` 运算符处理布尔操作数，并返回 `true` 或 `false`。在 Nashorn 中，情况并非如此；这些运算符返回其中一个操作数的值，该值可以是任何类型。在
  Nashorn 中，任何类型的值都可以转换为布尔值 `true` 或 `false`。可以转换为 `true` 的值称为真值，可以转换为 `false` 的值称为假值。我将在本章下一节中提供真值和假值的完整列表。


  `&&` 和 `||` 运算符处理真值和假值操作数，并返回其中一个操作数的值，该值不一定是布尔值。`&&` 和 `||` 运算符也称为短路运算符，因为如果第一个操作数本身就能确定结果，它们就不会对第二个操作数求值。


  如果第一个操作数是假值，`&&` 运算符返回第一个操作数。否则，它返回第二个操作数。考虑以下语句：


  `var result = true && 120; // 将 120 赋值给 result`


  该语句将 120 赋值给 `result`。`&&` 的第一个操作数是 true，因此它会对第二个操作数求值并返回它。考虑另一条语句：


  `var result = false && 120; // 将 false 赋值给 result`


  该语句将 `false` 赋值给 result。`&&` 的第一个操作数是 `false`，因此它不会对第二个操作数求值。它直接返回第一个操作数。


  如果第一个操作数是真值，`||` 运算符返回第一个操作数。否则，它返回第二个操作数。考虑以下语句：


  `var result = true || 120; // 将 true 赋值给 result`


  该语句将 true 赋值给 `result`。`||` 的第一个操作数是 `true`，因此它返回第一个操作数。考虑另一条语句：


  `var result = false || 120; // 将 120 赋值给 result`


  该语句将 `120` 赋值给 result。`||` 的第一个操作数是 `false`，因此它会对第二个操作数求值并返回其值。


  ## 类型转换


  在 Java 中不允许的操作在 Nashorn 中是允许的，例如在需要布尔值的地方使用数字或字符串。考虑以下 Nashorn 中的代码片段，它将一个布尔值加到一个数字上：


  `var n1 = true + 120;`


  `var n2 = false + 120;`


  `print("n1 = " + n1);`


  `print("n2 = " + n2);`


  `n1 = 121`


  `n2 = 120`


  表达式 `true + 120` 在 Java 中是不允许的。然而，在 Nashorn 中是允许的。注意，Nashorn 会隐式地将 `true` 转换为数字
  1，将 `false` 转换为数字 0。Nashorn 会执行大量隐式转换。你需要很好地理解它们，才能在 Nashorn 中编写无错误的代码。以下各节将详细解释这些转换。


  ### 转换为布尔值


  在 Nashorn 中，你可以在需要布尔值的地方使用真值或假值。例如，`if` 语句中的条件不需要产生布尔值。它可以是任何真值或假值。表 4-6 列出了值的类型及其对应的转换后的布尔值。


  表 4-6.


  值类型及其对应的转换后布尔值列表


  | 值类型 | 转换后的布尔值 |

  | --- | --- |

  | `Undefined` | `false` |

  | `Null` | `false` |

  | `Boolean` | 恒等转换 |

  | `Number` | 如果参数是 `+0`、`-0` 或 `NaN`，则求值为 `false`；否则求值为 `true` |

  | `String` | 空字符串求值为 `false`。所有其他字符串求值为 `true` |

  | `Object` | `true` |


  你也可以使用全局函数 `Boolean()` 来显式地将一个值转换为布尔类型。该函数将要转换的值作为参数。以下代码片段包含了一些隐式和显式转换为布尔类型的示例：


  `var result;`


  `result = undefined ? "undefined is truthy" : "undefined is falsy";`


  `print(result);`


  `result = null ? "null is truthy" : "null is falsy";`


  `print(result);`


  `result = 100 ? "100 is truthy" : "100 is falsy";`


  `print(result);`


  `result = 0 ? "0 is truthy" : "0 is falsy";`


  `print(result);`


  `result = Boolean("") ? "The empty string is truthy"`


  `: "The empty string is falsy";`


  `print(result);`


  `result = ''Hello'' ? "''Hello'' is truthy" : "''Hello'' is falsy";`


  `print(result);`


  `undefined is falsy`


  `null is falsy`


  `100 is truthy`


  `0 is falsy`


  `The empty string is falsy`


  `''Hello'' is truthy`




  ### 转换为数字类型


  Nashorn 中所有类型的值都可以隐式或显式地转换为数字类型。表 4-7 列出了值的类型及其对应的转换后的数值。


  表 4-7.


  值类型及其对应转换数值的列表


  | 值类型 | 转换后的数值 |

  | --- | --- |

  | `Undefined` | `NaN` |

  | `Null` | `+0` |

  | `Boolean` | 布尔值 `true` 转换为 1，`false` 转换为 0 |

  | `Number` | 恒等转换 |

  | `String` | 空字符串和仅包含空白字符的字符串转换为零。去除首尾空白字符后，其内容可被解释为数字的字符串，将转换为相应的数值。如果字符串的数字内容过大或过小，则分别转换为
  `+Infinity` 或 `–Infinity`。所有其他字符串都转换为 `NaN` |

  | `Object` | 如果对象的内容可以被解释为数字，则该对象转换为相应的数值；否则，该对象转换为 `NaN` |


  你可以使用 `Number()` 全局函数来显式地将一个值转换为数字类型。该函数将要转换的值作为参数，并返回一个数字。以下代码片段包含了一些隐式和显式转换为数字类型的示例：


  `var result;`


  `result = Number(undefined);`


  `print("undefined is converted to", result);`


  `// Any number + NaN is NaN`


  `result = 10 + undefined;`


  `print("10 + undefined is", result);`


  `result = Number("");`


  `print("The empty string is converted to", result);`


  `result = Number(''Hello'');`


  `print("''Hello'' is converted to", result);`


  `// Convertes to the number 1982, ignoring leading and trailing whitespaces`


  `result = Number('' 1982 '');`


  `print("'' 1982 '' is converted to", result);`


  `result = Number(new Object(88));`


  `print("new Object(88) is converted to", result);`


  `result = Number(new Object());`


  `print("new Object() is converted to", result);`


  `// A very big number in a string`


  `result = Number("10E2000");`


  `print("10E2000 is converted to", result);`


  `undefined is converted to NaN`


  `10 + undefined is NaN`


  `The empty string is converted to 0`


  `''Hello'' is converted to NaN`


  `'' 1982 '' is converted to 1982`


  `new Object(88) is converted to 88`


  `new Object() is converted to NaN`


  `10E2000 is converted to Infinity`


  ### 转换为字符串类型


  Nashorn 中所有类型的值都可以隐式或显式地转换为字符串类型。表 4-8 列出了值的类型及其对应的转换后的字符串值。


  表 4-8.


  值类型及其对应转换字符串值的列表


  | 值类型 | 转换后的字符串值 |

  | --- | --- |

  | `Undefined` | `"undefined"` |

  | `Null` | `"null"` |

  | `Boolean` | 布尔值 `true` 转换为 “true”，`false` 转换为 “false” |

  | `Number` | `+0`、`0` 和 `-0` 转换为 “0”；`NaN` 转换为 “NaN”；`Infinity`（或 `+Infinity`）转换为
  “Infinity”；`-Infinity` 转换为 “-Infinity”。所有其他数字都转换为十进制或科学记数法对应的字符串表示形式。较大的数字可能无法精确转换
  |

  | `String` | 恒等转换 |

  | `Object` | 如果对象是原始值的包装器，则返回该原始值的字符串形式；否则，通过调用对象的 `toString()` 方法返回其字符串表示形式。如果对象中不存在
  `toString()` 方法，则返回 `valueOf()` 方法返回值的字符串表示形式 |


  你可以使用 `String()` 全局函数来显式地将一个值转换为字符串类型。该函数将要转换的值作为参数，并返回一个字符串。以下代码片段包含了一些隐式和显式转换为字符串类型的示例：


  `var result;`


  `result = String(undefined);`


  `print("undefined is converted to", result);`


  `result = String(true);`


  `print("true is converted to", result);`


  `result = String(9088);`


  `print("9088 is converted to", result);`


  `result = String(0x786A);`


  `print("0x786A is converted to", result);`


  `result = String(900000000000000000000);`


  `print("900000000000000000000 is converted to", result);`


  `result = String(9000000000000000000000);`


  `print("9000000000000000000000 is converted to", result);`


  `result = String(new Object(1982));`


  `print("new Object(1982) is converted to", result);`


  `result = String(new Object());`


  `print("new Object() is converted to", result);`


  `undefined is converted to undefined`


  `true is converted to true`


  `9088 is converted to 9088`


  `0x786A is converted to 30826`


  `900000000000000000000 is converted to 900000000000000000000`


  `9000000000000000000000 is converted to 9e+21`


  `new Object(1982) is converted to 1982`


  `new Object() is converted to [object Object]`




  ## 语句


  Nashorn 包含了 Java 中的大部分语句。大多数语句类型的工作方式与 Java 非常相似。以下是 Nashorn 中的语句类型列表：


  *   块语句

  *   变量语句

  *   空语句

  *   表达式语句

  *   `if` 语句

  *   迭代（或循环）语句

  *   `continue` 语句

  *   `break` 语句

  *   `return` 语句

  *   `with` 语句

  *   `switch` 语句

  *   标签语句

  *   `throw` 语句

  *   `try` 语句

  *   debugger 语句


  与 Java 一样，你可以使用分号来终止一条语句。然而，与 Java 不同的是，语句终止符是可选的。Nashorn 会在许多情况下自动插入分号。大多数时候，你可以省略作为语句终止符的分号而不会产生任何问题。Nashorn
  会根据需要自动插入它们。在某些情况下，自动插入分号可能会导致对程序的误解。以下是用于自动插入分号的规则：


  *   如果解析器遇到当前正在解析的语句中不允许出现的源代码文本，并且该文本前面至少有一个行终止符，则会自动插入一个分号。

  *   如果一条语句后面跟着一个右花括号（`}`），则在该语句后插入一个分号。

  *   在程序末尾插入一个分号。

  *   如果分号会被解析为空语句（我将在本章后面解释空语句），则不会自动插入分号。在 `for` 语句的头部也不会自动插入分号。


  考虑以下代码：


  `var x = 1, y = 3, z = 5`


  `x = y`


  `z++`


  `printf("x = %d, y = %d, z = %d", x, y, z)`


  解析器会自动插入分号作为语句终止符，就好像你编写的代码如下所示：


  `var x = 1, y = 3, z = 5;`


  `x = y;`


  `z++;`


  `printf("x = %d, y = %d, z = %d", x, y, z);`


  考虑以下代码：


  `var x = 10, y = 20`


  `if (x > y)`


  `else x = y`


  解析器会在变量语句和赋值语句 `x = y` 之后插入分号，但不会在 `if` 语句之后插入。转换后的代码如下所示：


  `var x = 10, y = 20;`


  `if (x > y)`


  `else x = y;`


  `if` 语句后不会自动插入分号，因为插入的分号会被解释为空语句。这段代码无法编译，因为 `if` 语句有条件但缺少一个语句体。


  解析器会持续解析源代码，直到发现一个违规的标记。它并不总是在行终止符前插入分号。考虑以下代码：


  `var x`


  `x`


  `=`


  `200`


  `printf("x = %d", x)`


  解析器会将这三行源代码（第二到第四行）视为一条赋值语句（x = 200），并在 200 之后插入一个分号。转换后的代码如下所示：


  `var x;`


  `x`


  `=`


  `200;`


  `printf("x = %d", x);`


  考虑以下打印 20 的代码：


  `var x = 200, y = 200, z`


  `z = Math.sqrt`


  `(x + y).toString()`


  `print(z)`


  解析器不会在第三行（`z = Math.sqrt`）的末尾插入分号。它认为下一行的 `(` 是函数 `Math.sqrt` 参数列表的开始。转换后的代码如下所示：


  `var x = 200, y = 200, z;`


  `z = Math.sqrt`


  `(x + y).toString();`


  `print(z);`


  然而，代码的作者可能本意是将函数引用 `Math.sqrt` 赋值给名为 `z` 的变量。在这种情况下，自动插入分号改变了代码的预期含义。如果你自己在赋值语句后插入分号，代码输出会不同：


  `var x = 200, y = 200, z;`


  `z = Math.sqrt;      // 将 Math.sqrt 函数引用赋值给 z`


  `(x + y).toString(); // 将 x + y 转换为字符串并忽略结果`


  `print(z);`


  `function sqrt() { [native code] }`


  如果你使用关键字 `void` 来忽略表达式 `(x + y).toString()` 的结果来编写相同的代码，解析器会在文本 `z = Math.sqrt`
  之后添加一个分号。以下代码的工作方式就如同你本意是将函数引用 `Math.sqrt` 赋值给名为 `z` 的变量：


  `var x = 200, y = 200, z   // 此处插入了一个分号`


  `z = Math.sqrt             // 此处插入了一个分号`


  `void (x + y).toString()   // 此处插入了一个分号`


  `print(z)                  // 此处插入了一个分号`


  `function sqrt() { [native code] }`


  在第二行末尾插入分号的原因是第三行的关键字 `void` 是一个违规标记。关键字 `void` 不能成为从第二行开始的赋值语句的一部分。


  提示


  我建议在所有需要的地方使用分号作为语句终止符。依赖自动插入分号有时可能会导致难以察觉的错误。


  我将在以下各节中简要讨论这些语句类型。


  ### 块语句


  块语句的工作方式与 Java 中的类似。它是由花括号（`{ }`）括起来的零条或多条语句组成的组。与 Java 不同，在块语句内部声明的变量不具有该块的局部作用域。它们可以在声明它们的块语句之前和之后被访问。以下代码片段演示了这一点：


  `var empId = 100;`


  `// 打印 empId 和 deptId。请注意，deptId 尚未声明，但你可以访问它。`


  `print("empId = " + empId + ", deptId = " + deptId);`


  `// 一个块语句`


  `{`


  `var deptId = 200;`


  `print("empId = " + empId + ", deptId = " + deptId);`


  `// 计算圆的面积`


  `var radius = 2.3;`


  `var area = Math.PI * radius * radius;`


  `printf("Radius = %.2f, Area = %.2f", radius, area);`


  `}`


  `print("empId = " + empId + ", deptId = " + deptId);`


  `empId = 100, deptId = undefined`


  `empId = 100, deptId = 200`


  `Radius = 2.30, Area = 16.62`


  `empId = 100, deptId = 200`


  在代码中，变量 `deptId` 被声明为块内的局部变量。然而，你可以在块外部（之前和之后）访问它。这不是 Nashorn 的 bug。根据变量作用域规则，这是按设计工作的。Nashorn
  中的变量作用域与 Java 中的工作方式截然不同。我将在“变量作用域与提升”一节中讨论变量的作用域。


  ### 变量语句


  变量语句用于声明变量，并可选择性地初始化变量。我已在“声明变量”一节中讨论过变量语句。变量语句的示例如下：


  `// 声明一个名为 empId 的变量`


  `var empId;`


  `// 声明一个名为 deptId 的变量并将其初始化为 200`


  `var deptId = 200;`


  ### 空语句


  分号用作空语句。Nashorn 中的空语句工作方式与 Java 中的相同。它没有任何效果。它可以在任何需要语句的地方使用。与 Java 一样，Nashorn 中的
  `for` 语句用于迭代目的。以下代码使用 `for` 语句打印整数 1 到 10。空语句被用作该语句的循环体：


  `// 末尾的分号是空语句`


  `for(var i = 1; i <= 10; print(i++));`


  ### 表达式语句


  表达式语句是由一个带有或不带有副作用的表达式组成的语句。以下是表达式语句的一些示例：


  `var i = 100; // 一个变量语句`


  `i++;         // 一个表达式语句`


  `print(i);    // 一个表达式语句`




  ### if 语句


  Nashorn 中的 `if` 语句与 Java 中的工作方式相同。其通用语法为：


  `if(condition)`


  `statement;`


  你也可以为 `if` 语句添加一个 `else` 部分：


  `if(condition)`


  `statement-1;`


  `else`


  `statement-2;`


  如果 `condition` 求值为 `true`，则执行 `statement-1`；否则，执行 `statement-2`。请注意，`condition`
  可以是任何类型的表达式，不一定是布尔表达式。`condition` 表达式会被求值并转换为布尔类型的值。以下代码片段展示了如何使用 `if` 和 `if-else`
  语句：


  `var x = 100, y = 200;`


  `if (x <= y)`


  `printf("%d <= %d", x, y);`


  `// print() 函数返回 undefined，该值会被求值为布尔值 false。`


  `if (print(x)) {`


  `print("Inside if");`


  `}`


  `else {`


  `print("Inside else")`


  `}`


  `100 <= 200`


  `100`


  `Inside else`


  请注意，表达式 `print(x)` 被用作第二个 `if` 语句的 `condition`。`print()` 函数会打印变量 `x` 的值并返回 `undefined`。值
  `undefined` 会被转换为布尔值 `false`（请参考“转换为布尔值”一节），这将执行与 `else` 部分关联的语句。


  ### 迭代语句


  Nashorn 支持五种类型的迭代语句：


  *   `while` 语句

  *   `do-while` 语句

  *   `for` 语句

  *   `for..in` 语句

  *   `for..each..in` 语句


  Nashorn 中的 `while`、`do-while` 和 `for` 语句与 Java 中的工作方式相同。我不会详细讨论它们，因为作为 Java 开发者，你知道如何使用它们。以下代码演示了它们的用法：


  `// 使用 while、do-while 和 for 语句打印前 3 个自然数`


  `var count;`


  `print("Using the while statement...");`


  `count = 1;`


  `while (count <= 3) {`


  `print(count);`


  `count++;`


  `}`


  `print("Using the do-while statement...");`


  `count = 1;`


  `do {`


  `print(count);`


  `count++;`


  `} while (count <= 3);`


  `print("Using the for statement...");`


  `for(var i = 1; i <= 3; i++) {`


  `print(i);`


  `}`


  `Using the while statement...`


  `1`


  `2`


  `3`


  `Using the do-while statement...`


  `1`


  `2`


  `3`


  `Using the for statement...`


  `1`


  `2`


  `3`


  `for..in` 语句用于遍历数组的索引或对象的属性名。它可以与数组、列表、映射、任何 Nashorn 对象等集合一起使用。其语法为：


  `for(var index in object)`


  `Statement;`


  首先，对 `object` 进行求值。如果求值为 `null` 或 `undefined`，则跳过整个 `for..in` 语句。如果求值为一个对象，则该语句会将可枚举属性赋值给
  `index` 并执行循环体。`index` 是字符串类型。对于数组，`index` 是数组元素的索引（以字符串形式表示）。对于任何其他集合，如列表或映射（Nashorn
  对象也是一个映射），对象的属性会被赋值给 `index`。你可以使用方括号表示法（`object[index]`）来访问属性的值。以下代码演示了如何使用 `for..in`
  语句遍历数组的索引：


  `// 创建一个包含三个字符串的数组`


  `var empNames = ["Ken", "Fred", "Li"];`


  `// 使用 for..in 语句遍历数组的索引`


  `for(var index in empNames) {`


  `var empName = empNames[index];`


  `printf("empNames[%s]=%s", index, empName);`


  `}`


  `empNames[0]=Ken`


  `empNames[1]=Fred`


  `empNames[2]=Li`


  提示


  `for...in` 语句中的 `index` 是字符串类型，而不是数字类型。


  `for..each..in` 语句不在 ECMAScript 5.1 规范中。它是 Nashorn 支持的 Mozilla JavaScript 1.6 扩展。`for..in`
  语句遍历集合的索引/属性名，而 `for..each..in` 语句则遍历集合中的值。它的工作方式与 Java 中的 `for-each` 语句相同。请注意，集合是一组唯一的值，没有为这些值命名。你不能使用
  `for..in` 语句遍历集合，但可以使用 `for..each..in` 语句来遍历。其语法为：


  `for(var value in object)`


  `Statement;`


  以下代码展示了如何使用 `for..each..in` 语句遍历数组的元素（而非索引）：


  `// 创建一个包含三个字符串的数组`


  `var empNames = ["Ken", "Fred", "Li"];`


  `// 使用 for..each..in 语句遍历数组的元素`


  `for each(var empName in empNames) {`


  `printf(empName);`


  `}`


  `Ken`


  `Fred`


  `Li`


  我将在第 7 章中进一步讨论 `for..in` 和 `for..each..in` 语句。


  ### continue、break 和 return 语句


  Nashorn 中的 `continue`、`break` 和 `return` 语句与 Java 中的工作方式相同。`continue` 和 `break`
  语句可以带有标签。`continue` 语句会跳过迭代语句循环体的剩余部分，并跳转到迭代语句的开头以继续下一次迭代。`break` 语句会跳转到它所在的迭代语句和
  `switch` 语句的末尾。函数中的 `return` 语句会将控制权返回给函数的调用者。`return` 语句还可以选择向调用者返回一个值。


  ### with 语句


  Nashorn 在一个称为执行上下文的上下文中执行脚本。它使用与执行上下文关联的作用域链来查找脚本中的非限定名称。首先在最近的作用域中搜索该名称。如果未找到，则继续沿作用域链向上搜索，直到找到该名称或搜索到作用域链的顶端。其语法为：


  `with(expression)`


  `statement`


  `with` 语句会将指定的 `expression`（求值为一个对象）添加到作用域链的头部，同时执行 `statement`。


  提示


  不推荐使用 `with` 语句，因为它会导致混淆，不清楚非限定名称存在于何处——是在 `with` 语句中指定的对象中，还是在作用域链的某处。在严格模式下不允许使用它。


  以下代码演示了 `with` 语句的用法：


  `var greetings = new String("Hello");`


  `// 必须使用 greetings.length 来访问名为 greetings 的 String 对象的 length 属性`


  `printf("greetings = %s, length = %d", greetings, greetings.length);`


  `with(greetings) {`


  `// 在此 with 语句中，你可以将 greetings 对象的 length 属性用作非限定标识符。`


  `printf("greetings = %s, length = %d", greetings, length);`


  `}`


  `with(new String("Hi")) {`


  `// toString() 和 length 将使用 new String("Hi") 对象来解析`


  `printf("greetings = %s, length = %d", toString(), length);`


  `}`


  `with(Math) {`


  `// 计算圆的面积`


  `var radius = 2.3;`


  `// PI 和 pow 被解析为 Math 对象的属性`


  `var area = PI * pow(radius, 2);`


  `printf("Radius = %.2f, Area = %.2f", radius, area);`


  `}`


  `greetings = Hello, length = 5`


  `greetings = Hello, length = 5`


  `greetings = Hi, length = 2`


  `Radius = 2.30, Area = 16.62`




  ### switch 语句


  Nashorn 中的 `switch` 语句与 Java 中的 `switch` 语句工作方式基本相同。其语法如下：


  `switch(expression) {`


  `case expression-1:`


  `statement-1;`


  `case expression-2:`


  `statement-2;`


  `default:`


  `statement-3;`


  `}`


  `expression` 会使用 `===` 运算符与 `case` 子句中的表达式进行匹配。第一个匹配的 `case` 子句中的语句会被执行。如果该 `case`
  子句包含 `break` 语句，则控制权会转移到 `switch` 语句的末尾；否则，会继续执行匹配到的 `case` 子句之后的语句。如果没有找到匹配项，则执行
  `default` 子句中的语句。如果存在多个匹配项，则仅执行第一个匹配的 `case` 子句中的语句。在 Java 中，`expression` 必须是 `int`、`String`
  或 `enum` 类型，而在 Nashorn 中，`expression` 可以是任何类型，包括 Object、Null 和 Undefined 类型。以下代码片段演示了如何使用
  `switch` 语句：


  `// 定义一个 match 函数，使用 switch 语句匹配传入的参数`


  `function match(value) {`


  `switch (value) {`


  `case undefined:`


  `print("匹配到 undefined:", value);`


  `break;`


  `case null:`


  `print("匹配到 null:", value);`


  `break;`


  `case ''2'':`


  `print("匹配到字符串 ''2'':", value);`


  `break;`


  `case 2:`


  `print("匹配到数字 2: ", value);`


  `break;`


  `default:`


  `print("无匹配:", value);`


  `break;`


  `}`


  `}`


  `// 使用不同的参数调用 match 函数`


  `match(undefined);`


  `match(null);`


  `match(2);`


  `match(''2'');`


  `match("Hello");`


  `匹配到 undefined: undefined`


  `匹配到 null: null`


  `匹配到数字 2: 2`


  `匹配到字符串 ''2'': 2`


  `无匹配: Hello`


  ### 带标签的语句


  标签就是一个标识符后跟一个冒号。Nashorn 中的任何语句都可以通过在语句前放置一个标签来标记。实际上，Nashorn 允许一个语句拥有多个标签。一旦你标记了一个语句，就可以在
  `break` 和 `continue` 语句中使用相同的标签来跳转到该标签处。通常，你会标记外层迭代语句，以便能够从嵌套循环中继续或跳出。带标签的语句的工作方式与
  Java 中相同。以下是一个使用带标签的语句和带有标签的 `continue` 语句来打印 3x3 矩阵左下三角部分的示例：


  `// 使用数组的数组创建一个 3x3 矩阵`


  `var matrix = [[11, 12, 13],`


  `[21, 22, 23],`


  `[31, 32, 33]];`


  `outerLoop:`


  `for(var i = 0; i < matrix.length; i++) {`


  `for(var j = 0; j < matrix[i].length; j++) {`


  `java.lang.System.out.printf("%d ", matrix[i][j]);`


  `if (i === j) {`


  `print();`


  `continue outerLoop;`


  `}`


  `}`


  `}`


  `11`


  `21` `22`


  `31 32 33`


  ### throw 语句


  `throw` 语句用于抛出一个用户定义的异常。它的工作方式与 Java 中的 `throw` 语句类似。其语法如下：


  `throw expression;`


  在 Java 中，`throw` 语句抛出的是 `Throwable` 类或其子类的对象；`expression` 必须求值为一个 `Throwable` 实例。在
  Nashorn 中，`throw` 语句可以抛出任何类型的值，可能包括数字或字符串。Nashorn 有一些内置对象，可以用作在 `throw` 语句中抛出的错误对象。这些对象包括
  `Error`、`TypeError`、`RangeError`、`SyntaxError` 等。以下代码片段展示了当 `empId` 不在 1 到 10000
  之间时如何抛出 `RangeError`：


  `var empId = -900;`


  `if (empId <= 0 || empId >= 10000) {`


  `throw new RangeError(`


  `"empId 必须在 1 到 10000 之间。发现: " + empId);`


  `}`


  当你运行这段代码时，它会在标准错误输出上打印错误的堆栈跟踪。与 Java 类似，Nashorn 允许你处理抛出的错误。你需要使用 `try-catch-finally`
  语句来处理抛出的错误，我将在下一节讨论这一点。


  ### try 语句


  Nashorn 中的 `try-catch-finally` 语句与 Java 中的工作方式相同。`try` 块包含一个或多个可能抛出错误的待执行语句。如果这些语句抛出错误，控制权会转移到
  `catch` 块。最后，`finally` 块中的语句会被执行。与 Java 一样，你可以有三种 `try`、`catch` 和 `finally` 块的组合：`try-catch`、`try-finally`
  和 `try-catch-finally`。与 Java 不同的是，ECMAScript 每个 `try` 块只支持一个 `catch` 块。Nashorn 支持
  Mozilla JavaScript 1.4 扩展，该扩展允许每个 `try` 块有多个 `catch` 块。使用 `try` 块的语法如下：


  `/* 一个 try-catch 块 */`


  `try {`


  `// 可能抛出错误的语句`


  `}`


  `catch(identifier) {`


  `// 在此处处理错误`


  `}`


  `/* 一个 try-finally 块 */`


  `try {`


  `// 可能抛出错误的语句`


  `}`


  `finally {`


  `// 在此处执行清理工作`


  `}`


  `/* 一个 try-catch-finally 块 */`


  `try {`


  `// 可能抛出错误的语句`


  `}`


  `catch(identifier) {`


  `// 在此处处理错误`


  `}`


  `finally {`


  `// 在此处执行清理工作`


  `}`


  提示


  在严格模式下，在 `catch` 块中使用 `eval` 或 `arguments` 作为标识符会导致 `SyntaxError`。


  以下是一个带有多个 `catch` 块的 `try` 块，这是 Nashorn 扩展支持的，其中 `e` 是一个标识符。你可以使用任何其他标识符代替 `e`：


  `/* 一个带有多个 catch 块的 try 块 */`


  `try {`


  `// 可能抛出错误的语句`


  `}`


  `catch (e if e instanceof RangeError) {`


  `// 在此处处理 RangeError`


  `}`


  `catch (e if e instanceof TypeError) {`


  `// 在此处处理 TypeError`


  `}`


  `catch (e) {`


  `// 在此处处理其他错误`


  `}`


  考虑清单 4-2 中的代码。它定义了两个函数：`isInteger()` 和 `factorial()`。`isInteger()` 函数在其参数是整数时返回
  `true`；否则返回 `false`。`factorial()` 函数计算并返回一个自然数的阶乘。如果其参数不是数字，则抛出 `TypeError`；如果其参数不是大于或等于
  1 的数字，则抛出 `RangeError`。


  清单 4-2\. factorial.js 文件的内容


  `// factorial.js`


  `// 如果 n 是整数则返回 true。否则返回 false。`


  `function isInteger(n) {`


  `return typeof n === "number" && isFinite(n) && n%1 === 0;`


  `}`


  `// 定义一个计算并返回整数阶乘的函数`


  `function factorial(n) {`


  `if (!isInteger(n)) {`


  `throw new TypeError(`


  `"数字必须是整数。发现:" + n);`


  `}`


  `if(n < 0) {`


  `throw new RangeError(`


  `"数字必须大于 0。发现: " + n);`


  `}`


  `var fact = 1;`


  `for(var counter = n; counter > 1; fact *= counter--);`


  `return fact;`


  `}`


  清单 4-3 中的程序使用 `factorial()` 函数计算一个数字和一个字符串的阶乘。`load()` 函数用于从 `factorial.js` 文件加载程序。`Error`
  对象（或其子类型）的 `message` 属性包含错误消息。该程序使用 `message` 属性来显示错误消息。当将“Hello”作为参数传递给 `factorial()`
  函数时，它会抛出一个 `TypeError`。程序处理该错误并显示错误消息。


  清单 4-3\. 文件 factorial_test.js 的内容


  `// factorial_test.js`


  `// 加载包含 factorial() 函数的 factorial.js 文件`


  `load("factorial.js");`


  `try {`


  `var fact3 = factorial(3);`


  `print("3 的阶乘是", fact3);`


  `var factHello = factorial("Hello");`


  `print("3 的阶乘是", factHello);`


  `}`


  `catch (e if e instanceof RangeError) {`


  `print("发生了一个 RangeError。", e.message);`


  `print("错误:", e.message);`


  `}`


  `catch (e if e instanceof TypeError) {`


  `print("发生了一个 TypeError。", e.message);`


  `}`


  `catch (e) {`


  `print(e.message);`


  `}`


  `3 的阶乘是 6`


  `发生了一个 TypeError。数字必须是整数。发现:Hello`




  Nashorn 扩展了 ECMAScript 提供的 `Error` 对象。它添加了几个有用的属性来获取所抛出错误的详细信息。表 4-9 列出了这些属性及其描述。


  表 4-9.


  Nashorn 中 Error 对象的属性列表


  | 属性 | 类型 | 描述 |

  | --- | --- | --- |

  | `lineNumber` | Number | 抛出错误对象时在源代码中的行号 |

  | `columnNumber` | Number | 抛出错误对象时在源代码中的列号 |

  | `fileName` | String | 源脚本的文件名 |

  | `stack` | String | 以字符串形式表示的脚本堆栈跟踪 |

  | `printStackTrace()` | function | 打印完整的堆栈跟踪，包括所有 Java 帧，从抛出错误的位置开始 |

  | `getStackTrace()` | function | 仅针对 ECMAScript 帧返回一个 `java.lang.StackTraceElement`
  实例数组 |

  | `dumpStack()` | function | 打印当前线程的堆栈跟踪，如同 Java 中的 `java.lang.Thread.dumpStack()`
  方法。`dumpStack()` 是 `Error` 对象的一个函数属性，你需要以 `Error.dumpStack()` 的方式调用它 |


