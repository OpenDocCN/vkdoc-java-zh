  ### 对象继承


  与 Java 不同，Nashorn 没有类。Nashorn 仅处理对象。它支持基于原型的对象继承。除了属性集合之外，Nashorn 中的每个对象都有一个原型，该原型是一个对象或
  `null` 值。你可以使用 `__proto__` 属性访问对象的原型引用。请注意，属性名 `__proto__` 中 `proto` 一词的前后各有两个下划线。此属性已被弃用，你可以使用以下两个函数来获取和设置对象的原型：


  *   `Object.getPrototypeOf(object)`

  *   `Object.setPrototypeOf(object, newPrototype)`


  如果访问对象中的某个属性，首先会搜索其自身的属性。如果找到该属性，则返回它。如果未找到该属性，则会搜索该对象的原型。如果仍未找到，则会继续搜索该对象原型的原型，依此类推。搜索会一直持续，直到在原型链中找到该属性，或者搜索完整个原型链。这种搜索与
  Java 中基于类的继承相同，在 Java 中，属性会沿着类继承链向上搜索，直到搜索到 `java.lang.Object` 类。


  提示


  在 Java 中，类继承总是向上延伸到 `java.lang.Object` 类。在 Nashorn 中，`Object.prototype` 是对象的默认原型。但是，你可以将原型设置为任何对象，包括
  `null` 值。


  考虑清单 4-8 中的代码。


  清单 4-8\. prototype.js 文件的内容


  `// prototype.js`


  `var point = {x: 10,`


  `y: 20,`


  `print: function() {`


  `printf("(%d, %d)", this.x, this.y);`


  `}`


  `};`


  `var coloredPoint = {color: "red",`


  `print: function() {`


  `printf("(%d, %d, %s)", this.x, this.y, this.color);`


  `}`


  `};`


  `// 将 point 对象设置为 coloredPoint 对象的原型`


  `// 也就是说，coloredPoint 对象继承自 point 对象。`


  `Object.setPrototypeOf(coloredPoint, point);`


  `print("After setting the prototype for coloredPoint...");`


  `// 调用两个对象的 print() 方法`


  `point.print();`


  `coloredPoint.print();`


  `// 更改 point 对象中的 x 和 y 值。`


  `point.x = 100;`


  `point.y = 200;`


  `print("After setting the x and y properties for point...");`


  `// 再次打印两个点的详细信息`


  `point.print();`


  `coloredPoint.print();`


  `/* 调用在 Object.prototype 对象中定义的 toString() 方法，该方法通过原型链在 point 和 coloredPoint 对象中可用。*/`


  `print(point.toString());`


  `print(coloredPoint.toString());`


  `// 打印对象的原型`


  `print("Object.getPrototypeOf(point) === Object.prototype is " +`


  `(Object.getPrototypeOf(point) === Object.prototype));`


  `print("Object.getPrototypeOf(colorPoint) === point is " +`


  `(Object.getPrototypeOf(coloredPoint) === point));`


  `print("Object.getPrototypeOf(colorPoint) === Object.prototype is " +`


  `(Object.getPrototypeOf(coloredPoint) === Object.prototype));`


  `After setting the prototype for coloredPoint...`


  `(10, 20)`


  `(10, 20, red)`


  `After setting the x and y properties for point...`


  `(100, 200)`


  `(100, 200, red)`


  `[object Object]`


  `[object Object]`


  `Object.getPrototypeOf(point) === Object.prototype is true`


  `Object.getPrototypeOf(colorPoint) === point is true`


  `Object.getPrototypeOf(colorPoint) === Object.prototype is false`


  你可以在代码中观察到以下几点：




  *   它定义了一个名为 `point` 的对象，该对象具有三个属性：`x`、`y` 和 `print`。

  *   它定义了另一个名为 `coloredPoint` 的对象，该对象具有两个属性：`color` 和 `print`。此时，这两个对象之间没有关联。

  *   它使用 `Object.setPrototypeOf()` 函数将 `point` 对象设置为 `coloredPoint` 对象的原型，因此现在 `coloredPoint`
  对象继承自 `point` 对象。此时，`coloredPoint` 对象继承了 `point` 对象的所有属性，包括属性 `x` 和 `y`。请注意，`x`
  和 `y` 只存在一份副本，并且由 `point` 和 `coloredPoint` 对象共享。

  *   它在两个对象上调用 `print()` 方法。输出结果证实两个对象都调用了各自版本的 `print()` 方法。这是属性覆盖的一个例子。`coloredPoint`
  对象覆盖了 `point` 对象的 `print()` 方法。其工作方式与 Java 中相同。

  *   它更改了 `point` 对象上 `x` 和 `y` 属性的值，并再次调用两个对象的 `print()` 方法。输出结果证实，`point` 和 `coloredPoint`
  对象的 `x` 和 `y` 值都已更改。

  *   它在两个对象上调用 `toString()` 方法，它们打印出相同的字符串。这是继承的另一个例子。`point` 对象没有设置其原型，因此其原型默认设置为
  `Object.prototype` 对象，其中 `Object` 是 Nashorn 中的一个内置对象。`toString()` 方法定义在 `Object.prototype`
  中，默认情况下所有对象都继承它。`coloredPoint` 对象从 `point` 对象继承了它，而 `point` 对象又从 `Object.prototype`
  对象继承了它。

  *   最后，它比较了对象的原型并打印结果。输出结果证实了所讨论的原型链。


