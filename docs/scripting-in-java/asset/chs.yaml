  \ `sp` 仍然是 `undefined`，这导致了异常。如果你在脚本中显示主舞台，`init()` 函数会在主舞台已经显示之后才被调用。如果你让 Nashorn\
  \ 为你显示主舞台，`init()` 函数会在主舞台之前被调用。\n\n提示\n\n如果你在 JavaFX 脚本中没有提供 `start()` 函数，那么提供\
