  `engine1.put("engineName", "Engine-1");`


  `ScriptEngine engine2 = manager.getEngineByName("JavaScript");`


  `engine2.put("engineName", "Engine-2");`


  `// 执行一个将两个数字相加并打印结果的脚本`


  `String script = "var sum = n1 + n2; "`


  `+ "print(engineName + '' - Sum = '' + sum)";`


  `try {`


