  `// ObjectCreate.js`


  `load("Point.js");`


  `// 创建一个不可写、不可枚举、不可配置的`


  `// Point 对象来表示原点`


  `var origin2D = Object.create(Point.prototype, {x:{value:0}, y:{value:0}});`


  `print("After creating:", origin2D);`


