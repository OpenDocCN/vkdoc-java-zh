  \ msg = new javafx.scene.control.Label(\"Hello JavaFX from Nashorn!\");`\n\n`msg.font\
  \ = javafx.scene.text.Font.font(\"Helvetica\", 18);`\n\n`var sp = new javafx.scene.layout.StackPane(msg);`\n\
