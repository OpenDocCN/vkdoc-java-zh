  提示


  原型链是在读取对象属性时搜索的，而不是在更新它们时。回想一下，更新一个不存在的属性会向设置该属性的对象添加一个新属性。


  在前面的示例中，您了解了原型继承链在 Nashorn 中是如何工作的。您使用对象字面量创建了对象，并使用 `Object.setPrototypeOf()` 函数设置了对象的原型。您也可以使用函数构造函数来完成相同的操作，尽管方式略有不同。Nashorn
  中的函数也是一个对象，默认情况下，函数的原型设置为 `Function.prototype` 对象。`Function.prototype` 的原型是 `Object.prototype`。`Function.prototype`
  包含几个有用的方法和属性，可用于所有函数。例如，它覆盖了 `Object.prototype` 的 `toString()` 方法，该方法会打印函数的源代码。以下代码演示了这一点：


  `// 创建一个名为 log 的函数对象`


  `function log(str) {`


  `print(new Date() + ": " + str);`


  `}`


  `// 在 log 对象上调用 toString() 方法`


  `print(log.toString());`


  `function log(str) {`


  `print(new Date() + ": " + str);`


  `}`


  Nashorn 中的每个函数都有一个名为 `prototype` 的属性，它是另一个对象。不要将函数的 `prototype` 属性与函数的原型对象（或简称为原型）混淆。函数的
  `prototype` 属性会自动设置为使用该函数作为构造函数创建的所有对象的原型。`prototype` 属性有一个名为 `constructor` 的属性，它指向函数本身。


  清单 4-9 创建了一个名为 `Point` 的构造函数，并向其 `prototype` 属性添加了两个名为 `toString()` 和 `distance()`
  的方法。


  清单 4-9. Point.js 文件的内容


  `// Point.js`


  `// 定义 Point 构造函数`


  `function Point(x, y) {`


  `this.x = x;`


  `this.y = y;`


  `}`


  `// 覆盖 Object.prototype 中的 toString() 方法`


  `Point.prototype.toString = function() {`


  `return "Point(" + this.x + ", " + this.y + ")";`


  `};`


  `// 定义一个名为 distance() 的新方法`


  `Point.prototype.distance = function(otherPoint) {`


  `var dx = this.x - otherPoint.x;`


  `var dy = this.y - otherPoint.y;`


  `var dist = Math.sqrt(dx * dx + dy * dy);`


  `return dist;`


  `};`


  清单 4-10 中的代码使用 `Point` 构造函数创建了两个对象，并计算了它们之间的距离。


  清单 4-10. PointTest.js 文件的内容


  `// PointTest.js`


  `load("Point.js");`


  `// 创建两个 Point 对象，计算它们之间的距离，并打印结果`


  `var p1 = new Point(100, 200);`


  `var p2 = new Point(-100, -200);`


  `var dist = p1.distance(p2);`


  `printf("Distance between %s and %s is %.2f.", p1.toString(), p2.toString(), dist);`


  `Distance between Point(100, 200) and Point(-100, -200) is 447.21.`


  如果您创建一个 `Point` 对象，其原型将自动设置为 `Point.prototype` 对象，因此新对象将继承 `toString` 和 `distance`
  方法。以下代码片段演示了这一点：


