  `Hello Jython`


  `Hello JRuby`


  有时你可能只是想玩玩脚本语言，但不知道在标准输出上打印消息所用的语法。`ScriptEngineFactory` 类包含一个名为 `getOutputStatement(String
  toDisplay)` 的方法，你可以使用它来查找在标准输出上打印文本的语法。以下代码片段展示了如何获取 Nashorn 的语法：


  `// 获取 Nashorn 的脚本引擎工厂`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `ScriptEngineFactory factory = engine.getFactory();`


  `// 获取脚本`


  `String script = factory.getOutputStatement("\"Hello JavaScript\"");`


  `System.out.println("语法: " + script);`


  `// 评估脚本`


  `engine.eval(script);`


  `语法: print("Hello JavaScript")`


  `Hello JavaScript`


  对于其他脚本语言，请使用它们的引擎工厂来获取语法。


  ## 探索 javax.script 包


  Java 中的 Java 脚本 API 由少量类和接口组成。它们位于 `javax.script` 包中。本章简要描述了该包中的类和接口。我将在后续章节中讨论它们的用法。图
  1-1 展示了 Java 脚本 API 中类和接口的类图。


  ![A978-1-4842-0713-0_1_Fig1_HTML.jpg](img/A978-1-4842-0713-0_1_Fig1_HTML.jpg)


  图 1-1.


  Java 脚本 API 中类和接口的类图




  ### ScriptEngine 与 ScriptEngineFactory 接口


  `ScriptEngine` 接口是 Java 脚本 API 的主要接口，其实例有助于执行以特定脚本语言编写的脚本。


  `ScriptEngine` 接口的实现者也需要提供 `ScriptEngineFactory` 接口的实现。一个 `ScriptEngineFactory`
  执行两项任务：


  *   创建脚本引擎的实例。

  *   提供关于脚本引擎的信息，例如引擎名称、版本、语言等。


  ### AbstractScriptEngine 类


  `AbstractScriptEngine` 类是一个抽象类。它为 `ScriptEngine` 接口提供了部分实现。除非你在实现一个脚本引擎，否则你不会直接使用这个类。


  ### ScriptEngineManager 类


  `ScriptEngineManager` 类为脚本引擎提供了一种发现和实例化机制。它还维护一个键值对映射，作为 `Bindings` 接口的一个实例，用于存储它创建的所有脚本引擎所共享的状态。


  ### Compilable 接口与 CompiledScript 类


  `Compilable` 接口可以由脚本引擎选择性地实现，该接口允许编译脚本以便重复执行而无需重新编译。


  `CompiledScript` 类是一个抽象类。它由脚本引擎的提供者进行扩展。它以编译形式存储脚本，可以重复执行而无需重新编译。请注意，使用 `ScriptEngine`
  重复执行脚本会导致每次重新编译，从而降低性能。


  脚本引擎不需要支持脚本编译。如果它支持脚本编译，则必须实现 `Compilable` 接口。


  ### Invocable 接口


  `Invocable` 接口可以由脚本引擎选择性地实现，该接口允许调用先前已编译脚本中的过程、函数和方法。


  ### Bindings 接口与 SimpleBindings 类


  实现了 `Bindings` 接口的类的实例是一个键值对映射，其限制是键必须是非空、非空的 `String`。它扩展了 `java.util.Map` 接口。`SimpleBindings`
  类是 `Bindings` 接口的一个实现。


  ### ScriptContext 接口与 SimpleScriptContext 类


  `ScriptContext` 接口的实例充当 Java 宿主应用程序和脚本引擎之间的桥梁。它用于将 Java 宿主应用程序的执行上下文传递给脚本引擎。脚本引擎在执行脚本时可能会使用上下文信息。脚本引擎可以将其状态存储在实现了
  `ScriptContext` 接口的类的实例中，该实例可能对 Java 宿主应用程序可访问。


  `SimpleScriptContext` 类是 `ScriptContext` 接口的一个实现。


  ### ScriptException 类


  `ScriptException` 类是一个异常类。如果在脚本的执行、编译或调用过程中发生错误，脚本引擎会抛出 `ScriptException`。该类包含三个有用的方法，分别称为
  `getLineNumber()`、`getColumnNumber()` 和 `getFileName()`。这些方法报告发生错误的脚本的行号、列号和文件名。`ScriptException`
  类重写了 `Throwable` 类的 `getMessage()` 方法，并在其返回的消息中包含行号、列号和文件名。


  ## 发现和实例化 ScriptEngine


  你可以使用 `ScriptEngineFactory` 或 `ScriptEngineManager` 创建脚本引擎。谁实际负责创建脚本引擎：`ScriptEngineFactory`、`ScriptEngineManager`，还是两者都有？简而言之，`ScriptEngineFactory`
  始终负责创建脚本引擎的实例。下一个问题是“`ScriptEngineManager` 的作用是什么？”


  `ScriptEngineManager` 使用服务提供者机制来定位所有可用的脚本引擎工厂。它搜索 CLASSPATH 和其他标准目录中的所有 JAR 文件。它查找一个资源文件，该文件是一个名为
  `javax.script.ScriptEngineFactory` 的文本文件，位于名为 `META-INF/services` 的目录下。该资源文件由实现
  `ScriptEngineFactory` 接口的类的完全限定名组成。每个类名单独占一行。该文件可以包含以 `#` 字符开头的注释。一个示例资源文件可能包含以下内容，其中包括两个脚本引擎工厂的类名：


  `#Java Kishori 脚本引擎工厂类`


  `com.jdojo.script.JKScriptEngineFactory`


  `#另一个工厂类`


  `com.jdojo.script.FunScriptFactory`


  `ScriptEngineManager` 定位并实例化所有可用的 `ScriptEngineFactory` 类。你可以使用 `ScriptEngineManager`
  类的 `getEngineFactories()` 方法获取所有工厂类实例的列表。当你调用管理器的某个方法（例如根据名称获取引擎的 `getEngineByName(String
  shortName)` 方法）来获取脚本引擎时，管理器会搜索所有工厂以查找该条件，并返回匹配的脚本引擎引用。如果没有工厂能够提供匹配的引擎，管理器将返回 `null`。有关列出所有可用工厂和描述它们可以创建的脚本引擎的更多详细信息，请参考清单
  1-3。


  现在你知道 `ScriptEngineManager` 并不创建脚本引擎的实例。相反，它查询所有可用的工厂，并将由工厂创建的脚本引擎的引用返回给调用者。


  为了使讨论完整，让我们为创建脚本引擎的方式增加一点变化。你可以通过三种方式创建脚本引擎的实例：


  *   直接实例化脚本引擎类。

  *   直接实例化脚本引擎工厂类并调用其 `getScriptEngine()` 方法。

  *   使用 `ScriptEngineManager` 类的某个 `getEngineByXxx()` 方法。


  建议使用 `ScriptEngineManager` 类来获取脚本引擎的实例。这种方法允许由同一管理器创建的所有引擎共享一个状态，该状态是一组作为 `Bindings`
  接口实例存储的键值对。`ScriptEngineManager` 实例存储此状态。


  提示


  在一个应用程序中可以有多个 `ScriptEngineManager` 类的实例。在这种情况下，每个 `ScriptEngineManager` 实例维护一个对其创建的所有引擎通用的状态。也就是说，如果两个引擎是由
  `ScriptEngineManager` 类的两个不同实例获得的，那么这些引擎将不会共享其管理器维护的公共状态，除非你通过编程方式实现。




  ## 摘要


  脚本语言是一种编程语言，它使你能够编写由称为脚本引擎（或解释器）的运行时环境评估（或解释）的脚本。脚本是使用脚本语言的语法编写的一系列字符，并作为由解释器执行的程序的源代码。Java
  脚本 API 允许你从 Java 应用程序执行任何可编译为 Java 字节码的脚本语言编写的脚本。JDK 6 和 7 附带了一个名为 Rhino JavaScript
  引擎的脚本引擎。在 JDK 8 中，Rhino JavaScript 引擎已被名为 Nashorn 的脚本引擎取代。


  Nashorn 引擎可以通过两种方式使用：它可以嵌入到 JVM 中并从 Java 程序直接调用，或者可以使用 `jjs` 命令行工具从命令提示符调用。


  Nashorn 提供了三个在标准输出上打印文本的函数：`print()`、`printf()` 和 `echo()`。`print()` 函数接受可变数量的参数；它会打印所有参数，用空格分隔，并在末尾打印一个新行。`printf()`
  函数打印格式化文本；其工作方式与 Java 编程语言中 printf 风格的格式化相同。`echo()` 函数的工作方式与 `print()` 函数相同，区别在于前者仅在脚本模式下调用
  Nashorn 引擎时可用。


  脚本使用 `ScriptEngine` 接口的实例（即脚本引擎）来执行。`ScriptEngine` 接口的实现者还提供了 `ScriptEngineFactory`
  接口的实现，其职责是创建脚本引擎的实例并提供有关脚本引擎的详细信息。`ScriptEngineManager` 类为脚本引擎提供了发现和实例化机制。`ScriptManager`
  维护一个键值对映射，作为 `Bindings` 接口的实例，该映射由其创建的所有脚本引擎共享。


