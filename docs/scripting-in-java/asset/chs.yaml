  当 `Logger` 第一次被调用时（无论是作为普通函数还是构造函数），它会创建一个带有 `log()` 方法的对象，将该对象缓存在 `Logger` 函数的
  `logger` 属性中，并返回该对象。当 `Logger` 再次被调用时，它只是简单地返回缓存的对象。


  使用构造函数，你可以为对象维护私有状态。这是通过闭包实现的。如果你在函数内部使用关键字 `var` 定义一个变量，该变量具有局部作用域。它只能在函数内部访问。嵌套函数会捕获其外部作用域，包括在其外部函数中声明的局部变量。清单
