  ## 从 Java 代码调试脚本


  调试从 Java 代码调用的脚本时，操作方式略有不同。仅仅在脚本文件中设置断点并启动调试器，或者从 Java 代码单步进入脚本，是行不通的。你将使用清单 13-2
  中所示的 Java 程序来调试清单 13-1 中所示的脚本。该 Java 程序使用一个 `Reader` 来执行来自 `primetest.js` 文件的脚本。不过，你也可以使用
  `load()` 函数。在清单 13-2 中，你可以将 `try-catch` 块中的代码替换为以下代码片段，程序将以相同方式运行；你需要移除两个从 `java.io`
  包导入类的 import 语句：


  `try {`


  `// 执行文件中的脚本`


  `engine.eval("load(''" + scriptFileName + "'');"); // 第一次，在此处添加一个断点`


  `}`


  `catch (ScriptException e) {`


  `e.printStackTrace();`


  `}`


  清单 13-2. 调试从 Java 代码调用的脚本


  `// PrimeTest.java`


  `package com.jdojo.script;`


  `import java.io.IOException;`


  `import java.io.Reader;`


  `import java.nio.file.Files;`


  `import java.nio.file.Path;`


  `import java.nio.file.Paths;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `public class PrimeTest {`


  `public static void main(String[] args) {`


  `// 构造脚本文件路径`


  `String scriptFileName = "primetest.js";`


  `Path scriptPath = Paths.get(scriptFileName);`


  `// 确保脚本文件存在。如果不存在，则打印脚本文件的完整路径并终止程序。`


  `if (!Files.exists(scriptPath)) {`


  `System.out.println(scriptPath.toAbsolutePath() +"                  "不存在。");`


  `return;`


  `}`


  `// 获取 Nashorn 脚本引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `try {`


  `// 为脚本文件获取一个 Reader`


  `Reader scriptReader = Files.newBufferedReader(scriptPath);`


  `// 执行文件中的脚本`


  `engine.eval(scriptReader);  // 第一次，在此处添加一个断点`


  `}`


  `catch (IOException | ScriptException e) {`


  `e.printStackTrace();`


  `}`


  `}`


  `}`


  调试脚本的第一步，需要在调用脚本引擎 `eval()` 方法的代码行上设置一个断点。如果不执行此步骤，你将无法从调试器单步进入脚本。图 13-5 显示了 `PrimeTest`
  类的代码，在第 35 行设置了一个断点。


  ![A978-1-4842-0713-0_13_Fig5_HTML.jpg](img/A978-1-4842-0713-0_13_Fig5_HTML.jpg)


  图 13-5.


  在 NetBeans IDE 中，PrimeTest 类的代码在第 35 行设置了一个断点


  下一步是启动调试器。当包含 `PrimeTest` 类的编辑器窗格处于活动状态时，你可以使用 `Ctrl + Shift + F5`。调试器将在第 35 行的断点处停止。你需要按
  `F7` 单步进入 `eval()` 方法调用；这将带你进入 `AbstractScriptEngine.java` 文件，如图 13-6 所示。


  ![A978-1-4842-0713-0_13_Fig6_HTML.jpg](img/A978-1-4842-0713-0_13_Fig6_HTML.jpg)


  图 13-6.


  调试 `AbstractScriptEngine.java` 文件时的调试器窗口


  按 `F7` 单步进入 `eval()` 方法调用。调试器将打开一个名为 `<eval>.js` 的文件，其中包含你试图通过 Java 代码使用 `Reader`
  加载的 `primetest.js` 文件中的脚本。你可以滚动浏览脚本，并在 `<eval>.js` 文件中设置断点。图 13-7 显示了带有两个断点的文件——一个在第
  21 行，另一个在第 27 行。


  ![A978-1-4842-0713-0_13_Fig7_HTML.jpg](img/A978-1-4842-0713-0_13_Fig7_HTML.jpg)


  图 13-7.


  调试器窗口显示 `<eval>.js` 文件中已加载的脚本


  在 `<eval>.js` 文件的脚本中设置好断点后，你就可以继续进行正常的调试操作了。例如，`继续` 调试操作（`F5`）将在下一个断点处停止执行。


  调试结束后，你可以移除 Java 代码中的断点，在本例中即 `PrimeTest.java` 文件。如果你启动一个新的调试会话，调试器将停止在你之前在 `<eval>.js`
  文件中设置的断点处。请注意，你只需单步进入 `<eval>.js` 文件一次。所有后续的调试会话都会记住之前会话中的断点。


  提示


  尽管 Nashorn 支持 `debugger` 语句，但 NetBeans IDE 似乎并不将其识别为 Nashorn 脚本中的断点。在脚本中添加 `debugger`
  语句不会在调试器激活时暂停执行。




  ## 追踪与性能分析脚本


  Nashorn 支持调用点追踪和性能分析。你可以在 `jjs` 命令行工具以及嵌入式 Nashorn 引擎中启用这些选项。你可以为引擎运行的所有脚本启用追踪和性能分析，也可以为单个脚本或函数启用。`–tcs`
  选项为所有脚本启用调用点追踪，并将调用点追踪信息打印到标准输出。`-pcs` 选项为所有脚本启用调用点性能分析，并将调用点性能分析数据打印到当前目录下名为 `NashornProfile.txt`
  的文件中。


  你可以在脚本或函数的开头使用以下四个 Nashorn 指令，来选择性地追踪和性能分析整个脚本或函数：


  *   `"nashorn callsite trace enterexit"; // 等同于 -tcs=enterexit`

  *   `"nashorn callsite trace miss";      // 等同于 -tcs=miss`

  *   `"nashorn callsite trace objects";   // 等同于 -tcs=objects`

  *   `"nashorn callsite profile";         // 等同于 -pcs`


  提示


  `–tcs` 和 `–pcs` 选项基于每个脚本引擎工作，而四个追踪和性能分析指令则基于每个脚本和每个函数工作。


  这些 Nashorn 指令仅在调试模式下启用。你可以通过将 `nashorn.debug` 系统属性设置为 true 来启用 Nashorn 调试模式。这些指令在
  JDK8u40 及更高版本中可用。在编写本书时，JDK8u40 仍在开发中。清单 13-3 展示了一个脚本，其中为某个函数启用了 Nashorn 调用点性能分析选项。该脚本已保存在名为
  `primeprofiler.js` 的文件中。


  清单 13-3\. 为函数启用了 Nashorn 调用点性能分析指令的脚本


  `// primeprofiler.js`


  `function isPrime(n) {`


  `// 仅对此函数进行性能分析`


  `"nashorn callsite profile";`


  `// 整数 <= 2、浮点数和偶数不是质数`


  `if (n <= 2 || Math.floor(n) !== n || n % 2 === 0) {`


  `return false;`


  `}`


  `// 检查 n 是否能被 3 到 sqrt(n) 之间的任何奇数整除。`


  `var sqrt = Math.sqrt(n);`


  `for (var i = 3; i <= sqrt; i += 2) {`


  `if (n % i === 0) {`


  `return false;`


  `}`


  `}`


  `return true; // 如果执行到这里，说明它是一个质数。`


  `}`


  `// 检查几个数字是否为质数`


  `var num = 8;`


  `var isPrimeNum = isPrime(num);`


  `print(num + " 是一个质数: " + isPrimeNum);`


  `num = 37;`


  `isPrimeNum = isPrime(num);`


  `print(num + " 是一个质数: " + isPrimeNum);`


  以下命令在启用 Nashorn 调试选项的情况下运行 `primeprofile.js` 文件中的脚本：


  `c:\>jjs -J-Dnashorn.debug=true primeprofile.js`


  `8 是一个质数: false`


  `37 是一个质数: true`


  `C:\`


  该命令将在当前目录下生成一个名为 `NashornProfile.txt` 的文件，其中包含 `isPrime()` 函数调用的性能分析数据。该文件的内容如清单
  13-4 所示。


