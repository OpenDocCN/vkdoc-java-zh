  某些字符在特定上下文中使用时具有特殊含义。这些字符被称为元字符，它们是 `(, )`、`[`、`]`、`{`、`}`、`\`、`^`、`$`、`|`、`?`、`*`、`+`
  和点号。我将在本节适当的位置讨论这些字符的特殊含义。


  在正则表达式中，用一对括号括起来的一组字符称为字符类。正则表达式将匹配该组中的任何字符。例如，`/[abc]/` 将匹配输入文本中的 `a`、`b` 或 `c`。您还可以使用字符类指定字符范围。范围使用连字符表示。例如，`[a-z]`
  代表任何小写英文字母；`[0-9]` 代表 0 到 9 之间的任何数字。如果在字符类的开头使用字符 `^`，则表示补集（即“非”的意思）。例如，`[^abc]`
  表示除 `a`、`b` 和 `c` 之外的任何字符。字符类 `[^a-z]` 表示除小写英文字母之外的任何字符。如果在字符类中的任何位置（开头除外）使用字符 `^`，它将失去特殊含义，仅匹配一个
  `^` 字符。例如，`[abc^]` 将匹配 `a`、`b`、`c` 或 `^`。字符类还支持多个范围以及对这些范围进行并集、交集、差集等操作。表 4-18 展示了一些在字符类中使用范围的示例。Nashorn
  有一些预定义的字符类，如表 4-19 所列。


  表 4-19.


  预定义字符类列表


  | 预定义字符类 | 含义 |

  | --- | --- |

  | . (点号) | 任何字符（可能匹配也可能不匹配行终止符） |

  | `\d` | 一个数字。等同于 `[0-9]` |

  | `\D` | 一个非数字。等同于 `[⁰-9]` |

  | `\s` | 一个空白字符。等同于 `[\t\n\x0B\f\r]`。该列表包括空格、制表符、换行符、垂直制表符、换页符和回车符 |

  | `\S` | 一个非空白字符。等同于 `[^\s]` |

  | `\w` | 一个单词字符。等同于 `[a-zA-Z_0-9]`。该列表包括小写字母、大写字母、下划线和十进制数字 |

  | `\W` | 一个非单词字符。等同于 `[^\w]` |


  表 4-18.


  字符类的一些示例


  | 字符类 | 含义 | 类别 |

  | --- | --- | --- |

  | `[abc]` | 字符 `a`、`b` 或 `c` | 简单字符类 |

  | `[^xyz]` | 除 `x`、`y` 和 `z` 之外的字符 | 补集或否定 |

  | `[a-p]` | 字符 `a` 到 `p` | 范围 |

  | `[a-cx-z]` | 字符 `a` 到 `c`，或 `x` 到 `z`，将包括 `a`、`b`、`c`、`x`、`y` 或 `z`。 | 并集 |

  | `[0-9&&[4-8]]` | 两个范围的交集（`4`、`5`、`6`、`7` 或 `8`） | 交集 |

  | `[a-z&&[^aeiou]]` | 所有小写字母减去元音。换句话说，一个不是元音的小写字母。即所有小写辅音。 | 差集 |


  您还可以指定正则表达式中的字符可以匹配字符序列的次数。如果要匹配所有两位整数，正则表达式应为 `/\d\d/`，这与 `/[0-9][0-9]/` 相同。匹配一个整数的正则表达式是什么？根据目前所学的知识，您无法写出匹配整数的正则表达式。您需要使用正则表达式来表达“一个或多个数字”的模式。量词及其含义已列在表
  4-20 中。


  表 4-20.


  量词及其含义


  | 量词 | 含义 |

  | --- | --- |

  | `*` | 零次或多次 |

  | `+` | 一次或多次 |

  | `?` | 一次或根本不匹配 |

  | `{m}` | 恰好 `m` 次 |

  | `{m, }` | 至少 `m` 次 |

  | `{m, n}` | 至少 `m` 次，但不超过 `n` 次 |


  需要注意的是，量词必须跟在为其指定数量的字符或字符类之后。匹配任何整数的正则表达式是 `/\d+/`，它指定：“匹配一个或多个数字”。这个匹配整数的解决方案正确吗？不，不正确。假设文本是“This
  is text123 which contains 10 and 120”。如果我们用模式 `/\d+/` 匹配文本，它将匹配 123、10 和 120。以下代码演示了这一点：


  `var pattern = /\d+/g;`


  `var text = "This is text123 which contains 10 and 120";`


  `var result;`


  `while((result = pattern.exec(text)) !== null) {`


  `print("Matched ''" + result[0] + "'' at " + result.index +`


  `". Next match will begin at " + pattern.lastIndex);`


  `}`


  `Matched ''123'' at 12\. Next match will begin at 15`


  `Matched ''10'' at 31\. Next match will begin at 33`


  `Matched ''120'' at 38\. Next match will begin at 41`


  请注意，123 并未用作整数，而是单词 text123 的一部分。如果您在文本中查找整数，text123 中的 123 当然不符合整数的条件。您希望匹配所有构成文本中单词的整数。您需要指定匹配应仅在单词边界上执行，而不是在包含嵌入整数的文本内部。这对于从结果中排除整数
  123 是必要的。表 4-21 列出了在正则表达式中匹配边界的元字符。


  表 4-21.


  正则表达式内部边界匹配器列表


  | 边界匹配器 | 含义 |

  | --- | --- |

  | ^ | 一行的开头 |

  | `$` | 一行的结尾 |

  | `\b` | 一个单词边界 |

  | `\B` | 一个非单词边界 |

  | `\A` | 输入的开头 |

  | `\G` | 上一个匹配的结尾 |

  | `\Z` | 输入的结尾，但如果有最终终止符，则在其之前 |

  | `\z` | 输入的结尾 |


  了解了边界匹配器后，您可以重写前面的示例，以仅匹配输入文本中的整数：


  `var pattern = /\b\d+\b/g;`


  `var text = "This is text123 which contains 10 and 120";`


  `var result;`


  `while((result = pattern.exec(text)) !== null) {`


  `print("Matched ''" + result[0] + "'' at " + result.index +`


  `". Next match will begin at " + pattern.lastIndex);`


  `}`


  `Matched ''10'' at 31\. Next match will begin at 33`


  `Matched ''120'' at 38\. Next match will begin at 41`




  `String` 对象有一个 `replace(regExp, replacement)` 方法，可用于在文本中执行查找和替换操作。以下代码会查找文本中所有出现的单词
  `apple`，并将其替换为单词 `orange`：


  `var pattern = /\bapple\b/g;`


  `var text = "I have an apple and five pineapples.";`


  `var replacement = "orange";`


  `var newText = text.replace(pattern, replacement);`


  `print("Regular Expression: " + pattern + ", Input Text: " + text);`


  `print("Replacement Text: " + replacement + ", New Text: " + newText);`


  `Regular Expression: /\bapple\b/g, Input Text: I have an apple and five pineapples.`


  `Replacement Text: orange, New Text: I have an orange and five pineapples.`


  你可以通过将多个字符作为一个组来将它们视为一个单元。组是在正则表达式中通过将一个或多个字符括在圆括号内创建的。`(ab)`、`ab(z)`、`ab(ab)(xyz)`
  和 `(the((is)(are)))` 都是组的示例。正则表达式中的每个组都有一个组号。组号从 1 开始。左括号表示开始一个新组。你可以在正则表达式中反向引用组号。假设你想匹配以
  `ab` 开头，后跟 `xy`，再后跟 `ab` 的文本。你可以将正则表达式写为 `/abxyab/`。你也可以通过创建一个包含 `ab` 的组并反向引用它来实现相同的结果，例如
  `/(ab)xy\1/`，其中 `\1` 引用组 1，在本例中即 `(ab)`。请注意，从 `RegExp` 对象的 `exec()` 方法返回的 `Array`
  对象，其第一个元素包含匹配的文本，后续元素包含所有匹配的组。如果你希望有一个组但不想捕获其结果或反向引用它，可以在组的开头添加字符序列 `?:`；例如，`(?:ab)xy`
  包含一个模式为 `ab` 的组，但你无法将其引用为 \1，并且其匹配的文本也不会填充到 `exec()` 方法返回的 `Array` 对象中。以 `?:` 开头的组称为非捕获组，不以
  `?:` 开头的组称为捕获组。你还可以在 `String` 对象的 `replace()` 方法的替换文本中，以 `$1`、`$2`、`$3` 等形式引用捕获的文本，其中
  1、2、3 是组号。表 4-22 列出了可在替换文本中用于反向引用匹配文本的所有字符组合。


  表 4-22.


  正则表达式中的边界匹配器列表


  | 字符 | 替换文本 |

  | --- | --- |

  | `$$` | $ |

  | `$&` | 匹配的子字符串 |

  | `` $` `` | 匹配子字符串之前的字符串部分。它是一个 $ 后跟一个反引号 |

  | `$''` | 匹配子字符串之后的字符串部分。它是一个 $ 后跟一个单引号 |

  | `$n` | 引用组 `n` 的匹配文本，其中 `n` 是 1 到 99 范围内的整数。如果组 `n` 为 `undefined`，则使用空字符串。如果 n
  大于组数，则结果为 $n |


  通过在替换文本中使用组和反向引用，你可以将 10 位电话号码 `nnnnnnnnnn` 格式化为 `(nnn) nnn-nnnn`，如清单 4-26 所示。


  清单 4-26\. 格式化 10 位电话号码


  `// tendigitsphonesformatter.js`


  `var pattern = /\b(\d{3})(\d{3})(\d{4})\b/g;`


  `var text = "3342449999, 2229822, and 6152534734";`


  `var replacement = "($1) $2-$3";`


  `var formattedPhones = text.replace(pattern, replacement);`


  `print("Phones: " + text);`


  `print("Formatted Phones: " + formattedPhones);`


  `Phones: 3342449999, 2229822, and 6152534734`


  `Formatted Phones: (334) 244-9999, 2229822, and (615) 253-4734`


  在该示例中，7 位电话号码未被格式化。假设你想将 7 位电话号码格式化为 `nnn-nnnn`。你可以通过使用替换函数作为 `String` 对象的 `replace()`
  方法的第二个参数来实现这一点。对于每个匹配项，替换函数会使用以下参数进行调用：


  *   参数数量等于正则表达式中的组数加 3

  *   第一个参数是匹配的文本

  *   第二个及后续参数（如果有）是从组 1 开始的组的匹配文本

  *   最后一个组的匹配文本之后是输入文本中找到匹配项的位置

  *   最后一个参数是输入文本本身


  替换函数的返回值会替换 `replace()` 方法返回的结果中的匹配文本。清单 4-27 展示了如何使用替换函数来格式化 7 位和 10 位电话号码。请注意，模式中的第一个三位数组是可选的。如果某个组在匹配文本中不匹配，则反向引用该组会返回
  `undefined`。此逻辑在 `phoneFormatter()` 函数中使用。如果名为 `group1` 的参数是 `undefined`，则表示匹配到了
  7 位电话号码；否则，匹配到了 10 位电话号码。


  清单 4-27\. 使用替换函数格式化 7 位和 10 位电话号码


  `// phoneformatter.js`


  `// 格式化 10 位和 7 位电话号码`


  `function phoneFormatter(macthedText, group1, group2, group3, startIndex, inputText)
  {`


  `if (group1 === undefined) {`


  `// 匹配到 7 位电话号码`


  `return group2 + "-" + group3;`


  `}`


  `else {`


  `// 匹配到 10 位电话号码`


  `return "(" + group1 + ") " + group2 + "-" + group3;`


  `}`


  `}`


  `// 使用 ? 元字符使第一个 3 位数组变为可选`


  `var pattern = /\b(\d{3})?(\d{3})(\d{4})\b/g;`


  `var text = "3342449999, 2229822, and 6152534734";`


  `// 在 replace() 方法中使用 phoneFormatter() 函数作为替换内容`


  `var formattedPhones = text.replace(pattern, phoneFormatter);`


  `print("Phones: " + text);`


  `print("Formatted Phones: " + formattedPhones);`


  `Phones: 3342449999, 2229822, and 6152534734`


  `Formatted Phones: (334) 244-9999, 222-9822, and (615) 253-4734`


  ### 了解脚本位置


  Nashorn 提供了三个全局对象：


  *   `__FILE__`

  *   `__DIR__`

  *   `__LINE__`


  请注意这些属性名称前后的两个下划线。它们包含脚本文件名、脚本文件的目录名以及读取 `__LINE__` 属性的脚本所在的行号。如果 `__FILE__` 和 `__DIR__`
  属性不可用（例如从标准输入读取脚本时），它们可能会报告为 `null`。有时，你得到的文件名并非脚本的真实文件名。你可能通过 Java 程序使用 `Reader`
  从文件中运行脚本，在这种情况下，文件名将报告为 `<eval>`。清单 4-28 包含打印这些属性的代码。该代码存储在一个名为 `scriptdetails.js`
  的文件中。


  清单 4-28\. scriptdetails.js 文件的内容


  `// scriptdetails.js`


  `// 打印以下语句的位置详细信息`


  `print("File Name =", __FILE__, ", Directory =",__DIR__, ", Line # =" ,__LINE__);`


  以下命令使用 `jjs` 命令在命令行上运行 `scriptdetails.js` 文件，该命令会打印脚本详细信息：


  `c:\>jjs c:\kishori\scriptdetails.js`


  `File Name = c:\kishori\scriptdetails.js, Directory = c:\kishori\, Line # =` `4`


  提示


  通常，`__FILE__`、`__DIR__` 和 `__LINE__` 全局属性用于调试目的。你还可以使用 `__DIR__` 属性从相对于当前运行脚本文件的位置加载脚本。


  ## 内置全局函数


  Nashorn 定义了内置的全局函数。我已经讨论过其中一个名为 `eval()` 的函数，它用于评估存储在字符串中的脚本。在本节中，我将讨论更多内置的全局函数。




  ### parseInt() 函数


  `parseInt()` 函数用于从字符串中解析出一个整数。其函数签名如下：


  `parseInt(string, radix)`


  该函数通过解析指定的 `string` 返回一个整数。如果指定了 `radix`，则将其视为 `string` 中整数的基数。`string` 中的前导空格会被忽略。如果未指定
  `radix`，或 `radix` 为 `undefined` 或 0，则 `radix` 默认为 10，除非 `string` 以 0x 或 0X 开头（忽略前导空格），在这种情况下
  `radix` 默认为 16。如果 `radix` 小于 2 或大于 36，该函数返回 `NaN`。


  `parseInt()` 函数仅解析 `string` 中能够作为指定 `radix` 下整数有效数字的前导部分。当遇到无效字符时，它会停止解析并返回已解析的整数值。如果没有任何前导字符可以被解析为整数，则返回
  `NaN`。请注意，当 `string` 包含无效字符时，你不会收到任何错误。该函数始终返回一个值。


  提示


  Nashorn 中的 `parseInt()` 函数与 Java 中的 `Integer.parseInt()` 方法工作方式类似，区别在于前者非常宽松，不会抛出异常。


  以下代码片段展示了使用不同参数调用 `parseInt()` 函数的输出：


  `printf("parseInt(''%s'') = %d", "1969", parseInt(''1969''));`


  `printf("parseInt(''%s'') = %d", "  1969", parseInt(''  1969''));`


  `printf("parseInt(''%s'') = %d", "  1969 Hello", parseInt(''  1969 Hello''));`


  `printf("parseInt(''%s'') = %s", "Hello1969", parseInt(''Hello1969''));`


  `printf("parseInt(''%s'') = %d", "0x1969", parseInt(''0x1969''));`


  `printf("parseInt(''%s'', 16) = %d", "0x1969", parseInt(''0x1969'', 16));`


  `printf("parseInt(''%s'', 2) = %d", "1001001", parseInt(''1001001'', 2));`


  `printf("parseInt(''%s'') = %d", "-1969", parseInt(''-1969''));`


  `printf("parseInt(''%s'') = %s", "-  1969", parseInt(''-  1969''));`


  `printf("parseInt(''%s'') = %s", "xyz", parseInt(''xyz''));`


  `parseInt(''1969'') = 1969`


  `parseInt(''  1969'') = 1969`


  `parseInt(''  1969 Hello'') = 1969`


  `parseInt(''Hello1969'') = NaN`


  `parseInt(''0x1969'') = 6505`


  `parseInt(''0x1969'', 16) = 6505`


  `parseInt(''1001001'', 2) = 73`


  `parseInt(''-1969'') = -1969`


  `parseInt(''-  1969'') = NaN`


  `parseInt(''xyz'') =` `NaN`


  ### parseFloat() 函数


  `parseFloat()` 函数用于从字符串中解析出一个浮点数。其函数签名如下：


  `parseFloat(string)`


  `parseFloat()` 函数的工作方式与 `parseInt()` 函数相同，区别在于前者解析 `string` 以获取浮点数。如果 `string` 不包含数字，则返回
  `NaN`。以下代码展示了使用不同参数调用 `parseFloat()` 函数的输出：


  `printf("parseFloat(''%s'') = %f", "1969.0919", parseFloat(''1969.0919''));`


  `printf("parseFloat(''%s'') = %f", "  1969.0919", parseFloat(''  1969.0919''));`


  `printf("parseFloat(''%s'') = %f", "-1969.0919", parseFloat(''-1969.0919''));`


  `printf("parseFloat(''%s'') = %f", "-1.9690919e3", parseFloat(''1.9690919e3''));`


  `printf("parseFloat(''%s'') = %f", "1969Hello", parseFloat(''1969Hello''));`


  `printf("parseFloat(''%s'') = %f", "Hello", parseFloat(''Hello''));`


  `parseFloat(''1969.0919'') = 1969.091900`


  `parseFloat(''  1969.0919'') = 1969.091900`


  `parseFloat(''-1969.0919'') = -1969.091900`


  `parseFloat(''-1.9690919e3'') = 1969.091900`


  `parseFloat(''1969Hello'') = 1969.000000`


  `parseFloat(''Hello'') = NaN`


  ### isNaN() 函数


  `isNaN()` 函数的函数签名如下：


  `isNaN(value)`


  如果 `value` 在转换为 Number 类型后结果为 `NaN`，则返回 `true`；也就是说，如果 `Number(value)` 返回 `NaN`，则返回
  `true`。如果该值表示一个数字，则 `isNaN()` 返回 `false`。请注意，`isNaN()` 不仅检查 `value` 是否为 `NaN`；它还检查
  `value` 是否为一个数字。`NaN` 不被视为一个数字，因此 `isNaN(NaN)` 返回 `true`。如果你只关心检查 `value` 是否为 `NaN`，请使用表达式
  `value !== value`。`NaN` 是唯一一个不等于自身的值。因此，当且仅当 `value` 是 `NaN` 时，`value !== value`
  才会返回 `true`。以下代码展示了如何使用 `isNaN()` 函数：


  `printf("isNaN(%s) = %b", NaN, isNaN(NaN));`


  `printf("isNaN(''%s'') = %b", "123", isNaN(''123''));`


  `printf("isNaN(''%s'') = %b", "Hello", isNaN(''Hello''));`


  `printf("isNaN(''%s'') = %b", "97Hello", isNaN(''97Hello''));`


  `printf("isNaN(''%s'') = %b", "Infinity", isNaN(''Infinity''));`


  `printf("isNaN(%s) = %b", "1.89e23", isNaN(1.89e23));`


  `var value = NaN;`


  `if (value !== value) {`


  `print("value is NaN")`


  `}`


  `else {`


  `print("value is not NaN")`


  `}`


  `isNaN(NaN) = true`


  `isNaN(''123'') = false`


  `isNaN(''Hello'') = true`


  `isNaN(''97Hello'') = true`


  `isNaN(''Infinity'') = false`


  `isNaN(1.89e23) = false`


  `value is` `NaN`


  ### isFinite() 函数


  `isFinite()` 函数的函数签名如下：


  `isFinite(value)`


  如果 `value` 是一个有限数字，或者可以被转换为一个有限的 Number 值，则返回 `true`。否则返回 `false`。换句话说，如果 `Number(value)`
  返回 `NaN`、`+Infinity` 或 `–Infinity`，则 `isFinite(value)` 函数返回 `false`；否则返回 `true`。以下代码展示了如何使用
  `isFinite()` 函数：


  `printf("isFinite(%s) = %b", NaN, isFinite(NaN));`


  `printf("isFinite(%s) = %b", Infinity, isFinite(Infinity));`


  `printf("isFinite(%s) = %b", -Infinity, isFinite(-Infinity));`


  `printf("isFinite(%s) = %b", 1089, isFinite(1089));`


  `printf("isFinite(''%s'') = %b", "1089", isFinite(''1089''));`


  `printf("isFinite(''%s'') = %b", "Hello", isFinite(''Hello''));`


  `printf("isFinite(%s) = %b", "true", isFinite(true));`


  `printf("isFinite(%s) = %b", "new Object()", isFinite(new Object()));`


  `printf("isFinite(%s) = %b", "new Object(7889)", isFinite(new Object(7889)));`


  `isFinite(NaN) = false`


  `isFinite(Infinity) = false`


  `isFinite(-Infinity) = false`


  `isFinite(1089) = true`


  `isFinite(''1089'') = true`


  `isFinite(''Hello'') = false`


  `isFinite(true) = true`


  `isFinite(new Object()) = false`


  `isFinite(new Object(7889)) =` `true`


  ### decodeURI() 函数


  `decodeURI()` 函数的函数签名如下：


  `decodeURI(encodedURI)`


  `decodeURI()` 函数将 `encodedURI` 中的转义序列替换为它们所代表的字符后返回。以下代码解码了一个 URI，其中包含一个被转换为空格的转义序列
  %20：


  `var encodedUri = "` [`http://www.jdojo.com/hi%20there`](http://www.jdojo.com/hi%20there)
  `";`


  `var decodedUri = decodeURI(encodedUri);`


  `print("Encoded URI:", encodedUri);`


  `print("Decoded URI:", decodedUri);`


  `Encoded URI:` [`http://www.jdojo.com/hi%20there`](http://www.jdojo.com/hi%20there)


  `Decoded URI:` [`http://www.jdojo.com/hi`](http://www.jdojo.com/hi) `there`


  ### decodeURIComponent() 函数


  `decodeURIComponent()` 函数的函数签名如下：


  `decodeURIComponent(encodedURIComponent)`


  `decodeURIComponent()` 函数用于将 URI 组件（URI 查询部分中的值）中的转义序列替换为相应的字符。例如，%26 需要用作与号（&）值的转义序列。此函数会将
  %26 转换为一个与号（&）。以下代码展示了如何使用此函数：


  `var encodedUriComponent = "Ken%26Donna";`


  `var decodedUriComponent = decodeURIComponent(encodedUriComponent);`


  `print("Encoded URI Component:", encodedUriComponent);`


  `print("Decoded URI Component:", decodedUriComponent);`


  `Encoded URI Component: Ken%26Donna`


  `Decoded URI Component: Ken&Donna`




  ### encodeURI( ) 函数


  `encodeURI()` 函数的签名如下：


  `encodeURI(uri)`


  该函数将 URI 中的某些字符替换为转义序列后返回结果。以下代码对一个包含空格的 URI 进行编码，空格字符被编码为 %20。


  `var uri = "` [`http://www.jdojo.com/hi`](http://www.jdojo.com/hi) `there";`


  `var encodedUri = encodeURI(uri);`


  `print("URI:", uri);`


  `print("Encoded URI:", encodedUri);`


  `URI:` [`http://www.jdojo.com/hi`](http://www.jdojo.com/hi) `there`


  `Encoded URI:` [`http://www.jdojo.com/hi%20there`](http://www.jdojo.com/hi%20there)


  ### encodeURIComponent( ) 函数


  `encodeURIComponent()` 函数的签名如下：


  `encodeURIComponent(uriComponent)`


  该函数用于将 URI 组件（URI 查询部分中的值）中的某些字符替换为转义序列。例如，URI 组件中的 & 符号会被转义为 %26。以下代码展示了如何使用该函数：


  `var uriComponent = "Ken&Donna";`


  `var encodedUriComponent = encodeURIComponent(uriComponent);`


  `print("URI Component:", uriComponent);`


  `print("Encoded URI Component:", encodedUriComponent);`


  `URI Component: Ken&Donna`


  `Encoded URI Component: Ken%26Donna`


  ### load( ) 和 loadWithNewGlobal 函数


  `load()` 和 `loadWithNewGlobal()` 函数用于加载并执行存储在文件（本地或远程）或脚本对象中的脚本。它们的签名如下：


  *   `load(scriptPath)`

  *   `load(scriptObject)`

  *   `loadWithNewGlobal(scriptPath, args1, arg2, ...)`

  *   `loadWithNewGlobal(scriptObject, arg1, arg2,...)`


  这两个函数都会加载并执行脚本。`load()` 函数在同一个全局作用域中加载脚本。全局作用域中已有的名称与加载脚本中的名称可能发生冲突，加载的脚本可能会覆盖已有的全局值。


  `loadWithNewGlobal()` 函数在新的全局作用域中加载脚本，因此加载脚本中的名称不会与加载该脚本的全局作用域中已有的名称发生冲突。该函数允许你向新的全局作用域传递参数。你可以在脚本路径或脚本对象之后指定这些参数。这样，现有的全局作用域可以向新的全局作用域传递信息。传递的参数可以在加载的脚本中通过
  `arguments` 全局对象访问。当新全局作用域中的加载脚本修改了内置全局对象（如 `String`、`Object` 等）时，这些修改在调用方的全局作用域中不可用。


  提示


  `loadWithNewGlobal()` 函数适用于在新线程中使用新的全局作用域执行脚本，从而消除线程覆盖现有全局变量的可能性。这两个函数都会返回一个值，即加载脚本中最后一个被求值的表达式的值。


  你在本章中已经使用过 `load()` 函数来加载脚本。你可以指定脚本的本地路径（绝对或相对路径）或 URL：


  `// 从当前目录的本地路径加载脚本`


  `load("Point.js");`


  `// 在 Windows 上使用绝对路径从本地路径加载脚本`


  `load("C:\\scripts\\Point.js");`


  `// 从互联网加载脚本`


  `load("` [`http://jdojo.com/scripts/Point.js`](http://jdojo.com/scripts/Point.js)
  `");`


  `load()` 和 `loadWithNewGlobal()` 函数还支持伪 URL 方案，例如 `nashorn` 和 `fx`。`nashorn` 方案用于加载
  Nashorn 脚本；例如，`load("nashorn:mozilla_compat.js")` 会加载内置的 Mozilla 兼容性脚本，以便你可以在 Nashorn
  中使用 Mozilla 功能。`fx` 方案用于加载 JavaFX 相关脚本；例如，`load("fx:controls.js")` 会加载内置的 JavaFX
  脚本，该脚本将所有 JavaFX 控件类名导入到 Nashorn 代码中，因此你可以使用它们的简单名称。


  `load()` 和 `loadWithNewGlobal()` 方法还可以加载并执行一个称为脚本对象的对象中的脚本。脚本对象应包含两个属性：`name` 和
  `script`。`name` 属性为脚本指定一个名称，当抛出错误时，该名称将用作脚本名称。你可以为脚本指定任意名称。`script` 属性包含要加载和执行的脚本。这两个属性都是必需的。以下代码创建了一个脚本对象，该对象在标准输出上打印当前日期，然后使用
  `load()` 函数加载并执行该脚本。由于脚本会打印当前日期和时间，你可能会得到不同的输出：


  `// 创建一个脚本对象`


  `var scriptObject = {`


  `name: "myscript",`


  `script: "var today = new Date; print(''Today is'', today);"`


  `};`


  `// 加载并执行脚本对象`


  `load(scriptObject);`


  `Today is Wed Oct 08 2014 11:56:50 GMT-0500 (CDT)`


  让我们看一些示例，了解 `load()` 和 `loadWithNewGlobal()` 函数之间的区别。为了保持代码简短且集中，我在示例中使用了脚本对象。你也可以从文件或
  URL 加载脚本。




  以下代码声明了一个名为 `x` 的全局变量，并为其赋值为 100。它加载了一个脚本对象，该对象也声明了一个同名全局变量 `x`，并赋值为 200。当使用 `load()`
  函数加载该脚本对象时，它会覆盖现有全局变量 `x` 的值，如下输出所示：


  `// 声明并初始化一个名为 x 的全局变量`


  `var x = 100;`


  `print("加载脚本对象之前：x =", x);  // x 为 100`


  `// 创建一个声明了全局变量 x 的脚本对象`


  `var scriptObject = {name: "myscript", script: "var x = 200;"};`


  `// 加载并执行脚本对象`


  `load(scriptObject);`


  `print("加载脚本对象之后：x =", x); // x 为 200`


  `加载脚本对象之前：x = 100`


  `加载脚本对象之后：x = 200`


  以下代码与上一段相同，只是使用了 `loadWithNewGlobal()` 函数来加载同一个脚本对象。由于 `loadWithNewGlobal()` 函数会创建一个新的全局作用域，其全局变量
  x 不会影响现有的全局作用域。输出结果证实，现有的全局变量 x 保持不变：


  `// 声明并初始化一个名为 x 的全局变量`


  `var x = 100;`


  `print("加载脚本对象之前：x =", x);  // x 为 100`


  `// 创建一个声明了全局变量 x 的脚本对象`


  `var scriptObject = {name: "myscript", script: "var x = 200;"};`


  `// 加载并执行脚本对象`


  `loadWithNewGlobal(scriptObject);`


  `print("加载脚本对象之后：x =", x); // x 为 200`


  `加载脚本对象之前：x = 100`


  `加载脚本对象之后：x = 100`


  以下代码展示了如何向 `loadWithNewGlobal()` 函数传递参数。该代码仅打印传递的参数：


  `// 创建一个打印所传递参数的脚本对象`


  `var scriptObject = {`


  `name: "myscript",`


  `script: "for each(var arg in arguments) {print(arg)}"`


  `};`


  `// 加载并执行脚本对象，传递三个参数`


  `loadWithNewGlobal(scriptObject, 10, 20, 30);`


  `10`


  `20`


  `30`


  你不仅限于向新的全局作用域传递原始值，还可以传递函数。你可以使用函数在两个全局作用域之间进行通信。以下代码向新的全局作用域传递了一个回调函数。请注意，当从新的全局作用域调用传递的函数时，该函数仍然使用其创建者全局作用域中定义的变量
  `x`，而不是新的全局作用域中的变量：


  `var x = 100;`


  `// 创建一个打印所传递参数的脚本对象`


  `var scriptObject = {`


  `name: "myscript",`


  `script: "var x = 200; print(''新全局作用域内部。x ='', x); " +                 "arguments[0]();"`


  `};`


  `// 加载并执行脚本对象，传递一个函数对象`


  `loadWithNewGlobal(scriptObject, function () {`


  `print("从新全局作用域回调。x = " + x);`


  `});`


  `新全局作用域内部。x = 200`


  `从新全局作用域回调。x = 100`


  ## 总结


  Nashorn 是 JVM 上 ECMAScript 5.1 规范的一种运行时实现。ECMAScript 定义了其自身的语法和结构，用于声明变量、编写语句和操作符、创建和使用对象与集合、遍历数据集合等。Nashorn
  100% 符合 ECMAScript 5.1 规范，因此在使用 Nashorn 时，你需要学习一套新的语言语法。


  Nashorn 以两种模式运行：严格模式和非严格模式。通常，容易出错的功能在严格模式下是不允许的。你可以在脚本或函数的开头使用 `"use strict"` 指令，以在严格模式下执行该脚本或函数。


  Nashorn 语法支持两种类型的注释：单行注释和多行注释。它们的语法与 Java 中的单行和多行注释相同。单行注释以 `//` 开头，延伸到行尾。多行注释以
  `/*` 开头，以 `*/` 结束；它们可以跨越多行。


  Nashorn 定义了几个关键字和保留字。你不能将它们用作标识符来命名变量和函数。关键字 `var` 用于声明变量。关键字 `function` 用于声明函数。


  Nashorn 定义了两种数据类型：原始类型和对象类型。Undefined、Null、Number、Boolean 和 String 是原始数据类型；其他所有类型都是对象类型。Nashorn
  中的函数也是对象。如果需要，原始值会自动转换为对象。


  Nashorn 定义了几个操作符和语句，让你能够编写脚本。它们中的大多数与 Java 中的相同。Nashorn 与 Java 之间最大的区别之一在于 Nashorn
  处理布尔表达式的方式。Nashorn 处理真值（truthy）和假值（falsy），这些值可以转换为布尔值 `true` 或 `false`。这使得在 Nashorn
  中可以在期望布尔值的任何地方使用任何值。


  函数是一个参数化的、命名的代码块，它被定义一次并按需执行。函数是一等对象。你也可以将函数定义为函数表达式，或使用包含函数代码的字符串来定义。函数还可以与 `new`
  操作符一起用作构造函数来创建新对象。当一个函数被作为值赋给对象的属性时，该函数被称为方法。


  Nashorn 中的对象本质上是一个映射，即命名属性的集合。对象的属性可以具有简单数据值、对象或函数作为其值。Nashorn 支持三种创建新对象的方式：使用对象字面量、使用构造函数以及使用
  `Object.create()` 方法。对象的属性还可以具有控制属性使用方式的特性。例如，将属性的 `writable` 特性设置为 `false` 会使该属性变为只读。你可以使用点号表示法或方括号表示法来访问对象的属性。为对象的不存在的属性赋值，会创建一个具有该名称的新属性，并将值赋给它。Nashorn
  支持基于原型的对象继承。


  Nashorn 包含一个名为 `JSON` 的内置对象，它支持将 Nashorn 对象序列化为字符串以及将字符串解析为 Nashorn 对象。


  在 Nashorn 中，变量和函数声明没有块级作用域。也就是说，块内的声明在块外部也是可见的。这被称为声明提升。你可以将声明提升理解为所有声明都被提升到它们所在作用域的顶部。


  Nashorn 包含几个内置的全局对象和函数。`Object`、`Function`、`String`、`Number` 和 `Boolean` 是内置对象的例子。`parseInt()`、`parseFloat()`、`load()`
  和 `loadWithNewGlobal()` 是全局函数的例子。


  正则表达式表示文本中的一种模式。Nashorn 包含一个 `RegExp` 内置对象，其实例表示正则表达式。你也可以使用正则表达式字面量来表示 `RegExp`
  对象。正则表达式字面量用正斜杠括起来，并可选择后跟定义高级文本匹配规则的标志。`/Java/gi` 是一个正则表达式字面量的例子，它将执行全局、不区分大小写的文本
  `Java` 匹配。`RegExp` 对象包含 `test()` 和 `exec()` 方法，用于对输入文本执行匹配。`String` 对象的几个方法（如 `replace()`
  和 `match()`）将正则表达式作为参数，以执行匹配和查找替换等操作。


  '
- '# 5. 过程与编译脚本


  在本章中，你将学习：


  *   如何从 Java 程序调用用脚本编写的过程

  *   如何在 Nashorn 脚本中实现 Java 接口

  *   如何编译 Nashorn 脚本并重复执行它们




  ## 在脚本中调用过程


  在前面的章节中，你已经了解了如何使用 `ScriptEngine` 的 `eval()` 方法来调用脚本。如果 `ScriptEngine` 支持过程调用，也可以直接从
  Java 程序调用用脚本语言编写的过程。


  脚本语言可能允许创建过程、函数和方法。Java 脚本 API 允许你从 Java 应用程序中调用这些过程、函数和方法。在本节中，我将使用术语“过程”来指代过程、函数和方法。当讨论的上下文需要时，我会使用具体的术语。


  并非所有脚本引擎都需要支持过程调用。Nashorn JavaScript 引擎支持过程调用。如果脚本引擎支持，那么该脚本引擎类的实现必须实现 `Invocable`
  接口。`Invocable` 接口包含以下四个方法：


  *   `<T> T getInterface(Class<T> cls)`

  *   `<T> T getInterface(Object obj, Class<T> cls)`

  *   `Object invokeFunction(String name, Object... args) throws ScriptException,
  NoSuchMethodException`

  *   `Object invokeMethod(Object obj, String name, Object... args) throws ScriptException,
  NoSuchMethodException`


  `getInterface()` 方法的两个版本允许你获取用脚本语言实现的 Java 接口的实例。我将在下一节详细讨论这些函数。`invokeFunction()`
  方法允许你调用用脚本语言编写的顶层函数。`invokeMethod()` 方法允许你调用用脚本语言编写的对象的方法。


  在调用过程之前，开发者有责任检查脚本引擎是否实现了 `Invocable` 接口。调用过程是一个四步流程：


  *   检查脚本引擎是否支持过程调用

  *   将引擎引用转换为 `Invocable` 类型

  *   评估包含过程源代码的脚本，以便引擎编译并缓存该脚本

  *   使用 `Invocable` 接口的 `invokeFunction()` 方法来调用过程和函数；使用 `invokeMethod()` 方法来调用在脚本语言中创建的对象的各个方法


  以下代码片段执行了检查脚本引擎实现类是否实现了 `Invocable` 接口的操作：


  `// 获取 Nashorn 引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 确保脚本引擎实现了 Invocable 接口`


  `if (engine instanceof Invocable) {`


  `System.out.println("支持调用过程。");`


  `}`


  `else  {`


  `System.out.println("不支持调用过程。");`


  `}`


  第二步是将引擎引用转换为 `Invocable` 接口类型：


  `if (engine instanceof Invocable) {`


  `Invocable inv = (Invocable)engine;`


  `// 此处添加更多代码`


  `}`


  第三步是评估脚本，以便脚本引擎编译并存储过程的编译形式以供后续调用。以下代码片段执行此步骤：


  `// 声明一个名为 add 的函数，用于将两个数字相加`


  `String script = "function add(n1, n2) { return n1 + n2; }";`


  `// 评估该函数。调用 eval() 并不会调用该函数。 // 它只是编译它。`


  `engine.eval(script);`


  最后一步是调用该过程，如下所示：


  `// 以 30 和 40 作为函数参数调用 add 函数。`


  `// 这就像在脚本中调用了 add(30, 40) 一样。`


  `Object result = inv.invokeFunction("add", 30, 40);`


  `invokeFunction()` 的第一个参数是过程的名称。第二个参数是一个可变参数，用于指定传递给过程的参数。`invokeFunction()` 方法返回过程返回的值。




  清单 5-1 展示了如何调用函数。它调用了一个用 Nashorn JavaScript 编写的函数，并加载了名为`factorial.js`和`avg.js`的文件中的脚本。这些文件包含了名为`factorial()`和`avg()`函数的
  Nashorn 代码。随后，程序通过`Invocable`接口的`invokeFunction()`方法调用了这些函数。


  清单 5-1\. 调用用 Nashorn JavaScript 编写的函数


  `// InvokeFunction.java`


  `package com.jdojo.script;`


  `import javax.script.Invocable;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `public class InvokeFunction {`


  `public static void main(String[] args) {`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 确保脚本引擎实现了 Invocable 接口`


  `if (!(engine instanceof Invocable)) {`


  `System.out.println("不支持调用过程。");`


  `return;`


  `}`


  `// 将引擎引用转换为 Invocable 类型`


  `Invocable inv = (Invocable) engine;`


  `try {`


  `String scriptPath1 = "factorial.js";`


  `String scriptPath2 = "avg.js";`


  `// 首先执行脚本，以便编译 factorial()和 avg()函数`


  `// 并使其可供调用`


  `engine.eval("load(''" + scriptPath1 + "'');");`


  `engine.eval("load(''" + scriptPath2 + "'');");`


  `// 调用 add 函数两次`


  `Object result1 = inv.invokeFunction("factorial", 10);`


  `System.out.println("factorial(10) = " + result1);`


  `Object result2 = inv.invokeFunction("avg", 10, 20, 30);`


  `System.out.println("avg(10, 20, 30) = " + result2);`


  `}`


  `catch (ScriptException | NoSuchMethodException e) {`


  `e.printStackTrace();`


  `}`


  `}`


  `}`


  `factorial(10) = 3628800.0`


  `avg(10, 20, 30) = 20.0`


  面向对象或基于对象的脚本语言可能允许你定义对象及其方法。你可以使用`Invocable`接口的`invokeMethod(Object obj, String
  name, Object... args)`方法调用此类对象的方法。第一个参数是对象的引用，第二个参数是你要在对象上调用的方法名称，第三个参数是一个可变参数，用于向被调用的方法传递参数。


  清单 5-2 包含一个 Nashorn 脚本，该脚本创建了一个名为`calculator`的对象，并添加了四个方法用于两个数的加、减、乘、除。请注意，我使用了
  Nashorn 语法扩展来定义函数表达式，其中未指定花括号和`return`语句。


  清单 5-2\. 在 Nashorn 脚本中创建的 Calculator 对象


  `// calculator.js`


  `// 创建一个对象`


  `var calculator = new Object();`


  `// 向 calculator 对象的原型添加四个方法`


  `calculator.add = function (n1, n2) n1 + n2;`


  `calculator.subtract = function (n1, n2) n1 - n2;`


  `calculator.multiply = function (n1, n2) n1 * n2;`


  `calculator.divide = function (n1, n2) n1 / n2;`


  清单 5-3 演示了在 Nashorn 中创建的`calculator`对象上调用方法的过程。请注意，该对象是在 Nashorn 脚本内部创建的。要从 Java
  调用该对象的方法，你需要通过脚本引擎获取该对象的引用。程序执行了`calculator.js`文件中的脚本，该脚本创建了`calculator`对象并将其引用存储在一个名为`calculator`的变量中。`engine.get("calculator")`方法将`calculator`对象的引用返回给
  Java 代码。


  清单 5-3\. 在 Nashorn 创建的对象上调用方法


  `// InvokeMethod.java`


  `package com.jdojo.script;`


  `import javax.script.Invocable;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


  `public class InvokeMethod {`


  `public static void main(String[] args) {`


  `// 获取 Nashorn 引擎`


  `ScriptEngineManager manager = new ScriptEngineManager();`


  `ScriptEngine engine = manager.getEngineByName("JavaScript");`


  `// 确保脚本引擎实现了 Invocable 接口`


  `if (!(engine instanceof Invocable)) {`


  `System.out.println("不支持调用方法。");`


  `return;`


  `}`


  `// 将引擎引用转换为 Invocable 类型`


  `Invocable inv = (Invocable) engine;`


  `try {`


  `// 声明一个带有 add()方法的全局对象`


  `String scriptPath = "calculator.js";`


  `// 首先执行脚本`


  `engine.eval("load(''" + scriptPath + "'')");`


  `// 获取脚本中创建的 calculator 对象引用`


  `Object calculator = engine.get("calculator");`


  `// 在 calculator 对象上调用方法`


  `int x = 30;`


  `int y = 40;`


  `Object addResult = inv.invokeMethod(calculator, "add", x, y);`


  `Object subResult = inv.invokeMethod(calculator, "subtract", x, y);`


  `Object mulResult = inv.invokeMethod(calculator, "multiply", x, y);`


  `Object divResult = inv.invokeMethod(calculator, "divide", x, y);`


  `System.out.printf("calculator.add(%d, %d) = %s%n", x, y, addResult);`


  `System.out.printf("calculator.subtract(%d, %d) = %s%n", x, y, subResult);`


  `System.out.printf("calculator.multiply(%d, %d) = %s%n", x, y, mulResult);`


  `System.out.printf("calculator.divide(%d, %d) = %s%n", x, y, divResult);`


  `}`


  `catch (ScriptException | NoSuchMethodException e) {`


  `e.printStackTrace();`


  `}`


  `}`


  `}`


  `calculator.add(30, 40) = 70`


  `calculator.subtract(30, 40) = -10.0`


  `calculator.multiply(30, 40) = 1200.0`


  `calculator.divide(30, 40) = 0.75`


  提示


  使用`Invocable`接口可以重复执行过程、函数和方法。执行包含过程、函数和方法的脚本时，会将中间代码存储在引擎中，从而在重复执行时提升性能。




  ## 在脚本中实现 Java 接口


  Java 脚本 API 允许你在脚本语言中实现 Java 接口。在脚本语言中实现 Java 接口的好处是，你可以在 Java 代码中使用该接口的实例，就像该接口是用
  Java 实现的一样。你可以将接口实例作为参数传递给 Java 方法。Java 接口的方法可以在脚本中使用顶层过程或对象的方法来实现。


  `Invocable` 接口的 `getInterface()` 方法用于获取在脚本中实现的 Java 接口的实例。该方法有两个版本：


  *   `<T> T getInterface(Class<T> cls)`

  *   `<T> T getInterface(Object obj, Class<T> cls)`


  第一个版本用于获取一个 Java 接口的实例，该接口的方法在脚本中作为顶层过程实现。接口类型作为参数传递给此方法。假设你有一个 `Calculator` 接口，如清单
  5-4 所示，其中包含四个方法：`add()`、`subtract()`、`multiply()` 和 `divide()`。


  **清单 5-4. 一个计算器接口**


  `// Calculator.java`


  `package com.jdojo.script;`


  `public interface Calculator {`


  `double add (double n1, double n2);`


  `double subtract (double n1, double n2);`


  `double multiply (double n1, double n2);`


  `double divide (double n1, double n2);`


  `}`


  考虑用 Nashorn 编写的顶层函数，如清单 5-5 所示。该脚本包含四个函数，分别对应 `Calculator` 接口中的函数。


  **清单 5-5. calculatorasfunctions.js 文件的内容**


  `// calculatorasfunctions.js`


  `function add(n1, n2) {`


  `n1 + n2;`


  `}`


  `function subtract(n1, n2) {`


  `n1 - n2;`


  `}`


  `function multiply(n1, n2) {`


  `n1 * n2;`


  `}`


  `function divide(n1, n2) {`


  `n1 / n2;`


  `}`


  这两个函数为 `Calculator` 接口的四个方法提供了实现。在函数被 JavaScript 引擎编译后，你可以获取 `Calculator` 接口的一个实例，如下所示：


  `// 将引擎引用转换为 Invocable 类型`


  `Invocable inv = (Invocable)engine;`


  `// 获取 Calculator 接口的引用`


  `Calculator calc = inv.getInterface(Calculator.class);`


  `if (calc == null) {`


  `System.err.println("未找到 Calculator 接口的实现。");`


  `}`


  `else {`


  `// 使用 calc 调用 Calculator 接口的方法`


  `}`


  你可以像这样对两个数进行加法运算：


  `int sum = calc.add(15, 10);`


  清单 5-6 展示了如何使用 Nashorn 中的顶层过程实现 Java 接口。请查阅脚本语言（非 Nashorn）的文档，了解其如何支持此功能。


  **清单 5-6. 在脚本中使用顶层函数实现 Java 接口**


  `// UsingInterfaces.java`


  `package com.jdojo.script;`


  `import javax.script.Invocable;`


  `import javax.script.ScriptEngine;`


  `import javax.script.ScriptEngineManager;`


  `import javax.script.ScriptException;`


