  ## 总结


  支持 JDK 8 或更高版本的 NetBeans 8 支持在 NetBeans IDE 中调试 Nashorn 脚本。你可以在 NetBeans IDE 中运行和调试独立的
  Nashorn 脚本。当从 Java 代码调用 Nashorn 脚本时，你也可以对其进行调试。调试器可以无缝地从 Java 代码跳转到 Nashorn 脚本。


  Nashorn 支持调用点追踪和性能分析。你可以在 `jjs` 命令行工具以及嵌入式 Nashorn 引擎中启用这些选项。你可以为引擎运行的所有脚本启用追踪和性能分析，也可以为单个脚本或函数启用。`–tcs`
  选项为引擎运行的所有脚本启用调用点追踪。`-pcs` 选项为引擎运行的所有脚本启用调用点性能分析，并将调用点性能分析数据打印到当前目录下名为 `NashornProfile.txt`
  的文件中。JDK8u40 新增了四个 Nashorn 指令：`"nashorn callsite trace enterexit"`、`"nashorn callsite
  trace miss"`、`"nashorn callsite trace objects"` 和 `"nashorn callsite profile"`。这些指令可以添加到脚本和函数的开头，以选择性地追踪和性能分析脚本和函数。它们仅在调试模式下工作，可以通过将系统属性
  `nashorn.debug` 设置为 true 来启用调试模式。




