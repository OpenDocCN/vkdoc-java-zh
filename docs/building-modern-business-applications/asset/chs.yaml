- '# 9. 命令处理器


  命令处理器是我们系统中的一个关键组件。它将负责确保一部分业务规则（即静态数据规则）得到执行。在本章中，我将解释这个组件背后的理念、构建它所需的条件、它的工作原理、失败方式以及如何测试它。让我们开始吧。


  ## 它是什么，以及不是什么


  命令处理器是系统中事件溯源的部分。它负责协调构成系统状态的事件的创建。作为其中的一部分，它还强制执行一类业务规则，即静态数据规则。事件描述的是过去，即已经发生的事情。为了有效地创建事件，必须确保它们满足当时生效的业务规则。


  在本书描述的系统中，有一个单一的命令处理器，它串行处理事件。这是一种权衡，其他事件溯源的实现可能不会选择这样做。我认为单一的命令处理器可以简化系统，尤其是在早期阶段。这是一个可以推迟的决策。如果单个命令处理器无法跟上传入命令的速度，那么存在一条通往并行化的路径。然而，在走这条路时必须小心，因为系统中的某些约束将更难执行。对于许多业务应用程序所运行的规模，我认为更简单的解决方案更可取。我倾向于在必要时才引入复杂性，但同时要提前考虑如何处理它，以免在设计上排除这种可能性。




  ## 需求


  命令和事件各自是一种消息类型。在前一章中，我解释了按顺序排列的事件集合被称为事件日志。由此可以推论，对于任何类型的消息，其泛化形式可称为消息日志。


  命令处理器接收命令作为输入，并为每条命令输出零个或多个事件。为简化该组件的操作，命令将从消息日志（即命令日志）中接收。关于写入命令日志的更多细节将在下一章中作为命令生成器的一部分进行说明。就命令处理器和本章而言，命令日志是等待处理的有序命令集合。


  将命令存储到命令日志中的这一做法，毫不意外地被称为命令溯源。在本书的系统中，我将这两种实践结合起来。命令被溯源以生成事件，而事件被溯源以生成系统的官方状态。从命令到事件的转换，类似于从命令日志到事件日志的映射函数。下一节关于构建核心循环的内容将进一步阐述这一概念。


  处理完命令后，系统并不需要特意保留该命令。虽然事件日志必须永久持久化，但已处理的命令可以被丢弃。然而，保留它们也有好处，本章后面的测试部分将对此进行探讨。


  命令处理器强制执行了我在第 5 章中描述的业务规则分类之一，即针对静态数据的规则。这是命令处理器的一项关键职责。对于该组件的拟议运行方式而言，事件的生成必须*无副作用*，这一点至关重要。副作用是业务规则的另一个独立类别，必须发生在事件生成之后，而不是作为生成过程的一部分。副作用有两种形式。通常想到的常见形式是通知的情况：发生了某些事情，我们需要通知另一个系统。这种形式类似于返回
  void 的函数；它是“即发即忘”。有时被忽视的副作用类别是那些查询其他状态源并从中返回某些内容的副作用。必须认识到，这些交互*同样*是副作用。命令代表改变系统状态的请求。为了准确表示，命令必须完整包含满足请求所需的*所有*信息。如果数据验证涉及命令处理器外部的状态，则该状态必须在命令生成阶段（而非命令处理阶段）被查询。


  这为命令处理器列出了一份简短的需求清单，我将在下一节中将其作为构建其处理循环的一部分：


  *   命令从命令日志中溯源。

  *   处理命令是从命令日志到事件日志的映射函数。

  *   映射函数必须无副作用。


  ## 构建核心循环


  将命令处理器视为一个循环是很有用的。给定一个命令和系统的当前状态，调用一个函数，该函数将这两个数据点作为输入，并返回一个新事件列表作为输出。当新命令到达时，重复此过程。命令日志为系统提供新命令，但当前状态从何而来？在像这样的事件溯源系统中，不存在单一的“当前状态”。状态的变更分散在事件日志中。为了处理命令，必须推导出“当前状态”的视图。


  由于命令处理器仅负责强制执行针对静态数据的业务规则，其对当前状态的视图只是事件中包含的所有信息的一个子集。其当前状态只需包含执行规则所必需的信息。


  消息日志是无限的流。对于事件日志，每个事件都意味着“当前状态”的一个新版本。为了实现这一点，我将使用流处理中的一个概念：`scan` 运算符。这是一种折叠函数。折叠函数是一种高阶函数，用于递归分析数据结构。你可能通过它在许多标准库中常见的名称
  `reduce` 熟悉这个概念。折叠函数需要两个输入：一个初始值，以及一个接受两个参数（数据结构中的一个元素和初始值）并生成下一个值的函数。该函数会为数据结构中的每个元素重复调用，一次调用的返回值成为下一次调用的初始值。当数据结构中的所有元素都处理完毕后，最终的返回值被用作折叠函数的返回值。


  计算整数列表的总和是折叠函数的一个例子。给定一个数字列表：


  ```

  [1,3,5,7,9]

  ```


  要计算总和，我们将按如下方式调用 `reduce` 函数：


  ```

  reduce([1,3,5,7,9], 0, (state, item) => state + item)

  ```


  `reduce` 的返回值将是 `25`。第三个参数是我们的“归约”函数。第一个参数是归约的状态，在处理列表的第一个元素时，它将是初始值 `0`。第二个参数是列表中的当前元素。展开
  `reduce` 执行的内部循环，类似于：


  ```

  reducer = (state, item) => state + item)

  result = 0

  result = reducer(result, 1) # result 为 1

  result = reducer(result, 3) # result 为 4

  result = reducer(result, 5) # result 为 9

  result = reducer(result, 7) # result 为 16

  result = reducer(result, 9) # result 为 25

  ```


  看到展开的形式，你可能会意识到 `scan` 所执行的技巧。由于 `scan` 是在流上操作，它可以基于 `result` 的增量值生成一个输出流。输出流以初始值开始，然后对于输入流中的每个元素，输出包含将归约函数应用于输出流的前一个元素加上输入流的下一个元素的结果。


  当应用于事件日志时，`scan` 可用于在每个事件之后推导出一个状态值。初始值是添加任何事件之前的系统状态。然后，归约器会使用先前的状态和下一个事件被调用。通过这种方式，事件日志被映射到一个系统状态流。




  核心循环现在可以用流处理的方式来表达。我们有两个流：命令日志和事件日志。事件日志可以通过 `scan` 操作映射成一个代表系统状态的流。这两个流，即状态流和命令流，然后可以被“拉链”在一起，形成一个事件流，也就是我们的事件日志！“拉链”是另一种流处理操作，其名称来源于你在衣物上找到的装置——拉链。物理拉链将它的两排齿“拉”在一起，从每一边各取一个齿，然后将它们连接起来。


  流处理中的 `zip` 操作是两个流的成对组合，它调用一个函数，该函数接收每个流中的一个元素，然后创建一个由这些返回值组成的新流。


  核心循环需要两个流处理原语，`zip` 和 `scan`，以及两个特定于我们领域的函数。从事件构建状态的函数被称为*应用器*，因为它将事件应用于当前状态。使用状态加命令来生成事件的函数被称为*变更器*，因为它通过命令来变更状态。


  鉴于我们要求这些函数没有副作用，它们是纯函数。纯函数是指给定相同的输入，总是返回相同输出的函数。纯函数非常易于测试，这是本章后面一节的重点。


  通过将核心循环表示为对消息流的操作，它符合我们的原则以及响应式系统的属性，即消息驱动。尽管核心逻辑很简单，但在处理故障场景时，还会增加一些额外的复杂性。


  ## 处理故障


  命令处理器有两个方面。第一个方面由两个特定于领域的函数组成：变更器和应用器。第二个方面是其他所有内容，即通过我们隐喻性管道连接流的底层基础设施。


  每个方面都是一个独立关注点。第一个方面是应用关注点，第二个方面是基础设施。通过分离这些关注点，每个方面都可以有适当的故障处理策略。


  ### 基础设施


  基础设施方面的故障处理是一个简单的策略。如果故障是可重试的，则重试该操作。如果故障不可重试，或者重试次数有限，则“向上游报告失败”，让编排命令处理器执行的任何组件来处理该故障。


  可能发生的故障类型很可能集中在 I/O 上——当读取作为处理器输入的命令和事件时，或者当向事件日志写入新事件时。如果用于生成事件的函数允许每个命令生成多个事件，则必须确保写入事件日志是事务性的。要么所有生成的事件都被写入，要么一个都不写入。如果事件日志不是事务性的，并且写入了多个事件，那么中途的故障会使系统处于不一致状态；该命令实际上被部分处理了，这是无效的。


  执行两个特定于领域函数之一时发生的故障*不是*基础设施故障。由于这些函数是纯函数，它们可以根据基础设施故障导致的重试需要进行重试。否则，它们需要单独处理，因为其故障的性质在类别上是不同的。


  ### 应用


  两个特定于领域函数之一的故障无法通过简单的重试来解决。由于这些函数是无状态的，故障表明输入存在问题或函数本身存在逻辑错误。这些函数产生的故障有两大类：与处理新命令相关的故障，或从现有事件构建状态时的故障。


  较简单的情况是从现有事件构建状态时的故障。从类别上讲，这不应该发生。由于现有事件是系统的真相，它们需要被如此看待。是的，由于先前的逻辑错误，它们可能包含某种“不良”信息，但这应被视为异常情况。派生状态的函数需要适当地处理这些事件。第
  12 章将讨论有助于最小化这种情况发生几率的测试技术。


  应用故障的其余情况则集中在命令的处理上。这里的故障是不同的，故障是*预期的*且*正常的*。每当一个命令会使系统进入违反静态数据规则的状态时，它就需要被拒绝。请记住，命令最终是改变系统状态的请求。该请求并非预先注定会成功。（正是在这里，术语“命令”的用法开始变得牵强。虽然命令是权威性的指令，但系统说“不”也是可以的）。


  命令将源自想要改变系统状态的人，很可能是用户。由于命令是请求，发起者想知道他们请求的处理结果。为了实现这一点，有必要将处理结果额外记录到另一个消息日志中，即已处理命令日志。已处理命令日志包含每个命令的条目，指示它是成功还是失败。提交命令后，可以监视此日志以确定命令是否成功。


  已处理命令日志在核心循环中也扮演着角色。此日志中的条目包含三部分数据：


  1.  指向命令日志中已处理命令的指针


  2.  命令的处理结果，指示它是成功还是失败


  3.  指向事件日志的指针，指示处理后最近的事件


  这些数据点是相关的，但用于不同的目的。指向命令日志的指针用于记录哪些命令已被处理。命令的处理结果允许命令的发起者观察结果。事件日志指针允许命令生成多个事件。


  我还没有明确提到命令生成多个事件。这是一个有用的实践，因为它允许事件比命令更细粒度，并且允许多个命令生成相同的事件。这样做的好处是针对事件日志的消费者。通过细粒度的事件，支持每个事件的逻辑可以更独立，事件之间的重叠最小化。命令生成多个事件给核心循环带来了一个难题。当我最初介绍核心循环时，我描述了事件日志将如何用于在每个事件之后生成一个状态，并且这些状态将与命令进行“拉链”处理。如果命令和事件之间存在一一对应关系，那么这种拉链处理过程是直接的；处理一个命令后，将生成一个新状态，该状态已准备好用于下一个命令。当命令生成多个事件时，将生成多个状态。循环如何知道哪个是正确的状态用于下一个命令？这就是事件日志指针的用途。派生的状态流与已处理命令日志连接，以对状态流进行采样，使其*仅*包含在命令生成的所有事件都被应用之后出现的状态。这允许在命令失败时重用状态；对于失败命令的已处理命令，将包含与先前已处理命令*相同的事件日志指针*，因为*没有新事件*。




  ### 执行业务规则


  对静态数据执行业务规则存在失败的可能。当构建命令处理器状态时，事件会被反复应用于该状态。每次应用事件时，都需要确保下一个事件不会产生无效状态。在提供给命令处理器的两个函数中，应用器是确保所有生成状态均有效的合适位置。对于事件日志中的事件，此函数应始终成功执行。如果执行失败，则表明系统存在错误。可能是事件被篡改，也可能是业务规则已更改，导致旧事件不再满足新规则。


  如果业务规则未更改，但根据现有事件生成状态失败，则需要操作员介入。如果业务规则*确实*发生了更改，则需要恰当记录该变更。我之前在第 6 章讨论过这一点。业务规则的变更发生在某个时间点。有必要将该变更*作为事件*记录下来。这样，根据事件生成状态的函数就能利用这个业务规则变更事件来调整其行为。


  在处理新命令时，必须确保其生成的事件满足业务规则。为避免重复执行业务规则，在调用修改器函数后，命令处理器还会使用应用器来确保：当预期事件应用于当前状态时，能够成功创建新状态而不会失败。


  在实践中，我发现大多数命令失败最终都发生在确保它们能够生成有效状态的过程中。如果命令是请求进行某项更改，那么由该命令生成的事件就是实现该更改所需的计划步骤。只有当这些事件成功应用于状态后，该计划才能被视为成功。


  作为处理命令的一部分，将事件应用于状态是*前瞻性*的。新生成的状态会被丢弃，因为用于下一条命令的状态将来自事件日志。之所以可行，是因为该函数没有副作用。


  与处理失败密切相关的是最小化意外场景。最好的方法是通过全面测试来实现。


  ## 如何进行测试


  我发现命令处理器中的关注点分离非常有利于测试。处理器接收两个函数，以便处理特定的命令和事件类型。这使得测试可以拆分为两部分：命令处理器本身的测试，以及领域特定函数的测试。


  ### 测试命令处理器


  命令处理器本身的机制应使用一个简单的领域进行测试，例如数字加法。命令可以表示为整数，即当前状态应等于的数字。然后，修改器可以生成一个事件，该事件是另一个整数，即必须加到当前状态上才能使其等于命令值的整数。应用器则是一个加法运算。可以添加一个简单的业务规则，例如状态值必须始终为奇数。


  通过使用简单的领域，就可以对命令处理器进行压力测试，观察它在各种失败场景下的行为。由于其操作方式可以用流处理来表达，如果实现使用了具备必要原语的库，那么测试主要就是确保库被正确使用，并且其他协作组件按预期组合。


  ### 测试你的代码


  需要测试两个函数：应用器和修改器。每个函数都可以独立测试，无需命令处理器。这是要求它们为纯函数所带来的好处。它们执行所需的所有信息都作为参数提供。


  对于应用器，每个事件至少应有一个测试，以确保对于有效事件，状态能按预期更新。在实践中，每个事件可能需要进行少量测试，以覆盖该变更所影响的业务规则。值得注意的是，除了业务规则约束检查外，应用器的实现应基本不包含条件逻辑。应用器是将事件应用于状态。事件是回顾性的，描述已经发生的事情。条件判断应仅用于确保已发生的事情是有效的。如果你发现自己编写了与检查业务规则约束无关的条件逻辑，这暗示该逻辑应属于修改器函数。


  修改器是包含分支决策逻辑的函数。修改器的输入是命令和当前状态，它返回一组事件来描述如何随时间推移推进状态。命令使用状态中包含的信息来指导其行为并更改返回的事件集，这是完全合理的。与应用器类似，每个命令至少应有一个测试。实际测试数量将根据给定命令在修改器内的分支逻辑而变化。穷举覆盖给定命令的所有可能场景是可行的。测试还可以确保：当向应用器提供事件以及与提供给修改器相同的状态时，命令返回的事件能够通过应用器的验证。可以不使用命令处理器本身来完成此操作，并且推荐这样做，因为命令处理器最终只是编排修改器和应用器的执行。


  在命令处理器上下文中测试这些函数将在第 12 章中介绍。


  还有一种额外的测试类型可以执行，即针对生产数据的回归测试。严格来说，命令日志中的命令在处理后无需保留。然而，保留命令允许在测试中使用它们。可以使用更新版本的修改器重新处理命令，以确保生成相同的事件。这是一种强大的技术，用于确保对系统逻辑进行大规模重构后，系统仍具有完全相同的行为。


  ## 总结


  命令处理器位于我们系统的核心，负责执行一些最重要的业务规则，即针对静态数据的规则。我已经解释了其运行原理的本质以及运行所需的条件。你已学习了如何考虑测试该组件，以及如何结合它来测试你的命令和事件。下一章将以同样的方式介绍命令生成器，它负责创建命令处理器所操作的那些命令。


  '
- "# 10. 命令生成器\n\n命令生成器是连接面向外部的 GraphQL 变更的请求/响应交互与应用程序内部消息传递世界的桥梁。在本章中，我将讨论 GraphQL\
  \ 变更如何与命令生成器交互，以及在设计命令和变更时如何在具体性和通用性之间取得平衡。我还将介绍如何构建命令，以使命令处理器的修改器函数成为纯函数，命令生成器如何失败以及如何补偿，最后是如何思考测试包含在这一层中的逻辑。让我们开始吧。\n\
  \n## 与 GraphQL 的交互\n\n命令生成器是使我们的 GraphQL 变更能够正常运行的逻辑组件。其行为可分解为以下三个步骤：\n\n1.  将 GraphQL\
  \ 变更的输入参数转换为命令。\n\n2.  将命令追加到命令日志中。\n\n3.  等待命令处理完成，并将处理结果作为变更的返回值返回。\n\n\n\n###\
  \ 从输入参数到命令\n\n在系统中，一个变更（mutation）代表一个单一事务。这源于命令处理器的行为——它一次只处理一个命令。有意省略了可能包含多个命令的“复合命令”所带来的额外复杂性。这种复杂性涉及是否允许复合命令嵌套，以及复合命令中命令数量的限制。虽然在某些情况下这种复杂性可能是合理的，但我认为创建符合系统用户需求的离散命令是一种更简单的方法。\n\
  \n单个 GraphQL 请求可能会调用多个变更，因为 GraphQL 允许调用者在查询和变更请求中请求多个字段。如果调用者使用此功能，每个变更将按照请求中指定的顺序依次处理。GraphQL\
  \ 规范不允许异步执行变更，因为这样很难推断变更的顺序。在实践中，我并未看到此功能被广泛用于变更，因为它在语义上等同于多个请求。GraphQL 规范对于单个请求中的多个变更应如何全部成功或全部失败没有规定。如果请求只调用一个变更，则更容易推断失败场景并在调用方进行管理。\n\
  \n在我们的系统中，一个变更最多生成一个命令。当你将变更映射到命令时，可能会发现一个命令在多个变更中被复用。我认为这是一件好事——在系统实现中保持通用性，同时暴露更具体的接口。命令的参数可能隐含在变更所描述的行为中。\n\
  \n在设计 GraphQL schema 时，考虑到 GraphQL 建模的限制，你应尽可能为输入指定尽可能多的非空约束。你可能会遇到的一个限制是输入类型缺乏联合类型。如果你有一个输入对象，希望调用者最多指定该类型的一个字段，则没有语言机制可以在\
  \ schema 中指示这一点。截至撰写本文时，GraphQL 规范有一个开放的 RFC，旨在为输入对象添加 `@oneOf` 指令，以支持输入对象的有限形式的多态性。\n\
  \n创建命令的第一步是对 schema 中无法表达的输入值执行额外的验证。这可能包括数字范围限制、字符串长度检查以及命令被视为“有效”所需的任何其他条件。在你的实现中，可以创建自定义指令，以便在\
  \ schema 中指定这些约束。这将使你的实现能够使用这些指令来驱动验证，同时在 schema 中起到描述作用。\n\n从概念上讲，命令“完全成型”所需的所有验证都是此步骤的一部分。此步骤中的验证仅是结构性的，类似于填写表单的所有字段，而不考虑这些值在语义上是否正确。正如调用者在调用时填写了变更参数的所有字段一样，命令生成器需要在将命令追加到命令日志之前创建一个完整的命令。命令被添加到日志后，系统将没有机会调整命令所隐含的内容。\n\
  \nGraphQL 社区通常建议让变更尽可能具体。这条建议的关键部分是*尽可能*。一个极端是使用一个单一的变更来处理任何场景的 schema。我希望这听起来至少令人困惑，理想情况下是毫无意义的。这样的\
  \ schema 需要大量文档来说明如何针对特定场景调用它。社区指南的意图是让 schema 本身对变更具有自文档性。通过拥有具体的变更，变更名称本身就指示了它将执行的操作。\n\
  \n在创建 GraphQL schema 时，我首先让所有变更尽可能具体，并在生成的命令中反映这种具体性。然后，随着调用者开始了解 schema 如何融入他们的工作流程，可能会出现某些变更范围需要扩大的情况。\n\
  \n例如，考虑以下两个变更（暂时忽略它们的返回值）：\n\n```\ninput CreateCustomerInput {\nname: String!\n\
  }\ninput UpdateCustomerRegionInput {\ncustomerId: ID!\nregionId: ID!\n}\ntype Mutation\
  \ {\ncreateCustomer(input: CreateCustomerInput!): Boolean\nupdateCustomerRegion(input:\
  \ UpdateCustomerRegionInput!): Boolean\n}\n```\n\n在这个假设的系统中，存在属于区域的客户。新创建的客户在分配区域之前没有关联区域。在实践中，创建客户的用户界面流程总是在创建客户后调用\
  \ `updateCustomerRegion`。因此，向 `CreateCustomerInput` 类型添加一个可选的 `regionId` 是合理的，从而为调用者提供更简单的交互模式。我所支持的就是这种基于实际用例驱动的通用化变更。任何通用化的目标都应是解决\
  \ schema 用户的实际痛点。这应与具体性的目标相平衡，以避免调用者与实现之间的耦合。理论上，具体的变更允许调用者按照他们认为合适的方式组合他们的流程。\n\
  \n\n\n### 追加到命令日志\n\n命令创建后，需要追加到命令日志中，以便命令处理引擎对其执行操作。正是在这里确定了命令的顺序。如果系统同时收到两个变更请求，它们被追加到命令日志的顺序将决定它们被处理的顺序。\n\
  \n追加命令的操作也是执行另一项验证（即拒绝重复请求）的机会。设想一个场景：调用方发送了一个变更请求，但随后遇到网络中断，无法收到响应。调用方如何确保其请求已被处理？如果调用方重新发送请求，该请求可能带来的副作用将是不希望重复的。我们需要一种机制来允许客户端请求是*幂等*的。严格按部就班的幂等性对于变更操作是不可行的，因为变更的意图就是产生副作用。多次调用同一个变更以触发多次副作用，这是一个有效的场景。为了处理这两种情况（有意和无意地重复变更），我们将为每个变更引入一个新参数：客户端请求标识符。\n\
  \n客户端请求标识符，缩写为`requestId`，是一个对于每个逻辑请求都唯一的值。如果客户端打算调用一个变更五次，他们需要提供五个不同的 ID。然而，如果客户端调用了一个变更但遇到网络中断，不确定系统是否已接受该请求，他们应该使用*相同*的\
  \ ID 重新发送请求。\n\n检查`requestId`是否之前已被观察到的理想位置，是在尝试将命令追加到命令日志时。通过让命令日志也跟踪已观察到的 ID 集合，可以检测到重复请求。\n\
  \n如果检测到重复请求，系统应如何表现？我倾向于将其视为重复请求的失败。调用方知道他们是否重试了请求。如果重试的请求因为`requestId`已被使用而失败，调用方有上下文来理解发生了什么。如果这个失败发生在调用方没有重复的请求上，那就说明有其他问题需要调查。可能是系统中存在逻辑错误，或者跨客户端生成的\
  \ ID 不够唯一。\n\n如果观察到了预期的重复请求，调用方如何得知原始请求的处理结果？`requestId`是一个唯一标识符，可用于查找先前的处理结果。我偏好的机制是提供一个查询，可以调用该查询来返回任何先前`requestId`的处理结果。另一种方案是让重复请求返回成功情况的一个变体，即“此请求已被执行”。这种情况发生的频率可能会指导你的选择。对于通常由位置相对固定的用户使用的业务应用，与在移动设备上使用的业务应用相比，因网络中断导致的重复请求会更少见。\n\
  \n### 返回变更结果\n\n变更流程的最后一步是将变更结果返回给调用方。成功将命令追加到命令日志后，该命令将对命令处理器可见。如前一章所述，还有一个额外的消息日志，即已处理命令日志，它直接将命令与其结果关联起来。将临时订阅此消息日志以观察变更结果。\n\
  \n这里有一个*关键*的时间点细节。你的代码需要在将命令追加到命令日志*之前*订阅已处理命令日志。如果顺序颠倒，你可能会在已处理命令日志订阅激活之前，因命令处理器已完成处理而错过该事件。\n\
  \n已处理命令日志包含所有命令的结果。我们需要一种机制来过滤出我们追加的命令的结果。与调用方的交互是一种请求/响应交互，这与命令处理引擎使用的模式相同。然而，对于命令处理引擎，它是间接的，因为我们是在一个消息日志上追加，而在另一个消息日志上观察结果。我的解决方案是使用信封模式。\n\
  \n信封模式是指将你的消息包裹在信封中，就像通过邮政服务寄信一样。命令日志不包含命令，它包含的是包裹在信封中的命令。当命令处理器处理一个命令并追加到已处理命令日志时，它会*重用*命令到达时所用的信封。由于命令和已处理命令之间存在一对一的关系，这是一个直接的操作。在事件日志中重用信封会更棘手，因为一个命令可以生成多个事件。那样我们就需要制定策略来安全地复制信封，这是我希望尽可能避免的复杂性。\n\
  \n有了信封模式，命令生成器可以在将命令追加到命令日志之前，在信封上放置一个唯一标识符（例如 UUID）。然后，已处理命令日志的结果可以通过此标识符进行过滤，以找到与我们的命令相对应的已处理命令。这是一个与`requestId`不同的值，它在系统内是全局唯一的。它标识一个特定的命令，即使该命令由于`requestId`的重复使用而成为逻辑上的重复命令。\n\
  \n一个已处理命令包含：与我们的命令对应的序列号、任何生成事件的最大序列号，以及命令的结果（成功或失败）。这些信息将用于构建变更结果。\n\n失败将通过 GraphQL\
  \ 模式中的类型传达给调用方，而不是使用 GraphQL 的错误机制。这是因为 GraphQL 中的错误是*无类型*的。GraphQL 规范定义了错误在响应中如何呈现，但没有提供描述其结构的工具。我将此视为一种引导机制。变更失败最终需要传达给用户。作为一个业务应用，有些变更会失败，因为该更改会违反系统的业务规则。当这种情况发生时，向用户传达尽可能多的违规细节至关重要，以便他们理解违规的性质并可以修正输入。\n\
  \n我倾向于将变更的返回类型结构化为成功和失败的联合类型：\n\n```\nunion MutationResult = MutationSuccess | MutationFailed\n\
  ```\n\n`MutationFailed`类型是一个容器，用于保存额外的细节。就像你的数据在 GraphQL 模式中被建模一样，你的业务规则可能被违反的方式也应该在模式中被建模。\n\
  \n我偏好的机制是：使用一个枚举来指示错误类别，然后使用一个字段来实现一个包含更具体细节的接口。回想一下本章前面的例子：\n\n\n```graphql\ninput\
  \ CreateCustomerInput {\n  name: String!\n}\ninput UpdateCustomerRegionInput {\n\
  \  customerId: ID!\n  regionId: ID!\n}\ntype Mutation {\n  createCustomer(input:\
  \ CreateCustomerInput!): Boolean\n  updateCustomerRegion(input: UpdateCustomerRegionInput!):\
  \ Boolean\n}\n```\n\n与其返回一个 `Boolean`，不如将其结构化为如下形式：\n\n```graphql\nenum MutationFailureCode\
  \ {\n  DUPLICATE_REQUEST_ID\n  BUSINESS_RULE_VIOLATION\n  UNKNOWN\n}\ninterface\
  \ MutationFailureDetails {\n  message: String\n}\ntype GenericMutationFailureDetails\
  \ implements MutationFailureDetails {\n  message: String\n}\ntype InvalidCustomerName\
  \ implements MutationFailureDetails {\n  message: String\n}\ntype MutationFailed\
  \ {\n  code: MutationFailureCode!\n  details: MutationFailureDetails\n}\nunion MutationResult\
  \ = MutationSuccess | MutationFailed\ninput CreateCustomerInput {\n  name: String!\n\
  }\ntype Mutation {\n  createCustomer(input: CreateCustomerInput!): MutationResult\n\
  }\n```\n\n在这个例子中，关于新客户名称存在一些业务规则。为了在违反这些规则时通知调用方，我们使用了特定的 `InvalidCustomerName`\
  \ 类型。我还为 `MutationFailureCode` 枚举添加了一个值 `DUPLICATE_REQUEST_ID`。此代码可用于标识重复的 `requestId`\
  \ 值，这是本章前面讨论过的一个主题。\n\n当变更操作成功处理命令时，只需要返回一条信息：最终事件的序列号。这便产生了一个简单的 `MutationSuccess`\
  \ 类型：\n\n```graphql\ntype MutationSuccess {\n  visibleAsOfRevision: Int!\n}\n```\n\
  \n这种模式与其他关于如何设计 GraphQL 变更的建议有所不同。这是有意为之，因为我们的系统是一个事件驱动系统。命令的成功处理*并不*意味着视图已经更新；那是事件物化器的职责，也是下一章的主题。\n\
  \n这*确实*意味着系统的最终一致性本质暴露在了外部。我相信这其中蕴含着力量。设计原则之一是实现实时的 UI 更新。使用 GraphQL 时，这可以通过 GraphQL\
  \ 的订阅机制来实现。如果调用方有一个活跃的订阅，然后提交了一个变更，则无需在直接响应变更时反映任何数据更改。当视图更新后，已建立的订阅将传递这些更改。通过在视图模型中包含事件序列号，调用方可以将这些值与\
  \ `visibleAsOfRevision` 变更结果进行比较，从而了解变更何时已被纳入视图。\n\n## 命令与其他必需数据\n\n变更的输入可能并不总是包含构建命令所需的全部信息。由于命令处理器的变更函数必须是纯函数，任何额外的处理都需要在创建命令并将其提交处理之前进行。\n\
  \n提交命令之前执行的工作应该是可安全重试的。如果网络中断，客户端可能会重新提交变更，导致命令创建过程中执行的任何工作被重新执行。\n\n这个阶段应被视为对接收到的数据进行丰富，以满足第一类业务规则（即针对静态数据的规则）。任何业务规则的副作用都应在命令成功处理之后发生。\n\
  \n例如，考虑一个接受表格数据的变更。一种方法是使用输入对象数组将数据分解为行和列。但是，如果数据是由用户在电子表格中编写的呢？让用户将电子表格上传到系统并由系统提取表格数据可能更有意义。该提取将作为命令生成的一部分发生。\n\
  \n另一个例子是文件上传，其中文件的内容与系统无关。命令生成器可以接收文件并将其内容存储到对象存储中，例如 Amazon 的 S3。然后，命令仅包含对对象存储的引用。\n\
  \n## 处理失败\n\n命令生成和提交可能因多种方式失败。我在本章中已经提到了其中两种：对 GraphQL 模式中无法表达的约束进行输入验证，以及客户端提供的幂等令牌\
  \ `requestId`。\n\n根据输入参数创建命令的失败机会将取决于过程的性质和复杂性。除了处理无效输入外，失败很可能源于实现中的软件错误，测试可以帮助缓解这些问题。\n\
  \n如果命令日志无法接受写入，则将新命令追加到命令日志可能会失败。这种失败应作为系统不可用的情况进行传达，以便客户端可以重试其请求。\n\n还有两种情况我们可能希望主动引发失败：乐观锁的实现和超时。\n\
  \n### 乐观锁\n\n在对数据进行更改时，用户知道当前状态。这在多用户系统中会失效。如果两个用户同时更改同一份数据会怎样？在我们的系统中，其命令第二个被追加到命令日志的用户将“获胜”。第一个更改并未“丢失”，因为事件会持久化在事件日志中。当这种情况发生时，对于进行第一个更改的用户来说将是意外的，因为他们如果知道第二个更改，可能会采取不同的操作（反之亦然）。幸运的是，在我们的系统中有一个直接的解决方案：乐观锁。\n\
  \n乐观锁的前提是通过跟踪数据是否同时被修改来避免对排他锁的需求。在我们基于请求/响应的系统中，我们需要一个调用方可以为其变更提供的值，以便系统能够确定数据是否已被更改。我们可以使用事件日志轻松地为我们的系统生成这样一个值。它已经是顺序的，这是其正确性的一个基本属性。每个事件都会被分配一个递增的数字，即序列号。然后，你提供给命令处理器的函数可以利用这个值。当应用函数将事件应用于状态以产生新状态时，它也可以将事件的序列号存储在状态中。你的事件物化器（将在下一章中描述）可以使此序列号在你的\
  \ GraphQL 模式中可见。这将允许调用方知道模式中某条数据的最后修改版本（内部是序列号）。然后，此版本号可以作为另一个输入参数传递给变更，以指示用户在做出更改时所查看的版本。从变更的角度来看，更改是“基于”特定版本进行的。它可以作为“基于版本”存储在命令的信封中。最后，命令处理器中的变更函数可以利用此值来检查相关状态是否具有比提供的基于版本更大的序列值。\n\
  \n此检查可以根据你系统的需要，可以是粗粒度的，也可以是细粒度的。你也可以强制客户端使用它，或者允许其检查是可选的。如果此检查失败，则是一个主动引发的失败。将这些失败与其他失败区分开来对调用方很重要，因为需要用户干预来确定下一步的行动方案。用户可能会决定使用更新的基于版本重新提交其变更，或者他们可能完全放弃更改。\n\
  \n\n### 超时\n\n在像这样的最终一致性系统中，防止“最终”变成遥遥无期至关重要。系统的用户看重确定性的响应时间，即使响应是失败。虽然我们无法预防所有可能发生的故障，但可以通过使用超时来提供有界的等待时间。这确保了响应能力，这是我在第\
  \ 3 章中讨论过的一个原则。\n\n在命令生成器中有两个地方需要实施超时：提交命令和等待命令处理器对命令的处理结果。向调用者区分这两种失败是有益的，因为针对每种情况，他们需要执行的补偿操作是不同的。\n\
  \n如果在等待命令处理器时发生超时，我们知道命令已成功提交。如何处理这种失败取决于你观察到它的频率以及将其呈现给用户的重要性。这里简单的解决方案是不做任何补偿。是的，发生了超时，但系统最终能够恢复并处理该变更。如果调用者最终是系统的人类用户，他们可能已经继续他们的工作，而观察到变更就足以让他们决定是否手动重试。如果该变更是由另一个系统执行的，或者它是需要用户明确观察成功的工作流的一部分，那么就需要更复杂的方法。`requestId`\
  \ 值将用于添加一个新的 GraphQL 查询，该查询返回请求的 `MutationResult`。我在本章前面提到过，放置命令的信封可以重复用于最终处理过的命令。这意味着\
  \ `requestId` 在处理过的命令上也是可用的。前面描述的快乐路径是使用命令信封上每个命令唯一的值来过滤已处理的命令。由于处理过的命令信封也将包含 `requestId`，因此已处理的命令也可以通过此值进行过滤。然后客户端可以轮询这个新查询来观察命令的处理结果。这个新查询也应该有一个超时，因此调用者需要准备好必要时进行重试。另一种方法是使用\
  \ GraphQL 订阅。订阅签名将与查询相同。使用订阅的好处是，当连接处于静默状态时，订阅的传输机制可能具有保活机制，允许调用者区分是正在等待响应还是系统无响应。\n\
  \n对于提交命令时的超时，调用者将不知道提交是否成功。本章前面讨论过这个问题的解决方案，即 `requestId`。调用者可以再次调用变更操作，并提供相同的 `requestId`\
  \ 值。这次后续尝试的结果将提供关于第一次尝试的信息。如果尝试成功，则先前的命令未被成功提交。如果尝试因 `requestId` 重复而失败，则调用者知道先前的命令已成功提交。\n\
  \n命令提交超时后，由于 `requestId` 已被使用而导致失败，这意味着命令*确实*已成功提交。在这种情况下，调用者可以使用我描述的处理超时的相同机制来确定命令的处理结果。\n\
  \n## 测试命令生成器\n\n命令生成器可以分为两部分来考虑。首先，是用于命令提交和等待命令处理器结果的通用基础设施；其次，是将变更输入转换为命令的领域逻辑，即命令的创建。\n\
  \n### 命令提交\n\n提交命令并等待处理结果的行为是一种与领域逻辑分离的机械性操作。我喜欢这样的过程，因为它们实现了应用程序基础设施与业务规则之间的关注点分离。此过程的规则严格且有限。只有一条输入数据有规则，即\
  \ `requestId`。\n\n在为此过程编写测试时，我喜欢使用来自一个与当前业务问题无关的虚构领域的命令。这确保了对领域类型的更改不会对我的代码库的这一部分产生任何影响，而且作为额外的好处，还提供了一个找点乐子的机会。我经常通过使用与我的宠物相关的例子来个性化我的测试。对于命令提交，测试中使用的命令可能与领养新宠物有关，通常使用我多年来养过的宠物的名字和类型。\n\
  \n在测试命令提交时，我会为提交命令和过滤已处理命令编写一个快乐路径测试。我不会为这些测试使用真实的命令处理引擎，而是使用我可以在测试中控制的桩实例。我重视创建代表系统这些组件之间\
  \ API 契约的接口。使用 API 接口的桩实现，既强化了系统这些组件之间的关注点分离，也加强了对它们之间耦合的严格控制。\n\n测试此过程的失败模式也很重要。你创建的桩实现应该支持故障注入，以便你可以确保系统在发生故障时能按预期运行。快乐路径测试将在第\
  \ 12 章描述的测试中得到充分演练。那些测试不太可能暴露在生产环境中可能观察到的失败模式，而确保调用者在面对失败时有良好的体验，对于提供一个响应迅速且有弹性的系统至关重要。\n\
  \n\n\n### 命令创建\n\n每个 GraphQL 变更（mutation）*可能*都需要创建一个测试，以确保它能生成预期的命令。老实说，我倾向于不编写这些测试，而是让这种快乐路径验证作为我将在第\
  \ 12 章描述的综合系统测试的一部分。在大多数情况下，这里执行的逻辑将是从变更的输入参数到命令的直接转换。\n\n真正值得测试的是对无效输入的处理，以及任何其生成过程涉及访问可能导致自身故障的外部系统的命令。\n\
  \nGraphQL 模式中定义的每个特定错误类型，都应该有一个测试来确保它在预期情况下被生成。这些测试应模拟系统调用者的体验。这意味着测试可能不会直接调用命令创建过程。相反，它们通过向\
  \ GraphQL 端点输入一个将执行命令创建的输入，并断言预期的 GraphQL 响应，来间接调用此过程。我认为这是在确保代码行为符合预期、验证调用者体验符合预期以及不过度编写测试之间取得的一个务实平衡。如果用于将输入转换为命令的底层函数已经过测试，仍然需要确保命令创建失败能正确传达给调用者。我倾向于编写测试来获得对系统的必要信心，而从\
  \ GraphQL 层测试命令创建能给我这种信心。\n\n一个例外是依赖于外部系统的命令创建，在这种情况下我需要在测试中注入故障。如果创建命令需要与另一个系统通信，那就存在发生故障的可能性。为了保持系统的响应能力，我们需要限制外部通信的执行时间。这意味着对任何调用设置超时，并决定是否应执行重试，或者将故障传递给我们的调用者，让他们决定何时重试。这些策略的具体细节将取决于你系统的需求。除了确保系统响应能力这一通用规则之外，并没有严格且快速的规则来规定具体该做什么。\n\
  \n## 总结\n\n现在你明白了命令生成器是如何成为 GraphQL 变更和命令处理器之间的桥梁的。它负责收集必要的信息来创建一个完整的命令，这是一个关键步骤，它使得命令处理器的变更函数能够保持无状态和纯粹。你也了解了如何开始确定命令的适当粒度，以及对该组件进行何种级别的特定测试是合适的。由于命令生成器仅在成功变更时返回一个序列号，下一章关于事件物化器的内容将成为命令处理器事件与用于支持\
  \ GraphQL 查询和订阅的视图之间的桥梁，以便调用者能够看到他们变更的效果。\n\n"
- '# 11. 事件物化器


  事件物化器负责维护一个有状态的视图模型，该模型将用于满足 GraphQL 查询和订阅。在本章中，我将讨论该组件如何消费来自我们系统事件日志的数据，并且也可以消费来自协作系统的事件流。我还将描述这种视图维护方法如何能够直接实现
  GraphQL 订阅。我将讨论事件物化器可能如何失败，以及如何对其进行测试以最小化这些故障的发生。


  ## 定义视图模型


  事件物化器维护的视图模型存在的目的是为了满足 GraphQL 请求。我们可以利用这种特异性来为我们在 GraphQL 模式中定义的查询定制模型。更具体地说，存储在视图模型中的状态形状应该能够非常直接地传递给你的
  GraphQL 引擎，只需最少的转换。如果你的模式中为了调用者易用性而反规范化了数据，那么在存储模型中也应将其反规范化。


  在第 5 章中，我讨论了业务规则，其中一种类型是可派生数据。在可能的情况下，优先预先计算这些派生数据，而不是为每个请求按需计算。一次性完成工作可以带来效率提升。系统将能够支持更多的查询，因为每个查询的计算成本更低。可以保留中间输出用于增量计算，也可以随着输入的变化存储不同版本的结果。后者对于调试很有价值。如果知道请求的时间，就有可能确定返回的数据而无需重新计算。


  事件应包含来源信息、生成时间、提交产生该事件的命令的用户身份，以及在你的领域中可能有用的其他元数据。在物化视图模型时，可以将这些信息放置在适当的位置，以告知用户谁最后接触了某条数据。事件的序列号也可以类似地使用。在上一章中，我提到向变更传递一个
  `asOfRevision` 值，以支持命令处理器中的乐观锁。考虑在你的领域中，更细粒度的乐观锁是否合适，并在你的模式中包含修订号。


  在我的工作中，我喜欢创建一个可重用的 GraphQL 类型，其中既包含来源信息也包含修订号。不幸的是，GraphQL 中还没有一个正式的 `DateTime`
  标量，但有一个开放的提案。


  不要过度追求模型的未来适应性。将视图模型视为临时的。我们系统的权威状态存储在事件日志中。如有必要，可以重新创建视图模型，我将在本章后面更深入地讨论这个主题。


  虽然我主要讨论的是用于 GraphQL 的模型，但如果你需要同时支持其他 RPC 方法，请考虑在你的服务中拥有多个事件物化器实例，每个实例维护一个定制的视图。


  ## 事件物化器行为


  事件物化器的行为很直接。它从事件日志中消费新事件，并为每个事件调用一个函数来更新有状态的视图。你的视图可以完全是临时的，为每个应用程序实例维护在内存中。在实践中，我相信你最终会使用某种外部状态存储。在为一个事件更新视图后，它接着处理下一个事件。*至关重要的是*，事件必须按顺序处理，否则视图的状态将会损坏。


  ### 事务


  我*强烈*建议使用事务性存储。在前一节中，我鼓励在视图模型中使用反规范化。单个事件可能涉及更新多条数据，而你系统的调用者应始终看到一致的状态。他们不应该能够读取部分物化的事件。


  还可以提供额外的一致性保证，即视图相对于某个命令是一致的。在第 9 章中，当我描述命令处理器时，我引入了一个数据侧通道，即已处理命令日志。已处理命令日志包含每个命令的一个事件，该事件有一个指向处理该命令所创建的最新事件的指针。可以利用这个信息将事件日志窗口化为与产生每个批次的命令相对应的批次。然后，每个批次就是事件物化器的一个事务边界。这确保了系统的读取操作始终遇到在每个变更结束时一致的状态。




  ### 一致性


  事件物化器维护着一个有状态的视图。如果系统需要重启，它必须存储关于最后物化事件的元数据，否则它会重新处理事件并损坏视图。此状态应作为视图内的一个附加结构进行存储。我使用术语*检查点*来指代此状态。检查点将包含最近物化的事件序列号，并在事件物化时以事务方式更新。当系统重启时，它将使用此序列号来确定从何处开始重新消费事件日志。


  检查点还可用于为变更操作提供写后读一致性。在第 10 章中，我描述了成功的变更操作如何仅产生一个单一值，即最终事件的序列号。此序列号随后可作为 GraphQL
  查询的可选参数，用于指示事件物化器必须至少已物化到此事件。


  需要注意的是，这仅适用于已执行变更操作的调用方。只有他们知道系统状态已更改，因此也只有他们知道自己应等待系统执行操作。这种行为是最终一致性，这是我在第 6 章讨论时间时探讨过的主题。如果来自两个不同调用方的变更操作和查询请求先后到达，则查询不保证能看到变更操作的结果，因为该变更可能仍在命令处理器和事件物化器中处理。如果这两个调用方协同工作，则他们有责任将变更方的
  `visibleAsOfRevision` 共享给查询方。这虽然是额外的工作，但同时也明确了这两个调用方之间的耦合关系。我相信从长远来看，组合系统中的依赖关系会得到更好的暴露，从而有助于可维护性。如果这个认识令人不安，可以考虑如何从架构上将其从调用方中消除。


  ### 多数据源


  虽然事件物化器的主要输入是我们系统的事件日志，但在计算派生数据时，有时需要使用来自其他系统的数据。


  在第 9 章描述命令处理引擎时，我提到我们事件日志的泛化形式是消息日志。事件物化器不必局限于消费我们系统的事件日志。它可以被泛化，以消费来自任何消息日志的数据。


  有一类业务规则涉及显示逻辑，这是我在第 5 章中介绍过的。如果显示逻辑需要来自另一个系统的信息，并且该系统的数据可以表示为消息日志，那么将其与我们的事件物化器集成就会变得直接。这也符合响应式系统的一个特性，即消息驱动。


  具有单一事件日志源的事件物化器遵循以下循环：


  1.  从事件日志中获取下一个事件。

  2.  调用物化函数，用该事件更新有状态视图。

  3.  用该事件的序列号更新检查点。

  4.  返回步骤一。


  为了将其泛化以支持多个数据源，需要一种机制来知道事件源自哪个事件日志，以便为每个源维护一个检查点。为了保持事件物化器的顺序性，它正在消费的所有事件日志应该被合并。从事件物化器的角度来看，它将物化的事件流可以按源事件日志进行分区。在此上下文中，一个合理的命名是将每个事件日志视为事件物化器的一个**分区**。在进入事件物化器之前，每个事件都应被增强，以包含其来源的分区信息。然后，检查点组件将使用此信息来跟踪每个分区的检查点。当系统重启时，每个分区的检查点可以正确地恢复对每个事件日志的消费。


  当合并多个事件日志时，事件将根据其到达时间交错排列。我们维护有状态视图的显示逻辑代码需要得出相同的结果，而与到达顺序无关。


  与在请求时维护派生数据相比，在物化时维护派生数据也提高了我们系统的响应能力和弹性。我们的系统响应更快，因为数据派生所需的时间仅在事件物化时发生一次，而不是作为服务请求时间的一部分。通过在事件物化时消费外部数据，我们还从我们系统的响应时间中消除了外部系统响应时间的可变性。我们系统的弹性也得到了增强。与另一个系统通信失败不会影响我们系统服务读取请求的能力。它也不会影响事件物化过程，因为这将表现为接收新事件的一段静默期。


  我发现这种从外部系统消费数据的模式非常强大。我的理想是拥有一组都像我们系统一样实现的系统。代表外部系统的消息日志可以是一个 GraphQL 订阅（我将在本章后面讨论的一种机制），用于宣布该系统的有状态视图的变更。它也可以是该系统事件日志的一个版本，理想情况下，该版本已将事件映射为一种在系统间作为契约而持久的格式。


  也可以使用此范式与请求/响应式系统集成。外部事件日志的实现可以在后台向其他系统发起请求，并将其结果呈现为事件日志。同样，这是一种弹性的集成方式，因为通信延迟和故障不会影响事件物化器。




  ## 演进视图模型


  在本章前面部分，我介绍了为不同消费者维护不同视图而使用多个事件物化器的概念。同样的思路也可以扩展到支持单个视图的演进。回顾一下，视图模型应被视为临时性的，因为状态的权威存储是事件日志。这意味着破坏性的模式变更并非我们系统的限制。事件物化器可以“回滚”到事件日志的起始位置，从而完全重建视图。


  在介绍第 4 章的响应式原则时，关于弹性，我提到部署总会使系统暂时进入非预期的状态。要么是运行的实例数少于预期（如果在启动新实例前停止所有旧实例），要么是实例数多于预期（如果先启动新实例，待旧实例能处理请求后再停止它们）。


  正是后一种状态（运行更多实例）类似于拥有多个事件物化器。新旧版本的事件物化器可以同时运行！包含向后不兼容视图模型变更的新版本代码，可以将其有状态视图存储到新位置。这带来了多重好处。首先，在新代码重建视图期间，旧版本代码可以继续处理请求。其次，如果新代码出现意外问题，由于先前代码使用的视图保持不变，部署可以安全回滚。


  要安全使用此技术，关键在于将新增事件的变更与破坏性视图模型变更分开处理。如果新代码库处理命令时产生了旧系统无法处理的事件，那么回滚将无法实现。


  在第 2 章描述的原地修改型系统中，向后不兼容的模式变更管理起来非常棘手。从表中删除列是不可逆的操作；必须从备份中恢复数据库本身。有经验的开发者会回避向后不兼容的变更，因为处理过此类问题的经历让他们深知其风险之高。即使是可逆的变更（例如更改列的数据类型）也可能难以管理。数据库模式管理通常与应用程序代码库集成。系统启动时，会执行任何必要的正向迁移。如果代码回滚，旧版本代码不知道如何撤销新版本所做的更改。这就需要单独运行回滚脚本来逆转迁移。单独运行脚本的风险在于，这种操作不太可能频繁执行，从而在需要回滚变更的压力下正确执行增加了额外风险。这最终成为另一个论据，说明为何要按我描述的方式将业务应用程序构建为响应式系统。我所描述的结构和实践引导开发者走向降低风险的做法。


  ## 向他人传达变更


  业务应用程序并非孤立存在。虽然它们作为所管理信息的真实来源，但应用程序也需要与其他系统协作。这可能是通过应用程序用户界面与人类协作，或是与其他软件系统协作。无论哪种情况，系统都应能够*主动*传达变更。我所阐述的架构描述了一个能够感知数据何时发生变化的系统。这旨在有效向他人传达这些变更。这种沟通分为两大类。第一类是向可能受益的各方传达系统内部的状态变更。第二类是一类业务规则（副作用），明确涉及我们自身系统之外的状态变更。




  ### GraphQL 订阅


  我们系统在第 7 章中自我施加的一个约束是支持实时用户界面的能力。之所以存在这个约束，是因为我认为将这种能力引入业务应用以满足用户对软件系统行为的期望至关重要。事件物化器为系统的
  GraphQL 端点维护了一个有状态视图。每次物化事件后，都有机会传达发生了什么变化。


  GraphQL 订阅是一种传输事件的通用机制。GraphQL 规范并未定义订阅流的任何语义，仅说明它是字段返回类型的一个序列。


  我喜欢使用的模式被称为*实时查询*模式。GraphQL 社区内一直断断续续地讨论着如何通过使用查询上的 `@live` 指令来正式化这种模式。其结果将与我描述的一致。


  我设计我的 GraphQL 模式时，使得订阅和查询之间的类型可以共享，如下所示：


  ```

  type Customer {

  id: ID!

  name: String

  }

  type Query {

  customerById(id: ID!): Customer

  }

  type Subscription {

  customerById(id: ID!): Customer

  }

  ```


  这个简短的 GraphQL 模式片段定义了一个 `Customer` 类型和一个用于访问状态快照的查询 `customerById`。它还定义了一个同名的订阅字段，复用了相同的类型。


  查询行为是直接的 GraphQL；请求查询字段将在单个响应中返回客户的当前状态。不幸的是，GraphQL 模式不包含定义订阅语义的信息（这也是 `@live`
  指令存在的部分原因）。对于实现实时查询模式的订阅，订阅调用者将收到当前状态的快照。当请求的数据发生更改时，将发送额外的快照。订阅是无限的；如果查询结果存在，订阅将继续随着查询结果的变化而更新。


  从概念上讲，我们系统中代表变化的事件流，由事件物化器物化为一个有状态视图。当这个有状态视图发生变化时，订阅允许以一系列状态的形式观察这些变化。


  我发现这种通信范式与用户界面配合得很好。UI 通常显示完整状态，并在每次底层变化时传达完整状态，这简化了它们的实现。作为实现说明，每次订阅更新都传达完整状态的语义，并不意味着底层传输需要在每次更新时发送完整状态。订阅是有状态的，因此实现可以通过仅传达更新之间的差异来优化网络层。这种优化可以存在于传输层，为开发者提供每次都能传达完整状态的假象。


  订阅的使用并不仅限于 UI。可能还有其他协作系统需要使用我们系统的状态。它们也可以使用 GraphQL 订阅来访问我们系统的变化。当协作系统只需要了解状态变化，而不关心*为什么*会有状态变化时，这种方式效果最佳。如果协作系统需要知道原因，那么这种交互可能更适合被视为我们系统的副作用。如果可能，为
  UI 和协作系统使用相同的机制，有助于限制我们系统拥有的外部契约数量。这里需要找到一个平衡点。作为开发者，限制外部契约的数量可以减少进行更改时所需的工作量。与此相矛盾的是，在进行更改时需要与更多方进行协调。平衡点在哪里并没有正确答案。我认为重要的是要有意识地做出这个决定。


  每次物化事件后，你可以利用事件中包含的信息来确定受影响的 GraphQL 订阅集合。这也可能是你为有状态视图选择的数据存储所提供的功能。当有状态视图更新时，它可以生成或促进变更事件的传播，我们的系统消费这些事件并用于驱动
  GraphQL 订阅。


  ### 其他副作用


  除了通知用户和协作系统关于我们系统状态的变化外，我们的系统可能还参与某些业务流程。在第 5 章中，介绍我如何思考业务规则时，我描述了一类我称之为*副作用*的规则。副作用可以进一步分为两类：依赖于视图状态的，以及不依赖于视图状态的。对于不直接依赖于视图状态的副作用，请考虑作为开发者的你是否存在间接依赖。如果系统中发生了意外情况需要调查，确保副作用在事件物化之后发生是否有助于未来潜在的调试工作？也许不会，但我总是鼓励在设计系统时进行这种思考。未来的你可能会感谢自己。


  一个依赖于视图的副作用的例子是维护另一个衍生数据存储。我们用于存储视图的有状态存储可能对于通过标识符直接查找很高效，但可能无法高效地提供其他所需的产品功能，例如全文搜索或分面搜索。可能存在另一个能够更高效地响应这些查询的存储，并且为了操作简便，该存储会加载来自我们服务的
  GraphQL 查询结果。是的，你可以有一个额外的事件物化器来维护此存储中的状态，但这需要在两个存储的代码重复与让一个存储成为另一个的衍生之间进行权衡。


  这种类型的副作用可以通过跟踪系统的事件日志来运作，但需要延迟处理每个事件，直到事件物化器成功物化了该事件。当副作用处理每个事件时，它可以重用与事件物化器相同的检查点机制。其进度可以作为事件物化器检查点内的一个额外分区来存储。这里一个重要的细节是，如果视图被重建，副作用将再次发生，因为存储在视图中的状态将会丢失。对于手头的例子，即基于我们的视图更新衍生数据存储，这是期望的行为。对于另一类，即参与业务流程，这将是不期望的。


  作为业务流程一部分的副作用，例如向银行发送已批准的付款，或向新客户发送欢迎邮件，在视图重建时不应重复执行。它们需要一个类似于事件物化器所使用的检查点机制，但必须是持久的。通过将执行操作的意图以及操作的处理结果都建模为命令和事件，可以复用命令处理器本身来进行这种状态保持。无论选择哪种路径，并且与本书中关于业务应用的想法无关，该操作都应该是幂等的。我们系统内的信息，例如事件日志序列号，可以帮助构建一个幂等令牌，业务流程的下一步可以使用该令牌来确定是否存在重复执行操作的尝试。故障会发生，操作会被重试。虽然让客户收到第二封欢迎邮件可能可以接受，但多次发送付款则不行。




  ## 管理故障


  故障总会发生，无论是有计划的还是意外的。事件物化器维护着一个有状态视图，这通常意味着有一个外部系统在管理状态存储。这个外部系统不可能 100%可用，至少它很可能需要软件更新。意外故障也随时可能发生，例如事件物化器在处理特定事件时出现错误。因此，有必要明确地为故障制定计划，而不是自认为是不会写出
  bug 的完美开发者，并认为意外故障的可能性足够低。我们的系统对业务至关重要，这正是我们首先编写它们的原因。


  如果有状态视图存储本身不可用，就会影响从系统读取数据的能力。然而，值得注意的是，系统将继续接受写入操作。命令处理器与事件物化器是解耦的，事件物化器中的故障不会停止命令处理。不过，根据乐观锁的使用位置，写入操作可能会被有效禁用，因为如果无法观察最新的序列号，调用者将无法读取该值以将其提供给变更操作。


  事件物化器按顺序从事件日志中消费。如果在处理某个事件时发生故障，事件物化器**必须**停止。如果事件物化器试图“跳过”一个事件，其视图将变得不一致。然而，整个事件物化器并不需要停止。如果事件物化器正在处理多个输入分区，处理一个事件时的故障只需停止该分区，而不是整个物化器（尽管你可能会发现，停止整个物化器的策略在初始实现时更简单）。


  当解释这种行为时，某些人可能会觉得不可取。你可能会被鼓励将命令处理和事件物化耦合到一个要么全部成功、要么全部失败的工作单元中。我对此持谨慎态度，因为我认为这是试图让系统架构屈从于个人开发实践。其他人担心的风险与编程错误有关，而非视图存储故障，因为这种耦合在视图存储故障时并不会改变行为。我相信，并且在实践中也发现，测试可以充分缓解这种风险，这是下一节的主题。测试中仍然可能存在漏洞，我的后备方案则是本书范围之外的开发实践。通过拥有快速的构建流程并实践持续交付，理想情况下，你应该能够及时地将所做的更改投入生产。你可以将这些流程的持续时间作为部署任何代码更改所需的最短时间。这是与业务伙伴沟通以了解系统可用性目标的起点，这些目标可以指导实现决策。当事件物化器因编程错误而无法处理事件时，它不会影响系统服务读取请求的能力。能够处理此类部分故障本身就是一种弹性形式。


  ## 测试


  事件物化器是确定性的。给定一个输入事件，它每次都应执行相同的操作。这是“应该”，而非“一定”，因为操作可能会有所不同：当事件物化器从多个输入分区消费时。确定性仍然存在，但可能操作的数量是分区数量的函数。在有两个分区且事件分别为
  `A` 和 `B` 的简单情况下，有必要处理 `A` 后 `B`，以及 `B` 后 `A` 的情况。不过，这也取决于你的实现。处理 `A` 和 `B` 可能是独立的，并在处理完
  `A` 或 `B` 后执行一个公共例程。在我的许多工作中，测试事件物化器如何处理事件并非作为事件物化器的测试来执行，而是作为整个系统的测试来执行。为了测试事件物化器如何处理事件，有必要查询有状态视图。这与针对该视图测试
  GraphQL 查询和订阅有关。我发现测试整个系统更可取，原因我将在下一章深入解释。


  有状态视图模型也是检查命令处理器结果的一个机会。如果有状态视图存储在允许声明式约束的系统中，例如关系型数据库，那么可以利用该存储的能力。我发现交叉检查唯一约束和外键关系非常有益。如果处理某个事件违反了约束，它将指向命令处理器中的错误，而非事件物化器。这是应该在测试中捕获的错误类型的一个例子，因为如果这种情况发生在已部署的系统中，补救措施将需要移除视图约束，然后按照第
  6 章所述，将其作为业务规则变更来处理。


  虽然测试整个系统对于事件物化器如何处理任何给定事件是有意义的，但事件物化器本身可以，也应该被隔离测试。在测试整个系统时，重要的是要最小化这些测试因事件物化器本身的错误而失败的可能性。事件物化器的隔离测试应针对一组与你的领域无关且极其简单的事件来编写。我使用简单的领域，并且像命令生成器测试一样，经常使用一些个性化的、甚至有点傻的测试，比如计算我的猫被喂了多少次。


  隔离测试事件物化器也使模拟故障更加直接。可以编写测试来模拟有状态视图存储的故障，以及围绕软处理程序故障（例如在给定时间范围内未能完成）的防护措施。


  ## 总结


  事件物化器维护着用于满足 GraphQL 查询和订阅的有状态视图模型。你已经了解了这个模型如何随时间演变，以及视图模型的演变如何类似于维护多个专用视图模型。我解释了视图最好以事务方式维护的原因，以及如何使用命令处理器的已处理命令日志来提供视图相对于命令的一致性。你已经了解了如何思考测试事件物化器，哪些测试适合物化器本身，以及哪些测试最好在整个系统上进行——这是下一章的主题。


  '
- '# 12. 测试、监控与可观测性


  前三章介绍了我们系统的关键组件：命令处理器、命令生成器和事件物化器。每一章都包含一个关于如何测试该组件的部分。隔离测试每个组件可以建立对该组件本身的信心。但这并不能转化为对组合后系统的信心。有必要端到端地测试所有组件协同工作。在本章中，你将学习我如何通过测试来建立这种信心。我将讨论从系统输出中理解其内部状态的价值，以及如何为我们的系统添加检测以实现这一点。你将了解为什么在设计阶段就必须考虑系统在生产中如何运行。让我们开始吧。


  ## 关键组件


  在讨论如何端到端地测试系统的主要组件之前，我想先回顾一下这些组件以及它们是如何被隔离测试的。




  ### 命令处理器


  命令处理器负责维护一类业务规则，即针对静态数据的规则。它接收一个命令作为输入，该命令是改变系统状态的请求。您提供的函数（称为变更器）会接收命令和当前系统状态，并负责生成一组描述该命令希望执行变更的事件。您提供的另一个函数（称为应用器）会接收事件和系统状态，并返回一个包含事件所描述变更的新状态实例。应用器和变更器都是纯函数，即没有副作用的函数。状态实例是一个不可变的数据结构，包含执行业务规则所需的状态。


  这三项内容——应用器函数、变更器函数以及状态——是命令处理器中特定于应用程序的部分。命令处理器实现的其余部分则与这些函数内部的逻辑无关。


  在第 9 章中，我描述了如何单独测试应用器、变更器和状态。它们也可以在不使用命令处理器本身的情况下，在测试中进行编排。


  ### 命令生成器


  命令生成器负责根据变更请求（例如系统的 GraphQL 变更操作）创建命令。它通过将命令追加到命令日志中来提交命令进行处理。然后，它负责等待命令的处理结果，并将结果传达给调用方。


  第 10 章中描述的测试主要围绕该组件的机械基础设施，而非创建命令的领域特定工作。我将领域特定逻辑的测试推迟到本章进行。


  ### 事件物化器


  事件物化器维护用于响应 GraphQL 查询的有状态视图。


  与命令生成器类似，我在第 11 章中描述了如何单独测试事件物化器本身。检查点基础设施和视图维护的编排可以使用与您的实际领域无关的简单事件进行测试。这让我们有信心在将物化函数用于领域事件之前，事件物化器本身能够正常工作。与命令生成器一样，我认为事件物化器中特定于领域的部分最好通过测试组合后的数据流来进行验证。


  ### 组合数据流


  从写入到读取，变更请求以 GraphQL 变更操作的形式传达给系统。命令生成器将变更操作输入转换为命令，并执行与外部系统必要的通信。它将命令提交到命令日志，从而确定执行顺序。命令处理引擎一次从命令日志中消费一个命令。对于每个命令，它会调用您的变更器函数来创建该命令所隐含的一组事件。然后，它会调用您的应用器函数来推进命令处理器的状态。如果这两项操作都成功，事件将被追加到事件日志中，并且已处理的命令会连同其处理结果一起被记录。


  命令生成器正在等待这个处理结果。如果命令失败，则返回详细的错误信息。否则，返回该命令生成的最后一个事件的序列号。


  事件物化器正在从事件日志中消费。一旦事件被追加，它就会开始更新有状态视图。这与向调用方传达命令处理结果是并行进行的——当然，仅针对成功的命令，因为失败的命令不会产生任何事件。


  为了观察其变更，调用方可以执行 GraphQL 查询，并将变更操作响应中的序列号作为所需最小视图版本的指示器。这为进行变更的调用方提供了写后读一致性。调用方还可以使用主动的
  GraphQL 订阅来观察变更。在事件物化器更新视图后，他们将收到一个订阅通知。


  为了以能够确信系统能够处理调用方请求的方式来测试系统，有必要执行这个组合后的数据流。




  ## 测试组合系统


  我认为针对系统（或服务）的测试并未得到充分重视。过去几年中，“测试金字塔”的概念逐渐普及，这一概念源自迈克·科恩的著作《敏捷成功之道》。^(¹⁶) 金字塔的底部由相对更独立、速度更快的单元测试构成；顶部则是集成度更高、速度更慢的
  UI 测试；中间层则由服务（或系统）测试组成。如果执行得当，系统测试能够为系统提供高水平的信心，并且性能良好。通过结合使用容器、在云端机器上轻松运行测试，甚至借助远程开发环境，速度上的劣势正在消失。我还认为，有时人们会认为任何比单元测试更复杂的测试都是缓慢且昂贵的。


  我对系统测试的方法是：测试有价值的内容。我重视系统的外部 API 契约（在我们的案例中是 GraphQL 模式），以及用于满足 API 契约的任何基础设施。事件物化器维护着一个有状态的视图。如果使用另一个系统来存储该视图（例如数据库），那么测试应该使用该系统的实际实例。容器在这方面提供了巨大帮助，因为它们为管理这类资源的生命周期提供了标准化的契约。


  GraphQL 通常通过 HTTP 交付。在进行系统测试时，我避免使用 HTTP，而是倾向于直接与我的 GraphQL 实现进行交互。GraphQL 实现与暴露它的
  HTTP 端点之间的接口是可以独立测试的。这同样适用于事件物化器测试所采用的理念。该组件提供的功能最终与其执行的具体操作无关。事件物化器并不关心任何给定事件如何影响有状态的视图。HTTP
  端点与 GraphQL 实现之间的接口是类似的，并且由于它位于系统的边缘，很容易被绕过。


  我相信，组合系统——即满足 GraphQL API 所需的一切——可以作为一个整体进行测试；如果你需要用这种术语来表述的话，可以称之为一个单一的*单元*。我们的系统需要维护其外部契约，从类似于系统用户的角度进行测试，能让我们更有信心地认为测试结果将反映系统在生产环境中的行为方式。


  从外部契约的角度测试我们的系统，其推论是：同样的方法也可以应用于任何需要与我们系统协作的其他系统。如果命令生成器需要查询另一个系统才能创建命令，那么只要该存根实现满足另一个系统的契约，我们就可以在测试中使用该系统的存根实现。我发现这种视角还能避免创建分布式单体架构——即由于服务间的相互依赖而需要同步发布多个服务的情况。如果系统间的契约定义不明确，甚至可能根本不存在，开发者可能会倾向于在测试中使用协作系统的真实实例。而一个定义良好的契约则允许创建替代实现，这是避免测试中出现此类耦合的一个促成因素。


  对于我们的系统，一个实现应该允许实例化 GraphQL 接口、命令生成器、命令处理器、事件物化器以及任何其他必要的服务。这就是整个系统的精髓，在部署时即可通过
  HTTP 暴露出来。


  这个组合系统的实例足以测试组合后的数据流。这类测试也属于一种未被充分重视的范式：基于属性的测试。


  ## 介绍基于属性的测试


  在向同事解释基于属性的测试时，我首先会让他们从已知的概念入手。大多数开发者都熟悉以下形式的测试：


  ```

  @Test

  void shouldCalculateScore() {

  var customer = new TestCustomer();

  var calculator = new ScoreCalculator();

  assertEquals(10, calculator.scoreFor(customer));

  }

  ```


  这种类型的测试是基于示例的测试。这个名称的理由很简单：该测试是针对一个特定创建的客户来断言其分数。想想看，我刚才就为你提供了一个熟悉测试的示例。


  要针对分数计算器的行为创建通用的断言可能很困难。那个单一的测试客户究竟能覆盖多少实现代码？


  开发者通常会利用他们对实现的了解，构造多个示例来覆盖实现中的不同代码路径。这些示例共同建立起信心，让我们相信这些测试能够为系统部署后的行为提供保障。


  这种方法存在一个局限性：随着被测单元输入复杂度的增加，所需示例的数量也必须增加。我发现这与大多数开发者希望尽量减少需要编写的代码量（尤其是在代码高度重复的情况下）的愿望并不契合。测试框架提供了一些技术来帮助减少重复，但最终，如果你有
  100 个示例，代码库中至少会有 100 个*某种东西*。


  正是这一点促使我转向了基于属性的测试。其前提很简单：不是测试特定的输入输出示例，而是针对所有可能的输入来测试单元的属性。在实践中，测试所有可能的输入通常是不可行的。支持基于属性的测试的框架会从一个随机种子值开始，并用它来生成一组输入。如果某个输入导致测试失败，可以将该随机种子值提供给框架，以便重现该场景供开发者修复。


  关于基于属性的测试的文献通常会在示例中使用对称函数。对于任何对象 `A`，如果它被序列化为外部表示形式，然后再反序列化回来，它应该等于原始值。用数学方式表达就是
  `A = deserialize(serialize(A))`。


  我发现一个强大的方法是使用*测试预言*。测试预言是一个组件，它能够在不知道非测试预言实现方式的情况下，为给定的输入提供预期的输出。如果你的第一反应是这需要编写单元逻辑的第二个实现，那么你是对的！


  当使用基于属性的测试并结合一个能为给定输入提供预期输出的测试预言时，你实际上就是在编写单元逻辑的第二个实现。我认为这是一件好事。要成为一个有效的预言，它绝不能依赖于被测试的实现。它是一个完全独立的实现。由于它只是用于测试的代码，因此不需要像生产环境中运行的代码那样健壮。它可以针对手头的任务进行简化。


  可以将其视为开发者版本的复式记账法。就像会计师使用两本分类账来确保账目正确一样，作为开发者，我们可以拥有业务逻辑的两个实现。通过将业务逻辑实现两次，且彼此独立，它们可以相互交叉验证。这些实现将帮助你确保另一个实现正在按预期工作。




  一旦创建了测试预言机，其复用成本极低。维护数十个（更不用说数百个）基于示例的测试用例将变得繁琐。基于属性的测试可以使用数千个随机生成的输入（或者，对于来自可枚举有限集的输入，可以使用所有可能的输入）来运行。其限制因素在于测试运行时间与通过额外输入所增加的信心之间的平衡——你可以根据自身环境和风险承受能力来调整这一平衡。


  当基于属性的测试框架生成输入时，它们通常会提供用于生成特殊值的钩子。特殊值是指那些可能引发边界情况的值，例如零、空值，或有符号数的最小值和最大值。这些特殊值钩子确保它们以更高的概率被纳入随机生成的输入中。


  能够用比我手动管理更多的场景来测试业务逻辑，对于建立对系统的信心极为强大。下一节将解释如何为我们的系统实现这一点。


  ## 使用基于属性的测试


  我们将使用基于属性的测试来验证系统相对于暴露的 GraphQL 接口的行为。在最基本的层面上，在执行 GraphQL 变更操作后，验证查询和订阅是否包含预期的更改。一次只测试一个变更操作不太可能建立起所需的信心。用户工作流可能跨越多个变更操作。考虑一个管理发票的系统。可能存在以下变更操作：


  *   创建发票

  *   提交发票以供审批

  *   批准发票

  *   拒绝发票

  *   归档发票


  创建后，发票可以被批准或拒绝。被拒绝的发票可以重新批准。只有被拒绝的发票才能被归档。


  我们真正想要的是让基于属性的测试不仅生成创建发票的输入，还要生成要执行的操作序列。


  这项技术变得非常强大。如果存在一个实现边界情况，即发票在多次提交审批后归档失败，该怎么办？这个场景是你可能已经编写为基于示例的测试的吗？我猜想我可能会编写一个测试来验证被拒绝发票的归档，而没有考虑到拒绝次数可能是触发失败的因素。


  通过让基于属性的测试框架生成一系列要执行的操作，我们可以模拟用户可能采取的系统工作流中的各种路径。在我自己的工作中，这揭示了在意外序列中出现的微妙边界情况，而这些情况如果仅通过用户的支持请求来拼凑，将会困难得多。


  为了支持测试一系列操作，我们系统的基于属性的测试需要由一个**有状态的测试预言机**来支撑。当执行一个操作时，变更操作会被发送到系统以及测试预言机。该变更操作所隐含的变化将在
  GraphQL 查询和订阅中可见，并且预言机将被用来预测这些值。


  在编写基于属性的测试及其关联的预言机时，至关重要的是所有操作都必须是**确定性的**。这允许在预期失败时重放测试场景。例如，我遇到的一个陷阱是让测试预言机使用
  Java 的 `HashMap` 来存储状态。Java 的 `HashMap` 不保证其内容的迭代顺序，而你可能在测试中依赖它来从映射中获取“第 n 个”条目。修复方法很简单，改用
  `LinkedHashMap`，因为它确实提供了所需的保证。


  系统本身也需要是确定性的，但我们已经在设计本身中很大程度上保证了这一点。变更操作由命令生成器处理，它最终会将一个命令追加到命令日志中。命令日志中命令的顺序定义了它们将被处理的顺序。在面对并发变更操作时，这就是建立顺序的地方。在命令生成器之后，所有处理都是有序的，无论是在命令处理器中消费命令日志、追加到事件日志，还是在事件物化器中消费事件日志。测试可以顺序执行变更操作，知道它们将生成由于并发请求而在部署时可能出现的各种顺序。


  设计本身是确定性的。但命令生成器内部为了创建命令而咨询外部系统所执行的任何工作可能不是确定性的。你需要为你的系统解决这个问题，解决方案将根据具体工作内容而有所不同。一种可能性是将来自外部系统的响应视为需要它的操作的另一个输入。当测试执行该操作时，它可以使用一个侧信道与桩实现通信，告诉它下一个响应应该是什么。


  在实践中，我使用基于属性的测试来验证我*认为*是系统快乐路径的内容。生成的要执行的操作序列*预期*总是导致成功的变更操作。我的理由有两个。首先，我不关心所有无效值的完整宇宙。如果创建发票有一个约束，即发票日期不能是过去的日期，那么测试所有可能的过去日期是否有价值？就个人而言，这样做并不会让我对系统获得额外的信心。我很乐意依赖我对检查如何实现的知识。其次，更实际地说，它简化了测试和预言机的实现。生成的输入被约束以匹配系统的规则，并且预言机不需要能够预测错误。如果来自系统基于属性测试的变更操作失败，诊断是直接的。输入值的生成没有被正确约束（这应该从错误消息中直接可见），或者测试发现了系统中的真正问题。


  在这个级别进行测试的另一个好处是能够演进系统的内部结构。由于测试锚定在系统的**外部契约**上，因此有更多自由来演进系统的内部结构。你可以通过交叉检查你的更改与测试没有变化，来确保那些应该没有外部影响的内部系统更改确实没有产生影响。


  基于属性的测试很强大，但它并不是满足所有测试需求的万能药。




  ## 使用示例测试


  在上一节中，我描述了如何约束基于属性的测试，使其生成预期能成功的输入和操作，即所谓的“快乐路径”。这些测试通过 GraphQL 查询和订阅来验证变更操作所导致的状态变化。


  我们系统的调用者不会只走快乐路径。系统必然会收到一些违反其业务规则的输入。当这种情况不可避免地发生时，应该将违反规则的原因传达给调用者，以便他们能够决定下一步的行动。


  这正是我发现示例测试价值的地方。示例测试可用于确保系统拒绝无效的输入或操作。示例测试所执行的验证不仅应包括变更操作被拒绝这一事实，还应包括关于*为何*失败的返回信息。为了让调用者能够决定下一步行动，需要向他们清晰地传达失败的原因。示例测试中的断言应确保错误消息具有足够的描述性。


  在系统生命周期的早期，示例测试也很有用。当添加第一个变更操作，并对照视图检查其结果时，使用示例测试是验证此项工作的最直接方法。即使对于像发票审批示例这样的多步骤工作流，最初将其编写为示例测试也有助于我尽早获得关于实现的反馈。一旦示例测试通过，我就会开始或增强系统的基于属性的测试。


  当测试期望失败时，你需要理解其原因。可能是输入无效，也可能是系统内部存在逻辑错误。在开发过程中尽早遇到逻辑错误是理想的，但这并非总是可能。一旦系统在部署环境中运行，调试就不会像开发时那样直接。我通常会尝试将导致错误的场景重现为一个示例测试。为了有效地做到这一点，我可能需要了解系统的一些内部状态。


  ## 可观测性


  可观测性是一个来自控制理论的术语，它描述了从系统输出推断系统内部状态的准确程度。推断越准确，系统的可观测性就越高。


  对于软件开发人员来说，我认为这是通过观察系统已接收和返回的请求与响应、日志输出以及系统指标（如内存消耗或 CPU 使用率）来推断系统内部状态的能力。


  请求、响应、日志和指标都是可以关联的。在最简单的情况下，可以使用时间进行关联。当系统存在并发请求时，这就开始变得困难，需要在每条日志语句上包含额外的元数据，以指明它对应哪个请求。系统指标是聚合数据，无法精确分解出某个特定请求消耗了多少内存或
  CPU。


  对此的一个解决方案是链路追踪。你可能在分布式追踪的语境中听说过链路追踪，它用于跟踪请求在分布式系统中的流转。在常用的术语中，单个请求就是一个*追踪*。一个追踪由一个唯一
  ID 和多个跨度（span）组成，跨度是用于跟踪持续时间的容器。每个跨度都有一个开始时间和一个持续时间，即一个*时间跨度*。跨度被组织成一棵树，因此可以可视化依赖关系。如果服务
  A 在处理请求时调用了服务 B，那么将会有一个代表调用服务 B 的跨度，它是代表调用服务 A 的跨度的子节点。


  打个比方，链路追踪类似于包裹追踪。想象一个朋友通过邮政系统寄给你的包裹。你的朋友在寄出包裹时会收到一个追踪号。这类似于追踪的唯一 ID。当包裹在运往你处的途中经过各个设施时，每个设施都会有带时间戳的记录。最终，包裹会到达你的家门口。


  链路追踪提供了在计算机系统中实现这种可见性的模型，我们可以将其应用于系统的内部。即使系统不是一个更大的分布式系统的一部分，链路追踪模型也极其有用。进入我们系统的每个请求至少是一个跨度，它代表了该请求的外部视图，包括持续时间。我们系统中的每个关键组件都是一个离散的步骤。链路追踪模型允许为每个组件执行的工作创建一个跨度，并将它们链接在一起。对于一个变更操作，追踪将包含一个代表整个请求的跨度，然后有代表命令生成器、命令处理器和事件物化器的子跨度。即使调用者在命令处理器完成后就会收到结果，事件物化器的工作也应该是追踪的一部分，因为它是相关的。


  调用者将知道追踪的唯一 ID。当使用分布式追踪时，有机制可以将此上下文信息随请求传播；或者，如果系统独立使用追踪，则该值可以作为响应的一部分返回。如果请求导致错误或异常缓慢，可以查询追踪以获得更多洞察。这有助于系统变得可观测，因为追踪是系统的另一个输出。我们可以利用追踪来构建更完整的系统内部状态心智模型。我在第
  10 章中提到的与命令生成器一起使用的信封模式，也可以用于跟踪与信封内容关联的追踪。




  在实现系统组件时，请考虑在何处添加额外的跨度（span）来捕获有价值的工作片段。编写代码时应**大胆**添加跨度。我将其视为在封墙前为在建建筑铺设电缆——在建造初期完成这项工作，比后期改造既简单又经济高效。


  链路追踪已实现商品化，针对您所选语言已有现成解决方案可供构建。一个常见功能是能够为每个跨度添加任意键值对（通常称为标签）。我同样鼓励您在此处**大胆**添加，尽可能多地附上当时可用的上下文信息。未来什么信息有用，很难提前预判。


  您可以将链路数据发送给供应商，以便对其执行分析。每个跨度相当于一个计时器，因为它包含开始时间和持续时间。通过用链路对代码进行埋点，就无需单独捕获计时信息作为指标。链路追踪也更强大。指标是预聚合的，因此围绕一段代码的计时器最多只能记录其观测持续时间的直方图。如果查看计时器值时发现一个缓慢的异常值，您无法将其追溯到具体的慢请求。而使用链路作为输入，可以通过聚合链路的跨度来推导出计时器。如果观察到缓慢的异常值，可以查询输入链路来精确了解异常值在做什么。这也是预先添加标签变得有价值的地方，因为工具还可以将标签作为额外的查询维度。


  链路已成为我观察已部署系统的首选方法。如果出现与意外行为相关的支持请求，并且我获得了与该交互相关的链路 ID，我就能准确了解输入是什么以及系统如何响应。


  CPU 和内存使用率等指标确实有其用武之地。描述系统及其主机环境整体行为的系统级指标很有价值，仍应收集。了解系统的聚合行为是有益的，但并非所有必要数据都能从链路中构建。


  链路在基于属性的测试中也很有用。每个任意选择的动作都可以启动一个新的链路，使得变异执行和用于验证的任何查询都能表示为各自的跨度。如果您能自信地使用链路调试测试失败，那么在系统部署后，您将更有信心使用链路诊断行为。使用链路调试测试失败也是早期了解领域中有价值的上下文标签的机会。


  虽然链路提供了监控系统的机制，但我更倾向于将其称为可观测性工具，用于理解系统正在做什么。监控是一项独立的活动，可以使用链路来实现其他目标。


  ## 监控生产系统


  我认为监控是确保系统按预期运行的行为。监控通常会伴随某种形式的告警，因为系统运维人员（也就是您）希望在系统出现异常时得到通知。


  本书描述的系统适合通过单一进程来确保整体健康。我发现这很有益，因为有时系统会有多个监控进程生成告警。当系统有大量告警时，误报的可能性会增加，或者当出现问题时您会收到大量告警，需要您判断哪个指向真正的问题。


  对于业务应用程序，理想的监控机制是执行与系统调用者相同的操作。不幸的是，对于业务应用程序，让监控系统更改系统数据是业务方不希望看到的。


  我们的系统可以采用另一种方法。我们最终想知道的是命令是否正在处理、事件是否正在物化、查询是否正在被响应。这可以通过使用不影响系统业务信息的变更来实现。可以添加一个变更来递增计数器。计数器将生成一个命令，处理该命令将产生一个事件。事件物化器将物化该事件，更新视图中存储的值。可以使用
  GraphQL 查询和/或订阅来观察更新后的值。


  如果此过程及时完成，那么对系统的其他变更和查询也应该能完成（如果没有逻辑错误）。此过程完成的时间也是系统响应能力的健康指标。如果时间开始变慢，可以生成告警，作为潜在性能问题的早期预警。


  这种类型的流程称为**合成监控**，因为我们正在模拟用户可能采取的操作。我们利用所有变更都流经同一流程这一事实，无需更改任何业务信息，同时确信这些流程能够处理任何更改业务信息的实际请求。


  我发现合成监控与基于属性的测试配合得非常好。基于属性的测试确保系统内的逻辑按预期运行。合成监控则验证数据是否流经系统的“隐喻管道”。这再次使用了测试事件物化器时的相同范式：将基础设施测试与业务逻辑分离。如果基础设施本身可以得到验证，那么就有信心它能为依赖该基础设施的任何业务逻辑正常工作。


  当系统监控器触发告警时，首要行动将是利用您可用的工具来诊断系统，例如可以查询链路或查看系统指标的系统。




  ## 练习使用工具


  编写测试有助于确保系统按预期运行。监控则有助于确保系统正常运行并能响应请求。当监控最终触发警报，或调用方报告他们收到的错误时，你将需要依靠工具来诊断问题。


  在*试图诊断问题*的过程中学习使用现有工具来诊断问题，是一种令人沮丧的体验，更不用说这会延长诊断时间或导致无法找到问题根源。


  理想情况下，你应当知道如何使用这些工具并解读其数据。这需要学习，并且应该明确地进行。


  在我目前的职位上，我们每周轮换一次，由谁担任系统问题的第一响应者。通常，一周内可能不会出现任何问题，从而形成一个非常直接的交接流程。如果出现过问题，则会进行讨论，将已了解到的背景信息分享给接任者。


  为了学习我们的工具以及如何解读其数据，上一周负责的人会带领团队了解我们的工具，学习如何使用它们。这解决了多个目标。


  首先，它建立了我所说的对系统行为的*环境理解*。通过查看系统的高级指标，如 CPU 或内存使用率，你将建立起对系统正常状态的认知。也许 CPU 使用率存在逐日重复的模式。你可能会了解到，在特定时间出现的小峰值并非异常。那么，当排查系统问题时，你就会知道同样的小峰值不太可能是问题的因素，因为它是一种常规现象。如果你没有建立这种对正常状态的环境理解，你可能会花时间调查一些最终被证明是误导性线索的问题。


  其次，这也是深入探究潜在误导性线索的机会！以同样的 CPU 小峰值为例，第一次观察到时，深入探究其原因！采用与排查实际问题时相同的诊断方式，但没有实际问题带来的压力。这正是你和你的团队学习如何使用工具来回答有关系统问题的时候。也许
  CPU 峰值与延迟峰值相关。然后你可以查看追踪信息，了解系统当时正在接收哪些请求。如果追踪信息没有提供足够的数据，你就有机会增强所捕获的数据。


  在事故处理过程中学习如何使用工具会令人沮丧。意识到你的系统没有发出足够的信息来让你理解其行为，会延迟你诊断问题的能力。为了提供一个有弹性的系统，其操作者——也就是你——学习如何操作它至关重要。实践是必需的，而实践最好在受控环境中进行，而不是在事故这种压力更大的环境中。


  测试将有助于最大限度地减少事故，但不可能消除意外情况。


  ## 总结


  虽然系统的各个组件可以单独测试，并且这样做有其价值，但测试组合后的系统同样有价值。你已经了解了基于属性的测试以及如何将其应用于我们的系统。你还了解到示例测试也有其用武之地，尤其是在开发初期以及测试系统错误消息时。我解释了使用追踪信息来理解系统内部行为的价值，以及如何使用合成监控来检查系统在部署后是否按预期运行。最后，我介绍了一种有价值的实践：练习调查系统，以建立对其行为的环境理解，并确保系统发出足够的信息来诊断问题。下一章将根据我们的目标回顾系统，并展望实现所需的技术。


