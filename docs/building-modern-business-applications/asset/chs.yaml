- '# 4. 为什么要把业务应用构建为响应式系统？


  现在，我们对什么是业务应用以及什么是响应式系统有了共同的理解。在本章中，我们将探讨将业务应用构建为响应式系统的好处。在定义业务应用时，我们曾提及业务方对应用的期望。我将通过进一步阐述这些期望以及你作为开发者的期望来开始本章。然后，我将再次逐一介绍响应式系统的四个特性，并明确地将它们与业务和开发者的期望联系起来。之后，你将知道本章标题所提出的问题的答案：为什么要把业务应用构建为响应式系统？




  ## 业务期望


  在第一章中，作为界定业务应用定义的一部分，我描述了业务如何将应用作为关键组件来使用。在思考业务对应用的*期望*时，这不仅仅是关于如何使用它的机制。


  作为业务的记录系统，业务期望在需要存储或检索数据时，应用能够保持可用。如果业务在某个维度上增长，例如员工数量或订单量，应用应能继续满足其需求。如果业务工作流需要调整，通过修改应用来实施变更不应成为限制因素。


  我大致将其描述为：业务期望应用在需要时可用，并能及时响应业务需求的变化。我希望这在一定程度上是不言自明的，因为这是任何服务提供商与其服务订阅方之间关系的核心。这是一个简单的期望。复杂性在于如何实现它。


  我们的业务应用是由像你这样的开发者编写的，无论是作为员工还是顾问。业务对其应用的期望，间接地，也是对你如何构建应用并使其对业务可用的期望。


  ## 开发者期望


  你也是你应用的用户！我认为明确说明这一点很重要。你可能不会使用与其他用户相同的界面，但你仍然是用户。你的主要界面是应用的源代码。其次是构建和部署流水线，以及用于监控应用健康和行为观察的工具。


  你期望代码易于处理。我使用“易于处理”而非“简单”这个词，因为你的领域内会存在固有的复杂性。理想情况下，这应是复杂性的唯一来源。除此之外的任何复杂性都是不必要的，并且有机会将其最小化。这正是本书的目标之一：提供构建业务应用的指南，以减少不必要的复杂性。如果这里的方法看起来复杂，我推测那是因为它们可能对你而言比较陌生。


  减少复杂性并不意味着对专业知识的需求也会减少。当我们构建应用时，实际上是在构建机器。本书中的方法是一种不同的，并且我相信是更好的构建这些机器的方式。我正在分享我的一些经验，以帮助你在构建专业知识的旅程中加深理解。


  业务对其应用的期望会间接地施加于你，因为你将这些期望变为现实。作为其中的一部分，你将在约束条件下工作。最终，这些约束可以归结为两种形式：时间和金钱。


  时间可以表现为金钱。总有一个价格能让施加时间约束的人允许更多时间，但这通常是不可行的解决方案。出于实际目的，尤其是在我们的语境中，将它们视为独立的变量更为简单。深入探讨这一思路本身就是一个话题，本书并不专门讨论它。我将其描述为一种系统思维。如果你接触过或进一步阅读过相关主题，你可能会看到我们的响应式系统在概念上是如何与之对齐的。


  业务从应用中获取经济价值。如果应用造成亏损，运营成本高于其回报的价值，那么应用的可持续性将受到质疑。我认为开发者意识到这一点很重要。建立这种理解所需的与同事的关系，也有助于理解业务本身，这在实现业务规则时是很有用的领域知识。


  金钱成本通常是一个直接的计算。它包括用于开发和运营的硬件和软件资源，以及员工薪资。虽然重要，但我认为运营成本的重要性较低。它们相对于规划周期而言，往往以更可预测的方式变动。给定一个两年、五年甚至十年的计划，有足够可靠的数据来做出有依据的预测。摩尔定律和计算成本的总体趋势对误差范围有抑制作用。


  时间才是关键。这有两种变体。企业会尝试通过增加人员来“购买时间”。其负面结果已被《人月神话》和布鲁克斯法则很好地概括：“向一个已经延迟的软件项目增加人手，只会让它更延迟。”
  这种认为增加人员能让项目更快完成的想法，其核心是：有效修改软件的能力是一个限制因素。如果企业想要改变其运营方式，而软件无法及时随之改变，就会产生机会成本。


  我发现，应用*易于变更*的程度，直接关系到开发者与应用的界面——即其源代码。源代码中表达的是*应用的结构*。如果一个系统不易于变更，那么进行变更将花费更多时间。通过能够更快地变更，我们实际上是在购买时间。你可能以前接触过这个想法，它常被冠以“好代码”或“整洁代码”的名义。这些观点仍然适用。根据我的经验，它们往往抽象地描述概念，而不是提供具体的指导。这完全可以理解，因为它们是指导原则，而非具体的架构。在本书中，我将为该架构提供具体细节。响应式系统提供了一种整体架构，一种可组合的架构，因此适用于大局的也适用于细节，反之亦然。


  ## 属性对齐


  与前一章相呼应，我将逐一介绍每个属性，说明它们如何与业务和开发者对系统的期望对齐。我还会从业务的角度，提及开发者期望中提到的两个约束：时间和金钱。虽然在这些约束下工作是开发者的期望，但对时间和金钱的管理对业务而言是有价值的。


  ### 响应性


  如果你曾与某人通电话，而对方不得不为他们的电脑速度慢而道歉，那么你就亲身体验过响应性的价值。没错，“时间就是金钱”，让用户不必要地等待会成为一种拖累。这会产生乘数效应。受缓慢响应时间影响的不仅仅是应用的直接用户，用户所帮助的任何人也会受到影响。


  作为开发者，这是一个难以估值的属性。如果直接问用户系统应该有多快，他们通常会给出一个模糊的答案，比如“要快”。用户通常很容易识别出什么是不可接受的，但反过来却非常主观。性能优化工作以开放性著称，这使得围绕它进行规划变得困难。


  我对响应性的关键理解在于建立一个可接受的上限。这消除了在诊断故障时“是慢还是卡住了”的模糊性。响应性的上限也为讨论和规划响应时间改进提供了一个起点。


  应用的用户欣赏响应性强的应用，而开发者会发现它们更易于运维。这是最面向用户的属性，做好这一点有助于与业务建立积极的反馈循环，让业务对应用及其开发者能够及时提供系统建立信任。




  ### 弹性


  故障总会发生，无论是有计划的还是意外的。如果你不计划优雅地处理故障，那它就不会优雅。优雅地处理故障可以减少系统的运维负担。通过最小化故障的影响，可以缩短恢复时间，快速安全地恢复服务。业务方期望应用在需要时始终可用，而弹性正是实现这一目标的手段。在用户看来，系统是否“在线”即代表是否可用。


  从更广阔的视角来看，弹性关乎处理*意外的系统状态*。如果某个组件发生故障，那便是意外情况，否则该故障本应已被处理。


  还有一种开发者将系统置于的预期状态，可能导致系统不可用，即**部署**。


  部署可以被视为两个状态之间的转换：系统运行旧代码的状态和运行新代码的状态。这种转换的频率取决于部署发生的频率。如果你正在实践持续交付，那么这种转换可能会持续发生。部署还有另一个维度，取决于其发生方式：一段时期内运行的代码*多于*平常，或*少于*平常。


  如果你希望部署时没有可见的停机时间（这在实践持续部署时很常见），那么你将经历一段运行代码多于平常的时期。这段时期的持续时间会因新版本上线所采用的策略而异。即使是最简单的情况——新版本一运行就立即停用旧版本——也会存在一个两者同时活跃的时期，必须加以考虑。还有更复杂的策略用于增量激活新代码。在所有情况下，这些策略都会导致更长的重叠期。


  另一种选择是停机部署：停止旧代码，启动新代码。在部署期间，系统会有一段时间不可用。从用户的角度，或从协作服务的角度来看，这与意外故障没有区别。虽然这并未为正在部署的代码提供弹性，但在一个由多个服务组成的系统中，能够单独部署一个服务，并让其协作者处理其可用性问题，这本身就是弹性在发挥作用。


  无论是从处理意外故障入手，还是从优化部署流程入手，两者都是相辅相成、互相支持的。能够在整个系统中统一处理故障，有助于管理和修复。


  ### 可伸缩性


  可伸缩性是最难利用的特性，也是最难明确其清晰收益的特性。有效利用它是一个高级话题。我认为关键部分是使其*成为可能*，因为为一个没有考虑这些扩展点的系统增加可伸缩性可能是一项挑战。


  如果系统的使用量是恒定的，那么工作负载就没有可伸缩性。如果使用量存在波动，那么这种波动必须足够显著，才值得分配或释放系统资源。我们的业务应用更可能以每分钟请求数来衡量，请求量翻倍可能算不上显著变化。在云环境中，假设为了弹性而部署了一个三实例的集群，那么对这个规模的集群进行有效的自动伸缩是很棘手的。或许将其扩容到一个新的固定规模，比花时间微调自动伸缩策略更好。如果你有一个大型集群，自动伸缩会更容易。


  然而，另一方面，如果波动性很大且自动伸缩有效，那么具备可伸缩性就能节省成本。不再需要过度配置资源来处理峰值负载，也无需在业务低谷期为未使用的容量付费。如果成本已经是一个考量因素，系统可能会故意相对于峰值负载进行低配，寄希望于运气，希望峰值不会导致太多不良后果。


  ### 消息驱动


  这是最终的答案。在某种程度上，其他特性对于业务应用来说是“锦上添花”。构建业务应用时，响应式系统的主要好处在于其消息驱动的特性。


  前三个特性——响应性、弹性和可伸缩性——可以被视为运维层面的特性。而要真正做到消息驱动，系统的架构需要从核心层面以此方式运作。这个特性从根本上影响了系统架构。正如我在前一章所讨论的，你的系统已经由消息构成。我们的目标是保留它们。


  让我们思考一下系统中存在的消息类型、它们的目的，以及保留这种抽象的价值。


  想象一个现状服务：一个通过 ORM 在关系数据库中存储数据的通俗 REST 端点。一个用于更改系统中某些数据的 HTTP 请求就是一个消息。应用消费这个请求，使用适当的逻辑更新对象模型并持久化更改。然后返回一个响应消息。


  我们从一条消息（请求）开始，以一条消息（响应）结束。我们*转换*了请求，得到了响应。


  进一步分解这个例子，HTTP 请求是一条代表*更改请求*的消息。从概念上讲，这是一个**命令**。通常会对传入请求进行一些验证，以确保其结构正确，例如检查必填字段。如果这些验证通过，我们可以认为该命令已被应用*接受*。


  应用消费这个命令并更新对象模型。这很可能仍是预期性的，因为可能还需要满足数据库约束。直到事务提交时，应用才能确定更新是否成功。这就是命令的*处理*过程。事务的处理结果（无论是成功提交还是失败）就是命令的*结果*。


  如果结果是失败，可以立即返回一个错误响应，这是对结果的一种转换。在成功的情况下，作为命令一部分被修改的对象模型可能被用来返回一个响应负载，这是另一种类型的转换。无论是成功还是失败的情况，都代表了另一条消息。


  如果没有对命令进行显式表示，上述逻辑很容易变得混杂，使测试更加困难。这可能违背开发者对系统易于变更的期望。应用的内在结构需要持续警惕以防止这种情况发生。


  如果我们把命令具体化为一条消息，我们就可以显式地对其进行操作。这个命令会有一个清晰的处理流水线。每一步都可以由一段离散的、可测试的代码来表示。归根结底，这就是本书的主题，而第
  3 部分将深入探讨如何实现这一点。


  通过使用显式的命令，系统可以成为消息驱动的。利用这种对系统正在做什么的表示，它为系统的逻辑组件如何交互提供了一个框架。这种一致（并且是的，有主见的）设计理念指导着应用的结构。


  在组件之间交换消息，使我们能够应用与将组件引用连接到系统数据流时相同的控制反转原则。我们获得了同样的好处：提高复用性、降低耦合度以及独立演进。


  在一个作为事实来源并管理工作流的业务应用中，能够安全且自信地改变数据流的方式至关重要。这就是将它们构建为响应式系统的原因。




  ## 总结


  本章解释了*为何*将业务应用构建为响应式系统是有益的。业务对应用可靠性的期望，正是由响应式系统所提供的。其中最重要的是你期望能够有效地变更系统。通过将应用的数据流建模为消息，可以充满信心地实现这一点。第
  3 部分将解释*如何*实现。在此之前，接下来的两章将深入探讨业务应用的两个重要特性：管理业务规则和时间。


  '
- "# 5. 什么是业务规则？\n\n业务应用是业务的真实数据源。为了有效完成这一任务，数据需要符合某种结构。这将允许围绕它构建流程和工作流。从分类上讲，数据结构的规范、数据如何修改以及数据变更时会发生什么，都被视为**业务规则**。在特定时间点，这些规则是具体的。随着业务的变化，其规则也会随之改变。本章探讨了我对规则的思考方式以及如何对其进行分类。通过理解它们与系统的关系，我们将知道在架构中应将其置于何处。\n\
  \n## 思考业务规则\n\n拥有正确的规则至关重要。错误的规则会导致用户在系统之外、在其约束范围之外工作。由于业务的主要目标之一是让用户*实际*使用系统，因此规则需要准确反映业务的运作方式，包括各种例外情况。\n\
  \n那么，什么是正确的规则呢？必须与潜在用户沟通才能理解。这可能是你职责的一部分，或者在较大的组织中，这可能是产品经理职责的一部分。理解业务规则是收集需求的关键环节。\n\
  \n从正确的受众那里收集需求非常重要。如果只采访管理层，他们想象的工作方式与业务*实际*的运作方式之间可能存在脱节。意识到这种脱节很重要。人因工程学领域将这种现象描述为“想象的工作”与“实际的工作”。在创建应用时，我们正在编码第三种形式：“规定的工作”。如果你的组织进行事件分析和回顾，你可能已经接触过这些概念。新兴的站点可靠性工程学科（一种将软件工程原则应用于运维的实践）在进行无责故障事后分析时，一直在使用这些概念。\n\
  \n作为应用开发者，我们控制着应用所能实现的功能。我们正在规定工作必须在系统上下文中如何执行。收集需求的行为，就是理解工作应如何完成（如想象的那样），并将这些流程在系统中形式化的过程。开发人员对精确性的执着在这一过程中可能是有益的，可以提出必要的问题来理解可能的边界情况。\n\
  \n在确定系统规则时，务必记住，形式化过程中存在风险因素。添加一个必须为真的约束，就排除了违反该约束的数据存在的可能性。这代表了一种风险。如果业务需要改变该决策，变更能够多快安全地完成？能够适应这种类型的变更正是我们的目标之一。\n\
  \n“必须始终为真”的事物与“可能应该为真”的事物之间存在差异。前者是规则，后者是指导方针。在我们讨论如何对规则进行分类时，请牢记这一点。\n\n## 分类\n\
  \n在我的职业生涯中，我观察到所谓的“业务规则”中存在一些共同主题，并利用这些主题构建了以下分类。\n\n### 静态数据\n\n最终，数据存储在*某个地方*。这些数据必须满足一些要求。\n\
  \n如果你在关系数据库中创建过表，你就遇到过静态数据的规则。任何在数据库模式中表达的约束都属于此类。这些约束包括可空性、唯一性和外键。某些数据库允许对列表达更复杂的约束，例如为数值定义固定范围，甚至跨表列进行约束，例如“开始日期”必须在“结束日期”之前。在\
  \ SQL 中，这些是`CHECK`约束。\n\n这些声明式约束仅限于单行，这限制了它们所能强制的内容。想象一个跟踪小部件的系统。如果有一个表示小部件可用库存的表，可能存在所有行的总和不能低于零的要求。如果每一行代表一个添加或移除小部件的操作，该表可能有一个约束，例如`CHECK\
  \ (count <> 0)`，以确保每一行的数量非零，因为有效的操作必须移动一定数量的小部件。为了表达库存永远不能为负，编写`CHECK (SUM(count)\
  \ >= 0)`似乎很直接。然而，据我所知，没有任何广泛使用的关系数据库允许以声明方式指定这种类型的约束。约束仅在单行上下文中检查，而不是整个表。表级或跨表约束需要使用触发器来调用存储在数据库中的过程代码。\n\
  \n这种从声明式约束到过程式约束的转变意味着这些约束通常是在数据库外部实现的。随着测试驱动开发，以及更广泛的单元测试和持续集成变得越来越流行，自动化测试的能力对开发者来说更有价值。数据库内的过程逻辑更难测试，因为它需要运行中的数据库软件实例。在\
  \ 2010 年代中后期 Docker 普及之前，对于大多数团队来说，实现这一目标的努力通常是不可行的，时间最好花在其他地方。对于 JVM，有一些嵌入式数据库引擎可用于测试，但它们与生产环境中必须使用的引擎确实存在差异。这促使开发者在代码中依赖数据库功能的最低公共标准。\n\
  \n如果约束仅在应用代码中强制实施，那么从哲学和实践角度来看，它是否真的始终为真就存在疑问。为了保证静态数据的约束得到强制实施，所有对数据的修改都必须通过强制机制。如果该机制不在数据存储本身内部，则必须仔细保护对数据存储的访问，以防止绕过应用直接与存储交互的修改。\n\
  \n在应用代码中强制实施约束确实可以更轻松地管理随时间变化的约束。如果约束被放宽，现有数据无需更改，因为它已经满足更宽松的约束。如果约束被收紧，例如将可选字段变为必填字段，则必须对违反新约束的现有数据做出决策。这可能是选择在应用代码而非数据库中强制实施约束的一个考虑因素。下一章将更深入地探讨时间及其与业务规则的关系。\n\
  \n\n\n*静态数据*规则的另一种形式是带有渐进状态的工作流。考虑一个正在经历工作流的实体，其数据可能需要满足不同要求才能进入下一步。想象一个允许定制自行车订单的系统。开始下单时，不需要任何必填信息。你启动了流程，做了一些选择，但随后想保存以便稍后继续。应用程序可能会将其作为工作流的一部分提供，保存你的进度。为了稍后保存订单，需要额外的必填信息——你的电子邮件地址。定制过程中有五个决策点，你可以任意选择数量，同时反复保存订单以便稍后处理。然而，要进入“准备下单”状态，这五个决策点中的每一个都必须做出选择。随着自行车订单实体在工作流中移动，数据的完整性要求是渐进的。\n\
  \n在工作流示例中有一个细微的区别：即达到下一个“准备就绪”状态所需的要求，与完成工作流下一个状态可能代表的内容之间的分离。我们的自行车订单工作流可能会区分“准备提交”和“已提交”。在工作流中，通常存在与外部系统的协调点，即副作用。\n\
  \n### 副作用\n\n应用程序通常不会孤立地运行。我们的业务应用程序几乎总是会与业务本身交互。在充当事实来源和自动化工作流时，系统内数据的更改会触发其他活动。我将这类活动统称为*副作用*。\n\
  \n这个术语借用于计算机科学，指的是修改其局部环境之外状态的函数。考虑以下函数：\n\n```\nprivate int multiply(int a, int\
  \ b) {\nvar result = a * b;\nSystem.out.println(a + \" * \" + b + \" = \" + result);\n\
  return result;\n}\n```\n\n向控制台打印输出就是一种副作用。将这个示例映射到更大的应用程序中，我们的系统相当于这个函数，而与其他系统的交互就是副作用。\n\
  \n这些是发生在数据*更改之后*的任务。你会在应用程序需求中识别出它们，因为它们通常采用以下形式：\n\n```\n如果/当 那么 \n```\n\n具体来说，它们可能会执行以下操作：\n\
  \n*   用户注册后发送欢迎邮件\n\n*   订单创建后，将信息发送到另一个系统进行履行\n\n*   付款批准后，将其发送给银行\n\n在更改系统数据*之前*与其他系统交互不是副作用，而是工作流的一部分。这种区别很重要，因为执行该交互不一定是你系统的责任。从实际实现的角度来看，它可能由系统执行，但如果发生在其他地方，工作流的整体行为也不会改变。一个工作流可能（而且很可能）会跨越多个应用程序。在考虑*你的应用程序*的规则时，这里只考虑它需要发起的副作用。\n\
  \n在实现系统时，将副作用与使前置条件成立的数据修改分开非常重要。这看起来可能是一个直接的实现，但故障模式是不可取的。如果在确保更新后的状态已成功写入数据库之前，你将订单的付款状态更新为“已批准”并将其发送给银行，那么如果数据库更新失败会发生什么？\n\
  \n我对副作用的理想实现是将其建模为状态机。你的应用程序可能是一个更大的业务工作流的一部分，理想情况下，该工作流也被建模为跨越多个应用程序的状态机。就像响应式系统组合一样，状态机也是如此。每个副作用都可以使用相同的基础模式，其价值在于如何管理故障。通过使用状态机，应用程序可以跟踪其成功执行副作用的尝试，从而允许进行适当的错误处理。\n\
  \n状态机应明确跟踪执行副作用的尝试的开始。如果在执行过程中发生故障，下一步很可能不仅仅是重复初始操作。如果我们开始发送付款但在过程中遇到故障，重试可能不是合适的操作。再次以订单批准后发送付款为例，如果发送付款失败，下一步操作将取决于我们发送付款的系统的行为。如果接收系统是幂等的，则可以重试原始操作。我们可能不会收到“成功”响应，而是收到一个表示“已处理”的“失败”响应，这表明我们的初始尝试实际上是成功的，尽管我们将其视为失败。在第一次尝试时收到“已处理”将是意外的，并且是一种错误状态。如果接收系统不是幂等的，则需要使用不同的机制来确定下一步应该做什么。\n\
  \n作为副作用执行的操作应尽可能具有幂等性。在实践中，可以通过要求调用方每次调用时提供唯一标识符来实现这一点，从而使接收方能够识别重复请求。\n\n\n\n###\
  \ 可推导数据\n\n应用程序中的所有数据并非同等重要。延续上一节的例子，小部件的总数必须始终大于或等于零。业务规则所检查的值通常也会以某种方式展示给用户。在这个例子中，它就是“可用小部件”。\n\
  \n一种直接的实现方式是：在必要时重新计算总数，将其持久化，并在用户界面中使用这个持久化的值。这是一种能够满足业务需求的有效方法。\n\n这个例子中隐含了一些相互交织的关注点，即使实现方式将它们绑定在一起，我们也应该独立地思考它们。这里涉及两条业务规则：\n\
  \n1.  对*操作*的约束，即其聚合结果必须满足的条件。\n2.  在用户界面中使用该聚合结果进行展示。\n\n这种区别可能很微妙，但我认为它很重要。对总数的约束，并非是对作为独立数据项的总数的约束。当添加一个新操作，并需要确保满足第一条规则时，你如何看待这个操作？是：\n\
  \n*   添加操作，重新计算/更新总数，然后检查它是否满足约束？\n\n还是：\n\n*   获取先前的总数，检查添加新操作是否会导致违反约束，然后再添加操作？\n\
  \n在前一种方式中，操作被添加时并未考虑约束检查，而是将推导出的总数视为约束所施加的对象。在后一种方式中，检查是针对新操作的，使用先前的总数作为一种优化手段，而不是每次都重新计算。\n\
  \n虽然第一条规则是对聚合值的约束，但这并不意味着必须存储该聚合值。这就是区别的本质所在。聚合值是*推导值*的一个例子。\n\n在为系统构建数据模型时，区分构成模型基础的最基本事实，以及在此基础上构建的衍生事实，这一点至关重要。\n\
  \n关于对静态数据的约束，提及推导值可以将其视为一个“提取出的变量”，是一种无需每次都重复其推导来源就能讨论该推导过程的方式。如果推导值*仅*用于对静态数据的约束，那么它在系统中实际上并不作为一个数据点存在。\n\
  \n如果推导值*也*用于展示目的，那么推导它的行为就是我所说的*展示逻辑*。这是业务规则的第三种分类。展示逻辑是对系统数据进行的一种**非破坏性**转换。非破坏性这一点至关重要。用数学术语来说，该逻辑应该是一个*纯函数*，对于相同的输入返回相同的结果。\n\
  \n如果展示逻辑遵循这一特性，即作为数据的非破坏性转换，那么存储其结果就不是必需的。给定输入和支持该转换的代码版本，可以得到完全相同的结果。存储推导值是一种优化，而非必需。\n\
  \n展示逻辑的另一种变体是使用来自其他系统的信息。有时这会非常直接，即原样展示来自其他系统的数据。其他时候，则是对你系统中的数据进行转换，并将来自其他系统的数据作为其输入之一。在金融系统中，货币兑换就是一个很好的例子。可能存在另一个提供汇率的系统，而使用来自该系统的汇率将你系统中的数据以另一种货币展示出来，就是展示逻辑的另一种形式。\n\
  \n将某物命名为“展示逻辑”，并不意味着该逻辑存在于我们应用程序的用户界面代码中。出于性能原因，应用程序可能会持久化展示逻辑的输出。这应被视为对结果的缓存，而非系统的基本事实。如果在你的用例中这个类比不成立，我会质疑它是否真的是展示逻辑，或者是否应被视为一个基本事实。\n\
  \n## 总结\n\n这些对业务规则的分类，有助于我们思考应用程序模型的属性。本书并不描述如何定义你的模型。相反，我关注的是如何着手实现它。实现过程会为设计提供一些反馈。我希望，根据这些类别来思考你的业务规则，将有助于澄清你的设计。\n\
  \n业务规则可以归入以下类别之一：\n\n*   对静态数据的约束\n*   数据变更时的副作用，例如启动流程\n*   展示逻辑，包括推导和聚合\n\n这些类别描述了规则与系统内数据的关系。这将在后续内容中发挥作用，因为它可以指导我们在设计的哪个位置放置实现。我们将在本书的第三部分讨论这一点。在此之前，还有一个先决条件：时间管理。时间与业务规则有着关键的交互作用，因为规则会随时间变化，它们与数据的关系也需要反映这一点。\n\
  \n"
- '# 6. 管理时间


  时间能被“管理”吗？在我们的应用程序中，我们控制着它们的通信，并由此管理它们如何了解、通信和处理数据。正是通过控制信息流，时间本身才得以管理。当我们创建业务应用程序时，我们正在建立一个业务本身的虚拟缩影。作为事实来源，应用程序创建的时间线可以成为回答“发生了什么？”这一问题的官方时间线。


  ## 回答“发生了什么？”


  在我参与过的业务应用程序中，用户经常问我一个问题：“为什么系统会有这个值？”这个值可能是计算的结果、从其他系统接收的数据，或者由用户提供。在所有这些情况下，系统都需要*记住*它的输入，才能回答这个问题。


  最简单的例子是我在上一章讨论过的关于推导数据的业务规则。规则的输入存储在系统中，推导出的值作为展示逻辑的一部分被使用。那么，增强一个计算过程，使其输出也包含其输入的副本，就变得很简单。这将允许理解该规则的观察者独立验证计算结果。


  除了这个简单的例子，事情就变得复杂了。如果一个计算结果被持久化了，我们如何知道计算时它的输入是什么？理想情况下，它们应该被记录下来，但这是明确的产品需求吗？如果不是，很可能就没有做。如果该值的持久化包含了时间戳，你可以尝试重建当时的数据是什么。


  为了回答这个问题，我们需要知道系统在*过去某个时间点*的数据是什么。如果系统在事件发生时没有追踪这些数据，那么信息最终将会丢失。这就是现状架构中的“原地修改”。




  ## 追踪变更


  在当前的架构中，你可能熟悉两种追踪变更的模式。每种模式都有不同的复杂程度。


  如果追踪变更主要是为了支持应用程序的运维人员，那么可能会使用历史表。假设有一张用于追踪客户的表：


  ```

  CREATE TABLE customers (

  customer_id   BIGINT PRIMARY KEY,

  customer_name TEXT

  );

  ```


  可能会使用以下历史表：


  ```

  CREATE TABLE customer_history (

  -- 0/1/2，分别表示插入/更新/删除

  revision_type      INT,

  revision_timestamp TIMESTAMP,

  customer_id        BIGINT,

  customer_name      TEXT

  );

  ```


  这里，`revision_type` 是一个枚举类型，表示变更的类型（插入、更新或删除），而 `revision_timestamp` 是记录变更的时间。设计时需要考虑，这条记录是
  `customers` 表中变更前的行还是变更后的行。


  如果变更追踪是应用程序的一个功能，那么有条件地查询历史表的复杂性可能并不理想。相反，可以将所有时间点的值都记录在同一张表中：


  ```

  CREATE TABLE customers (

  valid_from    TIMESTAMP,

  valid_to      TIMESTAMP,

  customer_id   BIGINT,

  customer_name TEXT

  );

  ```


  在这个例子中，`valid_from` 和 `valid_to` 捕获了两个时间点，用于指示该行数据在哪个时间段内有效。这种模型可以轻松支持“在某个特定时间点，客户的名称是什么”这类时间点查询。但在写入时会增加复杂性，因为需要插入新值，并调整前一条记录的
  `valid_to` 时间戳。这种模型如果使用 `customer_id` 作为主键也容易出问题，因为会有多行数据包含相同的值。需要一种更复杂的约束，以确保在给定的时间戳下，主键只有一个唯一的值。


  这两种方法都存在一个额外的陷阱。数据库模式是*跨时间统一的*。唯一安全的变更是放宽约束，例如将 `NON NULL` 列改为允许 `NULL`，或者添加一个可为空的新列。任何其他类型的变更要么有风险改变现有数据，要么需要修改数据。


  这带来了一个两难困境。是应该原样保留过去，还是应用程序需要以其他方式进行调整？任何解决方案都会有缺点，并导致“技术债务”。这是一个不易变更的系统。


  即使采用了上述两种方法之一，或者另一种替代方法，仍然存在一个问题：捕获*原因*。


  ## 为什么会发生这种情况？


  通过存储先前的值，我们可以看到过去是什么样子。通过比较过去的状态，我们可以看到值是如何变化的。这足以回答*是什么*。然而，我发现用户真正想问的是*为什么*。


  数据不会凭空发生变化。存在因果关系。我提到的变更追踪机制只捕获了结果，即“是什么”。数据模型本身并没有被设计用来捕获原因，即“为什么”。


  “为什么”或许可以推断出来。如果你知道在变更发生时应用程序中哪些操作是可能的，你就可以利用这些知识对数据进行模式匹配，以判断该变更是否是由某个特定操作引起的。这依赖于为每种变更类型设置特定的代码路径，但如果应用程序使用的是第
  2 章中提到的“通俗 REST”，那么这些路径可能并不存在。如果用户界面通过发送包含更新状态的有效负载进行交互，那么上下文信息就会丢失。


  我希望你对这个问题的本质有所了解。这是我们作为开发者曾经遇到并为自己解决的问题。我们在源代码中遇到过这个问题，并通过版本控制系统（VCS）解决了它。这是一个最佳实践，而且理由充分。VCS
  系统的基本功能是追踪代码库的变更，即“是什么”。当进行变更时，你可以选择提供一条消息，即“为什么”。并没有要求必须提供合理的消息。我曾与一些开发者共事过，他们将其视为一个烦人的守门人，只提供一条象征性的消息来满足要求。我向他们强调了一个观念：一条好的提交信息*解释了为什么*要进行变更。“是什么”是显而易见的，就是变更本身。虽然我明天可能还记得为什么，但一年后可能就不记得了。我曾将提交信息描述为“写给未来自己的笔记”。即使是独自工作时，我也会让它们变得有意义。


  如果追踪系统代码的所有变更是最佳实践，那么为什么追踪系统数据的所有变更不是最佳实践呢？我认为答案是**它应该是**。我相信在过去这是不可行的。追踪所有数据变更需要不断增长的存储容量。如今，现代存储系统的容量，尤其是结合按需云存储，使得这完全可行。那么，一个存储变更的系统应该如何构思呢？


  ## 事件


  当我们考虑存储变更时，它们就是事件：系统中某个操作产生的结果或输出。从这个角度看，每一次变更都是一个事件。通过存储事件，我们可以构建一个系统变更的规范时间线。一个按时间排序的事件集合就是一个日志或账本。这就是
  VCS 系统在概念上的运作方式，因为它们向我们展示了变更的历史。


  在业务应用程序中，一个事件应该包含数据的变更以及变更的*意图*。这同时捕获了“是什么”和“为什么”。事件日志对于描述过去很有用，但对于理解当前状态效率不高。遍历不断增长的事件日志来查找数据片段是不可扩展的。相反，我们可以保留所有事件所隐含的持续运行结果，并用它来回答关于当前状态的问题。在
  VCS 中，这相当于将仓库“检出”到文件系统。利用事件在特定时间点构建“世界状态”的行为称为*物化*。


  这种技术被称为*事件溯源*；将系统的变更作为事件存储，并构建这些事件的物化视图来回答问题。通过将变更表示为事件，它们就变成了消息。这让我们回到了响应式宣言；将系统数据的变更表示为事件，使得变更本身成为消息。


  我们也可以将同样的技术应用于对系统数据的*变更请求*。


  ## 命令


  命令和事件是一枚硬币的两面。它们的区别在于与系统中数据的关系。对所有系统事件进行持续更新的物化视图就是系统的*当前状态*。


  事件是向后看的。它们描述已经发生的事情。命令是向前看的。它们描述对系统状态的*变更请求*。关键词是*请求*。想要进行变更的意愿并不意味着它会被允许。是否允许，取决于针对静态数据的业务规则。


  这是来自一种称为命令查询职责分离（CQRS）模式的概念。在这种模式中，有一个模型用于处理状态变更，另一个独立的模型用于查询。这与事件溯源自然互补。事件可以以多种方式物化，一种用于服务查询，另一种用于强制执行针对静态数据的业务规则。我将后者称为*命令处理*。它是指接收一个命令，判断其是否被允许，如果允许，则确定它会产生哪些事件。


  我想指出的是，这*并非新颖*。这些想法和模式已经存在并实践了几十年。但我相信，在最近几年，它们的*实用性*或*适用性*已经发生了变化。这些是业务应用程序的宝贵实践，并且适用于面向未来的现代架构。




  ## 理解时间


  我从历史视角开启本章，探讨如何回答“发生了什么？”这个问题。由此引出了将事件作为一种细粒度方式来记录*发生了什么*以及*为什么发生*。命令是事件的前身，而事件可用于构建状态的概念。这些概念清晰地映射到时间上。命令代表未来，事件代表过去，而状态则是当下。


  这使我们能够在系统内部构建一条局部时间线。通过仅物化部分事件，就可以实现时间旅行回到过去。不过，这只是一条*局部*时间线。让我们暂且偏离主题，探讨一下*时间代表什么*。


  时间是沟通*何时*发生的一种手段。沟通需要一个共同的参照系。在地球上，我们使用协调世界时（UTC）。


  当接收到关于某事或某个事件*何时*发生的通信时，有两个维度值得关注：


  1.  事件*实际发生*的时间。


  2.  你*意识到*该事件已经发生的时间。


  这两个时间点都是离散的时间点。**它们总是不同的！** 有时，差异微乎其微，比如你执行的操作，但并非总是如此。


  如果你触摸炉子，在你意识到炉子很烫之前，你的手指就已经被烫伤了。这是一个关于信息传播延迟的直观例子。时间点 1 和 2 之间的间隔虽然短暂，却足以烫伤你的手。你需要*意识到*某个事件并对其采取行动。只有当你意识到炉子的温度时，你才能移开手。


  在许多系统中，这两个维度被混为一谈。系统接收到信息的时间最终被当作事件发生的标准时间。理解这一点很重要：这是一种虚构，如果系统有多个事实来源，就会导致差异。


  ## 时间的序列化


  最终，一个应用程序会生成一条关于“发生了什么”的单一时间线。在许多应用程序中，这并没有被显式管理，而是委托给了存储数据的关联数据库。然后由事务隔离级别来控制时间如何流动。只有一种模式能提供完全一致性，即`SERIALIZABLE`（可序列化）。它并非任何主流关系数据库的默认设置。我推测部分原因是性能，部分原因是它给应用程序开发者带来的负担。


  大多数数据库的默认设置允许开发者以一种通常不会产生错误的方式操作数据库。错误会足够罕见，以至于错误可以沿着调用栈向上传播很远，或许最终导致用户需要重试某个操作。


  `SERIALIZABLE`则不同。它要求所有交互都严格线性化。如果某个修改会违反这一点，就会返回一个错误，并且必须重试该事务。这就要求应用程序开发者将与之交互的数据库代码结构化，以支持多次调用。如果业务规则的类型相互混杂，例如执行副作用操作，就存在多次执行副作用的风险。


  归根结底，数据库的事务日志是一个已执行更改的有序列表。它是一个*事件日志*，隐藏在数据库内部。


  通过将变更请求表示为命令并将其存储为事件，我们将这个事件日志提升到应用程序层面，使系统能够将其作为一等公民来使用。这让我们能够*控制*时间的序列化。在决定处理命令的顺序时，我们就是在构建一条时间线。


  ## 最终一致性


  时间的序列化提供了局部一致性。然而，我们的应用程序并非在真空中运行。它们是业务的一个*事实来源*，但并非所有事实的*唯一*来源。最终一致性指的是信息随时间传播的过程。当系统
  B 意识到系统 A 中的变化时，B 与 A 就*最终一致*了。


  不存在唯一真实的时间线。在一个由众多应用程序组成的大型系统中，每个应用程序对事件发生的顺序都有自己的视角，因为每个应用程序都会独立地意识到事件的发生。


  通常，这可能是可以接受的。通过使用事件来沟通发生了什么，每个应用程序可以记录自己何时意识到信息，从而在局部回答“发生了什么”的问题。然而，在商业应用中，有时事件*何时*发生也很重要，这也必须被追踪。


  ## 双时态


  双时态是指追踪*两个*时间维度：事件发生的时间，以及系统意识到该事件的时间。在业务领域，追溯性政策就是一个例子。


  想象一个忠诚度计划，购物可以获得积分。积分是一种货币形式，可以在商家处消费。未使用的积分在一段时间后过期。在我们的例子中，积分在获得一年后过期。


  积分追踪应用程序是一个独立的应用程序。它从业务的其他地方消费交易事件，以追踪其积分余额的状态，并直接管理用于消费积分的事务。因此，它追踪两个时间点：它意识到交易的时间，以及交易实际发生的时间。它是双时态的。


  我“今天”的积分余额取决于该应用程序与交易事件流同步的最新程度。积分是根据交易发生的日期授予的，而不是根据积分追踪应用程序看到它的时间。


  对于过去的任何一个时间点，积分余额都有两种视图。基于*当时*已知信息的积分余额是多少，以及基于*现在*已知信息的积分余额是多少。


  一个保留两个时间戳的事件日志使得回答这些问题变得简单直接：一个交易时间，一个接收时间。要回答基于当时已知信息的余额是多少，只需查阅接收时间早于所查询时间的事件。要回答基于所有可用信息的过去余额是多少，则会使用交易时间。


  在这个假设的系统中，交易时间可能是主要使用的时间戳。然而，记录接收时间仍然有价值。如果忠诚度计划的客户对他们的积分余额有疑问，拥有接收时间的信息对于解答问题可能是无价的。数据是有价值的，最好在可能的时候捕获它。


  除了这个人为的例子，还有一种普遍适用的双时态形式：不断变化的业务规则。




  ## 业务规则变更


  我曾将*可变更性*视为业务应用的重要属性。业务会发生变化，而软件适应变化的速度可能成为制约因素。


  事件流可被视为时间流。随着事件发生，时间流逝。事件不必局限于*数据*的变化，它们也可以代表*行为*的变更。


  以忠诚度计划为例，设想其在航空公司的应用场景。可能会出现某种情况（例如全球疫情），航空公司希望将所有积分的有效期延长一年。也就是说，如果你有在特定时间段内即将过期的积分，其有效期将延长一年。而在接下来一年中累积的任何积分，则应拥有两年的有效期窗口。应该如何对此建模？


  一种方法是使用*事件*来表示规则变更。当应用正在物化事件时，它会将规则变更事件作为标记来调整自身行为。通过将业务规则变更纳入事件日志，可以丰富事件日志作为事实来源的价值。


  这一想法的实现方式可以多种多样：事件可以非常具体，在物化过程中调用目标代码；如果该规则需要频繁调整（例如用于短期促销活动），事件也可以包含参数。


  通过*掌控时间*，我们有机会在应用内部实现更丰富的功能。它还能让我们更深入地回答“发生了什么”和“为什么发生”的问题，因为数据和规则都可以被检视。


  ## 总结


  我们涵盖了以下内容：


  *   随时间追踪数据变化

  *   什么是事件和命令

  *   事件发生时间与系统感知到事件发生时间之间的差异

  *   随时间管理业务规则变更


  第二部分到此结束。我讨论了响应式系统、业务规则和时间。我认为在提出业务应用设计方案之前，理解这些概念非常重要。下一部分将运用这些概念来构建设计方案，并最终实现落地。


  '
- '# 第三部分 设计


  '
- '# 7. 约束与原则


  设计时间到了！本书的前两部分是背景铺垫。我需要确保我们对业务应用有共同的理解，并了解当前常用的模式。随后，我通过响应式宣言介绍了响应式系统，并阐述了为何要将业务应用构建为响应式系统。最后，我描述了对业务规则的分类，以及时间为何是一个重要（且有时被低估）的维度。


  本书的这一部分将致力于我提出的业务应用设计方案。这一路径的第一步是引入一些对设计的自我约束，以及将指导架构的自主选择原则。让我们开始吧。


  ## 约束


  我想对设计施加两个约束，它们都围绕应用如何向用户界面呈现自身。我将简要提及它们，然后进行更详细的解释。


  第一个约束是支持并鼓励以支持数据实时更新的方式构建用户界面。第二个约束是使用 GraphQL 来驱动用户界面体验。


  ### 从 REST 到图


  我在第 2 章简要提到了 GraphQL，它值得全面描述。让我们退一步思考它的发展历程，以此解释为何我认为它是一项重要技术。


  可以将系统内部的数据视为一个巨大的图。URL 的层级路径部分被用作索引到这个概念图中的方式。这是构建数据 API 的基础。例如，端点 `/api/v3/customers`
  会列出所有客户。要访问特定客户，其键值会作为另一个路径段附加，如 `/api/v3/customers/42`。客户有多个地址，这些地址可以在 `/api/v3/customers/42/addresses`
  下列举。然后可以通过 `/api/v3/customers/42/addresses/67` 访问特定地址。


  这种对数据图的层级索引有两个缺点：


  1.  遍历需要多个请求。

  2.  没有直接的机制来指示每个请求中需要哪些数据。


  在我们业务应用的规模下，这些缺点通常不是障碍。然而，对于两家硅谷公司——Facebook 和 Netflix——来说，这些缺点足以促使它们同时开发替代方案。它们都基于使用路径层级和每个路径上的数据来形成系统数据的统一图这一理念。我将首先讨论
  Netflix 的解决方案。


  ### Falcor


  Netflix 开发了一项名为 Falcor 的技术。^(¹⁰) 它将统一数据图视为一个单一的 JSON 文档，并允许 JSON 的层级特性包含循环，从而对图进行建模。调用者随后提供一个“路径”（语法类似于但不完全等同于
  JSONPath），以指示要加载图的哪些部分。这使得用户界面能够*精确地*在单个请求中获取所需内容。Netflix 的模型是从返回 JSON 片段的层级路径的明显演进，因为它将所有内容整合到一个端点中，允许用户界面指定超出
  URL 路径范围、深入到 JSON 负载中的路径。


  ### GraphQL


  Facebook 采用了略有不同的方法，即 GraphQL。它也基于系统是一个巨大图的概念。GraphQL 有一个用于描述图的模式。图节点是对象类型，每种类型由字段组成。一个关键的区别在于，GraphQL
  中的字段可以接受参数。GraphQL 不应被视为纯数据图，而应被视为*函数*图。就像可以向 REST 端点传递查询参数一样，也可以对 GraphQL 类型的字段执行相同操作。


  与 Falcor 不同，GraphQL 并不强加图是单一概念 JSON 文档的观点。Falcor 使用文档抽象作为机制，为其基于路径的访问提供图的“根”，而 GraphQL
  在图中有一个特殊类型——`Query` 类型，其字段定义了图的入口点。


  函数图的抽象还允许 GraphQL 拥有数据修改的解决方案，这是它保留的另一种 REST 行为。修改（用其术语称为变更）是通过请求另一种特殊类型——`Mutation`
  类型的字段来执行的。


  尽管 Falcor 和 GraphQL 都在 2015 年相隔一个月内发布，但 GraphQL 取得了更大的成功。我认为这是因为它在替代 REST 风格访问模式方面提供了完整的解决方案。




  ### 为什么选择 GraphQL


  GraphQL 的地位与 SQL 类似。它定义了数据模型以及与之交互的方式，但其核心并未规定其他内容。其[规范](https://spec.graphql.org/June2018/)
  ^(¹¹) 侧重于如何定义模式以及为满足查询而应使用的执行模型。虽然有约定俗成的做法和库支持通过 HTTP 暴露服务，但规范底层的抽象性也允许采用其他传输方式。


  通过定义模式，并鼓励 GraphQL 用户从定义模式开始，GraphQL 服务实现了自文档化。GraphQL 要求客户端*精确*指定他们希望检索的数据，没有对类型字段进行通配的机制。这使得每个字段的使用情况都可被追踪。当与内置的弃用机制结合使用时，就具备了支持模式演进的必要元素。


  对于构建用户界面（这也是业务应用的目标之一），有许多工具可用于与 GraphQL 服务交互。在我撰写本书时，React 是创建 Web UI 的主流技术，其生态系统深受
  GraphQL 影响。即使趋势发生变化，GraphQL 仍然适用。


  ### 实现实时性


  我认为业务应用应具备与消费级应用相同的实时能力。我在第 2 章提到现状时曾提及这一点。`XMLHTTPRequest` 使得无需刷新页面即可加载数据，但它仍保留了请求/响应模式。还有两种额外的
  Web 技术允许将数据流式传输到浏览器：服务器发送事件（SSE），这是一种仅推送的机制；以及 WebSocket，它允许建立基于双向推送的通道。这两种技术现已广泛部署并可供使用。然而，有效使用它们需要一个架构上适合此类实时交互的系统。


  这是使用 GraphQL 的另一个原因。GraphQL 拥有第三种特殊类型，即 `Subscription` 类型。订阅字段返回一个值的*流*。当与 SSE 或
  WebSocket 等流式传输结合使用时，GraphQL 可以作为查询、变更和实时更新的单一解决方案。


  ## 原则


  在开始一个项目之前，我喜欢制定一套清晰可表述的开发原则。明确一套原则有助于为你的团队成员以及任何可能负责系统未来维护的人提供指导。作为原则，它们是努力追求的价值。与约束不同，它们是指导方针，而非硬性要求。我将首先列举这套原则，然后逐一讨论：


  *   永不遗忘


  *   消息驱动


  *   读写分离


  *   部分可用性


  *   设计灵活性


  *   模块化


  *   可测试性


  *   易于变更


  ### 永不遗忘


  这个措辞源自一家我成长时期存在的软盘公司——大象内存系统（Elephant Memory Systems）。他们的标志是一张大象的脸，下方写着“永不遗忘”。这是对谚语“大象永不遗忘”的致敬，这个说法一直留在我心中。


  正如我在上一章关于时间的讨论中所提到的，有一些技术可用于让系统保留先前状态。对于开发者来说，将所有代码变更记录在版本控制系统中是最佳实践。同样，对业务应用进行类似的架构设计也应当成为最佳实践。业务应用中包含的数据可能对业务成功至关重要，默认策略应该是追踪所有变更。


  “永不遗忘”更进一步，因为它不仅仅是记录新状态的简单机制，而是记录变更背后的意图，记住“是什么”和“为什么”。


  作为一项原则，我认为应该在项目开始时就将这一点纳入。除非在变更发生时就被捕获，否则这些信息将永远丢失。


  ### 消息驱动


  这一原则直接取自响应式宣言（Reactive Manifesto）。我在第三章介绍响应式系统时讨论了其基础。同样，这一原则最好在项目开始时就被遵循。为未设计此类通信方式的系统改造消息传递机制可能颇具挑战。通过从一开始就采用消息驱动，系统便具备了利用宣言中其他特性（弹性、韧性和响应性）的基础。


  这里有一个关键的控制方面。通过将系统中的内部通信具体化为消息，我们获得了对它们的控制权。消息成为可由代码操作的离散项。消息传递是“面向对象编程”（OOP）背后的原始思想之一。开发者通常并未意识到这一点，因为对象提供的封装特性往往更为突出。


  我们希望在我们的系统中复用封装和消息传递的思想。交换消息的组件将比面向对象的领域模型粒度更粗。我们需要在实现语言提供的基础之上，建立消息传递的设施。并非所有语言都允许在对象之间动态处理消息，Ruby
  和 Objective-C 是两个显著的例外。即使我们使用其中一种语言来实现系统，我们仍然希望在语言设施之上建立一种机制来操纵消息流。




  ### 读写分离


  系统的读写访问模式通常并不对称。对于用户规模较小的年轻系统而言，这通常不会带来问题。用户数量少且运行时间短，意味着数据量和变更率都较低。


  随着系统逐渐成熟，其中包含的数据量通常会随服役时间而增长。在我们提议的系统中，由于还需要存储历史状态，这一问题将更加突出。


  我们的业务应用将为业务提供两大功能：数据录入和决策支持。数据录入的访问模式通常要求具备“读取自身写入”的能力。对系统做出更改的用户非常清楚应用程序现在应该显示什么内容，他们期望读取结果与自己执行的写入操作保持一致。这类活动在经典定义中被称为在线事务处理（OLTP）。


  决策支持则有所不同。在此用例中，系统的用户通常不会修改数据。他们运行报表，并向应用程序提出复杂的聚合查询问题。由于不进行修改，用户不会注意到数据是否略微过时。所提出的问题也可能完全容忍过时数据，因为他们总是在回顾一个固定的时间段。想想每日运行的报表，只要数据在报表执行时是最新的，就满足了报表的要求。这类活动被称为在线分析处理（OLAP）。


  在大型企业中，OLAP 活动通常跨业务部门或其下属分支所使用的系统进行。一个系统的数据会被复制到一个中央存储库，该存储库汇总来自其他系统的信息。


  你的系统用户可能也有类似的需求，我发现这是一个常见的请求：应用内分析和报表。


  当使用关系型数据库时，一个自然的解决方案是添加数据库的只读副本，并用它来满足这类请求。然而，一个在设计之初并未考虑此点的系统，在引入另一个数据库主机并恰当使用它时，可能会面临挑战。


  因此，这一原则旨在通过早期解决这些问题来规避未来的麻烦。如果系统在设计时就为读取和写入规划了独立的路径，那么系统在此维度上就易于变更。初始实现很可能为所有功能使用单个数据库实例。通过提前引入逻辑分离，当未来需要物理分离时，对系统进行修改将更加容易。


  ### 部分可用性


  我们的业务应用对业务至关重要，这也是业务对其进行投资的原因！它们需要在*业务需要时*保持可用。历史上，在互联网广泛普及之前，商业软件的使用通常与工作时间挂钩。虽然某些领域已经全天候运行多年，但其他领域则相对奢侈地仅在本地工作时间使用。


  系统有规律的闲置期，为执行维护活动创造了一个天然的窗口。有了这样的机会，就有可能将系统完全离线以进行工作。随着应用程序开始拥有面向外部的组件，例如面向业务客户的用户界面，或与客户/供应商系统的
  API 集成，将应用程序完全停止服务变得越来越困难。


  作为一项原则，部分可用性是指能够仅将系统的*一部分*下线进行维护或升级。它也是指仅让*一部分*发生*故障*的能力。这是一种弹性形式，是响应式宣言所期望的特性之一。


  部分可用性的粒度将取决于你的业务领域和应用程序的性质。存在一些横切性的粗粒度方面，例如对读取可用但对写入不可用。特定领域的方面则需要与业务协调，以确定故障模式的“爆炸半径”可能是什么。


  部分可用性更常规的用途是围绕定期维护和系统升级。其最大价值体现在故障发生时。通过在系统中实现概念上的“隔舱”，只有系统的一部分会失效。这有助于在故障修复期间减轻运维人员的压力。处理关键系统的中断总是充满压力。遵循这一原则，可以将中断限制在受影响的子系统内，从而仅影响依赖该子系统的用户。这并非万能药，但在缓解处理中断人员压力方面可能价值连城。


  对部分可用性的简洁描述是：能够在降级状态下运行，而不是处于非此即彼的“运行或停止”状态。


  ### 设计灵活性


  软件中的灵活性是一个模糊的话题，因为对于什么是灵活的软件，并没有明确的定义。我对设计灵活性的定义是：系统设计的任何方面都应有多种实现选项。在实践中，我发现这意味着要考虑软件未来可能的发展路径，并尽可能*不排除*这些可能性。


  未来，尤其是在软件项目中，是出了名的难以预测。与敏捷宣言一致，这是响应变化而非遵循固定计划。我们的方法是响应变化，而设计灵活性则关乎为未来保留选择余地。


  随着系统成熟，有时做出会排除某些未来演进路径的决策是合理的。这是对设计灵活性的削减。此时，项目上积累的智慧将有助于最小化这些决策的影响。这不是一个可以轻易做出的决定，因为逆转这类决策可能代价高昂。然而，在某些情况下，这可能是恰当的行动方针。


  在启动新项目时，尤其是在项目早期，为未来的可能性保留空间是有价值的。这就是这一原则的精髓。




  ### 模块化


  “模块”是一个被过度使用的术语。除了软件领域，它还用于许多其他领域，例如货架、沙发，甚至建筑。在这些领域中，模块的粒度或特异性各不相同。然而，模块与整体的关系是明确的；模块是粗粒度的细分，可以通过包含或排除来重新组合，以产生新的变体。


  在软件领域，微服务就是新的模块。它们是离散的功能单元，被打包成可独立部署的单元。不过，最后这一点并非必需。如今备受诟病的“单体”架构（即只有一个可部署单元）并不意味着系统的内部结构像一盘意大利面。盲目追随微服务趋势而不关注整体架构，会导致*分布式*意大利面。软件单元如何组合仍然至关重要。


  解决之道是创建一个模块化系统，其中模块以指定的方式交互。模块的部署是一个独立的问题；一个极端是每个可部署单元对应一个模块，即微服务架构。另一个极端是单体架构，或者正如某些人所创造的“[模块化单体](https://twitter.com/gernotstarke/status/901496976612655106?lang=en)
  ^(¹²) 。”


  模块化的原则是避免意大利面式的系统。独立于部署单元，一个系统必须被良好地分解为对代码和业务都有意义的模块。模块可以作为部署和开发人员工作并行化的一个维度。


  通过将系统视为模块，然后让模块通过异步消息传递进行通信，将模块迁移到新的部署单元不会改变其与系统其余部分的交互模式。模块化与响应式系统是一致的。


  ### 可测试性


  软件总会有缺陷。我继续在我编写的代码中犯错误，你也会如此。为了弥补这一点，我们测试我们的工作。测试软件是一项机械性的任务，非常适合自动化。可测试性是指编写软件，使得编写自动化测试变得简单直接，从而降低编写测试的门槛。


  这个原则在其他方面有些模糊。可测试性*究竟*是什么？我发现测试驱动开发（TDD）是一种有助于我工作的机制。从测试开始，你就是你将要编写的代码的消费者。这种 API
  的消费者优先视角有助于确定测试将覆盖的边界。这与模块化（理想情况下，测试应尽可能隔离到单个模块）以及模块本身的内部结构有着重要的相互作用。


  这个原则也与响应式系统高度一致。发生消息传递的边界也是单个测试将覆盖的良好边界。总体目标是鼓励为我们的系统编写测试。


  ### 易于变更


  我把最喜欢的这个原则留到了最后。这种“易于变更”的表述，是本书中反复出现的主题。我曾读到过一句俏皮话，可以转述为：


  > *愿你的系统服役足够久，以至于被视为遗留系统。*


  当“遗留”一词应用于软件系统时，往往带有贬义。从事遗留系统的工作不受欢迎的情况并不少见。这是为什么？我认为这与这个原则有关。在一个不易变更的系统上工作是令人沮丧的。导致这种情况的因素有很多，例如缺乏测试、业务规则交织、没有或很少进行模块划分。这样的系统不会遵循本章前面阐述的原则。


  创建业务应用程序是业务方的一项投资。如果一个使用不到一二十年的应用程序需要重写，我认为这通常是系统架构的失败。但这并非必然。


  除了为系统的长期成功奠定基础之外，这也符合敏捷开发的精神。通过强调与系统用户合作以满足他们的需求，并承认变化会发生，易于变更成为一个隐含的要求。


  这种理念既是前述原则的一个方面，本身也是一项原则。我们希望我们的工作受到重视，并为业务的整体生产力做出贡献。这个原则就是为了确保在我们的系统预期生命周期内实现这一点。这个原则的阴暗面是过度工程化。*易于*这个词是经过精心选择的。这并不意味着每个变更都必须简单甚至直接。而是说变更的可能性已被考虑，并且实现变更的步骤不会与程序的基本约束相悖。


  ## 总结


  本章为我们的系统设计奠定了基础。我声明了一些自我施加的约束，然后是一套指导设计本身的原则：


  *   GraphQL API


  *   实时 UI 更新


  *   永不遗忘


  *   消息驱动


  *   读写分离


  *   部分可用性


  *   设计灵活性


  *   模块化


  *   可测试性


  *   易于变更


  牢记这些原则，本书本部分的剩余内容将逐步推进到我们系统的设计。下一章将通过介绍高级数据流并建立一些核心模块，更接近实现。


