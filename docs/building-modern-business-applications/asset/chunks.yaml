  trans: '

    ### 命令处理器


    命令处理器负责维护一类业务规则，即针对静态数据的规则。它接收一个命令作为输入，该命令是改变系统状态的请求。您提供的函数（称为变更器）会接收命令和当前系统状态，并负责生成一组描述该命令希望执行变更的事件。您提供的另一个函数（称为应用器）会接收事件和系统状态，并返回一个包含事件所描述变更的新状态实例。应用器和变更器都是纯函数，即没有副作用的函数。状态实例是一个不可变的数据结构，包含执行业务规则所需的状态。


    这三项内容——应用器函数、变更器函数以及状态——是命令处理器中特定于应用程序的部分。命令处理器实现的其余部分则与这些函数内部的逻辑无关。


    在第 9 章中，我描述了如何单独测试应用器、变更器和状态。它们也可以在不使用命令处理器本身的情况下，在测试中进行编排。


    ### 命令生成器


    命令生成器负责根据变更请求（例如系统的 GraphQL 变更操作）创建命令。它通过将命令追加到命令日志中来提交命令进行处理。然后，它负责等待命令的处理结果，并将结果传达给调用方。


    第 10 章中描述的测试主要围绕该组件的机械基础设施，而非创建命令的领域特定工作。我将领域特定逻辑的测试推迟到本章进行。


    ### 事件物化器


    事件物化器维护用于响应 GraphQL 查询的有状态视图。


    与命令生成器类似，我在第 11 章中描述了如何单独测试事件物化器本身。检查点基础设施和视图维护的编排可以使用与您的实际领域无关的简单事件进行测试。这让我们有信心在将物化函数用于领域事件之前，事件物化器本身能够正常工作。与命令生成器一样，我认为事件物化器中特定于领域的部分最好通过测试组合后的数据流来进行验证。


    ### 组合数据流


    从写入到读取，变更请求以 GraphQL 变更操作的形式传达给系统。命令生成器将变更操作输入转换为命令，并执行与外部系统必要的通信。它将命令提交到命令日志，从而确定执行顺序。命令处理引擎一次从命令日志中消费一个命令。对于每个命令，它会调用您的变更器函数来创建该命令所隐含的一组事件。然后，它会调用您的应用器函数来推进命令处理器的状态。如果这两项操作都成功，事件将被追加到事件日志中，并且已处理的命令会连同其处理结果一起被记录。


    命令生成器正在等待这个处理结果。如果命令失败，则返回详细的错误信息。否则，返回该命令生成的最后一个事件的序列号。


    事件物化器正在从事件日志中消费。一旦事件被追加，它就会开始更新有状态视图。这与向调用方传达命令处理结果是并行进行的——当然，仅针对成功的命令，因为失败的命令不会产生任何事件。


    为了观察其变更，调用方可以执行 GraphQL 查询，并将变更操作响应中的序列号作为所需最小视图版本的指示器。这为进行变更的调用方提供了写后读一致性。调用方还可以使用主动的
    GraphQL 订阅来观察变更。在事件物化器更新视图后，他们将收到一个订阅通知。


    为了以能够确信系统能够处理调用方请求的方式来测试系统，有必要执行这个组合后的数据流。

    '
- fmt: '# Testing the Composed System


    I think tests for a system (or service) aren’t fully appreciated. In the past
    several years the idea of a “test pyramid” has been spreading, originating from
    Mike Cohn’s book *Succeeding with Agile*.^([^(16)](#fn16)) The body of the pyramid
    is composed of comparatively more isolated and faster unit tests. The top of the
    pyramid is more integrated and slower UI tests. The middle is comprised of service
    (or system) tests. When done well, systems tests can provide high levels of confidence
    in a system and be performant. With a mix of using containers, the ease of running
    tests on cloud-based machines, or even remote development environments, the speed
    penalty is evaporating. I also believe there is sometimes the perception that
    any tests more complex than unit tests are slow and expensive.


    My approach for system tests is to test what is valuable. I value system’s external
    API contracts, in our case the GraphQL schema, as well as any infrastructure used
    to satisfy the API contracts. The event materializer maintains a stateful view.
    If another system is used to store the view (e.g., a database), then the tests
    should use an actual instance of that system. Containers have greatly helped here
    as they provide a normalized contract for managing the lifecycle of this class
    of resource.


    GraphQL is often delivered using HTTP. For system tests, I avoid this, preferring
    to interface with my GraphQL implementation directly. The interface between a
    GraphQL implementation and the HTTP endpoint exposing it is testable in isolation.
    This is the same philosophy applied to the event materializer tests. The component
    is providing functionality that is ultimately agnostic as to what operation it
    is performing. The event materializer isn’t concerned with how any given event
    affects the stateful view. The interface between the HTTP endpoint and the GraphQL
    implementation is similar, and because it exists as the edge of the system, easily
    bypassed.


    I believe the composed system, everything necessary to satisfy the GraphQL API
    can be tested as a whole; a single *unit*, if you need to phrase the argument
    in that nomenclature. Our system needs to uphold its external contracts, and testing
    from a similar vantage point as the system’s users provides greater confidence
    that the test results will be reflective of how the system behaves in production.


    A corollary of testing our system from the perspective of external contracts is
    that the same can be applied to any systems that ours needs to collaborate with.
    If the command generator needs to interrogate another system in order to create
    a command, a stub implementation of that other system can be used in our tests
    provided it satisfies the other system’s contract. I find this perspective also
    avoids the creation of a distributed monolith, the requirement to release multiple
    services in lockstep due to their interdependencies. If contracts between systems
    are underspecified, perhaps even to the point of not existing, developers can
    lean toward using live instances of collaborating systems for tests. A well-specified
    contract allows for the creation of alternate implementations, a contributing
    factor in avoiding this type of coupling within tests.


    For our system, an implementation should allow the instantiation of the GraphQL
    interface, command generator, command processor, event materializer, and any additional
    required services. It is the essence of the entire system, ready to be exposed
    via HTTP when deployed.


    This instance of the composed system is sufficient to test the composed data flow.
    The type of tests are also ones from an under-appreciated paradigm, property-based
    testing.


    # Introducing Property-Based Testing


    When explaining property-based testing to colleagues, I first root their understanding
    in what they know. Most developers are familiar with tests that take the following
    form:


    ```

    @Test

    void shouldCalculateScore() {

    var customer = new TestCustomer();

    var calculator = new ScoreCalculator();

    assertEquals(10, calculator.scoreFor(customer));

    }

    ```


    This type of test is an example-based test. The rationale for the name is straightforward,
    the test is asserting the score for a specifically created customer. Consider
    how I have just provided you with an example of a familiar test.


    It can be hard to create general assertions about the behavior of the score calculator.
    How much of the implementation is exercised by that one test customer?


    Developers will often use their knowledge of the implementation to craft multiple
    examples to exercise different code paths in the implementation. Together, these
    examples build confidence that the tests provide confidence to the system’s behavior
    when deployed.


    There is a limitation with this approach; as complexity in the inputs to the unit
    under test increases, so must the number of examples. I have found that this does
    not integrate nicely with the desires of most developers to minimize the volume
    of code they need to author, especially when the code is highly repetitive. There
    are techniques that test frameworks offer to help minimize repetition, but ultimately
    if you have 100 examples, you will have at least 100 of *something* within the
    codebase.


    It is this that led me to property-based testing. The premise is straightforward:
    rather than testing specific examples of inputs and outputs, test the properties
    of the unit for all possible inputs. In practice, testing all possible inputs
    is often infeasible. Frameworks that support property-based testing will instead
    start with a random seed value and use that to generate a set of inputs. Should
    one of the inputs fail the random seed value can be provided to the framework
    to reproduce the scenario for developers to fix.


    Literature on property-based testing often uses symmetric functions in their examples.
    For any object `A`, if it is serialized to an external representation and deserialized
    again, it should equal the original value. Mathematically, this would be written
    as `A = deserialize(serialize(A))`.


    The approach I find powerful is the usage of a *test oracle*. A test oracle is
    a component that can provide the expected output for a given input without knowledge
    of how the non-test oracle is implemented. If your initial reaction is that this
    requires a second implementation of a unit’s logic, you are correct!


    When using property-based testing combined with a test oracle that can provide
    the expected output for a given input, you are writing a second implementation
    of the unit’s logic. I believe this is a good thing. To be an effective oracle,
    it must not depend on the implementation that is under test. It is a wholly separate
    implementation. Since it is code that is only used for testing, it does not need
    to be as resilient as code that runs in production. It can be simplified for the
    task at hand.


    Consider this a developer’s version of double-entry bookkeeping. Just as accountants
    use two ledgers to ensure correctness of their books, as developers we can have
    two implementations of our business logic. By implementing business logic twice,
    each one independent, they act as a cross-check for each other. The implementations
    will help you ensure that the other is doing what it is intended to do.'
  raw: '## Testing the Composed System


    I think tests for a system (or service) aren’t fully appreciated. In the past
    several years the idea of a “test pyramid” has been spreading, originating from
    Mike Cohn’s book *Succeeding with Agile*.^([^(16)](#fn16)) The body of the pyramid
    is composed of comparatively more isolated and faster unit tests. The top of the
    pyramid is more integrated and slower UI tests. The middle is comprised of service
    (or system) tests. When done well, systems tests can provide high levels of confidence
    in a system and be performant. With a mix of using containers, the ease of running
    tests on cloud-based machines, or even remote development environments, the speed
    penalty is evaporating. I also believe there is sometimes the perception that
    any tests more complex than unit tests are slow and expensive.


