- fmt: "# 排版后的内容\n\nWhen using multiple command processors, you will need to decide\
    \ whether the event sequence number space is shared across all processors, creating\
    \ a total order across all events, or if sequence numbers are per command processor.\
    \ Each approach has its merits. If all command processors share the sequence number\
    \ space, the existence of partitioning in the command processors can be hidden\
    \ behind the system’s external contracts. The semantics of `visibleAsOfRevision`\
    \ is unchanged. However, sharing the sequence number space has a coordination\
    \ cost when generating sequence numbers as well as when waiting for the event\
    \ materializer. The single scalar value of `visibleAsOfRevision` does not indicate\
    \ which event log contained the event. When using checkpoints for read-after-write\
    \ consistency, it will be necessary to wait for the event materializer to have\
    \ materialized the revision across *all* the event logs. This is unlikely to be\
    \ a good long-term solution, but it is a very viable option if multiple command\
    \ processors and parallel event materialization are added to an existing production\
    \ system. The existing semantics are preserved, along with the existing performance\
    \ characteristics. At the cost of changing the mutation response, the single scalar\
    \ `visibleAsOfRevision` can be paired with another value that indicates the event\
    \ log the revision is from. The command generator is reading from the processed\
    \ command log to determine a mutation’s disposition, making this a natural place\
    \ to store this information. Callers can then provide the pair of values during\
    \ queries in order to read their writes. If sequence numbers are per command processor,\
    \ it will be necessary to change the external contract first, requiring callers\
    \ to provide another value to indicate which event log contains their events.\n\
    \nIn any combination of scenarios, there is a migration path toward implementing\
    \ the parallel materialization of events in an active system.\n\nThis and the\
    \ prior two sections have focused on system changes that can be described as performance\
    \ improvements. The next three sections describe additional ways of using GraphQL\
    \ with the system.\n\n## Command and Event Logs As GraphQL Subscriptions\n\nThe\
    \ prior chapter introduced a Java interface describing a message log, the generalization\
    \ of the system’s command, and event logs from Chapter [9](#511062_1_En_9_Chapter.xhtml).\n\
    \n```java\ninterface MessageLog {\n    Flux messages();\n    Flux messagesSinceSequence(long\
    \ seq);\n}\n```\n\nThis Java interface can also be expressed in GraphQL.\n\n```graphql\n\
    type Message {\n    sequence: Int!\n}\ntype Subscription {\n    messages(sinceSequence:\
    \ Int): Message\n}\n```\n\nGraphQL does not have generics, so I have created a\
    \ `Message` type instead of `T` for the example. GraphQL does not have a `Long`\
    \ scalar, owing to its browser-based roots; it is limited to 32-bit numeric values.\
    \ It is possible to define custom scalar types, which I recommend, to bypass this\
    \ limitation.\n\nAn implementation of the `MessageLog` interface can be backed\
    \ by code that uses GraphQL subscriptions to consume messages from other hosts.\
    \ The possibility of doing this without changing the interface speaks to the simplicity\
    \ and power of both the interface, and the Reactive Streams abstraction that it\
    \ uses.\n\nAll the system’s internal message logs can be exposed in this manner.\
    \ I have found this beneficial in my work for several reasons. The initial impetus\
    \ to extend the system in this way was to observe the production system. Being\
    \ able to use standard GraphQL tooling, such as the browser-based GraphiQL IDE,\
    \ was very valuable. It provides a safe way to observe the incoming commands and\
    \ generated events. It ensured tight control over the credentials to my production\
    \ system’s database. Developers should not be modifying the datastore of the system\
    \ directly. The system is making assumptions about the data in the database. For\
    \ command and event logs, that they are immutable once written. For the stateful\
    \ view maintained by the event materializer, that it is the only one that is making\
    \ state changes. Providing access to the message logs as GraphQL subscriptions\
    \ makes them available for debugging while also ensuring that they are read-only.\n\
    \nThese GraphQL subscriptions are also an opportunity for regression testing.\
    \ Consider the case where extensive changes have been made to the command processor’s\
    \ mutator and applicator functions. While the use of property-based testing introduced\
    \ in Chapter [12](#511062_1_En_12_Chapter.xhtml) provides a great deal of confidence,\
    \ it can sometimes be beneficial to know that what happened in production works\
    \ as intended.\n\nIn a test environment, whether deployed or in a developer’s\
    \ local environment, a command processor can be created that consumes from a command\
    \ log that is backed by a GraphQL subscription. This is possible because a command\
    \ contains all the information necessary for the command processor to operate\
    \ upon it. The test environment’s event log can be compared to the production\
    \ event log to ensure that they are equivalent.\n\nThis approach can also be used\
    \ with the event materializer. While there isn’t the same straightforward cross-check\
    \ on the output, it can be used to ensure that the event materializer is capable\
    \ of handling all the known events for the system.\n\nAs a further extension,\
    \ a persistent test double of the production system can be created. It would be\
    \ read-only, not accepting mutations. Instead, it follows the command log from\
    \ production, processing the same commands and using its own materialization engine.\
    \ Combined with the two prior techniques, it can be used to provide users with\
    \ a system that matches production data but exercises newer code.\n\nExposing\
    \ the command and event logs for *your* use does not mean they aren’t implementation\
    \ details of the system. They are implementation details and shouldn’t be treated\
    \ as contracts for your collaborators. The next section will discuss how to use\
    \ these ideas for inter-process communication (IPC) among systems.\n\n## Using\
    \ GraphQL for Inter-Process Communication\n\nBuilding upon the prior section,\
    \ we can use the same GraphQL subscription–based approach to explicitly expose\
    \ data. I touched on this idea in Chapter [11](#511062_1_En_11_Chapter.xhtml)\
    \ when introducing the event materializer.\n\nThe event materializer can consume\
    \ from multiple sources. Its implementation contract within your codebase will\
    \ be to consume from sources that present themselves as a `MessageLog`.\n\nThe\
    \ design in this book is targeted at business applications that manage data for\
    \ a domain. Often, the lines between domains in a business can be blurry. There\
    \ may be a system that manages customers, and customers are associated with regions.\
    \ There may be another system that manages suppliers, and they are also associated\
    \ with regions. The regions used for customers and suppliers need to be consistent,\
    \ as the region could be a join key for data analysis. It may make sense to have\
    \ a third system be responsible for managing regions that is used by both the\
    \ customer and supplier management systems. If the customer system needs to incorporate\
    \ region data into the view that the event materializer maintains, it can use\
    \ a GraphQL subscription to access an event stream from the region management\
    \ system. For this use-case, the event stream should be a mapped form of the underlying\
    \ event log. The region management system should use a discrete contract when\
    \ making itself available to other systems. This reduces coupling among the systems.\
    \ Changes to the event structure within the region system do not require synchronized\
    \ changes with users of the GraphQL subscription. They can evolve independently.\n\
    \nIn this example, there are relationships between customers, suppliers, and regions.\
    \ If each system is exposing its own GraphQL endpoint, these relationships aren’t\
    \ directly visible to users of the system. They are spread out across the three\
    \ schemas. The next section introduces a technique for unification."
  raw: 'When using multiple command processors , you will need to decide whether the
    event sequence number space is shared across all processors, creating a total
    order across all events, or if sequence numbers are per command processor. Each
    approach has its merits. If all command processors share the sequence number space,
    the existence of partitioning in the command processors can be hidden behind the
    system’s external contracts. The semantics of `visibleAsOfRevision` is unchanged.
    However, sharing the sequence number space has a coordination cost when generating
    sequence numbers as well as when waiting for the event materializer. The single
    scalar value of `visibleAsOfRevision` does not indicate which event log contained
    the event. When using checkpoints for read-after-write consistency, it will be
    necessary to wait for the event materializer to have materialized the revision
    across *all* the event logs. This is unlikely to be a good long-term solution,
    but it is a very viable option if multiple command processors and parallel event
    materialization are added to an existing production system. The existing semantics
    are preserved, along with the existing performance characteristics. At the cost
    of changing the mutation response, the single scalar `visibleAsOfRevision` can
    be paired with another value that indicates the event log the revision is from.
    The command generator is reading from the processed command log to determine a
    mutation’s disposition, making this a natural place to store this information.
    Callers can then provide the pair of values during queries in order to read their
    writes. If sequence numbers are per command processor, it will be necessary to
    change the external contract first, requiring callers to provide another value
    to indicate which event log contains their events.


    In any combination of scenarios , there is a migration path toward implementing
    the parallel materialization of events in an active system.


    This and the prior two sections have focused on system changes that can be described
    as performance improvements. The next three sections describe additional ways
    of using GraphQL with the system.


    ## Command and Event Logs As GraphQL Subscriptions


    The prior chapter introduced a Java interface describing a message log, the generalization
    of the system’s command, and event logs from Chapter [9](#511062_1_En_9_Chapter.xhtml).


    ```

    interface MessageLog {

    Flux messages();

    Flux messagesSinceSequence(long seq);

    }

    ```


    This Java interface can also be expressed in GraphQL.


    ```

    type Message {

    sequence: Int!

    }

    type Subscription {

    messages(sinceSequence: Int): Message

    }

    ```


    GraphQL does not have generics, so I have created a `Message` type instead of
    `T` for the example. GraphQL does not have a `Long` scalar, owing to its browser-based
    roots ; it is limited to 32-bit numeric values. It is possible to define custom
    scalar types, which I recommend, to bypass this limitation.


    An implementation of the `MessageLog` interface can be backed by code that uses
    GraphQL subscriptions to consume messages from other hosts. The possibility of
    doing this without changing the interface speaks to the simplicity and power of
    both the interface, and the Reactive Streams abstraction that it uses.


    All the system’s internal message logs can be exposed in this manner. I have found
    this beneficial in my work for several reasons. The initial impetus to extend
    the system in this way was to observe the production system. Being able to use
    standard GraphQL tooling, such as the browser-based GraphiQL IDE , was very valuable.
    It provides a safe way to observe the incoming commands and generated events.
    It ensured tight control over the credentials to my production system’s database.
    Developers should not be modifying the datastore of the system directly. The system
    is making assumptions about the data in the database. For command and event logs,
    that they are immutable once written. For the stateful view maintained by the
    event materializer, that it is the only one that is making state changes. Providing
    access to the message logs as GraphQL subscriptions makes them available for debugging
    while also ensuring that they are read-only.


    These GraphQL subscriptions are also an opportunity for regression testing . Consider
    the case where extensive changes have been made to the command processor’s mutator
    and applicator functions. While the use of property-based testing introduced in
    Chapter [12](#511062_1_En_12_Chapter.xhtml) provides a great deal of confidence,
    it can sometimes be beneficial to know that what happened in production works
    as intended.


    In a test environment, whether deployed or in a developer’s local environment,
    a command processor can be created that consumes from a command log that is backed
    by a GraphQL subscription. This is possible because a command contains all the
    information necessary for the command processor to operate upon it. The test environment’s
    event log can be compared to the production event log to ensure that they are
    equivalent.


    This approach can also be used with the event materializer . While there isn’t
    the same straightforward cross-check on the output, it can be used to ensure that
    the event materializer is capable of handling all the known events for the system.


    As a further extension, a persistent test double of the production system can
    be created. It would be read-only, not accepting mutations. Instead, it follows
    the command log from production, processing the same commands and using its own
    materialization engine. Combined with the two prior techniques, it can be used
    to provide users with a system that matches production data but exercises newer
    code.


    Exposing the command and event logs for *your* use does not mean they aren’t implementation
    details of the system. They are implementation details and shouldn’t be treated
    as contracts for your collaborators. The next section will discuss how to use
    these ideas for inter-process communication (IPC) among systems.


    ## Using GraphQL for Inter-Process Communication


    Building upon the prior section, we can use the same GraphQL subscription–based
    approach to explicitly expose data. I touched on this idea in Chapter [11](#511062_1_En_11_Chapter.xhtml)
    when introducing the event materializer.


    The event materializer can consume from multiple sources. Its implementation contract
    within your codebase will be to consume from sources that present themselves as
    a `MessageLog`.


    The design in this book is targeted at business applications that manage data
    for a domain. Often, the lines between domains in a business can be blurry. There
    may be a system that manages customers, and customers are associated with regions.
    There may be another system that manages suppliers, and they are also associated
    with regions. The regions used for customers and suppliers need to be consistent,
    as the region could be a join key for data analysis. It may make sense to have
    a third system be responsible for managing regions that is used by both the customer
    and supplier management systems. If the customer system needs to incorporate region
    data into the view that the event materializer maintains, it can use a GraphQL
    subscription to access an event stream from the region management system. For
    this use-case, the event stream should be a mapped form of the underlying event
    log. The region management system should use a discrete contract when making itself
    available to other systems. This reduces coupling among the systems. Changes to
    the event structure within the region system do not require synchronized changes
    with users of the GraphQL subscription. They can evolve independently.


    In this example, there are relationships between customers, suppliers, and regions.
    If each system is exposing its own GraphQL endpoint, these relationships aren’t
    directly visible to users of the system. They are spread out across the three
    schemas. The next section introduces a technique for unification.'
  trans: '

    当使用多个命令处理器时，你需要决定事件序列号空间是所有处理器共享（从而在所有事件间建立全局顺序），还是每个命令处理器拥有独立的序列号。两种方法各有优劣。如果所有命令处理器共享序列号空间，则命令处理器中的分区存在性可以被隐藏在系统的外部契约之后。`visibleAsOfRevision`
    的语义保持不变。然而，共享序列号空间在生成序列号以及等待事件物化器时会产生协调成本。`visibleAsOfRevision` 的单一标量值无法指示事件来自哪个事件日志。当使用检查点来实现写后读一致性时，需要等待事件物化器完成*所有*事件日志中该版本的物化。这不太可能成为良好的长期解决方案，但如果是在现有生产系统中增加多个命令处理器和并行事件物化，这便是一个非常可行的选择。现有语义和性能特征都将得以保留。以修改变更响应为代价，可以将单一标量值
    `visibleAsOfRevision` 与另一个指示版本来源事件日志的值配对。命令生成器通过读取已处理的命令日志来确定变更的处理结果，因此这里自然成为存储该信息的位置。调用方随后可以在查询时提供这对值，以读取自己的写入内容。如果序列号是按命令处理器分配的，则必须首先修改外部契约，要求调用方提供另一个值来指示其事件所在的事件日志。


    在任何场景组合中，都存在一条迁移路径，用于在活跃系统中实现事件的并行物化。


    本节与前两节重点描述了可被视为性能改进的系统变更。接下来的三节将介绍将 GraphQL 与系统结合使用的其他方式。


    ## 命令日志与事件日志作为 GraphQL 订阅


    前一章介绍了一个描述消息日志的 Java 接口，该接口是对系统命令日志和事件日志（来自第 9 章）的泛化。


    ```

    interface MessageLog {

    Flux messages();

    Flux messagesSinceSequence(long seq);

    }

    ```


    这个 Java 接口也可以用 GraphQL 表示。


    ```

    type Message {

    sequence: Int!

    }

    type Subscription {

    messages(sinceSequence: Int): Message

    }

    ```


    GraphQL 没有泛型，因此我在示例中创建了 `Message` 类型来代替 `T`。由于源自浏览器环境，GraphQL 没有 `Long` 标量类型，其数值类型仅限于
    32 位。可以定义自定义标量类型（我推荐这样做）来绕过此限制。


    `MessageLog` 接口的实现可以由使用 GraphQL 订阅从其他主机消费消息的代码来支撑。无需修改接口即可实现这一点，这充分体现了该接口及其使用的响应式流抽象的简洁性和强大功能。


    系统内部的所有消息日志都可以通过这种方式暴露。我在工作中发现这样做有若干好处。最初推动以这种方式扩展系统是为了观察生产系统。能够使用标准的 GraphQL
    工具（例如基于浏览器的 GraphiQL IDE）非常有价值。它提供了一种安全的方式来观察传入的命令和生成的事件。这确保了对生产系统数据库凭证的严格控制。开发者不应直接修改系统的数据存储。系统对数据库中的数据有特定假设：对于命令日志和事件日志，假设它们一旦写入便不可变；对于事件物化器维护的有状态视图，假设它是唯一进行状态变更的组件。将消息日志作为
    GraphQL 订阅提供，既可用于调试，又能确保其只读性。


    这些 GraphQL 订阅也为回归测试提供了机会。考虑对命令处理器的变更器和应用器函数进行了大量修改的情况。虽然第 12 章介绍的基于属性的测试提供了很大信心，但有时了解生产环境中的行为是否符合预期也很有益。


    在测试环境中（无论是部署环境还是开发者的本地环境），可以创建一个命令处理器，它从一个由 GraphQL 订阅支持的命令日志中消费数据。这是可行的，因为命令包含了命令处理器操作所需的所有信息。可以将测试环境的事件日志与生产环境的事件日志进行比较，以确保它们等价。


    这种方法也可以用于事件物化器。虽然对输出没有同样直接的交叉检查，但它可以确保事件物化器能够处理系统已知的所有事件。


    作为进一步扩展，可以创建一个生产系统的持久化测试替身。它将是只读的，不接受变更。相反，它跟随生产环境的命令日志，处理相同的命令，并使用自己的物化引擎。结合前两种技术，它可以为用户提供一个匹配生产数据但运行更新代码的系统。


    将命令日志和事件日志暴露给*你*使用，并不意味着它们不再是系统的实现细节。它们仍然是实现细节，不应被视为与你协作者的契约。下一节将讨论如何将这些想法用于系统间的进程间通信（IPC）。


    ## 使用 GraphQL 进行进程间通信


    基于上一节，我们可以使用相同的基于 GraphQL 订阅的方法来显式暴露数据。我在第 11 章介绍事件物化器时曾提及这个想法。


    事件物化器可以从多个源消费数据。它在代码库中的实现契约是消费那些以 `MessageLog` 形式呈现的源。


    本书中的设计针对的是管理领域数据的业务应用。通常，业务中不同领域之间的界限可能很模糊。可能存在一个管理客户的系统，而客户与区域相关联。也可能存在另一个管理供应商的系统，供应商也与区域相关联。客户和供应商使用的区域需要保持一致，因为区域可能是数据分析的连接键。让第三个系统负责管理区域，并由客户和供应商管理系统共同使用，可能是合理的。如果客户系统需要将区域数据纳入事件物化器维护的视图中，它可以使用
    GraphQL 订阅来访问区域管理系统的事件流。对于此用例，事件流应该是底层事件日志的映射形式。区域管理系统在向其他系统提供服务时，应使用独立的契约。这降低了系统间的耦合度。区域系统内事件结构的变更无需与
    GraphQL 订阅的用户同步变更。它们可以独立演进。


    在这个例子中，客户、供应商和区域之间存在关系。如果每个系统都暴露自己的 GraphQL 端点，这些关系对系统用户来说并不直接可见。它们分散在三个模式中。下一节将介绍一种统一这些关系的技术。

    '
- fmt: '# Federated GraphQL


    Building upon the example from the prior section, imagine that an organization
    has discrete applications for managing customers, suppliers, and the regions in
    which they exist. Using the natural boundaries within a larger domain to subdivide
    it into smaller, often more manageable, units is a central tenet of Domain Driven
    Design as described in Eric Evan’s seminal book, *Domain-Driven Design: Tackling
    Complexity in the Heart of Software* ^([^(18)](#fn18)). Evans describes these
    units as *bounded contexts*. The departmental view of business applications that
    this book takes is highly aligned with Evan’s definition of a bounded context.


    Our example has three systems, which would be three GraphQL schemas that have
    interrelated concepts. Both customers and suppliers have a relation to the region
    in which they operate. Imagine a user interface for managing customers that provides
    the ability to assign customers to regions. This user interface will need region
    information to display the current state of a customer as well as when allowing
    users to make changes.


    A simple implementation could be to have the UI make calls to each system. While
    this may seem reasonable in this example of only two systems, think ahead to a
    more complex domain with a greater number of relationships. The work required
    in the UI will grow. This has led to the centralization of that work out of the
    UI code running on user machines into a dedicated backend service for the UI,
    a pattern known as the *Backend for Frontend* (BFF). A BFF is tailor-made for
    a single UI. In our example, there may be up to three BFFs, one each for the UI
    of each domain. The work performed in each will be extremely similar, and again
    there is an opportunity to remove this duplication.


    This duplication was recognized by Apollo,^([^(19)](#fn19)) a company providing
    developer tooling for GraphQL. If each of our domain services, customers, suppliers,
    and regions, are already exposing a GraphQL endpoint, what if there was a way
    of describing how the schemas inter-relate and then providing a service that can
    accept GraphQL requests and appropriately delegate them to other services? This
    is the essence of Apollo Federation.


    Under the Apollo Federation model, each of the three example services would be
    considered a subgraph. Instead of a BFF, there will be a graph router that combines
    the subgraphs into a single supergraph. The supergraph service, also known as
    the router, provides a GraphQL endpoint that exposes the composition of all subgraphs.
    This service will route incoming requests to the appropriate subgraph service.


    Our example customer system may expose the following in its GraphQL schema:


    ```

    type Customer {

    id: ID

    name: String

    regionId: ID

    }

    ```


    It only provides the identifier of the region the customer is in, as that is all
    the information the service manages. The region system exposes a `Region` type
    that contains the name of the region:


    ```

    type Region {

    id: ID

    name: String

    }

    ```


    Apollo Federation allows the customer system to expose the following in its schema:


    ```

    type Customer {

    id: ID

    name: String

    region: Region

    }

    ```


    Rather than having the customer system expose only the region ID in the schema,
    it can expose the `Region` type, even though it is not a part of the customer
    service. The customer system exposes the following query to access customers:


    ```

    type Query {

    customer(id: ID): Customer

    }

    ```


    With Apollo Federation, callers will be able to send queries that cross subgraph
    boundaries. Here, the name of a region is requested, data that is managed by the
    region system:


    ```

    query {

    customer(id: "42") {

    id

    name

    region {

    id

    name

    }

    }

    }

    ```


    The router will first route the request to the customer system, loading the customer
    and the region ID. It will then make another request to the region system to load
    the ID. The response to the caller obscures the fact that multiple subgraphs were
    queried, making it appear that the two systems are one. This is akin to the experience
    that a BFF would provide. However, instead of a UI-specific BFF, the supergraph
    service is more generalized.


    By using GraphQL as the exposed API of your systems, Apollo Federation facilitates
    the creation of a unified graph acting as a single entry point for all users of
    all your systems. The act of connecting the schemas of each domain service provides
    the business with knowledge of how well connected, or not, their schemas are.
    This knowledge is valuable feedback around data modeling decisions within the
    organization.


    Business applications act as a source of truth for their data and the business
    itself uses the data to help make decisions. Improving the quality of the data
    by ensuring it is both modeled and connected appropriately can allow the business
    to make more informed decisions.


    Moving on from leveraging the usage of GraphQL in our system, the next couple
    of sections explore alternate possibilities for implementing the design.'
