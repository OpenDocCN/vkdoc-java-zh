- fmt: '### Database


    The materialization engine needs to materialize the view into a database. The
    specific type of database that you decide to use will depend upon your domain
    data and what you are comfortable operating. Some domains may be amenable to document
    databases, where entities are coarse and maintaining a single document per entity
    matches the read characteristics. Other domains may want to use a relational database
    as their ubiquity has led to many developers being familiar with them. Your domain
    and business rules may require the materialization engine to perform aggregations
    that are well-suited to the relational model.


    There is no one-size-fits-all, and the technology you choose here will depend
    upon your situation. A benefit of this system’s design is that the decision of
    which database to use is not a permanent one; this is our amenability to change
    principle. The authoritative store for your data is in the append-only event log.
    Multiple materialization engines can maintain multiple views if you choose to
    transition to a new store.


    ## Summary


    You now understand how the proposed design is aligned with and supported by the
    system constraints and operating principles. There’s a small number of technologies
    required for implementation, pub/sub messaging, distributed locking, an append-only
    log, and a database for the materialized view. I hope that the gears in your head
    are turning, thinking about implementations of these that you are comfortable
    working with. This concludes the section of this book on the system’s design.
    The next section and chapter dive explore an implementation.


    # Part IV: Implementation


    # 14. Building with Modern Spring, Java, and PostgreSQL


    In our journey so far, I’ve explained this book’s definition of business applications,
    the properties and features that are desirable in business applications, and introduced
    a design that satisfies those properties and features. While the prior parts of
    this book have been implementation agnostic, this final part is focused on implementing
    the design with specific technologies.


    In this chapter, I introduce the set of tools that I have used to implement the
    design. I hope that you will appreciate my choices.


    ## Required Technologies via PostgreSQL


    The prior chapter mentioned four key technologies needed to implement the design:


    * Append-Only Log

    * Pub/Sub Messaging

    * Distributed Locking

    * Database


    All these technologies may be fulfilled with a single solution, PostgreSQL. It
    is a robust database system that has been under active development for more than
    30 years, available as open source under its own liberal license that is similar
    to the BSD or MIT licenses. I first started using it in the year 2000 when it
    was the only open source relational database system that supported ACID transactions
    and foreign keys. Its strong focus on reliability and data integrity drew me to
    the project and it has become my database system of choice for projects that require
    one.


    When designing systems, I like to minimize the operational overhead. If each of
    the technologies were solved by a separate implementation, that would be five
    stacks to wrangle (the four technologies plus the application itself). With the
    current trends where teams practice DevOps and are responsible for both development
    and operations, this minimization of operations responsibilities allows teams
    to ultimately be more agile.


    If PostgreSQL becomes a limiting factor for one of these technologies, the option
    of swapping the implementation is always available. This harkens back to two of
    our principles: design flexibility and modularity.


    From another perspective, one of the technologies *is* a database. If the database
    also has other capabilities available out-of-the-box, why not also use those?
    I once had teammates that advocated for using discrete tools, arguing that a tool
    that has multiple functions is akin to a “spork,” a type of hybrid cutlery that
    functions as a spoon and a fork. Sporks are often looked down upon, as most encounters
    are with single-use sporks as a part of fast-food or prepackaged meals. In those
    situations, the usage of a spork is often a cost-cutting and waste-reduction measure
    to provide a single utensil rather than two. The choice of a spork was imposed.
    My counterargument is that sometimes one may choose to use a spork. If you are
    going camping and want to minimize the number of utensils that you are carrying,
    the consolidation of functions into a single utensil is now a desirable feature,
    and it is a decision that you made for yourself.


    In the following sections, I will elaborate upon how PostgreSQL is able to satisfy
    all the requirements.'
