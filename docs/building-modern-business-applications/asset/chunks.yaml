  trans: '

    ### 现状


    一个“现代”商业应用很可能以基于 Web 的用户界面呈现。如果它足够新，可能是一个单页应用，即数据在后台加载，页面本身被动态重写。但这通常只是表面功夫。如果仔细观察，页面很可能正在向后端发起
    HTTP 请求，来回传递 JSON 负载。HTTP 动词被粗略地用来描述预期的操作：GET 用于检索，DELETE 用于删除，PUT 用于创建，POST 用于更新。URL
    模式可能经过一些设计，比如包含版本号，但很可能没有。它只是一个扁平的端点命名空间，就像一堆杂乱无章的函数。


    如果你问开发者他们创建了哪种类型的 API，他们会称之为“REST API”，尽管事实远非如此。用 HTTP 动词来回传递未充分定义的 JSON，并非罗伊·菲尔丁提出该术语时的本意。我喜欢将这些
    API 描述为“口语化 REST”。


    有许多框架，例如 Rails、Django 和 Spring，它们帮助开发者处理暴露 HTTP 请求的机制，使得开发者只需指定 URL、HTTP 方法和负载的形状即可。


    一旦收到请求，它将经过适当的验证，然后使用对象关系映射（ORM）框架来最终存储或从关系数据库中检索数据。这个 ORM 框架很可能是 Hibernate，因为它自
    2001 年首次亮相以来就获得了极大的关注。


    关系数据库是商业应用的主力军，而且理由充分。如果数据库不能可靠地存储和检索数据，那么存在于数据库和用户之间的软件层的质量就毫无意义。关系数据库有一个定义明确且标准化的交互机制：结构化查询语言（SQL）。尽管在业务中引入任何新技术都很困难，但引入一个新的主数据存储系统则更加困难。由于我们的商业应用对业务至关重要，这导致了对数据存储选择的规避风险心态。这就是为什么我*不*建议在数据存储选择上进行创新。在我的职业生涯中，大部分时间都在使用
    PostgreSQL，它一直运行良好，并且还在不断改进。这也是我主张在本书中使用 PostgreSQL 的原因。如果你有偏好的其他数据库，请继续使用它。你拥有来之不易且值得保留的运维知识。


    数据库中使用的模式可能大体上是合理的，这取决于业务在其生命周期内要求对软件进行的更改的性质，以及参与开发的开发者数量。一个非常可能的情况是，应用会原地修改数据。随着数据的变化，它过去的样子就消失了。有时，会有明确的业务需求要求“取消删除”操作或跟踪特定字段的变更。由于这需要额外的开发工作，除非明确要求，否则通常会被省略。


    简而言之，一个“现代”的 Java 商业后端就是通过一个口语化 REST API 交换未充分定义的 JSON，并通过 Hibernate 在关系数据库中原地修改数据。


    ### 绿屏


    我接触到的第一个商业应用是“绿屏”应用。这个术语是对连接到中央计算机的终端的回溯，这些终端拥有多个显示器和键盘（终端），而不是联网的计算机。这些终端通常是绿色的
    CRT 屏幕（因此得名），功能有限。它们可以显示来自中央计算机的文本，转发输入，或许还有打印功能。如果你在 Linux 中配置过终端，你可能会在 TERM
    环境变量的潜在值（如 vt100）中看到对这些设备的引用。


    随着个人计算机变得普及，硬件终端模拟器被运行在 Windows（当时常见的桌面操作系统）上的软件终端模拟器所取代。这就是我接触到它们的地方，这些业务依赖的应用比它们最初为之开发的硬件的生命周期更重要。硬件终端已被桌面软件取代，中央计算机也被局域网取代。


    其中一些系统至今仍在使用。它们是用现在被视为遗留的语言编写的，例如 COBOL 或 RPG。用另一种语言重写这些系统是一项巨大的工程，并且会给业务带来风险。作为一个经济决策，通过继续使用旧系统并管理维护这些系统的团队的人员风险，可以减轻迁移系统中因错误导致的业务风险。如果你足够仔细地审视，可以将这些系统在终端上渲染输出的方式视为一种巴洛克式的基于文本的协议。有一些产品采用这种方法，并允许为它们创建基于
    Web 的用户界面。


    我提到这些应用是因为它们是真正的“瘦客户端”架构。客户端设备（终端）几乎只能进行输入和输出。没有在终端上运行“客户端”逻辑的设施。


    ### 富客户端


    由 Microsoft Access 和 Visual Basic (VB) 推广开来的富客户端，是一种安装在用户机器上并通过局域网连接到中央应用的应用。在许多情况下，中央应用就是一个关系数据库。局域网当时尚未标准化为
    TCP/IP，创建自定义协议也并非易事。一个足够复杂的系统可能使用了 CORBA，这是一种跨语言和跨机器执行方法调用的技术。创建多用户应用的最简单方法是依赖数据库服务器的线路协议，并将其用作应用的服务器部分。


    Access 和 VB 为构建用户界面提供了可视化体验。这使得那些几乎没有传统编程经验的人也能构建简单的应用来存储和检索数据。Microsoft 提供了一套强大的内置
    UI 控件，同时还有销售具有附加功能的控件的第三方供应商。构建多用户商业应用变得简单直接，其结果的行为方式与其他桌面软件类似。作为用户机器上的一个独立应用，也意味着能够直接与其他工具（如
    Excel 或 Word）进行交互。


    然而，对于开发者来说，分发他们的软件是一个巨大的难题。应用并非一个可安装的单一文件。共享库需要被复制到机器上的特定位置。如果发生冲突，调试结果可能会极其困难。“DLL
    地狱”这个术语就是用来指代这种痛苦的。


    富客户端为用户提供了出色的体验。但这以运维困难为代价。如果软件无法在你的机器上运行，再好的用户体验也毫无价值。


    模型-视图-控制器（MVC）架构模式揭示了如何在图形用户界面中分离职责。Access 和 VB 并未严格遵循此模式。关系数据库可以被视为模型，而每个显示窗口（用他们的术语来说是“窗体”）类似于组合的视图和控制器。

    '
- fmt: '### Web Applications


    Concurrent with rich clients, the web was invented. As the 1990s came to a close,
    `TCP/IP` became the de-facto protocol for local area networks, as it solved LAN
    communication in addition to internet access. This opened the possibility of running
    a web server on the LAN with users accessing an “intranet.”


    While the initial user experience was poor in comparison to rich clients, it simplified
    the lives of developers as there was no software to install on users’ machines.
    Solving the operational pains of `DLL` hell was of value to IT departments.


    The first web applications were page-based, harkening back to the document-centric
    view that the web started with. There were two developments that I feel led to
    the floodgates of web applications.


    The first was a pause in revisions of the HTML specification. Through the 1990s
    the `W3C` released HTML 2, 3, and eventually 4. HTML 4 was initially released
    in last 1997, with a final revision as 4.01 in late 1999. It was almost nine years
    until the process for HTML 5 began.


    While this was a stagnation in the specification, it was also a period of stability.
    I believe this stability provided a stable foundation to build applications upon.


    The second important development was what is now known as `XMLHTTPRequest`, or
    `XHR`. This was a technique for communicating with the web server without a full
    page reload, allowing web applications to have interaction paradigms that began
    to mimic rich clients. A proprietary feature of Microsoft’s Internet Explorer
    browser allowed JavaScript running in the browser to access components installed
    on the system through a technology known as `ActiveX`. This was a descendant of
    the same technology, `COM`, that Visual Basic used for its interface building.
    It was through this path that a component Microsoft had developed as part of their
    Outlook Web Access (allowing web-based access to a corporate email server) could
    be used on any page. Once this technique was discovered, it became a de-facto
    standard and was implemented in other browser engines.


    With a stable specification and the ability to communicate with a server in the
    background, it was possible to build business applications that were “good enough”
    for daily use. Some business applications would continue to demand rich clients,
    as their requirements could not be met by a web-based application. However, if
    a web browser’s capabilities were sufficient for an application, the operational
    ease of a web application made it the simpler long-term choice.


    Frameworks that assisted developers in writing the application servers that backed
    these web-based applications converged upon the `MVC` pattern for structuring
    themselves. The model is no longer the database itself; it is an object model
    in the application server that’s mapped to the database with an `ORM`. Code is
    organized into classes named controllers, with their response payloads being views.
    This was the genesis of the status quo that remains.


    It is here that I believe web-based business applications have stagnated. While
    there have been continuing developments in the web that I discuss in the next
    section, by and large, the requirements of many business applications have been
    satisfied. The way in which the browser-side portion of an application is developed
    has changed, but the underlying browser primitives they use have not.


    ### The Rise of Consumer Applications


    Through the 2000s, if you wanted to use a website, you had to use a web browser
    on a desktop (or laptop) computer. This was the decade where broadband Internet
