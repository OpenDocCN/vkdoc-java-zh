- fmt: '# Measuring Importance


    As engineers, our view of an application’s importance is often based on how it
    is used. An application that is frequently used and/or manages large amounts of
    data is important. These two dimensions are conflated when referring to the “scale”
    of an application. The larger the scale, the larger the importance. That may not
    be the business’s perspective, however. Instead, it is the criticality of the
    application to the continued operation and success of the business’s operations.


    For purposes of this book, our data volume sweet spot is what I like to refer
    to as “medium-sized data” (as a play on the “big data” nomenclature that swept
    over tech in the early part of this century). Medium-sized data fits in the storage
    capacity of a single server, although multiple servers may be used for resiliency.
    The data may also fit entirely in memory, something that is increasingly true
    as system capacities increase, and the changing nature of storage systems. Think
    gigabytes, not terabytes.


    As our business applications are targeted at end users, its access frequency will
    be at human-scale speeds. The number of users will be the driving factor in the
    overall number of requests, which will likely be measured in requests per minute
    rather than second. This has implications on how we observe the behavior of our
    systems; the sparser the requests, the trickier it becomes to use metrics to monitor
    its behavior. Is the system unavailable, or is it a quiet period for users? This
    is explored in Chapter [12](#511062_1_En_12_Chapter.xhtml).


    An application that is important to the business must be available for use when
    the business requires it. There will likely be periods of time for the business
    in which the unavailability of the application would be disastrous. An application’s
    sole purpose could be to assist users during these critical periods, as the formalization
    of the business processes performed with the application helps ensure they are
    performed as intended.


    ## “Modern”


    Modern is an adjective that will ultimately date whatever uses it. In using this
    label, we are certainly declaring that our techniques are more up to date than
    others. Computing capabilities have grown by leaps and bounds in the past two
    decades. It isn’t that older techniques become invalid. Rather, increased compute
    and storage capacity have made new techniques viable. Techniques that may have
    only lived on a whiteboard are now able to be put into production use.


    This is our modern, more akin to modern tools than modern art. In time, with your
    help, they will become the new status quo. There will certainly be techniques
    in the future that beget reuse of the modern label again, but such is the cycle
    of progress.


    The techniques I describe and advocate for in this book are not novel. I am making
    the case that not only is it entirely feasible to use them but doing will lead
    to software applications that are better suited for the current moment and into
    the future.


    “Cloud Computing” is an intriguing trend that both abstracts developers from the
    physical machine and can demand increased mechanical sympathy with the machine
    as a mechanism for controlling costs. It is easier than ever to provision compute
    resources, and inattention to the resources in use can invert the value proposition
    for a business.


    I discuss this in concrete terms in Chapter [4](#511062_1_En_4_Chapter.xhtml).
    The techniques I will describe open up the possibility of managing consumed resources
    in closer concert with what is required at the time, even if it isn’t acted upon.
    Similar to how I explain how to make an application’s logic amenable to change,
    the same principle is extended to the resources required for operation.


    ## Summary


    The business applications this book referred to can be described thusly:


    - Tailored to a specific domain

    - Bespoke work, either performed by employee-developers or consultants

    - Usage by employees is mandatory

    - Multiuser

    - Data entry and decision support are core functions

    - A source of truth for the business

    - Value is derived from workflow and decision analysis automation

    - Medium-sized data

    - Criticality is due to importance to the business


    Modern is in relation to current development practices, which I discuss in the
    next chapter.


    Footnotes [1](#511062_1_En_1_Chapter.xhtml#Fn1_source) [2](#511062_1_En_1_Chapter.xhtml#Fn2_source)
    [3](#511062_1_En_1_Chapter.xhtml#Fn3_source) [4](#511062_1_En_1_Chapter.xhtml#Fn4_source)


    # 2. The Status Quo (and How It Came to Be)


    Now that we have established a definition of a business application, I’m going
    to discuss my perspective on the status quo and how it has come to be. It is based
    off of my observations of the industry over the past two decades, from the mid-1990s
    to the present day in 2021.


    In this chapter I will describe the practices that I’ve observed in my career,
    and how I feel they may be improved. This will be a Java Virtual Machine (JVM)
    centric view, as that’s where I’ve spent the majority of my career. That may be
    true for you, or could be, depending on where you are in your career arc. Let’s
    dive in!


    ## Business Application Architectures


    While business application architectures have changed in the past 20 years, they
    have also largely remained the same. As developers, our systems repeat the same
    fundamental interaction patterns, albeit implemented with the technologies of
    the day. It is important to understand the past in order to understand the opportunities
    ahead.'
