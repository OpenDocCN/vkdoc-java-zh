    place where this book could happen.*


    ## Introduction


    One of the first jobs I had was at a consulting firm where we were assisting a
    client in how to modernize their software. The client had a successful business
    selling and supporting a domain-specific ERP (Enterprise Resource Planning) system.
    It dated back to the 1970s with code written in `BASIC-2C` targeting the Wang
    minicomputer. When I entered the picture in the late 1990s the software was running
    on Windows via an emulator, its text-based interface trapped in a window. The
    owner of the firm did not want to get locked into a proprietary platform again.
    In a very forward-thinking move, we were explicitly asked to create a web-based
    user interface and a Java-based backend.


    As we incrementally migrated modules from the old system to the new one, we received
    user feedback around the usability of the new interface. The text-based interface
    of the old system allowed power users to quickly navigate around. The new graphical
    interface did not initially have the same capabilities. We added extensive keyboard
    shortcuts to make navigation easier, but the nature of the interface prevented
    us from matching the experience of the old system. Existing users valued the system
    as it was, while new customers were enticed by the new web-based interface.


    This was an enlightening experience for me, how deeply the nature of my work affected
    the work of others, and how attached people can be to the familiar. I was attached
    to the familiar. While the new system we created used technologies and techniques
    that were more modern than what the old system used, the paradigms were fundamentally
    the same. In the two decades since I worked on that system, again the technologies
    and techniques have changed, but the same paradigms live on. As I made this observation
    and introspected the work I had done, I came to realize that there are other ways
    to build systems. That’s what this book is about.


    I start this book by defining and scoping business applications, and then my perspectives
    on the status quo. The next part discusses architectural precepts that I believe
    are appropriate for forward-looking systems and why business applications should
    be built with them in mind. Business applications encode business rules, and business
    rules can change over time. Understanding each of these is important, and I dedicate
    a chapter to each. The third part of this book is my proposal for a modern business
    application architecture. I describe my self-imposed constraints and the principles
    that the architecture aims to uphold. The architecture is described in detail,
    but from a conceptual and data flow perspective. The architecture may be implemented
    in your desired language. It has technological requirements, but you can choose
    implementations you are the most comfortable working with. There are production
    systems using this architecture, and the final part is about the implementation
    choices I made. The final chapter is about additions that can be made to the architecture
    as well as alternate means of implementation. My goal is to show that the architecture
    is really a starting point for systems, not the end state. Your systems will have
    their own lives and need to grow in ways that are unique to their environments.


    You don’t need to know any specific computer languages to understand this book.
    A familiarity with building systems is valuable, but also not required. I describe
    the *what*, not the *how*, as I believe the former will be more durable over time.
    As I learned early in my career, implementation decisions change, but paradigms
    endure.


    Thank you for taking the time to read this book. I hope that my reasoning resonates
    with you. I would love to hear your stories of how you have taken the ideas from
    this book and applied them to your work.


    —Pete


    ## Acknowledgments


    The ideas in this book are an amalgamation of concepts I have encountered over
    my career, many of whose attribution is lost to time. I value everyone that takes
    the time to write and share knowledge with others, knowing that they will never
    fully understand the reach that they have.


    To John Caruso and Gary Foster, for without your support and trust early on in
    my career trajectory I would not have been here. To Paul Hammant, for being a
    source of ideas, inspiration, and encouragement. To all my friends from the Apache
    Software Foundation, especially the early Avalon and Cocoon communities, for being
    unknowing mentors and shaping how to think about problems. To Snehal Chenneru
    and Michael Li, for without your help and support we never would have built the
    system this book is about.


    Practicing the art of Brazilian jiu-jitsu has shaped my perspectives on continuous
    learning, humility, and problem solving. To my teachers, Andre, Sandro, and Chris,
    your methods for sharing knowledge have shaped mine.


    This book would not exist if it were not for Jonathan Gennick reaching out to
    me and asking me if I had ever thought about writing a book. You had the vision
    that there was something worth sharing in a more durable form than a conference
    talk. You and your team at Apress helped bring this book to fruition.


    Trish, Poppy, and Pickles, thank you for your support while I spent nights and
    weekends writing. You are the best.


    ## About the Author About the Technical Reviewer


    # Part I Business Applications


    # 1. What Is a Business Application?


    “Modern Business Application” is a vague and imprecise term, conjuring up differing
    mental images for each individual. Before we embark upon our journey of building
    one, I need to ensure that you have an understanding of what I mean.


    In this chapter I will introduce what a “Modern Business Application” is, for
    the purposes of this book. The progression of the book follows with the desired
    properties for business applications, how those properties can be manifested into
    the design of a system, and finishing with a discussion on implementation.


    I feel a critical aspect in developing successful business software is understanding
    the business. The corollary for this book is understanding what a business application
    is, in order to understand what we will be building.'
