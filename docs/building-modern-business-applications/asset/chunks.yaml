    ### 接口与联合类型


    接口和联合类型是介绍对象类型时我提及的两种组织方式。它们都可用于定义对象字段的值类型。


    接口是一组命名字段的集合，这些字段在多个对象类型间共享。它们在语义上等同于许多编程语言中接口的行为。GraphQL 的执行模型允许调用者直接使用接口字段，同时也能根据具体类型实现条件化行为。在运行时，接口必须由具体类型实现。只有模式（schema）会将具体类型的确定延迟到执行阶段。接口只能由对象类型和其他接口实现。


    联合类型与接口相反。联合类型是一组互不相交的对象类型集合。联合类型不能包含接口。它们在语义上等同于编程语言中的"选择"或"二者择一"类型。由于模式将其视为互不相交的集合，在运行时调用者必须指明如何处理每种可能性。


    接口和联合类型**不**能用于输入对象。


    ### 查询与订阅


    查询和订阅是定义数据读取方式的两种机制。它们分别由模式中的特殊类型表示：`Query` 类型和 `Subscription` 类型。通常直接使用这些名称，但也可以为它们自定义名称并映射到这两个概念。


    它们的定义方式与对象类型相同，对象类型的规则同样适用。这些类型上的字段构成了模型的入口点。常见做法是在这里使用参数，因为这是访问特定类型实例的直观机制。


    查询和订阅的执行模型不同。对于查询，调用者可以指定多个返回字段。GraphQL 规范声明实现可以"并行解析"（即执行）这些字段。对于订阅，则有不同的语义。请求订阅字段时，必须且只能选择一个字段。订阅字段的实现具有隐藏语义：它返回的是该字段值类型的序列。这是从
    GraphQL 系统提供实时更新的机制。由于序列由字段的值类型定义，在此处使用联合类型非常强大，因为它允许在订阅的每个"节拍"中返回不同的内容。


    ### 变更


    变更是写入数据的机制。我认为 GraphQL 的写入实现相当巧妙，因为它利用了每个字段都是概念性函数这一特性。与查询和订阅类似，变更由模式中的特殊类型表示：`Mutation`
    类型。


    由于变更类型是对象类型，它也遵循相同的规则。该类型的每个字段都是一个可用的变更操作，字段的参数是调用者提供值的机制。


    按照惯例，此类型的字段应改变系统状态。您可能注意到我在前面的小节中并未禁止这样做，确实如此。就像实现修改状态的 HTTP `GET` 调用是不良实践一样，其他对象类型（包括查询和订阅类型）的字段也是如此。


    执行模型在这方面确实提供了便利。与查询类似，调用者可以请求变更类型的多个字段，作为在单个请求中调用多个变更的方式。如果采用与查询相同的并行执行模型，将限制此功能的实用性，因为变更将没有确定的执行顺序。为解决此问题，变更类型的执行模型是*串行*解析每个字段。这简化了对变更行为的心智模型重建。


    使用 GraphQL 读取数据时，调用者"掌控"一切。模式规定了可用数据，调用者必须指定他们想要接收的内容。对于变更，接收方"掌控"一切。模式现在规定了调用者必须提供的内容。对于读取操作，返回的具体内容存在一定的不确定性。每当出现接口或联合类型时，就代表一组可能性。由于这些构造不能用于变更输入，模式中声明的是*确切*结构，而非潜在结构。


    我经常遇到 GraphQL 新手提出的一个问题是："如何将输出类型复用为变更的输入？"简单（但令他们不满意的）答案是：*不能*。GraphQL 有意将输入类型和输出类型分开。复制
    REST 模式中 `GET`、`PUT` 和 `POST` 操作使用相同负载形状的做法并不容易。我认为这是 GraphQL 作者在引导实现者采用特定的交互模式。


    GraphQL 社区建议变更应尽可能*具体*。这与 REST API 形成对比，后者中 `GET`/`PUT`/`POST` 三件套通常使用相同的负载形状协同工作。通过使用具体的变更，变更的范围和副作用得以清晰传达。当变更涉及工作流时，这可以揭示意图。


    我在 REST API 中观察到的一种模式是基于字段变化触发副作用。考虑一个负责发票支付系统的 API。当收到新发票时，它们被录入系统。存在一个工作流：用户必须审批发票，审批后自动安排付款。REST
    API 实现有一个 `GET` 端点用于检索发票，一个 `POST` 端点用于修改发票。发票上有多个可变字段，本例中我们关注 `status` 字段。要审批发票，`status`
    字段从"已接收"修改为"已审批"。收到此负载后，端点观察到变化，并触发付款工作流。该工作流是 `POST` 的副作用。从表面上看，API 定义并未表明会发生这种情况。是的，这可以记录在文档中，但在调用代码库中不会立即可见。可以设置单独的端点来明确这一点。然而在实践中，我观察到这并非总是如此。


    在 GraphQL 中实现相同的交互模式并非最直接的方式，因为需要有一个描述 `Invoice` 的对象类型，然后为变更创建一个并行的 `InvoiceInput`
    输入类型。这可以比 REST API 有所改进，因为输入类型只会列出可变字段。除了*具体*之外，变更还应该是*语义化*的。遵循这一建议，本例将有一个名为 `approveAndPayInvoice`
    的变更，明确描述其功能。它有意模糊了与 `status` 字段的关系。审批本身就是一个动作。审批行为更新了状态字段，而不是更新状态字段触发动作。这可能颠倒了
    API 的概念化方式。我认为这非常强大。


    我发现输入类型和输出类型的分离是 API 设计中的宝贵工具。它们是状态的两个方面：改变状态的请求和观察状态。这与第 6 章介绍的命令与事件之间的状态关系类似。输入类型与命令、输出类型与事件之间的对称性，正是我们将
    GraphQL 与事件溯源和 CQRS 结合的方式。

    '
- fmt: '# Combining GraphQL + ES + CQRS


    As I mentioned in the earlier section on Event Sourcing, the ES pattern doesn’t
    prescribe what causes events. I introduced the notion of a *command* in Chapter
    [6](#511062_1_En_6_Chapter.xhtml) when discussing time, and that is the concept
    that will be utilized here. I will explain how the pieces fit together, and then
    describe them in more detail.


    `GraphQL` mutations should be *specific* and *semantic*. Mutations cleanly map
    to commands. Commands can be applied to the current state of the system yielding
    events to move the state forward in time. These events can be materialized into
    a view that corresponds to the `GraphQL` schema for queries. The events can also
    be used to drive `GraphQL` subscriptions, as we know precisely what has changed.


    Event Sourcing drives the mutations. `CQRS` is the separation between the mutations
    and their model, described by input objects in the `GraphQL` schema, and queries
    and subscriptions which use the object types. This separation is well supported
    by the input and output type bifurcation in `GraphQL` and encourages us to model
    each side appropriately.


    Starting from a mutation, there is a “command generator” that is responsible for
    deriving commands from mutations. There may not be a one-to-one mapping from a
    mutation to a command. Each mutation will generate one command, but multiple mutations
    may generate the same command, or a mutation may generate different commands depending
    upon its specific arguments. In the `GraphQL` schema, a mutation is effectively
    a function. The invocation of the function is encapsulated in a message, the command.
    Chapter [10](#511062_1_En_10_Chapter.xhtml) explores this component in detail.


    Commands are a request for a change. There is a “command processor” that receives
    these requests and outputs events. The command processor is responsible for a
    category of business rules, those for “data at rest.” The next chapter is focused
    on this component.


    Events are received by an “event materializer” that is responsible for creating
    the model that will be used to satisfy `GraphQL` queries and subscriptions. Chapter
    [11](#511062_1_En_11_Chapter.xhtml) is an exploration of this component.


    This yields a straightforward loop. Clients use queries to observe the state of
    the system. They then issue mutations to make changes. The command generator converts
    mutations into commands. These messages are then received by the command processor
    and generate events. Events are received by the event materializer and used to
    update the view that was used to satisfy client queries. The exterior of the system
    is a `GraphQL` interface. The interior is comprised of message passing, as either
    commands or events.


    This data flow allows us to implement the interior as a reactive system, as it
    is fundamentally comprised of message passing.


    ## Summary


    In this chapter, we’ve learned about how `GraphQL`’s schema language is an elegant
    fit for exposing a system built upon Event Sourcing and `CQRS` concepts. We’ve
    learned how to think in terms of a `GraphQL` schema, how Event Sourcing and `CQRS`
    are complementary, and how to combine all three of these concepts. We have a casual
    understanding of how data would flow through such a system.


    In the next chapter, I’ll explain the command processor component of this flow
    in greater detail.


    Footnotes [1](#511062_1_En_8_Chapter.xhtml#Fn1_source) [2](#511062_1_En_8_Chapter.xhtml#Fn2_source)
    [3](#511062_1_En_8_Chapter.xhtml#Fn3_source)


    # 9. Command Processor


    The command processor is a critical component of our system. It will be responsible
    for ensuring that a portion of our business rules, those for data at rest, will
    be enforced. In this chapter I explain the ideas behind this component, what will
    be required to construct it, how it works, how it fails, and how to test it. Let’s
    dive in.


    ## What It Is, and Is Not


    The command processor is the event-sourced portion of the system. It is responsible
    for orchestrating the creation of the events that comprise the system’s state.
    As a part of this it also enforces a category of business rules, the rules for
    data at rest. Events describe the past, things that have occurred. In order to
    validly create events, it is necessary to ensure that they satisfy the business
    rules that were in effect at that time.


    In the system this book describes, there is a single command processor that processes
    events in serial. This is a trade-off, and one that other implementations of event
    sourcing may not choose to take. I believe a single command processor simplifies
    a system, especially in the earlier stages. This is a deferrable decision. If
    a single command processor is unable to keep pace with incoming commands, there
    is a path toward parallelization. However, care must be taken when going down
    that path as some constraints upon the system will be more difficult to enforce.
    For the scale that many business applications operate at, I believe the simpler
    solution is preferable. I prefer to defer complexity until it is warranted but
    at the same time thinking ahead to consider how it may be handled as to not preclude
    the possibility in a design.'
