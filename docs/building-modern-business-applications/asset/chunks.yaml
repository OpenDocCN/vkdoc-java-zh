  trans: '

    ## 追踪变更


    在当前的架构中，你可能熟悉两种追踪变更的模式。每种模式都有不同的复杂程度。


    如果追踪变更主要是为了支持应用程序的运维人员，那么可能会使用历史表。假设有一张用于追踪客户的表：


    ```

    CREATE TABLE customers (

    customer_id   BIGINT PRIMARY KEY,

    customer_name TEXT

    );

    ```


    可能会使用以下历史表：


    ```

    CREATE TABLE customer_history (

    -- 0/1/2，分别表示插入/更新/删除

    revision_type      INT,

    revision_timestamp TIMESTAMP,

    customer_id        BIGINT,

    customer_name      TEXT

    );

    ```


    这里，`revision_type` 是一个枚举类型，表示变更的类型（插入、更新或删除），而 `revision_timestamp` 是记录变更的时间。设计时需要考虑，这条记录是
    `customers` 表中变更前的行还是变更后的行。


    如果变更追踪是应用程序的一个功能，那么有条件地查询历史表的复杂性可能并不理想。相反，可以将所有时间点的值都记录在同一张表中：


    ```

    CREATE TABLE customers (

    valid_from    TIMESTAMP,

    valid_to      TIMESTAMP,

    customer_id   BIGINT,

    customer_name TEXT

    );

    ```


    在这个例子中，`valid_from` 和 `valid_to` 捕获了两个时间点，用于指示该行数据在哪个时间段内有效。这种模型可以轻松支持“在某个特定时间点，客户的名称是什么”这类时间点查询。但在写入时会增加复杂性，因为需要插入新值，并调整前一条记录的
    `valid_to` 时间戳。这种模型如果使用 `customer_id` 作为主键也容易出问题，因为会有多行数据包含相同的值。需要一种更复杂的约束，以确保在给定的时间戳下，主键只有一个唯一的值。


    这两种方法都存在一个额外的陷阱。数据库模式是*跨时间统一的*。唯一安全的变更是放宽约束，例如将 `NON NULL` 列改为允许 `NULL`，或者添加一个可为空的新列。任何其他类型的变更要么有风险改变现有数据，要么需要修改数据。


    这带来了一个两难困境。是应该原样保留过去，还是应用程序需要以其他方式进行调整？任何解决方案都会有缺点，并导致“技术债务”。这是一个不易变更的系统。


    即使采用了上述两种方法之一，或者另一种替代方法，仍然存在一个问题：捕获*原因*。


    ## 为什么会发生这种情况？


    通过存储先前的值，我们可以看到过去是什么样子。通过比较过去的状态，我们可以看到值是如何变化的。这足以回答*是什么*。然而，我发现用户真正想问的是*为什么*。


    数据不会凭空发生变化。存在因果关系。我提到的变更追踪机制只捕获了结果，即“是什么”。数据模型本身并没有被设计用来捕获原因，即“为什么”。


    “为什么”或许可以推断出来。如果你知道在变更发生时应用程序中哪些操作是可能的，你就可以利用这些知识对数据进行模式匹配，以判断该变更是否是由某个特定操作引起的。这依赖于为每种变更类型设置特定的代码路径，但如果应用程序使用的是第
    2 章中提到的“通俗 REST”，那么这些路径可能并不存在。如果用户界面通过发送包含更新状态的有效负载进行交互，那么上下文信息就会丢失。


    我希望你对这个问题的本质有所了解。这是我们作为开发者曾经遇到并为自己解决的问题。我们在源代码中遇到过这个问题，并通过版本控制系统（VCS）解决了它。这是一个最佳实践，而且理由充分。VCS
    系统的基本功能是追踪代码库的变更，即“是什么”。当进行变更时，你可以选择提供一条消息，即“为什么”。并没有要求必须提供合理的消息。我曾与一些开发者共事过，他们将其视为一个烦人的守门人，只提供一条象征性的消息来满足要求。我向他们强调了一个观念：一条好的提交信息*解释了为什么*要进行变更。“是什么”是显而易见的，就是变更本身。虽然我明天可能还记得为什么，但一年后可能就不记得了。我曾将提交信息描述为“写给未来自己的笔记”。即使是独自工作时，我也会让它们变得有意义。


    如果追踪系统代码的所有变更是最佳实践，那么为什么追踪系统数据的所有变更不是最佳实践呢？我认为答案是**它应该是**。我相信在过去这是不可行的。追踪所有数据变更需要不断增长的存储容量。如今，现代存储系统的容量，尤其是结合按需云存储，使得这完全可行。那么，一个存储变更的系统应该如何构思呢？


    ## 事件


    当我们考虑存储变更时，它们就是事件：系统中某个操作产生的结果或输出。从这个角度看，每一次变更都是一个事件。通过存储事件，我们可以构建一个系统变更的规范时间线。一个按时间排序的事件集合就是一个日志或账本。这就是
    VCS 系统在概念上的运作方式，因为它们向我们展示了变更的历史。


    在业务应用程序中，一个事件应该包含数据的变更以及变更的*意图*。这同时捕获了“是什么”和“为什么”。事件日志对于描述过去很有用，但对于理解当前状态效率不高。遍历不断增长的事件日志来查找数据片段是不可扩展的。相反，我们可以保留所有事件所隐含的持续运行结果，并用它来回答关于当前状态的问题。在
    VCS 中，这相当于将仓库“检出”到文件系统。利用事件在特定时间点构建“世界状态”的行为称为*物化*。


    这种技术被称为*事件溯源*；将系统的变更作为事件存储，并构建这些事件的物化视图来回答问题。通过将变更表示为事件，它们就变成了消息。这让我们回到了响应式宣言；将系统数据的变更表示为事件，使得变更本身成为消息。


    我们也可以将同样的技术应用于对系统数据的*变更请求*。


    ## 命令


    命令和事件是一枚硬币的两面。它们的区别在于与系统中数据的关系。对所有系统事件进行持续更新的物化视图就是系统的*当前状态*。


    事件是向后看的。它们描述已经发生的事情。命令是向前看的。它们描述对系统状态的*变更请求*。关键词是*请求*。想要进行变更的意愿并不意味着它会被允许。是否允许，取决于针对静态数据的业务规则。


    这是来自一种称为命令查询职责分离（CQRS）模式的概念。在这种模式中，有一个模型用于处理状态变更，另一个独立的模型用于查询。这与事件溯源自然互补。事件可以以多种方式物化，一种用于服务查询，另一种用于强制执行针对静态数据的业务规则。我将后者称为*命令处理*。它是指接收一个命令，判断其是否被允许，如果允许，则确定它会产生哪些事件。


    我想指出的是，这*并非新颖*。这些想法和模式已经存在并实践了几十年。但我相信，在最近几年，它们的*实用性*或*适用性*已经发生了变化。这些是业务应用程序的宝贵实践，并且适用于面向未来的现代架构。

    '
- fmt: '# Understanding Time


    I started this chapter from the historical perspective, how to answer the question
    “What happened?”. That led to introducing events as a fine-grained way of memorializing
    both *what* and *why*. Commands are the precursors for events, and events can
    be used to construct a notion of state. These concepts map cleanly to time. Commands
    represent the future, events are the past, and state is the present.


    This allows us to construct a localized timeline within a system. It is possible
    to time travel to the past by only materializing a portion of the events. This
    is a *local* timeline though. Let’s digress and explore *what time represents*.


    Time is a means of communicating *when*. Communication requires a common reference.
    Here on Earth, we use Coordinated Universal Time (UTC).


    When receiving communication as to when something, and event, occurred, there
    are two dimensions of interest:


    1. The time that the event *occurred*.

    2. The time that you became *aware* of the event having occurred.


    Each of these is a discrete point in time. **They are always different!** Sometimes,
    the difference is negligible, such as actions that you perform, but not always.


    If you touch a stove, your finger will burn before you’re aware that the stove
    is hot. This is a visceral example of the propagation delay of information. The
    time between 1 and 2, although short, is long enough to burn your hand. You need
    to be *aware* of an event and take action upon it. It is only when you are aware
    of the temperature of the stove that you can move your hand.


    In many systems, these two dimensions are conflated. The time that the system
    receives information ends up being the canonical time for when the event occurred.
    It is important to understand that this is a fiction and will result in disparities
    if a system has multiple sources of truth.


    ## Serialization of Time


    Ultimately an application will generate a single timeline of “what happened.”
    In many applications, this is not explicitly managed, and it is delegated to the
    relational database that is storing data. It is then up to the transaction isolation
    level to control how time flows. There is only one mode that provides full consistency,
    `SERIALIZABLE`. It is not the default for any major relational database. I suspect
    that is partially due to performance, and partially due to the onus it places
    on application developers.


    The default settings for most databases allow developers to operate with the database
    in a way that generally results in no errors. They will be sufficiently rare such
    that an error can be propagated far out into the call stack, perhaps resulting
    in the need for a user to retry an operation.


    `SERIALIZABLE` is different. It requires all interactions to be strictly linearizable.
    If that would be violated by a modification, an error is returned, and the transaction
    must be retried. This requires application developers to have structured their
    code that interacts with the database to support multiple invocations. If the
    types of business rules are intermixed, such as performing side effects, there
    is a risk of performing the side effects multiple times.


    Ultimately, the database’s transaction log is an ordered list of changes that
    have been made. It is an *event log*, tucked away inside of the database.


    By representing requests for changes as commands and storing them as events, we
    hoist this event log into our application, allowing the system to use it as a
    first-class construct. This allows *us* to control the serialization of time.
    In deciding the order of commands to process, we are building a timeline.


    ## Eventual Consistency


    A serialization of time provides local consistency. However, our applications
    aren’t operating in a vacuum. They are *a* source of truth for the business, but
    not *the* source of all truths. Eventual consistency is referring to the propagation
    of information over time. As system B becomes aware of changes in system A, B
    is *eventually consistent* with A.


    There is no one true timeline. In a large system composed of many applications,
    each application will have its own perspective on the order that events happened,
    as each will become aware of events independently.


    Generally, this may be acceptable. By using events to communicate what happened,
    each application can keep track of when it became aware of information, allowing
    local answers to “what happened.” However, in business applications, sometimes
    when an event occurred is also important, and that must be tracked as well.


    ## Bitemporality


    Bitemporality is tracking *both* of our time dimensions, when an event occurred,
    and when the system became aware of it. In the business domain, an example of
    this would be a retroactive policy.


    Imagine a loyalty program where points are awarded for purchases. Points are a
    form of currency and can be spent with the business. Unspent points expire after
    a period of time. In our example, points expire a year after they are earned.


    The point tracking application is a separate application. It consumes transaction
    events from elsewhere in the business to track its state of point balances and
    directly manages transactions for spending points. Due to this, it has two points
    of time it tracks, when it is aware of transactions, as well as when the transaction
    occurred. It is bitemporal.


    My point balance “today” is subject to how up to date the application is with
    the transaction event stream. Points are awarded based on the date the transaction
    occurred, not when it was seen by the point tracking application.


    For any past point in time there are two views of the point balance. What was
    the point balance based on the information that was known *at the time*, and what
    was the point balance based on what is known *now*.


    An event log that keeps two timestamps makes answering each of these straightforward,
    a transaction time, and a received time. To answer what the balance was based
    on what was known at the time, only events with a received time prior to the time
    in question would be consulted. To answer what the past balance was based on all
    available information, transaction time would be used.


    In this hypothetical system, transaction time may be the primary timestamp used.
    However, there is still value in recording received time. If a loyalty program
    customer has a question about their point balance, having information about received
    time can be invaluable in answering questions. Data is valuable, and it is best
    to capture it when possible.


    In addition to this contrived example, there is a generally applicable form of
    bitemporality, changing business rules.'
