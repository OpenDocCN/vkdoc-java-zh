- fmt: '### Command Creation


    Each GraphQL mutation *could* have a test created to ensure that it creates the
    expected command. In all honesty, I tend to not write these tests, allowing this
    sort of happy-path validation to occur as a part of the comprehensive system tests
    I will describe in Chapter [12](#511062_1_En_12_Chapter.xhtml). In most cases,
    the logic that is performed here will be a straightforward transformation from
    your mutation’s input arguments into your command.


    What is valuable to test here are the handling of invalid inputs, and any commands
    whose generation involves accessing external systems that could cause their own
    failures.


    Every specific error type that is defined in your GraphQL schema should have a
    test that ensures that it is generated when expected. These tests should simulate
    the experience of the system’s callers. This means that the tests may not be invoking
    the command creation process directly. Rather, they are indirectly invoking this
    process by calling into the GraphQL endpoint with an input that will exercise
    command creation and asserting the expected GraphQL response. I find this to be
    a pragmatic balance between ensuring the code behaves as expected, validating
    that the caller experience is as expected, and not over-authoring tests. If the
    underlying function to turn the inputs into a command is tested, there will still
    be a need to ensure that command creation failures are properly communicated to
    callers. I prefer to write tests to gain the necessary confidence in the system,
    and testing command creation from the GraphQL layer gives me that confidence.


    An exception to this is command creation that relies on external systems where
    I need to inject failures in the tests. If the creation of a command requires
    communicating with another system, that is an opportunity for failure to occur.
    In order to keep our system responsive, we need to bound the execution time for
    external communication. This implies timeouts on any calls made, and determining
    whether retries should be performed, or perhaps relaying the failure to our callers
    and allowing them to determine when to retry. The specifics of these policies
    will depend upon the requirements of your system. There are no hard and fast rules
    on exactly what to do beyond the general rule of doing something to ensure responsiveness
    of our system.


    ## Summary


    You now understand how the command generator is the bridge between GraphQL mutations
    and the command processor. It is responsible for gathering the necessary information
    to create a wholly formed command, a critical step which allows the command processor’s
    mutator function to be stateless and pure. You also understand how to begin to
    navigate the appropriate granularity for commands and what level of specific testing
    of this component is appropriate. As the command generator only returns a sequence
    number upon successful mutations, the next chapter on the event materializer will
    be the bridge between the command processor’s events and the views used to back
    GraphQL queries and subscription to allow callers to see the effect of their changes.


    # 11. Event Materializer


    The event materializer is responsible for maintaining a stateful view model that
    will be used to satisfy GraphQL queries and subscriptions. In this chapter, I
    discuss how this component consumes from our system’s event log and can also consume
    event streams from collaborating systems. I will also describe how this method
    of view maintenance allows for a straightforward implementation of GraphQL subscriptions.
    I will discuss how the event materializer can fail and how to test it to minimize
    those occurrences.


    ## Defining the View Model


    The view model that the event materializer maintains exists for the purpose of
    satisfying GraphQL requests. We can use this specificity to tailor the model for
    the queries that we have defined within our GraphQL schema. More concretely, the
    shape of the state stored within the view model should be very straightforward
    to pass to your GraphQL engine with minimal transformation. If you have denormalized
    data in your schema for ease-of-use by callers, also denormalize it in the storage
    model as well.


    In Chapter [5](#511062_1_En_5_Chapter.xhtml) I discussed business rules, with
    one of the varieties being derivable data. Where possible, prefer to precompute
    this derived data instead of computing it on demand for every request. There are
    efficiency gains by doing work a single time. The system will be able to support
    a greater number of queries as each is less computationally expensive. It is possible
    to retain intermediate outputs for incremental computation, as well as storing
    different versions of the results as inputs change. The latter is valuable for
    debugging. If the time of a request is known, it will be possible to determine
    the data returned without recalculation.


    Events should contain provenance information, when they were generated, the identity
    of who submitted the command they came from, and potentially other metadata that
    is useful in your domain. When materializing the view model, this information
    can be placed in the appropriate locations to communicate to users who last touched
    a given piece of data. The event’s sequence number can be used in a similar fashion.
    In the last chapter, I mentioned passing in an `asOfRevision` value to mutations
    to support optimistic locking within the command processor. Consider where finer-grained
    optimistic locking is appropriate for your domain and include the revision number
    in your schema.


    In my work, I like to create a reusable GraphQL type that contains both provenance
    information as well as the revision number. Unfortunately, there isn’t yet a formalized
    `DateTime` scalar within GraphQL, but there is an open proposal.


    Do not over-index on future-proofing the model. Consider the view model to be
    ephemeral. The authoritative state for our system is stored in the event log.
    A view model can be recreated, if necessary, a topic I discuss in more depth later
    in this chapter.


    While the model I am primarily discussing is for GraphQL, if you have other RPC
    methods you need to support simultaneously, consider having multiple event materializer
    instances with your service, each maintaining a customized view.


    ## Event Materializer Behavior


    The behavior of the event materializer is straightforward. It consumes new events
    from the event log and calls a function for each one that updates a stateful view.
    Your view could be wholly ephemeral, maintained in memory for each one of your
    application instances. In practice, I believe you will end up using an external
    state store of some variety. After updating the view for one event, it then moves
    on to the next. It is *critical* that events are processed sequentially, otherwise
    the view’s state will be corrupted.


    ### Transactions


    I *strongly* encourage using a transactional store. In the prior section, I encouraged
    the use of denormalization in the view model. A single event could involve updating
    multiple pieces of data and the callers to your system should always see consistent
    states. They should not be able to read partially materialized events.


    It is also possible to provide an additional consistency guarantee, that the view
    is consistent relative to a command. In Chapter [9](#511062_1_En_9_Chapter.xhtml)
    where I described the command processor, I introduced a side channel of data,
    the processed command log. The processed command log contains an event for each
    command that has a pointer to the most recent event that the processing of the
    command created. This knowledge can be used to window the event log into batches
    that correspond to the commands that yielded each batch. Each batch is then a
    transactional boundary for the event materializer. This ensures that reads into
    the system always encounter states that are consistent at the end of each mutation.'
