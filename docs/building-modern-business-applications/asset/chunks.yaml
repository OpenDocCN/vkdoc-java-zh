    ### 超时


    在像这样的最终一致性系统中，防止“最终”变成遥遥无期至关重要。系统的用户看重确定性的响应时间，即使响应是失败。虽然我们无法预防所有可能发生的故障，但可以通过使用超时来提供有界的等待时间。这确保了响应能力，这是我在第
    3 章中讨论过的一个原则。


    在命令生成器中有两个地方需要实施超时：提交命令和等待命令处理器对命令的处理结果。向调用者区分这两种失败是有益的，因为针对每种情况，他们需要执行的补偿操作是不同的。


    如果在等待命令处理器时发生超时，我们知道命令已成功提交。如何处理这种失败取决于你观察到它的频率以及将其呈现给用户的重要性。这里简单的解决方案是不做任何补偿。是的，发生了超时，但系统最终能够恢复并处理该变更。如果调用者最终是系统的人类用户，他们可能已经继续他们的工作，而观察到变更就足以让他们决定是否手动重试。如果该变更是由另一个系统执行的，或者它是需要用户明确观察成功的工作流的一部分，那么就需要更复杂的方法。`requestId`
    值将用于添加一个新的 GraphQL 查询，该查询返回请求的 `MutationResult`。我在本章前面提到过，放置命令的信封可以重复用于最终处理过的命令。这意味着
    `requestId` 在处理过的命令上也是可用的。前面描述的快乐路径是使用命令信封上每个命令唯一的值来过滤已处理的命令。由于处理过的命令信封也将包含 `requestId`，因此已处理的命令也可以通过此值进行过滤。然后客户端可以轮询这个新查询来观察命令的处理结果。这个新查询也应该有一个超时，因此调用者需要准备好必要时进行重试。另一种方法是使用
    GraphQL 订阅。订阅签名将与查询相同。使用订阅的好处是，当连接处于静默状态时，订阅的传输机制可能具有保活机制，允许调用者区分是正在等待响应还是系统无响应。


    对于提交命令时的超时，调用者将不知道提交是否成功。本章前面讨论过这个问题的解决方案，即 `requestId`。调用者可以再次调用变更操作，并提供相同的 `requestId`
    值。这次后续尝试的结果将提供关于第一次尝试的信息。如果尝试成功，则先前的命令未被成功提交。如果尝试因 `requestId` 重复而失败，则调用者知道先前的命令已成功提交。


    命令提交超时后，由于 `requestId` 已被使用而导致失败，这意味着命令*确实*已成功提交。在这种情况下，调用者可以使用我描述的处理超时的相同机制来确定命令的处理结果。


    ## 测试命令生成器


    命令生成器可以分为两部分来考虑。首先，是用于命令提交和等待命令处理器结果的通用基础设施；其次，是将变更输入转换为命令的领域逻辑，即命令的创建。


    ### 命令提交


    提交命令并等待处理结果的行为是一种与领域逻辑分离的机械性操作。我喜欢这样的过程，因为它们实现了应用程序基础设施与业务规则之间的关注点分离。此过程的规则严格且有限。只有一条输入数据有规则，即
    `requestId`。


    在为此过程编写测试时，我喜欢使用来自一个与当前业务问题无关的虚构领域的命令。这确保了对领域类型的更改不会对我的代码库的这一部分产生任何影响，而且作为额外的好处，还提供了一个找点乐子的机会。我经常通过使用与我的宠物相关的例子来个性化我的测试。对于命令提交，测试中使用的命令可能与领养新宠物有关，通常使用我多年来养过的宠物的名字和类型。


    在测试命令提交时，我会为提交命令和过滤已处理命令编写一个快乐路径测试。我不会为这些测试使用真实的命令处理引擎，而是使用我可以在测试中控制的桩实例。我重视创建代表系统这些组件之间
    API 契约的接口。使用 API 接口的桩实现，既强化了系统这些组件之间的关注点分离，也加强了对它们之间耦合的严格控制。


    测试此过程的失败模式也很重要。你创建的桩实现应该支持故障注入，以便你可以确保系统在发生故障时能按预期运行。快乐路径测试将在第 12 章描述的测试中得到充分演练。那些测试不太可能暴露在生产环境中可能观察到的失败模式，而确保调用者在面对失败时有良好的体验，对于提供一个响应迅速且有弹性的系统至关重要。

