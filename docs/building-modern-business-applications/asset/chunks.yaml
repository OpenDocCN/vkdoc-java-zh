  trans: '

    ### 从输入参数到命令


    在系统中，一个变更（mutation）代表一个单一事务。这源于命令处理器的行为——它一次只处理一个命令。有意省略了可能包含多个命令的“复合命令”所带来的额外复杂性。这种复杂性涉及是否允许复合命令嵌套，以及复合命令中命令数量的限制。虽然在某些情况下这种复杂性可能是合理的，但我认为创建符合系统用户需求的离散命令是一种更简单的方法。


    单个 GraphQL 请求可能会调用多个变更，因为 GraphQL 允许调用者在查询和变更请求中请求多个字段。如果调用者使用此功能，每个变更将按照请求中指定的顺序依次处理。GraphQL
    规范不允许异步执行变更，因为这样很难推断变更的顺序。在实践中，我并未看到此功能被广泛用于变更，因为它在语义上等同于多个请求。GraphQL 规范对于单个请求中的多个变更应如何全部成功或全部失败没有规定。如果请求只调用一个变更，则更容易推断失败场景并在调用方进行管理。


    在我们的系统中，一个变更最多生成一个命令。当你将变更映射到命令时，可能会发现一个命令在多个变更中被复用。我认为这是一件好事——在系统实现中保持通用性，同时暴露更具体的接口。命令的参数可能隐含在变更所描述的行为中。


    在设计 GraphQL schema 时，考虑到 GraphQL 建模的限制，你应尽可能为输入指定尽可能多的非空约束。你可能会遇到的一个限制是输入类型缺乏联合类型。如果你有一个输入对象，希望调用者最多指定该类型的一个字段，则没有语言机制可以在
    schema 中指示这一点。截至撰写本文时，GraphQL 规范有一个开放的 RFC，旨在为输入对象添加 `@oneOf` 指令，以支持输入对象的有限形式的多态性。


    创建命令的第一步是对 schema 中无法表达的输入值执行额外的验证。这可能包括数字范围限制、字符串长度检查以及命令被视为“有效”所需的任何其他条件。在你的实现中，可以创建自定义指令，以便在
    schema 中指定这些约束。这将使你的实现能够使用这些指令来驱动验证，同时在 schema 中起到描述作用。


    从概念上讲，命令“完全成型”所需的所有验证都是此步骤的一部分。此步骤中的验证仅是结构性的，类似于填写表单的所有字段，而不考虑这些值在语义上是否正确。正如调用者在调用时填写了变更参数的所有字段一样，命令生成器需要在将命令追加到命令日志之前创建一个完整的命令。命令被添加到日志后，系统将没有机会调整命令所隐含的内容。


    GraphQL 社区通常建议让变更尽可能具体。这条建议的关键部分是*尽可能*。一个极端是使用一个单一的变更来处理任何场景的 schema。我希望这听起来至少令人困惑，理想情况下是毫无意义的。这样的
    schema 需要大量文档来说明如何针对特定场景调用它。社区指南的意图是让 schema 本身对变更具有自文档性。通过拥有具体的变更，变更名称本身就指示了它将执行的操作。


    在创建 GraphQL schema 时，我首先让所有变更尽可能具体，并在生成的命令中反映这种具体性。然后，随着调用者开始了解 schema 如何融入他们的工作流程，可能会出现某些变更范围需要扩大的情况。


    例如，考虑以下两个变更（暂时忽略它们的返回值）：


    ```

    input CreateCustomerInput {

    name: String!

    }

    input UpdateCustomerRegionInput {

    customerId: ID!

    regionId: ID!

    }

    type Mutation {

    createCustomer(input: CreateCustomerInput!): Boolean

    updateCustomerRegion(input: UpdateCustomerRegionInput!): Boolean

    }

    ```


    在这个假设的系统中，存在属于区域的客户。新创建的客户在分配区域之前没有关联区域。在实践中，创建客户的用户界面流程总是在创建客户后调用 `updateCustomerRegion`。因此，向
    `CreateCustomerInput` 类型添加一个可选的 `regionId` 是合理的，从而为调用者提供更简单的交互模式。我所支持的就是这种基于实际用例驱动的通用化变更。任何通用化的目标都应是解决
    schema 用户的实际痛点。这应与具体性的目标相平衡，以避免调用者与实现之间的耦合。理论上，具体的变更允许调用者按照他们认为合适的方式组合他们的流程。

    '
- fmt: '### Appending to the Command Log


    After a command has been created, it needs to be appended to the command log for
    the command processing engine to act upon it. It is here that the order of commands
    is established. If the system receives two mutations contemporaneously, it is
    the order that they are appended to the command log that defines the order that
    they will be processed in.


    The act of appending the command is also an opportunity to perform another validation,
    the rejection of duplicate requests. Imagine a scenario where a caller sends a
    request for a mutation but then experiences a network interruption and is unable
    to receive the response. How can the caller ensure that their request was handled?
    If the caller were to resend their request, there could be side effects that this
    request implies that would be undesirable to duplicate. We need a mechanism to
    allow for client requests to be *idempotent*. Strict, by-the-book idempotency
    is infeasible for mutations, as the intent of a mutation is to generate a side
    effect. It is a valid scenario to invoke a mutation multiple times with the intent
    of triggering the side effect multiple times. To handle these two scenarios, the
    intentional and unintentional repetition of a mutation, we will introduce a new
    argument to each mutation, a client request identifier.


    The client request identifier, abbreviated as a `requestId`, is a value that is
    unique for every logical request. If a client intends to invoke a mutation five
    times, they will need to supply five distinct IDs. However, if a client invokes
    a mutation and experiences a network interruption and is unsure if it was accepted
    by the system, they should resend the request with the *same* ID.


    An ideal location for checking whether a `requestId` has been previously observed
    is when attempting to append the command to the command log. By having the command
    log also track that set of observed IDs, duplicate requests can be detected.


    If a duplicate request is observed, how should the system behave? I lean toward
    treating it as a failure for the duplicate request. The caller knows whether they
    have retried a request. If a retried request fails because the `requestId` has
    already been used, the caller has the context to understand what occurred. If
    this failure occurs for a request that the caller hasn''t repeated, there is something
    else afoot that will need to be investigated. Perhaps there is a logic error in
    the system, or the generation of IDs across clients isn''t sufficiently unique.


    If an expected duplicate request is observed, how can the caller learn of the
    disposition of the original request? The `requestId` is a unique identifier that
    can be used to look up the prior disposition. My preferred mechanism is to have
    a query that can be called to return the disposition of any prior `requestId`.
    The alternative is to have the duplicate request return a variation upon the success
    case, a "this request has already been executed." The frequency at which this
    occurs will likely guide your choice. For business applications that are usually
    used by users that are in relatively fixed locations, duplicate requests due to
    network disruptions will be rarer compared to a business application used on a
    mobile device.


    ### Returning the Mutation Result


    The final step of the mutation flow is to return the result of the mutation to
    the caller. After successfully appending the command to the command log, it will
    become visible to the command processor. As described in the prior chapter, there
    is an additional message log, the processed command log, that directly relates
    a command to its result. This message log will be temporarily subscribed to in
    order to observe the mutation result.


    There is a *critical* timing nuance here. Your code needs to subscribe to the
    processed command log *before* appending the command to the command log. If the
    order is reversed, you risk missing the event if the command processor completes
    before the processed command log subscription is active.


    The processed command log contains results for all commands. We need a mechanism
    to filter the results for the command we have appended. The interaction with our
    caller is a request/response interaction, and that is the same pattern that is
    used with the command processing engine. However, with the command processing
    engine, it is indirect as we are appending to one message log and observing the
    result on another. My solution is to use the envelope pattern.


    The envelope pattern is when you wrap your messages in an envelope, just as you
    would when sending a letter using the postal service. The command log doesn''t
    contain commands, it contains commands wrapped in envelopes. When the command
    processor processes a command and appends to the processed command log, it *reuses*
    the envelope that the command arrived in. Since there is a one-to-one relationship
    between commands and processed commands, this is a straightforward operation.
    Reusing the envelope with the event log would be tricker, as a command can generate
    multiple events. We would then need policies for how to safely duplicate envelopes,
    complexity that I prefer to avoid if possible.


    With the envelope pattern in place, the command generator can place a unique identifier
    (such as a UUID) on the envelope prior to appending to the command log. The processed
    command log results can then be filtered by this identifier to find the processed
    command that corresponds to our command. This is a distinct value from the `requestId`,
    as it is globally unique within the system. It identifies a specific command,
    even if the command is a logical duplicate due to the reuse of the `requestId`.


    A processed command contains the sequence number corresponding to our command,
    the maximum sequence number for any generated events, and the result of the command,
    whether it succeeded or failed. This information will be used to construct the
    mutation result.


    Failures will be communicated to callers via types in the GraphQL schema rather
    than using GraphQL''s error mechanism. This is because errors in GraphQL are *untyped*.
    The GraphQL specification defines how errors appear in a response, but there are
    no facilities for describing their structure. I view this as a steering mechanism.
    Mutation failures will ultimately need to be communicated to users. As a business
    application, there will be mutations that fail because the change would violate
    the system''s business rules. When this situation happens, it is critical to communicate
    as much detail about the violation to users, so they understand the nature of
    the violation and can correct the input.


    I prefer to structure the return type of my mutations as a union between success
    and failure:


    ```

    union MutationResult = MutationSuccess | MutationFailed

    ```


    The `MutationFailed` type is a container to hold additional details. Just as how
    your data is modeled in the GraphQL schema, the ways in which your business rules
    can be violated should be modeled in the schema.


    My preferred mechanism is to have an enumeration that indicates a class of errors,
    and then a field that implements an interface with more specific details. Recall
    the example from earlier in this chapter:'
