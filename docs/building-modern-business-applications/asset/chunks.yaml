    ### 数据库


    物化引擎需要将视图物化到数据库中。具体选择哪种类型的数据库，取决于你的领域数据以及你擅长的运维方式。某些领域可能适合文档型数据库，其中实体粒度较粗，为每个实体维护单一文档符合读取特性。其他领域可能希望使用关系型数据库，因为其普及性使得许多开发者对其非常熟悉。你的领域和业务规则可能要求物化引擎执行聚合操作，而这正是关系模型所擅长的。


    没有放之四海而皆准的解决方案，你在此处选择的技术将取决于你的具体情况。该系统设计的一个优势在于，选择哪种数据库并非一劳永逸的决定；这体现了我们拥抱变化的原则。数据的权威存储位于仅追加的事件日志中。如果你决定迁移到新的存储，多个物化引擎可以维护多个视图。


    ## 总结


    现在你理解了所提议的设计是如何与系统约束和操作原则保持一致并得到支持的。实现该设计所需的技术数量很少：发布/订阅消息、分布式锁、仅追加日志，以及用于物化视图的数据库。我希望你已经开始思考，并考虑自己熟悉且能舒适使用的实现方案。本书关于系统设计的这一部分到此结束。下一部分和章节将深入探讨具体实现。


    # 第四部分 实现


    # 14. 使用现代 Spring、Java 和 PostgreSQL 进行构建


    在我们迄今为止的旅程中，我解释了本书对业务应用的定义、业务应用应具备的特性和功能，并介绍了一种满足这些特性和功能的设计。虽然本书的前面部分与具体实现无关，但最后这部分将专注于使用特定技术来实现该设计。


    在本章中，我将介绍我用来实现该设计的一套工具。希望你能认可我的选择。


    ## 通过 PostgreSQL 实现所需技术


    前一章提到了实现该设计所需的四项关键技术：


    *   仅追加日志

    *   发布/订阅消息

    *   分布式锁

    *   数据库


    所有这些技术都可以通过单一解决方案 PostgreSQL 来实现。它是一个健壮的数据库系统，已经积极开发了 30 多年，在类似 BSD 或 MIT 许可的自由许可下作为开源软件提供。我早在
    2000 年就开始使用它，当时它是唯一支持 ACID 事务和外键的开源关系型数据库系统。它对可靠性和数据完整性的高度重视吸引了我，它已成为我在需要数据库的项目中的首选系统。


    在设计系统时，我喜欢最小化运维开销。如果每项技术都由独立的实现来解决，那就需要管理五个技术栈（四项技术加上应用本身）。在当前团队实践 DevOps 并同时负责开发和运维的趋势下，这种运维职责的最小化最终能让团队更加敏捷。


    如果 PostgreSQL 成为其中某项技术的限制因素，始终可以选择替换其实现。这又回到了我们的两个原则：设计灵活性和模块化。


    从另一个角度来看，其中一项技术*就是*数据库。如果该数据库还具备其他开箱即用的能力，为什么不同时利用它们呢？我曾经有队友主张使用独立的工具，他们认为一个具有多种功能的工具类似于“叉勺”，一种兼具勺子和叉子功能的混合餐具。叉勺常常被人看不起，因为大多数接触到的都是一次性叉勺，作为快餐或预包装餐食的一部分。在这些情况下，使用叉勺通常是为了节省成本和减少浪费，用单一餐具替代两种。选择叉勺是被迫的。我的反驳是，有时人们*可以主动选择*使用叉勺。如果你要去露营，想尽量减少携带的餐具数量，那么将功能整合到单一餐具中就变成了一个理想的特性，而且这是你自己做出的决定。


    在接下来的章节中，我将详细阐述 PostgreSQL 如何能够满足所有这些需求。

    '
- fmt: '### Advisory Locks


    Like many databases, PostgreSQL internally uses locks in order to provide its
    consistency guarantees. Under normal circumstances, this is generally transparent
    to users. You’ll be aware of them when debugging problems, such as statements
    that aren’t completing as expected due to them waiting on locks.


    PostgreSQL exposes the ability to create locks that have application-defined meaning.
    These locks are called *advisory locks* because from the database server’s perspective
    they have no semantic meaning, and the server doesn’t enforce their usage.


    There are two varieties of advisory locks: locks that are bound to a transaction
    and locks that are bound to a connection (the PostgreSQL documentation refers
    to this as a *session*). Locks can also be shared or exclusive; we want to use
    exclusive locks as the goal is to obtain an exclusive right to run a process in
    the application cluster.


    If you are thinking that locks may be emulated with a flag in a table, you are
    correct. There are two advantages to using advisory locks. The first advantage
    is that lock activity is kept outside of the structures that PostgreSQL uses to
    store table data. PostgreSQL uses a multi-version concurrency control (MVCC) model
    where updates to rows don’t modify data in place. Instead, they create a new version
    of the row that is only visible to newer transactions. As older transactions are
    complete, there will be rows that are no longer visible by any transaction and
    can be cleaned up. This is the essence of vacuuming, a critical background maintenance
    process that is often transparent but important to be aware of. The second advantage
    is a critical one that I believe tilts the table in favor of using advisory locks;
    they are automatically released when the obtaining transaction or connection completes
    (depending on the type that was acquired).


    For our system, we will use advisory locks that are bound to a connection. When
    the connection terminates (whether intentionally or not), we have a server-provided
    guarantee that an acquired lock will be released.


    When attempting to acquire a lock there are two basic patterns that may be used.
    The first is to use a blocking call where the lock acquisition blocks until it
    can be obtained. I’m not a fan of this method because the blocking statement manifests
    as a long-running `SELECT` statement; lock manipulation is done via function calls
    that are invoked with `SELECT`’s. I find that the long-running statements distort
    monitoring of the system as they need to be filtered out given that they are expected
    behavior. Long-running statements may also not generate any network activity from
    the caller which can also cause the underlying TCP connection to be timed out
    in some environments. This can be especially pernicious to debug!


    My preferred pattern is to use the lock acquisition function that tries to acquire
    and immediately returns a boolean result that indicates if acquisition was successful.
    This allows my code to control how often lock acquisition is attempted, usually
    every 5 to 10 seconds. I prefer this because it avoids both problems from the
    prior paragraph; the acquisition attempts run deterministically, and the connection
    is exercised on each attempt preventing it from appearing unnaturally idle.


    Once a lock has been acquired the connection does need to be exercised to ensure
    that is healthy. To achieve this, I execute a `SELECT 1` call every few seconds
    in a loop. If you aren’t familiar with this idiom, it is the same statement that
    connection pools use to validate the health of a PostgreSQL connection; it returns
    the literal value `1`. If the connection has been unexpectedly terminated, the
    statement will fail allowing our code to react to the termination.


    ### LISTEN and NOTIFY


    PostgreSQL contains a publish/subscribe (pub/sub) messaging system in the form
    of the `LISTEN` and `NOTIFY` commands. Messages are organized into channels and
    can contain an optional payload. The `NOTIFY` command is used to send a message,
    and `LISTEN` is used to listen for messages.


    #### NOTIFY


    For publishing, a pattern suggested by the PostgreSQL documentation, and the one
    that I also use, is a trigger attached to a table to generate messages. This can
    be combined with PostgreSQL’s JSON functions to pass the updated row as JSON back
    to the application. Here’s an example snippet that I’ll use to explain further:


    ```

    CREATE FUNCTION send_notification()

    RETURNS TRIGGER AS

    $$

    BEGIN

    PERFORM pg_notify(''my_channel_name'', row_to_json(new)::TEXT);

    RETURN NULL;

    END;

    $$ LANGUAGE plpgsql;

    CREATE TRIGGER notify_table_updated

    AFTER INSERT OR UPDATE

    ON your_table

    FOR EACH ROW

    EXECUTE FUNCTION send_notification();

    ```


    Starting from the bottom, a trigger is attached to a table, in the example it’s
    `your_table`. You’ll also name the trigger, rather than my placeholder’s name
    of `notify_table_updated`. For each row that is inserted or updated, the `send_notification`
    function will be invoked. This is boilerplate for creating a trigger on a table;
    the action to perform is separate from creating the trigger on a table as this
    allows the function to be reused across multiple tables.


    The `send_notification` function is the action. It is a function defined as a
    trigger. It performs a single task, invoking the `pg_notify` function. This function
    is equivalent to the `NOTIFY` command; it is used instead of `NOTIFY` as it is
    easier to use with nonconstant channel names or payloads, which the example is
    doing. The channel name is `my_channel_name` with a payload being a JSON representation
    of the modified row. In triggers, `new` refers to the new state of the data and
    we pass that to `row_to_json` to convert it to JSON, followed by a cast back to
    `TEXT` as that’s the datatype required by `pg_notify`.


    Another benefit of using `NOTIFY` is that it is transactional. Messages sent within
    a transaction are not delivered until the transaction has committed. If the transaction
    is rolled back, nothing ever delivered.


    There is also nothing wrong with explicitly calling `NOTIFY` from application
    code. I prefer the trigger approach for most usages as the event is often related
    to data changes in a table and coupling it to the table within the database ensures
    that they are always generated. There are situations where I want to send messages
    that are unrelated to table changes, such as passing heartbeat messages across
    the cluster.


    #### LISTEN


    For subscribing, the `LISTEN` command is used. It takes a single parameter, the
    name of the channel to listen on. A connection may listen to multiple channels
    at once.


    As this functionality is outside of the SQL standard, access to events is a proprietary
    feature in PostgreSQL drivers. It isn’t exposed in the database agnostic APIs
    that many platforms offer.


    A connection that is `LISTEN`-ing should be dedicated for this purpose. The returned
    data structure will vary slightly according to the client API in use, but a commonality
    with all of them will be access to the channel name and payload.


    I’ll discuss `LISTEN` in more depth later in this chapter as a part of introducing
    the R2DBC API.'
