  trans: '

    ## 结合 GraphQL + ES + CQRS


    正如我在前面关于事件溯源的章节中提到的，ES 模式并未规定事件的触发原因。我在第 6 章讨论时间时引入了*命令*的概念，这里将使用这一概念。我将解释各个部分如何组合在一起，然后更详细地描述它们。


    GraphQL 变更（mutation）应该是*具体*且*语义化*的。变更可以清晰地映射到命令。命令可以应用于系统的当前状态，从而产生事件，推动状态随时间向前演进。这些事件可以物化为与
    GraphQL 查询模式相对应的视图。由于我们确切知道哪些内容发生了变化，这些事件还可以用于驱动 GraphQL 订阅。


    事件溯源驱动着变更。CQRS 则是变更及其模型（由 GraphQL 模式中的输入对象描述）与查询和订阅（使用对象类型）之间的分离。GraphQL 中输入和输出类型的分支很好地支持了这种分离，并鼓励我们恰当地对每一侧进行建模。


    从变更开始，存在一个“命令生成器”，负责从变更中派生出命令。变更与命令之间可能并非一一对应。每个变更会生成一个命令，但多个变更可能生成相同的命令，或者一个变更可能根据其特定参数生成不同的命令。在
    GraphQL 模式中，变更本质上是一个函数。函数的调用被封装在一条消息（即命令）中。第 10 章将详细探讨这个组件。


    命令是对变更的请求。存在一个“命令处理器”接收这些请求并输出事件。命令处理器负责一类业务规则，即“静态数据”规则。下一章将重点介绍这个组件。


    事件由“事件物化器”接收，它负责创建用于满足 GraphQL 查询和订阅的模型。第 11 章将探讨这个组件。


    这就形成了一个简单的循环。客户端使用查询来观察系统状态。然后，他们发出变更以进行修改。命令生成器将变更转换为命令。这些消息随后被命令处理器接收并生成事件。事件被事件物化器接收，并用于更新用于满足客户端查询的视图。系统的外部是一个
    GraphQL 接口。内部则由消息传递组成，无论是命令还是事件。


    这种数据流使我们能够将系统内部实现为响应式系统，因为它从根本上由消息传递构成。


    ## 本章小结


    在本章中，我们了解了 GraphQL 的模式语言如何优雅地适用于暴露一个基于事件溯源和 CQRS 概念构建的系统。我们学习了如何从 GraphQL 模式的角度进行思考，事件溯源和
    CQRS 如何互补，以及如何将这三个概念结合起来。我们对数据如何流经这样一个系统有了初步的理解。


    在下一章中，我将更详细地解释此流程中的命令处理器组件。


    脚注 1   2   3


    # 9. 命令处理器


    命令处理器是我们系统中的一个关键组件。它将负责确保一部分业务规则（即静态数据规则）得到执行。在本章中，我将解释这个组件背后的理念、构建它所需的条件、它的工作原理、失败方式以及如何测试它。让我们开始吧。


    ## 它是什么，以及不是什么


    命令处理器是系统中事件溯源的部分。它负责协调构成系统状态的事件的创建。作为其中的一部分，它还强制执行一类业务规则，即静态数据规则。事件描述的是过去，即已经发生的事情。为了有效地创建事件，必须确保它们满足当时生效的业务规则。


    在本书描述的系统中，有一个单一的命令处理器，它串行处理事件。这是一种权衡，其他事件溯源的实现可能不会选择这样做。我认为单一的命令处理器可以简化系统，尤其是在早期阶段。这是一个可以推迟的决策。如果单个命令处理器无法跟上传入命令的速度，那么存在一条通往并行化的路径。然而，在走这条路时必须小心，因为系统中的某些约束将更难执行。对于许多业务应用程序所运行的规模，我认为更简单的解决方案更可取。我倾向于在必要时才引入复杂性，但同时要提前考虑如何处理它，以免在设计上排除这种可能性。

    '
- fmt: '## Requirements


    Commands and events are each a type of message. In the prior chapter, I explained
    that the sequenced set of events is termed an event log. It then follows that
    a generalization of this for any type of message can be termed a message log.


    The command processor receives commands as inputs, and outputs zero or more events
    for each command. To simplify the operation of this component, commands will be
    received from a message log, the command log. More details on writing to the command
    log are in the next chapter, as a part of the command generator. For the purposes
    of the command processor and this chapter, the command log is the ordered set
    of commands that are awaiting processing.


    This act of storing commands into a command log is another existing practice that
    is, unsurprisingly, named command sourcing. In this book’s system, I am combining
    these two practices. Commands are sourced in order to generate events, and events
    are sourced in order to generate the official state of the system. Going from
    a command to events is akin to a mapping function from the command log to the
    event log. The next section on composing the core loop expands upon this idea.


    After processing a command, the system doesn’t have a specific need to retain
    the command. While the event log must be persisted across all time, processed
    commands can be discarded. However, there are benefits to retaining them that
    the section on testing later in this chapter will explore.


    The command processor is enforcing one of the categorizations of business rules
    I described in Chapter [5](#511062_1_En_5_Chapter.xhtml), those for data at rest.
    This is a critical responsibility of the command processor. For the proposed means
    of operation of this component, it is critical that the generation of events is
    *free from side effects*. Side effects are a separate category of business rules
    and must come after generating events, not as a part of the process that generates
    them. Side effects take two forms. The common one that often comes to mind is
    the case of a notification. Something happened, and we need to let another system
    know. This form is akin to a function that returns void; it’s “fire and forget.”
    The sometimes-overlooked category of side effects is the side effects that consult
    another source of state and return something from that state. It is critical to
    realize that these interactions are *also* side effects. A command represents
    a request to change the state of the system. In order to be an accurate representation,
    a command must be a complete representation of *all* information needed to fulfill
    the request. If there is data validation that involves a state that is external
    to the command processor, that state must be consulted as a part of command generation,
    not command processing.


    This makes a short list of requirements for the command processor that I will
    use in the next section as part of composing its processing loop:


    *   Commands are sourced from a command log.

    *   Processing commands is a mapping function from the command log to the event
    log.

    *   The mapping function must be free from side effects.


    ## Composing the Core Loop


    It is useful to view the command processor as a loop. Given a command and the
    current state of the system, call a function that takes those two data points
    as inputs and returns a list of new events as output. As new commands arrive,
    repeat. The command log supplies the system with new commands, but where does
    the current state come from? In an event-sourced system such as this one, there
    is no single “current state.” Changes to the state are spread across the event
    log. In order to process commands, it is necessary to derive this view of the
    “current state.”


    Since the command processor is only responsible for enforcing the business rules
    for data at rest, its view of the current state is a subset of all the information
    contained within the events. Its current state only needs to contain the information
    necessary to enforce the rules.


    Message logs are infinite streams. For the event log, every event implies a new
    version of the “current state.” To achieve this, I will use a concept from stream
    processing, a `scan` operator. This is a type of folding function. Folding functions
    are a type of higher-order function used to recursively analyze data structures.
    You may be familiar with this concept via the name that it is commonly available
    as in many standard libraries, `reduce`. A folding function requires two inputs:
    an initial value, and a function that accepts two arguments, an element from the
    data structure and the initial value, yielding the next value. This function is
    repeatedly invoked for every element in the data structure, with the return value
    from one invocation being the initial value for the next. After all elements of
    the data structure had been exhausted, the final return value is used as the folding
    functions return value.


    Computing the sum of a list of integers is an example of a folding function. Given
    a list of numbers:


    ```

    [1,3,5,7,9]

    ```


    To compute the sum, we would invoke a `reduce` function as follows:


    ```

    reduce([1,3,5,7,9], 0, (state, item) => state + item)

    ```


    The return value of `reduce` would be `25`. The third argument is our “reducing”
    function. The first argument is the state of the reduction, and when processing
    the first item of the list, it will be the initial value, `0`. The second argument
    is the current item from the list. Unrolling the internal loop that `reduce` is
    performing would be akin to:


    ```

    reducer = (state, item) => state + item)

    result = 0

    result = reducer(result, 1) # result is 1

    result = reducer(result, 3) # result is 4

    result = reducer(result, 5) # result is 9

    result = reducer(result, 7) # result is 16

    result = reducer(result, 9) # result is 25

    ```


    Seeing the unrolled form may allow your eyes to realize the trick that `scan`
    performs. Since `scan` is operating upon a stream, it can generate an output stream
    based on the incremental values of `result`. The output stream starts with the
    initial value, and then for each element in the input stream the output contains
    the result of applying the reducing function to the prior element of the output
    stream plus the next element of the input stream.


    When applied to an event log, `scan` can be used to derive a state value after
    every event. The initial value is the state of the system before any events are
    added. The reducer is then invoked with the prior state and the next event. With
    this, the event log is mapped to a stream of system states.'
  raw: '## Requirements


    Commands and events are each a type of message. In the prior chapter, I explained
    that the sequenced set of events is termed an event log. It then follows that
    a generalization of this for any type of message can be termed a message log.


    The command processor receives commands as inputs, and outputs zero or more events
    for each command. To simplify the operation of this component, commands will be
    received from a message log , the command log. More details on writing to the
    command log are in the next chapter, as a part of the command generator. For the
    purposes of the command processor and this chapter, the command log is the ordered
    set of commands that are awaiting processing.


    This act of storing commands into a command log is another existing practice that
    is, unsurprisingly, named command sourcing. In this book’s system, I am combining
    these two practices. Commands are sourced in order to generate events, and events
    are sourced in order to generate the official state of the system. Going from
    a command to events is akin to a mapping function from the command log to the
    event log. The next section on composing the core loop expands upon this idea.


    After processing a command, the system doesn’t have a specific need to retain
    the command. While the event log must be persisted across all time, processed
    commands can be discarded. However, there are benefits to retaining them that
    the section on testing later in this chapter will explore.


    The command processor is enforcing one of the categorizations of business rules
    I described in Chapter [5](#511062_1_En_5_Chapter.xhtml), those for data at rest.
    This is a critical responsibility of the command processor. For the proposed means
    of operation of this component, it is critical that the generation of events is
    *free from side effects*. Side effects are a separate category of business rules
    and must come after generating events, not as a part of the process that generates
    them. Side effects take two forms. The common one that often comes to mind is
    the case of a notification. Something happened, and we need to let another system
    know. This form is akin to a function that returns void; it’s “fire and forget.”
    The sometimes-overlooked category of side effects is the side effects that consult
    another source of state and return something from that state. It is critical to
    realize that these interactions are *also* side effects. A command represents
    a request to change the state of the system. In order to be an accurate representation,
    a command must be a complete representation of *all* information needed to fulfill
    the request. If there is data validation that involves a state that is external
    to the command processor, that state must be consulted as a part of command generation,
    not command processing.


    This makes a short list of requirements for the command processor that I will
    use in the next section as part of composing its processing loop:


    *   Commands are sourced from a command log.


    *   Processing commands is a mapping function from the command log to the event
    log.


    *   The mapping function must be free from side effects.


    ## Composing the Core Loop


    It is useful to view the command processor as a loop . Given a command and the
    current state of the system, call a function that takes those two data points
    as inputs and returns a list of new events as output. As new commands arrive,
    repeat. The command log supplies the system with new commands, but where does
    the current state come from? In an event-sourced system such as this one, there
    is no single “current state.” Changes to the state are spread across the event
    log. In order to process commands, it is necessary to derive this view of the
    “current state.”


    Since the command processor is only responsible for enforcing the business rules
    for data at rest, its view of the current state is a subset of all the information
    contained within the events. Its current state only needs to contain the information
    necessary to enforce the rules.


    Message logs are infinite streams. For the event log, every event implies a new
    version of the “current state.” To achieve this, I will use a concept from stream
    processing, a `scan` operator. This is a type of folding function. Folding functions
    are a type of higher-order function used to recursively analyze data structures.
    You may be familiar with this concept via the name that it is commonly available
    as in many standard libraries, `reduce`. A folding function requires two inputs:
    an initial value, and a function that accepts two arguments, an element from the
    data structure and the initial value, yielding the next value. This function is
    repeatedly invoked for every element in the data structure, with the return value
    from one invocation being the initial value for the next. After all elements of
    the data structure had been exhausted, the final return value is used as the folding
    functions return value.


    Computing the sum of a list of integers is an example of a folding function. Given
    a list of numbers:


    ```

    [1,3,5,7,9]

    ```


    To compute the sum, we would invoke a `reduce` function as follows:


    ```

    reduce([1,3,5,7,9], 0, (state, item) => state + item)

    ```


    The return value of `reduce` would be `25`. The third argument is our “reducing”
    function. The first argument is the state of the reduction, and when processing
    the first item of the list, it will be the initial value, `0`. The second argument
    is the current item from the list. Unrolling the internal loop that `reduce` is
    performing would be akin to:


    ```

    reducer = (state, item) => state + item)

    result = 0

    result = reducer(result, 1) # result is 1

    result = reducer(result, 3) # result is 4

    result = reducer(result, 5) # result is 9

    result = reducer(result, 7) # result is 16

    result = reducer(result, 9) # result is 25

    ```


    Seeing the unrolled form may allow your eyes to realize the trick that `scan`
    performs. Since `scan` is operating upon a stream, it can generate an output stream
    based on the incremental values of `result`. The output stream starts with the
    initial value, and then for each element in the input stream the output contains
    the result of applying the reducing function to the prior element of the output
    stream plus the next element of the input stream.


    When applied to an event log, `scan` can be used to derive a state value after
    every event. The initial value is the state of the system before any events are
    added. The reducer is then invoked with the prior state and the next event. With
    this, the event log is mapped to a stream of system states.'
  trans: '

    ## 需求


    命令和事件各自是一种消息类型。在前一章中，我解释了按顺序排列的事件集合被称为事件日志。由此可以推论，对于任何类型的消息，其泛化形式可称为消息日志。


    命令处理器接收命令作为输入，并为每条命令输出零个或多个事件。为简化该组件的操作，命令将从消息日志（即命令日志）中接收。关于写入命令日志的更多细节将在下一章中作为命令生成器的一部分进行说明。就命令处理器和本章而言，命令日志是等待处理的有序命令集合。


    将命令存储到命令日志中的这一做法，毫不意外地被称为命令溯源。在本书的系统中，我将这两种实践结合起来。命令被溯源以生成事件，而事件被溯源以生成系统的官方状态。从命令到事件的转换，类似于从命令日志到事件日志的映射函数。下一节关于构建核心循环的内容将进一步阐述这一概念。


    处理完命令后，系统并不需要特意保留该命令。虽然事件日志必须永久持久化，但已处理的命令可以被丢弃。然而，保留它们也有好处，本章后面的测试部分将对此进行探讨。


    命令处理器强制执行了我在第 5 章中描述的业务规则分类之一，即针对静态数据的规则。这是命令处理器的一项关键职责。对于该组件的拟议运行方式而言，事件的生成必须*无副作用*，这一点至关重要。副作用是业务规则的另一个独立类别，必须发生在事件生成之后，而不是作为生成过程的一部分。副作用有两种形式。通常想到的常见形式是通知的情况：发生了某些事情，我们需要通知另一个系统。这种形式类似于返回
    void 的函数；它是“即发即忘”。有时被忽视的副作用类别是那些查询其他状态源并从中返回某些内容的副作用。必须认识到，这些交互*同样*是副作用。命令代表改变系统状态的请求。为了准确表示，命令必须完整包含满足请求所需的*所有*信息。如果数据验证涉及命令处理器外部的状态，则该状态必须在命令生成阶段（而非命令处理阶段）被查询。


    这为命令处理器列出了一份简短的需求清单，我将在下一节中将其作为构建其处理循环的一部分：


    *   命令从命令日志中溯源。

    *   处理命令是从命令日志到事件日志的映射函数。

    *   映射函数必须无副作用。


    ## 构建核心循环


    将命令处理器视为一个循环是很有用的。给定一个命令和系统的当前状态，调用一个函数，该函数将这两个数据点作为输入，并返回一个新事件列表作为输出。当新命令到达时，重复此过程。命令日志为系统提供新命令，但当前状态从何而来？在像这样的事件溯源系统中，不存在单一的“当前状态”。状态的变更分散在事件日志中。为了处理命令，必须推导出“当前状态”的视图。


    由于命令处理器仅负责强制执行针对静态数据的业务规则，其对当前状态的视图只是事件中包含的所有信息的一个子集。其当前状态只需包含执行规则所必需的信息。


    消息日志是无限的流。对于事件日志，每个事件都意味着“当前状态”的一个新版本。为了实现这一点，我将使用流处理中的一个概念：`scan` 运算符。这是一种折叠函数。折叠函数是一种高阶函数，用于递归分析数据结构。你可能通过它在许多标准库中常见的名称
    `reduce` 熟悉这个概念。折叠函数需要两个输入：一个初始值，以及一个接受两个参数（数据结构中的一个元素和初始值）并生成下一个值的函数。该函数会为数据结构中的每个元素重复调用，一次调用的返回值成为下一次调用的初始值。当数据结构中的所有元素都处理完毕后，最终的返回值被用作折叠函数的返回值。


    计算整数列表的总和是折叠函数的一个例子。给定一个数字列表：


    ```

    [1,3,5,7,9]

    ```


    要计算总和，我们将按如下方式调用 `reduce` 函数：


    ```

    reduce([1,3,5,7,9], 0, (state, item) => state + item)

    ```


    `reduce` 的返回值将是 `25`。第三个参数是我们的“归约”函数。第一个参数是归约的状态，在处理列表的第一个元素时，它将是初始值 `0`。第二个参数是列表中的当前元素。展开
    `reduce` 执行的内部循环，类似于：


    ```

    reducer = (state, item) => state + item)

    result = 0

    result = reducer(result, 1) # result 为 1

    result = reducer(result, 3) # result 为 4

    result = reducer(result, 5) # result 为 9

    result = reducer(result, 7) # result 为 16

    result = reducer(result, 9) # result 为 25

    ```


    看到展开的形式，你可能会意识到 `scan` 所执行的技巧。由于 `scan` 是在流上操作，它可以基于 `result` 的增量值生成一个输出流。输出流以初始值开始，然后对于输入流中的每个元素，输出包含将归约函数应用于输出流的前一个元素加上输入流的下一个元素的结果。


    当应用于事件日志时，`scan` 可用于在每个事件之后推导出一个状态值。初始值是添加任何事件之前的系统状态。然后，归约器会使用先前的状态和下一个事件被调用。通过这种方式，事件日志被映射到一个系统状态流。

    '
- fmt: '# The Core Loop as Stream Processing


    The core loop is now able to be expressed in terms of stream processing. We have
    two streams: the command log and the event log. The event log can be mapped into
    a stream representing system states using a `scan` operation. These two streams,
    the stream of states and the stream of commands, can then be “zipped” together
    to create a stream of events, our event log! “Zipping” is another stream processing
    operation that borrows its name from the device you’ll find in clothing, the zipper.
    A physical zipper takes its two sides of teeth and “zips” them together, taking
    one from each side and joining them.


    A `zip` operation in stream processing is the pairwise combination of two streams,
    calling a function with the element of each stream, and then creating a new stream
    comprised of those return values.


    The core loop requires two stream processing primitives, `zip` and `scan`, and
    two functions specific to our domain. The function that builds state from events
    will be termed the *applicator*, as it is applying an event to the current state.
    The function that uses state plus a command to generate events will be termed
    the *mutator*, as it is mutating state via the command.


    Given our requirement that these functions are free from side effects, they are
    pure functions. A pure function is a function that will always return the same
    outputs given the same inputs. Pure functions are very amenable to testing, which
    is the focus of a section later in this chapter.


    With the core loop represented as operations upon a stream of messages, it is
    aligned with our principle, and the reactive system property, of being message
    driven. Although the core is straightforward, there are some additional complexities
    that will be layered in as a part of handling failure scenarios.


    ## Handling Failures


    There are two facets to the command processor. The first facet is comprised of
    the two domain-specific functions: the mutator and the applicator. The second
    facet is everything else, the conceptual plumbing of the streams through our metaphorical
    pipes.


    Each facet is a discrete concern. The first facet is an application concern, and
    the second facet is infrastructure. In separating these concerns, each can have
    the appropriate failure handling policies.


    ### Infrastructure


    Failure handling in the infrastructure facet is a simple strategy. If the failure
    is something that is retriable, retry the operation. If it is not retriable, or
    the retries are bounded, then “fail upstream,” allowing whatever is orchestrating
    the command processor’s execution to handle the failure.


    The types of failures that may occur will likely be centered around I/O – when
    reading commands and events as part of the processor’s inputs, or when writing
    new events to the event log. If the function used to generate events is allowed
    to generate multiple events per command, it is necessary to ensure that writing
    to the event log is transactional. Either all the generated events are written,
    or none are. If the event log is not transactional and multiple events are written,
    a failure in the middle would leave the system in an inconsistent state; the command
    is effectively partially processed, which is invalid.


    A failure when executing one of the two domain-specific functions is *not* an
    infrastructure failure. As the functions are pure, they are retriable as needed
    by retries due to an infrastructure failure. Otherwise, they require discrete
    handling as the nature of their failures are categorically different.


    ### Application


    A failure in one of the two domain-specific functions won’t be solved with a naive
    retry. As the functions are stateless, a failure indicates a problem with either
    the inputs or a logic error in the function itself. There are two broad categorizations
    of failures from these functions: a failure related to processing a new command,
    or a failure in constructing state from existing events.


    The simpler case is a failure in constructing state from existing events. Categorically,
    this should not occur. As the existing events are the truth of the system, they
    need to be viewed as such. Yes, it is possible that they contain “bad” information
    of some sort due to prior logic bugs, but that should be considered an exceptional
    situation. The function that derives state needs to appropriately handle these
    events. Chapter [12](#511062_1_En_12_Chapter.xhtml) will discuss testing techniques
    to help minimize the chances of this occurring.


    The remaining cases of application failure then center around the processing of
    commands. Failure here is different: failure is *expected* and *normal*. Whenever
    a command would put the system in a state where one of the rules for data at rest
    would be violated, it would need to be rejected. Remember, a command is ultimately
    a request to change the state of the system. It is not pre-ordained that the request
    will succeed. (It is here that the usage of the term command starts to be stretched.
    While commands are authoritative orders, it is ok for the system to say “no”).


    Commands will originate from someone that wants to change the state of the system,
    most likely a user. As commands are requests, the originators will want to know
    the disposition of their request. To achieve this, it is necessary to additionally
    record this disposition into another message log, a processed command log. The
    processed command log contains an entry for every command indicating whether it
    succeeded or failed. After submitting a command, this log can be watched to determine
    whether the command was a success.


    The processed command log also plays a role in the core loop. There are three
    pieces of data an entry in this log contains:


    1. Pointer into the command log to the command that was processed

    2. Disposition of the command, whether it succeeded or failed

    3. Pointer into the event log indicating the most recent event after processing


    These data points are correlated but used for differing purposes. The pointer
    into the command log is the state keeping as to which commands have been processed.
    The disposition of the command allows for the command’s originators to observe
    the result. The event log pointer allows for commands to generate multiple events.


    I haven’t explicitly mentioned commands generating multiple events. It is a useful
    practice, as it allows events to be finer grained than commands and for multiple
    commands to generate the same event. The benefit is for the consumers of the event
    log. With fine-grained events, the logic that backs each event can be more discrete
    with minimal overlap between events. A command generating multiple events represents
    a wrinkle with the core loop. When I originally introduced the core loop, I described
    how the event log would be used to generate a state after each event and those
    states would be “zipped” with the commands. If there’s a one-to-one correspondence
    between commands and events, that zipping process is straightforward; after processing
    a command, there will be one new state generated which is ready to be used for
    the next command. When commands generate multiple events, there will be multiple
    states generated. How will the loop know which one is the correct one to use for
    the next command? That’s the purpose of the pointer into the event log. The derived
    stream of states is joined with the processed command log to sample the state
    stream, so it *only* contains states that occur after all events a command generated
    have been applied. This allows for reuse of the state when a command fails; a
    processed command for a failed command will contain the *same event log pointer*
    as the prior processed command because there *are no new events*.'
