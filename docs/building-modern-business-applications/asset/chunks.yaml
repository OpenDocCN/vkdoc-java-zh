  trans: '

    ## 总结


    本章解释了*为何*将业务应用构建为响应式系统是有益的。业务对应用可靠性的期望，正是由响应式系统所提供的。其中最重要的是你期望能够有效地变更系统。通过将应用的数据流建模为消息，可以充满信心地实现这一点。第
    3 部分将解释*如何*实现。在此之前，接下来的两章将深入探讨业务应用的两个重要特性：管理业务规则和时间。


    # 5. 什么是业务规则？


    业务应用是业务的真实数据源。为了有效完成这一任务，数据需要符合某种结构。这将允许围绕它构建流程和工作流。从分类上讲，数据结构的规范、数据如何修改以及数据变更时会发生什么，都被视为**业务规则**。在特定时间点，这些规则是具体的。随着业务的变化，其规则也会随之改变。本章探讨了我对规则的思考方式以及如何对其进行分类。通过理解它们与系统的关系，我们将知道在架构中应将其置于何处。


    ## 思考业务规则


    拥有正确的规则至关重要。错误的规则会导致用户在系统之外、在其约束范围之外工作。由于业务的主要目标之一是让用户*实际*使用系统，因此规则需要准确反映业务的运作方式，包括各种例外情况。


    那么，什么是正确的规则呢？必须与潜在用户沟通才能理解。这可能是你职责的一部分，或者在较大的组织中，这可能是产品经理职责的一部分。理解业务规则是收集需求的关键环节。


    从正确的受众那里收集需求非常重要。如果只采访管理层，他们想象的工作方式与业务*实际*的运作方式之间可能存在脱节。意识到这种脱节很重要。人因工程学领域将这种现象描述为“想象的工作”与“实际的工作”。在创建应用时，我们正在编码第三种形式：“规定的工作”。如果你的组织进行事件分析和回顾，你可能已经接触过这些概念。新兴的站点可靠性工程学科（一种将软件工程原则应用于运维的实践）在进行无责故障事后分析时，一直在使用这些概念。


    作为应用开发者，我们控制着应用所能实现的功能。我们正在规定工作必须在系统上下文中如何执行。收集需求的行为，就是理解工作应如何完成（如想象的那样），并将这些流程在系统中形式化的过程。开发人员对精确性的执着在这一过程中可能是有益的，可以提出必要的问题来理解可能的边界情况。


    在确定系统规则时，务必记住，形式化过程中存在风险因素。添加一个必须为真的约束，就排除了违反该约束的数据存在的可能性。这代表了一种风险。如果业务需要改变该决策，变更能够多快安全地完成？能够适应这种类型的变更正是我们的目标之一。


    “必须始终为真”的事物与“可能应该为真”的事物之间存在差异。前者是规则，后者是指导方针。在我们讨论如何对规则进行分类时，请牢记这一点。


    ## 分类


    在我的职业生涯中，我观察到所谓的“业务规则”中存在一些共同主题，并利用这些主题构建了以下分类。


    ### 静态数据


    最终，数据存储在*某个地方*。这些数据必须满足一些要求。


    如果你在关系数据库中创建过表，你就遇到过静态数据的规则。任何在数据库模式中表达的约束都属于此类。这些约束包括可空性、唯一性和外键。某些数据库允许对列表达更复杂的约束，例如为数值定义固定范围，甚至跨表列进行约束，例如“开始日期”必须在“结束日期”之前。在
    SQL 中，这些是`CHECK`约束。


    这些声明式约束仅限于单行，这限制了它们所能强制的内容。想象一个跟踪小部件的系统。如果有一个表示小部件可用库存的表，可能存在所有行的总和不能低于零的要求。如果每一行代表一个添加或移除小部件的操作，该表可能有一个约束，例如`CHECK
    (count <> 0)`，以确保每一行的数量非零，因为有效的操作必须移动一定数量的小部件。为了表达库存永远不能为负，编写`CHECK (SUM(count)
    >= 0)`似乎很直接。然而，据我所知，没有任何广泛使用的关系数据库允许以声明方式指定这种类型的约束。约束仅在单行上下文中检查，而不是整个表。表级或跨表约束需要使用触发器来调用存储在数据库中的过程代码。


    这种从声明式约束到过程式约束的转变意味着这些约束通常是在数据库外部实现的。随着测试驱动开发，以及更广泛的单元测试和持续集成变得越来越流行，自动化测试的能力对开发者来说更有价值。数据库内的过程逻辑更难测试，因为它需要运行中的数据库软件实例。在
    2010 年代中后期 Docker 普及之前，对于大多数团队来说，实现这一目标的努力通常是不可行的，时间最好花在其他地方。对于 JVM，有一些嵌入式数据库引擎可用于测试，但它们与生产环境中必须使用的引擎确实存在差异。这促使开发者在代码中依赖数据库功能的最低公共标准。


    如果约束仅在应用代码中强制实施，那么从哲学和实践角度来看，它是否真的始终为真就存在疑问。为了保证静态数据的约束得到强制实施，所有对数据的修改都必须通过强制机制。如果该机制不在数据存储本身内部，则必须仔细保护对数据存储的访问，以防止绕过应用直接与存储交互的修改。


    在应用代码中强制实施约束确实可以更轻松地管理随时间变化的约束。如果约束被放宽，现有数据无需更改，因为它已经满足更宽松的约束。如果约束被收紧，例如将可选字段变为必填字段，则必须对违反新约束的现有数据做出决策。这可能是选择在应用代码而非数据库中强制实施约束的一个考虑因素。下一章将更深入地探讨时间及其与业务规则的关系。

    '
- fmt: "# 数据驻留规则与工作流\n\n另一种形式的“数据驻留”规则是带有渐进状态的工作流。考虑一个正在通过工作流流转的实体，其数据可能需要满足不同要求才能进入下一步。想象一个允许下单定制自行车的系统。要开始一个订单，不需要任何必需信息。你开始了流程，做了一些选择，但随后想保存它以便稍后继续。应用程序可能会将其作为工作流的一部分提供，保存你的进度。为了稍后保存订单，需要额外的必需信息——你的电子邮件地址。定制过程中有五个决策点，你可以在任意数量上做出选择，同时继续反复保存订单以便稍后处理。然而，要进入“准备下单”状态，则需要在所有五个决策点上做出选择。随着自行车订单实体在工作流中移动，数据的完整性要求是渐进的。\n\
    \n在工作流示例中有一个微妙的区别：状态要进入下一个“准备就绪”状态的要求，与完成下一个工作流状态可能代表的内容之间的区别。我们的自行车订单工作流可能会区分“准备提交”和“已提交”。在工作流中，通常存在与外部系统的协调点，即副作用。\n\
    \n## 副作用\n\n应用程序通常不是孤立运行的。我们的业务应用程序几乎总是与业务交互。在充当事实来源和自动化工作流时，系统内数据的更改会触发其他活动。我将这类活动统称为“副作用”。\n\
    \n这个术语借用于计算机科学，指的是修改其局部环境之外状态的函数。考虑以下函数：\n\n```\nprivate int multiply(int a, int\
    \ b) {\n    var result = a * b;\n    System.out.println(a + \" * \" + b + \" =\
    \ \" + result);\n    return result;\n}\n```\n\n打印到控制台是一种副作用。将这个示例映射到更大的应用程序中，我们的系统相当于函数，而与其他系统的交互则是副作用。\n\
    \n这些是在数据更改*之后*发生的任务。你会在应用程序需求中识别出它们，因为它们通常采用以下形式：\n\n```\nif/when  then \n```\n\
    \n具体来说，它们可能会执行以下操作：\n\n*   用户注册后发送欢迎邮件\n*   订单创建后，将信息发送到另一个系统进行履行\n*   付款批准后，将其发送给银行\n\
    \n在更改系统数据*之前*与其他系统交互不是副作用，而是工作流的一部分。这种区别很重要，因为执行该交互不一定是你系统的责任。作为实际实现的问题，它可能发生，但如果发生在其他地方，工作流的整体行为不会发生变化。一个工作流可能（而且很可能）跨越多个应用程序。在考虑*你的应用程序*的规则时，这里只考虑它需要发起的副作用。\n\
    \n在实现系统时，将副作用与使前置条件为真的数据修改分开非常重要。这看起来可能是一个直接的实现，但故障模式是不可取的。如果你在确保更新后的状态已成功写入数据库之前，将订单的付款状态更新为“已批准”并将其发送给银行，那么如果数据库更新失败会发生什么？\n\
    \n我对副作用的理想实现是将其建模为状态机。你的应用程序可能是一个更大的业务工作流的一部分，理想情况下也建模为跨越多个应用程序的状态机。就像响应式系统组合一样，状态机也是如此。相同的底层模式可以用于每个副作用，其价值在于如何管理故障。通过使用状态机，应用程序可以跟踪其成功执行副作用的尝试，从而允许进行适当的错误处理。\n\
    \n状态机应明确跟踪执行副作用的尝试的开始。如果在执行过程中发生故障，下一步可能不仅仅是重复初始操作。如果我们开始发送付款但在过程中遇到故障，重试可能不是合适的操作。再次使用订单批准后发送付款的示例，如果发送付款失败，下一步操作将取决于我们发送付款的系统的行为。如果接收系统是幂等的，则可以重试原始操作。我们可能不会收到“成功”响应，而是收到表示“已处理”的“失败”响应，这表明我们的初始尝试实际上是成功的，尽管我们将其视为失败。在第一次尝试时收到“已处理”将是意外的，并且是一种错误状态。如果接收系统不是幂等的，则需要使用不同的机制来确定下一步应该是什么。\n\
    \n作为副作用执行的操作应尽可能幂等。在实践中，这可以通过要求调用方每次调用时提供唯一标识符来实现，从而允许接收方识别重复请求。"
  raw: "Another form of the *data at rest* rule is a workflow with progressive statuses.\
    \ Consider an entity that is passing through a workflow where there may be different\
    \ requirements upon its data for it to move to the next step. Imagine a system\
    \ that allows placing an order for a custom bicycle. To start an order, there\
    \ isn’t any required information. You’ve started the process, made a few selections,\
    \ but then want to save it for later. The application may offer that as part of\
    \ its workflow, saving your progress. In order to save an order for later there\
    \ is additional required information, your e-mail address. There are five decision\
    \ points in the customization process, and you can make a choice on any number\
    \ while continuing to repeatedly save the order for later. In order to proceed\
    \ to the “ready to order” status though, a choice is required on each one of those\
    \ five decision points. As the bicycle order entity moves through the workflow,\
    \ there are progressive requirements for completeness of the data.\n\nThere is\
    \ a subtle distinction in the workflow example, the separation of the requirements\
    \ of the state to be at the next “ready for” status vs. completing what the next\
    \ state of the workflow may represent . Our bicycle order workflow may distinguish\
    \ between “ready to submit” and “submitted.” In workflows , there are often coordination\
    \ points with external systems, side effects.\n\n### Side Effects\n\nApplications\
    \ are generally not acting in isolation. Our business applications will nearly\
    \ always interact with the business. In acting as a source of truth and automating\
    \ workflows, changes to the data within the system will initiate other activities.\
    \ Collectively, I’m calling this class of activities *side effects*.\n\nThis term\
    \ is borrowed from computer science, where it refers to functions that modify\
    \ state outside of their local environment. Consider the following function:\n\
    \n```\nprivate int multiply(int a, int b) {\nvar result = a * b;\nSystem.out.println(a\
    \ + \" * \" + b + \" = \" + result);\nreturn result;\n}\n```\n\nPrinting to the\
    \ console is a side effect. Mapping this example to a larger application, our\
    \ system is equivalent to the function, and interactions with other systems are\
    \ side effects.\n\nThese are tasks that happen *after* data has changed. You’ll\
    \ recognize them in application requirements, as they generally take the form\
    \ of:\n\n```\nif/when  then \n```\n\nConcretely, they may do things like:\n\n\
    *   Send users a welcome email after signing up\n\n*   After an order is created,\
    \ send information to another system for fulfillment\n\n*   After a payment is\
    \ approved, send it to the bank\n\nInteraction with another system *before* changing\
    \ data in your system is not a side effect, it’s a part of a workflow. This distinction\
    \ matters because it isn’t necessarily the responsibility of your system to perform\
    \ that interaction. As a matter of practical implementation, it may, be there\
    \ would be no change to the overall behavior of the workflow if it happened elsewhere.\
    \ A workflow may, and likely will, span multiple applications. When considering\
    \ rules *for your application*, it is only the side effects that it needs to initiate\
    \ that are in consideration here.\n\nWhen implementing a system, it is important\
    \ to separate side effects from the modification of data that makes the precondition\
    \ true. It may seem like a straightforward implementation, but the failure modes\
    \ are undesirable. If you update an order’s payment status to approved and send\
    \ it to the bank before ensuring the updated status has been successfully written\
    \ to your database, what happens if the database update fails?\n\nMy ideal implementation\
    \ of side effects is by modeling them as a state machine. Your application may\
    \ be a part of a larger business workflow, also ideally modeled as a state machine\
    \ that spans multiple applications. Similar to how reactive systems compose, so\
    \ do state machines. The same underlying pattern can be used for each side effect,\
    \ and the value comes down to how failure is managed. By using a state machine,\
    \ the application can track its attempts at successfully performing the side effect,\
    \ allowing for appropriate error handling.\n\nThe state machine should explicitly\
    \ track the start of an attempt to perform a side effect. If a failure occurs\
    \ while performing it, the next step is likely different than a mere repetition\
    \ of the initial action. If we start to send a payment but experience a failure\
    \ in the middle of the process, retrying may not be the appropriate action. Using\
    \ the example of sending a payment after an order’s approval again, if sending\
    \ the payment fails, the next action will depend upon the behavior of the system\
    \ we are sending the payment to. If the receiving system is idempotent, the original\
    \ action can be retried. Rather than a “success” response, we may receive a “failure”\
    \ that represents “already processed,” indicating that our initial attempt was\
    \ in fact successful, even though we saw it as a failure. Receiving “already processed”\
    \ on the first attempt would be unexpected and an error state. If the receiving\
    \ system weren’t idempotent, a different mechanism would need to be used to determine\
    \ what the next step should be.\n\nActions performed as side effects should be\
    \ idempotent whenever possible. In practice, this can be done by requiring callers\
    \ to provide a unique identifier per invocation, allowing receivers to identify\
    \ duplicate requests."
  trans: "\n*静态数据*规则的另一种形式是带有渐进状态的工作流。考虑一个正在经历工作流的实体，其数据可能需要满足不同要求才能进入下一步。想象一个允许定制自行车订单的系统。开始下单时，不需要任何必填信息。你启动了流程，做了一些选择，但随后想保存以便稍后继续。应用程序可能会将其作为工作流的一部分提供，保存你的进度。为了稍后保存订单，需要额外的必填信息——你的电子邮件地址。定制过程中有五个决策点，你可以任意选择数量，同时反复保存订单以便稍后处理。然而，要进入“准备下单”状态，这五个决策点中的每一个都必须做出选择。随着自行车订单实体在工作流中移动，数据的完整性要求是渐进的。\n\
    \n在工作流示例中有一个细微的区别：即达到下一个“准备就绪”状态所需的要求，与完成工作流下一个状态可能代表的内容之间的分离。我们的自行车订单工作流可能会区分“准备提交”和“已提交”。在工作流中，通常存在与外部系统的协调点，即副作用。\n\
    \n### 副作用\n\n应用程序通常不会孤立地运行。我们的业务应用程序几乎总是会与业务本身交互。在充当事实来源和自动化工作流时，系统内数据的更改会触发其他活动。我将这类活动统称为*副作用*。\n\
    \n这个术语借用于计算机科学，指的是修改其局部环境之外状态的函数。考虑以下函数：\n\n```\nprivate int multiply(int a, int\
    \ b) {\nvar result = a * b;\nSystem.out.println(a + \" * \" + b + \" = \" + result);\n\
    return result;\n}\n```\n\n向控制台打印输出就是一种副作用。将这个示例映射到更大的应用程序中，我们的系统相当于这个函数，而与其他系统的交互就是副作用。\n\
    \n这些是发生在数据*更改之后*的任务。你会在应用程序需求中识别出它们，因为它们通常采用以下形式：\n\n```\n如果/当 那么 \n```\n\n具体来说，它们可能会执行以下操作：\n\
    \n*   用户注册后发送欢迎邮件\n\n*   订单创建后，将信息发送到另一个系统进行履行\n\n*   付款批准后，将其发送给银行\n\n在更改系统数据*之前*与其他系统交互不是副作用，而是工作流的一部分。这种区别很重要，因为执行该交互不一定是你系统的责任。从实际实现的角度来看，它可能由系统执行，但如果发生在其他地方，工作流的整体行为也不会改变。一个工作流可能（而且很可能）会跨越多个应用程序。在考虑*你的应用程序*的规则时，这里只考虑它需要发起的副作用。\n\
    \n在实现系统时，将副作用与使前置条件成立的数据修改分开非常重要。这看起来可能是一个直接的实现，但故障模式是不可取的。如果在确保更新后的状态已成功写入数据库之前，你将订单的付款状态更新为“已批准”并将其发送给银行，那么如果数据库更新失败会发生什么？\n\
    \n我对副作用的理想实现是将其建模为状态机。你的应用程序可能是一个更大的业务工作流的一部分，理想情况下，该工作流也被建模为跨越多个应用程序的状态机。就像响应式系统组合一样，状态机也是如此。每个副作用都可以使用相同的基础模式，其价值在于如何管理故障。通过使用状态机，应用程序可以跟踪其成功执行副作用的尝试，从而允许进行适当的错误处理。\n\
    \n状态机应明确跟踪执行副作用的尝试的开始。如果在执行过程中发生故障，下一步很可能不仅仅是重复初始操作。如果我们开始发送付款但在过程中遇到故障，重试可能不是合适的操作。再次以订单批准后发送付款为例，如果发送付款失败，下一步操作将取决于我们发送付款的系统的行为。如果接收系统是幂等的，则可以重试原始操作。我们可能不会收到“成功”响应，而是收到一个表示“已处理”的“失败”响应，这表明我们的初始尝试实际上是成功的，尽管我们将其视为失败。在第一次尝试时收到“已处理”将是意外的，并且是一种错误状态。如果接收系统不是幂等的，则需要使用不同的机制来确定下一步应该做什么。\n\
    \n作为副作用执行的操作应尽可能具有幂等性。在实践中，可以通过要求调用方每次调用时提供唯一标识符来实现这一点，从而使接收方能够识别重复请求。\n"
- fmt: '### Derivable Data


    All the data within an application is not equal. Continuing the example from the
    earlier section, the total count of widgets must always be greater than or equal
    to zero. The value that a business rule is checking is often also displayed to
    users in some fashion. In this example, it’s the “available widgets.”


    A straightforward implementation would be to recalculate the total when necessary,
    persist the total, and use the persisted value within the user interface. This
    is a valid approach that would meet the needs of the business.


    Embedded in this example are conflated concerns which should be thought about
    independently, even if the implementation does tie them together. There are two
    business rules here:


    1. A constraint on the *operations*, that their aggregate must satisfy.

    2. Usage of the aggregate for display in the user interface.


    The distinction may be subtle, but I believe it is important. The constraint around
    the total is not a constraint on the total as an independent piece of data. When
    adding a new operation, and needing to ensure that the first rule is met, how
    do you think about the operation? Is it:


    - Add the operation, recalculate/update the total, and check that it satisfies
    the constraint?


    Or:


    - Take the prior total, check that the addition of the new operation would not
    cause the constraint to be violated, and then add the operation?


    In the former, the operation is added without concern for the constraint check,
    treating the derived total as the data that the constraint is placed upon. In
    the latter, the check is on the new operation, using the prior total as an optimization,
    rather than recomputing it each time.


    While the first rule is a constraint on the aggregate value, it does not mean
    that the aggregate value must be stored. That’s the essence of the distinction.
    The aggregate is an example of a *derived value*.


    When building a data model for a system, it is important to separate out the most
    fundamental facts that underly the model, and the derivative facts that build
    upon them.


    Relative to constraints on data at rest, the mention of a derived value can be
    thought of as an “extracted variable,” and a means to speak about the derivation
    without repeating what it is derived from each time. If the derived value is *only*
    used in constraints for data at rest, it doesn’t really exist as a data point
    in the system.


    If the derived value is *also* used for display purposes, the act of deriving
    it is what I consider to be *display logic*. This is the third classification
    of business rules. Display logic is a **nondestructive** transformation of a system’s
    data. The nondestructive aspect is critical. In mathematical terms, the logic
    should be a *pure function*, returning the same result given the same inputs.


    If display logic obeys this property, acting as a nondestructive transformation
    of data, it is not a requirement to store the result. Given the inputs and the
    version of code that backs the transformation, an identical result can be achieved.
    Storage of the derived value is an optimization, rather than a requirement.


    Another variation of display logic is the usage of information from another system.
    Sometimes, this will be very straightforward, displaying data from another system
    as-is. Other times, there will be a transformation of data from your system that
    uses data from another system as one of its inputs. In financial systems, currency
    conversions are a good example of this. There may be another system that provides
    exchange rates, and the act of displaying data from your system in another currency
    using an exchange rate from another system is another form of display logic.


    In naming something “display logic,” it is not meant to imply that the logic exists
    within our application’s user interface code. For performance reasons, an application
    may persist the output of display logic. This should be thought of as a cache
    on the results, rather than the fundamental facts of the system. If that analogy
    does not hold in your use-case, I would question whether it is display logic,
    or if it should be considered a fundamental fact.


    ## Summary


    These categorizations of business rules inform how to think about the properties
    of your application’s model. This book does not describe how to go about defining
    your model. Rather, I am focusing on how to approach its implementation. An implementation
    provides some amount of feedback into a design. My hope here is that thinking
    of your business rules according to these categories will help clarify your design.


    Business rules can fall into one of the following categories:


    - Constraints for data at rest

    - Side effects, such as process initiation, when data changes

    - Display logic, including derivation and aggregation


    These categories describe the relationship of the rule to the data within the
    system. This will be useful later, as it can inform where in our design the implementation
    should be placed. We will get to that in the third part of this book. Before that,
    there is one last prerequisite, the management of time. It has a critical interaction
    with business rules, as rules change over time, and their relationship with data
    needs to reflect that.


    # 6. Managing Time


    Can time be “managed”? In our applications, we have control over their communication,
    and through that manage how they learn about, communicate, and process data. It
    is through this, controlling the flow of information, that time itself is managed.
    When we create business applications, we are establishing a virtual microcosm
    of the business itself. As a source of truth, the timeline that the application
    creates can be an official timeline for the question of “what happened?”.


    ## Answering “What Happened?”


    A common question I’ve had from users of business applications I’ve worked on
    has been “why does the system have this value?”. The value may have been the result
    of a calculation, data received from another system, or provided by a user. In
    all of these situations, the system needs to *remember* its inputs in order to
    answer the question.


    The simplest example is a business rule for derived data, as I discussed in the
    prior chapter. The inputs to the rule are stored in the system, and the derived
    value is used as a part of display logic. It is then straightforward to augment
    a calculation to have its output also contain a copy of its inputs. This will
    allow an observer that understands the rule to independently verify the calculation.


    Beyond that simple example, things are more difficult. If a calculation result
    is persisted, how do we know what its inputs were at the time of calculation?
    Ideally, they would have been recorded, but was that an explicit product requirement?
    If not, it likely wasn’t done. If the persistence of the value included a timestamp,
    you could try and reconstruct what the data was at that time.


    In order to answer the question, we need to know what the data in the system was
    at a *prior point in time*. If the system isn’t tracking that at the time it occurred,
    the information will ultimately be lost. This is the “mutate in place” of a status-quo
    architecture.'
