    they wish to have returned. This was a valuable feature when delivering data over
    a mobile network. It is a different paradigm from the `MVC`-style APIs that came
    before. To help bridge between older web APIs and the APIs desired by mobile clients,
    the Backend for the Frontend (`BFF`) pattern emerged. This is a service that acts
