    stream operations. Because the `Publisher` specification defines it as a stream
    of unspecified length, Reactor splits its API surface into two categories. Streams
    that are known to be at most a single element are represented as a `Mono` with
    all others being represented as a `Flux`. This is beneficial because the `Mono`
    type is analogous to the `CompletableFuture` API that is part of the Java standard
    library and Reactor provides methods to interoperate between the two.


    In Chapter [3](#511062_1_En_3_Chapter.xhtml), I introduced a pipe metaphor for
    data flows. Project Reactor is the implementation of those pipes. Reactive Streams
    defines how segments of the pipes interact. It formalizes the semantics for publishing
    and subscribing, cancellation, and flow control.


    The ability to think in data flows is what drew me to Reactive Streams and Project
    Reactor . It is very important to note that the abstraction has a leak around
    the threading model. As of the writing of this book, the JVM maps threads directly
    onto operating system threads. Care should be taken to limit the number of JVM
    threads that are executing in parallel, as having this number exceed the underlying
    hardware’s capabilities will result in a degraded experience. Thinking in data
    flows *should* allow developers to not worry about these implementation details,
    and in the general case that is true. You need to be aware of code that may be
    executing blocking operations, such as performing I/O, as that can cause stalls.
    There is active work to add virtual threads to the JVM as a part of Project Loom.
    When completed, virtual threads will allow the JVM to efficiently manage very
    large numbers of threads and fix this leaky abstraction. Some feel that this will
    negate the need for libraries such as Project Reactor, but I disagree. Data flow
    programming via Reactive Streams and Project Reactor, as I am describing here,
    will continue to be valuable irrespective of the underlying implementation. This
    work in the JVM should *increase* adoption, as many of the complaints leveled
    against the current implementations will be solvable.


    I am mentioning this important detail as there is a very popular blocking API
    that is widely used with business applications, the Java Database Connectivity
    API (JDBC) . In realizing the value of extending the Reactive Streams paradigm
    through to the database, a new API was created, the Reactive Relational Database
    Connectivity (R2DBC) API .'
  trans: '

    ## Spring Boot


    自 2002 年起，Spring 框架便已成为 Java 生态系统的一部分。当时，它是 Sun Microsystems（Java 的创始者与管理者）所推崇的企业级
    JavaBean 编程模型的一种更简单的替代方案。Spring 不断适应 Java 应用程序在架构和打包方式上的变化。在 21 世纪末微服务架构兴起之前，开发者将代码打包并部署到正在运行的应用服务器中，例如
    Apache Tomcat、JBoss 或 IBM 的 WebSphere（仅举几例）。这些通常是多租户系统，由中央团队管理。与微服务兴起同时出现的是 DevOps
    实践，即开发者负责其系统的完整生命周期，包括运维。DevOps 与本书第二章中提到的敏捷和 CI/CD 实践密切相关。


    在 21 世纪初，Spring Boot 诞生了。它颠覆了 Spring 框架与应用服务器之间的关系。Spring Boot 不再将代码部署到应用服务器中，而是将应用服务器的必要部分（通常仅限
    HTTP 服务器）嵌入到 Spring Boot 应用程序内部，从而将进程生命周期的控制权交到开发者手中。在过去十年中，Spring Boot 已成为使用
    Spring 框架的主要方式。它提供了易于使用的模式，使开发者能够快速组装和维护应用程序。


    与 Java 和 JVM 一样，Spring 的维护者重视向后兼容性，并努力在主要版本中保持这一点。我的观点是，Spring 正在策划一套经过深思熟虑的抽象。通过针对这些抽象进行构建，我们的代码得以免受实现细节变化的影响。我在自己的工作中重视这种做法，因为我相信这是构建易于变更的系统的重要组成部分，而这也是本书所描述系统的指导原则之一。Spring
    的演进速度确实比 Java 快，相应地，随着抽象的完善，某些领域的弃用速度也更快。本书的指导原则在此再次发挥作用。通过确保我们的系统是模块化的、可测试的且易于变更，适应系统所基于框架的变化的过程，与适应业务变化的过程是相似的。Spring
    Boot 背后的原则与我们的原则是一致的，我发现它是我工作的绝佳起点。


    ## Project Reactor


    我在第 3 章和第 4 章中讨论了响应式宣言的四个属性，以及如何组合它们来创建响应式系统。这些思想催生了一套供实现者使用的抽象，即响应式流。回顾第 3 章，我曾说过消息驱动是宣言中最重要的属性。该规范所启用的正是这个属性。流由离散的消息组成，该规范通过引入`Publisher`和`Subscriber`的概念，形式化了低层级的交互模式。在第
    3 章中，我还讨论了宣言的属性是如何可组合的。我将响应式流规范视为组合层级中的最小单元，使得围绕此规范构建的系统能够彻底地展现这些属性。


    响应式流有时会被误解。响应式编程模型的使用有时被认为仅仅是为了让那些在高负载下运行、并希望使用异步消息传递来减少总线程数以优化可用硬件利用率的系统受益。虽然这确实是使用响应式流的一个原因，但这并非我们业务应用的理由。我们看重的是消息传递范式在系统所有层级的组合。有效利用计算资源是一个有益的副作用，而非主要目标。我重视的是构建一个完全响应式的系统，并最小化因范式不匹配而产生的阻抗失配。


    响应式流规范处于一个比我们应用程序设计所需更低的层级。幸运的是，我们不需要自己实现该规范。Project Reactor 是 Java 中该规范的一个实现，也是
    Spring 框架使用并集成到 Spring Boot 中的实现。Reactor 提供了许多流操作，例如`map`和`filter`，使我们能够专注于编写使用响应式流的代码，而无需实现流处理原语。


    Project Reactor 提供了响应式流`Publisher`的实现，并通过静态方法（用于启动流）和实例方法（用于应用流操作）对其进行了增强。由于`Publisher`规范将其定义为长度未指定的流，Reactor
    将其 API 表面分为两类。已知最多包含单个元素的流表示为`Mono`，而所有其他流则表示为`Flux`。这很有益处，因为`Mono`类型类似于 Java
    标准库中的`CompletableFuture` API，并且 Reactor 提供了两者之间互操作的方法。


    在第 3 章中，我引入了数据流的管道隐喻。Project Reactor 就是这些管道的实现。响应式流定义了管道的各个段如何交互。它形式化了发布和订阅、取消以及流量控制的语义。


    能够以数据流的方式思考，正是吸引我使用响应式流和 Project Reactor 的原因。需要特别注意的是，该抽象在线程模型方面存在泄漏。在撰写本书时，JVM
    将线程直接映射到操作系统线程。应谨慎限制并行执行的 JVM 线程数量，因为如果此数量超过底层硬件的能力，将导致体验下降。以数据流的方式思考*应该*能让开发者不必担心这些实现细节，在一般情况下也确实如此。但你需要留意可能执行阻塞操作（例如执行
    I/O）的代码，因为这可能导致停顿。作为 Project Loom 的一部分，向 JVM 添加虚拟线程的工作正在进行中。完成后，虚拟线程将使 JVM 能够高效管理大量线程，并修复这个有泄漏的抽象。有些人认为这将消除对
    Project Reactor 这类库的需求，但我不同意。正如我在此描述的，通过响应式流和 Project Reactor 进行数据流编程，无论底层实现如何，都将继续具有价值。JVM
    中的这项工作*应该会*增加采用率，因为当前实现面临的许多批评都将得到解决。


    我提到这个重要的细节，是因为有一个非常流行的阻塞 API 被广泛应用于业务应用程序，即 Java 数据库连接 API（JDBC）。为了实现将响应式流范式扩展到数据库的价值，人们创建了一个新的
    API，即响应式关系数据库连接（R2DBC）API。

    '
- fmt: '# R2DBC


    The R2DBC API was created to extend reactive programming through to interacting
    with relational databases. JDBC requires a thread per connection, and efficiently
    managing connections within reactive systems can be tricky. By creating a specialized
    API, Reactive Streams’ flow control can be propagated through to database servers.


    I find a key value proposition of using R2DBC to be its reactive API. This removes
    the need to wrap JDBC and the associated care that must be taken to ensure the
    safe usage of its blocking API. I have done that in the past with success but
    am happy to no longer need to do so with R2DBC.


    The PostgreSQL driver for R2DBC has one feature that makes me very happy – the
    ability to get the results of a `LISTEN` command as a Project Reactor `Flux`.
    This allows PostgreSQL’s pub/sub messages to be consumed as messages within a
    Reactive Stream within our application.


    # jqwik


    There is an excellent library for property-based testing in Java, jqwik. It is
    another engine for the widely used JUnit 5 platform, allowing you to incorporate
    its use alongside other example-based tests that also use the platform. jqwik
    has first-class support for generating a series of actions to perform which make
    it an ideal candidate to drive the type of tests I described in Chapter 12. Each
    mutation will have an associated action. When invoked, an action is provided with
    a state object that you define. This state object acts as the oracle. An action
    will invoke its mutation, and upon success also update the oracle. The action
    can then can a GraphQL query to interrogate the current state of the system using
    the information in the oracle to understand what it should be. To control the
    order in which actions are called, they can optionally have preconditions. Using
    the example from Chapter 12, an invoice must exist before being submitted for
    approval. The action that invokes the mutation to submit for approval will have
    a precondition that there is at least one invoice that can be submitted. This
    will prevent jqwik from creating a sequence of actions that is invalid for your
    domain.


    There are two parameters you can control for the exhaustiveness of the tests,
    the number of actions to perform and the number of times to perform the actions.
    If you wanted to run 100 actions, you could have one attempt with 100 actions,
    or 4 attempts of 25 actions. The proper balance will depend upon the nature of
    your domain, but I tend to have under 10 attempts with 10’s of actions. I balance
    the number of attempts and actions in each test run against the time it takes
    in my build system. If you are practicing continuous delivery and building multiple
    times a day, shorter build times may be of value to you.


    Another reason to prefer small numbers of actions is when you inevitably reproduce
    a failure. When a jqwik test fails, the output includes a seed value that can
    be used to reproduce the same random values. This is why determinism is critical.
    All randomness in a test run *must* tie back to the seed value for the seed to
    be useful in reproducing failures.


    A randomly generated series of actions won’t necessarily call all the actions
    you have defined. In order to ensure that the test exercises what you want it
    to, jqwik allows you to collect statistics around the actions in each attempt.
    You can then define success criteria for these statistics that will fail the test
    if not met. I use this functionality to ensure that each action is invoked at
    least once in each attempt.


    # Putting It All Together


    The tools I have described in this chapter can be assembled to form a reactive
    system, as I described in Chapter 3. Additionally, the implementation that is
    behind the GraphQL façade will also follow the Reactive Streams specification,
    allowing for a cohesive internal programming paradigm.


    The system will utilize three schemas within a PostgreSQL database: one to store
    commands, another to store events, and the third for a materialized view to handle
    GraphQL read requests. Just as code is organized into packages to group and isolate
    concerns, the same approach is taken for objects within the database.


    The Spring Framework contains a library that integrates GraphQL-Java with Spring,
    Spring for GraphQL, that can be used within Spring Boot. Every field defined in
    a system’s GraphQL schema is backed by code that provides the field’s data. Most
    fields will use the default implementation that is able to look up a field’s value
    in common associative structures such as a `Map`, fields of a class, or methods
    that follow the JavaBean conventions. These pieces of code are known as a `DataFetcher`,
    the name of the functional interface that they must implement. A feature of Spring
    for GraphQL is that a `DataFetcher` can return a Project Reactor type such as
    a `Mono` or `Flux`, allowing direct integration of Reactive Streams code with
    the GraphQL runtime. This allows for straightforward implementations of features
    such as request deadlines, as well as direct wiring of our metaphorical pipes
    between internal components.


    Our system can be viewed as a loop, an idea I introduced in Chapter 8. The current
    state of the system is visible by using the read capabilities of the GraphQL schema.
    A point-in-time snapshot may be obtained by using a query. A subscription can
    be used to get a point-in-time snapshot followed by additional snapshots as the
    data changes. To change the state of the system, a mutation can be issued. This
    mutation is received by the system, and the command generator transforms the mutation’s
    payload into a command. This command is then appended to the command log. The
    command processor consumes from the command log and processes the command using
    the mutator and applicator functions in concert with the necessary state to enforce
    business rules. An output of this process is a processed command which is used
    to record the command’s disposition. This disposition is reflected to the initiator
    of the mutation. Successful commands also result in a set of events that are appended
    to the event log. The materialization engine is consuming the event log and incrementally
    updating a schema within our database that backs the GraphQL read APIs. Each of
    these steps was described in detail in Part 3 of this book.


    Starting with the message logs, reads for each of them can be represented as an
    infinite `Flux` containing all current and future messages. There is a straightforward
    optimization that may be applied to this approach. Most message log consumers
    will not be consuming the entire log; they will want to start with messages that
    are after the last message they consumed. This leads to a straightforward API
    contract for consumers:


    ```

    interface MessageLog {

    Flux messages();

    Flux messagesSinceSequence(long seq);

    }

    ```


    Due to the usage of a `Flux`, this interface can satisfy consumers that want to
    access a subset of the messages, as well as those that want to subscribe to new
    messages as they are made available.'
