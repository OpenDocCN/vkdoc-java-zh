  trans: '

    ## 联邦式 GraphQL


    承接上一节的示例，假设某组织拥有多个独立的应用程序，分别用于管理客户、供应商以及它们所在的区域。利用更大领域内的自然边界，将其细分为更小、通常更易于管理的单元，这是领域驱动设计的核心原则，正如埃里克·埃文斯在其开创性著作《领域驱动设计：软件核心复杂性应对之道》^(¹⁸)中所描述的那样。埃文斯将这些单元称为*限界上下文*。本书所采用的业务应用部门视图，与埃文斯对限界上下文的定义高度一致。


    我们的示例包含三个系统，它们对应三个具有相互关联概念的 GraphQL 模式。客户和供应商都与它们运营所在的区域存在关联。假设有一个用于管理客户的用户界面，该界面提供了将客户分配到区域的功能。这个用户界面需要区域信息来显示客户的当前状态，并在允许用户进行更改时提供支持。


    一种简单的实现方式是让用户界面分别调用每个系统。虽然在这个仅有两个系统的示例中这似乎合理，但请设想一个关系更复杂的领域。用户界面所需的工作量将会增加。这促使人们将这部分工作从运行在用户机器上的用户界面代码中集中出来，转移到专为用户界面服务的后端服务中，这种模式被称为*面向用户界面的后端*（BFF）。BFF
    是为单个用户界面量身定制的。在我们的示例中，最多可能有三个 BFF，分别对应每个领域的用户界面。每个 BFF 执行的工作将极其相似，因此又有了消除这种重复的机会。


    这种重复现象被 Apollo^(¹⁹) 公司（一家为 GraphQL 提供开发者工具的公司）所认识。如果我们的每个领域服务（客户、供应商和区域）都已经暴露了
    GraphQL 端点，那么是否存在一种方法，可以描述这些模式如何相互关联，然后提供一个能够接收 GraphQL 请求并恰当地将其委派给其他服务的服务呢？这就是
    Apollo Federation 的精髓所在。


    在 Apollo Federation 模型下，示例中的三个服务都将被视为子图。取代 BFF 的将是一个图路由器，它将这些子图组合成一个单一的超级图。超级图服务（也称为路由器）提供了一个
    GraphQL 端点，该端点暴露了所有子图的组合。此服务会将传入的请求路由到相应的子图服务。


    我们的示例客户系统可能会在其 GraphQL 模式中暴露以下内容：


    ```

    type Customer {

    id: ID

    name: String

    regionId: ID

    }

    ```


    它只提供了客户所在区域的标识符，因为这是该服务管理的全部信息。区域系统则暴露了一个包含区域名称的 `Region` 类型：


    ```

    type Region {

    id: ID

    name: String

    }

    ```


    Apollo Federation 允许客户系统在其模式中暴露以下内容：


    ```

    type Customer {

    id: ID

    name: String

    region: Region

    }

    ```


    客户系统无需在模式中仅暴露区域 ID，而是可以暴露 `Region` 类型，即使它并非客户服务的一部分。客户系统暴露了以下查询来访问客户：


    ```

    type Query {

    customer(id: ID): Customer

    }

    ```


    使用 Apollo Federation，调用者将能够发送跨越子图边界的查询。以下查询请求了区域的名称，这些数据由区域系统管理：


    ```

    query {

    customer(id: "42") {

    id

    name

    region {

    id

    name

    }

    }

    }

    ```


    路由器会首先将请求路由到客户系统，加载客户及其区域 ID。然后，它会向区域系统发出另一个请求来加载该 ID。对调用者的响应掩盖了查询了多个子图的事实，使得两个系统看起来像一个整体。这与
    BFF 提供的体验类似。然而，超级图服务比特定于用户界面的 BFF 更加通用。


    通过使用 GraphQL 作为系统的暴露 API，Apollo Federation 促进了统一图的创建，该图作为所有系统所有用户的单一入口点。连接每个领域服务的模式这一行为，为业务提供了关于其模式之间连接程度（或缺乏连接）的知识。这些知识是对组织内数据建模决策的宝贵反馈。


    业务应用是其数据的权威来源，而业务本身则利用这些数据来辅助决策。通过确保数据得到恰当建模和适当连接来提高数据质量，可以使业务做出更明智的决策。


    在探讨了如何在系统中利用 GraphQL 之后，接下来的几节将探索实现该设计的其他可能性。

    '
- fmt: '# Outsourcing Distributed System Problems


    To implement the architecture described in this book, I enumerated a few required
    technologies in Chapter [13](#511062_1_En_13_Chapter.xhtml), append-only logs,
    distributed locking, a pub/sub system, and a database. Chapter [14](#511062_1_En_14_Chapter.xhtml)
    followed with a description of how to use `PostgreSQL` to meet these needs with
    a single solution. This is what I have done in my work, and it has proven successful.


    This isn’t the only path though. There are cross-cutting requirements of distributed
    systems that can be abstracted out and made reusable. One solution I have prototyped
    this book’s design with is `Temporal`,^([^(20)](#fn20)) an open source platform
    that allows for the reliable execution of workflows.


    In `Temporal`’s model, a workflow is akin to a state machine that is expressed
    as imperative code. `Temporal` provides a software development kit (`SDK`) that
    helps you ensure that a workflow is written in a deterministic manner. Workflows
    maintain their own private state. Any actions that interact with state outside
    of the workflow, such as querying a database or sending an email, are called activities.
    When a workflow invokes an activity, `Temporal` manages safe execution of the
    work by handling timeouts and retries. The workflow can be considered *fault oblivious*,
    as it is shielded from being concerned with activity failures. This can allow
    for the succinct expression of a business workflow.


    All workflows have a unique identifier, optionally one that you specify. For a
    given identifier, there can only be one running workflow instance. This behavior
    makes a `Temporal` workflow a substitute for how this book’s system uses distributed
    locks.


    There are two ways for workflows to communicate. A workflow can send a message
    to another workflow using a concept `Temporal` calls signals. When a workflow
    receives a signal, it can modify its private state in response. The sender of
    a signal receives no response. If a workflow needs information from another workflow,
    it can interrogate the other workflow’s state using a concept known as queries.
    Queries are read-only and cannot modify a workflow’s state.


    The building blocks that `Temporal` provides, workflows, activities, signals,
    and queries, are sufficient to implement the three key components of this book’s
    system. The command generator, command processor, and event materializer can all
    be expressed as `Temporal` workflows.


    `Temporal` workflows can run forever. This makes them suitable to run both the
    command processor and the event materializer. `Temporal` activities can be used
    to implement reading from message logs, appending to the event log, and updating
    the stateful view. For the command processor, because the applicator and mutator
    are pure functions, they are safe to use from within the `Temporal` workflow.
    `Temporal` itself could be used as a means of caching the command processor’s
    state. If the cache needs to be cleared, the workflow can be reset to arbitrary
    points in time.


    For the command generator, the handling of each mutation can be a workflow. The
    client request identifier can be used as a part of the workflow’s identifier.
    The `GraphQL` layer would initiate a workflow for the mutation passing in the
    necessary information from the request. It would then await completion of the
    workflow to return the disposition to the caller. Using `Temporal` would add additional
    fault tolerance beyond what I had described in Chapter [10](#511062_1_En_10_Chapter.xhtml).
    If the creation of a command requires interaction with other systems, those interactions
    can be implemented as activities.


    `Temporal`’s internal implementation is very similar to the system in this book.
    The state of a workflow is stored as a sequence of events. If the computer executing
    a workflow is interrupted, when `Temporal` restarts a workflow, it reestablishes
    the workflow’s private state by replaying the stored events. `Temporal` is using
    event sourcing to manage the state of a workflow. The system I have described
    in this book uses event sourcing to manage business data.


    `Temporal` is not a database. It would not be appropriate to use it to store the
    stateful view that is used to satisfy `GraphQL` queries. The next section introduces
    a datastore with unique capabilities.


    # Bitemporal Materialized Views


    The system in this book uses the event log as the authoritative source of state
    for the application. Each event in the event log describes a change. Those changes
    are used to maintain a stateful view of the system’s data using the event materializer.
    The exact schema of the stateful view will depend upon the data your system is
    responsible for. Because the events contain all changes over time, it would be
    useful to query against this dimension.


    Think of time in two dimensions. First, there is the time that a change is made
    to the database. This would be the timestamp of when an event was appended to
    the event log, or the timestamp of when an event was materialized by the event
    materializer. This timestamp will be considered *transaction time*, the time when
    it was processed by the system. The second dimension is *valid time*. This time
    is a *business domain* concept. The status quo I described in Chapter [2](#511062_1_En_2_Chapter.xhtml)
    has many business applications mutating data in place. When mutating data in place,
    there is no way to retroactively make corrections to data while preserving the
    fact that a correction was made. Event sourcing and the use of two timestamps,
    bitemporality, allow for this to be captured. Often, a change’s valid time will
    be equal to the transaction time; information is true when it was recorded. Sometimes,
    it is useful to record information today that was true as of sometime in the past
    or will be true at a point in time in the future.


    A database that can answer queries as of a valid time, or a database that is able
    to provide the change history of stored entities would be a powerful addition
    to the system described in this book. `XTDB` is one such database. I was drawn
    to `XTDB` as their vision^([^(21)](#fn21)) is aligned with mine, the use of immutability
    and persistent storage on disk being cheap.


    `XTDB` is state-centric, whereas this book’s system is change-centric. The event
    materializer is the bridge between those worlds, collapsing the event log’s changes
    into a stateful view. The stateful view it maintains can be stored within `XTDB`.
    By using `XTDB` as the datastore, the `GraphQL` schema can easily expose the change
    history of data within the system. It can also allow viewing the state of the
    datastore at any transaction and valid time combination. If users ever have questions
    about what the data in the system was at any point in the past, it can be answered.
    This can be especially powerful if your system powers any review-based workflows
    where users are primarily concerned with observing changes.'
