  raw: '### GraphQL Subscriptions


    One of our system’s self-imposed constraints from Chapter [7](#511062_1_En_7_Chapter.xhtml)
    is the ability to support a real-time user interface . This constraint exists
    because I believe it is important to bring this capability to business applications
    to meet user expectations of how software systems behave. The event materializer
    maintains a stateful view for the system’s GraphQL endpoint. After each materialized
    event, there is an opportunity to communicate what has changed.


    GraphQL subscriptions are a general mechanism for transmitting events. The GraphQL
    specification does not define any semantics for a subscription stream, other than
    it is a sequence of the field’s return type.


    The pattern I like to use is known as the *live query* pattern . There have been
    off-and-on discussions within the GraphQL community about formalizing this pattern
    using a directive, `@live`, on queries. The result will be the same as what I
    am describing.


    I design my GraphQL schemas so that the types between subscriptions and queries
    are shared as follows:


    ```

    type Customer {

    id: ID!

    name: String

    }

    type Query {

    customerById(id: ID!): Customer

    }

    type Subscription {

    customerById(id: ID!): Customer

    }

    ```


    This small snippet of a GraphQL schema defines a `Customer` type and a query to
    access a state snapshot, `customerById`. It also defines a subscription field
    with the same name, reusing the same type.


    The query behavior is straightforward GraphQL; requesting the query field will
    yield the current state of the customer in a single response. Unfortunately, a
    GraphQL schema doesn’t contain information to define the semantics of a subscription
    (which is part of the rationale for the `@live` directive). For subscriptions
    implementing the live query pattern, upon subscription callers will receive a
    snapshot of the current state. As changes are made to the requested data, additional
    snapshots will be sent. The subscription is infinite; if results for the query
    exist, the subscription will continue to tick as query results change.


    Conceptually, our system’s stream of events, representing changes, are materialized
    into a stateful view by the event materializer. As changes to this stateful view
    are made, subscriptions allow for the observation of those changes in the form
    of a series of states.


    I have found this communication paradigm to work well with user interfaces. UIs
    are often displaying full states and communicating the full state on each underlying
    change simplifies their implementation. As an implementation note, the semantics
    of communicating full states with each subscription tick does not mean that the
    underlying transport needs to send the full state with each tick. Subscriptions
    are stateful, so an implementation could optimize for the network layer by only
    communicating the difference between ticks. This optimization can exist at the
    transport layer, providing the illusion for developers that the full state is
    communicated each time.


    The use of subscriptions isn’t limited to UIs. There may be other collaborating
    systems that need to use the state of our system. They too can use a GraphQL subscription
    to access the changes from our system. This works best when the collaborating
    system only needs to be aware of the state change and isn’t concerned with *why*
    there was a state change. If collaborating systems need to know why, the interaction
    may be better thought of as a side effect from our system. If possible, using
    the same mechanism for a UI as well as collaborating systems helps limit the number
    of external contracts our system has. There is a balance to strike here. As developers,
    limiting the number of external contracts reduces the work required when changes
    are made. In tension with this is the need to coordinate with a larger number
    of parties when changes are made. There is no right answer as to where the balance
    lies. I believe the important part is to have the decision be an intentional one.


    After each materialized event, you can use the information contained within the
    event to determine the set of impacted GraphQL subscriptions. This may also be
    functionality that your choice of datastore for the stateful view provides. As
    the stateful view is updated, it can either generate or facilitate the propagation
    of, change events that our system consumes and uses to power GraphQL subscriptions.


    ### Other Side Effects


    In addition to notifying users and collaborating systems about changes to our
    system’s state, there may be business processes that our system is a part of.
    In Chapter [5](#511062_1_En_5_Chapter.xhtml), when introducing how I think about
    business rules, I described a class of rule I termed *side effects*. Side effects
    can be further broken down into two categories: those that depend upon the view
    state and those that don’t. For the side effects that don’t depend upon the view
    state directly, consider whether there is an indirect dependency for you, the
    developer. If something unexpected occurs in the system and you need to investigate,
    would ensuring that side effects happen after event materialization aid in potential
    future debugging efforts? Perhaps not, but I always encourage this line of thinking
    when designing systems. Your future self may thank you.


    An example of a side effect that would depend upon the view would be the maintenance
    of another derivative data store. The stateful store that we use to store our
    view may be efficient for direct lookup by identifiers but may not efficiently
    offer some other desired product features, such as full text or faceted search.
    There may be another store that is able to answer these queries more efficiently
    and for operational simplicity the store is loaded with the results of GraphQL
    queries from our service. Yes, you could have an additional event materializer
    that maintains state within this store, but there is a trade-off between the code
    duplication of the two stores vs. having one be a derivative of the other.


    This type of side effect could operate by following the system’s event log, but
    then delaying the handling of each event until the event materializer has successfully
    materialized a given event. As the side effect handles each event, it can reuse
    the same checkpointing mechanism as the event materializer . Its progress can
    be stored as an additional partition within the event materializer’s checkpoints.
    An important detail here is that if the view is recreated, the side effects will
    occur again, as the state that is stored within the view will be lost. For the
    example at hand, updating a derivative data store based on our view, this is desired.
    For the other category, participation in business processes, this will be undesirable.


    A side effect that is a part of a business process, such as sending approved payments
    to a bank, or sending new customers a welcome email, should not be redone when
    the view is recreated. They will need a checkpointing mechanism akin to what the
    event materializer uses, but one that is durable. It is feasible to reuse the
    command processor itself for this state keeping by modeling both the intent to
    perform an action as well as the action’s disposition as command and events. With
    whichever route is chosen, and discrete from the ideas around business applications
    in this book, the action should be idempotent. The information within our system,
    such as the event log sequence number, can assist in constructing an idempotency
    token that the next step in the business process can use to determine if there
    is an attempt to perform an action an additional time . Failures will happen and
    actions will be retried. While having a customer receive a second welcome email
    may be acceptable, sending payments more than once is not.'
  trans: '

    ### GraphQL 订阅


    我们系统在第 7 章中自我施加的一个约束是支持实时用户界面的能力。之所以存在这个约束，是因为我认为将这种能力引入业务应用以满足用户对软件系统行为的期望至关重要。事件物化器为系统的
    GraphQL 端点维护了一个有状态视图。每次物化事件后，都有机会传达发生了什么变化。


    GraphQL 订阅是一种传输事件的通用机制。GraphQL 规范并未定义订阅流的任何语义，仅说明它是字段返回类型的一个序列。


    我喜欢使用的模式被称为*实时查询*模式。GraphQL 社区内一直断断续续地讨论着如何通过使用查询上的 `@live` 指令来正式化这种模式。其结果将与我描述的一致。


    我设计我的 GraphQL 模式时，使得订阅和查询之间的类型可以共享，如下所示：


    ```

    type Customer {

    id: ID!

    name: String

    }

    type Query {

    customerById(id: ID!): Customer

    }

    type Subscription {

    customerById(id: ID!): Customer

    }

    ```


    这个简短的 GraphQL 模式片段定义了一个 `Customer` 类型和一个用于访问状态快照的查询 `customerById`。它还定义了一个同名的订阅字段，复用了相同的类型。


    查询行为是直接的 GraphQL；请求查询字段将在单个响应中返回客户的当前状态。不幸的是，GraphQL 模式不包含定义订阅语义的信息（这也是 `@live`
    指令存在的部分原因）。对于实现实时查询模式的订阅，订阅调用者将收到当前状态的快照。当请求的数据发生更改时，将发送额外的快照。订阅是无限的；如果查询结果存在，订阅将继续随着查询结果的变化而更新。


    从概念上讲，我们系统中代表变化的事件流，由事件物化器物化为一个有状态视图。当这个有状态视图发生变化时，订阅允许以一系列状态的形式观察这些变化。


    我发现这种通信范式与用户界面配合得很好。UI 通常显示完整状态，并在每次底层变化时传达完整状态，这简化了它们的实现。作为实现说明，每次订阅更新都传达完整状态的语义，并不意味着底层传输需要在每次更新时发送完整状态。订阅是有状态的，因此实现可以通过仅传达更新之间的差异来优化网络层。这种优化可以存在于传输层，为开发者提供每次都能传达完整状态的假象。


    订阅的使用并不仅限于 UI。可能还有其他协作系统需要使用我们系统的状态。它们也可以使用 GraphQL 订阅来访问我们系统的变化。当协作系统只需要了解状态变化，而不关心*为什么*会有状态变化时，这种方式效果最佳。如果协作系统需要知道原因，那么这种交互可能更适合被视为我们系统的副作用。如果可能，为
    UI 和协作系统使用相同的机制，有助于限制我们系统拥有的外部契约数量。这里需要找到一个平衡点。作为开发者，限制外部契约的数量可以减少进行更改时所需的工作量。与此相矛盾的是，在进行更改时需要与更多方进行协调。平衡点在哪里并没有正确答案。我认为重要的是要有意识地做出这个决定。


    每次物化事件后，你可以利用事件中包含的信息来确定受影响的 GraphQL 订阅集合。这也可能是你为有状态视图选择的数据存储所提供的功能。当有状态视图更新时，它可以生成或促进变更事件的传播，我们的系统消费这些事件并用于驱动
    GraphQL 订阅。


    ### 其他副作用


    除了通知用户和协作系统关于我们系统状态的变化外，我们的系统可能还参与某些业务流程。在第 5 章中，介绍我如何思考业务规则时，我描述了一类我称之为*副作用*的规则。副作用可以进一步分为两类：依赖于视图状态的，以及不依赖于视图状态的。对于不直接依赖于视图状态的副作用，请考虑作为开发者的你是否存在间接依赖。如果系统中发生了意外情况需要调查，确保副作用在事件物化之后发生是否有助于未来潜在的调试工作？也许不会，但我总是鼓励在设计系统时进行这种思考。未来的你可能会感谢自己。


    一个依赖于视图的副作用的例子是维护另一个衍生数据存储。我们用于存储视图的有状态存储可能对于通过标识符直接查找很高效，但可能无法高效地提供其他所需的产品功能，例如全文搜索或分面搜索。可能存在另一个能够更高效地响应这些查询的存储，并且为了操作简便，该存储会加载来自我们服务的
    GraphQL 查询结果。是的，你可以有一个额外的事件物化器来维护此存储中的状态，但这需要在两个存储的代码重复与让一个存储成为另一个的衍生之间进行权衡。


    这种类型的副作用可以通过跟踪系统的事件日志来运作，但需要延迟处理每个事件，直到事件物化器成功物化了该事件。当副作用处理每个事件时，它可以重用与事件物化器相同的检查点机制。其进度可以作为事件物化器检查点内的一个额外分区来存储。这里一个重要的细节是，如果视图被重建，副作用将再次发生，因为存储在视图中的状态将会丢失。对于手头的例子，即基于我们的视图更新衍生数据存储，这是期望的行为。对于另一类，即参与业务流程，这将是不期望的。


    作为业务流程一部分的副作用，例如向银行发送已批准的付款，或向新客户发送欢迎邮件，在视图重建时不应重复执行。它们需要一个类似于事件物化器所使用的检查点机制，但必须是持久的。通过将执行操作的意图以及操作的处理结果都建模为命令和事件，可以复用命令处理器本身来进行这种状态保持。无论选择哪种路径，并且与本书中关于业务应用的想法无关，该操作都应该是幂等的。我们系统内的信息，例如事件日志序列号，可以帮助构建一个幂等令牌，业务流程的下一步可以使用该令牌来确定是否存在重复执行操作的尝试。故障会发生，操作会被重试。虽然让客户收到第二封欢迎邮件可能可以接受，但多次发送付款则不行。

