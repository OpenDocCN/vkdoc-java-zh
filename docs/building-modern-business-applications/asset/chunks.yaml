  raw: '### Web Applications


    Concurrent with rich clients, the web was invented. As the 1990s came to a close,
    TCP/IP became the de-facto protocol for local area networks, as it solved LAN
    communication in addition to internet access. This opened the possibility of running
    a web server on the LAN with users accessing an “intranet.”


    While the initial user experience was poor in comparison to rich clients , it
    simplified the lives of developers as there was no software to install on users’
    machines. Solving the operational pains of DLL hell was of value to IT departments.


    The first web applications were page-based, harkening back to the document-centric
    view that the web started with. There were two developments that I feel led to
    the floodgates of web applications.


    The first was a pause in revisions of the HTML specification. Through the 1990s
    the W3C released HTML 2, 3, and eventually 4\. HTML 4 was initially released in
    last 1997, with a final revision as 4.01 in late 1999\. It was almost nine years
    until the process for HTML 5 began.


    While this was a stagnation in the specification, it was also a period of stability.
    I believe this stability provided a stable foundation to build applications upon.


    The second important development was what is now known as XMLHTTPRequest , or
    XHR. This was a technique for communicating with the web server without a full
    page reload, allowing web applications to have interaction paradigms that began
    to mimic rich clients . A proprietary feature of Microsoft’s Internet Explorer
    browser allowed JavaScript running in the browser to access components installed
    on the system through a technology known as ActiveX . This was a descendant of
    the same technology, COM, that Visual Basic used for its interface building. It
    was through this path that a component Microsoft had developed as part of their
    Outlook Web Access (allowing web-based access to a corporate email server) could
    be used on any page. Once this technique was discovered, it became a de-facto
    standard and was implemented in other browser engines.


    With a stable specification and the ability to communicate with a server in the
    background, it was possible to build business applications that were “good enough”
    for daily use. Some business applications would continue to demand rich clients
    , as their requirements could not be met by a web-based application. However,
    if a web browser’s capabilities were sufficient for an application, the operational
    ease of a web application made it the simpler long-term choice.


    Frameworks that assisted developers in writing the application servers that backed
    these web-based applications converged upon the MVC pattern for structuring themselves.
    The model is no longer the database itself; it is an object model in the application
    server that’s mapped to the database with an ORM . Code is organized into classes
    named controllers, with their response payloads being views. This was the genesis
    of the status quo that remains.


    It is here that I believe web-based business applications have stagnated. While
    there have been continuing developments in the web that I discuss in the next
    section, by and large, the requirements of many business applications have been
    satisfied. The way in which the browser-side portion of an application is developed
    has changed, but the underlying browser primitives they use have not.


    ### The Rise of Consumer Applications


    Through the 2000s, if you wanted to use a website, you had to use a web browser
    on a desktop (or laptop) computer. This was the decade where broadband Internet
    access at home increased rapidly. Along with it was the “Web 2.0” movement that
    ushered in increased interactivity on websites, something that was made possible
    by the availability of XHR in browsers. Websites aimed at users flourished, and
    their activities online expanded beyond the transactional interactions that were
    similar to business applications.


    In 2007, a shockwave rippled through the technology industry when Apple released
    the first iPhone. It allowed one to browse the web on a handheld device with pages
    rendering the same as they would on a desktop. Apple’s initial plans were to have
    all user-installable applications be websites, but they backed away from that
    and allowed developers to write native applications delivered via the App Store.
    A new name for applications arrived, “apps.” Google’s Android mobile operating
    system quickly matched what Apple had done with an app store of their own.


    This complicated the lives of UI developers targeting consumers. Previously, they
    had to deliver a website that was functional on the major desktop browser engines.
    Assumptions could be made around the available input devices (keyboard and mouse),
    approximate screen sizes, pixel density, and even the nature of their connection
    to the internet (stable latencies and packet loss, even though bandwidth varied
    due to broadband availability). With this mobile explosion, there were a myriad
    of screen sizes, the mouse replaced with touch interactions, a network with variable
    latency, and packet loss. There was, at least, a common browser engine, Apple’s
    WebKit . One deliverable, a desktop website , had morphed into four: a desktop
    website, a mobile website , an iOS app, and an Android app. To help limit the
    number of targets, some native mobile applications embedded browser views to provide
    some of their functionality.


    To allow mobile websites to have app-like capabilities, browser innovation began
    again with the addition of new features. Web workers allowed background execution,
    SSE for data pushed from the server, and WebSockets for a persistent bidirectional
    connection.


    There was a Cambrian Explosion in the JavaScript ecosystem of frameworks making
    use of these new APIs, and overall streamlining of the development experience.
    A new pattern for delivering data emerged, GraphQL.


    GraphQL provides a mechanism for an API caller to specify exactly what data they
    wish to have returned. This was a valuable feature when delivering data over a
    mobile network. It is a different paradigm from the MVC-style APIs that came before.
    To help bridge between older web APIs and the APIs desired by mobile clients,
    the Backend for the Frontend (BFF) pattern emerged. This is a service that acts
    as an adapter between existing APIs and the desired experience of the client.


    Innovations in a user’s experience (UX) also took place. Mobile device adoption
    accelerated after the iPhone and Android releases, and an app’s ease-of-use became
    a valuable differentiator in the marketplace. New paradigms were invented in apps
    and percolated through the ecosystem (pull-to-refresh, not *needing* to refresh,
    notifications, infinite scrolling, and social collaboration, to name a few).


    Previously, the difference between a business application delivered via the web
    and a consumer website was largely one of scale and audience. With the advent
    of mobile, consumer websites weren’t mere websites, they also had to deliver an
    app experience. The set of skills needed to work on consumer experiences had expanded.


    Thus, my assertion on the status quo. Prior to this mobile explosion, business
    applications and consumer websites could largely be built in a similar fashion.
    Why haven’t business applications kept pace? I have some theories.'
  trans: '

    ### Web 应用程序


    与富客户端同时期，万维网诞生了。随着 1990 年代接近尾声，TCP/IP 成为局域网的事实标准，因为它除了解决互联网接入问题外，还解决了局域网通信问题。这开启了在局域网上运行
    Web 服务器、让用户访问“内网”的可能性。


    虽然与富客户端相比，最初的用户体验较差，但它简化了开发人员的工作，因为无需在用户机器上安装软件。解决“DLL 地狱”的运维难题对 IT 部门来说很有价值。


    最初的 Web 应用程序是基于页面的，这让人回想起万维网起步时以文档为中心的视角。我认为有两个发展导致了 Web 应用程序的井喷。


    第一个是 HTML 规范修订的暂停。在整个 1990 年代，W3C 发布了 HTML 2、3，最终是 HTML 4。HTML 4 最初于 1997 年底发布，最终修订版
    4.01 于 1999 年底发布。直到 HTML 5 的制定工作开始，中间相隔了将近九年。


    虽然这是规范上的停滞期，但也是一个稳定期。我相信这种稳定性为构建应用程序提供了稳定的基础。


    第二个重要的发展是现在所谓的 XMLHTTPRequest，即 XHR。这是一种无需完全重新加载页面即可与 Web 服务器通信的技术，使得 Web 应用程序能够拥有开始模仿富客户端的交互模式。微软
    Internet Explorer 浏览器的一项专有功能允许浏览器中运行的 JavaScript 通过一种名为 ActiveX 的技术访问安装在系统上的组件。这是
    Visual Basic 用于构建其界面的同一技术 COM 的后代。正是通过这条路径，微软为 Outlook Web Access（允许基于 Web 访问企业邮件服务器）开发的一个组件可以在任何页面上使用。一旦这项技术被发现，它便成为了事实标准，并被其他浏览器引擎所实现。


    有了稳定的规范和在后台与服务器通信的能力，就有可能构建出“足够好”以用于日常使用的业务应用程序。一些业务应用程序仍会需要富客户端，因为基于 Web 的应用程序无法满足其需求。然而，如果
    Web 浏览器的能力足以满足某个应用程序的需求，那么 Web 应用程序在运维上的简便性使其成为更简单的长期选择。


    那些帮助开发人员编写支持这些基于 Web 的应用程序的应用服务器的框架，都趋向于采用 MVC 模式来组织自身。模型不再是数据库本身；它是应用服务器中的一个对象模型，通过
    ORM 映射到数据库。代码被组织成名为控制器的类，它们的响应负载是视图。这就是当前现状的起源。


    我认为，基于 Web 的业务应用程序正是在这里陷入了停滞。虽然 Web 领域持续有新的发展（我将在下一节讨论），但总的来说，许多业务应用程序的需求已经得到了满足。应用程序的浏览器端部分的开发方式发生了变化，但它们所使用的底层浏览器原语并未改变。


    ### 消费类应用程序的兴起


    在整个 2000 年代，如果你想使用一个网站，你必须使用台式机（或笔记本电脑）上的 Web 浏览器。这十年间，家庭宽带互联网接入迅速普及。随之而来的是“Web
    2.0”运动，它带来了网站交互性的增强，而这得益于浏览器中 XHR 的可用性。面向用户的网站蓬勃发展，用户在线活动也扩展到了类似于业务应用程序的事务性交互之外。


    2007 年，苹果公司发布了第一代 iPhone，一股冲击波席卷了整个科技行业。它允许人们用手持设备浏览网页，页面渲染效果与在台式机上相同。苹果最初的计划是让所有用户可安装的应用程序都是网站，但他们后来放弃了这一计划，并允许开发者编写通过
    App Store 交付的原生应用程序。应用程序有了一个新名称：“App”。谷歌的 Android 移动操作系统迅速效仿了苹果的做法，推出了自己的应用商店。


    这使得面向消费者的 UI 开发人员的生活变得复杂。以前，他们只需要交付一个在主流桌面浏览器引擎上都能正常运行的网站。他们可以对可用的输入设备（键盘和鼠标）、大致屏幕尺寸、像素密度，甚至互联网连接的性质（稳定的延迟和丢包率，尽管带宽因宽带可用性而异）做出假设。随着移动设备的爆发，出现了无数种屏幕尺寸，鼠标被触摸交互取代，网络具有可变的延迟和丢包率。不过，至少有一个通用的浏览器引擎：苹果的
    WebKit。一个可交付物——桌面网站——演变成了四个：桌面网站、移动网站、iOS 应用和 Android 应用。为了限制目标平台的数量，一些原生移动应用嵌入了浏览器视图来提供部分功能。


    为了让移动网站拥有类似应用的能力，浏览器创新再次启动，增加了许多新功能。Web Workers 允许后台执行，SSE 用于服务器推送数据，WebSockets
    用于持久的双向连接。


    JavaScript 生态系统中出现了利用这些新 API 的框架的“寒武纪大爆发”，并全面简化了开发体验。一种新的数据交付模式 GraphQL 应运而生。


    GraphQL 提供了一种机制，允许 API 调用者精确指定他们希望返回哪些数据。在通过移动网络传输数据时，这是一个非常有价值的功能。这与之前的 MVC 风格
    API 是截然不同的范式。为了在旧的 Web API 和移动客户端所需的 API 之间架起桥梁，出现了“服务于前端的后端”（BFF）模式。这是一种服务，充当现有
    API 与客户端所需体验之间的适配器。


    用户体验方面的创新也在发生。在 iPhone 和 Android 发布之后，移动设备的采用率加速增长，应用的易用性成为市场上一个有价值的差异化因素。应用中发明了新的范式，并渗透到整个生态系统中（例如，下拉刷新、*无需*刷新、通知、无限滚动和社交协作）。


    以前，通过 Web 交付的业务应用程序与面向消费者的网站之间的区别主要在于规模和受众。随着移动设备的出现，面向消费者的网站不仅仅是网站，它们还必须提供应用体验。从事消费者体验工作所需的技能集已经扩大。


    因此，我得出关于现状的论断。在这次移动设备爆发之前，业务应用程序和面向消费者的网站基本上可以用类似的方式构建。为什么业务应用程序没有跟上步伐？我有一些理论。

    '
- fmt: 'First, for new business applications, features that are common in apps are
    now taken for granted, and thus not explicitly called out by product managers
    when writing requirements, the same way that business-specific features are. The
    `refresh`/`reload` button is my favorite example here. Websites that automatically
    update their data have been possible since the invention of `XHR`. As a UX paradigm,
    it wasn’t until the mobile explosion that it became common. If the refresh button
    were used, the browser may re-request assets that haven’t changed in addition
    to the data that has. To streamline the experience, refresh moved into the app,
    and eventually disappeared. Instead, the content is kept up-to-date automatically.
    If a feature is invisible and omni-present, it becomes easier to miss when explicitly
    enumerating requirements.


    Second, a lack of developer experience. As the set of skills needed to work on
    consumer experiences expanded, it creates a bifurcation in skillsets. One may
    have needed exposure to systems that utilized new browser capabilities to suggest
    their incorporation.


    Finally, architectural impedance. It may not be straightforward to “bolt on” a
    change stream in order to have live updating pages or trigger notifications for
    a user. This gets to the heart of the remainder of this book. I’ll be introducing
    a different way of building systems in the third part of this book that solves
    this impedance and will hopefully set a standard for the next phase of computing.
    The `MVC` pattern has served us well, but there is another step forward we can
    take. As we prepare to do so, there are other practices that are valuable to incorporate
    into our work.


    ## Concurrent Practices


    The practices involved in delivering software have also been evolving. A software
    architecture is more than how the pieces fit together, it’s also how the pieces
    come together, how they are changed over time, how they are validated, and how
    their production performance is evaluated. In this section, I go over some practices
    that I believe are valuable for the long-term success of an application.


    ### Agile


    When the agile manifesto^([⁵](#fn5)) was unveiled in 2001, it was a large shift
    in the way in which delivering software was thought about on a wide scale. I remember
    first reading it and it was as if a lightbulb had gone off in my head. It succinctly
    describes some of the pressures that software teams face and offers an extremely
    loose framework for thinking about them.


    The act of constructing software isn’t bound by the same physical constraints
    as constructing physical objects. I believe it is important to lean into that
    differentiation and use it to create better software. Software is, ultimately,
    an arrangement of bits. We have constructed fantastical systems to ease the process
    of arranging them just-so.


    The point from the manifesto that stuck out to me the most was being amenable
    to change. To change software is to spend time doing so; there are no materials
    lost in the process. I have a strong belief that a key principle in building a
    system is that it needs to be amenable to change, and that will be reflected in
    what we build in the remainder of this book.


    The manifesto also speaks to the processes around making changes. As mentioned
    in the first chapter, our business applications are a bespoke creation for the
    business. It is important for developers to view themselves as collaborators with
    the business, not contractors (even if the actual relationship is via a consultancy).


    The *goal* of a business application is to help the business, and the agile manifesto
    describes how to approach those interactions.


    ### Test-Driven Development


    Test-driven development, or `TDD`, emerged from the agile practice of eXtreme
    Programming, or `XP`. Ken Beck “rediscovered^([⁶](#fn6))” the technique in the
    1990s and wrote about it in his 1999 book *Extreme Programming Explained.* ^([⁷](#fn7))


    The crux of the idea is to write tests for functionality prior to implementing
    the functionality itself. At first, the test should run and fail, as the functionality
    hasn’t been implemented. From then on, the goal is to make the test pass.


    I’ve found this practice to be immensely valuable, as it puts me in the position
    of being a consumer of my code prior to writing it. The act of writing the test
    helps focus on what’s important from an API perspective, and how the code should
    communicate with the rest of the codebase. I feel it helps create code that is
    easier to maintain as well. The act of writing a test before implementation somehow
    leads to a more thoughtful design. That design is more amenable to future change.
    I’m certain the fact that the code has tests helps maintainability, as changes
    can be made with confidence. However, I’ve found that there is a difference between
    code that had tests written prior to implementation and tests after. Empirically,
    I’ve seen it work and have become a believer in the practice. Tests need to be
    written regardless to validate that code works, so why not write them first?


    ### Continuous Integration and Delivery


    Continuous Integration and Continuous Delivery, `CI/CD`, are two more `XP` practices.
    They are distinct yet interrelated. When combined, they formalize the delivery
    pipeline for software. `CI` has become a standard practice. If your project utilizes
    a build server that compiles your project and runs tests after code pushes, you
    are practicing `CI`. To move into `CD`, the build server should also package the
    software up for deployment, perhaps even automating the deployment itself.


    When practiced together, `CI/CD` allows you to push a change to your repository,
    and without any additional manual intervention have it running in your test environment.
    This can also be extended to promote builds into production automatically, although
    most business environments that I’ve worked in have preferred to have a human
    in the loop for that part, even if it is the simple act of clicking a button.


    I find value in these practices as they complete the feedback loop. The test environment
    that exists on a build server is not the same as a deployed environment. This
    “pipeline” approach for delivering the software itself will be echoed in how we
    will be structuring the internals of our modern business application. There is
    also an element of a philosophical thought experiment here, akin to “If a tree
    falls in a forest and no one is around to hear it, does it make a sound?” – “If
    the software was changed but it was never deployed, was it ever really changed?”.
    One refrain I will keep coming back to is that an application should be amenable
    to change. Easily getting those changes into the hands of users is crucial to
    this goal.'
