  trans: '

    ## 演进视图模型


    在本章前面部分，我介绍了为不同消费者维护不同视图而使用多个事件物化器的概念。同样的思路也可以扩展到支持单个视图的演进。回顾一下，视图模型应被视为临时性的，因为状态的权威存储是事件日志。这意味着破坏性的模式变更并非我们系统的限制。事件物化器可以“回滚”到事件日志的起始位置，从而完全重建视图。


    在介绍第 4 章的响应式原则时，关于弹性，我提到部署总会使系统暂时进入非预期的状态。要么是运行的实例数少于预期（如果在启动新实例前停止所有旧实例），要么是实例数多于预期（如果先启动新实例，待旧实例能处理请求后再停止它们）。


    正是后一种状态（运行更多实例）类似于拥有多个事件物化器。新旧版本的事件物化器可以同时运行！包含向后不兼容视图模型变更的新版本代码，可以将其有状态视图存储到新位置。这带来了多重好处。首先，在新代码重建视图期间，旧版本代码可以继续处理请求。其次，如果新代码出现意外问题，由于先前代码使用的视图保持不变，部署可以安全回滚。


    要安全使用此技术，关键在于将新增事件的变更与破坏性视图模型变更分开处理。如果新代码库处理命令时产生了旧系统无法处理的事件，那么回滚将无法实现。


    在第 2 章描述的原地修改型系统中，向后不兼容的模式变更管理起来非常棘手。从表中删除列是不可逆的操作；必须从备份中恢复数据库本身。有经验的开发者会回避向后不兼容的变更，因为处理过此类问题的经历让他们深知其风险之高。即使是可逆的变更（例如更改列的数据类型）也可能难以管理。数据库模式管理通常与应用程序代码库集成。系统启动时，会执行任何必要的正向迁移。如果代码回滚，旧版本代码不知道如何撤销新版本所做的更改。这就需要单独运行回滚脚本来逆转迁移。单独运行脚本的风险在于，这种操作不太可能频繁执行，从而在需要回滚变更的压力下正确执行增加了额外风险。这最终成为另一个论据，说明为何要按我描述的方式将业务应用程序构建为响应式系统。我所描述的结构和实践引导开发者走向降低风险的做法。


    ## 向他人传达变更


    业务应用程序并非孤立存在。虽然它们作为所管理信息的真实来源，但应用程序也需要与其他系统协作。这可能是通过应用程序用户界面与人类协作，或是与其他软件系统协作。无论哪种情况，系统都应能够*主动*传达变更。我所阐述的架构描述了一个能够感知数据何时发生变化的系统。这旨在有效向他人传达这些变更。这种沟通分为两大类。第一类是向可能受益的各方传达系统内部的状态变更。第二类是一类业务规则（副作用），明确涉及我们自身系统之外的状态变更。

    '
- fmt: "### GraphQL Subscriptions\n\nOne of our system’s self-imposed constraints\
    \ from Chapter [7](#511062_1_En_7_Chapter.xhtml) is the ability to support a real-time\
    \ user interface. This constraint exists because I believe it is important to\
    \ bring this capability to business applications to meet user expectations of\
    \ how software systems behave. The event materializer maintains a stateful view\
    \ for the system’s GraphQL endpoint. After each materialized event, there is an\
    \ opportunity to communicate what has changed.\n\nGraphQL subscriptions are a\
    \ general mechanism for transmitting events. The GraphQL specification does not\
    \ define any semantics for a subscription stream, other than it is a sequence\
    \ of the field’s return type.\n\nThe pattern I like to use is known as the *live\
    \ query* pattern. There have been off-and-on discussions within the GraphQL community\
    \ about formalizing this pattern using a directive, `@live`, on queries. The result\
    \ will be the same as what I am describing.\n\nI design my GraphQL schemas so\
    \ that the types between subscriptions and queries are shared as follows:\n\n\
    ```\ntype Customer {\n  id: ID!\n  name: String\n}\ntype Query {\n  customerById(id:\
    \ ID!): Customer\n}\ntype Subscription {\n  customerById(id: ID!): Customer\n\
    }\n```\n\nThis small snippet of a GraphQL schema defines a `Customer` type and\
    \ a query to access a state snapshot, `customerById`. It also defines a subscription\
    \ field with the same name, reusing the same type.\n\nThe query behavior is straightforward\
    \ GraphQL; requesting the query field will yield the current state of the customer\
    \ in a single response. Unfortunately, a GraphQL schema doesn’t contain information\
    \ to define the semantics of a subscription (which is part of the rationale for\
    \ the `@live` directive). For subscriptions implementing the live query pattern,\
    \ upon subscription callers will receive a snapshot of the current state. As changes\
    \ are made to the requested data, additional snapshots will be sent. The subscription\
    \ is infinite; if results for the query exist, the subscription will continue\
    \ to tick as query results change.\n\nConceptually, our system’s stream of events,\
    \ representing changes, are materialized into a stateful view by the event materializer.\
    \ As changes to this stateful view are made, subscriptions allow for the observation\
    \ of those changes in the form of a series of states.\n\nI have found this communication\
    \ paradigm to work well with user interfaces. UIs are often displaying full states\
    \ and communicating the full state on each underlying change simplifies their\
    \ implementation. As an implementation note, the semantics of communicating full\
    \ states with each subscription tick does not mean that the underlying transport\
    \ needs to send the full state with each tick. Subscriptions are stateful, so\
    \ an implementation could optimize for the network layer by only communicating\
    \ the difference between ticks. This optimization can exist at the transport layer,\
