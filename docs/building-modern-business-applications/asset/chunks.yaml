  trans: '

    ### 建议锁


    与许多数据库一样，PostgreSQL 在内部使用锁来保证其一致性。在正常情况下，这对用户通常是透明的。在调试问题时，例如由于等待锁而导致语句未按预期完成时，你才会意识到它们的存在。


    PostgreSQL 提供了创建具有应用程序定义含义的锁的能力。这些锁被称为*建议锁*，因为从数据库服务器的角度来看，它们没有语义含义，并且服务器不会强制要求使用它们。


    建议锁有两种类型：绑定到事务的锁和绑定到连接的锁（PostgreSQL 文档将其称为*会话*）。锁也可以是共享锁或排他锁；我们希望使用排他锁，因为目标是在应用程序集群中获得运行进程的独占权。


    如果你认为锁可以通过表中的标志来模拟，那么你是对的。使用建议锁有两个优点。第一个优点是锁活动被保留在 PostgreSQL 用于存储表数据的结构之外。PostgreSQL
    使用多版本并发控制（MVCC）模型，其中对行的更新不会就地修改数据。相反，它们会创建该行的新版本，该版本仅对新事务可见。随着旧事务的完成，将出现任何事务都不可见的行，这些行可以被清理。这就是清理（vacuuming）的本质，这是一个关键的后台维护过程，通常是透明的，但了解它很重要。第二个优点是一个关键点，我认为它使天平倾向于使用建议锁；当获取锁的事务或连接完成时（取决于获取的类型），它们会自动释放。


    对于我们的系统，我们将使用绑定到连接的建议锁。当连接终止时（无论是有意还是无意），服务器都会保证已获取的锁将被释放。


    在尝试获取锁时，可以使用两种基本模式。第一种是使用阻塞调用，即锁获取会阻塞，直到可以获取为止。我不喜欢这种方法，因为阻塞语句表现为一个长时间运行的 `SELECT`
    语句；锁操作是通过使用 `SELECT` 调用的函数来完成的。我发现长时间运行的语句会扭曲对系统的监控，因为鉴于它们是预期行为，需要将它们过滤掉。长时间运行的语句也可能不会从调用方产生任何网络活动，这可能导致底层
    TCP 连接在某些环境中超时。这尤其难以调试！


    我偏好的模式是使用尝试获取锁并立即返回一个布尔结果（指示获取是否成功）的锁获取函数。这允许我的代码控制尝试获取锁的频率，通常是每 5 到 10 秒一次。我更喜欢这种方法，因为它避免了上一段中的两个问题；获取尝试是确定性地运行的，并且每次尝试都会使用连接，从而防止它显得异常空闲。


    一旦获取了锁，就需要使用连接以确保其健康。为此，我每隔几秒在一个循环中执行一次 `SELECT 1` 调用。如果你不熟悉这个惯用法，它与连接池用于验证 PostgreSQL
    连接健康状况的语句相同；它返回字面值 `1`。如果连接意外终止，该语句将失败，从而使我们的代码能够对终止做出反应。


    ### LISTEN 和 NOTIFY


    PostgreSQL 包含一个发布/订阅（pub/sub）消息系统，其形式为 `LISTEN` 和 `NOTIFY` 命令。消息被组织到通道中，并且可以包含可选的有效载荷。`NOTIFY`
    命令用于发送消息，`LISTEN` 用于监听消息。


    #### NOTIFY


    对于发布，PostgreSQL 文档建议的一种模式（也是我使用的模式）是附加到表上的触发器，用于生成消息。这可以与 PostgreSQL 的 JSON 函数结合使用，将更新后的行作为
    JSON 传递回应用程序。以下是一个示例片段，我将用它来进一步解释：


    ```

    CREATE FUNCTION send_notification()

    RETURNS TRIGGER AS

    $$

    BEGIN

    PERFORM pg_notify(''my_channel_name'', row_to_json(new)::TEXT);

    RETURN NULL;

    END;

    $$ LANGUAGE plpgsql;

    CREATE TRIGGER notify_table_updated

    AFTER INSERT OR UPDATE

    ON your_table

    FOR EACH ROW

    EXECUTE FUNCTION send_notification();

    ```


    从底部开始，一个触发器被附加到一个表上，在示例中是 `your_table`。你还需要命名触发器，而不是我使用的占位符名称 `notify_table_updated`。对于插入或更新的每一行，将调用
    `send_notification` 函数。这是在表上创建触发器的样板代码；要执行的操作与在表上创建触发器是分开的，因为这允许该函数在多个表之间重用。


    `send_notification` 函数就是该操作。它是一个定义为触发器的函数。它执行单个任务，即调用 `pg_notify` 函数。此函数等同于 `NOTIFY`
    命令；之所以使用它而不是 `NOTIFY`，是因为它更容易与非恒定的通道名称或有效载荷一起使用，而示例正是这样做的。通道名称是 `my_channel_name`，有效载荷是修改后行的
    JSON 表示。在触发器中，`new` 指的是数据的新状态，我们将其传递给 `row_to_json` 以将其转换为 JSON，然后强制转换回 `TEXT`，因为这是
    `pg_notify` 所需的数据类型。


    使用 `NOTIFY` 的另一个好处是它是事务性的。在事务中发送的消息直到事务提交后才会被传递。如果事务回滚，则永远不会传递任何消息。


    从应用程序代码中显式调用 `NOTIFY` 也完全没有问题。在大多数情况下，我更喜欢触发器方法，因为事件通常与表中的数据更改相关，并且将其与数据库中的表耦合可确保始终生成这些事件。在某些情况下，我想发送与表更改无关的消息，例如在集群中传递心跳消息。


    #### LISTEN


    对于订阅，使用 `LISTEN` 命令。它接受一个参数，即要监听的通道名称。一个连接可以同时监听多个通道。


    由于此功能不在 SQL 标准之内，因此对事件的访问是 PostgreSQL 驱动程序中的专有功能。它不会在许多平台提供的数据库无关 API 中公开。


    正在 `LISTEN` 的连接应专用于此目的。返回的数据结构将根据所使用的客户端 API 略有不同，但所有 API 的共同点是可以访问通道名称和有效载荷。


    我将在本章后面介绍 R2DBC API 时更深入地讨论 `LISTEN`。

    '
- fmt: '### Schemas


    PostgreSQL provides a layer of organization within a database in the form of schemas.
    Database objects such as tables, types, and functions always exist in a schema.
    If you’ve used PostgreSQL before, you may have seen references to `public`, the
    default schema that all databases have, and the one that tables and other objects
    will be created in by default. There’s a runtime parameter named `search_path`
    that controls which schemas to search for objects in. By default, it includes
    `public`, which is why you can write `SELECT * FROM my_table` rather than `SELECT
    * FROM public.my_table`.


    The first benefit from schemas is for authorization. Since we will be using PostgreSQL
    for multiple functions, we can use schemas to organize objects and grant access.
    Our system will be using PostgreSQL to store the command log, event log, and our
    materialized view for queries. Each of these will be a separate schema, and then
    we can create read-and-write roles for that schema that different aspects of our
    code can use when accessing the database. Schemas aren’t strictly required to
    do this, but they assist with maintenance as privileges can be granted at the
    schema level, alleviating the need to explicitly enumerate each object within
    the schema.


    The second benefit is allowing the reuse of table names. Database object names
    only need to be unique *within a schema*. Think of the contents of a schema as
    an interface. A schema that’s acting as an event log will have certain objects
    inside of it. If another event log is desired, a new schema can be created with
    the same contents. The application code can be entirely reused; the only change
    needed would be to change the `search_path` runtime parameter of the connection
    to include the desired schema name.


    I find this to be even *more* powerful when combined with the materialization
    engine. Imagine a scenario where a new version of the application needs to make
    a backward-incompatible change to the tables used to satisfy reads from the system
    (if it’s possible to be backward compatible, always prefer that). The read model
    can be rebuilt into a new schema with new application code using a new schema
    inside of the database. If the application code needs to be rolled back, it is
    straightforward as the model used by the prior version still exists in the prior
    schema. The new model can be materialized in the background, with the older code
    serving reads from the older model until the new code has materialized the new
    schema. At that point, the old code is taken out of service and the new code serves
    read requests.


    ### Append-Only Log


    Using PostgreSQL for an append-only log is straightforward; it’s a table! The
    append-only feature can be achieved by using PostgreSQL’s authorization system
    and denying the ability to update or remove rows. The other features we want from
    an append-only log, ACID transactions and the ability to query some or all the
    rows, are already features of PostgreSQL.


    PostgreSQL is a feature-rich database system. I believe it is an excellent starting
    point for most projects and will be sufficient for the lifetime of many more.
    In this section, I’ve explained my reasoning for using it to satisfy all four
    of the required technologies for our system. In the next section, I’ll move “up
    the stack” so-to-speak and discuss my choice for the application layer where our
    business logic will live.


    ## Java and the JVM


    The Java Virtual Machine (JVM) has proven to be an extremely capable runtime platform
    for business applications. It has a mature ecosystem of tools for packaging software,
    debugging, and performance monitoring. There is also a vibrant community of open
    source development with libraries and frameworks available to assist with many
    of the tasks you may encounter.


    While other languages are available for the JVM, I’ve found the Java language
    to be my preferred choice. The language designers take a pragmatic approach to
    adding new features, preferring to think deeply about how they interact with an
    understanding that code written against them will be in service for many years.
    I believe this deliberate pace of changes is one reason why alternate languages
    have sprouted up, such as Groovy, Scala, and Kotlin. While each of these may offer
    a short- or medium-term productivity boost, I do not think they are the best choices
    for software systems that may have a lifetime of a decade or more.


    Comparisons between Java and COBOL have been made, with a meme of *Java is the
    new COBOL*. While the two languages are very different, the role of the *de-facto
    enterprise language* has shifted from COBOL to Java.


    Java also has a strong commitment to backward compatibility. Code compiled and
    written for earlier versions of the language continues to compile and execute
    on newer versions of the JVM (modulo the code’s authors using public APIs). I
    believe this is very important for business applications as this helps minimize
    the required maintenance for systems.


    No programming language is perfect (although I suspect some proponents of LISP
    would argue that it is). Java is a pragmatic choice. If you are more comfortable
    with another language or runtime, implement this system using that. I do implore
    you to consider the expected lifetime of your work, realizing that it will likely
    be longer than you think if it ends up being successful. Are you setting at best,
    your future self, or at worst, someone new entirely, up for a migration off an
    abandoned language or runtime? It is this line of thinking that keeps me on Java
    and the JVM. It has a proven track record of being used for over two decades.


    ## GraphQL-Java


    GraphQL has a robust specification. It defines the language, type system, how
    validation is performed, and the execution model to use. The level of detail that
    it contains is beneficial for users of the technology as it allows producers and
    consumers to understand expected behavior.


    The flip side of having this level of detail in the specification is that it is
    not amenable to one-off implementations. Thankfully, there are open source implementations
    of the specifications in many languages. In 2015 Andreas Marek started the GraphQL-Java
    project and it has become the leading implementation for Java. It is a focused
    library that mirrors the focus of the GraphQL specification. The library manages
    *only* execution of GraphQL documents, leaving the concern of how the code communicates
    with other systems up to users. This combined with the codebase’s focus on minimizing
    additional third-party dependencies make it a sound choice to build upon.


    There is also a synergistic implementation decision within the library. Recall
    our self-imposed constraint of wanting to be real time and achieving that using
    GraphQL’s subscriptions. GraphQL-Java’s implementation of subscriptions uses the
    Reactive Streams, [`www.reactive-streams.org`](http://www.reactive-streams.org),
    specification. Reactive Streams is an effort to provide a standard for asynchronous
    stream processing in the vein of the Reactive Manifesto and the type of reactive
    systems that we are constructing. GraphQL-Java has a dependency on an API, not
    an implementation. In the next section, I will be explaining Reactive Streams
    in more depth.'
  raw: '### Schemas


    PostgreSQL provides a layer of organization within a database in the form of schemas
    . Database objects such as tables, types, and functions always exist in a schema.
    If you’ve used PostgreSQL before, you may have seen references to `public`, the
    default schema that all databases have, and the one that tables as other objects
    will be created in by default. There’s a runtime parameter named `search_path`
    that controls which schemas to search for objects in. By default, it includes
    `public` which is why you can write `SELECT * FROM my_table` rather than `SELECT
    * FROM public.my_table`.


    The first benefit from schemas is for authorization. Since we will be using PostgreSQL
    for multiple functions, we can use schemas to organize objects and grant access.
    Our system will be using PostgreSQL to store the command log, event log, and our
    materialized view for queries. Each of these will be a separate schema, and then
    we can create read-and-write roles for that schema that different aspects of our
    code can use when accessing the database. Schemas aren’t strictly required to
    do this, but they assist with maintenance as privileges can be granted at the
    schema level, alleviating the need to explicitly enumerate each object within
    the schema.


    The second benefit is allowing the reuse of table names. Database object names
    only need to be unique *within a schema*. Think of the contents of a schema as
    an interface. A schema that’s acting as an event log will have certain objects
    inside of it. If another event log is desired, a new schema can be created with
    the same contents. The application code can be entirely reused, the only change
    needed would be to change the `search_path` runtime parameter of the connection
    to include the desired schema name.


    I find this to be even *more* powerful when combined with the materialization
    engine. Imagine a scenario where a new version of the application needs to make
    a backward-incompatible change to the tables used to satisfy reads from the system
    (if it’s possible to be backward compatible, always prefer that). The read model
    can be rebuilt into a new schema with new application code using a new schema
    inside of the database. If the application code needs to be rolled back, it is
    straightforward as the model used by the prior version still exists in the prior
    schema. The new model can be materialized in the background, with the older code
    serving reads from the older model until the new code has materialized the new
    schema. At that point, the old code is taken out of service and the new code serves
    read requests.


    ### Append-Only Log


    Using PostgreSQL for an append-only log is straightforward; it’s a table! The
    append-only feature can be achieved by using PostgreSQL’s authorization system
    and denying the ability to update or remove rows. The other features we want from
    an append-only log, ACID transactions and the ability to query some or all the
    rows are already features of PostgreSQL.


    PostgreSQL is a feature-rich database system . I believe it is an excellent starting
    point for most projects and will be sufficient for the lifetime of many more.
    In this section, I’ve explained my reasoning for using it to satisfy all four
    of the required technologies for our system. In the next section, I’ll move “up
    to the stack” so-to-speak and discuss my choice for the application layer where
    our business logic will live.


    ## Java and the JVM


    The Java Virtual Machine (JVM) has proven to be an extremely capable runtime platform
    for business applications. It has a mature ecosystem of tools for packaging software,
    debugging, and performance monitoring. There is also a vibrant community of open
    source development with libraries and frameworks available to assist with many
    of the tasks you may encounter.


    While other languages are available for the JVM , I’ve found the Java language
    to be my preferred choice. The language designers take a pragmatic approach to
    adding new features, preferring to think deeply around how they interact with
    an understanding that code written against them will be in service for many years.
    I believe this deliberate pace to changes is one reason why alternate languages
    have sprouted up, such as Groovy, Scala, and Kotlin. While each of these may offer
    a short- or medium-term productivity boost, I do not think they are the best choices
    for software systems that may have a lifetime of a decade or more.


    Comparisons between Java and COBOL have been made, with a meme of *Java is the
    new COBOL*. While the two languages are very different, the role of the *de-facto
    enterprise language* has shifted from COBOL to Java.


    Java also has a strong commitment to backward compatibility. Code compiled and
    written for earlier versions of the language continues to compile and execute
    on newer versions of the JVM (modulo the code’s authors using public APIs). I
    believe this is very important for business applications as this helps minimize
    the required maintenance for systems.


    No programming language is perfect (although I suspect some proponents of LISP
    would argue that it is). Java is a pragmatic choice. If you are more comfortable
    with another language or runtime, implement this system using that. I do implore
    you to consider the expected lifetime of your work, realizing that it will likely
    be longer than you think if it ends up being successful. Are you setting at best,
    your future self, or at worst, someone new entirely, up for a migration off an
    abandoned language or runtime? It is this line of thinking that keeps me on Java
    and the JVM . It has a proven track record of being used for over two decades.


    ## GraphQL-Java


    GraphQL has a robust specification. It defines the language, type system, how
    validation is performed, and the execution model to use. The level of detail that
    it contains is beneficial for users of the technology as it allows producers and
    consumers to understand expected behavior.


    The flip side of having this level of detail in the specification is that it is
    not amenable to one-off implementations. Thankfully, there are open source implementations
    of the specifications in many languages. In 2015 Andreas Marek started the GraphQL-Java
    project and it has become the leading implementation for Java. It is a focused
    library that mirrors the focus of the GraphQL specification. The library manages
    *only* execution of GraphQL documents, leaving the concern of how the code communicates
    with other systems up to users. This combined with the codebase’s focus on minimizing
    additional third-party dependencies make it a sound choice to build upon.


    There is also a synergistic implementation decision within the library. Recall
    our self-imposed constraint of wanting to be real time and achieving that using
    GraphQL’s subscriptions. GraphQL-Java’s implementation of subscriptions uses the
    Reactive Streams, [`www.reactive-streams.org`](http://www.reactive-streams.org)
    , specification. Reactive Streams is an effort to provide a standard for asynchronous
    stream processing in the vein of the Reactive Manifesto and the type of reactive
    systems that we are constructing. GraphQL-Java has a dependency on an API, not
    an implementation. In the next section, I will be explaining Reactive Streams
    in more depth.'
  trans: '

    ### 模式（Schemas）


    PostgreSQL 通过模式（schemas）在数据库内部提供了一层组织架构。表、类型和函数等数据库对象始终存在于某个模式中。如果你之前使用过 PostgreSQL，可能见过对
    `public` 的引用，这是所有数据库都有的默认模式，也是表和其他对象默认被创建的位置。有一个名为 `search_path` 的运行时参数，用于控制搜索对象时要查找哪些模式。默认情况下，它包含
    `public`，这就是为什么你可以直接写 `SELECT * FROM my_table` 而不是 `SELECT * FROM public.my_table`。


    模式的首要好处在于授权。由于我们将使用 PostgreSQL 实现多种功能，我们可以利用模式来组织对象并授予访问权限。我们的系统将使用 PostgreSQL
    来存储命令日志、事件日志以及用于查询的物化视图。这些将各自作为一个独立的模式，然后我们可以为这些模式创建读写角色，代码的不同部分在访问数据库时可以使用这些角色。严格来说，模式并非实现此功能的必要条件，但它们有助于维护，因为可以在模式级别授予权限，从而无需显式枚举模式内的每个对象。


    模式的第二个好处是允许表名重用。数据库对象名只需在*一个模式内*保持唯一。将模式的内容视为一个接口。一个充当事件日志的模式内部会包含某些对象。如果需要另一个事件日志，可以创建一个包含相同内容的新模式。应用程序代码可以完全重用，唯一需要做的更改是修改连接的
    `search_path` 运行时参数，使其包含所需的模式名称。


    我发现当与物化引擎结合使用时，这一点甚至*更*加强大。设想一个场景：应用程序的新版本需要对用于满足系统读取请求的表进行不向后兼容的更改（如果可能做到向后兼容，应始终优先选择）。读取模型可以在一个新模式中重建，使用新的应用程序代码和数据库内部的新模式。如果需要回滚应用程序代码，操作也很直接，因为先前版本使用的模型仍然存在于先前的模式中。新模型可以在后台物化，旧代码从旧模型提供读取服务，直到新代码完成新模式的物化。此时，旧代码退出服务，新代码开始处理读取请求。


    ### 仅追加日志（Append-Only Log）


    使用 PostgreSQL 实现仅追加日志非常直接：它就是一个表！仅追加特性可以通过使用 PostgreSQL 的授权系统并拒绝更新或删除行的能力来实现。我们期望从仅追加日志中获得的其他特性——ACID
    事务以及查询部分或全部行的能力——已经是 PostgreSQL 的特性。


    PostgreSQL 是一个功能丰富的数据库系统。我相信它是大多数项目的绝佳起点，并且对于更多项目的整个生命周期来说也足够使用。在本节中，我解释了我为何选择使用它来满足我们系统所需的全部四项技术。在下一节中，我将“向上移动技术栈”，讨论我对承载我们业务逻辑的应用层的选择。


    ## Java 与 JVM


    Java 虚拟机（JVM）已被证明是一个极其强大的业务应用运行时平台。它拥有成熟的工具生态系统，用于软件打包、调试和性能监控。同时，还有一个充满活力的开源社区，提供各种库和框架，可协助处理你可能遇到的许多任务。


    虽然 JVM 上还有其他语言可用，但我发现 Java 语言是我的首选。语言设计者在添加新特性时采取务实的态度，倾向于深入思考这些特性如何相互作用，并理解基于它们编写的代码将服务多年。我相信这种审慎的变更节奏是
    Groovy、Scala 和 Kotlin 等其他语言兴起的原因之一。虽然这些语言中的每一种都可能带来短期或中期的生产力提升，但我认为它们并非那些生命周期可能长达十年或更久的软件系统的最佳选择。


    人们常将 Java 与 COBOL 进行比较，甚至有一种说法是 *Java 是新的 COBOL*。尽管这两种语言截然不同，但*事实上的企业级语言*的角色已经从
    COBOL 转移到了 Java。


    Java 还非常注重向后兼容性。为早期语言版本编写和编译的代码，可以在新版本的 JVM 上继续编译和执行（前提是代码作者使用了公共 API）。我相信这对业务应用非常重要，因为这有助于最大限度地减少系统所需的维护工作。


    没有哪种编程语言是完美的（尽管我怀疑一些 LISP 的支持者会对此提出异议）。Java 是一个务实的选择。如果你对其他语言或运行时更熟悉，那就用那种语言来实现这个系统。但我恳请你考虑一下你工作的预期寿命，要意识到如果它最终成功，其寿命很可能会比你想象的要长。你是在为未来的自己，或者最坏情况下，为一个完全陌生的人，设置一个从废弃语言或运行时迁移的难题吗？正是这种思路让我坚持使用
    Java 和 JVM。它拥有超过二十年成功应用的可靠记录。


    ## GraphQL-Java


    GraphQL 拥有一个健壮的规范。它定义了语言、类型系统、验证方式以及要使用的执行模型。规范中包含的详细程度对技术的使用者非常有益，因为它允许生产者和消费者理解预期的行为。


    规范中拥有如此详细程度的另一面是，它不适合一次性实现。值得庆幸的是，有许多语言都有该规范的开源实现。2015 年，Andreas Marek 启动了 GraphQL-Java
    项目，它已成为 Java 领域领先的实现。这是一个专注的库，反映了 GraphQL 规范的专注点。该库*仅*管理 GraphQL 文档的执行，将代码如何与其他系统通信的问题留给用户处理。这一点，加上代码库专注于最小化额外的第三方依赖，使其成为构建系统的可靠选择。


    该库内部还有一个协同的实现决策。回想一下我们自我施加的约束：希望实现实时性，并通过使用 GraphQL 的订阅来实现。GraphQL-Java 的订阅实现使用了响应式流（Reactive
    Streams）规范，即 [`www.reactive-streams.org`](http://www.reactive-streams.org)。响应式流是一项努力，旨在为异步流处理提供一个标准，其理念源于响应式宣言以及我们正在构建的这类响应式系统。GraphQL-Java
    依赖于一个 API，而非一个具体实现。在下一节中，我将更深入地解释响应式流。

    '
- fmt: '# Spring Boot


    The Spring Framework has been a part of the Java ecosystem since 2002. At the
    time, it was a simpler alternative to the Enterprise JavaBean programming model
    that was promoted by Sun Microsystems, the creator and steward of Java at the
    time. Spring has adapted to changes in how Java applications have been architected
    and packaged. Prior to the rise of microservice architectures in the end of the
    2000s, developers packaged their code and deployed it into running application
    servers such as Apache Tomcat, JBoss, or IBM’s WebSphere (to name a few). These
    were multi-tenant systems often managed by central teams. Contemporaneous with
    the rise of microservices was the advent of DevOps, a practice where developers
    were responsible for the full lifecycle of their systems, including operations.
    DevOps is very related to the Agile and CI/CD practices mentioned in the second
    chapter of this book.


    In the early 2010s, Spring Boot was created. It inverted the relationship that
    the Spring Framework had with application servers. Instead of deploying code into
    an application server, the necessary portions of an application server (often
    only the HTTP server) were embedded inside of a Spring Boot application, putting
    control of the process lifecycle into the hands of developers. Over the past decade,
    Spring Boot has become the primary way that the Spring Framework is consumed.
    It has easy-to-use patterns to enable developers to rapidly assemble and maintain
    applications.


    Like Java and the JVM, the Spring maintainers value backward compatibility and
    strive to maintain this within major releases. My perspective is that Spring is
    curating a set of well-thought-out abstractions. By building against these abstractions,
    our code is shielded from changes in implementation details. I value this as a
    practice in my own work, as I believe it is an important part of building systems
    that are amenable to change which is one of the guiding principles of the system
    that this book describes. Spring does evolve faster than Java, and there is a
    corresponding faster pace of deprecations in some areas as abstractions are refined.
    The guiding principles in this book again help here. By ensuring that our system
    is modular, testable, and amenable to change, the process of adapting to changes
    in the framework that the system is built upon has parallels to the process of
    adapting to changes from the business. The principles behind Spring Boot are aligned
    with ours, and I have found it to be an excellent starting point for my work.


    # Project Reactor


    I discussed the four properties from the Reactive Manifesto and how they can be
    composed to create reactive systems in Chapters [3](#511062_1_En_3_Chapter.xhtml)
    and [4](#511062_1_En_4_Chapter.xhtml). These ideas begat a set of abstractions
    for use by implementors in the form of Reactive Streams. Recall from Chapter [3](#511062_1_En_3_Chapter.xhtml)
    that I said that being message driven is the most important property from the
    manifest. It is this property that the specification enables. Streams are composed
    of discrete messages, and the specification formalizes low-level interaction patterns
    by introducing the concepts of a `Publisher` and a `Subscriber`. In Chapter [3](#511062_1_En_3_Chapter.xhtml),
    I also discussed how the manifesto’s properties are composable. I view the Reactive
    Streams specification as the smallest unit in a composition hierarchy, allowing
    systems that are built around this specification to exhibit these properties through-and-through.


    Reactive Streams are sometimes misconstrued. The usage of the reactive programming
    model is sometimes believed to be only for the benefit of systems that operate
    under high load and want to use asynchronous message passing to reduce the total
    number of threads with the goal of optimizing utilization of the available hardware.
    While this is certainly a reason to use Reactive Streams, this is not the rationale
    for our business applications. We are valuing the composition of the message passing
    paradigm across all layers of the system. Effective usage of compute resources
    is a beneficial side effect and not the primary goal. I am valuing building a
    fully reactive system and minimizing impedance mismatches that can arise from
    mismatched paradigms.


    The Reactive Streams specification is at a lower level than we will want for usage
    with our application’s design. Thankfully, we do not need to implement the specification
    ourselves. Project Reactor is an implementation of the specification in Java and
    is also the implementation used by the Spring Framework and integrated into Spring
    Boot. Reactor provides many stream operations such as `map` and `filter`, allowing
    us to focus on writing code that uses Reactive Streams without needing to implement
    stream processing primitives.


    Project Reactor provides implementations of a Reactive Streams `Publisher` that
    is enhanced with static methods to initiate streams and instance methods to apply
    stream operations. Because the `Publisher` specification defines it as a stream
    of unspecified length, Reactor splits its API surface into two categories. Streams
    that are known to be at most a single element are represented as a `Mono` with
    all others being represented as a `Flux`. This is beneficial because the `Mono`
    type is analogous to the `CompletableFuture` API that is part of the Java standard
    library and Reactor provides methods to interoperate between the two.


    In Chapter [3](#511062_1_En_3_Chapter.xhtml), I introduced a pipe metaphor for
    data flows. Project Reactor is the implementation of those pipes. Reactive Streams
    defines how segments of the pipes interact. It formalizes the semantics for publishing
    and subscribing, cancellation, and flow control.


    The ability to think in data flows is what drew me to Reactive Streams and Project
    Reactor. It is very important to note that the abstraction has a leak around the
    threading model. As of the writing of this book, the JVM maps threads directly
    onto operating system threads. Care should be taken to limit the number of JVM
    threads that are executing in parallel, as having this number exceed the underlying
    hardware’s capabilities will result in a degraded experience. Thinking in data
    flows *should* allow developers to not worry about these implementation details,
    and in the general case that is true. You need to be aware of code that may be
    executing blocking operations, such as performing I/O, as that can cause stalls.
    There is active work to add virtual threads to the JVM as a part of Project Loom.
    When completed, virtual threads will allow the JVM to efficiently manage very
    large numbers of threads and fix this leaky abstraction. Some feel that this will
    negate the need for libraries such as Project Reactor, but I disagree. Data flow
    programming via Reactive Streams and Project Reactor, as I am describing here,
    will continue to be valuable irrespective of the underlying implementation. This
    work in the JVM should *increase* adoption, as many of the complaints leveled
    against the current implementations will be solvable.


    I am mentioning this important detail as there is a very popular blocking API
    that is widely used with business applications, the Java Database Connectivity
    API (JDBC). In realizing the value of extending the Reactive Streams paradigm
    through to the database, a new API was created, the Reactive Relational Database
    Connectivity (R2DBC) API.'
