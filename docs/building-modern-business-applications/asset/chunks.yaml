    ## 衡量重要性


    作为工程师，我们通常根据应用程序的使用方式来衡量其重要性。一个被频繁使用和/或管理大量数据的应用程序是重要的。在提及应用程序的“规模”时，这两个维度常常被混为一谈。规模越大，重要性就越高。然而，这或许并非业务视角。相反，业务视角更关注的是应用程序对业务持续运营和成功的关键性。


    就本书而言，我所指的数据量最佳点是我喜欢称之为“中等规模数据”（这是对本世纪初席卷科技界的“大数据”术语的一种戏仿）。中等规模数据可以容纳在单台服务器的存储容量中，尽管为了弹性可能会使用多台服务器。这些数据也可能完全驻留在内存中，随着系统容量的增加和存储系统性质的改变，这种情况越来越普遍。请以吉字节而非太字节为单位来思考。


    由于我们的业务应用面向最终用户，其访问频率将处于人类可感知的速度水平。用户数量将是决定总请求数量的驱动因素，请求量可能以每分钟而非每秒为单位来衡量。这对我们如何观察系统行为有影响：请求越稀疏，使用指标来监控其行为就越棘手。系统是宕机了，还是正处于用户空闲期？这一点将在第
    12 章中探讨。


    对业务至关重要的应用程序必须在业务需要时可供使用。很可能存在某些时间段，应用程序不可用将对业务造成灾难性影响。应用程序的唯一目的可能就是在这些关键时期协助用户，因为通过应用程序实现的业务流程形式化有助于确保流程按预期执行。


    ## “现代”


    “现代”这个形容词最终会让任何使用它的东西过时。使用这个标签，我们无疑是在宣称我们的技术比其他的更新颖。在过去的二十年里，计算能力取得了突飞猛进的发展。这并不是说旧的技术就失效了。相反，计算和存储能力的提升使得新技术变得可行。那些可能只停留在白板上的技术，现在能够投入生产使用了。


    这就是我们的“现代”，更类似于现代工具而非现代艺术。随着时间的推移，在你们的帮助下，它们将成为新的常态。未来肯定会有技术再次被冠以“现代”的标签，但这就是进步的循环。


    我在本书中描述和倡导的技术并非新颖。我要论证的是，使用它们不仅完全可行，而且这样做将产生更适合当下和未来的软件应用。


    “云计算”是一个引人入胜的趋势，它既让开发者与物理机器解耦，又可能要求对机器有更强的机械同理心，以此作为控制成本的手段。配置计算资源比以往任何时候都更容易，而对所用资源的疏忽可能会颠覆企业的价值主张。


    我将在第 4 章中具体讨论这一点。我将描述的技术开启了这样一种可能性：即使不立即付诸行动，也能更紧密地根据当时的需求来管理所消耗的资源。类似于我解释如何使应用程序逻辑易于变更一样，同样的原则也适用于运营所需的资源。


    ## 总结


    本书所指的业务应用可以描述如下：


    *   针对特定领域定制

    *   定制化工作，由员工开发者或顾问执行

    *   员工必须使用

    *   多用户

    *   数据录入和决策支持是核心功能

    *   业务的事实来源

    *   价值来源于工作流和决策分析自动化

    *   中等规模数据

    *   关键性源于对业务的重要性


    “现代”是相对于当前的开发实践而言的，我将在下一章讨论这一点。


    脚注 1   2   3   4


    # 2. 现状（及其成因）


    既然我们已经确立了业务应用的定义，接下来我将讨论我对现状的看法以及现状是如何形成的。这基于我过去二十年（从 20 世纪 90 年代中期到 2021 年的今天）对行业的观察。


    在本章中，我将描述我在职业生涯中观察到的实践，以及我认为它们可以如何改进。这将是一个以 Java 虚拟机（JVM）为中心的视角，因为我的大部分职业生涯都投入于此。根据你职业生涯所处的阶段，这可能也适用于你，或者可能适用。让我们开始吧！


    ## 业务应用架构


    尽管业务应用架构在过去 20 年中发生了变化，但它们在很大程度上也保持不变。作为开发者，我们的系统重复着相同的基本交互模式，只不过是用当下的技术来实现。理解过去对于把握未来的机遇至关重要。

    '
- fmt: '### The Status Quo


    A “modern” business application likely presents itself as a web-based user interface.
    If it is recent enough it may be a single-page application, one where data is
    loaded in the background, and the page itself is dynamically rewritten. This is
    usually only window dressing. If you look closer, the page is probably firing
    off HTTP requests to a backend, passing JSON payloads back and forth. HTTP verbs
    will be used to coarsely describe the intended action, `GET` for retrieval, `DELETE`
    for removal, `PUT` to create, and `POST` to update. Perhaps there is some thought
    to the URL schema, such as a version number, but probably not. It’ll be a flat
    namespace of endpoints, like a bunch of functions in an unorganized namespace.


    If you ask the developers what type of API they’ve created, they’ll call it a
    “REST API,” even though it’s far from it. Slinging underspecified JSON back and
    forth with HTTP verbs isn’t exactly what Roy Fielding described when he coined
    the term. I like to describe these APIs as “colloquial REST.”


    There are many frameworks, such as Rails, Django, and Spring, that assist with
    the mechanics of exposing the HTTP request to developers, such that a developer
    only needs to specify the URL, HTTP method, and the shape of the payload.


    Once received, the request will undergo the appropriate validations and then an
    object-relational mapping (ORM) framework will be used to ultimately store or
    retrieve data from a relational database. The ORM framework is probably Hibernate,
    as it has garnered the lion’s share of attention since its debut in 2001.


    Relational databases are the workhorses of business applications, and for good
    reasons. The quality of software layers that exist between the database and the
    user means nothing if the database isn’t capable of reliably storing and retrieving
    data. Relational databases have a well-specified and standardized mechanism for
    interacting with them, the Structured Query Language, SQL. As difficult as it
    may be to introduce any new technology into a business, it is even more difficult
    to introduce a new primary data storage system. As our business applications are
    important to the business, this leads to risk aversion around the choice of data
    store. This is why the choice of data store is *not* something I’m proposing innovating
    upon. I’ve been using PostgreSQL for a large part of my career, and it has always
    worked, and continues to be improved. It is why I’m advocating for using PostgreSQL
    as part of this book. If you have a different preferred database, continue to
    use that. You have hard-won operational knowledge that is worth retaining.


    The schema used in the database is probably mostly reasonable, depending on the
    nature of the changes the business has asked upon the software over its lifetime,
    as well as the number of developers that have worked on it. One thing that is
    very likely to be true is that the application mutates data in place. As data
    changes, what it used to be is gone. Sometimes, there’s an explicit business requirement
    for an “undelete” operation or tracking changes to specific fields. As this requires
    extra development work, it is usually omitted unless explicitly called out.


    As a pithy summary, a “modern” business backend in Java is underspecified JSON
    exchanged via a colloquial REST API that mutates data in place in a relational
    database via Hibernate.


    ### Green Screen


    The first business applications I was exposed to were “green screen” applications.
    The term was a throwback to terminals that were connected to a central computer
    with multiple displays and keyboards (terminals), rather than networking computers.
    The terminals were often green CRT screens (thus the name) and had limited functionality.
    They could display text from the central computer, relay input back, and perhaps
    printing functionality. If you’ve configured a terminal in Linux, you may have
    seen references to these devices in potential values for the `TERM` environment
    variable such as `vt100`.


    As personal computers became common, hardware terminal emulators were replaced
    by software terminal emulators running under Windows, the common desktop operating
    system at the time. This is where I was exposed to them, applications that the
    business depended upon that were more important than the lifecycle of the hardware
    that they were originally developed for. Hardware terminals had been replaced
    with desktop software, and central computers with a local area network.


    Some of these systems are still in active use. They are written in languages that
    are now considered legacy, such as COBOL or RPG. Rewriting these systems in another
    language is a large effort and introduces risk to the business. Being an economic
    decision, the business risk due to errors in a migrated system is mitigated by
    continuing to use the old system and managing the risk of staffing the teams that
    maintain them. If you squint your eyes hard enough, you can view the manner in
    which these systems render output in a terminal as a baroque text-based protocol.
    There are products that take this approach and allow the creation of web-based
    user interfaces for them.


    I am mentioning these applications as they are true “thin client” architectures.
    The client devices, terminals, could do little more than input and output. There
    were no facilities to run logic “client side” on terminals.


    ### Rich Client


    Popularized by Microsoft Access and Visual Basic (VB), a Rich Client is an application
    that is installed on a user’s machine and connects to a central application over
    a local area network. In many situations, the central application was a relational
    database. Local area networks hadn’t yet standardized on TCP/IP, and creating
    custom protocols wasn’t a straightforward task. A sufficiently complex system
    may have used CORBA, a technology for performing method calls across languages
    and machines. The simplest way to create a multiuser application was to rely on
    a database server’s wire protocol and use it as the server portion of an application.


    Access and VB provided a visual experience for building user interfaces. This
    allowed those with little traditional programming experience to build simple applications
    to store and retrieve data. Microsoft provided a robust set of built-in UI widgets
    along with third-party vendors that sold widgets with additional functionality.
    Building multiuser business applications was straightforward, and the results
    behaved similarly to other desktop software. Being a discrete application on a
    user’s machine also meant being able to directly interact with other tools, such
    as Excel or Word.


    However, there was a big catch for developers, distributing their software. Applications
    weren’t a single file to install. Shared libraries needed to be copied to particular
    locations on machines. If there were conflicts, the results could be extremely
    difficult to debug. The term “DLL hell” was coined to refer to this pain.


    Rich clients offered users an excellent experience. This came at the cost of operational
    difficulties. The best user experience is worth nothing if the software won’t
    run on your machine.


    The Model-View-Controller (MVC) architectural pattern was an insight on how to
    segregate responsibilities in graphical user interfaces. Access and VB didn’t
    offer strict adherence to this pattern. The relational database could be considered
    the model, and each display window (a form in their parlance) was similar to a
    combined view and controller.'
