- fmt: '# Using Example Tests


    In the prior section, I described how I constrain property-based tests to generate
    inputs and actions that are expected to succeed, the happy path. These tests validate
    the state changes from mutations as visible from GraphQL queries and subscriptions.


    Callers of our system won’t stick to the happy path. The system will certainly
    receive inputs that will violate the system’s business rules. When that inevitably
    occurs, the reasons for violation should be communicated so the caller is able
    to determine their next course of action.


    This is where I find value in example tests. Example tests can be used to ensure
    that the system rejects invalid inputs or actions. The validation that example
    tests perform should not only include the fact that a mutation was rejected, but
    also the returned information about *why* it failed. For callers to determine
    their next course of action, the reason for failure needs to be clearly communicated
    to them. Assertions within example tests should ensure that error messages are
    sufficiently descriptive.


    Example tests are also useful early in the life of the system. When the very first
    mutation is being added, and its results are being checked against the view, using
    an example test for this is the most straightforward approach to validate this
    work. Even for a multistep workflow such as the invoice approval example, writing
    it out as an example test initially helps me get early feedback on the implementation.
    Once I have the example working, I will either start or enhance the property-based
    test of the system.


    When a test expectation fails, you will need to understand why. It could be the
    inputs are invalid, or there is a logic error within the system. Encountering
    logic errors early in the development process is preferred, but not always possible.
    Once the system is running in a deployed environment, debugging won’t be as straightforward
    as during development. Often, I will aim to recreate the scenario that is causing
    an error as an example test. To effectively do so, I may need to know some of
    the internal states of the system.


    # Observability


    Observability is a term from control theory that describes the measure of how
    well the internal states of a system can be inferred from the system’s outputs.
    The more accurate the inference, the more observable the system.


    For software developers, I consider this to be the ability to infer the internal
    state of a system by observing the requests and responses the system has received
    and returned, log output, and system metrics such as memory consumed or CPU usage.


    Requests, responses, logs, and metrics are all correlatable. In the simplest case,
    time can be used. This starts to become more difficult when there are concurrent
    requests to a system, additional metadata needs to be included on every log statement
    to indicate what request it corresponds to. System metrics are aggregations, there’s
    no breakdown of exactly how much memory or CPU a given request may be consuming.


    A solution to this is tracing. You may have heard of tracing in the context of
    distributed tracing, tracking how requests flow within a distributed system. In
    the commonly used nomenclature, a single request is a *trace*. A trace is composed
    of a unique ID and multiple spans, a container for tracking a duration. Each span
    has a start time and a duration, a *timespan*. Spans are organized into a tree,
    so it is possible to visualize dependencies. If service A calls service B as a
    part of handling a request, there will be a span representing the call to service
    B that would be a descendant of the span that represents the call to service A.


    As a metaphor, tracing is akin to delivery tracking. Consider a package that a
    friend sends you via the postal system. Your friend receives a tracking number
    when they drop off the package. This is akin to a trace’s unique ID. As the package
    is handled by the various facilities on its journey to you, there will be timestamped
    entries for each. Ultimately, the package arrives on your doorstep.


    Tracing provides the model to achieve this type of visibility in computer systems,
    and we can apply it to the internals of our system. The tracing model is extremely
    useful, even if it is not a part of a larger distributed system. Each request
    into our system is at least one span that represents the external view of the
    request, including the duration. Each of the key components in our system is a
    discrete step. The tracing model allows for the creation of a span to represent
    the work performed in each, as well as the linking of them together. For a mutation,
    the trace would contain a span for the entire request, and then have descendants
    representing the command generator, command processor, and event materializer.
    Even though the caller will receive a result after the command processor has completed,
    the work of the event materializer should be a part of the trace since it is related.


    Callers will have knowledge of a trace’s unique ID. When using distributed tracing,
    there are mechanisms for propagating this contextual information with requests,
    or if the system is using tracing in isolation, the value can be returned as part
    of the response. If the request resulted in an error or was unexpectedly slow,
    the trace can be interrogated to gain additional insight. This contributes to
    the system being observable, as the trace is another output of the system. We
    can use the trace to build a more complete mental model of the system’s internal
    state. The envelope pattern I mentioned in Chapter [10](#511062_1_En_10_Chapter.xhtml)
    with the command generator can also be used to track the trace associated with
    the envelope’s contents.'
