  trans: '

    在实现系统组件时，请考虑在何处添加额外的跨度（span）来捕获有价值的工作片段。编写代码时应**大胆**添加跨度。我将其视为在封墙前为在建建筑铺设电缆——在建造初期完成这项工作，比后期改造既简单又经济高效。


    链路追踪已实现商品化，针对您所选语言已有现成解决方案可供构建。一个常见功能是能够为每个跨度添加任意键值对（通常称为标签）。我同样鼓励您在此处**大胆**添加，尽可能多地附上当时可用的上下文信息。未来什么信息有用，很难提前预判。


    您可以将链路数据发送给供应商，以便对其执行分析。每个跨度相当于一个计时器，因为它包含开始时间和持续时间。通过用链路对代码进行埋点，就无需单独捕获计时信息作为指标。链路追踪也更强大。指标是预聚合的，因此围绕一段代码的计时器最多只能记录其观测持续时间的直方图。如果查看计时器值时发现一个缓慢的异常值，您无法将其追溯到具体的慢请求。而使用链路作为输入，可以通过聚合链路的跨度来推导出计时器。如果观察到缓慢的异常值，可以查询输入链路来精确了解异常值在做什么。这也是预先添加标签变得有价值的地方，因为工具还可以将标签作为额外的查询维度。


    链路已成为我观察已部署系统的首选方法。如果出现与意外行为相关的支持请求，并且我获得了与该交互相关的链路 ID，我就能准确了解输入是什么以及系统如何响应。


    CPU 和内存使用率等指标确实有其用武之地。描述系统及其主机环境整体行为的系统级指标很有价值，仍应收集。了解系统的聚合行为是有益的，但并非所有必要数据都能从链路中构建。


    链路在基于属性的测试中也很有用。每个任意选择的动作都可以启动一个新的链路，使得变异执行和用于验证的任何查询都能表示为各自的跨度。如果您能自信地使用链路调试测试失败，那么在系统部署后，您将更有信心使用链路诊断行为。使用链路调试测试失败也是早期了解领域中有价值的上下文标签的机会。


    虽然链路提供了监控系统的机制，但我更倾向于将其称为可观测性工具，用于理解系统正在做什么。监控是一项独立的活动，可以使用链路来实现其他目标。


    ## 监控生产系统


    我认为监控是确保系统按预期运行的行为。监控通常会伴随某种形式的告警，因为系统运维人员（也就是您）希望在系统出现异常时得到通知。


    本书描述的系统适合通过单一进程来确保整体健康。我发现这很有益，因为有时系统会有多个监控进程生成告警。当系统有大量告警时，误报的可能性会增加，或者当出现问题时您会收到大量告警，需要您判断哪个指向真正的问题。


    对于业务应用程序，理想的监控机制是执行与系统调用者相同的操作。不幸的是，对于业务应用程序，让监控系统更改系统数据是业务方不希望看到的。


    我们的系统可以采用另一种方法。我们最终想知道的是命令是否正在处理、事件是否正在物化、查询是否正在被响应。这可以通过使用不影响系统业务信息的变更来实现。可以添加一个变更来递增计数器。计数器将生成一个命令，处理该命令将产生一个事件。事件物化器将物化该事件，更新视图中存储的值。可以使用
    GraphQL 查询和/或订阅来观察更新后的值。


    如果此过程及时完成，那么对系统的其他变更和查询也应该能完成（如果没有逻辑错误）。此过程完成的时间也是系统响应能力的健康指标。如果时间开始变慢，可以生成告警，作为潜在性能问题的早期预警。


    这种类型的流程称为**合成监控**，因为我们正在模拟用户可能采取的操作。我们利用所有变更都流经同一流程这一事实，无需更改任何业务信息，同时确信这些流程能够处理任何更改业务信息的实际请求。


    我发现合成监控与基于属性的测试配合得非常好。基于属性的测试确保系统内的逻辑按预期运行。合成监控则验证数据是否流经系统的“隐喻管道”。这再次使用了测试事件物化器时的相同范式：将基础设施测试与业务逻辑分离。如果基础设施本身可以得到验证，那么就有信心它能为依赖该基础设施的任何业务逻辑正常工作。


    当系统监控器触发告警时，首要行动将是利用您可用的工具来诊断系统，例如可以查询链路或查看系统指标的系统。

    '
- fmt: '# Practice Using Tools


    Writing tests is beneficial to ensure that your system will do what it is expected
    to do. Monitoring is beneficial to ensure that the system is operational and responding
    to requests. When the monitor eventually triggers an alert, or a caller reports
    an error that they’ve received, you will need to rely on your tools to diagnose
    the problem.


    Learning to use the tools you have available to diagnose problems *while trying
    to diagnose a problem* is an exercise in frustration, not to mention either lengthening
    the diagnosis time or an inability to find the problem.


    Ideally, you will know how to use the tools and interpret their data. This must
    be learned, and it should be done explicitly.


    In my current role, we run a weekly rotation of whose turn it is to be the first
    responder for problems in the system. Often, there may not be any problems during
    the week, leading to a very straightforward hand-off process. If there have been
    problems, there will be a discussion to share the learned context with the individual
    taking responsibility.


    To learn our tools and how to interpret their data, the individual who was responsible
    the prior week would walk the team through our tools to understand how to use
    them. This solves multiple goals.


    Firstly, it creates what I call an *ambient understanding* of the system’s behavior.
    By looking at the system’s high-level metrics such as `CPU` or memory usage, you
    will build an understanding of what normal for your system looks like. Perhaps
    there is a repeating pattern of `CPU` usage day-over-day. You may learn that a
    small spike at a given time isn’t out of the ordinary. Then, when triaging a problem
    in the system, you then know that the same small spike is unlikely to be a factor
    in the problem as it is a regular occurrence. If you hadn’t built this ambient
    understanding of normal, you may end up spending time investigating something
    that turned out to be a red herring.


    Secondly, it is an opportunity to dig into potential red herrings! Using the same
    small `CPU` spike example, the first time it is observed, dig in to understand
    why! Do the same type of diagnosis that would be done when triaging an actual
    problem, but without the pressure that real problems bring. This is where you
    and your team will learn how to use the tools to answer questions about the system.
    Perhaps the `CPU` spike is correlated with a latency spike. You can then look
    at the traces to see what requests the system was receiving. If the traces aren’t
    providing sufficient data, you have an opportunity to enhance the captured data.


    Learning how to use your tools in the middle of an incident will be frustrating.
    Realizing that your system isn’t emitting sufficient information for you to understand
    its behavior will delay your ability to diagnose problems. In order to provide
    a resilient system, it is important for its operators, you, to learn how to operate
    it. Practice is required, and practice is best done in a controlled environment,
    not during the more stressful environment of an incident.


    Testing will help minimize incidents, but it is impossible to eliminate the unexpected.


    ## Summary


    While individual components of the system can be tested in isolation, and there
    is value in doing so, there is also value in testing the composed system. You
    have learned about property-based testing and how to apply it to our system. You
    have also learned that there is a place for example tests, especially early on
    in development and to test the system’s error messages. I explained the value
    of using traces to understand the system’s internal behavior and how synthetic
    monitoring can be used to check that the system is operating as expected when
    deployed. Finally, I explained a valuable practice, to practice investigating
    the system to build an ambient understanding of its behavior and to ensure that
    it is emitting sufficient information to diagnose problems. The next chapter will
    review our system against our goals and look forward to what technologies are
    needed for an implementation.


    Footnotes [1](#511062_1_En_12_Chapter.xhtml#Fn1_source)


    # Required Technologies


    This chapter is the culmination of my proposed design for business applications.
    It begins with a brief review of the system’s design and then a recap of our constraints
    and principles, discussing how they have been incorporated.


    With the full set of goals fresh in your mind, I will then go over the types of
    technologies that will be needed to implement the design. This will remain high
    level, speaking to the desired capabilities, rather than specific implementations.


    At the end of this chapter, you will understand how the proposed design meets
    the goals and the types of building blocks you will need in order to craft an
    implementation. Let’s dive in.'
