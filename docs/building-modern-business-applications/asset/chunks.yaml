  trans: '

    ## 多命令处理器


    本书所描述的系统中的一个关键简化之处在于，它只使用了一个命令处理器。但这不应被理解为整个业务系统只有一个命令处理器。在第一章 1 介绍本书对业务应用的定义时，这些应用既是领域特定的（相对于业务运营的领域而言），也是针对组织内特定部门的。部门本身也是领域，例如会计、销售或客户支持。


    尽管事件溯源的基本范式已经使用了数千年，但它在软件系统中的广泛应用仍处于起步阶段。在研究事件溯源时，你可能会看到建议限制事件日志中事件数量的推荐。虽然这是一个基于他人经验的良好建议，但它也增加了复杂性。使用单一命令处理器和事件日志是一种有意为之的设计简化。命令处理器为执行业务规则而维护的状态，类似于开发者可能熟悉的在关系型数据库中维护的状态。执行规则维护的代码可以完全访问系统的所有数据。这最大限度地减少了从原地修改数据到命令处理器方法之间的概念差异。


    在最初构思时，我就将集成多个命令处理器视为一种未来的可能性。我认为，根据你的目标，可以有多种思考方式。


    可以存在一个单一的命令日志和一个单一的命令处理器。然而，事件可以被标记上一个可用作分区键的值。这将允许事件日志的消费者限制他们接收的事件。如果你的系统瓶颈与事件消费有关，这可能是一种可行的方法。


    单一命令处理器是系统所能支持的写入吞吐量的瓶颈。如果变更请求是突发性的，那么根据处理积压任务所需的时间，单一命令处理器可能仍然足够。如果允许队列堆积会违反系统的响应性目标，或者变更速率会阻止单一命令处理器赶上进度，那么可以创建多个命令处理器。


    如果使用了多个命令处理器，它们很可能会被串联起来。考虑一个管理客户的系统。除了维护新客户的数据外，还可以向系统添加新客户。该系统的业务规则对客户唯一性有一个约束。每个客户都有一个唯一的税号，添加一个税号已被其他客户使用的客户应该失败。所有其他业务规则都限定在单个客户范围内。为了使用本书的组件来强制执行这个唯一性约束，新客户的添加和税号的修改需要由一个命令处理器（即全局规则维护器）来维护。然后，每个客户可以拥有自己的命令处理器，用于维护客户特定的信息。


    系统将需要使用来自全局规则维护器事件日志的事件来确定已知客户的集合，并管理客户特定的命令处理引擎。传入的变更请求将被分发到相应的命令日志。我提到的串联与新客户的创建如何实现有关。全局规则维护器负责已知客户集合及其税号。公开的创建客户变更请求允许指定税号以及其他客户元数据。来自全局规则维护器的事件日志只包含与客户集合相关的事件；所有客户详细信息都应存在于每个客户各自的事件日志中。为了确保这一点，命令生成器需要向全局规则维护器提交一个命令并等待响应，然后再向客户特定的命令日志提交另一个命令。


    这增加了系统内部的复杂性。但这种复杂性也可以隐藏在系统公开的接口中。这种更改可以在系统生命周期的后期进行，无需系统调用方进行更改，也无需对第 12 章 [#511062_1_En_12_Chapter.xhtml]
    中组合系统的测试进行任何修改。


    转向多个命令处理器的另一个原因可能是为了解决启动速度问题。命令处理器在内存中维护执行业务规则所需的状态。这意味着每当系统启动时，所有事件都需要从存储中重放。多个命令处理器允许并行化这项工作，但还有另一种方法：在应用程序启动之间缓存此状态。

    '
- fmt: '# Command Processor State Caching


    The command processor maintains the state necessary to enforce business rules,
    the rules for data at rest. Although this state is a subset of what is contained
    in the event log, as described in Chapter [9](#511062_1_En_9_Chapter.xhtml), the
    command processor reads the entire event log when starting to rebuild this state
    using your provided applicator function.


    This is beneficial because it allows you to change the behavior of the applicator,
    if, as an example, you need to start tracking additional data from existing events
    to enforce new business rules.


    As your system is in production, and the event log continues to grow, the time
    required to rebuild this state will increase. Eventually, it may increase to a
    point where this duration is undesirable for your use-case. This is an excellent
    metric to track in your implementation, how this duration changes over time. You
    can use the rate of duration increased combined with a projected rate of growth
    of the event log to forecast how long this may take into the future. This will
    allow you time to appropriately prioritize any changes.


    The prior section described how multiple command processors may be introduced,
    which may be a solution for your domain. Not all domains are amenable to partitioning
    the problem space in a way that would limit the growth of an individual event
    log over time. In some cases, the pragmatic, or as I like to sometimes say, the
    least-worst, solution may be to cache the command processor''s state.


    I am explicitly using the word *cache* rather than *snapshot*. Snapshot can carry
    the connotation that the information is durably persistent and may be considered
    an alternate source of truth. That is **not** the case here. Storing the command
    processor''s state across application runs is a performance optimization only.
    The cached state can be thrown away at any time and the system will continue to
    perform as expected, only with an increase in the time it takes to restart a command
    processor.


    When caching the command processor''s state, it should be done after durably writing
    events to the event log. If storing the state fails, it should not be fatal to
    the system. When a command processor starts, rather than starting from the beginning
    of the event log, using the applicator to reduce each event into a new state instance,
    it will first load the cached state, and use the last event that it had incorporated
    to determine where to start consuming from the event log. It would be feasible
    to only persist the cached state at a time-based interval, as consuming a small
    number of events at startup should not present a problem.


    It is important to have the ability to version the cached state. If the applicator
    function changes between versions of your code, the existing cached state should
    not be used so that the state can be rebuilt using the newer applicator implementation.
    You will need to weigh whether this should be an explicit, developer-driven version,
    or implicit, using metadata about the code to create stable version numbers.


    Caching can also be used in concert with multiple command processors to improve
    the start time of an individual processor.


    A risk to be aware of is the failure mode of being in a position where you have
    cached state that is unusable, and a command processor that does not start in
    a sufficient amount of time. A command processor''s startup time should be tracked.
    If it is projected to reach a point where the startup time is untenable, work
    should be done to improve the system in ways where losing the cached state won''t
    cause problems. In many scenarios, I anticipate that to be the addition of multiple
    command processors to partition the event log into multiple, smaller, event logs.
    Using multiple event logs also removes some complexity for materializing events
    in parallel.


    # Parallel Event Materialization


    The event materializer consumes from the event log in order to maintain a stateful
    view model that will be used to satisfy GraphQL requests or maintain additional
    stateful models for other purposes. It can mux multiple message logs together,
    the event log from a command processing engine being one, materializing the merged
    set an event at a time.


    For callers of the system to observe changes from their mutations, they need to
    wait for the event materializer to have materialized the events from their command.
    If this duration is too long, either directly from the amount of work being performed,
    or indirectly from other callers issuing their own mutations, something will need
    to be done to reduce this duration.


    An approach that may be used is to allow the event materializer to materialize
    multiple events in parallel. Again, owing to the system''s design flexibility,
    there are multiple paths to achieve this.


    If you wish to keep the change wholly located inside of this component, you can
    use the internal knowledge of the work performed by an event''s materialization
    function to construct ad-hoc partitions. These partitions would be constructed
    such that the event materializer would first place incoming events into a partition,
    and then have multiple component-local processes that consume from the partitions
    in parallel. An advantage to this approach is that the partitions are wholly ephemeral.
    The partitioning strategy can be changed as needed without any impact to persisted
    data. A downside to this approach is that checkpointing becomes more complicated.
    The current position in a message log can no longer be stored as a single value,
    the last materialized sequence number. Instead, checkpointing will need to maintain
    the set of materialized sequence numbers. Under ideal circumstances it should
    converge upon maintaining a single value per message log. An implementation will
    need to handle tracking the non-linear progress through a message log.


    Alternatively, parallelization of the event materializer can leverage multiple
    command processors. All the approaches described in the earlier section share
    the same implementation. Multiple command processors are also not strictly required;
    from the event materializer''s perspective, there is no material difference between
    multiple event logs and representing other sources of data as a message log for
    materialization. The primary, and perhaps only, difference will be the creation
    of the event materializer itself. Other sources of data are likely to be known
    at development time, and an implementation may statically configure the event
    materializer with the set of message logs to consume from. If multiple command
    processors are in use, the events from your service will then be spread across
    multiple event logs. If the number of command processors is dynamic, the event
    materializer will also need to be able to support dynamically discovering new
    event logs to materialize at runtime.


    Checkpointing itself does not get more complex, as tracking progress across multiple
    message logs was a feature in the original design. This change may impact callers
    though. Recall that a successful mutation returns a single value, `visibleAsOfRevision`,
    representing the sequence number of the final event when processing the mutation''s
    command.'
