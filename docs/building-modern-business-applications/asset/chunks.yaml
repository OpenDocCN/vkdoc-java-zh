    There’s a small set of provided scalar types: strings, integers, floats, booleans,
    and object identifiers (IDs). It is also possible to define custom scalar types,
    as the provided primitives are insufficient for most models. Custom scalars are
    generally used for value types that are easily represented as single values, such
    as the various combinations of dates and times, URLs, and fixed-precision numbers.
    I also like to use custom scalars for value types specific to my model rather
    than relying on generic types such as String.


    There are no provided enums (enumerations). GraphQL’s enums are useful when modeling
    a value that must come from a fixed set. In contrast with the implementation of
    enums in some programming languages, GraphQL enums have no corresponding numerical
    value. Enum values aren’t proxies for anything, they are values in their own right.


    ### Objects


    The simplest node type in the model is an object. Objects are named and are composed
    of one or more fields. Object names come from the shared namespace, but field
    names are local to the object definition. Fields return scalars, enums, or objects.
    There are a few additional possibilities that the subsequent subsections discuss.


    A rough mental model is that an object is a bag of key and value pairs. That’s
    accurate, but also insufficient. Fields of an object can declare optional and
    required arguments, giving them behavior of functions. A more apt mental model
    is to view an object as a bag of named functions.


    Object fields can also specify a nullability constraint. The default is to allow
    any value to be nullable. While it may be tempting to use this to mirror existing
    constraints in your model, I recommend using it judiciously.


    The execution model of GraphQL uses nullability as part of its error handling;
    if an error occurs during execution, the response will be converted to null starting
    at the point of the error toward the root of the query, stopping at the first
    nullable field. Extensive use of non-null increases the “blast radius” of errors.
    Using non-null also limits future evolution of the schema, as converting a field
    from non-null to nullable is considered a breaking change to the schema.


    ### Lists


    Lists are an augmentation to object fields. Any of the return values for an object’s
    fields may be wrapped using a list construct, indicating that it will return potentially
    more than one value. A field’s cardinality is either zero or one, and using a
    list expands that from zero to infinity. A list’s values are homogenous.


    The nullability constraint interacts with lists in two ways. Entries in the list
    can be declared as non-null, and the list itself may be declared as non-null.
    The error handling of the execution model is especially pertinent here. I recommend
    declaring the list value as nullable, as this allows other list values to be returned
    if an error occurs during execution.


    ### Input Objects


    Input objects are the mechanism for providing structure to object field arguments.
    Arguments must be one of the “primitive” values, a scalar or enum, or they may
    be organized into input objects.


    An input object is a bag of key and value pairs. Input objects have fields, and
    the field values may be a scalar, enum, or another input object type. Values may
    be declared as a list, as well as being non-null.


    In this context, nullability is more useful, as it communicates to users of the
    schema what the required arguments are. I recommend appropriately marking items
    as non-null , as it is the act of going from nullable to non-null that is a breaking
    change for callers.'
