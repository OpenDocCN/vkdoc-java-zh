  trans: '

    ### 执行业务规则


    对静态数据执行业务规则存在失败的可能。当构建命令处理器状态时，事件会被反复应用于该状态。每次应用事件时，都需要确保下一个事件不会产生无效状态。在提供给命令处理器的两个函数中，应用器是确保所有生成状态均有效的合适位置。对于事件日志中的事件，此函数应始终成功执行。如果执行失败，则表明系统存在错误。可能是事件被篡改，也可能是业务规则已更改，导致旧事件不再满足新规则。


    如果业务规则未更改，但根据现有事件生成状态失败，则需要操作员介入。如果业务规则*确实*发生了更改，则需要恰当记录该变更。我之前在第 6 章讨论过这一点。业务规则的变更发生在某个时间点。有必要将该变更*作为事件*记录下来。这样，根据事件生成状态的函数就能利用这个业务规则变更事件来调整其行为。


    在处理新命令时，必须确保其生成的事件满足业务规则。为避免重复执行业务规则，在调用修改器函数后，命令处理器还会使用应用器来确保：当预期事件应用于当前状态时，能够成功创建新状态而不会失败。


    在实践中，我发现大多数命令失败最终都发生在确保它们能够生成有效状态的过程中。如果命令是请求进行某项更改，那么由该命令生成的事件就是实现该更改所需的计划步骤。只有当这些事件成功应用于状态后，该计划才能被视为成功。


    作为处理命令的一部分，将事件应用于状态是*前瞻性*的。新生成的状态会被丢弃，因为用于下一条命令的状态将来自事件日志。之所以可行，是因为该函数没有副作用。


    与处理失败密切相关的是最小化意外场景。最好的方法是通过全面测试来实现。


    ## 如何进行测试


    我发现命令处理器中的关注点分离非常有利于测试。处理器接收两个函数，以便处理特定的命令和事件类型。这使得测试可以拆分为两部分：命令处理器本身的测试，以及领域特定函数的测试。


    ### 测试命令处理器


    命令处理器本身的机制应使用一个简单的领域进行测试，例如数字加法。命令可以表示为整数，即当前状态应等于的数字。然后，修改器可以生成一个事件，该事件是另一个整数，即必须加到当前状态上才能使其等于命令值的整数。应用器则是一个加法运算。可以添加一个简单的业务规则，例如状态值必须始终为奇数。


    通过使用简单的领域，就可以对命令处理器进行压力测试，观察它在各种失败场景下的行为。由于其操作方式可以用流处理来表达，如果实现使用了具备必要原语的库，那么测试主要就是确保库被正确使用，并且其他协作组件按预期组合。


    ### 测试你的代码


    需要测试两个函数：应用器和修改器。每个函数都可以独立测试，无需命令处理器。这是要求它们为纯函数所带来的好处。它们执行所需的所有信息都作为参数提供。


    对于应用器，每个事件至少应有一个测试，以确保对于有效事件，状态能按预期更新。在实践中，每个事件可能需要进行少量测试，以覆盖该变更所影响的业务规则。值得注意的是，除了业务规则约束检查外，应用器的实现应基本不包含条件逻辑。应用器是将事件应用于状态。事件是回顾性的，描述已经发生的事情。条件判断应仅用于确保已发生的事情是有效的。如果你发现自己编写了与检查业务规则约束无关的条件逻辑，这暗示该逻辑应属于修改器函数。


    修改器是包含分支决策逻辑的函数。修改器的输入是命令和当前状态，它返回一组事件来描述如何随时间推移推进状态。命令使用状态中包含的信息来指导其行为并更改返回的事件集，这是完全合理的。与应用器类似，每个命令至少应有一个测试。实际测试数量将根据给定命令在修改器内的分支逻辑而变化。穷举覆盖给定命令的所有可能场景是可行的。测试还可以确保：当向应用器提供事件以及与提供给修改器相同的状态时，命令返回的事件能够通过应用器的验证。可以不使用命令处理器本身来完成此操作，并且推荐这样做，因为命令处理器最终只是编排修改器和应用器的执行。


    在命令处理器上下文中测试这些函数将在第 12 章中介绍。


    还有一种额外的测试类型可以执行，即针对生产数据的回归测试。严格来说，命令日志中的命令在处理后无需保留。然而，保留命令允许在测试中使用它们。可以使用更新版本的修改器重新处理命令，以确保生成相同的事件。这是一种强大的技术，用于确保对系统逻辑进行大规模重构后，系统仍具有完全相同的行为。


    ## 总结


    命令处理器位于我们系统的核心，负责执行一些最重要的业务规则，即针对静态数据的规则。我已经解释了其运行原理的本质以及运行所需的条件。你已学习了如何考虑测试该组件，以及如何结合它来测试你的命令和事件。下一章将以同样的方式介绍命令生成器，它负责创建命令处理器所操作的那些命令。


    # 10. 命令生成器


    命令生成器是连接面向外部的 GraphQL 变更的请求/响应交互与应用程序内部消息传递世界的桥梁。在本章中，我将讨论 GraphQL 变更如何与命令生成器交互，以及在设计命令和变更时如何在具体性和通用性之间取得平衡。我还将介绍如何构建命令，以使命令处理器的修改器函数成为纯函数，命令生成器如何失败以及如何补偿，最后是如何思考测试包含在这一层中的逻辑。让我们开始吧。


    ## 与 GraphQL 的交互


    命令生成器是使我们的 GraphQL 变更能够正常运行的逻辑组件。其行为可分解为以下三个步骤：


    1.  将 GraphQL 变更的输入参数转换为命令。


    2.  将命令追加到命令日志中。


    3.  等待命令处理完成，并将处理结果作为变更的返回值返回。

    '
- fmt: '### From Input Arguments into a Command


    A mutation represents a single transaction within our system. This follows from
    the behavior of the command processor, where it processes commands one at a time.
    The additional complexity of a “composite command” that could contain multiple
    commands has been intentionally omitted. Some aspects to this complexity include
    whether nesting of composite commands should be allowed, and a limit to the number
    of commands within a composite command. While this complexity may be warranted
    in some situations, I believe making discrete commands that match the needs of
    the system’s users is a simpler approach.


    A single GraphQL request to our system may invoke multiple mutations because GraphQL
    allows callers to request multiple fields in query and mutation requests. If callers
    make use of this feature, each one will be serially handled in the order they
    were specified in the request. The GraphQL specification does not permit asynchronous
    execution of mutations as it would be difficult to reason about the order in which
    changes were made. In practice, I have not seen this feature extensively used
    for mutations as it is semantically equivalent to multiple requests. The GraphQL
    specification has no opinion on how multiple mutations in a single request should
    potentially all succeed or fail. If a request invokes a single mutation, it is
    easier to reason about failure scenarios and manage on the caller side.


    In our system, a mutation will generate at most one command. As you map mutations
    to commands, you may find that a command is reused across multiple mutations.
    I find this to be a good thing, having generality in the implementation of the
    system while exposing a more specific interface. Arguments to the command may
    be implicit in the described behavior of the mutation.


    When designing your GraphQL schema, you should specify as many non-null constraints
    for the input as feasible given the modeling limitations with GraphQL. A limitation
    you may encounter is the lack of unions on input types. If you have an input object
    where you want callers to specify at most a single field of the type, there’s
    no language facility to indicate it in the schema. As of this writing, there is
    an open RFC to the GraphQL specification to add a `@oneOf` directive to input
    objects to support a limited form of polymorphism for input objects.


    The first step in creating a command is performing additional validations upon
    the input values that were inexpressible in the schema. This may include criteria
    such as number range restrictions, string length checks, and anything else that
    is required for a command to be considered “valid.” In your implementation, it
    is possible to create a custom directive to allow the specification of these constraints
    within your schema. This would allow your implementation to use these directives
    to drive validation as well as being descriptive in the schema.


    Conceptually, all validation required for a command to be “fully formed” are a
    part of this step. The validation in this step is structural only and akin to
    completing all fields on a form without consideration as to whether the values
    are semantically correct. Just as the caller completed all fields in the mutation’s
    arguments as part of its invocation, the command generator needs to create a complete
    command prior to appending it to the command log. After the command has been added
    to the log there will not be an opportunity for the system to adjust what the
    command implies.


    The GraphQL community generally recommends having mutations be as specific as
    possible. The key part of that advice is *as possible*. At one extreme is a schema
    with a single mutation that is intended to handle any scenario. I hope that this
    sounds at a minimum confusing, and ideally nonsensical. Such a schema would require
    extensive documentation on how to invoke it for specific scenarios. The intent
    of the community guidance is to try and have the schema itself be self-documenting
    for the mutation. In having specific mutations, the mutation name itself is an
    indicator of the operation it will perform.


    When creating GraphQL schema, I start with making all mutations as specific as
    possible and mirror that specificity in the generated commands. Then, as callers
    start to get a feel for how the schema fits into their workflows, there may be
    cases where the scope of some mutations will be increased.


    As an example, consider the following two mutations (ignore their return values
    for now):


    ```

    input CreateCustomerInput {

    name: String!

    }

    input UpdateCustomerRegionInput {

    customerId: ID!

    regionId: ID!

    }

    type Mutation {

    createCustomer(input: CreateCustomerInput!): Boolean

    updateCustomerRegion(input: UpdateCustomerRegionInput!): Boolean

    }

    ```


    In this hypothetical system, there are customers that exist in regions. Newly
    created customers have no associated region until one has been assigned. In practice,
    the user interface flow for creating a customer always calls `updateCustomerRegion`
    after creating a customer. Thus, it is reasonable to add an optional `regionId`
    to the `CreateCustomerInput` type allowing for a simpler interaction pattern for
    callers. It is this pragmatic use-case-driven generalization of mutations that
    I support. The goal of any generalization should be to solve an actual pain point
    for users of the schema. This should be balanced with the goal of specificity,
    to avoid coupling between callers and the implementation. Specific mutations theoretically
    allow callers to compose their flows as they see fit.'
