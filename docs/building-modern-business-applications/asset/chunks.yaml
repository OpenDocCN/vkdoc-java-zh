    and responsiveness.


    There is a critical control aspect here. By reifying internal communication in
    our system as messages, we gain control over them. Messages become discrete items
    that can be manipulated by our code. Message passing is one of the original ideas
    behind “object-oriented programming” (OOP) . Developers aren’t often aware of
    this, as it is often the encapsulation that objects provide that is more prominently
    featured.


    We want to reuse the ideas of encapsulation and message passing in our system.
    The components that exchange messages will be more coarse-grained than an object-oriented
    domain model. We will need to have facilities for message passing on top of what
    our implementation language provides. Not all languages allow for dynamic handling
    of messages between objects, Ruby and Objective-C being two notable ones that
    do. Even if we were using one of those languages to implement our system, we will
    want to have a mechanism on top of the language facilities to manipulate the message
    flow.'
  trans: '

    ### 为什么选择 GraphQL


    GraphQL 的地位与 SQL 类似。它定义了数据模型以及与之交互的方式，但其核心并未规定其他内容。其[规范](https://spec.graphql.org/June2018/)
    ^(¹¹) 侧重于如何定义模式以及为满足查询而应使用的执行模型。虽然有约定俗成的做法和库支持通过 HTTP 暴露服务，但规范底层的抽象性也允许采用其他传输方式。


    通过定义模式，并鼓励 GraphQL 用户从定义模式开始，GraphQL 服务实现了自文档化。GraphQL 要求客户端*精确*指定他们希望检索的数据，没有对类型字段进行通配的机制。这使得每个字段的使用情况都可被追踪。当与内置的弃用机制结合使用时，就具备了支持模式演进的必要元素。


    对于构建用户界面（这也是业务应用的目标之一），有许多工具可用于与 GraphQL 服务交互。在我撰写本书时，React 是创建 Web UI 的主流技术，其生态系统深受
    GraphQL 影响。即使趋势发生变化，GraphQL 仍然适用。


    ### 实现实时性


    我认为业务应用应具备与消费级应用相同的实时能力。我在第 2 章提到现状时曾提及这一点。`XMLHTTPRequest` 使得无需刷新页面即可加载数据，但它仍保留了请求/响应模式。还有两种额外的
    Web 技术允许将数据流式传输到浏览器：服务器发送事件（SSE），这是一种仅推送的机制；以及 WebSocket，它允许建立基于双向推送的通道。这两种技术现已广泛部署并可供使用。然而，有效使用它们需要一个架构上适合此类实时交互的系统。


    这是使用 GraphQL 的另一个原因。GraphQL 拥有第三种特殊类型，即 `Subscription` 类型。订阅字段返回一个值的*流*。当与 SSE
    或 WebSocket 等流式传输结合使用时，GraphQL 可以作为查询、变更和实时更新的单一解决方案。


    ## 原则


    在开始一个项目之前，我喜欢制定一套清晰可表述的开发原则。明确一套原则有助于为你的团队成员以及任何可能负责系统未来维护的人提供指导。作为原则，它们是努力追求的价值。与约束不同，它们是指导方针，而非硬性要求。我将首先列举这套原则，然后逐一讨论：


    *   永不遗忘


    *   消息驱动


    *   读写分离


    *   部分可用性


    *   设计灵活性


    *   模块化


    *   可测试性


    *   易于变更


    ### 永不遗忘


    这个措辞源自一家我成长时期存在的软盘公司——大象内存系统（Elephant Memory Systems）。他们的标志是一张大象的脸，下方写着“永不遗忘”。这是对谚语“大象永不遗忘”的致敬，这个说法一直留在我心中。


    正如我在上一章关于时间的讨论中所提到的，有一些技术可用于让系统保留先前状态。对于开发者来说，将所有代码变更记录在版本控制系统中是最佳实践。同样，对业务应用进行类似的架构设计也应当成为最佳实践。业务应用中包含的数据可能对业务成功至关重要，默认策略应该是追踪所有变更。


    “永不遗忘”更进一步，因为它不仅仅是记录新状态的简单机制，而是记录变更背后的意图，记住“是什么”和“为什么”。


    作为一项原则，我认为应该在项目开始时就将这一点纳入。除非在变更发生时就被捕获，否则这些信息将永远丢失。


    ### 消息驱动


    这一原则直接取自响应式宣言（Reactive Manifesto）。我在第三章介绍响应式系统时讨论了其基础。同样，这一原则最好在项目开始时就被遵循。为未设计此类通信方式的系统改造消息传递机制可能颇具挑战。通过从一开始就采用消息驱动，系统便具备了利用宣言中其他特性（弹性、韧性和响应性）的基础。


    这里有一个关键的控制方面。通过将系统中的内部通信具体化为消息，我们获得了对它们的控制权。消息成为可由代码操作的离散项。消息传递是“面向对象编程”（OOP）背后的原始思想之一。开发者通常并未意识到这一点，因为对象提供的封装特性往往更为突出。


    我们希望在我们的系统中复用封装和消息传递的思想。交换消息的组件将比面向对象的领域模型粒度更粗。我们需要在实现语言提供的基础之上，建立消息传递的设施。并非所有语言都允许在对象之间动态处理消息，Ruby
    和 Objective-C 是两个显著的例外。即使我们使用其中一种语言来实现系统，我们仍然希望在语言设施之上建立一种机制来操纵消息流。

    '
- fmt: '### Read/Write Separation


    The read-and-write access patterns for a system are often not symmetric. For young
    systems with a small user base, this generally poses no problems. Few users and
    a short lifespan mean the data volume and change rates will be lower.


    As a system matures, the data contained within often increases with its time in
    service. In our proposed system, this will be exacerbated as we will be storing
    prior states as well.


    Our business applications will be serving two purposes for the business, data
    entry and decision support. Data entry access patterns often require the ability
    to “read your writes.” A user that has made a change to the system is acutely
    aware of what the application should now show them, they expect reads to be consistent
    with the writes they have performed. Classically, this type of activity is known
    as Online Transaction Processing (`OLTP`).


    Decision support is different. Users of a system for this use-case are often not
    making changes to the data. They’re running reports and asking complex aggregation
    questions of the application. As they aren’t making changes, the users won’t notice
    if the data is slightly out of date. The questions that are being asked may also
    be completely tolerant to out-of-date data, as they’re always looking back a fixed
    period of time. Think of a daily report that’s run, as long as the data is up
    to date by the report’s execution time, the report’s requirements are met. This
    type of activity is known as Online Analytical Processing (`OLAP`).


    In larger businesses, `OLAP` activity is often performed across systems that departments
    or other subdivisions of the business use. A system’s data will be replicated
    to a central store that aggregates information from other systems.


    The users of your system may have some similar requirements, and I’ve found this
    to be a common request: in-app analytics and reporting.


    When using a relational database, a natural solution to this can be to add a read
    replica of the database and use it to satisfy these types of requests. However,
    a system that was not designed with that in mind may have challenges introducing
    another database host and using it appropriately.


    Thus, this principle is a means to side-step those future problems by addressing
    them early. If the system is designed with separate paths for reads and writes,
    the system is amenable to change in this dimension. An initial implementation
    may very well use a single database instance for everything. By introducing the
    logical separation earlier, if and when there’s a need for a physical separation,
    the changes to the system will be easier to make.


    ### Partial Availability


    Our business applications are important to the business, that’s why they’ve invested
    in them! They need to be available *when the business requires it*. Historically,
    prior to wider-spread Internet adoption, the usage of business software was often
    tied to business hours. While some domains have been operating around-the-clock
    for years, others have had the relative luxury of usage being tied to local business
    hours.


    Having a regular period of inactivity for a system creates a natural window to
    perform maintenance activities. With such opportunities, it’s possible to take
    a system completely offline to do the work. As applications start to have components
    that have outward-facing components such as user interfaces for the business’s
    customers, or an API integration with customer or vendor systems, taking an application
    completely out of service becomes harder and harder.


    As a principle, partial availability is the ability to take only a *portion* of
    the system down for maintenance or upgrades. It’s also the ability to only have
    a portion *fail*. This is a form of resiliency, one of the desired Reactive Manifesto
    properties.


    The granularity of what is partially available will depend upon your business
    domain, and the nature of the application. There are cross-cutting coarse facets,
    such as being available for reads, but not for writes. Domain-specific facets
    will require coordination with the business to under what the “blast radius” of
    failure modes may be.


    The more regular usage of partial availability will be around regular maintenance
    and system upgrades. The most valuable is when failure occurs. By implementing
    conceptual “bulkheads” in the system, only a portion of the system will fail.
    This can be valuable in reducing the pressure upon operators during remediation.
    Working on an outage of a critical system is always stressful. In adhering to
    this principle, the outage can be limited to only the affected subsystem, and
    thus only the users that depend upon that. This isn’t a panacea, but it can be
    invaluable in relieving pressure on those working on an outage.


    A succinct description of partial availability is being able to operate in a degraded
    state rather than a binary “up or down” status.


    ### Design Flexibility


    Flexibility in software is a squishy subject as there’s no well-defined description
    of what flexible software *is*. My definition of design flexibility is that any
    facet of the system’s design should have multiple options for implementation.
    In practice, I’ve found this to mean a consideration of what future paths the
    software may take, and to the extent possible, not *excluding* those possibilities.


    The future, especially in a software project, is notoriously hard to predict.
    In alignment with the Agile Manifesto, this is responding to change rather than
    following a fixed plan. Our approach is to respond to change, design flexibility
    is about keeping options open for the future.


    As a system matures there may be times where it is sensible to make decisions
    that would exclude certain future evolutionary paths. This is a culling of the
    design’s flexibility. At that point, a certain wisdom on the project will have
    accrued which can minimize the impact of these decisions. This isn’t a decision
    to make lightly, as reversing this type of decision can be costly. However, it
    can be the appropriate course of action in some situations.


    When starting new projects, and especially in their early years, there is value
    to keeping future possibilities open. That is the essence of this principle.'
