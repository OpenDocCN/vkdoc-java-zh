    XTDB as their vision^([^(21)](#fn21)) is aligned with mine, the use of immutability
    and persistent storage on disk being cheap.


    XTDB is state-centric, whereas this book’s system is change-centric. The event
    materializer is the bridge between those worlds, collapsing the event log’s changes
    into a stateful view. The stateful view it maintains can be stored within XTDB.
    By using XTDB as the datastore, the GraphQL schema can easily expose the change
    history of data within the system. It can also allow viewing the state of the
    datastore at any transaction and valid time combination. If users ever have questions
    about what the data in the system was at any point in the past, it can be answered.
    This can be especially powerful if your system powers any review-based workflows
    where users are primarily concerned with observing changes.'
  trans: '

    ## 外包分布式系统问题


    为了实现本书所描述的架构，我在第 13 章列举了几项必需的技术：仅追加日志、分布式锁、发布/订阅系统以及数据库。第 14 章接着描述了如何通过单一解决方案使用
    PostgreSQL 来满足这些需求。这正是我在工作中采用的方法，并且已被证明是成功的。


    然而，这并非唯一途径。分布式系统中存在一些横切需求，可以将其抽象出来并实现可复用。我曾用 Temporal^(²⁰) 对本书的设计进行过原型验证，这是一个开源平台，能够可靠地执行工作流。


    在 Temporal 的模型中，工作流类似于一个用命令式代码表达的状态机。Temporal 提供了一个软件开发工具包（SDK），帮助你确保工作流以确定性方式编写。工作流维护其自身的私有状态。任何与工作流外部状态交互的操作，例如查询数据库或发送电子邮件，都被称为活动。当工作流调用一个活动时，Temporal
    通过处理超时和重试来管理工作流的安全执行。工作流可以被视为*故障无感知*的，因为它无需关心活动失败的问题。这使得业务工作流能够被简洁地表达。


    所有工作流都有一个唯一标识符，你可以选择自行指定。对于给定的标识符，只能存在一个正在运行的工作流实例。这种行为使得 Temporal 工作流可以替代本书系统中分布式锁的用途。


    工作流之间有两种通信方式。工作流可以使用 Temporal 称为信号的概念向另一个工作流发送消息。当工作流接收到信号时，它可以修改其私有状态作为响应。信号的发送方不会收到任何响应。如果工作流需要从另一个工作流获取信息，它可以使用称为查询的概念来询问另一个工作流的状态。查询是只读的，不能修改工作流的状态。


    Temporal 提供的基本构建块——工作流、活动、信号和查询——足以实现本书系统的三个关键组件。命令生成器、命令处理器和事件物化器都可以表达为 Temporal
    工作流。


    Temporal 工作流可以永远运行。这使得它们非常适合同时运行命令处理器和事件物化器。Temporal 活动可用于实现从消息日志中读取、追加到事件日志以及更新有状态视图。对于命令处理器，由于应用器和转换器都是纯函数，因此在
    Temporal 工作流内部使用它们是安全的。Temporal 本身可以用作缓存命令处理器状态的一种手段。如果需要清除缓存，可以将工作流重置到任意时间点。


    对于命令生成器，每个变更的处理都可以是一个工作流。客户端请求标识符可以用作工作流标识符的一部分。GraphQL 层将为该变更启动一个工作流，并从请求中传入必要的信息。然后，它将等待工作流完成，以将处理结果返回给调用者。使用
    Temporal 将增加额外的容错能力，这超出了我在第 10 章中描述的范围。如果命令的创建需要与其他系统交互，这些交互可以实现为活动。


    Temporal 的内部实现与本书中的系统非常相似。工作流的状态存储为一系列事件。如果执行工作流的计算机中断，当 Temporal 重启工作流时，它会通过重放存储的事件来重建工作流的私有状态。Temporal
    使用事件溯源来管理工作流的状态。本书描述的系统则使用事件溯源来管理业务数据。


    Temporal 不是一个数据库。用它来存储用于满足 GraphQL 查询的有状态视图是不合适的。下一节将介绍一个具有独特能力的数据存储。


    ## 双时态物化视图


    本书中的系统使用事件日志作为应用程序状态的权威来源。事件日志中的每个事件都描述了一次变更。这些变更通过事件物化器用于维护系统数据的有状态视图。有状态视图的确切模式取决于你的系统所负责的数据。由于事件包含了随时间变化的所有变更，因此针对这一维度进行查询将非常有用。


    从两个维度来思考时间。首先，是数据库发生变更的时间。这可以是事件被追加到事件日志的时间戳，也可以是事件被事件物化器物化的时间戳。这个时间戳将被视为*事务时间*，即系统处理该事件的时间。第二个维度是*有效时间*。这个时间是一个*业务领域*概念。我在第
    2 章描述的状态是许多业务应用在原地修改数据。当在原地修改数据时，无法在保留修改事实的同时追溯性地对数据进行更正。事件溯源以及使用两个时间戳（即双时态）使得捕获这一点成为可能。通常，变更的有效时间等于事务时间；信息在记录时是真实的。有时，记录今天的信息，但该信息在过去某个时间点或未来某个时间点才是真实的，这也会很有用。


    一个能够按有效时间回答查询的数据库，或者一个能够提供存储实体变更历史的数据库，将是本书所描述系统的一个强大补充。XTDB 就是这样一个数据库。我被 XTDB
    吸引，是因为他们的愿景^(²¹)与我的不谋而合：使用不可变性，并且磁盘上的持久化存储成本低廉。


    XTDB 以状态为中心，而本书的系统以变更为中心。事件物化器是这两个世界之间的桥梁，它将事件日志中的变更折叠成一个有状态视图。它所维护的有状态视图可以存储在
    XTDB 中。通过使用 XTDB 作为数据存储，GraphQL 模式可以轻松地暴露系统内数据的变更历史。它还可以允许查看数据存储在任意事务时间和有效时间组合下的状态。如果用户对系统在过去任何时间点的数据状态有疑问，都可以得到解答。如果你的系统为任何主要关注观察变更的基于审查的工作流提供支持，这一点将尤其强大。

    '
- fmt: '# Conclusion


    I have enjoyed sharing the design contained within this book with you. I hope
    that my rationale, principles, and goals resonate with you. Although business
    applications have been around for decades, the future of software development
    is still very young. As I explained at the start of this chapter, I believe that
    durable software systems are designed around an amenability to change. Doing so
    requires intention, something that may not always be at the forefront of your
    mind when developing. The importance of solving problems today can obscure the
    value of being able to solve problems in the future. I believe business systems
    should take a longer-term view. When a business commissions custom software from
    developers such as yourself, whether as an employee or contractor, an investment
    is being made. It is prudent to maximize the return on that investment by building
    systems in a sustainable way.


    I believe the nature of what is sustainable is changing. Persistent storage used
    to be a scarce and expensive resource. This influenced how applications were built
    in order to balance the operational costs of a system against the value provided
    by using more storage. The tradeoffs that a developer would have made decades
    ago around storage are no longer applicable, but many still write software using
    those paradigms. Developers are working in new environments and with new capabilities.
    We need new ideas to go with them.


    A goal of mine is for the design described in this book to be durable through
    the next stage of computing evolution. I realize that I do not know what the future
    holds. I do know that the work done today needs to be adaptable for what is to
    come. This is why portions of this book may have felt somewhat abstract; the minimization
    of implementation details is my attempt at durability. In a way, it is a sort
    of design flexibility in the book itself. I hope that the intentional abstractness
    provides you with an opportunity to think about how the ideas will work in your
    environment. If this book provides you with inspiration to think differently and
    take your own path, I will see that as a success.


    May your work provide value to others and be in service long enough to be considered
    a legacy.'
