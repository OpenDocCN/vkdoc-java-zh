    Each GraphQL mutation *could* have a test created to ensure that it creates the
    expected command. In all honesty, I tend to not write these tests, allowing this
    sort of happy-path validation to occur as a part of the comprehensive system tests
    I will describe in Chapter [12](#511062_1_En_12_Chapter.xhtml). In most cases,
    the logic that is performed here will be a straightforward transformation from
    your mutation’s input arguments into your command.


    What is valuable to test here are the handling of invalid inputs, and any commands
    whose generation involves accessing external systems that could cause their own
    failures.


