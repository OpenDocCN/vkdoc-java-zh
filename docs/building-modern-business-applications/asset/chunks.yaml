- fmt: '# Tracking Changes


    In our status-quo architectures, there are two patterns to tracking changes that
    you may be familiar with. Each has varying levels of complexity.


    If tracking changes is primarily for use by those supporting the application,
    it may utilize a history table. Given a table to track customers:


    ```

    CREATE TABLE customers (

    customer_id   BIGINT PRIMARY KEY,

    customer_name TEXT

    );

    ```


    The following history table may be employed:


    ```

    CREATE TABLE customer_history (

    -- 0/1/2, indicating insert/update/delete

    revision_type      INT,

    revision_timestamp TIMESTAMP,

    customer_id        BIGINT,

    customer_name      TEXT

    );

    ```


    Here, `revision_type` is an enumeration indicating the type of change (insert,
    update or delete) and `revision_timestamp` is when the change was recorded. There
    will be a design decision of whether this is the row from `customers` before or
    after the change.


    If change tracking is an application feature, the complexity of conditionally
    querying a history table may be undesirable. Instead, all values over time may
    be captured in the same table:


    ```

    CREATE TABLE customers (

    valid_from    TIMESTAMP,

    valid_to      TIMESTAMP,

    customer_id   BIGINT,

    customer_name TEXT

    );

    ```


    In this example, `valid_from` and `valid_to` capture two points in time that indicate
    when the row was valid. This model can easily support point-in-time queries asking,
    “what was the customer’s name as of a specific time.” There is additional complexity
    at write time, as the new value needs to be inserted and the `valid_to` timestamp
    for the prior record needs to be adjusted. This model also breaks easily using
    `customer_id` as a primary key, as there will be multiple rows with the value.
    A more complex constraint is required, one that can ensure that there’s only a
    single value for a primary key at a given timestamp.


    There is an additional pitfall in each of these approaches. The database schema
    is *unified across time*. The only safe changes possible are the relaxing of constraints,
    making a `NON NULL` column allow `NULL`, or to add a new nullable column. Any
    other type of change either risks changing existing data or will require changing
    data.


    This presents a dilemma. Is the past not to be preserved as it was, or will the
    application need to adjust in other ways? Any solution will have drawbacks and
    will result in “tech debt.” This is a system that isn’t amenable to change.


    Even if one of the two prior, or perhaps an alternate, approach is taken, a problem
    still remains, capturing *why*.


    ## Why Did That Happen?


    By storing prior values, we can see what that past was. By comparing past states,
    we can see how values have changed. This is sufficient to answer *what*. However,
    I’ve found that the real question that users have is *why*.


    Data doesn’t change in a vacuum. There is a cause-and-effect interaction. The
    change tracking mechanisms I mentioned are only capturing the effect, the “what.”
    The data model itself isn’t set up to capture the cause, the “why.”


    The “why” may be inferable. If you know what operations were possible in the application
    at the time the change was made, you can use that knowledge to pattern match against
    the data to see if it was made with a given operation. This would be dependent
    upon having specific code paths for each change type, which may not be in place
    if the application is using the “colloquial REST” from Chapter [2](#511062_1_En_2_Chapter.xhtml).
    If the user interface interacts by sending a payload with updated state, that
    context will have been lost.


    I hope there is some familiarity with the nature of this problem. It is one that
    we, as developers, have encountered and solved for ourselves. We experience this
    with our source code and have solved it with version control (VCS). This is a
    best practice, for good reason. In its basic form, a VCS system tracks the changes
    to a codebase, the “what.” When a change is made, you have the option of providing
    a message, the “why.” There’s no requirement that a reasonable message is provided.
    I’ve worked with developers that have treated it like a bothersome gatekeeper,
    providing a token message to satisfy the requirement. I’ve impressed the notion
    that a good commit message *explains why* the change was made. The “what” is obvious,
    it is the change itself. While I may remember why tomorrow, I may not a year from
    now. I’ve described commit messages as “notes to my future self.” Even when working
    solo, I make them meaningful.


    If it is a best practice to track all changes to a system’s code, why isn’t it
    also a best practice to track all changes to a system’s data? I believe the answer
    is **it should be**. I believe that in the past this was infeasible. Tracking
    all changes to data will require an ever-increasing storage capacity. Today, the
    capacities of modern storage systems, especially combined with on-demand cloud-based
    storage, make this entirely practical. How may a system that stores changes be
    conceptualized?


    ## Events


    When we think about storing changes, they are events: an outcome or result from
    an operation that has happened in a system. With this view, every change is an
    event. By storing events, we can construct a canonical timeline of changes to
    a system. A time-ordered collection of events is a log, or ledger. This is how
    VCS systems operate conceptually, as they expose a history of changes to us.


    In a business application, an event should be the changes to the data as well
    as the *intent* of the change. This is capturing both *what* and *why*. A log
    of events is useful to describe the past, but it is inefficient to understand
    the present. Having to traverse an ever-growing event log to find pieces of data
    doesn’t scale. Instead, we can keep a running result of what all the events imply
    and use that to answer questions about the present. In a VCS, that’s your “checkout”
    of a repository onto a filesystem. The act of using events to construct a “state
    of the world” at a given point in time is *materialization*.


    This technique is known as *event sourcing*; storing changes to the system as
    events and constructing materializations of those events to answer questions.
    By representing changes as events, they become messages. This brings us back to
    the reactive manifesto; representing changes to a systems data as events allow
    the changes to be messages.


    We can also apply the same technique to a *request to change* the system’s data.


    ## Commands


    Commands and events are two sides to the same coin. Their difference lies in their
    relationship to the data in the system. A continuously updated materialization
    of all of a system’s events is the *current state* of the system.


    Events are backward looking. They describe what has happened. Commands are forward
    looking. They describe a *request to change* the system of the system. A key word
    is *request*. The desire to make a change doesn’t mean that it will be permitted.
    It may or may not be, depending upon the business rules for data at rest.


    This is a concept from a pattern known as Command Query Responsibility Segregation
    (CQRS). With that pattern, there is a model that state changes operate upon, and
    a separate model for querying. There is a natural complementation with event sourcing.
    Events can be materialized in multiple ways, one to service queries, and another
    for enforcing business rules for data at rest. I refer to the latter as *command
    processing*. It is the act of taking a command and determining if it is allowed,
    and if so, what events it implies.


    I want to point out that this *is not novel*. These ideas and patterns have been
    floating around and in practice for decades. I do believe that the *practicality*
    or *applicability* has changed in recent years. These are valuable practices for
    business applications, and are suitable for forward-looking, modern, architectures.'
