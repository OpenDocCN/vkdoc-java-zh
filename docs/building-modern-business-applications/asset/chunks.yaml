- fmt: '# Managing Failure


    Failure will happen, whether planned or not. The event materializer is maintaining
    a stateful view, which likely means an external system is managing the state keeping.
    This external system will not be available 100% of the time, as at a minimum it
    is likely to require software updates. Unexpected failures can always happen as
    well, such as a bug in the event materializer in handling a given event. It is
    necessary to explicitly plan for failure, rather than thinking of ourselves as
    perfect developers that won’t write bugs and thinking that unplanned failures
    are sufficiently unlikely. Our systems are important to the business, which is
    why we are writing them in the first place.


    If the stateful view store itself is unavailable, that impacts the ability to
    read from our system. However, notably, the system will continue to accept writes.
    The command processor is decoupled from the event materializer, and a failure
    in the event materializer doesn’t halt command processing. Depending upon the
    places where optimistic locking is used, writes may become effectively disabled
    though, as without a way to observe what the latest sequence number is, callers
    will be unable to read the value in order to provide it to mutations.


    The event materializer is sequentially consuming from the event log. If there
    is a failure in handling an event, the event materializer **must** stop. If the
    event materializer were to try and “skip” an event, its view will be inconsistent.
    However, the entire event materializer doesn’t need to stop. If the event materializer
    is processing multiple input partitions, a failure handling an event only needs
    to stop that partition, not the entire materializer (although you may find the
    policy of stopping the entire materializer easier to implement initially).


    This behavior is likely to be undesirable to some when it is explained. You may
    be encouraged to couple command processing and event materialization into a single
    unit of work that can either succeed or fail in unison. I caution against this,
    as I believe it is an attempt to bend the system’s architecture to one’s development
    practices. The risk that others will have in mind relates to programming errors,
    not view store failures, as this coupling doesn’t change behavior in the event
    of a view store failure. I believe that, and have found in practice, that testing
    can sufficiently mitigate this risk, the subject of the next section. There can
    still be gaps in tests, and my fallback is then development practices that are
    largely out of scope for this book. By having a fast build process and practicing
    continuous delivery, you should ideally be able to take changes you’ve made into
    production in a timely fashion. You can use the duration of these processes as
    the minimum amount of time it will take to get any code changes deployed. This
    is a starting point for conversations with your business partners to understand
    what the system’s availability objectives are, which can guide implementation
    decisions. When the event materializer fails to handle an event due to programming
    errors, it doesn’t impact the system’s ability to service read requests. The ability
    to have partial failures such as this is a form of resiliency.


    # Testing


    The event materializer is deterministic. Given an input event, it should perform
    the same action each time. This is should, not will, as there is the possibility
    that the action could vary: when the event materializer is consuming from multiple
    input partitions. Determinism remains, but the number of possible actions is a
    function of the number of partitions. In the simple case of having two partitions
    with events `A` and `B`, it is necessary to handle `A` then `B`, as well as `B`
    then `A`. This also depends upon your implementation though. The handling of `A`
    and `B` could be independent, with a common routine that is executed after `A`
    or `B` has been handled. In much of my work, the testing of how the event materializer
    handles an event isn’t performed as testing of the event materializer, it is performed
    as testing of the entire system. In order to test how the event materializer has
    handled an event, it will be necessary to query the stateful view. This is related
    to the testing of GraphQL queries and subscriptions against this view. I’ve found
    that testing the entire system is preferable, for reasons that I’ll explain in
    depth in the next chapter.


    The stateful view model is also an opportunity to check the results of the command
    processor. If the stateful view is stored in a system that allows for declarative
    constraints, such as a relational database, the capabilities of the store can
    be used. I have found it beneficial to cross-check both unique constraints as
    well as foreign key relationships. Should handling of an event violate a constraint,
    it will point to an error within the command processor, not the event materializer.
    This is an example of the type of error that should be caught within tests, as
    should this occur within a deployed system, the remediation would require the
    removal of the view constraint, and then handling the fix as a business rule change
    as described in Chapter [6](#511062_1_En_6_Chapter.xhtml).


    While testing the entire system makes sense for how the event materializer handles
    any given event, the event materializer itself can, and should, be tested in isolation.
    When testing the entire system, it is important to minimize the possibility that
    those tests fail due to errors in the event materializer itself. The isolated
    tests for the event materializer should be written against a set of events that
    are unrelated to your domain and ridiculously simple. I use simple domains, and
    like the command generator tests, often silly ones that personalize the tests,
    such as counting the number of times my cat has been fed.


    Testing the event materializer in isolation also makes the simulation of failures
    more straightforward. Tests can be written to simulate the failure of the stateful
    view store, as well as guards around soft handler failures such as failing to
    complete within a given timeframe.


    # Summary


    The event materializer maintains the stateful view model that is used to satisfy
    GraphQL queries and subscriptions. You have learned how this model can evolve
    over time, and how the evolution of the view model is akin to maintaining multiple
    purpose-built view models. I have explained how the view is best maintained transactionally,
    and how the command processor’s processed command log can be used to provide consistency
    of the view relative to a command. You have learned how to think about testing
    the event materializer, what testing is appropriate for the materializer itself,
    and what testing is best done on the entire system, the topic of the next chapter.


    # 12. Testing, Monitoring, and Observability


    The prior three chapters introduced our system’s key components: the Command Processor,
    Command Generator, and Event Materializer. Each of those chapters contained a
    section relating to how to test the component. The testing of each component in
    isolation builds confidence in the component itself. That doesn’t translate to
    confidence in the composed system. It is necessary to test all components working
    together, end-to-end. In this chapter, you will learn how I’ve approached testing
    to build this confidence. I discuss the value of being able to understand the
    internal state of the system from its outputs and how to instrument our system
    to achieve this. You will learn why it is necessary to consider how the system
    will be operated in production during the design phase. Let’s go.


    ## Key Components


    Before discussing how to test the system’s major components end-to-end, I wanted
    to refresh ourselves on the components and how they are tested in isolation.'
