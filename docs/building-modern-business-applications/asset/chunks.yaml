  trans: '

    ## 业务规则变更


    我曾将*可变更性*视为业务应用的重要属性。业务会发生变化，而软件适应变化的速度可能成为制约因素。


    事件流可被视为时间流。随着事件发生，时间流逝。事件不必局限于*数据*的变化，它们也可以代表*行为*的变更。


    以忠诚度计划为例，设想其在航空公司的应用场景。可能会出现某种情况（例如全球疫情），航空公司希望将所有积分的有效期延长一年。也就是说，如果你有在特定时间段内即将过期的积分，其有效期将延长一年。而在接下来一年中累积的任何积分，则应拥有两年的有效期窗口。应该如何对此建模？


    一种方法是使用*事件*来表示规则变更。当应用正在物化事件时，它会将规则变更事件作为标记来调整自身行为。通过将业务规则变更纳入事件日志，可以丰富事件日志作为事实来源的价值。


    这一想法的实现方式可以多种多样：事件可以非常具体，在物化过程中调用目标代码；如果该规则需要频繁调整（例如用于短期促销活动），事件也可以包含参数。


    通过*掌控时间*，我们有机会在应用内部实现更丰富的功能。它还能让我们更深入地回答“发生了什么”和“为什么发生”的问题，因为数据和规则都可以被检视。


    ## 总结


    我们涵盖了以下内容：


    *   随时间追踪数据变化

    *   什么是事件和命令

    *   事件发生时间与系统感知到事件发生时间之间的差异

    *   随时间管理业务规则变更


    第二部分到此结束。我讨论了响应式系统、业务规则和时间。我认为在提出业务应用设计方案之前，理解这些概念非常重要。下一部分将运用这些概念来构建设计方案，并最终实现落地。


    # 第三部分 设计


    # 7. 约束与原则


    设计时间到了！本书的前两部分是背景铺垫。我需要确保我们对业务应用有共同的理解，并了解当前常用的模式。随后，我通过响应式宣言介绍了响应式系统，并阐述了为何要将业务应用构建为响应式系统。最后，我描述了对业务规则的分类，以及时间为何是一个重要（且有时被低估）的维度。


    本书的这一部分将致力于我提出的业务应用设计方案。这一路径的第一步是引入一些对设计的自我约束，以及将指导架构的自主选择原则。让我们开始吧。


    ## 约束


    我想对设计施加两个约束，它们都围绕应用如何向用户界面呈现自身。我将简要提及它们，然后进行更详细的解释。


    第一个约束是支持并鼓励以支持数据实时更新的方式构建用户界面。第二个约束是使用 GraphQL 来驱动用户界面体验。


    ### 从 REST 到图


    我在第 2 章简要提到了 GraphQL，它值得全面描述。让我们退一步思考它的发展历程，以此解释为何我认为它是一项重要技术。


    可以将系统内部的数据视为一个巨大的图。URL 的层级路径部分被用作索引到这个概念图中的方式。这是构建数据 API 的基础。例如，端点 `/api/v3/customers`
    会列出所有客户。要访问特定客户，其键值会作为另一个路径段附加，如 `/api/v3/customers/42`。客户有多个地址，这些地址可以在 `/api/v3/customers/42/addresses`
    下列举。然后可以通过 `/api/v3/customers/42/addresses/67` 访问特定地址。


    这种对数据图的层级索引有两个缺点：


    1.  遍历需要多个请求。

    2.  没有直接的机制来指示每个请求中需要哪些数据。


    在我们业务应用的规模下，这些缺点通常不是障碍。然而，对于两家硅谷公司——Facebook 和 Netflix——来说，这些缺点足以促使它们同时开发替代方案。它们都基于使用路径层级和每个路径上的数据来形成系统数据的统一图这一理念。我将首先讨论
    Netflix 的解决方案。


    ### Falcor


    Netflix 开发了一项名为 Falcor 的技术。^(¹⁰) 它将统一数据图视为一个单一的 JSON 文档，并允许 JSON 的层级特性包含循环，从而对图进行建模。调用者随后提供一个“路径”（语法类似于但不完全等同于
    JSONPath），以指示要加载图的哪些部分。这使得用户界面能够*精确地*在单个请求中获取所需内容。Netflix 的模型是从返回 JSON 片段的层级路径的明显演进，因为它将所有内容整合到一个端点中，允许用户界面指定超出
    URL 路径范围、深入到 JSON 负载中的路径。


    ### GraphQL


    Facebook 采用了略有不同的方法，即 GraphQL。它也基于系统是一个巨大图的概念。GraphQL 有一个用于描述图的模式。图节点是对象类型，每种类型由字段组成。一个关键的区别在于，GraphQL
    中的字段可以接受参数。GraphQL 不应被视为纯数据图，而应被视为*函数*图。就像可以向 REST 端点传递查询参数一样，也可以对 GraphQL 类型的字段执行相同操作。


    与 Falcor 不同，GraphQL 并不强加图是单一概念 JSON 文档的观点。Falcor 使用文档抽象作为机制，为其基于路径的访问提供图的“根”，而
    GraphQL 在图中有一个特殊类型——`Query` 类型，其字段定义了图的入口点。


    函数图的抽象还允许 GraphQL 拥有数据修改的解决方案，这是它保留的另一种 REST 行为。修改（用其术语称为变更）是通过请求另一种特殊类型——`Mutation`
    类型的字段来执行的。


    尽管 Falcor 和 GraphQL 都在 2015 年相隔一个月内发布，但 GraphQL 取得了更大的成功。我认为这是因为它在替代 REST 风格访问模式方面提供了完整的解决方案。

    '
- fmt: '### Why GraphQL


    GraphQL sits in a position similar to that of SQL. It defines a data model and
    how to interact with it, but at its core doesn’t prescribe anything else. Its
    [specification](https://spec.graphql.org/June2018/) ^([^(11)](#fn11)) focuses
    on how a schema can be defined and the execution model that should be used in
    order to satisfy queries. There are conventions and libraries to enable exposing
    a service over HTTP, but the underlying abstractness of the specification would
    allow for alternate transports.


    In defining a schema, and by encouraging users of GraphQL to start with defining
    a schema, GraphQL services are self-documenting. GraphQL requires clients to specify
    *exactly* the data they wish to retrieve, there’s no facility for wildcarding
    the fields of a type. This allows the usage of each field to be tracked. When
    combined with the built-in deprecation facility, the necessary elements to allow
    for schema evolution are present.


    For building user interfaces, which is a goal of a business application, there
    are many tools available for interacting with GraphQL services. As of my writing
    of this book, React is the zeitgeist for creating web UIs, and its ecosystem is
    heavily influenced by GraphQL. Should trends change, GraphQL would still be appropriate.


    ### Being Real-Time


    I believe that business applications should have the same real-time capabilities
    as consumer applications. I touched on this in Chapter [2](#511062_1_En_2_Chapter.xhtml)
    when mentioning the status quo. `XMLHTTPRequest` made it possible to load data
    without a page refresh, but it retains the request/response paradigm. There are
    two additional web technologies that allow for data to be streamed to the browser,
    Server Sent Events (SSE), which is a push-only mechanism, and WebSockets, which
    allows for a bidirectional push-based channel. These two technologies are now
    widely deployed and available for use. However, effective use requires a system
    whose architecture is amenable for this type of real-time interaction.


    This is another reason to use GraphQL. GraphQL has a third special type, the `Subscription`
    type. A Subscription field returns a *stream* of values. When combined with a
    streaming transport such as SSE or WebSockets, GraphQL can act as a single solution
    for queries, mutations, and real-time updates.


    ## Principles


    Before embarking upon a project, I like to have an articulable set of principles
    that development will follow. In stating a set of principles, it helps provide
    guidance to your teammates and whoever may be responsible for future maintenance
    of the system. As principles, they are values that will be strived for. Unlike
    constraints, they are guidance, rather than a requirement. I will first enumerate
    the set, and then discuss each in turn:


    * Never Forget

    * Message Driven

    * Read/Write Separation

    * Partial Availability

    * Design Flexibility

    * Modularity

    * Testability

    * Amenability to Change


    ### Never Forget


    The phrasing of this is from a floppy disk company that was around when I was
    growing up, Elephant Memory Systems. Their logo was an elephant’s face and underneath
    it said, “Never Forgets.” This was a homage to the idiom “an elephant never forgets”,
    and that phrasing has stuck with me.


    As I discussed in the last chapter around time, there are techniques that can
    be used to have a system retain prior states. It is a best practice for developers
    to record all code changes in a version control system. It should also be a best
    practice to architect business applications similarly. The data contained within
    a business application can be critical to the success of the business, and the
    default policy should be to track any changes.


    “Never Forget” goes a step further, as it isn’t the simple mechanics of recording
    the new state, it is recording the intention behind the change, remembering the
    “what” and the “why.”


    As a principle, I believe this is something to add at the start of a project.
    Unless changes are captured as they happen, the information will be forever lost.


    ### Message Driven


    This principle is taken directly from the Reactive Manifesto. I discussed the
    basics of this in the third chapter when introducing reactive systems. Again,
    this principle is one that is best adhered to at the start of the project. Retrofitting
    a message passing onto a system that was not designed for this type of communication
    can be challenging. By being message driven from the start, the system is set
    up to make use of the other properties from the manifesto, elasticity, resiliency,
    and responsiveness.


    There is a critical control aspect here. By reifying internal communication in
    our system as messages, we gain control over them. Messages become discrete items
    that can be manipulated by our code. Message passing is one of the original ideas
    behind “object-oriented programming” (OOP). Developers aren’t often aware of this,
    as it is often the encapsulation that objects provide that is more prominently
    featured.


    We want to reuse the ideas of encapsulation and message passing in our system.
    The components that exchange messages will be more coarse-grained than an object-oriented
    domain model. We will need to have facilities for message passing on top of what
    our implementation language provides. Not all languages allow for dynamic handling
    of messages between objects, Ruby and Objective-C being two notable ones that
    do. Even if we were using one of those languages to implement our system, we will
    want to have a mechanism on top of the language facilities to manipulate the message
    flow.'
