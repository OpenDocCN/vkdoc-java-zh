  trans: '

    ### 弹性


    故障总会发生，无论是有计划的还是意外的。如果你不计划优雅地处理故障，那它就不会优雅。优雅地处理故障可以减少系统的运维负担。通过最小化故障的影响，可以缩短恢复时间，快速安全地恢复服务。业务方期望应用在需要时始终可用，而弹性正是实现这一目标的手段。在用户看来，系统是否“在线”即代表是否可用。


    从更广阔的视角来看，弹性关乎处理*意外的系统状态*。如果某个组件发生故障，那便是意外情况，否则该故障本应已被处理。


    还有一种开发者将系统置于的预期状态，可能导致系统不可用，即**部署**。


    部署可以被视为两个状态之间的转换：系统运行旧代码的状态和运行新代码的状态。这种转换的频率取决于部署发生的频率。如果你正在实践持续交付，那么这种转换可能会持续发生。部署还有另一个维度，取决于其发生方式：一段时期内运行的代码*多于*平常，或*少于*平常。


    如果你希望部署时没有可见的停机时间（这在实践持续部署时很常见），那么你将经历一段运行代码多于平常的时期。这段时期的持续时间会因新版本上线所采用的策略而异。即使是最简单的情况——新版本一运行就立即停用旧版本——也会存在一个两者同时活跃的时期，必须加以考虑。还有更复杂的策略用于增量激活新代码。在所有情况下，这些策略都会导致更长的重叠期。


    另一种选择是停机部署：停止旧代码，启动新代码。在部署期间，系统会有一段时间不可用。从用户的角度，或从协作服务的角度来看，这与意外故障没有区别。虽然这并未为正在部署的代码提供弹性，但在一个由多个服务组成的系统中，能够单独部署一个服务，并让其协作者处理其可用性问题，这本身就是弹性在发挥作用。


    无论是从处理意外故障入手，还是从优化部署流程入手，两者都是相辅相成、互相支持的。能够在整个系统中统一处理故障，有助于管理和修复。


    ### 可伸缩性


    可伸缩性是最难利用的特性，也是最难明确其清晰收益的特性。有效利用它是一个高级话题。我认为关键部分是使其*成为可能*，因为为一个没有考虑这些扩展点的系统增加可伸缩性可能是一项挑战。


    如果系统的使用量是恒定的，那么工作负载就没有可伸缩性。如果使用量存在波动，那么这种波动必须足够显著，才值得分配或释放系统资源。我们的业务应用更可能以每分钟请求数来衡量，请求量翻倍可能算不上显著变化。在云环境中，假设为了弹性而部署了一个三实例的集群，那么对这个规模的集群进行有效的自动伸缩是很棘手的。或许将其扩容到一个新的固定规模，比花时间微调自动伸缩策略更好。如果你有一个大型集群，自动伸缩会更容易。


    然而，另一方面，如果波动性很大且自动伸缩有效，那么具备可伸缩性就能节省成本。不再需要过度配置资源来处理峰值负载，也无需在业务低谷期为未使用的容量付费。如果成本已经是一个考量因素，系统可能会故意相对于峰值负载进行低配，寄希望于运气，希望峰值不会导致太多不良后果。


    ### 消息驱动


    这是最终的答案。在某种程度上，其他特性对于业务应用来说是“锦上添花”。构建业务应用时，响应式系统的主要好处在于其消息驱动的特性。


    前三个特性——响应性、弹性和可伸缩性——可以被视为运维层面的特性。而要真正做到消息驱动，系统的架构需要从核心层面以此方式运作。这个特性从根本上影响了系统架构。正如我在前一章所讨论的，你的系统已经由消息构成。我们的目标是保留它们。


    让我们思考一下系统中存在的消息类型、它们的目的，以及保留这种抽象的价值。


    想象一个现状服务：一个通过 ORM 在关系数据库中存储数据的通俗 REST 端点。一个用于更改系统中某些数据的 HTTP 请求就是一个消息。应用消费这个请求，使用适当的逻辑更新对象模型并持久化更改。然后返回一个响应消息。


    我们从一条消息（请求）开始，以一条消息（响应）结束。我们*转换*了请求，得到了响应。


    进一步分解这个例子，HTTP 请求是一条代表*更改请求*的消息。从概念上讲，这是一个**命令**。通常会对传入请求进行一些验证，以确保其结构正确，例如检查必填字段。如果这些验证通过，我们可以认为该命令已被应用*接受*。


    应用消费这个命令并更新对象模型。这很可能仍是预期性的，因为可能还需要满足数据库约束。直到事务提交时，应用才能确定更新是否成功。这就是命令的*处理*过程。事务的处理结果（无论是成功提交还是失败）就是命令的*结果*。


    如果结果是失败，可以立即返回一个错误响应，这是对结果的一种转换。在成功的情况下，作为命令一部分被修改的对象模型可能被用来返回一个响应负载，这是另一种类型的转换。无论是成功还是失败的情况，都代表了另一条消息。


    如果没有对命令进行显式表示，上述逻辑很容易变得混杂，使测试更加困难。这可能违背开发者对系统易于变更的期望。应用的内在结构需要持续警惕以防止这种情况发生。


    如果我们把命令具体化为一条消息，我们就可以显式地对其进行操作。这个命令会有一个清晰的处理流水线。每一步都可以由一段离散的、可测试的代码来表示。归根结底，这就是本书的主题，而第
    3 部分将深入探讨如何实现这一点。


    通过使用显式的命令，系统可以成为消息驱动的。利用这种对系统正在做什么的表示，它为系统的逻辑组件如何交互提供了一个框架。这种一致（并且是的，有主见的）设计理念指导着应用的结构。


    在组件之间交换消息，使我们能够应用与将组件引用连接到系统数据流时相同的控制反转原则。我们获得了同样的好处：提高复用性、降低耦合度以及独立演进。


    在一个作为事实来源并管理工作流的业务应用中，能够安全且自信地改变数据流的方式至关重要。这就是将它们构建为响应式系统的原因。

    '
- fmt: '# Summary


    This chapter has explained *why* it is beneficial to build business applications
    as reactive systems. The business has expectations on the application’s reliability
    that are provided by a reactive system. The most important is your expectation
    of being able to effectively change the system. In modeling the application’s
    data flow as messages, this can be done with confidence. Part 3 will explain *how*.
    Before that, the next two chapters go further in depth with two important features
    of business applications, managing business rules, and time.


    # 5. What Is a Business Rule?


    A business application is a source of truth for the business. In order to be effective
    at this task, data will need to conform to a structure. This will allow processes
    and workflows to be built around it. Categorically, the specification of a data’s
    structure, how it is modified, and what happens when it is changed are all considered
    **business rules**. At a given point in time, they will be specific. As the business
    changes, so will its rules. This chapter explores how I think about rules and
    how to classify them. By understanding their relationship to the system, we will
    know where to place them in our architecture.


    ## Thinking About Business Rules


    Having the correct rules is critical. Having the wrong rules leads to users working
    outside of the system, around its constraints. As one of the main goals of the
    business is to have users actually *use* the system, the rules need to accurately
    reflect how the business conducts itself, inclusive of exceptions.


    What are the correct rules though? Someone must speak to prospective users to
    understand. This may be a part of your responsibilities, or in a larger organization,
    this may be part of a Product Manager’s duties. Understanding business rules are
    a critical part of gathering requirements.


    It is important to gather requirements from the correct audience. If only management
    is interviewed, there may be a disconnect between how they think work happens,
    and how the business *actually* conducts itself. It is important to be aware of
    this disconnect. The field of human factors and ergonomics describes this as Work-as-Imagined
    vs. Work-as-Done. In creating an application, we are encoding a third form, Work-as-Prescribed.
    If your organization does incident analysis and retrospectives, you may have been
    exposed to these concepts. The burgeoning discipline of Site Reliability Engineering,
    a practice that applies software engineering principles to operations, has been
    using these concepts when conducting blameless postmortems for failures.


    As an application developer, we control what is possible to do with the application.
    We are prescribing how work must be performed within the context of our system.
    The act of gathering requirements is the process of understanding how work should
    be done, as imagined, and formalizing those processes in the system. A developer’s
    pedantic accuracy can be a benefit in this process, asking the necessary questions
    to understand possible edge cases.


    When determining your system’s rules, it is important to remember that there is
    an element of risk as part of their formalization. In adding a constraint that
    must be true, it removes the possibility of data that would violate it. This represents
    a form of risk. If the business needs to change that decision, how quickly could
    a change be safely made? Being amenable to this type of change is one of our goals.


    There is a difference between something that must be always true, and something
    that should probably be true. One is a rule, the other is a guideline. Keep this
    in mind as we discuss how to categorize rules.


    ## Categorizations


    Over my career, I’ve observed common themes in what’s called a “business rule”
    and have used those themes to construct the following categorizations.


    ### Data at Rest


    Ultimately, data is stored *somewhere*. There will be requirements that this data
    must meet.


    If you’ve created a table in a relational database, you’ve encountered rules for
    data at rest. Any constraint that is expressed in a database’s schema falls into
    this category. These include nullability, uniqueness, and foreign keys. Some databases
    allow the expression of more complex constraints for a column, such as defining
    a fixed range for a numerical value, or even across columns in a table, such as
    a “start date” must be before an “end date.” In SQL, these are `CHECK` constraints.


    These declarative constraints are constrained to a single row, which limits what
    they can enforce. Imagine a system that is tracking widgets. If there is a table
    that represents the available inventory of widgets there may be the requirement
    that the sum across all rows can’t go below zero. If each row represents an operation
    that adds or removes a widget, the table may have a constraint such as `CHECK
    (count <> 0)` to ensure that each row has a nonzero count, as a valid operation
    must move some quantity of widgets. To express that the inventory can never be
    negative, it may seem straightforward to write `CHECK (SUM(count) >= 0)`. Alas,
    I’m not aware of any widely used relational database that allows specification
    of this type of constraint in a declarative fashion. Constraints are only checked
    in the context of a single row, not an entire table. Table-wise or cross-table
    constraints require the use of a trigger to invoke procedural code stored in the
    database.


    This jump from a declarative to procedural constraint means that these constraints
    are generally implemented outside the database. As test-driven development, and
    more broadly unit testing and continuous integration have become more popular,
    the ability to automate testing has been more valuable to developers. Procedural
    logic within a database is harder to test, as it requires a running instance of
    the database software. Until the popularization of Docker in the mid-to-late 2010s,
    the effort to achieve this was generally unfeasible for most teams, time was better
    spent elsewhere. For the JVM, there are a handful of embedded database engines
    that can be used for tests, but they do have differences compared to the ones
    that must be used in production. It has pushed developers to rely on the lowest
    common denominator of database features in their code.


    If a constraint is only enforced in application code, there’s the philosophical
    and practical question of whether it is actually always true. In order to guarantee
    that a constraint for data at rest is enforced, all modifications to the data
    must go through the enforcement mechanism. If that isn’t within the data store
    itself, access to the data store must be carefully guarded to prevent modifications
    that bypass the application and interact with the store directly.


    Enforcing constraints in application code does allow for easier management of
    changing constraints over time. If a constraint is weakened, there’s no change
    needed for existing data, it already meets the looser constraint. If a constraint
    is tightened, such as making an optional field required, a decision must be made
    for existing data that would be in violation of the new constraint. This may be
    a consideration in enforcing a constraint in application code rather than the
    database. The next chapter will explore time and its relationship to business
    rules in greater depth.'
