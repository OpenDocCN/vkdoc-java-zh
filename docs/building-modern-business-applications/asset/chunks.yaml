- fmt: '# Implementation Details


    The implementation of this interface combines past and future messages from their
    storage tables. Past data is straightforward; it is a `SELECT` statement with
    a `WHERE` clause that only selects messages greater than a given sequence number.
    Future messages reuse that same code path by using a call to `LISTEN` that receives
    notifications containing new sequence numbers. When a new sequence number is available,
    if it is greater than the last known value, the `SELECT` is re-executed returning
    new messages. Since the call to `LISTEN` is returning a single value, if values
    are being generated faster than consumers can process them, applying backpressure
    is straightforward because only the most recent message needs to be retained,
    the one containing the new maximum sequence number.


    The materialization engine uses the message log containing events, the event log,
    to maintain the schema within the database that is used to satisfy GraphQL queries.
    As the materialization engine updates tables, the updates can issue a `NOTIFY`
    where appropriate for your domain. These notifications will be listened to by
    the code that powers GraphQL subscriptions to know when to generate new ticks
    on the subscription stream. This is the same pattern used by the message logs;
    `LISTEN/NOTIFY` is used to notify portions of the system when new data is available.


    There will be several `DataFetcher` implementations for our system. At a minimum,
    they will exist for each of the fields on the `Query` and `Subscription` types
    as fields there represent entry points into the schema. These implementations
    will issue queries against the database schema containing the materialized view
    that is designed to handle these requests. A benefit of this is that there should
    be little-to-no impedance mismatch between the two schemas.


    When designing schemas, I like to reuse the types returned by fields of the `Query`
    and `Subscription` types:


    ```

    type Invoice {

    id: ID!

    customer: Customer

    }

    type Customer {

    id: ID!

    name: String

    invoices: [Invoice]

    }

    type Query {

    customer(id: ID!): Customer

    }

    type Subscription {

    customer(id: ID!): Customer

    }

    ```


    Both `Query.customer` and `Subscription.customer` return the same data. The only
    (and important) difference is that the subscription field will return the current
    state followed by any updated states. This follows the same pattern I mentioned
    above for implementing a `MessageLog`; there is a query that can load the data,
    and notifications received on a `LISTEN` to the database signal the application
    to re-execute the query. By reusing patterns, an understanding of one portion
    of the system applies to others, as well as opening the possibility for sharing
    implementation code.


    ## Summary


    In this chapter, I have introduced the set of tools that I have used to successfully
    implement the design introduced in the third part of this book. You have learned
    how PostgreSQL is an ideal database to use as it is able to satisfy all the required
    technologies from the prior chapter with a single solution. You have also learned
    that a fully reactive implementation is achievable with Spring Boot, Project Reactor,
    GraphQL-Java, and R2DBC. The next chapter is devoted to how the design can be
    extended with additional features and alternate ideas for implementing it.


    Footnotes [1](#511062_1_En_14_Chapter.xhtml#Fn1_source)


    # Expansion Points and Beyond


    I started this book by sharing my perspective on how to define business applications.
    Extending from that definition I then described how to think about building them
    in order to satisfy a set of properties and features that I feel are valuable
    to both the business and you, the developer. The design I’ve introduced has been
    explained without prescribing any specific implementation. After fully explaining
    the design in the third part of this book, the prior chapter was an introduction
    into the set of tools that I have successfully used for implementing the design.
    In this final chapter, I share some parting thoughts on the philosophy underpinning
    the system from this book, ideas for extending the core components, and directions
    that you can take your own implementations.


    ## Design Flexibility and Amenability to Change


    If I were to look back at the various software systems that I have worked on,
    the facet that partitions them into ones that I dreaded working with, and those
    that were not, was the ease with which changes can be made to the system. This
    is irrespective of the scope of the changes that I was asked to do. What may seem
    like a straightforward modification to business logic can be made far more complicated
    if the system and its environment aren’t amenable to change.


    This is a property that runs deep within a system. I believe if it isn’t incorporated
    from the outset, it can be extremely difficult to incorporate afterward. This
    is the basis for the inclusion of how testing can be approached for each of the
    key components of this book’s system. It is also why immutability is preferred
    wherever possible. I find that code that prefers immutability is easier to reason
    about, making modifications more straightforward. Immutability is also related
    to the keystone property of the Reactive Manifesto, being message driven. Messages
    can’t be modified once sent; messages are required in order to describe changes.


    Software systems will have some amount of inherent complexity. Business workflows
    are often messy and full of edge cases. As developers, it is our responsibility
    to the business to minimize the added complexity of our software systems. They
    should strive to be as complex as necessary, but no more.


    A business’s needs from its software systems *will* change over time. The software
    systems we create should have the flexibility to adapt to those changes, and the
    process of enacting those changes should be straightforward. This is a continual
    activity over time, and an activity where balance is required. A system that is
    **too** flexible, often manifesting via high levels of abstraction, can be difficult
    to change with confidence.


    The system described in this book aims to strike this balance. Through thinking
    about business rule classifications in Chapter [5](#511062_1_En_5_Chapter.xhtml),
    the system has specific places for the incorporation of each. This acts as a map,
    providing guidance to developers as to where different types of changes should
    be incorporated. The usage of the CQRS pattern, especially when combined with
    GraphQL’s schema language, allows the views of the system’s data to evolve independently
    of how it is mutated. This may seem like extra complexity, especially when beginning
    a new project. However, if not incorporated at the start, retrofitting a system
    to add this extension point can be more difficult.


    When I was originally iterating on what eventually became the design described
    in this book, I wanted to minimize fixed decisions. Ideally, every component within
    the system is replaceable, and again ideally, with minimal disruption to the components
    it collaborates with. The balance I kept in mind was to think about how it *could*
    change, but to go no farther. The goal was to not exclude future possibilities
    while simultaneously not doing more today than is necessary. I can’t predict how
    the needs of the system will evolve.


    There are limitations to the architecture presented. It embodies a set of tradeoffs.
    The sections of this chapter are exercises in utilizing the design’s flexibility.
    Perhaps some of them are important enough to your work that you will want to incorporate
    them from the outset. There is no one size that will fit all.'
