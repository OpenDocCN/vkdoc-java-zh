    # 15. 扩展点与展望


    在本书的开头，我分享了我对如何定义业务应用的观点。基于该定义，我接着描述了如何思考构建它们，以满足一组我认为对业务和你（开发者）都有价值的属性和特性。我所介绍的设计在解释时并未规定任何具体的实现。在本书第三部分充分解释该设计之后，前一章介绍了成功用于实现该设计的一组工具。在最后一章中，我分享了一些关于本书系统基础哲学的临别思考、扩展核心组件的想法，以及你可以将你自己的实现带向的方向。


    ## 设计的灵活性与易变更性


    如果我回顾我参与过的各种软件系统，将它们分为我讨厌处理的和不讨厌处理的两类，其分界线在于系统进行变更的难易程度。这与我所被要求的变更范围无关。如果系统及其环境不易于变更，那么一个看似简单的业务逻辑修改可能会变得极其复杂。


    这是系统内部一个深层次的属性。我相信，如果它从一开始就没有被纳入，那么事后将其纳入将极其困难。这就是为什么本书系统的每个关键组件都包含了如何测试的方法。这也是为什么尽可能首选不可变性。我发现偏好不可变性的代码更容易推理，使得修改更加直接。不可变性也与响应式宣言的基石属性——消息驱动——相关。消息一旦发送就不能修改；描述变更需要消息。


    软件系统会有一定程度的固有复杂性。业务工作流通常混乱且充满边缘情况。作为开发者，我们有责任为业务最小化软件系统增加的复杂性。它们应该尽可能复杂到必要程度，但不能再多。


    业务对其软件系统的需求*会*随时间变化。我们创建的软件系统应具有适应这些变化的灵活性，并且实施这些变化的过程应该直接明了。这是一项持续的活动，也是一项需要平衡的活动。一个**过于**灵活的系统（通常通过高层次的抽象体现）可能难以自信地进行变更。


    本书描述的系统旨在实现这种平衡。通过思考第 5 章中的业务规则分类，系统为每种规则提供了特定的整合位置。这就像一个地图，为开发者提供指导，说明不同类型的变更应该在哪里进行。CQRS
    模式的使用，特别是与 GraphQL 的模式语言结合时，允许系统数据的视图独立于其变更方式而演化。这看起来可能像是额外的复杂性，尤其是在开始一个新项目时。然而，如果一开始没有纳入，事后改造系统以添加这个扩展点可能会更加困难。


    当我最初迭代最终成为本书所述设计的内容时，我希望最小化固定决策。理想情况下，系统中的每个组件都是可替换的，并且同样理想的是，对其协作组件的干扰最小。我牢记的平衡是思考它*可能*如何变化，但仅此而已。目标是既不排除未来的可能性，同时也不在今天做超出必要的事情。我无法预测系统的需求将如何演变。


    所呈现的架构存在局限性。它体现了一组权衡。本章的各节是利用设计灵活性的练习。也许其中一些对你的工作足够重要，以至于你希望从一开始就将其纳入。没有一种方案能放之四海而皆准。

    '
- fmt: '## Multiple Command Processors


    A key simplification present in this book’s system is that there is a single command
    processor. This should not be construed to mean that there is a single command
    processor for the entire business. In Chapter [1](#511062_1_En_1_Chapter.xhtml)
    when introducing this book’s definition of business applications, they are both
    domain-specific, relative to the domain the business operates in, as well as targeting
    specific departments within an organization. Departments are also domains, such
    as accounting, sales, or customer support.


    Although the underlying paradigms of event sourcing have been used for millennia,
    their wider usage within software systems is still nascent. When researching event
    sourcing, you will likely encounter recommendations to limit the number of events
    within an event log. While this is a fine recommendation grounded in the experience
    of others, it also adds complexity. The usage of a single command processor and
    event log is an intentional simplification of the design. The state the command
    processor maintains in order to enforce business rules is akin to the state that
    developers may be familiar with maintaining in a relational database. The code
    that enforces rule-keeping has full access to all the system’s data. This minimizes
    the conceptual differences in moving from mutating data in place to the command
    processor approach.


    The incorporation of multiple command processors was a future possibility that
    I kept in mind during initial ideation. I think there are multiple ways to think
    about this depending upon your goals.


    There could be a single command log and a single command processor. Events, however,
    could be tagged with a value that can be used as a partition key. This would allow
    the consumers of the event log to limit the events they receive. If your system’s
    bottleneck is related to event consumption, this may be a viable approach.


    A single command processor is a bottleneck for the write throughput that the system
    can support. If mutations arrive in bursts, a single command processor may still
    be sufficient depending upon how long it takes to process the backlog. If allowing
    a queue to build would violate your system’s responsiveness objective, or if the
    mutation rate would prevent a single command processor from ever catching up,
    multiple command processors can be created.


    If multiple command processors are used, it is likely that they may be chained
    together. Consider a system that manages customers. It is possible to add new
    customers to the system in addition to the maintenance of data for new customers.
    The business rules of this system have a constraint for customer uniqueness. Each
    customer has a unique tax ID and adding a customer with a tax ID that is already
    used by another should fail. All other business rules are scoped to a single customer.
    To enforce this uniqueness constraint using this book’s components, the addition
    of new customers and the modification of tax IDs need to be maintained by a single
    command processor, the global rule maintainer. Each customer can then have their
    own command processor for the maintenance of customer-specific information.


    The system will need to use the events from the global rule maintainer’s event
    log to determine the set of known customers and manage the customer-specific command
    processing engines. Incoming mutations will be dispatched to the appropriate command
    log. The chaining I mentioned is related to how the creation of a new customer
    may be implemented. The global rule maintainer is responsible for the known set
    of customers and their tax IDs. The exposed mutation for creating a customer allows
    specifying the tax ID in addition to other customer metadata. The event log from
    the global rule maintainer only contains events relating to the set of customers;
    all customer details should exist within the per-customer event log. In order
    to ensure this, the command generator would need to submit a command to the global
    rule maintainer and await the response, and then submit another command to the
    customer-specific command log.


    This adds complexity to the internals of the system. It is also complexity that
    can be hidden within the exposed interfaces of the system. This change can be
    done later in the system’s lifespan without requiring changes by the system’s
    callers, as well as without any modifications to the tests of the composed system
    from Chapter [12](#511062_1_En_12_Chapter.xhtml).


    Another reason to move to multiple command processors may be to address startup
    speed. A command processor maintains the necessary state for business rule enforcement
    in memory. This means that all events are replayed from storage whenever the system
    starts. Multiple command processors allow for the parallelization of that work,
    but there is another approach: the caching of this state across application starts.'
  raw: '## Multiple Command Processors


    A key simplification present in this book’s system is that there is a single command
    processor. This should not be construed to mean that there is a single command
    processor for the entire business. In Chapter [1](#511062_1_En_1_Chapter.xhtml)
    when introducing this book’s definition of business applications, they are both
    domain-specific, relative to the domain the business operates in, as well as targeting
    specific departments within an organization. Departments are also domains, such
    as accounting, sales, or customer support.


    Although the underlying paradigms of event sourcing have been used for millennia,
    their wider usage within software systems is still nascent. When researching event
    sourcing, you will likely encounter recommendations to limit the number of events
    within an event log. While this is a fine recommendation grounded in the experience
    of others, it also adds complexity. The usage of a single command processor and
    event log is an intentional simplification of the design . The state the command
    processor maintains in order to enforce business rules is akin to the state that
    developers may be familiar with maintaining in a relational database. The code
    that enforces rule-keeping has full access to all the system’s data. This minimizes
    the conceptual differences in moving from mutating data in place to the command
    processor approach.


