  trans: '

    ## 理解时间


    我从历史视角开启本章，探讨如何回答“发生了什么？”这个问题。由此引出了将事件作为一种细粒度方式来记录*发生了什么*以及*为什么发生*。命令是事件的前身，而事件可用于构建状态的概念。这些概念清晰地映射到时间上。命令代表未来，事件代表过去，而状态则是当下。


    这使我们能够在系统内部构建一条局部时间线。通过仅物化部分事件，就可以实现时间旅行回到过去。不过，这只是一条*局部*时间线。让我们暂且偏离主题，探讨一下*时间代表什么*。


    时间是沟通*何时*发生的一种手段。沟通需要一个共同的参照系。在地球上，我们使用协调世界时（UTC）。


    当接收到关于某事或某个事件*何时*发生的通信时，有两个维度值得关注：


    1.  事件*实际发生*的时间。


    2.  你*意识到*该事件已经发生的时间。


    这两个时间点都是离散的时间点。**它们总是不同的！** 有时，差异微乎其微，比如你执行的操作，但并非总是如此。


    如果你触摸炉子，在你意识到炉子很烫之前，你的手指就已经被烫伤了。这是一个关于信息传播延迟的直观例子。时间点 1 和 2 之间的间隔虽然短暂，却足以烫伤你的手。你需要*意识到*某个事件并对其采取行动。只有当你意识到炉子的温度时，你才能移开手。


    在许多系统中，这两个维度被混为一谈。系统接收到信息的时间最终被当作事件发生的标准时间。理解这一点很重要：这是一种虚构，如果系统有多个事实来源，就会导致差异。


    ## 时间的序列化


    最终，一个应用程序会生成一条关于“发生了什么”的单一时间线。在许多应用程序中，这并没有被显式管理，而是委托给了存储数据的关联数据库。然后由事务隔离级别来控制时间如何流动。只有一种模式能提供完全一致性，即`SERIALIZABLE`（可序列化）。它并非任何主流关系数据库的默认设置。我推测部分原因是性能，部分原因是它给应用程序开发者带来的负担。


    大多数数据库的默认设置允许开发者以一种通常不会产生错误的方式操作数据库。错误会足够罕见，以至于错误可以沿着调用栈向上传播很远，或许最终导致用户需要重试某个操作。


    `SERIALIZABLE`则不同。它要求所有交互都严格线性化。如果某个修改会违反这一点，就会返回一个错误，并且必须重试该事务。这就要求应用程序开发者将与之交互的数据库代码结构化，以支持多次调用。如果业务规则的类型相互混杂，例如执行副作用操作，就存在多次执行副作用的风险。


    归根结底，数据库的事务日志是一个已执行更改的有序列表。它是一个*事件日志*，隐藏在数据库内部。


    通过将变更请求表示为命令并将其存储为事件，我们将这个事件日志提升到应用程序层面，使系统能够将其作为一等公民来使用。这让我们能够*控制*时间的序列化。在决定处理命令的顺序时，我们就是在构建一条时间线。


    ## 最终一致性


    时间的序列化提供了局部一致性。然而，我们的应用程序并非在真空中运行。它们是业务的一个*事实来源*，但并非所有事实的*唯一*来源。最终一致性指的是信息随时间传播的过程。当系统
    B 意识到系统 A 中的变化时，B 与 A 就*最终一致*了。


    不存在唯一真实的时间线。在一个由众多应用程序组成的大型系统中，每个应用程序对事件发生的顺序都有自己的视角，因为每个应用程序都会独立地意识到事件的发生。


    通常，这可能是可以接受的。通过使用事件来沟通发生了什么，每个应用程序可以记录自己何时意识到信息，从而在局部回答“发生了什么”的问题。然而，在商业应用中，有时事件*何时*发生也很重要，这也必须被追踪。


    ## 双时态


    双时态是指追踪*两个*时间维度：事件发生的时间，以及系统意识到该事件的时间。在业务领域，追溯性政策就是一个例子。


    想象一个忠诚度计划，购物可以获得积分。积分是一种货币形式，可以在商家处消费。未使用的积分在一段时间后过期。在我们的例子中，积分在获得一年后过期。


    积分追踪应用程序是一个独立的应用程序。它从业务的其他地方消费交易事件，以追踪其积分余额的状态，并直接管理用于消费积分的事务。因此，它追踪两个时间点：它意识到交易的时间，以及交易实际发生的时间。它是双时态的。


    我“今天”的积分余额取决于该应用程序与交易事件流同步的最新程度。积分是根据交易发生的日期授予的，而不是根据积分追踪应用程序看到它的时间。


    对于过去的任何一个时间点，积分余额都有两种视图。基于*当时*已知信息的积分余额是多少，以及基于*现在*已知信息的积分余额是多少。


    一个保留两个时间戳的事件日志使得回答这些问题变得简单直接：一个交易时间，一个接收时间。要回答基于当时已知信息的余额是多少，只需查阅接收时间早于所查询时间的事件。要回答基于所有可用信息的过去余额是多少，则会使用交易时间。


    在这个假设的系统中，交易时间可能是主要使用的时间戳。然而，记录接收时间仍然有价值。如果忠诚度计划的客户对他们的积分余额有疑问，拥有接收时间的信息对于解答问题可能是无价的。数据是有价值的，最好在可能的时候捕获它。


    除了这个人为的例子，还有一种普遍适用的双时态形式：不断变化的业务规则。

    '
- fmt: '# Business Rule Changes


    I’ve mentioned *amenability to change* as an important property of a business
    application. Business will change, and the speed with which their software can
    adapt can be a gating factor.


    The flow of events can be seen as the flow of time. As events occur, time passes.
    Events don’t have to be confined to changes in *data*, they can also represent
    changes to *behavior*.


    Reusing the example of a loyalty program, imagine it in the context of an airline.
    There may be a situation, such as a global pandemic, where the airline wishes
    to extend the expiration of all points by a year. That is, if you had points that
    were due to expire within a given period of time, that expiration is extended
    by a year. Any points accrued during the next year should have a two-year expiration
    window. How should this be modeled?


    One way is to use an *event* to represent the rule change. When the application
    is materializing events, it would use a rule change event as a marker to adjust
    its behavior. By incorporating business rule changes into the event log, it enriches
    the event log as a source-of-truth.


    The implementation of this idea can vary, the event can be very specific, invoking
    a targeted code in a materialization process, or it could contain parameters if
    this rule is something that is frequently adjusted (if it were done for brief
    promotional periods).


    By taking *control of time*, we have the opportunity to do richer things inside
    of our application. It also enables more in-depth answers to “what happened” and
    “why,” as both the data and the rules are available for introspection.


    ## Summary


    We have covered


    - Tracking data changes over time.

    - What are events and commands

    - The difference between the time an event occurred and when our system is aware
    of it having occurred

    - Managing business rule changes over time


    This concludes the second part. I’ve discussed reactive systems, business rules,
    and time. These are concepts that I find important to understand before proposing
    a design for a business application. The next part will use these concepts to
    build a design, and ultimately an implementation.


    # Part III: Design


    # 7. Constraints and Principles


    It’s design time! The first two parts of this book were context setting. I needed
    to ensure that we had a shared understanding of a business application as well
    as an understanding of common patterns in use today. I then introduced reactive
    systems via the Reactive Manifesto and my rationale for why to build a business
    application as a reactive system. Finally, I described my categorizations of business
    rules and how time is an important (and sometimes underappreciated) dimension.


    This part of the book will work toward my proposed design for business applications.
    The first step in that path will be to introduce some self-imposed constraints
    on the design as well as self-selected guiding principles that will inform the
    architecture. Let’s dive in.


    ## Constraints


    There are two constraints I want to impose on the design, and they are both around
    how the application presents itself to the UI. I’m going to briefly mention them
    and then explain them in more detail.


    The first is to enable and encourage the UI to be built in a manner that supports
    real-time updates of data. The second is to use GraphQL to drive the UI experience.


    ### From REST to a Graph


    I briefly mentioned GraphQL in Chapter [2](#511062_1_En_2_Chapter.xhtml), and
    it deserves a comprehensive description. Let’s step back and think of what led
    up to it as a way of explaining why I believe it to be an important technology.


    It is possible to view the data inside of a system as a giant graph. The hierarchical
    path portion of a URL has been used as a way to index into that conceptual graph.
    This was the basis for architecting data APIs. An endpoint such as `/api/v3/customers`
    would list customers. To access a specific customer, the key would be appended
    as another path segment, `/api/v3/customers/42`. Customers have multiple addresses,
    and those could be enumerated at `/api/v3/customers/42/addresses`. A specific
    address could then be accessed at `/api/v3/customers/42/addresses/67`.


    This hierarchical indexing into the data graph has two drawbacks:


    1. Traversal requires multiple requests.

    2. No straightforward mechanism to indicate what data is desired in each request.


    At the scale of our business applications, these drawbacks generally aren’t an
    impediment. However, for two Silicon Valley companies, Facebook and Netflix, these
    drawbacks were enough to have them contemporaneously develop alternative approaches.
    They each build upon this idea of using the path hierarchy and the data at each
    path to form a unified graph of a system’s data. I’ll discuss Netflix’s solution
    first.


    ### Falcor


    Netflix developed a technology named Falcor.^([^(10)](#fn10)) It views the unified
    data graph as a single JSON document, with a mechanism for allowing the hierarchical
    nature of JSON to have cycles and thus model a graph. Callers would then provide
    a “path” (similar to, but not the same syntax as, JSONPath) to indicate which
    portions of the graph to load. This allows UIs to fetch *precisely* what they
    need in a single request. Netflix’s model is a clear evolution from hierarchical
    paths that return JSON fragments, as it collapses everything into a single endpoint
    allowing UIs to specify paths that go beyond what the URL paths provided and into
    the JSON payloads.


    ### GraphQL


    Facebook took a slightly different approach with GraphQL. It also builds upon
    the notion that the system is a giant graph. GraphQL has a schema to describe
    the graph. Graph nodes are object types, and each type is composed of fields.
    A critical differentiator is that fields in GraphQL can accept arguments. Rather
    than a graph of pure data, GraphQL should be viewed as a graph of *functions*.
    Just as one could pass query parameters to REST endpoints, the same can be done
    with fields on a GraphQL type.


    Unlike Falcor, GraphQL doesn’t impose the perspective that the graph is a single
    conceptual JSON document. While Falcor uses the document abstraction as a mechanism
    to provide a “root” of the graph for its path-based access, GraphQL has a special
    type in the graph, the `Query` type, whose fields define entry points into the
    graph.


    The graph-of-functions abstraction also allows GraphQL to have a solution for
    data modifications, another REST behavior that it preserves. Modifications, or
    mutations in its terminology, are performed by requesting the fields of another
    special type, the `Mutation` type.


    Although both Falcor and GraphQL were released within a month of each other in
    2015, GraphQL has had far more success. I believe this is due to it having a complete
    answer for replacing REST-style access patterns.'
  raw: '## Business Rule Changes


    I’ve mentioned *amenability to change* as an important property of a business
    application. Business will change, and the speed with which their software can
    adapt can be a gating factor.


    The flow of events can be seen as the flow of time. As events occur, time passes.
    Events don’t have to be confined to changes in *data* , they can also represent
    changes to *behavior* .


    Reusing the example of a loyalty program, imagine it in the context of an airline.
    There may be a situation, such as a global pandemic, where the airline wishes
    to extend the expiration of all points by a year. That is, if you had points that
    were due to expire within a given period of time, that expiration is extended
    by a year. Any points accrued during the next year should have a two-year expiration
    window. How should this be modeled?


    One way is to use an *event* to represent the rule change. When the application
    is materializing events, it would use a rule change event as a marker to adjust
    its behavior. By incorporating business rule changes into the event log, it enriches
    the event log as a source-of-truth.


    The implementation of this idea can vary, the event can be very specific, invoking
    a targeted code in a materialization process, or it could contain parameters if
    this rule is something that is frequently adjusted (if it were done for brief
    promotional periods).


    By taking *control of time* , we have the opportunity to do richer things inside
    of our application . It also enables more in-depth answers to “what happened”
    and “why,” as both the data and the rules are available for introspection.


    ## Summary


    We have covered


    *   Tracking data changes over time.


    *   What are events and commands


    *   The difference between the time an event occurred and when our system is aware
    of it having occurred


    *   Managing business rule changes over time


    This concludes the second part. I’ve discussed reactive systems, business rules,
    and time. These are concepts that I find important to understand before proposing
    a design for a business application. The next part will use these concepts to
    build a design, and ultimately an implementation.


