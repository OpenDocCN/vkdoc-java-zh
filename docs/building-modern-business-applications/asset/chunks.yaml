  trans: '

    ## 测试组合系统


    我认为针对系统（或服务）的测试并未得到充分重视。过去几年中，“测试金字塔”的概念逐渐普及，这一概念源自迈克·科恩的著作《敏捷成功之道》。^(¹⁶) 金字塔的底部由相对更独立、速度更快的单元测试构成；顶部则是集成度更高、速度更慢的
    UI 测试；中间层则由服务（或系统）测试组成。如果执行得当，系统测试能够为系统提供高水平的信心，并且性能良好。通过结合使用容器、在云端机器上轻松运行测试，甚至借助远程开发环境，速度上的劣势正在消失。我还认为，有时人们会认为任何比单元测试更复杂的测试都是缓慢且昂贵的。


    我对系统测试的方法是：测试有价值的内容。我重视系统的外部 API 契约（在我们的案例中是 GraphQL 模式），以及用于满足 API 契约的任何基础设施。事件物化器维护着一个有状态的视图。如果使用另一个系统来存储该视图（例如数据库），那么测试应该使用该系统的实际实例。容器在这方面提供了巨大帮助，因为它们为管理这类资源的生命周期提供了标准化的契约。


    GraphQL 通常通过 HTTP 交付。在进行系统测试时，我避免使用 HTTP，而是倾向于直接与我的 GraphQL 实现进行交互。GraphQL 实现与暴露它的
    HTTP 端点之间的接口是可以独立测试的。这同样适用于事件物化器测试所采用的理念。该组件提供的功能最终与其执行的具体操作无关。事件物化器并不关心任何给定事件如何影响有状态的视图。HTTP
    端点与 GraphQL 实现之间的接口是类似的，并且由于它位于系统的边缘，很容易被绕过。


    我相信，组合系统——即满足 GraphQL API 所需的一切——可以作为一个整体进行测试；如果你需要用这种术语来表述的话，可以称之为一个单一的*单元*。我们的系统需要维护其外部契约，从类似于系统用户的角度进行测试，能让我们更有信心地认为测试结果将反映系统在生产环境中的行为方式。


    从外部契约的角度测试我们的系统，其推论是：同样的方法也可以应用于任何需要与我们系统协作的其他系统。如果命令生成器需要查询另一个系统才能创建命令，那么只要该存根实现满足另一个系统的契约，我们就可以在测试中使用该系统的存根实现。我发现这种视角还能避免创建分布式单体架构——即由于服务间的相互依赖而需要同步发布多个服务的情况。如果系统间的契约定义不明确，甚至可能根本不存在，开发者可能会倾向于在测试中使用协作系统的真实实例。而一个定义良好的契约则允许创建替代实现，这是避免测试中出现此类耦合的一个促成因素。


    对于我们的系统，一个实现应该允许实例化 GraphQL 接口、命令生成器、命令处理器、事件物化器以及任何其他必要的服务。这就是整个系统的精髓，在部署时即可通过
    HTTP 暴露出来。


    这个组合系统的实例足以测试组合后的数据流。这类测试也属于一种未被充分重视的范式：基于属性的测试。


    ## 介绍基于属性的测试


    在向同事解释基于属性的测试时，我首先会让他们从已知的概念入手。大多数开发者都熟悉以下形式的测试：


    ```

    @Test

    void shouldCalculateScore() {

    var customer = new TestCustomer();

    var calculator = new ScoreCalculator();

    assertEquals(10, calculator.scoreFor(customer));

    }

    ```


    这种类型的测试是基于示例的测试。这个名称的理由很简单：该测试是针对一个特定创建的客户来断言其分数。想想看，我刚才就为你提供了一个熟悉测试的示例。


    要针对分数计算器的行为创建通用的断言可能很困难。那个单一的测试客户究竟能覆盖多少实现代码？


    开发者通常会利用他们对实现的了解，构造多个示例来覆盖实现中的不同代码路径。这些示例共同建立起信心，让我们相信这些测试能够为系统部署后的行为提供保障。


    这种方法存在一个局限性：随着被测单元输入复杂度的增加，所需示例的数量也必须增加。我发现这与大多数开发者希望尽量减少需要编写的代码量（尤其是在代码高度重复的情况下）的愿望并不契合。测试框架提供了一些技术来帮助减少重复，但最终，如果你有
    100 个示例，代码库中至少会有 100 个*某种东西*。


    正是这一点促使我转向了基于属性的测试。其前提很简单：不是测试特定的输入输出示例，而是针对所有可能的输入来测试单元的属性。在实践中，测试所有可能的输入通常是不可行的。支持基于属性的测试的框架会从一个随机种子值开始，并用它来生成一组输入。如果某个输入导致测试失败，可以将该随机种子值提供给框架，以便重现该场景供开发者修复。


    关于基于属性的测试的文献通常会在示例中使用对称函数。对于任何对象 `A`，如果它被序列化为外部表示形式，然后再反序列化回来，它应该等于原始值。用数学方式表达就是
    `A = deserialize(serialize(A))`。


    我发现一个强大的方法是使用*测试预言*。测试预言是一个组件，它能够在不知道非测试预言实现方式的情况下，为给定的输入提供预期的输出。如果你的第一反应是这需要编写单元逻辑的第二个实现，那么你是对的！


    当使用基于属性的测试并结合一个能为给定输入提供预期输出的测试预言时，你实际上就是在编写单元逻辑的第二个实现。我认为这是一件好事。要成为一个有效的预言，它绝不能依赖于被测试的实现。它是一个完全独立的实现。由于它只是用于测试的代码，因此不需要像生产环境中运行的代码那样健壮。它可以针对手头的任务进行简化。


    可以将其视为开发者版本的复式记账法。就像会计师使用两本分类账来确保账目正确一样，作为开发者，我们可以拥有业务逻辑的两个实现。通过将业务逻辑实现两次，且彼此独立，它们可以相互交叉验证。这些实现将帮助你确保另一个实现正在按预期工作。

    '
- fmt: '一旦测试预言（`test oracle`）被创建，其复用的成本极低。维护数十个（更不用说数百个）基于示例的测试用例会变得非常繁琐。而一个基于属性的测试可以用数千个随机生成的输入（或者，对于来自可枚举有限集合的输入，可以是所有可能的输入）来运行。其限制因素在于测试运行时间与通过增加输入所获得的更高置信度之间的平衡；你可以根据自己的环境和风险承受能力来调整这个平衡。


    当基于属性的测试框架生成输入时，它们通常会提供用于生成特殊值的钩子（`hooks`）。特殊值是指那些可能引发边界情况的值，例如零、空值（`null`），以及有符号数的最小值和最大值。这些用于特殊值的钩子确保它们以更高的概率被纳入随机生成的输入中。


    能够用比我想手动管理的更多场景来测试业务逻辑，对于建立对系统的信心来说极其强大。下一节将解释如何为我们的系统做到这一点。


    ## 使用基于属性的测试


    我们将使用基于属性的测试来验证我们系统相对于所暴露的`GraphQL`接口的行为。在最基本的层面上，在执行一个`GraphQL`变更（`mutation`）后，验证查询（`queries`）和订阅（`subscriptions`）是否包含预期的更改。一次只测试一个变更不太可能建立起所需的信心。用户的工作流可能跨越多个变更。考虑一个管理发票的系统。可能会有以下变更：


    *   创建发票

    *   提交发票以供审批

    *   批准发票

    *   拒绝发票

    *   归档发票


    创建之后，发票可以被批准或拒绝。被拒绝的发票可以重新批准。只有被拒绝的发票才能被归档。


    我们真正想要的是让我们的基于属性的测试不仅生成用于创建发票的输入，还要生成要执行的动作序列。


    这项技术会变得非常强大。如果存在一个实现上的边界情况，即发票在多次提交审批后归档失败，该怎么办？这个场景是你可能已经编写为基于示例的测试的场景吗？我猜想我可能会编写一个测试来验证被拒绝发票的归档，而没有考虑到拒绝次数可能成为触发失败的因素。


    通过让基于属性的测试框架生成一系列要执行的动作，我们可以模拟用户可能采取的系统工作流中的各种路径。在我自己的工作中，这已经发现了在意外序列中的微妙边界情况，而这些情况通过用户的支持请求来拼凑起来要困难得多。


    为了支持测试一系列动作，我们系统的基于属性的测试需要由一个状态化的测试预言（`stateful test oracle`）来支撑。当执行一个动作时，变更（`mutation`）会被发送到系统以及测试预言。该变更所隐含的变化将在`GraphQL`查询和订阅中可见，并且将咨询预言来预测这些值会是什么。


    在编写基于属性的测试及其相关的预言时，至关重要的是所有动作都必须是确定性的。这允许在期望失败时重放测试场景。例如，我遇到的一个陷阱是让测试预言使用`Java`的`HashMap`来存储状态。`Java`的`HashMap`不保证其内容的迭代顺序，而你在测试中可能会依赖它来从映射中获取“第n个”条目。修复方法很简单，改用`LinkedHashMap`，因为它确实提供了所需的保证。


    系统本身也需要是确定性的，但我们在设计中已经很大程度上保证了这一点。变更由命令生成器（`command generator`）处理，它最终会将一个命令追加到命令日志（`command
    log`）中。命令日志中命令的顺序定义了它们将被处理的顺序。在面对并发变更时，这就是建立顺序的地方。在命令生成器之后，所有处理都是有序的，无论是在命令处理器（`command
    processor`）中消费命令日志，追加到事件日志（`event log`），还是在事件物化器（`event materializer`）中消费事件日志。测试可以顺序执行变更，知道它们将生成由于并发请求而在部署时可能出现的各种顺序。


    设计本身是确定性的。但命令生成器内部为了创建命令而咨询外部系统所做的工作可能不是确定性的。你需要为你的系统解决这个问题，解决方案将根据具体工作内容而有所不同。一种可能性是将来自外部系统的响应视为需要它的动作的另一个输入。当测试执行该动作时，它可以使用一个侧信道（`side
    channel`）与桩实现（`stub implementation`）通信，告诉它下一个响应应该是什么。


    在实践中，我使用基于属性的测试来验证我*认为*是系统快乐路径（`happy path`）的场景。生成的要执行的动作序列*预期*总是导致成功的变更。我的理由有两点。首先，我不关心所有无效值的全集。如果创建发票有一个约束，即发票日期不能是过去的日期，那么测试所有可能的过去日期是否有价值？就个人而言，这样做并不会让我对系统获得额外的信心。我很乐意依赖我对检查是如何实现的知识。其次，更实际地说，这简化了测试和预言的实现。生成的输入被约束以匹配系统的规则，并且预言不需要能够预测错误。如果来自系统基于属性测试的变更失败，诊断是直接的。要么输入值的生成没有被正确约束（这应该能从错误消息中直接看出），要么测试发现了系统中的真正问题。


    在这个层面进行测试的另一个好处是能够演进系统的内部实现。由于测试锚定在系统的外部契约上，因此有更大的自由度来演进系统的内部实现。你可以通过交叉检查你的更改与测试没有变化，来确保那些本应没有外部影响的内部系统更改确实没有产生影响。


    基于属性的测试很强大，但它并非解决所有测试需求的万能药。'
  raw: 'Once a test oracle has been created, reuse is extremely low-cost. The maintenance
    of 10’s, much less 100’s, of example-based test cases will become cumbersome.
    A property-based test can be run with 1000’s of randomly generated inputs (or,
    for inputs that are from an enumerable finite set, all possible inputs). The limiting
    factor will be the balance between test runtime and the increased confidence from
    additional inputs; one that you can tune for your environment and risk tolerance.


    When property-based testing frameworks generate inputs, they will often have hooks
    for generating special values. Special values are the type of values that can
    cause edge cases, such as zeros, null values, or the minimum and maximum values
    for signed numbers. These hooks for special values ensure that they are incorporated
    into randomly generated inputs with greater probability.


    The ability to test business logic with more scenarios than I would want to manually
    manage is extremely powerful in building confidence in a system. The next section
    explains how to do this for our system.


    ## Using Property-Based Testing


    We will use property-based testing to validate our system’s behavior relative
    to the exposed GraphQL interface. At the most basic level, after executing a GraphQL
    mutation , validate that the queries and subscriptions contain the expected changes.
    Testing a single mutation at a time is unlikely to build the desired confidence.
    User workflows likely span multiple mutations. Consider a system that manages
    invoices. There may be mutations to:


    *   Create an invoice


    *   Submit an invoice for approval


    *   Approve an invoice


    *   Reject an invoice


    *   Archive an invoice


    After creation, invoices may be approved or rejected. Rejected invoices can be
    reapproved. Only rejected invoices may be archived.


    What we really want is to have our property-based test not only generate the inputs
    for creating an invoice, but to also generate the sequence of actions to take.


    This technique gets powerful. What if there is an implementation edge case where
    archival fails after an invoice has been submitted for approval multiple times?
    Is that scenario one that you may have written as an example-based test? I suspect
    I would have written a test that verifies the archival of a rejected invoice,
    not considering that the number of rejections may be a trigger for failure.


    By having the property-based test framework generate a series of actions to perform,
    we can simulate the various paths through a system’s workflows that users may
    take. In my own work this has uncovered subtle edge cases in unexpected sequences
    that would have been far more difficult to piece together from a user’s support
    request.


    In order to support testing a series of actions, the property-based tests for
    our system need to be backed by a stateful test oracle . When an action is performed,
    the mutation is sent to the system, as well as the test oracle. The changes the
    mutation implied will be visible in GraphQL queries and subscriptions, and the
    oracle will be consulted to predict what the values will be.


    When writing property-based tests and their associated oracle, it is critical
    that all actions are deterministic. This allows for the replay of a test scenario
    should an expectation fail. As an example, one pitfall that I’ve encountered is
    having the test oracle store state using a Java `HashMap`. Java’s `HashMap` does
    not guarantee an iteration order of its contents, something you may rely on in
    a test to get an “nth” entry from the map. The fix is straightforward, use a `LinkedHashMap`
    instead as it does provide the desired guarantee.


    The system itself also needs to be deterministic, but we have already largely
    guaranteed that in the design itself. Mutations are handled by the command generator,
    which ultimately appends a command to the command log. The order of commands within
    the command log defines the order that they will be processed in. In the face
    of concurrent mutations, this is where order is established. After the command
    generator, all processing is ordered, whether it is consuming from the command
    log in the command processor, appending to the event log, or consuming from the
    event log in the event materializer. The tests can execute mutations sequentially,
    knowing that they will be generating the possible orders that could be seen when
    deployed due to concurrent requests.


    The design itself is deterministic. What may not be is any work that is done within
    the command generator that consults external systems in order to create commands.
    You will need to solve this for your system, and the solution will vary based
    upon what the work is. A possibility is to treat the response from the external
    system as another input to the action that requires it. When the test executes
    the action, it can use a side channel to communicate to the stub implementation,
    telling it what its next response should be.


    In practice, I use property-based tests to validate what I *think* is the happy
    path through the system. The generated series of actions to take is *expected*
    to always result in successful mutations. My reasons are two-fold. First, I don’t
    care about the full universe of invalid values. If the creation of an invoice
    has a constraint that the invoice date can’t be in the past, is there value in
    testing all possible past dates? Personally, I don’t gain additional confidence
    in the system by doing so. I am happy to rely on my knowledge of how the check
    is implemented. Second, more practically, it simplifies the test and oracle implementations.
    The generated inputs are constrained to match the system’s rules and the oracle
    doesn’t need to be able to predict errors. If a mutation from the property-based
    test of the system fails, the diagnosis is straightforward. The generation of
    the input values wasn’t properly constrained, which should be straightforwardly
    visible from the error message, or the test found a genuine problem in the system.


    An additional benefit of testing at this level is the ability to evolve the internals
    of the system. With the tests anchored to the system’s external contracts , there
    is more freedom to evolve the internals of the system. You can ensure that internal
    system changes that should have no external impact don’t have one by cross-checking
    your changes with an absence of changes to the tests.


    Property-based testing is powerful, but it isn’t a panacea for all testing needs.'
  trans: '

    一旦创建了测试预言机，其复用成本极低。维护数十个（更不用说数百个）基于示例的测试用例将变得繁琐。基于属性的测试可以使用数千个随机生成的输入（或者，对于来自可枚举有限集的输入，可以使用所有可能的输入）来运行。其限制因素在于测试运行时间与通过额外输入所增加的信心之间的平衡——你可以根据自身环境和风险承受能力来调整这一平衡。


    当基于属性的测试框架生成输入时，它们通常会提供用于生成特殊值的钩子。特殊值是指那些可能引发边界情况的值，例如零、空值，或有符号数的最小值和最大值。这些特殊值钩子确保它们以更高的概率被纳入随机生成的输入中。


    能够用比我手动管理更多的场景来测试业务逻辑，对于建立对系统的信心极为强大。下一节将解释如何为我们的系统实现这一点。


    ## 使用基于属性的测试


    我们将使用基于属性的测试来验证系统相对于暴露的 GraphQL 接口的行为。在最基本的层面上，在执行 GraphQL 变更操作后，验证查询和订阅是否包含预期的更改。一次只测试一个变更操作不太可能建立起所需的信心。用户工作流可能跨越多个变更操作。考虑一个管理发票的系统。可能存在以下变更操作：


    *   创建发票

    *   提交发票以供审批

    *   批准发票

    *   拒绝发票

    *   归档发票


    创建后，发票可以被批准或拒绝。被拒绝的发票可以重新批准。只有被拒绝的发票才能被归档。


    我们真正想要的是让基于属性的测试不仅生成创建发票的输入，还要生成要执行的操作序列。


    这项技术变得非常强大。如果存在一个实现边界情况，即发票在多次提交审批后归档失败，该怎么办？这个场景是你可能已经编写为基于示例的测试的吗？我猜想我可能会编写一个测试来验证被拒绝发票的归档，而没有考虑到拒绝次数可能是触发失败的因素。


    通过让基于属性的测试框架生成一系列要执行的操作，我们可以模拟用户可能采取的系统工作流中的各种路径。在我自己的工作中，这揭示了在意外序列中出现的微妙边界情况，而这些情况如果仅通过用户的支持请求来拼凑，将会困难得多。


    为了支持测试一系列操作，我们系统的基于属性的测试需要由一个**有状态的测试预言机**来支撑。当执行一个操作时，变更操作会被发送到系统以及测试预言机。该变更操作所隐含的变化将在
    GraphQL 查询和订阅中可见，并且预言机将被用来预测这些值。


    在编写基于属性的测试及其关联的预言机时，至关重要的是所有操作都必须是**确定性的**。这允许在预期失败时重放测试场景。例如，我遇到的一个陷阱是让测试预言机使用
    Java 的 `HashMap` 来存储状态。Java 的 `HashMap` 不保证其内容的迭代顺序，而你可能在测试中依赖它来从映射中获取“第 n 个”条目。修复方法很简单，改用
    `LinkedHashMap`，因为它确实提供了所需的保证。


    系统本身也需要是确定性的，但我们已经在设计本身中很大程度上保证了这一点。变更操作由命令生成器处理，它最终会将一个命令追加到命令日志中。命令日志中命令的顺序定义了它们将被处理的顺序。在面对并发变更操作时，这就是建立顺序的地方。在命令生成器之后，所有处理都是有序的，无论是在命令处理器中消费命令日志、追加到事件日志，还是在事件物化器中消费事件日志。测试可以顺序执行变更操作，知道它们将生成由于并发请求而在部署时可能出现的各种顺序。


    设计本身是确定性的。但命令生成器内部为了创建命令而咨询外部系统所执行的任何工作可能不是确定性的。你需要为你的系统解决这个问题，解决方案将根据具体工作内容而有所不同。一种可能性是将来自外部系统的响应视为需要它的操作的另一个输入。当测试执行该操作时，它可以使用一个侧信道与桩实现通信，告诉它下一个响应应该是什么。


    在实践中，我使用基于属性的测试来验证我*认为*是系统快乐路径的内容。生成的要执行的操作序列*预期*总是导致成功的变更操作。我的理由有两个。首先，我不关心所有无效值的完整宇宙。如果创建发票有一个约束，即发票日期不能是过去的日期，那么测试所有可能的过去日期是否有价值？就个人而言，这样做并不会让我对系统获得额外的信心。我很乐意依赖我对检查如何实现的知识。其次，更实际地说，它简化了测试和预言机的实现。生成的输入被约束以匹配系统的规则，并且预言机不需要能够预测错误。如果来自系统基于属性测试的变更操作失败，诊断是直接的。输入值的生成没有被正确约束（这应该从错误消息中直接可见），或者测试发现了系统中的真正问题。


    在这个级别进行测试的另一个好处是能够演进系统的内部结构。由于测试锚定在系统的**外部契约**上，因此有更多自由来演进系统的内部结构。你可以通过交叉检查你的更改与测试没有变化，来确保那些应该没有外部影响的内部系统更改确实没有产生影响。


    基于属性的测试很强大，但它并不是满足所有测试需求的万能药。

