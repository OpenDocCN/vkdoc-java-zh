- fmt: '### Message Driven


    This is my favorite property, as well as the most important. Our metaphorical
    pipes don’t contain a continuous stream. The stream is atomized into discrete
    messages.


    Messages already exist in your system, that’s how it receives its inputs. The
    Internet is a packet-switched network; packets are messages. Any higher-level
    abstraction is ultimately composed of messages.


    Abstracting a sequence of messages into a continuous stream has its uses, such
    as the exchange of large files. I believe its valuable to defer this abstraction
    until it is really needed, which for our business applications, may never occur.
    Retaining control over the flow of discrete messages gives us units that can be
    explicitly managed.


    Messages themselves aren’t enough, it is the way they are exchanged, *asynchronously*.
    It is the combination of *asynchronous* **and** *message passing* that is key
    to this property.


    Synchronous execution of code is an illusion on modern computers. We will eschew
    that fiction and embrace the reality that our code doesn’t need to block and wait
    for a response, we gain control over how failures are managed. We can represent
    them as more messages.


    In passing messages asynchronously, a boundary is introduced behind which implementation
    details can be abstracted.


    Imagine sending an HTTP request to a server identified by a DNS name. When making
    the request, you don’t know, or frankly care, where the receiving server is located.
    All that ultimately matters is the receipt of a response.


    It is the same principle that is applied to the communication into and inside
    of our system. This is *location transparency*. A component is not concerned with
    where the recipients of its messages reside. They could be co-located in the same
    process, another process on the same machine, or somewhere else entirely. This
    allows for flexibility in the systems architecture. A component can move about
    without disrupting how callers interact with it.


    If you have experience with the Spring Framework, or more broadly Dependency Injection,
    you have been introduced to this idea. Dependency injection is when a given component
    in a system doesn’t have fixed references to other components that it collaborates
    with. Instead, other components that it requires, are injected by a control plane,
    or a framework such as Spring.


    Dependency Injection is a specialization of a more general idea, [inversion of
    control](https://web.archive.org/web/20040202120126/http:/www.betaversion.org/~stefano/linotype/news/38/).^([⁹](#fn9))
    Rather than a component controlling its dependencies, it has relinquished that
    to the control plane. The goal is isolation of the component, and dependency injection
    is a means of achieving that.


    Asynchronous message passing is also a form of control inversion. Rather than
    injecting classes or interfaces that are needed, communication channels, our pipes,
    are injected.


    In using this mechanism to communicate between components, we are establishing
    bulkheads for resiliency. They are also points where a tee can be injected for
    elasticity. We are also creating points for observing the system. By observing
    the messages passed between components, we can gain an understanding of how the
    system is behaving.


    If a component is receiving messages faster than it can process them, it can apply
    back-pressure. Back-pressure is a feedback mechanism where a message consumer
    can indicate to the producer that they are unable to accept additional message.
    This allows the producer to decide how to handle the situation, can be a signal
    for implementing elasticity, or shedding load in order to maintain resiliency.


    ## Composing a Reactive System


    A beauty I find in a reactive system is that it can be “turtles all the way down.”
    In having a uniform method for components to communicate, via asynchronous message
    passing, this location transparency allows for the system to evolve without major
    changes. A component can start its life in-process with other components that
    it collaborates with. Over time, perhaps there’s a need for that component to
    live on another machine. It’s not a breaking change to its collaborators, as the
    means with which they communicate is the same. Nothing is free, perhaps there
    will be new latency concerns, or a new class of failures that need to be handled,
    but the basic principle stands.


    The metaphor of interlocking bricks such as the popular LEGO™ brand line has been
    long used for the composition of components in a modular software architecture.
    While I find value in this metaphor with its brick-centric view of how components
    can be easily “snapped together” to achieve a goal, the metaphor minimizes what
    has made LEGO™ bricks an enduring toy: the uniformity of how they connect.


    To push this analogy further, during my formative years when I’d pass time building
    with my LEGO™ bricks, intermixed with our official parts were a handful of Tyco
    Super Blocks. Tyco’s bricks were nominally compatible with LEGO™, but they didn’t
    fit together the same as the genuine parts.


    From a functionality standpoint of being a brick that supported my creation, they
    were functional. But, since they failed in the *interface uniformity*, they were
    often a weak point in a larger design.


    This is the similarity with a reactive system. By having a uniform interface for
    communication between components, the resulting system is stronger, more resilient,
    by virtue of that decision.


    Each interconnection between components in your system is an extension point where
    the data flow may be manipulated, whether it is to increase elasticity or provide
    additional resiliency. The extension point exists, even if goes unused. Since
    the extension point is due to the uniform interface, any cost associated with
    it has been amortized across the codebase. As it was not created solely for this
    location in the code, it approaches the ideal of a zero-cost feature.


    Whether turtles or bricks, the uniformity is in how each component behaves when
    observed externally, following and guided by these properties of a reactive system.


    ## Summary


    These four properties define a reactive system. It is one that relies on asynchronous
    message passing for communication, which helps enable elasticity and resiliency,
    all in the service of remain responsive to its users. The act of passing messages
    is a form of a data flow, a long-standing technique in programming.


    In the next chapter, we will discuss why design a business application as a reactive
    system.


    Footnotes [1](#511062_1_En_3_Chapter.xhtml#Fn1_source) [2](#511062_1_En_3_Chapter.xhtml#Fn2_source)


    # 4. Why Build Business Applications As Reactive Systems?


    We now have a shared understanding of what defines a business application, and
    what is a reactive system. In this chapter, we will explore the benefits of building
    business applications as reactive systems. As a part of defining a business application,
    we touched on a business’s expectations from the application. I will start this
    chapter by expanding upon those expectations, as well as your expectations as
    a developer. I will then again go through the four properties of a reactive system,
    and explicitly relate them to business and developer expectations. After that,
    you will know the answer to the question posed in the title: Why build business
    applications as reactive systems?'
