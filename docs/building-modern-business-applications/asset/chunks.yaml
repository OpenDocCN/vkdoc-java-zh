    \ MutationResult = MutationSuccess | MutationFailed\ninput CreateCustomerInput\
    \ {\n  name: String!\n}\ntype Mutation {\n  createCustomer(input: CreateCustomerInput!):\
    \ MutationResult\n}\n```\n\n在这个例子中，关于新客户名称存在一些业务规则。为了在违反这些规则时通知调用方，我们使用了特定的 `InvalidCustomerName`\
    \ 类型。我还为 `MutationFailureCode` 枚举添加了一个值 `DUPLICATE_REQUEST_ID`。此代码可用于标识重复的 `requestId`\
    \ 值，这是本章前面讨论过的一个主题。\n\n当变更操作成功处理命令时，只需要返回一条信息：最终事件的序列号。这便产生了一个简单的 `MutationSuccess`\
    \ 类型：\n\n```graphql\ntype MutationSuccess {\n  visibleAsOfRevision: Int!\n}\n\
    ```\n\n这种模式与其他关于如何设计 GraphQL 变更的建议有所不同。这是有意为之，因为我们的系统是一个事件驱动系统。命令的成功处理*并不*意味着视图已经更新；那是事件物化器的职责，也是下一章的主题。\n\
    \n这*确实*意味着系统的最终一致性本质暴露在了外部。我相信这其中蕴含着力量。设计原则之一是实现实时的 UI 更新。使用 GraphQL 时，这可以通过 GraphQL\
    \ 的订阅机制来实现。如果调用方有一个活跃的订阅，然后提交了一个变更，则无需在直接响应变更时反映任何数据更改。当视图更新后，已建立的订阅将传递这些更改。通过在视图模型中包含事件序列号，调用方可以将这些值与\
    \ `visibleAsOfRevision` 变更结果进行比较，从而了解变更何时已被纳入视图。\n\n## 命令与其他必需数据\n\n变更的输入可能并不总是包含构建命令所需的全部信息。由于命令处理器的变更函数必须是纯函数，任何额外的处理都需要在创建命令并将其提交处理之前进行。\n\
    \n提交命令之前执行的工作应该是可安全重试的。如果网络中断，客户端可能会重新提交变更，导致命令创建过程中执行的任何工作被重新执行。\n\n这个阶段应被视为对接收到的数据进行丰富，以满足第一类业务规则（即针对静态数据的规则）。任何业务规则的副作用都应在命令成功处理之后发生。\n\
    \n例如，考虑一个接受表格数据的变更。一种方法是使用输入对象数组将数据分解为行和列。但是，如果数据是由用户在电子表格中编写的呢？让用户将电子表格上传到系统并由系统提取表格数据可能更有意义。该提取将作为命令生成的一部分发生。\n\
    \n另一个例子是文件上传，其中文件的内容与系统无关。命令生成器可以接收文件并将其内容存储到对象存储中，例如 Amazon 的 S3。然后，命令仅包含对对象存储的引用。\n\
    \n## 处理失败\n\n命令生成和提交可能因多种方式失败。我在本章中已经提到了其中两种：对 GraphQL 模式中无法表达的约束进行输入验证，以及客户端提供的幂等令牌\
    \ `requestId`。\n\n根据输入参数创建命令的失败机会将取决于过程的性质和复杂性。除了处理无效输入外，失败很可能源于实现中的软件错误，测试可以帮助缓解这些问题。\n\
    \n如果命令日志无法接受写入，则将新命令追加到命令日志可能会失败。这种失败应作为系统不可用的情况进行传达，以便客户端可以重试其请求。\n\n还有两种情况我们可能希望主动引发失败：乐观锁的实现和超时。\n\
    \n### 乐观锁\n\n在对数据进行更改时，用户知道当前状态。这在多用户系统中会失效。如果两个用户同时更改同一份数据会怎样？在我们的系统中，其命令第二个被追加到命令日志的用户将“获胜”。第一个更改并未“丢失”，因为事件会持久化在事件日志中。当这种情况发生时，对于进行第一个更改的用户来说将是意外的，因为他们如果知道第二个更改，可能会采取不同的操作（反之亦然）。幸运的是，在我们的系统中有一个直接的解决方案：乐观锁。\n\
    \n乐观锁的前提是通过跟踪数据是否同时被修改来避免对排他锁的需求。在我们基于请求/响应的系统中，我们需要一个调用方可以为其变更提供的值，以便系统能够确定数据是否已被更改。我们可以使用事件日志轻松地为我们的系统生成这样一个值。它已经是顺序的，这是其正确性的一个基本属性。每个事件都会被分配一个递增的数字，即序列号。然后，你提供给命令处理器的函数可以利用这个值。当应用函数将事件应用于状态以产生新状态时，它也可以将事件的序列号存储在状态中。你的事件物化器（将在下一章中描述）可以使此序列号在你的\
    \ GraphQL 模式中可见。这将允许调用方知道模式中某条数据的最后修改版本（内部是序列号）。然后，此版本号可以作为另一个输入参数传递给变更，以指示用户在做出更改时所查看的版本。从变更的角度来看，更改是“基于”特定版本进行的。它可以作为“基于版本”存储在命令的信封中。最后，命令处理器中的变更函数可以利用此值来检查相关状态是否具有比提供的基于版本更大的序列值。\n\
    \n此检查可以根据你系统的需要，可以是粗粒度的，也可以是细粒度的。你也可以强制客户端使用它，或者允许其检查是可选的。如果此检查失败，则是一个主动引发的失败。将这些失败与其他失败区分开来对调用方很重要，因为需要用户干预来确定下一步的行动方案。用户可能会决定使用更新的基于版本重新提交其变更，或者他们可能完全放弃更改。"
- fmt: '### Timeouts


    在这样一个最终一致性的系统中，防止“最终”变得过于遥远至关重要。系统的用户看重确定性的响应时间，即使响应是失败。虽然我们无法预防所有可能发生的故障，但可以通过使用超时来提供有界等待时间。这确保了响应能力，这是我在第[3](#511062_1_En_3_Chapter.xhtml)章中讨论过的一个原则。


    在命令生成器中有两个地方需要强制实施超时：提交命令和等待命令处理器对命令的处理结果。向调用者区分这两种失败是有益的，因为他们针对每种失败所采取的补偿措施是不同的。


    如果在等待命令处理器时发生超时，我们知道命令已成功提交。如何处理这种失败取决于你观察到它的频率以及向用户呈现它的关键程度。这里简单的解决方案是不做任何补偿。是的，发生了超时，但系统最终能够恢复并处理变更。如果调用者最终是系统的人类用户，他们可能已经继续他们的工作，而观察到变更就足以让他们决定是否手动重试。如果变更是由另一个系统发起的，或者它是一个需要用户明确观察成功的工作流的一部分，那么就需要更复杂的方法。`requestId`值将用于添加一个新的
    GraphQL 查询，该查询返回请求的`MutationResult`。我在本章前面提到过，命令放入的信封可以重复用于最终处理后的命令。这意味着`requestId`在处理后的命令上也是可用的。前面描述的快乐路径是使用命令信封上的每个命令唯一值来过滤已处理的命令。由于处理后的命令信封也将包含`requestId`，因此已处理的命令也可以通过此值进行过滤。然后客户端可以轮询这个新查询以观察命令的处理结果。这个新查询也应该有一个超时，因此调用者需要准备好根据需要重试。另一种方法是使用
    GraphQL 订阅。订阅签名将与查询相同。使用订阅的好处是，订阅的传输层在连接空闲时可能具有保活机制，允许调用者区分等待响应与系统无响应。


    对于提交命令时的超时，调用者将不知道提交是否成功。本章前面讨论过的解决方案是`requestId`。调用者可以再次调用变更操作，提供相同的`requestId`值。这次后续尝试的结果将提供关于第一次尝试的信息。如果尝试成功，则先前的命令未被成功提交。如果尝试因`requestId`重复而失败，则调用者知道先前的命令已成功提交。


    命令提交超时后，由于`requestId`已被使用而导致的失败意味着命令*确实*被成功提交了。在这种情况下，调用者可以使用我描述的处理超时的相同机制来确定命令的处理结果。


    ## 测试命令生成器


    命令生成器可以分为两部分来考虑。首先，是用于命令提交和等待命令处理器结果的通用基础设施；其次，是将变更输入转换为命令的领域逻辑，即命令的创建。


    ### 命令提交


    提交命令并等待处理结果的行为是一种与领域逻辑分离的机械性操作。我喜欢这样的过程，因为它们提供了应用程序基础设施与业务规则之间的关注点分离。此过程的规则是严格且有限的。只有一个输入数据有规则，那就是`requestId`。


    在为此过程编写测试时，我喜欢使用与当前业务问题无关的虚构领域中的命令。这确保了对领域类型的更改不会对我的这部分代码库产生任何影响，而且作为额外的好处，还提供了一个找点乐子的机会。我经常通过使用与我的宠物相关的例子来个性化我的测试。对于命令提交，测试中使用的命令可能与收养新宠物有关，通常使用我多年来养过的宠物的名字和类型。


    在测试命令提交时，我会为提交命令和过滤已处理命令编写一个快乐路径测试。我不会为这些测试使用真正的命令处理引擎，而是使用我可以在测试中控制的桩实例。我重视创建代表系统这些组件之间
    API 契约的接口。使用 API 接口的子实现强化了系统这些组件之间的关注点分离以及对它们之间耦合的严格控制。


    测试此过程的失败模式也很重要。你创建的桩实现应该支持故障注入，以便你可以确保系统在发生故障时按预期运行。快乐路径测试将在第[12](#511062_1_En_12_Chapter.xhtml)章描述的测试中得到充分练习。那些测试不太可能暴露在生产环境中可能观察到的失败模式，而确保调用者在面对失败时有良好的体验对于提供一个响应迅速且有弹性的系统至关重要。'
  raw: '### Timeouts


    In an eventually consistent system such as this one, it is important to prevent
    eventually from being too far into the future. Users of the system value a deterministic
    response time, even if the response is a failure. While we can’t prevent all failures
    that could occur, we can provide bounded wait times by using timeouts. This ensures
    responsiveness, a principle I discussed in Chapter [3](#511062_1_En_3_Chapter.xhtml).


    There are two places in the command generator to enforce timeouts: the submission
    of a command and awaiting the command’s disposition from the command processor.
    It is beneficial to distinguish these two failures to callers, as the compensating
    action they will perform is different for each.


    If there is a timeout awaiting the command processor, we know that the command
    was successfully submitted. How to handle this failure will depend upon the frequency
    at which you observe it and the criticality of surfacing it to your users. The
    simple solution here is to do nothing to compensate. Yes, a timeout occurred,
    but the system was able to eventually recover and process the change. If the caller
    was ultimately a human user of the system, they may have moved on with their work
    and the observation of the change will be sufficient for them to determine whether
    to manually retry. If the mutation is being made by another system, or if it is
    part of a workflow that requires users to explicitly observe success, then a more
    sophisticated approach is warranted. The `requestId` value will be used to add
    a new GraphQL query that returns the `MutationResult` for the request. I mentioned
    earlier in this chapter that the envelope that a command is placed in can be reused
    for the eventual processed command. This means that the `requestId` will also
    be available on the processed command. The happy path described previously was
    to use a per-command unique value on the command’s envelope to filter processed
    commands. Since the processed command envelope will also contain the `requestId`,
    processed commands can also be filtered by this value. This new query can then
    be polled by clients to observe the command’s disposition. This new query should
    also have a timeout, so callers will need to be prepared to retry as necessary.
    Another approach is to use a GraphQL subscription. The subscription signature
    will be the same as the query. The benefit of using a subscription is that the
    transport for subscriptions will likely have a keep-alive mechanism while the
    connection is quiescent, allowing callers to distinguish awaiting a response vs.
    the system being nonresponsive.


    For timeouts submitting a command, callers will not know whether the submission
    was successful or not. The solution for this was discussed earlier in this chapter,
    the `requestId`. Callers can invoke the mutation again providing the same `requestId`
    value. The result of this subsequent attempt will provide information about the
    first attempt. If the attempt succeeds, the prior command wasn’t successfully
    submitted. If the attempt fails due to duplicate `requestId`, then the caller
    knows that the prior command was successfully submitted.


    A command submission timeout followed by a failure due to an already used `requestId`
    means that the command *was* successfully submitted. In this scenario, callers
    can use the same mechanism I described for processing timeouts to determine the
    command’s disposition.


    ## Testing the Command Generator


    The command generator can be thought of in two parts. First, the generic infrastructure
    for command submission and awaiting the result of the command processor, and second,
    your domain logic for converting mutation inputs into a command, the creation
    of a command.


    ### Command Submission


    The act of submitting a command and waiting for the processing result is a mechanical
    action divorced from your domain logic. I like processes such as these as they
    provide a separation of concerns between application infrastructure and business
    rules. The rules for this process are strict and limited. There is only one piece
    of input data that has a rule, the `requestId`.


    When writing tests for this process I like to use commands from an imaginary domain
    unrelated to the business problem at hand. This ensures that changes to domain
    types won’t have any changes to this portion of my codebase, and as a bonus provides
    an opportunity for a bit of fun. I’ll often personalize my tests a bit by using
    examples related to my pets. For command submission, the commands used in test
    could relate to adopting new pets, usually using the names and types of pets I’ve
    had over the years.


    When testing command submission, I will write a happy-path test for submitting
    a command and the filtering of processed commands. I will not use a real command
    processing engine for these tests, instead using stub instances that I can control
    in test. I value the creation of interfaces that represent the API contracts between
    these components of the system. The act of using sub implementations of the API
    interfaces reinforces a separation of concerns between these components of the
    system as well as strict control of the coupling between them.


    It is also important to test the failure modes of this process. The stub implementations
    you create should support failure injection so you can ensure that the system
    will behave as expected when failures occur. The happy-path testing will be well
    exercised by the testing I describe in Chapter [12](#511062_1_En_12_Chapter.xhtml).
    Those tests are unlikely to expose the failure modes that may be observed in production
    and ensuring that callers have a good experience in the face of failure is important
    toward providing a responsive and resilient system.'
