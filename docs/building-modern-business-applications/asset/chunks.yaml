    about it in his 1999 book *Extreme Programming Explained.* ^([⁷](#fn7))


    The crux of the idea is to write tests for functionality prior to implementing
    the functionality itself. At first, the test should run and fail, as the functionality
    hasn’t been implemented. From then on, the goal is to make the test pass.


    I’ve found this practice to be immensely valuable, as it puts me in the position
    of being a consumer of my code prior to writing it. The act of writing the test
    helps focus on what’s important from an API perspective, and how the code should
    communicate with the rest of the codebase. I feel it helps create code that is
    easier to maintain as well. The act of writing a test before implementation somehow
    leads to a more thoughtful design. That design is more amenable to future change.
    I’m certain the fact that the code has tests helps maintainability, as changes
    can be made with confidence. However, I’ve found that there is a difference between
    code that had tests written prior to implementation and tests after. Empirically,
    I’ve seen it work and have become a believer in the practice . Tests need to be
    written regardless to validate that code works, so why not write them first?


    ### Continuous Integration and Delivery


    Continuous Integration and Continuous Delivery, CI/CD , are two more XP practices.
    They are distinct yet interrelated. When combined, they formalize the delivery
    pipeline for software. CI has become a standard practice. If your project utilizes
    a build server that compiles your project and runs tests after code pushes, you
    are practicing CI. To move into CD, the build server should also package the software
    up for deployment, perhaps even automating the deployment itself.


    When practiced together, CI/CD allows you to push a change to your repository,
    and without any additional manual intervention have it running in your test environment.
    This can also be extended to promote builds into production automatically, although
    most business environments that I’ve worked in have preferred to have a human
    in the loop for that part, even if it is the simple act of clicking a button.


    I find value in these practices as they complete the feedback loop. The test environment
    that exists on a build server is not the same as a deployed environment. This
    “pipeline” approach for delivering the software itself will be echoed in how we
    will be structuring the internals of our modern business application . There is
    also an element of a philosophical thought experiment here, akin to “If a tree
    falls in a forest and no one is around to hear it, does it make a sound?” – “If
    the software was changed but it was never deployed, was it ever really changed?”.
    One refrain I will keep coming back to is that an application should be amenable
    to change. Easily getting those changes into the hands of users is crucial to
    this goal.'
