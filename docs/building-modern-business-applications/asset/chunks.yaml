    a mutation and experiences a network interruption and is unsure if it was accepted
    by the system, they should resend the request with the *same* ID.


    An ideal location for checking whether a `requestId` has been previously observed
    is when attempting to append the command to the command log. By having the command
    log also track that set of observed IDs, duplicate requests can be detected.


    If a duplicate request is observed, how should the system behave? I lean toward
    treating it as a failure for the duplicate request. The caller knows whether they
    have retried a request. If a retried request fails because the `requestId` has
    already been used, the caller has the context to understand what occurred. If
    this failure occurs for a request that the caller hasn’t repeated, there is something
    else afoot that will need to be investigated. Perhaps there is a logic error in
    the system, or the generation of IDs across clients isn’t sufficiently unique.


    If an expected duplicate request is observed, how can the caller learn of the
    disposition of the original request? The `requestId` is a unique identifier that
    can be used to look up the prior disposition. My preferred mechanism is to have
    a query that can be called to return the disposition of any prior `requestId`.
    The alternative is to have the duplicate request return a variation upon the success
    case, a “this request has already been executed.” The frequency at which this
    occurs will likely guide your choice. For business applications that are usually
    used by users that are in relatively fixed locations , duplicate requests due
    to network disruptions will be rarer compared to a business application used on
    a mobile device.


    ### Returning the Mutation Result


    The final step of the mutation flow is to return the result of the mutation to
    the caller. After successfully appending the command to the command log, it will
    become visible to the command processor. As described in the prior chapter, there
    is an additional message log, the processed command log, that directly relates
    a command to its result. This message log will be temporarily subscribed to in
    order to observe the mutation result.


    There is a *critical* timing nuance here. Your code needs to subscribe to the
    processed command log *before* appending the command to the command log. If the
    order is reversed, you risk missing the event if the command processor completes
    before the processed command log subscription is active.


    The processed command log contains results for all commands. We need a mechanism
    to filter the results for the command we have appended. The interaction with our
    caller is a request/response interaction, and that is the same pattern that is
    used with the command processing engine. However, with the command processing
    engine, it is indirect as we are appending to one message log and observing the
    result on another. My solution is to use the envelope pattern.


    The envelope pattern is when you wrap your messages in an envelope, just as you
    would when sending a letter using the postal service. The command log doesn’t
    contain commands, it contains commands wrapped in envelopes. When the command
    processor processes a command and appends to the processed command log, it *reuses*
    the envelope that the command arrived in. Since there is a one-to-one relationship
    between commands and processed commands, this is a straightforward operation.
    Reusing the envelope with the event log would be tricker, as a command can generate
    multiple events. We would then need policies for how to safely duplicate envelopes,
    complexity that I prefer to avoid if possible.


    With the envelope pattern in place, the command generator can place a unique identifier
    (such as a UUID) on the envelope prior to appending to the command log. The processed
    command log results can then be filtered by this identifier to find the processed
    command that corresponds to our command. This is a distinct value from the `requestId`,
    as it is globally unique within the system. It identifies a specific command,
    even if the command is a logical duplicate due to the reuse of the `requestId`.


    A processed command contains the sequence number corresponding to our command,
    the maximum sequence number for any generated events, and the result of the command,
    whether it succeeded or failed. This information will be used to construct the
    mutation result.


    Failures will be communicated to callers via types in the GraphQL schema rather
    than using GraphQL’s error mechanism . This is because errors in GraphQL are *untyped*.
    The GraphQL specification defines how errors appear in a response, but there are
    no facilities for describing their structure. I view this as a steering mechanism.
    Mutation failures will ultimately need to be communicated to users. As a business
    application, there will be mutations that fail because the change would violate
    the system’s business rules. When this situation happens, it is critical to communicate
    as much detail about the violation to users, so they understand the nature of
    the violation and can correct the input.


    I prefer to structure the return type of my mutations as a union between success
    and failure:


    ```

    union MutationResult = MutationSuccess | MutationFailed

    ```


    The `MutationFailed` type is a container to hold additional details. Just as how
    your data is modeled in the GraphQL schema , the ways in which your business rules
    can be violated should be modeled in the schema.


    My preferred mechanism is to have an enumeration that indicates a class of errors,
    and then a field that implements an interface with more specific details. Recall
    the example from earlier in this chapter:'
  trans: '

    ### 追加到命令日志


    命令创建后，需要追加到命令日志中，以便命令处理引擎对其执行操作。正是在这里确定了命令的顺序。如果系统同时收到两个变更请求，它们被追加到命令日志的顺序将决定它们被处理的顺序。


    追加命令的操作也是执行另一项验证（即拒绝重复请求）的机会。设想一个场景：调用方发送了一个变更请求，但随后遇到网络中断，无法收到响应。调用方如何确保其请求已被处理？如果调用方重新发送请求，该请求可能带来的副作用将是不希望重复的。我们需要一种机制来允许客户端请求是*幂等*的。严格按部就班的幂等性对于变更操作是不可行的，因为变更的意图就是产生副作用。多次调用同一个变更以触发多次副作用，这是一个有效的场景。为了处理这两种情况（有意和无意地重复变更），我们将为每个变更引入一个新参数：客户端请求标识符。


    客户端请求标识符，缩写为`requestId`，是一个对于每个逻辑请求都唯一的值。如果客户端打算调用一个变更五次，他们需要提供五个不同的 ID。然而，如果客户端调用了一个变更但遇到网络中断，不确定系统是否已接受该请求，他们应该使用*相同*的
    ID 重新发送请求。


    检查`requestId`是否之前已被观察到的理想位置，是在尝试将命令追加到命令日志时。通过让命令日志也跟踪已观察到的 ID 集合，可以检测到重复请求。


    如果检测到重复请求，系统应如何表现？我倾向于将其视为重复请求的失败。调用方知道他们是否重试了请求。如果重试的请求因为`requestId`已被使用而失败，调用方有上下文来理解发生了什么。如果这个失败发生在调用方没有重复的请求上，那就说明有其他问题需要调查。可能是系统中存在逻辑错误，或者跨客户端生成的
    ID 不够唯一。


    如果观察到了预期的重复请求，调用方如何得知原始请求的处理结果？`requestId`是一个唯一标识符，可用于查找先前的处理结果。我偏好的机制是提供一个查询，可以调用该查询来返回任何先前`requestId`的处理结果。另一种方案是让重复请求返回成功情况的一个变体，即“此请求已被执行”。这种情况发生的频率可能会指导你的选择。对于通常由位置相对固定的用户使用的业务应用，与在移动设备上使用的业务应用相比，因网络中断导致的重复请求会更少见。


    ### 返回变更结果


    变更流程的最后一步是将变更结果返回给调用方。成功将命令追加到命令日志后，该命令将对命令处理器可见。如前一章所述，还有一个额外的消息日志，即已处理命令日志，它直接将命令与其结果关联起来。将临时订阅此消息日志以观察变更结果。


    这里有一个*关键*的时间点细节。你的代码需要在将命令追加到命令日志*之前*订阅已处理命令日志。如果顺序颠倒，你可能会在已处理命令日志订阅激活之前，因命令处理器已完成处理而错过该事件。


    已处理命令日志包含所有命令的结果。我们需要一种机制来过滤出我们追加的命令的结果。与调用方的交互是一种请求/响应交互，这与命令处理引擎使用的模式相同。然而，对于命令处理引擎，它是间接的，因为我们是在一个消息日志上追加，而在另一个消息日志上观察结果。我的解决方案是使用信封模式。


    信封模式是指将你的消息包裹在信封中，就像通过邮政服务寄信一样。命令日志不包含命令，它包含的是包裹在信封中的命令。当命令处理器处理一个命令并追加到已处理命令日志时，它会*重用*命令到达时所用的信封。由于命令和已处理命令之间存在一对一的关系，这是一个直接的操作。在事件日志中重用信封会更棘手，因为一个命令可以生成多个事件。那样我们就需要制定策略来安全地复制信封，这是我希望尽可能避免的复杂性。


    有了信封模式，命令生成器可以在将命令追加到命令日志之前，在信封上放置一个唯一标识符（例如 UUID）。然后，已处理命令日志的结果可以通过此标识符进行过滤，以找到与我们的命令相对应的已处理命令。这是一个与`requestId`不同的值，它在系统内是全局唯一的。它标识一个特定的命令，即使该命令由于`requestId`的重复使用而成为逻辑上的重复命令。


    一个已处理命令包含：与我们的命令对应的序列号、任何生成事件的最大序列号，以及命令的结果（成功或失败）。这些信息将用于构建变更结果。


    失败将通过 GraphQL 模式中的类型传达给调用方，而不是使用 GraphQL 的错误机制。这是因为 GraphQL 中的错误是*无类型*的。GraphQL
    规范定义了错误在响应中如何呈现，但没有提供描述其结构的工具。我将此视为一种引导机制。变更失败最终需要传达给用户。作为一个业务应用，有些变更会失败，因为该更改会违反系统的业务规则。当这种情况发生时，向用户传达尽可能多的违规细节至关重要，以便他们理解违规的性质并可以修正输入。


    我倾向于将变更的返回类型结构化为成功和失败的联合类型：


    ```

    union MutationResult = MutationSuccess | MutationFailed

    ```


    `MutationFailed`类型是一个容器，用于保存额外的细节。就像你的数据在 GraphQL 模式中被建模一样，你的业务规则可能被违反的方式也应该在模式中被建模。


    我偏好的机制是：使用一个枚举来指示错误类别，然后使用一个字段来实现一个包含更具体细节的接口。回想一下本章前面的例子：

    '
- fmt: '```graphql

    input CreateCustomerInput {

    name: String!

    }

    input UpdateCustomerRegionInput {

    customerId: ID!

    regionId: ID!

    }

    type Mutation {

    createCustomer(input: CreateCustomerInput!): Boolean

    updateCustomerRegion(input: UpdateCustomerRegionInput!): Boolean

    }

    ```


    Rather than returning a `Boolean`, it can be structured like the following:


    ```graphql

    enum MutationFailureCode {

    DUPLICATE_REQUEST_ID

    BUSINESS_RULE_VIOLATION

    UNKNOWN

    }

    interface MutationFailureDetails {

    message: String

    }

    type GenericMutationFailureDetails implements MutationFailureDetails {

    message: String

    }

    type InvalidCustomerName implements MutationFailureDetails {

    message: String

    }

    type MutationFailed {

    code: MutationFailureCode!

    details: MutationFailureDetails

    }

    union MutationResult = MutationSuccess | MutationFailed

    input CreateCustomerInput {

    name: String!

    }

    type Mutation {

    createCustomer(input: CreateCustomerInput!): MutationResult

    }

    ```


    In this example, there are business rules around a new customer’s name. In order
    to communicate to callers when these rules are violated, a specific `InvalidCustomerName`
    type is used. I also added a value to the `MutationFailureCode` enumeration, `DUPLICATE_REQUEST_ID`.
    This code can be used to signal duplicate `requestId` values, a topic discussed
    earlier in this chapter.


    When a mutation results in successful command processing, there is only one piece
    of information to return: the sequence number of the final event. This yields
    a straightforward `MutationSuccess` type:


    ```graphql

    type MutationSuccess {

    visibleAsOfRevision: Int!

    }

    ```


    This pattern differs from other recommendations on how to design GraphQL mutations.
    This is intentional as our system here is an event-driven one. The successful
    processing of the command does *not* mean that the view has been updated; that’s
    the responsibility of the Event Materializer, the topic of the next chapter.


    This *does* mean that the eventually consistent nature of the system is exposed
    externally. I believe there is power in that. One of the design principles is
    to enable real-time UI updates. When using GraphQL, this is accomplished by using
    GraphQL’s subscription mechanism. If a caller has an active subscription and then
    submits a mutation, there is no need to reflect any data changes in direct response
    to the mutation. When the view has been updated, the established subscription
    will relay the changes. By including event sequence numbers in the view model,
    callers can compare those values to the `visibleAsOfRevision` mutation result
    to know when the mutation’s changes have been incorporated into the view.


    ## Commands and Other Required Data


    The input for a mutation may not always contain all the information necessary
    to construct a command. As the command processor’s mutator function needs to be
    a pure function, any additional processing needs to occur prior to creating the
    command and submitting it for processing.


    The work performed prior to submitting a command should be safe to retry. If there
    is an interruption in the network, clients may resubmit a mutation leading to
    re-execution of any work performed in the creation of a command.


    This stage should be thought of as enriching the data received in order to satisfy
    the first category of business rules, those for data at rest. Any business rule
    side effects should occur after the command has been successfully processed.


    As an example, consider a mutation that accepts tabular data. One approach is
    to have the data broken out into rows and columns by using arrays of input objects.
    However, what if the data was authored by users in a spreadsheet? It may make
    more sense to have the users upload the spreadsheet to the system and have it
    extract the tabular data. That extraction would occur as a part of command generation.


    Another example is a file upload where the contents of the file are irrelevant
    to the system. The command generator can receive the file and store its contents
    into an object store, such as Amazon’s S3. The command then contains only a reference
    to the object store.


    ## Handling Failures


    There are multiple ways for command generation and submission to fail. I have
    already touched on two of them in this chapter, input validation for constraints
    that are inexpressible in a GraphQL schema, and the client-supplied idempotency
    token, the `requestId`.


    The failure opportunities for the creation of a command from input arguments will
    depend upon the nature and complexity of the process. Aside from handling invalid
    input, failures are likely to occur from software bugs in the implementation,
    something that tests can help alleviate.


    Appending the new command to the command log could fail if the command log is
    unable to accept writes. This failure should be communicated as the system being
    unavailable so that clients can retry their requests.


    There are also two cases where we may want to induce failures, an implementation
    of optimistic locking and timeouts.


    ### Optimistic Locking


    When making changes to data, users are aware of the current state. This breaks
    down in a multiuser system. What if two users are making changes to the same piece
    of data contemporaneously? In our system here, the user whose command is appended
    to the command log second will “win.” The first change isn’t “lost” because the
    events are persisted in the event log. When this happens it will be unexpected
    for the user that made the first change as they may have taken a different action
    with knowledge of the second change (and vice versa). Fortunately, there is a
    straightforward solution to this problem within our system, optimistic locking.


    The premise of optimistic locking is to avoid the need for exclusive locks by
    tracking whether there are simultaneous modifications to data. In our request/response-based
    system, we need a value that callers can supply for their mutations that allow
    the system to determine whether the data has been changed. We can easily generate
    such a value for our system using the event log. It is already sequential, an
    essential property for its correctness. Every event will be assigned an increasing
    number, the sequence number. The functions you supply to the command processor
    can then make use of this value. When the applicator function applies an event
    to the state to produce a new state, it can also store the sequence number of
    the event in the state. Your event materializer, described in the next chapter,
    can make this sequence number visible in your GraphQL schema. This will allow
    callers to know the last modified revision, internally the sequence number, for
    a piece of data in the schema. This revision number can then be passed as another
    input argument to mutations as a means of indicating what revision a user was
    looking at when making a change. From a mutation perspective, the change is being
    made “as of” a specific revision. It can be stored in the command’s envelope as
    an “as of revision.” Finally, the mutator function within the command processor
    can make use of this value to see if the relevant state has a larger sequence
    value than the provided as of revision.


    This check can be as coarse or fine-grained as your system requires. You can also
    mandate its usage by clients or allow its checking to be optional. If this check
    fails, it is an induced failure. It is important to distinguish these failures
    from others to callers, as user intervention will be required to determine what
    the next course of action will be. A user may decide to resubmit their mutation
    with an updated as-of-revision or they may abandon the change entirely.'
