    引言


    我的第一份工作之一是在一家咨询公司，我们协助客户实现软件现代化。该客户拥有一家成功的企业，销售和支持特定领域的 ERP（企业资源规划）系统。该系统可追溯到
    20 世纪 70 年代，代码使用 BASIC-2C 编写，运行在王（Wang）小型机上。当我在 20 世纪 90 年代末参与其中时，该软件通过模拟器在 Windows
    上运行，其基于文本的界面被困在一个窗口中。公司所有者不想再次被锁定在专有平台上。出于非常前瞻的考虑，我们被明确要求创建一个基于 Web 的用户界面和一个基于
    Java 的后端。


    当我们逐步将模块从旧系统迁移到新系统时，我们收到了用户关于新界面可用性的反馈。旧系统的文本界面允许高级用户快速导航。新的图形界面最初不具备同样的能力。我们添加了广泛的键盘快捷键以简化导航，但界面的本质使我们无法匹配旧系统的体验。现有用户珍视旧系统的原有方式，而新客户则被新的基于
    Web 的界面所吸引。


    这段经历对我而言极具启发性：我的工作性质如何深刻影响他人的工作，以及人们如何对熟悉的事物产生依恋。我也曾依恋熟悉的事物。虽然我们创建的新系统使用了比旧系统更现代的技术和技巧，但其范式在根本上是一样的。在我从事那个系统之后的二十年里，技术和技巧再次发生了变化，但同样的范式依然存在。当我观察到这一点并反思我所做的工作时，我意识到还有其他构建系统的方法。这正是本书要探讨的内容。


    本书首先定义和界定业务应用的范围，然后阐述我对现状的看法。下一部分讨论我认为适用于前瞻性系统的架构原则，以及为什么在构建业务应用时应考虑这些原则。业务应用编码了业务规则，而业务规则会随时间变化。理解这两点都很重要，我分别用一章来阐述。本书的第三部分是我对现代业务应用架构的提议。我描述了我为自己设定的约束以及该架构旨在维护的原则。该架构从概念和数据流的角度进行了详细描述。该架构可以用你喜欢的语言实现。它有技术上的要求，但你可以选择你最熟悉的实现方式。已有生产系统使用此架构，最后一部分是关于我所做的实现选择。最后一章讨论了可以对架构进行的补充以及替代的实现方式。我的目标是展示该架构实际上是系统的起点，而非终点。你的系统将拥有自己的生命周期，并需要以适合其环境的独特方式成长。


    理解本书不需要了解任何特定的计算机语言。熟悉系统构建是有价值的，但也不是必需的。我描述的是*是什么*，而不是*怎么做*，因为我相信前者会随着时间的推移更具持久性。正如我在职业生涯早期所学到的，实现决策会改变，但范式会持久。


    感谢您花时间阅读本书。我希望我的推理能引起您的共鸣。我很想听听您如何将本书中的想法应用到工作中的故事。


    ——皮特


    致谢


    本书中的想法是我职业生涯中遇到的各种概念的融合，其中许多概念的出处已随时间流逝。我珍视每一位花时间写作并与他人分享知识的人，深知他们永远无法完全了解自己产生的影响。


    感谢约翰·卡鲁索和加里·福斯特，没有你们在我职业生涯早期的支持和信任，我就不会走到今天。感谢保罗·哈曼特，你是我思想、灵感和鼓励的源泉。感谢我在 Apache
    软件基金会的所有朋友，特别是早期的 Avalon 和 Cocoon 社区，你们是我无意识的导师，塑造了我思考问题的方式。感谢斯内哈尔·切内鲁和迈克尔·李，没有你们的帮助和支持，我们永远无法构建本书所描述的系统。


    练习巴西柔术塑造了我对持续学习、谦逊和解决问题的看法。感谢我的老师安德烈、桑德罗和克里斯，你们分享知识的方法塑造了我的方法。


    如果没有乔纳森·根尼克联系我，问我是否考虑过写一本书，这本书就不会存在。你有一种远见，认为有些东西值得以比会议演讲更持久的形式分享。你和你在 Apress
    的团队帮助促成了这本书的出版。


    特丽莎、波比和皮克尔斯，感谢你们在我利用夜晚和周末写作时给予的支持。你们是最棒的。


    关于作者

    关于技术审校


    # 第一部分 业务应用


    # 1. 什么是业务应用？


    “现代业务应用”是一个模糊且不精确的术语，会在每个人脑海中唤起不同的意象。在我们开始构建一个这样的应用之前，我需要确保你理解我所说的含义。


    在本章中，我将介绍本书语境下“现代业务应用”的含义。本书的后续内容将依次讨论业务应用的期望属性、这些属性如何体现在系统设计中，并以实现方面的讨论作为结尾。


    我认为开发成功的业务软件的一个关键方面是理解业务。对于本书而言，其推论就是理解什么是业务应用，以便理解我们将要构建什么。'
- fmt: '# Business Software


    In 2001, Watts S. Humphrey started off his book entitled *Winning with Software:
    An Executive Strategy*^([¹](#fn1)) with a chapter on “Why Every Business Is a
    Software Business.” Ten years later, in 2011, Marc Andreessen wrote a piece^([²](#fn2))
    for *The Wall Street Journal* entitled “Why Software Is Eating the World.” Fast-forward
    to 2019, and Microsoft’s CEO Satya Nadella reaffirmed^([³](#fn3)) Watts’ declaration
    with “Every Company Is Now a Software Company” during a discussion at the Mobile
    World Congress.


    The increasing reliance that businesses place on software had been anticipated
    and has come to pass. Nearly all businesses rely on some form of “Commercial Off
    The Shelf” (`COTS`) software, even as the “shelf” is now commonly an “… as a service”
    offering.


    Each business is unique, and their software needs reflect that. However, “software”
    is a broad term. This book is about a specific type of software, “applications.”
    An “application” (or “app”) is software for end users, whether they are a business’s
    employees or customers. While all businesses benefit from software that is customized
    for how they operate, the incremental value to the business relative to what’s
    available as `COTS` generally results in developers such as you and I working
    for larger organizations.


    Let’s break down the attributes that will comprise our definition of “Business
    Application.”


    ## Domain Specific


    A business can be said to operate within a given industry. Industries are very
    broad domains, such as finance, manufacturing, entertainment, etc. At a certain
    size, they generally partition themselves into internal functional areas, or departments,
    such as sales, marketing, accounting, etc. While there are commonalities in a
    given department across all industries, the combination of industry and department
    yields many unique values, as no two businesses conduct themselves in an identical
    fashion. In fact, the way a business internally organizes itself can be an important
    differentiator. Having an internal organization that’s different from its peers
    can be a competitive advantage.


    This is our area of focus, applications that are tailored toward specific departments.
    Some departments, such as accounting, have enough similarity across domains to
    support third-party vendors. Often, such software will have the ability to be
    customized to adapt it to the unique specifics of a business. However, this comes
    with risks, as a critical component of a department’s operation is now in the
    hands of a third party. This relationship has been recognized by financiers, some
    of whom acquire these vendors and slow improvements in the software in order to
    collect lucrative support fees, as without the software the business would falter.


    A mitigation to that risk is for a business to hire or contract software developers
    such as yourself to create these applications. Having full control of the application
    allows the business to control its future. This is the basis for “every company
    being a software company.” What once may have been a competitive advantage has
    now morphed into table stakes.


    ## How It Is Used


    Within this departmental domain, our business applications are ones that act as
    a source of truth for the department. The application is both the “system of record,”
    in addition to the “system of engagement.” It is the system that users interact
    with for data entry, as well as being the authoritative store for that data. In
    very large corporations, there may be a single corporate-wide system (an Enterprise
    Resource Planning system,^([⁴](#fn4)) or `ERP`) that is the system of record,
    delegating the system of engagement to other systems. Those systems are far larger
    than the ones we are focusing on.


    The most straightforward way to capture data into a system of record is to make
    it a job requirement for employees to use the system. Or, in the case of a customer-facing
    system, being the only way to interact with the business. It is important to have
    empathy for the users of these systems. As software developers, if there are annoyances
    with the tools we use daily, in many cases we can modify our tools to remove what’s
    frustrating. For users of business applications where usage of it is a condition
    of performing their job, they do not have that luxury. The responsibility to ensure
    that using an application is, as a minimum, pleasant, falls to us. With information
    captured into an application, the business is then able to use the data in pursuit
    of its goals.


    Data is not captured in a vacuum. Without structure, data can be worse than meaningless,
    creating additional confusion. Based on the business''s current objectives, a
    structure for data can be devised, a model. The rigidity of this model can have
    a direct impact on the business’s ability to adapt to changes in the future. If
    a change in the business requires a change in this model, the application that
    houses this model must then be updated for the business itself to change. Writing
    software in a manner that is amenable to change is valuable and can be under-appreciated.
    There is a balancing act between doing exactly what is required vs. generalizing
    based on what could change in the future. However, there are techniques that,
    to a degree, can side-step this balancing act by taking a different path entirely.
    We will discuss this more in Chapter [4](#511062_1_En_4_Chapter.xhtml).


    Business applications enforce processes and workflows. These workflows describe
    the activities that must be taken based on data in the system, without prescribing
    who performs them. By formalizing them into an application, adherence to them
    is increased or guaranteed. We are focusing on applications that allow users to
    collaborate on workflows. Our business applications are multiuser systems.


    Collectively, requirements on the structure of data and the processes by which
    the data is modified are known as business rules. We will explore business rules
    in depth in Chapter [5](#511062_1_En_5_Chapter.xhtml).'
  raw: '## Business Software


    In 2001, Watts S. Humphrey started off his book entitled Winning with Software:
    An Executive Strategy^([¹](#fn1)) with a chapter on “Why Every Business Is a Software
    Business.” Ten years later, in 2011, Marc Andreessen wrote a piece^([²](#fn2))
    for *The Wall Street Journal* entitled “Why Software Is Eating the World.” Fast-forward
    to 2019, and Microsoft’s CEO Satya Nadella reaffirmed^([³](#fn3)) Watts’ declaration
    with “Every Company Is Now a Software Company” during a discussion at the Mobile
    World Congress.


    The increasing reliance that businesses place on software had been anticipated
    and has come to pass. Nearly all businesses rely on some form of “Commercial Off
    The Shelf ” (COTS) software, even as the “shelf” is now commonly an “… as a service”
    offering.


    Each business is unique, and their software needs reflect that. However, “software”
    is a broad term. This book is about a specific type of software, “applications.”
    An “application” (or “app”) is software for end users, whether they are a business’s
    employees or customers. While all businesses benefit from software that is customized
    for how they operate, the incremental value to the business relative to what’s
    available as COTS generally results in developers such as you and I working for
    larger organizations.


    Let’s break down the attributes that will comprise our definition of “Business
    Application.”


    ## Domain Specific


    A business can be said to operate within a given industry. Industries are very
    broad domains , such as finance, manufacturing, entertainment, etc. At a certain
    size, they generally partition themselves into internal functional areas, or departments,
    such as sales, marketing, accounting, etc. While there are commonalities in a
    given department across all industries, the combination of industry and department
    yields many unique values, as no two businesses conduct themselves in an identical
    fashion. In fact, the way a business internally organizes itself can be an important
    differentiator. Having an internal organization that’s different from its peers
    can be a competitive advantage.


    This is our area of focus, applications that are tailored toward specific departments.
    Some departments, such as accounting, have enough similarity across domains to
    support third-party vendors. Often, such software will have the ability to be
    customized to adapt it to the unique specifics of a business. However, this comes
    with risks, as a critical component of a department’s operation is now in the
    hands of a third party. This relationship has been recognized by financiers, some
    of whom acquire these vendors and slow improvements in the software in order to
    collect lucrative support fees, as without the software the business would falter.


    A mitigation to that risk is for a business to hire or contract software developers
    such as yourself to create these applications. Having full control of the application
    allows the business to control its future . This is the basis for “every company
    being a software company.” What once may have been a competitive advantage has
    now morphed into table stakes.


    ## How It Is Used


    Within this departmental domain , our business applications are ones that act
    as a source of truth for the department. The application is both the “system of
    record,” in addition to the “system of engagement.” It is the system that users
    interact with for data entry, as well as being the authoritative store for that
    data. In very large corporations, there may be a single corporate-wide system
    (an Enterprise Resource Planning system,^([⁴](#fn4)) or ERP) that is the system
    of record, delegating the system of engagement to other systems. Those systems
    are far larger than the ones we are focusing on.


    The most straightforward way to capture data into a system of record is to make
    it a job requirement for employees to use the system. Or, in the case of a customer-facing
    system , being the only way to interact with the business. It is important to
    have empathy for the users of these systems. As software developers, if there
    are annoyances with the tools we use daily, in many cases we can modify our tools
    to remove what’s frustrating. For users of business applications where usage of
    it is a condition of performing their job, they do not have that luxury. The responsibility
    to ensure that using an application is, as a minimum, pleasant, falls to us. With
    information captured into an application, the business is then able to use the
    data in pursuit of its goals.


    Data is not captured in a vacuum. Without structure, data can be worse than meaningless,
    creating additional confusion. Based on the business''s current objectives, a
    structure for data can be devised, a model. The rigidity of this model can have
    a direct impact on the business’s ability to adapt to changes in the future. If
    a change in the business requires a change in this model, the application that
    houses this model must then be updated for the business itself to change. Writing
    software in a manner that is amenable to change is valuable and can be under-appreciated.
    There is a balancing act between doing exactly what is required vs. generalizing
    based on what could change in the future. However, there are techniques that,
    to a degree, can side-step this balancing act by taking a different path entirely.
    We will discuss this more in Chapter [4](#511062_1_En_4_Chapter.xhtml).


    Business applications enforce processes and workflows. These workflows describe
    the activities that must be taken based on data in the system, without prescribing
    who performs them. By formalizing them into an application, adherence to them
    is increased or guaranteed. We are focusing on applications that allow users to
    collaborate on workflows. Our business applications are multiuser systems.


    Collectively, requirements on the structure of data and the processes by which
    the data is modified are known as business rules. We will explore business rules
    in depth in Chapter [5](#511062_1_En_5_Chapter.xhtml).'
