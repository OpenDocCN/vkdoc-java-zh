  trans: '

    ### 模块化


    “模块”是一个被过度使用的术语。除了软件领域，它还用于许多其他领域，例如货架、沙发，甚至建筑。在这些领域中，模块的粒度或特异性各不相同。然而，模块与整体的关系是明确的；模块是粗粒度的细分，可以通过包含或排除来重新组合，以产生新的变体。


    在软件领域，微服务就是新的模块。它们是离散的功能单元，被打包成可独立部署的单元。不过，最后这一点并非必需。如今备受诟病的“单体”架构（即只有一个可部署单元）并不意味着系统的内部结构像一盘意大利面。盲目追随微服务趋势而不关注整体架构，会导致*分布式*意大利面。软件单元如何组合仍然至关重要。


    解决之道是创建一个模块化系统，其中模块以指定的方式交互。模块的部署是一个独立的问题；一个极端是每个可部署单元对应一个模块，即微服务架构。另一个极端是单体架构，或者正如某些人所创造的“[模块化单体](https://twitter.com/gernotstarke/status/901496976612655106?lang=en)
    ^(¹²) 。”


    模块化的原则是避免意大利面式的系统。独立于部署单元，一个系统必须被良好地分解为对代码和业务都有意义的模块。模块可以作为部署和开发人员工作并行化的一个维度。


    通过将系统视为模块，然后让模块通过异步消息传递进行通信，将模块迁移到新的部署单元不会改变其与系统其余部分的交互模式。模块化与响应式系统是一致的。


    ### 可测试性


    软件总会有缺陷。我继续在我编写的代码中犯错误，你也会如此。为了弥补这一点，我们测试我们的工作。测试软件是一项机械性的任务，非常适合自动化。可测试性是指编写软件，使得编写自动化测试变得简单直接，从而降低编写测试的门槛。


    这个原则在其他方面有些模糊。可测试性*究竟*是什么？我发现测试驱动开发（TDD）是一种有助于我工作的机制。从测试开始，你就是你将要编写的代码的消费者。这种
    API 的消费者优先视角有助于确定测试将覆盖的边界。这与模块化（理想情况下，测试应尽可能隔离到单个模块）以及模块本身的内部结构有着重要的相互作用。


    这个原则也与响应式系统高度一致。发生消息传递的边界也是单个测试将覆盖的良好边界。总体目标是鼓励为我们的系统编写测试。


    ### 易于变更


    我把最喜欢的这个原则留到了最后。这种“易于变更”的表述，是本书中反复出现的主题。我曾读到过一句俏皮话，可以转述为：


    > *愿你的系统服役足够久，以至于被视为遗留系统。*


    当“遗留”一词应用于软件系统时，往往带有贬义。从事遗留系统的工作不受欢迎的情况并不少见。这是为什么？我认为这与这个原则有关。在一个不易变更的系统上工作是令人沮丧的。导致这种情况的因素有很多，例如缺乏测试、业务规则交织、没有或很少进行模块划分。这样的系统不会遵循本章前面阐述的原则。


    创建业务应用程序是业务方的一项投资。如果一个使用不到一二十年的应用程序需要重写，我认为这通常是系统架构的失败。但这并非必然。


    除了为系统的长期成功奠定基础之外，这也符合敏捷开发的精神。通过强调与系统用户合作以满足他们的需求，并承认变化会发生，易于变更成为一个隐含的要求。


    这种理念既是前述原则的一个方面，本身也是一项原则。我们希望我们的工作受到重视，并为业务的整体生产力做出贡献。这个原则就是为了确保在我们的系统预期生命周期内实现这一点。这个原则的阴暗面是过度工程化。*易于*这个词是经过精心选择的。这并不意味着每个变更都必须简单甚至直接。而是说变更的可能性已被考虑，并且实现变更的步骤不会与程序的基本约束相悖。


    ## 总结


    本章为我们的系统设计奠定了基础。我声明了一些自我施加的约束，然后是一套指导设计本身的原则：


    *   GraphQL API


    *   实时 UI 更新


    *   永不遗忘


    *   消息驱动


    *   读写分离


    *   部分可用性


    *   设计灵活性


    *   模块化


    *   可测试性


    *   易于变更


    牢记这些原则，本书本部分的剩余内容将逐步推进到我们系统的设计。下一章将通过介绍高级数据流并建立一些核心模块，更接近实现。


    脚注 1   2   3


    # 8. 高级数据流


    鉴于我们自我施加的使用 GraphQL 的约束，在本章中，我们将考虑一个利用 GraphQL 来支持 API 契约与用户界面及其他协作系统的系统的高级数据流。我将首先解释事件溯源（ES）和命令查询职责分离（CQRS），然后介绍如何以
    GraphQL 的模式语言进行思考，最后将这三个概念整合在一起。

    '
- fmt: '# Event Sourcing and CQRS


    As alluded to when discussing time, we will be building a system that blends Event
    Sourcing (ES) and Command Query Responsibility Segregation (CQRS).


    Event Sourcing was [initially coined](https://www.martinfowler.com/eaaDev/EventSourcing.html)
    ^([^(13)](#fn13)) by Martin Fowler in 2005. He is credited with giving it the
    name, but the idea certainly predated his writing on it. It is fundamentally a
    simple proposition: capture every change to an application’s state as an event
    and use the collection of events as the source-of-truth for the application. Events
    have a natural order based on the sequence in which they occurred. This sequenced
    collection of events is termed an event log. The event log is the source-of-truth
    for the application, describing the sequence of changes that has occurred. While
    this is a natural way to record changes, it is not a natural mechanism for interrogating
    a system for its current state. To have a notion of the “current state,” the event
    log is replayed to derive a state value.


    The first event in an event log will be special, as it stands alone in time, depending
    on nothing. Every subsequent event builds upon the prior event. To derive a notion
    of “state,” one must traverse the event log building up the concept by repeatedly
    incorporating the change each event represents. If you are familiar with functional
    programming concepts, this is a fold. In Java’s Stream library, it is a `reduce`.
    A benefit of this is that the state at any point in type may be reconstructed
    by terminating the operation at the desired point in time.


    While Event Sourcing is useful for capturing changes to state, the event-based
    representation isn’t natural for querying. Enter CQRS.


    CQRS was championed by [Udi Dahan](https://udidahan.com/2009/12/09/clarified-cqrs/)
    ^([^(14)](#fn14)) and [Greg Young](http://codebetter.com/gregyoung/2010/02/16/cqrs-task-based-uis-event-sourcing-agh/)
    ^([^(15)](#fn15)) at the end of the past decade, during the late 2000s. It is
    a very straightforward pattern: utilize separate models for commands (writes)
    and queries (reads). The CQRS pattern can be applied in any context, but it has
    been extremely popular when combined with Event Sourcing.


    When combined, the event-sourced portion of the system handles writes. As events
    occur, the new event is incorporated (materialized) into a model for reads. Events
    are the natural communication method, as that’s the output of Event Sourcing.
    This is further aligned with our desire to be a reactive system, being a message-driven
    interaction.


    A missing detail from Event Sourcing is *what causes events to be created*. That
    is often left as “an exercise for the reader,” so to speak. Fear not, this book
    has an answer. Prior to explaining the solution, I’m going to explain the decision
    to utilize GraphQL in more detail.


    ## Thinking in GraphQL Schemas


    The prior chapter had a brief introduction to GraphQL as part of explaining why
    it’s a self-imposed constraint. A more detailed explanation is warranted to understand
    how it will interact with ES and CQRS.


    A GraphQL schema represents a contract between the providing and consuming systems.
    The GraphQL community recommends starting with a “schema first” approach. A schema
    should be authored as the truest representation of the model possible with the
    language, rather than being a projection from an existing model into GraphQL.
    Understanding all the modeling capabilities in GraphQL is thus a necessary prerequisite.


    As the name implies, GraphQL is a graph structure. I’ll describe the structure
    and available modeling primitives from the bottom up, starting with the leaves
    of the graph. All top-level names in a GraphQL schema occupy a shared namespace.
    In isolation, this isn’t a problem. It is important to be aware of if consumers
    of your schema will be composing it with other schemas, as there is the potential
    for name collisions.


    GraphQL requires callers to be explicit about what they request. There is no facility
    for “wildcarding” the data to return. When constructing a request, callers must
    specify the data they wish to see returned.


    ### Scalars and Enums


    At the lowest level, the leaves of the graph, there are two possibilities: scalar
    values and enums.


    There’s a small set of provided scalar types: strings, integers, floats, booleans,
    and object identifiers (IDs). It is also possible to define custom scalar types,
    as the provided primitives are insufficient for most models. Custom scalars are
    generally used for value types that are easily represented as single values, such
    as the various combinations of dates and times, URLs, and fixed-precision numbers.
    I also like to use custom scalars for value types specific to my model rather
    than relying on generic types such as `String`.


    There are no provided enums (enumerations). GraphQL’s enums are useful when modeling
    a value that must come from a fixed set. In contrast with the implementation of
    enums in some programming languages, GraphQL enums have no corresponding numerical
    value. Enum values aren’t proxies for anything, they are values in their own right.


    ### Objects


    The simplest node type in the model is an object. Objects are named and are composed
    of one or more fields. Object names come from the shared namespace, but field
    names are local to the object definition. Fields return scalars, enums, or objects.
    There are a few additional possibilities that the subsequent subsections discuss.


    A rough mental model is that an object is a bag of key and value pairs. That’s
    accurate, but also insufficient. Fields of an object can declare optional and
    required arguments, giving them behavior of functions. A more apt mental model
    is to view an object as a bag of named functions.


    Object fields can also specify a nullability constraint. The default is to allow
    any value to be nullable. While it may be tempting to use this to mirror existing
    constraints in your model, I recommend using it judiciously.


    The execution model of GraphQL uses nullability as part of its error handling;
    if an error occurs during execution, the response will be converted to `null`
    starting at the point of the error toward the root of the query, stopping at the
    first nullable field. Extensive use of non-null increases the “blast radius” of
    errors. Using non-null also limits future evolution of the schema, as converting
    a field from non-null to nullable is considered a breaking change to the schema.


    ### Lists


    Lists are an augmentation to object fields. Any of the return values for an object’s
    fields may be wrapped using a list construct, indicating that it will return potentially
    more than one value. A field’s cardinality is either zero or one, and using a
    list expands that from zero to infinity. A list’s values are homogenous.


    The nullability constraint interacts with lists in two ways. Entries in the list
    can be declared as non-null, and the list itself may be declared as non-null.
    The error handling of the execution model is especially pertinent here. I recommend
    declaring the list value as nullable, as this allows other list values to be returned
    if an error occurs during execution.


    ### Input Objects


    Input objects are the mechanism for providing structure to object field arguments.
    Arguments must be one of the “primitive” values, a scalar or enum, or they may
    be organized into input objects.


    An input object is a bag of key and value pairs. Input objects have fields, and
    the field values may be a scalar, enum, or another input object type. Values may
    be declared as a list, as well as being non-null.


    In this context, nullability is more useful, as it communicates to users of the
    schema what the required arguments are. I recommend appropriately marking items
    as non-null, as it is the act of going from nullable to non-null that is a breaking
    change for callers.'
