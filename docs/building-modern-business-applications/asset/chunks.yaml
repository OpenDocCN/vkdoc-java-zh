- fmt: '### Enforcing Business Rules


    The enforcement of business rules for data at rest presents an opportunity for
    failure. When the command processor state is constructed, events are repeatedly
    applied onto the state. Each time this occurs is an opportunity to ensure that
    the next event will not generate an invalid state. Between the two functions that
    are supplied to the command processor, the applicator is the appropriate place
    to ensure that all generated states are valid. For events in the event log, this
    function should always succeed. If it fails, it is an indication of an error in
    the system. Perhaps the events have been tampered with, or perhaps the business
    rules have changed, and older events no longer satisfy the new rules.


    If the business rules haven’t changed, a failure to generate a state from existing
    events will require operator intervention. If the business rules *have* changed,
    the change needs to be appropriately captured. I had discussed this previously
    in Chapter [6](#511062_1_En_6_Chapter.xhtml). A business rule change occurs at
    a point in time. It is necessary to record that change *as an event*. The function
    that is generating state from events is then able to use this business rule change
    event to alter its behavior.


    When processing a new command, it is necessary to ensure that the events it generates
    satisfy the business rules. In order to avoid duplication of business rule enforcement,
    after calling the mutator function, the command processor will also use the applicator
    to ensure that when the prospective events are applied to the current state that
    they are able to create a new state without failing.


    In practice, I find that most command failures will end up occurring when ensuring
    that they are able to generate valid states. If the command is a request to make
    a change, the events generated from the command are the planned steps necessary
    in order to realize the change. It is only after those events have been successfully
    applied to the state can the plan be considered a success.


    This application of events to state as part of processing a command is *prospective*.
    The new state generated is discarded, as the state used for the next command will
    come from following the event log. This is possible because the function is free
    from side effects.


    Intimately related to handling failures is the minimization of unexpected scenarios.
    That’s best done by thorough testing.


    ## How to Test


    I’ve found that the separation of concerns in the command processor is extremely
    amenable to testing. The processor takes in two functions in order to operate
    with specific command and event types. This allows testing to be split into the
    testing of the command processor itself, and then the testing of the domain-specific
    functions.


    ### Testing the Command Processor


    The mechanics of the command processor itself should be tested with a simplistic
    domain, such as adding numbers. Commands are representable as integers, a number
    that the current state should equal. The mutator can then generate an event that
    is another integer, the integer that must be added to the current state in order
    to have it equal the command value. The applicator is an addition. A simplistic
    business rule may be added, such as the state value must always be an odd number.


    By using a simple domain, it’s then possible to stress test the command processor
    to see how it behaves in various failure scenarios. As its means of operation
    are expressible in terms of stream processing, if the implementation makes use
    of a library that has the necessary primitives, testing is primarily an exercise
    in ensuring that the library has been used correctly and that other collaborating
    components compose as expected.


    ### Testing Your Code


    There are two functions to test, the applicator and the mutator. Each may be tested
    individually in isolation, without requiring the command processor. This is a
    benefit of the requirement that they are pure functions. All necessary information
    for them to perform is provided as arguments.


    For the applicator, there should be at least one test per event to ensure that
    the state is updated as expected for valid events. In practice, there will likely
    be a handful of tests for each event to cover the business rules that the change
    impacts. Notably, the implementation of the application should be mostly free
    of conditional logic, other than the business rule constraint checks. The applicator
    is applying events to state. The events are looking backward, describing what
    has already happened. Conditionals should only be used to ensure that what happened
    was valid. If you find yourself writing conditional behavior that’s not related
    to checking the business rule constraints, that’s a hint that the logic belongs
    in the mutator function.


    The mutator is the function that will contain branching decision logic. The mutator
    inputs are a command and the current state, and it returns a set of events to
    describe how to move the state forward in time. It is entirely appropriate for
    the command to use information contained with the state to guide its behavior
    and alter the set of events returned. Like the applicator, there should be at
    least one test per command. The actual number of tests will end up varying based
    on the branching logic within the mutator for a given command. It is feasible
    to exhaustively cover all the possible scenarios for a given command. The tests
    can also ensure that the command’s returned events will pass the applicator when
    provided with the events and the same state that the mutator was provided with.
    It’s possible and recommended to do this without using the command processor itself,
    as ultimately it is merely orchestrating the execution of the mutator and the
    applicator.


    Testing these functions within the context of the command processor will be covered
    later in Chapter [12](#511062_1_En_12_Chapter.xhtml).


    There’s an additional type of test that can be performed, a regression test against
    production data. In a strict sense, commands in the command log don’t need to
    be retained after they’ve been processed. However, retaining commands allows for
    using them in tests. Commands can be reprocessed with newer versions of the mutator
    to ensure that the same events are generated. This is a powerful technique for
    ensuring that drastic refactoring of system logic results in a system with the
    exact same behaviors.


    ## Summary


    The command processor sits at the heart of our system, enforcing some of the most
    important business rules, the rules for data at rest. I’ve explained the essence
    of its operating principles, and what is required for its operation. You’ve learned
    how to think about testing the component as well as testing your commands and
    events in conjunction with it. The next chapter will give the same treatment to
    the command generator, which is responsible for creation of the commands that
    the command processor operates upon.


    # 10. Command Generator


    The command generator is the bridge between the outwardly facing request/response
    interactions of GraphQL mutations and the message passing world inside the application.
    In this chapter, I discuss how GraphQL mutations interact with the command generator
    and the balance between specificity and generality when designing commands and
    mutations. I will also go over how to construct commands that allow the command
    processor’s mutator function to be a pure function, how the command generator
    can fail and how to compensate, and finally how to think about testing the logic
    contained in this layer. Let’s dive in.


    ## Interaction with GraphQL


    The command generator is the logical component that allows our GraphQL mutations
    to function. Its behavior is decomposable into the following three steps:


    1. Convert the GraphQL mutation’s input arguments into a command.

    2. Append the command to the command log.

    3. Awaiting processing of the command and returning the disposition as the mutation’s
    result.'
