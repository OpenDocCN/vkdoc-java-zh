- fmt: '### Observability


    Observability is a trendy word. It comes from control theory, a measure of how
    well the internal states of a system can be inferred from its external outputs.
    In the late 2010s, it started to be applied to what could be generally coined
    the “monitoring” space.


    As software developers, we’ve always been practicing this. We use the outputs
    of a system, such as log messages, to build an understanding of what is taking
    place inside. In the simplest sense, “practicing observability” means ensuring
    that your systems are emitting enough information that you can reconstruct what
    they are doing. This has always been a best practice, but I found implementations
    to be ad-hoc and on a case-by-case basis.


    Formalizing this practice has increased in importance as our applications are
    increasingly not acting alone. They are a part of a larger ecosystem of applications
    that power a business. There is value in having applications emit these outputs
    in a common fashion, so problems can be debugged across applications.


    The value I’ve found in this practice has been changing my mindset on how to approach
    debugging problems. Ideally, I do not want to have to use a debugger, nor add
    `print` statements to figure out the cause of a problem. I’ve tried to make it
    a goal to build systems such that they naturally emit enough information to mentally
    work through what the possible causes are, and then use a test to validate the
    hypothesis. It is another practice that will seep into how your software is structured,
    and how we will be structuring our modern business applications.


    ## Summary


    The manner in which business applications are architected hasn’t substantially
    changed. The business and consumer applications were similar until the introduction
    of the iPhone, which begat many changes in consumer apps that haven’t had wide
    adoption in business applications. Other development practices may have been incorporated
    into your workflow, as they are somewhat orthogonal to an application’s architecture.


    I feel there’s an opportunity to fully incorporate technologies from consumer
    apps and practices from agile into a modern business application design.


    In the next part of this book, I will further describe the desired properties
    and features of our design prior to the design itself in the third part.


