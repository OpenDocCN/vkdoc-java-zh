    # 第二部分 设计前提


    # 3. 什么是响应式系统？


    我已经解释了什么是业务应用以及它们目前是如何构建的。在本章中，我将探讨其架构中既必要又理想的属性和特性。我首先定义什么是“响应式”，然后介绍响应式系统的概念，它源于[响应式宣言](https://www.reactivemanifesto.org/)中提出的属性。^(⁸)


    本章主要讨论宏观层面的响应式系统。下一章将探讨为什么要把业务应用构建成响应式系统。


    ## 什么是响应式？


    你可能在不知不觉中使用过响应式系统：电子表格。当你在电子表格中更改某个单元格的值时，任何引用该单元格的公式都会自动重新计算。如果这些公式单元格又被其他单元格引用，这个过程就会重复。这是一个简单而强大的想法。


    为了介绍响应式系统，我们将首先讨论响应式编程。毕竟，系统是编程概念在更广泛尺度上的投影。编程有两大范式：命令式和声明式。


    命令式可能是你日常使用 Java 等语言时所做的。语言中的每个表达式都是一条关于“做什么”的指令。当程序执行时，它就是在遵循这些指令。


    声明式则相反。程序不是表达“做什么”，而是对我们希望发生的事情的规范。如果你接触过函数式编程概念，那么你就已经接触过声明式编程的一种形式。


    响应式编程的基础是数据流思维。我在脑海中使用的视觉隐喻是管道系统。不一定是现实世界中的那种，而是那种游戏类型，你面对各种谜题，目标是将指定的水龙头和排水口匹配起来。


    这个隐喻可以延续到程序的表达上。水龙头，即输入，是程序接收到的请求。排水口，即输出，不仅是对这些请求的响应，还包括日志语句、捕获的指标，甚至是对数据库的写入。


    响应式编程就是以这种形式来表达问题。输入和输出被连接起来，响应式运行时确保“数据”通过我们隐喻中的“管道”流动。


    当然，任何真实的系统都不是输入到输出的直接连接。在数据流中会有分流、合并，甚至反馈循环。关键在于，我们关注的是“做什么”，而不是“怎么做”。


    这些都不是新概念。数据流编程最早在 20 世纪 60 年代被构想出来，而随着 1979 年 VisiCalc 电子表格程序的推出，个人电脑上就有了响应式环境。


    响应式编程关注的是单个进程。响应式系统则是以响应式方式组合而成的程序集合。同步远程过程调用可以被视为“命令式”的，而通过消息总线通信的两个程序则可以被视为“响应式”的。这是一个非常粗略的概括，但希望足以说明两者的区别。


    在下一节中，我将讨论《响应式宣言》，这是一份为响应式系统辩护的文档。在讨论过程中，我将进一步解释响应式系统的构成。


    ## 响应式宣言


    2014 年，Jonas Bonér、Dave Farley、Roland Kuhn 和 Martin Thompson 发布了[响应式宣言](https://www.reactivemanifesto.org/)。其底层概念在业界已经酝酿了数年。就像前一章讨论的《敏捷宣言》为一系列编程实践贴上了标签一样，《响应式宣言》为软件系统的架构特性贴上了标签。


    我在前一章谈到了 Web 应用的兴起。对于流行的业务和消费服务来说，这些应用都在非常大规模地运行。撇开规模不谈，在亚马逊网络服务（AWS）于 2006 年推出之后，它们的运行方式也发生了转变。虚拟化环境的概念已经存在多年，VMWare
    在 21 世纪初通过其 ESX 产品在企业中普及了这一概念。亚马逊的产品使虚拟机对任何人都可用，并开启了现代“云计算”时代。


    这份宣言是对这个新世界中系统普遍采用的架构实践的总结。它围绕四个属性展开，我将逐一讨论。

    '
- fmt: '### Responsive


    The Oxford dictionary definition of responsive is “reacting quickly and positively.”
    It is thus suiting that it is a property for reactive systems, given that the
    term itself is about reacting. The manifesto defines this property as “[that]
    the system responds in a timely manner if at all possible.” This can be thought
    of as a reasonable maximum upper bound on how long to respond to a request or
    perform some action. A system that is responsive will prioritize consistent response
    times. In practice, this would mean something such as using internal timeouts,
    and responding with a timeout rather than appearing to hang.


    Users *really* appreciate responsivity. Research on human and user interface response
    times has established that 250ms is a reasonable target. Google, Amazon, and Akamai
    have all done studies illustrating how users will abandon slow-loading websites.
    As we’ve established, usage of a business application isn’t necessarily voluntary,
    but the overall point still stands. A slow application will lead to dissatisfied
    users.


    The benefits aren’t only to users, but to you, the operator of the system. The
    response time of a system can be incorporated into a Service Level Objective (`SLO`).
    A simple example is declaring that a percentage of all requests are replied to
    within a given timeframe. Enforcement of this can be done by a timeout in the
    system to respond with an error message if it would exceed the timeout. This can
    then be tied into an alert, giving feedback when the system may be under duress.


    This can also establish a virtuous feedback loop. By being aware of the responsivity
    of the system, it can be tracked over time and improved. This can increase engagement
    and confidence in the system which is aligned with the business’s goals of investing
    in the application.


    Response times can also be a point of pride for developers. You can go to sleep
    at night knowing that your application isn’t causing users to complain about waiting
    on the computer.


    ### Resilient


    Failures will happen. Being resilient is about remaining responsive when that
    occurs. You may have heard the idea of “any sufficiently complex system is always
    in a state of partial failure.” Existing in that state and responding as if nothing
    is wrong is resiliency.


    As a metaphor, think of bulkheads, especially on ships. A bulkhead helps partition
    the hull into multiple compartments, so should there be a breach of the hull,
    only that one compartment fills with water rather than the entire hull. Ideally,
    this will prevent, or at least slow, the sinking of the ship.


    This same idea can be applied to software. Each logical component of your system
    should be able to experience failure without affecting other components. Another
    manifestation would be the ability to restart the database without needing to
    restart applications that connect to it. The failure, inability to connect to
    the database, is transient, and the applications that connect to it automatically
    recover.


    This plays into responsiveness, as if a required dependency is experiencing failure,
    an error is propagated rather than hanging a request while waiting for recovery.


    While some amount of resiliency can be “bolted on” to an existing application,
    I believe that to be truly resilient, it must be an intentional facet of the architecture.


    ### Elastic


    Elasticity. Like the word itself, it’s applicability can be stretched in various
    dimensions. In the context of the manifesto, it is referring to the ability to
    remain responsive. The system has a level of self-awareness around target response
    times and is able to dynamically increase the resources it is using in order to
    maintain the target. Conversely, it is able to relinquish resources that are no
    longer necessary.


    In the simple case, this is the automation of horizontal scaling. A more complex
    form could be the automation of data shards.


    Out of all the properties, this is the most complex to utilize. It is entirely
    possible that you may never need to realize this property in your system. However,
    like resiliency, this must be an intentional facet of the architecture.


    I think of this in two ways. The first is runtime elasticity, the ability to remain
    responsive as the workload of the system changes. The second is design elasticity,
    the ability to enable runtime elasticity as the system evolves.


    To reuse the pipe metaphor, when thinking of how data (or requests for data) flow
    through your system, be cognizant of where a tee could be inserted to split or
    join the flow. Your system may never require the injection of the tees. Consideration
    of where they would go establishes logical boundaries in your design and provides
    a path toward runtime elasticity. Even though it may never be used, establishing
    those boundaries results in a design that is easier to communicate and reason
    about.'
