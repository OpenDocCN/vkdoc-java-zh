    each application can keep track of when it became aware of information, allowing
    local answers to “what happened.” However, in business applications, sometimes
    when an event occurred is also important, and that must be tracked as well.


    ## Bitemporality


    Bitemporality is tracking *both* of our time dimensions, when an event occurred,
    and when the system became aware of it. In the business domain, an example of
    this would be a retroactive policy.


    Imagine a loyalty program where points are awarded for purchases. Points are a
    form of currency and can be spent with the business. Unspent points expire after
