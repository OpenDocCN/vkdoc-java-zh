  trans: '

    ### 读写分离


    系统的读写访问模式通常并不对称。对于用户规模较小的年轻系统而言，这通常不会带来问题。用户数量少且运行时间短，意味着数据量和变更率都较低。


    随着系统逐渐成熟，其中包含的数据量通常会随服役时间而增长。在我们提议的系统中，由于还需要存储历史状态，这一问题将更加突出。


    我们的业务应用将为业务提供两大功能：数据录入和决策支持。数据录入的访问模式通常要求具备“读取自身写入”的能力。对系统做出更改的用户非常清楚应用程序现在应该显示什么内容，他们期望读取结果与自己执行的写入操作保持一致。这类活动在经典定义中被称为在线事务处理（OLTP）。


    决策支持则有所不同。在此用例中，系统的用户通常不会修改数据。他们运行报表，并向应用程序提出复杂的聚合查询问题。由于不进行修改，用户不会注意到数据是否略微过时。所提出的问题也可能完全容忍过时数据，因为他们总是在回顾一个固定的时间段。想想每日运行的报表，只要数据在报表执行时是最新的，就满足了报表的要求。这类活动被称为在线分析处理（OLAP）。


    在大型企业中，OLAP 活动通常跨业务部门或其下属分支所使用的系统进行。一个系统的数据会被复制到一个中央存储库，该存储库汇总来自其他系统的信息。


    你的系统用户可能也有类似的需求，我发现这是一个常见的请求：应用内分析和报表。


    当使用关系型数据库时，一个自然的解决方案是添加数据库的只读副本，并用它来满足这类请求。然而，一个在设计之初并未考虑此点的系统，在引入另一个数据库主机并恰当使用它时，可能会面临挑战。


    因此，这一原则旨在通过早期解决这些问题来规避未来的麻烦。如果系统在设计时就为读取和写入规划了独立的路径，那么系统在此维度上就易于变更。初始实现很可能为所有功能使用单个数据库实例。通过提前引入逻辑分离，当未来需要物理分离时，对系统进行修改将更加容易。


    ### 部分可用性


    我们的业务应用对业务至关重要，这也是业务对其进行投资的原因！它们需要在*业务需要时*保持可用。历史上，在互联网广泛普及之前，商业软件的使用通常与工作时间挂钩。虽然某些领域已经全天候运行多年，但其他领域则相对奢侈地仅在本地工作时间使用。


    系统有规律的闲置期，为执行维护活动创造了一个天然的窗口。有了这样的机会，就有可能将系统完全离线以进行工作。随着应用程序开始拥有面向外部的组件，例如面向业务客户的用户界面，或与客户/供应商系统的
    API 集成，将应用程序完全停止服务变得越来越困难。


    作为一项原则，部分可用性是指能够仅将系统的*一部分*下线进行维护或升级。它也是指仅让*一部分*发生*故障*的能力。这是一种弹性形式，是响应式宣言所期望的特性之一。


    部分可用性的粒度将取决于你的业务领域和应用程序的性质。存在一些横切性的粗粒度方面，例如对读取可用但对写入不可用。特定领域的方面则需要与业务协调，以确定故障模式的“爆炸半径”可能是什么。


    部分可用性更常规的用途是围绕定期维护和系统升级。其最大价值体现在故障发生时。通过在系统中实现概念上的“隔舱”，只有系统的一部分会失效。这有助于在故障修复期间减轻运维人员的压力。处理关键系统的中断总是充满压力。遵循这一原则，可以将中断限制在受影响的子系统内，从而仅影响依赖该子系统的用户。这并非万能药，但在缓解处理中断人员压力方面可能价值连城。


    对部分可用性的简洁描述是：能够在降级状态下运行，而不是处于非此即彼的“运行或停止”状态。


    ### 设计灵活性


    软件中的灵活性是一个模糊的话题，因为对于什么是灵活的软件，并没有明确的定义。我对设计灵活性的定义是：系统设计的任何方面都应有多种实现选项。在实践中，我发现这意味着要考虑软件未来可能的发展路径，并尽可能*不排除*这些可能性。


    未来，尤其是在软件项目中，是出了名的难以预测。与敏捷宣言一致，这是响应变化而非遵循固定计划。我们的方法是响应变化，而设计灵活性则关乎为未来保留选择余地。


    随着系统成熟，有时做出会排除某些未来演进路径的决策是合理的。这是对设计灵活性的削减。此时，项目上积累的智慧将有助于最小化这些决策的影响。这不是一个可以轻易做出的决定，因为逆转这类决策可能代价高昂。然而，在某些情况下，这可能是恰当的行动方针。


    在启动新项目时，尤其是在项目早期，为未来的可能性保留空间是有价值的。这就是这一原则的精髓。

    '
- fmt: '### Modularity


    “Module” is an overloaded term. It is used in many domains in addition to software
    such as shelving, sofas, or even buildings. In each of these the grain, or specificity,
    of a module varies. However, the relationship of a module to the whole stands;
    modules are coarse subdivisions and may be recomposed with inclusion or exclusion
    to make new variations.


    In software, microservices are the new modules. They’re discrete pieces of functionality,
    packaged up as independently deployable units. That last part isn’t required though.
    The now-maligned “monolith” architecture, where there’s a single deployable unit,
    doesn’t mean that the internals of the system are composed like a bowl of spaghetti.
    Following the microservices trend without paying attention to the overall architecture
    leads to *distributed* spaghetti. How units of software are composed still matters.


    The answer to this is creating a modular system, where modules interact in specified
    ways. Deployment of the modules is a separate concern; one extreme is one module
    per deployable unit, a microservices architecture. The other extreme is a monolith,
    or as some have coined, a “[modulith](https://twitter.com/gernotstarke/status/901496976612655106?lang=en)
    ^([^(12)](#fn12)) .”


    The principle of modularity is to avoid a spaghetti system. Independent of deployment
    units, a system must be well factored into modules that make sense to the code
    as well as the business. Modules can be used as a dimension for deployment as
    well as parallelization of developer work.


    By thinking of a system as modules, and then having modules communicate via asynchronous
    message passing, moving a module into a new deployment unit won’t change the interaction
    pattern with the remainder of the system. Modularity is aligned with a reactive
    system.


    ### Testability


    Software will have bugs. I continue to make mistakes in the code I’ve written,
    and you will as well. To compensate, we test our work. Testing software is a rote
    task and well suited to automation. Testability is writing software such that
    writing automated tests is straightforward, lowering the barrier to writing them.


    This principle is otherwise somewhat amorphous. What exactly *is* testability?
    I’ve found test-driven development (TDD) to be a mechanism to help me in my work.
    When starting with a test, you’re starting as a consumer of the code you’ll be
    writing. This consumer-first perspective of the API helps establish the boundaries
    of what the test will cover. This has an important interplay with modularity (tests
    should ideally be isolated to a module where possible) and the internal structure
    of modules themselves.


    This principle is also well aligned with a reactive system. Boundaries where message
    passing occurs are also good boundaries for what an individual test will cover.
    The general goal is to encourage the writing of tests for our system.


    ### Amenability to Change


    I saved my favorite principle for last. This phrasing, being amenable to change,
    is one that has been a repeating refrain in this book. A quip I once read can
    be paraphrased as:


    > *May your system be in service long enough to be considered legacy.*


    “Legacy” tends to be a pejorative term when applied to software systems. It is
    not uncommon for working on legacy systems to be undesirable. Why is this? I believe
    it is related to this principle. Working on a system that isn’t amenable to change
    is frustrating. It’ll have a variety of factors that contribute to this, such
    as a lack of tests, intertwined business rules, and poor or no separation into
    modules. The system won’t follow the prior principles laid out in this chapter.


    The creation of a business application is an investment by the business. If an
    application that’s less than a decade or two old needs to be rewritten, I believe
    that’s often a failure in the system’s architecture. That doesn’t need to be the
    case.


    In addition to setting the system up for long-term success, this is also in the
    spirit of agile development. By emphasizing working with the system’s users to
    meet their needs, and acknowledging that changes will happen, amenability is an
    implicit requirement.


    This philosophy is an aspect of the prior principles, and a principle in its own
    right. We want our work to be valued and contribute to the overall productivity
    of the business. This principle is to ensure that for the expected lifetime of
    our system. The dark side of this principle is over-engineering. *Amenable* has
    been carefully chosen. It isn’t that every change must be simple or even straightforward.
    It’s that the possibility of change has been considered, and the steps to achieve
    the change aren’t counter to the fundamental constraints of the program.


    ## Summary


    This chapter has set the stage for our system’s design. I’ve declared a few self-imposed
    constraints, and then a set of guiding principles for the design itself:


    *   GraphQL API

    *   Real-time UI updates

    *   Never Forget

    *   Message Driven

    *   Read/Write Separation

    *   Partial Availability

    *   Design Flexibility

    *   Modularity

    *   Testability

    *   Amenability to Change


    With these in mind, the remainder of this part of the book will incrementally
    work toward the design of our system. The next chapter moves closer to implementation
    by introducing the high-level data flow and establishing some of the core modules.


