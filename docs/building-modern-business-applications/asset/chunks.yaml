    # Part IIDesign Prerequisites


    # 3. What Is a Reactive System?


    I’ve explained what a business application is and how they’re currently built.
    In this chapter, I will investigate properties and features that are both essential
    and desired in their architecture. I start by defining what “reactive” is, followed
    by the idea of a reactive system, which is born from the properties laid out in
    the [Reactive Manifesto](https://www.reactivemanifesto.org/).^([⁸](#fn8))


    This chapter is about reactive systems in the large. The next chapter will investigate
    why build a business application as a reactive system.


    ## What Is Reactive?


    You have likely used a reactive system without realizing it: a spreadsheet. When
    you change the value in a cell in a spreadsheet, any formulas that reference that
    cell are automatically recomputed. And if those formula cells are then referenced,
    the process repeats. It is a straightforward and powerful idea.


    To introduce a reactive system, we will first discuss reactive programming. After
    all, a system is the projection of programming concepts at a wider scale. There
    are two broad paradigms for programming, imperative and declarative.


    Imperative is what you likely do on a day-to-day basis in a language such as `Java`.
    Each expression in the language is an instruction on what to do. When the program
    is being executed, it is following those instructions.


    Declarative is the opposite. Rather than expressing what to do, the program is
    a specification of what we want to happen. If you have been introduced to functional
    programming concepts, you have been introduced to a form of declarative programming.


    The basis for reactive programming is thinking in data flows. The visual metaphor
    I use in my head is plumbing. Not necessarily what you’d find in the real world,
    but the game genre where you’re presented with puzzles and the goal of matching
    specified faucets and drains.


    That metaphor carries over to the expression of a program. The faucets, inputs,
    are the requests the program receives. The drains, outputs, are not only the responses
    to those requests, but also log statements, captured metrics, and even writing
    to a database.


    Reactive programming is then the expression of a problem in that form. Inputs
    and outputs are connected, and the reactive runtime ensures that the “data is
    flowing” through our metaphorical pipes.


    Of course, any real system isn’t a direct connection of inputs to outputs. There
    will be splits, merges, and even feedback cycles in the flow. The key is that
    we are focused on the *what* rather than the *how*.


    These are not new concepts. Dataflow programming was first conceived in the 1960s,
    and with the introduction of the `VisiCalc` spreadsheet program in 1979, a reactive
    environment was available on a PC.


    Reactive programming is concerned with a single process. A reactive system is
    a composition of programs, composed in a reactive manner. A synchronous remote
    procedure call can be viewed as “imperative,” whereas two programs communicating
    via a message bus can be viewed as “reactive.” This is a very coarse generalization,
    but hopefully sufficient to illustrate the distinction.


    In the next section, I’ll discuss the Reactive Manifesto, a document that makes
    the case for reactive systems. As part of the discussion, I will further explain
    what makes up a reactive system.


    ## Reactive Manifesto


    In 2014, Jonas Bonér, Dave Farley, Roland Kuhn, and Martin Thompson unveiled the
    [Reactive Manifesto](https://www.reactivemanifesto.org/). The underlying concepts
    had been percolating throughout the industry for a number of years. Similar to
    how the Agile Manifesto discussed in the prior chapter put a label on a collection
    of programming practices, the Reactive Manifesto is labeling architectural features
    of software systems.


    I spoke to the rise of web applications in the prior chapter. For popular business
    and consumer services, those applications are operating at very large scales.
    Scale aside, the manner in which they were running also undertook a shift after
    Amazon’s Web Services was introduced in 2006. The idea of a virtualized environment
    had been around for a number of years, VMWare had popularized it in the enterprise
    with its `ESX` product from the early 2000s. Amazon’s product made virtual machines
    available to anyone and kicked off modern “cloud computing.”


    The manifesto was an aggregation of architectural practices that were common across
    systems in this new world. It is centered around four properties that I’ll discuss
    in turn.'
