- fmt: '# Business Expectations


    In the first chapter, as part of scoping our definition of a business application,
    I described how the application is used by the business as a key component. In
    thinking of what the business *expects* from the application, it is more than
    the mechanics as to how it is used.


    In acting as a system of record for the business, there is an expectation that
    the application will be available when the business needs to store or retrieve
    data. If the business grows in a dimension such as the number of employees, or
    order volume, the application is expected to continue to meet its needs. If a
    business workflow needs to be adjusted, changing the application to enforce the
    change should not be a limiting factor.


    I would broadly describe this as: the business expects the application to be available
    when required and is able to respond to changes in business needs in a timely
    fashion. I hope that this is somewhat self-evident, as it is the kernel of the
    relationship between any service provider and the party that subscribes to their
    services. It is a simple expectation. The complexity lies in making it happen.


    Our business applications are written by developers like yourself, either as employees
    or consultants. The business’s expectations for its applications are, transitively,
    expectations on how you build and make the application available to the business.


    # Developer Expectations


    You are a user of your application as well! I think this is important to state
    explicitly. You likely aren’t using the same interface as other users, but you
    are a user, nonetheless. Your primary interface is the application’s source code.
    Secondarily, build and deployment pipelines, and tools used to monitor application
    health and behavioral observation.


    You expect the code to be straightforward to work with. I use this term rather
    than easy, as there will be inherit complexity in your domain. Ideally, this is
    the sole source of complexity. Anything beyond that has been unnecessarily created
    and has the opportunity for minimization. That is one of the goals of this book,
    to provide a guide for building business applications that reduces unnecessary
    complexity. If the methods here seem complex, I postulate that is because they
    may be foreign.


    In reducing complexity, that does not mean that the need for expertise is also
    reduced. When we build applications, we are in effect building machines. The methods
    in this book are a different, and I believe better, way of building those machines.
    I am imparting some of my experience to help your understanding in the journey
    of building your expertise.


    The business’s expectations for its applications are transitively applied to you,
    as you turn those expectations into reality. As a part of this, you will be operating
    within constraints. Ultimately, they can be broken down into two forms, time and
    money.


    Time can be represented as money. There is a price that would allow anyone imposing
    a time constraint to allow more time, but that’s generally the infeasible solution.
    For practical purposes, especially in our context, treating them as independent
    is simpler. Entertaining this line of thought is a topic unto itself, one that
    this book is not specifically about. I characterize it as a sort of systems thinking.
    If you have exposure to, or read further on the topic, you may see how our reactive
    systems are conceptually aligned.


    The business is deriving economic value from the application. If the application
    is creating a deficit, costing more to operate than the value returned, the application’s
    sustainability will be called into question. I find it important as developers
    to be cognizant of this situation. The relationships with coworkers required to
    build this understanding are also beneficial in understanding the business itself,
    which is useful domain knowledge when implementing business rules.


    The monetary cost is often a direct calculation. There are hardware and software
    resources used for development and operation, plus salaries for the staff. While
    important, I believe operating costs are of lesser importance. They tend to move
    in a more predictable fashion relative to a planning horizon. Given a two, five,
    or even ten-year plan, there is sufficient hard data to make an informed prediction.
    Moore’s Law and the general trend for computing costs have a dampening effect
    on the margin of error.


    Time is key. This comes in two variations. Businesses will try and “buy time”
    by increasing staffing. The negative outcomes of this have been well captured
    by The Mythical Man-Month, and with Brooke’s Law, *“Adding manpower to a late
    software project makes it later.”* Embedded in this idea, that more individuals
    will allow a project to come to completion faster, is the notion that it is the
    ability to effectively change the software that is a limiting factor. If the business
    wants to change its operations, there is an opportunity cost if the software can’t
    also change in a timely manner.


    I’ve found that this idea, how *amenable to change* an application is, is directly
    related to a developer’s interface to the application, it’s source code. Expressed
    in the source is the *structure of the application*. If a system is not amenable
    to change, changes will take more time to perform. By being able to change faster,
    we are in effect, buying time. You may have been exposed to this idea before,
    under the guise of “good code” or “clean code.” Those same sentiments still apply.
    In my experience, they often describe concepts abstractly, rather than providing
    specific guidance. That is wholly understandable, as they’re guiding principles,
    rather than a specific architecture. In this book, I’m providing specifics for
    that architecture. A reactive system provides a holistic architecture, one that
    is composable, so what applies in the large applies in the small, and vice versa.


    # Property Alignment


    Mirroring the prior chapter, I will go through each property in turn, relating
    how it is aligned with both the business and developer expectations of the system.
    I will refer to the two constraints mentioned under developer expectations, time
    and money, from the perspective of the business as well. While working within
    those constraints is an expectation of a developer, the management of time and
    money is of value to the business.


    ## Responsive


    If you’ve ever been on the phone with someone and they’ve had to apologize for
    their slow computers, you’ve been on the receiving end of the value of this. It’s
    true, “time is money,” and having users unnecessarily wait can be a drag. This
    can have a multiplicative effect. It isn’t only the direct users of an application
    that may be hampered by slow response times, anyone that the users are helping
    is affected as well.


    As developers, this is a tricky one to value. If asked directly as to how responsive
    a system should be, users will often give a vague answer that it should “be fast.”
    It is often straightforward for users to identify what is unacceptable, but the
    inverse is highly subjective. Performance optimization work is notoriously open-ended,
    making it difficult to plan around.


    My key takeaway on being responsive is in the establishment of an upper bound
    of acceptability. This removes the ambiguity of “is it slow, or is it stuck” when
    diagnosing failures. An upper bound on responsiveness also provides a starting
    point for discussing and planning for response time improvements.


    An application’s users appreciate responsive applications, and developers will
    find them easier to operate. This is the most user-visible property and executing
    it well can help establish a positive feedback cycle with the business where they
    build trust in the application and it’s developers to provide the system to them
    in a timely manner.'
