    ## 事件溯源与 CQRS


    正如在讨论时间时提到的，我们将构建一个融合**事件溯源**（ES）和**命令查询职责分离**（CQRS）的系统。


    事件溯源最初由马丁·福勒于 2005 年[提出](https://www.martinfowler.com/eaaDev/EventSourcing.html)
    ^(¹³)。虽然命名归功于他，但这一理念无疑早于他的相关著述。其基本主张十分简单：将应用程序状态的每一次变更都捕获为事件，并将事件集合作为应用程序的**事实来源**。事件根据发生顺序自然形成序列。这个有序的事件集合被称为事件日志。事件日志是应用程序的事实来源，描述了已发生的变更序列。虽然这是一种自然的记录变更方式，但并非查询系统当前状态的天然机制。为了获得"当前状态"的概念，需要重放事件日志来推导出状态值。


    事件日志中的第一个事件是特殊的，因为它独立存在于时间中，不依赖任何其他事件。后续每个事件都建立在前一个事件的基础上。要推导出"状态"的概念，必须遍历事件日志，通过反复整合每个事件所代表的变更来构建状态。如果你熟悉函数式编程概念，这相当于一个折叠操作。在
    Java 的 Stream 库中，这对应`reduce`操作。这样做的一个好处是，可以通过在所需时间点终止操作来重建任意时间点的状态。


    虽然事件溯源对于捕获状态变更非常有用，但基于事件的表示形式并不适合查询。于是 CQRS 应运而生。


    CQRS 由[乌迪·达汉](https://udidahan.com/2009/12/09/clarified-cqrs/) ^(¹⁴)和[格雷格·杨](http://codebetter.com/gregyoung/2010/02/16/cqrs-task-based-uis-event-sourcing-agh/)
    ^(¹⁵)在 2000 年代末期推广。这是一种非常直接的模式：为命令（写入）和查询（读取）使用独立的模型。CQRS 模式可以应用于任何场景，但与事件溯源结合时尤为流行。


    两者结合时，系统中负责事件溯源的部分处理写入操作。当事件发生时，新事件被整合（物化）到读取模型中。事件是自然的通信方式，因为这是事件溯源的输出。这进一步符合我们构建响应式系统的目标，即采用消息驱动的交互方式。


    事件溯源中缺失的一个细节是*什么导致了事件的创建*。可以说，这通常被当作"留给读者的练习"。别担心，本书会给出答案。在解释解决方案之前，我将更详细地说明使用
    GraphQL 的决策。


    ## 以 GraphQL 模式思考


    前一章简要介绍了 GraphQL，作为解释为何将其设为自我约束的一部分。为了理解它将如何与 ES 和 CQRS 交互，有必要进行更详细的说明。


    GraphQL 模式代表了提供方与消费方之间的契约。GraphQL 社区建议采用"模式优先"的方法。模式应尽可能用该语言最真实地表示模型，而不是将现有模型投影到
    GraphQL 中。因此，理解 GraphQL 的所有建模能力是必要的先决条件。


    顾名思义，GraphQL 是一种图结构。我将从底层向上描述其结构和可用的建模原语，从图的叶子节点开始。GraphQL 模式中的所有顶级名称共享一个命名空间。单独来看这不是问题。但如果你的模式消费者会将其与其他模式组合，就需要意识到这一点，因为可能存在名称冲突。


    GraphQL 要求调用者明确指定请求内容。没有"通配符"机制来返回数据。构建请求时，调用者必须指定希望返回的数据。


    ### 标量和枚举


    在最底层，即图的叶子节点，有两种可能：标量值和枚举。


    有一小部分内置的标量类型：字符串、整数、浮点数、布尔值和对象标识符（ID）。也可以定义自定义标量类型，因为内置的基本类型对大多数模型来说是不够的。自定义标量通常用于容易表示为单一值的值类型，例如各种日期时间组合、URL
    和固定精度数字。我也喜欢为模型中特定的值类型使用自定义标量，而不是依赖 String 这样的通用类型。


    没有内置的枚举类型。GraphQL 的枚举在建模必须来自固定集合的值时非常有用。与某些编程语言中枚举的实现不同，GraphQL 枚举没有对应的数值。枚举值不是任何东西的代理，它们本身就是值。


    ### 对象


    模型中最简单的节点类型是对象。对象有名称，并由一个或多个字段组成。对象名称来自共享命名空间，但字段名称是对象定义本地的。字段返回标量、枚举或对象。后续小节将讨论其他几种可能性。


    一个粗略的心智模型是将对象视为键值对的集合。这很准确，但还不够。对象的字段可以声明可选和必填参数，使其具有函数的行为。更贴切的心智模型是将对象视为命名函数的集合。


    对象字段还可以指定可空性约束。默认允许任何值为可空。虽然你可能想用此来镜像模型中的现有约束，但我建议谨慎使用。


    GraphQL 的执行模型将可空性作为错误处理的一部分；如果在执行过程中发生错误，响应将从错误点开始向查询根方向转换为 null，并在第一个可空字段处停止。大量使用非空会增加错误的"影响范围"。使用非空也会限制模式的未来演进，因为将字段从非空转换为可空被视为模式的破坏性变更。


    ### 列表


    列表是对对象字段的增强。对象字段的任何返回值都可以用列表结构包装，表示可能返回多个值。字段的基数要么是零要么是一，使用列表则将其扩展为零到无穷。列表中的值是同质的。


    可空性约束与列表有两种交互方式。列表中的条目可以声明为非空，列表本身也可以声明为非空。执行模型的错误处理在这里尤其重要。我建议将列表值声明为可空，这样在执行过程中发生错误时，其他列表值仍能被返回。


    ### 输入对象


    输入对象是为对象字段参数提供结构的机制。参数必须是"原始"值（标量或枚举），或者可以组织成输入对象。


    输入对象是键值对的集合。输入对象有字段，字段值可以是标量、枚举或其他输入对象类型。值可以声明为列表，也可以声明为非空。


    在此上下文中，可空性更有用，因为它向模式使用者传达了哪些是必填参数。我建议适当地将项目标记为非空，因为从可空变为非空对调用者来说是破坏性变更。

    '
- fmt: '### Interfaces and Unions


    Interfaces and unions are two organizational facets that I alluded to when introducing
    the object type. They each may be used when defining what the value type is for
    an object field.


    Interfaces are a named set of fields that are shared across multiple object types.
    They are semantically equivalent to how interfaces behave in many programming
    languages. GraphQL’s execution model allows callers to use interface fields directly,
    as well as having conditional behavior depending upon the concrete type. At execution
    time, interfaces must be satisfied by a concrete type. It is only the schema that
    defers that specific until execution. Interfaces may be implemented only by object
    types and other interfaces.


    Unions are the opposite of interfaces. A union is a set of disjoint object types.
    Unions may not contain interfaces. They are semantically equivalent to a “Choice”
    or an “Either” type in programming languages. As the schema views them as a disjoint
    set, at execution time callers must indicate how each of the possibilities is
    to be handled.


    Interfaces and unions are **not** available for use with input objects.


    ### Queries and Subscriptions


    Queries and subscriptions are two mechanisms for defining how to read data. They
    are each represented by a special type in the schema, the `Query` and `Subscription`
    types respectively. Generally, those names are used directly, but it is also possible
    to have custom names for them in your schema and map them to the two concepts.


    Their definition is as an object type, and the same rules for object types apply
    here as well. The fields on these types make up the entry points to the model.
    It is common to see arguments used here, as it is a straightforward mechanism
    to access specific instances of a type.


    The execution model of queries and subscriptions differ. For queries, callers
    can specify multiple fields to return. The GraphQL specification declares that
    an implementation may “resolve” (i.e., execute) these fields in parallel. For
    subscriptions, there are different semantics. When requesting a subscription field,
    exactly one field must be chosen. The implementation of a subscription field has
    hidden semantics where it is returning a sequence of the field’s value type. This
    is the mechanism to provide real-time updates from a GraphQL system. Since the
    sequence is defined by the field’s value type, using unions here is powerful as
    it allows for variation in what is returned in each “tick” of a subscription.


    ### Mutations


    Mutations are the mechanism for writing data. I find the implementation of writing
    in GraphQL to be rather clever, as it exploits the notion that each field is a
    conceptual function. Like queries and subscriptions, mutations are represented
    by a special type in the schema, the `Mutation` type.


    As the mutation type is an object type, it is also using the same rules. Each
    field of this type is an available mutation, and the field’s arguments are the
    mechanism for the callers to provide the values.


    By convention, fields of this type are expected to mutate the state of the system.
    You may note that I’ve mentioned nothing prohibiting this in the prior sub-sections,
    and that is true. Similar to how it is a bad practice to implement an HTTP `GET`
    call that modifies state, the same is true for the fields of other object types,
    including the query and subscription types.


    The execution model does provide an affordance in this area. Like queries, multiple
    fields from the mutation type may be requested by callers, as a means of invoking
    multiple mutations within a single request. If the same parallel execution model
    used with queries were applied, it would limit the usefulness of this capability
    as mutations wouldn’t have a deterministic execution order. To address this, the
    execution model for the mutation type only is to resolve each field *serially*.
    This simplifies mental reconstruction of how mutations behave.


    When reading data using GraphQL, the caller is “in charge.” The schema dictates
    the available data, and the caller must specify what they want to receive. For
    mutations, the receiver is “in charge.” The schema now dictates what the caller
    must supply. For reads, there is some ambiguity as to exactly what may be returned.
    Whenever an interface or union is present, that represents a set of possibilities.
    As those constructs aren’t available for mutation inputs, the *exact* structure
    is declared in the schema, rather than the potential structure.


    A common question I have encountered from developers new to GraphQL is “How can
    I reuse my output types as inputs for my mutation?”. The simple (and unsatisfactory
    answer for them) is *you don’t*. There is an intentional bifurcation between input
    and output types in GraphQL. Replicating the REST pattern of having the same payload
    shape used between `GET`, `PUT`, and `POST` operations is not made easy. I believe
    this is the GraphQL authors steering implementers toward certain interaction patterns.


    The GraphQL community recommends that mutations should be as *specific as possible*.
    This is in contrast to REST APIs where a `GET`/`PUT`/`POST` trio often operate
    in concert using the same payload shape. By having specific mutations, the scope
    and side effects of a mutation are communicated clearly. When mutations involve
    workflows, this can be intention-revealing.


    A pattern I’ve observed with REST APIs is the triggering of side effects based
    upon field changes. Consider an API for a system that is responsible for the payment
    of invoices. As new invoices are received, they are entered into the system. There
    is a workflow where users must approve and invoice, and after approval payment
    is automatically scheduled. The REST API implementation has a `GET` endpoint to
    retrieve an invoice and a `POST` to modify an invoice. There are multiple mutable
    fields on an invoice and for this example we’re focusing on the `status` field.
    To approve an invoice, the `status` field is modified from “received” to “approved.”
    Upon receiving this payload, the endpoint observes the change, and triggers the
    payment workflow. The workflow is a side effect of the `POST`. On its surface,
    the API definition doesn’t indicate this will happen. Yes, it can be captured
    in documentation, but that won’t be immediately visible in the calling codebase.
    It is possible to have a separate endpoint that makes this explicit. However,
    in practice, my observation is that this isn’t always done.


    Implementing the same interaction pattern in GraphQL isn’t the most straightforward
    path, as there would need to be an object type that describes an `Invoice` and
    then a parallel `InvoiceInput` input type for a mutation. This can be incrementally
    better than a REST API, as the input type would only list the mutable fields.
    In addition to being *specific*, mutations should also be *sematic*. Following
    that advice, this example would have a mutation named `approveAndPayInvoice`,
    explicitly describing what it does. It intentionally obscures the relationship
    with the `status` field. Approving is an action unto itself. The act of approving
    updates the status field, rather than updating the status field triggering an
    action. This may be an inversion of how the API is conceptualized. I find it powerful.


    I find the bifurcation of input and output types to be a valuable tool in API
    design. They are two sides to state: a request to change state and an observation
    of the state. This is similar to the state relationship between commands and events
    that was introduced in Chapter [6](#511062_1_En_6_Chapter.xhtml). The symmetry
    between input types and commands vs. output types and events is how we will combine
    GraphQL with Event Sourcing and CQRS.'
