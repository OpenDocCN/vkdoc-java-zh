    to requests. When the monitor eventually triggers an alert, or a caller reports
    an error that they’ve received, you will need to rely on your tools to diagnose
    the problem.


    Learning to use the tools you have available to diagnose problems *while trying
    to diagnose a problem* is an exercise in frustration, not to mention either lengthening
    the diagnosis time or an inability to find the problem.


    Ideally, you will know how to use the tools and interpret their data. This must
    be learned, and it should be done explicitly.


    In my current role, we run a weekly rotation of whose turn it is to be the first
    responder for problems in the system. Often, there may not be any problems during
    the week, leading to a very straightforward hand-off process. If there have been
    problems, there will be a discussion to share the learned context with the individual
    taking responsibility.


    To learn our tools and how to interpret their data, the individual who was responsible
    the prior week would walk the team through our tools to understand how to use
    them. This solves multiple goals.


    Firstly, it creates what I call an *ambient understanding* of the system’s behavior.
    By looking at the system’s high-level metrics such as CPU or memory usage, you
    will build an understanding of what normal for your system looks like. Perhaps
    there is a repeating pattern of CPU usage day-over-day. You may learn that a small
    spike at a given time isn’t out of the ordinary. Then, when triaging a problem
    in the system, you then know that the same small spike is unlikely to be a factor
    in the problem as it is a regular occurrence. If you hadn’t built this ambient
    understanding of normal, you may end up spending time investigating something
    that turned out to be a red herring.


    Secondly, it is an opportunity to dig into potential red herrings! Using the same
    small CPU spike example, the first time it is observed, dig in to understand why!
    Do the same type of diagnosis that would be done when triaging an actual problem,
    but without the pressure that real problems bring. This is where you and your
    team will learn how to use the tools to answer questions about the system. Perhaps
    the CPU spike is correlated with a latency spike. You can then look at the traces
    to see what requests the system was receiving. If the traces aren’t providing
    sufficient data, you have an opportunity to enhance the captured data.


    Learning how to use your tools in the middle of an incident will be frustrating.
    Realizing that your system isn’t emitting sufficient information for you to understand
    its behavior will delay your ability to diagnose problems. In order to provide
    a resilient system, it is important for its operators, you, to learn how to operate
    it. Practice is required, and practice is best done in a controlled environment,
    not during the more stressful environment of an incident.


    Testing will help minimize incidents, but it is impossible to eliminate the unexpected.


    ## Summary


    While individual components of the system can be tested in isolation, and there
    is value in doing so, there is also value in testing the composed system. You
    have learned about property-based testing and how to apply it to our system. You
    have also learned that there is a place for example tests, especially early on
    in development and to test the system’s error messages. I explained the value
    of using traces to understand the system’s internal behavior and how synthetic
    monitoring can be used to check that the system is operating as expected when
    deployed. Finally, I explained a valuable practice, to practice investigating
    the system to build an ambient understanding of its behavior and to ensure that
    it is emitting sufficient information to diagnose problems. The next chapter will
    review our system against our goals and look forward to what technologies are
    needed for an implementation.


    Footnotes [1](#511062_1_En_12_Chapter.xhtml#Fn1_source)


    # 13. Required Technologies


    This chapter is the culmination of my proposed design for business applications.
    It begins with a brief review of the system’s design and then a recap of our constraints
    and principles, discussing how they have been incorporated.


    With the full set of goals fresh in your mind, I will then go over the types of
    technologies that will be needed to implement the design. This will remain high
    level, speaking to the desired capabilities, rather than specific implementations.


    At the end of this chapter, you will understand how the proposed design meets
    the goals and the types of building blocks you will need in order to craft an
    implementation. Let’s dive in.'
  trans: '

    ## 练习使用工具


    编写测试有助于确保系统按预期运行。监控则有助于确保系统正常运行并能响应请求。当监控最终触发警报，或调用方报告他们收到的错误时，你将需要依靠工具来诊断问题。


    在*试图诊断问题*的过程中学习使用现有工具来诊断问题，是一种令人沮丧的体验，更不用说这会延长诊断时间或导致无法找到问题根源。


    理想情况下，你应当知道如何使用这些工具并解读其数据。这需要学习，并且应该明确地进行。


    在我目前的职位上，我们每周轮换一次，由谁担任系统问题的第一响应者。通常，一周内可能不会出现任何问题，从而形成一个非常直接的交接流程。如果出现过问题，则会进行讨论，将已了解到的背景信息分享给接任者。


    为了学习我们的工具以及如何解读其数据，上一周负责的人会带领团队了解我们的工具，学习如何使用它们。这解决了多个目标。


    首先，它建立了我所说的对系统行为的*环境理解*。通过查看系统的高级指标，如 CPU 或内存使用率，你将建立起对系统正常状态的认知。也许 CPU 使用率存在逐日重复的模式。你可能会了解到，在特定时间出现的小峰值并非异常。那么，当排查系统问题时，你就会知道同样的小峰值不太可能是问题的因素，因为它是一种常规现象。如果你没有建立这种对正常状态的环境理解，你可能会花时间调查一些最终被证明是误导性线索的问题。


    其次，这也是深入探究潜在误导性线索的机会！以同样的 CPU 小峰值为例，第一次观察到时，深入探究其原因！采用与排查实际问题时相同的诊断方式，但没有实际问题带来的压力。这正是你和你的团队学习如何使用工具来回答有关系统问题的时候。也许
    CPU 峰值与延迟峰值相关。然后你可以查看追踪信息，了解系统当时正在接收哪些请求。如果追踪信息没有提供足够的数据，你就有机会增强所捕获的数据。


    在事故处理过程中学习如何使用工具会令人沮丧。意识到你的系统没有发出足够的信息来让你理解其行为，会延迟你诊断问题的能力。为了提供一个有弹性的系统，其操作者——也就是你——学习如何操作它至关重要。实践是必需的，而实践最好在受控环境中进行，而不是在事故这种压力更大的环境中。


    测试将有助于最大限度地减少事故，但不可能消除意外情况。


    ## 总结


    虽然系统的各个组件可以单独测试，并且这样做有其价值，但测试组合后的系统同样有价值。你已经了解了基于属性的测试以及如何将其应用于我们的系统。你还了解到示例测试也有其用武之地，尤其是在开发初期以及测试系统错误消息时。我解释了使用追踪信息来理解系统内部行为的价值，以及如何使用合成监控来检查系统在部署后是否按预期运行。最后，我介绍了一种有价值的实践：练习调查系统，以建立对其行为的环境理解，并确保系统发出足够的信息来诊断问题。下一章将根据我们的目标回顾系统，并展望实现所需的技术。


    脚注 1


    # 13. 所需技术


    本章是我对业务应用所提出设计的巅峰。它首先简要回顾了系统的设计，然后概述了我们的约束和原则，并讨论了它们是如何被整合的。


    在脑海中清晰记住所有目标之后，我将接着介绍实现该设计所需的技术类型。这仍将保持在高层次，讨论所需的能力，而非具体的实现。


    在本章结束时，你将理解所提出的设计如何满足目标，以及你需要哪些类型的构建块来构建实现。让我们开始吧。

    '
- fmt: '# Design Review


    The primary interface to the system is via `GraphQL`. It will provide the interface
    for read-only queries, real-time subscriptions, and mutating its contained data.


    Starting with mutating data, the `GraphQL` schema contains mutations that may
    be invoked. Each mutation is part of a module named the command generator. The
    command generator is the bridge between the request/response interaction that
    caller’s interface with and the message-driven system internals. Each mutation
    is backed by a function that converts the mutation’s input into a command. This
    function may be impure, consulting external systems as needed. Commands are a
    type of immutable message that describe an intent to change the system’s data.
    They are always forward looking in time and must contain all information needed
    to process it. After creation, the new command will be appended to the command
    log for further processing. The caller now has the command’s sequence number and
    blocks further execution. It will follow the processed command log, filtering
    by the command’s sequence number, in order to determine the command’s disposition.
    Upon receipt of the processed command, it is mapped into a mutation result. If
    the command failed, that is described back to the caller via appropriately descriptive
    types in the `GraphQL` schema. If the command was a success, the final generated
    event sequence number is returned, allowing the caller to know when changes have
    been incorporated into queries, or a subscription tick has been observed.


    The command log is followed and consumed by the command processor. This module
    is responsible for translating commands into events. Events are another type of
    immutable message that describe something that has occurred to the system’s data;
    they are always backward looking in time. The command processor requires two pure
    functions to govern its operation and interactions with immutable state. When
    this module starts, it will read from the event log and use one of these functions,
    the applicator, to derive the system’s current state. The applicator takes an
    event and the current state and returns a new state instance that incorporates
    the event. This state contains the necessary information to enforce one class
    of business rule, the rules for data at rest. It will be a subset of all the information
    contained within the system. Once the current state has been derived it will be
    combined with a command using the mutator function to generate the set of events
    that describe the changes the command implies. The applicator will then be used
    on these events to derive the system’s new state. If both functions are processed
    without error, the events are committed into the event log and a processed command
    message containing the command’s sequence number, the last event’s sequence number,
    and a success flag is committed into the processed command log. This is a transactional
    all-or-nothing process. If either function fails, this may represent either a
    programming error or a constraint violation. If the applicator failed, the events
    from the mutator are discarded. A processed command message is committed to the
    processed command log containing the command’s sequence number, the sequence number
    of the last successfully processed event, and details about the nature of the
    failure.


    `GraphQL` queries and subscriptions are handled by the view module. The specifics
    of this module are left unspecified as the implementation will depend upon the
    details of your domain. The view module accesses a materialized view of the system’s
    data. This materialized view is maintained by the event materializer module. The
    event materializer consumes the event log and builds the necessary structures
    that will be used by the view module. There may be multiple event materializer
    instances if there are multiple views in use, although we have been focusing on
    a single instance, the one used to back the `GraphQL` schema. As the event materializer
    follows the event log it can window the stream using the processed command log.
    This allows the module to materialize events in batches that match command boundaries,
    preventing system states that are technically valid but not explicitly intended
    from being visible. After materializing an event the event materializer can generate
    a fire-and-forget event that allows the view module to generate new ticks on any
    active `GraphQL` subscriptions.


    The system’s design incorporates principles from both event sourcing and CQRS.
    The event log is the system’s authoritative data store which borrows from event
    sourcing. Through `GraphQL`, commands and queries are separated, borrowing from
    CQRS. Mutations generate commands and flow through the system as I have described.
    Queries (and real-time subscriptions) are handled by the view module.


    Any additional collaborating systems within your domain can be enabled with additional
    consumers of the event log. You will likely want to have a translation layer between
    the event schema that is used in the event log and the schema that is exposed
    to collaborators. I always recommend this to prevent tight coupling to the event
    log’s format. This is beneficial when changes are made as it eliminates a point
    of coordination. The system itself can be modified and the interface exposed to
    collaborators can be modified on a separate cadence that works for both parties.


    With the system’s design fresh in your mind, the next section is a recap of our
    constraints and principles with a focus on how the design satisfies each of them.


    # Constraints and Principles Recap


    There are two self-imposed constraints on the system’s design, and eight guiding
    principles. The constraints represent strategic decisions that I believe are aligned
    with where the industry is heading and are synergistic with the principles. In
    enumerating a set of principles for the system, it is a declaration of how the
    system should be thought about when looking at the implementation. Decisions should
    tie back to one or more principles. They provide guidelines for those that may
    work on the system in the future. From one perspective, they are a step removed
    from specific architectural decisions. They are the principles by which architectural
    decisions are made.


    ## GraphQL


    `GraphQL` is a schema-driven mechanism for interfacing with a system. It has become
    extremely popular with UI developers due to its type system and the ability for
    clients to control what data is fetched. It is an open standard and is seeing
    active investment and adoption across the industry. `GraphQL` schemas can include
    in-line documentation for the contained types and operations as well as the ability
    to deprecate fields. I believe these primitives are foundational for loose coupling
    between systems and teams. By describing itself with a `GraphQL` schema, developers
    that need to interact with a system have the essential information available to
    them. There are many tools available for working with `GraphQL` allowing the benefits
    of working with schemas to be available on many platforms. Yes, there are mechanisms
    to achieve many of the same benefits with REST-style APIs. However, the tooling
    to do so isn’t as rich and widely available.


    `GraphQL`’s discrete input and output types are aligned with CQRS. Mutations map
    to commands which drive the event-sourced architecture.'
