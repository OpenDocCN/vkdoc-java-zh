    is processing multiple input partitions, a failure handling an event only needs
    to stop that partition, not the entire materializer (although you may find the
    policy of stopping the entire materializer easier to implement initially).


    This behavior is likely to be undesirable to some when it is explained. You may
    be encouraged to couple command processing and event materialization into a single
    unit of work that can either succeed or fail in unison. I caution against this,
    as I believe it is an attempt to bend the system’s architecture to one’s development
    practices. The risk that others will have in mind relates to programming errors,
    not view store failures, as this coupling doesn’t change behavior in the event
    of a view store failure. I believe that, and have found in practice, that testing
    can sufficiently mitigate this risk, the subject of the next section. There can
    still be gaps in tests, and my fallback is then development practices that are
    largely out of scope for this book. By having a fast build process and practicing
    continuous delivery, you should ideally be able to take changes you’ve made into
    production in a timely fashion. You can use the duration of these processes as
    the minimum amount of time it will take to get any code changes deployed. This
    is a starting point for conversations with your business partners to understand
    what the system’s availability objectives are, which can guide implementation
    decisions. When the event materializer fails to handle an event due to programming
    errors, it doesn’t impact the system’s ability to service read requests. The ability
    to have partial failures such as this is a form of resiliency.


    ## Testing


    The event materializer is deterministic. Given an input event, it should perform
    the same action each time. This is should, not will, as there is the possibility
    that the action could vary: when the event materializer is consuming from multiple
    input partitions. Determinism remains, but the number of possible actions is a
    function of the number of partitions. In the simple case of having two partitions
    with events `A` and `B`, it is necessary to handle `A` then `B`, as well as `B`
    then `A`. This also depends upon your implementation though. The handling of `A`
    and `B` could be independent, with a common routine that is executed after `A`
    or `B` has been handled. In much of my work, the testing of how the event materializer
    handles an event isn’t performed as testing of the event materializer, it is performed
    as testing of the entire system. In order to test how the event materializer has
    handled an event, it will be necessary to query the stateful view. This is related
    to the testing of GraphQL queries and subscriptions against this view. I’ve found
    that testing the entire system is preferable, for reasons that I’ll explain in
    depth in the next chapter.


    The stateful view model is also an opportunity to check the results of the command
    processor. If the stateful view is stored in a system that allows for declarative
    constraints, such as a relational database, the capabilities of the store can
    be used. I have found it beneficial to cross-check both unique constraints as
    well as foreign key relationships. Should handling of an event violate a constraint,
    it will point to an error within the command processor, not the event materializer.
    This is an example of the type of error that should be caught within tests, as
    should this occur within a deployed system, the remediation would require the
    removal of the view constraint, and then handling the fix as a business rule change
    as described in Chapter [6](#511062_1_En_6_Chapter.xhtml).


    While testing the entire system makes sense for how the event materializer handles
    any given event, the event materializer itself can, and should, be tested in isolation.
    When testing the entire system, it is important to minimize the possibility that
    those tests fail due to errors in the event materializer itself. The isolated
    tests for the event materializer should be written against a set of events that
    are unrelated to your domain and ridiculously simple. I use simple domains, and
    like the command generator tests, often silly ones that personalize the tests,
    such as counting the number of times my cat has been fed.


    Testing the event materializer in isolation also makes the simulation of failures
    more straightforward. Tests can be written to simulate the failure of the stateful
    view store, as well as guards around soft handler failures such as failing to
    complete within a given timeframe.


    ## Summary


    The event materializer maintains the stateful view model that is used to satisfy
    GraphQL queries and subscriptions. You have learned how this model can evolve
    over time, and how the evolution of the view model is akin to maintaining multiple
    purpose-built view models. I have explained how the view is best maintained transactionally,
    and how the command processor’s processed command log can be used to provide consistency
    of the view relative to a command. You have learned how to think about testing
    the event materializer, what testing is appropriate for the materializer itself,
    and what testing is best done on the entire system, the topic of the next chapter.


    # 12. Testing, Monitoring, and Observability


    The prior three chapters introduced our system’s key components: the Command Processor,
    Command Generator, and Event Materializer. Each of those chapters contained a
    section relating to how to test the component. The testing of each component in
    isolation builds confidence in the component itself. That doesn’t translate to
    confidence in the composed system. It is necessary to test all components working
    together, end-to-end. In this chapter, you will learn how I’ve approached testing
    to build this confidence. I discuss the value of being able to understand the
    internal state of the system from its outputs and how to instrument our system
    to achieve this. You will learn why it is necessary to consider how the system
    will be operated in production during the design phase. Let’s go.


    ## Key Components


    Before discussing how to test the system’s major components end-to-end, I wanted
    to refresh ourselves on the components and how they are tested in isolation.'
  trans: '

    ## 管理故障


    故障总会发生，无论是有计划的还是意外的。事件物化器维护着一个有状态视图，这通常意味着有一个外部系统在管理状态存储。这个外部系统不可能 100%可用，至少它很可能需要软件更新。意外故障也随时可能发生，例如事件物化器在处理特定事件时出现错误。因此，有必要明确地为故障制定计划，而不是自认为是不会写出
    bug 的完美开发者，并认为意外故障的可能性足够低。我们的系统对业务至关重要，这正是我们首先编写它们的原因。


    如果有状态视图存储本身不可用，就会影响从系统读取数据的能力。然而，值得注意的是，系统将继续接受写入操作。命令处理器与事件物化器是解耦的，事件物化器中的故障不会停止命令处理。不过，根据乐观锁的使用位置，写入操作可能会被有效禁用，因为如果无法观察最新的序列号，调用者将无法读取该值以将其提供给变更操作。


    事件物化器按顺序从事件日志中消费。如果在处理某个事件时发生故障，事件物化器**必须**停止。如果事件物化器试图“跳过”一个事件，其视图将变得不一致。然而，整个事件物化器并不需要停止。如果事件物化器正在处理多个输入分区，处理一个事件时的故障只需停止该分区，而不是整个物化器（尽管你可能会发现，停止整个物化器的策略在初始实现时更简单）。


    当解释这种行为时，某些人可能会觉得不可取。你可能会被鼓励将命令处理和事件物化耦合到一个要么全部成功、要么全部失败的工作单元中。我对此持谨慎态度，因为我认为这是试图让系统架构屈从于个人开发实践。其他人担心的风险与编程错误有关，而非视图存储故障，因为这种耦合在视图存储故障时并不会改变行为。我相信，并且在实践中也发现，测试可以充分缓解这种风险，这是下一节的主题。测试中仍然可能存在漏洞，我的后备方案则是本书范围之外的开发实践。通过拥有快速的构建流程并实践持续交付，理想情况下，你应该能够及时地将所做的更改投入生产。你可以将这些流程的持续时间作为部署任何代码更改所需的最短时间。这是与业务伙伴沟通以了解系统可用性目标的起点，这些目标可以指导实现决策。当事件物化器因编程错误而无法处理事件时，它不会影响系统服务读取请求的能力。能够处理此类部分故障本身就是一种弹性形式。


    ## 测试


    事件物化器是确定性的。给定一个输入事件，它每次都应执行相同的操作。这是“应该”，而非“一定”，因为操作可能会有所不同：当事件物化器从多个输入分区消费时。确定性仍然存在，但可能操作的数量是分区数量的函数。在有两个分区且事件分别为
    `A` 和 `B` 的简单情况下，有必要处理 `A` 后 `B`，以及 `B` 后 `A` 的情况。不过，这也取决于你的实现。处理 `A` 和 `B` 可能是独立的，并在处理完
    `A` 或 `B` 后执行一个公共例程。在我的许多工作中，测试事件物化器如何处理事件并非作为事件物化器的测试来执行，而是作为整个系统的测试来执行。为了测试事件物化器如何处理事件，有必要查询有状态视图。这与针对该视图测试
    GraphQL 查询和订阅有关。我发现测试整个系统更可取，原因我将在下一章深入解释。


    有状态视图模型也是检查命令处理器结果的一个机会。如果有状态视图存储在允许声明式约束的系统中，例如关系型数据库，那么可以利用该存储的能力。我发现交叉检查唯一约束和外键关系非常有益。如果处理某个事件违反了约束，它将指向命令处理器中的错误，而非事件物化器。这是应该在测试中捕获的错误类型的一个例子，因为如果这种情况发生在已部署的系统中，补救措施将需要移除视图约束，然后按照第
    6 章所述，将其作为业务规则变更来处理。


    虽然测试整个系统对于事件物化器如何处理任何给定事件是有意义的，但事件物化器本身可以，也应该被隔离测试。在测试整个系统时，重要的是要最小化这些测试因事件物化器本身的错误而失败的可能性。事件物化器的隔离测试应针对一组与你的领域无关且极其简单的事件来编写。我使用简单的领域，并且像命令生成器测试一样，经常使用一些个性化的、甚至有点傻的测试，比如计算我的猫被喂了多少次。


    隔离测试事件物化器也使模拟故障更加直接。可以编写测试来模拟有状态视图存储的故障，以及围绕软处理程序故障（例如在给定时间范围内未能完成）的防护措施。


    ## 总结


    事件物化器维护着用于满足 GraphQL 查询和订阅的有状态视图模型。你已经了解了这个模型如何随时间演变，以及视图模型的演变如何类似于维护多个专用视图模型。我解释了视图最好以事务方式维护的原因，以及如何使用命令处理器的已处理命令日志来提供视图相对于命令的一致性。你已经了解了如何思考测试事件物化器，哪些测试适合物化器本身，以及哪些测试最好在整个系统上进行——这是下一章的主题。


    # 12. 测试、监控与可观测性


    前三章介绍了我们系统的关键组件：命令处理器、命令生成器和事件物化器。每一章都包含一个关于如何测试该组件的部分。隔离测试每个组件可以建立对该组件本身的信心。但这并不能转化为对组合后系统的信心。有必要端到端地测试所有组件协同工作。在本章中，你将学习我如何通过测试来建立这种信心。我将讨论从系统输出中理解其内部状态的价值，以及如何为我们的系统添加检测以实现这一点。你将了解为什么在设计阶段就必须考虑系统在生产中如何运行。让我们开始吧。


    ## 关键组件


    在讨论如何端到端地测试系统的主要组件之前，我想先回顾一下这些组件以及它们是如何被隔离测试的。

    '
- fmt: '### Command Processor


    The command processor is responsible for maintaining a class of business rules,
    the rules for data at rest. As input, it takes a command, which is a request to
    change the state of the system. A function you provide, the mutator, is provided
    with a command and the current system state and is responsible for generating
    a set of events that describes the changes the command wishes to enact. Another
    function you provide, the applicator, takes in an event and the system state,
    returning a new state instance that incorporates the changes the event describes.
    The applicator and mutator are pure functions, functions with no side effects.
    The state instance is an immutable data structure containing the necessary state
    to enforce the business rules.


    These three items, the applicator and mutator functions, plus the state, are the
    application-specific portions of the command processor. The remainder of the command
    processor’s implementation is agnostic to the logic within these functions.


    In Chapter [9](#511062_1_En_9_Chapter.xhtml), I described how the applicator,
    mutator, and state can be tested individually. They can also be orchestrated in
    a test without using the command processor itself.


    ### Command Generator


    The command generator is responsible for the creation of a command from a change
    request, such as the system’s GraphQL mutations. It submits the command for processing
    by appending it to the command log. It is then responsible for awaiting the command’s
    disposition and communicating that to the caller.


    The testing described in Chapter [10](#511062_1_En_10_Chapter.xhtml) was around
    the mechanical infrastructure of this component, rather than the domain-specific
    work of creating a command. I deferred the testing of the domain-specific logic
    to this chapter.


    ### Event Materializer


    The event materializer maintains the stateful view that is used to answer GraphQL
    queries.


    Like the command generator, I described in Chapter [11](#511062_1_En_11_Chapter.xhtml)
    how the event materializer itself can be tested in isolation. The checkpointing
    infrastructure and orchestration of the view maintenance can be tested with simple
    events that are divorced from your actual domain. This gives confidence that the
    event materializer itself works before using the materialization functions for
    your domain’s events. Just like the command generator, I believe the domain-specific
    portions of the event materializer are best tested by testing the composed data
    flow.


    ### Composed Data Flow


    From write to read, change requests are communicated to the system as a GraphQL
    mutation. The command generator converts the mutation input into a command, performing
    any necessary communication with external systems. It submits the command to the
    command log, which establishes the order of execution. The command processing
    engine consumes commands from the command log one at a time. For each command,
    it calls your mutator function to create the set of events the command implies.
    It then calls your application function to advance the command processor’s state.
    If both items succeed, the events are appended to the event log, and a processed
    command is recorded with the disposition of the command.


    The command generator is awaiting this disposition. If the command fails, a detailed
    error is returned. Otherwise, the sequence number of the final event the command
    generated is returned.


    The event materializer is consuming from the event log. As soon as the events
    are appended, it will start updating the stateful view. This happens in parallel
    with the communication of the command disposition to callers, only for successful
    commands of course, as a failed command would yield no events.


    To observe their changes, the caller can execute a GraphQL query, providing the
    sequence number from the mutation response as an indicator of the minimum view
    version they require. This provides read-after-write consistency for callers that
    make changes. Callers can also use an active GraphQL subscription to observe the
    change. They will receive a subscription tick after the event materializer has
    updated the view.


    To test the system in a way that gives confidence that it will handle requests
    from callers, it is necessary to exercise this composed data flow.'
