  trans: '

    ### 实时更新


    我认为，让用户界面能够实时响应数据变化，是业务应用早该具备的能力。其具体使用方式会因应用而异。实时更新旨在实现对系统变更的主动观察，无论其用于用户界面、推送通知还是电子邮件。通过将其作为系统的一项约束，就相当于宣告这些变更是*重要的*。许多消费类应用的界面都利用了实时更新，导致用户期望他们使用的软件也具备此能力。我认为，是时候让业务应用也拥有这种能力了。


    由于系统完全由事件驱动，实时更新自然得以实现。GraphQL 的订阅功能是观察这些变更的自然机制。当成功的变更操作返回一个序列号，指示何时可以观察到结果时，调用者就会被引导使用订阅作为与系统交互的主要方式，从而有助于实现*默认实时*。


    ### 永不遗忘


    作为开发者，我们使用源代码控制来记住源代码的先前状态。我们也应该为用户在他们系统之外操作的数据提供这种能力。数据存储成本持续下降，并且借助云环境，存储容量可以按需添加。过去那些原地修改数据、遗忘先前状态的技术原因已不再成立。遗忘数据是一个策略决策，而非技术决策。业务应用应默认保留所有数据变更。这使用户能够理解数据是如何形成的。观察数据随时间的变化，也是业务洞察的来源之一。


    将数据以变更粒度存储为离散事件，使得系统能够永不遗忘。关于在 GraphQL API 中暴露哪些内容的决定可以在后续时间点做出。当对 GraphQL schema
    中暴露内容的需求发生变化时，事件物化器可以重新物化事件。默认情况下，数据永远不会被丢弃，即使它最初可能不可见。


    ### 消息驱动


    通过采用消息驱动，系统与我在第三章讨论的响应式宣言的基本原则保持一致。消息交换也是面向对象编程中一个有时会被忽视的核心概念。与 GraphQL API 的某些交互将是同步的，例如执行查询和变更操作。GraphQL
    订阅则直接接入系统底层消息驱动的本质。一个变更操作会生成一个命令，而命令的处理过程就是一个消息驱动的流程。如果命令被成功处理，它将生成描述已发生变更的事件（即更多消息）。这些事件将被事件物化器用于更新用于查询和订阅的视图模型。与协作系统的交互通过将事件映射为要与之交换的消息来完成。


    ### 读写分离


    GraphQL 对查询、订阅和变更操作的分离，为读写分离提供了基础。写入通过变更操作完成，变更操作生成命令并馈送给命令处理器。这些组件不用于系统的读取路径，读取路径只需要查询事件物化器的输出。虽然读取和写入可能通过同一个
    GraphQL schema 暴露，但内部实现路径是离散的，遵循 CQRS 的思想。底层基础设施的分离程度随后成为一个可推迟的实现决策。系统的架构已经为这种分离做好了准备。


    ### 部分可用性


    在高层面上，部分可用性与读写分离密切相关。由于读取和写入在系统内走不同的路径，它们可以独立地发生故障而不会危及整个系统（尽管在某些情况下，一个仅可用于写入的系统其价值可能存疑）。通过命令和事件日志进行消息传递，允许生产者或消费者独立地发生故障。日志会缓冲消息，使系统中受影响的部分能够在故障后恢复其活动。系统被设计为具备部分可用性。


    ### 设计灵活性


    正如我最初讨论设计灵活性时提到的，这是一个模糊的话题。并没有一个具体的度量标准来精确衡量一个设计有多灵活。这需要随着时间的推移，通过观察系统能否逐步演进而非需要整体替换来体现。业务应用可能成为更大业务流程中的关键部分，从而变得根深蒂固。如果业务需求发生变化，而系统架构无法适应，那么业务就会陷入困境：是应该绕开软件工作，还是应该采取更困难的工作，要么强行将变更塞入系统，要么完全替换系统？


    我相信所提出的设计是灵活的。系统的各个组件通过交换消息实现松耦合。由于基础数据存储是以事件为变更粒度，因此可以根据需要引入新事件。事件的物化视图并非永久性决策，可以根据需要调整。甚至选择
    GraphQL 也提供了灵活性；可以调整 schema，或者完全移除对 GraphQL 的使用。


    ### 模块化


    模块化与设计灵活性直接相关；它是创建灵活设计的手段之一。本节中的章节解释了系统的核心模块：命令处理器、命令生成器和事件物化器。你的实现可能需要额外的模块，通过接入命令和事件日志即可轻松集成这些模块。通过使用消息传递作为主要的交互模式，模块之间是松耦合的，从而使设计保持灵活。


    ### 可测试性


    在介绍构成高层数据流的每个模块时，我都讨论了该模块如何被测试。我认为这证明了系统的可测试性。第 12 章讨论了使用基于属性的测试来测试组合系统。将并发变更操作序列化到命令日志中，使得命令处理器可以顺序执行，从而具有确定性。系统的设计消除了测试变更操作竞态条件的需要，因为它们在追加到命令日志时就已经被提前解决了。如何测试系统的模块以及整个系统本身，从一开始就是一个考虑因素。

    '
- fmt: '### Amenability to Change


    This remains my favorite principle, and a phrase that I will often repeat. Systems
    that are amenable to change survive and thrive for years or even decades. Ones
    that aren’t are discarded and hopefully replaced with ones that are. That depends,
    of course, that the developers doing the replacement worked on the original implementation
    and can understand why there was a need to rewrite the system. If a new team of
    developers is taking over responsibility for an existing system, a common pattern
    I’ve seen is for them to embark upon a rewrite without reflecting upon *why* a
    rewrite is necessary. By skipping that reflection, they may fall into the same
    trap as the system they are replacing.


    Being amenable to change is a culmination of the prior principles. It isn’t sufficient
    to state this alone, the reasons why must be enumerated. A well-tested system
    can be changed without fear of introducing unintended behavior changes. A modular
    system allows for incremental extension and replacement, constraining the blast
    radius of changes. Partial availability provides bulkheads when something inevitably
    goes wrong. The principles here support and buttress each other to create a resilient
    system that I believe is amenable to change.


    You now understand how the system’s design supports the constraints and principles
    that we wish the system to have. The next section explores the technologies that
    will be depended upon to craft an implementation.


    ## Required Technologies


    There are a handful of technologies that will be required to implement the described
    system. As I have described each module of the system, your mind may have already
    started thinking about how the module may be implemented. This part of the book
    has focused on the design, and the following discussion of the technologies remains
    at that higher level. The broad characteristics of the technology are described
    without yet matching them with an implementation, the subject of the final part
    of this book.


    ### Append-Only Log


    An append-only log is a data structure that represents a sequence of entries with
    the sole write operation being appending new entries at the end of the log. More
    succinctly this is a log, but I find adding the *append-only* qualifier helpful
    when discussing with others.


    The command, event, and processed command logs instances of this type of log within
    the system. While each of these logs stores a different type of message, the fundamental
    behaviors are the same.


    As messages are appended to a log they are assigned a strictly increasing sequence
    number; these do not need to be contiguous integers. The log must support appending
    multiple messages as a part of a transaction.


    Transactions must have the standard ACID properties, atomicity, consistency, isolation,
    and durability. In the context of our system, writing multiple messages should
    be atomic. The only required invariant for consistency is the assignment of strictly
    increasing sequence numbers to each message. Only the command log will receive
    concurrent writes, so there will be concurrent transactions that must be isolated
    from each other. The order in which commands are appended to the log defines the
    order that they will be processed in. When a batch of events is committed to the
    log, successful completion of the transaction indicates that they are durably
    stored.


    For reads, there are two cases to support. The first is a read over the entire
    log and the second is seeking a specific sequence number and reading from that
    position onward. While the second may be emulated using a read over the entire
    log, filtering out messages less than the specified sequence number, native support
    for seeking is desirable as it aligns with how the materialization engine interacts
    with the log when the system starts.


    ### Pub/Sub Messaging


    `Pub/Sub` is shorthand for publish/subscribe. A pub/sub messaging system is one
    where there may be multiple publishers and multiple subscribers. When a message
    is published, it is delivered to all subscribers. There is no defined order for
    messages and each subscriber *may* see discrete orderings. Messages are ephemeral.
    If a subscriber leaves then any undelivered messages are lost. A subscriber will
    not receive messages that were published prior to their arrival. All subscribers
    must receive messages that are published while they are present.


    The append-only message logs manifest within the system as infinite logs. Read
    operations never end, instead waiting for new messages and emitting them upon
    arrival. As this may not be a native feature for an append-only log, it is called
    out as a discrete technology requirement as it may be constructed by combining
    the append-only log with pub/sub messaging. After the commit of an append operation
    to the message log, the writer publishes a message indicating that the log has
    new messages. This allows the application-level manifestation of the message log
    to subscribe to the pub/sub messages and use those messages as triggers to re-query
    starting from the last-observed sequence number.


    The materialization engine also makes use of pub/sub messaging. When the materialization
    engine updates the view for a given domain identifier, it can publish a message
    indicating that the update has occurred. GraphQL subscriptions are backed by these
    updates; each GraphQL subscription is a transient subscription to the updates.
    When an update occurs, it may result in a new message being sent on the subscription.
    A message on a GraphQL subscription is not guaranteed because there is a disconnect
    between exactly what data was updated in the view and exactly what the GraphQL
    field selection set contains. While the view updates may be made more granular,
    I find that this is generally diminishing returns in system complexity. There
    must be enough updates that would result in a material amount of work to determine
    if there is an update to send. It is good to be cognizant of this decision, and
    I prefer to monitor and address as necessary, rather than undertaking more work
    from the start.


    ### Distributed Locking


    The system’s design isn’t restricted to a single application instance. When deployed
    to a cloud environment, it *should* be run as multiple instances for resiliency.
    Deployments will also have multiple versions of the application running as new
    instances come into service prior to destroying old ones. While any instance will
    be able to serve read traffic, the system’s design assumes that the command processor
    and materialization engine are singletons, running on a single instance.


    In order to prevent multiple instances from running these modules, we require
    a mechanism for distributed locks. The command processor and materialization engine
    will be guarded by their own locks, allowing them to each to run on different
    instances, while only allowing at most one instance to run each. Each instance
    will have a background process that is continually trying to acquire the lock,
    and if successful, will start the guarded module. When an instance terminates,
    the lock will be released allowing another instance to take over that responsibility.


    Your implementation may have additional modules for your domain that also need
    to act as singleton processes, and the same distributed locking implementation
    should be reusable for those purposes as well.'
  raw: '### Amenability to Change


    This remains my favorite principle , and a phrase that I will often repeat. Systems
    that are amenable to change survive and thrive for years or even decades. Ones
    that aren’t are discarded and hopefully replaced with ones that are. That depends,
    of course, that the developers doing the replacement worked on the original implementation
    and can understand why there was a need to rewrite the system. If a new team of
    developers is taking over responsibility for an existing system, a common pattern
    I’ve seen is for them to embark upon a rewrite without reflecting upon *why* a
    rewrite is necessary. By skipping that reflection, they may fall into the same
    trap as the system they are replacing.


    Being amenable to change is a culmination of the prior principles. It isn’t sufficient
    to state this alone, the reasons why must be enumerated. A well-tested system
    can be changed without fear of introducing unintended behavior changes. A modular
    system allows for incremental extension and replacement, constraining the blast
    radius of changes. Partial availability provides bulkheads when something inevitably
    goes wrong. The principles here support and buttress each other to create a resilient
    system that I believe is amenable to change.


    You now understand how the system’s design supports the constraints and principles
    that we wish the system to have. The next section explores the technologies that
    will be depended upon to craft an implementation.


    ## Required Technologies


    There are a handful of technologies that will be required to implement the described
    system. As I have described each module of the system, your mind may have already
    started thinking about how the module may be implemented. This part of the book
    has focused on the design, and the following discussion of the technologies remains
    at that higher level. The broad characteristics of the technology are described
    without yet matching them with an implementation, the subject of the final part
    of this book.


    ### Append-Only Log


    An append-only log is a data structure that represents a sequence of entries with
    the sole write operation being appending new entries at the end of the log. More
    succinctly this is a log, but I find adding the *append-only* qualifier helpful
    when discussing with others.


    The command, event, and processed command logs instances of this type of log within
    the system. While each of these logs stores a different type of message, the fundamental
    behaviors are the same.


    As messages are appended to a log they are assigned a strictly increasing sequence
    number; these do not need to be contiguous integers. The log must support appending
    multiple messages as a part of a transaction.


    Transactions must have the standard ACID properties, atomicity, consistency, isolation,
    and durability. In the context of our system, writing multiple messages should
    be atomic. The only required invariant for consistency is the assignment of strictly
    increasing sequence numbers to each message. Only the command log will receive
    concurrent writes, so there will be concurrent transactions that must be isolated
    from each other. The order in which commands are appended to the log defines the
    order that they will be processed in. When a batch of events is committed to the
    log, successful completion of the transaction indicates that they are durably
    stored.


    For reads, there are two cases to support. The first is a read over the entire
    log and the second is seeking a specific sequence number and reading from that
    position onward. While the second may be emulated using a read over the entire
    log, filtering out messages less than the specified sequence number, native support
    for seeking is desirable as it aligns with how the materialization engine interacts
    with the log when the system starts.


    ### Pub/Sub Messaging


    Pub/Sub is shorthand for publish/subscribe. A pub/sub messaging system is one
    where there may be multiple publishers and multiple subscribers. When a message
    is published, it is delivered to all subscribers. There is no defined order for
    messages and each subscriber *may* see discrete orderings. Messages are ephemeral.
    If a subscriber leaves then any undelivered messages are lost. A subscriber will
    not receive messages that were published prior to their arrival. All subscribers
    must receive messages that are published while they are present.


    The append-only message logs manifest within the system as infinite logs. Read
    operations never end, instead waiting for new messages and emitting them upon
    arrival. As this may not be a native feature for an append-only log, it is called
    out as a discrete technology requirement as it may be constructed by combining
    the append-only log with pub/sub messaging. After the commit of an append operation
    to the message log, the writer publishes a message indicating that the log has
    new messages. This allows the application-level manifestation of the message log
    to subscribe to the pub/sub messages and use those messages as triggers to re-query
    starting from the last-observed sequence number.


    The materialization engine also makes use of pub/sub messaging. When the materialization
    engine updates the view for a given domain identifier, it can publish a message
    indicating that the update has occurred. GraphQL subscriptions are backed by these
    updates; each GraphQL subscription is a transient subscription to the updates.
    When an update occurs, it may result in a new message being sent on the subscription.
    A message on a GraphQL subscription is not guaranteed because there is a disconnect
    between exactly what data was updated in the view and exactly what the GraphQL
    field selection set contains. While the view updates may be made more granular,
    I find that this is generally diminishing returns in system complexity. There
    must be enough updates that would result in a material amount of work to determine
    if there is an update to send. It is good to be cognizant of this decision, and
    I prefer to monitor and address as necessary, rather than undertaking more work
    from the start.


    ### Distributed Locking


    The system’s design isn’t restricted to a single application instance . When deployed
    to a cloud environment, it *should* be run as multiple instances for resiliency.
    Deployments will also have multiple versions of the application running as new
    instances come into service prior to destroying old ones. While any instance will
    be able to serve read traffic, the system’s design assumes that the command processor
    and materialization engine are singletons, running on a single instance.


    In order to prevent multiple instances from running these modules, we require
    a mechanism for distributed locks. The command processor and materialization engine
    will be guarded by their own locks, allowing them to each to run on different
    instances, while only allowing at most one instance to run each. Each instance
    will have a background process that is continually trying to acquire the lock,
    and if successful, will start the guarded module. When an instance terminates,
    the lock will be released allowing another instance to take over that responsibility.


    Your implementation may have additional modules for your domain that also need
    to act as singleton processes, and the same distributed locking implementation
    should be reusable for those purposes as well.'
  trans: '

    ### 可变更性


    这仍然是我最喜欢的原则，也是我常挂在嘴边的一句话。具备可变更性的系统能够存活并蓬勃发展数十年之久。而那些不具备此特性的系统则会被淘汰，并有望被具备该特性的系统取代。当然，这取决于负责替换的开发者是否参与了原始系统的实现，并能理解重写系统的必要性。如果由一个新的开发团队接手现有系统，我常见的一种模式是，他们会在没有反思*为何*需要重写的情况下就着手重写。跳过这种反思，他们可能会重蹈被替换系统的覆辙。


    具备可变更性是前述各项原则的集大成者。仅仅陈述这一点是不够的，必须列举出原因。一个经过充分测试的系统，可以在不担心引入意外行为变化的情况下进行修改。一个模块化的系统允许增量式扩展和替换，从而限制变更的影响范围。当某些环节不可避免地出现问题时，部分可用性提供了隔离舱。这里的各项原则相互支持和巩固，共同构建出一个我认为具备可变更性的弹性系统。


    现在你理解了系统的设计是如何支撑我们希望系统拥有的约束和原则的。下一节将探讨实现具体方案所依赖的技术。


    ## 所需技术


    实现所描述的系统需要少数几项技术。当我描述系统的每个模块时，你的大脑可能已经开始思考该模块如何实现。本书的这一部分聚焦于设计，而接下来对技术的讨论也保持在这个较高层面。这里描述了技术的广泛特性，但尚未将它们与具体实现相匹配，这是本书最后一部分的主题。


    ### 仅追加日志


    仅追加日志是一种数据结构，它表示一系列条目，其唯一的写入操作是在日志末尾追加新条目。更简洁地说，这就是一个日志，但我发现在与他人讨论时，加上*仅追加*这个限定词会很有帮助。


    命令、事件和已处理命令日志是系统中此类日志的实例。虽然每个日志存储不同类型的消息，但其基本行为是相同的。


    当消息被追加到日志时，它们会被分配一个严格递增的序列号；这些序列号不必是连续的整数。日志必须支持将多条消息作为事务的一部分进行追加。


    事务必须具有标准的 ACID 属性，即原子性、一致性、隔离性和持久性。在我们的系统上下文中，写入多条消息必须是原子性的。一致性唯一需要的不变量是为每条消息分配严格递增的序列号。只有命令日志会接收并发写入，因此会存在必须相互隔离的并发事务。命令被追加到日志的顺序定义了它们将被处理的顺序。当一批事件被提交到日志时，事务成功完成表明它们已被持久化存储。


    对于读取操作，需要支持两种情况。第一种是读取整个日志，第二种是查找特定的序列号并从该位置开始向后读取。虽然第二种情况可以通过读取整个日志并过滤掉小于指定序列号的消息来模拟，但原生支持查找功能是可取的，因为它与系统启动时物化引擎与日志交互的方式一致。


    ### 发布/订阅消息


    Pub/Sub 是发布/订阅的缩写。发布/订阅消息系统是指可以有多个发布者和多个订阅者的系统。当一条消息被发布时，它会被传递给所有订阅者。消息没有定义的顺序，每个订阅者*可能*看到不同的顺序。消息是短暂的。如果订阅者离开，那么任何未传递的消息都会丢失。订阅者不会收到在其到达之前发布的消息。所有订阅者都必须收到在其存在期间发布的消息。


    仅追加消息日志在系统中表现为无限日志。读取操作永远不会结束，而是等待新消息并在消息到达时发出它们。由于这可能不是仅追加日志的原生特性，因此它被单独列为一项技术需求，因为它可以通过将仅追加日志与发布/订阅消息相结合来构建。在向消息日志提交追加操作后，写入者会发布一条消息，指示日志有新消息。这使得消息日志在应用层面的表现能够订阅发布/订阅消息，并将这些消息作为触发器，从最后观察到的序列号开始重新查询。


    物化引擎也利用了发布/订阅消息。当物化引擎更新给定领域标识符的视图时，它可以发布一条消息，指示更新已发生。GraphQL 订阅由这些更新支持；每个 GraphQL
    订阅都是对更新的临时订阅。当更新发生时，可能会导致在订阅上发送一条新消息。GraphQL 订阅上的消息并不保证送达，因为视图中实际更新的数据与 GraphQL
    字段选择集包含的内容之间存在脱节。虽然视图更新可以做得更细粒度，但我发现这通常会导致系统复杂性的收益递减。必须有足够多的更新，才会产生实质性的工作量来确定是否有更新需要发送。意识到这个决策是好的，我倾向于监控并根据需要处理，而不是从一开始就承担更多工作。


    ### 分布式锁


    系统的设计并不局限于单个应用实例。当部署到云环境时，为了弹性，它*应该*以多个实例的方式运行。部署时也会同时运行多个版本的应用，因为新实例会在销毁旧实例之前投入使用。虽然任何实例都能处理读取流量，但系统的设计假设命令处理器和物化引擎是单例的，运行在单个实例上。


    为了防止多个实例运行这些模块，我们需要一种分布式锁机制。命令处理器和物化引擎将由各自的锁保护，允许它们各自在不同的实例上运行，同时只允许最多一个实例运行每个模块。每个实例都会有一个后台进程持续尝试获取锁，如果成功，就会启动受保护的模块。当实例终止时，锁会被释放，允许另一个实例接管该职责。


    你的实现中可能还有其他需要作为单例进程运行的领域模块，同样的分布式锁实现也应可重用于这些目的。

