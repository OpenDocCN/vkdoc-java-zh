- fmt: '# Resilient


    Failures will happen, planned or unplanned. If you don’t plan to handle failure
    gracefully, it won’t be. Gracefully handling failure reduces the operational toil
    on the system. By minimizing the impact of a failure, the recovery time can be
    decreased, restoring service quickly and safely. The business expects the application
    to be there when it needs it, and resiliency is the means to make that happen.
    In the user’s eyes, is system being “up,” being available.


    In a broader view, being resilient is about handling *unexpected system states*.
    If a component fails, it is unexpected, otherwise the failure would have been
    handled.


    There is also an expected system state that developers put the system in that
    may result in the system being unavailable, **deployments**.


    A deployment can be seen as a transition between two states, the state in which
    the system is running the old and new code. The frequency of this depends on how
    often deployments occur. If you are practicing continuous delivery, this could
    occur, well, continuously. There is another dimension to a deployment depending
    on how it occurs. A period where there is *more* code running than usual, or *less*.


    If you want there to be no visible downtime with a deployment, the likely case
    if you are practicing continuous deployment, then you will be experiencing the
    state where there is more code than usual running. The duration of this will vary
    with the strategy used to bring the new version online. Even in the simplest case,
    where the old version is disabled as soon as the new one is running, there is
    a period of time where both are active which must be accounted for. There are
    more complex strategies for incremental activation of new code. In all cases,
    they result in a longer period of overlap.


    The other choice is taking downtime to deploy. Stop the old code, start the new.
    The system is unavailable for a period of time while the deployment is occurring.
    From a user perspective, or the perspective of a collaborating service, this is
    no different than an unplanned failure. While this isn’t providing resiliency
    for the code that is being deployed, in a system composed of multiple services,
    being able to individually deploy a service and having its collaborators handle
    it being available is resiliency in action.


    Whether the starting point is in handling unexpected failures, or smoothing a
    deployment process, they are complementary and support each other. Being able
    to handle failure uniformly across the system aids in management and remediation.


    # Elastic


    Elasticity is the trickiest to utilize, and it’s also the hardest to align a clear
    benefit. Effective utilization is an advanced topic. I believe the important part
    is making it *possible*, because adding elasticity to a system that hadn’t accounting
    for these extension points can be a challenge.


    If a system experiences a constant usage level, there’s no elasticity in the workload.
    If there is variability in the usage level, it must be a significant enough variation
    to warrant allocating or releasing system resources. Our business applications
    are more likely to be measured in requests per minute, a doubling of which may
    not be a significant change. Given a cloud environment where there is a three-instance
    cluster for resiliency, effectively auto-scaling this size of cluster is tricky.
    It may be better to increase to a new fixed size rather than the spending time
    fine-tuning an auto-scaling policy. If you have a large cluster, auto-scaling
    is easier.


    However, on the flip side, if the variability is significant and auto-scaling
    can be effective, being elastic saves costs. It will longer be necessary to over-provision
    resources to handle peak loads, removing the need to pay for unused capacity during
    the quieter periods. If cost is already a factor, a system may be intentionally
    under-provisioned relative to peak loads with a reliance on luck, hoping that
    the peaks don’t lead to too many undesirable outcomes.


    # Message Driven


    This is the ultimate answer. To a degree, the other properties represent “nice
    to haves” in a business application. The primary benefit in building a business
    application is a reactive system is to be message driven.


    The prior three properties, responsive, resilient, and elastic, can be seen as
    operational. To be truly message driven, the system’s architecture needs to operate
    in that manner into its core. This property fundamentally effects system architecture.
    As I discussed in the prior chapter, your system is already composed of messages.
    Our goal is to preserve them.


    Let’s think about the types of messages that exist in a system, their purposes,
    and the value in retaining the abstraction.


    Imagine a status-quo service , a colloquial REST endpoint storing data in a relational
    database via an ORM. A HTTP request to change some data in the system is a message.
    The request is consumed by the application, and using the appropriate logic, updates
    the object model and persists the changes. A response message is returned.


    We started with a message, the request, and end with a message, the response.
    We have *transformed* the request into the response.


    Breaking this example down further, the HTTP request is a message representing
    a *request for change* to the system. Conceptually, this is a **command**. There
    is often some validation on the incoming request to ensure that it is structurally
    sound, such as checking for required fields. If those have succeeded, we can consider
    the command to have been *accepted* by the application.


    The application consumes this command and updates the object model. This is likely
    still prospective, as there may be database constraints that need to be met. It
    isn’t until transaction commit time that the application knows for certain that
    the update has been a success. This is the *processing* of the command. The transaction
    disposition, whether it committed successfully or failed, is the command’s *result*.


    If the result is a failure, an error response can be immediately returned, a transformation
    of the result. In success case, the object model that was modified as part of
    the command is probably used to return a response payload, another type of transformation.
    Each case, success or failure, represents another message.


    Without an explicit representation of the command, it is easy for the above logic
    to become conflated, making testing more difficult. This can go against the developer’s
    expectation of the system, being amenable to change. The inherit structure of
    the application requires constant vigilance to prevent this.


    If we reify the command as a message , we can operate upon it explicitly. There
    is a straightforward processing pipeline for this command. Each step can be represented
    by a discrete, testable, piece of code. Ultimately, that is what this book is
    about, and Part 3 is an in-depth exploration of how to achieve this.


    By using an explicit command , the system can be message driven. In utilizing
    this representation of what the system is doing, it provides a framework for how
    its logical components interact. This consistent (and yes, opinionated) design
    philosophy informs how the application is structured.


    Exchanging messages between components allows us to apply the same inversion of
    control that is used in wiring up component references to the system’s data flow.
    The same benefits are reaped, improved reuse, reducing coupling, and independent
    evolution.


    In a business application, where it is acting as a source of truth and managing
    workflows, it is paramount to be able to change how the data flows safely and
    with confidence. That is the reason to build them as a reactive system.'
