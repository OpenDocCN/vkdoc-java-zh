  trans: '

    ## 设计评审


    系统的主要接口通过 GraphQL 提供。它将为只读查询、实时订阅以及变更其包含的数据提供接口。


    从数据变更开始，GraphQL 模式包含可调用的变更操作。每个变更操作都属于一个名为命令生成器的模块。命令生成器是调用者接口所依赖的请求/响应交互与消息驱动的系统内部机制之间的桥梁。每个变更操作都由一个函数支持，该函数将变更操作的输入转换为命令。这个函数可能是不纯的，需要时需咨询外部系统。命令是一种不可变的消息类型，描述了更改系统数据的意图。它们始终面向未来，并且必须包含处理所需的所有信息。创建后，新命令将被追加到命令日志中以供进一步处理。调用者现在拥有命令的序列号，并会阻塞后续执行。它将跟踪已处理的命令日志，根据命令的序列号进行过滤，以确定命令的处理结果。收到已处理的命令后，它会被映射为变更结果。如果命令失败，则通过
    GraphQL 模式中适当描述性的类型向调用者说明。如果命令成功，则返回最终生成的事件序列号，使调用者能够知道更改何时已纳入查询，或者何时已观察到订阅的更新信号。


    命令日志由命令处理器跟踪并消费。该模块负责将命令转换为事件。事件是另一种不可变的消息类型，描述了系统数据已发生的某些情况；它们始终回顾过去。命令处理器需要两个纯函数来管理其操作以及与不可变状态的交互。当此模块启动时，它将从事件日志中读取，并使用其中一个函数（应用器）来推导系统的当前状态。应用器接收一个事件和当前状态，并返回一个包含该事件的新状态实例。此状态包含执行一类业务规则（即静态数据规则）所需的信息。它将是系统内所有信息的一个子集。一旦推导出当前状态，它将使用变异器函数与命令结合，以生成描述该命令所隐含更改的事件集。然后，应用器将用于这些事件，以推导系统的新状态。如果两个函数都处理无误，则事件被提交到事件日志，并且一条包含命令序列号、最后一个事件的序列号以及成功标志的已处理命令消息被提交到已处理命令日志。这是一个事务性的全有或全无过程。如果任一函数失败，这可能表示编程错误或约束违规。如果应用器失败，则丢弃来自变异器的事件。一条已处理命令消息被提交到已处理命令日志，其中包含命令序列号、最后一个成功处理的事件的序列号以及有关失败性质的详细信息。


    GraphQL 查询和订阅由视图模块处理。该模块的具体细节未作规定，因为实现将取决于您领域的细节。视图模块访问系统数据的物化视图。此物化视图由事件物化器模块维护。事件物化器消费事件日志，并构建视图模块将使用的必要结构。如果使用了多个视图，则可能存在多个事件物化器实例，尽管我们一直专注于单个实例，即用于支持
    GraphQL 模式的实例。当事件物化器跟踪事件日志时，它可以使用已处理命令日志对流进行窗口化处理。这允许模块在匹配命令边界时批量物化事件，从而防止技术上有效但非明确预期的系统状态变得可见。在物化一个事件后，事件物化器可以生成一个即发即弃的事件，允许视图模块在任何活跃的
    GraphQL 订阅上生成新的更新信号。


    该系统的设计融合了事件溯源和 CQRS 的原则。事件日志是系统的权威数据存储，这借鉴了事件溯源。通过 GraphQL，命令和查询被分离，这借鉴了 CQRS。变更操作生成命令，并按照我描述的方式流经系统。查询（以及实时订阅）由视图模块处理。


    您领域内的任何其他协作系统都可以通过添加事件日志的额外消费者来启用。您可能希望在事件日志中使用的事件模式与向协作者公开的模式之间设置一个转换层。我始终建议这样做，以防止与事件日志格式紧密耦合。这在做出更改时非常有益，因为它消除了一个协调点。系统本身可以修改，而向协作者公开的接口可以按照对双方都适用的不同节奏进行修改。


    在您对系统设计有了清晰了解之后，下一节将回顾我们的约束和原则，重点介绍设计如何满足每一项。


    ## 约束与原则回顾


    系统设计有两个自我施加的约束，以及八项指导原则。这些约束代表了战略决策，我认为这些决策与行业的发展方向一致，并且与这些原则相互协同。在列举系统的一系列原则时，这相当于声明了在审视实现时应如何思考该系统。决策应回溯到一个或多个原则。它们为将来可能从事该系统工作的人员提供了指导方针。从某种角度来看，它们与具体的架构决策相隔一步。它们是制定架构决策所依据的原则。


    ### GraphQL


    GraphQL 是一种基于模式的系统接口机制。由于其类型系统以及客户端能够控制获取哪些数据，它在 UI 开发者中变得极为流行。它是一个开放标准，并且在整个行业中正获得积极的投资和采用。GraphQL
    模式可以包含所包含类型和操作的内联文档，以及弃用字段的能力。我相信这些原语是系统和团队之间松散耦合的基础。通过使用 GraphQL 模式描述自身，需要与系统交互的开发者可以获取到基本信息。有许多可用于处理
    GraphQL 的工具，使得在多个平台上都能享受到处理模式的好处。是的，存在一些机制可以通过 REST 风格的 API 实现许多相同的好处。然而，这样做的工具并不那么丰富和广泛可用。


    GraphQL 的离散输入和输出类型与 CQRS 保持一致。变更操作映射到驱动事件溯源架构的命令。

    '
- fmt: '### Real-Time Updates


    I believe that enabling user interfaces to react in real time to changes in data
    is a long overdue capability for business applications. The specific ways in which
    this will be used will vary from application to application. Real-time updates
    are about enabling the proactive observation of changes to the system, whether
    it is used for a UI, a push notification, or an email. By adding this as a constraint
    to the system, it is a declaration that they are *important*. Many consumer applications
    have interfaces that leverage real-time updates, leading users to expect this
    capability in software they interact with. I believe it is time to make this capability
    available to business applications as well.


    With the system being entirely event driven, real-time updates happen naturally.
    GraphQL’s subscription facilities are a natural observation mechanism for these
    changes. When successful mutations return a sequence number indicating when the
    results may be observed, callers are thus steered toward using subscriptions as
    the primary way to interact with the system, helping enable being *real-time by
    default*.


    ### Never Forget


    As developers, we use source control to remember prior states of our source code.
    We should be providing that capability to our users for the data they manipulate
    without our systems. The cost of storing data continues to decline, and with cloud
    environments storage capacity can be added on demand. Technical reasons from the
    past for mutating data in place, forgetting prior states, are no longer sound.
    Forgetting data is a policy decision, not a technical one. Business applications
    should default to retaining all changes to data. This allows users to understand
    how data came to be. A source of insight for the business is also the observation
    of how data changes over time.


    Storing data at the grain of change, as discrete events, allows the system to
    never forget. The decision of what to expose in the GraphQL API can be made at
    a later point in time. The event materializer can rematerialize events as requirements
    change for what is exposed in the GraphQL schema. Data is never discarded by default,
    even though it may not initially be visible.


    ### Message Driven


    In being message driven, the system is aligned with the fundamental principles
    of the Reactive Manifesto that I discussed in the third chapter. Exchanging messages
    is also a sometimes-overlooked core concept of object-oriented programming. Some
    interactions with the GraphQL API will be synchronous, such as execution queries
    and mutations. GraphQL subscriptions tap directly into the underlying message-driven
    nature of the system. A mutation will generate a command, and the processing of
    the command is a message-driven flow. If the command is successfully processed
    it will generate events, more messages, describing what has changed. Those events
    will be used by the event materializer to update the view model that is used for
    queries and subscriptions. Interaction with collaborating systems is accomplished
    by mapping the events into messages to exchange with them.


    ### Read/Write Separation


    GraphQL’s separation of queries, subscriptions, and mutations provides the basis
    for separating reads and writes. Writes are accomplished with mutations, which
    generate commands and feed the command processor. These components are not used
    in the system’s read path, which only needs to interrogate the output of the event
    materializer. While reads and writes may both be exposed via the same GraphQL
    schema, the internal implementation paths are discrete, following the ideas of
    CQRS. The degree to which the underlying infrastructure is separate then becomes
    a deferrable implementation decision. The system’s architecture is already amenable
    to this separation.


    ### Partial Availability


    At a high level, partial availability is closely related to the separation of
    reads and writes. With reads and writes taking discrete paths within the systems,
    they may fail independently without compromising the system (although the value
    of a system that is available for writes only may be dubious in some situations).
    The use of message passing via the command and event logs allows either the producers
    or consumers to fail independently. The logs will buffer messages allowing affected
    portions of the system to resume their activities after failure. The system is
    set up to be partially available.


    ### Design Flexibility


    As I mentioned when initially discussing design flexibility, it is a squishy topic.
    There’s no specific measure of exactly how flexible a design is. It is something
    that will be seen over time as the system is able to incrementally evolve rather
    than requiring wholesale replacement. Business applications can become critical
    pieces in larger business processes and thus become very entrenched. If business
    requirements shift in a way that a system’s architecture cannot accommodate, the
    business is then placed in a bind; should it work around the software, or should
    the more difficult work to either force the change into the system or replace
    the system entirely be taken?


    I believe the proposed design is flexible. The components of the system are loosely
    coupled, exchanging messages. With the fundamental data storage at the grain of
    change via events, new events can be introduced as needed. The materialized view
    of the events isn’t a permanent decision and can be adjusted as needed. Even the
    choice of GraphQL provides flexibility; the schema can be adjusted, or the usage
    of GraphQL could be removed entirely.


    ### Modularity


    Modularity is directly related to design flexibility; it is one of the means of
    creating a flexible design. The chapters in this section explained the core modules
    of the system, the command processor, command generator, and the event materializer.
    Your implementation may require additional modules which will be straightforward
    to integrate by tapping into the command and event logs. By using message passing
    as the primary interaction pattern, modules are loosely coupled allowing the design
    to be flexible.


    ### Testability


    As a part of introducing each module that comprises the high-level data flow,
    I discussed how the module may be tested. I believe this is evidence toward the
    testability of the system. Chapter [12](#511062_1_En_12_Chapter.xhtml) discussed
    testing the composed system using property-based testing. The serialization of
    concurrent mutations into the command log allows the command processor to be sequential
    and thus deterministic. The system’s design removes the need to test mutation
    race conditions as they are resolved early when appending to the command log.
    How to test the system’s modules and the entire system itself has been a consideration
    from the start.'
