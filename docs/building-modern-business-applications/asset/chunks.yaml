  trans: '

    ### 命令创建


    每个 GraphQL 变更（mutation）*可能*都需要创建一个测试，以确保它能生成预期的命令。老实说，我倾向于不编写这些测试，而是让这种快乐路径验证作为我将在第
    12 章描述的综合系统测试的一部分。在大多数情况下，这里执行的逻辑将是从变更的输入参数到命令的直接转换。


    真正值得测试的是对无效输入的处理，以及任何其生成过程涉及访问可能导致自身故障的外部系统的命令。


    GraphQL 模式中定义的每个特定错误类型，都应该有一个测试来确保它在预期情况下被生成。这些测试应模拟系统调用者的体验。这意味着测试可能不会直接调用命令创建过程。相反，它们通过向
    GraphQL 端点输入一个将执行命令创建的输入，并断言预期的 GraphQL 响应，来间接调用此过程。我认为这是在确保代码行为符合预期、验证调用者体验符合预期以及不过度编写测试之间取得的一个务实平衡。如果用于将输入转换为命令的底层函数已经过测试，仍然需要确保命令创建失败能正确传达给调用者。我倾向于编写测试来获得对系统的必要信心，而从
    GraphQL 层测试命令创建能给我这种信心。


    一个例外是依赖于外部系统的命令创建，在这种情况下我需要在测试中注入故障。如果创建命令需要与另一个系统通信，那就存在发生故障的可能性。为了保持系统的响应能力，我们需要限制外部通信的执行时间。这意味着对任何调用设置超时，并决定是否应执行重试，或者将故障传递给我们的调用者，让他们决定何时重试。这些策略的具体细节将取决于你系统的需求。除了确保系统响应能力这一通用规则之外，并没有严格且快速的规则来规定具体该做什么。


    ## 总结


    现在你明白了命令生成器是如何成为 GraphQL 变更和命令处理器之间的桥梁的。它负责收集必要的信息来创建一个完整的命令，这是一个关键步骤，它使得命令处理器的变更函数能够保持无状态和纯粹。你也了解了如何开始确定命令的适当粒度，以及对该组件进行何种级别的特定测试是合适的。由于命令生成器仅在成功变更时返回一个序列号，下一章关于事件物化器的内容将成为命令处理器事件与用于支持
    GraphQL 查询和订阅的视图之间的桥梁，以便调用者能够看到他们变更的效果。


    # 11. 事件物化器


    事件物化器负责维护一个有状态的视图模型，该模型将用于满足 GraphQL 查询和订阅。在本章中，我将讨论该组件如何消费来自我们系统事件日志的数据，并且也可以消费来自协作系统的事件流。我还将描述这种视图维护方法如何能够直接实现
    GraphQL 订阅。我将讨论事件物化器可能如何失败，以及如何对其进行测试以最小化这些故障的发生。


    ## 定义视图模型


    事件物化器维护的视图模型存在的目的是为了满足 GraphQL 请求。我们可以利用这种特异性来为我们在 GraphQL 模式中定义的查询定制模型。更具体地说，存储在视图模型中的状态形状应该能够非常直接地传递给你的
    GraphQL 引擎，只需最少的转换。如果你的模式中为了调用者易用性而反规范化了数据，那么在存储模型中也应将其反规范化。


    在第 5 章中，我讨论了业务规则，其中一种类型是可派生数据。在可能的情况下，优先预先计算这些派生数据，而不是为每个请求按需计算。一次性完成工作可以带来效率提升。系统将能够支持更多的查询，因为每个查询的计算成本更低。可以保留中间输出用于增量计算，也可以随着输入的变化存储不同版本的结果。后者对于调试很有价值。如果知道请求的时间，就有可能确定返回的数据而无需重新计算。


    事件应包含来源信息、生成时间、提交产生该事件的命令的用户身份，以及在你的领域中可能有用的其他元数据。在物化视图模型时，可以将这些信息放置在适当的位置，以告知用户谁最后接触了某条数据。事件的序列号也可以类似地使用。在上一章中，我提到向变更传递一个
    `asOfRevision` 值，以支持命令处理器中的乐观锁。考虑在你的领域中，更细粒度的乐观锁是否合适，并在你的模式中包含修订号。


    在我的工作中，我喜欢创建一个可重用的 GraphQL 类型，其中既包含来源信息也包含修订号。不幸的是，GraphQL 中还没有一个正式的 `DateTime`
    标量，但有一个开放的提案。


    不要过度追求模型的未来适应性。将视图模型视为临时的。我们系统的权威状态存储在事件日志中。如有必要，可以重新创建视图模型，我将在本章后面更深入地讨论这个主题。


    虽然我主要讨论的是用于 GraphQL 的模型，但如果你需要同时支持其他 RPC 方法，请考虑在你的服务中拥有多个事件物化器实例，每个实例维护一个定制的视图。


    ## 事件物化器行为


    事件物化器的行为很直接。它从事件日志中消费新事件，并为每个事件调用一个函数来更新有状态的视图。你的视图可以完全是临时的，为每个应用程序实例维护在内存中。在实践中，我相信你最终会使用某种外部状态存储。在为一个事件更新视图后，它接着处理下一个事件。*至关重要的是*，事件必须按顺序处理，否则视图的状态将会损坏。


    ### 事务


    我*强烈*建议使用事务性存储。在前一节中，我鼓励在视图模型中使用反规范化。单个事件可能涉及更新多条数据，而你系统的调用者应始终看到一致的状态。他们不应该能够读取部分物化的事件。


    还可以提供额外的一致性保证，即视图相对于某个命令是一致的。在第 9 章中，当我描述命令处理器时，我引入了一个数据侧通道，即已处理命令日志。已处理命令日志包含每个命令的一个事件，该事件有一个指向处理该命令所创建的最新事件的指针。可以利用这个信息将事件日志窗口化为与产生每个批次的命令相对应的批次。然后，每个批次就是事件物化器的一个事务边界。这确保了系统的读取操作始终遇到在每个变更结束时一致的状态。

    '
- fmt: '### Consistency


    事件物化器维护着一个有状态的视图。如果系统重启，它需要存储关于最后物化事件的元数据，否则它会重新处理事件并破坏视图。这个状态应该作为视图内的一个额外结构来存储。我使用术语`checkpoints`来指代这个状态。检查点将包含最近物化的事件序列号，并在事件物化时以事务方式更新。当系统重启时，它将使用这个序列号来知道从何处开始重新消费事件日志。


    检查点也可以用于为变更提供写后读一致性。在第[10](#511062_1_En_10_Chapter.xhtml)章中，我描述了成功的变更如何只产生一个单一值，即最终事件的序列号。这个序列号可以作为`GraphQL`查询的可选参数，指示事件物化器必须至少物化到这个事件。


    需要注意的是，这仅适用于那些已经执行了变更的调用者。只有他们知道系统状态已发生变化，因此也只有他们知道自己应该等待系统执行某个操作。这种行为是最终一致性，我在第[6](#511062_1_En_6_Chapter.xhtml)章讨论时间时曾提及此话题。如果来自两个不同调用者的变更和查询在短时间内相继到达，查询不保证能看到变更的结果，因为变更可能仍在通过命令处理器和事件物化器的处理过程中。如果这两个调用者协同工作，那么他们有责任将变更者的`visibleAsOfRevision`共享给查询者。这是额外的工作，但同时也使得这两个调用者之间的耦合变得明确。我相信从长远来看，组合系统中的依赖关系会得到更好的暴露，从而有助于可维护性。如果这个认识令人不安，可以考虑如何从架构上将其从调用者中消除。


    ### 多数据源


    虽然事件物化器的主要输入是我们系统的事件日志，但在计算派生数据时，有时需要使用来自其他系统的数据。


    在第[9](#511062_1_En_9_Chapter.xhtml)章描述命令处理引擎时，我提到事件日志的一种泛化形式是消息日志。事件物化器不必局限于消费我们系统的事件日志，它可以被泛化以消费任何消息日志。


    有一类业务规则涉及显示逻辑，我在第[5](#511062_1_En_5_Chapter.xhtml)章中介绍过。如果显示逻辑需要来自其他系统的信息，并且该其他系统的数据可以以消息日志的形式呈现，那么将其与我们的事件物化器集成就会变得直接。这也符合响应式系统的一个特性，即消息驱动。


    具有单一事件日志源的事件物化器遵循以下循环：


    1.  从事件日志中取出下一个事件。

    2.  调用一个物化函数，用该事件更新有状态视图。

    3.  用事件的序列号更新检查点。

    4.  回到步骤一。


    为了将其泛化以支持多个数据源，需要一种机制来知道事件源自哪个事件日志，以便为每个源维护一个检查点。为了保持事件物化器的顺序性，它消费的所有事件日志应该被合并。从事件物化器的角度来看，它将物化的事件流可以按来源事件日志进行分区。在这种情况下，一个合理的命名是将每个事件日志视为事件物化器的一个**分区**。在进入事件物化器之前，每个事件应该被增强以包含其来源的分区信息。然后，检查点组件将使用此信息来跟踪每个分区的检查点。当系统重启时，每个分区的检查点可以正确地恢复对每个事件日志的消费。


    当合并多个事件日志时，事件将根据它们的到达时间交错排列。我们维护有状态视图的显示逻辑代码需要独立于到达顺序而得出相同的结果。


    与在请求时维护派生数据相比，在物化时维护派生数据也提高了我们系统的响应性和弹性。我们的系统更具响应性，因为数据推导所需的时间只在事件物化时发生一次，而不是作为服务请求时间的一部分。通过在事件物化时消费外部数据，我们还从系统响应时间中消除了外部系统带来的响应时间可变性。我们系统的弹性也得到了增强。与其他系统通信失败不会影响我们系统服务读取请求的能力，也不会影响事件物化过程，因为它只会表现为接收新事件的一段静默期。


    我发现这种从外部系统消费数据的模式非常强大。我的理想是拥有一组都像我们这样实现的系统。代表外部系统的消息日志可以是一个`GraphQL`订阅（我将在本章后面讨论的一种机制），用于宣布该系统有状态视图的变更。它也可以是该系统事件日志的一个版本，理想情况下，该版本已将事件映射为一种在系统间作为持久契约的格式。


    也可以使用这种范式来集成请求/响应风格的系统。外部事件日志的实现可以在后台向其他系统发起请求，并将其结果呈现为事件日志。同样，这是一种弹性的集成方式，因为通信延迟和故障不会影响事件物化器。'
  raw: '### Consistency


    The event materializer is maintaining a stateful view. If the system were to restart,
    it needs to store metadata about the last materialized event, otherwise it would
    reprocess events and corrupt the view. This state should be stored as an additional
    structure within your view. I used the term *checkpoints* to refer to this state.
    The checkpoints will contain the most recently materialized event sequence number,
    updated transactionally as events are materialized. When the system restarts it
    will use this sequence number to know where to restart consumption of the event
    log.


    The checkpoints can also be used to provide read-after-write consistency for mutations.
    In Chapter [10](#511062_1_En_10_Chapter.xhtml) I described how successful mutations
    only yield a single value, the sequence number of the final event. This sequence
    number can then be an optional argument for GraphQL queries to indicate that the
    event materializer must have materialized at least this event.


    It is important to note that this is only for callers that have made a mutation.
    They are the only ones with knowledge that the system state has changed, and thus
    they are the only ones that know they should wait for the system to perform an
    action. This behavior is eventual consistency, a topic I discussed in Chapter
    [6](#511062_1_En_6_Chapter.xhtml) when talking about time. If a mutation and a
    query from two different callers arrive shortly after one another, the query isn’t
    guaranteed to see the results of the mutation, as it could still be working its
    way through the command processor and event materializer. If the two callers are
    working together, it will be their responsibility to share the mutator’s `visibleAsOfRevision`
    with the querier. This is extra work, but at the same time it is work that makes
    explicit the coupling between these two callers. I believe in the longer term
    the dependencies in the composed system are better exposed, aiding in maintainability
    . If this is a bristling realization, consider how it could be architecturally
    eliminated from the callers.


    ### Multiple Sources


    While the primary input to the event materializer will be our system’s event log,
    sometimes it is necessary to use data from other systems when computing derived
    data.


    In Chapter [9](#511062_1_En_9_Chapter.xhtml), when describing the command processing
    engine, I mentioned that a generalization of our event log would be a message
    log. The event materializer doesn’t need to be limited by consuming our system’s
    event log. It can be generalized to consume from any message log.


    A class of business rules involves display logic, something I introduced in Chapter
    [5](#511062_1_En_5_Chapter.xhtml). If the display logic requires information from
    another system, if the data from the other system can be presented as a message
    log, it can be straightforward to incorporate with our event materializer. This
    is also aligned with a property of reactive systems, being message driven.


    An event materializer with a single event log source has a loop of:


    1.  Take the next event from the event log.


    2.  Call a materialization function with the event to update a stateful view.


    3.  Update the checkpoints with the event’s sequence number.


    4.  Go to step one.


    To generalize this to support multiple sources, a mechanism is needed to know
    which event log an event originated from so that a checkpoint for each source
    can be maintained. In order to retain the sequential nature of the event materializer,
    all the event logs it is consuming from should be merged. From the perspective
    of the event materializer, the stream of events it will materialize can be partitioned
    by the originating event log. A reasonable name in this context would be to consider
    each event log to be a **partition** to the event materializer. Prior to entering
    the event materializer, each event should be augmented to contain the partition
    it originated from. This information will then be used by the checkpointing component
    to track a per-partition checkpoint. When the system restarts, the checkpoint
    for each partition can correctly resume consumption of each event log.


    When merging multiple event logs, events will be interleaved based upon their
    arrival time. Our display logic code that is maintaining the stateful view needs
    to arrive at the same result independent of the arrival order.


    The maintenance of this derived data at materialization time, compared to request,
    also increases both the responsiveness and the resiliency of our system. Our system
    is more responsive because the time it takes to do the data derivation happens
    once at event materialization time, rather than being a part of the time to service
    a request. By consuming external data at event materialization time, we also remove
    the variability in response time from the external system from our system’s response
    time. Our system’s resilience is also increased. A failure to communicate with
    the other system doesn’t impact the ability of our system to service read requests.
    It also doesn’t impact the event materialization process as it will manifest as
    a period of quiescence in receiving new events.


    I find this pattern of consuming data from external systems to be extremely powerful.
    My ideal would be to have a set of systems all implemented as ours. The message
    log representing the external system could be a GraphQL subscription, a mechanism
    I discuss later in this chapter, announcing changes to the stateful view of that
    system. It could be a version of that system’s event log, ideally one that has
    mapped events into a format that is durable as a contract between the systems.


    It is also possible to use this paradigm to integrate with request/response style
    systems. The implementation of an external event log could be making requests
    to the other system behind the scenes, presenting its results as an event log.
    Again, this is a resilient way of integration as communication latencies and failures
    don’t impact the event materializer.'
  trans: '

    ### 一致性


    事件物化器维护着一个有状态的视图。如果系统需要重启，它必须存储关于最后物化事件的元数据，否则它会重新处理事件并损坏视图。此状态应作为视图内的一个附加结构进行存储。我使用术语*检查点*来指代此状态。检查点将包含最近物化的事件序列号，并在事件物化时以事务方式更新。当系统重启时，它将使用此序列号来确定从何处开始重新消费事件日志。


    检查点还可用于为变更操作提供写后读一致性。在第 10 章中，我描述了成功的变更操作如何仅产生一个单一值，即最终事件的序列号。此序列号随后可作为 GraphQL
    查询的可选参数，用于指示事件物化器必须至少已物化到此事件。


    需要注意的是，这仅适用于已执行变更操作的调用方。只有他们知道系统状态已更改，因此也只有他们知道自己应等待系统执行操作。这种行为是最终一致性，这是我在第 6
    章讨论时间时探讨过的主题。如果来自两个不同调用方的变更操作和查询请求先后到达，则查询不保证能看到变更操作的结果，因为该变更可能仍在命令处理器和事件物化器中处理。如果这两个调用方协同工作，则他们有责任将变更方的
    `visibleAsOfRevision` 共享给查询方。这虽然是额外的工作，但同时也明确了这两个调用方之间的耦合关系。我相信从长远来看，组合系统中的依赖关系会得到更好的暴露，从而有助于可维护性。如果这个认识令人不安，可以考虑如何从架构上将其从调用方中消除。


    ### 多数据源


    虽然事件物化器的主要输入是我们系统的事件日志，但在计算派生数据时，有时需要使用来自其他系统的数据。


    在第 9 章描述命令处理引擎时，我提到我们事件日志的泛化形式是消息日志。事件物化器不必局限于消费我们系统的事件日志。它可以被泛化，以消费来自任何消息日志的数据。


    有一类业务规则涉及显示逻辑，这是我在第 5 章中介绍过的。如果显示逻辑需要来自另一个系统的信息，并且该系统的数据可以表示为消息日志，那么将其与我们的事件物化器集成就会变得直接。这也符合响应式系统的一个特性，即消息驱动。


    具有单一事件日志源的事件物化器遵循以下循环：


    1.  从事件日志中获取下一个事件。

    2.  调用物化函数，用该事件更新有状态视图。

    3.  用该事件的序列号更新检查点。

    4.  返回步骤一。


    为了将其泛化以支持多个数据源，需要一种机制来知道事件源自哪个事件日志，以便为每个源维护一个检查点。为了保持事件物化器的顺序性，它正在消费的所有事件日志应该被合并。从事件物化器的角度来看，它将物化的事件流可以按源事件日志进行分区。在此上下文中，一个合理的命名是将每个事件日志视为事件物化器的一个**分区**。在进入事件物化器之前，每个事件都应被增强，以包含其来源的分区信息。然后，检查点组件将使用此信息来跟踪每个分区的检查点。当系统重启时，每个分区的检查点可以正确地恢复对每个事件日志的消费。


    当合并多个事件日志时，事件将根据其到达时间交错排列。我们维护有状态视图的显示逻辑代码需要得出相同的结果，而与到达顺序无关。


    与在请求时维护派生数据相比，在物化时维护派生数据也提高了我们系统的响应能力和弹性。我们的系统响应更快，因为数据派生所需的时间仅在事件物化时发生一次，而不是作为服务请求时间的一部分。通过在事件物化时消费外部数据，我们还从我们系统的响应时间中消除了外部系统响应时间的可变性。我们系统的弹性也得到了增强。与另一个系统通信失败不会影响我们系统服务读取请求的能力。它也不会影响事件物化过程，因为这将表现为接收新事件的一段静默期。


    我发现这种从外部系统消费数据的模式非常强大。我的理想是拥有一组都像我们系统一样实现的系统。代表外部系统的消息日志可以是一个 GraphQL 订阅（我将在本章后面讨论的一种机制），用于宣布该系统的有状态视图的变更。它也可以是该系统事件日志的一个版本，理想情况下，该版本已将事件映射为一种在系统间作为契约而持久的格式。


    也可以使用此范式与请求/响应式系统集成。外部事件日志的实现可以在后台向其他系统发起请求，并将其结果呈现为事件日志。同样，这是一种弹性的集成方式，因为通信延迟和故障不会影响事件物化器。

    '
- fmt: '# Evolving the View Model


    Earlier in this chapter, I introduced the idea of having multiple event materializers
    to maintain different views for different consumers. This same idea can also be
    extended to support evolution of a single view. Recall that the view model should
    be considered ephemeral as the authoritative store of state is the event log.
    This means that breaking schema changes are not a restriction of our system. The
    event materializer can be “rewound” to consume from the start of the event log,
    fully rebuilding the view.


    When I introduced the reactive principles in Chapter [4](#511062_1_En_4_Chapter.xhtml),
    for resiliency, I mentioned how deployments would always put your system into
    a temporary unexpected state. There will either be fewer instances running than
    desired, if you stop all the old instances before starting the new ones, or more,
    if you start the new ones and stop the old ones when they are able to handle requests.


    It is this latter state, having more instances running, that is akin to having
    multiple event materializers. The materializers from the old and new versions
    could be running simultaneously! A new version of code that contains backward-incompatible
    view model changes can store its stateful view into a new location. This brings
    multiple benefits. First, the old version of the code can continue to service
    requests while the new code is rebuilding the view. Second, should there be an
    unexpected problem with the new code, the deployment can be safely rolled back
    as the view used by the prior code remains untouched.


    To safely use this technique, it is critical to separate changes that involve
    the addition of new events from breaking view model changes. Should the new codebase
    process commands that yield events that the old system isn’t capable of handling,
    a rollback won’t be possible.


    In the mutate-in-place status quo systems I described in Chapter [2](#511062_1_En_2_Chapter.xhtml),
    backward-incompatible schema changes can be very tricky to manage. Removing a
    column from a table is not a reversible operation; it will be necessary to restore
    the database itself from a backup. Experienced developers will shy away from backward-incompatible
    changes as the experience of dealing with one gone awry provides the lived experience
    of how risk-prone they can be. Even reversible changes, such as changing the data
    type of a column, can be tricky to manage. Database schema management is frequently
    integrated with an application’s codebase. When the system starts, it performs
    any necessary forward migrations. If the code is rolled back, the old version
    of the code doesn’t have knowledge of how to undo the changes that a newer version
    made. This adds a separate process to run any rollback scripts to reverse the
    migrations. A risk of having a separate process is that it is one that is unlikely
    to be done frequently, adding additional risk to performing it correctly under
    the likely duress of needing to roll back a change. This is ultimately an additional
    argument as to why build business applications as reactive systems, and in the
    manner I describe. The constructs and practices that I’ve described steer developers
    toward practices that reduce risk.


    # Communicating Changes to Others


    Business applications do not exist in isolation. While they act as sources of
    truth for the information they manage, the applications also need to collaborate
    with others. This could be collaboration with humans via the applications user
    interface, or collaboration with other software systems. In either case, the system
    should be able to be *proactive* in communicating changes. The architecture I
    have laid out describes a system that is able to understand when its data has
    changed. This has been toward the goal of effectively communicating those changes
    to others. There are two broad categories to this communication. The first is
    the communication of state changes within the system to whomever it may be useful.
    The second is a class of business rules, side effects, that explicitly involve
    state changes in systems other than our own.'
