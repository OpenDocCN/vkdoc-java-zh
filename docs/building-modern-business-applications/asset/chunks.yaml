- fmt: 'As you implement the components of our system, consider where you may add
    additional spans to capture interesting pieces of work. Be liberal in adding spans
    when writing code. I view it as the software equivalent of running cables in a
    building that is under construction prior to closing the walls. It is both simpler
    and more cost-efficient to do it early in the building process rather than needing
    to retrofit existing work.


    Tracing is commoditized and there are existing solutions for your chosen language
    that you can build upon. A common feature is the ability to add arbitrary key-value
    pairs to each span, often referred to as tags. I encourage you to also be extremely
    liberal here, adding as much contextual information as you have available at the
    time. It is hard to predict what may be useful in the future.


    There are vendors you can send your traces to that allow you to perform analytics
    upon them. Each span is equivalent to a timer as it contains a start time and
    a duration. By instrumenting your code with a trace, it eliminates the need to
    separately capture timing information as a metric. Tracing is also more powerful.
    Metrics are pre-aggregated, so a timer surrounding a piece of code would at best
    record a histogram of its observed durations. If you then look at the timer values
    and see a slow outlier, you can’t tie it back to the specific request that was
    slow. By using traces as the input, a timer can be derived by aggregating the
    spans of the trace. If a slow outlier is observed, the input traces can be queried
    to understand exactly what the outliers were doing. This is also where adding
    tags beforehand becomes valuable, as tooling can also use the tags as additional
    dimensions for querying.


    Traces have become my preferred method for observing deployed systems. If there
    is a support request related to unexpected behavior, if I am provided with the
    trace ID related to the interaction, I can understand exactly what the inputs
    were and how the system behaved.


    Metrics such as CPU and memory usage do have their place. System-wide values that
    describe the overall behavior of the system and its host environment are valuable
    and should still be collected. It is beneficial to understand the aggregate behavior
    of the system, and not all the necessary data can be constructed from traces.


    Traces are also useful with property-based testing. Each arbitrarily chosen action
    can start a new trace, allowing for the mutation execution and any queries used
    for verification to be represented as their own spans. If you can confidently
    use traces to debug test failures, you will be more confident about using traces
    to diagnose behavior when the system is deployed. Using traces to debug test failures
    is also an early opportunity to understand what the valuable contextual tags for
    your domain are.


    While traces provide a mechanism to monitor the system, I prefer to refer to them
    as an observability tool, something to understand what the system is doing. Monitoring
    is a separate activity that could use traces to achieve other goals.


    ## Monitoring Production Systems


    I consider monitoring to be the act of ensuring that the system is doing what
    it is supposed to be doing. Monitoring will be accompanied by some form of alerting,
    as the system’s operators, that is, you, will want to know when the system isn’t
    doing what it should be.


    The system described in this book is amenable to a single process to ensure overall
    health. I find this beneficial as sometimes systems will have many monitoring
    processes generating alerts. When a system has many alerts, there is the increased
    likelihood of a misfire, or you will receive a deluge of alerts when there is
    a problem, requiring you to determine which one points at the actual problem.


    For a business application, the ideal monitoring mechanism would be to perform
    the same actions as the system’s callers. Unfortunately, for business applications,
    having a monitoring system make changes to the system’s data will be undesirable
    to the business.


    Another approach can be used with our system. What we ultimately want to know
    is whether commands are being processed, events are being materialized, and queries
    are being answered. This can be achieved by using a mutation that doesn’t impact
    the system’s business information. A mutation can be added to increment a counter.
    The counter will generate a command, and the processing of generating this command
    will yield an event. The event materializer will materialize the event, updating
    a stored value in the view. A GraphQL query and/or subscription can be used to
    observe the updated value.


    If this process is completing in a timely manner, other mutations and queries
    to the system should also complete (if there aren’t any logic errors). The time
    it takes this process to complete is also a health indicator of how responsive
    the system is. If the time starts to slow, an alert can be generated to give an
    early warning of potential performance problems.


    This type of process is referred to as synthetic monitoring, as we are simulating
    the actions a user may take. We are leveraging the fact that all mutations flow
    through the same process to avoid the need to change any business information
    while gaining confidence that the processes would be able to handle any actual
    requests to change business information.


    I find that synthetic monitoring works extremely well with property-based testing.
    Property-based tests provide confidence that the logic within the system behaves
    as expected. The synthetic monitoring is verifying that materials are flowing
    through the system’s metaphorical pipes. This is again the same paradigm that
    was used for testing the event materializer, the separation of testing the infrastructure
    from the business logic. If the infrastructure itself can be verified, there is
    confidence that it will work for whatever business logic is relying upon the infrastructure.


    When the system’s monitor fires an alert, the first course of action will be to
    reach for the tools you have available to diagnose the system, such as the system
    where you can interrogate traces or view system metrics.'
