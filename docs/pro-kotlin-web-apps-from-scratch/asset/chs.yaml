  ### 配置会话 Cookie


  下一步是使用基于 Cookie 的会话设置 Ktor。你已经拥有了实现此功能所需的依赖项和配置属性。


  `Sessions` 插件是此设置的核心。你将像设置 `StatusPages` 插件一样设置此插件，只不过你要将其添加到新的 `setUpKtorCookieSecurity`
  函数中。清单 9-20 展示了如何执行此操作。


  ```

  data class UserSession(val userId: Long): Principal

  fun Application.setUpKtorCookieSecurity (

  appConfig: WebappConfig,

  dataSource: DataSource

  ) {

  install(Sessions) {

  cookie("user-session") {

  transform(

  SessionTransportTransformerEncrypt(

  hex(appConfig.cookieEncryptionKey),

  hex(appConfig.cookieSigningKey)

  )

  )

  cookie.maxAge = Duration.parse("30d")

  cookie.httpOnly = true

  cookie.path = "/"

  cookie.secure = appConfig.useSecureCookie

  cookie.extensions["SameSite"] = "lax"

  }

  }

  }

  清单 9-20

  向 setUpKtorCookieSecurity 添加基于 Cookie 的会话设置

  ```


  此代码配置了基于 Cookie 的会话存储的几个重要方面。


  `UserSession` 数据类保存会话 Cookie 将包含的数据。你可以在此处放置任意多的数据——但不要太过分。请记住，浏览器将 Cookie 输出限制为
  4 KB。


  `transform` 函数设置实际 Cookie 的加密。如果没有此步骤，Cookie 将以纯文本形式存储会话信息。这意味着任何人都可以将会话 Cookie
  设置为任何值，因此攻击者可以将 Cookie 的用户 ID 设置为他们想要的任何 ID，从而有效地使任何人都能够以他们能猜到 ID 的任何用户身份登录到你的 Web
  应用程序。但是，使用 `transform` 后，Cookie 既被签名又被加密。签名意味着对其内容的任何更改都会破坏签名。加密意味着你存储在 Cookie 中的任何秘密对黑客都是不可见的——Ktor
  使用你提供的密钥加密 Cookie 的实际内容。


  你设置的各种 Cookie 标志也很重要。


  你可以自由地将 `maxAge` 设置为你想要的任何值。`maxAge` 的效果是 Cookie 将在给定时间后过期，从而导致你的用户必须重新登录。


  `path` 也必须设置为 `/`，以便 Cookie 适用于你的 Web 应用程序的所有页面。如果你不设置它，Cookie 将仅在你设置 Cookie 时所在的路径上生效。


  `secure` 意味着 Cookie 仅适用于 HTTPS，从而保护 Cookie 免受中间人攻击。你使用在清单 9-17 中创建的配置标志，以便 Cookie
  默认是安全的，但在本地开发时除外，因为你在本地通过 HTTP（而非 HTTPS）运行 Web 应用程序。


  最后，`SameSite` 设置为 `lax`，以保护你的 Cookie 免受跨源攻击。浏览器只会为源自你自己 Web 应用程序的请求发送 Cookie。如果攻击者试图从另一个网页向你的
  Web 应用程序提交表单，浏览器将不会随请求发送该 Cookie。




  ### 登录


  完成身份验证和会话存储的设置后，就可以添加登录表单了。


  你的登录表单将位于独立的路由 `/login` 上。它不会很美观，但能正常工作。美化工作就交给你了。清单 9-21 展示了登录页面的代码。


  ```

  get("/login", webResponse {

  HtmlWebResponse(AppLayout("Log in").apply {

  pageBody {

  form(method = FormMethod.post, action = "/login") {

  p {

  label { +"E-mail" }

  input(type = InputType.text, name = "username")

  }

  p {

  label { +"Password" }

  input(type = InputType.password, name = "password")

  }

  button(type = ButtonType.submit) { +"Log in" }

  }

  }

  })

  })

  清单 9-21

  登录表单的路由处理器

  ```


  这个登录表单是一个直接的 HTML 表单，它会将用户名和密码提交到另一个路由。这两个路由的路径都是 `/login`，但使用不同的 HTTP 动词。`GET /login`
  会显示登录表单，而 `POST /login` 则会执行实际的登录操作并设置会话。


  下一步是实现 `POST /login` 请求，以便在用户提交表单时执行登录。清单 9-22 展示了登录处理器的代码。


  ```

  post("/login") {

  sessionOf(dataSource).use { dbSess ->

  val params = call.receiveParameters()

  val userId = authenticateUser(

  dbSess,

  params["username"]!!,

  params["password"]!!

  )

  if (userId == null) {

  call.respondRedirect("/login")

  } else {

  call.sessions.set(UserSession(userId = userId))

  call.respondRedirect("/secret")

  }

  }

  }

  清单 9-22

  setUpKtorCookieSecurity 内部用于处理已提交登录表单的路由处理器

  ```


  请记住，要将此路由处理器添加到 `setUpKtorCookieSecurtity` 中，而不是 `createKtorApplication`。


  我倾向于只在会话 cookie 中存储用户的 ID。你也可以将电子邮件存储在那里。但如果用户更改了电子邮件，会话 cookie 中会显示旧的、缓存的电子邮件，直到用户注销并重新登录。


  请注意，你没有将此路由处理器包装在 `webResponse` 或其任何变体中。你还没有实现用于执行重定向的 `WebResponse` 数据类。而且你实际上也不需要这样做。从任何
  Ktor 处理器手动启动一个 Kotliquery 会话，并使用 Ktor API 进行重定向，这已经足够简单了。与会话相关的代码处理非常依赖于 Ktor，因此没有充分的理由将其与
  Ktor 解耦。


  为了读取提交的表单数据，你将使用 `call.receiveParameters()`。这会使 Ktor 加载并解析请求体，并将表单数据以 `Map` 结构的形式提供给你。你已经有了一个
  `authenticateUser` 函数，因此你可以使用提供的参数调用该函数。类型系统不知道你的 Web 应用运行时接收到了哪些参数，因此用户名和密码参数的类型是
  `String?`。你通过使用双感叹号（`!!`）非空断言运算符将其转换为 `String`。如果它们是 `null`，你的代码将抛出异常。在这种情况下这没问题，因为当用户在
  `GET /login` 上提交表单时，浏览器总是会将它们作为字符串传递。因此，只有当有人手动尝试使用无效参数调用 `POST /login` 时，你才会收到异常。


  如果你找到了与表单中的用户名和密码匹配的用户，你将使用 `call.sessions` 设置会话 cookie，并重定向到希望用户在登录后看到的页面。这会使 Ktor
  设置一个 `Set-Cookie` 头部，其中包含加密和签名后的 cookie 内容，以及你在清单 9-20 中配置的标志。


  如果没有找到用户，你会将用户重定向回 `GET /login` 页面（重定向始终是 GET 请求），用户可以再次尝试登录。


  ### 使用身份验证保护路由


  当用户成功登录后，你的代码会将他们重定向到 `/secret`。接下来，你将实现该路由，并将其设置为仅对已登录用户可访问。


  第一步是设置 `Authentication` 插件。你将像之前设置 `Sessions` 和 `StatusPages` 一样设置它。清单 9-23 展示了正确设置它所需调用的代码。


  ```

  install(Authentication) {

  session("auth-session") {

  validate { session ->

  session

  }

  challenge {

  call.respondRedirect("/login")

  }

  }

  }

  清单 9-23

  向 setUpKtorCookieSecurity 添加身份验证设置


  `validate` 块提供了一个使会话失效的机会。目前，你不需要在此处进行任何失效操作。这是一个检查用户是否仍存在于数据库中、是否已在数据库中标记为禁用以及其他检查的好地方。Ktor
  会在每次需要身份验证的请求中执行此验证。（本章稍后你将向路由添加身份验证。）


  当未认证的用户尝试访问受保护的路由时，Ktor 会调用 `challenge` 块。发生这种情况时，你将重定向到 `/login` 页面。不过，你可以自由地使用
  Ktor 的 `call` API 在此处执行任何操作，例如渲染错误消息。


  为了使特定路由仅对已登录用户可用，你需要将它们包装在从 Ktor 身份验证插件获得的 `authenticate` 拦截器中。清单 9-24 展示了如何保护特定路由。


  ```

  authenticate("auth-session") {

  get("/secret", webResponseDb(dataSource) { dbSess ->

  val userSession = call.principal()!!

  val user = getUser(dbSess, userSession.userId)!!

  HtmlWebResponse(

  AppLayout("Welcome, ${user.email}").apply {

  pageBody {

  h1 {

  +"Hello there, ${user.email}"

  }

  p { +"You''re logged in." }

  p {

  a(href = "/logout") { +"Log out" }

  }

  }

  }

  )

  })

  }

  清单 9-24

  在 setUpKtorCookieSecurity 中包装路由，使其仅在用户登录后可访问

  ```


  函数 `getUser` 来自第 7 章（关于编写测试）的清单 7-9。


  名称 `"auth-session"` 来自清单 9-23，你在其中配置了会话并将其命名为 `"auth-session"`。Ktor 支持在 Web 应用中同时运行多个会话机制，通过它们的名称进行标识。


  根据清单 9-23 中 `"auth-session"` 的设置，所有你包装在 `authenticate("auth-session")` 中的路由，如果用户未登录，都将重定向到
  `/login` 页面。


  受保护的路由 `/secret` 使用 `call.principal<UserSession>()!!` 来检索代表当前登录用户的会话。此函数返回你之前存储在会话
  cookie 中的数据。Ktor 会自动在 `UserSession` 数据类之间进行解码和编码。


  然而，Kotlin 类型系统并不知道会话在已认证的路由中始终存在。`principal` 函数在所有 `call` 实例上都可用，即使是不在 `authenticate`
  拦截器中的路由也是如此。但由于你知道它在已认证的路由中始终存在，因此使用双感叹号将其转换为非空类型是安全的。


  会话 cookie 通过 `UserSession` 数据类包含用户 ID。因此，你将使用该 ID 从数据库中获取实际的用户。你使用数据库中的用户行来显示已登录用户的电子邮件。图
