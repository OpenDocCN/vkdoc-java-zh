  ## 提升性能


  你可以采取多种措施来提升 AWS Lambda 处理程序的性能，这有助于节省成本，并减少 Web 应用的延迟和执行时间。


  ### 性能与冷启动


  无服务器运行时存在一个特定问题，使得处理代码必须尽可能快地完成初始化：冷启动。


  尽管被称为“无服务器”，但服务器*确实存在*。无服务器运行时需要先将代码加载到实际服务器中，才能执行。你只需为代码的实际执行时间付费，因此为了节省成本，如果代码在一段时间内未被执行，无服务器环境会将其卸载。


  当无服务器运行时尚未加载你的代码，而你尝试执行它时，就会遇到冷启动。


  当你执行图 12-8 中的测试调用时，这是你上传代码后首次执行。这意味着 AWS Lambda 无服务器运行时尚未加载并准备好你的代码。在图 12-8 中，有更多关于运行处理函数所涉及时间的详细信息。它显示*初始化持续时间*为
  444.01 毫秒，*持续时间*为 378.68 毫秒，总计 822.69 毫秒。这个数字就是你的 AWS Lambda 处理程序的*冷启动时间*。


  如果你多次尝试运行 Lambda 的测试执行，后续调用将比首次调用快得多。这被称为热启动。AWS Lambda 已将你的代码加载到其无服务器运行时中，无需花费任何时间进行初始化。在我对
  `GetTestHelloWorld` Lambda 的测试中，后续调用仅需约 2-3 毫秒。这很合理——在已启动并运行的 Java 进程上调用函数速度很快，并且与其他运行时环境相比，几乎没有额外开销。


  ### 初始化时间 vs. 执行时间


  为了进一步优化性能，你需要研究 AWS Lambda 中初始化时间与执行时间的分离。


  初始化时间仅指冷启动，具体来说，是从 AWS Lambda 开始加载你的代码，到代码加载完成并调用你的处理函数（`handleRequest`）之间的时间。


  在这个特殊的初始化阶段，AWS Lambda 会为运行时分配最大量的 RAM 和 CPU，以便你的代码尽可能快地加载，并获得尽可能低的冷启动时间。初始化阶段完成后，AWS
  Lambda 会降低运行时的性能，以匹配你配置的使用量。你按 RAM-秒付费，因此分配给 AWS Lambda 处理程序的 RAM 越多，运行成本就越高。


  此外，你无需为初始化时间付费。你只需为处理函数的首次及后续调用的执行时间付费。


  因此，你应该充分利用高性能且免费的初始化阶段，尽可能多地在处理函数执行之前运行的代码部分中，以静态方式完成工作。


  ### 懒加载


  在你执行 `GetTestHelloWorld` 时获得的时间数据中，有一个危险信号。对于冷启动调用，初始化时间为 444.01 毫秒，执行时间为 378.68
  毫秒。在后续调用中，由于无服务器运行时已加载了你的代码，因此没有初始化时间，但执行时间仅为 2-3 毫秒。


  为什么冷启动的执行时间与后续热启动的执行时间差异如此之大？


  这有力地证明了你的处理函数中存在初始化操作。当你首次执行处理函数时，无服务器运行时由于某种原因尚未完全加载某些内容。


  原因是 Java 运行时对所有类进行懒初始化。这是一件好事。你的 JAR 文件包含了 Ktor 以及你在 *build.gradle.kts* 中指定的所有依赖项。Java
  运行时仅在运行代码使用到已编译的类文件时，才会解析并加载它们。如果没有这个特性，你很快就会达到 AWS Lambda 初始化时间的 10 秒硬性限制，因为加载和解析所有这些代码工作量巨大，而
  Java 运行时通过懒加载跳过了这些工作。


  但这会产生一个副作用：导致无服务器运行时在执行期间（而非初始化期间）加载 Lambda 类的所有依赖项！H2、HikariCP、*Main.kt* 等所有代码都在执行阶段加载，因为这是运行代码首次引用这些类。


  这也适用于你在 `UserEmailSearch` 中的顶层 `private val dataSource` 声明。当你查看 Kotlin 代码时，这行代码看起来像是静态运行的。但由于
  Kotlin 编译器编写 Java 类文件的实现细节，事实并非如此。在底层，Kotlin 将 *MainServerless.kt* 中的顶层声明编译成一个名为
  `MainServerlessKt` 的 Java 类。该类有一个包含初始化 `dataSource` 属性代码的 `static` 初始化块。但你的代码首次引用该类是在
  `handleRequest` 函数内部。Kotlin 将 `dataSource` 编译为 `MainServerlessKt.getDataSource()`。当
  Java 运行时遇到该调用时，它发现尚未加载 `MainServerlessKt`。因此它会加载该类，导致相应的静态块运行。但这已经太晚了——此时你已处于执行阶段，而非初始化阶段。




  ### 正确初始化


  要解决此问题，你需要在初始化阶段以某种方式调用 `MainServerlessKt` 中的代码，以便 Java 运行时在初始化期间加载该类，而不是在首次冷启动执行期间加载。


  在优化之前，我的初始化时间为 354.8 毫秒，执行时间为 5678.15 毫秒。后续调用仅需大约 3-4 毫秒。这非常糟糕，表明初始化阶段几乎什么都没做，并且这段代码需要大量初始化时间才能工作，因为它在首次调用时花费了近
  6 秒进行自我初始化。


  漫长的初始化时间是有道理的。`GetTestHelloWorld` 几乎不做任何工作，因此它不需要那么长的初始化时间。但 `UserEmailSearch` 加载了
  Gson、你的 `WebResponse` 处理代码、HikariCP、Flyway 以及整个 H2，这是一个完整的嵌入式数据库引擎。


  解决此问题的最简单方法是为你的 `UserEmailSearch` 处理程序类添加一个带有初始化块的伴生对象。Kotlin 编译器会将该 `init` 块编译为底层
  `UserEmailSearch` Java 类中的 `static` 初始化块。这个静态初始化块将在你的 AWS Lambda 处理程序运行时的初始化阶段执行，因为
  `UserEmailSearch` 是你指定 AWS Lambda 执行以运行代码的类。清单 12-5 展示了如何使用静态初始化更新你的处理程序。


  ```

  class UserEmailSearch :

  RequestHandler, String>

  {

  companion object {

  init {

  runBlocking {

  serverlessWebResponseDb(dataSource) { dbSess ->

  dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

  JsonWebResponse("")

  }

  }

  }

  }

  override fun handleRequest(

  input: Map,

  context: Context

  ): String {

  return serverlessWebResponseDb(dataSource) { dbSess ->

  handleUserEmailSearch(dbSess, input["email"])

  }

  }

  }

  清单 12-5

  向你的 UserEmailSearch 处理程序添加 dataSource 的静态初始化

  ```


  `init` 块尽可能多地模拟实际处理程序代码所做的事情。这是为了确保 Java 运行时尽可能多地加载你在执行期间使用的类。它使用 `runBlocking`
  初始化 Kotlin 协程类，初始化整个 `WebResponse` 处理代码，并对 H2 运行一个实际的虚拟查询，从而导致所有与数据库相关的代码也被加载。


  通过这个小小的调整，我的初始化时间从 354.8 毫秒增加到了 1298.85 毫秒，但执行时间从 5678.15 毫秒下降到了仅 22.12 毫秒。这是一个巨大的胜利！现在冷启动的总时间降到了
  1320.77 毫秒，而之前是 6032.95 毫秒。因此，AWS Lambda 不再向你收取包含加载该 Lambda 中所有运行代码的 5679 毫秒执行处理程序时间，而是仅向你收取
  23 毫秒的处理程序代码执行时间。


  如果你将首次调用的执行时间（22.12 毫秒）与后续的温调用进行比较，你会发现仍然存在差异。后续的温调用仍然只需要 3-4 毫秒即可完成。因此，在初始执行期间仍然至少存在一些初始化。但
  23 毫秒已经足够低，不值得深入探究如何进一步降低这个数字。


  ### 迁移与 H2


  请注意，导致初始化时间接近 1300 毫秒的原因之一是，你在每次冷启动时都加载了整个 H2（一个完整的数据库引擎），并且还运行了你的 Flyway 迁移。


  这对于现实世界的 Web 应用来说是一个不切实际的场景。在无服务器世界中，通常甚至不使用像 HikariCP 这样的连接池库，因为无服务器函数永远不需要管理多个并发连接。事实上，如果你使用像
  AWS Aurora ([*https://aws.amazon.com/rds/aurora/*](https://aws.amazon.com/rds/aurora/)*)*
  这样的无服务器数据库，你可以通过 HTTP 请求对其运行查询，这样你就不需要管理任何连接，而是运行低延迟的即发即弃查询。


  此外，如果你从无服务器处理程序使用外部 SQL 数据库，则不应在每次冷启动时运行迁移。你甚至不应该将迁移包含在为无服务器执行环境构建的 JAR 文件中。相反，你应该在构建管道中运行数据库迁移，或者创建一个专用的无服务器函数来运行迁移，当你的构建管道部署新版本的代码时，会调用该函数。


  ### Java 运行时标志


  为了进一步优化性能，你可以研究设置 Java 运行时编译器标志的领域。


  例如，你可以将环境变量 `JAVA_TOOL_OPTIONS` 设置为 `-XX:+TieredCompilation -XX:TieredStopAtLevel=1`，这会禁用*分层编译*。分层编译是
  Java 运行时在代码运行时对其进行分析的一项功能。运行时根据分析结果动态优化你的代码。这是 Java 平台中即时（JIT）编译器的一部分，Java 运行时通过它动态地将
  Java 字节码编译为本机机器码。


  分层编译对于传统上运行数小时或数天而不关闭的基于服务器的进程是有意义的，但在启动时间很重要的环境中可能没有意义。当我使用本章中编写的 Lambda 进行测试时，初始化持续时间从大约
  450 毫秒稳定地下降到仅约 330 毫秒。但本书并非关于优化 Java 运行时性能，因此我不会在这方面深入探讨。




  ### GraalVM、Kotlin/JS 与 Kotlin Native


  提升 Java 平台 AWS Lambda 处理程序冷启动性能的另一种方法是使用 GraalVM 编译 Java 平台代码，或者使用 Kotlin 编译器的 JS
  和 Native 输出选项。


  GraalVM（*/*[*www.graalvm.org/*](http://www.graalvm.org/)）是一种替代性 Java 编译器，它将 Java
  字节码（以及扩展的 Kotlin）编译为原生可执行文件。这意味着你不会产生任何运行时开销，代码可以立即开始执行，无需等待 Java 运行时加载。使用 GraalVM
  需要注意的一个权衡是编译时间会增加，这很合理，因为 GraalVM 将 Java 运行时的大量工作转移到了自身的编译时。


  Kotlin 也可以直接开箱即用地编译为 JavaScript 和原生代码。以 Node.js 作为运行时的 JavaScript 非常适合无服务器环境，因为
  Node.js 针对快速启动时间进行了超优化，这将导致冷启动速度大大加快。


  有两个原因导致我不会在本书中向你展示如何做到这一点。


  首先，我自己从未做过这件事。我或许可以在谷歌搜索和研究之后，写出一段还算可用的关于 GraalVM 的内容，但我希望本书尽可能多地涉及我在真实场景中实际做过的事情。正如我在引言中提到的，本章在这方面已经处于边缘地带。而使用
  GraalVM 编译和运行 Java 平台代码远远超出了我的实际经验范围。Kotlin/JS 和 Kotlin Native 也是如此。我没有任何使用这些 Kotlin
  编译输出目标的经验，所以如果我来教你如何操作，那将是不诚实的。


  其次，在为本书对 GraalVM 进行一些基础研究时，我成功让 `GetTestHelloWorld` 运行了起来，但 `UserEmailSearch` 在执行时立即崩溃了。问题出在
  HikariCP 和 H2 的交互方式上，导致 HikariCP 无法加载 H2 的类，并以 `ClassNotFound` 异常崩溃。


  如果我要在 AWS Lambda 上使用 Kotlin 搭建一个真实的 Web 应用，我会谨慎引入 GraalVM。你可以让它工作，但一旦你向 Web 应用添加了一个因某种原因与
  GraalVM 不兼容的依赖，整个设置就会崩溃。


  Kotlin/JS 听起来是一个更可行的替代方案。但 Kotlin/JS 出于显而易见的原因，无法调用 Java 依赖。你编写的所有纯 Kotlin 代码都支持
  Kotlin/JS。但你必须将 Gson、HikariCP、Flyway 和 H2 替换为其他东西。令人惊讶的是，大量 Kotlin 代码可以编译为 JavaScript。例如，像
  `Appendable` 和字符串构建器这样的类 Java 结构在 Kotlin/JS 中也可用，因此你用于将 `HtmlWebResponse` 转换为 `String`
  的代码可以正常工作。但我不会对此进行更详细的讨论。Kotlin/JS 专家可能会就如何让 Kotlin 代码在 AWS Lambda 的 Node.js 运行时中运行提供很好的建议。但我的专长，以及本书的重点，在于
  Kotlin 的 Java 平台方面。


  '
- '# 13. 使用 Spring Context 进行设置、拆卸与依赖注入


  在本章中，你将学习如何使用 Spring Context 来管理 Web 应用中的资源，并通过依赖注入将组件连接在一起。


  如果你是 Kotlin 新手，以下是本章示例中你将看到的一些语言特性：


  *   使用 `lateinit` 实现空安全

  *   使用 lambda 代替对象字面量


  同样在本章中，你将学习以下关于使用 Spring Context 的知识：


  *   以编程方式创建和配置 Spring Context——无需 XML！

  *   设置懒加载 Bean

  *   初始化 Spring Context 以尽早失败

  *   在关闭时优雅地清理所有资源


  在本章中，你将学习如何使用依赖注入（而非显式初始化）来编写 Web 应用中的资源，使用 Spring Context——这个流行且无处不在的 Java 依赖注入库。


  ## 为什么选择 Spring 和依赖注入？


  有几个 Kotlin 专用的依赖注入库可供你考虑使用，例如 Koin（[*https://insert-koin.io/*](https://insert-koin.io/)）。但在本章中，你将学习如何直接使用
  Java 库 Spring Context。


  Spring Context 是 Spring 框架（[*https://spring.io/projects/spring-framework*](https://spring.io/projects/spring-framework)）的一部分，它既是传统
  Spring MVC 应用的核心组件，也是更现代的 Spring Boot 应用的核心组件。将 Spring Context 作为一个库来使用并不常见，但我在真实的生产级
  Web 应用中多次这样做过，正是因为它对于团队中其他更熟悉框架思维的开发者来说很熟悉。事实上，Spring Context 是 Spring 框架的核心，以至于如果你谷歌搜索
  Spring Context，得到的所有链接都是 Spring 框架本身的文档。


  Spring Context 的主要接口是 `ApplicationContext` 类，你将使用它来手动配置 Spring Bean，它也是 Spring Boot（[*https://spring.io/projects/spring-boot*](https://spring.io/projects/spring-boot)）中
  Spring 放置其所有自动配置 Bean 的地方。


  如果你的应用有很多有状态的移动部件，例如队列消费者或基于内存中 `ThreadPoolExecutor` 的数据处理等，那么让 Spring Context 自动按正确顺序完成所有资源的设置和拆卸工作会很方便。事实上，在框架几乎不存在的
  Clojure 语言社区中，人们流行使用 Mount（[*https://github.com/tolitius/mount*](https://github.com/tolitius/mount)）或
  Component（[*https://github.com/stuartsierra/component*](https://github.com/stuartsierra/component)）正是为了这个目的。


  本书选择 Spring Context 的主要原因是为了弥合传统 Spring 框架世界与这里使用的基于库的方法之间的差距。Spring 框架是一个庞大的系统，但本质上由设计良好、边界清晰的库组成。Spring
  Context 就是这样一个库，并且很容易以类似库的方式使用它，这非常适合本书——没有隐式的魔法，除非你调用方法或函数来触发事情，否则什么都不会发生。


  将 Spring Context 置于基于库的 Web 应用的核心，将使代码的设置和感觉对具有 Spring 框架经验的人来说很熟悉。事实上，你可以使用这种方法将整个遗留的
  Spring 框架应用嵌入到基于库的 Kotlin 应用中。我在真实世界的项目中做过这件事。我曾合作过的一个客户对 Java 有严重的过敏反应，没有人愿意碰一个旧的
  Spring 框架代码库。为了帮助解决这个问题，我移除了 Java 代码中所有 Spring Web 特定的部分（在一个原本庞大的代码库中，这只有几行代码），创建了一个
  Clojure 应用（Kotlin 也同样适用），从 Clojure 中连接了 Spring Context（在这种情况下是 `AnnotationConfigApplicationContext`，以支持注解），然后加载了整个
  Java 应用并将其嵌入到基于库的 Clojure 应用中。这样，应用就可以通过移除部分 Java 代码并用 Clojure 重写来逐步重写，而无需对整个 Java
  代码库进行彻底的全面重写。并且，由于应用的主入口点是熟悉的 Clojure 代码，Java 过敏症很快就消失了。




  ## 设置 Spring 上下文


  首先需要的是 Spring Context 本身。将其作为依赖添加到 *build.gradle.kts* 中：


  ```

  implementation("org.springframework:spring-context:5.3.23")

  ```


  你将使用 Spring Context 来初始化你的 Web 应用。为了避免与你现有的代码冲突，你将创建一个新的主文件 *MainSpringContext.kt*，将
  Spring 初始化与 *Main.kt* 中现有的初始化分离开来。Spring Context 将根据其检测到的组件之间的依赖关系图，按正确的顺序初始化 Web
  应用的组件和资源。因此，你不再需要 *Main.kt* 中已有的任何“手动”初始化代码。


  Spring Context 的核心是应用上下文对象。这通常是通过 XML 配置文件创建的资源。但在这里，你将通过编程方式设置它。清单 13-1 展示了如何启动并运行基础功能。


  ```

  fun createApplicationContext(appConfig: WebappConfig) =

  StaticApplicationContext().apply {

  beanFactory.registerSingleton("appConfig", appConfig)

  refresh()

  registerShutdownHook()

  }

  清单 13-1

  创建并初始化 Spring 上下文

  ```


  这段简短的代码片段展示了 Spring Context 中的一些重要概念。


  首先，是 *bean* 的概念。bean 是 Spring 在依赖注入领域中对对象实例的称呼。你将 `"appConfig"` bean 定义为“单例 bean”，这是
  Spring 的术语，指的是你提供 bean 的实例，而不是告诉 Spring 如何创建该实例。你已经有一个方便的函数来创建应用配置的实例，因此无需将其包装在
  Spring Context 中。


  你还在上下文上调用了两个重要方法。`refresh()` 会立即实例化你定义的所有 bean，而不是稍后延迟实例化。稍后，你将在上下文中初始化资源，并且最好让设置在启动时失败，而不是启动正常，但直到你开始调用
  Web 应用时（可能是在几秒或几分钟后）才失败。


  `registerShutdownHook()` 将设置 Spring Context 对象，以便当 Java 运行时收到关闭命令时，Spring Context
  会尝试优雅地关闭。它还会以与启动相反的顺序关闭组件，这样依赖其他组件的组件就不会因为其某个依赖项在父组件关闭之前关闭而失败。


  ## 添加数据源


  下一步是在 Spring Context 中初始化你的 Web 应用资源。你将从初始化数据源开始。


  当你使用 Spring Context 设置数据源时，需要解决两个问题：创建实际的数据源本身，并确保它在 Spring Context 中的其他 bean 调用它之前完成迁移。


  创建数据源本身很简单，只需指定类及其属性即可，如清单 13-2 所示。


  ```

  registerBean(

  "unmigratedDataSource",

  HikariDataSource::class.java,

  BeanDefinitionCustomizer { bd ->

  bd.propertyValues.apply {

  add("jdbcUrl", appConfig.dbUrl)

  add("username", appConfig.dbUser)

  add("password", appConfig.dbPassword)

  }

  }

  )

  清单 13-2

  在 createApplicationContext 内部创建数据源

  ```


  在这里，你以传统方式注册了一个 bean。它不是单例，因此你告诉 Spring Context 如何创建你提供的类的实例以及所创建实例的各种属性。在本例中，你指定将
  `jdbcUrl`、`username` 和 `password` 属性设置为 `WebappConfig` 中的相应值。


  如果你向 Spring Context 请求一个 `"unmigratedDataSource"` 的实例，你将得到顾名思义的东西——一个原始的 HikariCP
  数据源，你可以用它来查询数据库。但在你开始执行查询之前，它不会运行任何待处理的 Flyway ([*https://flywaydb.org/*](https://flywaydb.org/))
  数据库迁移。清单 13-3 展示了如何设置一个额外的 bean 来同时运行你的迁移。


  ```

  class MigratedDataSourceFactoryBean : FactoryBean {

  lateinit var unmigratedDataSource: DataSource

  override fun getObject() =

  unmigratedDataSource.also(::migrateDataSource)

  override fun getObjectType() =

  DataSource::class.java

  override fun isSingleton() =

  true

  }

  // 在 createApplicationContext 内部：

  registerBean(

  "dataSource",

  MigratedDataSourceFactoryBean::class.java,

  BeanDefinitionCustomizer { bd ->

  bd.propertyValues.apply {

  add(

  "unmigratedDataSource",

  RuntimeBeanReference("unmigratedDataSource")

  )

  }

  }

  )

  清单 13-3

  一个运行迁移的 FactoryBean 类及其 bean 声明

  ```


  这里发生了几个重要的事情。


  首先是 `MigratedDataSourceFactoryBean` 类本身。创建这个类的原因是为了有一个地方来调用运行 Flyway 数据库迁移的代码。这个类的实现声明了
  Spring Context 创建 bean 实例所需的一切。`getObject()` 被设置为执行 `migrateDataSource` 的实际调用。`getObjectType()`
  告诉 Spring 你的 bean 创建的是哪个类的实例。`isSingleton()` 被设置为 `true`，这样 Spring 就不会创建超过一个此 bean
  的实例，而是在整个 Web 应用中重用同一个数据源。


  当你注册 `"dataSource"` bean 时，你使用了 `MigratedDataSourceFactoryBean` 类，并将一个 `RuntimeBeanReference`
  传递给 `"unmigratedDataSource"` 属性。运行时 bean 引用允许 Spring Context 延迟创建 bean 实例，并让 Spring
  Context 完全控制其管理的对象的初始化顺序。如果你在注册 `"dataSource"` 的 bean 声明时以某种方式获得了 `"unmigratedDataSource"`
  对象的完整实例，那么 Spring Context 将不得不创建并完全初始化该对象的一个实例。运行时 bean 引用只是一个命名引用，它允许 Spring Context
  稍后根据其判断创建实际对象。




  ## Kotlin 中的 `lateinit`


  清单 13-3 最有趣的地方在于 `lateinit` 这个关键字。


  Spring Context 初始化对象的方式有一个大问题：它使用属性而非构造函数参数。当你手动配置 bean 实例化时，从技术上讲，可以将 bean 引用作为构造函数参数传递。但这需要额外的工作，并且一旦你尝试使用像
  `@Autowired` 这样的注解（这是添加到 bean 属性上的注解），这种方式就会失效。


  其后果是，Spring Context 设置的所有属性都必须是可空且可变的。如果你将属性声明为 `val String myProp`，除非编译器能保证 `myProp`
  由该类的构造函数设置，否则 Kotlin 将无法编译该类，这意味着 Kotlin 可以强制执行其空安全保证。因此，你不得不将所有属性声明为 `var String?
  myProp = null`，这样属性初始值为 `null`，之后当 Spring Context 遍历你的对象图并初始化所有内容时，再将其设置为一个 `String`
  值。


  这意味着每次访问 `myProp` 时，你都必须检查它是否为 `null`，或者使用非空断言运算符（`!!`）强制将其转换为非空类型。


  这正是 `lateinit` 要解决的问题。


  对于那些由于技术原因在类实例化时必须初始化为 `null`，但你知道在能够使用该类实例之前它会被设置为非空值的代码，你可以将属性声明为 `lateinit var`。这允许你覆盖
  Kotlin 的编译时检查，并告诉类型系统：“我保证在使用它时，它会是非空值。”


  在清单 13-3 中，你将未迁移数据源的引用声明为 `lateinit var unmigratedDataSource: DataSource`。当 Spring
  Context 在你的 `MigratedDataSourceFactoryBean` 上调用 `getObject()` 时，Spring Context 已经根据你的
  bean 声明将 `unmigratedDataSource` 设置为适当的值。换句话说，在 Spring Context 状态机的内部，它绝不会在初始化某个
  bean 的所有依赖项之前调用该 bean 上的方法。因此，从实际角度来看，当你的代码运行时，`unmigratedDataSource` 绝不可能是 `null`，所以在
  Spring Context 作为 bean 装配过程一部分而初始化的属性上使用 `lateinit` 是安全的。


  此外，如果你尝试访问一个尚未设置的 `lateinit var`，Kotlin 会立即抛出一个 `kotlin.UninitializedPropertyAccessException`。这样你就不会得到
  `null` 返回值，也不会意外地将空值传递到系统的其他部分。


  这是 Kotlin 类型系统实用性的一个例子，也是我在整个 Kotlin 语言中最喜欢的特性之一。Kotlin 在处理可能为 `null` 的值时非常明确，但它仍然允许你成为一个负责任的程序员，即使在技术上某个值可能为
  `null` 的场景下，也能依赖 Kotlin 的空安全保证。


  ## 启动你的 Web 应用


  你在 `createApplicationContext` 中的 Spring Context 初始化已经准备就绪，因此下一步就是使用它来启动你的实际 Web
  应用。


  初始化过程与你已经在 *Main.kt* 中拥有的类似。清单 13-4 展示了如何使用你的 Spring Context 启动 Web 应用。


  ```

  fun main() {

  log.debug("Starting application...")

  val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

  log.debug("Application runs in the environment ${env}")

  val config = createAppConfig(env)

  log.debug("Creating app context")

  val ctx = createApplicationContext(config)

  log.debug("Getting data source")

  val dataSource =

  ctx.getBean("dataSource", DataSource::class.java)

  embeddedServer(Netty, port = config.httpPort) {

  createKtorApplication(config, dataSource)

  }.start(wait = true)

  }

  清单 13-4

  MainSpringContext.kt 中的 main() 函数

  ```


  你仍然手动创建 `WebappConfig`。你可以设置 `createApplicationConfig` 使其创建自己的 `WebappConfig`，但能够完全控制你的
  Spring Context 将使用哪个确切的数据库 URL 等是很方便的。


  `createKtorApplication` 需要普通的数据源才能工作，因此你从 Spring Context 的 `ctx` 对象中提取 `"dataSource"`
  bean。因为你配置了 `"dataSource"` bean 来同时运行你的迁移，所以你不必显式运行迁移，因为 Spring Context 已经运行了它们。


  ## 扩展用法


  Spring Context 的扩展用法呢？例如，你所有的 Web 处理程序现在都像以前一样工作，通过以纯函数式风格将它们使用的参数作为参数传入。


  你可以像这样将 Web 处理程序编写为一个 bean：


  ```

  beanFactory.registerSingleton(

  "springContextTestHandler",

  webResponse {

  TextWebResponse("Hello from Spring!")

  }

  )

  ```


  然后，你可以像这样为该处理程序添加一个路由映射：


  ```

  get(

  "/spring_context_test",

  ctx.getBean("springContextTestHandler") as

  PipelineInterceptor

  )

  ```


  这个解决方案的问题在于，除了将 lambda 包装在 Spring Context 中而不是直接插入 lambda 之外，你并没有真正增加任何额外价值。没有办法将依赖项注入到
  lambda 中。


  你可以走创建工厂持有者 bean 和其他名词密集型构造的路线，但我倾向于远离这类事情。依赖注入为资源的初始化和销毁增加了价值，但对于 Web 路由处理函数的实现来说，依赖注入增加的唯一价值就是为向函数传递参数这个简单的任务增加了一些额外的仪式感。


  '
- '# 14. 使用 Spring Security 的企业级身份验证


  在本章中，你将学习如何弥合新旧之间的差距，并将 Spring Security（[*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security)）添加到你的基于
  Ktor 的 Web 应用中。


  如果你的组织已经广泛使用 Spring Security，你可能已经拥有大量的基础设施，要改变它们需要付出打破康威定律的巨大努力。相反，你可以将 Spring
  Security 添加到你的现代 Kotlin Web 应用中，并利用你组织现有的插件和专业知识。


  请注意，Spring Security 并非为组合而设计。Spring Security 会包装你的整个 Web 应用，如果你已经设置了其他身份验证方式，例如第
  9 章中基于 cookie 的身份验证或第三方系统（如 Keycloak（[*www.keycloak.org/*](http://www.keycloak.org/)）），它们将会发生冲突并相互干扰。


  ## 准备你的 Web 应用


  为了能够在你的 Web 应用中使用 Spring Security，你需要首先完成一些步骤。简而言之，你的 Web 应用需要基于 Servlet 规范。然后，你将
  Spring Security 添加为一个 Servlet 过滤器，这是使用 Spring Security 的主要方式。




  ### 配置嵌入式 Jetty


  到目前为止，你一直使用 Ktor 嵌入式服务器和 Netty 来运行你的 Web 应用。为了完全控制配置并添加对 Servlet 的支持，你需要进行切换。你将不再使用
  Ktor 的 `embeddedServer`，而是从头开始启动一个嵌入式 Jetty 服务器，将其配置为使用 Servlet 规范，并将你的 Ktor Web
  应用作为 Servlet 附加到其上。


  首先，你需要将必要的依赖项添加到你的 *build.gradle.kts* 文件中：


  ```

  implementation("io.ktor:ktor-server-servlet:2.1.2")

  implementation("org.eclipse.jetty:jetty-server:9.4.49.v20220914")

  implementation("org.eclipse.jetty:jetty-servlet:9.4.49.v20220914")

  ```


  你将使用 Jetty 作为实际的服务器，并使用 `ktor-server-servlet` 将你现有的 Ktor 应用映射到 Jetty Servlet 配置。


  Jetty 的最新版本是 11。你使用 v9 最新版本的原因是，Jetty 的后续版本在 Java 平台上使用了新的 `jakarta.*` 命名空间作为标准库
  API。由于许可和专利问题，Java 社区正在逐步弃用 `javax.*` 命名的包。但就目前而言，你必须坚持使用 `javax` 命名空间及其兼容版本，因为最新版本的
  Spring Security 仍然使用 `javax` 命名空间。当 Spring 6 发布时，你可以升级所有这些版本，因为 Spring 5 使用 `javax.*`，而
  Spring 6 使用新的 `jakarta.*` 命名空间。


  这个新配置与你现有的配置完全分离，因此你将在一个新文件中编写所有代码。你不会在现有的 *Main.kt* 中添加更多内容，而是创建一个新的 *MainSpringSecurity.kt*，所有基于
  Servlet 和 Jetty 的新代码都将放在其中。清单 14-1 展示了启动并运行 Jetty 并将其配置为 Servlet 模式所需的完整 `main()`
  函数。


  ```

  import org.eclipse.jetty.server.HttpConnectionFactory

  import org.eclipse.jetty.server.Server

  import org.eclipse.jetty.server.ServerConnector

  import org.eclipse.jetty.servlet.ListenerHolder

  import org.eclipse.jetty.servlet.ServletContextHandler

  private val log = LoggerFactory.getLogger(

  "kotlinbook.MainSpringSecurity"

  )

  fun main() {

  val appConfig = createAppConfig(

  System.getenv("KOTLINBOOK_ENV") ?: "local"

  )

  val server = Server()

  val connector = ServerConnector(

  server,

  HttpConnectionFactory()

  )

  connector.port = appConfig.httpPort

  server.addConnector(connector)

  server.handler = ServletContextHandler(

  ServletContextHandler.SESSIONS

  ).apply {

  contextPath = "/"

  resourceBase = System.getProperty("java.io.tmpdir")

  servletContext.setAttribute("appConfig", appConfig)

  servletHandler.addListener(

  ListenerHolder(BootstrapWebApp::class.java)

  )

  }

  server.start()

  server.join()

  }

  清单 14-1

  启动并配置 Jetty 以托管 Servlet

  ```


  Jetty 是一个功能齐全的 Java 平台服务器，它实现了大量 API，并且极其灵活。与 Ktor 中的 `embeddedServer` 不同，Jetty
  也没有太多默认设置，因此你必须显式指定所有内容才能使其启动并运行。


  此配置的主要部分是 Jetty 服务器的 handler 属性，它被设置为一个 `ServletContextHandler`。你传递给它的 `ServletContextHandler.SESSIONS`
  标志启用了 Servlet 会话，这是使 Spring Security 正常工作所必需的。handler 需要一个上下文路径，这是你的 Web 应用可访问的基本路径。它还需要一个资源目录才能工作，该目录指向系统默认的临时目录，以便操作系统自动清理
  Jetty 创建的任何文件。Servlet 上下文（所有单独的 Servlet 和过滤器都可以访问它）可以访问应用程序配置，这将在以后派上用场。最后，设置了一个监听器，这是一个在
  Jetty 完成启动后由 Jetty 服务器执行的类。你将在此类中配置和初始化用于你的 Web 应用和 Spring Security 本身的实际 Servlet。


  如果你现在输入此代码，`BootstrapWebApp` 将会出现编译错误。该类尚不存在，因此你接下来将编写它。


  ### 初始化 Servlet


  既然 Jetty 已配置为 Servlet 模式，你需要初始化你的 Servlet。Servlet 初始化是 Java 平台上的一项古老的 Jedi 大师级技艺。你为
  Servlet 栈编写的初始化代码将不知道 Jetty 的存在，任何支持 Servlet 的环境都可以执行它——甚至是像 Apache Tomcat ([*https://tomcat.apache.org/*](https://tomcat.apache.org/))
  和 IBM WebSphere ([*www.ibm.com/products/websphere-application-server*](http://www.ibm.com/products/websphere-application-server))
  这样的老式服务器容器。


  你已经在清单 14-1 中输入了初始化器类的名称 `BootstrapWebApp`。清单 14-2 展示了如何正确创建和设置此类。


  ```

  import javax.servlet.annotation.WebListener

  import javax.servlet.ServletContextEvent

  import javax.servlet.ServletContextListener

  @WebListener

  class BootstrapWebApp : ServletContextListener {

  override fun contextInitialized(sce: ServletContextEvent) {

  val ctx = sce.servletContext

  }

  override fun contextDestroyed(sce: ServletContextEvent) {

  }

  }

  清单 14-2

  Servlet 初始化的基本框架

  ```


  这个初始化器目前还没有做任何工作。你将在本章后面在此处添加更多内容。现在，尝试运行你的主类，并检查一切是否编译正确。如果你做的一切正确，基于 Servlet 的
  Jetty 服务器应该可以正常启动，并根据你的配置文件监听正确的端口。请注意，如果你的现有主函数已在后台运行，则应将其停止，因为 Jetty 服务器将尝试使用相同的端口（因为它使用相同的配置文件和相同的配置加载代码）。


  提示


  `BootstrapWebApp` 上的 `WebListener` 注解不是必需的，删除它后一切也能正常工作。但是，添加它意味着你可以在老式的容器型 Java
  服务器上构建和运行你的 Web 应用，它会识别 `WebListener` 注解并挂载你的 Servlet，而无需运行你的 `main()` 函数！


  你需要设置的所有内容都将在 `BootstrapWebApp` 类的 `contextInitialized` 函数中完成。


  稍后你将在 `contextInitialized` 中添加更多内容。现在，你只需要提取配置并获取数据源。清单 14-3 展示了如何执行此操作。


  ```

  override fun contextInitialized(sce: ServletContextEvent) {

  val ctx = sce.servletContext

  log.debug("Extracting config")

  val appConfig = ctx.getAttribute(

  "appConfig"

  ) as WebappConfig

  log.debug("Setting up data source")

  val dataSource = createAndMigrateDataSource(appConfig)

  清单 14-3

  在 contextInitialized 内部访问配置和数据源

  ```


  `"appConfig"` 属性来自清单 14-1，你在其中创建了 Servlet 上下文并将 `"appConfig"` 属性分配给了你的 `WebappConfig`
  实例。这意味着你可以从 `contextInitialized` 内部的 Servlet 上下文中访问它。`getAttribute` 的类型是平台类型 `Object!`，因此你需要将其转换为
  `WebappConfig`。然后，就像你在主要的 Ktor 设置和测试中所做的那样，创建一个数据源。




  ### 将 Ktor 添加到你的 Servlet 中


  现在你已经拥有了一个包含配置和数据源等所有基础功能的 Servlet，下一步就是将你的 Ktor Web 应用连接到这个 Servlet。


  由于 Ktor Servlet 包的构建方式，需要一些手动操作。有一个内置的 Servlet 用于挂载 Ktor Web 应用，即 `io.ktor.server.servlet.ServletApplicationEngine`，这就是你将要用到的那个。但这个
  Servlet 类不够灵活，默认情况下，它会基于加载一些默认配置文件并在内部进行连接，尝试创建自己的 Ktor 应用实例。你需要能够以编程方式传递你使用第 2
  章中的 `createKtorApplication` 创建的 Ktor 应用实例。清单 14-4 展示了如何进行全部设置。


  ```

  log.debug("Setting up Ktor servlet environment")

  val appEngineEnvironment = applicationEngineEnvironment {

  module {

  createKtorApplication(appConfig, dataSource)

  }

  }

  val appEnginePipeline = defaultEnginePipeline(

  appEngineEnvironment

  )

  BaseApplicationResponse.setupSendPipeline(

  appEnginePipeline.sendPipeline

  )

  appEngineEnvironment.monitor.subscribe(

  ApplicationStarting

  ) {

  it.receivePipeline.merge(appEnginePipeline.receivePipeline)

  it.sendPipeline.merge(appEnginePipeline.sendPipeline)

  it.receivePipeline.installDefaultTransformations()

  it.sendPipeline.installDefaultTransformations()

  }

  ctx.setAttribute(

  ServletApplicationEngine

  .ApplicationEngineEnvironmentAttributeKey,

  appEngineEnvironment

  )

  log.debug("Setting up Ktor servlet")

  ctx.addServlet(

  "ktorServlet",

  ServletApplicationEngine::class.java

  ).apply {

  addMapping("/")

  }

  清单 14-4

  在 contextInitialized 中将 Ktor 设置为 Servlet

  ```


  这段初始化代码大部分基于 Ktor 内置 `ServletApplicationEngine` 中已有的初始化代码，Ktor 会在其中尝试创建自己的 Ktor
  应用实例。`appEngineEnvironment` 和 `appEnginePipeline` 是 `ServletApplicationEngine` 所需的内部对象。此外，还需要为
  `ApplicationStarting` 事件进行一些必要的连接，并且 `ServletApplicationEngine` Servlet 期望能够从 Servlet
  上下文的一个特定命名属性中获取 `appEngineEnvironment` 实例。


  希望未来版本的 Ktor Servlet 包能让你更轻松地以编程方式传递自己的 Ktor 应用实例。不过，目前你仍然需要上述的连接代码才能使一切正常工作。


  当所有设置完成后，你可以使用标准的 Servlet API 来添加一个 Servlet 并添加映射。


  现在，你已经成功搭建了基于 Servlet 的 Ktor Web 应用！尝试启动应用，你应该会看到所有 Web 处理器都能正常响应，就像你运行旧的 `main`
  函数（使用 `embeddedServer` 和 Netty 启动 Ktor）时一样。


  ## 使用 Spring Security


  现在你已经让基础功能运行起来了，你的 Ktor 应用作为 Servlet 运行在 Jetty 上。下一步是将 Spring Security 添加到你的 Servlet
  栈中。


  ### 设置 Servlet 过滤器


  你需要做的第一件事是将所需的依赖项添加到 *build.gradle.kts* 中：


  ```

  implementation("org.springframework.security:spring-security-web:5.7.3")

  implementation("org.springframework.security:spring-security-config:5.7.3")

  ```


  接下来，你需要在你的 Servlet 环境中连接 Spring Security。为此，你需要三样东西：一个角色层次结构、一个 Spring Security
  Web 应用上下文，以及一个映射到你的 Servlet 的 Spring Security 过滤器。清单 14-5 展示了如何进行全部设置。


  ```

  log.debug("Setting up Spring Security")

  val roleHierarchy = """

  ROLE_ADMIN > ROLE_USER

  """

  val wac = object : AbstractRefreshableWebApplicationContext() {

  override fun loadBeanDefinitions(

  beanFactory: DefaultListableBeanFactory

  ) {

  beanFactory.registerSingleton(

  "dataSource",

  dataSource

  )

  beanFactory.registerSingleton(

  "rememberMeKey",

  "asdf"

  )

  beanFactory.registerSingleton(

  "roleHierarchy",

  RoleHierarchyImpl().apply {

  setHierarchy(roleHierarchy)

  }

  )

  AnnotatedBeanDefinitionReader(beanFactory)

  .register(WebappSecurityConfig::class.java)

  }

  }

  wac.servletContext = ctx

  ctx.addFilter(

  "springSecurityFilterChain",

  DelegatingFilterProxy("springSecurityFilterChain", wac)

  ).apply {

  addMappingForServletNames(null, false, "ktorServlet")

  }

  清单 14-5

  在 contextInitialized 中设置 Spring Security

  ```


  你可以在没有角色层次结构的情况下设置 Spring Security，但很可能你需要多个角色，所以最好立即进行设置。


  Web 应用上下文是一个依赖注入引擎，你可以在其中以编程方式注册单例 Bean，即对象的硬编码实例，这些实例将被依赖注入到你的 Spring Security
  配置中，以便稍后在 Spring Security 中配置身份验证和过滤时使用。


  `"rememberMeKey"` 是 Spring Security 用于创建会话 Cookie 的密钥。与其硬编码为 `"asdf"`，你应该将其存储为配置属性。到目前为止，你已经创建了几个配置属性，因此你已经知道如何添加更多属性。继续更新你的配置文件、配置数据类和配置加载器代码，将
  `"rememberMeKey"` 存储在那里吧！




  ### 配置 Spring Security


  下一步是实现 `WebappSecurityConfig` 类，该类已在清单 14-5 中作为 bean 添加到 Spring Security Web 应用上下文中。


  请注意，关于如何配置和设置 Spring Security 所有复杂细节的详细教程不在本书的讨论范围之内。为此，我建议你参考众多在线文章和其他相关书籍。本书的目标仅仅是向你展示如何入门。


  类名对于 Spring Security 来说并不重要，你可以随意命名这个配置类。它之所以能被识别为 Spring Security 配置类，是因为你将添加的注解。清单
  14-6 展示了该类的空骨架实现。


  ```

  import org.springframework.context.annotation.Configuration

  import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity

  import org.springframework.beans.factory.annotation.Autowired

  import org.springframework.context.annotation.Bean

  import org.springframework.security.core.userdetails.UserDetailsService

  import org.springframework.security.core.userdetails.User

  import org.springframework.security.config.annotation.web.builders.HttpSecurity

  import org.springframework.security.web.SecurityFilterChain

  @Configuration

  @EnableWebSecurity

  open class WebappSecurityConfig {

  @Autowired

  lateinit var dataSource: DataSource

  @Autowired

  lateinit var roleHierarchy: RoleHierarchy

  @Autowired

  lateinit var rememberMeKey: String

  @Autowired

  lateinit var userDetailsService: UserDetailsService

  @Bean

  open fun userDetailsService() =

  UserDetailsService { userName ->

  User(userName, "{noop}", listOf())

  }

  @Bean

  open fun filterChain(

  http: HttpSecurity

  ): SecurityFilterChain {

  return http.build()

  }

  }

  清单 14-6

  一个空的 Spring Security 配置类

  ```


  注解 `@Configuration` 和 `@EnableWebSecurity` 会触发 Spring Security 以及清单 14-5 中的 `DelegatingFilterProxy`，从而在你的
  Servlet 链中启用和配置 Spring Security。


  `@Autowired` 注解意味着 Spring Security 会根据属性名称及其类型，将 Web 应用上下文（清单 14-5 中）的对象实例（bean）分配给这些属性。


  稍后，你将扩展 `filterChain`，使其包含 Spring Security 中用户和过滤部分的实际配置。


  `UserDetailsService` 是 Spring Security 设置中必需的部分。目前，你只需用它来创建一个密码为空（Spring Security
  会将 `"{noop}"` 字符串解释为不尝试进行任何与密码解码相关的复杂操作）且角色列表为空的虚拟用户。


  ### 认证用户


  为了对用户进行认证，你需要使用一个认证提供者来配置 Spring Security 过滤器链。


  认证提供者是 Spring Security 要求你处理登录凭据、检查用户是否存在以及验证你收到的凭据（密码）是否正确的地方。


  认证设置在你于清单 14-6 中创建的、当前为空的 `filterChain` 函数内部。清单 14-7 展示了如何进行设置。


  ```

  http.authenticationProvider(object : AuthenticationProvider {

  override fun authenticate(

  auth: Authentication

  ): Authentication? {

  val username = auth.principal as String

  val password = auth.credentials as String

  val userId = sessionOf(dataSource).use { dbSess ->

  authenticateUser(dbSess, username, password)

  }

  if (userId != null) {

  return UsernamePasswordAuthenticationToken(

  username,

  password,

  listOf(SimpleGrantedAuthority("ROLE_USER"))

  )

  }

  if (username == "quentin" && password == "test") {

  return UsernamePasswordAuthenticationToken(

  username,

  password,

  listOf(SimpleGrantedAuthority("ROLE_ADMIN"))

  )

  }

  return null

  }

  override fun supports(authentication: Class) =

  authentication ==

  UsernamePasswordAuthenticationToken::class.java

  })

  清单 14-7

  在 WebappSecurityConfig 的 filterChain 方法中添加一个用于认证用户的认证提供者

  ```


  这段代码使用了第 9 章的 `authenticateUser` 函数，根据你现有的设置来认证用户。Spring Security 通过 `principal`
  和 `credentials` 属性提供用户名和密码，并期望你的 `authenticate` 函数在未找到与这些凭据匹配的用户时返回 `null`，如果找到有效用户，则返回
  `org.springframework.security.core.Authentication` 的一个实例。


  为了演示，代码中还包含了一个硬编码的管理员用户示例，其用户名为 `"quentin"`，密码为 `"test"`。出于显而易见的原因，你不应该在实际的 Web
  应用中添加此类内容。但这提供了一个示例，说明你可以用 Spring Security 做什么，以及如何创建具有不同角色的用户。


  ### 过滤请求


  目前，你的 Spring Security 过滤器不会过滤任何请求。为此，你需要设置一个过滤器链。


  过滤器链是一组规则，Spring Security 使用它来确定一个请求是否需要认证，以及如果存在已认证的用户，该用户是否具有正确的访问级别。


  过滤器链是使用一个编程式构建器 DSL 设置的，该 DSL 可在你的 Spring Security 配置类的 `filterChain` 内部的 `HttpSecurity`
  实例 HTTP 上使用。清单 14-8 展示了你可以用它做的一些事情的示例。


  ```

  http

  .authorizeRequests()

  .expressionHandler(

  DefaultWebSecurityExpressionHandler().apply {

  setRoleHierarchy(roleHierarchy)

  }

  )

  .antMatchers("/login").permitAll()

  .antMatchers("/coroutine_test").permitAll()

  .antMatchers("/admin/**").hasRole("ADMIN")

  .antMatchers("/**").hasRole("USER")

  .anyRequest().authenticated()

  .and().formLogin()

  .and()

  .rememberMe()

  .key(rememberMeKey)

  .rememberMeServices(

  TokenBasedRememberMeServices(

  rememberMeKey,

  userDetailsService

  ).apply {

  setCookieName("REMEMBER_ME_KOTLINBOOK")

  }

  )

  .and()

  .logout()

  .logoutRequestMatcher(

  AntPathRequestMatcher("/logout")

  )

  清单 14-8

  使用 filterChain 内部的构建器 DSL 过滤请求

  ```


  设置过滤的方法有很多种，你需要更改具体的配置来满足你的特定需求。这作为一些可能性的示例，并且对于大多数 Web 应用来说是一个很好的起点。


  登录页面被设置为不需要认证，以避免无限重定向循环。所有以 */admin* 开头的页面都要求用户具有管理员角色。否则，过滤器要求对所有页面进行认证。还设置了默认的
  `formLogin()`，它使用 Spring Security 默认的登录 GUI。它带有一个样式化的登录表单和一些默认的错误消息，是一种无需自己实现登录表单即可快速上手并演示工作设置的好方法。然后，设置了
  `logout`，以便当用户访问路径 */logout* 时，Spring Security 会注销该用户并清除会话。


  再次强调，本书并非 Spring Security 的全面教程。其目的是让 Spring Security 设置好并准备就绪，与你从头开始编写的、基于库的 Web
  应用协同工作。




  ### 访问已登录用户


  当加载需要登录的 Web 处理器时，能够提取当前已登录用户的信息也很有用，这样你就可以在网页上显示用户名，并在数据库中使用用户 ID 作为各种查询的输入。


  在 Spring Security 中，有两种主要方式可以访问当前已登录用户。


  第一种是使用线程局部变量可访问的形式：`SecurityContextHolder.getContext().authentication`。如果你从 Web
  处理器线程访问它，它是全局可用的。这是一种访问当前已登录用户的便捷方式，但在 Kotlin 的世界中会有点问题。例如，如果你不小心，你的代码可能会因为你在协程中访问它而突然运行在另一个线程中。而且，如果你尝试将
  Servlet 和 Servlet 过滤器设置为异步，`SecurityContextHolder` 也会失效，因为异步 Servlet 并不局限于每个请求使用单个线程。


  第二种是在 Servlet 请求本身上访问用户主体。这种方式不依赖线程局部变量，本质上更具函数式和数据驱动特性。你的 Servlet 栈处理的每个请求都会获得一个
  Servlet 请求实例，你可以随意将其传递到任何地方。


  不过，使用 `javaSecurityPrincipal` 有一个问题。在我撰写本章时，Ktor 2.2.0 尚未发布。在早期版本的 Ktor 中存在一个 bug，导致
  `javaSecurityPrincipal` 无法正常工作，总是返回 `null`。因此，目前你只能使用非异步 Servlet，并通过线程局部的 `SecurityContextHolder.getContext().authentication`
  来访问会话。


  我建议你查看 Ktor 的问题跟踪器，网址为 [*https://youtrack.jetbrains.com/issue/KTOR-4784*](https://youtrack.jetbrains.com/issue/KTOR-4784)，看看该问题是否已解决并发布。该问题由本人于
  2022 年 8 月 22 日（恰好也是本人的生日）报告，并在仅仅两天后的 8 月 24 日由 Ktor 团队修复。耶，Ktor 团队！


  '
- '# 第三部分 开发工具


  '
- '# 15. 选择合适的库


  在本章中，我将分享一些关于库的看法，如何比较库与框架，以及一些选择合适库的工具。通常，对于完成同一项任务，会有不止一个库可供选择。因此，知道如何挑选合适的库是很有用的。


  ## 什么是库？


  在我们的行业中，对于库和框架之间的区别并没有广泛认同的定义。我使用的区分标准是：


  库是你调用的东西。框架是调用你的东西。


  另一个实际的区别是，在库中，没有你未要求的事情会发生。代价是你需要自己连接各个部分，并编写一些引导代码来让一切启动并运行。


  相比之下，在框架中，很多事情会自动发生，以节省你的工作量并让你的生活更轻松。代价是，当某些东西出问题，或者框架没有在应该自动调用你的代码时调用它，可能很难找出原因，甚至很难首先意识到出了问题。


  当我使用框架时，遇到的一个主要现实问题是，当事情出错时，你会面对大量你之前并不了解的框架代码，并且突然必须理解它们才能继续前进。那些停止自动调用你代码的框架代码，可能需要大量工作才能理解发生了什么以及为什么。


  不过，这里存在一个灰色地带。在第 9 章中，你配置了 Ktor 来处理会话 cookie 和授权。你在任何地方都看不到那段代码。你所做的只是将路由包裹在 `authenticate("auth-session")`
  中并期望一切顺利。Ktor 底层有大量的映射和操作来使其工作，如果它停止工作，你不一定能知道原因。


  Ktor 和库的好处在于，你确实调用了一个函数（`authenticate`），并且通过名称（`"auth-session"`）引用配置。所以它并没有那么隐晦和神奇。Ktor
  不会自动对身份验证做任何事情；你必须告诉它去做。


  当你使用库时，你并不一定能完全避免魔法失效的情况。但你可以大大降低这种情况发生的几率，从而从你的 Web 应用中消除一整类 bug。


  ## 流行度基本无关紧要


  有些人将库的流行度视为一个重要指标。流行度并非*完全*无关紧要的指标。如果你发现两个库做同样的事情，你可能会选择更流行的那个。


  然而，在选择库时将流行度作为主要指标可能会妨碍你独立思考。选择库时最重要的事情是运用你长期以来积累的所有良好品味和判断力，评估各种选项，并做出明智的选择。如果答案仅仅是“使用
  Spring Security，因为每个人都在用 Spring”或“使用 React，因为每个人都在用 React”，那么你并没有真正思考。


  将流行度作为指标所隐含的假设是，选择流行库（或框架）的人之所以这样做，是因为它总是最佳选择，并且每个选择该库的人都是在深思熟虑和评估之后才做出的选择。通常，决定哪些库流行更像是一种时代精神。而且，最流行的库往往是那些在*没有*深入思考什么对他们的项目合适的情况下选择的结果。


  不过，请记住，有一种流行度很重要：库的可用性。如果你使用一种非常不流行的编程语言，你将不得不从头编写大量代码，而无法借助库的帮助。


  在 Paul Graham 2001 年的文章《战胜平均数》（[*www.paulgraham.com/avg.xhtml*](http://www.paulgraham.com/avg.xhtml)）中，Graham
  认为 Lisp 是一种非常出色的编程语言选择，仅仅因为 Lisp 语言本身的强大力量，他们就领先于竞争对手。这当然是事实（毕竟我骨子里是个 Lisp 爱好者），但仅限于一定程度。如果有人明天发明了宇宙中最好的语言，它超级高效，拥有健全且完备的类型系统，从不妨碍你，但解决了停机问题并且不可能写出
  bug，你仍然可能无法领先于使用 Java 或 PHP 的竞争对手。这些平台上可用的大量第三方库几乎总能让你击败“完美语言 9000”的用户。




  ## 文档与稳定性至关重要


  评估一个库的客观标准之一，是其文档质量和 API 的稳定性。


  Ktor 就是一个在这两方面都表现卓越的典范。在 [*https://ktor.io/docs/welcome.xhtml*](https://ktor.io/docs/welcome.xhtml)
  上提供的文档数量几乎无与伦比。库中的每一个细节都有文档说明，并附有大量示例和解释，涵盖了 Ktor 的所有模块。Ktor 也非常稳定。所有实验性功能都明确地用注解标记，你必须使用其他注解才能选择使用它们，这样就不会意外地自动补全到
  Ktor 中未来可能发生变更的部分。一旦 Ktor 团队公开发布某个功能并移除不稳定标签，他们会尽一切努力避免破坏 API。


  事实上，本书中选用的所有库都具备这些特性。Flyway、HikariCP、Kotliquery、Typesafe Config、Gson、bcrypt 和 Spring
  Security 都是文档出色且公共 API 几乎完全稳定的库。


  如果非要取舍，我会优先考虑稳定性而非文档。Kotliquery 是一个小型库，没有成千上万的 GitHub 星标，文档也略显稀疏。但它的 API 面足够小，以至于详尽的文档并非那么重要；而且它是一个设计良好的库，一直稳定运行，我在新版本发布时安全升级，从未遇到任何问题。


  ## 避免遵循“某某方式”


  当你阅读关于库和框架的资料时，会看到诸如“Ktor 方式”、“Spring 方式”或“Rails 方式”的说法。我倾向于避开这类模式，按自己的方式行事。（同时我也注重团队合作，所以这里的*我的方式*指的是*我们团队的方式*。）


  这并不是说我完全忽视最佳实践。我会尽可能多地积累知识，了解业界人士如何组织代码和抽象，使其易于维护和阅读。


  然而，没有哪种“某某方式”能涵盖所有情况，全盘照搬预设模式并不能很好地替代独立思考。就像你在选择项目要添加的库时，需要运用你所有的判断力和良好品味一样，编写大部分代码时也需要同样的技能。你应该始终主动决定要做什么，并质疑自己为什么这么做。没有永远有效或永远无效的模式，也没有一种编写软件的方法论是永远不需要用批判性思维去评估和深思的。


  此外，如果项目中的所有程序员都习惯于编写函数式风格的 Clojure 应用并手写 SQL，那么凡事都“按 Rails 方式”并使用 ORM 来处理一切，未必是个好主意。尽管
  ORM ActiveRecord 是 Rails 的主要卖点，但它可能会妨碍团队开发者的经验，并且不一定能增加任何价值。


  ## 不要回避平台库


  当一门新语言诞生时，该语言社区往往倾向于从头开始编写一切，使其“语言原生”。虽然有很多库可以完成大多数事情，但新语言并不总能利用这些库。


  然而，像 Clojure 和 Kotlin 这样的语言拥抱了平台。你不需要将所有东西都封装在 Kotlin 专属的库中才能使用。


  许多库仅以 Java 库的形式存在。例如，用于与 Stripe 支付 API 交互的库只有 Java 版本，没有 Kotlin 版本。而且你实际上也不需要。从
  Kotlin 调用 Java 代码非常容易。你在本书中已经做过很多次了。例如，在第 14 章中，你与所有 Java 代码中最具 Java 风格的代码——Spring
  Security API——进行了交互。Kotlin 的设计非常优美，能够充分利用 Java 提供的一切。


  根据我的经验，有些程序员会拼命寻找语言原生的库。*也许 Java 平台上有一个通用的 bcrypt 库。但有一个 Kotlin 库可用，是用纯 Kotlin 从头编写的，那我们就用这个吧！也许它在
  GitHub 上只有三颗星，而且并没有真正维护，但只要它是 100% 的 Kotlin，什么都可以。*


  我建议不要这样做。在 Clojure 和 Kotlin 中，我都使用 Flyway 进行数据库迁移。它对现有的 Java 平台开发者来说很熟悉，拥有小巧灵活的
  API 面，让我可以按照自己的意愿将迁移脚本写成纯 SQL，并且我可以依赖一个拥有庞大社区且积极维护的库，而不是某个 Clojure 或 Kotlin 专属的迁移库，后者未来被废弃的可能性要高得多。


  此外，语言原生的库可能远没有更广泛使用的 Java 库那样功能丰富。例如，Flyway 能处理旧版 Oracle 的迁移。而你那个初出茅庐的花哨语言原生库，不太可能支持这类边缘情况。（是的，我刚把
  Oracle 称为边缘情况。有本事来告我啊！）


  ## 边界与分层


  我非常喜欢 Ktor 的一点是，它开箱即用地支持大量对 Web 应用有用的机制。例如，Ktor 提供了基于 Cookie 的身份验证、JWT 身份验证、用 Kotlin
  编写 HTML 的 DSL、用于将 Jetty 和 Ktor 映射到 Spring Security 的 Servlet 等等。一个提供大量能良好协同工作的构建块的库，可以为你省去大量工作。这就是我选择
  Ktor 作为本书主要工作引擎的原因。


  然而，我强烈回避那些做得太多，却不给我逃生通道和可组合性的库。Ktor 让我控制它的运行方式，并让我从大量的功能菜单中挑选，而无需与它抗争。Ktor 默认不设置任何东西；我必须明确选择启用我想要的一切。


  你用于数据库迁移的库 Flyway 也是如此。它有一些默认设置，例如可重复迁移与版本化迁移的命名前缀是什么，在类路径的哪个位置加载迁移文件等等。但你可以轻松地覆盖所有这些默认值。而且，最重要的是，在你调用创建的
  Flyway 对象上的 `migrate()` 方法之前，Flyway 不会做任何事情。


  Ktor 和 Flyway 也都提供了编程式 API。Ktor 有一种配置文件模式，它会从类路径加载配置文件，并根据该配置文件的内容进行自我设置。你可以直接调用
  `io.ktor.server.netty.EngineMain.main()`，而不是使用它应该用于运行的属性来调用 `embeddedServer`。然后，你可以更新
  Ktor 配置文件（类路径上的 *application.conf* 或 *application.yaml*），以指定你的 Ktor 初始化代码所在的类名。这种使用库的方式是我倾向于避免的。编程式
  API 让我掌控一切，库不会规定我如何连接我的库集合。


  在这方面，框架通常完全相反。Spring Boot 遵循约定优于配置的策略，仅仅在你的 Gradle 依赖中存在某个库，就足以让 Spring Boot 拾取它并假设你的设置。如果你对代码和显式性过敏，这很棒，但这几乎与我在编写
  Web 应用时想要的完全相反。




  '
- "# 16. Kotlin 技巧集锦\n\n在前面的章节中，你通过实现一个生产级 Web 应用，已经学到了许多巧妙的 Kotlin 技巧。在本章中，你将学习一些我尚未提及的、更巧妙的\
  \ Kotlin 技巧。\n\n这些技巧中，许多对库作者来说比 Web 应用构建者更有用。事实上，大多数库很可能都会用到本章提到的大部分概念。但了解这些概念仍然是有益的。你最终可能会需要调试库代码，而了解你所看到的内容总是好的。而且，世事难料！也许当你在为自己的\
  \ Web 应用编写工具函数和辅助函数时，会发现本章中的 Kotlin 技巧大有用武之地。\n\n## 委托（by lazy）\n\n惰性委托允许你延迟对值和属性的昂贵计算，但访问它们时，却如同访问其他普通属性一样。\n\
  \n在你本书构建的 Web 应用中，并没有哪些初始化过于急切、能从惰性初始化中受益的昂贵资源。对于 Web 应用后端来说，拥有有状态组件并不常见，因为状态通常存在于数据库和队列中。因此，为了演示惰性初始化，我们将看一个假设的例子。\n\
  \n惰性委托的一个用例是那些计算昂贵资源且结果不会随时间变化的方法。与其写成：\n\n```\nclass Foo(val myInput: String) {\n\
  fun getExpensiveThing() =\nuseLotsOfCpu(myInput)\n}\n```\n\n不如将其改写为惰性委托：\n\n```\n\
  class Foo(val myInput: String) {\nval expensiveThing: String by lazy {\nuseLotsOfCpu(myInput)\n\
  }\n}\n```\n\n使用 `by lazy` 进行委托的好处在于，lambda 表达式只会在第一次调用时执行一次，而方法则会在每次调用时都执行耗 CPU\
  \ 的代码。\n\n你还可以控制 Kotlin 如何管理来自多个线程对惰性属性的并行访问。你可以在三种线程安全模式中选择：\n\n*   `NONE`：线程之间无同步。如果多个线程在属性尚未初始化时同时尝试访问它，其行为是未定义的。\n\
  *   `PUBLICATION`：允许多个计算并行运行，但会使用第一个成功完成的计算结果。此后的进一步调用不会导致计算再次执行。\n*   `SYNCHRONIZED`：通过锁保护计算，确保其只运行一次。同时发生的调用会等待第一个调用完成。\n\
  \n默认模式是 `SYNCHRONIZED`。\n\n委托是 Kotlin 中一个深奥的主题，你可以用它做很多事情，不仅仅是惰性初始化。例如，你可以将类委托给一个对象实例，从而有效地从一个实例继承类，而不是进行子类化。你可以在官方\
  \ Kotlin 文档中阅读更多相关内容：[*https://kotlinlang.org/docs/delegated-properties.xhtml*](https://kotlinlang.org/docs/delegated-properties.xhtml)。\n\
  \n## 内联函数\n\n你可以通过创建*内联函数*，使 Kotlin 中的函数实现零开销。\n\n内联函数还有一个好处，即它们不会以任何方式改变调用上下文。一个很好的例子是你在本书中使用的\
  \ SQL 库 Kotliquery 中的 `transaction` 函数。事实上，正是笔者向 Kotliquery 提交的、在第 6 章中提到的拉取请求（[*https://github.com/seratch/kotliquery/pull/57*](https://github.com/seratch/kotliquery/pull/57)），将\
  \ `transaction` 函数改成了内联函数。清单 16-1 展示了该函数实现的大致轮廓。\n\n```\nfun  Session.transaction(\n\
  block: (TransactionalSession) -> A\n): A {\ntry {\nconnection.begin()\nreturn block(TransactionalSession(connection)).also\
  \ {\nconnection.commit()\n}\n} catch (e: Exception) {\nconnection.rollback()\nthrow\
  \ e\n}\n}\n清单 16-1\nKotliquery 中 transaction 函数实现的大致轮廓\n```\n\n这段代码运行良好，但有一个问题：事务块内部的代码会破坏协程上下文。Kotlin\
  \ 无法静态地知道一个函数如何使用你传递给它的 lambda。因此，Kotlin 不能假设一个函数会内联地调用与其声明上下文相同的 lambda。以下代码会出错：\n\
  \n```\nrunBlocking {\ndbSess.transaction { txSess ->\ndelay(1)\ntxSess.run(...)\n\
  }\n}\n```\n\n这个问题的解决方案是将函数标记为内联。这样 Kotlin 就知道该函数也会内联地调用 lambda。可以编写不内联调用 lambda\
  \ 的内联函数，但如果出现这种情况，你需要显式地用 `noinline` 或 `crossinline` 标记 lambda。\n\n通过在 Kotliquery\
  \ 的 `transaction` 函数中添加 `inline` 关键字（`inline fun <A> Session.transaction(...`），代码就能正常运行，因为\
  \ Kotlin 编译器会像处理 lambda 外部的代码一样，处理传递给 `transaction` 的 lambda 中的代码。\n\n内置的作用域函数，如\
  \ `apply`、`with`、`also` 等，都是内联函数。这就是为什么它们也能在任何上下文中工作，并且不会因为表达性或性能而带来任何编译时或运行时的开销。\n\
  \n## 具体化泛型\n\n具体化泛型（或具体化类型参数）解决了 Java 平台上一个常见的陷阱：泛型类型仅在编译时存在。这通常被称为*类型擦除*，在编译后的字节码中不会留下泛型类型的任何痕迹。因此，如果你有一个\
  \ `List<String>`，所有字节码和 Java 运行时只知道它是一个 `List`。检查其元素是否为字符串的类型检查，是在编译器生成最终输出之前的编译阶段完成的。\n\
  \nKotlin 无法神奇地绕过 Java 平台的限制。但 Kotlin 确实有一个解决方案。关键在于内联函数，并且你只能在内联函数中使用具体化泛型。\n\n\
  编译器会从编译输出中移除（*内联*）内联函数。Kotlin 编译器会将函数体复制到你代码中调用它的每个位置。这意味着它可以用调用函数时传递的实际类型来替换泛型类型。因此，对于内联函数来说，具体化的泛型类型只是一个快捷方式，用于将那段代码手动复制到所有调用它的地方，并用调用点使用的实际类型替换泛型。\n\
  \n例如，假设你想编写一个辅助函数，它接收一个 JSON 字符串并将其序列化为正确的类型。清单 16-2 展示了你可以如何尝试实现它。\n\n```\nfun\
  \  serializeJson(json: String): T =\nGson().fromJson(json, T::class.java)\n清单 16-2\n\
  尝试为 JSON 序列化编写辅助函数\n```\n\n然而，这段代码无法编译。这是因为类型擦除。当这段代码运行时，`T` 的类型信息就丢失了。因此，`serializeJson`\
  \ 无法知道 `T` 的类型是什么。\n\n但是，如果你将其编写为一个带有具体化泛型的内联函数，编译器就拥有了使其工作所需的一切信息。清单 16-3 展示了其工作原理。\n\
  \n```\ninline fun  serializeJson(json: String): T =\nGson().fromJson(json, T::class.java)\n\
  清单 16-3\n使用具体化泛型为 JSON 序列化编写辅助函数\n```\n\n代码是相同的，除了 `inline` 和 `reified` 关键字。由于编译器内联了该函数，它就知道泛型的类型是什么，因为\
  \ Kotlin 在编译时（而非运行时）解析内联函数的类型。\n\n\n\n## 契约\n\n你是否曾好奇 Kotlin 是如何做到这一点的？\n\n```\n\
  val foo: MyFoo? = createFoo()\nassertNotNull(foo)\nfoo.doSomething()\n```\n\n如果你仔细审视这段代码，会发现一些奇怪的地方。`foo`\
  \ 的类型是 `MyFoo?`，这意味着它可以是 `null`。但你仍然可以在不检查 `foo` 是否为 null 的情况下调用 `foo.doSomething()`。在可空类型上调用方法本应因空安全而引发编译错误！这是什么魔法？\n\
  \n这是因为 `assertNotNull` 实现了一个*契约*。\n\n这是没有契约的 `assertNotNull` 的样子：\n\n```\nfun <T>\
  \ assertNotNull(\n    actual: T?,\n    message: String? = null\n): T {\n    asserter.assertNotNull(message,\
  \ actual)\n    return actual!!\n}\n```\n\n这段代码运行良好，并返回一个非空类型。如果值为 `null`，你会从非空断言运算符（`!!`）得到一个\
  \ `NullPointerException`。但这并没有解开谜团。我们没有使用 `assertNotNull` 的返回值，所以即使 `assertNotNull`\
  \ 在传入 null 时抛出异常并返回非空类型，对我们的程序来说也无关紧要。\n\n`assertNotNull` 的实际实现如下：\n\n```\nfun <T>\
  \ assertNotNull(\n    actual: T?,\n    message: String? = null\n): T {\n    contract\
  \ { returns() implies (actual != null) }\n    asserter.assertNotNull(message, actual)\n\
  \    return actual!!\n}\n```\n\n注意新增的 `contract` 这一行。契约是一种告诉类型系统那些它无法自行推断、但却是真实陈述的方式。从技术上讲，可以创建一个在实现中不成立的契约。但如果正确使用，契约是对类型系统的强大补充，它使得第三方库（例如\
  \ `kotlin.test` 中的断言库）能够扩展内置的类型检查。\n\n这里使用的特定契约表明：如果函数返回了一个值（即没有抛出异常），则意味着参数 `actual`\
  \ 是非空的。然后，Kotlin 类型系统就可以将类型 `MyFoo?` 智能转换为 `MyFoo`。你已经见过在 if 语句中通过检查 null 来进行智能转换，而契约允许第三方函数实现同样的效果。\n\
  \n请注意，契约是一个实验性 API。这意味着它将来可能会发生变化，并且你必须使用 `@OptIn(ExperimentalStdlibApi::class)`\
  \ 显式选择启用才能使用它们。这种选择启用机制是为了防止你意外使用不稳定的 API，这些 API 可能会在未来的 Kotlin 版本中发生变更，从而确保你的代码面向未来。\n\
  \n## 远不止于此\n\nKotlin 语言充满了各种技巧和构造，旨在让你的开发生活更美好。那么，为什么这一章这么短呢？\n\n我努力将尽可能多的 Kotlin\
  \ 技巧融入本书的其他章节中。本章只包含我认为对 Web 应用开发者来说重要或至少有趣的内容，而这些内容我未能在关于构建实际 Web 应用功能的章节中涵盖。\n\
  \n在第 3 章中，你学习了数据类、作用域函数、可空性与空安全以及 Elvis 运算符。在第 4 章中，你学习了密封类、函数类型、解构和扩展函数。在第 5 章中，你学习了函数引用以及可关闭对象上的\
  \ `use` 作用域函数。在第 6 章中，你学习了可空类型的智能转换、伴生对象以及普通 Kotlin 函数中的泛型。在第 7 章中，你学习了不安全转换运算符和内联函数。在第\
  \ 8 章中，你几乎学习了关于协程用法和内部机制的所有知识。在第 9 章中，你学习了安全调用运算符、运算符重载、DSL、对象表达式以及扩展函数和默认接收者的优先级规则的一些关键细节。在第\
  \ 13 章中，你学习了使用 `lateinit` 实现空安全以及使用 lambda 代替对象字面量。\n\n所有这些技巧都是本章的绝佳候选内容。但我已经介绍过它们了，所以没有必要在此重复。\n\
  \n如果你想深入探索 Kotlin 提供的所有功能，请查阅 Tim Lavers 的著作 *Learn to Program with Kotlin*（Apress,\
  \ 2021）、官方 Kotlin 文档（[*https://kotlinlang.org/docs/home.xhtml*](https://kotlinlang.org/docs/home.xhtml)）以及你在互联网上能找到的众多课程、资源和书籍。\n\
  \nKotlin 语言有很多方面，还有很多我在这本书中没有提及的语言特性。但是，当你学习从头开始构建专业的 Kotlin Web 应用时，重点应该放在那些有助于交付实际价值的语言特性上。而我相信这正是本书所实现的。\n\
