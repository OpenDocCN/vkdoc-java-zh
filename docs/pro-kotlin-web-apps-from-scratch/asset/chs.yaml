  例如，在本章后面，你将使用 Spring Security（[*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security)）设置身份验证。通过将主
  Web 应用程序与身份验证配置分离，你将能够同时运行这两个设置。


  在现有函数 `createKtorApplication` 的上方或下方，你将创建一个名为 `setUpKtorCookieSecurity` 的新函数。清单
  9-18 展示了该函数应有的样子。


  ```

  fun Application.setUpKtorCookieSecurity(

  appConfig: WebappConfig,

  dataSource: DataSource

  ) {

  }

  清单 9-18

  空的骨架函数 setUpKtorCookieSecurity，你的安全配置将驻留在此处

  ```


  在本章后面，你将用身份验证设置填充此函数。


  为了使你的 Ktor Web 应用程序使用此安全设置，请记得在调用 `embeddedServer` 时调用它，你已经在其中调用了现有的 `createKtorApplication`。清单
  9-19 展示了如何正确调用它。


  ```

  embeddedServer(Netty, port = config.httpPort) {

