  abstract val statusCode: Int

  abstract val headers: Map>

  abstract fun copyResponse(

  statusCode: Int,

  headers: Map>)

  : WebResponse

  fun header(headerName: String, headerValue: String) =

  header(headerName, listOf(headerValue))

  fun header(headerName: String, headerValue: List) =

  copyResponse(

  statusCode,

  headers.plus(Pair(

  headerName,

  headers.getOrDefault(headerName, listOf())

  .plus(headerValue)

  ))

  )

  }

  data class TextWebResponse(

  val body: String,

  override val statusCode: Int = 200,

  override val headers: Map> = mapOf()

  ) : WebResponse() {

  override fun copyResponse(

  statusCode: Int,

  headers: Map>

  ) =

  copy(body, statusCode, headers)

  }

  data class JsonWebResponse(

  val body: Any?,

  override val statusCode: Int = 200,

  override val headers: Map> = mapOf()

  ) : WebResponse() {

  override fun copyResponse(

  statusCode: Int,

  headers: Map>

  ) =

  copy(body, statusCode, headers)

  }

  清单 4-4

  WebResponse、TextWebResponse 和 JsonWebResponse 的完整实现

  ```


  现在你可以使用这段代码，通过便捷的函数来追加标头，而无需手动为标头创建映射和列表：


  ```

  // 之前

  TextWebResponse("Hello, World!", headers = mapof(

  "X-Whatever" to listOf("someValue")

  ))

  JsonWebResponse(listOf(1, 2, 3), headers = mapOf(

  "Set-Cookie" to listOf(

  "myCookie=123abc",

  "myOtherCookie=456def"

  )

  ))

  // 之后

  TextWebResponse("Hello, World!")

  .header("X-Whatever", "someValue")

  JsonWebResponse(listOf(1, 2, 3))

  .header("Set-Cookie", "myCookie=123abc")

  .header("Set-Cookie", "myOtherCookie=456def")

  ```


  `WebResponse` 的实现会在每次调用时追加标头值，因此你可以选择多次调用 `header(String, String)`，或者单次（或多次）调用 `header(String,
  List<String>)`。




  ### 不区分大小写的标头


  为了让标头更易于使用，你可以更新 `WebResponse`，使其以不区分大小写的方式处理标头。具体来说，这允许你添加 `"``set-cookie``"` 和
  `"``Set-Cookie``"`，并将它们合并到同一个标头值中，即使一个是全小写，另一个是驼峰式大小写。


  你可以通过保持现有代码不变，并在 `headers` 映射中以多种大小写形式存储标头来实现这一点。然后，你可以添加一个新函数，创建一个所有标头都转换为小写版本的标头。


  `headers` 映射只是数据，而 Kotlin 拥有大量用于转换数据的工具（通常称为函数式编程或面向数据编程），因此你将使用这些工具来实现这个新函数。


  第一步是将标头映射转换为键值对列表，并将键转换为小写：


  ```

  headers

  .map { it.key.lowercase() to it.value }

  ```


  对 `map` 的调用将类型为 `Map<String, List<String>>` 的映射


  ```

  mapOf(

  "foo" to listOf("bar"),

  "Foo" to listOf("baz")

  )

  ```


  转换为类型为 `List<Pair<String, List<String>>>` 的列表：


  ```

  listOf(

  "foo" to listOf("bar"),

  "foo" to listOf("baz")

  )

  ```


  请注意这里大小写的细微差别。原始映射包含键 `"foo"`（小写）和 `"Foo"`（大写），Kotlin 认为它们是两个不同的键。但你会将键转换为小写，使它们都变成
  `"foo"`（小写），而 Kotlin 映射不能为同一个键包含两个不同的值。但是，在映射数据结构上调用 `map` 函数会将其转换为 `Pair` 列表。而列表可以包含重复项。因此，最终的列表将包含多个具有相同小写键
  `"foo"` 的键值对。


  ```

  sealed class WebResponse {

  fun headers(): Map<String, List<String>> =

  headers

  .map { it.key.lowercase() to it.value }

  .fold(mapOf()) { res, (k, v) ->

  res.plus(Pair(

  k,

  res.getOrDefault(k, listOf()).plus(v)

  ))

  }

  }

  代码清单 4-5

  WebResponse 上的 headers() 函数，所有标头名称均为小写

  ```


  代码清单 4-5 中的 `headers()` 函数返回一个新的映射，其中所有标头名称均为小写。与代码清单 4-4 中用于添加新标头值的函数 `header(String,
  List<String>)` 一样，代码清单 4-5 中的 `headers()` 函数使用 `getOrDefault` 来合并那些名称在转换为小写后相同的标头的值，这样你就不会最终用
  `"Foo"`（大写）的值替换 `"foo"`（小写）的值。


  ### fold 函数


  请坐好，深呼吸，清空你的思绪，因为我将尝试完成一件不可能的事：解释函数式编程的工作原理。


  `fold` 是函数式编程中所有列表转换的核心。你可以使用 `fold` 来实现其他函数式转换，例如 `map`、`filter`、`forEach`、`max`、`take`
  等。这使得 `fold` 在列表转换需要一些额外规则，而不仅仅是简单的 `map` 或 `filter` 时非常有用。


  在代码清单 4-5 的 `WebResponse` 中 `headers()` 的实现里，`fold` 作用于一个列表，并传入一个初始值 `mapOf()`（一个空映射）和一个
  lambda。然后，`fold` 调用该 lambda，并传入你提供的初始值 `res` 和列表中的第一个值 `(k, v)`。接着，`fold` 会再次调用该
  lambda，传入 lambda 第一次被 `fold` 调用时返回的值以及列表中的第二个值。然后，这个过程会针对列表中的每个项目重复进行，对于列表中的每个后续项目，都会调用该
  lambda，并传入 lambda 上一次被 `fold` 调用时返回的值以及列表项目本身。


  初始的空映射是一个*累加器*。你从初始值开始，每次 `fold` 调用 lambda 时，都会将新值累加到其中。`fold` 不关心累加器的值类型。它可以是列表、映射、数字，或者任何你可能想要累加的东西。


  ### 解构声明


  `(k, v)` 是一个*解构声明*。Kotlin 中的许多实体，例如数据类和 `Pair`，都实现了 `componentN()` 函数。你可以通过 `it.key`
  访问 `Pair` 的键，也可以通过 `it.component1()` 访问。类似地，你可以通过 `it.value` 访问 `Pair` 的值，也可以通过
  `it.component2()` 访问。对于所有实现了 `componentN()` 函数的实体，你都可以对它们进行*解构*。这是一种直接引用实体组件的便捷方式，无需为它们创建显式的命名变量。代码清单
  4-6 展示了解构和显式变量在功能上是相同的。


  ```

  val it = Pair("foo" to "bar")

  // 使用解构

  val (k, v) = it

  // 使用普通函数

  val k = it.key

  val v = it.value

  // 使用手动变量声明

  val k = it.component1()

  val v = it.component2()

  代码清单 4-6

  比较解构语法与手动变量赋值

  ```


  解构声明可以节省一些手动输入，并且在解构传递给函数或 lambda 的参数时特别有用，如代码清单 4-5 所示。


  ## 连接到 Ktor


  你现在拥有了一个完整的、独立的 HTTP 响应表示，它不依赖于 Ktor 或任何其他库。但是，你的 Web 应用确实使用了 Ktor。因此，你需要将两者结合起来，让
  Ktor 处理你的 `WebResponse` 类。


  ### Ktor 路由映射


  第一步是让 Ktor 路由（例如 `get("/")` 和 `post("/products")`）能够与你自己的代码返回的 `WebResponse` 实例进行交互。


  为了查看结果应该是什么样子，代码清单 4-7 比较了你当前处理路由的方式与完成 Ktor 到 `WebResponse` 的接线后的样子。


  ```

  // 直接调用 Ktor API

  get("/") {

  call.respondText("Hello, World!")

  }

  // 连接 Ktor 和 WebResponse 的最终结果

  get("/", webResponse { req ->

  TextWebResponse("Hello, World!")

  })

  代码清单 4-7

  当前 Ktor API 与期望结果的比较

  ```


  代码清单 4-7 中的两个示例有两个主要区别。首先，在处理程序中不再直接与 Ktor 的 `call` API 交互。其次，Ktor 的 `call` API
  是命令式的，你需要按顺序命令式地调用其方法。而 `WebResponse` API 本质上是函数式的，这意味着唯一的交互点是从你自己的处理程序返回的不可变值 `WebResponse`，没有命令式的方法调用。


  第一步是创建一个函数，该函数创建并返回一个新的 lambda。Ktor 中的函数 `get` 具有（简化后的）签名 `get(path: String, body:
  ApplicationCall.() -> Unit)`。换句话说，第二个参数是 `ApplicationCall` 上的一个*扩展函数*，没有返回值。




  ### 扩展函数


  第一步是创建清单 4-7 中所示的 `webResponse` 函数。`webResponse` 的返回值作为第二个参数传递给 `get`，并且需要匹配该类型签名。`get`
  的类型签名为 `get(path: String, body: ApplicationCall.() -> Unit)`。因此，`webResponse` 需要返回一个匹配
  `ApplicationCall.() -> Unit` 类型的值。


  这是一个带有*接收者类型*的*函数类型*。在清单 4-7 中对 `get` 的原始调用中，你将一个 lambda 作为第二个参数传递。函数类型是设置 Kotlin
  函数以接收 lambda 的方式之一。换句话说，lambda 是有效的函数类型。


  *接收者类型*是 `ApplicationCall`。带有接收者类型的 lambda 是一种你可以自定义 `this` 在 lambda 内部所指对象的 lambda。


  *扩展函数*就像带有接收者类型的 lambda，你可以在函数体内自定义 `this` 所指的对象，但它们是完整的具名函数，而不是匿名 lambda。


  在面向对象编程中，总有一个隐式的 `this` 指向你调用方法的实例。扩展函数是实例方法和普通独立函数之间的混合体。你不需要在类或接口内部定义扩展函数。相反，你可以在代码中的任何位置，为任何你想要的类型定义它们。


  在清单 4-8 中，一个示例演示了 `String` 上的扩展函数。该函数使用 `this` 来引用你调用该函数的字符串。你可以像调用 `String` 类本身定义的方法一样调用该函数。


  ```

  fun String.getRandomLetter() =

  this[Random.nextInt(this.length)]

  "FooBarBaz".getRandomLetter() // "z"

  "FooBarBaz".getRandomLetter() // "B"

