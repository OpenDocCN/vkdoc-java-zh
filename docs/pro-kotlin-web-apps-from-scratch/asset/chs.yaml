  引言


  欢迎阅读《*从零开始构建专业 Kotlin Web 应用*》！在本书中，你将学习如何完全从零开始构建专业级和生产级的 Web 应用，而无需使用庞大笨重的框架。


  我个人的 Web 应用之旅始于框架，但当我更深入地了解底层原理，并厌倦了与框架的 bug 和局限性作斗争后，我开始自学如何从零开始构建 Web 应用。事实证明，框架并非必需！


  得益于像 Kotlin 这样的现代编程语言和出色的第三方开源库，当你从零开始构建时，一切尽在掌握。在过去，你需要数千行样板代码和 XML 配置才能搭建一个无框架的
  Web 应用。难怪人们更喜欢框架！然而如今，你只需要少量显式代码，完全摆脱臃肿和魔法，只执行你指定的操作。


  在第一部分中，你将完全从零开始搭建一个 Web 应用骨架。这个代码库构成了第二部分的基础，在第二部分中，你将学习一些基于第一部分骨架构建的模式和实用解决方案。第三部分涵盖如何选择合适的库，以及我在前面部分未能涵盖的
  Kotlin 技巧和窍门。最后，三个附录解释了如何替换第一和第二部分中选择的一些库，以证明你可以自由选择与我不同的库，仍然可以从零开始编写专业的 Kotlin
  Web 应用。


  我特意将关于 Kotlin 技巧和窍门的章节控制在尽可能短的篇幅内。相反，你将在第一和第二部分中学习 Kotlin 的技巧和窍门，并在学习如何使用各种 Kotlin
  语言结构的同时，学习如何从零开始构建 Web 应用。


