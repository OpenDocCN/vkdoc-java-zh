  仅当 *build.gradle.kts* 发生了 IntelliJ IDEA 尚未感知的更改时，该图标才会可见。但它很容易被忽略，因此请确保每次修改 *build.gradle.kts*
  后，都在 IntelliJ IDEA 中刷新你的 Gradle 项目。


  ### 善用 IntelliJ IDEA 的自动补全功能


  IntelliJ IDEA 拥有强大的自动补全功能。也许你在之前输入 `main` 函数时已经注意到了。当你用键盘输入代码时，光标附近会出现一个下拉菜单。此下拉菜单包含你可以在当前编写位置添加的所有可行符号，并且仅限于与你当前输入内容匹配的符号。


  当自动补全与自动导入结合使用时尤其有用，如图 1-10 和 1-11 所示。如果你在 IntelliJ IDEA 中选择了一个自动补全项，而你的选择尚未导入到正在编辑的文件中，IntelliJ
