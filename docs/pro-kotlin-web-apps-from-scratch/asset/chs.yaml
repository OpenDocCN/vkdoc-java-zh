  ## 测试驱动开发


  在本章中，到目前为止你一直在使用测试驱动开发（TDD）编写测试。这意味着你首先编写了一个失败的测试，然后更新了实现代码，最终使测试成功通过。


  ### 设计与验证


  测试驱动开发有两个主要好处：它有助于系统的设计，并验证你的测试是否在做有用的事情。


  通过先编写测试，再编写实现代码，你获得了一个额外的工具来确保代码结构良好。测试的设计直接指导了实现代码的设计。如果必须在与类和函数交互之前连接过多的依赖项和状态，编写测试就会变得繁琐。因此，通过先编写测试，在实现代码的过程中，你几乎被迫使代码变得模块化和可复用，从而降低复杂性并提高可维护性。


  测试还有一个根本性问题：“谁来测试我的测试？”有测试来验证系统工作正常固然好，但你怎么知道你的测试在做有用的事情呢？先编写一个失败的测试有助于解决这个问题。这样，你可以确保所有测试用例都有一个有效的失败状态，并且如果实现代码未按预期工作，测试将会失败。如果你的测试在第一次运行时通过，你就知道这个测试并没有验证任何东西。


  关于 TDD 方法论，已有整本书籍论述，因此我在此不再赘述。如果你有兴趣了解更多，我推荐 Kent Beck 的著作《测试驱动开发：实战与模式解析》，该书最初于
  2002 年出版。这是一本永恒的经典，通过阅读它或 Kent Beck 的其他作品，你将学到很多关于软件开发实践的知识。




  ### 编写一个会失败的测试


  为了让 TDD 模式易于识别，你将通过添加一个根据 ID 获取用户的函数来执行另一个 TDD 周期。


  第一步是编写一个会失败的测试和一个空的初始实现。如果没有空的实现，你的测试代码根本无法编译，这样你实际上就无法测试你的测试了。清单 7-14 展示了测试以及空的实现。


  ```

  // 代码

  fun getUser(dbSess: Session, id: Long): User? {

  return null

  }

  // 测试

  @Test

  fun testGetUser() {

  testTx { dbSess ->

  val userId = createUser(dbSess,

  email = "augustlilleaas@me.com",

  name = "August Lilleaas",

  passwordText = "1234",

  tosAccepted = true

  )

  assertNull(getUser(dbSess, -9000))

  val user = getUser(dbSess, userId)

  assertNotNull(user)

  assertEquals(user.email, "augustlilleaas@me.com")

  }

  }

  清单 7-14

  一个带有空实现的失败测试

  ```


  请确保将代码放在 *src/main/kotlin/kotlinbook* 目录下，并将测试放在 *src/test/kotlin/kotlinbook/UserTest.kt*
  文件中。


  这个测试将会失败。初始的 `assertNull` 会成功运行。你的系统中不存在 ID 为 `-9000` 的用户。实际上，你永远不会有 ID 为负数的用户。因此，这个测试成功验证了使用不存在的用户
  ID 调用 `getUser` 会返回 null。但随后的 `assertNotNull` 将会失败。你的最终目标是让这个测试成功通过，因为 `createUser`
  返回的用户 ID 应该始终与 `getUser` 获取到的用户相对应。但 `getUser` 目前被硬编码为返回 `null`。


  ### 让测试通过


  为了让测试通过，你需要实现 `getUser` 函数。


  你已经拥有了实现它所需的所有工具。你已经配置好了 Kotliquery 来运行查询，你的测试将一个 Kotliquery 会话传递给了 `getUser`，并且你有一个数据类，用于将表数据映射到
  `getUser` 返回的 `User?` 类型。清单 7-15 展示了如何正确实现它。


  ```

  fun getUser(dbSess: Session, id: Long): User? {

  return dbSess

  .single(

  queryOf("SELECT * FROM user_t WHERE id = ?", id),

  ::mapFromRow

  )

  ?.let(User::fromRow)

  }

  清单 7-15

  getUser 的一个可行实现

  ```


  如果你重新运行测试，它应该不会出现任何断言错误。你现在已经验证了，如果你没有正确实现 `getUser`，测试将会失败。并且通过先编写测试，你确保了在除了数据库状态和一个
  Kotliquery 会话之外没有任何上下文的情况下，可以轻松地调用 `getUser`。


  ## 关于方法论的说明


  你现在已经拥有了编写和运行测试所需的一切，这些测试可以执行你的业务逻辑代码，并断言它们产生了预期和必需的输出。在本章的剩余部分，你将学习更多关于测试方法论的知识，以及你为什么要这样做背后的思考。


  ### 前端测试怎么办？


  本书不会深入探讨 JavaScript 和前端开发的世界。


  在第 9 章中，你将学习如何使用 HTML 和 CSS 构建传统的 Web 应用。在第 10 章中，你将学习如何搭建由 Kotlin 后端 API 驱动的前端。但前端的具体实现超出了本书的范围，本书专注于使用
  Kotlin 编写生产级 Web 应用的服务器端方面。


  ### 真实数据库写入 vs. 模拟对象


  在你的测试中，你正在对真实数据库进行真实的写入操作。那么模拟对象（mocks）、桩（stubs）和其他模式呢？


  模拟对象和桩允许你隔离地运行业务逻辑代码，而无需依赖像数据库和其他外部系统这样的大型有状态系统。就我个人而言，我几乎从不使用模拟对象和桩。我更喜欢尽可能在接近系统“边缘”的地方进行测试——也就是说，直接在我的
  Web 处理器中调用业务逻辑。这样，你的测试将反映你的 Web 处理器在生产环境中如何调用你的代码，但你无需启动一个完整的 Web 服务器并执行 HTTP 请求——你只需调用构成你业务逻辑的函数即可。这种测试的另一个名称是“黑盒测试”，意味着你的测试对被测系统的内部工作原理知之甚少。


  桩和模拟对象最大的问题在于，你最终会在测试中包含大量逻辑，这些逻辑复制了代码其他部分或第三方系统的逻辑。这会产生很高的长期维护成本，用于协调你的模拟对象与实际实现。它还可能导致误报，即你的代码在测试中与模拟对象配合良好，但在生产环境中运行
  Web 应用时却无法正常工作。


  请注意，有很多聪明且富有成效的开发者是模拟对象和桩的支持者。但如果你想了解更多相关信息，你应该去听他们的意见，而不是我的。


  如果你想根据我的经验来判断，我在实际项目中合作过的大多数人，那些以前使用过模拟对象的人，都把它搞得一团糟，现在大多避免使用模拟对象和桩。


  ### 单元测试 vs. 集成测试


  你很可能会遇到关于单元测试、集成测试以及它们之间区别的讨论。所以我将在这里简要讨论一下这个话题，让你知道该如何看待它。


  我见过在会议上有人花整场演讲来讨论单元测试与集成测试的定义，所以我无法在这里详细展开。例如，Martin Fowler 在 2021 年的一篇博客文章中对此进行了深入讨论：[*https://martinfowler.com/articles/2021-test-shapes.xhtml*](https://martinfowler.com/articles/2021-test-shapes.xhtml)。根据我的估计，你在本书中编写的测试属于单元测试。你的测试调用业务逻辑中的各种函数（单元），并断言它们返回了什么，以及它们导致系统最终处于何种状态。


  但什么是集成测试呢？


  当你测试用户界面代码时，单元测试与集成测试的区别会更加清晰。在那里，单元测试是一个小型且隔离的测试，通常只测试用户界面的底层数据模型和业务逻辑，而不测试实际的渲染。集成测试是“全功能”测试，它会在模拟器或浏览器中打开你的
  iPhone 应用或网站，并执行类似用户的操作，比如点击按钮和填写表单，以测试一切是否“真正”工作。


  在我从事实际 Web 应用开发的经验中，我发现单元测试和集成测试之间的区别并不重要，你可以像本章一样编写测试，并将其称为单元测试（或仅称为测试），你团队中的每个人都会对此感到满意。


  # 8. 使用协程并行化服务调用


  在本章中，你将学习如何执行服务调用（即调用外部 API）以及如何高效地执行这些调用。很少有 Web 应用是孤立运行的，大多数实际的 Web 应用都结合使用数据库和对外部服务的调用来完成工作。


  如果你是 Kotlin 新手，以下是一些你将在本章中看到示例的语言特性：


  *   从不同上下文使用协程


  *   `kotlin.coroutines` 与 `kotlinx.coroutines` 的区别


  同样在本章中，你将学习以下关于使用协程并行化服务调用的知识：


  *   阻塞代码与非阻塞代码的区别


  *   处理竞态条件


  如果你的 Web 应用运行在微服务架构的环境中，高效地调用外部服务会格外有用。在这种情况下，你很快就会遇到需要执行数百个并行调用的情况，使用某些调用的输出作为其他调用的输入，依此类推。




  ## 准备你的 Web 应用


  本章的目标是编写使用协程对外部服务进行并行调用的 Web 处理器。这些处理器将使用 HTTP 客户端执行实际调用。因此，你需要一个可以执行调用的实际 HTTP
  服务器。


  ### 实现一个模拟服务


  市面上有很多可用的公共和开放 API。但你永远不知道某个公共 API 何时会关闭，或者以破坏向后兼容性的方式更新。大多数 API 通常还需要个人 API 密钥，以便
  API 所有者能够限制滥用行为。


  为了确保本书的时效性并尽可能使其独立运行，你将创建自己的可调用模拟服务。


  为了使模拟服务尽可能逼真，你将创建一个独立的 HTTP API，运行在独立的 HTTP 服务器上，并使用独立的端口。这样，你就可以像调用外部 HTTP API
  一样调用你的模拟服务。从技术上讲，你可以直接调用它，因为它与你的主 Web 应用运行在同一个进程中。但由于它也可以通过 HTTP 访问，因此你在调用它时也会使用
  HTTP。


  ### 添加第二个服务器


  你将把模拟服务作为一个独立的 HTTP 服务器运行，与运行实际 Web 应用的 HTTP 服务器并行。


  使用库的好处之一是，你可以轻松地跳出固有思维模式。这是因为没有所谓的“框框”。你可以完全访问所有内容，并完全控制所有内容的启动方式。你已经知道如何从 Kotlin
  代码启动 HTTP 服务器，因为你的现有 Web 应用就是这么做的。添加第二个服务器就像在现有的 `main()` 函数中某处添加对 Ktor 的 `embeddedServer()`
  的第二次调用一样简单。


  该服务器的实际实现将包含三个路由：一个路由在 200 到 2000 之间随机选择一个数字，等待该毫秒数后返回该数字；另一个路由仅返回文本 `"pong"`；还有一个路由返回你向其
  POST 的任何内容并将其反转。清单 8-1 包含了设置所有这些内容所需的代码。


  ```

  embeddedServer(Netty, port = 9876) {

  routing {

  get("/random_number", webResponse {

  val num = (200L..2000L).random()

  delay(num)

  TextWebResponse(num.toString())

  })

  get("/ping", webResponse {

  TextWebResponse("pong")

  })

  post("/reverse", webResponse {

  TextWebResponse(call.receiveText().reversed())

  })

  }

  }.start(wait = false)

  清单 8-1

  一个包含一些路由处理器的模拟服务，你将用它来演示协程

  ```


  `200L..2000L` 是一个区间，你在第 6 章实现 `mapFromRow()` 时已经使用过区间（参见清单 6-1）。`Range` 上的内置扩展函数
  `random()` 是获取有界随机数的一种便捷方式。


  请注意，你的新“模拟”服务器是通过 `.start(wait = false)` 启动的。请确保将其放在对“真实” `embeddedServer()` 的现有调用之前。“真实”服务器设置为等待（`.start(wait
  = true)`），这意味着它将导致 `main()` 函数永久阻塞，监听新的传入连接。如果没有“真实” Web 应用的这种阻塞/等待，`main()` 函数会立即退出。其后果是，在“真实”
  `embeddedServer()` 启动之后放置的任何代码，在服务器关闭之前都不会运行。因此，请先启动你的“模拟”服务器，并将其设置为不等待/阻塞。这样，你的“模拟”服务器将启动，然后你的“真实”服务器将启动，并且你的
  `main()` 函数将阻塞并监听两个服务器上的传入连接。


  ## 理解协程


  在开始实现协程的并行化服务调用之前，你应该对协程的作用及其运行机制有所了解。


  ### `delay` 协程


  你已经编写了你的第一个协程。注意到了吗？


  在清单 8-1 中，你编写了一个生成随机数的 Web 处理器，在将该数字作为文本返回之前，它使用该随机数调用了函数 `delay()`。`delay()` 就是一个协程！


  `delay()` 是一个特殊函数，只能在协程上下文中工作。如果你尝试在顶层或仅在 `main()` 函数内部调用 `delay()`，将会收到错误，如清单 8-2
  所示。


  ```

  挂起函数 ''delay'' 只能从协程或其他挂起函数中调用

  清单 8-2

  尝试从非协程上下文调用协程时收到的错误消息

  ```


  为什么你可以在 Web 处理器内部编写 `delay()`，而不能在代码的其他任何地方？为什么你首先使用 `delay()`，而不是更熟悉的函数（如 `Thread.sleep()`）？


  ### 线程的问题


  Kotlin 中挂起函数和协程的全部意义在于限制和控制线程的使用，特别是休眠线程。


  在 Java 平台 Web 应用的旧时代，典型的架构是每个 HTTP 请求在其处理的整个持续时间内占用一个完整的线程。如果在另一个请求正在运行时收到一个新的传入请求，Web
  服务器将创建第二个线程来处理该请求，依此类推。Web 服务器会使用一个线程池，以避免为每个请求从头创建新线程。但根本上，一个线程处理一个请求。


  其后果是，在某些（甚至大多数）时间里，线程处于空闲状态，不执行任何工作。例如，如果你的 Web 服务器查询数据库，处理该请求的线程在等待数据库服务器响应时会休眠。


  这是一个问题，因为线程在底层的工作方式。Java 中的线程会在底层操作系统中创建一个线程。操作系统线程是一种相对昂贵的资源。每个线程都需要自己完整的调用栈，并且在线程之间切换也会产生开销。


  在现代操作系统上，你可以走得很远，因为与 21 世纪初 Java 平台流行时相比，它们现在处理数万个线程的能力要强得多。但通常最好避免创建近乎无限数量的线程，而是依赖其他并发机制。


  ### 挂起而非锁定


  为了避免空闲和休眠线程，Kotlin 引入了*挂起*的概念。


  简而言之，挂起意味着 Kotlin 知道如何在特定点挂起代码的执行，并在稍后继续执行。当你的代码到达挂起点时，Kotlin 知道它可以使用运行你代码的线程来做其他事情。稍后，当挂起的代码准备好继续运行时，执行将继续，可能会在另一个线程上。


  这就是 `delay()` 函数的作用。一旦你调用 `delay()`，Kotlin 就会挂起你的函数执行。稍后，当内部调度器在所需的毫秒数后触发时（在 Java
  平台上，Kotlin 使用 `ScheduledThreadPoolExecutor` 来实现），Kotlin 会恢复你的函数执行。


  如果你调用 `Thread.sleep()`，Java 运行时会在你指定的持续时间内阻塞整个线程。如果你使用 `delay()`，你就让 Kotlin 接管了线程管理。你应该尽可能使用
  `delay()` 和协程，让 Kotlin 运行时接管线程管理。




  ### 协程上下文


  你只能在两种地方调用挂起函数：协程上下文或标记了 `suspend` 的函数中。


  从清单 8-2 中得到的错误信息指出了这一要求。Kotlin 无法在代码的任意位置挂起执行，因为 Java 平台不允许这样做。清单 8-3 展示了如何创建一个挂起函数并在其中调用
  `delay()`。


  ```

  suspend fun myCoroutineFunction() {

  println("Hello, ...")

  delay(500)

  println("...world!")

  }

  清单 8-3

  挂起函数示例

  ```


  然而，这个函数引出了一个问题：如何在现有的 `main()` 函数中调用*那个*函数？如果你尝试在其中调用它，如清单 8-4 所示，你会再次得到与清单 8-2
  相同的错误信息。


  ```

  fun main() {

  log.debug("Starting application...")

  myCoroutineFunction()

  // 错误：挂起函数 ''myCoroutineFunction''

  // 只能从协程或另一个挂起函数中调用

  清单 8-4

  从 main 函数内部调用挂起函数并得到错误信息

  ```


  解决这个问题的一种方法是将 `main()` 函数本身标记为 `suspend`。Kotlin 编译器会在底层完成必要的工作，将一个普通的 Java 平台 main
  函数与一个独立的、协程作用域的 main 函数桥接起来，后者将由 Kotlin 在底层调用。


  另一种方法是自己显式创建一个协程上下文。Kotlin 提供了 `runBlocking` 函数来桥接普通执行与协程之间的鸿沟。清单 8-5 展示了一个示例，说明如何从非协程上下文中调用挂起函数。


  ```

  suspend fun myFancyCoroutineFunction(): Number {

  val num = (100L..500L).random()

  delay(num)

  return num

  }

  fun main() {

  log.debug("Starting application...")

  val waitedFor = runBlocking {

  myFancyCoroutineFunction()

  }

  println("Waited ${waitedFor}ms")

  // Waited 427ms

  清单 8-5

  使用 runBlocking 从 main() 函数中调用协程

  ```


  `runBlocking` 会阻塞调用线程，直到协程执行完毕。`runBlocking` 的目的是桥接线程世界与协程世界之间的鸿沟，这就是它会阻塞调用线程的原因。`runBlocking`
  将协程上下文中运行的 lambda 表达式的返回值返回给非协程上下文，在这个例子中，这意味着 `waitedFor` 代表了 `myFancyCoroutineFunction()`
  内部的 `num`。


  ### Ktor 中的协程


  在解释了这么多之后，你现在可以回到你在清单 8-1 中编写的“假”外部服务中的 `delay()` 了。


  你可以在 Web 处理器内部编写 `delay()` 的原因是 Ktor 处理器已经在协程上下文中运行了。Ktor 从一开始就是为 Kotlin 编写的，并在底层广泛使用协程。由于
  Ktor 中的大部分代码已经在协程上下文中运行，它会将这个协程上下文暴露给你的 Web 处理器，这样你就可以在 Ktor 中开始使用协程，而无需任何额外设置。


  在底层，Ktor 支持多种不同的服务器实现。在本书中，你使用了 Netty，它构建在非阻塞 NIO（新 I/O）API 之上，该 API 早在 Java 1.4
  时就已添加到 Java 平台。Netty 和 Ktor 之间的映射在很大程度上依赖于 Netty 的非阻塞特性，从而形成了一种高效的配对，几乎不需要发生线程阻塞。


  此外，当你在第 4 章实现 `webResponse` 时，你在构建和返回 `WebResponse` 实例的 `handler` lambda 表达式中包含了
  `suspend` 关键字。作为 `handler` lambda 表达式接收者类型的 Ktor 类型 `PipelineContext<Unit, ApplicationCall>`
  实现了内置接口 `coroutineScope`，这告诉 Kotlin 你的 Web 响应处理器 lambda 表达式拥有一个可用的协程作用域。并且由于 `handler`
  lambda 函数类型包含了 `suspend`，你就拥有了从 `webHandler` 包装的 Ktor 处理器内部调用协程所需的一切。


  ## 并行化服务调用


  你现在有了一个“假”的 Web 服务器，可以将其当作外部服务来使用，并且你理解了协程的基本原理以及它们为何有用。现在你已经准备好编写一些并行化的服务调用了。


  ### 添加依赖项


  在执行外部服务调用之前，你需要两个依赖项：一个用于调用“假”服务器的 HTTP 客户端，以及一个对 Kotlin 协程库本身的依赖。


  Java 平台上有许多可用的 HTTP 客户端。在本书中，你将使用 Ktor 自己的 HTTP 客户端。Ktor HTTP 客户端与 Ktor HTTP 服务器没有直接耦合。你使用它的原因是它从根本上基于协程。因此，它非常适合使用协程的
  Ktor Web 应用程序。


  清单 8-6 显示了使一切正常工作所需添加的内容。


  ```

  implementation("io.ktor:ktor-client-core:2.1.2")

  implementation("io.ktor:ktor-client-cio:2.1.2")

  清单 8-6

  在 build.gradle.kts 中将协程库添加为依赖项

  ```


  与 Ktor 服务器一样，Ktor 客户端支持多种不同的后端。CIO（协程 I/O）后端是基于协程的，你将在本书中使用它。




  ### 执行并行调用


  要执行并行化的服务调用，你需要编写一个新的 Ktor Web 处理器，该处理器会混合搭配并行调用，并利用并行调用的结果来执行额外的并行调用。


  如果没有像协程这样的工具可用，这种按需定制的并行化编写起来会非常棘手。协程的一大优势在于，编写并行化的服务调用几乎和编写同步、顺序的服务调用一样简单。


  在代码清单 8-7 中，你可以看到一个几乎无所不包的示例。其中发生了好几件事，我将在下文详细解释。


  ```

  suspend fun handleCoroutineTest(

  dbSess: Session

  ) = coroutineScope {

  val client = HttpClient(CIO)

  val randomNumberRequest = async {

  client.get("http://localhost:9876/random_number")

  .bodyAsText()

  }

  val reverseRequest = async {

  client.post("http://localhost:9876/reverse") {

  setBody(randomNumberRequest.await())

  }.bodyAsText()

  }

  val queryOperation = async {

  val pingPong = client.get("http://localhost:9876/ping")

  .bodyAsText()

  dbSess.single(

  queryOf(

  "SELECT count(*) c from user_t WHERE email != ?",

  pingPong

  ),

  ::mapFromRow)

  }

  TextWebResponse("""

  Random number: ${randomNumberRequest.await()}

  Reversed: ${reverseRequest.await()}

  Query: ${queryOperation.await()}

  """)

  }

  代码清单 8-7

  一个对外部服务执行多个并行调用的函数

  ```


  核心上，这和其他任何 Web 处理器函数一样。你传入一些参数，即一个 Kotliquery 数据库会话，并返回一个 `WebResponse`。主要区别在于它是一个
  `suspend` 函数，并且被包裹在 `coroutineScope` 中。


  当你想要执行多个并行化的服务调用时，`async()` 是主力工具。你包裹在 `async()` 中的代码会立即异步执行。当你向 `/random_number`
  发起请求时，你的代码不会暂停并等待返回值。相反，它会继续执行下一条语句，该语句会启动一个对 `/reverse` 的请求。类似地，代码不会等待该请求完成，而是直接进入下一条语句，该语句会启动另一个异步块，执行对
  `/ping` 的请求，并将该返回值用作数据库查询的输入。


  当你调用 `await()` 时，异步魔法就发生了。`async()` 的返回值是 `Deferred<T>`，在 `Deferred<T>` 上调用 `await()`
  会导致该代码挂起（而非阻塞）。当结果准备好时，你的代码将继续执行，而 `Deferred<T>` 的值就是 `T`——换句话说，就是 `async()` 块返回的原始值。


  `async()` 还需要一个协程作用域才能运行。将函数体包裹在 `coroutineScope` 中可确保协程作用域可用。当你从 Ktor Web 处理器调用
  `handleCoroutineTest()` 时，它会继承已有的上下文。因此，像这样将函数包裹在 `coroutineScope` 中不会产生额外的开销。


  ### 处理竞态条件


  编写非阻塞和并行化代码的主要难点之一在于，你无法控制所启动操作的完成顺序。当你启动操作 A、B 和 C 时，它们可能按该顺序完成，也可能 C 先完成，然后 B
  完成，或者 B 先完成，或者其他任何排列顺序。


  例如，代码清单 8-7 并行发起了 `randomNumberRequest`、`reverseRequest` 和 `queryOperation`。因此它们都立即开始执行，互不等待。但
  `reverseRequest` 依赖于 `randomNumberRequest` 的返回值。这里存在潜在的*竞态条件*。竞态条件是指一种很少发生的意外事件顺序。也许由于底层实现细节，`randomNumberRequest`
  通常会在 `reverseRequest` 实际执行之前完成。但在某些罕见情况下，`reverseRequest` 先执行，并可能因为 `randomNumberRequest`
  的返回值尚不可用而失败。


  当你使用协程时，像这样的竞态条件就不是问题了。`reverseRequest` 中的代码使用了 `randomNumberRequest.await()`，这意味着协程运行时将始终等待
  `randomNumberRequest` 完成，然后才继续执行 `reverseRequest`。将 `async()` 和 `await()` 结合使用的能力，正是协程实现并行化如此强大的原因。你无需管理请求发生的顺序，也无需手动处理异步操作完成的所有组合情况。你只需启动异步操作，然后对所需的值简单地调用
  `await()`，一切就会按预期工作。


  ### 添加到 Ktor


  要测试此函数，你可以创建一个新的 Ktor 路由处理器，并调用代码清单 8-7 中的 `handleCoroutineTest()` 函数。


  为此，你只需在 Ktor 的 `routes` 块中添加一个新的路由处理器，并像代码清单 8-8 所示那样调用该函数。


  ```

  get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

  handleCoroutineTest(dbSess)

  })

  代码清单 8-8

  在 Web 处理器中调用 handleCoroutineTest()

  ```


  现在就去测试吧！实际得到的数字是随机设计的，所以这是我在写这本书时运行代码得到的随机输出：


  ```

  Random number: 1599

  Reversed: 9951

  Query: {c=1}

  ```


  ## 混合协程与阻塞调用


  在 Java 平台上有大量调用会在等待异步操作完成时阻塞当前线程。你应该避免将这些阻塞调用直接放在协程中，而是适当地包装它们，让 Kotlin 更高效地管理资源。


  ### 包装阻塞调用


  在代码清单 8-7 中，你已经违反了包装阻塞调用的规则。Ktor HTTP 客户端基于协程，不会阻塞。但 JDBC 和 Kotliquery 在等待数据库返回时确实会阻塞：


  ```

  val queryOperation = async {

  val pingPong = client.get("http://localhost:9876/ping")

  .bodyAsText()

  dbSess.single(

  queryOf(

  "SELECT count(*) c from user_t WHERE email != ?",

  pingPong

  ),

  ::mapFromRow)

  }

  ```


  要解决此问题，你应该使用 `withContext` 包装所有阻塞调用，并确保阻塞调用在内置的 `Dispatchers.IO` 上下文中运行。代码清单 8-9
  演示了如何让代码清单 8-7 中的代码在协程中正确处理阻塞调用。


  ```

  val queryOperation = async {

  val pingPong = client.get("http://localhost:9876/ping")

  .bodyAsText()

  withContext(Dispatchers.IO) {

  dbSess.single(

  queryOf(

  "SELECT count(*) c from user_t WHERE email != ?",

  pingPong

  ),

  ::mapFromRow)

  }

  }

  代码清单 8-9

  在协程中正确处理阻塞调用

  ```


  通过这个小小的改动，你允许协程运行时在一个单独的线程池中执行阻塞调用，该线程池专为长时间运行的阻塞 I/O 操作（如数据库查询）而设计。


  在你的主要 Web 处理器中，包装数据库访问调用并不那么重要。典型的 Web 处理器会执行一个或几个顺序的数据库查询，并不会真正进行任何并行化。但对于高度并行化的协程代码，你应该牢记这一点，并尽量记得将所有阻塞调用包装在
  `withContext(Dispatchers.IO)` 中。


  ## 协程内部原理


  在本章中，你已经了解了一些关于协程底层运作的细节。在本节中，我将解释协程工作原理中一些更深入的细节。让我们深入探究其内部机制！




  ### Kotlin 与 KotlinX 的对比


  为避免混淆，我此前在术语上故意有所含糊。实际上，Kotlin 中有两种协程：内置的 `kotlin.coroutines` 和不在标准库中的 `kotlinx.coroutines`
  库，后者需要作为依赖添加到 *build.gradle.kts* 中。


  到目前为止，你编写的协程都是 `kotlinx.coroutines`。你并没有在 *build.gradle.kts* 中添加对该库的依赖，但也不需要这样做。Ktor
  会以传递依赖的方式添加它，你也可以在自己的代码中使用 Ktor 自带的 `kotlinx.coroutines` 版本。


  `kotlinx.coroutines` 构建于内置且底层的 `kotlin.coroutines` 之上。底层的 `kotlin.coroutines` 库是核心语言语法的一部分，它为函数添加了
  `suspend` 关键字，并且当你尝试从非协程上下文中调用 `suspend` 函数时，会导致编译错误。一个 `suspend` 函数会返回一个*续体（continuation）*，这是一个
  Kotlin 运行时非常熟悉的内置状态机。Kotlin 利用续体挂起函数，使其能够运行代码直到遇到挂起点，随后再使用该续体从同一挂起点继续执行。


  ### 与 Arrow 的对比


  使用 `kotlinx.coroutines` 进行并行化只是 Kotlin 中 `kotlin.coroutines` 和续体的用途之一。续体的另一个显著用途是
  Arrow 库。


  在本章中，你将使用 Arrow 来进一步学习协程，但在后续章节中，你也会用它来验证数据。因此，请将其作为依赖添加到 *build.gradle.kts* 中：


  ```

  implementation("io.arrow-kt:arrow-fx-coroutines:1.1.2")

  implementation("io.arrow-kt:arrow-fx-stm:1.1.2")

  ```


  Arrow 实现了复杂的函数式编程结构，类似于你在 Scala 和 Haskell 等语言中能找到的那些。Arrow 并*不*使用协程和续体来实现异步编程和服务调用的并行化。相反，Arrow
  利用它们来实现深度非尾递归、计算 DSL（如 `Either` 和 `Effect`）等。


  解释如何使用 Arrow 进行带有强类型的单子函数式编程超出了本书的范围。但 Arrow 为展示续体对库开发者而言有多么有用，提供了一个很好的基础。


  Arrow 提供的众多特性之一是完全函数式的错误处理。当发生错误时，Arrow 不是抛出异常来中断执行流程，而是使用 `kotlin.coroutines` 和续体来短路你的代码执行，使得错误之后的代码不会运行。清单
  8-10 展示了如何使用 Arrow 进行此类数据验证的完整示例。


  ```

  data class ValidationError(val error: String) {}

  data class MyUser(val email: String, val password: String)

  fun validateEmail(email: Any?): Either {

  if (email !is String) {

  return ValidationError("E-mail must be set").left()

  }

  if (!email.contains("@")) {

  return ValidationError("Invalid e-mail").left()

  }

  return email.right()

  }

  fun validatePassword(password: Any?): Either {

  if (password !is String) {

  return ValidationError("Password must be set").left()

  }

  if (password == "1234") {

  return ValidationError("Insecure password").left()

  }

  return password.right()

  }

  suspend fun signUpUser(

  email: String,

  password: String

  ): Either =

  either {

  val validEmail = validateEmail(email).bind()

  val validPassword = validatePassword(password).bind()

  MyUser(

  email = validEmail,

  password = validPassword

  )

  }

  清单 8-10

  使用 Arrow 编写函数式错误处理

  ```


  魔法发生在 `signUpUser` 中的 `either` 块里。`validateEmail` 和 `validatePassword` 的返回类型都是 `Either<ValidationError,
  MyUser>`，而 `left()` 和 `right()` 是扩展函数，它们解析为 `Either` 的左侧或右侧（双关语，指 Either 类型）。当你在
  `Either` 实例上调用 `bind()` 时，就启用了短路机制。如果 `Either` 返回一个左值，Arrow 会在底层使用续体进行短路，并停止执行 `either`
  块。同时，它会在执行被短路的地方返回那个左值。另一方面（同样双关），如果它返回一个右值，该值会被绑定到语句中，并继续执行下一行代码。


  要从 Either 中提取实际值，你可以使用 `fold`，它会根据结果调用不同的 lambda 表达式。清单 8-11 展示了对 `signUpUser()`
  进行几次不同调用的输出结果。


  ```

  signUpUser("foo@bar.com", "test")

  .fold({ err -> println(err)}, { user -> println(user)})

  // MyUser(email=foo@bar.com, password=test)

  signUpUser("foo", "test")

  .fold({ err -> println(err)}, { user -> println(user)})

  // ValidationError(error=Invalid e-mail)

  signUpUser("foo@bar.com", "1234")

  .fold({ err -> println(err)}, { user -> println(user)})

  // ValidationError(error=Insecure password)

  清单 8-11

  使用 fold 从 Either 中提取值

  ```


  通过利用底层的 Kotlin 续体，Arrow 可以控制代码的执行，并在其 API 中认为合适的任何点，随心所欲地暂停和继续执行。


  ### 使用底层续体


  为了进一步展示 `kotlinx.coroutines` 和 Arrow 在底层做了什么，你可以直接调用 Kotlin 中最低层级的协程和续体 API。


  `kotlin.coroutines` 的 API 是公开、稳定且有文档的，你可以使用它们来构建强大的语言扩展。它们通常对编写 Web 应用没什么用，更适合第三方
  Kotlin 库的作者。但了解底层原理总是好的。清单 8-12 展示了一个示例，演示如何使用 `kotlin.coroutines` 中原始的底层续体 API
  来手动管理代码的挂起和执行。


  ```

  import kotlin.coroutines.intrinsics.*

  suspend fun haltHere() =

  suspendCoroutineUninterceptedOrReturn { cont ->

  COROUTINE_SUSPENDED

  }

  fun createContinuation(): suspend () -> Unit {

  return {

  println("a")

  haltHere()

  println("b")

  println("c")

  haltHere()

  println("d")

  }

  }

  val cont = createContinuation()

  .createCoroutineUnintercepted(

  Continuation(EmptyCoroutineContext, {}))

  cont.resume(Unit)

  // a

  cont.resume(Unit)

  // b

  // c

  cont.resume(Unit)

  // d

  cont.resume(Unit)

  // d

  清单 8-12

  使用底层续体控制代码执行

  ```


  注意，第一次调用 `resume` 续体时，只打印了“a”，而没有其他内容。这是因为 `haltHere` 使用了底层续体 API 来向 Kotlin 指示它应该在此处挂起执行。执行完这第一步后，是否继续执行协程完全是可选的。


  当你第二次调用 `cont.resume(Unit)` 时，代码的第二部分会运行，并打印出“b”和“c”。然后，仅仅由于 Kotlin 中续体的工作方式，对该协程的任何后续调用都会重复最后一步，导致它一次又一次地打印“d”。


  归根结底，这并没有什么魔法。所有看似神奇的地方都源于 `suspend` 关键字。Kotlin 会将 `suspend` 函数的主体编译成一个状态机，该状态机包含代码，并在任何可能发生挂起的地方（即调用另一个
  `suspend` 函数时）返回一个带有状态机标志的返回值。




  ### Java 平台实现细节


  如果你*真的*想深入探究，可以查看生成的字节码。


  如果你使用 IntelliJ IDEA，可以在 *build/classes/kotlin/main* 文件夹中打开一个类文件，并使用 *Tools ➤ Kotlin
  ➤ Decompile to Java* 功能。这段代码可能不太易读，但你能确切看到 Kotlin 编译器是如何从挂起函数生成兼容 Java 平台的代码的。代码清单
  8-13 展示了代码清单 8-12 中 `createContinuation` 函数编译输出的完整示例。


  ```

  Int label;

  public final Object invokeSuspend(@NotNull Object $result) {

  label17: {

  Object var2 = IntrinsicsKt.getCOROUTINE_SUSPENDED();

  Continuation var10000;

  switch (this.label) {

  case 0:

  ResultKt.throwOnFailure($result);

  System.out.println("a");

  var10000 = (Continuation)this;

  this.label = 1;

  if (ContinuationTestKt.haltHere(var10000) == var2) {

  return var2;

  }

  break;

  case 1:

  ResultKt.throwOnFailure($result);

  break;

  case 2:

  ResultKt.throwOnFailure($result);

  break label17;

  default:

  throw new IllegalStateException("call to ''resume'' before ''invoke'' with coroutine");

  }

  System.out.println("b");

  System.out.println("c");

  var10000 = (Continuation)this;

  this.label = 2;

  if (ContinuationTestKt.haltHere(var10000) == var2) {

  return var2;

  }

  }

  System.out.println("d");

  return Unit.INSTANCE;

  }

  代码清单 8-13

  createContinuation 函数编译输出的完整示例

  ```


  这段代码充满了你在普通 Java 代码中通常看不到的东西，比如标签块和带标签的 break（`label17` 这类东西）。但它很好地演示了 Kotlin 如何设法不阻塞线程。它将
  `createContinuation` 中线性的 Kotlin 代码编译成一个硬编码的状态机。初始的 `case 0` 首先打印 `"a"`，将 `label`
  状态从 `0` 步进到 `1`，然后返回一个 continuation 对象 `var2`。下次 Kotlin 调用该 continuation 时，`case
  1` 运行，它什么都不做，然后继续执行 case 语句下面的代码，即打印 `"b"` 和 `"c"`，并将 `label` 状态设置为 `2`。在下一次调用时，`case
  2` 运行，它只是跳出整个 `label17` 块，然后继续执行其下方的代码，即打印 `"d"`。Kotlin 在这种情况下不会改变状态机，这就是为什么在 continuation
  “完成”后多次调用它时，会反复打印出 "d"，如代码清单 8-12 末尾所示。


  这段代码并非地道的 Java 代码，但这并不重要。地道的 Java 是为人类设计的，而不是为计算机。你将阅读和编写的是 Kotlin 代码，而这个编译输出只是为了能让
  Kotlin 自动将你看起来同步的代码转换为异步代码，使得运行时可以在代码中预编译的点中断和恢复（或继续）执行。


  我发现，深入理解协程底层真正发生的事情确实很有帮助。将同步语句转换为 Kotlin 可以中断和恢复的状态机，正是实现高性能异步 `kotlinx.coroutines`
  以及 Arrow 能够在某些状态发生后暂停代码执行而无需诉诸异常的关键。


  通过将你看起来线性的 Kotlin 代码编译成状态机，你可以编写出漂亮的代码，既无需阻塞线程，也无需自己编写像代码清单 8-13 那样的代码。


