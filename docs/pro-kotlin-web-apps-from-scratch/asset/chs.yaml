  ### 便捷的标头函数


  你目前为构建 HTTP 响应所创建的 API 使用起来有些繁琐。为了符合 HTTP 规范，你将标头值编码为 `List<String>`，而不是普通的 `String`。虽然同一个标头很少需要多个值，但
  HTTP 规范允许这样做，并且在某些情况下也很实用，例如响应多个 `Set-Cookie` 标头时。


  你可以选择将标头表示为 `String` 而不是 `List<String>`，这样就不必像清单 4-2 中那样，为了创建列表而将所有标头值包裹在 `listOf`
  中。但你也可以更新 `WebResponse`，使其更方便地处理多值标头。


  为此，你可以在 `WebResponse` 中添加两个用于追加标头值的方法：


  ```

  sealed class WebResponse {

  fun header(headerName: String, headerValue: String) =

  ...

  fun header(headerName: String, headerValue: List) =

  ...

  }

  ```


  这是*函数重载*的一个例子。Kotlin 允许你编写多个同名函数的不同实现。Kotlin 会根据你传递给函数的参数来决定运行哪个函数。在这个例子中，它们的区别在于
  `headerValue` 可以是字符串或字符串列表。这两个方法都会将标头追加到响应中。它们唯一的区别在于一个接受单个标头，另一个接受标头列表，从而方便地覆盖了两种使用场景。


  `header(String, String)` 的实现很直接——它只是委托给 `header(String, List<String>)` 函数，并将你提供的标头包裹在一个列表中：


  ```

  fun header(headerName: String, headerValue: String) =

  header(headerName, listOf(headerValue))

  ```


  乍一看，这可能会像一个无限循环，因为 `header` 函数除了调用自身外什么都没做。但不同的参数类型（单个字符串 vs. 字符串列表）意味着它们是两个不同的函数，因此不会发生无限循环。


  承担主要工作的代码将位于 `header(String, List<String>)` 中。它需要做两件事：`WebResponse` 的所有属性都是不可变的，因此我们必须创建一个带有新值的
  `WebResponse` 新实例。此外，`headers` 映射也是不可变的，因此我们需要创建一个新的 `headers` 值，并追加新的标头列表。


  要创建 `WebResponse` 的新实例，我们可以利用所有数据类内置的 `copy` 函数。`WebResponse` 类本身不是数据类，因此它没有内置的
  `copy` 函数。但 `WebResponse` 是实现 `header(String, List<String>)` 的类，因此需要访问一个能够创建新副本的方法。你可以通过在
  `WebResponse` 上使用一个抽象函数来实现这一点，该函数没有实现，但会返回一个新的 `WebResponse` 实例，并将实现委托给子类：


  ```

  sealed class WebResponse {

  abstract fun copyResponse(

  statusCode: Int,

  headers: Map>)

  : WebResponse

  }

  ```


  现在，`TextWebResponse` 和 `JsonWebResponse` 会出现编译错误，因为它们没有实现新的抽象函数。清单 4-3 展示了 `TextWebResponse`
  的完整实现，其中通过调用数据类内置的 `copy` 函数来实现 `copyResponse`。


  ```

  data class TextWebResponse(

  val body: String,

  override val statusCode: Int = 200,

  override val headers: Map> = mapOf()

  ) : WebResponse() {

  override fun copyResponse(

  statusCode: Int,

  headers: Map>

  ) =

  copy(body, statusCode, headers)

  }

  清单 4-3

  实现了来自 WebResponse 的抽象函数 copyResponse 的 TextWebResponse 实现

  ```


  `copy` 的参数顺序与数据类构造函数中的参数顺序相同。如果你愿意，也可以为参数命名，例如 `copy(body = body, statusCode = statusCode,
  ...)`。但省略名称可以节省一些输入。而且 `copy` 的实现就在源代码中构造函数的旁边，因此只需查看那里的代码就能轻松找到参数的实际顺序。


  剩下的就是在 `WebResponse` 中创建 `header(String, List<String>)` 的实际实现：


  ```

  sealed class WebResponse {

  fun header(headerName: String, headerValue: List) =

  copyResponse(

  statusCode,

  headers.plus(Pair(

  headerName,

  headers.getOrDefault(headerName, listOf())

  .plus(headerValue)

  ))

  )

  }

  ```


  这个实现调用了我们之前创建的 `copyResponse` 函数。它原样传递了 `statusCode`。对于标头，它需要处理 `headerName` 的重复情况。如果我们传递一个已存在于
  `headers` 中的 `headerName`，`plus` 会用新值替换任何现有值。因此，我们向 `headers` 查询 `headerName` 的现有值，如果没有则返回一个空列表，然后将标头列表追加到这个列表中，而不是完全替换它。


  现在你已经拥有了创建完整实现所需的一切。清单 4-4 展示了 `header(String, String)`、`header(String, List<String>)`
  以及用于在底层创建新实例的 `copyResponse` 功能的完整实现。


