  ### 调用现有处理器


  接下来，你将运行一个目前在 Ktor 中使用的实际处理器。


  目前，你只有一个从 Ktor 中提取的处理器 `handleCoroutineTest`。遗憾的是，你无法从 AWS Lambda 处理器中调用该函数。这并不是因为协程在无服务器环境中无法工作——让它们工作其实很容易，只需将调用包装在
  `runBlocking` 中即可。唯一无法从 AWS Lambda 调用 `handleCoroutineTest` 的原因是，它需要与一个运行在本地机器上的服务器通信，该服务器嵌入在你的主
  Ktor 服务器中。因此，你只会收到无法连接到 *http://localhost:9876* 的错误信息。


  正如本章前面提到的，在真实的 Web 应用中，你会将所有处理器代码编写为独立的函数，但为了本书的简洁性，你将它们嵌入到了 Ktor 中。因此，为了让某个 Ktor
  处理器能在 Ktor 外部使用，你需要为本章创建一个新的 Ktor 路由，并使其能够从 AWS Lambda 处理器中调用。清单 12-2 展示了如何实现这一点。


  ```

  post("/db_test", webResponseDb(dataSource) { dbSess ->

  val input = Gson().fromJson(

  call.receiveText(), Map::class.java

  )

  handleUserEmailSearch(dbSess, input["email"])

  })

  fun handleUserEmailSearch(

  dbSess: Session,

  email: Any?

  ): WebResponse {

  return JsonWebResponse(dbSess.single(

  queryOf(

  "SELECT count(*) c FROM user_t WHERE email LIKE ?",

  "%${email}%"

  ),

  ::mapFromRow)

  )

  }

  清单 12-2

  创建一个可复用的 Ktor 处理器

  ```


  这里，你创建了一个 Ktor 处理器，它在 Ktor 端解析 JSON 输入，并将数据库会话以及解析后的 JSON 中的用户名属性传递给一个独立函数。


  接下来，你将从这个独立函数 `handleUserEmailSearch` 中调用 AWS Lambda。首先，你需要一种将 `WebResponse` 数据映射到
  AWS Lambda 的方法。清单 12-3 展示了如何实现这一点。


  ```

  fun getAwsLambdaResponse(

  contentType: String,

  rawWebResponse: WebResponse,

  body: String

  ): String {

  return rawWebResponse.header("content-type", contentType)

  .let { webResponse ->

  Gson().toJson(mapOf(

  "statusCode" to webResponse.statusCode,

  "headers" to webResponse.headers,

  "body" to body

  ))

  }

  }

  fun serverlessWebResponse(

  handler: suspend () -> WebResponse

  ): String {

  return runBlocking {

  val webResponse = handler()

  when (webResponse) {

  is TextWebResponse -> {

  getAwsLambdaResponse(

  "text/plain; charset=UTF-8",

  webResponse,

  webResponse.body

  )

  }

  is JsonWebResponse -> {

  getAwsLambdaResponse(

  "application/json; charset=UTF-8",

  webResponse,

  Gson().toJson(webResponse.body)

  )

  }

  is HtmlWebResponse -> {

  getAwsLambdaResponse(

  "text/html; charset=UTF-8",

  webResponse,

  buildString {

  appendHTML().xhtml {

  with(webResponse.body) { apply() }

  }

  }

  )

  }

  }

  }

  }

  fun serverlessWebResponseDb(

  dataSource: DataSource,

  handler: suspend (dbSess: Session) -> WebResponse)

  = serverlessWebResponse {

  sessionOf(

  dataSource,

  returnGeneratedKey = true

  ).use { dbSess ->

  handler(dbSess)

  }

  }

  清单 12-3

  将 WebResponse 映射到 AWS Lambda

  ```


  函数 `serverlessWebResponse` 对于你当前的需求来说略显过度设计。它支持在处理器函数中使用协程。你刚刚编写的函数 `handleUserEmailSearch`
  并未使用协程。但由于真实世界的处理器很可能包含协程，因此映射代码对其提供了支持，以便在实际场景中尽可能有用。


  `serverlessWebResponse` 接收一个 `WebResponse` 并将其转换为兼容 AWS API Gateway 的 JSON。`TextWebResponse`
  和 `JsonWebResponse` 的处理很直接。最复杂的转换是针对 `HtmlWebResponse` 的，因为它需要将 `kotlinx.xhtml`
  DSL 代码转换为 `String`。幸运的是，`kotlinx.xhtml` 提供了一些便捷的辅助函数，使这项工作变得简单。清单 12-3 中的 `buildString`
  来自 Kotlin 标准库，它是 Java 平台 `StringBuilder` API 的一个便捷封装，用于将字符串和字节块转换为一个大的 `String`。`appendHTML`
  来自 `kotlinx.xhtml`，它需要一个 `Appender`（`StringBuilder` 就是其中之一），并分块将 HTML 追加到其中。这样，`kotlinx.xhtml`
  就不必先创建整个 HTML 字符串再返回给调用者。最后，你使用了之前用过的技巧，通过 `with` 在 `webResponse.body` 对象上调用 `apply()`，以避免调用内置的作用域函数
  `apply`。


  请注意，你可以将 `getAwsLambdaResponse` 实现为单表达式函数，即函数名后直接跟 `=`，无需指定返回类型等。但你返回的值是 `Gson().toString()`
  的结果，这是一个返回平台类型 `String!` 的 Java 类。因此，为了避免在代码中传递平台类型，你显式声明其为 `String`，以便 Kotlin 能在编译时更好地自动检测潜在的空指针异常。


  为了创建实际的 AWS Lambda 处理器函数，你还需要一个数据库连接。清单 12-4 展示了如何正确设置两者。


  ```

  private val dataSource = HikariDataSource()

  .apply {

  jdbcUrl = "jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"

  }.also {

  migrateDataSource(it)

  }

  class UserEmailSearch :

  RequestHandler, String>

  {

  override fun handleRequest(

  input: Map,

  context: Context

  ): String {

  return serverlessWebResponseDb(dataSource) { dbSess ->

  handleUserEmailSearch(dbSess, input["email"])

  }

  }

  }

