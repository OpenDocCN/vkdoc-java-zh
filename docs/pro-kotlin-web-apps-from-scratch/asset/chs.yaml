  你可能会惊讶地发现这个测试无法通过。在第 6 章中，你编写了一个可重复执行的迁移，向 `user_t` 表中插入了一个用户。因此，在你插入两个用户后，系统中的用户数量是
  3，而不是 2。


  解决这个问题的一种方法是直接删除 `assertEquals(2, users.size)`。你断言 `userAId` 和 `userBId` 都出现在 `listUsers()`
  的结果中，可以认为这已经足够了。


  另一种解决方法是使用相对断言。你可以认为你并不关心 `listUsers()` 是否恰好返回两个结果。`listUsers()` 的另一个正确定义是：在创建两个用户后，返回的用户数量应增加
