  完成后，你将拥有一个完全可用的基于 HTML 的设置，其中包含构建生产级 Web 应用所需的所有组件。


  ## 模式与组织


  有许多框架和库可用于制作传统的服务器端 Web 应用，也有许多组织和构建它们的方式。


  我预先假设你想在服务器端生成静态 HTML，而不需要任何额外功能。例如，JavaScript 框架 Next.js ([*https://nextjs.org/*](https://nextjs.org/))
  的设置方式是，你基于 React 的 Web 应用会自动在服务器端渲染并*水合*，这意味着预先生成的服务器端 HTML 会被“更新”成一个功能完备的 JavaScript
  单页应用（SPA）。在本章中，你只会从一个 Kotlin 驱动的 Web 应用后端生成“哑”HTML。


  还有一些框架，比如 Vaadin ([*https://vaadin.com/*](https://vaadin.com/))，它是一个全栈解决方案，捆绑了 UI
  组件、内置 CMS 等。这是一个框架，而不是一个库，因此不适合本书。而且，本书也不会构建任何复杂的用户界面；你只会学习如何设置基础知识，因此不需要 UI 组件。


  至于代码结构，我认为这超出了本书的范围。主要目标是教你如何使用库，并在此过程中学习大量 Kotlin 知识。代码组织这个话题很快就会变得主观且基于个人观点，我认为我从未参与过一个现实世界的
  Web 应用，其结构总是合理的，并且代码库的每个组件都有合适的位置。事实上，我经常有一个名为 `myapp.homeless` 之类的命名空间，故意把那些难以找到合适归属的东西放进去。


  ## 生成 HTML


  在本节中，你将学习生成 HTML 的基本知识，以及如何从 Kotlin 和 Ktor 中生成 HTML。


  ### 使用 `kotlinx.xhtml` DSL


  你将使用 `kotlinx.xhtml` *DSL*（领域特定语言）来生成 HTML。Ktor HTML DSL 插件在 `kotlinx.xhtml` 周围添加了一个小的封装层，使其易于从
  Ktor Web 处理器中使用。


  DSL 是一种语言中的语言。Kotlin 拥有构建 DSL 的强大功能，使用 `kotlin.xml` DSL 意味着你可以将所有 HTML 表达为纯 Kotlin
  代码。如果你需要循环、条件判断、变量和其他功能，你可以直接编写纯 Kotlin 代码。在编写 HTML 时拥有 Kotlin 的全部功能是一个巨大的优势。Ktor
  也支持各种模板引擎，如 Mustache、FreeMarker 等。但所有这些引擎的缺点是需要为循环、条件判断等使用单独的模板语言。


  此外，`kotlinx.xhtml` 易于在 Ktor 之外使用，这在后续章节中当你需要在各种上下文中运行 Web 处理器时会派上用场。




  ### 使用 Ktor HTML DSL


  Ktor HTML DSL 是 Ktor 的一个插件，你需要将其作为依赖项添加到项目的 *build.gradle.kts* 文件中：


  ```

  implementation("io.ktor:ktor-server-html-builder:2.1.2")

  ```


  Ktor HTML DSL 包含对 Ktor 路由处理器中 `call` 对象的扩展函数，用于响应使用 `kotlinx.xhtml` 构建的 HTML 内容。


  最基本的函数是 `call.respondHtml`。代码清单 9-1 演示了如何使用此函数，它允许在 Web 处理器中直接内联 HTML 内容。


  ```

  get("/html_test") {

  call.respondHtml {

  head {

  title("Hello, World!")

  }

  body {

  h1 { +"Hello, World!" }

  }

  }

  }

  代码清单 9-1

  在 Ktor Web 处理器中使用 call.respondHtml

  ```


  现在，你可以在浏览器中打开 *http://localhost:4207/html_test*，欣赏图 9-1 中展示的精美网页。


  ![](img/531928_1_En_9_Fig1_HTML.png)


  网页截图。文本显示为 Hello, world，并带有一个感叹号。


  图 9-1


  浏览器中的 HTML 输出


  只需这些步骤，就能为你的 Web 应用添加基本的 HTML 输出！在本章后面，你将学习如何在多个 Web 处理器之间共享 HTML 布局。


  ### DSL 的强大之处


  `kotlinx.xhtml` 大量使用了扩展函数，以实现类型安全的 HTML 生成 DSL。这是如何实现的呢？


  DSL 最便捷的特性之一是利用类型系统来确保只生成有效的 HTML 输出。例如，`h1` 函数只能在 `body` 内部使用。你不能将 `h1` 放在 `head`
  内部。也不能在顶层将 `h1` 作为 `head` 和 `body` 的同级元素使用。Ktor 确实提供了“逃生舱”，允许在任意位置使用任意标签，因此你并不会受到限制。但开箱即用，DSL
  能帮助你生成有效的 HTML 输出。


  如果你使用 IntelliJ IDEA，应该已经看到了其工作原理的提示。图 9-2 显示了每个 lambda 开头的灰色块，指示了 lambda 内部隐式接收者的类型。


  ![](img/531928_1_En_9_Fig2_HTML.png)


  标题为“kotlin book-Main dot k t”的窗口截图。打开的主题“main dot k t”包含 17 行代码，并显示了运行结果。


  图 9-2


  IntelliJ IDEA 显示灰色框，指示 lambda 内部的接收者类型


  你传递给 `generateHtml`、`head` 和 `body` 的 lambda 分别具有 `HTML`、`HEAD` 和 `BODY` 类型的接收者。然后，DSL
  将各种函数（如 `head` 和 `h1`）定义为相应标签类型的扩展函数。因此，DSL 内部将 `h1` 定义为 `fun BODY.h1(...) { ...
  }`。（实际上，它被定义为更抽象类型 `FlowOrHeadingContent` 的扩展函数，而 `BODY` 是该类型的子类型。）


  ### 运算符重载


  `kotlinx.xhtml` 在其 DSL 中利用了运算符重载。你已经使用过其中一个重载运算符：使用 `+` 向 HTML 标签添加文本内容。


  在 Kotlin 中，运算符重载允许自定义内置运算符（例如 `+` 号）的定义。你无法覆盖 `+` 对数字等类型的含义，但可以覆盖 `+` 在你自己的类型上被调用时的含义。


  在编写 `kotlinx.xhtml` 模板时，你可以使用 `text` 代替 `+`。因此，`h1 { text("Hello, World!") }` 等同于
  `h1 { +"Hello, World" }`。`text` 的实现包含了添加文本的实际代码。然后，`kotlinx.xhtml` 在 `Tag` 接口中定义了一个名为
  `unaryPlus` 的特殊运算符函数：


  ```

  package kotlinx.xhtml

  interface Tag {

  operator fun String.unaryPlus(): Unit {

  text(this)

  }

  }

  ```


  通过在 `Tag` 内部定义扩展函数，该函数仅在 `Tag` 实例的上下文中可用。通过添加特殊的 `operator` 关键字和特殊的 `unaryPlus`
  名称，Kotlin 编译器就知道，当在 `Tag` 的上下文中遇到 `+"some string"` 时，它会调用该函数，并且 `this` 绑定到你对其调用
  `+` 的字符串上。


  *一元加号*这个名称指的是通常以 `+i` 形式用于数字的运算符，以及其兄弟运算符 `-i`，它们分别是对数字的恒等运算符和取反运算符。但 Kotlin 允许你定义这些运算符，以便在任何类型上使用它们。


  ### 添加自定义标签


  如果你需要插入任意标签，DSL 提供了两种选择。


  你可以使用 `unsafe` 函数将原始 HTML 输出写入模板。在 DSL 中的任何位置，添加 `unsafe { +"""<my-tag class="foo"></my-tag>"""
  }`，你的模板输出将包含该原始 HTML。顾名思义，`unsafe` 不会对输出进行转义，因此使用它会使你的 Web 应用面临 HTML 注入攻击的风险。


  相反，你应该为你想要添加到 DSL 的新标签创建自定义扩展函数。代码清单 9-2 展示了如何将名为 `<my-tag>` 的自定义标签写入 `kotlinx.xhtml`
  DSL 本身。


  ```

  class MY_TAG(consumer: TagConsumer): HTMLTag(

  "my-tag", consumer, emptyMap(),

  inlineTag = true,

  emptyTag = false

  )

  fun FlowOrHeadingContent.myTag(

  block: MY_TAG.() -> Unit = {}

  ) {

  MY_TAG(consumer).visit(block)

  }

  代码清单 9-2

  向 kotlinx.xhtml DSL 添加自定义标签

  ```


  DSL 中的这个自定义标签是完全安全的，并且会自动正确处理 HTML 输入的转义。


  `MY_TAG` 类定义了 `kotlinx.xhtml` 在生成实际 HTML 时应如何写入输出。`myTag` 函数是 `FlowOrHeadingContent`
  的扩展函数，这使得它可以在模板的 `body` 部分以及 `body` 中的大多数子元素中使用。


  如果你想限制或更改可以调用 `myTag` 的上下文，请相应地更改扩展函数的接收者类型。例如，要仅使 `myTag` 在 `head` 内部可用，请使用接收者类型
  `HEAD` 而不是 `FlowOrHeadingContent`。


  ## CSS 和资源文件


  提供 HTML 内容是一个好的开始，但你很可能还需要一些 CSS 和其他资源文件，例如图片文件。




  ### 提供静态文件服务


  Ktor 内置了对提供静态文件服务的支持。Ktor 可以处理任何静态文件，例如图片、JavaScript 和视频文件，而不仅仅是 CSS 文件。


  要为你的 Web 应用添加静态文件服务功能，需要在 Ktor 配置中添加一个 `static` 路由。代码清单 9-3 演示了如何添加。


  ```

  fun Application.createKtorApplication(

  dataSource: DataSource

  ) {

  // ...

  routing {

  static("/") {

  resources("public")

  }

  代码清单 9-3

  在 createKtorApplication 中添加静态路由，用于提供文件服务

  ```


  这里，静态路由被设置为处理路径 */*。这意味着 Java 运行时类路径下 *public* 文件夹中的所有文件，都可以通过你嵌入的 Ktor Web 服务器访问。例如，如果你在类路径下有一个文件
  *public/app.css*，你可以通过 *http://localhost:4207/app.css* 访问它。


  在文件系统中存放资源的最佳位置是 *src/main/resources*。你的 Gradle 配置已经将该文件夹下的所有文件添加到了 Java 运行时类路径中。你可以在资源文件夹中随意添加任意数量的子文件夹。*src/main/resources/public*
  下的所有文件都可以在你的 Web 应用中通过对应的路径递归访问。


  现在尝试创建一个 CSS 文件，并在你的 Web 处理器的 HTML 输出中引用它！代码清单 9-4 展示了如何更新代码清单 9-1 中的 HTML 输出，以使用
  `kotlinx.xhtml` DSL 包含一个样式表。


  ```

  get("/html_test") {

  call.respondHtml {

  head {

  title("Hello, World!")

  styleLink("/app.css")

  }

  body {

  h1 { +"Hello, World!" }

  }

  }

  }

  代码清单 9-4

  在 kotlinx.xhtml DSL 中链接 CSS 文件

  ```


  路由本身没有变化，只是在 `head` 块中添加了 `styleLink` 调用。


  这个例子展示了使用 DSL 而非纯 HTML 的好处之一。DSL 提供了便捷的快捷方式，因此你无需记住如何完整地写出一个有效的样式表 `<link>` 标签。（是
  `href="/app.css"` 还是 `src="/app.css"`？是否需要记住设置 `rel="stylesheet"`？等等。）请注意，如果你需要完全控制
  CSS 链接的属性，或者需要将 `<link>` 标签用于其他目的，例如链接到 RSS 源或为多语言网站设置带有 `hrefLang` 的备用 `rel="alternate"`
  链接，也可以使用 `link` DSL 方法。


  重启你的 Web 应用，然后刷新浏览器，你应该会看到你的网站如图 9-3 所示，并且 `app.css` 中的 CSS 样式已生效。在这个例子中，CSS 文件包含
  `body { font-family: sans-serif; font-size: 50px; }`，用于将浏览器的默认字体更改为另一种字体。


  ![](img/531928_1_En_9_Fig3_HTML.png)


  一张网页截图。文本显示为 Hello, world，并带有一个感叹号。


  图 9-3


  应用了 CSS 样式的 HTML 输出


  编写不切实际的 CSS 是轻松验证一切是否正常运作以及你的配置是否正确应用了 CSS 文件的有效方法。我个人喜欢的一个小技巧是使用 `body { background-color;
  red; }`，这在任何平台上的任何浏览器中看起来都会很糟糕。


  ### 即时重载


  这种设置的一个问题是，每次对 CSS 文件进行更改时，都必须重新启动并重新编译你的 Web 应用。


  这是因为 Java 运行时是从类路径加载文件的。而且，当你的 Web 应用在本地运行时，类路径上的实际上并不是 *src/main/resources* 文件夹。作为编译步骤的一部分，Gradle
  会将类路径上的所有内容移动到 *build/* 文件夹中，所有编译后的输出都存放在那里。Gradle 不会编译 *src/main/resources* 中的文件，但会将其复制到
  *build/resources/main*。你的 Web 应用加载的正是这些文件。


  这在生产环境中是可以的，实际上也是推荐的做法。但它并不真正适合开发环境。


  为了解决这个问题，你需要做两件事：添加一个用于切换类路径加载和文件系统加载的配置属性，并设置 Ktor，使其在配置为从文件系统加载时，从 *src/main/resources*
  加载。


  你之前已经添加过配置属性，所以我这里只做总结：在 *app.conf* 中，添加 `useFileSystemAssets = false`。你希望它默认是关闭的，这样就不会在之后意外破坏你的生产环境配置。在
  *app-local.conf* 中，通过设置 `useFileSystemAssets = true` 来启用文件系统加载。然后，用一个新的属性 `val useFileSystemAssets:
  Boolean` 更新 `WebappConfig` 数据类。最后，更新 `createAppConfig`，将 `useFileSystemAssets` 设置为
  `it.getBoolean("useFileSystemAssets")` 的值。


  接下来，你需要更新你在代码清单 9-3 中添加到 Ktor 的 `static` 路由。你还需要更新 `createKtorApplication` 以接收你的应用配置。代码清单
  9-5 展示了如何扩展它，使其在配置为从文件系统加载时从文件系统加载文件，否则像现在一样从类路径加载。


  ```

  fun Application.createKtorApplication(

  appConfig: WebappConfig,

  dataSource: DataSource

  ) {

  // ...

  routing {

  static("/") {

  if (appConfig.useFileSystemAssets) {

  files("src/main/resources/public")

  } else {

  resources("public")

  }

  }

  代码清单 9-5

  在 createKtorApplication 中接收应用配置，并在本地运行 Web 应用时直接从文件系统加载资源

  ```


  这样，当你在本地运行 Web 应用时，Ktor 将直接从你的源代码加载静态文件，而不是从 *build/* 文件夹加载副本。


  你本可以将这个配置属性命名为更通用的名称，比如 `isDevMode`，并使用“开发模式”的概念来决定做什么。但根据我的经验，更具体的配置属性比通用且可复用的属性更好。如果你对多个不同的事情使用同一个配置属性，你将失去在不同环境中对
  Web 应用进行精细控制的能力。此外，你将不得不在整个代码库中搜索 `isDevMode` 来弄清楚它的作用，而 `useFileSystemAssets` 则更具描述性。


  ## 可复用的布局


  在大多数 Web 应用中，你都需要一个在多个路由之间共享的布局。布局添加了共享的默认设置，例如在所有页面上加载哪个样式表、设置哪些元标签、页眉和页脚等等。


  与其复制粘贴相同的 HTML DSL 代码，你可以创建一个可复用的布局，并在多个 Web 处理器中以编程方式复用它。


  你还需要将其设置为完全可选使用布局，以防你的 Web 应用中有需要完全控制输出、而不希望强制应用布局的路由。




  ### 添加布局


  Ktor HTML DSL 内置了对布局的支持。布局的基本结构是创建 `Template<HTML>` 的子类并实现所需的方法。清单 9-6 展示了一个基础但实用的模板示例。


  ```

  class AppLayout(

  val pageTitle: String? = null

  ): Template {

  val pageBody = Placeholder()

  override fun HTML.apply() {

  val pageTitlePrefix = if (pageTitle == null) {

  ""

  } else {

  "${pageTitle} - "

  }

  head {

  title {

  +"${pageTitlePrefix}KotlinBook"

  }

  styleLink("/app.css")

  }

  body {

  insert(pageBody)

  }

  }

  }

  清单 9-6

  一个基础的 Ktor HTML DSL 模板

  ```


  该模板只是一个普通的 Kotlin 类。该类有一个构造函数参数 `pageTitle`。它只是一个普通类，因此你可以根据需要设置任意数量的构造函数参数。你可以像使用普通类的普通属性一样使用
  `pageTitle`，在 `head` 块内插入页面标题。纯 Kotlin 代码将其设置为始终包含应用名称 `"KotlinBook"`，并且如果设置了 `pageTitle`，则在其前面添加前缀，从而得到
  `"My page title - KotlinBook"`。这展示了使用 `kotlinx.xhtml` DSL 的另一个好处：你不需要特殊的模板语言来为模板添加逻辑；这一切都可以用纯
  Kotlin 代码表达。


  该类还设置了一个类型为 `Placeholder<BODY>` 的 `pageBody` 属性。你可以根据需要设置任意数量的此类占位符，因为它们也只是模板类的普通属性，你可以使用它们来插入在调用模板时提供给模板的
  `kotlinx.xhtml` DSL 代码。由于它是 `BODY` 类型，因此你可以在 `body` 块内调用 `insert(pageBody)`，因为所有类型都匹配。当你使用模板时，类型系统知道该占位符只能使用
  `kotlinx.xhtml` 在 `BODY` 内允许的标签。


  ### 使用布局


  要在 Web 处理器中使用此布局，你可以使用 `call.respondHtmlTemplate`。清单 9-7 展示了如何正确调用你的模板。


  ```

  call.respondHtmlTemplate(AppLayout("Hello, world!")) {

  pageBody {

  h1 {

  +"Hello, World!"

  }

  }

  }

  清单 9-7

  在 Ktor Web 处理器中加载可重用模板

  ```


  lambda 内部的隐式 `this` 是你的模板实例。这就是为什么你可以调用 `pageBody`，因为它只是 `this.pageBody` 的快捷方式。`pageBody`
  块内的所有 `kotlinx.xhtml` DSL 代码都会被添加到 `AppLayout` 模板的相应位置，正如你在清单 9-6 中设置的那样。


  ## 为 HTML 添加 `WebResponse`


  到目前为止，你一直在直接使用 Ktor API 与 `kotlinx.xhtml` 协作。但是，当你使用 `webResponse` 和 `webResponseDb`
  辅助函数时，也需要能够编写 HTML。


  ### 实现 `HtmlWebResponse`


  `webResponse` 及其同名函数被设计为处理 `WebResponse` 抽象类的任何子类。为了能够处理 `kotlinx.xhtml`，你需要添加一个
  `WebResponse` 的新子类来保存所需的 HTML 输出，并在 `webResponse` 内部添加一个映射，以将该 HTML 输出写入你的 Ktor
  Web 处理器（以及本书后面介绍的其他 Web 框架和服务器环境）。清单 9-8 展示了第一步，即实现这个新的数据类。


  ```

  data class HtmlWebResponse(

  val body: Template,

  override val statusCode: Int = 200,

  override val headers: Map> = mapOf(),

  ) : WebResponse() {

  override fun copyResponse(

  statusCode: Int,

  headers: Map>

  ) =

  copy(body, statusCode, headers)

  }

  清单 9-8

  在 WebResponse 中实现 HTML 响应

  ```


  这里没有太多内容，因为 `WebResponse` 类的目的仅仅是保存代表响应的数据。


  下一步是在 Ktor 和 `WebResponse` 之间的映射代码中为这个新类型添加映射。你需要更新 `webResponse` 函数，并为新的 `HtmlWebResponse`
  类添加一个单独的分支。清单 9-9 展示了如何做到这一点。


  ```

  when (resp) {

  is TextWebResponse -> {

  ...

  }

  is JsonWebResponse -> {

  ...

  }

  is HtmlWebResponse -> {

  call.respondHtml(statusCode) {

  with(resp.body) { apply() }

  }

  }

  }

  清单 9-9

  在 webResponse 中实现 HtmlWebResponse 并将其映射到 Ktor

  ```


  你不需要在此映射中使用 `respondHtmlLayout`，因为你仍然可以在没有任何特殊映射的情况下使用布局，本章后面会看到这一点。


  ### 扩展函数优先级


  要使 `HtmlWebResponse` 和 Ktor 之间的映射正常工作，需要一点 Kotlin 技巧，即清单 9-9 中的代码 `with(resp.body)
  { apply() }`。


  问题在于遮蔽（shadowing），这意味着两个不同的东西具有相同的名称。`resp.body` 的类型是 `Template<HTML>`。该类声明了一个名为
  `apply` 的方法。但 Kotlin *也* 有一个名为 `apply` 的内置函数，它是作用域函数套件的一部分，与 `let`、`also` 等并列。因此，你需要确保调用的是正确的那个。


  如果你编写 `resp.body.apply()`，将会出现编译错误。这是因为 Kotlin 编译器认为你试图调用内置的作用域函数 `apply`。该作用域函数需要一个
  lambda 作为必需参数，而你没有传递，从而导致编译错误。


  `with` 是另一个内置的作用域函数，它被用来解决这个问题。`with` 接受一个对象，并以该对象作为默认接收者来调用 lambda。在具有默认接收者的块中，该接收者及其方法具有更高的优先级。因此，`with`
  块内部的 `apply` 会定位到 `Template<HTML>` 上的 `apply` 方法。


  这有点棘手，但清单 9-10 中的示例单独演示了这个优先级规则，这可能有助于你更好地理解发生了什么。


  ```

  class MyThing {

  fun String.testMe() {

  println("MyThing testMe")

  }

  }

  fun String.testMe() {

  println("Top level testMe")

  }

  "Hello!".testMe()

  // Top level testMe

  with(MyThing()) { "Hello!".testMe() }

  // MyThing testMe

  清单 9-10

  演示扩展函数优先级

  ```


  如果你想详细了解这一点，Kotlin 规范包含了 Kotlin 编译器所有行为的完整定义：[*https://kotlinlang.org/spec/kotlin-spec.xhtml*](https://kotlinlang.org/spec/kotlin-spec.xhtml)。


  ### 使用 `HtmlWebResponse` 进行响应


  要从 `webResponse` 处理器响应 HTML，你只需要在 Web 处理器中返回一个 `HtmlWebResponse` 实例。


  在 `webResponse` 中，你无法使用 `call.respondHtmlTemplate` 辅助函数，但你可以通过调用模板上的 `apply` 并在
  `apply` 块内使用你已经熟悉的模板占位符，来很好地使用布局。清单 9-11 演示了如何做到这一点。


  ```

  get("/html_webresponse_test", webResponse {

  HtmlWebResponse(AppLayout("Hello, world!").apply {

  pageBody {

  h1 {

  +"Hello, readers!"

  }

  }

  })

  })

  清单 9-11

  带有布局的 HtmlWebResponse

  ```


  不使用布局进行响应稍微复杂一些，因为 `HtmlWebResponse` 类期望一个完整的 `Template<HTML>` 实例。你可以使用 Kotlin 的*对象表达式*来动态创建类的实现，用
  `object` 关键字表示。清单 9-12 展示了如何做到这一点。


  ```

  get("/html_webresponse_test", webResponse {

  HtmlWebResponse(object : Template {

  override fun HTML.apply() {

  head {

  title { + "Plain HTML here! "}

  }

  body {

  h1 { +"Very plan header" }

  }

  }

  })

  })

  清单 9-12

  不带布局的 HtmlWebResponse

  ```


  这会创建一个仅使用一次的内联模板，实际上等同于该 Web 处理器不使用模板的情况。




  ### 关于抽象的一点说明


  在这个设置中，你可能没有注意到的一个微小但重要的细节是，`webResponse` 抽象是多么不引人注目。在本章前面，你编写了普通的 Ktor Web 处理器，使用了
  Ktor 调用 API，而没有受到 `webResponse` 辅助函数和数据类的任何干扰。通过不过度智能，并且通过显式地“选择加入”`webResponse`
  API（通过调用其上的方法），你无需寻找或发明逃生舱口来避免在某些情况下使用自己的抽象——你只需不使用它们，仅此而已。


  ## 用户安全


  为了允许用户登录，你将构建一个系统，用于通过用户名和密码对用户进行身份验证，并替换第 5 章中当前硬编码的系统，在该系统中，密码以纯文本形式存储。


  ### 密码哈希


  目前，你有一个包含 `password_hash` 列的 `user_t` 表。你还有一个 `createUser` 函数，该函数写入 `user_t` 表，并将提供的密码以纯文本形式存储（通过将其转换为
  UTF-8 编码的字节）。


  将密码存储为纯文本是非常不可取的，你之前这样做只是为了简洁，并且因为你没有将密码用于任何用途。你应该始终对密码进行单向哈希。你甚至不应该加密密码。加密意味着你也可以解密，而你永远不需要解密密码。


  如果你无法解密用户的密码，如何让他们登录？这可以通过密码哈希来解决。哈希是一种单向算法，对于相同的输入总是会产生相同的输出，但输出与提供的输入没有相关性，并且无法用于确定原始输入是什么。SHA256
  和 MD5 是哈希算法的例子。过程如下：


  *   当你创建用户时，对密码进行单向哈希，并存储该哈希值。

  *   当你想要验证用户身份时，对输入的密码进行单向哈希，并将其与数据库中的哈希值进行比较。


  这样，你绝对无法知道用户的密码是什么，但当你稍后验证密码输入时，你拥有所需的一切。


  ### 使用 Bcrypt 进行哈希


  你需要一个密码哈希算法，在本书中，你将使用 bcrypt。我在多个项目中使用过 bcrypt，它是一种广泛可用的算法，拥有适用于所有平台和语言的库。Bcrypt
  还内置了密码加盐功能，简而言之，这意味着如果两个用户拥有相同的密码，他们不会得到相同的哈希值，因为会在哈希过程中添加一个未哈希的随机数据块。


  你需要一个 bcrypt 库，我在生产环境中多次使用过的一个库是由 Patrick Favre-Bulle 编写的，名称就是“bcrypt”（[*https://github.com/patrickfav/bcrypt*](https://github.com/patrickfav/bcrypt)）。将其作为依赖项添加到你的
  *build.gradle.kts* 中：


  ```

  implementation("at.favre.lib:bcrypt:0.9.0")

  ```


  第一步是为存储和验证用户密码编写一个会失败的测试。清单 9-13 展示了该测试可能的样子。


  ```

  @Test

  fun testVerifyUserPassword() = testTx { dbSess ->

  val userId = createUser(

  dbSess,

  email = "a@b.com",

  name = "August Lilleaas",

  passwordText = "1234",

  tosAccepted = true

  )

  assertEquals(

  userId,

  authenticateUser(dbSess, "a@b.com", "1234")

  )

  assertEquals(

  null,

  authenticateUser(dbSess, "a@b.com", "incorrect")

  )

  assertEquals(

  null,

  authenticateUser(dbSess, "does@not.exist", "1234")

  )

  }

  @Test

  fun testUserPasswordSalting() = testTx { dbSess ->

  val userAId = createUser(

  dbSess,

  email = "a@b.com",

  name = "A",

  passwordText = "1234",

  tosAccepted = true

  )

  val userBId = createUser(

  dbSess,

  email = "x@b.com",

  name = "X",

  passwordText = "1234",

  tosAccepted = true

  )

  val userAHash = dbSess.single(

  queryOf("SELECT * FROM user_t WHERE id = ?", userAId),

  ::mapFromRow

  )!!["password_hash"] as ByteArray

  val userBHash = dbSess.single(

  queryOf("SELECT * FROM user_t WHERE id = ?", userBId),

  ::mapFromRow

  )!!["password_hash"] as ByteArray

  assertFalse(Arrays.equals(userAHash, userBHash))

  }

  清单 9-13

  UserTests.kt 中用于存储和验证密码的自动化测试

  ```


  第一个测试 `testVerifyUserPassword` 检查你是否可以通过提供正确的电子邮件和密码组合来获取用户的用户 ID。它还检查如果你传递了错误的密码或一个不存在的用户，`authenticateUser`
  是否会返回 `null`。


  第二个测试 `testUserPasswordSalting` 创建了两个密码相同的用户，并查询数据库以检查原始存储数据在 `password_hash` 列中是否具有不同的内容。此测试验证了两个重要事项：你已经对密码进行了哈希和加盐处理，而不是将其存储为纯文本；并且加盐设置正确，因此无法通过查看原始数据来确定两个用户是否拥有相同的密码。


  下一步是实现新的 `authenticateUser` 函数，并在 `createUser` 中实现哈希功能。清单 9-14 展示了第一步，即实现 `authenticateUser`
  并创建用于验证和哈希的 bcrypt 对象实例。


  ```

  val bcryptHasher = BCrypt.withDefaults()

  val bcryptVerifier = BCrypt.verifyer()

  fun authenticateUser(

  dbSession: Session,

  email: String,

  passwordText: String

  ): Long? {

  return dbSession.single(

  queryOf("SELECT * FROM user_t WHERE email = ?", email),

  ::mapFromRow

  )?.let {

  val pwHash = it["password_hash"] as ByteArray

  if (bcryptVerifier.verify(

  passwordText.toByteArray(Charsets.UTF_8),

  pwHash

  ).verified)

  {

  return it["id"] as Long

  } else {

  return null

  }

  }

  }

  清单 9-14

  authenticateUser 的实现

  ```


  此函数根据提供的电子邮件获取用户行。如果数据库中不存在这样的用户，则可选的链式 `let` 扩展函数会导致整个函数返回 `null`。然后，你使用 bcrypt
  库来验证数据库中存储的哈希值是否与 `passwordText` 中提供的哈希值相同。如果相同，你将获得匹配用户的 ID。如果不同，你将得到 `null`。


  你还需要更新 `createUser`，以便在将密码存储到数据库之前使用 bcrypt 对其进行哈希。将当前的 `passwordText.toByteArray(Charsets.UTF_8)`
  替换为清单 9-15 中的代码。


  ```

  bcryptHasher.hash(

  10,

  passwordText.toByteArray(Charsets.UTF_8)

  )

  清单 9-15

  使用 bcrypt 对密码字符串进行哈希的代码

  ```


  第一个参数，数字 10，是 bcrypt 中的*难度系数*。这个数字决定了执行哈希所需的计算能力。太低，密码容易被破解。太高，你的服务器将花费数秒时间以 100%
  的 CPU 容量来验证密码。我使用 10 已经很多年了，对我来说效果很好。但在确定这个数字之前，请咨询你本地的密码学和安全专家，不要仅凭我的建议。


  运行你的测试，一切应该都能通过。现在，你的用户拥有了真实且安全存储的密码！




  ### 更新你的迁移脚本


  你的 Web 应用有一个可重复执行的迁移脚本，用于插入（upsert）一个用户行，该脚本位于 *src/main/resources/db/migration/R__insert_user.sql*。这个迁移脚本写入了一个硬编码的密码文本，bcrypt
  将无法解密该密码。因此，你需要更新迁移脚本，插入一个真实的密码，以便能够对你在此迁移中创建的用户进行身份验证。


  我本可以在这里直接提供一个完整的 120 字符加密版本的密码 `1234`，你可以手动从书中复制并粘贴到你的迁移文件中。但你可能在最初几次尝试时无法完全正确地输入所有这些字符。相反，你将编写一些代码来生成该字符串，然后将其粘贴到可重复执行的迁移脚本中。


  `password_hash` 列是一个 BYTEA 类型列，因此它期望的是原始字节。要在 SQLite 中将其放入 SQL 语句，最简单的方法是使用 HEX
  编码的字符串，并用 `x''''` 进行转义。例如，`x''2e744c21''` 就是编码一个 4 字节十六进制序列的方式。清单 9-16 展示了如何为任意密码生成
  HEX 字符串，这里利用了清单 9-14 中的 `bcryptHasher`。


  ```

  hex(

  bcryptHasher.hash(

  12,

  "1234".toByteArray(Charsets.UTF_8)

  )

  )

  清单 9-16

  一个用于生成十六进制编码的 bcrypt 加密密码的工具函数

  ```


  该语句将生成一个正确格式的字符串，你可以使用 `x''<此处为十六进制字符串>''` 的格式将其复制/粘贴到可重复执行的迁移脚本中。


  ## 添加登录表单


  对于基于 HTML 的 Web 应用，常见的登录方式是使用 `<form>` 标签将用户名和密码提交到后端，后端根据是否接受凭据来设置 cookie 或显示错误。Ktor
  提供了实现此功能所需的所有工具。


  ### 配置你的 Web 应用


  你需要做好几项准备，以便你的 Web 应用能够通过登录表单对用户进行身份验证。


  首先，在你的 *build.gradle.kts* 中安装处理用户身份验证所需的两个插件：


  ```

  implementation("io.ktor:ktor-server-auth:2.1.2")

  implementation("io.ktor:ktor-server-sessions:2.1.2")

  ```


  这些插件处理会话存储，你的 Web 应用通过会话存储来访问当前登录用户的信息，并能够将 Web 应用中的路由进行隔离，使其仅对登录用户可访问。


  接下来，你需要更新配置文件。你将添加三个不同的属性：`useSecureCookie`（`Boolean` 类型）将切换你的会话 cookie 是否仅能通过 HTTPS
  工作。`cookieEncryptionKey` 和 `cookieSigningKey`（`String` 类型）将设置会话 cookie 使其被加密，从而阻止黑客伪造虚假
  cookie。清单 9-17 展示了你需要添加到配置文件中的内容。


  ```

  // app.conf

  useSecureCookie = true

  cookieEncryptionKey = ""

  cookieSigningKey = ""

  // app-local.conf

  useSecureCookie = false

  cookieEncryptionKey = ""

  cookieSigningKey = ""

  清单 9-17

  新配置属性在各个配置文件中的默认值

  ```


  同时，记得将这些属性添加到你的 `WebappConfig` 数据类中，方法是在数据类本身中添加与配置文件中属性同名的属性，并更新 `createAppConfig`
  以加载这些值。


  默认情况下，你的 Web 应用设置为使用安全 cookie，这意味着 cookie 只能通过 HTTPS 访问，而不能通过 HTTP。但是，你的本地开发环境是通过
  HTTP 运行应用的，因此你需要在此处禁用安全 cookie。


  你需要为 `cookieEncryptionKey` 和 `cookieSigningKey` 提供实际的随机密钥。要生成这些密钥，你可以使用以下工具函数：


  ```

  fun getRandomBytesHex(length: Int) =

  ByteArray(length)

  .also { SecureRandom().nextBytes(it) }

  .let(::hex)

  ```


  你可以通过临时在 `main()` 函数中添加对该函数的调用来调用它，并将输出打印或记录到控制台。使用 `getRandomBytes(16)` 运行此函数以生成
  `cookieEncryptionKey`，使用 `getRandomBytes(32)` 运行以生成 `cookieSigningKey`。将这些调用的输出粘贴到
  *app-local.conf* 中。


  这些值在每次重启 Web 应用时保持一致非常重要，这就是为什么它们被存储在配置文件中。如果这些密钥发生变化，所有当前已登录且浏览器中存有 cookie 的用户都必须重新登录，因为你的
  Web 应用将无法使用更改后的密钥来解密和验证 cookie。


  就像你的数据库密码一样，你应该将生产环境中使用的实际值保密，并且不要将其检入版本控制系统。因此，在生产环境中，你的配置文件被设置为从环境变量加载这些值。


  ### 不同类型的会话


  会话是存储当前登录用户信息的地方。访问这些信息对于使 Web 应用身份验证正常工作至关重要。你将使用会话作为数据库查询的参数，以检查传入请求是否首先附带了已登录用户，等等。


  会话存储主要有两种选择：基于 cookie 的存储和服务器端存储。


  从技术上讲，你总是会使用 cookie。当用户登录时，你将设置一个 cookie，用于验证用户是否确实已登录。该 cookie 将包含已登录用户的 ID。你还会对
  cookie 进行加密签名，这样攻击者就无法通过将其内容设置为任意值来伪造它。


  你可以使用此 cookie 来存储关于当前登录用户所需的其他状态。但是，所有浏览器都强制规定 cookie 的大小有严格限制，即 4 KB。如果你尝试设置超过此限制的
  cookie，浏览器将忽略它，从而导致错误和意外行为。


  为了解决这个问题，你可以设置服务器端会话存储。有许多可用的会话存储类型。你应该始终避免将其存储在 RAM 中，因为一旦你同时运行多个服务器，这就会失效。


  你可以将会话数据存储在分布式缓存或数据库中。但是，我工作过的所有生产级 Web 应用都使用了基于 cookie 的会话存储，完全没有使用服务器端会话存储。如果你需要在某处存储关于当前登录用户的额外信息，我建议使用
  Web 应用中已有的用于缓存任意值的任何机制来存储，或者如果你没有缓存，则设置一个缓存。没有必要专门为存储登录用户信息而设置一个特定的缓存。例如，如果你设置了像
  Memcached ([*https://memcached.org/*](https://memcached.org/)) 或 Redis ([*https://redis.io/*](https://redis.io/))
  这样的分布式缓存，你可以将当前会话的信息存储在那里，并像检索任何其他缓存信息一样检索它。




