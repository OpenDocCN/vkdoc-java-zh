  ## 编写 Web 应用测试


  在编写 Web 应用的上下文中，验证 1 确实等于 1 的价值有限。你现在将编写一些测试，以确保你的 Web 应用能正常工作。


  ### 设置基础环境


  自动化测试的目标是使用特定的给定参数和特定的给定上下文调用你的业务逻辑，并断言你的系统最终处于期望的状态。要使你的大部分业务逻辑正常工作，你需要两样东西：一个
  `WebappConfig` 对象和一个数据库连接池。


  让你的配置和数据库连接池对测试可用的最简单方法是将它们声明为顶级变量。在 Kotlin 中，你可以将 `val` 语句放在类外部和函数实现之外，即顶层。这些值将对文件中所有上下文的所有函数可用，甚至对其他文件也可用，除非你明确将它们标记为
  `private`。清单 7-4 展示了如何以这种方式创建配置对象和数据库连接池。


  ```

  val testAppConfig = createAppConfig("test")

  val testDataSource = createAndMigrateDataSource(testAppConfig)

  清单 7-4

  用于自动化测试的配置和数据库连接池的顶层声明

  ```


  由于你已经有了用于创建配置和连接池新实例的函数，因此在为测试创建它们时无需做任何特殊处理。只需调用它们，就能得到你需要的东西。


  在运行此代码之前，你需要添加一个缺失的配置文件。当你使用 `"test"` 参数调用 `createAppConfig` 时，它会期望找到文件 *src/main/resources/app-test.conf*，并使用它来加载配置值。清单
  7-5 展示了此文件应包含的内容，以便你的测试能正确运行。


  ```

  dbUser = ""

  dbPassword = ""

  dbUrl = "jdbc:h2:mem:kotlinbook;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

  清单 7-5

  文件 src/main/resources/app-test.conf 的内容

  ```


  请注意，使用 PostgreSQL 模式的目的不是为了完美地模拟 PostgreSQL。H2 无法做到这一点，你也不能期望你的 H2 SQL 语句能在 PostgreSQL
  中完美运行。设置 PostgreSQL 模式的目的是一次性设置一组属性，使 H2 比默认的普通模式更方便使用。


  此配置文件包含与 `app-local.conf` 相同的内容，后者是数据库配置，用于将你的数据源设置为使用内存中的 H2 数据库。在真实的 Web 应用中，你很可能需要针对真实数据库运行，因此能够将本地开发数据库的配置与自动化测试将使用的数据库配置分开是很有用的。




  ### 编写一个会失败的测试


  你的第一个测试用例将测试一个用于创建用户的函数。这个测试会尽可能简单：它会创建一个用户，并检查我们是否成功获取了新创建用户的 ID。


  第一步是编写一个会失败的测试。为了避免因缺少函数而导致编译失败，你需要先创建一个空实现。稍后，你将回到这个函数并完成它的实现。清单 7-6 展示了函数签名和空实现。


  ```

  fun createUser(

  dbSession: Session,

  email: String,

  name: String,

  passwordText: String,

  tosAccepted: Boolean = false

  ): Long {

  return -1

  }

  清单 7-6

  创建用户的新函数的空实现

  ```


  有了这个空实现，你现在可以编写一个测试用例了。你可以编写一个测试来创建用户，并使用 `assertNotNull` 来检查是否返回了一个有效的用户 ID 而非
  null。但类型系统已经验证了这一点，因为返回类型是 `Long`，而不是 `Long?`。相反，一个更有用的测试可以是创建两个不同的用户，并检查它们是否获得了不同的
  ID。清单 7-7 展示了这个测试用例的样子。


  ```

  @Test

  fun testCreateUser() {

  sessionOf(

  testDataSource,

  returnGeneratedKey = true)

  .use { dbSess ->

  val userAId = createUser(dbSess,

  email = "augustlilleaas@me.com",

  name = "August Lilleaas",

  passwordText = "1234"

  )

  val userBId = createUser(dbSess,

  email = "august@augustl.com",

  name = "August Lilleaas",

  passwordText = "1234"

  )

  assertNotEquals(userAId, userBId)

  }

  }

  清单 7-7

  位于 src/test/kotlinbook/UserTest.kt 中的测试用例，用于检查 createUser 是否正常工作并返回不同的用户 ID

