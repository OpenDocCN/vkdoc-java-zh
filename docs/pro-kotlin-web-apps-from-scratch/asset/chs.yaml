  }

  }

  清单 4-10

  webResponse 的初始空骨架

  ```


  如前所述，类型 `ApplicationCall(). -> Unit` 是一种简化。你需要从 `webResponse` 返回的实际类型是 `PipelineInterceptor<Unit,
  ApplicationCall>`，它是类型 `suspend PipelineContext< Unit, ApplicationCall >.( Unit)
  -> Unit` 的别名。你的 `handler` lambda 的类型几乎相同，只是它返回一个 `WebResponse` 实例而不是空值（`Unit`）。`webResponse`
  的目标是调用 `handler`，使用 `handler` 返回的 `WebResponse` 实例，并最终将其映射到 Ktor。


  提示


  关键字 `suspend` 将在第 8 章中详细解释。目前，你只需要知道它是 Kotlin 处理程序类型的一部分，并且与协程相关。Ktor 中 `ApplicationCall`
  上的某些 API 需要 `suspend` 关键字才能正常工作。


  `webResponse` 返回一个 lambda。你不需要为 lambda 本身添加类型注解，因为 Kotlin 拥有从你返回 lambda 以及你为 `webResponse`
  定义了返回类型这一事实中推断类型所需的一切信息。Kotlin 会自动将其转换为匹配 `PipelineInterceptor<Unit, ApplicationCall>`
  的 lambda。


  ### 映射头部


  `webResponse` 返回的 lambda 应包含 Ktor 和 `WebResponse` 类之间的所有映射代码。所有 `WebResponse` 实例都有一个头部映射，因此这是一个很好的起点。


  你可以在清单 4-11 中找到 `webResponse` 的更新版本，它从 `WebResponse` 实例读取头部并将其映射到 Ktor。


  ```

  fun webResponse(

  handler: suspend PipelineContext.(

  ) -> WebResponse

  ): PipelineInterceptor {

  return {

  val resp = this.handler()

  for ((name, values) in resp.headers())

  for (value in values)

  call.response.header(name, value)

  }

  }

  清单 4-11

  将 WebResponse 头部映射到 Ktor

  ```


  你通过调用 `handler()` lambda 来获取 `WebResponse` 实例。映射代码不关心你创建该 `WebResponse` 的内容和细节。它只关心将任意的
  `WebResponse` 实例映射到 Ktor。


  你将 `handler` 作为扩展函数调用。`this` 的类型与 `handler` 的接收者类型匹配，这就是为什么你可以像调用 `handler` 是 `this`
  所代表对象上的方法一样调用 `this.handler()`。


  `headers()` 函数返回一个映射，其中键是头部名称，值是该头部名称的头部值列表。因此，你只需要遍历它们，并为每个头部值调用 `call.response.header`。


  请记住：你从 `webResponse` 返回的 lambda 具有（简化的）签名 `ApplicationCall.() -> Unit`。这就是使 `call`
  对其可用的原因。


  ### 映射 TextWebResponse 和状态码


  下一步是映射各个响应类型，以便你做一些比仅设置头部更有用的事情，并使用 `WebResponse` 实例中的所有数据，将它们传递给 Ktor。


  清单 4-12 展示了 `webResponse` 的更新版本，它检查 `WebResponse` 实例的类型并处理 `TextWebResponse`。


  ```

  fun webResponse(

  handler: suspend PipelineContext.(

  ) -> WebResponse

  ): PipelineInterceptor {

  return {

  val resp = this.handler()

  for ((name, values) in resp.headers())

  for (value in values)

  call.response.header(name, value)

  val statusCode = HttpStatusCode.fromValue(

  resp.statusCode

  )

  when (resp) {

  is TextWebResponse -> {

  call.respondText(

  text = resp.body,

  status = statusCode

  )

  }

  }

  }

  }

  清单 4-12

  将 TextWebResponse 和 JsonWebResponse 映射到 Ktor

  ```


  `WebResponse` 有一个定义为 `Int` 的 `statusCode` 字段。Ktor 需要一个 `HttpStatusCode` 实例。幸运的是，Ktor
  提供了 `HttpStatusCode.fromValue` 函数来将有效的 `Int` 转换为 `HttpStatusCode`。


  你可以使用 `when` 语句将 `WebResponse` 的各个类型映射到 Ktor。`when` 类似于其他语言中的 `switch`，其中每个语句定义了你希望如何处理各种情况。目前，你只有
  `TextWebResponse`，但稍后你会添加更多类型，因此你可以立即使用 `when` 语句。




  ### 映射 JsonWebResponse


  与映射 `TextWebResponse` 相比，映射 `JsonWebResponse` 需要额外几个步骤。你需要添加一个第三方 JSON 序列化器（一种接收数据并写入
  JSON 字符串的工具），并且需要实现 Ktor 接口 `OutgoingContent`，以便将包含 JSON 的字符串映射到 Ktor。


  有许多可用的 JSON 序列化器。本书将使用 Gson，这是 Google 开发的一个 Java 库。Gson 是目前最快的 JSON 库之一（[`www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/`](http://www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/)）。它也很容易以面向数据的方式使用，因此你无需创建映射类和注解即可使用它，而
  Java 平台上的其他一些 JSON 库则需要这些。它适用于使用普通列表和映射来序列化数据，以及在后续章节中解析 JSON。


  通过将以下内容添加到 *build.gradle.kts* 的 `dependencies` 块中，将 Gson 添加为依赖项：


  ```

  implementation("com.google.code.gson:gson:2.10")

  ```


  接下来，你需要一个 `OutgoingContent` 实现，如清单 4-13 所示，它从 `JsonWebResponse` 获取你的 JSON 内容并将其映射到
  Ktor。


  ```

  import com.google.gson.Gson

  class KtorJsonWebResponse (

  val body: Any?,

  override val status: HttpStatusCode = HttpStatusCode.OK

  ) : OutgoingContent.ByteArrayContent() {

  override val contentType: ContentType =

  ContentType.Application.Json.withCharset(Charsets.UTF_8)

  override fun bytes() = Gson().toJson(body).toByteArray(

  Charsets.UTF_8

  )

  }

  清单 4-13

  在 Ktor 中用于 JSON 序列化的 OutgoingContent 实现

  ```


  这个新类 `KtorJsonWebResponse` 接收 `body` 中的 JSON 数据和 `status` 中的可选状态码，并通过覆盖 `OutgoingContent`
  中的关键函数将它们全部映射到 Ktor。如果你愿意，可以通过增强它来传入你自己的 `ContentType` 实例，从而使其更加灵活，让你可以选择其他内容类型和字符集。但在大多数情况下，将其硬编码为默认的
  `application/json` 和硬编码的编码（此处为 UTF-8）就足够了。


  最后，你需要在 `webResponse` 的实现中使用 `KtorJsonWebResponse` 的实例，目前你只处理了 `TextWebResponse`。清单
  4-14 显示了来自 `webResponse` 的更新后的 when 语句，其中你同时处理了 `JsonWebResponse` 和 `TextWebResponse`。


  ```

  when (resp) {

  is TextWebResponse -> {

  call.respondText(

  text = resp.body,

  status = statusCode

  )

  }

  is JsonWebResponse -> {

  call.respond(KtorJsonWebResponse (

  body = resp.body,

  status = statusCode

  ))

  }

  }

  清单 4-14

  在 webResponse 的 when 语句中同时处理 TextWebResponse 和 JsonWebResponse

  ```


  映射的核心部分位于 `KtorJsonWebResponse` 内部，因此你只需在 when 语句中为 `JsonWebResponse` 添加一个分支，并将
  `KtorJsonWebResponse` 的实例传递给 `call.respond`。


  ### 使用新的映射


  现在，你已经将 `WebResponse` 完全映射到了 Ktor，并且可以在你的处理器中开始使用它。


  目前，你只有一个路由：对 / 的 GET 请求返回一个纯文本响应，内容为“Hello, World!”。此路由直接使用了 Ktor API。你可以将其更改为使用
  `WebResponse`。清单 4-15 展示了如何执行此操作，同时也展示了如何在此过程中添加一些额外的路由。


  ```

  get("/", webResponse {

  TextWebResponse("Hello, world!")

  })

  get("/param_test", webResponse {

  TextWebResponse(

  "The param is: ${call.request.queryParameters["foo"]}"

  )

  })

  get("/json_test", webResponse {

  JsonWebResponse(mapOf("foo" to "bar"))

  })

  get("/json_test_with_header", webResponse {

  JsonWebResponse(mapOf("foo" to "bar"))

  .header("X-Test-Header", "Just a test!")

  })

  清单 4-15

  在 Ktor 应用程序的路由块内，使用 WebResponse 向 Ktor 添加路由

  ```


  启动你的应用程序，尝试打开所有新路径，看看会发生什么！


  ## 关于过度设计的说明


  在这个独立的 HTTP 响应表示中，处理了各种边缘情况。你真的需要所有这些额外的代码吗？


  我从未在实际的 Web 应用程序中做过类似的事情。这是因为我从没编写过既能在 Ktor 上运行又能在无服务器环境中运行的 Web 应用程序。我确实做过从一种 Web
  框架切换到另一种的重写工作。但你不需要为了能够进行重写而预先抽象化你的 Web 框架——你可以像进行任何其他重写一样直接进行重写。我不喜欢仅仅为了简化项目中可能发生的重写而使用抽象。


  在本书的上下文中，这种抽象是有意义的，因为我稍后想向你展示如何轻松地用 Jersey 和其他框架替换 Ktor，以及如何在无服务器环境中运行你的处理器。当你在业务逻辑和
  Web 路由库之间拥有 `WebResponse` 时，这几乎是微不足道的。


  此外，`WebResponse` 并不那么复杂。而且我个人更喜欢我的 Web 处理器采用函数式风格，而 `WebResponse` 正是这种风格。所以我认为这种权衡是值得的。下次我从头开始创建
  Kotlin Web 应用程序时，我可能会在代码库中引入类似 `WebResponse` 的东西，仅仅因为我喜欢它的函数式风格。


  但是，正是这种对你可能使用或不使用的各种用例的处理，才使得框架变得如此庞大和复杂。`WebResponse` 只是这个问题的一个微小示例。一个框架需要处理成千上万个这样的案例，并提供
  API 和接口来支持所有这些案例的任意组合。因此，框架必然包含大量你永远不需要的抽象和代码，而这反过来又使得框架在你的系统中难以作为一个整体来理解。如果你使用的框架出现问题，你必须深入挖掘包含数十万行代码和多层抽象的“框架之山”，这至少可以说是一项艰巨的任务。


  当然，这也是框架的价值所在。当你需要做某事时，框架中已经有一个可用的解决方案。并且拥有标准化的做事方式，使得在不同的代码库上工作更加容易，因为它们都遵循框架约定，以相同的方式做事。


  所有抽象都有成本。我认为 `WebResponse` 是值得的。但要小心。不要仅仅为了抽象化一个库而去抽象化它。


  '
- '# 第二部分 库与解决方案


  '
- '# 5. 连接和迁移 SQL 数据库


  你的 Web 应用程序需要一个地方来存储和读取数据。迄今为止，最常见的地方是 SQL 数据库。本章将介绍使用连接池连接到数据库所需的所有配置，如何设置初始模式，以及如何随着需求的必然变化来维护数据库模式的变更。


  如果你是 Kotlin 新手，以下是本章中你会看到的示例所涉及的一些语言特性：


  *   使用 `use` 关闭和清理资源


  *   `AutoCloseable` 和 `Closeable` 对象


  *   使用 `also` 避免中间变量


  *   使用函数引用将函数用作 lambda


  此外，在本章中，你将学习以下关于迁移和查询 SQL 数据库的内容：


  *   使用 Flyway 管理初始模式以及随时间变化的模式变更


  *   使用 JDBC 连接池连接到 SQL 数据库


  *   生成种子数据以使用所需数据预填充数据库


  在第 6 章中，你将学习更多关于对数据库执行查询的知识。




  ## 连接到 SQL 数据库


  除非你连接到 SQL 数据库，否则你无法对它进行任何操作。当然也有一些例外，比如 AWS Aurora Serverless 这类托管云数据库。但那是例外，而非普遍情况。因此，第一步是弄清楚如何管理数据库的连接。


  ### 连接池


  从 Web 应用连接到 SQL 数据库的第一步是设置一个连接池。你的 Web 应用很可能需要处理数十、数百甚至数千个并发请求。连接池是一种管理多个并发连接的工具。PostgreSQL
  是目前最流行且可扩展性最强的 SQL 数据库之一，但开箱即用时，PostgreSQL 最多支持 100 个并发连接。


  手动创建连接是可行的。例如，你可以只创建一个连接，然后让 Web 应用的所有操作都使用这个连接。但一个连接无法同时处理多个事务。因此，你应该从一开始就让 Web
  应用创建多个并发数据库连接。


  相反，你应该使用连接池。设置连接池时，你需要提供连接数据库的凭证。在你的 Web 应用中，当你想执行数据库查询时，你向连接池请求一个连接。如果池中有可用连接，你会立即获得。如果池中所有连接都处于忙碌状态，它会创建一个新连接。如果连接池已达到允许的最大并发连接数，连接池会等待，直到当前并发连接数低于最大值，然后才会给你一个连接。


  你还可以通过连接池优化性能。这里我不打算深入探讨扩展 SQL 数据库的诸多复杂细节。但基准测试和实际经验表明，在某些情况下，如果你将允许的最大并发连接数限制为数据库支持最大值的一半左右，数据库的性能反而会更好。


  此外，在部署场景中，如果你运行着 Web 应用的多个实例，你可以告诉连接池最多只创建 25 个连接。这样，你可以同时运行四个 Web 应用实例，而你的数据库在所有运行实例中的并发连接总数不会超过
  100 个。


  除了对你自己的代码有用之外，你经常会遇到一些第三方库，它们期望接收一个连接池而不是直接连接。从一开始就使用连接池，能让你的代码为这种情况做好准备。


  ### 安装数据库驱动


  要连接数据库，你需要一个针对你所连接数据库的数据库驱动。有很多 SQL 数据库可供选择，比如 PostgreSQL、MariaDB、Oracle DB 等等。为了方便起见，本书将使用
  H2，这是一个用于 Java 平台的嵌入式 SQL 数据库。H2 是一个功能完备的 SQL 数据库，并且由于它是嵌入式的，你无需额外花时间安装和配置它。


  提示


  如果你愿意，也可以使用 H2 以外的其他数据库。请确保同时修改 SQL 以匹配你的数据库。本书中的大部分 SQL 都很直接，应该能在 H2 之外的环境中使用，但像
  `CREATE TABLE` 语句和数据类型这类内容，在不同的 SQL 数据库之间通常是不同的。


  你还需要一个用于创建连接池的库，我们将要使用的是 HikariCP。它是一个通用库，实现了用于连接池的 JDBC `DataSource` 接口，是一个久经考验的生产级库，我在
  Clojure、Groovy 和 Kotlin 的许多实际项目中都使用过它。


  要安装 H2 和 HikariCP，请将它们作为依赖项添加到 *build.gradle.kts* 的 dependencies 块中：


  ```

  implementation("com.zaxxer:HikariCP:5.0.1")

  implementation("com.h2database:h2:2.1.214")

  ```


  H2 依赖项包含了数据库驱动，以及 H2 数据库的实际实现。通常，数据库驱动只包含连接外部数据库所必需的内容。但 H2 是一个嵌入式数据库，因此它将驱动和服务器都包含在一个便捷的包中。


  ### 设置 H2


  当你连接任何数据库时，你都会给连接池一个它要连接的 URL。H2 是一个嵌入式数据库，因此连接 URL 也是你配置 H2 及其运行方式的地方。


  H2 有两种主要的运行模式：内存模式和文件系统持久化模式。内存模式意味着当你重启 Web 应用时，H2 会完全清除数据库。要让 H2 使用内存模式，你可以使用
  URL `jdbc:h2:mem:mydbname` 进行设置。


  不过，本书将使用文件系统模式。虽然内存模式很方便，但我们的目标是学习如何使用像 PostgreSQL 和 MariaDB 这样的数据库来设置真实的 Web 应用，这些数据库的数据在重启后仍然存在。文件系统模式使
  H2 的行为更接近这些数据库。要让 H2 使用文件系统模式，你可以使用 URL `jdbc:h2:path/to/file` 进行设置。


  在文件系统中放置 H2 数据库的一个好位置是 `./build/local`。这会将数据库文件放在 `build` 文件夹中，而 Gradle 已经使用该目录来存储其构建输出。如果你运行
  Gradle 的 `clean` 任务，它会清除整个 `build` 目录，包括你的数据库。如果你想确保 Gradle 永远不会触及你的数据库，请将其放在其他地方。但无论如何，你都不应该在本地开发数据库中存储重要数据。


  你还需要在连接 URL 中设置两个标志：`MODE=PostgreSQL` 和 `DATABASE_TO_LOWER=TRUE`。设置这两个标志可以使 H2 更易于使用，并且让
  H2 不关心你使用大写还是小写来拼写表名和列名等。




  ### 更新 WebappConfig


  从第 3 章开始，你已经建立了一个用于存储 Web 应用配置的系统，而配置文件正是存储数据库连接凭证的理想位置。


  你还需要设置配置文件，使其包含连接池用于连接数据库的凭证。H2 不需要用户名和密码。但为了模拟真实 Web 应用中的做法，你仍会为其配置完整的凭证。


  首先，将所需的属性添加到配置文件中。位于 *src/main/resources/app.conf* 的主配置文件应包含系统中所有配置属性的默认值或空值。代码清单
  5-1 展示了需要添加的属性。


  ```

  httpPort = 4207

  dbUser = null

  dbPassword = null

  dbUrl = null

  代码清单 5-1

  在 src/main/resources/app.conf 中添加默认空值

  ```


  你还需要在本地开发环境中指定将要使用的值，这需要在配置文件 *src/main/resources/app-local.conf* 中完成。H2 接受数据库用户名和密码为空字符串。如代码清单
  5-2 所示，你只需设置数据库 URL，让 HikariCP 知道它应该使用 H2。


  ```

  dbUser = ""

  dbPassword = ""

  dbUrl = "jdbc:h2:./build/local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

  代码清单 5-2

  在 src/main/resources/app-local.conf 中配置本地开发环境以使用 H2

  ```


  最后，你需要更新配置数据类，以提取并存储数据库连接值。代码清单 5-3 展示了如何将所需属性添加到数据类，并从配置文件中提取它们。


  ```

  data class WebappConfig(

  val httpPort: Int,

  val dbUser: String,

  val dbPassword: String,

  val dbUrl: String

  )

  // 读取配置文件时的实例化

  WebappConfig(

  httpPort = it.getInt("httpPort"),

  dbUser = it.getString("dbUser"),

  dbPassword = it.getString("dbPassword"),

  dbUrl = it.getString("dbUrl")

  )

  代码清单 5-3

  从配置文件中提取数据库配置并存储在配置数据类中

  ```


  这样，你就拥有了一个填充了连接所需数据库连接凭证的 `WebappConfig`。


  ### 设置连接池


  要创建连接，你需要使用数据库凭证设置一个 HikariCP 连接池，然后从该连接池中获取一个连接。


  提示


  *数据源*和*连接池*这两个术语指的是同一事物。Java 平台将使用连接池的 API 命名为 `javax.sql.DataSource`。任何时候，当你看到需要数据源才能工作的
  API 时，都可以将你的 HikariCP 连接池传递给它。


  在本书的后续部分，你将在多个地方使用连接池，因此你将创建一个用于设置连接池的函数。代码清单 5-4 展示了如何调用 HikariCP 并传递 `WebappConfig`
  中的相关细节。


  ```

  fun createDataSource(config: WebappConfig) =

  HikariDataSource().apply {

  jdbcUrl = config.dbUrl

  username = config.dbUser

  password = config.dbPassword

  }

  代码清单 5-4

  设置 HikariCP 连接池

  ```


  ### 创建连接


  为了测试一切是否正常工作，在你的 Web 应用初始化时创建一个连接池，并尝试运行一个查询。代码清单 5-5 展示了如何使用 JDBC API 执行一个简单的测试查询。


  ```

  val dataSource = createDataSource(config)

  dataSource.getConnection().use { conn ->

  conn.createStatement().use { stmt ->

  stmt.executeQuery("SELECT 1")

  }

  }

  代码清单 5-5

  用于测试数据库连接是否正常的查询

  ```


  `SELECT 1` 是一个很好的测试查询，用于检查一切是否正常运行。它适用于没有任何表的空数据库。如果 `executeQuery` 运行且未抛出任何异常，则意味着
  HikariCP 能够创建连接，并且查询在 H2 数据库引擎内成功执行。


  `getConnection()` 是连接池上的 API，用于获取一个可用于执行查询的连接。`createStatement()` 是连接上的函数，用于创建 JDBC
  查询语句。最后，`executeQuery()` 是用于对数据库执行任意 SQL 查询的函数。


  数据库连接实现了 `java.lang.AutoCloseable` 接口。`AutoCloseable` 及其同类 `Closeable` 代表了 Java
  平台上持有外部资源并拥有 `close()` 方法的对象。该对象可能会永久持有外部资源，直到你调用 `close()`，因此务必记得在所有可关闭对象上调用该方法。对于原始数据库连接，调用
  `close()` 会断开连接。对于连接池提供的连接，调用 `close()` 仅意味着你不再在代码中使用该连接，并将其释放回连接池。连接池是否关闭实际的数据库连接，取决于连接池的实现。


  `use()` 是 `java.lang.AutoCloseable` 上的一个作用域函数，它会在 lambda 执行完毕后自动调用对象的 `close()`
  方法。你可以手动调用连接的 `close()` 方法，但使用 `use()` 还有一个额外的好处，即它将整个操作包装在 try/catch 块中，这样即使由于代码抛出异常导致控制流中断，你也能关闭连接。


  ## 初始模式


  要对 SQL 数据库进行任何有用的操作，你需要设置并维护一个数据库模式。


  你*可以*直接使用 SQL 控制台手动运行 `CREATE TABLE` 语句。但这很快就会退化为冲突不断且缺乏可追溯性的混乱局面。相反，你应该从一开始就设置一个模式迁移库。


  当你使用模式迁移库时，你会将所有对 SQL 数据库的更改作为文件存储起来，并纳入版本控制。模式迁移库会自动运行你添加的新迁移文件，这样你就永远不会忘记运行重要的
  SQL 迁移，从而避免数据库和代码处于不一致的状态。


  ### 安装 Flyway


  你将用于管理数据库模式迁移的库是 Flyway（[`https://flywaydb.org/`](https://flywaydb.org/)）。Flyway
  是一个行业标准库，被世界各地的 JVM 开发者广泛使用。在过去十年左右的实际项目中，我一直都在使用它。就像 HikariCP 一样，我不仅在 Kotlin 中使用它，也在
  Gradle 和 Clojure 中使用它。


  还有其他可用的库，例如 Liquibase（[`www.liquibase.org/`](http://www.liquibase.org/)）。我在实际项目中也使用过
  Liquibase，它是一个稳定可靠的库。我偏爱 Flyway 的原因是，你可以使用纯 SQL 文件进行迁移，无需任何样板代码和 XML 配置文件。我不喜欢那些试图封装
  SQL 以使其与数据库无关的 DSL；我更喜欢编写特定于我的 Web 应用所使用的数据库引擎的 SQL。我还喜欢 Flyway 基于简单文件命名约定支持版本化和可重复迁移的方式，而无需设置配置标志和编写
  XML。


  要安装 Flyway，将其作为依赖项添加到 *build.gradle.kts* 的 `dependencies` 块中：


  ```

  implementation("org.flywaydb:flyway-core:9.5.1")

  ```




  ### 在启动时运行 Flyway


  运行 Flyway 迁移的理想时机是在应用程序启动时。这是因为你的数据库模式（Schema）和代码是紧密耦合的。你的代码会引用迁移脚本所添加的表和列，因此，你需要确保在
  Flyway 完成模式迁移并添加新字段和新表之后，你的代码才开始执行。


  就像 `createDataSource()` 一样，你需要在本书后续章节中运行 Flyway。因此，你将创建两个独立的函数来运行它。清单 5-6 展示了如何创建这些函数。


  ```

  fun migrateDataSource(dataSource: DataSource) {

  Flyway.configure()

  .dataSource(dataSource)

  .locations("db/migration")

  .table("flyway_schema_history")

  .load()

  .migrate()

  }

  fun createAndMigrateDataSource(config: WebappConfig) =

  createDataSource(config).also(::migrateDataSource)

  清单 5-6

  用于创建已迁移数据源以及运行实际迁移的函数

  ```


  在你的 `main()` 函数中尽早调用此函数，最好是在创建 `WebappConfig` 之后立即调用。如果你已经调用了 `createDataSource`，请将其替换为
  `createAndMigrateDataSource`。


  使用 Flyway 时，你需要向其传递数据源、数据库迁移文件的位置，以及 Flyway 存储自身元数据的表名。Flyway 使用元数据表来跟踪其内部状态。你将在本章后面部分了解更多关于该状态的信息。


  提示


  你可以省略清单 5-6 中的 `locations` 和 `table` 方法调用，因为它们会被设置为默认值。我在清单中包含它们，是因为它们是理解 Flyway
  运作方式所需了解的重要属性。


  `also` 函数是另一个作用域函数，类似于 `let`、`use` 和 `apply`。清单 5-6 中 `createAndMigrateDataSource()`
  的目标是创建数据源、运行迁移，然后最终返回新创建的数据源。这正是 `also` 所做的。`also` 首先运行 lambda 表达式，并将你调用 `also`
  的对象（此处为 `dataSource`）传递给该 lambda。当 lambda 执行完毕后，`also` 返回你最初调用它的那个对象。这省去了你创建中间变量的步骤，并让你能够将整个操作写成一个单独的语句。


  语法 `::migrateDataSource` 被称为*函数引用*。你也可以写成 `.also { migrateDataSource(it) }`，这会将
  `migrateDataSource` 函数包装在一个 lambda 中。但你可以跳过这个额外步骤，直接传入函数。Kotlin 不关心你是将 lambda 还是函数引用传递给一个函数类型的参数，并且具有相同参数和返回类型的函数引用与
  lambda 在逻辑上是等价的。


  ### 创建初始模式


  现在，当你启动 Web 应用时，Flyway 就会执行。但你还没有添加任何迁移脚本，因此 Flyway 会在警告级别记录日志 *未找到迁移。你的位置设置正确吗？*。


  要创建初始模式，你需要将第一个迁移脚本添加到 Flyway。在 Flyway 中，将数据库初始化为基本模式并非特殊操作。初始模式只是你系统中的第一个（也是目前唯一的）迁移。


  Flyway 迁移文件是编号的。Flyway 按升序运行迁移，从编号最低到最高。你可以自行决定使用递增序列、时间戳或其他方式作为编号。


  Flyway 还有一个迁移文件应遵循的命名约定。格式为 *V{编号}__{我的文件名}.sql*。即大写字母 V、迁移版本号、两个下划线、迁移名称以及 *.sql*
  后缀。


  在本书中，我将使用递增的数字。这意味着你应该将初始迁移文件放在 *src/main/resources/db/migration/V1__initial.sql*
  中。清单 5-7 展示了你将在此文件中放入的内容。


  ```

  CREATE TABLE user_t (

  id BIGSERIAL PRIMARY KEY,

  created_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

  updated_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

  email VARCHAR(255) NOT NULL UNIQUE,

  password_hash BYTEA NOT NULL

  );

  清单 5-7

  位于 src/main/resources/db/migration/V1__initial.sql 中的初始模式设置内容

  ```


  如果你运行 Web 应用，你将看到 Flyway 输出的日志，内容为 *正在将模式“PUBLIC”迁移到版本“1 - initial”*。这意味着 Flyway
  已成功运行该 SQL 文件，并将该迁移注册为已成功完成。如果你重新运行 Web 应用，Flyway 现在将记录日志 *模式“PUBLIC”的当前版本：1* 和
  *模式“PUBLIC”已是最新。无需迁移*，这表明你创建的迁移文件已成功运行，并且 Flyway 未向数据库写入任何更改。


  ## 管理模式变更


  随着你的 Web 应用不断发展，你将向数据库添加更多的表和列。并且随着需求的变化以及你对 Web 应用及其细节的了解加深，你将希望对数据库模式进行更改。Flyway
  拥有实现这一切所需的一切功能。


  ### 运行后请勿编辑迁移


  当你希望对数据库模式进行额外更改时，不能编辑已经运行过的迁移。如果你尝试这样做，Flyway 将抛出一个错误：


  ```

  Exception in thread "main" org.flywaydb.core.api.exception.FlywayValidateException:
  Validate failed: Migrations have failed validation

  Migration checksum mismatch for migration version 1

  -> Applied to database : 299127514

  -> Resolved locally    : -1989839469

  Either revert the changes to the migration, or run repair to update the schema history.

  ```


  Flyway 将对已运行迁移文件的更改视为严重错误。这就是它抛出异常而不是仅仅在日志中通知的原因。你不应该捕获此异常；最好保持原样，这样当你的迁移文件处于无效状态时，你的
  `main()` 函数会抛出异常并阻止 Web 应用启动。


  Flyway 会跟踪哪些迁移已成功运行，哪些尚未运行。Flyway 在迁移文件版本级别执行此操作。Flyway 无法检测你对迁移文件做了哪些更改，并仅运行这些更改。


  这是合理的，因为 Flyway 无法知道如何自动处理更改。假设你更改了列的名称。Flyway 应该删除旧列并创建一个新列吗？应该重命名该列吗？还是做其他事情？


  Flyway 并没有对这些情况采用“魔法”处理，而是选择放弃，并将更改已成功执行的迁移文件视为用户错误。


  ### 添加更多模式


  在清单 5-7 中，你创建了一个表。如果你想向 Web 应用添加更多表，只需创建另一个迁移文件即可。


  要创建新的迁移，只需在 *src/main/resources/db/migration* 目录内创建一个新的迁移文件。你已经在初始迁移中使用了版本号 1，因此你应该将其命名为类似
  *V2__add_name_to_user.sql* 的名称。清单 5-8 展示了一个示例。


  ```

  ALTER TABLE user_t ADD COLUMN name VARCHAR(255);

  清单 5-8

  第二个迁移，向现有的 user_t 表添加一个新列

  ```


  如果你重新运行应用，Flyway 将看到新的 V2 文件，检测到它尚未执行，然后执行它。




  ### 添加非空列


  向 `user_t` 表添加 name 列很容易，因为你没有用 `NOT NULL` 标记它。当你运行清单 5-8 中的 `V2` 迁移时，表中任何现有的行都会将新的
  name 列设置为 NULL。如果你想向 `user_t` 表添加一个新的 `NOT NULL` 列，该怎么办？


  如果你的数据库是空的，添加一个 `NOT NULL` 列可以正常工作。但是，如果 `user_t` 表中已有数据，并且你创建了一个新的 *V3* 迁移，在其中放入类似
  `ALTER TABLE user_t ADD COLUMN tos_accepted BOOLEAN NOT NULL` 的语句，那么 Flyway 会报错，提示迁移失败，同时
  H2 数据库也会报错，提示 `NULL not allowed for column "TOS_ACCEPTED"`。


  这是因为 SQL 数据库不知道如何处理表中现有的行。它不能将这些行设置为 `NULL`，因为你禁止了该列使用 `NULL`。


  有两种方法可以解决这个问题。第一种是为该列设置一个默认值。这意味着当你向该表插入新行且未设置该列时，它会被自动设置为指定的默认值。此外，这也会告诉 SQL 数据库，在创建该列时，可以将数据库中现有行的该列设置为默认值。清单
  5-9 展示了该迁移文件的内容。


  ```

  ALTER TABLE user_t

  ADD COLUMN tos_accepted BOOLEAN

  NOT NULL

  DEFAULT false;

  清单 5-9

  添加 V3 迁移，包含一个带有默认值的非空列

  ```


  第二种解决方法（也是我更倾向的方法）是分多个步骤进行更改。如果你不想设置默认值怎么办？我倾向于在业务逻辑中设置默认值，而不是在数据库中。如果我忘记在代码中设置
  `tos_accepted`，我希望操作失败。


  你可以通过将操作拆分为三个步骤来实现：添加列并允许空值，运行 `UPDATE` 语句将该列设置为期望的值，然后使用 `NOT NULL` 约束更新该列。清单 5-10
  展示了如何编写该迁移。


  ```

  ALTER TABLE user_t

  ADD COLUMN tos_accepted BOOLEAN;

  UPDATE user_t SET tos_accepted = false;

  ALTER TABLE user_t

  ALTER COLUMN tos_accepted

  SET NOT NULL;

  清单 5-10

  添加 V3 迁移，分多个步骤添加非空列，且无默认值

  ```


  这样，你的数据库最终会达到期望的状态。如果你没有设置 `tos_accepted`，新的插入操作将会失败。而现有的记录会将新的 `tos_accepted` 列设置为
  `false`。


  ### 向后兼容的迁移


  在蓝绿部署中运行 Web 应用是很常见的做法。这意味着当你部署最新版本的代码时，你会保持上一个版本继续运行，直到新代码的进程启动并完全初始化。然后，你的部署设置会将所有传入的请求导向最新版本，之后才关闭上一个版本。


  这样做的后果是，在一段时间内，上一个版本的代码仍在运行，而最新版本的代码正在启动并运行数据库迁移。因此，上一个版本的代码现在是在最新版本的数据库模式下运行。


  如果你不小心，可能会对数据库模式做出与上一个版本代码不兼容的更改。因此，编写与上一个版本代码向后兼容的数据库迁移是很有帮助的。


  清单 5-10 中的迁移就不是向后兼容的。它虽然成功运行，但对数据库所做的更改会导致上一个版本的代码失败。如果上一个版本的代码尝试插入新用户，操作将会失败，因为它不知道新的
  `tos_accepted` 列，也不会设置它。


  你可以利用蓝绿部署的特性以及部署最新版本代码不会导致系统停机这一事实来解决这个问题。清单 5-11 展示了 `V3` 迁移的更新版本，其中只做了添加新列这一件事。


  ```

  ALTER TABLE user_t

  ADD COLUMN tos_accepted BOOLEAN;

  清单 5-11

  一个向后兼容的更新版 V3 迁移

  ```


  首先部署这个版本，并等待其完成。请记住，在蓝绿环境中部署时，上一个版本的代码只是临时运行，蓝绿部署会在部署完成前关闭旧代码。下一步是创建一个新的 *V4* 迁移，来完成剩余的工作。此时，上一个版本的代码已不再生产环境中运行，而生产环境中的当前代码已经知道
  `tos_accepted` 列。清单 5-12 展示了新的 *V4* 迁移，其中包含了将新列标记为 `NOT NULL` 的剩余更改。


  ```

  UPDATE user_t SET tos_accepted = false;

  ALTER TABLE user_t

  ALTER COLUMN tos_accepted

  SET NOT NULL;

  清单 5-12

  一个 V4 迁移，将 V3 中的新列标记为非空


  如果你查看清单 5-11 和 5-12 中的 V3 和 V4 迁移，你会发现它们的内容与清单 5-10 中一步完成所有操作的原始 V3 迁移完全相同。因此，你唯一做的更改就是将其分两步运行，而不是一步，以确保你的迁移始终与生产环境中运行的当前版本和上一个版本的代码兼容。


  不过要注意，这个迁移很容易做到向后兼容。但情况并非总是如此。与编写非向后兼容的迁移相比，你的更改越大，向后兼容的迁移就可能变得越复杂。你应该根据具体情况，逐一考虑是否要使迁移向后兼容。如果成本过高，那么在生产环境中冒一些停机或异常的风险也许是可以接受的。


  ## 插入种子数据


  你也可以使用 Flyway 来生成*种子数据*。种子数据是你的 Web 应用期望始终存在于数据库中的数据。例如，如果你构建一个用于安排和递送包裹的 Web 应用，你可能会将系统支持的包裹类型存储在一个表中。但这个表不应包含任意的包裹类型。你的代码只支持该表中列出的包裹类型，并且你不提供任何用于添加更多包裹类型的用户界面。




  ### 可重复迁移


  静态种子数据的一个好去处是*可重复迁移*。这是一种特殊类型的迁移，每次你要求 Flyway 执行迁移时，它都会运行。Flyway 在所有 schema 变更迁移完成后运行它们，因此它们将始终在最新版本的
  schema 上操作。


  可重复迁移与普通迁移类似——它们是一个在你的数据库上执行某些操作的 SQL 文件。要创建可重复迁移，你需将其与普通迁移一起放在 *src/main/resources/db/migration*
  目录下。但文件命名不是 *V{number}__{myFileName).sql*，而是 *R__{myFileName}.sql*。可重复迁移没有版本号，因为
  Flyway 不需要。该迁移始终会运行。


  你还需要确保实际的 SQL 脚本是可重复的。Flyway 在运行可重复迁移时不会做任何智能或神奇的事情。如果你的可重复迁移中充满了 `INSERT INTO`
  语句，那么每次 Flyway 运行你的可重复迁移时，数据库中都会出现重复的行。


  如何处理这个问题因数据库而异。PostgreSQL 有 upsert 语句，Oracle 有 merge 语句，等等。清单 5-13 展示了一个如何在 H2 中编写
  merge 语句的示例，该语句要么插入新行，要么更新现有行，从而使该 SQL 语句可以安全地放入可重复迁移中。


  ```

  MERGE INTO user_t

  (email, password_hash, name, tos_accepted)

  KEY (email)

  VALUES

  (''august@crud.business'', ''456def'', ''August Lilleaas'', true);

  清单 5-13

  一个可以多次运行但只会插入一行的 SQL 语句，使其对于可重复迁移是安全的

  ```


  H2 会检查是否存在具有所提供 email 的行。如果 H2 找不到，它将插入一个新行。如果 H2 找到匹配项，它将更新该行而不是插入新行。


  ### 更新可重复迁移


  在 Flyway 运行之后，你不能更改普通的版本化迁移。但你可以随意更改可重复迁移。并且每次运行迁移时，Flyway 都会运行最新的更新版本。


  可重复迁移的全部意义在于，它包含将数据库置于所需状态的 SQL 语句。这个所需状态可能会（并且很可能会）随时间变化。因此，你可以更新你的可重复迁移，Flyway
  将运行最新版本，确保你的数据库始终与你的 Web 应用所需的最新种子数据保持同步。


  请注意，如果你删除了一个 SQL 语句，Flyway 不会尝试智能地删除可重复迁移中不再存在的数据。如何解决这个问题取决于你。如果需要，你可以自由地在可重复迁移中添加
  `DELETE` 语句。或者，你也可以直接删除插入数据的语句，并手动删除数据。


  ## 处理失败的迁移


  尽管你尽了最大努力，迁移在生产环境中仍然可能并且确实会失败。希望这种情况很少发生。但当它们发生时，你需要知道如何处理。


  ### 本地迁移失败


  如果迁移在本地失败，你有更多的选择。本地开发环境中的数据对任何人来说都不是关键性的，并且是（或者应该是）完全可有可无的。


  当迁移在本地失败时，我通常的做法是直接清除整个本地数据库并创建一个新的。当你使用 H2 时，只需删除 *build/* 文件夹中的数据库文件即可，即 *build/local.mv.db*
  和 *build/local.trace.db*。


  你系统中的所有核心数据都应该放在可重复迁移中，如果你重启 Web 应用，迁移将从头开始运行，并创建一个包含你使用 Web 应用所需的所有表和数据的新数据库。


  ### 生产环境迁移失败


  如果迁移在生产环境中失败，你需要更加谨慎地处理问题。


  理想情况下，你失败的迁移是向后兼容的。因此，即使它失败了，并且最新版本的代码没有部署，现在仍在生产环境中的先前版本的代码也能正常工作。


  如果它不是向后兼容的，你可能已经额头冒汗、心跳加速了，因为生产环境现在*宕机*了，而你是罪魁祸首。


  我不会深入讨论修复损坏的迁移所需执行的具体操作类型。修复它需要做什么完全取决于你的业务逻辑、迁移的内容以及错误发生在迁移的哪个步骤。


  ### 重新运行失败的迁移


  通常，有两种解决方法。第一种是让 Flyway 相信它从未尝试执行新的迁移。


  第一步是通过手动向数据库输入 SQL 命令，对数据库进行任何必要的手动更改。然后，对失败的迁移文件进行任何必要的更改。


  完成后，重启你的 Web 应用，这将使 Flyway 再次运行失败的迁移。


  要让 Flyway 相信迁移从未运行过，你需要更新 Flyway 用于记账的 `flyway_schema_history` 表（在清单 5-6 中配置）。假设失败的迁移是
  *V5*，你可以运行 `DELETE FROM flyway_schema_history WHERE version = 5`，以便下次启动 Web 应用时让
  Flyway 从头开始重新运行该迁移。


  ### 手动执行迁移


  解决失败迁移的第二种方法是完全手动完成迁移，并让 Flyway 相信迁移已经运行。


  第一步是手动对你的数据库运行 SQL 命令，使数据库达到理想状态。确保你真正考虑清楚了你正在做的事情，并仔细编写你的 SQL，因为你的数据库最终可能处于与 Flyway
  迁移指定的状态不同的状态。


  要让 Flyway 相信迁移已成功执行，你需要更新 `flyway_schema_history` 表并将该迁移标记为成功。假设失败的迁移仍然是 *v5*，你可以运行
  `UPDATE flyway_schema_history SET success = true WHERE version = 5`。


  下次运行你的 Web 应用时，Flyway 将看到根据其自己的表，迁移是成功的，因此它不会尝试重新运行它。


  # 6. 查询 SQL 数据库


  在第 5 章中，你设置了一个用于管理数据库连接的数据源，并配置了 Flyway 来管理你的数据库 schema，这样你就拥有了一些可以执行查询的表。在本章中，你将学习如何执行这些查询。


  如果你是 Kotlin 新手，以下是本章示例中会用到的一些语言特性：


  *   动态数据的空安全转换和类型检查


  *   数据类中的伴生对象


  *   普通 Kotlin 函数中的泛型类型


  同样在本章中，你将学习以下关于查询 SQL 数据库的内容：


  *   如何直接使用 SQL，而不是使用数据库映射库


  *   在生产级 Web 应用中执行查询的最佳实践


  *   如何构建你的 Web 应用以获得最高程度的类型安全性和便利性


  *   如何管理事务


  我很难想象一个不使用数据库的 Web 应用。市面上有很多数据库，SQL 并非在所有情况下都是最佳选择。但大多数 Web 应用都使用 SQL 数据库，因此这就是你将在本书中学到的内容。


  ## 设置查询


  在第 5 章的连接池和 schema 管理能力的基础上，你还需要一些东西才能舒适地执行查询。在第 5 章中，你直接使用 JDBC 运行了一个小查询。但是 JDBC
  API 充满了样板代码，使用起来并不那么舒适。因此，你需要一个位于你和 JDBC 之间的库，让你的工作更轻松。




  ### 直接使用 SQL


  要执行查询，你需要直接编写 SQL。在开始设置之前，我想先解释一下原因。


  有些开发者更喜欢使用映射库，这样就能用 Kotlin 代码来表达查询。Exposed ([`https://github.com/JetBrains/Exposed`](https://github.com/JetBrains/Exposed))
  和 Ktorm ([`www.ktorm.org/`](http://www.ktorm.org/)) 是流行的 Kotlin 库，你也可以使用 Hibernate
  ([`https://hibernate.org/`](https://hibernate.org/)) 和 MyBatis ([`https://mybatis.org/mybatis-3/`](https://mybatis.org/mybatis-3/))
  等 Java 库。它们的共同点是，允许你创建代表表的类，并在代码与数据库表之间建立一个类型安全的映射层。你可以设置对象图（因此得名对象关系映射，简称 ORM）来定义表之间的关系。你无需编写任何
  SQL 查询，而是与映射类交互，并用它们来表达插入、查询、分组等操作。


  这一切听起来不错。我们行业中最聪明的人创建了这些库和框架，许多开发者都在小型和大型项目中使用它们。那么，问题出在哪里呢？


  我认为数据库是任何 Web 应用不可或缺的一部分。我希望我的代码能尽可能接近我在构建的 Web 应用中所使用的实际数据库。无论我使用哪种语言，无论是 Node.js、Groovy、Clojure，当然也包括
  Kotlin，情况都是如此。我的代码与数据库交互的复杂细节最终总是变得很重要，尤其是当应用不断增长时。ORM 的设计初衷就是向你隐藏这些细节。因此，对于你在本书中编写
  Web 应用的方式而言，ORM 反而成了一种反模式。


  能够使用 SQL 数据库的所有功能，而无需担心是否能用 ORM 映射或用 SQL 封装器来表达，这是一个优势。


  ORM 的一个好处是它们可以自动生成高效的 SQL 查询。但 ORM 也可能生成低效的查询。因此，如果你使用 ORM，就需要对 SQL 有深入的理解，才能处理这些情况。掌握
  SQL 知识是绕不开的。考虑到这一点，我更倾向于直接编写 SQL。


  我并不是说你永远不应该使用 ORM。但出于上述原因，我个人从不使用它们，因此在本书中我也会避免使用。


  ### 安装 Kotliquery


  你将使用 Kotliquery 来执行查询。Kotliquery 是一个围绕 JDBC 的小型封装库，它帮助你解决 JDBC 中样板代码和 API 不友好等问题。


  请注意，使用 Kotliquery 并不会限制你以后在需要时直接调用 JDBC。像 Kotliquery 这样的库的好处在于，你可以混合搭配使用，不存在锁定问题。


  要安装 Kotliquery，请将其作为依赖项添加到 *build.gradle.kts* 的 `dependencies` 块中：


  ```

  implementation("com.github.seratch:kotliquery:1.9.0")

  ```


  Kotliquery 是一个设计精良的库，拥有构建生产级 Web 应用所需的所有功能。如果以 GitHub 星标数来衡量，它并不是一个流行的库。但流行度只是一个虚荣指标。我已在大型生产系统中成功使用了
  Kotliquery。


  ### 映射查询结果


  行映射器是一个函数，Kotliquery 用它来提取行数据并将其转换为你喜欢的数据结构。这个行映射器函数接收一个原始的 Kotliquery Row 对象，并将其转换为有用的数据。


  清单 6-1 展示了如何创建一个行映射器函数，以便稍后在使用 Kotliquery 执行查询时使用。


  ```

  import kotliquery.Row

  fun mapFromRow(row: Row): Map {

  return row.underlying.metaData

  .let { (1..it.columnCount).map(it::getColumnName) }

  .map { it to row.anyOrNull(it) }

  .toMap()

  }

  清单 6-1

  一个将 Kotliquery Row 对象映射为普通 Map 的函数

  ```


  这段代码中有几个有趣的地方。在 let 块内部，你创建了一个从 1 到查询结果 `metaData.columnCount` 的*范围*。你可以将范围视为该范围内数字的列表，因此
  `1..5` 等同于 `listOf(1, 2, 3, 4, 5)`。然后，你遍历该范围，并使用一个*函数引用*来获取列名。`map(it::getColumnName)`
  等同于 `map { colIdx -> it.getColumnName(colIdx) }`。这就像你在 `metaData` 对象（`it`）上调用了 `getColumnName`，并将范围中的列索引作为第一个参数传入。接着，遍历列名列表，通过
  `row.anyOrNull(it)` 返回列名与该列值组成的键值对。此时，你只是在提取查询的原始数据，没有进行任何类型检查或转换。最后，你使用 `toMap()`
  将键值对列表转换为一个 Map。结果就是，你将 Kotliquery 的 `Row` 对象转换成了一个从列名到列值的普通 Map。


  ## 执行 SQL 查询


  Kotliquery 已经设置好并准备就绪。是时候执行一些查询了！


  ### 创建会话


  要使用 Kotliquery 执行查询，你需要刚刚创建的行映射器和一个 Kotliquery 会话。


  你可以通过调用 Kotliquery 的 `sessionOf` 函数并传入你的连接池来创建一个会话。Kotliquery 会话是对原始数据库连接的一个小型封装。该会话包含一些方法，你可以调用它们来执行查询。清单
  6-2 展示了如何使用 `single` 来获取单行数据。


  ```

  import kotliquery.sessionOf

  sessionOf(dataSource).use { dbSess ->

  dbSess.single(queryOf("SELECT 1", ::mapFromRow))

  // {?column?=1}

  }

  清单 6-2

  创建一个 Kotliquery 会话并执行查询

  ```


  就像上一章清单 5-5 中一样，Kotliquery 会话实现了 `java.io.Closeable`，你必须记得在使用完毕后调用 `close()`。`use`
  会为你调用 `close()`，而 Kotliquery 随后会关闭它在创建会话时从数据源获取的底层连接。


  ### 查询单行数据


  在清单 6-2 中，你已经看到了如何在 Kotliquery 会话上使用 `single()` 来获取单行数据。`single()` 是一种优化，它只会从查询中返回一行数据。这使得
  Kotliquery 可以在底层做一些假设，例如甚至不会尝试从数据库获取多行数据。其返回类型（通过行映射器）是 `Map<String, Any?>?`，意味着它会返回
  `null` 或单行数据。清单 6-3 提供了一些 `single()` 输出的额外示例。


  ```

  dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

  // {?column?=1}

  dbSess.single(queryOf("SELECT 1 as foo"), ::mapFromRow)

  // {foo=1}

  dbSess.single(queryOf(

  "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

  ), ::mapFromRow)

  // {x=1, y=a}

  清单 6-3

  single() 的输出示例

  ```


  最后一个查询从两行数据中进行选择，但你只从 `single()` 中获取了第一行。这里没有什么特别的魔法；它只是依赖于数据库引擎返回的结果集的任何排序方式。




  ### 查询多行


  你可以像使用 `single()` 一样使用 `list()`，区别在于 `list()` 会返回查询结果中的所有行。`list()` 的返回类型（通过行映射器）是
  `List<Map<String, Any?>>`。清单 6-4 展示了一些查询多行的示例。


  ```

  dbSess.list(queryOf("SELECT 1 as foo"), ::mapFromRow)

  // [{foo=1}]

  dbSess.list(queryOf(

  "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

  ), ::mapFromRow)

  // [{x=1, y=a}, {x=2, y=b}]

  dbSess.list(queryOf(

  """

  SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)

  WHERE x = 42

  """

  ), ::mapFromRow)

  // []

  清单 6-4

  list() 的输出示例

  ```


  你始终会得到一个行列表作为返回值，即使查询只匹配到单行也是如此。如果匹配到零行，你也会得到一个空列表。你永远不需要检查 `list()` 的返回值是否为 `null`（Kotlin
  类型系统也会告诉你这一点）。


  当你的查询加载大量数据时，你也可以使用 `forEach()`。`forEach()` 会逐行产生数据，而 `list()` 则会在将数据交给你的代码之前，将所有结果累积到一个列表中。如果你预期查询会返回大量行，或者行中包含二进制大对象（blob）或其他大小不定的列，那么使用
  `forEach()` 在内存使用和性能方面会好得多。清单 6-5 展示了如何使用 `forEach()` 的示例。


  ```

  dbSess.forEach(queryOf(

  "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

  )) { rowObject ->

  val row = mapFromRow(rowObject)

  println(row)

  }

  // {x=1, y=a}

  // {x=2, y=b}

  清单 6-5

  使用 forEach 避免将整个结果集加载到内存中的示例

  ```


  `forEach()` 会为查询产生的每一行调用一次 lambda 表达式。传递给 lambda 的是原始的 Kotliquery `Row` 对象。你可以使用与
  `single()` 和 `list()` 相同的 `mapFromRow()` 函数，将此结构转换为普通映射。


  ### 插入行


  要插入行，你需要在 Kotliquery 会话上使用 `updateAndReturnGeneratedKey()` 函数。你还需要通过将 `returnGeneratedKey`
  标志设置为 `true` 来正确创建会话。清单 6-6 展示了如何正确创建会话并执行插入操作。如果设置不正确，你将无法访问数据库在插入行时自动生成的 ID。


  ```

  sessionOf(dataSource, returnGeneratedKey = true)

  .use { dbSess ->

  dbSess.updateAndReturnGeneratedKey(queryOf(

  """

  INSERT INTO user_t

  (email, password_hash, name, tos_accepted)

  VALUES

  (?, ?, ?, ?)

  """,

  "august@augustl.com",

  "123abc",

  "August Lilleaas",

  true)

  )

  // 2

  }

  清单 6-6

  创建一个允许你获取插入行 ID 的会话

  ```


  如果你一直按顺序跟随本书的示例，那么运行此插入操作时获得的 ID 将是 `2`。这是因为你在上一章中已经使用可重复迁移创建了一个用户，如清单 5-13 所示。


  ### 更新和删除


  要执行更新和删除 SQL 语句，你将使用 `update()` 函数。此函数实际上并不关心实际 SQL 语句执行了什么操作。但它会返回查询所影响的行数。这对于进行完整性检查特别有用，可以检查查询是否影响了多于零行。清单
  6-7 展示了执行 `UPDATE` 和 `DELETE` SQL 语句的示例。


  ```

  dbSess.update(queryOf(

  "UPDATE user_t SET name = ? WHERE id = ?",

  "August Lilleaas",


  ))

  // 1

  dbSess.update(queryOf("DELETE FROM user_t"))

  // 2

  清单 6-7

  执行 UPDATE 和 DELETE 语句的示例

  ```


  `UPDATE` 语句返回 1，因为它更新了由行 ID 匹配到的特定行。`DELETE` 语句返回 2，因为它删除了 `user_t` 表中的两行用户数据。


  ### 位置参数 vs. 命名参数


  到目前为止，你的代码使用问号符号来引用 SQL 查询参数。Kotliquery 为这些参数提供了另一种语法，允许你为它们命名。


  命名参数有两个好处：如果你的查询包含许多参数，它能使代码更具可读性；并且它允许你多次重用同一个参数，而无需传递两次或更多次。清单 6-8 展示了清单 6-7 中
  update 语句的示例，这次使用了命名参数而不是位置参数。


  ```

  dbSess.update(queryOf(

  "UPDATE user_t SET name = :name WHERE id = :id",

  mapOf(

  "name" to "August Lilleaas",

  "id" to 2

  )))

  清单 6-8

  使用命名参数传递查询参数

  ```


  这允许你通过名称引用参数，并且还有一个额外的好处，即命名了输入，这样你就不必通过计算参数在参数列表中的位置来确定哪个参数对应哪个位置。


  ### 其他操作


  如你所见，Kotliquery 拥有执行查询和插入所需的一切功能。与直接使用 JDBC 相比，Kotliquery API 简单得多，并且可以轻松地将查询转换为数据并将参数传递给查询。


  你可以在项目 GitHub 页面找到 Kotliquery 中可用参数和方法的详细文档和 API 参考：[`https://github.com/seratch/kotliquery`](https://github.com/seratch/kotliquery)*。*


  ## 从 Web 处理器查询


  你将在 Web 处理器中执行大部分查询。拥有一个辅助函数会很方便，你可以使用它让 Web 处理器自动准备和管理 Kotliquery 会话。


  ### 创建辅助函数


  为了便于在 Web 处理器中进行查询，你将创建一个名为 `webResponseDb` 的 `webResponse` 版本（来自第 4 章）。此函数执行 `webResponse`
  的所有功能，但还会创建和管理一个 Kotliquery 会话。这使得在 Web 处理器中运行查询变得简单方便。清单 6-9 展示了 `webResponseDb`
  的实现。


  ```

  import kotliquery.Session

  fun webResponseDb(

  dataSource: DataSource,

  handler: suspend PipelineContext.(

  dbSess: Session

  ) -> WebResponse

  ) = webResponse {

  sessionOf(

  dataSource,

  returnGeneratedKey = true

  ).use { dbSess ->

  handler(dbSess)

  }

  }

  清单 6-9

  webResponseDb – 包装 webResponse 并添加数据库查询能力

  ```


  `webResponseDb` 的签名类似于 `webResponse`，只是它添加了一个指向 Kotliquery 会话的 `dbSess` 参数。调用它时，你还必须传递一个数据源。此外，`returnGeneratedKey`
  始终设置为 `true`，以确保你的 Web 处理器能够访问数据库自动生成的行 ID。清单 6-10 展示了如何从 Ktor 路由映射中调用 `webResponseDb`
  的示例。


  ```

  get("/db_test", webResponseDb(dataSource) { dbSess ->

  JsonWebResponse(

  dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

  )

  })

  清单 6-10

  创建执行数据库查询的 Ktor 路由的示例

  ```


  在真实的 Web 应用中，大多数 Web 处理器都需要数据库连接。因此，拥有像 `webResponseDb` 这样的辅助函数来创建 Web 处理器，并将所有数据库连接相关事宜和资源管理集中处理，是非常方便的。




  ### 关于架构的一点说明


  许多框架和架构都包含用于分离和隔离 Web 应用中不同关注点的模式。例如，典型的六边形架构旨在松散耦合 Web 应用的各个组件，并使它们可互换。


  对于 Web 处理器（例如清单 6-10 中的那个），我并没有做太多分离。Web 处理器的目的是与数据库交互并围绕它实现业务逻辑。我认为数据库是这种交互的核心部分。你可以将其分离出来，并对业务逻辑隐藏数据库，但这会带来一个权衡：增加了理解系统运行情况的模糊性和难度。


  如果我确实要将 Web 处理器拆分为多个部分，我会采用**功能核心、命令式外壳**模式。打个比方，你可以将其想象为一位总统决定做什么并签署文件（功能核心），以及一个执行命令的行政部门（命令式外壳）。大约
  90% 的代码最终会进入功能数据驱动核心，所有业务逻辑都驻留在那里。然后，命令式外壳是“哑”的，它根据功能核心生成的数据执行命令，不包含任何业务逻辑。


  在合理的情况下，我会使用队列来分离操作关注点。如果系统的一部分写入队列，而另一部分从队列读取，那么它们在架构和操作上都是分离且完全解耦的。


  我坚决主张将业务逻辑与用户界面渲染逻辑分开。用户界面代码的顶层负责获取数据并对其进行处理，以渲染一个不包含业务逻辑的“哑”图形用户界面，该界面仅根据接收到的数据进行渲染。


  总的来说，我尽量避免过度设计代码。我更喜欢“哑”的普通函数、SQL 以及易于追踪和理解的数据，而不是在 Web 应用的所有组件之间建立防火墙式的隔离。


  ### 避免长时间运行的连接


  当你将整个 Web 处理器包装在一个 Kotliquery 会话中时，你需要意识到，如果你的 Web 处理器包含对外部 API 的调用，你应该考虑其他替代方案。


  Kotliquery 会话只是数据库连接的一个小型包装器。如前所述，数据库连接是一种昂贵的资源。如果你的 Web 处理器在执行与数据库无关的长时间运行操作（例如调用外部
  API）时保持 Kotliquery 会话打开，那么你就是在浪费资源。该连接无法从连接池中供其他 Web 处理器使用。而且，在你并未真正使用它时，数据库服务器也在维护着该连接。


  有时，这种情况无法避免。例如，你可能需要打开一个事务，该事务首先向数据库写入一些数据，然后执行一个可能长时间运行的外部 API 调用，然后在同一个事务中再向数据库写入更多数据。如果是这种情况，那么你只能接受这样一个事实：你需要在外部
  API 调用期间保持一个空闲的数据库连接。


  不过，在许多情况下，你也可以通过重新设计业务逻辑来避免这种情况。例如，你可以向数据库写入一个带有标记的临时条目，以便你的应用程序知道在查询中忽略它。然后，你可以执行外部
  API 调用。最后，你可以向 Kotliquery 请求一个新的会话，并通过取消临时条目的标记并执行你需要对数据库执行的任何额外操作来完成该操作。这样，你就避免了在外部
  API 调用期间一直占用数据库连接。


  另外请注意，如果你预计你的 Web 应用只处理较低流量的请求，那么保持数据库连接打开不会造成问题。但是，如果你预计你的 Web 应用每秒要处理数百或数千个请求，那么你就需要考虑这一点。


  ## 映射 vs. 数据类


  当你执行查询时，行映射器会将行数据转换为普通映射。为什么它不直接将查询结果转换为类型更安全的数据类呢？为了理解原因，让我们看看你可以用当前使用的行映射器返回的映射做些什么。


  无论你最终做什么，最好坚持将原始查询数据作为映射返回，然后编写代码检查数据的形状，并根据你的业务逻辑和要求相应地对其进行转换。


  ### 传递映射


  迟早，你会需要将查询结果中的数据传递给实现业务逻辑的 Web 应用函数。处理这个问题的一种方法是直接将查询结果中得到的映射传递给业务逻辑，不对数据进行额外处理。清单
  6-11 展示了一个示例。


  ```

  def sendEmailToUser(userRow: Map) {

  deliverEmail(

  "欢迎, ${user["name"] ?: user["email"]}",

  user["email"] as String

  )

  }

  def handleSignup() {

  val userRow = createUser(...)

  sendEmailToUser(userRow)

  }

  清单 6-11

  将原始映射传递给业务逻辑

  ```


  我在实际的 Web 应用中很少这样做。如果你拼错了某个属性，你会得到 `null` 而不是实际值。你可以使用 `as` 进行强制转换，如果类型错误或值为 `null`，则会抛出错误。但这样你就不得不在业务逻辑中到处进行这种类型的强制转换。而且，你会在系统中远离从数据库获取数据的代码的某个深处得到错误。


  ### 传递单个属性


  将查询结果中的数据传递给业务逻辑的另一种选择是，从普通映射中提取属性，并将它们作为单独的参数传递给各种业务逻辑函数。清单 6-12 展示了一个示例。


  ```

  def sendEmailToUser(userName: String?, userEmail: String) {

  deliverEmail(

  "欢迎, ${userName)}",

  userEmail

  )

  }

  def handleSignup() {

  val userRow = createUser(...)

  sendEmailToUser(

  userRow.get("name") as? String,

  userRow.get("email") as String

  )

  }

  清单 6-12

  将单个属性传递给业务逻辑

  ```


  这是我更常做的事情。这样，业务逻辑就不依赖于数据库结构。所有强制转换都发生在你从查询中提取数据的位置附近，因此你不必在业务逻辑中到处放置类型转换。而且，这种强制转换现在是“快速失败”的，这意味着你会在更早、更接近执行数据库查询的代码的位置得到转换错误。




  ### 映射到数据类


  你也可以将查询结果行表示为数据类。对于较简单的查询（例如选择表的所有列），我通常会这样做，这样可以在多个输出相似的查询中复用同一个数据类。清单 6-13 展示了一个数据类的示例，它将来自
  `user_t` 表的查询结果进行映射。


  ```

  data class User(

  val id: Long,

  val createdAt: ZonedDateTime,

  val updatedAt: ZonedDateTime,

  val email: String,

  val tosAccepted: Boolean,

  val name: String?,

  val passwordHash: ByteBuffer

  ) {

  companion object {

  fun fromRow(row: Map) = User(

  id = row["id"] as Long,

  createdAt = (row["created_at"] as OffsetDateTime)

  .toZonedDateTime(),

  updatedAt = (row["updated_at"] as OffsetDateTime)

  .toZonedDateTime(),

  email = row["email"] as String,

  name = row["name"] as? String,

  tosAccepted = row["tos_accepted"] as Boolean,

  passwordHash = ByteBuffer.wrap(

  row["password_hash"] as ByteArray

  )

  )

  }

  }

  dbSess.single(

  queryOf("SELECT * FROM user_t"),

  ::mapFromRow

  )?.let(User::fromRow)

  // User(

  //   id=1,

  //   createdAt=2022-07-27T16:40:44.410258+02:00,

  //   updatedAt=2022-07-27T16:40:44.410258+02:00,

  //   email=august@crud.business,

  //   tosAccepted=true,

  //   name=August Lilleaas,

  //   passwordHash=java.nio.HeapByteBuffer[pos=0 lim=6 cap=6]

  // )

  清单 6-13

  将查询结果映射到数据类

  ```


  该数据类使用 `companion object` 定义了 `fromRow` 函数，该函数根据查询结果行创建 `User` 实例。你也可以将 `fromRow`
  定义为独立函数，但能够编写 `User.fromRow(...)` 会更方便。在 Kotlin 中，将各种辅助函数和构造函数放在伴生对象中是一种常见模式。你可以将其视为
  Kotlin 版本的 Java 静态方法。


  你在 `single()` 的返回值上调用 `User.fromRow`。这是一个很好的例子，展示了如何结合使用 `let` 作用域函数和函数引用，从而减少一些输入和中间变量的创建。通过调用
  `?.let()` 而不是 `.let()`，你可以处理 `single()` 在未找到匹配行时返回 `null` 的情况。`User.fromRow(...)`
  接受一个参数，即行数据。作用域函数 `let` 也接受一个参数，即你调用 `let` 的对象。因此，在这种情况下，你可以使用函数引用 `User::fromRow`
  来代替 lambda 表达式。


  将表映射到数据类是我很少做的事情，但这取决于具体情况。通常，我会采用混合方法。清单 6-14 展示了两种替代方案的示例。


  ```

  def sendEmailToUserA(user: User) {

  deliverEmail(

  "Welcome, ${user["name"] ?: user["email"]}",

  user["email"] as String

  )

  }

  def sendEmailToUserB(userName: String?, userEmail: String) {

  deliverEmail(

  "Welcome, ${userName)}",

  userEmail

  )

  }

  def handleSignup() {

  val user = createUser(...).let(User::fromRow)

  sendEmailToUserA(user)

  sendEmailToUserB(user.name, user.email)

  }

  清单 6-14

  如何将查询结果数据类与业务逻辑结合

  ```


  `sendEmailToUserA` 的问题在于，任何想要调用该函数的人都必须构造一个包含所有属性的完整 `User` 对象，而调用 `sendEmailToUserA`
  实际只需要姓名和电子邮件。你可以将 `User` 数据类的大部分属性设为可空，但这样它就不再代表一个有效的用户，因为一个没有 ID 的用户是没有意义的。


  相反，我更喜欢编写像 `sendEmailToUserB` 这样的函数。这样，该函数不关心聚合体，只对其执行所需的单个数据点进行操作。


  不过，请根据你的判断来使用。有时，传递完整的数据类是有利的，而且很难制定一个通用规则来决定何时该做什么。


  ## 数据库事务


  事务是 SQL 数据库的一个标志性特性。我假设你具备一些先验知识，并且不会深入探讨围绕事务建模业务逻辑的许多复杂细节。不过，你需要学习如何创建、提交和回滚事务。


  ### 创建事务


  Kotliquery 会话本身不是事务性的。当你希望在事务中执行数据库操作时，必须手动显式创建一个事务。


  要创建事务，你可以在 Kotliquery 会话上调用 `transaction` 函数，并向其传递一个 lambda 表达式。该 lambda 表达式在事务内部执行。当
  lambda 表达式执行完毕时，Kotliquery 会提交事务；如果 lambda 中的代码抛出了异常，则会回滚事务。清单 6-15 展示了其工作原理。


  ```

  dbSess.transaction { txSess ->

  txSess.update(queryOf("INSERT INTO ..."))

  txSess.update(queryOf("INSERT INTO ..."))

  }

  清单 6-15

  创建事务并执行 SQL 语句

  ```


  `txSess` 代表打开的事务，它具有与普通 Kotliquery 会话完全相同的方法，例如 `single`、`list`、`update`、`forEach`
  等。如果清单 6-15 中的两个 `INSERT` 语句都成功执行，则事务被提交。另一方面，如果其中一个失败，`update` 函数将抛出异常，Kotliquery
  的事务处理代码会捕获该异常，并回滚事务而不是提交它。


  `ByteBuffer` 来自 `java.nio.ByteBuffer`。密码哈希是一个原始字节数组，在 Java 平台上，字节数组不实现相等性比较。因此，如果你尝试将
  `ByteArray` 值直接存储在数据类上，Kotlin 编译器会发出警告。通过将字节数组包装在 `ByteBuffer` 中，Kotlin 数据类可以正确地比较两个单独的字节值，以判断它们是否相等。


  如果你想回滚，也可以手动抛出异常。或者，你也可以直接调用 `txSess.connection.rollback()`。


  ### Web 处理器中的事务


  根据我的经验，大多数 Web 应用会要求大部分或所有与数据库相关的代码在事务中运行。因此，创建一个用于创建 Web 处理器并同时创建事务的辅助函数会很方便。


  你可以通过创建 `webResponse` 的另一个版本（称为 `webResponseTx`）来实现这一点。该函数与 `webResponseDb` 类似，但除了创建
  Kotliquery 会话外，它还会启动一个包裹整个 Web 处理器的事务。清单 6-16 包含了 `webResponseTx` 函数的实现。


  ```

  fun webResponseTx(

  dataSource: DataSource,

  handler: suspend PipelineContext.(

  dbSess: TransactionalSession

  ) -> WebResponse) = webResponseDb(dataSource) { dbSess ->

  dbSess.transaction { txSess ->

  handler(txSess)

  }

  }

  清单 6-16

  webResponseTx，一个同样会创建事务的 webResponseDb 版本

  ```


  提示


  最初，Kotliquery 不支持在挂起函数内部使用事务。`transaction` 本身不是一个 `suspend` 函数，因此 lambda 内部的处理器无法访问
  `suspend` 作用域。我提交了一个拉取请求来修复这个问题，包含该修复的 1.9 版本已发布。开源万岁！请在此处查看拉取请求：[`https://github.com/seratch/kotliquery/pull/57`](https://github.com/seratch/kotliquery/pull/57)*。*


  你调用此函数的方式与你在清单 6-9 中创建的 `webResponseDb` 相同。`webResponseTx` 和 `webResponseDb` 之间的唯一区别在于会话的类型分别是
  `TransactionalSession` 和 `Session`。




  ### 类型安全的事务性业务逻辑


  部分业务逻辑需要事务才能正常工作。例如，你可能有一个执行两次插入操作的函数，对于你的 Web 应用来说，要么全部成功，要么全部失败至关重要。你可以通过将该函数包装在事务中来解决这个问题。


  但如果你忘记创建事务了呢？


  你可以通过确保业务逻辑需要正确类型的 Kotliquery 会话来缓解此问题。如前所述，Kotliquery 为非事务会话生成 `Session`，为事务会话生成
  `TransactionalSession`。因此，如果你编写的业务逻辑函数接受 `TransactionalSession` 作为类型，那么当你尝试从没有可用事务的上下文中调用需要事务才能正确运行的业务逻辑时，就会收到编译错误。清单
  6-17 展示了如何以这种方式构建业务逻辑的示例。


  ```

  fun createUserAndProfile(

  txSess: TransactionalSession,

  userName: String,

  bio: String

  ) {

  txSess.update(queryOf("INSERT INTO user_t ..."))

  txSess.update(queryOf("INSERT INTO profile_t ..."))

  }

  sessionOf(dataSource).use { dbSess ->

  // 这段代码无法编译 – dbSess 类型错误

  createUserAndProfile(

  dbSess,

  "augustl",

  "重要作者")

  dbSess.transaction { txSess ->

  // 这段代码编译正常 – txSess 类型正确

  createUserAndProfile(

  dbSess,

  "augustl",

  "重要作者")

  }

  }

  清单 6-17

  在业务逻辑中要求事务

  ```


  这看起来可能是一个小细节，但它确实能派上大用场。很容易犯错，最终将非事务性的 Kotliquery 会话传递给需要事务才能正确运行的函数。通过确保业务逻辑中那些需要事务的函数接受
  `TransactionalSession`，你将获得类型系统的帮助，从而避免此类错误（双关语）。


  ### 嵌套事务


  SQL 数据库不支持嵌套事务。但你可以使用*保存点*来模拟它们。


  Kotliquery 没有内置的保存点功能，但很容易创建自己的小型包装器。这也是一个很好的机会，可以了解 Kotliquery 如何实现 `transaction`
  函数，因为你用于创建保存点的函数将具有类似的行为。清单 6-18 展示了如何实现一个 `dbSavePoint` 函数，该函数创建一个保存点并使其像事务一样工作。


  ```

  fun dbSavePoint(dbSess: Session, body: () -> A): A {

  val sp = dbSess.connection.underlying.setSavepoint()

  return try {

  body().also {

  dbSess.connection.underlying.releaseSavepoint(sp)

  }

  } catch (e: Exception) {

  dbSess.connection.underlying.rollback(sp)

  throw e

  }

  }

  sessionOf(dataSource).use { dbSess ->

  dbSess.transaction { txSess ->

  // 创建一个保存点

  dbSavePoint(txSess) {

  txSess.update(queryOf("INSERT INTO ..."))

  }

  // 在此处执行更多数据库操作

  }

  }

  清单 6-18

  受 Kotliquery 创建事务方式的启发，创建一个保存点

  ```


  `dbSavePoint` lambda 内部的代码将表现得如同在其自己的嵌套事务中运行一样。


  保存点是一个命名实体。如果你调用 `setSavePoint` 而不提供自己的名称，JDBC 将自动生成一个名称。你将 lambda `body` 的执行包装在
  try/catch 中。如果 lambda 抛出异常，你将回滚保存点。如果 lambda 没有抛出任何异常，你将释放保存点。你使用作用域函数 `also` 来实现这一点。`also`
  将返回你调用它的对象，但在返回之前，它会执行 lambda 中的代码。这使得 `also` 成为一种便捷的方式，可以避免为 `body` lambda 的返回值创建和命名中间变量。


  你还看到了如何在普通 Kotlin 函数中使用泛型的示例。`A` 泛型表示 lambda `body` 的返回值。这意味着 `dbSavePoint` 将传递
  `body` lambda 的返回值，以便你可以在将代码包装在 lambda 中的同时保持函数式编码风格。


  # 7. 使用 jUnit 5 进行自动化测试


  现在，你已经组装好了 Web 应用拼图的所有部分。但在自己实现业务逻辑之前，你将学习如何编写自动化测试。


  如果你是 Kotlin 新手，以下是本章中将看到的一些语言特性示例：


  *   使用 `kotlin.test` 实现测试用例和断言

  *   使用不安全转换运算符 `!!` 实现空安全

  *   内联函数


  此外，在本章中，你将学习以下关于使用 jUnit 5 编写自动化测试的内容：


  *   测试驱动开发（TDD）的基础知识

  *   编写与数据库交互的测试

  *   隔离单个测试用例以避免测试间依赖


  在附录 C 中，你将学习如何使用 Kotlin 测试框架，而不是 `kotlin.test`。


  ## 设置环境


  jUnit 5 是用于编写和运行自动化测试的行业标准库，也是本书将使用的库。大多数 Kotlin 自动化测试库底层都使用 jUnit 5，因为 jUnit 5
  包含了在你自己的机器上以及自动化 CI（持续集成）构建环境中高效运行测试所需的一切。


  有许多可用的替代库。Kotlin 社区中一个流行的替代方案是 Kotest（[`https://kotest.io/`](https://kotest.io/)），它包含许多有用的功能，甚至还有诸如基于属性的测试等高级功能，这些功能会根据边界和规范自动生成测试。不过，我倾向于使用“简单”的测试库，标准的
  `kotlin.test` 和 jUnit 5 风格的断言使用起来简单且熟悉。此外，我实际上从未在实际项目中使用过 Kotest。因此，在本书中你将学习如何使用
  jUnit 5 和 `kotlin.test`。


  ### 添加 jUnit 5 和 kotlin.test


  你的项目中需要两样东西来运行测试：用于执行测试的 jUnit 5 和用于编写测试用例的 `kotlin.test`。


  `kotlin.test` 是一个包装库，你将使用它来编写测试用例本身。它包含用于将某些内容定义为测试类的注解、用于比较值的断言等。`kotlin.test`
  包含到 jUnit 5 的映射。jUnit 5 会识别 `kotlin.test` 测试用例并执行它们。


  到目前为止，你已经在 *build.gradle.kts* 的 `dependencies` 块中添加了第三方依赖项。你也可以为 jUnit 和 `kotlin.test`
  这样做。但对于测试运行，你需要的不仅仅是依赖项——你还需要告诉 Gradle 如何执行你的测试，以及 jUnit 5 和 `kotlin.test` 之间的映射。完成所有这些的最简单方法是使用安装了
  Kotlin 插件的 Gradle 自带的测试运行内置支持。清单 7-1 显示了需要添加到 Gradle 配置中的内容，以添加对 jUnit 5、`kotlin.test`
  以及用于执行测试的 Gradle 任务的支持。


  ```

  dependencies {

  // ...

  testImplementation(kotlin("test"))

  }

  tasks.test {

  useJUnitPlatform()

  }

  清单 7-1

  在 build.gradle.kts 中添加对 kotlin.test 和 jUnit 5 的支持

  ```


  请注意，如果你按照本书的指导使用 IntelliJ IDEA 创建了 Kotlin 项目，你可能已经设置了这些属性，因为 IntelliJ IDEA 会生成预配置了
  jUnit 5 支持的项目。




  ### 编写一个会失败的测试


  为了检查你的配置是否正确，你需要实现一个自动化测试，其作用相当于打印 `Hello, World`。


  错误通知是正确配置的自动化测试环境的关键组成部分。因此，第一步是故意编写一个会失败的测试，并验证你的编程环境是否会向你发出测试失败的提示。清单 7-2 展示了如何编写一个会失败的测试。


  ```

  package kotlinbook

  import kotlin.test.Test

  import kotlin.test.assertEquals

  class UserTest {

  @Test

  fun testHelloWorld() {

  assertEquals(1, 2)

  }

  }

  清单 7-2

  位于 src/test/kotlin/kotlinbook/UserTest.kt 的测试类，其中包含一个故意会失败的测试用例

  ```


  你的测试使用了 `assertEquals` 并传入两个不同的值来确保测试失败。1 永远不等于 2，因此你的测试应该会失败。


  另外，请记住将所有测试放在 *src/test/*… 目录下，而不是 *src/main/…* 目录下。


  ### 运行一个会失败的测试


