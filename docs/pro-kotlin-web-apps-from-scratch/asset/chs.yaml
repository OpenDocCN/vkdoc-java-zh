- "# 2. 搭建 Web 应用骨架\n\n> *看看我所有没在做的事情！*\n> \n> —David Heinemeier Hansson\n\n本章将赋予你超能力。你将完整地构建一个可运行的\
  \ Web 应用，包含路由、视图/模板和日志记录。你将为此后章节的内容奠定基础。只有你和你的 IDE，没有入门套件或框架。\n\n如果你是 Kotlin 新手，以下是本章中你会看到的语言特性示例：\n\
  \n*   Lambda 表达式\n\n*   命名参数\n\n此外，在本章中，你将学习以下关于创建 Web 应用的知识：\n\n*   搭建一个由 Ktor\
  \ 驱动、监听 4207 端口的 Web 服务器\n\n*   使用 SLF4J 和 Logback 进行日志设置，可通过标准的 *logback.xml* 配置\n\
  \n*   调整 Ktor，使其在应用程序抛出意外错误时显示有用的错误信息\n\n你将亲手连接所有这些组件，而不是让框架为你代劳。如果你以前只使用过框架，我真羡慕你。准备好迎接惊喜吧，你会发现完成这些工作所需的手动连接工作少得惊人。\n\
  \n## Web 服务器版 Hello, World！\n\n在第一章中，你编写了一个打印“Hello, World!”的小程序。现在是时候将其提升到新高度了：一个功能完备的\
  \ Web 应用，能够启动服务器、设置 URL 路由，并通过 HTTP 输出“Hello, World!”。\n\n### 选择 Ktor\n\n你需要一个库来处理\
  \ URL 路由并启动 Web 服务器来托管你的 Web 应用。本书将使用 Ktor。如果你愿意，以后可以将 Ktor 替换为其他库，在附录 A 中你将学习如何使用\
  \ Jooby 替代 Ktor。但在本书的其余部分，你编写的所有代码都将使用 Ktor。\n\nKtor 是 Kotlin 中最流行的 Web 应用路由库之一。它拥有构建生产级\
  \ Web 应用所需的一切，并且是用 Kotlin 编写的，因此使用起来既方便又强大，并能充分利用 Kotlin 为构建 Web 应用提供的所有相关特性。它还旨在实现高度可扩展和高性能，并已在大量真实世界的\
  \ Web 应用中经过实战检验。\n\n最重要的是，Ktor 是一个库，而不是框架。像 Spring Boot 这样的框架通常会自动启动 Web 服务器，并使用控制反转在数万行框架代码的深处调用你的代码。本书的重点是学习如何从头开始，亲手完成所有工作。\n\
  \n有趣的是，Ktor 将自己标榜为框架。对于库与框架的定义，并没有广泛接受的标准。我在本书中使用的定义是：框架会自动且隐式地为你做事，而库则在你明确指示之前不会做任何事情。Ktor\
  \ 恰好符合这个库的定义。\n\n### 添加 Ktor 库\n\n在 *build.gradle.kts* 的 `dependencies` 块中，将 Ktor\
  \ 添加为依赖项。Ktor 需要两个依赖项才能工作：服务器核心和特定的服务器实现（此处为 Netty）：\n\n```\ndependencies {\nimplementation(\"\
  io.ktor:ktor-server-core:2.1.2\")\nimplementation(\"io.ktor:ktor-server-netty:2.1.2\"\
  )\n}\n```\n\n提示\n\n更新 `build.gradle.kts` 后，记得在 IntelliJ 中刷新 Gradle 项目。使用当 Gradle\
  \ 尚未刷新更改时出现的小弹出窗口，或打开 Gradle 选项卡并点击刷新按钮。\n\nGradle 会自动下载这些依赖项，并使它们可用于你的代码。\n\n\n\
  \n### 启动 Web 服务器\n\n你需要在应用程序的入口点——`main` 函数中手动启动 Web 服务器。我们将不再仅仅打印“Hello, World!”，而是改为启动一个\
  \ Ktor Web 服务器。\n\n在代码清单 2-1 中，你可以看到启动一切所需的完整 `main` 函数。\n\n```\npackage kotlinbook\n\
  import io.ktor.server.application.*\nimport io.ktor.server.engine.*\nimport io.ktor.server.netty.*\n\
  import io.ktor.server.response.*\nimport io.ktor.server.routing.*\nfun main() {\n\
  embeddedServer(Netty, port = 4207) {\nrouting {\nget(\"/\") {\ncall.respondText(\"\
  Hello, World!\")\n}\n}\n}.start(wait = true)\n}\nListing 2-1\n在 src/main/kotlinbook/Main.kt\
  \ 的应用程序 main 函数中启动 Web 服务器\n```\n\n这段代码简洁明了。你创建了一个内嵌的 Ktor 服务器，它在底层使用 Netty 作为服务器实现，并在\
  \ 4207 端口启动。你设置了路由，即 HTTP 动词和路径匹配。每个路由都有一个生成 HTTP 响应的实现。最后，你启动了内嵌服务器。\n\n你不需要手动编写\
  \ `import` 语句。例如，当你输入 `embeddedSe` 并暂停时，IntelliJ IDEA 会建议 `embeddedServer`。如果你从下拉菜单中选择自动补全，IntelliJ\
  \ IDEA 还会自动添加 `import` 语句。\n\n为清晰起见，代码清单 2-1 包含了编译代码所需的所有 import 语句。在本书的剩余部分，除非存在歧义（例如，有两个同名的扩展函数但位于不同的包中），否则我将省略它们。\n\
  \n提示\n\n在 Java 平台上，即使你使用框架，内嵌 HTTP 服务器也是一种标准做法。像 Nginx 这样的代理，或者 Azure Web Apps、Amazon\
  \ Application Load Balancer 这样的云服务，会位于你应用程序中的内嵌 HTTP 服务器之前，负责处理 SSL、负载均衡和其他 Web\
  \ 服务器任务。在第 14 章中，你将学习如何构建一个不启动自身服务器，而是嵌入到 Tomcat 等应用服务器容器中的 servlet 风格的 WAR 文件。\n\
  \n### 提取到单独的函数\n\n目前，将路由提取到单独的函数并非绝对必要。但在本书后续部分，你将在多个不同的地方使用 Ktor 路由定义。因此，你需要将其作为一个可以从任何地方调用的独立函数，而不是将其锁定在\
  \ `embeddedServer` 调用中。\n\n在开源应用和 Ktor 文档本身中，将 Ktor 服务器配置分离到单独的函数也是一种常见做法，因此在自己的\
  \ Web 应用中遵循这些约定，可以使你的代码更具可读性。\n\n代码清单 2-2 展示了如何进行设置。\n\n```\nfun main() {\nembeddedServer(Netty,\
  \ port = 4207) {\ncreateKtorApplication()\n}.start(wait = true)\n}\nfun Application.createKtorApplication()\
  \ {\nrouting {\nget(\"/\") {\ncall.respondText(\"Hello, World!\")\n}\n}\n}\nListing\
  \ 2-2\n在独立的隔离函数中配置 Ktor\n```\n\n`createKtorApplication` 函数是一个扩展函数。你将在第 3 章中了解更多关于扩展函数的内容，但其要点是：`embeddedServer`\
  \ lambda 内部的 `\"this\"` 是 `io.ktor.server.application.Application` 的一个实例。通过将 `createKtorApplication()`\
  \ 设为 `Application` 的扩展函数，当它作为独立函数时，将拥有与内联在 `embeddedServer` lambda 内部时相同的 `\"this\"\
  ` 可用。\n\n### 使用 Lambda 表达式\n\nLambda 表达式在 Kotlin 中无处不在。事实上，你已经编写了几个。`embeddedServer`、`routing`\
  \ 和 `get` 这些函数都将 lambda 表达式作为参数。\n\nLambda 表达式是代码块，就像函数一样。它们使用花括号 `{` 和 `}` 创建。Lambda\
  \ 表达式与常规函数的主要区别在于，lambda 表达式没有名称，而函数有。\n\n提示\n\nLambda 表达式的另一个名称是*匿名函数*。Lambda 表达式和函数在语法上有一些差异（你将在本书中看到更多相关内容），但在逻辑上它们是相同的。\n\
  \nKotlin 中有一个约定，适用于将 lambda 表达式作为最后一个参数的函数。让我们以函数 `get` 为例进行说明。它接受两个参数：一个字符串，表示触发路由的路径；以及一个\
  \ lambda 表达式，其中包含当 Web 应用处理该路径上的请求时应执行的代码。调用 `get` 的一种方式如下：\n\n```\nget(\"/\", {\
  \ ... })\n```\n\n因为在 Kotlin 中，函数将 lambda 表达式作为最后一个参数非常常见，所以有一种更方便的方式将它们传递给函数。你可以将\
  \ lambda 表达式放在函数括号的后面，而不是放在括号内：\n\n```\nget(\"/\") { ... }\n```\n\n这对于*仅*接受一个 lambda\
  \ 表达式的函数特别有用。`routing` 函数就是一个例子。能够完全省略括号是很方便的。\n\nKotlin 程序员通常将 lambda 表达式放在括号外面。事实上，如果你将尾随\
  \ lambda 表达式放在括号内，IntelliJ IDEA 会默认显示警告。如果你愿意，可以禁用此警告，但如果你希望代码对其他程序员尽可能易读，遵循此约定是个好主意。\n\
  \n### 使用具名参数代替魔法数字和布尔值\n\n`start()` 函数只接受一个布尔值作为参数。`embeddedServer()` 函数接受服务器应使用的端口号。你可以像这样调用它们：\n\
  \n```\nembeddedServer(Netty, 4207) {\ncreateKtorApplication()\n}.start(true)\n```\n\
  \n以这种方式传递给函数的布尔值和数字通常被称为*魔法布尔值*和*魔法数字*。读者很难一眼看出传递给 `start()` 函数的布尔值是什么意思，以及传递给 `embeddedServer()`\
  \ 的第二个参数中的数字代表什么。\n\n为了更容易理解这些数字和布尔值的含义，你可以将它们作为*具名参数*传递：\n\n```\nembeddedServer(Netty,\
  \ port = 4207) {\ncreateKtorApplication()\n}.start(wait = true)\n```\n\n你不能随意命名它们。它必须与函数实现中参数的名称相同。\n\
  \n### 运行你的 Web 应用\n\n使用 IntelliJ IDEA 或 Gradle 运行你的应用程序。在浏览器中打开 *http://localhost:4207*，你的代码将礼貌地向你问好。你应该会看到如图\
  \ 2-1 所示的结果。看！你已经拥有一个可以运行的 Web 应用了。\n\n![](img/531928_1_En_2_Fig1_HTML.png)\n\n\
  一个 localhost 网页的截图。文本显示 Hello world!\n\n图 2-1\n\n你的 Web 应用已启动并运行，正在响应你代码中定义的端口\n\
  \n## 日志记录\n\n高质量的日志记录是生产级 Web 应用的关键组成部分。它可能决定你在生产环境中发生错误时能否找出问题所在。\n\n当你运行应用程序时，控制台会打印如图\
  \ 2-2 所示的错误消息。\n\n![](img/531928_1_En_2_Fig2_HTML.png)\n\n一个标题为 kotlinbook- main.kt\
  \ 的窗口截图。在 kotlin-book 下，.gradle 和 build 选项被高亮显示。右侧可以看到 8 行代码。下方，在 MainKt 下，显示了 4\
  \ 行。\n\n图 2-2\n\n应用程序运行时，SLF4J 发出错误消息\n\n在本节中，你将学习日志记录，并配置你的应用程序以输出来自第三方代码的有用信息，以及来自你自己代码的日志。\n\
  \n\n\n### Java 平台上的日志记录器\n\n在 Java 平台上进行日志记录时，有几个术语和概念需要了解。\n\n图 2-2 中的错误信息提到了一个叫做“SLF4J”的东西。SLF4J\
  \ 是一个*日志门面*。SLF4J 是 Simple Logging Façade for Java（Java 简单日志门面）的缩写。日志门面本身无法产生任何实际的日志输出；它只能接收日志语句。当你启动一个\
  \ Ktor 服务器时，Ktor 会尝试使用 SLF4J 日志记录器的实例来记录启动过程的信息。但因为你尚未配置日志记录，所以 SLF4J 会打印出图 2-2\
  \ 中看到的错误信息，以告知你 SLF4J 已收到日志语句但无法输出它们。\n\nJava 平台已标准化使用 SLF4J，各种库和框架都会引入 SLF4J 库并使用它来执行日志记录。\n\
  \n要看到实际的日志输出，你需要添加一个*日志实现*。有许多不同的实现可供选择。最广泛使用的是 Logback 和 Log4j。\n\nSLF4J 会在*类路径*中搜索日志实现。类路径是\
  \ Java 平台运行时可以找到来自你自己源代码以及第三方依赖项的所有编译代码的地方。SLF4J 会扫描类路径，查找类文件 *org/slf4j/impl/StaticLoggerBinder.class*。你选择的日志实现会提供这个文件，以便\
  \ SLF4J 能够找到它并进行连接。然后，SLF4J 会将其接收到的所有日志语句转发给日志实现，以便日志实现能够显示日志消息。\n\n*日志级别*是一个严重性级别的层次结构。一条日志语句总是有一个日志级别。可用的日志级别有：trace、debug、info、warning、error\
  \ 和 fatal。日志级别将调试输出和关于系统运行状态的信息与重要的警告和严重错误区分开来。\n\n你可以使用日志级别来区分代码不同部分的输出。例如，你可以告诉日志实现为某个特定模块使用\
  \ warning 级别。然后，日志级别层次结构会规定，它将隐藏 warning 级别以下的所有级别（trace、debug 和 info），唯一可见的日志消息将是\
  \ warning 级别及以上的消息（warning、error 和 fatal）。\n\n### 在你的 Web 应用中配置日志记录\n\n为了让你自己的代码以及第三方依赖项能够输出日志，你需要添加一个日志实现。在本书中，你将使用\
  \ Logback。你还需要配置 Logback，使其输出尽可能有用。\n\n要将 Logback 添加到你的 Web 应用，请将 Logback 和 SLF4J\
  \ 添加为依赖项。在 *build.gradle.kts* 中，将以下内容添加到已有的 `dependencies` 块中：\n\n```\ndependencies\
  \ {\nimplementation(\"ch.qos.logback:logback-classic:1.4.4\")\nimplementation(\"\
  org.slf4j:slf4j-api:2.0.3\")\n```\n\n提示\n\n你不必手动将 SLF4J 添加为依赖项。Ktor 已经依赖于 SLF4J，并且\
  \ Gradle 构建系统会使所有*传递性依赖*（即依赖项的依赖项）也对你的代码可用。但是，稍后你将直接调用 SLF4J 中的代码，并且良好的实践是在 *build.gradle.kts*\
  \ 中为你直接调用的所有代码添加直接依赖项。\n\n当你重新启动 Web 应用时，你将不再看到来自 SLF4J 的警告。相反，你会看到实际的日志输出，就像你在图\
  \ 2-3 中看到的那样。\n\n![](img/531928_1_En_2_Fig3_HTML.png)\n\n一张网页截图显示了实际的日志输出。\n\n图\
  \ 2-3\n\nLogback 用冗长的信息填充了你的日志，因为你尚未配置 Logback\n\n图 2-3 中可见的日志输出来自 Netty，即 Ktor\
  \ 使用的服务器实现。换句话说，你看到的是来自依赖项的依赖项的日志输出，距离你自己的代码有好几层。能够调查系统*所有*部分的运行状态，正是日志记录如此有用的原因。\n\
  \n设置日志实现最常见的方式是：对所有第三方代码使用 info 级别，对你自己的代码使用 debug 级别。来自第三方代码的 debug 级别日志语句通常不相关，除非你正在修改该代码，或者正在调试一个原因不明的问题。对于你自己的代码，debug\
  \ 级别的日志输出是真正相关的，因为你实际上正在积极地修改该代码。\n\n要配置 Logback，你需要将一个 XML 配置文件添加到 *src/main/resources/logback.xml*。清单\
  \ 2-3 展示了一个有效的 Logback 配置文件示例。\n\n```\n\n%d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level\
  \ %logger{36} - %msg%n\n\n清单 2-3\nLogback 配置，存储在 src/main/resources/logback.xml\
  \ 中\n```\n\n清单 2-3 中的 `<appender>` 告诉 Logback 将日志输出写到哪里。你可以告诉 Logback 写入文件，甚至发送电子邮件。在这里，你配置\
  \ Logback 简单地将日志输出写入控制台。这也是生产环境中最常见的配置，因为大多数生产环境都具备将控制台输出提供给开发人员的设施。\n\n清单 2-3 中的\
  \ `<root>` 记录器是 Logback 将用于所有没有特定记录器配置的代码（包括你自己的代码和第三方依赖项）的默认记录器。它被设置为 info 级别，这意味着\
  \ Logback 只会显示 info、warn、error 和 fatal 级别的语句。\n\n清单 2-3 中的语句 `<logger name=\"kotlinbook\"\
  \ level=\"DEBUG\"/>` 为所有来自 `kotlinbook` 的日志语句覆盖了 `<root>` 记录器的设置。这意味着 Logback 将为你自己的代码显示\
  \ debug 级别及以上的所有日志语句。\n\n图 2-4 展示了在你添加了 Logback XML 配置文件后，日志输出的样子。\n\n![](img/531928_1_En_2_Fig4_HTML.png)\n\
