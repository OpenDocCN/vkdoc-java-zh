- '# 12. 构建并部署到无服务器环境


  在本章中，你将学习如何获取当前在 Ktor 中运行的现有处理器，并在无服务器环境中（无需 Ktor）调用它们。


  在本章中，你将学习以下关于构建和部署到无服务器环境的内容：


  *   设置 Java 运行时标志以优化启动时间

  *   Java 运行时类加载和性能特性的复杂细节

  *   AWS Lambda 如何执行你的代码

  *   无服务器环境中重要的成本节约技巧


  关于整章的一个重要声明是：我在使用 AWS 和 Node.js 的无服务器架构方面拥有丰富的经验。同时，我在生产环境中运行基于 Java 平台的 Web 应用方面也拥有丰富的经验。但我从未真正将基于
  Java 的 Web 应用部署到无服务器环境中。所以请记住这一点，并将本章作为入门指南，而非来自经验丰富的 Java + 无服务器专家的精炼建议。


  ## 解耦你的代码


  当你在无服务器环境中运行代码时，你将完全不会使用 Ktor。考虑到本书前面的章节都在介绍如何设置 Ktor 的各个方面以使你的 Web 应用按预期工作，那么这该如何实现呢？


  ### 将处理器与 Ktor 分离


  到目前为止，在本书中，你编写的大多数 Web 处理器都将 Ktor 特定的路由定义和该 Web 处理器的实际实现放在了同一个代码块中：


  ```

  get("/foo", webResponse {

  // 执行某些操作 ...

  JsonWebResponse(mapOf("success" to true))

  })

  ```


  不过，有一个明显的例外。在第 8 章中，你将 `handleCoroutineTest` 编写为一个独立的函数，并从 Ktor 处理器中调用它：


  ```

  get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

  handleCoroutineTest(dbSess)

  })

  suspend fun handleCoroutineTest(

  dbSess: Session

  ) = coroutineScope {

  // ...

  TextWebResponse("...")

  }

  ```


  在实际的 Web 应用中，你会将大部分 Web 处理器分离到独立的函数中。


  本书有意忽略了代码组织，除了没有将路由定义与处理器实现分离之外，你还将所有内容都写在一个庞大且无组织的 `Main.kt` 文件中。这对于一本书来说是可以接受的，因为其主要目标是避免试图通过文字解释哪个文件应该包含什么内容所带来的摩擦和困惑。但是，当你编写自己的
  Web 应用时，你应该将代码拆分到多个文件中。




  ### 基本结构


  我通常遵循的结构是，`Main.kt` 负责所有引导工作、加载配置文件以及启动服务器，就像本书中一样。它还将所有 Web 处理程序的路由声明放在一个文件中，但不包含这些路由的*实现*。因此，它通常看起来像这样：


  ```

  fun main() {

  val config = createConfig(...)

  val dataSource = createAndMigrateDataSource(config)

  val stuff = createStuff(config)

  embeddedServer(Netty, port = config.httpPort) {

  createKtorApplication()

  }

  }

  fun Application.createKtorApplication(

  dataSource: DataSource

  ) {

  routing {

  get("/foo", webResponse(::handleGetFoo))

  get("/bars", webResponseDb(dataSource, ::handleGetBars))

  get("/bars/{id}", webResponseDb(dataSource) { dbSess ->

  handleGetBar(dbSess, call.parameters["id"])

  })

  post("/bars", webResponseTx(dataSource) { txSess ->

  handleCreateBar(

  txSess,

  Gson().fromJson(call.receiveText(), Map::class.java)

  )

  })

  // ...

  }

  }

  ```


  各个处理函数对 Ktor 一无所知，它们只处理普通数据的组合，例如来自 JSON 解析的 `Map` 和来自 Ktor 的、与 ID 路径参数对应的 `String`。


  将所有路由放在一个文件中可以使代码更易于阅读。调试 Web 应用程序的过程通常是，你看到一个发往某个 URL 的请求，而你需要做的第一件事就是弄清楚，当给定 URL
  被调用时，Web 应用程序中运行的是哪段代码。


  出于这个原因，无论我使用的是 Ktor 还是其他完全不同的路由库（或编程语言），我都倾向于避免使用我所谓的“路径前缀包装器”。例如，Ktor 允许你像这样用路径前缀包装路由：


  ```

  routing {

  get("/foo", webResponse(::handleGetFoo))

  route("/api") {

  get("/version", webResponse(::handleGetApiVersion))

  post("/order", webResponseTx(dataSource) { txSess ->

  handleCreateOrder(txSess, call.receiveText())

  })

  }

  }

  ```


  如果你的路由集合很小，这种方法没问题。但随着你的 Web 应用程序的增长，能够在项目中搜索 `"/api/order"` 并立即找到与该路径对应的代码，可以节省时间。因此，我更喜欢使用声明所有
  Web 处理程序完整路径的样板代码：


  ```

  routing {

  get("/foo", webResponse(::handleGetFoo))

  get("/api/version", webResponse(::handleGetApiVersion))

  post("/api/order", webResponseTx(dataSource) { txSess ->

  handleCreateOrder(txSess, call.receiveText())

  })

  }

  ```


  在这里，你的 Web 应用程序支持的所有路径都存在于代码库中，这使得你的代码更加明确和可读，代价是需要手动重复嵌套的路径段。


  ### 解耦的 Web 处理程序


  我在关于部署到无服务器环境的章节中讨论这个问题的原因是，将你的处理程序分离为普通函数，正是使你能够在无服务器环境中轻松运行 Web 处理程序的关键。


  当你以函数式风格编写 Web 处理程序时，即作为接收输入作为参数并返回 `WebResponse` 的普通 Kotlin 函数，你就拥有了在任何环境中运行业务逻辑的灵活性，而不仅仅是
  Ktor。


  在前面的示例中，函数 `handleCreateOrder` 和 `handleGetFoo` 都是对数据进行操作、返回数据且对 Ktor 一无所知的普通 Kotlin
  函数。


  唯一知道 Ktor 的地方是你的 `Main.kt` 文件和你的路由。这很合理，因为你无论如何都会在该文件中大量使用 Ktor。`Main.kt` 充当了你选择的路由库和你的业务逻辑之间的映射层，而业务逻辑对其运行的环境一无所知。


  ## 在 AWS Lambda 上运行 Web 处理程序


  要在无服务器环境中运行你的 Web 处理程序，你将使用 AWS Lambda。这里的大多数步骤在逻辑上与其他云提供商（如 Google Cloud Platform
  和 Azure）相同。主要区别仅在于系统各个组件的连接方式和命名。所以，不要将此视为对 AWS Lambda 优于其他云提供商的认可；这主要只是基于我最熟悉的云提供商而做出的随机选择。


  ### 创建 AWS Lambda Web 处理程序


  目前，你从 Ktor 路由定义中调用你的 Web 处理程序。为了在 AWS Lambda 上运行它们，你需要将你的 Web 处理程序包装在 AWS Lambda
  知道如何执行的东西中。


  在本章中，你唯一要做的事情就是在 AWS Lambda 上调用你的 Web 处理程序。通常，你会使用 AWS API Gateway 进行路由和身份验证，并设置单独的
  API Gateway 路由来调用运行实际处理程序代码的正确 Lambda 函数。不过，设置这些内容超出了本书的范围。


  第一步是将所需的依赖项添加到 *build.gradle.kts* 中：


  ```

  implementation("com.amazonaws:aws-lambda-java-core:1.2.1")

  ```


  这个库包含了编写 AWS Lambda 可以调用的 Kotlin 代码所需的包装代码。AWS Lambda 和 Java 平台的本质是，你像为传统的基于服务器的环境打包一样，将代码打包成
  JAR 文件。然后，你的 JAR 文件包含代表各个 Lambda 处理程序的特殊类。这些类继承自 `com.amazonaws.services.lambda.runtime.RequestHandler`，这赋予了它们
  AWS Lambda 知道如何调用和处理返回值的签名。


  为了将你现有的代码与 AWS Lambda 环境分离，你将创建一个新文件 *MainServerless.kt*。在这个文件中，你将包含所有 AWS Lambda
  处理程序，以及在 AWS Lambda 环境中引导代码运行所需的代码。清单 12-1 展示了如何做到这一点。


  ```

  import com.amazonaws.services.lambda.runtime.Context

  import com.amazonaws.services.lambda.runtime.RequestHandler

  class GetTestHelloWorld :

  RequestHandler

  {

  override fun handleRequest(

  input: Any?,

  context: Context

  ): String {

  return Gson().toJson(mapOf(

  "statusCode" to 200,

  "headers" to mapOf("contentType" to "text/plain"),

  "body" to "Hello, World!"

  ))

  }

  }

  清单 12-1

  使用基本的 AWS Lambda 处理程序设置 MainServerless.kt

  ```


  你的 AWS Lambda 处理程序类实现了 `RequestHandler` 接口，并返回一个包含 JSON 内容的 `String`。AWS Lambda
  本身不对其输出进行任何验证。你在 `GetTestHelloWorld` 中使用的 JSON 格式是 AWS API Gateway 在调用 Lambda 处理
  Web 请求时所期望的格式。因此，如果你设置了 API Gateway 来调用你的 Lambda，但忘记包含 `"statusCode"` 或返回非 JSON
  输出，API Gateway 会报错。但是，稍后当你手动调用 Lambda 处理程序进行测试时，对 Lambda 处理程序的输出格式没有要求。




