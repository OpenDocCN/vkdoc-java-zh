- fmt: '### Writing a Failing Test


    To check that you configured everything correctly, you’ll implement the automated
    test equivalent of printing `Hello, World`.


    Notifying you of errors is a vital part of a correctly configured automated testing
    setup. So the first step is to deliberately write a failing test and verify that
    your programming environment notifies you of failing tests. Listing [7-2](#531928_1_En_7_Chapter.xhtml#PC2)
    shows how you’ll write a failing test.


    ```

    package kotlinbook

    import kotlin.test.Test

    import kotlin.test.assertEquals

    class UserTest {

    @Test

    fun testHelloWorld() {

    assertEquals(1, 2)

    }

    }

    Listing 7-2

    A test class in src/test/kotlin/kotlinbook/UserTest.kt with one test case that
    fails on purpose

    ```


    Your test uses `assertEquals` with two different values to ensure a failed test.
    1 is never equal to 2, so your test should fail.


    Also, remember to put all your tests in `src/test/…` and not in `src/main/…`.


    ### Running a Failing Test


    Now that you have a test case with a test that deliberately fails, the next step
    is to run your test.


    There are two main ways of running tests. The first is to run a single test directly
    from IntelliJ IDEA. To do that, click the green arrow next to the name of the
    test class, and IntelliJ IDEA will execute it, as seen in Figure [7-1](#531928_1_En_7_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_7_Chapter/531928_1_En_7_Fig1_HTML.png)


    A screenshot of a window titled kotlin book-User test.kt. The dot gradle and build
    options are highlighted. 8 lines of code and test results are on the right panel.


    Figure 7-1


    Output from running a single test class with IntelliJ IDEA


    Running a single test class like this is particularly useful when your test suite
    has grown to hundreds or thousands of tests, but you only want to run the specific
    one that you’re working on right now.


    Also note that you can run a single test function, by clicking the green arrow
    next to it, for complete granular control of which tests you want to run.


    It’s also vital to know how to run all your tests in one go. Before you push code
    to production, you should run all the tests first, to verify that you didn’t break
    anything. An automated build environment will also typically run all your tests
    every time someone pushes new code.


    To run all your tests in one go, open the Gradle control panel in the right sidebar,
    and navigate to `kotlinbook ➤ Tasks ➤ verification ➤ test`. Double-click to run
    that task and execute all the tests in your test suite, as seen in Figure [7-2](#531928_1_En_7_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_7_Chapter/531928_1_En_7_Fig2_HTML.png)


    A screenshot of a window titled kotlin book-User test dot kt. Lines of code and
    test results are on the right panel. Test option is selected in the gradle panel.


    Figure 7-2


    Output from running your entire test suite with Gradle


    As Figures [7-1](#531928_1_En_7_Chapter.xhtml#Fig1) and [7-2](#531928_1_En_7_Chapter.xhtml#Fig2)
    signify, you’ve now verified successfully that your setup lets you know when a
    test is failing.


    ### Making the Test Pass


    The next step is to make the test pass. You’ve asserted that 1 is equal to 2,
    and while it can be useful to rethink fundamentals every now and then, Russell
    and Whitehead carefully concluded in Principia Mathematica, after 379 pages of
    dense mathematical notation, that 1 + 1 = 2 and noted that “The above proposition
    is occasionally useful.” So we’ll let Kotlin have the win on this one and move
    forward with the assumption that 1 is indeed not equal to 2.


    To make the test pass, update it to contain two values that are equal. Listing
    [7-3](#531928_1_En_7_Chapter.xhtml#PC3) shows an example of how to do that.


    ```

    class UserTest {

    @Test

    fun testHelloWorld() {

    assertEquals(1, 1)

    }

    }

    Listing 7-3

    Update testHelloWorld in UserTest to make it pass

    ```


    Run the tests again, and you’ll see IntelliJ IDEA telling you that all your tests
    passed successfully, as seen in Figure [7-3](#531928_1_En_7_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_7_Chapter/531928_1_En_7_Fig3_HTML.png)


    A screenshot of a window titled kotlinbook-Usertest.kt. The .gradle and build
    options are highlighted. On the right, 8 lines of code are exhibited. Below the
    test results are observed.


    Figure 7-3


    Output from running your test suite with no failed assertions


    IntelliJ IDEA makes it easy to see that no tests failed, as it only lists failed
    tests. So, when the test output panel only shows “Test Results” and a green check
    mark, you know that everything is good and that all of your tests ran successfully,
    without any assertion errors.


    ## Writing Web App Tests


    Verifying that 1 is indeed equal to 1 has limited value in the context of writing
    web apps. You’ll now write some tests that help ensure that your web app works
    correctly.


    ### Setting Up the Basics


    The goal of an automated test is to invoke your business logic with specific given
    parameters and specific given contexts and assert that your system ends up in
    a desired state. For most of your business logic to work, you need two things:
    a `WebappConfig` object and a database connection pool.


    The simplest way to make your config and your database connection pool available
    to your tests is to declare them as top-level variables. In Kotlin, you can place
    `val` statements outside of classes and function implementations, at the top level.
    These values will be available to all functions from all contexts in that file
    and even to other files unless you explicitly tag them as `private`. Listing [7-4](#531928_1_En_7_Chapter.xhtml#PC4)
    shows an example of how to create a config object and a database connection pool
    this way.


    ```

    val testAppConfig = createAppConfig("test")

    val testDataSource = createAndMigrateDataSource(testAppConfig)

    Listing 7-4

    Top-level declarations of config and a database connection pool for use in automated
    tests

    ```


    As you already have functions available for creating new instances of your config
    and connection pool, there’s nothing special you need to do when you create them
    for your tests. You simply invoke them, and you get what you need.


    Before you run this code, you need to add a missing config file. When you invoke
    `createAppConfig` with `"test"`, it expects to find the file `src/main/resources/app-test.conf`
    and uses it to load config values. Listing [7-5](#531928_1_En_7_Chapter.xhtml#PC5)
    shows what this file should look like and what it needs to contain for your tests
    to run correctly.


    ```

    dbUser = ""

    dbPassword = ""

    dbUrl = "jdbc:h2:mem:kotlinbook;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

    Listing 7-5

    The contents of the file src/main/resources/app-test.conf

    ```


    Note that the purpose of using the PostgreSQL mode is not to perfectly emulate
    PostgreSQL. H2 is not able to do that, and you can’t expect your H2 SQLs to run
    perfectly in PostgreSQL. The purpose of setting the PostgreSQL mode is to set
    a collection of properties in one fell swoop and make H2 more convenient to work
    with than it is out of the box in the vanilla mode.


    This config file contains the same as `app-local.conf`, which is database config
    that sets your data source up to use an in-memory H2 database. In a real-world
    web app, it’s likely that you’ll run against a real database, so it’s useful to
    be able to separate the config for your local development database and the database
    that your automated tests will use.'
