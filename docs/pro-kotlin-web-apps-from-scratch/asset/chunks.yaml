    ### Java 平台实现细节


    如果你*真的*想深入探究，可以查看生成的字节码。


    如果你使用 IntelliJ IDEA，可以在 *build/classes/kotlin/main* 文件夹中打开一个类文件，并使用 *Tools ➤ Kotlin
    ➤ Decompile to Java* 功能。这段代码可能不太易读，但你能确切看到 Kotlin 编译器是如何从挂起函数生成兼容 Java 平台的代码的。代码清单
    8-13 展示了代码清单 8-12 中 `createContinuation` 函数编译输出的完整示例。


    ```

    Int label;

    public final Object invokeSuspend(@NotNull Object $result) {

    label17: {

    Object var2 = IntrinsicsKt.getCOROUTINE_SUSPENDED();

    Continuation var10000;

    switch (this.label) {

    case 0:

    ResultKt.throwOnFailure($result);

    System.out.println("a");

    var10000 = (Continuation)this;

    this.label = 1;

    if (ContinuationTestKt.haltHere(var10000) == var2) {

    return var2;

    }

    break;

    case 1:

    ResultKt.throwOnFailure($result);

    break;

    case 2:

    ResultKt.throwOnFailure($result);

    break label17;

    default:

    throw new IllegalStateException("call to ''resume'' before ''invoke'' with coroutine");

    }

    System.out.println("b");

    System.out.println("c");

    var10000 = (Continuation)this;

    this.label = 2;

    if (ContinuationTestKt.haltHere(var10000) == var2) {

    return var2;

    }

    }

    System.out.println("d");

    return Unit.INSTANCE;

    }

    代码清单 8-13

    createContinuation 函数编译输出的完整示例

    ```


    这段代码充满了你在普通 Java 代码中通常看不到的东西，比如标签块和带标签的 break（`label17` 这类东西）。但它很好地演示了 Kotlin
    如何设法不阻塞线程。它将 `createContinuation` 中线性的 Kotlin 代码编译成一个硬编码的状态机。初始的 `case 0` 首先打印
    `"a"`，将 `label` 状态从 `0` 步进到 `1`，然后返回一个 continuation 对象 `var2`。下次 Kotlin 调用该 continuation
    时，`case 1` 运行，它什么都不做，然后继续执行 case 语句下面的代码，即打印 `"b"` 和 `"c"`，并将 `label` 状态设置为 `2`。在下一次调用时，`case
    2` 运行，它只是跳出整个 `label17` 块，然后继续执行其下方的代码，即打印 `"d"`。Kotlin 在这种情况下不会改变状态机，这就是为什么在
    continuation “完成”后多次调用它时，会反复打印出 "d"，如代码清单 8-12 末尾所示。


    这段代码并非地道的 Java 代码，但这并不重要。地道的 Java 是为人类设计的，而不是为计算机。你将阅读和编写的是 Kotlin 代码，而这个编译输出只是为了能让
    Kotlin 自动将你看起来同步的代码转换为异步代码，使得运行时可以在代码中预编译的点中断和恢复（或继续）执行。


    我发现，深入理解协程底层真正发生的事情确实很有帮助。将同步语句转换为 Kotlin 可以中断和恢复的状态机，正是实现高性能异步 `kotlinx.coroutines`
    以及 Arrow 能够在某些状态发生后暂停代码执行而无需诉诸异常的关键。


    通过将你看起来线性的 Kotlin 代码编译成状态机，你可以编写出漂亮的代码，既无需阻塞线程，也无需自己编写像代码清单 8-13 那样的代码。


    # 9. 使用 HTML 和 CSS 构建传统 Web 应用


    在本章中，你将学习如何在服务器端生成 HTML，以及如何设置你的 Web 应用以提供 CSS、图片和其他静态内容。


    你还将设置身份验证和登录表单，并增强现有的 `user_t` 表以支持生产级密码安全和加密。


    如果你是 Kotlin 新手，以下是你将在本章中看到的一些语言特性示例：


    *   安全调用运算符


    *   运算符重载


    *   使用领域特定语言（DSL）


    *   关于扩展函数优先级规则的细节


    *   对象表达式


    此外，在本章中，你将学习以下关于使用 HTML 和 CSS 构建传统 Web 应用的内容：


    *   使用 `kotlinx.xhtml` ([*https://github.com/Kotlin/kotlinx.xhtml*](https://github.com/Kotlin/kotlinx.xhtml))
    DSL 构建 HTML


    *   制作可复用的布局


    *   用户登录和身份验证


    *   加密和签名会话 Cookie


    *   对用户密码进行哈希处理和安全存储


    完成后，你将拥有一个完全可用的基于 HTML 的设置，其中包含构建生产级 Web 应用所需的所有组件。


    ## 模式与组织


    有许多框架和库可用于制作传统的服务器端 Web 应用，也有许多组织和构建它们的方式。


    我预先假设你想在服务器端生成静态 HTML，而不需要任何额外功能。例如，JavaScript 框架 Next.js ([*https://nextjs.org/*](https://nextjs.org/))
    的设置方式是，你基于 React 的 Web 应用会自动在服务器端渲染并*水合*，这意味着预先生成的服务器端 HTML 会被“更新”成一个功能完备的 JavaScript
    单页应用（SPA）。在本章中，你只会从一个 Kotlin 驱动的 Web 应用后端生成“哑”HTML。


    还有一些框架，比如 Vaadin ([*https://vaadin.com/*](https://vaadin.com/))，它是一个全栈解决方案，捆绑了
    UI 组件、内置 CMS 等。这是一个框架，而不是一个库，因此不适合本书。而且，本书也不会构建任何复杂的用户界面；你只会学习如何设置基础知识，因此不需要 UI
    组件。


    至于代码结构，我认为这超出了本书的范围。主要目标是教你如何使用库，并在此过程中学习大量 Kotlin 知识。代码组织这个话题很快就会变得主观且基于个人观点，我认为我从未参与过一个现实世界的
    Web 应用，其结构总是合理的，并且代码库的每个组件都有合适的位置。事实上，我经常有一个名为 `myapp.homeless` 之类的命名空间，故意把那些难以找到合适归属的东西放进去。


    ## 生成 HTML


    在本节中，你将学习生成 HTML 的基本知识，以及如何从 Kotlin 和 Ktor 中生成 HTML。


    ### 使用 `kotlinx.xhtml` DSL


    你将使用 `kotlinx.xhtml` *DSL*（领域特定语言）来生成 HTML。Ktor HTML DSL 插件在 `kotlinx.xhtml` 周围添加了一个小的封装层，使其易于从
    Ktor Web 处理器中使用。


    DSL 是一种语言中的语言。Kotlin 拥有构建 DSL 的强大功能，使用 `kotlin.xml` DSL 意味着你可以将所有 HTML 表达为纯 Kotlin
    代码。如果你需要循环、条件判断、变量和其他功能，你可以直接编写纯 Kotlin 代码。在编写 HTML 时拥有 Kotlin 的全部功能是一个巨大的优势。Ktor
    也支持各种模板引擎，如 Mustache、FreeMarker 等。但所有这些引擎的缺点是需要为循环、条件判断等使用单独的模板语言。


    此外，`kotlinx.xhtml` 易于在 Ktor 之外使用，这在后续章节中当你需要在各种上下文中运行 Web 处理器时会派上用场。

