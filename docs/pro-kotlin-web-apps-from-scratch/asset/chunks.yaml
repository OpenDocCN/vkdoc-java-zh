    }

    }

    Listing 7-9

    A helper function that wraps a test case in a database transaction

    ```


    By placing the call to `rollback()` inside the `finally` block, you ensure that
    no matter what happens in your test, your database always rolls back any changes
    that you made to the database in your test case.


    You also need to update your test cases to use the new `testTx` helper function.
    Listing [7-10](#531928_1_En_7_Chapter.xhtml#PC12) shows how you can write your
    tests and wrap them in `testTx` so that you don’t get any leakage between your
    tests.


    ```

    @Test

    fun testCreateUser() {

    testTx { dbSess ->

    val userAId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    val userBId = createUser(dbSess,

    email = "august@augustl.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    assertNotEquals(userAId, userBId)

    }

    }

    @Test

    fun testCreateAnotherUser() {

    testTx { dbSess ->

    val userId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    // ... write some assertions here ...

    }

    }

    Listing 7-10

    Wrap your test cases at src/test/kotlinbook/UserTest.kt in testTx to avoid data
    leaks between individual test cases

    ```


    Run your tests again, and you won’t get an error. That’s because `testTx` rolls
    back the writes in each test before the other ones run, so even though you create
    both users with the same email, there’s no conflict.


    I also prefer to explicitly write `testTx` for every test that needs that functionality,
    instead of figuring out some clever way to automatically wrap all test cases in
    a database transaction. It adds some boilerplate, but you also gain the ability
    to easily see what goes on in your tests and how your tests interact with the
    database. Additionally, you might encounter cases in real-world projects where
    you want to write a test that you don’t wrap in a transaction. For example, you
    might want to test how two different transactions might interact with one another
    in your business logic. All you must do in those cases is to simply not use `testTx`
    and instead do what’s appropriate for that specific test case.


    ### Avoiding Leaks with Relative Asserts


    To demonstrate another issue with automated tests, absolute asserts, you’ll implement
    a function that lists all the users in your web app.


    For some type of tests, it might make sense to make absolute asserts. For example,
    next up, you’ll implement and test a function that lists all the users in the
    system. Listing [7-11](#531928_1_En_7_Chapter.xhtml#PC13) shows the implementation
    of that listing function.


    ```

    fun listUsers(dbSession: Session) =

    dbSession

    .list(queryOf("SELECT * FROM user_t"), ::mapFromRow)

    .map(User::fromRow)

    Listing 7-11

    A function to list all users in the system

    ```


    You can then write a test, seen in Listing [7-12](#531928_1_En_7_Chapter.xhtml#PC14),
    that inserts two users in the system and asserts that it contains the two users
    you created and that the number of users it returns is 2.


    ```

    @Test

    fun testListUsers() {

    testTx { dbSess ->

    val userAId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234")

    val userBId = createUser(dbSess,

    email = "august@augustl.com",

    name = "August Lilleaas",

    passwordText = "1234")

    val users = listUsers(dbSess)

    assertEquals(2, users.size)

    assertNotNull(users.find { it.id == userAId })

    assertNotNull(users.find { it.id == userBId })

    }

    }

    Listing 7-12

    A test with absolute asserts for creating and listing users

    ```


    You might be surprised to see that this test does not pass. In Chapter [6](#531928_1_En_6_Chapter.xhtml),
    you wrote a repeatable migration that inserts a user into `user_t`. So the number
    of users in your system after you insert two users is 3, not 2.


    One way to solve this is to simply remove `assertEquals(2, users.size)`. You assert
    that `userAId` and `userBId` are both present in the result of `listUsers()` and
    you can argue that that’s enough.


    Another way of solving this is to use relative asserts. You could argue that you
    don’t care that `listUsers()` returns exactly two results. Another correct definition
    of `listUsers()` is that the number of users returned should increase by 2 after
    you create two users. Listing [7-13](#531928_1_En_7_Chapter.xhtml#PC15) updates
    the test from Listing [7-12](#531928_1_En_7_Chapter.xhtml#PC14) with a check for
    the relative difference before and after you create the users.


    ```

    @Test

    fun testListUsers() {

    testTx { dbSess ->

    val usersBefore = listUsers(dbSess)

    val userAId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234")

    val userBId = createUser(dbSess,

    email = "august@augustl.com",

    name = "August Lilleaas",

    passwordText = "1234")

    val users = listUsers(dbSess)

    assertEquals(2, users.size - usersBefore.size)

    assertNotNull(users.find { it.id == userAId })

    assertNotNull(users.find { it.id == userBId })

    }

    }

    Listing 7-13

    A test with relative asserts for creating and listing users

    ```


    With this change, the test only cares about the changes it made to the system
    and is not dependent on the specific state of the system before the test started
    running.


    ## Test-Driven Development


    So far in this chapter, you’ve written tests using Test-Driven Development (TDD).
    That means that you’ve first written a test that failed and then you updated your
    implementation and finally made the test pass successfully.


    ### Design and Verification


    Test-Driven Development has two main benefits: it helps with the design of your
    system, and it verifies that your tests are doing useful things.


    By writing the tests first, alongside your implementation code, you gain an extra
    tool for making sure that your code is well-structured. The design of your tests
    directly informs the design of your implementation code. Writing tests becomes
    cumbersome if you must wire up too many dependencies and state before you can
    interact with your classes and functions. So, by writing the tests first, as you
    work with your implementation, you’re almost forced to make your code modular
    and reusable, reducing complexity and increasing maintainability.


    Tests also have the fundamental problem “Who tests my tests?” Having tests to
    verify that your system works is good, but how do you know that your tests do
    useful things? Writing a failing test first helps solve this issue. That way,
    you make sure that all your test cases have a valid failure state and will fail
    if your implementation does not work as expected. If your test passes on the first
    invocation, you know that your test doesn’t verify anything.


    There are entire books written about the TDD methodology, so I won’t go into more
    detail here. If you’re interested in learning more, I recommend Kent Beck’s book
    *Test-Driven Development by Example*, originally published all the way back in
    2002\. It’s a timeless classic, and you’ll learn a lot about software development
    practices by reading it or anything else Kent Beck has produced.'
