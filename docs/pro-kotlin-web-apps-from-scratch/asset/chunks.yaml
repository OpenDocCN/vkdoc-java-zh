    When you have a Docker image that you can run, the next step is to use that Docker
    image and run it in production.


    Explaining how to set up a fully working production environment is outside of
    the scope of this book. Instead, I’ll give you a general overview of the pieces
    you need that are common to all production environments.


    The most common way to run Docker images in production on your own servers is
    to use Docker Swarm ([*https://dockerswarm.rocks/*](https://dockerswarm.rocks/)),
    Kubernetes ([*https://kubernetes.io/*](https://kubernetes.io/)), or Apache Mesos
    ([*https://mesos.apache.org/*](https://mesos.apache.org/)). All these solutions
    can run multiple instances in parallel, with load balancers in front that direct
    traffic dynamically to your multiple instances, automatically kill unhealthy instances,
    and so on.


    You need to set a collection of environment variables for your production setup.
    You’ll need to set `KOTLINBOOK_ENV` to `production` so that your web app loads
    the environment variable–based *app-production.conf* setup. You can set `KOTLINBOOK_HTTP_PORT`,
    if you want to use a different HTTP port than the default `4207` from *app.conf*.
    Then, you’ll need to update *app-production.conf* so that it points to environment
    variables for all your config properties, instead of pointing to the default null
    values in *app.conf*. For example, `dbUrl` should point to an environment variable
    like `KOTLINBOOK_DB_URL`, `dbPassword` should point to `KOTLINBOOK_DB_PASSWORD`,
    and so on.


    You also need some way of setting environment variables and managing secrets.
    If you use Kubernetes, you can use Helm and Helm Secrets ([*https://github.com/jkroepke/helm-secrets*](https://github.com/jkroepke/helm-secrets))
    to encrypt secrets at rest and manage environment variables in your Kubernetes
    cluster.


    You’ll also need a Docker image registry. For example, if you use managed Kubernetes
    on Azure, you’ll get access to a managed registry at *myapp.azurecr.io*. When
    you build Docker images that you’ll deploy in Kubernetes, you’ll run `docker push
    kotlinbook:latest`, where the name `kotlinbook:latest` refers to a tag that you
    assigned when you ran `docker build`. You’ll then configure your Kubernetes cluster
    to pull images from the Azure container registry at *myapp.azurecr.io* and always
    deploy the tag `kotlinbook:latest` when you run `kubectl rollout restart` to recreate
    your running pods.


    If you don’t need a multi-node cluster setup, you can also use Docker to run a
    single instance of an image on a single virtual or physical server. If you SSH
    into your server and start up your Docker image using the command `docker run
    –restart=always -d kotlinbook`, Docker will automatically start your Docker image
    when your server reboots. This also restarts if the `java -jar` process you start
    with the `CMD` in your *Dockerfile* crashes.


    # 12. Building and Deploying to Serverless Environments


    In this chapter, you’ll learn how to take your existing handlers that you currently
    run in Ktor and invoke them in a serverless environment, without Ktor.


    In this chapter, you’ll learn the following about building and deploying to a
    serverless environment:


    *   Setting Java runtime flags to optimize startup time


    *   Intricate details about the Java runtime class loading and performance characteristics


    *   How AWS Lambda executes your code


    *   Important cost-saving tips in serverless environments


    An important disclaimer about this whole chapter is that I have extensive experience
    with serverless architectures using AWS and Node.js. And I have extensive experience
    with running Java platform web apps in production. But I’ve never actually deployed
    a Java-based web app to a serverless environment. So keep that in mind, and use
    this chapter as a guide to get started and not distilled advice from a seasoned
    Java + serverless expert.


    ## Detaching Your Code


    When you run your code in a serverless environment, you won’t be using Ktor at
    all. How will that work, seeing how the preceding chapters in this book are all
    about setting up various aspects of Ktor to make your web app do what it’s supposed
    to?


    ### Separating Handlers from Ktor


    So far in this book you’ve written most of your web handlers with the Ktor-specific
    route definition and the actual implementation of that web handler in the same
    block of code:


    ```

    get("/foo", webResponse {

    // Do something ...

    JsonWebResponse(mapOf("success" to true))

    })

    ```


    There’s one notable exception, though. In Chapter [8](#531928_1_En_8_Chapter.xhtml),
    you wrote `handleCoroutineTest` as a standalone function that you call from a
    Ktor handler:


    ```

    get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

    handleCoroutineTest(dbSess)

    })

    suspend fun handleCoroutineTest(

    dbSess: Session

    ) = coroutineScope {

    // ...

    TextWebResponse("...")

    }

    ```


    In a real-world web app, you’ll separate most of your web handlers into separate
    functions.


    This book has purposefully glossed over code organization, and in addition to
    not separating the route definition from the handler implementation, you’ve written
    everything inside one huge and unorganized `Main.kt` file. That’s fine for a book,
    where the main goal is to avoid the friction and confusion induced by trying to
    textually explain which file should contain what. But when you write your own
    web apps, you should split your code between multiple files.'
  trans: '

    ### 部署到生产环境


    当你拥有一个可运行的 Docker 镜像后，下一步就是使用该镜像并将其部署到生产环境中。


    如何搭建一个完整可用的生产环境超出了本书的讨论范围。相反，我将为你概述所有生产环境通用的必要组件。


    在你自己的服务器上运行 Docker 镜像最常见的方式是使用 Docker Swarm ([*https://dockerswarm.rocks/*](https://dockerswarm.rocks/))、Kubernetes
    ([*https://kubernetes.io/*](https://kubernetes.io/)) 或 Apache Mesos ([*https://mesos.apache.org/*](https://mesos.apache.org/))。所有这些解决方案都可以并行运行多个实例，前端通过负载均衡器动态地将流量分发到你的多个实例，自动终止不健康的实例，等等。


    你需要为生产环境设置一组环境变量。你需要将 `KOTLINBOOK_ENV` 设置为 `production`，以便你的 Web 应用加载基于环境变量的 *app-production.conf*
    配置。如果你想使用不同于 *app.conf* 中默认 `4207` 的 HTTP 端口，可以设置 `KOTLINBOOK_HTTP_PORT`。然后，你需要更新
    *app-production.conf*，使其所有配置属性都指向环境变量，而不是指向 *app.conf* 中的默认空值。例如，`dbUrl` 应指向类似
    `KOTLINBOOK_DB_URL` 的环境变量，`dbPassword` 应指向 `KOTLINBOOK_DB_PASSWORD`，以此类推。


    你还需要某种方式来设置环境变量和管理机密信息。如果你使用 Kubernetes，可以使用 Helm 和 Helm Secrets ([*https://github.com/jkroepke/helm-secrets*](https://github.com/jkroepke/helm-secrets))
    来加密静态机密信息，并在你的 Kubernetes 集群中管理环境变量。


    你还需要一个 Docker 镜像仓库。例如，如果你在 Azure 上使用托管 Kubernetes，你将能够访问位于 *myapp.azurecr.io*
    的托管仓库。当你构建将要部署到 Kubernetes 的 Docker 镜像时，你将运行 `docker push kotlinbook:latest`，其中名称
    `kotlinbook:latest` 指的是你在运行 `docker build` 时分配的标签。然后，你将配置你的 Kubernetes 集群，使其从位于
    *myapp.azurecr.io* 的 Azure 容器仓库拉取镜像，并在你运行 `kubectl rollout restart` 以重新创建正在运行的
    Pod 时，始终部署标签为 `kotlinbook:latest` 的镜像。


    如果你不需要多节点集群设置，你也可以使用 Docker 在单个虚拟或物理服务器上运行镜像的单个实例。如果你通过 SSH 连接到你的服务器，并使用命令 `docker
    run –restart=always -d kotlinbook` 启动你的 Docker 镜像，那么当你的服务器重启时，Docker 将自动启动你的 Docker
    镜像。如果通过 *Dockerfile* 中的 `CMD` 启动的 `java -jar` 进程崩溃，此命令也会重启该进程。


    # 12. 构建并部署到无服务器环境


    在本章中，你将学习如何获取当前在 Ktor 中运行的现有处理器，并在无服务器环境中（无需 Ktor）调用它们。


    在本章中，你将学习以下关于构建和部署到无服务器环境的内容：


    *   设置 Java 运行时标志以优化启动时间

    *   Java 运行时类加载和性能特性的复杂细节

    *   AWS Lambda 如何执行你的代码

    *   无服务器环境中重要的成本节约技巧


    关于整章的一个重要声明是：我在使用 AWS 和 Node.js 的无服务器架构方面拥有丰富的经验。同时，我在生产环境中运行基于 Java 平台的 Web 应用方面也拥有丰富的经验。但我从未真正将基于
    Java 的 Web 应用部署到无服务器环境中。所以请记住这一点，并将本章作为入门指南，而非来自经验丰富的 Java + 无服务器专家的精炼建议。


    ## 解耦你的代码


    当你在无服务器环境中运行代码时，你将完全不会使用 Ktor。考虑到本书前面的章节都在介绍如何设置 Ktor 的各个方面以使你的 Web 应用按预期工作，那么这该如何实现呢？


    ### 将处理器与 Ktor 分离


    到目前为止，在本书中，你编写的大多数 Web 处理器都将 Ktor 特定的路由定义和该 Web 处理器的实际实现放在了同一个代码块中：


    ```

    get("/foo", webResponse {

    // 执行某些操作 ...

    JsonWebResponse(mapOf("success" to true))

    })

    ```


    不过，有一个明显的例外。在第 8 章中，你将 `handleCoroutineTest` 编写为一个独立的函数，并从 Ktor 处理器中调用它：


    ```

    get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

    handleCoroutineTest(dbSess)

    })

    suspend fun handleCoroutineTest(

    dbSess: Session

    ) = coroutineScope {

    // ...

    TextWebResponse("...")

    }

    ```


    在实际的 Web 应用中，你会将大部分 Web 处理器分离到独立的函数中。


    本书有意忽略了代码组织，除了没有将路由定义与处理器实现分离之外，你还将所有内容都写在一个庞大且无组织的 `Main.kt` 文件中。这对于一本书来说是可以接受的，因为其主要目标是避免试图通过文字解释哪个文件应该包含什么内容所带来的摩擦和困惑。但是，当你编写自己的
    Web 应用时，你应该将代码拆分到多个文件中。

    '
- fmt: '### Basic Structure


    The structure I usually follow is that my `Main.kt` does all the bootstrapping,
    loading of config files, and starting of servers, just like in this book. It also
    contains all the web handler route declarations in a single file, but not the
    *implementation* of those routes. So it typically looks something like this:


    ```

    fun main() {

    val config = createConfig(...)

    val dataSource = createAndMigrateDataSource(config)

    val stuff = createStuff(config)

    embeddedServer(Netty, port = config.httpPort) {

    createKtorApplication()

    }

    }

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/bars", webResponseDb(dataSource, ::handleGetBars))

    get("/bars/{id}", webResponseDb(dataSource) { dbSess ->

    handleGetBar(dbSess, call.parameters["id"])

    })

    post("/bars", webResponseTx(dataSource) { txSess ->

    handleCreateBar(

    txSess,

    Gson().fromJson(call.receiveText(), Map::class.java)

    )

    })

    // ...

    }

    }

    ```


    The various handler functions have no knowledge of Ktor and only work on a combination
    of plain data such as a `Map` from JSON parsing and a `String` corresponding to
    the ID path parameter from Ktor.


    Having all the routes in a single file makes it easier to read the code. The process
    of debugging a web app is often that you see a request that’s made to some URL
    and the first thing you need to figure out is which code that runs when a given
    URL is invoked against a web app.


    For this reason, I also tend to avoid using what I call “path prefix wrappers”,
    no matter if I use Ktor or another routing library (or programming language) entirely.
    For example, Ktor allows you to wrap routes with a path prefix like this:


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    route("/api") {

    get("/version", webResponse(::handleGetApiVersion))

    post("/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    }

    ```


    This works fine and isn’t a problem if you have a small collection of routes.
    But as your web app grows, it’s a time saver to be able to search for `"/api/order"`
    in your project and find the code that corresponds to that path instantly. So
    I prefer the boilerplate of stating the full path of all my web handlers:


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/api/version", webResponse(::handleGetApiVersion))

    post("/api/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    ```


    Here, all the paths that your web app supports are present in the code base, making
    your code more explicit and readable, at the cost of having to manually repeat
    nested path segments.


    ### Detached Web Handlers


    The reason I’m going over this in a chapter about deploying to serverless is that
    separating your handlers into plain functions is what enables you to easily run
    your web handlers in a serverless environment.


    When you write your web handlers in functional style, as plain Kotlin functions
    that receive input as arguments and return a `WebResponse`, you have the flexibility
    of running your business logic in any environment, not just Ktor.


    In the preceding examples, the functions `handleCreateOrder` and `handleGetFoo`
    are all plain Kotlin functions that operate on data, return data, and have no
    knowledge of Ktor.


    The only place that knows about Ktor is your `Main.kt` file and your routes. That
    makes sense, as you’re using Ktor heavily in that file anyway. `Main.kt` serves
    as a mapping layer between the routing library you’ve chosen and your business
    logic, which has no knowledge of the environment it runs in.


    ## Run Web Handlers on AWS Lambda


    To run your web handlers in a serverless environment, you’ll use AWS Lambda. Most
    of the steps here are logically identical to those of other cloud providers, like
    Google Cloud Platform and Azure. The main difference is just the wiring together
    and the naming of various components of the system. So don’t take this as an endorsement
    of AWS Lambda over other cloud providers; it’s mostly just a random pick based
    on which cloud provider I have the most experience with.


    ### Making AWS Lambda Web Handlers


    Currently, you call your web handlers from Ktor route definitions. To run them
    in AWS Lambda, you need to wrap your web handlers in something that AWS Lambda
    understands how to execute.


    The only thing you’ll do in this chapter is to invoke your web handlers on AWS
    Lambda. Typically, you’ll use AWS API Gateway to do routing and authentication,
    and you set up individual API Gateway routes to call the correct lambda where
    the actual handler code runs. Setting that up is outside the scope of this book,
    though.


    The first step is to add the required dependencies to `build.gradle.kts`:


    ```

    implementation("com.amazonaws:aws-lambda-java-core:1.2.1")

    ```


    This library contains the necessary wrapping code to write Kotlin code that AWS
    Lambda can invoke. The essence of AWS Lambda and the Java platform is that you
    package your code as a JAR file the same way you package for a traditional server-based
    environment. Then, your JAR file contains special classes that represent individual
    lambda handlers. These classes inherit from `com.amazonaws.services.lambda.runtime.RequestHandler`,
    which gives them a signature that AWS Lambda knows how to invoke and process the
    return value of.


    To separate your existing code from the AWS Lambda environment, you’ll create
    a new file, `MainServerless.kt`. In this file, you’ll include all your AWS Lambda
    handlers, as well as the code needed to bootstrap your code to run in the AWS
    Lambda environment. Listing [12-1](#531928_1_En_12_Chapter.xhtml#PC7) shows how
    to do that.


    ```

    import com.amazonaws.services.lambda.runtime.Context

    import com.amazonaws.services.lambda.runtime.RequestHandler

    class GetTestHelloWorld :

    RequestHandler

    {

    override fun handleRequest(

    input: Any?,

    context: Context

    ): String {

    return Gson().toJson(mapOf(

    "statusCode" to 200,

    "headers" to mapOf("contentType" to "text/plain"),

    "body" to "Hello, World!"

    ))

    }

    }

    Listing 12-1

    Setting up MainServerless.kt with basic AWS Lambda handlers

    ```


    Your AWS Lambda handler class implements the `RequestHandler` interface and returns
    a `String` with JSON content. AWS Lambda itself does not do any validation of
    its output. The JSON format you use in `GetTestHelloWorld` is the format that
    AWS API Gateway expects when it invokes lambdas to handle web requests. So, if
    you set up API Gateway to invoke your lambdas, you’ll get errors from API Gateway
    if you forget to include a `"statusCode"` or return non-JSON output. But later,
    when you’ll invoke your lambda handlers manually to test them, there’s no requirement
    on the output format of your lambda handlers.'
  raw: '### Basic Structure


    The structure I usually follow is that my `Main.kt` does all the bootstrapping,
    loading of config files, and starting of servers, just like in this book. It also
    contains all the web handler route declarations in a single file, but not the
    *implementation* of those routes. So it typically looks something like this:


    ```

    fun main() {

    val config = createConfig(...)

    val dataSource = createAndMigrateDataSource(config)

    val stuff = createStuff(config)

    embeddedServer(Netty, port = config.httpPort) {

    createKtorApplication()

    }

    }

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/bars", webResponseDb(dataSource, ::handleGetBars))

    get("/bars/{id}", webResponseDb(dataSource) { dbSess ->

    handleGetBar(dbSess, call.parameters["id"])

    })

    post("/bars", webResponseTx(dataSource) { txSess ->

    handleCreateBar(

    txSess,

    Gson().fromJson(call.receiveText(), Map::class.java)

    )

    })

    // ...

    }

    }

    ```


    The various handler functions have no knowledge of Ktor and only work on a combination
    of plain data such as a `Map` from JSON parsing and a `String` corresponding to
    the ID path parameter from Ktor.


    Having all the routes in a single file makes it easier to read the code. The process
    of debugging a web app is often that you see a request that’s made to some URL
    and the first thing you need to figure out is which code that runs when a given
    URL is invoked against a web app.


    For this reason, I also tend to avoid using what I call “path prefix wrappers”,
    no matter if I use Ktor or another routing library (or programming language) entirely.
    For example, Ktor allows you to wrap routes with a path prefix like this:


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    route("/api") {

    get("/version", webResponse(::handleGetApiVersion))

    post("/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    }

    ```


    This works fine and isn’t a problem if you have a small collection of routes.
    But as your web app grows, it’s a time saver to be able to search for `"/api/order"`
    in your project and find the code that corresponds to that path instantly. So
    I prefer the boilerplate of stating the full path of all my web handlers:


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/api/version", webResponse(::handleGetApiVersion))

    post("/api/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    ```


    Here, all the paths that your web app supports are present in the code base, making
    your code more explicit and readable, at the cost of having to manually repeat
    nested path segments.


