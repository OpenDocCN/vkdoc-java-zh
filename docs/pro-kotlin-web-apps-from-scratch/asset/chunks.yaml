    to the database engine my web app is using. I also like the way Flyway supports
    versioned and repeatable migrations based on simple file name conventions, instead
    of having to set config flags and write XML.


    To install Flyway, add it as a dependency to the `dependencies` block in *build.gradle.kts*:


    ```

    implementation("org.flywaydb:flyway-core:9.5.1")

    ```'
  trans: '

    ### 更新 WebappConfig


    从第 3 章开始，你已经建立了一个用于存储 Web 应用配置的系统，而配置文件正是存储数据库连接凭证的理想位置。


    你还需要设置配置文件，使其包含连接池用于连接数据库的凭证。H2 不需要用户名和密码。但为了模拟真实 Web 应用中的做法，你仍会为其配置完整的凭证。


    首先，将所需的属性添加到配置文件中。位于 *src/main/resources/app.conf* 的主配置文件应包含系统中所有配置属性的默认值或空值。代码清单
    5-1 展示了需要添加的属性。


    ```

    httpPort = 4207

    dbUser = null

    dbPassword = null

    dbUrl = null

    代码清单 5-1

    在 src/main/resources/app.conf 中添加默认空值

    ```


    你还需要在本地开发环境中指定将要使用的值，这需要在配置文件 *src/main/resources/app-local.conf* 中完成。H2 接受数据库用户名和密码为空字符串。如代码清单
    5-2 所示，你只需设置数据库 URL，让 HikariCP 知道它应该使用 H2。


    ```

    dbUser = ""

    dbPassword = ""

    dbUrl = "jdbc:h2:./build/local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

    代码清单 5-2

    在 src/main/resources/app-local.conf 中配置本地开发环境以使用 H2

    ```


    最后，你需要更新配置数据类，以提取并存储数据库连接值。代码清单 5-3 展示了如何将所需属性添加到数据类，并从配置文件中提取它们。


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbUser: String,

    val dbPassword: String,

    val dbUrl: String

    )

    // 读取配置文件时的实例化

    WebappConfig(

    httpPort = it.getInt("httpPort"),

    dbUser = it.getString("dbUser"),

    dbPassword = it.getString("dbPassword"),

    dbUrl = it.getString("dbUrl")

    )

    代码清单 5-3

    从配置文件中提取数据库配置并存储在配置数据类中

    ```


    这样，你就拥有了一个填充了连接所需数据库连接凭证的 `WebappConfig`。


    ### 设置连接池


    要创建连接，你需要使用数据库凭证设置一个 HikariCP 连接池，然后从该连接池中获取一个连接。


    提示


    *数据源*和*连接池*这两个术语指的是同一事物。Java 平台将使用连接池的 API 命名为 `javax.sql.DataSource`。任何时候，当你看到需要数据源才能工作的
    API 时，都可以将你的 HikariCP 连接池传递给它。


    在本书的后续部分，你将在多个地方使用连接池，因此你将创建一个用于设置连接池的函数。代码清单 5-4 展示了如何调用 HikariCP 并传递 `WebappConfig`
    中的相关细节。


    ```

    fun createDataSource(config: WebappConfig) =

    HikariDataSource().apply {

    jdbcUrl = config.dbUrl

    username = config.dbUser

    password = config.dbPassword

    }

    代码清单 5-4

    设置 HikariCP 连接池

    ```


    ### 创建连接


    为了测试一切是否正常工作，在你的 Web 应用初始化时创建一个连接池，并尝试运行一个查询。代码清单 5-5 展示了如何使用 JDBC API 执行一个简单的测试查询。


    ```

    val dataSource = createDataSource(config)

    dataSource.getConnection().use { conn ->

    conn.createStatement().use { stmt ->

    stmt.executeQuery("SELECT 1")

    }

    }

    代码清单 5-5

    用于测试数据库连接是否正常的查询

    ```


    `SELECT 1` 是一个很好的测试查询，用于检查一切是否正常运行。它适用于没有任何表的空数据库。如果 `executeQuery` 运行且未抛出任何异常，则意味着
    HikariCP 能够创建连接，并且查询在 H2 数据库引擎内成功执行。


    `getConnection()` 是连接池上的 API，用于获取一个可用于执行查询的连接。`createStatement()` 是连接上的函数，用于创建
    JDBC 查询语句。最后，`executeQuery()` 是用于对数据库执行任意 SQL 查询的函数。


    数据库连接实现了 `java.lang.AutoCloseable` 接口。`AutoCloseable` 及其同类 `Closeable` 代表了 Java
    平台上持有外部资源并拥有 `close()` 方法的对象。该对象可能会永久持有外部资源，直到你调用 `close()`，因此务必记得在所有可关闭对象上调用该方法。对于原始数据库连接，调用
    `close()` 会断开连接。对于连接池提供的连接，调用 `close()` 仅意味着你不再在代码中使用该连接，并将其释放回连接池。连接池是否关闭实际的数据库连接，取决于连接池的实现。


    `use()` 是 `java.lang.AutoCloseable` 上的一个作用域函数，它会在 lambda 执行完毕后自动调用对象的 `close()`
    方法。你可以手动调用连接的 `close()` 方法，但使用 `use()` 还有一个额外的好处，即它将整个操作包装在 try/catch 块中，这样即使由于代码抛出异常导致控制流中断，你也能关闭连接。


    ## 初始模式


    要对 SQL 数据库进行任何有用的操作，你需要设置并维护一个数据库模式。


    你*可以*直接使用 SQL 控制台手动运行 `CREATE TABLE` 语句。但这很快就会退化为冲突不断且缺乏可追溯性的混乱局面。相反，你应该从一开始就设置一个模式迁移库。


    当你使用模式迁移库时，你会将所有对 SQL 数据库的更改作为文件存储起来，并纳入版本控制。模式迁移库会自动运行你添加的新迁移文件，这样你就永远不会忘记运行重要的
    SQL 迁移，从而避免数据库和代码处于不一致的状态。


    ### 安装 Flyway


    你将用于管理数据库模式迁移的库是 Flyway（[`https://flywaydb.org/`](https://flywaydb.org/)）。Flyway
    是一个行业标准库，被世界各地的 JVM 开发者广泛使用。在过去十年左右的实际项目中，我一直都在使用它。就像 HikariCP 一样，我不仅在 Kotlin
    中使用它，也在 Gradle 和 Clojure 中使用它。


    还有其他可用的库，例如 Liquibase（[`www.liquibase.org/`](http://www.liquibase.org/)）。我在实际项目中也使用过
    Liquibase，它是一个稳定可靠的库。我偏爱 Flyway 的原因是，你可以使用纯 SQL 文件进行迁移，无需任何样板代码和 XML 配置文件。我不喜欢那些试图封装
    SQL 以使其与数据库无关的 DSL；我更喜欢编写特定于我的 Web 应用所使用的数据库引擎的 SQL。我还喜欢 Flyway 基于简单文件命名约定支持版本化和可重复迁移的方式，而无需设置配置标志和编写
    XML。


    要安装 Flyway，将其作为依赖项添加到 *build.gradle.kts* 的 `dependencies` 块中：


    ```

    implementation("org.flywaydb:flyway-core:9.5.1")

    ```

    '
- fmt: "### Running Flyway During Startup\n\nThe ideal time to run Flyway migrations\
    \ is when your application starts up. This is because your database schema and\
    \ your code are tightly coupled. Your code will refer to the tables and columns\
    \ added by your migration scripts, so you don’t want your code to start executing\
    \ until Flyway has finished running the schema migrations and added the new fields\
    \ and tables.\n\nJust like `createDataSource()`, you’ll need to run Flyway in\
    \ later chapters in this book. So you’ll create two separate functions for running\
    \ it. Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8) shows how to create those\
    \ functions.\n\n```\nfun migrateDataSource(dataSource: DataSource) {\n    Flyway.configure()\n\
    \        .dataSource(dataSource)\n        .locations(\"db/migration\")\n     \
    \   .table(\"flyway_schema_history\")\n        .load()\n        .migrate()\n}\n\
    \nfun createAndMigrateDataSource(config: WebappConfig) =\n    createDataSource(config).also(::migrateDataSource)\n\
    ```\n\n*Listing 5-6: Functions for creating a migrated data source and for running\
    \ the actual migrations*\n\nCall this function as soon as possible in your `main()`\
    \ function, preferably right after you create your `WebappConfig`. If you already\
    \ have a call to `createDataSource`, replace it with `createAndMigrateDataSource`.\n\
    \nYou use Flyway by passing it the data source, the location of your database\
    \ migration files, and the name of the table where Flyway stores its own metadata.\
    \ Flyway uses the metadata table to keep track of its own internal state. You’ll\
    \ see more about that state later in this chapter.\n\n**Tip:** You can omit the\
    \ `locations` and `table` method calls in Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8),\
    \ as they are set to their default values. I included them in the listing because\
    \ they are important properties you need to be aware of to understand how Flyway\
    \ operates.\n\nThe `also` function is another scope function like `let`, `use`,\
    \ and `apply`. The goal of `createAndMigrateDataSource()` in Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8)\
    \ is to create the data source, run the migrations, and then finally return the\
    \ newly created data source. This is exactly what `also` does. `also` first runs\
    \ the lambda and passes the object that you called `also` on to that lambda (`dataSource`\
    \ in this case). When the lambda has finished executing, `also` returns the object\
    \ you called it on initially. This saves you from creating an intermediate variable\
    \ and lets you write the whole operation as a single statement.\n\nThe syntax\
    \ `::migrateDataSource` is called a *function reference*. You could have written\
    \ `.also { migrateDataSource(it) }`, which would wrap the `migrateDataSource`\
    \ function in a lambda. But you can skip that extra step and just pass in the\
    \ function directly. Kotlin doesn’t care if you pass a lambda or a function reference\
    \ to an argument that’s a function type, and function references and lambdas with\
    \ the same arguments and return types are logically equivalent.\n\n### Creating\
    \ the Initial Schema\n\nFlyway now executes when you start your web app. But you\
    \ haven’t added any migration scripts yet, so Flyway logs *No migrations found.\
    \ Are your locations set up correctly?* at the warning level.\n\nTo create the\
    \ initial schema, you need to add your first migration script to Flyway. Initializing\
    \ the database to the base schema is not a special operation in Flyway. The initial\
    \ schema is simply the first (and, so far, only) migration in your system.\n\n\
    Flyway migration files are numbered. Flyway runs the migrations in ascending order,\
    \ from the lowest to the highest number. It’s up to you if you want your numbers\
    \ to be an incrementing sequence or a timestamp or something else.\n\nFlyway also\
    \ has a naming convention that migration files should follow. The format is `V{number}__{myFileName}.sql`.\
    \ That’s an uppercase `V`, the version number of the migration, two underscores,\
    \ the name of your migration, and a `.sql` suffix.\n\nIn this book I’ll use an\
    \ incrementing number. This means you should place your initial migration file\
    \ in `src/main/resources/db/migration/V1__initial.sql`. Listing [5-7](#531928_1_En_5_Chapter.xhtml#PC9)\
    \ shows what you’re going to put in this file.\n\n```\nCREATE TABLE user_t (\n\
    \    id BIGSERIAL PRIMARY KEY,\n    created_at TIMESTAMP WITH TIME ZONE DEFAULT\
    \ now(),\n    updated_at TIMESTAMP WITH TIME ZONE DEFAULT now(),\n    email VARCHAR(255)\
    \ NOT NULL UNIQUE,\n    password_hash BYTEA NOT NULL\n);\n```\n\n*Listing 5-7:\
    \ The contents of your initial schema setup in `src/main/resources/db/migration/V1__initial.sql`*\n\
    \nIf you run your web app, you’ll see log output from Flyway saying, *Migrating\
    \ schema “PUBLIC” to version “1 - initial”*. This means that Flyway successfully\
    \ ran the SQL file and registered the migration as successfully completed. If\
    \ you rerun your web app, Flyway will now log, *Current version of schema “PUBLIC”:\
    \ 1* and *Schema “PUBLIC” is up to date. No migration necessary*, indicating that\
    \ the migration file you created has already run successfully and Flyway didn’t\
    \ write any changes to the database.\n\n## Managing Schema Changes\n\nAs your\
    \ web app grows, you’ll add more tables and columns to your database. And as requirements\
    \ change and you uncover more knowledge about your web app and its details, you’ll\
    \ want to make changes to the database schema. Flyway has everything you need\
    \ to make this happen.\n\n### Don’t Edit Migrations After Run\n\nYou can’t edit\
    \ migrations that have already run when you want to make additional changes to\
    \ your database schema. If you try to do that, Flyway will throw an error:\n\n\
    ```\nException in thread \"main\" org.flywaydb.core.api.exception.FlywayValidateException:\
    \ Validate failed: Migrations have failed validation\nMigration checksum mismatch\
    \ for migration version 1\n-> Applied to database : 299127514\n-> Resolved locally\
    \    : -1989839469\nEither revert the changes to the migration, or run repair\
    \ to update the schema history.\n```\n\nFlyway treats changes to migration files\
    \ that have already run as a critical error. That’s why it throws an exception\
    \ instead of just informing about it in the log. You should not catch this exception;\
    \ it’s better if you leave it as it is so that your `main()` function throws and\
    \ stops your web app from starting when your migration files are in an invalid\
    \ state.\n\nFlyway keeps track of which migrations it has successfully run and\
    \ which it hasn’t. Flyway does this at the level of the migration file version.\
    \ Flyway is not able to detect which changes you’ve made to the migration file\
    \ and only run those changes.\n\nThis makes sense, as Flyway can’t know how to\
    \ handle changes automatically. Let’s say you changed the name of a column. Should\
    \ Flyway delete the old column and create a new one? Should it rename the column?\
    \ Or something else?\n\nInstead of having “magic” handling of all these cases,\
    \ Flyway gives up and treats it as a user error if you change a migration file\
    \ after it’s executed successfully.\n\n### Adding More Schema\n\nIn Listing [5-7](#531928_1_En_5_Chapter.xhtml#PC9)\
    \ you created a table. If you want to add more tables to your web app, it’s as\
    \ simple as creating yet another migration file.\n\nTo create a new migration,\
    \ just create a new migration file inside `src/main/resources/db/migration`. You’ve\
    \ already used version number 1 for the initial migration, so you should name\
    \ it something like `V2__add_name_to_user.sql`. Listing [5-8](#531928_1_En_5_Chapter.xhtml#PC11)\
    \ shows an example of what that might look like.\n\n```\nALTER TABLE user_t ADD\
    \ COLUMN name VARCHAR(255);\n```\n\n*Listing 5-8: A second migration, which adds\
