  trans: '

    ### 正确初始化


    要解决此问题，你需要在初始化阶段以某种方式调用 `MainServerlessKt` 中的代码，以便 Java 运行时在初始化期间加载该类，而不是在首次冷启动执行期间加载。


    在优化之前，我的初始化时间为 354.8 毫秒，执行时间为 5678.15 毫秒。后续调用仅需大约 3-4 毫秒。这非常糟糕，表明初始化阶段几乎什么都没做，并且这段代码需要大量初始化时间才能工作，因为它在首次调用时花费了近
    6 秒进行自我初始化。


    漫长的初始化时间是有道理的。`GetTestHelloWorld` 几乎不做任何工作，因此它不需要那么长的初始化时间。但 `UserEmailSearch`
    加载了 Gson、你的 `WebResponse` 处理代码、HikariCP、Flyway 以及整个 H2，这是一个完整的嵌入式数据库引擎。


    解决此问题的最简单方法是为你的 `UserEmailSearch` 处理程序类添加一个带有初始化块的伴生对象。Kotlin 编译器会将该 `init` 块编译为底层
    `UserEmailSearch` Java 类中的 `static` 初始化块。这个静态初始化块将在你的 AWS Lambda 处理程序运行时的初始化阶段执行，因为
    `UserEmailSearch` 是你指定 AWS Lambda 执行以运行代码的类。清单 12-5 展示了如何使用静态初始化更新你的处理程序。


    ```

    class UserEmailSearch :

    RequestHandler, String>

    {

    companion object {

    init {

    runBlocking {

    serverlessWebResponseDb(dataSource) { dbSess ->

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    JsonWebResponse("")

    }

    }

    }

    }

    override fun handleRequest(

    input: Map,

    context: Context

    ): String {

    return serverlessWebResponseDb(dataSource) { dbSess ->

    handleUserEmailSearch(dbSess, input["email"])

    }

    }

    }

    清单 12-5

    向你的 UserEmailSearch 处理程序添加 dataSource 的静态初始化

    ```


    `init` 块尽可能多地模拟实际处理程序代码所做的事情。这是为了确保 Java 运行时尽可能多地加载你在执行期间使用的类。它使用 `runBlocking`
    初始化 Kotlin 协程类，初始化整个 `WebResponse` 处理代码，并对 H2 运行一个实际的虚拟查询，从而导致所有与数据库相关的代码也被加载。


    通过这个小小的调整，我的初始化时间从 354.8 毫秒增加到了 1298.85 毫秒，但执行时间从 5678.15 毫秒下降到了仅 22.12 毫秒。这是一个巨大的胜利！现在冷启动的总时间降到了
    1320.77 毫秒，而之前是 6032.95 毫秒。因此，AWS Lambda 不再向你收取包含加载该 Lambda 中所有运行代码的 5679 毫秒执行处理程序时间，而是仅向你收取
    23 毫秒的处理程序代码执行时间。


    如果你将首次调用的执行时间（22.12 毫秒）与后续的温调用进行比较，你会发现仍然存在差异。后续的温调用仍然只需要 3-4 毫秒即可完成。因此，在初始执行期间仍然至少存在一些初始化。但
    23 毫秒已经足够低，不值得深入探究如何进一步降低这个数字。


    ### 迁移与 H2


    请注意，导致初始化时间接近 1300 毫秒的原因之一是，你在每次冷启动时都加载了整个 H2（一个完整的数据库引擎），并且还运行了你的 Flyway 迁移。


    这对于现实世界的 Web 应用来说是一个不切实际的场景。在无服务器世界中，通常甚至不使用像 HikariCP 这样的连接池库，因为无服务器函数永远不需要管理多个并发连接。事实上，如果你使用像
    AWS Aurora ([*https://aws.amazon.com/rds/aurora/*](https://aws.amazon.com/rds/aurora/)*)*
    这样的无服务器数据库，你可以通过 HTTP 请求对其运行查询，这样你就不需要管理任何连接，而是运行低延迟的即发即弃查询。


    此外，如果你从无服务器处理程序使用外部 SQL 数据库，则不应在每次冷启动时运行迁移。你甚至不应该将迁移包含在为无服务器执行环境构建的 JAR 文件中。相反，你应该在构建管道中运行数据库迁移，或者创建一个专用的无服务器函数来运行迁移，当你的构建管道部署新版本的代码时，会调用该函数。


    ### Java 运行时标志


    为了进一步优化性能，你可以研究设置 Java 运行时编译器标志的领域。


    例如，你可以将环境变量 `JAVA_TOOL_OPTIONS` 设置为 `-XX:+TieredCompilation -XX:TieredStopAtLevel=1`，这会禁用*分层编译*。分层编译是
    Java 运行时在代码运行时对其进行分析的一项功能。运行时根据分析结果动态优化你的代码。这是 Java 平台中即时（JIT）编译器的一部分，Java 运行时通过它动态地将
    Java 字节码编译为本机机器码。


    分层编译对于传统上运行数小时或数天而不关闭的基于服务器的进程是有意义的，但在启动时间很重要的环境中可能没有意义。当我使用本章中编写的 Lambda 进行测试时，初始化持续时间从大约
    450 毫秒稳定地下降到仅约 330 毫秒。但本书并非关于优化 Java 运行时性能，因此我不会在这方面深入探讨。

    '
- fmt: '### GraalVM, Kotlin/JS, and Kotlin Native


    Another way to improve cold start performance of Java platform AWS Lambda handlers
    is to compile your Java platform code using GraalVM or to use the JS and Native
    output alternatives for the Kotlin compiler.


    GraalVM (www.graalvm.org) is an alternative Java compiler that compiles Java bytecode
    (and, by extension, Kotlin) down to native executables. That means that you don’t
    incur any runtime costs and your code can start executing immediately without
    having to wait for the Java runtime to load. A trade-off to be aware of with GraalVM
    is that your compile times will increase, which makes sense seeing how GraalVM
    moves a lot of the work of the Java runtime to its own compile time.


    Kotlin can also compile to JavaScript and native code directly, out of the box.
    JavaScript with Node.js as a runtime is highly suitable for a serverless environment,
    as Node.js is hyper-optimized for fast startup times, which will cause much faster
    cold starts.


    There are two reasons I’m not showing you how to do that in this book.


    The first is that I’ve simply never done it myself. I could probably have written
    a somewhat usable section about GraalVM after some Googling and research, but
    I want this book to be as much as possible about things I’ve actually done myself
    in real-world scenarios. This chapter is already balancing on the edge in that
    regard, as I mentioned in the introduction. And compiling and running Java platform
    code in GraalVM is way outside of my real-world experience. The same goes for
    Kotlin/JS and Kotlin Native. I have no experience in using either of those compilation
    output targets for Kotlin, so it would be disingenuous for me to teach you how
    to do it.


    The second, when doing some basic research on GraalVM for this book, is I managed
    to get `GetTestHelloWorld` to run, but `UserEmailSearch` crashed immediately upon
    execution. Something about how HikariCP and H2 interacted meant that HikariCP
    was not able to load the classes for H2 and it crashed with a `ClassNotFound`
    exception.


    If I were to set up a real-world web app using Kotlin on AWS Lambda, I would be
    careful in introducing GraalVM. You can get it to work, but then you add a dependency
    to your web app that is not compatible with GraalVM for some reason, and your
    entire setup blows up.


    Kotlin/JS sounds like a more viable alternative. But Kotlin/JS can’t, for obvious
    reasons, invoke Java dependencies. All the code you’ve written that’s plain Kotlin
    supports Kotlin/JS. But you would have to switch out Gson, HikariCP, Flyway, and
    H2 with something else. A surprising amount of Kotlin will compile to JavaScript.
    For example, Java-like constructs such as `Appendable` and string builders are
    also available in Kotlin/JS, so your code for converting `HtmlWebResponse` to
    a `String` will work. But I’m not going to go into further detail on this. An
    expert in Kotlin/JS might have great advice on getting Kotlin code to run in the
    Node.js runtime on AWS Lambda. But my expertise, and the focus of this book, is
    on the Java platform side of Kotlin.


    # 13. Setup, Teardown, and Dependency Injection with Spring Context


    In this chapter, you’ll learn how to use Spring Context for managing resources
    in your web app and wire components together using dependency injection.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - Null safety with `lateinit`

    - Using lambdas in place of object literals


    Also in this chapter, you will learn the following about using Spring Context:


    - Programmatically creating and configuring Spring Context – no XML!

    - Setting up lazy beans

    - Initializing Spring Context to fail early

    - Gracefully cleaning up all your resources on shutdown


    In this chapter, you’ll learn how to write up the resources in your web app using
    dependency injection instead of explicit initialization, using Spring Context,
    the popular and ubiquitous Java dependency injection library.


    ## Why Spring and Dependency Injection?


    There are several Kotlin-specific dependency injection libraries available that
    you could also consider using, such as Koin (https://insert-koin.io/). But in
    this chapter, you’ll learn how to use the Java library Spring Context directly.


    Spring Context is a part of the Spring Framework (https://spring.io/projects/spring-framework),
    where it’s a core component of both old-school Spring MVC apps and more modern
    Spring Boot apps. It’s not common to use Spring Context as a library, but I’ve
    done it many times in real-world production-grade web apps, exactly because of
    the familiarity for the other more framework-minded developers on the team. In
    fact, Spring Context is so core to the Spring Framework that if you google Spring
    Context, all you’ll get are links to the documentation of the Spring Framework
    itself.


    Spring Context’s main interface is the `ApplicationContext` class and is what
    you’ll use to manually configure Spring beans and is also the place where Spring
    places all its auto-configured beans in Spring Boot (https://spring.io/projects/spring-boot).


    If your app has lots of stateful moving pieces, such as queue consumers or in-memory
    `ThreadPoolExecutor`-based data processing, etc., it’s nice to make Spring Context
    do the work of setting up and tearing down all your resources automatically, in
    the correct order. In fact, in the Clojure language community, where frameworks
    are rare to nonexistent, it’s popular to use Mount (https://github.com/tolitius/mount)
    or Component (https://github.com/stuartsierra/component) for this exact purpose.


    The main reason for choosing Spring Context in this book is to bridge the gap
    between the traditional world of the Spring Framework and the library-based approach
    used here. The Spring Framework is a huge system but is fundamentally composed
    of well-designed libraries with clear boundaries of separation. Spring Context
    is one such library, and it’s easy to use it in a library-like fashion that’s
    a good fit for this book, where there’s no implicit magic and nothing happens
    unless you invoke methods or functions to make things happen.


    Having Spring Context at the core of a library-based web app will make the setup
    and feel of the code familiar to people who have experience with the Spring Framework.
    In fact, you can use this approach to embed whole legacy Spring Framework applications
    in a library-based Kotlin app. I’ve done this in real-world projects. A client
    I worked with had severe Java allergy, and nobody wanted to touch an old Spring
    Framework code base. To help solve this issue, I removed all the Spring Web–specific
    parts of the Java code (which were only a handful of lines in an otherwise enormous
    code base), created a Clojure app (the same would apply for Kotlin), wired up
    Spring Context from Clojure (an `AnnotationConfigApplicationContext` in that case,
    to support annotations), and loaded the entire Java app and embedded it in the
    library-based Clojure app. That way, the app could be rewritten piece by piece,
    by removing parts of the Java code and rewriting it in Clojure, without having
    to do a full wholesale rewrite of the entire Java code base. And having the main
    entry point of the app be familiar Clojure code, the Java allergy faded quickly.'
  raw: '### GraalVM, Kotlin/JS, and Kotlin Native


    Another way to improve cold start performance of Java platform AWS Lambda handlers
    is to compile your Java platform code using GraalVM or to use the JS and Native
    output alternatives for the Kotlin compiler.


    GraalVM (*/*[*www.graalvm.org/*](http://www.graalvm.org/)) is an alternative Java
    compiler that compiles Java bytecode (and, by extension, Kotlin) down to native
    executables. That means that you don’t incur any runtime costs and your code can
    start executing immediately without having to wait for the Java runtime to load.
    A trade-off to be aware of with GraalVM is that your compile times will increase,
    which makes sense seeing how GraalVM moves a lot of the work of the Java runtime
    to its own compile time.


    Kotlin can also compile to JavaScript and native code directly, out of the box.
    JavaScript with Node.js as a runtime is highly suitable for a serverless environment,
    as Node.js is hyper-optimized for fast startup times, which will cause much faster
    cold starts.


    There are two reasons I’m not showing you how to do that in this book.


    The first is that I’ve simply never done it myself. I could probably have written
    a somewhat usable section about GraalVM after some Googling and research, but
    I want this book to be as much as possible about things I’ve actually done myself
    in real-world scenarios. This chapter is already balancing on the edge in that
    regard, as I mentioned in the introduction. And compiling and running Java platform
    code in GraalVM is way outside of my real-world experience. The same goes for
    Kotlin/JS and Kotlin Native. I have no experience in using either of those compilation
    output targets for Kotlin, so it would be disingenuous for me to teach you how
    to do it.


    The second, when doing some basic research on GraalVM for this book, is I managed
    to get `GetTestHelloWorld` to run, but `UserEmailSearch` crashed immediately upon
    execution. Something about how HikariCP and H2 interacted meant that HikariCP
    was not able to load the classes for H2 and it crashed with a `ClassNotFound`
    exception.


    If I were to set up a real-world web app using Kotlin on AWS Lambda, I would be
    careful in introducing GraalVM. You can get it to work, but then you add a dependency
    to your web app that is not compatible with GraalVM for some reason, and your
    entire setup blows up.


    Kotlin/JS sounds like a more viable alternative. But Kotlin/JS can’t, for obvious
    reasons, invoke Java dependencies. All the code you’ve written that’s plain Kotlin
    supports Kotlin/JS. But you would have to switch out Gson, HikariCP, Flyway, and
    H2 with something else. A surprising amount of Kotlin will compile to JavaScript.
    For example, Java-like constructs such as `Appendable` and string builders are
    also available in Kotlin/JS, so your code for converting `HtmlWebResponse` to
    a `String` will work. But I’m not going to go into further detail on this. An
    expert in Kotlin/JS might have great advice on getting Kotlin code to run in the
    Node.js runtime on AWS Lambda. But my expertise, and the focus of this book, is
    on the Java platform side of Kotlin.


