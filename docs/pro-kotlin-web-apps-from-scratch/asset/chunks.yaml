  trans: '

    ### 编写一个会失败的测试


    你的第一个测试用例将测试一个用于创建用户的函数。这个测试会尽可能简单：它会创建一个用户，并检查我们是否成功获取了新创建用户的 ID。


    第一步是编写一个会失败的测试。为了避免因缺少函数而导致编译失败，你需要先创建一个空实现。稍后，你将回到这个函数并完成它的实现。清单 7-6 展示了函数签名和空实现。


    ```

    fun createUser(

    dbSession: Session,

    email: String,

    name: String,

    passwordText: String,

    tosAccepted: Boolean = false

    ): Long {

    return -1

    }

    清单 7-6

    创建用户的新函数的空实现

    ```


    有了这个空实现，你现在可以编写一个测试用例了。你可以编写一个测试来创建用户，并使用 `assertNotNull` 来检查是否返回了一个有效的用户 ID 而非
    null。但类型系统已经验证了这一点，因为返回类型是 `Long`，而不是 `Long?`。相反，一个更有用的测试可以是创建两个不同的用户，并检查它们是否获得了不同的
    ID。清单 7-7 展示了这个测试用例的样子。


    ```

    @Test

    fun testCreateUser() {

    sessionOf(

    testDataSource,

    returnGeneratedKey = true)

    .use { dbSess ->

    val userAId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    val userBId = createUser(dbSess,

    email = "august@augustl.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    assertNotEquals(userAId, userBId)

    }

    }

    清单 7-7

    位于 src/test/kotlinbook/UserTest.kt 中的测试用例，用于检查 createUser 是否正常工作并返回不同的用户 ID

    ```


    尝试运行这个测试，并观察它是如何失败的。你将 `createUser` 硬编码为返回 `-1`，这意味着你创建的两个用户的 ID 都是 `-1`。而你的测试期望的是，当你创建两个用户时，它们各自会被分配一个独立且不同的
    ID。


    ### 让测试通过


    要让测试通过，唯一需要做的就是实现 `createUser`，让它与数据库交互，创建用户并返回所创建用户的 ID。


    你已经知道如何创建用户了，因为在第 6 章中你编写了一个函数，用于插入用户并返回生成的用户 ID。清单 7-8 展示了一个 `createUser` 的实现，它完成了所有你需要它做的事情。


    ```

    fun createUser(

    dbSession: Session,

    email: String,

    name: String,

    passwordText: String,

    tosAccepted: Boolean = false

    ): Long {

    val userId = dbSession.updateAndReturnGeneratedKey(

    queryOf(

    """

    INSERT INTO user_t

    (email, name, tos_accepted, password_hash)

    VALUES (:email, :name, :tosAccepted, :passwordHash)

    """,

    mapOf(

    "email" to email,

    "name" to name,

    "tosAccepted" to tosAccepted,

    "passwordHash" to passwordText

    .toByteArray(Charsets.UTF_8)

    )

    )

    )

    return userId!!

    }

    清单 7-8

    createUser 的一个可工作实现

    ```


    再次运行你的测试，它们应该会通过。之前，你在测试中创建的两个用户的 ID 是相同的，因为 `createUser` 被硬编码为返回 `-1`。但现在有了一个真实的实现，它会创建用户并返回它们各自的
    ID，测试就通过了。


    双感叹号是一个不安全的类型转换运算符。Kotliquery 中 `updateAndReturnGeneratedKey` 的返回类型是 `Long?`。这是因为从技术上讲，可以编写一条不插入任何行的
    SQL 语句，所以 Kotliquery 必须将该可能性编码到类型系统中。然而，在这种情况下，一个成功执行且没有抛出任何异常的普通插入操作，总是会返回一个
    `Long`。因此，使用 `!!` 将其从 `Long?` 转换为 `Long` 是安全的。


    如果由于某些特殊原因，它最终真的变成了 null，Kotlin 会在你使用不安全类型转换运算符 `!!` 的地方抛出一个 `NullPointerException`。因此，你程序的其余部分仍然是类型安全的，因为
    Kotlin 永远不会从一个具有非空返回类型的函数中返回 null。


    ## 避免测试泄漏


    目前，你只有一个测试用例。但随着测试套件的增长，你需要确保每个单独的测试用例都能隔离运行，并且数据不会在它们之间泄漏。


    ### 测试泄漏


    为了演示测试泄漏的问题，你可以编写另一个也会创建用户的测试 `testCreateAnotherUser()`：


    ```

    @Test

    fun testCreateAnotherUser() {

    sessionOf(

    testDataSource,

    returnGeneratedKey = true)

    .use { dbSess ->

    val userId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    // ... 在这里编写一些断言 ...

    }

    }

    ```


    如果你现在尝试运行这个测试，你会因为你在清单 7-7 中编写的测试 `testCreateUser` 和你刚刚添加的新测试之间的冲突而得到一个错误。这两个测试都使用邮箱
    *augustlilleaas@me.com* 创建了一个用户。`user_t` 表对 email 列添加了唯一性约束，因此其中一个测试会失败，并显示以下错误信息：


    ```

    Unique index or primary key violation: "public.CONSTRAINT_CE_INDEX_1 ON public.user_t(email
    NULLS FIRST) VALUES ( /* 2 */ ''augustlilleaas@me.com'' )"

    ```


    你的测试是针对一个内存数据库运行的，但这个数据库在整个测试运行期间都保持存活。因此，你所有的测试都针对同一个数据库运行，并且一个测试在运行后留在数据库中的任何数据，对后续的测试都是可见的。


    另外请注意，目前你使用的是一个在每次测试运行之间都会重置的内存数据库。在一个真实世界的项目中，你很可能连接到一个数据会被持久化的实际数据库。在这种情况下，即使只有一个测试用例，你也会遇到问题，因为上一次测试运行的数据仍然存在于数据库中，并会在后续的测试运行中导致冲突。

