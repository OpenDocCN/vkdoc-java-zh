- fmt: "### Loggers on the Java Platform\n\nThere are several terms and concepts to\
    \ be aware of when it comes to logging on the Java platform.\n\nThe error messages\
    \ in Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2) mention something called\
    \ \"SLF4J.\" SLF4J is a *logging façade*. SLF4J is short for Simple Logging Façade\
    \ for Java. A logging façade is not able to produce any actual log output; it’s\
    \ only able to receive log statements. When you start a Ktor server, Ktor tries\
    \ to log information about the startup process, using instances of SLF4J loggers.\
    \ But you haven’t configured logging yet, so SLF4J prints the error messages seen\
    \ in Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2) to let you know that SLF4J\
    \ received log statements but isn’t able to output them.\n\nThe Java platform\
    \ has standardized on using SLF4J, and libraries and frameworks will pull in the\
    \ SLF4J library and use it to perform its logging.\n\nTo see actual log output,\
    \ you need to add a *logging implementation*. There are many different implementations\
    \ available. The most widely used ones are Logback and Log4j.\n\nSLF4J searches\
    \ the *class path* for a logging implementation. The class path is where the Java\
    \ platform runtime can find all compiled code from your own source code, as well\
    \ as code from third-party dependencies. SLF4J will scan the class path for the\
    \ class file `org/slf4j/impl/StaticLoggerBinder.class`. The logging implementation\
    \ you choose will provide this file so that SLF4J can find it and wire it up.\
    \ SLF4J will then forward all the log statements it receives to the logging implementation,\
    \ so that the logging implementation can display the log messages.\n\n*Log levels*\
    \ are a hierarchy of severity levels. A logging statement always has a log level.\
    \ The available log levels are `trace`, `debug`, `info`, `warning`, `error`, and\
    \ `fatal`. The log levels separate debugging output and information about what\
    \ your system is up to from important warnings and critical errors.\n\nYou can\
    \ use log levels to differentiate output from distinct parts of your code. For\
    \ example, you can tell the logging implementation to use the `warning` level\
    \ for a given module. The log level hierarchy then dictates that it will hide\
    \ all levels below `warning` (`trace`, `debug`, and `info`) and that the only\
    \ visible log messages will be those at the `warning` level and above (`warning`,\
    \ `error`, and `fatal`).\n\n### Configure Logging in Your Web App\n\nTo enable\
    \ log output for your own code as well as third-party dependencies, you need to\
    \ add a logging implementation. For this book, you’ll use Logback. You also need\
    \ to configure Logback, so that its output is as useful as possible.\n\nTo add\
    \ Logback to your web app, add Logback and SLF4J as dependencies. In `build.gradle.kts`,\
    \ add the following to the `dependencies` block that’s already present:\n\n```\n\
    dependencies {\nimplementation(\"ch.qos.logback:logback-classic:1.4.4\")\nimplementation(\"\
    org.slf4j:slf4j-api:2.0.3\")\n```\n\n**Tip**\n\nYou don’t have to add SLF4J as\
    \ a dependency. Ktor already depends on SLF4J, and the Gradle build system will\
    \ make all *transitive dependencies* (i.e., dependencies of dependencies) available\
    \ to your own code as well. But later, you’ll call code from SLF4J directly, and\
    \ it’s considered good hygiene to add direct dependencies in `build.gradle.kts`\
    \ to all code you call directly.\n\nWhen you restart your web app, you’ll no longer\
    \ see a warning from SLF4J. Instead, you’ll see actual log output, like what you\
    \ can see in Figure [2-3](#531928_1_En_2_Chapter.xhtml#Fig3).\n\n![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig3_HTML.png)\n\
    \nA screenshot of a webpage displays the actual log output.\n\n**Figure 2-3**\
    \ Logback fills your logs with verbose information because you haven’t configured\
    \ Logback yet\n\nThe log output visible in Figure [2-3](#531928_1_En_2_Chapter.xhtml#Fig3)\
    \ is from Netty, the server implementation used by Ktor. In other words, what\
    \ you see is the log output from a dependency of a dependency, multiple steps\
    \ away from your own code. The ability to investigate what *all* parts of the\
    \ system are up to is what makes logging so useful.\n\nThe most common way to\
    \ set up a logging implementation is to use the `info` level for all third-party\
    \ code and the `debug` level for your own code. Debug log statements from third-party\
    \ code are usually not relevant unless you’re working on changes to that code\
    \ or you’re debugging an issue with an unknown cause. For your own code, the `debug`\
    \ level log output is truly relevant, as you are in fact working actively on changing\
    \ that code.\n\nTo configure Logback, you need to add an XML config file to `src/main/resources/logback.xml`.\
    \ Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9) shows an example of a valid\
    \ Logback config file.\n\n```\n<configuration>\n    <appender name=\"STDOUT\"\
    \ class=\"ch.qos.logback.core.ConsoleAppender\">\n        <encoder>\n        \
    \    <pattern>%d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n</pattern>\n\
    \        </encoder>\n    </appender>\n\n    <root level=\"info\">\n        <appender-ref\
    \ ref=\"STDOUT\"/>\n    </root>\n\n    <logger name=\"kotlinbook\" level=\"DEBUG\"\
    />\n</configuration>\n```\n\n**Listing 2-3** Logback configuration, stored in\
    \ `src/main/resources/logback.xml`\n\nThe `<appender>` in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9)\
    \ tells Logback where to write the log output. You can tell Logback to write to\
    \ files and even send emails. Here, you configure Logback to simply write logging\
    \ output to the console. This is the most common configuration for production\
    \ setups as well, as most production environments will have facilities to make\
    \ console output available to developers.\n\nThe `<root>` logger in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9)\
    \ is the default logger that Logback will use for all code – your own, as well\
    \ as third-party dependencies – that does not have a specific logger configuration.\
    \ It’s set to the `info` level, which means Logback will only show statements\
    \ at `info`, `warn`, `error`, and `fatal`.\n\nThe statement `<logger name=\"kotlinbook\"\
    \ level=\"DEBUG\"/>` in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9) overrides\
    \ the `<root>` logger for all logging statements coming from `kotlinbook`. This\
    \ means Logback will show all log statements for your own code at the `debug`\
    \ level and above.\n\nFigure [2-4](#531928_1_En_2_Chapter.xhtml#Fig4) shows what\
    \ the log output looks like, after you’ve added the Logback XML config file.\n\
    \n![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig4_HTML.png)\n\nA screenshot\
    \ of a kotlinbook window. The `logback.xml` option is highlighted. On the right,\
    \ 8 lines of code are exhibited. The output log is exhibited below.\n\n**Figure\
    \ 2-4** Logback has much nicer output when you’ve configured it to only show info-level\
    \ logs for third-party dependencies\n\nThe addition of a config file drastically\
    \ reduced the amount of log statements written to the console. Instead of verbose\
    \ implementation details from Netty, you now only see two messages about the Ktor\
    \ startup and an info message that lets you know that the web server is up and\
    \ running. It even includes the full URL where your website is accessible, for\
    \ your convenience."
  raw: '### Loggers on the Java Platform


    There are several terms and concepts to be aware of when it comes to logging on
    the Java platform.


    The error messages in Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2) mention
    something called “SLF4J.” SLF4J is a *logging façade*. SLF4J is short for Simple
    Logging Façade for Java. A logging façade is not able to produce any actual log
    output; it’s only able to receive log statements. When you start a Ktor server,
    Ktor tries to log information about the startup process, using instances of SLF4J
    loggers. But you haven’t configured logging yet, so SLF4J prints the error messages
    seen in Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2) to let you know that SLF4J
    received log statements but isn’t able to output them.


    The Java platform has standardized on using SLF4J, and libraries and frameworks
    will pull in the SLF4J library and use it to perform its logging.


    To see actual log output, you need to add a *logging implementation*. There are
    many different implementations available. The most widely used ones are Logback
    and Log4j.


    SLF4J searches the *class path* for a logging implementation. The class path is
    where the Java platform runtime can find all compiled code from your own source
    code, as well as code from third-party dependencies. SLF4J will scan the class
    path for the class file *org/slf4j/impl/StaticLoggerBinder.class*. The logging
    implementation you choose will provide this file so that SLF4J can find it and
    wire it up. SLF4J will then forward all the log statements it receives to the
    logging implementation, so that the logging implementation can display the log
    messages.


    *Log levels* are a hierarchy of severity levels. A logging statement always has
    a log level. The available log levels are trace, debug, info, warning, error,
    and fatal. The log levels separate debugging output and information about what
    your system is up to from important warnings and critical errors.


    You can use log levels to differentiate output from distinct parts of your code.
    For example, you can tell the logging implementation to use the warning level
    for a given module. The log level hierarchy then dictates that it will hide all
    levels below warning (trace, debug, and info) and that the only visible log messages
    will be those at the warning level and above (warning, error, and fatal).


    ### Configure Logging in Your Web App


    To enable log output for your own code as well as third-party dependencies, you
    need to add a logging implementation. For this book, you’ll use Logback. You also
    need to configure Logback, so that its output is as useful as possible.


    To add Logback to your web app, add Logback and SLF4J as dependencies. In *build.gradle.kts*,
    add the following to the `dependencies` block that’s already present:


    ```

    dependencies {

    implementation("ch.qos.logback:logback-classic:1.4.4")

    implementation("org.slf4j:slf4j-api:2.0.3")

    ```


    Tip


    You don’t have to add SLF4J as a dependency. Ktor already depends on SLF4J, and
    the Gradle build system will make all *transitive dependencies* (i.e., dependencies
    of dependencies) available to your own code as well. But later, you’ll call code
    from SLF4J directly, and it’s considered good hygiene to add direct dependencies
    in *build.gradle.kts* to all code you call directly.


    When you restart your web app, you’ll no longer see a warning from SLF4J. Instead,
    you’ll see actual log output, like what you can see in Figure [2-3](#531928_1_En_2_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig3_HTML.png)


    A screenshot of a webpage displays the actual log output.


    Figure 2-3


    Logback fills your logs with verbose information because you haven’t configured
    Logback yet


    The log output visible in Figure [2-3](#531928_1_En_2_Chapter.xhtml#Fig3) is from
    Netty, the server implementation used by Ktor. In other words, what you see is
    the log output from a dependency of a dependency, multiple steps away from your
    own code. The ability to investigate what *all* parts of the system are up to
    is what makes logging so useful.


    The most common way to set up a logging implementation is to use the info level
    for all third-party code and the debug level for your own code. Debug log statements
    from third-party code are usually not relevant unless you’re working on changes
    to that code or you’re debugging an issue with an unknown cause. For your own
    code, the debug level log output is truly relevant, as you are in fact working
    actively on changing that code.


    To configure Logback, you need to add an XML config file to *src/main/resources/logback.xml*.
    Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9) shows an example of a valid Logback
    config file.


    ```


    %d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


    Listing 2-3

    Logback configuration, stored in src/main/resources/logback.xml

    ```


    The `<appender>` in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9) tells Logback
    where to write the log output. You can tell Logback to write to files and even
    send emails. Here, you configure Logback to simply write logging output to the
    console. This is the most common configuration for production setups as well,
    as most production environments will have facilities to make console output available
    to developers.


    The `<root>` logger in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9) is the
    default logger that Logback will use for all code – your own, as well as third-party
    dependencies – that does not have a specific logger configuration. It’s set to
    the info level, which means Logback will only show statements at info, warn, error,
    and fatal.


    The statement `<logger name="kotlinbook" level="DEBUG"/>` in Listing [2-3](#531928_1_En_2_Chapter.xhtml#PC9)
    overrides the `<root>` logger for all logging statements coming from `kotlinbook`.
    This means Logback will show all log statements for your own code at the debug
    level and above.


    Figure [2-4](#531928_1_En_2_Chapter.xhtml#Fig4) shows what the log output looks
    like, after you’ve added the Logback XML config file.


    ![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig4_HTML.png)


    A screenshot of a kotlinbook window. The logback.xml option is highlighted. On
    the right, 8 lines of code are exhibited. The output log is exhibited below.


    Figure 2-4


    Logback has much nicer output when you’ve configured it to only show info-level
    logs for third-party dependencies


    The addition of a config file drastically reduced the amount of log statements
    written to the console. Instead of verbose implementation details from Netty,
    you now only see two messages about the Ktor startup and an info message that
    lets you know that the web server is up and running. It even includes the full
    URL where your website is accessible, for your convenience.'
  trans: '

    ### Java 平台上的日志记录器


    在 Java 平台上进行日志记录时，有几个术语和概念需要了解。


    图 2-2 中的错误信息提到了一个叫做“SLF4J”的东西。SLF4J 是一个*日志门面*。SLF4J 是 Simple Logging Façade for
    Java（Java 简单日志门面）的缩写。日志门面本身无法产生任何实际的日志输出；它只能接收日志语句。当你启动一个 Ktor 服务器时，Ktor 会尝试使用
    SLF4J 日志记录器的实例来记录启动过程的信息。但因为你尚未配置日志记录，所以 SLF4J 会打印出图 2-2 中看到的错误信息，以告知你 SLF4J 已收到日志语句但无法输出它们。


    Java 平台已标准化使用 SLF4J，各种库和框架都会引入 SLF4J 库并使用它来执行日志记录。


    要看到实际的日志输出，你需要添加一个*日志实现*。有许多不同的实现可供选择。最广泛使用的是 Logback 和 Log4j。


    SLF4J 会在*类路径*中搜索日志实现。类路径是 Java 平台运行时可以找到来自你自己源代码以及第三方依赖项的所有编译代码的地方。SLF4J 会扫描类路径，查找类文件
    *org/slf4j/impl/StaticLoggerBinder.class*。你选择的日志实现会提供这个文件，以便 SLF4J 能够找到它并进行连接。然后，SLF4J
    会将其接收到的所有日志语句转发给日志实现，以便日志实现能够显示日志消息。


    *日志级别*是一个严重性级别的层次结构。一条日志语句总是有一个日志级别。可用的日志级别有：trace、debug、info、warning、error 和
    fatal。日志级别将调试输出和关于系统运行状态的信息与重要的警告和严重错误区分开来。


    你可以使用日志级别来区分代码不同部分的输出。例如，你可以告诉日志实现为某个特定模块使用 warning 级别。然后，日志级别层次结构会规定，它将隐藏 warning
    级别以下的所有级别（trace、debug 和 info），唯一可见的日志消息将是 warning 级别及以上的消息（warning、error 和 fatal）。


    ### 在你的 Web 应用中配置日志记录


    为了让你自己的代码以及第三方依赖项能够输出日志，你需要添加一个日志实现。在本书中，你将使用 Logback。你还需要配置 Logback，使其输出尽可能有用。


    要将 Logback 添加到你的 Web 应用，请将 Logback 和 SLF4J 添加为依赖项。在 *build.gradle.kts* 中，将以下内容添加到已有的
    `dependencies` 块中：


    ```

    dependencies {

    implementation("ch.qos.logback:logback-classic:1.4.4")

    implementation("org.slf4j:slf4j-api:2.0.3")

    ```


    提示


    你不必手动将 SLF4J 添加为依赖项。Ktor 已经依赖于 SLF4J，并且 Gradle 构建系统会使所有*传递性依赖*（即依赖项的依赖项）也对你的代码可用。但是，稍后你将直接调用
    SLF4J 中的代码，并且良好的实践是在 *build.gradle.kts* 中为你直接调用的所有代码添加直接依赖项。


    当你重新启动 Web 应用时，你将不再看到来自 SLF4J 的警告。相反，你会看到实际的日志输出，就像你在图 2-3 中看到的那样。


    ![](img/531928_1_En_2_Fig3_HTML.png)


    一张网页截图显示了实际的日志输出。


    图 2-3


    Logback 用冗长的信息填充了你的日志，因为你尚未配置 Logback


    图 2-3 中可见的日志输出来自 Netty，即 Ktor 使用的服务器实现。换句话说，你看到的是来自依赖项的依赖项的日志输出，距离你自己的代码有好几层。能够调查系统*所有*部分的运行状态，正是日志记录如此有用的原因。


    设置日志实现最常见的方式是：对所有第三方代码使用 info 级别，对你自己的代码使用 debug 级别。来自第三方代码的 debug 级别日志语句通常不相关，除非你正在修改该代码，或者正在调试一个原因不明的问题。对于你自己的代码，debug
    级别的日志输出是真正相关的，因为你实际上正在积极地修改该代码。


    要配置 Logback，你需要将一个 XML 配置文件添加到 *src/main/resources/logback.xml*。清单 2-3 展示了一个有效的
    Logback 配置文件示例。


    ```


    %d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


    清单 2-3

    Logback 配置，存储在 src/main/resources/logback.xml 中

    ```


    清单 2-3 中的 `<appender>` 告诉 Logback 将日志输出写到哪里。你可以告诉 Logback 写入文件，甚至发送电子邮件。在这里，你配置
    Logback 简单地将日志输出写入控制台。这也是生产环境中最常见的配置，因为大多数生产环境都具备将控制台输出提供给开发人员的设施。


    清单 2-3 中的 `<root>` 记录器是 Logback 将用于所有没有特定记录器配置的代码（包括你自己的代码和第三方依赖项）的默认记录器。它被设置为
    info 级别，这意味着 Logback 只会显示 info、warn、error 和 fatal 级别的语句。


    清单 2-3 中的语句 `<logger name="kotlinbook" level="DEBUG"/>` 为所有来自 `kotlinbook` 的日志语句覆盖了
    `<root>` 记录器的设置。这意味着 Logback 将为你自己的代码显示 debug 级别及以上的所有日志语句。


    图 2-4 展示了在你添加了 Logback XML 配置文件后，日志输出的样子。


    ![](img/531928_1_En_2_Fig4_HTML.png)


    一个 kotlinbook 窗口的截图。logback.xml 选项被高亮显示。右侧展示了 8 行代码。下方展示了输出日志。


    图 2-4


    当你配置 Logback 仅显示第三方依赖项的 info 级别日志时，其输出会简洁得多


    添加配置文件极大地减少了写入控制台的日志语句数量。现在，你不再看到来自 Netty 的冗长实现细节，而只看到两条关于 Ktor 启动的消息，以及一条告知你
    Web 服务器已启动并正在运行的信息消息。为了方便起见，它甚至包含了你的网站可访问的完整 URL。

