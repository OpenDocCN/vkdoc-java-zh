- fmt: "# 10. Building API-Based Back Ends\n\nTo see this for yourself, open `http://localhost:4207/secret`\
    \ in your browser. That should redirect you to the login page, where you can log\
    \ in with the credentials for the user you created in your repeatable migration.\
    \ After login, you’re redirected back to `/secret` again.\n\n## Logging Out\n\n\
    The `/secret` route has a link to a route you haven’t implemented yet, `/logout`.\
    \ You’ll implement this route next, so that users can log out of your web app.\n\
    \nA route for logging out should not do much other than performing the logout\
    \ and redirecting the user to a page that’s accessible for users who haven’t logged\
    \ in. In this example, you’ll redirect the user back to the `/login` page. Listing\
    \ [9-25](#531928_1_En_9_Chapter.xhtml#PC30) shows how to implement that route.\n\
    \n```\nauthenticate(\"auth-session\") {\n    get(\"/logout\") {\n        call.sessions.clear()\n\
