  trans: '

    ## 连接到 SQL 数据库


    除非你连接到 SQL 数据库，否则你无法对它进行任何操作。当然也有一些例外，比如 AWS Aurora Serverless 这类托管云数据库。但那是例外，而非普遍情况。因此，第一步是弄清楚如何管理数据库的连接。


    ### 连接池


    从 Web 应用连接到 SQL 数据库的第一步是设置一个连接池。你的 Web 应用很可能需要处理数十、数百甚至数千个并发请求。连接池是一种管理多个并发连接的工具。PostgreSQL
    是目前最流行且可扩展性最强的 SQL 数据库之一，但开箱即用时，PostgreSQL 最多支持 100 个并发连接。


    手动创建连接是可行的。例如，你可以只创建一个连接，然后让 Web 应用的所有操作都使用这个连接。但一个连接无法同时处理多个事务。因此，你应该从一开始就让 Web
    应用创建多个并发数据库连接。


    相反，你应该使用连接池。设置连接池时，你需要提供连接数据库的凭证。在你的 Web 应用中，当你想执行数据库查询时，你向连接池请求一个连接。如果池中有可用连接，你会立即获得。如果池中所有连接都处于忙碌状态，它会创建一个新连接。如果连接池已达到允许的最大并发连接数，连接池会等待，直到当前并发连接数低于最大值，然后才会给你一个连接。


    你还可以通过连接池优化性能。这里我不打算深入探讨扩展 SQL 数据库的诸多复杂细节。但基准测试和实际经验表明，在某些情况下，如果你将允许的最大并发连接数限制为数据库支持最大值的一半左右，数据库的性能反而会更好。


    此外，在部署场景中，如果你运行着 Web 应用的多个实例，你可以告诉连接池最多只创建 25 个连接。这样，你可以同时运行四个 Web 应用实例，而你的数据库在所有运行实例中的并发连接总数不会超过
    100 个。


    除了对你自己的代码有用之外，你经常会遇到一些第三方库，它们期望接收一个连接池而不是直接连接。从一开始就使用连接池，能让你的代码为这种情况做好准备。


    ### 安装数据库驱动


    要连接数据库，你需要一个针对你所连接数据库的数据库驱动。有很多 SQL 数据库可供选择，比如 PostgreSQL、MariaDB、Oracle DB 等等。为了方便起见，本书将使用
    H2，这是一个用于 Java 平台的嵌入式 SQL 数据库。H2 是一个功能完备的 SQL 数据库，并且由于它是嵌入式的，你无需额外花时间安装和配置它。


    提示


    如果你愿意，也可以使用 H2 以外的其他数据库。请确保同时修改 SQL 以匹配你的数据库。本书中的大部分 SQL 都很直接，应该能在 H2 之外的环境中使用，但像
    `CREATE TABLE` 语句和数据类型这类内容，在不同的 SQL 数据库之间通常是不同的。


    你还需要一个用于创建连接池的库，我们将要使用的是 HikariCP。它是一个通用库，实现了用于连接池的 JDBC `DataSource` 接口，是一个久经考验的生产级库，我在
    Clojure、Groovy 和 Kotlin 的许多实际项目中都使用过它。


    要安装 H2 和 HikariCP，请将它们作为依赖项添加到 *build.gradle.kts* 的 dependencies 块中：


    ```

    implementation("com.zaxxer:HikariCP:5.0.1")

    implementation("com.h2database:h2:2.1.214")

    ```


    H2 依赖项包含了数据库驱动，以及 H2 数据库的实际实现。通常，数据库驱动只包含连接外部数据库所必需的内容。但 H2 是一个嵌入式数据库，因此它将驱动和服务器都包含在一个便捷的包中。


    ### 设置 H2


    当你连接任何数据库时，你都会给连接池一个它要连接的 URL。H2 是一个嵌入式数据库，因此连接 URL 也是你配置 H2 及其运行方式的地方。


    H2 有两种主要的运行模式：内存模式和文件系统持久化模式。内存模式意味着当你重启 Web 应用时，H2 会完全清除数据库。要让 H2 使用内存模式，你可以使用
    URL `jdbc:h2:mem:mydbname` 进行设置。


    不过，本书将使用文件系统模式。虽然内存模式很方便，但我们的目标是学习如何使用像 PostgreSQL 和 MariaDB 这样的数据库来设置真实的 Web
    应用，这些数据库的数据在重启后仍然存在。文件系统模式使 H2 的行为更接近这些数据库。要让 H2 使用文件系统模式，你可以使用 URL `jdbc:h2:path/to/file`
    进行设置。


    在文件系统中放置 H2 数据库的一个好位置是 `./build/local`。这会将数据库文件放在 `build` 文件夹中，而 Gradle 已经使用该目录来存储其构建输出。如果你运行
    Gradle 的 `clean` 任务，它会清除整个 `build` 目录，包括你的数据库。如果你想确保 Gradle 永远不会触及你的数据库，请将其放在其他地方。但无论如何，你都不应该在本地开发数据库中存储重要数据。


    你还需要在连接 URL 中设置两个标志：`MODE=PostgreSQL` 和 `DATABASE_TO_LOWER=TRUE`。设置这两个标志可以使 H2
    更易于使用，并且让 H2 不关心你使用大写还是小写来拼写表名和列名等。

    '
- fmt: '### Updating WebappConfig


    You already have a system in place for storing configuration for your web app
    from Chapter [3](#531928_1_En_3_Chapter.xhtml), and config files are the perfect
    place to store database connection credentials.


    You also need to set up your configuration file to contain the credentials that
    the connection pool will use to connect to your database. H2 doesn’t require a
    username and a password. But you’ll set it up with full credentials anyway, to
    mimic what you would do in a real-world web app.


    First, add the required properties to your configuration files. Your main configuration
    file in `src/main/resources/app.conf` should contain default or empty versions
    of all the configuration properties in your system. Listing [5-1](#531928_1_En_5_Chapter.xhtml#PC2)
    shows the properties you need to add.


    ```

    httpPort = 4207

    dbUser = null

    dbPassword = null

    dbUrl = null

    Listing 5-1

    Add default empty values to src/main/resources/app.conf

    ```


    You also need to specify the values you’ll be using in your local development
    environment, which you do in the config file `src/main/resources/app-local.conf`.
    H2 accepts empty strings for the database username and password. All you need
    to do, shown in Listing [5-2](#531928_1_En_5_Chapter.xhtml#PC3), is to set the
    database URL so that HikariCP knows that it should use H2.


    ```

    dbUser = ""

    dbPassword = ""

    dbUrl = "jdbc:h2:./build/local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

    Listing 5-2

    Configure your local dev environment to use H2, in src/main/resources/app-local.conf

    ```


    Finally, you need to update your configuration data class to extract and store
    the database connection values. Listing [5-3](#531928_1_En_5_Chapter.xhtml#PC4)
    shows how to add the required properties to the data class and extract them from
    the config file.


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbUser: String,

    val dbPassword: String,

    val dbUrl: String

    )

    // Instantiation when reading the config file

    WebappConfig(

    httpPort = it.getInt("httpPort"),

    dbUser = it.getString("dbUser"),

    dbPassword = it.getString("dbPassword"),

    dbUrl = it.getString("dbUrl")

    )

    Listing 5-3

    Extract database config from the config files and store it in the config data
    class

    ```


    This sets you up with a `WebappConfig` that’s populated with the database connection
    credentials required when you want to connect.


    ### Set Up the Connection Pool


    To create a connection, you need to set up a HikariCP connection pool with the
    credentials to your database and then obtain a connection from the HikariCP connection
    pool.


    **Tip**


    *Data source* and *connection pool* are both terms that refer to the same thing.
    The Java platform names the API for using connection pools `javax.sql.DataSource`.
    Any time you see an API that requires a data source to work, you can pass it your
    HikariCP connection pool.


    Later in this book, you’ll be using the connection pool in multiple places, so
    you’ll create a function for setting up the connection pool. Listing [5-4](#531928_1_En_5_Chapter.xhtml#PC5)
    shows how to call HikariCP and pass on the relevant details from your `WebappConfig`.


    ```

    fun createDataSource(config: WebappConfig) =

    HikariDataSource().apply {

    jdbcUrl = config.dbUrl

    username = config.dbUser

    password = config.dbPassword

    }

    Listing 5-4

    Set up a HikariCP connection pool

    ```


    ### Creating a Connection


    To test that everything works correctly, create a connection pool in your web
    app initialization, and try to run a query. Listing [5-5](#531928_1_En_5_Chapter.xhtml#PC6)
    shows how to use the JDBC API to perform a simple test query.


    ```

    val dataSource = createDataSource(config)

    dataSource.getConnection().use { conn ->

    conn.createStatement().use { stmt ->

    stmt.executeQuery("SELECT 1")

    }

    }

    Listing 5-5

    A query to test that your database connection works

    ```


    `SELECT 1` is a good query to test that everything is up and running. It works
    for empty databases without any tables. If `executeQuery` runs without throwing
    any exceptions, it means HikariCP was able to create a connection and that the
    query executed successfully inside the H2 database engine.


    `getConnection()` is the API on connection pools to obtain a connection you can
    use for executing queries. `createStatement()` is the function on a connection
    to create a JDBC query statement. Finally, `executeQuery()` is the function to
    execute arbitrary SQL queries against your database.


    Database connections implement the interface `java.lang.AutoCloseable`. `AutoCloseable`,
    and its sibling `Closeable`, represents objects on the Java platform that hold
    on to external resources and have a `close()` method. The object will hold on
    to the external resources potentially forever, until you call `close()`, so it’s
    important to remember to call that method on any closeable objects. For a raw
    database connection, calling `close()` disconnects it. For connections provided
    by a connection pool, calling `close()` just means that you won’t be using that
    connection more from your code and that you’ve released it back to the pool. Whether
    or not the connection pool closes the actual database connection is up to the
    connection pool implementation.


    `use()` is a scope function on `java.lang.AutoCloseable` that automatically calls
    `close()` on the object after the lambda finishes executing. You could manually
    call `close()` on the connection, but using `use()` has the added benefit of wrapping
    the whole operation in a try/catch block so that you close the connection even
    if control flow breaks due to your code throwing an exception.


    ## The Initial Schema


    To do anything useful with a SQL database, you need to set up and maintain a database
    schema.


    You *could* just use the SQL console and manually run `CREATE TABLE` statements.
    But this quickly degrades into a mess of conflicts and lack of traceability. Instead,
    you’ll set up a schema migration library from the get-go.


    When you use a schema migration library, you’ll store all the changes to the SQL
    database over time as files, checked into version control. The schema migration
    library will automatically run new migration files that you add, so you never
    forget to run an important SQL migration that causes your database and code to
    be in an inconsistent state.


    ### Installing Flyway


    The library you’ll use for managing database schema migrations is Flyway ([`https://flywaydb.org/`](https://flywaydb.org/)).
    Flyway is an industry-standard library, used by JVM developers everywhere. It’s
    what I’ve been using for the last ten or so years in real-world projects. Just
    like HikariCP, I’ve been using it from Gradle and Clojure as well as from Kotlin.


    There are other libraries available, such as Liquibase ([`www.liquibase.org/`](http://www.liquibase.org/)).
    I’ve also used Liquibase in real-world projects, and it’s a solid and stable library.
    The reason I prefer Flyway is that you can use plain SQL files for migrations
    without any boilerplate and XML configuration files. I don’t like DSLs that attempt
    to wrap the SQL to make it database agnostic; I prefer to write SQL that’s specific
    to the database engine my web app is using. I also like the way Flyway supports
    versioned and repeatable migrations based on simple file name conventions, instead
    of having to set config flags and write XML.


    To install Flyway, add it as a dependency to the `dependencies` block in `build.gradle.kts`:


    ```

    implementation("org.flywaydb:flyway-core:9.5.1")

    ```'
  raw: '### Updating WebappConfig


    You already have a system in place for storing configuration for your web app
    from Chapter [3](#531928_1_En_3_Chapter.xhtml), and config files are the perfect
    place to store database connection credentials.


    You also need to set up your configuration file to contain the credentials that
    the connection pool will use to connect to your database. H2 doesn’t require a
    username and a password. But you’ll set it up with full credentials anyway, to
    mimic what you would do in a real-world web app.


    First, add the required properties to your configuration files. Your main configuration
    file in *src/main/resources/app.conf* should contain default or empty versions
    of all the configuration properties in your system. Listing [5-1](#531928_1_En_5_Chapter.xhtml#PC2)
    shows the properties you need to add.


    ```

    httpPort = 4207

    dbUser = null

    dbPassword = null

    dbUrl = null

    Listing 5-1

    Add default empty values to src/main/resources/app.conf

    ```


    You also need to specify the values you’ll be using in your local development
    environment, which you do in the config file *src/main/resources/app-local.conf*.
    H2 accepts empty strings for the database username and password. All you need
    to do, shown in Listing [5-2](#531928_1_En_5_Chapter.xhtml#PC3), is to set the
    database URL so that HikariCP knows that it should use H2.


    ```

    dbUser = ""

    dbPassword = ""

    dbUrl = "jdbc:h2:./build/local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;"

    Listing 5-2

    Configure your local dev environment to use H2, in src/main/resources/app-local.conf

    ```


    Finally, you need to update your configuration data class to extract and store
    the database connection values. Listing [5-3](#531928_1_En_5_Chapter.xhtml#PC4)
    shows how to add the required properties to the data class and extract them from
    the config file.


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbUser: String,

    val dbPassword: String,

    val dbUrl: String

    )

    // Instantiation when reading the config file

    WebappConfig(

    httpPort = it.getInt("httpPort"),

    dbUser = it.getString("dbUser"),

    dbPassword = it.getString("dbPassword"),

    dbUrl = it.getString("dbUrl")

    )

    Listing 5-3

    Extract database config from the config files and store it in the config data
    class

    ```


    This sets you up with a `WebappConfig` that’s populated with the database connection
    credentials required when you want to connect.


    ### Set Up the Connection Pool


    To create a connection, you need to set up a HikariCP connection pool with the
    credentials to your database and then obtain a connection from the HikariCP connection
    pool.


    Tip


    *Data source* and *connection pool* are both terms that refer to the same thing.
    The Java platform names the API for using connection pools `javax.sql.DataSource`.
    Any time you see an API that requires a data source to work, you can pass it your
    HikariCP connection pool.


    Later in this book, you’ll be using the connection pool in multiple places, so
    you’ll create a function for setting up the connection pool. Listing [5-4](#531928_1_En_5_Chapter.xhtml#PC5)
    shows how to call HikariCP and pass on the relevant details from your `WebappConfig`.


    ```

    fun createDataSource(config: WebappConfig) =

    HikariDataSource().apply {

    jdbcUrl = config.dbUrl

    username = config.dbUser

    password = config.dbPassword

    }

    Listing 5-4

    Set up a HikariCP connection pool

    ```


    ### Creating a Connection


    To test that everything works correctly, create a connection pool in your web
    app initialization, and try to run a query. Listing [5-5](#531928_1_En_5_Chapter.xhtml#PC6)
    shows how to use the JDBC API to perform a simple test query.


    ```

    val dataSource = createDataSource(config)

    dataSource.getConnection().use { conn ->

    conn.createStatement().use { stmt ->

    stmt.executeQuery("SELECT 1")

    }

    }

    Listing 5-5

    A query to test that your database connection works

    ```


    `SELECT 1` is a good query to test that everything is up and running. It works
    for empty databases without any tables. If `executeQuery` runs without throwing
    any exceptions, it means HikariCP was able to create a connection and that the
    query executed successfully inside the H2 database engine.


    `getConnection()` is the API on connection pools to obtain a connection you can
    use for executing queries. `createStatement()` is the function on a connection
    to create a JDBC query statement. Finally, `executeQuery()` is the function to
    execute arbitrary SQL queries against your database.


    Database connections implement the interface `java.lang.AutoCloseable`. `AutoCloseable`,
    and its sibling `Closeable`, represents objects on the Java platform that hold
    on to external resources and have a `close()` method. The object will hold on
    to the external resources potentially forever, until you call `close()`, so it’s
    important to remember to call that method on any closeable objects. For a raw
    database connection, calling `close()` disconnects it. For connections provided
    by a connection pool, calling `close()` just means that you won’t be using that
    connection more from your code and that you’ve released it back to the pool. Whether
    or not the connection pool closes the actual database connection is up to the
    connection pool implementation.


    `use()` is a scope function on `java.lang.AutoCloseable` that automatically calls
    `close()` on the object after the lambda finishes executing. You could manually
    call `close()` on the connection, but using `use()` has the added benefit of wrapping
    the whole operation in a try/catch block so that you close the connection even
    if control flow breaks due to your code throwing an exception.


    ## The Initial Schema


    To do anything useful with a SQL database, you need to set up and maintain a database
    schema.


    You *could* just use the SQL console and manually run `CREATE TABLE` statements.
    But this quickly degrades into a mess of conflicts and lack of traceability. Instead,
    you’ll set up a schema migration library from the get-go.


    When you use a schema migration library, you’ll store all the changes to the SQL
    database over time as files, checked into version control. The schema migration
    library will automatically run new migration files that you add, so you never
    forget to run an important SQL migration that causes your database and code to
    be in an inconsistent state.


    ### Installing Flyway


    The library you’ll use for managing database schema migrations is Flyway ([`https://flywaydb.org/`](https://flywaydb.org/)).
    Flyway is an industry-standard library, used by JVM developers everywhere. It’s
    what I’ve been using for the last ten or so years in real-world projects. Just
    like HikariCP, I’ve been using it from Gradle and Clojure as well as from Kotlin.


    There are other libraries available, such as Liquibase ([`www.liquibase.org/`](http://www.liquibase.org/)).
    I’ve also used Liquibase in real-world projects, and it’s a solid and stable library.
    The reason I prefer Flyway is that you can use plain SQL files for migrations
    without any boilerplate and XML configuration files. I don’t like DSLs that attempt
