  trans: '

    ### 添加新的 Ktor 扩展函数


    为了将身份验证设置与其余路由分离，你将在 `Application` 上创建一个新的扩展函数，而不是将其放在现有的 `createKtorApplication`
    中。


    例如，在本章后面，你将使用 Spring Security（[*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security)）设置身份验证。通过将主
    Web 应用程序与身份验证配置分离，你将能够同时运行这两个设置。


    在现有函数 `createKtorApplication` 的上方或下方，你将创建一个名为 `setUpKtorCookieSecurity` 的新函数。清单
    9-18 展示了该函数应有的样子。


    ```

    fun Application.setUpKtorCookieSecurity(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    }

    清单 9-18

    空的骨架函数 setUpKtorCookieSecurity，你的安全配置将驻留在此处

    ```


    在本章后面，你将用身份验证设置填充此函数。


    为了使你的 Ktor Web 应用程序使用此安全设置，请记得在调用 `embeddedServer` 时调用它，你已经在其中调用了现有的 `createKtorApplication`。清单
    9-19 展示了如何正确调用它。


    ```

    embeddedServer(Netty, port = config.httpPort) {

    setUpKtorCookieSecurity(config, dataSource)

    createKtorApplication(config, dataSource)

    }.start(wait = true)

    清单 9-19

    在 embeddedServer 中添加对新安全设置函数的调用

    ```


    ### 配置会话 Cookie


    下一步是使用基于 Cookie 的会话设置 Ktor。你已经拥有了实现此功能所需的依赖项和配置属性。


    `Sessions` 插件是此设置的核心。你将像设置 `StatusPages` 插件一样设置此插件，只不过你要将其添加到新的 `setUpKtorCookieSecurity`
    函数中。清单 9-20 展示了如何执行此操作。


    ```

    data class UserSession(val userId: Long): Principal

    fun Application.setUpKtorCookieSecurity (

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    install(Sessions) {

    cookie("user-session") {

    transform(

    SessionTransportTransformerEncrypt(

    hex(appConfig.cookieEncryptionKey),

    hex(appConfig.cookieSigningKey)

    )

    )

    cookie.maxAge = Duration.parse("30d")

    cookie.httpOnly = true

    cookie.path = "/"

    cookie.secure = appConfig.useSecureCookie

    cookie.extensions["SameSite"] = "lax"

    }

    }

    }

    清单 9-20

    向 setUpKtorCookieSecurity 添加基于 Cookie 的会话设置

    ```


    此代码配置了基于 Cookie 的会话存储的几个重要方面。


    `UserSession` 数据类保存会话 Cookie 将包含的数据。你可以在此处放置任意多的数据——但不要太过分。请记住，浏览器将 Cookie 输出限制为
    4 KB。


    `transform` 函数设置实际 Cookie 的加密。如果没有此步骤，Cookie 将以纯文本形式存储会话信息。这意味着任何人都可以将会话 Cookie
    设置为任何值，因此攻击者可以将 Cookie 的用户 ID 设置为他们想要的任何 ID，从而有效地使任何人都能够以他们能猜到 ID 的任何用户身份登录到你的
    Web 应用程序。但是，使用 `transform` 后，Cookie 既被签名又被加密。签名意味着对其内容的任何更改都会破坏签名。加密意味着你存储在 Cookie
    中的任何秘密对黑客都是不可见的——Ktor 使用你提供的密钥加密 Cookie 的实际内容。


    你设置的各种 Cookie 标志也很重要。


    你可以自由地将 `maxAge` 设置为你想要的任何值。`maxAge` 的效果是 Cookie 将在给定时间后过期，从而导致你的用户必须重新登录。


    `path` 也必须设置为 `/`，以便 Cookie 适用于你的 Web 应用程序的所有页面。如果你不设置它，Cookie 将仅在你设置 Cookie 时所在的路径上生效。


    `secure` 意味着 Cookie 仅适用于 HTTPS，从而保护 Cookie 免受中间人攻击。你使用在清单 9-17 中创建的配置标志，以便 Cookie
    默认是安全的，但在本地开发时除外，因为你在本地通过 HTTP（而非 HTTPS）运行 Web 应用程序。


    最后，`SameSite` 设置为 `lax`，以保护你的 Cookie 免受跨源攻击。浏览器只会为源自你自己 Web 应用程序的请求发送 Cookie。如果攻击者试图从另一个网页向你的
    Web 应用程序提交表单，浏览器将不会随请求发送该 Cookie。

    '
- fmt: '### Logging In


    With authentication and session storage set up, you’re ready to add the login
    form itself.


    Your login form will be on a separate route, `/login`. It won’t be looking pretty
    and stylish, but it will work. I’ll leave the prettifying up to you. Listing [9-21](#531928_1_En_9_Chapter.xhtml#PC26)
    shows the code for the login page.


    ```

    get("/login", webResponse {

    HtmlWebResponse(AppLayout("Log in").apply {

    pageBody {

    form(method = FormMethod.post, action = "/login") {

    p {

    label { +"E-mail" }

    input(type = InputType.text, name = "username")

    }

    p {

    label { +"Password" }

    input(type = InputType.password, name = "password")

    }

    button(type = ButtonType.submit) { +"Log in" }

    }

    }

    })

    })

    Listing 9-21

    The route handler for the login form

    ```


    This login form is a straightforward HTML form that will post the username and
    the password to another route. They’ll both have the path `/login`, but a different
    verb. `GET /login` will display the login form, and `POST /login` will perform
    the actual login and set of the session.


    The next step is to implement the `POST /login` request to perform the login when
    a user submits the form. Listing [9-22](#531928_1_En_9_Chapter.xhtml#PC27) shows
    the code for the login handler.


    ```

    post("/login") {

    sessionOf(dataSource).use { dbSess ->

    val params = call.receiveParameters()

    val userId = authenticateUser(

    dbSess,

    params["username"]!!,

    params["password"]!!

    )

    if (userId == null) {

    call.respondRedirect("/login")

    } else {

    call.sessions.set(UserSession(userId = userId))

    call.respondRedirect("/secret")

    }

    }

    }

    Listing 9-22

    The route handler inside setUpKtorCookieSecurity for handling the submitted login
    form

    ```


    Remember to add this routing handler to `setUpKtorCookieSecurtity` and not `createKtorApplication`.


    I prefer to store only the ID of the user in the session cookie. You could also
    store the email there. But if the user changes their email, you’ll display the
    old, cached email in the session cookie, until the user logs out and in again.


    Note that you’re not wrapping this route handler in `webResponse` or any of its
    variants. You haven’t implemented a `WebResponse` data class for performing redirects.
    And you don’t really need to. It’s easy enough to just start a Kotliquery session
    by hand from any Ktor handler and use the Ktor API to do the redirect itself.
    The handling of session-related code is very Ktor specific anyway, so there’s
    no real use case for disassociating it from Ktor.


    For reading the submitted form data, you’ll use `call.receiveParameters()`. This
    causes Ktor to load and parse the request body and makes the form data available
    to you as a `Map` structure. You already have an `authenticateUser` function,
    so you call that function with the provided parameters. The type system does not
    know which parameters it receives when your web app runs, so the types of the
    username and password parameters are `String?`. You’re casting it to `String`
    by using the double exclamation mark (`!!`) non-null assertion operator. If they
    are `null`, your code will throw an exception. That’s fine in this case, as browsers
    will always pass them as strings as the user submits the form on `GET /login`.
    So you’ll only get an exception if someone manually tries to call `POST /login`
    with invalid parameters.


    If you find a user that matches the username and password from the form, you’ll
    set the session cookie using `call.sessions` and redirect to the page where you
    want your users to see after they log in. This causes Ktor to set a `Set-Cookie`
    header, with the contents of your cookie encrypted and signed and with the flags
    you configured in Listing [9-20](#531928_1_En_9_Chapter.xhtml#PC25).


    If you don’t find a user, you redirect the user back to the `GET /login` page
    (redirects are always GET requests), and the user can try to log in again.


    ### Protecting Routes with Authentication


    When a user successfully logs in, your code redirects them to `/secret`. Next,
    you’ll implement that route and set it up so that it’s only accessible for users
    who have logged in.


    The first step is to set up the `Authentication` plugin. You’ll set it up just
    like you’ve set up `Sessions` and `StatusPages` before. Listing [9-23](#531928_1_En_9_Chapter.xhtml#PC28)
    shows what you need to invoke to set it up correctly.


    ```

    install(Authentication) {

    session("auth-session") {

    validate { session ->

    session

    }

    challenge {

    call.respondRedirect("/login")

    }

    }

    }

    Listing 9-23

    Adding setup for authentication to setUpKtorCookieSecurity

    ```


    The `validate` block adds an opportunity to invalidate sessions. For now, you
    don’t need to do any invalidation here. This is a good place to check that the
    user still exists in your database, that you haven’t disabled the user by flagging
    it in your database, and other checks. Ktor performs the validation on every request
    to your web app that requires authentication. (You’ll add authentication to routes
    later in this chapter.)


    Ktor calls the `challenge` block when an unauthenticated user tries to access
    a protected route. When that happens, you’ll redirect to the `/login` page. You’re
    free to do whatever you want here with the Ktor `call` API, though, such as rendering
    an error message.


    To make specific routes available to logged-in users only, you’ll wrap them in
    the `authenticate` interceptor that you get from the Ktor authentication plugin.
    Listing [9-24](#531928_1_En_9_Chapter.xhtml#PC29) shows how to protect specific
    routes.


    ```

    authenticate("auth-session") {

    get("/secret", webResponseDb(dataSource) { dbSess ->

    val userSession = call.principal()!!

    val user = getUser(dbSess, userSession.userId)!!

    HtmlWebResponse(

    AppLayout("Welcome, ${user.email}").apply {

    pageBody {

    h1 {

    +"Hello there, ${user.email}"

    }

    p { +"You''re logged in." }

    p {

    a(href = "/logout") { +"Log out" }

    }

    }

    }

    )

    })

    }

    Listing 9-24

    Wrapping a route in setUpKtorCookieSecurity to only be accessible after users
    have logged in

    ```


    The function `getUser` is from Listing [7-9](#531928_1_En_7_Chapter.xhtml#PC7),
    back in Chapter [7](#531928_1_En_7_Chapter.xhtml) about writing tests.


    The name `"auth-session"` is from Listing [9-23](#531928_1_En_9_Chapter.xhtml#PC28),
    where you configured the session and named it `"auth-session"`. Ktor supports
    multiple session regimes operating concurrently in your web app, identified by
    their names.


    All the routes that you wrap in `authenticate("auth-session")` will redirect to
    the `/login` page if the user has not logged in, as per the setup of the `"auth-session"`
    in Listing [9-23](#531928_1_En_9_Chapter.xhtml#PC28).


    The protected route `/secret` uses `call.principal<UserSession>()!!` to retrieve
    the session that represents the currently logged-in user. This function returns
    the data that you stored in the session cookie earlier. Ktor automatically decodes
    and encodes to and from the `UserSession` data class.


    The Kotlin type system does not know that the session is always present in an
    authenticated route, though. The `principal` function is available on all `call`
    instances, even routes that aren’t in the `authenticate` interceptor. But since
    you know it will always be there for authenticated routes, it’s fine to use the
    double exclamation marks to cast it to a non-null type.


    The session cookie contains the user ID, via the `UserSession` data class. So
    you’ll use that ID to fetch the actual user from the database. You use the user
    row from the database to display the email of the logged-in user. Figure [9-4](#531928_1_En_9_Chapter.xhtml#Fig4)
    shows how this page looks in a browser.


    ![](images/531928_1_En_9_Chapter/531928_1_En_9_Fig4_HTML.png)


    A screenshot of a webpage. The text reads Hello there, august, at sign, crud dot
    business. You''re logged in.


    Figure 9-4


    Your web app when a user has logged in'
