- fmt: '# 16. An Assortment of Kotlin Tricks


    You’ve learned lots of neat Kotlin tricks along the way, as you’ve implemented
    a production-grade web app in the previous chapters. In this chapter, you’ll learn
    some more neat Kotlin tricks that I didn’t get to cover.


    Many of these tricks are more useful to library authors than web app builders.
    In fact, most libraries will likely use most of the concepts mentioned in this
    chapter. But it’s still nice to be aware of these concepts. You might end up debugging
    library code, and it’s nice to know what you’re looking at. And you never know!
    Perhaps you’ll find some use for the Kotlin tricks in this chapter when you write
    utilities and helper functions for your own web apps.


    ## Delegation (`by lazy`)


    Lazy delegation allows you to defer expensive computations of values and properties,
    but still access them as if they were just normal properties like any other property.


    In the web app you’ve built in this book, there aren’t any expensive resources
    that are initialized too eagerly that would benefit from lazy initialization.
    It’s not really common for web app back ends to have stateful components, as state
    typically lives in databases and queues. So, to demonstrate lazy initialization,
    you’ll look at an imagined example.


    One use case for lazy delegation are methods that compute expensive resources
    and that don’t change over time. Instead of


    ```

    class Foo(val myInput: String) {

    fun getExpensiveThing() =

    useLotsOfCpu(myInput)

    }

    ```


    you could write that as lazy delegation instead:


    ```

    class Foo(val myInput: String) {

    val expensiveThing: String by lazy {

    useLotsOfCpu(myInput)

    }

    }

    ```


    The benefit of delegating with `by lazy` is that the lambda will only execute
    once, the first time you invoke it, whereas the method will execute the CPU-exhaustive
    code every time.


    You also have control of how Kotlin manages parallel calls from multiple threads
    to your lazy property. You can choose between three thread-safety modes:


    *   `NONE`: No synchronization between threads. If multiple threads try to access
    the property simultaneously while it’s not yet initialized, the behavior is undefined.

    *   `PUBLICATION`: Allows multiple computations to run in parallel, but it uses
    the result of the first call that successfully completes. Further invocations
    after this do not cause the computation to execute.

    *   `SYNCHRONIZED`: Protects the computation with locks to ensure that it only
    runs a single time. Simultaneous calls wait for the first one to complete.


    The default mode is `SYNCHRONIZED`.


    Delegation is a deep subject in Kotlin, and you can do many things with it, not
    just lazy initialization. For example, instead of subclassing, you can delegate
    a class to an instance of an object, effectively inheriting a class from an instance.
    You can read more about it in the official Kotlin documentation here: [*https://kotlinlang.org/docs/delegated-properties.xhtml*](https://kotlinlang.org/docs/delegated-properties.xhtml).


    ## Inline Functions


    You can make functions in Kotlin that have zero overhead by making *inline functions*.


    Inline functions also have the benefit of not altering the calling context in
    any way. A good example of this is the transaction function in Kotliquery, the
    SQL library you’ve used in this book. In fact, the pull request yours truly submitted
    to Kotliquery, mentioned in Chapter [6](#531928_1_En_6_Chapter.xhtml) ([*https://github.com/seratch/kotliquery/pull/57*](https://github.com/seratch/kotliquery/pull/57)),
    made the `transaction` function inline. Listing [16-1](#531928_1_En_16_Chapter.xhtml#PC3)
    shows the rough outlines of the implementation of that function.


    ```

    fun <A> Session.transaction(

    block: (TransactionalSession) -> A

    ): A {

    try {

    connection.begin()

    return block(TransactionalSession(connection)).also {

    connection.commit()

    }

    } catch (e: Exception) {

    connection.rollback()

    throw e

    }

    }

    Listing 16-1

    The outline of the implementation of the transaction function from Kotliquery

    ```


    This code works fine, but one problem with it is that code inside the transaction
    block breaks the coroutine context. Kotlin does not know statically how a function
    uses lambda you pass to it. So Kotlin can’t assume that a function calls a lambda
    inline with the context it’s declared in. The following code breaks:


    ```

    runBlocking {

    dbSess.transaction { txSess ->

    delay(1)

    txSess.run(...)

    }

    }

    ```


    The fix for this issue is to mark the function as inline. Kotlin then knows that
    the function calls the lambda inline as well. It is possible to write inline functions
    that don’t call lambdas inline, but you need to explicitly mark lambdas with `noinline`
    or `crossinline` if that’s the case.


    By adding the `inline` keyword (`inline fun <A> Session.transaction(...)`) to
    the `transaction` function in Kotliquery, the code will run fine, as the Kotlin
    compiler treats the code in the lambda passed to transaction just the same it
    treats code outside of that lambda.


    The built-in scope functions, like `apply`, `with`, `also`, etc., are inline functions.
    That’s why they also work in any context and do not incur any compile-time or
    runtime penalties for expressivity or performance.


    ## Reified Generics


    Reified generics (or reified type parameters) solve a common pitfall on the Java
    platform: generic types are compile-time only. Often referred to as *type erasure*,
    there is no trace left in the compiled bytecode of the generic type. So, if you
    have a `List<String>`, all the bytecode and Java runtime know is that it’s a `List`.
    The type checking for it being strings happens in compiler passes before it generates
    the final output.


    Kotlin is not able to magically work around Java platform limitations. But Kotlin
    does have a solution. The key is inline functions, and you can only use reified
    generics in inline functions.


    The compiler removes (*inlines*) inline functions from the compiled output. The
    Kotlin compiler copies the body of the function into every location in your code
    where you call it. This means that it can replace the generic type with the actual
    type that you pass when calling the function. So a reified generic type to an
    inline function is just a shortcut for copying that code manually to all those
    places you call it from and replacing the generic with the actual type used at
    the call site.


    For example, let’s say you want to write a helper function that takes a JSON string
    and serializes it to the correct type. Listing [16-2](#531928_1_En_16_Chapter.xhtml#PC5)
    shows how you could attempt to do that.


    ```

    fun <T> serializeJson(json: String): T =

    Gson().fromJson(json, T::class.java)

    Listing 16-2

    Attempt to write a helper function for JSON serialization

    ```


    This code does not compile, though. That’s because of type erasure. When this
    code runs, the type of `T` is lost. So there’s no way for `serializeJson` to know
    what the type of `T` is.


    However, if you write it as an inline function with a reified generic, the compiler
    has everything it knows to make it work. Listing [16-3](#531928_1_En_16_Chapter.xhtml#PC6)
    shows how that works.


    ```

    inline fun <reified T> serializeJson(json: String): T =

    Gson().fromJson(json, T::class.java)

    Listing 16-3

    Using reified generics to write a helper function for JSON serialization

    ```


    The code is the same, except for the `inline` and `reified` keywords. Because
    the compiler inlines the function, it knows what the type of the generic is, as
    Kotlin resolves the types of an inline function during compilation and not in
    the runtime.'
