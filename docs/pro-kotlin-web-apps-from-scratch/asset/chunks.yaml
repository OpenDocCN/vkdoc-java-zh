    ### 映射到数据类


    你也可以将查询结果行表示为数据类。对于较简单的查询（例如选择表的所有列），我通常会这样做，这样可以在多个输出相似的查询中复用同一个数据类。清单 6-13 展示了一个数据类的示例，它将来自
    `user_t` 表的查询结果进行映射。


    ```

    data class User(

    val id: Long,

    val createdAt: ZonedDateTime,

    val updatedAt: ZonedDateTime,

    val email: String,

    val tosAccepted: Boolean,

    val name: String?,

    val passwordHash: ByteBuffer

    ) {

    companion object {

    fun fromRow(row: Map) = User(

    id = row["id"] as Long,

    createdAt = (row["created_at"] as OffsetDateTime)

    .toZonedDateTime(),

    updatedAt = (row["updated_at"] as OffsetDateTime)

    .toZonedDateTime(),

    email = row["email"] as String,

    name = row["name"] as? String,

    tosAccepted = row["tos_accepted"] as Boolean,

    passwordHash = ByteBuffer.wrap(

    row["password_hash"] as ByteArray

    )

    )

    }

    }

    dbSess.single(

    queryOf("SELECT * FROM user_t"),

    ::mapFromRow

    )?.let(User::fromRow)

    // User(

    //   id=1,

    //   createdAt=2022-07-27T16:40:44.410258+02:00,

    //   updatedAt=2022-07-27T16:40:44.410258+02:00,

    //   email=august@crud.business,

    //   tosAccepted=true,

    //   name=August Lilleaas,

    //   passwordHash=java.nio.HeapByteBuffer[pos=0 lim=6 cap=6]

    // )

    清单 6-13

    将查询结果映射到数据类

    ```


    该数据类使用 `companion object` 定义了 `fromRow` 函数，该函数根据查询结果行创建 `User` 实例。你也可以将 `fromRow`
    定义为独立函数，但能够编写 `User.fromRow(...)` 会更方便。在 Kotlin 中，将各种辅助函数和构造函数放在伴生对象中是一种常见模式。你可以将其视为
    Kotlin 版本的 Java 静态方法。


    你在 `single()` 的返回值上调用 `User.fromRow`。这是一个很好的例子，展示了如何结合使用 `let` 作用域函数和函数引用，从而减少一些输入和中间变量的创建。通过调用
    `?.let()` 而不是 `.let()`，你可以处理 `single()` 在未找到匹配行时返回 `null` 的情况。`User.fromRow(...)`
    接受一个参数，即行数据。作用域函数 `let` 也接受一个参数，即你调用 `let` 的对象。因此，在这种情况下，你可以使用函数引用 `User::fromRow`
    来代替 lambda 表达式。


    将表映射到数据类是我很少做的事情，但这取决于具体情况。通常，我会采用混合方法。清单 6-14 展示了两种替代方案的示例。


    ```

    def sendEmailToUserA(user: User) {

    deliverEmail(

    "Welcome, ${user["name"] ?: user["email"]}",

    user["email"] as String

    )

    }

    def sendEmailToUserB(userName: String?, userEmail: String) {

    deliverEmail(

    "Welcome, ${userName)}",

    userEmail

    )

    }

    def handleSignup() {

    val user = createUser(...).let(User::fromRow)

    sendEmailToUserA(user)

    sendEmailToUserB(user.name, user.email)

    }

    清单 6-14

    如何将查询结果数据类与业务逻辑结合

    ```


    `sendEmailToUserA` 的问题在于，任何想要调用该函数的人都必须构造一个包含所有属性的完整 `User` 对象，而调用 `sendEmailToUserA`
    实际只需要姓名和电子邮件。你可以将 `User` 数据类的大部分属性设为可空，但这样它就不再代表一个有效的用户，因为一个没有 ID 的用户是没有意义的。


    相反，我更喜欢编写像 `sendEmailToUserB` 这样的函数。这样，该函数不关心聚合体，只对其执行所需的单个数据点进行操作。


    不过，请根据你的判断来使用。有时，传递完整的数据类是有利的，而且很难制定一个通用规则来决定何时该做什么。


    ## 数据库事务


    事务是 SQL 数据库的一个标志性特性。我假设你具备一些先验知识，并且不会深入探讨围绕事务建模业务逻辑的许多复杂细节。不过，你需要学习如何创建、提交和回滚事务。


    ### 创建事务


    Kotliquery 会话本身不是事务性的。当你希望在事务中执行数据库操作时，必须手动显式创建一个事务。


    要创建事务，你可以在 Kotliquery 会话上调用 `transaction` 函数，并向其传递一个 lambda 表达式。该 lambda 表达式在事务内部执行。当
    lambda 表达式执行完毕时，Kotliquery 会提交事务；如果 lambda 中的代码抛出了异常，则会回滚事务。清单 6-15 展示了其工作原理。


    ```

    dbSess.transaction { txSess ->

    txSess.update(queryOf("INSERT INTO ..."))

    txSess.update(queryOf("INSERT INTO ..."))

    }

    清单 6-15

    创建事务并执行 SQL 语句

    ```


    `txSess` 代表打开的事务，它具有与普通 Kotliquery 会话完全相同的方法，例如 `single`、`list`、`update`、`forEach`
    等。如果清单 6-15 中的两个 `INSERT` 语句都成功执行，则事务被提交。另一方面，如果其中一个失败，`update` 函数将抛出异常，Kotliquery
    的事务处理代码会捕获该异常，并回滚事务而不是提交它。


    `ByteBuffer` 来自 `java.nio.ByteBuffer`。密码哈希是一个原始字节数组，在 Java 平台上，字节数组不实现相等性比较。因此，如果你尝试将
    `ByteArray` 值直接存储在数据类上，Kotlin 编译器会发出警告。通过将字节数组包装在 `ByteBuffer` 中，Kotlin 数据类可以正确地比较两个单独的字节值，以判断它们是否相等。


    如果你想回滚，也可以手动抛出异常。或者，你也可以直接调用 `txSess.connection.rollback()`。


    ### Web 处理器中的事务


    根据我的经验，大多数 Web 应用会要求大部分或所有与数据库相关的代码在事务中运行。因此，创建一个用于创建 Web 处理器并同时创建事务的辅助函数会很方便。


    你可以通过创建 `webResponse` 的另一个版本（称为 `webResponseTx`）来实现这一点。该函数与 `webResponseDb` 类似，但除了创建
    Kotliquery 会话外，它还会启动一个包裹整个 Web 处理器的事务。清单 6-16 包含了 `webResponseTx` 函数的实现。


    ```

    fun webResponseTx(

    dataSource: DataSource,

    handler: suspend PipelineContext.(

    dbSess: TransactionalSession

    ) -> WebResponse) = webResponseDb(dataSource) { dbSess ->

    dbSess.transaction { txSess ->

    handler(txSess)

    }

    }

    清单 6-16

    webResponseTx，一个同样会创建事务的 webResponseDb 版本

    ```


    提示


    最初，Kotliquery 不支持在挂起函数内部使用事务。`transaction` 本身不是一个 `suspend` 函数，因此 lambda 内部的处理器无法访问
    `suspend` 作用域。我提交了一个拉取请求来修复这个问题，包含该修复的 1.9 版本已发布。开源万岁！请在此处查看拉取请求：[`https://github.com/seratch/kotliquery/pull/57`](https://github.com/seratch/kotliquery/pull/57)*。*


    你调用此函数的方式与你在清单 6-9 中创建的 `webResponseDb` 相同。`webResponseTx` 和 `webResponseDb` 之间的唯一区别在于会话的类型分别是
    `TransactionalSession` 和 `Session`。

