- fmt: "### Remember to Refresh the Gradle Project in IntelliJ IDEA\n\nAs you grow\
    \ your project, you will make changes to `build.gradle.kts`, such as adding additional\
    \ third-party code as dependencies, configuring how to build JAR files for production,\
    \ and so on.\n\nIntelliJ IDEA has deep knowledge of the contents of `build.gradle.kts`.\
    \ For example, IntelliJ IDEA will auto-complete functions from all third-party\
    \ code added as dependencies to your Gradle project.\n\nWhen you make changes\
    \ to `build.gradle.kts`, IntelliJ IDEA requires that you refresh its knowledge\
    \ of the Gradle project. If you make changes to `build.gradle.kts` and don’t perform\
    \ a refresh, you can easily end up in a situation where you pull your hair out\
    \ in frustration, since IntelliJ IDEA’s knowledge of your project doesn’t match\
    \ your expectations.\n\nFortunately, IntelliJ IDEA is here to help. When there\
    \ are changes that are not refreshed yet, IntelliJ IDEA will display a small but\
    \ vital button, shown in Figure [1-9](#531928_1_En_1_Chapter.xhtml#Fig9). The\
    \ button shows the Gradle logo and a small refresh arrow. Click this icon to perform\
    \ a Gradle refresh.\n\n![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig9_HTML.png)\n\
    \nA screenshot of a window titled kotlinbook, Main.kt. The main.kt option is selected\
    \ under kotlinbook options. In the right tab, the text reads package kotlinbook,\
    \ and four lines of code are observed.\n\n**Figure 1-9** Popup for refreshing\
    \ Gradle project settings\n\nThe icon will only be visible when there are changes\
    \ made to `build.gradle.kts` that IntelliJ IDEA is not yet aware of. But it’s\
    \ easy to miss, so make sure you refresh your Gradle project in IntelliJ IDEA\
    \ every time you change `build.gradle.kts`.\n\n### Embrace Auto-completion in\
    \ IntelliJ IDEA\n\nIntelliJ IDEA has powerful auto-completion features. Maybe\
    \ you noticed it as you were typing in the `main` function earlier. As you type\
    \ in code with your keyboard, a dropdown appears near your cursor. This dropdown\
    \ contains all the viable symbols you can add at the location you’re writing currently,\
    \ limited to symbols that match what you’re currently typing.\n\nAuto-completion\
    \ is particularly useful when combined with auto-importing, as seen in Figure\
    \ [1-10](#531928_1_En_1_Chapter.xhtml#Fig10) and [1-11](#531928_1_En_1_Chapter.xhtml#Fig11).\
    \ If you select an auto-completion in IntelliJ IDEA and your choice is not imported\
    \ in the file you’re editing, IntelliJ IDEA will import it for you automatically.\n\
    \n![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig11_HTML.png)\n\nA screenshot\
    \ of a window titled kotlinbook, Main.kt. The main.kt option is selected under\
    \ kotlinbook option. In the right tab, the text reads package kotlinbook, and\
    \ four lines of code are observed.\n\n**Figure 1-11** Hit the Enter key, and the\
    \ auto-completion will add the full class name and add an import automatically\n\
    \n![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig10_HTML.png)\n\nA screenshot\
    \ of a window titled kotlinbook, Main.kt. The main.kt option is selected under\
    \ kotlinbook options. In the right tab, the text reads package kotlinbook, and\
    \ five lines of code are observed.\n\n**Figure 1-10** Partially typing `LocalTime`\
    \ in IntelliJ IDEA and getting auto-completion\n\nBy embracing auto-completion,\
    \ you’ll save yourself from manually typing everything, as well as having to manually\
    \ add import statements for code in other packages, be it from the standard library,\
    \ third-party code, or your own modules.\n\n# 2. Setting Up the Web App Skeleton\n\
    \n> *Look at all the things I’m not doing!*\n> \n> —David Heinemeier Hansson\n\
    \nThis chapter will give you superpowers. You will get all the way to a working\
    \ web app with routing, views/templates, and logging. You’ll set the stage for\
    \ what’s to come in later chapters. It will just be you and your IDE, no starter\
    \ kits or frameworks.\n\nIf you’re new to Kotlin, here are some language features\
    \ you’ll see examples of in this chapter:\n\n*   Lambdas\n*   Named arguments\n\
    \nAlso in this chapter, you will learn the following about creating web apps:\n\
    \n*   Setting up a web server, powered by Ktor, listening on port 4207\n*   Logging\
    \ setup, using SLF4J and Logback, configurable with standard `logback.xml` setup\n\
    *   Tweaking Ktor to display useful error messages when your application throws\
    \ unexpected errors\n\nYou’ll wire up all these things yourself, instead of having\
    \ a framework do it for you. If you’ve only used frameworks before, I envy you.\
    \ Prepare to be surprised how little manual wiring you need to do to get it done.\n\
    \n## Web Server Hello, World!\n\nIn Chapter [1](#531928_1_En_1_Chapter.xhtml),\
    \ you wrote a small program that printed “Hello, World!” It’s time to take it\
    \ to the next level: a full-fledged working web app that starts a server, sets\
    \ up URL routing, and outputs “Hello, World!” over HTTP.\n\n### Choosing Ktor\n\
    \nYou need a library to handle URL routing and to start up a web server to host\
    \ your web app. In this book, you’ll use Ktor. You can swap out Ktor for something\
    \ else later if you want, and in Appendix A you’ll learn how to use Jooby instead\
    \ of Ktor. But in the rest of the book, all the code you’ll write will use Ktor.\n\
    \nKtor is one of the most popular libraries for web app routing in Kotlin. It\
    \ has everything you need to build production-grade web apps, and it’s written\
    \ in Kotlin, so it’s both convenient and powerful to use and makes use of all\
    \ the relevant features that Kotlin has to offer for building web apps. It’s also\
    \ built to be highly scalable and performant and is battle proven across a large\
    \ number of real-world web apps.\n\nAnd, most importantly, Ktor is a library,\
    \ not a framework. Frameworks, such as Spring Boot, typically start a web server\
    \ automatically and use inversion of control to call your code, somewhere deep\
    \ down in tens of thousands of lines of framework code. The point of this book\
    \ is to learn how to do everything yourself, from scratch.\n\nInterestingly, Ktor\
    \ labels itself a framework. There aren’t any widely accepted definitions of libraries\
    \ vs. frameworks. The one I use in this book is that frameworks automatically\
    \ and implicitly do things for you, whereas libraries do nothing unless you explicitly\
    \ tell them to. Ktor nicely fits this definition of a library.\n\n### Add the\
    \ Ktor Library\n\nAdd Ktor as a dependency in `build.gradle.kts`, inside the `dependencies`\
    \ block. Ktor needs two dependencies to work: the server core, and the specific\
    \ server implementation (Netty in this case):\n\n```\ndependencies {\n    implementation(\"\
    io.ktor:ktor-server-core:2.1.2\")\n    implementation(\"io.ktor:ktor-server-netty:2.1.2\"\
    )\n}\n```\n\n**Tip** Remember to refresh the Gradle project in IntelliJ when you\
    \ update `build.gradle.kts`. Use the small popup that appears when there are changes\
    \ that Gradle hasn’t refreshed yet or open the Gradle tab and click the refresh\
    \ button.\n\nGradle automatically downloads the dependencies and makes them available\
    \ to your own code."
