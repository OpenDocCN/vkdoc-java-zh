- fmt: '### Avoid Automatic Serialization


    When building web apps, you should always be explicit about serialization and
    avoid automatic serialization from dynamic data formats like XML and JSON to type-safe
    data classes.


    Kotlin has plenty of libraries for converting dynamic data formats like XML and
    JSON to typed data classes automatically. Ending up with type-safe data classes
    is a good thing. But automatically converting dynamic data to a type-safe data
    class is problematic.


    An example of automatic data serialization is `kotlinx.serialization` ([https://github.com/Kotlin/kotlinx.serialization](https://github.com/Kotlin/kotlinx.serialization)).
    There’s no problem with the library itself; it’s a well-made library that does
    exactly what it’s supposed to. The essence of `kotlinx.serialization` is that
    you make data classes and annotate them with `kotlinx.serialization.Serializable`.
    These data classes can transform to and from various data formats. Listing [10-3](#531928_1_En_10_Chapter.xhtml#PC3)
    shows how you can serialize to and from JSON, via a type-safe data class.


    ```

    @Serializable

    data class MyThing(val myVal: String, val foo: Int)

    val obj = Json.decodeFromString(

    """{"myVal":"testing", "foo": 123}"""

    )

    obj.myVal

    // "testing"

    Json.encodeToString(obj)

    // Returns {"myVal":"testing", "foo": 123}

    Listing 10-3

    Demonstrating kotlinx.serialization basics

    ```


    Using `kotlinx.serialization` saves you from a lot of manual typing, as all you
    need to do is to combine a data class with a JSON string and have Kotlin do the
    rest of the work.


    However, the major downside is that this tightly couples your public API to your
    internal code base. If you change the name `MyThing.myVal` in your own code, you
    also break callers to your own API.


    Another downside is that your API entities are forced to follow Kotlin naming
    conventions. In JSON, it’s common to use `underscore_case` and not `camelCase`
    for property names. But since you’re doing a 1:1 serialization between dynamic
    data and typed Kotlin data classes, they must be the same.


    Note that this is heavily in the camp of opinionated best practice, and there
    are plenty of smart and productive developers who will disagree with this proposition.
    But I consistently make this distinction in all my production-grade web apps,
    to maintain flexibility and agility in my own code while at the same time allowing
    stability and backward compatibility for external callers of the API.


    ### Internal vs. External APIs


    What you’ve learned in this section is mostly applicable for internal APIs. By
    that, I mean APIs that you consume with your own code or with code that’s written
    by people whom you’ll work closely with.


    If you’re writing a public-facing API, such as an API that’s a part of a SaaS
    product, you should make sure that your API has stellar error messages and behaves
    perfectly with correct HTTP status codes, no matter what you throw at it. The
    current code will just throw a 5xx error (server error) if you post invalid JSON
    to it, for example, whereas technically the correct status code would be in the
    4xx series (client error).


    The techniques in this chapter are not sufficient for that level of detail. There
    are two reasons I’m not teaching you how to do it “properly” for large-scale public
    APIs.


    The first is that it’s costly. When you and people you work with are the only
    consumers of your API, you’ll get far with a README file that explains the basics
    and an API that yields useful error messages most of the time, but will occasionally
    throw a 500 error if someone posts sufficiently bad data to your API.


    The second is that I’ve never actually made a public-facing API. I have lots of
    ideas on how to do it correctly. But since I don’t have any real-world experience
    doing it, I don’t think I’m the right person to teach you how to do it.


    ## Single-Page Apps


    A use case for APIs often seen in the wild is to target browsers and JavaScript-based
    *single-page apps* (SPAs).


    ### Hosting Alongside API


    One way to set up a single-page app is to host both the API and the front end
    from the same web app.


    At the core of the SPA is an `index.xhtml` file that loads your JavaScript code
    and other vital assets. In most modern single-page apps, your JavaScript is set
    up to use the `pushState` browser API as a part of its routing from various parts
    of your SPA. For example, the often-used routing library React Router for the
    React JavaScript framework operates in this manner. What this means is that when
    you first open the URL `/` (the root page), the back end serves the `index.xhtml`
    file, which in turn loads your JavaScript, and the SPA router renders the correct
    content. Then, you click a button in your SPA, and JavaScript ends up invoking
    `pushState` so that the URL changes from `/` to `/something_else`, and your JavaScript
    renders some different content appropriate for that URL.


    The problem with this is when you share a link to that page or the user tries
    to refresh, the current URL in the browser is `/something_else`, and that’s the
    route that your Ktor routing will try to load. So, if all you did was set up `/`
    to serve `index.xhtml`, you’d now get a 404 page because your Ktor back end does
    not have a mapping for `/something_else`.


    One solution would be to manually add all known routes in your SPA and copy them
    to your Ktor routing. That’s not really a feasible option, though, as you’d end
    up with lots of manual and error-prone copy-pasting.


    Another option is to use the special `singlePageApplication` route type in Ktor.
    `singlePageApplication` works just like `static`, except that it also sets up
    your routes so that any route that Ktor does not handle will render your `index.xhtml`
    file. With this setup, refreshing the page directly on `/something_else` works,
    because you don’t have a route handler in your Ktor web app for that path, which
    in turn causes the `singlePageApplication` route to trigger and load the `index.xhtml`,
    causing your JavaScript to run and handle the rendering of the correct page. Listing
    [10-4](#531928_1_En_10_Chapter.xhtml#PC4) shows how to set it up.


    ```

    singlePageApplication {

    if (appConfig.useFileSystemAssets) {

    filesPath = "src/main/resources/public"

    } else {

    useResources = true

    filesPath = "public"

    }

    defaultPage = "index.xhtml"

    }

    Listing 10-4

    Setting up singlePageApplication inside createKtorApplication to host a SPA from
    your web app

    ```


    You should make sure to remove your existing `static("/")` route before you add
    the `singlePageApplication("/")` route. The old `static("/")` route conflicts
    with `singlePageApplication("/")`, which does everything your old `static("/")`
    route did anyway.


    The config properties in `singlePageApplication` are the same as those you use
    in `static`. When running locally, you point to the files in the file system,
    whereas when running in production, you point to the assets that your Gradle build
    compiles into the Java class path of the compiled output.


    The `defaultPage` points to the `index.xhtml` file that bootstraps your SPA. This
    file should live in `src/main/resources/public/index.xhtml`. Typically, this file
    only contains a bare-bones HTML file that loads the JavaScript that you use to
    load your SPA. The reason it’s a HTML file, and not `kotlinx.xhtml` DSL code,
    is that you’ll likely use some kind of SPA build tool such as Webpack to build
    your SPA, which often generates its own HTML bootstrapping code that you must
    use. Additionally, the file should be completely static and not change contents
    based on which route you’re looking at. So having it as a static file works fine.'
  raw: '### Avoid Automatic Serialization


    When building web apps, you should always be explicit about serialization and
    avoid automatic serialization from dynamic data formats like XML and JSON to type-safe
    data classes.


    Kotlin has plenty of libraries for converting dynamic data formats like XML and
    JSON to typed data classes automatically. Ending up with type-safe data classes
    is a good thing. But automatically converting dynamic data to a type-safe data
    class is problematic.


    An example of automatic data serialization is `kotlinx.serialization` ([*https://github.com/Kotlin/kotlinx.serialization*](https://github.com/Kotlin/kotlinx.serialization)).
    There’s no problem with the library itself; it’s a well-made library that does
    exactly what it’s supposed to. The essence of `kotlinx.serialization` is that
    you make data classes and annotate them with `kotlinx.serialization.Serializable`.
    These data classes can transform to and from various data formats. Listing [10-3](#531928_1_En_10_Chapter.xhtml#PC3)
    shows how you can serialize to and from JSON, via a type-safe data class.


    ```

    @Serializable

    data class MyThing(val myVal: String, val foo: Int)

    val obj = Json.decodeFromString(

    """{"myVal":"testing", "foo": 123}"""

    )

    obj.myVal

    // "testing"

    Json.encodeToString(obj)

    // Returns {"myVal":"testing", "foo": 123}

    Listing 10-3

    Demonstrating kotlinx.serialization basics

    ```


    Using `kotlinx.serialization` saves you from a lot of manual typing, as all you
    need to do is to combine a data class with a JSON string and have Kotlin do the
    rest of the work.


    However, the major downside is that this tightly couples your public API to your
    internal code base. If you change the name `MyThing.myVal` in your own code, you
    also break callers to your own API.


    Another downside is that your API entities are forced to follow Kotlin naming
    conventions. In JSON, it’s common to use `underscore_case` and not `camelCase`
    for property names. But since you’re doing a 1:1 serialization between dynamic
    data and typed Kotlin data classes, they must be the same.


