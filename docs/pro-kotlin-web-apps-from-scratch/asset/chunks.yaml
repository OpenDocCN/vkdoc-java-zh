  trans: '

    # 3. 配置文件


    所有 Web 应用都需要配置文件。配置文件让你能够将数据库凭据、API 密钥以及 HTTP 服务器运行端口等内容从源代码中移出，放到一个独立的配置文件中。


    你的应用至少会在三种不同的环境中运行：本地开发、自动化测试和生产环境。配置文件使得每个环境都能拥有不同的默认值，所有这些都纳入版本控制，并且易于复现。


    即使没有配置文件，你也可以完成本书中的示例，但这样你就无法学会如何从零开始构建可用于生产环境的 Web 应用。


    如果你刚接触 Kotlin，本章将展示以下语言特性的示例：


    *   使用构造函数定义类

    *   数据类

    *   `let` 代码块

    *   单参数 lambda 表达式的 `it` 简写

    *   空安全与可空类型

    *   元编程

    *   正则表达式

    *   Elvis 操作符

    *   单表达式函数


    此外，在本章中，你将学习如何在 Web 应用中使用配置文件：


    *   使属性可配置，而非硬编码

    *   将配置存储在纳入版本控制的配置文件中

    *   为不同环境设置不同的默认配置值

    *   通过环境变量提供生产密码和 API 密钥等机密信息，而不将其纳入版本控制

    *   在应用启动时记录配置，以提高透明度和便于调试


    你将把值放在配置文件中，而不是在源代码中硬编码。你将使用 Typesafe Config 库来管理配置。在附录 B 中，你将学习如何用 Hoplite 替换
    Typesafe Config。


    ## 创建配置文件


    正如本章标题所示，你将把配置存储在配置文件中。第一步是创建这个文件，在其中存储一些配置，并使用配置文件中的值，而不是在源代码中硬编码。


    ### 配置文件结构


    什么是配置文件？它应该包含什么内容？如何编写？


    配置文件是一个键/值查找系统。你将在文件中编写配置属性，为其赋值，将配置文件加载到 Web 应用中，然后获取这些赋值后的值。


    配置文件使用一种通常称为 HOCON 的格式。这种格式是 JSON 的超集，支持类型化值和嵌套属性。虽然 JSON 非常适合解析和输出 API 数据，但在手动输入配置值时，它是一种比较繁琐的格式。


    在 *src/main/resources/app.conf* 中创建你的配置文件。目前，你只需在其中放入 Web 应用绑定的 HTTP 端口。在清单 3-1
    中，你可以看到这样一个配置文件的完整工作示例。


    ```

    httpPort = 4207

    清单 3-1

    app.conf 配置文件，指定 Web 应用将使用的 HTTP 端口

    ```


    HOCON 文件格式非常直观且易读。每一行由一个配置属性名（`httpPort`）、一个等号（`=`）以及要赋给该配置属性的值（`4207`）组成。


    ### 从配置文件中读取值


    为了加载和访问配置文件中的值，你将使用一个名为 Typesafe Config 的库。这是一个简单的库，用于读取配置文件，并提供编程接口来读出配置文件中的值。


    你需要将 Typesafe Config 作为依赖项添加到你的 Web 应用中。如前面章节所示，将以下内容添加到 *build.gradle.kts* 的
    `dependencies` 代码块中：


    ```

    implementation("com.typesafe:config:1.4.2")

    ```


    为了读取你的配置文件，你将使用 Typesafe Config 提供的 `ConfigurationFactory` 类。它有一个 `load()` 方法，可以连接你的配置并使其在代码中可访问：


    ```

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    ```


    这会给你一个 `Config` 对象，它拥有访问你在配置文件中定义的属性所需的一切。例如，要获取配置的 HTTP 端口的值，你可以调用 `config.getInt("httpPort")`。


    Config 对象有多个方法可用于获取特定类型的配置值。`getInt`、`getLong`、`getString`、`getBoolean` 等都会返回你在方法调用中指定类型的配置值。


    提示


    使用自动补全功能查看 `Config` 对象上有哪些可用的 getter 方法。在代码中输入 `config.get`，然后稍等片刻，你会看到一个弹出窗口，显示
    Config 上所有以 `get` 开头的方法。


    Typesafe Config 还会执行验证，如果无法转换为你要的类型，则会抛出异常。例如，`config.getBoolean("httpPort")`
    会失败，因为 Typesafe Config 不知道如何将 `4207` 转换为布尔值。


    清单 3-2 展示了一个完整的示例，说明如何在应用中加载和访问配置文件，以及如何使用 *app.conf* 中的 `httpPort`，而不是在 Kotlin
    源代码中硬编码端口号。


    ```

    val config = ConfigFactory

    .parseResources("app.conf")

    .resolve()

    embeddedServer(Netty, port = config.getInt("httpPort")) {

    // ...你现有的代码在这里

    清单 3-2

    使用 Typesafe Config 加载配置文件并将其用于向代码提供配置值的示例

    ```


    ## 使配置尽早失败且类型安全


    直接使用 Typesafe Config 的原始 `Config` 对象是可以的。但使用它有两个需要解决的问题。


    第一个问题是 Config 对象是*延迟失败*的，但它应该是*尽早失败*的。尽早失败是一种编程模式，即失败应尽可能靠近失败原因发生的位置。例如，如果你传递一个
    `Config` 对象，并且某个属性缺失或类型设置错误，那么直到你在代码深处访问配置属性时才会失败。相反，你希望它尽可能早地失败，理想情况下是在你将配置文件读取并加载到
    Web 应用时。


    第二个问题是配置属性名的类型安全性有限。当你使用字符串来引用配置属性的名称时，例如 `config.getInt("httpPort")`，即使属性名中有拼写错误，你的代码也能正常编译。为了让
    Kotlin 编译器在你拼错配置属性时抛出错误，你应该能够写出类似 `config.httpPort` 这样的代码。


    你可以通过使用 Kotlin *数据类*来表示你的配置文件来解决这些问题。

    '
- fmt: '### Store Configuration in a Data Class


    In general, it’s nice to have the data in your system represented as just that
    – data – and not opaque objects with behaviors and error states. Data is transparent
    and immutable and carries no extra meaning or behaviors other than the data itself.


    A `data class` in Kotlin is bridging the gap between objects and immutable data.
    You can think of data classes as restricted and typed hash maps. A data class
    only stores data and has no behavior associated with it. It comes with built-in
    *value semantics*: it’s immutable, and it implements equality so that the Java
    platform considers two instances of the same data class containing the same data
    to be equal.


    Listing [3-3](#531928_1_En_3_Chapter.xhtml#PC5) shows the initial data class representation
    of your config file. It only has one property for now, but you’ll extend this
    later when you add more properties to your configuration file.


    ```

    data class WebappConfig(

    val httpPort: Int

    )

    Listing 3-3

    A data class to represent your configuration file

    ```


    This looks just like a normal Kotlin class, except it starts with the keyword
    `data` to indicate that it’s a data class and not a plain class.


    The code inside the parentheses are the constructor arguments. By adding `val`
    before the name of the argument, you indicate to Kotlin that in addition to taking
    the `httpPort` as the first constructor argument, you also want to store it as
    a property on the class instances. `val` indicates an immutable property, whereas
    `var` makes it mutable.


    To create an instance of this data class, you construct it like you would any
    other class in Kotlin:


    ```

    WebappConfig(4207)

    ```


    As you saw in Chapter [2](#531928_1_En_2_Chapter.xhtml), you can use named arguments
    so that people who read this code can understand what the number `4207` means.
    In fact, it’s a convention in Kotlin to always use named arguments for data classes.
    This makes the code more readable, and when you have multiple constructor arguments,
    you don’t have to pass them in the same order as they’re defined in the data class:


    ```

    WebappConfig(

    httpPort = 4207

    )

    ```


    ### Load Config into the Data Class


    The next step is to convert the `Config` object from Typesafe Config to an instance
    of your own `WebappConfig`.


    The simplest way of doing this is to do the mapping completely by hand:


    ```

    WebappConfig(

    httpPort = config.getInt("httpPort")

    )

    ```


    Your configuration will now fail early. As you load the config and create the
    instance of `WebappConfig`, you’ll immediately call `getInt` on config, which
    will fail if Typesafe Config is unable to cast it to an integer.


    It’s also type-safe on access. Kotlin knows that you named the config property
    `httpPort`. Typing `config.getInt("http proot")` would cause a runtime error,
    but `config.httpProot` will fail when you compile your code.


    ### Kotlin Null Safety


    Kotlin is strict about null safety. Kotlin will throw a compile error if you pass
    null to something that doesn’t handle nulls.


    `WebappConfig` uses the *non-nullable* type `Int` for the `httpPort` property.
    This means that if you try to do something like `WebappConfig(httpPort = null)`,
    you’ll get a compile error.


    If you want to be able to set something to null, you should instead use a *nullable
    type*. Listing [3-4](#531928_1_En_3_Chapter.xhtml#PC9) shows an example of adding
    a nullable type, `String?`, to store the database password in your configuration.


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbPassword: String?

    )

    Listing 3-4

    A data class with a nullable and non-nullable type

    ```


    You will still get a compile error if you try to set `httpPort` to `null`. But
    you can set `dbPassword` to `null`, such as `WebappConfig(httpPort = 4207, dbPassword
    = null)`. Data classes also let you omit nullable properties with `WebappConfig(httpPort
    = 4207)`, as a convenient shortcut for setting them to null.


    ### Kotlin Platform Types


    Kotlin has a concept called *platform types*. Java has a weaker type system than
    Kotlin, especially around nulls. Java allows any object reference to be `null`
    at any time. Typesafe Config is written in Java, which means that the Kotlin compiler
    can’t guarantee compile-time that a Java method that returns an object is not
    `null`.


    The Java method `config.getInt("...")` has the Java return type of `int` – a primitive
    integer value – and not the object type `Integer`. Primitives in Java can never
    be null, so Kotlin casts the type to the non-nullable `Int` type.


    However, the Java method `config.getString("...")` has the Java return type of
    `String`, which is an object, and *can* be null. Kotlin does *not*, however, cast
    to the nullable type `String?`. Instead, it’s casted to the *platform type* `String!`.


    Platform types essentially mean “I’ll allow you to pass this thing, which might
    be `null`, to a non-nullable type.” Listing [3-5](#531928_1_En_3_Chapter.xhtml#PC10)
    shows how you can pass platform types to non-nullable types, even though the Kotlin
    compiler doesn’t know at compile time whether the value is null.


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbUsername: String,

    val dbPassword: String?

    )

    WebappConfig(

    httpPort = 4207,

    dbUsername = config.getString("dbUsername")

    )

    Listing 3-5

    Passing the platform type String! to the non-nullable type String

    ```


    If Kotlin allowed the creation of `WebappConfig` with `dbUsername` set to `null`,
    all the guarantees from the Kotlin type system would be out the window, and any
    code that reads `dbUsername` would be prone to null pointer exceptions.


    Thankfully, Kotlin will fail early here as well. Kotlin adds runtime checks to
    all variable and property assignments where the type is non-nullable. You will
    get a null pointer exception, but you’ll get it the moment your code tries to
    create an instance of `WebappConfig` with `dbUsername` set to `null`. This means
    that all places in your code that operate on non-nullable types will still continue
    to do so safely, as Kotlin didn’t allow the creation of an invalid type in the
    runtime.


    ### Use the Data Class in Your Web App


    When your web app starts up, you should load the config file and create an instance
    of `WebappConfig` as soon as possible. Later, when you add more functionality,
    it will likely require the configuration properties to be readily accessible so
    that you can use them to wire up your web app. So wiring up configuration is often
    the first thing a web app does, and then it starts up.


    Listing [3-6](#531928_1_En_3_Chapter.xhtml#PC11) shows how to create a function
    that first loads the configuration file and then creates an instance of `WebappConfig`,
    so that you have the configuration available for use.


    ```

    fun createAppConfig(): WebappConfig {

    val rawConfig = ConfigFactory

    .parseResources("app.conf")

    .resolve()

    return WebappConfig(

    httpPort = rawConfig.getInt("httpPort")

    )

    }

    Listing 3-6

    Creating a function for loading configuration in your web app

    ```


    You now have the same `WebappConfig` as before, but you’re storing the values
    in a config file, instead of hard-coded into your source code.'
