- fmt: '### Adding a Layout


    The Ktor HTML DSL has built-in support for layouts. The basic structure of a layout
    is to create a subclass of `Template<HTML>` and implement the required methods.
    Listing [9-6](#531928_1_En_9_Chapter.xhtml#PC8) shows an example of a basic, but
    still useful, template.


    ```

    class AppLayout(

    val pageTitle: String? = null

    ): Template {

    val pageBody = Placeholder()

    override fun HTML.apply() {

    val pageTitlePrefix = if (pageTitle == null) {

    ""

    } else {

    "${pageTitle} - "

    }

    head {

    title {

    +"${pageTitlePrefix}KotlinBook"

    }

    styleLink("/app.css")

    }

    body {

    insert(pageBody)

    }

    }

    }

    Listing 9-6

    A basic Ktor HTML DSL template

    ```


    The template is just a normal Kotlin class. The class has a single constructor
    argument, `pageTitle`. It’s just a normal class, so you can set it up to take
    as many constructor arguments as you need. You use `pageTitle` just like a normal
    property of a normal class, to insert a page title inside the `head` block. Plain
    Kotlin code sets it up to always contain the name of the app, `"KotlinBook"` and,
    if the `pageTitle` is set, prefix it so you get `"My page title - KotlinBook"`.
    This shows another benefit of using the `kotlinx.xhtml` DSL. You don’t need a
    special templating language to add logic to your templates; it’s all expressed
    as plain Kotlin code.


    The class also sets up a `pageBody` property of the type `Placeholder<BODY>`.
    You can have as many of these placeholders as you like, as they too are plain
    properties of your template class, and you use them to insert `kotlinx.xhtml`
    DSL code that you provide to the template when you invoke it. Since it’s of the
    type `BODY`, you’re allowed to call `insert(pageBody)` inside the `body` block,
    as the types all match up. And when you use the template, the type system knows
    that the placeholder can only use tags that are allowed by `kotlinx.xhtml` inside
    `BODY`.


    ### Using the Layout


    To use this layout in a web handler, you can use `call.respondHtmlTemplate`. Listing
    [9-7](#531928_1_En_9_Chapter.xhtml#PC9) shows how to call your template correctly.


    ```

    call.respondHtmlTemplate(AppLayout("Hello, world!")) {

    pageBody {

    h1 {

    +"Hello, World!"

    }

    }

    }

    Listing 9-7

    Loading a reusable template in a Ktor web handler

    ```


    The implicit `this` inside the lambda is the instance of your template. That’s
    why you’re allowed to call `pageBody`, as it’s just a shortcut for `this.pageBody`.
    All the `kotlinx.xhtml` DSL code inside the `pageBody` block is added to the corresponding
    location of your `AppLayout` template, just as you set it up in Listing [9-6](#531928_1_En_9_Chapter.xhtml#PC8).


    ## Adding `WebResponse` for HTML


    So far, you’ve worked with `kotlinx.xhtml` using the Ktor APIs directly. But you
    also need to be able to write HTML when you use your `webResponse` and `webResponseDb`
    helpers.


    ### Implementing `HtmlWebResponse`


    `webResponse` and its namesakes are set up to handle any subclass of the `WebResponse`
    abstract class. To be able to handle `kotlinx.xhtml`, you need to add a new subclass
    of `WebResponse` that holds the desired HTML output and add a mapping inside `webResponse`
    to write that HTML output to your Ktor web handlers (and, later in the book, other
    web frameworks and server environments). Listing [9-8](#531928_1_En_9_Chapter.xhtml#PC10)
    shows the first step, which is to implement this new data class.


    ```

    data class HtmlWebResponse(

    val body: Template,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf(),

    ) : WebResponse() {

    override fun copyResponse(

    statusCode: Int,

    headers: Map>

    ) =

    copy(body, statusCode, headers)

    }

    Listing 9-8

    An implementation of HTML responses in WebResponse

    ```


    There’s not much going on here, as the purpose of `WebResponse` classes is to
    simply hold on to the data that represents your response.


    The next step is to add mapping for this new type in your mapping code between
    Ktor and `WebResponse`. You’ll need to update the `webResponse` function and add
    a separate case for the new `HtmlWebResponse` class. Listing [9-9](#531928_1_En_9_Chapter.xhtml#PC11)
    shows how to do that.


    ```

    when (resp) {

    is TextWebResponse -> {

    ...

    }

    is JsonWebResponse -> {

    ...

    }

    is HtmlWebResponse -> {

    call.respondHtml(statusCode) {

    with(resp.body) { apply() }

    }

    }

    }

    Listing 9-9

    Implementing and mapping HtmlWebResponse to Ktor in webResponse

    ```


    You don’t need to use `respondHtmlLayout` in this mapping, as you can still use
    layouts without any special mapping, as you’ll see later in this chapter.


    ### Extension Function Precedence


    There’s a little bit of Kotlin trickery needed to make the mapping between `HtmlWebResponse`
    and Ktor work, namely, the code `with(resp.body) { apply() }` in Listing [9-9](#531928_1_En_9_Chapter.xhtml#PC11).


    The problem is shadowing, which means that two different things have the same
    name. `resp.body` is of the type `Template<HTML>`. That class has a method declared
    on it, named `apply`. But Kotlin *also* has a built-in function called `apply`,
    which is part of the scope function suite, with `let`, `also`, etc. So you need
    to ensure that you’re calling the correct one.


    If you wrote `resp.body.apply()`, you’d get a compile error. That’s because the
    Kotlin compiler thinks you’re attempting to call the built-in scope function `apply`.
    That scope function takes a lambda as a required argument, which you’re not passing,
    which causes the compile error.


    `with` is another built-in scope function, and it’s used to solve this problem.
    `with` takes an object and calls the lambda with that object as the default receiver.
    In blocks with a default receiver, that receiver and its methods take precedence.
    So the `apply` inside the `with` block targets the `apply` method on `Template<HTML>`.


    This is a little tricky, but the example in Listing [9-10](#531928_1_En_9_Chapter.xhtml#PC12)
    shows a small demonstration of this precedence rule in isolation, which might
    help you better understand what’s going on.


    ```

    class MyThing {

    fun String.testMe() {

    println("MyThing testMe")

    }

    }

    fun String.testMe() {

    println("Top level testMe")

    }

    "Hello!".testMe()

    // Top level testMe

    with(MyThing()) { "Hello!".testMe() }

    // MyThing testMe

    Listing 9-10

    Demonstrating extension function precedence

    ```


    If you want to read about this in full detail, the Kotlin specification includes
    complete definitions of all the behavior of the Kotlin compiler: [*https://kotlinlang.org/spec/kotlin-spec.xhtml*](https://kotlinlang.org/spec/kotlin-spec.xhtml).


    ### Responding with `HtmlWebResponse`


    To respond with HTML from a `webResponse` handler, all you need to do is to return
    a `HtmlWebResponse` instance in your web handler.


    You don’t have the `call.respondHtmlTemplate` helper available in `webResponse`,
    but you can use a layout fine without it, by calling `apply` on the template and
    using the already familiar template placeholders inside the `apply` block. Listing
    [9-11](#531928_1_En_9_Chapter.xhtml#PC13) demonstrates how to do this.


    ```

    get("/html_webresponse_test", webResponse {

    HtmlWebResponse(AppLayout("Hello, world!").apply {

    pageBody {

    h1 {

    +"Hello, readers!"

    }

    }

    })

    })

    Listing 9-11

    A HtmlWebResponse with a layout

    ```


    Responding without a layout is a little tricker, because the `HtmlWebResponse`
    class expects a full instance of `Template<HTML>`. You can use Kotlin’s *object
    expressions* to create on the fly implementations of classes, denoted by the `object`
    keyword. Listing [9-12](#531928_1_En_9_Chapter.xhtml#PC14) shows how to do this.


    ```

    get("/html_webresponse_test", webResponse {

    HtmlWebResponse(object : Template {

    override fun HTML.apply() {

    head {

    title { + "Plain HTML here! "}

    }

    body {

    h1 { +"Very plan header" }

    }

    }

    })

    })

    Listing 9-12

    A HtmlWebResponse without a layout

    ```


    This creates an inline template that’s only used once, which practically becomes
    the equivalent of using no template for that web handler.'
  raw: '### Adding a Layout


    The Ktor HTML DSL has built-in support for layouts. The basic structure of a layout
    is to create a subclass of `Template<HTML>` and implement the required methods.
    Listing [9-6](#531928_1_En_9_Chapter.xhtml#PC8) shows an example of a basic, but
    still useful, template.


    ```

    class AppLayout(

    val pageTitle: String? = null

    ): Template {

    val pageBody = Placeholder()

    override fun HTML.apply() {

    val pageTitlePrefix = if (pageTitle == null) {

    ""

    } else {

    "${pageTitle} - "

    }

    head {

    title {

    +"${pageTitlePrefix}KotlinBook"

    }

    styleLink("/app.css")

    }

    body {

    insert(pageBody)

    }

    }

    }

    Listing 9-6

    A basic Ktor HTML DSL template

    ```


    The template is just a normal Kotlin class. The class has a single constructor
    argument, `pageTitle`. It’s just a normal class, so you can set it up to take
    as many constructor arguments as you need. You use `pageTitle` just like a normal
    property of a normal class, to insert a page title inside the `head` block. Plain
    Kotlin code sets it up to always contain the name of the app, `"``KotlinBook``"`
    and, if the `pageTitle` is set, prefix it so you get `"My page title - KotlinBook"`.
    This shows another benefit of using the `kotlinx.xhtml` DSL. You don’t need a
    special templating language to add logic to your templates; it’s all expressed
    as plain Kotlin code.


    The class also sets up a `pageBody` property of the type `Placeholder<BODY>`.
    You can have as many of these placeholders as you like, as they too are plain
    properties of your template class, and you use them to insert `kotlinx.xhtml`
    DSL code that you provide to the template when you invoke it. Since it’s of the
    type `BODY`, you’re allowed to call `insert(pageBody)` inside the `body` block,
    as the types all match up. And when you use the template, the type system knows
    that the placeholder can only use tags that are allowed by `kotlinx.xhtml` inside
    `BODY`.


    ### Using the Layout


    To use this layout in a web handler, you can use `call.respondHtmlTemplate`. Listing
    [9-7](#531928_1_En_9_Chapter.xhtml#PC9) shows how to call your template correctly.


    ```

    call.respondHtmlTemplate(AppLayout("Hello, world!")) {

    pageBody {

    h1 {

    +"Hello, World!"

    }

    }

    }

    Listing 9-7

    Loading a reusable template in a Ktor web handler

    ```


    The implicit this inside the lambda is the instance of your template. That’s why
    you’re allowed to call `pageBody`, as it’s just a shortcut for `this.pageBody`.
    All the kotlinx.xhtml DSL code inside the `pageBody` block is added to the corresponding
    location of your `AppLayout` template, just as you set it up in Listing [9-6](#531928_1_En_9_Chapter.xhtml#PC8).


    ## Adding `WebResponse` for HTML


    So far, you’ve worked with `kotlinx.xhtml` using the Ktor APIs directly. But you
    also need to be able to write HTML when you use your `webResponse` and `webResponseDb`
    helpers.


    ### Implementing `HtmlWebResponse`


    `webResponse` and its namesakes are set up to handle any subclass of the `WebResponse`
    abstract class. To be able to handle `kotlinx.xhtml`, you need to add a new subclass
    of `WebResponse` that holds the desired HTML output and add a mapping inside `webResponse`
    to write that HTML output to your Ktor web handlers (and, later in the book, other
    web frameworks and server environments). Listing [9-8](#531928_1_En_9_Chapter.xhtml#PC10)
    shows the first step, which is to implement this new data class.


    ```

    data class HtmlWebResponse(

    val body: Template,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf(),

    ) : WebResponse() {

    override fun copyResponse(

    statusCode: Int,

    headers: Map>

    ) =

    copy(body, statusCode, headers)

    }

    Listing 9-8

    An implementation of HTML responses in WebResponse

    ```


    There’s not much going on here, as the purpose of `WebResponse` classes is to
    simply hold on to the data that represents your response.


    The next step is to add mapping for this new type in your mapping code between
    Ktor and `WebResponse`. You’ll need to update the `webResponse` function and add
    a separate case for the new `HtmlWebResponse` class. Listing [9-9](#531928_1_En_9_Chapter.xhtml#PC11)
    shows how to do that.


    ```

    when (resp) {

    is TextWebResponse -> {

    ...

    }

    is JsonWebResponse -> {

    ...

    }

    is HtmlWebResponse -> {

    call.respondHtml(statusCode) {

    with(resp.body) { apply() }

    }

    }

    }

    Listing 9-9

    Implementing and mapping HtmlWebResponse to Ktor in webResponse

    ```


    You don’t need to use `respondHtmlLayout` in this mapping, as you can still use
    layouts without any special mapping, as you’ll see later in this chapter.


    ### Extension Function Precedence


    There’s a little bit of Kotlin trickery needed to make the mapping between `HtmlWebResponse`
    and Ktor work, namely, the code `with(resp.body) { apply() }` in Listing [9-9](#531928_1_En_9_Chapter.xhtml#PC11).


    The problem is shadowing, which means that two different things have the same
    name. `resp.body` is of the type `Template<HTML>.` That class has a method declared
    on it, named `apply`. But Kotlin *also* has a built-in function called `apply`,
    which is part of the scope function suite, with `let`, `also`, etc. So you need
    to ensure that you’re calling the correct one.


    If you wrote `resp.body.apply()`, you’d get a compile error. That’s because the
    Kotlin compiler thinks you’re attempting to call the built-in scope function `apply`.
    That scope function takes a lambda as a required argument, which you’re not passing,
    which causes the compile error.


    `with` is another built-in scope function, and it’s used to solve this problem.
    `with` takes an object and calls the lambda with that object as the default receiver.
    In blocks with a default receiver, that receiver and its methods take precedence.
    So the `apply` inside the `with` block targets the `apply` method on `Template<HTML>`.


    This is a little tricky, but the example in Listing [9-10](#531928_1_En_9_Chapter.xhtml#PC12)
    shows a small demonstration of this precedence rule in isolation, which might
    help you better understand what’s going on.


    ```

    class MyThing {

    fun String.testMe() {

    println("MyThing testMe")

    }

    }

    fun String.testMe() {

    println("Top level testMe")

    }

    "Hello!".testMe()

    // Top level testMe

    with(MyThing()) { "Hello!".testMe() }

    // MyThing testMe

    Listing 9-10

    Demonstrating extension function precedence

    ```


    If you want to read about this in full detail, the Kotlin specification includes
    complete definitions of all the behavior of the Kotlin compiler: [*https://kotlinlang.org/spec/kotlin-spec.xhtml*](https://kotlinlang.org/spec/kotlin-spec.xhtml).


    ### Responding with `HtmlWebResponse`


    To respond with HTML from a `webResponse` handler, all you need to do is to return
    a `HtmlWebResponse` instance in your web handler.


    You don’t have the `call.respondHtmlTemplate` helper available in `webResponse`,
    but you can use a layout fine without it, by calling `apply` on the template and
    using the already familiar template placeholders inside the `apply` block. Listing
    [9-11](#531928_1_En_9_Chapter.xhtml#PC13) demonstrates how to do this.


    ```

    get("/html_webresponse_test", webResponse {

    HtmlWebResponse(AppLayout("Hello, world!").apply {

    pageBody {

    h1 {

    +"Hello, readers!"

    }

    }

    })

    })

    Listing 9-11

    A HtmlWebResponse with a layout

    ```


    Responding without a layout is a little tricker, because the `HtmlWebResponse`
    class expects a full instance of `Template<HTML>`. You can use Kotlin’s *object
    expressions* to create on the fly implementations of classes, denoted by the object
    keyword. Listing [9-12](#531928_1_En_9_Chapter.xhtml#PC14) shows how to do this.


    ```

    get("/html_webresponse_test", webResponse {

    HtmlWebResponse(object : Template {

    override fun HTML.apply() {

    head {

    title { + "Plain HTML here! "}

    }

    body {

    h1 { +"Very plan header" }

    }

    }

    })

    })

    Listing 9-12

    A HtmlWebResponse without a layout

    ```


    This creates an inline template that’s only used once, which practically becomes
    the equivalent of using no template for that web handler.'
