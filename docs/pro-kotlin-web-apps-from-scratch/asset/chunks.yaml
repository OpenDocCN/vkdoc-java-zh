- fmt: '### Type-Safe Transactional Business Logic


    Some of your business logic will require a transaction to work. For example, you
    might have a function that executes two inserts, and it’s vital to your web app
    that either none or both succeed. You’ll solve this problem by wrapping the function
    in a transaction.


    But what if you somehow forget to create a transaction?


    You can alleviate this issue by making sure that your business logic requires
    a Kotliquery session of the correct type. As mentioned previously, Kotliquery
    yields a `Session` for non-transactional sessions and a `TransactionalSession`
    for transactional sessions. So, if you write your business logic function to take
    a `TransactionalSession` as the type, you’ll get a compile error if you try to
    call your business logic that requires a transaction to operate correctly from
    a context that doesn’t have a transaction available. Listing [6-17](#531928_1_En_6_Chapter.xhtml#PC18)
    shows an example of how you can structure your business logic in this way.


    ```

    fun createUserAndProfile(

    txSess: TransactionalSession,

    userName: String,

    bio: String

    ) {

    txSess.update(queryOf("INSERT INTO user_t ..."))

    txSess.update(queryOf("INSERT INTO profile_t ..."))

    }

    sessionOf(dataSource).use { dbSess ->

    // This code won’t compile – dbSess has wrong type

    createUserAndProfile(

    dbSess,

    "augustl",

    "Important author")

    dbSess.transaction { txSess ->

    // This code compiles fine – txSess has the correct type

    createUserAndProfile(

    dbSess,

    "augustl",

    "Important author")

    }

    }

    Listing 6-17

    Require transactions in business logic

    ```


    This might seem like a small detail, but it can really save the day. It’s easy
    to make a mistake and end up passing a non-transactional Kotliquery session to
    a function that requires transactions to operate correctly. By ensuring that those
    functions in your business logic that require transactions take a `TransactionalSession`,
    you’ll get help from the type system and avoid this type of mistake (pun intended).


    ### Nested Transactions


    SQL databases don’t support nested transactions. But you can use *save points*
    to mimic them.


    Kotliquery does not have built-in functionality for save points, but it’s easy
    to create your own small wrapper. This is also a good opportunity to see how Kotliquery
    implements the `transaction` function, as your function for creating save points
    will behave similarly. Listing [6-18](#531928_1_En_6_Chapter.xhtml#PC19) shows
    how you can implement a `dbSavePoint` function that creates a save point and makes
    it act like a transaction.


    ```

    fun dbSavePoint(dbSess: Session, body: () -> A): A {

    val sp = dbSess.connection.underlying.setSavepoint()

    return try {

    body().also {

    dbSess.connection.underlying.releaseSavepoint(sp)

    }

    } catch (e: Exception) {

    dbSess.connection.underlying.rollback(sp)

    throw e

    }

    }

    sessionOf(dataSource).use { dbSess ->

    dbSess.transaction { txSess ->

    // Create a save point

    dbSavePoint(txSess) {

    txSess.update(queryOf("INSERT INTO ..."))

    }

    // Execute more database operations here

    }

    }

    Listing 6-18

    Create a save point, inspired by how Kotliquery creates transactions

    ```


    The code inside the `dbSavePoint` lambda will act as if it runs in its own nested
    transaction.


    A save point is a named entity. If you call `setSavePoint` without your own name
    for it, JDBC will auto-generate a name. You wrap the execution of the lambda `body`
    in try/catch. If the lambda throws an exception, you roll the save point back.
    If the lambda didn’t throw any exceptions, you release the save point. You’re
    using the scope function `also` to achieve this. `also` will return the object
    you called it on, but before it returns, it executes the code in the lambda. This
    makes `also` a convenient way to avoid having to create and name an intermediate
    variable for the return value of the `body` lambda.


    You also see an example of how you can use generics in plain Kotlin functions.
    The `A` generic represents the return value of the lambda `body`. This means that
    `dbSavePoint` will pass on the return value of the `body` lambda, so that you
    can maintain a functional coding style while still wrapping your code in lambdas.


    # 7. Automated Tests with jUnit 5


    You now have all the pieces of the web app puzzle assembled. But before you implement
    business logic on your own, you’ll learn how to write automated tests.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - Implementing test cases and assertions with `kotlin.test`

    - Null safety with the unsafe cast operator `!!`

    - Inline functions


    Also in this chapter, you will learn the following about writing automated tests
    with jUnit 5:


    - The basics of Test-Driven Development (TDD)

    - Writing tests that interact with your database

    - Isolating individual test cases to avoid inter-test dependencies


    In Appendix C, you’ll learn how to use the Kotlin test framework, instead of `kotlin.test`.


    ## Setting Up Your Environment


    jUnit 5 is an industry-standard library for writing and running automated tests
    and is the one you’ll use in this book. Most automated testing libraries for Kotlin
    use jUnit 5 under the hood, as jUnit 5 includes everything you need to run tests
    efficiently on your own machine, as well as in an automated CI (continuous integration)
    build environment.


    There are many alternative libraries available. A popular alternative in the Kotlin
    community is Kotest ([`https://kotest.io/`](https://kotest.io/)), which is full
    of useful features and even sophisticated features such as property-based testing,
    which automatically generates tests based on boundaries and specifications. I
    tend to prefer “dumb” testing libraries, though, and the standard `kotlin.test`
    and jUnit 5 style assertions are simple to use and familiar. Additionally, I’ve
    never actually used Kotest in a real-world project. So you’ll learn how to use
    jUnit 5 and `kotlin.test` in this book.


    ### Adding jUnit 5 and kotlin.test


    You need two things in your project to run tests: jUnit 5 for executing your tests
    and `kotlin.test` for writing your test cases.


    `kotlin.test` is a wrapper library you’ll use to write the test cases themselves.
    It contains annotations for defining something as a test class, assertions to
    compare values, and so on. `kotlin.test` includes a mapping to jUnit 5. jUnit
    5 picks up the `kotlin.test` test cases and executes them.


    So far, you’ve added third-party dependencies in the `dependencies` block in `build.gradle.kts`.
    You could do that for jUnit and `kotlin.test` as well. But for test running, you
    need more than just a dependency – you also need to tell Gradle how it should
    execute your tests, as well as mapping between jUnit 5 and `kotlin.test`. The
    easiest way to get all of that done is to use the built-in support for test running
    that comes with Gradle with the Kotlin plugin installed. Listing [7-1](#531928_1_En_7_Chapter.xhtml#PC1)
    shows what you need to add to your Gradle config to add support for jUnit 5, `kotlin.test`,
    and Gradle tasks for executing your tests.


    ```

    dependencies {

    // ...

    testImplementation(kotlin("test"))

    }

    tasks.test {

    useJUnitPlatform()

    }

    Listing 7-1

    Add support for kotlin.test and jUnit 5 in build.gradle.kts

    ```


    Note that if you followed along with the book and created your Kotlin project
    using IntelliJ IDEA, you might already have these properties set, as IntelliJ
    IDEA generates projects with pre-configured jUnit 5 support.'
