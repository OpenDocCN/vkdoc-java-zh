    # Part I: Up and Running with a Web App


    # 1. Setting Up a Development Environment


    In this chapter you’ll set up a development environment for Kotlin. You’ll install
    IntelliJ IDEA, a Java Development Kit (JDK), you’ll write a small Kotlin program,
    and you’ll compile and run it using the Gradle build system.


    This chapter explains how to do everything using IntelliJ IDEA. For the other
    chapters in this book, though, using IntelliJ IDEA is not a requirement. For example,
    both the Eclipse IDE (integrated development environment) and Visual Studio Code
    have Kotlin plugins available, made by the Kotlin community. If you choose to
    use another editor, make sure that it supports *auto-completion* and *automatic
    imports*. Extension functions are prevalent in Kotlin, and you must import them
    before you can use them. You’ll avoid lots of tedious manual work if your editor
    can search and match all available extension functions (auto-completion) and automatically
    add an import statement when you select one of the auto-completed options (automatic
    imports).


    ## Get Started with IntelliJ IDEA Community Edition


    You’ll need an editor to write your code and a way to compile and run your code.
    IntelliJ IDEA gives you both.


    IntelliJ IDEA is the canonical integrated development environment (IDE) for static
    languages on the Java platform. The free community edition of IntelliJ IDEA has
    everything you need, both for this book and for production-grade Kotlin development.
    Additionally, JetBrains makes both Kotlin and IntelliJ IDEA, making IntelliJ IDEA
    uniquely well suited for Kotlin work.


    ### Download and Run IntelliJ IDEA


    You can download and use IntelliJ IDEA Community for free from JetBrains. Go to
    the IntelliJ IDEA download page, shown in Figure [1-1](#531928_1_En_1_Chapter.xhtml#Fig1),
    at the address [`www.jetbrains.com/idea/download/`](http://www.jetbrains.com/idea/download/)
    and download the community edition from there. JetBrains provides a `.dmg` file
    for macOS, an `.exe` file for Windows, and a tarball with a shell script in `bin/idea.sh`
    for Linux.


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig1_HTML.png)


    A screenshot of the webpage titled Download IntelliJ IDEA. The Version, build,
    and date are mentioned. The text reads Ulitmate, For web and enterprise development
    and community, for J V M and android development.


    **Figure 1-1** Download IntelliJ IDEA Community Edition for your platform


    For more details on how to install and run IntelliJ IDEA, refer to the JetBrains
    website. For example, the download page has a link with installation instructions
    in the left sidebar, as seen in Figure [1-1](#531928_1_En_1_Chapter.xhtml#Fig1).'
