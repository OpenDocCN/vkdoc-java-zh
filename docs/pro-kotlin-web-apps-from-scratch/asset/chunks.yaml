    that receive input as arguments and return a `WebResponse`, you have the flexibility
    of running your business logic in any environment, not just Ktor.


    In the preceding examples, the functions `handleCreateOrder` and `handleGetFoo`
    are all plain Kotlin functions that operate on data, return data, and have no
    knowledge of Ktor.


    The only place that knows about Ktor is your `Main.kt` file and your routes. That
    makes sense, as you’re using Ktor heavily in that file anyway. `Main.kt` serves
    as a mapping layer between the routing library you’ve chosen and your business
    logic, which has no knowledge of the environment it runs in.


    ## Run Web Handlers on AWS Lambda


    To run your web handlers in a serverless environment, you’ll use AWS Lambda. Most
    of the steps here are logically identical to those of other cloud providers, like
    Google Cloud Platform and Azure. The main difference is just the wiring together
    and the naming of various components of the system. So don’t take this as an endorsement
    of AWS Lambda over other cloud providers; it’s mostly just a random pick based
    on which cloud provider I have the most experience with.


    ### Making AWS Lambda Web Handlers


    Currently, you call your web handlers from Ktor route definitions. To run them
    in AWS Lambda, you need to wrap your web handlers in something that AWS Lambda
    understands how to execute.


    The only thing you’ll do in this chapter is to invoke your web handlers on AWS
    Lambda. Typically, you’ll use AWS API Gateway to do routing and authentication,
    and you set up individual API Gateway routes to call the correct lambda where
    the actual handler code runs. Setting that up is outside the scope of this book,
    though.


    The first step is to add the required dependencies to *build.gradle.kts*:


    ```

    implementation("com.amazonaws:aws-lambda-java-core:1.2.1")

    ```


    This library contains the necessary wrapping code to write Kotlin code that AWS
    Lambda can invoke. The essence of AWS Lambda and the Java platform is that you
    package your code as a JAR file the same way you package for a traditional server-based
    environment. Then, your JAR file contains special classes that represent individual
    lambda handlers. These classes inherit from `com.amazonaws.services.lambda.runtime.RequestHandler`,
    which gives them a signature that AWS Lambda knows how to invoke and process the
    return value of.


    To separate your existing code from the AWS Lambda environment, you’ll create
    a new file, *MainServerless.kt*. In this file, you’ll include all your AWS Lambda
    handlers, as well as the code needed to bootstrap your code to run in the AWS
    Lambda environment. Listing [12-1](#531928_1_En_12_Chapter.xhtml#PC7) shows how
    to do that.


    ```

    import com.amazonaws.services.lambda.runtime.Context

    import com.amazonaws.services.lambda.runtime.RequestHandler

