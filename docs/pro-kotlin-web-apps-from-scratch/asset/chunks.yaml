- fmt: '### Write to the Log from Your Own Code


    You have a working logging setup for third-party code, as well as for your own
    code. But you haven’t logged from your own code yet. To write to the log, you’ll
    do exactly what Ktor, Netty, and other third-party code does – creating SLF4J
    logging façade instances.


    You can create instances of loggers by invoking the SLF4J `LoggerFactory` class.


    ```

    import org.slf4j.LoggerFactory

    private val log = LoggerFactory.getLogger("kotlinbook.Main")

    log.debug("Testing my logger")

    Listing 2-4

    Create an instance of a logger and write to the log

    ```


    In the `logback.xml` configuration file, you specified that you want log output
    at the debug level for loggers that start with the name `kotlinbook`. You’ve named
    your own logger `kotlinbook.Main`, and your log statement is at the debug level,
    so when you add the code in Listing [2-4](#531928_1_En_2_Chapter.xhtml#PC10) to
    `Main.kt` and run your web app again, you should see your logging statement printed
    in the console, like what you see in Figure [2-5](#531928_1_En_2_Chapter.xhtml#Fig5).


    ![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig5_HTML.png)


    A screenshot of a kotlinbook window. The `logback.xml` option is highlighted.
    On the right, 9 lines of code are exhibited. The output log is exhibited below.


    **Figure 2-5** Your logging configuration and your logging statement are set up
    so that you can see the log text in the log output


    You should always name your logger the same as the package name plus the name
    of the file where you create the logger. The name `kotlinbook.Main` follows this
    rule.


    You typically create a single logger at the top of the file where you want to
    write to the log, below the import statements and before any function or class
    declarations.


    In Listing [2-5](#531928_1_En_2_Chapter.xhtml#PC11), you can see a full example
    of what logging from your own code might look like in your existing main function.


    ```

    package kotlinbook

    import ...

    import org.slf4j.LoggerFactory

    val log = LoggerFactory.getLogger("kotlinbook.Main")

    fun main() {

    log.debug("Starting application...")

    embeddedServer(Netty, port = 8080) {

    // ...

    Listing 2-5

    Create a logger and write to the log from your main function in src/main/kotlin/kotlinbook/Main.kt

    ```


    ### A Note on “Magic” XML Config Files


    You created the Logback config file at `src/main/resources/logback.xml`. Logback
    somehow automatically detected the presence of this file, using what appears to
    be Java platform magic. How does this work? And isn’t the point of writing web
    apps from scratch to avoid this sort of magic at all costs?


    Under the hood, Logback scans the class path for the file `logback.xml`. The class
    path doesn’t just contain compiled code stored as class files. It can contain
    any file of any type and is a way for Java code to access files without knowledge
    of the file system and operating system environment where your code runs.


    Gradle is responsible for populating the class path with the necessary files.
    When Gradle builds your web app, it will place all the files in `src/main/resources`
    in the class path. This is what lets Logback find the `logback.xml` config file.
    Logback simply asks the class path for the file `logback.xml` and receives it
    from the Java runtime.


    Generally, I aim to keep the magic in this book to an absolute minimum. The logging
    config is as far as I’m willing to go. It’s simply impractical to avoid it. Ktor
    and its dependencies are already using it. If you don’t configure SLF4J and Logback,
    you can’t access the log statements it creates, and you’ll always see that warning
    you got in Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2), before you configured
    SLF4J and Logback.


    **Tip:** If you for some reason don’t want to access the logs from dependencies
    that use SLF4J, you can disable SLF4J entirely and suppress the error it logs
    on startup when it can’t find a logging implementation. Add a dependency to `org.slf4j:slf4j-nop:1.7.36`
    in `build.gradle.kts`, and you won’t hear from SLF4J again.


    In my experience, SLF4J and Logback are so stable and mature that you’ll never
    have problems with them. Magic can be infuriating when it stops working, but you’ll
    be hard-pressed to bork your logging setup when you set it up as I’ve described
    it in this chapter. Logging is also one of those things that most programmers
    accept as being slightly magic and opaque. Even programmers in the Clojure community,
    which is probably the least magic-prone community on the Java platform, will often
    use Logback and XML config files in their projects.


    You now have a full-fledged logging setup in your web app, with no boilerplate
    other than having to invoke the `LoggerFactory` in each file where you want to
    log, and you’re using all the tools that the rest of the Java community is using.
    It’s amazing what you can achieve without frameworks these days.


    ## Useful Error Pages


    Out of the box, Ktor will display a blank HTML page when your code throws an exception.
    It’s much more practical to have Ktor display some information instead, such as
    the actual error message from the exception.


    To handle exceptions in Ktor, you can use the `StatusPages` plugin. This plugin
    lets you hook into various parts of the Ktor lifecycle, such as when your code
    throws an unhandled exception.


    To add the `StatusPages` plugin, you’ll first need to add it as a dependency to
    `build.gradle.kts`. As always, add it to the existing `dependencies` block that’s
    already present there:


    ```

    dependencies {

    implementation("io.ktor:ktor-server-status-pages:2.1.2")

    ```


    You configure Ktor plugins inside the `createKtorApplication` function, alongside
    the routing that’s already there:


    ```

    fun Application.createKtorApplication() {

    install(StatusPages) {

    // Configure the plugin here

    }

    routing {

    // Existing routing is here...

    ```


    Listing [2-6](#531928_1_En_2_Chapter.xhtml#PC14) shows a full example of how you
    can use the exception handling hook in the `StatusPages` plugin to tell Ktor exactly
    what you want to happen when your code throws an unhandled exception.


    ```

    install(StatusPages) {

    exception { call, cause ->

    kotlinbook.log.error("An unknown error occurred", cause)

    call.respondText(

    text = "500: $cause",

    status = HttpStatusCode.InternalServerError

    )

    }

    }

    Listing 2-6

    Use the StatusPages plugin to make Ktor show useful info about errors, instead
    of a blank page

    ```


    The Java platform has a class hierarchy of exceptions, and `Throwable` is at the
    top of that hierarchy. Specifying `exception<Throwable>` means that the `StatusPages`
    plugin will invoke the exception handler for *all* errors that can occur. You
    can add multiple `exception` handler blocks if you want to show different output
    for different errors. Ktor will use the most specific one that it can find for
    the thrown error.


    The `call` parameter passed to the exception handler lambda is the same type as
    the `call` inside route handlers. This means that your error pages have the full
    power of Ktor available to them, and you can respond any way you like. It’s a
    good idea to keep the exception handling as simple as possible, though. If your
    exception handling code is too complex, it can end up failing and throwing an
    exception of its own. If that happens, your exception handler won’t be able to
    show any output, and Ktor will just show a blank page, as if you didn’t configure
    an exception handler.


    The `cause` parameter is the error object that represents the exception that occurred.
    Note the logging statement in Listing [2-6](#531928_1_En_2_Chapter.xhtml#PC14).
    It’s useful to have the logs contain information about any errors that might occur.
    The SLF4J logger has a special implementation of the error log level, which takes
    the normal message text as well as the actual error object for the exception that
    was thrown. The logging implementation will print the message text and a nice,
    formatted version of the error object that includes the error message and the
    full stack trace.'
