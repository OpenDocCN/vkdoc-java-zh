- fmt: '### Using the Ktor HTML DSL


    The Ktor HTML DSL is available as a plugin to Ktor that you’ll need to add to
    your project as a dependency in `build.gradle.kts`:


    ```

    implementation("io.ktor:ktor-server-html-builder:2.1.2")

    ```


    The Ktor HTML DSL includes extension functions on the call inside Ktor route handlers
    for responding with HTML content built using `kotlinx.xhtml`.


    The most basic one is `call.respondHtml`. Listing [9-1](#531928_1_En_9_Chapter.xhtml#PC2)
    demonstrates how to use this function, which allows simple inlining of HTML content
    inside your web handlers.


    ```

    get("/html_test") {

    call.respondHtml {

    head {

    title("Hello, World!")

    }

    body {

    h1 { +"Hello, World!" }

    }

    }

    }

    Listing 9-1

    Using call.respondHtml in Ktor web handlers

    ```


    You can now open `http://localhost:4207/html_test` in your browser and behold
    the fantastic web page seen in Figure [9-1](#531928_1_En_9_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_9_Chapter/531928_1_En_9_Fig1_HTML.png)


    A screenshot of a webpage. The text reads Hello, world, with an exclamation mark.


    Figure 9-1


    HTML output in the browser


    That’s all it took to get basic HTML output added to your web app! Later in this
    chapter, you’ll learn how to use shared HTML layouts across multiple web handlers.


    ### The Power of the DSL


    `kotlinx.xhtml` makes substantial use of extension functions to allow for a type-safe
    DSL for generating HTML. How is this implemented?


    One of the most convenient features of the DSL is that it uses the type system
    to only allow valid HTML output. For example, the `h1` function is only available
    inside `body`. You can’t put `h1` inside `head`. And you can’t write `h1` at the
    top level, as siblings of `head` and `body`. Ktor does have escape hatches to
    allow for arbitrary tags in arbitrary locations, so you’re not restricted from
    doing whatever you want. But out of the box, the DSL helps you generate valid
    HTML output.


    If you use IntelliJ IDEA, you’ve already seen a hint of how this works. Figure
    [9-2](#531928_1_En_9_Chapter.xhtml#Fig2) shows the gray blocks at the start of
    each lambda, indicating the type of the implicit receiver inside the lambda.


    ![](images/531928_1_En_9_Chapter/531928_1_En_9_Fig2_HTML.png)


    A screenshot of a window titled kotlin book-Main dot k t. The opened topic, main
    dot k t has 17 lines of code, with the output of the run.


    Figure 9-2


    IntelliJ IDEA shows gray boxes that indicate the receiver type inside lambdas


    The lambdas you pass to `generateHtml`, `head`, and `body` have the respective
    receiver of `HTML`, `HEAD`, and `BODY`. The DSL then defines the various functions,
    such as `head` and `h1`, as extension functions of the respective tag types. So
    the DSL internally defines `h1` as `fun BODY.h1(...) { ... }`. (In fact, it’s
    defined as an extension function on the more abstract type `FlowOrHeadingContent`,
    which `BODY` is a child type of.)


    ### Operator Overloading


    `kotlinx.xhtml` leverages operator overloading in its DSL. You’ve already used
    one of the overloaded operators: using `+` to add text content to HTML tags.


    In Kotlin, operator overloading allows custom definitions of otherwise built-in
    operators, such as the `+` sign. You won’t be able to override what `+` means
    on things like numbers, but you can override what `+` means when called on your
    own types.


    When you write your `kotlinx.xhtml` templates, you can use `text` instead of `+`.
    So `h1 { text("Hello, World!") }` is the same as `h1 { +"Hello, World" }`. The
    implementation of `text` is where the actual code to add text lives. Then, `kotlinx.xhtml`
    defines a special operator function called `unaryPlus` inside the `Tag` interface:


    ```

    package kotlinx.xhtml

    interface Tag {

    operator fun String.unaryPlus(): Unit {

    text(this)

    }

    }

    ```


    By defining the extension function inside `Tag`, the function is only available
    in the context of instances of `Tag`. By adding the special `operator` keyword
    and the special `unaryPlus` name, the Kotlin compiler then knows that when it
    encounters `+"some string"` in the context of a `Tag`, it calls that function,
    and `this` is bound to the string you called `+` on.


    The name *unary plus* refers to what’s typically used on numbers in the form of
    `+i` and the sibling `-i`, which are the identity operator and the negation operator
    on numbers, respectively. But Kotlin allows you to define these operators so you
    can use them on any type.


    ### Adding Custom Tags


    If you need to insert an arbitrary tag, the DSL has two options.


    You can use the `unsafe` function to write raw HTML output to your template. Anywhere
    in the DSL, add `unsafe { +"""<my-tag class="foo"></my-tag>""" }`, and your template
    output will include that raw HTML. As the name implies, `unsafe` does not escape
    the output, so using it opens your web app to HTML injection attacks.


    Instead, you should create custom extension functions for new tags you want to
    add to the DSL. Listing [9-2](#531928_1_En_9_Chapter.xhtml#PC4) shows how you
    can write a custom tag named `<my-tag>` to the `kotlinx.xhtml` DSL itself.


    ```

    class MY_TAG(consumer: TagConsumer): HTMLTag(

    "my-tag", consumer, emptyMap(),

    inlineTag = true,

    emptyTag = false

    )

    fun FlowOrHeadingContent.myTag(

    block: MY_TAG.() -> Unit = {}

    ) {

    MY_TAG(consumer).visit(block)

    }

    Listing 9-2

    Adding custom tags to the kotlinx.xhtml DSL

    ```


    This custom tag in the DSL is completely safe and automatically handles escaping
    of HTML input correctly.


    The `MY_TAG` class defines how `kotlinx.xhtml` should write the output when it
    generates the actual HTML. The `myTag` function is an extension function on `FlowOrHeadingContent`,
    which makes it available in the `body` part of the template, as well as most of
    the child elements in `body`.


    If you want to restrict or change the context you can call `myTag` on, change
    the receiver type of the extension function accordingly. For example, to only
    make `myTag` available inside `head`, use the receiver type `HEAD` instead of
    `FlowOrHeadingContent`.


    ## CSS and Assets


    Serving HTML content is a good start, but you’re likely to need some CSS and other
    assets such as image files as well.'
