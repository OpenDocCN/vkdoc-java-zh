    ### 关于“魔法”XML 配置文件的一点说明


    你在 *src/main/resources/logback.xml* 创建了 Logback 配置文件。Logback 不知何故自动检测到了这个文件的存在，这似乎是利用了
    Java 平台的魔法。这是如何工作的？而且，从头开始编写 Web 应用的目的不就是为了不惜一切代价避免这种魔法吗？


    在底层，Logback 会扫描类路径以查找 *logback.xml* 文件。类路径不仅仅包含编译后存储为 class 文件的代码。它可以包含任何类型的任何文件，并且是
    Java 代码在不了解代码运行所在文件系统和操作系统环境的情况下访问文件的一种方式。


    Gradle 负责用必要的文件填充类路径。当 Gradle 构建你的 Web 应用时，它会将 *src/main/resources* 中的所有文件放入类路径。这就是让
    Logback 能够找到 *logback.xml* 配置文件的原因。Logback 只是向类路径请求 *logback.xml* 文件，并从 Java 运行时接收它。


    总的来说，我的目标是将本书中的魔法保持在绝对最低限度。日志配置是我愿意接受的极限。完全避免它是不切实际的。Ktor 及其依赖项已经在使用它了。如果你不配置
    SLF4J 和 Logback，你就无法访问它创建的日志语句，并且你将始终看到你在配置 SLF4J 和 Logback 之前在图 2-2 中看到的那个警告。


    提示


    如果你出于某种原因不想访问来自使用 SLF4J 的依赖项的日志，你可以完全禁用 SLF4J，并抑制它在启动时因找不到日志实现而记录的错误。在 *build.gradle.kts*
    中添加对 `org.slf4j:slf4j-nop:1.7.36` 的依赖，你将不会再收到 SLF4J 的消息。


    根据我的经验，SLF4J 和 Logback 非常稳定和成熟，你永远不会遇到它们的问题。当魔法停止工作时可能会令人恼火，但当你按照我在本章中描述的方式设置日志系统时，你很难搞砸它。日志记录也是大多数程序员认为有点魔法且不透明的事情之一。即使是
    Clojure 社区的开发者（这可能是 Java 平台上最不倾向于魔法的社区），也经常在他们的项目中使用 Logback 和 XML 配置文件。


    现在，你的 Web 应用中已经有了一个完整的日志设置，除了在每个你想要记录日志的文件中调用 `LoggerFactory` 之外，没有任何样板代码，并且你正在使用
    Java 社区其他人使用的所有工具。如今，无需框架就能实现这些，真是令人惊叹。


    ## 有用的错误页面


    开箱即用，当你的代码抛出异常时，Ktor 会显示一个空白的 HTML 页面。让 Ktor 显示一些信息（例如来自异常的实际错误消息）要实用得多。


    为了在 Ktor 中处理异常，你可以使用 `StatusPages` 插件。这个插件允许你挂钩到 Ktor 生命周期的各个部分，例如当你的代码抛出未处理的异常时。


    要添加 `StatusPages` 插件，你首先需要将其作为依赖项添加到 *build.gradle.kts* 中。像往常一样，将其添加到已经存在的 `dependencies`
    块中：


    ```

    dependencies {

    implementation("io.ktor:ktor-server-status-pages:2.1.2")

    ```


    你在 `createKtorApplication` 函数内部配置 Ktor 插件，与已经存在的路由配置放在一起：


    ```

    fun Application.createKtorApplication() {

    install(StatusPages) {

    // 在此处配置插件

    }

    routing {

    // 现有的路由在此处...

    ```


    清单 2-6 展示了一个完整的示例，说明如何使用 `StatusPages` 插件中的异常处理钩子来告诉 Ktor，当你的代码抛出未处理的异常时，你希望发生什么。


    ```

    install(StatusPages) {

    exception { call, cause ->

    kotlinbook.log.error("发生未知错误", cause)

    call.respondText(

    text = "500: $cause",

    status = HttpStatusCode.InternalServerError

    )

    }

    }

    清单 2-6

    使用 StatusPages 插件让 Ktor 显示关于错误的有用信息，而不是空白页面

    ```


    Java 平台有一个异常类层次结构，`Throwable` 位于该层次结构的顶部。指定 `exception<Throwable>` 意味着 `StatusPages`
    插件将为*所有*可能发生的错误调用异常处理器。如果你希望为不同的错误显示不同的输出，可以添加多个 `exception` 处理器块。Ktor 将为抛出的错误使用它能找到的最具体的那个。


    传递给异常处理器 lambda 的 `call` 参数与路由处理器内部的 `call` 类型相同。这意味着你的错误页面拥有 Ktor 的全部能力，你可以以任何你喜欢的方式响应。不过，最好尽可能保持异常处理简单。如果你的异常处理代码过于复杂，它最终可能会失败并自行抛出异常。如果发生这种情况，你的异常处理器将无法显示任何输出，Ktor
    将只显示一个空白页面，就像你没有配置异常处理器一样。


    `cause` 参数是表示所发生异常的错误对象。请注意清单 2-6 中的日志语句。让日志包含关于可能发生的任何错误的信息是很有用的。SLF4J 日志记录器有一个特殊的错误日志级别实现，它接受正常的消息文本以及所抛出异常的实际错误对象。日志实现将打印消息文本以及一个格式良好的错误对象版本，其中包含错误消息和完整的堆栈跟踪。

    '
- fmt: '# 3. Configuration Files


    All web apps need configuration files. Configuration files let you move things
    like database credentials, API keys, and which port to run the HTTP server on
    away from your source code and into a separate configuration file.


    Your application will also run in at least three different environments: local
    development, automated testing, and production. Configuration files enable having
    different defaults in each environment, all checked into version control and easily
    reproducible.


    You *could* get through the examples in this book without configuration files,
    but then you wouldn’t learn how to build production-ready web apps from scratch.


    If you’re new to Kotlin, here are some language features you’ll see examples of
    in this chapter:


    * Defining classes with constructors

    * Data classes

    * `let` blocks

    * The `it` shortcut for single-argument lambdas

    * Null safety and nullable types

    * Metaprogramming

    * Regular expressions

    * The Elvis operator

    * Single-expression functions


    Also in this chapter, you will learn the following about using configuration files
    in your web app:


    * Making properties configurable instead of hard-coded

    * Storing configuration in a configuration file that’s checked into version control

    * Having different default configuration values for different environments

    * Providing secrets such as production password and API keys through environment
    variables, without checking them into version control

    * Logging your config on application startup, for transparency and ease of debugging


    Instead of hard-coding values in your source code, you’ll place them in a configuration
    file. You’ll use the Typesafe Config library to manage configuration. In Appendix
    B, you’ll learn about how to replace Typesafe Config with Hoplite.


    ## Create a Configuration File


    As the title of this chapter indicates, you’ll store your configuration in a configuration
    file. The first step is to create this file, store some configuration in it, and
    use values from the configuration file instead of hard-coding them into your source
    code.


    ### The Configuration File Anatomy


    What is a configuration file? What should it contain, and how do you write one?


    The configuration file is a key/value lookup system. You’ll write configuration
    properties in the file, assign values to them, load the configuration file into
    your web app, and fetch the assigned values.


    The configuration file is using a format commonly referred to as HOCON. This format
    is a superset of JSON and supports typed values and nested properties. While JSON
    is great for parsing and outputting data to and from APIs, it’s a cumbersome format
    to work with when typing configuration values into a file by hand.


    Create your configuration file in `src/main/resources/app.conf`. For now, all
    you’ll put in it is the HTTP port that the web app binds to. In Listing [3-1](#531928_1_En_3_Chapter.xhtml#PC1),
    you can see a full working example of such a configuration file.


    ```

    httpPort = 4207

    Listing 3-1

    The app.conf configuration file, specifying which HTTP port the web app will use

    ```


    The HOCON file format is very straightforward and readable. Each line consists
    of a config property name (`httpPort`), an equals sign (`=`), and the value to
    assign to that config property (`4207`).


    ### Reading Values from Your Configuration File


    To load and access the values in your configuration file, you’ll use a library
    called Typesafe Config. It’s a simple library that reads configuration files and
    provides a programmatic interface to read out the configuration file values.


    You need to add Typesafe Config as a dependency to your web app. As seen in previous
    chapters, add the following to the `dependencies` block of `build.gradle.kts`:


    ```

    implementation("com.typesafe:config:1.4.2")

    ```


    To read your configuration file, you’ll use the `ConfigurationFactory` class provided
    by Typesafe Config. It has a `load()` method that wires up your configuration
    and makes it accessible to your code:


    ```

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    ```


    This gives you a `Config` object, which has everything you need to access the
    properties you define in your configuration file. For example, to get the value
    of the configured HTTP port, you can call `config.getInt("httpPort")`.


    The `Config` object has several methods available to get config values as a specific
    type. `getInt`, `getLong`, `getString`, `getBoolean`, etc. will all give you the
    configured value with the type you specify in the method call.


    Tip


    Use auto-completion to see which getters are available on the `Config` object.
    Type `config.get` in your code and then wait, and you’ll see a popup that shows
    all the available methods on `Config` that start with `get`.


    Typesafe Config will also perform validation and throw an exception if it’s not
    able to convert to the type you want. For example, `config.getBoolean("httpPort")`
    will fail, as Typesafe Config doesn’t know how to convert `4207` into a Boolean.


    Listing [3-2](#531928_1_En_3_Chapter.xhtml#PC4) shows a full example of how to
    load and access configuration files in your application and how to use the `httpPort`
    from `app.conf` instead of hard-coding the port number in your Kotlin source code.


    ```

    val config = ConfigFactory

    .parseResources("app.conf")

    .resolve()

    embeddedServer(Netty, port = config.getInt("httpPort")) {

    // ...your existing code here

    Listing 3-2

    An example of using Typesafe Config to load your configuration file and use it
    to provide config values to your code

    ```


    ## Make the Configuration Fail Early and Type-Safe


    Using the raw `Config` object from Typesafe Config works fine. But using it has
    two issues that need to be addressed.


    The first issue is that the `Config` object is *fail late*, but it should be *fail
    early*. Fail early is a pattern in programming where failures should occur as
    close to the cause of the failure as possible. For example, if you pass around
    a `Config` object and a property is either missing or set to the wrong type, it
    won’t fail until you access configuration properties somewhere deep down in your
    code. You instead want it to fail as early as possible, ideally at the time where
    you read and load the configuration file into your web app.


    The second issue is the limited type safety of the config property names. When
    you use strings to refer to the name of a config property, such as `config.getInt("httpPort")`,
    your code will compile fine even if you have a typo in the name of the property.
    To make the Kotlin compiler throw an error if you misspell a config property,
    you should be able to write something like `config.httpPort`.


    You can resolve these issues by using a Kotlin *data class* to represent your
    configuration file.'
