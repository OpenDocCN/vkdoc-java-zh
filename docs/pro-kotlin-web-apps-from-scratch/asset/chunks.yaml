    Create your configuration file in *src/main/resources/app.conf*. For now, all
    you’ll put in it is the HTTP port that the web app binds to. In Listing [3-1](#531928_1_En_3_Chapter.xhtml#PC1),
    you can see a full working example of such a configuration file.


    ```

    httpPort = 4207

    Listing 3-1

    The app.conf configuration file, specifying which HTTP port the web app will use

    ```


    The HOCON file format is very straightforward and readable. Each line consists
    of a config property name (`httpPort`), an equals sign (`=`), and the value to
    assign to that config property (`4207`).


    ### Reading Values from Your Configuration File


    To load and access the values in your configuration file, you’ll use a library
    called Typesafe Config. It’s a simple library that reads configuration files and
    provides a programmatic interface to read out the configuration file values.


    You need to add Typesafe Config as a dependency to your web app. As seen in previous
    chapters, add the following to the `dependencies` block of *build.gradle.kts*:


    ```

    implementation("com.typesafe:config:1.4.2")

    ```


    To read your configuration file, you’ll use the `ConfigurationFactory` class provided
    by Typesafe Config. It has a `load()` method that wires up your configuration
    and makes it accessible to your code:


    ```

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    ```


    This gives you a `Config` object, which has everything you need to access the
    properties you define in your configuration file. For example, to get the value
    of the configured HTTP port, you can call `config.getInt("httpPort")`.


    The Config object has several methods available to get config values as a specific
    type. `getInt`, `getLong`, `getString`, `getBoolean`, etc. will all give you the
    configured value with the type you specify in the method call.


    Tip


    Use auto-completion to see which getters are available on the `Config` object.
    Type `config.get` in your code and then wait, and you’ll see a popup that shows
    all the available methods on Config that start with `get`.


    Typesafe Config will also perform validation and throw an exception if it’s not
    able to convert to the type you want. For example, `config.getBoolean("httpPort")`
    will fail, as Typesafe Config doesn’t know how to convert `4207` into a Boolean.


    Listing [3-2](#531928_1_En_3_Chapter.xhtml#PC4) shows a full example of how to
    load and access configuration files in your application and how to use the `httpPort`
    from *app.conf* instead of hard-coding the port number in your Kotlin source code.


    ```

    val config = ConfigFactory

    .parseResources("app.conf")

    .resolve()

    embeddedServer(Netty, port = config.getInt("httpPort")) {

    // ...your existing code here

    Listing 3-2

    An example of using Typesafe Config to load your configuration file and use it
    to provide config values to your code

    ```


    ## Make the Configuration Fail Early and Type-Safe


    Using the raw `Config` object from Typesafe Config works fine. But using it has
    two issues that need to be addressed.


    The first issue is that the Config object is *fail late*, but it should be *fail
    early*. Fail early is a pattern in programming where failures should occur as
    close to the cause of the failure as possible. For example, if you pass around
    a `Config` object and a property is either missing or set to the wrong type, it
    won’t fail until you access configuration properties somewhere deep down in your
    code. You instead want it to fail as early as possible, ideally at the time where
    you read and load the configuration file into your web app.


    The second issue is the limited type safety of the config property names. When
    you use strings to refer to the name of a config property, such as `config.getInt("httpPort")`,
    your code will compile fine even if you have a typo in the name of the property.
