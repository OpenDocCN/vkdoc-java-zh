- fmt: '### A Note on Abstractions


    A small but important detail in this setup, which you might not have noticed,
    is how unintrusive the `webResponse` abstraction is. Earlier in this chapter,
    you wrote plain Ktor web handlers, using the Ktor call API, without any interference
    from the `webResponse` helper functions and data classes. By not being too smart
    about it, and by having to explicitly "opt in" to the `webResponse` API by calling
    methods on it, you don''t have to find or invent escape hatches to avoid using
    your own abstraction in certain cases – you just don''t use them, and that''s
    all there is to it.


    ## User Security


    To enable users to log in, you''ll build a system for authenticating your users
    with a username and a password and replace the current hard-coded system from
    Chapter [5](#531928_1_En_5_Chapter.xhtml), where the password is stored as plain
    text.


    ### Password Hashing


    Currently, you have a table `user_t` with a `password_hash` column. You also have
    a function `createUser` that writes to the `user_t` table and stores the provided
    password as plain text (by converting it to UTF-8 encoded bytes).


    Storing passwords as plain text is a big no-no, and you only did that earlier
    for brevity and because you didn''t use the password for anything. You should
    always one-way hash your passwords. You shouldn''t even encrypt the passwords.
    Encrypting means you also can decrypt, and you should never need to decrypt passwords.


    How do you log in users if you can''t decrypt their passwords? That''s solved
    with password hashing. Hashing is a one-way algorithm that will always produce
    the same output given the same input, but the output has no correlation with the
    provided input and can''t be used to determine what the original input was. SHA256
    and MD5 are examples of hashing algorithms. The procedure is as follows:


    *   When you create a user, one-way hash the password, and store that hash.

    *   When you want to authenticate a user, one-way hash the password input, and
    compare that with the hash in the database.


    That way, you have absolutely no way of knowing what user passwords are, but you
    have everything you need when you''ll verify password inputs later.


    ### Using Bcrypt for Hashing


    You''ll need a password hashing algorithm, and in this book, you''ll use bcrypt.
    I''ve used bcrypt in multiple projects, and it''s an algorithm that''s widely
    available, with libraries for all platforms and languages. Bcrypt also has built-in
    password salting, which in short means that if two users have the same password,
    they won''t get the same hash, by adding an un-hashed random blob to the hashing
    process.


    You''ll need a bcrypt library, and the one I''ve used multiple times in production
    is one simply named "bcrypt" by Patrick Favre-Bulle ([*https://github.com/patrickfav/bcrypt*](https://github.com/patrickfav/bcrypt)).
    Add it as a dependency to your `build.gradle.kts`:


    ```

    implementation("at.favre.lib:bcrypt:0.9.0")

    ```


    The first step is to write a failing test for storing and verifying user passwords.
    Listing [9-13](#531928_1_En_9_Chapter.xhtml#PC16) shows an example of what that
    test might look like.


    ```

    @Test

    fun testVerifyUserPassword() = testTx { dbSess ->

    val userId = createUser(

    dbSess,

    email = "a@b.com",

    name = "August Lilleaas",

    passwordText = "1234",

    tosAccepted = true

    )

    assertEquals(

    userId,

    authenticateUser(dbSess, "a@b.com", "1234")

    )

    assertEquals(

    null,

    authenticateUser(dbSess, "a@b.com", "incorrect")

    )

    assertEquals(

    null,

    authenticateUser(dbSess, "does@not.exist", "1234")

    )

    }

    @Test

    fun testUserPasswordSalting() = testTx { dbSess ->

    val userAId = createUser(

    dbSess,

    email = "a@b.com",

    name = "A",

    passwordText = "1234",

    tosAccepted = true

    )

    val userBId = createUser(

    dbSess,

    email = "x@b.com",

    name = "X",

    passwordText = "1234",

    tosAccepted = true

    )

    val userAHash = dbSess.single(

    queryOf("SELECT * FROM user_t WHERE id = ?", userAId),

    ::mapFromRow

    )!!["password_hash"] as ByteArray

    val userBHash = dbSess.single(

    queryOf("SELECT * FROM user_t WHERE id = ?", userBId),

    ::mapFromRow

    )!!["password_hash"] as ByteArray

    assertFalse(Arrays.equals(userAHash, userBHash))

    }

    Listing 9-13

    Automated tests in UserTests.kt for storing and verifying passwords

    ```


    The first test, `testVerifyUserPassword`, checks that you can get the user ID
    for a user by providing the correct email and password combination. It also checks
    that if you pass the incorrect password or a user that doesn''t exist, `authenticateUser`
    returns `null`.


    The second test, `testUserPasswordSalting`, creates two users with the same password
    and queries the database to check that the raw stored data has different contents
    in the `password_hash` column. This test verifies two important things: that you''ve
    hashed and salted the password and not stored it as plain text and that salting
    was set up correctly, so that it''s impossible to determine if two users have
    the same password by looking at the raw data.


    The next step is to implement the new `authenticateUser` function and implement
    the hashing in `createUser`. Listing [9-14](#531928_1_En_9_Chapter.xhtml#PC17)
    shows the first step, which is to implement `authenticateUser` and create the
    necessary instances of bcrypt objects for both verifying and hashing.


    ```

    val bcryptHasher = BCrypt.withDefaults()

    val bcryptVerifier = BCrypt.verifyer()

    fun authenticateUser(

    dbSession: Session,

    email: String,

    passwordText: String

    ): Long? {

    return dbSession.single(

    queryOf("SELECT * FROM user_t WHERE email = ?", email),

    ::mapFromRow

    )?.let {

    val pwHash = it["password_hash"] as ByteArray

    if (bcryptVerifier.verify(

    passwordText.toByteArray(Charsets.UTF_8),

    pwHash

    ).verified)

    {

    return it["id"] as Long

    } else {

    return null

    }

    }

    }

    Listing 9-14

    Implementation of authenticateUser

    ```


    This function fetches the user row based on the provided email. If no such user
    exists in the database, the optionally chained `let` extension function causes
    the whole function to return `null`. Then, you use the bcrypt library to verify
    that the hash stored in the database is the same as the one provided in `passwordText`.
    If it is, you get the ID of the matching user. If not, you get `null`.


    You also need to update `createUser` so it hashes the password with bcrypt before
    storing it in the database. Replace the current `passwordText.toByteArray(Charsets.UTF_8)`
    with the code in Listing [9-15](#531928_1_En_9_Chapter.xhtml#PC18).


    ```

    bcryptHasher.hash(

    10,

    passwordText.toByteArray(Charsets.UTF_8)

    )

    Listing 9-15

    The code to hash a password string with bcrypt

    ```


    The first argument, the number 10, is the *difficulty factor* in bcrypt. This
    number decides how much computing power you''ll need to perform the hashing. Too
    low, and the password is easy to crack. Too high, and your servers will spend
    multiple seconds verifying the password, at 100% CPU capacity. I''ve used 10 for
    many years, and that''s worked fine for me. But ask your local cryptography and
    security expert before you commit to a number, and don''t take my word for it.


    Run your tests, and everything should pass. You now have real passwords for your
    users that are stored securely!'
