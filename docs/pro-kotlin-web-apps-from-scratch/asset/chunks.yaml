    \ the relevant features that Kotlin has to offer for building web apps. It’s also\
    \ built to be highly scalable and performant and is battle proven across a large\
    \ number of real-world web apps.\n\nAnd, most importantly, Ktor is a library,\
    \ not a framework. Frameworks, such as Spring Boot, typically start a web server\
    \ automatically and use inversion of control to call your code, somewhere deep\
    \ down in tens of thousands of lines of framework code. The point of this book\
    \ is to learn how to do everything yourself, from scratch.\n\nInterestingly, Ktor\
    \ labels itself a framework. There aren’t any widely accepted definitions of libraries\
    \ vs. frameworks. The one I use in this book is that frameworks automatically\
    \ and implicitly do things for you, whereas libraries do nothing unless you explicitly\
    \ tell them to. Ktor nicely fits this definition of a library.\n\n### Add the\
    \ Ktor Library\n\nAdd Ktor as a dependency in *build.gradle.kts*, inside the `dependencies`\
    \ block. Ktor needs two dependencies to work: the server core, and the specific\
    \ server implementation (Netty in this case):\n\n```\ndependencies {\nimplementation(\"\
    io.ktor:ktor-server-core:2.1.2\")\nimplementation(\"io.ktor:ktor-server-netty:2.1.2\"\
    )\n}\n```\n\nTip\n\nRemember to refresh the Gradle project in IntelliJ when you\
    \ update `build.gradle.kts`. Use the small popup that appears when there are changes\
    \ that Gradle hasn’t refreshed yet or open the Gradle tab and click the refresh\
    \ button.\n\nGradle automatically downloads the dependencies and makes them available\
    \ to your own code."
