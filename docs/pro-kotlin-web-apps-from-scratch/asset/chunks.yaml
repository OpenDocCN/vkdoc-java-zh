- fmt: '### Updating Your Migrations


    Your web app has a repeatable migration that upserts a user row, in `src/main/resources/db/migration/R__insert_user.sql`.
    This migration writes a hard-coded password text that bcrypt won’t be able to
    decrypt. So you need to update the migration to insert a real password, to be
    able to authenticate the user you create in the migration.


    I could have included a full 120-character encrypted version of the password `1234`
    here that you could have manually typed in from the book and into your migration
    file. But you wouldn’t be able to type all those characters correctly the first
    handful of times you tried. Instead, you’ll write some code to generate that string,
    so you can paste it into the repeatable migration instead.


    The column `password_hash` is a `BYTEA` column, so it expects raw bytes. The easiest
    way to put this in a SQL statement that works for SQLite is to use a HEX-encoded
    string and escape it with `x''''`. For example, `x''2e744c21''` is how you would
    encode a 4-byte hex-encoded sequence. Listing [9-16](#531928_1_En_9_Chapter.xhtml#PC19)
    shows how to generate a HEX string for any password, leaning on the `bcryptHasher`
    from Listing [9-14](#531928_1_En_9_Chapter.xhtml#PC17).


    ```

    hex(

    bcryptHasher.hash(

    12,

    "1234".toByteArray(Charsets.UTF_8)

    )

    )

    Listing 9-16

    A utility function for generating hex-encoded bcrypt encrypted passwords

    ```


    This statement will yield a string in the correct format that you can copy/paste
    into the repeatable migration using the format `x''<hex string here>''`.


    ## Adding a Login Form


    For HTML-based web apps, it’s common to log in using a `<form>` tag that posts
    the username and password to the back end, which in turn sets a cookie or shows
    an error, based on whether it accepted the credentials. Ktor has all the facilities
    you need to make that work.


    ### Wiring Up Your Web App


    You need a few things in place to prepare your web app for authenticating users
    via login forms.


    The first is to install the two plugins needed for handling user authentication
    to your `build.gradle.kts`:


    ```

    implementation("io.ktor:ktor-server-auth:2.1.2")

    implementation("io.ktor:ktor-server-sessions:2.1.2")

    ```


    These plugins handle the session storage that your web app uses to access information
    about the currently logged-in user and the ability to compartmentalize routes
    in your web app to only be accessible to logged-in users.


    Next, you need to update your config files. You’ll add three different properties:
    `useSecureCookie` (`Boolean`) will toggle whether your session cookie will only
    work over HTTPS. `cookieEncryptionKey` and `cookieSigningKey` (`String`) will
    set up the session cookie so that it’s encrypted, which blocks hackers from forging
    a fake cookie. Listing [9-17](#531928_1_En_9_Chapter.xhtml#PC21) shows what you
    need to add to your config files.


    ```

    // app.conf

    useSecureCookie = true

    cookieEncryptionKey = ""

    cookieSigningKey = ""

    // app-local.conf

    useSecureCookie = false

    cookieEncryptionKey = ""

    cookieSigningKey = ""

    Listing 9-17

    The default values of the various config files for the new config properties

    ```


    Also remember to add these properties to your `WebappConfig` data class, by adding
    properties to the data class itself with the same name as the properties you added
    to your config file, and update `createAppConfig` to load in these values.


    By default, your web app is set up to use secure cookies, which means that cookies
    will only be accessible over HTTPS and not HTTP. However, your local development
    environment runs your app over HTTP, so you need to disable secure cookies there.


    You’ll need actual random keys for `cookieEncryptionKey` and `cookieSigningKey`.
    To generate these keys, you can use the following utility function:


    ```

    fun getRandomBytesHex(length: Int) =

    ByteArray(length)

    .also { SecureRandom().nextBytes(it) }

    .let(::hex)

    ```


    You can call this function by temporarily adding calls to it in your `main()`
    function and print or log the output to the console. Run this function with `getRandomBytes(16)`
    for the `cookieEncryptionKey` and `getRandomBytes(32)` for the `cookieSigningKey`.
    Paste the output of those calls into `app-local.conf`.


    It’s important for these values to be consistent every time you restart your web
    app, which is why they’re stored in the config file. If these keys change, all
    currently logged-in users with cookies stored in their browsers will have to log
    in again, as your web app won’t be able to decrypt and verify the cookies with
    changed keys.


    Just like your database password, you should keep the actual values you use in
    your production environment secret and not check them into version control. So,
    in production, your config file is set up to load these values from environment
    variables.


    ### Different Types of Sessions


    The session is the place that stores information about the currently logged-in
    user. Having access to this information is vital to make web app authentication
    work. You’ll use the session as parameters to database queries, to check if the
    incoming request has a logged-in user attached to it in the first place and so
    on.


    You have two main options for session storage: cookie-based storage and server-side
    storage.


    Technically speaking, you’ll always use a cookie. When users log in, you’ll set
    a cookie that you’ll use to verify that the user is indeed logged in. The cookie
    will contain the ID of the logged-in user. You’ll also cryptographically sign
    the cookie, so that attackers can’t just forge it by setting its contents to arbitrary
    values.


    You can use this cookie to store additional state that you need about the currently
    logged-in user. But cookies have a hard limit on size, 4 kilobytes, enforced by
    all browsers. If you try to set a cookie that exceeds this limit, the browser
    will ignore it, causing bugs and unexpected behavior.


    To remedy this, you can set up server-side session storage. There are many session
    storage types available. You should always avoid storing it in RAM, as that will
    break the moment you have more than one server running at the same time.


    You could store session data in a distributed cache or in the database. But all
    production-grade web apps I’ve ever worked with have used cookie-based session
    storage, with no server-side session storage at all. If you need to store extra
    info about the currently logged-in user somewhere, I recommend storing it in whatever
    mechanisms you have available for caching arbitrary values elsewhere in your web
    app or setting up a cache if you don’t have one. It’s not necessary to have a
    specific cache only for storing info about a logged-in user. For example, if you
    have a distributed cache like Memcached ([*https://memcached.org/*](https://memcached.org/))
    or Redis ([*https://redis.io/*](https://redis.io/)) set up, you can store info
    about the current session there and retrieve it just like you would retrieve any
    other piece of cached information.'
