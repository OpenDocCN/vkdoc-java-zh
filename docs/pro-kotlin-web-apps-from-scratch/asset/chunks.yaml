    ### 协程上下文


    你只能在两种地方调用挂起函数：协程上下文或标记了 `suspend` 的函数中。


    从清单 8-2 中得到的错误信息指出了这一要求。Kotlin 无法在代码的任意位置挂起执行，因为 Java 平台不允许这样做。清单 8-3 展示了如何创建一个挂起函数并在其中调用
    `delay()`。


    ```

    suspend fun myCoroutineFunction() {

    println("Hello, ...")

    delay(500)

    println("...world!")

    }

    清单 8-3

    挂起函数示例

    ```


    然而，这个函数引出了一个问题：如何在现有的 `main()` 函数中调用*那个*函数？如果你尝试在其中调用它，如清单 8-4 所示，你会再次得到与清单 8-2
    相同的错误信息。


    ```

    fun main() {

    log.debug("Starting application...")

    myCoroutineFunction()

    // 错误：挂起函数 ''myCoroutineFunction''

    // 只能从协程或另一个挂起函数中调用

    清单 8-4

    从 main 函数内部调用挂起函数并得到错误信息

    ```


    解决这个问题的一种方法是将 `main()` 函数本身标记为 `suspend`。Kotlin 编译器会在底层完成必要的工作，将一个普通的 Java 平台
    main 函数与一个独立的、协程作用域的 main 函数桥接起来，后者将由 Kotlin 在底层调用。


    另一种方法是自己显式创建一个协程上下文。Kotlin 提供了 `runBlocking` 函数来桥接普通执行与协程之间的鸿沟。清单 8-5 展示了一个示例，说明如何从非协程上下文中调用挂起函数。


    ```

    suspend fun myFancyCoroutineFunction(): Number {

    val num = (100L..500L).random()

    delay(num)

    return num

    }

    fun main() {

    log.debug("Starting application...")

    val waitedFor = runBlocking {

    myFancyCoroutineFunction()

    }

    println("Waited ${waitedFor}ms")

    // Waited 427ms

    清单 8-5

    使用 runBlocking 从 main() 函数中调用协程

    ```


    `runBlocking` 会阻塞调用线程，直到协程执行完毕。`runBlocking` 的目的是桥接线程世界与协程世界之间的鸿沟，这就是它会阻塞调用线程的原因。`runBlocking`
    将协程上下文中运行的 lambda 表达式的返回值返回给非协程上下文，在这个例子中，这意味着 `waitedFor` 代表了 `myFancyCoroutineFunction()`
    内部的 `num`。


    ### Ktor 中的协程


    在解释了这么多之后，你现在可以回到你在清单 8-1 中编写的“假”外部服务中的 `delay()` 了。


    你可以在 Web 处理器内部编写 `delay()` 的原因是 Ktor 处理器已经在协程上下文中运行了。Ktor 从一开始就是为 Kotlin 编写的，并在底层广泛使用协程。由于
    Ktor 中的大部分代码已经在协程上下文中运行，它会将这个协程上下文暴露给你的 Web 处理器，这样你就可以在 Ktor 中开始使用协程，而无需任何额外设置。


    在底层，Ktor 支持多种不同的服务器实现。在本书中，你使用了 Netty，它构建在非阻塞 NIO（新 I/O）API 之上，该 API 早在 Java 1.4
    时就已添加到 Java 平台。Netty 和 Ktor 之间的映射在很大程度上依赖于 Netty 的非阻塞特性，从而形成了一种高效的配对，几乎不需要发生线程阻塞。


    此外，当你在第 4 章实现 `webResponse` 时，你在构建和返回 `WebResponse` 实例的 `handler` lambda 表达式中包含了
    `suspend` 关键字。作为 `handler` lambda 表达式接收者类型的 Ktor 类型 `PipelineContext<Unit, ApplicationCall>`
    实现了内置接口 `coroutineScope`，这告诉 Kotlin 你的 Web 响应处理器 lambda 表达式拥有一个可用的协程作用域。并且由于 `handler`
    lambda 函数类型包含了 `suspend`，你就拥有了从 `webHandler` 包装的 Ktor 处理器内部调用协程所需的一切。


    ## 并行化服务调用


    你现在有了一个“假”的 Web 服务器，可以将其当作外部服务来使用，并且你理解了协程的基本原理以及它们为何有用。现在你已经准备好编写一些并行化的服务调用了。


    ### 添加依赖项


    在执行外部服务调用之前，你需要两个依赖项：一个用于调用“假”服务器的 HTTP 客户端，以及一个对 Kotlin 协程库本身的依赖。


    Java 平台上有许多可用的 HTTP 客户端。在本书中，你将使用 Ktor 自己的 HTTP 客户端。Ktor HTTP 客户端与 Ktor HTTP 服务器没有直接耦合。你使用它的原因是它从根本上基于协程。因此，它非常适合使用协程的
    Ktor Web 应用程序。


    清单 8-6 显示了使一切正常工作所需添加的内容。


    ```

    implementation("io.ktor:ktor-client-core:2.1.2")

    implementation("io.ktor:ktor-client-cio:2.1.2")

    清单 8-6

    在 build.gradle.kts 中将协程库添加为依赖项

    ```


    与 Ktor 服务器一样，Ktor 客户端支持多种不同的后端。CIO（协程 I/O）后端是基于协程的，你将在本书中使用它。

