    浏览器窗口截图显示 kotlinbooktestfunction 页面。在事件共享设置下，已选中私有选项。有一个格式化 JSON 的选项。下方显示了三行代码。


    图 12-9


    运行 AWS Lambda 函数时指定输入参数


    如果一切运行正常，你应该会看到一个绿色框，与你首次运行 AWS Lambda 函数时在图 12-7 中看到的完全一致。展开绿色框的“详细信息”部分，你将看到包含数据库查询结果的
    JSON 输出。


    ## 提升性能


    你可以采取多种措施来提升 AWS Lambda 处理程序的性能，这有助于节省成本，并减少 Web 应用的延迟和执行时间。


    ### 性能与冷启动


    无服务器运行时存在一个特定问题，使得处理代码必须尽可能快地完成初始化：冷启动。


    尽管被称为“无服务器”，但服务器*确实存在*。无服务器运行时需要先将代码加载到实际服务器中，才能执行。你只需为代码的实际执行时间付费，因此为了节省成本，如果代码在一段时间内未被执行，无服务器环境会将其卸载。


    当无服务器运行时尚未加载你的代码，而你尝试执行它时，就会遇到冷启动。


    当你执行图 12-8 中的测试调用时，这是你上传代码后首次执行。这意味着 AWS Lambda 无服务器运行时尚未加载并准备好你的代码。在图 12-8 中，有更多关于运行处理函数所涉及时间的详细信息。它显示*初始化持续时间*为
    444.01 毫秒，*持续时间*为 378.68 毫秒，总计 822.69 毫秒。这个数字就是你的 AWS Lambda 处理程序的*冷启动时间*。


    如果你多次尝试运行 Lambda 的测试执行，后续调用将比首次调用快得多。这被称为热启动。AWS Lambda 已将你的代码加载到其无服务器运行时中，无需花费任何时间进行初始化。在我对
    `GetTestHelloWorld` Lambda 的测试中，后续调用仅需约 2-3 毫秒。这很合理——在已启动并运行的 Java 进程上调用函数速度很快，并且与其他运行时环境相比，几乎没有额外开销。


    ### 初始化时间 vs. 执行时间


    为了进一步优化性能，你需要研究 AWS Lambda 中初始化时间与执行时间的分离。


    初始化时间仅指冷启动，具体来说，是从 AWS Lambda 开始加载你的代码，到代码加载完成并调用你的处理函数（`handleRequest`）之间的时间。


    在这个特殊的初始化阶段，AWS Lambda 会为运行时分配最大量的 RAM 和 CPU，以便你的代码尽可能快地加载，并获得尽可能低的冷启动时间。初始化阶段完成后，AWS
    Lambda 会降低运行时的性能，以匹配你配置的使用量。你按 RAM-秒付费，因此分配给 AWS Lambda 处理程序的 RAM 越多，运行成本就越高。


    此外，你无需为初始化时间付费。你只需为处理函数的首次及后续调用的执行时间付费。


    因此，你应该充分利用高性能且免费的初始化阶段，尽可能多地在处理函数执行之前运行的代码部分中，以静态方式完成工作。


    ### 懒加载


    在你执行 `GetTestHelloWorld` 时获得的时间数据中，有一个危险信号。对于冷启动调用，初始化时间为 444.01 毫秒，执行时间为 378.68
    毫秒。在后续调用中，由于无服务器运行时已加载了你的代码，因此没有初始化时间，但执行时间仅为 2-3 毫秒。


    为什么冷启动的执行时间与后续热启动的执行时间差异如此之大？


    这有力地证明了你的处理函数中存在初始化操作。当你首次执行处理函数时，无服务器运行时由于某种原因尚未完全加载某些内容。


    原因是 Java 运行时对所有类进行懒初始化。这是一件好事。你的 JAR 文件包含了 Ktor 以及你在 *build.gradle.kts* 中指定的所有依赖项。Java
    运行时仅在运行代码使用到已编译的类文件时，才会解析并加载它们。如果没有这个特性，你很快就会达到 AWS Lambda 初始化时间的 10 秒硬性限制，因为加载和解析所有这些代码工作量巨大，而
    Java 运行时通过懒加载跳过了这些工作。


    但这会产生一个副作用：导致无服务器运行时在执行期间（而非初始化期间）加载 Lambda 类的所有依赖项！H2、HikariCP、*Main.kt* 等所有代码都在执行阶段加载，因为这是运行代码首次引用这些类。


    这也适用于你在 `UserEmailSearch` 中的顶层 `private val dataSource` 声明。当你查看 Kotlin 代码时，这行代码看起来像是静态运行的。但由于
    Kotlin 编译器编写 Java 类文件的实现细节，事实并非如此。在底层，Kotlin 将 *MainServerless.kt* 中的顶层声明编译成一个名为
    `MainServerlessKt` 的 Java 类。该类有一个包含初始化 `dataSource` 属性代码的 `static` 初始化块。但你的代码首次引用该类是在
    `handleRequest` 函数内部。Kotlin 将 `dataSource` 编译为 `MainServerlessKt.getDataSource()`。当
    Java 运行时遇到该调用时，它发现尚未加载 `MainServerlessKt`。因此它会加载该类，导致相应的静态块运行。但这已经太晚了——此时你已处于执行阶段，而非初始化阶段。

    '
- fmt: '### Initializing Correctly


    To fix this, you need to somehow invoke code in `MainServerlessKt` during the
    initialization phase, so that the Java runtime loads that class during initialization
    and not during the first cold start execution.


    Before optimizing, I got an initialization time of 354.8 ms and an execution time
    of 5678.15 ms. Subsequent invocations only took around 3–4 ms. This is really
    bad and indicates that almost nothing happens during the initialization phase
    and that this code needs a lot of initialization time to work, as it spends almost
    6 seconds initializing itself on the first call.


    The long initialization time makes sense. `GetTestHelloWorld` does almost no work,
    so it doesn’t take as long to initialize. But `UserEmailSearch` loads Gson, your
    `WebResponse` handling code, HikariCP, Flyway, and the entirety of H2, which is
    a whole embedded database engine.


    The easiest way to fix this is to add a companion object with an initialization
    block to your `UserEmailSearch` handler class. The Kotlin compiler compiles that
    `init` block to a `static` initialization block in the underlying `UserEmailSearch`
    Java class. This static initialization block will run during the initialization
    phase of your AWS Lambda handler runtime, because `UserEmailSearch` is the class
    you specify that AWS Lambda should execute to run your code. Listing [12-5](#531928_1_En_12_Chapter.xhtml#PC11)
    shows how to update your handler with static initialization.


    ```

    class UserEmailSearch :

    RequestHandler, String>

    {

    companion object {

    init {

    runBlocking {

    serverlessWebResponseDb(dataSource) { dbSess ->

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    JsonWebResponse("")

    }

    }

    }

    }

    override fun handleRequest(

    input: Map,

    context: Context

    ): String {

    return serverlessWebResponseDb(dataSource) { dbSess ->

    handleUserEmailSearch(dbSess, input["email"])

    }

    }

    }

    Listing 12-5

    Adding static initialization of dataSource to your UserEmailSearch handler

    ```


    The `init` block does as much as possible to match what the actual handler code
    does. This is to ensure that the Java runtime loads as many of the classes you
    use during execution as possible. It initializes the Kotlin coroutine classes
    with `runBlocking`, it initializes the whole `WebResponse` handling code, and
    it runs an actual dummy query against H2, causing all database-related code to
    load as well.


    With this small tweak, I now got an initialization time of 1298.85 ms, up from
    354.8 ms, but an execution time of just 22.12 ms, down from 5678.15 ms. That’s
    a big win! You’re now down to a total of 1320.77 ms on a cold start, compared
    with 6032.95 ms from before. So, instead of AWS Lambda billing you for 5679 ms
    of execution handler time that included loading of all the code running in that
    lambda, you’re now only billed for 23 ms of execution time for your handler code.


    If you compare the execution time of the first call, 22.12 ms, with subsequent
    warm invocations, you can see that there’s still a difference. Subsequent warm
    calls still only take 3–4 ms to complete. So there’s still at least some initialization
    going on during the initial execution. But 23 ms is a low enough number that it’s
    not worth going down the rabbit hole of figuring out what could lower that number
    even further.


    ### Migrations and H2


    Note that one of the things that causes your initialization time to be almost
    1300 ms, is that you’re loading in all H2, a full database engine, and you’re
    also running your Flyway migrations, on every cold start.


    This is an unrealistic scenario for a real-world web app. In the world of serverless,
    it’s common to not even use a connection pool library like HikariCP, because a
    serverless function should never have to manage multiple simultaneous connections.
    In fact, if you use a serverless database such as AWS Aurora ([*https://aws.amazon.com/rds/aurora/*](https://aws.amazon.com/rds/aurora/)*)*,
    you can run queries against it using HTTP requests, so that you don’t have to
    manage any connections at all and instead run low-latency fire-and-forget queries.


    Additionally, if you use an external SQL database from your serverless handlers,
    you wouldn’t run the migrations on every cold start. You wouldn’t even include
    the migrations in the JAR file you build for your serverless execution environment.
    Instead, you would either run the database migrations in your build pipeline or
    create a dedicated serverless function that runs your migrations that your build
    pipeline invokes when it deploys a new version of your code.


    ### Java Runtime Flags


    To further optimize performance, you can investigate the world of setting Java
    runtime compiler flags.


    For example, you can set the environment variable `JAVA_TOOL_OPTIONS` to `-XX:+TieredCompilation
    -XX:TieredStopAtLevel=1`, which disables *tiered compilation*. Tiered compilation
    is a feature where the Java runtime analyzes your code as it’s running. The runtime
    optimizes your code on the fly, based on the result of the analysis. This is a
    part of the just-in-time (JIT) compiler in the Java platform, where the Java runtime
    dynamically compiles Java bytecode into native machine code.


    Tiered compilation makes sense for traditional server-based processes that run
    for hours or days without shutting down but might not make sense in an environment
    where fast start times are important. When I tested this using the lambda you
    wrote in this chapter, initialization duration went from around 450 ms to consistently
    only spending about 330 ms. But this book is not about optimizing the Java runtime
    performance, so I won’t go into further detail on that front.'
