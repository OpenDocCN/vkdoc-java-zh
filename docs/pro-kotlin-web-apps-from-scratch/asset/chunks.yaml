    ### 执行并行调用


    要执行并行化的服务调用，你需要编写一个新的 Ktor Web 处理器，该处理器会混合搭配并行调用，并利用并行调用的结果来执行额外的并行调用。


    如果没有像协程这样的工具可用，这种按需定制的并行化编写起来会非常棘手。协程的一大优势在于，编写并行化的服务调用几乎和编写同步、顺序的服务调用一样简单。


    在代码清单 8-7 中，你可以看到一个几乎无所不包的示例。其中发生了好几件事，我将在下文详细解释。


    ```

    suspend fun handleCoroutineTest(

    dbSess: Session

    ) = coroutineScope {

    val client = HttpClient(CIO)

    val randomNumberRequest = async {

    client.get("http://localhost:9876/random_number")

    .bodyAsText()

    }

    val reverseRequest = async {

    client.post("http://localhost:9876/reverse") {

    setBody(randomNumberRequest.await())

    }.bodyAsText()

    }

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    TextWebResponse("""

    Random number: ${randomNumberRequest.await()}

    Reversed: ${reverseRequest.await()}

    Query: ${queryOperation.await()}

    """)

    }

    代码清单 8-7

    一个对外部服务执行多个并行调用的函数

    ```


    核心上，这和其他任何 Web 处理器函数一样。你传入一些参数，即一个 Kotliquery 数据库会话，并返回一个 `WebResponse`。主要区别在于它是一个
    `suspend` 函数，并且被包裹在 `coroutineScope` 中。


    当你想要执行多个并行化的服务调用时，`async()` 是主力工具。你包裹在 `async()` 中的代码会立即异步执行。当你向 `/random_number`
    发起请求时，你的代码不会暂停并等待返回值。相反，它会继续执行下一条语句，该语句会启动一个对 `/reverse` 的请求。类似地，代码不会等待该请求完成，而是直接进入下一条语句，该语句会启动另一个异步块，执行对
    `/ping` 的请求，并将该返回值用作数据库查询的输入。


    当你调用 `await()` 时，异步魔法就发生了。`async()` 的返回值是 `Deferred<T>`，在 `Deferred<T>` 上调用 `await()`
    会导致该代码挂起（而非阻塞）。当结果准备好时，你的代码将继续执行，而 `Deferred<T>` 的值就是 `T`——换句话说，就是 `async()` 块返回的原始值。


    `async()` 还需要一个协程作用域才能运行。将函数体包裹在 `coroutineScope` 中可确保协程作用域可用。当你从 Ktor Web 处理器调用
    `handleCoroutineTest()` 时，它会继承已有的上下文。因此，像这样将函数包裹在 `coroutineScope` 中不会产生额外的开销。


    ### 处理竞态条件


    编写非阻塞和并行化代码的主要难点之一在于，你无法控制所启动操作的完成顺序。当你启动操作 A、B 和 C 时，它们可能按该顺序完成，也可能 C 先完成，然后
    B 完成，或者 B 先完成，或者其他任何排列顺序。


    例如，代码清单 8-7 并行发起了 `randomNumberRequest`、`reverseRequest` 和 `queryOperation`。因此它们都立即开始执行，互不等待。但
    `reverseRequest` 依赖于 `randomNumberRequest` 的返回值。这里存在潜在的*竞态条件*。竞态条件是指一种很少发生的意外事件顺序。也许由于底层实现细节，`randomNumberRequest`
    通常会在 `reverseRequest` 实际执行之前完成。但在某些罕见情况下，`reverseRequest` 先执行，并可能因为 `randomNumberRequest`
    的返回值尚不可用而失败。


    当你使用协程时，像这样的竞态条件就不是问题了。`reverseRequest` 中的代码使用了 `randomNumberRequest.await()`，这意味着协程运行时将始终等待
    `randomNumberRequest` 完成，然后才继续执行 `reverseRequest`。将 `async()` 和 `await()` 结合使用的能力，正是协程实现并行化如此强大的原因。你无需管理请求发生的顺序，也无需手动处理异步操作完成的所有组合情况。你只需启动异步操作，然后对所需的值简单地调用
    `await()`，一切就会按预期工作。


    ### 添加到 Ktor


    要测试此函数，你可以创建一个新的 Ktor 路由处理器，并调用代码清单 8-7 中的 `handleCoroutineTest()` 函数。


    为此，你只需在 Ktor 的 `routes` 块中添加一个新的路由处理器，并像代码清单 8-8 所示那样调用该函数。


    ```

    get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

    handleCoroutineTest(dbSess)

    })

    代码清单 8-8

    在 Web 处理器中调用 handleCoroutineTest()

    ```


    现在就去测试吧！实际得到的数字是随机设计的，所以这是我在写这本书时运行代码得到的随机输出：


    ```

    Random number: 1599

    Reversed: 9951

    Query: {c=1}

    ```


    ## 混合协程与阻塞调用


    在 Java 平台上有大量调用会在等待异步操作完成时阻塞当前线程。你应该避免将这些阻塞调用直接放在协程中，而是适当地包装它们，让 Kotlin 更高效地管理资源。


    ### 包装阻塞调用


    在代码清单 8-7 中，你已经违反了包装阻塞调用的规则。Ktor HTTP 客户端基于协程，不会阻塞。但 JDBC 和 Kotliquery 在等待数据库返回时确实会阻塞：


    ```

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    ```


    要解决此问题，你应该使用 `withContext` 包装所有阻塞调用，并确保阻塞调用在内置的 `Dispatchers.IO` 上下文中运行。代码清单 8-9
    演示了如何让代码清单 8-7 中的代码在协程中正确处理阻塞调用。


    ```

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    withContext(Dispatchers.IO) {

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    }

    代码清单 8-9

    在协程中正确处理阻塞调用

    ```


    通过这个小小的改动，你允许协程运行时在一个单独的线程池中执行阻塞调用，该线程池专为长时间运行的阻塞 I/O 操作（如数据库查询）而设计。


    在你的主要 Web 处理器中，包装数据库访问调用并不那么重要。典型的 Web 处理器会执行一个或几个顺序的数据库查询，并不会真正进行任何并行化。但对于高度并行化的协程代码，你应该牢记这一点，并尽量记得将所有阻塞调用包装在
    `withContext(Dispatchers.IO)` 中。


    ## 协程内部原理


    在本章中，你已经了解了一些关于协程底层运作的细节。在本节中，我将解释协程工作原理中一些更深入的细节。让我们深入探究其内部机制！

