- fmt: '### Convenience Functions for Headers


    The current API you’ve created for building HTTP responses is a little bit cumbersome
    to work with. To be compliant with the HTTP spec, you’ve encoded header values
    as `List<String>`, not a plain `String`. It’s rare to need multiple values for
    the same header. But the HTTP spec allows it, and it can be practical in some
    cases, such as responding with multiple `Set-Cookie` headers.


    You could opt to represent your headers as a `String` instead of a `List<String>`,
    so that you don’t have to wrap all your header values in `listOf` to create a
    list, as seen in Listing [4-2](#531928_1_En_4_Chapter.xhtml#PC3). But you can
    also update `WebResponse` to make it more convenient to work with multi-valued
    headers.


    You can do this by adding two methods to `WebResponse` for appending header values:


    ```

    sealed class WebResponse {

    fun header(headerName: String, headerValue: String) =

    ...

    fun header(headerName: String, headerValue: List) =

    ...

    }

    ```


    This is an example of *function overloading*. Kotlin lets you write multiple implementations
    of functions with the same name. Kotlin looks at which arguments you pass to the
    function and determines which function to run. In this case, the difference between
    them is that `headerValue` can either be a string or a list of strings. Both methods
    append headers to the response. The only difference between them is that one takes
    a single header and the other takes a list of headers, covering both use cases
    for your convenience.


    The implementation of `header(String, String)` is straightforward – it just defers
    to the function `header(String, List<String>)` and wraps the header you provided
    in a list:


    ```

    fun header(headerName: String, headerValue: String) =

    header(headerName, listOf(headerValue))

    ```


    At first glance, this might look like an infinite loop, as the `header` function
    does nothing but call the `header` function. But the different argument types
    (single string vs. list of strings) mean they are two distinct functions and no
    infinite loop occurs.


    The code that does the heavy lifting will reside in `header(String, List<String>)`.
    It will need to do two things: All the properties of `WebResponse` are immutable,
    so we must create a new instance of `WebResponse` with new values. Additionally,
    the `headers` map is also immutable, so we need to create a new `headers` value
    with the new list of headers appended.


    To create a new instance of `WebResponse`, we can lean on the `copy` function
    that is built into all data classes. The `WebResponse` class itself is not a data
    class, so it does not have a built-in `copy` function. But `WebResponse` is the
    class that implements `header(String, List<String>)` and therefore needs access
    to a method that can create a new copy. You can implement this using an abstract
    function on `WebResponse`, which has no implementation, but returns a new instance
    of `WebResponse` and defers the implementation to the child classes:


    ```

    sealed class WebResponse {

    abstract fun copyResponse(

    statusCode: Int,

    headers: Map>)

    : WebResponse

    }

    ```


    You’ll now get a compile error for `TextWebResponse` and `JsonWebResponse`, as
    they do not implement the new abstract function. Listing [4-3](#531928_1_En_4_Chapter.xhtml#PC7)
    shows the full implementation of `TextWebResponse` with `copyResponse` implemented
    by calling the built-in copy function on data classes.


    ```

    data class TextWebResponse(

    val body: String,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse() {

    override fun copyResponse(

    statusCode: Int,

    headers: Map>

    ) =

    copy(body, statusCode, headers)

    }

    Listing 4-3

    An implementation of TextWebResponse with the abstract function copyResponse from
    WebResponse implemented

    ```


    The order of the arguments for copy is the same as the order of the arguments
    in the constructor of the data class. If you prefer, you can also name the arguments,
    such as `copy(body = body, statusCode = statusCode, ...)`. But it saves you some
    typing to omit the names. And the implementation of copy lives right next to the
    constructor itself in the source code, so it’s easy to locate the actual ordering
    of arguments by just looking at the code right there.


    All that’s left is to create the actual implementation of `header(String, List<String>)`
    in `WebResponse`:


    ```

    sealed class WebResponse {

    fun header(headerName: String, headerValue: List) =

    copyResponse(

    statusCode,

    headers.plus(Pair(

    headerName,

    headers.getOrDefault(headerName, listOf())

    .plus(headerValue)

    ))

    )

    }

    ```


    This implementation calls the `copyResponse` function we created earlier. It passes
    in the `statusCode` as is. For the headers, it needs to handle duplicates of `headerName`.
    If we pass a `headerName` that’s already present in `headers`, the plus will replace
    any existing value with the new one. So we ask headers for the existing value
    of `headerName`, or an empty list if there is none, and append the list of headers
    to this list instead of replacing it altogether.


    You now have everything you need to create a finished implementation. Listing
    [4-4](#531928_1_En_4_Chapter.xhtml#PC9) shows a full implementation of `header(String,
    String)`, `header(String, List<String>)`, as well as the `copyResponse` functionality
    to create new instances under the hood.


    ```

    sealed class WebResponse {

    abstract val statusCode: Int

    abstract val headers: Map>

    abstract fun copyResponse(

    statusCode: Int,

    headers: Map>)

    : WebResponse

    fun header(headerName: String, headerValue: String) =

    header(headerName, listOf(headerValue))

    fun header(headerName: String, headerValue: List) =

    copyResponse(

    statusCode,

    headers.plus(Pair(

    headerName,

    headers.getOrDefault(headerName, listOf())

    .plus(headerValue)

    ))

    )

    }

    data class TextWebResponse(

    val body: String,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse() {

    override fun copyResponse(

    statusCode: Int,

    headers: Map>

    ) =

    copy(body, statusCode, headers)

    }

    data class JsonWebResponse(

    val body: Any?,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse() {

    override fun copyResponse(

    statusCode: Int,

    headers: Map>

    ) =

    copy(body, statusCode, headers)

    }

    Listing 4-4

    The full implementations of WebResponse, TextWebResponse, and JsonWebResponse

    ```


    You can now use this code to append headers using convenient functions instead
    of manually creating maps and lists for the headers:


    ```

    // Before

    TextWebResponse("Hello, World!", headers = mapof(

    "X-Whatever" to listOf("someValue")

    ))

    JsonWebResponse(listOf(1, 2, 3), headers = mapOf(

    "Set-Cookie" to listOf(

    "myCookie=123abc",

    "myOtherCookie=456def"

    )

    ))

    // After

    TextWebResponse("Hello, World!")

    .header("X-Whatever", "someValue")

    JsonWebResponse(listOf(1, 2, 3))

    .header("Set-Cookie", "myCookie=123abc")

    .header("Set-Cookie", "myOtherCookie=456def")

    ```


    The implementation of `WebResponse` appends header values on each call, so it’s
    up to you if you want to call `header(String, String)` multiple times or do a
    single (or multiple) call to `header(String, List<String>)`.'
