    ### 映射 JsonWebResponse


    与映射 `TextWebResponse` 相比，映射 `JsonWebResponse` 需要额外几个步骤。你需要添加一个第三方 JSON 序列化器（一种接收数据并写入
    JSON 字符串的工具），并且需要实现 Ktor 接口 `OutgoingContent`，以便将包含 JSON 的字符串映射到 Ktor。


    有许多可用的 JSON 序列化器。本书将使用 Gson，这是 Google 开发的一个 Java 库。Gson 是目前最快的 JSON 库之一（[`www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/`](http://www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/)）。它也很容易以面向数据的方式使用，因此你无需创建映射类和注解即可使用它，而
    Java 平台上的其他一些 JSON 库则需要这些。它适用于使用普通列表和映射来序列化数据，以及在后续章节中解析 JSON。


    通过将以下内容添加到 *build.gradle.kts* 的 `dependencies` 块中，将 Gson 添加为依赖项：


    ```

    implementation("com.google.code.gson:gson:2.10")

    ```


    接下来，你需要一个 `OutgoingContent` 实现，如清单 4-13 所示，它从 `JsonWebResponse` 获取你的 JSON 内容并将其映射到
    Ktor。


    ```

    import com.google.gson.Gson

    class KtorJsonWebResponse (

    val body: Any?,

    override val status: HttpStatusCode = HttpStatusCode.OK

    ) : OutgoingContent.ByteArrayContent() {

    override val contentType: ContentType =

    ContentType.Application.Json.withCharset(Charsets.UTF_8)

    override fun bytes() = Gson().toJson(body).toByteArray(

    Charsets.UTF_8

    )

    }

    清单 4-13

    在 Ktor 中用于 JSON 序列化的 OutgoingContent 实现

    ```


    这个新类 `KtorJsonWebResponse` 接收 `body` 中的 JSON 数据和 `status` 中的可选状态码，并通过覆盖 `OutgoingContent`
    中的关键函数将它们全部映射到 Ktor。如果你愿意，可以通过增强它来传入你自己的 `ContentType` 实例，从而使其更加灵活，让你可以选择其他内容类型和字符集。但在大多数情况下，将其硬编码为默认的
    `application/json` 和硬编码的编码（此处为 UTF-8）就足够了。


    最后，你需要在 `webResponse` 的实现中使用 `KtorJsonWebResponse` 的实例，目前你只处理了 `TextWebResponse`。清单
    4-14 显示了来自 `webResponse` 的更新后的 when 语句，其中你同时处理了 `JsonWebResponse` 和 `TextWebResponse`。


    ```

    when (resp) {

    is TextWebResponse -> {

    call.respondText(

    text = resp.body,

    status = statusCode

    )

    }

    is JsonWebResponse -> {

    call.respond(KtorJsonWebResponse (

    body = resp.body,

    status = statusCode

    ))

    }

    }

    清单 4-14

    在 webResponse 的 when 语句中同时处理 TextWebResponse 和 JsonWebResponse

    ```


    映射的核心部分位于 `KtorJsonWebResponse` 内部，因此你只需在 when 语句中为 `JsonWebResponse` 添加一个分支，并将
    `KtorJsonWebResponse` 的实例传递给 `call.respond`。


    ### 使用新的映射


    现在，你已经将 `WebResponse` 完全映射到了 Ktor，并且可以在你的处理器中开始使用它。


    目前，你只有一个路由：对 / 的 GET 请求返回一个纯文本响应，内容为“Hello, World!”。此路由直接使用了 Ktor API。你可以将其更改为使用
    `WebResponse`。清单 4-15 展示了如何执行此操作，同时也展示了如何在此过程中添加一些额外的路由。


    ```

    get("/", webResponse {

    TextWebResponse("Hello, world!")

    })

    get("/param_test", webResponse {

    TextWebResponse(

    "The param is: ${call.request.queryParameters["foo"]}"

    )

    })

    get("/json_test", webResponse {

    JsonWebResponse(mapOf("foo" to "bar"))

    })

    get("/json_test_with_header", webResponse {

    JsonWebResponse(mapOf("foo" to "bar"))

    .header("X-Test-Header", "Just a test!")

    })

    清单 4-15

    在 Ktor 应用程序的路由块内，使用 WebResponse 向 Ktor 添加路由

    ```


    启动你的应用程序，尝试打开所有新路径，看看会发生什么！


    ## 关于过度设计的说明


    在这个独立的 HTTP 响应表示中，处理了各种边缘情况。你真的需要所有这些额外的代码吗？


    我从未在实际的 Web 应用程序中做过类似的事情。这是因为我从没编写过既能在 Ktor 上运行又能在无服务器环境中运行的 Web 应用程序。我确实做过从一种
    Web 框架切换到另一种的重写工作。但你不需要为了能够进行重写而预先抽象化你的 Web 框架——你可以像进行任何其他重写一样直接进行重写。我不喜欢仅仅为了简化项目中可能发生的重写而使用抽象。


    在本书的上下文中，这种抽象是有意义的，因为我稍后想向你展示如何轻松地用 Jersey 和其他框架替换 Ktor，以及如何在无服务器环境中运行你的处理器。当你在业务逻辑和
    Web 路由库之间拥有 `WebResponse` 时，这几乎是微不足道的。


    此外，`WebResponse` 并不那么复杂。而且我个人更喜欢我的 Web 处理器采用函数式风格，而 `WebResponse` 正是这种风格。所以我认为这种权衡是值得的。下次我从头开始创建
    Kotlin Web 应用程序时，我可能会在代码库中引入类似 `WebResponse` 的东西，仅仅因为我喜欢它的函数式风格。


    但是，正是这种对你可能使用或不使用的各种用例的处理，才使得框架变得如此庞大和复杂。`WebResponse` 只是这个问题的一个微小示例。一个框架需要处理成千上万个这样的案例，并提供
    API 和接口来支持所有这些案例的任意组合。因此，框架必然包含大量你永远不需要的抽象和代码，而这反过来又使得框架在你的系统中难以作为一个整体来理解。如果你使用的框架出现问题，你必须深入挖掘包含数十万行代码和多层抽象的“框架之山”，这至少可以说是一项艰巨的任务。


    当然，这也是框架的价值所在。当你需要做某事时，框架中已经有一个可用的解决方案。并且拥有标准化的做事方式，使得在不同的代码库上工作更加容易，因为它们都遵循框架约定，以相同的方式做事。


    所有抽象都有成本。我认为 `WebResponse` 是值得的。但要小心。不要仅仅为了抽象化一个库而去抽象化它。


    # 第二部分 库与解决方案


    # 5. 连接和迁移 SQL 数据库


    你的 Web 应用程序需要一个地方来存储和读取数据。迄今为止，最常见的地方是 SQL 数据库。本章将介绍使用连接池连接到数据库所需的所有配置，如何设置初始模式，以及如何随着需求的必然变化来维护数据库模式的变更。


    如果你是 Kotlin 新手，以下是本章中你会看到的示例所涉及的一些语言特性：


    *   使用 `use` 关闭和清理资源


    *   `AutoCloseable` 和 `Closeable` 对象


    *   使用 `also` 避免中间变量


    *   使用函数引用将函数用作 lambda


    此外，在本章中，你将学习以下关于迁移和查询 SQL 数据库的内容：


    *   使用 Flyway 管理初始模式以及随时间变化的模式变更


    *   使用 JDBC 连接池连接到 SQL 数据库


    *   生成种子数据以使用所需数据预填充数据库


    在第 6 章中，你将学习更多关于对数据库执行查询的知识。

    '
- fmt: '## Connecting to a SQL Database


    You can’t do anything with a SQL database unless you connect to it. There are
    some exceptions, including managed cloud databases such as AWS Aurora Serverless.
    But that’s the exception, not the rule. So the first step is to figure out how
    to manage connections to your database.


    ### The Connection Pool


    The first step when connecting to a SQL database from a web app is to set up a
    connection pool. Your web app is likely to have to handle tens or hundreds (or
    even thousands) of simultaneous requests. A connection pool is a tool that manages
    multiple simultaneous connections. PostgreSQL is one of the most popular and scalable
    SQL databases out there, but out of the box, PostgreSQL supports a maximum of
    100 simultaneous connections.


    It’s possible to create connections by hand. For example, you could just create
    one connection and have your web app use that connection for everything. But a
    connection can’t handle multiple simultaneous transactions, for example. So you
    should set up your web app to create multiple simultaneous database connections
    from the get-go.


    Instead, you should use a connection pool. You set up a connection pool by giving
    it the credentials for connecting to your database. In your web app, when you
    want to execute queries in your database, you ask the connection pool to give
    you a connection. If the pool has a connection available, you’ll get it right
    away. If all the connections in the pool are busy, it creates a new one. If the
    pool has reached the maximum number of allowed simultaneous connections, the connection
    pool will wait until the current number of simultaneous connections is lower than
    the maximum and only then give you a connection.


    You can also optimize performance via the connection pool. I won’t go into the
    many intricate details of scaling a SQL database here. But benchmarks and real-world
    experience have shown that in some cases, you’ll get more performance out of your
    database if you limit the maximum allowed number of simultaneous connections to
    about half the maximum of what the database supports.


    Additionally, in a deployment scenario where you have multiple instances of your
    web app running, you can tell the connection pool to only create a maximum number
    of 25 connections. That way, you can have four instances of your web app running
    simultaneously, and your database won’t have more than 100 simultaneous connections
    across all the running instances.


    In addition to being a useful tool for your own code, you’ll often encounter third-party
    libraries that expect to be handed a connection pool instead of a direct connection
    as well. Using a connection pool from the get-go prepares your code for that eventuality.


    ### Installing the Database Driver


    To connect to a database, you need a database driver for the database you’re connecting
    to. There are plenty of SQL databases to choose from, like PostgreSQL, MariaDB,
    Oracle DB, and many more. For convenience, this book will use H2, an embedded
    SQL database for the Java platform. H2 is a full-featured SQL database, and since
    it’s embedded, you don’t need to spend additional time installing and setting
    it up.


    **Tip**


    You can use another database than H2 if you want to. Make sure you also alter
    the SQL to match your database. Most of the SQL in this book is straightforward
    and should work outside of H2, but some things like `CREATE TABLE` statements
    and the data types are usually different between the SQL databases.


    You also need a library for creating the connection pool, and the library you’ll
    be using is HikariCP. It’s a generic library that implements the JDBC `DataSource`
    interface for connection pools and is a tried-and-true production-grade library
    that I’ve used in plenty of real-world projects, in Clojure, Groovy, and Kotlin.


    To install H2 and HikariCP, add them as dependencies to the dependencies block
    in `build.gradle.kts`:


    ```

    implementation("com.zaxxer:HikariCP:5.0.1")

    implementation("com.h2database:h2:2.1.214")

    ```


    The H2 dependency includes the database driver, as well as the actual implementation
    of the H2 database. Normally, the database driver only contains what’s necessary
    to connect to an external database. But H2 is an embedded database and therefore
    includes both driver and server in one convenient package.


    ### Setting Up H2


    When you connect to any database, you give the connection pool a URL that it connects
    to. H2 is an embedded database, so the connection URL is also where you configure
    H2 and how it operates.


    H2 has two main modes of operation: in-memory and with file system persistence.
    The in-memory mode means that H2 completely wipes out the database when you restart
    your web app. To make H2 use the in-memory mode, you set it up using the URL `jdbc:h2:mem:mydbname`.


    In this book, you’ll use the file system mode, though. While the in-memory mode
    can be convenient, the goal is to learn how to set up real-world web apps using
    databases like PostgreSQL and MariaDB, where data is persisted through restarts.
    The file system mode makes H2 behave more like those databases. To make H2 use
    the file system mode, you set it up using the URL `jdbc:h2:path/to/file`.


    A good location in the file system to place your H2 database is `./build/local`.
    This places the database file in the `build` folder, which is the directory that
    Gradle already uses to store its build output. If you run the Gradle `clean` task,
    it’ll wipe out the entire `build` directory, including your database. If you want
    to make sure Gradle never touches your database, place it somewhere else. But
    you shouldn’t be storing important data in your local development database anyway.


    You’ll also set two flags in the connection URL, `MODE=PostgreSQL` and `DATABASE_TO_LOWER=TRUE`.
    Setting these two flags makes H2 easier to work with, and it makes H2 not care
    about whether you spell table and column names in uppercase or lowercase, among
    other things.'
