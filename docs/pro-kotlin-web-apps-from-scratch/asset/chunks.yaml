    First, there’s no direct interaction with the Ktor `call` API in the handlers.
    Second, the Ktor `call` API is imperative in that you invoke methods on it imperatively
    and in succession. The `WebResponse` API is functional in nature, meaning that
    the only point of interaction is the immutable value `WebResponse` that’s returned
    from your own handlers, with no imperative method invocations.


    The first step is to create a function that creates and returns a new lambda.
    The function `get` in Ktor has the (simplified) signature `get(path: String, body:
    ApplicationCall.() -> Unit)`. In other words, the second argument is an *extension
