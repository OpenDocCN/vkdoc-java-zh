- fmt: '### Use SQL Directly


    To execute queries, you’ll write SQL directly. Before you’ll set that up, I want
    to explain why.


    Some developers prefer to use a mapping library, so that you can express your
    queries as Kotlin code. Exposed (`https://github.com/JetBrains/Exposed`) and Ktorm
    (`www.ktorm.org/`) are popular Kotlin libraries, and you can also use Java libraries
    such as Hibernate (`https://hibernate.org/`) and MyBatis (`https://mybatis.org/mybatis-3/`)
    and many more. Common between them all is that they let you create classes that
    represent tables, with a type-safe mapping layer between your code and the database
    tables. You can set up object graphs (hence the name Object-Relational Mapper,
    or ORM) that define the relationships between the tables. You don’t write any
    SQL queries. Instead, you interact with the mapping classes and use them to express
    inserts, queries, groupings, and so on.


    All of this sounds good. The smartest people in our industry make these libraries
    and frameworks, and lots of developers use them, in both small and large projects.
    So what’s the catch?


    I consider the database to be an integral part of any web app. I want my code
    to be as close as possible to the actual database that I use in the web app I
    build. This is the case no matter which language I use, be it Node.js, Groovy,
    Clojure, and of course Kotlin. The intricate details of how my code and the database
    interact always end up being important, especially as the application grows. An
    ORM hides these details from you by design. So, for the way you’ll write web apps
    in this book, the ORM becomes an anti-pattern.


    And being able to use all the features of a SQL database without having to worry
    if it’s possible to map it using an ORM or express it using a SQL wrapper is a
    plus.


    One benefit of ORMs is that they can generate efficient SQL queries automatically.
    But an ORM can also generate inefficient queries. So you need to have a deep understanding
    of SQL if you’re using an ORM, to be able to handle these situations. There’s
    no escaping knowledge of SQL. With that in mind, I prefer to just write the SQL
    directly.


    I’m not saying you should never use an ORM. But I personally never use them, for
    the reasons mentioned previously, so I avoid them in this book.


    ### Installing Kotliquery


    You’ll use Kotliquery to execute queries. Kotliquery is a small wrapper library
    around JDBC, and it helps you solve the problem of boilerplate and uncomfortable
    APIs in JDBC.


    Note that using Kotliquery doesn’t limit you from calling JDBC directly if you
    should need that later. The benefit of a library like Kotliquery is that you can
    mix and match; there’s no lock-in.


    To install Kotliquery, add it as a dependency to the `dependencies` block in `build.gradle.kts`:


    ```

    implementation("com.github.seratch:kotliquery:1.9.0")

    ```


    Kotliquery is a well-designed library that has all the features you’ll need to
    build a production-grade web app. It’s not a popular library, if you judge it
    by the number of GitHub stars. But popularity is a vanity metric. I’ve used Kotliquery
    successfully in large production systems.


    ### Mapping Query Results


    A row mapper is a function that Kotliquery uses to extract row data and turn it
    into a data structure of your liking. This row mapper is a function that takes
    a raw Kotliquery `Row` object and converts it into useful data.


    Listing [6-1](#531928_1_En_6_Chapter.xhtml#PC2) shows how to create a row mapper
    function that you can use later when you execute queries with Kotliquery.


    ```

    import kotliquery.Row

    fun mapFromRow(row: Row): Map {

    return row.underlying.metaData

    .let { (1..it.columnCount).map(it::getColumnName) }

    .map { it to row.anyOrNull(it) }

    .toMap()

    }

    Listing 6-1

    A function that maps Kotliquery Row objects to plain maps

    ```


    There are several interesting things happening in this code. Inside the `let`
    block, you create a *range* from 1 to the `metaData.columnCount` of the query
    results. You can think of ranges as a list of the numbers in that range, so `1..5`
    is the equivalent of `listOf(1, 2, 3, 4, 5)`. Then, you map over that range and
    use a *function reference* to get the column name. `map(it::getColumnName)` is
    equivalent to `map { colIdx -> it.getColumnName(colIdx) }`. It’s the same as if
    you called `getColumnName` on the `metaData` object (`it`) with the column index
    from the range passed as the first argument. Then, the list of column names are
    mapped over to return a pair of the column name and the value of that column with
    `row.anyOrNull(it)`. At this point, all you’re doing is extracting the raw data
    from the query; you don’t do any type checking or casting. Finally, you convert
    the list of pairs to a map with `toMap()`. The result is that you’ve converted
    the Kotliquery `Row` object to a plain map of column name to column value.


    ## Execute SQL Queries


    Kotliquery is now set up and ready to go. It’s time to execute some queries!


    ### Creating a Session


    To execute queries with Kotliquery, you need the row mapper you just created and
    a Kotliquery session.


    You create a session by calling the Kotliquery function `sessionOf` with your
    connection pool. A Kotliquery session is a small wrapper around a raw database
    connection. The session has methods that you call to execute queries, and Listing
    [6-2](#531928_1_En_6_Chapter.xhtml#PC3) shows how you can use `single` to fetch
    a single row.


    ```

    import kotliquery.sessionOf

    sessionOf(dataSource).use { dbSess ->

    dbSess.single(queryOf("SELECT 1", ::mapFromRow))

    // {?column?=1}

    }

    Listing 6-2

    Create a Kotliquery session and execute a query

    ```


    Just like in Listing [5-5](#531928_1_En_5_Chapter.xhtml#PC5) in the previous chapter,
    a Kotliquery session implements `java.io.Closeable`, and you must remember to
    call `close()` when you’re finished using it. `use` will call `close()` for you,
    and Kotliquery will in turn close the underlying connection it got from the data
    source when you created the session.


    ### Querying for Single Rows


    You’ve already seen how you can use `single()` on a Kotliquery session to fetch
    a single row, in Listing [6-2](#531928_1_En_6_Chapter.xhtml#PC3). `single()` is
    an optimization that will only ever return one row from the query. This allows
    Kotliquery to make some assumptions under the hood, such as not even trying to
    your database for multiple rows. And the return type (via the row mapper) is `Map<String,
    Any?>?`, meaning it will return `null` or a single row. Listing [6-3](#531928_1_En_6_Chapter.xhtml#PC4)
    has some additional examples of the output from `single()`.


    ```

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    // {?column?=1}

    dbSess.single(queryOf("SELECT 1 as foo"), ::mapFromRow)

    // {foo=1}

    dbSess.single(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    ), ::mapFromRow)

    // {x=1, y=a}

    Listing 6-3

    Examples of output from single()

    ```


    The last query selects from two rows, but you only get the first row back from
    `single()`. No special magic happens here; it just relies on whatever ordering
    of the result set that the database engine returns.'
