  trans: '

    ### 使用 Ktor HTML DSL


    Ktor HTML DSL 是 Ktor 的一个插件，你需要将其作为依赖项添加到项目的 *build.gradle.kts* 文件中：


    ```

    implementation("io.ktor:ktor-server-html-builder:2.1.2")

    ```


    Ktor HTML DSL 包含对 Ktor 路由处理器中 `call` 对象的扩展函数，用于响应使用 `kotlinx.xhtml` 构建的 HTML 内容。


    最基本的函数是 `call.respondHtml`。代码清单 9-1 演示了如何使用此函数，它允许在 Web 处理器中直接内联 HTML 内容。


    ```

    get("/html_test") {

    call.respondHtml {

    head {

    title("Hello, World!")

    }

    body {

    h1 { +"Hello, World!" }

    }

    }

    }

    代码清单 9-1

    在 Ktor Web 处理器中使用 call.respondHtml

    ```


    现在，你可以在浏览器中打开 *http://localhost:4207/html_test*，欣赏图 9-1 中展示的精美网页。


    ![](img/531928_1_En_9_Fig1_HTML.png)


    网页截图。文本显示为 Hello, world，并带有一个感叹号。


    图 9-1


    浏览器中的 HTML 输出


    只需这些步骤，就能为你的 Web 应用添加基本的 HTML 输出！在本章后面，你将学习如何在多个 Web 处理器之间共享 HTML 布局。


    ### DSL 的强大之处


    `kotlinx.xhtml` 大量使用了扩展函数，以实现类型安全的 HTML 生成 DSL。这是如何实现的呢？


    DSL 最便捷的特性之一是利用类型系统来确保只生成有效的 HTML 输出。例如，`h1` 函数只能在 `body` 内部使用。你不能将 `h1` 放在 `head`
    内部。也不能在顶层将 `h1` 作为 `head` 和 `body` 的同级元素使用。Ktor 确实提供了“逃生舱”，允许在任意位置使用任意标签，因此你并不会受到限制。但开箱即用，DSL
    能帮助你生成有效的 HTML 输出。


    如果你使用 IntelliJ IDEA，应该已经看到了其工作原理的提示。图 9-2 显示了每个 lambda 开头的灰色块，指示了 lambda 内部隐式接收者的类型。


    ![](img/531928_1_En_9_Fig2_HTML.png)


    标题为“kotlin book-Main dot k t”的窗口截图。打开的主题“main dot k t”包含 17 行代码，并显示了运行结果。


    图 9-2


    IntelliJ IDEA 显示灰色框，指示 lambda 内部的接收者类型


    你传递给 `generateHtml`、`head` 和 `body` 的 lambda 分别具有 `HTML`、`HEAD` 和 `BODY` 类型的接收者。然后，DSL
    将各种函数（如 `head` 和 `h1`）定义为相应标签类型的扩展函数。因此，DSL 内部将 `h1` 定义为 `fun BODY.h1(...) { ...
    }`。（实际上，它被定义为更抽象类型 `FlowOrHeadingContent` 的扩展函数，而 `BODY` 是该类型的子类型。）


    ### 运算符重载


    `kotlinx.xhtml` 在其 DSL 中利用了运算符重载。你已经使用过其中一个重载运算符：使用 `+` 向 HTML 标签添加文本内容。


    在 Kotlin 中，运算符重载允许自定义内置运算符（例如 `+` 号）的定义。你无法覆盖 `+` 对数字等类型的含义，但可以覆盖 `+` 在你自己的类型上被调用时的含义。


    在编写 `kotlinx.xhtml` 模板时，你可以使用 `text` 代替 `+`。因此，`h1 { text("Hello, World!") }`
    等同于 `h1 { +"Hello, World" }`。`text` 的实现包含了添加文本的实际代码。然后，`kotlinx.xhtml` 在 `Tag`
    接口中定义了一个名为 `unaryPlus` 的特殊运算符函数：


    ```

    package kotlinx.xhtml

    interface Tag {

    operator fun String.unaryPlus(): Unit {

    text(this)

    }

    }

    ```


    通过在 `Tag` 内部定义扩展函数，该函数仅在 `Tag` 实例的上下文中可用。通过添加特殊的 `operator` 关键字和特殊的 `unaryPlus`
    名称，Kotlin 编译器就知道，当在 `Tag` 的上下文中遇到 `+"some string"` 时，它会调用该函数，并且 `this` 绑定到你对其调用
    `+` 的字符串上。


    *一元加号*这个名称指的是通常以 `+i` 形式用于数字的运算符，以及其兄弟运算符 `-i`，它们分别是对数字的恒等运算符和取反运算符。但 Kotlin 允许你定义这些运算符，以便在任何类型上使用它们。


    ### 添加自定义标签


    如果你需要插入任意标签，DSL 提供了两种选择。


    你可以使用 `unsafe` 函数将原始 HTML 输出写入模板。在 DSL 中的任何位置，添加 `unsafe { +"""<my-tag class="foo"></my-tag>"""
    }`，你的模板输出将包含该原始 HTML。顾名思义，`unsafe` 不会对输出进行转义，因此使用它会使你的 Web 应用面临 HTML 注入攻击的风险。


    相反，你应该为你想要添加到 DSL 的新标签创建自定义扩展函数。代码清单 9-2 展示了如何将名为 `<my-tag>` 的自定义标签写入 `kotlinx.xhtml`
    DSL 本身。


    ```

    class MY_TAG(consumer: TagConsumer): HTMLTag(

    "my-tag", consumer, emptyMap(),

    inlineTag = true,

    emptyTag = false

    )

    fun FlowOrHeadingContent.myTag(

    block: MY_TAG.() -> Unit = {}

    ) {

    MY_TAG(consumer).visit(block)

    }

    代码清单 9-2

    向 kotlinx.xhtml DSL 添加自定义标签

    ```


    DSL 中的这个自定义标签是完全安全的，并且会自动正确处理 HTML 输入的转义。


    `MY_TAG` 类定义了 `kotlinx.xhtml` 在生成实际 HTML 时应如何写入输出。`myTag` 函数是 `FlowOrHeadingContent`
    的扩展函数，这使得它可以在模板的 `body` 部分以及 `body` 中的大多数子元素中使用。


    如果你想限制或更改可以调用 `myTag` 的上下文，请相应地更改扩展函数的接收者类型。例如，要仅使 `myTag` 在 `head` 内部可用，请使用接收者类型
    `HEAD` 而不是 `FlowOrHeadingContent`。


    ## CSS 和资源文件


    提供 HTML 内容是一个好的开始，但你很可能还需要一些 CSS 和其他资源文件，例如图片文件。

    '
- fmt: '### Serving Static Files


    Ktor has built-in support for serving static files. Ktor can serve any static
    file, such as images, JavaScript, and video files, not just CSS files.


    To add serving of static files to your web app, add a `static` route to your Ktor
    config. Listing [9-3](#531928_1_En_9_Chapter.xhtml#PC5) demonstrates how to add
    one.


    ```

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    resources("public")

    }

    Listing 9-3

    Adding a static route to createKtorApplication for serving files inside

    ```


    Here, the `static` route is set up to handle the path `/*`. That means all the
    files in the `public` folder on the Java runtime class path are available via
    your embedded Ktor web server. For example, if you have a file `public/app.css`
    on the class path, you can access it using `http://localhost:4207/app.css`.


    The best place to put your assets in the file system is in `src/main/resources`.
    Your Gradle setup already adds all the files in that folder to the Java runtime
    class path. You can add as many subfolders in assets as you like. All the files
    in `src/main/resources/public` are recursively available to the corresponding
    path in your web app.


    Try to create a CSS file now and include it in your HTML output in your web handler!
    Listing [9-4](#531928_1_En_9_Chapter.xhtml#PC6) shows how to update the HTML output
    from Listing [9-1](#531928_1_En_9_Chapter.xhtml#PC2) to include a stylesheet using
    the `kotlinx.xhtml` DSL.


    ```

    get("/html_test") {

    call.respondHtml {

    head {

    title("Hello, World!")

    styleLink("/app.css")

    }

    body {

    h1 { +"Hello, World!" }

    }

    }

    }

    Listing 9-4

    Linking to a CSS file in the kotlinx.xhtml DSL

    ```


    The route is unchanged, except from the added `styleLink` call inside the `head`
    block.


    This example demonstrates one of the benefits of using a DSL instead of plain
    HTML. The DSL adds convenient shortcuts, so you don’t have to remember how to
    fully type out a valid `<link>` tag for stylesheets. (Is it `href="/app.css"`
    or `src="/app.css"`? Do you have to remember to set `rel="stylesheet"`? And so
    on.) Note that there is also a `link` DSL method available, if you need full control
    of the attributes of your CSS links or need to use the `<link>` tag for other
    purposes such as linking to an RSS feed or setting alternate `rel="alternate"`
    links with `hrefLang` for multilingual sites.


    Restart your web app, and refresh your browser, and you should see your website
    like in Figure [9-3](#531928_1_En_9_Chapter.xhtml#Fig3), with the CSS in `app.css`
    applied. In this case, the CSS file contains `body { font-family: sans-serif;
    font-size: 50px; }` to change the default browser font with a different one.


    ![](images/531928_1_En_9_Chapter/531928_1_En_9_Fig3_HTML.png)


    A screenshot of a webpage. The text reads Hello, world, with an exclamation mark.


    Figure 9-3


    HTML output with CSS applied


    Writing unrealistic CSS is an effective way to easily see if everything works
    and that your setup correctly applied the CSS file. A favorite trick of mine is
    to say `body { background-color; red; }`, which looks horrible in any browser
    on any platform.


    ### Instant Reloading


    One issue with this setup is that you must restart and recompile your web app
    every time you make changes to your CSS file.


    That’s because the Java runtime loads the files from the class path. And it’s
    not actually the folder `src/main/resources` that’s on the class path when your
    web app is running locally. As a part of the compile step, Gradle moves everything
    that’s on the class path into the `build/` folder, where all the compiled output
    lives. Gradle doesn’t compile the files in `src/main/resources`, but it does copy
    them to `build/resources/main`. It’s those files that your web app is loading.


    This is fine in a production environment and is in fact the preferred approach.
    But it’s not really suited for a development environment.


    To fix this, you’ll do two things: add a config property for toggling class path
    loading vs. file system loading and set up Ktor so it loads from `src/main/resources`
    when configured to do so.


    You’ve added config properties before, so I’ll only summarize it here: In `app.conf`,
    add `useFileSystemAssets = false`. You want this to be off by default, so you
    don’t accidentally break your production setup later. In `app-local.conf`, enable
    file system loading by setting `useFileSystemAssets = true`. Then, update the
    `WebappConfig` data class with a new property, `val useFileSystemAssets: Boolean`.
    Finally, update `createAppConfig` to set `useFileSystemAssets` to the value of
    `it.getBoolean("useFileSystemAssets")`.


    Next, you’ll need to update the `static` route you added to Ktor in Listing [9-3](#531928_1_En_9_Chapter.xhtml#PC5).
    You also need to update `createKtorApplication` to receive your app config. Listing
    [9-5](#531928_1_En_9_Chapter.xhtml#PC7) shows how to extend it to load files from
    the file system when configured and otherwise load them from the class path like
    it does now.


    ```

    fun Application.createKtorApplication(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    if (appConfig.useFileSystemAssets) {

    files("src/main/resources/public")

    } else {

    resources("public")

    }

    }

    Listing 9-5

    Receive app config in createKtorApplication, and load assets directly from the
    file system when running your web app locally

    ```


    This way, Ktor will load your static files directly from your source code when
    you run your web app locally, instead of loading copies from the `build/` folder.


    You could have named this config property something generic, like `isDevMode`,
    and used the concept of “dev mode” to determine what to do. But in my experience,
    more specific config properties are better than general and reusable ones. If
    you use the same config property for multiple different things, you lose the ability
    to have granular control of your web app in different environments. Additionally,
    you’d have to grep your entire code base for `isDevMode` to figure out what it
    does, whereas `useFileSystemAssets` is more descriptive.


    ## Reusable Layouts


    In most web apps, you’re going to need a layout that’s shared across multiple
    routes. A layout adds shared defaults, such as which stylesheet to load on all
    pages, which meta tags to set, a header and a footer, and so on.


    Instead of copy-pasting the same HTML DSL code, you can create a reusable layout
    that you can programmatically reuse in multiple web handlers.


    You’ll also set it up so that it’s completely optional to use the layout in case
    you have routes in your web app where you need full control of the output, without
    forcing a layout on it.'
  raw: '### Serving Static Files


    Ktor has built-in support for serving static files. Ktor can serve any static
    file, such as images, JavaScript, and video files, not just CSS files.


    To add serving of static files to your web app, add a `static` route to your Ktor
    config. Listing [9-3](#531928_1_En_9_Chapter.xhtml#PC5) demonstrates how to add
    one.


    ```

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    resources("public")

    }

    Listing 9-3

    Adding a static route to createKtorApplication for serving files inside

    ```


    Here, the static route is set up to handle the path */*. That means all the files
    in the *public* folder on the Java runtime class path are available via your embedded
    Ktor web server. For example, if you have a file *public/app.css* on the class
    path, you can access it using *http://localhost:4207/app.css*.


    The best place to put your assets in the file system is in *src/main/resources*.
    Your Gradle setup already adds all the files in that folder to the Java runtime
    class path. You can add as many subfolders in assets as you like. All the files
    in *src/main/resources/public* are recursively available to the corresponding
    path in your web app.


    Try to create a CSS file now and include it in your HTML output in your web handler!
    Listing [9-4](#531928_1_En_9_Chapter.xhtml#PC6) shows how to update the HTML output
    from Listing [9-1](#531928_1_En_9_Chapter.xhtml#PC2) to include a stylesheet using
    the `kotlinx.xhtml` DSL.


    ```

    get("/html_test") {

    call.respondHtml {

    head {

    title("Hello, World!")

    styleLink("/app.css")

    }

    body {

    h1 { +"Hello, World!" }

    }

    }

    }

    Listing 9-4

    Linking to a CSS file in the kotlinx.xhtml DSL

    ```


    The route is unchanged, except from the added `styleLink` call inside the `head`
    block.


    This example demonstrates one of the benefits of using a DSL instead of plain
    HTML. The DSL adds convenient shortcuts, so you don’t have to remember how to
    fully type out a valid `<link>` tag for stylesheets. (Is it `href="/app.css"`
    or `src="/app.css"`? Do you have to remember to set `rel="stylesheet"`? And so
    on.) Note that there is also a `link` DSL method available, if you need full control
    of the attributes of your CSS links or need to use the `<link>` tag for other
    purposes such as linking to an RSS feed or setting alternate `rel="alternate"`
    links with `hrefLang` for multilingual sites.


    Restart your web app, and refresh your browser, and you should see your website
    like in Figure [9-3](#531928_1_En_9_Chapter.xhtml#Fig3), with the CSS in `app.css`
    applied. In this case, the CSS file contains `body { font-family: sans-serif;
    font-size: 50px; }` to change the default browser font with a different one.


    ![](images/531928_1_En_9_Chapter/531928_1_En_9_Fig3_HTML.png)


    A screenshot of a webpage. The text reads Hello, world, with an exclamation mark.


    Figure 9-3


    HTML output with CSS applied


    Writing unrealistic CSS is an effective way to easily see if everything works
    and that your setup correctly applied the CSS file. A favorite trick of mine is
    to say `body { background-color; red; }`, which looks horrible in any browser
    on any platform.


    ### Instant Reloading


    One issue with this setup is that you must restart and recompile your web app
    every time you make changes to your CSS file.


    That’s because the Java runtime loads the files from the class path. And it’s
    not actually the folder *src/main/resources* that’s on the class path when your
    web app is running locally. As a part of the compile step, Gradle moves everything
    that’s on the class path into the *build/* folder, where all the compiled output
    lives. Gradle doesn’t compile the files in *src/main/resources*, but it does copy
    them to *build/resources/main*. It’s those files that your web app is loading.


    This is fine in a production environment and is in fact the preferred approach.
    But it’s not really suited for a development environment.


    To fix this, you’ll do two things: add a config property for toggling class path
    loading vs. file system loading and set up Ktor so it loads from *src/main/resources*
    when configured to do so.


    You’ve added config properties before, so I’ll only summarize it here: In *app.conf*,
    add `useFileSystemAssets = false`. You want this to be off by default, so you
    don’t accidentally break your production setup later. In *app-local.conf*, enable
    file system loading by setting `useFileSystemAssets = true`. Then, update the
    `WebappConfig` data class with a new property, `val useFileSystemAssets: Boolean`.
    Finally, update `createAppConfig` to set `useFileSystemAssets` to the value of
    `it.getBoolean("useFileSystemAssets")`.


    Next, you’ll need to update the `static` route you added to Ktor in Listing [9-3](#531928_1_En_9_Chapter.xhtml#PC5).
    You also need to update `createKtorApplication` to receive your app config. Listing
    [9-5](#531928_1_En_9_Chapter.xhtml#PC7) shows how to extend it to load files from
    the file system when configured and otherwise load them from the class path like
    it does now.


    ```

    fun Application.createKtorApplication(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    if (appConfig.useFileSystemAssets) {

    files("src/main/resources/public")

    } else {

    resources("public")

    }

    }

    Listing 9-5

    Receive app config in createKtorApplication, and load assets directly from the
    file system when running your web app locally

    ```


    This way, Ktor will load your static files directly from your source code when
    you run your web app locally, instead of loading copies from the *build/* folder.


    You could have named this config property something generic, like `isDevMode`,
    and used the concept of “dev mode” to determine what to do. But in my experience,
    more specific config properties are better than general and reusable ones. If
    you use the same config property for multiple different things, you lose the ability
    to have granular control of your web app in different environments. Additionally,
    you’d have to grep your entire code base for `isDevMode` to figure out what it
    does, whereas `useFileSystemAssets` is more descriptive.


    ## Reusable Layouts


    In most web apps, you’re going to need a layout that’s shared across multiple
    routes. A layout adds shared defaults, such as which stylesheet to load on all
    pages, which meta tags to set, a header and a footer, and so on.


    Instead of copy-pasting the same HTML DSL code, you can create a reusable layout
    that you can programmatically reuse in multiple web handlers.


    You’ll also set it up so that it’s completely optional to use the layout in case
    you have routes in your web app where you need full control of the output, without
    forcing a layout on it.'
  trans: '

    ### 提供静态文件服务


    Ktor 内置了对提供静态文件服务的支持。Ktor 可以处理任何静态文件，例如图片、JavaScript 和视频文件，而不仅仅是 CSS 文件。


    要为你的 Web 应用添加静态文件服务功能，需要在 Ktor 配置中添加一个 `static` 路由。代码清单 9-3 演示了如何添加。


    ```

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    resources("public")

    }

    代码清单 9-3

    在 createKtorApplication 中添加静态路由，用于提供文件服务

    ```


    这里，静态路由被设置为处理路径 */*。这意味着 Java 运行时类路径下 *public* 文件夹中的所有文件，都可以通过你嵌入的 Ktor Web 服务器访问。例如，如果你在类路径下有一个文件
    *public/app.css*，你可以通过 *http://localhost:4207/app.css* 访问它。


    在文件系统中存放资源的最佳位置是 *src/main/resources*。你的 Gradle 配置已经将该文件夹下的所有文件添加到了 Java 运行时类路径中。你可以在资源文件夹中随意添加任意数量的子文件夹。*src/main/resources/public*
    下的所有文件都可以在你的 Web 应用中通过对应的路径递归访问。


    现在尝试创建一个 CSS 文件，并在你的 Web 处理器的 HTML 输出中引用它！代码清单 9-4 展示了如何更新代码清单 9-1 中的 HTML 输出，以使用
    `kotlinx.xhtml` DSL 包含一个样式表。


    ```

    get("/html_test") {

    call.respondHtml {

    head {

    title("Hello, World!")

    styleLink("/app.css")

    }

    body {

    h1 { +"Hello, World!" }

    }

    }

    }

    代码清单 9-4

    在 kotlinx.xhtml DSL 中链接 CSS 文件

    ```


    路由本身没有变化，只是在 `head` 块中添加了 `styleLink` 调用。


    这个例子展示了使用 DSL 而非纯 HTML 的好处之一。DSL 提供了便捷的快捷方式，因此你无需记住如何完整地写出一个有效的样式表 `<link>` 标签。（是
    `href="/app.css"` 还是 `src="/app.css"`？是否需要记住设置 `rel="stylesheet"`？等等。）请注意，如果你需要完全控制
    CSS 链接的属性，或者需要将 `<link>` 标签用于其他目的，例如链接到 RSS 源或为多语言网站设置带有 `hrefLang` 的备用 `rel="alternate"`
    链接，也可以使用 `link` DSL 方法。


    重启你的 Web 应用，然后刷新浏览器，你应该会看到你的网站如图 9-3 所示，并且 `app.css` 中的 CSS 样式已生效。在这个例子中，CSS 文件包含
    `body { font-family: sans-serif; font-size: 50px; }`，用于将浏览器的默认字体更改为另一种字体。


    ![](img/531928_1_En_9_Fig3_HTML.png)


    一张网页截图。文本显示为 Hello, world，并带有一个感叹号。


    图 9-3


    应用了 CSS 样式的 HTML 输出


    编写不切实际的 CSS 是轻松验证一切是否正常运作以及你的配置是否正确应用了 CSS 文件的有效方法。我个人喜欢的一个小技巧是使用 `body { background-color;
    red; }`，这在任何平台上的任何浏览器中看起来都会很糟糕。


    ### 即时重载


    这种设置的一个问题是，每次对 CSS 文件进行更改时，都必须重新启动并重新编译你的 Web 应用。


    这是因为 Java 运行时是从类路径加载文件的。而且，当你的 Web 应用在本地运行时，类路径上的实际上并不是 *src/main/resources* 文件夹。作为编译步骤的一部分，Gradle
    会将类路径上的所有内容移动到 *build/* 文件夹中，所有编译后的输出都存放在那里。Gradle 不会编译 *src/main/resources* 中的文件，但会将其复制到
    *build/resources/main*。你的 Web 应用加载的正是这些文件。


    这在生产环境中是可以的，实际上也是推荐的做法。但它并不真正适合开发环境。


    为了解决这个问题，你需要做两件事：添加一个用于切换类路径加载和文件系统加载的配置属性，并设置 Ktor，使其在配置为从文件系统加载时，从 *src/main/resources*
    加载。


    你之前已经添加过配置属性，所以我这里只做总结：在 *app.conf* 中，添加 `useFileSystemAssets = false`。你希望它默认是关闭的，这样就不会在之后意外破坏你的生产环境配置。在
    *app-local.conf* 中，通过设置 `useFileSystemAssets = true` 来启用文件系统加载。然后，用一个新的属性 `val
    useFileSystemAssets: Boolean` 更新 `WebappConfig` 数据类。最后，更新 `createAppConfig`，将
    `useFileSystemAssets` 设置为 `it.getBoolean("useFileSystemAssets")` 的值。


    接下来，你需要更新你在代码清单 9-3 中添加到 Ktor 的 `static` 路由。你还需要更新 `createKtorApplication` 以接收你的应用配置。代码清单
    9-5 展示了如何扩展它，使其在配置为从文件系统加载时从文件系统加载文件，否则像现在一样从类路径加载。


    ```

    fun Application.createKtorApplication(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    // ...

    routing {

    static("/") {

    if (appConfig.useFileSystemAssets) {

    files("src/main/resources/public")

    } else {

    resources("public")

    }

    }

    代码清单 9-5

    在 createKtorApplication 中接收应用配置，并在本地运行 Web 应用时直接从文件系统加载资源

    ```


    这样，当你在本地运行 Web 应用时，Ktor 将直接从你的源代码加载静态文件，而不是从 *build/* 文件夹加载副本。


    你本可以将这个配置属性命名为更通用的名称，比如 `isDevMode`，并使用“开发模式”的概念来决定做什么。但根据我的经验，更具体的配置属性比通用且可复用的属性更好。如果你对多个不同的事情使用同一个配置属性，你将失去在不同环境中对
    Web 应用进行精细控制的能力。此外，你将不得不在整个代码库中搜索 `isDevMode` 来弄清楚它的作用，而 `useFileSystemAssets`
    则更具描述性。


    ## 可复用的布局


    在大多数 Web 应用中，你都需要一个在多个路由之间共享的布局。布局添加了共享的默认设置，例如在所有页面上加载哪个样式表、设置哪些元标签、页眉和页脚等等。


    与其复制粘贴相同的 HTML DSL 代码，你可以创建一个可复用的布局，并在多个 Web 处理器中以编程方式复用它。


    你还需要将其设置为完全可选使用布局，以防你的 Web 应用中有需要完全控制输出、而不希望强制应用布局的路由。

