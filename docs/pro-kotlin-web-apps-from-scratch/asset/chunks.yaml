- fmt: '### Adding Ktor to Your Servlet


    Now that you have a servlet with all the basics like your config and a data source
    available, the next step is to connect your Ktor web app to the servlet.


    Because of the way the Ktor servlet package is structured, some manual work is
    needed. There’s a built-in servlet that mounts a Ktor web app, `io.ktor.server.servlet.ServletApplicationEngine`,
    and that’s the one you’re going to use. But that servlet class is not that flexible,
    and it will by default try to create its own instance of a Ktor application, based
    on loading some default config files and wiring it up internally. You need to
    be able to programmatically pass your instance of a Ktor app that you create with
    `createKtorApplication` from Chapter [2](#531928_1_En_2_Chapter.xhtml). Listing
    [14-4](#531928_1_En_14_Chapter.xhtml#PC5) shows how to set it all up.


    ```

    log.debug("Setting up Ktor servlet environment")

    val appEngineEnvironment = applicationEngineEnvironment {

    module {

    createKtorApplication(appConfig, dataSource)

    }

    }

    val appEnginePipeline = defaultEnginePipeline(

    appEngineEnvironment

    )

    BaseApplicationResponse.setupSendPipeline(

    appEnginePipeline.sendPipeline

    )

    appEngineEnvironment.monitor.subscribe(

    ApplicationStarting

    ) {

    it.receivePipeline.merge(appEnginePipeline.receivePipeline)

    it.sendPipeline.merge(appEnginePipeline.sendPipeline)

    it.receivePipeline.installDefaultTransformations()

    it.sendPipeline.installDefaultTransformations()

    }

    ctx.setAttribute(

    ServletApplicationEngine

    .ApplicationEngineEnvironmentAttributeKey,

    appEngineEnvironment

    )

    log.debug("Setting up Ktor servlet")

    ctx.addServlet(

    "ktorServlet",

    ServletApplicationEngine::class.java

    ).apply {

    addMapping("/")

    }

    Listing 14-4

    Setting up Ktor as a servlet inside contextInitialized

    ```


    Most of this initialization code is based heavily on the existing initialization
    code in Ktor’s built-in `ServletApplicationEngine`, where Ktor tries to create
    its own instance of a Ktor application. The `appEngineEnvironment` and `appEnginePipeline`
    are internal objects that the `ServletApplicationEngine` needs. There’s also some
    required wiring for the `ApplicationStarting` event, and the `ServletApplicationEngine`
    servlet also expects to be able to fetch the `appEngineEnvironment` instance on
    a particular named attribute on the servlet context.


    Hopefully, a future release of the servlet package in Ktor makes it easier to
    pass your own instance of a Ktor application programmatically. For now, though,
    you’ll need the preceding wiring code to make everything work.


    When you have everything set up, you use the standard servlet API to add a servlet
    and add a mapping.


    You’re now set up with a servlet-based version of your Ktor web app! Try to start
    the app, and you should see all your web handlers responding properly, just like
    when you run your old `main` function that starts up Ktor using `embeddedServer`
    and Netty.


    ## Using Spring Security


    You now have the basics up and running, with your Ktor app running as a servlet
    on Jetty. The next step is to add Spring Security to your servlet stack.


    ### Setting Up the Servlet Filter


    The first thing you need to do is to add the required dependencies to `build.gradle.kts`:


    ```

    implementation("org.springframework.security:spring-security-web:5.7.3")

    implementation("org.springframework.security:spring-security-config:5.7.3")

    ```


    Next, you’ll need to wire up Spring Security in your servlet environment. To do
    that, you need three things: a role hierarchy, a Spring Security web application
    context, and a Spring Security filter that’s mapped to your servlet. Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    shows how to set all this up.


    ```

    log.debug("Setting up Spring Security")

    val roleHierarchy = """

    ROLE_ADMIN > ROLE_USER

    """

    val wac = object : AbstractRefreshableWebApplicationContext() {

    override fun loadBeanDefinitions(

    beanFactory: DefaultListableBeanFactory

    ) {

    beanFactory.registerSingleton(

    "dataSource",

    dataSource

    )

    beanFactory.registerSingleton(

    "rememberMeKey",

    "asdf"

    )

    beanFactory.registerSingleton(

    "roleHierarchy",

    RoleHierarchyImpl().apply {

    setHierarchy(roleHierarchy)

    }

    )

    AnnotatedBeanDefinitionReader(beanFactory)

    .register(WebappSecurityConfig::class.java)

    }

    }

    wac.servletContext = ctx

    ctx.addFilter(

    "springSecurityFilterChain",

    DelegatingFilterProxy("springSecurityFilterChain", wac)

    ).apply {

    addMappingForServletNames(null, false, "ktorServlet")

    }

    Listing 14-5

    Setting up Spring Security inside contextInitialized

    ```


    You can set up Spring Security without a role hierarchy, but it’s likely that
    you’re going to need multiple roles, so you might as well set it up right away.


    The web application context is a dependency injection engine where you programmatically
    register singleton beans, meaning hard-coded instances of objects that will be
    dependency injected into your Spring Security config, for use later, when you
    configure authentication and filtering in Spring Security.


    The `"rememberMeKey"` is a secret that Spring Security uses to create a session
    cookie. Instead of hard-coding to `"asdf"`, you should store this as a config
    property. By now, you’ve created several config properties, so you already know
    how to add more. Go ahead and update your config files, your config data class,
    and your config loader code to store the `"rememberMeKey"` there instead!'
