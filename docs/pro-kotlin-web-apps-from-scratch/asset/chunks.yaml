    *   Companion objects in data classes


    *   Generic types in plain Kotlin functions


    Also in this chapter, you will learn the following about querying SQL databases:


    *   How to use SQL directly, instead of a database mapping library


    *   Best practices for executing queries in production-grade web apps


    *   How to structure your web app to get the highest amount of type safety and
    convenience


    *   How to manage transactions


    I’m hard-pressed to think of a web app that doesn’t use a database. There are
    many databases out there, and SQL is not the best fit for all cases. But most
    web apps use SQL databases, so that’s what you’ll learn in this book.


    ## Setting Up Querying


    Building on the connection pool and schema management capabilities of Chapter
    [5](#531928_1_En_5_Chapter.xhtml), you need a few more things to be able to comfortably
    execute queries. In Chapter [5](#531928_1_En_5_Chapter.xhtml), you ran a small
    query using JDBC directly. But the JDBC API is full of boilerplate and is not
    that comfortable to work with. So you need a library to sit between you and JDBC
    and make your life better.'
  trans: '

    ### 可重复迁移


    静态种子数据的一个好去处是*可重复迁移*。这是一种特殊类型的迁移，每次你要求 Flyway 执行迁移时，它都会运行。Flyway 在所有 schema 变更迁移完成后运行它们，因此它们将始终在最新版本的
    schema 上操作。


    可重复迁移与普通迁移类似——它们是一个在你的数据库上执行某些操作的 SQL 文件。要创建可重复迁移，你需将其与普通迁移一起放在 *src/main/resources/db/migration*
    目录下。但文件命名不是 *V{number}__{myFileName).sql*，而是 *R__{myFileName}.sql*。可重复迁移没有版本号，因为
    Flyway 不需要。该迁移始终会运行。


    你还需要确保实际的 SQL 脚本是可重复的。Flyway 在运行可重复迁移时不会做任何智能或神奇的事情。如果你的可重复迁移中充满了 `INSERT INTO`
    语句，那么每次 Flyway 运行你的可重复迁移时，数据库中都会出现重复的行。


    如何处理这个问题因数据库而异。PostgreSQL 有 upsert 语句，Oracle 有 merge 语句，等等。清单 5-13 展示了一个如何在 H2
    中编写 merge 语句的示例，该语句要么插入新行，要么更新现有行，从而使该 SQL 语句可以安全地放入可重复迁移中。


    ```

    MERGE INTO user_t

    (email, password_hash, name, tos_accepted)

    KEY (email)

    VALUES

    (''august@crud.business'', ''456def'', ''August Lilleaas'', true);

    清单 5-13

    一个可以多次运行但只会插入一行的 SQL 语句，使其对于可重复迁移是安全的

    ```


    H2 会检查是否存在具有所提供 email 的行。如果 H2 找不到，它将插入一个新行。如果 H2 找到匹配项，它将更新该行而不是插入新行。


    ### 更新可重复迁移


    在 Flyway 运行之后，你不能更改普通的版本化迁移。但你可以随意更改可重复迁移。并且每次运行迁移时，Flyway 都会运行最新的更新版本。


    可重复迁移的全部意义在于，它包含将数据库置于所需状态的 SQL 语句。这个所需状态可能会（并且很可能会）随时间变化。因此，你可以更新你的可重复迁移，Flyway
    将运行最新版本，确保你的数据库始终与你的 Web 应用所需的最新种子数据保持同步。


    请注意，如果你删除了一个 SQL 语句，Flyway 不会尝试智能地删除可重复迁移中不再存在的数据。如何解决这个问题取决于你。如果需要，你可以自由地在可重复迁移中添加
    `DELETE` 语句。或者，你也可以直接删除插入数据的语句，并手动删除数据。


    ## 处理失败的迁移


    尽管你尽了最大努力，迁移在生产环境中仍然可能并且确实会失败。希望这种情况很少发生。但当它们发生时，你需要知道如何处理。


    ### 本地迁移失败


    如果迁移在本地失败，你有更多的选择。本地开发环境中的数据对任何人来说都不是关键性的，并且是（或者应该是）完全可有可无的。


    当迁移在本地失败时，我通常的做法是直接清除整个本地数据库并创建一个新的。当你使用 H2 时，只需删除 *build/* 文件夹中的数据库文件即可，即 *build/local.mv.db*
    和 *build/local.trace.db*。


    你系统中的所有核心数据都应该放在可重复迁移中，如果你重启 Web 应用，迁移将从头开始运行，并创建一个包含你使用 Web 应用所需的所有表和数据的新数据库。


    ### 生产环境迁移失败


    如果迁移在生产环境中失败，你需要更加谨慎地处理问题。


    理想情况下，你失败的迁移是向后兼容的。因此，即使它失败了，并且最新版本的代码没有部署，现在仍在生产环境中的先前版本的代码也能正常工作。


    如果它不是向后兼容的，你可能已经额头冒汗、心跳加速了，因为生产环境现在*宕机*了，而你是罪魁祸首。


    我不会深入讨论修复损坏的迁移所需执行的具体操作类型。修复它需要做什么完全取决于你的业务逻辑、迁移的内容以及错误发生在迁移的哪个步骤。


    ### 重新运行失败的迁移


    通常，有两种解决方法。第一种是让 Flyway 相信它从未尝试执行新的迁移。


    第一步是通过手动向数据库输入 SQL 命令，对数据库进行任何必要的手动更改。然后，对失败的迁移文件进行任何必要的更改。


    完成后，重启你的 Web 应用，这将使 Flyway 再次运行失败的迁移。


    要让 Flyway 相信迁移从未运行过，你需要更新 Flyway 用于记账的 `flyway_schema_history` 表（在清单 5-6 中配置）。假设失败的迁移是
    *V5*，你可以运行 `DELETE FROM flyway_schema_history WHERE version = 5`，以便下次启动 Web 应用时让
    Flyway 从头开始重新运行该迁移。


    ### 手动执行迁移


    解决失败迁移的第二种方法是完全手动完成迁移，并让 Flyway 相信迁移已经运行。


    第一步是手动对你的数据库运行 SQL 命令，使数据库达到理想状态。确保你真正考虑清楚了你正在做的事情，并仔细编写你的 SQL，因为你的数据库最终可能处于与
    Flyway 迁移指定的状态不同的状态。


    要让 Flyway 相信迁移已成功执行，你需要更新 `flyway_schema_history` 表并将该迁移标记为成功。假设失败的迁移仍然是 *v5*，你可以运行
    `UPDATE flyway_schema_history SET success = true WHERE version = 5`。


    下次运行你的 Web 应用时，Flyway 将看到根据其自己的表，迁移是成功的，因此它不会尝试重新运行它。


    # 6. 查询 SQL 数据库


    在第 5 章中，你设置了一个用于管理数据库连接的数据源，并配置了 Flyway 来管理你的数据库 schema，这样你就拥有了一些可以执行查询的表。在本章中，你将学习如何执行这些查询。


    如果你是 Kotlin 新手，以下是本章示例中会用到的一些语言特性：


    *   动态数据的空安全转换和类型检查


    *   数据类中的伴生对象


    *   普通 Kotlin 函数中的泛型类型


    同样在本章中，你将学习以下关于查询 SQL 数据库的内容：


    *   如何直接使用 SQL，而不是使用数据库映射库


    *   在生产级 Web 应用中执行查询的最佳实践


    *   如何构建你的 Web 应用以获得最高程度的类型安全性和便利性


    *   如何管理事务


    我很难想象一个不使用数据库的 Web 应用。市面上有很多数据库，SQL 并非在所有情况下都是最佳选择。但大多数 Web 应用都使用 SQL 数据库，因此这就是你将在本书中学到的内容。


    ## 设置查询


    在第 5 章的连接池和 schema 管理能力的基础上，你还需要一些东西才能舒适地执行查询。在第 5 章中，你直接使用 JDBC 运行了一个小查询。但是 JDBC
    API 充满了样板代码，使用起来并不那么舒适。因此，你需要一个位于你和 JDBC 之间的库，让你的工作更轻松。

