    # 16. Kotlin 技巧集锦


    在前面的章节中，你通过实现一个生产级 Web 应用，已经学到了许多巧妙的 Kotlin 技巧。在本章中，你将学习一些我尚未提及的、更巧妙的 Kotlin 技巧。


    这些技巧中，许多对库作者来说比 Web 应用构建者更有用。事实上，大多数库很可能都会用到本章提到的大部分概念。但了解这些概念仍然是有益的。你最终可能会需要调试库代码，而了解你所看到的内容总是好的。而且，世事难料！也许当你在为自己的
    Web 应用编写工具函数和辅助函数时，会发现本章中的 Kotlin 技巧大有用武之地。


    ## 委托（by lazy）


    惰性委托允许你延迟对值和属性的昂贵计算，但访问它们时，却如同访问其他普通属性一样。


    在你本书构建的 Web 应用中，并没有哪些初始化过于急切、能从惰性初始化中受益的昂贵资源。对于 Web 应用后端来说，拥有有状态组件并不常见，因为状态通常存在于数据库和队列中。因此，为了演示惰性初始化，我们将看一个假设的例子。


    惰性委托的一个用例是那些计算昂贵资源且结果不会随时间变化的方法。与其写成：


    ```

    class Foo(val myInput: String) {

    fun getExpensiveThing() =

    useLotsOfCpu(myInput)

    }

    ```


    不如将其改写为惰性委托：


    ```

    class Foo(val myInput: String) {

    val expensiveThing: String by lazy {

    useLotsOfCpu(myInput)

    }

    }

    ```


    使用 `by lazy` 进行委托的好处在于，lambda 表达式只会在第一次调用时执行一次，而方法则会在每次调用时都执行耗 CPU 的代码。


    你还可以控制 Kotlin 如何管理来自多个线程对惰性属性的并行访问。你可以在三种线程安全模式中选择：


    *   `NONE`：线程之间无同步。如果多个线程在属性尚未初始化时同时尝试访问它，其行为是未定义的。

    *   `PUBLICATION`：允许多个计算并行运行，但会使用第一个成功完成的计算结果。此后的进一步调用不会导致计算再次执行。

    *   `SYNCHRONIZED`：通过锁保护计算，确保其只运行一次。同时发生的调用会等待第一个调用完成。


    默认模式是 `SYNCHRONIZED`。


    委托是 Kotlin 中一个深奥的主题，你可以用它做很多事情，不仅仅是惰性初始化。例如，你可以将类委托给一个对象实例，从而有效地从一个实例继承类，而不是进行子类化。你可以在官方
    Kotlin 文档中阅读更多相关内容：[*https://kotlinlang.org/docs/delegated-properties.xhtml*](https://kotlinlang.org/docs/delegated-properties.xhtml)。


    ## 内联函数


    你可以通过创建*内联函数*，使 Kotlin 中的函数实现零开销。


    内联函数还有一个好处，即它们不会以任何方式改变调用上下文。一个很好的例子是你在本书中使用的 SQL 库 Kotliquery 中的 `transaction`
    函数。事实上，正是笔者向 Kotliquery 提交的、在第 6 章中提到的拉取请求（[*https://github.com/seratch/kotliquery/pull/57*](https://github.com/seratch/kotliquery/pull/57)），将
    `transaction` 函数改成了内联函数。清单 16-1 展示了该函数实现的大致轮廓。


    ```

    fun  Session.transaction(

    block: (TransactionalSession) -> A

    ): A {

    try {

    connection.begin()

    return block(TransactionalSession(connection)).also {

    connection.commit()

    }

    } catch (e: Exception) {

    connection.rollback()

    throw e

    }

    }

    清单 16-1

    Kotliquery 中 transaction 函数实现的大致轮廓

    ```


    这段代码运行良好，但有一个问题：事务块内部的代码会破坏协程上下文。Kotlin 无法静态地知道一个函数如何使用你传递给它的 lambda。因此，Kotlin
    不能假设一个函数会内联地调用与其声明上下文相同的 lambda。以下代码会出错：


    ```

    runBlocking {

    dbSess.transaction { txSess ->

    delay(1)

    txSess.run(...)

    }

    }

    ```


    这个问题的解决方案是将函数标记为内联。这样 Kotlin 就知道该函数也会内联地调用 lambda。可以编写不内联调用 lambda 的内联函数，但如果出现这种情况，你需要显式地用
    `noinline` 或 `crossinline` 标记 lambda。


    通过在 Kotliquery 的 `transaction` 函数中添加 `inline` 关键字（`inline fun <A> Session.transaction(...`），代码就能正常运行，因为
    Kotlin 编译器会像处理 lambda 外部的代码一样，处理传递给 `transaction` 的 lambda 中的代码。


    内置的作用域函数，如 `apply`、`with`、`also` 等，都是内联函数。这就是为什么它们也能在任何上下文中工作，并且不会因为表达性或性能而带来任何编译时或运行时的开销。


    ## 具体化泛型


    具体化泛型（或具体化类型参数）解决了 Java 平台上一个常见的陷阱：泛型类型仅在编译时存在。这通常被称为*类型擦除*，在编译后的字节码中不会留下泛型类型的任何痕迹。因此，如果你有一个
    `List<String>`，所有字节码和 Java 运行时只知道它是一个 `List`。检查其元素是否为字符串的类型检查，是在编译器生成最终输出之前的编译阶段完成的。


    Kotlin 无法神奇地绕过 Java 平台的限制。但 Kotlin 确实有一个解决方案。关键在于内联函数，并且你只能在内联函数中使用具体化泛型。


    编译器会从编译输出中移除（*内联*）内联函数。Kotlin 编译器会将函数体复制到你代码中调用它的每个位置。这意味着它可以用调用函数时传递的实际类型来替换泛型类型。因此，对于内联函数来说，具体化的泛型类型只是一个快捷方式，用于将那段代码手动复制到所有调用它的地方，并用调用点使用的实际类型替换泛型。


    例如，假设你想编写一个辅助函数，它接收一个 JSON 字符串并将其序列化为正确的类型。清单 16-2 展示了你可以如何尝试实现它。


    ```

    fun  serializeJson(json: String): T =

    Gson().fromJson(json, T::class.java)

    清单 16-2

    尝试为 JSON 序列化编写辅助函数

    ```


    然而，这段代码无法编译。这是因为类型擦除。当这段代码运行时，`T` 的类型信息就丢失了。因此，`serializeJson` 无法知道 `T` 的类型是什么。


    但是，如果你将其编写为一个带有具体化泛型的内联函数，编译器就拥有了使其工作所需的一切信息。清单 16-3 展示了其工作原理。


    ```

    inline fun  serializeJson(json: String): T =

    Gson().fromJson(json, T::class.java)

    清单 16-3

    使用具体化泛型为 JSON 序列化编写辅助函数

    ```


    代码是相同的，除了 `inline` 和 `reified` 关键字。由于编译器内联了该函数，它就知道泛型的类型是什么，因为 Kotlin 在编译时（而非运行时）解析内联函数的类型。

    '
- fmt: "# Contracts\n\nHave you ever wondered how Kotlin is able to do this?\n\n```\n\
    val foo: MyFoo? = createFoo()\nassertNotNull(foo)\nfoo.doSomething()\n```\n\n\
    If you look carefully at this code, there’s something weird going on. The type\
    \ of `foo` is `MyFoo?`, which means it can be `null`. But you’re still able to\
    \ call `foo.doSomething()` without checking that `foo` is null. Calling a method\
    \ on a nullable type is supposed to cause a compile error for null safety! What\
    \ is this sorcery?\n\nThis is because `assertNotNull` implements a *contract*.\n\
    \nThis is what `assertNotNull` looks like without a contract:\n\n```\nfun <T>\
    \ assertNotNull(\n    actual: T?,\n    message: String? = null\n): T {\n    asserter.assertNotNull(message,\
    \ actual)\n    return actual!!\n}\n```\n\nThis works fine and returns a non-null\
    \ type. If the value is `null`, you’ll get a `NullPointerException` from the non-null\
    \ assertion operator (`!!`). But that does not solve the mystery. We don’t use\
    \ the return value from `assertNotNull`, so it does not matter to our program\
    \ that `assertNotNull` throws an exception if you pass null to it and return a\
    \ non-null type.\n\nThe actual implementation of `assertNotNull` looks like this:\n\
    \n```\nfun <T> assertNotNull(\n    actual: T?,\n    message: String? = null\n\
    ): T {\n    contract { returns() implies (actual != null) }\n    asserter.assertNotNull(message,\
    \ actual)\n    return actual!!\n}\n```\n\nNotice the added `contract` line. Contracts\
    \ are ways of telling the type system about things it cannot infer on its own,\
    \ but are nevertheless true statements. Technically speaking, it’s possible to\
    \ make a contract that doesn’t hold true in the implementation. But when used\
    \ correctly, contracts are powerful additions to the type system that enable third-party\
    \ libraries, such as the assertion library in `kotlin.test`, to extend the built-in\
    \ type checks.\n\nThe specific contract used here says that if the function returns\
    \ a value (i.e., it does not throw an exception), it implies that the argument\
    \ `actual` is non-null. Then, the Kotlin type system can smart cast the type `MyFoo?`\
    \ to `MyFoo`. You’ve already seen smart casting by checking for null in `if` statements,\
    \ and contracts allows third-party functions to do the same.\n\nNote that contracts\
    \ are an experimental API. This means that it’s subject to change in the future,\
    \ and you must explicitly opt in to use them, using `@OptIn(ExperimentalStdlibApi::class)`.\
    \ The opting in is there so that you don’t accidentally use unstable APIs that\
    \ might break in future Kotlin releases and keeps your code future-proof.\n\n\
    ## And So Much More\n\nThe Kotlin language is full of tricks and constructs to\
    \ make your life better. So why is this chapter so short?\n\nI’ve worked hard\
    \ to include as many Kotlin tricks as possible embedded in the rest of the book.\
    \ This chapter only contains things that I believe are important, or at least\
    \ interesting, for web app developers that I didn’t get to cover as a part of\
    \ a chapter about building actual web app functionality.\n\nIn Chapter [3](#531928_1_En_3_Chapter.xhtml),\
    \ you learned about data classes, scope functions, nullability and null safety,\
    \ and the Elvis operator. In Chapter [4](#531928_1_En_4_Chapter.xhtml), you learned\
    \ about sealed classes, function types, destructuring, and extension functions.\
    \ In Chapter [5](#531928_1_En_5_Chapter.xhtml), you learned about function references\
    \ and the `use` scope function on closeable objects. In Chapter [6](#531928_1_En_6_Chapter.xhtml),\
    \ you learned about smart casting of nullable types, companion objects, and generics\
    \ in plain Kotlin functions. In Chapter [7](#531928_1_En_7_Chapter.xhtml), you\
    \ learned about the unsafe cast operator and inline functions. In Chapter [8](#531928_1_En_8_Chapter.xhtml),\
    \ you learned pretty much all there is to know about the usage and internals of\
    \ coroutines. In Chapter [9](#531928_1_En_9_Chapter.xhtml), you learned about\
    \ the safe call operator, operator overloading, DSLs, object expressions, and\
    \ some vital details of precedence rules of extension functions and default receivers.\
    \ In Chapter [13](#531928_1_En_13_Chapter.xhtml), you learned about null safety\
    \ with `lateinit` and using lambdas in place of object literals.\n\nAll these\
    \ tricks are good candidates for this chapter. But I’ve already covered them,\
    \ so there’s no need to repeat them all here.\n\nIf you want to dig deep into\
    \ everything Kotlin has to offer, check out Tim Lavers’ book *Learn to Program\
    \ with Kotlin* (Apress, 2021), the official Kotlin documentation ([*https://kotlinlang.org/docs/home.xhtml*](https://kotlinlang.org/docs/home.xhtml)),\
    \ and the many courses, resources, and books that you can find on the Internet\
    \ at large.\n\nThere are many facets to the Kotlin language, and there are more\
    \ language features to mention that I haven’t mentioned in this book. But when\
    \ you’re learning to build pro Kotlin web apps from scratch, the focus should\
    \ be on the language features that are useful for delivering real-world value.\
    \ And that’s what I believe this book has achieved."
  raw: '## Contracts


    Have you ever wondered how Kotlin is able to do this?


    ```

    val foo: MyFoo? = createFoo()

    assertNotNull(foo)

    foo.doSomething()

    ```


    If you look carefully at this code, there’s something weird going on. The type
    of foo is `MyFoo?`, which means it can be `null`. But you’re still able to call
    `foo.doSomething()` without checking that foo is null. Calling a method on a nullable
    type is supposed to cause a compile error for null safety! What is this sorcery?


    This is because `assertNotNull` implements a *contract*.


    This is what `assertNotNull` looks like without a contract:


    ```

    fun  assertNotNull(

    actual: T?,

    message: String? = null

    ): T {

    asserter.assertNotNull(message, actual)

    return actual!!

    }

    ```


    This works fine and returns a non-null type. If the value is `null`, you’ll get
    a `NullPointerException` from the non-null assertion operator (`!!`). But that
    does not solve the mystery. We don’t use the return value from `assertNotNull`,
    so it does not matter to our program that `assertNotNull` throws an exception
    if you pass null to it and return a non-null type.


    The actual implementation of `assertNotNull` looks like this:


    ```

    fun  assertNotNull(

    actual: T?,

    message: String? = null

    ): T {

    contract { returns() implies (actual != null) }

    asserter.assertNotNull(message, actual)

    return actual!!

    }

    ```


    Notice the added `contract` line. Contracts are ways of telling the type system
    about things it cannot infer on its own, but are nevertheless true statements.
    Technically speaking, it’s possible to make a contract that doesn’t hold true
    in the implementation. But when used correctly, contracts are powerful additions
    to the type system that enable third-party libraries, such as the assertion library
    in `kotlin.test`, to extend the built-in type checks.


    The specific contract used here says that if the function returns a value (i.e.,
    it does not throw an exception), it implies that the argument `actual` is non-null.
    Then, the Kotlin type system can smart cast the type `MyFoo?` to `MyFoo`. You’ve
    already seen smart casting by checking for null in if statements, and contracts
    allows third-party functions to do the same.


    Note that contracts are an experimental API. This means that it’s subject to change
    in the future, and you must explicitly opt in to use them, using `@OptIn(ExperimentalStdlibApi::class)`.
    The opting in is there so that you don’t accidentally use unstable APIs that might
    break in future Kotlin releases and keeps your code future-proof.


    ## And So Much More


    The Kotlin language is full of tricks and constructs to make your life better.
    So why is this chapter so short?


    I’ve worked hard to include as many Kotlin tricks as possible embedded in the
    rest of the book. This chapter only contains things that I believe are important,
    or at least interesting, for web app developers that I didn’t get to cover as
    a part of a chapter about building actual web app functionality.


    In Chapter [3](#531928_1_En_3_Chapter.xhtml), you learned about data classes,
    scope functions, nullability and null safety, and the Elvis operator. In Chapter
    [4](#531928_1_En_4_Chapter.xhtml), you learned about sealed classes, function
    types, destructuring, and extension functions. In Chapter [5](#531928_1_En_5_Chapter.xhtml),
    you learned about function references and the `use` scope function on closeable
    objects. In Chapter [6](#531928_1_En_6_Chapter.xhtml), you learned about smart
    casting of nullable types, companion objects, and generics in plain Kotlin functions.
    In Chapter [7](#531928_1_En_7_Chapter.xhtml), you learned about the unsafe cast
    operator and inline functions. In Chapter [8](#531928_1_En_8_Chapter.xhtml), you
    learned pretty much all there is to know about the usage and internals of coroutines.
    In Chapter [9](#531928_1_En_9_Chapter.xhtml), you learned about the safe call
    operator, operator overloading, DSLs, object expressions, and some vital details
    of precedence rules of extension functions and default receivers. In Chapter [13](#531928_1_En_13_Chapter.xhtml),
    you learned about null safety with `lateinit` and using lambdas in place of object
    literals.


    All these tricks are good candidates for this chapter. But I’ve already covered
    them, so there’s no need to repeat them all here.


    If you want to dig deep into everything Kotlin has to offer, check out Tim Lavers’
    book *Learn to Program with Kotlin* (Apress, 2021), the official Kotlin documentation
    ([*https://kotlinlang.org/docs/home.xhtml*](https://kotlinlang.org/docs/home.xhtml)),
    and the many courses, resources, and books that you can find on the Internet at
    large.


    There are many facets to the Kotlin language, and there are more language features
    to mention that I haven’t mentioned in this book. But when you’re learning to
    build pro Kotlin web apps from scratch, the focus should be on the language features
    that are useful for delivering real-world value. And that’s what I believe this
    book has achieved.'
  trans: "\n## 契约\n\n你是否曾好奇 Kotlin 是如何做到这一点的？\n\n```\nval foo: MyFoo? = createFoo()\n\
    assertNotNull(foo)\nfoo.doSomething()\n```\n\n如果你仔细审视这段代码，会发现一些奇怪的地方。`foo` 的类型是\
    \ `MyFoo?`，这意味着它可以是 `null`。但你仍然可以在不检查 `foo` 是否为 null 的情况下调用 `foo.doSomething()`。在可空类型上调用方法本应因空安全而引发编译错误！这是什么魔法？\n\
    \n这是因为 `assertNotNull` 实现了一个*契约*。\n\n这是没有契约的 `assertNotNull` 的样子：\n\n```\nfun\
    \ <T> assertNotNull(\n    actual: T?,\n    message: String? = null\n): T {\n \
    \   asserter.assertNotNull(message, actual)\n    return actual!!\n}\n```\n\n这段代码运行良好，并返回一个非空类型。如果值为\
    \ `null`，你会从非空断言运算符（`!!`）得到一个 `NullPointerException`。但这并没有解开谜团。我们没有使用 `assertNotNull`\
    \ 的返回值，所以即使 `assertNotNull` 在传入 null 时抛出异常并返回非空类型，对我们的程序来说也无关紧要。\n\n`assertNotNull`\
    \ 的实际实现如下：\n\n```\nfun <T> assertNotNull(\n    actual: T?,\n    message: String?\
    \ = null\n): T {\n    contract { returns() implies (actual != null) }\n    asserter.assertNotNull(message,\
    \ actual)\n    return actual!!\n}\n```\n\n注意新增的 `contract` 这一行。契约是一种告诉类型系统那些它无法自行推断、但却是真实陈述的方式。从技术上讲，可以创建一个在实现中不成立的契约。但如果正确使用，契约是对类型系统的强大补充，它使得第三方库（例如\
    \ `kotlin.test` 中的断言库）能够扩展内置的类型检查。\n\n这里使用的特定契约表明：如果函数返回了一个值（即没有抛出异常），则意味着参数 `actual`\
    \ 是非空的。然后，Kotlin 类型系统就可以将类型 `MyFoo?` 智能转换为 `MyFoo`。你已经见过在 if 语句中通过检查 null 来进行智能转换，而契约允许第三方函数实现同样的效果。\n\
    \n请注意，契约是一个实验性 API。这意味着它将来可能会发生变化，并且你必须使用 `@OptIn(ExperimentalStdlibApi::class)`\
    \ 显式选择启用才能使用它们。这种选择启用机制是为了防止你意外使用不稳定的 API，这些 API 可能会在未来的 Kotlin 版本中发生变更，从而确保你的代码面向未来。\n\
    \n## 远不止于此\n\nKotlin 语言充满了各种技巧和构造，旨在让你的开发生活更美好。那么，为什么这一章这么短呢？\n\n我努力将尽可能多的 Kotlin\
    \ 技巧融入本书的其他章节中。本章只包含我认为对 Web 应用开发者来说重要或至少有趣的内容，而这些内容我未能在关于构建实际 Web 应用功能的章节中涵盖。\n\
    \n在第 3 章中，你学习了数据类、作用域函数、可空性与空安全以及 Elvis 运算符。在第 4 章中，你学习了密封类、函数类型、解构和扩展函数。在第 5\
    \ 章中，你学习了函数引用以及可关闭对象上的 `use` 作用域函数。在第 6 章中，你学习了可空类型的智能转换、伴生对象以及普通 Kotlin 函数中的泛型。在第\
    \ 7 章中，你学习了不安全转换运算符和内联函数。在第 8 章中，你几乎学习了关于协程用法和内部机制的所有知识。在第 9 章中，你学习了安全调用运算符、运算符重载、DSL、对象表达式以及扩展函数和默认接收者的优先级规则的一些关键细节。在第\
    \ 13 章中，你学习了使用 `lateinit` 实现空安全以及使用 lambda 代替对象字面量。\n\n所有这些技巧都是本章的绝佳候选内容。但我已经介绍过它们了，所以没有必要在此重复。\n\
    \n如果你想深入探索 Kotlin 提供的所有功能，请查阅 Tim Lavers 的著作 *Learn to Program with Kotlin*（Apress,\
    \ 2021）、官方 Kotlin 文档（[*https://kotlinlang.org/docs/home.xhtml*](https://kotlinlang.org/docs/home.xhtml)）以及你在互联网上能找到的众多课程、资源和书籍。\n\
    \nKotlin 语言有很多方面，还有很多我在这本书中没有提及的语言特性。但是，当你学习从头开始构建专业的 Kotlin Web 应用时，重点应该放在那些有助于交付实际价值的语言特性上。而我相信这正是本书所实现的。\n"
