    \ Jooby 替代 Ktor。但在本书的其余部分，你编写的所有代码都将使用 Ktor。\n\nKtor 是 Kotlin 中最流行的 Web 应用路由库之一。它拥有构建生产级\
    \ Web 应用所需的一切，并且是用 Kotlin 编写的，因此使用起来既方便又强大，并能充分利用 Kotlin 为构建 Web 应用提供的所有相关特性。它还旨在实现高度可扩展和高性能，并已在大量真实世界的\
    \ Web 应用中经过实战检验。\n\n最重要的是，Ktor 是一个库，而不是框架。像 Spring Boot 这样的框架通常会自动启动 Web 服务器，并使用控制反转在数万行框架代码的深处调用你的代码。本书的重点是学习如何从头开始，亲手完成所有工作。\n\
    \n有趣的是，Ktor 将自己标榜为框架。对于库与框架的定义，并没有广泛接受的标准。我在本书中使用的定义是：框架会自动且隐式地为你做事，而库则在你明确指示之前不会做任何事情。Ktor\
    \ 恰好符合这个库的定义。\n\n### 添加 Ktor 库\n\n在 *build.gradle.kts* 的 `dependencies` 块中，将 Ktor\
    \ 添加为依赖项。Ktor 需要两个依赖项才能工作：服务器核心和特定的服务器实现（此处为 Netty）：\n\n```\ndependencies {\n\
    implementation(\"io.ktor:ktor-server-core:2.1.2\")\nimplementation(\"io.ktor:ktor-server-netty:2.1.2\"\
    )\n}\n```\n\n提示\n\n更新 `build.gradle.kts` 后，记得在 IntelliJ 中刷新 Gradle 项目。使用当 Gradle\
    \ 尚未刷新更改时出现的小弹出窗口，或打开 Gradle 选项卡并点击刷新按钮。\n\nGradle 会自动下载这些依赖项，并使它们可用于你的代码。\n"
- fmt: '### Start a Web Server


    You’ll start the web server manually in the application entry point – the `main`
    function. Instead of just printing “Hello, World!”, you’ll change it to start
    a Ktor web server.


    In Listing [2-1](#531928_1_En_2_Chapter.xhtml#PC2), you can see the full working
    `main` function needed to start it all up.


    ```

    package kotlinbook

    import io.ktor.server.application.*

    import io.ktor.server.engine.*

    import io.ktor.server.netty.*

    import io.ktor.server.response.*

    import io.ktor.server.routing.*

    fun main() {

    embeddedServer(Netty, port = 4207) {

    routing {

    get("/") {

    call.respondText("Hello, World!")

    }

    }

    }.start(wait = true)

    }

    Listing 2-1

    Start a web server in the application main function at src/main/kotlinbook/Main.kt

    ```


    The code is plain and straightforward. You create an embedded Ktor server that
    is using Netty for the server implementation under the hood and starts at port
    4207. You set up routing, which means HTTP verb and path matching. Each route
    has an implementation that generates a HTTP response. And finally, you start the
    embedded server.


    You don’t need to manually write the `import` statements. For example, when you
    write `embeddedSe` and pause, IntelliJ IDEA will suggest `embeddedServer`. If
    you choose the auto-completion from the dropdown, IntelliJ IDEA will also add
    an `import` statement.


    For clarity, the code in Listing [2-1](#531928_1_En_2_Chapter.xhtml#PC2) contains
    all the `import` statements needed to make the code compile. For the remainder
    of this book, I’ll omit them unless there are ambiguities (e.g., when there are
    two extension functions available with the same name, but in different packages.)


    **Tip**


    Embedding a HTTP server is standard practice on the Java platform, even if you
    use a framework. A proxy such as Nginx or a cloud service like Azure Web Apps
    or Amazon Application Load Balancer will sit in front of the embedded HTTP server
    in your application and take care of SSL, load balancing, and other web server
    tasks. In Chapter [14](#531928_1_En_14_Chapter.xhtml) you will learn how to build
    a servlet-style WAR file that doesn’t start its own server but is embedded into
    an application server container such as Tomcat.


    ### Extracting to a Separate Function


    Extracting your routes to a separate function is not strictly necessary at this
    point. But later in the book, you’ll use your Ktor routing definitions in multiple
    separate places. So you need to have it available as a separate function that
    you can call from anywhere, instead of locking it into the `embeddedServer` call.


    It’s also common to separate the Ktor server configuration to a separate function
    in open source apps and in the Ktor documentation itself, so it’s nice to follow
    the conventions in your own web app to make your code more readable.


    Listing [2-2](#531928_1_En_2_Chapter.xhtml#PC3) shows how to set this up.


    ```

    fun main() {

    embeddedServer(Netty, port = 4207) {

    createKtorApplication()

    }.start(wait = true)

    }

    fun Application.createKtorApplication() {

    routing {

    get("/") {

    call.respondText("Hello, World!")

    }

    }

    }

    Listing 2-2

    Configuring Ktor in a separate isolated function

    ```


    The function `createKtorApplication` is an extension function. You’ll learn more
    about those in Chapter [3](#531928_1_En_3_Chapter.xhtml), but the gist of it is
    that the `"this"` inside the `embeddedServer` lambda is an instance of `io.ktor.server.application.Application`.
    And by making `createKtorApplication()` an extension function of `Application`,
    it will have the same `"this"` available when it’s a separate function, as when
    it’s in-line inside the `embeddedServer` lambda.


    ### Using Lambdas


    Lambdas are everywhere in Kotlin. In fact, you’ve already written a few of them.
    The functions `embeddedServer`, `routing`, and `get` all take lambdas as arguments.


    Lambdas are blocks of code, just like functions. They are created using curly
    brackets, `{` and `}`. The main difference between lambdas and regular functions
    is that a lambda does not have a name, but a function does.


    **Tip**


    Another name for lambdas is *anonymous functions*. There are a few differences
    in syntax between lambdas and functions (you’ll see more about that throughout
    the book), but logically they are identical.


    There’s a convention in Kotlin for functions that take a lambda as their last
    argument. Let’s look at the function `get` to demonstrate. It takes two arguments:
    a string, denoting the path that triggers the route, and a lambda, which holds
    the code that should execute when the web app handles a request at that path.
    One way of calling `get` would be like this:


    ```

    get("/", { ... })

    ```


    Because it’s so common in Kotlin for functions to take a lambda as their last
    argument, there’s a more convenient way to pass them to functions. Instead of
    placing the lambda inside the parentheses of the function, you can place it after:


    ```

    get("/") { ... }

    ```


    This is particularly useful for functions that *only* take a lambda. An example
    of this is the `routing` function. It’s nice to be able to skip the parentheses
    entirely.


    It’s common for Kotlin programmers to put the lambda outside the parentheses.
    In fact, IntelliJ IDEA will out of the box show a warning if you put a tailing
    lambda inside of the parentheses. You can disable this warning if you want to,
    but it’s a good idea to follow this convention if you want to make your code as
    readable as possible to other programmers.


    ### Named Arguments Instead of Magic Numbers and Booleans


    The function `start()` takes a Boolean as its only argument. The function `embeddedServer()`
    takes the port number that the server should use. You can call both like this:


    ```

    embeddedServer(Netty, 4207) {

    createKtorApplication()

    }.start(true)

    ```


    A common name for Booleans and numbers passed to functions in this manner is *magic
    Booleans* and *magic numbers*. It’s not immediately obvious to the reader what
    a Boolean means when it’s passed to the function `start()` and what a number means
    in the second argument passed to `embeddedServer()`.


    To make it easier to understand what these numbers and Booleans mean, you can
    pass them as *named arguments* instead:


    ```

    embeddedServer(Netty, port = 4207) {

    createKtorApplication()

    }.start(wait = true)

    ```


    You can’t name it anything you want. It must be the same as the name of the argument
    in the implementation of the function.


    ### Run Your Web App


    Run your application with IntelliJ IDEA or Gradle. Open *http://localhost:4207*
    in your browser, and you’ll be politely greeted by your code. You should see results
    like those in Figure [2-1](#531928_1_En_2_Chapter.xhtml#Fig1). Behold! You have
    a working web app.


    ![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig1_HTML.png)


    A screenshot of a localhost webpage. The text reads Hello world!


    Figure 2-1


    Your web app is up and running and responding to the port defined in your code


    ## Logging


    High-quality logging is a vital component of production-grade web apps. It can
    make or break your ability to find out what happened when errors happen in production.


    When you run your application, the console prints the error messages shown in
    Figure [2-2](#531928_1_En_2_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_2_Chapter/531928_1_En_2_Fig2_HTML.png)


    A screenshot of a window titled kotlinbook- main.kt. The options .gradle and build
    are highlighted under kotlin-book. On the right, 8 lines of code are observed.
    Below, under MainKt, 4 lines are exhibited.


    Figure 2-2


    SLF4J issues an error message when your application runs


    In this section, you’ll learn about logging and configure your application to
    output useful information from third-party code, as well as logging from your
    own code.'
