    To make the TDD pattern easy to recognize, you’ll do another TDD cycle by adding
    a function to get a user by its ID.


    The first step is to write a failing test and an empty initial implementation.
    Without the empty implementation, your test code simply won’t compile, so you’re
    not actually testing your test that way. Listing [7-14](#531928_1_En_7_Chapter.xhtml#PC16)
    shows the test as well as the empty implementation.


    ```

    // Code

    fun getUser(dbSess: Session, id: Long): User? {

    return null

    }

    // Test

    @Test

    fun testGetUser() {

    testTx { dbSess ->

    val userId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234",

    tosAccepted = true

    )

    assertNull(getUser(dbSess, -9000))

    val user = getUser(dbSess, userId)

    assertNotNull(user)

    assertEquals(user.email, "augustlilleaas@me.com")

    }

    }

    Listing 7-14

    A failing test with an empty implementation

    ```


    Make sure you put the code somewhere in `src/main/kotlin/kotlinbook` and the test
    in `src/test/kotlin/kotlinbook/UserTest.kt`.


    This test will fail. The initial `assertNull` will run successfully. You don’t
    have a user with the ID `-9000` in your system. In fact, you’ll never have users
    with negative IDs. So this test successfully verifies that calling `getUser` with
    a nonexisting user returns null. But the later `assertNotNull` will fail. Your
    end goal is for that test to pass successfully, as the user ID returned by `createUser`
    should always correspond with a user fetched by `getUser`. But `getUser` is currently
    hard-coded to return `null`.


    ### Making the Test Pass


    To make the test pass, you’ll need to implement the `getUser` function.


    You already have all the facilities you need to implement it. You’ve set up Kotliquery
    to run queries, your test passes a Kotliquery session to `getUser`, and you have
    a data class with mapping from table data to the `User?` type that `getUser` returns.
    Listing [7-15](#531928_1_En_7_Chapter.xhtml#PC17) shows how to implement it correctly.


    ```

    fun getUser(dbSess: Session, id: Long): User? {

    return dbSess

    .single(

    queryOf("SELECT * FROM user_t WHERE id = ?", id),

    ::mapFromRow

    )

    ?.let(User::fromRow)

    }

    Listing 7-15

    A working implementation of getUser

    ```


    If you rerun your test, it should run without any assertion errors. You’ve now
    verified that if you haven’t implemented `getUser` correctly, the test will fail.
    And by writing the test first, you made sure that it was easy to invoke `getUser`
    without any context other than database state and a Kotliquery session.


    ## Notes on Methodology


    You now have everything you need to write and run tests that execute your business
    logic code and assert that they yielded the expected and required outputs. For
    the remainder of this chapter, you’ll learn more about the methodologies of testing
    and the thoughts behind why you’re doing what you’re doing.


    ### What About Front-End Tests?


    I’m not covering the world of JavaScript and front-end development in any depth
    in this book.


    In Chapter [9](#531928_1_En_9_Chapter.xhtml), you’ll learn how to build traditional
    web apps with HTML and CSS. And in Chapter [10](#531928_1_En_10_Chapter.xhtml),
    you’ll learn how to set up front ends that are powered by Kotlin-backed APIs.
    But the actual implementation of your front end is outside of the scope of this
    book, which focuses on the server-side aspects of writing production-grade web
    apps with Kotlin.


    ### Real Database Writes vs. Mocks


    In your tests, you’re doing real database writes against a real database. What
    about mocks, stubs, and other patterns?


    Mocks and stubs let you run your business logic code in isolation, without relying
    on big stateful systems like databases and other external systems. Personally,
    I almost never use mocks and stubs. I prefer to test as close to the “edges” of
    the system as possible – that is, invoke the business logic in my web handlers
    directly. That way, your tests will reflect how your web handlers call your code
    in production, but you don’t have to start a full web server and perform HTTP
    requests – you can just invoke the functions that make up your business logic.
    Another name for this type of testing is “black box tests,” signifying that your
    tests have as little knowledge as possible about the inner workings of the system
    under test.


    The biggest issue with stubs and mocks is that you end up with lots of logic in
    your tests that replicate the logic of other parts of your code or that of third-party
    systems. This has a high long-term maintenance cost, spent on coordinating your
    mocks with your actual implementation. It can also lead to false positives, where
    your code runs fine against mocks in your tests but doesn’t work when you run
    your web app in production.


    Note that there are plenty of smart and productive developers who are proponents
    of mocks and stubs. But if you want to learn more about that, you should listen
    to them, not me.


    If you want to judge it based on my experience, most of the people I’ve collaborated
    with on real-world projects, and who have used mocks before, made a big mess of
    it and now mostly avoid using mocks and stubs.


    ### Unit vs. Integration Tests


    It’s likely that you’ll encounter discussions of unit tests, integration tests,
    and the difference between them. So I’ll briefly discuss that subject here, so
    you know what to make of it.


    I’ve seen entire talks at conferences discussing the definition of unit vs. integration
    tests, so I won’t be able to go into full detail here. For example, Martin Fowler
    has an in-depth discussion about this in a 2021 blog post: [*https://martinfowler.com/articles/2021-test-shapes.xhtml*](https://martinfowler.com/articles/2021-test-shapes.xhtml).
    The tests you’re writing in this book are unit tests, by my estimation. Your tests
    invoke various functions – units – in your business logic and assert what they
    return and which state they caused the system to end up in.


    But what is an integration test?


    The difference between unit vs. integration tests is clearer when you test user
    interface code. There, a unit test is a small and isolated test that typically
    only tests the underlying data model and business logic for the user interface,
    not the actual rendering. Integration tests are “full-featured” tests, which open
    your iPhone app or website in a simulator or a browser and perform user-like operations
    where buttons are clicked and forms filled in, testing that everything “actually”
    works.


    When you work on real-world web apps, I’ve found that the distinction between
    unit tests and integration tests is unimportant, and you can instead just write
    tests like those in this chapter and refer to them as unit tests (or just tests),
    and everyone on your team will be happy.


    # 8. Parallelizing Service Calls with Coroutines


    In this chapter, you’ll learn how to perform service calls (i.e., call external
    APIs) and how to do so efficiently. Few web apps operate in isolation, and most
    real-world web apps use a combination of a database and calls to external services
    to do their work.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - Using coroutines from different contexts

    - The difference between `kotlin.coroutines` and `kotlinx.coroutines`


    Also in this chapter, you will learn the following about parallelizing service
    calls with coroutines:


    - The difference between blocking and non-blocking code

    - Handling race conditions


    Efficiently calling external services is extra useful if your web app runs in
    an environment with a micro-service architecture. In those cases, you quickly
    end up in a situation where you do hundreds of parallel calls, using outputs from
    some calls as inputs to other calls and so on.'
