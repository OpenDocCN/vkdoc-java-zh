- fmt: '### Calling Your Existing Handlers


    Next, you’ll run one of your actual handlers that you’ve used in Ktor so far.


    Currently, you only have one handler that’s extracted from Ktor, `handleCoroutineTest`.
    Unfortunately, you can’t call that function from your AWS Lambda handlers. It’s
    not because coroutines won’t work in a serverless environment. It’s easy to make
    them work. Just wrap your invocation in `runBlocking`, and you’re good to go.
    The only reason you can’t call `handleCoroutineTest` from AWS Lambda is that it
    talks to a server that runs locally on your machine, embedded alongside your main
    Ktor server. So you’ll only get error messages that it’s not able to connect to
    `http://localhost:9876`.


    As mentioned earlier in this chapter, in a real-world web app, you would write
    all your handler code as separate functions, but for the sake of brevity in this
    book, you’ve embedded them inside Ktor. So, to make one of your Ktor handlers
    available outside of Ktor, you’ll create a new Ktor route for this chapter and
    write it so that it’s possible to call it from your AWS Lambda handlers. Listing
    [12-2](#531928_1_En_12_Chapter.xhtml#PC8) shows how to do this.


    ```

    post("/db_test", webResponseDb(dataSource) { dbSess ->

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    handleUserEmailSearch(dbSess, input["email"])

    })

    fun handleUserEmailSearch(

    dbSess: Session,

    email: Any?

    ): WebResponse {

    return JsonWebResponse(dbSess.single(

    queryOf(

    "SELECT count(*) c FROM user_t WHERE email LIKE ?",

    "%${email}%"

    ),

    ::mapFromRow)

    )

    }

    Listing 12-2

    Creating a reusable Ktor handler

    ```


    Here, you’ve created a Ktor handler that parses the JSON input on the Ktor side
    of things and passes a database session and the username property from the parsed
    JSON into a stand-alone function.


    Next, you’ll invoke this stand-alone function, `handleUserEmailSearch`, from AWS
    Lambda. The first thing you’ll need is a way to map your `WebResponse` data to
    AWS Lambda. Listing [12-3](#531928_1_En_12_Chapter.xhtml#PC9) shows how to do
    that.


    ```

    fun getAwsLambdaResponse(

    contentType: String,

    rawWebResponse: WebResponse,

    body: String

    ): String {

    return rawWebResponse.header("content-type", contentType)

    .let { webResponse ->

    Gson().toJson(mapOf(

    "statusCode" to webResponse.statusCode,

    "headers" to webResponse.headers,

    "body" to body

    ))

    }

    }

    fun serverlessWebResponse(

    handler: suspend () -> WebResponse

    ): String {

    return runBlocking {

    val webResponse = handler()

    when (webResponse) {

    is TextWebResponse -> {

    getAwsLambdaResponse(

    "text/plain; charset=UTF-8",

    webResponse,

    webResponse.body

    )

    }

    is JsonWebResponse -> {

    getAwsLambdaResponse(

    "application/json; charset=UTF-8",

    webResponse,

    Gson().toJson(webResponse.body)

    )

    }

    is HtmlWebResponse -> {

    getAwsLambdaResponse(

    "text/html; charset=UTF-8",

    webResponse,

    buildString {

    appendHTML().xhtml {

    with(webResponse.body) { apply() }

    }

    }

    )

    }

    }

    }

    }

    fun serverlessWebResponseDb(

    dataSource: DataSource,

    handler: suspend (dbSess: Session) -> WebResponse)

    = serverlessWebResponse {

    sessionOf(

    dataSource,

    returnGeneratedKey = true

    ).use { dbSess ->

    handler(dbSess)

    }

    }

    Listing 12-3

    Mapping WebResponse to AWS Lambda

    ```


    The function `serverlessWebResponse` is slightly overengineered for your current
    demands. It supports coroutines in your handler functions. The function you just
    wrote, `handleUserEmailSearch`, does not use coroutines. But since it’s likely
    that your real-world handlers will include coroutines, the mapping code supports
    them, so make it as useful as possible in real-world scenarios.


    `serverlessWebResponse` takes a `WebResponse` and converts it into AWS API Gateway–compatible
    JSON. `TextWebResponse` and `JsonWebResponse` are straightforward. The most complicated
    conversion is for `HtmlWebResponse`, as it must take `kotlinx.xhtml` DSL code
    and convert it into a `String`. Thankfully, `kotlinx.xhtml` has some convenient
    helper functions that make the job easy. `buildString` in Listing [12-3](#531928_1_En_12_Chapter.xhtml#PC9)
    comes from the Kotlin standard library and is a convenience API around the Java
    platform `StringBuilder` API for taking chunks of strings and bytes and converting
    them into a single big `String`. `appendHTML` is from `kotlinx.xhtml` and expects
    an `Appender`, which a `StringBuilder` is, and appends its HTML to it in chunks.
    That way, `kotlinx.xhtml` doesn’t have to create the entire HTML string first
    and then return it to the caller. Finally, you’re using the same trick we’ve used
    before to invoke `apply()` on the `webResponse.body` object using `with`, to avoid
    calling the built-in scope function `apply`.


    Note that you could have implemented `getAwsLambdaResponse` as a single-expression
    function, that is, a function with an `=` after the name, which doesn’t have to
    specify the return type and so on. But the value you return is the result of `Gson().toString()`,
    which is a Java class that returns a platform type `String!`. So, to avoid passing
    around platform types in your code, you explicitly state that it’s a `String`
    to make Kotlin able to better work its logic for automatically detecting potential
    null pointer exceptions at compile time.


    To create the actual AWS Lambda handler function, you’ll also need a database
    connection. Listing [12-4](#531928_1_En_12_Chapter.xhtml#PC10) shows how to set
    both up correctly.


    ```

    private val dataSource = HikariDataSource()

    .apply {

    jdbcUrl = "jdbc:h2:mem:test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH"

    }.also {

    migrateDataSource(it)

    }

    class UserEmailSearch :

    RequestHandler, String>

    {

    override fun handleRequest(

    input: Map,

    context: Context

    ): String {

    return serverlessWebResponseDb(dataSource) { dbSess ->

    handleUserEmailSearch(dbSess, input["email"])

    }

    }

    }

    Listing 12-4

    The implementation of an AWS Lambda handler inside MainServerless.kt, as well
    as database initialization code

    ```


    Your database initialization code just sets up H2 directly and migrates that H2
    database using your Flyway ([https://flywaydb.org/](https://flywaydb.org/)) migrations.
    You could use your config file system to configure H2 if you wanted to, but in
    the world of serverless and AWS Lambda, it’s more common to use environment variables
    that are specific to that handler, instead of using config files that are baked
    in alongside your code. So, to make the code more realistic, you’ve skipped `WebappConfig`
    entirely.


    The `RequestHandler` type of this lambda is slightly different, as it takes a
    `Map<String, String>` instead of `Any?`. The actual input you’ll get will always
    be of the type `Map<String, String>`, so using `Any?` before in your `GetTestHelloWorld`
    handler in Listing [12-1](#531928_1_En_12_Chapter.xhtml#PC7) was just a shortcut
    to save you some typing, as you didn’t actually use the input parameters there.


    Rebuild your code with the Gradle `shadowJar` task, upload the new JAR file to
    the AWS Lambda console as described in Figure [12-3](#531928_1_En_12_Chapter.xhtml#Fig3),
    and change the name of the handler class from `kotlinbook.GetTestHelloWorld::handleRequest`
    to `kotlinbook.UserEmailSearch::handleRequest` as shown in Figure [12-5](#531928_1_En_12_Chapter.xhtml#Fig5).
    Before you run your code by hitting the orange button labeled “Test” under the
    “Test” tab shown in Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7), remember
    to update the parameters. Set the key `"email"` to a value that matches the user
    that you insert in your repeatable migration, as seen in Figure [12-9](#531928_1_En_12_Chapter.xhtml#Fig9).'
