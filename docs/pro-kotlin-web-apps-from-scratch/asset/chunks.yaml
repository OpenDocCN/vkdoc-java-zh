    在 AWS Lambda 中选择文件并执行上传


    当你的浏览器完成将该文件上传到 AWS Lambda 后，你会返回到与图 12-3 相同的屏幕。停留在该屏幕并向下滚动一点。你会看到一个名为“运行时设置”的部分。点击白色的“编辑”按钮，如图
