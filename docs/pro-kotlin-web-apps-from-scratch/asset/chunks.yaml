- fmt: '### Performing Parallelized Calls


    To perform a parallelized service call, you’ll write a new Ktor web handler that
    does a mix and match of parallel calls and using results of parallel calls to
    perform additional parallel calls.


    This type of a la carte parallelization can be very tricky to write if you don’t
    have something like coroutines available. A huge benefit of coroutines is that
    writing parallelized service calls is almost as easy as writing synchronous and
    sequential service calls.


    In Listing [8-7](#531928_1_En_8_Chapter.xhtml#PC7), you can see an example of
    everything but the kitchen sink. There are several things happening there, which
    I’ll explain in detail in the following.


    ```

    suspend fun handleCoroutineTest(

    dbSess: Session

    ) = coroutineScope {

    val client = HttpClient(CIO)

    val randomNumberRequest = async {

    client.get("http://localhost:9876/random_number")

    .bodyAsText()

    }

    val reverseRequest = async {

    client.post("http://localhost:9876/reverse") {

    setBody(randomNumberRequest.await())

    }.bodyAsText()

    }

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    TextWebResponse("""

    Random number: ${randomNumberRequest.await()}

    Reversed: ${reverseRequest.await()}

    Query: ${queryOperation.await()}

    """)

    }

    Listing 8-7

    A function that performs multiple parallel calls to external services

    ```


    At the core, this is just like any other web handler function. You pass in some
    parameters, namely, a Kotliquery database session, and you return a `WebResponse`.
    The main difference comes from the fact that it’s a `suspend` function and that
    it’s wrapped in `coroutineScope`.


    `async()` is the main workhorse when you want to perform multiple parallelized
    service calls. The code you wrap in `async()` runs immediately, but asynchronously.
    When you perform the request to `/random_number`, your code does not halt and
    wait for a return value. Instead, it continues to the next statement, which starts
    a request to `/reverse`. Similarly, the code does not wait for that request to
    finish, and it moves directly on to the next statement, which starts yet another
    async block that performs a request to `/ping` and uses that return value as input
    to a database query.


    The asynchronous magic happens when you call `await()`. The return value of `async()`
    is `Deferred<T>`, and calling `await()` on a `Deferred<T>` causes that code to
    suspend (not block). When the result is ready, your code will continue executing,
    and the value of your `Deferred<T>` will just be the `T` – in other words, the
    raw value that the `async()` block returned.


    `async()` also requires a coroutine scope to function. Wrapping your function
    body in `coroutineScope` ensures that a coroutine scope is available. When you
    call `handleCoroutineTest()` from a Ktor web handler, it will inherit the already
    existing context. So there is no extra overhead created by wrapping your function
    in `coroutineScope` like this.


    ### Handling Race Conditions


    One of the main difficulties in writing non-blocking and parallelized code is
    that you have no control of the order the operations you initiate complete. When
    you start operations A, B, and C, they might finish in that order, or C might
    finish first and then B, or B might finish first, or any other permutation.


    For example, Listing [8-7](#531928_1_En_8_Chapter.xhtml#PC7) fires off `randomNumberRequest`,
    `reverseRequest`, and `queryOperation` in parallel. So they all start executing
    immediately, without waiting for one another. But `reverseRequest` is dependent
    on the return value of `randomNumberRequest`. There’s potential for *race conditions*
    here. A race condition is the name for an unexpected order of events that rarely
    occurs. Perhaps `randomNumberRequest` usually finishes before `reverseRequest`
    actually executes, due to implementation details under the hood. But in some rare
    cases, `reverseRequest` executes first and potentially fails because the return
    value of `randomNumberRequest` is not available yet.


    When you use coroutines, race conditions like these are a nonissue. The code in
    `reverseRequest` uses `randomNumberRequest.await()`, which means that the coroutine
    runtime will always wait until `randomNumberRequest` has finished before it continues
    executing `reverseRequest`. The ability to combine `async()` and `await()` is
    what makes parallelization with coroutines so powerful. You don’t have to manage
    the order in which requests happen, and you don’t have to manually handle all
    combinations of when asynchronous operations complete. All you need to do is to
    start the asynchronous operation and simply `await()` on the value you need, and
    it will all work out as expected.


    ### Adding to Ktor


    To test this function, you can create a new Ktor route handler and invoke the
    `handleCoroutineTest()` function from Listing [8-7](#531928_1_En_8_Chapter.xhtml#PC7).


    To do this, all you need to do is to add a new route handler in your Ktor `routes`
    block and, as seen in Listing [8-8](#531928_1_En_8_Chapter.xhtml#PC8), invoke
    the function there.


    ```

    get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

    handleCoroutineTest(dbSess)

    })

    Listing 8-8

    Invoking handleCoroutineTest() in a web handler

    ```


    Go ahead and test it now! The actual numbers you get are random by design, so
    this is the randomized output I got when I ran the code as I’m writing this book:


    ```

    Random number: 1599

    Reversed: 9951

    Query: {c=1}

    ```


    ## Mixing Coroutines and Blocking Calls


    There are plenty of calls on the Java platform that block the current thread while
    waiting for an asynchronous operation to complete. You should avoid placing these
    blocking calls directly in your coroutines and instead wrap them appropriately
    to make Kotlin manage resources more efficiently.


    ### Wrapping Blocking Calls


    In Listing [8-7](#531928_1_En_8_Chapter.xhtml#PC7), you already broke the rule
    of wrapping blocking calls. The Ktor HTTP client is based on coroutines and isn’t
    blocking. But JDBC and Kotliquery do block while they wait for the database to
    return:


    ```

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    ```


    To fix this issue, you should wrap all blocking calls using `withContext` and
    make sure that the blocking calls run on the built-in `Dispatchers.IO` context.
    Listing [8-9](#531928_1_En_8_Chapter.xhtml#PC11) demonstrates how to make the
    code in Listing [8-7](#531928_1_En_8_Chapter.xhtml#PC7) properly handle blocking
    calls in coroutines.


    ```

    val queryOperation = async {

    val pingPong = client.get("http://localhost:9876/ping")

    .bodyAsText()

    withContext(Dispatchers.IO) {

    dbSess.single(

    queryOf(

    "SELECT count(*) c from user_t WHERE email != ?",

    pingPong

    ),

    ::mapFromRow)

    }

    }

    Listing 8-9

    Appropriately handle blocking calls in coroutines

    ```


    With this minor change, you allow the coroutine runtime to execute the blocking
    call in a separate thread pool, designated for long-running blocking I/O operations
    such as database queries.


    In your main web handlers, wrapping your database access calls is not that important.
    The typical web handler does one or a handful of sequential database queries and
    doesn’t really do any parallelization. But for heavily parallelized coroutine
    code, you should keep this in mind and try to remember to wrap all blocking calls
    in `withContext(Dispatchers.IO)`.


    ## Coroutine Internals


    In this chapter, you’ve already learned some details about what goes on under
    the hood of coroutines. In this section, I’ll explain some even deeper details
    of how coroutines work. Let’s go under the hood of the hood!'
