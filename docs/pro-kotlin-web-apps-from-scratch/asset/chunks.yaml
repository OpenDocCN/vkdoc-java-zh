    ### 编写一个会失败的测试


    为了让 TDD 模式易于识别，你将通过添加一个根据 ID 获取用户的函数来执行另一个 TDD 周期。


    第一步是编写一个会失败的测试和一个空的初始实现。如果没有空的实现，你的测试代码根本无法编译，这样你实际上就无法测试你的测试了。清单 7-14 展示了测试以及空的实现。


    ```

    // 代码

    fun getUser(dbSess: Session, id: Long): User? {

    return null

    }

    // 测试

    @Test

    fun testGetUser() {

    testTx { dbSess ->

    val userId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234",

    tosAccepted = true

    )

    assertNull(getUser(dbSess, -9000))

    val user = getUser(dbSess, userId)

    assertNotNull(user)

    assertEquals(user.email, "augustlilleaas@me.com")

    }

    }

    清单 7-14

    一个带有空实现的失败测试

    ```


    请确保将代码放在 *src/main/kotlin/kotlinbook* 目录下，并将测试放在 *src/test/kotlin/kotlinbook/UserTest.kt*
    文件中。


    这个测试将会失败。初始的 `assertNull` 会成功运行。你的系统中不存在 ID 为 `-9000` 的用户。实际上，你永远不会有 ID 为负数的用户。因此，这个测试成功验证了使用不存在的用户
    ID 调用 `getUser` 会返回 null。但随后的 `assertNotNull` 将会失败。你的最终目标是让这个测试成功通过，因为 `createUser`
    返回的用户 ID 应该始终与 `getUser` 获取到的用户相对应。但 `getUser` 目前被硬编码为返回 `null`。


    ### 让测试通过


    为了让测试通过，你需要实现 `getUser` 函数。


    你已经拥有了实现它所需的所有工具。你已经配置好了 Kotliquery 来运行查询，你的测试将一个 Kotliquery 会话传递给了 `getUser`，并且你有一个数据类，用于将表数据映射到
    `getUser` 返回的 `User?` 类型。清单 7-15 展示了如何正确实现它。


    ```

    fun getUser(dbSess: Session, id: Long): User? {

    return dbSess

    .single(

    queryOf("SELECT * FROM user_t WHERE id = ?", id),

    ::mapFromRow

    )

    ?.let(User::fromRow)

    }

    清单 7-15

    getUser 的一个可行实现

    ```


    如果你重新运行测试，它应该不会出现任何断言错误。你现在已经验证了，如果你没有正确实现 `getUser`，测试将会失败。并且通过先编写测试，你确保了在除了数据库状态和一个
    Kotliquery 会话之外没有任何上下文的情况下，可以轻松地调用 `getUser`。


    ## 关于方法论的说明


    你现在已经拥有了编写和运行测试所需的一切，这些测试可以执行你的业务逻辑代码，并断言它们产生了预期和必需的输出。在本章的剩余部分，你将学习更多关于测试方法论的知识，以及你为什么要这样做背后的思考。


    ### 前端测试怎么办？


    本书不会深入探讨 JavaScript 和前端开发的世界。


    在第 9 章中，你将学习如何使用 HTML 和 CSS 构建传统的 Web 应用。在第 10 章中，你将学习如何搭建由 Kotlin 后端 API 驱动的前端。但前端的具体实现超出了本书的范围，本书专注于使用
    Kotlin 编写生产级 Web 应用的服务器端方面。


    ### 真实数据库写入 vs. 模拟对象


    在你的测试中，你正在对真实数据库进行真实的写入操作。那么模拟对象（mocks）、桩（stubs）和其他模式呢？


    模拟对象和桩允许你隔离地运行业务逻辑代码，而无需依赖像数据库和其他外部系统这样的大型有状态系统。就我个人而言，我几乎从不使用模拟对象和桩。我更喜欢尽可能在接近系统“边缘”的地方进行测试——也就是说，直接在我的
    Web 处理器中调用业务逻辑。这样，你的测试将反映你的 Web 处理器在生产环境中如何调用你的代码，但你无需启动一个完整的 Web 服务器并执行 HTTP
    请求——你只需调用构成你业务逻辑的函数即可。这种测试的另一个名称是“黑盒测试”，意味着你的测试对被测系统的内部工作原理知之甚少。


    桩和模拟对象最大的问题在于，你最终会在测试中包含大量逻辑，这些逻辑复制了代码其他部分或第三方系统的逻辑。这会产生很高的长期维护成本，用于协调你的模拟对象与实际实现。它还可能导致误报，即你的代码在测试中与模拟对象配合良好，但在生产环境中运行
    Web 应用时却无法正常工作。


    请注意，有很多聪明且富有成效的开发者是模拟对象和桩的支持者。但如果你想了解更多相关信息，你应该去听他们的意见，而不是我的。


    如果你想根据我的经验来判断，我在实际项目中合作过的大多数人，那些以前使用过模拟对象的人，都把它搞得一团糟，现在大多避免使用模拟对象和桩。


    ### 单元测试 vs. 集成测试


    你很可能会遇到关于单元测试、集成测试以及它们之间区别的讨论。所以我将在这里简要讨论一下这个话题，让你知道该如何看待它。


    我见过在会议上有人花整场演讲来讨论单元测试与集成测试的定义，所以我无法在这里详细展开。例如，Martin Fowler 在 2021 年的一篇博客文章中对此进行了深入讨论：[*https://martinfowler.com/articles/2021-test-shapes.xhtml*](https://martinfowler.com/articles/2021-test-shapes.xhtml)。根据我的估计，你在本书中编写的测试属于单元测试。你的测试调用业务逻辑中的各种函数（单元），并断言它们返回了什么，以及它们导致系统最终处于何种状态。


    但什么是集成测试呢？


    当你测试用户界面代码时，单元测试与集成测试的区别会更加清晰。在那里，单元测试是一个小型且隔离的测试，通常只测试用户界面的底层数据模型和业务逻辑，而不测试实际的渲染。集成测试是“全功能”测试，它会在模拟器或浏览器中打开你的
    iPhone 应用或网站，并执行类似用户的操作，比如点击按钮和填写表单，以测试一切是否“真正”工作。


    在我从事实际 Web 应用开发的经验中，我发现单元测试和集成测试之间的区别并不重要，你可以像本章一样编写测试，并将其称为单元测试（或仅称为测试），你团队中的每个人都会对此感到满意。


    # 8. 使用协程并行化服务调用


    在本章中，你将学习如何执行服务调用（即调用外部 API）以及如何高效地执行这些调用。很少有 Web 应用是孤立运行的，大多数实际的 Web 应用都结合使用数据库和对外部服务的调用来完成工作。


    如果你是 Kotlin 新手，以下是一些你将在本章中看到示例的语言特性：


    *   从不同上下文使用协程


    *   `kotlin.coroutines` 与 `kotlinx.coroutines` 的区别


    同样在本章中，你将学习以下关于使用协程并行化服务调用的知识：


    *   阻塞代码与非阻塞代码的区别


    *   处理竞态条件


    如果你的 Web 应用运行在微服务架构的环境中，高效地调用外部服务会格外有用。在这种情况下，你很快就会遇到需要执行数百个并行调用的情况，使用某些调用的输出作为其他调用的输入，依此类推。

