    column, it’ll be set to the default value you specified. Additionally, this tells
    the SQL database that when it creates the column, it can set it to the default
    value for existing rows in the database. Listing [5-9](#531928_1_En_5_Chapter.xhtml#PC12)
    shows what that migration file looks like.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN

    NOT NULL

    DEFAULT false;

    Listing 5-9

    Add V3 migration with a non-nullable column with a default value

    ```


    The second way of solving this, which is my preferred way, is to do the change
    in multiple steps. What if you don’t want to have a default value? I prefer to
    have default values in my business logic, not in my database. If I forget to set
    `tos_accepted` from my code, I want the operation to fail.


    You can do this by splitting the operation to three steps: add the column and
    allow nulls, run an `UPDATE` statement that sets the column to the preferred value,
    and then update the column with a `NOT NULL` constraint. Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13)
    shows how to write that migration.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    Listing 5-10

    Add V3 migration with a non-nullable column in multiple steps, with no default
    value

    ```


    This way, your database ends up in the desired state. New inserts will fail if
    you don’t set `tos_accepted`. And existing records get the new `tos_accepted`
    column set to `false`.


    ### Backward-Compatible Migrations


    It’s common to run your web app in blue/green deployments, meaning that when you
    deploy the latest version of your code, you keep the previous version up and running
    until the process with your new code has started up and is fully initialized.
    Then, your deployment setup directs all incoming requests to the latest version
    and only then shuts down the previous version.


    The consequence of this is that for some time, the previous version of your code
    is running while the latest version of your code is starting up and running the
    database migrations. So the previous version of your code is now running against
    the latest version of the database schema.


    If you’re not careful, you’ll make changes to your database schema that are incompatible
    with the previous version of the code. Therefore, it’s helpful to write your database
    migrations to be backward compatible with the previous version of your code.


    The migration in Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13) is not backward
    compatible. It runs successfully, but it also makes a change to the database that
    causes the previous version of the code to fail. If the previous version of the
    code tries to insert a new user, the operation will fail as it has no knowledge
    of the new `tos_accepted` column and doesn’t set it.


    You can solve this by leaning on the fact that you have blue/green deployments
    and that deploying the latest version of your code does not incur any downtime
    on your system. Listing [5-11](#531928_1_En_5_Chapter.xhtml#PC14) shows an updated
    version of the `V3` migration, where all you do is to add the new column.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    Listing 5-11

    An updated V3 migration that’s backward compatible

    ```


    Deploy this version first and wait until it’s completed. Remember, when you deploy
    in a blue/green environment, the previous version of the code runs only temporarily,
    and the blue/green deployment shuts the old code down before the deployment is
    complete. The next step is to create a new *V4* migration, which finishes the
    job. The previous version of the code is no longer running in production, and
    the current code in production knows about the `tos_accepted` column. Listing
    [5-12](#531928_1_En_5_Chapter.xhtml#PC15) shows the new *V4* migration, which
    contains the remaining changes to mark the new column as `NOT NULL`.


    ```

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    Listing 5-12

    A V4 migration that marks the new column from V3 as non-nullable

    ```


    If you look at the V3 and V4 migrations from Listings [5-11](#531928_1_En_5_Chapter.xhtml#PC14)
    and [5-12](#531928_1_En_5_Chapter.xhtml#PC15), you can see that they are identical
    in content to the original V3 migration from Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13)
    that did the entire operation in one step. So the only change that you made was
    to run it in two steps, instead of one, to make sure that your migrations are
    always compatible with the current and previous versions of code that are running
    in your production environment.


    Be aware, though. This migration was easy to make backward compatible. But this
    is not always the case. The larger your change, the more complex your backward-compatible
    migrations can become, compared with writing it in a non-backward-compatible way.
    You should consider whether to make a migration backward compatible on a case-by-case
    basis. If the cost is too high, risking some downtime or exceptions in productions
    might be acceptable.


    ## Insert Seed Data


    You can also use Flyway to generate *seed data*. Seed data is data that your web
    app expects to always be in the database. For example, if you build a web app
    for scheduling and delivering packages, you might store the types of packages
    your system supports in a table. But this table shouldn’t contain arbitrary packages.
    Your code only supports the package types that the table lists, and you don’t
    provide any user interface for adding more package types.'
  trans: '

    ### 添加非空列


    向 `user_t` 表添加 name 列很容易，因为你没有用 `NOT NULL` 标记它。当你运行清单 5-8 中的 `V2` 迁移时，表中任何现有的行都会将新的
    name 列设置为 NULL。如果你想向 `user_t` 表添加一个新的 `NOT NULL` 列，该怎么办？


    如果你的数据库是空的，添加一个 `NOT NULL` 列可以正常工作。但是，如果 `user_t` 表中已有数据，并且你创建了一个新的 *V3* 迁移，在其中放入类似
    `ALTER TABLE user_t ADD COLUMN tos_accepted BOOLEAN NOT NULL` 的语句，那么 Flyway 会报错，提示迁移失败，同时
    H2 数据库也会报错，提示 `NULL not allowed for column "TOS_ACCEPTED"`。


    这是因为 SQL 数据库不知道如何处理表中现有的行。它不能将这些行设置为 `NULL`，因为你禁止了该列使用 `NULL`。


    有两种方法可以解决这个问题。第一种是为该列设置一个默认值。这意味着当你向该表插入新行且未设置该列时，它会被自动设置为指定的默认值。此外，这也会告诉 SQL
    数据库，在创建该列时，可以将数据库中现有行的该列设置为默认值。清单 5-9 展示了该迁移文件的内容。


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN

    NOT NULL

    DEFAULT false;

    清单 5-9

    添加 V3 迁移，包含一个带有默认值的非空列

    ```


    第二种解决方法（也是我更倾向的方法）是分多个步骤进行更改。如果你不想设置默认值怎么办？我倾向于在业务逻辑中设置默认值，而不是在数据库中。如果我忘记在代码中设置
    `tos_accepted`，我希望操作失败。


    你可以通过将操作拆分为三个步骤来实现：添加列并允许空值，运行 `UPDATE` 语句将该列设置为期望的值，然后使用 `NOT NULL` 约束更新该列。清单
    5-10 展示了如何编写该迁移。


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    清单 5-10

    添加 V3 迁移，分多个步骤添加非空列，且无默认值

    ```


    这样，你的数据库最终会达到期望的状态。如果你没有设置 `tos_accepted`，新的插入操作将会失败。而现有的记录会将新的 `tos_accepted`
    列设置为 `false`。


    ### 向后兼容的迁移


    在蓝绿部署中运行 Web 应用是很常见的做法。这意味着当你部署最新版本的代码时，你会保持上一个版本继续运行，直到新代码的进程启动并完全初始化。然后，你的部署设置会将所有传入的请求导向最新版本，之后才关闭上一个版本。


    这样做的后果是，在一段时间内，上一个版本的代码仍在运行，而最新版本的代码正在启动并运行数据库迁移。因此，上一个版本的代码现在是在最新版本的数据库模式下运行。


    如果你不小心，可能会对数据库模式做出与上一个版本代码不兼容的更改。因此，编写与上一个版本代码向后兼容的数据库迁移是很有帮助的。


    清单 5-10 中的迁移就不是向后兼容的。它虽然成功运行，但对数据库所做的更改会导致上一个版本的代码失败。如果上一个版本的代码尝试插入新用户，操作将会失败，因为它不知道新的
    `tos_accepted` 列，也不会设置它。


    你可以利用蓝绿部署的特性以及部署最新版本代码不会导致系统停机这一事实来解决这个问题。清单 5-11 展示了 `V3` 迁移的更新版本，其中只做了添加新列这一件事。


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    清单 5-11

    一个向后兼容的更新版 V3 迁移

    ```


    首先部署这个版本，并等待其完成。请记住，在蓝绿环境中部署时，上一个版本的代码只是临时运行，蓝绿部署会在部署完成前关闭旧代码。下一步是创建一个新的 *V4*
    迁移，来完成剩余的工作。此时，上一个版本的代码已不再生产环境中运行，而生产环境中的当前代码已经知道 `tos_accepted` 列。清单 5-12 展示了新的
    *V4* 迁移，其中包含了将新列标记为 `NOT NULL` 的剩余更改。


    ```

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    清单 5-12

    一个 V4 迁移，将 V3 中的新列标记为非空


    如果你查看清单 5-11 和 5-12 中的 V3 和 V4 迁移，你会发现它们的内容与清单 5-10 中一步完成所有操作的原始 V3 迁移完全相同。因此，你唯一做的更改就是将其分两步运行，而不是一步，以确保你的迁移始终与生产环境中运行的当前版本和上一个版本的代码兼容。


    不过要注意，这个迁移很容易做到向后兼容。但情况并非总是如此。与编写非向后兼容的迁移相比，你的更改越大，向后兼容的迁移就可能变得越复杂。你应该根据具体情况，逐一考虑是否要使迁移向后兼容。如果成本过高，那么在生产环境中冒一些停机或异常的风险也许是可以接受的。


    ## 插入种子数据


    你也可以使用 Flyway 来生成*种子数据*。种子数据是你的 Web 应用期望始终存在于数据库中的数据。例如，如果你构建一个用于安排和递送包裹的 Web
    应用，你可能会将系统支持的包裹类型存储在一个表中。但这个表不应包含任意的包裹类型。你的代码只支持该表中列出的包裹类型，并且你不提供任何用于添加更多包裹类型的用户界面。

