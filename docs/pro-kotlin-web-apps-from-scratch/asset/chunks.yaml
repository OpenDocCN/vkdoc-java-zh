    ## Using Spring Security


    You now have the basics up and running, with your Ktor app running as a servlet
    on Jetty. The next step is to add Spring Security to your servlet stack.


    ### Setting Up the Servlet Filter


    The first thing you need to do is to add the required dependencies to *build.gradle.kts*:


    ```

    implementation("org.springframework.security:spring-security-web:5.7.3")

    implementation("org.springframework.security:spring-security-config:5.7.3")

    ```


    Next, you’ll need to wire up Spring Security in your servlet environment. To do
    that, you need three things: a role hierarchy, a Spring Security web application
    context, and a Spring Security filter that’s mapped to your servlet. Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    shows how to set all this up.


    ```

    log.debug("Setting up Spring Security")

    val roleHierarchy = """

    ROLE_ADMIN > ROLE_USER

    """

    val wac = object : AbstractRefreshableWebApplicationContext() {

    override fun loadBeanDefinitions(

    beanFactory: DefaultListableBeanFactory

    ) {

    beanFactory.registerSingleton(

    "dataSource",

    dataSource

    )

    beanFactory.registerSingleton(

    "rememberMeKey",

    "asdf"

    )

    beanFactory.registerSingleton(

    "roleHierarchy",

    RoleHierarchyImpl().apply {

    setHierarchy(roleHierarchy)

    }

    )

    AnnotatedBeanDefinitionReader(beanFactory)

    .register(WebappSecurityConfig::class.java)

    }

    }

    wac.servletContext = ctx

    ctx.addFilter(

    "springSecurityFilterChain",

    DelegatingFilterProxy("springSecurityFilterChain", wac)

    ).apply {

    addMappingForServletNames(null, false, "ktorServlet")

    }

    Listing 14-5

    Setting up Spring Security inside contextInitialized

    ```


    You can set up Spring Security without a role hierarchy, but it’s likely that
    you’re going to need multiple roles, so you might as well set it up right away.


    The web application context is a dependency injection engine where you programmatically
    register singleton beans, meaning hard-coded instances of objects that will be
    dependency injected into your Spring Security config, for use later, when you
    configure authentication and filtering in Spring Security.


    The `"``rememberMeKey``"` is a secret that Spring Security uses to create a session
    cookie. Instead of hard-coding to `"asdf"`, you should store this as a config
    property. By now, you’ve created several config properties, so you already know
    how to add more. Go ahead and update your config files, your config data class,
    and your config loader code to store the `"rememberMeKey"` there instead!'
  trans: '

    ### 将 Ktor 添加到你的 Servlet 中


    现在你已经拥有了一个包含配置和数据源等所有基础功能的 Servlet，下一步就是将你的 Ktor Web 应用连接到这个 Servlet。


    由于 Ktor Servlet 包的构建方式，需要一些手动操作。有一个内置的 Servlet 用于挂载 Ktor Web 应用，即 `io.ktor.server.servlet.ServletApplicationEngine`，这就是你将要用到的那个。但这个
    Servlet 类不够灵活，默认情况下，它会基于加载一些默认配置文件并在内部进行连接，尝试创建自己的 Ktor 应用实例。你需要能够以编程方式传递你使用第
    2 章中的 `createKtorApplication` 创建的 Ktor 应用实例。清单 14-4 展示了如何进行全部设置。


    ```

    log.debug("Setting up Ktor servlet environment")

    val appEngineEnvironment = applicationEngineEnvironment {

    module {

    createKtorApplication(appConfig, dataSource)

    }

    }

    val appEnginePipeline = defaultEnginePipeline(

    appEngineEnvironment

    )

    BaseApplicationResponse.setupSendPipeline(

    appEnginePipeline.sendPipeline

    )

    appEngineEnvironment.monitor.subscribe(

    ApplicationStarting

    ) {

    it.receivePipeline.merge(appEnginePipeline.receivePipeline)

    it.sendPipeline.merge(appEnginePipeline.sendPipeline)

    it.receivePipeline.installDefaultTransformations()

    it.sendPipeline.installDefaultTransformations()

    }

    ctx.setAttribute(

    ServletApplicationEngine

    .ApplicationEngineEnvironmentAttributeKey,

    appEngineEnvironment

    )

    log.debug("Setting up Ktor servlet")

    ctx.addServlet(

    "ktorServlet",

    ServletApplicationEngine::class.java

    ).apply {

    addMapping("/")

    }

    清单 14-4

    在 contextInitialized 中将 Ktor 设置为 Servlet

    ```


    这段初始化代码大部分基于 Ktor 内置 `ServletApplicationEngine` 中已有的初始化代码，Ktor 会在其中尝试创建自己的 Ktor
    应用实例。`appEngineEnvironment` 和 `appEnginePipeline` 是 `ServletApplicationEngine`
    所需的内部对象。此外，还需要为 `ApplicationStarting` 事件进行一些必要的连接，并且 `ServletApplicationEngine`
    Servlet 期望能够从 Servlet 上下文的一个特定命名属性中获取 `appEngineEnvironment` 实例。


    希望未来版本的 Ktor Servlet 包能让你更轻松地以编程方式传递自己的 Ktor 应用实例。不过，目前你仍然需要上述的连接代码才能使一切正常工作。


    当所有设置完成后，你可以使用标准的 Servlet API 来添加一个 Servlet 并添加映射。


    现在，你已经成功搭建了基于 Servlet 的 Ktor Web 应用！尝试启动应用，你应该会看到所有 Web 处理器都能正常响应，就像你运行旧的 `main`
    函数（使用 `embeddedServer` 和 Netty 启动 Ktor）时一样。


    ## 使用 Spring Security


    现在你已经让基础功能运行起来了，你的 Ktor 应用作为 Servlet 运行在 Jetty 上。下一步是将 Spring Security 添加到你的 Servlet
    栈中。


    ### 设置 Servlet 过滤器


    你需要做的第一件事是将所需的依赖项添加到 *build.gradle.kts* 中：


    ```

    implementation("org.springframework.security:spring-security-web:5.7.3")

    implementation("org.springframework.security:spring-security-config:5.7.3")

    ```


    接下来，你需要在你的 Servlet 环境中连接 Spring Security。为此，你需要三样东西：一个角色层次结构、一个 Spring Security
    Web 应用上下文，以及一个映射到你的 Servlet 的 Spring Security 过滤器。清单 14-5 展示了如何进行全部设置。


    ```

    log.debug("Setting up Spring Security")

    val roleHierarchy = """

    ROLE_ADMIN > ROLE_USER

    """

    val wac = object : AbstractRefreshableWebApplicationContext() {

    override fun loadBeanDefinitions(

    beanFactory: DefaultListableBeanFactory

    ) {

    beanFactory.registerSingleton(

    "dataSource",

    dataSource

    )

    beanFactory.registerSingleton(

    "rememberMeKey",

    "asdf"

    )

    beanFactory.registerSingleton(

    "roleHierarchy",

    RoleHierarchyImpl().apply {

    setHierarchy(roleHierarchy)

    }

    )

    AnnotatedBeanDefinitionReader(beanFactory)

    .register(WebappSecurityConfig::class.java)

    }

    }

    wac.servletContext = ctx

    ctx.addFilter(

    "springSecurityFilterChain",

    DelegatingFilterProxy("springSecurityFilterChain", wac)

    ).apply {

    addMappingForServletNames(null, false, "ktorServlet")

    }

    清单 14-5

    在 contextInitialized 中设置 Spring Security

    ```


    你可以在没有角色层次结构的情况下设置 Spring Security，但很可能你需要多个角色，所以最好立即进行设置。


    Web 应用上下文是一个依赖注入引擎，你可以在其中以编程方式注册单例 Bean，即对象的硬编码实例，这些实例将被依赖注入到你的 Spring Security
    配置中，以便稍后在 Spring Security 中配置身份验证和过滤时使用。


    `"rememberMeKey"` 是 Spring Security 用于创建会话 Cookie 的密钥。与其硬编码为 `"asdf"`，你应该将其存储为配置属性。到目前为止，你已经创建了几个配置属性，因此你已经知道如何添加更多属性。继续更新你的配置文件、配置数据类和配置加载器代码，将
    `"rememberMeKey"` 存储在那里吧！

    '
- fmt: '### Configuring Spring Security


    The next step is to implement the `WebappSecurityConfig` class that you’ve added
    as a bean to the Spring Security web app context in Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7).


    Note that a detailed tutorial for how to configure and set up all the intricate
    details of Spring Security is outside of the scope of this book. For that, I refer
    you to the numerous online articles and other books on this subject. The goal
    of this book is just to show you how to get started.


    The class name is not important for Spring Security, and you can name the config
    class anything you want. The reason it’s picked up as a Spring Security config
    class is because of the annotations you’ll add to it. Listing [14-6](#531928_1_En_14_Chapter.xhtml#PC8)
    shows an empty skeleton implementation of this class.


    ```

    import org.springframework.context.annotation.Configuration

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity

    import org.springframework.beans.factory.annotation.Autowired

    import org.springframework.context.annotation.Bean

    import org.springframework.security.core.userdetails.UserDetailsService

    import org.springframework.security.core.userdetails.User

    import org.springframework.security.config.annotation.web.builders.HttpSecurity

    import org.springframework.security.web.SecurityFilterChain

    @Configuration

    @EnableWebSecurity

    open class WebappSecurityConfig {

    @Autowired

    lateinit var dataSource: DataSource

    @Autowired

    lateinit var roleHierarchy: RoleHierarchy

    @Autowired

    lateinit var rememberMeKey: String

    @Autowired

    lateinit var userDetailsService: UserDetailsService

    @Bean

    open fun userDetailsService() =

    UserDetailsService { userName ->

    User(userName, "{noop}", listOf())

    }

    @Bean

    open fun filterChain(

    http: HttpSecurity

    ): SecurityFilterChain {

    return http.build()

    }

    }

    Listing 14-6

    An empty Spring Security config class

    ```


    The annotations `@Configuration` and `@EnableWebSecurity` are what cause Spring
    Security and the `DelegatingFilterProxy` from Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    to trigger the enabling and configuration of Spring Security in your servlet chain.


    The `@Autowired` annotation means that Spring Security will assign the object
    instances (beans) from the web application context in Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    to those properties, based on the property name and its type.


    Later, you’ll extend the `filterChain` to contain the actual configuration of
    the user and filtering part of Spring Security.


    The `UserDetailsService` is a required part of the Spring Security setup. For
    now, all you’ll use it for is to create a dummy user with a blank password (Spring
    Security interprets that `"{noop}"` string to not try to do anything fancy related
    to password decoding) with an empty list of roles.


    ### Authenticating Users


    To authenticate users, you’ll need to configure the Spring Security filter chain
    with an authentication provider.


    An authentication provider is where Spring Security asks you to handle login credentials,
    check if that user exists, and verify that you’ve received the correct credentials
    (password).


    The authentication is set up inside the currently empty `filterChain` function
    that you created in Listing [14-6](#531928_1_En_14_Chapter.xhtml#PC8). Listing
    [14-7](#531928_1_En_14_Chapter.xhtml#PC9) shows how to set it up.


    ```

    http.authenticationProvider(object : AuthenticationProvider {

    override fun authenticate(

    auth: Authentication

    ): Authentication? {

    val username = auth.principal as String

    val password = auth.credentials as String

    val userId = sessionOf(dataSource).use { dbSess ->

    authenticateUser(dbSess, username, password)

    }

    if (userId != null) {

    return UsernamePasswordAuthenticationToken(

    username,

    password,

    listOf(SimpleGrantedAuthority("ROLE_USER"))

    )

    }

    if (username == "quentin" && password == "test") {

    return UsernamePasswordAuthenticationToken(

    username,

    password,

    listOf(SimpleGrantedAuthority("ROLE_ADMIN"))

    )

    }

    return null

    }

    override fun supports(authentication: Class) =

    authentication ==

    UsernamePasswordAuthenticationToken::class.java

    })

    Listing 14-7

    Adding an authentication provider for authenticating users to the filterChain
    method on WebappSecurityConfig

    ```


    This code uses the `authenticateUser` function from Chapter [9](#531928_1_En_9_Chapter.xhtml)
    to authenticate users against your existing setup. Spring Security provides the
    username and password via the principal and the credentials properties and expects
    your `authenticate` function to return `null` if you didn’t find a user for those
    credential, or an instance of `org.springframework.security.core.Authentication`
    if you found a valid user.


    For the sake of demonstration, the code also includes a hard-coded example of
    an admin user, which has the username `"quentin"` and the password `"test"`. This
    is not something you should add to a real-world web app, for obvious reasons.
    But it provides an example of what you can do with Spring Security and how to
    create users with separate roles.


    ### Filtering Requests


    Currently, your Spring Security filter doesn’t filter any requests. To do this,
    you need to set up a filter chain.


    A filter chain is the set of rules that Spring Security uses to determine if a
    request needs authentication at all and, if there’s an authenticated user available,
    if it has the correct access level.


    The filter chain is set up using a programmatic builder DSL that is available
    on the `HttpSecurity` instance HTTP inside `filterChain` of your Spring Security
    config class. Listing [14-8](#531928_1_En_14_Chapter.xhtml#PC10) shows an example
    of some of the things you can do with it.


    ```

    http

    .authorizeRequests()

    .expressionHandler(

    DefaultWebSecurityExpressionHandler().apply {

    setRoleHierarchy(roleHierarchy)

    }

    )

    .antMatchers("/login").permitAll()

    .antMatchers("/coroutine_test").permitAll()

    .antMatchers("/admin/**").hasRole("ADMIN")

    .antMatchers("/**").hasRole("USER")

    .anyRequest().authenticated()

    .and().formLogin()

    .and()

    .rememberMe()

    .key(rememberMeKey)

    .rememberMeServices(

    TokenBasedRememberMeServices(

    rememberMeKey,

    userDetailsService

    ).apply {

    setCookieName("REMEMBER_ME_KOTLINBOOK")

    }

    )

    .and()

    .logout()

    .logoutRequestMatcher(

    AntPathRequestMatcher("/logout")

    )

    Listing 14-8

    Filtering requests using the builder DSL inside of filterChain

    ```


    There are many ways to set up the filtering, and you need to change the specific
    config to alter your specific needs. This serves as an example of some of the
    possibilities and is a good starting point for most web apps.


    The login page is set up to not require authentication, to avoid infinite redirect
    loops. All pages that start with `/admin` require the admin role for that user.
    Otherwise, the filter requires authentications for all pages. The default `formLogin()`
    is set up as well, which uses the Spring Security default login GUI. It comes
    with a styled login form and some default error messages and is a nice way to
    get started and demonstrate a working setup without having to implement a login
    form yourself. Then, `logout` is set up so that when the user visits the path
    `/logout`, Spring Security logs out the user and clears out the session.


    To reiterate, this book is not a comprehensive tutorial on Spring Security. The
    purpose is to get Spring Security set up and ready to go, working alongside your
    library-based web app that you’ve written from scratch.'
  raw: '### Configuring Spring Security


    The next step is to implement the `WebappSecurityConfig` class that you’ve added
    as a bean to the Spring Security web app context in Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7).


    Note that a detailed tutorial for how to configure and set up all the intricate
    details of Spring Security is outside of the scope of this book. For that, I refer
    you to the numerous online articles and other books on this subject. The goal
    of this book is just to show you how to get started.


    The class name is not important for Spring Security, and you can name the config
    class anything you want. The reason it’s picked up as a Spring Security config
    class is because of the annotations you’ll add to it. Listing [14-6](#531928_1_En_14_Chapter.xhtml#PC8)
    shows an empty skeleton implementation of this class.


    ```

    import org.springframework.context.annotation.Configuration

    import org.springframework.security.config.annotation.web.configuration.EnableWebSecurity

    import org.springframework.beans.factory.annotation.Autowired

    import org.springframework.context.annotation.Bean

    import org.springframework.security.core.userdetails.UserDetailsService

    import org.springframework.security.core.userdetails.User

    import org.springframework.security.config.annotation.web.builders.HttpSecurity

    import org.springframework.security.web.SecurityFilterChain

    @Configuration

    @EnableWebSecurity

    open class WebappSecurityConfig {

    @Autowired

    lateinit var dataSource: DataSource

    @Autowired

    lateinit var roleHierarchy: RoleHierarchy

    @Autowired

    lateinit var rememberMeKey: String

    @Autowired

    lateinit var userDetailsService: UserDetailsService

    @Bean

    open fun userDetailsService() =

    UserDetailsService { userName ->

    User(userName, "{noop}", listOf())

    }

    @Bean

    open fun filterChain(

    http: HttpSecurity

    ): SecurityFilterChain {

    return http.build()

    }

    }

    Listing 14-6

    An empty Spring Security config class

    ```


    The annotations `@Configuration` and `@EnableWebSecurity` are what cause Spring
    Security and the `DelegatingFilterProxy` from Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    to trigger the enabling and configuration of Spring Security in your servlet chain.


    The `@Autowired` annotation means that Spring Security will assign the object
    instances (beans) from the web application context in Listing [14-5](#531928_1_En_14_Chapter.xhtml#PC7)
    to those properties, based on the property name and its type.


    Later, you’ll extend the `filterChain` to contain the actual configuration of
    the user and filtering part of Spring Security.


    The `UserDetailsService` is a required part of the Spring Security setup. For
    now, all you’ll use it for is to create a dummy user with a blank password (Spring
    Security interprets that `"{noop}"` string to not try to do anything fancy related
    to password decoding) with an empty list of roles.


    ### Authenticating Users


    To authenticate users, you’ll need to configure the Spring Security filter chain
    with an authentication provider.


    An authentication provider is where Spring Security asks you to handle login credentials,
    check if that user exists, and verify that you’ve received the correct credentials
    (password).


    The authentication is set up inside the currently empty `filterChain` function
    that you created in Listing [14-6](#531928_1_En_14_Chapter.xhtml#PC8). Listing
    [14-7](#531928_1_En_14_Chapter.xhtml#PC9) shows how to set it up.


    ```

    http.authenticationProvider(object : AuthenticationProvider {

    override fun authenticate(

    auth: Authentication

    ): Authentication? {

    val username = auth.principal as String

    val password = auth.credentials as String

    val userId = sessionOf(dataSource).use { dbSess ->

    authenticateUser(dbSess, username, password)

    }

    if (userId != null) {

    return UsernamePasswordAuthenticationToken(

    username,

    password,

    listOf(SimpleGrantedAuthority("ROLE_USER"))

    )

    }

    if (username == "quentin" && password == "test") {

    return UsernamePasswordAuthenticationToken(

    username,

    password,

    listOf(SimpleGrantedAuthority("ROLE_ADMIN"))

    )

    }

    return null

    }

    override fun supports(authentication: Class) =

    authentication ==

    UsernamePasswordAuthenticationToken::class.java

    })

    Listing 14-7

    Adding an authentication provider for authenticating users to the filterChain
    method on WebappSecurityConfig

    ```


    This code uses the `authenticateUser` function from Chapter [9](#531928_1_En_9_Chapter.xhtml)
    to authenticate users against your existing setup. Spring Security provides the
    username and password via the principal and the credentials properties and expects
    your `authenticate` function to return `null` if you didn’t find a user for those
    credential, or an instance of `org.springframework.security.core.Authentication`
    if you found a valid user.


    For the sake of demonstration, the code also includes a hard-coded example of
    an admin user, which has the username `"quentin"` and the password `"test"`. This
    is not something you should add to a real-world web app, for obvious reasons.
    But it provides an example of what you can do with Spring Security and how to
    create users with separate roles.


    ### Filtering Requests


    Currently, your Spring Security filter doesn’t filter any requests. To do this,
    you need to set up a filter chain.


    A filter chain is the set of rules that Spring Security uses to determine if a
    request needs authentication at all and, if there’s an authenticated user available,
    if it has the correct access level.


    The filter chain is set up using a programmatic builder DSL that is available
    on the `HttpSecurity` instance HTTP inside `filterChain` of your Spring Security
    config class. Listing [14-8](#531928_1_En_14_Chapter.xhtml#PC10) shows an example
    of some of the things you can do with it.


    ```

    http

    .authorizeRequests()

    .expressionHandler(

    DefaultWebSecurityExpressionHandler().apply {

    setRoleHierarchy(roleHierarchy)

    }

    )

    .antMatchers("/login").permitAll()

    .antMatchers("/coroutine_test").permitAll()

    .antMatchers("/admin/**").hasRole("ADMIN")

    .antMatchers("/**").hasRole("USER")

    .anyRequest().authenticated()

    .and().formLogin()

    .and()

    .rememberMe()

    .key(rememberMeKey)

    .rememberMeServices(

    TokenBasedRememberMeServices(

    rememberMeKey,

    userDetailsService

    ).apply {

    setCookieName("REMEMBER_ME_KOTLINBOOK")

    }

    )

    .and()

    .logout()

    .logoutRequestMatcher(

    AntPathRequestMatcher("/logout")

    )

    Listing 14-8

    Filtering requests using the builder DSL inside of filterChain

    ```


    There are many ways to set up the filtering, and you need to change the specific
    config to alter your specific needs. This serves as an example of some of the
    possibilities and is a good starting point for most web apps.


    The login page is set up to not require authentication, to avoid infinite redirect
    loops. All pages that start with */admin* require the admin role for that user.
    Otherwise, the filter requires authentications for all pages. The default `formLogin()`
    is set up as well, which uses the Spring Security default login GUI. It comes
