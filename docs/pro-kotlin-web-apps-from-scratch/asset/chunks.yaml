    引言


    欢迎阅读《*从零开始构建专业 Kotlin Web 应用*》！在本书中，你将学习如何完全从零开始构建专业级和生产级的 Web 应用，而无需使用庞大笨重的框架。


    我个人的 Web 应用之旅始于框架，但当我更深入地了解底层原理，并厌倦了与框架的 bug 和局限性作斗争后，我开始自学如何从零开始构建 Web 应用。事实证明，框架并非必需！


    得益于像 Kotlin 这样的现代编程语言和出色的第三方开源库，当你从零开始构建时，一切尽在掌握。在过去，你需要数千行样板代码和 XML 配置才能搭建一个无框架的
    Web 应用。难怪人们更喜欢框架！然而如今，你只需要少量显式代码，完全摆脱臃肿和魔法，只执行你指定的操作。


    在第一部分中，你将完全从零开始搭建一个 Web 应用骨架。这个代码库构成了第二部分的基础，在第二部分中，你将学习一些基于第一部分骨架构建的模式和实用解决方案。第三部分涵盖如何选择合适的库，以及我在前面部分未能涵盖的
    Kotlin 技巧和窍门。最后，三个附录解释了如何替换第一和第二部分中选择的一些库，以证明你可以自由选择与我不同的库，仍然可以从零开始编写专业的 Kotlin
    Web 应用。


    我特意将关于 Kotlin 技巧和窍门的章节控制在尽可能短的篇幅内。相反，你将在第一和第二部分中学习 Kotlin 的技巧和窍门，并在学习如何使用各种 Kotlin
    语言结构的同时，学习如何从零开始构建 Web 应用。


    致谢


    感谢我的未婚妻 Tina，她相信我并让我知道这一点。感谢 Jonathan Gennick 给我成为技术作家的机会。感谢 Apress 的所有其他同事，与他们共事非常愉快。感谢
    Marius Mårnes Mathisen，在我完全没有编程教育和专业经验的情况下，极大地推动了我的职业生涯。感谢 Kolbjørn Jetne，在我完全没有咨询经验的情况下，进一步推动了我的职业生涯。感谢
    Magnar Sveen、Christian Johansen 和 Alf Kristian Støyle 多年来的讨论、输入和灵感。特别感谢 Finn Johnsen，他帮助形成了本书中的大部分模式，并且是我最初逃离框架、弥合新旧之间鸿沟的重要旅伴。


    最后，感谢我的儿子 Tobias 和女儿 Lone，他们非常棒。而且，应我女儿的要求/命令，“爸爸是一本书。”


    关于作者 关于技术审校者


    # 第一部分 快速启动并运行 Web 应用


    # 1. 搭建开发环境


    在本章中，你将搭建一个 Kotlin 开发环境。你将安装 IntelliJ IDEA、Java 开发工具包（JDK），编写一个小型 Kotlin 程序，并使用
    Gradle 构建系统编译和运行它。


    本章将解释如何使用 IntelliJ IDEA 完成所有操作。不过，对于本书的其他章节，使用 IntelliJ IDEA 并非必需。例如，Eclipse IDE（集成开发环境）和
    Visual Studio Code 都有由 Kotlin 社区提供的 Kotlin 插件。如果你选择使用其他编辑器，请确保它支持*自动补全*和*自动导入*。扩展函数在
    Kotlin 中很常见，你必须先导入它们才能使用。如果你的编辑器能够搜索并匹配所有可用的扩展函数（自动补全），并在你选择其中一个自动补全选项时自动添加导入语句（自动导入），你将避免大量繁琐的手动工作。


    ## 开始使用 IntelliJ IDEA 社区版


    你需要一个编辑器来编写代码，以及一种编译和运行代码的方式。IntelliJ IDEA 为你提供了这两者。


    IntelliJ IDEA 是 Java 平台上静态语言的经典集成开发环境（IDE）。免费的 IntelliJ IDEA 社区版拥有你所需的一切，无论是对于本书还是对于生产级
    Kotlin 开发。此外，JetBrains 同时开发了 Kotlin 和 IntelliJ IDEA，这使得 IntelliJ IDEA 特别适合 Kotlin
    开发工作。


    ### 下载并运行 IntelliJ IDEA


    你可以从 JetBrains 免费下载并使用 IntelliJ IDEA 社区版。访问 IntelliJ IDEA 下载页面，如图 1-1 所示，地址为[`www.jetbrains.com/idea/download/`](http://www.jetbrains.com/idea/download/)，并从那里下载社区版。JetBrains
    为 macOS 提供了.dmg 文件，为 Windows 提供了.exe 文件，为 Linux 提供了包含 shell 脚本（位于*bin/idea.sh*）的压缩包。


    ![](img/531928_1_En_1_Fig1_HTML.png)


    标题为“下载 IntelliJ IDEA”的网页截图。其中提到了版本、构建号和日期。文字显示为“Ultimate，适用于 Web 和企业开发”以及“Community，适用于
    JVM 和 Android 开发”。


    图 1-1


    为你的平台下载 IntelliJ IDEA 社区版


    有关如何安装和运行 IntelliJ IDEA 的更多详细信息，请参考 JetBrains 网站。例如，如图 1-1 所示，下载页面的左侧边栏中有一个包含安装说明的链接。


