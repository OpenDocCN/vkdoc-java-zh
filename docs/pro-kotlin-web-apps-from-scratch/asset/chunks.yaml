    a new map that has all the header names in lowercase. Just like the function `header(String,
    List<String>)` for adding new header values in Listing [4-4](#531928_1_En_4_Chapter.xhtml#PC9),
    the `headers()` function in Listing [4-5](#531928_1_En_4_Chapter.xhtml#PC14) uses
    `getOrDefault` to merge the values of headers where the names are identical when
    lowercased, so that you don’t end up replacing the values in `"foo"` (lowercased)
    with the values of `"Foo"` (capitalized).


    ### The fold Function


    Sit back, take a deep breath, and clear your mind, as I attempt to do the impossible:
    explain how functional programming works.


    `fold` is at the core of all list transformations in functional programming. You
    can use `fold` to implement other functional transformations, like `map`, `filter`,
    `forEach`, `max`, `take`, etc. This makes `fold` useful in cases where your list
    transformation needs some extra rules and isn’t just a plain `map` or `filter`.


    In the implementation of `headers()` in `WebResponse` in Listing [4-5](#531928_1_En_4_Chapter.xhtml#PC14),
    `fold` is on a list and passes an initial value `mapOf()` (an empty map) and a
    lambda. `fold` then calls the lambda and passes the initial value you provided,
    `res`, and the first value in the list, `(k, v)`. Then, `fold` calls the lambda
    again with whatever the lambda returned the first time `fold` called the lambda
    and the second value in the list. Then, this process repeats for each item in
    the list, calling the lambda for each subsequent item in the list, with whatever
    the lambda returned the last time `fold` called the lambda, as well as the list
    item itself.


    The initial empty map is an *accumulator*. You start with the initial value and
    accumulate new values into it each time `fold` calls the lambda. `fold` does not
    care what type of value the accumulator is. It can be a list, a map, a number,
    or anything else you might want to accumulate over.


    ### Destructuring Assignment


    `(k, v)` is a *destructuring assignment*. Many entities in Kotlin, such as data
    classes and `Pair`, implement `componentN()` functions. You can access the key
    of `Pair` as `it.key`, but also as `it.component1()`. Similarly, you can access
    the value of a `Pair` as `it.value`, but also as `it.component2()`. For all entities
    that implement `componentN()` functions, you can `destructure` them. This is a
    convenient way to directly refer to components of an entity, without having to
    create explicit named variables for them. Listing [4-6](#531928_1_En_4_Chapter.xhtml#PC15)
    shows how destructuring and explicit variables are identical in functionality.


    ```

    val it = Pair("foo" to "bar")

    // Using destructuring

    val (k, v) = it

    // Using normal functions

    val k = it.key

    val v = it.value

    // Using manual variable declaration

    val k = it.component1()

    val v = it.component2()

    Listing 4-6

    Comparing the destructuring syntax with manual variable assignment

    ```


    Destructuring assignment can save you from some manual typing, and they are particularly
    useful when destructuring arguments passed to functions or lambdas, as seen in
    Listing [4-5](#531928_1_En_4_Chapter.xhtml#PC14).


    ## Connecting to Ktor


    You now have a full stand-alone representation of HTTP responses, which has no
    knowledge of Ktor or any other library. However, your web app does use Ktor. So
    you need to tie the two together and make Ktor handle your `WebResponse` classes.


    ### Ktor Route Mapping


    The first step is to make it possible to have Ktor routes, like `get("/")` and
    `post("/products")`, interact with `WebResponse` instances returned by your own
    code.


    To see what the result should look like, Listing [4-7](#531928_1_En_4_Chapter.xhtml#PC16)
    compares the current way you handle routing with what it will look like when you’ve
    finished wiring up Ktor to `WebResponse`.


    ```

