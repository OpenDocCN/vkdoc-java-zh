  raw: '### Coroutine Contexts


    You can only call suspend functions from two places: coroutine contexts or functions
    tagged with `suspend`.


    The error message you got from Listing [8-2](#531928_1_En_8_Chapter.xhtml#PC2)
    indicates this requirement. Kotlin can’t just suspend execution at arbitrary points
    in your code, as the Java platform does not allow for that. Listing [8-3](#531928_1_En_8_Chapter.xhtml#PC3)
    shows how you can create a suspend function and call `delay()` inside it.


    ```

    suspend fun myCoroutineFunction() {

    println("Hello, ...")

    delay(500)

    println("...world!")

    }

    Listing 8-3

    An example of a suspend function

    ```


    This function, however, begs the question: How do you call *that* function inside
    your existing `main()`? If you try to invoke it there, as seen in Listing [8-4](#531928_1_En_8_Chapter.xhtml#PC4),
    you’ll get the same error message from Listing [8-2](#531928_1_En_8_Chapter.xhtml#PC2)
    again.


    ```

    fun main() {

    log.debug("Starting application...")

    myCoroutineFunction()

    // Error: Suspend function ''myCoroutineFunction''

    // should be called only from a coroutine or another

    // suspend function

    Listing 8-4

    Invoking a suspend function from inside main and getting an error message

    ```


    One way to solve this is to tag the `main()` function itself with `suspend`. The
    Kotlin compiler will do what’s necessary under the hood and bridge a plain Java
    platform main function with a separate coroutine-scoped main function that Kotlin
    will call under the hood.


    Another way is to explicitly create a coroutine context yourself. Kotlin has the
    function `runBlocking` to bridge the gap between normal execution and coroutines.
    Listing [8-5](#531928_1_En_8_Chapter.xhtml#PC5) shows an example of how you can
    use it to invoke suspend functions from a non-coroutine context.


    ```

    suspend fun myFancyCoroutineFunction(): Number {

    val num = (100L..500L).random()

    delay(num)

    return num

    }

    fun main() {

    log.debug("Starting application...")

    val waitedFor = runBlocking {

    myFancyCoroutineFunction()

    }

    println("Waited ${waitedFor}ms")

    // Waited 427ms

    Listing 8-5

    Use runBlocking to invoke coroutines from main()

    ```


    `runBlocking` blocks the calling thread until the coroutine has finished executing.
    The purpose of `runBlocking` is to bridge the gap between the world of threads
    and the world of coroutines, which is why it blocks the calling thread. `runBlocking`
    returns the value of the lambda running in the coroutine context to the non-coroutine
    context, which in this case means that `waitedFor` represents the `num` inside
    `myFancyCoroutineFunction()`.


    ### Coroutines in Ktor


    With all that explanation out of the way, you can now return to the `delay()`
    in your “fake” external service that you wrote in Listing [8-1](#531928_1_En_8_Chapter.xhtml#PC1).


    The reason you can write `delay()` inside your web handlers is that Ktor handlers
    already run in a coroutine context. Ktor was written from scratch with Kotlin
    in mind and uses coroutines extensively under the hood. Since most of the code
    in Ktor runs in a coroutine context already, it exposes this coroutine context
    to your web handlers so that you can start using coroutines in Ktor without any
    extra setup.


    Under the hood, Ktor supports many different server implementations. In this book,
    you’ve used Netty, which is built on top of the non-blocking NIO (new I/O) API
    added to the Java platform way back in Java 1.4\. The mapping between Netty and
    Ktor leans heavily on the non-blocking nature of Netty and makes for an efficient
    pairing where almost no thread blocking needs to happen.


    Additionally, when you implemented `webResponse` in Chapter [4](#531928_1_En_4_Chapter.xhtml),
    you included the `suspend` keyword on the `handler` lambda where you build and
    return your `WebResponse` instances. The Ktor type `PipelineContext<Unit, ApplicationCall>`
    that is the receiver type of your `handler` lambda implements the built-in interface
    `coroutineScope`, which is what tells Kotlin that your web response handler lambdas
    have a coroutine scope available to them. And since the `handler` lambda function
    type includes `suspend`, you have everything you need to invoke coroutines from
    inside your `webHandler` wrapped Ktor handlers.


    ## Parallelizing Service Calls


    You now have a “fake” web server that you can use as if it was an external service,
    and you understand the basics of what coroutines do and why they are useful. You’re
    now ready to write some parallelized service calls.


    ### Adding Dependencies


    You need two dependencies before you can perform external service calls: you need
    a HTTP client to invoke the “fake” server and you need a dependency to the Kotlin
    coroutine library itself.


    There are plenty of HTTP clients available for the Java platform. For this book,
    you’ll use Ktor’s own HTTP client. The Ktor HTTP client has no direct coupling
    to the Ktor HTTP server. The reason you’re using it is that it’s fundamentally
    based on coroutines. So it’s a good fit for Ktor web apps where you use coroutines.


    Listing [8-6](#531928_1_En_8_Chapter.xhtml#PC6) shows what you need to add to
    make everything work.


    ```

    implementation("io.ktor:ktor-client-core:2.1.2")

    implementation("io.ktor:ktor-client-cio:2.1.2")

    Listing 8-6

    Adding the coroutine library as a dependency in build.gradle.kts

    ```


    Like the Ktor server, the Ktor client supports multiple different back ends. The
    CIO (coroutine I/O) back end is the coroutine-based one that you’ll use in this
    book.'
