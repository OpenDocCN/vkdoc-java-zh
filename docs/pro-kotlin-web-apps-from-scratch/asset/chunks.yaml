    ## 准备你的 Web 应用


    本章的目标是编写使用协程对外部服务进行并行调用的 Web 处理器。这些处理器将使用 HTTP 客户端执行实际调用。因此，你需要一个可以执行调用的实际 HTTP
    服务器。


    ### 实现一个模拟服务


    市面上有很多可用的公共和开放 API。但你永远不知道某个公共 API 何时会关闭，或者以破坏向后兼容性的方式更新。大多数 API 通常还需要个人 API 密钥，以便
    API 所有者能够限制滥用行为。


    为了确保本书的时效性并尽可能使其独立运行，你将创建自己的可调用模拟服务。


    为了使模拟服务尽可能逼真，你将创建一个独立的 HTTP API，运行在独立的 HTTP 服务器上，并使用独立的端口。这样，你就可以像调用外部 HTTP API
    一样调用你的模拟服务。从技术上讲，你可以直接调用它，因为它与你的主 Web 应用运行在同一个进程中。但由于它也可以通过 HTTP 访问，因此你在调用它时也会使用
    HTTP。


    ### 添加第二个服务器


    你将把模拟服务作为一个独立的 HTTP 服务器运行，与运行实际 Web 应用的 HTTP 服务器并行。


    使用库的好处之一是，你可以轻松地跳出固有思维模式。这是因为没有所谓的“框框”。你可以完全访问所有内容，并完全控制所有内容的启动方式。你已经知道如何从 Kotlin
    代码启动 HTTP 服务器，因为你的现有 Web 应用就是这么做的。添加第二个服务器就像在现有的 `main()` 函数中某处添加对 Ktor 的 `embeddedServer()`
    的第二次调用一样简单。


    该服务器的实际实现将包含三个路由：一个路由在 200 到 2000 之间随机选择一个数字，等待该毫秒数后返回该数字；另一个路由仅返回文本 `"pong"`；还有一个路由返回你向其
    POST 的任何内容并将其反转。清单 8-1 包含了设置所有这些内容所需的代码。


    ```

    embeddedServer(Netty, port = 9876) {

    routing {

    get("/random_number", webResponse {

    val num = (200L..2000L).random()

    delay(num)

    TextWebResponse(num.toString())

    })

    get("/ping", webResponse {

    TextWebResponse("pong")

    })

    post("/reverse", webResponse {

    TextWebResponse(call.receiveText().reversed())

    })

    }

    }.start(wait = false)

    清单 8-1

    一个包含一些路由处理器的模拟服务，你将用它来演示协程

    ```


    `200L..2000L` 是一个区间，你在第 6 章实现 `mapFromRow()` 时已经使用过区间（参见清单 6-1）。`Range` 上的内置扩展函数
    `random()` 是获取有界随机数的一种便捷方式。


    请注意，你的新“模拟”服务器是通过 `.start(wait = false)` 启动的。请确保将其放在对“真实” `embeddedServer()` 的现有调用之前。“真实”服务器设置为等待（`.start(wait
    = true)`），这意味着它将导致 `main()` 函数永久阻塞，监听新的传入连接。如果没有“真实” Web 应用的这种阻塞/等待，`main()` 函数会立即退出。其后果是，在“真实”
    `embeddedServer()` 启动之后放置的任何代码，在服务器关闭之前都不会运行。因此，请先启动你的“模拟”服务器，并将其设置为不等待/阻塞。这样，你的“模拟”服务器将启动，然后你的“真实”服务器将启动，并且你的
    `main()` 函数将阻塞并监听两个服务器上的传入连接。


    ## 理解协程


    在开始实现协程的并行化服务调用之前，你应该对协程的作用及其运行机制有所了解。


    ### `delay` 协程


    你已经编写了你的第一个协程。注意到了吗？


    在清单 8-1 中，你编写了一个生成随机数的 Web 处理器，在将该数字作为文本返回之前，它使用该随机数调用了函数 `delay()`。`delay()`
    就是一个协程！


    `delay()` 是一个特殊函数，只能在协程上下文中工作。如果你尝试在顶层或仅在 `main()` 函数内部调用 `delay()`，将会收到错误，如清单
    8-2 所示。


    ```

    挂起函数 ''delay'' 只能从协程或其他挂起函数中调用

    清单 8-2

    尝试从非协程上下文调用协程时收到的错误消息

    ```


    为什么你可以在 Web 处理器内部编写 `delay()`，而不能在代码的其他任何地方？为什么你首先使用 `delay()`，而不是更熟悉的函数（如 `Thread.sleep()`）？


    ### 线程的问题


    Kotlin 中挂起函数和协程的全部意义在于限制和控制线程的使用，特别是休眠线程。


    在 Java 平台 Web 应用的旧时代，典型的架构是每个 HTTP 请求在其处理的整个持续时间内占用一个完整的线程。如果在另一个请求正在运行时收到一个新的传入请求，Web
    服务器将创建第二个线程来处理该请求，依此类推。Web 服务器会使用一个线程池，以避免为每个请求从头创建新线程。但根本上，一个线程处理一个请求。


    其后果是，在某些（甚至大多数）时间里，线程处于空闲状态，不执行任何工作。例如，如果你的 Web 服务器查询数据库，处理该请求的线程在等待数据库服务器响应时会休眠。


    这是一个问题，因为线程在底层的工作方式。Java 中的线程会在底层操作系统中创建一个线程。操作系统线程是一种相对昂贵的资源。每个线程都需要自己完整的调用栈，并且在线程之间切换也会产生开销。


    在现代操作系统上，你可以走得很远，因为与 21 世纪初 Java 平台流行时相比，它们现在处理数万个线程的能力要强得多。但通常最好避免创建近乎无限数量的线程，而是依赖其他并发机制。


    ### 挂起而非锁定


    为了避免空闲和休眠线程，Kotlin 引入了*挂起*的概念。


    简而言之，挂起意味着 Kotlin 知道如何在特定点挂起代码的执行，并在稍后继续执行。当你的代码到达挂起点时，Kotlin 知道它可以使用运行你代码的线程来做其他事情。稍后，当挂起的代码准备好继续运行时，执行将继续，可能会在另一个线程上。


    这就是 `delay()` 函数的作用。一旦你调用 `delay()`，Kotlin 就会挂起你的函数执行。稍后，当内部调度器在所需的毫秒数后触发时（在 Java
    平台上，Kotlin 使用 `ScheduledThreadPoolExecutor` 来实现），Kotlin 会恢复你的函数执行。


    如果你调用 `Thread.sleep()`，Java 运行时会在你指定的持续时间内阻塞整个线程。如果你使用 `delay()`，你就让 Kotlin 接管了线程管理。你应该尽可能使用
    `delay()` 和协程，让 Kotlin 运行时接管线程管理。

