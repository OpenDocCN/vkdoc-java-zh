- fmt: '### Using JWTs for Authentication


    If you’re making an API from scratch that’s only meant for use by native clients,
    you can still use cookies. But it’s more common to use token-based authentication
    for those cases. Particularly, JSON Web Tokens (JWTs) are the established way
    to set that up.


    A JWT is a blob of data formatted to follow the open JWT standard ([*https://jwt.io/*](https://jwt.io/)),
    which contains securely signed JSON-encoded authentication information. In addition
    to the cryptographic signature, a JWT includes metadata about which encryption
    algorithm the token uses and a block of JSON that contains arbitrary information
    about the logged-in user. The JSON data typically contains the property `"sub"`
    (short for subject), which contains the unique ID for the user the token represents.
    Typical properties are also `"name"` and `"email"`, but what exactly you want
    your JWT to contain is up to you.


    When you authenticate your user, you respond with data that contains the auth
    token itself. Then, in subsequent requests, you send this auth token back to the
    server using the `Authorization` header.


    Ktor has built-in support for JWT authorization, so that’s what you’ll use to
    set it up in your web app. The first thing you need to do is to add the required
    dependency to `build.gradle.kts`:


    ```

    implementation("io.ktor:ktor-server-auth-jwt-jvm:2.1.2")

    ```


    The next step is to set up your JWT authentication. You’ll do that in a new Ktor
    Application extension function, like your existing functions `createKtorApplication`
    and `setUpKtorCookieSecurity`. Listing [10-7](#531928_1_En_10_Chapter.xhtml#PC9)
    shows how to set that up.


    ```

    fun Application.setUpKtorJwtSecurity(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    val jwtAudience = "myApp"

    val jwtIssuer = "http://0.0.0.0:4207"

    authentication {

    jwt("jwt-auth") {

    realm = "myApp"

    verifier(JWT

    .require(Algorithm.HMAC256(appConfig.cookieSigningKey))

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .build())

    validate { credential ->

    if (credential.payload.audience.contains(jwtAudience))

    JWTPrincipal(credential.payload)

    else

    null

    }

    }

    }

    }

    Listing 10-7

    Setting up JWT authentication

    ```


    To simplify the setup, you’re reusing the config property `cookieSigningKey` for
    the JWT signing key. You can add a separate config property for the JWT only if
    you want.


    The authentication process itself does not use the issuer and audience properties.
    They’re only there for verification purposes, which can be useful if your API
    can accept JWTs from various sources or if you want to issue JWTs that you can
    use in different authentication scopes.


    The next step is to add a web handler for performing the actual logging in and
    creation of new JWTs. Listing [10-8](#531928_1_En_10_Chapter.xhtml#PC10) shows
    how to set that up.


    ```

    routing {

    post("/login", webResponseDb(dataSource) { dbSess ->

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    val userId = authenticateUser(

    dbSess,

    input["username"] as String,

    input["password"] as String

    )

    if (userId == null) {

    JsonWebResponse(

    mapOf("error" to "Invalid username and/or password"),

    statusCode = 403

    )

    } else {

    val token = JWT.create()

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .withClaim("userId", userId)

    .withExpiresAt(

    Date.from(LocalDateTime

    .now()

    .plusDays(30)

    .toInstant(ZoneOffset.UTC)

    )

    )

    .sign(Algorithm.HMAC256(appConfig.cookieSigningKey))

    JsonWebResponse(mapOf("token" to token))

    }

    })

    }

    Listing 10-8

    Performing a login inside the setUpKtorJwtSecurity configuration

    ```


    This code is like the `<form>`-based login code from `setUpKtorCookieSecurity`
    in that it receives the username and password as parameters and either returns
    an error or valid authentication credentials, depending on the input parameters.


    If the username and password are a match, you create a new JWT that’s signed with
    the same signing key as your authorization setup from Listing [10-7](#531928_1_En_10_Chapter.xhtml#PC9)
    and add the ID of the signed-in user as a part of the token payload. Since you’re
    using token-based authentication, you don’t have to set a cookie or do anything
    special. All you need to do is to return the token as a part of the data in the
    HTTP response, in this case as a JSON-encoded map.


    To secure routes behind authentication, the procedure is the same as with cookie-based
    auth. Listing [10-9](#531928_1_En_10_Chapter.xhtml#PC11) shows how to set that
    up.


    ```

    authenticate("jwt-auth") {

    get("/secret", webResponseDb(dataSource) { dbSess ->

    val userSession = call.principal()!!

    val userId = userSession.getClaim("userId", Long::class)!!

    val user = getUser(dbSess, userId)!!

    JsonWebResponse(mapOf("hello" to user.email))

    })

    }

    Listing 10-9

    Securing routes inside the routing block with JWT authentication

    ```


    Instead of using the custom principal data class you set up for cookie-based auth,
    you use the built-in `JWTPrincipal` class that represents JWTs. This principal
    is set up to parse the correct headers automatically and decode the token.


    The JWT contains the `userId` claim you specified when you created the token on
    `POST /login`.


    This code has lots of potential for null pointer exceptions in it. There are three
    `!!` operators, which cause your code to throw a `NullPointerException` if the
    value is `null`. I prefer to keep the type system as clean as possible and be
    explicit about the types I require in my business logic and whether they’re nullable.
    But for code at the edges of the system, where all sorts of weird things can happen
    based on user input, I don’t mind using the `!!` operator to fail early and sanitize
    input. It’s a cheap form of input validation, which generates bad error messages,
    but it is really easy to add and is much better than passing nullable types all
    over your code.


    ### Performing Authentication


    To demonstrate how you’ll authenticate against this API, you’ll use cURL in a
    terminal to perform API calls.


    First, make sure your API is ready to go with JWT-based authentication. In `embeddedServer`,
    remove the existing call to `setUpKtorCookieSecurity`, and replace it with your
    new function from this chapter, `setUpKtorJwtSecurity`, and run your main function
    to start up your web app.


    You’ll get the JSON you generated in your code in Listing [10-8](#531928_1_En_10_Chapter.xhtml#PC10)
    in return. First, try to call `GET /secret` without an auth token, to see what
    happens:


    ```

    $ curl -I http://localhost:4207/secret

    HTTP/1.1 405 Method Not Allowed

    ```


    To perform authentication, you’ll call `POST /login` with the username and password
    from the user in your repeatable migration:


    ```

    $ curl -X POST \

    -d ''{"username":"august@crud.business","password":"1234"}'' \

    http://localhost:4207/login

    {"token":""}

    ```


    Next, perform a request to `GET /secret` and pass in the auth token you got, and
    you should get a successful result in return:


    ```

    $ curl -H "Authorization: Bearer " \

    http://localhost:4207/secret

    {"hello":"august@crud.business"}

    ```


    If you did everything correctly, you got the email of the user that the JWT represents.


    Note the format of the `Authorization` header. It starts with the text `"Bearer"`,
    followed by the actual token. This is a part of the HTTP specification, as Authorization
    headers should first state the authentication method (in this case, a JWT bearer)
    and then the actual authorization parameters (the JWT itself). You won’t be able
    to authenticate successfully without the `"Bearer "` prefix.


    # 11. Deploying to Traditional Server Based Environments


    The most common way to deploy production-grade web apps today is in a traditional
    server-based environment. This chapter covers how to package your web app so you
    can deploy it in several types of environments, be it a single-node dedicated
    server or a distributed multi-server Kubernetes cluster.


    ## Packaging as Self-Contained JAR Files


    For any type of deployment setup, you’ll need to package your web app as a self-contained
    *Java archive* (JAR) file.'
  raw: '### Using JWTs for Authentication


    If you’re making an API from scratch that’s only meant for use by native clients,
    you can still use cookies. But it’s more common to use token-based authentication
    for those cases. Particularly, JSON Web Tokens (JWTs) are the established way
    to set that up.


    A JWT is a blob of data formatted to follow the open JWT standard ([*https://jwt.io/*](https://jwt.io/)),
    which contains securely signed JSON-encoded authentication information. In addition
    to the cryptographic signature, a JWT includes metadata about which encryption
    algorithm the token uses and a block of JSON that contains arbitrary information
    about the logged-in user. The JSON data typically contains the property `"sub"`
    (short for subject), which contains the unique ID for the user the token represents.
    Typical properties are also `"name"` and `"email"`, but what exactly you want
    your JWT to contain is up to you.


    When you authenticate your user, you respond with data that contains the auth
    token itself. Then, in subsequent requests, you send this auth token back to the
    server using the `Authorization` header.


    Ktor has built-in support for JWT authorization, so that’s what you’ll use to
    set it up in your web app. The first thing you need to do is to add the required
    dependency to *build.gradle.kts*:


    ```

    implementation("io.ktor:ktor-server-auth-jwt-jvm:2.1.2")

    ```


    The next step is to set up your JWT authentication. You’ll do that in a new Ktor
    Application extension function, like your existing functions `createKtorApplication`
    and `setUpKtorCookieSecurity`. Listing [10-7](#531928_1_En_10_Chapter.xhtml#PC9)
    shows how to set that up.


    ```

    fun Application.setUpKtorJwtSecurity(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    val jwtAudience = "myApp"

    val jwtIssuer = "http://0.0.0.0:4207"

    authentication {

    jwt("jwt-auth") {

    realm = "myApp"

    verifier(JWT

    .require(Algorithm.HMAC256(appConfig.cookieSigningKey))

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .build())

    validate { credential ->

    if (credential.payload.audience.contains(jwtAudience))

    JWTPrincipal(credential.payload)

    else

    null

    }

    }

    }

    }

    Listing 10-7

    Setting up JWT authentication

    ```


    To simplify the setup, you’re reusing the config property `cookieSigningKey` for
    the JWT signing key. You can add a separate config property for the JWT only if
    you want.


    The authentication process itself does not use the issuer and audience properties.
    They’re only there for verification purposes, which can be useful if your API
    can accept JWTs from various sources or if you want to issue JWTs that you can
    use in different authentication scopes.


    The next step is to add a web handler for performing the actual logging in and
    creation of new JWTs. Listing [10-8](#531928_1_En_10_Chapter.xhtml#PC10) shows
    how to set that up.


    ```

    routing {

    post("/login", webResponseDb(dataSource) { dbSess ->

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    val userId = authenticateUser(

    dbSess,

    input["username"] as String,

    input["password"] as String

    )

    if (userId == null) {

    JsonWebResponse(

    mapOf("error" to "Invalid username and/or password"),

    statusCode = 403

    )

    } else {

    val token = JWT.create()

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .withClaim("userId", userId)

    .withExpiresAt(

    Date.from(LocalDateTime

    .now()

    .plusDays(30)

    .toInstant(ZoneOffset.UTC)

    )

    )

    .sign(Algorithm.HMAC256(appConfig.cookieSigningKey))

    JsonWebResponse(mapOf("token" to token))

    }

    })

    }

    Listing 10-8

    Performing a login inside the setUpKtorJwtSecurity configuration

    ```


    This code is like the `<form>`-based login code from `setUpKtorCookieSecurity`
    in that it receives the username and password as parameters and either returns
    an error or valid authentication credentials, depending on the input parameters.


    If the username and password are a match, you create a new JWT that’s signed with
    the same signing key as your authorization setup from Listing [10-7](#531928_1_En_10_Chapter.xhtml#PC9)
    and add the ID of the signed-in user as a part of the token payload. Since you’re
    using token-based authentication, you don’t have to set a cookie or do anything
    special. All you need to do is to return the token as a part of the data in the
    HTTP response, in this case as a JSON-encoded map.


    To secure routes behind authentication, the procedure is the same as with cookie-based
    auth. Listing [10-9](#531928_1_En_10_Chapter.xhtml#PC11) shows how to set that
    up.


    ```

    authenticate("jwt-auth") {

    get("/secret", webResponseDb(dataSource) { dbSess ->

    val userSession = call.principal()!!

    val userId = userSession.getClaim("userId", Long::class)!!

    val user = getUser(dbSess, userId)!!

    JsonWebResponse(mapOf("hello" to user.email))

    })

    }

    Listing 10-9

    Securing routes inside the routing block with JWT authentication

    ```


    Instead of using the custom principal data class you set up for cookie-based auth,
    you use the built-in `JWTPrincipal` class that represents JWTs. This principal
    is set up to parse the correct headers automatically and decode the token.


    The JWT contains the `userId` claim you specified when you created the token on
    `POST /login`.


    This code has lots of potential for null pointer exceptions in it. There are three
    `!!` operators, which cause your code to throw a `NullPointerException` if the
    value is `null`. I prefer to keep the type system as clean as possible and be
    explicit about the types I require in my business logic and whether they’re nullable.
    But for code at the edges of the system, where all sorts of weird things can happen
    based on user input, I don’t mind using the `!!` operator to fail early and sanitize
    input. It’s a cheap form of input validation, which generates bad error messages,
    but it is really easy to add and is much better than passing nullable types all
    over your code.


    ### Performing Authentication


    To demonstrate how you’ll authenticate against this API, you’ll use cURL in a
    terminal to perform API calls.


    First, make sure your API is ready to go with JWT-based authentication. In `embeddedServer`,
    remove the existing call to `setUpKtorCookieSecurity`, and replace it with your
    new function from this chapter, `setUpKtorJwtSecurity`, and run your main function
    to start up your web app.


    You’ll get the JSON you generated in your code in Listing [10-8](#531928_1_En_10_Chapter.xhtml#PC10)
    in return. First, try to call `GET /secret` without an auth token, to see what
    happens:


    ```

    $ curl -I http://localhost:4207/secret

    HTTP/1.1 405 Method Not Allowed

    ```


    To perform authentication, you’ll call `POST /login` with the username and password
    from the user in your repeatable migration:


    ```

    $ curl -X POST \

    -d ''{"username":"august@crud.business","password":"1234"}'' \

    http://localhost:4207/login

    {"token":""}

    ```


    Next, perform a request to `GET /secret` and pass in the auth token you got, and
    you should get a successful result in return:


    ```

    $ curl -H "Authorization: Bearer " \

    http://localhost:4207/secret

    {"hello":"august@crud.business"}

    ```


    If you did everything correctly, you got the email of the user that the JWT represents.


    Note the format of the `Authorization` header. It starts with the text `"Bearer"`,
    followed by the actual token. This is a part of the HTTP specification, as Authorization
    headers should first state the authentication method (in this case, a JWT bearer)
    and then the actual authorization parameters (the JWT itself). You won’t be able
    to authenticate successfully without the `"Bearer "` prefix.


    # 11. Deploying to Traditional Server Based Environments


    The most common way to deploy production-grade web apps today is in a traditional
    server-based environment. This chapter covers how to package your web app so you
    can deploy it in several types of environments, be it a single-node dedicated
    server or a distributed multi-server Kubernetes cluster.


    ## Packaging as Self-Contained JAR Files


    For any type of deployment setup, you’ll need to package your web app as a self-contained
    *Java archive* (JAR) file.'
  trans: '

    ### 使用 JWT 进行身份验证


    如果你从头开始构建一个仅限原生客户端使用的 API，你仍然可以使用 Cookie。但在这种情况下，更常见的是使用基于令牌的身份验证。特别是，JSON Web
    令牌（JWT）是实现这一点的既定方式。


    JWT 是一组遵循开放 JWT 标准（[*https://jwt.io/*](https://jwt.io/)）格式化的数据块，其中包含经过安全签名的 JSON
    编码身份验证信息。除了加密签名外，JWT 还包含关于令牌使用哪种加密算法的元数据，以及一个包含已登录用户任意信息的 JSON 块。JSON 数据通常包含属性
    `"sub"`（subject 的缩写），其中包含令牌所代表用户的唯一 ID。常见的属性还有 `"name"` 和 `"email"`，但你希望 JWT 包含什么内容完全取决于你。


    当你对用户进行身份验证时，你会在响应中返回包含身份验证令牌本身的数据。然后，在后续请求中，你使用 `Authorization` 标头将此身份验证令牌发送回服务器。


    Ktor 内置了对 JWT 授权的支持，因此你将使用它在你的 Web 应用中进行设置。你需要做的第一件事是将所需的依赖项添加到 *build.gradle.kts*
    中：


    ```

    implementation("io.ktor:ktor-server-auth-jwt-jvm:2.1.2")

    ```


    下一步是设置你的 JWT 身份验证。你将在新的 Ktor Application 扩展函数中执行此操作，就像你现有的函数 `createKtorApplication`
    和 `setUpKtorCookieSecurity` 一样。清单 10-7 展示了如何进行设置。


    ```

    fun Application.setUpKtorJwtSecurity(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    val jwtAudience = "myApp"

    val jwtIssuer = "http://0.0.0.0:4207"

    authentication {

    jwt("jwt-auth") {

    realm = "myApp"

    verifier(JWT

    .require(Algorithm.HMAC256(appConfig.cookieSigningKey))

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .build())

    validate { credential ->

    if (credential.payload.audience.contains(jwtAudience))

    JWTPrincipal(credential.payload)

    else

    null

    }

    }

    }

    }

    清单 10-7

    设置 JWT 身份验证

    ```


    为了简化设置，你复用了配置属性 `cookieSigningKey` 作为 JWT 签名密钥。如果需要，你可以仅为 JWT 添加一个单独的配置属性。


    身份验证过程本身不使用发行者和受众属性。它们仅用于验证目的，如果你的 API 可以接受来自不同来源的 JWT，或者你想签发可以在不同身份验证范围内使用的 JWT，这会很有用。


    下一步是添加一个 Web 处理器来执行实际的登录和创建新的 JWT。清单 10-8 展示了如何进行设置。


    ```

    routing {

    post("/login", webResponseDb(dataSource) { dbSess ->

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    val userId = authenticateUser(

    dbSess,

    input["username"] as String,

    input["password"] as String

    )

    if (userId == null) {

    JsonWebResponse(

    mapOf("error" to "用户名和/或密码无效"),

    statusCode = 403

    )

    } else {

    val token = JWT.create()

    .withAudience(jwtAudience)

    .withIssuer(jwtIssuer)

    .withClaim("userId", userId)

    .withExpiresAt(

    Date.from(LocalDateTime

    .now()

    .plusDays(30)

    .toInstant(ZoneOffset.UTC)

    )

    )

    .sign(Algorithm.HMAC256(appConfig.cookieSigningKey))

    JsonWebResponse(mapOf("token" to token))

    }

    })

    }

    清单 10-8

    在 setUpKtorJwtSecurity 配置中执行登录

    ```


    这段代码类似于 `setUpKtorCookieSecurity` 中基于 `<form>` 的登录代码，它接收用户名和密码作为参数，并根据输入参数返回错误或有效的身份验证凭据。


    如果用户名和密码匹配，你将创建一个新的 JWT，该 JWT 使用与清单 10-7 中授权设置相同的签名密钥进行签名，并将登录用户的 ID 添加为令牌负载的一部分。由于你使用的是基于令牌的身份验证，因此无需设置
    Cookie 或执行任何特殊操作。你只需在 HTTP 响应中将令牌作为数据的一部分返回，在本例中是以 JSON 编码的映射形式返回。


    要保护需要身份验证的路由，其过程与基于 Cookie 的身份验证相同。清单 10-9 展示了如何进行设置。


    ```

    authenticate("jwt-auth") {

    get("/secret", webResponseDb(dataSource) { dbSess ->

    val userSession = call.principal()!!

    val userId = userSession.getClaim("userId", Long::class)!!

    val user = getUser(dbSess, userId)!!

    JsonWebResponse(mapOf("hello" to user.email))

    })

    }

    清单 10-9

    使用 JWT 身份验证保护路由块内的路由

    ```


    你使用内置的表示 JWT 的 `JWTPrincipal` 类，而不是使用为基于 Cookie 的身份验证设置的自定义主体数据类。此主体被设置为自动解析正确的标头并解码令牌。


    JWT 包含你在 `POST /login` 上创建令牌时指定的 `userId` 声明。


    这段代码存在大量可能引发空指针异常的地方。代码中有三个 `!!` 运算符，如果值为 `null`，它们会导致你的代码抛出 `NullPointerException`。我倾向于尽可能保持类型系统的整洁，并明确说明我的业务逻辑中所需的类型以及它们是否可为空。但对于系统边缘的代码，即那些可能因用户输入而发生各种奇怪情况的地方，我不介意使用
    `!!` 运算符来尽早失败并清理输入。这是一种廉价的输入验证形式，虽然会产生糟糕的错误消息，但它非常容易添加，并且比在整个代码中传递可空类型要好得多。


    ### 执行身份验证


    为了演示你将如何对此 API 进行身份验证，你将在终端中使用 cURL 来执行 API 调用。


    首先，确保你的 API 已准备好使用基于 JWT 的身份验证。在 `embeddedServer` 中，移除对 `setUpKtorCookieSecurity`
    的现有调用，并将其替换为本章中的新函数 `setUpKtorJwtSecurity`，然后运行你的 main 函数来启动你的 Web 应用。


    你将获得在清单 10-8 的代码中生成的 JSON 作为返回。首先，尝试在没有身份验证令牌的情况下调用 `GET /secret`，看看会发生什么：


    ```

    $ curl -I http://localhost:4207/secret

    HTTP/1.1 405 Method Not Allowed

    ```


    要执行身份验证，你将使用可重复迁移中的用户用户名和密码调用 `POST /login`：


    ```

    $ curl -X POST \

    -d ''{"username":"august@crud.business","password":"1234"}'' \

    http://localhost:4207/login

    {"token":""}

    ```


    接下来，向 `GET /secret` 发起请求，并传入你获得的身份验证令牌，你应该会得到一个成功的结果：


    ```

    $ curl -H "Authorization: Bearer " \

    http://localhost:4207/secret

    {"hello":"august@crud.business"}

    ```


    如果你一切操作正确，你将获得 JWT 所代表用户的电子邮件。


    请注意 `Authorization` 标头的格式。它以文本 `"Bearer"` 开头，后跟实际的令牌。这是 HTTP 规范的一部分，因为 Authorization
    标头应首先说明身份验证方法（在本例中为 JWT 承载者），然后是实际的授权参数（JWT 本身）。如果没有 `"Bearer "` 前缀，你将无法成功进行身份验证。


    # 11. 部署到传统服务器环境


    如今，部署生产级 Web 应用最常见的方式是在传统的服务器环境中。本章介绍如何打包你的 Web 应用，以便你可以将其部署到多种类型的环境中，无论是单节点专用服务器还是分布式多服务器
    Kubernetes 集群。


    ## 打包为自包含的 JAR 文件


    对于任何类型的部署设置，你都需要将你的 Web 应用打包为一个自包含的 *Java 归档*（JAR）文件。

    '
- fmt: '### What’s a JAR File


    A JAR file is a file in the Zip package format that contains your code, as well
    as some metadata that points to the class that contains your `main` function.


    When you compile your web app, Gradle writes the compiled output to `build/classes/kotlin/main`
    and copies your resources to `build/resources/main`, as seen in Figure [11-1](#531928_1_En_1_Chapter.xhtml#Fig11).
    The essence of a JAR file is to place the contents of those folders into a single
    Zip file – and that’s about it.


    ![](images/531928_1_En_11_Chapter/531928_1_En_11_Fig1_HTML.png)


    A screenshot of a window titled kotlinbook-1.0-SNAPSHOT.jar. The files listed
    are Kotlinbook, META-INF, and logback.xml.


    Figure 11-1


    The contents of a `.jar` file, opened as a normal Zip file by Archive Utility
    on Ubuntu Linux


    Additionally, the JAR file will contain the file `META-INF/MANIFEST.MF`, which
    is a text file that contains some metadata about the build and the line `Main-Class`,
    which points to the specific class that the Java runtime should load and invoke
    the `main` function on.


    ### Self-Contained JAR Files


    A self-contained JAR file is just like a normal JAR file, but that also includes
    your third-party dependencies, all in a single file.


    To be able to run your web app, you need the third-party dependencies available.
    Third-party dependencies are also packaged as JAR files. When you run your web
    app locally, Gradle downloads and manages these JAR files and makes them available
    on the class path of the Java process that runs your code.


    When you build a JAR file for your server environment, you can set up Gradle to
    add all the third-party dependencies into the JAR file itself. That way, you end
    up with a self-contained JAR file that contains all your own code, as well as
    all the code for your third-party dependencies.


    The Java community commonly uses the names *fat jars* and *uberjars* to refer
    to self-contained JAR files that include third-party dependencies.


    ### Packaging with Gradle


    You’ll use Gradle to build self-contained JAR files. Gradle doesn’t have built-in
    support for building self-contained JAR files, or fat jars. So you’ll need to
    add the Shadow Gradle plugin ([*https://github.com/johnrengelman/shadow*](https://github.com/johnrengelman/shadow))
    to your `build.gradle.kts`:


    ```

    plugins {

    id("com.github.johnrengelman.shadow") version "7.1.2"

    }

    ```


    Note that you’re not just adding a dependency this time. In fact, you’re not adding
    a dependency at all, and you should leave the `dependencies` block unchanged.
    You’re installing a plugin and configuring a task for it.


    You already have a `plugins` block in `build.gradle.kts` that installs the Kotlin
    plugin itself, so you can add the Shadow plugin to the existing plugins block
    instead of duplicating the `plugins` block statement. It will work either way,
    though.


    The Shadow plugin needs to know which class it should execute the main function
    on, so that it can write the correct main class name to `META-INF/MANIFEST.MF`
    in the generated JAR file. You don’t have to add any additional configuration
    for this, though, as Shadow piggybacks on the plain JAR file that Gradle already
    knows how to build and that JAR file gets the main class name from the application
    plugin that you’ve already configured back in Chapter [1](#531928_1_En_1_Chapter.xhtml).


    ### Building the JAR File


    With the Shadow plugin installed, and Gradle configured, you can now execute the
    Gradle task `shadowJar` to build the actual fat jar file.


    You can either run `./gradlew shadowJar` in a terminal, or you can use the sidebar
    in IntelliJ to find the Gradle task there. It’s in the category “shadow,” as shown
    in Figure [11-2](#531928_1_En_11_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_11_Chapter/531928_1_En_11_Fig2_HTML.png)


    A screenshot of a window titled kotlinbook. Text reads Search everywhere, double
    shift. Go to file, ctrl plus shift plus n. Recent files, ctrl plus e. Navigation
    bar, alt plus home. Drop files here to open them.


    Figure 11-2


    The `shadowJar` Gradle task


    When the `shadowJar` task has finished, your fat jar file is available in `build/libs/kotlinbook-1.0-SNAPSHOT-all.jar`.
    This file contains all your own code, as well as all the third-party dependencies
    you’ve specified in `build.gradle.kts`.


    ### Executing the JAR File


    Later, you’ll set up the JAR file so that your production server environment is
    able to execute it. But first, you’ll test that it works correctly by executing
    it locally, in your own development environment.


    The essence of running a JAR file is to run the command `java -jar myfile.jar`.
    Try that now, but replace the name of the JAR file with the path to your actual
    JAR file that you built using the `shadowJar` Gradle task:


    ```

    java -jar build/libs/kotlinbook-1.0-SNAPSHOT-all.jar

    ```


    Lo and behold! Your web app is up and running!


    It’s running in the `"local"` environment. That’s because your main function sets
    up the environment to run your web app in with the statement `val env = System.getenv("KOTLINBOOK_ENV")
    ?: "local"`. And the JAR file you’ve built contains all the config files from
    `src/main/resources`. So your web app starts up out of the gate, in this new running
    environment.


    You can change the environment your web app runs in by setting `KOTLINBOOK_ENV`.
    If you’re on Windows, set it with `$Env:KOTLINBOOK_ENV = production`. On Linux
    or macOS, set it with `export KOTLINBOOK_ENV production`. Try running your web
    app again using `java -jar` and see what happens.


    It crashed! That’s because of the way you’ve structured your config files:


    ```

    Exception in thread "main" com.typesafe.config.ConfigException$UnresolvedSubstitution:
    app-production.conf @ jar:file:/home/augustl/IdeaProjects/kotlin-book/build/libs/kotlinbook-1.0-SNAPSHOT-all.jar!/app-production.conf:
    2: Could not resolve substitution to a value: ${KOTLINBOOK_COOKIE_ENCRYPTION_KEY}

    ```


    For the local environment, you’ve hard-coded default values for all the config
    properties in your system. But the secrets for your production environment should
    be secret, as explained in Chapter [3](#531928_1_En_3_Chapter.xhtml). So, in production
    mode, your web app expects that several environment variables are set. Typesafe
    Config will fail early, so it crashes immediately when it tries to load `app-production.conf`
    but is unable to find a value for the environment variables that you’ve specified
    that it should load its config values from.


    ## Packaging for Production


    You now have your code packaged as a JAR file that you can execute independently
    with all your code and third-party dependencies included. Next, you’ll learn how
    to package this JAR file so that you can easily run it in production.'
  raw: '### What’s a JAR File


    A JAR file is a file in the Zip package format that contains your code, as well
    as some metadata that points to the class that contains your `main` function.


    When you compile your web app, Gradle writes the compiled output to *build/classes/kotlin/main*
    and copies your resources to *build/resources/main*, as seen in Figure [11-1](#531928_1_En_1_Chapter.xhtml#Fig11).
    The essence of a JAR file is to place the contents of those folders into a single
    Zip file – and that’s about it.


    ![](images/531928_1_En_11_Chapter/531928_1_En_11_Fig1_HTML.png)


    A screenshot of a window titled kotlinbook-1.0-SNAPSHOT.jar. The files listed
    are Kotlinbook, META-INF, and logback.xml.


    Figure 11-1


    The contents of a **.jar** file, opened as a normal Zip file by Archive Utility
    on Ubuntu Linux


    Additionally, the JAR file will contain the file *META-INF/MANIFEST.MF*, which
    is a text file that contains some metadata about the build and the line Main-Class,
    which points to the specific class that the Java runtime should load and invoke
    the `main` function on.


    ### Self-Contained JAR Files


    A self-contained JAR file is just like a normal JAR file, but that also includes
    your third-party dependencies, all in a single file.


    To be able to run your web app, you need the third-party dependencies available.
    Third-party dependencies are also packaged as JAR files. When you run your web
    app locally, Gradle downloads and manages these JAR files and makes them available
    on the class path of the Java process that runs your code.


    When you build a JAR file for your server environment, you can set up Gradle to
    add all the third-party dependencies into the JAR file itself. That way, you end
    up with a self-contained JAR file that contains all your own code, as well as
    all the code for your third-party dependencies.


    The Java community commonly uses the names *fat jars* and *uberjars* to refer
    to self-contained JAR files that include third-party dependencies.


    ### Packaging with Gradle


    You’ll use Gradle to build self-contained JAR files. Gradle doesn’t have built-in
    support for building self-contained JAR files, or fat jars. So you’ll need to
    add the Shadow Gradle plugin ([*https://github.com/johnrengelman/shadow*](https://github.com/johnrengelman/shadow))
    to your *build.gradle.kts*:


    ```

    plugins {

    id("com.github.johnrengelman.shadow") version "7.1.2"

    }

    ```


    Note that you’re not just adding a dependency this time. In fact, you’re not adding
    a dependency at all, and you should leave the `dependencies` block unchanged.
    You’re installing a plugin and configuring a task for it.


    You already have a `plugins` block in *build.gradle.kts* that installs the Kotlin
    plugin itself, so you can add the Shadow plugin to the existing plugins block
    instead of duplicating the `plugins` block statement. It will work either way,
    though.


    The Shadow plugin needs to know which class it should execute the main function
    on, so that it can write the correct main class name to *META-INF/MANIFEST.MF*
    in the generated JAR file. You don’t have to add any additional configuration
    for this, though, as Shadow piggybacks on the plain JAR file that Gradle already
    knows how to build and that JAR file gets the main class name from the application
    plugin that you’ve already configured back in Chapter [1](#531928_1_En_1_Chapter.xhtml).


    ### Building the JAR File


    With the Shadow plugin installed, and Gradle configured, you can now execute the
    Gradle task `shadowJar` to build the actual fat jar file.


    You can either run `./gradlew shadowJar` in a terminal, or you can use the sidebar
    in IntelliJ to find the Gradle task there. It’s in the category “shadow,” as shown
    in Figure [11-2](#531928_1_En_11_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_11_Chapter/531928_1_En_11_Fig2_HTML.png)


    A screenshot of a window titled kotlinbook. Text reads Search everywhere, double
    shift. Go to file, ctrl plus shift plus n. Recent files, ctrl plus e. Navigation
    bar, alt plus home. Drop files here to open them.


    Figure 11-2


    The `shadowJar` Gradle task


    When the `shadowJar` task has finished, your fat jar file is available in *build/libs/kotlinbook-1.0-SNAPSHOT-all.jar*.
    This file contains all your own code, as well as all the third-party dependencies
    you’ve specified in *build.gradle.kts*.


    ### Executing the JAR File


    Later, you’ll set up the JAR file so that your production server environment is
    able to execute it. But first, you’ll test that it works correctly by executing
    it locally, in your own development environment.


    The essence of running a JAR file is to run the command `java -jar myfile.jar`.
    Try that now, but replace the name of the JAR file with the path to your actual
    JAR file that you built using the `shadowJar` Gradle task:


    ```

    java -jar build/libs/kotlinbook-1.0-SNAPSHOT-all.jar

    ```


    Lo and behold! Your web app is up and running!


    It’s running in the `"local"` environment. That’s because your main function sets
    up the environment to run your web app in with the statement `val env = System.getenv("KOTLINBOOK_ENV")
    ?: "local"`. And the JAR file you’ve built contains all the config files from
    *src/main/resources*. So your web app starts up out of the gate, in this new running
    environment.


    You can change the environment your web app runs in by setting `KOTLINBOOK_ENV`.
    If you’re on Windows, set it with `$Env:KOTLINBOOK_ENV = production`. On Linux
    or macOS, set it with `export KOTLINBOOK_ENV production`. Try running your web
    app again using `java -jar` and see what happens.


    It crashed! That’s because of the way you’ve structured your config files:


    ```

    Exception in thread "main" com.typesafe.config.ConfigException$UnresolvedSubstitution:
    app-production.conf @ jar:file:/home/augustl/IdeaProjects/kotlin-book/build/libs/kotlinbook-1.0-SNAPSHOT-all.jar!/app-production.conf:
    2: Could not resolve substitution to a value: ${KOTLINBOOK_COOKIE_ENCRYPTION_KEY}

    ```


    For the local environment, you’ve hard-coded default values for all the config
    properties in your system. But the secrets for your production environment should
    be secret, as explained in Chapter [3](#531928_1_En_3_Chapter.xhtml). So, in production
    mode, your web app expects that several environment variables are set. Typesafe
    Config will fail early, so it crashes immediately when it tries to load *app-production.conf*
    but is unable to find a value for the environment variables that you’ve specified
    that it should load its config values from.


    ## Packaging for Production


    You now have your code packaged as a JAR file that you can execute independently
    with all your code and third-party dependencies included. Next, you’ll learn how
    to package this JAR file so that you can easily run it in production.'
  trans: '

    ### 什么是 JAR 文件


    JAR 文件是一种采用 Zip 包格式的文件，其中包含你的代码，以及一些指向包含 `main` 函数的类的元数据。


    当你编译 Web 应用时，Gradle 会将编译后的输出写入 *build/classes/kotlin/main*，并将你的资源文件复制到 *build/resources/main*，如图
    11-1 所示。JAR 文件的本质就是将这两个文件夹的内容放入一个单一的 Zip 文件中——仅此而已。


    ![](img/531928_1_En_11_Fig1_HTML.png)


    一个标题为 kotlinbook-1.0-SNAPSHOT.jar 的窗口截图。列出的文件包括 Kotlinbook、META-INF 和 logback.xml。


    图 11-1


    在 Ubuntu Linux 上通过归档工具以普通 Zip 文件形式打开的 **.jar** 文件内容


    此外，JAR 文件还将包含文件 *META-INF/MANIFEST.MF*，这是一个文本文件，包含一些关于构建的元数据以及 Main-Class 行，该行指向
    Java 运行时应加载并调用其 `main` 函数的特定类。


    ### 自包含 JAR 文件


    自包含 JAR 文件与普通 JAR 文件类似，但它还将你的第三方依赖项也包含在同一个文件中。


    要运行你的 Web 应用，你需要有可用的第三方依赖项。第三方依赖项也打包为 JAR 文件。当你在本地运行 Web 应用时，Gradle 会下载并管理这些 JAR
    文件，并将它们添加到运行你代码的 Java 进程的类路径中。


    当你为服务器环境构建 JAR 文件时，你可以设置 Gradle 将所有第三方依赖项也添加到 JAR 文件本身中。这样，你最终会得到一个自包含的 JAR 文件，其中包含你自己的所有代码以及所有第三方依赖项的代码。


    Java 社区通常使用 *fat jars* 和 *uberjars* 这两个名称来指代包含第三方依赖项的自包含 JAR 文件。


    ### 使用 Gradle 打包


    你将使用 Gradle 来构建自包含的 JAR 文件。Gradle 本身并不内置支持构建自包含 JAR 文件（即 fat jars）。因此，你需要将 Shadow
    Gradle 插件（[*https://github.com/johnrengelman/shadow*](https://github.com/johnrengelman/shadow)）添加到你的
    *build.gradle.kts* 文件中：


    ```

    plugins {

    id("com.github.johnrengelman.shadow") version "7.1.2"

    }

    ```


    请注意，这次你不仅仅是添加一个依赖项。实际上，你根本没有添加依赖项，并且应该保持 `dependencies` 块不变。你正在安装一个插件并为其配置一个任务。


    你的 *build.gradle.kts* 中已经有一个用于安装 Kotlin 插件本身的 `plugins` 块，因此你可以将 Shadow 插件添加到现有的
    plugins 块中，而不是重复 `plugins` 块语句。不过，两种方式都能正常工作。


    Shadow 插件需要知道它应该在哪个类上执行 main 函数，以便它能在生成的 JAR 文件中的 *META-INF/MANIFEST.MF* 里写入正确的主类名。不过，你无需为此添加任何额外配置，因为
    Shadow 插件会复用 Gradle 已经知道如何构建的普通 JAR 文件，而该 JAR 文件会从你在第 1 章中已经配置好的 application 插件中获取主类名。


    ### 构建 JAR 文件


    安装好 Shadow 插件并配置好 Gradle 后，你现在可以执行 Gradle 任务 `shadowJar` 来构建实际的 fat jar 文件。


    你可以在终端中运行 `./gradlew shadowJar`，或者使用 IntelliJ 的侧边栏找到该 Gradle 任务。它位于“shadow”类别下，如图
    11-2 所示。


    ![](img/531928_1_En_11_Fig2_HTML.png)


    一个标题为 kotlinbook 的窗口截图。文本显示：搜索所有位置，双击 Shift。转到文件，Ctrl + Shift + N。最近文件，Ctrl +
    E。导航栏，Alt + Home。将文件拖到此处以打开它们。


    图 11-2


    `shadowJar` Gradle 任务


    当 `shadowJar` 任务完成后，你的 fat jar 文件位于 *build/libs/kotlinbook-1.0-SNAPSHOT-all.jar*。该文件包含你自己的所有代码，以及你在
    *build.gradle.kts* 中指定的所有第三方依赖项。


    ### 执行 JAR 文件


    稍后，你将设置 JAR 文件，以便你的生产服务器环境能够执行它。但首先，你将在自己的开发环境中本地执行它，以测试其是否正常工作。


    运行 JAR 文件的本质是执行命令 `java -jar myfile.jar`。现在尝试一下，但将 JAR 文件的名称替换为你使用 `shadowJar`
    Gradle 任务构建的实际 JAR 文件的路径：


    ```

    java -jar build/libs/kotlinbook-1.0-SNAPSHOT-all.jar

    ```


    瞧！你的 Web 应用已经启动并运行了！


    它正在 `"local"` 环境中运行。这是因为你的 main 函数通过语句 `val env = System.getenv("KOTLINBOOK_ENV")
    ?: "local"` 设置了运行 Web 应用的环境。而你构建的 JAR 文件包含了来自 *src/main/resources* 的所有配置文件。因此，你的
    Web 应用在这个新的运行环境中能够立即启动。


    你可以通过设置 `KOTLINBOOK_ENV` 来更改 Web 应用的运行环境。如果你使用的是 Windows，请使用 `$Env:KOTLINBOOK_ENV
    = production` 进行设置。在 Linux 或 macOS 上，请使用 `export KOTLINBOOK_ENV production` 进行设置。再次尝试使用
    `java -jar` 运行你的 Web 应用，看看会发生什么。


    它崩溃了！这是因为你配置文件的结构方式导致的：


    ```

    Exception in thread "main" com.typesafe.config.ConfigException$UnresolvedSubstitution:
    app-production.conf @ jar:file:/home/augustl/IdeaProjects/kotlin-book/build/libs/kotlinbook-1.0-SNAPSHOT-all.jar!/app-production.conf:
    2: Could not resolve substitution to a value: ${KOTLINBOOK_COOKIE_ENCRYPTION_KEY}

    ```


    对于本地环境，你已经在系统中为所有配置属性硬编码了默认值。但正如第 3 章所解释的，生产环境的密钥应该是保密的。因此，在生产模式下，你的 Web 应用期望设置多个环境变量。Typesafe
    Config 会提前失败，因此当它尝试加载 *app-production.conf* 但无法找到你指定的、应从中加载配置值的环境变量的值时，它会立即崩溃。


    ## 为生产环境打包


    现在，你的代码已打包成一个 JAR 文件，你可以独立执行它，其中包含了你的所有代码和第三方依赖项。接下来，你将学习如何打包这个 JAR 文件，以便你能够在生产环境中轻松运行它。

    '
- fmt: '### Building Docker Images


    The established way to package any software that’s going to run on a server is
    to build Docker images that package your web app JAR file, along with all the
    runtime dependencies.


    The benefit of containers like Docker ([www.docker.com](http://www.docker.com/))
    is that they include absolutely everything, from the operating system you use
    to the exact version of the Java runtime and to the exact `java` command that’s
    used to start up your web app. Additionally, pretty much all the production environments
    that exist support Docker images in some form. So packaging your web app in Docker
    images should work no matter which production environment you’ll use.


    At the core of Docker images is the `Dockerfile`. This is a specification file
    that tells Docker how to build your container image and how to start running the
    software that you’ve packaged. Listing [11-1](#531928_1_En_11_Chapter.xhtml#PC4)
    shows how to write a `Dockerfile` for your web app.


    ```

    FROM amazoncorretto:17.0.4

    RUN mkdir /app

    COPY build/libs/kotlinbook-1.0-SNAPSHOT-all.jar /app/

    CMD exec java -jar /app/kotlinbook-1.0-SNAPSHOT-all.jar

    Listing 11-1

    A Dockerfile for your web app

    ```


    That’s all there is to it. The first line says which Docker image you want to
    inherit from. `amazoncoretto:17.0.4` is an image that the Amazon teams provide,
    which includes a full Linux distribution, and comes preinstalled with Java 17
    Corretto, the same version of Java you’ve used to run the code you’ve written
    in this book. You can see all the Amazon Corretto Java versions available on the
    Docker Hub page for the `amazoncoretto` image at [https://hub.docker.com/_/amazoncorretto](https://hub.docker.com/_/amazoncorretto).


    There are many other Docker base images available that you can use instead, for
    different versions and builds of Java. For example, the Zulu Java distributions
    by Azure and Microsoft are available at [https://hub.docker.com/r/azul/zulu-openjdk](https://hub.docker.com/r/azul/zulu-openjdk).
    Open JDK’s Alpine Linux–based images ([https://hub.docker.com/_/openjdk](https://hub.docker.com/_/openjdk))
    used to be popular choices, but you should avoid them as Open JDK has deprecated
    their own images and won’t release any updates. There are other vendor-neutral
    alternatives available now, such as the Eclipse Temurin builds ([https://hub.docker.com/_/eclipse-temurin](https://hub.docker.com/_/eclipse-temurin)).


    You set up the Docker image to create a folder `/app` and to copy the fat jar
    that you build with `shadowJar` from your machine and into the Docker image container.
    Then, you use `CMD` to specify exactly how to load your web app. You can use the
    `CMD` to specify additional flags to the Java command too, such as flags to configure
    the memory limits, which garbage collector to use, JMX setup, and so on.


    To build the Docker image, run `docker build`:


    ```

    docker build -f Dockerfile -t kotlinbook:latest .

    ```


    This builds a Docker image into the local Docker repository. `-f` specifies the
    path to the `Dockerfile`. `-t` specifies tags. You can have as many tags as you
    like. By convention, `myimagename:latest` is how you point to the latest version
    of an image called `myimagename`, so you should always include that tag. Finally,
    `.` points to the working directory, which is how `docker build` knows where to
    find the files you tell it to `COPY`.


    Note that as your application grows, and your Docker build commands start taking
    too long, you can split up the Docker image into layers. For example, you could
    have your external dependencies in one layer and your own code in another. That
    way, your production environment doesn’t have to re-download your third-party
    dependencies every time you deploy the latest version, as that layer is unchanged
    and already cached on the production servers. This is not something I’ve needed
    to do in a real-world web app yet, but it’s worth mentioning regardless. You can
    investigate using a tool like Jib from Google ([https://github.com/GoogleContainerTools/jib](https://github.com/GoogleContainerTools/jib))
    instead of the Shadow plugin if you need to create layered Docker images.


    ### Running Docker Images Locally


    When you’ve built a Docker image, you can easily run it on your own machine.


    To run the Docker image you just built, use the following command:


    ```

    docker run -p 9000:4207 --name kotlinbook kotlinbook:latest

    ```


    The `-p` flag specifies port mapping. Here, you say that you want the port 9000
    on your machine to bind to the port 4207 inside the Docker image. Then, you name
    the running Docker image `kotlinbook`. And the Docker image you want to run is
    `kotlinbook:latest`, which refers to the tag you used when you built the Docker
    image using `docker build` earlier.


    When you run this command, you’ll see all the console output of the `java -jar`
    command that the Docker image executes. And if you open your browser on [http://localhost:9000](http://localhost:9000),
    you’ll see your web app up and running!


    Just like when you ran it directly on your machine using `java -jar`, your web
    app starts up in the default mode, which is in the local environment, which causes
    it to load your development default configuration values in `app-local.conf`.


    You can also pass the additional `-d` flag to `docker run` to make Docker run
    the image in the background, instead of taking up the entire terminal and displaying
    all the log output.


    If you want to rebuild and rerun your Docker image, you’ll have to remove the
    named `kotlinbook` image first by running the following command:


    ```

    docker rm -f kotlinbook

    ```


    If you try to run `docker run` again without first removing the `kotlinbook` image,
    you’ll get an error message saying that an image named `kotlinbook` already exists.'
