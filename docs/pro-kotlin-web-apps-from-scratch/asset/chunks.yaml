    要亲自验证这一点，请在浏览器中打开 *http://localhost:4207/secret*。这应该会将你重定向到登录页面，你可以使用在可重复迁移中创建的用户凭据登录。登录后，你会被再次重定向回
    `/secret`。


    ### 登出


    `/secret` 路由包含一个指向你尚未实现的路由 `/logout` 的链接。接下来你将实现这个路由，以便用户能够登出你的 Web 应用。


    登出路由除了执行登出操作并将用户重定向到未登录用户可访问的页面之外，不应做太多其他事情。在本示例中，你将把用户重定向回 `/login` 页面。清单 9-25
    展示了如何实现该路由。


    ```

    authenticate("auth-session") {

    get("/logout") {

    call.sessions.clear()

    call.respondRedirect("/login")

    }

    // ...

    清单 9-25

    在 setUpKtorCookieSecurity 中添加用于用户登出的路由

    ```


    从代码中可以看出，你将登出页面包裹在了 `authenticate` 拦截器中。这对安全性来说并不重要，但让未登录的用户访问登出页面确实没有意义。


    该处理器本身会清除会话 cookie 并重定向回登录页面。请注意，实际上无法取消设置 cookie。设置 cookie 的唯一方法是使用 `Set-Cookie`
    头并将其设置为某个值。因此，Ktor 和会话插件会将 cookie 设置为 `""`（空字符串）。这会导致后续命中 `authenticate` 拦截器的请求将该请求视为未经过身份验证。


    # 10. 构建基于 API 的后端


    在现代 Web 应用世界中，后端完全基于 API，并与移动应用或基于 JavaScript 的 Web 前端进行交互，这很常见。在本章中，你将学习如何为这些场景设置
    API。


    如果你是 Kotlin 新手，以下是一些你将在本章中看到示例的语言特性：


    *   使用第三方库解析和生成 JSON


    此外，在本章中，你将学习以下关于构建基于 API 的后端的内容：


    *   不同类型的身份验证


    *   如何为浏览器安全地设置 cookie


    *   为单页 Web 应用和原生应用构建 API


    ## 处理 API 调用


    API 调用就是一个普通的路由，与其他任何路由一样。到目前为止，你创建的所有使用 `JsonWebResponse` 的路由都是 API 路由，因为它们返回机器可读的数据。


    在本节中，你将学习一些关于构建 API 最佳实践的细节。


    ### 解析输入


    大多数 Web 应用都会以某种方式接收输入，因此你需要知道如何读取外部各方发布到你的 Web 处理器的数据。


    你已经在第 9 章中读取过表单编码的数据，当时你在基于 HTML 的 Web 应用设置中接收了用于表单登录的用户名和密码的表单参数。为此，你使用了 `call.receiveParameters()`，它会使用浏览器用于
    HTML 表单的表单数据编码来解析 HTTP 请求体。


    要读取 JSON，你只需将 HTTP 请求体作为纯字符串读取，并使用你已在第 4 章中安装的 Gson 库（[*https://github.com/google/gson*](https://github.com/google/gson)）进行解析，该库用于通过
    `JsonWebResponse` 编写 JSON 输出。与编写 JSON 相比，读取 JSON 唯一需要额外部骤是指定 Gson 应序列化数据的类——`Map`
    或 `List`。清单 10-1 展示了如何在你的 Web 处理器中读取 JSON 的示例。


    ```

    post("/test_json", webResponse {

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    JsonWebResponse(mapOf(

    "input" to input

    ))

    })

    清单 10-1

    在你的 Web 处理器中解析 JSON

    ```


    这个 Web 处理器所做的就是解析接收到的 JSON，并返回一个将解析后的 JSON 重新编码为 JSON 的响应。


    Ktor 函数 `call.receiveText()` 会自动处理编码，并使用该请求的 HTTP 头中指定的编码（如果请求未指定编码，则使用系统默认编码）将通过
    HTTP 提交的字节解析为字符串。


    ### 验证和提取输入


    为了使从 Web 处理器接收到的输入有用，你需要提取所接收数据的内容，并确保其格式符合 Web 应用业务逻辑的要求。


    你不仅仅想要验证类型是否正确。编程语言数据类型过于通用，无法直接使用。例如，你应该验证某人发布到你的 API 的电子邮件地址看起来确实像一个电子邮件地址。仅仅检查它是
    `String` 类型是不够的。


    我偏好的数据验证库是 Arrow。在第 8 章中，你安装了 Arrow（[*https://arrow-kt.io/*](https://arrow-kt.io/)），以演示
    `kotlin.coroutines` 和 `kotlinx.coroutines` 之间的区别。而使用的示例正是数据验证。因此，让我们基于那里展示的小示例进行构建，并在
    Web 处理器中实现实际的数据验证。


    Arrow 的好处在于，它为你验证的数据形状提供了完全的灵活性。Arrow 允许你从一个映射开始，最终得到一个验证错误或一个已初始化的数据类，而大多数其他
    Kotlin 数据验证库与数据类紧密耦合，迫使你先实例化一个数据类，然后再进行验证。


    在清单 8-10 中，你创建了一个 `ValidationError` 数据类、两个执行验证的函数（`validateEmail` 和 `validatePassword`），以及一个用于保存最终验证值的数据类（`MyUser`）。清单
    10-2 展示了如何在 Web 处理器内部将这些函数连接起来进行数据验证。


    ```

    post("/test_json", webResponse {

    either {

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    MyUser(

    email = validateEmail(input["email"]).bind(),

    password = validatePassword(input["password"]).bind()

    )

    }.fold(

    { err ->

    JsonWebResponse(

    mapOf("error" to err.error),

    statusCode = 422

    )

    },

    { user ->

    // .. 对 `user` 做一些操作

    JsonWebResponse(mapOf("success" to true))

    }

    )

    })

    清单 10-2

    使用 Arrow 验证 JSON 输入

    ```


    在这段代码中使用 Arrow 使其看起来直接且自然，但同时，Arrow 对 `kotlin.coroutines` 的使用使其相当巧妙。`Either` 和
    `bind` 都是*左偏的*，因此一旦某个绑定的语句返回 `Either` 的左侧（即一个 `ValidationError`），`either` 块内代码的执行就会在该点停止，并且该左侧值成为“胜出者”。如果所有绑定的
    `Either` 语句都返回右侧，则该值将简单地作为这些语句的结果返回，并且包含 `MyUser` 的右侧成为“胜出者”。


    `fold` 是 `Either` 上的一个函数，它会根据 `Either` 的结果调用左侧或右侧的 lambda。`fold` 也是一个标记为 `inline`
    的函数。如果你习惯了 JavaScript 甚至 Java 等语言中的回调，这段代码可能看起来只是调用了传递给 `fold` 的两个 lambda 之一，而没有返回任何内容。但由于
    `fold` 是内联的，你可以将 lambda 的内容视为在顶层（在 `fold` 函数外部）编写的，因此 `fold` 中 lambda 的返回值就是整个语句的返回值。


    所以，简而言之，这段代码要么返回错误的 `JsonWebResponse`，要么返回成功的 `JsonWebResponse`，具体取决于 `either`
    块内的任何验证是否返回了 `ValidationError`。

