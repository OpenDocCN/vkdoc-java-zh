- fmt: '### Mapping to a Data Class


    You can also represent query result rows as data classes. This is something I
    typically do for simpler queries where I select all columns of a table and I can
    reuse the same data class for multiple queries where the output is similar. Listing
    [6-13](#531928_1_En_6_Chapter.xhtml#PC14) shows an example of a data class that
    maps query results from the table `user_t`.


    ```

    data class User(

    val id: Long,

    val createdAt: ZonedDateTime,

    val updatedAt: ZonedDateTime,

    val email: String,

    val tosAccepted: Boolean,

    val name: String?,

    val passwordHash: ByteBuffer

    ) {

    companion object {

    fun fromRow(row: Map) = User(

    id = row["id"] as Long,

    createdAt = (row["created_at"] as OffsetDateTime)

    .toZonedDateTime(),

    updatedAt = (row["updated_at"] as OffsetDateTime)

    .toZonedDateTime(),

    email = row["email"] as String,

    name = row["name"] as? String,

    tosAccepted = row["tos_accepted"] as Boolean,

    passwordHash = ByteBuffer.wrap(

    row["password_hash"] as ByteArray

    )

    )

    }

    }

    dbSess.single(

    queryOf("SELECT * FROM user_t"),

    ::mapFromRow

    )?.let(User::fromRow)

    // User(

    //   id=1,

    //   createdAt=2022-07-27T16:40:44.410258+02:00,

    //   updatedAt=2022-07-27T16:40:44.410258+02:00,

    //   email=august@crud.business,

    //   tosAccepted=true,

    //   name=August Lilleaas,

    //   passwordHash=java.nio.HeapByteBuffer[pos=0 lim=6 cap=6]

    // )

    Listing 6-13

    Mapping query results to a data class

    ```


    The data class uses a `companion object` to define the function `fromRow` that
    creates an instance of `User` from a query result row. You could define `fromRow`
    as a stand-alone function, but it’s nice to be able to write `User.fromRow(...)`.
    It’s a common pattern in Kotlin to place various helper functions and constructor
    functions on companion objects. You can think of it as Kotlin’s version of static
    methods in Java.


    You call `User.fromRow` on the return value of `single()`. This is a good example
    of how you can use the `let` scope function combined with function references
    to save you from some typing and creation of intermediate variables. By calling
    `?.let()` instead of `.let()`, you handle the case of `single()` returning `null`
    if no matching row is found. `User.fromRow(...)` takes a single argument, the
    row data. The scope function `let` also takes a single argument, which is the
    object you called `let` on. So, in this case, you can use a function reference
    to `User::fromRow` instead of a lambda.


    Mapping tables to data classes is something I do rarely, but it depends on the
    circumstances. Usually, I take a hybrid approach. Listing [6-14](#531928_1_En_6_Chapter.xhtml#PC15)
    shows examples of both alternatives.


    ```

    def sendEmailToUserA(user: User) {

    deliverEmail(

    "Welcome, ${user["name"] ?: user["email"]}",

    user["email"] as String

    )

    }

    def sendEmailToUserB(userName: String?, userEmail: String) {

    deliverEmail(

    "Welcome, ${userName)}",

    userEmail

    )

    }

    def handleSignup() {

    val user = createUser(...).let(User::fromRow)

    sendEmailToUserA(user)

    sendEmailToUserB(user.name, user.email)

    }

    Listing 6-14

    How to combine a query result data class with business logic

    ```


    The issue with `sendEmailToUserA` is that anyone who wants to call that function
    must construct a full `User` object with all properties, when all that’s really
    required to call `sendEmailToUserA` is the name and the email. You could make
    most of the properties on the `User` data class nullable, but then it would no
    longer represent a valid user, as a user without an ID does not make sense.


    Instead, I prefer to write functions like `sendEmailToUserB`. That way, the function
    does not care about aggregates and just operates on the individual data points
    it requires to execute.


    Use your judgment here, though. Sometimes, passing on the full data class is advantageous,
    and it’s difficult to make a general rule for deciding when to do what.


    ## Database Transactions


    Transactions are a hallmark feature of SQL databases. I’ll assume some prior knowledge,
    and I won’t go into the many intricate details of modeling business logic around
    transactions. You need to learn how to create, commit, and roll back transactions,
    though.


    ### Creating Transactions


    Kotliquery sessions are not transactional. When you want to execute your database
    operations in a transaction, you must explicitly create a transaction by hand.


    To create a transaction, you call the `transaction` function on your Kotliquery
    session and pass a lambda to it. The lambda executes inside the transaction. Kotliquery
    commits the transaction when the lambda has finished running or rolls it back
    if your code in the lambda threw an exception. Listing [6-15](#531928_1_En_6_Chapter.xhtml#PC16)
    shows how that works.


    ```

    dbSess.transaction { txSess ->

    txSess.update(queryOf("INSERT INTO ..."))

    txSess.update(queryOf("INSERT INTO ..."))

    }

    Listing 6-15

    Create a transaction and execute SQL statements

    ```


    `txSess` represents the open transaction, and it has the exact same methods available
    as the normal Kotliquery session, such as `single`, `list`, `update`, `forEach`,
    etc. If both the `INSERT` statements in Listing [6-15](#531928_1_En_6_Chapter.xhtml#PC16)
    succeed, the transaction is committed. If, on the other hand, one of them fails,
    the `update` function will throw an exception, which the Kotliquery transaction
    handling code catches, and it rolls back the transaction instead of committing
    it.


    `ByteBuffer` is from `java.nio.ByteBuffer`. The password hash is a raw byte array,
    and on the Java platform, byte arrays don’t implement equality. So you’ll get
    a warning from the Kotlin compiler if you try to store `ByteArray` values directly
    on a data class. By wrapping the byte array in a `ByteBuffer`, the Kotlin data
    class can correctly compare two separate byte values to see if they’re equal.


    You can also throw an exception by hand if you want to roll back. Or you can call
    `txSess.connection.rollback()` directly.


    ### Transactions in Web Handlers


    In my experience, most web apps will require most or all of database-related code
    to run in a transaction. So it’s convenient to have a helper function for creating
    a web handler that also creates a transaction.


    You can do this by creating yet another version of `webResponse`, called `webResponseTx`.
    This function is just like `webResponseDb`, but in addition to creating a Kotliquery
    session, it also starts a transaction that wraps the entire web handler. Listing
    [6-16](#531928_1_En_6_Chapter.xhtml#PC17) contains an implementation of the `webResponseTx`
    function.


    ```

    fun webResponseTx(

    dataSource: DataSource,

    handler: suspend PipelineContext.(

    dbSess: TransactionalSession

    ) -> WebResponse) = webResponseDb(dataSource) { dbSess ->

    dbSess.transaction { txSess ->

    handler(txSess)

    }

    }

    Listing 6-16

    webResponseTx, a version of webResponseDb that also creates a transaction

    ```


    Tip


    Originally, Kotliquery did not support transactions inside suspend functions.
    `transaction` was not itself a `suspend` function, so the handler inside the lambda
    did not have access to the `suspend` scope. I submitted a pull request to fix
    it, and version 1.9 was released with that fix included. Open source FTW! See
    the pull request here: [`https://github.com/seratch/kotliquery/pull/57`](https://github.com/seratch/kotliquery/pull/57)*.*


    You call this function the same way as `webResponseDb` you created in Listing
    [6-9](#531928_1_En_6_Chapter.xhtml#PC10). The only difference between `webResponseTx`
    and `webResponseDb` is that the type of the session is `TransactionalSession`
    and `Session,` respectively.'
