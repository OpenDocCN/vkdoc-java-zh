- fmt: '# `lateinit` in Kotlin


    The most interesting thing about Listing [13-3](#531928_1_En_13_Chapter.xhtml#PC4)
    is the keyword `lateinit`.


    One big problem with the way Spring Context initializes your objects is that it
    uses properties instead of constructor arguments. When you manually configure
    bean instantiation, it’s technically possible to pass bean references as constructor
    arguments. But that requires extra work and breaks as soon as you try to use something
    like `@Autowired`, which is an annotation you add to properties of beans.


    The consequence of that is that all the properties that Spring Context sets must
    be nullable and mutable. If you declare properties as `val String myProp`, Kotlin
    won’t compile that class unless the compiler can guarantee that `myProp` is set
    by the constructor of that class, which means Kotlin can enforce its null-safety
    guarantees. So you’ll have to declare all properties as `var String? myProp =
    null` instead, so that the property starts out as `null` and is set to a `String`
    later when Spring Context runs through your object graph and initializes everything.


    This means that every time you access `myProp`, you must check if it’s `null`
    or use the non-null assertion operator (`!!`) to forcefully cast it to a non-null
    type.


    This is the problem that `lateinit` solves.


    For code that for technical reasons must start out as `null` when a class is instantiated,
    but that you know will be set to a non-null value before you are able to use an
    instance of that class, you can declare a property as a `lateinit var`. This lets
    you override the compile-time checks of Kotlin and tell the type system, “I promise
    this will be a non-null value by the time I use it.”


    In Listing [13-3](#531928_1_En_13_Chapter.xhtml#PC4), you declare a reference
    to the unmigrated data source as `lateinit var unmigratedDataSource: DataSource`.
    By the time Spring Context calls `getObject()` on your `MigratedDataSourceFactoryBean`,
    Spring Context will have set `unmigratedDataSource` to the proper value from your
    bean declarations. In other words, internally in the Spring Context state machines,
    it will never invoke methods on a bean until it has initialized all that bean’s
    dependencies. So, from a practical perspective, there’s no way `unmigratedDataSource`
    will ever be `null` when your code runs, and so it’s safe to use `lateinit` on
    properties that Spring Context initializes as part of the bean wiring process.


    Additionally, if you try to access a `lateinit var` that hasn’t been set yet,
    Kotlin will immediately throw a `kotlin.UninitializedPropertyAccessException`.
    So you won’t get a `null` in return, and you won’t accidentally pass nulls along
    to other parts of your system.


    This is an example of pragmatism of the Kotlin type system and is one of my favorite
    features in the whole Kotlin language. Kotlin is very explicit about handling
    values that can be `null`, but it still allows you to be a responsible programmer
    and lean on Kotlin’s null-safety guarantees even in scenarios where it’s technically
    possible that a value can be `null`.


    ## Starting Your Web App


    Your Spring Context initialization in `createApplicationContext` is now good to
    go, so the next step is to use it to start your actual web app.


    The initialization is like what you already have in *Main.kt*. Listing [13-4](#531928_1_En_13_Chapter.xhtml#PC5)
    shows how to start up your web app using your Spring Context.


    ```

    fun main() {

    log.debug("Starting application...")

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    log.debug("Application runs in the environment ${env}")

    val config = createAppConfig(env)

    log.debug("Creating app context")

    val ctx = createApplicationContext(config)

    log.debug("Getting data source")

    val dataSource =

    ctx.getBean("dataSource", DataSource::class.java)

    embeddedServer(Netty, port = config.httpPort) {

    createKtorApplication(config, dataSource)

    }.start(wait = true)

    }

    Listing 13-4

    A main() function in MainSpringContext.kt

    ```


    You still create your `WebappConfig` manually. You could set up `createApplicationConfig`
    so that it creates its own `WebappConfig`, but it’s convenient to be able to have
    full control of which exact database URL and so on that your Spring Context will
    use.


    `createKtorApplication` needs the plain data source to work, so you extract the
    `"dataSource"` bean from your Spring Context `ctx` object. Because you configured
    the `"dataSource"` bean to also run your migrations, you don’t have to explicitly
    run your migrations, as Spring Context has already run them.


    ## Extended Usage


    What about extended usage of Spring Context? For example, all your web handlers
    now operate exactly as before, by taking the parameters they use in as arguments,
    in plain functional style.


    You could write a web handler as a bean like this:


    ```

    beanFactory.registerSingleton(

    "springContextTestHandler",

    webResponse {

    TextWebResponse("Hello from Spring!")

    }

    )

    ```


    Then, you could add a route mapping for that handler like this:


    ```

    get(

    "/spring_context_test",

    ctx.getBean("springContextTestHandler") as

    PipelineInterceptor

    )

    ```


    The problem with this solution is that you haven’t really added any extra value,
    other than wrapping lambdas in Spring Context instead of inserting the lambda
    directly. There’s no way to inject dependencies into a lambda.


    You could go down the route of making factory holder beans and other noun-ridden
    constructs, but I tend to stay away from that sort of thing. Dependency injection
    adds value for initialization and teardown of resources, but for the implementation
    of web route handler functions, the only value dependency injection adds is that
    it adds some extra ceremony to the simple task of passing arguments to functions.


    # Enterprise Authentication Using Spring Security


    In this chapter, you’ll learn how to bridge the gap between the old and the new
    and add Spring Security ([*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security))
    to your Ktor-based web app.


    If your organization is already widely using Spring Security, you might already
    have lots of infrastructure in place that would take heroic efforts of breaking
    Conway’s law to change. Instead, you can add Spring Security to your modern Kotlin
    web app and leverage your organization’s existing plugins and expertise.


    Note that Spring Security is not meant to compose. Spring Security wraps your
    entire web app, and if you already have something else set up for authentication,
    such as the cookie-based authentication from Chapter [9](#531928_1_En_9_Chapter.xhtml)
    or a third-party system such as Keycloak ([*www.keycloak.org/*](http://www.keycloak.org/)),
    they will conflict and step on each other’s toes.


    ## Preparing Your Web App


    To make it possible to use Spring Security in your web app, there are some steps
    you need to take first. In short, your web app needs to be based on the servlet
    spec. Then, you’ll add Spring Security as a servlet filter, the main way of using
    Spring Security.'
