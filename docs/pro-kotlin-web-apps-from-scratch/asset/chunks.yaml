- fmt: '### Repeatable Migrations


    A good place for static seed data is *repeatable migrations*. This is a special
    type of migration that Flyway will always run every time you ask Flyway to execute
    your migrations. Flyway runs them after all the schema change migrations have
    finished running, so they will always operate on the latest version of the schema.


    Repeatable migrations are just like normal migrations – they’re a SQL file that
    runs some operations on your database. To create a repeatable migration, you put
    it alongside your normal migrations in `src/main/resources/db/migration`. But
    instead of naming the file `V{number}__{myFileName}.sql`, you name it `R__{myFileName}.sql`.
    Repeatable migrations do not have a version number, as Flyway doesn’t need one.
    The migration always runs.


    You also need to make sure that the actual SQL script is repeatable. Flyway doesn’t
    do anything smart or magic when it runs a repeatable migration. If your repeatable
    migration is full of `INSERT INTO` statements, you’ll get duplicated rows in your
    database every time Flyway runs your repeatable migration.


    How you’ll handle this varies from database to database. PostgreSQL has upsert
    statements, Oracle has merge statements, and so on. Listing [5-13](#531928_1_En_5_Chapter.xhtml#PC16)
    shows an example of how to write a merge statement in H2 that will either insert
    a new row or update an existing row, making the SQL statement safe to put in a
    repeatable migration.


    ```

    MERGE INTO user_t

    (email, password_hash, name, tos_accepted)

    KEY (email)

    VALUES

    (''august@crud.business'', ''456def'', ''August Lilleaas'', true);

    Listing 5-13

    A SQL statement that can run multiple times but will insert one row, making it
    safe for repeatable migrations

    ```


    H2 will check if a row exists with the provided email. If H2 can’t find it, it
    will insert a new row. If H2 finds a match, it will update that row instead of
    inserting a new one.


    ### Updating Repeatable Migrations


    You can’t change normal versioned migrations after Flyway has run them. But you
    can change repeatable migrations as much as you want. And Flyway will run the
    latest updated version every time your run your migrations.


    The whole point of a repeatable migration is that it contains SQL statements that
    put your database in the state you require it to be. This required state can (and
    likely will) change over time. So you can update your repeatable migration, and
    Flyway will run the latest version, making sure that your database is always up
    to date with the latest required seed data for your web app.


    Note that if you remove a SQL statement, Flyway won’t try to be smart and delete
    data that’s no longer present in your repeatable migration. How you solve that
    is up to you. You’re free to add `DELETE` statements to your repeatable migration
    if you want. Or you can just remove the statement that inserts the data and manually
    delete it yourself.


    ## Handling Failed Migrations


    Despite your best efforts, migrations can and will fail in production. Hopefully,
    they are a rare occurrence. But when they happen, you need to know how to handle
    them.


    ### Failed Migrations Locally


    If a migration fails locally, you have more options at hand. The data in your
    local development environment isn’t critical to anyone and is (or should be) completely
    dispensable.


    When a migration fails locally, what I typically do is to just wipe out the entire
    local database and create a new one. When you use H2, it’s as simple as deleting
    the database files in the `build/` folder, namely, `build/local.mv.db` and `build/local.trace.db`.


    All the core data in your system should be in a repeatable migration, and if you
    restart your web app, the migrations will run from scratch and create a new database
    with all the tables and data you need to work with the web app.


    ### Failed Migrations in Production


    If migrations fail in production, you need to be more careful about how you approach
    things.


    Ideally, your failed migration was backward compatible. So even if it failed,
    and the latest version of the code didn’t deploy, the previous version of the
    code that’s now still in production will work fine.


    If it wasn’t backward compatible, you probably have a sweaty forehead and a high
    pulse, because production is now *down* and you’re the cause.


    I won’t get into the exact kinds of operations you need to do to fix the borked
    migration. What you need to do to fix it depends entirely on your business logic,
    the contents of your migrations, and at what step of the migration the error occurred.


    ### Rerunning Failed Migration


    In general, there are two ways of solving it. The first is to make Flyway believe
    that it has never attempted to execute the new migration.


    The first step is to make any necessary manual changes to the database, by inputting
    SQL commands in the database by hand. Then, you make any changes needed to the
    migration file that failed.


    When that’s done, you restart your web app, which makes Flyway run the failed
    migration again.


    To make Flyway believe a migration never ran, you update the `flyway_schema_history`
    table (configured in Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8)) that Flyway
    uses for bookkeeping. Assuming the migration that failed was `V5`, you can run
    `DELETE FROM flyway_schema_history WHERE version = 5` to make Flyway rerun the
    migration from scratch next time you start your web app.


    ### Manually Performing Migration


    The second way to solve a failed migration is to finish the migration completely
    by hand and make Flyway believe the migration has already run.


    The first step is to manually run SQL commands against your database to make the
    database end up in a desirable state. Make sure you really think through what
    you’re doing here, and write your SQLs with care, as it’s possible for your database
    to end up in a state that’s different from what the Flyway migration specifies.


    To make Flyway believe a migration has executed successfully, you update the `flyway_schema_history`
    table and flag the migration as being successful. Assuming the migration that
    failed is still `v5`, you can run `UPDATE flyway_schema_history SET success =
    true WHERE version = 5`.


    The next time you run your web app, Flyway will see that according to its own
    tables, the migration is successful, so it won’t try to rerun it.


    # 6. Querying a SQL Database


    In Chapter [5](#531928_1_En_5_Chapter.xhtml), you set up a data source for managing
    connections to your database, and you configured Flyway to manage your database
    schema so that you have some tables in which you can execute queries. In this
    chapter, you’ll learn how to execute those queries.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - Null-safe casting and type checks of dynamic data

    - Companion objects in data classes

    - Generic types in plain Kotlin functions


    Also in this chapter, you will learn the following about querying SQL databases:


    - How to use SQL directly, instead of a database mapping library

    - Best practices for executing queries in production-grade web apps

    - How to structure your web app to get the highest amount of type safety and convenience

    - How to manage transactions


    I’m hard-pressed to think of a web app that doesn’t use a database. There are
    many databases out there, and SQL is not the best fit for all cases. But most
    web apps use SQL databases, so that’s what you’ll learn in this book.


    ## Setting Up Querying


    Building on the connection pool and schema management capabilities of Chapter
    [5](#531928_1_En_5_Chapter.xhtml), you need a few more things to be able to comfortably
    execute queries. In Chapter [5](#531928_1_En_5_Chapter.xhtml), you ran a small
    query using JDBC directly. But the JDBC API is full of boilerplate and is not
    that comfortable to work with. So you need a library to sit between you and JDBC
    and make your life better.'
