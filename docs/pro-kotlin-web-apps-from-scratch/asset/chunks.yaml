    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig9_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. Under
    Event sharing settings private option is selected. There is an option to format
    JSON. Three lines of code are displayed below.


    **Figure 12-9** – Specifying input parameters when running your AWS Lambda function


    If everything worked correctly, you should get a green box exactly like the one
    you got in Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7) when you ran your
    AWS Lambda function the first time, and if you expand the “Details” section of
    the green box, you’ll should see the JSON output with the result of your database
    query.


    ## Improving Performance


    There are many things you can do to improve the performance of your AWS Lambda
    handlers, which will help with both cost-saving and reducing latency and execution
    times of your web app.


    ### Performance and Cold Starts


    There’s an issue that’s specific to serverless runtimes that makes it important
    to make your handling code initialize as fast as possible: cold starts.


    Even though it’s called serverless, there’s a server *somewhere*. The serverless
    runtime needs to load your code into an actual server before it can execute. You
    only pay for the actual execution time of your code, so to save costs, the serverless
    environment will unload your code if it hasn’t executed it for some amount of
    time.


    When the serverless runtime hasn’t loaded your code, and you try to execute it,
    you’ll experience a cold start.


    When you executed the test call in Figure [12-8](#531928_1_En_12_Chapter.xhtml#Fig8),
    it was the first time you executed it after you uploaded the code. This means
    that the AWS Lambda serverless runtime didn’t have your code already loaded and
    ready to go. In Figure [12-8](#531928_1_En_12_Chapter.xhtml#Fig8), there are more
    details about the timings involved in running your handler function. It reports
    444.01 ms of *initialization duration* and 378.68 ms of *duration*, for a total
    of 822.69 ms. That number is the *cold start time* of your AWS Lambda handler.


    If you try to run a test execution of your lambda multiple times, the subsequent
    calls will be much faster than the initial call. That’s called a warm start. AWS
    Lambda already has your code loaded into its serverless runtime, and it doesn’t
    need to spend any time on initialization. In my testing of the `GetTestHelloWorld`
    lambda, the subsequent invocations only took about 2–3 ms. That makes sense –
    invoking a function on a Java process that’s up and running is fast and has little
    to no overhead compared with other runtime environments.


    ### Initialization Time vs. Execution Time


    To further optimize performance, you’ll investigate the separation of initialization
    time and execution time in AWS Lambda.


    Initialization time refers to cold starts only, specifically the time from when
    AWS Lambda starts loading your code and until the code has finished loading and
    AWS Lambda invokes your handler function (`handleRequest`).


    During this special initialization time, AWS Lambda beefs up the runtime by giving
    it the maximum amount of RAM and CPU, so that your code loads as fast as possible
    and gets the lowest possible cold start time. When the initialization phase is
    complete, AWS Lambda speeds down the runtime to match what you configured it to
    use. You pay for RAM-seconds, so the more RAM you allocated to your AWS Lambda
    handler, the more expensive it is to run it.


    On top of that, you don’t pay for initialization time. You only pay for the execution
    time of the first and subsequent invocations of your handler function.


    Because of this, you should take advantage of the high performance and free initialization
    phase and do as much work as possible statically, in the part of your code that
    runs before your handler executes.


    ### Lazy Loading


    There’s a red flag in the timings you received when you executed `GetTestHelloWorld`.
    For the cold start invocation, the initialization time was 444.01 ms, and the
    execution time was 378.68 ms. On subsequent invocations, there was no initialization
    time, as the serverless runtime already had your code loaded, but the execution
    time was only 2–3 ms.


    Why is the execution time so different on the cold start compared with subsequent
    warm start invocations?


    This is hard evidence that there’s initialization happening in your handler function.
    The first time you execute your handler function, there’s something that the serverless
    runtime for some reason hasn’t fully loaded.


    The reason for this is that the Java runtime lazily initializes all classes. And
    that’s a good thing. Your JAR file contains all of Ktor as well as the entirety
    of the dependencies that you’ve specified in `build.gradle.kts`. The Java runtime
    only parses and loads the compiled class files when they’re used by running code.
    Without this feature, you would soon hit the 10-second hard limit on initialization
    time on AWS Lambda, as loading and parsing all that code is a lot of work, which
    the Java runtime skips because of the lazy loading.


    But this has the side effect of causing the serverless runtime to load all the
    dependencies of your lambda classes during execution, not initialization! All
    the code in H2, HikariCP, `Main.kt`, and so on loads during the execution phase,
    as that’s the first time running code that references those classes.


    This also applies to your top-level `private val dataSource` declaration in `UserEmailSearch`.
    It might look like this code runs statically when you look at your Kotlin code.
    But because of implementation details in the way the Kotlin compiler writes Java
    class files, it doesn’t. Under the hood, Kotlin compiles the top-level declarations
    in `MainServerless.kt` to a Java class named `MainServerlessKt`. That class has
    a `static` initialization block that contains the code to initialize the `dataSource`
    property. But the first time your code refers to that class is inside the `handleRequest`
    function. Kotlin compiles `dataSource` to `MainServerlessKt.getDataSource()`.
    When the Java runtime encounters that call, it registers that it hasn’t loaded
    `MainServerlessKt` yet. So it loads that class, causing the corresponding static
    block to run. But that’s too late – you’re in the execution phase by that time,
    not in the initialization phase.'
