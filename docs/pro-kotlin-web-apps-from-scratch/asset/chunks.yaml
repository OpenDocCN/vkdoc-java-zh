    \n图 1-11\n\n按下 Enter 键，自动补全将添加完整的类名并自动添加导入\n\n![](img/531928_1_En_1_Fig10_HTML.png)\n\
    \n一个标题为 kotlinbook 的窗口截图，显示 Main.kt。在 kotlinbook 选项下选中了 main.kt 选项。在右侧选项卡中，文本显示为\
    \ package kotlinbook，并观察到五行代码。\n\n图 1-10\n\n在 IntelliJ IDEA 中部分输入 `LocalTime`\
