  trans: '

    ### 在数据类中存储配置


    通常，将系统中的数据纯粹作为数据来表示是很好的做法——而不是作为带有行为和错误状态的不透明对象。数据是透明且不可变的，除了数据本身之外，不携带任何额外的含义或行为。


    Kotlin 中的*数据类*弥合了对象与不可变数据之间的鸿沟。你可以将数据类视为受限且类型化的哈希映射。数据类仅存储数据，没有与之关联的行为。它内置了*值语义*：它是不可变的，并且实现了相等性，使得
    Java 平台认为包含相同数据的同一数据类的两个实例是相等的。


    列表 3-3 展示了配置文件的初始数据类表示。目前它只有一个属性，但稍后当你向配置文件添加更多属性时，你将对其进行扩展。


    ```

    data class WebappConfig(

    val httpPort: Int

    )

    列表 3-3

    用于表示配置文件的数据类

    ```


    这看起来就像一个普通的 Kotlin 类，只是它以关键字 `data` 开头，表明它是一个数据类，而不是一个普通类。


    括号内的代码是构造函数参数。通过在参数名称前添加 `val`，你向 Kotlin 表明，除了将 `httpPort` 作为第一个构造函数参数外，你还希望将其作为属性存储在类实例上。`val`
    表示不可变属性，而 `var` 使其可变。


    要创建此数据类的实例，你可以像在 Kotlin 中构造任何其他类一样构造它：


    ```

    WebappConfig(4207)

    ```


    正如你在第 2 章中看到的，你可以使用命名参数，以便阅读此代码的人能够理解数字 `4207` 的含义。事实上，在 Kotlin 中，对数据类始终使用命名参数是一种约定。这使代码更具可读性，并且当你拥有多个构造函数参数时，你不必按照它们在数据类中定义的顺序传递它们：


    ```

    WebappConfig(

    httpPort = 4207

    )

    ```


    ### 将配置加载到数据类中


    下一步是将 `Config` 对象从 Typesafe Config 转换为你自己的 `WebappConfig` 实例。


    最简单的方法是完全手动进行映射：


    ```

    WebappConfig(

    httpPort = config.getInt("httpPort")

    )

    ```


    你的配置现在将尽早失败。当你加载配置并创建 `WebappConfig` 实例时，你将立即在 config 上调用 `getInt`，如果 Typesafe
    Config 无法将其转换为整数，则会失败。


    它在访问时也是类型安全的。Kotlin 知道你命名了配置属性 `httpPort`。输入 `config.getInt("http proot")` 会导致运行时错误，但
    `config.httpProot` 会在你编译代码时失败。


    ### Kotlin 空安全


    Kotlin 对空安全要求严格。如果你将 null 传递给不处理 null 的内容，Kotlin 将抛出编译错误。


    `WebappConfig` 对 `httpPort` 属性使用了*非空*类型 `Int`。这意味着如果你尝试执行类似 `WebappConfig(httpPort
    = null)` 的操作，你将收到编译错误。


    如果你希望能够将某些内容设置为 null，则应改用*可空类型*。列表 3-4 展示了添加可空类型 `String?` 以在配置中存储数据库密码的示例。


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbPassword: String?

    )

    列表 3-4

    包含可空和非空类型的数据类

    ```


    如果你尝试将 `httpPort` 设置为 `null`，你仍然会收到编译错误。但你可以将 `dbPassword` 设置为 `null`，例如 `WebappConfig(httpPort
    = 4207, dbPassword = null)`。数据类还允许你通过 `WebappConfig(httpPort = 4207)` 省略可空属性，作为将它们设置为
    null 的便捷快捷方式。


    ### Kotlin 平台类型


    Kotlin 有一个称为*平台类型*的概念。Java 的类型系统比 Kotlin 弱，尤其是在 null 方面。Java 允许任何对象引用随时为 `null`。Typesafe
    Config 是用 Java 编写的，这意味着 Kotlin 编译器无法在编译时保证返回对象的 Java 方法不为 `null`。


    Java 方法 `config.getInt("...")` 的 Java 返回类型是 `int`（一个原始整数类型），而不是对象类型 `Integer`。Java
    中的原始类型永远不能为 null，因此 Kotlin 将其转换为非空类型 `Int`。


    然而，Java 方法 `config.getString("...")` 的 Java 返回类型是 `String`，它是一个对象，并且*可以*为 null。但是，Kotlin
    *不会*将其转换为可空类型 `String?`。相反，它被转换为*平台类型* `String!`。


    平台类型本质上意味着“我允许你将这个可能为 `null` 的东西传递给非空类型”。列表 3-5 展示了如何将平台类型传递给非空类型，即使 Kotlin 编译器在编译时不知道该值是否为
    null。


    ```

    data class WebappConfig(

    val httpPort: Int,

    val dbUsername: String,

    val dbPassword: String?

    )

    WebappConfig(

    httpPort = 4207,

    dbUsername = config.getString("dbUsername")

    )

    列表 3-5

    将平台类型 String! 传递给非空类型 String

    ```


    如果 Kotlin 允许创建 `dbUsername` 设置为 `null` 的 `WebappConfig`，那么 Kotlin 类型系统的所有保证都将失效，并且任何读取
    `dbUsername` 的代码都容易出现空指针异常。


    值得庆幸的是，Kotlin 在这里也会尽早失败。Kotlin 为所有类型为非空的变量和属性赋值添加了运行时检查。你会得到一个空指针异常，但会在你的代码尝试创建
    `dbUsername` 设置为 `null` 的 `WebappConfig` 实例的那一刻得到它。这意味着你的代码中所有操作非空类型的地方仍将继续安全地运行，因为
    Kotlin 不允许在运行时创建无效类型。


    ### 在你的 Web 应用中使用数据类


    当你的 Web 应用启动时，你应该尽快加载配置文件并创建 `WebappConfig` 的实例。稍后，当你添加更多功能时，它可能需要配置属性易于访问，以便你可以使用它们来连接你的
    Web 应用。因此，连接配置通常是 Web 应用做的第一件事，然后它才会启动。


    列表 3-6 展示了如何创建一个函数，该函数首先加载配置文件，然后创建 `WebappConfig` 的实例，以便你可以使用配置。


    ```

    fun createAppConfig(): WebappConfig {

    val rawConfig = ConfigFactory

    .parseResources("app.conf")

    .resolve()

    return WebappConfig(

    httpPort = rawConfig.getInt("httpPort")

    )

    }

    列表 3-6

    创建一个用于在 Web 应用中加载配置的函数

    ```


    你现在拥有与之前相同的 `WebappConfig`，但你是将值存储在配置文件中，而不是硬编码到源代码中。

    '
- fmt: '### Use `let` Blocks to Avoid Intermediate Variables


    Listing [3-6](#531928_1_En_3_Chapter.xhtml#PC11) has a problem that you should
    fix. You’re only using the value `rawConfig` temporarily while creating your `WebappConfig`.
    `rawConfig` is now available to all the other code in this scope. And it makes
    the code harder to read, as it introduces an extra name your brain must understand
    and keep track of.


    It''s better to instead use a `let` block. Listing [3-7](#531928_1_En_3_Chapter.xhtml#PC12)
    shows an example of how you can use a `let` block to avoid the extra named variable
    `rawConfig` and return the `WebappConfig` instance directly in a single statement.


    ```

    fun createAppConfig() =

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    Listing 3-7

    Create the WebappConfig using a let statement

    ```


    A `let` block is not special or magical syntax. It’s just a function, and you
    can call `let` on all types. `let` takes a single lambda and returns whatever
    the lambda returns. In this case, `let` returns an instance of `WebappConfig`,
    as Lambdas will return the last statement in them. You don’t have to explicitly
    write `return` for a lambda to return something.


    The lambda in `let` also gets a single argument passed to it, which is whatever
    object or value you called `let` on. In this case, you called `let` on `ConfigFactory.load()`,
    which returns a `Config` object from Typesafe Config. So the lambda in `let` gets
    this `Config` object passed to it.


    A lambda with a single argument is so common that Kotlin has a shortcut for referring
    to that argument: `it`. You could write `.let { myThing -> doSomething(myThing)
    }`, but to save you some typing and to have a common name that’s easy to recognize,
    you can also write `.let { doSomething(it) }`.


    Also note that when a function body is a single statement, you don’t have to specify
    the return type of the function, and you can replace the curly brackets and the
    `return` with an equals sign and the single statement that makes up the function
    body. Kotlin calls this a *single-expression function*.


    ## Provide Different Default Values for Different Environments


    Currently, your configuration file can define the `httpPort` where you want your
    web app to start. But what happens if you need a different `httpPort` in your
    production environment? Your configuration file needs a way to specify different
    defaults for different environments.


    The ideal setup is to have a set of default config values that works for most
    environments. Then, you should be able to override specific config values for
    specific environments, such as binding a different HTTP port locally and in the
    production environment.


    ### Environment-Specific Config Files


    To group the different config properties for the different environments, you can
    create a separate file for each environment you need to support and use those
    files to override values in `app.conf`.


    Typically, you’ll need at least two extra config files:


    *   `app-local.conf`

    *   `app-production.conf`


    These files override values for the local development environment and the live
    production environment, respectively.


    This separation gives you full control of how you want to override defaults from
    `app.conf`.


    For example, let’s say you can enable or disable the actual sending of SMS messages
    in your web app. You can set it to disabled by default in `app.conf` and enable
    it in `app-production.conf`. This ensures that you don’t send SMS messages by
    accident in your local test environment and that if you add an additional environment
    later, SMS delivery will be off by default.


    Conversely, let’s say you have a cumbersome but very secure way of logging into
    your web app. You can set this to enabled by default in `app.conf` and disable
    it in `app-local.conf`. This lets you implement a more convenient way of logging
    in for local development, but you won’t accidentally turn off secure authentication
    in your production environment.


    ### Define the Web App Environment


    To support running your web app in different environments and with different config
    values, you need a way to specify which environment the web app is supposed to
    run in.


    You can use operating system environment variables to do this. The default environment
    should be set to `"local"`, and then an environment variable can be set to override
    it to whatever the environment variable specifies, such as `"production"`. The
    code in Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13) shows how to read an
    environment variable and, if it’s not set, use `"local"` instead. To make it easy
    to debug your web app, Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13) also logs
    the actual value of `env` that your web app is using.


    ```

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    log.debug("Application runs in the environment ${env}")

    Listing 3-8

    Use environment variables to specify the environment your web app is running in

    ```


    This code uses the *Elvis operator*, which is a convenient way to specify a default
    value when something is `null` or `false`. The statement `System.getenv("KOTLINBOOK_ENV")
    ?: "local"` means that if the call to `System.getenv()` returns `null`, the statement
    will return `"local"`, the value on the right side of the Elvis operator. This
    sets your config loading up so that you don’t have to set the environment variable
    `KOTLINBOOK_ENV` for your code to work.


    ### Override Defaults with Environment-Specific Config


    Currently, your code only reads values from `app.conf`. You need to update it
    to override values in `app.conf` with values in `app-[your environment].conf`.


    In Typesafe Config, you can do this with *fallback configs*. In Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13),
    you set the variable `env` to the environment your web app runs in. Instead of
    loading `app.conf`, you’ll load `"app-${env}.conf"`.


    In Listing [3-9](#531928_1_En_3_Chapter.xhtml#PC14), you can see how to use `withFallback()`
    to tell Typesafe Config to load values from `app.conf` when you ask the `Config`
    object to get a value that isn’t present in `"app-${env}.conf"`.


    ```

    fun createAppConfig(env: String) =

    ConfigFactory

    .parseResources("app-${env}.conf")

    .withFallback(ConfigFactory.parseResources("app.conf"))

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    // In your main function:

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    val config = createAppConfig(env)

    Listing 3-9

    Load your environment-specific config file and fall back to app.conf for default
    values

    ```


    Make sure you create an empty `app-local.conf` before you run this code. The default
    environment is `"local"`, and the code will always try to load the environment-specific
    config file. Typesafe Config will fail if the file you specified isn’t on the
    class path.


    ## Secret Config Values


    You should check the configuration files into version control. The checked-in
    config files should hold most of the config values in your system. But you also
    need a method for handling secret config values, like database passwords, that
    you should not check into version control.'
  raw: '### Use `let` Blocks to Avoid Intermediate Variables


    Listing [3-6](#531928_1_En_3_Chapter.xhtml#PC11) has a problem that you should
    fix. You’re only using the value `rawConfig` temporarily while creating your `WebappConfig`.
    `rawConfig` is now available to all the other code in this scope. And it makes
    the code harder to read, as it introduces an extra name your brain must understand
    and keep track of.


    It''s better to instead use a `let` block. Listing [3-7](#531928_1_En_3_Chapter.xhtml#PC12)
    shows an example of how you can use a `let` block to avoid the extra named variable
    `rawConfig` and return the `WebappConfig` instance directly in a single statement.


    ```

    fun createAppConfig() =

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    Listing 3-7

    Create the WebappConfig using a let statement

    ```


    A `let` block is not special or magical syntax. It’s just a function, and you
    can call `let` on all types. `let` takes a single lambda and returns whatever
    the lambda returns. In this case, `let` returns an instance of `WebappConfig`,
    as Lambdas will return the last statement in them. You don’t have to explicitly
    write `return` for a lambda to return something.


    The lambda in `let` also gets a single argument passed to it, which is whatever
    object or value you called `let` on. In this case, you called let on `ConfigFactory.load()``,`
    which returns a `Config` object from Typesafe Config. So the lambda in `let` gets
    this Config object passed to it.


    A lambda with a single argument is so common that Kotlin has a shortcut for referring
    to that argument: `it`. You could write `.let { myThing -> doSomething(myThing)
    }`, but to save you some typing and to have a common name that’s easy to recognize,
    you can also write `.let { doSomething(it) }`.


    Also note that when a function body is a single statement, you don’t have to specify
    the return type of the function, and you can replace the curly brackets and the
    `return` with an equals sign and the single statement that makes up the function
    body. Kotlin calls this a *single-expression function*.


    ## Provide Different Default Values for Different Environments


    Currently, your configuration file can define the `httpPort` where you want your
    web app to start. But what happens if you need a different `httpPort` in your
    production environment? Your configuration file needs a way to specify different
    defaults for different environments.


    The ideal setup is to have a set of default config values that works for most
    environments. Then, you should be able to override specific config values for
    specific environments, such as binding a different HTTP port locally and in the
    production environment.


    ### Environment-Specific Config Files


    To group the different config properties for the different environments, you can
    create a separate file for each environment you need to support and use those
    files to override values in `app.conf`.


    Typically, you’ll need at least two extra config files:


    *   `app-local.conf`


    *   `app-production.conf`


    These files override values for the local development environment and the live
    production environment, respectively.


    This separation gives you full control of how you want to override defaults from
    `app.conf`.


    For example, let’s say you can enable or disable the actual sending of SMS messages
    in your web app. You can set it to disabled by default in `app.conf` and enable
    it in `app-production.conf`. This ensures that you don’t send SMS messages by
    accident in your local test environment and that if you add an additional environment
    later, SMS delivery will be off by default.


    Conversely, let’s say you have a cumbersome but very secure way of logging into
    your web app. You can set this to enabled by default in `app.conf` and disable
    it in `app-local.conf`. This lets you implement a more convenient way of logging
    in for local development, but you won’t accidentally turn off secure authentication
    in your production environment.


    ### Define the Web App Environment


    To support running your web app in different environments and with different config
    values, you need a way to specify which environment the web app is supposed to
    run in.


    You can use operating system environment variables to do this. The default environment
    should be set to `"local"`, and then an environment variable can be set to override
    it to whatever the environment variable specifies, such as `"production"`. The
    code in Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13) shows how to read an
    environment variable and, if it’s not set, use `"local"` instead. To make it easy
    to debug your web app, Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13) also logs
    the actual value of `env` that your web app is using.


    ```

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    log.debug("Application runs in the environment ${env}")

    Listing 3-8

    Use environment variables to specify the environment your web app is running in

    ```


    This code uses the *Elvis operator*, which is a convenient way to specify a default
    value when something is `null` or `false`. The statement `System.getenv("KOTLINBOOK_ENV")
    ?: "local"` means that if the call to `System.getenv()` returns `null`, the statement
    will return `"local"`, the value on the right side of the Elvis operator. This
    sets your config loading up so that you don’t have to set the environment variable
    `KOTLINBOOK_ENV` for your code to work.


    ### Override Defaults with Environment-Specific Config


    Currently, your code only reads values from `app.conf`. You need to update it
    to override values in `app.conf` with values in `app-[your environment].conf`.


    In Typesafe Config, you can do this with *fallback configs*. In Listing [3-8](#531928_1_En_3_Chapter.xhtml#PC13),
    you set the variable `env` to the environment your web app runs in. Instead of
    loading `app.conf`, you’ll load `"app-${env}.conf"`.


    In Listing [3-9](#531928_1_En_3_Chapter.xhtml#PC14), you can see how to use `withFallback()`
    to tell Typesafe Config to load values from `app.conf` when you ask the `Config`
    object to get a value that isn’t present in `"app-${env}.conf"`.


    ```

    fun createAppConfig(env: String) =

    ConfigFactory

    .parseResources("app-${env}.conf")

    .withFallback(ConfigFactory.parseResources("app.conf"))

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    // In your main function:

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    val config = createAppConfig(env)

    Listing 3-9

    Load your environment-specific config file and fall back to app.conf for default
    values

    ```


    Make sure you create an empty `app-local.conf` before you run this code. The default
    environment is `"local"`, and the code will always try to load the environment-specific
    config file. Typesafe Config will fail if the file you specified isn’t on the
    class path.


    ## Secret Config Values


    You should check the configuration files into version control. The checked-in
    config files should hold most of the config values in your system. But you also
    need a method for handling secret config values, like database passwords, that
    you should not check into version control.'
  trans: '

    ### 使用 `let` 块避免中间变量


    清单 3-6 存在一个需要修复的问题。在创建 `WebappConfig` 时，你只是临时使用了 `rawConfig` 这个值。现在，`rawConfig`
    对该作用域内的所有其他代码都是可用的。这引入了一个你的大脑需要理解和跟踪的额外名称，使得代码更难阅读。


    更好的做法是使用 `let` 块。清单 3-7 展示了一个示例，说明如何使用 `let` 块来避免额外的命名变量 `rawConfig`，并直接在一个语句中返回
    `WebappConfig` 实例。


    ```

    fun createAppConfig() =

    ConfigFactory

    .parseResources("app.conf")

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    清单 3-7

    使用 let 语句创建 WebappConfig

    ```


    `let` 块并非特殊或神奇的语法。它只是一个函数，你可以在所有类型上调用 `let`。`let` 接收一个 lambda 表达式，并返回该 lambda
    表达式返回的任何内容。在此例中，`let` 返回一个 `WebappConfig` 实例，因为 Lambda 表达式会返回其中的最后一条语句。你无需为 lambda
    表达式显式编写 `return` 来返回内容。


    `let` 中的 lambda 表达式还会接收一个参数，即你调用 `let` 的对象或值。在此例中，你在 `ConfigFactory.load()` 上调用了
    `let`，它返回一个来自 Typesafe Config 的 `Config` 对象。因此，`let` 中的 lambda 表达式会接收到这个 `Config`
    对象。


    只有一个参数的 lambda 表达式非常常见，因此 Kotlin 提供了一个引用该参数的快捷方式：`it`。你可以写成 `.let { myThing ->
    doSomething(myThing) }`，但为了减少输入并拥有一个易于识别的通用名称，你也可以写成 `.let { doSomething(it) }`。


    另外请注意，当函数体是单个语句时，你无需指定函数的返回类型，并且可以用等号和构成函数体的单个语句来替换花括号和 `return`。Kotlin 将此称为*单表达式函数*。


    ## 为不同环境提供不同的默认值


    目前，你的配置文件可以定义你希望 Web 应用启动的 `httpPort`。但是，如果你在生产环境中需要不同的 `httpPort` 该怎么办？你的配置文件需要一种方法来为不同环境指定不同的默认值。


    理想的设置是拥有一组适用于大多数环境的默认配置值。然后，你应该能够为特定环境覆盖特定的配置值，例如在本地和生产环境中绑定不同的 HTTP 端口。


    ### 特定于环境的配置文件


    为了对不同环境的配置属性进行分组，你可以为你需要支持的每个环境创建一个单独的文件，并使用这些文件来覆盖 `app.conf` 中的值。


    通常，你至少需要两个额外的配置文件：


    *   `app-local.conf`


    *   `app-production.conf`


    这些文件分别覆盖本地开发环境和线上生产环境的值。


    这种分离让你可以完全控制如何覆盖 `app.conf` 中的默认值。


    例如，假设你可以在 Web 应用中启用或禁用实际发送短信的功能。你可以在 `app.conf` 中将其默认设置为禁用，并在 `app-production.conf`
    中启用它。这可以确保你不会在本地测试环境中意外发送短信，并且如果你以后添加了其他环境，短信发送功能默认是关闭的。


    相反，假设你有一种繁琐但非常安全的登录 Web 应用的方式。你可以在 `app.conf` 中将其默认设置为启用，并在 `app-local.conf` 中禁用它。这让你可以为本地开发实现更方便的登录方式，但不会在生产环境中意外关闭安全认证。


    ### 定义 Web 应用环境


    为了支持在不同的环境中使用不同的配置值运行 Web 应用，你需要一种方法来指定 Web 应用应该在哪个环境中运行。


    你可以使用操作系统环境变量来实现这一点。默认环境应设置为 `"local"`，然后可以通过设置环境变量将其覆盖为环境变量指定的任何值，例如 `"production"`。清单
    3-8 中的代码展示了如何读取环境变量，如果未设置，则使用 `"local"` 作为替代。为了便于调试 Web 应用，清单 3-8 还会记录 Web 应用正在使用的
    `env` 的实际值。


    ```

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    log.debug("Application runs in the environment ${env}")

    清单 3-8

    使用环境变量指定 Web 应用运行的环境

    ```


    这段代码使用了 *Elvis 操作符*，这是一种在值为 `null` 或 `false` 时指定默认值的便捷方式。语句 `System.getenv("KOTLINBOOK_ENV")
    ?: "local"` 意味着如果对 `System.getenv()` 的调用返回 `null`，则该语句将返回 `"local"`，即 Elvis 操作符右侧的值。这样设置你的配置加载，使得你的代码无需设置环境变量
    `KOTLINBOOK_ENV` 也能工作。


    ### 使用特定于环境的配置覆盖默认值


    目前，你的代码只从 `app.conf` 读取值。你需要更新它，以便用 `app-[你的环境].conf` 中的值覆盖 `app.conf` 中的值。


    在 Typesafe Config 中，你可以通过*回退配置*来实现这一点。在清单 3-8 中，你将变量 `env` 设置为 Web 应用运行的环境。你将加载
    `"app-${env}.conf"`，而不是加载 `app.conf`。


    在清单 3-9 中，你可以看到如何使用 `withFallback()` 来告诉 Typesafe Config，当你向 `Config` 对象请求一个在
    `"app-${env}.conf"` 中不存在的值时，从 `app.conf` 加载该值。


    ```

    fun createAppConfig(env: String) =

    ConfigFactory

    .parseResources("app-${env}.conf")

    .withFallback(ConfigFactory.parseResources("app.conf"))

    .resolve()

    .let {

    WebappConfig(

    httpPort = it.getInt("httpPort")

    )

    }

    // 在你的 main 函数中：

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    val config = createAppConfig(env)

    清单 3-9

    加载特定于环境的配置文件，并回退到 app.conf 以获取默认值

    ```


    在运行此代码之前，请确保你创建了一个空的 `app-local.conf`。默认环境是 `"local"`，代码将始终尝试加载特定于环境的配置文件。如果你指定的文件不在类路径上，Typesafe
    Config 将会失败。


    ## 机密配置值


    你应该将配置文件检入版本控制。已检入的配置文件应包含系统中的大部分配置值。但是，你还需要一种方法来处理不应检入版本控制的机密配置值，例如数据库密码。

    '
- fmt: '### Don’t Store Secrets in Version Control


    First, let’s add some detail to why it’s important to not store secrets in version
    control.


    At first, it might seem convenient to store everything in a single file and have
    it checked into version control. Your source code probably isn’t accessible to
    the public, and you already have a tight regime on who has access to the source
    code and the config files.


    There are two big problems I want to highlight, though.


    The first problem is accidental source code leaks. A simple click of a button
    is all it takes to make a repository on a hosting site like GitHub accessible
    to the public. If this happens, it’s not just your source code that leaked to
    the public, but also all the secrets that you checked into version control. This
    can include API keys and signing secrets for verifying authenticity against third-party
    systems, as well as passwords for database access and so on.


    The second problem is that everyone that has access to the source code also has
    access to all the secrets that you’ve checked into version control. In some scenarios,
    regulation such as GDPR or PSD2 in Europe mandates that only a subset of certified
    and vetted developers has access to personal identifiable information (PII) or
    financial transaction data. And for security reasons in general, it can be a good
    idea to restrict access to live production data. If you don’t store secrets in
    version control, you don’t have to vet and certify every developer who has access
    to the code source. These developers can instead develop and test against staging
    environments that contain fake PII and can’t transfer real money.


    Note that I am not a lawyer. You should confer with your lawyer for all legal
    issues. Don’t take legal advice from a software developer.


    You need a mechanism to provide secrets to your web app, other than the config
    files. Operating system environment variables are a great fit for this.


    `Typesafe Config` has built-in support for reading from environment variables,
    so you don’t have to change the code that loads your config files. `Typesafe Config`
    has a concept of *substitutions*. This means that your config file can contain
    the name of the environment variable you want to read from, instead of the actual
    raw value.


    For example, if you want to read the web app HTTP port from an environment variable,
    you can replace `httpPort = 4207` with `httpPort = ${KOTLINBOOK_HTTP_PORT}`. It’s
    common to use uppercase and underscores for environment variable names and to
    prefix the environment variables that you use with the name of your system. This
    makes `KOTLINBOOK_HTTP_PORT` a good name for an environment variable.


    Listing [3-10](#531928_1_En_3_Chapter.xhtml#PC15) shows how `app.conf` can set
    the value of `httpPort` to `4207`, like you’ve seen earlier in this chapter. Listing
    [3-11](#531928_1_En_3_Chapter.xhtml#PC16) shows how `app-production.conf` can
    override the `httpPort` property and set it to the value of an environment variable
    instead.


    ```

    httpPort = ${KOTLINBOOK_HTTP_PORT}

    Listing 3-11

    app-production.conf sets httpPort to the value of the environment variable KOTLINBOOK_HTTP_PORT

    ```


    ```

    httpPort = 4207

    Listing 3-10

    app.conf explicitly specifies the value of httpPort

    ```


    This solution makes it easy to reason about how you mapped environment variables
    to config properties – it’s right there in the config file. It also has the benefit
    of failing early if you inadvertently forgot to set the environment variable `KOTLINBOOK_HTTP_PORT`
    in production. Instead of falling back to your default setting, `Typesafe Config`
    will crash with a useful and informative error message if the environment variable
    for some reason isn’t available to your web app process, as seen in Figure [3-1](#531928_1_En_3_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_3_Chapter/531928_1_En_3_Fig1_HTML.png)


    A screenshot of a window titled kotlinbook. The options .gradle and build options
    are highlighted. On the left, 10 lines of code are observed. Below log output
    is exhibited.


    Figure 3-1


    `Typesafe Config` throws an error if it can’t find a specified environment variable


    Note that while it’s not a technical requirement, it’s common to use uppercase
    and underscores for environment variable names. You should also prefix the environment
    variables with the name of your system, so that you avoid naming conflicts with
    other environment variables. This makes `KOTLINBOOK_HTTP_PORT` a good name for
    an environment variable.


    ## Logging Config on Web App Startup


    When you run your application in a production environment, you might find yourself
    asking the question: “But what is *actually* the config value set to?” This is
    particularly useful when you use a combination of config files and environment
    variables and you’re fiddling around in your production environment, trying to
    figure out why a config property isn’t set to what you thought it would be.


    By logging the configuration when your web app starts, you can easily refer to
    the logs to see the actual values of all your configuration properties.


    ### Format the Output


    Logging your configuration can be as simple as just logging the whole `WebappConfig`
    data class. Data classes have a built-in `toString()` method, which will print
    the name of all the config properties alongside their values. However, this will
    print all the config on a single line and is not that readable when you have a
    large data class with lots of config properties.


    To fix this, you can write your own string representation of the `WebappConfig`
    data class.


    Kotlin has many *metaprogramming* features. Metaprogramming refers to writing
    code against your own code. For example, Kotlin has standard APIs for getting
    a list of all the properties that are defined on a data class.


    Listing [3-12](#531928_1_En_3_Chapter.xhtml#PC17) shows an example of how you
    could get the list of properties defined on `WebappConfig`, sort them by name,
    create a string representation of the name and the value, and finally create a
    string that has each configuration property on a separate line.


    ```

    WebappConfig::class.declaredMemberProperties

    .sortedBy { it.name }

    .map { "${it.name} = ${it.get(config)}" }

    .joinToString(separator = "\n")

    Listing 3-12

    A more readable string representation of your WebappConfig data class

    ```


    This is a good example of functional programming in Kotlin. You start with a list
    of properties, call a function to sort them that returns the sorted list, map
    over the list to create a new version of it, and finally join it to create a string
    representation.


    ### Masking Secrets


    You don’t want to log things like database passwords and API keys. Printing secrets
    to the log adds an attack vector for hackers to exploit, and you should take security
    seriously from the get-go.


    Listing [3-12](#531928_1_En_3_Chapter.xhtml#PC17) contains a custom string representation
    of your `WebappConfig`. You can modify it so that properties that are likely to
    contain secrets will have the value masked out, instead of printed as is.


    Listing [3-13](#531928_1_En_3_Chapter.xhtml#PC18) shows how you can use a regular
    expression to match config property names and avoid printing the full config value
    for config properties that contain secrets.


    ```

    val secretsRegex = "password|secret|key"

    .toRegex(RegexOption.IGNORE_CASE)

    WebappConfig::class.declaredMemberProperties

    .sortedBy { it.name }

    .map {

    if (secretsRegex.containsMatchIn(it.name)) {

    "${it.name} = ${it.get(config).toString().take(2)}*****"

    } else {

    "${it.name} = ${it.get(config)}"

    }

    }

    .joinToString(separator = "\n")

    Listing 3-13

    Filter out secrets from the string representation of WebappConfig

    ```


    If your configuration file contains the property `databasePassword`, your output
    will be `"databasePassword = 12*****"` instead of `"databasePassword = 1234"`.


    The regular expression here is limited, and you should make sure to update and
    maintain it as your application grows.'
  raw: '### Don’t Store Secrets in Version Control


    First, let’s add some detail to why it’s important to not store secrets in version
    control.


    At first, it might seem convenient to store everything in a single file and have
    it checked into version control. Your source code probably isn’t accessible to
    the public, and you already have a tight regime on who has access to the source
    code and the config files.


    There are two big problems I want to highlight, though.


    The first problem is accidental source code leaks. A simple click of a button
    is all it takes to make a repository on a hosting site like GitHub accessible
    to the public. If this happens, it’s not just your source code that leaked to
    the public, but also all the secrets that you checked into version control. This
    can include API keys and signing secrets for verifying authenticity against third-party
    systems, as well as passwords for database access and so on.


    The second problem is that everyone that has access to the source code also has
    access to all the secrets that you’ve checked into version control. In some scenarios,
    regulation such as GDPR or PSD2 in Europe mandates that only a subset of certified
    and vetted developers has access to personal identifiable information (PII) or
    financial transaction data. And for security reasons in general, it can be a good
    idea to restrict access to live production data. If you don’t store secrets in
    version control, you don’t have to vet and certify every developer who has access
    to the code source. These developers can instead develop and test against staging
    environments that contain fake PII and can’t transfer real money.


    Note that I am not a lawyer. You should confer with your lawyer for all legal
    issues. Don’t take legal advice from a software developer.


    You need a mechanism to provide secrets to your web app, other than the config
    files. Operating system environment variables are a great fit for this.


    Typesafe Config has built-in support for reading from environment variables, so
    you don’t have to change the code that loads your config files. Typesafe Config
    has a concept of *substitutions*. This means that your config file can contain
    the name of the environment variable you want to read from, instead of the actual
    raw value.


    For example, if you want to read the web app HTTP port from an environment variable,
    you can replace `httpPort = 4207` with `httpPort = ${KOTLINBOOK_HTTP_PORT}`. It’s
    common to use uppercase and underscores for environment variable names and to
    prefix the environment variables that you use with the name of your system. This
    makes `KOTLINBOOK_HTTP_PORT` a good name for an environment variable.


    Listing [3-10](#531928_1_En_3_Chapter.xhtml#PC15) shows how `app.conf` can set
    the value of `httpPort` to `4207`, like you’ve seen earlier in this chapter. Listing
    [3-11](#531928_1_En_3_Chapter.xhtml#PC16) shows how `app-production.conf` can
    override the `httpPort` property and set it to the value of an environment variable
    instead.


    ```

    httpPort = ${KOTLINBOOK_HTTP_PORT}

    Listing 3-11

    app-production.conf sets httpPort to the value of the environment variable KOTLINBOOK_HTTP_PORT

    ```


    ```

    httpPort = 4207

    Listing 3-10

    app.conf explicitly specifies the value of httpPort

    ```


    This solution makes it easy to reason about how you mapped environment variables
    to config properties – it’s right there in the config file. It also has the benefit
    of failing early if you inadvertently forgot to set the environment variable `KOTLINBOOK_HTTP_PORT`
    in production. Instead of falling back to your default setting, Typesafe Config
    will crash with a useful and informative error message if the environment variable
    for some reason isn’t available to your web app process, as seen in Figure [3-1](#531928_1_En_3_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_3_Chapter/531928_1_En_3_Fig1_HTML.png)


    A screenshot of a window titled kotlinbook. The options .gradle and build options
    are highlighted. On the left, 10 lines of code are observed. Below log output
    is exhibited.


    Figure 3-1


    Typesafe Config throws an error if it can’t find a specified environment variable


    Note that while it’s not a technical requirement, it’s common to use uppercase
    and underscores for environment variable names. You should also prefix the environment
    variables with the name of your system, so that you avoid naming conflicts with
    other environment variables. This makes `KOTLINBOOK_HTTP_PORT` a good name for
    an environment variable.


    ## Logging Config on Web App Startup


    When you run your application in a production environment, you might find yourself
    asking the question: “But what is *actually* the config value set to?” This is
    particularly useful when you use a combination of config files and environment
    variables and you’re fiddling around in your production environment, trying to
    figure out why a config property isn’t set to what you thought it would be.


    By logging the configuration when your web app starts, you can easily refer to
    the logs to see the actual values of all your configuration properties.


    ### Format the Output


    Logging your configuration can be as simple as just logging the whole `WebappConfig`
    data class. Data classes have a built-in `toString()` method, which will print
    the name of all the config properties alongside their values. However, this will
    print all the config on a single line and is not that readable when you have a
    large data class with lots of config properties.


    To fix this, you can write your own string representation of the `WebappConfig`
    data class.


    Kotlin has many *metaprogramming* features. Metaprogramming refers to writing
    code against your own code. For example, Kotlin has standard APIs for getting
    a list of all the properties that are defined on a data class.


    Listing [3-12](#531928_1_En_3_Chapter.xhtml#PC17) shows an example of how you
    could get the list of properties defined on `WebappConfig`, sort them by name,
    create a string representation of the name and the value, and finally create a
    string that has each configuration property on a separate line.


    ```

    WebappConfig::class.declaredMemberProperties

    .sortedBy { it.name }

    .map { "${it.name} = ${it.get(config)}" }

    .joinToString(separator = "\n")

    Listing 3-12

    A more readable string representation of your WebappConfig data class

    ```


    This is a good example of functional programming in Kotlin. You start with a list
    of properties, call a function to sort them that returns the sorted list, map
    over the list to create a new version of it, and finally join it to create a string
    representation.


    ### Masking Secrets


    You don’t want to log things like database passwords and API keys. Printing secrets
    to the log adds an attack vector for hackers to exploit, and you should take security
    seriously from the get-go.


    Listing [3-12](#531928_1_En_3_Chapter.xhtml#PC17) contains a custom string representation
    of your `WebappConfig`. You can modify it so that properties that are likely to
    contain secrets will have the value masked out, instead of printed as is.


    Listing [3-13](#531928_1_En_3_Chapter.xhtml#PC18) shows how you can use a regular
    expression to match config property names and avoid printing the full config value
    for config properties that contain secrets.


    ```

    val secretsRegex = "password|secret|key"

    .toRegex(RegexOption.IGNORE_CASE)

    WebappConfig::class.declaredMemberProperties

    .sortedBy { it.name }

    .map {

    if (secretsRegex.containsMatchIn(it.name)) {

    "${it.name} = ${it.get(config).toString().take(2)}*****"

    } else {

    "${it.name} = ${it.get(config)}"

    }

    }

    .joinToString(separator = "\n")

    Listing 3-13

    Filter out secrets from the string representation of WebappConfig

    ```


    If your configuration file contains the property `databasePassword`, your output
    will be `"databasePassword = 12*****"` instead of `"databasePassword = 1234"`.


    The regular expression here is limited, and you should make sure to update and
    maintain it as your application grows.'
