  trans: '

    ### 类型安全的事务性业务逻辑


    部分业务逻辑需要事务才能正常工作。例如，你可能有一个执行两次插入操作的函数，对于你的 Web 应用来说，要么全部成功，要么全部失败至关重要。你可以通过将该函数包装在事务中来解决这个问题。


    但如果你忘记创建事务了呢？


    你可以通过确保业务逻辑需要正确类型的 Kotliquery 会话来缓解此问题。如前所述，Kotliquery 为非事务会话生成 `Session`，为事务会话生成
    `TransactionalSession`。因此，如果你编写的业务逻辑函数接受 `TransactionalSession` 作为类型，那么当你尝试从没有可用事务的上下文中调用需要事务才能正确运行的业务逻辑时，就会收到编译错误。清单
    6-17 展示了如何以这种方式构建业务逻辑的示例。


    ```

    fun createUserAndProfile(

    txSess: TransactionalSession,

    userName: String,

    bio: String

    ) {

    txSess.update(queryOf("INSERT INTO user_t ..."))

    txSess.update(queryOf("INSERT INTO profile_t ..."))

    }

    sessionOf(dataSource).use { dbSess ->

    // 这段代码无法编译 – dbSess 类型错误

    createUserAndProfile(

    dbSess,

    "augustl",

    "重要作者")

    dbSess.transaction { txSess ->

    // 这段代码编译正常 – txSess 类型正确

    createUserAndProfile(

    dbSess,

    "augustl",

    "重要作者")

    }

    }

    清单 6-17

    在业务逻辑中要求事务

    ```


    这看起来可能是一个小细节，但它确实能派上大用场。很容易犯错，最终将非事务性的 Kotliquery 会话传递给需要事务才能正确运行的函数。通过确保业务逻辑中那些需要事务的函数接受
    `TransactionalSession`，你将获得类型系统的帮助，从而避免此类错误（双关语）。


    ### 嵌套事务


    SQL 数据库不支持嵌套事务。但你可以使用*保存点*来模拟它们。


    Kotliquery 没有内置的保存点功能，但很容易创建自己的小型包装器。这也是一个很好的机会，可以了解 Kotliquery 如何实现 `transaction`
    函数，因为你用于创建保存点的函数将具有类似的行为。清单 6-18 展示了如何实现一个 `dbSavePoint` 函数，该函数创建一个保存点并使其像事务一样工作。


    ```

    fun dbSavePoint(dbSess: Session, body: () -> A): A {

    val sp = dbSess.connection.underlying.setSavepoint()

    return try {

    body().also {

    dbSess.connection.underlying.releaseSavepoint(sp)

    }

    } catch (e: Exception) {

    dbSess.connection.underlying.rollback(sp)

    throw e

    }

    }

    sessionOf(dataSource).use { dbSess ->

    dbSess.transaction { txSess ->

    // 创建一个保存点

    dbSavePoint(txSess) {

    txSess.update(queryOf("INSERT INTO ..."))

    }

    // 在此处执行更多数据库操作

    }

    }

    清单 6-18

    受 Kotliquery 创建事务方式的启发，创建一个保存点

    ```


    `dbSavePoint` lambda 内部的代码将表现得如同在其自己的嵌套事务中运行一样。


    保存点是一个命名实体。如果你调用 `setSavePoint` 而不提供自己的名称，JDBC 将自动生成一个名称。你将 lambda `body` 的执行包装在
    try/catch 中。如果 lambda 抛出异常，你将回滚保存点。如果 lambda 没有抛出任何异常，你将释放保存点。你使用作用域函数 `also`
    来实现这一点。`also` 将返回你调用它的对象，但在返回之前，它会执行 lambda 中的代码。这使得 `also` 成为一种便捷的方式，可以避免为 `body`
    lambda 的返回值创建和命名中间变量。


    你还看到了如何在普通 Kotlin 函数中使用泛型的示例。`A` 泛型表示 lambda `body` 的返回值。这意味着 `dbSavePoint` 将传递
    `body` lambda 的返回值，以便你可以在将代码包装在 lambda 中的同时保持函数式编码风格。


    # 7. 使用 jUnit 5 进行自动化测试


    现在，你已经组装好了 Web 应用拼图的所有部分。但在自己实现业务逻辑之前，你将学习如何编写自动化测试。


    如果你是 Kotlin 新手，以下是本章中将看到的一些语言特性示例：


    *   使用 `kotlin.test` 实现测试用例和断言

    *   使用不安全转换运算符 `!!` 实现空安全

    *   内联函数


    此外，在本章中，你将学习以下关于使用 jUnit 5 编写自动化测试的内容：


    *   测试驱动开发（TDD）的基础知识

    *   编写与数据库交互的测试

    *   隔离单个测试用例以避免测试间依赖


    在附录 C 中，你将学习如何使用 Kotlin 测试框架，而不是 `kotlin.test`。


    ## 设置环境


    jUnit 5 是用于编写和运行自动化测试的行业标准库，也是本书将使用的库。大多数 Kotlin 自动化测试库底层都使用 jUnit 5，因为 jUnit
    5 包含了在你自己的机器上以及自动化 CI（持续集成）构建环境中高效运行测试所需的一切。


    有许多可用的替代库。Kotlin 社区中一个流行的替代方案是 Kotest（[`https://kotest.io/`](https://kotest.io/)），它包含许多有用的功能，甚至还有诸如基于属性的测试等高级功能，这些功能会根据边界和规范自动生成测试。不过，我倾向于使用“简单”的测试库，标准的
    `kotlin.test` 和 jUnit 5 风格的断言使用起来简单且熟悉。此外，我实际上从未在实际项目中使用过 Kotest。因此，在本书中你将学习如何使用
    jUnit 5 和 `kotlin.test`。


    ### 添加 jUnit 5 和 kotlin.test


    你的项目中需要两样东西来运行测试：用于执行测试的 jUnit 5 和用于编写测试用例的 `kotlin.test`。


    `kotlin.test` 是一个包装库，你将使用它来编写测试用例本身。它包含用于将某些内容定义为测试类的注解、用于比较值的断言等。`kotlin.test`
    包含到 jUnit 5 的映射。jUnit 5 会识别 `kotlin.test` 测试用例并执行它们。


    到目前为止，你已经在 *build.gradle.kts* 的 `dependencies` 块中添加了第三方依赖项。你也可以为 jUnit 和 `kotlin.test`
    这样做。但对于测试运行，你需要的不仅仅是依赖项——你还需要告诉 Gradle 如何执行你的测试，以及 jUnit 5 和 `kotlin.test` 之间的映射。完成所有这些的最简单方法是使用安装了
    Kotlin 插件的 Gradle 自带的测试运行内置支持。清单 7-1 显示了需要添加到 Gradle 配置中的内容，以添加对 jUnit 5、`kotlin.test`
    以及用于执行测试的 Gradle 任务的支持。


    ```

    dependencies {

    // ...

    testImplementation(kotlin("test"))

    }

    tasks.test {

    useJUnitPlatform()

    }

    清单 7-1

    在 build.gradle.kts 中添加对 kotlin.test 和 jUnit 5 的支持

    ```


    请注意，如果你按照本书的指导使用 IntelliJ IDEA 创建了 Kotlin 项目，你可能已经设置了这些属性，因为 IntelliJ IDEA 会生成预配置了
    jUnit 5 支持的项目。

