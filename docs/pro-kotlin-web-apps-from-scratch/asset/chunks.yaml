    ### 部署到 AWS Lambda


    要在 AWS Lambda 上运行你的 `GetTestHelloWorld` 处理函数，你需要将其打包并上传到你的 AWS 环境。


    打包过程本身与第 11 章中将 Web 应用部署到传统服务器环境时的设置完全相同。因此，第一步是运行 `shadowJar` Gradle 任务，为你的代码构建一个自包含的
    fat jar。


    接下来，你需要将 JAR 文件上传到 AWS Lambda。对于这一步，我假设你已经设置好了 AWS 账户，因为本书主要关注的是让你的代码在无服务器环境中运行的概念，而不是专门介绍
    AWS。


    在 AWS 控制台 [*https://console.aws.amazon.com*](https://console.aws.amazon.com) 登录，并打开
    Lambda 控制台，如图 12-1 所示。


    ![](img/531928_1_En_12_Fig1_HTML.png)


    浏览器窗口截图显示 AWS Lambda 控制台。在函数页面上，显示了函数名称、描述、包类型、运行时和上次修改时间。一个“创建函数”选项被高亮显示。


    图 12-1


    AWS Lambda 控制台


    点击标有“创建函数”的橙色大按钮。这将带你进入如图 12-2 所示的页面。


    ![](img/531928_1_En_12_Fig2_HTML.png)


    浏览器窗口截图显示 AWS Lambda 控制台。函数名称显示为 kotlinbooktestfunction，运行时显示为 Java 11，架构下选择了
    x86_64 选项。


    图 12-2


    在 AWS Lambda 控制台中创建新函数


    保持选中“从头开始创作”选项，将你的函数命名为 `kotlinbookTestFunction`，选择“Java 11 (Corretto)”作为运行时，然后点击屏幕底部的“创建函数”按钮。


    当 AWS 完成创建你的函数后，你需要上传你的代码。你将上传之前用 `shadowJar` Gradle 任务打包的整个 fat jar。点击标有“从以下位置上传”的白色按钮，然后点击标有“.zip
    或 .jar 文件”的选项，如图 12-3 所示。


    ![](img/531928_1_En_12_Fig3_HTML.png)


    浏览器窗口截图显示 kotlinbooktestfunction 页面。代码选项被选中。一个“从以下位置上传”的下拉菜单提供了“.zip 或 .jar 文件”和“Amazon
    S3 位置”选项。文本显示：代码编辑器不支持 Java 11 运行时。


    图 12-3


    将代码上传到新的 AWS Lambda 函数


    在弹出的对话框中，点击标有“上传”的白色按钮，在出现的文件查找器窗口中选择你的 fat jar 文件，然后点击标有“保存”的橙色按钮，如图 12-4 所示。


    请注意，你应该上传到 AWS Lambda 的 fat jar 文件位于 *build/libs/kotlinbook-1.0-SNAPSHOT-all.jar*
    文件夹中，与你的源代码和 Web 应用项目中的 Gradle 配置在同一目录下。


    ![](img/531928_1_En_12_Fig4_HTML.png)


    浏览器窗口截图显示 kotlinbooktestfunction 页面。一个标题为“上传 .zip 或 .jar 文件”的对话框。文本显示：当你上传新的 .zip
    文件包时，它将覆盖现有代码。“保存”选项被高亮显示。


