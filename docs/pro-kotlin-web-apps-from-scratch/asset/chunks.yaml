    ## Kotlin 中的 `lateinit`


    清单 13-3 最有趣的地方在于 `lateinit` 这个关键字。


    Spring Context 初始化对象的方式有一个大问题：它使用属性而非构造函数参数。当你手动配置 bean 实例化时，从技术上讲，可以将 bean 引用作为构造函数参数传递。但这需要额外的工作，并且一旦你尝试使用像
    `@Autowired` 这样的注解（这是添加到 bean 属性上的注解），这种方式就会失效。


    其后果是，Spring Context 设置的所有属性都必须是可空且可变的。如果你将属性声明为 `val String myProp`，除非编译器能保证 `myProp`
    由该类的构造函数设置，否则 Kotlin 将无法编译该类，这意味着 Kotlin 可以强制执行其空安全保证。因此，你不得不将所有属性声明为 `var String?
    myProp = null`，这样属性初始值为 `null`，之后当 Spring Context 遍历你的对象图并初始化所有内容时，再将其设置为一个 `String`
    值。


    这意味着每次访问 `myProp` 时，你都必须检查它是否为 `null`，或者使用非空断言运算符（`!!`）强制将其转换为非空类型。


    这正是 `lateinit` 要解决的问题。


    对于那些由于技术原因在类实例化时必须初始化为 `null`，但你知道在能够使用该类实例之前它会被设置为非空值的代码，你可以将属性声明为 `lateinit
    var`。这允许你覆盖 Kotlin 的编译时检查，并告诉类型系统：“我保证在使用它时，它会是非空值。”


    在清单 13-3 中，你将未迁移数据源的引用声明为 `lateinit var unmigratedDataSource: DataSource`。当 Spring
    Context 在你的 `MigratedDataSourceFactoryBean` 上调用 `getObject()` 时，Spring Context
    已经根据你的 bean 声明将 `unmigratedDataSource` 设置为适当的值。换句话说，在 Spring Context 状态机的内部，它绝不会在初始化某个
    bean 的所有依赖项之前调用该 bean 上的方法。因此，从实际角度来看，当你的代码运行时，`unmigratedDataSource` 绝不可能是 `null`，所以在
    Spring Context 作为 bean 装配过程一部分而初始化的属性上使用 `lateinit` 是安全的。


    此外，如果你尝试访问一个尚未设置的 `lateinit var`，Kotlin 会立即抛出一个 `kotlin.UninitializedPropertyAccessException`。这样你就不会得到
    `null` 返回值，也不会意外地将空值传递到系统的其他部分。


    这是 Kotlin 类型系统实用性的一个例子，也是我在整个 Kotlin 语言中最喜欢的特性之一。Kotlin 在处理可能为 `null` 的值时非常明确，但它仍然允许你成为一个负责任的程序员，即使在技术上某个值可能为
    `null` 的场景下，也能依赖 Kotlin 的空安全保证。


    ## 启动你的 Web 应用


    你在 `createApplicationContext` 中的 Spring Context 初始化已经准备就绪，因此下一步就是使用它来启动你的实际 Web
    应用。


    初始化过程与你已经在 *Main.kt* 中拥有的类似。清单 13-4 展示了如何使用你的 Spring Context 启动 Web 应用。


    ```

    fun main() {

    log.debug("Starting application...")

    val env = System.getenv("KOTLINBOOK_ENV") ?: "local"

    log.debug("Application runs in the environment ${env}")

    val config = createAppConfig(env)

    log.debug("Creating app context")

    val ctx = createApplicationContext(config)

    log.debug("Getting data source")

    val dataSource =

    ctx.getBean("dataSource", DataSource::class.java)

    embeddedServer(Netty, port = config.httpPort) {

    createKtorApplication(config, dataSource)

    }.start(wait = true)

    }

    清单 13-4

    MainSpringContext.kt 中的 main() 函数

    ```


    你仍然手动创建 `WebappConfig`。你可以设置 `createApplicationConfig` 使其创建自己的 `WebappConfig`，但能够完全控制你的
    Spring Context 将使用哪个确切的数据库 URL 等是很方便的。


    `createKtorApplication` 需要普通的数据源才能工作，因此你从 Spring Context 的 `ctx` 对象中提取 `"dataSource"`
    bean。因为你配置了 `"dataSource"` bean 来同时运行你的迁移，所以你不必显式运行迁移，因为 Spring Context 已经运行了它们。


    ## 扩展用法


    Spring Context 的扩展用法呢？例如，你所有的 Web 处理程序现在都像以前一样工作，通过以纯函数式风格将它们使用的参数作为参数传入。


    你可以像这样将 Web 处理程序编写为一个 bean：


    ```

    beanFactory.registerSingleton(

    "springContextTestHandler",

    webResponse {

    TextWebResponse("Hello from Spring!")

    }

    )

    ```


    然后，你可以像这样为该处理程序添加一个路由映射：


    ```

    get(

    "/spring_context_test",

    ctx.getBean("springContextTestHandler") as

    PipelineInterceptor

    )

    ```


    这个解决方案的问题在于，除了将 lambda 包装在 Spring Context 中而不是直接插入 lambda 之外，你并没有真正增加任何额外价值。没有办法将依赖项注入到
    lambda 中。


    你可以走创建工厂持有者 bean 和其他名词密集型构造的路线，但我倾向于远离这类事情。依赖注入为资源的初始化和销毁增加了价值，但对于 Web 路由处理函数的实现来说，依赖注入增加的唯一价值就是为向函数传递参数这个简单的任务增加了一些额外的仪式感。


    # 14. 使用 Spring Security 的企业级身份验证


    在本章中，你将学习如何弥合新旧之间的差距，并将 Spring Security（[*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security)）添加到你的基于
    Ktor 的 Web 应用中。


    如果你的组织已经广泛使用 Spring Security，你可能已经拥有大量的基础设施，要改变它们需要付出打破康威定律的巨大努力。相反，你可以将 Spring
    Security 添加到你的现代 Kotlin Web 应用中，并利用你组织现有的插件和专业知识。


    请注意，Spring Security 并非为组合而设计。Spring Security 会包装你的整个 Web 应用，如果你已经设置了其他身份验证方式，例如第
    9 章中基于 cookie 的身份验证或第三方系统（如 Keycloak（[*www.keycloak.org/*](http://www.keycloak.org/)）），它们将会发生冲突并相互干扰。


    ## 准备你的 Web 应用


    为了能够在你的 Web 应用中使用 Spring Security，你需要首先完成一些步骤。简而言之，你的 Web 应用需要基于 Servlet 规范。然后，你将
    Spring Security 添加为一个 Servlet 过滤器，这是使用 Spring Security 的主要方式。

    '
- fmt: '### Setting Up Embedded Jetty


    So far, you’ve used the Ktor embedded server and Netty to run your web app. To
    get full control of the setup and to add support for servlets, you need to switch
    that around. Instead of using `embeddedServer` from Ktor, you’ll start an embedded
    Jetty server from scratch, configure it to use the servlet spec, and attach your
    Ktor web app as a servlet.


    First, you need to add the necessary dependencies to your `build.gradle.kts`:


    ```

    implementation("io.ktor:ktor-server-servlet:2.1.2")

    implementation("org.eclipse.jetty:jetty-server:9.4.49.v20220914")

    implementation("org.eclipse.jetty:jetty-servlet:9.4.49.v20220914")

    ```


    You’ll use Jetty for the actual server and `ktor-server-servlet` for mapping your
    existing Ktor app to the Jetty servlet setup.


    The latest version of Jetty is 11. The reason you’re using the latest version
    of v9 is that the later version of Jetty uses the new `jakarta.*` namespaces for
    the standard library APIs on the Java platform. Because of licensing and patent
    issues, the Java community is moving away from the `javax.*` named packages. But
    for now, you’ll have to stick with the `javax` ones, and versions compatible with
    them, as the latest version of Spring Security still uses the `javax` namespaces.
    When Spring 6 is released, you can upgrade all these versions, as Spring 5 uses
    `javax.*`, whereas Spring 6 uses the new `jakarta.*` namespaces.


    This new setup is completely disconnected from your existing setup, so you’ll
    write all this code in a new file. Instead of adding more stuff to your existing
    `Main.kt`, you’ll create a new `MainSpringSecurity.kt` where all the new servlet
    and Jetty-based code will live. Listing [14-1](#531928_1_En_14_Chapter.xhtml#PC2)
    shows the full `main()` function you’ll need to get Jetty up and running, configured
    in servlet mode.


    ```

    import org.eclipse.jetty.server.HttpConnectionFactory

    import org.eclipse.jetty.server.Server

    import org.eclipse.jetty.server.ServerConnector

    import org.eclipse.jetty.servlet.ListenerHolder

    import org.eclipse.jetty.servlet.ServletContextHandler

    private val log = LoggerFactory.getLogger(

    "kotlinbook.MainSpringSecurity"

    )

    fun main() {

    val appConfig = createAppConfig(

    System.getenv("KOTLINBOOK_ENV") ?: "local"

    )

    val server = Server()

    val connector = ServerConnector(

    server,

    HttpConnectionFactory()

    )

    connector.port = appConfig.httpPort

    server.addConnector(connector)

    server.handler = ServletContextHandler(

    ServletContextHandler.SESSIONS

    ).apply {

    contextPath = "/"

    resourceBase = System.getProperty("java.io.tmpdir")

    servletContext.setAttribute("appConfig", appConfig)

    servletHandler.addListener(

    ListenerHolder(BootstrapWebApp::class.java)

    )

    }

    server.start()

    server.join()

    }

    Listing 14-1

    Start and configure Jetty for servlet hosting

    ```


    Jetty is a full-featured Java platform server, which implements lots of APIs,
    and is extremely flexible. Unlike `embeddedServer` in Ktor, Jetty doesn’t have
    much of any defaults either, so you must explicitly specify everything to get
    it up and running.


    The main part of this setup is the Jetty server’s handler property, which is set
    to a `ServletContextHandler`. The `ServletContextHandler.SESSIONS` flag you pass
    to it enables servlet sessions, which you’ll need to make Spring Security work.
    The handler needs a context path, which is the base path where your web app will
    be available. It also needs a resource directory to work, which points to the
    system default temporary directory so that the operating system automatically
    cleans up whatever files Jetty creates. The servlet context, which is available
    to all individual servlets and filters, gets access to the application config,
    which will come in useful later. Finally, a listener is set up, which is a class
    that the Jetty server executes when Jetty has finished starting up. This class
    is where you’ll configure and initialize the actual servlet you’ll use for your
    web app and Spring Security itself.


    If you type in this code now, you’ll get a compile error for `BootstrapWebApp`.
    That class doesn’t exist yet, so you’ll write that one next.


    ### Initializing the Servlet


    Now that Jetty is set up in servlet mode, you need to initialize your servlet.
    Servlet initialization is an ancient Jedi guru art on the Java platform. The initialization
    code you’ll write for your servlet stack will have no knowledge of Jetty, and
    any environment that supports servlets can execute it – even old-school server
    containers like Apache Tomcat ([*https://tomcat.apache.org/*](https://tomcat.apache.org/))
    and IBM WebSphere ([*www.ibm.com/products/websphere-application-server*](http://www.ibm.com/products/websphere-application-server)).


    You’ve already typed in the name of the initializer class in Listing [14-1](#531928_1_En_14_Chapter.xhtml#PC2),
    `BootstrapWebApp`. Listing [14-2](#531928_1_En_14_Chapter.xhtml#PC3) shows how
    to create and set up this class properly.


    ```

    import javax.servlet.annotation.WebListener

    import javax.servlet.ServletContextEvent

    import javax.servlet.ServletContextListener

    @WebListener

    class BootstrapWebApp : ServletContextListener {

    override fun contextInitialized(sce: ServletContextEvent) {

    val ctx = sce.servletContext

    }

    override fun contextDestroyed(sce: ServletContextEvent) {

    }

    }

    Listing 14-2

    A basic shell for servlet initialization

    ```


    This initializer doesn’t do any work yet. You’ll add more stuff here later in
    this chapter. For now, try to run your main class, and check that everything compiles
    correctly. If you’ve done everything right, your servlet-based Jetty server should
    start up fine and listen to the correct port based on your config files. Note
    that you should stop your existing main function if it’s already running in the
    background, as the Jetty server will try to use the same port since it’s using
    the same config files and the same config loading code.


    **Tip**


    The `WebListener` annotation on `BootstrapWebApp` is not necessary, and everything
    will work fine if you remove it. However, adding it means that you can build and
    run your web app on an old-school container-type Java server, and it will pick
    up the `WebListener` annotation and mount your servlet, without running your `main()`
    function!


    Everything you need to set up will happen in the `contextInitialized` function
    of your `BootstrapWebApp` class.


    You’ll add more things to `contextInitialized` later. For now, all you need is
    to extract the config and get hold of a data source. Listing [14-3](#531928_1_En_14_Chapter.xhtml#PC4)
    shows how to do this.


    ```

    override fun contextInitialized(sce: ServletContextEvent) {

    val ctx = sce.servletContext

    log.debug("Extracting config")

    val appConfig = ctx.getAttribute(

    "appConfig"

    ) as WebappConfig

    log.debug("Setting up data source")

    val dataSource = createAndMigrateDataSource(appConfig)

    Listing 14-3

    Accessing config and data source inside contextInitialized

    ```


    The `"appConfig"` attribute comes from Listing [14-1](#531928_1_En_14_Chapter.xhtml#PC2),
    where you created the servlet context and assigned the `"appConfig"` attribute
    to your instance of `WebappConfig`. That means you can access it from the servlet
    context, inside `contextInitialized`. The type of `getAttribute` is the platform
    type `Object!`, so you need to cast it to a `WebappConfig`. Then, you create a
    data source just like you’ve done it in your main Ktor setup and inside your tests.'
