  trans: '

    ### 启动 Web 服务器


    你需要在应用程序的入口点——`main` 函数中手动启动 Web 服务器。我们将不再仅仅打印“Hello, World!”，而是改为启动一个 Ktor Web
    服务器。


    在代码清单 2-1 中，你可以看到启动一切所需的完整 `main` 函数。


    ```

    package kotlinbook

    import io.ktor.server.application.*

    import io.ktor.server.engine.*

    import io.ktor.server.netty.*

    import io.ktor.server.response.*

    import io.ktor.server.routing.*

    fun main() {

    embeddedServer(Netty, port = 4207) {

    routing {

    get("/") {

    call.respondText("Hello, World!")

    }

    }

    }.start(wait = true)

    }

    Listing 2-1

    在 src/main/kotlinbook/Main.kt 的应用程序 main 函数中启动 Web 服务器

    ```


    这段代码简洁明了。你创建了一个内嵌的 Ktor 服务器，它在底层使用 Netty 作为服务器实现，并在 4207 端口启动。你设置了路由，即 HTTP 动词和路径匹配。每个路由都有一个生成
    HTTP 响应的实现。最后，你启动了内嵌服务器。


    你不需要手动编写 `import` 语句。例如，当你输入 `embeddedSe` 并暂停时，IntelliJ IDEA 会建议 `embeddedServer`。如果你从下拉菜单中选择自动补全，IntelliJ
    IDEA 还会自动添加 `import` 语句。


    为清晰起见，代码清单 2-1 包含了编译代码所需的所有 import 语句。在本书的剩余部分，除非存在歧义（例如，有两个同名的扩展函数但位于不同的包中），否则我将省略它们。


    提示


    在 Java 平台上，即使你使用框架，内嵌 HTTP 服务器也是一种标准做法。像 Nginx 这样的代理，或者 Azure Web Apps、Amazon
    Application Load Balancer 这样的云服务，会位于你应用程序中的内嵌 HTTP 服务器之前，负责处理 SSL、负载均衡和其他 Web
    服务器任务。在第 14 章中，你将学习如何构建一个不启动自身服务器，而是嵌入到 Tomcat 等应用服务器容器中的 servlet 风格的 WAR 文件。


    ### 提取到单独的函数


    目前，将路由提取到单独的函数并非绝对必要。但在本书后续部分，你将在多个不同的地方使用 Ktor 路由定义。因此，你需要将其作为一个可以从任何地方调用的独立函数，而不是将其锁定在
    `embeddedServer` 调用中。


    在开源应用和 Ktor 文档本身中，将 Ktor 服务器配置分离到单独的函数也是一种常见做法，因此在自己的 Web 应用中遵循这些约定，可以使你的代码更具可读性。


    代码清单 2-2 展示了如何进行设置。


    ```

    fun main() {

    embeddedServer(Netty, port = 4207) {

    createKtorApplication()

    }.start(wait = true)

    }

    fun Application.createKtorApplication() {

    routing {

    get("/") {

    call.respondText("Hello, World!")

    }

    }

    }

    Listing 2-2

    在独立的隔离函数中配置 Ktor

    ```


    `createKtorApplication` 函数是一个扩展函数。你将在第 3 章中了解更多关于扩展函数的内容，但其要点是：`embeddedServer`
    lambda 内部的 `"this"` 是 `io.ktor.server.application.Application` 的一个实例。通过将 `createKtorApplication()`
    设为 `Application` 的扩展函数，当它作为独立函数时，将拥有与内联在 `embeddedServer` lambda 内部时相同的 `"this"`
    可用。


    ### 使用 Lambda 表达式


    Lambda 表达式在 Kotlin 中无处不在。事实上，你已经编写了几个。`embeddedServer`、`routing` 和 `get` 这些函数都将
    lambda 表达式作为参数。


    Lambda 表达式是代码块，就像函数一样。它们使用花括号 `{` 和 `}` 创建。Lambda 表达式与常规函数的主要区别在于，lambda 表达式没有名称，而函数有。


    提示


    Lambda 表达式的另一个名称是*匿名函数*。Lambda 表达式和函数在语法上有一些差异（你将在本书中看到更多相关内容），但在逻辑上它们是相同的。


    Kotlin 中有一个约定，适用于将 lambda 表达式作为最后一个参数的函数。让我们以函数 `get` 为例进行说明。它接受两个参数：一个字符串，表示触发路由的路径；以及一个
    lambda 表达式，其中包含当 Web 应用处理该路径上的请求时应执行的代码。调用 `get` 的一种方式如下：


    ```

    get("/", { ... })

    ```


    因为在 Kotlin 中，函数将 lambda 表达式作为最后一个参数非常常见，所以有一种更方便的方式将它们传递给函数。你可以将 lambda 表达式放在函数括号的后面，而不是放在括号内：


    ```

    get("/") { ... }

    ```


    这对于*仅*接受一个 lambda 表达式的函数特别有用。`routing` 函数就是一个例子。能够完全省略括号是很方便的。


    Kotlin 程序员通常将 lambda 表达式放在括号外面。事实上，如果你将尾随 lambda 表达式放在括号内，IntelliJ IDEA 会默认显示警告。如果你愿意，可以禁用此警告，但如果你希望代码对其他程序员尽可能易读，遵循此约定是个好主意。


    ### 使用具名参数代替魔法数字和布尔值


    `start()` 函数只接受一个布尔值作为参数。`embeddedServer()` 函数接受服务器应使用的端口号。你可以像这样调用它们：


    ```

    embeddedServer(Netty, 4207) {

    createKtorApplication()

    }.start(true)

    ```


    以这种方式传递给函数的布尔值和数字通常被称为*魔法布尔值*和*魔法数字*。读者很难一眼看出传递给 `start()` 函数的布尔值是什么意思，以及传递给 `embeddedServer()`
    的第二个参数中的数字代表什么。


    为了更容易理解这些数字和布尔值的含义，你可以将它们作为*具名参数*传递：


    ```

    embeddedServer(Netty, port = 4207) {

    createKtorApplication()

    }.start(wait = true)

    ```


    你不能随意命名它们。它必须与函数实现中参数的名称相同。


    ### 运行你的 Web 应用


    使用 IntelliJ IDEA 或 Gradle 运行你的应用程序。在浏览器中打开 *http://localhost:4207*，你的代码将礼貌地向你问好。你应该会看到如图
    2-1 所示的结果。看！你已经拥有一个可以运行的 Web 应用了。


    ![](img/531928_1_En_2_Fig1_HTML.png)


    一个 localhost 网页的截图。文本显示 Hello world!


    图 2-1


    你的 Web 应用已启动并运行，正在响应你代码中定义的端口


    ## 日志记录


    高质量的日志记录是生产级 Web 应用的关键组成部分。它可能决定你在生产环境中发生错误时能否找出问题所在。


    当你运行应用程序时，控制台会打印如图 2-2 所示的错误消息。


    ![](img/531928_1_En_2_Fig2_HTML.png)


    一个标题为 kotlinbook- main.kt 的窗口截图。在 kotlin-book 下，.gradle 和 build 选项被高亮显示。右侧可以看到
    8 行代码。下方，在 MainKt 下，显示了 4 行。


    图 2-2


    应用程序运行时，SLF4J 发出错误消息


    在本节中，你将学习日志记录，并配置你的应用程序以输出来自第三方代码的有用信息，以及来自你自己代码的日志。

