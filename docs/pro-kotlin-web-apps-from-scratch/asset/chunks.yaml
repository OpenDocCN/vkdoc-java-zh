- fmt: '# Documentation and Stability Are Important


    An objective measure you can use to evaluate a library is the quality of its documentation
    and the stability of its APIs.


    `Ktor` is a good example of a library that scores off the charts on these metrics.
    The amount of documentation available at [https://ktor.io/docs/welcome.xhtml](https://ktor.io/docs/welcome.xhtml)
    is almost unparalleled. Every little detail of the library is documented, with
    lots of examples and explanations to go with all the modules that `Ktor` is composed
    of. `Ktor` is also very stable. All experimental features are explicitly tagged
    with annotations, and you have to use other annotations to opt in to use them,
    so that you don’t accidentally auto-complete in some part of `Ktor` that might
    change in the future. Once the `Ktor` team releases something publicly and removes
    the unstable tabs, they will do everything they can to never break APIs.


    In fact, all the libraries chosen in this book have these properties. `Flyway`,
    `HikariCP`, `Kotliquery`, `Typesafe Config`, `Gson`, `bcrypt`, and `Spring Security`
    are all libraries with great documentation and almost complete stability of public
    APIs.


    If anything, I prioritize stability over documentation. `Kotliquery` is a small
    library, without thousands of GitHub stars, and the documentation is a little
    sparse. But the API surface is small enough that extensive documentation isn’t
    that important, and it’s a well-designed library that has kept working and that
    I’ve safely bumped as new versions have been released, without any issues.


    # Avoid Following the “X Way”


    When you read about libraries and frameworks, you’ll see things like “the Ktor
    way” or “the Spring way” or “the Rails way.” I tend to avoid those kinds of patterns
    and do it my way. (I’m also a team player, so by *my way* I mean *my team’s way*.)


    That’s not to say that I ignore best practices completely. I try to accumulate
    as much knowledge as I can on the numerous ways people in the industry structure
    code and abstractions to make it maintainable and readable.


    However, no “X way” can cover all cases, and wholesale following a prescribed
    pattern is not a good substitute for thinking. Just like you need to use all your
    acquired judgment and good taste when you choose which libraries to add to your
    project, you need that same skillset for writing most of your code. You should
    always strive to make active decisions about what to do and question why you’re
    doing what you’re doing. There’s no pattern that always works or pattern that
    never works or a methodology for writing software that should never be evaluated
    and thought deeply about with a critical mind.


    Additionally, if all the programmers on a project are used to working on functional-style
    Clojure apps and write SQL by hand, it’s not necessarily a good idea to do everything
    “the Rails way” and use an ORM for everything. Even though the ORM `ActiveRecord`
    is a main selling point of Rails, it will get in the way of the experience of
    the developers on the team and not necessarily add any value.


    # Don’t Shy Away from Platform Libraries


    When a new language is created, there’s a tendency in that language’s community
    to write everything from scratch, to make it “language native.” There are zillions
    of libraries available for doing most things, but new languages can’t always leverage
    those libraries.


    However, languages like Clojure and Kotlin embrace the platform. And you don’t
    need to wrap everything in a Kotlin-specific library to be able to use it.


    Many libraries only exist as Java libraries. For example, the library for interacting
    with the Stripe payment APIs is only available in Java. There’s no Kotlin version
    of that library. And you don’t really need one. It’s super easy to invoke Java
    code from Kotlin. You’ve done lots of that in this book. For example, in Chapter
    [14](#531928_1_En_14_Chapter.xhtml), you’ve interacted with the most Java-esque
    code of all Java code, the Spring Security APIs. Kotlin is beautifully designed
    to take advantage of everything Java has to offer.


    In my experience, some programmers reach desperately for a language-native library.
    *Maybe there’s a ubiquitous library for doing `bcrypt` on the Java platform. But
    there is a Kotlin library available, written from scratch in pure Kotlin, so let’s
    use that! Maybe it only has three stars on GitHub and isn’t really maintained,
    but anything goes as long as it’s 100% Kotlin.*


    I advise against doing this. In Clojure and Kotlin alike, I use `Flyway` for database
    migrations. It is familiar to existing Java platform developers, it has a small
    and flexible API surface, it lets me write migration scripts as plain SQL just
    as I want, and I can depend on an actively maintained library with a huge community
    instead of some Clojure- or Kotlin-only migration library that has a much higher
    chance of being abandoned in the future.


    Additionally, the language-native libraries might not have close to the same number
    of features that the more widely used Java libraries have. For example, `Flyway`
    handles migrating old versions of Oracle. Your new-kid-on-the-block fancy language-native
    library is unlikely to support those kinds of edge cases. (Yes, I just called
    Oracle an edge case. Sue me!)


    # Boundaries and Layers


    One of the things I really like about `Ktor` is that it has support for a vast
    selection of mechanisms that are useful for web apps out of the box. For example,
    `Ktor` has supplied cookie-based authentication, JWT authentication, a DSL for
    writing HTML in Kotlin, a servlet for mapping Jetty and Ktor to Spring Security,
    and so on. A library with a wide selection of building blocks that work well together
    can save you from a lot of work. And that’s why I chose `Ktor` for the main workhorse
    in this book.


    However, I steer vehemently away from libraries that do too much without giving
    me escape hatches and composability. `Ktor` lets me control how it operates and
    lets me pick and choose from a large menu of features, without having to wrestle
    with it. `Ktor` doesn’t set up anything by default; I must explicitly opt in to
    everything I want it to do.


    `Flyway`, the library you’ve used for database migrations, is the same way. It
    has some defaults, such as what the naming prefix is for a repeatable migration
    vs. a versioned migration, where on the class path to load the migration files,
    and so on. But you can easily override all those defaults. And, most importantly,
    `Flyway` doesn’t do anything until you call `migrate()` on the `Flyway` object
    that you create.


    Both `Ktor` and `Flyway` also have programmatic APIs. `Ktor` has a config file
    mode, where it loads a config file from the class path and sets up itself based
    on the contents of that config file. Instead of calling `embeddedServer` with
    the properties it should use for running, you can invoke `io.ktor.server.netty.EngineMain.main()`
    directly. Then, you can update the `Ktor` config file (either `application.conf`
    or `application.yaml` on the class path) to specify the name of the class where
    your `Ktor` initialization code lives. This way of using libraries is something
    I tend to avoid. Programmatic APIs keep me in control of everything, and the library
    does not dictate how I wire up my collection of libraries.


    Frameworks are usually the complete opposite in this regard. Spring Boot follows
    a convention-over-configuration policy, and merely the presence of a library in
    your Gradle dependencies is enough to cause Spring Boot to pick that up and assume
    things about your setup. If you’re allergic to code and explicitness, this is
    great, but that’s pretty much the opposite of what I want when I write web apps.'
