- fmt: '# Preparing Your Web App


    The goal of this chapter is to write web handlers that use coroutines to perform
    parallelized calls to external services. These handlers will perform actual calls
    using a HTTP client. So you’ll need an actual HTTP server that you can execute
    your calls against.


    ## Implementing a Fake Service


    There are plenty of public and open APIs around that you could use. But you never
    know when a public API shuts down or is updated in a way that breaks backward
    compatibility. It’s also common for most APIs to require a personal API key, so
    that the owner of the API can limit abuse.


    For the sake of future-proofing this book and making it as stand-alone as possible,
    you’ll make your own fake service that you can invoke.


    To make the fake service as realistic as possible, you’ll create a separate HTTP
    API, running on a separate HTTP server, on a separate port. That way, you can
    invoke your fake service as if it was an external HTTP API. Technically speaking
    you could just invoke it directly, as it is running inside the same process as
    your main web app. But since it’s also available over HTTP, that’s what you’ll
    use when invoking it.


    ## Adding a Second Server


    You’ll run your fake service as a stand-alone HTTP server that runs alongside
    the HTTP server that runs your actual web app.


    One of the benefits of using libraries is that it’s easy to step outside of the
    box. That’s because there is no box. You have full access to everything and full
    control of how everything starts up. You already know how to start a HTTP server
    from your Kotlin code, as that’s what you already do for your existing web app.
    Adding a second server is as simple as adding a second call to Ktor’s `embeddedServer()`
    somewhere in your existing `main()` function.


    The actual implementation of the server will contain three routes: one route that
    picks a random number between 200 and 2000 and waits for that number of milliseconds
    and returns the number, another route that just returns the text `"pong"`, and
    one route that returns whatever you posted to it and reverses it. Listing [8-1](#531928_1_En_8_Chapter.xhtml#PC1)
    contains the code you need to set all this up.


    ```

    embeddedServer(Netty, port = 9876) {

    routing {

    get("/random_number", webResponse {

    val num = (200L..2000L).random()

    delay(num)

    TextWebResponse(num.toString())

    })

    get("/ping", webResponse {

    TextWebResponse("pong")

    })

    post("/reverse", webResponse {

    TextWebResponse(call.receiveText().reversed())

    })

    }

    }.start(wait = false)

    Listing 8-1

    A fake service with some route handlers that you’ll use to demonstrate coroutines

    ```


    `200L..2000L` is a range, and you’ve used ranges before when you implemented `mapFromRow()`
    back in Chapter [6](#531928_1_En_6_Chapter.xhtml) (see Listing [6-1](#531928_1_En_6_Chapter.xhtml#PC1)).
    The built-in extension function on `Range`, `random()`, is a convenient way to
    get a bounded random number.


    Notice how your new “fake” server is started with `.start(wait = false)`. Be sure
    to place this before the existing call to your “real” `embeddedServer()`. The
    “real” server is set to wait (`.start(wait = true)`), meaning that it will cause
    the `main()` function to block forever, listening for new incoming connections.
    Without this blocking/waiting of your “real” web app, the `main()` function would
    just exit immediately. The consequence of that is that any code you put below
    your “real” `embeddedServer()` starting will not run until your server shuts down.
    So start your “fake” server first, and set it to not wait/block. That way, your
    “fake” server will start, and then your “real” server will start, and your `main()`
    function will block and listen for incoming connections on both servers.


    # Understanding Coroutines


    Before you start implementing parallelized service calls to coroutines, you should
    know a little bit about what a coroutine does and what makes them tick.


    ## The `delay` Coroutine


    You’ve already written your first coroutine. Did you notice?


    In Listing [8-1](#531928_1_En_8_Chapter.xhtml#PC1), you wrote a web handler that
    generates a random number, and before it returns that number as text, it calls
    a function `delay()` with that random number. `delay()` is a coroutine!


    `delay()` is a special function that only works inside a coroutine context. If
    you try to call `delay()` at the top level or just inside your `main()` function,
    you’ll get an error, shown in Listing [8-2](#531928_1_En_8_Chapter.xhtml#PC2).


    ```

    Suspend function ''delay'' should be called only from a coroutine or another suspend
    function

    Listing 8-2

    The error message you get when attempting to call a coroutine from a non-coroutine
    context

    ```


    Why is it that you’re allowed to write `delay()` inside your web handlers, but
    not everywhere in your code? And why are you using `delay()` in the first place,
    instead of more familiar functions such as `Thread.sleep()`?


    ## The Problem with Threads


    The whole point of suspend functions and coroutines in Kotlin is to limit and
    control the use of threads, particularly sleeping threads.


    In the old days of Java platform web apps, the canonical architecture was for
    each HTTP request to take up one full thread, for the full duration of the handling
    of that request. If you got a new request incoming while another request was running,
    the web server would create a second thread to handle that request and so on.
    The web server would use a pool of threads to avoid having to create a new thread
    from scratch for each request. But fundamentally, a single thread handled a single
    request.


    The consequence of that is that for some (or even most) of the time, threads were
    idle and not doing any work. For example, if your web server queried a database,
    the thread that handled that request was sleeping while it waited for a response
    from the database server.


    This is a problem, because of the way threads work under the hood. A thread in
    Java creates a thread in the underlying operating system. An operating system
    thread is a relatively expensive resource. Each thread requires its own full call
    stack, and switching between threads also incurs an overhead.


    You can get quite far on modern operating systems, as they are much better at
    handling tens of thousands of threads now than back in the early 2000s when the
    Java platform became popular. But it’s usually a good idea to avoid creating a
    near-infinite number of threads and instead rely on other mechanisms for concurrency.


    ## Suspending Instead of Locking


    To avoid idle and sleeping threads, Kotlin has the concept of *suspension*.


    Suspension, in short, means that Kotlin knows how to suspend execution of your
    code at specific points and continue execution later. When your code reaches a
    point of suspension, Kotlin knows that it can use the thread where your code ran
    to do other things. Later, when the suspended code is ready to continue running,
    execution will continue, potentially on another thread.


    This is what the `delay()` function does. As soon as you call `delay()`, Kotlin
    suspends execution of your function. Later, when the internal scheduler triggers
    after the desired number of milliseconds (Kotlin uses a `ScheduledThreadPoolExecutor`
    for this on the Java platform), Kotlin resumes execution of your function.


    If you call `Thread.sleep()`, the Java runtime will block the entire thread for
    the duration you specify. If you use `delay()`, you let Kotlin take control of
    the thread management. You should use `delay()` and coroutines where you can and
    let the Kotlin runtime take control of thread management.'
