  trans: '

    ### 扩展函数


    第一步是创建清单 4-7 中所示的 `webResponse` 函数。`webResponse` 的返回值作为第二个参数传递给 `get`，并且需要匹配该类型签名。`get`
    的类型签名为 `get(path: String, body: ApplicationCall.() -> Unit)`。因此，`webResponse`
    需要返回一个匹配 `ApplicationCall.() -> Unit` 类型的值。


    这是一个带有*接收者类型*的*函数类型*。在清单 4-7 中对 `get` 的原始调用中，你将一个 lambda 作为第二个参数传递。函数类型是设置 Kotlin
    函数以接收 lambda 的方式之一。换句话说，lambda 是有效的函数类型。


    *接收者类型*是 `ApplicationCall`。带有接收者类型的 lambda 是一种你可以自定义 `this` 在 lambda 内部所指对象的 lambda。


    *扩展函数*就像带有接收者类型的 lambda，你可以在函数体内自定义 `this` 所指的对象，但它们是完整的具名函数，而不是匿名 lambda。


    在面向对象编程中，总有一个隐式的 `this` 指向你调用方法的实例。扩展函数是实例方法和普通独立函数之间的混合体。你不需要在类或接口内部定义扩展函数。相反，你可以在代码中的任何位置，为任何你想要的类型定义它们。


    在清单 4-8 中，一个示例演示了 `String` 上的扩展函数。该函数使用 `this` 来引用你调用该函数的字符串。你可以像调用 `String` 类本身定义的方法一样调用该函数。


    ```

    fun String.getRandomLetter() =

    this[Random.nextInt(this.length)]

    "FooBarBaz".getRandomLetter() // "z"

    "FooBarBaz".getRandomLetter() // "B"

    清单 4-8

    String 上扩展函数的演示

    ```


    带有接收者类型的 lambda 类似于扩展函数，区别在于它们只是 lambda，而不是在类型上定义的具名函数。你只能像调用该接收者类型实例上定义的方法一样，调用带有接收者类型的
    lambda。清单 4-9 展示了一个实现和调用带有接收者类型的 lambda 的示例。


    ```

    fun String.transformRandomLetter(

    body: String.() -> String

    ): String {

    val range = Random.nextInt(this.length).let {

    it.rangeTo(it)

    }

    return this.replaceRange(

    range,

    this.substring(range).body()

    )

    }

    "FooBarBaz".transformRandomLetter {

    "***${this.uppercase()}***"

    }

    // "FooB***A***rBaz

    清单 4-9

    带有接收者类型的 lambda 的演示

    ```


    参数 `body` 代表 lambda。与扩展函数类似，你直接在 `String` 的实例上调用 `body`，就像它是 `String` 本身实现的方法一样。


    要了解更多关于扩展函数的信息，你可以阅读官方 Kotlin 文档：[`https://kotlinlang.org/docs/extensions.xhtml`](https://kotlinlang.org/docs/extensions.xhtml)。


    ### 返回函数的函数


    快速提醒一下，`webResponse` 需要返回一个匹配 `ApplicationCall.() -> Unit` 类型的值。换句话说，`webResponse`
    需要返回一个函数或 lambda，以便类型匹配。


    你可以在清单 4-10 中看到 `webResponse` 实现的第一个空骨架版本。目前，它什么也不做，只是一个起点。


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    }

    }

    清单 4-10

    webResponse 的初始空骨架

    ```


    如前所述，类型 `ApplicationCall(). -> Unit` 是一种简化。你需要从 `webResponse` 返回的实际类型是 `PipelineInterceptor<Unit,
    ApplicationCall>`，它是类型 `suspend PipelineContext< Unit, ApplicationCall >.( Unit)
    -> Unit` 的别名。你的 `handler` lambda 的类型几乎相同，只是它返回一个 `WebResponse` 实例而不是空值（`Unit`）。`webResponse`
    的目标是调用 `handler`，使用 `handler` 返回的 `WebResponse` 实例，并最终将其映射到 Ktor。


    提示


    关键字 `suspend` 将在第 8 章中详细解释。目前，你只需要知道它是 Kotlin 处理程序类型的一部分，并且与协程相关。Ktor 中 `ApplicationCall`
    上的某些 API 需要 `suspend` 关键字才能正常工作。


    `webResponse` 返回一个 lambda。你不需要为 lambda 本身添加类型注解，因为 Kotlin 拥有从你返回 lambda 以及你为 `webResponse`
    定义了返回类型这一事实中推断类型所需的一切信息。Kotlin 会自动将其转换为匹配 `PipelineInterceptor<Unit, ApplicationCall>`
    的 lambda。


    ### 映射头部


    `webResponse` 返回的 lambda 应包含 Ktor 和 `WebResponse` 类之间的所有映射代码。所有 `WebResponse`
    实例都有一个头部映射，因此这是一个很好的起点。


    你可以在清单 4-11 中找到 `webResponse` 的更新版本，它从 `WebResponse` 实例读取头部并将其映射到 Ktor。


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    val resp = this.handler()

    for ((name, values) in resp.headers())

    for (value in values)

    call.response.header(name, value)

    }

    }

    清单 4-11

    将 WebResponse 头部映射到 Ktor

    ```


    你通过调用 `handler()` lambda 来获取 `WebResponse` 实例。映射代码不关心你创建该 `WebResponse` 的内容和细节。它只关心将任意的
    `WebResponse` 实例映射到 Ktor。


    你将 `handler` 作为扩展函数调用。`this` 的类型与 `handler` 的接收者类型匹配，这就是为什么你可以像调用 `handler` 是
    `this` 所代表对象上的方法一样调用 `this.handler()`。


    `headers()` 函数返回一个映射，其中键是头部名称，值是该头部名称的头部值列表。因此，你只需要遍历它们，并为每个头部值调用 `call.response.header`。


    请记住：你从 `webResponse` 返回的 lambda 具有（简化的）签名 `ApplicationCall.() -> Unit`。这就是使 `call`
    对其可用的原因。


    ### 映射 TextWebResponse 和状态码


    下一步是映射各个响应类型，以便你做一些比仅设置头部更有用的事情，并使用 `WebResponse` 实例中的所有数据，将它们传递给 Ktor。


    清单 4-12 展示了 `webResponse` 的更新版本，它检查 `WebResponse` 实例的类型并处理 `TextWebResponse`。


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    val resp = this.handler()

    for ((name, values) in resp.headers())

    for (value in values)

    call.response.header(name, value)

    val statusCode = HttpStatusCode.fromValue(

    resp.statusCode

    )

    when (resp) {

    is TextWebResponse -> {

    call.respondText(

    text = resp.body,

    status = statusCode

    )

    }

    }

    }

    }

    清单 4-12

    将 TextWebResponse 和 JsonWebResponse 映射到 Ktor

    ```


    `WebResponse` 有一个定义为 `Int` 的 `statusCode` 字段。Ktor 需要一个 `HttpStatusCode` 实例。幸运的是，Ktor
    提供了 `HttpStatusCode.fromValue` 函数来将有效的 `Int` 转换为 `HttpStatusCode`。


    你可以使用 `when` 语句将 `WebResponse` 的各个类型映射到 Ktor。`when` 类似于其他语言中的 `switch`，其中每个语句定义了你希望如何处理各种情况。目前，你只有
    `TextWebResponse`，但稍后你会添加更多类型，因此你可以立即使用 `when` 语句。

