- fmt: '### Accessing the Logged-In User


    When you load web handlers that require logging in, it’s also useful to be able
    to extract information about the currently logged-in user, so that you can display
    the name of the user on the web page and use the ID of the user in the database
    as inputs to various queries.


    There are two main ways of accessing the currently logged-in user in Spring Security.


    The first is to use the thread-local variable accessible form, `SecurityContextHolder.getContext().authentication`.
    This is globally available if you access this from a web handler thread. This
    is a convenient way to access the currently logged-in user, but it’s a little
    bit problematic in the world of Kotlin. For example, if you aren’t careful, your
    code is suddenly running in a different thread because you access it in a coroutine.
    And if you try to set up your servlet and servlet filter to be async, the `SecurityContextHolder`
    will also stop working, as async servlets are not limited to a single thread per
    request.


    The second is to access the user principal on the servlet request itself. This
    is not relying on thread-local variables and is more functional and data driven
    in nature. Each request that your servlet stack is processing gets an instance
    of a servlet request, and you can pass this around wherever you like.


    There’s one problem with using the `javaSecurityPrincipal`, though. As I’m writing
    this chapter, Ktor 2.2.0 is not yet released. And there’s a bug in earlier versions
    of Ktor where `javaSecurityPrincipal` does not work and always returns `null`.
    So, for now, you’ll have to use non-async servlets and access the session using
    the thread-local `SecurityContextHolder.getContext().authentication`.


    I advise you to check the Ktor issue tracker, at [https://youtrack.jetbrains.com/issue/KTOR-4784](https://youtrack.jetbrains.com/issue/KTOR-4784),
    and see if the issue has been resolved and released. The issue was reported by
    yours truly on August 22, 2022 (which also happens to be the birthday of yours
    truly), and fixed by the Ktor team just two days later, August 24. Yay, Ktor team!


    # Part III: Tools of the Trade


    # 15. Choosing the Right Library


    In this chapter, I’ll share some of my thoughts about libraries, how to compare
    libraries with frameworks, and some tools for choosing the right library. Usually,
    there’s more than one library available that you can choose from for doing the
    same task. So it’s useful to know how to pick the right one.


    ## What’s a Library?


    Our industry has no widely agreed-upon definition of the difference between a
    library and a framework. The distinction I use is:


    A library is something you call. A framework is something that calls you.


    Another practical distinction is that in a library, nothing happens that you didn’t
    ask for. The trade-off is that you need to wire up things yourself and write some
    bootstrapping code to get everything up and running.


    In contrast, in a framework, a lot of things happen automatically, to save you
    some work and make your life easier. The trade-off is that when something breaks
    or if the framework isn’t calling your code automatically when it should be, it
    can be difficult to figure out why or even to figure out that something is wrong
    in the first place.


    One of the main real-world problems I have when I use frameworks is that when
    things go wrong, you’re confronted with mountains of framework code that you weren’t
    aware of before and that you suddenly must understand to be able to move forward.
    Framework code that stops automatically calling your own code can require lots
    of work to understand what happened and why.


    There is a gray area here, though. In Chapter [9](#531928_1_En_9_Chapter.xhtml),
    you configured Ktor to handle session cookies and authorization. You don’t see
    that code anywhere. All you did was to wrap your routes in `authenticate("auth-session")`
    and hope for the best. There’s a lot of mapping and action going on under the
    hood of Ktor to make that work, and if that stops working, you wouldn’t necessarily
    know why.


    The benefit of Ktor and libraries is that you do call a function (`authenticate`)
    and you refer to the config by name (`"auth-session"`). So it’s not *that* implicit
    and magical. Ktor won’t do anything automatically with authentication; you must
    tell it to.


    You’re not necessarily immune from magic that stops working when you use libraries.
    But you drastically reduce the chance of that happening, eliminating a whole category
    of bugs from your web app.


    ## Popularity Is Largely Irrelevant


    Some people see the popularity of a library as an important metric. Popularity
    isn’t a *completely* irrelevant metric. If you find two libraries that do the
    same thing, you should probably choose the more popular one.


    However, using popularity as the main metric when choosing a library can get in
    the way of thinking for yourself. The most important thing when choosing a library
    is to use all the good taste and judgment you’ve accumulated over time, evaluate
    the options, and make an informed choice. If the answer is simply “use Spring
    Security because everyone is using Spring” or “use React because everyone is using
    React,” then you’re not really thinking.


    The assumption baked into using popularity as a metric is that the people who
    choose popular libraries (or frameworks) do that because it’s always the best
    choice and because everyone who chose that library chose it after deep thinking
    and evaluation. Usually, it’s more of a zeitgeist that picks which libraries are
    popular. And often, the most popular libraries are the ones that people choose
    when they *don’t* think deeply about what’s right for their project.


    Keep in mind, though, that there is one type of popularity that’s important: the
    availability of libraries. If you use a programming language that’s very unpopular,
    you’ll have to write a lot of code from scratch, without the help of libraries.


    In Paul Graham’s 2001 essay *Beating the Averages* ([www.paulgraham.com/avg.xhtml](http://www.paulgraham.com/avg.xhtml)),
    Graham argues that Lisp is such an excellent choice of programming language that
    they got ahead of their competition just because of the sheer power of the Lisp
    language itself. This is true, of course (I am a Lisp weenie at the core, after
    all), but only to some extent. If someone invents the best language in the universe
    tomorrow that’s super-efficient and has a sound and complete type system that
    never gets in your way but solves the halting problem and makes it impossible
    to write bugs, you still might not speed ahead of your competition that uses Java
    or PHP. The sheer amount of third-party libraries available on those platforms
    allows you to beat users of Perfect Language 9000 almost every time.'
