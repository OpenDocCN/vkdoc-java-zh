  trans: '

    ### 避免自动序列化


    在构建 Web 应用时，你应始终明确地进行序列化，并避免从 XML 和 JSON 等动态数据格式自动序列化为类型安全的数据类。


    Kotlin 拥有大量库，可以自动将 XML 和 JSON 等动态数据格式转换为类型化的数据类。最终得到类型安全的数据类是一件好事。但自动将动态数据转换为类型安全的数据类是有问题的。


    自动数据序列化的一个例子是 `kotlinx.serialization` ([*https://github.com/Kotlin/kotlinx.serialization*](https://github.com/Kotlin/kotlinx.serialization))。这个库本身没有问题；它是一个制作精良的库，完全实现了其应有的功能。`kotlinx.serialization`
    的本质是，你创建数据类并用 `kotlinx.serialization.Serializable` 注解它们。这些数据类可以转换为各种数据格式，也可以从各种数据格式转换回来。清单
    10-3 展示了如何通过一个类型安全的数据类序列化为 JSON 以及从 JSON 反序列化。


    ```

    @Serializable

    data class MyThing(val myVal: String, val foo: Int)

    val obj = Json.decodeFromString(

    """{"myVal":"testing", "foo": 123}"""

    )

    obj.myVal

    // "testing"

    Json.encodeToString(obj)

    // 返回 {"myVal":"testing", "foo": 123}

    清单 10-3

    演示 kotlinx.serialization 基础

    ```


    使用 `kotlinx.serialization` 可以省去大量手动输入的工作，因为你只需将一个数据类与一个 JSON 字符串结合，剩下的工作都由 Kotlin
    完成。


    然而，主要的缺点是，这会将你的公共 API 与内部代码库紧密耦合。如果你在自己的代码中更改了 `MyThing.myVal` 的名称，也会破坏你 API 的调用者。


    另一个缺点是，你的 API 实体被迫遵循 Kotlin 的命名约定。在 JSON 中，属性名称通常使用 `underscore_case` 而不是 `camelCase`。但由于你在动态数据和类型化的
    Kotlin 数据类之间进行 1:1 的序列化，它们必须保持一致。


    请注意，这属于高度主观的最佳实践范畴，会有很多聪明且高效的开发者不同意这个观点。但在我所有生产级的 Web 应用中，我一直坚持这种区分，以保持我自身代码的灵活性和敏捷性，同时为
    API 的外部调用者提供稳定性和向后兼容性。


    ### 内部 API 与外部 API


    你在本节中学到的内容主要适用于内部 API。我的意思是，这些 API 是由你自己的代码或与你密切合作的人编写的代码来消费的。


    如果你正在编写一个面向公众的 API，例如作为 SaaS 产品一部分的 API，那么你应该确保你的 API 具有出色的错误消息，并且无论你向它抛出什么，它都能以正确的
    HTTP 状态码完美运行。例如，如果你向当前代码发布无效的 JSON，它只会抛出一个 5xx 错误（服务器错误），而技术上正确的状态码应该是 4xx 系列（客户端错误）。


    本章中的技术不足以达到那种细节水平。我没有教你如何为大规模公共 API“正确地”做到这一点，有两个原因。


    首先，这样做成本高昂。当你和你的同事是你 API 的唯一消费者时，一个解释基本信息的 README 文件和一个大部分时间能返回有用错误消息（但偶尔如果有人向你的
    API 提交了足够糟糕的数据，会抛出 500 错误）的 API 就足够了。


    其次，我实际上从未制作过面向公众的 API。关于如何正确做到这一点，我有很多想法。但由于我没有相关的实际经验，我认为我不是教你如何做到这一点的合适人选。


    ## 单页应用


    在现实世界中经常看到的一种 API 用例是针对浏览器和基于 JavaScript 的*单页应用*（SPA）。


    ### 与 API 一起托管


    设置单页应用的一种方法是将 API 和前端都托管在同一个 Web 应用中。


    SPA 的核心是一个 `index.xhtml` 文件，它加载你的 JavaScript 代码和其他关键资源。在大多数现代单页应用中，你的 JavaScript
    被设置为使用 `pushState` 浏览器 API 作为其路由的一部分，以处理 SPA 的不同部分。例如，React JavaScript 框架中常用的路由库
    React Router 就是以这种方式运行的。这意味着，当你首次打开 URL `/`（根页面）时，后端提供 `index.xhtml` 文件，该文件进而加载你的
    JavaScript，然后 SPA 路由器渲染正确的内容。接着，你在 SPA 中点击一个按钮，JavaScript 会调用 `pushState`，使得 URL
    从 `/` 变为 `/something_else`，然后你的 JavaScript 会渲染适合该 URL 的不同内容。


    这样做的问题是，当你分享该页面的链接或用户尝试刷新时，浏览器中的当前 URL 是 `/something_else`，而这是你的 Ktor 路由将尝试加载的路由。因此，如果你只设置了
    `/` 来提供 `index.xhtml`，你现在会得到一个 404 页面，因为你的 Ktor 后端没有 `/something_else` 的映射。


    一种解决方案是手动添加 SPA 中所有已知的路由，并将它们复制到你的 Ktor 路由中。然而，这并非一个真正可行的选项，因为你最终会进行大量手动且容易出错的复制粘贴。


    另一种选择是在 Ktor 中使用特殊的 `singlePageApplication` 路由类型。`singlePageApplication` 的工作方式与
    `static` 类似，不同之处在于它还会设置你的路由，使得任何 Ktor 未处理的路由都将渲染你的 `index.xhtml` 文件。通过这种设置，直接在
    `/something_else` 上刷新页面是可行的，因为你的 Ktor Web 应用中没有针对该路径的路由处理器，这反过来会触发 `singlePageApplication`
    路由并加载 `index.xhtml`，从而使你的 JavaScript 运行并处理正确页面的渲染。清单 10-4 展示了如何进行设置。


    ```

    singlePageApplication {

    if (appConfig.useFileSystemAssets) {

    filesPath = "src/main/resources/public"

    } else {

    useResources = true

    filesPath = "public"

    }

    defaultPage = "index.xhtml"

    }

    清单 10-4

    在 createKtorApplication 内部设置 singlePageApplication，以从你的 Web 应用托管 SPA

    ```


    在添加 `singlePageApplication("/")` 路由之前，你应该确保移除现有的 `static("/")` 路由。旧的 `static("/")`
    路由与 `singlePageApplication("/")` 冲突，而后者已经完成了旧 `static("/")` 路由所做的所有事情。


    `singlePageApplication` 中的配置属性与你用于 `static` 的相同。在本地运行时，你指向文件系统中的文件；而在生产环境中运行时，你指向
    Gradle 构建编译到编译输出 Java 类路径中的资源。


    `defaultPage` 指向引导你的 SPA 的 `index.xhtml` 文件。该文件应位于 `src/main/resources/public/index.xhtml`。通常，这个文件只包含一个极简的
    HTML 文件，用于加载你用来加载 SPA 的 JavaScript。之所以是 HTML 文件而不是 `kotlinx.xhtml` DSL 代码，是因为你可能会使用某种
    SPA 构建工具（如 Webpack）来构建你的 SPA，这些工具通常会生成你必须使用的自己的 HTML 引导代码。此外，该文件应该是完全静态的，并且不会根据你正在查看的路由而改变内容。因此，将其作为静态文件使用效果很好。

