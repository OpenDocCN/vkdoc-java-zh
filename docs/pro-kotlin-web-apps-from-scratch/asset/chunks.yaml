- fmt: '### Java Platform Implementation Details


    If you *really* want to dig deep, you can look at the generated byte code.


    If you use IntelliJ IDEA, you can open a class file in the folder `build/classes/kotlin/main`
    and use the feature *Tools ➤ Kotlin ➤ Decompile to Java*. This code won’t be particularly
    readable, but you’ll see exactly what the Kotlin compiler does to generate Java
    platform–compatible code from suspend functions. Listing [8-13](#531928_1_En_8_Chapter.xhtml#PC16)
    shows a full example of the compiled output of the `createContinuation` function
    in Listing [8-12](#531928_1_En_8_Chapter.xhtml#PC15).


    ```

    Int label;

    public final Object invokeSuspend(@NotNull Object $result) {

    label17: {

    Object var2 = IntrinsicsKt.getCOROUTINE_SUSPENDED();

    Continuation var10000;

    switch (this.label) {

    case 0:

    ResultKt.throwOnFailure($result);

    System.out.println("a");

    var10000 = (Continuation)this;

    this.label = 1;

    if (ContinuationTestKt.haltHere(var10000) == var2) {

    return var2;

    }

    break;

    case 1:

    ResultKt.throwOnFailure($result);

    break;

    case 2:

    ResultKt.throwOnFailure($result);

    break label17;

    default:

    throw new IllegalStateException("call to ''resume'' before ''invoke'' with coroutine");

    }

    System.out.println("b");

    System.out.println("c");

    var10000 = (Continuation)this;

    this.label = 2;

    if (ContinuationTestKt.haltHere(var10000) == var2) {

    return var2;

    }

    }

    System.out.println("d");

    return Unit.INSTANCE;

    }

    Listing 8-13

    A full example of the compiled output of the createContinuation function

    ```


    This code is full of things you don’t normally see in Java code, such as label
    blocks and breaks with labels (the `label17` stuff). But it serves as a good demonstration
    to understand how Kotlin manages to not block threads. It takes your linear Kotlin
    code in `createContinuation` and compiles it into a hard-coded state machine.
    The initial case `0` first prints `"a"`, steps the `label` state from `0` to `1`,
    and then returns a continuation object, `var2`. The next time Kotlin invokes the
    continuation, the case `1` runs, which does nothing, and continues to the code
    below the case statement where you print `"b"` and `"c"`, and the `label` state
    is set to `2`. On the next invocation, the case 2 runs, which just breaks the
    entire `label17` block, and continues to the code below it, which prints `"d"`.
    Kotlin doesn’t change the state machine when this happens, which is why you repeatedly
    get `"d"` printed when you invoke the continuation multiple times after it’s “finished”,
    as seen at the end of Listing [8-12](#531928_1_En_8_Chapter.xhtml#PC15).


    This code isn’t exactly idiomatic Java code, but that doesn’t matter. Idiomatic
    Java is for humans, not computers. You’ll be reading and writing the Kotlin code,
    and this compiled output is only there to make it possible for Kotlin to automatically
    turn your synchronous-looking code to asynchronous code that the runtime can interrupt
    and resume (or continue) at pre-compiled points in the code.


    I find that it really helps to understand the deepest levels of what’s really
    going on in coroutines. Turning synchronous statements into a state machine that
    Kotlin can interrupt and resume is what enables high-performance asynchronous
    `kotlinx.coroutines`, as well as Arrow’s ability to halt execution of code after
    certain states occur, without having to resort to exceptions.


    By compiling your linear-looking Kotlin code to a state machine, you get to write
    nice-looking code, without having to block the thread and without having to resort
    to writing code like the one in Listing [8-13](#531928_1_En_8_Chapter.xhtml#PC16)
    yourself.


    # 9. Building Traditional Web Apps with HTML and CSS


    In this chapter, you’ll learn how to generate HTML on the server and how to set
    up your web app to serve CSS, images, and other static content.


    You’ll also set up authentication and a login form and enhance your existing `user_t`
    table to support production-grade password security and encryption.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - The safe call operator

    - Operator overloading

    - Using domain-specific languages (DSLs)

    - Details about the precedence rules of extension functions

    - Object expressions


    Also in this chapter, you will learn the following about building traditional
    web apps with HTML and CSS:


    - Using the `kotlinx.xhtml` ([*https://github.com/Kotlin/kotlinx.xhtml*](https://github.com/Kotlin/kotlinx.xhtml))
    DSL to build HTML

    - Making reusable layouts

    - Logging in and authenticating users

    - Encrypting and signing session cookies

    - Hashing and securely storing user passwords


    When you’re done, you’ll have a fully working HTML-based setup with all the necessary
    components for building a production-grade web app.


    ## Patterns and Organization


    There are many frameworks and libraries available for making traditional server-side
    web apps and many ways to organize and structure them.


    I’ve used the a priori assumption that you want to generate static HTML on the
    server, without any additional functionality. For example, the JavaScript framework
    Next.js ([*https://nextjs.org/*](https://nextjs.org/)) is set up so that your
    React-based web app automatically renders server-side and is *hydrated*, meaning
    that the pre-generated server-side HTML is “updated” to become a full-fledged
    JavaScript single-page app (SPA). In this chapter, you’ll just generate “dumb”
    HTML from a Kotlin-powered web app back end.


    There are also frameworks like Vaadin ([*https://vaadin.com/*](https://vaadin.com/)),
    which is a full-stack solution bundled with UI components, a built-in CMS, and
    so on. This is a framework, not a library, so it’s not a good fit for this book.
    And you won’t be building any sophisticated user interfaces in this book either;
    you’ll just learn how to set up the basics, so you won’t be needing UI components.


    As for structuring your code, I consider that to be outside of the scope of this
    book. The main goal is to teach you how to use libraries and to learn a lot of
    Kotlin along the way. The topic of code organization quickly becomes subjective
    and opinion-based, and I don’t think I’ve ever worked with a real-world web app
    where the structure always makes sense and where every component of the codebase
    has a sensible home. In fact, I often have a namespace called something like `myapp.homeless`
    where I deliberately place things that are hard to find a good home for.


    ## Generating HTML


    In this section, you’ll learn the essentials for generating HTML and how to do
    so from Kotlin and Ktor.


    ### Using the `kotlinx.xhtml` DSL


    You’ll use the `kotlinx.xhtml` *DSL* (domain-specific language) to generate HTML.
    The Ktor HTML DSL plugin adds a small wrapping layer around `kotlinx.xhtml` and
    makes it easy to use from Ktor web handlers.


    A DSL is a language within a language. Kotlin has powerful features for building
    DSLs, and using the `kotlin.xml` DSL means that you can express all your HTML
    as plain Kotlin code. If you need loops, conditionals, variables, and other features,
    you write those as plain Kotlin. Having all the power of Kotlin available when
    you write HTML is a big win. Ktor also has support for various templating engines,
    like Mustache, FreeMarker, and others. But all of those have the disadvantage
    of needing a separate templating language for loops, conditionals, etc.


    Additionally, `kotlinx.xhtml` is easy to use outside of Ktor, which will come
    in handy in later chapters when you’ll run your web handlers in various contexts.'
