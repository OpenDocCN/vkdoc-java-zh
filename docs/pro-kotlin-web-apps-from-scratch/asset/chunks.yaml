- fmt: "Keep in mind that to avoid conflicts between web pages and your API handlers,\
    \ all your API routes with `/api/...`. So, instead of logging in with a request\
    \ to `POST /login`, you should change that to `POST /api/login`. Then, make sure\
    \ that your single-page app does not have any pages that start with `/api`. That\
    \ way, you’ll never have conflicting routes between your Ktor back end and your\
    \ JavaScript router.\n\n## Hosting Separately with CORS\n\nAnother way to set\
    \ up a single-page app is to host the JavaScript code and HTML bootstrapping on\
    \ a separate domain name from the API and use XHR/fetch with CORS for cross-domain\
    \ access between your single-page app and your API.\n\nThe actual static HTML\
    \ and JavaScript files have the same structure as when you host them alongside\
    \ your API with the `singlePageApplication` route. The difference is that you\
    \ host them externally. So you can host your API on `api.myapp.com` and your SPA\
    \ on `www.myapp.com`. You can then choose a hosting platform for your SPA that’s\
    \ more suited for serving raw static files, such as a CDN like AWS CloudFront,\
    \ Cloudflare, Azure Static Web Apps, or anything you want.\n\nCORS (short for\
    \ Cross-Origin Resource Sharing) is an API that all modern browsers support, which\
    \ allows your JavaScript code to call APIs on domain names other than its own.\
    \ Traditionally, browsers have limited to HTTP calls to the domain that you’re\
    \ currently on, and you would get an error if you attempted to call a different\
    \ domain (e.g., a cross-origin request). So, if you follow the preceding example,\
    \ you’d get an error message if you tried to use JavaScript to call `api.myapp.com`\
    \ when the browser is showing `www.myapp.com`.\n\nWhen JavaScript performs a request\
    \ to a different domain name, it first sends an `OPTIONS` request to that server.\
    \ (`OPTIONS` is another HTTP verb, like `GET`, `POST`, `PUT`, etc.). If that `OPTIONS`\
    \ request responds with the correct CORS headers, the browser will continue and\
    \ perform the actual request that you initiated. If not, you’ll get an error message.\n\
    \nYou need to set up your Ktor API to handle these CORS requests. You could manually\
    \ intercept the `OPTIONS` requests and respond with the correct headers. But the\
    \ easier way to do it is to install the CORS plugin that does it for you.\n\n\
    The first step is to add the plugin as a dependency to your `build.gradle.kts`:\n\
    \n```\nimplementation(\"io.ktor:ktor-server-cors-jvm:2.1.2\")\n```\n\nTo make\
    \ CORS work, you need to change a few things. In `setUpKtorCookieSecurity`, change\
    \ the `SameSite` attribute of your session cookie from `\"lax\"` to `\"none\"\
    `. You’ll run your web app across different origins now, so for the browser to\
    \ correctly transfer your session cookie, you’ll need to disable `SameSite`.\n\
    \nNext, you’ll set up the CORS plugin itself. Add it to your `createKtorApplication`,\
    \ alongside your `StatusPages` plugin. Listing 10-5 shows how to set it up correctly.\n\
    \n```\ninstall(CORS) {\n    allowMethod(HttpMethod.Put)\n    allowMethod(HttpMethod.Delete)\n\
    \    allowHost(\"localhost:4207\")\n    allowHost(\"www.myapp.com\", schemes =\
    \ listOf(\"https\"))\n    allowCredentials = true\n}\n```\n\nThe HTTP methods\
    \ `GET` and `POST` are enabled by default. Most of my real-world web apps also\
    \ use at least `PUT` and `DELETE`, so you should allow those as well. You also\
    \ need to enable specific host names. CORS supports wildcard origins, but not\
    \ when you want to include credentials (i.e., cookies). Finally, you need to enable\
    \ credentials in the first place, by setting `allowCredentials` to `true`.\n\n\
    You also need to have a way to host your web app HTML locally. That’s why you’re\
    \ adding `localhost:4207` to the list of allowed origins, which means that you\
    \ can use the `singlePageApplication` plugin in development and configure it to\
    \ only load in the local environment and not in production. Alternatively, you\
    \ can use something like create-react-app or set up Webpack yourself, to host\
    \ an `index.xhtml` file and build your JavaScript. If you use an external server\
    \ like Webpack, update the port number to point to the port of your Webpack server.\
    \ (The intricate details of building a SPA are outside of the scope of this chapter,\
    \ so I’m deliberately skipping a lot of details on how to set it up.)\n\n## Authenticating\
    \ Users\n\nWith this set up and ready to go, you can perform a request with your\
    \ JavaScript to log in, and it will work fine even if your JavaScript runs on\
    \ a different origin than your API.\n\nYou can use the existing `POST /login`\
    \ handler from Chapter 9 to log in from your single-page app. That web handler\
    \ expects form-encoded data, posted by a normal HTML `<form>`. But you can generate\
    \ that same type of request from JavaScript as well. Listing 10-6 shows an example\
    \ of how to do that.\n\n```\nfetch(\"/login\", {\n    credentials: \"include\"\
    ,\n    method: \"POST\",\n    headers: {\n        \"Content-Type\": \"application/x-www-form-urlencoded\"\
    \n    },\n    body: new URLSearchParams({\n        username: ...,\n        password:\
    \ ...\n    })\n})\n```\n\nIt’s important to remember to set `credentials: \"include\"\
    ` when you call fetch. If you don’t, it won’t receive and send any cookies alongside\
    \ your request.\n\nSince the cookie is HTTP only, it’s impossible to access it\
    \ from JavaScript. That means that if you for some reason become the victim of\
    \ a script injection attack, there’s no way for the attacker to extract session\
    \ keys, which is a big win for security.\n\nIf you’re making a pure API without\
    \ any HTML, you could also change `POST /login` to receive and parse JSON instead\
    \ of data that’s like what you’d get in a HTML `<form>` tag. If you do that, you\
    \ should also change your API to return a 200 OK instead of a redirect upon successful\
    \ login.\n\n# Native Apps\n\nNon-web native apps, such as mobile apps and native\
    \ desktop apps, can also call your API. This category also includes web-based\
    \ wrappers, where a native app wraps web technologies, such as Electron. Even\
    \ if those apps use web technologies, they don’t have to succumb to the security\
    \ sandbox of browsers and can perform network calls just like plain native apps.\n\
    \n## Using Cookies for Authentication\n\nThe only thing you need to consider in\
    \ native apps, compared with web-based SPAs, is authentication. There are two\
    \ main ways to set up your API for authenticating users in non-browser-based apps.\
    \ The first is to use cookies for authentication, just like you do for a HTML-based\
    \ web app or a SPA like you did earlier in this chapter.\n\nMost HTTP clients\
    \ available to native apps will automatically handle cookies or can be set up\
    \ to handle them. That means that the HTTP client will behave just like a browser\
    \ and store any cookies that are set using the `Set-Cookie` header and send them\
    \ back to the server in the requests you perform. This is an easy and convenient\
    \ way to have the same API setup for both web-based apps and native apps.\n\n\
    Make sure that you don’t enable CORS and don’t use auth tokens for SPAs. For native\
    \ apps, having exposed auth tokens does not matter. But for web apps, where cross-origin\
    \ attacks are a common attack vector, it’s important to hide the authentication\
    \ credentials behind a cookie that is not accessible from the JavaScript runtime."
  raw: 'Keep in mind that to avoid conflicts between web pages and your API handlers,
    all your API routes with `/api/...`. So, instead of logging in with a request
    to `POST /login`, you should change that to `POST /api/login`. Then, make sure
    that your single-page app does not have any pages that start with `/api`. That
    way, you’ll never have conflicting routes between your Ktor back end and your
    JavaScript router.


    ### Hosting Separately with CORS


    Another way to set up a single-page app is to host the JavaScript code and HTML
    bootstrapping on a separate domain name from the API and use XHR/fetch with CORS
    for cross-domain access between your single-page app and your API.


    The actual static HTML and JavaScript files have the same structure as when you
    host them alongside your API with the `singlePageApplication` route. The difference
    is that you host them externally. So you can host your API on `api.myapp.com`
    and your SPA on [`www.myapp.com`](http://www.myapp.com). You can then choose a
    hosting platform for your SPA that’s more suited for serving raw static files,
    such as a CDN like AWS CloudFront, Cloudflare, Azure Static Web Apps, or anything
    you want.


    CORS (short for Cross-Origin Resource Sharing) is an API that all modern browsers
    support, which allows your JavaScript code to call APIs on domain names other
    than its own. Traditionally, browsers have limited to HTTP calls to the domain
    that you’re currently on, and you would get an error if you attempted to call
    a different domain (e.g., a cross-origin request). So, if you follow the preceding
    example, you’d get an error message if you tried to use JavaScript to call `api.myapp.com`
    when the browser is showing [`www.myapp.com`](http://www.myapp.com).


    When JavaScript performs a request to a different domain name, it first sends
    an `OPTIONS` request to that server. (`OPTIONS` is another HTTP verb, like `GET`,
    `POST, PUT`, etc.). If that `OPTIONS` request responds with the correct CORS headers,
    the browser will continue and perform the actual request that you initiated. If
    not, you’ll get an error message.


    You need to set up your Ktor API to handle these CORS requests. You could manually
    intercept the `OPTIONS` requests and respond with the correct headers. But the
    easier way to do it is to install the CORS plugin that does it for you.


    The first step is to add the plugin as a dependency to your *build.gradle.kts*:


    ```

    implementation("io.ktor:ktor-server-cors-jvm:2.1.2")

    ```


    To make CORS work, you need to change a few things. In `setUpKtorCookieSecurity`,
    change the `SameSite` attribute of your session cookie from `"lax"` to `"none"`.
    You’ll run your web app across different origins now, so for the browser to correctly
    transfer your session cookie, you’ll need to disable `SameSite`.


    Next, you’ll set up the CORS plugin itself. Add it to your `createKtorApplication`,
    alongside your `StatusPages` plugin. Listing [10-5](#531928_1_En_10_Chapter.xhtml#PC6)
    shows how to set it up correctly.


    ```

    install(CORS) {

    allowMethod(HttpMethod.Put)

    allowMethod(HttpMethod.Delete)

    allowHost("localhost:4207")

    allowHost("www.myapp.com", schemes = listOf("https"))

    allowCredentials = true

    }

    Listing 10-5

    Adding CORS setup to your Ktor app

    ```


    The HTTP methods `GET` and `POST` are enabled by default. Most of my real-world
    web apps also use at least `PUT` and `DELETE`, so you should allow those as well.
    You also need to enable specific host names. CORS supports wildcard origins, but
    not when you want to include credentials (i.e., cookies). Finally, you need to
    enable credentials in the first place, by setting `allowCredentials` to `true`.


    You also need to have a way to host your web app HTML locally. That’s why you’re
    adding `localhost:4207` to the list of allowed origins, which means that you can
    use the `singlePageApplication` plugin in development and configure it to only
    load in the local environment and not in production. Alternatively, you can use
    something like create-react-app or set up Webpack yourself, to host an index.xhtml
    file and build your JavaScript. If you use an external server like Webpack, update
    the port number to point to the port of your Webpack server. (The intricate details
    of building a SPA are outside of the scope of this chapter, so I’m deliberately
    skipping a lot of details on how to set it up.)


    ### Authenticating Users


    With this set up and ready to go, you can perform a request with your JavaScript
    to log in, and it will work fine even if your JavaScript runs on a different origin
    than your API.


    You can use the existing `POST /login` handler from Chapter [9](#531928_1_En_9_Chapter.xhtml)
    to log in from your single-page app. That web handler expects form-encoded data,
    posted by a normal HTML `<form>`. But you can generate that same type of request
    from JavaScript as well. Listing [10-6](#531928_1_En_10_Chapter.xhtml#PC7) shows
    an example of how to do that.


    ```

    fetch("/login", {

    credentials: "include",

    method: "POST",

    headers: {

    "Content-Type": "application/x-www-form-urlencoded"

    },

    body: new URLSearchParams({

    username: ...,

    password: ...

    })

    })

    Listing 10-6

    Calling your API using JavaScript from a different origin

    ```


    It’s important to remember to set `credentials: "include"` when you call fetch.
    If you don’t, it won’t receive and send any cookies alongside your request.


    Since the cookie is HTTP only, it’s impossible to access it from JavaScript. That
    means that if you for some reason become the victim of a script injection attack,
    there’s no way for the attacker to extract session keys, which is a big win for
    security.


    If you’re making a pure API without any HTML, you could also change `POST /login`
    to receive and parse JSON instead of data that’s like what you’d get in a HTML
    `<form>` tag. If you do that, you should also change your API to return a 200
    OK instead of a redirect upon successful login.


    ## Native Apps


    Non-web native apps, such as mobile apps and native desktop apps, can also call
    your API. This category also includes web-based wrappers, where a native app wraps
    web technologies, such as Electron. Even if those apps use web technologies, they
    don’t have to succumb to the security sandbox of browsers and can perform network
    calls just like plain native apps.


    ### Using Cookies for Authentication


    The only thing you need to consider in native apps, compared with web-based SPAs,
    is authentication. There are two main ways to set up your API for authenticating
    users in non-browser-based apps. The first is to use cookies for authentication,
    just like you do for a HTML-based web app or a SPA like you did earlier in this
    chapter.


    Most HTTP clients available to native apps will automatically handle cookies or
    can be set up to handle them. That means that the HTTP client will behave just
    like a browser and store any cookies that are set using the `Set-Cookie` header
    and send them back to the server in the requests you perform. This is an easy
    and convenient way to have the same API setup for both web-based apps and native
    apps.


    Make sure that you don’t enable CORS and don’t use auth tokens for SPAs. For native
    apps, having exposed auth tokens does not matter. But for web apps, where cross-origin
    attacks are a common attack vector, it’s important to hide the authentication
    credentials behind a cookie that is not accessible from the JavaScript runtime.'
  trans: '

    请记住，为了避免网页与 API 处理程序之间的冲突，所有 API 路由都应使用 `/api/...` 前缀。因此，不要通过 `POST /login` 请求登录，而应将其改为
    `POST /api/login`。同时，请确保你的单页应用中没有任何以 `/api` 开头的页面。这样，你的 Ktor 后端和 JavaScript 路由器之间就永远不会出现路由冲突。


    ### 使用 CORS 进行独立托管


    设置单页应用的另一种方法是将 JavaScript 代码和 HTML 引导文件托管在与 API 不同的域名上，并使用带有 CORS 的 XHR/fetch
    来实现单页应用与 API 之间的跨域访问。


    实际的静态 HTML 和 JavaScript 文件的结构，与使用 `singlePageApplication` 路由将它们与 API 托管在一起时相同。区别在于，你将它们托管在外部。因此，你可以将
    API 托管在 `api.myapp.com`，将 SPA 托管在 [`www.myapp.com`](http://www.myapp.com)。然后，你可以为
    SPA 选择一个更适合提供原始静态文件的托管平台，例如 AWS CloudFront、Cloudflare、Azure Static Web Apps 等
    CDN，或者任何你想要的平台。


    CORS（跨域资源共享的缩写）是所有现代浏览器都支持的一种 API，它允许你的 JavaScript 代码调用自身域名之外的 API。传统上，浏览器将 HTTP
    调用限制在你当前所在的域名，如果你尝试调用不同的域名（即跨域请求），就会收到错误。因此，按照前面的例子，如果浏览器显示的是 [`www.myapp.com`](http://www.myapp.com)，而你尝试使用
    JavaScript 调用 `api.myapp.com`，就会收到错误消息。


    当 JavaScript 向不同的域名发起请求时，它首先会向该服务器发送一个 `OPTIONS` 请求。（`OPTIONS` 是另一种 HTTP 动词，类似于
    `GET`、`POST`、`PUT` 等）。如果该 `OPTIONS` 请求响应了正确的 CORS 头，浏览器将继续执行你发起的实际请求。如果没有，你将收到一条错误消息。


    你需要设置你的 Ktor API 来处理这些 CORS 请求。你可以手动拦截 `OPTIONS` 请求并响应正确的头信息。但更简单的方法是安装为你处理此事的
    CORS 插件。


    第一步是将该插件作为依赖项添加到你的 *build.gradle.kts* 文件中：


    ```

    implementation("io.ktor:ktor-server-cors-jvm:2.1.2")

    ```


    要使 CORS 生效，你需要更改一些设置。在 `setUpKtorCookieSecurity` 中，将会话 cookie 的 `SameSite` 属性从
    `"lax"` 更改为 `"none"`。现在你将在不同的源之间运行你的 Web 应用，因此为了让浏览器正确传输你的会话 cookie，你需要禁用 `SameSite`。


    接下来，你需要设置 CORS 插件本身。将其添加到你的 `createKtorApplication` 中，与你的 `StatusPages` 插件放在一起。清单
    10-5 展示了如何正确设置它。


    ```

    install(CORS) {

    allowMethod(HttpMethod.Put)

    allowMethod(HttpMethod.Delete)

    allowHost("localhost:4207")

    allowHost("www.myapp.com", schemes = listOf("https"))

    allowCredentials = true

    }

    清单 10-5

    向你的 Ktor 应用添加 CORS 设置

    ```


    HTTP 方法 `GET` 和 `POST` 默认是启用的。我实际使用的大多数 Web 应用至少也会用到 `PUT` 和 `DELETE`，因此你也应该允许这些方法。你还需要启用特定的主机名。CORS
    支持通配符源，但当你需要包含凭据（即 cookie）时则不支持。最后，你需要通过将 `allowCredentials` 设置为 `true` 来启用凭据。


    你还需要一种在本地托管 Web 应用 HTML 的方法。这就是为什么你要将 `localhost:4207` 添加到允许的源列表中，这意味着你可以在开发环境中使用
    `singlePageApplication` 插件，并将其配置为仅在本地环境加载，而不在生产环境加载。或者，你可以使用类似 create-react-app
    的工具，或者自己设置 Webpack，来托管一个 index.xhtml 文件并构建你的 JavaScript。如果你使用像 Webpack 这样的外部服务器，请更新端口号以指向你的
    Webpack 服务器的端口。（构建 SPA 的复杂细节超出了本章的范围，因此我特意跳过了许多关于如何设置它的细节。）


    ### 用户身份验证


    完成上述设置后，你可以使用 JavaScript 发起登录请求，即使你的 JavaScript 运行在与 API 不同的源上，它也能正常工作。


    你可以使用第 9 章中现有的 `POST /login` 处理程序从你的单页应用登录。该 Web 处理程序期望接收由普通 HTML `<form>` 提交的表单编码数据。但你也可以从
    JavaScript 生成相同类型的请求。清单 10-6 展示了一个如何执行此操作的示例。


    ```

    fetch("/login", {

    credentials: "include",

    method: "POST",

    headers: {

    "Content-Type": "application/x-www-form-urlencoded"

    },

    body: new URLSearchParams({

    username: ...,

    password: ...

    })

    })

    清单 10-6

    从不同源使用 JavaScript 调用你的 API

    ```


    重要的是要记住，在调用 fetch 时设置 `credentials: "include"`。如果不这样做，它就不会在请求中接收和发送任何 cookie。


    由于 cookie 是仅限 HTTP 的，因此无法从 JavaScript 访问它。这意味着，如果你因某种原因成为脚本注入攻击的受害者，攻击者也无法提取会话密钥，这在安全性上是一个巨大的优势。


    如果你正在构建一个没有任何 HTML 的纯 API，你也可以更改 `POST /login` 以接收和解析 JSON，而不是像 HTML `<form>`
    标签中那样的数据。如果这样做，你还应该更改你的 API，使其在成功登录时返回 200 OK 而不是重定向。


    ## 原生应用


    非 Web 原生应用，例如移动应用和原生桌面应用，也可以调用你的 API。此类别还包括基于 Web 的封装器，即原生应用封装了 Web 技术，例如 Electron。即使这些应用使用
    Web 技术，它们也不必受制于浏览器的安全沙箱，并且可以像普通的原生应用一样执行网络调用。


    ### 使用 Cookie 进行身份验证


    与基于 Web 的 SPA 相比，在原生应用中唯一需要考虑的是身份验证。对于非浏览器应用，设置 API 以对用户进行身份验证主要有两种方法。第一种是使用 cookie
    进行身份验证，就像你为基于 HTML 的 Web 应用或本章前面介绍的 SPA 所做的那样。


    大多数原生应用可用的 HTTP 客户端会自动处理 cookie，或者可以设置为处理 cookie。这意味着 HTTP 客户端的行为将类似于浏览器，存储使用
    `Set-Cookie` 头设置的任何 cookie，并在你发起的请求中将它们发送回服务器。这是一种简单方便的方法，可以为基于 Web 的应用和原生应用提供相同的
    API 设置。


    确保不要为 SPA 启用 CORS 或使用身份验证令牌。对于原生应用，暴露身份验证令牌无关紧要。但对于 Web 应用，跨域攻击是一种常见的攻击向量，因此将身份验证凭据隐藏在
    JavaScript 运行时无法访问的 cookie 后面非常重要。

