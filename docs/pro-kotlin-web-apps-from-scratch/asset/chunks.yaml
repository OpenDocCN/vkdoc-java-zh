    图 12-5


    编辑 AWS Lambda 函数的运行时设置


    在弹出的对话框中，你需要更改 AWS Lambda 将要调用的类名。它当前设置为 `example.Hello`，这不是你的 Web 应用中存在的类。你需要将其更改为实际处理程序类的名称
