  trans: '

    ### 基本结构


    我通常遵循的结构是，`Main.kt` 负责所有引导工作、加载配置文件以及启动服务器，就像本书中一样。它还将所有 Web 处理程序的路由声明放在一个文件中，但不包含这些路由的*实现*。因此，它通常看起来像这样：


    ```

    fun main() {

    val config = createConfig(...)

    val dataSource = createAndMigrateDataSource(config)

    val stuff = createStuff(config)

    embeddedServer(Netty, port = config.httpPort) {

    createKtorApplication()

    }

    }

    fun Application.createKtorApplication(

    dataSource: DataSource

    ) {

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/bars", webResponseDb(dataSource, ::handleGetBars))

    get("/bars/{id}", webResponseDb(dataSource) { dbSess ->

    handleGetBar(dbSess, call.parameters["id"])

    })

    post("/bars", webResponseTx(dataSource) { txSess ->

    handleCreateBar(

    txSess,

    Gson().fromJson(call.receiveText(), Map::class.java)

    )

    })

    // ...

    }

    }

    ```


    各个处理函数对 Ktor 一无所知，它们只处理普通数据的组合，例如来自 JSON 解析的 `Map` 和来自 Ktor 的、与 ID 路径参数对应的 `String`。


    将所有路由放在一个文件中可以使代码更易于阅读。调试 Web 应用程序的过程通常是，你看到一个发往某个 URL 的请求，而你需要做的第一件事就是弄清楚，当给定
    URL 被调用时，Web 应用程序中运行的是哪段代码。


    出于这个原因，无论我使用的是 Ktor 还是其他完全不同的路由库（或编程语言），我都倾向于避免使用我所谓的“路径前缀包装器”。例如，Ktor 允许你像这样用路径前缀包装路由：


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    route("/api") {

    get("/version", webResponse(::handleGetApiVersion))

    post("/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    }

    ```


    如果你的路由集合很小，这种方法没问题。但随着你的 Web 应用程序的增长，能够在项目中搜索 `"/api/order"` 并立即找到与该路径对应的代码，可以节省时间。因此，我更喜欢使用声明所有
    Web 处理程序完整路径的样板代码：


    ```

    routing {

    get("/foo", webResponse(::handleGetFoo))

    get("/api/version", webResponse(::handleGetApiVersion))

    post("/api/order", webResponseTx(dataSource) { txSess ->

    handleCreateOrder(txSess, call.receiveText())

    })

    }

    ```


    在这里，你的 Web 应用程序支持的所有路径都存在于代码库中，这使得你的代码更加明确和可读，代价是需要手动重复嵌套的路径段。


    ### 解耦的 Web 处理程序


    我在关于部署到无服务器环境的章节中讨论这个问题的原因是，将你的处理程序分离为普通函数，正是使你能够在无服务器环境中轻松运行 Web 处理程序的关键。


    当你以函数式风格编写 Web 处理程序时，即作为接收输入作为参数并返回 `WebResponse` 的普通 Kotlin 函数，你就拥有了在任何环境中运行业务逻辑的灵活性，而不仅仅是
    Ktor。


    在前面的示例中，函数 `handleCreateOrder` 和 `handleGetFoo` 都是对数据进行操作、返回数据且对 Ktor 一无所知的普通
    Kotlin 函数。


    唯一知道 Ktor 的地方是你的 `Main.kt` 文件和你的路由。这很合理，因为你无论如何都会在该文件中大量使用 Ktor。`Main.kt` 充当了你选择的路由库和你的业务逻辑之间的映射层，而业务逻辑对其运行的环境一无所知。


    ## 在 AWS Lambda 上运行 Web 处理程序


    要在无服务器环境中运行你的 Web 处理程序，你将使用 AWS Lambda。这里的大多数步骤在逻辑上与其他云提供商（如 Google Cloud Platform
    和 Azure）相同。主要区别仅在于系统各个组件的连接方式和命名。所以，不要将此视为对 AWS Lambda 优于其他云提供商的认可；这主要只是基于我最熟悉的云提供商而做出的随机选择。


    ### 创建 AWS Lambda Web 处理程序


    目前，你从 Ktor 路由定义中调用你的 Web 处理程序。为了在 AWS Lambda 上运行它们，你需要将你的 Web 处理程序包装在 AWS Lambda
    知道如何执行的东西中。


    在本章中，你唯一要做的事情就是在 AWS Lambda 上调用你的 Web 处理程序。通常，你会使用 AWS API Gateway 进行路由和身份验证，并设置单独的
    API Gateway 路由来调用运行实际处理程序代码的正确 Lambda 函数。不过，设置这些内容超出了本书的范围。


    第一步是将所需的依赖项添加到 *build.gradle.kts* 中：


    ```

    implementation("com.amazonaws:aws-lambda-java-core:1.2.1")

    ```


    这个库包含了编写 AWS Lambda 可以调用的 Kotlin 代码所需的包装代码。AWS Lambda 和 Java 平台的本质是，你像为传统的基于服务器的环境打包一样，将代码打包成
    JAR 文件。然后，你的 JAR 文件包含代表各个 Lambda 处理程序的特殊类。这些类继承自 `com.amazonaws.services.lambda.runtime.RequestHandler`，这赋予了它们
    AWS Lambda 知道如何调用和处理返回值的签名。


    为了将你现有的代码与 AWS Lambda 环境分离，你将创建一个新文件 *MainServerless.kt*。在这个文件中，你将包含所有 AWS Lambda
    处理程序，以及在 AWS Lambda 环境中引导代码运行所需的代码。清单 12-1 展示了如何做到这一点。


    ```

    import com.amazonaws.services.lambda.runtime.Context

    import com.amazonaws.services.lambda.runtime.RequestHandler

    class GetTestHelloWorld :

    RequestHandler

    {

    override fun handleRequest(

    input: Any?,

    context: Context

    ): String {

    return Gson().toJson(mapOf(

    "statusCode" to 200,

    "headers" to mapOf("contentType" to "text/plain"),

    "body" to "Hello, World!"

    ))

    }

    }

    清单 12-1

    使用基本的 AWS Lambda 处理程序设置 MainServerless.kt

    ```


    你的 AWS Lambda 处理程序类实现了 `RequestHandler` 接口，并返回一个包含 JSON 内容的 `String`。AWS Lambda
    本身不对其输出进行任何验证。你在 `GetTestHelloWorld` 中使用的 JSON 格式是 AWS API Gateway 在调用 Lambda
    处理 Web 请求时所期望的格式。因此，如果你设置了 API Gateway 来调用你的 Lambda，但忘记包含 `"statusCode"` 或返回非
    JSON 输出，API Gateway 会报错。但是，稍后当你手动调用 Lambda 处理程序进行测试时，对 Lambda 处理程序的输出格式没有要求。

    '
- fmt: '### Deploying to AWS Lambda


    To run your `GetTestHelloWorld` handler function on AWS Lambda, you need to package
    it and upload it to your AWS environment.


    The packaging itself is identical to the setup from Chapter [11](#531928_1_En_11_Chapter.xhtml),
    when you deployed your web app to a traditional server-based environment. So the
    first step is to run the `shadowJar` Gradle task to build a self-contained fat
    jar of your code.


    Next, you’ll need to upload the JAR file to AWS Lambda. For this step, I’ll assume
    that you already have an AWS account set up, as this book is primarily about the
    concept of making your code work in a serverless environment and not about AWS
    specifically.


    In the AWS console at [*https://console.aws.amazon.com*](https://console.aws.amazon.com),
    log in, and open to the Lambda console, as seen in Figure [12-1](#531928_1_En_12_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig1_HTML.png)


    A screenshot of a browser window displays the AWS Lambda console. On the functions
    page, Function name, description, package type, runtime, and last modified. A
    create function option is highlighted.


    **Figure 12-1** The AWS Lambda console


    Click the big orange button labeled “Create function.” That takes you to the page
    seen in Figure [12-2](#531928_1_En_12_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig2_HTML.png)


    A screenshot of a browser window displays the AWS Lambda console. The function
    name is mentioned as `kotlinbooktestfunction`, Runtime is mentioned as Java 11,
    `x86_64` option is selected under Architecture.


    **Figure 12-2** Creating a new function in the AWS Lambda console


    Leave the option “Author from scratch” selected, name your function `kotlinbookTestFunction`,
    choose “Java 11 (Corretto)” as the runtime, and click the “Create function” button
    at the bottom of the screen.


    When AWS has finished creating your function, you need to upload your code. You’ll
    upload the entire fat jar that you assembled with the `shadowJar` Gradle task
    earlier. Click the white button labeled “Upload from,” and click the option labeled
    “.zip or .jar file,” as seen in Figure [12-3](#531928_1_En_12_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig3_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. The code
    option is selected. A drop-down menu for upload from have the option .zip or .jar
    file and amazon S3 location. The text reads the code editor does not support the
    Java 11 runtime.


    **Figure 12-3** Uploading your code to your new AWS Lambda function


    In the popup that appears, click the white button labeled “Upload,” choose your
    fat jar file in the file finder window that appears, and click the orange button
    labeled “Save”, as seen in Figure [12-4](#531928_1_En_12_Chapter.xhtml#Fig4).


    Note that the location of the fat jar file that you should upload to AWS Lambda
    is in the folder `build/libs/kotlinbook-1.0-SNAPSHOT-all.jar` alongside your source
    code and Gradle configuration in your web app project.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig4_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. A dialog
    box titled upload a .zip or .jar file. The text reads when you upload a new .zip
    file package, it overwrites the existing code. The save option is highlighted.


    **Figure 12-4** Choosing a file and performing the upload in AWS Lambda


    When your browser has finished uploading that file to AWS Lambda, you’re returned
    to the same screen as you saw in Figure [12-3](#531928_1_En_12_Chapter.xhtml#Fig3).
    Remain on that screen and scroll down a bit. You’ll see a section named “Runtime
    settings.” Click the white “Edit” button, as seen in Figure [12-5](#531928_1_En_12_Chapter.xhtml#Fig5).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig5_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. The subheadings
    on the page are Code properties, runtime settings, and Layers.


    **Figure 12-5** Editing the runtime settings of your AWS Lambda function


    In the popup that appears, you need to change the name of the class that AWS Lambda
    will invoke. It’s currently set to `example.Hello`, which is not a class that
    exists in your web app. You need to change it to the name of your actual handler
    class, `kotlinbook.GetTestHelloWorld`, as seen in Figure [12-6](#531928_1_En_12_Chapter.xhtml#Fig6).
    The function name `handleRequest` should stay the same, as that’s what you’ve
    named that function in the code that you just uploaded. Click the big orange button
    labeled “Save” to continue.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig6_HTML.png)


    A screenshot of a browser window displays edit runtime settings. Under Runtime
    settings, Runtime, Handler, and architecture options are observed. The save option
    is highlighted.


    **Figure 12-6** Pointing AWS Lambda to the correct handler class in your code


    You’re not ready to invoke your function, to see if everything works correctly!
    Scroll up to the tabs, where “Code” is the tab that’s currently activated, and
    choose the “Test” tab. On that page, click the big orange button labeled “Test.”
    In the following, you can change the parameters passed to your lambda as well.
    But your test handler does not do anything with the input AWS Lambda passes to
    it, so you don’t have to change anything there. Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7)
    shows what this looks like.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig7_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. The test
    option is selected. Text reads Execution result, succeeded. Test option is highlighted.
    The text reads To invoke your function without saving an event, configure the
    JSON event, then choose test. The option Create new event is selected.


    **Figure 12-7** You’ve successfully tested your function!


    If you click “Details” in the green box in Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7),
    you’ll see more information about the execution of your AWS Lambda handler, as
    seen in Figure [12-8](#531928_1_En_12_Chapter.xhtml#Fig8).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig8_HTML.png)


    A screenshot of a browser window displays `kotlinbooktestfunction` page. Text
    reads Execution result, succeeded. The summary is listed below.


    **Figure 12-8** Detailed info about the execution of your AWS Lambda handler


    There’s the output from your code! As previously mentioned, AWS Lambda itself
    does not interpret the output in any way; it just forwards it to the caller, which
    in this case was the AWS Lambda testing console. It’s up to the caller to interpret
    it, and if you set up API Gateway to call your lambdas, it will use this JSON
    output to determine how to respond to incoming HTTP requests.'
  raw: '### Deploying to AWS Lambda


    To run your `GetTestHelloWorld` handler function on AWS Lambda, you need to package
    it and upload it to your AWS environment.


    The packaging itself is identical to the setup from Chapter [11](#531928_1_En_11_Chapter.xhtml),
    when you deployed your web app to a traditional server-based environment. So the
    first step is to run the `shadowJar` Gradle task to build a self-contained fat
    jar of your code.


    Next, you’ll need to upload the JAR file to AWS Lambda. For this step, I’ll assume
    that you already have an AWS account set up, as this book is primarily about the
    concept of making your code work in a serverless environment and not about AWS
    specifically.


    In the AWS console at [*https://console.aws.amazon.com*](https://console.aws.amazon.com),
    log in, and open to the Lambda console, as seen in Figure [12-1](#531928_1_En_12_Chapter.xhtml#Fig1).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig1_HTML.png)


    A screenshot of a browser window displays the AWS Lambda console. On the functions
    page, Function name, description, package type, runtime, and last modified. A
    create function option is highlighted.


    Figure 12-1


    The AWS Lambda console


    Click the big orange button labeled “Create function.” That takes you to the page
    seen in Figure [12-2](#531928_1_En_12_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig2_HTML.png)


    A screenshot of a browser window displays the AWS Lambda console. The function
    name is mentioned as kotlinbooktestfunction, Runtime is mentioned as Java 11,
    x86_64 option is selected under Architecture.


    Figure 12-2


    Creating a new function in the AWS Lambda console


    Leave the option “Author from scratch” selected, name your function `kotlinbookTestFunction`,
    choose “Java 11 (Corretto)” as the runtime, and click the “Create function” button
    at the bottom of the screen.


    When AWS has finished creating your function, you need to upload your code. You’ll
    upload the entire fat jar that you assembled with the `shadowJar` Gradle task
    earlier. Click the white button labeled “Upload from,” and click the option labeled
    “.zip or .jar file,” as seen in Figure [12-3](#531928_1_En_12_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig3_HTML.png)


    A screenshot of a browser window displays kotlinbooktestfunction page. The code
    option is selected. A drop-down menu for upload from have the option .zip or .jar
    file and amazon S3 location. The text reads the code editor does not support the
    Java 11 runtime.


    Figure 12-3


    Uploading your code to your new AWS Lambda function


    In the popup that appears, click the white button labeled “Upload,” choose your
    fat jar file in the file finder window that appears, and click the orange button
    labeled “Save”, as seen in Figure [12-4](#531928_1_En_12_Chapter.xhtml#Fig4).


    Note that the location of the fat jar file that you should upload to AWS Lambda
    is in the folder *build/libs/kotlinbook-1.0-SNAPSHOT-all.jar* alongside your source
    code and Gradle configuration in your web app project.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig4_HTML.png)


    A screenshot of a browser window displays kotlinbooktestfunction page. A dialog
    box titled upload a .zip or .jar file. The text reads when you upload a new .zip
    file package, it overwrites the existing code. The save option is highlighted.


    Figure 12-4


    Choosing a file and performing the upload in AWS Lambda


    When your browser has finished uploading that file to AWS Lambda, you’re returned
    to the same screen as you saw in Figure [12-3](#531928_1_En_12_Chapter.xhtml#Fig3).
    Remain on that screen and scroll down a bit. You’ll see a section named “Runtime
    settings.” Click the white “Edit” button, as seen in Figure [12-5](#531928_1_En_12_Chapter.xhtml#Fig5).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig5_HTML.png)


    A screenshot of a browser window displays kotlinbooktestfunction page. The subheadings
    on the page are Code properties, runtime settings, and Layers.


    Figure 12-5


    Editing the runtime settings of your AWS Lambda function


    In the popup that appears, you need to change the name of the class that AWS Lambda
    will invoke. It’s currently set to `example.Hello`, which is not a class that
    exists in your web app. You need to change it to the name of your actual handler
    class, `kotlinbook.GetTestHelloWorld`, as seen in Figure [12-6](#531928_1_En_12_Chapter.xhtml#Fig6).
    The function name `handleRequest` should stay the same, as that’s what you’ve
    named that function in the code that you just uploaded. Click the big orange button
    labeled “Save” to continue.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig6_HTML.png)


    A screenshot of a browser window displays edit runtime settings. Under Runtime
    settings, Runtime, Handler, and architecture options are observed. The save option
    is highlighted.


    Figure 12-6


    Pointing AWS Lambda to the correct handler class in your code


    You’re not ready to invoke your function, to see if everything works correctly!
    Scroll up to the tabs, where “Code” is the tab that’s currently activated, and
    choose the “Test” tab. On that page, click the big orange button labeled “Test.”
    In the following, you can change the parameters passed to your lambda as well.
    But your test handler does not do anything with the input AWS Lambda passes to
    it, so you don’t have to change anything there. Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7)
    shows what this looks like.


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig7_HTML.png)


    A screenshot of a browser window displays kotlinbooktestfunction page. The test
    option is selected. Text reads Execution result, succeeded. Test option is highlighted.
    The text reads To invoke your function without saving an event, configure the
    JSON event, then choose test. The option Create new event is selected.


    Figure 12-7


    You’ve successfully tested your function!


    If you click “Details” in the green box in Figure [12-7](#531928_1_En_12_Chapter.xhtml#Fig7),
    you’ll see more information about the execution of your AWS Lambda handler, as
    seen in Figure [12-8](#531928_1_En_12_Chapter.xhtml#Fig8).


    ![](images/531928_1_En_12_Chapter/531928_1_En_12_Fig8_HTML.png)


    A screenshot of a browser window displays kotlinbooktestfunction page. Text reads
    Execution result, succeeded. The summary is listed below.


    Figure 12-8


    Detailed info about the execution of your AWS Lambda handler


    There’s the output from your code! As previously mentioned, AWS Lambda itself
    does not interpret the output in any way; it just forwards it to the caller, which
    in this case was the AWS Lambda testing console. It’s up to the caller to interpret
    it, and if you set up API Gateway to call your lambdas, it will use this JSON
    output to determine how to respond to incoming HTTP requests.'
