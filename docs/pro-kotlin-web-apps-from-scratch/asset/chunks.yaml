    ### 不区分大小写的标头


    为了让标头更易于使用，你可以更新 `WebResponse`，使其以不区分大小写的方式处理标头。具体来说，这允许你添加 `"``set-cookie``"`
    和 `"``Set-Cookie``"`，并将它们合并到同一个标头值中，即使一个是全小写，另一个是驼峰式大小写。


    你可以通过保持现有代码不变，并在 `headers` 映射中以多种大小写形式存储标头来实现这一点。然后，你可以添加一个新函数，创建一个所有标头都转换为小写版本的标头。


    `headers` 映射只是数据，而 Kotlin 拥有大量用于转换数据的工具（通常称为函数式编程或面向数据编程），因此你将使用这些工具来实现这个新函数。


    第一步是将标头映射转换为键值对列表，并将键转换为小写：


    ```

    headers

    .map { it.key.lowercase() to it.value }

    ```


    对 `map` 的调用将类型为 `Map<String, List<String>>` 的映射


    ```

    mapOf(

    "foo" to listOf("bar"),

    "Foo" to listOf("baz")

    )

    ```


    转换为类型为 `List<Pair<String, List<String>>>` 的列表：


    ```

    listOf(

    "foo" to listOf("bar"),

    "foo" to listOf("baz")

    )

    ```


    请注意这里大小写的细微差别。原始映射包含键 `"foo"`（小写）和 `"Foo"`（大写），Kotlin 认为它们是两个不同的键。但你会将键转换为小写，使它们都变成
    `"foo"`（小写），而 Kotlin 映射不能为同一个键包含两个不同的值。但是，在映射数据结构上调用 `map` 函数会将其转换为 `Pair` 列表。而列表可以包含重复项。因此，最终的列表将包含多个具有相同小写键
    `"foo"` 的键值对。


    ```

    sealed class WebResponse {

    fun headers(): Map<String, List<String>> =

    headers

    .map { it.key.lowercase() to it.value }

    .fold(mapOf()) { res, (k, v) ->

    res.plus(Pair(

    k,

    res.getOrDefault(k, listOf()).plus(v)

    ))

    }

    }

    代码清单 4-5

    WebResponse 上的 headers() 函数，所有标头名称均为小写

    ```


    代码清单 4-5 中的 `headers()` 函数返回一个新的映射，其中所有标头名称均为小写。与代码清单 4-4 中用于添加新标头值的函数 `header(String,
    List<String>)` 一样，代码清单 4-5 中的 `headers()` 函数使用 `getOrDefault` 来合并那些名称在转换为小写后相同的标头的值，这样你就不会最终用
    `"Foo"`（大写）的值替换 `"foo"`（小写）的值。


    ### fold 函数


    请坐好，深呼吸，清空你的思绪，因为我将尝试完成一件不可能的事：解释函数式编程的工作原理。


    `fold` 是函数式编程中所有列表转换的核心。你可以使用 `fold` 来实现其他函数式转换，例如 `map`、`filter`、`forEach`、`max`、`take`
    等。这使得 `fold` 在列表转换需要一些额外规则，而不仅仅是简单的 `map` 或 `filter` 时非常有用。


    在代码清单 4-5 的 `WebResponse` 中 `headers()` 的实现里，`fold` 作用于一个列表，并传入一个初始值 `mapOf()`（一个空映射）和一个
    lambda。然后，`fold` 调用该 lambda，并传入你提供的初始值 `res` 和列表中的第一个值 `(k, v)`。接着，`fold` 会再次调用该
    lambda，传入 lambda 第一次被 `fold` 调用时返回的值以及列表中的第二个值。然后，这个过程会针对列表中的每个项目重复进行，对于列表中的每个后续项目，都会调用该
    lambda，并传入 lambda 上一次被 `fold` 调用时返回的值以及列表项目本身。


    初始的空映射是一个*累加器*。你从初始值开始，每次 `fold` 调用 lambda 时，都会将新值累加到其中。`fold` 不关心累加器的值类型。它可以是列表、映射、数字，或者任何你可能想要累加的东西。


    ### 解构声明


    `(k, v)` 是一个*解构声明*。Kotlin 中的许多实体，例如数据类和 `Pair`，都实现了 `componentN()` 函数。你可以通过 `it.key`
    访问 `Pair` 的键，也可以通过 `it.component1()` 访问。类似地，你可以通过 `it.value` 访问 `Pair` 的值，也可以通过
    `it.component2()` 访问。对于所有实现了 `componentN()` 函数的实体，你都可以对它们进行*解构*。这是一种直接引用实体组件的便捷方式，无需为它们创建显式的命名变量。代码清单
    4-6 展示了解构和显式变量在功能上是相同的。


    ```

    val it = Pair("foo" to "bar")

    // 使用解构

    val (k, v) = it

    // 使用普通函数

    val k = it.key

    val v = it.value

    // 使用手动变量声明

    val k = it.component1()

    val v = it.component2()

    代码清单 4-6

    比较解构语法与手动变量赋值

    ```


    解构声明可以节省一些手动输入，并且在解构传递给函数或 lambda 的参数时特别有用，如代码清单 4-5 所示。


    ## 连接到 Ktor


    你现在拥有了一个完整的、独立的 HTTP 响应表示，它不依赖于 Ktor 或任何其他库。但是，你的 Web 应用确实使用了 Ktor。因此，你需要将两者结合起来，让
    Ktor 处理你的 `WebResponse` 类。


    ### Ktor 路由映射


    第一步是让 Ktor 路由（例如 `get("/")` 和 `post("/products")`）能够与你自己的代码返回的 `WebResponse` 实例进行交互。


    为了查看结果应该是什么样子，代码清单 4-7 比较了你当前处理路由的方式与完成 Ktor 到 `WebResponse` 的接线后的样子。


    ```

    // 直接调用 Ktor API

    get("/") {

    call.respondText("Hello, World!")

    }

    // 连接 Ktor 和 WebResponse 的最终结果

    get("/", webResponse { req ->

    TextWebResponse("Hello, World!")

    })

    代码清单 4-7

    当前 Ktor API 与期望结果的比较

    ```


    代码清单 4-7 中的两个示例有两个主要区别。首先，在处理程序中不再直接与 Ktor 的 `call` API 交互。其次，Ktor 的 `call` API
    是命令式的，你需要按顺序命令式地调用其方法。而 `WebResponse` API 本质上是函数式的，这意味着唯一的交互点是从你自己的处理程序返回的不可变值
    `WebResponse`，没有命令式的方法调用。


    第一步是创建一个函数，该函数创建并返回一个新的 lambda。Ktor 中的函数 `get` 具有（简化后的）签名 `get(path: String, body:
    ApplicationCall.() -> Unit)`。换句话说，第二个参数是 `ApplicationCall` 上的一个*扩展函数*，没有返回值。

    '
- fmt: '### Extension Functions


    The first step is to create the function `webResponse` as seen in Listing [4-7](#531928_1_En_4_Chapter.xhtml#PC16).
    The return value of `webResponse` is passed as the second argument to `get` and
    needs to match that type signature. The type signature of `get` is `get(path:
    String, body: ApplicationCall.() -> Unit)`. So `webResponse` needs to return something
    that matches the type `ApplicationCall.() -> Unit`.


    This is a *function type* with a *receiver type*. In the original call to `get`
    in Listing [4-7](#531928_1_En_4_Chapter.xhtml#PC16), you pass a lambda as the
    second argument. Function types are, among other things, how you set up a Kotlin
    function to receive lambdas. In other words, lambdas are valid function types.


    The *receiver type* is `ApplicationCall`. Lambdas with receiver types are lambdas
    where you customize what `this` refers to inside the lambda.


    *Extension functions* are just like lambdas with receiver types, where you can
    customize what `this` refers to inside the function body, but are full-fledged
    named functions instead of anonymous lambdas.


    In object-oriented programming, there’s always an implicit `this` that refers
    to the instance you called the method on. Extension functions are a hybrid between
    instance methods and plain stand-alone functions. You don’t define extension functions
    inside classes or interfaces. Instead, you define them anywhere you want in your
    code, for any type that you want.


    In Listing [4-8](#531928_1_En_4_Chapter.xhtml#PC17), an example demonstrates an
    extension function on `String`. The function uses `this` to refer to the string
    that you called the function on. You invoke the function as if it were a method
    defined on the `String` class itself.


    ```

    fun String.getRandomLetter() =

    this[Random.nextInt(this.length)]

    "FooBarBaz".getRandomLetter() // "z"

    "FooBarBaz".getRandomLetter() // "B"

    Listing 4-8

    A demonstration of an extension function on String

    ```


    Lambdas with receiver types are like extension functions, except they are just
    lambdas and not named functions defined on a type. You can only call a lambda
    with a receiver type as if it were a method defined on an instance of that receiver
    type. Listing [4-9](#531928_1_En_4_Chapter.xhtml#PC18) shows an example of implementing
    and calling a lambda with a receiver type.


    ```

    fun String.transformRandomLetter(

    body: String.() -> String

    ): String {

    val range = Random.nextInt(this.length).let {

    it.rangeTo(it)

    }

    return this.replaceRange(

    range,

    this.substring(range).body()

    )

    }

    "FooBarBaz".transformRandomLetter {

    "***${this.uppercase()}***"

    }

    // "FooB***A***rBaz

    Listing 4-9

    A demonstration of a lambda with a receiver type

    ```


    The argument `body` represents the lambda. Like extension functions, you call
    `body` directly on an instance of `String`, as if it’s a method implemented on
    `String` itself.


    To read more about extension functions, you can read more about them in the official
    Kotlin documentation: [`https://kotlinlang.org/docs/extensions.xhtml`](https://kotlinlang.org/docs/extensions.xhtml).


    ### Functions Returning Functions


    As a quick reminder, `webResponse` needs to return something that matches the
    type `ApplicationCall.() -> Unit`. In other words, `webResponse` needs to return
    a function or a lambda, so that the types are matching.


    You can see a first empty skeleton version of the `webResponse` implementation
    in Listing [4-10](#531928_1_En_4_Chapter.xhtml#PC19). For now, it doesn’t do anything,
    and it’s just a starting point.


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    }

    }

    Listing 4-10

    The initial empty skeleton for webResponse

    ```


    As previously mentioned, the type `ApplicationCall(). -> Unit` is a simplification.
    The actual type you need to return from `webResponse` is `PipelineInterceptor<Unit,
    ApplicationCall>`, which is an alias for the type `suspend PipelineContext< Unit,
    ApplicationCall >.( Unit) -> Unit`. The type of your `handler` lambda is almost
    identical, except it returns a `WebResponse` instance instead of nothing (`Unit`).
    The goal of `webResponse` is to call `handler` and use the `WebResponse` instance
    that `handler` returns and finally map it to Ktor.


    **Tip**


    The keyword `suspend` will be explained in detail in Chapter [8](#531928_1_En_8_Chapter.xhtml).
    For now, all you need to know is that it is a part of the type for Kotlin handlers
    and that it’s related to coroutines. Some of the APIs on the `ApplicationCall`
    from Ktor require a `suspend` keyword to work properly.


    `webResponse` returns a lambda. You don’t need to annotate the lambda itself with
    types, as Kotlin has everything it needs to infer the type from the fact you return
    the lambda and that you’ve defined a return type for `webResponse`. Kotlin automatically
    turns it into a lambda that matches `PipelineInterceptor<Unit, ApplicationCall>`.


    ### Map Headers


    The lambda that’s returned by `webResponse` should contain all the mapping code
    between Ktor and the `WebResponse` class. All instances of `WebResponse` have
    a map of headers, so that’s a good place to start.


    You can find an updated version of `webResponse` in Listing [4-11](#531928_1_En_4_Chapter.xhtml#PC20)
    that reads the headers from the `WebResponse` instance and maps them to Ktor.


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    val resp = this.handler()

    for ((name, values) in resp.headers())

    for (value in values)

    call.response.header(name, value)

    }

    }

    Listing 4-11

    Mapping the WebResponse headers to Ktor

    ```


    You obtain the instance of `WebResponse` by invoking the `handler()` lambda. The
    mapping code does not care about the contents and details of how you created that
    `WebResponse`. All it cares about is mapping arbitrary `WebResponse` instances
    to Ktor.


    You call `handler` as an extension function. The type of `this` matches the receiver
    type of `handler`, which is why you can call `this.handler()` as if `handler`
    was a method on the object `this` represents.


    The `headers()` function returns a map where the key is the header name and the
    value is a list of header values for that header name. So all you need to do is
    to iterate through them and invoke `call.response.header` for each header value.


    Remember: The lambda you return from `webResponse` has the (simplified) signature
    of `ApplicationCall.() -> Unit`. This is what makes `call` available to it.


    ### Map TextWebResponse and Status Code


    The next step is to map the individual response types so that you do something
    more useful than just setting headers and use all the data in your `WebResponse`
    instances and pass them on to Ktor.


    Listing [4-12](#531928_1_En_4_Chapter.xhtml#PC21) shows an updated version of
    `webResponse` that checks the type of the `WebResponse` instance and handles `TextWebResponse`.


    ```

    fun webResponse(

    handler: suspend PipelineContext.(

    ) -> WebResponse

    ): PipelineInterceptor {

    return {

    val resp = this.handler()

    for ((name, values) in resp.headers())

    for (value in values)

    call.response.header(name, value)

    val statusCode = HttpStatusCode.fromValue(

    resp.statusCode

    )

    when (resp) {

    is TextWebResponse -> {

    call.respondText(

    text = resp.body,

    status = statusCode

    )

    }

    }

    }

    }

    Listing 4-12

    Mapping TextWebResponse and JsonWebResponse to Ktor

    ```


    `WebResponse` has a `statusCode` field that’s defined as an `Int`. Ktor needs
    an instance of `HttpStatusCode`. Thankfully, Ktor has the function `HttpStatusCode.fromValue`
    to convert a valid `Int` to a `HttpStatusCode`.


    You can use a `when` statement to map the individual types of `WebResponse` to
    Ktor. `when` is like `switch` in other languages, where each statement defines
    how you want to handle various cases. For now, all you have is `TextWebResponse`,
    but you’ll add more types later, so you can use a `when` statement right away.'
