- fmt: "### Case-Insensitive Headers\n\nTo make headers even easier to work with,\
    \ you can update `WebResponse` to handle headers in a case-insensitive way. Specifically,\
    \ this lets you add `\"set-cookie\"` and `\"Set-Cookie\"` and combine them into\
    \ the same header value, even though one is all lowercase and the other is Camel-Case.\n\
    \nYou can achieve this by leaving the existing code as is and storing the headers\
    \ in multiple casings in the `headers` map. Then you can add a new function that\
    \ creates a version of the headers where they’re all lowercased.\n\nThe `headers`\
    \ map is just data, and Kotlin has plenty of facilities for transforming data\
    \ (commonly called functional programming or data-oriented programming), so that’s\
    \ how you’ll implement this new function.\n\nThe first step is to convert the\
    \ headers map to a list of pairs and lowercase the keys:\n\n```\nheaders\n.map\
    \ { it.key.lowercase() to it.value }\n```\n\nThe call to `map` turns this map\
    \ of type `Map<String, List<String>>`:\n\n```\nmapOf(\n\"foo\" to listOf(\"bar\"\
    ),\n\"Foo\" to listOf(\"baz\")\n)\n```\n\nto this list of type `List<Pair<String,\
    \ List<String>>>`:\n\n```\nlistOf(\n\"foo\" to listOf(\"bar\"),\n\"foo\" to listOf(\"\
    baz\")\n)\n```\n\nNotice the subtle difference in casing here. The original map\
    \ contained the keys `\"foo\"` (lowercased) and `\"Foo\"` (capitalized), which\
    \ Kotlin considers two different keys. But you will be lowercasing the keys so\
    \ that they’re both `\"foo\"` (lowercased), and Kotlin maps can’t contain two\
    \ different values for the same key. But calling the `map` function on a map data\
    \ structure will turn it into a list of `Pair`. And a list can contain duplicates.\
    \ So the final list will contain multiple pairs with the same lowercased key `\"\
    foo\"`.\n\n```\nsealed class WebResponse {\n    fun headers(): Map<String, List<String>>\
    \ =\n        headers\n            .map { it.key.lowercase() to it.value }\n  \
    \          .fold(mapOf()) { res, (k, v) ->\n                res.plus(Pair(\n \
    \                   k,\n                    res.getOrDefault(k, listOf()).plus(v)\n\
    \                ))\n            }\n}\n```\n\nThe `headers()` function returns\
    \ a new map that has all the header names in lowercase. Just like the function\
    \ `header(String, List<String>)` for adding new header values, the `headers()`\
    \ function uses `getOrDefault` to merge the values of headers where the names\
    \ are identical when lowercased, so that you don’t end up replacing the values\
    \ in `\"foo\"` (lowercased) with the values of `\"Foo\"` (capitalized).\n\n###\
    \ The `fold` Function\n\nSit back, take a deep breath, and clear your mind, as\
    \ I attempt to do the impossible: explain how functional programming works.\n\n\
    `fold` is at the core of all list transformations in functional programming. You\
    \ can use `fold` to implement other functional transformations, like `map`, `filter`,\
    \ `forEach`, `max`, `take`, etc. This makes `fold` useful in cases where your\
    \ list transformation needs some extra rules and isn’t just a plain `map` or `filter`.\n\
    \nIn the implementation of `headers()` in `WebResponse`, `fold` is on a list and\
    \ passes an initial value `mapOf()` (an empty map) and a lambda. `fold` then calls\
    \ the lambda and passes the initial value you provided, `res`, and the first value\
    \ in the list, `(k, v)`. Then, `fold` calls the lambda again with whatever the\
    \ lambda returned the first time `fold` called the lambda and the second value\
    \ in the list. Then, this process repeats for each item in the list, calling the\
    \ lambda for each subsequent item in the list, with whatever the lambda returned\
    \ the last time `fold` called the lambda, as well as the list item itself.\n\n\
    The initial empty map is an *accumulator*. You start with the initial value and\
    \ accumulate new values into it each time `fold` calls the lambda. `fold` does\
    \ not care what type of value the accumulator is. It can be a list, a map, a number,\
    \ or anything else you might want to accumulate over.\n\n### Destructuring Assignment\n\
    \n`(k, v)` is a *destructuring assignment*. Many entities in Kotlin, such as data\
    \ classes and `Pair`, implement `componentN()` functions. You can access the key\
    \ of `Pair` as `it.key`, but also as `it.component1()`. Similarly, you can access\
    \ the value of a `Pair` as `it.value`, but also as `it.component2()`. For all\
    \ entities that implement `componentN()` functions, you can `destructure` them.\
    \ This is a convenient way to directly refer to components of an entity, without\
    \ having to create explicit named variables for them. The following code shows\
    \ how destructuring and explicit variables are identical in functionality.\n\n\
    ```\nval it = Pair(\"foo\" to \"bar\")\n// Using destructuring\nval (k, v) = it\n\
    // Using normal functions\nval k = it.key\nval v = it.value\n// Using manual variable\
    \ declaration\nval k = it.component1()\nval v = it.component2()\n```\n\nDestructuring\
    \ assignment can save you from some manual typing, and they are particularly useful\
    \ when destructuring arguments passed to functions or lambdas, as seen in the\
    \ `headers()` implementation.\n\n## Connecting to Ktor\n\nYou now have a full\
    \ stand-alone representation of HTTP responses, which has no knowledge of Ktor\
    \ or any other library. However, your web app does use Ktor. So you need to tie\
    \ the two together and make Ktor handle your `WebResponse` classes.\n\n### Ktor\
    \ Route Mapping\n\nThe first step is to make it possible to have Ktor routes,\
    \ like `get(\"/\")` and `post(\"/products\")`, interact with `WebResponse` instances\
    \ returned by your own code.\n\nTo see what the result should look like, the following\
    \ code compares the current way you handle routing with what it will look like\
    \ when you’ve finished wiring up Ktor to `WebResponse`.\n\n```\n// Raw calls to\
    \ the Ktor APIs\nget(\"/\") {\n    call.respondText(\"Hello, World!\")\n}\n//\
    \ The end result of connecting Ktor and WebResponse\nget(\"/\", webResponse {\
    \ req ->\n    TextWebResponse(\"Hello, World!\")\n})\n```\n\nThere are two main\
    \ differences between the two examples. First, there’s no direct interaction with\
    \ the Ktor `call` API in the handlers. Second, the Ktor `call` API is imperative\
    \ in that you invoke methods on it imperatively and in succession. The `WebResponse`\
    \ API is functional in nature, meaning that the only point of interaction is the\
    \ immutable value `WebResponse` that’s returned from your own handlers, with no\
    \ imperative method invocations.\n\nThe first step is to create a function that\
    \ creates and returns a new lambda. The function `get` in Ktor has the (simplified)\
    \ signature `get(path: String, body: ApplicationCall.() -> Unit)`. In other words,\
    \ the second argument is an *extension function* on `ApplicationCall`, with no\
    \ return value."
