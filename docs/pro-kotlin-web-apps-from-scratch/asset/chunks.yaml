    It’s important for these values to be consistent every time you restart your web
    app, which is why they’re stored in the config file. If these keys change, all
    currently logged-in users with cookies stored in their browsers will have to log
    in again, as your web app won’t be able to decrypt and verify the cookies with
    changed keys.


    Just like your database password, you should keep the actual values you use in
    your production environment secret and not check them into version control. So,
    in production, your config file is set up to load these values from environment
    variables.


    ### Different Types of Sessions


    The session is the place that stores information about the currently logged-in
    user. Having access to this information is vital to make web app authentication
    work. You’ll use the session as parameters to database queries, to check if the
    incoming request has a logged-in user attached to it in the first place and so
    on.


    You have two main options for session storage: cookie-based storage and server-side
    storage.


    Technically speaking, you’ll always use a cookie. When users log in, you’ll set
    a cookie that you’ll use to verify that the user is indeed logged in. The cookie
    will contain the ID of the logged-in user. You’ll also cryptographically sign
    the cookie, so that attackers can’t just forge it by setting its contents to arbitrary
    values.


    You can use this cookie to store additional state that you need about the currently
    logged-in user. But cookies have a hard limit on size, 4 kilobytes, enforced by
    all browsers. If you try to set a cookie that exceeds this limit, the browser
    will ignore it, causing bugs and unexpected behavior.


    To remedy this, you can set up server-side session storage. There are many session
    storage types available. You should always avoid storing it in RAM, as that will
    break the moment you have more than one server running at the same time.


    You could store session data in a distributed cache or in the database. But all
    production-grade web apps I’ve ever worked with have used cookie-based session
    storage, with no server-side session storage at all. If you need to store extra
    info about the currently logged-in user somewhere, I recommend storing it in whatever
    mechanisms you have available for caching arbitrary values elsewhere in your web
    app or setting up a cache if you don’t have one. It’s not necessary to have a
    specific cache only for storing info about a logged-in user. For example, if you
    have a distributed cache like Memcached ([*https://memcached.org/*](https://memcached.org/))
    or Redis ([*https://redis.io/*](https://redis.io/)) set up, you can store info
    about the current session there and retrieve it just like you would retrieve any
    other piece of cached information.'
  trans: '

    ### 更新你的迁移脚本


    你的 Web 应用有一个可重复执行的迁移脚本，用于插入（upsert）一个用户行，该脚本位于 *src/main/resources/db/migration/R__insert_user.sql*。这个迁移脚本写入了一个硬编码的密码文本，bcrypt
    将无法解密该密码。因此，你需要更新迁移脚本，插入一个真实的密码，以便能够对你在此迁移中创建的用户进行身份验证。


    我本可以在这里直接提供一个完整的 120 字符加密版本的密码 `1234`，你可以手动从书中复制并粘贴到你的迁移文件中。但你可能在最初几次尝试时无法完全正确地输入所有这些字符。相反，你将编写一些代码来生成该字符串，然后将其粘贴到可重复执行的迁移脚本中。


    `password_hash` 列是一个 BYTEA 类型列，因此它期望的是原始字节。要在 SQLite 中将其放入 SQL 语句，最简单的方法是使用 HEX
    编码的字符串，并用 `x''''` 进行转义。例如，`x''2e744c21''` 就是编码一个 4 字节十六进制序列的方式。清单 9-16 展示了如何为任意密码生成
    HEX 字符串，这里利用了清单 9-14 中的 `bcryptHasher`。


    ```

    hex(

    bcryptHasher.hash(

    12,

    "1234".toByteArray(Charsets.UTF_8)

    )

    )

    清单 9-16

    一个用于生成十六进制编码的 bcrypt 加密密码的工具函数

    ```


    该语句将生成一个正确格式的字符串，你可以使用 `x''<此处为十六进制字符串>''` 的格式将其复制/粘贴到可重复执行的迁移脚本中。


    ## 添加登录表单


    对于基于 HTML 的 Web 应用，常见的登录方式是使用 `<form>` 标签将用户名和密码提交到后端，后端根据是否接受凭据来设置 cookie 或显示错误。Ktor
    提供了实现此功能所需的所有工具。


    ### 配置你的 Web 应用


    你需要做好几项准备，以便你的 Web 应用能够通过登录表单对用户进行身份验证。


    首先，在你的 *build.gradle.kts* 中安装处理用户身份验证所需的两个插件：


    ```

    implementation("io.ktor:ktor-server-auth:2.1.2")

    implementation("io.ktor:ktor-server-sessions:2.1.2")

    ```


    这些插件处理会话存储，你的 Web 应用通过会话存储来访问当前登录用户的信息，并能够将 Web 应用中的路由进行隔离，使其仅对登录用户可访问。


    接下来，你需要更新配置文件。你将添加三个不同的属性：`useSecureCookie`（`Boolean` 类型）将切换你的会话 cookie 是否仅能通过
    HTTPS 工作。`cookieEncryptionKey` 和 `cookieSigningKey`（`String` 类型）将设置会话 cookie 使其被加密，从而阻止黑客伪造虚假
    cookie。清单 9-17 展示了你需要添加到配置文件中的内容。


    ```

    // app.conf

    useSecureCookie = true

    cookieEncryptionKey = ""

    cookieSigningKey = ""

    // app-local.conf

    useSecureCookie = false

    cookieEncryptionKey = ""

    cookieSigningKey = ""

    清单 9-17

    新配置属性在各个配置文件中的默认值

    ```


    同时，记得将这些属性添加到你的 `WebappConfig` 数据类中，方法是在数据类本身中添加与配置文件中属性同名的属性，并更新 `createAppConfig`
    以加载这些值。


    默认情况下，你的 Web 应用设置为使用安全 cookie，这意味着 cookie 只能通过 HTTPS 访问，而不能通过 HTTP。但是，你的本地开发环境是通过
    HTTP 运行应用的，因此你需要在此处禁用安全 cookie。


    你需要为 `cookieEncryptionKey` 和 `cookieSigningKey` 提供实际的随机密钥。要生成这些密钥，你可以使用以下工具函数：


    ```

    fun getRandomBytesHex(length: Int) =

    ByteArray(length)

    .also { SecureRandom().nextBytes(it) }

    .let(::hex)

    ```


    你可以通过临时在 `main()` 函数中添加对该函数的调用来调用它，并将输出打印或记录到控制台。使用 `getRandomBytes(16)` 运行此函数以生成
    `cookieEncryptionKey`，使用 `getRandomBytes(32)` 运行以生成 `cookieSigningKey`。将这些调用的输出粘贴到
    *app-local.conf* 中。


    这些值在每次重启 Web 应用时保持一致非常重要，这就是为什么它们被存储在配置文件中。如果这些密钥发生变化，所有当前已登录且浏览器中存有 cookie 的用户都必须重新登录，因为你的
    Web 应用将无法使用更改后的密钥来解密和验证 cookie。


    就像你的数据库密码一样，你应该将生产环境中使用的实际值保密，并且不要将其检入版本控制系统。因此，在生产环境中，你的配置文件被设置为从环境变量加载这些值。


    ### 不同类型的会话


    会话是存储当前登录用户信息的地方。访问这些信息对于使 Web 应用身份验证正常工作至关重要。你将使用会话作为数据库查询的参数，以检查传入请求是否首先附带了已登录用户，等等。


    会话存储主要有两种选择：基于 cookie 的存储和服务器端存储。


    从技术上讲，你总是会使用 cookie。当用户登录时，你将设置一个 cookie，用于验证用户是否确实已登录。该 cookie 将包含已登录用户的 ID。你还会对
    cookie 进行加密签名，这样攻击者就无法通过将其内容设置为任意值来伪造它。


    你可以使用此 cookie 来存储关于当前登录用户所需的其他状态。但是，所有浏览器都强制规定 cookie 的大小有严格限制，即 4 KB。如果你尝试设置超过此限制的
    cookie，浏览器将忽略它，从而导致错误和意外行为。


    为了解决这个问题，你可以设置服务器端会话存储。有许多可用的会话存储类型。你应该始终避免将其存储在 RAM 中，因为一旦你同时运行多个服务器，这就会失效。


    你可以将会话数据存储在分布式缓存或数据库中。但是，我工作过的所有生产级 Web 应用都使用了基于 cookie 的会话存储，完全没有使用服务器端会话存储。如果你需要在某处存储关于当前登录用户的额外信息，我建议使用
    Web 应用中已有的用于缓存任意值的任何机制来存储，或者如果你没有缓存，则设置一个缓存。没有必要专门为存储登录用户信息而设置一个特定的缓存。例如，如果你设置了像
    Memcached ([*https://memcached.org/*](https://memcached.org/)) 或 Redis ([*https://redis.io/*](https://redis.io/))
    这样的分布式缓存，你可以将当前会话的信息存储在那里，并像检索任何其他缓存信息一样检索它。

    '
- fmt: '### Adding a New Ktor Extension Function


    To separate your authentication setup from the rest of your routes, you’ll create
    a new extension function on `Application`, instead of putting it in your existing
    `createKtorApplication`.


    For example, later in this chapter, you’ll set up authentication using Spring
    Security ([*https://spring.io/projects/spring-security*](https://spring.io/projects/spring-security)).
    By separating your main web app from your authentication configuration, you’ll
    be able to have both setups running concurrently.


    Above or below your existing function `createKtorApplication`, you’ll create a
    new function, called `setUpKtorCookieSecurity`. Listing [9-18](#531928_1_En_9_Chapter.xhtml#PC23)
    shows what that function should look like.


    ```

    fun Application.setUpKtorCookieSecurity(

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    }

    Listing 9-18

    The empty skeleton function setUpKtorCookieSecurity, where your security config
    will reside

    ```


    Later in this chapter, you’ll fill this function with your authentication setup.


    To make your Ktor web app use this security setup, remember to invoke it in your
    call to `embeddedServer` where you already have your existing call to `createKtorApplication`.
    Listing [9-19](#531928_1_En_9_Chapter.xhtml#PC24) shows how to call it properly.


    ```

    embeddedServer(Netty, port = config.httpPort) {

    setUpKtorCookieSecurity(config, dataSource)

    createKtorApplication(config, dataSource)

    }.start(wait = true)

    Listing 9-19

    Adding a call to your new security setup function in embeddedServer

    ```


    ### Configuring Session Cookies


    The next step is to set up Ktor with cookie-based sessions. You already have the
    dependencies and configuration properties needed to make this work.


    The `Sessions` plugin is at the core of the setup. You’ll set up this plugin just
    like you’ve already set up the `StatusPages` plugin, except you’ll add it to your
    new `setUpKtorCookieSecurity` function. Listing [9-20](#531928_1_En_9_Chapter.xhtml#PC25)
    shows how to do this.


    ```

    data class UserSession(val userId: Long): Principal

    fun Application.setUpKtorCookieSecurity (

    appConfig: WebappConfig,

    dataSource: DataSource

    ) {

    install(Sessions) {

    cookie("user-session") {

    transform(

    SessionTransportTransformerEncrypt(

    hex(appConfig.cookieEncryptionKey),

    hex(appConfig.cookieSigningKey)

    )

    )

    cookie.maxAge = Duration.parse("30d")

    cookie.httpOnly = true

    cookie.path = "/"

    cookie.secure = appConfig.useSecureCookie

    cookie.extensions["SameSite"] = "lax"

    }

    }

    }

    Listing 9-20

    Adding setup for cookie-based sessions to setUpKtorCookieSecurity

    ```


    This code configures several important aspects of cookie-based session storage.


    The `UserSession` data class holds the data that the session cookie will contain.
    You can put as much data as you want here – but don’t go too far. Remember, the
    browser limits the cookie output to 4 kilobytes.


    The `transform` function sets up the encryption of the actual cookie. Without
    this step, the cookie would store the session information as plain text. This
    means that anyone could set the session cookie to anything, meaning an attacker
    could set the user ID of the cookie to any ID they want, effectively giving anyone
    the ability to log in to your web app as any user they could guess the ID for.
    With the `transform`, however, the cookie is both signed and encrypted. The signature
    means that any change to its contents would break the signature. Encrypted means
    that any secrets you store in the cookie are not visible to hackers – Ktor encrypts
    the actual contents of the cookie using the key you supplied.


    The various cookie flags you set are also important.


    You’re free to set `maxAge` to whatever you want. The effect of `maxAge` is that
    the cookie will expire after the given amount of time, causing your users to have
    to log in again.


    The `path` must also be set to `/`, so that the cookie applies to all pages of
    your web app. If you don’t set it, the cookie will only apply to the path you’re
    on when your web app sets the cookie.


    `secure` means that the cookie will only work on HTTPS, so that the cookie is
    safe from man-in-the-middle attacks. You use the config flag you created in Listing
    [9-17](#531928_1_En_9_Chapter.xhtml#PC21) so that the cookie is secure by default,
    but not when developing locally, where you run your web app over HTTP, not HTTPS.


    Finally, `SameSite` is set to `lax` to protect your cookie from cross-origin attacks.
    The browser will only send the cookie for requests that originate from your own
    web app. If an attacker tries to post a form from another web page to your web
    app, the browser will not transmit the cookie with the request.'
