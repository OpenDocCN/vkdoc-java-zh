    To make headers even easier to work with, you can update `WebResponse` to handle
    headers in a case-insensitive way. Specifically, this lets you add `"``set-cookie``"`
    and `"``Set-Cookie``"` and combine them into the same header value, even though
    one is all lowercase and the other is Camel-Case.


    You can achieve this by leaving the existing code as is and storing the headers
    in multiple casings in the `headers` map. Then you can add a new function that
    creates a version of the headers where they’re all lowercased.


    The `headers` map is just data, and Kotlin has plenty of facilities for transforming
    data (commonly called functional programming or data-oriented programming), so
    that’s how you’ll implement this new function.


    The first step is to convert the headers map to a list of pairs and lowercase
    the keys:


    ```

    headers

    .map { it.key.lowercase() to it.value }

    ```


    The call to map turns this map of type `Map<String, List<String>>`


    ```

    mapOf(

    "foo" to listOf("bar"),

    "Foo" to listOf("baz")

    )

    ```


    to this list of type `List<Pair<String, List<String>>>`:


    ```

    listOf(

    "foo" to listOf("bar"),

    "foo" to listOf("baz")

    )

    ```


    Notice the subtle difference in casing here. The original map contained the keys
    `"foo"` (lowercased) and `"Foo"` (capitalized), which Kotlin considers two different
    keys. But you will be lowercasing the keys so that they’re both `"foo"` (lowercased),
    and Kotlin maps can’t contain two different values for the same key. But calling
    the `map` function on a map data structure will turn it into a list of `Pair`.
    And a list can contain duplicates. So the final list will contain multiple pairs
    with the same lowercased key `"foo"`.


    ```

    sealed class WebResponse {

    fun headers(): Map> =

    headers

    .map { it.key.lowercase() to it.value }

    .fold(mapOf()) { res, (k, v) ->

    res.plus(Pair(

    k,

    res.getOrDefault(k, listOf()).plus(v)

    ))

    }

    }

    Listing 4-5

    A headers() function on WebResponse with all header names in lowercase

    ```


