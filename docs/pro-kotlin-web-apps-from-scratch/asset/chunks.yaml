    RequestHandler

    {

    override fun handleRequest(

    input: Any?,

    context: Context

    ): String {

    return Gson().toJson(mapOf(

    "statusCode" to 200,

    "headers" to mapOf("contentType" to "text/plain"),

    "body" to "Hello, World!"

