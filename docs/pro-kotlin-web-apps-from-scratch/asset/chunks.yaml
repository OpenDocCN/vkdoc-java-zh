  trans: '

    ### 查询多行


    你可以像使用 `single()` 一样使用 `list()`，区别在于 `list()` 会返回查询结果中的所有行。`list()` 的返回类型（通过行映射器）是
    `List<Map<String, Any?>>`。清单 6-4 展示了一些查询多行的示例。


    ```

    dbSess.list(queryOf("SELECT 1 as foo"), ::mapFromRow)

    // [{foo=1}]

    dbSess.list(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    ), ::mapFromRow)

    // [{x=1, y=a}, {x=2, y=b}]

    dbSess.list(queryOf(

    """

    SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)

    WHERE x = 42

    """

    ), ::mapFromRow)

    // []

    清单 6-4

    list() 的输出示例

    ```


    你始终会得到一个行列表作为返回值，即使查询只匹配到单行也是如此。如果匹配到零行，你也会得到一个空列表。你永远不需要检查 `list()` 的返回值是否为 `null`（Kotlin
    类型系统也会告诉你这一点）。


    当你的查询加载大量数据时，你也可以使用 `forEach()`。`forEach()` 会逐行产生数据，而 `list()` 则会在将数据交给你的代码之前，将所有结果累积到一个列表中。如果你预期查询会返回大量行，或者行中包含二进制大对象（blob）或其他大小不定的列，那么使用
    `forEach()` 在内存使用和性能方面会好得多。清单 6-5 展示了如何使用 `forEach()` 的示例。


    ```

    dbSess.forEach(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    )) { rowObject ->

    val row = mapFromRow(rowObject)

    println(row)

    }

    // {x=1, y=a}

    // {x=2, y=b}

    清单 6-5

    使用 forEach 避免将整个结果集加载到内存中的示例

    ```


    `forEach()` 会为查询产生的每一行调用一次 lambda 表达式。传递给 lambda 的是原始的 Kotliquery `Row` 对象。你可以使用与
    `single()` 和 `list()` 相同的 `mapFromRow()` 函数，将此结构转换为普通映射。


    ### 插入行


    要插入行，你需要在 Kotliquery 会话上使用 `updateAndReturnGeneratedKey()` 函数。你还需要通过将 `returnGeneratedKey`
    标志设置为 `true` 来正确创建会话。清单 6-6 展示了如何正确创建会话并执行插入操作。如果设置不正确，你将无法访问数据库在插入行时自动生成的 ID。


    ```

    sessionOf(dataSource, returnGeneratedKey = true)

    .use { dbSess ->

    dbSess.updateAndReturnGeneratedKey(queryOf(

    """

    INSERT INTO user_t

    (email, password_hash, name, tos_accepted)

    VALUES

    (?, ?, ?, ?)

    """,

    "august@augustl.com",

    "123abc",

    "August Lilleaas",

    true)

    )

    // 2

    }

    清单 6-6

    创建一个允许你获取插入行 ID 的会话

    ```


    如果你一直按顺序跟随本书的示例，那么运行此插入操作时获得的 ID 将是 `2`。这是因为你在上一章中已经使用可重复迁移创建了一个用户，如清单 5-13 所示。


    ### 更新和删除


    要执行更新和删除 SQL 语句，你将使用 `update()` 函数。此函数实际上并不关心实际 SQL 语句执行了什么操作。但它会返回查询所影响的行数。这对于进行完整性检查特别有用，可以检查查询是否影响了多于零行。清单
    6-7 展示了执行 `UPDATE` 和 `DELETE` SQL 语句的示例。


    ```

    dbSess.update(queryOf(

    "UPDATE user_t SET name = ? WHERE id = ?",

    "August Lilleaas",


    ))

    // 1

    dbSess.update(queryOf("DELETE FROM user_t"))

    // 2

    清单 6-7

    执行 UPDATE 和 DELETE 语句的示例

    ```


    `UPDATE` 语句返回 1，因为它更新了由行 ID 匹配到的特定行。`DELETE` 语句返回 2，因为它删除了 `user_t` 表中的两行用户数据。


    ### 位置参数 vs. 命名参数


    到目前为止，你的代码使用问号符号来引用 SQL 查询参数。Kotliquery 为这些参数提供了另一种语法，允许你为它们命名。


    命名参数有两个好处：如果你的查询包含许多参数，它能使代码更具可读性；并且它允许你多次重用同一个参数，而无需传递两次或更多次。清单 6-8 展示了清单 6-7
    中 update 语句的示例，这次使用了命名参数而不是位置参数。


    ```

    dbSess.update(queryOf(

    "UPDATE user_t SET name = :name WHERE id = :id",

    mapOf(

    "name" to "August Lilleaas",

    "id" to 2

    )))

    清单 6-8

    使用命名参数传递查询参数

    ```


    这允许你通过名称引用参数，并且还有一个额外的好处，即命名了输入，这样你就不必通过计算参数在参数列表中的位置来确定哪个参数对应哪个位置。


    ### 其他操作


    如你所见，Kotliquery 拥有执行查询和插入所需的一切功能。与直接使用 JDBC 相比，Kotliquery API 简单得多，并且可以轻松地将查询转换为数据并将参数传递给查询。


    你可以在项目 GitHub 页面找到 Kotliquery 中可用参数和方法的详细文档和 API 参考：[`https://github.com/seratch/kotliquery`](https://github.com/seratch/kotliquery)*。*


    ## 从 Web 处理器查询


    你将在 Web 处理器中执行大部分查询。拥有一个辅助函数会很方便，你可以使用它让 Web 处理器自动准备和管理 Kotliquery 会话。


    ### 创建辅助函数


    为了便于在 Web 处理器中进行查询，你将创建一个名为 `webResponseDb` 的 `webResponse` 版本（来自第 4 章）。此函数执行
    `webResponse` 的所有功能，但还会创建和管理一个 Kotliquery 会话。这使得在 Web 处理器中运行查询变得简单方便。清单 6-9 展示了
    `webResponseDb` 的实现。


    ```

    import kotliquery.Session

    fun webResponseDb(

    dataSource: DataSource,

    handler: suspend PipelineContext.(

    dbSess: Session

    ) -> WebResponse

    ) = webResponse {

    sessionOf(

    dataSource,

    returnGeneratedKey = true

    ).use { dbSess ->

    handler(dbSess)

    }

    }

    清单 6-9

    webResponseDb – 包装 webResponse 并添加数据库查询能力

    ```


    `webResponseDb` 的签名类似于 `webResponse`，只是它添加了一个指向 Kotliquery 会话的 `dbSess` 参数。调用它时，你还必须传递一个数据源。此外，`returnGeneratedKey`
    始终设置为 `true`，以确保你的 Web 处理器能够访问数据库自动生成的行 ID。清单 6-10 展示了如何从 Ktor 路由映射中调用 `webResponseDb`
    的示例。


    ```

    get("/db_test", webResponseDb(dataSource) { dbSess ->

    JsonWebResponse(

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    )

    })

    清单 6-10

    创建执行数据库查询的 Ktor 路由的示例

    ```


    在真实的 Web 应用中，大多数 Web 处理器都需要数据库连接。因此，拥有像 `webResponseDb` 这样的辅助函数来创建 Web 处理器，并将所有数据库连接相关事宜和资源管理集中处理，是非常方便的。

