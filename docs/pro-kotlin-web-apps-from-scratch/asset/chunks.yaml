    图 12-6


    将 AWS Lambda 指向代码中正确的处理程序类


    现在，你可以调用你的函数，看看一切是否正常工作！向上滚动到选项卡，当前激活的是“代码”选项卡，然后选择“测试”选项卡。在该页面上，点击标有“测试”的橙色大按钮。接下来，你也可以更改传递给
    lambda 的参数。但你的测试处理程序不会对 AWS Lambda 传递给它的输入做任何处理，因此你无需更改任何内容。图 12-7 显示了此过程的样子。


    ![](img/531928_1_En_12_Fig7_HTML.png)


    浏览器窗口截图显示 kotlinbooktestfunction 页面。测试选项被选中。文本显示：执行结果，成功。测试选项被高亮显示。文本显示：要调用函数而不保存事件，请配置
    JSON 事件，然后选择测试。已选择“创建新事件”选项。


    图 12-7


    你已成功测试了你的函数！


    如果你点击图 12-7 中绿色框内的“详细信息”，你将看到关于 AWS Lambda 处理程序执行的更多信息，如图 12-8 所示。


    ![](img/531928_1_En_12_Fig8_HTML.png)


    浏览器窗口截图显示 kotlinbooktestfunction 页面。文本显示：执行结果，成功。下方列出了摘要信息。


    图 12-8


    关于 AWS Lambda 处理程序执行的详细信息


    这就是你代码的输出！如前所述，AWS Lambda 本身不会以任何方式解释输出；它只是将其转发给调用者，在本例中是 AWS Lambda 测试控制台。如何解释输出取决于调用者，如果你设置了
    API Gateway 来调用你的 lambda，它将使用此 JSON 输出来决定如何响应传入的 HTTP 请求。

