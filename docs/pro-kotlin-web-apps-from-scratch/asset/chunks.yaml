  raw: 'To see this for yourself, open *http://localhost:4207/secret* in your browser.
    That should redirect you to the login page, where you can log in with the credentials
    for the user you created in your repeatable migration. After login, you’re redirected
    back to `/secret` again.


    ### Logging Out


    The `/secret` route has a link to a route you haven’t implemented yet, `/logout`.
    You’ll implement this route next, so that users can log out of your web app.


    A route for logging out should not do much other than performing the logout and
    redirecting the user to a page that’s accessible for users who haven’t logged
    in. In this example, you’ll redirect the user back to the `/login` page. Listing
    [9-25](#531928_1_En_9_Chapter.xhtml#PC30) shows how to implement that route.


    ```

    authenticate("auth-session") {

    get("/logout") {

    call.sessions.clear()

    call.respondRedirect("/login")

    }

    // ...

    Listing 9-25

    Adding a route in setUpKtorCookieSecurity for logging out a user

    ```


    As you can see from the code, you’ve wrapped the logout page in the `authenticate`
    interceptor. That’s not important for security, but it doesn’t really make sense
    to have the logout page available for users who haven’t logged in.


    The handler itself clears the session cookie and redirects back to the login page.
    Note that it’s not actually possible to unset a cookie. The only way to set a
    cookie is to use the `Set-Cookie` header and set it to something. So Ktor and
    the session plugin set the cookie to `""` (an empty string). That causes subsequent
    requests that hit the `authenticate` interceptor to treat the request as non-authenticated.


    # 10. Building API-Based Back Ends


    In the modern world of web apps, it’s common to have back ends that are completely
    API based and have either a mobile app or a JavaScript-based web front end that
    interacts with them. In this chapter, you’ll learn how to set up an API for those
    scenarios.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    *   Parsing and producing JSON with third-party libraries


    Also in this chapter, you will learn the following about building API-based back
    ends:


    *   Different types of authentication


    *   How to securely set cookies for browsers


    *   Building APIs for single-page web apps and native apps


    ## Handling API Calls


    An API call is just a normal route, like any other route. All the routes you’ve
    made so far that use `JsonWebResponse` are API routes, as they return machine-readable
    data.


    In this section, you’ll learn some details about best practices for making an
    API.


    ### Parsing Input


    Most web apps receive inputs in some way or another, so you’ll need to know how
    to read data that external parties post to your web handlers.


    You’ve already read form-encoded data in Chapter [9](#531928_1_En_9_Chapter.xhtml),
    where you received form parameters for the username and password for the form-based
    login in your HTML-based web app setup. To do that, you used `call.receiveParameters()`,
    which parses the HTTP request body with the form data encoding browsers use for
    HTML forms.


    To read JSON, all you must do is to read the HTTP request body as a plain string
    and parse it using the Gson library ([*https://github.com/google/gson*](https://github.com/google/gson))
    you’ve already installed in Chapter [4](#531928_1_En_4_Chapter.xhtml) for writing
    JSON output via `JsonWebResponse`. The only extra step you need to take for reading
    JSON compared with writing it is to specify the class that Gson should serialize
    your data to – `Map` or `List`. Listing [10-1](#531928_1_En_10_Chapter.xhtml#PC1)
    shows an example of how to read JSON in your web handlers.


    ```

    post("/test_json", webResponse {

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    JsonWebResponse(mapOf(

    "input" to input

    ))

    })

    Listing 10-1

    Parsing JSON in your web handlers

    ```


    All this web handler does is to parse the received JSON and return a response
    that re-encodes the parsed JSON back to JSON.


    The Ktor function `call.receiveText()` will handle encoding automatically and
    parse the bytes submitted over HTTP to a string using either the encoding specified
    in the HTTP headers of that request or the system-default encoding if the request
    didn’t specify one.


    ### Validating and Extracting Input


    To make the input you receive from your web handlers useful, you need to extract
    the content of the data you’ve received and ensure that it has the correct format
    for the business logic in your web app.


    You don’t just want to validate that the types are correct. Programming language
    data types are too general to be useful. For example, you should validate that
    an email address that someone posts to your API is something that looks like an
    email address. Just checking that it’s of the type `String` is not sufficient.


    The library I prefer to use for data validation is Arrow. In Chapter [8](#531928_1_En_8_Chapter.xhtml),
    you installed Arrow ([*https://arrow-kt.io/*](https://arrow-kt.io/)), to demonstrate
    the difference between `kotlin.coroutines` and `kotlinx.coroutines`. And the example
    used was data validation. So let’s build on the small examples demonstrated there
    and use that to build actual data validation in a web handler.


    Arrow has the benefit of giving you full flexibility of the shape of the data
    that you’re validating. Arrow lets you start with a map and end with either a
    validation error or an initialized data class, whereas most other Kotlin data
    validation libraries are tightly coupled with data classes, forcing you to instantiate
    a data class first and then validate it later.


    In Listing [8-10](#531928_1_En_8_Chapter.xhtml#PC10), you created a `ValidationError`
    data class, two functions to perform validations (`validateEmail` and `validatePassword`),
    as well as a data class (`MyUser`) to hold the final validated value. Listing
    [10-2](#531928_1_En_10_Chapter.xhtml#PC2) shows how to wire those functions up
    for data validation inside a web handler.


    ```

    post("/test_json", webResponse {

    either {

    val input = Gson().fromJson(

    call.receiveText(), Map::class.java

    )

    MyUser(

    email = validateEmail(input["email"]).bind(),

    password = validatePassword(input["password"]).bind()

    )

    }.fold(

    { err ->

    JsonWebResponse(

    mapOf("error" to err.error),

    statusCode = 422

    )

    },

    { user ->

    // .. do something with `user`

    JsonWebResponse(mapOf("success" to true))

    }

    )

    })

    Listing 10-2

    Validating JSON input with Arrow

    ```


    The use of Arrow in this code makes it look straightforward and natural, but at
    the same time, Arrow’s use of `kotlin.coroutines` makes it quite clever. `Either`
    and `bind` are both *left biased*, so as soon as a bound statement returns the
    left side of the `Either` (i.e., a `ValidationError`), the execution of the code
    inside the `either` block stops at that point, and that left side is the “winner.”
    If all the bound `Either` statements return the right side, that value is simply
    returned as the result of those statements, and the right side with `MyUser` is
    the “winner.”


    `fold` is a function on `Either` that calls either a left or a right lambda, depending
    on what the result of the `Either` was. `fold` is also a function that’s tagged
    with `inline`. If you’re used to callbacks in a language like JavaScript or even
    Java, the code might look like it just calls one of the two lambdas passed to
    fold, without returning anything. But because fold is inline, you can think of
    the contents of the lambdas as if you wrote them at the top level, outside of
    the fold function, and therefore the return values from the lambdas in `fold`
    are what’s returned from the entire statement.


    So, in short, this code either returns the error `JsonWebResponse` or the successful
    `JsonWebResponse`, based on whether any of the validations inside the either block
    returned a `ValidationError`.'
