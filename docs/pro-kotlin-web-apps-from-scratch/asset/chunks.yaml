- fmt: '### Writing a Failing Test


    Your first test case will test a function you’ll implement for creating users.
    The test will be as simple as possible. It will create the user and check that
    we got the ID of the newly created user in return.


    The first step is to write a failing test. To avoid failing at compilation due
    to a missing function, you’ll create an empty implementation. Later, you’ll return
    to this function and implement it. Listing [7-6](#531928_1_En_7_Chapter.xhtml#PC6)
    shows the signature and the empty implementation.


    ```

    fun createUser(

    dbSession: Session,

    email: String,

    name: String,

    passwordText: String,

    tosAccepted: Boolean = false

    ): Long {

    return -1

    }

    Listing 7-6

    An empty implementation of the new function to create a user

    ```


    With this empty implementation in hand, you can now write a test case. You could
    write a test that creates the user and use `assertNotNull` to check that you get
    a valid user ID and not null back. But the type system already verifies that,
    as the return type is `Long`, not `Long?`. Instead, a more useful test could be
    to create two different users and check that they get a distinct ID. Listing [7-7](#531928_1_En_7_Chapter.xhtml#PC7)
    shows what that test case looks like.


    ```

    @Test

    fun testCreateUser() {

    sessionOf(

    testDataSource,

    returnGeneratedKey = true)

    .use { dbSess ->

    val userAId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    val userBId = createUser(dbSess,

    email = "august@augustl.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    assertNotEquals(userAId, userBId)

    }

    }

    Listing 7-7

    A test case in src/test/kotlinbook/UserTest.kt that checks if createUser works
    and returns a distinct user ID

    ```


    Try to run this test and notice how it fails. You hard-coded `createUser` to return
    `-1`, which means that the IDs of both the users you created are `-1`. And your
    test expects that when you create two users, they each get a separate and distinct
    ID assigned to them.


    ### Making the Test Pass


    The only thing left to do to make your test pass is to implement `createUser`
    and have it interact with the database and create the user and return the ID of
    the user that was created.


    You already know how to create a user, as you wrote a function in Chapter [6](#531928_1_En_6_Chapter.xhtml)
    that inserts a user and returns the generated user ID. Listing [7-8](#531928_1_En_7_Chapter.xhtml#PC8)
    shows an implementation of `createUser` that does everything you need it to.


    ```

    fun createUser(

    dbSession: Session,

    email: String,

    name: String,

    passwordText: String,

    tosAccepted: Boolean = false

    ): Long {

    val userId = dbSession.updateAndReturnGeneratedKey(

    queryOf(

    """

    INSERT INTO user_t

    (email, name, tos_accepted, password_hash)

    VALUES (:email, :name, :tosAccepted, :passwordHash)

    """,

    mapOf(

    "email" to email,

    "name" to name,

    "tosAccepted" to tosAccepted,

    "passwordHash" to passwordText

    .toByteArray(Charsets.UTF_8)

    )

    )

    )

    return userId!!

    }

    Listing 7-8

    A working implementation of createUser

    ```


    Run your tests again, and they should pass. The user ID of both users that you
    created in the test was the same before, as `createUser` was hard-coded to return
    `-1`. But with a real implementation that creates users and returns their distinct
    ID, the test passes.


    The double exclamation mark is an unsafe cast operator. The type of `updateAndReturnGeneratedKey`
    from Kotliquery is `Long?`. This is because it’s technically possible to write
    a SQL statement that doesn’t insert any rows, so Kotliquery has to encode that
    possibility into the type system. In this case, though, a plain insert that succeeds
    and does not throw any exceptions will always return a `Long`. So it’s safe to
    cast it from `Long?` to `Long` using `!!`.


    If it for some extraordinary reason ends up actually being null, Kotlin will throw
    a `NullPointerException` at the point where you used the unsafe cast operator
    `!!`. So the rest of your program is still type-safe, as Kotlin will never return
    a null from a function with a non-null return type.


    ## Avoiding Leaky Tests


    Currently, you only have a single test case. But as your test suite grows, you
    want to make sure that each individual test case runs in isolation and that data
    does not leak between them.


    ### Leaky Tests


    To demonstrate the problem with leaky tests, you can write another test that also
    creates a user, `testCreateAnotherUser()`:


    ```

    @Test

    fun testCreateAnotherUser() {

    sessionOf(

    testDataSource,

    returnGeneratedKey = true)

    .use { dbSess ->

    val userId = createUser(dbSess,

    email = "augustlilleaas@me.com",

    name = "August Lilleaas",

    passwordText = "1234"

    )

    // ... write some assertions here ...

    }

    }

    ```


    If you try to run this test now, you’ll get an error caused by a conflict between
    the test you wrote in Listing [7-7](#531928_1_En_7_Chapter.xhtml#PC7), `testCreateUser`,
    and the new test you just added. The tests both create a user with the email *augustlilleaas@me.com*.
    The `user_t` table has a uniqueness constraint added for the email column, and
    thus one of the tests fails with the following error message:


    ```

    Unique index or primary key violation: "public.CONSTRAINT_CE_INDEX_1 ON public.user_t(email
    NULLS FIRST) VALUES ( /* 2 */ ''augustlilleaas@me.com'' )"

    ```


    Your tests run against an in-memory database, but this database stays alive for
    the full test run. So all your tests run against the same database, and any data
    that a test leaves behind in the database after it runs is visible to subsequent
    tests.


    Also note that currently, you use an in-memory database that resets between every
    test run. In a real-world project, you’re likely to connect to an actual database
    where data is persisted. In that case, you’ll run into issues even with a single
    test case, as data from the previous test run is still in the database and causes
    conflicts on subsequent test runs.'
