  raw: '### Running Flyway During Startup


    The ideal time to run Flyway migrations is when your application starts up. This
    is because your database schema and your code are tightly coupled. Your code will
    refer to the tables and columns added by your migration scripts, so you don’t
    want your code to start executing until Flyway has finished running the schema
    migrations and added the new fields and tables.


    Just like `createDataSource()`, you’ll need to run Flyway in later chapters in
    this book. So you’ll create two separate functions for running it. Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8)
    shows how to create those functions.


    ```

    fun migrateDataSource(dataSource: DataSource) {

    Flyway.configure()

    .dataSource(dataSource)

    .locations("db/migration")

    .table("flyway_schema_history")

    .load()

    .migrate()

    }

    fun createAndMigrateDataSource(config: WebappConfig) =

    createDataSource(config).also(::migrateDataSource)

    Listing 5-6

    Functions for creating a migrated data source and for running the actual migrations

    ```


    Call this function as soon as possible in your `main()` function, preferably right
    after you create your `WebappConfig`. If you already have a call to `createDataSource`,
    replace it with `createAndMigrateDataSource`.


    You use Flyway by passing it the data source, the location of your database migration
    files, and the name of the table where Flyway stores its own metadata. Flyway
    uses the metadata table to keep track of its own internal state. You’ll see more
    about that state later in this chapter.


    Tip


    You can omit the `locations` and `table` method calls in Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8),
    as they are set to their default values. I included them in the listing because
    they are important properties you need to be aware of to understand how Flyway
    operates.


    The `also` function is another scope function like `let`, `use`, and `apply`.
    The goal of `createAndMigrateDataSource()` in Listing [5-6](#531928_1_En_5_Chapter.xhtml#PC8)
    is to create the data source, run the migrations, and then finally return the
    newly created data source. This is exactly what `also` does. `also` first runs
    the lambda and passes the object that you called `also` on to that lambda (`dataSource`
    in this case). When the lambda has finished executing, `also` returns the object
    you called it on initially. This saves you from creating an intermediate variable
    and lets you write the whole operation as a single statement.


    The syntax `::migrateDataSource` is called a *function reference*. You could have
    written `.also { migrateDataSource(it) }`, which would wrap the `migrateDataSource`
    function in a lambda. But you can skip that extra step and just pass in the function
    directly. Kotlin doesn’t care if you pass a lambda or a function reference to
    an argument that’s a function type, and function references and lambdas with the
    same arguments and return types are logically equivalent.


    ### Creating the Initial Schema


    Flyway now executes when you start your web app. But you haven’t added any migration
    scripts yet, so Flyway logs *No migrations found. Are your locations set up correctly?*
    at the warning level.


    To create the initial schema, you need to add your first migration script to Flyway.
    Initializing the database to the base schema is not a special operation in Flyway.
    The initial schema is simply the first (and, so far, only) migration in your system.


    Flyway migration files are numbered. Flyway runs the migrations in ascending order,
    from the lowest to the highest number. It’s up to you if you want your numbers
    to be an incrementing sequence or a timestamp or something else.


    Flyway also has a naming convention that migration files should follow. The format
    is *V{number}__{myFileName).sql*. That’s an uppercase V, the version number of
    the migration, two underscores, the name of your migration, and a *.sql* suffix.


    In this book I’ll use an incrementing number. This means you should place your
    initial migration file in *src/main/resources/db/migration/V1__initial.sql*. Listing
    [5-7](#531928_1_En_5_Chapter.xhtml#PC9) shows what you’re going to put in this
    file.


    ```

    CREATE TABLE user_t (

    id BIGSERIAL PRIMARY KEY,

    created_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

    updated_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

    email VARCHAR(255) NOT NULL UNIQUE,

    password_hash BYTEA NOT NULL

    );

    Listing 5-7

    The contents of your initial schema setup in src/main/resources/db/migration/V1__initial.sql

    ```


    If you run your web app, you’ll see log output from Flyway saying, *Migrating
    schema “PUBLIC” to version “1 - initial”*. This means that Flyway successfully
    ran the SQL file and registered the migration as successfully completed. If you
    rerun your web app, Flyway will now log, *Current version of schema “PUBLIC”:
    1* and *Schema “PUBLIC” is up to date. No migration necessary*, indicating that
    the migration file you created has already run successfully and Flyway didn’t
    write any changes to the database.


    ## Managing Schema Changes


    As your web app grows, you’ll add more tables and columns to your database. And
    as requirements change and you uncover more knowledge about your web app and its
    details, you’ll want to make changes to the database schema. Flyway has everything
    you need to make this happen.


    ### Don’t Edit Migrations After Run


    You can’t edit migrations that have already run when you want to make additional
    changes to your database schema. If you try to do that, Flyway will throw an error:


    ```

    Exception in thread "main" org.flywaydb.core.api.exception.FlywayValidateException:
    Validate failed: Migrations have failed validation

    Migration checksum mismatch for migration version 1

    -> Applied to database : 299127514

    -> Resolved locally    : -1989839469

    Either revert the changes to the migration, or run repair to update the schema
    history.

    ```


    Flyway treats changes to migration files that have already run as a critical error.
    That’s why it throws an exception instead of just informing about it in the log.
    You should not catch this exception; it’s better if you leave it as it is so that
    your `main()` function throws and stops your web app from starting when your migration
    files are in an invalid state.


    Flyway keeps track of which migrations it has successfully run and which it hasn’t.
    Flyway does this at the level of the migration file version. Flyway is not able
    to detect which changes you’ve made to the migration file and only run those changes.


    This makes sense, as Flyway can’t know how to handle changes automatically. Let’s
    say you changed the name of a column. Should Flyway delete the old column and
    create a new one? Should it rename the column? Or something else?


    Instead of having “magic” handling of all these cases, Flyway gives up and treats
    it as a user error if you change a migration file after it’s executed successfully.


    ### Adding More Schema


    In Listing [5-7](#531928_1_En_5_Chapter.xhtml#PC9) you created a table. If you
    want to add more tables to your web app, it’s as simple as creating yet another
    migration file.


    To create a new migration, just create a new migration file inside *src/main/resources/db/migration*.
    You’ve already used version number 1 for the initial migration, so you should
    name it something like *V2__add_name_to_user.sql*. Listing [5-8](#531928_1_En_5_Chapter.xhtml#PC11)
    shows an example of what that might look like.


    ```

    ALTER TABLE user_t ADD COLUMN name VARCHAR(255);

    Listing 5-8

    A second migration, which adds a new column to the existing user_t table

    ```


    If you rerun your app, Flyway will see the new V2 file, detect that it hasn’t
    executed it yet, and execute it.'
  trans: '

    ### 在启动时运行 Flyway


    运行 Flyway 迁移的理想时机是在应用程序启动时。这是因为你的数据库模式（Schema）和代码是紧密耦合的。你的代码会引用迁移脚本所添加的表和列，因此，你需要确保在
    Flyway 完成模式迁移并添加新字段和新表之后，你的代码才开始执行。


    就像 `createDataSource()` 一样，你需要在本书后续章节中运行 Flyway。因此，你将创建两个独立的函数来运行它。清单 5-6 展示了如何创建这些函数。


    ```

    fun migrateDataSource(dataSource: DataSource) {

    Flyway.configure()

    .dataSource(dataSource)

    .locations("db/migration")

    .table("flyway_schema_history")

    .load()

    .migrate()

    }

    fun createAndMigrateDataSource(config: WebappConfig) =

    createDataSource(config).also(::migrateDataSource)

    清单 5-6

    用于创建已迁移数据源以及运行实际迁移的函数

    ```


    在你的 `main()` 函数中尽早调用此函数，最好是在创建 `WebappConfig` 之后立即调用。如果你已经调用了 `createDataSource`，请将其替换为
    `createAndMigrateDataSource`。


    使用 Flyway 时，你需要向其传递数据源、数据库迁移文件的位置，以及 Flyway 存储自身元数据的表名。Flyway 使用元数据表来跟踪其内部状态。你将在本章后面部分了解更多关于该状态的信息。


    提示


    你可以省略清单 5-6 中的 `locations` 和 `table` 方法调用，因为它们会被设置为默认值。我在清单中包含它们，是因为它们是理解 Flyway
    运作方式所需了解的重要属性。


    `also` 函数是另一个作用域函数，类似于 `let`、`use` 和 `apply`。清单 5-6 中 `createAndMigrateDataSource()`
    的目标是创建数据源、运行迁移，然后最终返回新创建的数据源。这正是 `also` 所做的。`also` 首先运行 lambda 表达式，并将你调用 `also`
    的对象（此处为 `dataSource`）传递给该 lambda。当 lambda 执行完毕后，`also` 返回你最初调用它的那个对象。这省去了你创建中间变量的步骤，并让你能够将整个操作写成一个单独的语句。


    语法 `::migrateDataSource` 被称为*函数引用*。你也可以写成 `.also { migrateDataSource(it) }`，这会将
    `migrateDataSource` 函数包装在一个 lambda 中。但你可以跳过这个额外步骤，直接传入函数。Kotlin 不关心你是将 lambda
    还是函数引用传递给一个函数类型的参数，并且具有相同参数和返回类型的函数引用与 lambda 在逻辑上是等价的。


    ### 创建初始模式


    现在，当你启动 Web 应用时，Flyway 就会执行。但你还没有添加任何迁移脚本，因此 Flyway 会在警告级别记录日志 *未找到迁移。你的位置设置正确吗？*。


    要创建初始模式，你需要将第一个迁移脚本添加到 Flyway。在 Flyway 中，将数据库初始化为基本模式并非特殊操作。初始模式只是你系统中的第一个（也是目前唯一的）迁移。


    Flyway 迁移文件是编号的。Flyway 按升序运行迁移，从编号最低到最高。你可以自行决定使用递增序列、时间戳或其他方式作为编号。


    Flyway 还有一个迁移文件应遵循的命名约定。格式为 *V{编号}__{我的文件名}.sql*。即大写字母 V、迁移版本号、两个下划线、迁移名称以及 *.sql*
    后缀。


    在本书中，我将使用递增的数字。这意味着你应该将初始迁移文件放在 *src/main/resources/db/migration/V1__initial.sql*
    中。清单 5-7 展示了你将在此文件中放入的内容。


    ```

    CREATE TABLE user_t (

    id BIGSERIAL PRIMARY KEY,

    created_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

    updated_at TIMESTAMP WITH TIME ZONE DEFAULT now(),

    email VARCHAR(255) NOT NULL UNIQUE,

    password_hash BYTEA NOT NULL

    );

    清单 5-7

    位于 src/main/resources/db/migration/V1__initial.sql 中的初始模式设置内容

    ```


    如果你运行 Web 应用，你将看到 Flyway 输出的日志，内容为 *正在将模式“PUBLIC”迁移到版本“1 - initial”*。这意味着 Flyway
    已成功运行该 SQL 文件，并将该迁移注册为已成功完成。如果你重新运行 Web 应用，Flyway 现在将记录日志 *模式“PUBLIC”的当前版本：1*
    和 *模式“PUBLIC”已是最新。无需迁移*，这表明你创建的迁移文件已成功运行，并且 Flyway 未向数据库写入任何更改。


    ## 管理模式变更


    随着你的 Web 应用不断发展，你将向数据库添加更多的表和列。并且随着需求的变化以及你对 Web 应用及其细节的了解加深，你将希望对数据库模式进行更改。Flyway
    拥有实现这一切所需的一切功能。


    ### 运行后请勿编辑迁移


    当你希望对数据库模式进行额外更改时，不能编辑已经运行过的迁移。如果你尝试这样做，Flyway 将抛出一个错误：


    ```

    Exception in thread "main" org.flywaydb.core.api.exception.FlywayValidateException:
    Validate failed: Migrations have failed validation

    Migration checksum mismatch for migration version 1

    -> Applied to database : 299127514

    -> Resolved locally    : -1989839469

    Either revert the changes to the migration, or run repair to update the schema
    history.

    ```


    Flyway 将对已运行迁移文件的更改视为严重错误。这就是它抛出异常而不是仅仅在日志中通知的原因。你不应该捕获此异常；最好保持原样，这样当你的迁移文件处于无效状态时，你的
    `main()` 函数会抛出异常并阻止 Web 应用启动。


    Flyway 会跟踪哪些迁移已成功运行，哪些尚未运行。Flyway 在迁移文件版本级别执行此操作。Flyway 无法检测你对迁移文件做了哪些更改，并仅运行这些更改。


    这是合理的，因为 Flyway 无法知道如何自动处理更改。假设你更改了列的名称。Flyway 应该删除旧列并创建一个新列吗？应该重命名该列吗？还是做其他事情？


    Flyway 并没有对这些情况采用“魔法”处理，而是选择放弃，并将更改已成功执行的迁移文件视为用户错误。


    ### 添加更多模式


    在清单 5-7 中，你创建了一个表。如果你想向 Web 应用添加更多表，只需创建另一个迁移文件即可。


    要创建新的迁移，只需在 *src/main/resources/db/migration* 目录内创建一个新的迁移文件。你已经在初始迁移中使用了版本号 1，因此你应该将其命名为类似
    *V2__add_name_to_user.sql* 的名称。清单 5-8 展示了一个示例。


    ```

    ALTER TABLE user_t ADD COLUMN name VARCHAR(255);

    清单 5-8

    第二个迁移，向现有的 user_t 表添加一个新列

    ```


    如果你重新运行应用，Flyway 将看到新的 V2 文件，检测到它尚未执行，然后执行它。

    '
- fmt: '### Adding Non-nullable Columns


    Adding the `name` column to `user_t` was easy, because you didn’t tag it with
    `NOT NULL`. Any existing rows in the table would get the new `name` column set
    to `NULL` when you run the `V2` migration in Listing [5-8](#531928_1_En_5_Chapter.xhtml#PC11).
    What do you do if you want to add a new `NOT NULL` column to `user_t`?


    If your database is empty, adding a `NOT NULL` column will work fine. But if you
    have data in `user_t` and create a new *V3* migration and put something like `ALTER
    TABLE user_t ADD COLUMN tos_accepted BOOLEAN NOT NULL` in it, you’ll get an error
    from Flyway saying that the migration is failing and an error from H2 saying `NULL
    not allowed for column "TOS_ACCEPTED"`.


    This is because the SQL database doesn’t know what to do with the existing rows
    in the table. It can’t set them to `NULL`, because you disallowed `NULL` for that
    column.


    There are two ways to solve this. The first is to set a default value for that
    column. This means that when you create new rows in that table and don’t set that
    column, it’ll be set to the default value you specified. Additionally, this tells
    the SQL database that when it creates the column, it can set it to the default
    value for existing rows in the database. Listing [5-9](#531928_1_En_5_Chapter.xhtml#PC12)
    shows what that migration file looks like.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN

    NOT NULL

    DEFAULT false;

    Listing 5-9

    Add V3 migration with a non-nullable column with a default value

    ```


    The second way of solving this, which is my preferred way, is to do the change
    in multiple steps. What if you don’t want to have a default value? I prefer to
    have default values in my business logic, not in my database. If I forget to set
    `tos_accepted` from my code, I want the operation to fail.


    You can do this by splitting the operation to three steps: add the column and
    allow nulls, run an `UPDATE` statement that sets the column to the preferred value,
    and then update the column with a `NOT NULL` constraint. Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13)
    shows how to write that migration.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    Listing 5-10

    Add V3 migration with a non-nullable column in multiple steps, with no default
    value

    ```


    This way, your database ends up in the desired state. New inserts will fail if
    you don’t set `tos_accepted`. And existing records get the new `tos_accepted`
    column set to `false`.


    ### Backward-Compatible Migrations


    It’s common to run your web app in blue/green deployments, meaning that when you
    deploy the latest version of your code, you keep the previous version up and running
    until the process with your new code has started up and is fully initialized.
    Then, your deployment setup directs all incoming requests to the latest version
    and only then shuts down the previous version.


    The consequence of this is that for some time, the previous version of your code
    is running while the latest version of your code is starting up and running the
    database migrations. So the previous version of your code is now running against
    the latest version of the database schema.


    If you’re not careful, you’ll make changes to your database schema that are incompatible
    with the previous version of the code. Therefore, it’s helpful to write your database
    migrations to be backward compatible with the previous version of your code.


    The migration in Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13) is not backward
    compatible. It runs successfully, but it also makes a change to the database that
    causes the previous version of the code to fail. If the previous version of the
    code tries to insert a new user, the operation will fail as it has no knowledge
    of the new `tos_accepted` column and doesn’t set it.


    You can solve this by leaning on the fact that you have blue/green deployments
    and that deploying the latest version of your code does not incur any downtime
    on your system. Listing [5-11](#531928_1_En_5_Chapter.xhtml#PC14) shows an updated
    version of the `V3` migration, where all you do is to add the new column.


    ```

    ALTER TABLE user_t

    ADD COLUMN tos_accepted BOOLEAN;

    Listing 5-11

    An updated V3 migration that’s backward compatible

    ```


    Deploy this version first and wait until it’s completed. Remember, when you deploy
    in a blue/green environment, the previous version of the code runs only temporarily,
    and the blue/green deployment shuts the old code down before the deployment is
    complete. The next step is to create a new *V4* migration, which finishes the
    job. The previous version of the code is no longer running in production, and
    the current code in production knows about the `tos_accepted` column. Listing
    [5-12](#531928_1_En_5_Chapter.xhtml#PC15) shows the new *V4* migration, which
    contains the remaining changes to mark the new column as `NOT NULL`.


    ```

    UPDATE user_t SET tos_accepted = false;

    ALTER TABLE user_t

    ALTER COLUMN tos_accepted

    SET NOT NULL;

    Listing 5-12

    A V4 migration that marks the new column from V3 as non-nullable

    ```


    If you look at the V3 and V4 migrations from Listings [5-11](#531928_1_En_5_Chapter.xhtml#PC14)
    and [5-12](#531928_1_En_5_Chapter.xhtml#PC15), you can see that they are identical
    in content to the original V3 migration from Listing [5-10](#531928_1_En_5_Chapter.xhtml#PC13)
    that did the entire operation in one step. So the only change that you made was
    to run it in two steps, instead of one, to make sure that your migrations are
    always compatible with the current and previous versions of code that are running
    in your production environment.


    Be aware, though. This migration was easy to make backward compatible. But this
    is not always the case. The larger your change, the more complex your backward-compatible
    migrations can become, compared with writing it in a non-backward-compatible way.
    You should consider whether to make a migration backward compatible on a case-by-case
    basis. If the cost is too high, risking some downtime or exceptions in productions
    might be acceptable.


    ## Insert Seed Data


    You can also use Flyway to generate *seed data*. Seed data is data that your web
    app expects to always be in the database. For example, if you build a web app
    for scheduling and delivering packages, you might store the types of packages
    your system supports in a table. But this table shouldn’t contain arbitrary packages.
    Your code only supports the package types that the table lists, and you don’t
    provide any user interface for adding more package types.'
