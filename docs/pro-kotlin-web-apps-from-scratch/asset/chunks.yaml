    就是这样！你现在拥有了一套完整的配置：用于读取配置文件、为不同环境设置不同配置，并在启动时打印已屏蔽机密信息的配置。


    # 4. 将 Web 处理器与特定库解耦


    随着应用的增长，你将拥有数百甚至数千个独立的 Web 处理器，用于处理 HTTP 动词和 URL 路径的不同组合。这些处理器的目的是运行不同的业务逻辑。在本章中，你将学习如何将业务逻辑和
    Web 处理器与 Ktor 解耦，以便你可以在任何上下文中使用它们。


    在后续章节中，你将在许多不同的环境中运行你的 Web 处理器，而不仅仅是 Ktor。将 Web 处理器与 Ktor 解耦是实现这一目标的必要条件。例如，你将在第
    10 章中看到如何从无服务器环境运行你在 Ktor 中使用的相同 Web 处理器。


    解耦的实现本身也是一个很好的机会，可以让你学习一些关于 Kotlin 语言的重要概念。


    不过请注意，在实际的 Web 应用中实现这种解耦时，我会非常谨慎。它会引入复杂性和抽象层。你的实际 Web 应用不太可能需要同时支持多个库和/或部署场景。所以请谨慎行事，并做出明智的判断。


    如果你是 Kotlin 新手，以下是一些你将在本章中看到示例的语言特性：


    *   具有抽象属性和函数的密封类


    *   函数重载


    *   使用映射和列表的函数式数据驱动编程


    *   复制数据类


    *   不可变性


    *   解构声明


    *   函数类型


    *   扩展函数


    同样在本章中，你将学习以下关于在 Web 应用中将 Web 处理器与特定库解耦的内容：


    *   创建抽象并将其连接到库


    *   为什么你应该考虑*不*在实际的 Web 应用中解耦你的 Web 处理器


    除了在第 12 章中学习如何在无服务器环境中部署 Web 处理器之外，附录 A 还将教你如何用 Jersey 替换 Ktor。


    ## 你自己的 HTTP 响应抽象


    到目前为止，你都是通过直接调用 Ktor 的 `call` API 上的方法来响应 HTTP 请求。为了与 Ktor 解耦，你需要创建自己的抽象，该抽象对
    Ktor 和 `call` 一无所知。你将更新所有 Web 处理器以使用你自己的抽象，使它们独立并与 Ktor 解耦。


    ### 表示 HTTP 响应


    Ktor 拥有丰富的 API 来表示 HTTP 响应。你自己的抽象也需要能够表示任何 HTTP 响应，就像 Ktor 一样。幸运的是，你可以将 HTTP 响应简化为一个简单的结构：状态码、一些标头和响应体。


    你可以使用一个简单的数据类来表示 HTTP 响应数据：


    ```

    data class WebResponse(

    val statusCode: Int,

    val headers: Map>,

    val body: Any

    )

    ```


    你将在本章中大量扩展这个数据类。例如，类型 `Any` 可以工作，并且可以用来表示任何（双关语）HTTP 响应体。但它阻止了类型系统对 HTTP 响应内容有任何（也是双关语）了解。Kotlin
    拥有丰富而强大的类型系统，因此你应该尽可能避免使用类型 `Any`。


    相反，你可以修改 `WebResponse`，利用这样一个事实：你可以对所有 HTTP 响应以相同的方式表示状态码和标头。你可以将 `WebResponse`
    更新为一个顶级类，该类对响应体的类型或内容一无所知。然后，`WebResponse` 的子类可以实现你想要支持的不同响应体类型。


    ### 多种响应类型


    为了支持多种响应类型，顶级的 `WebResponse` 将是一个*密封类*。密封类是一个*抽象*类，意味着你不能直接创建它的实例，并且它可以包含所有子类必须实现的抽象属性。它也是*密封*的，这意味着
    Kotlin 类型系统在编译时就知道所有已定义的子类。这使得 Kotlin 可以将密封类视为枚举，这样你就可以在编译时获得帮助，例如确保在之后编写将 `WebResponse`
    映射到 Ktor 的代码时，不会忘记处理 `WebResponse` 的所有子类。


    如果你想了解更多关于密封类的信息，Kotlin 文档有一个专门介绍密封类的页面（[`https://kotlinlang.org/docs/sealed-classes.xhtml`](https://kotlinlang.org/docs/sealed-classes.xhtml)）。


    在本章中，你将编写两个子类：`TextWebResponse` 和 `JsonWebResponse`。清单 4-1 展示了这两个子类，以及一个没有 `body`
    属性的、作为密封类的 `WebResponse` 新实现。


    ```

    sealed class WebResponse {

    abstract val statusCode: Int

    abstract val headers: Map>

    }

    data class TextWebResponse(

    val body: String,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse()

    data class JsonWebResponse(

    val body: Any?,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse()

    清单 4-1

    两个具体类，TextWebResponse 和 JsonWebResponse，你将用它们来表示 HTTP 响应

    ```


    你需要一些样板代码才能使其工作。Kotlin 中的数据类并不“智能”，因此你必须指定可以传递给它们的所有属性——你不能通过类继承来设置它们。你需要设置默认的状态码
    200，以及默认的空标头列表。


    `TextWebResponse` 定义了一个类型为 `String` 的 body 属性。当你创建基于文本的 HTTP 响应时，你真正需要定义的就是内容是一个任意的文本字符串，仅此而已。


    `JsonWebResponse` 定义了一个类型为 `Any?` 的 body 属性。你可以增强它，创建像 `JsonMapWebResponse` 和
    `JsonListWebResponse` 这样具有更具体类型的类。但归根结底，大多数 JSON 序列化库不会在类型系统中编码 JSON 值类型，而是将输入编码为
    `Object!` 或 `Any?`，如果你传递给它一个无法进行 JSON 编码的值，则会在运行时抛出错误。因此，定义 JSON 体的确切值类型不会给你带来任何实际好处。


    创建响应类的实例就像创建任何数据类的实例一样。清单 4-2 展示了一些如何创建 `WebResponse` 实例的示例。


    ```

    TextWebResponse("Hello, World!")

    TextWebResponse("Oh noes", statusCode = 400)

    JsonWebResponse(mapOf("foo" to "bar"))

    JsonWebResponse(listOf(1, 2, 3), headers = mapOf(

    "Set-Cookie" to listOf("myCookie=123abc")

    ))

    清单 4-2

    TextWebResponse 和 JsonWebResponse 类的有效响应类型

    ```


    你现在已经具备了在 Web 处理器中表示 HTTP 响应的基础知识，并且与 Ktor 没有任何耦合。

