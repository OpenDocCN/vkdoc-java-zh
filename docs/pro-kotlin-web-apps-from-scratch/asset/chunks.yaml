- fmt: '### Map `JsonWebResponse`


    Mapping `JsonWebResponse` requires a few extra steps compared with mapping `TextWebResponse`.
    You need to add a third-party JSON serializer (something that takes data and writes
    JSON strings), and you need to add an implementation of the Ktor interface `OutgoingContent`
    to map a string containing JSON to Ktor.


    There are many JSON serializers available. For this book, you’ll use Gson, a Java
    library made by Google. Gson is one of the fastest JSON libraries out there ([`www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/`](http://www.overops.com/blog/the-ultimate-json-library-json-simple-vs-gson-vs-jackson-vs-json/)).
    It’s also easy to use it in a data-oriented style, so that you don’t have to create
    mapping classes and annotations to use it, which some other JSON libraries on
    the Java platform require. It works with plain lists and maps for serializing
    data and for parsing JSON in later chapters.


    Add Gson as a dependency by adding the following to the `dependencies` block of
    `build.gradle.kts`:


    ```

    implementation("com.google.code.gson:gson:2.10")

    ```


    Next, you’ll need an `OutgoingContent` implementation, as seen in Listing [4-13](#531928_1_En_4_Chapter.xhtml#PC23),
    which takes your JSON content from `JsonWebResponse` and maps it to Ktor.


    ```

    import com.google.gson.Gson

    class KtorJsonWebResponse (

    val body: Any?,

    override val status: HttpStatusCode = HttpStatusCode.OK

    ) : OutgoingContent.ByteArrayContent() {

    override val contentType: ContentType =

    ContentType.Application.Json.withCharset(Charsets.UTF_8)

    override fun bytes() = Gson().toJson(body).toByteArray(

    Charsets.UTF_8

    )

    }

    Listing 4-13

    An implementation of OutgoingContent for JSON serialization in Ktor

    ```


    This new class `KtorJsonWebResponse` takes the JSON data in `body` and an optional
    status code in `status` and maps them all to Ktor by overriding key functions
    in `OutgoingContent`. You can make it more flexible if you want, by enhancing
    it to pass in your own `ContentType` instance that lets you choose other content
    types and charsets. But for most cases, it should be enough to be able to hard-code
    it to the default `application/json` and a hard-coded encoding (UTF-8 in this
    case).


    Finally, you need to use an instance of `KtorJsonWebResponse` in your implementation
    of `webResponse`, where currently you’re only handling `TextWebResponse`. Listing
    [4-14](#531928_1_En_4_Chapter.xhtml#PC24) shows an updated `when` statement from
    `webResponse`, where you handle both `JsonWebResponse` and `TextWebResponse`.


    ```

    when (resp) {

    is TextWebResponse -> {

    call.respondText(

    text = resp.body,

    status = statusCode

    )

    }

    is JsonWebResponse -> {

    call.respond(KtorJsonWebResponse (

    body = resp.body,

    status = statusCode

    ))

    }

    }

    Listing 4-14

    Handle both TextWebResponse and JsonWebResponse inside the when statement in webResponse

    ```


    The meat of the mapping resides inside `KtorJsonWebResponse`, so all you need
    to do is to add a case in the `when` statement for `JsonWebResponse` and pass
    an instance of `KtorJsonWebResponse` to `call.respond`.


    ### Using the New Mapping


    You have now fully mapped `WebResponse` to Ktor, and you can start using it in
    your handlers.


    Currently, you only have one route: a GET to `/` returns a plain text response
    that says “Hello, World!” This route uses the Ktor API directly. You can change
    it to use `WebResponse` instead. Listing [4-15](#531928_1_En_4_Chapter.xhtml#PC25)
    shows how to do this, as it also shows how you can add some extra routes while
    you’re at it.


    ```

    get("/", webResponse {

    TextWebResponse("Hello, world!")

    })

    get("/param_test", webResponse {

    TextWebResponse(

    "The param is: ${call.request.queryParameters["foo"]}"

    )

    })

    get("/json_test", webResponse {

    JsonWebResponse(mapOf("foo" to "bar"))

    })

    get("/json_test_with_header", webResponse {

    JsonWebResponse(mapOf("foo" to "bar"))

    .header("X-Test-Header", "Just a test!")

    })

    Listing 4-15

    Add routes to Ktor using WebResponse, inside the routing block of your Ktor application

    ```


    Start your application and try to open all the new paths and see what happens!


    ## A Note on Overengineering


    There’s a lot of handling of various edge cases in this stand-alone representation
    of HTTP responses. Do you really need all this extra code?


    I’ve never actually done something like this in real-world web apps. This is because
    I’ve never written a web app that runs both on Ktor and in a serverless environment.
    I have done rewrites where I switched from one web framework to another. But you
    don’t need to abstract away your web framework up front to make rewrites possible
    – you can just do the rewrite, like any other rewrite. I’m not a fan of using
    an abstraction solely to ease potential rewrites later in the project.


    In the context of this book, the abstraction makes sense, as I want to show you
    later how you can easily replace Ktor with Jersey and others and how to run your
    handlers in a serverless environment. This is almost trivial to do when you have
    `WebResponse` between your business logic and the web routing library.


    Additionally, `WebResponse` isn’t all that complex. And I personally prefer my
    web handlers to be functional in style, which `WebResponse` is. So I think the
    trade-off is worth it. The next time I create a Kotlin web app from scratch, I’ll
    probably introduce something like `WebResponse` to the code base, just because
    I like the functional style of it.


    But it''s all this handling of all kinds of use cases that you may or may not
    use that makes frameworks so big and complicated. `WebResponse` is just a micro
    example of this issue. A framework needs to handle hundreds of thousands of cases
    like this and provide APIs and interfaces to allow for all of them, in any combination.
    Frameworks must therefore contain mountains of abstractions and code that you
    won’t ever need, and in turn this is what makes frameworks unapproachable as a
    unit in your system. If something goes wrong in the framework you use, you must
    dig deep into the caves of Mount Framework that contains hundreds of thousands
    of lines of code and multiple layers of abstraction, which can be a daunting task,
    to say the least.


    This, of course, is also the value of frameworks. There’s already a solution available
    to you in the framework when you need to do something. And having a standardized
    way of doing things makes it easier to work on different code bases, where they
    all do things the same way, following framework conventions.


    All abstractions have a cost. I think `WebResponse` is worth it. But be careful.
    Don’t abstract away a library just for the sake of abstracting away a library.


    # Part II: Libraries and Solutions


    # 5. Connecting to and Migrating SQL Databases


    Your web app needs somewhere to store and read data. By far the most common place
    to do that is in a SQL database. This chapter goes through all the wiring you
    need to connect to your database with a connection pool, how to set up the initial
    schema, and how to maintain changes to your database schema over time, as requirements
    inevitably change.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    - Closing and cleaning up resources with `use`

    - `AutoCloseable` and `Closeable` objects

    - Avoiding intermediate variables with `also`

    - Using functions as lambdas with function references


    Also in this chapter, you will learn the following about migrating and querying
    SQL databases:


    - Using Flyway to manage the initial schema and schema changes over time

    - Using JDBC connection pools to connect to the SQL database

    - Generating seed data for pre-populating your database with required data


    In Chapter [6](#531928_1_En_6_Chapter.xhtml), you’ll learn more about executing
    queries against your database.'
