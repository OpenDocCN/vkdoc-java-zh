    }

    Listing 12-1

    Setting up MainServerless.kt with basic AWS Lambda handlers

    ```


    Your AWS Lambda handler class implements the `RequestHandler` interface and returns
    a `String` with JSON content. AWS Lambda itself does not do any validation of
    its output. The JSON format you use in `GetTestHelloWorld` is the format that
