- fmt: '### Kotlin vs. KotlinX


    To avoid confusion, I’ve deliberately been sloppy with the terminology so far.
    There are actually two types of coroutines in Kotlin: the built-in `kotlin.coroutines`
    and the library `kotlinx.coroutines` that is not in the standard library and needs
    to be added as a dependency in `build.gradle.kts`.


    The coroutines you’ve written so far are `kotlinx.coroutines`. You didn’t add
    a dependency to that library in your `build.gradle.kts`, but you don’t need to.
    Ktor adds that dependency transitively, and you can use the version of `kotlinx.coroutines`
    that comes bundled with Ktor from your own code as well.


    `kotlinx.coroutines` builds on the built-in and low-level `kotlin.coroutines`.
    The low-level `kotlin.coroutines` library is what is part of the core language
    syntax and adds the keyword `suspend` to functions and causes compile errors when
    you try to call a `suspend` function from a non-coroutine context. A `suspend`
    function returns a *continuation,* which is a built-in state machine that the
    Kotlin runtime has intimate knowledge of. Kotlin leverages continuation suspend
    functions to be able to run code until it encounters a suspension point and later
    use the continuation to continue execution at that same suspension point.


    ### Comparing with Arrow


    Parallelization with `kotlinx.coroutines` is just one of the uses of `kotlin.coroutines`
    and continuations in Kotlin. Another prominent use of continuations is the Arrow
    library.


    You’ll use Arrow to learn more about coroutines in this chapter, but you’ll also
    use it to validate data in later chapters. So add it as a dependency to `build.gradle.kts`:


    ```

    implementation("io.arrow-kt:arrow-fx-coroutines:1.1.2")

    implementation("io.arrow-kt:arrow-fx-stm:1.1.2")

    ```


    Arrow enables sophisticated functional programming constructs, like what you can
    find in languages such as Scala and Haskell. Arrow does *not* use coroutines and
    continuations to allow for asynchronous programming and parallelization of service
    calls. Instead, Arrow uses them to implement deep non-tail recursion, computational
    DSLs like the `Either` and `Effect`, and more.


    Explaining monadic functional programming with strong types using Arrow is outside
    of the scope of this book. But Arrow provides a good ground for demonstrating
    how useful continuations are to library developers.


    One of the many features Arrow provides is completely functional error handling.
    Instead of throwing an exception to interrupt the flow of execution when an error
    happens, Arrow uses `kotlin.coroutines` and continuations to short-circuit the
    execution of your code so that the code after the error doesn’t run. Listing [8-10](#531928_1_En_8_Chapter.xhtml#PC13)
    shows a full example of how to do this type of data validation with Arrow.


    ```

    data class ValidationError(val error: String) {}

    data class MyUser(val email: String, val password: String)

    fun validateEmail(email: Any?): Either {

    if (email !is String) {

    return ValidationError("E-mail must be set").left()

    }

    if (!email.contains("@")) {

    return ValidationError("Invalid e-mail").left()

    }

    return email.right()

    }

    fun validatePassword(password: Any?): Either {

    if (password !is String) {

    return ValidationError("Password must be set").left()

    }

    if (password == "1234") {

    return ValidationError("Insecure password").left()

    }

    return password.right()

    }

    suspend fun signUpUser(

    email: String,

    password: String

    ): Either =

    either {

    val validEmail = validateEmail(email).bind()

    val validPassword = validatePassword(password).bind()

    MyUser(

    email = validEmail,

    password = validPassword

    )

    }

    Listing 8-10

    Using Arrow to write functional error handling

    ```


    The magic happens in the `either` block in `signUpUser`. `validateEmail` and `validatePassword`
    both have the return type `Either<ValidationError, MyUser>`, and `left()` and
    `right()` are extension functions that resolve to either (pun intended) the left
    or the right side of the `Either`. When you call `bind()` on the `Either` instance,
    you enable the short-circuiting. If the `Either` returns a left value, Arrow short-circuits
    using a continuation under the hood and stops execution of the `either` block.
    It also returns that left value where execution was short-circuited. On the other
    hand (pun also intended), if it returns a right value, that value is bound to
    the statement, and execution continues to the next line.


    To extract the actual value from an `Either`, you can use `fold`, which calls
    separate lambdas depending on the result. Listing [8-11](#531928_1_En_8_Chapter.xhtml#PC14)
    demonstrates the output of a few different calls to `signUpUser()`.


    ```

    signUpUser("foo@bar.com", "test")

    .fold({ err -> println(err)}, { user -> println(user)})

    // MyUser(email=foo@bar.com, password=test)

    signUpUser("foo", "test")

    .fold({ err -> println(err)}, { user -> println(user)})

    // ValidationError(error=Invalid e-mail)

    signUpUser("foo@bar.com", "1234")

    .fold({ err -> println(err)}, { user -> println(user)})

    // ValidationError(error=Insecure password)

    Listing 8-11

    Using fold to extract values from Either

    ```


    By leveraging low-level Kotlin continuations, Arrow can control the execution
    of the code and halt and continue execution as it sees fit, at any point where
    Arrow sees fit in their APIs.


    ### Using Low-Level Continuations


    To further demonstrate what `kotlinx.coroutines` and Arrow do under the hood,
    you can directly invoke the lowest-level coroutine and continuation APIs in Kotlin.


    The `kotlin.coroutines` APIs are public, stable, and documented, and you can use
    them to build powerful language extensions. They are typically not useful for
    writing web apps and are better suited for authors of third-party Kotlin libraries.
    But it’s nice to know what goes on under the hood. Listing [8-12](#531928_1_En_8_Chapter.xhtml#PC15)
    shows an example of using the raw low-level continuation APIs in `kotlin.coroutines`
    to manually manage suspension and execution of code.


    ```

    import kotlin.coroutines.intrinsics.*

    suspend fun haltHere() =

    suspendCoroutineUninterceptedOrReturn { cont ->

    COROUTINE_SUSPENDED

    }

    fun createContinuation(): suspend () -> Unit {

    return {

    println("a")

    haltHere()

    println("b")

    println("c")

    haltHere()

    println("d")

    }

    }

    val cont = createContinuation()

    .createCoroutineUnintercepted(

    Continuation(EmptyCoroutineContext, {}))

    cont.resume(Unit)

    // a

    cont.resume(Unit)

    // b

    // c

    cont.resume(Unit)

    // d

    cont.resume(Unit)

    // d

    Listing 8-12

    Using low-level continuations to control execution of code

    ```


    Notice how the first call to resume the continuation prints “a”, but nothing else.
    That’s because `haltHere` uses the low-level continuation APIs to indicate to
    Kotlin that it should suspend execution at this point. After you’ve executed this
    first step, it’s completely optional to continue execution of the coroutine.


    When you invoke `cont.resume(Unit)` for the second time, the second part of the
    code runs, and it prints “b” and “c”. Then, simply by the way continuations function
    in Kotlin, any further invocations of the coroutine repeat the last step and cause
    it to print “d” again and again.


    At the end of the day, there is no magic going on. All the perceived magic comes
    from the `suspend` keyword. Kotlin compiles the body of `suspend` functions into
    a state machine that contains the code and a return with a state machine flag
    at any point where suspension can occur (i.e., a call to another suspend function).'
