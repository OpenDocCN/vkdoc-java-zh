    \ you create a `WebappConfig` data class, and you mask out secrets when printing.\
    \ Now, all you need to do is to perform the logging.\n\nListing [3-14](#531928_1_En_3_Chapter.xhtml#PC19)\
    \ shows the final version of how this might look in your web app.\n\n```\nval\
    \ config = createAppConfig(env)\nval secretsRegex = \"password|secret|key\"\n\
    \    .toRegex(RegexOption.IGNORE_CASE)\nlog.debug(\"Configuration loaded successfully:\
    \ ${\n    WebappConfig::class.declaredMemberProperties\n        .sortedBy { it.name\
    \ }\n        .map {\n            if (secretsRegex.containsMatchIn(it.name)) {\n\
    \                \"${it.name} = ${it.get(config).toString().take(2)}*****\"\n\
    \            } else {\n                \"${it.name} = ${it.get(config)}\"\n  \
    \          }\n        }\n        .joinToString(separator = \"\\n\")\n}\")\nembeddedServer(Netty,\
    \ port = config.httpPort) {\n    // ...your existing code here\nListing 3-14\n\
    A full working example of loading, logging, and using a configuration file\n```\n\
    \nAnd that’s it! You now have a full-fledged setup for reading config files, having\
    \ different configurations for different environments, and printing your config\
    \ on startup with secrets masked out.\n\n# 4. Decoupling Web Handlers from Specific\
    \ Libraries\n\nAs your application grows, you’ll have hundreds or even thousands\
    \ of individual web handlers, for different combinations of HTTP verbs and URL\
    \ paths. The purpose of these handlers is to run different pieces of business\
    \ logic. In this chapter, you’ll learn how to uncouple your business logic and\
    \ web handlers from Ktor, so that you can use them in any context.\n\nIn later\
    \ chapters, you’ll run your web handlers in many different environments, not just\
    \ Ktor. Uncoupling your web handlers from Ktor is a requirement to make that possible.\
    \ For example, you’ll see how to run the same web handlers you use in Ktor from\
    \ a serverless environment in Chapter [10](#531928_1_En_10_Chapter.xhtml).\n\n\
    The implementation of the decoupling itself also serves as a nice opportunity\
    \ to learn some important concepts about the Kotlin language.\n\nBe aware, though.\
    \ I would be careful with implementing this kind of decoupling in a real-world\
    \ web app. It introduces complexity and abstraction. It’s unlikely that your real-world\
    \ web apps need to support multiple simultaneous libraries and/or deployment scenarios.\
    \ So be careful, and exercise good judgment.\n\nIf you’re new to Kotlin, here\
    \ are some language features that you’ll see examples of in this chapter:\n\n\
    - Sealed classes with abstract properties and functions\n- Function overloading\n\
    - Functional data-driven programming with maps and lists\n- Copying data classes\n\
    - Immutability\n- Destructuring assignments\n- Function types\n- Extension functions\n\
    \nAlso in this chapter, you will learn the following about decoupling web handlers\
    \ from specific libraries in your web app:\n\n- Creating abstractions and connecting\
    \ them to libraries\n- Why you should consider *not* decoupling your web handlers\
    \ in real-world web apps\n\nIn addition to learning how to deploy your web handlers\
    \ in a serverless environment in Chapter [12](#531928_1_En_12_Chapter.xhtml),\
    \ Appendix A will teach you how to replace Ktor with Jersey.\n\n## Your Own HTTP\
    \ Response Abstraction\n\nSo far, you’ve responded to HTTP requests by calling\
    \ methods directly on the Ktor `call` API. To decouple from Ktor, you’ll need\
    \ to create your own abstraction that doesn’t know anything about Ktor and `call`.\
    \ You’ll update all your web handlers to use your own abstraction, to make them\
    \ independent and decoupled from Ktor.\n\n### Representing HTTP Responses\n\n\
    Ktor has a rich API to represent HTTP responses. Your own abstraction also needs\
    \ to be able to represent any HTTP response, just like Ktor. Thankfully, you can\
    \ boil down a HTTP response to a simple structure: a status code, some headers,\
    \ and a response body.\n\nYou can represent HTTP response data using a simple\
    \ data class:\n\n```\ndata class WebResponse(\n    val statusCode: Int,\n    val\
    \ headers: Map<String, List<String>>,\n    val body: Any\n)\n```\n\nYou’ll expand\
    \ heavily on this data class throughout this chapter. For example, the type `Any`\
    \ works, and it can be used to represent any (pun intended) HTTP response body.\
    \ But it blocks the type system from having any (pun also intended) knowledge\
    \ of the contents of the HTTP response. Kotlin has a rich and powerful type system,\
    \ so you should avoid the type `Any` as much as you can.\n\nInstead, you can alter\
    \ `WebResponse` to take advantage of the fact that you can represent the status\
    \ code and headers the same way for all your HTTP responses. You can update `WebResponse`\
    \ to be a top-level class that doesn’t know anything about the type or contents\
    \ of the response body. Then, subclasses of `WebResponse` can implement the different\
    \ body types you want to support.\n\n### Multiple Response Types\n\nTo support\
    \ multiple response types, the top-level `WebResponse` will be a *sealed class*.\
    \ A sealed class is an *abstract* class, meaning you can’t create direct instances\
    \ of it, and it can contain abstract properties that all the subclasses have to\
    \ implement. It’s also *sealed*, which means that the Kotlin type system knows\
    \ about all the defined subclasses at compile time. This lets Kotlin treat sealed\
    \ classes like enums, so that you can get help compile-time with things like ensuring\
    \ that you don’t forget to handle all your subclasses of `WebResponse` when you\
    \ later write code that maps `WebResponse` to Ktor.\n\nThe Kotlin documentation\
    \ has a page dedicated to sealed classes ([`https://kotlinlang.org/docs/sealed-classes.xhtml`](https://kotlinlang.org/docs/sealed-classes.xhtml))\
    \ if you want to read more about them.\n\nFor this chapter, you’ll write two child\
    \ classes: `TextWebResponse` and `JsonWebResponse`. Listing [4-1](#531928_1_En_4_Chapter.xhtml#PC2)\
    \ shows both, alongside a new implementation of `WebResponse` as a sealed class\
    \ without the `body` property.\n\n```\nsealed class WebResponse {\n    abstract\
    \ val statusCode: Int\n    abstract val headers: Map<String, List<String>>\n}\n\
    \ndata class TextWebResponse(\n    val body: String,\n    override val statusCode:\
    \ Int = 200,\n    override val headers: Map<String, List<String>> = mapOf()\n\
    ) : WebResponse()\n\ndata class JsonWebResponse(\n    val body: Any?,\n    override\
    \ val statusCode: Int = 200,\n    override val headers: Map<String, List<String>>\
    \ = mapOf()\n) : WebResponse()\nListing 4-1\nTwo concrete classes, TextWebResponse\
    \ and JsonWebResponse, that you’ll use to represent HTTP responses\n```\n\nYou\
    \ need a little bit of boilerplate to make it work. Data classes in Kotlin aren’t\
    \ “smart,” so you must specify all the properties you can pass to them – you can’t\
    \ set them via class inheritance. You need to set default status code of 200,\
    \ as well as the default empty list of headers.\n\n`TextWebResponse` defines a\
    \ body property with the type `String`. When you create text-based HTTP responses,\
    \ all you really need to define is that the content is an arbitrary string of\
    \ text, and that’s about it.\n\n`JsonWebResponse` defines a body property with\
    \ the type `Any?`. You could enhance this and create something like `JsonMapWebResponse`\
    \ and `JsonListWebResponse`, with more specific types. But at the end of the day,\
    \ most JSON serialization libraries don’t encode JSON value types in the type\
    \ system and encode the input as `Object!` or `Any?` anyway, opting to throw errors\
    \ runtime if you pass it a value that can’t be JSON encoded. So defining the exact\
    \ value type of the JSON body won’t net you any practical benefits.\n\nYou create\
    \ instances of your response classes just like you create instances of any data\
    \ class. Listing [4-2](#531928_1_En_4_Chapter.xhtml#PC3) shows some examples of\
    \ how you can create `WebResponse` instances.\n\n```\nTextWebResponse(\"Hello,\
    \ World!\")\nTextWebResponse(\"Oh noes\", statusCode = 400)\nJsonWebResponse(mapOf(\"\
    foo\" to \"bar\"))\nJsonWebResponse(listOf(1, 2, 3), headers = mapOf(\n    \"\
    Set-Cookie\" to listOf(\"myCookie=123abc\")\n))\nListing 4-2\nValid response types\
    \ of your TextWebResponse and JsonWebResponse classes\n```\n\nYou now have the\
    \ basics in place for representing HTTP responses in your web handlers, without\
    \ any coupling to Ktor."
