  trans: '

    ### 构建 Docker 镜像


    为将在服务器上运行的任何软件打包的标准方法是构建 Docker 镜像，其中包含你的 Web 应用 JAR 文件以及所有运行时依赖项。


    像 Docker (*/*[*www.docker.com/*](http://www.docker.com/)) 这样的容器的好处在于，它们包含了绝对所有内容，从你使用的操作系统，到
    Java 运行时的确切版本，再到用于启动 Web 应用的确切 `java` 命令。此外，几乎所有现有的生产环境都以某种形式支持 Docker 镜像。因此，无论你使用哪种生产环境，将
    Web 应用打包到 Docker 镜像中都应该能正常工作。


    Docker 镜像的核心是 *Dockerfile*。这是一个规范文件，它告诉 Docker 如何构建你的容器镜像，以及如何启动运行你已打包的软件。清单 11-1
    展示了如何为你的 Web 应用编写一个 *Dockerfile*。


    ```

    FROM amazoncorretto:17.0.4

    RUN mkdir /app

    COPY build/libs/kotlinbook-1.0-SNAPSHOT-all.jar /app/

    CMD exec java -jar /app/kotlinbook-1.0-SNAPSHOT-all.jar

    清单 11-1

    你的 Web 应用的 Dockerfile

    ```


    就是这样。第一行指定了你要继承哪个 Docker 镜像。`amazoncoretto:17.0.4` 是亚马逊团队提供的一个镜像，它包含一个完整的 Linux
    发行版，并预装了 Java 17 Corretto，与你用来运行本书中编写的代码的 Java 版本相同。你可以在 Docker Hub 上 `amazoncoretto`
    镜像的页面 [*https://hub.docker.com/_/amazoncorretto*](https://hub.docker.com/_/amazoncorretto)
    查看所有可用的 Amazon Corretto Java 版本。


    还有许多其他可用的 Docker 基础镜像，你可以根据不同的 Java 版本和构建版本选择使用。例如，Azure 和 Microsoft 提供的 Zulu
    Java 发行版可在 [*https://hub.docker.com/r/azul/zulu-openjdk*](https://hub.docker.com/r/azul/zulu-openjdk)
    获取。Open JDK 基于 Alpine Linux 的镜像（[*https://hub.docker.com/_/openjdk*](https://hub.docker.com/_/openjdk)）曾经是热门选择，但你应该避免使用它们，因为
    Open JDK 已弃用其自有镜像，并且不会发布任何更新。现在还有其他与供应商无关的替代方案，例如 Eclipse Temurin 构建版本（[*https://hub.docker.com/_/eclipse-temurin*](https://hub.docker.com/_/eclipse-temurin)）。


    你设置 Docker 镜像来创建一个名为 */app* 的文件夹，并将你使用 `shadowJar` 构建的 fat jar 从你的机器复制到 Docker
    镜像容器中。然后，你使用 `CMD` 来精确指定如何加载你的 Web 应用。你也可以使用 `CMD` 为 Java 命令指定额外的标志，例如配置内存限制、使用哪个垃圾回收器、JMX
    设置等标志。


    要构建 Docker 镜像，请运行 `docker build`：


    ```

    docker build -f Dockerfile -t kotlinbook:latest .

    ```


    这会将一个 Docker 镜像构建到本地 Docker 仓库中。`-f` 指定了 *Dockerfile* 的路径。`-t` 指定了标签。你可以根据需要设置任意数量的标签。按照惯例，`myimagename:latest`
    用于指向名为 `myimagename` 的镜像的最新版本，因此你应该始终包含该标签。最后，`.` 指向工作目录，`docker build` 通过它知道在哪里找到你告诉它要
    `COPY` 的文件。


    请注意，随着你的应用程序增长，并且你的 Docker 构建命令开始花费太长时间，你可以将 Docker 镜像拆分为多个层。例如，你可以将外部依赖项放在一个层中，将自己的代码放在另一个层中。这样，你的生产环境就不必在每次部署最新版本时重新下载你的第三方依赖项，因为该层没有变化，并且已经缓存在生产服务器上。在我实际的
    Web 应用开发中，我还没有遇到过需要这样做的情况，但无论如何都值得提及。如果你需要创建分层 Docker 镜像，可以考虑使用 Google 的 Jib 等工具（[*https://github.com/GoogleContainerTools/jib*](https://github.com/GoogleContainerTools/jib)）来代替
    Shadow 插件。


    ### 在本地运行 Docker 镜像


    当你构建好一个 Docker 镜像后，你可以轻松地在自己的机器上运行它。


    要运行你刚刚构建的 Docker 镜像，请使用以下命令：


    ```

    docker run -p 9000:4207 --name kotlinbook kotlinbook:latest

    ```


    `-p` 标志指定了端口映射。这里，你指定希望将你机器上的端口 9000 绑定到 Docker 镜像内部的端口 4207。然后，你将正在运行的 Docker
    镜像命名为 `kotlinbook`。而你想要运行的 Docker 镜像是 `kotlinbook:latest`，它引用了你之前在 `docker build`
    构建镜像时使用的标签。


    当你运行此命令时，你将看到 Docker 镜像执行的 Java -jar 命令的所有控制台输出。如果你在浏览器中打开 *http://localhost:9000*，你将看到你的
    Web 应用正在运行！


    就像你之前使用 `java -jar` 直接在机器上运行它一样，你的 Web 应用会以默认模式启动，即本地环境模式，这会导致它加载 *app-local.conf*
    中的开发默认配置值。


    你也可以向 `docker run` 传递额外的 `-d` 标志，让 Docker 在后台运行镜像，而不是占用整个终端并显示所有日志输出。


    如果你想重建并重新运行你的 Docker 镜像，你需要先通过运行以下命令来移除名为 `kotlinbook` 的镜像：


    ```

    docker rm -f kotlinbook

    ```


    如果你尝试再次运行 `docker run` 而没有先移除 `kotlinbook` 镜像，你将收到一条错误消息，提示名为 `kotlinbook` 的镜像已存在。

    '
- fmt: '### Deploying to Production


    When you have a Docker image that you can run, the next step is to use that Docker
    image and run it in production.


    Explaining how to set up a fully working production environment is outside of
    the scope of this book. Instead, I’ll give you a general overview of the pieces
    you need that are common to all production environments.


    The most common way to run Docker images in production on your own servers is
    to use Docker Swarm ([*https://dockerswarm.rocks/*](https://dockerswarm.rocks/)),
    Kubernetes ([*https://kubernetes.io/*](https://kubernetes.io/)), or Apache Mesos
    ([*https://mesos.apache.org/*](https://mesos.apache.org/)). All these solutions
    can run multiple instances in parallel, with load balancers in front that direct
    traffic dynamically to your multiple instances, automatically kill unhealthy instances,
    and so on.


    You need to set a collection of environment variables for your production setup.
    You’ll need to set `KOTLINBOOK_ENV` to `production` so that your web app loads
    the environment variable–based *app-production.conf* setup. You can set `KOTLINBOOK_HTTP_PORT`,
    if you want to use a different HTTP port than the default `4207` from *app.conf*.
    Then, you’ll need to update *app-production.conf* so that it points to environment
    variables for all your config properties, instead of pointing to the default null
    values in *app.conf*. For example, `dbUrl` should point to an environment variable
    like `KOTLINBOOK_DB_URL`, `dbPassword` should point to `KOTLINBOOK_DB_PASSWORD`,
    and so on.


    You also need some way of setting environment variables and managing secrets.
    If you use Kubernetes, you can use Helm and Helm Secrets ([*https://github.com/jkroepke/helm-secrets*](https://github.com/jkroepke/helm-secrets))
    to encrypt secrets at rest and manage environment variables in your Kubernetes
    cluster.


    You’ll also need a Docker image registry. For example, if you use managed Kubernetes
    on Azure, you’ll get access to a managed registry at *myapp.azurecr.io*. When
    you build Docker images that you’ll deploy in Kubernetes, you’ll run `docker push
    kotlinbook:latest`, where the name `kotlinbook:latest` refers to a tag that you
    assigned when you ran `docker build`. You’ll then configure your Kubernetes cluster
    to pull images from the Azure container registry at *myapp.azurecr.io* and always
    deploy the tag `kotlinbook:latest` when you run `kubectl rollout restart` to recreate
    your running pods.


    If you don’t need a multi-node cluster setup, you can also use Docker to run a
    single instance of an image on a single virtual or physical server. If you SSH
    into your server and start up your Docker image using the command `docker run
    –restart=always -d kotlinbook`, Docker will automatically start your Docker image
    when your server reboots. This also restarts if the `java -jar` process you start
    with the `CMD` in your *Dockerfile* crashes.


    # Building and Deploying to Serverless Environments


    In this chapter, you’ll learn how to take your existing handlers that you currently
    run in Ktor and invoke them in a serverless environment, without Ktor.


    In this chapter, you’ll learn the following about building and deploying to a
    serverless environment:


    - Setting Java runtime flags to optimize startup time

    - Intricate details about the Java runtime class loading and performance characteristics

    - How AWS Lambda executes your code

    - Important cost-saving tips in serverless environments


    An important disclaimer about this whole chapter is that I have extensive experience
    with serverless architectures using AWS and Node.js. And I have extensive experience
    with running Java platform web apps in production. But I’ve never actually deployed
    a Java-based web app to a serverless environment. So keep that in mind, and use
    this chapter as a guide to get started and not distilled advice from a seasoned
    Java + serverless expert.


    ## Detaching Your Code


    When you run your code in a serverless environment, you won’t be using Ktor at
    all. How will that work, seeing how the preceding chapters in this book are all
    about setting up various aspects of Ktor to make your web app do what it’s supposed
    to?


    ### Separating Handlers from Ktor


    So far in this book you’ve written most of your web handlers with the Ktor-specific
    route definition and the actual implementation of that web handler in the same
    block of code:


    ```

    get("/foo", webResponse {

    // Do something ...

    JsonWebResponse(mapOf("success" to true))

    })

    ```


    There’s one notable exception, though. In Chapter 8, you wrote `handleCoroutineTest`
    as a standalone function that you call from a Ktor handler:


    ```

    get("/coroutine_test", webResponseDb(dataSource) { dbSess ->

    handleCoroutineTest(dbSess)

    })

    suspend fun handleCoroutineTest(

    dbSess: Session

    ) = coroutineScope {

    // ...

    TextWebResponse("...")

    }

    ```


    In a real-world web app, you’ll separate most of your web handlers into separate
    functions.


    This book has purposefully glossed over code organization, and in addition to
    not separating the route definition from the handler implementation, you’ve written
    everything inside one huge and unorganized `Main.kt` file. That’s fine for a book,
    where the main goal is to avoid the friction and confusion induced by trying to
    textually explain which file should contain what. But when you write your own
    web apps, you should split your code between multiple files.'
