  trans: '

    ### GraalVM、Kotlin/JS 与 Kotlin Native


    提升 Java 平台 AWS Lambda 处理程序冷启动性能的另一种方法是使用 GraalVM 编译 Java 平台代码，或者使用 Kotlin 编译器的
    JS 和 Native 输出选项。


    GraalVM（*/*[*www.graalvm.org/*](http://www.graalvm.org/)）是一种替代性 Java 编译器，它将 Java
    字节码（以及扩展的 Kotlin）编译为原生可执行文件。这意味着你不会产生任何运行时开销，代码可以立即开始执行，无需等待 Java 运行时加载。使用 GraalVM
    需要注意的一个权衡是编译时间会增加，这很合理，因为 GraalVM 将 Java 运行时的大量工作转移到了自身的编译时。


    Kotlin 也可以直接开箱即用地编译为 JavaScript 和原生代码。以 Node.js 作为运行时的 JavaScript 非常适合无服务器环境，因为
    Node.js 针对快速启动时间进行了超优化，这将导致冷启动速度大大加快。


    有两个原因导致我不会在本书中向你展示如何做到这一点。


    首先，我自己从未做过这件事。我或许可以在谷歌搜索和研究之后，写出一段还算可用的关于 GraalVM 的内容，但我希望本书尽可能多地涉及我在真实场景中实际做过的事情。正如我在引言中提到的，本章在这方面已经处于边缘地带。而使用
    GraalVM 编译和运行 Java 平台代码远远超出了我的实际经验范围。Kotlin/JS 和 Kotlin Native 也是如此。我没有任何使用这些
    Kotlin 编译输出目标的经验，所以如果我来教你如何操作，那将是不诚实的。


    其次，在为本书对 GraalVM 进行一些基础研究时，我成功让 `GetTestHelloWorld` 运行了起来，但 `UserEmailSearch`
    在执行时立即崩溃了。问题出在 HikariCP 和 H2 的交互方式上，导致 HikariCP 无法加载 H2 的类，并以 `ClassNotFound`
    异常崩溃。


    如果我要在 AWS Lambda 上使用 Kotlin 搭建一个真实的 Web 应用，我会谨慎引入 GraalVM。你可以让它工作，但一旦你向 Web 应用添加了一个因某种原因与
    GraalVM 不兼容的依赖，整个设置就会崩溃。


    Kotlin/JS 听起来是一个更可行的替代方案。但 Kotlin/JS 出于显而易见的原因，无法调用 Java 依赖。你编写的所有纯 Kotlin 代码都支持
    Kotlin/JS。但你必须将 Gson、HikariCP、Flyway 和 H2 替换为其他东西。令人惊讶的是，大量 Kotlin 代码可以编译为 JavaScript。例如，像
    `Appendable` 和字符串构建器这样的类 Java 结构在 Kotlin/JS 中也可用，因此你用于将 `HtmlWebResponse` 转换为
    `String` 的代码可以正常工作。但我不会对此进行更详细的讨论。Kotlin/JS 专家可能会就如何让 Kotlin 代码在 AWS Lambda 的
    Node.js 运行时中运行提供很好的建议。但我的专长，以及本书的重点，在于 Kotlin 的 Java 平台方面。


    # 13. 使用 Spring Context 进行设置、拆卸与依赖注入


    在本章中，你将学习如何使用 Spring Context 来管理 Web 应用中的资源，并通过依赖注入将组件连接在一起。


    如果你是 Kotlin 新手，以下是本章示例中你将看到的一些语言特性：


    *   使用 `lateinit` 实现空安全

    *   使用 lambda 代替对象字面量


    同样在本章中，你将学习以下关于使用 Spring Context 的知识：


    *   以编程方式创建和配置 Spring Context——无需 XML！

    *   设置懒加载 Bean

    *   初始化 Spring Context 以尽早失败

    *   在关闭时优雅地清理所有资源


    在本章中，你将学习如何使用依赖注入（而非显式初始化）来编写 Web 应用中的资源，使用 Spring Context——这个流行且无处不在的 Java 依赖注入库。


    ## 为什么选择 Spring 和依赖注入？


    有几个 Kotlin 专用的依赖注入库可供你考虑使用，例如 Koin（[*https://insert-koin.io/*](https://insert-koin.io/)）。但在本章中，你将学习如何直接使用
    Java 库 Spring Context。


    Spring Context 是 Spring 框架（[*https://spring.io/projects/spring-framework*](https://spring.io/projects/spring-framework)）的一部分，它既是传统
    Spring MVC 应用的核心组件，也是更现代的 Spring Boot 应用的核心组件。将 Spring Context 作为一个库来使用并不常见，但我在真实的生产级
    Web 应用中多次这样做过，正是因为它对于团队中其他更熟悉框架思维的开发者来说很熟悉。事实上，Spring Context 是 Spring 框架的核心，以至于如果你谷歌搜索
    Spring Context，得到的所有链接都是 Spring 框架本身的文档。


    Spring Context 的主要接口是 `ApplicationContext` 类，你将使用它来手动配置 Spring Bean，它也是 Spring
    Boot（[*https://spring.io/projects/spring-boot*](https://spring.io/projects/spring-boot)）中
    Spring 放置其所有自动配置 Bean 的地方。


    如果你的应用有很多有状态的移动部件，例如队列消费者或基于内存中 `ThreadPoolExecutor` 的数据处理等，那么让 Spring Context
    自动按正确顺序完成所有资源的设置和拆卸工作会很方便。事实上，在框架几乎不存在的 Clojure 语言社区中，人们流行使用 Mount（[*https://github.com/tolitius/mount*](https://github.com/tolitius/mount)）或
    Component（[*https://github.com/stuartsierra/component*](https://github.com/stuartsierra/component)）正是为了这个目的。


    本书选择 Spring Context 的主要原因是为了弥合传统 Spring 框架世界与这里使用的基于库的方法之间的差距。Spring 框架是一个庞大的系统，但本质上由设计良好、边界清晰的库组成。Spring
    Context 就是这样一个库，并且很容易以类似库的方式使用它，这非常适合本书——没有隐式的魔法，除非你调用方法或函数来触发事情，否则什么都不会发生。


    将 Spring Context 置于基于库的 Web 应用的核心，将使代码的设置和感觉对具有 Spring 框架经验的人来说很熟悉。事实上，你可以使用这种方法将整个遗留的
    Spring 框架应用嵌入到基于库的 Kotlin 应用中。我在真实世界的项目中做过这件事。我曾合作过的一个客户对 Java 有严重的过敏反应，没有人愿意碰一个旧的
    Spring 框架代码库。为了帮助解决这个问题，我移除了 Java 代码中所有 Spring Web 特定的部分（在一个原本庞大的代码库中，这只有几行代码），创建了一个
    Clojure 应用（Kotlin 也同样适用），从 Clojure 中连接了 Spring Context（在这种情况下是 `AnnotationConfigApplicationContext`，以支持注解），然后加载了整个
    Java 应用并将其嵌入到基于库的 Clojure 应用中。这样，应用就可以通过移除部分 Java 代码并用 Clojure 重写来逐步重写，而无需对整个
    Java 代码库进行彻底的全面重写。并且，由于应用的主入口点是熟悉的 Clojure 代码，Java 过敏症很快就消失了。

    '
- fmt: "# Setting Up Spring Context\n\nThe first thing you’ll need is Spring Context\
    \ itself. Add it as a dependency to `build.gradle.kts`:\n\n```\nimplementation(\"\
    org.springframework:spring-context:5.3.23\")\n```\n\nYou’ll use Spring Context\
    \ to initialize your web app. To avoid conflicts with your existing code, you’ll\
    \ create a new main file, `MainSpringContext.kt`, to separate your Spring initialization\
    \ from your existing initialization in `Main.kt`. Spring Context will initialize\
    \ the components and resources of your web app in the correct order, based on\
    \ the dependency graph Spring Context detects between them. So you won’t need\
    \ any of the “manual” initialization code already present in `Main.kt`.\n\nAt\
    \ the core of Spring Context is the application context object. This is often\
    \ a resource that’s created via XML config files. But here, you’ll set it up programmatically.\
    \ Listing [13-1](#531928_1_En_13_Chapter.xhtml#PC2) shows how to get the basics\
    \ up and running.\n\n```\nfun createApplicationContext(appConfig: WebappConfig)\
    \ =\nStaticApplicationContext().apply {\n    beanFactory.registerSingleton(\"\
    appConfig\", appConfig)\n    refresh()\n    registerShutdownHook()\n}\nListing\
    \ 13-1\nCreating and initializing Spring Context\n```\n\nThis small snippet demonstrates\
    \ some important concepts in Spring Context.\n\nFirst, there’s the concept of\
    \ *beans*. A bean is Spring’s name of an instance of an object in the world of\
    \ dependency injection. You define the `\"appConfig\"` bean as a “singleton bean,”\
    \ which is Spring lingo for a bean where you provide the instance of the bean,\
    \ instead of telling Spring how to create that instance. You already have a convenient\
    \ function for creating an instance of your app config, so there’s no need to\
    \ wrap that in Spring Context.\n\nYou also call two important methods on the context.\
    \ `refresh()` causes all the beans you define to be instantiated right away, instead\
    \ of being lazily instantiated later. Later, you’ll initialize resources in the\
    \ context, and it’s nice to have a setup that fails on startup, instead of starting\
    \ up fine and only failing when you start calling your web app, potentially seconds\
    \ or minutes later.\n\n`registerShutdownHook()` will set up the Spring Context\
    \ object so that when the Java runtime receives a shutdown command, Spring Context\
    \ will try to shut down gracefully. It will also shut down components in the opposite\
    \ order of startup, so that components that require other components don’t fail\
    \ because one of their dependencies has shut down before the parent component\
    \ shut down.\n\n## Adding Your Data Source\n\nThe next step is to initialize your\
    \ web app resources in Spring Context. You’ll start with initializing the data\
    \ source.\n\nWhen you set up your data source with Spring Context, you need to\
    \ solve two problems: create the actual data source itself and make sure that\
    \ it migrates before other beans in your Spring Context call it.\n\nCreating the\
    \ data source itself is straightforward and just a manner of specifying the class\
    \ and its properties, as shown in Listing [13-2](#531928_1_En_13_Chapter.xhtml#PC3).\n\
    \n```\nregisterBean(\n    \"unmigratedDataSource\",\n    HikariDataSource::class.java,\n\
    \    BeanDefinitionCustomizer { bd ->\n        bd.propertyValues.apply {\n   \
    \         add(\"jdbcUrl\", appConfig.dbUrl)\n            add(\"username\", appConfig.dbUser)\n\
    \            add(\"password\", appConfig.dbPassword)\n        }\n    }\n)\nListing\
    \ 13-2\nCreating a data source inside createApplicationContext\n```\n\nHere, you’ve\
    \ registered a bean the traditional way. It’s not a singleton, so you tell Spring\
    \ Context how to create an instance of a class you provide and various attributes\
    \ of the instance that’s created. In this case, you say that the properties `jdbcUrl`,\
    \ `username`, and `password` are to be set to the corresponding values in your\
    \ `WebappConfig`.\n\nIf you ask Spring Context for an instance of `\"unmigratedDataSource\"\
    `, you’ll get just what the name suggests – a raw HikariCP data source that you\
    \ can use to query your database. But it won’t run any pending Flyway ([*https://flywaydb.org/*](https://flywaydb.org/))\
    \ database migrations before you start executing queries. Listing [13-3](#531928_1_En_13_Chapter.xhtml#PC4)\
    \ shows how to set up an additional bean that also runs your migrations.\n\n```\n\
    class MigratedDataSourceFactoryBean : FactoryBean {\n    lateinit var unmigratedDataSource:\
    \ DataSource\n    override fun getObject() =\n        unmigratedDataSource.also(::migrateDataSource)\n\
    \    override fun getObjectType() =\n        DataSource::class.java\n    override\
    \ fun isSingleton() =\n        true\n}\n// Inside createApplicationContext:\n\
    registerBean(\n    \"dataSource\",\n    MigratedDataSourceFactoryBean::class.java,\n\
    \    BeanDefinitionCustomizer { bd ->\n        bd.propertyValues.apply {\n   \
    \         add(\n                \"unmigratedDataSource\",\n                RuntimeBeanReference(\"\
    unmigratedDataSource\")\n            )\n        }\n    }\n)\nListing 13-3\nA FactoryBean\
    \ class that runs your migrations and a bean declaration for it\n```\n\nThere\
    \ are several important things happening here.\n\nThe first is the class `MigratedDataSourceFactoryBean`\
    \ itself. The reason you create this class is so that you have a place to invoke\
    \ your code for running your Flyway database migrations. The implementation of\
    \ this class declares everything Spring Context needs to be able to create instances\
    \ of your bean. `getObject()` is set up to perform the actual invocation of `migrateDataSource`.\
    \ `getObjectType()` tells Spring which class your bean creates an instance of.\
    \ `isSingleton()` is set to `true`, so that Spring never creates more than one\
    \ instance of this bean and instead reuses the same data source across your entire\
    \ web app.\n\nWhen you register your `\"dataSource\"` bean, you use the `MigratedDataSourceFactoryBean`\
    \ class and pass on a `RuntimeBeanReference` to the `\"unmigratedDataSource\"\
    ` property. A runtime bean reference is what allows Spring Context to lazily create\
    \ instances of your beans and lets Spring Context have full control of the order\
    \ of initialization of the objects it controls. If you somehow were able to get\
    \ a full instance of your `\"umigratedDataSource\"` object when you registered\
    \ the bean declaration for `\"dataSource\"`, Spring Context would have to create\
    \ and fully initialize an instance of that object. The runtime bean reference\
    \ is just a named reference, which lets Spring Context create the actual object\
    \ later, as it sees fit."
  raw: '## Setting Up Spring Context


    The first thing you’ll need is Spring Context itself. Add it as a dependency to
    *build.gradle.kts*:


    ```

    implementation("org.springframework:spring-context:5.3.23")

    ```


    You’ll use Spring Context to initialize your web app. To avoid conflicts with
    your existing code, you’ll create a new main file, *MainSpringContext.kt*, to
    separate your Spring initialization from your existing initialization in *Main.kt*.
    Spring Context will initialize the components and resources of your web app in
    the correct order, based on the dependency graph Spring Context detects between
    them. So you won’t need any of the “manual” initialization code already present
    in *Main.kt*.


    At the core of Spring Context is the application context object. This is often
    a resource that’s created via XML config files. But here, you’ll set it up programmatically.
    Listing [13-1](#531928_1_En_13_Chapter.xhtml#PC2) shows how to get the basics
    up and running.


    ```

    fun createApplicationContext(appConfig: WebappConfig) =

    StaticApplicationContext().apply {

    beanFactory.registerSingleton("appConfig", appConfig)

    refresh()

    registerShutdownHook()

    }

    Listing 13-1

    Creating and initializing Spring Context

    ```


    This small snippet demonstrates some important concepts in Spring Context.


    First, there’s the concept of *beans*. A bean is Spring’s name of an instance
    of an object in the world of dependency injection. You define the `"``appConfig``"`
    bean as a “singleton bean,” which is Spring lingo for a bean where you provide
    the instance of the bean, instead of telling Spring how to create that instance.
    You already have a convenient function for creating an instance of your app config,
    so there’s no need to wrap that in Spring Context.


    You also call two important methods on the context. `refresh()` causes all the
    beans you define to be instantiated right away, instead of being lazily instantiated
    later. Later, you’ll initialize resources in the context, and it’s nice to have
    a setup that fails on startup, instead of starting up fine and only failing when
    you start calling your web app, potentially seconds or minutes later.


    `registerShutdownHook()` will set up the Spring Context object so that when the
    Java runtime receives a shutdown command, Spring Context will try to shut down
    gracefully. It will also shut down components in the opposite order of startup,
    so that components that require other components don’t fail because one of their
    dependencies has shut down before the parent component shut down.


    ## Adding Your Data Source


    The next step is to initialize your web app resources in Spring Context. You’ll
    start with initializing the data source.


    When you set up your data source with Spring Context, you need to solve two problems:
    create the actual data source itself and make sure that it migrates before other
    beans in your Spring Context call it.


    Creating the data source itself is straightforward and just a manner of specifying
    the class and its properties, as shown in Listing [13-2](#531928_1_En_13_Chapter.xhtml#PC3).


    ```

    registerBean(

    "unmigratedDataSource",

    HikariDataSource::class.java,

    BeanDefinitionCustomizer { bd ->

    bd.propertyValues.apply {

    add("jdbcUrl", appConfig.dbUrl)

    add("username", appConfig.dbUser)

    add("password", appConfig.dbPassword)

    }

    }

    )

    Listing 13-2

    Creating a data source inside createApplicationContext

    ```


    Here, you’ve registered a bean the traditional way. It’s not a singleton, so you
    tell Spring Context how to create an instance of a class you provide and various
    attributes of the instance that’s created. In this case, you say that the properties
    `jdbcUrl`, `username`, and `password` are to be set to the corresponding values
    in your `WebappConfig`.


    If you ask Spring Context for an instance of `"``unmigratedDataSource``"`, you’ll
    get just what the name suggests – a raw HikariCP data source that you can use
    to query your database. But it won’t run any pending Flyway ([*https://flywaydb.org/*](https://flywaydb.org/))
    database migrations before you start executing queries. Listing [13-3](#531928_1_En_13_Chapter.xhtml#PC4)
    shows how to set up an additional bean that also runs your migrations.


    ```

    class MigratedDataSourceFactoryBean : FactoryBean {

    lateinit var unmigratedDataSource: DataSource

    override fun getObject() =

    unmigratedDataSource.also(::migrateDataSource)

    override fun getObjectType() =

    DataSource::class.java

    override fun isSingleton() =

    true

    }

    // Inside createApplicationContext:

    registerBean(

    "dataSource",

    MigratedDataSourceFactoryBean::class.java,

    BeanDefinitionCustomizer { bd ->

    bd.propertyValues.apply {

    add(

    "unmigratedDataSource",

    RuntimeBeanReference("unmigratedDataSource")

    )

    }

    }

    )

    Listing 13-3

    A FactoryBean class that runs your migrations and a bean declaration for it

    ```


    There are several important things happening here.


    The first is the class `MigratedDataSourceFactoryBean` itself. The reason you
    create this class is so that you have a place to invoke your code for running
    your Flyway database migrations. The implementation of this class declares everything
    Spring Context needs to be able to create instances of your bean. `getObject()`
    is set up to perform the actual invocation of `migrateDataSource`. `getObjectType()`
    tells Spring which class your bean creates an instance of. `isSingleton()` is
    set to `true`, so that Spring never creates more than one instance of this bean
    and instead reuses the same data source across your entire web app.


    When you register your `"dataSource"` bean, you use the `MigratedDataSourceFactoryBean`
    class and pass on a `RuntimeBeanReference` to the `"``unmigratedDataSource``"`
    property. A runtime bean reference is what allows Spring Context to lazily create
    instances of your beans and lets Spring Context have full control of the order
    of initialization of the objects it controls. If you somehow were able to get
    a full instance of your `"umigratedDataSource"` object when you registered the
    bean declaration for `"``dataSource``"`, Spring Context would have to create and
    fully initialize an instance of that object. The runtime bean reference is just
    a named reference, which lets Spring Context create the actual object later, as
    it sees fit.'
