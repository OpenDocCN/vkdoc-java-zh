- fmt: '### Create a New Kotlin Project with IntelliJ IDEA


    There are many ways to create a new Kotlin project. For this book, you’ll be using
    IntelliJ IDEA to do it. It’s nice to have a GUI to hold your hand through the
    process if you’re not familiar with Kotlin and/or the JVM.


    When you launch IntelliJ IDEA, you should see the splash screen shown in Figure
    [1-2](#531928_1_En_1_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig2_HTML.png)


    A screenshot of the homepage of IntelliJ IDEA. In the right column, Projects,
    Customize, Plugins, and learn IntelliJ IDEA options are mentioned.


    Figure 1-2


    Your first taste of IntelliJ IDEA


    Click “New Project” to create a new Kotlin project using the built-in wizard in
    IntelliJ IDEA, shown in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig3_HTML.png)


    A screenshot of a dialog box titled New project. In the left column, New project
    option is selected. The Name, Location, language, build system, and J D K and
    Gradle D S L details are to be entered. The create option is highlighted below.


    Figure 1-3


    The New Project screen in IntelliJ IDEA


    Use your good taste and judgment to name the project, and adjust the options as
    follows:


    - Make sure you select “New Project” in the left sidebar.

    - Set *Language* to *Kotlin*.

    - Set *Build system* to *Gradle*.

    - Set *Gradle DSL* to *Kotlin*.

    - Uncheck *Add sample code*.


    You need a JDK, and the easiest way to get one is to have IntelliJ IDEA download
    one for you. Click the red “<No SDK>” dropdown in the New Project dialog shown
    in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3) and choose an appropriate JDK
    from the popup that appears, shown in Figure [1-4](#531928_1_En_1_Chapter.xhtml#Fig4).
    JDK 17 or JDK 11 is a good choice, as those are stable Long-Term Support (LTS)
    releases.


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig4_HTML.png)


    A screenshot of a dialog box titled Download J D K. A drop-down menu is available
    for version and vendor. The location option is observed. The download option is
    selected.


    Figure 1-4


    Use IntelliJ IDEA to download a JDK


    There are multiple vendors available. They are all full-fledged JDKs that adhere
    to the JDK specifications. For the most part, it doesn’t matter which one you
    choose. The differences lie in a handful of edge cases and different defaults.
    For most web apps, you’ll be able to switch between vendors and not notice any
    differences. I personally prefer Amazon Corretto, mostly out of habit. But I’ve
    used other vendors in real-world web apps, such as Azul Zulu. I tend to choose
    whichever vendor is most convenient on the platform I use, such as Azul Zulu on
    Azure, Amazon Corretto on AWS, and so on.


    Make sure you choose a JDK of version 11 or newer. Versions 11 and 17 are both
    Long-Time Support (LTS) releases, which means they’ll receive security updates
    longer than other versions. And later in this book, you’ll use libraries that
    require at least version 11 to work.


    You can also choose an existing JDK if you have one installed. Alternatively,
    you can manage JDK installations yourself, by using something like `sdkman` ([`https://sdkman.io/`](https://sdkman.io/))
    on macOS and Linux and `Jabba` ([`https://github.com/shyiko/jabba`](https://github.com/shyiko/jabba))
    on Windows.


    **Tip**


    You can have bad luck and choose a JDK version that’s incompatible with the Gradle
    version used by IntelliJ IDEA. For example, the 2021 version of IntelliJ uses
    Gradle 7.1, which only works with JDK versions lower than 16. If this happens,
    delete your project and start over, using a different JDK or Gradle version.


    After IntelliJ IDEA finishes downloading the JDK, click the “Create” button at
    the bottom of the New Project dialog shown in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3),
    and your brand-new project appears, as shown in Figure [1-5](#531928_1_En_1_Chapter.xhtml#Fig5).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig5_HTML.png)


    A screenshot of a dialog box titled kotlinbook. Under projects, kotlinbook option
    is selected. The text reads search everywhere, double shift. go to file, ctrl
    plus shift plus n. recent files, ctrl plus e. navigation bar, alt plus home. Drop
    files here to open them.


    Figure 1-5


    IntelliJ IDEA after it has finished with project initialization


    With this setup, IntelliJ IDEA won’t create sample code or pre-generated files,
    other than a Gradle build system skeleton. All you have now is a way to compile
    and run Kotlin code. And that’s all you need in this book. There’s no framework
    with tens of thousands of lines of code that needs to run first to get anything
    done.


    **Tip**


    `Gradle` is a build system for the Java platform. This is where you add third-party
    code as dependencies, configure production builds, set up automated testing, and
    more. `Maven` is also an excellent choice for building production-grade Kotlin
    web apps. Most examples you’ll see in books and online documentation use `Gradle`,
    though, and I’ve only used `Gradle` in real-world Kotlin apps, so that’s why I
    use it in this book.


    ## Kotlin Hello, World!


    It’s common when learning a new language to make one’s first program to be one
    that outputs “Hello, World!” This ensures that everything is up and running, that
    you can compile Kotlin code, and that you can run it and see that it outputs something.


    ### Kotlin Naming Conventions


    Before you create your first file, you need to know where to put it and what to
    name it.


    Kotlin is very flexible about the naming of files and folders and doesn’t enforce
    a specific structure. However, it’s common to follow the Java conventions, and
    this is what the official Kotlin style guide recommends. This is especially helpful
    in team situations, so that everyone knows where to find and place things.


    The conventions go as follows:


    - Place Kotlin code in `src/main/kotlin`.

    - Create a *package* named after the project itself and put all your files in
    it. A package is a namespace that tells code apart. This helps avoid name conflicts
    with third-party code.

    - The directory structure matches the package names. The package `myapp.foo` exists
    in `src/main/kotlin/myapp/foo`.

    - File names are in upper camel case, also known as `PascalCase`, the same as
    Java. Note that in the wild, it’s relatively common to see underscores too, `underscore_case`.
    This book uses `PascalCase` throughout.


    In this book, you’ll place all your code in the package `kotlinbook`.'
  raw: '### Create a New Kotlin Project with IntelliJ IDEA


    There are many ways to create a new Kotlin project. For this book, you’ll be using
    IntelliJ IDEA to do it. It’s nice to have a GUI to hold your hand through the
    process if you’re not familiar with Kotlin and/or the JVM.


    When you launch IntelliJ IDEA, you should see the splash screen shown in Figure
    [1-2](#531928_1_En_1_Chapter.xhtml#Fig2).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig2_HTML.png)


    A screenshot of the homepage of IntelliJ IDEA. In the right column, Projects,
    Customize, Plugins, and learn IntelliJ IDEA options are mentioned.


    Figure 1-2


    Your first taste of IntelliJ IDEA


    Click “New Project” to create a new Kotlin project using the built-in wizard in
    IntelliJ IDEA, shown in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig3_HTML.png)


    A screenshot of a dialog box titled New project. In the left column, New project
    option is selected. The Name, Location, language, build system, and J D K and
    Gradle D S L details are to be entered. The create option is highlighted below.


    Figure 1-3


    The New Project screen in IntelliJ IDEA


    Use your good taste and judgment to name the project, and adjust the options as
    follows:


    *   Make sure you select “New Project” in the left sidebar.


    *   Set *Language* to *Kotlin*.


    *   Set *Build system* to *Gradle*.


    *   Set *Gradle DSL* to *Kotlin*.


    *   Uncheck *Add sample code*.


    You need a JDK, and the easiest way to get one is to have IntelliJ IDEA download
    one for you. Click the red “<No SDK>” dropdown in the New Project dialog shown
    in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3) and choose an appropriate JDK
    from the popup that appears, shown in Figure [1-4](#531928_1_En_1_Chapter.xhtml#Fig4).
    JDK 17 or JDK 11 is a good choice, as those are stable Long-Term Support (LTS)
    releases.


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig4_HTML.png)


    A screenshot of a dialog box titled Download J D K. A drop-down menu is available
    for version and vendor. The location option is observed. The download option is
    selected.


    Figure 1-4


    Use IntelliJ IDEA to download a JDK


    There are multiple vendors available. They are all full-fledged JDKs that adhere
    to the JDK specifications. For the most part, it doesn’t matter which one you
    choose. The differences lie in a handful of edge cases and different defaults.
    For most web apps, you’ll be able to switch between vendors and not notice any
    differences. I personally prefer Amazon Corretto, mostly out of habit. But I’ve
    used other vendors in real-world web apps, such as Azul Zulu. I tend to choose
    whichever vendor is most convenient on the platform I use, such as Azul Zulu on
    Azure, Amazon Corretto on AWS, and so on.


    Make sure you choose a JDK of version 11 or newer. Versions 11 and 17 are both
    Long-Time Support (LTS) releases, which means they’ll receive security updates
    longer than other versions. And later in this book, you’ll use libraries that
    require at least version 11 to work.


    You can also choose an existing JDK if you have one installed. Alternatively,
    you can manage JDK installations yourself, by using something like sdkman ([`https://sdkman.io/`](https://sdkman.io/))
    on macOS and Linux and Jabba ([`https://github.com/shyiko/jabba`](https://github.com/shyiko/jabba))
    on Windows.


    Tip


    You can have bad luck and choose a JDK version that’s incompatible with the Gradle
    version used by IntelliJ IDEA. For example, the 2021 version of IntelliJ uses
    Gradle 7.1, which only works with JDK versions lower than 16\. If this happens,
    delete your project and start over, using a different JDK or Gradle version.


    After IntelliJ IDEA finishes downloading the JDK, click the “Create” button at
    the bottom of the New Project dialog shown in Figure [1-3](#531928_1_En_1_Chapter.xhtml#Fig3),
    and your brand-new project appears, as shown in Figure [1-5](#531928_1_En_1_Chapter.xhtml#Fig5).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig5_HTML.png)


    A screenshot of a dialog box titled kotlinbook. Under projects, kotlinbook option
    is selected. The text reads search everywhere, double shift. go to file, ctrl
    plus shift plus n. recent files, ctrl plus e. navigation bar, alt plus home. Drop
    files here to open them.


    Figure 1-5


    IntelliJ IDEA after it has finished with project initialization


    With this setup, IntelliJ IDEA won’t create sample code or pre-generated files,
    other than a Gradle build system skeleton. All you have now is a way to compile
    and run Kotlin code. And that’s all you need in this book. There’s no framework
    with tens of thousands of lines of code that needs to run first to get anything
    done.


    Tip


    Gradle is a build system for the Java platform. This is where you add third-party
    code as dependencies, configure production builds, set up automated testing, and
    more. Maven is also an excellent choice for building production-grade Kotlin web
    apps. Most examples you’ll see in books and online documentation use Gradle, though,
    and I’ve only used Gradle in real-world Kotlin apps, so that’s why I use it in
    this book.


    ## Kotlin Hello, World!


    It’s common when learning a new language to make one’s first program to be one
    that outputs “Hello, World!” This ensures that everything is up and running, that
    you can compile Kotlin code, and that you can run it and see that it outputs something.


    ### Kotlin Naming Conventions


    Before you create your first file, you need to know where to put it and what to
    name it.


    Kotlin is very flexible about the naming of files and folders and doesn’t enforce
    a specific structure. However, it’s common to follow the Java conventions, and
    this is what the official Kotlin style guide recommends. This is especially helpful
    in team situations, so that everyone knows where to find and place things.


    The conventions go as follows:


    *   Place Kotlin code in *src/main/kotlin*.


    *   Create a *package* named after the project itself and put all your files in
    it. A package is a namespace that tells code apart. This helps avoid name conflicts
    with third-party code.


    *   The directory structure matches the package names. The package `myapp.foo`
    exists in *src/main/kotlin/myapp/foo*.


    *   File names are in upper camel case, also known as `PascalCase`, the same as
    Java. Note that in the wild, it’s relatively common to see underscores too, `underscore_case`.
    This book uses `PascalCase` throughout.


    In this book, you’ll place all your code in the package `kotlinbook`.'
  trans: '

    ### 使用 IntelliJ IDEA 创建新的 Kotlin 项目


    创建新的 Kotlin 项目有多种方法。本书将使用 IntelliJ IDEA 来完成。如果你不熟悉 Kotlin 和/或 JVM，通过图形用户界面（GUI）引导你完成整个过程会非常方便。


    启动 IntelliJ IDEA 后，你应该会看到如图 1-2 所示的启动画面。


    ![](img/531928_1_En_1_Fig2_HTML.png)


    IntelliJ IDEA 主页的截图。在右侧列中，提到了“项目”、“自定义”、“插件”和“学习 IntelliJ IDEA”选项。


    图 1-2


    IntelliJ IDEA 的初次见面


    点击“新建项目”，使用 IntelliJ IDEA 内置的向导创建一个新的 Kotlin 项目，如图 1-3 所示。


    ![](img/531928_1_En_1_Fig3_HTML.png)


    一个标题为“新建项目”的对话框截图。在左侧列中，选中了“新建项目”选项。需要输入名称、位置、语言、构建系统以及 JDK 和 Gradle DSL 的详细信息。下方突出显示了“创建”选项。


    图 1-3


    IntelliJ IDEA 中的“新建项目”界面


    请根据你的良好判断来命名项目，并按如下方式调整选项：


    *   确保在左侧边栏中选中了“新建项目”。

    *   将*语言*设置为 *Kotlin*。

    *   将*构建系统*设置为 *Gradle*。

    *   将 *Gradle DSL* 设置为 *Kotlin*。

    *   取消勾选*添加示例代码*。


    你需要一个 JDK，获取它的最简单方法是让 IntelliJ IDEA 为你下载一个。点击图 1-3 所示“新建项目”对话框中的红色“<无 SDK>”下拉菜单，并从弹出的窗口中选择一个合适的
    JDK，如图 1-4 所示。JDK 17 或 JDK 11 是不错的选择，因为它们都是稳定的长期支持（LTS）版本。


    ![](img/531928_1_En_1_Fig4_HTML.png)


    一个标题为“下载 JDK”的对话框截图。有一个用于选择版本和供应商的下拉菜单。可以看到“位置”选项。已选中“下载”选项。


    图 1-4


    使用 IntelliJ IDEA 下载 JDK


    有多个供应商可供选择。它们都是符合 JDK 规范的、功能完备的 JDK。在大多数情况下，选择哪一个并不重要。差异仅存在于少数边缘情况和不同的默认设置中。对于大多数
    Web 应用来说，你可以在不同供应商之间切换而不会注意到任何差异。我个人偏好 Amazon Corretto，主要是出于习惯。但我也在实际的 Web 应用中使用过其他供应商的产品，例如
    Azul Zulu。我倾向于选择在我使用的平台上最方便的供应商，例如在 Azure 上使用 Azul Zulu，在 AWS 上使用 Amazon Corretto，等等。


    请确保你选择的 JDK 版本是 11 或更高。版本 11 和 17 都是长期支持（LTS）版本，这意味着它们获得安全更新的时间比其他版本更长。在本书的后续部分，你将使用到至少需要版本
    11 才能运行的库。


    如果你已经安装了 JDK，也可以选择现有的 JDK。或者，你也可以自行管理 JDK 安装，例如在 macOS 和 Linux 上使用 sdkman ([`https://sdkman.io/`](https://sdkman.io/))，在
    Windows 上使用 Jabba ([`https://github.com/shyiko/jabba`](https://github.com/shyiko/jabba))。


    提示


    你可能会运气不佳，选择了一个与 IntelliJ IDEA 使用的 Gradle 版本不兼容的 JDK 版本。例如，2021 版本的 IntelliJ 使用
    Gradle 7.1，它仅适用于低于 16 的 JDK 版本。如果发生这种情况，请删除你的项目，并使用不同的 JDK 或 Gradle 版本重新开始。


    IntelliJ IDEA 完成 JDK 下载后，点击图 1-3 所示“新建项目”对话框底部的“创建”按钮，你的全新项目就会出现，如图 1-5 所示。


    ![](img/531928_1_En_1_Fig5_HTML.png)


    一个标题为“kotlinbook”的对话框截图。在“项目”下，选中了“kotlinbook”选项。文本显示“随处搜索，双击 Shift”、“转到文件，Ctrl+Shift+N”、“最近文件，Ctrl+E”、“导航栏，Alt+Home”、“将文件拖放到此处以打开”。


    图 1-5


    IntelliJ IDEA 完成项目初始化后的界面


    通过此设置，IntelliJ IDEA 除了创建一个 Gradle 构建系统骨架外，不会创建示例代码或预生成文件。你现在拥有的只是一个编译和运行 Kotlin
    代码的方法。而这正是本书所需要的全部内容。这里没有需要先运行成千上万行代码才能做任何事情的框架。


    提示


    Gradle 是 Java 平台的构建系统。你可以在这里添加第三方代码作为依赖项、配置生产构建、设置自动化测试等。Maven 也是构建生产级 Kotlin
    Web 应用的绝佳选择。不过，你在书籍和在线文档中看到的大多数示例都使用 Gradle，而且我在实际的 Kotlin 应用中也只使用过 Gradle，这就是我在本书中使用它的原因。


    ## Kotlin Hello, World!


    学习一门新语言时，通常第一个程序是输出“Hello, World!”。这可以确保一切就绪，你可以编译 Kotlin 代码，运行它并看到它输出内容。


    ### Kotlin 命名约定


    在创建第一个文件之前，你需要知道把它放在哪里以及如何命名。


    Kotlin 在文件和文件夹的命名上非常灵活，并不强制要求特定的结构。然而，遵循 Java 约定是常见的做法，这也是官方 Kotlin 风格指南所推荐的。这在团队协作中尤其有帮助，这样每个人都知道在哪里查找和放置文件。


    约定如下：


    *   将 Kotlin 代码放在 *src/main/kotlin* 目录下。

    *   创建一个以项目本身命名的*包*，并将所有文件放入其中。包是一个命名空间，用于区分代码。这有助于避免与第三方代码发生名称冲突。

    *   目录结构与包名匹配。包 `myapp.foo` 存在于 *src/main/kotlin/myapp/foo* 目录下。

    *   文件名采用大驼峰命名法，也称为 `PascalCase`，与 Java 相同。请注意，在实际应用中，使用下划线（`underscore_case`）的情况也相对常见。本书通篇使用
    `PascalCase`。


    在本书中，你将把所有代码放在 `kotlinbook` 包中。

    '
- fmt: '### Write Some Code


    You are now ready to create your first Kotlin file. Taking the preceding conventions
    into account, the file name to use is `src/main/kotlin/kotlinbook/Main.kt`.


    To create the file in IntelliJ IDEA, follow these steps:


    - Expand `src/main/kotlin` in the left sidebar in IntelliJ.

    - Right-click `src/main/kotlin` and choose *New ➤ Package*.

    - Name it `kotlinbook` and hit Enter on your keyboard.

    - Right-click the newly created package/folder `kotlinbook`, and choose *New ➤
    Kotlin Class/File*.

    - Choose File, choose the file template named simply “File,” name it `Main` (IDEA
    will automatically add the `.kt` extension), and hit Enter on your keyboard.


    IntelliJ IDEA should now look like what’s shown in Figure [1-6](#531928_1_En_1_Chapter.xhtml#Fig6).


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig6_HTML.png)


    A screenshot of a window titled kotlinbook, Main.kt. The main.kt option is selected
    under kotlinbook options. In the right tab, the text reads package kotlinbook.


    Figure 1-6: A Kotlin file inside a package in IntelliJ IDEA


    Kotlin is a multi-paradigm language and has support for object-oriented, functional,
    and data-oriented programming (Sharvit, 2022, Manning). This book will use functional
    and data-oriented styles as much as possible and only use the object-oriented
    style when third-party libraries require it.


    In your first file, write a top-level function with the name `main`, as seen in
    Listing [1-1](#531928_1_En_1_Chapter.xhtml#PC1). This is a special function name,
    which tells the Kotlin compiler and the Java runtime to call that function as
    the entry point to your program.


    ```

    package kotlinbook

    fun main() {

    println("Hello, World!")

    }

    Listing 1-1

    Print “Hello, World!” in src/main/kotlinbook/Main.kt

    ```


    **Tip:** You can also declare your function as `fun main(args: Array<String>)
    { ... }` if you want to read the command-line arguments passed to your application.
    Java requires that your main function takes an array of strings, but Kotlin does
    not have this requirement.


    ### Run Your Code with IntelliJ IDEA


    IntelliJ IDEA can run your code directly. This is the fastest way to run your
    code and takes maximum advantage of the fact that you’re using an IDE.


    The little green arrow next to a function, as shown in Figure [1-7](#531928_1_En_1_Chapter.xhtml#Fig7),
    indicates that IntelliJ IDEA can run that function directly. Click it, and IntelliJ
    IDEA will do as you command and run the function.


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig7_HTML.png)


    A screenshot of a window titled kotlinbook, Main.kt. The build.gradle.kts option
    is selected under kotlinbook options. In the right tab, the text reads package
    kotlinbook, and two lines of code are observed.


    Figure 1-7: A green play button next to the function name in IntelliJ IDEA shows
    a runnable function


    ### Run Your Code with Gradle


    You can also configure Gradle to run your code. Later, you’ll use Gradle to build
    deployable JAR (Java archive) files, and Gradle needs to know where your main
    function is to be able to build them. Additionally, even if you’re not going to
    run the code with Gradle, developers unfamiliar with the project can look at the
    Gradle config to find the main function. This helps understand where the main
    entry point is in the project and is a good place to start reading code to become
    familiar with it.


    You’ll use the `application` plugin in Gradle to specify a runnable application
    with a main entry point. In the file `build.gradle.kts`, add the `application`
    plugin:


    ```

    plugins {

    kotlin("jvm") version "..."

    application

    }

    ```


    The `application` plugin needs to know where to find the main function. At the
    top-level of `build.gradle.kts` (not inside the `plugins` block), declare the
    name of the main class:


    ```

    application {

    mainClass.set("kotlinbook.MainKt")

    }

    ```


    **Tip:** Did you notice the leaky abstraction? The `application` plugin is not
    aware of Kotlin, and it needs to know the name of the compiled Java class file.
    To be compatible and interoperable with the Java platform at large, the Kotlin
    compiler turns `Main` into `MainKt`. A file `Foo.kt` that only declares the class
    `Foo` is compiled to `Foo.class`. Any other scenario will generate `FooKt.class`.


    To run the function with Gradle, use either of the two following methods:


    - In a terminal (either stand-alone or the Terminal tab at the bottom of IntelliJ),
    type `./gradlew application`.

    - In the Gradle panel in IntelliJ (found in the rightmost sidebar), click *Tasks
    ➤ application ➤ run*.


    You should now see the output of your application, either in your terminal or
    in the IntelliJ “Run” output panel.


    ## IntelliJ IDEA Tips and Tricks


    IntelliJ IDEA is a vast tool filled with features. This book is not about IntelliJ
    IDEA, and you might have chosen to use another editor entirely. But here are some
    tips that can help you become familiar with IntelliJ IDEA and avoid common beginner
    mistakes that pro IntelliJ IDEA users know how to avoid.


    If you want to dig deeper and learn more about the vast world of IntelliJ IDEA,
    you should check out the book *Beginning IntelliJ IDEA* by Ted Hagos ([`www.amazon.com/dp/1484274458`](http://www.amazon.com/dp/1484274458)).


    ### Look Out for the Progress Bar


    IntelliJ IDEA will sometimes show a progress bar to the right in the bottom toolbar,
    as shown in Figure [1-8](#531928_1_En_1_Chapter.xhtml#Fig8). When this progress
    bar is visible, IntelliJ IDEA is busy doing something important in the background.


    ![](images/531928_1_En_1_Chapter/531928_1_En_1_Fig8_HTML.png)


    A screenshot of a dialog box titled kotlinbook. Under projects, kotlinbook option
    is selected. The text reads search everywhere, double shift. go to file, ctrl
    plus shift plus n. recent files, ctrl plus e. navigation bar, alt plus home. Drop
    files here to open them.


    Figure 1-8: IntelliJ IDEA is running background analysis of a project, shown by
    a blue progress bar to the right in the bottom toolbar


    When you see this progress bar, you should wait until it’s gone before you start
    editing code.


    IntelliJ IDEA knows a lot about your code. To gain that knowledge, it needs to
    analyze your code first. When you type in new code, this will happen automatically
    (and so quick you probably won’t notice). But when you create a new project or
    open an existing project for the first time, IntelliJ IDEA might spend many minutes
    running analysis in the background.


    The editor is still active while analysis is running, so you assume that IntelliJ
    IDEA is ready to go. But many core features won’t be available until the analysis
    is complete.


    When the progress bar is gone, IntelliJ IDEA is ready to go, and you can now edit
    code with all the features IntelliJ IDEA provides.'
