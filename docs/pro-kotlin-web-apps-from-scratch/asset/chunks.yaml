- fmt: '### A Note on Architecture


    Many frameworks and architectures contain patterns to separate and isolate different
    concerns in your web app. For example, the typical hexagonal architecture aims
    to loosely couple the components of your web app and make them interchangeable.


    For web handlers, such as the one in Listing [6-10](#531928_1_En_6_Chapter.xhtml#PC11),
    I don’t do much separation. The purpose of a web handler is to interact with the
    database and implement business logic around it. I consider the database to be
    a core part of this interaction. You can separate it out and hide the database
    from the business logic, but that has the trade-off of adding opaqueness and friction
    to understanding what’s going on in the system.


    If I do separate a web handler into multiple parts, it’s with the functional core,
    imperative shell pattern. By analogy, you can think of it as a president deciding
    what to do and signing documents (functional core) and an executive branch that
    executes the orders (imperative shell). Something like 90% of the code ends up
    in the functional data-driven core, and that’s where all the business logic resides.
    Then, the imperative shell is “dumb” and executes the commands based on the data
    generated by the functional core, without any business logic.


    When it makes sense, I use queues to separate operational concerns. If one part
    of your system writes to a queue and another part of your system reads from a
    queue, they’re architecturally and operationally separate and completely decoupled.


    I’m adamant about separating business logic from user interface rendering logic.
    The top level of the user interface code fetches data and massages it to render
    a “dumb” GUI that has no business logic, and the user interface code just renders
    based on the data it receives.


    In general, I try to avoid overarchitecting my code. I prefer “dumb” plain functions
    and SQL and data that’s easy to trace and follow along with over firewalling isolation
    between all components of my web app.


    ### Avoid Long-Running Connections


    When you wrap your entire web handler in a Kotliquery session, you need to be
    aware that you should consider alternatives if your web handler includes calls
    to external APIs.


    A Kotliquery session is just a small wrapper over a database connection. And as
    mentioned previously, a database connection is an expensive resource. If your
    web handler keeps a Kotliquery session open while it executes long-running operations
    (such as call to external APIs) that are unrelated to the database, you’re wasting
    resources. The connection is not available to other web handlers from the connection
    pool. And the database server maintains the connection while you’re not really
    using it.


    Sometimes, there’s no way to avoid this situation. For example, maybe you need
    to open a transaction that first writes some data to the database, then performs
    a potentially long-running call to an external API, and then writes some more
    data to the database in the same transaction. If that’s the case, then you simply
    must accept the fact that you need to maintain an idle database connection for
    the duration of the external API call.


    You can also avoid this in many cases by redesigning your business logic, though.
    For example, you can write a temporary item to the database that’s flagged so
    that your application knows to ignore it in queries. Then you can perform your
    external API call. Finally, you can ask Kotliquery for a new session and finalize
    the operation by unflagging the temporary item and executing whatever extra operations
    you need to do against the database. That way, you avoid holding on to a database
    connection for the duration of the external API call.


    Also note that if you expect your web app to only handle lower volumes of traffic,
    keeping database connections open will not cause problems. If you expect your
    web app to handle hundreds or thousands of requests per second, though, you need
    to take this into consideration.


    ## Maps vs. Data Classes


    When you execute queries, the row mapper converts row data to plain maps. Why
    doesn’t it convert query results directly to more type-safe data classes? To understand
    why, let’s look at what you can do with the maps returned from the row mapper
    you’re using now.


    Regardless of what you end up doing, it’s better to stick to returning the raw
    query data as maps and then write code that checks the shape of the data and transforms
    it accordingly according to your business logic and requirements.


    ### Passing Around Maps


    Sooner or later, you’ll end up passing data from query results to functions in
    your web app that implement business logic. One way to handle this is to just
    pass the maps you get from your query results directly to your business logic,
    with no extra treatment of the data. Listing [6-11](#531928_1_En_6_Chapter.xhtml#PC12)
    shows an example of what this would look like.


    ```

    def sendEmailToUser(userRow: Map) {

    deliverEmail(

    "Welcome, ${user["name"] ?: user["email"]}",

    user["email"] as String

    )

    }

    def handleSignup() {

    val userRow = createUser(...)

    sendEmailToUser(userRow)

    }

    Listing 6-11

    Passing raw maps around to business logic

    ```


    I rarely do this in real-world web apps. If you spell a property wrong, you’ll
    get a `null` instead of an actual value. You could cast with `as`, which will
    throw an error if the type is wrong or if the value is `null`. But then you will
    have to litter your business logic with this type of casting. And you’ll get an
    error deep down in your system somewhere far away from the code that fetches data
    from your database.


    ### Passing Individual Properties


    Another option when passing data from query results to your business logic is
    to extract properties from the plain maps and pass them as individual arguments
    to various business logic functions. Listing [6-12](#531928_1_En_6_Chapter.xhtml#PC13)
    shows an example of what this would look like.


    ```

    def sendEmailToUser(userName: String?, userEmail: String) {

    deliverEmail(

    "Welcome, ${userName)}",

    userEmail

    )

    }

    def handleSignup() {

    val userRow = createUser(...)

    sendEmailToUser(

    userRow.get("name") as? String,

    userRow.get("email") as String

    )

    }

    Listing 6-12

    Passing individual properties to business logic

    ```


    This is something I do more often. This way, the business logic is not dependent
    on the database structure. All casting happens close to where you extract the
    data from the query, so you don’t have to put type casts all over your business
    logic. And the casting is now “fail fast,” meaning that you’ll get the cast error
    sooner and closer to the code that executes the database query.'
