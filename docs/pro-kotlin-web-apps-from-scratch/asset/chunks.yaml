    in Ktor from a serverless environment in Chapter [10](#531928_1_En_10_Chapter.xhtml).


    The implementation of the decoupling itself also serves as a nice opportunity
    to learn some important concepts about the Kotlin language.


    Be aware, though. I would be careful with implementing this kind of decoupling
    in a real-world web app. It introduces complexity and abstraction. It’s unlikely
    that your real-world web apps need to support multiple simultaneous libraries
    and/or deployment scenarios. So be careful, and exercise good judgment.


    If you’re new to Kotlin, here are some language features that you’ll see examples
    of in this chapter:


    *   Sealed classes with abstract properties and functions


    *   Function overloading


    *   Functional data-driven programming with maps and lists


    *   Copying data classes


    *   Immutability


    *   Destructuring assignments


    *   Function types


    *   Extension functions


    Also in this chapter, you will learn the following about decoupling web handlers
    from specific libraries in your web app:


    *   Creating abstractions and connecting them to libraries


    *   Why you should consider *not* decoupling your web handlers in real-world web
    apps


    In addition to learning how to deploy your web handlers in a serverless environment
    in Chapter [12](#531928_1_En_12_Chapter.xhtml), Appendix A will teach you how
    to replace Ktor with Jersey.


    ## Your Own HTTP Response Abstraction


    So far, you’ve responded to HTTP requests by calling methods directly on the Ktor
    `call` API. To decouple from Ktor, you’ll need to create your own abstraction
    that doesn’t know anything about Ktor and `call`. You’ll update all your web handlers
    to use your own abstraction, to make them independent and decoupled from Ktor.


    ### Representing HTTP Responses


    Ktor has a rich API to represent HTTP responses. Your own abstraction also needs
    to be able to represent any HTTP response, just like Ktor. Thankfully, you can
    boil down a HTTP response to a simple structure: a status code, some headers,
    and a response body.


    You can represent HTTP response data using a simple data class:


    ```

    data class WebResponse(

    val statusCode: Int,

    val headers: Map>,

    val body: Any

    )

    ```


    You’ll expand heavily on this data class throughout this chapter. For example,
    the type `Any` works, and it can be used to represent any (pun intended) HTTP
    response body. But it blocks the type system from having any (pun also intended)
    knowledge of the contents of the HTTP response. Kotlin has a rich and powerful
    type system, so you should avoid the type `Any` as much as you can.


    Instead, you can alter `WebResponse` to take advantage of the fact that you can
    represent the status code and headers the same way for all your HTTP responses.
    You can update `WebResponse` to be a top-level class that doesn’t know anything
    about the type or contents of the response body. Then, subclasses of `WebResponse`
    can implement the different body types you want to support.


    ### Multiple Response Types


    To support multiple response types, the top-level `WebResponse` will be a *sealed
    class*. A sealed class is an *abstract* class, meaning you can’t create direct
    instances of it, and it can contain abstract properties that all the subclasses
    have to implement. It’s also *sealed*, which means that the Kotlin type system
    knows about all the defined subclasses at compile time. This lets Kotlin treat
    sealed classes like enums, so that you can get help compile-time with things like
    ensuring that you don’t forget to handle all your subclasses of `WebResponse`
    when you later write code that maps `WebResponse` to Ktor.


    The Kotlin documentation has a page dedicated to sealed classes ([`https://kotlinlang.org/docs/sealed-classes.xhtml`](https://kotlinlang.org/docs/sealed-classes.xhtml))
    if you want to read more about them.


    For this chapter, you’ll write two child classes: `TextWebResponse` and `JsonWebResponse`.
    Listing [4-1](#531928_1_En_4_Chapter.xhtml#PC2) shows both, alongside a new implementation
    of `WebResponse` as a sealed class without the `body` property.


    ```

    sealed class WebResponse {

    abstract val statusCode: Int

    abstract val headers: Map>

    }

    data class TextWebResponse(

    val body: String,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse()

    data class JsonWebResponse(

    val body: Any?,

    override val statusCode: Int = 200,

    override val headers: Map> = mapOf()

    ) : WebResponse()

    Listing 4-1

    Two concrete classes, TextWebResponse and JsonWebResponse, that you’ll use to
    represent HTTP responses

    ```


    You need a little bit of boilerplate to make it work. Data classes in Kotlin aren’t
    “smart,” so you must specify all the properties you can pass to them – you can’t
    set them via class inheritance. You need to set default status code of 200, as
    well as the default empty list of headers.


    `TextWebResponse` defines a body property with the type `String`. When you create
    text-based HTTP responses, all you really need to define is that the content is
    an arbitrary string of text, and that’s about it.


    `JsonWebResponse` defines a body property with the type `Any?`. You could enhance
    this and create something like `JsonMapWebResponse` and `JsonListWebResponse`,
    with more specific types. But at the end of the day, most JSON serialization libraries
    don’t encode JSON value types in the type system and encode the input as `Object!`
    or `Any?` anyway, opting to throw errors runtime if you pass it a value that can’t
    be JSON encoded. So defining the exact value type of the JSON body won’t net you
    any practical benefits.


    You create instances of your response classes just like you create instances of
    any data class. Listing [4-2](#531928_1_En_4_Chapter.xhtml#PC3) shows some examples
    of how you can create `WebResponse` instances.


    ```

    TextWebResponse("Hello, World!")

    TextWebResponse("Oh noes", statusCode = 400)

    JsonWebResponse(mapOf("foo" to "bar"))

    JsonWebResponse(listOf(1, 2, 3), headers = mapOf(

    "Set-Cookie" to listOf("myCookie=123abc")

    ))

    Listing 4-2

    Valid response types of your TextWebResponse and JsonWebResponse classes

    ```


    You now have the basics in place for representing HTTP responses in your web handlers,
    without any coupling to Ktor.'
