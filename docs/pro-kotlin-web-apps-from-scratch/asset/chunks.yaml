  trans: '

    ### 直接使用 SQL


    要执行查询，你需要直接编写 SQL。在开始设置之前，我想先解释一下原因。


    有些开发者更喜欢使用映射库，这样就能用 Kotlin 代码来表达查询。Exposed ([`https://github.com/JetBrains/Exposed`](https://github.com/JetBrains/Exposed))
    和 Ktorm ([`www.ktorm.org/`](http://www.ktorm.org/)) 是流行的 Kotlin 库，你也可以使用 Hibernate
    ([`https://hibernate.org/`](https://hibernate.org/)) 和 MyBatis ([`https://mybatis.org/mybatis-3/`](https://mybatis.org/mybatis-3/))
    等 Java 库。它们的共同点是，允许你创建代表表的类，并在代码与数据库表之间建立一个类型安全的映射层。你可以设置对象图（因此得名对象关系映射，简称 ORM）来定义表之间的关系。你无需编写任何
    SQL 查询，而是与映射类交互，并用它们来表达插入、查询、分组等操作。


    这一切听起来不错。我们行业中最聪明的人创建了这些库和框架，许多开发者都在小型和大型项目中使用它们。那么，问题出在哪里呢？


    我认为数据库是任何 Web 应用不可或缺的一部分。我希望我的代码能尽可能接近我在构建的 Web 应用中所使用的实际数据库。无论我使用哪种语言，无论是 Node.js、Groovy、Clojure，当然也包括
    Kotlin，情况都是如此。我的代码与数据库交互的复杂细节最终总是变得很重要，尤其是当应用不断增长时。ORM 的设计初衷就是向你隐藏这些细节。因此，对于你在本书中编写
    Web 应用的方式而言，ORM 反而成了一种反模式。


    能够使用 SQL 数据库的所有功能，而无需担心是否能用 ORM 映射或用 SQL 封装器来表达，这是一个优势。


    ORM 的一个好处是它们可以自动生成高效的 SQL 查询。但 ORM 也可能生成低效的查询。因此，如果你使用 ORM，就需要对 SQL 有深入的理解，才能处理这些情况。掌握
    SQL 知识是绕不开的。考虑到这一点，我更倾向于直接编写 SQL。


    我并不是说你永远不应该使用 ORM。但出于上述原因，我个人从不使用它们，因此在本书中我也会避免使用。


    ### 安装 Kotliquery


    你将使用 Kotliquery 来执行查询。Kotliquery 是一个围绕 JDBC 的小型封装库，它帮助你解决 JDBC 中样板代码和 API 不友好等问题。


    请注意，使用 Kotliquery 并不会限制你以后在需要时直接调用 JDBC。像 Kotliquery 这样的库的好处在于，你可以混合搭配使用，不存在锁定问题。


    要安装 Kotliquery，请将其作为依赖项添加到 *build.gradle.kts* 的 `dependencies` 块中：


    ```

    implementation("com.github.seratch:kotliquery:1.9.0")

    ```


    Kotliquery 是一个设计精良的库，拥有构建生产级 Web 应用所需的所有功能。如果以 GitHub 星标数来衡量，它并不是一个流行的库。但流行度只是一个虚荣指标。我已在大型生产系统中成功使用了
    Kotliquery。


    ### 映射查询结果


    行映射器是一个函数，Kotliquery 用它来提取行数据并将其转换为你喜欢的数据结构。这个行映射器函数接收一个原始的 Kotliquery Row 对象，并将其转换为有用的数据。


    清单 6-1 展示了如何创建一个行映射器函数，以便稍后在使用 Kotliquery 执行查询时使用。


    ```

    import kotliquery.Row

    fun mapFromRow(row: Row): Map {

    return row.underlying.metaData

    .let { (1..it.columnCount).map(it::getColumnName) }

    .map { it to row.anyOrNull(it) }

    .toMap()

    }

    清单 6-1

    一个将 Kotliquery Row 对象映射为普通 Map 的函数

    ```


    这段代码中有几个有趣的地方。在 let 块内部，你创建了一个从 1 到查询结果 `metaData.columnCount` 的*范围*。你可以将范围视为该范围内数字的列表，因此
    `1..5` 等同于 `listOf(1, 2, 3, 4, 5)`。然后，你遍历该范围，并使用一个*函数引用*来获取列名。`map(it::getColumnName)`
    等同于 `map { colIdx -> it.getColumnName(colIdx) }`。这就像你在 `metaData` 对象（`it`）上调用了
    `getColumnName`，并将范围中的列索引作为第一个参数传入。接着，遍历列名列表，通过 `row.anyOrNull(it)` 返回列名与该列值组成的键值对。此时，你只是在提取查询的原始数据，没有进行任何类型检查或转换。最后，你使用
    `toMap()` 将键值对列表转换为一个 Map。结果就是，你将 Kotliquery 的 `Row` 对象转换成了一个从列名到列值的普通 Map。


    ## 执行 SQL 查询


    Kotliquery 已经设置好并准备就绪。是时候执行一些查询了！


    ### 创建会话


    要使用 Kotliquery 执行查询，你需要刚刚创建的行映射器和一个 Kotliquery 会话。


    你可以通过调用 Kotliquery 的 `sessionOf` 函数并传入你的连接池来创建一个会话。Kotliquery 会话是对原始数据库连接的一个小型封装。该会话包含一些方法，你可以调用它们来执行查询。清单
    6-2 展示了如何使用 `single` 来获取单行数据。


    ```

    import kotliquery.sessionOf

    sessionOf(dataSource).use { dbSess ->

    dbSess.single(queryOf("SELECT 1", ::mapFromRow))

    // {?column?=1}

    }

    清单 6-2

    创建一个 Kotliquery 会话并执行查询

    ```


    就像上一章清单 5-5 中一样，Kotliquery 会话实现了 `java.io.Closeable`，你必须记得在使用完毕后调用 `close()`。`use`
    会为你调用 `close()`，而 Kotliquery 随后会关闭它在创建会话时从数据源获取的底层连接。


    ### 查询单行数据


    在清单 6-2 中，你已经看到了如何在 Kotliquery 会话上使用 `single()` 来获取单行数据。`single()` 是一种优化，它只会从查询中返回一行数据。这使得
    Kotliquery 可以在底层做一些假设，例如甚至不会尝试从数据库获取多行数据。其返回类型（通过行映射器）是 `Map<String, Any?>?`，意味着它会返回
    `null` 或单行数据。清单 6-3 提供了一些 `single()` 输出的额外示例。


    ```

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    // {?column?=1}

    dbSess.single(queryOf("SELECT 1 as foo"), ::mapFromRow)

    // {foo=1}

    dbSess.single(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    ), ::mapFromRow)

    // {x=1, y=a}

    清单 6-3

    single() 的输出示例

    ```


    最后一个查询从两行数据中进行选择，但你只从 `single()` 中获取了第一行。这里没有什么特别的魔法；它只是依赖于数据库引擎返回的结果集的任何排序方式。

    '
- fmt: '### Querying for Multiple Rows


    You can use `list()` just the same way you use `single()`, except `list()` will
    give you all the rows that the query returns. `list()` has the return type (via
    the row mapper) of `List<Map<String, Any?>>`. Listing [6-4](#531928_1_En_6_Chapter.xhtml#PC5)
    shows some examples of querying for multiple rows.


    ```

    dbSess.list(queryOf("SELECT 1 as foo"), ::mapFromRow)

    // [{foo=1}]

    dbSess.list(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    ), ::mapFromRow)

    // [{x=1, y=a}, {x=2, y=b}]

    dbSess.list(queryOf(

    """

    SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)

    WHERE x = 42

    """

    ), ::mapFromRow)

    // []

    Listing 6-4

    Examples of output from list()

    ```


    You’ll always get a list of rows in return, even for queries that match a single
    row. You’ll also get a list if there are zero matching rows. You never need to
    check that the return value of `list()` is `null` (as the Kotlin type system also
    tells you).


    You can also use `forEach()` when your query loads in vast amounts of data. `forEach()`
    will yield data row by row, whereas `list()` will accumulate all the results into
    a list before it yields the data to your code. Memory usage and performance will
    be much better if you use `forEach()` when you expect your query to return either
    a high number of rows or rows that contain columns of binary blobs or other arbitrarily
    sized items. Listing [6-5](#531928_1_En_6_Chapter.xhtml#PC6) shows an example
    of how to use `forEach()`.


    ```

    dbSess.forEach(queryOf(

    "SELECT * from (VALUES (1, ''a''), (2, ''b'')) t1 (x, y)"

    )) { rowObject ->

    val row = mapFromRow(rowObject)

    println(row)

    }

    // {x=1, y=a}

    // {x=2, y=b}

    Listing 6-5

    Example of using forEach to avoid loading the entire result set into memory

    ```


    `forEach()` calls the lambda once for each row that your query yields. It’s the
    raw Kotliquery `Row` object that’s passed to the lambda. You can use the same
    `mapFromRow()` function that you use for `single()` and `list()` to convert this
    structure to a plain map.


    ### Inserting Rows


    To insert rows, you’ll use the `updateAndReturnGeneratedKey()` function on the
    Kotliquery session. You also need to create the session correctly by setting the
    flag `returnGeneratedKey` to `true`. Listing [6-6](#531928_1_En_6_Chapter.xhtml#PC7)
    shows how to create a session and execute an insert correctly. If you don’t set
    this up correctly, you won’t be able to access the ID of the inserted row that
    the database generated automatically when it inserted the row.


    ```

    sessionOf(dataSource, returnGeneratedKey = true)

    .use { dbSess ->

    dbSess.updateAndReturnGeneratedKey(queryOf(

    """

    INSERT INTO user_t

    (email, password_hash, name, tos_accepted)

    VALUES

    (?, ?, ?, ?)

    """,

    "august@augustl.com",

    "123abc",

    "August Lilleaas",

    true)

    )

    // 2

    }

    Listing 6-6

    Create a session that lets you get the ID of an inserted row

    ```


    If you’ve followed the examples in this book one by one so far, the ID you’ll
    get when you run this insert is `2`. That’s because you already created a user
    using a repeatable migration in the previous chapter, as seen in Listing [5-13](#531928_1_En_5_Chapter.xhtml#PC13).


    ### Updating and Deleting


    To run update and delete SQL statements, you’ll use the `update()` function. This
    function doesn’t really care what the actual SQL statement does. But it returns
    the number of rows that the query affected. That can be particularly useful for
    sanity checks, by checking that the query affected more than zero rows. Listing
    [6-7](#531928_1_En_6_Chapter.xhtml#PC8) shows examples of running `UPDATE` and
    `DELETE` SQL statements.


    ```

    dbSess.update(queryOf(

    "UPDATE user_t SET name = ? WHERE id = ?",

    "August Lilleaas",


    ))

    // 1

    dbSess.update(queryOf("DELETE FROM user_t"))

    // 2

    Listing 6-7

    Examples of executing UPDATE and DELETE statements

    ```


    The `UPDATE` statement returns 1, as it updated one specific row matched by row
    ID. The `DELETE` statement returns 2, as it deleted both the user rows in the
    `user_t` table.


    ### Positional vs. Named Parameters


    So far, your code uses question mark symbols to refer to SQL query parameters.
    Kotliquery has another syntax for those arguments, which allows you to name them.


    Naming the arguments is useful for two reasons: it makes your code more readable
    if you have queries with many arguments, and it lets you reuse the same arguments
    multiple times without having to pass them twice or more. Listing [6-8](#531928_1_En_6_Chapter.xhtml#PC9)
    shows an example of the update statement from Listing [6-7](#531928_1_En_6_Chapter.xhtml#PC8),
    using named parameters instead of positional parameters.


    ```

    dbSess.update(queryOf(

    "UPDATE user_t SET name = :name WHERE id = :id",

    mapOf(

    "name" to "August Lilleaas",

    "id" to 2

    )))

    Listing 6-8

    Pass query parameters using named parameters

    ```


    This lets you refer to the parameters by name, and it also has the added benefit
    of naming the inputs, so you don’t have to count the position of the parameter
    in the list of parameters to figure out what goes where.


    ### Additional Operations


    As you can see, Kotliquery has everything you need to perform queries and inserts.
    Compared with working with JDBC directly, the Kotliquery API is much simpler and
    makes it easy to convert your queries to data and pass in parameters to your queries.


    You can find detailed documentation and API references to the parameters and methods
    available in Kotliquery at the project GitHub page: [`https://github.com/seratch/kotliquery`](https://github.com/seratch/kotliquery).


    ## Querying from Web Handlers


    You’ll be running most of your queries from your web handlers. It’s convenient
    to have a helper function that you can use to make your web handlers prepare and
    manage a Kotliquery session automatically.


    ### Creating a Helper Function


    To make it easy to query in your web handlers, you’ll create a version of `webResponse`
    from Chapter [4](#531928_1_En_4_Chapter.xhtml) named `webResponseDb`. This function
    does everything `webResponse` does, but also creates and manages a Kotliquery
    session. This makes it easy and convenient to run queries in your web handlers.
    Listing [6-9](#531928_1_En_6_Chapter.xhtml#PC10) shows the implementation of `webResponseDb`.


    ```

    import kotliquery.Session

    fun webResponseDb(

    dataSource: DataSource,

    handler: suspend PipelineContext.(

    dbSess: Session

    ) -> WebResponse

    ) = webResponse {

    sessionOf(

    dataSource,

    returnGeneratedKey = true

    ).use { dbSess ->

    handler(dbSess)

    }

    }

    Listing 6-9

    webResponseDb – wrap webResponse and add database querying capabilities

    ```


    The signature of `webResponseDb` is like that of `webResponse`, except it adds
    a `dbSess` argument that points to a Kotliquery session. You also must pass a
    data source when invoking it. Additionally, `returnGeneratedKey` is always set
    to `true`, to ensure that your web handlers can access auto-generated row IDs
    from your database. Listing [6-10](#531928_1_En_6_Chapter.xhtml#PC11) shows an
    example of how you can invoke `webResponseDb` from your Ktor route mapping.


    ```

    get("/db_test", webResponseDb(dataSource) { dbSess ->

    JsonWebResponse(

    dbSess.single(queryOf("SELECT 1"), ::mapFromRow)

    )

    })

    Listing 6-10

    An example of creating a Ktor route that executes a database query

    ```


    In a real-world web app, most web handlers need a database connection. So it’s
    very convenient to have a helper like `webResponseDb` to create web handlers with
    all the database connection stuff and resource management handled in one place.'
