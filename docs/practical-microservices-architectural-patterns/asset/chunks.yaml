    两位将军悖论

    在计算机网络领域（特别是涉及传输控制协议时），文献表明 TCP 无法保证端点之间（完全）的状态一致性。这一点通过**两位将军悖论**（亦称两位将军问题、两军问题或协同攻击问题）得以阐明。这是一个思想实验，揭示了在通过不可靠链路通信以协调行动时存在的陷阱及相关设计挑战。


    在任意通信故障面前，两位将军悖论是无解的；然而，该问题为任何分布式一致性协议设定了现实期望的基础。因此，要理解这个问题，你需要理解其中涉及的相关不确定性，这将为深入学习事务提供一个完美的类比。


    阐述两位将军悖论


    本节将通过经典示例场景来阐述两位将军悖论。图 13-1 展示了两支军队，分别由不同的将军率领，他们正联合准备进攻图中所示的设防城市。两支军队都驻扎在城市附近，但各自位于自己的山谷中。两位将军所在的两座山丘之间隔着第三座山谷，两位将军沟通的唯一方式就是派遣信使穿越这座山谷。第三座山谷被城市的守军占据，因此任何穿越该山谷的信使都有可能被俘。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig1_HTML.jpg](img/477630_1_En_13_Fig1_HTML.jpg)


    图 13-1 阐述两位将军悖论


    两位将军已同意发动进攻；然而，他们尚未就进攻时间达成一致。只有当两支军队同时进攻城市时，攻击才会成功；单独进攻的军队将必死无疑。因此，将军们必须相互沟通，以决定进攻时间，并同意在该时间联合进攻；每位将军还必须知道，另一位将军知道他们已经共同同意了进攻计划。消息接收的确认信息可能与原始消息本身一样容易丢失，因此需要可能无限多的消息序列才能达成（近乎）共识。两位将军将永远无法确定他们最后派出的信使是否成功抵达。


    解决方案探讨

    计算机网络是分布式系统的支柱；然而，任何网络的可靠性都必须经过检验。分布式系统需要解决软件系统的可扩展性和灵活性，因此网络是必要之恶。方案应当接受网络的不确定性，而不是试图消除它；相反，应该将其缓解到可接受的程度。


    在两位将军悖论中，你可以想到许多可接受的机制，例如：


    *   第一位将军可以派出 50 名信使，预计所有 50 名信使都被俘的概率很低。这位将军将固定进攻时间，以便为这 50 名信使中的全部、部分或多数能够抵达另一位将军留出足够时间。然后，无论情况如何，他都会在约定的时间发起进攻，而第二位将军只要收到任何一条消息，也会发起进攻。


    *   第二种方法是，第一位将军发送一连串消息，第二位将军对收到的每条消息发送确认，随着收到消息数量的增加，每位将军的信心也随之增强。


    *   在第三种方法中，第一位将军可以在每条消息上做标记，标明这是 n 条消息中的第 1 条、第 2 条、第 3 条，等等。这样，第二位将军可以估算信道的可靠性，并发送适当数量的回复消息，以确保至少有一条消息被接收的概率很高。如果网络高度可靠，那么一条消息就足够了，额外的消息也无济于事；如果网络不可靠，最后一条消息丢失的可能性与第一条消息一样大。


    作为将军的微服务

    当你将一个“从此幸福地生活在一起”的单体应用状态，拆分为“从此幸福地分离生活”的状态时，你就将一支军队从一个将军分成了多个将军。每个微服务都有自己的将军，或者其本身就是一个将军，并且可能需要不止一位将军来协调任何有用的功能。通过采用多语言架构，每个微服务都将拥有自己的资源，无论是数据库还是文件存储。网络是这些微服务进行协调和通信的唯一途径。跨微服务对资源所做的更改的影响必须保持一致。这种一致性取决于你选择哪种模式或协议来协调和传达更改命令以及确认信息，这些确认信息充当了在微服务之间实施该更改的协议。

    '
- fmt: '# TCP/IP, the Valley Between the Generals


    The Internet Protocol (`IP`) is not reliable. It may be delayed or dropped or
    duplicate data can come or data can come in order not as per the original intention.
    The Transmission Control Protocol (`TCP`) adds a more reliable layer over `IP`.
    `TCP` can retransmit missing packets, eliminate duplicates, and assemble packets
    in the order in which the sender intended to transmit. However, while `TCP` can
    hide packet loss, duplication, or reordering, it may not be able to remove delays
    in the network, since they are packet switched.


    Traditional fixed-line telephone networks are extremely reliable, and delayed
    audio frames and dropped calls are very rare. This is because a fixed, guaranteed
    amount of bandwidth is allocated for your call in the network, along the entire
    route between the two callers; this is referred to as circuit switched. However,
    data center networks and the Internet are not circuit switched. Their backbone,
    the Ethernet and `IP`, are packet switched protocols, which suffer from queueing,
    which can cause unbounded delays in the network.


    Each microservice has its own memory space for computation and resources for persistence
    and storage, and one microservice cannot access another microservice’s memory
    or resource (except by making requests to the other microservice over the network,
    through an exposed API). The Internet and most internal networks in data centers
    (often Ethernet) have the characteristics explained above, and these networks
    become the only way microservices can coordinate and communicate. In this kind
    of network, one microservice can send a message to another microservice, but the
    network gives no guarantees as to when it will arrive or whether it will arrive
    at all. If you send a request and expect a response, many things could go wrong
    in between.


    The sending microservice can’t even tell whether the request or message was delivered.
    The next best option is for the recipient microservice to send a response message,
    which may also in turn be lost or delayed. These issues are indistinguishable
    in an asynchronous network. When one microservice sends a request to another microservice
    and doesn’t receive a response, it is impossible to tell why. The typical way
    of handling such issues is by using timeouts: after some time you give up waiting
    and assume that the response is never going to arrive. However, if and when a
    timeout occurs, you still don’t know whether the remote microservice got your
    request or not, and if the request is still queued somewhere, there is a chance
    that it may still be delivered to the recipient microservice, even if the sender
    microservice has given up on the previous request and might have resent the request,
    in which case a duplicate request will get fired. Advanced solutions to this problem
    are addressed in the reference.^([^(27)](#fn27))


    # Transactions


    Transactions help you control how access is given to the same data set, whether
    it is for read or write purposes. Data in a changing state might be inconsistent,
    hence other reads and writes should have to wait while the state transitions from
    “changing” to either “committed” or “rolled back.” You will look at the details
    related to transactions now.


    ## Hardware Instruction Sets at the Core of Transactions


    For transactions at a single database node, atomicity is implemented at the storage
    level. When a transaction commits, the database makes the transaction’s writes
    durable (typically in a write-ahead log^([^(28)](#fn28))) and subsequently appends
    a commit record to the log on disk. So, the controller of the disk drive handling
    that write takes a crucial role in asserting that the write has happened.


    A transaction once committed cannot be undone. You cannot change your mind and
    retroactively undo a transaction after it has been committed. This is because,
    once data has been committed, it may become visible to other transactions and
    thus other transactions may have already started relying on that data.


    ## The ACID in the Transaction


    For a transaction to comply with the specification, it should exhibit the ACID
    (Atomicity, Consistency, Isolation, and Durability) properties. Let’s look into
    them one by one.


    - **Atomicity:** The outcome of a transaction, if it’s a commit, is that all of
    the transaction’s writes are made durable as a single unit of work. If it’s an
    abort, then all of the transaction’s writes are rolled back (i.e., undone or discarded)
    as a single unit of work. If you go back to the previous section where I described
    that it’s the single controller of one particular disk drive that sits in the
    core and takes the commit or rollback decision, you need to appreciate that whether
    it’s the write of a single word^([^(29)](#fn29)) or multiple words (depending
    on 32-bit or 64-bit), it’s the support available from the hardware level that
    helps you club them together as the write of a single unit of work.


    - **Consistency:** This property guarantees that a transaction will leave the
    data in a consistent state, irrespective of whether the transaction is committed
    or rolled back. To understand what this “consistent state” means, it refers to
    the adherence of the constraints or rules of the database. It is common to model
    business rule constraints in terms of database integrity constraints. So, maintaining
    consistency is a dual effort by both a resource manager and the application. While
    the application ensures consistency in terms of keys, referential integrity, and
    so on, the transaction manager ensures that the transaction is atomic, isolated,
    and durable. For example, if your transaction is to assign the last seat on the
    flight to one of two travelers who are concurrently booking for that same flight,
    the transaction will be consistent if one seat is removed from the inventory of
    free seats and assigned to one and only one of the travelers and at the same time
    show that the same seat is not assigned or assignable any more to the other traveler
    trying booking concurrently.


    - **Isolation:** The isolation property guarantees that the changes ongoing in
    a transaction will not affect the data accessed by another transaction. This isolation
    can be controlled to finer levels, and “Transaction Isolation Mechanisms” section
    describes them.


    - **Durability:** This property requires that when a transaction is committed,
    any changes the transaction makes to the data must be recorded permanently. When
    a transaction commits, the database makes the transaction’s writes durable (typically
    in a write-ahead log) and subsequently appends a commit record to the log on disk.
    If the database crashes in the middle of this process, the transaction can be
    recovered from the log when the database restarts. In cases where the commit record
    is already written to disk before the crash, the transaction is considered committed.
    If not, any writes from that transaction are rolled back. So the moment at which
    the disk finishes writing the commit record is the single deciding point to commit;
    before that moment, it is still possible to abort (due to a crash), but after
    that moment, the transaction is committed (even if the database crashes just afterwards).
    So, it is the controller of the disk drive handling the write that makes the commit
    atomic. Having said that, if an error or crash happens during the process, the
    above logs can be used to rebuild or recreate the data changes.


    ## Transaction Models


    Transaction models refer to how the coordination of individual transactions under
    the context of an enclosing transaction are structured. You will look at the major
    transaction models here:'
