- fmt: '# Design for Various Operational Characteristics of Microservices


    One of the prime objectives in splitting the monolith into microservices is to
    bring complete independence for individual microservices in terms of architecture,
    technology, build, and operational constraints. This means microservices don’t
    care if the other interacting microservices are up and running or not. Whether
    the dependent microservices are up and running or not, the independent microservice
    should be able to complete its operations and move forward. Let me bring clarity
    to my usage of “dependence” here since I started this paragraph talking about
    the ability to “bring complete independence for individual microservices” and
    then in the very next line I talk about their dependencies. Understand that in
    a distributed environment many or all of these microservices are dependent since
    they want to share information. Hence when I say “bring complete independence
    for individual microservices,” what I mean is to change the style of dependency
    from direct to indirect, or in more technical terms, to prefer an asynchronous
    style in place of a synchronous style.


    Using message brokers between microservices is a highly recommended approach to
    independence. Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2) shows a single message
    producer and two message consumers. Assume that they represent three different
    microservices and they are communicating through a message broker in an asynchronous
    manner. As you can agree, the moment the message producer publishes a message
    to the message channel, it can be sure that the message will be safe with the
    broker infrastructure and it can ignore the published message. When the time comes,
    interested subscribers can consume these messages from the message broker through
    their subscribed channel. It is not the business of the `Producer` microservice
    or the `Consumer` microservice to validate whether the other `Consumer` microservice
    has received the message or not. If the other microservice is up and running and
    is fast enough at consuming messages, it will receive the message from the message
    broker more or less instantaneously, thus responding with a performance grade
    more or less comparable to a synchronous style of communication between microservices.
    However, if that `Consumer` microservice is either too slow to consume or if that
    microservice is not up and running by the time the `Producer` published the messages,
    the message store may help by safely persisting the messages until the message
    has been consumed by all the registered, interested microservices.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig2_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Message persistence to balance operating characteristics


    ## A Chain Is As Strong As Its Weakest Link


    This is extremely important in distributed applications especially when you expect
    application resiliency: a software application is only as resilient or available
    as its weakest resilient or available microservice or as the weakest component
    (link) in the entire infrastructure.


    In Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2), the components of considerable
    significance are


    *   The `Producer` microservice

    *   The `Consumer` microservice

    *   The message broker


    Of course there are other components in the architecture shown, but let’s assume
    that those mechanisms to deal with their resiliency are known to us since we have
    been dealing with distributed systems for two or more decades.


    We also acknowledge that the `Producer` and `Consumer` microservices also need
    to be resilient, but in this section we will look at the resilience of the message
    broker. The message broker is the central, single point of failure in the architecture
    shown in Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2). Figure [1-2](#477630_1_En_1_Chapter.xhtml#Fig2)
    in Chapter [1](#477630_1_En_1_Chapter.xhtml) shows how to address this by adopting
    suitable network integration topologies. However, those basic topologies alone
    are not sufficient, so let’s rearchitect the message broker infrastructure to
    avoid this single point of failure.


    You may improve the scalability of your messaging system by adding multiple brokers
    to the system, thus providing redundancy. This will help you to escape the inherent
    resource limits or resiliency of a single broker deployed on a single machine.
    Message brokers can be combined into a cluster by adding network connectors between
    the brokers, which enables you to define broker networks with any arbitrary topology
    including but not limited to that shown in Figure [1-2](#477630_1_En_1_Chapter.xhtml#Fig2)
    in Chapter [1](#477630_1_En_1_Chapter.xhtml). When microservices are linked together
    as a network, routes between microservices are created dynamically as they connect
    to and disconnect from the network. In other words, with the appropriate topology,
    a microservice can connect to any other microservice in the network and the network
    automatically routes messages from microservices attached at any other point in
    the network.


    You should have at least one instance of the message broker in the cluster up
    and running if it has to take care of any `PUT` (publish) and `GET` (subscribe)
    primitives of the microservices, as depicted in the topology shown in Figure [6-3](#477630_1_En_6_Chapter.xhtml#Fig3).
    One notable feature here is that even if the entire message broker cluster is
    down, the already persisted messages received from the microservices are safe
    and due for delivery. If and when at a later time one (or more) instances of the
    same message broker cluster comes up, it will be ready to deliver the delivery
    due messages. The same is true about the health of other microservices. If one
    of the `Consumer` microservice is down or not responding, the message due to be
    delivered to that `Consumer` microservice is safe with the broker and will not
    be purged or deleted until its delivery has happened eventually.


    All of this brings absolute independence between microservices.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig3_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Clustering message brokers for resiliency


    ## Synchronous vs. Asynchronous


    Let’s now look at two main styles of communication between microservices: synchronous
    and asynchronous communications.'
  raw: '### Design for Various Operational Characteristics of Microservices


    One of the prime objectives in splitting the monolith into microservices is to
    bring complete independence for individual microservices in terms of architecture,
    technology, build, and operational constraints. This means microservices don’t
    care if the other interacting microservices are up and running or not. Whether
    the dependent microservices are up and running or not, the independent microservice
    should be able to complete its operations and move forward. Let me bring clarity
    to my usage of “dependence” here since I started this paragraph talking about
    the ability to “bring complete independence for individual microservices” and
    then in the very next line I talk about their dependencies. Understand that in
    a distributed environment many or all of these microservices are dependent since
    they want to share information. Hence when I say “bring complete independence
    for individual microservices,” what I mean is to change the style of dependency
    from direct to indirect, or in more technical terms, to prefer an asynchronous
    style in place of a synchronous style.


    Using message brokers between microservices is a highly recommended approach to
    independence. Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2) shows a single message
    producer and two message consumers. Assume that they represent three different
    microservices and they are communicating through a message broker in an asynchronous
    manner. As you can agree, the moment the message producer publishes a message
    to the message channel, it can be sure that the message will be safe with the
    broker infrastructure and it can ignore the published message. When the time comes,
    interested subscribers can consume these messages from the message broker through
    their subscribed channel. It is not the business of the Producer microservice
    or the Consumer microservice to validate whether the other Consumer microservice
    has received the message or not. If the other microservice is up and running and
    is fast enough at consuming messages, it will receive the message from the message
    broker more or less instantaneously, thus responding with a performance grade
    more or less comparable to a synchronous style of communication between microservices.
    However, if that Consumer microservice is either too slow to consume or if that
    microservice is not up and running by the time the Producer published the messages,
    the message store may help by safely persisting the messages until the message
    has been consumed by all the registered, interested microservices.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig2_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Message persistence to balance operating characteristics


    ### A Chain Is As Strong As Its Weakest Link


    This is extremely important in distributed applications especially when you expect
    application resiliency: a software application is only as resilient or available
    as its weakest resilient or available microservice or as the weakest component
    (link) in the entire infrastructure.


    In Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2), the components of considerable
    significance are


    *   The Producer microservice


    *   The Consumer microservice


    *   The message broker


    Of course there are other components in the architecture shown, but let’s assume
    that those mechanisms to deal with their resiliency are known to us since we have
    been dealing with distributed systems for two or more decades.


    We also acknowledge that the Producer and Consumer microservices also need to
    be resilient, but in this section we will look at the resilience of the message
    broker. The message broker is the central, single point of failure in the architecture
    shown in Figure [6-2](#477630_1_En_6_Chapter.xhtml#Fig2). Figure [1-2](#477630_1_En_1_Chapter.xhtml#Fig2) in
    Chapter [1](#477630_1_En_1_Chapter.xhtml) shows how to address this by adopting
    suitable network integration topologies. However, those basic topologies alone
    are not sufficient, so let’s rearchitect the message broker infrastructure to
    avoid this single point of failure.


    You may improve the scalability of your messaging system by adding multiple brokers
    to the system, thus providing redundancy. This will help you to escape the inherent
    resource limits or resiliency of a single broker deployed on a single machine.
    Message brokers can be combined into a cluster by adding network connectors between
    the brokers, which enables you to define broker networks with any arbitrary topology
    including but not limited to that shown in Figure [1-2](#477630_1_En_1_Chapter.xhtml#Fig2) in
    Chapter [1](#477630_1_En_1_Chapter.xhtml). When microservices are linked together
    as a network, routes between microservices are created dynamically as they connect
    to and disconnect from the network. In other words, with the appropriate topology,
    a microservice can connect to any other microservice in the network and the network
    automatically routes messages from microservices attached at any other point in
    the network.


    You should have at least one instance of the message broker in the cluster up
    and running if it has to take care of any PUT (publish) and GET (subscribe) primitives
    of the microservices, as depicted in the topology shown in Figure [6-3](#477630_1_En_6_Chapter.xhtml#Fig3).
    One notable feature here is that even if the entire message broker cluster is
    down, the already persisted messages received from the microservices are safe
    and due for delivery. If and when at a later time one (or more) instances of the
    same message broker cluster comes up, it will be ready to deliver the delivery
    due messages. The same is true about the health of other microservices. If one
    of the Consumer microservice is down or not responding, the message due to be
    delivered to that Consumer microservice is safe with the broker and will not be
    purged or deleted until its delivery has happened eventually.


    All of this brings absolute independence between microservices.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig3_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Clustering message brokers for resiliency


    ## Synchronous vs. Asynchronous


    Let’s now look at two main styles of communication between microservices: synchronous
    and asynchronous communications.'
  trans: '

    ### 针对微服务不同运行特性的设计


    将单体应用拆分为微服务的主要目标之一，是让每个微服务在架构、技术、构建和运行约束方面实现完全独立。这意味着微服务无需关心与之交互的其他微服务是否正常运行。无论依赖的微服务是否正常运行，独立的微服务都应能完成自身操作并继续推进。由于本段开头提到了“为单个微服务带来完全独立性”，紧接着又谈到了它们的依赖关系，我需要澄清一下这里“依赖”一词的用法。要理解的是，在分布式环境中，许多或所有微服务之间都存在依赖关系，因为它们需要共享信息。因此，当我提到“为单个微服务带来完全独立性”时，实际意思是改变依赖的风格，从直接依赖变为间接依赖，或者用更技术性的术语来说，是倾向于使用异步风格而非同步风格。


    在微服务之间使用消息代理是实现独立性的一种高度推荐的方法。图 6-2 展示了一个消息生产者和两个消息消费者。假设它们代表三个不同的微服务，并通过消息代理以异步方式进行通信。可以理解的是，一旦消息生产者将消息发布到消息通道，它就可以确信消息在代理基础设施中是安全的，从而可以忽略已发布的消息。当合适的时候，感兴趣的订阅者可以通过其订阅的通道从消息代理消费这些消息。生产者微服务或消费者微服务无需验证其他消费者微服务是否已收到消息。如果其他微服务正在运行并且消费消息的速度足够快，它几乎会立即从消息代理接收到消息，从而以与微服务间同步通信风格大致相当的性能水平进行响应。然而，如果该消费者微服务消费速度过慢，或者当生产者发布消息时该微服务未运行，消息存储可能会通过安全地持久化消息来提供帮助，直到所有已注册的、感兴趣的微服务都消费完该消息为止。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig2_HTML.jpg](img/477630_1_En_6_Fig2_HTML.jpg)


    图 6-2

    用于平衡运行特性的消息持久化


    ### 木桶效应：链条的强度取决于最薄弱的环节


    这一点在分布式应用中极其重要，尤其是在期望应用具有弹性时：一个软件应用的弹性或可用性，取决于其最不具弹性或最不可用的微服务，或者整个基础设施中最薄弱的组件（环节）。


    在图 6-2 中，相当重要的组件包括：


    *   生产者微服务

    *   消费者微服务

    *   消息代理


    当然，所示架构中还有其他组件，但假设我们已知处理这些组件弹性的机制，因为我们处理分布式系统已有二十年或更长时间。


    我们也承认生产者和消费者微服务也需要具备弹性，但本节我们将重点考察消息代理的弹性。在图 6-2 所示的架构中，消息代理是中心化的单点故障。第 1 章的图 1-2
    展示了如何通过采用合适的网络集成拓扑来解决此问题。然而，仅靠这些基本拓扑是不够的，因此让我们重新设计消息代理基础设施，以避免这种单点故障。


    您可以通过向系统添加多个代理来提高消息系统的可扩展性，从而提供冗余。这将帮助您摆脱单台机器上部署的单个代理所固有的资源限制或弹性问题。通过在代理之间添加网络连接器，可以将消息代理组合成一个集群，这使您能够定义具有任意拓扑结构的代理网络，包括但不限于第
    1 章图 1-2 所示的拓扑。当微服务作为网络连接在一起时，随着它们连接到网络或从网络断开，微服务之间的路由会被动态创建。换句话说，通过合适的拓扑，一个微服务可以连接到网络中的任何其他微服务，并且网络会自动路由来自网络中任何其他点所连接的微服务的消息。


    如果集群要处理微服务的任何 PUT（发布）和 GET（订阅）原语，那么集群中至少应有一个消息代理实例处于运行状态，如图 6-3 所示的拓扑。这里一个值得注意的特性是，即使整个消息代理集群宕机，从微服务接收到的、已持久化的消息仍然是安全的，并等待投递。如果稍后同一消息代理集群的一个（或多个）实例启动，它将准备好投递这些待投递的消息。其他微服务的健康状况也是如此。如果某个消费者微服务宕机或无响应，待投递给该消费者微服务的消息在代理处是安全的，并且在最终成功投递之前不会被清除或删除。


    所有这些都为微服务之间带来了绝对的独立性。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig3_HTML.jpg](img/477630_1_En_6_Fig3_HTML.jpg)


    图 6-3

    为弹性而集群化消息代理


    ## 同步与异步


    现在，让我们来看微服务之间通信的两种主要风格：同步通信和异步通信。

    '
- fmt: '### Synchronous Interactions Between Microservices


    The synchronous style of interaction between microservices is analogous to two
    people shaking hands. You extend your hand to shake your counterpart’s hand, which
    is analogous to one microservice initiating the request. Your hand and henceforth
    your handshake will be received if and only if your counterpart is also awake
    and acknowledges that he or she is willing to shake hands with you and further
    attempts to respond to you by offering his or her hand, too. When that happens,
    your hand will be received by your counterpart and you will also feel your counterpart
    responding to you by clasping your hand to shake it. Similarly, the receiving
    microservice should be up and running and not too busy so that it can accept the
    request sent by the providing microservice within a reasonable timeframe (so that
    network timeouts won’t hinder the process), process it, and send back a response,
    if any, instantaneously.


    In the component world, especially when two components interact with one another
    within a single process, typically the synchronous style of request response cycle
    happens within a single thread of execution. The consumer component and the receiver
    component can share the same stack variables of the thread. Since all the request
    data and the temporary stack data are all available and shared within the single
    thread context, when the response data is received back by the consumer component
    from the producer component, the consumer can be sure that it has received the
    response corresponding to the request it fired towards the producer. This is shown
    in Figure [6-4](#477630_1_En_6_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig4_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4** Synchronous, in-process communication


    The scenario becomes slightly complex when the interacting components live in
    different process spaces. If components or microservices have to perform interprocess
    communication, which will always be the norm in distributed enterprise applications,
    the processes must be interconnected using pipes (networks). Network sockets provide
    a fine abstraction for these pipes. Figure [6-5](#477630_1_En_6_Chapter.xhtml#Fig5)
    depicts this scenario.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig5_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig5_HTML.jpg)


    **Figure 6-5** Synchronous interprocess communication


    An end-to-end request response cycle in such a scenario is tied together not directly,
    but indirectly. On the consumer side, the consumer process initiates a socket
    connection and a single thread within this process will send the request through
    the connection. Once the request or any adjoining data is sent to the socket,
    the requesting thread can do nothing but wait and idle until it receives back
    any response. The socket connection will pop out this request at the other end
    of the connection so that the components or microservices at the provider end,
    whichever is listening by accepting connections, will be able to receive the request.
    Note that at the provider end there must be a different thread dedicated to the
    received request within the provider process context, and it is the task of this
    thread to also do any further computational processing, prepare an appropriate
    response, and push the response back to the socket connection. The connection
    will transport back this response and make it available at the consumer end, from
    where the same old thread that placed the request from the consumer end, which
    was blocked and waiting to get a response from the pipe, will pick up the response;
    this completes a request response cycle. In short, in a synchronous style of interaction,
    coordinating threads will be blocked and must wait.


    Figure [6-6](#477630_1_En_6_Chapter.xhtml#Fig6) shows a more complex scenario
    where a component or a microservice instance in a single process has to respond
    to concurrent requests of the same type. When the same type of request comes,
    and once they are processed concurrently, now the dilemma for the producer is
    to return which response data to which requestor.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig6_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig6_HTML.jpg)


    **Figure 6-6** Synchronous, concurrent interprocess communication


    In Figure [6-6](#477630_1_En_6_Chapter.xhtml#Fig6), on the Producer side, requests
    from multiple consumers are getting processed concurrently: the white envelope
    request and the black envelope request. Consumer 2, sending the black envelope
    request, naturally expects a response to his message in a similar envelope, a
    black envelope response. If the Producer sends back a response intended to be
    sent to some other consumer, that is an error scenario, which is marked with a
    cross in the diagram. Fortunately, language primitives like threads, contexts,
    and sessions provide a nice abstraction to solve such puzzles without doing extra
    work from the developer side. In other words, concurrent requests are served by
    separate threads so each thread knows to which requester each response data must
    be returned.


    So far so good, since we have been talking about synchronous communications. Let’s
    now look at the asynchronous style.'
