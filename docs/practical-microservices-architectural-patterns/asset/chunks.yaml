- fmt: '# Postman for HTTP Operations


    Postman is a Google Chrome app for interacting with HTTP APIs. It presents you
    with a friendly GUI for constructing requests and reading responses. The app is
    available from [`www.getpostman.com/`](http://www.getpostman.com/). As of this
    writing, the Postman app is available for the Mac, Windows, and Linux platforms.


    ## HTTP GET Using Postman to Retrieve an Entity


    Once the app is installed, you will want to test all HTTP actions against it.
    Here again I refer back to Chapter [7](#477630_1_En_7_Chapter.xhtml) where I introduced
    a sample Spring Boot application. I also refer to Figure [7-4](https://doi.org/10.1007/978-1-4842-4501-9_7Fig#4),
    which shows the execution of the GET action on the link `http://localhost:8080/profile/products`
    using Postman.


    ## Summary


    Both `cURL` and Postman are great utilities for quickly interacting with REST
    endpoints and performing basic HTTP operations. You will be using them extensively
    while executing the samples in this book.


    # Apache TCPMon


    Apache TCPMon is a utility that allows traffic, especially HTTP traffic messages,
    to be viewed and resent. It is useful as a debug tool so you can look into what
    is being passed through the wire between a client and a server, or for that matter
    even between two microservices. It was originally part of Axis1 and now stands
    as an independent project. Go to [`https://ws.apache.org/tcpmon/`](https://ws.apache.org/tcpmon/)
    for more information.


    I cover the following in this appendix:


    - How to install and start TCPMon

    - How to set up TCPMon as a proxy


    ## Install TCPMon


    In this section, you will download, install, and configure TCPMon and test the
    installation. TCPMon is available for download at [`https://ws.apache.org/tcpmon/download.cgi`](https://ws.apache.org/tcpmon/download.cgi).


    Save the installation archive file to a suitable location on your hard disk first
    and then extract the archive to a location of your choice. Even though you may
    choose any location, like


    ```

    C:\Program Files\tcpmon\

    ```


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin

    ```


    ## Start Using TCPMon


    You can bring up TCPMon by going into the `build` folder of the TCPMon extracted
    folder (shown in Figure [E-1](#477630_1_En_24_Chapter.xhtml#Fig1)):


    ![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig1_HTML.jpg](images/477630_1_En_24_Chapter/477630_1_En_24_Fig1_HTML.jpg)


    **Figure E-1** Bring up TCPMon


    ```

    cd D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon

    ```


    ## Set Up TCPMon as a Proxy


    TCPMon can act as a proxy. To set TCPMon in proxy mode, just select the proxy
    option from the radio buttons and configure the host and port towards which the
    calls are to be proxied.


    Alternatively, you can supply the configuration parameters when you start TCPMon
    itself. The usage pattern is


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon [listenPort targetHost targetPort]

    ```


    You will get the screen shown in Figure [E-2](#477630_1_En_24_Chapter.xhtml#Fig2)
    if you start like


    ![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig2_HTML.jpg](images/477630_1_En_24_Chapter/477630_1_En_24_Fig2_HTML.jpg)


    **Figure E-2.** TCPMon configured as a proxy


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon 8081 127.0.0.1 8080

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>java -cp ./tcpmon-1.0.jar org.apache.ws.commons.tcpmon.TCPMon
    8081 127.0.0.1 8080

    ```


    All requests hitting port 8081 in the host where TCPMon is running will be proxied
    to port 8080 in host `127.0.0.1` in the above case.


    ## Summary


    TCPMon is a nice utility to inspect HTTP requests and responses. You can install
    and keep it ready on your machine so that it''s easy for you to quickly proxy
    HTTP requests and responses through TCPMon and inspect the contents of the messages.


    # ActiveMQ


    Apache ActiveMQ is an open source messaging and integration patterns server. ActiveMQ
    is fast and supports many cross-language clients and protocols, and it comes with
    easy-to-use enterprise integration patterns and many advanced features. ActiveMQ
    fully supports JMS 1.1 and J2EE 1.4 and is released under the Apache 2.0 License.
    ActiveMQ is available for download from [`http://activemq.apache.org/`](http://activemq.apache.org/).


    The main distinguishing feature of ActiveMQ is its support for a variety of cross-language
    clients and protocols including Java, C, C++, C#, Ruby, Perl, Python, and PHP.
    ActiveMQ supports the following protocols, among others:


    - OpenWire for high performance clients in Java, C, C++, and C#

    - Stomp support so clients can be written easily in C, Ruby, Perl, Python, PHP,
    ActionScript/Flash, and Smalltalk to talk to ActiveMQ as well as any other popular
    message broker

    - AMQP v1.0 support

    - MQTT v3.1 support allowing for connections in an IoT environment


    ## Install and Configure ActiveMQ


    ActiveMQ is available for download at [`http://activemq.apache.org/download.html`](http://activemq.apache.org/download.html).
    Detailed installation instructions are also available at [`http://activemq.apache.org/getting-started.html#GettingStarted-InstallationProcedureforWindows`](http://activemq.apache.org/getting-started.html%2523GettingStarted-InstallationProcedureforWindows).
    Download the ActiveMQ installation file named `apache-activemq-5.13.3-bin.zip`.
    From the zip file, extract the folder named `apache-activemq-5.13.3` into `C:\Program
    Files\ActiveMQ` (or somewhere suitable for application files).


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3

    ```


    ## Start Using ActiveMQ


    You can start ActiveMQ Server via the following command:


    ```

    cd D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3\bin

    D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3\bin>activemq start

    ```


    Listing [F-1](#477630_1_En_25_Chapter.xhtml#PC3) shows ActiveMQ getting started.'
