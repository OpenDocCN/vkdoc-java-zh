- fmt: "### Extensible Microservices\n\nMost applications are built with a predicted\
    \ end of life (EoL). Even if this EoL is too far in the future, applications keep\
    \ evolving in terms of functional capability as well as non-functional capability.\
    \ As a business expands and as new acquisitions and mergers happen, applications\
    \ must be altered as well as extended. To extend or alter a monolith is more risky\
    \ than to do it to microservices architecture. This is because, just like the\
    \ manner by which we enabled selective scalability to microservices architecture,\
    \ we can also extend or alter microservices selectively. This brings a lot of\
    \ relief to application developers and the operations team.\n\nI would like to\
    \ borrow the “honeycomb analogy” used by Rajesh R. V. in his book “Spring Microservices”\
    \ (Packt Publishing). Figure [3-7](#477630_1_En_3_Chapter.xhtml#Fig7) shows my\
    \ own representation.\n\n![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig7_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7** Microservices: The honeycomb analogy\n\nFigure [3-7](#477630_1_En_3_Chapter.xhtml#Fig7)\
    \ represents how a bee builds a honeycomb. It starts by building the first cell\
    \ and then keeps adding more and more cells to the honeycomb. So the honeycomb\
    \ grows over a period of time. The materials used to build the different cells\
    \ may not be the same; they differ based on what is available at the time of building\
    \ of that cell. However, each new cell blends well with the overall honeycomb,\
    \ and the honeycomb as a whole serves the functionality.\n\nThe microservices\
    \ architecture follows a similar analogy. Since we have already broken down the\
    \ application into many discrete pieces, we can start building one by one or a\
    \ selected few alone first and quickly deploy them into production. This brings\
    \ down the time to market considerably, and the business can start functioning\
    \ at a reduced scale. For example, in our e-commerce application we can build\
    \ the `Product` microservice first so that the product catalogue and the product\
    \ details are accessible initially to provide an early web presence for the enterprise.\
    \ We can add the `Order`, `Shipping`, and `Delivery` microservices to the application\
    \ next so that a bare minimum e-commerce application is ready and functional for\
    \ people to browse categories and do online orders. Maybe as a next step we can\
    \ build more functionality like a `Notification` microservice to send e-mail and\
    \ SMS-based notifications of order statuses as and when they change. The beauty\
    \ of the microservices architecture is that as we keep adding more and more microservices\
    \ to the application, we do not touch the existing microservices in the production\
    \ data center in any manner. They remain undisturbed, serving traffic. Of course\
    \ we need to take into consideration lot of concerns to get this into reality,\
    \ but that is the only aim of this book. So, as stated in the preface, I will\
    \ not cover too many basics or theories on microservices, since enough of that\
    \ is already available in other books on the topic. Instead, I will present a\
    \ pragmatic approach enabling you, the reader, to really dirty your hands with\
    \ the right skillsets to achieve the qualities discussed; selecting scalability\
    \ and the hot addition of microservices to an existing application are just few\
    \ among them.\n\n## Summary\n\nYou just touched upon few practical capabilities\
    \ needed in the microservices-based architecture if you want to get the real benefits\
    \ over the traditional monolith. You have learned about the concerns and have\
    \ been introduced to solution complexities one at a time so that your understanding\
    \ is gradual and continuous. Selective scalability and seamless extensibility\
    \ in production deployments are the deal makers for modern applications, which\
    \ cannot stand any amount of downtime. You have seen how that is possible conceptually\
    \ in this chapter. You will also see how to do this with actual code in later\
    \ chapters. But before that, let’s look at the bigger picture of where the microservices\
    \ concept came from and why it matters to today’s enterprises in the next chapter\
    \ on microservices architecture.\n\n# 4. Microservices Architecture\n\nAfter the\
    \ initial three chapters, you now have set a solid knowledge base to distinguish\
    \ between the microservices style of software architecture and the architecture\
    \ of a traditional monolith. You learned the technique of breaking down the monolith\
    \ into multiple small logical and physically separate groupings called microservices,\
    \ thereby improving the scale out capability in a flexible manner. While in the\
    \ traditional monolith schema of architecture you have one single, big application\
    \ to manage, the same application when redesigned into a microservices architecture\
    \ will be more than one single deployment and hence many more concerns like the\
    \ intermicroservice communications, will pop up. You will explore the details\
    \ of this new set of architectural concerns in this chapter. You will also explore\
    \ a few relevant trends in the software paradigm that have compelled software\
    \ architects to move away from traditional architectural styles.\n\nYou will learn\
    \ in detail the following in this chapter:\n\n- The digital context and the Mesh\
    \ App and Service Architecture (MASA)\n- Service granularity and where microservices\
    \ fit in\n- Domain-based partitioning for microservices\n- The cloud native shift\
    \ to address web scale scenarios\n- The cloud architecture and services model,\
    \ setting the environment for your deployment\n- Virtualization and containers,\
    \ and how they influence microservices\n- The macro and micro architecture perspective\
    \ of microservices\n\n## Architecture for Digital Business\n\nWe have evolved\
    \ from the era of mainframes to desktops to laptops to mobile, and the evolution\
    \ continues. The era of smartphones brought a hell of a lot of possibilities for\
    \ how a mobile device can become the intimate companion of an individual. We have\
    \ all skipped our lunches on some days either because of a meeting with our boss\
    \ or customers extended endlessly or a family emergency. But how many of us can\
    \ live for an hour without looking at the social apps or the chat apps on our\
    \ mobile? Devices have started to become so intimate and essential, just like\
    \ food, water, and air! This has brought new challenges for software developers.\
    \ I’ll explain more in this section.\n\n### The Digital Era\n\nThe human race\
    \ is now in the era of digital business. Gartner offers the following definition\
    \ of digital business:\n\n> *Digital business is the creation of new business\
    \ designs by blurring the digital and physical worlds.*\n> \n> —Gartner\n\nYou\
    \ can easily relate this definition to few real-world scenarios such as:\n\n-\
    \ You use `Google Maps` to lead you to your destinations by providing maps or\
    \ driving directions.\n- The Electronic Stability Program (ESP) in your cab improves\
    \ your car’s stability by detecting and reducing loss of traction (skidding) at\
    \ unexpected times.\n- People are starting to travel to space for recreational,\
    \ leisure, or business purposes.\n- `Skinput` provides an on-body finger input\
    \ system that is always available, naturally portable, and minimally invasive.\n\
    - Bionics makes brain-computer, the next user interface (UI), a reality by which\
    \ you can control artificial limbs.\n- Biochip implants aids in medical administrations.\n\
    - A smart tag can tell you if your $200 bottle of scotch has been opened by someone\
    \ else while you were away.\n\nThe list is endless. All each item on the list\
    \ brings newer challenges for the software architect. A decade back, desktop browsers\
    \ dominated at the client tier and we used them to access middle-tier services.\
    \ The smartphone changed that by bringing microbrowsers and native apps to the\
    \ list of client applications. Today we have the Internet of Things (IoT) and\
    \ Web of Things (WoT), and this keeps evolving and changing the software architecture\
    \ paradigm."
