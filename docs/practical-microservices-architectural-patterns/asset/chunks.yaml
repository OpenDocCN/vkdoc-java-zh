- fmt: "# Design Distributed Command Bus with Spring Cloud\n\nAs mentioned, refer\
    \ to the design illustrated in Figure [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4)\
    \ in Chapter [12](#477630_1_En_12_Chapter.xhtml). You should already be familiar\
    \ with the distributed command bus there. Unlike the other command bus implementations,\
    \ the distributed command bus does not invoke any handlers at all. All it does\
    \ is form a “bridge” between the command bus implementations on different JVMs.\n\
    \nThe distributed command bus consists of two components: a command bus connector\
    \ and a command router. A command bus connector implements the communication protocol\
    \ between the individual JVMs of the microservices whereas the command router\
    \ chooses a destination for each incoming command. The router defines to which\
    \ segment of the distributed command bus a command should be routed based on a\
    \ routing key calculated by a routing strategy. This asserts that two commands\
    \ with the same routing key will always be routed to the same segment, provided\
    \ there is no change in the number and configuration of the segments in the runtime.\n\
    \nIn the design in Chapter [12](#477630_1_En_12_Chapter.xhtml), you used a `JGroupsConnector`\
    \ which used JGroups as the underlying discovery and dispatching mechanism. The\
    \ JGroups-specific components for the distributed command bus are in the `axon-distributed-commandbus-jgroups`\
    \ module. Since JGroups handles both discovery of microservice nodes and the communication\
    \ between them, the `JGroupsConnector` acts as both a command bus connector and\
    \ a command router. There is another method for the interconnection and routing\
    \ between command buses using the Spring Cloud. You can use either Eureka or Consul\
    \ for this. Since you know how Eureka works from the “Eureka, the Service Registry”\
    \ section in Chapter [8](#477630_1_En_8_Chapter.xhtml), you will use it in your\
    \ refactored design for Axon 3.\n\nWhen you use Spring Cloud, the Spring Cloud\
    \ command router uses the Spring Cloud-specific `ServiceInstance.Metadata` field\
    \ to infer and inform all of the microservice nodes in the system of its message\
    \ routing information. So, to use it in conjunction with Axon, the Spring Cloud\
    \ implementation selected should support the usage of the `ServiceInstance.Metadata`\
    \ field. In cases where the desired Spring Cloud implementation does not support\
    \ the modification of the `ServiceInstance.Metadata` (e.g. Consul), there are\
    \ other alternate ways, which I will not describe here.\n\nThe easiest way for\
    \ you to use Spring Cloud Eureka is to use the Spring Cloud starters of the Axon\
    \ distributed command bus modules. Once the starter is included, a single property\
    \ needs to be added to the application context, to enable the distributed command\
    \ bus:\n\n```\naxon.distributed.enabled=true\n```\n\nThe next setting to be used\
    \ independent of the type of connector is:\n\n```\naxon.distributed.load-factor=100\n\
    ```\n\nBy doing so, Axon will configure a distributed command bus by default when\
    \ a command router as well as a command bus connector are present in the application\
    \ context. The Spring Cloud Connector setup is a combination of the Spring Cloud\
    \ command router and a Spring HTTP command bus connector; they fill the place\
    \ of the command router and the command bus connector, respectively, for the distributed\
    \ command bus. The Spring Cloud command router uses Spring Cloud’s Discovery Clients\
    \ to propagate its command message routing information and to discover other Axon\
    \ microservices nodes and retrieve their message routing information. It does\
    \ so by utilizing the `ServiceInstance.Metadata` for storing the message routing\
    \ information in. For performance reasons, any other nodes discovered through\
    \ the Discovery Client system that do not contain any of the required message\
    \ routing information fields will be black-listed, so no unneeded additional checks\
    \ are performed on that node.\n\nThe Spring HTTP command bus connector will send\
    \ the given command to the node assigned to handle messages with the given routing\
    \ key. The sender does not expect a reply, so if the send method throws an exception,\
    \ the sender is guaranteed that the destination of the command did not receive\
    \ it. If the method returns normally, the concrete implementation of the connector\
    \ defines the delivery guarantees. Since connectors route the commands based on\
    \ the given routing key, using the same routing key will result in the command\
    \ being sent to the same member. Further, each message must be sent to exactly\
    \ one member.\n\nAnother aspect you need to handle while using the Spring Cloud\
    \ command router is that your Spring application should have heartbeat events\
    \ enabled. The Spring Cloud command router implementation leverages the heartbeat\
    \ events published by your Spring Cloud microservices to check whether its knowledge\
    \ of all the others nodes is up to date. Hence, if heartbeat events are disabled,\
    \ the microservices within your cluster will not be aware of the entire setup,\
    \ thus posing issues for correct command routing.\n\nFigure [12-5](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5)\
    \ thus becomes Figure [19-1](#477630_1_En_19_Chapter.xhtml#Fig1).\n\n![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg](images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg)\n\
    \n**Figure 19-1.** Distributed command bus using Spring Cloud\n\nYou will next\
    \ look at the code. I will highlight any subtle differences.\n\n## Code the Example\
    \ Scenario\n\nThe complete code required to demonstrate the distributed Axon example\
    \ is in `ch19\\ch19-02`. There were five microservices in the example code in\
    \ Chapter [12](#477630_1_En_12_Chapter.xhtml). You will add a new microservice\
    \ for the Eureka-based service registry.\n\n### Microservice 1: 00-Ecom-registry\n\
    \nThis microservice is a typical Spring Cloud Eureka microservice application\
    \ without any Axon components, which you have already seen in many previous examples,\
    \ so I will not discuss it further.\n\n### Microservice 2: 01-Ecom-web\n\nThis\
    \ microservice is a typical Spring Boot web application, again without any Axon\
    \ components, so I will not discuss it further.\n\n### Microservice 3: 02-Ecom-CreateCommandRestController\n\
    \nVisit `pom.xml` to see the `axon-distributed-commandbus` dependency. See Listing\
    \ [19-5](#477630_1_En_19_Chapter.xhtml#PC8).\n\n```xml\n<parent>\n    <groupId>org.springframework.boot</groupId>\n\
    \    <artifactId>spring-boot-starter-parent</artifactId>\n    <version>2.0.3.RELEASE</version>\n\
    </parent>\n\n<properties>\n    <axonVersion>5.0.7.RELEASE</axonVersion>\n    <springCloudVersion>3.3.2</springCloudVersion>\n\
    </properties>\n\n<dependencies>\n    <dependency>\n        <groupId>org.axonframework</groupId>\n\
    \        <artifactId>axon-spring-boot-starter</artifactId>\n        <version>${axonVersion}</version>\n\
    \    </dependency>\n    <dependency>\n        <groupId>org.axonframework</groupId>\n\
    \        <artifactId>axon-distributed-commandbus-springcloud</artifactId>\n  \
    \      <version>${axonVersion}</version>\n    </dependency>\n    <dependency>\n\
    \        <groupId>org.springframework.cloud</groupId>\n        <artifactId>spring-cloud-starter-netflix-eureka-client</artifactId>\n\
    \    </dependency>\n</dependencies>\n\n<dependencyManagement>\n    <dependencies>\n\
    \        <dependency>\n            <groupId>org.springframework.cloud</groupId>\n\
    \            <artifactId>spring-cloud-dependencies</artifactId>\n            <version>Finchley.RELEASE</version>\n\
    \            <type>pom</type>\n            <scope>import</scope>\n        </dependency>\n\
    \    </dependencies>\n</dependencyManagement>\n```\n\n**Listing 19-5** Distributed\
    \ Command Bus Maven Dependency (`ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    02-Ecom-CreateCommandRestController\\pom.xml`)\n\nYou use the `axon-distributed-commandbus-springcloud`\
    \ module that contains the Spring Cloud Connector-specific components for the\
    \ distributed command bus."
  raw: 'Design Distributed Command Bus with Spring

    Cloud

    As mentioned, refer to the design illustrated in

    Figure [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4) in Chapter [12](#477630_1_En_12_Chapter.xhtml).
    You should already be familiar

    with the distributed command bus there. Unlike the other command bus

    implementations, the distributed command bus does not invoke any

    handlers at all. All it does is form a “bridge” between the command bus

    implementations on different JVMs.

    The distributed

    command bus consists of two components: a command bus connector

    and a command router. A command bus connector

    implements the communication protocol between the individual JVMs of the

    microservices whereas the command router chooses

    a destination for each incoming command. The router defines to which

    segment of the distributed command bus a command should be routed based

    on a routing key calculated by a routing strategy. This asserts that two

    commands with the same routing key will always be routed to the same

    segment, provided there is no change in the number and configuration of

    the segments in the runtime.

    In the design in Chapter [12](#477630_1_En_12_Chapter.xhtml), you used a JGroupsConnector

    which used JGroups as the underlying discovery and dispatching

    mechanism. The JGroups-specific components for the distributed command

    bus are in the axon-distributed-commandbus-jgroups module. Since JGroups

    handles both discovery of microservice nodes and the communication

    between them, the JGroupsConnector acts as both a command bus connector

    and a command router. There is another method for the interconnection

    and routing between command buses using the Spring Cloud. You can use

    either Eureka or Consul for this. Since you know how Eureka works from

    the “Eureka, the Service Registry” section in Chapter [8](#477630_1_En_8_Chapter.xhtml),
    you will use it in your

    refactored design for Axon 3.

    When you use Spring Cloud, the Spring Cloud command router uses the

    Spring Cloud-specific ServiceInstance.Metadata field to infer and inform

    all of the microservice nodes in the system of its message routing

    information. So, to use it in conjunction with Axon, the Spring Cloud

    implementation selected should support the usage of the

    ServiceInstance.Metadata field. In cases where the desired Spring Cloud

    implementation does not support the modification of the

    ServiceInstance.Metadata (e.g. Consul), there are other alternate ways,

    which I will not describe here.


    The easiest way for you to use Spring Cloud Eureka is to use the Spring

    Cloud starters of the Axon distributed command bus modules. Once the

    starter is included, a single property needs to be added to the

    application context, to enable the distributed command bus:


    ```

    axon.distributed.enabled=true

    ```


    The next setting to be used independent of the type of connector is


    ```

    axon.distributed.load-factor=100

    ```


    By doing so, Axon will configure a distributed command bus by default

    when a command router as well as a command bus connector are present in

    the application context. The Spring Cloud Connector setup is a

    combination of the Spring Cloud command

    router and a Spring HTTP command bus

    connector; they fill the place of the command router and the

    command bus connector, respectively, for the distributed command bus.

    The Spring Cloud command router uses Spring Cloud’s Discovery Clients to

    propagate its command message routing information and to discover other

    Axon microservices nodes and retrieve their message routing information.

    It does so by utilizing the ServiceInstance.Metadata for storing the

    message routing information in. For performance reasons, any other nodes

    discovered through the Discovery Client system that do not contain any

    of the required message routing information fields will be black-listed,

    so no unneeded additional checks are performed on that node.

    The Spring HTTP command bus connector will send the given command to

    the node assigned to handle messages with the given routing key. The

    sender does not expect a reply, so if the send method throws an

    exception, the sender is guaranteed that the destination of the command

    did not receive it. If the method returns normally, the concrete

    implementation of the connector defines the delivery guarantees. Since

    connectors route the commands based on the given routing key, using the

    same routing key will result in the command being sent to the same

    member. Further, each message must be sent to exactly one member.

    Another aspect you need to handle while using the Spring Cloud

    command router is that your Spring application should have heartbeat

    events enabled. The Spring Cloud command router implementation leverages

    the heartbeat events published by your Spring Cloud microservices to

    check whether its knowledge of all the others nodes is up to date.

    Hence, if heartbeat events are disabled, the microservices within your

    cluster will not be aware of the entire setup, thus posing issues for

    correct command routing.


    Figure [12-5](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5) thus becomes
    Figure [19-1](#477630_1_En_19_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg](images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg)


    Figure 19-1.

    Distributed command bus using Spring Cloud


    You will next look at the code. I will highlight any subtle differences.


    Code the Example Scenario

    The complete code required to demonstrate the distributed Axon

    example is in `ch19\ch19-02`. There

    were five microservices in the example code in Chapter [12](#477630_1_En_12_Chapter.xhtml).
    You will add a new microservice

    for the Eureka-based service registry.


    Microservice 1: 00-Ecom-registry

    This microservice is a typical Spring Cloud Eureka microservice

    application without any Axon components, which you have already seen in

    many previous examples, so I will not discuss it further.


    Microservice 2: 01-Ecom-web

    This microservice is a typical Spring Boot web application, again

    without any Axon components, so I will not discuss it further.


    Microservice 3:

    02-Ecom-CreateCommandRestController


    Visit `pom.xml`

    to see the axon-distributed-commandbus dependency. See Listing [19-5](#477630_1_En_19_Chapter.xhtml#PC8)
    .


    ```


    org.springframework.boot

    spring-boot-starter-parent

    2.0.3.RELEASE


    5.0.7.RELEASE

    3.3.2


    org.axonframework

    axon-spring-boot-starter

    ${axonVersion}


    org.axonframework

    axon-distributed-commandbus-springcloud

    ${axonVersion}


    org.springframework.cloud

    spring-cloud-starter-netflix-eureka-client


    org.springframework.cloud

    spring-cloud-dependencies

    Finchley.RELEASE

    pom

    import


    Listing 19-5

    Distributed Command Bus Maven Dependency (ch19\ch19-02\Ax3-Commands-Multi-Event-Handler-Distributed\02-Ecom-CreateCommandRestController\pom.xml)

    ```


    You use the axon-distributed-commandbus-springcloud

    module that contains the Spring Cloud Connector-specific components for

    the distributed command bus.'
  trans: '

    使用 Spring Cloud 设计分布式命令总线

    如前所述，请参考第 [12](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4) 章中图 [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4)
    所示的设计。您应该已经熟悉了其中的分布式命令总线。与其他命令总线实现不同，分布式命令总线根本不会调用任何处理器。它所做的只是在不同 JVM 上的命令总线实现之间形成一个“桥梁”。


    分布式命令总线由两个组件组成：一个命令总线连接器和一个命令路由器。命令总线连接器实现了微服务各个 JVM 之间的通信协议，而命令路由器则为每个传入的命令选择一个目标。路由器根据由路由策略计算出的路由键，决定命令应被路由到分布式命令总线的哪个段。这确保了只要运行时段的数目和配置没有变化，具有相同路由键的两个命令将始终被路由到同一个段。


    在第 [12](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4) 章的设计中，您使用了 `JGroupsConnector`，它使用
    JGroups 作为底层的发现和调度机制。分布式命令总线中与 JGroups 相关的组件位于 `axon-distributed-commandbus-jgroups`
    模块中。由于 JGroups 既处理微服务节点的发现，也处理它们之间的通信，因此 `JGroupsConnector` 同时充当了命令总线连接器和命令路由器。还有另一种使用
    Spring Cloud 实现命令总线之间互连和路由的方法。您可以为此使用 Eureka 或 Consul。由于您已经从第 [8](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#4)
    章的“Eureka，服务注册中心”一节了解了 Eureka 的工作原理，您将在重构后的 Axon 3 设计中使用它。


    当您使用 Spring Cloud 时，Spring Cloud 命令路由器会利用 Spring Cloud 特有的 `ServiceInstance.Metadata`
    字段来推断并告知系统中所有微服务节点其消息路由信息。因此，为了与 Axon 结合使用，所选的 Spring Cloud 实现应支持 `ServiceInstance.Metadata`
    字段的使用。如果所需的 Spring Cloud 实现不支持修改 `ServiceInstance.Metadata`（例如 Consul），还有其他替代方法，此处不再赘述。


    使用 Spring Cloud Eureka 最简单的方法是使用 Axon 分布式命令总线模块的 Spring Cloud 启动器。一旦包含了启动器，只需在应用程序上下文中添加一个属性即可启用分布式命令总线：


    ```

    axon.distributed.enabled=true

    ```


    下一个独立于连接器类型使用的设置是：


    ```

    axon.distributed.load-factor=100

    ```


    通过这样做，当应用程序上下文中同时存在命令路由器和命令总线连接器时，Axon 将默认配置一个分布式命令总线。Spring Cloud 连接器设置是 Spring
    Cloud 命令路由器和 Spring HTTP 命令总线连接器的组合；它们分别充当分布式命令总线的命令路由器和命令总线连接器。Spring Cloud 命令路由器使用
    Spring Cloud 的 Discovery Clients 来传播其命令消息路由信息，并发现其他 Axon 微服务节点并检索它们的消息路由信息。它通过利用
    `ServiceInstance.Metadata` 来存储消息路由信息来实现这一点。出于性能原因，任何通过 Discovery Client 系统发现的、不包含任何所需消息路由信息字段的其他节点将被列入黑名单，从而避免对该节点执行不必要的额外检查。


    Spring HTTP 命令总线连接器会将给定的命令发送到被分配处理具有给定路由键消息的节点。发送方不期望收到回复，因此如果 `send` 方法抛出异常，则可以保证命令的目标节点未收到该命令。如果方法正常返回，则连接器的具体实现定义了交付保证。由于连接器基于给定的路由键路由命令，使用相同的路由键将导致命令被发送到同一个成员。此外，每条消息必须恰好发送给一个成员。


    在使用 Spring Cloud 命令路由器时，您需要处理的另一个方面是，您的 Spring 应用程序应启用心跳事件。Spring Cloud 命令路由器实现利用您的
    Spring Cloud 微服务发布的心跳事件来检查其对所有其他节点的了解是否是最新的。因此，如果禁用了心跳事件，集群内的微服务将无法感知整个设置，从而给正确的命令路由带来问题。


    因此，图 [12-5](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5) 变成了图 [19-1](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5)。


    ![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig1_HTML.jpg](img/477630_1_En_19_Fig1_HTML.jpg)


    图 19-1.

    使用 Spring Cloud 的分布式命令总线


    接下来您将查看代码。我将指出任何细微的差别。


    编写示例场景的代码

    演示分布式 Axon 示例所需的完整代码位于 `ch19\ch19-02` 中。在第 [12](https://doi.org/10.1007/978-1-4842-4501-9_12Fig#5)
    章的示例代码中有五个微服务。您将添加一个新的微服务用于基于 Eureka 的服务注册中心。


    微服务 1：00-Ecom-registry

    该微服务是一个典型的 Spring Cloud Eureka 微服务应用程序，不包含任何 Axon 组件，您已经在之前的许多示例中看到过，因此不再赘述。


    微服务 2：01-Ecom-web

    该微服务是一个典型的 Spring Boot Web 应用程序，同样不包含任何 Axon 组件，因此不再赘述。


