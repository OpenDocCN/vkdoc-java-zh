    高可用性（HA）描述了软件服务可用的时间段，以及这些系统响应用户请求所需的时间。消除基础设施中可能导致服务中断的单点故障是设计高可用性系统的关键。在每一层和每个阶段复制或设计冗余组件对于实现端到端的高可用性至关重要。第
    [4](#477630_1_En_4_Chapter.xhtml) 章的“外部架构视角”部分讨论了微服务架构的外部架构问题。上一章中的各个部分和示例为您提供了解决第
    [4](#477630_1_En_4_Chapter.xhtml) 章中部分问题的具体方案。您了解了如何启动多个微服务实例。您还在上一章中启动了多个 Eureka
    实例。在本章中，您将进一步探索高可用性的一般细节，特别是微服务的高可用性。您还将看到一个全面的示例，演示微服务架构的端到端高可用性。


    您将在本章中学习以下内容：


    *   定义和衡量高可用性

    *   从 DNS 查找到存储备份，分解每一层的高可用性

    *   在微服务背景下重新审视高可用性方面

    *   使用微服务和 Spring Cloud 实现高可用性的代码演示


    ### 高可用性


    高可用性规划涉及识别业务连续性所必需的服务。应识别构成每个服务的组件，并列出这些系统可能的故障点。应为每个组件建立故障容忍基线，并设计故障转移策略。


    ### 衡量高可用性


    软件可用性以年度正常运行时间的百分比表示。以几乎无法实现的 100% 可用性为基准，最高级别的服务可用性目标被认为是“五个九”，即 99.999% 的可用性。


    停机时间（通常以每年的中断分钟数表示）是表示可用性的另一种方式。表 [9-1](#477630_1_En_9_Chapter.xhtml#Tab1) 显示了不同可用性级别的比较。


    **表 9-1** 可用性级别


    | 可用性 | 不可用性 | 五个九 | 每年停机时间 |

    | :--- | :--- | :--- | :--- |

    | 0.9 | 0.1 | 1 | 36 天 |

    | 0.99 | 0.01 | 2 | 87.7 小时 |

    | 0.999 | 0.001 | 3 | 8 小时 46 分钟 |

    | 0.9999 | 0.0001 | 4 | 52.5 分钟 |

    | 0.99999 | 0.00001 | 5 | 5 分钟 16 秒 |

    | 0.999999 | 0.000001 | 6 | 32 秒 |'
