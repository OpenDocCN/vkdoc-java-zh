  trans: "\n图 16-3  \n解决数据库瓶颈的架构  \n\n参考图 16-3 所示的架构，建议采用两节点或三节点集群以提高可靠性。四节点及以上的集群也可用于实现额外的高可用性或性能提升。包含多个两节点或三节点数据库集群的四节点及以上网格基础架构集群也是可行的。集群中的节点可以位于同一个可用区，也可以跨可用区分布。\
    \  \n\n大多数 AWS 区域仅限三个可用区。图 16-3 展示了三个 RAC 节点。将仲裁节点与 RAC 节点部署在同一可用区，仍能实现大部分预期的高可用性功能。这种三节点集群能够容忍任意两个节点或任意一个可用区的故障，而不会导致数据库停机。然而，若同时丢失两个可用区，则会导致数据库停机。在采用本地\
    \ NVMe SSD^(⁴¹)而非 EBS（弹性块存储）卷的配置中，可使用高冗余 ASM^(⁴²)（自动存储管理）磁盘组来提供额外的数据保护层。此时，第三个节点将配置为配备\
    \ NVMe SSD 或 EBS 卷的存储节点，而非仲裁节点。将实例部署在不同可用区可消除节点同时故障的风险，除非发生影响区域内多个数据中心设施的罕见灾难事件。\
    \  \n\n完成此类集群搭建后，下一步是将负载分发至 RAC 集群。该架构利用了 Oracle Clusterware、ASM 和数据库内置的高可用性功能。如图\
    \ 16-3 所示，来自可用区内微服务实例的数据库调用，也可路由至跨可用区的数据库实例池。其权衡在于节点间网络延迟较高且网络带宽相对较低。是否还有进一步优化的空间？\
    \  \n\n**独立读写扩展性以提升效率**  \n\n在上一节基于 RAC 的架构中，我讨论了如何通过跨多个可用区扩展 RAC 来增加冗余。当您这样做时，还需要在架构上管理节点间较高的网络延迟和相对较低的带宽。图\
    \ 16-4 所示的架构变体提供了其中一种方案。  \n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig4_HTML.jpg](img/477630_1_En_16_Fig4_HTML.jpg)\
    \  \n\n图 16-4  \n提升读取扩展性的数据架构  \n\n在许多场景中，读取请求或查询的数量远超应用程序需要处理的总写入请求数。您已在第 12\
    \ 章探讨了“浏览与预订比率”这一概念。图 16-4 中的架构选项采用了主数据库节点和辅助（备用）数据库节点的概念。它利用 Oracle Data Guard\
    \ 复制^(⁴³)（ODGR）和 Oracle Active Data Guard 复制（OADGR）来实现主备节点概念。通过 Oracle Active\
    \ Data Guard 实现跨多个可用区的负载分发。使用 Active Data Guard 进行复制，允许将复制的备用实例用于只读负载，从而实现负载分发。这在图\
    \ 16-4 中显而易见：所有读取请求均路由至各自可用区内的备用节点。通过这种方式，主节点不会因跨可用区的微服务读取请求而负载过重。相反，所有写入请求现在均可路由至主节点。如图所示，即使来自其他可用区的写入请求也可路由至主节点。此外，如果主实例发生故障，该架构会迅速切换到同一可用区内的第二个实例，确保数据库持续可用并防止数据丢失。如果主可用区发生故障，或主可用区内的主实例和辅助实例同时故障，该架构会切换到辅助可用区内的第三个实例，从而保持数据库可用并防止数据丢失。使用\
    \ Active Data Guard 进行复制，允许第二和第三个实例同时用于只读工作负载。备用数据库是 Oracle 主生产数据库的事务一致性副本，最初由主数据库的备份副本创建。一旦创建并配置好备用数据库，Oracle\
    \ Active Data Guard 会自动通过将主数据库的重做数据传输到备用系统来维护备用数据库，并在备用系统上应用重做数据。主数据库与备用数据库之间的复制可配置为同步或异步模式。\
    \  \n\nOracle Data Guard 不支持设置只读副本，因为物理备用数据库无法在从主数据库归档事务的同时打开用于读取——它只能在托管恢复模式或只读模式下运行，无法同时处于两种模式。基于\
    \ Oracle Data Guard 构建的 Oracle Active Data Guard 是一个允许设置只读副本的选项。除前述功能外，Oracle\
    \ Active Data Guard 还允许对备用数据库进行只读访问，同时通过从主数据库归档事务来保持其数据更新。这使得您可以在备用实例上运行读取查询和报表，并从备用实例执行备份。在此类架构中，通常通过使用\
    \ EBS 快照到 Amazon S3，或使用 Oracle 恢复管理器^(⁴⁴)（RMAN）和 Oracle 安全备份云模块（OSB）来执行数据备份。 \
    \ \n\n**面向 Web 规模架构的分片**  \n"
- fmt: 'Having managed to separate the management of write scalability from that of
    read scalability, it’s yet not time for you to rest and relax. Sooner or later
    you will start to feel that your separated read nodes or if your business is too
    successful (like many businesses today), even your write nodes by themselves are
    putting limitations, many times due to the sheer volume of transactions it has
    to handle or due to the volume of data it has to manage. This is especially true
    when enterprises operate globally and open up their applications for global customer
    use. Many social network applications and messaging applications fall in this
    category, which are to be web scale. “Divide and rule” is the mantra, and sharding
    is one such approach. Sharding can be applied to a services layer or a data layer.
    The architecture in Figure [16-5](#477630_1_En_16_Chapter.xhtml#Fig5) shows one
    such concept.


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig5_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig5_HTML.jpg)


    **Figure 16-5** Data architecture to improve read scalability


    The concept of a sharding architecture is that you will have many nodes so that
    all or few of the nodes will also have redundant data and then each node will
    have unique tokens and you use those tokens to divide upon the entire data to
    write and read to and from the database. Refer to Figure [16-5](#477630_1_En_16_Chapter.xhtml#Fig5),
    and I will use an analogy. Suppose your application is similar to the popular
    social networking application we use today. You know there are too many users
    in the system and there are too many user actions that you want to manage in your
    application. If both of my daughters, Ann and Ria, are users in the application
    along with many other millions of users, one easy way to design the token is to
    go with the alphabet and divide the users into nodes based on the first initial
    of their name. There are nodes or cluster of nodes dedicated to handle requests
    and data for users whose names start with letters A-H and similarly another set
    of nodes or cluster of nodes dedicated to handle requests and data for users whose
    names start with I-Q, and so on. The assumption is that transactions as well as
    data will be distributed more or less equal across these nodes or cluster of nodes,
    and you only need to manage the scalability within a single node or a single cluster
    of node in one go. You could design how many such nodes or clusters your application
    is ever going to need and design the number of nodes (or partitions) and subsequently
    the tokens accordingly. You may use any other schema to design your sharding topology;
    however, the idea is the same. You could shard both your microservices layer as
    well as your data layer, in which case your `ELB` should have little intelligence
    to route requests to appropriate microservice instance.


    ## Good Architecture, But We Need Better and Simpler


    Having seen the different options available with Oracle database as the database
    solution, let’s consider alternate options! All of the solution templates you
    saw previously exists to solve different problems at hand, and whether to use
    them or not is an architectural decision to be made by considering many aspects
    including the enterprise’s long-term technology strategy. Throughout the book
    I have been talking about the importance of polyglot (data) architecture and the
    importance of each microservice governing its own data completely. Going by that,
    you also want to think about architectures that can provide similar scalability
    and availability grades but without depending too much on any specific vendor’s
    costly stack.


    Microservices architecture by themselves are a way of functionally decomposing
    systems into many separate pieces so that you can better manage the availability
    and scalability of each piece independently. Then you have sharding to further
    manage volumes. With or without shards, you can also look at separating read from
    writes, and the `CQRS` introduced in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    is apt for that. The combination of the right principles will help you to web
    scale.


    ## Highly Available and Scalable CQRS Example in Axon


    Leaving behind the various vendor offerings from the previous section in defining
    HA templates, you will return to Axon CQRS, which was introduced in Chapter [12](#477630_1_En_12_Chapter.xhtml).
    There you looked at a working code where you completely distribute the different
    Axon components across JVMs. Since that example was distributed across processes,
    you can practically distribute them across nodes too; however, you demonstrated
    the examples with each Axon processor in a single node for simplicity. In the
    current example, you are going to distribute them into multiple instances of Axon
    components to validate how to bring redundancy and subsequently HA and scalability
    to an Axon-based CQRS architecture.


    ### Design the Sample Scenario


    You are going to follow the same design as in the “Distributed Command and Event
    Handling” section in Chapter [12](#477630_1_En_12_Chapter.xhtml), so I won’t repeat
    all the explanations. There are two entities in your domain, the order and the
    product. Users can buy a product, which will create a new order. When a new order
    is created, the product stock will get depreciated. Just that. Revisit that section
    to get a detailed overview of the architecture of the business scenario you are
    going to execute in the example here.


    You will extend the deployment architecture of the example in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    to bring redundancy. You may want to refer to the section titled “Design a Microservice
    HA Scenario” in Chapter [9](#477630_1_En_9_Chapter.xhtml) where you already demonstrated
    the high availability concepts in Spring Cloud. You will follow a similar deployment
    topology in the current example; however, to make the overall complexity of the
    example within a certain limit and to concentrate on the point of discussion,
    HA and scalability in Axon CQRS components alone, you will omit the Spring Cloud
    components from current example, and the deployment architecture will be as shown
    in Figure [16-6](#477630_1_En_16_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig6_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig6_HTML.jpg)


    **Figure 16-6** Demo of high availability for Axon CQRS


    The major change in current deployment architecture from that of the sample in
    the corresponding section in Chapter [12](#477630_1_En_12_Chapter.xhtml) is that
    the microservices hosting the command creators, command handlers, event creators,
    and event handlers are instantiated more than once. Hence the deployment ecosystem
    has the following characteristics:


    *   There is more than one type of event handlers interested in the same kind
    of event.'
