    The request call will pass through above function once during a user session,
    when the user wants to log in. You do two things here:


    1. First, you invoke the authentication flow, supplying the user credentials and
    the `client_id` as a request parameter.

    2. If the above authentication request is successful, you first retrieve the reference
    token from the response and cache it in the session storage so that the same can
    be supplied along with request parameters in cases where you need to access any
    server-side protected resource. As a next step, you invoke the customer end point
    to retrieve the full details of the logged-in user.


    This completes the minimal information for you to understand the critical flows
    involved on the web app side to implement security.


    ## Zuul, the API Gateway as OAuth Client


    Security is handled using Zuul filters. You use both a pre-filter and a post-filter
    to Zuul. A Zuul pre-filter is invoked before Zuul delegates the request to the
    actual resource server. See Listing [18-8](#477630_1_En_18_Chapter.xhtml#PC12).'
