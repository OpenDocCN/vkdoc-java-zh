- fmt: "# High Availability and Scalability Templates Using an Oracle DB as a Reference\n\
    \nAs mentioned, you will use an Oracle database as a solution to explain various\
    \ HA templates. While doing so, you will also use the public cloud, Amazon Web\
    \ Services (AWS) in your case, as the deployment environment. This is because,\
    \ as you will shortly see, there are some caveats to the templates, which I will\
    \ explain when it comes to the public cloud. You will consider the application\
    \ architecture as a life cycle, each stage of the cycle representing the various\
    \ stages of growth, from inception until the level when the architecture reaches\
    \ maturity and operates at economies and efficiencies of scale, and further beyond\
    \ where you need to web scale at an exponential or infinite level.\n\n## The Simple,\
    \ Inception Architecture\n\nThis is the simplest form of any distributed or microservices\
    \ architecture and will suit only for serving application services for personal\
    \ use or for the use of small start-ups. In its basic form, it consists of a middle\
    \ tier providing application services, and this middle tier connects to a single,\
    \ simple database instance for persistence services. Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1)\
    \ depicts how this looks when deployed in a public cloud, Amazon Web Services.\n\
    \n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg)\n\
    \n**Figure 16-1** The simple inception architecture\n\nThere is a single instance\
    \ of the middle tier or the microservices and then there is another single instance\
    \ of a database server. Scalability of this architecture is determined by the\
    \ underlying hardware capacity, which in your case will depend on the grade of\
    \ `EC2` instance selected. Amazon Elastic Compute Cloud (Amazon EC2) is a web\
    \ service that provides secure, resizable compute capacity in the cloud. It is\
    \ integrated with most AWS services such as Amazon Simple Storage Service (Amazon\
    \ S3), Amazon Relational Database Service (Amazon RDS), and Amazon Virtual Private\
    \ Cloud (Amazon VPC) to provide an infrastructure solution for computing, query\
    \ processing, and cloud storage across a wide range of applications.\n\nAs the\
    \ number of users interfacing with the application grows or when the number of\
    \ concurrent transactions to be served by this architecture increases, the capacity\
    \ to scale out is solely dependent on the capacity of the available `EC2` instance\
    \ you can choose from. This is limited, and this scalability limitation is inherent\
    \ with the design of such an architecture approach.\n\nWith respect to Figure\
    \ [16-1](#477630_1_En_16_Chapter.xhtml#Fig1), a few components require quick introduction,\
    \ since they will be referred to in subsequent discussions:\n\n- **Virtual private\
    \ cloud (VPC)**: A logically isolated virtual network spanning an entire AWS region\
    \ where your `EC2` instances are launched. A `VPC` is primarily concerned with\
    \ enabling the following capabilities:\n  - Isolating your AWS resources from\
    \ the resources of other accounts\n  - Routing network traffic to and from your\
    \ instances\n  - Protecting your instances from network intrusion and other vulnerabilities\n\
    \n- **AWS regions and availability zones**: The AWS cloud infrastructure is built\
    \ around regions and availability zones (AZs). AWS regions provide multiple, physically\
    \ separated, and isolated availability zones which are connected with low latency,\
    \ high throughput, and highly redundant networking. These availability zones offer\
    \ a more highly available, fault tolerant, and scalable infrastructure than traditional\
    \ single datacenter infrastructures or multi-datacenter infrastructures. AWS regions\
    \ are completely isolated from other AWS regions. The AWS cloud currently spans\
    \ 54 availability zones within 18 geographic regions and one local region around\
    \ the world. An AWS region is depicted in Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1)\
    \ whereas an availability zone will be shown in next section where it’s relevant.\n\
    \n## The Simple, Scaled Out Architecture\n\nThe simple inception architecture\
    \ described in the previous section is a bare minimum, and is the one with less\
    \ hassles. If circumstances permit, you may want to live with that minimalist\
    \ architecture, since it will give you peace of mind. However, if your business\
    \ is successful with that architecture, that in a sense implies that you are going\
    \ to need an enhanced architecture for scalability, since a growing business can\
    \ in no way be served by the above minimalist architecture. The simple, scaled\
    \ out architecture is shown in Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2).\n\
    \n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg)\n\
    \n**Figure 16-2** The simple, scaled out architecture"
