    \ avoided the need for two-phase commit transactions; instead,\nit shifted the\
    \ necessity from downstream to upstream!\n\nDistributed Transactions Example:\
    \ Refactoring\nTowards Less ACID\n\nIn the “Idempotent\nOperations and Microservices”\
