    Order Created Event (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\order\api\event\OrderCreatedEvent.java)

    ```


    Now look at the event handlers capable of handling these events. If you

    recollect, for command handling, a type of command can be handled by

    only one type of command handler. However, for event handling, a type of

    event may be handled by zero or more types of event handlers. This is

    synonymous to the publish-subscribe pattern using a message topic where

    a message may be consumed by more than one subscriber. More on this

    later; let’s now look at the code for the event handlers in Listing

    [12-11](#477630_1_En_12_Chapter.xhtml#PC11).


    ```

    @Component

    public class OrderEventHandler {

    @Autowired

    DataSource dataSource;

    @EventHandler

    public void handleOrderCreatedEvent(OrderCreatedEvent event) {

    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);

    jdbcTemplate.update("INSERT INTO ecom_order_view VALUES(?,?,?,?,?)",

    new Object[]{event.getId(),

    event.getPrice(), event.getNumber(), event.getProductDescription(),

    event.getOrderStatus()});

