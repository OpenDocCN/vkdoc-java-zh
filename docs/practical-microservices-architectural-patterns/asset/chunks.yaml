    已取消的订单


    恢复库存


    订单一旦被取消，如果你查看相应的产品详情页，你会看到库存已恢复，与取消订单对应的商品数量将可以再次下单，如图 17-41 所示。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig41_HTML.jpg](img/477630_1_En_17_Fig41_HTML.jpg)


    图 17-41

    因取消而恢复库存


    总结


    在本章中，你在基于 CQRS 的微服务之旅中取得了很大进展。现在，你已经掌握了所有基本工具，可以使用事件驱动型微服务构建任何规模的企业级应用程序。但是，有两点需要注意：


    *   你尚未在你的电子商务微服务应用程序中实现安全性（身份验证和授权）。


    *   你将两个领域实体放在一起以保持强数据一致性；否则，它们本应被分离到各自独立的微服务中。


    你将在接下来的两章中探讨这些方面。


    18. 微服务安全


    在第 17 章的电子商务微服务应用程序中，你应该已经注意到，有一些 API 方法，尤其是产品类别和产品服务中的那些方法，任何人都可以自由访问；但是，要访问所有其他微服务，你需要以已在应用程序中创建用户配置文件的后台管理员或客户身份登录。到目前为止，一切顺利，但即使需要登录，这些微服务的安全性又如何呢？

    与所有服务集中部署的传统单体架构截然不同，在微服务架构中，有许多节点或进程来分布服务。即使你将 API 网关视为一个单一的、集中的前端控制器，所有请求最初都由其拦截，API
    网关也必须通过内部网络将请求路由到相应的微服务。同样，微服务间的通信也通过同一个内部网络进行。

    即使你已确保网关访问的安全，你的数据也无法免受内部攻击。实现安全性的一种方法是为所有服务共享用户凭证数据，并在访问前在每个服务上对用户进行身份验证。尽管这实际上是一种可行的方法，但在多个地方分发凭证是一个奇怪的想法。你应该有一个更好的方法。

    你将在本章中探讨微服务安全的问题。你还将为第 17 章的示例构建安全功能，以便你了解这在真实场景中如何运作。


    你将在本章中探讨以下内容：


    *   OAuth 2.0


    *   OAuth 2.0 上下文中的客户端类型


    *   OAuth 2.0 中的授权码授权类型


    *   JSON Web 令牌 (JWT)


    *   为微服务电子商务应用程序启用安全性


    OAuth 2.0 与微服务

    借助 Spring Security 及其对 OAuth 2.0 的支持，你拥有锁定 API 网关和后端资源服务器所需的一切。你可以对其进行设置，以自动将访问令牌从一个微服务传播到另一个微服务，确保整个过程安全且加密。我不会详细介绍
    OAuth 2.0，但会介绍所需的最基本方面，以便你能够为示例微服务应用程序启用安全性。


    OAuth 2.0

    互联网工程任务组 (IETF) 的请求评论 (RFC) 第 6749 号将 OAuth 2.0 定义为一个授权框架，它使第三方应用程序能够获得对 HTTP
    服务的有限访问权限，要么代表资源所有者，通过协调资源所有者和 HTTP 服务之间的批准交互，要么允许第三方应用程序代表其自身获得访问权限。OAuth 2.0
    规范取代并废弃了 OAuth 1.0 协议。


    OAuth 2.0 角色


    OAuth 定义了四个角色，它们是 OAuth 交互的核心：


    *   **资源所有者**：任何能够授予对受保护资源访问权限的实体。当资源所有者是人类时，它被称为最终用户。资源所有者可以授予访问权限，并且此授权可用于后续和重复的资源访问。

    '
- fmt: '- **Resource server**：托管受保护资源的服务器，能够接受并使用访问令牌响应受保护资源请求。在你的微服务场景中，如果每个微服务拥有受保护资源，则它们都可能成为资源服务器。


    - **Client**：代表资源所有者并以其授权发起受保护资源请求的应用程序。客户端在发起请求时，可能代表最终用户（该用户可能是也可能不是资源所有者）。术语“客户端”并不暗示任何特定的实现特性（例如，应用程序是在服务器、桌面还是其他设备上执行）。


    - **Authorization server**：在成功验证资源所有者身份并获取授权后，向客户端颁发访问令牌的服务器。授权服务器可以与资源服务器是同一台服务器，也可以是独立的实体。单个授权服务器可以颁发被多个资源服务器接受的访问令牌。


    ## OAuth 2.0 Client vs. User Agent


    尽管 OAuth 仅指定了四个角色，但你还应注意另一个实体，这在许多情况下（例如使用基于浏览器的应用程序时）很典型：


    - **User agent**：用户代理通常是最终用户或资源所有者与客户端程序交互的界面。有时用户代理和客户端可以是同一个。


    要理解最后一点，你需要探索几种典型的架构，并理解各个客户端程序对外部世界的暴露程度差异，这将在下一节中进行。


    ## Trusted vs. Untrusted Clients


    OAuth 客户端可分为两类：**trusted client**（受信任客户端）或 **untrusted client**（不受信任客户端）。客户端属于受信任还是不受信任类别，取决于其是否能够安全地存储和传输信息。通过重新审视下面描述的选定架构模型，可以明确这一概念。


    ### Classic Three-Tier Monolith


    三层单体架构包含表示层、中间层和数据库层。经典的三层架构是一种多页面架构（MPA），这意味着每当用户界面需要显示数据或将数据提交回服务器时，它都必须向服务器请求一个新页面，然后在
    Web 浏览器中渲染该页面。`Java Server Pages`（`JSP`）技术用于创建 MPA Web 应用程序；然而，还有许多其他技术可用于构建 MPA。图
    [18-1](#477630_1_En_18_Chapter.xhtml#Fig1) 描述了一个三层单体 MPA。


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig1_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig1_HTML.jpg)


    **Figure 18-1.** Classic three-tier monolith


    典型的三层单体 MPA 交互如下：


    1.  最终用户在浏览器中输入 URL。

    2.  表示层组件（通常是一个 `JSP` 页面）生成所需的 HTML 标签并将其发送回浏览器，浏览器渲染 HTML 内容。

    3.  浏览器中的用户点击和操作被表示服务器拦截，表示服务器需要生成下一个页面。

    4.  在此阶段，如果页面需要来自任何受保护资源的数据，则需要联系安全服务器或授权服务器，进行用户身份验证和授权。

    5.  一旦通过身份验证和授权，表示服务器将联系业务层以检索任何后端数据，将其嵌入生成的 HTML 内容中，并将内容推送回浏览器，浏览器再次渲染内容。


    此处值得注意的是，在步骤 3 结束时，必须协调用户身份验证和授权，并将最终结果发送给表示服务器，表示服务器可以缓存或存储与该用户（会话）关联的身份验证和授权步骤的状态。此后，对于浏览器中最终用户的每次后续点击和操作，如果需要受保护资源，表示服务器可以检索与该请求关联的用户（会话）的身份验证和授权步骤的状态，并做出决策或将请求路由到其他后端服务器。缓存或存储在表示服务器中的身份验证和授权步骤的状态是安全的，因为它存储在非军事区（DMZ）内。


    ### Classical Three-Tier Monolith with HTTP Front


    在一种略有不同的架构中，你仅将 HTTP 服务器放置在 DMZ 中，而图 [18-1](#477630_1_En_18_Chapter.xhtml#Fig1)
    中 DMZ 内显示的所有其他组件都将移至内部边界内。在这里，缓存或存储在表示服务器中的身份验证和授权步骤的状态更加安全。图 [18-2](#477630_1_En_18_Chapter.xhtml#Fig2)
    描述了这种部署设置。


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig2_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig2_HTML.jpg)


    **Figure 18-2.** Classic three-tier monolith with HTTP front


    在此架构中，包括 HTML 模板在内的所有静态内容都可以由 HTTP 服务器提供，而所有动态 Web 内容和业务层中的受保护资源则以类似于下面解释的方式访问（如图
    [18-2](#477630_1_En_18_Chapter.xhtml#Fig2) 所示）：


    1.  最终用户在浏览器中输入 URL。

    2.  表示层组件（通常是一个 `JSP` 页面）将生成所需的 HTML 标签并将其发送回浏览器，浏览器渲染 HTML 内容。包括 HTML 模板在内的所有静态内容都可以由
    HTTP 服务器提供。

    3.  浏览器中的用户点击和操作再次被表示服务器拦截，表示服务器需要生成下一个页面。

    4.  在此阶段，如果页面需要来自任何受保护资源的数据，它首先需要联系安全服务器或授权服务器，进行用户身份验证和授权。

    5.  一旦通过身份验证和授权，表示服务器联系业务层以检索任何后端数据，将其嵌入生成的 HTML 内容中，并将内容推送回浏览器，浏览器再次渲染内容。


    ### Microservices with an API Gateway


    图 [18-3](#477630_1_En_18_Chapter.xhtml#Fig3) 描述了基于 API 网关的微服务架构。你在前面的章节中看到了许多变体；然而，此处展示它是为了强调安全流程。


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig3_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig3_HTML.jpg)


    **Figure 18-3.** Microservices API architecture


    微服务架构通常使用单页面架构（SPA），它本质上是 MPA + AJAX 设计模式的演进。在 SPA 中，只有外壳页面在服务器上生成，其余 UI 由浏览器
    JavaScript 代码渲染。SPA 分别请求标记和数据，并直接在浏览器中渲染页面。整体流程总结如下：


    1.  最终用户在浏览器中输入 URL。

    2.  表示层组件（通常是一个 SPA Web 应用程序）被下载到浏览器中，并渲染第一页或默认页面。SPA 资源（`HTML`+`CSS`+脚本）在应用程序的整个生命周期中仅加载一次。此外，只有数据来回传输。

    3.  浏览器中的进一步用户点击和操作被 API 网关拦截。'
