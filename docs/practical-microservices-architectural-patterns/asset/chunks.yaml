  trans: "\n### 数字应用\n\n数字业务通过重新定义应用的含义，将微浏览器和原生应用提升到了新的高度。在前文描述的数字时代背景下，应用的概念被扩展为任何能够访问后端服务、穿透企业防火墙或通过其他方式连接的客户端软件。这类客户端软件可以以嵌入式形式或其它方式，在之前提到的任何数字客户端设备上运行。此类客户端程序可能并不总是遵循\
    \ **WORA**（**一次编写，随处运行**）原则；相反，它们是“为特定目的而生”，并充当人类在物理世界中的延伸。它们可以根据人类触发、或物联网世界中任何互联网事物的触发而自主激活。见图\
    \ 4-1。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig1_HTML.jpg](img/477630_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1.\n\n数字应用上下文\n\n来自数字应用的请求可以通过任何通信媒介（如互联网、微波、蓝牙、电子邮件，甚至传统邮件）传输，并触及企业的网络边界。采用\
    \ REST 风格的 JSON 格式数据是流行的数据传输方式，但在物联网和万维网（WoT）的背景下，新的发展正在演进。\n\n### 网格应用与服务架构\n\
    \nGartner^(³) 对 MASA 架构给出了如下定义：\n\n> *MASA（网格应用与服务架构）是一种多渠道解决方案架构，支持多个用户以多种角色、使用多种设备、通过多种网络进行通信，以访问应用功能。在此架构中，移动应用、Web\
    \ 应用、桌面应用和物联网应用连接到一个广泛的后端服务网格，共同构成用户所看到的“应用”。MASA 使用户能够在不同渠道间切换时，获得连续且沉浸式的体验。*\n\
    > \n> ——Gartner\n\n如图 4-1 所示，当单体服务被微服务取代时，传统的防火墙和路由器也会被智能路由器所取代或增强。这些智能路由器是软件感知且软件定义的。它们可以统称为服务控制网关，所有\
    \ API 都通过这一智能层暴露给外部世界。外部世界可以包括数字应用，以及你的应用之外的其他微服务。\n\n图 4-2 展示了包含服务控制网关的 MASA。你还可以看到被分组并命名为“应用\
    \ 1”和“应用 2”的微服务。虽然应用内的微服务之间可以直接进行内部通信，但对微服务的外部调用始终通过网关进行路由。此外，还存在公共微服务的概念。如果通过网关进行路由，对公共微服务的访问，或对其他应用所拥有的微服务的访问，也可以得到控制。\n\
    \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig2_HTML.jpg](img/477630_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2.\n\n数字应用上下文\n\n## 微服务的背景\n\n微服务并非一种革命性的新趋势；相反，它是软件计算领域近期趋势背景下的一种演进。甚至在有人首次使用“微服务”这个术语之前，你们中的许多人可能已经在自己的企业中遵循了类似的方法。组件化、面向服务以及\
    \ SaaS（软件即服务）都是与微服务具有相似原则的趋势。这些趋势（组件和服务）的微型化与公共云和自动扩展等近期趋势相关联，因此让我们简要探讨一下这一背景，以便更好地理解微服务。\n\
    \n### 服务的粒度\n\n你可以根据服务设计和构建的粒度，将其分为不同的类别。尽管“微服务”一词暗示了“小”，但它相对于其他服务而言的“小”程度通常是相对的。换句话说，大小只是一个指示性特征；下面列出的更明确的特征决定了粒度：\n\
    \n*   敏捷性\n*   可部署性\n*   选择性可扩展性\n*   独立性\n\n为了帮助你理解，你可以将上述所有特征归入一个统称之下，即“云原生性”。见图\
    \ 4-3。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig3_HTML.jpg](img/477630_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3.\n\n服务的粒度\n\n如图 4-3 所示，当粒度减小时，云原生性所需的大多数质量特性都会增加。\n\n如果你重新审视单体应用，通过遵循\
    \ SOA 的最佳实践，你可以暴露粗粒度或组合服务。这类服务暴露了业务领域的单个能力。通过暴露 SOA 接口，它们支持灵活的企业应用集成，或者我们称之为面向服务的集成。这些服务被归类为“迷你服务”，并且它们通过服务组合促进了服务复用。迷你服务可以被其他迷你服务或客户端层访问。\n\
    \n当我们把单体应用拆分为基于微服务的架构时，服务的范围被限制在一个功能特性上。多个这样的功能特性共同构成一个能力，该能力可以暴露给客户端层。可以配置一个服务网关来暴露迷你服务，而迷你服务又会将调用委托给微服务。\n\
    \n让我们借助一些指示性示例，在不同的分类下审视服务粒度的细微差别。\n\n图 4-4 仅展示了指示性示例。宏服务使用传统的 SOA 设计模式和技术实现，而迷你服务则聚合了与特定领域（即实体或资源）相关的功能。与微服务相比，迷你服务的范围更广，架构约束更宽松，并且可能使用也可能不使用独立的数据。\n\
    \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig4_HTML.jpg](img/477630_1_En_4_Fig4_HTML.jpg)\n\
    \n图 4-4.\n\n服务粒度的指示性示例\n\n再次强调，图 4-4 中标注的粒度单位（功能 > 特性 > 领域 > 能力 > 应用）在上述粒度尺度上并非固定不变。你希望将应用架构定位在何处，很大程度上取决于许多因素，例如应用类型和所需的云原生程度。将应用架构稍微向左或向右移动并非关键；相反，你确定架构位置背后的理由是基于约束条件以及随之而来的权衡取舍。如果你没有经验丰富的内部团队，教条式地遵循微服务架构可能是一项高成本、具有破坏性且往往难以预测的工作。我经常看到企业创建的应用更偏向于迷你服务的边界，却称其为微服务。这并非一个重大问题。相反，需要的是清晰理解这些边界中的每一个，然后你才能做出明智的决策，而不是偶然地趋同于某个决策。\n"
- fmt: '### The Gateway


    Let’s revisit our e-commerce microservice application. Assuming that the web page
    is displaying the Product Detail page, it doesn’t just display the product details
    alone, like the name, description, and price; it also displays other details like:


    - Number of items in the cart

    - Order history

    - Low inventory warning

    - Shipping options

    - Various recommendations, reviews, and offers


    All of this information has to be retrieved from different, respective microservices.
    The web page has to access them from respective microservices whereas while in
    a monolithic application architecture the browser can retrieve this data by making
    a single REST call (`GET` [`api.acme.com/productdetails/productId`](http://api.acme.com/productdetails/productId))
    to the application. There are challenges and limitations with this option of accessing
    multiple microservices from the browser. Even if a client attempts to make that
    many requests over a LAN, it will probably be too inefficient over the Internet
    and will face serious performance overhead, especially if the communication is
    over a mobile network. Also, if all the microservices don’t expose web-friendly
    interfaces, which they are not mandated to expose, this can be another challenge.
    Further, extensions to or evolution of the application might necessitate splitting
    or merging existing microservices, which should be shielded from the APIs exposed
    publicly.


    An API gateway can come to the rescue here. External-facing APIs can be coarse
    grained and can aggregate responses from multiple internal microservices and provide
    the aggregated response in a single go to the client device. Moreover, such external
    facing APIs can also do some kind of transformation based on the kind of client
    device that is asking the response. These kinds of value-adding features can be
    provided to the API gateway layer, thus making this layer intelligent compared
    to traditional firewalls or load balancers.


    ### Domain-Centric Partition


    Traditionally, we have been following the “one size fits all” approach for meeting
    non-functional requirements of an application. This is very true when it comes
    to scaling the application. A monolith can be scaled only uniformly for all of
    its functional or module boundaries, whereas the microservices principles advocate
    defining the boundaries based on business domains.


    As is seen from Figure [4-5](#477630_1_En_4_Chapter.xhtml#Fig5), in a technology-centric
    approach, the layers or tiers of an application can be scaled altogether. In the
    microservices approach, since each microservice’s boundary is defined based on
    the business or functional domain, and since this boundary definition is also
    evident in the physical organization of the application, functions or domains
    can be scaled selectively. Such a selective approach in combating non-functional
    requirements also offers the flexibility of defining service-level agreements
    (like service uptime, etc.) against each microservice level.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig5_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig5_HTML.jpg)


    Figure 4-5. Technology centric vs. domain centric


    In this e-commerce application context, while the Product, Inventory, Order, and
    Cart microservices must be highly and always available for non-disruptive business
    around the clock, 365 days a year, the auxiliary microservices like User, Shipping,
    Delivery, and Order History can be deployed for a lesser availability SLA. This
    is because, if the User microservice is down, a customer can still browse, add
    to the cart, and confirm the order by manually entering the address, e-mail, contact
    number, and other details along with the new order, without retrieving the previously
    saved user profile. Later, when the User microservice comes back up, the system
    can always associate this “anonymous order” to the customer profile that already
    exists in the system. A similar case exists with other modules, which you will
    examine in detail when you relook at the e-commerce application later.


    ### The Cloud Native Shift


    For ages we have been relying on dedicated infrastructures to address growing
    business demands, whether in a scale out or in a scale up philosophy. We add redundant
    and bigger pipes (Infinibands) for network connectivity, invest in engineered
    systems (Exalogic) to add compute power, and so on. Recent insights and incidents
    have opened the eyes of enterprise architects and they realize that these systems
    have limitations, and sooner than later they will be constrained by these limitations.
    The high throughputs provided by fiber optics or the high performance provided
    by in-memory computing all can provide exponential performance during the initial
    portions of a graph, but then will meet the limit, after which you get only little
    improvement even if you add more CPUs or bandwidth. Advancements in quantum computing
    and similar technologies will shift the plane, but again, businesses cannot wait
    until these technologies are commoditized and accessible at reasonable cost.


    The public cloud is available today, which is of comparable and reasonable cost,
    if not cheaper. Cloud platform providers like Amazon and Azure provision commodity
    hardware in datacenters, which can be instantaneously provisioned as per your
    needs. When your business is faced with unpredicted hypergrowth or hyperscale
    requirements, the cloud is a reasonably right approach to keep your overall cost
    under control but at the same time provides the required agility. I do not intend
    to cover the features or characteristics of cloud computing or cloud service providers
    (CSP) here, but I surely want to discuss what cloud native means.


    In an on-premises model, the availability policies and SLA management are in the
    hands of data center administrators. When you move to a public cloud model, such
    policies are transformed and abstracted to higher levels at your application stack.
    In the IaaS (Infrastructure as a Service) or PaaS (Platform as a Service) model
    provided by the CSPs, you have little control over the availability or storage
    policies, so you need better controls and tool provisioning at your application
    stack layer. Your software layer should by itself be geared to provide you hooks
    and controls for unprecedented scenarios. So in order for the applications to
    truly benefit from the advantages of CSPs, the applications should be smart enough
    in terms of recovering from failures, non-availability of resources, abrupt spikes
    in traffic, etc. Cloud native architecture speaks about the patterns and practices
    you need to adopt in building software applications for operating efficiently
    in a public cloud environment.


    ### Web Scale Computing


    Web-scale IT applies to designing, deploying, and managing infrastructure at any
    scale. Leveraging the capabilities of a web-scale IT, a business or enterprise
    can scale at massive levels. IT principles and practices are a priority when it
    comes to web-scale IT; of course cloud, microservices, and Dev Ops practices are
    to be named specifically. Companies like Google, Amazon, Facebook, and Netflix
    are to be mentioned here since by the mere nature of their business, their IT
    systems and practices fall in this category. Distributed Everything, fault tolerance,
    self-healing, and API-driven approaches are just few of the principles around
    web-scale computing.


    ## The Indispensable Cloud


    The cloud aims to provide distributed compute, storage, and network infrastructures
    in an autonomous manner at a comparatively reduced cost. A cloud-based architecture
    may be based on multiple models (i.e., IaaS, PaaS, and SaaS), and suitable provisioning
    can lead to a flexible environment for the customers. In the cloud, the customers
    can use the clouds’ APIs to allocate the resources on demand and in near real
    time.'
