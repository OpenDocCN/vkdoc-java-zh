    \n![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg](images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg)\n\
    \nFigure 19-2.\nMicroservices e-commerce architecture refactored for Axon 3\n\n\
    Sagas for Deterministic Eventual Consistency\n\nHaving adopted a BASE-style transaction\n\
    across the order and inventory aggregate root entities, the order and\ninventory\
    \ domains can now become separate microservices. However, there\nis a catch! The\
    \ moment you separate the order and inventory domain into\nseparate microservices,\
    \ the following are no more collocated:\n\n*   OrderCommandHandler, shown in Listing\
    \ [19-16](#477630_1_En_19_Chapter.xhtml#PC21)\n\n*   InventoryCommandHandler,\
    \ shown in Listing [19-17](#477630_1_En_19_Chapter.xhtml#PC22)\n\n*   OrderController,\
    \ shown in Listing [19-18](#477630_1_En_19_Chapter.xhtml#PC23)\n\nIf so, the sendAndWait\
    \ to one or more command handlers is to be\nexecuted across network partitions,\
    \ so its deterministic nature is lost.\nIf you continue to model BASE transactions\
    \ in the manner you have been\ndoing in the InventoryCommandHandler shown in Listing\
    \ [19-17](#477630_1_En_19_Chapter.xhtml#PC22), it’s prone\nto failure in the range\
    \ of more than what I have already explained.\n\nManual ways of modelling BASE\
    \ transactions are not a good idea here. You\nrequire saga transactions here due\
    \ to following characteristics:\n\n*   Sagas are long lived.\n\n*   Sagas are\
    \ persistent. Sagas can be resurrected even after a\n    microservice crash.\n\
    \n*   Sagas can model complex compensating scenarios.\n\n*   The transactions\
    \ or compensations of a saga can be replayed or\n    retried.\n\nSagas that have\
    \ not ended always tend to bring the system (back) to a\nconsistent state irrespective\
    \ of the point of eventuality in the\ntimeline.\nWhen the order and inventory\
    \ domains are separated into different\nmicroservices, you can very well model\
    \ the creation of a multi-line item\norder using a saga. A saga can track the\
    \ state of each inventory\ndepletion and, once satisfied, proceed to create the\
    \ new order and then\nend the saga. In this example, I have not done this since\
    \ I don’t want\nto make the demonstration overly complex, since it already has\
    \ one saga.\n\nConfigure the E-Commerce Microservice\nApplication\nFollow the\
    \ directions in the “Configure the E-Commerce Microservice\nApplication” and “Set\
    \ Up the Environment Infrastructure” sections in\nChapter [18](#477630_1_En_18_Chapter.xhtml).\n\
    \nBuild and Run the E-Commerce Microservice\nApplication\nHere again, you should\
    \ follow the directions in the “Build and Run\nthe Secure E-Commerce Microservice\
    \ Application” section in Chapter [18](#477630_1_En_18_Chapter.xhtml) .\nHaving\
    \ looked at Axon 3, let’s look at Axon 4 in the next\nsection.\n\nCommand and\
    \ Event Handling in the Same JVM Using\nAxon 4\nIn this section, you will migrate\
    \ the code\ndiscussed in the “Command and Event Handling in the Same JVM” section\
    \ in\nChapter [12](#477630_1_En_12_Chapter.xhtml) to Axon 4\\. The migrated codebase\n\
    is placed in folder `ch19\\ch19-04`. You may\nwant to refer to the Axon 4 Reference\
    \ documentation^([^(47)](#fn47)) and the Axon 4 API\ndocumentation^([^(48)](#fn48))\
    \ while going through the\ncode.\nIn fact, this code is a refactoring of the code\
    \ you saw in the\n“Command and Event Handling in the Same JVM Using Axon 3” section\
    \ early\nin this chapter. To build and execute the example, follow the\ninstructions\
    \ mentioned there with the exception that you have one\nadditional step to do,\
    \ which you may do as the first step, and that is\nto set up the Axon server.\n\
    \nThe Axon server complements the Axon framework by having knowledge about\nthe\
    \ different types of messages that are being exchanged, like events\nsent from\
    \ one service to one or many other services, commands that are\nsent to one service\
    \ to do something, etc. You can download and expand\nthe Axon server libraries\
    \ from [https://​download.​axoniq.​io/​axonserver/​AxonServer.​zip](https://download.axoniq.io/axonserver/AxonServer.zip).\n\
    \n```\ncd D:\\binil\\Study\\Sites\\axon\\AxonQuickStart-4.0.3_2019-02-19\\AxonServer\n\
    java -jar axonserver-4.0.3.jar\n```\n\nThis will bring up the Axon server. Subsequently,\
    \ follow the\ninstructions mentioned in the “Command and Event Handling in the\
    \ Same\nJVM Using Axon 3” section earlier in this chapter.\n\nDistributed Command\
    \ and Event Handling Using Axon\n\nIn this section, you migrate the code discussed\
    \ in the “Distributed\nCommand and Event Handling” section in Chapter [12](#477630_1_En_12_Chapter.xhtml)\
    \ to Axon 4\\. The migrated\ncodebase is in folder `ch19\\ch19-05`.\nIn fact,\
    \ this code is a refactoring of the code you saw in the\n“Distributed Command\
    \ and Event Handling Using Axon 3” section earlier in\nthis chapter. To build\
    \ and execute the example, follow the instructions\nmentioned here with the exception\
    \ that you have one additional step to\ndo, which you may do as the first step,\
    \ and that is to set up the Axon\nserver.\nFollow the instructions in the just\
    \ previous section to bring up the\nAxon server. Once the Axon server is up, follow\
    \ the instructions\nmentioned in the “Distributed Command and Event Handling Using\
    \ Axon 3”\nsection earlier in this chapter.\n\nSummary\nEvery end is a new beginning.\
    \ You have reached the end of this book;\nhowever, you have just started your\
    \ microservices journey. You have\ndemystified few dilemmas around architecture\
    \ choices and looked into\nevery detail of few concerns, including data consistencies,\
    \ which you\nmay come across in your everyday life while adopting the microservices\n\
    architecture. I hope you have liked many parts of this book in the same\nway I\
    \ have liked spending the time to get into the intricacies with code\nto explain\
    \ them. I have tried to balance the amount of theory and the\namount of code to\
    \ give you a hands-on feel of almost all concepts\nexplained. Last but not least,\
    \ I have also attempted to cover even the\nlatest release of the Axon CQRS framework\
    \ through the current chapter.\nFrameworks will come and go, and specifications\
    \ will keep evolving,\nsince “change is the only constant thing.” However, the\
    \ architectural\nfoundations discussed throughout the book will still be relevant\
    \ and\nvalid—at least that is what I have experienced in my 25 years of an IT\n\
    career. Keep moving, and keep a fast pace.\n\nFootnotes\n\nInstall, Configure,\
    \ and Run\nMongoDB"
