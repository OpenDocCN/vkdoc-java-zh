- fmt: '# Border Gateway Protocol (BGP) and Network Redundancy


    `Border Gateway Protocol (BGP)` is one of the key protocols to use to achieve
    Internet connection redundancy. When you connect your network to more than one
    ISP, it is called multihoming. Multihoming provides redundancy and network optimization.
    It selects the ISP that offers the best available path to a resource. Let’s look
    into the details at a high level.


    You need to start understanding from an `autonomous system (AS)` on the Internet.
    An autonomous system is a collection of connected `Internet Protocol (IP)` routing
    prefixes under the control of one or more network operators on behalf of a single
    administrative entity or domain that presents a common, clearly defined routing
    policy to the Internet. An ISP must have an officially registered `autonomous
    system number (ASN)`. An ISP may support multiple autonomous systems; however,
    the Internet only sees the routing policy of the ISP. `ASNs` are assigned in blocks
    by the `Internet Assigned Numbers Authority (IANA)` to `Regional Internet Registries
    (RIRs)`. The appropriate `RIR` then assigns AS numbers to entities within its
    designated area.


    Networks within an `AS` communicate routing information to each other using an
    `Interior Gateway Protocol (IGP)`. An `AS` shares routing information with others
    using the `Border Gateway Protocol`. In the future, the `BGP` is expected to be
    replaced with the `OSI Inter-Domain Routing Protocol (IDRP)`.


    Carrier-neutral data centers are served by multiple ISPs. With two ISPs you get
    enough bandwidth from each other to be able to handle your traffic without any
    slowdowns if one ISP goes down. With three or more ISPs, the choice is between
    being able to run without slowdowns if one ISP fails and being able to stay running
    if all ISPs except one fail.


    Figure [9-5](#477630_1_En_9_Chapter.xhtml#Fig5) shows a representation of connecting
    to multiple ISP. Keep in mind that the representation is typical; multiple alternatives
    are possible. Redundant paths, switches, access ports, and routers will ensure
    that if any path or component fails, there is still a different path available.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig5_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Multihomed load sharing to ISPs through multiple local routers


    ## Application Architecture Redundancy


    As illustrated in the previous section, the Internet-facing border routers peer
    directly to the ISPs. Intrusion prevention appliances that guard against worms,
    viruses, `denial-of-service (DoS)` traffic, and such, plus appliances like `web
    security appliances (WSA)` reside in this part of the network. The firewalls secure
    functions through the edge by implementation and enforcement of stateful firewall
    rules and application-level inspection. The `DMZ` provides primary security for
    `HTTP`-based and e-commerce applications.


    In Figure [9-6](#477630_1_En_9_Chapter.xhtml#Fig6), you can see that routers and
    switches are cross-connected to provide redundant paths. Similarly, app layer
    switches provide for load sharing and failover across web servers. Again note
    that the illustration here is typical and will vary based on enterprise needs.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig6_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** Highly available application deployment architecture


    Public-facing services deployed in the `DMZ` are shown as single servers; however,
    they too can be deployed as redundant. The core servers in the data storage layer
    are again redundant.


    ## Data and Storage Redundancy


    Data is stored on either block-level storage arrays as in `SANs (storage area
    networks)`, or file-based arrays (also known as `NASs` or `network-attached storage
    arrays`). They provide various levels of redundancy, so that if a single component
    in the array (whether a disk drive, controller, `SAN` or `LAN` access port, etc.)
    fails, it will not completely compromise the setup and data will still be accessible
    to the user. Server hardware based on `x86` architecture is typically configured
    with redundant connections to `SANs` and Ethernet networks. Such connections to
    heterogeneous devices are done using dual port adapters or by using multiple (single
    port) adapters. The options of adapters depend on the space available in the servers
    (that is, the number of `I/O` expansion slots) as well as the level of hardware
    redundancy required. In short, the infrastructure is set up in such a way that
    it uses redundant paths, switches, and access ports for network and storage resources.


    Figure [9-7](#477630_1_En_9_Chapter.xhtml#Fig7) reveals that the paths are redundant
    and do not permit a single point of failure. If one of the Ethernet or `SAN` paths
    fails, there is still connectivity across a surviving path. In such a failure,
    failover will be triggered by some type of multipath or failover software.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig7_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig7_HTML.jpg)


    **Figure 9-7** Non-converged storage network


    Operating systems will have `NIC (network interface card)` drivers that will allow
    them to associate with more than one network card, thus enabling load balancing
    of network traffic across two paths. The same drivers also failover from failures
    if a physical network card, cable, or some other network component fails. Moreover,
    storage array vendors provide software that sits between the operating system
    and storage adapters, which can load balance traffic across available `host bus
    adapters (HBAs)` as shown Figure [9-7](#477630_1_En_9_Chapter.xhtml#Fig7). When
    failure occurs in a `HBA`, path, or device, failover to redundant elements will
    happen.


    From Figure [9-7](#477630_1_En_9_Chapter.xhtml#Fig7) you can visualize so many
    network ports, storage ports, adapters, and cables to have redundancy. Large data
    centers with so many such components will increase the data center setup as well
    as operating cost. This is where converged networks come into play and where `SAN`
    and Ethernet traffic can be run over a single cable type. `FCoE (Fiber Channel
    over Ethernet)` is an example that uses `FCoE`-capable adapters, which can pass
    through both Ethernet and Fiber Channel traffic. Figure [9-8](#477630_1_En_9_Chapter.xhtml#Fig8)
    shows this improvement.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig8_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8** Converged storage network


    Figure [9-8](#477630_1_En_9_Chapter.xhtml#Fig8) makes it evident that you need
    fewer network ports, storage ports, adapters, and cables to have the same or better
    redundancy and failover as that required in Figure [9-7](#477630_1_En_9_Chapter.xhtml#Fig7).'
