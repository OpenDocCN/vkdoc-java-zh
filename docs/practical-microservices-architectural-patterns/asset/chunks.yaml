    \ request is not for authentication, there can be two cases. The first case is\
    \ when the user has not already logged in. In that case, the Zuul pre-filter will\
    \ do nothing.\n- The second case when the request is not for authentication is\
    \ when the user has already been authenticated. In that case, the Zuul pre-filter\
    \ assumes that there is a reference token available in the request header and,\
    \ using that token, it will do a look-up into its local EHCache for the actual\
