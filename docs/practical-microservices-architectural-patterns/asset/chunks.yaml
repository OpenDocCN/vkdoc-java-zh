- fmt: "# 乐观锁异常处理与冲突检测\n\n收到此类异常时，持久化提供程序将解释为发生了乐观锁定冲突，并抛出`javax.persistence.OptimisticLockException`。此异常可能作为API调用、刷新或提交时的一部分抛出。当抛出此异常时，当前事务（如果处于活动状态）将被标记为回滚。\n\
    \n## Axon中的冲突检测与解决\n\n明确变更含义的主要优势之一是能够更精确地检测冲突变更。通常，当两个用户几乎同时对同一数据进行操作时，就会发生这些冲突变更。参考图[16-8](#477630_1_En_16_Chapter.xhtml#Fig8)，如果Ann和Ria都查看特定版本的数据，并认为他们最后查看的座位状态为“可预订”，那么他们都可以决定对该数据进行更改。他们都会发送类似“在聚合的X版本上执行该操作”的命令，其中`X`是应用更改的聚合的预期版本；至少这是Ann和Ria所期望的。在这种情况下，其中一人的更改将实际应用于预期版本。当系统即将代表另一用户应用更改时，应用更改的预期版本已经改变，因此该特定用户的更改将不会被应用。\n\
    \n`org.axonframework.domain.AggregateRoot<I>`是定义代表聚合根的实体的契约的接口，其中`I`表示此聚合标识符的类型。`AggregateRoot`提供了一个名为`Long\
    \ getVersion()`的方法。\n\n`AggregateRoot.getVersion()`返回聚合的当前版本号，如果聚合是新创建的，则返回`null`。此版本必须反映应用更改的聚合的版本号。每次修改聚合并存储在存储库中时，版本号必须至少增加1。此版本号可用于乐观锁定策略和检测冲突的并发修改。\n\
    \n通常，此聚合上最后提交事件的序列号用作版本号。\n\n为方便起见，Axon还提供了`org.axonframework.domain.AbstractAggregateRoot<I>`，它是`AggregateRoot`接口的一个非常基本的实现。它提供了跟踪未提交事件的机制，并根据生成的事件数维护版本号。在大多数情况下，您只需从该抽象类扩展您的聚合根实体即可。\n\
    \n## 演示Axon中乐观锁定的示例\n\n在本节中，您将看到一个演示Axon乐观锁定策略的工作示例。您将设置一个类似于图[16-8](#477630_1_En_16_Chapter.xhtml#Fig8)所示的环境；但是，您不会部署在云中，而是在自己的PC上运行，并且只运行两个微服务实例，因为如果可以演示两个微服务的工作情况，则可以假设在涉及两个以上微服务实例的场景中也能正常工作。\n\
    \n### 设计示例场景\n\n您将模拟两个用户同时尝试修改同一实体。为此，您将拥有一个简单的Axon微服务，包含一个REST控制器和一个命令处理器。REST控制器可以接受`POST`和`PUT`请求来创建和修改`User`实体的记录。见图[16-9](#477630_1_En_16_Chapter.xhtml#Fig9)。\n\
    \n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig9_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig9_HTML.jpg)\n\
