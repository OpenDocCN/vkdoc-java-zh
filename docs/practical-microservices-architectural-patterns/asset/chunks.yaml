    在之前的“构建并测试示例的快乐路径”一节中，你了解到，每当用户账户更新时，上游系统中最新的报价创建时间会作为最后报价时间被更新。按照这个逻辑，图 13-40
    中的报价 ID 9 是最新创建的报价，因此该报价的创建时间戳应该是该用户的最后报价时间。然而，由于报价 ID 8 和报价 ID 9 是无序到达下游系统的，这条数据属性规则就出错了！


    总结

    事务是任何企业级应用动态运行的基石。本地事务是好的；然而，跨分区域的分布式事务则并非善类。当你从基于单体架构转向基于微服务的架构时，你仍然需要事务；但是，对于跨分区的域，你最好使用
    BASE 事务来代替 ACID 事务，并在分区或域内保持 ACID 或 XA 兼容的事务。在本章中，你看到了分布式企业系统中可能出现的许多错误场景，并且你也看到了如果使用
    ACID 事务，这些错误场景本可以如何避免。当你从单体架构转向微服务架构时，上述错误场景并不会减少；相反，由于微服务架构的分布程度成倍增加，此类错误场景的数量会大幅增加。在下一章中，你将看到在架构分布式系统时可以用来防范此类错误场景的技术，所以请继续愉快地阅读吧！


    脚注


    14. 事务与微服务


    第 13 章广泛地涵盖了分布式事务。你现在已经清楚地理解了分布式事务，以便能明智地使用它们。需要明确的是，在微服务世界中，你应尽可能避免跨分区和跨域使用分布式事务。我并不是说在微服务架构中应该完全弃用分布式事务，因为有些领域你需要通过牺牲松耦合来换取可靠性，从而使用它们；然而，其精髓在于，当涉及跨分区和跨域时，你可以在不实际使用分布式事务的情况下完成大部分设计。你将在本章中详细了解如何做到这一点^(³³)。本章中的示例是第
    13 章示例的延续，因此你可能需要在尝试运行本章示例之前先阅读并理解第 13 章。


    你将在本章中探讨以下几个方面：


    *   跨微服务分布数据的影响

    *   区分全局事务和本地事务

    *   增强第 13 章的示例，使其具有容错能力

    *   探索可在实际微服务工作中使用的进一步设计重构


    分区与微服务

    最大化一致性的最佳方法是避免分区。没有分区意味着你有一个单一的软件进程处理所有处理工作。时间已经证明，软件进程存在局限性，并且垂直扩展在达到一定限度后无法线性增加，更不用说指数级增加了；这一点在第
    11 章的“扩展立方体”一节中讨论过。正是在这种背景下，人们使用水平扩展方法来提高可扩展性。一旦你将处理逻辑拆分到多个软件进程中，你就引入了分区的可能性，并且分区越多，你能实现的一致性就越低。微服务也不例外。当你将单体应用拆分为基于微服务的架构时，你增加了节点或软件进程的数量，你的处理逻辑被拆分到这些节点或进程上，并且这些处理逻辑的协调必须通过网络来完成。


    网络或进程边界带来了所有相关的复杂性和不确定性，你再也无法确定端到端的软件处理将如何以及何时完成。正是在这种背景下，你一直在利用两阶段提交协议来减少不确定性。


    作为两阶段提交协议的一部分执行请求的软件进程需要能够相互通信，以便在事务提交时协调它们的操作。在两阶段提交协议的第一阶段，协调器（通常是发起事务的进程）会询问所有参与者是否准备好提交；在第二阶段，协调器指示它们提交（或中止）事务。如果某个参与者资源管理器能够提交其负责的那部分事务，那么一旦它已将所做的更改（对资源）及其状态记录到永久存储中，它就会同意，因此也就准备好提交了。因此，两阶段提交协议包括一个投票阶段和一个完成阶段。所有这些额外的步骤都增加了主要的处理指令，因此两阶段提交协议相对昂贵，因为它们完成所需的时间比本地事务更长。


    即使是两阶段提交协议也并非完全没有错误。在某些情况下，在两阶段提交协议即将结束时，在所有参与者都同意提交之后，某些资源可能出现故障，导致提交无法完成。然而，该协议在设计上可以容忍此类故障（服务器崩溃、网络故障或消息丢失），并且保证最终能够完成，无论是否需要人工干预，尽管无法指定完成的时间限制。


    微服务与分布式数据


    典型的单体应用将所有或大部分数据集中存放在单个数据库中，这为应用在一致性方面提供了简单性和许多控制选项。例如，查看第 13 章中引入的两个数据表，如下面的图
    14-1 所示。


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig1_HTML.jpg](img/477630_1_En_14_Fig1_HTML.jpg)


