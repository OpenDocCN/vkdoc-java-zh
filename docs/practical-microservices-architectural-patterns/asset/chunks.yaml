- fmt: '# 架构权衡


    此处需要根据所涉及的业务进行架构权衡。也许选项1更好，因为你希望将任意数量的新报价节流到`Quote Processing`微服务进行处理。通过在同一个事务中持久化一条消息，并将报价状态从“New”更改为“Confirmed”，更新外部微服务中`User
    Balance`表上的运行余额所需的信息已被安全捕获。该事务包含在单个数据库实例上，因此通过限制本地事务可以实现最大吞吐量。如果你假设有用户与`Quote
    Processing`微服务交互，那么这也是可取的，因为一旦事务完成，就需要向其设备或浏览器提供响应（尽管第[13](#477630_1_En_13_Chapter.xhtml)章中的示例没有等待的用户；相反，它使用计划任务来处理报价）。


    如果你为架构选择了选项1，那么当你从队列中出队消息以供`Quotes Settlement`微服务结算时，你仍然会遇到两阶段事务问题。如果你将报价结算视为纯粹的后台流程，那么你仍然在那里继续使用两阶段提交事务的一个理由是，你最大限度地提高了面向客户的微服务的吞吐量和可用性，同时以相对较低的后台微服务响应性作为权衡。类似的情况也适用于处理“昂贵”或“高后果”事务的场景，例如金融领域中的事务，在这些场景中，你仍然希望继续使用两阶段提交事务，因为其收益大于成本。


    同样，如图[14-7](#477630_1_En_14_Chapter.xhtml#Fig7)所示，在选项2中，设计被重构了。然而，这仅仅表明你并没有完全避免对两阶段提交事务的需求；相反，它将这种必要性从下游转移到了上游！


    ## 分布式事务示例：重构以减少ACID约束


    在“幂等操作与微服务”部分，你看到了企业系统中由于部分失败导致的问题。当你放宽ACID约束时，需要有机制来处理以下场景，包括但不限于：


    - 部分失败

    - 消息丢失

    - 重复消息

    - 重试尝试

    - 消息重新投递

    - 消息乱序接收


    如你所知，上述所有场景在第[13](#477630_1_En_14_Chapter.xhtml)章中都已涵盖。最终目标是根据所涉及用例的性质和上下文，在分布式事务和本地事务之间做出选择。但图[14-7](#477630_1_En_14_Chapter.xhtml#Fig7)说明，如果你的应用程序是单体应用，你可以仅使用本地事务。一旦你将单体应用拆分为微服务，就会在架构中引入分区，此时你需要进行权衡。图[14-7](#477630_1_En_14_Chapter.xhtml#Fig7)中的选项1是首选方案，它避免在需要高响应性的微服务（例如与人类用户交互的微服务）中使用分布式事务，而在其他微服务中保留某种形式的分布式事务，在这些微服务中，你证明使用分布式事务是合理的，因为它们是你的后台微服务，需要相对较低的响应性。


    到目前为止，一切顺利。如果分布式事务或两阶段事务在你的微服务中根本不可接受，该怎么办？这个问题能否得到解决？让我们重新审视第[13](#477630_1_En_14_Chapter.xhtml)章中的一个例子。


    ## 走向宽松的BASE：为处理重复和乱序消息而重新设计


    这里的目标不是立即弃用分布式事务。相反，你将放宽第[13](#477630_1_En_14_Chapter.xhtml)章中的设计，模拟失败场景，并看看你是否能够克服第[13](#477630_1_En_14_Chapter.xhtml)章中看到的缺点。一旦你理解了这种增强的设计，你将很好地掌握设计更具弹性和容错性的分布式系统的基础知识。一旦你掌握了这些基础知识，设计容错微服务就只是一个架构创意的问题了。


    我在这里引入的主要设计变更是在下游系统中创建一个名为`QuotesTX`的新表，如图[14-8](#477630_1_En_14_Chapter.xhtml#Fig8)所示。


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig8_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig8_HTML.jpg)


    **图14-8** 报价事务表


    你需要一种方法来跟踪通过消息中间件接收的哪些报价已被结算，哪些仍未结算。对`QuotesTX`表的事务已由系统中一个名为`StockTransaction`的新实体处理，并且该实体上的所有操作都由一个新的事务性组件服务`QuotesTransactionService`拥有。增强后的架构如图[14-9](#477630_1_En_14_Chapter.xhtml#Fig9)所示。


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig9_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig9_HTML.jpg)


    **图14-9** 宽松XA事务示例的架构


    解释示例中新构建块的宽松设计的业务流程如下：


    1.  新的股票交易报价可以被推送到`Broker Web`微服务。新报价将被插入到MySQL数据库中的`Quotes`表中，状态为“New”。

    2.  `Quotes Processor Task`是一个Quartz计划任务，它轮询MySQL数据库中的`Quotes`表，查找状态为“New”的报价。

    3.  当找到状态为“NEW”的报价时，它会在一个事务中调用`broker`服务的`processNewQuote`方法，并传递`Quotes`表中新报价的唯一标识符。

    4.  `broker`服务使用另外两个事务性服务：`auction`服务和`stock order`服务。两者的执行必须是原子的。

    5.  `auction`服务通过在一个事务中将报价状态更改为“Confirmed”来确认收到的报价。

    6.  `stock order`服务根据新报价中包含的信息创建一条JMS消息，并将其发送到ActiveMQ队列以进行报价结算，这同样在一个事务中完成。

    7.  `settlement listener`服务监听ActiveMQ队列，查找任何新的已确认报价。所有到达ActiveMQ队列的已确认报价都由`settlement
    listener`服务的`onMessage`方法在一个事务中拾取。

    8.  `settlement listener`服务调用`quotes transaction`服务，以记录系统收到的所有报价。为了使此记录操作不受封闭父事务中其他对等事务处理的影响，此记录操作的事务语义为`REQUIRES_NEW`。此记录操作在发现重复条目时不会引发任何错误。

    9.  `quotes transaction`服务尝试安全地记录下游微服务通过消息桥接收到的所有报价事务。

    10. `settlement listener`服务使用另外两个事务性服务：`quotes reconcile`服务和`quotes transaction`服务（再次使用），两者的执行必须是原子的。'
