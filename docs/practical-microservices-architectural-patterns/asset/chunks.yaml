- fmt: '*   **Message Processor Listener**: The message processor listener is an AMQP
    listener. This is the place where the actual job processing happens. Once the
    job is complete, the message processor writes the result back to another queue,
    the `msgServerQueue`. While doing so, the message processor listener does its
    part of correlating the request and response by using the same correlation ID.


    *   **Network Writer Task**: While the `main` method of the network server handles
    connection management, the network server is also a message listener to receive
    the job results back from the `msgServerQueue`. Thus, for each result in `msgServerQueue`,
    there is a different instance of the message listener, and its job is to instantiate
    a new instance of the network writer task, hand over the result, and execute it
    again within a pooled thread.^([⁸](#fn8)) The network writer task retrieves the
    correlation ID from the message and then retrieves the corresponding client socket
    to which this message is intended to be sent, and sends the message back to client.


    This completes the architecture and the flow. We’ll now look at the main code
    snippets. The complete end-to-end sequence of steps executed within a single request-response
    cycle is labelled from 1 to 7 in Figure [6-16](#477630_1_En_6_Chapter.xhtml#Fig16).
    The complete and running code samples for this exercise are kept in the folder
    named `ch06-04`, which is bundled along with the book.


    The client uses a client task, as shown in Listing [6-9](#477630_1_En_6_Chapter.xhtml#PC31):


    ```

    public void execute(){

    Socket clientSocket = new Socket("localhost", 1100);

    dataOutputStream.writeUTF(MSG_SEED + id);

    dataOutputStream.flush();

    String fromServer = dataInputStream.readUTF();

    LOGGER.debug("Message Send to Server: " + MSG_SEED + id + ";

    Message Received back from Server: " + fromServer);

    )

    Listing 6-9

    Client-Side Task (ch06\ch06-04\src\main\java\com\acme\ch06\ex04\ClientSideTask.java)

    ```


    Here, the client opens a connection to the server and first writes a message to
    the stream of the socket. The client gets blocked and waits until it receives
    a message back. When it receives a message back, it logs both the message sent
    and received from the server so that you can validate that the client did in fact
    receive the response intended for itself.


    The network server in Listing [6-10](#477630_1_En_6_Chapter.xhtml#PC32) accepts
    connections and creates a unique ID that is used to correlate request and response
    flows. The client socket is indexed against this correlation ID and the server
    gets a thread from the executor pool and asks the thread to handle the job for
    the client by assigning the job to a network reader task and providing the correlation
    ID. The network server is also a message listener to receive the job results back
    from the `msgServerQueue`.


    ```

    public class NetworkServer implements MessageListener{

    private void listen(){

    serverSocket = new ServerSocket(1100);

    while(true){

    clientSocket = serverSocket.accept();

    correlationIdNew = getNextCorrelationId();

    addItem(correlationIdNew, clientSocket);

    networkReaderTask = new NetworkReaderTask(amqpTemplate,

    correlationIdNew);

    executorPool.execute(new Worker(networkReaderTask));

    }

    }

    public void onMessage(Message message) {

    NetworkWriterTask networkWriterTask =

    new NetworkWriterTask(message);

    executorPool.execute(new Worker(networkWriterTask));

    }

    }

    Listing 6-10

    Network Server (ch06\ch06-04\src\main\java\com\acme\ch06\ex04\NetworkServer.java)

    ```


    The network reader task in Listing [6-11](#477630_1_En_6_Chapter.xhtml#PC33) reads
    the message (or job) sent by the client and submits it to the `networkQueue` for
    execution to the message processor


    ```

    private void receiveFromNetwrokAndSendMessage(){

    Socket clientSocket = NetworkServer.getItem(correlationId);

    inputStream = clientSocket.getInputStream();

    dataInputStream = new DataInputStream(inputStream);

    String fromClient = dataInputStream.readUTF();

    MessageProperties messageProperties = new MessageProperties();

    messageProperties.setCorrelationId(

    Long.toString(correlationId).getBytes());

    Message message = new Message(fromClient.getBytes(), messageProperties);

    amqpTemplate.send("my.routingkey.1", message);

    }

    Listing 6-11

    Network Reader Task (ch06\ch06-04\src\main\java\com\acme\ch06\ex04\NetworkReaderTask.java)

    ```


    Listing [6-12](#477630_1_En_6_Chapter.xhtml#PC34) shows the message processor
    where the job processing happens. Once the job is complete, the message processor
    writes the result back to another queue. While doing so, the message processor
    does its part of correlating the request and response by using the same correlation
    ID from the received message.


    ```

    public void onMessage(Message message) {

    /* ASSUME THAT WE RECEIVED THE HEAVY JOB FOR EXECUTION HERE */

    String messageBody = new String(message.getBody());

    String correlationId = new      String(

    message.getMessageProperties().getCorrelationId());

    /* ASSUME THAT THE HEAVY JOB EXECUTION TAKES PLACE HERE */

    /* EXECUTE THE HEAVY JOB AND NOW WE CAN SEND THE

    PROCESSED RESPONSE BACK */

    MessageProperties messageProperties = new MessageProperties();

    messageProperties.setCorrelationId(correlationId.getBytes());

    Message messageToSend = new Message(messageBody.getBytes(),

    messageProperties);

    amqpTemplate.send("my.routingkey.1", messageToSend);

    }

    Listing 6-12

    Message Processor (ch06\ch06-04\src\main\java\com\acme\ch06\ex04\MessageProcessorListener.java)

    ```


    The network writer task code in Listing [6-13](#477630_1_En_6_Chapter.xhtml#PC35)
    retrieves the correlation ID from the message, retrieves the corresponding client
    socket to which this message is intended to be sent, and sends the message back
    to client


    ```

    private void receiveMessageAndRespondToNetwork(){

    String messageBody = new String(message.getBody());

    String correlationId = new String(

    message.getMessageProperties().getCorrelationId());

    Socket clientSocket =

    NetworkServer.getItem(Long.parseLong(correlationId));

    NetworkServer.removeItem(Long.parseLong(correlationId));

    outputStream = clientSocket.getOutputStream();

    dataOutputStream = new DataOutputStream(outputStream);

    dataOutputStream.writeUTF(messageBody);

    dataOutputStream.flush();

    }

    Listing 6-13

    Network Writer Task (ch06\ch06-04\src\main\java\com\acme\ch06\ex04\NetworkWriterTask.java)

    ```


