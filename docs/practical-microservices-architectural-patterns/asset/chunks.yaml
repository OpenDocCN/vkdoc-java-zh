    bool、int32、float、double 和 string。您还可以将其他消息类型添加为字段类型；在您的示例中，`Products` 消息包含 Product
    消息。`= 1`、`= 2`、`= 3` 等是每个元素上的标记，用于标识该字段在二进制编码中使用的唯一“标签”。


    字段可以使用以下修饰符之一进行注释：


    *   **required**：表示必须提供该字段的值；否则，该消息将被视为“未初始化”。


    *   **optional**：表示该字段可以设置，也可以不设置。如果未设置可选字段的值，则使用默认值，例如数值类型为 0，字符串为空字符串，布尔值为 false
    等。


    *   **repeated**：表示该字段可以重复任意次数（包括零次）。重复值的顺序将在 protocol buffer 中保留。


