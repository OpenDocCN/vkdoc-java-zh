    ```


    `@CommandHandler` 注解会将 `OrderCommandHandler` 上的 `handle` 方法标记为命令处理器。被注解方法的第一个参数是该方法要处理的命令。可选地，命令处理器可以指定第二个参数，类型为
    `UnitOfWork`。如果提供了该参数，则会传入当前活跃的工作单元。一种类型的命令只能由一种类型的命令处理器处理。因此，一个订单命令处理器实例将处理新订单命令，当这样的命令到达时，它会从仓库中检索相应的领域对象（在你的场景中是
    `Product` 聚合），并执行其上的方法来改变状态（在你的场景中是减少库存并创建新订单）。这些聚合通常包含实际的业务逻辑，因此负责维护自身的不变性。聚合的状态变化会导致领域事件的生成。在上述代码中，产品库存减少和新订单的创建都会生成事件。领域事件和聚合共同构成了领域模型。


