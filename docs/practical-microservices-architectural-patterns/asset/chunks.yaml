    这是一个新的微服务。其目的是演示基于 Axon 的 CQRS 架构的可扩展性：将来，如果你有一个新功能想要订阅现有事件并添加到应用程序的现有整体功能中，你应该能够在现有运行应用程序不停机的情况下做到这一点。


