    If you use the standard `$http` service to access remote APIs, it will just work
    as long as the server is configured to allow HTTP requests from your domain and
    you don’t need to store cookies. But for many applications, including yours, you
    also need to set and store cookie information, especially for logins. By default,
    this is not allowed in most browsers, and `withCredentials` is a flag you can
    set on a low-level `XMLHttpRequest` (AJAX) object. In Angular JS you can configure
    the `$http` requests to set this flag for everything by doing:


    ```

    $httpProvider.defaults.withCredentials = true;

    ```


    As a next step, you inject an `AuthInterceptor`. The `AuthInterceptor` code is
    invoked every time a request is fired from the browser. It will retrieve the reference
    token stored in the session store and append it along with the request header.


    `user.html` will allow a user to log into the application. If the user is a new
