    实际上，图 16-8 是图 16-7 中命令处理部分的分解视图。假设 Ann 和 Ria 都试图通过一个全球在线旅行社（OTA）网站预订一个航班座位。该旅行社销售单一航空公司多个航班的座位库存。该
    OTA 也销售多家航空公司的航班座位库存。如果你查看航班座位的预订请求，它们是对应用程序的写入操作，如果采用 CQRS 模式，这些操作将被建模为命令和命令处理器。

    由于 OTA 在全球运营，假设每个时间段发生的预订总数相当可观，因此完全有理由拥有多个包含负责发起预订的命令处理器的微服务实例。这就是图 16-8 所表示的内容。该图是对实际库存和预订系统的过度简化视图，但足以解释我们本节试图讨论和解决的核心概念。

    当来自多个最终用户的预订某航空公司最后一个座位的请求几乎同时到达时，场景变得复杂。如果忽略分片、粘性会话等其他方面，你可以假设，来自多个最终用户的预订某航空公司最后一个座位的
    HTTP 请求，几乎同时命中同一个包含负责发起预订的命令处理器的微服务的不同实例。这些不同的命令处理器实例将首先尝试从持久化存储（即单一数据库）加载实体，在你的场景中，这个实体就是飞机上的最后一个座位。当这种情况发生时，关于持久化存储中最后一个座位的单一事实来源会进入多个进程空间，即命令处理器微服务的不同实例。如果底层硬件是多核架构，你现在可以想象一个场景，即处理预订请求几乎同时在同一个最后座位的不同克隆上进行。你应该如何处理这种情况？


    乐观锁

    乐观锁假设多个事务可以互不影响地完成，因此这些事务可以在不锁定它们所影响的数据资源的情况下进行。然而，在提交之前，每个事务都会验证没有其他事务修改过它的数据。如果验证发生冲突，则提交的事务会回滚。

    乐观锁通常用于跨越多个数据库事务的长事务或会话。但同样的策略也可以用于短事务。你可以在实体中存储版本信息，这样如果同一个实体被多个会话更新，后续的提交尝试会被告知冲突，并且不会覆盖先前会话的工作。这种方法保证了一定的隔离性，但扩展性良好，并且在读多写少的场景下尤其有效。Hibernate
    提供了两种不同的机制来存储版本信息：专用的版本号或时间戳。


    对于这个示例，你使用 Hibernate 作为持久化服务提供者。因此，在同一个实体上有多个事务同时进行的情况下，Hibernate 将允许其中一个事务提交（通常是先完成的那个），而另一个事务将收到一个
    `org.hibernate.StaleObjectStateException` 异常，并且该异常将携带关于导致失败的特定实体实例的信息。这里提供了一个示例：


    ```

    Caused by: org.hibernate.StaleObjectStateException: Row was updated or deleted
    by another transaction (or unsaved-value mapping was incorrect) : [com.axon.concurrency.user.model.User#1]

    ```

