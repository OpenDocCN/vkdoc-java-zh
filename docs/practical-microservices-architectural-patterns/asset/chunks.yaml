    ## Footnotes


    # Install, Configure, and Run RabbitMQ Cluster


    RabbitMQ is an open source messaging middleware which can run in all major operating
    systems and with support of development tools for many platforms. Being a message
    broker, it allows you to send and receive messages, and your messages can be kept
    in a safe place to live until received by the consumer. RabbitMQ is available
    for download from [`www.rabbitmq.com/`](http://www.rabbitmq.com/).


    You will explore the following in this appendix:


    * How to download and install Erlang, a prerequisite to installing RabbitMQ

    * How to install and start RabbitMQ Server

    * How to enable RabbitMQ management plugins and view the RabbitMQ management console

    * How to set up a RabbitMQ cluster with two nodes

    * How to shut down and bring up individual nodes in a RabbitMQ cluster


    ## Introducing RabbitMQ


    The main distinguishing feature of message brokers is the ability to decouple
    the message producers from the message consumers. As such, producers and consumers
    can publish and consume messages at their own pace and convenience. Some of the
    features of RabbitMQ are:


    * **Reliability:** RabbitMQ trades off performance with reliability. The reliability
    features include but are not limited to message persistence, delivery acknowledgements,
    publisher confirms, and high availability.

    * **Routing:** RabbitMQ routes messages through exchanges before arriving at queues.
    Several built-in exchange types are available for typical routing logic. You can
    also bind exchanges together or even write your own exchange type as plugins for
    more complex routing.


    ## Set Up RabbitMQ


    In this section, you will download and install Erlang and install and configure
    RabbitMQ and test the installation.


    ### Download and Install Erlang


    Erlang is a programming language typically used for building massively real-time
    and highly available systems. Erlang''s runtime has built-in support for concurrency,
    distribution, and fault tolerance. RabbitMQ requires Erlang to be available in
    the machine, so you will install Erlang and set it up in this section. Erlang
    is available for download at [`www.erlang.org/downloads`](http://www.erlang.org/downloads).


    Run the Erlang installation file. Even though you may choose any location, like


    ```

    C:\Program Files\erlx.x.x\

    ```


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\Erlang\erl8.0-otp_win64_19.0

    ```


    Set `ERLANG_HOME` to the location where you actually put your Erlang installation.
    It’s `D:\Applns\Erlang\erl8.0-otp_win64_19.0\erl8.0` in my machine. The RabbitMQ
    startup files expect to execute `%ERLANG_HOME%\bin\erl.exe`:


    ```

    set ERLANG_HOME=D:\Applns\Erlang\erl8.0-otp_win64_19.0\erl8.0

    ```


    ### Install and Configure RabbitMQ


    RabbitMQ is available for download at [`www.rabbitmq.com/download.html`](http://www.rabbitmq.com/download.html).
    Detailed installation instructions are also available at [`www.rabbitmq.com/install-windows-manual.html`](http://www.rabbitmq.com/install-windows-manual.html).
    Download the RabbitMQ installation file named `rabbitmq-server-windows-3.6.9.zip`.
    From the zip file, extract the folder named `rabbitmq_server-3.6.9` into `C:\Program
    Files\RabbitMQ` (or somewhere suitable for application files).


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.9

    ```


    By default, the RabbitMQ logs and Mnesia database are stored in the user''s application
    data directory, which is `C:\Users\binil\AppData\Roaming\RabbitMQ` in my machine.
    If you have to run RabbitMQ as a manually installed Windows Service, you need
    to synchronize the Erlang cookies, too; in other words, the Erlang security cookies
    used by the service account and the user running `rabbitmqctl.bat` must be synchronized
    for `rabbitmqctl.bat` to function. This can be done by ensuring that the Erlang
    cookie files contain the same string. To do this, copy the `.erlang.cookie` file
    from the Windows directory (`C:\WINDOWS\.erlang.cookie` in my machine) and replace
    the user’s `.erlang.cookie`, which can be found in the user''s home directory
    (`C:\Users\binil\.erlang.cookie` in my machine).


    ### Start Using RabbitMQ


    In this section, you will start and connect to the installed RabbitMQ server and
    carry out basic data operations.


    #### Enable Management Plugin


    The `rabbitmq-management` plugin exposes an HTTP-based API for management and
    monitoring of the RabbitMQ server. It also includes a browser-based UI utility
    by which basic management can be done. You need to first enable the management
    plugin that is included in the RabbitMQ distribution:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin>D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-plugins
    enable rabbitmq_management

    ```


    After starting the RabbitMQ (explained in next section), you can view the Web
    UI at the default URL of [`http://server-name:15672/`](https://www.server-name:15672/).


    #### Start RabbitMQ Server


    You can now start RabbitMQ Server by using this command:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin>D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-server.bat

    ```


    Listing [B-1](#477630_1_En_21_Chapter.xhtml#PC7) shows the results.


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin>D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-server.bat

    RabbitMQ 3.6.3\. Copyright (C) 2007-2016 Pivotal Software, Inc.

    ##  ##      Licensed under the MPL.  See http://www.rabbitmq.com/

    ##  ##

    ##########  Logs: C:/Users/binil/AppData/Roaming/RabbitMQ/log/RABBIT~1.LOG

    ######  ##        C:/Users/binil/AppData/Roaming/RabbitMQ/log/RABBIT~2.LOG

    ##########

    Starting broker...

    completed with 6 plugins.

    Listing B-1

    Start RabbitMQ Server

    ```


    #### View RabbitMQ Management Console


    You can now connect to the above started RabbitMQ server using your favorite web
    browser and view the RabbitMQ management console (see Figure [B-1](#477630_1_En_21_Chapter.xhtml#Fig1)):


    ![../images/477630_1_En_21_Chapter/477630_1_En_21_Fig1_HTML.jpg](images/477630_1_En_21_Chapter/477630_1_En_21_Fig1_HTML.jpg)


    **Figure B-1.** RabbitMQ management console login


    ```

    http://127.0.0.1:15672

    ```


    You can log in to the management console using the default credentials


    ```

    Username: guest

    Password: guest

    ```


    See Figure [B-2](#477630_1_En_21_Chapter.xhtml#Fig2).


    ![../images/477630_1_En_21_Chapter/477630_1_En_21_Fig2_HTML.jpg](images/477630_1_En_21_Chapter/477630_1_En_21_Fig2_HTML.jpg)


    **Figure B-2.** RabbitMQ management console


    ## Set Up a RabbitMQ Cluster


    A RabbitMQ cluster is a grouping of one or several Erlang nodes, with each node
    running the RabbitMQ application instance and sharing users, virtual hosts, queues,
    exchanges, bindings, and other runtime parameters.


    ### Configure RabbitMQ Cluster


    Explained here is how to set up a two-node RabbitMQ cluster quickly. You may want
    to create two scripts in the `sbin` folder of your RabbitMQ installation, as shown:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-server1.bat

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-server2.bat

    ```


    The contents of each are as follows:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-server1.bat

    set RABBITMQ_NODE_PORT=5672

    set RABBITMQ_NODENAME=rabbit1

    set RABBITMQ_SERVICE_NAME=rabbit1

    set RABBITMQ_SERVER_START_ARGS=-rabbitmq_management listener [{port,15672}]

    REM rabbitmq-server -detached

    rabbitmq-server

    ```'
