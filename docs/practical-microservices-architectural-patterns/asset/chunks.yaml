- fmt: '# 修改 Feign 和 Hystrix 设计


    现在，您将对“Hystrix Fallback”一节中的 Feign 和 Hystrix 设计进行轻微修改。其目的是首先演示定义 Hystrix 回退的另一种方式，然后演示
    Hystrix 仪表板。重构后的设计如图 [8-7](#477630_1_En_8_Chapter.xhtml#Fig7) 所示。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig7_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig7_HTML.jpg)


    **图 8-7** Hystrix 回退的重构设计


    在重构的设计中，所有 Feign 客户端交互都已从 Controller 移至 Component 类。因此，`ProductServerComponent`
    现在依赖于两个代理，这些代理将在运行时注入 Feign 客户端代理。


    ## 编写 Hystrix 的新设计


    本节的所有代码示例都放在文件夹 `ch08\ch08-03` 中。Hystrix 仪表板应用程序是另一个 Spring Boot 应用程序。要启用它，您需要遵循几个步骤。请访问
    `pom.xml` 查看清单 [8-9](#477630_1_En_8_Chapter.xhtml#PC20) 中显式提及的 Hystrix 仪表板依赖项。


    ```

    org.springframework.cloud

    spring-cloud-starter-hystrix-dashboard


    org.springframework.boot

    spring-boot-starter-actuator

    ```


    **清单 8-9** Hystrix 仪表板依赖项 (`ch08\ch08-03\ProductWeb\pom.xml`)


    第一个依赖项需要通过使用 `@EnableHystrixDashboard` 注解 `@Configuration` 来启用，而后一个依赖项会自动在您的 Web
    应用程序微服务中启用所需的指标。


    然后，您需要将 `@EnableHystrixDashboard` 添加到您的 Spring Boot `main` 类中，如清单 [8-10](#477630_1_En_8_Chapter.xhtml#PC21)
    所示。


    ```

    @SpringBootApplication

    @EnableCircuitBreaker

    @EnableHystrixDashboard

    @Configuration

    public class EcomProductMicroserviceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomProductMicroserviceApplication.class, args);

    }

    }

    ```


    **清单 8-10** 启用 Hystrix 仪表板 (`ch08\ch08-03\ProductWeb\src\main\java\com\acme\ecom\product\EcomProductMicroserviceApplication.java`)


    REST 控制器将所有调用委托给 `ProductServerComponent`，如清单 [8-11](#477630_1_En_8_Chapter.xhtml#PC22)
    所示。


    ```

    @RestController

    public class ProductRestController implements ProductService{

    private ProductServerComponent productServerComponent;

    @Autowired

    public ProductRestController(ProductServerComponent

    productServerComponent){

    this.productServerComponent = productServerComponent;

    }

    @RequestMapping(value = "/productsweb", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    return productServerComponent.getAllProducts();

    }

    @RequestMapping(value = "/productsweb/{productId}",

    method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId) {

    return productServerComponent.getProduct(productId);

    }

    }

    ```


    **清单 8-11** REST 控制器 (`ch08\ch08-03\ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java`)


    如清单 [8-11](#477630_1_En_8_Chapter.xhtml#PC22) 所示，`ProductRestController` 简单地将调用委托给
    `ProductServerComponent`。在 `ProductServerComponent` 中，您将方法标记为 `HystrixCommand`，并为每个
    `HystrixCommand` 定义回退方法，如清单 [8-12](#477630_1_En_8_Chapter.xhtml#PC23) 所示。


    ```

    import com.netflix.hystrix.contrib.javanica.annotation.HystrixCommand;

    @EnableFeignClients(basePackageClasses = {ProductServiceProxy.class,

    ProductAlternateServiceProxy.class})

    @ComponentScan(basePackageClasses = {ProductServiceProxy.class,

    ProductAlternateServiceProxy.class})

    public class ProductServerComponent implements ProductService{

    private ProductServiceProxy productServiceProxy;

    private ProductAlternateServiceProxy productAlternateServiceProxy;

    @HystrixCommand(fallbackMethod = "getAllTheProducts")

    public ResponseEntity>> getAllProducts() {

    return productServiceProxy.getAllProducts();

    }

    @HystrixCommand(fallbackMethod = "getTheProduct")

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId) {

    return productServiceProxy.getProduct(productId);

    }

    public ResponseEntity>> getAllTheProducts() {

    return productAlternateServiceProxy.getAllProducts();

    }

    public ResponseEntity> getTheProduct(

    @PathVariable("productId") String productId) {

    return productAlternateServiceProxy.getProduct(productId);

    }

    }

    ```


    **清单 8-12** Hystrix 命令 (`ch08\ch08-03\ProductWeb\src\main\java\com\acme\ecom\product\component\ProductServerComponent.java`)


    如您所见，如果 Product Server 1 宕机，对 `productServiceProxy.getAllProducts()` 的调用将失败，并且由于您已将
    `getAllTheProducts()` 声明为回退方法，将通过对 `productAlternateServiceProxy` 的调用进行重试。Hystrix
    在发生错误（对 `productServiceProxy` 服务的调用失败或超时）或电路断开时快速失败时使用回退方法。


    ## 构建并测试 Hystrix 回退场景


    演示 Hystrix 回退所需的完整代码保存在文件夹 `ch08-03` 中。确保 MongoDB 已启动并正在运行。然后，您可以按以下顺序构建、打包和运行三个微服务：


    ```

    cd ch08\ch08-03\ProductServer

    D:\binil\gold\pack03\ch08\ch08-03\ProductServer>make

    D:\binil\gold\pack03\ch08\ch08-03\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-03\ProductServer>run

    D:\binil\gold\pack03\ch08\ch08-03\ProductServer>java -jar -Dserver.port=8080 .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch08\ch08-03\ProductServerAlternate

    D:\binil\gold\pack03\ch08\ch08-03\ProductServerAlternate>make

    D:\binil\gold\pack03\ch08\ch08-03\ProductServerAlternate>mvn -Dmaven.test.skip=true
    clean package

    D:\binil\gold\pack03\ch08\ch08-03\ProductServerAlternate>run

    D:\binil\gold\pack03\ch08\ch08-03\ProductServerAlternate>java -jar -Dserver.port=8079
    .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch08\ch08-03\ProductWeb

    D:\binil\gold\pack03\ch08\ch08-03\ProductWeb>make

    D:\binil\gold\pack03\ch08\ch08-03\ProductWeb>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-03\ProductWeb>run

    D:\binil\gold\pack03\ch08\ch08-03\ProductWeb>java -jar -Dserver.port=8081 .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    最后一个命令将在端口 8081 上启动 Product Web。您最好在 Chrome 浏览器中打开此 HTML 实用程序：


    ```

    ch08\ch08-03\ProductWeb\src\main\resources\product.html

    ```


    加载后，浏览器客户端将向监听端口 8081 的 Product Web 发起请求，该请求将通过 Feign 客户端代理，将调用委托给监听端口 8080 的
    Product Server 1。重复刷新浏览器也会将请求指向 Product Server 1，您可以通过查看其命令窗口中发生的日志来验证这一点。为了演示
    Hystrix 回退，只需关闭 Product Server 1 并刷新浏览器。这次您将看到请求到达 Product Server 2。您还可以在 Product
    Server 微服务控制台中看到相应的日志。


    ## 检查 Hystrix 仪表板


    Hystrix 仪表板（图 [8-8](#477630_1_En_8_Chapter.xhtml#Fig8)）在您的情况下可通过以下 URL 访问：


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig8_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig8_HTML.jpg)'
