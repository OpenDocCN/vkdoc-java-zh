    \ problem. If you\nconsider quote settlement as a pure back-office process, one\n\
    justification for you to still continue with the two-phase commit\ntransactions\
    \ there is that you maximized the throughput and hence the\navailability of your\
    \ customer-facing microservices while trading off\nwith comparatively lower responsiveness\
    \ for your back-office\nmicroservices. Similar is the case where you want to deal\
    \ with\n“expensive” or “high consequence” transactions like those involved in\n\
