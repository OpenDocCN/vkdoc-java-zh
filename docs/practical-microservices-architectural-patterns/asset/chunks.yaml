- fmt: 'Figure [11-6](#477630_1_En_11_Chapter.xhtml#Fig6) 展示了蜜蜂如何建造蜂巢。它从建造第一个蜂巢开始，然后不断添加更多的蜂巢。因此，蜂巢会随着时间的推移而生长。建造蜂巢所使用的材料可能并不相同；它们会根据建造该蜂巢时可用的材料而有所不同。然而，每个新蜂巢都能与整个蜂巢完美融合，并且整个蜂巢持续发挥其功能而不受干扰。类似地，你可以构建像上述通知微服务这样的新功能，该服务将发送关于订单状态的电子邮件和基于短信的通知，从而无缝地将此增强功能添加到应用程序中，而不会对现有（微服务）应用程序造成任何停机时间^([(20)](#fn20))。


    ## 最终一致性与微服务


    现在，让我们探讨微服务中一些有趣的复杂性。单体应用通常使用单个关系型数据库。使用关系型数据库的一个关键好处是，你的应用程序可以利用 ACID 事务。图 [11-7](#477630_1_En_11_Chapter.xhtml#Fig7)
    描绘了一个典型的单体应用。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg)


    **图 11-7.** 一个电子商务单体应用


    你领域中的多个实体可以由单个关系型数据库中模式（schema）内的不同表来表示。在当前示例中，`Order`、`Item` 和 `Inventory` 就是这样的实体。客户会将多个商品添加到购物车，并最终通过单击一个按钮进行结账。当这种情况发生时，会在
    `Order` 表中创建一个新行，代表一个新订单。以此订单 ID 作为外键，会在 `Items` 表中创建与购物车中商品数量相同的行。此外，对于在 `Item`
    表中创建的每一行，必须在 `Inventory` 表中递减相应行的数量值。如果你使用单个关系型数据库，上述所有操作都可以以符合 ACID 的方式提交或回滚。


    图 [11-8](#477630_1_En_11_Chapter.xhtml#Fig8) 展示了借助微服务实现的相同业务用例。假设 `Order` 和 `Inventory`
    是两个不同的微服务。现在，让我们分析一个复杂的场景：两个用户试图大致同时地对同一个实体进行操作。这类场景在业务应用中很典型，这里列出了一些此类场景：


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig8_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig8_HTML.jpg)


    **图 11-8.** 微服务竞态条件


    *   航空公司订票应用中的最后一个座位

    *   酒店预订门户中的最后一个房间

    *   电子商务应用中某特定产品的最后一件商品


    假设 Joe 和 Ann 分别位于地球的两个不同地方，他们都对一款较旧版本的 Mac Book Pro 感兴趣，该产品在电商网站上以很大的折扣出售。同时假设该商品在电商网站上只剩下一件待售。Joe
    和 Ann 都进行了搜索、查看，并最终将此商品添加到了他们的购物车。现在假设他们两人几乎同时点击了“确认购买”按钮（图 [11-8](#477630_1_En_11_Chapter.xhtml#Fig8)
    中的标签 1 和 2）。一个基于 EDA 的微服务架构（如图 [11-8](#477630_1_En_11_Chapter.xhtml#Fig8) 所示）将允许
    `Order` 微服务代表 Joe 和 Ann 双方创建订单，并会发出 `OrderCreated` 事件。两个订单的状态现在都是“新建”。你可以进一步假设有两个
    `OrderCreated` 事件被提交，几乎是同时发生的（标签 3 和 4）。`Inventory` 微服务实例将消费这些 `OrderCreated`
    事件；同样，假设此事件消费是并发发生的。由于两个 `OrderCreated` 事件都指向同一件商品，即使微服务尝试并发处理这些 `OrderCreated`
    事件，在库存数据库管理层，代表其中一个 `OrderCreated` 事件的库存更新将被允许进行，因此库存将减少到零，并发出一个 `InventoryUpdated`
    事件（标签 5）。代表另一个 `OrderCreated` 事件进行处理的 `Inventory` 微服务无法成功，因为没有足够的库存可用，因此它将发出一个
    `NotEnoughInventory` 事件。`Order` 微服务将同时消费 `OrderCreated` 事件和 `NotEnoughInventory`
    事件。`Order` 微服务在消费 `OrderCreated` 事件时，会将相应订单的状态更改为“已确认”；然而，在消费 `NotEnoughInventory`
    事件时，它会将相应订单的状态从“新建”更改为“已取消”或“无法履行”等。这里解释的场景是完全正常且可接受的，那么问题出在哪里呢？仔细检查会发现，在一段时间内，代表
    Joe 和 Ann 创建的两个订单都处于“新建”或“已创建”状态。此时，两个用户都得到反馈说他们的订单正在被处理；然而，其中一人稍后会感到失望。系统向用户提供了一个“虚假的”快照，而不是“真实的”快照。（不过，没有买到产品的人会获得全额退款。）


    如果你回头看看图 [11-7](#477630_1_En_11_Chapter.xhtml#Fig7) 中描述的架构，你会意识到，如果 Joe 和 Ann
    试图购买那最后一件商品，那么对于其中一人来说，事务是成功的，而对于另一人来说，整个事务会被原子性地回滚，所有步骤（要么全部成功，要么全部回滚）作为一个整体单元，因此在任何时刻系统都是一致的，并且不会出现后来的失望。换句话说，要么是瞬间的失望，要么是瞬间的满意；没有机会出现最终的失望或最终的满意。现在关键的问题是：当你的架构从图
    [11-7](#477630_1_En_11_Chapter.xhtml#Fig7) 所示变为图 [11-8](#477630_1_En_11_Chapter.xhtml#Fig8)
    所示时，这种最终性对于业务来说是否可以接受？


    ## 微服务与 CAP 定理


    这个讨论引出了分布式计算中另一个有趣的约束，即 CAP 定理，本节将在微服务的背景下对其进行探讨。


