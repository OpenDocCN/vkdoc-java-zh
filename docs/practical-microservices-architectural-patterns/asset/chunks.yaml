    `java.sql.Connection` 接口是一种事务性资源，可以封装一个数据库。默认情况下，`Connection` 对象处于自动提交模式，这意味着它在执行每条语句后会自动提交更改。如果禁用了自动提交模式，则必须显式调用
    `commit` 方法来提交更改；否则，数据库更改将不会保存。当有多个语句时，最好将几个相关的语句收集到一个批处理中，然后要么全部提交，要么全部不提交。实现方法是先将
    `Connection` 的 `setAutoCommit()` 方法设置为 `false`，然后在批处理结束时显式调用 `Connection.commit()`
    或 `Connection.rollback()`。请参见清单 13-1。


    ```

    try{

    connection.setAutoCommit(false);

    Statement statement = conn.createStatement();

    String insertString = "insert into " +  dbName + ".SHIPPING VALUES ("

    + orderId + ", ''NEW'')";

    statement.executeUpdate(insertString);

    String updateString = "update " + dbName + ".ORDERS set STATUS =

    ''PROCESSED'' where ORDER_ID = " + orderId;

    statement.executeUpdate(updateString);

    connection.commit();

    }catch(SQLException se){

    connection.rollback();

    }

