- fmt: "See Figure [9-14](#477630_1_En_9_Chapter.xhtml#Fig14).\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig14_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig14_HTML.jpg)\n\
    \n**Figure 9-14**  \nHighly available microservices in the Eureka Console\n\n\
    You can see that you have registered the externally available `μService`. In other\
    \ words, the Web App `μService` (`product-home`) is registered in Eureka even\
    \ though this is not required and you are not doing a look-up of it from the registry.\
    \ Further, even the API gateway is seen registered in Eureka. This is also not\
    \ mandatory. However, these variations can be made based on your specific requirements.\n\
    \nAs a final step, you should bring up Nginx reverse proxy. Assuming you have\
    \ already done the required configurations, you can bring it up at:\n\n```\ncd\
    \ D:\\Applns\\nginx\\nginx-1.13.5\nD:\\Applns\\nginx\\nginx-1.13.5>nginx\n```\n\
    \nYou are all set. You can now test the application flow end to end by taking\
    \ a browser, preferably Chrome and typing in the following URL:\n\n```\nhttp://tiger:8090/\n\
    ```\n\nIf everything goes fine, an end-to-end flow starting from Label 1 to Label\
    \ 6, as shown in Figure [9-13](#477630_1_En_9_Chapter.xhtml#Fig13), will get executed,\
    \ fetch the data, and render the data into the web page. If the page does get\
    \ rendered with data, you may either refresh the screen using the button provided\
    \ or retry using a new browser.\n\nYou can specifically test the high availability\
    \ of each microservice by bringing one of the microservices down, testing the\
    \ application using the browser, reviving the previously downed microservice,\
    \ and retesting it using the browser.\n\nYou need to note that there are multiple\
    \ moving parts involved in this end-to-end demonstration and if you \"monkey test\"\
    \ to validate high availability scenarios, always give consideration to the microservices\
    \ by providing enough time to them to recover and enough time for them to sync\
    \ back to each other, including syncing with the registries.\n\nThere is also\
    \ a Refresh button provided in the GUI if you want to retest the loading of data.\n\
    \n## Summary\n\nA chain is as strong as its weakest link, and the same saying\
    \ holds true for many aspects of high availability. I have provided a ten-thousand-foot\
    \ view of how HA and redundancy looks at every stage of an end-to-end deployment,\
    \ starting from the client browser where data is originated and then to the web\
    \ and application servers and further to the data management and data storage\
    \ layer and finally to the archiving or the DR part. In Chapter [16](#477630_1_En_16_Chapter.xhtml),\
    \ you will also look into advanced constructs and patterns in improving HA with\
    \ an aim of making sure the sanity of every byte created by the user is preserved\
    \ as per the intended data consistency rules in the end-to-end chain, regardless\
    \ of whether you follow the traditional monolith-style architecture with strict\
    \ ACID^([^(18)](#fn18)) compliance or a newer generation microservices-style architecture\
    \ with relaxed ACID compliance. While provisioning HA and other related aspects\
    \ need redundancy in processing nodes as well as network paths, there is a chance\
    \ that the total number of network hops or thread-and-process-level context switches\
    \ are increased in a microservices-based architecture compared to that of the\
    \ monolith, so every effort should be taken to address the performance of individual\
    \ microservices as well as that of the whole microservice application. You will\
    \ do that in the next chapter.\n\n## Footnotes\n\n### 10. Microservice Performance\n\
    \nWhen you move from the traditional three-tier or n-tier architecture to the\
    \ microservices architecture, one main observable characteristic is the increased\
    \ number of interconnections between microservice processes. A computation that\
    \ once took place completely within a single process now might get split into\
    \ many microcomputations spanning across processes. This increases the number\
    \ of interprocess communications, the number of context switches, the number of\
    \ I/O operations involved, and so on. So it makes right sense to have a look at\
    \ these aspects in more detail. In this chapter, you will explore a few performance\
    \ aspects to be considered in microservices and you will look into the following:\n\
    \n*   Synchronous vs. asynchronous HTTP\n*   The Servlet 3.0 spec for asynchronous\
    \ HTTP\n*   Code to demonstrate asynchronous HTTP between browser and microservice\n\
    *   Code to demonstrate asynchronous HTTP between microservices\n*   The Google\
    \ Protocol Buffer\n*   Code to demonstrate using the Google Protocol Buffer between\
    \ microservices\n\n### Communication Across the Outer Architecture\n\nThe \"Outer\
    \ Architecture Perspective\" section in Chapter [4](#477630_1_En_4_Chapter.xhtml)\
    \ introduced the outer architecture of microservices. There you saw how the internal\
    \ complexities of a typical monolith architecture pop out to the \"surface\" when\
    \ you move to a microservices-based architecture. One obvious change is the split\
    \ of a single or a few computational processes into many more similar, but smaller\
    \ computationally intensive processes. This change is better explained with the\
    \ help of Figure [10-1](#477630_1_En_10_Chapter.xhtml#Fig1).\n\n![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig1_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1**  \nMonolith vs. microservices boundaries\n\nIn the traditional\
    \ monolith, the multiple components that form the building blocks of a service\
    \ realization get executed in a single container process. Method invocations or\
    \ messaging between these components are \"local\" or \"in process.\" This will\
    \ allow processes, whether a container-managed process or a simple Java application\
    \ process, to make a lot of assumptions and optimizations and complete the execution.\
    \ However, when you rearchitect the same service from the monolith into the microservices\
    \ architecture, the implementation gets split and deployed into more than one\
    \ process. This is shown in Figure [10-1](#477630_1_En_10_Chapter.xhtml#Fig1).\
    \ Interprocess communications are heavyweight compared to communications within\
    \ a process. They involve more context switches, network wait and I/O operations,\
    \ data marshalling and unmarshalling, etc. This increases the complexity involved\
    \ in the outer architecture space of a microservices architecture.\n\nFurther,\
    \ every microservice involves socket listeners listening to incoming traffic.\
    \ So, compared to a traditional monolith, microservices architecture involves\
    \ many more socket listeners, associated threads to process incoming traffic,\
    \ and so on. A look into the details of a few of these handpicked concerns and\
    \ analyzing the options to address them will give you a fair enough idea of the\
    \ whole landscape.\n\n### Asynchronous HTTP\n\nYou briefly looked at distributed\
    \ messaging in Chapter [6](#477630_1_En_6_Chapter.xhtml), where you also appreciated\
    \ the differences between the synchronous and asynchronous style of communications\
    \ between microservices. You saw that messaging is a first-class technology by\
    \ which microservices can communicate asynchronously, and you saw via examples\
    \ how you can correlate many asynchronous message transmissions so as to weave\
    \ them together as pieces of a single, end-to-end request/response cycle. However,\
    \ all of the samples in Chapter [8](#477630_1_En_8_Chapter.xhtml) used the HTTP\
    \ protocol for intercommunications between microservices. You will look at the\
    \ nature of these communications more closely in this section."
