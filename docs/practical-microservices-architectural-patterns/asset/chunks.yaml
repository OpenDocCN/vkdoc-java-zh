- fmt: '# Test Case 7 Transaction Semantics


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig33_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig33_HTML.jpg)


    **Figure 13-33** Test Case 7 transaction semantics


    In this case too there are no errors simulated in any upstream processing, hence
    the quote status will change from "New" to "Confirmed" and since the new quote
    message delivery to `ActiveMQ` is also successful, the `Quote Settlement` microservice
    will receive the quote message for settlement. The settlement listener service
    will receive the message and subsequently invoke the quote reconcile service for
    settlement. Settlement happens, during which it attempts to update the running
    balances of the buyer and seller. However, during the first pass, an error is
    simulated within the quote reconcile service transaction, as shown in Figure [13-33](#477630_1_En_13_Chapter.xhtml#Fig33)
    by the X sign. Further, once the control comes back from the quote reconcile service,
    another error is simulated within the settlement listener service, as shown in
    Figure [13-33](#477630_1_En_13_Chapter.xhtml#Fig33) by the X sign in the first
    pass by the settlement listener service.


    Even though the settlement listener service has read the message from `ActiveMQ`,
    the message listener method, which is in a `TX_REQUIRED` transaction context,
    will not commit the message read from `ActiveMQ`. Hence for `ActiveMQ`, the message
    delivery didn''t succeed, so it will try to deliver the message again. During
    the retry (i.e., during the second pass of the message listener processing), you
    do not simulate any error, and this is indicated by the ✓ sign in both the services.
    Hence the transactions by the settlement listener service and the quote reconcile
    service will both be successful and committed. And the effect is that the quote
    will get settled correctly in the second pass. See Figure [13-34](#477630_1_En_13_Chapter.xhtml#Fig34).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig34_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig34_HTML.jpg)


    **Figure 13-34** Test Case 7 console, complete


    # Common Messaging Pitfalls


    In this section, I will demonstrate few common messaging pitfalls which can occur
    in distributed scenarios if you have not designed the system carefully.


    ## Test the Message Received Out of Order Scenario


    Testing for this scenario is slightly tricky since you need to coordinate the
    timing of each action as per the test fixtures. I will explain based on the configuration
    for my test fixtures, and they should work for you too if you have not done any
    changes to the example configurations.


    You need to send a new quote for upstream processing but you want to delay the
    processing for a little. While this quote is waiting for the delay to be over,
    you also want to fire one more new quote for upstream processing, which will get
    processed nearly straight through without any delay. As a result, the quote created
    later has to reach the downstream system for further processing first, followed
    by the quote created initially. In this manner, you need to simulate messages
    arriving out of order at the downstream system.


    Before you start firing requests for this test case, read the rest of this section
    completely once to understand the preparations you need to make mentally so as
    to fire new quotes as per instructions. Then come back to this point of the explanation
    again, read it again, and continue the actual test.


    Figure [13-35](#477630_1_En_13_Chapter.xhtml#Fig35) shows the transaction semantics
    for this test case.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig35_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig35_HTML.jpg)


    **Figure 13-35** Test Case 8 transaction semantics


    As shown in Figure [13-35](#477630_1_En_13_Chapter.xhtml#Fig35), you don''t simulate
    any error scenarios; instead, you simulate only messages reaching out of order.


    To test this test case, take `Postman` again and fire a new quote:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "QCOM", "sellerId" : 11, "buyerId" : 21, "amount" : 800, "test" :
    8, "delay" : 90}

    ```


    You should note that you are piggybacking a delay of 90 seconds along with the
    test request payload, as shown in Figure [13-36](#477630_1_En_13_Chapter.xhtml#Fig36).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig36_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig36_HTML.jpg)


    **Figure 13-36** Test Case 8 console, creating the first quote


    Keep watching upstream microservice console (command screen). When the `Quote
    Processor Task` times out, it will fetch this new quote, changing the status from
    "New" to "Confirmed," but before completing the end-to-end transaction, it will
    sleep for the 90 seconds delay you have provided; this is shown in Figure [13-37](#477630_1_En_13_Chapter.xhtml#Fig37).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig37_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig37_HTML.jpg)


    **Figure 13-37** Test Case 8 console, showing the delay


    This 90 seconds has a significance because the next time-out of the `Quote Processor
    Task` will happen in the next 60 seconds, and during that time-out it shouldn''t
    fetch this quote because it is already in a processing state (the quote status
    is not "New").


    Here comes the trick. As soon as (within 10 to 20 seconds) the `Quote Processor
    Task` picks up the quote for processing and further goes to sleep for the delay
    of 90 seconds provided, you need to fire another new quote (ideally, you have
    another `Postman` session with the data ready), like so:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "GILD", "sellerId" : 11, "buyerId" : 21, "amount" : 900, "test" :
    8, "delay" : 2 }

    ```


    This second new quote is shown in Figure [13-38](#477630_1_En_13_Chapter.xhtml#Fig38).
    That''s all, and the steps for test execution from your part are over.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig38_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig38_HTML.jpg)


    **Figure 13-38** Test Case 8 console, creating a second quote


    When the `Quote Processor Task` times out next, it will fetch this second new
    quote alone. This is because even though the first quote is still under process
    in the upstream system, the status of the quote has already been updated to "Confirmed,"
    as shown in Figure [13-38](#477630_1_En_13_Chapter.xhtml#Fig38). This is shown
    by marking the transaction of the `Auction Service` as `TX_REQUIRES_NEW`, as is
    evident in Figure [13-35](#477630_1_En_13_Chapter.xhtml#Fig35) (another hack for
    demonstration purposes).


    For the second new quote, there is negligible process delay and it comes out of
    upstream processing, gets through `ActiveMQ`, and reaches downstream for further
    processing. You expect the first quote to still be at the process stage in the
    upstream system. This way, the message is out of order in the downstream system.
    This will be settled as shown in Figure [13-39](#477630_1_En_13_Chapter.xhtml#Fig39).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig39_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig39_HTML.jpg)


    **Figure 13-39** Test Case 8 console, second quote settled first


    Keep watching the browser consoles. Quite soon, you will see the running balances
    of users in the downstream system change. This is the effect of the first quote,
    whose upstream processing has been delayed, so it reaches the downstream system
    out of order and finally gets settled, as shown in Figure [13-40](#477630_1_En_13_Chapter.xhtml#Fig40).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig40_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig40_HTML.jpg)


    **Figure 13-40** Test Case 8 console, first quote settled in second place'
