    开发一个 RESTful Web 服务

    REST（表述性状态转移）是一种用于设计分布式系统的架构风格，由 Roy Fielding 在 2000 年的博士论文中提出。REST 是一组应用于资源的通用约束；然而，它通常与
    HTTP 相关联。本节将介绍 REST 概念，你将看到一个完整的 REST 提供者以及一个使用 Spring Boot 的 REST 消费者的完整实现。


    REST 基础

    REST 推荐一组约束，例如无状态、具有客户端/服务器关系、提供统一接口、请求-响应周期是幂等的等等。REST 并非严格与 HTTP 相关，但它最常与 HTTP
    关联。


    以下总结了 REST 的原则：


    *   资源暴露 URI，这些 URI 易于理解且具有类似目录的结构，以便它们可以被发现、链接和遍历。

    *   表示层以 JSON 或 XML 作为线缆级格式传输，以表示数据对象和属性。

    *   操作或消息显式地使用 HTTP 方法（例如 GET、POST、PUT 和 DELETE）。

    *   操作是无状态的，因此你在请求之间不会在服务器上存储任何客户端上下文。客户端仅持有会话状态，这样当客户端数量增加时，服务器的可扩展性不会因大量状态数据而受到影响。


    使用 REST 还有其他优点。一个主要优点是像缓存和代理这样的中间件可以提供缓存命中，从而除非必要，否则不会给实际的资源服务器带来压力。缓存服务器是一种专门的代理服务器，它将帮助你提高
    Web 性能。Web 性能可以在客户端、服务器端甚至其他中间件之间得到改善。遵循 REST HTTP 标准和约定将帮助你利用这些优化，由于 HTTP 是一个标准，并且许多设备都提供了配置这些优化的功能，因此你可以免费获得这些优化。


    用于 CRUD 资源的 HTTP 方法


    以下是可用于实现 REST 的主要 HTTP 方法：


    *   GET：GET 是最简单的 HTTP 操作，其目的是从服务器检索资源。200 OK 是成功操作的状态码。所有 GET 操作都应该是幂等的，这意味着无论你用相同的参数重复操作多少次，资源的状态都不应发生任何变化。

    *   POST^(¹²)：HTTP POST 为客户端提供了一种向服务器发送信息的选项。POST 推荐用于创建新资源（尽管它也可以更新现有资源）。

    *   PUT：HTTP PUT 也为客户端提供了一种向服务器发送信息的选项；然而，根据 HTTP 规范，PUT 的使用语义与 POST 略有不同。使用 PUT，你可以向服务器发送一个“新对象”，以将其放置或定位在由
    URI 表示的服务器位置，因此其意图应该是用新资源替换现有资源。就单个客户端而言，PUT 请求是幂等的。如果在 PUT 请求中只提供了数据元素的子集，其余部分将被替换为空或
    null。

    *   DELETE：DELETE 为客户端提供了一种从服务器移除资源的选项。URI 标识要删除的资源。资源可能不必立即删除；相反，它可以通过后台的异步或长时间运行的操作来完成。


    在 Spring Boot 中开发一个 REST 控制器


    你将使用前面章节中描述的相同 Product 实体来构建一个功能完整的 REST 服务，以执行 CRUD 操作。Spring 构建 RESTful Web
    服务的方法是使用控制器来处理 HTTP 请求。清单 7-13 到 7-16 展示了使用 Spring 构建基于 HATEOAS 的 REST 控制器的完整代码。清单
    7-13 展示了如何检索具有特定 ID 的产品。`@RequestMapping` 注解确保对 `/products/{id}` 的 HTTP 请求被映射到
    `getProduct()` 方法。


    ```

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @RequestMapping(value = "/products/{id}", method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("id") String id) {

    Product product = productRepository.findOne(id);

    if (product == null) {

    return new ResponseEntity>(HttpStatus.NOT_FOUND);

    }

    Resource productRes = new Resource(product,

    linkTo(methodOn(ProductRestController.class).getProduct(

    product.getId())).withSelfRel());

    return new ResponseEntity>(productRes,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    List products = productRepository.findAll();

    Link links[] = {linkTo(methodOn(ProductRestController.class).

    getAllProducts()).withSelfRel(),linkTo(methodOn(

    ProductRestController.class).getAllProducts()).withRel(

    "getAllProducts")};

    if(products.isEmpty()){

    return new ResponseEntity>>(

    HttpStatus.NOT_FOUND);

    }

    List> list=new ArrayList> ();

    for(Product product:products){

    list.add(new Resource(product,

    linkTo(methodOn(ProductRestController.class).getProduct(

    product.getId())).withSelfRel()));

    }

    Resources> productRes =

    new Resources>(list, links) ;

    return new ResponseEntity>>(

    productRes, HttpStatus.OK);

    }

    }

