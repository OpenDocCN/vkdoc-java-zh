    \ flow, and you will look at the\nexecution of the actual use case in subsequent\
    \ section.\n\nShip an Order Received\n\nIn the “Create a New Order” subsection\
    \ you the flow of creating a new\norder. All new orders created will be available\
    \ for the back office\nadmin to take and\ntrigger the fulfilment processing. The\
    \ first step in order fulfilment is\nto trigger a shipping command. Figure [17-8](#477630_1_En_17_Chapter.xhtml#Fig8)\
    \ illustrates\nthe state changes of various entities during the shipping step.\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig8_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig8_HTML.jpg)\n\
    \nFigure 17-8\nShip an Order\n\nReferring to Figure [17-8](#477630_1_En_17_Chapter.xhtml#Fig8),\
    \ the\nend-to-end flow as a result of a REST JSON request using the web app\n\
    from the back office admin to ship an order can be summarized as\nfollows:\n\n\
    1.  `order_service.js`\n    sends a REST JSON request over HTTP to ship a newly\
    \ created order:\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/shipping/shipping',shippingDTO)\n\
    \    ```\n\nThis request hits the API gateway.\n\n2.  The API gateway interprets\
    \ the URL by looking at the Service Registry\n    and directs the request to the\
    \ Order Shipping REST Controller in the\n    Ecom-shipping microservice.\n\n3.\
    \  The Order Shipping REST Controller creates a new OrderShippingCommand\n   \
    \ and sends it to the command gateway. See Listing [17-18](#477630_1_En_17_Chapter.xhtml#PC24).\n\
    \n```\n    @RestController\n    @RequestMapping(\"/shipping\")\n    public class\
    \ OrderShippingController {\n    @Autowired\n    private CommandGateway commandGateway;\n\
    \    @RequestMapping(method = RequestMethod.POST)\n    @ResponseBody\n    public\
    \ void shipOrder(@RequestBody ShippingDTO shippingDTO) {\n    OrderShippingCommand\
    \ orderCommand =\n    new OrderShippingCommand(shippingDTO.getOrderId());\n  \
    \  commandGateway.send(orderCommand);\n    }\n    }\n    Listing 17-18\n    OrderShippingController\
    \ shipOrder (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\\
    com\\acme\\ecom\\shipping\\web\\OrderShippingController.java)\n    ```\n\n4. \
    \ The command gateway delivers the OrderShippingCommand to the command\n    bus.\n\
    \n5.  The OrderShippingCommandHandler consumes the OrderShippingCommand\n    from\
    \ the command bus. See Listing [17-19](#477630_1_En_17_Chapter.xhtml#PC25).\n\n\
    ```\n    @Component\n    public class OrderShippingCommandHandler {\n    @Autowired\n\
    \    private EventBus eventBus;\n    @CommandHandler\n    public void handleOrderShipping(\n\
    \    OrderShippingCommand orderShippingCommand) {\n    eventBus.publish(asEventMessage(new\
    \ OrderShippedEvent(\n    orderShippingCommand.getOrderId(), new Date())));\n\
    \    }\n    }\n    Listing 17-19\n    OrderShippingCommandHandler handleOrderShipping\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\com\\\
    acme\\ecom\\shipping\\command\\handler\\ OrderShippingCommandHandler.java)\n \
    \   ```\n\n6.  The OrderShippingCommandHandler creates a new OrderShippedEvent\
    \ and\n    sends it to the clustered event bus.\n\n7.  When an OrderShippedEvent\
    \ appears in the clustered event bus, the\n    handleOrderShippedEvent SagaEventHandler\
    \ of\n    OrderProcessSaga picks it up.\n\n8.  The handleOrderShippedEvent in\
    \ OrderProcessSaga is similar to a\n    normal event handler in Axon. It doesn’t\
    \ start or end the existing saga;\n    instead, it needs to do a certain action\
    \ alone, sending a new\n    OrderUpdateCommand to the command gateway in your\
    \ case. See Listing\n    [17-20](#477630_1_En_17_Chapter.xhtml#PC26).\n\n```\n\
    \    public class OrderProcessSaga extends AbstractAnnotatedSaga {\n    private\
    \ Long orderId;\n    @SagaEventHandler(associationProperty = \"orderId\")\n  \
    \  public void handleOrderShippedEvent(OrderShippedEvent orderShippedEvent) {\n\
    \    commandGateway.send(new OrderUpdateCommand(\n    orderShippedEvent.getOrderId(),OrderStatus.SHIPPED));\n\
    \    }\n    }\n    Listing 17-20\n    OrderProcessSaga handleOrderShippedEvent\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
    ecom\\core\\order\\saga\\handler\\OrderProcessSaga.java)\n    ```\n\n9.  The command\
    \ gateway delivers the OrderUpdateCommand to the command\n    bus.\n\n10.  The\
    \ OrderCommandHandler is interested in the OrderUpdateCommand. See\n    Listing\
    \ [17-21](#477630_1_En_17_Chapter.xhtml#PC27).\n\n```\n    @Component\n    public\
    \ class OrderCommandHandler {\n    @Autowired\n    @Qualifier(value = \"orderRepository\"\
    )\n    private Repository orderRepository;\n    @CommandHandler\n    public void\
    \ handleOrderUpdate(OrderUpdateCommand orderUpdateCommand) {\n    Order order\
    \ = orderRepository.load(orderUpdateCommand.getOrderId());\n    order.updateOrderStatus(orderUpdateCommand.getOrderStatus());\n\
    \    }\n    }\n    Listing 17-21\n    OrderCommandHandler handleOrderUpdate (ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    order\\command\\handler\\OrderCommandHandler.java)\n    ```\n\n11.  The handleOrderUpdate\
    \ first retrieves the corresponding order and\n    calls updateOrderStatus, as\
    \ shown in Listing [17-22](#477630_1_En_17_Chapter.xhtml#PC28)."
  trans: "\n12.  在步骤 10 中恢复库存时，库存聚合体向集群事件总线注册一个`InventoryUpdateEvent`。该`InventoryUpdateEvent`由\
    \ Ecom-product 微服务中的`InventoryEventHandler`消费。\n\n13.  Ecom-product 微服务中的`InventoryEventHandler`会刷新其自身的库存读取模型物化视图。清单\
    \ 17-11 展示了执行此操作的`handleInventoryUpdates`代码。\n\n14.  在步骤 7 中，当订单聚合体收到订单取消通知时，它会向集群事件总线注册一个`OrderUpdatedEvent`。该`OrderUpdatedEvent`由\
    \ Ecom-history 微服务中的 Order History Event Handler 消费。\n\n15.  Ecom-history 微服务中的\
    \ Order History Event Handler 会更新`Order History`表中对应的 Order 记录。参见清单 17-17。\n\n\
    ```\n    @Component\n    public class OrderHistoryEventHandler {\n    @EventHandler\n\
    \    public void handleOrderUpdatedEvent(OrderUpdatedEvent event,\n    Message\
    \ eventMessage, @Timestamp DateTime moment) {\n    Order order =orderHistoryRepository.findByOrderId(event.getOrderId());\n\
    \    order.setOrderStatus(event.getOrderStatus());\n    if(event.getOrderStatus().equals(\"\
    SHIPPED\")){\n    order.setShippedDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    DELIVERED\")){\n    order.setDeliveredDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    CANCELLED\")){\n    order.setCancelledDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    DELIVERY_FAILED\")){\n    order.setDeliveryFailReason(event.getDescription());\n\
    \    }\n    orderHistoryRepository.save(order);\n    }\n    }\n    清单 17-17\n\
    \    OrderHistoryEventHandler handleOrderUpdatedEvent (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
