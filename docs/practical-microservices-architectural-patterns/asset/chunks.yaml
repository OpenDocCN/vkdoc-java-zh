    在清单 8-2 的 Feign 客户端代理中，`ProductServiceProxy` 被注入到代码中。创建这个 REST 代理客户端非常简单，大多数情况下，你只需要创建一个接口并添加一些注解。Spring
    Cloud 环境会在运行时创建实现，并使调用委托生效。清单 8-3 展示了代码中的 `ProductServiceProxy`。


    ```

    import org.springframework.cloud.netflix.feign.FeignClient;

    @FeignClient(name="product-proxy", url = "http://localhost:8080")

    public interface ProductServiceProxy extends ProductService{

    }

