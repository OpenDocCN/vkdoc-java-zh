- fmt: '# Transaction Types


    - **Flat transactions:** In a flat transaction, when one of the steps fails, the
    entire transaction is rolled back. In a flat transaction, the transaction completes
    each of its steps before going on to the next one. Each step accesses corresponding
    resources sequentially. When the transaction uses locks, it can only wait for
    one object at a time.


    - **Nested transactions:** In a nested transaction, atomic transactions are embedded
    in other transactions. The top-level transaction can open subtransactions, and
    each subtransaction can open further subtransactions, and this nesting can continue.
    The effect of an individual embedded transaction will not affect the parent transaction.
    When a parent aborts, all of its subtransactions are aborted. However, when a
    subtransaction aborts, the parent can decide whether to abort or not. In a nested
    transaction, a subtransaction can be another nested transaction or a flat transaction.


    - **Chained transactions:** In a chained transaction, each transaction relies
    on the result and resources of the previous transaction. A chained transaction
    is also called a serial transaction. Here the distinguishing feature is that when
    a transaction commits, its resources, like cursors, are retained and are available
    for the next transaction in the chain. So, transactions inside the chain can see
    the result of the previous commit within the chain; however, transactions outside
    of the chain cannot see or alter the data being affected by transactions within
    the chain. If one of the transactions should fail, only that one will be rolled
    back and the previously committed transactions will not.


    - **Saga:** Sagas are similar to nested transactions; however, each of the transactions
    has a corresponding compensating transaction. If any of the transactions in a
    saga fail, the compensating transactions for each transaction that was successfully
    run previously will be invoked.


    # Transaction Attributes in EJB vs. Spring


    Both Spring and EJB give the user the freedom to choose from programmatic and
    declarative transaction management. For programmatic transaction management, you
    need to code against the JDBC and JTA APIs. With the declarative approach, you
    externalize transaction control to configuration files. Also, you need to choose
    from the available transaction attributes to get the required behavior. The EJB
    specification defines six basic transaction attributes. Subsequently, Spring has
    counterparts for all six transaction attributes. In fact, Spring has more:


    - **`PROPAGATION_REQUIRED` (`REQUIRED` in EJB):** Supports a current transaction;
    creates a new one if none exist.


    - **`PROPAGATION_REQUIRES_NEW` (`REQUIRES_NEW` in EJB):** Creates a new transaction;
    suspends the current transaction if one exists.


    - **`PROPAGATION_NOT_SUPPORTED` (`NOT_SUPPORTED` in EJB):** Executes non-transactionally;
    suspends the current transaction if one exists.


    - **`PROPAGATION_SUPPORTS` (`SUPPORTS` in EJB):** Supports a current transaction;
    executes non-transactionally if none exist.


    - **`PROPAGATION_MANDATORY` (`MANDATORY` in EJB):** Supports a current transaction;
    throws an exception if none exist.


    - **`PROPAGATION_NEVER` (`NEVER` in EJB):** Executes non-transactionally; throws
    an exception if a transaction exists.


    - **`PROPAGATION_NESTED` (No equivalent in EJB):** Executes within a nested transaction
    if a current transaction exists, or else behave like `PROPAGATION_REQUIRED`. There
    is no analogous feature in EJB. Actual creation of a nested transaction will only
    work on specific transaction managers. Out of the box, this only applies to the
    JDBC `DataSourceTransactionManager` when working on a JDBC 3.0 driver. Some JTA
    providers might support nested transactions as well.


    # Transaction Isolation Mechanisms


    Transaction isolation refers to the protection of one transaction from the effects
    of the other, when multiple concurrent transactions happen, often on the same
    data set. Transaction managers rely on two mechanisms to achieve transaction isolation:


    - **Locking:** Locking controls access to a transaction to a particular data set.
    Read locks are non-exclusive and allow multiple transactions to read data concurrently.
    However, write locks are exclusive locks and only a single transaction is allowed
    to update data.


    - **Serialization:** When multiple transactions happen concurrently, serialization
    is a mechanism to guarantee that the effects are as if they are executing sequentially,
    not concurrently. Locking is a means of enforcing serialization.


    # Transaction Isolation Levels


    The types of serialization and locks used as well as the extent to which they
    are affected determine the level of isolation that a transaction will execute
    under. Java Enterprise Edition specifies the following types of isolation levels,
    as defined in the `java.sql.Connection` interface:


    - **`TRANSACTION_NONE`:** Indicates that transactions are not supported.


    - **`TRANSACTION_READ_COMMITTED`:** Indicates that dirty reads are prevented;
    non-repeatable reads and phantom^([^(30)](#fn30)) reads can occur.


    - **`TRANSACTION_READ_UNCOMMITTED`:** Indicates that dirty reads, non-repeatable
    reads, and phantom reads can occur. This level allows a row changed by one transaction
    to be read by another transaction before any changes in that row have been committed
    (a dirty read). If any of the changes are rolled back, the second transaction
    will have retrieved an invalid row.


    - **`TRANSACTION_REPEATABLE_READ`:** Indicates that dirty reads and non-repeatable
    reads are prevented; phantom reads can occur.


    - **`TRANSACTION_SERIALIZABLE`:** Indicates that dirty reads, non-repeatable reads,
    and phantom reads are prevented. This level prohibits the situation where one
    transaction reads all rows that satisfy a `WHERE` condition, a second transaction
    inserts a row that satisfies that `WHERE` condition, and the first transaction
    rereads for the same condition, retrieving the additional phantom row in the second
    read.


    The level of relaxation or the strictness of enforcement of the serialization
    and locks are determined by the type of concurrency the application is willing
    to tolerate with respect to staleness of data. The next section will explain this
    concept.


    # Transaction Concurrency


    When multiple concurrent transactions happen, often on the same data set, the
    effect of one transaction from the effects of the other can be controlled via
    the level of concurrency the application is willing to tolerate. The levels are
    the following:


    - **Dirty read:** Dirty reads happen when a transaction reads data that has been
    written by another transaction but has not yet been committed by the other transaction.


    - **Non-repeatable read:** If a transaction reads data, and if it gets a different
    result if it rereads the same data within the same transaction, it is a non-repeatable
    read.


    - **Phantom read:** When a single transaction reads against the same data set
    more than once, a phantom read happens when another transaction slips in and inserts
    additional data.


