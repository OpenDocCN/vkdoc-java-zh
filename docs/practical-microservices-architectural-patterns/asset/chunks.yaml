    一旦配置服务器启动，清单 8-33 中列出的 `productservice.yml` 配置参数便可通过输入 `http://localhost:8888/productservice/default`
    进行查看。


    URL 的第一部分是微服务名称。在你的案例中，微服务名称是 `productservice`。微服务名称是赋予应用程序的逻辑名称，它通过 Spring Boot（产品服务器）应用程序的
    `application.yml` 中的 [ `spring.application.name` ](http://spring.application.name)
    属性来设置。每个应用程序都应具有唯一的名称。配置服务器将使用此名称来解析并从配置服务器仓库中获取相应的 `.yml` 或 `.properties` 文件。应用程序名称也被称为服务
    ID。请参见图 8-19。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig19_HTML.jpg](img/477630_1_En_8_Fig19_HTML.jpg)


    图 8-19

    查看配置服务器


    接下来启动应用程序微服务：


    ```

    cd ch08\ch08-07\ProductServer

    D:\binil\gold\pack03\ch08\ch08-07\ProductServer>make

    D:\binil\gold\pack03\ch08\ch08-07\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-07\ProductServer>run

    D:\binil\gold\pack03\ch08\ch08-07\ProductServer>java -Dserver.port=8081 -Dspring.application.name=productservice
    -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch08\ch08-07\ProductWeb

    D:\binil\gold\pack03\ch08\ch08-07\ProductWeb>make

    D:\binil\gold\pack03\ch08\ch08-07\ProductWeb>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-07\ProductWeb>run

    D:\binil\gold\pack03\ch08\ch08-07\ProductWeb>java -Dserver.port=8080 -Dspring.application.name=productweb
    -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    打开此 HTML 工具，最好在 Chrome 浏览器中打开：`ch08\ch08-07\ProductWeb\src\main\resources\product.html`。浏览器客户端在加载自身时，会向监听
    8080 端口的 Product Web 发起请求，Product Web 会将调用委托给 Product Server 微服务。你可以在客户端浏览器中看到与
    `productservice.yml` 中配置数量相同的 Product 行。


    作为下一步，更改 `productservice.yml` 文件中 `page.size` 的值（从 `3` 改为 `2` 或 `4`）并保存文件。你应该能够通过在浏览器中输入配置服务器
    URL `http://localhost:8888/productservice/default` 来查看此更改。


    现在你可以刷新浏览器客户端。但是，此更改可能不会反映在 Product Server 微服务中。为了强制 Product Server 微服务重新加载配置参数，请调用
    Product Server 微服务的 `/refresh` 端点。这是执行器的刷新端点。以下命令将向 `/refresh` 端点发送一个空的 POST 请求：


    ```

    curl –d {} localhost:8081/refresh

    ```


    或者，你也可以使用 Postman 发送一个空的 POST 请求。如果你再次刷新浏览器客户端，你将看到更改已生效。`/refresh` 端点将刷新 Product
    Server 微服务本地缓存的配置参数，并从配置服务器重新加载^(¹³)新值。


    总结

    在本章中，你探索了 Spring Cloud 的主要构建模块。由于 Spring Cloud 提供了简单、易用且对 Spring 友好的 API，并且它建立在
    Spring 的“约定优于配置”方法之上，因此 Spring Cloud 默认了所有配置，帮助你快速上手。在后续章节中，许多 Spring Cloud 功能将被用于构建你的电子商务示例应用程序，因此本章提供的基础知识对于你连接多个微服务并可视化整体架构至关重要。正如你可能已经推测到的，许多
    Spring Cloud 组件从一开始就考虑到了故障安全和高度可用的特性。随着微服务场景下外部架构复杂性的增加，这一点尤为重要。在下一章中，你将进行端到端分析，探讨各种关键的高可用性方面和特性。


