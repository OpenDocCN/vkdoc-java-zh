  trans: '

    Axon 3 CQRS 微服务电商与 BASE 事务

    在本节中，你的主要目标是将你在第 17 章和第 18 章构建的电商示例应用从 Axon 2 迁移到 Axon 3。此外还有一个次要目标，我现在就来定义它。


    如果你还记得第 17 章“BASE 中的 ACID”一节中的讨论，当时你将订单和库存聚合放在了一起。这在现实场景中可能发生，也可能不会发生。订单或预订实体由销售渠道和最终用户活动驱动，而库存或存货实体则由最终用户和供应链活动驱动。因此，负责管理这些实体的应用程序、系统或微服务可能并非同一个，在许多情况下，它们会是独立的微服务。通过在第
    17 章和第 18 章的示例中使用单一资源管理器（MySQL 持久化引擎），你避免了分布式事务。然而，你仍然使用了 ACID 风格的事务，因为这两个实体都紧密地保存在单个微服务中，并且你利用了
    ACID 风格的本地事务。但如果你想将它们分开呢？


    移除订单与库存领域之间的 ACID 束缚


    你首先将回顾第 17 章的代码，其中你在两个聚合根实体（订单和库存）上执行了 ACID 风格的事务。第 17 章中的清单 [17-6](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC10)
    在此处作为清单 19-12 重复列出。


    ```

    @Component

    public class OrderCommandHandler {

    @Autowired

    @Qualifier(value = "orderRepository")

    private Repository orderRepository;

    @CommandHandler

    public void handleNewOrder(OrderCreateCommand orderCreatedCommand) {

    Order order = new Order(Long.valueOf(new Random().nextInt()));

    order.setOrderDate(new Date());

    order.setOrderStatus(OrderStatus.PAID);

    order.setUserId(orderCreatedCommand.getUserId());

    double total = 0;

    if (orderCreatedCommand.getLineItems() != null) {

    for (LineItemDTO lineItemDto :

    orderCreatedCommand.getLineItems()) {

    if (lineItemDto.getInventoryId() != null) {

    LineItem lineItem = new LineItem(new Random().nextLong(),

    lineItemDto.getProductId(), lineItemDto.getQuantity(),

    lineItemDto.getPrice(), lineItemDto.getInventoryId());

    total = total + lineItemDto.getPrice();

    order.addLineItem(lineItem);

    Inventory inventory =

    inventoryRepository.load(lineItemDto.getInventoryId());

    inventory.updateProductStock(lineItemDto.getQuantity(),

    ProductStockOperation.DEPRECIATE);

    }

    }

    }

    order.setTotal(total);

    order.notifyOrderCreation();

    orderRepository.add(order);

    }

    }

    清单 19-12

    OrderCommandHandler handleNewOrder (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-core\src\main\java\com\acme\ecom\core\order\command\handler\OrderCommandHandler.java)

    ```


    你在第 12 章中了解到，工作单元（UoW）是对聚合进行的一组修改。命令的执行通常发生在 UoW 的范围内。当清单 19-12 中的命令处理方法执行完毕时，UoW
    被提交，所有操作最终确定。这意味着任何仓库都会收到其聚合状态变更的通知，并且计划发布的事件会被发送到事件总线。这是一种便捷的分组方式，有助于防止在处理多个聚合之前发布单个事件。在后台，它允许仓库在整个事务中管理资源，例如锁。例如，锁只有在
    UoW 被提交或回滚时才会被释放。

    UoW 并不能替代传统的 ACID 风格事务。它仅仅是一个缓冲区，用于对变更进行分组和暂存。当 UoW 被提交时，所有暂存的变更才会被提交；然而，这种提交并非原子性的。这意味着如果提交失败，可能部分变更已被持久化，而其他变更则没有。Axon
    最佳实践规定，应遵循一条命令始终只包含一个操作的最佳实践。

    Axon 2 中的 UoW 允许一条命令在多个聚合上执行逻辑。UoW 在管理工作单元（由命令处理器完成）方面扮演着更核心的角色。UoW 当前会跟踪由仓库加载的聚合，并在
    UoW 提交时持久化它们。


    如果你的 UoW 中包含多个操作或多个聚合，那么你应该考虑将事务附加到 UoW 的提交上。在第 17 章中，你在清单 [17-7](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC11)
    中这样做了，具体代码在此处作为清单 19-13 重复列出。


    ```

    @Configuration

    @RefreshScope

    public class EcomCoreAppConfiguration {

    @Autowired

    @Qualifier("transactionManager")

    protected PlatformTransactionManager txManager;

    @Bean

    public SimpleCommandBus commandBus() {

    SimpleCommandBus simpleCommandBus = new SimpleCommandBus();

    simpleCommandBus.setDispatchInterceptors(

    Arrays.asList(new BeanValidationInterceptor()));

    SpringTransactionManager transcationMgr =

    new SpringTransactionManager(txManager);

    simpleCommandBus.setTransactionManager(transcationMgr);

    return simpleCommandBus;

    }

    }

    清单 19-13

    将事务绑定到工作单元 (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-core\src\main\java\com\acme\ecom\core\EcomCoreAppConfiguration.java)

    ```


    这里，`SpringTransactionManager` 是一个 `TransactionManager` 实现，它使用 `PlatformTransactionManager`
    作为底层事务管理器。

    这里你在单个事务中使用了两个聚合实体（库存和订单），但由于这两个聚合实体由同一个资源管理器管理，并且都在单个节点上，因此不涉及分布式事务。

    可以将事务绑定到 UoW。许多命令总线实现，例如 `SimpleCommandBus` 和 `DisruptorCommandBus`，允许你配置一个事务管理器。然后，该事务管理器将用于创建事务，并将其绑定到用于管理命令处理过程的
    UoW。这样，命令处理过程就可以被视为一个原子过程；它要么被完全处理，要么完全不处理。Axon 框架使用 UoW 来跟踪命令处理器执行的操作。当命令处理器完成时，Axon
    将尝试提交在 UoW 中注册的操作。当 UoW 绑定到事务时，它将确保绑定的事务在正确的时间点被提交。

    接下来，我们转向 Axon 3，这里有一些不同之处。

    '
- fmt: "> **Note**  \n> In the “Distributed Command and Event Handling” example in\
    \ Chapter [12](#477630_1_En_12_Chapter.xhtml), you configured the transaction\
    \ manager whereas in the Axon 3 migrated version of the same example, you haven’t\
    \ configured or used any explicit transaction manager.\n\n`Axon 3` will complain\
    \ if you deal with more than one aggregate root in a transactional command handler.\
    \ That means the combination of Listing [19-12](#477630_1_En_19_Chapter.xhtml#PC17)\
    \ and Listing [19-13](#477630_1_En_19_Chapter.xhtml#PC18) is not easy to get working\
    \ in `Axon 3`. Let’s refactor the design of the e-commerce microservice `Ecom-core`\
    \ a little.\n\nListing [19-14](#477630_1_En_19_Chapter.xhtml#PC19) reveals the\
    \ minimum configurations you need to do to wire in the command bus and the event\
    \ bus in a distributed manner. You attach a transaction manager to the command\
    \ bus as well as a saga event processor to the event queue in the code.\n\n```\n\
    @Configuration\npublic class EcomCoreAppConfiguration {\n@Value(\"${axon.amqp.exchange}\"\
    )\nprivate String rabbitMQExchange;\n@Value(\"${axon.amqp.queue}\")\nprivate String\
    \ rabbitMQQueue;\n@Bean\npublic FanoutExchange eventBusExchange() {\nreturn new\
    \ FanoutExchange(rabbitMQExchange, true, false);\n}\n@Bean\npublic Queue eventBusQueue()\
    \ {\nreturn new Queue(rabbitMQQueue, true, false, false);\n}\n@Bean\npublic Binding\
    \ binding() {\nreturn BindingBuilder.bind(eventBusQueue()).to(eventBusExchange());\n\
    }\n@Bean\npublic SpringAMQPMessageSource ecomCoreEventQueue(\nAMQPMessageConverter\
    \       messageConverter) {\nreturn new SpringAMQPMessageSource(messageConverter)\
    \ {\n@RabbitListener(queues = \"${axon.amqp.queue}\")\n@Override\n@Transactional\n\
    public void onMessage(Message message, Channel channel) {\nsuper.onMessage(message,\
    \ channel);\n}\n};\n}\n@Bean\npublic CommandBus commandBus(org.axonframework.common.transaction.\n\
    TransactionManager transactionManager) {\nSimpleCommandBus commandBus = new AsynchronousCommandBus();\n\
    commandBus.registerHandlerInterceptor(\nnew TransactionManagingInterceptor(transactionManager));\n\
