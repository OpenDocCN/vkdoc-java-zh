    你从 OrderCommandHandler 中移除了所有与库存相关的操作。相反，你执行了创建完整订单及其所有订单项所需的所有验证和计算，如清单 19-16
    所示。与库存相关的操作被移到了另一个处理器 InventoryCommandHandler 中，如清单 19-17 所示。


    ```

    @Component

