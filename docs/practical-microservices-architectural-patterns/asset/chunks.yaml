    微服务资源分布在各个节点上。你希望避免分布式事务，因为跨节点锁定资源会阻碍系统的可扩展性。此外，你可以接受最终一致性，但也不介意无法完美实现它。如果是这样，图
    13-4 展示了如何遵循宽松的 BASE 模型。应用程序要么直接与一个或多个相关的资源管理器交互，要么更典型地，通过某个负载均衡器或网关进行交互，该网关将传入请求分发到一组具有对称职责和能力的资源管理器池中。请求由一个或多个资源管理器处理，随后变更会传播到一个或多个其他资源管理器。所涉及的资源管理器数量取决于分片模型（详见第
    11 章的“伸缩立方体”部分）和所选的系统配置，范围从单个节点（单副本）到节点仲裁组，理论上甚至可以是给定数据记录的所有副本。


    Axon 提供了许多功能，你可以利用这些功能跨资源管理器展开 BASE 事务，而无需使用分布式事务管理器或事务协调器。换句话说，在 BASE 事务中不存在分布式事务管理器或事务协调器；尽管如此，事务仍然可以跨多个资源管理器传播，以达到某种程度的最终一致性。图
    13-5 描绘了这一场景，展示了 Axon 中实现此功能的关键组件。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg](img/477630_1_En_13_Fig5_HTML.jpg)


    图 13-5

    支持 BASE 事务的 Axon 组件


    你将查看典型的宽松 BASE 事务步骤，请参考图 13-5。来自浏览器的写入请求将以 HTTP PUT 的形式到达 HTTP 服务器或负载均衡器。


    1.  请求被路由到 API 网关。


    2.  API 网关将此请求路由到 Axon 应用程序的第一个接触点，即（前端）REST 控制器。


    3.  REST 控制器在解包请求后，将其解释为对实体变更的请求，并遵循 CQRS 模式创建一个命令。此命令被发送到分布式命令总线，从而启动一个本地事务。


    4.  分布式命令总线将此命令传输到包含相应命令处理程序（资源管理器 3）的节点。


    5.  命令处理程序借助写入数据库中的存储库，实现对实体的写入操作。


    6.  上述存储库的变更还会触发一个事件（第 12 章“同一 JVM 中的命令与事件处理”部分下的“设计示例场景”一节提供了详细说明），此事件被发送到集群事件总线。


    7.  在图 13-5 中，你可以看到两个不同的事件处理程序（资源管理器 1 和资源管理器 2）对先前的事件感兴趣，并且它们也可能执行各自所需的任何状态变更。


    8.  你可以看到资源管理器 2 实际上是在根据系统中的任何有趣变更来同步自身（读取数据库）。


    9.  任何后续的查询（HTTP GET）也会看到这些变更。最终，所有人都能看到这些变更。


    ACID 与 BASE

    这种比较就像比较苹果和橙子：它们并非旨在相互替代，并且在服务于各自目的方面同样出色（或糟糕）。这是一个说起来容易的论断；然而，任何 CTO 级别的讨论都不能仅凭这种直白的解释就结束。话虽如此，理解这种区别是“掌握微服务”的关键。如果你理解了这种差异，那么本书的主要意图就达到了！

    BASE 事务是微服务架构的基础，我们希望在此架构中远离 ACID 事务。然而，它们服务于不同的目的。争论孰优孰劣意义不大，因为两者解决的是正交的关注点——这也是
    CAP 定理之所以重要的原因。但话说回来，你是否想完全抛弃 ACID 事务？这就像问，作为战斗机的机长，你是应该直接控制弹射座椅按钮，还是即使无法直接触及，但（几乎）确信你的副驾驶会在你下令时为你激活它，你也能接受？在前一种情况下，你非常确定当突然需要时，你可以凭自己的意愿瞬间弹射逃生。在后一种情况下，你几乎确信你仍然能够逃生；然而，对于逃生是瞬间完成还是会延迟，存在一定程度的怀疑——延迟可能是由于你的副驾驶需要时间执行你的命令，或者不幸的是，你的副驾驶无法移动自己的肌肉来采取行动！重申一下，前者类似于
    ACID 事务，它相对更具确定性，而后者类似于 BASE 事务，它（可能）最终会发生。

    我们仍然需要 ACID，即使并非总是如此。

    现在让我们来谈谈 BASE。如果你仍然在适当的层级使用 ACID（如图 13-3 所示），那么事情就简单了。另一方面，更宽松的 BASE 方法并不会让你的生活更轻松；事实上，宽松的
    BASE 会给你带来比 ACID 复杂得多的问题。

    话虽如此，理解和领会 BASE 事务中涉及的复杂性的一种方法是先理解 ACID 事务本身，因此你将在接下来的章节中进行学习。


    重新审视分布式事务

    在查看具体示例之前，你需要理解一些概念，这些概念将为你要探索的示例设定上下文。


    本地事务

    如果你使用一个典型的资源管理器，通常该单个资源会被限制在单个主机或节点上（尽管这并非强制要求）。局限于这种单个资源的操作就是本地事务，它们只影响一个事务性资源。在单个节点内，非确定性操作较少（或者出于实际考虑，为零），因此发送到单个节点的命令必须被认为是确定性的，并且在发生任何灾难时，存在本地恢复机制。这些资源拥有自己的事务性
    API，事务的概念通常表现为会话的概念，会话可以封装一个工作单元，并带有界定 API，用于告知资源何时应将缓冲的工作提交到底层资源。因此，从开发者的角度来看，你在本地事务中并非通过事务进行管理，而只是通过“连接”进行管理。

