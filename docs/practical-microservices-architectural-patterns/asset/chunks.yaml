- fmt: '### Design and Code the Domain Entities


    For the sake of the sample in this section, you will keep the domain entity very
    simple. Your entity is a typical product that can be listed in an e-commerce site.
    Multiple products fall into a product category, so on the site you can first show
    product categories and an online user can explore or browse through the product
    categories to see all products available under the selected category. Figure [7-2](#477630_1_En_7_Chapter.xhtml#Fig2)
    shows the design for your domain entity. This is a basic design that will help
    you manage product category vs. product relationship to meet the requirement of
    listing all products available under the selected product category.


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig2_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** Product/product category domain model


    Listing [7-4](#477630_1_En_7_Chapter.xhtml#PC4) shows the code required to do
    this.


    ```

    public class Product {

    @Id

    private String id;

    private String name;

    private String code;;

    private String title;

    private String description;

    private String imgUrl;

    private Double price;

    private String productCategoryName;

    }

    public class ProductCategory {

    @Id

    private String id;

    private String name;

    private String title;

    private String description;

    private String imgUrl;

    }

    ```


    **Listing 7-4** Product/Product Category Domain Model (`ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\model\Product.java`)


    Listing [7-4](#477630_1_En_7_Chapter.xhtml#PC4) also reveals an `id` object that
    is configured to be automatically generated so you don’t have to deal with it
    manually.


    ### Code the Repositories


    The repository is an interface and it allows you to perform various operations
    involving `Product` and `ProductCategory` objects. It gets these operations by
    extending the `MongoRepository` interface defined in the Spring MongoDB project
    API. Basic functionalities provided by `MongoRepository` are:


    - Support for generic CRUD operations on a repository for a specific type

    - Methods to retrieve entities using the pagination and sorting abstraction


    See Listing [7-5](#477630_1_En_7_Chapter.xhtml#PC5).


    ```

    @RepositoryRestResource(collectionResourceRel = "products", path = "products")

    public interface ProductRepository extends MongoRepository  {

    public List findByProductCategoryName(

    @Param("productCategory") String  productCatagoryName);

    }

    @RepositoryRestResource(collectionResourceRel = "categories",

    path = "categories")

    public interface ProductCategoryRepository extends

    MongoRepository  {

    }

    ```


    **Listing 7-5** Product and ProductCategory Mongo Repositories (`ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\repository\ProductRepository.java`)


    You have defined here a custom query to retrieve a list of `Product` objects based
    on the `Category`. You can define more abstract utility methods to the above repository
    interfaces so that you will get their implementations free, but I have limited
    them as shown in Listing [7-5](#477630_1_En_7_Chapter.xhtml#PC5) to serve your
    purpose. At runtime, Spring Data REST will create implementations of the above
    interface automatically. Then it will use the `@RepositoryRestResource` annotation
    to direct Spring MVC to create RESTful endpoints at `/products` and `/categories`.


    ### Code the Boot Application Executable


    You can modify the `EcomProductMicroserviceApplication.java` file if required.
    Listing [7-6](#477630_1_En_7_Chapter.xhtml#PC6) shows the default code generated
    earlier. This is a simple Java class with a `main()` method so that it can be
    run as a standalone Java application with an embedded Tomcat servlet container
    as the HTTP runtime.


    ```

    @SpringBootApplication

    public class EcomProductMicroserviceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomProductMicroserviceApplication.class,

    args);

    }

    }

    ```


    **Listing 7-6** Spring Boot Application (`ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\EcomProductMicroserviceApplication.java`)'
