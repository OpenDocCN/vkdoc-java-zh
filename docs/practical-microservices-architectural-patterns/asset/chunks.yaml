    我不会解释这些级别，也不会探讨达到这些可用性级别的具体方法，因为我们已经描述和实践它们数十年了，并且有专门的书籍^(¹⁴)和参考资料^(¹⁵)进行说明。我们的讨论将只提供足够的背景知识，以便您将其与本次微服务高可用性（HA）的讨论联系起来。


    **设定高可用性基线**


    高可用性基线可以根据两个参数来定义：


    *   **恢复时间目标（RTO）**：业务在系统不可用的情况下能够正常运行的时间长度。

    *   **恢复点目标（RPO）**：系统恢复后，数据可能丢失的时间跨度。


    基于 RTO 和 RPO 基线目标，并进一步根据可用预算、可访问的技术、业务关键性以及可用的技术专长，软件组件的设计需要达到所需的可用性级别。


    **分解高可用性**

    如果您的基础设施由负载均衡路由器后面的两个相同且冗余的 Web 服务器组成，那么来自客户端设备的流量可以平均分配到这些 Web 服务器之间。但是，如果其中一台服务器宕机，负载均衡器会将所有后续流量重定向到仍在线的服务器。这是一个简单的机制，如果仔细扩展，它可以用于为不同元素设计高可用性。互联网、内部网络、网络设备和软件组件都是端到端高可用性链中的基本环节。您将了解我们讨论所需的基本环节，这样本章末尾演示的概念和示例对您来说才有意义。同时，在本章中，我将在本地或私有数据中心的背景下解释相关方面。在第
    16 章中，当我描述高级高可用性模式时，我将在公有云的背景下进行解释，以便您对如何在私有云和公有云背景下看待高可用性有一个更广阔的视角。


    **DNS 冗余**

    第 8 章中的“引导 URL”一节介绍了微服务架构中的域名系统（DNS）。由于 DNS 通过将人类友好的计算机主机名转换为 IP 地址来充当互联网的电话簿，因此它充当了大多数通过互联网进行的软件相关操作的引导机制。从这个点开始理解可用性是有意义的。这意味着您需要理解
    DNS 冗余的机制。


    DNS 中断可能由配置错误、基础设施故障或 DDoS 攻击引起。DNS 冗余是针对此类场景的故障安全解决方案或备份机制。如果 DNS 名称服务器因请求过多而过载，或者由于上述任何原因而宕机或响应缓慢，这会在
    DNS 网络中造成延迟，使解析过程变慢，最终导致大多数用户无法访问 DNS 服务器。您可以通过增加可用名称服务器的数量或选择范围，为单服务器架构引入 DNS
    冗余，以便有更多的名称服务器响应 DNS 查询。图 9-1 显示了一个典型的冗余 DNS 设置，其中每个 DNS 服务器都有能力充当响应 DNS 查询的主服务器。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg](img/477630_1_En_9_Fig1_HTML.jpg)


    **图 9-1**

    DNS 冗余


    现在让我们更详细地探讨这一点；见图 9-2。在设置 DNS 冗余时，服务器可以设置为主-从模式，或者主-主模式。^(¹⁶) 维护多个 DNS 提供商并保持它们同步是一个复杂的过程，但它能确保更高的可用性，同时不损害
    DNS 提供商支持的先进 DNS 功能。在为您的多 DNS 网络评估多个 DNS 提供商时，请考虑提供商的全球存在点（PoP），并确保这些位于不同网络上的提供商可以通过
    API 无缝集成。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg](img/477630_1_En_9_Fig2_HTML.jpg)


    **图 9-2**

    DNS 冗余的工作原理


    **DNS 负载均衡**

    一旦 DNS 冗余得到处理，您需要考虑 DNS 负载均衡。DNS 负载均衡器会审查一个服务器列表，并依次向每个服务器发送一个连接。当 DNS 发生变更时，必须在
    ISP（互联网服务提供商）层面进行记录。ISP 仅在每个 TTL（生存时间）周期内刷新一次其 DNS 缓存。这意味着在缓存更新之前，ISP 不知道发生的任何变更，并继续将流量路由到错误的服务器。


    除了本地负载均衡，您还可以选择全局负载均衡。全局 DNS 负载均衡将流量分布到多个数据中心，以提高性能和可用性；然而，这同样取决于您跨地域的托管策略。如果您的托管是跨地域的“双活”模式，您可以选择全局负载均衡。有些解决方案可以监控任意时刻地理上分散站点之间的连接质量，以及实际请求者的地理位置，并据此路由流量。见图
    9-3。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg](img/477630_1_En_9_Fig3_HTML.jpg)


    **图 9-3**

    全局服务器负载均衡


    **ISP 冗余**

    ISP 为您提供从您的企业到互联网的管道（或连接）（图 9-4）。如果这个管道或路径中断，将影响您的网络连接，进而影响您的企业应用程序可用性。这正是 ISP
    冗余可以为您提供帮助的地方。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg](img/477630_1_En_9_Fig4_HTML.jpg)


    **图 9-4**

    企业到 ISP 的连接

