  trans: '

    ### 云架构模型


    业界将云架构划分为四个层次：


    *   **硬件层**：硬件层包含云的物理资源，例如 CPU、磁盘和网络。


    *   **基础设施即服务**：IaaS 层利用虚拟化技术抽象物理资源，从而创建一个计算资源池，并将其作为集成资源暴露给上层和最终用户。按需资源分配等功能在此层实现。


    *   **平台即服务**：PaaS 层除了提供底层 IaaS 所提供的运行环境外，还提供应用程序开发工具和部署环境，旨在最大限度地减少将应用程序直接部署到虚拟机中的负担。关系型和非关系型存储、消息队列以及邮件服务器是通过封装合适的框架在此层提供的典型服务。


    *   **软件即服务**：位于最顶层的是 SaaS 模型，它可以托管企业定制的最终用户应用程序或租用的第三方软件，以网络服务的形式提供，从而免去企业管理与维护云各架构层的烦恼。


    图 4-6 展示了云架构的各层。通过按需自动扩展以实现更好的性能和可用性，这使得云应用程序优于部署在本地环境中的应用程序。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig6_HTML.jpg](img/477630_1_En_4_Fig6_HTML.jpg)


    图 4-6.


    云架构组件


    ### 云服务模型


    云服务模型基于用户对资源使用方式可能拥有的控制程度。图 4-7 展示了不同的模型。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig7_HTML.jpg](img/477630_1_En_4_Fig7_HTML.jpg)


    图 4-7.


    云服务模型


    通常，云架构本身可以映射到云服务模型。在传统服务模型中，用户或企业自身负责管理整个技术栈（例如，硬件、数据中心设施、软件和数据），而在云服务模型中，情况则有所不同，具体如下：


    *   **基础设施即服务**：在 IaaS 服务模型中，用户仅请求计算能力、存储、网络及其相关资源，并按使用量付费。


    *   **平台即服务**：在 PaaS 模型中，用户对底层基础设施（如 CPU、网络和存储）完全没有控制权，因为这些资源在平台层之下被抽象化了。相反，它提供了应用程序开发平台，允许使用支持的编程语言和相关工具创建应用程序，这些工具托管在云中，并通过接口（主要是浏览器）进行访问。很多时候，应用程序运行时和中间件也由云服务提供商提供，用户仅负责开发、安装、管理和操作软件应用程序及其数据。


    *   **软件即服务**：这是一种“无需操心一切”的模型，用户甚至不拥有、管理或操作应用程序。应用程序在云基础设施上运行，并可从各种客户端设备访问。提供有限的用户配置。有时，同一个应用程序实例服务于多个企业（租户）的最终用户；这类应用程序被称为多租户应用程序。


    ### SaaS 成熟度模型


    SaaS 成熟度模型是微软在十多年前提出的^(⁴)，此后，在我与架构师的讨论中，我曾多次提及这一信息。我将在此重复说明，因为当我们后续将其映射到微服务如何针对不同级别进行扩展时，理解这一点是必不可少的。图
    4-8 描绘了 SaaS 成熟度的不同级别。此处使用术语“租户”来指代为其托管应用程序的企业；最终用户从这些托管的应用程序实例访问服务。因此，两家不同的航空公司或两家不同的电子商务企业就是两个不同的租户。SaaS
    成熟度的不同级别如下：


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig8_HTML.jpg](img/477630_1_En_4_Fig8_HTML.jpg)


    图 4-8.


    SaaS 成熟度模型


    *   **级别 1 – 临时/定制**：在此 SaaS 成熟度级别，每个企业或租户都拥有自己定制开发的应用程序。这些应用程序的源代码各不相同，并且为每个租户在本地或公有云中托管独立的应用程序实例。


    *   **级别 2 – 可配置**：在此 SaaS 成熟度级别，只有一个代码库。该代码库可为每个租户单独配置，并且为每个租户在本地或公有云中托管独立的应用程序实例。


    *   **级别 3 – 可配置、高效多租户**：在此 SaaS 成熟度级别，只有一个代码库。该单一代码库的单个实例在本地或公有云中托管，服务于所有租户的最终用户。在实例化应用程序时进行的代码配置，使得运行时特性（如功能、特性和外观）能够在一定程度上根据每个租户的意愿进行“适配”。通过采用合适的架构级分区，每个客户的数据与其他客户的数据保持隔离。但这里的限制是，如果租户数量或最终用户数量超过某个限制，则难以扩展。通过分区可以在一定程度上管理可扩展性，但超过一定程度后，应用程序只能通过迁移到更强大的服务器（垂直扩展）来扩展，直到收益递减使得无法以经济高效的方式增加更多性能为止。


    *   **级别 4 – 可配置、高效多租户且可扩展**：在 SaaS 成熟度级别 4 中，在级别 3 的基础上增加了水平扩展的能力。可以水平添加多个应用服务器和数据库服务器实例，负载均衡路由器可以以轮询或平均分配的方式，将来自多个租户用户的负载分发到一组服务器实例池中。虽然使用应用服务器集群在应用服务器层进行水平扩展很简单，但在数据库层进行扩展则不那么直接，因为它需要一个数据库集群，而不仅仅是简单的服务器集群。稍后当你研究数据的“写入可扩展性”时，你将了解更多相关内容。


    ### 虚拟化


    虚拟化是一个提供抽象机器的过程，该抽象机器使用针对抽象机器的设备驱动程序，以提供硬件的虚拟副本。类型 1 的虚拟机监控程序^(⁵)运行在裸机上，大多数中端到高端微处理器都可以被虚拟化。像
    Intel 的 Xeon 这样的服务器处理器和 Arm Cortex-A 系列这样的应用处理器都是具有相同能力的硬件。虚拟化后，虚拟机将运行任何可在裸机硬件上运行的软件，同时提供与真实硬件的隔离。见图
    4-9。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig9_HTML.jpg](img/477630_1_En_4_Fig9_HTML.jpg)


    图 4-9.


    基于抽象硬件的 SaaS


    通过虚拟化技术，可以在单个硬件上有效地运行多个应用程序的实例或同一应用程序的多个实例。

    '
- fmt: '### Virtualized Servers vs. Containers


    Containers provide a way to isolate applications and provide a virtual platform
    for applications to run on. The container’s system requires an underlying operating
    system and this OS provides the basic services to all of the containerized applications
    using virtual-memory support for isolation. This is represented in Figure [4-10](#477630_1_En_4_Chapter.xhtml#Fig10)
    in the Virtualization section. VMs have their own operating system using hardware
    VM support. The overhead of containers is comparatively lower than that of VMs
    and container systems typically target environments where hundreds or thousands
    of containers are in play. When you need to run multiple applications on multiple
    servers, virtualization may be the best option, whereas if you need to run many
    copies of a single application, containers offers compelling advantages. Let’s
    look into the rationale behind this. Virtual machines package up the virtual hardware,
    a kernel (i.e. OS), and user space for each new VM. This provides the required
    level of isolation across applications, which is typically desirable if they are
    different applications so that concerns like security, data, and resources are
    completely isolated from each other.


    It’s rather easy to understand containers in the context of the Linux operating
    system. The Linux kernel has a feature called `cgroups`. `cgroups` limits, accounts
    for, prioritizes, and isolates the resource usages (compute, memory, disk I/O,
    network, etc.) of OS processes, thus providing what is called “operating system-level
    virtualization.” Container-based virtualization is comparatively lightweight (when
    compared to traditional virtual machines), imposes little to no overhead, shares
    the same OS kernel, and does not require special purpose hardware support to perform
    efficiently. All of this has paved the way for containers to define a new model
    to wrap software applications so they can be run in isolation on a shared operating
    system. Different Linux/Unix distributions use different mechanisms for operating
    system-level virtualization. For example, FreeBSD has the notion of “jails” while
    Solaris has the concept of “zones.” Since the technology used by containers to
    isolate the kernel is Linux-specific, containers can only run on Linux-based operating
    systems.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig10_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig10_HTML.jpg)


    **Figure 4-10.** Virtualization vs. containers


    Figure [4-10](#477630_1_En_4_Chapter.xhtml#Fig10) shows how resources are shared
    in a container system. When you start two (or more) containers on the same host,
    using the same base image, the whole content of the base image will be shared.
    On the contrary, if you start multiple containers with different images, it may
    happen that these images may or may not share some common layers (bin, lib, etc.),
    depending on how each layer of the image was built.


    Thus for each virtual machine the entire stack of components is running so that
    the operating system up to the application server and virtual hardware is emulated,
    including network components, CPUs, and memory. However, containers operate as
    completely isolated sandboxes with only the minimum required kernel alone of the
    operating system present for each container. The system resources of the underlying
    system are shared for containers so that the footprint is reduced, which means
    for the same hardware substantially more containers can be run than virtual machines.
    The sharing of resources in such a manner will decrease the overall footprint,
    which will also help to bring down the time required to bootstrap container instances
    as compared to instantiating the same app deployed in a VM system. This is the
    relevance of containers, especially in a cloud native environment where instantaneous
    auto scale is required. See Figure [4-11](#477630_1_En_4_Chapter.xhtml#Fig11).


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig11_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig11_HTML.jpg)


    **Figure 4-11.** Container instances sharing resources


    `Docker`, which is now based on the Linux `libcontainer`, is a management system
    used to create, manage, and monitor containers in the Linux platform. `Docker`
    helps package an application on a laptop, which can then run unmodified on any
    public cloud, private cloud, or even bare metal, following the “build once, run
    anywhere” principle. The infrastructure footprint is minimal when compared to
    virtualization based on hypervisors such as `VMWare` or `Hyper-V`.


    Red Hat favors `Ansible`, which is another container-management system. `Kubernetes`
    is another open source system for automating deployment, scaling, and management
    of containerized applications.


    `Docker` is the most popular container provider system. Since it will run only
    on a Linux-based OS, if you have to set up `Docker` in Windows or Mac machines,
    you first need to start up a Linux VM using `VirtualBox` and then run the `Docker`
    containers inside this virtual machine.


    Another feature when you move from a traditional monolith-based SaaS to a microservice-based
    SaaS, the so-called heavy middleware like `Oracle Weblogic` or `IBM Websphere`
    will get replaced by comparatively lighter runtimes, like `Tomcat` or `Jetty`.
    It is also common to have these runtimes configured to be run as embedded within
    the Java process so that the overall footprint is minimal.


    ## The Architecture of Microservices


    Microservices architecture (MSA) can be defined as a way of designing software
    applications with an aim to achieve agility of delivery, flexibility of deployment,
    and precision of scalability. There are a lot of associated benefits, and also
    a set of complexities you must deal with. Let’s look at few of them and the bigger
    picture associated with them in this section.


    ### Inversion of Architecture


    In MSA, applications are composed of small, independently deployable processes
    communicating with each other using platform-agnostic and programming language-agnostic
    APIs and protocols. Each of these processes hosts application components that
    expose closely related business capabilities. Many such processes expose many
    such capabilities for an enterprise application. Thus in a MSA, a single capability
    or a single process or a single microservice alone may not be sufficient to represent
    an enterprise application of any considerable size.


    In the monolith, it is one single (main) process that hosts the entire application
    package. Hence all or most of the following concerns within a monolith application
    are encompassed within the single process space itself:


    *   Service dependency management

    *   Service configuration management

    *   Service instrumentation

    *   Service SLA

    *   Service management and monitoring


    In MSA, since there are many processes communicating with each other, all or most
    of the above concerns are not limited to a single process alone, unlike the scenario
    with a monolith. They are to be dealt with for all these coordinating processes
    and this means extra process complexities. And this is the next most distinguishable
    characteristic of a microservice, where the inner concerns of a single process
    of the earlier monolith are now exploded to the outside of many microservices.
    This is called the “Inversion of Architecture” (IoA).'
