    gateway`再将命令分派到`command bus`。


    3.  `command bus`接收命令并将其路由到`order command handler`。


    4.  `order command handler`检索对应的`product`并减少库存。


    5.  减少`product`库存后，通过向`product entity`发送更新来在`product repository`中生效更改，该更新将持久化到`Write
    DB`中。


    6.  此仓库更改会向`event bus`触发一个`stock updated`事件，`event bus`再将事件分派给所有感兴趣的`event listener`。


    7.  `product event handler`已订阅`stock updated`事件，因此它会收到库存更新详情的通知。


    8.  基于`stock updated`事件中提到的详情，`product event handler`对`product`的读模型进行更改。


    9.  在第4步中，您看到`order command handler`减少了`product`库存。它还根据收到的`new order command`中提到的详情创建了一个新订单。


    10. 创建新订单时，通过插入新的`order entity`在`order repository`中生效，该实体随后将持久化到`Write DB`中。


    11. 此仓库插入操作会向`event bus`触发一个`order created`事件，`event bus`再将事件分派给所有感兴趣的`event listener`。


    12. `order event handler`已订阅`order created`事件，因此它会收到新创建订单详情的通知。


    13. 基于`order created`事件中提到的详情，`order event handler`对`order`的读模型进行更改。


    14. 浏览器可以自行刷新，以通过查询实体的读模型来保持视图更新。


