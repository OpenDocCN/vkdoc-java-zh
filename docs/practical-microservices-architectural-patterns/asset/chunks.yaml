    ## HTTP PUT to Replace an Entity


    If you wish to replace an entire group, use HTTP PUT. The server may opt to create
    a new group and throw the old one out, so the ids may remain the same. But the
    client should assume that he gets an entirely new item, based on the server''s
    response.


    In the case of a PUT request, the client should always send the entire resource,
    having all the data that is needed to create a new item, as shown in Listing [D-4](#477630_1_En_23_Chapter.xhtml#PC7).


    ```bash

    binils-MacBook-Pro:~ mike$ curl -i -X PUT -H "Content-Type:application/json" -d
