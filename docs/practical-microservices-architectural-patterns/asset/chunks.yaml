- fmt: "你知道，当创建新报价时，其状态为“New”。当报价被处理并结算时，其状态会更新为“Confirmed”，同时该报价的价值会被添加到`User Balance`表中买方和卖方的运行余额中。这两个操作必须是原子性的，如果这是一个单体系统，你可以在本地事务的范围内使这些操作具有原子性。参见清单[14-1](#477630_1_En_14_Chapter.xhtml#PC1)。\n\
    \n```\nStart Local Transaction\nUpdate Quote Status\nIncrement or Decrement User\
    \ Balance\nEnd Local Transaction\nListing 14-1\nTransactions in a Monolith application\n\
    ```\n\n当你将处理过程拆分为多个微服务时，根据微服务设计原则，每个微服务将管理自己的数据。这意味着，报价处理微服务将拥有并管理`Quotes`表，而报价结算微服务将拥有并管理`User\
    \ Balance`表。如果你使用两阶段提交的全局事务，操作将如清单[14-2](#477630_1_En_14_Chapter.xhtml#PC2)所示。\n\
    \n```\nStart Global Transaction\nUpdate Quote Status\nIncrement or Decrement User\
    \ Balance\nEnd Global Transaction\nListing 14-2\nGlobal Transactions in Microservices\n\
    ```\n\n如果你不对清单[14-2](#477630_1_En_14_Chapter.xhtml#PC2)中描述的操作使用两阶段提交事务，那么这两个操作必须由两个微服务分别完成，这意味着这两个操作之间的原子性必须被放宽。参见清单[14-3](#477630_1_En_14_Chapter.xhtml#PC3)。\n\
    \n```\nStart Local Transaction\nUpdate Quote Status\nEnd Local Transaction\nStart\
    \ Local Transaction\nIncrement or Decrement User Balance\nEnd Local Transaction\n\
    Listing 14-3\nLocal Transactions in Microservices\n```\n\n存在一种可能性：当报价状态从“New”更改为“Confirmed”后，紧接着发生错误，导致报价价值对买方和卖方的增减操作（即在`User\
    \ Balance`表中）未能执行，因此报价结算被遗漏！参见清单[14-4](#477630_1_En_14_Chapter.xhtml#PC4)。\n\n\
    ```\nStart Local Transaction\nUpdate Quote Status\nEnd Local Transaction\nStart\
    \ Local Transaction\nIncrement or Decrement User Balance\nEnd Local Transaction\
    \ !ERROR\nListing 14-4\nLocal Transactions in Microservice Error Scenario\n```\n\
    \n这种状态是否可被应用程序接受，取决于上述`User Balance`表中的操作被遗漏所造成的影响。即使`User Balance`表中的数据更新被遗漏，相同的信息已经在`Quotes`表中以不同形式被追踪。在此示例中，`User\
    \ Balance`表中的数据应被视为一种摘要视图，它是每个用户聚合总额的一种缓存。这是为了在系统中更快地查找每个用户的交易余额而存在的。如果应用程序认为这些用户余额仅仅是估算值，其正确值始终可以通过`Quotes`表中的数据进行准确性验证，那么前面描述的错误——即遗漏了报价价值对买方和卖方在`User\
    \ Balance`表中的增减——是可以接受的。在这种情况下，`User Balance`表中的数据并不要求100%准确。\n\n第[13](#477630_1_En_13_Chapter.xhtml)章中的“测试消息丢失场景”一节模拟了这样一个错误场景：报价状态从“New”更改为“Confirmed”成功，但由于从上游微服务发送到下游微服务的消息未能送达，导致下游的结算被遗漏。该节引入了位于两个微服务之间的消息中间件作为桥梁，从而使微服务之间实现松耦合。然而，当你这样解耦微服务时，又引入了另一个难题：管理一个微服务与消息中间件之间的一致性。当你的应用程序中有许多微服务时，这类场景很常见。你将在后面的“全局资源与本地资源”一节中了解涉及消息中间件时的复杂性；不过，我们暂时先不讨论队列。\n\
    \n## 幂等操作与微服务\n\n处理清单[14-4](#477630_1_En_14_Chapter.xhtml#PC4)中错误场景的一个简单方法是反转事务的顺序。参见清单[14-5](#477630_1_En_14_Chapter.xhtml#PC5)。\n\
    \n> **注意**  \n> 这种反转事务顺序的方法在此特定场景下有效；对于你的情况，可能需要不同的方法。\n\n```\nStart Local Transaction\n\
    Increment or Decrement User Balance\nEnd Local Transaction\nStart Local Transaction\n\
    Update Quote Status\nEnd Local Transaction\nListing 14-5\nLocal Transactions in\
    \ Microservice Scenario Reversed\n```\n\n通过如上所述反转事务的顺序，你可以始终确保：只有在确定用户余额更新成功时，才会尝试更改报价状态。通过这种方式，你可以确信，如果报价处理通过将报价状态从“New”更改为“Confirmed”而完成，那么该报价肯定已经通过在`User\
    \ Balance`表中进行相应更改而结算完毕。\n\n这时出现了一个新场景。如果在报价已在`User Balance`表中结算之后，报价处理失败，会发生什么？在这种情况下，用户余额已更新，但报价仍保持“New”状态，如清单[14-6](#477630_1_En_14_Chapter.xhtml#PC6)所示。\n\
    \n```\nStart Local Transaction\nIncrement or Decrement User Balance\nEnd Local\
    \ Transaction\nStart Local Transaction\nUpdate Quote Status\nEnd Local Transaction\
    \ !ERROR\nListing 14-6\nLocal Transactions in Microservice Scenario Reversed Error\n\
    ```"
  raw: 'You know that when a new quote is created, its status is “New.” When a

    quote is processed and settled, its status gets updated to “Confirmed”

    and simultaneously the value of the quote gets added to the running

    balances of both the buyer and the seller in the `User Balance` table.

    These two actions must be atomic, and if it’s a monolith system, you can

    make the operations atomic within the span of a local transaction. See

    Listing [14-1](#477630_1_En_14_Chapter.xhtml#PC1).


    ```

    Start Local Transaction

    Update Quote Status

    Increment or Decrement User Balance

    End Local Transaction

    Listing 14-1

    Transactions in a Monolith application

    ```


    When you split the processing into more than one microservice, as per

    the principle of microservices design, each microservice will manage its

    own data. This means, the Quote Processing microservice will own and

    manage the `Quotes` table, whereas

    the Quote Settlement microservice will own and manage the `User Balance` table.

    If you use two-phase commit global transactions, the actions will be as

    shown in Listing [14-2](#477630_1_En_14_Chapter.xhtml#PC2).


    ```

    Start Global Transaction

    Update Quote Status

    Increment or Decrement User Balance

    End Global Transaction

    Listing 14-2

    Global Transactions in Microservices

    ```


    If you do not use two-phase commit transaction for the operations

    described in Listing [14-2](#477630_1_En_14_Chapter.xhtml#PC2), then the two

    actions will have to be done separate by the two microservices and this

    means the atomicity between these two actions has to be relaxed. See

    Listing [14-3](#477630_1_En_14_Chapter.xhtml#PC3).


    ```

    Start Local Transaction

    Update Quote Status

    End Local Transaction

    Start Local Transaction

    Increment or Decrement User Balance

    End Local Transaction

    Listing 14-3

    Local Transactions in Microservices

    ```


    There is a possibility that when the quote status is changed from “New”

    to “Confirmed” something will go wrong just after this change in such a

    manner that the addition-deduction of the value of the quote to the

    buyer and the seller in the `User Balance` table

    won’t happen, so the quote settlement is missed! See Listing [14-4](#477630_1_En_14_Chapter.xhtml#PC4).


    ```

    Start Local Transaction

    Update Quote Status

    End Local Transaction

    Start Local Transaction

    Increment or Decrement User Balance

    End Local Transaction !ERROR

    Listing 14-4

    Local Transactions in Microservice Error Scenario

    ```


    Whether this state is admissible to the application depends upon the

    impact if the above action in the `User Balance` table is

    missed. Even though the update of data in the `User Balance` table is

    missed, the same is already tracked in a different form in the `Quotes` table.
    In this

    example, the data in the `User Balance` table is

    to be looked at as a summary view, which is a kind of cache of the

    aggregated total for each user. This is present for faster lookup of the

    trading balance of each user in the system. If the application assumes

    that these balances for users are estimates alone, whose correct value

    can always be verified for accuracy using data from the `Quotes` table, then

    the error described earlier, missing the addition of the value of the

    quote to the buyer and the seller in the `User Balance`

    table , is

    acceptable. In such a scenario, the data present in the `User Balance` table is

    not expected to be 100% accurate.

    The “Test the Lost Message Scenario” section in Chapter [13](#477630_1_En_13_Chapter.xhtml)
    simulated an error scenario like

    this where the quote status change from “New” to “Confirmed” was

    successful; however, the downstream settlement was missed because the

    message sent from the upstream to the downstream microservice failed to

    reach through. It introduced the messaging middleware between the two

    microservices as a bridge so that the microservices were loosely

    coupled. Alas, when you decoupled the microservices like this, you

    introduced another headache: managing

    consistency across one microservice and the messaging middleware. Such

    scenarios are common when you have many microservices in your

    application. You will look into the complexities involved when you get

    to the messaging middleware later in the “Global vs. Local Resources”

    section; however, let’s keep aside the queue for the time being.


    Idempotent Operations and Microservices

    One easy way to handle the error scenario  in Listing [14-4](#477630_1_En_14_Chapter.xhtml#PC4)
    is to simply

    reverse the order of transactions. See Listing [14-5](#477630_1_En_14_Chapter.xhtml#PC5).


    Note

    This reversal of order of transaction works in this specific

    scenario; for your case, it may require a different approach.


    ```

    Start Local Transaction

    Increment or Decrement User Balance

    End Local Transaction

    Start Local Transaction

    Update Quote Status

    End Local Transaction

    Listing 14-5

    Local Transactions in Microservice Scenario Reversed

    ```


    By reversing the order of transactions as listed above, you can

    always make sure that you will attempt to change the quote status if and

    only if you are sure that the user balance update is successful. In this

    manner, you can be sure that if the quote processing is completed by

    changing the quote status from “New” to “Confirmed,” the quote is

    already settled for sure by making corresponding changes in the `User Balance`

    table.


    There arises a new scenario then. What if the quote processing fails after

    the quote is settled in the `User Balance` table?

    Here, the user balance is updated; however, the quote remains in the

    status of “New,” as shown in Listing [14-6](#477630_1_En_14_Chapter.xhtml#PC6).


    ```

    Start Local Transaction

    Increment or Decrement User Balance

    End Local Transaction

    Start Local Transaction

    Update Quote Status

    End Local Transaction !ERROR

    Listing 14-6

    Local Transactions in Microservice Scenario Reversed Error

    ```'
