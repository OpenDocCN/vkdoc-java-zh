    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig30_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig30_HTML.jpg)\n\
    \n**Figure 17-30** Order shipped, subsequent order delivery in progress\n\nOnce\
