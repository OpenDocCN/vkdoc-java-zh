  trans: '

    到目前为止，一切顺利。现在让我们进入业务编排部分。库存折旧和创建新订单的编排工作，现在将从清单 19-12 的 `OrderCommandHandler`
    转移到清单 19-18 的 `OrderController` REST 控制器中。其核心要点是，对这两个实体的操作要么全部成功，要么所有操作都必须进行补偿回滚！


    ```java

    @RestController

    @RequestMapping("/order")

    public class OrderController {

    @Autowired

    private CommandGateway commandGateway;

    @RequestMapping(method = RequestMethod.POST)

    @ResponseBody

    public OrderCreationStatus createOrder(@RequestBody OrderDTO orderDTO) {

    OrderCreationStatus orderCreationStatus = null;

    //步骤 1：折旧产品库存.............

    List inventoryUpdatedList = new ArrayList();

    try {

    for (LineItemDTO lineItemDTO : orderDTO.getLineItems()) {

    commandGateway.sendAndWait(new InventoryUpdateCommand(

    lineItemDTO, ProductStockOperation.DEPRECIATE));

    inventoryUpdatedList.add(lineItemDTO);

    }

    } catch (Exception ex) {

    Throwable e = ex.getCause();

    if (e instanceof OutOfStockException) {

    LOGGER.error("由于缺货，创建新订单时出错", e);

    orderCreationStatus = OrderCreationStatus.OUT_OF_STOCK;

    } else {

    LOGGER.error("更新库存时出现未知错误", e);

    orderCreationStatus = OrderCreationStatus.FAILED;

    }

    //步骤 2：任何异常，回滚已更新的库存

    for (LineItemDTO lineItemDTO : inventoryUpdatedList) {

    commandGateway.send(new InventoryUpdateCommand(

    lineItemDTO, ProductStockOperation.ADD));

    }

    return orderCreationStatus;

    }

    //步骤 3：创建新订单

    try {

    OrderCreateCommand orderCommand =

    new OrderCreateCommand(orderDTO.getUserId(),

    orderDTO.getLineItems());

    commandGateway.sendAndWait(orderCommand);

    orderCreationStatus = OrderCreationStatus.SUCCESS;

    } catch (Exception ex) {

    LOGGER.error("创建新订单时出现未知错误", ex);

    orderCreationStatus = OrderCreationStatus.FAILED;

    // 步骤 4：任何异常，回滚所有已更新的库存

    for (LineItemDTO lineItemDTO : orderDTO.getLineItems()) {

    commandGateway.send(new InventoryUpdateCommand(lineItemDTO,

    ProductStockOperation.ADD));

    }

    }

    return orderCreationStatus;

    }

    @RequestMapping(value = "{orderId}", method = RequestMethod.DELETE)

    @ResponseBody

    public void cancelOrder(@PathVariable Long orderId) {

    OrderCancelCommand orderCommand = new OrderCancelCommand(orderId);

    commandGateway.send(orderCommand);

    }

    }

    清单 19-18

    Order REST 控制器 (ch19\ch19-03\Ax3-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\web\OrderController.java)

    ```


    在清单 19-18 中，你首先需要注意的一点是，HTTP POST 方法 `createOrder` 并不在任何类型的事务之内。这正是你执行库存折旧和创建新订单编排的地方。这意味着，虽然聚合根实体操作发生在清单
    19-16 中 `OrderCommandHandler` 的命令处理器操作和清单 19-17 中 `InventoryCommandHandler` 的本地事务内，但它们的编排是在没有任何封闭事务上下文的情况下完成的，如清单
    19-18 所示。这意味着异常和错误可能发生在任何一行代码（即指令或操作）执行时（或之后），在这种情况下，到目前为止已执行的操作也必须进行补偿回滚！


    清单 19-18 显示，在步骤 1 中，你根据 Order POST 请求中的行项目数量，对每个行项目执行 `sendAndWait` 发送 `InventoryUpdateCommand`。`sendAndWait`
    将一个 `InventoryUpdateCommand` 分派到命令网关，以便该命令能被清单 19-17 中的 `InventoryCommandHandler`
    拾取。此外，由于 `OrderController` 和 `InventoryCommandHandler` 位于同一个微服务（或分区）中，并且 `sendAndWait`
    是一个同步阻塞调用，因此如果 `sendAndWait` 成功，你可以确信预期的操作已确定执行。对于所有 `sendAndWait` 成功的行项目，你将它们记录在
    `inventoryUpdatedList` 中，以便在需要时稍后执行补偿操作。如果你能够成功地为订单的所有行项目执行 `sendAndWait` 发送 `InventoryUpdateCommand`，那么你将进入步骤
    3，开始创建订单。换句话说，在继续创建订单之前，你要确保有足够的库存，并且折旧了所有必需的库存。


    在检查库存时，任何行项目都可能因库存不足或其他故障而发生错误。无论原因如何，在这种情况下都无法完成整个订单，因此你需要对已为该订单生效的任何库存变更进行补偿。这在清单
    19-18 中标记为步骤 2。


    如果步骤 1 完全成功且没有任何错误，则意味着你已有足够的库存来履行订单，因此你开始执行步骤 3。在这里，你再次创建一个 `OrderCreateCommand`
    并通过 `sendAndWait` 发送到命令网关。清单 19-16 中处理新订单创建的 `OrderCommandHandler` 同样位于同一个微服务中，因此成功的
    `sendAndWait` 足以确定订单创建成功。此阶段的异常也意味着你需要对已为该订单生效的任何库存变更进行补偿。这在清单 19-18 中标记为步骤 4。


    这是一个 BASE 事务的示例；然而，整体事务并非万无一失。这意味着，如果在执行 `createOrder` HTTP REST POST 方法期间发生微服务崩溃，`createOrder`
    中的其余指令将不会被执行；极有可能出现以下状态：


    *   订单中对应行项目的库存已更新；但订单未创建，且库存未恢复。


    *   订单中所有行项目对应的库存已更新；但订单未创建，且库存未恢复。


    *   订单中所有行项目对应的库存已更新；但订单未创建，且仅恢复了部分行项目对应的库存。

    '
- fmt: '系统可能无法最终达到一致性，因为将系统带回最终一致状态所需的“引力”随着微服务的崩溃而消失！更明确地说，将系统带回语义一致状态所需的基本状态已经丢失，因为你没有使微服务栈的状态持久化。


    ## 将订单和库存领域划分为独立的微服务


    你看到`OrderCommandHandler`中的`handleNewOrder`处理（如清单[19-12](#477630_1_En_19_Chapter.xhtml#PC17)所示）等同于对订单和库存实体进行的ACID风格操作。然而，在本章的重构中，你将代码转换为了`OrderController`中`createOrder`的HTTP
    POST方法（如清单[19-18](#477630_1_En_19_Chapter.xhtml#PC23)所示）。这里的处理等同于BASE风格，但没有任何固有的故障转移特性。在采用了跨订单和库存聚合根实体的BASE风格事务后，订单和库存领域现在已成为彼此领域独立的头等公民，因此如果需要，它们也可以被分离到各自的微服务中。


    你不会在此处实现图[19-2](#477630_1_En_19_Chapter.xhtml#Fig2)所示的重构。相反，这将是后续的练习。下一小节将提供更多相关提示。


    ![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg](images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg)


    **图19-2.** 为Axon 3重构的微服务电商架构


    ## 用于确定性最终一致性的Saga


    在采用了跨订单和库存聚合根实体的BASE风格事务后，订单和库存领域现在可以成为独立的微服务。然而，有一个问题！当你将订单和库存领域分离为独立的微服务时，以下组件将不再位于同一位置：


    *   `OrderCommandHandler`，如清单[19-16](#477630_1_En_19_Chapter.xhtml#PC21)所示

    *   `InventoryCommandHandler`，如清单[19-17](#477630_1_En_19_Chapter.xhtml#PC22)所示

    *   `OrderController`，如清单[19-18](#477630_1_En_19_Chapter.xhtml#PC23)所示


    如果是这样，向一个或多个命令处理器发送的`sendAndWait`将跨网络分区执行，因此其确定性特性将丢失。如果你继续像在`InventoryCommandHandler`（如清单[19-17](#477630_1_En_19_Chapter.xhtml#PC22)所示）中那样建模BASE事务，那么它失败的可能性将超出我已经解释的范围。


    手动建模BASE事务的方式在这里不是一个好主意。由于以下特性，你需要在此处使用saga事务：


    *   Saga是长生命周期的。

    *   Saga是持久的。即使微服务崩溃，Saga也可以被恢复。

    *   Saga可以建模复杂的补偿场景。

    *   Saga的事务或补偿可以重放或重试。


    未结束的Saga总是倾向于将系统（带）回一致状态，无论时间线上的最终点在哪里。

    当订单和库存领域被分离到不同的微服务时，你可以很好地使用saga来建模多行商品订单的创建。一个saga可以跟踪每个库存消耗的状态，一旦满足条件，就继续创建新订单，然后结束saga。在这个例子中，我没有这样做，因为我不想让演示过于复杂，因为它已经包含了一个saga。


    ## 配置电商微服务应用


    按照第[18](#477630_1_En_18_Chapter.xhtml)章中“配置电商微服务应用”和“设置环境基础设施”部分的说明进行操作。


    ## 构建并运行电商微服务应用


    同样，你应该按照第[18](#477630_1_En_18_Chapter.xhtml)章中“构建并运行安全的电商微服务应用”部分的说明进行操作。在了解了Axon
    3之后，让我们在下一节中看看Axon 4。


    ## 使用Axon 4在同一个JVM中进行命令和事件处理


    在本节中，你将把第[12](#477630_1_En_12_Chapter.xhtml)章中“在同一个JVM中进行命令和事件处理”部分讨论的代码迁移到Axon
    4。迁移后的代码库位于文件夹`ch19\ch19-04`中。在阅读代码时，你可能需要参考Axon 4参考文档^([^(47)](#fn47))和Axon 4
    API文档^([^(48)](#fn48))。

    实际上，这段代码是对本章前面“使用Axon 3在同一个JVM中进行命令和事件处理”部分中看到的代码的重构。要构建并执行该示例，请按照那里提到的说明进行操作，但有一个额外的步骤需要你作为第一步来完成，那就是设置Axon服务器。


    Axon服务器通过了解正在交换的不同类型的消息（例如从一个服务发送到一个或多个其他服务的事件、发送到一个服务执行某项操作的命令等）来补充Axon框架。你可以从[https://​download.​axoniq.​io/​axonserver/​AxonServer.​zip](https://download.axoniq.io/axonserver/AxonServer.zip)下载并解压Axon服务器库。


    ```

    cd D:\binil\Study\Sites\axon\AxonQuickStart-4.0.3_2019-02-19\AxonServer

    java -jar axonserver-4.0.3.jar

    ```


    这将启动Axon服务器。随后，请按照本章前面“使用Axon 3在同一个JVM中进行命令和事件处理”部分中提到的说明进行操作。


    ## 使用Axon进行分布式命令和事件处理


    在本节中，你将把第[12](#477630_1_En_12_Chapter.xhtml)章中“分布式命令和事件处理”部分讨论的代码迁移到Axon 4。迁移后的代码库位于文件夹`ch19\ch19-05`中。

    实际上，这段代码是对本章前面“使用Axon 3进行分布式命令和事件处理”部分中看到的代码的重构。要构建并执行该示例，请按照此处提到的说明进行操作，但有一个额外的步骤需要你作为第一步来完成，那就是设置Axon服务器。

    按照上一节的说明启动Axon服务器。一旦Axon服务器启动，请按照本章前面“使用Axon 3进行分布式命令和事件处理”部分中提到的说明进行操作。


    ## 总结


    每一个结束都是一个新的开始。你已经读完了这本书；然而，你的微服务之旅才刚刚开始。你已经揭开了围绕架构选择的一些难题，并深入研究了包括数据一致性在内的几个关注点的每一个细节，这些在你日常采用微服务架构时可能会遇到。我希望你喜欢这本书的许多部分，就像我喜欢花时间深入代码细节来解释它们一样。我试图平衡理论量和代码量，让你对几乎所有解释过的概念都有动手实践的感觉。最后但同样重要的是，我还试图通过本章涵盖Axon
    CQRS框架的最新版本。框架会来来去去，规范会不断演进，因为“变化是唯一不变的事物。”然而，本书中讨论的架构基础仍然具有相关性和有效性——至少这是我在25年IT职业生涯中所经历的。继续前进，保持快速步伐。


