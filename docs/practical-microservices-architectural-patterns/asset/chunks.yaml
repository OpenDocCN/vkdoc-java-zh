    ## Build and Test the Protocol Buffer Between Microservices


    Once your message structure is defined in a `.proto` file, you need a `protoc`
    compiler to convert this language-neutral content to Java code. Follow the instructions
    in the Protocol Buffer’s repository ([`https://github.com/google/protobuf`](https://github.com/google/protobuf))
    in order to get an appropriate compiler version. Alternatively, you can download
    a prebuilt binary compiler from the Maven central repository by searching for
    the `com.google.protobuf:protoc` artifact and then picking an appropriate version
    for your platform.


    Next, you need to run the compiler, specifying the path to search for the `.proto`
    files, the destination directory where you want the generated code to go, and
    the absolute path to your `.proto`. In your case, it will look like:


    ```

    D:\Applns\Google\ProtocolBuffer\protoc-3.4.0-win32\bin\protoc --proto_path .\src\main\resources
    --java_out .\src\main\java .\src\main\resources\product.proto

    ```


    Because you want Java classes, you use the `--java_out` option; however, similar
    options are provided for other supported languages. The above steps are handy,
    but they are not straightforward to weave into the Maven build. That’s why you
    used the `protoc-jar-maven-plugin` in the `pom.xml` in Listing [10-16](#477630_1_En_10_Chapter.xhtml#PC21);
    it performs protobuf code generation using the multiplatform executable `protoc-jar`.
    Hence no manual steps are needed to build and run the samples. Let’s get started.


    The complete code required to demonstrate intermicroservices communication using
    Protocol Buffer is kept inside folder `ch10\ch10-02`. You don’t need MongoDB for
    this sample. You can build, pack, and run the different microservices in the following
    order.


    Bring up the Product Server microservice first:


    ```

    cd ch10\ch10-02\ProductServer

    D:\binil\gold\pack03\ch10\ch10-02\ProductServer>make

    D:\binil\gold\pack03\ch10\ch10-02\ProductServer>rem D:\Applns\Google\ProtocolBuffer\protoc-3.4.0-win32\bin\protoc
    --proto_path .\src\main\resources --java_out .\src\main\java .\src\main\resources\product.proto

    D:\binil\gold\pack03\ch10\ch10-02\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch10\ch10-02\ProductServer>run

    D:\binil\gold\pack03\ch10\ch10-02\ProductServer>java -jar -Dserver.port=8080 .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    The above command will bring up the Product Server microservice in port 8080.
    You also want to inspect the format of the messages flowing through the wire,
    so you use Apache TCPMon as a proxy. See Appendix E to start TCPMon as a proxy.


    ```

    cd D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon 8081 127.0.0.1 8080

    ```


    This will bring up TCPMon so that all requests hitting port 8081 in the host where
    the TCPMon is running (localhost, in your case) will be proxied to port 8080 in
