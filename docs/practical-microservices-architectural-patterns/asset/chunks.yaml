    您通过添加 `@EnableAuthorizationServer` 注解并使用 Spring 的 `AuthorizationServerConfigurerAdapter`
    实现 `AuthorizationServerConfigurer` 来配置 OAuth 2.0 授权服务器。您重写了空的 `configure()` 方法。


    `AuthorizationServerConfigurerAdapter` 依赖于几个可以重写以设置配置的方法。主要方法有：


    *   `void configure(AuthorizationServerSecurityConfigurer security)`：您可以配置授权服务器的安全性，这实际上意味着
    `/oauth/token` 端点。令牌端点（`/oauth/token`）将自动使用客户端凭据的 HTTP 基本身份验证进行保护。`/oauth/authorize`
    端点也需要安全，但这是一个普通的面向用户的端点，其安全方式应与 UI 的其余部分相同。在您的情况下，您保持其原样。

