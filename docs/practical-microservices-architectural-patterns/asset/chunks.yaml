- fmt: 'You touched on local transactions in the “Distributed Transactions Revisited”
    section earlier and Spring’s `PlatformTransactionManager` supports local transactions
    in JDBC, JMS, AMQP, Hibernate, JPA, JDO, and many others usage scenarios. When
    you want to use XA transactions, `org.springframework.transaction.jta.JtaTransactionManager`
    can be used. `JtaTransactionManager` is a `PlatformTransactionManager` implementation
    for JTA, delegating to a back-end JTA provider. This is typically used to delegate
    to a Java EE server’s transaction coordinator like `OracleWebLogicJtaTransactionManager`
    or `IBMWebSphereUowTransactionManager`, but may also be configured with a local
    JTA provider that is embedded within the application like Atomikos. Embedded transaction
    managers give you the freedom of not using a full-fledged app server; you still
    get much of the XA transaction support similar to what you get from an app server
    in your standalone JVM applications.


    In the current example, there are operations in two resource managers, which are
    to be transactional:


    * `AuctionService.confirmQuote()`

    * `StockOrderService.sendOrderMessage()`


    The first one uses a JPA repository to merge an entity’s changed state to the
    underlying repository and subsequently to the backing persistent store. The second
    one uses JMS to send messages to an ActiveMQ queue. You want to make both above
    operations atomic, so either both of them should succeed or both of them should
    roll back. To ease the control, you enclose both above transactional methods within
    a third method:


    * `BrokerService.processNewQuote()`


    You now leverage `org.springframework.transaction.interceptor.TransactionProxyFactoryBean`,
    designed to cover the typical use case of declarative transaction demarcation,
    by wrapping a singleton target object with a transactional proxy, proxying all
    the interfaces that the target implements. This is done in the XML configuration.
    You then also configure the transaction type required for all three methods:


    * `AuctionService.confirmQuote()`

    * `<prop key="confirm*">PROPAGATION_REQUIRED</prop>`

    * `StockOrderService.sendOrderMessage()`

    * `<prop key="sendOrderMessage*">PROPAGATION_REQUIRED</prop>`

    * `BrokerService.processNewQuote()`

    * `<prop key="process*">PROPAGATION_REQUIRED</prop>`


    Further, the recommended way to indicate to the Spring Framework’s transaction
    infrastructure that a transaction’s work is to be rolled back is to throw an exception
    from code that is currently executing in the context of a transaction. The Spring
    Framework’s transaction infrastructure code will catch any unhandled exception
    as it bubbles up the call stack and will mark the transaction for rollback. That’s
    all you want to do to wire the business components. Now, if there is an error
    within any of the above three methods, it will roll back the state changes affected
    by all three business methods in the underlying resource managers taking part
    in the XA transaction.


    You can now concentrate on the infrastructure plumbing. There are two resources
    you need to configure, the JMS resource and the JDBC resource. See Listing [13-9](#477630_1_En_13_Chapter.xhtml#PC10)
    for the XA JMS resource.


    ```

    Listing 13-9

    Spring Wiring for XA JMS Resources for the Distributed Transactions Example ActiveMQ
    Atomikos (ch13\ch13-01\XA-TX-Distributed\Broker-MySQL-ActiveMQ\src\main\resources\spring-sender-mysql.xml)

    ```


    The `JmsTemplate` used by `StockOrderService` uses `com.atomikos.jms.AtomikosConnectionFactoryBean`,
    which is the Atomikos’s JMS 1.1 connection factory for JTA-enabled JMS operations.
    You can use an instance of this class to make JMS participate in JTA transactions
    without having to issue the low-level XA calls yourself. You set whether local
    transactions are desired by using the `localTransactionMode` property, which defaults
    to false. With local transactions, no XA enlist will be done; rather, the application
    should perform session-level JMS commits or rollbacks instead. Note that this
    feature also requires support from your JMS provider, ActiveMQ in your case. The
    `xaConnectionFactory` property is the basic connection factory that encapsulates
    the plumbing for connecting to the ActiveMQ broker. In your case, the bean is
    an instance of `ActiveMQXAConnectionFactory` type, which is a special connection
    factory class that you must use when you want to connect to the ActiveMQ broker
    with support for XA transactions.


    See Listing [13-10](#477630_1_En_13_Chapter.xhtml#PC11) for the XA JDBC resource.


    ```

    JDBC-1


    xads1


    jdbc:mysql://localhost:3306/ecom01


    true


    root

    rootpassword


    true


    com.acme.ecom.AtomikosJtaPlatform


    JTA


    Listing 13-10

    Spring Wiring for XA JDBC Resources for the Distributed Transactions Example Using
    MySQL and Atomikos (ch13\ch13-01\XA-TX-Distributed\Broker-MySQL-ActiveMQ\src\main\resources\spring-sender-mysql.xml)

    ```


    You can use an instance of the `com.atomikos.jdbc.AtomikosDataSourceBean` class
    if you want to use Atomikos JTA-enabled connection pooling. You need to construct
    an instance and set the required properties, and the resulting bean will automatically
    register with the transaction service and take part in active transactions. All
    SQL done over connections received from this class will participate in JTA transactions.
    Starting with Connector/J 5.0.0, the `javax.sql.XADataSource` interface is implemented
    using the `com.mysql.jdbc.jdbc2.optional.MysqlXADataSource` class, which supports
    XA distributed transactions when used in combination with MySQL server version
    5.0 and later. You set an instance of `MysqlXADataSource` as the `xaDataSource`
    property for the `AtomikosDataSourceBean` class.


    Next, the `LocalContainerEntityManagerFactoryBean` is Spring’s `FactoryBean` that
    creates a JPA `EntityManagerFactory`, which can then be passed to JPA-based DAOs
    via dependency injection. Starting with Spring 3.1, the `persistence.xml` is no
    longer necessary and `LocalContainerEntityManagerFactoryBean` supports a `packagesToScan`
    property where the packages to scan for `@Entity` classes can be specified.


    To teach Hibernate how to participate in the Atomikos transaction, earlier you
    must set a property, the `hibernate.transaction.manager_lookup_class`. However,
    Hibernate 4.3 removed the long-deprecated `TransactionManagerLookup`. Hibernate4
    doesn’t know to work with Atomikos out of the box. The JTA provider must implement
    `org.hibernate.engine.transaction.jta.platform.spi.JtaPlatform` to resolve the
    JTA `UserTransaction` and `TransactionManager` from the Spring-configured `JtaTransactionManager`
    implementation. An abstract implementation of JTA Platform is already available
    within Hibernate, namely `org.hibernate.engine.transaction.jta.platform.internal.AbstractJtaPlatform`.
    Using it makes writing a JTA Platform for Atomikos a breeze. You need to implement
    this class and set the `hibernate.transaction.jta.platform` property explicitly.
    See Listing [13-11](#477630_1_En_13_Chapter.xhtml#PC12).'
