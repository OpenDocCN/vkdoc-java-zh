- fmt: '# The Two Generals Paradox


    In computer networking (particularly with regard to the Transmission Control Protocol),
    literature shows that `TCP` can’t guarantee (complete) state consistency between
    endpoints. This is illustrated by the Two Generals Paradox (also known as the
    Two Generals Problem or the Two Armies Problem or the Coordinated Attack Problem),
    which is a thought experiment illustrating the pitfalls and connected design challenges
    while attempting to coordinate an action by communicating over an unreliable link.


    The Two Generals Paradox is unsolvable in the face of arbitrary communication
    failures; however, the same problem provides a base for realistic expectations
    for any distributed consistency protocols. So to understand the problem, you need
    to understand the associated indeterminism involved, which will provide a perfect
    analogy to learn more about transactions.


    ## Illustrating the Two Generals Paradox


    This section will illustrate the Two Generals Paradox with the classical example
    scenario. Figure [13-1](#477630_1_En_13_Chapter.xhtml#Fig1) shows two armies,
    each led by a different general who are jointly preparing to attack a fortified
    city, shown in the center. Both armies are encamped near the city, but in their
    own valleys. A third valley separates the two hills of the valleys occupied by
    the two generals, and the only way for the two generals to communicate is by sending
    messengers across the third valley. The third valley is occupied by the city’s
    defenders, so there’s a chance that any messenger sent through the valley may
    be captured.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig1_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig1_HTML.jpg)


    **Figure 13-1** Illustrating the Two Generals Paradox


    The two generals have agreed that they will attack; however, they have yet to
    agree upon a time for attack. The attack will only succeed if both armies attack
    the city at the same time; the lone attacker army will die trying. So the generals
    must communicate with each other to decide on a time to attack and agree to jointly
    attack at that time; each general must also know that the other general knows
    that they have jointly agreed to the attack plan. An acknowledgement of message
    receipt can be lost as easily as the original message itself, thus a potentially
    infinite series of messages are required to come to (near) consensus. Both generals
    will always be left wondering whether their last messenger got through.


    ## Solution Approaches


    Computer networks are the spine of distributed systems; however, the reliability
    of any network has to be examined. Distributed systems are required to address
    scalability and flexibility of software systems, so a network is a necessary evil.
    Schemes should accept the uncertainty of the networks and not attempt to eliminate
    it; rather, they should mitigate it to an acceptable degree.


    In the Two Generals Paradox, you can think of many acceptable mechanisms, such
    as


    * The first general can send 50 messengers, anticipating that the probability
    of all 50 being captured is low. This general will have fixed the time of attack
    to include enough time for all or a few or many of those 50 messengers to reach
    the other general. He will then attack at the communicated time no matter what,
    and the second general will also attack if any of the messages are received.


    * A second approach is where the first general sends a stream of messages and
    the second general sends acknowledgments to each received message, with each general’s
    comfort increasing with the number of messages received.


    * In a third approach, the first general can put a marking on each message saying
    it is message 1 of n, 2 of n, 3 of n, etc. Here the second general can estimate
    how reliable the channel is and send an appropriate number of messages back to
    ensure a high probability of at least one message being received. If the network
    is highly reliable, then one message will suffice and additional messages won’t
    help; if not, the last message is as likely to get lost as the first one.


    ## Microservices as Generals


    When you have split the state of a monolith that has been “living happily thereafter,
    together” to the state of “living happily ever after, separated,” you have split
    the army from one general into multiple generals. Each microservice has their
    own general or is a general by itself, and more than one general may be required
    to coordinate any useful functionality. By adopting polyglot, each microservice
    will have its own resource, whether it’s a database or file storage. The network
    is the only way these microservices can coordinate and communicate. The effect
    of changes made to resources cross-microservices has to be made consistent. This
    consistency depends on which schema or protocol you choose to coordinate and communicate
    the commands to make changes and the acknowledgements, which act as the agreement
    to effect that change between microservices.'
