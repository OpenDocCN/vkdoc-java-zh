    annotations are preferred way for applying method-level security. They\nsupport\
    \ the Spring Expression Language and provide expression-based\naccess control.\
    \ Let’s look at how they are leveraged here:\n\n*   `@PreAuthorize`: This\n  \
    \  is suitable for validating authorization before entry into a method.\n    `@PreAuthorize`\n\
    \    can take into account the roles/permissions of a logged-in user, the\n  \
    \  argument passed to the method, etc.\n\n*   `@PostAuthorize`: This\n    can\
    \ check for authorization after the method has been executed. It is\n    suitable\
    \ for verifying authorization on returned values; however, it’s\n    not commonly\
    \ used. Spring EL provides a `returnObject` that can\n    be accessed in the expression\
    \ language, which reflects the actual object\n    returned from the method.\n\n\
    Next, you need to configure the resource server. EnableResourceServer is\na convenient\
    \ annotation for OAuth2 resource servers, and\nit enables a Spring Security filter\
    \ that authenticates requests via an\nincoming OAuth2 token. This enables a Spring\
    \ Security filter named OAuth2AuthenticationProcessingFilter\nthat authenticates\
    \ requests using a passed-in OAuth2 token. You should\nadd this annotation and\
    \ provide a `@Bean` of type\nResourceServerConfigurer (e.g. via ResourceServerConfigurerAdapter)\n\
    that specifies the details of the resource (URL paths and resource ID).\nYou create\
    \ a bean named CoreResourceServerConfiguration that extends\nResourceServerConfigurerAdapter\
    \ and overrides the `configure(HttpSecurity http)` method to enable the security\
    \ of the Ecom-core\nmicroservice. See Listing [18-13](#477630_1_En_18_Chapter.xhtml#PC18).\n\
    \n```\n@Configuration\n@EnableResourceServer\npublic class CoreResourceServerConfiguration\
    \ extends ResourceServerConfigurerAdapter{\n@Autowired\nTokenStore tokenStore;\n\
    @Autowired\nJwtAccessTokenConverter tokenConverter;\n@Override\npublic void configure(HttpSecurity\
    \ http) throws Exception {\nhttp\n.csrf().disable()\n.authorizeRequests()\n.anyRequest().authenticated()\n\
    .antMatchers(HttpMethod.POST).hasAuthority(\"ORDER_WRITE\")\n.antMatchers(HttpMethod.DELETE).hasAuthority(\"\
    ORDER_WRITE\");\n}\n@Override\npublic void configure(ResourceServerSecurityConfigurer\
    \ resources)\nthrows Exception {\nresources.resourceId(\"CORE\").tokenStore(tokenStore);\n\
    }\n}\nListing 18-13\nEnabling Resource Server (ch18\\ch18-01\\Ax2-Ecom-With-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\security\\CoreResourceServerConfiguration.java)\n\
    ```\n\nIn the configure method you use the passed-in HttpSecurity instance\nto\
    \ secure the POST and DELETE methods and only allow authenticated users\nwith\
    \ ORDER_WRITE authority to access the resources. Then you use the\nResourceServerSecurityConfigurer\
    \ class to create a resource id with the\nname CORE. The name of this resource\
    \ id must match the name used in the\nauthorization server.\n\nNext, you need\
    \ to read values from the encrypted JWT. As you have\nalready seen, the JwtAccessTokenConverter\
    \ helps to translate between\nJWT-encoded token values and OAuth authentication\
    \ information in a\nbidirectional manner. Since you use asymmetric encryption\
    \ and since the\ntoken has already been encrypted with the private key by the\n\
    authorization server, you will now use the public key pair to decrypt\nand read.\
    \ See Listing [18-14](#477630_1_En_18_Chapter.xhtml#PC19)."
