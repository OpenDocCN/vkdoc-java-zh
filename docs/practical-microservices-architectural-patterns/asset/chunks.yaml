- fmt: '# Event-Based CQRS Architecture


    Earlier I discussed the need to synchronize the read model whenever there is a
    change in the write model. This is an after-effect of splitting the single model
    into its write and read counterparts. The scene becomes worse when we realize
    that most enterprise applications have more than one view or for that matter more
    than one read model for the same entity. The read and write stores may have a
    different structure altogether; multiple read stores or models will also have
    different data structures so that using multiple read-only replicas of the read
    store can considerably increase query performance and application UI responsiveness.
    There are more intricacies so let’s dig into these aspects next.


    ## A Meta Model for Event-Based CQRS Design


    You started this book by looking at the monolith model of application architecture
    and then you were introduced to microservices. You also looked at the associated
    increase in complexities, especially in the outer architecture between microservices.
    In this chapter, you are going to the next level of splitting the finest single
    entity, the microservice, into more than one to address the scalability requirement
    as well as the requirement for multiple views. With a preface that life is not
    going to be simple, let’s discuss these details now.


    Based on the knowledge gained so far from previous chapters and previous sections
    in this chapter, let’s list a few intricacies of the CQRS architecture:


    - An entity, if split and represented into more than one, has to be in sync.

    - Entities and their views are to be scalable selectively.

    - Entities and their views may have more interacting parties and interested parties
    in future.


    There are other requirements; however, for our discussion, the above list will
    suffice.


    Let’s conceptualize a meta model to address the concerns listed here. Figure [5-5](#477630_1_En_5_Chapter.xhtml#Fig5)
    represents one such model.


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig5_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig5_HTML.jpg)


    **Figure 5-5** A meta model for CQRS-based architecture


    This meta model is adopted from concepts implemented in the CQRS framework called
    `Axon`, the open source CQRS framework you will be using for the samples in this
    book, the details of which will be introduced later. Let’s look at the major components
    abstracted out in the model here at a conceptual level; the detailed workings
    of the `Axon` framework are not required for the understanding of this chapter.


    - **Controller**: A controller is typically a UI controller, which intercepts
    both the write and read transactions from the client.

    - **Commands**: The intent to change the state of an entity is modelled as a command.
    A controller creates and emits commands in response to a write request from a
    client.

    - **Command gateway**: A command gateway is a convenient interface that allows
    you to choose the command dispatching mechanism, especially by adopting a sync
    or async style.

    - **Command handler**: A command handler responds to a specific type of command
    and executes business rules and logic based on the contents of the command. It
    retrieves domain entities and effects state change on them.

    - **Domain entity**: Domain entities are aggregate entities modelled to represent
    the state of the components in the domain of interest. When the state of an aggregates
    changes, it results in the generation of a domain event.

    - **Repository**: When provided with a unique identifier of an aggregate entity,
    a repository will have the role of looking up the aggregate instance and providing
    access to the aggregates. A repository can either store the state of the aggregate
    itself, in which case it can make use of a persistent store like a database, or
    it can use an event store to resurrect the state of an entity to any point in
    history, from all of the intermediate states it remembered earlier.

    - **Event store**: Event stores usually store changes applied to an entity. By
    replaying the changes, it is possible to resurrect the state of an entity to any
    point in history. Event stores may also make use of a database to store state
    change audit trails.

    - **Events**: Once there is a change in the state of an entity, events represents
    what has changed.

    - **Event bus**: An event bus is a conduit for the events generated. Typically
    they are backed by a messaging topic so that you get the publish subscribe semantics
    over this conduit.

    - **Event handler**: Event handlers receive events and handle them. Multiple event
    handlers can be subscribed to a particular event type. Some handlers may update
    data sources or the materialized views used for querying while others may send
    messages to external interfaces. An event handler may also create new commands.

    - **Query**: A controller routes a read transaction to a query manager, which
    in turn executes the query on top of the specific materialized view of the entity.


    Figure [5-5](#477630_1_En_5_Chapter.xhtml#Fig5) illustrates a meta model of a
    CQRS-based architecture leveraging all or many of the actors described previously.
    The illustrated CQRS meta model also addresses few eventualities in the architecture,
    which are listed here:


    - **Command-event-command cycle**: When the state of an aggregate changes due
    to a command, it results in the generation of a domain event. These events represent
    what changed and are injected into the event bus. Interested event handlers consume
    events and process accordingly. In some cases, the event processing creates new
    commands to be created and the cycle may repeat.

    - The **event bus** exposes publish-subscribe semantics and so it is possible
    to attach more event handlers to the existing architecture non-intrusively to
    existing components. This provides for the extensibility of the application in
    future.


    It is to be noted that a CQRS-based architecture doesn’t mandate that you adopt
    a microservices architecture. Nor is a CQRS-based architecture mandatory to adopt
    a microservices-based architecture. Having said that, marrying these two will
    provide unique leverage for the software architect to scale the application with
    the ultimate flexibility.


    ## Command Query Segregation Using Events


    CQRS architecture may be utilized to better architect microservices-based systems.
    By doing a little fine tuning to the CQRS meta model, it is easy to segregate
    the read and write portions of your application entity into completely different
    techno-business domains. By techno, we mean to segregate into different process
    spaces, and by domain, we mean to segregate into different write and read transactional
    requirements of your business.


    Figure [5-6](#477630_1_En_5_Chapter.xhtml#Fig6) is an improvisation over the simple
    CQRS meta model illustrated in Figure [5-5](#477630_1_En_5_Chapter.xhtml#Fig5).
    As you can see, all that is required to synchronize between the write and the
    read portions of the entity is the event bus. And you already saw that an event
    bus is typically a messaging backbone, leveraging a message topic. By suitably
    leveraging the persistence and durability qualities of the event bus, you can
    practically keep all read nodes in sync with the write node.


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig6_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig6_HTML.jpg)


    **Figure 5-6** A meta model for event-based CQRS architecture'
