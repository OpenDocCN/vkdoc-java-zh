    图 11-6 展示了蜜蜂如何建造蜂巢。它从建造第一个蜂房开始，然后不断向蜂巢中添加越来越多的蜂房。因此，蜂巢会随着时间的推移而生长。建造蜂房所使用的材料可能并不相同；它们会根据建造该蜂房时可获得的材料而有所差异。然而，每个新蜂房都能与整个蜂巢完美融合，并且整个蜂巢持续发挥其功能而不受干扰。类似地，你可以构建像上述通知微服务这样的新功能，该服务将发送基于电子邮件和短信的订单状态通知，从而无缝地将这一增强功能添加到应用程序中，且不会对现有（微服务）应用程序造成任何停机时间。^(²⁰)


    最终一致性与微服务


    现在，让我们来探讨微服务中一些有趣的复杂细节。单体应用通常使用单个关系型数据库。使用关系型数据库的一个关键优势在于，你的应用程序可以利用 ACID 事务。图
    11-7 描绘了一个典型的单体应用。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg](img/477630_1_En_11_Fig7_HTML.jpg)


    图 11-7. 一个电商单体应用


    你领域中的多个实体可以由单个关系型数据库中一个模式内的不同表来表示。在当前示例中，`Order`、`Item` 和 `Inventory` 就是这样的实体。客户会将多个商品添加到购物车，最后通过单击一个按钮进行结账。此时，`Order`
    表中会创建一行新记录来表示一个新订单。以该订单 ID 作为外键，会在 Items 表中创建与购物车中商品数量相同的行。此外，对于 `Item` 表中创建的每一行，`Inventory`
    表中相应行的数量值必须递减。如果你使用单个关系型数据库，上述所有操作都可以以符合 ACID 的方式全部提交或全部回滚。


    图 11-8 展示了借助微服务实现的相同业务用例。假设订单和库存是两个不同的微服务。现在，让我们分析一个复杂场景：两个用户试图大致同时地对同一个实体进行操作。这类场景在业务应用中很典型，这里列举了其中几个：


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig8_HTML.jpg](img/477630_1_En_11_Fig8_HTML.jpg)


    图 11-8. 微服务竞态条件


    *   航空公司订票应用中的最后一个座位

    *   酒店预订门户中的最后一个房间

    *   电商应用中某特定产品的最后一件商品


    假设身处地球两端的乔和安都对一款较旧版本的 MacBook Pro 感兴趣，该产品在电商网站上正以大幅折扣出售。同时假设该商品在电商网站上仅剩一件待售。乔和安都进行了搜索、查看，并最终将该商品添加到了各自的购物车。现在假设他们俩大致同时点击了“确认购买”按钮（图
    11-8 中的标签 1 和 2）。一个基于 EDA 的微服务架构（如图 11-8 所示）将允许订单微服务代表乔和安各自创建订单，并发出 OrderCreated
    事件。两个订单的状态现在都是“新建”。你可以进一步假设有两个 OrderCreated 事件大致同时被提交（标签 3 和 4）。库存微服务实例将消费这些 OrderCreated
    事件；同样，假设此事件消费是并发进行的。由于这两个 OrderCreated 事件都指向同一件商品，即使微服务尝试并发处理这些 OrderCreated 事件，在库存数据库管理层，也只会允许代表其中一个
    OrderCreated 事件的库存更新继续进行，因此库存将减少到零，并发出一个 InventoryUpdated 事件（标签 5）。代表另一个 OrderCreated
    事件进行处理的库存微服务无法成功，因为库存不足，所以它将发出一个 NotEnoughInventory 事件。订单微服务将同时消费 OrderCreated
    事件和 NotEnoughInventory 事件。订单微服务在消费 OrderCreated 事件时，会将相应订单的状态更改为“已确认”；然而，在消费 NotEnoughInventory
    事件时，它会将相应订单的状态从“新建”更改为“已取消”或“无法履行”等。这里解释的场景是完全正常且可接受的，那么问题出在哪里呢？仔细审视会发现，在一段时间内，代表乔和安创建的两个订单都处于“新建”或“已创建”状态。此时，两个用户都收到订单正在被处理的反馈；然而，其中一人稍后会感到失望。系统向用户提供了一个“虚假的”快照，而非“事实的”快照。（不过，没有买到商品的人会获得全额退款。）


    如果你回头看看图 11-7 中描述的架构，你会意识到，如果乔和安试图购买那最后一件商品，那么对于其中一人，事务会成功，而对于另一人，整个事务会被原子性地回滚，所有步骤（要么全部成功，要么全部回滚）作为一个整体单元，因此在任何时刻系统都是一致的，并且不会出现后来的失望。换句话说，要么是即时的失望，要么是即时的满意；不存在最终失望或最终满意的可能性。现在关键问题来了：当你的架构从图
    11-7 所示变为图 11-8 所示时，这种最终性对于业务来说是否可以接受？


    微服务与 CAP 定理


    这个讨论引出了分布式计算中另一个有趣的约束，即 CAP 定理，本节将在微服务的背景下对其进行探讨。


