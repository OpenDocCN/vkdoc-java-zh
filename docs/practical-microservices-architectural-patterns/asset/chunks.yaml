  trans: '

    ### 单体应用


    在尝试回答上一节提出的问题之前，请允许我定义本书后续将遵循的一个主要术语及其解释。


    图 2-1 仅展示了图 1-3 中的业务层。通常，该层承载了软件系统的大部分核心逻辑或业务逻辑。我们将这一层称为应用层或服务层。该层与表示层有清晰的界限，通常通过一个控制器层来路由所有服务调用。该层可以暴露本地接口或远程接口。如果表示层和服务层部署在同一个进程中，本地接口就足够了；而如果这两层部署在不同的进程中，则需要像
    Java RMI、RMI-IIOP 或 .NET Remoting 这样的远程接口。在面向服务架构（SOA）范式中，合适的 SOA 接口将取代普通的远程调用。基于
    HTTP 的 SOAP、REST 等就是此类 SOA 友好接口的例子。


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig1_HTML.jpg](img/477630_1_En_2_Fig1_HTML.jpg)


    图 2-1


    服务层


    图 2-1 显示，即使模块或功能组彼此分离，其边界也只是逻辑上的且模糊不清（用虚线表示）。这意味着模块之间没有明确的界限。您可能还会注意到，此类架构通常仍然存在一个应用边界。但这个应用边界是包含其所有模块的边界，因此我们称之为“单体”。单体可以作为一个整体存在，但如果被分割或分离，则难以生存。


    ### 单体应用边界


    图 2-2 描绘了多个单体应用。这在许多现有企业中也很典型，它们需要多个应用来满足企业的各种功能需求。由于孤立的应用无法带来太多益处，因此它们有时会相互连接。


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig2_HTML.jpg](img/477630_1_En_2_Fig2_HTML.jpg)


    图 2-2


    单体应用边界


    在图 2-2 中，描绘了两种类型的通信或交互。在应用内部，模块之间要么使用本地调用协议，要么使用合适的远程调用协议进行通信。应用之间的通信同样重要。企业通常使用企业应用集成（EAI）技术来实现应用间的集成。第
    1 章的“网络架构”部分简要讨论了应用如何相互集成。您可能已经注意到，大多数情况下，应用边界是明确定义和分离的，因此它们通常被部署到不同的进程或运行时中。由于这个原因，它们需要合适的远程调用机制来相互通信。后来
    SOA 的进步提倡使用像 ESB 这样的面向服务集成（SOI）工具，以便能够以更灵活、无缝的方式进行应用集成。


    ### 单体模块间依赖


    在单体架构中，应用内的模块是紧密耦合的。这些模块要么使用本地调用协议，要么使用合适的远程调用协议进行通信。大多数情况下，这些调用本质上是同步的，这意味着每个请求事务也期望得到一个响应或一个异常返回。


    当单体应用的所有模块被打包并部署在同一个进程中时，本地方法调用是最佳的通信方式。在这种部署中，要么整个应用始终运行，要么如果任何模块的任何部分出现问题，整个应用也可能完全宕机。如果某些模块被分离出来并部署到不同的进程中，那么部署了分离模块的进程的健康状况不会影响其他依赖进程。然而，当我们从整体上看这样一个单独部署的模块应用时，如果分离的模块因任何原因宕机，依赖模块仍然可能受到影响。这是因为模块间通信被定义为直接且同步的方法调用依赖，所以如果被调用的模块没有响应或不存在，调用模块就会受到影响。它们要么被无限期阻塞，要么等待一段时间后响应并报告错误状态。图
    2-3 描绘了这一点。


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig3_HTML.jpg](img/477630_1_En_2_Fig3_HTML.jpg)


    图 2-3


    单体模块间通信

