    In the “Build and Test the Example’s Happy Flow” section earlier, you read that
    the latest quote creation time in the upstream system gets updated as the last
    quote time whenever the user account gets updated. Going by this logic, Quote
    ID 9 in Figure [13-40](#477630_1_En_13_Chapter.xhtml#Fig40) is the latest quote
    created, so the creation timestamp of that quote should be the last quote time
    for the users. However, since Quote ID 8 and Quote ID 9 reached the downstream
    systems out of order, this sanity of data attribute rule went wrong!


    # Summary


    Transactions are the bread and butter for the dynamics of any enterprise-class
    application. Local transactions are good; however, distributed transactions across
    partitioned domains are not among the good guys. When you shift from a monolith-based
    architecture to a microservices-based architecture, you still need transactions;
    however, you are better off with BASE transactions in place of ACID transactions
    for domains across partitions and keep ACID or XA compliant transactions within
    partitions or domains. In this chapter, you saw many error scenarios possible
    in distributed enterprise systems, and you also saw how such error scenarios could
    be avoided had you been using ACID transactions. When you shift from monolith-
    to microservices-based architecture, there is no reduction in the above error
    scenarios; instead, there is a magnitude of increase in such error scenarios since
    the degree of distribution of microservices-based architectures are increased
    manyfold. In the next chapter, you will see techniques you can use in architecting
    distributed systems to safeguard against such error scenarios, so continue happy
    reading!


    # Footnotes


    ## 14. Transactions and Microservices


    Chapter [13](#477630_1_En_13_Chapter.xhtml) covered distributed transactions extensively.
    You now understand distributed transactions clearly so you use them judiciously.
    To make it clear, you want to avoid distributed transactions as much as possible
    in the microservices world across partitions and domains. I do not say that distributed
    transactions should be deprecated completely in microservices architecture because
    there are areas where you want to use them by trading loose coupling for reliability;
    however, the essence is that you can do most of the design without actually using
    distributed transactions when cross-partitions and cross-domains are involved.
    You will look at how to do this in detail^([^(33)](#fn33)) in this chapter. The
    examples in this chapter are a continuation of the examples from Chapter [13](#477630_1_En_13_Chapter.xhtml),
    so you may want to read and understand Chapter [13](#477630_1_En_13_Chapter.xhtml)
    before you attempt to run the examples in this chapter.


    You will look into these aspects in this chapter:


    * The effect of distributing data across microservices

    * Distinguishing between global and local transactions

    * Enhancing the example in Chapter [13](#477630_1_En_13_Chapter.xhtml) to make
    it fault tolerant

    * Exploring further design refactorings that you can use in your actual microservices
    work


    ## Partitioning and Microservices


    The best method to maximize consistency is to avoid partitions. No partitions
    means you have a single software process handling all of your processing. Time
    has revealed that software processes have limitations, and vertical scaling cannot
    be increased linearly if not exponentially after a certain limit; this was discussed
    in Chapter [11](#477630_1_En_11_Chapter.xhtml)’s “The Scale Cube” section. It
    is in this context that people use horizontal scaling methodologies to improve
    scalability. The moment you split processing into more than one software process,
    you have introduced probability for partitions, and the more partitions you have,
    the less consistency you can achieve. Microservices are no exception. When you
    split a monolith application into a microservices-based architecture, you have
    increased the number of nodes or software processes across which you have split
    your processing logic, and the coordination of this processing has to be done
    using a network.


    Network or process boundaries bring all the associated complexities and uncertainties,
    and you can no longer be certain on how and when end-to-end software processing
    will complete. It is in this context that you have been leveraging two-phase commit
    protocols to decrease uncertainty.


    Software processes that execute requests as part of a two-phase commit protocol
    need to be able to communicate with one another to coordinate their actions when
    the transaction commits. In the first phase of the two-phase commit protocol,
    the coordinator, which is typically the process originating the transaction, will
    ask all the participants if they are prepared to commit; in the second phase,
    the coordinator instructs them to commit (or abort) the transaction. If a participant
    resource manager can commit its part of a transaction, it will agree as soon as
    it has recorded the changes it has made (to the resources) and its status in permanent
    storage, and is therefore prepared to commit. Thus the two-phase commit protocol
    consists of a voting phase and a completion phase. All of these additional steps
    add to the main processing instructions and in this manner two-phase commit protocols
    are comparatively expensive since they take more time to complete compared to
    local transactions.


    Even two-phase commit protocols are not completely error free. There are cases
    where towards the end of the two-phase commit protocol, after all of the participants
    have agreed to commit, some resources can go out of order where the commit will
    not get completed. However, the protocol by design can tolerate such failures
    (server crashes, network failures, or lost messages) and is guaranteed to complete
    eventually, with or without manual intervention, although it is not possible to
    specify a time limit within which it will be completed.


    ## Microservices and Distributed Data


    Typical monolith applications have all or most data collocated in a single database,
    and this offers simplicity and many control options for the application in terms
    of consistency. For example, look at the two data tables introduced in Chapter
    [13](#477630_1_En_13_Chapter.xhtml), shown here as Figure [14-1](#477630_1_En_14_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig1_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig1_HTML.jpg)


    **Figure 14-1** The `User Balance` table


    Figure [14-1](#477630_1_En_14_Chapter.xhtml#Fig1) shows the `User Balance` table,
    which is an aggregated view of the running balance for the users. Figure [14-2](#477630_1_En_14_Chapter.xhtml#Fig2)
    shows the `Quotes` table, which maintains the transaction history.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig2_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig2_HTML.jpg)


    **Figure 14-2** The `Quotes` table'
