- fmt: '# Revisiting a Traditional E-Commerce Application


    Let’s start the discussion from the basic requirements for an online e-commerce
    web site. Once you cover the requirements, you will look at how a typical logical
    architecture of the basic building blocks will look if you architect it using
    the traditional or the monolith approach. In the next section, you will look at
    what changes are required if you rearchitect the design using a microservices-based
    approach.


    ## The E-Commerce Business Summarized


    The sample e-commerce enterprise is named `ACME Shop`. `ACME` has an online presence,
    and customers or end users can do online shopping at the web site. The `ACME`
    back office employees also interact with the same web site to fulfill customer
    orders. `ACME Shop` specializes in selling fashion accessories, and it has classified
    its product portfolio under different categories called product categories. Under
    each product category, `ACME Shop` lists a set of products for sale. When an (anonymous)
    user accesses the `ACME` home page, all of the product categories are listed and
    by default, the products under one of the categories are expanded and listed further.
    The user can click one of the products to view the product details. The product
    details also show the available stock or inventory. A user can further specify
    how many of the selected product to purchase and add them to the shopping cart.
    Once added to the shopping cart, it will be displayed in the user’s cart icon
    on the web site. The user can select his cart and opt to check out. In the next
    step, the user can confirm the purchase.


    To confirm a purchase, the user has to log in. If the user has previously created
    a user profile, he or she can log in using those credentials. A new user can click
    the `New User` link to newly create a user profile. After creating a profile,
    the user can select the cart again to check out. He can log in this time and confirm
    the purchase.


    Upon successful purchase, an order will be created. Once an order is created,
    it will be available for viewing in the `Your Orders` link under the appropriate
    submenu. A user can cancel an order until it gets fulfilled.


    The `ACME` back office employees log in using super credentials to interact with
    the same web site to fulfill customer orders. Once an order is created by a user,
    the next action is for the back office employee to ship that order. Once an order
    is shipped, the order can’t be cancelled by the user. Instead, the user can view
    the `Shipped State` under the `In Progress` submenu of his `Orders`.


    The next stage in the order fulfilment process is the order delivery. The `ACME`
    back office employees must go to the `To Deliver` submenu and act on it. There
    are two actions, `Delivered` or `Delivery Failed`, based on which whether you
    want to simulate a successful order delivery or a failure case.


    ## E-Commerce Architecture Revisited


    A typical monolith architecture for the above described business application is
    depicted in Figure [17-1](#477630_1_En_17_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig1_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig1_HTML.jpg)


    **Figure 17-1** Monolith e-commerce logical architecture


    The web application is typically a single web archive (`.war`) file. Components
    from the web application send requests to the services available in the middle
    tier. The logical architecture of the middle tier depicts multiple modules, and
    these modules interact with the web as well as with each other usually using request-response
    style synchronous communications.


    Figure [17-2](#477630_1_En_17_Chapter.xhtml#Fig2) attempts to depict the interdependency
    between components in the monolith architecture. Note that Figures [17-1](#477630_1_En_17_Chapter.xhtml#Fig1)
    and [17-2](#477630_1_En_17_Chapter.xhtml#Fig2) are representative, not exhaustive,
    intended just to illustrate the chit-chattiness between components.


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig2_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig2_HTML.jpg)


    **Figure 17-2** Monolith e-commerce component dependency


    ## The E-Commerce Microservice Application


    In previous chapters, I described the need for microservices-based architecture,
    so I won’t repeat that information. Instead, let’s relook at the architecture
    represented in the previous section to see what is to be changed. It is clear
    that you need similar or enhanced features, functional as well as non-functional,
    in the new architecture. At the same time, you want to reduce the ill effects
    of the architecture depicted in the previous section, so let’s do that.


    ### Logical Architecture for a Microservice-Based E-Commerce Architecture


    It is imperative that the first aspect you take care when refactoring is to separate
    out functionalities into microservices, as shown in Figure [17-3](#477630_1_En_17_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig3_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig3_HTML.jpg)


    **Figure 17-3** E-commerce microservices dependency


    There is little or zero direct dependency between microservices; instead, microservices
    communicate with each other through the event-based infrastructure. All of these
    microservices will be deployed in separate processes, and may or may not be in
    separate physical nodes too.


    ### The ACID Within the BASE


    Compare the architectures in Figures [17-2](#477630_1_En_17_Chapter.xhtml#Fig2)
    and [17-3](#477630_1_En_17_Chapter.xhtml#Fig3) one more time. Careful observation
    will reveal two notable aspects:


    * **Replicated read models**: You can see that inventory data is replicated and
    kept at more than one microservice level. This is to take care of query requirements
    of data not owned by the host microservice, which is what you saw in detail in
    the CQRS pattern in Chapter [12](#477630_1_En_12_Chapter.xhtml). To make it clear,
    when product details are displayed, the available stock information too need to
    be displayed on the screen and this can be done from the inventory materialized
    view maintained at the Product microservice level.


    * **Domain affinity for enhanced consistency**: Figure [17-2](#477630_1_En_17_Chapter.xhtml#Fig2)
    depicts Order and Inventory as two separate domains. However, in the redesign
    in Figure [17-3](#477630_1_En_17_Chapter.xhtml#Fig3) you can see that both of
    these domain entities are brought together and maintained in same space (process
    or node). The reason is that you want to have stronger data consistency across
    the Order and Inventory domain entities.


    While you want ACID-similar consistency across these two entities, you want to
    avoid distributed transactions across nodes. But there is a caveat here: for whatever
    reason you are attempting to split the monolith into microservices, the same forces
    are now putting constraints to join them back together at the cost of consistency!
    While you don’t want to join everything back to attain strongest consistency with
    zero partitions, let’s keep Order and Inventory for the time being and live with
    the “ACID within the BASE” scenario. Worry not; you are going to look into a further
    refactored design where you have true BASE transaction characteristics in Chapter
    [19](#477630_1_En_19_Chapter.xhtml) when you look at Axon 3.


    ### The Design of the E-Commerce Microservices


    The Business Domain Object Model (BDOM) or the Common Information Model (CIM)
    for the e-commerce application is shown in Figure [17-4](#477630_1_En_17_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig4_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig4_HTML.jpg)


    **Figure 17-4** E-commerce domain object model'
