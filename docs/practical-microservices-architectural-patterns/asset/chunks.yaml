    用于 HTTP 操作的 Postman

    Postman 是一款用于与 HTTP API 交互的 Google Chrome 应用。它提供了一个友好的图形用户界面，用于构建请求和读取响应。该应用可从
    [`www.getpostman.com/`](http://www.getpostman.com/) 获取。截至撰写本文时，Postman 应用支持 Mac、Windows
    和 Linux 平台。


    使用 Postman 执行 HTTP GET 以检索实体

    安装应用后，您将需要测试所有针对它的 HTTP 操作。这里我再次参考第 7 章，其中我介绍了一个示例 Spring Boot 应用程序。我还参考了图 [7-4](https://doi.org/10.1007/978-1-4842-4501-9_7Fig#4)，该图展示了使用
    Postman 对链接 `http://localhost:8080/profile/products` 执行 GET 操作的过程。


    总结

    cURL 和 Postman 都是用于快速与 REST 端点交互并执行基本 HTTP 操作的优秀工具。在运行本书中的示例时，您将大量使用它们。


    Apache TCPMon


    Apache TCPMon 是一个实用工具，允许查看和重新发送流量，尤其是 HTTP 流量消息。它作为一个调试工具非常有用，您可以借此查看客户端和服务器之间，甚至两个微服务之间通过网络传输的内容。它最初是
    Axis1 的一部分，现在已独立成为一个项目。请访问 [`https://ws.apache.org/tcpmon/`](https://ws.apache.org/tcpmon/)
    获取更多信息。


    我在本附录中涵盖以下内容：


    *   如何安装和启动 TCPMon


    *   如何将 TCPMon 设置为代理


    安装 TCPMon

    在本节中，您将下载、安装和配置 TCPMon，并测试安装。TCPMon 可在 [`https://ws.apache.org/tcpmon/download.cgi`](https://ws.apache.org/tcpmon/download.cgi)
    下载。


    首先将安装存档文件保存到硬盘上的合适位置，然后将存档解压到您选择的位置。尽管您可以选择任何位置，例如


    ```

    C:\Program Files\tcpmon\

    ```


    但我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin

    ```


    开始使用 TCPMon


    您可以通过进入 TCPMon 解压文件夹的 `build` 文件夹来启动 TCPMon（如图 E-1 所示）：


    ![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig1_HTML.jpg](img/477630_1_En_24_Fig1_HTML.jpg)


    图 E-1

    启动 TCPMon


    ```

    cd D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon

    ```


    将 TCPMon 设置为代理

    TCPMon 可以充当代理。要将 TCPMon 设置为代理模式，只需从单选按钮中选择代理选项，并配置调用要代理到的目标主机和端口。


    或者，您可以在启动 TCPMon 时提供配置参数。使用模式如下：


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon [listenPort targetHost targetPort]

    ```


    如果您像下面这样启动，您将看到如图 E-2 所示的屏幕：


    ![../images/477630_1_En_24_Chapter/477630_1_En_24_Fig2_HTML.jpg](img/477630_1_En_24_Fig2_HTML.jpg)


    图 E-2.

    配置为代理的 TCPMon


    ```

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>tcpmon 8081 127.0.0.1 8080

    D:\Applns\apache\TCPMon\tcpmon-1.0-bin\build>java -cp ./tcpmon-1.0.jar org.apache.ws.commons.tcpmon.TCPMon
    8081 127.0.0.1 8080

    ```


    在上述情况下，所有到达运行 TCPMon 的主机上 8081 端口的请求都将被代理到主机 127.0.0.1 的 8080 端口。


    总结

    TCPMon 是一个用于检查 HTTP 请求和响应的优秀工具。您可以将其安装在您的机器上并保持就绪状态，以便轻松地通过 TCPMon 代理 HTTP 请求和响应，并检查消息内容。


    ActiveMQ


    Apache ActiveMQ 是一个开源的消息传递和集成模式服务器。ActiveMQ 速度很快，支持多种跨语言客户端和协议，并附带易于使用的企业集成模式和许多高级功能。ActiveMQ
    完全支持 JMS 1.1 和 J2EE 1.4，并根据 Apache 2.0 许可证发布。ActiveMQ 可从 [`http://activemq.apache.org/`](http://activemq.apache.org/)
    下载。


    ActiveMQ 的主要区别特征在于它支持多种跨语言客户端和协议，包括 Java、C、C++、C#、Ruby、Perl、Python 和 PHP。ActiveMQ
    支持以下协议（以及其他协议）：


    *   OpenWire，用于 Java、C、C++ 和 C# 的高性能客户端

    *   Stomp 支持，使得可以用 C、Ruby、Perl、Python、PHP、ActionScript/Flash 和 Smalltalk 轻松编写客户端，以便与
    ActiveMQ 以及任何其他流行的消息代理通信

    *   AMQP v1.0 支持

    *   MQTT v3.1 支持，允许在物联网环境中进行连接


    安装和配置 ActiveMQ

    ActiveMQ 可在 [`http://activemq.apache.org/download.html`](http://activemq.apache.org/download.html)
    下载。详细的安装说明也可在 [`http://activemq.apache.org/getting-started.html#GettingStarted-InstallationProcedureforWindows`](http://activemq.apache.org/getting-started.html%2523GettingStarted-InstallationProcedureforWindows)
    获取。

    下载名为 `apache-activemq-5.13.3-bin.zip` 的 ActiveMQ 安装文件。

    从 zip 文件中，将名为 `apache-activemq-5.13.3` 的文件夹解压到 `C:\Program Files\ActiveMQ`（或应用程序文件合适的其他位置）。


    我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：


    ```

    D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3

    ```


    开始使用 ActiveMQ


    您可以通过以下命令启动 ActiveMQ 服务器：


    ```

    cd D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3\bin

    D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3\bin>activemq start

    ```


    清单 F-1 展示了 ActiveMQ 的启动过程。

    '
