    Derby


    Apache Derby 是一个完全用 Java 实现的开源关系数据库，遵循 Apache 许可证。Derby 遵循 Java、JDBC 和 SQL 标准，并支持通过
    Derby Network Client JDBC 驱动程序和 Derby Network Server 进行客户端/服务器模式操作。请访问 [`https://db.apache.org/derby/`](https://db.apache.org/derby/)
    获取更多信息。


    在本附录中，我将介绍 Derby 的以下内容：


    *   如何安装和配置 Derby 数据库


    *   如何在网络模式下启动和停止 Derby


    *   如何在 Derby 中创建新数据库


    *   如何在 Derby 数据库中执行基本的表创建和表操作命令


    安装和配置 Derby

    在本节中，你将下载、安装和配置 Derby，并测试安装。Derby 可在 [`https://db.apache.org/derby/derby_downloads.html`](https://db.apache.org/derby/derby_downloads.html)
    下载。由于我的机器上装有 Java 8，我选择了 Derby 的 10.14.1.0 版本，该版本可在 [`https://db.apache.org/derby/releases/release-10.14.1.0.cgi`](https://db.apache.org/derby/releases/release-10.14.1.0.cgi)
    获取。


    首先将安装归档文件保存到硬盘上的合适位置，然后将归档文件解压到你选择的位置。尽管你可以选择任何位置，例如


    ```

    C:\Program Files\Derby\

    ```


    但我明确避免使用路径中包含空格的目录，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：


    ```

    D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    ```


    将 `DERBY_HOME` 环境变量设置为你解压 Derby 发行版的位置。例如，如果你将 Derby 解压到 `D:\Applns\apache\Derby\`
    目录，则将环境变量设置为


    ```

    set DERBY_HOME=D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    ```


    如果你愿意，还可以将 `DERBY_HOME/bin` 目录添加到 `PATH` 环境变量中，以便从任何目录运行 Derby 脚本。


    在网络模式下启动和停止 Derby 服务器

    应用程序可以使用熟悉的客户端/服务器模式访问 Derby 数据库。这是通过一个嵌入 Derby 并处理来自应用程序（包括在同一台机器或远程机器上不同 JVM
    中运行的应用程序）的数据库请求的框架实现的。Derby Network Server 嵌入 Derby 并管理来自网络客户端的请求。


    要轻松启动 Derby Network Server，你必须首先将工作目录更改为 `DERBY_HOME` 内的 `bin` 文件夹（如图 G-1 所示）：


    ![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig1_HTML.jpg](img/477630_1_En_26_Fig1_HTML.jpg)


    图 G-1

    在网络模式下启动 Derby 服务器

