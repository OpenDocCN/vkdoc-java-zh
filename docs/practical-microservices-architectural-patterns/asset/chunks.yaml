  trans: '

    ### 注意


    “微服务是一种软件开发技术——是面向服务架构（SOA）风格的一种变体，它将应用程序构建为一系列松散耦合服务的集合。在微服务架构中，服务粒度较细，且协议轻量。将应用拆分为多个不同的小型服务，其好处在于提升了模块化程度。这使得应用更易于理解、开发、测试，并且对架构侵蚀更具弹性。它通过让小型自治团队能够独立开发、部署和扩展各自的服务，实现了开发的并行化。同时，它也允许单个服务的架构通过持续重构而逐步形成。”


    上述定义中提到的许多方面，在前两章中已经有所讨论。接下来，你将从这个定义的更多角度进行审视，并在接下来的两章中深入探讨更多内容。


    ## 总结


    在本章中，你审视了传统分布式或 N 层应用架构的现状，并探讨了此类架构因单体特性而存在的一些缺陷。单体架构还有许多其他优缺点尚未讨论，但此类讨论不在本章范围内，因为我只是想为讨论另一种做事方式（即使用微服务）设定背景。现在你明白了，当你的思路从单体架构转向微服务风格时，你需要反转许多概念，例如应用边界、内部通信等。在下一章中，你将详细重新审视微服务架构，并将其概念与现实世界的企业应用联系起来。


    # 3. 深入理解微服务


    正如你在第 2 章中所见，使用微服务是构建当今分布式软件解决方案的一种方法。过去二十年，软件行业在开发和部署分布式应用方面积累了经验，而微服务则提供了架构原则和模式，用于应对开发、部署和维护分布式应用中的诸多不足。我们在前两章讨论了微服务架构的背景和必要性，本章将更详细地探讨它。我将再次尝试结合现实世界应用（即我在第
    1 章中介绍的电子商务应用）的上下文来解释概念。这将帮助你快速将各方面内容与你实际经验中的实践场景联系起来。


    本章将探讨以下几个方面：


    *   在微服务上下文中，电子商务架构将呈现何种形态

    *   经典的分层与分层方法在微服务上下文中的关系

    *   微服务的自治特性

    *   微服务与传统 SOA 和 MOM 的关系

    *   微服务架构的可伸缩性和可扩展性特征


    ## 微服务的外观与感受


    你刚刚了解到，与传统单体应用相比，在谈论微服务时，许多特征和显著特性都被反转了。为了更好地理解这种反转究竟意味着什么，让我们先看一个实际的企业应用场景，并首先了解整体图景，这样细粒度且最重要的细节就更容易理解了。


    ### 电子商务微服务


    第 1 章的“典型应用架构”部分介绍了电子商务应用。我解释了此类应用如何按照传统方法构建。第 1 章的图 1-3 描绘了不同的层以及管理软件复杂性的模块化方法。即使采用了层、分层和模块的原则，你仍然看到模块之间存在不当依赖的问题，这阻碍了软件工程生命周期的所有阶段。我将按照第
    2 章介绍的微服务首要原则，以略微不同的风格来描绘那种单体架构。


    图 3-1 展示了如果我们重新绘制第 1 章图 1-3 所示的传统基于单体架构，架构会是什么样子。与图 1-3 中的单体架构表示相比，我柔化了图中用点线和虚线样式表示的应用边界。这是为了强调一点：在微服务架构中，重要的不是应用边界，而是微服务边界。微服务边界用粗矩形表示。图中描绘了许多这样的微服务。简而言之，传统架构中表示的单一单体应用边界已经消失，取而代之的是许多微服务涌现出来，并且所有这些微服务都有清晰且具体的边界。


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg](img/477630_1_En_3_Fig1_HTML.jpg)


    图 3-1


    电子商务微服务架构


    在这种新的架构表示中，我没有引入任何新模块。相反，我保留了单体架构中已有的模块，同时显著改变了软件模块的结构以及技术基础设施。让我们详细探讨这种结构变化。


    ### 无层，分布式


    我在第 1 章的“系统架构”部分讨论了三层和 N 层分布式架构。据此，将微服务架构称为“无层，分布式”架构并无不妥。为了说明清楚，如果你重新审视三层或 N
    层分布式架构，在一个应用内部存在多个层，例如客户端层、表示层、业务层等。这些层也能够部署到不同的分布式进程空间中。这一点在微服务架构中也被反转了。为了说明清楚，在微服务架构中，目标是让所有这些层保持在一起。但且慢，这同样不是一条硬性规定。没有什么能阻止我们将传统架构中的分层、层以及其他类似原则适配到微服务架构中。所有这些良好实践仍然有效。我们甚至可以将这些层部署到独立的进程空间中。但这样一来，我们可能需要质疑为什么要这样做。通过将紧密交互的部分（例如一个微服务的不同层）保持在一起，也许就在同一个进程内，我们可以带来许多优化，例如改善响应时间、实现可靠通信等。


    我们也可以在三层架构本身的上下文中思考微服务架构。微服务可以通过在逻辑上分离不同层来构建，但在实际生产部署时，这些层可能会紧密地保持在一起，以获得所需的自治程度。让我们来看看这种自治意味着什么。

    '
- fmt: '### The Micromonolith


    `Microservices` are micromonoliths in the sense that they are built by following
    layer and tier practices, but the boundary of a microservice should be clearly
    distinguishable and a microservice should encompass all that is required for that
    microservice to live and serve by itself without any external dependency. This
    is true in terms of physical artifacts like binaries, libraries, and scripts,
    which are required for the microservice to be up and running. This has to be also
    true in terms of any dependencies like container services or persistence services
    required during the runtime of the microservice. The physically bundled microservice
    artifact which when deployed to the runtime process has to exhibit complete autonomy
    in terms of its capability to provide its functionality. This is explained further
    in the next section.


    Since we are organizing microservices as all-encompassing bundles with little
    or no external dependency, this provides certain advantages in terms of platform
    and technology choices. Any platform, technology, tool, or framework decision
    taken for a microservice shouldn’t be a constraint for those of the other microservice.
    This provides freedom of choice of technology and architecture for teams across
    microservices. But at the same time, this autonomy also brings additional responsibility
    to the microservice; it has to own and manage all the resources necessary for
    its healthy existence, including the data and the database it requires to keep
    the state persistent. Data independency is typically managed by giving each microservice
    its own database (or even by giving each microservice its own schema in a shared
    database, but in that case, you should avoid all cross-schema operations). Typically,
    the presentation services required by a microservice are also enclosed within
    a microservice bundle. Figure [3-2](#477630_1_En_3_Chapter.xhtml#Fig2) shows this
    for a single microservice, the Product microservice.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg)


    **Figure 3-2** A typical microservice


    Out of the various tiers, it is the business tier that does the core data massaging
    and processing work, and it is this tier where scalability issues often occur.
    With today’s technology capability, especially using the `SPA` (single-page applications)
    web frameworks and caching frameworks, scaling the other tiers are comparatively
    straightforward. So for most of this discussion, we will be concentrating on the
    business tier when we talk about microservices. However, wherever required, we
    will also touch upon other tiers to present the complete picture. So, we want
    to represent the microservice shown in Figure [3-2](#477630_1_En_3_Chapter.xhtml#Fig2),
    separating the presentation components apart, and that is what you saw in Figure
    [3-1](#477630_1_En_3_Chapter.xhtml#Fig1). This will have some implications, but
    we will discuss them in a later section.


    ### Understanding Self-Contained Microservices


    Since microservices are SOA friendly (which we will discuss in the next section),
    they require HTTP server services to expose SOA or REST interfaces. While we deploy
    traditional monolith packages into the web-app folder of the HTTP container, in
    the case of a microservice, a lightweight HTTP listener is embedded within the
    microservice, thereby eliminating the need to have any external or standalone
    container or server requirement. In the Java paradigm, in the case of a traditional
    deployment, we used to deploy an `.ear` or a `.war` file into a full encompassing
    application server like JBoss or a web server like Tomcat. In contrast, in the
    case of a microservice there is no web server or `.war` file; instead, each service
    has its own embedded HTTP listener such as Jetty, Tomcat, or Undertow in a JAR
    file. While we build a microservice, the build stage will create this “executable
    fat JAR” file, including the service runtime such as the HTTP listener mentioned
    previously.


    > **Note:** Java does not provide a standard way to load nested JAR files (JAR
    files that are themselves contained within a JAR). This can be problematic if
    you are looking to distribute a self-contained microservice.

    >

    > To solve this problem, many developers use “uber” JARs. An uber JAR packages
    all the classes from all the dependent JARs into a single archive. They are also
    called fat JARs. The problem with this approach is that it becomes hard to see
    which libraries are in your microservice. It can also be problematic if the same
    filename is used (but with different content) in multiple JARs.


    The previous section indicated that microservices should encompass all of the
    physical artifacts like binaries, libraries, and scripts, required for the microservice
    to be up and running. In the traditional monolith deployment, we could place these
    kinds of dependencies in the `lib` folder of the application server. In the microservices
    world, executable jar files are a means to attain this. The structure of a typical
    executable jar file for the product microservice is shown in Listing [3-1](#477630_1_En_3_Chapter.xhtml#PC1).


    ```

    product.jar

    |

    +-META-INF

    |  +-MANIFEST.MF

    +-org

    |  +-springframework

    |     +-boot

    |        +-loader

    |           +-

    +-BOOT-INF

    +-classes

    |  +-com

    |     +-acme

    |        +-ProductMain.class

    +-lib

    +-framework.jar

    +-log4j.jar

    +-jetty.jar

    +-. . .

    ```


    **Listing 3-1** Executable jar File Structure


    In this manner, all required libraries as well as the required runtime services
    like HTTP, JMS, or AMQP are embedded within the executable jar file. In “Build
    and Package the Spring Boot Application” section in Chapter [7](#477630_1_En_7_Chapter.xhtml)
    you will code, build, package, and run an executable fat jar file.'
