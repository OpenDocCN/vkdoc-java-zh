- fmt: '## Summary


    In this chapter you looked at the forces that led to the evolution of microservices.
    The digital app, which connects humans with physical things, has necessitated
    this evolution. Inversion of Architecture is a normal outcome of this evolution,
    and the overall complexity of the software landscape has increased manyfold and
    is now visible outside to a microservice and has to be explicitly managed across
    microservices. While the urge to adopt microservices is tempting, a quantitative
    cost benefit analysis must be done before any such attempt. Once decided, the
    next most important aspect is to think about the inner architecture organization
    for your microservices. While the outer architecture concerns remain more or less
    same across context and scenarios, your inner architecture can be designed with
    varying trade-offs. You will look into this in more detail in Chapter [5](#477630_1_En_5_Chapter.xhtml).


    Footnotes [1](#477630_1_En_4_Chapter.xhtml#Fn1_source) [2](#477630_1_En_4_Chapter.xhtml#Fn2_source)
    [3](#477630_1_En_4_Chapter.xhtml#Fn3_source)


    # 5. Essential Patterns for Microservices


    Software architectures are comparatively easy to comprehend, especially if there
    is enough documentation on the subject. The hardship will emerge when you start
    implementing them to solve real-world problems. This is where architectural patterns
    will come to your rescue. If you understand the problem at hand and if you can
    reasonably attach this problem to a scenario similar to a problem you have already
    addressed, it’s rather easy to follow an approach similar to what you adopted
    earlier. Architecture and design patterns help you to choose and adopt solutions
    to problems that are similar in nature. A pattern is a reusable solution to repetitive
    problems of a similar nature that occur in a particular context.


    Having discussed the necessity of splitting monolith applications into multiple
    microservices, let’s now take a pragmatic view of one of the major concerns any
    application architect will face in designing scalable application: scaling the
    write and read clusters of any application independently. You will look into this
    aspect in detail in this chapter. In doing so, you will also explore a powerful
    pattern that will help solve many concerns of a microservices architecture by
    adopting various flavors of it.


    The concepts you are going to do a deep dive into in this chapter are as follows:


    - The need to independently scale the read and write transactional capabilities
    of an architecture

    - The CQRS pattern

    - A metamodel for the CQRS pattern and more sample scenarios that will be explained
    in later chapters in the book


    ## Orthogonal Scale Out of Services


    If we put aside the other rationales behind the microservices architecture, one
    main requirement is to selectively scale out components or services within a single
    application. You know that in a monolith it is nearly impossible to easily split
    out components or services and then deploy them at a selected degree of scalability;
    however, this is one major advantage we get in adopting the microservices architecture.
    In previous chapters I discussed the need to instantiate more numbers of Product
    Catalogue and Product Details microservices as compared to the number of instances
    of the Order microservice required. A similar requirement is also relevant in
    scaling the transactions handling the state change and state view of application
    domains heterogeneously, so let’s try to understand that in detail.


    ### Write vs. Read Transactions


    Any transaction originated through a B2B or a B2C channel, or for that matter
    through an IoT or Wearable channel, typically falls into one of the two categories
    of transactions:


    - **Write transactions**: A write transaction will typically change the state
    of entities in the application. An e-commerce check out, a credit card payment,
    and a flight seat confirmation are first-class examples of a write transaction,
    since all of them change the state of entities, are usually kept in the server-side
    memory, and in many cases the state change also gets reflected in the backing
    persistent store as well as in any other counterpart B2B interfaces with which
    the application interfaces. Generally, write transactions are non-idempotent^([⁶](#fn6))
    unless they are designed with special care to behave differently. This means a
    credit card payment transaction, if it is intended to be executed once and if
    due to some reason it is executed twice (played once and replayed one more time)
    and if both these transactions are successful, then the payment will be processed
    twice, which may not be the desired outcome


    - **Read transactions**: A read transaction usually queries the existing state
    of an entity, either for view purposes or for caching purposes or as a part of
    another encompassing write transaction as an aid to a decision-making step. Whatever
    the case, typically a read transaction is idempotent. It will not alter the actual
    state of the entity either in the server-side memory or in the backing persistent
    store. Perhaps repeated read transactions can create or update the state of some
    related entities, like the corresponding audit or log entities; however, normally,
    if for some reason it is executed twice (played once and replayed one or more
    times) and if all of these transactions are successful, then there won’t be any
    appreciable change in the state of the main entities involved in the transaction.


    ### The Look-to-Book Challenge


    I assume any of you reading this book have already have done online transactions,
    especially in an e-commerce application. If so, you can appreciate the fact that
    it will take more than one step, traversing through web pages, filling out forms,
    and so on, before you actually do the confirmation for your first write transaction,
    which is creating the order. To make it more clear, if you are shopping online
    for some retail item like an electronic gadget, you follow these steps:


    1. Type the URL for the home page.

    2. Browse through the product categories and select the product of interest.

    3. Retrieve the product details, including reviews, contents, and media.

    4. Decide to purchase the item, add it to the shopping cart, and fill out payment
    information.

    5. Click to confirm the purchase.


    If you examine the minimum steps listed above, you can differentiate the last
    transaction which is the actual confirm purchase transaction from the rest of
    the transactions. While the confirm purchase transaction can be put under the
    write transaction category, most of the other previous transactions listed above
    come under the read transactions category.


    ### Note


    For every single write transaction, you do many more read transactions.


    In the classic airline seat booking scenario, the ratio of reads to writes for
    every realized booked PNR comes in the range of 500 or even 1,000 or more. This
    is called look to book. When we say the look to book is 1,000 on average, this
    means is that for every write (book) transaction on behalf of a PNR created for
    a new booking, 1,000 or more read (look) transactions should have already hit
    the application. During peak season or during peak times of the week when sales
    are happening, this number can rise to the order of many thousands for a single
    booking! It is in this context, a microservice’s selective scale out capability
    is relevant.'
