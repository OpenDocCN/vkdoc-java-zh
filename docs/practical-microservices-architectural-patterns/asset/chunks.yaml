    \n上述命令将启动一个双节点 RabbitMQ 集群。请注意，你应该给这些命令足够的时间来完成，以确保集群完全形成。\n\n现在，你可以通过执行 Nginx\
    \ 脚本来设置 TCP 负载均衡器。请参考附录 C，按照逐步说明将 Nginx 配置为 TCP 反向代理。在 Nginx 配置文件中做出正确的条目后，如示例文件所示：\n\
    \n```\nch06\\ch06-03\\nginx.conf\n```\n\n按如下方式启动 Nginx 服务器：\n\n```\ncd D:\\Applns\\\
    nginx\\nginx-1.13.5\nD:\\Applns\\nginx\\nginx-1.13.5>nginx\n```\n\n当消息生产者想要向消息消费者发送消息时，它假定你只对当前流动的消息感兴趣，而不是旧消息。那么，每当你连接到\
