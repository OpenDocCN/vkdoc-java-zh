    带有 HTTP 前端的经典三层单体架构


    在一种略有不同的架构中，你只会在 DMZ 中放置一个 HTTP 服务器，而图 18-1 中显示在 DMZ 内的所有其他组件都将被移到内部网络边界内。在这里，缓存或存储在表示层服务器中的身份验证和授权步骤状态更加安全。图
