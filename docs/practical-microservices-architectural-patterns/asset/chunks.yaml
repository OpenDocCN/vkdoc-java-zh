  raw: "Even though you have to design the e-commerce application based on a\nmicroservices\
    \ architecture, the BDOM is following the traditional UML\nclass diagram style.\
    \ Hence the dependency shown in the e-commerce class diagram above may\nnot map\
    \ one-to-one when you decide the microservices boundaries.\nInstead, when you\
    \ decide the microservices boundaries based on\ndomain-driven design, some of\
    \ the dependencies shown here will get split\nacross microservices boundaries,\
    \ in which case some microservices must\nmaintain materialized views of data owned\
    \ by foreign microservices.\n\nTechnical Architecture for the Microservice-Based\n\
    E-Commerce Architecture\n\nHaving looked at the rationale behind the approach\
    \ to be taken in\narchitecting the microservices-based e-commerce application,\
    \ you can\narrive at the initial view of the technical architecture, shown in\n\
    Figure [17-5](#477630_1_En_17_Chapter.xhtml#Fig5).\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig5_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig5_HTML.jpg)\n\
    \nFigure 17-5\nE-commerce microservices technical architecture\n\nYou are attempting\
    \ to remove all direct intermicroservices\ndependencies and direct all intermicroservices\
    \ communications through an\nevent-driven\narchitecture \n. You use Axon’s clustered\
    \ event bus for\nthe same. You leverage polyglot persistence for storing data\
    \ so that\nmultiple data storage technologies can be chosen based upon the way\
    \ data\nis being used by individual microservices. For the Shipping microservice\n\
    and the Delivery microservice, you are not using any persistence to make\nthe\
    \ application simpler, so they are blurred out in Figure [17-5](#477630_1_En_17_Chapter.xhtml#Fig5).\n\
    \nDesign and Code the E-Commerce Microservice\nApplication\nBefore you get into\
    \ the design and code, let’s clarify the boundaries\nwithin which you are going\
    \ to understand the example. The scope of this\nbook is limited to microservices\
    \ in the context of middleware\nmicroservices. To build a complete working sample\
    \ of the e-commerce\nmicroservices application, you would also want to develop\
    \ HTML-based\nscreens based on a web framework. All of these elements of the web\
    \ app\nare contained in a microservice not shown in Figure [17-5](#477630_1_En_17_Chapter.xhtml#Fig5);\
    \ however I\nwill introduce that microservice in the subsequent sections. Detailed\n\
    review or explanations of building HTML screens and associated web\ntechnologies\
    \ is outside the scope of this book. Readers are advised to\nrefer to other textbooks\
    \ for detailed explanations on how to build web\napps. However, the code provided\
    \ with the example in building the web\napp is trivial, so the required parts\
    \ of the same should be\nself-explanatory and you can browse through them.\nExcluding\
    \ the web app, there are seven other application\nmicroservices, as depicted in\
    \ Figure [17-5](#477630_1_En_17_Chapter.xhtml#Fig5). Again, I\nwon’t list every\
    \ Java file within the microservices; instead, I’ll take\nthe significant use\
    \ cases one by one and explain the server side or the\nmicroservices code required\
    \ for that use case.\nThe complete code for the application is in `folder ch17\\\
    ch17-01\\Ax2-Ecom-No-Security`.\n\nListing Product Categories and Products\n\n\
    Product categories and products listed under a default selected category\nare\
    \ to be shown on the ACME Shop home page. Listing [17-1](#477630_1_En_17_Chapter.xhtml#PC1)\
    \ shows this\nportion of the code.\n\n```\n@RepositoryRestResource(collectionResourceRel\
    \ = \"categories\", path = \"categories\")\npublic interface ProductCategoryRepository\
    \ extends MongoRepository  {\n}\nListing 17-1\nProductCategoryRepository (ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\src\\main\\java\\com\\acme\\ecom\\\
    product\\repository\\ ProductCategoryRepository.java)\n```\n\nThis repository\
    \ is an interface and it allows you to perform various\noperations involving ProductCategory\
    \ objects. It gets these operations\nby extending the Mongo\nRepository, which\
    \ is a Mongo-specific Repository interface, which\nin turn extends the PagingAndSortingRepository\n\
    interface defined in Spring Data Commons. At runtime, Spring Data REST will\n\
    create an implementation of this interface automatically. Then it will\nuse the\
    \ `@` `RepositoryRestResource`\n annotation to direct Spring MVC to create RESTful\
    \ endpoints at\n`/categories`:\n\n`product_service.js`\nretrieves all product\
    \ categories as follows:\n\n```\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/categories/')\n\
    ```\n\nNote\nAll of the code for the web application is in the folder `ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-web\\src\\main\\resources\\static`.\n\nNext,\
    \ you should be able to retrieve all of the\nproducts under a product category\
    \ with the code in Listing [17-2](#477630_1_En_17_Chapter.xhtml#PC3).\n\n```\n\
    @RestController\npublic class ProductRestController {\n@RequestMapping(value =\
    \ \"/productsByCategory\", method = RequestMethod.GET,\nproduces = { MediaType.APPLICATION_JSON_VALUE\
    \ })\npublic ResponseEntity>>getAllProductsByCategory\n(@RequestParam(\"category\"\
    ) String category) {\nList products =\nproductRepository.findByProductCategoryName(category);\n\
    Link links[] = { };\nif (products.isEmpty()) {\nreturn new ResponseEntity>>(\n\
    HttpStatus.NOT_FOUND);\n}\nList> list = new ArrayList>();\naddLinksToProduct(products,\
    \ list);\nResources> productRes =\nnew Resources>(list, links);\nreturn new ResponseEntity>>(\n\
    productRes, HttpStatus.OK);\n}\n}\nListing 17-2\nproductsByCategory (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-product\\src\\main\\java\\com\\acme\\ecom\\product\\\
    controller\\ProductRestController.java)\n```\n\n`product_service.js`\nretrieves\
    \  all\nproducts listed under a product category as follows:\n\n```\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/productsByCategory?category='+category)\n\
    ```\n\nListing Product Details Mashed Up with Inventory\nData\n\nThe next main\
    \ use case is to retrieve information when a user clicks on\na specific product\
    \ to list the product details. The product details can\nbe retrieved using the\
    \ code in Listing [17-3](#477630_1_En_17_Chapter.xhtml#PC5).\n\n```\n@RestController\n\
    public class ProductRestController {\n@RequestMapping(value = \"/products/{id}\"\
    , method = RequestMethod.GET,\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
    public ResponseEntity> getProduct(\n@PathVariable(\"id\") String id) {\nProduct\
    \ product = productRepository.findOne(id);\nif (product == null) {\nreturn new\
    \ ResponseEntity>(HttpStatus.NOT_FOUND);\n}\nResource productRes = new Resource(\n\
    product,new Link[]{linkTo(methodOn(ProductRestController.class).\ngetProduct(product.getId())).withSelfRel(),\
    \ linkTo(\nProductRestController.class).slash(\"productImg\").slash(\nproduct.getImgUrl()).withRel(\"\
    imgUrl\")});\nreturn new ResponseEntity>(productRes,\nHttpStatus.OK);\n}\n}\n\
    Listing 17-3\nGet Product Details (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\\
    src\\main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
    ```\n\n`product_service.js`\nretrieves all products listed under a product category\
    \ as follows:\n\n```\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/products/'+id)\n\
    ```"
