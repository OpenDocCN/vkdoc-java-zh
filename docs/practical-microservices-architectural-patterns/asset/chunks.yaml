    ## Summary


    You have reached a major milestone in this book by executing the examples in this
    chapter, since they are live code in action and they explain many of the concepts
    discussed in this book so far. You saw what a CQRS application will look like
    in the familiar Spring Boot framework, and you also saw how to distribute one
    into multiple microservices, also communicating with other using events over a
    messaging middleware. So far, so good; however, you have now invited “Satan”^([(26)](#fn26))
    into your architecture: the partition. By bringing the capability to partition
    your single JVM CQRS application in the first example into multiple microservices
    in the second example, you now need to address the consistency aspects you explored
    via the CAP theorem in Chapter [11](#477630_1_En_11_Chapter.xhtml). To discuss
    that in detail further, you should first know the foundations of consistency in
    the context of microservices, so move on to Chapter [13](#477630_1_En_13_Chapter.xhtml).


    ## Footnotes


    ## 13. Distributed Transactions


    You looked at using the Axon framework to implement different scenarios of the
    CQRS pattern in the previous chapter. In this chapter, you will be revisiting
    Axon for more scenarios in the microservices context, including executing long-running
    computational processing. To do that effectively, let’s start the discussion with
    a few basics, including transactions. A transaction in its simple form is a change
    or exchange of values between entities. The parties involved can be a single entity
    or more than one entity. When the party involved is a single entity, typically
    the transaction is a local transaction. If more than one party is involved, the
    transaction can be classified as either a local transaction or a distributed transaction,
    depending on the nature and location of the entities involved.


    A transaction may involve a single step or multiple steps. Whether a single step
    or multiple steps, a transaction is a single unit of work that embodies these
    individual steps. For the successful completion of a transaction, each of the
    involved individual steps should succeed. If any of the individual steps fail,
    the transaction should undo any of the effects of the other steps it has already
    done within that transaction.


    With this preface, you will look into the details of transactions, especially
    distributed transactions. I will only touch base on the essentials of transactions;
    I’ll spend more time on the practical implication aspects, especially in the context
    of microservices. Detailing out transactions to any more depth would require its
    own complete book, so this coverage will be limited to discussions around microservices
    and few practical tools you can use to build reliable microservices.


    In this chapter you will learn about:


    *   The indeterministic characteristics of computer networks

    *   Transaction aspects in general

    *   Distributed transactions vs. local transactions

    *   ACID vs. BASE transactions

    *   A complete example demonstrating distributed transactions using multiple resource
    managers'
