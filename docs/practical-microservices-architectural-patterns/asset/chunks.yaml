    \ to that of the `Ecom-core` microservice, which you saw here.\n\n## Set Up the\
    \ E-Commerce Microservice Application\n\nIn this section, you will configure,\
    \ build, and run the e-commerce microservice application and execute various test\
    \ cases.\n\n### Configure the Application\n\nYou need to make the required configuration\
    \ changes in the microservices. The changes you need to make are similar to what\
    \ was explained in Chapter [17](#477630_1_En_17_Chapter.xhtml).\n\n### Set Up\
    \ the Environment Infrastructure\n\nNext, you need to set up a few infrastructure\
