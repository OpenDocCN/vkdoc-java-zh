    \ Configuration\n\n`ClusteringEventBus` 将事件分派到不同机器上的事件处理器。`ClusteringEventBus`\
    \ 必须配置一个 `ClusterSelector`，用于为每个已注册的 `EventListener` 选择一个 `Cluster` 实例，以及一个 `EventBusTerminal`，负责将事件分派到每个相关的集群。在上述代码中，你使用\
    \ `DefaultClusterSelector` 作为 `ClusterSelector`，它始终选择同一个集群。该实现可以作为其他集群选择器的委托，用于那些不属于特定集群的事件监听器。`DefaultClusterSelector`\
    \ 反过来使用一个简单的 `Cluster` 实现，当事件发布时，它会调用集群中的每个成员。下一个重要组件是 `EventBusTerminal`，它是一种连接事件总线集群的机制。终端负责将发布的事件传递给事件总线中所有可用的集群（无论是本地还是远程）。终端通常绑定到单个事件总线实例，但可能知道存在多个实例，以便在这些事件总线之间形成桥接。你使用\
    \ `SpringAMQPTerminal`，它是 `EventBusTerminal` 的一个实现，使用兼容 AMQP 0.9 的消息代理来分派事件消息。这是因为你使用\
    \ RabbitMQ（兼容 AMQP）作为消息队列提供者，为分布式事件通道提供骨干支持。所有出站消息都发送到配置的交换机。该终端不会在内部分派事件，因为它依赖每个集群监听自己的\
    \ AMQP 队列。同样，如代码所示，终端配置了 `ConnectionFactory`，用于提供发送消息的连接和通道。虽然这些概念有点复杂，但好消息是 Axon\
