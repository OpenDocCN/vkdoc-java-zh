    )\n            .secret(\"ecom\")\n            .scopes(\"PRODUCT\",\"CUSTOMER\"\
    ,\"ORDER_HISTO\", \"CORE\",\"SHIPPING\",\"DELIVERY\")\n            .autoApprove(true)\n\
    \            .authorities(\"PRODUCT_READ\", \"PRODUCT_WRITE\",\"CUSTOMER_READ\"\
    , \"ORDER_READ\",\"ORDER_WRITE\")\n            .authorizedGrantTypes(\"implicit\"\
    ,\"refresh_token\", \"password\", \"authorization_code\");\n    }\n\n    @Override\n\
    \    public void configure(AuthorizationServerEndpointsConfigurer endpoints) throws\
    \ Exception {\n        endpoints.tokenStore(tokenStore()).tokenEnhancer(jwtTokenEnhancer())\n\
    \            .authenticationManager(authenticationManager);\n    }\n\n    @Bean\n\
    \    public TokenStore tokenStore() {\n        return new JwtTokenStore(jwtTokenEnhancer());\n\
    \    }\n\n    @Bean\n    protected JwtAccessTokenConverter jwtTokenEnhancer()\
    \ {\n        KeyStoreKeyFactory keyStoreKeyFactory = new KeyStoreKeyFactory(\n\
    \            new ClassPathResource(\"jwt.jks\"), \"mySecretKey\".toCharArray());\n\
    \        JwtAccessTokenConverter converter = new JwtAccessTokenConverter();\n\
    \        converter.setKeyPair(keyStoreKeyFactory.getKeyPair(\"jwt\"));\n     \
    \   return converter;\n    }\n}\n```\n*Listing 18-11* Spring OAuth Security Configuration\
    \ (`ch18\\ch18-01\\Ax2-Ecom-With-Security\\Ecom-security\\src\\main\\java\\com\\\
    acme\\ecom\\security\\oauth\\OAuth2Configuration.java`)\n\nYou configure the OAuth\
    \ 2.0 authorization server by adding the `@EnableAuthorizationServer` annotation\
    \ and implementing `AuthorizationServerConfigurer` by using Spring's `AuthorizationServerConfigurerAdapter`\
