- fmt: '# Test Cases Overview


    In the truest sense, there are only three test cases that validate the example
    and they are the first, second, and the seventh test cases. All other test cases
    invalidate the example either by simulating various failure conditions or by adjusting
    the transaction semantics applied to service methods. I do that to make you understand
    possible error scenarios that can occur in a distributed transactions environment.


    In this section, you will look at the first test case, which demonstrates strict
    ACID compliant transaction in the end-to-end flow. This means either all of the
    state changes in the resources will be approved or all of them will be rolled
    back. The rest of the test cases will be executed in the subsequent sections one
    by one.


    ## Test Case 1: Strict ACID Compliant Transaction


    As a first step, you will create two test users in the system. Take Postman and
    create two test users as shown (see Figure [13-9](#477630_1_En_13_Chapter.xhtml#Fig9)):


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig9_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig9_HTML.jpg)


    **Figure 13-9** Create test users


    ```

    http://localhost:8081/api/users

    METHOD: POST; BODY: Raw JSON

    { "id" : 11, "name" : "Sam", "amountSold" : 1000.0, "amountBought" : 1000.0 }

    { "id" : 21, "name" : "Joe", "amountSold" : 5000.0, "amountBought" : 5000.0 }

    ```


    The moment the test users are created, they will be visible in the settlement
    console, as shown in Figure [13-10](#477630_1_En_13_Chapter.xhtml#Fig10).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig10_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig10_HTML.jpg)


    **Figure 13-10** Test user console


    To start the first test case, take Postman and create a new quote, as shown in
    Figure [13-11](#477630_1_En_13_Chapter.xhtml#Fig11):


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig11_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig11_HTML.jpg)


    **Figure 13-11** Create a new quote


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "AAPL", "sellerId" : 11, "buyerId" : 21, "amount" : 100, "test" :
    1, "delay" : 2 }

    ```


    Keep watching the consoles of the broker web service and the settlement web service
    together. When a new quote is created, as shown in Figure [13-11](#477630_1_En_13_Chapter.xhtml#Fig11),
    it instantaneously gets reflected in the broker web console, as shown in Figure
    [13-12](#477630_1_En_13_Chapter.xhtml#Fig12).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig12_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig12_HTML.jpg)


    **Figure 13-12** A new quote arrived for Test Case 1


    Within minutes, the quotes will get processed in the upstream microservices and
    will subsequently get settled in the downstream microservices. Close observation
    shows that the status of the quote changes from "New" to "Confirmed" in the broker
    web console and the running balances of the users will get changed by the amount
    of quotes also in the Settlement Web console, both shown in Figure [13-13](#477630_1_En_13_Chapter.xhtml#Fig13).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig13_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig13_HTML.jpg)


    **Figure 13-13** Test Case 1 console


    You should also note another aspect in Figure [13-13](#477630_1_En_13_Chapter.xhtml#Fig13),
    which will be relevant in Test Case 8, in the "Test the Message Received Out of
    Order Scenario" section later. The latest quote creation time in the upstream
    system gets updated as the Last Quote Time for users whenever the respective user
    account gets updated.


    Since you already looked at every detail of the code in the earlier sections,
    you will not look at what is happening under the hood again in detail. Instead,
    you will now concentrate on the transaction semantics.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig14_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig14_HTML.jpg)


    **Figure 13-14** Test Case 1 transaction semantics


    As shown in Figure [13-14](#477630_1_En_13_Chapter.xhtml#Fig14), you applied `TX_REQUIRED`
    transaction semantics to all service methods. This means either all of the state
    changes in the resources will be made or all of them will be rolled back. In the
    current test case, you have not simulated any errors or failure conditions, hence
    all of the transactions succeeded.


    In subsequent test cases you are going to simulate error conditions to better
    understand possible failure conditions in enterprise scenarios. A thorough understanding
    of all of these possible failure conditions will arm you with better insight,
    which is very much required when you design for "true microservices," where you
    want to stay away from distributed transactions!


    ## Test Case 2: Transaction Rollback Scenario


    To test the Transaction Rollback test case, take Postman again and create another
    new quote, as shown in Figure [13-11](#477630_1_En_13_Chapter.xhtml#Fig11):


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "AMZN", "sellerId" : 11, "buyerId" : 21, "amount" : 200, "test" :
    2, "delay" : 2 }

    ```


    In Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3), the upstream processing
    and the downstream processing are separate. There is no strict "super transaction
    coordinator" across these two domains. If transaction semantics are applied to
    Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3), you get Figure [13-15](#477630_1_En_13_Chapter.xhtml#Fig15).
    So within a domain (upstream alone or downstream alone) you may decide to have
    coordinated transactions across multiple resources, and when it comes to coordination
    across those domains you may need to think of the BASE approach.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig15_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig15_HTML.jpg)


    **Figure 13-15** Test Case 2 transaction semantics


    As shown in Figure [13-15](#477630_1_En_13_Chapter.xhtml#Fig15), `TX_REQUIRED`
    transaction semantics have been applied to all service methods. This means either
    all of the state changes in the resources will be made or all of them will be
    rolled back.


    In the first pass of execution when the Quotes Processor Task picks up the new
    quote for processing, you simulate an error within the broker service. This is
    marked by an X sign in Figure [13-15](#477630_1_En_13_Chapter.xhtml#Fig15). So,
    even though the corresponding transactions in the auction service and stock order
    service were ready to commit, as shown by the ✓ sign, they will be rolled back
    since both of them were called within the context of the parent transaction of
    the broker service where you simulate the error. This is shown in the Quote Processing
    microservice''s console in Figure [13-16](#477630_1_En_13_Chapter.xhtml#Fig16).


    Moreover, since in the first pass the transactions were rolled out, the New Quote
    message delivery to ActiveMQ is not committed, so no action takes place in the
    Quote Settlement microservice (see Figure [13-16](#477630_1_En_13_Chapter.xhtml#Fig16)).
    This is depicted by a blank circle in the first pass in Figure [13-15](#477630_1_En_13_Chapter.xhtml#Fig15)
    for brevity.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig16_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig16_HTML.jpg)


    **Figure 13-16** Test Case 2 processing first pass


    Wait until the Quotes Processor Task picks up the previous quote again (since
    the status is still New) in the next scheduled trigger, which is shown in Figure
    [13-17](#477630_1_En_13_Chapter.xhtml#Fig17).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig17_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig17_HTML.jpg)


    **Figure 13-17** New quote arrived for Test Case 2'
