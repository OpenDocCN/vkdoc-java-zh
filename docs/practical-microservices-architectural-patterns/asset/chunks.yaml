- fmt: 'The entities are now set to the state where you can execute Test Case 8, the
    actual test case intended to be examined in this section. Testing for this scenario
    is slightly tricky since you need to coordinate the timing of each action as per
    the test fixtures. I will explain based on the configuration for my test fixtures,
    which should work for you too if you have not made any changes to the example
    configurations.


    You need to send a new quote for upstream processing but you want to delay the
    processing for a little while, and while this quote is waiting for this delay
    to be over, you also want to fire one more new quote for upstream processing,
    which will get processed nearly straight through without any delay. In this manner,
    the quote created later will reach the downstream system for further processing
    first, followed by the quote created initially. In this manner, you will simulate
    messages reaching out of order at the downstream system.


    Before you start firing requests for this test case, read this section completely
    once to understand the preparations you need to make mentally so as to fire the
    new quotes as per instructions. Then come back to this point of explanation and
    continue the actual test.


    Take Postman again and fire a new quote, as shown:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    ```


    Note that you are piggybacking a delay of 90 seconds along with the test request
    payload, as shown in Figure [14-22](#477630_1_En_14_Chapter.xhtml#Fig22).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig22_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig22_HTML.jpg)


    Figure 14-22 Test Case 8 console, creating the first quote


    ```

    { "symbol" : "QCOM", "sellerId" : 11, "buyerId" : 21, "amount" : 800, "test" :
    8, "delay" : 90}

    ```


    Keep watching the upstream microservice console (command prompt console) and when
    the `Quote Processor Task` times out, it will fetch this new quote and change
    the status from “New” to “Confirmed,” but before completing the end-to-end transaction,
    it will sleep for the 90 seconds delay you have provided. See Figure [14-23](#477630_1_En_14_Chapter.xhtml#Fig23).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig23_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig23_HTML.jpg)


    Figure 14-23 Test Case 8 console, processing first quote


    This 90 seconds has a significance because the next time-out of the `Quote Processor
    Task` will happen in the next 60 seconds, and during that time-out it shouldn’t
    fetch this quote because it is already in a processing state (the quote status
    is not “New”).


    Here comes the trick: as soon as (within 10 to 20 seconds) the `Quote Processor
    Task` picks up the quote for processing and further goes to sleep for the delay
    of 90 seconds provided, you need to fire another new quote (ideally, you have
    another Postman session with the data ready), like so:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "GILD", "sellerId" : 11, "buyerId" : 21, "amount" : 900, "test" :
    8, "delay" : 2 }

    ```


    This second new quote is shown in Figure [14-24](#477630_1_En_14_Chapter.xhtml#Fig24).
    That’s all, and the steps for test execution are over.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig24_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig24_HTML.jpg)


    Figure 14-24 Test Case 8 console, creating a second quote


    When the `Quote Processor Task` times out next, it will fetch this second new
    quote alone. This is because even though the first quote is still under process
    in the upstream system, the status of the quote has already been updated to “Confirmed,”
    as shown in Figure [14-24](#477630_1_En_14_Chapter.xhtml#Fig24). This is effected
    by marking the transaction of `Auction Service` in the upstream microservice as
    `TX_REQUIRES_NEW`.


    For the second new quote, there is a negligible process delay and it comes out
    of the upstream processing, gets through `ActiveMQ`, and reaches downstream for
    further processing. You expect that the first quote is still in the process stage
    in the upstream system. This way, the message is out of order in the downstream
    system. This will be settled as shown in Figure [14-25](#477630_1_En_14_Chapter.xhtml#Fig25).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig25_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig25_HTML.jpg)


    Figure 14-25 Test Case 8 console, second quote settled first


    Figure [14-26](#477630_1_En_14_Chapter.xhtml#Fig26) also asserts that the quote
    created second during Test Case 8 is in fact recorded in the `Stock Transaction`
    table and that the quote is in a settled state.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig26_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig26_HTML.jpg)


    Figure 14-26 `Stock Transaction` table during Test Case 8


    Keep watching the browser consoles. Quite soon you will see the running balances
    of users in the downstream system change. This is the effect of the first quote
    whose upstream processing has been delayed so it reached the downstream system
    out of order and finally got settled, as shown in Figure [14-27](#477630_1_En_14_Chapter.xhtml#Fig27).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig27_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig27_HTML.jpg)


    Figure 14-27 Test Case 8 console, first quote settled as second


    In the “Build and Test the Example’s Happy Flow” section in Chapter [13](#477630_1_En_13_Chapter.xhtml),
    you read that the latest quote creation time in the upstream system was updated
    as the last quote time whenever the user account was updated. In the demonstration
    here, the last quote time of the user accounts were not changed as per the first
    quote created, which came last. This is correct, but you were not able to achieve
    this in Chapter [13](#477630_1_En_13_Chapter.xhtml). Due to the enhanced design
    of the solution, the downstream microservice is now smart enough to understand
    by looking in detail at the arrived quote messages that for messages arriving
    out of order too the requirement is met. In general, regardless what transaction
    paradigm you use (relaxed BASE or not) you should always add code and design to
    address out-of-order messages when message ordering is important.


    Figure [14-28](#477630_1_En_14_Chapter.xhtml#Fig28) shows the `Stock Transaction`
    table, which also reflects the recording of messages out of order from the perspective
    of the order in which the original quote was created.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig28_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig28_HTML.jpg)


    Figure 14-28 `Stock Transaction` table, post-Test Case 8


    ## Choosing Transaction Options


    You concluded the “Global vs. Local Resource” section by justifying that if you
    chose Option 1 for the architecture, then when you dequeue messages from the queue
    for settlement by the `Quotes Settlement` microservice, you still have the two-phase
    transaction problem. If you consider quote settlement as a pure back-office process,
    one justification for you to still continue with the two-phase transactions is
    that you maximized the throughput and hence the availability of your customer-facing
    microservices while trading off comparatively lower responsiveness for your back-office
    microservices.


    But what if a two-phase commit transaction is never acceptable in some parts of
    your microservice architecture? There are a bunch of implications associated with
    a two-phase commit transaction even if you justify using them for specific use
    cases, as discussed earlier. Here are a few of them:


    *   Two-phase commit transaction coordinators are single points of failure. You
    would require distributed and replicated logs to keep state and keep the coordinator
    stateless to address this.^([^(36)](#fn36))'
