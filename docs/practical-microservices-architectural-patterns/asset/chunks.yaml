    rabbit-listener-context.xml\nch06\\ch06-03\\src\\main\\resources\\rabbit-sender-context.xml\n\
    ```\n\n中，你将命名队列定义为：\n\n```\n配置 RabbitMQ 有多种组合方式，\n执行示例程序以验证 RabbitMQ 集群也有多种顺序。\n\
