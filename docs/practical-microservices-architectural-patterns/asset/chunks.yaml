  trans: '

    清单 14-18 中的伪代码依赖于以下能力：在不移除消息的情况下窥探队列中的消息，以及在成功处理后从队列中移除消息。如有必要，这可以通过两个或更多独立事务来完成，如伪代码所示：一个事务处理消息队列，另一个事务在用户数据库中记录报价消息，第三个事务则用于协调用户余额并更改报价状态。用户余额协调和报价状态更改是原子性提交的；然而，由于这两个操作发生在同一个本地资源中，因此不需要两阶段事务。除非数据库操作成功提交，否则队列操作不会提交。数据库操作期间的部分失败将导致队列操作保持未提交状态，这样消息迟早会被重新投递，并重新开始处理。该算法现在支持部分失败，同时仍能提供事务性保证。这种算法或方法是在不使用分布式两阶段提交事务的情况下，在分布式微服务之间实现最终一致性的一种尝试。此处提供的示例代码可以增强，以实现上述方法的多种变体；这留作练习，供您动手实践代码。请注意，这需要实现“幂等消费者模式”，而正确实现该模式颇具难度。^(³⁷)
    除了本章中的基本探索性测试用例之外，还需要进行额外的测试，以便考虑到所有可能的故障模式。


    总结

    和我的许多同事一样，我也曾热爱事务。自 1999 年起，我就开始使用声明式事务管理，当时我们很兴奋，因为我们是首批下载 *Sun 的 J2EE 服务器参考实现（含
    EJB）*^(³⁸) *(Enterprise Java Beans) 容器* 的人之一，用于为一家欧洲航空公司实施优化其客运预订系统运营的专家系统。从那时起已经过去了
    20 年，我们仍然热爱事务，无论是本地事务还是分布式事务。然而，关键在于，分布式事务和本地事务之间的选择必须根据所涉及微服务的上下文、功能和关键性，逐案进行。在并非强制需要的情况下，设计利用分布式事务管理器的系统成本高昂，因为它可能会增加运营成本，并略微影响性能。在本章中，您看到了一些可用于设计必须最终一致的容错微服务的技术，尽管我并未解决所有可能的异常情况。在下一章中，您将扩展所学知识，研究其他一些场景，包括但不限于长时间运行的事务。


    脚注


    15. 为微服务优化的事务


    虽然第 13 章介绍了带有工作代码的分布式事务，但您在第 14 章中以增强的设计重新审视了这些示例，旨在理解在为 BASE 事务支持设计架构时的细节和关注点。到目前为止一切顺利，但问题在于，是否有一种方法可以抽象您在这两章中看到的细节，同时仍然在微服务架构中达到所需的数据一致性水平。您将在本章中详细探讨这一点。本章中的示例并非第
    13 章和第 14 章中示例的延续，因此如果您急于理解本章中的示例，可以跳过那两章。但是，您将在本章中再次利用 Axon 框架，因此强烈建议您先阅读第 12
    章以了解 Axon 的入门知识，这样您就能在讨论中熟悉编程范式。


    您将在本章中探讨以下内容：


    *    Saga 简介

    *    分布式 Saga 与微服务

    *    使用 Axon 2 的完整 Saga 示例


    微服务事务的 Saga

    第 13 章中“事务模型”一节介绍了 Saga 的概念，在本节中，您将详细探讨 Saga。

    '
- fmt: '# Saga Explained


    The concept of saga was first introduced in a paper in 1987, and the concept gained
    traction in the context of microservices. Sagas are similar to nested transactions.
    In a nested transaction, atomic transactions are embedded in other transactions.
    In sagas, each of these transactions has a corresponding compensating transaction.
    If any of the transactions in a saga fails, the compensating transactions for
    each transaction that was successfully run previously will be invoked so as to
    nullify the effect of previously successful transactions.


    Sagas are typically used for modelling long-lived transactions like those involved
    in workflows. It is not advisable to use two-phase transactions to control long-lived
    transactions since the locking of resources for prolonged durations is not at
    all advisable. In the context of microservices, sagas become relevant even when
    long-lived transactions are not involved due to the reason why you want to say
    NO to two-phase commit transactions. When two-phase commit transactions can’t
    be used and when you still want to exercise control at each stage of a multi-step
    transaction, sagas will help you.


    Even before the evolution of microservices, the concept of saga was very popular,
    and in the truest sense many real-world problems have been addressed using sagas.
    Maintaining consistency across location and/or trust boundaries can’t easily be
    handled using the classic ACID model and many real-world scenarios involve these
    complexities. A transfer of money from an account in one bank to another account
    in another bank is a classic example where there is no reason to assume that the
    software systems of these banks are near or together. And you can relate to this
    from your daily experience when you do such fund transfers. Even if a money transfer
    happens near real time so that it appears to be instantaneous in every aspect,
    most probably the involved transactions were not carried out in a two-phase commit
    transaction, but instead in some kind of saga. This means, when you do a fund
    transfer, the associated debit and credit in most cases will happen as two correlated
    steps, coordinated by some means other than a two-phase transaction coordinator
    so that all the involved steps will either happen or all the involved steps will
    be rolled back eventually.


    Another classical example is when you book a flight, hotel, and rental cab. It’s
    very unlikely that a single enterprise owns inventory for all these resources,
    but it’s highly likely that end user wants to book one or more of these resources
    in a single transaction, because a confirmed hotel booking with a non-confirmed
    flight booking is not very useful for him. Another aspect here is that, if you
    look at the resource managers or the resource owners in such cases, they may fall
    outside trust boundaries, and in many cases they might be competing enterprises.
    My current firm is involved in building software systems for the travel and hospitality
    industry, and I can relate to many instances in our software design where similar
    transactions can and will only be designed to be eventually consistent.


    Figure [15-1](#477630_1_En_15_Chapter.xhtml#Fig1) illustrates a state diagram
    representing how individual transactions will progress, stage by stage, within
    a saga.


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig1_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig1_HTML.jpg)


    **Figure 15-1** State diagram illustrating saga


    As shown in Figure [15-1](#477630_1_En_15_Chapter.xhtml#Fig1), in saga, if one
    of the transactions fails, the compensating transactions for each of the transactions
    that successfully ran will be executed. This is coordinated by the saga transaction
    coordinator.


    ## Distributed Saga


    The concept of saga as described in the previous section is rather trivial to
    build, since many of the workflow and Business Process Model and Notation (BPMN)
    frameworks are built using the same analogy where you want to orchestrate long-running
    transactions. If you want to coordinate the same in a microservices environment,
    this involves coordinating multiple decentralized nodes and processes, which is
    non-trivial.


    You will first look at the various components needed for a distributed saga at
    the conceptual level. See Figure [15-2](#477630_1_En_15_Chapter.xhtml#Fig2).


    ### Transactions and Compensation Transactions


    A saga transaction in a microservices context is better called a request (HTTP)
    or an event (commands and events); however, for the simplicity of our discussion,
    we will retain the term transactions.


    A distributed saga is a collection of transactions:


    ```

    T1, T2, ..., Tn

    ```


    Each transaction has a compensating transaction:


    ```

    C1, C2, ..., Cn

    ```


    A compensating transaction (`Cn`) will semantically undo a previously completed
    corresponding transaction (`Tn`).


    A distributed saga guarantees that either


    ```

    T1, T2, ..., Tn

    ```


    or


    ```

    T1, T2, ..., Ti, Ci, ..., C2, C1

    ```


    happens so that, as shown in Figure [15-1](#477630_1_En_15_Chapter.xhtml#Fig1),
    if one of the transactions fails, the compensating transactions for each of the
    transactions that successfully ran will be executed.


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig2_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig2_HTML.jpg)


    **Figure 15-2** Distributed saga, illustrated


    ### The Saga Log


    The saga log is a distributed log that’s used to persist the state of every transaction/operation
    during the execution of a given saga. The saga log contains various state-changing
    operations, such as `begin saga`, `end saga`, `abort saga`, `begin Ti`, `end Ti`,
    `begin Ci`, and `end Ci`. The saga log is often implemented using a distributed
    log, and systems such as `Kafka` are commonly used for the implementation.


    ### The Saga Execution Coordinator (SEC)


    The SEC orchestrates the entire logic and is responsible for the execution of
    the saga. All of the steps in a given saga are recorded in the saga log and the
    SEC writes to and reads from and interprets the records of the saga log. A SEC
    has the following subcomponents:


    - **Control bus**: A control bus effectively administers a messaging system that
    is distributed across multiple nodes and processes.

    - **Process manager**: A process manager maintains the state of the sequence and
    determine the next processing step based on intermediate results.

    - **Message correlation**: The sender correlates the response it received to the
    request it sent originally. The `MessageID` and `CorrelationID` properties of
    the message are used to correlate the request and response messages. Thus a correlation
    identifier is a unique identifier that indicates which request message this reply
    is for.

    - **Message sequence**: This is required to retain the order of the messages send
    as per original intention.

    - **Guaranteed delivery**: With guaranteed delivery, the system uses built-in
    data stores to persist messages. Each node the messaging system is installed on
    has its own data store so that the messages can be stored locally. When the sender
    sends a message, the send operation does not complete successfully until the message
    is safely stored in the sender’s data store. Subsequently, the message is not
    deleted from one data store until it is successfully forwarded to and stored in
    the next data store. In this way, once the sender successfully sends the message,
    it is always stored on disk on at least one computer until it is successfully
    delivered to and acknowledged by the receiver.'
