- fmt: '# Session IDs


    Traditionally, authentication has been done as a stateful operation. When the
    user inputs his or her credentials, the server generates a unique session ID,
    stores it on the server side, and hands it back to the user as well. Along with
    each request that needs access to protected resources, this session ID is passed
    as a request header and the server will always validate the session ID against
    the actual user credentials on the server side or with the “sessions on play”
    cache maintained on the server side. This is near to a perfect solution for monolith
    applications, where for each request response cycle you need no more than one
    such validation.


    For microservices architectures, this can be limiting. Getting data from the central
    store for every other operation can be troublesome, especially when a single user-side
    request-response cycle internally spans across a graph or many intermicroservice
    calls. Even when a single user-side request-response cycle internally gets served
    by a single microservice, the cumulative process of user authentication and authorization
    DB (or cache) lookup and validations for all the API methods for a high transactional
    system is cumbersome, so we need smarter design mechanisms.


    You should notice one good thing about session IDs: session IDs are opaque, meaning
    no easily decipherable data can be extracted from session IDs by third parties.
    The linkage between the session ID and its inferable data is entirely done server-side.


    # Tokens


    Tokens are an alternative to making session ID-based security design smarter.
    A token is more than an identifier, with meaningful and inferable data too in
    it. A token, in addition to the session ID, can also contain less sensitive portions
    of user credentials, like the user name. In this manner, the user or the service
    requester detail is already available in the request header, so microservices
    don’t need to do another I/O (input/output) to the database or cache to interpret
    the requestor. Now you need to look at the authorization part: who has access
    to what protected resources, and once accessed, what actions can that user execute
    over the resource. So you could also include information about the types of operations
    available for the user into the token. You could, for example, add a field named
    `scope`, which can have values like `user` to represent the authority of a normal
    end user and `admin`, who will have extra authority to perform critical back-office
    operations. If so, when a user supplies the token along with the request to perform
    an operation, say by making a call to an API endpoint, the service handling that
    endpoint and safeguarding the protected resource can validate the token, look
    for the right “scopes” in it, and authorize (or deny) the user to perform that
    operation.


    # JSON Web Token (JWT)


    You may create your own token for the convenience described in the previous section
    or you can adopt a standard that already exists in the industry called JSON Web
    Token (JWT).


    JWT has three distinct parts that are URL encoded for transport:


    * **Header**: The header contains the metadata for the token and at a minimum
    it contains the type of the signature and/or encryption algorithm.

    * **Claims**: The claims contain any information that you want signed.

    * **JSON Web Signature (JWS)**: The headers and claims are digitally signed using
    the algorithm specified in the header.


    A JWT encodes a series of claims in a JSON object. Some of these claims have specific
    meanings, while others are left to be interpreted by the users. Some of the claims
    you commonly encounter are:


    * Issuer (`iss`)

    * Subject (`sub`)

    * Audience (`aud`)

    * Expiration time (`exp`)

    * Not before (`nbf`)

    * Issued at (`iat`)

    * JWT ID (`jti`)


    Using a common data format like JWT allows for easy interoperability with established
    solutions and libraries so that you have tried and tested patterns for common,
    recurring problems.


    A typical JWT payload is as follows:


    ```

    {

    "sub": "1234567890",

    "name": "John Doe",

    "iat": 1516239022

    }

    ```


    Such a token provided by server will be sent along with the request by each client
    application, many times the browser or user agent being this client. This data
    then is vulnerable for man-in-the-middle kinds of attacks. To make it clear, someone
    intercepting this token can attempt to replay the request using the same token.
    There should be a way to prevent this.


    Let’s look into the three claims listed above.


    * **Expiration time (`exp`)**: UNIX timestamp of when the token will be considered
    expired, required if `iat` is not present

    * **Issued at (`iat`)**: UNIX timestamp of when the token was created, required
    if `exp` is not present

    * **JWT ID (`jti`)**: A unique token string, effectively a nonce, must be unique
    to each request, cannot be an empty string


    This timestamp information helps to limit the validity of tokens to prevent replay
    attacks. In one schema, the server can choose not to accept messages that have
    been sent more than x minutes before the current time. This raises the issue of
    clock skew between the client and server machines, so you will probably want to
    build some tolerance into the server to make up for this discrepancy by padding
    the time frame by n minutes on either side to make up for potential differences
    in clocks on different machines, assuming you have already taken care synchronizing
    the clocks of different servers.


    The above nonce (as a `jti` value) helps to prevent replay attacks. A nonce is
    just an arbitrary set of bytes that you create to help prevent replay attacks.
    Every request must have a unique payload. The `jti` value cannot be reused even
    if the request failed (400-599 HTTP status codes) or was incorrectly sent over
    HTTP instead of HTTPS. For each request, it is recommended to generate a Global
    Unique Identifier (GUID) or a sufficiently random string to ensure no two requests
    have the same `jti` value within the “x minute” span.


    Since JWT is sent along with the request by each client application, many times
    the browser or user agent being this client, this data then is vulnerable for
    malicious tampering too. It can be tampered with to add claims for privileges
    not intended to be available for a user. Hence the token itself should be tamper
    proof.


    When the API authentication scheme uses JWTs in the HTTP authorization header
    of requests made to it, every request will have the authorization header set with
    the bearer scheme. The following is an example:


    ```

    Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c

    ```


    Here, the header and claims are JSON that are base64 encoded for transport. The
    header, claims, and signature are appended together with a period character (`.`),
    thus providing JWT a structure like:


    ```

    [Base64Encoded(HEADER)] . [Base64Encoded (PAYLOAD)] . [encoded(SIGNATURE)]

    ```


    Assuming that all of the above has been taken care of, how do you verify that
    a valid token as complying with all of the above was originally sent from the
    right partner end point itself? JWT can’t be trusted if it’s not signed. JWTs
    allow for different signing and encryption algorithms using the JSON Web Signature
    (JWS) specs. They are specified in the JWT header. For the most part, JWTs are
    usually not encrypted, just signed. However, if your token contains data that
    is sensitive, then encrypting it using JSON Web Encryption (JWE) is a choice.
    A typical encryption scheme uses an already signed JWT as the payload for encryption.
    This is known as a nested JWT. It is acceptable to use the same key for encryption
    and validation also.


    Enough is enough; you have scratched the surface of JWT. There are more intricacies
    and loop holes, but this is enough for you to understand the following example.'
