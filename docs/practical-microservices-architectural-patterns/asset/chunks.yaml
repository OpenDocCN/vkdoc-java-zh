- fmt: '### Divide and Conquer


    Next, let’s address the problems associated with the monolith style. We want to
    abide by the principles of abstraction and build software in a modular way. The
    moment we break the monolith into multiple modules, there arises the requirement
    for these modules to depend on each other in terms of service invocations. So
    there has to be a trade-off between the collocated approach and the divided approach.
    When the modules are together and co-located, deployment can also happen to a
    single runtime process, which means intermodule communications are straightforward
    local invocations. When we divide, again there are two options of deployment:
    either all of these divided modules can still be deployed in a single process,
    or for greater operational optimization, they can be deployed into multiple processes.
    In the latter case, the modules can no longer communicate using local invocations
    and instead require suitable remoting mechanisms. However, the major advantage
    of a divided approach is that multiple repositories can be maintained for the
    development artifacts with indirect interdependency and also the development and
    release processes can happen in many parallel teams. Moreover, modules deployed
    across processes can be scaled independently, hence this kind of selective scaling
    will address optimize resources based on actual business needs, not based on constraints
    dictated due to not-so-well-thought-out architecture approaches.


    ## Summary


    This chapter concentrated on few major characteristics of distributed software
    architecture and its evolution from the early years of software to today. I offered
    a bird’s eye view of the topics discussed, but the idea was to set the context
    and look at the different options existing. Towards the end, I touched upon the
    options for setting the software structure and its impact when we keep the modules
    together vs. when we separate them out. There are advantages and disadvantages
    in both of these approaches, but if the benefits we reap when we keep them separated
    is considerable, we then need to find out ways to manage the not-so-straightforward
    concerns surrounding manageability and the intermodule communication. I will briefly
    discuss these aspects in the next chapter. In the following chapters, you will
    see how all these theories can be put to practice with concrete code examples
    that you can build and run on your own inexpensive desktops or laptops.


    Footnotes [1](#477630_1_En_1_Chapter.xhtml#Fn1_source) [2](#477630_1_En_1_Chapter.xhtml#Fn2_source)


    # 2. Introducing Microservices


    The complexity of enterprise software systems increases with increase in the functionalities
    and features supported. As you saw in Chapter [1](#477630_1_En_1_Chapter.xhtml),
    every enterprise system today needs to transfer information seamlessly with many
    other systems, both internal and external to the organization. Traditionally we
    have been building software systems as a “modular monolith.” By modular, we mean
    to say that they follow the principles of modules, layers, and tiers and hence
    there exists a logical modularity for elements within the software system. By
    monolith, we mean to say that the entire system is built with a specific scenario
    of deployment and operation in mind; most of the time, they are deployed as a
    single process or at the maximum they are distributed following the three-tier
    or n-tier architecture you saw in Chapter [1](#477630_1_En_1_Chapter.xhtml). But
    there ends the flexibility of deployment. Equally important is the process to
    be followed in getting such a system built in a multiteam or a distributed team
    organization.


    In this chapter, you will look at few selected concerns enterprises face in building
    today’s software applications. Once you understand these problems, you will then
    look at a new style of building software applications where you have increased
    flexibility in the build, deploy, or operations phases.


    ## The Modular Monolith


    I chose to call today’s typical enterprise systems as modular monoliths, because
    they are characterized by many patterns and also not-so-obvious anti-patterns
    we have been religiously following while defining software architectures. Towards
    the end of this section, you will appreciate the reason why I use this phrase.


    ### The Modular Organization


    Since the days of structured programming languages, we have mastered the style
    of breaking software programs into smaller elements in terms of multiple files,
    include libraries, backing beans, and such, so that it is easy for a software
    developer to manage multiple files from within an integrated development environment
    (IDE) and still develop big applications, complex algorithms, and logic.


    The next level of modularization is done at a module level or at a packaging level.
    A module is a collection of related functionalities organized together in the
    form of multiple program files, libraries, and so on, and which can be managed
    within the IDE with the help of a top-level build script. Thus one application
    can be composed of multiple such modules.


    When we look at the next stage of the software life cycle where we build and package
    application, the concept of packages will come to play. Here we address the concerns
    of building the modules and making it manageable to distribute them to other environments,
    whether it is for the testing, staging, or production environments. Sometimes
    we also want to distribute software to third-party consumers in the form of libraries.


    In the next stage of deployment, we may want to deploy the software packages into
    one or more computer process or computer runtimes. This is to address different
    runtime qualities of the system, usually defined in terms of non-functional requirements
    (NFR) and service level agreements (SLA).


    Chapter [1](#477630_1_En_1_Chapter.xhtml) briefly touched upon the different options
    by which we can build distributed systems, and deploy and operate them in a flexible
    manner. Now the question is, how flexible they are? To answer this question, look
    at the typical application architecture shown in Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3)
    in Chapter [1](#477630_1_En_1_Chapter.xhtml). It consists of the presentation
    tier, the business tier, and the database tier. The majority of today’s enterprise
    systems follow such an architecture, and systems with this kind of architectures
    will keep existing for few more years, at least till the end-of-life (EOL) for
    which they are built. What is wrong here? It is flexible to be deployed in a distributed
    fashion into its own tiers. But the flexibility ends there. So what additional
    flexibility would we require?'
