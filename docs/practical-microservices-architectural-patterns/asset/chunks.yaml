    ,\n\"templated\": true\n},\n\"profile\": {\n\"href\": \"http://localhost:8080/profile\"\
    \n}\n}\n}\nListing 7-7\nGET HTTP Request Using cURL\n```\n\nRefer to Appendix\
    \ D to view a more exhaustive set of cURL commands that\nwill be handy throughout\
    \ the rest of this book. Figure [7-3](#477630_1_En_7_Chapter.xhtml#Fig3) shows\
    \ how to use\ncURL in a Unix-based environment to invoke basic REST operations.\n\
    \n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\nGET HTTP request using\ncURL\n\nListing [7-7](#477630_1_En_7_Chapter.xhtml#PC14)\
    \ shows a products\nlink located at `http://localhost:8080/products`.\nIt has\
    \ a few options such as `?page`, `?size`, and `?sort`. There are\nother links,\
    \ which you may retrieve and understand.\n\nSpring Data REST uses the Hypertext\
    \ Application\nLanguage (HAL)  format for JSON\noutput. It is flexible and offers\
    \ an easy and convenient way to supply\nlinks adjacent to the data that is served.\
    \ HAL will make your API\nexplorable and its documentation easily discoverable\
    \ from within the\nREST API itself. The easiest way to test these links is to\
    \ use the\nPostman tool. You\nmay want to explore the following links using Postman:\n\
    \n```\nhttp://localhost:8080/profile\nhttp://localhost:8080/profile/products\n\
    http://localhost:8080/profile/categories\n```\n\nFigure [7-4](#477630_1_En_7_Chapter.xhtml#Fig4)\
    \ shows what it\nlooks like when you execute the GET on the link `http://localhost:8080/profile/products`\n\
    in Postman.\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig4_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\nGET HTTP request using\nPostman\n\nAlternatively, you can now execute\
    \ the Junit tests using Maven. The\ntests are provided in the folder named `ch07-01\\\
    src\\test\\java\\com\\acme\\ch07\\ex01\\product`.\nThe tests directly access the\
    \ Mongo repository and do data operations.\nSee Listing [7-8](#477630_1_En_7_Chapter.xhtml#PC16).\n\
    \n```\npublic class ProductRepositoryTest {\n@Autowired\nprivate ProductRepository\
    \ productRepository;\n@Before\npublic void setUp(){\nproductRepository.deleteAll();\n\
    }\n@Test\npublic void testAddProduct(){\nproductRepository.save(createProject());\n\
    assertTrue(\"successfully saved\",true);\n}\n@Test\npublic void testFindAllProducts(){\n\
    productRepository.save(createProject());\nList productList = productRepository.findAll();\n\
    assertTrue(productList.size()>0);\n}\n@Test\npublic void testProductByProductCategory(){\n\
    Product product = createProject();\nproductRepository.save(product);\nList productList\
    \ =\nproductRepository.findByProductCategoryName(\nproduct.getProductCategoryName());\n\
    assertTrue(productList.size()>0);\n}\n}\nListing 7-8\nJunit Testing the Mongo\
    \ Repository (ch07\\ch07-01\\src\\test\\java\\com\\acme\\ch07\\ex01\\product\\\
    ProductRepositoryTest.java)\n```\n\nTo execute the tests, assuming your Spring\
    \ Boot application is already\nup, execute the following command:\n\n```\ncd ch07-01\n\
    D:\\binil\\gold\\pack03\\ch07\\ch07-01>test\nD:\\binil\\gold\\pack03\\ch07\\ch07-01>mvn\
    \ test\n```\n\nDeveloping Using the Spring HAL Browser,\nHATEOAS\nA very convenient\
    \ aspect of the hypermedia-driven REST interface is\nhow you can discover all\
    \ the RESTful endpoints using cURL (or whatever\nREST client you are using). There\
    \ is no need to exchange a formal\ncontract or interface document with your customers\
    \ prior to the method\ninvocation (query), if each response also provides information\
    \ on what\noptions are available next for the user to act on. The HAL format\n\
    provides a consistent and easy way to hyperlink between resources in\nyour API.\
    \ HAL will make your REST API explorable, and its documentation\nis easily discoverable\
    \ from within the API itself. This will make your\nAPI easier to work with in\
    \ both manual and machine-readable mode and\ntherefore more attractive to client\
    \ developers. HATEOAS (Hypertext As The Engine Of\nApplication State)\n is a REST\
    \ pattern where the navigation links are provided as\npart of the response payload.\
    \ The client can then determine the state\nand follow the transition URLs provided\
    \ as part of that state.\nOpen source libraries available for most major programming\
    \ languages\nare available in HAL, so APIs that adopt HAL can be easily served\
    \ and\nconsumed in multiple platforms and programming languages. It’s so simple\n\
    that you can just deal with it as you would with any other JSON."
  trans: '

    虽然 `main()` 方法使用 Spring Boot 的 `SpringApplication.run()` 方法来启动应用程序，但 Spring Boot
    内部会启动 Spring Data JPA，为 `ProductRepository` 和 `ProductCategoryRepository` 创建具体的实现类，并配置其使用
    JPA 与后端数据库集成。


    ## 构建并打包 Spring Boot 应用程序


    Spring Boot 的风格是通过创建一个完全自包含的可执行 JAR 文件来构建和打包示例，该文件可以在生产环境中运行。正如第 3 章“微服务是自包含的”一节中所解释的，可执行
    JAR 也称为 fat JAR，是一种归档文件，其中包含你编译后的类以及代码运行所需的所有其他 JAR 依赖项，这些依赖项在你解析 POM 依赖时会被解析。`ch07-01\pom.xml`
    包含了构建和运行示例所需的 Maven 脚本。请确保 MongoDB 已启动并正在运行。你可能需要参考附录 A 来开始使用 MongoDB。


    你首先需要将可执行文件构建并打包成一个单独的 JAR 文件：


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>build

    D:\binil\gold\pack03\ch07\ch07-01>mvn clean package -Dmaven.test.skip=true

    ```


    这将在 `target` 文件夹中生成可执行 JAR。需要注意的是，当你执行上述 Maven 脚本时，默认情况下它也会执行测试用例，因此你通过跳过测试来禁用了它。


    你可能需要注意以下两个文件，你可以使用它们来自定义许多运行时参数，在你的示例中，这些文件在 `samples` 文件夹中保持空白：


    ```

    ch07-01\src\main\resources\application.properties

    ch07-01\src\test\resources\test.properties

    ```


    此外，为了加快你的开发周期，当你只想编译所有 Java 文件（包括测试类）时，你可以使用以下命令：


    ```

    cd ch07-01

    ch07-01>mvn clean test-compile

    ```


    如果你想打包你的可执行工件，但不想构建或执行测试类，你可以使用以下命令：


    ```

    cd ch07-01

    ch07-01>mvn clean package -Dmaven.test.skip=true

    ```


    ## 运行并测试 Spring Boot 应用程序


    在 mongo shell 已连接到正在运行的 mongod 实例的 Windows 命令提示符中，你可能需要先清理任何需要的集合：


    ```

    > show collections

    product

    productCategory

    > db.productCategory.drop()

    true

    > db.product.drop()

    true

    > show collections

    >

    ```


    现在，你可以通过多种方式运行 Spring Boot 应用程序。最直接的方式是通过以下命令执行 JAR 文件：


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>run

    D:\binil\gold\pack03\ch07\ch07-01>rem java -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    D:\binil\gold\pack03\ch07\ch07-01>mvn spring-boot:run

    ```


    一旦应用程序启动，它将在 mongodb 中创建所需的集合：


    ```

    > show collections

    product

    productCategory

    >

    ```


    现在你可以测试应用程序了。你可以使用任何你喜欢的 REST 客户端。你可以使用 cURL 工具快速对服务器执行命令。请参考附录 D 了解如何使用 cURL
    执行命令的概述。现在你可以查看服务器提供了什么；参见清单 7-7。


    ```

    $ curl http://localhost:8080

    {

    "_links": {

    "categories": {

    "href": "http://localhost:8080/categories{?page,size,sort}",

    "templated": true

    },

    "products": {

    "href": "http://localhost:8080/products{?page,size,sort}",

    "templated": true

    },

    "profile": {

    "href": "http://localhost:8080/profile"

    }

    }

    }

    清单 7-7

    使用 cURL 的 GET HTTP 请求

    ```


    请参考附录 D 查看更全面的 cURL 命令集，这些命令在本书的其余部分会非常有用。图 7-3 展示了如何在基于 Unix 的环境中使用 cURL 调用基本的
    REST 操作。


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg](img/477630_1_En_7_Fig3_HTML.jpg)


    图 7-3

    使用 cURL 的 GET HTTP 请求


    清单 7-7 显示了一个位于 `http://localhost:8080/products` 的 products 链接。它有几个选项，例如 `?page`、`?size`
    和 `?sort`。还有其他链接，你可以检索并理解它们。


    Spring Data REST 使用超文本应用程序语言 (HAL) 格式进行 JSON 输出。它很灵活，并提供了一种简单方便的方式来提供与所提供数据相邻的链接。HAL
    将使你的 API 可探索，并且其文档易于从 REST API 本身中发现。测试这些链接的最简单方法是使用 Postman 工具。你可能想使用 Postman
    探索以下链接：


    ```

    http://localhost:8080/profile

    http://localhost:8080/profile/products

    http://localhost:8080/profile/categories

    ```


    图 7-4 展示了在 Postman 中对链接 `http://localhost:8080/profile/products` 执行 GET 操作时的样子。


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig4_HTML.jpg](img/477630_1_En_7_Fig4_HTML.jpg)


    图 7-4

    使用 Postman 的 GET HTTP 请求


    或者，你现在可以使用 Maven 执行 Junit 测试。测试位于名为 `ch07-01\src\test\java\com\acme\ch07\ex01\product`
    的文件夹中。测试直接访问 Mongo 存储库并执行数据操作。参见清单 7-8。


    ```

    public class ProductRepositoryTest {

    @Autowired

    private ProductRepository productRepository;

    @Before

    public void setUp(){

    productRepository.deleteAll();

    }

    @Test

    public void testAddProduct(){

    productRepository.save(createProject());

    assertTrue("successfully saved",true);

    }

    @Test

    public void testFindAllProducts(){

    productRepository.save(createProject());

    List productList = productRepository.findAll();

    assertTrue(productList.size()>0);

    }

    @Test

    public void testProductByProductCategory(){

    Product product = createProject();

    productRepository.save(product);

    List productList =

    productRepository.findByProductCategoryName(

    product.getProductCategoryName());

    assertTrue(productList.size()>0);

    }

    }

    清单 7-8

    Junit 测试 Mongo 存储库 (ch07\ch07-01\src\test\java\com\acme\ch07\ex01\product\ProductRepositoryTest.java)

    ```


    要执行测试，假设你的 Spring Boot 应用程序已经启动，请执行以下命令：


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>test

    D:\binil\gold\pack03\ch07\ch07-01>mvn test

    ```


    ## 使用 Spring HAL 浏览器、HATEOAS 进行开发


    超媒体驱动的 REST 接口的一个非常方便的方面是，你可以使用 cURL（或你正在使用的任何 REST 客户端）发现所有 RESTful 端点。如果每个响应还提供了用户下一步可以操作的选项信息，则无需在方法调用（查询）之前与客户交换正式的合同或接口文档。HAL
    格式提供了一种一致且简单的方法来在你的 API 中的资源之间建立超链接。HAL 将使你的 REST API 可探索，并且其文档易于从 API 本身中发现。这将使你的
    API 在手动和机器可读模式下都更易于使用，因此对客户端开发人员更具吸引力。HATEOAS（将超文本作为应用程序状态的引擎）是一种 REST 模式，其中导航链接作为响应负载的一部分提供。然后，客户端可以确定状态并遵循作为该状态一部分提供的转换
    URL。


    大多数主流编程语言都有可用的开源库支持 HAL，因此采用 HAL 的 API 可以轻松地在多个平台和编程语言中提供和使用。它非常简单，你可以像处理任何其他
    JSON 一样处理它。

