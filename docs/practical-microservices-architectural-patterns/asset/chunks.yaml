    使用 Feign 客户端的代码


    由于 Feign 是一个声明式 HTTP 客户端，只需在 Maven POM 中引入 `spring-cloud-starter-feign` 依赖，并添加一个
    `@EnableFeignClients` 注解，即可获得一个功能完备、配置合理且开箱即用的 HTTP 客户端。请访问 `pom.xml` 查看 Feign
    客户端依赖的显式声明。参见清单 8-1。


