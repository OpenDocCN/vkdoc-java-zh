- fmt: 'You auto-configure the references to the auction service and the stock order
    service within the broker service. You have two references of each of these services;
    this is just a hack to arrange the fixtures for the various test scenarios you
    are going to validate. To make it clear, you have two references of auction service
    with the names `auctionServiceRequired_TX` and `auctionServiceRequiresNew_TX`.
    As the name implies, the write methods in `auctionServiceRequired_TX` get executed
    in a `PROPAGATION_REQUIRED` context whereas those in `auctionServiceRequiresNew_TX`
    get executed in a `PROPAGATION_REQUIRES_NEW` context. The rest of the code checks
    the incoming parameter where you have piggy-backed an indicator (an integer value)
    to identify which test scenario (test case) you are executing. The general strategy
    is to use `PROPAGATION_REQUIRED` if you want to propagate transactions between
    parent and child services and to use `PROPAGATION_REQUIRES_NEW` wherever you explicitly
    generate error conditions so that the error is confined to the context of that
    respective service method alone, that too in a controlled manner (by using `try-catch`)
    and the rest of the execution flow can happen; again, this is to facilitate the
    fixture for the demonstration purposes.


    You need to be aware that, in a real production scenario, you do not want the
    arrangement of the test scenarios; so if you want atomic operations across services,
    you just configure everything using `PROPAGATION_REQUIRED`, the (`testCase ==
    1`) scenario alone.


    There is another utility method called `flipFlop()` ^([^(32)](#fn32)) defined
    in the broker service. This method flip-flops the simulation of error creation
    during an operation between two consecutive executions, so if you have simulated
    an error in one execution of the method, the next execution of the same method
    will not simulate the error. In this way, if you have executed a test case to
    validate for an error scenario in one pass, you will also be able to see how the
    invariants will be if the same flow is executed without that error scenario. This
    is useful if you want to see if the message consumptions fails between the first
    pass so that when an attempt to reconsume happens, it will happen without failure
    in the next pass; in that manner, it is easy for you to test and visualize the
    results. Leave this here for the time being; it will be clearer when you execute
    the tests.


