- fmt: '# Zuul, the API Gateway


    Any service needs to be reached by using an address—more correctly, using a well-known
    address. Addresses like [`www.google.com`](http://www.google.com) or [`www.apple.com`](http://www.apple.com)
    are examples. Similarly, when you host an enterprise application, it will need
    to have an address, specifically a home page URL. Such an URL when typed in a
    browser will lead your request to the landing resource in your web site. Typically,
    these names or well-known URLs are DNS resolved and directed to a physical IP
    or a combination of physical IPs. When you deploy applications in a cluster or
    farm for scalability reasons, you also need a load balancer, which will act as
    a reverse proxy where the request will land first and then will be load balanced
    to any one instance in the farm. Apache HTTP server and F5 are similar devices.
    AWS ELB (Elastic Load Balancer) is a load balancing solution for web services
    exposed to end-user traffic in an AWS cloud scenario. In all these cases, once
    you advertise the publicly exposed IP, from there onwards the internal details
    of the enterprise application, including the network and deployment details, are
    hidden from the outside world. This is a recommended pattern and you will follow
    the same in your microservice applications.


    ## The Bootstrap URL


    In the previous section, you saw that every microservice can self-register to
    the Eureka registry as and when they come up so that consumers can be directed
    to those services by the registry. In order to discover where the registry is,
    you will use well-known and fixed addresses for the registries. These registries
    only contain route mappings to internal microservices. Externally accessible resources
    and addresses are typically not indexed in the registry; instead, you need to
    expose them using other ways. DNS is one such mechanism. But you also know that
    subsequent queries or requests arising from those publicly accessible resources
    (like many AJAX calls from the home page and other pages) need to access those
    microservices. You require a mechanism to do this. This is where the API gateway
    will come into play. A set of microservices can be exposed to the clients from
    outside the perimeter using an API gateway whereas the rest of the microservices,
    which you don’t want to expose, can still be kept unexposed. So your API gateway
    will become the bootstrap mechanism for those URLs by which the client accesses
    the publicly exposed microservices.


    Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13) depicts how to set up an API
    gateway in an on-premises deployment. The “Mesh App and Services Architecture”
    section in Chapter [4](#477630_1_En_8_Chapter.xhtml) talked about the Mesh App
    and Services Architecture and I will extend the notion of MASA to accommodate
    the API gateway. There are many concerns to be addressed at the point of the API
    gateway in every enterprise application, and security is one such concern. This
    can all be addressed at the API gateway since the gateway will act as the single
    front door to your enterprise application landscape.


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg)


    **Figure 8-13** Zuul, the API gateway on premises


    The following points are to be noted when you use an API gateway:


    - Public services alone are bound to an API gateway. This means all microservice
    APIs that are to be addressable from outside the enterprise DMZ will be bound
    to the API gateway.

    - For microservices that are not necessarily accessible from outside, there is
    no need to expose them at the API gateway.


    In Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13), you can see that all microservices
    are registered at Eureka. Then, all microservices that are to be accessible from
    outside are bound to the API gateway too. However, microservices that are not
    necessarily accessible from outside, like Microservice 2, are not bound to the
    API gateway. The next notable aspect is that the API gateway itself should be
    addressable from outside. So is the case with all apps, since apps are to be accessible
    directly by client devices. In Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13),
    you can see the apps domain where we typically place all components addressable
    and accessible from outside the DMZ. Typically this domain is composed of web
    apps, mobile apps, agents destined for IoT devices, etc. Registering the apps
    and the API gateway to a suitable external naming service makes this possible,
    and DNS is one way of doing this. Any such publically accessible resources will
    be registered in the public DNS and hence their addresses will be resolved through
    DNS lookup. A successful DNS lookup will provide the actual URL for the resource
    to the client device so that the client device can request the resource and get
    back the response, which will get rendered. This is shown in Figure [8-14](#477630_1_En_8_Chapter.xhtml#Fig14).


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg)


    **Figure 8-14** Bootstraping the URL to a microservice application


    Once you receive the app content (the home page in a traditional web app context)
    and the same is rendered in the device, from then onwards all the rest of the
    hits from the client device to the server can be routed to one or more context
    root URLs. This means all subsequent requests from the app in the client device
    will hit the API gateway, as shown in Figure [8-15](#477630_1_En_8_Chapter.xhtml#Fig15).
    This is marked with labels in the diagram. Since the API gateway is also publicly
    exposed, it makes sense to get its IP resolved through a naming service like DNS
    or alternatively the client app itself can remember the IP of the API gateway
    and hit (Label 7). The API gateway will first do a registry look up (Label 9)
    and subsequently route the request to the destination microservice (Label 10).
    Zuul by default uses Ribbon to locate an instance to forward the request to via
    discovery (e.g. Eureka in your case). So if your services are registered in Eureka,
    Zuul can also take care of instance lookup and carry the load balanced request
    forward.


    Let’s extend the scenario to one more level. Assume that Microservice 1 has to
    internally call Microservice 2 to access some functionality. Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13)
    shows that Microservice 2 is not bound to the API gateway since it is an always
    internally accessible microservice; however, it too is registered with a name
    in Eureka. Microservice 1 can then use Feign client or a similar mechanism to
    do a Eureka look up and also do a Ribbon-based load balance so that it can route
    the call to Microservice 2 (Label 12).


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg)


    **Figure 8-15** Request from the client app to microservices


    You need to appreciate that the deployment architectures explained here are typical
    ones, and there can be multiple variations based on your enterprise requirements.


    ## Design a Zuul-Enabled Scenario


    You will modify your design in Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13)
    by introducing the Zuul API gateway; the modified design is shown in Figure [8-16](#477630_1_En_8_Chapter.xhtml#Fig16).
    The flow is as explained in the previous section; however, I will not introduce
    all the complexities of DNS, etc. here. Let’s look at the flow.'
  raw: "Zuul, the API Gateway\nAny service needs to be reached by using an address—more\
    \ correctly,\nusing a well-known address. Addresses like [ `www.google.com`\n\
    ](http://www.google.com) or [ `www.apple.com`\n](http://www.apple.com) are examples.\
    \ Similarly, when you host an enterprise\napplication, it will need to have an\
    \ address, specifically a home page\nURL. Such an URL when typed in a browser\
    \ will lead your request to the\nlanding resource in your web site. Typically,\
    \ these names or well-known\nURLs are DNS resolved and directed to a physical\
    \ IP or a combination of\nphysical IPs. When you deploy applications in a cluster\
    \ or farm for\nscalability reasons, you also need a load balancer, which will\
    \ act as a\nreverse proxy where the request will land first and then will be load\n\
    balanced to any one instance in the farm. Apache HTTP server and F5 are\nsimilar\
    \ devices. AWS\nELB (Elastic Load Balancer) is a load\nbalancing solution for\
    \ web services exposed to end-user traffic in an\nAWS cloud scenario. In all these\
    \ cases, once you advertise the publicly\nexposed IP, from there onwards the internal\
    \ details of the enterprise\napplication, including the network and deployment\
    \ details, are hidden\nfrom the outside world. This is a recommended pattern and\
    \ you will\nfollow the same in your microservice applications.\n\nThe Bootstrap\
    \ URL\nIn the previous section, you saw that every microservice can\nself-register\
    \ to the Eureka registry as and when\nthey come up so that consumers can be directed\
    \ to those services by the\nregistry. In order to discover where the registry\
    \ is, you will use\nwell-known and fixed addresses for the registries. These registries\
    \ only\ncontain route mappings to internal microservices. Externally accessible\n\
    resources and addresses are typically not indexed in the registry;\ninstead, you\
    \ need to expose them using other ways. DNS is one such\nmechanism. But you also\
    \ know that subsequent queries or requests arising\nfrom those publicly accessible\
    \ resources (like many AJAX calls from the\nhome page and other pages) need to\
    \ access those microservices. You\nrequire a mechanism to do this. This is where\
    \ the API gateway will come\ninto play. A set of microservices can be exposed\
    \ to the clients from\noutside the perimeter using an API gateway whereas the\
    \ rest of the\nmicroservices, which you don’t want to expose, can still be kept\n\
    unexposed. So your API gateway will become the bootstrap mechanism for\nthose\
    \ URLs by\nwhich the client accesses the publicly exposed microservices.\n\nFigure\
    \ [8-13](#477630_1_En_8_Chapter.xhtml#Fig13) depicts how to\nset up an API gateway\
    \ in an on-premises deployment. The “Mesh App and\nServices Architecture” section\
    \ in Chapter [4](#477630_1_En_4_Chapter.xhtml) talked about the Mesh App and\n\
    Services Architecture and I will extend the notion of MASA to\naccommodate the\
    \ API gateway. There are many concerns to be addressed at\nthe point of the API\
    \ gateway in every enterprise application, and\nsecurity is one such concern.\
    \ This can all be addressed at the API\ngateway since the gateway will act as\
    \ the single front door to your\nenterprise application landscape.\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg)\n\
    \nFigure 8-13\nZuul, the API gateway on premises\n\nThe following points are to\
    \ be noted when you use an API gateway:\n\n*   Public services alone are bound\
    \ to an API gateway. This means all\n    microservice APIs that are to be addressable\
    \ from outside the enterprise DMZ will be\n    bound to the API gateway.\n\n*\
    \   For microservices that are not necessarily accessible from\n    outside, there\
    \ is no need to expose them at the API gateway.\n\nIn Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13),\
    \ you can see\nthat all microservices are registered at Eureka. Then, all microservices\n\
    that are to be accessible from outside are bound to the API gateway too.\nHowever,\
    \ microservices that are not necessarily accessible from outside,\nlike Microservice\
    \ 2, are not bound to the API gateway. The next notable\naspect is that the API\
    \ gateway itself should be addressable from\noutside. So is the case with all\
    \ apps, since apps are to be accessible\ndirectly by client devices. In Figure\
    \ [8-13](#477630_1_En_8_Chapter.xhtml#Fig13), you can see\nthe apps domain where\
    \ we typically place all components addressable and\naccessible from outside the\
    \ DMZ. Typically this\ndomain is composed of web apps, mobile apps, agents destined\
    \ for IoT\ndevices, etc. Registering the apps and the API gateway to a suitable\n\
    external naming service makes this possible, and DNS is one way of doing\nthis.\
    \ Any such publically accessible resources will be registered in the\npublic DNS\
    \ and hence their addresses will be resolved through DNS\nlookup. A successful\
    \ DNS lookup  will provide the\nactual URL for the resource to the client device\
    \ so that the client\ndevice can request the resource and get back the response,\
    \ which will\nget rendered. This is shown in Figure [8-14](#477630_1_En_8_Chapter.xhtml#Fig14).\n\
    \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14\nBootstraping the URL to a microservice application\n\nOnce you\
    \ receive the app content (the home page in a traditional web\napp context) and\
    \ the same is rendered in the device, from then onwards\nall the rest of the hits\
    \ from the client device to the server can be\nrouted to one or more context root\
    \ URLs. This means all subsequent\nrequests from the app in the client device\
    \ will hit the API gateway, as\nshown in Figure [8-15](#477630_1_En_8_Chapter.xhtml#Fig15).\
    \ This is\nmarked with labels in the diagram. Since the API gateway is also\n\
    publicly exposed, it makes sense to get its IP resolved through a naming\nservice\
    \ like DNS\nor alternatively the client app itself can remember the IP of the\
    \ API\ngateway and hit (Label 7). The API gateway will first do a registry look\
    \ up (Label\n9) and subsequently route the request to the destination microservice\n\
    (Label 10). Zuul by default uses Ribbon to locate an\ninstance to forward the\
    \ request to via discovery (e.g. Eureka in your\ncase). So if your services are\
    \ registered in Eureka, Zuul can also take\ncare of instance lookup and carry\
    \ the load balanced request forward.\n\nLet’s extend the scenario to one more\
    \ level. Assume that Microservice 1 has to\ninternally call Microservice 2 to\
    \ access some functionality. Figure\n[8-13](#477630_1_En_8_Chapter.xhtml#Fig13)\
    \ shows that\nMicroservice 2 is not bound to the API gateway since it is an always\n\
    internally accessible microservice; however, it too is registered with a\nname\
    \ in Eureka. Microservice 1 can then use Feign client or a similar\nmechanism\
    \ to do a Eureka look up and also do a Ribbon-based load\nbalance \nso that it\
    \ can route the call to Microservice 2 (Label 12).\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg)\n\
    \nFigure 8-15\nRequest from the client app to microservices\n\nYou need to appreciate\
    \ that the deployment architectures explained\nhere are typical ones, and there\
    \ can be multiple variations based on\nyour enterprise requirements.\n\nDesign\
    \ a Zuul-Enabled Scenario\nYou will modify your design in Figure [8-13](#477630_1_En_8_Chapter.xhtml#Fig13)\
    \ by introducing\nthe Zuul API gateway; the modified design is shown in\nFigure\
    \ [8-16](#477630_1_En_8_Chapter.xhtml#Fig16). The flow is\nas explained in the\
    \ previous section; however, I will not introduce all\nthe complexities of DNS,\
    \ etc. here. Let’s look at the flow."
  trans: '

    Zuul，API 网关

    任何服务都需要通过地址来访问——更准确地说，是通过一个众所周知的地址。像 [`www.google.com`](http://www.google.com)
    或 [`www.apple.com`](http://www.apple.com) 这样的地址就是例子。同样，当你托管一个企业应用时，它也需要有一个地址，具体来说就是一个主页
    URL。在浏览器中输入这样的 URL，会将你的请求引导至网站中的着陆资源。通常，这些名称或众所周知的 URL 会通过 DNS 解析，并指向一个物理 IP 或一组物理
    IP 的组合。当出于可扩展性原因在集群或服务器场中部署应用时，你还需要一个负载均衡器，它将充当反向代理，请求首先到达这里，然后被负载均衡到服务器场中的任何一个实例。Apache
    HTTP 服务器和 F5 就是类似的设备。AWS ELB（弹性负载均衡器）是一种针对在 AWS 云场景中暴露给最终用户流量的 Web 服务的负载均衡解决方案。在所有这些情况下，一旦你公布了公开暴露的
    IP，从那时起，企业应用的内部细节（包括网络和部署细节）就对外界隐藏了。这是一种推荐模式，在你的微服务应用中也会遵循同样的做法。


    引导 URL

    在上一节中，你看到每个微服务在启动时都可以向 Eureka 注册中心进行自我注册，这样消费者就可以通过注册中心被引导到这些服务。为了发现注册中心的位置，你将使用众所周知且固定的地址来访问注册中心。这些注册中心只包含指向内部微服务的路由映射。外部可访问的资源和地址通常不会在注册中心中建立索引；相反，你需要通过其他方式暴露它们。DNS
    就是其中一种机制。但你也知道，来自这些可公开访问资源的后续查询或请求（例如来自主页和其他页面的许多 AJAX 调用）需要访问这些微服务。你需要一种机制来实现这一点。这就是
    API 网关发挥作用的地方。一组微服务可以通过 API 网关从外围暴露给客户端，而其余你不想暴露的微服务则可以继续保持不暴露状态。因此，你的 API 网关将成为那些客户端用来访问公开暴露的微服务的
    URL 的引导机制。


    图 8-13 描述了如何在本地部署中设置 API 网关。第 4 章的“网格应用和服务架构”部分讨论了网格应用和服务架构，我将扩展 MASA 的概念以容纳 API
    网关。在每个企业应用中，API 网关处需要处理许多问题，安全性就是其中之一。所有这些问题都可以在 API 网关处解决，因为网关将充当企业应用架构的单一前门。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg](img/477630_1_En_8_Fig13_HTML.jpg)


    图 8-13

    Zuul，本地部署的 API 网关


    使用 API 网关时，需要注意以下几点：


    *   只有公共服务才绑定到 API 网关。这意味着所有需要从企业 DMZ 外部寻址的微服务 API 都将绑定到 API 网关。

    *   对于不一定需要从外部访问的微服务，则无需在 API 网关处暴露它们。


    在图 8-13 中，你可以看到所有微服务都在 Eureka 中注册。然后，所有需要从外部访问的微服务也都绑定到了 API 网关。然而，不一定需要从外部访问的微服务（例如微服务
    2）则没有绑定到 API 网关。下一个值得注意的方面是，API 网关本身应该可以从外部寻址。所有应用也是如此，因为应用需要能够被客户端设备直接访问。在图 8-13
    中，你可以看到应用域，我们通常将 DMZ 外部可寻址和可访问的所有组件放置在此域中。通常，此域由 Web 应用、移动应用、面向物联网设备的代理等组成。将应用和
    API 网关注册到合适的外部命名服务使这成为可能，而 DNS 是实现此目的的一种方式。任何此类可公开访问的资源都将在公共 DNS 中注册，因此它们的地址将通过
    DNS 查找来解析。成功的 DNS 查找将为客户端设备提供资源的实际 URL，以便客户端设备可以请求该资源并获取响应，然后进行渲染。如图 8-14 所示。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg](img/477630_1_En_8_Fig14_HTML.jpg)


    图 8-14

    引导微服务应用的 URL


    一旦你收到应用内容（在传统 Web 应用上下文中是主页）并在设备上渲染后，从那时起，客户端设备到服务器的所有其余请求都可以路由到一个或多个上下文根 URL。这意味着来自客户端设备应用的所有后续请求都将命中
    API 网关，如图 8-15 所示。这在图中用标签进行了标记。由于 API 网关也是公开暴露的，因此通过像 DNS 这样的命名服务来解析其 IP 是合理的，或者客户端应用本身也可以记住
    API 网关的 IP 并直接访问（标签 7）。API 网关将首先执行注册中心查找（标签 9），然后将请求路由到目标微服务（标签 10）。Zuul 默认使用
    Ribbon 通过服务发现（例如在你的场景中是 Eureka）来定位要转发请求的实例。因此，如果你的服务在 Eureka 中注册，Zuul 也可以处理实例查找并继续转发负载均衡的请求。


    让我们将场景再扩展一层。假设微服务 1 必须内部调用微服务 2 以访问某些功能。图 8-13 显示微服务 2 没有绑定到 API 网关，因为它是一个始终内部可访问的微服务；然而，它也在
    Eureka 中注册了一个名称。然后，微服务 1 可以使用 Feign 客户端或类似机制执行 Eureka 查找，并执行基于 Ribbon 的负载均衡，以便将调用路由到微服务
    2（标签 12）。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg](img/477630_1_En_8_Fig15_HTML.jpg)


    图 8-15

    从客户端应用到微服务的请求


    你需要认识到，这里解释的部署架构是典型的架构，并且可以根据你的企业需求有多种变体。


    设计一个启用 Zuul 的场景

    你将通过引入 Zuul API 网关来修改图 8-13 中的设计；修改后的设计如图 8-16 所示。流程如上一节所述；但是，这里我不会介绍 DNS 等的所有复杂性。让我们来看看这个流程。

    '
- fmt: 'The client device, which is the browser in your case, will be used to render
    the `product.html` (Label 1). Once the `product.html` is loaded into the browser,
    it will fire a request to the Product Web microservice. You will not bind the
    Product Web microservice into the API gateway in this sample to keep it simple,
    so you will only bind the Product Server microservice to the API gateway. Hence
    the request from the client device to the Product Web microservice is a direct
    hit not through the API gateway (Label 3). The Product Web microservice now has
    to delegate the request to the Product Server microservice and in order to do
    so, it will route the request through the API gateway (Label 4). The API gateway
    will do a registry look up (Label 5) and return the server details where the Product
    Server microservices are hosted back to the Ribbon client in the Product Web microservice.
    The Product Web microservice takes this info and load balances the request to
    any one of the instances of the Product Server microservice (Label 6), since you
    will have two instances of Product Server microservices hosted.


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg)


    **Figure 8-16** Design with Zuul


    ## Code to Use Zuul


    All the code samples for this section are in folder `ch08\ch08-06`. Visit `pom.xml`
    to see the explicit mention of the Zuul dependency. See Listing [8-24](#477630_1_En_8_Chapter.xhtml#PC49).


    ```

    org.springframework.cloud

    spring-cloud-starter-zuul


    org.springframework.cloud

    spring-cloud-starter-eureka


    Listing 8-24

    Zuul dependency (ch08\ch08-06\ProductApiZuul\pom.xml)

    ```


    Note that Zuul by itself is a microservice, so it has to register itself to the
    registry just like any other normal microservice. Hence Zuul also needs a Eureka
    dependency, as shown in Listing [8-25](#477630_1_En_8_Chapter.xhtml#PC50).


    Next, you need Spring Cloud’s `@EnableZuulProxy` to stand up an API gateway that
    other microservices can bind to. This is done in your regular Spring Boot application
    main class with one annotation added to enable the Zuul gateway.


    ```

    @EnableZuulProxy

    @EnableDiscoveryClient

    @SpringBootApplication

    public class ProductServerApiApplication {

    public static void main(String[] args) {

    SpringApplication.run(ProductServerApiApplication.class, args);

    }

    }

    Listing 8-25

    Enable Zuul (ch08\ch08-06\ProductApiZuul\src\main\java\com\acme\ecom\infra\ProductServerApiApplication.java)

    ```


    You now need to define the routes at the API gateway, which you will do in `application.yml`.
    See Listing [8-26](#477630_1_En_8_Chapter.xhtml#PC51).


    ```

    spring:

    application:

    name: product-service-api

    server:

    port: 8082

    zuul:

    routes:

    product-api:

    path: /api/**

    service-id: product-service

    eureka:

    client:

    serviceUrl:

    defaultZone: http://localhost:8761/eureka/

    hystrix:

    command:

    default:

    execution:

    isolation:

    thread:

    timeoutInMilliseconds: 2000

    Listing 8-26

    Define Routes in Zuul Gateway (ch08\ch08-06\ProductApiZuul\src\main\resources\application.yml)

    ```


    Zuul will now get registered in Eureka in the name `product-service-api`. Further,
    any URLs of the pattern `/api/**` coming to Zuul will get routed to `product-service`.


    The Product Server microservice code is similar to the code you saw in the “Code
    to Use Eureka” section except that you have removed the MongoDB dependency and
    instead use a simple in-memory representation of product data to make the sample
    simpler. However, the Product Web microservice code needs explanation since it
    is in this place where you look up the Zuul API gateway to delegate requests to
    the Product Server microservice. See Listing [8-27](#477630_1_En_8_Chapter.xhtml#PC52).


    ```

    @RestController

    public class ProductRestController implements ProductService{

    @Autowired

    RestTemplate restTemplate;

    private static String PRODUCT_SERVICE_URL =

    "http://product-service-api/api/products";

    @Autowired

    public ProductRestController(RestTemplate restTemplate){

    this.restTemplate = restTemplate;

    }

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    ResponseEntity> responseEntity =

    restTemplate.exchange(PRODUCT_SERVICE_URL, HttpMethod.GET,

    (HttpEntity) null, responseTypeRef);

    // other code goes here…

    }

    }

    Listing 8-27

    Use API Gateway to Call Other Microservices (ch08\ch08-06\ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    All of the other code remains similar to what you saw in the “Code to Use Eureka”
    section; however, the change is in the URL. The `product-service-api` portion
    of the URL `http://product-service-api/api/products` refers to the Zuul API gateway’s
    address, so the call will first hit the gateway. In the API gateway you have configured
    that any URLs of the pattern `/api/**` coming to Zuul will get routed to `product-service`,
    hence the above full URL will get translated to the products end point in the
    Product Server microservice.


    ## Build and Test the Zuul Sample


    The complete code required to demonstrate the Eureka registry is in folder `ch08-06`.
    You don’t require MongoDB for this sample. You can build, pack, and run the different
    microservices in the following order. You first bring up the Eureka registry microservices:


    ```

    cd ch08\ch08-06\Eureka

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>make

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>mvn -Dmaven.test.skip=true clean package

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>run

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>java -jar -Dserver.port=8761 -Dspring.application.name=eureka-registry
    -Deureka.client.registerWithEureka=false -Deureka.client.fetchRegistry=true -Deureka.client.server.waitTimeInMsWhenSyncEmpty=0
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -Deureka.server.enableSelfPreservation=false
    .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    You next bring up the Zuul API gateway:


    ```

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>make

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>run

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>java -Dserver.port=8082 -Dspring.application.name=product-service-api
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar ./target/Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    Since the registry and API gateway are all set up now, you can bring up the application
    microservices next:


    ```

    cd ch08\ch08-06\ProductServer

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>make

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>run1

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>java -Dserver.port=8080 -Dspring.application.name=product-service
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch08\ch08-06\ProductServer

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>run2

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>java -Dserver.port=8081 -Dspring.application.name=product-service
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    Next, bring up the Product Web microservice:'
  raw: "The client device, which is the browser in your case, will be used to\nrender\
    \ the `product.html` (Label\n1). Once the `product.html` is\nloaded into the browser,\
    \ it will fire a request to the Product Web\nmicroservice. You will not bind the\
    \ Product Web microservice into the\nAPI gateway in this sample to keep it simple,\
    \ so you will only bind the\nProduct Server microservice to the API gateway. Hence\
    \ the request from\nthe client device to the Product Web microservice is a direct\
    \ hit not\nthrough the API gateway (Label 3). The Product Web microservice now\
    \ has\nto delegate the request to the Product Server microservice and in order\n\
    to do so, it will route the request through the API gateway (Label 4).\nThe API\
    \ gateway will do a registry look up (Label 5) and return the\nserver details\
    \ where the Product Server microservices are hosted back to\nthe Ribbon client\
    \ in the Product Web microservice. The Product Web microservice takes this\ninfo\
    \ and load balances the request to any one of the instances of the\nProduct Server\
    \ microservice (Label 6), since you will have two instances\nof Product Server\
    \ microservices hosted.\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg)\n\
    \nFigure 8-16\nDesign with Zuul\n\nCode to Use Zuul\n\nAll the code samples for\
    \ this section are in folder `ch08\\ch08-06`.Visit\n`pom.xml` to see\nthe explicit\
    \ mention of the Zuul dependency. See Listing\n[8-24](#477630_1_En_8_Chapter.xhtml#PC49).\n\
    \n```\norg.springframework.cloud\nspring-cloud-starter-zuul\n\norg.springframework.cloud\n\
    spring-cloud-starter-eureka\n\nListing 8-24\nZuul dependency (ch08\\ch08-06\\\
    ProductApiZuul\\pom.xml)\n```\n\nNote that Zuul by itself is a microservice, so\
    \ it has to register\nitself to the registry just like any other normal microservice.\
    \ Hence\nZuul also needs a Eureka dependency, as shown in Listing [8-25](#477630_1_En_8_Chapter.xhtml#PC50).\n\
    \nNext, you need Spring Cloud’s  `@EnableZuulProxy`\n  to stand\nup an API gateway\
    \ that other microservices can bind to. This is done in\nyour regular Spring Boot\
    \ application main class with one annotation\nadded to enable the Zuul gateway.\n\
    \n```\n@EnableZuulProxy\n@EnableDiscoveryClient\n@SpringBootApplication\npublic\
    \ class ProductServerApiApplication {\npublic static void main(String[] args)\
    \ {\nSpringApplication.run(ProductServerApiApplication.class, args);\n}\n}\nListing\
    \ 8-25\nEnable Zuul (ch08\\ch08-06\\ProductApiZuul\\src\\main\\java\\com\\acme\\\
    ecom\\infra\\ProductServerApiApplication.java)\n```\n\nYou now need to define\
    \ the routes at the API gateway, which you will\ndo in `application.yml`. See\n\
    Listing [8-26](#477630_1_En_8_Chapter.xhtml#PC51).\n\n```\nspring:\napplication:\n\
    name: product-service-api\nserver:\nport: 8082\nzuul:\nroutes:\nproduct-api:\n\
    path: /api/**\nservice-id: product-service\neureka:\nclient:\nserviceUrl:\ndefaultZone:\
    \ http://localhost:8761/eureka/\nhystrix:\ncommand:\ndefault:\nexecution:\nisolation:\n\
    thread:\ntimeoutInMilliseconds: 2000\nListing 8-26\nDefine Routes in Zuul Gateway\
    \ (ch08\\ch08-06\\ProductApiZuul\\src\\main\\resources\\application.yml)\n```\n\
    \nZuul will now get registered in Eureka in the name\nproduct-service-api. Further,\
    \ any URLs of the pattern `/api/**` coming to\nZuul will get routed to product-service.\n\
    \nThe Product Server microservice code is similar to the code you saw in\nthe\
    \ “Code to Use Eureka” section except that you have removed the\nMongoDB dependency\
    \ and instead use a simple in-memory representation of\nproduct data to make the\
    \ sample simpler. However, the Product Web\nmicroservice code needs explanation\
    \ since it is in this place where you\nlook up the Zuul API gateway to delegate\
    \ requests to the Product Server\nmicroservice. See Listing [8-27](#477630_1_En_8_Chapter.xhtml#PC52).\n\
    \n```\n@RestController\npublic class ProductRestController implements ProductService{\n\
    @Autowired\nRestTemplate restTemplate;\nprivate static String PRODUCT_SERVICE_URL\
    \ =\n\"http://product-service-api/api/products\";\n@Autowired\npublic ProductRestController(RestTemplate\
    \ restTemplate){\nthis.restTemplate = restTemplate;\n}\n@RequestMapping(value\
    \ = \"/productsweb\",\nmethod = RequestMethod.GET ,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
    public ResponseEntity>> getAllProducts() {\nResponseEntity> responseEntity =\n\
    restTemplate.exchange(PRODUCT_SERVICE_URL, HttpMethod.GET,\n(HttpEntity) null,\
    \ responseTypeRef);\n// other code goes here…\n}\n}\nListing 8-27\nUse API Gateway\
    \ to Call Other Microservices (ch08\\ch08-06\\ProductWeb\\src\\main\\java\\com\\\
    acme\\ecom\\product\\controller\\ProductRestController.java)\n```\n\nAll of the\
    \ other code remains similar to what you saw in the “Code to\nUse Eureka” section;\
    \ however, the change is in the URL. The `product-service-api`\nportion of the\
    \ URL [ `http://product-service-api/api/products`\n](https://www.product-service-api/api/products)\
    \ refers to the Zuul API gateway’s address, so the call\nwill first hit the gateway.\
    \ In the API gateway you have configured that\nany URLs of the pattern /`api/**`\
    \ coming to Zuul\nwill get routed to `product-service`,\nhence the above full\
    \ URL will get translated to the products end point\nin the Product Server microservice.\n\
    \nBuild and Test the Zuul Sample\n\nThe complete code required to demonstrate\
    \ the Eureka registry is in\nfolder `ch08-06`.\nYou don’t require MongoDB for\
    \ this\nsample. You can build, pack, and run the different microservices in the\n\
    following order. You first bring up the Eureka registry microservices:\n\n```\n\
    cd ch08\\ch08-06\\Eureka\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\Eureka>make\n\
    D:\\binil\\gold\\pack03\\ch08\\ch08-06\\Eureka>mvn -Dmaven.test.skip=true clean\
    \ package\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\Eureka>run\nD:\\binil\\gold\\\
    pack03\\ch08\\ch08-06\\Eureka>java -jar -Dserver.port=8761 -Dspring.application.name=eureka-registry\
    \ -Deureka.client.registerWithEureka=false -Deureka.client.fetchRegistry=true\
