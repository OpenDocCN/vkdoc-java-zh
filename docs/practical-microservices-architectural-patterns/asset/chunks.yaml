    \ Chapter [18](#477630_1_En_18_Chapter.xhtml).\n\n## Test the E-Commerce Microservice\
    \ Use Cases\n\nYou can test the application using your preferred browser. You\
    \ can take two browser windows, one for the normal customer or end user and another\
    \ for the back office admin.\n\nTyping this URL will bring up the end user screen\
    \ shown in Figure [17-17](#477630_1_En_17_Chapter.xhtml#Fig17): `http://localhost:8080/`.\
    \ (Refresh your browser if the full content is not loaded as shown in Figure [17-17](#477630_1_En_17_Chapter.xhtml#Fig17)).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig17_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig17_HTML.jpg)\n\
    \n**Figure 17-17** End user home page\n\nTo bring up the back office admin screen,\
    \ type this URL: `http://localhost:8080/admin.html`. See Figure [17-18](#477630_1_En_17_Chapter.xhtml#Fig18).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig18_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig18_HTML.jpg)\n\
    \n**Figure 17-18** Back-office admin login page\n\nThe admin screen will ask for\
    \ credentials to log in. You can use the following credentials:\n\n```\nUser name:\
    \ admin\nPassword: admin\n```\n\nThey will open the admin window shown in Figure\
    \ [17-19](#477630_1_En_17_Chapter.xhtml#Fig19).\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig19_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig19_HTML.jpg)\n\
    \n**Figure 17-19** Back-office admin home page\n\nYou can now test the application\
    \ by executing few use cases. You may want to explicitly refresh your screens\
    \ to see the effect of your actions using the browser’s Refresh button.\n\n###\
    \ View Product Category and Product Details\n\nFrom the product listing shown\
    \ in Figure [17-17](#477630_1_En_17_Chapter.xhtml#Fig17), select a product to\
    \ see the product details and available inventory. You can select the required\
    \ numbers to buy, as shown in Figure [17-20](#477630_1_En_17_Chapter.xhtml#Fig20).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig20_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig20_HTML.jpg)\n\
    \n**Figure 17-20** Select the number of items to order\n\n### Add to Cart\n\n\
    In the next step, you can add the selected product and the selected numbers of\
    \ the product to the cart, as shown in Figure [17-21](#477630_1_En_17_Chapter.xhtml#Fig21).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig21_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig21_HTML.jpg)\n\
    \n**Figure 17-21** Add the item to the shopping cart\n\nYou will be able to see\
    \ the newly added item in the shopping cart icon at the top of the page. You can\
    \ click the shopping cart icon to display the cart, as shown in Figure [17-22](#477630_1_En_17_Chapter.xhtml#Fig22).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig22_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig22_HTML.jpg)\n\
    \n**Figure 17-22** Shopping cart with items ready to check out\n\n### User Profile\
    \ Creation\n\nProceed to order by clicking the “Order now” button in Figure [17-22](#477630_1_En_17_Chapter.xhtml#Fig22).\
    \ It will ask the user to log in, as shown in Figure [17-23](#477630_1_En_17_Chapter.xhtml#Fig23).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig23_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig23_HTML.jpg)\n\
    \n**Figure 17-23** User login prompt\n\nSince this is the first time you are logging\
    \ in, you need to create a login profile first and only then will you be able\
    \ to log in. So, click the “New user?” link, which will take you to the user profile\
    \ creation page shown in Figure [17-24](#477630_1_En_17_Chapter.xhtml#Fig24).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig24_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig24_HTML.jpg)\n\
    \n**Figure 17-24** Create a user profile\n\nFill in the form to create a user\
    \ profile, as shown in Figure [17-24](#477630_1_En_17_Chapter.xhtml#Fig24), and\
    \ click “Submit.” You can now log into the application (by clicking the shopping\
    \ cart icon to display the cart, if required), as shown in Figure [17-25](#477630_1_En_17_Chapter.xhtml#Fig25).\n\
