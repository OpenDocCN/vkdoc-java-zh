- fmt: '# Highly Transactional Systems and Scaling


    Highly transactional systems have to serve millions of requests per unit of time
    and the transactions per second (`TPS`) in such systems is high. This is particularly
    true when we talk about web scale architectures. By increasing the compute power
    of nodes serving the requests, we can increase throughput; this is called vertical
    scaling. However, there is a limit beyond which an increase in compute will not
    yield proportionately in the same node, and this is shown in Figure [11-9](#477630_1_En_11_Chapter.xhtml#Fig9).


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig9_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig9_HTML.jpg)


    **Figure 11-9.** Vertical scaling


    Further increase in throughput can be attained by horizontal scaling techniques.
    Here, operating software at web scale requires distributing many copies of the
    software runtime. This also means there are many copies of the data sets distributed
    across many nodes.


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig10_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig10_HTML.jpg)


    **Figure 11-10.** The scale cube


    ## The Scale Cube


    Let’s talk about the Scale Cube, which concerns three-axis scaling. Figure [11-10](#477630_1_En_11_Chapter.xhtml#Fig10)
    depicts the three-axis scaling where each axis represents scaling your application
    at different levels:


    * **X axis (horizontal scaling)**: Here you replicate many instances of the same
    microservice and use load balancers to distribute traffic.

    * **Y axis (functional decomposition)**: Microservices are one approach of Y axis
    scaling where you split the application components based on functionality.

    * **Z axis (data partitioning)**: Here, each microservice or functionality can
    be further split based on some criterion. A web scale application can distribute
    traffic and so all first names starting from A to G go to server farm X, H to
    O go to server farm Y, and P to Z go to server farm Z. This technique is called
    name sharding.


    Each of these scaling methods must address data consistency issues. You have master
    data, or look-up data, and transactional data in enterprise applications. While
    master data is more or less static, transactional data keeps changing state with
    transactions. X-, Y-, and Z-axis scaling depends on the network for distributed
    services to share data. So, you can distribute data and services on each axis
    to increase scalability, or have more than one node hosting services to increase
    availability. The moment you have more than one node, you require a network for
    interconnectivity, so the network provides partition tolerance. Also, if you have
    more than one copy of either data or code (service runtime), you need to address
    data consistency. I will describe this more in the next section.


    ## The CAP Theorem


    The CAP Theorem describes the three architectural properties that are linked together
    with mutual dependencies as:


    * Consistency

    * Availability

    * Partition tolerance


    The theorem states that you can guarantee any two of the three properties. If
    you add or increase one of these properties, you do it by taking away from one
    (or both) of the others. In other words, you can have a highly available, consistent
    system but its partitionability will be low, or you can have a highly available
    and partitionable system but you would likely need to give up on consistency.


    Figure [11-11](#477630_1_En_11_Chapter.xhtml#Fig11) depicts the CAP Theorem pictorially.
    It says, you can pick any two from the list of C, A, and P, but you can’t achieve
    all three at the same time. Let’s understand better what that means. First, let’s
    look at the definition of C, A, and P in the CAP Theorem.


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg)


    **Figure 11-11.** The CAP Theorem


    * **Consistency**: All microservice nodes have the same view of the data.

    * **Availability**: Every microservice can read or write to any other microservice,
    all the time.

    * **Partition tolerance**: The microservices application as a whole works well
    despite physical network partitions between the microservices.


    Relational databases like Oracle are great at providing consistency because they
    focus on ACID properties and provide consistency by also providing fine control
    over transaction isolation so that in the earlier e-commerce example when Customer
    Joe confirms the purchase of the last item of a particular product in stock and
    simultaneously decreases the inventory in stock by one, any intermediate states
    are isolated from Customer Ann, who must wait a few milli- or microseconds for
    the RDBMS table or row locks to be released while the data store is made consistent.


    Availability means the service is available to operate fully as far as the transaction
    is concerned. Cluster-aware proxies or client stubs are used in enterprise applications
    to fall back to redundant instances, if a particular instance of a service is
    down. The Oracle Real Application Cluster (`RAC`) is noteworthy here due to its
    firm promise to provide consistency of data on disk and availability of the DBMS
    service in runtime process at the same time. Once you are able to transport your
    data bits up to the disk level by using the techniques mentioned in the “Data
    or Storage Redundancy” section in Chapter [9](#477630_1_En_9_Chapter.xhtml), you
    can be sure that your bits are made durable enough. However, the techniques mentioned
    in that section will increase the probability of partitions forming!


    When you use a SQL client and issue `Select for Update`^([^(21)](#fn21)) or similar
    commands from the same node where you run your Oracle database, your node acts
    as a kind of atomic processor in that it either works or it doesn’t (i.e. if it
    has crashed, it’s not available, but it won’t cause data inconsistency either).
    When you start to separate and spread processing logic from data around different
    nodes either for scalability or availability, there’s a risk of partitions forming.
    A partition happens when, for example, a network switch malfunctions, a network
    cable gets unplugged, or a power failure makes your other node unavailable.


    Architecture trade-offs must be made when designing microservices to address the
    limitations imposed by the CAP Theorem. You may design systems without partitions
    if you have to stop them from network failures. In order to do this, you need
    to put everything related to that transaction on one machine, or in one atomically-failing
    unit like a single rack. Ah, does it sound familiar? Are we talking about “a microservice
    here?” You have seen that a microservice by definition is an independently deployable,
    self-contained unit that owns and governs its own data! Here comes the next caveat:
    even a rack can have partial failures. Further, a microservice itself has to scale,
    which means you need to think about redundancy. Moreover, if horizontal layers
    of a single microservice have to be deployed best to address SLAs, then the need
    to partition comes back. Yes, you are going round in circles in your design thinking,
    and the characteristics of your application, the context of your business, and
    many other technical and even cultural factors must be taken into account to decide
    where the sweet spot for your microservices architecture is in the above circular
    continuum.


    ## BASE (Basically Available, Soft State, Eventually Consistent) Systems'
