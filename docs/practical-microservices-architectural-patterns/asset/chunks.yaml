    \nFigure 15-9\nThe saga example application\n\nDesign the Example Saga Scenario\n\
    \nThis example is similar to the example in the section titled\n“Distributed Command\
    \ and Event Handling” in Chapter [12](#477630_1_En_12_Chapter.xhtml), except for\
    \ the addition of a\nsaga transaction manager in the Handle Command and Create\
    \ Event\nmicroservice. There are five microservices. The Event Handle Core\nmicroservice\
    \ has an event handler, OrderEventHandler, and\nthe Event Handler Audit microservice\
    \ has an event handler,\nAuditEventHandler. Both are subscribed to the order created\
    \ event. So,\nyou have two microservices (the Event Handler Audit microservice\
    \ and the\nEvent Handle Core microservice) with two event handler types, both\n\
    interested in the same order created event. Also, the Handle Command and\nCreate\
    \ Event microservice has a saga, OrderProcessSaga, which is also\ninterested in\
    \ the order created event. Figure [15-10](#477630_1_En_15_Chapter.xhtml#Fig10)\
    \ shows the\ndesign.\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig10_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig10_HTML.jpg)\n\
    \nFigure 15-10\nStart saga for a new order\n\nThe command and event flow in the\
    \ architecture for the end-to-end flow\nwhen you order a new product is as follows:\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig11_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig11_HTML.jpg)\n\
    \nFigure 15-11\nNew order created\n\n1.  When you click the “Order One Now!” button\
    \ in the browser, a\n    REST/JSON request hits the order controller.\n\n2.  The\
    \ order controller in the Create Command Rest Controller\n    microservice interprets\
    \ the request as a write request and hence creates\n    a new order command and\
    \ sends it to the command gateway, which in turn\n    dispatches the command to\
    \ the distributed command bus.\n\n3.  The distributed command bus forms a bridge\
    \ between the command bus\n    implementations across JVMs. The distributed command\
    \ bus on each JVM is\n    called a segment.\n\n4.  The command bus receives commands\
    \ and routes them to the order\n    command handler present in the Handle Command\
    \ and Create Event\n    microservice.\n\n5.  The order command handler retrieves\
    \ the corresponding product and\n    depreciates the stock.\n\n6.  Upon depreciating\
    \ the stock of the product, the change is effected in\n    the product repository\
    \ by sending an update to the product entity, which\n    gets persisted in the\
    \ Write DB.\n\n7.  This repository change fires a stock\n    updated event to\
    \ the event bus, which in turn dispatches events to all\n    interested event\
    \ listeners.\n\n8.  The product event handler in the Event Handle Core microservice\
    \ has\n    subscribed to the stock updated event, so it’s notified with the details\n\
    \    of the stock update.\n\n9.  Based on the details mentioned in the stock updated\
    \ event, the\n    product event handler makes changes to the read model of the\n\
    \    product.\n\n10.  In step 5, the order command handler depreciates the product\
    \ stock.\n    It also creates a new order, based on the details mentioned in the\
    \ new\n    order command it received.\n\n11.  When a new order is created, it\
    \ is effected in the order repository\n    by sending an insert of a new order\
    \ entity, which subsequently gets\n    persisted in the Write DB, with the status\
    \ of the new order as “New,” as\n    shown in Figure [15-11](#477630_1_En_15_Chapter.xhtml#Fig11).\n\
    \n12.  This repository insert fires an order created event to the event bus,\n\
    \    which in turn dispatches events to all interested event listeners. There\n\
    \    are two interested event listeners in two foreign microservices, the\n  \
    \  Event Handle Core microservice and the Event Handler Audit microservice.\n\
    \    Further, the order process saga is also interested in the order created\n\
    \    event.\n\n13.  The order process saga on receiving the order created event\
    \ starts a\n    new saga.\n\n14.  The order event handler in the\n    Event Handle\
    \ Core microservice has subscribed to the order created event\n    so it’s notified\
    \ with the details of the new order created.\n\n15.  Based on the details mentioned\
    \ in the order created event, the order\n    event handler makes changes to the\
    \ read model of the order, inserting a\n    new row in this case.\n\n16.  The\
    \ audit event handler in the Event Handler Audit microservice has\n    also subscribed\
    \ to the order created event, so it’s notified with the\n    details of the new\
    \ order created.\n\n17.  Based on the details mentioned in the order created event,\
    \ the audit\n    event handler makes a new entry to the read model of the audit.\n\
    \n18.  The browser can refresh itself to keep the view updated from querying\n\
    \    the read model of the entities.\n\nEvent handling in a saga event handler\
    \ is similar to that of a\nregular event listener, as you saw in Listing [12-11](#477630_1_En_12_Chapter.xhtml#PC11) in\
    \ Chapter [12](#477630_1_En_12_Chapter.xhtml). The same rules for method and\n\
    parameter resolution apply here too; however, there is one difference.\nWhile\
    \ there is a single instance of an event listener that deals with\nall incoming\
    \ events, multiple instances of a saga may exist, each\ninterested in events targeted\
    \ to a saga of different entity instances.\nTo make it clear,\na saga that manages\
    \ a transaction around an order with an ID of x will\nnot be interested in events\
