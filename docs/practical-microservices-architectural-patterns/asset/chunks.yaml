- fmt: '# The Bad and the Ugly Part of HTTP


    As stated, all of the samples in Chapter [8](#477630_1_En_8_Chapter.xhtml) use
    the HTTP protocol for intercommunications between microservices. If you examine
    these interactions again, you can observe that most of them are synchronous HTTP
    calls. Close observation of these communications reveals that an incoming request
    from a consumer microservice to your provider microservice server will capture
    one servlet connection and perform a blocking call to the remote service before
    it can send a response to the consumer microservice. It works, but it does not
    scale effectively if you have many such concurrent clients. Synchronous HTTP is
    a best fit for a user using a client application to get instant feedback or a
    response; however, that is not the case when it comes to server-side processing.


    ## APIs for Asynchronous HTTP Processing


    Typical containers in application servers like in Apache Tomcat normally use a
    server thread per client request. Under increased load conditions, this necessitates
    containers to have a large amount of threads to serve all the client requests.
    This limits scalability, which can arise due to running out of memory or exhausting
    the pool of container threads. Java EE has added asynchronous processing support
    for servlets and filters from the Servlet 3.0 spec onwards. A servlet or a filter,
    on reaching a potentially blocking operation when processing a request, can assign
    the operation to an asynchronous execution context and return the thread associated
    with the request immediately to the container without waiting to generate a response.
    The blocking operation can later complete in the asynchronous execution context
    in some different thread, which can generate a response or dispatch the request
    to another servlet. The `javax.servlet.AsyncContext` class is the API that provides
    the functionality that you need to perform asynchronous processing inside service
    methods. The `startAsync()` method on the `HttpServletRequest` object of your
    service method puts the request into asynchronous mode and ensures that the response
    is not committed even after exiting the service method. You have to generate the
    response in the asynchronous context after the blocking operation completes or
    dispatch the request to another servlet.


    The programming model is straightforward. Let''s try to understand the difference
    by first looking at the pseudo code for the traditional programming model of a
    `Controller` class. See Listing [10-1](#477630_1_En_10_Chapter.xhtml#PC1).


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public List getAllProducts() {

    //return "List of All Products";

    }

    }

    Listing 10-1

    Pseudo Code for a Sync Controller

    ```


    When you use Spring, the controller method can return a `java.util.concurrent.Callable`
    to complete processing asynchronously. Spring MVC will then invoke the `Callable`
    in a separate thread with the help of a `TaskExecutor`. A `TaskExecutor` is Spring''s
    abstraction for asynchronous execution and scheduling of tasks. The rewritten
    pseudo code is shown in Listing [10-2](#477630_1_En_10_Chapter.xhtml#PC2).


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public Callable> getAllProducts() {

    return new Callable>() {

    public Object call() throws Exception {

    // ...

    // return "List of All Products";

    }

    };

    }

    }

    Listing 10-2

    Pseudo Code for an Async Controller Using Callable

    ```


    Spring 3.2 introduced `org.springframework.web.context.request.async.DeferredResult`,
    which can again be returned by a `Controller` class. `DeferredResult` provides
    an alternative to using a `Callable` for asynchronous request processing. While
    a `Callable` is executed concurrently on behalf of the application, with a `DeferredResult`
    the application can produce the result from a thread of its choice. Here, the
    processing can happen in a thread not known to Spring MVC, similar to the case
    when you need to get a response from a messaging channel, and so on. So, when
    you use `DeferredResult`, even after you leave the controller handler method,
    the request processing is not done. Instead, Spring MVC (using Servlet 3.0 capabilities)
    will hold on with the response, keeping the idle HTTP connection. Even though
    the HTTP Worker Thread is no longer used, the HTTP connection is still open. At
    a later point in time, some other thread will resolve `DeferredResult` by assigning
    some value to it. Spring MVC will immediately pick up this event and send a response
    to the client, finishing the request processing.


    The pseudo code for an async scenario using `DeferredResult` is shown in Listing
    [10-3](#477630_1_En_10_Chapter.xhtml#PC3).


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public DeferredResult> getAllProducts() {

    DeferredResult> deferredResult =

    new DeferredResult> ();

    // Add deferredResult to an internal memory holder

    // like a Queue or a Map...

    return deferredResult;

    }

    // In some other thread...

    deferredResult.setResult(data);

    // Remove deferredResult from the internal memory holder

    }

    Listing 10-3

    Pseudo Code for an Async Controller Using DeferredResult

    ```


    Java 8 introduced `java.util.concurrent.CompletableFuture`, which can be used
    with Spring to create async endpoints that similarly free up request threads to
    perform other tasks. In this case, the `DeferredResult.setResult` may simply be
    replaced with `CompletableFuture.complete`. A `CompletableFuture` is a `java.util.concurrent.Future`.
    A `Future` represents the result of an asynchronous computation whereas a `CompletableFuture`
    is a `Future` that may be explicitly completed (setting its value and status)
    and may be used as a `CompletionStage`, supporting dependent functions and actions
    that trigger upon its completion. `CompletableFuture` makes handling complex asynchronous
    programming easier. It even lets you combine and cascade async calls, and also
    offers the static utility methods `runAsync` and `supplyAsync` to abstract away
    the manual creation of threads. See Listing [10-4](#477630_1_En_10_Chapter.xhtml#PC4).


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public CompletableFuture> getAllProducts() {

    Future> future =

    new CompletableFuture>();

    return CompletableFuture.supplyAsync(() -> "in the background");

    }

    }

    Listing 10-4

    Pseudo Code for an Async Controller using CompletableFuture

    ```


    ## Design a Scenario to Demo Async HTTP Between Microservices


    You will use a trimmed down version of the same components used for previous examples.
    So your sample here will consist of three main components: an HTML-based client
    app and two microservices, as shown in Figure [10-2](#477630_1_En_10_Chapter.xhtml#Fig2).
    I have removed all complexities of HATEOAS and any data repositories so that you
    can concentrate on async HTTP alone. Once you appreciate the design and the main
    components used to implement it, then you should be able to use a similar pattern
    for your other complex business scenarios.'
