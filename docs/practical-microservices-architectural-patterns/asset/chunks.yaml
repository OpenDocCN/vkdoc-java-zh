    ## Derby


    Apache Derby is an open source relational database implemented entirely in Java
    and available under the Apache License. Derby follows Java, JDBC, and SQL standards
    and supports the client/server mode operation with the Derby Network Client JDBC
    driver and Derby Network Server. Go to [https://db.apache.org/derby/](https://db.apache.org/derby/)
    for more information.


    I will cover the following on Derby in this appendix:


    *   How to install and configure a Derby database

    *   How to start and stop Derby in Network mode

    *   How to creating a new database in Derby

    *   How to execute basic table creation and table manipulation commands in a Derby
    database


    ### Install and Configure Derby


    In this section, you will download, install, and configure Derby and test the
    installation. Derby is available for download at [https://db.apache.org/derby/derby_downloads.html](https://db.apache.org/derby/derby_downloads.html).
    Since I have Java 8 on my machine, I opted for the 10.14.1.0 release of Derby,
    which is available at [https://db.apache.org/derby/releases/release-10.14.1.0.cgi](https://db.apache.org/derby/releases/release-10.14.1.0.cgi).


    Save the installation archive file to a suitable location in your hard disk first
    and then extract the archive to a location of your choice. Even though you may
    choose any location, like:


    ```

    C:\Program Files\Derby\

    ```


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    ```


    Set the `DERBY_HOME` environment variable to the location where you extracted
    the Derby distribution. For example, if you extracted Derby to the `D:\Applns\apache\Derby\`
    directory, set the environment variable as:


    ```

    set DERBY_HOME=D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    ```


    If you prefer, you may also add the `DERBY_HOME/bin` directory to the `PATH` environment
    variable so you can run the Derby scripts from any directory.


    ### Start and Stop Derby Server in Network Mode


    Applications can access a Derby database using the familiar client/server mode.
    This is achieved via a framework that embeds Derby and handles database requests
    from applications, including applications running in different JVMs on the same
    machine or on remote machines. The Derby Network Server embeds Derby and manages
    requests from network clients.


