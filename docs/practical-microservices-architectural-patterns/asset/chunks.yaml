    重新审视传统电子商务应用

    让我们从在线电子商务网站的基本需求开始讨论。在了解这些需求后，你将看到，如果采用传统或单体架构进行设计，基本构建模块的典型逻辑架构会是什么样子。在下一节中，你将了解如果改用基于微服务的方法重新设计架构，需要进行哪些更改。


    电子商务业务概述

    示例电子商务企业名为 ACME Shop。ACME 拥有在线业务，客户或最终用户可以在该网站上进行在线购物。ACME 的后台员工也通过同一个网站来处理客户订单。

    ACME Shop 专门销售时尚配饰，并将其产品组合归类到不同的类别下，称为产品类别。在每个产品类别下，ACME Shop 会列出待售的产品集。当（匿名）用户访问
    ACME 主页时，所有产品类别都会被列出，并且默认情况下，其中一个类别下的产品会被展开并进一步列出。

    用户可以点击某个产品来查看产品详情。产品详情还会显示可用库存。用户可以进一步指定要购买所选产品的数量，并将其添加到购物车。一旦添加到购物车，它就会显示在网站的用户购物车图标中。用户可以选择其购物车并进行结算。下一步，用户可以确认购买。

    要确认购买，用户必须登录。如果用户之前创建过用户档案，他/她可以使用这些凭据登录。新用户可以点击“新用户”链接来新建用户档案。创建档案后，用户可以再次选择购物车进行结算。他这次可以登录并确认购买。

    购买成功后，将创建一个订单。订单创建后，可以在相应子菜单下的“您的订单”链接中查看。

    在订单被履行之前，用户可以取消订单。

    ACME 后台员工使用超级凭据登录，与同一个网站交互以处理客户订单。一旦用户创建了订单，下一步就是后台员工发货。订单发货后，用户无法取消订单。相反，用户可以在其“订单”下的“进行中”子菜单中查看“已发货状态”。

    订单履行流程的下一阶段是订单交付。ACME 后台员工必须进入“待交付”子菜单并执行操作。根据你是想模拟成功交付还是失败情况，有两个操作：“已交付”或“交付失败”。


    重新审视电子商务架构


    上述业务应用的典型单体架构如图 17-1 所示。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig1_HTML.jpg](img/477630_1_En_17_Fig1_HTML.jpg)


    图 17-1

    单体电子商务逻辑架构


    该 Web 应用通常是一个单一的 Web 归档（`.war`）文件。来自 Web 应用的组件向中间层可用的服务发送请求。中间层的逻辑架构描绘了多个模块，这些模块与
    Web 交互，并且通常使用请求-响应风格的同步通信相互交互。


    图 17-2 试图描绘单体架构中组件之间的相互依赖关系。请注意，图 17-1 和图 17-2 是代表性的，并非详尽无遗，仅用于说明组件之间的紧密耦合。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig2_HTML.jpg](img/477630_1_En_17_Fig2_HTML.jpg)


    图 17-2

    单体电子商务组件依赖关系


    电子商务微服务应用

    在前面的章节中，我已经描述了基于微服务架构的必要性，因此这里不再重复。相反，让我们重新审视上一节中描述的架构，看看需要改变什么。

    很明显，在新架构中，你需要类似或增强的功能，包括功能性和非功能性。同时，你希望减少上一节中描述的架构的不良影响，那么让我们开始吧。


    基于微服务的电子商务架构的逻辑架构


    重构时首先要考虑的是将功能分离到微服务中，如图 17-3 所示。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig3_HTML.jpg](img/477630_1_En_17_Fig3_HTML.jpg)


    图 17-3

    电子商务微服务依赖关系


    微服务之间几乎没有或完全没有直接依赖关系；相反，微服务通过基于事件的基础设施相互通信。所有这些微服务都将部署在独立的进程中，并且可能部署在不同的物理节点上，也可能不部署。


    BASE 中的 ACID


    再次比较图 17-2 和图 17-3 中的架构。仔细观察会发现两个值得注意的方面：


    *   **复制的读模型**：你可以看到库存数据被复制并保存在多个微服务级别。这是为了处理宿主微服务不拥有的数据的查询需求，这正是在第 12 章的 CQRS
    模式中详细讨论的内容。为了明确起见，当显示产品详情时，屏幕上也需要显示可用库存信息，这可以通过维护在产品微服务级别的库存物化视图来完成。


    *   **增强一致性的领域亲和性**：图 17-2 将订单和库存描绘为两个独立的领域。然而，在图 17-3 的重新设计中，你可以看到这两个领域实体被整合在一起，并维护在同一个空间（进程或节点）中。原因是希望在订单和库存领域实体之间实现更强的数据一致性。


    虽然你希望在这两个实体之间实现类似 ACID 的一致性，但希望避免跨节点的分布式事务。但这里有一个警告：无论出于何种原因，你试图将单体拆分为微服务，同样的力量现在又施加了约束，要求以一致性为代价将它们重新合并！虽然你不想将所有东西都合并回去以获得零分区的强一致性，但让我们暂时保留订单和库存，并接受“BASE
    中的 ACID”这一场景。

    别担心；在第 19 章中，当你研究 Axon 3 时，你将看到一个进一步重构的设计，其中具有真正的 BASE 事务特性。


    电子商务微服务的设计


    电子商务应用的业务领域对象模型（BDOM）或公共信息模型（CIM）如图 17-4 所示。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig4_HTML.jpg](img/477630_1_En_17_Fig4_HTML.jpg)


    图 17-4

    电子商务领域对象模型

    '
- fmt: "# 微服务架构中的电商应用设计\n\n尽管你需要基于微服务架构设计电商应用，但业务领域对象模型（BDOM）仍遵循传统的UML类图风格。因此，上述电商类图中显示的依赖关系在确定微服务边界时可能无法一一对应。相反，当你基于领域驱动设计确定微服务边界时，此处显示的部分依赖关系将跨越微服务边界被拆分，在这种情况下，某些微服务必须维护由外部微服务所拥有的数据的物化视图。\n\
    \n## 基于微服务电商架构的技术架构\n\n在了解了构建基于微服务的电商应用所采用方法背后的原理之后，你可以得出技术架构的初始视图，如图[17-5](#477630_1_En_17_Chapter.xhtml#Fig5)所示。\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig5_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig5_HTML.jpg)\n\
    \n**图17-5** 电商微服务技术架构\n\n你正试图移除所有直接的微服务间依赖关系，并通过事件驱动架构来引导所有微服务间的通信。为此，你使用了`Axon`的集群事件总线。你利用多语言持久化来存储数据，以便可以根据各个微服务使用数据的方式选择多种数据存储技术。对于`Shipping`微服务和`Delivery`微服务，你未使用任何持久化来简化应用，因此它们在图[17-5](#477630_1_En_17_Chapter.xhtml#Fig5)中被模糊处理。\n\
    \n## 设计与编码电商微服务应用\n\n在进入设计与编码之前，让我们明确理解示例的边界范围。本书的范围仅限于中间件微服务上下文中的微服务。为了构建一个完整的电商微服务应用工作示例，你还需要基于Web框架开发基于HTML的屏幕。Web应用的所有这些元素都包含在一个未在图[17-5](#477630_1_En_17_Chapter.xhtml#Fig5)中显示的微服务中；不过，我将在后续章节中介绍该微服务。详细审查或解释如何构建HTML屏幕及相关Web技术超出了本书的范围。建议读者参考其他教科书以获取关于如何构建Web应用的详细说明。然而，示例中提供的用于构建Web应用的代码是简单的，因此其所需部分应当不言自明，你可以自行浏览。\n\
    \n排除Web应用之外，还有七个其他应用微服务，如图[17-5](#477630_1_En_17_Chapter.xhtml#Fig5)所示。同样，我不会列出微服务中的每个Java文件；相反，我将逐一介绍重要的用例，并解释该用例所需的服务器端或微服务代码。\n\
    \n应用的完整代码位于`ch17\\ch17-01\\Ax2-Ecom-No-Security`文件夹中。\n\n## 列出产品类别与产品\n\n产品类别以及默认选中类别下列出的产品应显示在ACME\
