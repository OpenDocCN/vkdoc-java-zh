    ```


    The order event

    handler receives the order created event after a new order has

    been created. Hence the only task left is to update the Order Read DB,

    which is done by the above code. The other event handler left is product

    event handler, shown in Listing [12-12](#477630_1_En_12_Chapter.xhtml#PC12).


    ```

    @Component

    public class ProductEventHandler {

    @Autowired

    DataSource dataSource;

    @EventHandler

    public void handleProductStockUpdatedEvent(StockUpdatedEvent event) {

    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);

