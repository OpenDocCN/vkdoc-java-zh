    # Distributed Messaging


    One of the most powerful mechanisms used in building enterprise grade software
    applications is messaging. Had we not invented messaging, all of the software
    applications around the globe would be like a complete workforce, needing to be
    working 24 x 7, 365 days a year without any room for downtime or failure. But
    in practice we know that every software application is prone downtime or failure;
    rather, every software application should be designed to have downtime or failure.
    Since enterprise applications don’t live in isolation, instead they talk to each
    other in a distributed manner, what an application tried to talk to an application
    that is down? Messaging helps to gracefully accommodate unexpected downtime and
    failure of coordinating applications. In this chapter, you will look into a few
    messaging scenarios that will help you understand how these messaging functionalities
    play a vital role in distributed software architectures, especially in the context
    of microservices. Here again my intention is not to start from the basics of messaging
    or to get into all scenarios of messaging, which would be a book unto itself.
    Instead, I will show a few scenarios that are very critical in understanding the
    role of messaging in microservices architecture.


    ## Messaging for Resiliency


    Assuming that you are aware of the basic constructs in a messaging architecture,
    let’s first look at some basics of how to bring resiliency to a messaging setup.


    ### Message Persistence


    Message persistence is a mechanism by which you can keep the messages delivered
    to a message broker in a persistent store. This will elevate the state of the
    messages on the wire or on main memory from a volatile state to a permanent safe
    state. This is very important in a microservices environment since coordinating
    microservices can come and go, fail or rejuvenate, etc.


    Each service in a microservice ecosystem can only make one of its activities compliant
    to the consistency principle: either safely `PUT` the message into a message store
    or safely `GET` the message from a message store. A message broker sits between
    these two messaging primitives, and typically a message broker stores messages
    in its memory (RAM) and delivers messages again from its memory. But if a message
    broker fails, all messages stored in memory by that message broker are lost. This
    is undesirable. This is where message persistence comes into play. A message broker
    can be configured to be backed up by a suitable message persistence mechanism,
    typically a message-store on disk. Persisting messages to a message store on disk
    comes at a cost of performance, but it will increase the resiliency of the messaging
    architecture.


    When two microservices want to connect to each other, they use a message channel
    where one microservice writes information to the channel and the other one reads
    that information from the channel. Thus the sending microservice doesn’t just
    fling the information into the messaging system; instead, it adds the information
    to a particular message channel. A microservice receiving information doesn’t
    just pick it up at random from the messaging system; instead, it retrieves the
    information from a particular message channel, from where it is intended to read
    from.


    When using a message store, we can take advantage of the asynchronous nature of
    a messaging architecture. When a microservice sends a message to a channel, it
    sends a duplicate of the message to a special channel to be collected by the message
    store. The whole setup is shown in Figure [6-1](#477630_1_En_6_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig1_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1** Simple publish subscribe with persistence'
