    D:\binil\gold\pack03\ch09\ch09-01\Eureka>run1

    D:\binil\gold\pack03\ch09\ch09-01\Eureka>java -jar -Dserver.port=8761 -Dspring.application.name=eureka-registry1
    -Deureka.client.registerWithEureka=false -Deureka.client.fetchRegistry=true -Deureka.client.server.waitTimeInMsWhenSyncEmpty=0-Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/,http://localhost:8762/eureka/
    -Deureka.server.enableSelfPreservation=false .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch09\ch09-01\Eureka

