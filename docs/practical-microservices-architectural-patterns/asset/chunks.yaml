    \ 为真，因此一个新的 `OrderDeliveredEvent` 被发送到集群事件总线。\n\n7.  步骤 6 中注册的 `OrderDeliveredEvent`\
    \ 被订单流程 Saga 消费。\n\n8.  在调用 `handleOrderCanceledEvent` 处理器后，Saga 的生命周期结束，因为你已在该\
    \ Saga 的事件处理器上标注了 `@` `EndSaga` `。` 参见清单 17-25。\n\n```\n    public class OrderProcessSaga\
    \ extends AbstractAnnotatedSaga {\n    private Long orderId;\n    @EndSaga\n \
