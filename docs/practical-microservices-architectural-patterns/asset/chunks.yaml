  trans: '

    你在 broker 服务中自动配置了对拍卖服务和股票订单服务的引用。每个服务都有两个引用；这只是一个用于安排各种测试场景（你将进行验证）的临时方案。为了清晰起见，你拥有两个拍卖服务的引用，名称分别为
    `auctionServiceRequired_TX` 和 `auctionServiceRequiresNew_TX`。顾名思义，`auctionServiceRequired_TX`
    中的写入方法在 `PROPAGATION_REQUIRED` 上下文中执行，而 `auctionServiceRequiresNew_TX` 中的写入方法则在
    `PROPAGATION_REQUIRES_NEW` 上下文中执行。其余代码检查传入的参数，你在此参数中附带了一个指示器（一个整数值），用于标识你正在执行哪个测试场景（测试用例）。总体策略是：如果你希望在父服务和子服务之间传播事务，则使用
    `PROPAGATION_REQUIRED`；在你显式生成错误条件的地方，则使用 `PROPAGATION_REQUIRES_NEW`，以便将错误限制在相应服务方法的上下文内，并且以受控的方式（通过使用
    try-catch）进行处理，从而保证其余执行流程能够继续进行；再次说明，这是为了便于演示而设置的测试装置。


    你需要意识到，在实际的生产场景中，你并不需要这些测试场景的安排；因此，如果你希望跨服务实现原子操作，只需使用 `PROPAGATION_REQUIRED`
    配置所有内容，即仅使用 `(testCase == 1)` 这一场景。


    在 broker 服务中还定义了一个名为 `flipFlop()` ^(³²) 的实用方法。此方法在两次连续执行之间翻转操作中错误模拟的创建状态，因此，如果你在一次方法执行中模拟了错误，那么下一次执行相同方法时就不会模拟错误。通过这种方式，如果你执行了一个测试用例来验证某个错误场景，你也能看到在相同流程没有该错误场景执行时的不变量情况。如果你想查看消息消费是否在第一次执行时失败，以便在尝试重新消费时，下一次执行能够无故障进行，那么这个方法就很有用；这样，你就能轻松测试并可视化结果。暂时先把它放在这里；当你执行测试时，它会变得更清晰。


