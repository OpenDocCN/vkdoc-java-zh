    成功将写入可扩展性与读取可扩展性的管理分离后，你仍不能松懈。迟早你会开始感到，分离出的读取节点，或者如果你的业务过于成功（如同当今许多企业），甚至写入节点本身也会带来限制——这往往是由于其必须处理的交易量或管理的数据量过大所致。当企业在全球范围内运营，并将其应用程序开放给全球客户使用时，情况尤其如此。许多社交网络应用和消息应用都属于此类，它们需要达到网络规模。“分而治之”是核心法则，而分片（sharding）便是其中一种方法。分片可以应用于服务层或数据层。图
    16-5 所示的架构展示了这一概念。


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig5_HTML.jpg](img/477630_1_En_16_Fig5_HTML.jpg)


    图 16-5

    提升读取可扩展性的数据架构


    分片架构的概念是，你将拥有许多节点，所有或部分节点也会拥有冗余数据，然后每个节点将拥有唯一的令牌（token），你利用这些令牌将整个数据划分开来，以便对数据库进行写入和读取操作。


    参考图 16-5，我将用一个类比来说明。假设你的应用程序类似于我们今天使用的流行社交网络应用。你知道系统中有太多用户，并且有太多用户操作需要在你的应用程序中管理。如果我的两个女儿，安和莉亚，以及其他数百万用户都是该应用的用户，那么设计令牌的一个简单方法是按字母顺序，根据用户名字的首字母将用户分配到不同的节点。有专门的节点或节点集群来处理名字以
    A-H 开头的用户的请求和数据，同样，另一组节点或节点集群处理名字以 I-Q 开头的用户，以此类推。其假设是，交易和数据在这些节点或节点集群之间的分布大致均衡，你只需一次性管理单个节点或单个节点集群内的可扩展性。你可以设计你的应用程序未来需要多少个这样的节点或集群，并相应地设计节点（或分区）的数量以及令牌。你也可以使用任何其他模式来设计你的分片拓扑结构；但核心理念是相同的。你可以对微服务层和数据层都进行分片，在这种情况下，你的
    ELB（弹性负载均衡器）需要具备一定的智能，以便将请求路由到适当的微服务实例。


    **架构虽好，但我们仍需更优、更简的方案**


    在了解了 Oracle 数据库作为数据库解决方案所提供的不同选项后，让我们考虑一下其他替代方案！你之前看到的所有解决方案模板都是为了解决手头的不同问题，是否使用它们是一个架构决策，需要综合考虑多方面因素，包括企业的长期技术战略。在本书中，我一直在谈论多语言（数据）架构的重要性，以及每个微服务完全管理自身数据的重要性。基于此，你也希望考虑那些能够提供类似可扩展性和可用性等级，但又不过度依赖任何特定供应商昂贵技术栈的架构。


    微服务架构本身就是一种将系统按功能分解为多个独立部分的方法，以便你能更好地独立管理每个部分的可用性和可扩展性。然后，你可以通过分片来进一步管理数据量。无论是否使用分片，你还可以考虑将读取与写入分离，第
    12 章介绍的 CQRS（命令查询职责分离）模式非常适合这一点。正确原则的组合将帮助你实现网络规模。


    **Axon 中的高可用与可扩展 CQRS 示例**


    抛开上一节中定义高可用性（HA）模板的各种供应商产品，我们将回到第 12 章介绍的 Axon CQRS。在那里，你看到了一个将不同 Axon 组件完全分布到多个
    JVM 中的可运行代码。由于该示例是跨进程分布的，你实际上也可以将它们分布到多个节点上；不过，为了简单起见，我们在示例中将每个 Axon 处理器都放在单个节点上演示。在当前示例中，你将把它们分布到
    Axon 组件的多个实例中，以验证如何为基于 Axon 的 CQRS 架构带来冗余，进而实现高可用性和可扩展性。


    **设计示例场景**


    你将沿用第 12 章“分布式命令与事件处理”一节中的相同设计，因此我不再重复所有解释。你的领域中有两个实体：订单和产品。用户可以购买产品，这将创建一个新订单。当新订单创建时，产品库存将减少。仅此而已。请重新阅读该节，以了解你将在本示例中执行的业务场景架构的详细概述。


    你将扩展第 12 章示例的部署架构，以引入冗余。你可能需要参考第 9 章中“设计微服务高可用性场景”一节，你已在那里演示了 Spring Cloud 中的高可用性概念。在当前示例中，你将遵循类似的部署拓扑结构；但是，为了将示例的整体复杂性控制在特定范围内，并专注于讨论要点——即
    Axon CQRS 组件本身的高可用性和可扩展性——你将省略当前示例中的 Spring Cloud 组件，部署架构将如图 16-6 所示。


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig6_HTML.jpg](img/477630_1_En_16_Fig6_HTML.jpg)


    图 16-6

    Axon CQRS 的高可用性演示


    当前部署架构与第 12 章相应节中示例的主要区别在于，托管命令创建者、命令处理器、事件创建者和事件处理器的微服务被实例化了多次。因此，部署生态系统具有以下特征：


    *   存在不止一种类型的事件处理器对同一类事件感兴趣。

    '
- fmt: '*   存在多个相同类型的命令处理器以及事件处理器实例。


    在图[16-6](#477630_1_En_16_Chapter.xhtml#Fig6)中，由于只有一个Web应用实例，你没有通过`Nginx`将请求路由到该Web应用，但这并不妨碍你实例化更多实例并通过`Nginx`进行反向代理请求。其目的是单独验证Axon组件的高可用性（HA），因此你特意没有复制Web应用，以控制演示的复杂度。然而，负责通过拦截HTTP请求来创建命令的`REST
    Controller`微服务被实例化了两次，并且请求通过`Nginx`反向代理进行路由。这将有助于将来自Web浏览器的请求交替路由到这两个`REST Controller`微服务实例。通过这样做，你让两个实例都参与创建命令，并将它们分发到分布式命令总线，该总线将通过`JGroups`连接器进一步传播到应用程序。尽管图[16-6](#477630_1_En_16_Chapter.xhtml#Fig6)中显示的所有其他微服务也通过嵌入式HTTP连接器监听HTTP流量，但它们与应用程序其他组件的通信是通过`JGroups`或`RabbitMQ`通道进行的，具体体现在创建和消费命令以及事件上。


    ## 编写示例场景


