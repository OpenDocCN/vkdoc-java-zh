    central class for synchronous client-side HTTP invocations. `RestTemplate` simplifies
    communication with HTTP servers, and enforces REST principles. `RestTemplate`
    handles low-level HTTP connections, leaving application code to provide URLs (with
    possible template variables) and extract the responses back. `RestTemplate` by
