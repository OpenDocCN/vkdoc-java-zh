    图 16-7

    扩展后的 CQRS 架构


    参考图 16-7，扩展事件处理器是直接的，因为所有的事件处理器都会被通知，并且在大多数情况下，它们都可以采取任何操作，例如刷新物化视图或缓存。如果你观察命令处理器的扩展场景，可能会更复杂。图
    16-8 描述了一个场景，其中有许多托管命令处理器的微服务实例。


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig8_HTML.jpg](img/477630_1_En_16_Fig8_HTML.jpg)


