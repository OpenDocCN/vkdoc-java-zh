  trans: '

    使用 Spring Boot 和 MongoDB 执行数据操作

    多语言持久化是微服务架构中的一个关键方面。虽然你仍然需要具备本地和/或分布式事务能力的 ACID 兼容数据存储，但仔细分析会发现，大多数数据存储和检索操作并不需要这些总是要付出代价的严格能力。如今，许多
    NoSQL 数据库被设计为在大型集群上运行，并能处理海量数据；它们还能高效地响应流量呈指数级增长的读取请求，同时性能基本保持线性。因此，在单个应用程序中同时满足两种（SQL
    和 NoSQL）数据存储需求是很自然的，而这正是多语言持久化发挥作用的地方。在微服务上下文中，你可以根据单个微服务或单个大型企业应用程序的组件使用数据的方式，选择使用多种数据存储技术。当你需要以文档格式存储数据时，MongoDB
    是最佳选择，因此你将在本书的其余章节中研究一个 MongoDB 示例。


    在本节中，你将实现一个“Hello World”类型的 Spring Boot 应用程序。开始开发 Spring Boot 应用程序的方法不止一种，主要方法有：


    *   使用 Spring Boot 命令行界面（CLI）作为命令行工具^(¹⁰)

    *   使用 Eclipse 和 Spring Tool Suite (STS) 等 IDE 来提供 Spring Boot 支持^(¹¹)

    *   使用 Spring Initializer 项目


    在本节中，你将采用最后一种方法。


    使用 Spring Initializer 创建 Spring Boot 项目模板

    你将在此处使用 Spring Initializer 创建一个 Spring Boot 项目。Spring Initializer 是基于 Eclipse
    的 Spring Tool Set (STS) 项目向导的直接替代品，它提供了一个在线 Web UI 来配置和生成不同风格的 Spring Boot 项目。使用
    Spring Initializer，你可以通过在线界面生成一个项目，然后可以将其导入任何 IDE。


    目标是快速开发一个应用程序，帮助你实现以下目标：


    *   了解 Spring Boot

    *   了解 MongoDB

    *   了解使用 Spring Data 进行基本的 CRUD 操作


    Spring Initializer 项目位于 [`http://start.spring.io`](http://start.spring.io)。


    你需要填写详细信息，例如它是否是 Maven 项目、是否需要为 Boot 项目使用 Java 以及 Spring Boot 版本。其他详细信息包括 group
    和 artifact ID，如图 7-1 所示。接下来，单击“Switch to go to the full version”链接，该链接位于“Generate
    Project”按钮下方。在这里，你可以选择 MongoDB 和 Rest Repositories 作为依赖项。你还需要确保 Java 版本为 8，并且包类型选择为
    JAR。选择依赖项后，你可以点击“Generate Project”按钮。这将生成一个 Maven 项目。该项目可以作为 ZIP 文件下载到浏览器的默认下载目录中。


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig1_HTML.jpg](img/477630_1_En_7_Fig1_HTML.jpg)


    图 7-1

    使用 Spring Boot Initializer 生成 Spring Boot 模板


    Spring Boot 提供了一组 Starter Poms 或 gradle 构建文件，你可以使用它们来添加所需的依赖项。根据其类路径中的库，Spring
    Boot 将通过自动配置自动配置所需的类。例如，要与数据库交互，如果类路径中有 Spring Data 库，它会自动设置与数据库的连接以及所需的 Data
    Source 类。


    现在，你可以解压该文件并将其保存到文件系统中你选择的目录中。同样，一个没有空格的文件路径将使你在开发应用程序时避免许多不可预见的错误。现在，你可以使用你喜欢的
    IDE 继续应用程序开发。


    1.  如果你使用 Eclipse，现在可以转到“File”菜单并单击“Import”。

    2.  导航到 Maven ➤ Existing Maven Projects，然后单击“Next”。

    3.  单击“Root Directory”旁边的“Browse”选项，然后选择你之前解压的文件夹。

    4.  单击“Finish”按钮。这会将生成的 Maven 项目加载到 Eclipse Project Explorer 中。


    假设你熟悉 Eclipse，我将不在此花费时间或篇幅解释 Eclipse 的各个方面。相反，让我们详细地看一下应用程序开发。

    首先，查看创建 Spring Boot 项目时自动生成的 `pom.xml`。这里解释了主要的三个元素。


    Spring Boot Starter Parent

    通常，你的 Maven `pom.xml` 文件将继承自 spring-boot-starter-parent 项目，并声明对一个或多个“starter”的依赖。在图
    7-1 中，你可以看到两个这样的 starter：MongoDB 和 Rest Repositories。


    清单 7-1 提到了你的 POM 继承层次结构，这是一个物料清单（BOM），用于管理项目所需的不同库和版本。


    ```

    org.springframework.boot

    spring-boot-starter-parent

    1.5.4.RELEASE


    清单 7-1

    Spring Boot Starter Parent (ch07\ch07-01\pom.xml)

    ```


    Spring Boot Dependencies


    接下来，如果你可以查看依赖项部分，你会看到 POM 文件只提到了三个依赖项，如清单 7-2 所示。


    ```


    org.springframework.boot

    spring-boot-starter-data-mongodb


    org.springframework.boot

    spring-boot-starter-data-rest


    org.springframework.boot

    spring-boot-starter-test

    test


    清单 7-2

    Spring Boot Dependencies

    ```


    这些依赖项解释如下：


    *   `spring-boot-starter-data-mongodb`：Spring Data MongoDB 项目帮助你与 MongoDB 文档数据库集成。Spring
    Data MongoDB 的主要功能领域是一个以 POJO 为中心的模型，用于与 MongoDB 集合交互以执行 CRUD 操作，并轻松编写存储库风格的数据访问层。

    *   `spring-boot-starter-data-rest`：Spring Data REST 构建在 Spring 的 MVC 之上。Spring
    Data REST 创建了一组 Spring MVC 控制器和其他所需的 bean，以提供 RESTful 前端。然后，这些组件会传递性地链接到 Spring
    Data JPA 后端。使用 Spring Boot，这一切都会为你自动配置。

    *   `spring-boot-starter-test`：此 starter 导入了 Spring Boot 测试模块、JUnit、AssertJ、Hamcrest
    以及许多其他有用的库，这些库将帮助你测试应用程序。


    Spring Boot Maven Plugin


    接下来，让我们看看 Spring Boot Maven 插件。参见清单 7-3。


    ```


    org.springframework.boot

    spring-boot-maven-plugin


    清单 7-3

    Spring Boot Maven Plugin

    ```


    清单 7-3 中的 Spring Boot Maven 插件有助于创建单个可执行 JAR。单个可执行 JAR 是一个自包含的可执行 JAR 文件，你可以在生产环境中运行。在第
    3 章的“微服务是自包含的”部分，你看到了对自包含和自足的可执行包的要求。Java 没有提供任何标准方法来加载 JAR 文件内包含的 JAR 文件。在这里，你可以使用
    uber JAR。一个 uber JAR 简单地将所有 JAR 中的所有类打包到一个归档文件中。但是，当需要同一库的不同版本或文件名相同时，这有时会遇到问题。因此，Spring
    Boot 采用了一种不同的方法，直接嵌套 JAR，而 Spring Boot Maven 插件则负责所有必要的准备工作。

