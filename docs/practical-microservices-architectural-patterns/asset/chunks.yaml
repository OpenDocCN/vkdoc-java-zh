    ```


    在清单 13-1 中，这两个语句将一起提交或一起回滚。然而，这是一个本地事务，而不是分布式事务。


    **分布式事务**


    通常，分布式事务存在的场景必须跨越至少两个资源管理器。数据库、消息队列、事务处理（TP）监控器（如 IBM 的 CICS、BEA 的 Tuxedo、SAP
    Java Connector 和 Siebel Systems）是常见的事务性资源，并且通常，如果事务必须是分布式的，它必须跨越其中几个资源。分布式事务可以被视为一个原子操作，必须在分布在多个不同物理位置的多个参与资源之间进行同步（或提供
    ACID 属性）。


    像 Oracle Weblogic 和 IBM Websphere 这样的 Java EE 应用服务器原生支持 JTA，并且还有第三方独立的 JTA 实现，例如：


    *   **JOTM：** JOTM 是一个用 Java 实现的开源事务管理器。它支持多种事务模型和规范，为使用各种中间件平台（J2EE、CORBA、Web
    Services、OSGi）的客户端提供事务支持。


    *   **Narayana：** Narayana，以前称为 JBossTS 和 Arjuna Transaction Service，附带一个非常健壮的实现，支持
    JTA 和 JTS API。它支持三种扩展事务模型：嵌套顶层事务、嵌套事务和基于 Saga 的补偿模型。此外，它还支持 Web 服务和 RESTful 事务。需要手动与
    Spring 框架集成，但它提供了与 Spring Boot 的原生集成。


    *   **Atomikos TransactionsEssentials：** Atomikos TransactionsEssentials 是一个生产级质量的实现，除了
    JTA API 之外，还支持恢复和一些特殊功能。它提供了开箱即用的 Spring 集成，并支持数据库和 JMS 资源的连接池。


    *   **Bitronix JTA：** Bitronix 声称其事务恢复能力与某些商业产品相当甚至更好。Bitronix 还提供了开箱即用的连接池和会话池。


    **Java 中的分布式事务**


    跨越多个资源的事务协调由 opengroup 的 X/Open 标准规定。Java 通过提供两个接口来支持 X/Open 标准：JTA（Java 事务 API）和
    JTS（Java 事务服务）。如图 13-2 所示，应用程序开发人员使用 JTA 与事务管理器通信。由于资源可以由遵循不同平台和编程语言的多个供应商提供，如果所有这些资源必须协调，它们必须再次遵守
    X/Open 标准。这里，遵循 CORBA OTS（对象事务服务）的 JTS 提供了与分布式资源共存的不同事务管理器之间所需的互操作性。我已经讨论了分布式事务中的“分布式特性”。两阶段提交协议用于跨多个资源管理器协调事务。


    **使用 MySQL、ActiveMQ、Derby 和 Atomikos 的分布式事务示例**


    解决许多数据一致性问题的简单方法，尤其是在涉及多个资源管理器时，是使用 XA 或分布式事务，即使在 BASE 中也是如此，如图 13-3 所示。然而，如果您想过渡到更宽松的
    BASE 微服务，设计机制必须具有更高的容错性，因为您的 XA 事务管理器不存在，而它们本应完成所有繁重的工作。您将借助一个示例来了解主要的一致性关注场景。同样，我本可以在示例中直接演示关注场景而不使用分布式事务；但是，我将采用相反的方式，使用
    XA 事务来说明完美场景，并通过进一步缩小 ACID 范围来模拟各种故障条件，因为这样更容易让您（读者）理解各个方面。XA 事务允许我们通过“滥用”事务属性来使事务范围比正常情况下更小。这意味着我可以重用相同的代码来逐步说明宽松
    BASE 的异常情况。


    **示例场景**


    如图 13-3 所示，该示例并不简单，因此需要稍作解释。示例场景是一个简单的股票交易处理系统。以下是其构建模块：


    1.  股票交易的新报价可以推送到 Broker Web 微服务。新报价被插入到 MySQL 数据库中的 `Quotes` 表中，状态为“New”。


    2.  Quotes 处理器任务是一个 quartz 调度任务，它轮询 MySQL 数据库中的 `Quotes` 表，查找任何状态为“New”的新报价。


    3.  当找到状态为“New”的新报价时，它会在事务中调用 broker 服务的 `processNewQuote` 方法，并将新报价的唯一标识符传递给 `Quotes`
    表。


    4.  broker 服务使用其他事务性服务（拍卖服务和股票订单服务），并且两者的执行必须是原子的。


    5.  拍卖服务通过在一个事务内将报价状态更改为“Confirmed”来确认收到的报价。


    6.  股票订单服务根据新报价中包含的信息创建一条 JMS 消息，并将其发送到 ActiveMQ 队列以进行报价结算，同样在上述（5）的事务内进行。


    7.  结算监听器服务正在监听 ActiveMQ 队列，以获取任何新的已确认报价。所有到达 ActiveMQ 队列的已确认报价都会在事务内被结算监听器服务的
    `onMessage` 方法拾取。


    8.  结算监听器服务调用报价对账服务进行报价对账，同样在上述（7）的事务内进行。

