    ```\n\nRefer to Appendix D to get an overview of cURL and Postman. You can use\
    \ any of these tools to test the above microservice by pointing to `http://localhost:8080/products/`.\n\
    \nNext, bring up the Product Web microservice:\n\n```\ncd ch10\\ch10-01\\ProductWeb\n\
    D:\\binil\\gold\\pack03\\ch10\\ch10-01\\ProductWeb>make\nD:\\binil\\gold\\pack03\\\
    ch10\\ch10-01\\ProductWeb>mvn -Dmaven.test.skip=true clean package\nD:\\binil\\\
    gold\\pack03\\ch10\\ch10-01\\ProductWeb>run\nD:\\binil\\gold\\pack03\\ch10\\ch10-01\\\
    ProductWeb>java -jar -Dserver.port=8081 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
    ```\n\nYou can again use cURL or Postman to test the Product Web microservice\
    \ pointing to `http://localhost:8081/productsweb/`.\n\nAlternatively, you may\
    \ open this HTML utility preferably in the Chrome browser:\n\n```\nch10\\ch10-01\\\
    ProductWeb\\src\\main\\resources\\product.html.\n```\n\nUpon loading itself, the\
    \ browser client will fire a request to Product Web, listening on port 8081, which\
    \ will delegate the request to the Product Server microservice listening on port\
