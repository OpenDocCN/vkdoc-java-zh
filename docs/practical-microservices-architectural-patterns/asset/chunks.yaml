    ## 设计示例Saga场景


    此示例与第[12](#477630_1_En_12_Chapter.xhtml)章中“分布式命令和事件处理”一节的示例类似，不同之处在于`Handle Command
    and Create Event`微服务中添加了一个saga事务管理器。共有五个微服务。`Event Handle Core`微服务有一个事件处理器`OrderEventHandler`，而`Event
    Handler Audit`微服务有一个事件处理器`AuditEventHandler`。两者都订阅了订单创建事件。因此，您有两个微服务（`Event Handler
    Audit`微服务和`Event Handle Core`微服务）和两种事件处理器类型，它们都对同一个订单创建事件感兴趣。此外，`Handle Command
    and Create Event`微服务有一个saga`OrderProcessSaga`，它也对订单创建事件感兴趣。图[15-10](#477630_1_En_15_Chapter.xhtml#Fig10)展示了该设计。


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig10_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig10_HTML.jpg)


    图15-10 为新订单启动Saga


    当您订购新产品时，端到端流程中的命令和事件流如下所示：


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig11_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig11_HTML.jpg)


    图15-11 新订单已创建


    1.  当您在浏览器中点击“立即订购！”按钮时，一个`REST/JSON`请求会命中订单控制器。

    2.  `Create Command Rest Controller`微服务中的订单控制器将该请求解释为写入请求，因此创建一个新订单命令并将其发送到命令网关，命令网关随后将该命令分派到分布式命令总线。

    3.  分布式命令总线在多个`JVM`的命令总线实现之间形成一座桥梁。每个`JVM`上的分布式命令总线称为一个段。

    4.  命令总线接收命令并将其路由到`Handle Command and Create Event`微服务中的订单命令处理器。

    5.  订单命令处理器检索对应的产品并减少库存。

    6.  减少产品库存后，通过向产品实体发送更新来在产品仓库中生效更改，该更改会持久化到`Write DB`中。

    7.  此仓库更改会向事件总线触发一个`stock updated`事件，事件总线随后将事件分派给所有感兴趣的事件监听器。

    8.  `Event Handle Core`微服务中的产品事件处理器已订阅`stock updated`事件，因此它会收到库存更新详情的通知。

    9.  基于`stock updated`事件中提到的详细信息，产品事件处理器对产品的读模型进行更改。

    10. 在第5步中，订单命令处理器减少了产品库存。它还根据收到的`new order`命令中的详细信息创建一个新订单。

    11. 创建新订单时，通过插入一个新的订单实体在订单仓库中生效，该实体随后持久化到`Write DB`中，新订单的状态为“New”，如图[15-11](#477630_1_En_15_Chapter.xhtml#Fig11)所示。

    12. 此仓库插入操作会向事件总线触发一个`order created`事件，事件总线随后将事件分派给所有感兴趣的事件监听器。在两个外部微服务（`Event
    Handle Core`微服务和`Event Handler Audit`微服务）中有两个感兴趣的事件监听器。此外，订单处理saga也对`order created`事件感兴趣。

    13. 订单处理saga在收到`order created`事件后启动一个新的saga。

    14. `Event Handle Core`微服务中的订单事件处理器已订阅`order created`事件，因此它会收到新订单创建的详细信息通知。

    15. 基于`order created`事件中提到的详细信息，订单事件处理器对订单的读模型进行更改，在本例中插入一个新行。

    16. `Event Handler Audit`微服务中的审计事件处理器也已订阅`order created`事件，因此它会收到新订单创建的详细信息通知。

    17. 基于`order created`事件中提到的详细信息，审计事件处理器在审计的读模型中添加一条新记录。

    18. 浏览器可以自行刷新，以通过查询实体的读模型来保持视图更新。


    Saga事件处理器中的事件处理与常规事件监听器类似，如第[12](#477630_1_En_12_Chapter.xhtml)章的[12-11](#477630_1_En_12_Chapter.xhtml#PC11)清单所示。方法和参数解析的相同规则也适用于此处；但是，有一个区别。虽然处理所有传入事件的常规事件监听器只有一个实例，但一个saga可能存在多个实例，每个实例都关注针对不同实体实例的saga的事件。为了明确起见，管理ID为`x`的订单事务的saga不会关注针对ID为`y`的订单的事件，反之亦然。之前启动的新saga将存在于内存中，并由持久化支持。如图[15-11](#477630_1_En_15_Chapter.xhtml#Fig11)所示，订单工作流可以从“New”状态进展到“Cancelled”或“Confirmed”状态。您将分别研究它们。


    首先，您将看到saga因确认订单而从“New”状态转换到“End”状态。见图[15-12](#477630_1_En_15_Chapter.xhtml#Fig12)。


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig12_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig12_HTML.jpg)


    图15-12 订单确认后结束Saga


    当您点击确认新订单时，端到端流程中的命令和事件流如下：


    1.  当您在浏览器中点击“确认”按钮以确认已创建的订单时，一个`REST/JSON`请求会命中订单控制器。

    2.  `Create Command Rest Controller`微服务中的订单控制器将该请求解释为写入请求，并创建一个订单状态更新命令，将其发送到命令网关，命令网关随后将该命令分派到分布式命令总线。

    3.  分布式命令总线在多个`JVM`的命令总线实现之间形成一座桥梁。每个`JVM`上的分布式命令总线称为一个段。

    4.  命令总线接收命令并将其路由到`Handle Command and Create Event`微服务中的订单命令处理器。

    5.  订单命令处理器检索对应的订单，并将状态从“New”更改为“Confirmed”。

    6.  更改订单状态后，通过向订单实体发送更新来在订单仓库中生效更改，该更改会持久化到`Write DB`中。

    7.  此仓库更改会向事件总线触发一个`order confirmed`事件，事件总线随后将事件分派给所有感兴趣的事件监听器。'
