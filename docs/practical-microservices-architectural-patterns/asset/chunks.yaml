    \ on the\nnature and context of the use case involved. But Figure [14-7](#477630_1_En_14_Chapter.xhtml#Fig7)\
    \ illustrates\nthat you can live with local transactions\nalone if your application\
    \ is a monolith. The moment you split your\nmonolith into microservices, you introduce\
    \ partitions in the\narchitecture and there you need to trade off. Option 1 in\
    \ Figure [14-7](#477630_1_En_14_Chapter.xhtml#Fig7) is the\npreferred option where\
    \ you avoid distributed transactions from\nmicroservices that require high responsiveness\
    \ like those that interact\nwith human users, and retain some form of distributed\
    \ transactions in\nother microservices where you justify using distributed transactions\
    \ to\npieces of your microservices architecture where you require\ncomparatively\
    \ lower responsiveness, since they are your back-office\nmicroservices.\nSo far,\
    \ so good. What if distributed transactions or two-phase\ntransactions are simply\
    \ never acceptable in your microservices? Can this\nproblem be ever solved? Let’s\
    \ relook at an example from Chapter [13](#477630_1_En_13_Chapter.xhtml).\n\nTowards\
    \ Relaxed BASE: Redesign For Dealing with\nDuplicates and Out-Of-Order Messages\n\
    The aim here is not to deprecate distributed transactions straight\naway. Instead,\
    \ you will bring relaxations to the design from Chapter\n[13](#477630_1_En_13_Chapter.xhtml),\
    \ simulate failure scenarios, and\nsee if you are able to overcome the shortcomings\
    \ seen in Chapter [13](#477630_1_En_13_Chapter.xhtml). Once you understand this\n\
    enhanced design, you will have a good grip of the underlying basics in\ndesigning\
    \ distributed systems that are more resilient and fault tolerant. Once you have\n\
    these basics in your toolset, then it’s a matter of architectural\ncreativity\
    \ in designing fault tolerant microservices.\n\nThe main design change I introduce\
