    sections in this chapter. In the previous sections, you also used the Product
    Server Alternate microservice module; however, in this section you will have only
    one module, the Product Server microservice module, but you will run two instances
    of it. This is important since I also want to demonstrate that a microservice
    can be instantiated to more than one in number (rather, replicated) to scale horizontally
    provided you have taken care of other design aspects like statelessness, idempotency,
    etc.


