- fmt: 'In the design shown, the client app communicates with the `Product Web` microservice
    using the HTTP protocol; however, you want the client to do it using the async
    HTTP model. Similarly, the `Product Web` microservice communicates with the `Product
    Server` microservice, again using the HTTP protocol, and this inter-microservices
    communication is designed using the async HTTP model.


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig2_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2** Design an async HTTP scenario in Spring Boot


    Let’s walk through the design in more detail by referring to the code snippets
    so that the concepts will be more clear.


    ## Code to Use Async HTTP in Spring Boot


    All the code samples for this section are in folder `ch10\ch10-01`. Visit `pom.xml`
    to see the explicit mention of the `spring-boot-starter-web` dependency for your
    `Product Server` microservice. See Listing [10-5](#477630_1_En_10_Chapter.xhtml#PC5).


    ```

    org.springframework.boot

    spring-boot-starter-web


    Listing 10-5

    Adding spring-boot-starter-web to Spring Boot (ch10\ch10-01\ProductServer\pom.xml)

    ```


    `spring-boot-starter-web` will add Tomcat and Spring MVC to the `Product Server`
    microservice.


    Next, look at the Boot main application class shown in Listing [10-6](#477630_1_En_10_Chapter.xhtml#PC6).


    ```

    @SpringBootApplication

    @EnableAsync

    public class EcomProductMicroserviceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomProductMicroserviceApplication.class, args);

    }

    }

    Listing 10-6

    Async Enabled Spring Boot Application (ch10\ch10-01\ProductServer\src\main\java\com\acme\ecom\product\EcomProductMicroserviceApplication.java)

    ```


    The `@EnableAsync` annotation switches on Spring’s ability to run `@Async` methods
    in a background thread pool. This class also customizes the `Executor` backing
    the thread pool. By default, a `SimpleAsyncTaskExecutor` is used. The `SimpleAsyncTaskExecutor`
    does not reuse threads. Even though it supports limiting concurrent threads through
    the `concurrencyLimit` bean property, by default the number of concurrent threads
    is unlimited. In serious applications you should consider a thread-pooling `TaskExecutor`
    implementation instead.


    Next, look at the Service component where you implement the async processing logic,
    shown in Listing [10-7](#477630_1_En_10_Chapter.xhtml#PC7).


    ```

    @Service

    public class ProductService{

    @Async

    public CompletableFuture> getAllProducts()

    throws InterruptedException{

    List products = getAllTheProducts();

    if (products.size() == 0) {

    LOGGER.debug("No Products Retreived from the repository");

    }

    LOGGER.debug(Thread.currentThread().toString());

    Thread.sleep(2000L); // Delay to mock a long running task

    return CompletableFuture.completedFuture(products);

    }

    }

    Listing 10-7

    Service Component Implementing Async Processing (ch10\ch10-01\ProductServer\src\main\java\com\acme\ecom\product\service\ProductService.java)

    ```


    The class is marked with the `@Service` annotation, making it a candidate for
    Spring’s component scanning to detect it and add it to the application context.
    Next, the `getAllProducts` method is marked with Spring’s `@Async` annotation,
    indicating it will run on a separate thread. The method’s return type is `CompletableFuture<List<Product>>`
    instead of `<List<Product>>`, a requirement for any asynchronous service. This
    code uses the `completedFuture` method to return a `CompletableFuture` instance,
    which is already completed with the collection of results queried from the repository
    (a processing logic supposed to be taking considerable amount of time to complete).


    Now, look at the Rest Controller of the `Product Server` microservice, shown in
    Listing [10-8](#477630_1_En_10_Chapter.xhtml#PC8).


    ```

    @RestController

    public class ProductRestController {

    private final ProductService productService;

    @Autowired

    public ProductRestController(ProductService productService) {

    this.productService = productService;

    }

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public CompletableFuture> getAllProducts()

    throws InterruptedException, ExecutionException{

    LOGGER.debug(Thread.currentThread().toString());

    return productService.getAllProducts()

    .thenApply(products -> {

    products.forEach(item->LOGGER.debug(item.toString()));

    LOGGER.debug(Thread.currentThread().toString());

    return products;

    });

    }

    }

    Listing 10-8

    Product Server Rest Controller Facilitating Async (ch10\ch10-01\ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    Note that the `CompletableFuture` response returned by `productService.getAllProducts()`
    allows you to manually control the moment when the future returns and also transform
    the output in the process. You then convert this simple `CompletableFuture` into
    the format you need with the help of `thenApply()`, which allows you to log some
    data about the current thread to make sure that the execution really happens asynchronously,
    that is, the thread that is finishing the work is not the thread that started
    the work. The Rest Controller too then returns the collection of the products
    once again as another `CompletableFuture<List<Product>>` so that Spring MVC will
    also act to execute the HTTP method in an async manner, making it a smartly implemented
    microservice! Keep in mind that this is an independent microservice; you will
    next look at a dependent microservice that depends on this independent microservice
    (as is shown in the design).


    The dependent microservice is the `Product Web` microservice. The main code lies
    in the `Controller` class, shown in Listing [10-9](#477630_1_En_10_Chapter.xhtml#PC9).


    ```

    @RestController

    public class ProductRestController{

    private final AsyncRestTemplate asyncRestTemplate =

    new AsyncRestTemplate();

    private static String PRODUCT_SERVICE_URL =

    "http://localhost:8080/products/";

    @RequestMapping(value = "/productsweb", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public DeferredResult> getAllProducts() {

    LOGGER.debug(Thread.currentThread().toString());

    DeferredResult> deferredResult = new DeferredResult();

    ParameterizedTypeReference> responseTypeRef =

    new ParameterizedTypeReference>() {};

    ListenableFuture>> entity =

    asyncRestTemplate.exchange(PRODUCT_SERVICE_URL,

    HttpMethod.GET, (HttpEntity) null, responseTypeRef);

    entity.addCallback(new

    ListenableFutureCallback>>() {

    @Override

    public void onFailure(Throwable ex) {

    LOGGER.debug(Thread.currentThread().toString());

    LOGGER.error(ex.getMessage());

    }

    @Override

    public void onSuccess(ResponseEntity> result) {

    List products = result.getBody();

    products.forEach(item->LOGGER.debug(item.toString()));

    LOGGER.debug(Thread.currentThread().toString());

    deferredResult.setResult(products);

    }

    });

    LOGGER.debug(Thread.currentThread().toString());

    return deferredResult;

    }

    }

    Listing 10-9

    Microservice Calling Async HTTP on Another Microservice (ch10\ch10-01\ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```'
