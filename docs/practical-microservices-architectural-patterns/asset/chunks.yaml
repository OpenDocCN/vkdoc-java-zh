    ## Distributed Command and Event Handling


    Enterprise-grade applications distribute processing into multiple compute nodes
    and multiple processes to leverage the full power of multicore processors as well
    as to attain maximum parallelism so as to improve overall performance. The microservices
    architecture is no exception, and in this example you are going to completely
    distribute the different Axon components across JVMs. Since the example is distributed
    across processes, you can practically distribute them across nodes too; however,
    you will execute the examples with each main Axon components in a single node
    (my personal laptop, in my case) for simplicity.


    ### The Example Scenario


    You are using the same scenario as in the previous section. While the previous
    example was implemented as a single microservice, you will split the same functionality
    into four different microservices in this example and you will additionally introduce
    another microservice too. This new, fifth microservice is the Event Handler Audit
    microservice. The Event Handler Audit microservice has an event handler, `AuditEventHandler`,
    which too is subscribed to the order created event. So, you now have two microservices
    (the Event Handler Audit microservice and the Event Handle Core microservice)
    with two event handler types, both interested in the same order created event!
    Figure [12-4](#477630_1_En_12_Chapter.xhtml#Fig4) shows the design.


    ![../images/477630_1_En_12_Chapter/477630_1_En_12_Fig4_HTML.jpg](images/477630_1_En_12_Chapter/477630_1_En_12_Fig4_HTML.jpg)


    Figure 12-4. The design of the distributed command and event handling in Axon


    The “Command Query Segregation Using Events” section in Chapter [5](#477630_1_En_5_Chapter.xhtml)
    represented the meta model for an event-based CQRS architecture. Figure [12-4](#477630_1_En_12_Chapter.xhtml#Fig4)
    is a concrete incarnation of that abstract meta model represented in Figure [5-6](https://doi.org/10.1007/978-1-4842-4501-9_5Fig#6)
    in Chapter [5](#477630_1_En_5_Chapter.xhtml).


    The command and event flow in the architecture is also similar to the previous
    example; however, there are subtle differences. Let’s relook at the end-to-end
    flow, which is labelled in the diagram as follows:


    1.  When you click the “Order One Now!” button in the browser, a REST/JSON request
    hits the order controller.


    2.  The order controller in the Create Command Rest Controller microservice interprets
    the request as a write request and creates a new order command and sends it to
    the command gateway, which in turn dispatches the command to the distributed command
    bus.


    3.  The distributed command bus forms a bridge between the command bus implementations
    across JVMs. The distributed command bus on each JVM is called a segment.


    4.  The command bus receives commands and routes them to the order command handler,
    both of them being present in the Handle Command and Create Event microservices.


    5.  The order command handler retrieves the corresponding product and depreciates
    the stock.


    6.  Upon depreciating the stock of the product, the change is effected in the
    product repository by sending an update to the product entity, which will get
    persisted in the Write DB.


    7.  This repository change fires a stock updated event to the event bus, which
    in turn dispatches events to all interested event listeners.


    8.  The product event handler in the Event Handle Core microservice has subscribed
    to the stock updated event, so it gets notified with the details of the stock
    update.


    9.  Based on the details mentioned in the stock updated event, the product event
    handler makes changes to the read model of the product.


    10. In step 5, the order command handler depreciated the product stock. Along
    with that, it also created a new order, based on the details mentioned in the
    new order command it received.


    11. When a new order is created, it is effected in the order repository by sending
    an insert of a new order entity, which subsequently gets persisted in the Write
    DB.


    12. This repository insert fires an order created event to the event bus, which
    in turn dispatches events to all interested event listeners. There are two interested
    event listeners, both of them in foreign (different process or nodes) microservices,
    the Event Handle Core microservice and the Event Handler Audit microservice.


    13. The order event handler in the Event Handle Core microservice has subscribed
    to the order created event, so it gets notified with the details of the new order
    created.'
