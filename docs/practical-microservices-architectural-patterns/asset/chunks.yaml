    You can use a browser (preferably chrome) and point to `http://localhost:8080/`.
    If the change is not reflected, you may close the browser session and take a new
    browser instance and try the above URL. You may test the sample by following the
    steps described previously in the subsection titled “Build and Test the Sample
    Scenario” under the section “Distributed Command and Event Handling” in Chapter
    [12](#477630_1_En_12_Chapter.xhtml). While you test the sample, if you keep watching
    the console windows of the microservice instances, you can verify that the HTTP
    requests will alternate hitting both instances of the `CreateCommandRestController`
    microservice since Nginx will reverse proxy the requests to both these instances.
    Similarly, the command handling and event handling will alternate between both
    instances of the respective microservices. You may also want to bring down any
    one instance of the microservice for a while, during which, if you keep testing
    by pumping requests, you can see that the corresponding processing happens in
    the other live instance of the microservice always. Later, if you bring back the
    previously down instance, you can see that the processing gets evenly distributed
    again across both the instances.


    ## Scaling Aggregate Root Entities in Write Nodes for AXON CQRS


    The previous section demonstrated how to scale the CQRS architecture in Axon by
    adding more nodes to handle commands and events. Let’s explore the caveats involved
    in scaling the write node or the command handling node.


    ### Concurrently Modify Requests to Clone of Same Entity


    In the section titled “Independent Read and Write Scalability to improve Efficiency”
    you saw the architecture template based on Oracle where there is a single write
    node or primary database where you route all writes and multiple read nodes or
    a secondary database to manage queries. You know the reason to favor this kind
    of architecture: to manage the high look to book ratio or similar characteristics
    of most business applications where the number of read transactions is much higher
    compared to that of write transactions.


    When you add the CQRS layer on top of data persistence, you have partitioned the
    command and query handling into nodes or processes separate from that of the data
    persistence. Further, when you replicate the microservices handling the command
    and query handling into multiple instances, a typical architecture is as shown
    in Figure [16-7](#477630_1_En_16_Chapter.xhtml#Fig7).


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig7_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig7_HTML.jpg)


    *Figure 16-7* Scaled out CQRS architecture


    Referring to Figure [16-7](#477630_1_En_16_Chapter.xhtml#Fig7), scaling out event
    handlers is straightforward, since all of the event handlers will be notified
    and all of them can take whatever actions, refreshing the materialized views or
    cache with them in most cases. If you look at the scaling out scenario of command
    handlers, there can be more complexities. Figure [16-8](#477630_1_En_16_Chapter.xhtml#Fig8)
    depicts a scenario where you have many instances of microservices hosting the
    command handlers.


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig8_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig8_HTML.jpg)


    *Figure 16-8* Scaled out command handlers


    In fact Figure [16-8](#477630_1_En_16_Chapter.xhtml#Fig8) is an exploded view
    of the command handling portion from Figure [16-7](#477630_1_En_16_Chapter.xhtml#Fig7).
    Assume that both Ann and Ria are trying to book a flight seat through a global
    online travel agent (OTA) site. The travel agent sells inventory of flight seats
    of multiple flights of a single airline. The OTA also sells inventory of flight
    seats of multiple airlines. If you look at the booking requests for flight seats,
    they are write operations to the application and would be modelled with commands
    and command handlers if you go with the CQRS pattern. Since the OTA has global
    operations, let’s assume that the total number of bookings happening per duration
    is considerable and there is every reason to have more than one instance of the
    microservices having the command handlers responsible to initiate bookings. This
    is what is represented in Figure [16-8](#477630_1_En_16_Chapter.xhtml#Fig8). The
    diagram is an oversimplified view of an actual inventory and booking system, but
    it will suffice to explain the core concept we are trying to discuss and address
    in this section.


    The scenario becomes complex when requests to book the last seat in an airline
    reach more or less concurrently from more than one end user. If you forget other
    aspects like sharding, sticky sessions, and so on, you can assume that there is
    a possibility that the HTTP requests to book the last seat in an airline hits
    different instances of the same microservice having the command handlers responsible
    to initiate bookings, more or less concurrently from more than one end user. These
    different command handler instances will first attempt to load the entity, which
    in your case is the single last seat on the plane, from the persistent store,
    the single database. When this happens, the single source of truth about that
    last seat in the persistent store gets into more than one process space, the different
    instances of the command handler microservice. If the underlying hardware is of
    a multicore architecture, you can now imagine a scenario where processing the
    booking request gets more or less concurrently on different clones of the same
    last seat. How should you deal with this scenario?


    ### Optimistic Locking


    Optimistic locking assumes that multiple transactions can complete without affecting
    each other, and therefore these transactions can proceed without locking the data
    resources that they affect. However, before committing, each transaction verifies
    that no other transaction has modified its data. If the validation conflicts,
    the committing transaction rolls back.


    Optimistic locking is typically used for long transactions or conversations that
    span several database transactions. But the same strategy can also be used for
    short transactions. You can store versioning information in the entity so that
    if the same entity is updated by more than one conversation, the subsequent commit
    attempts are informed of the conflict and do not override the previous conversation’s
    work. This approach guarantees some isolation, but scales well and works particularly
    well in read-often, write-sometimes situations. Hibernate provides two different
    mechanisms for storing versioning information, a dedicated version number or a
    timestamp.


    For this examples, you are using Hibernate as the persistence service provider.
    So, in cases where there is more than one transactions getting progressed in the
    same entity, Hibernate will allow one of them to commit (typically the one that
    gets completed first) and the other transaction will get a `org.hibernate.StaleObjectStateException`,
    and this exception will carry information about the particular entity instance
    that was the source of the failure. A sample is provided here:


    ```

    Caused by: org.hibernate.StaleObjectStateException: Row was updated or deleted
    by another transaction (or unsaved-value mapping was incorrect) : [com.axon.concurrency.user.model.User#1]

    ```'
