  trans: '

    ### 虚拟化服务器 vs. 容器


    容器提供了一种隔离应用程序的方式，并为应用程序的运行提供了一个虚拟平台。容器系统需要一个底层操作系统，该操作系统利用虚拟内存支持实现隔离，为所有容器化应用程序提供基础服务。这在虚拟化部分的图
    4-10 中有所展示。虚拟机则拥有自己的操作系统，并利用硬件虚拟机支持。容器的开销相对低于虚拟机，容器系统通常针对运行成百上千个容器的环境。当需要在多台服务器上运行多个应用程序时，虚拟化可能是最佳选择；而如果需要运行单个应用程序的多个副本，容器则具有显著优势。我们来探讨一下这背后的原理。虚拟机为每个新虚拟机打包了虚拟硬件、内核（即操作系统）和用户空间。这提供了跨应用程序所需级别的隔离，如果它们是不同的应用程序，这通常是可取的，以便安全、数据和资源等关注点彼此完全隔离。


    在 Linux 操作系统的语境下理解容器相当容易。Linux 内核有一个名为 cgroups 的功能。cgroups 限制、核算、优先处理并隔离操作系统进程的资源使用（计算、内存、磁盘
    I/O、网络等），从而提供了所谓的“操作系统级虚拟化”。基于容器的虚拟化相对轻量（与传统虚拟机相比），几乎不增加开销，共享相同的操作系统内核，并且不需要特殊的硬件支持即可高效运行。所有这些都为容器定义一种新的软件应用封装模型铺平了道路，使它们能够在共享操作系统上隔离运行。不同的
    Linux/Unix 发行版使用不同的机制来实现操作系统级虚拟化。例如，FreeBSD 有“jails”的概念，而 Solaris 有“zones”的概念。由于容器用于隔离内核的技术是
    Linux 特有的，因此容器只能在基于 Linux 的操作系统上运行。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig10_HTML.jpg](img/477630_1_En_4_Fig10_HTML.jpg)


    图 4-10.


    虚拟化 vs. 容器


    图 4-10 展示了资源在容器系统中是如何共享的。当你在同一台主机上使用相同的镜像启动两个（或更多）容器时，基础镜像的全部内容将被共享。相反，如果你使用不同的镜像启动多个容器，这些镜像可能会也可能不会共享一些公共层（bin、lib
    等），这取决于镜像的每一层是如何构建的。


    因此，对于每个虚拟机，整个组件栈都在运行，从操作系统到应用服务器和虚拟硬件（包括网络组件、CPU 和内存）都被模拟出来。然而，容器作为完全隔离的沙箱运行，每个容器仅包含操作系统所需的最小内核。底层系统的系统资源被容器共享，因此占用空间减小，这意味着在相同的硬件上，可以运行的容器数量远多于虚拟机。以这种方式共享资源将减少总体占用空间，这也有助于缩短启动容器实例所需的时间，相比于在虚拟机系统中实例化相同的应用程序。这就是容器的相关性所在，尤其是在需要即时自动扩展的云原生环境中。见图
    4-11。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig11_HTML.jpg](img/477630_1_En_4_Fig11_HTML.jpg)


    图 4-11.


    容器实例共享资源


    Docker，现在基于 Linux libcontainer，是一个用于在 Linux 平台上创建、管理和监控容器的管理系统。Docker 帮助在笔记本电脑上打包应用程序，然后该应用程序可以不加修改地在任何公有云、私有云甚至裸机上运行，遵循“一次构建，随处运行”的原则。与基于
    VMWare 或 Hyper-V 等虚拟机监控程序的虚拟化相比，其基础设施占用空间最小。


    Red Hat 青睐 Ansible，这是另一个容器管理系统。Kubernetes 是另一个用于自动化部署、扩展和管理容器化应用程序的开源系统。


    Docker 是最流行的容器提供系统。由于它只能运行在基于 Linux 的操作系统上，如果你必须在 Windows 或 Mac 机器上设置 Docker，你首先需要使用
    VirtualBox 启动一个 Linux 虚拟机，然后在这个虚拟机内部运行 Docker 容器。


    当你从传统的基于单体架构的 SaaS 迁移到基于微服务的 SaaS 时，另一个特点是，像 Oracle Weblogic 或 IBM Websphere 这类所谓的重量级中间件将被相对轻量的运行时（如
    Tomcat 或 Jetty）所取代。将这些运行时配置为在 Java 进程内嵌入运行也很常见，以便总体占用空间最小化。


    ## 微服务架构


    微服务架构（MSA）可以定义为一种设计软件应用程序的方式，旨在实现交付的敏捷性、部署的灵活性和扩展的精确性。它有许多相关的好处，也有一系列你必须处理的复杂性。在本节中，让我们看看其中的一些以及与之相关的更宏观的图景。


    ### 架构反转


    在 MSA 中，应用程序由小型、独立可部署的进程组成，这些进程使用与平台和编程语言无关的 API 和协议相互通信。每个进程托管着暴露紧密相关业务能力的应用程序组件。许多这样的进程为企业应用程序暴露了许多这样的能力。因此，在
    MSA 中，单个能力、单个进程或单个微服务本身可能不足以代表任何规模可观的企业应用程序。


    在单体架构中，是一个单一的（主）进程托管整个应用程序包。因此，单体应用程序中以下所有或大部分关注点都包含在单个进程空间内：


    *   服务依赖管理

    *   服务配置管理

    *   服务检测

    *   服务 SLA

    *   服务管理与监控


    在 MSA 中，由于有许多进程相互通信，与单体架构的情况不同，上述所有或大部分关注点并不仅限于单个进程。它们需要为所有这些协调进程处理，这意味着额外的进程复杂性。这是微服务的下一个最显著的特征，即早期单体架构中单个进程的内部关注点现在被外化到许多微服务的外部。这被称为“架构反转”（IoA）。

    '
- fmt: '### The Inner Architecture Perspective


    Since microservices are independent, autonomous, and self-encompassing packages
    deployable to their own process space, they are to be complete in terms of its
    own architecture. Figure [4-5](#477630_1_En_4_Chapter.xhtml#Fig5) shows that microservices
    host their own presentation, business, and data components and also hosts their
    own messaging infrastructure. Hence all or most of the architectural concerns
    in terms of separation of concerns, layering, and interface-oriented design still
    exist and should be dealt with in the architecture of each and every microservice;
    this is the “inner architecture” of a microservice.


    `Gartner` has four examples to explain the inner architecture of microservices:


    * Simple/Scaled

    * Complex/Scaled

    * Externalized Persistence

    * Command Query Responsibility Segregation


    Figure [4-12](#477630_1_En_4_Chapter.xhtml#Fig12) represents these example scenarios
    schematically. Let’s cover these example scenarios with suitable analogies so
    that the concept is clear and so you understand the options available and the
    complexities involved.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg)


    **Figure 4-12.** Microservices inner architecture examples


    * **Simple/Scaled**: These microservices are stateless and don’t require persistence
    services. They are used to perform compute-intensive jobs. Figure [4-12](#477630_1_En_4_Chapter.xhtml#Fig12)
    shows a tax calculation or a discount or an offer calculation as examples of such
    microservices where the computation is done based on the parameters passed to
    the microservice API.

    * **Complex/Scaled**: In this example, the persistence service is an integral
    part of the microservice. When scaled out, multiple instances of the microservice
    can be instantiated and all of them have to get data from the same persistence
    service. This means, if data is modified by any of the instances, the change data
    has to be propagated to the other instances too and this can be best achieved
    by sending events. For increased scalability, the services are stateless so that
    requests can be routed to any instance irrespective of which instance the just
    previous request from the same client is routed.

    * **Externalized Persistence**: This middle approach does use a persistence service,
    but it is external to the microservice. Even monolith architectures with increased
    maturity use a similar architecture. Here the data persisted is scoped and isolated
    to the microservice that owns it, so that it can also be deployed similar to the
    Complex/Scaled topology.

    * **Command Query Responsibility Segregation (CQRS)**: This system is used to
    achieve high throughput. This is an extension of either the Complex/Scaled or
    the Externalized Persistence, but the main difference is that the write and read
    parts of the data persistence are separated. Unlimited instances of the microservice
    can be instantiated to handle the read part, thus achieving the highest degree
    of throughput. But when it comes to the write part, the state changes must be
    propagated to the other instances of the read part and this can be best achieved
    again by sending events.


    You will revisit the inner architecture again when I introduce the working e-commerce
    application in later chapters. For the purpose of brevity, I will use a simple
    notation to distinguish between the inner architecture and the outer architecture,
    shown in Figure [4-13](#477630_1_En_4_Chapter.xhtml#Fig13). This notation will
    be followed in our further discussions.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg)


    **Figure 4-13.** Microservices architecture notation


    ### The Outer Architecture Perspective


    I mentioned that due to the Inversion of Architecture, many of the concerns that
    used to be solved at the inner architecture level of the monolith have now become
    the outer architecture concerns. Figure [4-14](#477630_1_En_4_Chapter.xhtml#Fig14)
    attempts to show schematically the concerns we need to address at the outer architecture
    level of a microservice. Microservices interact with each other and this chattiness
    between process spaces increases the overall complexity. Concerns like fault tolerance,
    graceful retry, and alternate code execution are few among them and this necessitates
    strong management, monitoring, and control of microservices at its outer architecture
    level. The goal is to achieve agility of delivery, flexibility of deployment,
    and the precision of scalability in a microservices architecture. In order to
    do this, a new set of concerns must be addressed and this increases the complexity
    of microservices manyfold compared to that of a monolith.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg)


    **Figure 4-14.** Microservices outer architecture


    In a monolith, security can be easily controlled through a single controller whereas
    in a microservices architecture, since many services distributed in the network
    need to talk to each other to provide complete business capability, security is
    dispersed and has to be controlled at every microservice level. End-to-end logging
    and tracing is another aspect whose importance increases manyfold in the microservices
    architecture, since a call graph can span across many microservices. To aid seamless
    addition and retirement of microservice instances, dynamic service registration
    and discovery are required. Similarly, auto scale and auto deploy are new Dev
    Ops concerns to make the microservices cloud native and web scale.


    ### The Big Picture of MASA


    Having discussed the separation between the inner architecture and outer architecture
    concerns of microservices, it is time now to look at the big picture.


    Figure [4-15](#477630_1_En_4_Chapter.xhtml#Fig15) combines the inner architecture
    and the outer architecture of microservices to provide a view of a typical Mesh
    App and Services Architecture. Microservices interact with their environment and
    with other microservices, leveraging the outer architecture provisions, whereas
    each of the microservices’ ability to scale selectively is built and managed using
    its inner architecture organization.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg)


    **Figure 4-15.** The outer architecture of microservices


    Figure [4-15](#477630_1_En_4_Chapter.xhtml#Fig15) shows only a few microservices.
    For any enterprise application of considerable size, this is not the case. There
    can be a number of microservices, starting at over a dozen and reaching the hundreds
    in number. Unlike how the name “microservices” sounds, microservices are not simple.
    They are far more complex than the traditional monolith, and in fact have all
    the complexities of the monolith. So, the decision to adopt microservices is to
    be taken with care. Microservices are not an option if the enterprise’s development
    team doesn’t have experienced guides. The scenario is changing as you read this
    book, since tool vendors and cloud providers are coming out with new offerings;
    once these offerings mature, they should hide a lot of the outer architecture
    complexities from developers.'
  raw: '### The Inner Architecture Perspective


    Since microservices are independent, autonomous, and self-encompassing packages
    deployable to their own process space, they are to be complete in terms of its
    own architecture. Figure [4-5](#477630_1_En_4_Chapter.xhtml#Fig5) shows that microservices
    host their own presentation, business, and data components and also hosts their
    own messaging infrastructure. Hence all or most of the architectural concerns
    in terms of separation of concerns, layering, and interface-oriented design still
    exist and should be dealt with in the architecture of each and every microservice;
    this is the “inner architecture” of a microservice.


    Gartner has four examples to explain the inner architecture of microservices:


    *   Simple/Scaled


    *   Complex/Scaled


    *   Externalized Persistence


    *   Command Query Responsibility Segregation


    Figure [4-12](#477630_1_En_4_Chapter.xhtml#Fig12) represents these example scenarios
    schematically. Let’s cover these example scenarios with suitable analogies so
    that the concept is clear and so you understand the options available and the
    complexities involved.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Microservices inner architecture examples


    *   **Simple/Scaled**: These microservices are stateless and don’t require persistence
    services. They are used to perform compute-intensive jobs. Figure [4-12](#477630_1_En_4_Chapter.xhtml#Fig12)
    shows a tax calculation or a discount or an offer calculation as examples of such
    microservices where the computation is done based on the parameters passed to
    the microservice API.


    *   **Complex/Scaled**: In this example, the persistence service is an integral
    part of the microservice. When scaled out, multiple instances of the microservice
    can be instantiated and all of them have to get data from the same persistence
    service. This means, if data is modified by any of the instances, the change data
    has to be propagated to the other instances too and this can be best achieved
    by sending events. For increased scalability, the services are stateless so that
    requests can be routed to any instance irrespective of which instance the just
    previous request from the same client is routed.


    *   **Externalized Persistence**: This middle approach does use a persistence
    service, but it is external to the microservice. Even monolith architectures with
    increased maturity use a similar architecture. Here the data persisted is scoped
    and isolated to the microservice that owns it, so that it can also be deployed
    similar to the Complex/Scaled topology.


    *   **Command Query Responsibility Segregation (CQRS)** : This system is used
    to achieve high throughput. This is an extension of either the Complex/Scaled
    or the Externalized Persistence, but the main difference is that the write and
    read parts of the data persistence are separated. Unlimited instances of the microservice
    can be instantiated to handle the read part, thus achieving the highest degree
    of throughput. But when it comes to the write part, the state changes must be
    propagated to the other instances of the read part and this can be best achieved
    again by sending events.


    You will revisit the inner architecture again when I introduce the working e-commerce
    application in later chapters. For the purpose of brevity, I will use a simple
    notation to distinguish between the inner architecture and the outer architecture,
    shown in Figure [4-13](#477630_1_En_4_Chapter.xhtml#Fig13). This notation will
    be followed in our further discussions.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    Microservices architecture notation


    ### The Outer Architecture Perspective


    I mentioned that due to the Inversion of Architecture, many of the concerns that
    used to be solved at the inner architecture level of the monolith have now become
    the outer architecture concerns. Figure [4-14](#477630_1_En_4_Chapter.xhtml#Fig14)
    attempts to show schematically the concerns we need to address at the outer architecture
    level of a microservice. Microservices interact with each other and this chattiness
    between process spaces increases the overall complexity. Concerns like fault tolerance,
    graceful retry, and alternate code execution are few among them and this necessitates
    strong management, monitoring, and control of microservices at its outer architecture
    level. The goal is to achieve agility of delivery, flexibility of deployment,
    and the precision of scalability in a microservices architecture. In order to
    do this, a new set of concerns must be addressed and this increases the complexity
    of microservices manyfold compared to that of a monolith.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    Microservices outer architecture


    In a monolith, security can be easily controlled through a single controller whereas
    in a microservices architecture, since many services distributed in the network
    need to talk to each other to provide complete business capability, security is
    dispersed and has to be controlled at every microservice level. End-to-end logging
    and tracing is another aspect whose importance increases manyfold in the microservices
    architecture, since a call graph can span across many microservices. To aid seamless
    addition and retirement of microservice instances, dynamic service registration
    and discovery are required. Similarly, auto scale and auto deploy are new Dev
    Ops concerns to make the microservices cloud native and web scale.


    ### The Big Picture of MASA


    Having discussed the separation between the inner architecture and outer architecture
    concerns of microservices, it is time now to look at the big picture.


    Figure [4-15](#477630_1_En_4_Chapter.xhtml#Fig15) combines the inner architecture
    and the outer architecture of microservices to provide a view of a typical Mesh
    App and Services Architecture . Microservices interact with their environment
    and with other microservices, leveraging the outer architecture provisions, whereas
    each of the microservices’ ability to scale selectively is built and managed using
    its inner architecture organization.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg)


    Figure 4-15.


    The outer architecture of microservices


    Figure [4-15](#477630_1_En_4_Chapter.xhtml#Fig15) shows only a few microservices.
    For any enterprise application of considerable size, this is not the case. There
    can be a number of microservices, starting at over a dozen and reaching the hundreds
    in number. Unlike how the name “microservices” sounds, microservices are not simple.
    They are far more complex than the traditional monolith, and in fact have all
    the complexities of the monolith. So, the decision to adopt microservices is to
    be taken with care. Microservices are not an option if the enterprise’s development
    team doesn’t have experienced guides. The scenario is changing as you read this
    book, since tool vendors and cloud providers are coming out with new offerings;
    once these offerings mature, they should hide a lot of the outer architecture
    complexities from developers.'
  trans: '

    ### 内部架构视角


    由于微服务是独立、自治且自包含的软件包，可部署到各自的进程空间中，因此它们在自身架构上必须是完整的。图 4-5 展示了微服务拥有自己的表示层、业务层和数据组件，同时也拥有自己的消息传递基础设施。因此，在关注点分离、分层和面向接口设计方面，所有或大部分架构关注点仍然存在，并且应在每个微服务的架构中加以处理；这就是微服务的“内部架构”。


    Gartner 提供了四个示例来解释微服务的内部架构：


    *   **简单/可扩展**

    *   **复杂/可扩展**

    *   **外部化持久化**

    *   **命令查询职责分离**


    图 4-12 以示意图形式展示了这些示例场景。让我们通过合适的类比来介绍这些示例场景，以便清晰理解概念，并了解可用的选项及其涉及的复杂性。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg](img/477630_1_En_4_Fig12_HTML.jpg)


    图 4-12.


    微服务内部架构示例


    *   **简单/可扩展**：这些微服务是无状态的，不需要持久化服务。它们用于执行计算密集型任务。图 4-12 将税务计算、折扣计算或优惠计算作为此类微服务的示例，其计算基于传递给微服务
    API 的参数进行。


    *   **复杂/可扩展**：在此示例中，持久化服务是微服务的一个组成部分。进行扩展时，可以实例化微服务的多个实例，并且所有这些实例都必须从同一个持久化服务获取数据。这意味着，如果任何实例修改了数据，则变更后的数据也必须传播到其他实例，而实现这一目标的最佳方式是通过发送事件。为了增强可扩展性，服务是无状态的，这样请求可以路由到任何实例，而不管来自同一客户端的上一个请求被路由到了哪个实例。


    *   **外部化持久化**：这种中间方法确实使用了持久化服务，但它位于微服务外部。即使是成熟度较高的单体架构也会使用类似的架构。在这里，持久化的数据被限定并隔离在拥有它的微服务范围内，因此它也可以像复杂/可扩展拓扑一样进行部署。


    *   **命令查询职责分离 (CQRS)**：该系统用于实现高吞吐量。它是复杂/可扩展或外部化持久化方案的扩展，但主要区别在于数据持久化的写入和读取部分被分离了。可以实例化无限数量的微服务实例来处理读取部分，从而实现最高程度的吞吐量。但在写入部分，状态变更必须传播到读取部分的其他实例，而实现这一目标的最佳方式同样是发送事件。


    在后续章节介绍实际运行的电子商务应用时，我将再次回顾内部架构。为简洁起见，我将使用一种简单的表示法来区分内部架构和外部架构，如图 4-13 所示。在后续讨论中，我们将沿用这种表示法。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg](img/477630_1_En_4_Fig13_HTML.jpg)


    图 4-13.


    微服务架构表示法


    ### 外部架构视角


    我提到过，由于架构反转，许多过去在单体内部架构层面解决的问题，现在已成为外部架构的关注点。图 4-14 试图以示意图形式展示我们在微服务外部架构层面需要处理的关注点。微服务之间相互交互，这种进程空间之间的频繁通信增加了整体复杂性。容错、优雅重试和备用代码执行等关注点只是其中的一部分，这要求在微服务的外部架构层面进行强有力的管理、监控和控制。目标是在微服务架构中实现交付的敏捷性、部署的灵活性和扩展的精确性。为此，必须处理一系列新的关注点，这使得微服务的复杂性相比单体架构成倍增加。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg](img/477630_1_En_4_Fig14_HTML.jpg)


    图 4-14.


    微服务外部架构


    在单体架构中，可以通过单个控制器轻松控制安全性；而在微服务架构中，由于分布在网络中的许多服务需要相互通信以提供完整的业务能力，安全性是分散的，必须在每个微服务级别进行控制。端到端的日志记录和追踪是另一个方面，其在微服务架构中的重要性成倍增加，因为一个调用图可能跨越多个微服务。为了支持微服务实例的无缝添加和退役，需要动态服务注册和发现。同样，自动扩展和自动部署是新的
    DevOps 关注点，旨在使微服务实现云原生和网络规模。


    ### MASA 全景图


    在讨论了微服务的内部架构和外部架构关注点之间的区别之后，现在是时候看看全景图了。


    图 4-15 结合了微服务的内部架构和外部架构，提供了典型网格应用和服务架构的视图。微服务利用外部架构提供的功能与其环境及其他微服务进行交互，而每个微服务选择性扩展的能力则是通过其内部架构组织来构建和管理的。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg](img/477630_1_En_4_Fig15_HTML.jpg)


    图 4-15.


    微服务外部架构


    图 4-15 只展示了少数几个微服务。对于任何规模可观的企业应用而言，情况并非如此。微服务的数量可能从十几个起步，达到数百个之多。与“微服务”这个名称给人的印象不同，微服务并不简单。它们比传统的单体架构复杂得多，实际上包含了单体架构的所有复杂性。因此，采用微服务的决策需要谨慎做出。如果企业的开发团队没有经验丰富的指导者，微服务就不是一个可选方案。当你阅读本书时，情况正在发生变化，因为工具供应商和云服务提供商正在推出新的产品；一旦这些产品成熟，它们应该能为开发者隐藏许多外部架构的复杂性。

