    preferably in the Chrome browser:\n\n```\nch08\\ch08-03\\ProductWeb\\src\\main\\\
    resources\\product.html\n```\n\nUpon loading itself, the browser client will fire\
    \ a request to\nProduct Web, listening in port 8081, which will delegate the calls\
