- fmt: 'While the `main()` method uses Spring Boot’s `SpringApplication.run()` method
    to launch an application, Spring Boot internally spins up Spring Data JPA to create
    concrete implementation classes of the `ProductRepository` and `ProductCategoryRepository`
    and configure it to integrate to the back-end database using JPA.


    ## Build and Package the Spring Boot Application


    The Spring Boot style is to build and package the example by creating a completely
    self-contained executable JAR file that you can run in production. As explained
    the “Microservices Are Self-Contained” section in Chapter [3](#477630_1_En_3_Chapter.xhtml),
    executable JARs are also called fat JARs and are archives that contain your compiled
    classes along with all of the other JAR dependencies that your code needs to run,
    which gets resolved when you interpret your POM dependency. `ch07-01\pom.xml`
    contains the Maven scripts required to build run the samples. Make sure MongoDB
    is up and running. You may want to refer to Appendix A to get started with MongoDB.


    You will first build and package the executables into a single JAR file:


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>build

    D:\binil\gold\pack03\ch07\ch07-01>mvn clean package -Dmaven.test.skip=true

    ```


    This will generate the executable JAR in the target folder. One caveat is that
    when you execute the above Maven scripts, it will also execute the test cases
    by default, so you disabled it by skipping.


    You may want to note the following two files, which you can use to customize many
    runtime parameters, which have been kept blank in the `samples` folder in your
    case:


    ```

    ch07-01\src\main\resources\application.properties

    ch07-01\src\test\resources\test.properties

    ```


    Also, to fast-track your development cycle, when you want to just compile all
    Java files including your test classes, you may use the following command:


    ```

    cd ch07-01

    ch07-01>mvn clean test-compile

    ```


    If you want to package your executable artifacts but do not want to build or execute
    your test classes, you may use the following command:


    ```

    cd ch07-01

    ch07-01>mvn clean package -Dmaven.test.skip=true

    ```


    ## Run and Test the Spring Boot Application


    In the Windows command prompt where the mongo shell is connected to a running
    `mongod` instance, you may want to first clean up any required collections:


    ```

    > show collections

    product

    productCategory

    > db.productCategory.drop()

    true

    > db.product.drop()

    true

    > show collections

    >

    ```


    You can now run the Spring Boot application in more than one way. The straightforward
    way is to execute the JAR file via the following commands:


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>run

    D:\binil\gold\pack03\ch07\ch07-01>rem java -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    D:\binil\gold\pack03\ch07\ch07-01>mvn spring-boot:run

    ```


    Once the application is up, it will have created the required collections in the
    mongodb:


    ```

    > show collections

    product

    productCategory

    >

    ```


    You can now test the application. You can use any REST client you wish. You may
    use the cURL tool to quickly execute commands against the server. Refer to Appendix
    D to get an overview on how to execute commands using cURL. You can now find what
    the server has to offer; see Listing [7-7](#477630_1_En_7_Chapter.xhtml#PC14).


    ```

    $ curl http://localhost:8080

    {

    "_links": {

    "categories": {

    "href": "http://localhost:8080/categories{?page,size,sort}",

    "templated": true

    },

    "products": {

    "href": "http://localhost:8080/products{?page,size,sort}",

    "templated": true

    },

    "profile": {

    "href": "http://localhost:8080/profile"

    }

    }

    }

    Listing 7-7

    GET HTTP Request Using cURL

    ```


    Refer to Appendix D to view a more exhaustive set of cURL commands that will be
    handy throughout the rest of this book. Figure [7-3](#477630_1_En_7_Chapter.xhtml#Fig3)
    shows how to use cURL in a Unix-based environment to invoke basic REST operations.


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig3_HTML.jpg)


    Figure 7-3

    GET HTTP request using cURL


    Listing [7-7](#477630_1_En_7_Chapter.xhtml#PC14) shows a products link located
    at `http://localhost:8080/products`. It has a few options such as `?page`, `?size`,
    and `?sort`. There are other links, which you may retrieve and understand.


    Spring Data REST uses the Hypertext Application Language (HAL) format for JSON
    output. It is flexible and offers an easy and convenient way to supply links adjacent
    to the data that is served. HAL will make your API explorable and its documentation
    easily discoverable from within the REST API itself. The easiest way to test these
    links is to use the Postman tool. You may want to explore the following links
    using Postman:


    ```

    http://localhost:8080/profile

    http://localhost:8080/profile/products

    http://localhost:8080/profile/categories

    ```


    Figure [7-4](#477630_1_En_7_Chapter.xhtml#Fig4) shows what it looks like when
    you execute the GET on the link `http://localhost:8080/profile/products` in Postman.


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig4_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig4_HTML.jpg)


    Figure 7-4

    GET HTTP request using Postman


    Alternatively, you can now execute the Junit tests using Maven. The tests are
    provided in the folder named `ch07-01\src\test\java\com\acme\ch07\ex01\product`.
    The tests directly access the Mongo repository and do data operations. See Listing
    [7-8](#477630_1_En_7_Chapter.xhtml#PC16).


    ```

    public class ProductRepositoryTest {

    @Autowired

    private ProductRepository productRepository;

    @Before

    public void setUp(){

    productRepository.deleteAll();

    }

    @Test

    public void testAddProduct(){

    productRepository.save(createProject());

    assertTrue("successfully saved",true);

    }

    @Test

    public void testFindAllProducts(){

    productRepository.save(createProject());

    List productList = productRepository.findAll();

    assertTrue(productList.size()>0);

    }

    @Test

    public void testProductByProductCategory(){

    Product product = createProject();

    productRepository.save(product);

    List productList =

    productRepository.findByProductCategoryName(

    product.getProductCategoryName());

    assertTrue(productList.size()>0);

    }

    }

    Listing 7-8

    Junit Testing the Mongo Repository (ch07\ch07-01\src\test\java\com\acme\ch07\ex01\product\ProductRepositoryTest.java)

    ```


    To execute the tests, assuming your Spring Boot application is already up, execute
    the following command:


    ```

    cd ch07-01

    D:\binil\gold\pack03\ch07\ch07-01>test

    D:\binil\gold\pack03\ch07\ch07-01>mvn test

    ```


    ## Developing Using the Spring HAL Browser, HATEOAS


    A very convenient aspect of the hypermedia-driven REST interface is how you can
    discover all the RESTful endpoints using cURL (or whatever REST client you are
    using). There is no need to exchange a formal contract or interface document with
    your customers prior to the method invocation (query), if each response also provides
    information on what options are available next for the user to act on. The HAL
    format provides a consistent and easy way to hyperlink between resources in your
    API. HAL will make your REST API explorable, and its documentation is easily discoverable
    from within the API itself. This will make your API easier to work with in both
    manual and machine-readable mode and therefore more attractive to client developers.
    HATEOAS (Hypertext As The Engine Of Application State) is a REST pattern where
    the navigation links are provided as part of the response payload. The client
    can then determine the state and follow the transition URLs provided as part of
    that state. Open source libraries available for most major programming languages
    are available in HAL, so APIs that adopt HAL can be easily served and consumed
    in multiple platforms and programming languages. It’s so simple that you can just
    deal with it as you would with any other JSON.'
