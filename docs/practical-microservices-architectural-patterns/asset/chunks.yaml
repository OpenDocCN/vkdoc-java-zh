    MongoDB 是一款开源文档数据库，其服务器遵循自由软件基金会发布的 GNU AGPL v3.0 许可协议，具备高性能、高可用性和自动扩展能力。您可以从
    [`www.mongodb.com/`](http://www.mongodb.com/) 下载 MongoDB。


    在本节中，您将了解以下内容：


    *   MongoDB 简介

    *   如何下载、安装和配置 MongoDB

    *   如何启动 MongoDB 服务器

    *   如何连接 MongoDB 服务器

    *   如何对 MongoDB 服务器执行基本操作

    *   如何安装和使用 MongoDB 的 UI 工具 Robomongo


    MongoDB 简介

    MongoDB 是一种文档数据库，其记录是结构化的文档。由于文档是结构化的，因此它由字段和值对组成的数据结构。MongoDB 文档遵循类似于 JSON（JavaScript
    对象表示法）对象的结构。作为字段的值，MongoDB 文档可以包含其他文档、数组和/或其他文档的数组。


    MongoDB 文档


    以下是一个 MongoDB 文档示例，以便您了解其结构：


    ```

    {

    name: "bob",

    class: 2,

    division: "B",

    subjects: ["english", "science", "maths"]

    }

    ```


    由于 MongoDB 文档可以包含其他文档和其他文档的数组，因此其数据结构是可扩展的。此外，MongoDB 文档与编程语言中的数据类型是同义词。


    安装和配置 MongoDB

    在本节中，您将下载 MongoDB 社区版。您还将安装和配置它，然后测试安装。


    下载 MongoDB 社区版

    您可以在 [`www.mongodb.com/download-center`](http://www.mongodb.com/download-center)
    下载 MongoDB。详细的安装说明也可以在 [`https://docs.mongodb.com/manual/tutorial/install-mongodb-on-windows/`](https://docs.mongodb.com/manual/tutorial/install-mongodb-on-windows/)
    找到。MongoDB 安装文件可以在 [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads)
    找到。


    您必须拥有 Windows Server 2008 R2、Windows Vista 或更高版本才能安装 MongoDB 社区版。`.msi` 安装程序包含
    MongoDB 所需的所有软件依赖项，并且如果您的机器上安装了旧版本的 MongoDB，它也会自动升级。参见图 A-1。


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig1_HTML.jpg](img/477630_1_En_20_Fig1_HTML.jpg)


    图 A-1

    MongoDB 社区服务器安装程序


    安装和配置 MongoDB


    下载 MongoDB 安装文件后，在 Windows 资源管理器中找到下载的 MongoDB `.msi` 文件，该文件通常位于默认的 `Downloads`
    文件夹中。双击 `.msi` 文件后，将出现一组屏幕，引导您完成安装过程。尽管您可以选择任何位置，例如


    ```

    C:\Program Files\MongoDB\Server\3.2\

    ```


    但我明确避免在路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig2_HTML.jpg](img/477630_1_En_20_Fig2_HTML.jpg)


    图 A-2

    MongoDB 安装文件夹


    ```

    D:\Applns\MongoDB\Server\3.2.6

    ```


    MongoDB 服务器需要一个数据目录来存储所有数据（图 A-2）。您可以从您选择的任何文件夹运行 MongoDB。MongoDB 的默认数据目录路径是启动
    MongoDB 的驱动器上的绝对路径 `\data\db`。您可以通过在 Windows 命令提示符中运行以下命令来创建此文件夹：


    ```

    md D:\Applns\MongoDB\Server\3.2.6\data

    ```


    开始使用 MongoDB

    在本节中，您将连接到已安装的 MongoDB 服务器并执行基本数据操作。


    启动并连接 MongoDB


    您现在可以使用以下命令启动 MongoDB：


    ```

    D:\Applns\MongoDB\Server\3.2.6\bin\mongod.exe --dbpath D:\Applns\MongoDB\Server\3.2.6\data

    ```

