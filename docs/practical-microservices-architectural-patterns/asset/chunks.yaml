    REST Controller (ch08\\ch08-03\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\\
    product\\controller\\ProductRestController.java)\n```\n\nAs you can see in Listing\
    \ [8-11](#477630_1_En_8_Chapter.xhtml#PC22),\nProductRestController simply delegates\
    \ the call to the\nProductServerComponent. In ProductServerComponent, you mark\
