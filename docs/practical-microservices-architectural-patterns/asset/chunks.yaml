- fmt: '4. At this stage, if the request requires data from any protected resources,
    the API gateway will first need to contact the security server or the authorization
    server, where user authentication and authorization happen.


    5. Once authenticated and authorized, the API gateway contacts the microservice
    to retrieve any back-end data and pushes the data alone as a response back to
    the browser where the content gets rendered again.


    Here again, at the end of Step 3 at the API gateway, user authentication and authorization
    must be orchestrated and the end result of that is sent to the API gateway where
    it can cache or store the status of the authentication and authorization steps
    associated with the user. From then onwards, for every subsequent click and action
    of the end user from the browser, when the request hits the API gateway, if it
    requires protected resources, the API gateway can retrieve the status of the authentication
    and authorization steps associated with the user for that request and make decisions
    or route requests to other back-end resource servers. The status of the authentication
    and authorization steps cached or stored in the API gateway is safe since it is
    stored within the DMZ with strict controls enforced by the enterprise in terms
    of security and access control.


    ## Client App with No Server


    Another variant possible is a case where the complete web app (or the SPA), once
    downloaded, will then continue executing completely from within the browser, in
    which case there is no presentation tier, or business tier for that matter. In
    short, there is no server-side counterpart of the web app in the browser. There
    can be a scenario where the web app will still need to access some protected resource;
    however, this time it’s from a third party, as shown in Figure [18-4](#477630_1_En_18_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig4_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig4_HTML.jpg)


    **Figure 18-4.** Web app without a server


    There are more variants of deployment options available, but let’s stick to the
    scenarios explained earlier.


    ## The Authorization Code Grand Types


    There are several grand types defined by OAuth; however, I will limit this discussion
    to the authorization code grant type, since it is suitable for OAuth clients that
    can keep their client credentials confidential when authenticating with the authorization
    server. For the microservices scenarios, the API gateway is the “client” implemented
    on a secure server. As a redirection-based flow, this OAuth client must be able
    to interact with the user agent of the resource owner and also must be able to
    receive incoming requests through redirection from the authorization server.


    Let’s look at an authorization code grant type sequence of flows, with the example
    you are going to visit in the next section in mind. See Figure [18-5](#477630_1_En_18_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig5_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig5_HTML.jpg)


    **Figure 18-5.** OAuth authorization code grant type


    Referring to Figure [18-5](#477630_1_En_18_Chapter.xhtml#Fig5), the typical sequence
    of interactions for an end-to-end authorization flow in accessing a protected
    resource can be summarized as follows:


    1. The end user types the URL in the browser.


    2. The presentation tier component, usually a SPA web app, is downloaded into
    the browser and the first page or the default page is rendered. SPA resources
    (HTML+CSS+scripts) are loaded only once throughout the lifespan of the application.
    Further, only data is transmitted back and forth.


    3. Further user clicks and actions from the browser get intercepted by the API
    gateway. The API gateway is the OAuth client. Since the API gateway is a secure
    server-side microservice, it can keep its client credentials confidential when
    authenticating with the authorization server.


    4. At this stage, if the request requires data from any protected resources, the
    API gateway initiates the flow by directing the user agent of the resource owner
    to the authorization endpoint. While doing that, the OAuth client includes its
    client identifier, requested scope, local state, and a redirection URI. Once the
    access to the protected resource is allowed or denied, the authorization server
    sends the user agent back to the redirection URI indicated by the client.


    5. The authorization server usually requires the user to authenticate as a first
    step. This step is required to assert if the one who is claiming to be the resource
    owner is in fact the actual resource owner and what rights they’re allowed to
    delegate to the client. The authorization server can be the same server as the
    resource server or a separate entity.


    6. The authorization server authenticates the resource owner through the user
    agent. The user’s authentication passes directly between the user (through the
    user agent) and the authorization server, so it’s never seen by the client.


    7. Authentication may be done by looking at an internal authentication server.
    OAuth doesn’t dictate any specific authentication technology, and the authorization
    server is free to choose methods such as a username/password pair, cryptographic
    certificates, security tokens, single-sign-on, or any of the other possibilities.


    8. Once the resource owner grants access, the OAuth client uses the redirection
    URI provided in Step 4 to redirect the user agent back to the OAuth client. The
    redirection URI also includes an authorization code and any local state previously
    provided by the OAuth client.


    9. Now that the client has the authorization code, it can send it back to the
    authorization server on its token endpoint. The OAuth client also includes the
    redirection URI used to obtain the authorization code for verification.


    10. The authorization server validates the client credentials and the authorization
    code. The server also ensures that the redirection URI received matches the URI
    used to redirect the client in Step 3. If the authorization code is valid, has
    not been used previously, and the client making this request is the same as the
    client that made the original request, the authorization server generates and
    returns a new access token for the client. A single authorization server may issue
    access tokens accepted by multiple resource servers.


    11. With the token in hand, the client can present the token to the resource server
    (protected resource).


    12. The resource server can check with the token validation end point of the authorization
    server.


    13. If the token presented in the previous step is valid, the resource server
    can return the protected resources to the client.


    14. The client can return this protected resource back to the SPA web app as a
    response to the user click in Step 3.


    ## Tokens for Scalable API Invocations


    Having looked at the dynamics of a typical authorization grand type OAuth flow,
    you should now look at some aspects of this security schema with respect to microservices
    architecture, especially in terms of scalability and security of the token themselves.'
