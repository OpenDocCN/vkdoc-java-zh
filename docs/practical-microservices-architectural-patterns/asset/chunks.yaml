    微服务命令窗口中发生的日志来验证这一点。如果你关闭其中一个 Product Server 微服务并刷新浏览器，你将看到请求将始终发送到正在运行的另一个 Product
    Server 实例。如果你重新启动之前关闭的 Product Server 微服务，Ribbon 负载均衡将再次生效，在 Product Web 微服务向
    Product Server 微服务的两个实例之间交替进行调用。


    Eureka：服务注册中心

    Eureka 是一个基于 REST 的注册中心服务，主要用于公有云部署，尤其是在 AWS 云中。使用 Eureka，你可以定位微服务以实现负载均衡和故障转移。Eureka
    是 Spring Cloud 的服务注册中心，它充当了微服务的电话簿。每个微服务都会向服务注册中心自我注册，告知注册中心它的位置（主机、节点名称、端口等）以及可能还有其他服务特定的元数据。Eureka
    包含两部分：Eureka Server 和一个客户端组件 Eureka Client，后者使得与注册中心服务的交互更加容易。该客户端还内置了一个负载均衡器，可以执行基本的轮询负载均衡。


    像 Eureka 这样的服务注册中心还有另一个特性，它为服务消费者提供了一层或多层间接寻址。这意味着服务消费者可以使用逻辑服务名称进行注册中心查找，并且这个逻辑服务名称可能映射到不同的实际部署服务，其物理地址条目与上述逻辑名称相对应。这使服务消费者与物理部署环境中实际服务细节或任何其他变化隔离开来。在“Ribbon”部分解释的示例中，你可能已经注意到服务
    URL 的硬编码值，例如：


    ```

    localhost:8080,localhost:8081

    ```

