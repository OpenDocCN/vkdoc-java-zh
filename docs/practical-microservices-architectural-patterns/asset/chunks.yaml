    如果你在事务性命令处理器中处理多个聚合根，Axon 3 会报错。这意味着清单 19-12 和清单 19-13 的组合在 Axon 3 中难以正常工作。让我们对电商微服务
    Ecom-core 的设计稍作重构。


    清单 19-14 展示了以分布式方式连接命令总线和事件总线所需的最低配置。在代码中，你为命令总线附加了一个事务管理器，并为事件队列附加了一个 Saga 事件处理器。


