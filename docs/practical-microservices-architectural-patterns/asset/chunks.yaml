    ## Develop a RESTful Web Service


    REST (Representational State Transfer) is an architectural style for designing
    distributed systems which was introduced by Roy Fielding in his doctoral dissertation
    in the year 2000. REST is a generic set of constraints applied to resources; however,
    it is commonly associated with HTTP. This section will introduce REST concepts
    and you will look at a complete implementation of a complete REST provider as
    well as a REST consumer using Spring Boot.


    ### REST Basics


    REST recommends a set of constraints, such as being stateless, having a client/server
    relationship, providing a uniform interface, request-response cycles being idempotent,
    and so on. REST is not strictly related to HTTP, but it is most commonly associated
    with it.


    Summarized below are the principles of REST:


    * Resources expose URIs, which are easily understood and directory-like structures,
    so that they are discoverable, linkable, and traversable.

    * Representations transfer JSON or XML as wire-level formats to represent data
    objects and attributes.

    * Operations or messages use HTTP methods explicitly (for example, GET, POST,
    PUT, and DELETE).

    * Operations are stateless so that you store no client context on the server between
    requests. The client only holds session state so that when the number of clients
    increases, the server''s scalability is not compromised by state data in big volumes.


    There are other advantages if you use REST. One main advantage is that intermediaries
    like caches and proxies can provide cache hits so that the actual resource server
    is not stressed unless required. A cache server is a specialized proxy server
    that will help you improve web performance. Web performance can be improved either
    at the client end or at the server end or even between other intermediaries. Adhering
    to REST HTTP standards and gestures will help you leverage these optimizations,
    which you get freely since HTTP is a standard and many devices have provisions
    to configure for these optimizations.


    ### HTTP Methods for CRUD Resources


    The main methods in HTTP you can leverage for implementing REST are listed here:


    * **GET**: GET is the simplest HTTP operation and its intention is to retrieve
    a resource from the server. `200 OK` is the status code for a successful operation.
    All GET operations should be idempotent, which means regardless of how many times
    you repeat the operation with the same parameters, there should not be any change
    in state for the resource.

    * **POST**^([(12)](#fn12)): HTTP POST provides an option for clients to send information
    to the server. POST is recommended for creating a new resource (even though it
    can also update an existing resource).

    * **PUT**: HTTP PUT also provides an option for clients to send information to
    the server; however, the usage semantics of PUT are slightly different from that
    of POST as per HTTP. Using PUT, you can send a "new object" to the server to be
    put or placed at a location in the server represented by the URI, so the intent
    should be to replace the resource with a new one. A PUT request is idempotent
    as far as a single client is concerned. If only a subset of data elements is provided
    in a PUT request, the rest will be replaced with empty or null.

    * **DELETE**: DELETE provides clients an option to remove a resource from the
    server. The URI identifies the resource to be deleted. The resource may not have
    to be removed immediately; instead it could be done by an asynchronous or long-running
    operation behind the scenes.


    ### Develop a REST Controller in Spring Boot


    You will use the same `Product` entity described in previous sections to build
    a fully functional REST service to do CRUD operations. Spring''s approach in building
    RESTful web services is to use a controller to handle HTTP requests. Listings
    [7-13](#477630_1_En_7_Chapter.xhtml#PC25) through [7-16](#477630_1_En_7_Chapter.xhtml#PC28)
    show the complete code for building a HATEOS-based REST controller using Spring.
    Listing [7-13](#477630_1_En_7_Chapter.xhtml#PC25) shows how a product with a particular
    ID can be retrieved. The `@RequestMapping` annotation ensures that HTTP requests
    to `/products/{id}` are mapped to the `getProduct()` method.


    ```java

    @RestController

    public class ProductRestController {

    @Autowired

    private ProductRepository productRepository;

    @RequestMapping(value = "/products/{id}", method = RequestMethod.GET,

    produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("id") String id) {

    Product product = productRepository.findOne(id);

    if (product == null) {

    return new ResponseEntity>(HttpStatus.NOT_FOUND);

    }

    Resource productRes = new Resource(product,

    linkTo(methodOn(ProductRestController.class).getProduct(

    product.getId())).withSelfRel());

    return new ResponseEntity>(productRes,

    HttpStatus.OK);

    }

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    List products = productRepository.findAll();

    Link links[] = {linkTo(methodOn(ProductRestController.class).

    getAllProducts()).withSelfRel(),linkTo(methodOn(

    ProductRestController.class).getAllProducts()).withRel(

    "getAllProducts")};

    if(products.isEmpty()){

    return new ResponseEntity>>(

    HttpStatus.NOT_FOUND);

    }

    List> list=new ArrayList> ();

    for(Product product:products){

    list.add(new Resource(product,

    linkTo(methodOn(ProductRestController.class).getProduct(

    product.getId())).withSelfRel()));

    }

    Resources> productRes =

    new Resources>(list, links) ;

    return new ResponseEntity>>(

    productRes, HttpStatus.OK);

    }

    }

    ```


