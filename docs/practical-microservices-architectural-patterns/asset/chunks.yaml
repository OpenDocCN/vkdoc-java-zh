  trans: '

    ### 网关


    让我们重新审视电商微服务应用。假设网页正在显示商品详情页，它不仅仅展示商品名称、描述和价格等基本信息，还会显示其他细节，例如：


    *   购物车中的商品数量

    *   订单历史

    *   库存不足警告

    *   配送选项

    *   各种推荐、评论和优惠


    所有这些信息都必须从各自不同的微服务中获取。在单体应用架构中，浏览器只需向应用发起一次 REST 调用（`GET` [`api.acme.com/productdetails/productId`](http://api.acme.com/productdetails/productId)）即可获取这些数据；而在微服务架构下，网页需要分别访问各个微服务。从浏览器直接访问多个微服务存在诸多挑战和限制。即使客户端尝试通过局域网发起如此多的请求，在互联网环境下也可能效率极低，尤其是在移动网络通信时，会面临严重的性能开销。此外，如果所有微服务都没有暴露对
    Web 友好的接口（它们并非强制要求这样做），这将是另一个挑战。更进一步，应用的扩展或演进可能需要对现有微服务进行拆分或合并，而这些内部变更应当对公开的 API
    进行屏蔽。


    API 网关可以在此处发挥作用。面向外部的 API 可以是粗粒度的，能够聚合来自多个内部微服务的响应，并一次性向客户端设备提供聚合后的响应。此外，这类外部
    API 还可以根据请求响应的客户端设备类型进行某种形式的转换。这些增值功能可以提供给 API 网关层，从而使其比传统的防火墙或负载均衡器更加智能。


    ### 以领域为中心的划分


    传统上，我们在满足应用的非功能性需求时，一直遵循“一刀切”的方法。这在应用扩展方面尤为明显。单体应用只能对其所有功能或模块边界进行统一扩展，而微服务原则则倡导基于业务领域来定义边界。


    如图 4-5 所示，在以技术为中心的方法中，应用的各层或各层级可以整体进行扩展。而在微服务方法中，由于每个微服务的边界是基于业务或功能领域定义的，并且这种边界定义在应用的物理组织中也显而易见，因此可以选择性地对功能或领域进行扩展。这种应对非功能性需求的选择性方法，还提供了针对每个微服务级别定义服务级别协议（如服务正常运行时间等）的灵活性。


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig5_HTML.jpg](img/477630_1_En_4_Fig5_HTML.jpg)


    图 4-5. 以技术为中心 vs. 以领域为中心


    在这个电商应用场景中，虽然商品、库存、订单和购物车微服务必须全年 365 天、全天候高度可用，以确保业务不中断，但像用户、配送、发货和订单历史等辅助微服务，则可以部署为具有较低可用性
    SLA 的服务。这是因为，如果用户微服务宕机，客户仍然可以浏览、添加到购物车，并通过手动输入地址、电子邮件、联系电话以及其他详细信息来确认新订单，而无需检索之前保存的用户资料。稍后，当用户微服务恢复上线时，系统总可以将这个“匿名订单”与系统中已存在的客户资料关联起来。其他模块也存在类似情况，稍后我们重新审视电商应用时，你将详细研究这些情况。


    ### 云原生转型


    长期以来，我们一直依赖专用基础设施来应对不断增长的业务需求，无论是采用横向扩展还是纵向扩展的理念。我们为网络连接添加冗余和更大的管道（InfiniBand），投资于工程系统（Exalogic）以增加计算能力，等等。最近的洞察和事件让企业架构师们睁开了眼睛，他们意识到这些系统存在局限性，并且迟早会受到这些局限性的制约。光纤提供的高吞吐量或内存计算提供的高性能，在图表初始阶段都能提供指数级的性能提升，但随后会达到极限，之后即使添加更多
    CPU 或带宽，也只能获得微小的改进。量子计算和类似技术的进步将改变这一局面，但同样，企业无法等到这些技术变得普及且成本合理。


    如今，公有云已经可用，其成本具有可比性且合理，甚至可能更便宜。像亚马逊和 Azure 这样的云平台提供商在数据中心配置了商用硬件，可以根据您的需求即时配置。当您的业务面临不可预测的超高速增长或超大规模需求时，云是一种相当正确的方法，既能控制总体成本，又能提供所需的敏捷性。我无意在此介绍云计算或云服务提供商（CSP）的特性，但我确实想讨论一下云原生的含义。


    在本地部署模型中，可用性策略和 SLA 管理由数据中心管理员掌控。当您迁移到公有云模型时，这些策略会被转换并抽象到应用栈的更高层级。在 CSP 提供的 IaaS（基础设施即服务）或
    PaaS（平台即服务）模型中，您对可用性或存储策略的控制力很弱，因此需要在应用栈层提供更好的控制和工具配置。您的软件层本身应该能够为您提供应对前所未有场景的钩子和控制手段。因此，为了让应用真正受益于
    CSP 的优势，应用本身应足够智能，能够从故障、资源不可用、流量突增等情况中恢复。云原生架构阐述了您在构建软件应用以在公有云环境中高效运行时需要采用的模式和最佳实践。


    ### 网络规模计算


    网络规模 IT 适用于任何规模的基础设施设计、部署和管理。利用网络规模 IT 的能力，企业或组织可以实现大规模扩展。在涉及网络规模 IT 时，IT 原则和实践是优先考虑的；当然，云、微服务和
    DevOps 实践需要特别提及。像谷歌、亚马逊、Facebook 和 Netflix 这样的公司在此值得一提，因为仅凭其业务性质，它们的 IT 系统和实践就属于这一类别。分布式一切、容错、自愈和
    API 驱动的方法只是围绕网络规模计算的几个原则。


    ## 不可或缺的云


    云旨在以相对较低的成本，以自主的方式提供分布式计算、存储和网络基础设施。基于云的架构可以基于多种模型（即 IaaS、PaaS 和 SaaS），合适的配置可以为客户带来灵活的环境。在云中，客户可以使用云的
    API 按需且近乎实时地分配资源。

