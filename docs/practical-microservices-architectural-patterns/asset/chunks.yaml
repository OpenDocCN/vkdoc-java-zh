  trans: '

    这种简单的横向扩展架构其实并不简单，但与你接下来要看到的架构相比，它确实更简单，因此得名。简单的横向扩展架构利用了区域、可用区和自动扩展组。每个区域是 AWS
    云中的一个独立地理区域。每个区域包含多个隔离的位置，称为可用区。


    Amazon EC2 提供了将实例和数据等资源部署到多个位置的能力。如果你将所有实例都托管在单个位置，一旦该位置受到严重影响，所有实例都将不可用。AWS 区域和可用区在此处能为你提供帮助。每个区域完全独立。每个可用区也是隔离的，但同一区域内的可用区通过低延迟链路相互连接。当你启动一个
    EC2 实例时，你可以选择一个可用区，或者让 AWS 为你选择。如果你将 EC2 实例分布到多个可用区，并且其中一个实例发生故障，同时你的应用程序设计得当，那么另一个可用区中的实例仍然可以处理请求。


    自动扩展可确保你有适当数量的 EC2 实例来应对应用程序的负载。你可以创建 EC2 实例的集合，称为自动扩展组。你可以为自动扩展组指定最小实例数，自动扩展会确保你的组永远不会低于此规模。你还可以指定每个自动扩展组中的最大实例数，自动扩展会确保你的组永远不会超过此规模。当你指定所需容量时，自动扩展会确保你的组在启动时拥有这么多实例。如果你指定了扩展策略，那么自动扩展可以根据应用程序的需求动态启动或终止实例。


    图 16-1 中的微服务实例必须进行复制以提高可扩展性。回顾图 16-2，同一个微服务的多个实例可以在一个可用区中实例化。为了应对某个可用区宕机的情况，可以在另一个可用区中实例化更多同一微服务的实例。为了处理微服务的动态扩展，你可以设计一个自动扩展组。这个自动扩展组可以跨可用区，这样你既能获得动态可扩展性，也能实现区域冗余。


    当你的计算节点像上面那样分布时，你还需要一种机制来分配你的工作负载，而弹性负载均衡器 (ELB) 可以自动将传入的应用程序流量分配到多个目标，例如 Amazon
    EC2 实例、容器和 IP 地址。ELB 可以处理单个可用区或跨多个可用区的应用程序流量的变化负载。ELB 有三种类型：


    *   应用程序负载均衡器：ALB 最适合对 HTTP 和 HTTPS 流量进行负载均衡，在 OSI 第 7 层（应用层）的单个请求级别运行。

    *   网络负载均衡器：NLB 对需要极致性能的 TCP 流量进行负载均衡，在 OSI 第 4 层（传输层）的连接级别运行。

    *   传统负载均衡器：CLB 适用于在 EC2-Classic 网络中构建的应用程序。它提供跨多个 Amazon EC2 实例的基本负载均衡，并在请求级别和连接级别运行。


    另一个需要讨论的方面是全局分发数据的需求。这可能有多种原因。一个原因是用户群分布在全球各地，因此用户应被引导到靠近其地理位置的微服务实例，以获得低延迟。另一个原因可能是为了遵守数据隐私要求，例如
    GDPR^(⁴⁰)（通用数据保护条例）。当你希望利用跨区域的微服务实例时，可以在此处利用 AWS 区域。这在图 16-2 中也以非展开形式进行了描绘。可以使用
    AWS Route 53 进行区域流量路由或基于延迟的流量路由。Amazon Route 53 是一种高可用且可扩展的云域名系统 (DNS) Web 服务。Route
    53 使你可以通过多种路由类型轻松地全局管理流量，包括基于延迟的路由、地理 DNS、地理邻近路由和加权轮询——所有这些都可以与 DNS 故障转移结合使用。


    图 16-2 中的简单横向扩展架构是对图 16-1 中简单初始架构的改进；然而，仔细观察图 16-2 会发现其他问题和限制。首先，跨区域的数据是分散的；它们不会自动同步。也许这正符合迫使你将应用程序分布到不同区域的原因，例如隐私。但是，让我们专注于一个区域内部。即使你可以设计拥有许多实例的微服务，你的后端数据存储仍然是一个单一实例，这是你的单一事实来源。这个单一的数据库实例仍然会存在前面讨论过的可扩展性问题。你需要进一步改进，这将在下一部分中看到。


    解决数据库瓶颈的架构

    你希望对简单横向扩展架构进行的改进也需要解决数据库实例的可扩展性问题。Oracle 真正应用集群 (RAC) 是一种具有共享缓存架构的集群数据库，它克服了传统无共享和共享磁盘方法的局限性，为数据库提供了高可扩展性和高可用性。在
    RAC 环境中，数据库本身在服务器池中共享，这意味着如果服务器池中的任何服务器发生故障，数据库将继续在幸存的服务器上运行，从而避免了任何单点故障。由于存在一个服务器池，集群数据库服务器的组合内存容量和处理能力也提供了高可扩展性。RAC
    是一种具有共享数据库存储的主动-主动分布式架构。共享存储在实现自动故障转移、无数据丢失、100% 数据一致性以及防止应用程序停机方面发挥着核心作用。


    在像 AWS 这样的公有云中，存在一个问题。截至撰写本文时，Amazon Web Services 目前不支持在 Amazon EC2 或 Amazon RDS
    上原生运行 Oracle RAC。Oracle RAC 有以下基础设施要求，而这些要求在 AWS 中无法直接获得：


    *   集群中所有节点均可访问的共享高性能存储

    *   集群中所有节点之间支持多播的网络

    *   用于不同类型流量的独立网络：客户端、集群互连和存储


    但好消息是，有第三方提供商提供的解决方案允许你使用 AWS 原生组件（例如 Amazon EC2、Amazon Elastic Block Store (Amazon
    EBS) 和 Amazon VPC）在 AWS 上运行 Oracle RAC。图 16-3 描绘了一种可能的架构方法，该方法利用 Oracle RAC 来改进简单的横向扩展架构。


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig3_HTML.jpg](img/477630_1_En_16_Fig3_HTML.jpg)

    '
- fmt: '# Figure 16-3

    ## Architecture to address a database bottleneck


    Referring to the architecture shown in Figure [16-3](#477630_1_En_16_Chapter.xhtml#Fig3),
    two or three node clusters are recommended for enhanced reliability. Clusters
    with four or more nodes can also be used for extra HA or performance. Grid infrastructure
    clusters with four or more nodes containing several two-node or three-node database
    clusters are possible. Nodes of a cluster can be in one availability zone or can
    be spread across availability zones.


    Most of the AWS regions are limited to three availability zones. Figure [16-3](#477630_1_En_16_Chapter.xhtml#Fig3)
    shows three RAC nodes. Placing the quorum nodes in the same availability zones
    as the RAC nodes still allows achieving most of the expected HA capabilities.
    Such a three-node cluster can tolerate the loss of any two nodes or the loss of
    any one availability zone without database downtime. However, simultaneous loss
    of two availability zones will cause database downtime. In configurations where
    local NVMe SSDs^([^(41)](#fn41)) are used instead of EBS (Elastic Block Storage)
    volumes, high redundancy ASM^([^(42)](#fn42)) (Automatic Storage Management) disk
    groups may be used to provide extra layer of data protection. In such cases, the
    third node is configured as a storage node with NVMe SSDs or EBS volumes instead
    of the quorum node. Placing instances in different availability zones eliminates
    the risk of simultaneous node failures, except for the unlikely event of a disaster
    affecting multiple data center facilities within a region.


    Having set up a cluster like that, the next step is to distribute load to the
    RAC cluster. The architecture leverages HA capabilities built into Oracle Clusterware,
    ASM, and Database. This is depicted in Figure [16-3](#477630_1_En_16_Chapter.xhtml#Fig3)
    where database calls originating from microservice instances within an availability
    zone can be routed to database instances in the pool across availability zones
    too. The trade-offs are higher network latencies and comparatively lower network
    bandwidth between the nodes. Is there further room for improvement?


    ## Independent Read and Write Scalability to Improve Efficiency


    In the RAC-based architecture you saw in the previous section, I discussed how
    to bring additional redundancy by extending RAC across multiple availability zones.
    When you do that, you also want to architecturally manage the higher network latencies
    and comparatively lower network bandwidth between the nodes. The architecture
    variation depicted in Figure [16-4](#477630_1_En_16_Chapter.xhtml#Fig4) shows
    one such option.


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig4_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig4_HTML.jpg)


    ## Figure 16-4

    ### Data architecture to improve read scalability


    There are many scenarios where the number of read requests or queries far exceeds
    the total number of write requests an application has to handle. You explored
    the aspect of the look to book ratio in Chapter [12](#477630_1_En_12_Chapter.xhtml).
    The architecture option in Figure [16-4](#477630_1_En_16_Chapter.xhtml#Fig4) uses
    the notion of primary and secondary (standby) database nodes. It uses Oracle Data
    Guard Replication^([^(43)](#fn43)) (ODGR) and Oracle Active Data Guard Replication
    (OADGR) to implement the concept of primary and standby. Distribution of the load
    across multiple availability zones is done by using Oracle Active Data Guard.
    Replicating with Active Data Guard allows you to use the replicated standby instances
    for read-only loads, allowing load distribution. This is evident in Figure [16-4](#477630_1_En_16_Chapter.xhtml#Fig4)
    where all read requests are routed to standby nodes in respective availability
    zones. By doing so, the primary node is not loaded with read requests from microservices
    across availability zones. Instead, all write requests can now be routed to the
    primary nodes. As shown in the architecture, write requests even from foreign
    availability zones can be routed to the primary node. Further, if the primary
    instance fails, this architecture rapidly switches over to the second instance
    in the same availability zone, making the database continuously available and
    preventing data loss. In cases where either the primary availability zone fails
    or both the primary and secondary instances in the primary availability zone fail,
    then this architecture switches over to a third instance in a secondary availability
    zone, thus keeping the database still available and preventing data loss. Use
    of Active Data Guard for replication allows the second and third instances to
    be simultaneously used for read-only workloads. A standby database is a transactionally
    consistent copy of an Oracle primary production database that is initially created
    from a backup copy of the primary database. Once the standby database is created
    and configured, Oracle Active Data Guard automatically maintains the standby database
    by transmitting primary database redo data to the standby system, where the redo
    data is applied to the standby database. Replication between the primary and the
    standby databases can be configured to be either synchronous or asynchronous.


    Oracle Data Guard does not support setting up read replicas because the physical
    standby database cannot be open for reads while, at the same time, archiving transactions
    from the primary database, since it can function either in managed-recovery mode
    or in read-only mode, but not in both modes at the same time. Oracle Active Data
    Guard built upon Oracle Data Guard is an option that allows for the setup of read
    replicas. In addition to the functionality described previously, Oracle Active
    Data Guard enables read-only access to the standby databases while at the same
    time being kept up to date by archiving transactions from the primary database.
    This allows you to run read queries and reports on the standby instances, and
    to perform your backups from a standby instance. It is typical to perform data
    backup in such architectures either by using EBS snapshots to Amazon S3 or using
    Oracle Recovery Manager^([^(44)](#fn44)) (RMAN) and Oracle Secure Backup Cloud
    Module (OSB).


    ## Sharding for Web Scale Architecture'
