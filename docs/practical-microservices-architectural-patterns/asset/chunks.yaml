    \ -jar .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\ncd ch08\\ch08-06\\\
    ProductServer\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\ProductServer>run2\nD:\\\
    binil\\gold\\pack03\\ch08\\ch08-06\\ProductServer>java -Dserver.port=8081 -Dspring.application.name=product-service\
    \ -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\\\
