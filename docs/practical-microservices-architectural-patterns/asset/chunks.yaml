- fmt: "# The `java.sql.Connection` Interface and Transactions\n\nThe `java.sql.Connection`\
    \ interface is a transactional resource that can wrap a database. By default,\
    \ a `Connection` object is in auto-commit mode, which means that it automatically\
    \ commits changes after executing each statement. If auto-commit mode is disabled,\
    \ the method `commit()` must be called explicitly in order to commit changes;\
    \ otherwise, database changes will not be saved. It is preferable to collect several\
    \ related statements into a batch and then commit all, or none, when you have\
    \ more than one statement. You do this by first setting the `Connection`'s `setAutoCommit()`\
    \ method to `false` and later explicitly calling `Connection.commit()` or `Connection.rollback()`\
    \ at the end of the batch. See Listing [13-1](#477630_1_En_13_Chapter.xhtml#PC2).\n\
    \n```\ntry{\n    connection.setAutoCommit(false);\n    Statement statement = conn.createStatement();\n\
    \    String insertString = \"insert into \" +  dbName + \".SHIPPING VALUES (\"\
    \n        + orderId + \", 'NEW')\";\n    statement.executeUpdate(insertString);\n\
    \    String updateString = \"update \" + dbName + \".ORDERS set STATUS =\n   \
    \     'PROCESSED' where ORDER_ID = \" + orderId;\n    statement.executeUpdate(updateString);\n\
    \    connection.commit();\n}catch(SQLException se){\n    connection.rollback();\n\
    }\nListing 13-1\nA Local Transaction Sample\n```\n\nIn Listing [13-1](#477630_1_En_13_Chapter.xhtml#PC2),\
    \ both the statements will be committed together or rolled back together. However,\
    \ it is a local transaction, not a distributed transaction.\n\n## Distributed\
    \ Transactions\n\nTypically for the scenario of a distributed transaction to exist,\
    \ it must span at least two resource managers. Databases, message queues, transaction\
    \ processing (TP) monitors like IBM’s CICS, BEA’s Tuxedo, SAP Java Connector,\
    \ and Siebel Systems are common transactional resources, and often, if the transactions\
    \ has to be distributed, it has to span a couple of such resources. A distributed\
    \ transaction can be seen as an atomic operation that must be synchronized (or\
    \ provide ACID properties) among multiple participating resources that are distributed\
    \ among different physical locations.\n\nJava EE application servers like Oracle\
    \ Weblogic and IBM Websphere support JTA out of the box, and there are third-party,\
    \ standalone implementations of JTA like:\n\n*   **JOTM:** JOTM is an open source\
    \ transaction manager implemented in Java. It supports several transaction models\
    \ and specifications providing transaction support for clients using a wide range\
    \ of middleware platforms (J2EE, CORBA, Web Services, OSGi).\n\n*   **Narayana:**\
    \ Narayana, formerly known as JBossTS and Arjuna Transaction Service, comes with\
    \ a very robust implementation that supports both the JTA and JTS APIs. It supports\
    \ three extended transaction models: nested top-level transactions, nested transactions,\
    \ and a compensation-based model based on sagas. Further, it also supports web\
    \ service and RESTful transactions. There is a need for manual integration with\
    \ the Spring framework, but it provides out-of-the-box integration with Spring\
    \ Boot.\n\n*   **Atomikos TransactionsEssentials:** Atomikos TransactionsEssentials\
    \ is a production quality implementation that also supports recovery and some\
    \ exotic features beyond the JTA API. It provides out-of-the-box Spring integration\
    \ and support for pooled connections for both database and JMS resources.\n\n\
    *   **Bitronix JTA:** Bitronix claims to support transaction recovery as well\
    \ as or even better than some of the commercial products. Bitronix also provides\
    \ connection pooling and session pooling out of the box.\n\n## Distributed Transactions\
    \ in Java\n\nCoordination of transactions spanning multiple resources are specified\
    \ by the X/Open standards by opengroup. Java supports X/Open standards by providing\
    \ two interfaces: JTA (Java Transaction API) and JTS (Java Transaction Service).\
    \ As shown in Figure [13-2](#477630_1_En_13_Chapter.xhtml#Fig2), JTA is used by\
    \ application developers to communicate to transaction managers. Since resources\
    \ can be provided by multiple vendors following different platforms and programming\
    \ languages, if all of these resources must be coordinated, they have to agree\
    \ again to the X/Open standards. Here, JTS, which follows CORBA OTS (Object Transaction\
    \ Service), provides the required interoperability between different transaction\
    \ managers sitting with distributed resources. I have discussed the “distributed\
    \ nature” in distributed transactions. The two-phase commit protocol is used for\
    \ coordination of transactions across multiple resource managers.\n\n## Distributed\
    \ Transaction Example Using MySQL, ActiveMQ, Derby, and Atomikos\n\nThe easiest\
    \ way to do away with many data consistency problems, especially when multiple\
    \ resource managers are involved, is to use XA or distributed transactions even\
    \ in BASE, as in Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3). However, if\
    \ you want to transition to even more relaxed BASE microservices, the design mechanisms\
    \ have to be more fault tolerant since your XA transaction managers are absent,\
    \ and they would have done all the hard work. You will walk through the major\
    \ consistency concern scenarios with the help of an example. Again, I could have\
    \ demonstrated the concern scenarios straight without using distributed transactions\
    \ in the example; however, I will take the reverse route and use XA transactions\
    \ to illustrate the perfect scenario and simulate the various fault conditions\
    \ by cutting down the ACID scope even more since it is rather easy for you, the\
    \ reader, to comprehend aspects in this manner. XA transactions allow us to do\
    \ that by “abusing” the transaction attributes to make the transaction scope smaller\
    \ than it would normally be. This means that I can reuse the same code to illustrate\
    \ the anomalies of relaxed BASE incrementally.\n\n### The Example Scenario\n\n\
    The example is not trivial, as shown in Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3),\
    \ so the scenario requires a little explanation. The example scenario is a simple\
    \ stock trade processing system. Here are the building blocks:\n\n1.  New quotes\
    \ for stock transactions can be pushed to the Broker Web microservice. New quotes\
    \ get inserted into a `Quotes` table, which is in a MySQL DB, with a status of\
    \ “New.”\n\n2.  The Quotes processor task is a quartz scheduled task and it polls\
    \ the `Quotes` table in the MySQL DB for any new quotes with a status of “New.”\n\
    \n3.  When a new quote with a status of “New” is found, it invokes the `processNewQuote`\
    \ method of the broker service, always with a transaction, passing the unique\
    \ identifier for the new quote into the `Quotes` table.\n\n4.  The broker service\
    \ makes use of the other transactional services, the auction service and the stock\
    \ order service, and the execution of both has to be atomic.\n\n5.  The auction\
    \ service confirms the quote received by changing the status of the quote to “Confirmed”\
    \ within a transaction.\n\n6.  The stock order service creates a JMS message out\
    \ of the information contained in the new quote and is sent to an ActiveMQ queue\
    \ for settlement of the quote, again within the above (5) transaction.\n\n7. \
    \ The settlement listener service is listening on the ActiveMQ queue for any new\
    \ confirmed quote. All confirmed quotes on reaching the ActiveMQ queue are picked\
    \ up by `onMessage` of the settlement listener service, within a transaction.\n\
    \n8.  The settlement listener service invokes the quotes reconcile service for\
    \ reconciliation of the quote, again within the above (7) transaction."
