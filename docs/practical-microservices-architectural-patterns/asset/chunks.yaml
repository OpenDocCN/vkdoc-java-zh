    A single saga instance is responsible for managing a single saga transaction.
    Hence, if there are two orders, you will have two instances of the above saga.
    So a new saga is only started if no suitable existing saga (of the same type)
    can be found in the system. You should indicate the start and end of a saga’s
    life cycle. The abstract annotated saga allows you to annotate event handlers
    with the annotation `@SagaEventHandler`. If the handler method signifies the start
    of a transaction, you add another annotation to that same method: `@StartSaga`.
    This annotation creates a new saga and invokes its event handler method when a
    matching event is published, the order created event in your case. In your case,
    there are two cases that can bring the saga to an end state: when an order confirmed
    event is intercepted or when an order cancelled event is intercepted. If a certain
    event always indicates the end of a saga’s life cycle, annotate that event’s handler
    on the saga with `@EndSaga`, in your case the handle order canceled event and
    the handle order confirmation event handlers. The saga’s life cycle will be ended
    after the invocation of the handler.


    The saga event handler annotation indicates that the annotated method is an event
    handler method for the saga instance. For each event, only a single annotated
    method will be invoked. This method is resolved in the following order of preference:


    *   First, the event handler methods of the actual class (at runtime) are searched.

    *   If a method is found with a parameter that the domain event can be assigned
    to, it is marked as eligible.

    *   After a class has been evaluated (but before any super class), the most specific
    event handler method is called. That means that if an event handler for class
    X and one for class Y are eligible, and Y is a subclass of X, then the method
    with a parameter of type Y will be chosen.

    *   If no method is found in the actual class, its super class is evaluated.

    *   If still no method is found, the event listener ignores the event.'
