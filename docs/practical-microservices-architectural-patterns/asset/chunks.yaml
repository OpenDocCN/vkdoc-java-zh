    ## 总结


    在本章中，您探索了 Spring Cloud 的主要构建块。由于 Spring Cloud 提供了简单、易用且对 Spring 友好的 API，并且它建立在
    Spring 的“约定优于配置”方法之上，因此 Spring Cloud 默认了所有配置，并帮助您快速入门。许多 Spring Cloud 功能将在后续章节中用于构建您的电子商务示例应用程序，因此本章提供的基础知识对于您连接多个微服务并可视化完整图景至关重要。正如您可能已经推测的那样，许多
    Spring Cloud 组件从底层开始就考虑了故障安全和高可用性的特性。随着微服务场景外部架构复杂性的增加，这一点尤为重要。您将在下一章中对各种基本的高可用性方面和功能进行端到端分析。


