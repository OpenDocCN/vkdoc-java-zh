- fmt: '```java

    import javax.transaction.TransactionManager;

    import javax.transaction.UserTransaction;

    import org.hibernate.engine.transaction.jta.platform.internal.AbstractJtaPlatform;

    import org.springframework.transaction.jta.JtaTransactionManager;

    @SuppressWarnings("serial")

    public class AtomikosJtaPlatform extends AbstractJtaPlatform {

    static TransactionManager transactionManager;

    static UserTransaction userTransaction;

    @Override

    protected TransactionManager locateTransactionManager() {

    Assert.notNull(transactionManager,

    "TransactionManager has not been setted");

    return transactionManager;

    }

    @Override

    protected UserTransaction locateUserTransaction() {

    Assert.notNull(userTransaction, "UserTransaction has not been setted");

    return userTransaction;

    }

    public void setJtaTransactionManager(JtaTransactionManager

    jtaTransactionManager) {

    transactionManager = jtaTransactionManager.getTransactionManager();

    userTransaction = jtaTransactionManager.getUserTransaction();

    }

    public void setTransactionManager(TransactionManager transactionManager) {

    this.transactionManager = transactionManager;

    }

    public void setUserTransaction(UserTransaction userTransaction) {

    this.userTransaction = userTransaction;

    }

    }

    ```


    `Listing 13-11` Resolving JTA `UserTransaction` and `TransactionManager` (`ch13\ch13-01\XA-TX-Distributed\Broker-MySQL-ActiveMQ\src\main\java\com\acme\ecom\AtomikosJtaPlatform.java`)


    Having looked at the overall configurations, let’s also look into more details
    of the infrastructure configurations with reference to Listing [13-9](#477630_1_En_13_Chapter.xhtml#PC10)
    and Listing [13-10](#477630_1_En_13_Chapter.xhtml#PC11). You need to set the `dataSource`
    property of `LocalContainerEntityManagerFactoryBean` to a JDBC `DataSource` that
    the JPA persistence provider is supposed to use for accessing the database. The
    `DataSource` passed in here will be used as a `nonJtaDataSource` on the `PersistenceUnitInfo`
    passed to the `PersistenceProvider`. Note that this variant typically works for
    JTA transaction management as well; if it does not, consider using the explicit
    property `jtaDataSource` instead. You use the `AtomikosDataSourceBean` explained
    previously to set this property.


    Next, you need a service provider interface implementation that allows you to
    plug in vendor-specific behavior into Spring’s `EntityManagerFactory` creators.
    `HibernateJpaVendorAdapter` is an implementation for Hibernate `EntityManager`.
    It supports the detection of annotated packages along with other things. The JPA
    module of Spring Data contains a custom namespace, `<jpa:repositories>`, that
    allows the defining of repository beans. It also contains certain features and
    element attributes that are special to JPA. Generally, the JPA repositories can
    be set up using the `repositories` element. In this example, Spring is instructed
    to scan `com.acme.ecom.repository.quote` and all its subpackages for interfaces
    extending `Repository` or one of its subinterfaces. For each interface found,
    the infrastructure registers the persistence technology-specific `FactoryBean`
    to create the appropriate proxies to handle invocations of the query methods.
    Each bean is registered under a bean name that is derived from the interface name,
    so your interface of `QuoteRepository` would be registered under `quoteRepository`.
    The `entity-manager-factory-ref` will help to explicitly wire the `EntityManagerFactory`
    to be used with the repositories being detected by the `repositories` element.
    This property is usually used if multiple `EntityManagerFactory` beans are used
    within the application. If not explicitly configured, Spring will automatically
    look up the single `EntityManagerFactory` configured in the `ApplicationContext`.


    This completes the configuration of both XA resources. Next, you must configure
    the XA transaction manager. You need `org.springframework.transaction.jta.JtaTransactionManager`,
    which is an implementation of `PlatformTransactionManager`. You need to provide
    implementations of `javax.transaction.TransactionManager` and `javax.transaction.UserTransaction`
    to create a `JtaTransactionManager`.


    The `javax.transaction.UserTransaction` interface provides the application the
    ability to control transaction boundaries programmatically. This interface may
    be used by Java client programs or Enterprise Java Beans. The `UserTransaction.begin()`
    method starts a global transaction and associates the transaction with the calling
    thread. The transaction-to-thread association is managed transparently by the
    transaction manager. Thus the `UserTransaction` is the user-facing API.


    `com.atomikos.icatch.jta.UserTransactionManager` is a straightforward, zero-setup
    implementation of `javax.transaction.TransactionManager`. Standalone Java applications
    can use an instance of this class to get a handle to the transaction manager and
    automatically start up or recover the transaction service on first use. `com.atomikos.icatch.jta.UserTransactionImp`
    is the `javax.transaction.UserTransaction` implementation from Atomikos which
    you can use for standalone Java applications. This class again automatically starts
    up and recovers the transaction service on first use.


    `org.springframework.transaction.jta.JtaTransactionManager` is a `PlatformTransactionManager`
    implementation for JTA, delegating to back-end JTA providers. It is typically
    used to delegate to a Java EE server’s transaction coordinator, but in your case,
    you have configured with Atomikos JTA provider, which is embedded within the application.'
