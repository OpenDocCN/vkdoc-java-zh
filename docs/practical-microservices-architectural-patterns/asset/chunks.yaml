    将清单 19-4 中订单聚合的代码与第 12 章清单 [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC4)
    中的代码进行比较。Axon 2 要求订单和产品聚合都继承 `AbstractAggregateRoot`，这是 `AggregateRoot` 接口的一个非常基础的实现，而在
    Axon 3 中，您的聚合不需要继承该基类。`AggregateRoot` 必须声明一个包含聚合标识符的字段。该标识符最晚必须在发布第一个事件时初始化，并且该标识符字段必须使用
    `@AggregateIdentifier` 注解进行标注。但是，如果您使用 JPA 并且在聚合上使用了 JPA 注解，Axon 也可以使用 JPA 提供的
    `@Id` 注解。

    聚合使用 `AggregateLifecycle.apply()` 方法来注册要发布的事件。应用事件意味着它们会立即被应用（发布）到聚合，并计划发布给其他事件处理器。

