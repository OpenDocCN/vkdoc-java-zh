- fmt: '# The Simultaneous Exhibition Game


    Go back to Figure [6-16](#477630_1_En_6_Chapter.xhtml#Fig16). Let’s discuss a
    little more in the context of resource sharing and resource utilization.


    You might have observed the single server socket instance listening for client
    connections. It is this single server socket’s duty to handle all incoming client
    connections. This is typical of many web servers existing today. A typical web
    server that produces relatively short content like a web page with text or an
    image will be 100KB in size for the response. Even though it will take only a
    fraction of a second to generate or retrieve this page, it can take as long as
    10 seconds to transmit it to a client with a low bandwidth of 80 kbps (@ 10 KB/s).
    The issue of sending content to a slow client might be, to some extent, improved
    by increasing the size of the operating system kernel socket buffers; however,
    it’s not a general solution to the problem. It can have undesirable side effects,
    requiring huge resources that will not scale linearly after a certain optimal
    point. In short, this single server socket cannot wait until all the processing,
    like I/O operations, happening within the client connection context are completed.
    If it keeps waiting until completion, it will take too long for it to be able
    to accept the next client connection. In a production web server, there will be
    tens or hundreds or more concurrent client connections hitting a web server, so
    the server socket has to be smarter in order to respond in a reasonable time frame.


    The architecture in Figure [6-16](#477630_1_En_6_Chapter.xhtml#Fig16) makes use
    of threads to handle the above scenario. A thread is a self-contained set of instructions
    that the operating system can schedule to get executed on a CPU core. Applications
    run multiple threads in parallel for two reasons:


    - They can leverage more compute cores at the same time.

    - They make it easy to do operations in parallel (in this example, to execute
    the code written within the client connection context).


    However, threads also consume system resources. Each thread uses memory and other
    OS resources, and they need to be swapped on and off the cores by the process
    called context switching. Even though modern server processes can handle hundreds
    of active threads, performance starts degrading seriously once memory is exhausted
    or when a high I/O operation forces a large volume of context switches at the
    OS level. So, the creation of each thread has to be done with caution. Even if
    created, one optimization is to reuse threads. A thread pool can make this happen.
    Further, smart design can also allow these threads to be reused to execute a variety
    of tasks. In this example, threads from the same thread pool are used to execute
    the network reader tasks and the network writer tasks.


    So, overall your network server is smartly implemented by using pooled threads,
    if not the smartest^([⁹](#fn9)) possible manner. There is an analogy called “simultaneous
    exhibition or simultaneous display.” This refers to a board game exhibition (commonly
    chess or Go) where one player (typically of high rank, such as a grandmaster or
    dan-level player) plays multiple games at a time with a number of other players.
    The network server implemented here is similar to a grandmaster who can accept
    connections more or less concurrently and assign the associated computations to
    pooled threads, again more or less concurrently.


    # Message Correlation and Microservices


    In microservices architecture, different pieces of the enterprise application
    are divided into multiple microservices and still they have to talk to each other.
    To get the real benefit of microservices, intermicroservice calls must be through
    a messaging infrastructure. This means the production ecosystem of an enterprise
    application with a microservices architecture will consist of many microservices,
    and many instances of these microservices, are interconnected with one or more
    messaging infrastructures. When you adopt an asynchronous style of communication
    between these instances, the main dilemma is how to effectively solve the routing
    of messaging between them. Previous sections in this chapter gave you a bird’s
    eye view on the internal complexities involved in connecting microservices including
    the message correlation. If a developer has to do all of this wiring himself,
    it will bloat the code too much. You need a better way to handle this. I will
    introduce ways of handling this in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    when I introduce the Axon framework (which will do this for you implicitly).


    # Summary


    Messaging brings the power of detached processing to help enterprise applications
    deal with many real-world scenarios including downtime and failure. In this chapter,
    you looked at some of the powerful applications of messaging, including clustering
    and high availability. You also read through a few code samples, which showed
    the complexities involved if you hand-code cross-cutting concerns like message
    correlation, etc. By combining the multiple techniques discussed in this chapter,
    you’ll be in a position to increase the reliability of your microservices infrastructure
    manyfold. You will see some of these messaging techniques applied in a different
    context in subsequent chapters since messaging is a core lever in the developer’s
    toolset.


    # Footnotes


    ## Spring Boot


    In the previous chapter, you looked at messaging. You used Spring to configure
    the message senders and listeners, and you did explicit wiring of beans and required
    infrastructure in Spring. So far, so good. Now how can you make aspects even simpler?
    You’ll look at Spring Boot in this chapter, which makes use of an opinionated
    view of the Spring platform and many third-party Java libraries so that it is
    easy and straightforward to create stand-alone, production-grade, Spring-based
    applications that you can “just run.” Since Boot follows many conventions and
    usage patterns followed by developers, which they have been leveraging while using
    Spring and other third-party libraries, most Spring Boot applications need very
    little Spring configuration. You will use Spring Boot to develop the few samples
    relevant to the discussion in this chapter. Again, the intention is not to cover
    Spring Boot in detail; that is outside the scope of this chapter. Readers familiar
    with Java or Spring should have no problem getting started by visiting the Spring
    Boot home page. I will spend time on very essential tools required for the discussion
    so that I don’t deviate from the intention of this book, which is explaining practical
    microservices. However, by the time you start looking at the code samples in later
    chapters, you should be familiar with the basic building block code constructs.


    You will learn the following in this chapter:


    - How to use Spring Initializer to create a Boot project template

    - How to use cURL to access a Boot sample for CRUD operations against MongoDB

    - An HATEOAS and HAL introduction, and how to access data using `RestTemplate`

    - How to developing an end-to-end Boot sample for performing CRUD operations against
    REST'
