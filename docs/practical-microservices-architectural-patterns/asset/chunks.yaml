- fmt: '# 排版后的内容


    - **High read-to-write ratio**: Recollect the discussion about the look-to-book
    ratio in Chapter [5](#477630_1_En_5_Chapter.xhtml). A system will have to accommodate
    hundreds or thousands of read transactions before it gets converted into a single
    write transaction. Building the operational QoS into your read transactions similar
    to write transactions would be disastrous in today’s enterprise software paradigm,
    especially in the cloud native scenarios, where every CPU cycle or every bit stored
    or transported adds to your cost. Your read transactions are your LEAD transactions,
    and your write transactions are your LAG transactions. The first one converts
    “intent” to “decision” of purchase whereas the second one converts your “inventory”
    to “realized margin.” Both are important; however, the criticality is different.
    An unsuccessful write transaction due to functional or system issues is priceless,
    whereas an unsuccessful read transaction will have less of an impact since it
    can be either retried or ignored; its value lost is considerably low compared
    to that of an unsuccessful write transaction. Data sources for queries are to
    be tuned differently than those used for command execution, and they should be
    optimized for fast querying with relaxed locks in resources; however, for write
    transactions, your data sources should ensure strict ACID compliancy so that once
    a traveler successfully purchases the last seat on your airplane, you will have
    all the means to respect that purchase so that you don’t need to later send a
    regret e-mail to that traveler telling him that the seat is not available for
    so-and-so reason and hence he will be provided with a refund!


    - **Single source of truth, many views**: “Resources” were first defined on the
    World Wide Web as documents or files identified by their URLs. However, today
    they have a much more generic and abstract definition that encompasses every thing
    or every entity that can be identified, named, addressed, or handled, in any way
    whatsoever, on the Web. In a RESTful web service, requests made to a resource’s
    URI will elicit a response that may be in CSV, XML, HTML, JSON, or some other
    format. The same data in your application may be represented in many ways, some
    optimized for quick searching, others in a cached state for maximum responsiveness,
    and others in the form of canned reports like an Excel or PDF file. This is the
    application-level reality of the single source of truth of resource existing in
    many views. CQRS addresses this requirement explicitly and also helps you keep
    the different views in sync with the single source of truth whenever a change
    occurs in the form of raising events.


    - **Application with varied interactions**: Some applications will have a user
    base at varied levels of interaction with the system. For example, an e-commerce
    application has end users or customers doing retail purchases as one set of the
    user base, and that number will be huge; also, these customers expect a split-second
    response time. The next set is the back office storekeepers who manage the inventories,
    whose numbers are limited and who suffer if the software is slow or sluggish at
    times. A third set is the B2B interfaces connecting with the supply chain, whose
    number is even smaller, in the form of a few known IP addresses, and who also
    suffer if the interfaces are down for a few minutes because then they have to
    retry at a later time. Depending upon the type of interacting parties and the
    overall value and criticality of the transactions on behalf of these parties,
    software services within the same application may have to exhibit different levels
    of access, security, performance, and so on. Microservices architectures will
    help you here, and adopting CQRS will provide you the extra leverage to address
    these heterogeneous kinds of interactions.


    - **Applications with autonomous interfaces**: The IoT and the WoT are current
    software paradigms that pose a new set of challenges to software architects. The
    strict definition of an application’s API using commands and events makes it easier
    to integrate with such interfaces of things and devices. Any interface can send
    commands or listen to events generated by the host interface.


    The above list provides only a general list of problem characteristics where CQRS
    will value add; it’s in no way exhaustive.


    ## What You Need to Run Axon


    The Axon framework has been built and tested against Java 6, making that more
    or less the only requirement. You can use Gradle or Maven for the build and also
    use any IDE of your choice. Since Axon doesn’t create any connections or threads
    by itself, it is safe to run on an application server. Axon abstracts all asynchronous
    behavior by using executors, which decouple task submission from the mechanics
    of how each task will be run. So you can even easily pass a container-managed
    thread pool, for example. If you don’t use an application server (e.g. Tomcat,
    Jetty, or a stand-alone app), you can use the `Executors` class or the Spring
    Framework to create and configure thread pools. You will now look at some concrete
    examples and see Axon code in action.


    ## Command and Event Handling in the Same JVM


    Simple things first, so let’s keep the first example in Axon simple. However,
    I can’t make it simpler. To introduce Axon, you must first understand a simple
    scenario in the Axon way and then look at the details of what each of the steps
    mean in Axon.


    ### The Sample Scenario


    The first Axon example is a single microservice from an e-commerce application.
    There are two entities in the domain, order and product. Users can buy a product,
    which will create a new order. When a new order is created, the product stock
    will get depreciated. Just that. Figure [12-1](#477630_1_En_12_Chapter.xhtml#Fig1)
    depicts the architecture with the complete flow labelled.


    ![../images/477630_1_En_12_Chapter/477630_1_En_12_Fig1_HTML.jpg](images/477630_1_En_12_Chapter/477630_1_En_12_Fig1_HTML.jpg)


    **Figure 12-1.** Axon command and event handling in the same JVM


    The “A Meta Model for Event-Based CQRS Design” section in Chapter [5](#477630_1_En_5_Chapter.xhtml)
    shows a meta model for a CQRS-based architecture. Figure [12-1](#477630_1_En_12_Chapter.xhtml#Fig1)
    is a concrete incarnation of that abstract meta model represented in Figure [5-5](#477630_1_En_5_Chapter.xhtml#Fig5)
    in Chapter [5](#477630_1_En_5_Chapter.xhtml).


    Let’s now explore the end-to-end flow, which is labelled in the diagram as follows:


    1.  When you click the “Order One Now!” button in the browser, a REST/JSON request
    hits the order controller.'
