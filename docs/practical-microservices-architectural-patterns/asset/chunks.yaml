    ### RabbitMQ 消息发送者


    你需要连接到 RabbitMQ 消息代理并发送一条消息。为此，你可以使用 RabbitMQ 库中的客户端包。清单 6-1 展示了执行此操作所涉及的步骤。


    ```

    import com.rabbitmq.client.Channel;

    import com.rabbitmq.client.Connection;

    import com.rabbitmq.client.ConnectionFactory;

    public class Send {

    private final static String QUEUE_NAME = "hello";

    public static void main(String[] argv) throws Exception{

    ConnectionFactory factory = new ConnectionFactory();

    factory.setHost("localhost");

    Connection connection = factory.newConnection();

    Channel channel = connection.createChannel();

    channel.queueDeclare(QUEUE_NAME, false, false, false, null);

    String message = "Hello World!";

    channel.basicPublish("", QUEUE_NAME, null, message.getBytes("UTF-8"));

    LOGGER.debug(" [!] Sent ''" + message + "''");

    channel.close();

    connection.close();

    }

    }

    清单 6-1

    RabbitMQ 消息发送者 (ch06\ch06-01\src\main\java\com\acme\ch06\ex01\Send.java)

    ```


    你创建了一个到 RabbitMQ 消息代理的连接。RabbitMQ 是一个符合 AMQP 规范的代理，你使用 `com.rabbitmq.client.ConnectionFactory`
    来打开到 AMQP 代理的连接。`com.rabbitmq.client.ConnectionFactory` 是 RabbitMQ 库的一部分，但稍后你将看到如何使用非
    RabbitMQ 的、纯 AMQP 客户端库连接到 RabbitMQ 代理。为了让 RabbitMQ 接受客户端连接，它需要绑定到一个或多个接口并监听特定于协议的端口。默认情况下，RabbitMQ
    会在所有可用接口上监听端口 5672，但你可以根据需要，使用 `rabbit.tcp_listeners` 配置选项进行配置。或者，也可以使用 `setHost(String
    host)` 和 `setPort(int port)` 等方法来配置监听的主机、端口等。此外，你可以假设 RabbitMQ 已配置为允许使用默认用户名“guest”和默认密码“guest”进行连接。


    接下来，你需要创建一个通道。通过使用消息通道，一个应用程序可以向通道写入信息，而另一个应用程序可以从该通道读取信息。现在，你必须声明一个队列来发送消息，完成后，你就可以向该队列发布一条消息。请注意，声明队列仅当队列不存在时才会创建一个新队列，因此该操作是幂等的。通道中的
    `basicPublish` 方法期望消息内容以字节数组形式提供，因此你可以在此处编码任何你想要的内容。


    ### RabbitMQ 消息接收者


    清单 6-2 展示了监听 RabbitMQ 消息代理以消费消息所需的代码。


    ```

    import com.rabbitmq.client.Channel;

    import com.rabbitmq.client.Connection;

    import com.rabbitmq.client.ConnectionFactory;

    import com.rabbitmq.client.Consumer;

    import com.rabbitmq.client.DefaultConsumer;

    import com.rabbitmq.client.Envelope;

    import com.rabbitmq.client.AMQP;

    public class Receive{

    private final static String QUEUE_NAME = "hello";

    public static void main(String[] argv) throws Exception{

    ConnectionFactory factory = new ConnectionFactory();

    factory.setHost("localhost");

    Connection connection = factory.newConnection();

    Channel channel = connection.createChannel();

    channel.queueDeclare(QUEUE_NAME, false, false, false, null);

    LOGGER.debug(" [!] Waiting for messages. To exit press CTRL+C");

    Consumer consumer = new DefaultConsumer(channel){

    @Override

    public void handleDelivery(String consumerTag,

    Envelope envelope, AMQP.BasicProperties

    properties, byte[] body) throws IOException {

    String message = new String(body, "UTF-8");

    LOGGER.debug(" [x] Received ''" + message + "''");

    }

    };

    channel.basicConsume(QUEUE_NAME, true, consumer);

    }

    }

    清单 6-2

    RabbitMQ 消息接收者 (ch06\ch06-01\src\main\java\com\acme\ch06\ex01\Receive.java)

    ```


    由于当代理中有更多消息到达该通道时，RabbitMQ 会将消息推送给消费者，因此你需要保持消费者运行以监听消息，并在消息到达代理时消费它们。你使用 `com.rabbitmq.client.Consumer`
    作为应用程序回调对象，通过订阅从队列接收通知和消息。你在此处也声明了队列，因为如果你在发布者之前启动消费者，你需要确保在尝试从队列消费消息之前，队列在代理端已经存在。现在，你需要告诉代理从队列中投递消息。由于代理预计会异步推送消息，你需要提供一个回调对象，该对象将缓冲消息，直到你准备好使用它们。`com.rabbitmq.client.DefaultConsumer`
    非常方便；它是一个便利类，提供了 `Consumer` 的默认实现。


