    \  \n\n**Figure 17-33**  \nProduct inventory gets reduced  \n\n### Delivery Failure\
    \ for the Shipped Order  \n\nYou will now test the “delivery failure” scenario.\
    \ Create another order, as shown in Figure [17-34](#477630_1_En_17_Chapter.xhtml#Fig34).\
    \  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig34_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig34_HTML.jpg)\
    \  \n\n**Figure 17-34**  \nCreate a second order  \n\nNext, use the back office\
    \ admin screen shown in Figure [17-29](#477630_1_En_17_Chapter.xhtml#Fig29) to\
    \ simulate the shipping. After successful shipping, the order will be available\
    \ for the next step, as shown in Figure [17-35](#477630_1_En_17_Chapter.xhtml#Fig35).\
    \  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig35_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig35_HTML.jpg)\
    \  \n\n**Figure 17-35**  \nSecond order ready for delivery  \n\nThis time, simulate\
    \ a delivery failure by clicking the “Delivery failed” button shown in Figure\
    \ [17-35](#477630_1_En_17_Chapter.xhtml#Fig35). When the delivery fails, it will\
    \ again be reflected in the end user screen, as shown in Figure [17-36](#477630_1_En_17_Chapter.xhtml#Fig36).\
    \  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig36_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig36_HTML.jpg)\
    \  \n\n**Figure 17-36**  \nSecond customer order failed  \n\nThis time, if you\
    \ view the corresponding product detail page, you will see that the inventory\
    \ has been updated so that the number of items corresponding to the failed order\
    \ will be available to order again.  \n\n### Cancel a New Order  \n\nTo test the\
    \ final use case, create a third order, as shown in Figure [17-37](#477630_1_En_17_Chapter.xhtml#Fig37).\
    \  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig37_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig37_HTML.jpg)\
    \  \n\n**Figure 17-37**  \nCreate a third order  \n\nThe new order will be available\
    \ for the back office admin for further processing, as shown in Figure [17-38](#477630_1_En_17_Chapter.xhtml#Fig38).\
    \  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig38_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig38_HTML.jpg)\
    \  \n\n**Figure 17-38**  \nThird order waiting for processing  \n\nHowever, let\
    \ the back office admin do nothing this time. If the end user checks the inventory\
    \ of the product he has newly ordered, he’ll see that the inventory has been reduced,\
    \ as seen in Figure [17-39](#477630_1_En_17_Chapter.xhtml#Fig39).  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig39_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig39_HTML.jpg)\
    \  \n\n**Figure 17-39**  \nInventory reduced  \n\nNow, the end user has to cancel\
    \ the order he just created by clicking the “Cancel order” button next to the\
    \ order, as seen in Figure [17-28](#477630_1_En_17_Chapter.xhtml#Fig28). Once\
    \ cancelled, the end user can see the order in the “Cancelled” tab under “Your\
    \ Orders,” as seen in Figure [17-40](#477630_1_En_17_Chapter.xhtml#Fig40).  \n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig40_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig40_HTML.jpg)\
    \  \n\n**Figure 17-40**  \nCancelled order  \n\n### Reverting the Inventory  \n\
    \nAs soon as the order is cancelled, if you view the corresponding product detail\
    \ page, you will see that the inventory has been reverted so that the number of\
    \ items corresponding to the cancelled order will be available to order again,\
    \ as seen in Figure [17-41](#477630_1_En_17_Chapter.xhtml#Fig41).  \n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig41_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig41_HTML.jpg)\
    \  \n\n**Figure 17-41**  \nInventory reverted due to cancellation  \n\n### Summary\
    \  \n\nIn this chapter, you made a lot of progress on your CQRS-based microservices\
    \ journey. You are now armed with all the basic tools to build enterprise-grade\
    \ applications of any scale using event-driven microservices. However, there are\
    \ two caveats:  \n\n* You have not implemented security (authentication and authorization)\
    \ in your e-commerce microservices application.  \n* You kept two domain entities\
    \ together to maintain strong data consistency; otherwise, they would have been\
    \ separated out into their own separate microservices.  \n\nYou will look into\
    \ these aspects in the next two chapters.  \n\n## 18. Microservices Security \
    \ \n\nIn the e-commerce microservice application in Chapter [17](#477630_1_En_17_Chapter.xhtml),\
    \ you should have noticed that there are few API methods, especially those in\
    \ the product category and product services which are freely accessible by anyone;\
    \ however, for accessing all other microservices you need to be logged in either\
    \ as the back office admin or as a customer who has already created a user profile\
    \ in the application. So far, so good, but how secure are those microservices\
    \ even though you need to be logged in?  \n\nQuite different from the traditional\
    \ monolith architecture where all the services are centrally located, in a microservices\
    \ architecture there are many nodes or processes where the services are distributed.\
    \ Even if you consider the API gateway as a single, central, front controller\
    \ where all your requests are initially intercepted, the API gateway has to then\
    \ route the requests to the respective microservices, all through the internal\
    \ network. Similarly, intermicroservice communication also happens through the\
    \ same internal network.  \n\nEven if you have secured the gateway access, your\
    \ data is not free from insider attacks. One way to achieve security is to share\
    \ the user credential data for all services and authenticate the user on each\
    \ service before access. Even though this is actually a working approach, it would\
    \ be a weird idea to distribute the credentials in multiple places. You should\
    \ have a better approach.  \n\nYou will look at the concern of microservices security\
    \ in this chapter. You will also build security features for the example from\
    \ Chapter [17](#477630_1_En_17_Chapter.xhtml) so that you learn how this functions\
    \ in a real-world situation.  \n\nYou will be exploring the following in this\
    \ chapter:  \n\n* OAuth 2.0  \n* Client types in the context of OAuth 2.0  \n\
    * Authorization code grant type in OAuth 2.0  \n* JSON Web Token (JWT)  \n* Enabling\
    \ security for the microservices e-commerce application  \n\n### OAuth 2.0 and\
    \ Microservices  \n\nWith Spring Security and its support for OAuth 2.0, you have\
    \ everything you need to lock down your API gateway as well as your back-end resource\
    \ servers. You can set it up to automatically propagate your access tokens from\
    \ one microservice to the other, ensuring that everything stays secure and encrypted\
    \ along the way. I won’t cover OAuth 2.0 in detail, but I will introduce the minimum\
    \ aspects required so that you can enable security for your example microservices\
    \ application.  \n\n#### OAuth 2.0  \n\nInternet Engineering Task Force (IETF)\
    \ Request for Comments (RFC) No. 6749 defines the OAuth 2.0 as an authorization\
    \ framework that enables a third-party application to obtain limited access to\
    \ a HTTP service, either on behalf of a resource owner by orchestrating an approval\
    \ interaction between the resource owner and the HTTP service, or by allowing\
    \ the third-party application to obtain access on its own behalf. The OAuth 2.0\
    \ specification replaces and obsoletes the OAuth 1.0 protocol.  \n\n##### OAuth\
    \ 2.0 Roles  \n\nOAuth defines four roles, which are central to the OAuth interactions:\
    \  \n\n* **Resource owner**: Any entity capable of granting access to a protected\
    \ resource. When the resource owner is a human, it is referred to as an end user.\
    \ A resource owner can grant access, and this grant may be used for subsequent\
    \ and repeated access of the resource."
