    Java 配置方法会创建一个名为 `springSecurityFilterChain`（`DelegatingFilterProxy` 和 `FilterChainProxy`）的
    Servlet 过滤器，该过滤器负责应用程序内的所有安全事宜（保护应用程序 URL、验证提交的用户名和密码、重定向到登录表单等）。


    您将 `authenticationManagerBean` 声明为一个 Bean，稍后它将被注入到 Spring OAuth 安全配置中。


    `WebSecurityConfigurerAdapter` 在 `configure(HttpSecurity http)` 方法中提供了默认配置，因此所有用户访问
    Web 应用程序的任何 URL 都需要进行身份验证。但您可以像清单 18-10 所示那样重写此方法。


    首先，配置 `HttpSecurity` 以定义哪些资源必须受保护、已授权、未授权、不受保护、登录页面、注销页面、访问被拒页面等。这里需要注意的一点是配置的顺序。特定于某些页面或
    URL 的配置必须放在前面，然后是大多数 URL 通用的配置。


    如果身份验证失败，您将收到预期的 401 Unauthorized 响应，随后是身份验证质询。在普通网页上下文中，浏览器会解释此质询，并通过一个简单的对话框提示您输入凭据。在浏览器环境中，登录页面不再是硬性要求，因为所有浏览器都支持基本身份验证，并且可以使用标准对话框提示用户输入凭据。此外，Spring
    Security 默认提供的 `BasicAuthenticationEntryPoint` 会为 401 Unauthorized 响应向客户端返回一个完整页面。这种错误的
    HTML 表示形式在浏览器中也能很好地呈现，但对于像 REST API 或 Zuul API 网关这样可能更倾向于 JSON 表示形式的场景来说，它并不适用。因此，您应该通过保留
    HTTP Basic 但将 401 质询更改为“Basic”以外的内容来阻止身份验证对话框。您可以在 `HttpSecurity` 配置回调中使用一行代码实现
    `AuthenticationEntryPoint`：


    ```

    authenticationEntryPoint((request, response, authException) ->

    response.sendError(HttpServletResponse.SC_UNAUTHORIZED))

    ```


    接下来是身份验证的配置。对于身份验证，Spring Security 提供了多种方法：


    *   DAO 身份验证提供者是 Spring 的默认实现


    Spring 在此期望提供一个 `org.springframework.security.core.userdetails.UserDetailsService`
    实现来提供凭据和权限。


    *   内置：内存（属性）、JDBC（数据库）、LDAP


    *   自定义


    *   自定义身份验证提供者


    示例：在使用单点登录时获取预认证的用户详细信息


    *   CAS、TAM、SiteMinder


    您将使用 Java 配置中的 JDBC 身份验证，在其中可以自定义默认查询。清单 18-10 展示了如何接入 JDBC 身份验证。您需要通过提供一个 `DataSource`
    来配置它。由于您使用的是自定义表，因此还需要提供选择查询来获取用户详细信息及其角色。您为 `AuthenticationManagerBuilder` 设置了两个查询，一个用于
    `usersByUsernameQuery` 中的身份验证，另一个用于 `authoritiesByUserNameQuery` 中的授权。


    *   `users-by-username-query`：此查询将选择用户的用户名、密码和启用状态属性，并根据您的自定义表将用户名作为参数。在实际实现中，搜索可能区分大小写或不区分大小写，具体取决于实现实例的配置方式。


    *   `authorities-by-username-query`：此查询将选择用户名和用户角色，并根据您的自定义表将用户名作为参数。


    身份验证处理完毕后，您就可以开始配置负责管理访问令牌的授权服务器了。Spring Security OAuth2 处理授权。要配置和启用 OAuth 2.0
    授权服务器，您必须在清单 18-11 中使用 `@EnableAuthorizationServer` 注解。


    ```

    @Configuration

    @EnableAuthorizationServer

    public class OAuth2Configuration extends AuthorizationServerConfigurerAdapter
    {

    @Autowired

    @Qualifier("authenticationManagerBean")

    private AuthenticationManager authenticationManager;

    @Override

    public void configure(ClientDetailsServiceConfigurer clients)

    throws Exception {

    clients.inMemory()

    .withClient("ecom_app")

    .secret("ecom")

    .scopes("PRODUCT","CUSTOMER","ORDER_HISTO",

    "CORE","SHIPPING","DELIVERY")

    .autoApprove(true)

    .authorities("PRODUCT_READ", "PRODUCT_WRITE","CUSTOMER_READ",

    "ORDER_READ","ORDER_WRITE")

    .authorizedGrantTypes("implicit","refresh_token",

    "password", "authorization_code");

    }

    @Override

    public void configure(AuthorizationServerEndpointsConfigurer endpoints)

    throws Exception {

    endpoints.tokenStore(tokenStore()).tokenEnhancer(jwtTokenEnhancer()).

    authenticationManager(authenticationManager);

    }

    @Bean

    public TokenStore tokenStore() {

    return new JwtTokenStore(jwtTokenEnhancer());

    }

    @Bean

    protected JwtAccessTokenConverter jwtTokenEnhancer() {

    KeyStoreKeyFactory keyStoreKeyFactory = new KeyStoreKeyFactory(

    new ClassPathResource("jwt.jks"), "mySecretKey".toCharArray());

    JwtAccessTokenConverter converter = new JwtAccessTokenConverter();

    converter.setKeyPair(keyStoreKeyFactory.getKeyPair("jwt"));

    return converter;

    }

    }

