    Upon loading itself, the browser client will fire a request to Product Web, listening
    on port 8082, which will delegate the request to the Apache TCPMon Proxy listening
    on port 8081. This request hitting port 8081 in the host where the TCPMon is running
    (localhost, in your case) will be proxied to port 8080 in localhost, again where
    the Product Server microservice is listening. If everything goes as planned, you
    should be able to see the products listed on the web page. If you inspect the
    TCPMon Proxy console, you should be able to validate that the communication between
    the two microservices uses Protocol Buffer as the wire-level protocol in handshaking
    the HTTP-based REST invocation.


