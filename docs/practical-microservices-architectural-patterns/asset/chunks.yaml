    for a single microservice, the Product microservice.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    A typical microservice


    Out of the various tiers, it is the business tier that does the core data massaging
    and processing work, and it is this tier where scalability issues often occur.
    With today’s technology capability, especially using the **SPA** (**single-page
    applications**) web frameworks and caching frameworks, scaling the other tiers
    are comparatively straightforward. So for most of this discussion, we will be
    concentrating on the business tier when we talk about microservices. However,
    wherever required, we will also touch upon other tiers to present the complete
    picture. So, we want to represent the microservice shown in Figure [3-2](#477630_1_En_3_Chapter.xhtml#Fig2),
    separating the presentation components apart, and that is what you saw in Figure
    [3-1](#477630_1_En_3_Chapter.xhtml#Fig1). This will have some implications, but
    we will discuss them in a later section.


    ### Understanding Self-Contained Microservices


    Since microservices are SOA friendly (which we will discuss in the next section),
    they require HTTP server services to expose SOA or REST interfaces. While we deploy
    traditional monolith packages into the web-app folder of the HTTP container, in
    the case of a microservice, a lightweight HTTP listener is embedded within the
    microservice, thereby eliminating the need to have any external or standalone
    container or server requirement. In the Java paradigm, in the case of a traditional
    deployment, we used to deploy an `.ear` or a `.war` file into a full encompassing
    application server like JBoss or a web server like Tomcat. In contrast, in the
    case of a microservice there is no web server or `.war` file; instead, each service
    has its own embedded HTTP listener such as Jetty, Tomcat, or Undertow in a JAR
    file. While we build a microservice, the build stage will create this “executable
    fat JAR” file, including the service runtime such as the HTTP listener mentioned
    previously.


    ### Note


    Java does not provide a standard way to load nested JAR files (JAR files that
    are themselves contained within a JAR). This can be problematic if you are looking
    to distribute a self-contained microservice.


    To solve this problem, many developers use “uber” JARs. An uber JAR packages all
    the classes from all the dependent JARs into a single archive. They are also called
    fat JARs. The problem with this approach is that it becomes hard to see which
    libraries are in your microservice. It can also be problematic if the same filename
    is used (but with different content) in multiple JARs.


    The previous section indicated that microservices should encompass all of the
    physical artifacts like binaries, libraries, and scripts, required for the microservice
    to be up and running. In the traditional monolith deployment, we could place these
    kinds of dependencies in the `lib` folder of the application server. In the microservices
    world, executable jar files are a means to attain this. The structure of a typical
    executable jar file for the product microservice is shown in Listing [3-1](#477630_1_En_3_Chapter.xhtml#PC1).


    ```

    product.jar

    |

    +-META-INF

    |  +-MANIFEST.MF

    +-org

    |  +-springframework

    |     +-boot

    |        +-loader

    |           +-

    +-BOOT-INF

    +-classes

    |  +-com

    |     +-acme

    |        +-ProductMain.class

    +-lib

    +-framework.jar

    +-log4j.jar

    +-jetty.jar

    +-. . .

    Listing 3-1

    Executable jar File Structure

    ```


    In this manner, all required libraries as well as the required runtime services
    like HTTP, JMS, or AMQP are embedded within the executable jar file. In “Build
    and Package the Spring Boot Application” section in Chapter [7](#477630_1_En_7_Chapter.xhtml)
    you will code, build, package, and run an executable fat jar file.'
  trans: '

    ### 微单体


    微服务之所以被称为微单体，是因为它们遵循分层和层级实践构建而成，但每个微服务的边界应当清晰可辨，并且应包含其独立运行和服务所需的一切，无需任何外部依赖。这体现在物理制品层面，例如微服务启动和运行所需的二进制文件、库和脚本。同时，这也必须体现在微服务运行时所需的任何依赖上，例如容器服务或持久化服务。物理上捆绑的微服务制品，在部署到运行时进程后，必须在其提供功能的能力方面展现出完全的自主性。下一节将进一步解释这一点。


    由于我们将微服务组织为包罗万象的捆绑包，几乎不依赖或完全不依赖外部，这为平台和技术选择带来了某些优势。为某个微服务所做的任何平台、技术、工具或框架决策，都不应成为其他微服务的约束。这为跨微服务的团队提供了技术和架构选择的自由。但与此同时，这种自主性也给微服务带来了额外的责任：它必须拥有并管理其健康存在所需的所有资源，包括保持状态持久化所需的数据和数据库。数据独立性通常通过为每个微服务提供其自己的数据库来实现（或者甚至在共享数据库中为每个微服务提供其自己的模式，但在这种情况下，应避免所有跨模式操作）。通常，微服务所需的表示层服务也封装在微服务捆绑包内。图
    3-2 展示了一个单一微服务——产品微服务的情况。


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig2_HTML.jpg](img/477630_1_En_3_Fig2_HTML.jpg)


    图 3-2


    一个典型的微服务


    在众多层级中，业务层负责核心的数据处理和加工工作，而可扩展性问题也常在此层出现。利用当今的技术能力，特别是使用**SPA**（**单页应用**）Web 框架和缓存框架，扩展其他层级相对直接。因此，在本文的大部分讨论中，当我们谈及微服务时，将主要关注业务层。不过，在必要时，我们也会涉及其他层级以呈现完整图景。因此，我们希望将图
    3-2 中所示的微服务进行表示，将表示层组件分离出来，正如你在图 3-1 中所见。这会产生一些影响，但我们将在后续章节中讨论。


    ### 理解自包含微服务


    由于微服务是面向 SOA 的（我们将在下一节讨论），它们需要 HTTP 服务器服务来暴露 SOA 或 REST 接口。在我们将传统单体包部署到 HTTP 容器的
    web-app 文件夹时，对于微服务而言，一个轻量级的 HTTP 监听器被嵌入到微服务内部，从而消除了对外部或独立容器或服务器的需求。在 Java 范式中，对于传统部署，我们通常将
    `.ear` 或 `.war` 文件部署到像 JBoss 这样的全能应用服务器或像 Tomcat 这样的 Web 服务器中。相比之下，对于微服务，则没有 Web
    服务器或 `.war` 文件；相反，每个服务都有自己嵌入的 HTTP 监听器，例如 JAR 文件中的 Jetty、Tomcat 或 Undertow。当我们构建微服务时，构建阶段会创建这个“可执行的
    fat JAR”文件，其中包含服务运行时，例如前面提到的 HTTP 监听器。


    ### 注意


    Java 没有提供加载嵌套 JAR 文件（JAR 文件本身包含在另一个 JAR 中）的标准方法。如果你希望分发一个自包含的微服务，这可能会带来问题。


    为了解决这个问题，许多开发者使用“uber”JAR。一个 uber JAR 将所有依赖 JAR 中的所有类打包到一个单一的归档文件中。它们也被称为 fat
    JAR。这种方法的问题在于，很难看出你的微服务中包含了哪些库。如果多个 JAR 中使用了相同的文件名（但内容不同），也可能会出现问题。


    上一节指出，微服务应包含其启动和运行所需的所有物理制品，如二进制文件、库和脚本。在传统的单体部署中，我们可以将这些依赖放在应用服务器的 `lib` 文件夹中。在微服务世界中，可执行的
    jar 文件是实现这一目标的一种手段。产品微服务的一个典型可执行 jar 文件的结构如代码清单 3-1 所示。


    ```

    product.jar

    |

    +-META-INF

    |  +-MANIFEST.MF

    +-org

    |  +-springframework

    |     +-boot

    |        +-loader

    |           +-

    +-BOOT-INF

    +-classes

    |  +-com

    |     +-acme

    |        +-ProductMain.class

    +-lib

    +-framework.jar

    +-log4j.jar

    +-jetty.jar

    +-. . .

    代码清单 3-1

    可执行 jar 文件结构

    ```


    通过这种方式，所有必需的库以及所需的运行时服务（如 HTTP、JMS 或 AMQP）都被嵌入到可执行的 jar 文件中。在第 7 章的“构建和打包 Spring
    Boot 应用程序”部分，你将编写代码、构建、打包并运行一个可执行的 fat jar 文件。

    '
- fmt: '### Resemblance of Microservices to SOA


    As discussed, multiple microservices make up an application. Microservices must
    be accessible from other microservices or from other components like the presentation
    components. For intermicroservice communication, a suitable interprocess communication
    mechanism is required, since most of the time microservices are deployed into
    separate processes. You shouldn’t reinvent the wheel. You should adopt all the
    best practices you have been leveraging from the SOA bibles. Just like in SOA,
    in microservices too there are multiple options to expose services starting from
    high performance and binary level TCP-IP sockets to other remoting protocols like
    `Java RMI`, `.NET Remoting`, and `RMI-IIOP` to more web-friendly ones like `SOAP`
    or `REST`.


    Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3) shows a redrawn e-commerce microservices
    architecture from Figure [3-1](#477630_1_En_3_Chapter.xhtml#Fig1), highlighting
    few typical request flows. Assuming most of the presentation tier components can
    be cached by the browser once they are loaded initially from the presentation
    server, all subsequent hits can be directed to the services tier directly by the
    browser. This is what is shown in Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3)
    so that we concentrate on the microservices more. Keep in mind that even if we
    follow the typical presentation tier-based approach where all requests are always
    routed through the presentation server alone, the requests will hit the microservices
    next, which is nothing different from a request flow not passing through the presentation
    server. In Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3), assume that a request
    to confirm an order has hit the `Order` microservice. It will access its `Order`
    database and create the order. It should also make changes to the inventory database
    to deplete the inventory level by the amount we have ordered newly, by talking
    to the `Inventory` service. Assuming that there are other microservices like a
    `Shipping` microservice and an `Order History` microservice in the e-commerce
    application, the `Order` microservice will need to make requests to them as well
    while creating an order. The `Shipping` microservice will pack and ship the order
    whereas the `Order History` microservice will create an entry into the `Order
    History` database, which can be used for analytics purposes. In summary, microservices
    must be accessible from other microservices as well as from other components.
    So intermicroservice communication is a concern.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Microservice communications are SOA friendly


    Careful observation of Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3) reveals
    another important concern in microservices architecture: the problem of maintaining
    data consistency across microservices. Since each microservice governs its own
    state and persistent data, and again since each microservice is typically deployed
    across its own process spaces, maintaining data consistency across microservices
    is going to be a challenge. Note the `Local` protocol marked as a communication
    mechanism between the `Order` and `Inventory` microservices; we will discuss it
    later in the `The ACID Within the BASE` section in Chapter [17](#477630_1_En_17_Chapter.xhtml).


    ### Message-Oriented Microservices


    When we say that microservices must be accessible from other microservices as
    well as from other components, we are talking about the communication mechanism
    by which microservices depend on each other. In the `Intermodule Communication`
    section in Chapter [2](#477630_1_En_2_Chapter.xhtml), we discussed the pros and
    cons of synchronous and asynchronous methods of communication. There is no hard-and-fast
    rule that we shouldn’t use synchronous calls between microservices. Carefully
    designed SOA interfaces are one of the best ways of designing microservice interfaces.
    Sending requests and receiving responses using the `JSON` (`Java Script Object
    Notation`) format over `REST` interfaces is very much advocated since services
    can be reused, whether a web client or a mobile client or any other Internet of
    Things (`IoT`) client. However, even SOA interfaces will make a microservice depend
    on other microservices. If the called microservice is not functioning properly,
    the caller microservice functionality cannot complete and the transaction is prone
    to failure. In the specific example in Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3),
    suppose either the `Shipping` microservice or the `Order History` microservice
    is not functioning. This will make the `Create Order` transaction fail. Careful
    analysis reveals that this need not be the case. If the `Order` microservice does
    not depend on the `Shipping` microservice or the `Order History` microservice,
    even if either the `Shipping` microservice or the `Order History` microservice
    doesn’t function properly, the `Create Order` transaction in the `Order` microservice
    can still succeed. How is this possible?


    The asynchronous or fire-and-forget style of intermodule communication can detach
    microservices from hard dependency between each other. We can use message queues
    between microservices so that in place of direct synchronous calls, microservices
    can communicate sending messages through queue between them. In Figure [3-4](#477630_1_En_3_Chapter.xhtml#Fig4),
    the architecture has been adjusted so as to bring a message queue system between
    microservices. The other SOA-based interfaces of the microservices have not been
    completely eliminated; they are retained but a message queue is also introduced.
    This is because any external component or service has to use the SOA interfaces
    of the e-commerce application or the e-commerce microservices. Along with that,
    any intermicroservice communication may be done using message queues. So, a request
    from the browser to confirm an order will hit the `Order` microservice using its
    SOA-based `REST` interface. The `Order` microservice will access its `Order` database
    and create the order. It should also make changes to the inventory database to
    deplete the inventory level by the amount just ordered.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Event-based microservices


    The `Create Order` transaction in the `Order` microservice will make entry in
    the order database, update the entry in the inventory database, and send messages
    to the message queue in an atomic manner. If any of these operations fail, the
    entire `Create Order` transaction will fail. If all of these operations succeed,
    the `Create Order` transaction will also succeed. Creating the order in the `Order`
    database and depleting the inventory in the `Inventory` database may be done within
    a single transaction. Here again let’s leave that complexity for a detailed discussion
    later.


    The message sent by the `Order` microservice to the queue while creating an order
    will then be picked up by the `Shipping` microservice and the `Order History`
    microservice.


    ## Advanced Microservices Capabilities


    You saw how to break a monolith application into a microservices-based architecture.
    You also learned about message queues in the microservices-based architecture,
    which help reduce intermicroservice coupling. Now let’s look at the advantages.'
  raw: '### Resemblance of Microservices to SOA


    As discussed, multiple microservices make up an application. Microservices must
    be accessible from other microservices or from other components like the presentation
    components. For intermicroservice communication, a suitable interprocess communication
    mechanism is required, since most of the time microservices are deployed into
    separate processes. You shouldn’t reinvent the wheel. You should adopt all the
    best practices you have been leveraging from the SOA bibles. Just like in SOA,
    in microservices too there are multiple options to expose services starting from
    high performance and binary level TCP-IP sockets to other remoting protocols like
    Java RMI, .NET Remoting, and RMI-IIOP to more web-friendly ones like SOAP or REST.


    Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3) shows a redrawn e-commerce microservices
    architecture from Figure [3-1](#477630_1_En_3_Chapter.xhtml#Fig1), highlighting
    few typical request flows. Assuming most of the presentation tier components can
    be cached by the browser once they are loaded initially from the presentation
    server, all subsequent hits can be directed to the services tier directly by the
    browser. This is what is shown in Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3)
    so that we concentrate on the microservices more. Keep in mind that even if we
    follow the typical presentation tier-based approach where all requests are always
    routed through the presentation server alone, the requests will hit the microservices
    next, which is nothing different from a request flow not passing through the presentation
    server. In Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3), assume that a request
    to confirm an order has hit the Order microservice. It will access its Order database
    and create the order. It should also make changes to the inventory database to
    deplete the inventory level by the amount we have ordered newly, by talking to
    the Inventory service. Assuming that there are other microservices like a Shipping
    microservice and an Order History microservice in the e-commerce application,
    the Order microservice will need to make requests to them as well while creating
    an order. The Shipping microservice will pack and ship the order whereas the Order
    History microservice will create an entry into the Order History database, which
    can be used for analytics purposes. In summary, microservices must be accessible
    from other microservices as well as from other components. So intermicroservice
    communication is a concern.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Microservice communications are SOA friendly


    Careful observation of Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3) reveals
    another important concern in microservices architecture: the problem of maintaining
    data consistency across microservices. Since each microservice governs its own
    state and persistent data, and again since each microservice is typically deployed
    across its own process spaces, maintaining data consistency across microservices
    is going to be a challenge. Note the “Local” protocol marked as a communication
    mechanism between the Order and Inventory microservices; we will discuss it later
    in the “The ACID Within the BASE” section in Chapter [17](#477630_1_En_17_Chapter.xhtml).


    ### Message-Oriented Microservices


    When we say that microservices must be accessible from other microservices as
    well as from other components, we are talking about the communication mechanism
    by which microservices depend on each other. In the “Intermodule Communication”
    section in Chapter [2](#477630_1_En_2_Chapter.xhtml), we discussed the pros and
    cons of synchronous and asynchronous methods of communication. There is no hard-and-fast
    rule that we shouldn’t use synchronous calls between microservices. Carefully
    designed SOA interfaces are one of the best ways of designing microservice interfaces.
    Sending requests and receiving responses using the JSON (Java Script Object Notation)
    format over REST interfaces is very much advocated since services can be reused,
    whether a web client or a mobile client or any other Internet of Things (IoT)
    client. However, even SOA interfaces will make a microservice depend on other
    microservices. If the called microservice is not functioning properly, the caller
    microservice functionality cannot complete and the transaction is prone to failure.
    In the specific example in Figure [3-3](#477630_1_En_3_Chapter.xhtml#Fig3), suppose
    either the Shipping microservice or the Order History microservice is not functioning.
    This will make the Create Order transaction fail. Careful analysis reveals that
    this need not be the case. If the Order microservice does not depend on the Shipping
    microservice or the Order History microservice, even if either the Shipping microservice
    or the Order History microservice doesn’t function properly, the Create Order
    transaction in the Order microservice can still succeed. How is this possible?


    The asynchronous or fire-and-forget style of intermodule communication can detach
    microservices from hard dependency between each other. We can use message queues
    between microservices so that in place of direct synchronous calls, microservices
    can communicate sending messages through queue between them. In Figure [3-4](#477630_1_En_3_Chapter.xhtml#Fig4),
    the architecture has been adjusted so as to bring a message queue system between
    microservices. The other SOA-based interfaces of the microservices have not been
    completely eliminated; they are retained but a message queue is also introduced.
    This is because any external component or service has to use the SOA interfaces
    of the e-commerce application or the e-commerce microservices. Along with that,
    any intermicroservice communication may be done using message queues. So, a request
    from the browser to confirm an order will hit the Order microservice using its
    SOA-based REST interface. The Order microservice will access its Order database
    and create the order. It should also make changes to the inventory database to
    deplete the inventory level by the amount just ordered.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Event-based microservices


    The Create Order transaction in the Order microservice will make entry in the
    order database, update the entry in the inventory database, and send messages
    to the message queue in an atomic manner. If any of these operations fail, the
    entire Create Order transaction will fail. If all of these operations succeed,
    the Create Order transaction will also succeed. Creating the order in the Order
    database and depleting the inventory in the Inventory database may be done within
    a single transaction. Here again let’s leave that complexity for a detailed discussion
    later.


    The message sent by the Order microservice to the queue while creating an order
    will then be picked up by the Shipping microservice and the Order History microservice.


    ## Advanced Microservices Capabilities


    You saw how to break a monolith application into a microservices-based architecture.
    You also learned about message queues in the microservices-based architecture,
    which help reduce intermicroservice coupling. Now let’s look at the advantages.'
  trans: '

    ### 微服务与 SOA 的相似性


    如前所述，一个应用程序由多个微服务组成。微服务必须能够被其他微服务或其他组件（如表示层组件）访问。由于大多数情况下微服务部署在独立的进程中，因此需要一种合适的进程间通信机制来实现微服务间的通信。你不必重新发明轮子，而应采纳所有从
    SOA 圣经中借鉴的最佳实践。与 SOA 类似，微服务也有多种服务暴露方式可选，从高性能的二进制级 TCP-IP 套接字，到 Java RMI、.NET Remoting、RMI-IIOP
    等远程协议，再到更符合 Web 风格的 SOAP 或 REST。


    图 3-3 重新绘制了图 3-1 中的电商微服务架构，并突出显示了几个典型的请求流程。假设表示层服务器首次加载后，浏览器可以缓存大部分表示层组件，那么后续所有请求都可以由浏览器直接发送到服务层。图
    3-3 展示的正是这种情况，以便我们更专注于微服务本身。请记住，即使我们采用传统的基于表示层的方法（所有请求始终仅通过表示层服务器路由），请求接下来也会到达微服务，这与不经过表示层服务器的请求流程并无本质区别。在图
    3-3 中，假设一个确认订单的请求到达了订单微服务。它将访问自己的订单数据库并创建订单。同时，它还需要与库存服务通信，对库存数据库进行修改，以扣除新订购的数量。假设电商应用中还存在其他微服务，如物流微服务和订单历史微服务，那么订单微服务在创建订单时也需要向它们发送请求。物流微服务负责打包和发货，而订单历史微服务则会在订单历史数据库中创建一条记录，用于分析目的。总之，微服务必须能够被其他微服务以及其他组件访问。因此，微服务间的通信是一个需要关注的问题。


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig3_HTML.jpg](img/477630_1_En_3_Fig3_HTML.jpg)


    图 3-3


    微服务通信是 SOA 友好的


    仔细观察图 3-3 会发现微服务架构中的另一个重要问题：跨微服务维护数据一致性的难题。由于每个微服务管理自己的状态和持久化数据，并且每个微服务通常部署在独立的进程空间中，因此跨微服务维护数据一致性将是一项挑战。请注意订单微服务和库存微服务之间标记为“本地”协议的通信机制；我们将在第
    17 章的“BASE 中的 ACID”一节中讨论它。


    ### 面向消息的微服务


    当我们说微服务必须能够被其他微服务以及其他组件访问时，我们指的是微服务相互依赖的通信机制。在第 2 章的“模块间通信”一节中，我们讨论了同步和异步通信方式的优缺点。并没有硬性规定说不能在微服务之间使用同步调用。精心设计的
    SOA 接口是设计微服务接口的最佳方式之一。通过 REST 接口使用 JSON（JavaScript 对象表示法）格式发送请求和接收响应是非常值得提倡的，因为无论是
    Web 客户端、移动客户端还是其他物联网客户端，服务都可以被复用。然而，即使是 SOA 接口也会使一个微服务依赖于其他微服务。如果被调用的微服务运行不正常，调用方微服务的功能就无法完成，事务也容易失败。在图
    3-3 的具体示例中，假设物流微服务或订单历史微服务运行不正常，这将导致创建订单事务失败。仔细分析后发现，情况并非必然如此。如果订单微服务不依赖于物流微服务或订单历史微服务，那么即使物流微服务或订单历史微服务运行不正常，订单微服务中的创建订单事务仍然可以成功。这怎么可能呢？


    异步或即发即弃的模块间通信方式可以使微服务摆脱彼此之间的硬依赖。我们可以在微服务之间使用消息队列，这样微服务就可以通过队列发送消息进行通信，而不是直接进行同步调用。在图
    3-4 中，架构已经过调整，在微服务之间引入了消息队列系统。微服务的其他基于 SOA 的接口并未完全消除；它们被保留了下来，但同时引入了消息队列。这是因为任何外部组件或服务都必须使用电商应用或电商微服务的
    SOA 接口。与此同时，任何微服务间的通信都可以通过消息队列进行。因此，浏览器确认订单的请求将使用其基于 SOA 的 REST 接口到达订单微服务。订单微服务将访问自己的订单数据库并创建订单。同时，它还需要对库存数据库进行修改，以扣除刚订购的数量。


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig4_HTML.jpg](img/477630_1_En_3_Fig4_HTML.jpg)


    图 3-4


    基于事件的微服务


    订单微服务中的创建订单事务将以原子方式在订单数据库中创建条目、更新库存数据库中的条目，并向消息队列发送消息。如果这些操作中的任何一个失败，整个创建订单事务将失败。如果所有这些操作都成功，创建订单事务也将成功。在订单数据库中创建订单和在库存数据库中扣减库存可以在单个事务内完成。这里我们再次将这种复杂性留待后续详细讨论。


    订单微服务在创建订单时发送到队列的消息，随后将由物流微服务和订单历史微服务接收。


    ## 高级微服务能力


    你已经了解了如何将单体应用拆分为基于微服务的架构。你还学习了基于微服务架构中的消息队列，它有助于降低微服务间的耦合度。现在，让我们来看看其优势。

    '
- fmt: '### Fail-Safe Microservices


    In the message-oriented microservices paradigm, the only essential condition for
    the `Create Order` transaction to succeed is that the `Create Order` microservice
    (which encompasses the `Order` and `Inventory` database too) and its associated
    message queue infrastructure should be up and running. It doesn’t matter whether
    the `Shipping` microservice and the `Order History` microservice are up and running
    or not. Assume that the `Shipping` microservice and the `Order History` microservice
    are down while creating an order. Any messages placed by the `Order` microservice
    as an outcome of order creation will be safe in the queue. Here again, we can
    assume that multiple instances of `Order` microservice can exist for redundancy
    and also clustered message queues will increase the reliability of queues. Persistent
    messages will be written to disk too as soon as they reach the queue. So if the
    message queue is persistent, even if one or all of the messaging infrastructure
    servers in the cluster go down after the `Create Order` transaction succeeds,
    the messages are still safe on disk. When we bring the queue up again, the message
    is still available for consumption. Durable queues keep messages around persistently
    for any suitable consumer to consume them, if the consumer was not live at the
    time when the message was reached. Durable queues do not need to concern themselves
    with which consumer is going to consume the messages at some point in the future.
    There is just one copy of a message that any consumer in the future can consume.
    Durable topics, however, are different because they must logically persist an
    instance of each suitable message for every durable consumer, since each durable
    consumer gets their own copy of the message. Thus, by judiciously combining the
    persistence and durability capability of queues or topics available within the
    messaging infrastructure, we can eliminate the dependency of the `Order` microservice
    from the `Shipping` microservice and the `Order History` microservice. At some
    later point in time when the `Shipping` microservice or the `Order History` microservice
    comes up again, they will consume the messages intended to be consumed by them
    and the rest of the functional flow will be continued by the respective microservices.


    ### Scalable Microservices


    In the “Scalability Dilemma” section in Chapter [2](#477630_1_En_2_Chapter.xhtml)
    we discussed that many logged in and anonymous users will browse through many
    product categories and product detail web pages, and the microservice serving
    those requests via the `Product` microservice will be stressed more compared to
    the stress felt by the `Order` microservice. This is because only a portion of
    the traffic due to browsing through the product category or the product detail
    web pages will finally get converted to a confirmed order transaction. So we need
    the capability to selectively scale the microservices of an application. We have
    already broken down the monolith e-commerce application into a microservices-based
    e-commerce application. The capability to selectively scale is a free offer we
    get with the microservices architecture. Figure [3-5](#477630_1_En_3_Chapter.xhtml#Fig5)
    depicts exactly this.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig5_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig5_HTML.jpg)


    **Figure 3-5** Scaled-out microservices


    Figure [3-5](#477630_1_En_3_Chapter.xhtml#Fig5) shows a typical microservices
    architecture deployed to scale selectively. This means the scalability of different
    parts of an application can be finely controlled and can be done independent of
    the other part. This is ultimate freedom.


    Compared to the e-commerce microservices architecture shown in Figure [3-1](#477630_1_En_3_Chapter.xhtml#Fig1),
    Figure [3-5](#477630_1_En_3_Chapter.xhtml#Fig5) shows the database outside the
    microservice boundary. But in the “Microservices Are Self-Contained” section,
    I said that a microservice bounds all of its resources including the database.
    Isn’t this a contradiction?


    Take the case of the `Product` microservice in Figure [3-5](#477630_1_En_3_Chapter.xhtml#Fig5).
    Four instances of the `Product` microservice are shown since we anticipate much
    more traffic in browsing product category and product details web pages compared
    to other parts of the application. But only a single `Product` database is shown
    and it is outside the boundary of the `Product` microservice. A product category
    or product details are a kind of master data for the e-commerce application. The
    database, once populated, is not going to change until we add a new product category
    or products or we retire an existing product category or product from the system.
    So the `Product` database is a “read” database. So, even if more than one instance
    of the `Product` microservice app server is going to connect to the single instance
    `Product` database, there won’t be any data consistency issues to be addressed.
    Further, if we enable caching, then the hits coming to the `Product` database
    can be further reduced. In short, even though we have shown the `Product` microservice
    instances in a process separate from that of the `Product` database, you can visualize
    them to be an integral and single block. So the definition that a microservice
    bounds all of its resources including the database still holds good.


    There are two instances of the `Order` microservices shown. Here again, the `Order`
    database is shown as outside the boundary of the `Order` microservice. The `Order`
    microservice is a shared database, and multiple instances of the `Order` microservice
    accessing a single instance of the `Order` database offer the complexity to address
    any possible data corruption. We can think of employing distributed locking of
    resources to address such shared data corruption issues. We will discuss more
    about this later but for the time being you can assume that even though the `Order`
    database is physically shown outside the boundary of the `Order` microservices,
    for every practical reasons it functions as an integrated whole of the `Order`
    microservice.


    But what about the messaging infrastructure discussed in the “Message-Oriented
    Microservices” section? It was purposefully eliminated in Figure [3-5](#477630_1_En_3_Chapter.xhtml#Fig5)
    to keep the complexity low. But now that you understand the basics of microservices
    scaling, I will introduce the message-oriented middleware to the microservices
    architecture so that the reference architecture is functionally complete.


    Note that there are two microservices in Figure [3-6](#477630_1_En_3_Chapter.xhtml#Fig6),
    out of the many microservices represented in Figure [3-1](#477630_1_En_3_Chapter.xhtml#Fig1).
    This is again to keep the diagram comprehensible. You need to visualize that all
    of the identified microservices have to be appropriately scaled in the architecture
    shown in Figure [3-6](#477630_1_En_3_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig6_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig6_HTML.jpg)


    **Figure 3-6** Scaling message-oriented microservices


    As is depicted in Figure [3-6](#477630_1_En_3_Chapter.xhtml#Fig6), any microservice
    will exchange information with any other microservice only in terms of messages
    over the messaging infrastructure. By leveraging the persistence and durable capability
    of queues or topics available within the messaging infrastructure, we can eliminate
    the direct dependency of a microservice to another dependent microservice. So
    if a few microservices are not available at the moment of a user transaction,
    still the business flow can proceed and complete at a later point in time when
    those microservices are brought back again.'
