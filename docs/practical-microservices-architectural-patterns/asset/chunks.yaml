    配置服务器

    外部化配置参数是微服务展现的一个关键特性。这对于应用程序参数和基础设施参数都是如此。当存在许多微服务时，在外部维护配置参数是一项重要的任务，而 Spring
    Cloud 的 Config Server 在此处为你提供了帮助。

    Spring Config Server 在版本控制的仓库（如 SVN 或 Git）中维护配置参数。同样，仓库可以是本地的或远程的，并且可以采用单节点或多节点配置以实现高可用性。由于配置参数可以进行版本控制，然后由生产服务器直接引用，因此可以完全避免因错误值等导致的运行时错误场景。


    设计一个配置场景


    你将在示例中引入 Config Server，而无需对其他微服务进行太多更改。在你的设计中，你将仅对 Product Server 微服务使用 Config
    Server，尽管它可以用于所有其他微服务。如图 8-18 所示，Product Server 微服务利用 Spring Cloud Config Server
    来管理其一个配置参数的值。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig18_HTML.jpg](img/477630_1_En_8_Fig18_HTML.jpg)


    图 8-18

