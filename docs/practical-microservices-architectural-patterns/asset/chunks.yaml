- fmt: "# The HAL Browser\n\nThe HAL Browser is a useful application based on the\
    \ HAL specification for handling HAL+JSON data. It’s a web app with HAL-powered\
    \ JavaScript. You can point it to any HAL-compliant Spring Data REST API and use\
    \ it to navigate the app and traverse through linked resources.\n\nTo enable your\
    \ application with HAL Browser, all you have to do is include the \"Rest Repositories\
    \ HAL Browser\" dependency in addition to your Spring Initializer along with the\
    \ dependencies mentioned in Figure [7-1](#477630_1_En_7_Chapter.xhtml#Fig1). So\
    \ your `pom.xml` will have the additional dependency shown in Listing [7-9](#477630_1_En_7_Chapter.xhtml#PC18).\n\
    \n```xml\n<dependency>\n    <groupId>org.springframework.data</groupId>\n    <artifactId>spring-data-rest-hal-browser</artifactId>\n\
    </dependency>\n```\n\n*Listing 7-9*  \n*Maven Dependency for Spring REST HAL Browser\
    \ (ch07\\ch07-02\\pom.xml)*\n\nNote that the `pom.xml` has a few more configuration\
    \ details, but all of those additional lines are for configuring Simple Logging\
    \ Façade for Java (SL4J), which acts as a façade for commonly used logging frameworks,\
    \ like Java Util Logging, Log4J, Log4J2, Logback, etc. When you write logging\
    \ code against the SL4J API, you have the flexibility to plug in your desired\
    \ logging framework at deployment time, which is made possible through an intermediate\
    \ bridge/adapter layer. There is also an \"Exclude\" configuration to exclude\
    \ the built-in Logback dependency since Spring Boot will pick and use Logback\
    \ by default if present in the classpath.\n\nSince the sample application kept\
    \ in folder `ch07\\ch07-02` is similar to the code you saw in `ch07\\ch07-01`,\
    \ I won’t explain it here. Make sure MongoDB is up and running. You may want to\
    \ refer to Appendix A to get started with MongoDB.\n\nYou can build and run the\
    \ application as follows:\n\n```\ncd ch07\\ch07-02\nD:\\binil\\gold\\pack03\\\
    ch07\\ch07-02>build\nD:\\binil\\gold\\pack03\\ch07\\ch07-02>mvn clean package\
    \ -Dmaven.test.skip=true\ncd ch07\\ch07-02\nD:\\binil\\gold\\pack03\\ch07\\ch07-02>run\n\
    D:\\binil\\gold\\pack03\\ch07\\ch07-02>mvn spring-boot:run\n```\n\nThe `spring-data-rest-hal-browser`\
    \ dependency autoconfigures the HAL Browser to be served up when you visit your\
    \ application’s root URI. You can point your browser to:\n\n```\nhttp://localhost:8080\n\
    ```\n\nThis will get redirected to the URL shown in Figure [7-5](#477630_1_En_7_Chapter.xhtml#Fig5).\n\
    \nThere are GET and Non-GET actions for the REST end points and you can either\
    \ click the GET button and navigate and view one of the collections, or click\
    \ the non-GET options to make changes to the collection. This is made possible\
    \ automatically by enabling the HAL Browser to read the links from the response\
    \ and display them on a list on the left side of the browser; on the right side\
    \ of the browser are details from the response including headers and the body\
    \ (a HAL document).\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig5_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig5_HTML.jpg)\n\
    \n*Figure 7-5*  \n*Spring Data REST HAL Browser*\n\nThe HAL Browser speaks to\
    \ the URI template. You may follow one of the GET methods next to Products or\
    \ Categories via the question mark icon. An expansion dialog will pop up if you\
    \ choose to navigate to it, as shown in Figure [7-6](#477630_1_En_7_Chapter.xhtml#Fig6).\n\
    \n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig6_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig6_HTML.jpg)\n\
    \n*Figure 7-6*  \n*Expand the GET method of the HAL URI template*\n\nYou can click\
    \ the Follow URI button without entering anything; if so, the variables will essentially\
    \ be ignored and you will receive back all the elements of the collection from\
    \ the server. Similarly, you may also click a non-GET buttons above, which will\
    \ then pop up a dialog, as shown in Figure [7-7](#477630_1_En_7_Chapter.xhtml#Fig7).\
    \ By default, it shows a POST method. This field can be adjusted to either PUT\
    \ or PATCH the resource. The headers are by default properly filled out to submit\
    \ a new JSON document. You may note that the fields are automatically supplied\
    \ based on the metadata of the resources. This is automatically generated by the\
    \ Spring Data REST.\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig7_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig7_HTML.jpg)\n\
    \n*Figure 7-7*  \n*Expand the non-GET method of the HAL URI template*\n\n## Test\
    \ HAL REST End Points Using RestTemplate\n\nYou may now execute the Junit tests\
    \ using Maven. The tests are provided in the folder `ch07-02\\src\\test\\java\\\
    com\\acme\\ch07\\ex02\\product`. The tests in the previous section of this chapter\
    \ directly accessed the Mongo repository and did data operations; however, the\
    \ tests in this section will hit the REST API automatically generated by Spring\
    \ Data REST. Listings [7-10](#477630_1_En_7_Chapter.xhtml#PC21) through [7-12](#477630_1_En_7_Chapter.xhtml#PC23)\
    \ examine the code required to do data operations hitting the HAL REST end points\
    \ using `RestTemplate`. Listing [7-10](#477630_1_En_7_Chapter.xhtml#PC21) shows\
    \ how to create new resources in the server by invoking the HTTP POST method.\
    \ It also shows how to invoke the HTTP DELETE method, which you do in the test\
    \ initialization setup.\n\n```java\npublic class ProductHalRestTemplateTest {\n\
    \    private static String PRODUCT_SERVICE_URL = \"http://127.0.0.1:8080/products\"\
    ;\n\n    @Before\n    public void setUp(){\n        deleteAllProducts();\n   \
    \ }\n\n    @Test\n    public void testPostProduct(){\n        try{\n         \
    \   Product productNew1 = createProduct(\"1\");\n            Product productNew2\
    \ = createProduct(\"2\");\n            RestTemplate restTemplate = restTemplate();\n\
    \            Product productRetreived1 = restTemplate.postForObject(\n       \
    \         PRODUCT_SERVICE_URL, productNew1, Product.class);\n            Product\
    \ productRetreived2 = restTemplate.postForObject(\n                PRODUCT_SERVICE_URL,\
    \ productNew2, Product.class);\n            assertTrue(\"successfully saved\"\
    ,true);\n        }catch(Exception ex){\n            assertTrue(\"successfully\
    \ failed\",true);\n        }\n    }\n\n    public void deleteAllProducts(){\n\
    \        RestTemplate restTemplate = restTemplate();\n        List productList\
    \ = getAllProducts();\n        productList.forEach(item->restTemplate.delete(\n\
    \            PRODUCT_SERVICE_URL + \"/\" + item.getId())\n        );\n    }\n\n\
    \    private RestTemplate restTemplate() {\n        ObjectMapper mapper = new\
    \ ObjectMapper();\n        mapper.configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES,\
    \ false);\n        mapper.registerModule(new Jackson2HalModule());\n        MappingJackson2HttpMessageConverter\
    \ converter = \n            new MappingJackson2HttpMessageConverter();\n     \
    \   converter.setSupportedMediaTypes(\n            MediaType.parseMediaTypes(\"\
    application/hal+json\"));\n        converter.setObjectMapper(mapper);\n      \
    \  return new RestTemplate(Arrays.asList(converter));\n    }\n}\n```\n\n*Listing\
    \ 7-10*  \n*Testing HAL REST End Points Using RestTemplate (ch07\\ch07-02\\src\\\
    test\\java\\com\\acme\\ch07\\ex02\\product\\ProductHalRestTemplateTest.java)*\n\
    \nYou can query the newly created resources using the HTTP GET method, as shown\
    \ in Listing [7-11](#477630_1_En_7_Chapter.xhtml#PC22)."
