- fmt: "### Microservice 2: Broker-Web\n\nThis microservice is straightforward, with\
    \ REST controllers. You can invoke the test cases by sending HTTP requests to\
    \ this microservice. You can also keep watching the dashboard, which will provide\
    \ you with view for the `Quotes` table so that you can visualize the effect of\
    \ your test. Figure [13-6](#477630_1_En_13_Chapter.xhtml#Fig6) shows how various\
    \ interactions can be done with the Broker Web microservice.\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig6_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig6_HTML.jpg)\n\
    \n**Figure 13-6** The Broker Web console\n\n### Microservice 3: Quote Settlement\
    \ (Settlement-ActiveMQ-Derby)\n\nVisit `pom.xml` to see the Atomikos distributed\
    \ transaction manager dependency. You have all of the dependencies described already\
    \ in Microservice 2, the Broker-MySQL-ActiveMQ microservice. However, as depicted\
    \ in the architecture diagram, you are using a Derby database in place of MySQL\
    \ for the downstream settlement of quotes. I will not repeat the dependencies\
    \ you have already seen; Listing [13-12](#477630_1_En_13_Chapter.xhtml#PC13) shows\
    \ the dependency for the Derby client alone.\n\n```xml\n<dependency>\n    <groupId>org.apache.derby</groupId>\n\
    \    <artifactId>derbyclient</artifactId>\n    <version>10.14.1.0</version>\n\
    </dependency>\n```\n\n**Listing 13-12** Maven Dependency for the Derby Client\
    \ (`ch13\\ch13-01\\XA-TX-Distributed\\Settlement-ActiveMQ-Derby\\pom.xml`)\n\n\
    My intention with using a Derby database in place of MySQL is just to make you,\
    \ the reader, comfortable using XA transactions with an additional XA-compliant\
    \ resource, a Derby database, so that as a subsequent exercise you have all the\
    \ tools to try for yourself XA transactions across two XA-compliant databases\
    \ within a single XA transaction. But you will not attempt that exercise in this\
    \ text, since it is outside the scope of our discussion.\n\nWhen a new quote message\
    \ reaches the ActiveMQ queue, it will be picked up instantaneously by the settlement\
    \ listener. The settlement listener is a JMS listener and it consumes messages\
    \ from the queue in a transaction. See Listing [13-13](#477630_1_En_13_Chapter.xhtml#PC14).\n\
    \n```java\npublic class SettlementListener implements MessageListener {\n    @Autowired\n\
    \    @Qualifier(\"quotesReconcileServiceRequired_TX\")\n    QuotesReconcileService\
    \ quotesReconcileServiceRequired_TX;\n    @Autowired\n    @Qualifier(\"quotesReconcileServiceRequiresNew_TX\"\
    )\n    QuotesReconcileService quotesReconcileServiceRequiresNew_TX;\n\n    public\
    \ void onMessage(Message message) {\n        try {\n            reconcile((QuoteDTO)\
    \ objectMessage.getObject());\n        } catch (JMSException e) {\n          \
    \  throw new RuntimeException(e);\n        } catch (QuotesBaseException e) {\n\
    \            throw new RuntimeException(e);\n        }\n    }\n\n    private void\
    \ reconcile(QuoteDTO quoteDTO) throws QuotesBaseException {\n        Integer testCase\
    \ = quoteDTO.getTest();\n        if (testCase.equals(1) || testCase.equals(2)\
    \ || testCase.equals(4) || testCase.equals(8)) {\n            quotesReconcileServiceRequired_TX.reconcile(quoteDTO);\n\
    \        } else if (testCase.equals(5)) {\n            try {\n               \
    \ quotesReconcileServiceRequiresNew_TX.reconcile(quoteDTO);\n            } catch\
    \ (QuotesBaseException quotesBaseException) {\n                LOGGER.error(quotesBaseException.getMessage());\n\
    \            }\n            flipFlop();\n        } else if (testCase.equals(6))\
    \ {\n            try {\n                quotesReconcileServiceRequiresNew_TX.reconcile(quoteDTO);\n\
    \            } catch (QuotesBaseException quotesBaseException) {\n           \
    \     LOGGER.error(quotesBaseException.getMessage());\n            }\n       \
    \ } else if (testCase.equals(7)) {\n            try {\n                quotesReconcileServiceRequired_TX.reconcile(quoteDTO);\n\
    \            } catch (QuotesBaseException quotesBaseException) {\n           \
    \     LOGGER.error(quotesBaseException.getMessage());\n            }\n       \
    \     flipFlop();\n        } else {\n            LOGGER.debug(\"Undefined Test\
    \ Case\");\n        }\n    }\n}\n```\n\n**Listing 13-13** Transacted Message Listener\
    \ Orchestrating Message Consumption and Quotes Settlement (`ch13\\ch13-01\\XA-TX-Distributed\\\
    Settlement-ActiveMQ-Derby\\src\\main\\java\\com\\acme\\ecom\\messaging\\SettlementListener.java`)\n\
    \nOn consuming the message, the settlement listener will invoke the `QuotesReconcileService.reconcile(QuoteDTO)`\
    \ method to reconcile and settle the quote, again in a transaction. See Listing\
    \ [13-14](#477630_1_En_13_Chapter.xhtml#PC15).\n\n```java\npublic class QuotesReconcileServiceImpl\
    \ implements QuotesReconcileService {\n    @Autowired\n    private UserRepository\
    \ userRepository;\n\n    @Override\n    public void reconcile(QuoteDTO quoteDTO)\
    \ throws QuotesBaseException {\n        Integer testCase = quoteDTO.getTest();\n\
    \        Optional sellerQueried = userRepository.findById(quoteDTO.getSellerId());\n\
    \        Optional buyerQueried = userRepository.findById(quoteDTO.getBuyerId());\n\
    \        User seller = null;\n        User buyer = null;\n        User sellerSaved\
    \ = null;\n        User buyerSaved = null;\n        Date updatedDate = null;\n\
    \n        seller = (User) sellerQueried.get();\n        buyer = (User) buyerQueried.get();\n\
    \        updatedDate = new Date();\n\n        seller.setAmountSold(seller.getAmountSold()\
    \ + quoteDTO.getAmount());\n        seller.setUpdatedAt(updatedDate);\n      \
    \  seller.setLastQuoteAt(quoteDTO.getCreatedAt());\n        sellerSaved = userRepository.save(seller);\n\
    \n        buyer.setAmountBought(buyer.getAmountBought() + quoteDTO.getAmount());\n\
    \        buyer.setUpdatedAt(updatedDate);\n        buyer.setLastQuoteAt(quoteDTO.getCreatedAt());\n\
    \        buyerSaved = userRepository.save(buyer);\n\n        if (testCase.equals(6))\
    \ {\n            throw new QuotesReconcileRollbackException(\"Explicitly thrown\
    \ by Reconcile Application to Roll Back!\");\n        }\n        if (testCase.equals(7))\
    \ {\n            flipFlop();\n        }\n    }\n}\n```\n\n**Listing 13-14** Quotes\
    \ Reconcile Service Doing Settlement Reconciliation (`ch13\\ch13-01\\XA-TX-Distributed\\\
    Settlement-ActiveMQ-Derby\\src\\main\\java\\com\\acme\\ecom\\service\\QuotesReconcileServiceImpl.java`)\n\
    \nDuring reconciliation, you update the `amountSold` and the `amountBought` attributes\
    \ of the Seller and the Buyer respectively, thus these two attributes represent\
    \ the running totals as shown in code Listing [13-14](#477630_1_En_13_Chapter.xhtml#PC15).\
    \ For the completeness of the discussion, Listing [13-15](#477630_1_En_13_Chapter.xhtml#PC16)\
    \ shows the User entity.\n\n```java\n@Entity\n@Table(name = \"stockuser\")\n@Data\n\
    @EqualsAndHashCode(exclude = { \"id\" })\npublic class User {\n    @Id\n    @Column(name\
    \ = \"id\", nullable = false, updatable = false)\n    private Long id;\n    @Column(name\
    \ = \"name\", nullable = false, updatable = false)\n    private String name;\n\
    \    @Column(name = \"amountsold\", nullable = true, updatable = true)\n    private\
    \ Double amountSold;\n    @Column(name = \"amountbought\", nullable = true, updatable\
    \ = true)\n    private Double amountBought;\n    @Column(name = \"lastquoteat\"\
    , nullable = true, updatable = true)\n    @Temporal(TemporalType.TIMESTAMP)\n\
    \    private Date lastQuoteAt;\n    @Column(name = \"createdat\", nullable = false,\
    \ updatable = false)\n    @Temporal(TemporalType.TIMESTAMP)\n    private Date\
    \ createdAt;\n    @Column(name = \"updatedat\", nullable = false, updatable =\
    \ true)\n    @Temporal(TemporalType.TIMESTAMP)\n    private Date updatedAt;\n\
    }\n```\n\n**Listing 13-15** User Entity (`ch13\\ch13-01\\XA-TX-Distributed\\Settlement-ActiveMQ-Derby\\\
    src\\main\\java\\com\\acme\\ecom\\model\\user\\User.java`)\n\nThat’s all the main\
    \ Java files for the microservice. The main configuration of wiring the above\
    \ classes with the Atomikos XA transaction manager is done in the file `spring-listener-derbyl.xml`,\
    \ shown in Listing [13-16](#477630_1_En_13_Chapter.xhtml#PC17).\n\n```xml\n<bean\
    \ id=\"dataSource\" class=\"com.atomikos.jdbc.AtomikosDataSourceBean\" init-method=\"\
    init\" destroy-method=\"close\">\n    <property name=\"uniqueResourceName\" value=\"\
    JDBC-2\"/>\n    <property name=\"xaDataSourceClassName\" value=\"org.apache.derby.jdbc.EmbeddedXADataSource\"\
    />\n    <property name=\"xaProperties\">\n        <props>\n            <prop key=\"\
    databaseName\">D:/Applns/apache/Derby/derbydb/exampledb</prop>\n            <prop\
    \ key=\"createDatabase\">create</prop>\n        </props>\n    </property>\n  \
    \  <property name=\"poolSize\" value=\"5\"/>\n    <property name=\"maxPoolSize\"\
    \ value=\"10\"/>\n    <property name=\"minPoolSize\" value=\"2\"/>\n    <property\
    \ name=\"testQuery\" value=\"VALUES 1\"/>\n    <property name=\"borrowConnectionTimeout\"\
    \ value=\"30\"/>\n    <property name=\"maintenanceInterval\" value=\"60\"/>\n\
    </bean>\n\n<bean id=\"jtaTransactionManager\" class=\"org.springframework.transaction.jta.JtaTransactionManager\"\
    >\n    <property name=\"transactionManager\" ref=\"atomikosTransactionManager\"\
    />\n    <property name=\"userTransaction\" ref=\"atomikosUserTransaction\"/>\n\
    </bean>\n\n<bean id=\"atomikosTransactionManager\" class=\"com.atomikos.icatch.jta.UserTransactionManager\"\
    \ init-method=\"init\" destroy-method=\"close\">\n    <property name=\"forceShutdown\"\
    \ value=\"true\"/>\n</bean>\n\n<bean id=\"atomikosUserTransaction\" class=\"com.atomikos.icatch.jta.UserTransactionImp\"\
    >\n    <property name=\"transactionTimeout\" value=\"300\"/>\n</bean>\n\n<bean\
    \ id=\"jpaVendorAdapter\" class=\"org.springframework.orm.jpa.vendor.HibernateJpaVendorAdapter\"\
    >\n    <property name=\"databasePlatform\" value=\"com.acme.ecom.AtomikosJtaPlatform\"\
    />\n    <property name=\"showSql\" value=\"true\"/>\n    <property name=\"generateDdl\"\
    \ value=\"true\"/>\n</bean>\n\n<bean id=\"entityManagerFactory\" class=\"org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean\"\
    >\n    <property name=\"dataSource\" ref=\"dataSource\"/>\n    <property name=\"\
    jpaVendorAdapter\" ref=\"jpaVendorAdapter\"/>\n    <property name=\"packagesToScan\"\
    \ value=\"com.acme.ecom.model\"/>\n    <property name=\"jpaProperties\">\n   \
    \     <props>\n            <prop key=\"hibernate.transaction.jta.platform\">com.acme.ecom.AtomikosJtaPlatform</prop>\n\
    \            <prop key=\"hibernate.dialect\">org.hibernate.dialect.DerbyTenSevenDialect</prop>\n\
    \            <prop key=\"hibernate.hbm2ddl.auto\">update</prop>\n        </props>\n\
    \    </property>\n</bean>\n\n<bean id=\"jtaTransactionManager\" class=\"org.springframework.transaction.jta.JtaTransactionManager\"\
    >\n    <property name=\"transactionManager\" ref=\"atomikosTransactionManager\"\
    />\n    <property name=\"userTransaction\" ref=\"atomikosUserTransaction\"/>\n\
    </bean>\n\n<tx:advice id=\"txAdvice\" transaction-manager=\"jtaTransactionManager\"\
