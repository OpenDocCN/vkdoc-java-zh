    ## Ribbon, the Client-Side Load Balancer


    Having looked at the Feign client and the Hystrix fallback, now is the right time
    to introduce the next important component in Spring Cloud: Ribbon. Ribbon is a
    client-side load balancer that gives you extra control over the behavior of HTTP
    and TCP clients. Feign already uses Ribbon, so understanding Ribbon is crucial.
    Load balancing distributes incoming traffic between two or more microservices.
    It enables you to achieve fault tolerance in your microservice applications. Load
    balancing aims to optimize resource usage, maximize throughput, minimize response
    time, and avoid overloading any single microservice. Using multiple microservice
    instances of the same service with load balancing instead of a single instance
    may increase reliability and availability at the cost of redundancy.


    Ribbon offers configuration options such as connection timeouts, retries, retry
    algorithms (exponential, bounded back off), load balancing, fault tolerance, support
    for multiple protocols (HTTP, TCP, UDP), support in an asynchronous and reactive
    model, caching, and batching.


    ### Design a Ribbon Client Scenario


    You will use the same design you used in the section for the Feign client. However,
    you will enhance the Feign client to internally leverage Ribbon. The design is
    shown in Figure [8-10](#477630_1_En_8_Chapter.xhtml#Fig10).


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig10_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig10_HTML.jpg)


