    \ 和 rabbit2 是你集群中 RabbitMQ 服务器实例的节点名称，日志会写入我机器上的以下文件：\n\n```\nC:\\Users\\binil\\\
    AppData\\Roaming\\RabbitMQ\\log\\rabbit1.log\nC:\\Users\\binil\\AppData\\Roaming\\\
    RabbitMQ\\log\\rabbit2.log\n```\n\n你应该能够在集群中任何一个 RabbitMQ 实例的日志中看到以下行：\n\n```\n\
    =INFO REPORT==== 12-Jun-2017::19:50:59 ===\naccepting AMQP connection  (127.0.0.1:54315\
    \ -> 127.0.0.1:5673)\n=INFO REPORT==== 12-Jun-2017::19:50:59 ===\nMirrored queue\
    \ 'remoting.queue' in vhost '/': Adding mirror on node rabbit1@tiger: \n```\n\n\
    上述日志验证了两个方面的内容：\n\n*   该日志文件对应的实例已接受来自消息发送者的 AMQP 连接。\n*   在收到来自消息发送者的消息后，该日志文件对应的实例已镜像该队列，这导致集群中\
    \ RabbitMQ 服务器的其他实例也收到了相同的消息。\n\n你现在可以启动消息消费者：\n\n```\ncd ch06-03\nD:\\binil\\\
    gold\\pack03\\ch06\\ch06-03>mvn test –Plisten\n```\n\n如果一切顺利，监听器将消费之前发送的消息，这可以在消息监听器窗口通过以下\
    \ DEBUG 消息确认：\n\n```\n2017-06-12 19:56:58 DEBUG com.acme.ch06.ex03.Listener.onMessage:19\
    \ - Listener received message-----> Message from Sender on Mon Jun 12 19:50:59\
    \ IST 2017\n```\n\n为了进行集群测试的下一阶段，请在消息消费者窗口中按 Ctrl+C 关闭消息消费者。\n\n接下来，使用消息生产者向集群发送一条新消息。检查两个\
    \ RabbitMQ 实例的日志文件，找出哪个实例消费了该消息。消费了该消息的实例将有一个类似于以下的 INFO REPORT：\n\n```\naccepting\
    \ AMQP connection  (127.0.0.1:54746 -> 127.0.0.1:5672)\n```\n\n然后，在消息消费者窗口中按 Ctrl+C\
    \ 关闭消费了该消息的同一个实例。仅让集群的另一个实例运行，然后启动消息消费者。如果一切顺利，监听器将消费之前发送的消息。这验证了集群按预期工作，并且一个实例接收到的消息正在被镜像到另一个实例。\n\
    \n如果 RabbitMQ 集群实例退出或崩溃，除非你另有指示，否则它将忘记该实例中的队列和消息。要确保消息不丢失，需要做两件事：\n\n*   你需要将队列和消息都标记为持久化（durable）。\n\
    *   你需要通过设置 `MessageProperties` 将消息标记为持久（persistent）。\n\n你可以尝试这些选项以及其他选项。我在此不再赘述，因为它们不在本书的讨论范围之内。\n"
- fmt: '# Tying the Knots Between the Consumer and Producer


    The very advantage of using a messaging infrastructure – making the message producer
    and message consumer flows disjoint – by itself can sometimes be a challenge for
    the application developer.


    In a typical synchronous request-response call by a client, the server can accept
    connections from the client in a single thread, process the request in that thread,
    and provide a response to the client in the same thread. However, connections
    and threads are scarce resources and you want to utilize them effectively. If
    the server-side processing is going to take a lot of time, or if the server thread
    is getting blocked in idling mode like waiting for I/O operations, blocking the
    thread is not desired. Instead, you want to design in such a way that the thread
    that accepted the connections is released to accept more connections and the processing
    and subsequent response to the client is handled in the background by different
    threads, that too just in time whenever the processing can proceed or just in
    time whenever the response is ready to be delivered back to the client. This is
    trivial to implement if you have one server and one client. The moment you have
    numerous clients all connecting to a server, also concurrently, if you release
    the thread that accepted the socket connection just after the connection is made
    but before the server provides a response back to the client, then later when
    the response is ready, it will pose a challenge to the server to correlate to
    which client all the responses are to be sent back.


    ## Correlation ID


    In the scenario presented above, you can create a callback queue for every request.
    But that’s pretty inefficient. Fortunately there is a better way: by creating
    a single callback queue per client. But it raises a new issue; having received
    a response in that queue, it’s not clear to which specific request from the same
    client the response belongs. That’s where the `correlationId` property is used.
    You can set it to a unique value for every request. Later, when you receive a
    message in the callback queue, you’ll look at this property, and based on it you’ll
    be able to match a response with a request.


    When you design a server handling request and response from multiple clients,
    make sure that you set the value of `JMS Correlation ID` on the response to the
    value of `JMS Correlation ID` on the request before sending the `JMS` response
    to the queue.


    You can obtain the `JMS Correlation ID` when you receive a message using:


    ```java

    String getJMSCorrelationID()

    ```


    This method returns correlation ID values that provide specific message IDs or
    application-specific string values.


    To set the `JMS Correlation ID` when you send a message, type:


    ```java

    void setJMSCorrelationID(String correlationID)

    ```


    Let’s look at a sample to understand this concept.


    ## Code a Custom Network Server to Handle Concurrent Heavy Traffic


    In this section, you will design and implement a network server listening using
    a TCP/IP server socket. Multiple clients or multiple threads from same client
    can open connections to this server and submit jobs; these clients or threads
    expect a response to the job back. You want the design to handle heavy traffic.
    Let’s visit the architecture and control flow in the server. Figure [6-16](#477630_1_En_6_Chapter.xhtml#Fig16)
    shows the architecture of the entire setup.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig16_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig16_HTML.jpg)


    **Figure 6-16** Architecture to handle heavy traffic with optimized resources


    Two separate domains are shown here with names `TCP IP Network` and `AMQP Network`.
    To make it simple, assume that the client-to-server connections are handled within
    the `TCP IP Network` domain in a “pseudo synchronous” manner whereas for the actual
    job execution, the job is submitted asynchronously to the `AMQP` network and the
    response is also received from the `AMQP` network asynchronously. Such an architecture
    makes sure that the `TCP IP Network` domain is not stressed by actually executing
    the job, hence connection management can be done efficiently. At the same time,
    submission of the job to the `AMQP` network domain is through message queues,
    so if the actual job processing within the `AMQP` network domain takes some time,
    additional jobs submitted to the queues are not lost but buffered so that the
    `Message Processor Listener` in the `AMQP` network domain can handle them at a
    later time.


    You should have noted that while the handshake between the client and the network
    server is synchronous, the one between the network server in the `TCP IP Network`
    and the `Message Processor Listener` in the `AMQP` network domain happens to be
    asynchronous. Thus, the request and response flows between the network server
    and the message processor are disjointed and there is a need to correlate which
    response corresponds to which request so that the network server can channel it
    back to the right instance of client.


    Note that the flows marked in dotted lines are passing through multiple components
    in some cases, and it is shown like that intentionally to depict that all of those
    components are involved in that particular flow. The complete and running code
    samples for this exercise are kept in the folder named `ch06-04` bundled along
    with the book. Let’s understand each component and the control flow in detail:


    - **Client**: Multiple clients or multiple threads from a single client can connect
    to the server and submit a job. In this sample, you will just send a message in
    place of a heavy job.


    - **Server Socket**: There is one instance of the server socket listening in a
    port known to clients so that clients can initiate connections.


    - **Client Sockets**: For each connection opened by a thread on the client side
    there is an instance of a client socket on the `TCP IP Network` side and messages
    are passed between server and client bidirectionally through the streams created
    out of this.


    - **Network Server**: The primary job of the “main” method of this component is
    to accept connections, do any processing, and return responses back to clients.
    The design constraint is that the network server has to do all of this in an efficient
    manner. So, whenever a client connects to the network server, the server first
    accepts the connection and then creates a unique ID, which is used to correlate
    request and response flows. The corresponding client socket is indexed against
    this correlation ID and the server then gets a thread from the executor pool and
    asks the thread to handle the job for the client by assigning the job to a network
    reader task and providing the correlation ID. Once this much is done, the server
    is free and available to handle more clients.


    - **Executor Pool**: The executor pool is a `ThreadPoolExecutor` that executes
    each submitted task using one of possibly several pooled threads.


    - **Network Reader Task**: Whenever a client connects to the network server, a
    separate network reader task gets executed within a pooled thread. It will read
    message (or job) sent by client and submits it to the `networkQueue` for execution
    to the message processor.'
