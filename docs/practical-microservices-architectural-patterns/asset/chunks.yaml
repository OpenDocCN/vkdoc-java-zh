- fmt: '# High Availability in Microservices


    I will not explain these levels or explore specific means to attain these levels
    of availability, since we have been describing and practicing them for decades
    and there are separate books^([^(14)](#fn14)) and references^([^(15)](#fn15))
    to explain them. Our discussion will be just enough background for you to relate
    it to this microservices HA discussions.


    ## Baselining High Availability


    High availability baselines can be defined based on two parameters:


    - **Recovery Time Objective (RTO)**: The amount of time a business can function
    without the system’s availability

    - **Recovery Point Objective (RPO)**: How old the data will be once systems do
    recover


    Based on the `RTO` and `RPO` baseline objectives and further based on the available
    budgets, accessible technologies, business criticality, and available technical
    expertise, software components are to be designed to attain the required level
    of availability.


    ## Decomposing High Availability


    If you have an infrastructure consisting of two identical, redundant web servers
    behind a load balancing router, traffic coming from client devices can be equally
    distributed between the web servers. However, if one of the servers goes down,
    the load balancer will redirect all subsequent traffic to the remaining online
    server. This is a simple mechanism which, if carefully extended, can be utilized
    to design HA for different elements. The Internet, internal networks, network
    devices, and software components are all elementary links of an end-to-end HA
    chain. You will look at the essential links required for our discussion so that
    the concepts and the sample demonstrated towards the end of the chapter will make
    sense to you. Also, I will explain aspects in the context of an on-premises or
    private data center in this chapter. In Chapter [16](#477630_1_En_16_Chapter.xhtml),
    when I describe advanced HA patterns, I will explain in the context of a public
    cloud so that you will have a broader view of how HA has to be looked at both
    in the context of a private and a public cloud.


    ## DNS Redundancy


    The “The Bootstrap URL” section in Chapter [8](#477630_1_En_8_Chapter.xhtml) introduced
    the Domain Name System (DNS) into the microservices architecture. Since the DNS
    serves as the phone book for the Internet by translating human-friendly computer
    hostnames into IP addresses, it serves as the bootstrap mechanism for most of
    the software-related operations through the Internet. It makes sense to understand
    availability starting from this point onwards. This means you need to understand
    mechanisms for DNS redundancy.


    DNS outages may happen due to configuration errors, infrastructure failure, or
    a DDoS attack. DNS redundancy is a failsafe solution or a backup mechanism for
    such scenarios. If the DNS name servers are overloaded with more requests than
    they can serve, or they are down or responding sluggishly due to any of the above
    reasons, this creates latency in the DNS network, making the resolution process
    sluggish and eventually the DNS server will be rendered unavailable for most users.
    You can introduce DNS redundancy to the single-server architecture by expanding
    the number or choice of name servers that are available so that there are more
    name servers responding to the DNS queries. Figure [9-1](#477630_1_En_9_Chapter.xhtml#Fig1)
    shows a typical redundant DNS setup where each DNS server has the capability to
    act as a primary server responding to DNS queries.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** DNS redundancy


    Let’s look into more details of this now; see Figure [9-2](#477630_1_En_9_Chapter.xhtml#Fig2).
    When setting up DNS redundancy, the servers can be set up as either primary, secondary
    or as primary, primary.^([^(16)](#fn16)) Maintaining multiple DNS providers and
    keeping them in sync is a complex process, but it ensures higher availability
    without compromising the advanced DNS functionalities supported by the DNS providers.
    When evaluating multiple DNS providers for your multi-DNS network, consider the
    global point of presence (PoP) of the providers and make sure these providers
    on separate networks can be seamlessly integrated using APIs.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg)


    **Figure 9-2** How DNS redundancy works


    ## DNS Load Balancing


    Once DNS redundancy is taken care, you need to think about DNS load balancing.
    A DNS load balancer reviews a list of servers and sends one connection to each
    server in turn. When a DNS change takes place, it has to be recorded on the ISP
    (Internet Service Provider) level. ISPs only refresh their DNS cache once every
    TTL (time to live) cycle. This implies that until the cache is updated, the ISPs
    are unaware of any changes that took place and continue to route traffic to the
    wrong server.


    Instead of local load balancing, you can opt for global load balancing. Global
    DNS load balancing distributes traffic across multiple data centers to improve
    performance and availability; however, it again depends on your strategy for hosting
    across geographies. If your hosting is active-active across geographies, you can
    opt for global load balancing. There are solutions that can monitor connection
    quality between geographically dispersed sites at any given time, and also the
    actual requester geographical location and route traffic based on it. See Figure
    [9-3](#477630_1_En_9_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg)


    **Figure 9-3** Global server load balancing


    ## ISP Redundancy


    ISPs provide you with pipes (or connections) from your enterprise to the Internet
    (Figure [9-4](#477630_1_En_9_Chapter.xhtml#Fig4)). If this pipe or path is down,
    it affects your network connectivity, which in turn affects your enterprise application
    availability. This is where ISP redundancy comes to your rescue.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** Enterprise connectivity to an ISP'
