    ## Test the Duplicate Message Consumption Scenario


    To test the Duplicate Message Consumption test case, take Postman again and create
    another new quote, as shown (see Figure [14-17](#477630_1_En_14_Chapter.xhtml#Fig17)):


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig17_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig17_HTML.jpg)


    Figure 14-17 Test Case 5 console, initially


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "TSLA", "sellerId" : 11, "buyerId" : 21, "amount" : 500, "test" :
    5, "delay" : 2 }

    ```


    In this test case, all works fine in the upstream microservices. You settle the
    quote message at the downstream microservice and then you simulate an error in
    the reading of message by the downstream microservice’s message listener. The
    state at this point is shown in Figure [14-18](#477630_1_En_14_Chapter.xhtml#Fig18).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig18_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig18_HTML.jpg)


    Figure 14-18 Test Case 5 console, intermediate and complete


    The settlement of the quote message is also recorded in the `Stock Transaction`
    table by the downstream microservice and is shown in Figure [14-19](#477630_1_En_14_Chapter.xhtml#Fig19).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig19_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig19_HTML.jpg)


    Figure 14-19 Stock Transaction table during Test Case 5


    Because you simulated an error in the reading of message by the downstream microservice’s
    message listener, the message broker will redeliver the message to the downstream
    microservice. But when this quote message reaches the downstream microservice
    as a duplicate, due to the enhanced design of the solution, the downstream microservice
    is now smart enough to understand by looking in the `Stock Transaction` table
    (in Figure [14-19](#477630_1_En_14_Chapter.xhtml#Fig19)) that this quote message
    is a duplicate and will not settle again; the final state of the user balances
    remains as shown in Figure [14-18](#477630_1_En_14_Chapter.xhtml#Fig18).


    > *“If the consumer uses messages to simply write (and never overwrite) a value
    in a database, then receiving a message more than once is no different than receiving
    it exactly once”.* ^([^(35)](#fn35))


    This is true for some applications, but not for all. At the very least, it requires
    the application to interpret incoming messages accordingly. There are many other
    aspects on messaging to the above statement with respect to microservices; however,
    we will park them for another textbook on this, because the linked aspects are
    manyfold.


