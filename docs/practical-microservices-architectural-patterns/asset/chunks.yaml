- fmt: '### The Monolith Application


    Before I attempt to answer the question asked in the previous section, let me
    define one main nomenclature and its interpretations, which we are going to follow
    in the rest of this book.


    Figure [2-1](#477630_1_En_2_Chapter.xhtml#Fig1) shows just the business tier from
    Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3). Typically this tier hosts most
    of the core logic or the business logic of the software system. Let’s refer to
    this tier with the name application tier or services tier. This tier has a clear
    separation from the presentation tier, normally by a controller layer through
    which all service calls are routed. This tier may expose either a local interface
    or a remote interface. A local interface is sufficient if the presentation tier
    and the services tier are deployed in the same process whereas a remote interface
    like `Java RMI`, `RMI-IIOP` or `.NET Remoting` will be required if these two tiers
    are deployed in separate processes. In the service-oriented architecture (`SOA`)
    paradigm, a suitable `SOA` interface will replace plain remoting. `SOAP` over
    `HTTP`, `REST`, etc. are examples of such `SOA`-friendly interfaces.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig1_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The services tier


    Figure [2-1](#477630_1_En_2_Chapter.xhtml#Fig1) shows that even though the modules
    or functional groups are separated from each other, the boundary is only logical
    and blurred (shown with dotted lines). This means there is no clear-cut separation
    between the modules. You may also note that it is typical for such architectures
    still to have an application boundary. But that application boundary is the boundary
    that encompasses all of its modules, hence we call it the “monolith.” A monolith
    can live as a whole but struggles to exist if divided or separated out.


    ### Monolith Application Boundary


    Figure [2-2](#477630_1_En_2_Chapter.xhtml#Fig2) depicts more than one monolith
    application. This is again typical for many existing enterprises where more than
    one application is required to meet the enterprise’s various functionalities.
    Since applications in isolation cannot benefit much, they are interconnected at
    times.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig2_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The monolith application boundary


    In Figure [2-2](#477630_1_En_2_Chapter.xhtml#Fig2), there are two types of communications
    or interactions depicted. Within an application, the modules talk to each other
    either using a local invocation protocol or using a suitable remoting protocol.
    Equally important is the communication between applications. Typically enterprises
    use enterprise application integration (`EAI`) technologies to integrate between
    applications. The “Network Architectures” section in Chapter [1](#477630_1_En_1_Chapter.xhtml)
    discussed briefly how applications can integrate with each other. You might have
    noticed that most of the time application boundaries are clearly defined and separated,
    hence most of the time they are deployed out into separate processes or runtime.
    Due to this reason, they require a suitable remoting mechanism to talk to each
    other. Later advancements in `SOA` advocate using service-oriented integration
    (`SOI`) tools like `ESB` so that application integration can be done in a more
    flexible, seamless manner.


    ### Monolith Intermodule Dependency


    Modules within an application in a monolith architecture are tightly coupled.
    These modules talk to each other either using a local invocation protocol or a
    suitable remoting protocol. Most of the time these calls are synchronous in nature,
    which means every request transaction also expects a response or an exception
    back.


    When all the modules of a monolith application are packaged and deployed together
    in the same process, local method invocation is the best option to communicate.
    In such a deployment, either the entire application is always up, or if there
    are any issues in any part of any module, the application can also go down in
    its entirety. If some of the modules are separated out and deployed into a different
    process, then the health of the process where we have deployed the separated modules
    will not affect the other dependent process. However, when we look at such a separately
    deployed module application from its entirety, if the separated modules are down
    for any reason, then the dependent modules can still be affected. This is because
    intermodule communication is defined as direct and synchronous method call dependencies,
    so if the called module does not respond or exist, the caller module will be affected.
    They either get blocked indefinitely or wait for some amount of time and then
    respond reporting error conditions. Figure [2-3](#477630_1_En_2_Chapter.xhtml#Fig3)
    depicts this.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig3_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Monolith intermodule communication'
