    }\n}\nListing 12-4\nOrder Aggregate Entity (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\\
    src\\main\\java\\com\\acme\\ecom\\order\\model\\Order.java)\n```\n\n`Order` extends\n\
