  trans: "\n该微服务的下一个主要更新位于主应用类中。请参见代码清单 19-6。\n\n```\n@SpringBootApplication\n@EnableDiscoveryClient\n\
    public class EcomCreateCommandAndRestApplication {\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(EcomCreateCommandAndRestApplication.class, args);\n\
    }\n}\n代码清单 19-6\nEcom-CreateCommandRestController 主类 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    02-Ecom-CreateCommandRestController\\src\\main\\java\\com\\acme\\ecom\\EcomCreateCommandAndRestApplication.java)\n\
    ```\n\n必须通过使用 `@EnableDiscoveryClient` 注解你的 Spring Boot 应用来创建一个 Spring Cloud 命令路由器。完成后，它将在你的类路径上查找\
    \ Spring Cloud 的实现。\n\n代码中还有其他一些变化。让我们看看代码清单 19-7 中 Axon 组件的配置。\n\n```\n@Configuration\n\
    public class EcomAppConfiguration {\n}\n代码清单 19-7\nEcom-CreateCommandRestController\
    \ 配置 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\02-Ecom-CreateCommandRestController\\\
    src\\main\\java\\com\\acme\\ecom\\EcomAppConfiguration.java)\n```\n\n如你所见，与代码清单\
    \ [12-15](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC22) 和代码清单 [12-16](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC23)\
    \ 中的代码相比，代码清单 19-7 完全不包含配置 Axon 3 组件所需的显式配置。这一切都由 Spring 自动装配完成！\n\n微服务 4：\n03-Ecom-HandleCommandAndCreateEvent\n\
    \n该微服务必须处理由 02-Ecom-CreateCommandRestController 微服务创建并通过分布式命令总线从远程 JVM 到达的任何命令。与第\
    \ 12 章中的代码相比，该微服务代码的唯一变化是通过使用 `@EnableDiscoveryClient` 注解 Spring Boot 应用来引入 Spring\
    \ Cloud 命令路由器，如上一个微服务所示，因此我将直接在代码清单 19-8 中展示代码，不做详细解释。\n\n```\n@EnableDiscoveryClient\n\
    @SpringBootApplication\npublic class EcomHandleCommandAndCreateEventApplication\
    \ {\npublic static void main(String[] args) {\nSpringApplication.run(\nEcomHandleCommandAndCreateEventApplication.class,\
    \ args);\n}\n}\n代码清单 19-8\n主应用类 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    03-Ecom-HandleCommandAndCreateEvent\\src\\main\\java\\com\\acme\\ecom\\EcomHandleCommandAndCreateEventApplication.java)\n\
    ```\n\n微服务 5：04-Ecom-EventHandleCore\n同样，由于你已经学习了第 12 章中的相应示例，该微服务中没有任何新内容。因此，我将不进行详细的代码讲解。正如微服务名称所示，它包含两个主要事件处理器：OrderEventHandler\
    \ 和 ProductEventHandler，其功能和代码片段与本章前面的示例类似。但是，这里需要提一下一个小更新。\n\n正如你已经看到的，所有包含 `@EventHandler`\
    \ 注解方法的单例 Spring Bean 组件都将订阅事件处理器，以接收发布到事件总线的事件消息。事件处理器也可以在 application.properties\
    \ 中进行配置。\n\n```\naxon.eventhandling.processors.name.mode=tracking\naxon.eventhandling.processors.name.source=eventBus\n\
    ```\n\n这里的 source 属性指的是实现 SubscribableMessageSource 或 StreamableMessageSource\
    \ 的 Bean 的名称，该 Bean 将用作所选处理器的事件源，默认为应用上下文中定义的事件总线或事件存储。接下来，你可以标记使用所谓的跟踪处理器来异步处理事件。该处理器将跟踪事件存储（或任何其他支持跟踪的源）中的事件。\n\
    \n要配置处理器切换到跟踪模式，你需要执行以下操作：\n\n1.  首先，覆盖处理组的名称。默认情况下，处理组（以及代表它处理事件的处理器）的名称是分配给它的事件处理器的包名。你可以通过放置\
    \ `@ProcessingGroup` 来覆盖它。\n\n2.  接下来，在 application.properties 中，将消息处理器配置为跟踪模式：\n\
    \n```\n    axon.eventhandling.processors.messages.mode=tracking.\n    ```\n\n\
    这里，messages 部分是处理器的名称。检查 application.properties 以查看此内容。请参见代码清单 19-9。\n\n```\n\
    axon.eventhandling.processors[ECOM_EVENT_PROCESSOR].mode=tracking\naxon.eventhandling.processors[ECOM_EVENT_PROCESSOR].source=eventBus\n\
    代码清单 19-9\nEcom-EventHandleCore 配置 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    04-Ecom-EventHandleCore\\src\\main\\resources\\application.properties)\n```\n\n\
    然后，你附加处理组以使其能够处理正确的事件，如代码清单 19-10 所示。\n\n```\n@Component\n@ProcessingGroup(\"\
    ECOM_EVENT_PROCESSOR\")\npublic class OrderEventHandler {\n@EventHandler\npublic\
    \ void handleOrderCreatedEvent(OrderCreatedEvent event) {\n//代码写在这里\n}\n}\n代码清单\
    \ 19-10\n订单事件处理器 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    04-Ecom-EventHandleCore\\src\\main\\java\\com\\acme\\ecom\\order\\eventhandler\\\
    OrderEventHandler.java)\n```\n\n类似地，你附加处理组以使其能够处理与库存相关的事件，如代码清单 19-11 所示。\n\n\
    ```\n@Component\n@ProcessingGroup(\"ECOM_EVENT_PROCESSOR\")\npublic class ProductEventHandler\
    \ {\n@EventHandler\npublic void handleProductStockUpdatedEvent(StockUpdatedEvent\
    \ event) {\n//代码写在这里\n}\n}\n代码清单 19-11\n产品事件处理器 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    04-Ecom-EventHandleCore\\src\\main\\java\\com\\acme\\ecom\\product\\eventhandler\\\
    ProductEventHandler.java)\n```\n\n微服务 6：05-Ecom-EventHandlerAudit\n该微服务的功能和代码与你已经在第\
    \ 12 章中看到的 EventHandlerAudit 微服务相同。唯一的变化与刚刚描述的微服务中附加处理组的方式类似，因此我将不再重复该信息。\n\n\
    构建并测试示例场景\n按照第 12 章中“分布式命令和事件处理”部分下的“构建并测试示例场景”子部分的说明来构建和测试该示例。此示例的唯一区别是你多了一个微服务，即\
    \ Eureka 注册中心。你应该首先构建并运行 Eureka 注册中心微服务。然后按照第 12 章中描述的步骤进行操作。\n"
- fmt: '# Axon 3 CQRS Microservices E-Commerce with BASE Transactions


    In this section, your primary objective is to migrate the e-commerce example application
    you built in Chapters [17](#477630_1_En_17_Chapter.xhtml) and [18](#477630_1_En_18_Chapter.xhtml)
    from Axon 2 to Axon 3. There is a secondary objective, which I will define now.


    If you recollect the discussion in the “The ACID Within the BASE” section in Chapter
    [17](#477630_1_En_17_Chapter.xhtml), you kept the order and inventory aggregates
    together. This may or may not be the scenario in real life. Order or booking entities
    are driven by sales channels and end user activities, whereas inventory or stock
    entities are driven by end user and supply chain activities. As such, applications
    or systems or microservices responsible for the management of these entities may
    not be one and the same, and in many cases they will be separate microservices.
    By using a single resource manager (the MySQL persistence engine) in the examples
    in Chapters [17](#477630_1_En_17_Chapter.xhtml) and [18](#477630_1_En_18_Chapter.xhtml),
    you avoided distributed transactions. However, you still used ACID-style transactions,
    since both entities were kept close within a single microservice and you leveraged
    ACID-style local transactions. But what if you want to keep them separate?


    ## Removing the ACID Knot Between the Order and Inventory Domains


    You will first revisit the code from Chapter [17](#477630_1_En_17_Chapter.xhtml)
    where you do ACID-style transactions over two aggregate root entities, order and
    inventory. Listing [17-6](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC10)
    from Chapter [17](#477630_1_En_17_Chapter.xhtml) is repeated here as Listing [19-12](#477630_1_En_19_Chapter.xhtml#PC17).


    ```

    @Component

    public class OrderCommandHandler {

    @Autowired

    @Qualifier(value = "orderRepository")

    private Repository orderRepository;

    @CommandHandler

    public void handleNewOrder(OrderCreateCommand orderCreatedCommand) {

    Order order = new Order(Long.valueOf(new Random().nextInt()));

    order.setOrderDate(new Date());

    order.setOrderStatus(OrderStatus.PAID);

    order.setUserId(orderCreatedCommand.getUserId());

    double total = 0;

    if (orderCreatedCommand.getLineItems() != null) {

    for (LineItemDTO lineItemDto :

    orderCreatedCommand.getLineItems()) {

    if (lineItemDto.getInventoryId() != null) {

    LineItem lineItem = new LineItem(new Random().nextLong(),

    lineItemDto.getProductId(), lineItemDto.getQuantity(),

    lineItemDto.getPrice(), lineItemDto.getInventoryId());

    total = total + lineItemDto.getPrice();

    order.addLineItem(lineItem);

    Inventory inventory =

    inventoryRepository.load(lineItemDto.getInventoryId());

    inventory.updateProductStock(lineItemDto.getQuantity(),

    ProductStockOperation.DEPRECIATE);

    }

    }

    }

    order.setTotal(total);

    order.notifyOrderCreation();

    orderRepository.add(order);

    }

    }

    Listing 19-12

    OrderCommandHandler handleNewOrder (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-core\src\main\java\com\acme\ecom\core\order\command\handler\OrderCommandHandler.java)

    ```


    You saw in Chapter [12](#477630_1_En_12_Chapter.xhtml) that a unit of work (UoW)
    is a set of modifications to be made to aggregates. Execution of a command typically
    happens within the scope of a UoW. When the command handler method in Listing
    [19-12](#477630_1_En_19_Chapter.xhtml#PC17) finishes execution, the UoW is committed
    and all actions are finalized. This means that any repositories are notified of
    state changes in their aggregates and events scheduled for publication are sent
    to the event bus. This is a convenient grouping that will help prevent individual
    events from being published before a number of aggregates have been processed.
    In the back, it allows repositories to manage resources, such as locks, over an
    entire transaction. Locks, for example, will only be released when the UoW is
    either committed or rolled back.


    A UoW is not a replacement for traditional ACID-style transactions. It is merely
    a buffer where changes are grouped and staged. When a UoW is committed, all staged
    changes are only committed; however, this commit is not atomic. This means if
    a commit fails, a few changes might have already been persisted, while others
    not. Axon best practices dictate to follow the best practice of a command always
    containing one action.


    The UoW in Axon 2 enables a single command to execute logic on more than one aggregate.
    The UoW has a more central role in managing the work done by command handlers.
    The UoW currently keeps track of the aggregates that have been loaded by the repositories
    and persists them when the UoW is committed.


    If you have more (than one) actions or more (than one) aggregates in your UoW,
    then you should consider attaching transactions to the UoW’s commit. In Chapter
    [17](#477630_1_En_17_Chapter.xhtml), you did so in Listing [17-7](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC11),
    and the specific code is repeated here as Listing [19-13](#477630_1_En_19_Chapter.xhtml#PC18).


    ```

    @Configuration

    @RefreshScope

    public class EcomCoreAppConfiguration {

    @Autowired

    @Qualifier("transactionManager")

    protected PlatformTransactionManager txManager;

    @Bean

    public SimpleCommandBus commandBus() {

    SimpleCommandBus simpleCommandBus = new SimpleCommandBus();

    simpleCommandBus.setDispatchInterceptors(

    Arrays.asList(new BeanValidationInterceptor()));

    SpringTransactionManager transcationMgr =

    new SpringTransactionManager(txManager);

    simpleCommandBus.setTransactionManager(transcationMgr);

    return simpleCommandBus;

    }

    }

    Listing 19-13

    Bind Transactions to Unit of Work (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-core\src\main\java\com\acme\ecom\core\EcomCoreAppConfiguration.java)

    ```


    Here, `SpringTransactionManager` is a `TransactionManager` implementation that
    uses a `PlatformTransactionManager` as underlying transaction manager.


    Here you use two aggregate entities, inventory and order, in a single transaction,
    but there is no distributed transaction involved since both aggregate entities
    are managed by the same resource manager, that too in a single node.


    It is possible to bind a transaction to a UoW. Many command bus implementations,
    like the `SimpleCommandBus` and `DisruptorCommandBus`, allow you to configure
    a transaction manager. This transaction manager will then be used to create the
    transactions to bind to the UoW that is used to manage the process of a command.
    The command handling process can then be considered an atomic procedure; it should
    either be processed entirely, or not at all. The Axon framework uses the UoW to
    track actions performed by the command handlers. When the command handler completes,
    Axon will try to commit the actions registered with the UoW. When a UoW is bound
    to a transaction, it will ensure the bound transaction is committed at the right
    point in time.


    Moving on to Axon 3, there are a few differences.'
