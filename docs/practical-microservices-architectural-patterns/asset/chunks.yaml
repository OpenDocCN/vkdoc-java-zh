  trans: '

    会话 ID

    传统上，身份验证一直作为一种有状态操作来执行。当用户输入其凭据时，服务器会生成一个唯一的会话 ID，将其存储在服务器端，同时也将其返回给用户。在每次需要访问受保护资源的请求中，此会话
    ID 会作为请求头传递，服务器将始终根据服务器端的实际用户凭据或服务器端维护的“活动会话”缓存来验证该会话 ID。对于单体应用来说，这近乎是一个完美的解决方案，因为在每个请求-响应周期中，你只需要进行一次这样的验证。


    对于微服务架构而言，这可能存在局限性。为几乎每个操作都从中央存储获取数据可能会很麻烦，尤其是当单个用户端的请求-响应周期在内部跨越一个图谱或多次微服务间调用时。即使单个用户端的请求-响应周期在内部由单个微服务处理，对于一个高事务处理系统，为所有
    API 方法进行用户身份验证和授权数据库（或缓存）查找及验证的累积过程也是繁琐的，因此我们需要更智能的设计机制。


    你应该注意到会话 ID 的一个优点：会话 ID 是不透明的，这意味着第三方无法从会话 ID 中提取出易于破译的数据。会话 ID 与其可推断数据之间的关联完全在服务器端完成。


    令牌

    令牌是使基于会话 ID 的安全设计更智能的一种替代方案。令牌不仅仅是一个标识符，其中还包含有意义且可推断的数据。除了会话 ID 之外，令牌还可以包含用户凭据中不太敏感的部分，例如用户名。通过这种方式，用户或服务请求者的详细信息已经存在于请求头中，因此微服务无需再对数据库或缓存进行另一次
    I/O（输入/输出）来解释请求者。现在你需要关注授权部分：谁有权访问哪些受保护资源，以及一旦访问，该用户可以对资源执行哪些操作。因此，你还可以将用户可用的操作类型信息包含在令牌中。例如，你可以添加一个名为
    `scope` 的字段，其值可以是 `user`（代表普通终端用户的权限）和 `admin`（拥有执行关键后台操作的额外权限）。如果是这样，当用户随请求提供令牌以执行某项操作（例如调用
    API 端点）时，处理该端点并保护受保护资源的服务可以验证令牌，在其中查找正确的“作用域”，并授权（或拒绝）该用户执行该操作。


    JSON Web 令牌 (JWT)

    你可以创建自己的令牌以获得上一节所述的便利性，也可以采用业界已有的标准，即 JSON Web 令牌 (JWT)。


    JWT 有三个不同的部分，它们经过 URL 编码以便传输：


    *   **头部**：头部包含令牌的元数据，至少包含签名类型和/或加密算法。


    *   **声明**：声明包含你想要签名的任何信息。


    *   **JSON Web 签名 (JWS)**：头部和声明使用头部中指定的算法进行数字签名。


    JWT 将一系列声明编码在一个 JSON 对象中。其中一些声明具有特定含义，而另一些则留给用户自行解释。你常见的一些声明包括：


    *   签发者 (iss)

    *   主题 (sub)

    *   受众 (aud)

    *   过期时间 (exp)

    *   生效时间 (nbf)

    *   签发时间 (iat)

    *   JWT ID (jti)


    使用像 JWT 这样的通用数据格式可以轻松地与现有解决方案和库实现互操作，这样你就可以针对常见的、反复出现的问题使用经过验证和测试的模式。


    一个典型的 JWT 负载如下所示：


    ```

    {

    "sub": "1234567890",

    "name": "John Doe",

    "iat": 1516239022

    }

    ```


    服务器提供的此类令牌将由每个客户端应用程序随请求一起发送，很多时候浏览器或用户代理就是此客户端。这些数据因此容易受到中间人攻击。需要明确的是，拦截到此令牌的人可以尝试使用相同的令牌重放请求。应该有一种方法来防止这种情况。


    让我们看看上面列出的三个声明。


    *   **过期时间 (exp)**：令牌将被视为过期的 UNIX 时间戳，如果未提供 iat，则此为必需项。

    *   **签发时间 (iat)**：令牌创建时的 UNIX 时间戳，如果未提供 exp，则此为必需项。

    *   **JWT ID (jti)**：一个唯一的令牌字符串，实际上是一个随机数，每个请求必须唯一，不能为空字符串。


    这些时间戳信息有助于限制令牌的有效性，以防止重放攻击。在一种方案中，服务器可以选择不接受在当前时间之前超过 x 分钟发送的消息。这会引发客户端和服务器机器之间的时钟偏差问题，因此你可能需要在服务器中构建一些容错机制，通过在时间窗口两侧各填充
    n 分钟来弥补这一差异，以应对不同机器上时钟的潜在差异，前提是你已经处理好了不同服务器之间的时钟同步问题。


    上述随机数（作为 jti 值）有助于防止重放攻击。随机数只是你创建的一组任意字节，用于帮助防止重放攻击。每个请求必须具有唯一的负载。即使请求失败（HTTP
    状态码 400-599）或错误地通过 HTTP 而非 HTTPS 发送，jti 值也不能重复使用。对于每个请求，建议生成一个全局唯一标识符 (GUID) 或一个足够随机的字符串，以确保在“x
    分钟”的时间跨度内没有两个请求具有相同的 jti 值。


    由于 JWT 由每个客户端应用程序随请求一起发送，很多时候浏览器或用户代理就是此客户端，因此这些数据也容易受到恶意篡改。它可能被篡改，以添加用户本不应拥有的权限声明。因此，令牌本身应该是防篡改的。


    当 API 身份验证方案在其请求的 HTTP 授权头中使用 JWT 时，每个请求的授权头都将设置为 Bearer 方案。以下是一个示例：


    ```

    Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c

    ```


    在这里，头部和声明是经过 base64 编码以便传输的 JSON。头部、声明和签名使用句点字符 (.) 连接在一起，从而为 JWT 提供了如下结构：


    ```

    [Base64Encoded(HEADER)] . [Base64Encoded (PAYLOAD)] . [encoded(SIGNATURE)]

    ```


    假设以上所有问题都已处理妥当，那么如何验证一个符合上述所有要求的有效令牌最初是从正确的合作伙伴端点发送的呢？如果 JWT 没有签名，则不可信。JWT 允许使用
    JSON Web 签名 (JWS) 规范采用不同的签名和加密算法。这些算法在 JWT 头部中指定。大多数情况下，JWT 通常不加密，仅签名。但是，如果你的令牌包含敏感数据，那么使用
    JSON Web 加密 (JWE) 对其进行加密是一个选择。一种典型的加密方案使用已签名的 JWT 作为加密的负载。这被称为嵌套 JWT。使用相同的密钥进行加密和验证也是可以接受的。到此为止，你已经初步了解了
    JWT。其中还有更多的复杂细节和漏洞，但这足以让你理解下面的示例。

    '
- fmt: '# Design Security for the Example Microservices Application


    You will now secure the microservices application from Chapter [17](#477630_1_En_17_Chapter.xhtml).
    The example from Chapter [17](#477630_1_En_17_Chapter.xhtml) had very basic authentication
    implemented. This is the reason why you are able to browse through the initial
    pages starting from the home page of the example application up to the point where
    you can add items to your shopping cart; however, for the next step of checking
    out to be permitted, you should have either already been signed in, you should
    sign in if you already have a profile in the application, or if you do not have
    a ready profile in the application, you should create one then and sign in. Similarly,
    for the back-office admin to carry out this functionality in the application,
    he should also be logged in.


    However, this logging-in is only one part of the securing process. For a real
    microservices application to be properly secured, you should also take care of
    the authorization part. Without proper authorization, even if your web app functionality
    is limited with the help of authentication, the individual microservices APIs
    themselves are not secure. So if someone from within the same network of the individual
    microservice is able to access the individual microservice, they can execute functionality.
    Of course this can be permitted, but only after the required authorization. This
    is what you are going to enable in your example application.


    ## Security Architecture for Microservices


    Refer to Figure [17-11](#477630_1_En_17_Chapter.xhtml#Fig11) in Chapter [17](#477630_1_En_17_Chapter.xhtml)
    for the basic architecture for the example microservices application. Let’s enhance
    it with the extra pieces required to secure the example application end to end.
    See Figure [18-6](#477630_1_En_18_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig6_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig6_HTML.jpg)


    **Figure 18-6.** Security architecture for the microservices e-commerce application


    Observe the differences between the architectures shown in Figure [17-11](#477630_1_En_17_Chapter.xhtml#Fig11)
    and Figure [18-6](#477630_1_En_18_Chapter.xhtml#Fig6). The latter shows a new
    Security microservice. This Security microservice is an OAuth authorization server.
    There is more than one resource server, since each of the application microservices
    has to secure its own data based on the authorization schema deployed.


    You should now refer back to Figure [18-5](#477630_1_En_18_Chapter.xhtml#Fig5)
    where you saw the OAuth dance during the initial authorization code type flow.
    The same design will be followed in the enhanced security architecture for your
    example microservice application too. All the requests from the web application
    in the browser will be first intercepted by the API gateway. It’s the API gateway’s
    responsibility to take care of the microservice’s security. The API gateway will
    first check if the incoming REST request has an existing access token for the
    protected resource. Referring to Figure [18-6](#477630_1_En_18_Chapter.xhtml#Fig6):


    - If an access token doesn’t exist, that means the request is a part of the initial
    cycles of the OAuth handshake described in “The Authorization Code Grand Types”
    subsection earlier. If so, the gateway will check if the request is targeted towards
    the authorization server and if so, will add the `client_id` and `client_secret`
    too. The OAuth client credentials (`client_id` and `client_secret`) are kept securely
    at the server side by the gateway, and the gateway adds them to the request headers
    and forwards the request. The OAuth handshake, as described earlier, will happen
    at the end of which an access token is provided as response header.

    - On the contrary, if an access token already exists, it will add the token to
    the request header and forward the request to the protected resource.


    ## Asymmetric Signing and Reference Tokens


    In the “JSON Web Tokens” subsection earlier, you learned about the need to sign
    JWTs. There are two methods of signing, using symmetric keys or asymmetric keys.
    While in the symmetric scenario you use the same key to encrypt and decrypt the
    digital signature, in the asymmetric case you use a private and public key combination.


    Another concern you face when using tokens is the length of token in complex authorization
    scenarios. It is quite possible that the size of the JWT can grow to an extent
    that it will meet technical hurdles to be passed as the header of the request.
    Moreover, even though you can sign and encrypt a JWT, it is still “sensitive information”
    and it is best not to make this information float outside your DMZ. Let’s consider
    the notion of a reference token here. A reference token is a reference to the
    actual JWT, and you will pass only the reference token beyond your DMZ (or OAuth
    client).


    In securing the example microservice application, you will leverage both the above.
    See Figure [18-7](#477630_1_En_18_Chapter.xhtml#Fig7).


    ![../images/477630_1_En_18_Chapter/477630_1_En_18_Fig7_HTML.jpg](images/477630_1_En_18_Chapter/477630_1_En_18_Fig7_HTML.jpg)


    **Figure 18-7.** Asymmetric encryption and reference tokens


    Referring back to the subsection titled “The Authorization Code Grand Types”,
    in Step 4 you assume the user request for a protected resource has already reached
    the API gateway. Now, referring to Figure [18-7](#477630_1_En_18_Chapter.xhtml#Fig7):


    1. The user request for a protected resource reaches the API gateway.

    2. The authorization server, after doing all basic checks and validation for authentication
    and authorization, will first create a JWT. This JWT is signed and encrypted using
    asymmetric keys. Asymmetric keys have the notion of a private key, which is accessible
    only to the authorization server, and its counterpart key, called a public key,
    which the authorization server will freely distribute to anyone who has a need
    for it, to all resource servers in your case.

    3. The signed and encrypted JWT is returned back to the API gateway.

    4. Instead of the API gateway returning the JWT as such to the user or the browser,
    it will map the JWT against a new reference token, possibly in a local cache or
    local store.

    5. The API gateway returns only the reference token to the user or the browser.

    6. For any subsequent user action in the web app that requires access to any server-side
    protected resource, the reference token is also passed as the request header,
    which will again be intercepted by the API gateway.

    7. The API gateway retrieves the actual JWT corresponding to the reference token.

    8. The API gateway forwards the request after appending the JWT into the request
    to the resource server.


    As you can see from Figure [18-7](#477630_1_En_18_Chapter.xhtml#Fig7), the resource
    server can now validate the authenticity of the JWT received using a copy of the
    public key it possesses, and further validate if the request has the required
    authority and then accept or reject the request.


    ## Code Security into Microservices E-Commerce Application


    This section is a continuation of the code you saw in Chapter [17](#477630_1_En_17_Chapter.xhtml).
    You are advised to go through Chapter [17](#477630_1_En_17_Chapter.xhtml) before
    proceeding further with the example application in this chapter. I will incrementally
    add and explain the critical code required to establish OAuth-based security for
    this example. The complete code required to demonstrate establishing OAuth security
    for the example E-Commerce microservices application is in folder `ch18\ch18-01\Ax2-Ecom-With-Security`.


    ### Enable the Web App to Handle Security'
