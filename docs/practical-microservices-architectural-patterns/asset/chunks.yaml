    您可以通过多种方式运行 Spring Boot 应用程序。最直接的方式是通过以下命令执行 JAR 文件：


    ```

    D:\binil\gold\pack03\ch08\ch08-01\ProductServer>run

    D:\binil\gold\pack03\ch08\ch08-01\ProductServer>java -jar -Dserver.port=8080 ./target/Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    这些命令将在 8080 端口启动 Product Server。请注意，位于以下位置的初始化组件会在启动时向 MongoDB 注入一些 Product 实例，这将便于您稍后演示应用程序：


    ```

    ch08\ch08-01\ProductServer\src\main\java\com\acme\ecom\productInitializationComponent.java

    ```


    接下来，构建并打包 Product Web 微服务的可执行文件，然后启动服务器：


    ```

    cd ch08\ch08-01\ProductWeb

    D:\binil\gold\pack03\ch08\ch08-01\ProductWeb>make

    D:\binil\gold\pack03\ch08\ch08-01\ProductWeb>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-01\ProductWeb>run

    D:\binil\gold\pack03\ch08\ch08-01\ProductWeb>java -jar -Dserver.port=8081 .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    上述命令将在 8081 端口启动 Product Web。


    以下位置提供了一个快速工具来测试应用程序：


    ```

    ch08\ch08-01\ProductWeb\src\main\resources\product.html

    ```


    建议在 Chrome 浏览器中打开此 HTML 工具。加载完成后，浏览器客户端将向监听 8081 端口的 Product Web 发送请求，Product
    Web 会通过 Feign 客户端代理，将调用委托给监听 8080 端口的 Product Server。


    如果一切顺利，浏览器小部件将填充来自后端数据库的数据（图 8-3）。当您刷新屏幕时，浏览器将首先访问 Product Web 微服务。然后 Product
    Web 微服务会调用 Product Server 微服务，后者再查询 MongoDB 并返回结果。此演示的显著特点是，您创建了两个不同的微服务，然后其中一个微服务使用
    Feign 客户端调用了另一个微服务。这是微服务之间通过 HTTP 调用进行同步通信的方式之一。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig3_HTML.jpg](img/477630_1_En_8_Fig3_HTML.jpg)


    图 8-3

    测试 Feign 客户端


    Hystrix 降级

    有时，某个微服务、某个数据库或任何资源可能正忙，无法在预期的 SLA 内做出响应。在这种情况下，调用方服务不能无休止地等待依赖服务，因此需要有备用策略。您将使用
    Hystrix 断路器降级到备用策略来处理这种情况。

    当对服务或资源的方法调用失败时，断路器可以优雅地降级功能。使用断路器模式，可以在依赖服务失败时允许微服务继续运行。这将防止故障级联，从而为失败的服务提供足够的恢复时间。


    设计 Hystrix 降级场景


    您将扩展上一节中的示例（如图 8-1 所示）。图 8-4 展示了一个简单的场景，其中有三个独立的应用程序，或者用我们的术语来说，三个独立的微服务：Product
    Web、Product Server 1 和 Product Server 2。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig4_HTML.jpg](img/477630_1_En_8_Fig4_HTML.jpg)


    图 8-4

    Hystrix 降级使用场景


    示例场景的主要组件包括：


    *   Product Server 1


    *   Product Server 2


    *   Product Web


    *   Product Service


    *   ProductServiceProxy


    *   ProductAlternateServiceComponent


    *   ProductAlternateServiceProxy


    *   Spring Cloud Feign 客户端


    上述许多组件的解释与前面“Feign 客户端”部分提供的相同，因此此处不再赘述。但是，我将解释新组件。


    *   **ProductAlternateServiceComponent**：Product Web 被设计为将所有传入的 REST 调用委托给 Product
    Server 1 微服务。但是，如果 Product Server 1 微服务因某种原因宕机或无响应，您可以设计一个 Hystrix 回调，指向名为 ProductAlternateServiceComponent
    的降级组件。在真实场景中，这可以是一个本地缓存，您可以从中向客户端提供备用数据。然而，在您的示例中，您已经了解了如何使用 Feign 客户端将调用代理到远程服务。因此，您将拥有一个
    ProductAlternateServiceProxy 组件，调用可以被代理到该组件。


    *   **Product Server 2**：Product Server 2 是一个功能完备的微服务应用程序，复制了 Product Server 1
    中实现的 CRUD 操作。该微服务同样使用 MongoDB 来读写与产品实体相关的数据。该微服务充当备用微服务实现，如果 Product Server 1
    无响应，它可以处理请求。


    *   **ProductAlternateServiceProxy**：ProductAlternateServiceProxy 组件是另一个扩展 Product
    Service 的抽象接口，因此它继承了 Product Server 和 Product Web 接口所需的所有方法。您使用 Feign 客户端的基本配置来注解此接口，以便所有调用都可以被代理到
    Product Server 2 微服务。


    您将组件交互分为两部分，如图 8-5 和图 8-6 所示。在图 8-5 中，您可以看到来自客户端浏览器的查询命中了 Product Web，即示例中的微服务
    1。然后 Product Web 微服务将查询代理到微服务 2，即 Product Server 1。如果 Product Server 1 正在运行，则示例执行将在向客户端返回响应数据后结束，因此此示例的行为将与之前“Feign
    客户端”部分中的示例完全相同。相反，您可以选择不启动 Product Server 1，或者如果它已经启动，您可以将其关闭。在这种情况下，Hystrix 将重试到配置的降级服务。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig5_HTML.jpg](img/477630_1_En_8_Fig5_HTML.jpg)


    图 8-5

    Hystrix 检测到服务不可用


    假设降级微服务 Product Server 2 已启动，查询将重试以命中此微服务，并且执行将通过图 8-6 所示的正常流程进行。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig6_HTML.jpg](img/477630_1_En_8_Fig6_HTML.jpg)


    图 8-6

    Hystrix 重试备用服务


    编写 Hystrix 降级场景代码


    您已经了解了如何在 POM 中声明 Feign 客户端。类似地，您可以通过在 POM 中再次声明 Hystrix 依赖项来引入它。本节的所有代码示例都放在文件夹
