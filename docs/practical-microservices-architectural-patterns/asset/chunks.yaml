    上一节的示例演示了如何使用 Protocol Buffer 进行微服务间通信。你可以观察 TCPMon 代理控制台，应该能够验证两个微服务之间的通信使用了
    Protocol Buffer。它还会显示响应内容长度为 265（这是一个代表性数值）。请参见图 10-5。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig5_HTML.jpg](img/477630_1_En_10_Fig5_HTML.jpg)


    图 10-5 使用 TCPMon 检查 Protocol Buffer 编码


    XML 编码


    你可以使用 Chrome 直接访问 TCPMon 代理，这样客户端在内容协商期间就不会显式请求 Protocol Buffer，只需使用 URL `http://localhost:8081/products/`。这将显示
    XML 格式的响应；请参见图 10-6。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig6_HTML.jpg](img/477630_1_En_10_Fig6_HTML.jpg)


    图 10-6 使用 TCPMon 检查 XML 编码


    你可以使用任何工具检查内容大小（我在图 10-7 中使用了 Microsoft Word）。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig7_HTML.jpg](img/477630_1_En_10_Fig7_HTML.jpg)


    图 10-7 使用 XML 编码时的内容长度


    JSON 编码


    强制微服务调用之间使用 JSON 编码的一种简单方法是稍微修改 Product Server 微服务中的应用程序代码。请参见代码清单 10-22。


    ```

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    //@RequestMapping(value = "/products", method = RequestMethod.GET)

    public  Products getAllProducts() {

    List products = getAllTheProducts();

    Products productsParent =     Products.newBuilder().addAllProduct(products).build();

    return productsParent;

    }

    代码清单 10-22 强制使用 JSON 编码 (ch10\ch10-02\ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    现在，你可以重新构建并重启 Product Server 微服务，然后通过访问 `http://localhost:8082/` 重新运行客户端应用程序。


    如果你检查 TCPMon 代理控制台，应该能够看到在这种情况下选择了 JSON 编码，如图 10-8 所示。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig8_HTML.jpg](img/477630_1_En_10_Fig8_HTML.jpg)


    图 10-8 使用 TCPMon 检查 JSON 编码


    你可以再次使用任何工具检查内容大小（参见图 10-9）。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig9_HTML.jpg](img/477630_1_En_10_Fig9_HTML.jpg)


    图 10-9 使用 JSON 编码时的内容长度


    现在，你可以比较这三种场景，了解在微服务间通信使用 Protocol Buffer 时响应大小的变化。


    总结

    微服务就像一把双刃剑：它们提供了额外的杠杆作用，但应谨慎使用。这主要是由于第 4 章讨论的架构反转。你学习了两种可以引入微服务架构的重构过程，以更大程度地影响性能。还有更多的优化方法；不过，我将它们限制在本章讨论的两种方法之内。本书剩余部分的大部分内容将讨论基于事件的微服务，其中微服务间通信的异步特性默认通过消息传递而非
    HTTP 来利用。你将在下一章开始深入了解这些方面。


    11. 事件、最终一致性与

    一致性


    与同事握手，你会立即感受到同样的握手反馈。与伴侣拥抱或亲吻也是如此——你也会立即得到同样的回应（假设你伴侣的心情不会招来一记耳光作为回应！）。如果在上述任何场景中，你的伴侣不在你身边，但你仍然想向他或她传递类似的问候，该怎么办？你可以通过当今可用的任何数字媒体发送电子邮件或消息。你的伴侣（迟早）会收到你的消息，并能够回复你。最终的效果是，即使你的伴侣不在附近，甚至在你发起问候的确切时刻没有听到你的声音，你迟早也会得到回应的问候。这些场景和问候也典型地适用于微服务应用程序。一旦你根据领域边界将应用程序拆分为可以独立于其他微服务进行部署、启动和运行的微服务，这也意味着这些微服务应该有能力继续提供功能，而不管其对应的微服务如何。这就是必须讨论事件驱动架构（EDA）重要性的地方。在本章中，你将了解
    EDA 的一般概念以及一些选定的关注点。最后，你将能够理解事件和 EDA，并更好地决定是希望在微服务之间使用异步事件还是同步请求/响应风格的交互。


    在本章中，你将学习以下内容：


    *   EDA 简介


    *   EDA 的不同风格


    *   EDA 在微服务架构演进中的相关性


    *   EDA 在使不同微服务最终一致中的作用


    *   规模立方体与分区计算活动的需求


    *   CAP 定理与 CAP 金字塔


    *   BASE 事务


    事件驱动架构

    事件驱动架构是一种软件架构模式，它促进事件的产生、检测、消费和响应。一个事件驱动系统通常由事件发射器（或代理）、事件消费者（或接收器）以及事件传播所通过的事件通道组成。让我们详细了解这些组件。


    事件

    事件是特定系统或领域内发生或出现的事情；它是该领域中已经发生或被认为已经发生的事情。

    事件可以定义为状态的变化。例如，当订单发货时，订单的状态从“待处理”变为“已发货”。电子商务微服务架构可以将此状态变化视为一个事件，其发生可以通知给架构内的其他微服务，甚至微服务边界之外的其他组件。从形式上讲，被产生、发布、传播、检测或消费的是（通常是异步的）消息，称为事件通知，而不是事件本身。如果是这样，事件就是触发消息发出的状态变化。事件不会传播；它们只是发生。然而，术语“事件”和“事件通知”通常互换使用，以表示通知消息本身。

    '
- fmt: '# EDA Components


    An EDA-based application typically consists of event emitters (source or agents),
    event consumers (sinks), and event channels. Event emitters have the responsibility
    to generate, detect, gather, and transfer events. When an event emitter does so,
    it doesn’t know the consumers of the event, it doesn’t even know if any consumer
    exists, and if it exists, it doesn’t know how or when or where the event is used
    for further processing. Event sinks have the responsibility of reacting as soon
    as an interested event is sensed. The reaction provided by the sink may be complete
    or partial. If the reaction is partial, it is possible that the same event is
    also interesting to other sinks and they may add to the reaction.


    Event channels are conduits through which events are transmitted from an event
    source to an event sink. The information required for the correct distribution
    of events to the right sink is exclusively present within the event channel. However,
    such event channels with distribution knowledge are rather rigid in terms of addressing,
    and in physical terms they are often represented by message queues. In other words,
    the physical implementation of such event channels can be based on traditional
    components such as message-oriented middleware using point-to-point communication,
    typically represented by message queues.


    Figure [11-1](#477630_1_En_11_Chapter.xhtml#Fig1) represents the point-to-point
    kind of event processing typically leveraging message queues. When you use a queue,
    the event source and sink are tightly coupled and this is shown in Figure [11-1](#477630_1_En_11_Chapter.xhtml#Fig1).
    A better approach is to have topics representing those conduits. Here, the event
    channels have little information as to where to distribute the events; rather,
    it’s up to the event sinks to attach themselves to the interested event channels
    and get notified whenever an interesting event is available.


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig1_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. Point-to-point EDA


    The latter approach is more flexible in terms of the expandability of a microservices
    application, and you will see the details soon. Figure [11-2](#477630_1_En_11_Chapter.xhtml#Fig2)
    shows that the relationship of the event source and sink with respect to the message
    conduit (Message Topic, in this case) is relatively flexible.


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig2_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig2_HTML.jpg)


    Figure 11-2. Publish-subscribe EDA


    In Figure [11-2](#477630_1_En_11_Chapter.xhtml#Fig2), the queue has been replaced
    by a topic.^([^(19)](#fn19)) A message topic provides a publish–subscribe messaging
    pattern where senders of messages, called publishers, don’t program the messages
    to be sent directly to specific receivers, called subscribers, but instead categorize
    published messages into classes without knowledge of which subscribers, if any,
    there may be. Also, subscribers express interest in one or more classes and then
    onwards receive messages that are of interest, without knowledge of which publishers,
    if any, exist. This provides options for adding and/or removing both source (publisher)
    and sink (subscriber) from the architecture on the fly, as shown in Figure [11-3](#477630_1_En_11_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig3_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. Flexible publish-subscribe EDA


    As depicted in Figure [11-3](#477630_1_En_11_Chapter.xhtml#Fig3), while following
    the publish-subscribe pattern, the conduit itself is open and continuous in the
    sense that it can accommodate more sink in future, on the fly.


    # Microservices and Event-Driven Architecture


    Having talked about the point-to-point and publish-subscribe patterns of EDA,
    let’s now look into some concerns you will face when designing microservices in
    the flexible, publish-subscribe pattern.


    ## Evolution of Microservices


    Most of the software applications are built with a set of requirements in mind
    to start with, and then have a natural evolution over a period of a few years.
    Incorporating change requests and new requirements will happen over the years
    until the application is finally retired. Traditional or monolith applications
    are changed at the source code level to accommodate these changes and then the
    entire application has to be regression tested, performance validated, and redeployed.
    There will be inevitable downtime, also.


    Figure [11-4](#477630_1_En_11_Chapter.xhtml#Fig4) shows an e-commerce application
    that uses the publish-subscribe microservices pattern.


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig4_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Publish-subscribe microservices


    With reference to Figure [11-4](#477630_1_En_11_Chapter.xhtml#Fig4), the microservices
    interact as follows:


    1.  The `Order Service` creates an `Order` in a pending state and publishes an
    `OrderCreated` event.

    2.  The `Inventory Service` receives the event and attempts to update the inventory
    for items based on that `Order`. It then publishes either an `InventoryUpdated`
    event or a `NotEnoughInventory` event.

    3.  If an `InventoryUpdated` event occurs, then the `Order` status must change
    from pending to confirmed, which will again fire an `OrderConfirmed` event.

    4.  The `Shipping Service` receives the `OrderConfirmed` event and arranges for
    shipping the product. Once arrangements have completed and the item has shipped,
    it fires an `OrderShipped` event.


    So far, so good, but say the e-commerce company wants to boost customer experience,
    and as a part of that, the IT department wants to enhance the application to include
    prompt notifications to customers through e-mail and other channels. The solution
    is to introduce another microservice called `Notification Service`. Since you
    have designed the application based on a publish-subscribe pattern, you should
    be able to introduce the new microservice without any downtime to the application.
    In other words, you should develop, test, benchmark the performance, baseline
    the `Notification` microservice, and deploy “hot” to the existing application
    infrastructure. Once deployed, from then onwards the `Notification` microservice
    will start consuming the `OrderConfirmed` event to promptly notify the customer
    that his order has been confirmed. Similarly, it may also start consuming the
    `OrderShipped` event to promptly notify the customer that his order has been shipped.
    This is depicted in Figure [11-5](#477630_1_En_11_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig5_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. The evolution of the microservices application


    What you have seen is seamless evolution. You don’t touch or disrupt any of the
    existing microservices; however, you can hook or attach more and more microservices
    to significantly alter application behavior or functionality! You should now better
    understand the honeycomb analogy mentioned in the “Extensible Microservices” section
    in Chapter [3](#477630_1_En_3_Chapter.xhtml), which is duplicated in Figure [11-6](#477630_1_En_11_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig6_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig6_HTML.jpg)


    Figure 11-6. The microservices honeycomb analogy'
