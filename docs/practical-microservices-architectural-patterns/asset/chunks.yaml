- fmt: '令人担忧的是，您可以看到报价结算已经发生，并且报价金额`400`被添加到买方和卖方的各自运行余额中，如图[13-24](#477630_1_En_13_Chapter.xhtml#Fig24)所示；然而，在上游系统中，该报价尚未被标记为“已确认”。这是因为将报价标记为“已确认”的拍卖服务发生了回滚！


    其结果是，下一次`Quotes Processor Task`会再次拾取该新报价进行处理。在您的测试执行中，这次您不会模拟拍卖服务中的错误。因此，该报价的端到端处理被重复执行，图[13-25](#477630_1_En_13_Chapter.xhtml#Fig25)反映了这一结果！


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig25_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig25_HTML.jpg)


    图13-25 测试用例4完成时的控制台


    这是非预期的。重复的消息导致了报价的重复结算！


    ### 测试重复消息消费场景


    要测试重复消息消费测试用例，请再次使用`Postman`并创建另一个新报价：


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "TSLA", "sellerId" : 11, "buyerId" : 21, "amount" : 500, "test" :
    5, "delay" : 2 }

    ```


    图[13-26](#477630_1_En_13_Chapter.xhtml#Fig26)显示了测试用例5的新报价。其状态为“新建”。结算时，报价金额`500`应被添加到买方和卖方的各自运行余额中，如图所示。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig26_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig26_HTML.jpg)


    图13-26 测试用例5控制台，初始状态


    现在让我们看一下图[13-27](#477630_1_En_13_Chapter.xhtml#Fig27)中的事务语义。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig27_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig27_HTML.jpg)


    图13-27 测试用例5的事务语义


    这里，在任何上游处理中都没有模拟错误，因此报价状态将从“新建”变为“已确认”，并且由于新报价消息成功投递到`ActiveMQ`，`Quote Settlement`微服务将接收该报价消息进行结算。结算监听服务将接收消息，随后调用报价对账服务进行结算。结算期间，买方和卖方的运行余额被更新。然而，一旦控制权从报价对账服务返回，就会模拟一个错误，如图[13-27](#477630_1_En_13_Chapter.xhtml#Fig27)中结算监听服务第一次处理时的`X`标记所示。


    这里需要注意几点：


    *   报价对账服务执行的结算是在`TX_REQUIRES_NEW`事务上下文中完成的，因此发生在外部或父事务（结算监听服务的事务）中的错误不会对报价对账服务的事务产生任何影响，因此结算的效果被提交了。

    *   尽管结算监听服务已经从`ActiveMQ`读取了消息，但处于`TX_REQUIRED`事务上下文中的消息监听方法不会提交从`ActiveMQ`读取的消息。因此，对于`ActiveMQ`来说，消息投递并未成功，所以它会尝试重新投递该消息。


    在消息投递重试期间（即消息监听器第二次处理期间），您没有模拟任何错误，这在图[13-27](#477630_1_En_13_Chapter.xhtml#Fig27)中由两个服务中的`✓`标记表示。因此，结算监听服务和报价对账服务的事务都将成功并提交。然而，存在一个更大的问题：报价将再次被结算，这将导致买方账户和卖方账户分别被重复增加和扣除。见图[13-28](#477630_1_En_13_Chapter.xhtml#Fig28)。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig28_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig28_HTML.jpg)


    图13-28 测试用例5的事务语义


    ### 测试消息已消费、处理失败场景


    要测试消息已消费、处理失败测试用例，请再次使用`Postman`并创建另一个新报价：


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "MSFT", "sellerId" : 11, "buyerId" : 21, "amount" : 600, "test" :
    6, "delay" : 2 }

    ```


    图[13-29](#477630_1_En_13_Chapter.xhtml#Fig29)显示了测试用例6的新报价。其状态为“新建”。结算时，报价金额`600`应被添加到买方和卖方的各自运行余额中，如图所示。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig29_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig29_HTML.jpg)


    图13-29 测试用例6控制台，初始状态


    现在让我们看一下图[13-30](#477630_1_En_13_Chapter.xhtml#Fig30)中所示的事务语义。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig30_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig30_HTML.jpg)


    图13-30 测试用例6的事务语义


    这里同样，在任何上游处理中都没有模拟错误，因此报价状态将从“新建”变为“已确认”，并且由于新报价消息成功投递到`ActiveMQ`，`Quote Settlement`微服务将接收该报价消息进行结算。结算监听服务将接收消息，随后调用报价对账服务进行结算。结算期间，它尝试更新买方和卖方的运行余额。然而，在报价对账服务事务内部模拟了一个错误，如图[13-30](#477630_1_En_13_Chapter.xhtml#Fig30)中的`X`标记所示。由于报价对账服务事务配置了`TX_REQUIRES_NEW`语义，结算将被回滚。由于消息消费成功，最终结果是该报价在下游系统中将永远保持未结算状态！见图[13-31](#477630_1_En_13_Chapter.xhtml#Fig31)。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig31_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig31_HTML.jpg)


    图13-31 测试用例6控制台，完成状态


    ### 测试消息重新投递场景

    `JMS`不保证消息投递的顺序，因此先发送的消息可能在后发送的消息之后到达。无论您是否使用`XA`事务，这一点都成立。


    要测试消息重新投递测试用例，请再次使用`Postman`并创建另一个新报价：


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "ORCL", "sellerId" : 11, "buyerId" : 21, "amount" : 700, "test" :
    7, "delay" : 2 }

    ```


    图[13-32](#477630_1_En_13_Chapter.xhtml#Fig32)显示了测试用例7的新报价。其状态为“新建”。结算时，报价金额`700`应被添加到买方和卖方的各自运行余额中，如图所示。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig32_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig32_HTML.jpg)


    图13-32 测试用例7控制台，初始状态


    现在让我们看一下图[13-33](#477630_1_En_13_Chapter.xhtml#Fig33)中所示的事务语义。'
  raw: "Alarmingly enough, you can see that the quote settlement happened and\nthe\
    \ quote amount of 400 gets added to the respective running balances of\nthe buyer\
    \ and seller, as shown in Figure [13-24](#477630_1_En_13_Chapter.xhtml#Fig24);\
    \ however, in\nthe upstream systems, the quote is yet not marked as “Confirmed.”\
    \ This\nis because the auction service, which marked the quote as “Confirmed,”\n\
    got rolled back!\n\nThe effect is the next time out the Quotes Processor Task\
    \ picks up the\nnew quote for processing a second time. In your test execution,\
    \ you\nwon’t simulate the error within the auction service this time. Thus, for\n\
    a second time, the end-to-end processing of this quote is repeated and\nFigure\
    \ [13-25](#477630_1_En_13_Chapter.xhtml#Fig25) reflects the\nresult!\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig25_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig25_HTML.jpg)\n\
    \nFigure 13-25\nTest Case 4 console at completion\n\nThis is not intended. The\
    \ duplicate message caused the duplicate\nsettlement of the quote!\n\nTest the\
    \ Duplicate Message Consumption Scenario\n\nTo test the Duplicate\nMessage Consumption\
    \ test case, take Postman again and create\nanother new quote:\n\n```\nhttp://localhost:8080/api/quotes\n\
    METHOD: POST; BODY: Raw JSON\n{ \"symbol\" : \"TSLA\", \"sellerId\" : 11, \"buyerId\"\
    \ : 21, \"amount\" : 500, \"test\" : 5, \"delay\" : 2 }\n```\n\nFigure [13-26](#477630_1_En_13_Chapter.xhtml#Fig26)\
    \ shows the\nnew quote for Test Case 5\\. It has a status of “New.” When settled,\
    \ the\nquote amount, 500, should get added to the respective running balances\n\
    of the buyer and seller, shown in the figure.\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig26_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig26_HTML.jpg)\n\
    \nFigure 13-26\nTest Case 5 console, initially\n\nLet’s now look at the transaction\
    \ semantics in Figure [13-27](#477630_1_En_13_Chapter.xhtml#Fig27).\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig27_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig27_HTML.jpg)\n\
    \nFigure 13-27\nTest Case 5 transaction semantics\n\nHere, there are no errors\
    \ simulated in any upstream processing, so\nthe quote status will change from\
    \ “New” to “Confirmed,” and since the\nnew quote message delivery to ActiveMQ\
    \ is also successful, the Quote\nSettlement microservice will receive the quote\
    \ message for settlement.\nThe settlement listener service will receive the message\
    \ and\nsubsequently invoke the quote reconcile service for settlement.\nSettlement\
    \ happens during which the running balances of the buyer and\nseller are updated.\
    \ However, once the control comes back from the quote\nreconcile service, an error\
    \ is simulated, as shown in Figure [13-27](#477630_1_En_13_Chapter.xhtml#Fig27)\
    \ by the X\nsign in the first pass for the settlement listener service.\n\nA few\
    \ things to be noted here:\n\n*   The settlement done by the quote reconcile service\
    \ is done within\n    a TX_REQUIRES_NEW transaction context, so the error happens\
    \ at the\n    enclosing or the parent transaction (the transaction of the settlement\n\
    \    listener service) will not have any effect on the transaction of the\n  \
    \  quote reconcile service, so the effect of the settlement is\n    committed.\n\
    \n*   Even though the settlement listener service has read the message\n    from\
    \ ActiveMQ, the message listener method, which is in a TX_REQUIRED\n    transaction\
    \ context, will not commit the message read from ActiveMQ.\n    Hence for ActiveMQ,\
    \ the message delivery didn’t succeed, so it will try\n    to deliver the message\
    \ again.\n\nDuring retry of message delivery (i.e., during the second pass of\
    \ the\nmessage listener processing), you do not simulate any error, and this is\n\
    indicated by the sign (✓) in both services in Figure [13-27](#477630_1_En_13_Chapter.xhtml#Fig27).\
    \ Hence the\ntransactions by the settlement listener service and the quote reconcile\n\
    service will both be successful and committed. However, there is a\nbigger problem:\
    \ the quote will get settled once again, which will cause\ndouble addition and\
    \ double deduction in the buyer’s and seller’s\naccounts, respectively. See\n\
    Figure [13-28](#477630_1_En_13_Chapter.xhtml#Fig28).\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig28_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig28_HTML.jpg)\n\
    \nFigure 13-28\nTest Case 5 transaction semantics\n\nTest the Message Consumed,\
    \ Processing Failure\nScenario\n\nTo test the Message\nConsumed, Processing Failure\
    \ test case, take Postman again and\ncreate another new quote:\n\n```\nhttp://localhost:8080/api/quotes\n\
    METHOD: POST; BODY: Raw JSON\n{ \"symbol\" : \"MSFT\", \"sellerId\" : 11, \"buyerId\"\
    \ : 21, \"amount\" : 600, \"test\" : 6, \"delay\" : 2 }\n```\n\nFigure [13-29](#477630_1_En_13_Chapter.xhtml#Fig29)\
    \ shows the\nnew quote for Test Case 6\\. It has a status of “New.” When settled,\
    \ the\nquote amount, 600, should get added to the respective running balances\n\
    of the buyer and seller, as shown in the figure.\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig29_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig29_HTML.jpg)\n\
    \nFigure 13-29\nTest Case 6 console, initially\n\nLet’s now look at the transaction\
    \ semantics shown in Figure [13-30](#477630_1_En_13_Chapter.xhtml#Fig30).\n\n\
    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig30_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig30_HTML.jpg)\n\
    \nFigure 13-30\nTest Case 6 transaction semantics\n\nHere again there are no errors\
    \ simulated in any upstream processing, so\nthe quote status will change from\
    \ “New” to “Confirmed,” and since the\nnew quote message delivery to ActiveMQ\
    \ is also successful, the Quote\nSettlement microservice will receive the quote\
    \ message for settlement.\nThe settlement listener service will receive the message\
    \ and\nsubsequently invoke the quote reconcile service for settlement.\nSettlement\
    \ happens during which it attempts to update the running\nbalances of the buyer\
    \ and seller. However, an error is simulated within\nthe quote reconcile service\
    \ transaction, as shown in Figure [13-30](#477630_1_En_13_Chapter.xhtml#Fig30)\
    \ by the X\nsign. Since the quote reconcile service transaction is configured\
    \ with\nTX_REQUIRES_NEW semantics, the settlement will be rolled back. Since the\n\
