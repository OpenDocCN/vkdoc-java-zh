    OrderHistoryEventHandler.java)\n    ```\n\n至此，“取消订单”流程完成，你将在后续章节中查看实际用例的执行情况。\n\
    \n**发货已接收订单**\n\n在“创建新订单”小节中，你了解了创建新订单的流程。所有已创建的新订单都将可供后台管理员领取并触发履行处理。订单履行的第一步是触发发货命令。图\
    \ 17-8 展示了发货步骤中各实体的状态变化。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig8_HTML.jpg](img/477630_1_En_17_Fig8_HTML.jpg)\n\
    \n图 17-8\n发货订单\n\n参考图 17-8，后台管理员使用 Web 应用通过 REST JSON 请求发货订单的端到端流程可总结如下：\n\n1.\
    \  `order_service.js`\n    通过 HTTP 发送 REST JSON 请求以发货新创建的订单：\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/shipping/shipping',shippingDTO)\n\
    \    ```\n\n该请求会命中 API 网关。\n\n2.  API 网关通过查询服务注册表来解析 URL，并将请求路由到 Ecom-shipping\
    \ 微服务中的 Order Shipping REST Controller。\n\n3.  Order Shipping REST Controller\
    \ 创建一个新的`OrderShippingCommand`并将其发送到命令网关。参见清单 17-18。\n\n```\n    @RestController\n\
    \    @RequestMapping(\"/shipping\")\n    public class OrderShippingController\
    \ {\n    @Autowired\n    private CommandGateway commandGateway;\n    @RequestMapping(method\
    \ = RequestMethod.POST)\n    @ResponseBody\n    public void shipOrder(@RequestBody\
    \ ShippingDTO shippingDTO) {\n    OrderShippingCommand orderCommand =\n    new\
    \ OrderShippingCommand(shippingDTO.getOrderId());\n    commandGateway.send(orderCommand);\n\
    \    }\n    }\n    清单 17-18\n    OrderShippingController shipOrder (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\com\\acme\\ecom\\shipping\\\
    web\\OrderShippingController.java)\n    ```\n\n4.  命令网关将`OrderShippingCommand`投递到命令总线。\n\
    \n5.  `OrderShippingCommandHandler`从命令总线消费`OrderShippingCommand`。参见清单 17-19。\n\
    \n```\n    @Component\n    public class OrderShippingCommandHandler {\n    @Autowired\n\
    \    private EventBus eventBus;\n    @CommandHandler\n    public void handleOrderShipping(\n\
    \    OrderShippingCommand orderShippingCommand) {\n    eventBus.publish(asEventMessage(new\
    \ OrderShippedEvent(\n    orderShippingCommand.getOrderId(), new Date())));\n\
    \    }\n    }\n    清单 17-19\n    OrderShippingCommandHandler handleOrderShipping\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\com\\\
    acme\\ecom\\shipping\\command\\handler\\ OrderShippingCommandHandler.java)\n \
    \   ```\n\n6.  `OrderShippingCommandHandler`创建一个新的`OrderShippedEvent`并将其发送到集群事件总线。\n\
    \n7.  当`OrderShippedEvent`出现在集群事件总线中时，`OrderProcessSaga`的`handleOrderShippedEvent`\
    \ SagaEventHandler 会拾取它。\n\n8.  `OrderProcessSaga`中的`handleOrderShippedEvent`类似于\
    \ Axon 中的普通事件处理器。它不会启动或结束现有 Saga；相反，它需要单独执行某个操作，即在你的场景中向命令网关发送一个新的`OrderUpdateCommand`。参见清单\
    \ 17-20。\n\n```\n    public class OrderProcessSaga extends AbstractAnnotatedSaga\
    \ {\n    private Long orderId;\n    @SagaEventHandler(associationProperty = \"\
    orderId\")\n    public void handleOrderShippedEvent(OrderShippedEvent orderShippedEvent)\
    \ {\n    commandGateway.send(new OrderUpdateCommand(\n    orderShippedEvent.getOrderId(),OrderStatus.SHIPPED));\n\
    \    }\n    }\n    清单 17-20\n    OrderProcessSaga handleOrderShippedEvent (ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    order\\saga\\handler\\OrderProcessSaga.java)\n    ```\n\n9.  命令网关将`OrderUpdateCommand`投递到命令总线。\n\
    \n10.  `OrderCommandHandler`对`OrderUpdateCommand`感兴趣。参见清单 17-21。\n\n```\n    @Component\n\
    \    public class OrderCommandHandler {\n    @Autowired\n    @Qualifier(value\
    \ = \"orderRepository\")\n    private Repository orderRepository;\n    @CommandHandler\n\
    \    public void handleOrderUpdate(OrderUpdateCommand orderUpdateCommand) {\n\
    \    Order order = orderRepository.load(orderUpdateCommand.getOrderId());\n  \
    \  order.updateOrderStatus(orderUpdateCommand.getOrderStatus());\n    }\n    }\n\
    \    清单 17-21\n    OrderCommandHandler handleOrderUpdate (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n\
    \    ```\n\n11.  `handleOrderUpdate`首先检索对应的订单，然后调用`updateOrderStatus`，如清单 17-22\
    \ 所示。\n"
- fmt: "```java\n@Entity(name=\"order\")\n@Table(name = \"CUSTOMER_ORDER\")\npublic\
    \ class Order extends AbstractAggregateRoot {\n    @Id\n    private Long id;\n\
    \    @Enumerated(EnumType.STRING)\n    @Column(name=\"ORDER_STATUS\")\n    private\
    \ OrderStatus orderStatus;\n    public void updateOrderStatus(OrderStatus orderStatus){\n\
    \        this.orderStatus=orderStatus;\n        registerEvent(new OrderUpdatedEvent(this.id,\
    \ orderStatus.name(),\n            new Date(), null));\n    }\n}\n```\nListing\
    \ 17-22 `updateOrderStatus` (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\\
    src\\main\\java\\com\\acme\\ecom\\core\\order\\model\\Order.java`)\n\n12. The\
    \ order aggregate sends an `OrderUpdatedEvent` to the clustered event bus.\n13.\
    \ The `OrderUpdatedEvent` is consumed by the Order History Event Handler in the\
    \ `Ecom-history` microservice.\n14. The Order History Event Handler in the `Ecom-history`\
    \ microservice updates the corresponding record of order in the `Order History`\
    \ table.\n\nListing [17-17](#477630_1_En_17_Chapter.xhtml#PC22) shows the code\
    \ of the Order History Event Handler handling order updates. This completes the\
    \ “ship an order” flow, and you will later look at the execution of the actual\
    \ use case.\n\n## Deliver a Shipped Order\n\nYou just saw the flow of shipping\
    \ a new order. All shipped orders will be available further for the back office\
    \ admin to pick and trigger the last step in the fulfilment cycle, the order delivery.\
    \ Figure [17-9](#477630_1_En_17_Chapter.xhtml#Fig9) illustrates the state changes\
    \ of various entities during the delivery step.\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig9_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig9_HTML.jpg)\n\
    \n**Figure 17-9** Order delivery success\n\nReferring to Figure [17-9](#477630_1_En_17_Chapter.xhtml#Fig9),\
    \ the end-to-end flow as a result of a REST JSON request using the web app from\
    \ the back-office admin to ship an order can be summarized as follows:\n\n1. `order_service.js`\
    \ sends a REST JSON request over HTTP to deliver an already shipped order:\n \
    \   ```\n    $http.post(sessionStorage.getItem('apiUrl')+'/delivery/delivery',deliveryDTO)\n\
    \    ```\n    This request hits the API gateway.\n\n2. The API gateway interprets\
    \ the URL by looking at the service registry and directs the request to the Order\
    \ Deliver REST Controller in the `Ecom-delivery` microservice.\n\n3. The Order\
    \ Deliver REST Controller creates a new `OrderDeliveryCommand` and sends it to\
    \ the command gateway. See Listing [17-23](#477630_1_En_17_Chapter.xhtml#PC30).\n\
    \    ```java\n    @RestController\n    @RequestMapping(\"/delivery\")\n    public\
    \ class OrderDeliverController {\n        @Autowired\n        private CommandGateway\
    \ commandGateway;\n        @RequestMapping(method = RequestMethod.POST)\n    \
    \    @ResponseBody\n        public void deliverOrder(@RequestBody DeliveryDTO\
    \ deliveryDTO) {\n            OrderDeliveryCommand orderCommand =\n          \
    \      new OrderDeliveryCommand(deliveryDTO.getOrderId(),\n                deliveryDTO.isDelivered(),deliveryDTO.getReasonForFailure());\n\
    \            commandGateway.send(orderCommand);\n        }\n    }\n    ```\n \
    \   Listing 17-23 `OrderDeliverController.deliverOrder` (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-delivery\\src\\main\\java\\com\\acme\\ecom\\delivery\\web\\OrderDeliverController.java`)\n\
    \n4. The command gateway delivers the `OrderDeliveryCommand` to the command bus.\n\
    \n5. The `OrderDeliveryCommandHandler` consumes the `OrderDeliveryCommand` from\
    \ the command bus. See Listing [17-24](#477630_1_En_17_Chapter.xhtml#PC31).\n\
    \    ```java\n    @Component\n    public class OrderDeliveryCommandHandler {\n\
    \        @Autowired\n        private EventBus eventBus;\n        @CommandHandler\n\
    \        public void handleOrderDelivery(\n            OrderDeliveryCommand orderDeliveryCommand)\
    \ {\n            if(orderDeliveryCommand.isDelivered()){\n                eventBus.publish(asEventMessage(\n\
    \                    new OrderDeliveredEvent(orderDeliveryCommand.getOrderId(),\n\
    \                    new Date())));\n            }else{\n                eventBus.publish(asEventMessage(\n\
    \                    new OrderDeliveryFailedEvent(\n                    orderDeliveryCommand.getOrderId(),\n\
    \                    orderDeliveryCommand.getReasonForFailure())));\n        \
    \    }\n        }\n    }\n    ```\n    Listing 17-24 `OrderDeliveryCommandHandler.handleOrderDelivery`\
    \ (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-delivery\\src\\main\\java\\com\\\
    acme\\ecom\\delivery\\command\\handler\\OrderDeliveryCommandHandler.java`)\n\n\
    6. In the current flow, when the back office admin clicks the Delivered button,\
    \ the check `if(orderDeliveryCommand.isDelivered())` is true and hence a new `OrderDeliveredEvent`\
    \ is sent to the clustered event bus.\n\n7. The `OrderDeliveredEvent` registered\
    \ during Step 6 is consumed by the order process saga.\n\n8. The saga’s life cycle\
    \ is ended after the invocation of the `handleOrderCanceledEvent` handler since\
    \ you annotated that Event’s handler on the saga with `@EndSaga`. See Listing\
    \ [17-25](#477630_1_En_17_Chapter.xhtml#PC32).\n    ```java\n    public class\
    \ OrderProcessSaga extends AbstractAnnotatedSaga {\n        private Long orderId;\n\
    \        @EndSaga\n        @SagaEventHandler(associationProperty = \"orderId\"\
    )\n        public void handleOrderDeliveredEvent(OrderDeliveredEvent\n       \
    \     orderDeliveredEvent) {\n            commandGateway.send(new OrderUpdateCommand(\n\
    \                orderDeliveredEvent.getOrderId(),OrderStatus.DELIVERED));\n \
    \       }\n    }\n    ```\n    Listing 17-25 `OrderProcessSaga.handleOrderDeliveredEvent`\
    \ (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
    ecom\\core\\order\\saga\\handler\\OrderProcessSaga.java`)\n\n9. The saga sends\
    \ an `OrderUpdateCommand` to the command gateway.\n\n10. The command gateway delivers\
    \ the `OrderUpdateCommand` to the command bus.\n\n11. The Order Command Handler\
    \ picks up the `OrderUpdateCommand` for further processing. Refer to Listing [17-21](#477630_1_En_17_Chapter.xhtml#PC27)\
    \ for a walkthrough of the code showing the Order Command Handler handling the\
    \ `OrderUpdateCommand`.\n\n12. The `handleOrderUpdate` first retrieves the corresponding\
    \ order and calls `updateOrderStatus`.\n\n13. The order aggregate sends an `OrderUpdatedEvent`\
    \ to the clustered event bus. Listing [17-22](#477630_1_En_17_Chapter.xhtml#PC28)\
    \ shows this code.\n\n14. The `OrderUpdatedEvent` is consumed by the Order History\
    \ Event Handler in the `Ecom-history` microservice.\n\n15. The Order History Event\
    \ Handler in the `Ecom-history` microservice updates the corresponding record\
    \ of the order in the `Order History` table.\n\nListing [17-17](#477630_1_En_17_Chapter.xhtml#PC22)\
    \ shows the code of the Order History Event Handler handling Order Updates. This\
    \ completes the “deliver a shipped order” flow, and you will later look at the\
    \ execution of the actual use case.\n\n## Delivery Failure for a Shipped Order\n\
    \nThe example application has a provision to simulate a delivery failure for an\
    \ already shipped order. This event can happen for many reasons, like unable to\
    \ locate the delivery address, consignment rejected by the customer, a natural\
    \ calamity en route the consignment delivery, etc. Whatever the case, once the\
    \ consignment comes back to the warehouse, there is no need to keep the products\
    \ within that order in that packed state; instead the products can be released\
    \ to inventory (if found fit, of course) for sales again. You will look at the\
    \ flows and state changes when such a scenario is simulated in Figure [17-10](#477630_1_En_17_Chapter.xhtml#Fig10).\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig10_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig10_HTML.jpg)\n\
    \n**Figure 17-10** Order delivery failure"
