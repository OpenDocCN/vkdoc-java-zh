    *   `spring-rabbit`: A RabbitMQ-specific implementation


    The major features abstracted by Spring AMQP are


    *   A `Listener` container: For asynchronous processing of inbound messages


    *   A `RabbitTemplate`: A RabbitMQ-specific template for sending and receiving
    messages


    *   A Rabbit admin: Helpful in fast and automatic declaration of queues, exchanges,
    and bindings


    Let’s now look at some code for sending messages to a RabbitMQ message broker
    and receiving the same using a listener to the broker using Spring AMQP. Refer
    to Appendix B to follow step-by-step instructions to install and bring up a RabbitMQ
    broker. The complete and running code samples for this exercise are kept in the
    folder named `ch06-02`, which is bundled along with the book.


    ### Spring AMQP Message Listener


    Using Spring has the advantage of wiring much of the configurations in XML, and
    Listing [6-3](#477630_1_En_6_Chapter.xhtml#PC8) shows how to wire a message listener
    to the RabbitMQ broker.


    ```


    Listing 6-3

    Spring AMQP Listener Configuration (ch06\ch06-02\src\main\resources\rabbit-listener-context.xml)

    ```


    In Listing [6-3](#477630_1_En_6_Chapter.xhtml#PC8), you create an exchange and
    then bind the queue named `anonymousQueue` with `my.routingkey.*` to the `SAMPLE_EXCHANGE`.
    A binding is a bondage or “link” that you set up to bind a queue to an exchange.
    The routing key is a message attribute. The exchange, depending on the exchange
    type, might look at this key when deciding how to route the message to queues.
    The Listener class instantiated with bean id “listener” is shown in Listing [6-4](#477630_1_En_6_Chapter.xhtml#PC9).


    ```

    import org.springframework.amqp.core.Message;

    import org.springframework.amqp.core.MessageListener;

    public class Listener implements MessageListener {

    public void onMessage(Message message) {

    String messageBody= new String(message.getBody());

    LOGGER.debug("Listener received message-----> " + messageBody);

    }

    }

    Listing 6-4

    Spring AMQP Listener Bean (ch06\ch06-02\src\main\java\com\acme\ch06\ex02\Listener.java)

    ```


    The last step is to load the listener in the Spring context, which you do in Listing
    [6-5](#477630_1_En_6_Chapter.xhtml#PC10).


    ```

    import org.springframework.context.ApplicationContext;

    import org.springframework.context.support.ClassPathXmlApplicationContext;

    public class ListenerContainer {

    private static final String LISTENER_CONTEXT =

    "rabbit-listener-context.xml";

    public static void main(String[] args) {

    ApplicationContext context =

    new ClassPathXmlApplicationContext(LISTENER_CONTEXT);

    LOGGER.debug("Context successfully created from: "

    + LISTENER_CONTEXT);

    }

    }

    Listing 6-5

    Spring AMQP Listener Container (ch06\ch06-02\src\main\java\com\acme\ch06\ex02\ListenerContainer.java)

    ```


    The easiest way to bring all the required dependencies for your Maven build is
    to declare the snippet in Listing [6-6](#477630_1_En_6_Chapter.xhtml#PC11) into
    your build file, `pom.xml`.


    ```

    org.springframework.amqp

    spring-rabbit

    1.6.9.RELEASE


    Listing 6-6

    Spring AMQP RabbitMQ Dependencies (ch06\ch06-02\pom.xml)

    ```


    ### Spring AMQP Message Producer


    Here again you first create a rabbit connection factory with specified parameters.
    RabbitTemplate provides a convenient abstraction for sending and receiving messages,
    and Listing [6-7](#477630_1_En_6_Chapter.xhtml#PC12) shows the configuration.


    ```


    Listing 6-7

    Spring AMQP Sender Configuration (ch06\ch06-02\src\main\resources\rabbit-sender-context.xml)

    ```


    In Listing [6-8](#477630_1_En_6_Chapter.xhtml#PC13), you create a template of
    the bean defined in the previous Spring XML file and send few messages.


