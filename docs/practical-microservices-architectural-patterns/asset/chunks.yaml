    ### 基于 CQRS 的微服务横向扩展


    请参考图 3-6，该图展示了面向消息的微服务的扩展方式。你可以将相同的原则应用于基于 CQRS 的微服务中的命令服务和查询服务的横向扩展，如图 5-7 所示。这仅仅是图
    5-4 中“使用独立的读写进程进行横向扩展”的另一种视图；然而，这种视图与图 3-6 中的“面向消息的微服务扩展”更加一致，并额外具备了 CQRS 模式的能力。同样，在图
    5-7 中，我没有重复图 5-6 中描述的所有 CQRS 组件，因此请假设它们仍然存在，并在图中被抽象化以保持清晰。


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig7_HTML.jpg](img/477630_1_En_5_Fig7_HTML.jpg)


    图 5-7


    基于事件的 CQRS 架构横向扩展的元模型


    仔细观察图 5-7 会发现另一个注意事项：图中展示了两个命令服务实例。虽然维护多个读取服务实例相当简单，但维护同一个写入服务的多个实例则并非易事，因为如果跨多个实例并发访问具有相同标识的实体进行修改，可能会导致数据一致性问题。你将在第
    16 章中探讨这一方面；在此之前，请假设你只有一个写入服务节点。


    ## 总结


    为业务实体维护多个视图是我们多年来一直采用的技术，而物化视图、缓存、只读副本等都是实现这一目标的手段。CQRS 是一种更形式化的模式，用于改进微服务的内部架构，从而将微服务的可扩展性提升数倍。虽然
    CQRS 解决了业务实体读取部分的可扩展性问题，但写入部分被单独部署以处理数据一致性，这也将主导将实体状态的变更传播到所有读取部分。尽管与简单的微服务相比，这种架构更为复杂，但额外的复杂性将通过微服务可扩展性的指数级增长而得到回报。在将读取和写入部分拆分为独立的微服务后，你现在应该关注它们之间的外部架构问题，包括变更同步以及以可靠、灵活的方式进行其他类型的微服务间通信的需求。因此，请继续阅读第
    6 章。


    脚注 1


    # 6. 分布式消息传递


    消息传递是构建企业级软件应用程序最强大的机制之一。如果我们没有发明消息传递，全球所有的软件应用程序都将像一个完整的工作团队，需要全年无休地每周 7 天、每天
    24 小时工作，没有任何停机或故障的余地。但实际上，我们知道每个软件应用程序都容易发生停机或故障；更确切地说，每个软件应用程序都应该被设计为允许停机或故障。由于企业应用程序并非孤立存在，而是以分布式方式相互通信，当一个应用程序试图与一个已宕机的应用程序通信时会发生什么？消息传递有助于优雅地应对协调应用程序的意外停机或故障。在本章中，你将研究几个消息传递场景，这些场景将帮助你理解这些消息传递功能在分布式软件架构（尤其是在微服务上下文中）中发挥的关键作用。同样，我的目的不是从消息传递的基础知识开始，也不是深入探讨所有消息传递场景（这本身就可以写成一本书）。相反，我将展示几个对于理解消息传递在微服务架构中的作用至关重要的场景。


    ## 消息传递与弹性


    假设你已经了解消息传递架构中的基本构造，那么让我们首先看看如何为消息传递设置带来弹性的一些基础知识。


    ### 消息持久化


    消息持久化是一种机制，通过该机制，你可以将传递给消息代理的消息保存在持久化存储中。这将把消息在传输中或主内存中的状态从易失状态提升到永久安全状态。这在微服务环境中非常重要，因为协调微服务可以随时出现和消失、发生故障或重新启动等。


    微服务生态系统中的每个服务只能使其一项活动符合一致性原则：要么安全地将消息放入消息存储中，要么安全地从消息存储中获取消息。消息代理位于这两个消息传递原语之间，通常消息代理将消息存储在其内存（RAM）中，并再次从其内存中传递消息。但是，如果消息代理发生故障，则该消息代理存储在内存中的所有消息都将丢失。这是不可取的。这就是消息持久化发挥作用的地方。可以配置消息代理，使其由合适的消息持久化机制（通常是磁盘上的消息存储）进行备份。将消息持久化到磁盘上的消息存储会带来性能成本，但这将提高消息传递架构的弹性。


    当两个微服务想要相互连接时，它们会使用一个消息通道，其中一个微服务将信息写入该通道，另一个微服务从该通道读取信息。因此，发送微服务不仅仅是把信息扔进消息系统；相反，它将信息添加到一个特定的消息通道。接收信息的微服务也不是随机地从消息系统中拾取信息；相反，它从一个特定的消息通道（即它打算从中读取的通道）检索信息。


    当使用消息存储时，我们可以利用消息传递架构的异步特性。当一个微服务向一个通道发送消息时，它会将消息的副本发送到一个特殊的通道，以便由消息存储收集。整个设置如图
    6-1 所示。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig1_HTML.jpg](img/477630_1_En_6_Fig1_HTML.jpg)


    图 6-1


    具有持久化功能的简单发布-订阅

