- fmt: "# The next major update for this microservice is in the main application class.\
    \ See Listing [19-6](#477630_1_En_19_Chapter.xhtml#PC9).\n\n```\n@SpringBootApplication\n\
    @EnableDiscoveryClient\npublic class EcomCreateCommandAndRestApplication {\npublic\
    \ static void main(String[] args) {\nSpringApplication.run(EcomCreateCommandAndRestApplication.class,\
    \ args);\n}\n}\nListing 19-6\nEcom-CreateCommandRestController Main Class (ch19\\\
    ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\02-Ecom-CreateCommandRestController\\\
    src\\main\\java\\com\\acme\\ecom\\EcomCreateCommandAndRestApplication.java)\n\
    ```\n\nA Spring Cloud command router has to be created by annotating your Spring\
    \ Boot application with `@EnableDiscoveryClient`. Once done, it will look for\
    \ a Spring Cloud implementation on your classpath.\n\nThere are few other changes\
    \ in the code. Let’s look into the configuration of the Axon components in Listing\
    \ [19-7](#477630_1_En_19_Chapter.xhtml#PC10).\n\n```\n@Configuration\npublic class\
    \ EcomAppConfiguration {\n}\nListing 19-7\nEcom-CreateCommandRestController Configuration\
    \ (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\02-Ecom-CreateCommandRestController\\\
    src\\main\\java\\com\\acme\\ecom\\EcomAppConfiguration.java)\n```\n\nAs you can\
    \ see, when compared to the code in Listing [12-15](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC22)\
    \ and Listing [12-16](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC23),\
    \ Listing [19-7](#477630_1_En_19_Chapter.xhtml#PC10) contains absolutely no explicit\
    \ configurations required to configure the Axon 3 components. It’s all automatically\
    \ wired up by Spring!\n\n## Microservice 4: 03-Ecom-HandleCommandAndCreateEvent\n\
    \nThis microservice has to handle any commands created by the `02-Ecom-CreateCommandRestController`\
    \ microservice and reaching through the distributed command bus from the remote\
    \ JVM. The only change in code to this microservice from that in Chapter [12](#477630_1_En_12_Chapter.xhtml)\
    \ is the introduction of the Spring Cloud command router by annotating the Spring\
    \ Boot application with `@EnableDiscoveryClient` as shown in the previous microservice,\
    \ so I will just display the code here in Listing [19-8](#477630_1_En_19_Chapter.xhtml#PC11)\
    \ without any detailed explanation.\n\n```\n@EnableDiscoveryClient\n@SpringBootApplication\n\
    public class EcomHandleCommandAndCreateEventApplication {\npublic static void\
    \ main(String[] args) {\nSpringApplication.run(\nEcomHandleCommandAndCreateEventApplication.class,\
    \ args);\n}\n}\nListing 19-8\nMain Application Class (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    03-Ecom-HandleCommandAndCreateEvent\\src\\main\\java\\com\\acme\\ecom\\EcomHandleCommandAndCreateEventApplication.java)\n\
    ```\n\n## Microservice 5: 04-Ecom-EventHandleCore\n\nAgain, since you have already\
    \ followed the corresponding example in Chapter [12](#477630_1_En_12_Chapter.xhtml),\
    \ there is nothing new in this microservice. So I will not do a detailed code\
    \ walkthrough. As the name of the microservice hints, it contains the two main\
    \ event handlers, `OrderEventHandler` and `ProductEventHandler`, and the functionality\
    \ and code snippets are similar to those in the previous example in this chapter.\
    \ However, a little update needs to be mentioned here.\n\nAs you have already\
    \ seen, all singleton Spring beans components containing `@EventHandler` annotated\
    \ methods will be subscribed to the event processor to receive event messages\
    \ published to the event bus. Event processors can also be configured in `application.properties`.\n\
    \n```\naxon.eventhandling.processors.name.mode=tracking\naxon.eventhandling.processors.name.source=eventBus\n\
    ```\n\nThe `source` attribute here refers to the name of a bean implementing `SubscribableMessageSource`\
    \ or `StreamableMessageSource` that should be used as the source of events for\
    \ the selected processor, which defaults to the event bus or event store defined\
    \ in the application context. Next, you can mark to use a so-called tracking processor\
    \ to process events asynchronously. The processor will tail the events in the\
    \ event store (or any other source that supports tracking).\n\nTo configure a\
    \ processor to switch to tracking mode, you need to do the following:\n\n1.  First,\
    \ you override the processing group’s name. By default, the name of a processing\
    \ group (and the processor that will process events on behalf of it) is the package\
    \ name of the event handlers that are assigned to it. You can override it by putting\
    \ a `@ProcessingGroup`.\n\n2.  Next, in the `application.properties`, configure\
    \ the messages processor to be tracking:\n\n```\n    axon.eventhandling.processors.messages.mode=tracking.\n\
    ```\n\nHere, the `messages` part is the name of the processor. Inspect `application.properties`\
    \ to view this. See Listing [19-9](#477630_1_En_19_Chapter.xhtml#PC14).\n\n```\n\
    axon.eventhandling.processors[ECOM_EVENT_PROCESSOR].mode=tracking\naxon.eventhandling.processors[ECOM_EVENT_PROCESSOR].source=eventBus\n\
    Listing 19-9\nEcom-EventHandleCore Configuration (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
    04-Ecom-EventHandleCore\\src\\main\\resources\\application.properties)\n```\n\n\
    You then attach the processing group to enable it to handle the right event, as\
    \ shown in Listing [19-10](#477630_1_En_19_Chapter.xhtml#PC15).\n\n```\n@Component\n\
    @ProcessingGroup(\"ECOM_EVENT_PROCESSOR\")\npublic class OrderEventHandler {\n\
    @EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent event) {\n\
    //The code goes here\n}\n}\nListing 19-10\nOrder Event Handler (ch19\\ch19-02\\\
    Ax3-Commands-Multi-Event-Handler-Distributed\\04-Ecom-EventHandleCore\\src\\main\\\
    java\\com\\acme\\ecom\\order\\eventhandler\\OrderEventHandler.java)\n```\n\nSimilarly,\
    \ you attach the processing group to enable it to handle the stock-related events,\
    \ as shown in Listing [19-11](#477630_1_En_19_Chapter.xhtml#PC16).\n\n```\n@Component\n\
    @ProcessingGroup(\"ECOM_EVENT_PROCESSOR\")\npublic class ProductEventHandler {\n\
    @EventHandler\npublic void handleProductStockUpdatedEvent(StockUpdatedEvent event)\
    \ {\n//The code goes here\n}\n}\nListing 19-11\nProduct Event Handler (ch19\\\
    ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\04-Ecom-EventHandleCore\\\
    src\\main\\java\\com\\acme\\ecom\\product\\eventhandler\\ProductEventHandler.java)\n\
    ```\n\n## Microservice 6: 05-Ecom-EventHandlerAudit\n\nThe functionality and code\
    \ for this microservice is the same as what you have already seen for the `EventHandlerAudit`\
    \ microservice in Chapter [12](#477630_1_En_12_Chapter.xhtml). The only change\
    \ is similar to what was described in the just previous microservice in attaching\
    \ the processing group, hence I will not repeat that information.\n\n## Build\
    \ and Test the Example Scenario\n\nFollow the instructions in the “Build and Test\
    \ the Example Scenario” subsection under the “Distributed Command and Event Handling”\
    \ section in Chapter [12](#477630_1_En_12_Chapter.xhtml) to build and test the\
    \ example. The only difference for this example is that you have one additional\
    \ microservice, the Eureka Registry. You should build and run the Eureka Registry\
    \ microservice as a first step. Then follow the steps described in Chapter [12](#477630_1_En_12_Chapter.xhtml)."
