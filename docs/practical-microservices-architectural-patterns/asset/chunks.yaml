    \ the\nthree-axis\nscaling where each axis represents scaling your application\
    \ at\ndifferent levels:\n\n*   **X axis (horizontal scaling)**: Here you replicate\n\
    \    many instances of the same microservice and use load balancers to\n    distribute\
    \ traffic.\n\n*   **Y axis (functional decomposition)**: Microservices\n    are\
    \ one approach of Y axis scaling where you split the application\n    components\
    \ based on functionality.\n\n*   **Z axis (** **data\n    partitioning** **)**:\
    \ Here, each\n    microservices or functionality can be further split based on\
    \ some\n    criterion. A web scale application can distribute traffic and so all\n\
    \    first names starting from A to G go to server farm X, H to O go to\n    server\
    \ farm Y, and P to Z go to server farm Z. This technique is called\n    name sharding.\n\
    \nEach of these scaling\nmethods must address data consistency issues. You have\
    \ master\ndata, or look-up data, and transactional data in enterprise\napplications.\
    \ While master data is more or less static, transactional\ndata keeps changing\
    \ state with transactions. X-, Y-, and Z-axis scaling\ndepends on the network\
    \ for distributed services to share data.\nSo, you can distribute data and services\
    \ on each axis to increase\nscalability, or have more than one node hosting services\
    \ to increase\navailability. The moment you have more than one node, you require\
    \ a\nnetwork for interconnectivity, so the network provides partition\ntolerance.\
    \ Also, if you have more than one copy of either data or code\n(service runtime),\
    \ you need to address data consistency. I will describe\nthis more in the next\
    \ section.\n\nThe CAP Theorem\n\nThe CAP Theorem describes the three architectural\n\
    properties that are linked together with mutual dependencies as\n\n*   Consistency\n\
    \n*   Availability\n\n*   Partition tolerance\n\nThe theorem states that you can\
    \ guarantee any two of the three\nproperties. If you add or increase one of these\
    \ properties, you do it by\ntaking away from one (or both) of the others. In other\
    \ words, you can\nhave a highly available, consistent system but its partitionability\
    \ will\nbe low, or you can have a highly available and partitionable system but\n\
    you would likely need to give up on consistency.\n\nFigure [11-11](#477630_1_En_11_Chapter.xhtml#Fig11)\
    \ depicts the\nCAP Theorem pictorially. It says, you can pick any two from the\
    \ list of\nC, A, and P, but you can’t achieve all three at the same time. Let’s\n\
    understand better what that means. First, let’s look at the definition\nof C,\
    \ A, and P in the CAP Theorem.\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg)\n\
    \nFigure 11-11.\nThe CAP Theorem\n\n*   **Consistency** **:** All microservice\n\
    \    nodes have the same view of the data.\n\n*   **Availability** **:** Every\n\
    \    microservice can read or write to any other microservice, all the\n    time.\n\
    \n*   **Partition tolerance** **:** The\n    microservices application as a whole\
    \ works well despite physical network\n    partitions between the microservices.\n\
    \nRelational\ndatabases like Oracle are great at providing consistency because\n\
    they focus on ACID properties and provide consistency by also providing\nfine\
    \ control over transaction isolation so that in the earlier\ne-commerce example\
    \ when Customer Joe confirms the purchase of the last\nitem of a particular product\
    \ in stock and simultaneously decreases the\ninventory in stock by one, any intermediate\
    \ states are isolated from\nCustomer Ann, who must wait a few milli- or microseconds\
    \ for the RDBMS\ntable or row locks to be released while the data store is made\n\
    consistent.\nAvailability\nmeans the service is available to operate fully as\
    \ far as the\ntransaction is concerned. Cluster-aware proxies or client stubs\
    \ are used\nin enterprise applications to fall back to redundant instances, if\
    \ a\nparticular instance of a service is down. The Oracle Real Application\nCluster\
    \ (RAC)  is noteworthy here\ndue to its firm promise to provide consistency of\
    \ data on disk and\navailability of the DBMS service in runtime process at the\
    \ same time.\nOnce you are able to transport your data bits up to the disk level\
    \ by\nusing the techniques mentioned in the “Data or Storage Redundancy”\nsection\
    \ in Chapter [9](#477630_1_En_9_Chapter.xhtml), you can be sure that your bits\n\
    are made durable enough. However, the techniques mentioned in that\nsection will\
    \ increase the probability of partitions forming!\nWhen you use a SQL client and\
    \ issue “Select for Update”^([^(21)](#fn21)) or similar commands from the\nsame\
    \ node where you run your Oracle database, your node acts as a kind\nof atomic\n\
    processor in that it either works or it doesn’t (i.e. if it has\ncrashed, it’s\
    \ not available, but it won’t cause data inconsistency\neither). When you start\
    \ to separate and spread processing logic from\ndata around different nodes either\
    \ for scalability or availability,\nthere’s a risk of partitions forming. A partition\
    \ happens when, for\nexample, a network switch malfunctions, a network cable gets\
    \ unplugged,\nor a power failure makes your other node unavailable.\nArchitecture\
    \ trade-offs must be made\nwhen designing microservices to address the limitations\
    \ imposed by the\nCAP Theorem. You may design systems without partitions if you\
    \ have to\nstop them from network failures. In order to do this, you need to put\n\
    everything related to that transaction on one machine, or in one\natomically-failing\
    \ unit like a single rack. Ah, does it sound familiar?\nAre we talking about “a\
    \ microservice here?” You have seen that a\nmicroservice by definition is an independently\
    \ deployable,\nself-contained unit that owns and governs its own data! Here comes\
    \ the\nnext caveat: even a rack can have partial failures. Further, a\nmicroservice\
    \ itself has to scale, which means you need to think about\nredundancy. Moreover,\
    \ if horizontal layers of a single microservice have\nto be deployed best to address\
    \ SLAs, then the need to partition comes\nback. Yes, you are going round in circles\
    \ in your design thinking, and\nthe characteristics of your application, the context\
    \ of your business,\nand many other technical and even cultural factors must be\
    \ taken into\naccount to decide where the sweet spot for your microservices\n\
    architecture is in the above circular continuum.\n\nBASE (Basically Available,\
    \ Soft State, Eventually\nConsistent) Systems"
