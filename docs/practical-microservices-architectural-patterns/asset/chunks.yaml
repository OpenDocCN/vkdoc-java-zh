    there are only two transactions recorded in the `Stock Transaction` table. This
    is because the quote message of Test Case 3 was lost upstream and never reached
    the downstream microservice. For the same reason, the quote amount of 300 in Test
    Case 3 was also not added to the buyer and seller, as shown in Figure [14-11](#477630_1_En_14_Chapter.xhtml#Fig11).


    Now let’s execute the test case you intend to do and validate the effect of the
    design for resiliency. To test the Duplicate Message Being Sent test case, take
    Postman again and create another new quote, as shown:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "NFLX", "sellerId" : 11, "buyerId" : 21, "amount" : 400, "test" :
    4, "delay" : 2 }

    ```


    Figure [14-13](#477630_1_En_14_Chapter.xhtml#Fig13) shows the new quote for Test
    Case 4. It has a status of “New.” When settled, the quote amount, 400, should
    get added to the respective running balances of the buyer and seller, as shown
    in Figure [14-11](#477630_1_En_14_Chapter.xhtml#Fig11).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig13_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig13_HTML.jpg)


    Figure 14-13 Test Case 4 console, initially


    The “Test the Duplicate Message Being Sent Scenario” section in Chapter [13](#477630_1_En_13_Chapter.xhtml)
    may be referenced for a detailed explanation of the test scenario you are executing.
    Here you simulate duplicate quote messages being sent by the upstream microservice.
    In that section, you saw that the quote was settled twice, which is undesirable.


    In the test case you execute in this section, you simulate duplicate quote messages
    being send by the upstream microservice. The simulation is effected by successfully
    sending the message and making the status update of the quote change from “New”
    to “Confirmed” fail. This is shown in Figure [14-14](#477630_1_En_14_Chapter.xhtml#Fig14).
    Here, the quote amount is already added during quote settlement by the downstream
    microservice.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig14_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig14_HTML.jpg)


    Figure 14-14 Test Case 4 console, intermediate


    You may also view the Stock Transaction console in Figure [14-15](#477630_1_En_14_Chapter.xhtml#Fig15)
    and see that the settlement of the quote for Test Case 4 has been recorded.


    In the next pass of the Quote Processor Task of the upstream microservice, it
    will pick up the same quote of Test Case 4 a second time for processing. This
    time you also send a quote message to the downstream microservice; however, you
    do not simulate the error while you update the status of the quote from “New”
    to “Confirmed.” When this quote message reaches the downstream microservice as
    a duplicate, due to the enhanced design of the solution, the downstream microservice
    is now smart enough to understand by looking in the `Stock Transaction` table
    (Figure [14-15](#477630_1_En_14_Chapter.xhtml#Fig15)) that this quote message
    is a duplicate and so it will not settle. All of this is shown in Figure [14-16](#477630_1_En_14_Chapter.xhtml#Fig16).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig16_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig16_HTML.jpg)


