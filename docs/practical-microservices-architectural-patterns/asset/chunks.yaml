    \nFigure 9-8\nConverged storage network\n\nFigure [9-8](#477630_1_En_9_Chapter.xhtml#Fig8)\
    \ makes it evident\nthat you need fewer network ports, storage ports, adapters,\
    \ and cables\nto have the same or better redundancy and failover as that\nrequired\
    \ in Figure [9-7](#477630_1_En_9_Chapter.xhtml#Fig7)."
  trans: '

    边界网关协议（BGP）是实现互联网连接冗余的关键协议之一。当你的网络连接到多个互联网服务提供商（ISP）时，这被称为多宿主连接。多宿主连接^(¹⁷)提供了冗余和网络优化功能。它会选择能够为资源提供最佳可用路径的
    ISP。让我们从高层次来详细了解其细节。


    你需要从互联网上的自治系统（AS）开始理解。自治系统是一个由连接的互联网协议（IP）路由前缀组成的集合，由一个或多个网络运营商代表单个管理实体或域进行控制，并向互联网呈现统一且明确的路由策略。ISP
    必须拥有官方注册的自治系统编号（ASN）。一个 ISP 可能支持多个自治系统；然而，互联网只看到该 ISP 的路由策略。ASN 由互联网号码分配局（IANA）按块分配给区域互联网注册管理机构（RIR）。然后，相应的
    RIR 在其指定区域内将 AS 编号分配给各个实体。


    自治系统内的网络使用内部网关协议（IGP）相互通信路由信息。一个自治系统使用边界网关协议与其他自治系统共享路由信息。未来，BGP 预计将被 OSI 域间路由协议（IDRP）取代。


    运营商中立的数据中心由多个 ISP 提供服务。拥有两个 ISP 时，你可以从彼此获得足够的带宽，以便在其中一个 ISP 出现故障时，仍能处理你的流量而不会出现任何速度下降。拥有三个或更多
    ISP 时，你需要在以下两种能力之间做出选择：一个 ISP 故障时仍能无降速运行，以及除一个 ISP 外其余全部故障时仍能保持运行。


    图 9-5 展示了连接到多个 ISP 的示意图。请记住，该示意图是典型情况；可能存在多种替代方案。冗余路径、交换机、接入端口和路由器将确保，如果任何路径或组件发生故障，仍然存在一条不同的可用路径。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig5_HTML.jpg](img/477630_1_En_9_Fig5_HTML.jpg)


    图 9-5

    通过多个本地路由器实现到 ISP 的多宿主负载分担


    **应用架构冗余**


    如前文所述，面向互联网的边界路由器直接与 ISP 建立对等连接。用于防范蠕虫、病毒、拒绝服务（DoS）流量等的入侵防御设备，以及网络安全设备（WSA）等设备，都位于网络的这一部分。防火墙通过实施和执行有状态防火墙规则以及应用层检查，来保护通过边缘的功能。DMZ
    为基于 HTTP 的应用程序和电子商务应用提供主要安全保护。


    在图 9-6 中，你可以看到路由器和交换机交叉连接以提供冗余路径。类似地，应用层交换机为跨 Web 服务器的负载分担和故障切换提供支持。再次注意，此处的图示是典型情况，会根据企业需求而有所不同。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig6_HTML.jpg](img/477630_1_En_9_Fig6_HTML.jpg)


    图 9-6

    高可用性应用部署架构


    部署在 DMZ 中的面向公众的服务显示为单台服务器；然而，它们也可以冗余部署。数据存储层中的核心服务器同样是冗余的。


    **数据与存储冗余**


    数据存储在块级存储阵列（如 SAN，即存储区域网络）或基于文件的阵列（也称为 NAS 或网络附加存储阵列）上。它们提供不同级别的冗余，因此如果阵列中的单个组件（无论是磁盘驱动器、控制器、SAN
    或 LAN 接入端口等）发生故障，都不会完全破坏设置，用户仍然可以访问数据。基于 x86 架构的服务器硬件通常配置有到 SAN 和以太网网络的冗余连接。到异构设备的此类连接通过使用双端口适配器或使用多个（单端口）适配器来实现。适配器的选择取决于服务器中的可用空间（即
    I/O 扩展插槽的数量）以及所需的硬件冗余级别。简而言之，基础设施的设置方式使其为网络和存储资源使用了冗余路径、交换机和接入端口。


    图 9-7 揭示了路径是冗余的，并且不允许存在单点故障。如果以太网或 SAN 路径之一发生故障，仍然可以通过一条幸存的路径保持连接。在这种故障情况下，故障切换将由某种类型的多路径或故障切换软件触发。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig7_HTML.jpg](img/477630_1_En_9_Fig7_HTML.jpg)


    图 9-7

    非融合存储网络


    操作系统将拥有 NIC（网络接口卡）驱动程序，这些驱动程序允许它们与多个网卡关联，从而能够跨两条路径实现网络流量的负载均衡。如果物理网卡、线缆或其他网络组件发生故障，相同的驱动程序也会从故障中进行故障切换。

    此外，存储阵列供应商提供位于操作系统和存储适配器之间的软件，该软件可以跨可用的主机总线适配器（HBA）进行负载均衡，如图 9-7 所示。当 HBA、路径或设备发生故障时，将发生到冗余组件的故障切换。


    从图 9-7 中，你可以想象需要如此多的网络端口、存储端口、适配器和线缆来实现冗余。拥有如此多此类组件的大型数据中心将增加数据中心的建设以及运营成本。这就是融合网络发挥作用的地方，SAN
    和以太网流量可以在单一类型的线缆上运行。FCoE（以太网光纤通道）就是一个例子，它使用支持 FCoE 的适配器，这些适配器可以同时传输以太网和光纤通道流量。图
    9-8 展示了这一改进。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig8_HTML.jpg](img/477630_1_En_9_Fig8_HTML.jpg)


    图 9-8

    融合存储网络


    图 9-8 清楚地表明，要实现与图 9-7 中相同或更好的冗余和故障切换能力，你需要的网络端口、存储端口、适配器和线缆更少。

