    图 9-9 展示了如何跨地域复制数据中心。图 9-9 中所示的 SAN1 和 SAN2 也可以部署在遥远的地理位置。这样，其中一个站点可以被视为灾难恢复站点。供应商解决方案可以提供同步和异步复制功能，以及块级增量复制和精细快照功能。结合了光纤通道和
    IP 特性的 IP 光纤通道（FCIP）用于远距离连接分布式 SAN。FCIP 封装光纤通道并通过 TCP 套接字传输，因此它是一种隧道协议，因为它通过 IP
    网络在地理上分离的 SAN 之间建立透明的点对点连接。FCIP 依赖 TCP/IP 服务，通过局域网、城域网或广域网建立远程 SAN 之间的连接。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig9_HTML.jpg](img/477630_1_En_9_Fig9_HTML.jpg)


    图 9-9

    SAN 复制


    最后但同样重要的是，来自存储层的已存储字节会被归档到非持久性介质中，并可传输到辅助站点或灾难恢复站点，这同样可以由多个服务提供商完成，以提高可靠性。


    高可用微服务


    现在，您可以扩展前面“应用架构冗余”部分中解释的应用部署架构，以适应前面解释的网格应用和服务架构。如图 9-10 所示。请注意，在 MASA 风格中，应用是从客户端设备执行的。它们可以是
    Web 应用、原生移动应用、物联网应用等。但是，将它们表示在防火墙后面的核心数据中心内也并无不妥，大多数具有服务器端执行能力的 Web 应用都是这种情况。如果应用是移动应用，通常它们由应用商店（如
    Playstore 等）表示。此外，如果应用没有任何服务器端执行能力，而仅在客户端设备中执行，那么它们也可以托管在 DMZ 或更靠近边界的位置，以便于分发到客户端设备。在这种情况下，安全问题和其他类似问题将由
    API 层进一步拦截，您已在上一章中了解过 API 层。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig10_HTML.jpg](img/477630_1_En_9_Fig10_HTML.jpg)


    图 9-10

    MASA 风格部署的高可用性


    图 9-10 中需要注意的另一点是，应用和服务可以冗余托管，尤其是在它们被设计为微服务时。如果这些概念难以消化，请不要担心；在本章末尾的工作示例中，一切都会得到澄清。


    高可用 Spring Cloud 微服务演示

    上一节从部署角度解释了微服务架构如何融入高可用参考架构模型。在本节中，您将看到一个真实场景，您将在其中模拟从微服务角度已经讨论过的 HA 的许多方面。您将仅模拟微服务场景所必需的
    HA 构建块；但是，您不会尝试演示本章前面解释的基础设施级 HA 的其他通用原则，因为它们已经过充分验证，即使应用于微服务上下文，也并无不同。


    设计高可用微服务场景


    为了演示微服务 HA 场景，您将使用在第 8 章中使用的 Eureka 和 Zuul 组件。您将设计的场景如图 9-11 所示。


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig11_HTML.jpg](img/477630_1_En_9_Fig11_HTML.jpg)


    图 9-11

    演示微服务的高可用性


    您拥有 Zuul 和 Eureka 各两个实例。接下来，您将应用组件划分为三个不同的微服务：


    *   **Web 应用 μ 服务**：这是 MASA 风格中的应用组件。在您的示例中，它仅托管一个 HTML 页面，因此一旦浏览器从服务器加载此 HTML，之后从
    HTML 应用到服务器端的所有交互都将通过 API 网关进行。


    *   **产品 Web 服务器 μ 服务**：您模拟此微服务接收来自防火墙外部客户端的所有请求，因此此组件不会执行任何主要的数据操作。相反，它会将调用委托给产品数据服务器
    μ 服务。


    *   **产品数据服务器 μ 服务**：在此 μ 服务中，您将模拟 CRUD 操作。为保持演示简单，您不会针对任何数据库执行实际的 CRUD 操作。相反，您将使用内存数据存储来模拟它们。


    上述所有微服务也将被实例化两次，以便在任何时间点都具有冗余。

    接下来，您将使用一个 Nginx 服务器实例来模拟反向代理。此反向代理将配置为负载均衡模式，以便它可以对下一层组件进行负载均衡。


    关于 Nginx 代理配置，您需要注意两个方面：


    *   **Web 应用 μ 服务**：Web 应用 μ 服务是必须首先下载到客户端设备的应用。因此，应用的引导地址必须将此应用下载并渲染到客户端浏览器中。简而言之，此组件必须能够被客户端设备直接寻址和访问，因此
    Nginx 会将来自客户端的请求直接反向代理到此 μ 服务。


    *   **Zuul API 网关**：一旦 Web 应用 μ 服务在客户端设备中渲染完成，此后该应用对服务器的任何后续请求都必须仅通过 API 网关进行。因此，Zuul
    API 网关实例也应在 Nginx 反向代理中进行配置。


    我已从演示中移除了 DNS、防火墙等，因为它们的配置与典型部署并无不同，因此您的网络架构师将在这方面为您提供帮助。


