    您可以使用浏览器（推荐 Chrome）并访问 `http://localhost:8080/`。

    这将显示如图 15-9 所示的界面。您可以通过点击图 15-9 中任意产品的“立即下单”按钮来测试示例。点击后，订单写入数据库中会创建一个新订单。最终，订单读取数据库也会更新此新订单。同时，产品写入数据库中相应产品的库存会减少一件。此变更最终也会更新到产品读取数据库中。审计读取数据库也会更新记录。当您刷新界面时，变更结果如图
    15-11 所示。


    当您创建第一个订单时，一个 Saga 流程便会启动。要验证这一点，您可以使用控制台检查 MongoDB 中的集合，如代码清单 15-11 所示。


    ```

    D:\Applns\MongoDB\Server\3.2.6\bin>D:\Applns\MongoDB\Server\3.2.6\bin\mongo

    MongoDB shell version: 3.2.6

    connecting to: test

    > show dbs

    ecom   0.000GB

    local  0.000GB

    test   0.000GB

    > show dbs

    axonframework  0.000GB

    ecom           0.000GB

    local          0.000GB

    test           0.000GB

    > use axonframework

    switched to db axonframework

    > show collections

    sagas

    > db.sagas.find()

    { "_id" : ObjectId("5c7f689a75c90e3adeb78318"), "sagaType" : "com.acme.ecom.saga.OrderProcessSaga",
    "sagaIdentifier" : "3aeffc45-4ddd-419b-ab00-d2e32914c9ce", "serializedSaga" :
    BinData(0,""),
    "associations" : [ { "key": "sagaIdentifier", "value" : "3aeffc45-4ddd-419b-ab00-d2e32914c9ce"
    }, { "key": "orderId", "value" : "510374185" } ] }

    代码清单 15-11

    持久化在 MongoDB 集合中的 Saga

    ```


    > **注意**

    > 如果微服务未按预期方式响应，您可能需要清空 RabbitMQ 队列。这可以通过关闭 RabbitMQ、删除数据文件夹，然后重新启动 RabbitMQ 轻松完成。相关详情请参阅附录
    B。


    （如果变更未生效，请关闭浏览器会话，打开一个新的浏览器实例，然后重试上述 URL。）


    再创建两个订单，以便执行所有测试用例。刷新界面后，您将看到所有新订单以及订单的审计日志，如图 15-14 所示。


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig14_HTML.jpg](img/477630_1_En_15_Fig14_HTML.jpg)


    图 15-14

    创建了三个新订单


    如果您点击某个订单的“取消”按钮，该订单将被取消，并且 Saga 流程结束。不仅如此，由于订单被取消，对应产品的库存数量会加回一件。取消操作会生成自己的审计日志。再次刷新界面，您将看到如图
    15-15 所示的变更。


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig15_HTML.jpg](img/477630_1_En_15_Fig15_HTML.jpg)


    图 15-15

    订单已取消


    如果您点击某个订单的“确认”按钮，该订单将被确认，并且 Saga 流程再次结束。由于订单已确认，您在订购时减少的产品库存将保持不变。确认操作会生成自己的审计日志。再次刷新界面，您将看到如图
    15-16 所示的变更。


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig16_HTML.jpg](img/477630_1_En_15_Fig16_HTML.jpg)


    图 15-16

    订单已确认


    最后，请注意状态仍为“新建”的订单。如果您对此订单不进行任何进一步操作，它将保持该状态，这是由于 Saga 的持久性特性，它也将保持该状态。这演示了一个长时间运行的工作流，在您的案例中即
    Saga。


    **总结**

    虽然第 13 章和第 14 章详细介绍了事务，但本章专门在微服务的上下文中介绍了事务。您学习了 Saga，以及如何通过将给定事务分组为一系列子事务和相应的补偿事务来利用分布式
    Saga。Saga 中的所有事务要么全部成功完成，要么在发生故障时回滚补偿事务。您还看到了如何使用 Axon 2 框架实现 Saga 的完整工作代码。在了解了事务之后，接下来您将在第
    16 章中重新审视高可用性和可扩展性，重点放在 CQRS 设计上。


    **脚注**


    16. **高级高可用性与可扩展性**


    在第 9 章中，您了解了软件架构中影响高可用性（HA）的各种要素，其中大部分要素既适用于微服务架构，也适用于单体架构。在那里，您了解了私有云或本地部署基础设施的各种组件，并简要了解了
    HA 的各个方面。在本章中，您将深入探讨对设计基于 CQRS 的系统有重大影响的特定关注点。为了使内容简单易懂并与您已知或正在使用的概念相关联，我将在大多数人都熟悉的
    Oracle 数据库的上下文中审视这些关注点。一旦您理解了这些概念，就很容易将这些知识扩展到任何其他供应商的解决方案或其他免费开源解决方案。有趣的是，您将在
    Oracle 的上下文中审视许多这些概念，以确保仅在绝对必要时才利用此类解决方案，这再次引出了一个核心观点：在许多情况下，存在替代且可能更便宜的解决方案。


    您将在本章中探讨以下内容：


    *   用于解决日益增长的可扩展性需求的架构模板

    *   使用 Axon 2 CQRS 演示 HA 和可扩展性设计的代码示例

    *   读取可扩展性与写入可扩展性

    *   允许实体并发修改的技术

    *   使用 Axon 2 CQRS 演示实体并发修改的代码示例

