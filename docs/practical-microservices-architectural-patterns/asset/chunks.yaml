    ```bash

    netstat -nl|grep 61616

    ```


    ### View ActiveMQ Management Console


    You can now connect to the above started ActiveMQ Server using your favorite web
    browser: `http://127.0.0.1:8161/admin/`


    You can log into the management console using the following default credentials:


    ```

    Username: admin

    Password: admin

    ```


    See Figure [F-1](#477630_1_En_25_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_25_Chapter/477630_1_En_25_Fig1_HTML.jpg](images/477630_1_En_25_Chapter/477630_1_En_25_Fig1_HTML.jpg)


    **Figure F-1** ActiveMQ management console


    ### Configure ActiveMQ


    ActiveMQ installation contains a file named `activemq.xml` that can be used to
    configure ActiveMQ server. This is typically found at `D:\Applns\apache\ActiveMQ\apache-activemq-5.13.3\conf`.


    In ActiveMQ, it is not required to explicitly set up/configure the queues you
    are going to use in your application. When you try to publish or subscribe from
    any queue or topic, the respective queue or topic will be silently created on
    the fly. However, if for any reason you want to pre-specify queues and topics,
    you can do so in the configuration file. For example, do this when you want to
    put destinations into JNDI so that they can be pulled out by your application
    without needing to know the real, physical queue/topic name. Listing [F-1](#477630_1_En_25_Chapter.xhtml#PC3)
    provides a sample configuration of a queue and Figure [F-2](#477630_1_En_25_Chapter.xhtml#Fig2)
