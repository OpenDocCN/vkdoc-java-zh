    # 同步对弈游戏


    回到图 6-16。让我们在资源共享和资源利用的背景下进一步讨论。


    你可能已经注意到，单个服务器套接字实例正在监听客户端连接。正是这个单一的服务器套接字负责处理所有传入的客户端连接。这是当今许多 Web 服务器的典型特征。一个典型的
    Web 服务器，生成相对简短的内容（如包含文本或图像的网页），其响应大小约为 100KB。尽管生成或检索此页面只需不到一秒钟的时间，但将其传输到带宽仅为 80
    kbps（@ 10 KB/s）的慢速客户端可能需要长达 10 秒的时间。向慢速客户端发送内容的问题，在一定程度上可以通过增大操作系统内核套接字缓冲区的大小来改善；然而，这并不是问题的通用解决方案。它可能会产生不良的副作用，需要巨大的资源，并且在达到某个最佳点后，资源将无法线性扩展。简而言之，这个单一的服务器套接字不能一直等待客户端连接上下文中发生的所有处理（如
    I/O 操作）完成。如果它一直等待直到完成，那么它将需要很长时间才能接受下一个客户端连接。在生产级 Web 服务器中，会有数十、数百甚至更多的并发客户端连接访问
    Web 服务器，因此服务器套接字必须更加智能，以便在合理的时间范围内做出响应。


    图 6-16 中的架构利用线程来处理上述场景。线程是一组自包含的指令，操作系统可以调度这些指令在 CPU 核心上执行。应用程序并行运行多个线程有两个原因：


    *   它们可以同时利用更多的计算核心。

    *   它们使得并行执行操作变得容易（在此示例中，即执行在客户端连接上下文中编写的代码）。


    然而，线程也会消耗系统资源。每个线程都使用内存和其他操作系统资源，并且需要通过称为上下文切换的过程在核心上换入换出。尽管现代服务器进程可以处理数百个活动线程，但一旦内存耗尽，或者高
    I/O 操作迫使操作系统级别发生大量上下文切换，性能就会开始严重下降。因此，创建每个线程都必须谨慎。即使创建了线程，一种优化方法是重用线程。线程池可以实现这一点。此外，巧妙的设计还可以允许这些线程被重用以执行各种任务。在此示例中，来自同一线程池的线程被用于执行网络读取任务和网络写入任务。因此，总的来说，你的网络服务器通过使用线程池实现了智能实现，即使不是最智能^(⁹)的方式。有一个类比叫做“同步对弈或同步展示”。这指的是一种棋盘游戏展示（通常是国际象棋或围棋），其中一名玩家（通常是高段位玩家，如特级大师或段位棋手）同时与多名其他玩家进行多局游戏。这里实现的网络服务器类似于一位特级大师，他可以或多或少地并发接受连接，并将相关的计算分配给线程池中的线程，同样也是或多或少地并发执行。


    # 消息关联与微服务


    在微服务架构中，企业应用程序的不同部分被划分为多个微服务，但它们仍然需要相互通信。为了获得微服务的真正好处，微服务间的调用必须通过消息传递基础设施进行。这意味着采用微服务架构的企业应用程序的生产生态系统将由许多微服务以及这些微服务的许多实例组成，它们通过一个或多个消息传递基础设施相互连接。当你在这些实例之间采用异步通信风格时，主要难题是如何有效解决它们之间的消息路由问题。本章前面的部分让你对连接微服务（包括消息关联）所涉及的内部复杂性有了一个概览。如果开发人员必须自己完成所有这些连接工作，代码将会变得过于臃肿。你需要一种更好的方法来处理这个问题。我将在第
    12 章介绍 Axon 框架（它将为你隐式地完成这项工作）时，介绍处理此问题的方法。


    # 总结


    消息传递带来了分离处理的能力，帮助企业应用程序应对许多现实场景，包括停机时间和故障。在本章中，你了解了一些强大的消息传递应用，包括集群和高可用性。你还阅读了一些代码示例，这些示例展示了如果你手动编写横切关注点（如消息关联等）所涉及的复杂性。通过结合本章讨论的多种技术，你将能够成倍地提高微服务基础设施的可靠性。你将在后续章节中看到其中一些消息传递技术应用于不同的上下文，因为消息传递是开发者工具集中的一个核心杠杆。


    # 脚注


    7. Spring Boot


    在上一章中，你了解了消息传递。你使用 Spring 配置了消息发送者和监听器，并在 Spring 中显式地连接了 Bean 和所需的基础设施。到目前为止，一切顺利。那么，如何能让各方面变得更简单呢？你将在本章中了解
    Spring Boot，它采用了一种对 Spring 平台和许多第三方 Java 库的“约定优于配置”的观点，从而可以轻松、直接地创建独立的、生产级的、基于
    Spring 的应用程序，并且可以“直接运行”。由于 Boot 遵循了开发人员在使用 Spring 和其他第三方库时一直利用的许多约定和使用模式，因此大多数
    Spring Boot 应用程序只需要很少的 Spring 配置。你将使用 Spring Boot 来开发与本章讨论相关的几个示例。再次强调，目的不是详细涵盖
    Spring Boot；这超出了本章的范围。熟悉 Java 或 Spring 的读者访问 Spring Boot 主页应该可以毫无困难地入门。我将花时间讨论讨论所必需的最基本工具，以免偏离本书的意图，即解释实用的微服务。然而，当你开始查看后续章节中的代码示例时，你应该熟悉基本的构建块代码结构。


    你将在本章中学习以下内容：


    *   如何使用 Spring Initializer 创建 Boot 项目模板

    *   如何使用 cURL 访问一个针对 MongoDB 执行 CRUD 操作的 Boot 示例

    *   HATEOAS 和 HAL 简介，以及如何使用`RestTemplate`访问数据

    *   如何开发一个端到端的 Boot 示例，用于对 REST 执行 CRUD 操作

    '
- fmt: '# Performing Data Operations Using Spring Boot and MongoDB


    Polyglot persistence is a key aspect in the microservices architecture. While
    you still need ACID-compliant data stores with local and/or distributed transaction
    capabilities, careful analysis will reveal that majority of the data storage and
    retrieval operations don’t need these rigid capabilities, which always come at
    a price. Today, many NoSQL databases are designed to operate over large clusters
    and can tackle very large volumes of data; they can also efficiently respond to
    read requests with traffic increasing exponentially, still performing more or
    less linearly. So, it is natural within a single application to address data store
    requirements addressing both kinds (SQL and NoSQL), and this is where polyglot
    persistence comes into play. In a microservice context, you may use multiple data
    storage technologies, chosen based upon the way data is used by individual microservices
    or components of a single large enterprise application. MongoDB is a best choice
    in scenarios when you need to store data in document format, so you’ll look at
    a MongoDB sample over the rest of the chapters in this book.


    You will implement a “Hello World” kind of Spring Boot application in this section.
    There is more than one way to start developing a Spring Boot application, and
    the main ways are:


    * Using the Spring Boot command line interface (CLI) as a command-line tool^([^(10)](#fn10))

    * Using IDEs such as Eclipse and Spring Tool Suite (STS) to provide Spring Boot
    support^([^(11)](#fn11))

    * Using the Spring Initializer project


    You will follow the last method in this section.


    ## Creating a Spring Boot Project Template Using the Spring Initializer


    You will use the Spring Initializer to create a Spring Boot project here. The
    Spring Initializer is a drop-in replacement for the Eclipse-based Spring Tool
    Set (STS) project wizard and provides an online web UI to configure and generate
    different flavors of a Spring Boot project. Using the Spring Initializer, you
    can generate a project through the online interface, which can then be imported
    into any IDE.


    The aim is to quickly develop an application that will help you to achieve the
    following:


    * Get introduced to Spring Boot

    * Get introduced to MongoDB

    * Get introduced to basic CRUD operations using Spring Data


    The Spring Initializer project is available at [`http://start.spring.io`](http://start.spring.io).


    You need to fill in the details, such as whether it is a Maven project and whether
    you need to use Java for the Boot project and the Spring Boot version. Other details
    include group and artifact ID, as shown in Figure [7-1](#477630_1_En_7_Chapter.xhtml#Fig1).
    Next, click Switch to go to the full version link under the Generate Project button.
    Here you can select MongoDB and Rest Repositories as the dependencies. You also
    need to make sure that the Java version is 8 and the package type is selected
    as JAR. Once the dependencies are selected, you may hit the Generate Project button.
    This will generate a Maven project. This project can be downloaded as a ZIP file
    into the default download directory of your browser.


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig1_HTML.jpg](images/477630_1_En_7_Chapter/477630_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1** Generating a Spring Boot template using the Spring Boot Initializer


    Spring Boot provides a set of Starter Poms or gradle build files that you can
    use to add required dependencies. Depending on the libraries in its classpath,
    Spring Boot will automatically configure the required classes by auto configuration.
    For example, to interact with a database, if there is a Spring Data library in
    the class path, it automatically sets up a connection to DB along with the required
    Data Source classes.


    You can now unzip the file and save it to a directory of your choice in your file
    system. Again, a file path without any white spaces will save you from many unforeseen
    errors while you develop the application. You can now use your favorite IDE to
    continue application development.


    1. If you use Eclipse, you may now go to the File menu and click Import.

    2. Navigate to Maven ➤ Existing Maven Projects and click Next.

    3. Click the Browse option next to Root Directory and select the folder you unzipped
    earlier.

    4. Click the Finish button. This will load the generated Maven project into Eclipse
    Project Explorer.


    Assuming you are familiar with Eclipse, I will not spend time or space explaining
    aspects of Eclipse here. Instead, let’s look at the application development in
    detail.


    First, look at the `pom.xml` that was autogenerated when you created the Spring
    Boot project. The main three elements are explained here.


    ### Spring Boot Starter Parent


    Typically your Maven `pom.xml` file will inherit from the `spring-boot-starter-parent`
    project and declare dependencies to one or more “starters.” In Figure [7-1](#477630_1_En_7_Chapter.xhtml#Fig1)
    you can see two such starters: MongoDB and Rest Repositories.


    Listing [7-1](#477630_1_En_7_Chapter.xhtml#PC1) mentions your POM inheritance
    hierarchy, which is a Bill of Materials (BOM) to manage the different libraries
    and the versions required for a project.


    ```

    org.springframework.boot

    spring-boot-starter-parent

    1.5.4.RELEASE

    ```


    **Listing 7-1** Spring Boot Starter Parent (ch07\ch07-01\pom.xml)


    ### Spring Boot Dependencies


    Next, if you can review the dependency section, you can see that the POM file
    mentions only three dependencies, as shown in Listing [7-2](#477630_1_En_7_Chapter.xhtml#PC2).


    ```

    org.springframework.boot

    spring-boot-starter-data-mongodb


    org.springframework.boot

    spring-boot-starter-data-rest


    org.springframework.boot

    spring-boot-starter-test

    test

    ```


    **Listing 7-2** Spring Boot Dependencies


    These dependencies are explained next:


    * `spring-boot-starter-data-mongodb`: The Spring Data MongoDB project helps you
    to integrate with the MongoDB document database. The main functional areas of
    Spring Data MongoDB are a POJO-centric model for interacting with a MongoDB Collection
    to do CRUD operations and easily write a repository-style data access layer.

    * `spring-boot-starter-data-rest`: The Spring Data REST builds on top of Spring’s
    MVC. Spring Data REST creates a collection of Spring MVC controllers and other
    beans required to provide a RESTful front end. These components then transitively
    link up to the Spring Data JPA backend. Using Spring Boot this is all autoconfigured
    for you.

    * `spring-boot-starter-test`: This starter imports Spring Boot test modules, JUnit,
    AssertJ, Hamcrest, and a number of other useful libraries that will help you test
    the application.


    ### Spring Boot Maven Plugin


    Next, let’s look at the Spring Boot Maven plugin. See Listing [7-3](#477630_1_En_7_Chapter.xhtml#PC3).


    ```

    org.springframework.boot

    spring-boot-maven-plugin

    ```


    **Listing 7-3** Spring Boot Maven Plugin


    The Spring Boot Maven plugin in Listing [7-3](#477630_1_En_7_Chapter.xhtml#PC3)
    helps to create the single executable JAR. The single executable JAR is a self-contained
    executable JAR file that you can run in production. In the “Microservices are
    Self-Contained” section in Chapter [3](#477630_1_En_3_Chapter.xhtml) you saw the
    requirement for self-contained and self-sufficient executable bundles. Java does
    not provide any standard way to load JAR files contained within a JAR file. Here
    you can use uber JARS. An uber JAR simply packages all classes from all JARs into
    a single archive. But this can sometimes run into problems when different versions
    of the same libraries are required or if the file names are same. So Spring Boot
    takes a different approach by nesting JARs directly, and the Spring Boot Maven
    plugin does all the plumbing required.'
