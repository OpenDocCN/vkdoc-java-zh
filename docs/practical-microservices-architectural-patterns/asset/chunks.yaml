  trans: "\nSEC 并非一个集中控制整个执行过程的特殊流程。  \n它作为一个集中式运行时运行，但该运行时是“哑”的，执行逻辑被保存在 SEC 外部的分布式\
    \ Saga 日志中。因此，当某个 SEC 崩溃时，可以启动另一个 SEC 实例，通过查看 Saga 日志来继续执行。这要求确保 SEC 始终保持运行状态。一旦\
    \ SEC 发生故障，应基于相同的分布式 Saga 日志启动一个新的 SEC 进程。该分布式 Saga 日志本身也是分布式且经过复制的，因此不存在单点数据丢失的风险。\n\
    \n在了解了分布式 Saga 所需的各个组件之后，现在来看一下分布式 Saga 是如何执行的。请参见图 15-3。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig3_HTML.jpg](img/477630_1_En_15_Fig3_HTML.jpg)\n\
    \n图 15-3  \n作为有向无环图的分布式 Saga\n\n分布式 Saga 是一个有向无环图（DAG），SEC 的任务就是执行这个 DAG。有向无环图是一个没有有向环的有限有向图^(³⁹)。也就是说，它由有限数量的顶点和边（也称为弧）组成，每条边从一个顶点指向另一个顶点，并且不存在从某个顶点\
    \ (v) 出发，沿着一致方向的边序列，最终又回到 v 的情况。等价地，DAG 是一个具有拓扑排序的有向图，即顶点的一个序列，使得每条边都从序列中较早的顶点指向较晚的顶点。\n\
    \n参考图 15-2，一旦旅行服务收到预订请求，SEC 就会通过向 Saga 日志写入一条包含“开始 Saga”指令以及处理该 Saga 所需的其他元数据来启动一个\
    \ Saga。一旦该记录被持久化提交到日志中，SEC 就可以继续执行下一条指令。然后，根据图 15-3 中的 Saga DAG，SEC 可以选择执行航班、酒店或出租车预订事务中的任意一个（因为这三个事务可以并行处理）。假设首先执行航班事务。在这种情况下，SEC\
    \ 会向 Saga 日志记录一条“开始航班事务”的消息。然后，SEC 执行预订航班操作。一旦 SEC 收到航班服务的响应，它就会提交“结束航班事务”消息以及来自航班服务的响应（在\
    \ Saga 后续阶段可能需要用到）。重复执行相同的步骤，直到成功完成对航班、酒店和出租车预订服务这三个操作。最后，由于所有操作都已成功完成，SEC 会将“结束\
    \ Saga”消息提交到 Saga 日志中。这是一个成功的 Saga 执行过程，如图 15-4 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig4_HTML.jpg](img/477630_1_En_15_Fig4_HTML.jpg)\n\
    \n图 15-4  \n成功分布式 Saga 的执行步骤\n\n图 15-5 展示了一个 Saga 失败的情况。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig5_HTML.jpg](img/477630_1_En_15_Fig5_HTML.jpg)\n\
    \n图 15-5  \n失败分布式 Saga 的执行步骤\n\n这与前面讨论的步骤相同，但在本例中，出租车预订过程失败了（例如，指定日期没有可用出租车）。由于检测到某个子事务（即出租车预订）失败，需要回滚到目前为止已执行的所有其他子事务。因此，在\
    \ Saga 日志中可以找到“开始出租车预订”日志（Start T3），但现在出租车预订已经失败。此时，必须遍历到目前为止已执行的 Saga 的逆 DAG，并将该\
    \ Saga 标记为失败。\n\n现在来看一下分布式 Saga 的一些有趣方面。前面提到，SEC 可以选择执行航班、酒店或出租车预订事务中的任意一个（因为这三个事务可以并行处理）。这意味着\
    \ Saga 事务可以并行执行，并且 Saga 日志可能是交错记录的，如图 15-6 所示。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig6_HTML.jpg](img/477630_1_En_15_Fig6_HTML.jpg)\n\
    \n图 15-6  \n并行执行事务的分布式 Saga\n\n这意味着 SEC 不应依赖 Saga 日志中单个日志条目的顺序。应重新审视第 14 章中“测试乱序接收消息场景”一节的讨论，其中介绍了处理此类场景的技术。\n\
    \n接下来，对于分布式 Saga 中的每个事务，消息传递语义应如下：\n\n*   事务：最多一次\n*   补偿事务：至少一次\n\n现在应重新阅读第 14\
    \ 章中“构建并测试重复发送消息场景”和“测试重复消费消息场景”两节。通过适当结合这两节中描述的技术，可以构思如何将“最多一次”和“至少一次”语义整合到整体解决方案中。使用相同的技术，还应处理表\
    \ 15-1 中列出的分布式 Saga 事务所需的额外特性。\n\n表 15-1  \n分布式 Saga 事务特性\n\n特性 | 事务 (T) | 补偿事务\
    \ (C)\n--- | --- | ---\n幂等性 | 是 | 是\n可中止 | 是 | `×`\n可交换 | 不适用 | 是\n\n关于表 15-1\
    \ 中描述的补偿事务所需的可交换特性，需要稍作讨论。请参考图 15-7。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig7_HTML.jpg](img/477630_1_En_15_Fig7_HTML.jpg)\n\
    \n图 15-7  \n分布式 Saga 中的消息延迟\n\n这里出现了两个 Start T1 事务。这是因为如果 SEC 在定义的超时时间内未收到 Start\
    \ T1 和 End T1，它可以重放 Start T1。这个延迟到达的 Start T1 可能会在补偿事务（Start C1, End C1）成功执行之后才到达待执行的服务，在这种情况下，不应尝试执行这个后来才到达的\
    \ Start T1。因此，在语义上：\n\n```\nT1 -> C1\n```\n\n或\n\n```\nC1 -> T1\n```\n\n两者应具有相同的效果。\n\
    还有更多类似的复杂性，但到现在为止应该已经掌握了要点。理想情况下，一个框架应该为你抽象掉所有这些复杂性。尽管在撰写本文时，我还没有找到一个完整的框架来执行我们之前的讨论，但我希望这样的框架最终会出现，不过我不再进一步讨论，因为此类讨论不在本书的范围内。\n\
    \n在结束这个话题之前，让我们在 Axon CQRS 和基于事件的微服务背景下，看一下图 15-2 的一个可能的设计替代方案，如图 15-8 所示。\n\n\
    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig8_HTML.jpg](img/477630_1_En_15_Fig8_HTML.jpg)\n\
    \n图 15-8  \n事件驱动 CQRS 上下文中的分布式 Saga 示意图\n\n请注意，图 15-8 所示的设计仅用于说明目的，在下一节中将会看到，Axon\
    \ CQRS 有一个类似的 Saga 实现，但不一定与所示设计完全一致。\n\n使用 Axon 的 Saga 示例代码\n"
