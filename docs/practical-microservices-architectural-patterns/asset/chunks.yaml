    times out the next time, it will attempt to process the same quote again

    since the quote status is still “New.” This will cause duplicate

    transactions in the user balance. The “Test the Duplicate Message Being

    Sent Scenario” and “Test the Duplicate Message Consumption Scenario”

    sections in Chapter [13](#477630_1_En_13_Chapter.xhtml) simulated error scenarios
    like

    this. In the first case, the quote status change from “New” to

    “Confirmed” was not successful in the first pass, so duplicate messages

    were sent to the downstream settlement microservice. In the second case,

    the duplicate message consumption scenario was simulated, which caused

    duplicate transactions in the user balance.

    The effect of duplicate transactions can be nullified provided the

    transaction is idempotent. Idempotent operations are those that can be

    repeatedly applied without any side effects. Additions and deductions

    are not idempotent, as is

    evident from the nature of the actions itself. Update operations that

    simply set a value in a single-threaded

    environment are idempotent; however, in a multi-threaded

    environment where you have concurrency, even such update

    operations are not idempotent. This is because the context that was

    assumed to be the precondition for such update operations could have

    been changed by another concurrent thread. Or the application of such

    updates can happen out of order from what is desired. You need to have

    mechanisms to handle these cases, and you will look into them in the

    enhanced example section later in this

    chapter. In general, idempotent consumer implementations can be tricky,

    as illustrated in the reference.^([^(34)](#fn34))


