    HTTP 的弊端与丑陋之处

    如前所述，第 8 章中的所有示例均使用 HTTP 协议进行微服务间的相互通信。如果再次审视这些交互，你会发现其中大部分是同步 HTTP 调用。仔细观察这些通信过程会发现，从消费端微服务到提供端微服务服务器的传入请求会占用一个
    Servlet 连接，并在向消费端微服务发送响应之前，对远程服务执行阻塞调用。这种方式虽然可行，但如果同时存在大量此类并发客户端，则无法有效扩展。同步 HTTP
    最适合用户使用客户端应用程序获取即时反馈或响应的场景；然而，在服务器端处理时，情况并非如此。


    异步 HTTP 处理的 API

    像 Apache Tomcat 这类应用服务器中的典型容器，通常为每个客户端请求使用一个服务器线程。在负载增加的情况下，这要求容器拥有大量线程来处理所有客户端请求。这限制了可扩展性，可能因内存耗尽或容器线程池耗尽而引发问题。从
    Servlet 3.0 规范开始，Java EE 为 Servlet 和过滤器增加了异步处理支持。当 Servlet 或过滤器在处理请求时遇到潜在的阻塞操作，可以将该操作分配给异步执行上下文，并立即将与请求关联的线程返回给容器，而无需等待生成响应。阻塞操作稍后可以在某个不同线程的异步执行上下文中完成，该线程可以生成响应或将请求分派给另一个
    Servlet。`javax.servlet.AsyncContext` 类就是提供在服务方法内执行异步处理所需功能的 API。服务方法中 `HttpServletRequest`
    对象的 `startAsync()` 方法会将请求置于异步模式，并确保即使在退出服务方法后也不会提交响应。你必须在阻塞操作完成后的异步上下文中生成响应，或者将请求分派给另一个
    Servlet。


    这种编程模型很直接。让我们先看看传统 `Controller` 类编程模型的伪代码，来理解其中的区别。请参见代码清单 10-1。


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public List getAllProducts() {

    //return "List of All Products";

    }

    }

    代码清单 10-1

    同步控制器的伪代码

    ```


    当你使用 Spring 时，控制器方法可以返回一个 `java.util.concurrent.Callable` 来异步完成处理。然后 Spring MVC
    会借助 TaskExecutor 在单独的线程中调用该 `Callable`。TaskExecutor 是 Spring 对异步执行和任务调度的抽象。重写后的伪代码如代码清单
    10-2 所示。


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public Callable> getAllProducts() {

    return new Callable>() {

    public Object call() throws Exception {

    // ...

    // return "List of All Products";

    }

    };

    }

    }

    代码清单 10-2

    使用 Callable 的异步控制器伪代码

    ```


    Spring 3.2 引入了 `org.springframework.web.context.request.async.DeferredResult`，它同样可以由
    `Controller` 类返回。`DeferredResult` 为使用 `Callable` 进行异步请求处理提供了一种替代方案。`Callable`
    是代表应用程序并发执行的，而使用 `DeferredResult`，应用程序可以从其选择的线程中产生结果。在这里，处理可以在 Spring MVC 未知的线程中进行，类似于需要从消息通道等获取响应的情况。因此，当你使用
    `DeferredResult` 时，即使离开了控制器处理方法，请求处理也尚未完成。相反，Spring MVC（利用 Servlet 3.0 的能力）会保持响应，并保持空闲的
    HTTP 连接。即使 HTTP 工作线程不再使用，HTTP 连接仍然保持打开状态。在稍后的某个时间点，其他某个线程会通过为 `DeferredResult`
    赋值来解析它。Spring MVC 会立即捕获此事件并向客户端发送响应，从而完成请求处理。


    使用 `DeferredResult` 的异步场景伪代码如代码清单 10-3 所示。


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public DeferredResult> getAllProducts() {

    DeferredResult> deferredResult =

    new DeferredResult> ();

    // 将 deferredResult 添加到内部内存持有者中

    // 比如一个队列或映射...

    return deferredResult;

    }

    // 在某个其他线程中...

    deferredResult.setResult(data);

    // 从内部内存持有者中移除 deferredResult

    }

    代码清单 10-3

    使用 DeferredResult 的异步控制器伪代码

    ```


    Java 8 引入了 `java.util.concurrent.CompletableFuture`，它可以与 Spring 一起使用来创建异步端点，这些端点同样可以释放请求线程以执行其他任务。在这种情况下，`DeferredResult.setResult`
    可以简单地替换为 `CompletableFuture.complete`。`CompletableFuture` 是一个 `java.util.concurrent.Future`。`Future`
    表示异步计算的结果，而 `CompletableFuture` 是一个可以显式完成（设置其值和状态）的 `Future`，并且可以用作 `CompletionStage`，支持在其完成时触发的依赖函数和操作。`CompletableFuture`
    使得处理复杂的异步编程更加容易。它甚至允许你组合和级联异步调用，并且还提供了静态实用方法 `runAsync` 和 `supplyAsync` 来抽象掉手动创建线程的过程。请参见代码清单
    10-4。


    ```

    @RestController

    public class ProductRestController{

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public CompletableFuture> getAllProducts() {

    Future> future =

    new CompletableFuture>();

    return CompletableFuture.supplyAsync(() -> "in the background");

    }

    }

    代码清单 10-4

    使用 CompletableFuture 的异步控制器伪代码

    ```


    设计一个演示微服务间异步 HTTP 的场景

    你将使用与之前示例相同的组件，但进行精简。因此，这里的示例将包含三个主要组件：一个基于 HTML 的客户端应用程序和两个微服务，如图 10-2 所示。我已移除了
    HATEOAS 和所有数据仓库的复杂性，以便你可以专注于异步 HTTP 本身。一旦你理解了设计及其实现所用到的主要组件，就应该能够将类似的模式应用于其他复杂的业务场景。

