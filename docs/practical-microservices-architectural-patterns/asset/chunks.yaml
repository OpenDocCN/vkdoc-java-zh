    *   两阶段提交事务与本地事务相比，与资源的往返通信次数大约多出两倍，显得过于“啰嗦”。

    *   资源锁的持有时间稍长，这在某些情况下会阻碍可扩展性。

    *   最后但同样重要的是，两阶段提交事务并不能解决所有问题。当出现问题时，例如数据库崩溃后需要恢复，你可能仍然需要人工干预。为了避免这种情况，通常更倾向于采用某种形式的热故障转移架构。


    你需要根据具体情况，在两阶段事务和本地事务之间做出明智的选择。对于你未来开发的许多微服务架构来说，情况都将如此。为了使场景更具体，假设图 14-7 中所示的**架构选项
    1**比选项 2 更可接受。如果是这样，那么在需要时，如何进一步避免报价结算微服务与 ActiveMQ 消息代理之间的两阶段事务，同时仍然保证数据的完整性？让我们在下一节打开这个潘多拉魔盒。


    消息队列、窥探与客户端确认

    假设你想采用图 14-7 中所示的**架构选项 1**，并且仍然希望避免报价结算微服务与 ActiveMQ 消息代理之间的两阶段提交事务。当你避免使用两阶段提交事务时，如果数据库操作和消息队列操作由分区资源支持，那么它们就无法原子性地执行。如果它们无法原子性地执行，你就不希望自动封装从队列中读取消息和确认读取消息的操作；相反，应该由客户端程序或客户端代码来控制。JMS
    规范支持两种消息传递类型：持久性和非持久性。如果你希望消息在传递给代理后始终可供消息消费者使用，即使该消费者在消息发送时未运行，也应使用持久性消息。当消息被消费者消费并确认后，它通常会从代理的消息存储中删除。


    `Javax.jms.Session`可以被指定为事务性的。当事务性时，会话支持单一事务序列。每个事务将一组消息发送和一组消息接收组合成一个原子工作单元。实际上，事务将会话的输入消息流和输出消息流组织成一系列原子单元。当事务提交时，其原子输入单元被确认，其关联的原子输出单元被发送。如果执行了事务回滚，则事务的已发送消息将被销毁，并且会话的输入将自动恢复。


    注意

    与 XA 事务不同，JMS 事务仅关注单个连接的 JMS 消息。回滚或提交不会扩展到单个连接之外。


    在本章以及第 13 章的示例中，你使用了以下配置：


    或者，可以将`SESSION_TRANSACTED`值作为参数传递给`Connection`对象上的`createSession(int sessionMode)`方法，以指定会话应使用本地事务。使用时，它会通过`Session.commit()`来汇总确认。


    ```

    Session session = connection.createSession(true, Session.SESSION_TRANSACTED);

    ```


    通过指定`false`和`AUTO_ACKNOWLEDGE`，你可以创建一个非事务性会话，并且会话会自动确认消息。当消息成功从`receive()`方法或`onMessage()`方法返回时，它会自动被确认。如果在执行`receive()`方法或`onMessage()`方法时发生故障，消息会自动重新投递。JMS
    提供者管理消息重新投递，并保证一次性投递语义。但是，如果应用程序在`receive()`返回之后、消息被处理之前崩溃，消息仍然可能丢失。


    ```

    Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

    ```


    如果你创建接收者的会话，并将`false`指定为`createSession()`的第一个参数，将`Session.CLIENT_ACKNOWLEDGE`指定为其第二个参数，则你将在客户端确认模式下创建会话。这会创建一个非事务性会话，并且需要显式调用`Message`类的`acknowledge()`方法来确认消息。通过在已消费的消息上调用`acknowledge()`，客户端会确认该消息投递到的会话所消费的所有消息。客户端可以在消费每条消息时单独确认，也可以选择按应用程序定义的组来确认消息（通过调用组中最后接收到的消息的`acknowledge()`方法，从而确认该会话消费的所有消息）。已接收但未确认的消息可能会被重新投递，这是一把双刃剑：既是福音也是诅咒。说它是福音，是因为如果未确认，你可以确保消息会在稍后的某个时间点被重新投递。同时，它也是诅咒，因为如果你的应用程序设计没有处理重复消息的机制，就会导致重复处理，从而产生不利影响。


    让我们进一步探讨这个方面。参见清单 14-16。


    ```

    开始 两阶段事务

    开始 ActiveMQ 事务-01

    从 ActiveMQ 读取消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    结束 ActiveMQ 事务-01

    结束 两阶段事务

    清单 14-16

    两阶段事务内的 ActiveMQ 和 Derby

    ```


    你在本章前面的示例下游处理中看到的从 ActiveMQ 队列消费消息以及在 Derby 数据库中的数据库操作，可以像清单 14-16 那样用伪代码表示。如果你移除两阶段事务，同样的操作可以重写为清单
    14-17。


    ```

    从 ActiveMQ 读取消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    确认从 ActiveMQ 读取的消息

    清单 14-17

    无两阶段事务的 ActiveMQ 和 Derby

    ```


    这等同于清单 14-18。


    ```

    从 ActiveMQ 窥探消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    从 ActiveMQ 移除消息

    清单 14-18

    使用本地事务的 ActiveMQ 和 Derby

    ```

    '
- fmt: '# 排版后的内容


    The pseudocode in Listing [14-18](#477630_1_En_14_Chapter.xhtml#PC54) depends
    upon the capability of peeking at a message in the queue without removing it and
    removing the messages from the queue once successfully processed. This can be
    done with two or more independent transactions if necessary, as shown in the pseudocode:
    one on the message queue, another one on the user database to record the quote
    message, and a third one to reconcile the user balances and change the quote status.
    User balance reconciliation and quote status change are committed atomically;
    however, no two-phase transactions are required since both operations happen in
    the same local resource. Queue operations are not committed unless database operations
    successfully commit. A partial failure during the database operations will keep
    the queue operation uncommitted so that the message is redelivered sooner or later
    and processing starts over again. The algorithm now supports partial failures
    and still provides transactional guarantees. This algorithm or method is one attempt
    to implement eventual consistency between distributed microservices without the
    use of distributed and two-phase commit transactions. The example code provided
    here can be enhanced to implement multiple variants of the above methodology;
    this is left as an exercise for you to get your hands wet with the code. Note
    that this requires an implementation of the “idempotent consumer pattern,” which
    is hard to do correctly.^([^(37)](#fn37)) Additional testing is required, beyond
    the basic exploratory test cases in this chapter, so that every possible failure
    mode is taken into account.


    ## Summary


    Just like many of my colleagues, I too loved transactions. I have been using declarative
    transaction management since 1999 where we were thrilled to be among the first
    few to download the *Sun’s Reference Implementation of J2EE Server with EJB*^([^(38)](#fn38))
    *(Enterprise Java Beans) Containers* in the process of implementing an expert
    system for optimizing operations of an airline passenger reservation system for
    a European airline. It’s been 20 years since then, and we still love transactions,
    both local and distributed. However, the point is that the choice between distributed
    and local transactions has to be done on a case-by-case basis based on the context,
    functionality, and criticality of the microservice involved. Designing systems
    leveraging distributed transaction managers in cases where you don’t mandatorily
    need them will be costly since it may increase the operations cost as well as
    slightly affect the performance. You saw a few techniques in this chapter that
    you can use to design fault-tolerant microservices that must be eventually consistent,
    although I did not address all possible anomalies. In the next chapter, you will
    extend this learning to look at few other scenarios including but not limited
    to long-running transactions.


    ## Footnotes


    ### 15. Transactions Optimized for Microservices


    While Chapter [13](#477630_1_En_13_Chapter.xhtml) covered distributed transactions
    with working code, you relooked at those examples with an enhanced design in Chapter
    [14](#477630_1_En_14_Chapter.xhtml) with an aim to understand the nitty-gritty
    details and concerns while architecting solutions for BASE transactional support.
    So far, so good, but the question is whether there is a way to abstract the details
    you saw in those two chapters and still attain the required level of data consistency
    in a microservices architecture. You will look at this in detail in this chapter.
    The examples in this chapter are not a continuation of the examples you covered
    in Chapters [13](#477630_1_En_13_Chapter.xhtml) and [14](#477630_1_En_14_Chapter.xhtml),
    so you can skip those two chapters if you are in a hurry to understand the examples
    in this chapter. However, you are going to leverage Axon framework again in this
    chapter, so you are strongly advised to go through Chapter [12](#477630_1_En_12_Chapter.xhtml)
    first to get an introduction to Axon so that you know the programming paradigm
    during this discussion.


    You will be looking into the following in this chapter:


    * An introduction to saga

    * Distributed saga and microservices

    * A complete saga example using Axon 2


    ### Saga for Microservices Transactions


    The section titled “Transaction Models” in Chapter [13](#477630_1_En_13_Chapter.xhtml)
    introduced the concept of saga, and in this section you will look at saga in detail.'
