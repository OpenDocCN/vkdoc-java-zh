    \ every microservice involves socket listeners listening to\nincoming traffic.\
    \ So, compared to a traditional monolith, microservices\narchitecture involves\
    \ many more socket listeners, associated threads to\nprocess incoming traffic,\
    \ and so on. A look into the details of a few of\nthese handpicked concerns and\
    \ analyzing the options to address them will\ngive you a fair enough idea of the\
    \ whole landscape.\n\nAsynchronous HTTP\nYou briefly looked at distributed messaging\
    \ in Chapter [6](#477630_1_En_6_Chapter.xhtml), where you also appreciated the\n\
    differences between the synchronous and asynchronous style of\ncommunications\
    \ between microservices. You saw that messaging is a\nfirst-class technology by\
    \ which microservices can communicate asynchronously, and you\nsaw via examples\
    \ how you can correlate many asynchronous message\ntransmissions so as to weave\
    \ them together as pieces of a single,\nend-to-end request/response cycle. However,\
    \ all of the samples in\nChapter [8](#477630_1_En_8_Chapter.xhtml) used the HTTP\
    \ protocol for\nintercommunications between microservices. You will look at the\
    \ nature\nof these communications more closely in this section."
