    客户端设备（在您的场景中即浏览器）将用于渲染 `product.html`（标签 1）。当 `product.html` 加载到浏览器后，它会向 Product
    Web 微服务发起请求。在本示例中，为简化起见，您不会将 Product Web 微服务绑定到 API 网关，而仅将 Product Server 微服务绑定到
    API 网关。因此，客户端设备到 Product Web 微服务的请求是直接访问，不经过 API 网关（标签 3）。现在，Product Web 微服务需要将请求委托给
    Product Server 微服务，为此，它将通过 API 网关路由请求（标签 4）。API 网关将执行注册表查找（标签 5），并将托管 Product
    Server 微服务的服务器详细信息返回给 Product Web 微服务中的 Ribbon 客户端。Product Web 微服务获取此信息后，将请求负载均衡到
    Product Server 微服务的任一实例（标签 6），因为您将托管两个 Product Server 微服务实例。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg](img/477630_1_En_8_Fig16_HTML.jpg)


    **图 8-16**

    使用 Zuul 的设计


    **使用 Zuul 的代码**


    本节的所有代码示例均位于 `ch08\ch08-06` 文件夹中。请访问 `pom.xml` 查看 Zuul 依赖项的显式声明。参见代码清单 8-24。


    ```

    org.springframework.cloud

    spring-cloud-starter-zuul


    org.springframework.cloud

    spring-cloud-starter-eureka


    代码清单 8-24

    Zuul 依赖项 (ch08\ch08-06\ProductApiZuul\pom.xml)

    ```


    请注意，Zuul 本身就是一个微服务，因此它需要像其他普通微服务一样向注册表注册自己。因此，Zuul 也需要一个 Eureka 依赖项，如代码清单 8-25
    所示。


    接下来，您需要 Spring Cloud 的 `@EnableZuulProxy` 来启动一个 API 网关，其他微服务可以绑定到该网关。这是在常规的 Spring
    Boot 应用程序主类中完成的，只需添加一个注解即可启用 Zuul 网关。


    ```

    @EnableZuulProxy

    @EnableDiscoveryClient

    @SpringBootApplication

    public class ProductServerApiApplication {

    public static void main(String[] args) {

    SpringApplication.run(ProductServerApiApplication.class, args);

    }

    }

    代码清单 8-25

    启用 Zuul (ch08\ch08-06\ProductApiZuul\src\main\java\com\acme\ecom\infra\ProductServerApiApplication.java)

    ```


    现在，您需要在 API 网关处定义路由，这将在 `application.yml` 中完成。参见代码清单 8-26。


    ```

    spring:

    application:

    name: product-service-api

    server:

    port: 8082

    zuul:

    routes:

    product-api:

    path: /api/**

    service-id: product-service

    eureka:

    client:

    serviceUrl:

    defaultZone: http://localhost:8761/eureka/

    hystrix:

    command:

    default:

    execution:

    isolation:

    thread:

    timeoutInMilliseconds: 2000

    代码清单 8-26

    在 Zuul 网关中定义路由 (ch08\ch08-06\ProductApiZuul\src\main\resources\application.yml)

    ```


    现在，Zuul 将以名称 `product-service-api` 注册到 Eureka。此外，任何到达 Zuul 的、模式为 `/api/**` 的 URL
    都将被路由到 `product-service`。


    Product Server 微服务的代码与您在“使用 Eureka 的代码”部分中看到的代码类似，不同之处在于您移除了 MongoDB 依赖项，而是使用简单的内存表示来存储产品数据，以使示例更简单。然而，Product
    Web 微服务的代码需要解释，因为正是在这里，您查找 Zuul API 网关以将请求委托给 Product Server 微服务。参见代码清单 8-27。


    ```

    @RestController

    public class ProductRestController implements ProductService{

    @Autowired

    RestTemplate restTemplate;

    private static String PRODUCT_SERVICE_URL =

    "http://product-service-api/api/products";

    @Autowired

    public ProductRestController(RestTemplate restTemplate){

    this.restTemplate = restTemplate;

    }

    @RequestMapping(value = "/productsweb",

    method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    ResponseEntity> responseEntity =

    restTemplate.exchange(PRODUCT_SERVICE_URL, HttpMethod.GET,

    (HttpEntity) null, responseTypeRef);

    // 其他代码在此处...

    }

    }

    代码清单 8-27

    使用 API 网关调用其他微服务 (ch08\ch08-06\ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java)

    ```


    所有其他代码与您在“使用 Eureka 的代码”部分中看到的类似；但变化在于 URL。URL [ `http://product-service-api/api/products`
    ](https://www.product-service-api/api/products) 中的 `product-service-api` 部分指向
    Zuul API 网关的地址，因此调用将首先到达网关。在 API 网关中，您已配置任何到达 Zuul 的、模式为 `/api/**` 的 URL 都将被路由到
    `product-service`，因此上述完整 URL 将被转换为 Product Server 微服务中的 products 端点。


    **构建并测试 Zuul 示例**


    演示 Eureka 注册表所需的完整代码位于 `ch08-06` 文件夹中。此示例不需要 MongoDB。您可以按以下顺序构建、打包和运行不同的微服务。首先启动
    Eureka 注册表微服务：


    ```

    cd ch08\ch08-06\Eureka

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>make

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>mvn -Dmaven.test.skip=true clean package

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>run

    D:\binil\gold\pack03\ch08\ch08-06\Eureka>java -jar -Dserver.port=8761 -Dspring.application.name=eureka-registry
    -Deureka.client.registerWithEureka=false -Deureka.client.fetchRegistry=true -Deureka.client.server.waitTimeInMsWhenSyncEmpty=0
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -Deureka.server.enableSelfPreservation=false
    .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    接下来启动 Zuul API 网关：


    ```

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>make

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>run

    D:\binil\gold\pack03\ch08\ch08-06\ProductApiZuul>java -Dserver.port=8082 -Dspring.application.name=product-service-api
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar ./target/Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    由于注册表和 API 网关现已设置完毕，接下来您可以启动应用程序微服务：


    ```

    cd ch08\ch08-06\ProductServer

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>make

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>run1

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>java -Dserver.port=8080 -Dspring.application.name=product-service
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    cd ch08\ch08-06\ProductServer

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>run2

    D:\binil\gold\pack03\ch08\ch08-06\ProductServer>java -Dserver.port=8081 -Dspring.application.name=product-service
    -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    接下来，启动 Product Web 微服务：

