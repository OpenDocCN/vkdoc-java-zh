    **启用管理插件**


    Rabbitmq-management 插件公开了一个基于 HTTP 的 API，用于管理和监控 RabbitMQ 服务器。它还包含一个基于浏览器的 UI
    工具，可以执行基本的管理操作。您需要首先启用 RabbitMQ 发行版中包含的管理插件：


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin>D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-plugins
    enable rabbitmq_management

    ```


    启动 RabbitMQ（在下一节中说明）后，您可以在默认 URL [`http://server-name:15672/`](https://www.server-name:15672/)
    查看 Web UI。


