    The most important class of this example, where you do the setup of all

    Axon components is `EcomAppConfiguration`.

    See Listing [19-2](#477630_1_En_19_Chapter.xhtml#PC2).


    ```

    @Configuration

    public class EcomAppConfiguration {

    @PersistenceContext

    private EntityManager entityManager;

    @Bean

    @Qualifier("productRepository")

    public GenericJpaRepository productJpaRepository(

    EventBus eventBus) {

    SimpleEntityManagerProvider entityManagerProvider =

    new SimpleEntityManagerProvider(entityManager);

    GenericJpaRepository genericJpaRepository =

    new GenericJpaRepository(entityManagerProvider,

    Product.class, eventBus, ((String id) -> Integer.valueOf(id)));

    return genericJpaRepository;

    }

    @Bean

    @Qualifier("orderRepository")

    public GenericJpaRepository orderJpaRepository(EventBus eventBus) {

    SimpleEntityManagerProvider entityManagerProvider =

    new SimpleEntityManagerProvider(entityManager);

    GenericJpaRepository genericJpaRepository =

    new GenericJpaRepository(entityManagerProvider,

    Order.class, eventBus, ((String id) -> Integer.valueOf(id)));

    return genericJpaRepository;

    }

    }

    Listing 19-2

    EcomAppConfiguration (ch19\ch19-01\Ax3-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\EcomAppConfiguration.java)

    ```


    Compare this code with the `EcomAppConfiguration.java`

    code in Listing [12-3](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC3) of
    Chapter [12](#477630_1_En_12_Chapter.xhtml). You can see that all of the

    explicit configurations from Chapter [12](#477630_1_En_12_Chapter.xhtml) have
    disappeared; however, you

    get the same utility from the Axon-based architecture in the current

    example.


    The next major change in the code base is for the `OrderCommandHandler`;

    see Listing [19-3](#477630_1_En_19_Chapter.xhtml#PC3) .


    ```

    @Component

    public class OrderCommandHandler {

    @Autowired

    @Qualifier("orderRepository")

    private Repository orderRepository;

    @Autowired

    @Qualifier("productRepository")

    private Repository productRepository;

    @CommandHandler

    public void handle(NewOrderCommand newOrderCommand) throws Exception{

    Aggregate  productAggregate =

    productRepository.load(newOrderCommand.getProductId().toString());

    Product product =  productAggregate.invoke(

    (Product p)->{p.depreciateStock(newOrderCommand.getNumber());

    return p;}

    );

    orderRepository.newInstance(()->new Order(new Random().nextInt(),

    newOrderCommand.getPrice(), newOrderCommand.getNumber(),

    OrderStatusEnum.NEW, product));

    }

    }

    Listing 19-3

    OrderCommandHandler (ch19\ch19-01\Ax3-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\order\commandhandler\OrderCommandHandler.java)

    ```


    The command handler retrieves the order domain object, which is an

    aggregate from a generic repository implementation that stores

    JPA-annotated aggregates and executes methods on them to change their

    state. If you compare the code of the OrderCommandHandler in Listing

    [19-3](#477630_1_En_19_Chapter.xhtml#PC3) to the code in

    Listing [12-8](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC8) in Chapter
    [12](#477630_1_En_12_Chapter.xhtml), you can appreciate the little

    differences even though functionally you are doing the same thing.


    Next, the order aggregate contains the actual business logic of managing

    the order and is therefore responsible for guarding the invariants. The

    state changes of the order aggregate result in the generation of domain

    events, as shown in Listing [19-4](#477630_1_En_19_Chapter.xhtml#PC4). The domain

    events and the aggregates form the domain model.


    ```

    import  static org.axonframework.commandhandling.model.AggregateLifecycle.apply;

    @Entity

    @Table(name="ECOM_ORDER")

    public class Order{

    private static final long serialVersionUID = 1L;

    @Id

    private Integer id;

    @Column(name="PRICE")

    private Double price;

    @Column(name="NUMBER")

    private Integer number;

    @Column(name="ORDER_STATUS")

    @Enumerated(EnumType.STRING)

    private OrderStatusEnum orderStatus; ;

    @ManyToOne(fetch=FetchType.LAZY)

    @JoinColumn(name="PRODUCT_ID")

    private Product product;

    public Order(Integer id, Double price, Integer number,

    OrderStatusEnum orderStatus, Product product){

    super();

    this.id = id;

    this.price = price;

    this.number = number;

    this.orderStatus = orderStatus;

    this.product = product;

    apply(new OrderCreatedEvent(id, price, number,

    product.getDescription(), orderStatus.toString()));

    }

    public Order() {

    }

    }

    Listing 19-4

    Order Entity (ch19\ch19-01\Ax3-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\order\model\Order.java)

    ```


    Compare the code of the order aggregate in Listing [19-4](#477630_1_En_19_Chapter.xhtml#PC4)
    with the same

    in Listing [12-4](https://doi.org/10.1007/978-1-4842-4501-9_12_Fig#PC4) in Chapter
    [12](#477630_1_En_12_Chapter.xhtml). Axon 2 requires that both order

    and product aggregates extend AbstractAggregateRoot, a very basic

    implementation of the AggregateRoot interface, whereas in Axon 3, your

    aggregates are not required to extend that base class. AggregateRoot

    must declare a field that contains the aggregate identifier. This

    identifier must be initialized at the latest when the first event is

    published, and this identifier field must be annotated by the `@AggregateIdentifier`

    annotation. However, if you use JPA and have JPA annotations on the

    aggregate, Axon can also use the `@Id` annotation

    provided by JPA.

    Aggregates use the `AggregateLifecycle.apply()`

    method to register events for publication. Applying events means they

    are immediately applied (published) to the aggregate and scheduled for

    publication to other event handlers.

    The code in all other classes remains the same as is listed in the

    “Code the Example Scenario” subsection under the “Command and Event

    Handling in the Same JVM” section in Chapter [12](#477630_1_En_12_Chapter.xhtml),
    hence they are not repeated

    here.


    Build and Test the Example Scenario

    The complete code required to demonstrate the simple Axon example is

    in `ch19\ch19-01`. To

    build and run this example, refer to the instructions provided in the

    “Build and Test the Example Scenario” subsection in the “Command and

    Event Handling in the Same JVM” section in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    .


    The only difference in the process is in the step where you start with

    clean tables. In the current example, you want to delete any tables with

    the names you want for your examples, which may be as many as seven:


    ```

    drop table association_value_entry;

    drop table domain_event_entry;

    drop table ecom_order;

    drop table ecom_product;

    drop table saga_entry;

    drop table snapshot_event_entry;

    drop table token_entry;

    drop table ecom_order_view;

    drop table ecom_product_view;

    ```


    In the corresponding example in Chapter [12](#477630_1_En_12_Chapter.xhtml), you
    deleted only four tables,

    and there ends the difference. For the rest of the build and run of the

    example, just follow the instructions from Chapter [12](#477630_1_En_12_Chapter.xhtml).


    Distributed Command and Event Handling Using Axon


    Here again you will refactor the same design from the “Distributed

    Command and Event Handling” section in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    to make it adaptable for Axon 3.

    However, I will introduce a little change by replacing the JGroups

    connector with Spring Cloud.'
