- fmt: '11. The quotes reconcile service needs to reconcile the value of the stock
    traded to the respective user account of the seller and the buyer, in a transaction.


    12. At the same time, the quotes transaction service marks the quotes transaction
    entry as settled in the `QuotesTX` table by changing its status from “New” to
    “Settled.”


    13. The Broker Web microservice and the Settlement Web microservice are just utilities
    that provide a dashboard view of the operational data on the `Quotes` table, the
    `User` table, and the `QuotesTX` table to provide you with live views.


    A little more discussion is required about the new design. In the new design,
    the `StockTransaction` entity is nothing but a copy of the message the microservices
    receive as such. In a messaging and distributed system, it is a best practice
    to record what is coming in and going out of (sub) systems so that if you need
    to later track what happened during transactions, it is possible to correlate
    entity states with respect to temporal actions. The downside in doing this is
    that you eat up more storage space in terms of duplicating data. However, you
    need to go back to another basic principle of microservices: a microservice should
    have all of what is required for the service to serve without any external dependency.
    In that way, duplicating the required data and caching it in the microservices
    has to be done in certain scenarios. This is also one of the after-effects of
    the CQRS architecture introduced in Chapter [12](#477630_1_En_12_Chapter.xhtml)
    where, while one microservices will own the “write” governance for an entity,
    there can be many other microservices that are interested in the “read” models,
    and here too you will have read data duplicated and attached along with the interested
    microservices so that these microservices can function on their own with no external
    dependency.


    The next aspect is that the `StockTX` table is also a mechanism for the downstream
    microservice to identify duplicate messages coming through the messaging middleware.
    This is done using the transaction ID pattern. Here, the `StockTX` table will
    also record a transaction ID send by the sender microservices along with the message
    payload. The sender and receiver microservices have to agree on a common schema
    where these transaction IDs are unique in the way that any two different messages
    will not have the same transaction ID. If so, the receiver microservice can record
    this transaction ID along with the message. In this manner, whenever the receiver
    microservice receives a message, it can check if it’s a duplicate message, and
    if so, it can be silently ignored.


    Boundary level actions of microservices are to be done in isolation from internal
    processing and also with more fault tolerant design patterns. This is because
    microservices boundaries have a dependency of system resources like networks,
    I/O, and so on, which are more error-prone. Hence, when the downstream microservice
    receives a message from the message network, your aim should be to make the “record
    new message” action independent and isolated from further internal microservice
    processing, since internal microservice processing is in the control of that microservice
    alone (no external resources, like previously mentioned) and can be retried in
    case of errors. This is achieved in the new design by making the transaction semantic
    for the new message recording action as `REQUIRES_NEW` so that it will succeed
    irrespective of the outcome of the peer transactions or the parent transaction.


    ## Code the Relaxed Example Scenario


    The complete code required to demonstrate the distributed transaction example
    with enhanced resiliency for relaxed BASE anomalies is in folder `ch14\ch14-01`.
    There are no major changes in the code of the upstream microservices from what
    you saw in Chapter [13](#477630_1_En_13_Chapter.xhtml), so I will not duplicate
    the code here. I have introduced new code as well as updates to existing code
    in the downstream microservices, so I will explain it all here. The main changes
    are in the Quote Settlement downstream microservice.


    ### Microservice 3: Quote Settlement (Settlement-ActiveMQ-Derby)


    When a new quote message reaches the ActiveMQ queue, it will be picked up instantaneously
    by the settlement listener. The settlement listener code has changed from what
    you saw in Chapter [13](#477630_1_En_13_Chapter.xhtml), so look at Listing [14-7](#477630_1_En_14_Chapter.xhtml#PC7).


    ```java

    public class SettlementListener implements MessageListener {

    @Autowired

    @Qualifier("quotesTransactionServiceRequired_TX")

    QuotesTransactionService quotesTransactionServiceRequired_TX;

    @Autowired

    @Qualifier("quotesTransactionServiceRequiresNew_TX")

    QuotesTransactionService quotesTransactionServiceRequiresNew_TX;

    @Autowired

    @Qualifier("quotesReconcileServiceRequired_TX")

    QuotesReconcileService quotesReconcileServiceRequired_TX;

    @Autowired

    @Qualifier("quotesReconcileServiceRequiresNew_TX")

    QuotesReconcileService quotesReconcileServiceRequiresNew_TX;

    public void onMessage(Message message) {

    QuoteDTO quoteDTO = null;

    try {

    quoteDTO = (QuoteDTO) ((ObjectMessage) message). getObject();

    }

    catch (JMSException e) {

    throw new RuntimeException(e);

    }

    quotesTransactionServiceRequiresNew_TX.insertUniqueNoErrorOnDuplicate(

    quoteDTO);

    try {

    reconcile(quoteDTO);

    }

    catch (QuotesBaseException e) {

    throw new RuntimeException(e);

    }

    }

    }

    ```


    *Listing 14-7 Settlement Listener Orchestrator (`ch14\ch14-01\XA-TX-Resilient\Settlement-ActiveMQ-Derby\src\main\java\com\acme\ecom\messaging\SettlementListener.java`)*


    As shown in Listing [14-7](#477630_1_En_14_Chapter.xhtml#PC7), on consuming the
    message, the settlement listener will at the very next instance attempt to record
    the incoming quote message backed up by a persistent resource. To make this record
    happen irrespective of the outcome (success or failure) of any other processing
    in peer transactions within the enclosed parent transaction, the transaction semantic
    for this recording action is `REQUIRES_NEW`. This record action will not raise
    any errors on finding duplicate entries received. Next, the listener will do a
    check to see if a quote similar to the one received has already been settled.
    This happens in cases of duplicate messages. See Listing [14-8](#477630_1_En_14_Chapter.xhtml#PC8).'
