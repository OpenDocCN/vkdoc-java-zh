- fmt: '# Restart a RabbitMQ Cluster


    When the entire cluster is brought down, the last node to go down must be the
    first node to be brought online. If this doesn''t happen, the nodes will wait
    30 seconds for the last disc node to come back online, and fail afterwards. You
    may refer to RabbitMQ documentation online for further details.


    To restart a node (`rabbit2`) in your cluster, you can use the script named `rabbitmq-cluster2.bat`,
    which you have already seen. To restart `rabbit1`, use `rabbitmq-cluster1.bat`:


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-cluster1.bat

    call rabbitmqctl -n rabbit1 stop_app

    call rabbitmqctl -n rabbit1 join_cluster rabbit2@tiger

    call rabbitmqctl -n rabbit1 start_app

    call rabbitmqctl -n rabbit2 set_policy ha-all "^.∗" "{""ha-mode"":""all""}"

    ```


    If you mess up with things while you start and restart your clusters, you may
    want to go to the data folder of RabbitMQ and delete everything and then retry
    starting and restarting instances and clusters in the right order.


    # Connect to a RabbitMQ Cluster from a Client


    A client can connect to any single node within a cluster. In the event that this
    node fails and the rest of the cluster survives, then the client should notice
    the closed connection and should explicitly reconnect to some surviving member
    of the cluster. I don''t advise baking in hostnames or IP addresses into client
    applications, since this is an inflexible approach. Instead, the recommended approach
    is to adopt any of the below abstractions:


    - Use a dynamic DNS service which has a very short TTL configuration.

    - Use a plain TCP load balancer.

    - Use some sort of mobile IP achieved with a pacemaker or similar technology.


    Refer to Appendix C where I explain how to set up a TCP load balancer with Nginx.
    If you use such a TCP load balancer in between your RabbitMQ cluster and the client
    program, in the event that one of the nodes in the cluster fails and the rest
    of the cluster survives, then the client needn''t notice the closed connection
    and will be routed to any surviving member of the cluster implicitly.


    # Summary


    RabbitMQ is a reliable and persistent message queue server which can be configured
    in High Availability mode with multiple nodes in a cluster. I use RabbitMQ for
    many code demonstrations in this book. In some of the code demonstrations, I use
    RabbitMQ only as a single-node server; however, in all those scenarios RabbitMQ
    can be configured in a cluster to test the samples.


    # Install, Configure, and Run Nginx Reverse Proxy


    Nginx is an HTTP and reverse proxy server which can also play as a mail proxy
    server or as a generic TCP/UDP proxy server. Basic HTTP server features include
    serving static and index files. Nginx also supports keep-alive and pipelined connections.
    TCP/UDP proxy server features include generic proxying of TCP and UDP as well
    as load balancing and fault tolerance. Go to [`https://nginx.org`](https://nginx.org)
    for more information.


    I cover the following in this appendix:


    - How to install and start using Nginx

    - How to set up Nginx as an HTTP reverse proxy

    - How to set up Nginx as a TCP reverse proxy


    ## Install Nginx


    In this section, you will download, install, and configure Nginx and test the
    installation. Nginx is available for download at [`https://nginx.org/en/download.html`](https://nginx.org/en/download.html).


    Save the installation archive file to a suitable location in your hard disk first
    and then extract the archive to a location of your choice. Even though you may
    choose any location, like


    ```

    C:\Program Files\nginx\

    ```


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ```

    D:\Applns\nginx\nginx-1.10.1

    ```


    ## Start Using Nginx


    You can now start Nginx Server by using the following command, shown in Figure
    C-1:


    ![../images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg](images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg)


    **Figure C-1.** Start Nginx Server


    ```

    D:\Applns\nginx\nginx-1.10.1>nginx

    ```


    Once Nginx is started, it can be controlled by invoking the executable with the
    `-s` parameter, as in


    ```

    nginx -s flag

    ```


    where `flag` may be one of the following:


    - `stop`: Forceful shutdown

    - `quit`: Graceful shutdown

    - `reload`: Reload the configuration file

    - `reopen`: Reopen the log files


    ## Start Using Nginx as Reverse Proxy


    Nginx is frequently used for setting up as a reverse proxy server. When set as
    a reverse proxy server, Nginx receives requests, passes them to the proxied servers,
    retrieves responses from the proxied servers, and sends them back to the clients.
    Configurations in Nginx are effected in the `nginx.conf` file located in the `conf`
    path.


    ### Configure HTTP Reverse Proxy


    An HTTP reverse proxy can be set up in Nginx to proxy requests with the HTTP protocol.
    Relevant sections in `nginx.conf` for setting up an HTTP proxy are shown in Listing
    C-1.


    ```

    http {

    upstream myapp1 {

    server localhost:8081;

    server localhost:8082;

    }

    server {

    listen       8080;

    server_name  localhost;

    location / {

    proxy_pass http://myapp1;

    }

    }

    }

    ```


    **Listing C-1.** Nginx HTTP Reverse Proxy Configuration


    Now, an HTTP request similar to URL pattern `http://localhost:8080` will be proxied
    to both of the following URLs in a load-balanced fashion:


    ```

    http://localhost:8081

    http://localhost:80802

    ```


    ### Configure TCP Reverse Proxy


    A TCP reverse proxy can be set up in Nginx to proxy requests with the TCP protocol.
    Relevant sections in `nginx.conf` for setting up a TCP proxy are shown in Listing
    C-2.


    ```

    stream {

    upstream myapp1 {

    server localhost:5672;

    server localhost:5673;

    }

    server {

    listen     5671;

    proxy_pass myapp1;

    }

    }

    ```


    **Listing C-2.** Nginx TCP Reverse Proxy Configuration


    # Summary


    The reverse proxy setup of Nginx can be really useful in load balancing external
    requests to microservices. Hence I use Nginx to demonstrate many scenarios in
    this book.


    # cURL and Postman


    cURL is a command line tool for getting or sending files using the URL syntax.
    cURL supports a range of common Internet protocols like HTTP, HTTPS, FTP, FTPS,
    SCP, SFTP, TFTP, and LDAP, out of which HTTP is of interest for our discussions
    in this book. Postman is a UI-based app that can be used to carry out all HTTP
    actions in an easier manner. I will introduce this app, too.


    The "Performing Data Operations Using Spring Boot and MongoDB" section in Chapter
    7 introduced a sample Spring Boot application. You used Spring Data REST there
    to create implementations of the MongoDB repository interface automatically. Then
    Spring Boot directed Spring MVC to create RESTful endpoints at `/products` and
    `/categories`. I will assume that this sample is built and is up and running so
    that you can perform the basic operations of cURL and Postman using this sample.


    I will cover the following in this appendix:


    - How to use cURL for HTTP operations

    - How to use Postman for HTTP operations


    ## cURL Operations for HTTP


    Basic cURL operations involve typing `curl` at the command line, followed by the
    URL of the output to retrieve. For example, to retrieve the `microservices.io`
    homepage, type


    ```

    curl www.microservices.io

    ```


    cURL defaults to displaying the output it retrieves from the URL to the standard
    output specified on the system, normally the terminal window (in Mac). So running
    the above command will, on most systems, display the [`www.microservices.io`](http://www.microservices.io)
    source-code web page in the terminal window.


    ### HTTP GET to Retrieve an Entity


    You can use cURL to get a first glimpse of what the server''s API endpoint has
    to offer by issuing the command shown in Listing D-1.'
