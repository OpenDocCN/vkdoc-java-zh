  trans: "\nSpring Cloud 中 Feign 客户端的使用\nFeign 客户端是一个受 Retrofit、JAXRS-2.0 和 WebSocket\
    \ 等库启发的 Java 到 HTTP 的客户端绑定器。Feign 旨在通过将绑定分母统一泛化到 HTTP API（无论 REST API 的成熟度如何，即\
    \ API 的 RESTful 程度），来降低调用 HTTP API 的复杂性。Feign 通过将注解处理成模板化请求，使 HTTP API 调用变得简单。在发送请求之前，参数会以直接的方式应用到这些模板中。然而，Feign\
    \ 仅支持基于文本的 API。尽管如此，Feign 极大地简化了系统方面的工作，例如重放请求、单元测试等。在本节中，你将学习如何调用 HTTP API。\n\
    \n设计一个 Feign 客户端场景\n\n从本节开始，以及本章中 Spring Cloud 的所有其他示例，你将使用一个简单但具有代表性的真实用例。你将首先研究用例的设计，然后进一步学习。图\
    \ 8-1 展示了一个简单的场景，其中有两个独立的应用程序，或者用我们的术语来说，是两个独立的微服务：Product Web 和 Product Server。\n\
    \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig1_HTML.jpg](img/477630_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n一个 Feign 客户端\n使用场景\n\n让我们逐一探讨这些组件：\n\n*   **Product Server**：Product\
    \ Server 是一个功能完备的微服务应用程序，实现了部分 CRUD 操作。该微服务使用 Mongo DB 来写入和读取与产品实体相关的数据。因此，该微服务封装了针对数据库执行典型\
    \ CRUD 操作所需的所有组件，并将功能作为基于 REST 的服务暴露出来，包括：\n\n    *   **ProductRestController**：暴露选定\
    \ CRUD 操作的 REST 控制器\n    *   **Product**：`Entity` 类，即你要持久化到数据库的内容\n    *   **ProductRepository**：执行所有\
    \ Mongo DB 操作管道的 Mongo 仓库\n    *   **EcomProductMicroserviceApplication**：基于 Spring\
    \ Boot 的 `Application` 类\n\n*   **Product Web**：Product Web 被设计为另一个功能完备的微服务应用程序。然而，这次该微服务应用程序不执行任何\
    \ CRUD 操作；相反，它充当面向外部世界或客户端的门面，将所有调用委托给 Product Server 微服务。因此，Product Web 也拥有之前为\
    \ Product Server 列出的所有组件；唯一的区别是没有仓库组件，因为它不进行任何数据库交互。但是，由于 Product Web 将所有传入的 REST\
    \ 调用委托给 Product Server 微服务，你必须为此创建代码，而正是出于这个目的，你将利用 Feign 客户端，而不是手动编写所有管道代码，我将在接下来解释这一点。\n\
    \n*   **ProductService**：ProductService 是列出所有选定用于暴露的方法的接口，因此 Product Server 和\
    \ Product Web 都履行此接口中指定的契约。\n\n*   **ProductServiceProxy**：该组件是另一个扩展了 ProductService\
    \ 的抽象接口，因此它获得了 Product Server 和 Product Web 接口所期望的所有方法。此外，ProductServiceProxy\
    \ 是用于注解 Feign 客户端基本配置的接口。在实际意义上，这可以被视为服务器端功能的客户端代理。\n\n*   **Spring Cloud Feign\
    \ 客户端**：Spring 的 Feign 客户端是 Spring Cloud 即时实现的实际实现。正是通过这个代理实现，来自 Product Web 的调用被委托给\
    \ Product Server。\n\n上述交互如图 8-2 所示。\n"
- fmt: '![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig2_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig2_HTML.jpg)


    **Figure 8-2** Delegation of calls through the Feign client


    Here, requests from the browser will hit the Product Web microservice first. The
    Product Web microservice will in turn delegate the call to the Product Server
    microservice with the help of a `ProductServiceProxy`. The Product Server microservice
    will retrieve the data from the database and provide the response, which will
    be returned back through the call stack to the browser.


    ## Code Using Feign Client


    Since Feign is a declarative HTTP client, with one `spring-cloud-starter-feign`
    dependency mentioned in your Maven POM and with another single annotation of `@EnableFeignClients`,
    you have a fully functional HTTP client with a sensible, ready-to-go default configuration.
    Visit `pom.xml` to see the explicit mention of the Feign client dependency. See
    Listing [8-1](#477630_1_En_8_Chapter.xhtml#PC1).


    ```

    org.springframework.cloud

    spring-cloud-starter-feign

    ```


    **Listing 8-1** Feign Client Dependency in Maven (`ch08\ch08-01\ProductWeb\pom.xml`)


    With Feign added on the classpath, only one more annotation is needed to make
    everything work with the default configuration properties. This is mentioned in
    Listing [8-2](#477630_1_En_8_Chapter.xhtml#PC2).


    ```

    import org.springframework.cloud.netflix.feign.EnableFeignClients;

    @EnableFeignClients(basePackageClasses = ProductServiceProxy.class)

    @ComponentScan(basePackageClasses = ProductServiceProxy.class)

    @CrossOrigin

    @RestController

    public class ProductRestController implements ProductService{

    private ProductServiceProxy productServiceProxy;

    @Autowired

    public ProductRestController(ProductServiceProxy productServiceProxy){

    this.productServiceProxy = productServiceProxy;

    }

    @RequestMapping(value = "/productsweb", method = RequestMethod.GET ,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    public ResponseEntity>> getAllProducts() {

    return productServiceProxy.getAllProducts();

    }

    @RequestMapping(value = "/productsweb/{productId}", method =

    RequestMethod.GET, produces = MediaType.APPLICATION_JSON_VALUE)

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId) {

    return productServiceProxy.getProduct(productId);

    }

    }

    ```


    **Listing 8-2** Enable Feign Client (`ch08\ch08-01\ProductWeb\src\main\java\com\acme\ecom\product\controller\ProductRestController.java`)


    `ProductServiceProxy` is injected into the code in Listing [8-2](#477630_1_En_8_Chapter.xhtml#PC2)
    in the Feign client proxy. Creating this REST proxy client is really easy, and
    most of the time all you need to do is create an interface and add some annotations.
    The Spring Cloud environment will create the implementation at runtime and make
    the call delegate work. Listing [8-3](#477630_1_En_8_Chapter.xhtml#PC3) shows
    the `ProductServiceProxy` in code.


    ```

    import org.springframework.cloud.netflix.feign.FeignClient;

    @FeignClient(name="product-proxy", url = "http://localhost:8080")

    public interface ProductServiceProxy extends ProductService{

    }

    ```


    **Listing 8-3** Feign REST Client (`ch08\ch08-01\ProductWeb\src\main\java\com\acme\ecom\product\client\ProductServiceProxy.java`)


    I will not explain the code for the Product Server microservice since it is very
    similar to the sample I already explained in the “Develop a RESTful Web Service”
    section in Chapter [7](#477630_1_En_7_Chapter.xhtml).


    ## Build and Test the Feign Client


    The complete code required to demonstrate the Feign client is in folder `ch08-01`.
    Make sure MongoDB is up and running. You may want to refer to Appendix A to get
    started with MongoDB.


    You first build and package the executables for the Product Server microservice
    and bring up the server. There is a utility script provided which you can easily
    execute in folder `ch08\ch08-01\ProductServer\make.bat`:


    ```

    cd ch08\ch08-01\ProductServer

    D:\binil\gold\pack03\ch08\ch08-01\ProductServer>make

    D:\binil\gold\pack03\ch08\ch08-01\ProductServer>mvn -Dmaven.test.skip=true clean
    package

    ```'
