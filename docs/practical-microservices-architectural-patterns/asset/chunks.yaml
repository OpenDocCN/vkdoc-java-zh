- fmt: 'Figure [9-9](#477630_1_En_9_Chapter.xhtml#Fig9) illustrates how you can replicate
    data centers across geography. `SAN1` and `SAN2` shown in Figure [9-9](#477630_1_En_9_Chapter.xhtml#Fig9)
    can also be set up at distant geographies. One of the sites can then be regarded
    as a disaster recovery (DR) site. Vendor solutions can offer synchronous and asynchronous
    replication features, along with block-level incremental replication and granular
    snapshot features. Fiber Channel over IP (`FCIP`) that combines the features of
    the Fiber Channel and the IP is used to connect distributed SANs over large distances.
    `FCIP` encapsulates Fiber Channel and transports it over a `TCP` socket, hence
    it is a tunneling protocol, as it makes a transparent point-to-point connection
    between geographically separated SANs over IP networks. `FCIP` relies on `TCP/IP`
    services to establish connectivity between remote SANs over LANs (local area networks),
    MANs (metropolitan area networks), or WANs (wide area networks).


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig9_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9** SAN replication


    Last but not least, the stored bytes from the storage layer get archived into
    non-durable means and can be transported into secondary or DR sites, which again
    can be done by more than one service provider to improve reliability.


    ## Highly Available Microservices


    You can now extend the application deployment architecture explained in the “Application
    Architecture Redundancy” section earlier to accommodate the Mesh App and Service
    Architecture (MASA) explained earlier. This is shown in Figure [9-10](#477630_1_En_9_Chapter.xhtml#Fig10).
    Note that in the MASA style, apps are executed from the client device. They can
    be web apps, native mobile apps, IoT apps, etc. However, there is nothing wrong
    in representing them within the core data center behind the firewalls, which is
    the case in most of the web apps that also have server-side execution capability.
    If the apps are mobile apps, typically they are represented by an App Store (like
    Playstore, etc.). Further, if the apps don’t have any server-side execution capability
    but get executed only in the client device, then they can also be hosted in the
    DMZ or closer to the perimeter for easy distribution to client devices. In such
    cases, the security concerns and other similar concerns will be further intercepted
    by the API layer, which you visited in the previous chapter.


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig10_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig10_HTML.jpg)


    **Figure 9-10** High availability for MASA-style deployment


    The next thing to be noted in Figure [9-10](#477630_1_En_9_Chapter.xhtml#Fig10)
    is that the apps and the services can be hosted with redundancy, especially when
    they are designed as microservices. If these concepts are difficult to digest,
    don’t worry; all will be clarified in the working sample towards the end of this
    chapter.


    ## A Highly Available Spring Cloud Microservice Demonstration


    The previous section explained how the microservices architecture fits into the
    high availability reference architecture model from a deployment perspective.
    In this section, you will look at a real-world scenario where you will simulate
    many aspects of HA already discussed from a microservices perspective. You will
    simulate the HA building blocks essential for a microservices scenario alone;
    however, you will not attempt to demonstrate the rest of the general principles
    of infrastructure-level HA explained earlier in this chapter, since they are well
    proven and nothing is different even when applied to the microservices context.


    ### Design a Highly Available Microservice Scenario


    For the demonstration purpose of the microservices HA scenario, you will utilize
    the `Eureka` and `Zuul` components you used in Chapter [8](#477630_1_En_8_Chapter.xhtml).
    The scenario you will design is shown in Figure [9-11](#477630_1_En_9_Chapter.xhtml#Fig11).


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig11_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig11_HTML.jpg)


    **Figure 9-11** Demonstrating high availability for microservices


    You have two instances each of `Zuul` and `Eureka`. Next, you divide the application
    components into three different microservices:


    *   **Web App μ Service**: This is the app component in the MASA style. In your
    sample, it hosts just an HTML page, so once this HTML is loaded by the browser
    from the server, then onwards all interactions from the HTML app to the server
    side will happen through the API gateway.

    *   **Product Web Server μ Service**: You have mocked this microservice as accepting
    all hits from outside the firewall from the clients, so this component will not
    do any major data operations. Instead, it will delegate the calls to the Product
    Data Server μ Service.

    *   **Product Data Server μ Service**: In this μ service, you will simulate CRUD
    operations. To keep the demo simple, you will not do actual CRUD operations against
    any database. Instead, you will simulate them from an in-memory data store.


    All of the above microservices will also be instantiated twice so that at any
    point in time you will have redundancy. You will next use an instance of `Nginx`
    server to simulate the reverse proxy. This reverse proxy will be configured in
    a load balanced mode so that it can load balance to the next layer of components.


    You need to note two aspects with respect to the `Nginx` proxy configuration:


    *   **Web App μ Service**: The Web App μ Service is the app that must be downloaded
    into the client device first. Hence the bootstrap address for the application
    has to download and render this app into the client browser. In short, this component
    has to be directly addressable and accessible by client devices, so `Nginx` will
    reverse proxy requests from the client to this μ service directly.

    *   **Zuul API Gateway**: Once the Web App μ Service is rendered in the client
    device, from there onwards any subsequent hit from this app to the server will
    have to happen only through the API gateway. Hence the `Zuul` API gateway instances
    should also be configured in the `Nginx` reverse proxy.


    I have removed the DNS, firewalls, and so on from the demonstration since their
    configuration is no different than from typical deployments, so your network architect
    will help you on this.


    ### Code to Demonstrate Highly Available Microservices


    All the code samples for this section are in folder `ch09\ch09-01`. Note that
    you are building over the examples in the previous chapter, especially the `Eureka`
    and `Zuul` examples in Chapter [8](#477630_1_En_8_Chapter.xhtml), so you should
    get an overview of those examples first before attempting to run this one. However,
    even if you skip those examples, you should still be able to run and understand
    this one. See Figure [9-12](#477630_1_En_9_Chapter.xhtml#Fig12).


    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig12_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig12_HTML.jpg)


    **Figure 9-12** Components to demonstrate a microservice’s high availability


    Most of the components in this example were explained in Chapter [8](#477630_1_En_8_Chapter.xhtml),
    so I will avoid repetition. Instead, any incremental changes to the code in this
    section from that in Chapter [8](#477630_1_En_8_Chapter.xhtml) will be described
    here.


    You will first look at the `Nginx` reverse proxy setup. The configurations are
    mentioned in the `Nginx` configuration file in Listing [9-1](#477630_1_En_9_Chapter.xhtml#PC1).'
