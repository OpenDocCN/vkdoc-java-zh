- fmt: '# Axon-Specific Components


    ## SimpleCommandBus


    `SimpleCommandBus`  does straightforward processing of commands in the same thread
    that dispatches them. After a command is processed, the modified aggregate(s)
    are saved and any generated events are published in that same thread.


    ## Aggregate


    An aggregate is an entity or group of entities that are always kept in a consistent
    state. An aggregate root is the object on top of the aggregate tree that is responsible
    for maintaining this consistent state. For example, an order aggregate could contain
    entities like line items and a delivery address. In order to keep the full aggregate
    in a consistent state, changing the address of this order should be done via the
    order aggregate, not by directly accessing the address entity.


    ## Unit of Work (UoW)


    `SimpleCommandBus` maintains the notion of a unit of work (UoW) for each command
    published. Since all command processing is done in the same thread, this implementation
    is limited to a single JVM’s boundaries.


    A unit of work is a set of modifications to be made to aggregates. Execution of
    a command typically happens within the scope of a unit of work. When a command
    handler finishes execution, the UoW is committed and all actions are finalized.
    This means that any repositories are notified of state changes in their aggregates
    and events scheduled for publication are sent to the event bus. This is a convenient
    grouping that will help to prevent individual events from being published before
    a number of aggregates have been processed. In the back, it allows repositories
    to manage resources, such as locks, over an entire transaction. Locks, for example,
    will only be released when the unit of work is either committed or rolled back.


    A unit of work is not a replacement for traditional ACID-style transactions. It
    is merely a buffer where changes are grouped and staged. When a unit of work is
    committed, all staged changes are only committed; however, this commit is not
    atomic. That means if a commit fails, a few changes might have already been persisted,
    while others not. So Axon best practices dictate that a command should always
    containing one action. If you have more actions in your unit of work, then you
    should consider attaching a transaction to the unit of work’s commit, for which
    you can refer to the Axon documentation.


    ## SimpleEventBus


    `SimpleEventBus`, as the name suggests, is a very basic implementation of the
    `EventBus` interface and is a mechanism used to dispatch events to the subscribed
    event listeners. It is good when the event dispatching is done synchronously and
    locally (i.e. in a single JVM). It manages subscribed `EventListeners` and forwards
    all incoming events to all subscribed listeners. `EventListeners` must be explicitly
    registered with the event bus in order for them to receive events. The registration
    process is thread safe and listeners may register and unregister for events at
    any time. If an `EventListener` throws an exception, the event dispatching stops
    and the exception is propagated to the component publishing the event.


    ## AnnotationCommandHandlerBeanPostProcessor


    `AnnotationCommandHandlerBeanPostProcessor` will automatically register classes
    containing command handler methods (i.e. methods annotated with the `@CommandHandler`
    annotation) with a command bus.


    - This bean post processor will scan the application context for all beans with
    an `@CommandHandler` annotated method.

    - All such command handlers will be automatically recognized and subscribed to
    the command bus.


    ## AnnotationEventListenerBeanPostProcessor


    `AnnotationEventListenerBeanPostProcessor` will automatically register classes
    containing event handler methods (i.e. methods annotated with the `@EventHandler`
    annotation) in your application context and automatically connect them to the
    event bus.


    - This bean post processor will scan the application context for all the beans
    with an `@EventHandler` annotated method.

    - All such event listener will be automatically recognized and subscribed to the
    event bus.


    ## Command Gateway


    The command gateway is a convenient interface for the command dispatching mechanism.
    Usage of a gateway to dispatch commands is optional; however, it is generally
    the easiest option to do so. `CommandGateway` is the interface and `DefaultCommandGateway`
    is the default implementation provided by Axon. The gateway provides a number
    of methods that allow you to send a command and wait for a result either synchronously,
    with a timeout, or asynchronously.


    ## GenericJpaRepository


    `GenericJpaRepository` is a repository implementation that can store aggregates
    that are JPA compatible. It is configured with an `EntityManager` that manages
    the actual persistence and classes specifying the actual type of aggregate stored
    in the repository, `Product` and `Order` in your case. All the JPA-annotated aggregates
    must implement the `AggregateRoot` and have the proper JPA annotations. The repository
    may be configured with a locking scheme. The repository will always force optimistic
    locking in the backing persistent store. An optional lock can be configured for
    the repository, in which case it will be in addition to this optimistic lock.
    Locks on one repository instance will not be shared with other repository instances.
    When this repository is requested to persist changes to an aggregate, it will
    also flush the `EntityManager`, during which it will enforce checking of database
    constraints and optimistic locks. Let’s look at your `AggregateRoot` entities
    now; see Listing [12-4](#477630_1_En_12_Chapter.xhtml#PC4).


    ```

    import org.axonframework.domain.AbstractAggregateRoot;

    @Entity

    @Table(name="ECOM_ORDER")

    @Data

    @EqualsAndHashCode(exclude = { "id" })

    public class Order extends AbstractAggregateRoot {

    @Id

    private Integer id;

    @Column(name="PRICE")

    private Double price;

    @Column(name="NUMBER")

    private Integer number;

    @Column(name="ORDER_STATUS")

    @Enumerated(EnumType.STRING)

    private OrderStatusEnum orderStatus; ;

    @ManyToOne(fetch=FetchType.LAZY)

    @JoinColumn(name="PRODUCT_ID")

    private Product product;

    @Override

    public Integer getIdentifier() {

    return id;

    }

    public Order(Integer id, Double price, Integer number,

    OrderStatusEnum orderStatus, Product product) {

    super();

    this.id = id;

    this.price = price;

    this.number = number;

    this.orderStatus = orderStatus;

    this.product = product;

    registerEvent(new OrderCreatedEvent(id, price, number,

    product.getDescription(), orderStatus.toString()));

    }

    }

    Listing 12-4

    Order Aggregate Entity (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\order\model\Order.java)

    ```


    `Order` extends `AbstractAggregateRoot`, a very basic implementation of the `AggregateRoot`
    interface. It provides the mechanism to keep track of all uncommitted events and
    also maintains a version number based on the number of events generated, which
    can be used for validation during committing. Further, the `Order` entity also
    registers events to be published when the aggregate is saved using the `registerEvent`
    method. Next, you will look at the `Product` aggregate in Listing [12-5](#477630_1_En_12_Chapter.xhtml#PC5).


    ```

    @Entity

    @Table(name="ECOM_PRODUCT")

    @Data

    @EqualsAndHashCode(exclude = { "id" })

    public class Product extends AbstractAggregateRoot {

    @Id

    private Integer id;

    @Column(name="PRICE")

    private Double price;

    @Column(name="STOCK")

    private Integer stock;

    @Column(name="DESCRIPTION")

    private String description;

    @Override

    public Integer getIdentifier() {

    return id;

    }

    public void depreciateStock(int count) {

    if(this.stock >= count){

    this.stock = this.stock - count;

    registerEvent(new StockUpdatedEvent(id, stock));

    }else{

    throw new RuntimeException("Out of stock");

    }

    }

    }

    Listing 12-5

    Product Aggregate Entity (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\product\model\Product.java)

    ```


    The `Product` aggregate is similar in structure and functionality to that of the
    `Order` aggregate, hence the explanation won’t be repeated here.'
