    In point-to-point architecture , we define interconnections for a pair of applications.
    Thus we have two end points to be integrated. We can build protocol and/or format
    adaptors/transformers at one or either end. This is the easiest way to integrate,
    as long as the volume of integration is low. We normally use technology-specific
    APIs like FTP, IIOP, remoting, or batch interfaces to realize integration. Between
    any two integration points, there is tight coupling, since both ends have knowledge
    about their peers.


    ### Hub and Spoke


    Hub-and-spoke architecture is also called the **message broker** and provides
    a centralized hub (broker) to which all applications are connected. The distinguishing
    feature of the hub-and-spoke architecture is that each application connects with
    the central hub through lightweight connectors. The lightweight connectors facilitate
    application integration with minimum or no changes to the existing applications.
    Message transformation and routing takes place within the hub. Since the applications
    do not connect to other applications directly, they can be removed from the integration
    topology by plugging off from the hub. Since the hub is a central portion of this
    kind of topology, the hub is a single point of failure of the entire topology
    itself.'
