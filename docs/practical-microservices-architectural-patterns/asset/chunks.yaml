- fmt: 'Next, you will look at commands. They are straight DTO-like classes, as shown
    in Listing [12-6](#477630_1_En_12_Chapter.xhtml#PC6).


    ```

    import lombok.Data;

    @Data

    public class NewOrderCommand {

    private final Double price;

    private final Integer number;

    private final Integer productId;

    }

    Listing 12-6

    New Order Command (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\order\api\command\NewOrderCommand.java)

    ```


    It’s good practice for a command to express its intent by its name. So you can
    use the Java class name to figure out what needs to be done, and the fields of
    the command object should provide the information required to act based on the
    command.


    Now you will see the creation of the above command. When you click the “Order
    One Now!” button in the browser, a REST/JSON request hits the order controller,
    as shown in Listing [12-7](#477630_1_En_12_Chapter.xhtml#PC7).


    ```

    @RestController

    public class OrderController {

    @Autowired

    private DataSource dataSource;

    @Autowired

    private CommandGateway commandGateway;

    @RequestMapping(value = "/orders", method = RequestMethod.POST)

    @Transactional

    public ResponseEntity addNewOrder(@RequestBody OrderDTO orderDTO) {

    commandGateway.sendAndWait(new NewOrderCommand(orderDTO.getPrice(),

    orderDTO.getNumber(), orderDTO.getProductId()));

    return new ResponseEntity( HttpStatus.OK);

    }

    }

    Listing 12-7

    Order REST Controller (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\web\controller\OrderController.java)

    ```


    The `Controller` method will create a new command and send it to the command bus
    and wait for it to execute. The result of the execution is returned when available.
    This `sendAndWait` method will block indefinitely, until a result is available
    or until the current thread is interrupted. If the thread is interrupted, this
    method returns null. If an exception occurs during processing, it is wrapped in
    a `CommandExecutionException`.


    Listing [12-8](#477630_1_En_12_Chapter.xhtml#PC8) shows the `CommandHandler`.


    ```

    @Component

    public class OrderCommandHandler {

    @Autowired

    @Qualifier("orderRepository")

    private Repository orderRepository;

    @Autowired

    @Qualifier("productRepository")

    private Repository productRepository;

    @CommandHandler

    public void handle(NewOrderCommand newOrderCommand){

    Product product =

    productRepository.load(newOrderCommand.getProductId());

    product.depreciateStock(newOrderCommand.getNumber());

    Order order = new Order(new Random().nextInt(),

    newOrderCommand.getPrice(),

    newOrderCommand.getNumber(), OrderStatusEnum.NEW, product);

    orderRepository.add(order);

    }

    }

    Listing 12-8

    Axon Order Command Handler (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\order\commandhandler\OrderCommandHandler.java)

    ```


    The `CommandHandler` marker annotation will mark the `handle` method on the `OrderCommandHandler`
    as being a `CommandHandler`. The annotated method’s first parameter is the command
    handled by that method. Optionally, the command handler may specify a second parameter
    of type `UnitOfWork`. The active unit of work will be passed if that parameter
    is supplied. A type of command can be handled by only one type of command handler.
    So an order command handler instance will handle a new order command, and when
    such a command arrives, it will retrieve the corresponding domain object, `Product`
    (aggregates) in your case, from a repository, and execute methods on it to change
    the state (depreciate the stock and also create a new order in your case). These
    aggregates typically contain the actual business logic and are therefore responsible
    for guarding their own invariants. The state changes of aggregates result in the
    generation of domain events. In the above code, the product stock depreciation
    and the creation of the new order generate events. Both the domain events and
    the aggregates form the domain model.


    You will now look at the code for the events generated. Events are simple data-encapsulated
    POJO classes. See Listing [12-9](#477630_1_En_12_Chapter.xhtml#PC9) and Listing
    [12-10](#477630_1_En_12_Chapter.xhtml#PC10).


    ```

    public class StockUpdatedEvent {

    private final Integer id;

    private final Integer stock;

    }

    Listing 12-10

    Stock Updated Event (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\product\api\event\StockUpdatedEvent.java)

    ```


    ```

    public class OrderCreatedEvent {

    private final Integer id;

    private final Double price;

    private final Integer number;

    private final String productDescription;

    private final String orderStatus;

    }

    Listing 12-9

    Order Created Event (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\order\api\event\OrderCreatedEvent.java)

    ```


    Now look at the event handlers capable of handling these events. If you recollect,
    for command handling, a type of command can be handled by only one type of command
    handler. However, for event handling, a type of event may be handled by zero or
    more types of event handlers. This is synonymous to the publish-subscribe pattern
    using a message topic where a message may be consumed by more than one subscriber.
    More on this later; let’s now look at the code for the event handlers in Listing
    [12-11](#477630_1_En_12_Chapter.xhtml#PC11).


    ```

    @Component

    public class OrderEventHandler {

    @Autowired

    DataSource dataSource;

    @EventHandler

    public void handleOrderCreatedEvent(OrderCreatedEvent event) {

    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);

    jdbcTemplate.update("INSERT INTO ecom_order_view VALUES(?,?,?,?,?)",

    new Object[]{event.getId(),

    event.getPrice(), event.getNumber(), event.getProductDescription(),

    event.getOrderStatus()});

    }

    }

    Listing 12-11

    Event Handler for Order (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\order\eventhandler\OrderEventHandler.java)

    ```


    The order event handler receives the order created event after a new order has
    been created. Hence the only task left is to update the Order Read DB, which is
    done by the above code. The other event handler left is product event handler,
    shown in Listing [12-12](#477630_1_En_12_Chapter.xhtml#PC12).


    ```

    @Component

    public class ProductEventHandler {

    @Autowired

    DataSource dataSource;

    @EventHandler

    public void handleProductStockUpdatedEvent(StockUpdatedEvent event) {

    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);

    jdbcTemplate.update("UPDATE ecom_product_view SET stock=? WHERE ID=?",

    new Object[]{event.getStock(), event.getId()});

    }

    }

    Listing 12-12

    Event Handler for Product (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\product\eventhandler\ProductEventHandler.java)

    ```


    The product event handler will update the change in stock level of the product
    to the Product Read DB. In this way, every new order creation changes the Order
    and Product Write DBs, and all these changes are eventually propagated to the
    Read DB too.


    ## Build and Test the Example Scenario


    The complete code required to demonstrate this simple Axon example is in folder
    `ch12\ch12-01`. First, update the configuration files to suit to your environment:


    ```

    ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\resources\application.properties

    spring.datasource.url=jdbc:mysql://localhost/ecom01

    spring.datasource.username=root

    spring.datasource.password=rootpassword

    ```


    Make sure MySQL is up and running. You may want to refer to Appendix H to get
    started with MySQL.


    ```

    First Bring Up MySQL Server.

    D:\Applns\MySQL\mysql-8.0.14-winx64\bin>mysqld --console

    Now Open MySQL prompt

    D:\Applns\MySQL\mysql-8.0.14-winx64\bin>mysql -u root –p

    mysql> use ecom01;

    Database changed

    mysql>

    ```


    To start with clean tables, delete any tables with the names you want for your
    examples:


    ```

    mysql> drop table ecom_order;

    mysql> drop table ecom_product;

    mysql> drop table ecom_order_view;

    mysql> drop table ecom_product_view;

    ```'
