- fmt: "# Send and Receive Messages to Multi-Node RabbitMQ Cluster\n\nYou will now\
    \ look at code for sending messages to a RabbitMQ cluster. Refer to Appendix B\
    \ again to follow step-by-step instructions to install and bring up a RabbitMQ\
    \ cluster. This section assumes that you already have a running RabbitMQ cluster\
    \ with a minimum of two nodes. You further need to refer to Appendix C to follow\
    \ step-by-step instructions to set up a TCP load balancer using Nginx so that\
    \ traffic (rather, connections) from both consumer and producer can be multiplexed\
    \ to at least one of the active nodes of a multinode cluster, if the other nodes\
    \ are down.\n\nThis section is so important because in a microservices environment\
    \ backed with a messaging infrastructure, the high availability of the messaging\
    \ infrastructure by itself will decide the overall reliability of the infrastructure.\
    \ You have seen that microservices instances can be coming (instantiated, restarted,\
    \ etc.) and going (graceful shutdown, crashed, restarted, forcefully killed, etc.)\
    \ in any order or at any pace in an enterprise production setup. Each of these\
    \ microservice instances communicates with others through the messaging infrastructure\
    \ or the event-based infrastructure by sending messages. So, when one microservice\
    \ instance sends a message to the messaging infrastructure successfully, it assumes\
    \ that the message will reach the receiver \"eventually,\" as expected. The high\
    \ availability of the messaging infrastructure must live up to this promise.\n\
    \nAssuming you have a multinode RabbitMQ cluster in high availability mode and\
    \ you also have a TCP load balancer (Nginx configured as a TCP reverse proxy),\
    \ you are all set to try out little trials to verify that your RabbitMQ cluster\
    \ is up and running.\n\nThe sample you saw in the previous section (`ch06-02`)\
    \ can be tweaked to demonstrate the cluster setup and is kept in folder `ch06-03`.\
    \ You can follow a quick demonstration by executing the sample in the following\
    \ order.\n\nIf you didn't do it earlier, copy the following files from the `samples`\
    \ directory (`ch06\\ch06-03\\`) to the `sbin` folder of your RabbitMQ server,\
    \ and execute the scripts in the following order in separate windows:\n\n```\n\
    cd D:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin\nD:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\\
    sbin>rabbitmq-server1.bat\ncd D:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin\n\
    D:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin>rabbitmq-server2.bat\ncd D:\\\
    Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin\nD:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\\
    sbin>rabbitmq-cluster2.bat\n```\n\nThe above will bring up a two-node RabbitMQ\
    \ cluster. Note that you should give enough time for the above commands to finish\
    \ so that the cluster formation is complete.\n\nNow you can set up the TCP load\
    \ balancer by executing the Nginx script. Refer to Appendix C to follow step-by-step\
    \ instructions to configure Nginx as a TCP reverse proxy. After making the right\
    \ entries in the Nginx configuration as shown in the sample file:\n\n```\nch06\\\
    ch06-03\\nginx.conf\n```\n\nBring up the Nginx server like so:\n\n```\ncd D:\\\
    Applns\\nginx\\nginx-1.13.5\nD:\\Applns\\nginx\\nginx-1.13.5>nginx\n```\n\nWhen\
    \ a message producer wants to send messages to a message consumer, it assumes\
    \ that you're interested only in currently flowing messages, not in the old ones.\
    \ Then whenever you connect to Rabbit, you need a fresh, empty queue; once you\
    \ disconnect the consumer, the queue should be automatically deleted. To do this\
    \ in RabbitMQ, you can create a queue with a random name or, even better, let\
    \ the server choose a random queue name for you.\n\nGiving a queue a name is important\
    \ when you want to share the queue between message senders and message consumers.\
    \ So both in\n\n```\nch06\\ch06-03\\src\\main\\resources\\rabbit-listener-context.xml\n\
    ch06\\ch06-03\\src\\main\\resources\\rabbit-sender-context.xml\n```\n\nyou define\
    \ named queues as\n\n```\nThere are numerous combinations by which you can configure\
    \ RabbitMQ\nand also numerous sequences by which you can execute the sample programs\n\
    to validate your RabbitMQ cluster. One combination is explained\nbelow.\n\nAssuming\
    \ your RabbitMQ instances are listening at ports 5672 and 5673,\nand your Nginx\
    \ server is listening on TCP at port 5671, you can use the\nfollowing configuration\
    \ for both the message producer and the message\nconsumer to connect to the cluster:\n\
    ```\n\nThe rest of the configuration is similar to that explained in the example\
    \ in the previous section. Now execute the following:\n\n```\ncd ch06-03\nD:\\\
    binil\\gold\\pack03\\ch06\\ch06-03>mvn test –Psend\n```\n\nThis will send a message\
    \ to the RabbitMQ cluster. This will be confirmed on the message sender window\
    \ with the following DEBUG message:\n\n```\n2017-06-12 19:50:59 DEBUG com.acme.ch06.ex03.Sender.main:32\
    \ - Sender send message----->Message from Sender on Mon Jun 12 19:50:59 IST 2017\n\
    ```\n\nYou may now want to inspect the RabbitMQ log files. Assuming `rabbit1`\
    \ and `rabbit2` are the node names of the RabbitMQ server instances of your cluster,\
    \ the logs are written to below files in my machine:\n\n```\nC:\\Users\\binil\\\
    AppData\\Roaming\\RabbitMQ\\log\\rabbit1.log\nC:\\Users\\binil\\AppData\\Roaming\\\
    RabbitMQ\\log\\rabbit2.log\n```\n\nYou should be able to see the following lines\
    \ in the logs of any of the RabbitMQ instances of the cluster:\n\n```\n=INFO REPORT====\
    \ 12-Jun-2017::19:50:59 ===\naccepting AMQP connection  (127.0.0.1:54315 -> 127.0.0.1:5673)\n\
    =INFO REPORT==== 12-Jun-2017::19:50:59 ===\nMirrored queue 'remoting.queue' in\
    \ vhost '/': Adding mirror on node rabbit1@tiger: \n```\n\nThe above logs validate\
    \ two aspects:\n\n- The instance corresponding to this log file has accepted an\
    \ AMQP connection from the message sender.\n- Upon receiving the message from\
    \ the message sender, the instance corresponding to this log file has mirrored\
    \ the queue, which caused other instance of the RabbitMQ server in the cluster\
    \ to receive the same message.\n\nYou may now bring up the message consumer:\n\
    \n```\ncd ch06-03\nD:\\binil\\gold\\pack03\\ch06\\ch06-03>mvn test –Plisten\n\
    ```\n\nIf everything goes fine, the listener will consume the previously sent\
    \ message and this can be confirmed on the message listener window with the following\
    \ DEBUG message:\n\n```\n2017-06-12 19:56:58 DEBUG com.acme.ch06.ex03.Listener.onMessage:19\
    \ - Listener received message-----> Message from Sender on Mon Jun 12 19:50:59\
    \ IST 2017\n```\n\nTo attempt the next phase of testing your cluster, bring down\
    \ the message consumer by typing `Ctrl+C` in the message consumer window.\n\n\
    Next, send a new message to the cluster using the message producer. Inspect the\
    \ log files of both RabbitMQ instances and find out which instance has consumed\
    \ the message. The instance that consumed the message will have an INFO REPORT\
    \ similar to\n\n```\naccepting AMQP connection  (127.0.0.1:54746 -> 127.0.0.1:5672)\n\
    ```\n\nNext, bring down the same instance that consumed the message by typing\
    \ `Ctrl+C` on the message consumer window. With the other instance of the cluster\
    \ alone running, bring up the message consumer. If everything goes fine, the listener\
    \ will consume the previously sent message. This validates that the cluster is\
    \ working as intended and messages received by one instance are getting mirrored\
    \ to the other instance.\n\nIf a RabbitMQ cluster instance quits or crashes, it\
    \ will forget the queues and messages in that instance unless you tell it not\
    \ to. Two things are required to make sure that messages aren't lost:\n\n- You\
    \ need to mark both the queue and the messages as durable.\n- You need to mark\
    \ your messages as persistent by setting `MessageProperties`.\n\nYou may try out\
    \ these and other options. I won't explain them here, since they are not within\
    \ the scope of this book."
