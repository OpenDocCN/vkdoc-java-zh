  trans: '

    *   **高读写比**：回顾第 5 章关于浏览-预订比率的讨论。一个系统在将一次写入事务转化之前，必须容纳成百上千次读取事务。在当今的企业软件范式中，尤其是在云原生场景下，将操作服务质量（QoS）同时应用于读取和写入事务将是灾难性的，因为每一个
    CPU 周期、每一比特的存储或传输都会增加成本。你的读取事务是**领先**事务，而写入事务是**滞后**事务。前者将“意图”转化为“购买决策”，后者则将“库存”转化为“已实现利润”。两者都很重要，但关键性不同。因功能或系统问题导致的写入事务失败代价高昂，而读取事务失败的影响则较小，因为它可以重试或忽略；与失败的写入事务相比，其价值损失要低得多。用于查询的数据源应与用于命令执行的数据源采用不同的调优方式，并且应针对快速查询进行优化，采用资源上的宽松锁；然而，对于写入事务，你的数据源应确保严格的
    ACID 合规性，这样一旦旅客成功购买了飞机上的最后一个座位，你就有所有手段来尊重这笔购买，从而无需事后向该旅客发送一封遗憾邮件，告知他由于某种原因该座位不可用，因此将为他办理退款！


    *   **单一事实源，多种视图**：“资源”最初在万维网上被定义为通过 URL 标识的文档或文件。然而，如今它们有了更通用和抽象的定义，涵盖了在网络上可以以任何方式被识别、命名、寻址或处理的任何事物或任何实体。在
    RESTful Web 服务中，对资源 URI 的请求将产生一个响应，该响应可以是 CSV、XML、HTML、JSON 或其他格式。应用程序中的相同数据可能以多种方式呈现，有些针对快速搜索进行了优化，有些处于缓存状态以实现最大响应速度，还有一些则以预定义报告的形式呈现，如
    Excel 或 PDF 文件。这就是以多种视图存在的单一事实源在应用层面的现实。CQRS 明确地解决了这一需求，并且还帮助你在发生变更时，通过引发事件的形式，使不同的视图与单一事实源保持同步。


    *   **具有多样化交互的应用程序**：某些应用程序的用户群与系统的交互程度各不相同。例如，一个电子商务应用程序拥有终端用户或客户进行零售购买，这是用户群的一部分，数量庞大；而且，这些客户期望毫秒级的响应时间。另一部分是管理库存的后台店员，其数量有限，如果软件偶尔运行缓慢或卡顿，他们会感到困扰。第三部分是与供应链连接的
    B2B 接口，其数量更少，表现为少数已知的 IP 地址，如果接口中断几分钟，他们也会受到影响，因为之后他们必须重试。根据交互方的类型以及代表这些方进行的交易的整体价值和关键性，同一应用程序内的软件服务可能必须表现出不同级别的访问权限、安全性、性能等。微服务架构将在这方面为你提供帮助，而采用
    CQRS 将为你提供额外的优势，以应对这些异构类型的交互。


    *   **具有自治接口的应用程序**：物联网（IoT）和万维物联网（WoT）是当前的软件范式，它们给软件架构师带来了一系列新的挑战。使用命令和事件对应用程序
    API 进行严格定义，使得与这些物和设备的接口集成变得更加容易。任何接口都可以发送命令或监听主机接口生成的事件。


    以上列表仅提供了 CQRS 能够增值的问题特征的一般性列表；它绝非详尽无遗。


    运行 Axon 所需的条件

    Axon 框架是基于 Java 6 构建和测试的，因此这基本上是其唯一的要求。你可以使用 Gradle 或 Maven 进行构建，也可以使用任何你喜欢的 IDE。由于
    Axon 本身不创建任何连接或线程，因此在应用服务器上运行是安全的。Axon 通过使用执行器（executors）来抽象所有异步行为，这些执行器将任务提交与每个任务如何运行的机制解耦。因此，你甚至可以轻松地传入一个由容器管理的线程池。如果你不使用应用服务器（例如
    Tomcat、Jetty 或独立应用程序），你可以使用`Executors`类或 Spring 框架来创建和配置线程池。

    现在，你将看到一些具体的示例，并了解 Axon 代码的实际应用。


    在同一个 JVM 中处理命令和事件

    先从简单的事情开始，所以让我们把 Axon 的第一个示例保持简单。然而，我无法让它更简单了。为了介绍 Axon，你必须首先理解一个 Axon 方式的简单场景，然后了解
    Axon 中每个步骤的细节。


    示例场景


    第一个 Axon 示例来自一个电子商务应用程序的单个微服务。领域中有两个实体：订单和产品。用户可以购买产品，这将创建一个新订单。当新订单创建时，产品库存将减少。仅此而已。图
    12-1 描绘了带有完整流程标注的架构。


    ![../images/477630_1_En_12_Chapter/477630_1_En_12_Fig1_HTML.jpg](img/477630_1_En_12_Fig1_HTML.jpg)


    图 12-1. 在同一个 JVM 中处理 Axon 命令和事件


    第 5 章中的“基于事件的 CQRS 设计元模型”一节展示了一个基于 CQRS 架构的元模型。图 12-1 是第 5 章中图 5-5 所表示的抽象元模型的一个具体实例。


    现在让我们探索端到端的流程，该流程在图中标注如下：


    1.  当你在浏览器中点击“立即订购一个！”按钮时，一个 REST/JSON 请求会命中订单控制器。

    '
