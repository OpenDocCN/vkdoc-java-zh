    高事务性系统必须在单位时间内处理数百万个请求，因此这类系统的每秒事务处理量（TPS）非常高。当我们讨论**Web 规模架构**时尤其如此。通过提升处理请求节点的计算能力，我们可以增加吞吐量；这被称为**垂直扩展**。然而，存在一个极限，超过该极限后，在同一节点上增加计算能力将无法带来成比例的性能提升，如图
    11-9 所示。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig9_HTML.jpg](img/477630_1_En_11_Fig9_HTML.jpg)


    **图 11-9. 垂直扩展**


    通过**水平扩展**技术可以进一步提升吞吐量。在 Web 规模下运行软件需要分发软件运行时的多个副本。这也意味着数据集的多个副本分布在许多节点上。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig10_HTML.jpg](img/477630_1_En_11_Fig10_HTML.jpg)


    **图 11-10. 扩展立方体**


    我们来谈谈**扩展立方体**，它涉及三维扩展。图 11-10 描绘了三维扩展，其中每个轴代表在不同层面扩展你的应用程序：


    *   **X 轴（水平扩展）**：在此，你复制同一个微服务的多个实例，并使用负载均衡器来分发流量。


    *   **Y 轴（功能分解）**：微服务是 Y 轴扩展的一种方法，你根据功能拆分应用程序组件。


    *   **Z 轴（数据分区）**：在此，每个微服务或功能可以根据某些标准进一步拆分。一个 Web 规模的应用可以分发流量，例如，所有姓氏以 A 到 G 开头的请求发送到服务器集群
    X，H 到 O 发送到服务器集群 Y，P 到 Z 发送到服务器集群 Z。这种技术称为**名称分片**。


    每种扩展方法都必须解决数据一致性问题。在企业应用中，你有**主数据**（或查找数据）和**事务数据**。主数据或多或少是静态的，而事务数据则随着事务不断改变状态。X
    轴、Y 轴和 Z 轴扩展依赖于网络来让分布式服务共享数据。因此，你可以在每个轴上分发数据和服务的多个副本以增加可扩展性，或者让多个节点托管服务以提高可用性。一旦你拥有多个节点，就需要网络进行互联，因此网络提供了**分区容错性**。此外，如果你拥有数据或代码（服务运行时）的多个副本，就需要解决数据一致性问题。我将在下一节对此进行更详细的描述。


    **CAP 定理**


    CAP 定理描述了三个相互依赖的架构属性：


    *   **一致性**


    *   **可用性**


    *   **分区容错性**


    该定理指出，你最多只能保证这三个属性中的两个。如果你增加或提升其中一个属性，就必须以牺牲另一个（或两个）属性为代价。换句话说，你可以拥有一个高可用、一致的系统，但其分区容错性会很低；或者你可以拥有一个高可用、可分区的系统，但很可能需要放弃一致性。


    图 11-11 以图形方式描绘了 CAP 定理。它表明，你可以从 C、A 和 P 中选择任意两个，但无法同时实现所有三个。让我们更好地理解这意味着什么。首先，我们来看
    CAP 定理中 C、A 和 P 的定义。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg](img/477630_1_En_11_Fig11_HTML.jpg)


    **图 11-11. CAP 定理**


    *   **一致性**：所有微服务节点对数据拥有相同的视图。


    *   **可用性**：每个微服务在任何时候都可以读取或写入任何其他微服务。


    *   **分区容错性**：即使微服务之间存在物理网络分区，整个微服务应用程序也能正常工作。


    像 Oracle 这样的关系型数据库在提供一致性方面表现出色，因为它们专注于 ACID 属性，并通过提供对事务隔离的精细控制来实现一致性。因此，在之前的电子商务示例中，当客户
    Joe 确认购买某产品的最后一件库存商品，并同时将库存减少一件时，任何中间状态都对客户 Ann 隔离，Ann 必须等待几毫秒或几微秒，直到 RDBMS 表或行锁被释放，数据存储达到一致状态。

    可用性意味着就事务而言，服务能够完全正常运行。在企业应用中，如果某个服务实例宕机，会使用集群感知的代理或客户端存根回退到冗余实例。Oracle 的**真正应用集群（RAC）**
    在此值得关注，因为它坚定地承诺同时提供磁盘上数据的一致性和运行时进程中 DBMS 服务的可用性。一旦你能够使用第 9 章“数据或存储冗余”一节中提到的技术将数据位传输到磁盘级别，你就可以确信你的数据位足够持久。然而，该节中提到的技术会增加形成分区的可能性！

    当你使用 SQL 客户端并在运行 Oracle 数据库的同一节点上发出“Select for Update”^((21)) 或类似命令时，你的节点充当一种**原子处理器**，要么正常工作，要么不工作（即，如果崩溃了，它不可用，但也不会导致数据不一致）。当你开始为了可扩展性或可用性而将处理逻辑与数据分离并分布到不同节点时，就存在形成分区的风险。例如，当网络交换机故障、网线被拔出或电源故障导致你的其他节点不可用时，就会发生分区。

    在设计微服务以应对 CAP 定理带来的限制时，必须进行架构权衡。如果你必须防止网络故障，你可以设计没有分区的系统。为此，你需要将与某个事务相关的所有内容放在一台机器上，或者放在一个原子故障单元（如单个机架）中。啊，这听起来熟悉吗？我们是在谈论“一个微服务”吗？你已经看到，微服务根据定义是一个独立可部署、自包含的单元，它拥有并管理自己的数据！接下来还有一个注意事项：即使是一个机架也可能发生部分故障。此外，微服务本身也需要扩展，这意味着你需要考虑冗余。而且，如果单个微服务的水平层必须最佳部署以满足
    SLA，那么分区的需求就会再次出现。是的，你的设计思路在兜圈子，必须考虑你的应用程序特性、业务上下文以及许多其他技术和文化因素，才能在上述循环连续体中确定你的微服务架构的最佳平衡点。


    **BASE（基本可用、软状态、最终一致性）系统**

