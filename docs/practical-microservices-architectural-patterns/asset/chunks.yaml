    ### 企业消息总线


    在企业消息总线拓扑结构中，存在一个通用的通信基础设施，它在应用程序之间充当平台中立和编程语言中立的适配器。该通信基础设施可能包含消息路由器和/或发布-订阅通道。因此，应用程序通过请求-响应队列借助消息总线相互交互。有时，应用程序必须使用适配器来处理诸如调用
    CICS^(¹)（客户信息控制系统）事务等场景。此类适配器可能通过专有的总线 API 和应用程序 API 提供应用程序与消息总线之间的连接。


    ### 企业服务总线 (ESB)


    采用服务总线方法进行集成，是利用一种技术解决方案来提供用于应用程序集成的总线。不同的应用程序不会为了集成而直接相互通信；相反，它们通过这个中间件面向服务架构
    (SOA) 主干进行通信。ESB 架构最显著的特征是其集成拓扑结构的分布式特性。大多数 ESB 解决方案都基于 Web 服务描述语言 (WSDL) 技术，并使用可扩展标记语言
    (XML) 格式进行消息翻译和转换。与企业消息总线相比，ESB 拓扑结构需要的适配器更少，因为接口的 SOA 特性带来了高度的互操作性。


    ## 软件架构


    在了解了通用的系统架构和网络架构之后，现在让我们探讨如何利用层和层的概念为软件应用程序架构带来模块化和可管理性。


    ### 应用程序层


    层通常为应用程序关注点提供分布式部署能力。典型的应用程序层可以列举如下：


    *   客户端层

    *   表示层

    *   业务层

    *   集成层

    *   资源层


    以上列表并非详尽无遗。同样，我无意详细解释这些层，但通常它们使我们能够对非功能性和技术能力进行分组，并在生产部署期间为这些层提供不同的操作能力。


    ### 应用程序分层


    分层有助于基于单一职责模式分离关注点。例如，可以有一个控制器层，它为应用程序层提供一个中央入口点，我们可以在其中执行身份验证和授权检查、应用程序入口日志记录、路由到正确的模块等操作。类似地，ORM（对象关系映射）层可以执行所需的持久化服务，将应用程序领域对象转换为持久化磁盘中的存储模式，反之亦然。


    每个应用程序层都可以在逻辑上分离为一个或多个应用程序分层。


    ## 应用程序架构全景


    如果我们回顾过去十年，我们一直在利用 n 层或分布式方式来构建应用程序架构。多个应用程序可以相互通信，因为它们基于上述任何一种网络拓扑结构相互连接。


    现在，你将专注于构建一个这样的应用程序。当我谈到“单个应用程序”时，我将该应用程序限定为旨在执行一组相关或分组的功能。例如，一个电子商务应用程序，它帮助企业列出用于销售的产品，并帮助其客户通过
    Web 浏览器在线支付和购买这些产品。类似地，股票交易应用程序是另一个具有与股票交易相关的一组功能的应用程序。通常我们不会将这两个应用程序合并在一起，因为它们代表了两个不同功能集的组合。CRM（客户关系管理）应用程序、忠诚度应用程序、机票预订应用程序和出租车叫车应用程序是此类不同应用程序的几个例子。


    可能存在两个或多个应用程序需要相互通信，或者我们希望将两个或多个应用程序的功能进行混搭的场景。例如，一家假日预订公司的预订应用程序可能希望混搭所选航空公司的机票预订应用程序和上述所选出租车服务提供商的出租车叫车应用程序的服务。这些场景超出了单个应用程序架构的范围，但需要在应用程序集成层面加以考虑。我无意在我们的讨论范围内涵盖诸如应用程序间集成或应用程序混搭等方面。相反，我想专注于“单个应用程序”的架构，其规模可以根据我们希望组合在一起的功能量级，从小型到中型再到大型不等。


    既然我提到电子商务应用程序足以被称为一个单个应用程序，我将使用这个类比来讨论本书中的概念和关注点。你将在不同的章节中了解电子商务应用程序功能的细节，但暂时你可以假设电子商务应用程序是一个规模适中的应用程序，可以帮助你理解我们希望在本书中讨论的几乎所有关注点。

    '
- fmt: '### Typical Application Architecture


    Many modern applications used by enterprises today have been built using the n-tier
    architecture and object-oriented programming languages and are capable of being
    deployed using distributed technologies and infrastructure. The selection of appropriate
    layers and tiers enables deployment in a flexible manner to meet scalability requirements.
    Let’s now look at a typical application architecture for an e-commerce application
    deployed in a distributed manner.


    Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3) represents a typical application
    architecture. It is a three-tier application in the sense that the presentation
    tier is separated out from the business tier, and there is a third database tier
    too. The presentation tier is packaged as a `.war` file and encompasses all artifacts
    required to render the UI in a web browser. The business tier is packaged in a
    `.jar` format and contains most of the business functionality and business rules.
    You may also club the presentation tier and the business tier together and create
    an application artifact in an `.ear` format.


    The presentation tier and the business tier can be deployed separately into their
    own set of dedicated server hardware configured either as a simple server farm
    or as a server cluster. A server farm is a set of server instances hosting application
    components in such a fashion that subsequent traffic from a single browser instance
    can be routed to any one instance irrespective of which server instance the previous
    request was routed to. Typically a load balancer sitting in front of the farm
    will distribute the traffic. Further, application components deployed in a server
    farm will typically be stateless, which means traffic from a single browser instance
    can be routed to any one instance irrespective of which server instance the previous
    request was routed to. In this manner, the requests are “not sticky,” whereas
    in a server cluster, typically the server instances coordinate themselves with
    heartbeats and state replication. Here, the requests are sticky, which means requests
    from a single browser will always be routed to the same server instance in the
    cluster as long as that server instance is live. However, non-sticky requests
    can also be served by a cluster depending on how the cluster and load balancer
    is configured.


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig3_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig3_HTML.jpg)


    Figure 1-3. Typical application architecture


    The database tier hosts the data management capability. It handles CRUD (Create,
    Read, Update, and Delete) requests and also takes care of data consistency functionality
    by coordinating concurrent CRUD requests appropriately.


    Let’s now look at the application in more detail. To be specific, assume that
    the presentation tier and the business tier are deployed separately, in which
    case the application tier hosts the business tier alone. Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3)
    denotes the application boundary, which is the business boundary itself. I talked
    about tiers and layers earlier, and equally important is dividing the application
    into multiple pieces, called modules. So, a module can be defined as a group of
    functionalities and components that are closely related and hence have a lot of
    “cohesion” between them. Multiple such modules that have the next level of “adhesion”
    between them make up the full application. Even though the module boundary is
    represented separately in the figure, in practice, such a differentiated separation
    may or may not exist in the physical software bundle. To be clear, when we design
    or build many such modules to get packaged into a single `.jar` or `.ear` file,
    there is nothing to prevent us from making requests from one module to another,
    and as the number of such dependencies increases, the adhesion between the modules
    increases. Hence, the boundary represented is just a virtual boundary that still
    allows chit-chattiness between modules. Typically, this chit-chattiness may be
    realized by in-process method invocations. The main realistic boundary in such
    an architecture is the application boundary itself and it is at this boundary
    we typically apply SOA (service-oriented architecture) and similar principles.
    If we want to deploy the modules into multiple processes, we may want to use suitable
    remoting methodologies for intermodule communications, but this can be possible
    only if we have designed the modules for this because it cannot be done as an
    afterthought.


    ### Typical Deployment Architecture


    As mentioned, we can club the presentation tier and the business tier together
    and create an application artifact in a `.ear` format for deployment, or they
    can be kept separate as `.war` and `.jar` files, which will allow a more flexible
    deployment where the presentation tier and the business tier are separated. If
    these two tiers are deployed together, it will allow for optimized intermodule
    communications by making local method calls. The reason to separate them is to
    allow differentiated scale-out deployments between these two tiers, and when we
    do that, a suitable remoting methodology has to be adopted to facilitate intertier
    communication. Generally we use Java RMI or more generic IIOP or more flexible
    protocols like HTTP for this intertier communication.


    As shown in Figure [1-4](#477630_1_En_1_Chapter.xhtml#Fig4), there can be one
    or more network layer firewalls positioned in front of these tiers to control
    the level of access to functionality to clients from known networks alone. It’s
    the same case with the database tier. This means we will be able to apply configurations
    so as to allow only valid application-related calls from the Internet to the presentation
    tier, and then put more strict rules in front of the other tiers to allow calls
    to the business tiers only from known and valid IPs.


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig4_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Typical deployment architecture


    If the application services are designed to be stateless, by adopting a suitable
    deployment architecture we can address any increase in traffic volumes. Further,
    the level of scale out of the presentation tier is independent of the level of
    scale out of the business tier. A special note is required at the database tier.
    While the presentation tier is responsible for assembling contents for effective
    rendering of the UI, the business tier is responsible for effecting changes to
    the business data. The sole purpose of the database tier is to keep the state
    of the data accessible across user requests or across server restarts, that too
    in a consistent manner. So the database tier is the place for the single source
    of truth of data. And this puts limitations for scaling at the database tier.
    The scale out strategy for a database tier is to be different from that of the
    other tiers in the sense that concurrently modifiable data cannot be replicated
    just like that because then we need to address the requirement of reconciliation.
    Generally, the solution to the problem of database scale out and the associated
    problems of data consistency and data reconciliation are provided by database
    vendors, not by application architects. This same reason makes the technology
    stack at the database tier expensive compared to other tiers. Oracle RAC (Real
    Application Cluster) is one technology in this space. Equally important is another
    fact that even after these expensive solutions, the level of scale out achievable
    at the database tier is not comparable to that which can be achieved at other
    tiers since a database is always stateful, not stateless.'
  raw: '### Typical Application Architecture


    Many modern applications used by enterprises today have been built using the n-tier
    architecture and object-oriented programming languages and are capable of being
    deployed using distributed technologies and infrastructure. The selection of appropriate
    layers and tiers enables deployment in a flexible manner to meet scalability requirements.
    Let’s now look at a typical application architecture for an e-commerce application
    deployed in a distributed manner.


    Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3) represents a typical application
    architecture . It is a three-tier application in the sense that the presentation
    tier is separated out from the business tier, and there is a third database tier
    too. The presentation tier is packaged as a `.war` file and encompasses all artifacts
    required to render the UI in a web browser. The business tier is packaged in a
    `.jar` format and contains most of the business functionality and business rules.
    You may also club the presentation tier and the business tier together and create
    an application artifact in an `.ear` format.


    The presentation tier and the business tier can be deployed separately into their
    own set of dedicated server hardware configured either as a simple server farm
    or as a server cluster. A server farm is a set of server instances hosting application
    components in such a fashion that subsequent traffic from a single browser instance
    can be routed to any one instance irrespective of which server instance the previous
    request was routed to. Typically a load balancer sitting in front of the farm
    will distribute the traffic. Further, application components deployed in a server
    farm will typically be stateless, which means traffic from a single browser instance
    can be routed to any one instance irrespective of which server instance the previous
    request was routed to. In this manner, the requests are “not sticky,” whereas
    in a server cluster, typically the server instances coordinate themselves with
    heartbeats and state replication. Here, the requests are sticky, which means requests
    from a single browser will always be routed to the same server instance in the
    cluster as long as that server instance is live. However, non-sticky requests
    can also be served by a cluster depending on how the cluster and load balancer
    is configured.


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig3_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    Typical application architecture


    The database tier hosts the data management capability. It handles CRUD (Create,
    Read, Update, and Delete) requests and also takes care of data consistency functionality
    by coordinating concurrent CRUD requests appropriately.


