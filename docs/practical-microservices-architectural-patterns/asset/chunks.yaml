    You may now open this HTML utility preferably in the Chrome browser: `ch08\ch08-05\ProductWeb\src\main\resources\product.html`.
    Upon loading itself, the browser client will fire a request to Product Web, listening
    on port 8082, which will delegate the call to any one instance of the Product
    Server microservice. Repeated browser refreshing will load balance the hits from
    the Product Web microservice to the Product Server microservice instances, which
