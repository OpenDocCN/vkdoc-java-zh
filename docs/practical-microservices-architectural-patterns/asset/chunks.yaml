  trans: "\n```\n    @Component\n    public class OrderHistoryEventHandler {\n   \
    \ @Autowired\n    private OrderHistoryRepository orderHistoryRepository;\n   \
    \ @EventHandler\n    public void handleOrderCreationEvent(OrderCreatedEvent event,\n\
    \    Message eventMessage, @Timestamp DateTime moment) {\n    Order order =new\
    \ Order();\n    order.setOrderId(event.getOrderId());\n    order.setUserId(event.getUserId());\n\
    \    order.setCreationDate(new Date());\n    order.setOrderStatus(event.getOrderStatus());\n\
    \    List lineItems=new ArrayList();\n    if(event.getLineItems()!=null){\n  \
    \  for(LineItemDTO lineItemDTO:event.getLineItems()){\n    LineItem lineItem=new\
    \ LineItem();\n    lineItem.setProductId(lineItemDTO.getProductId());\n    lineItem.setPrice(lineItemDTO.getPrice());\n\
    \    lineItem.setQuantity(lineItemDTO.getQuantity());\n    lineItems.add(lineItem);\n\
    \    }\n    }\n    order.setLineItems(lineItems);\n    orderHistoryRepository.save(order);\n\
    \    }\n    }\n    清单 17-12\n    handleOrderCreationEvent (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-history\\src\\main\\java\\com\\acme\\ecom\\order\\history\\event\\handler\\\
    OrderHistoryEventHandler.java)\n    ```\n\n稍后你还会看到，每当 Ecom-core 微服务中订单聚合的状态发生变化时，该历史记录表中的数据也会同步更新。如有需要，BI\
    \ 或分析功能可以基于这些记录执行，因为它们位于与 Ecom-core 微服务中订单聚合相独立的微服务中，因此不会影响订单聚合的性能。\n至此，“创建新订单”流程完成。稍后你将在“测试电子商务微服务用例”章节下的“创建新订单”小节中查看实际用例的执行过程。\n\
    \n取消订单\n\n如果新创建的订单尚未进入履行流程，用户可以将其取消。图 17-7 描述了取消命令发起后，不同实体所经历的各种状态。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig7_HTML.jpg](img/477630_1_En_17_Fig7_HTML.jpg)\n\
    \n图 17-7\n取消订单\n\n参考图 17-7，由 Web 应用发送 REST JSON 请求以取消订单的端到端流程可总结如下：\n\n1.  order_service.js\
    \ 通过 HTTP 发送 REST JSON 请求以取消订单：\n\n```\n    $http.delete(sessionStorage.getItem('apiUrl')+'/core/order/'+orderId)\n\
    \    ```\n\n该请求会到达 API 网关。\n\n2.  API 网关通过查询服务注册表来解析 URL，并将请求定向到 Ecom-core 微服务中的\
    \ Order REST Controller。\n\n3.  Order REST Controller 创建一个新的 OrderCancelCommand\
    \ 并将其发送到命令网关。参见清单 17-13。\n\n```\n    @RestController\n    @RequestMapping(\"/order\"\
    )\n    public class OrderController {\n    @RequestMapping(value = \"{orderId}\"\
    , method = RequestMethod.DELETE)\n    @Transactional\n    @ResponseBody\n    public\
    \ void cancelOrder(@PathVariable Long orderId) {\n    OrderCancelCommand orderCommand\
    \ = new OrderCancelCommand(orderId);\n    commandGateway.send(orderCommand);\n\
    \    }\n    }\n    清单 17-13\n    Order Controller cancelOrder (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\web\\\
    OrderController.java)\n    ```\n\n4.  命令网关将 OrderCancelCommand 投递到命令总线。\n\n5.\
    \  OrderCommandHandler 从命令总线消费 OrderCreateCommand。参见清单 17-14。\n\n```\n    @Component\n\
    \    public class OrderCommandHandler {\n    @CommandHandler\n    public void\
    \ handleOrderCancel(OrderCancelCommand orderCancelCommand) {\n    Order order\
    \ = orderRepository.load(orderCancelCommand.getOrderId());\n    order.cancelOrder();\n\
    \    rollbackInventory(order);\n    }\n    private void rollbackInventory(Order\
    \ order){\n    for(LineItem lineItem:order.getLineItems()){\n    Inventory inventory\
    \ =\n    inventoryRepository.load(lineItem.getInventoryId());\n    inventory.updateProductStock(lineItem.getQuantity(),\n\
    \    ProductStockOperation.ADD);\n    }\n    }\n    }\n    清单 17-14\n    OrderCommandHandler\
    \ handleOrderCancel (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\\
    java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n\
    \    ```\n\n6.  OrderCommandHandler 从仓库中检索相应的订单并调用 cancelOrder。选定的订单聚合将其状态更改为\
    \ OrderStatus.CANCELLED。参见清单 17-15。\n\n```\n    @Entity(name=\"order\")\n    @Table(name\
    \ = \"CUSTOMER_ORDER\")\n    public class Order extends AbstractAggregateRoot\
    \ {\n    public void cancelOrder(){\n    this.orderStatus=OrderStatus.CANCELLED;\n\
    \    registerEvent(new OrderUpdatedEvent(this.id, orderStatus.name(),\n    new\
    \ Date(),null));\n    registerEvent(new OrderCancelledEvent(this.id));\n    }\n\
    \    }\n    清单 17-15\n    Order Aggregate cancelOrder (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\model\\Order.java)\n\
    \    ```\n\n7.  订单聚合将 OrderUpdatedEvent 发送到集群事件总线。\n\n8.  订单聚合还会将 OrderCancelledEvent\
    \ 发送到集群事件总线。\n\n9.  作为第 5 步的结果，OrderCommandHandler 还会检索与该订单关联的所有产品的库存项，并调用 updateProductStock。其目的是回滚库存以抵消取消订单的影响，从而使这些库存可以再次用于销售。清单\
    \ 17-14 中的 rollbackInventory 描述了这一点。\n\n参见清单 17-8 以了解库存聚合实体中的 updateProductStock\
    \ 代码。\n\n10. 在恢复库存时，每个库存聚合都会向集群事件总线注册一个 InventoryUpdateEvent。\n\n11. 在第 8 步中注册的\
    \ OrderCancelledEvent 由订单流程 Saga 消费。参见清单 17-16。\n\n```\n    public class OrderProcessSaga\
    \ extends AbstractAnnotatedSaga {\n    private Long orderId;\n    @EndSaga\n \
    \   @SagaEventHandler(associationProperty = \"orderId\")\n    public void handleOrderCanceledEvent(\n\
    \    OrderCancelledEvent orderCancelledEvent) {\n    // 不做任何操作\n    }\n    }\n\
    \    清单 17-16\n    OrderProcessSaga handleOrderCanceledEvent (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\\
    saga\\handler\\OrderProcessSaga.java)\n    ```\n\nSaga 的生命周期在调用 handleOrderCanceledEvent\
    \ 处理器后结束，因为你已在该 Saga 的事件处理器上使用了 `@` `EndSaga` 注解。\n\n让 Saga 在事件发生时采取行动很容易，就像你这里的\
    \ OrderCancelledEvent 事件一样。但是，如果你希望 Saga 在很长时间内没有任何事情发生时执行某些操作，该怎么办？在这种情况下，会使用截止时间。虽然信用卡支付的确认应在几秒内完成，但像你这里的在线订单，可能需要几小时或几天。你可以使用\
    \ EventScheduler 来调度一个事件以遵守截止时间。Axon 提供了两种 EventScheduler 实现：SimpleEventScheduler（纯\
    \ Java 实现）和 QuartzEventScheduler（使用 Quartz 2 作为底层调度机制）。我在本例中没有使用它们；这留给读者作为练习。\n"
- fmt: "12.  While reinstating the stock in Step 10, the inventory aggregate registers\
    \ an `InventoryUpdateEvent` into the clustered event bus. This `InventoryUpdateEvent`\
    \ is consumed by the `InventoryEventHandler` in the Ecom-product microservice.\n\
    \n13.  The `InventoryEventHandler` in the Ecom-product microservice refreshes\
    \ its own materialized view of the inventory read model. Listing [17-11](#477630_1_En_17_Chapter.xhtml#PC15)\
    \ shows the code of `handleInventoryUpdates` doing this.\n\n14.  In Step 7 when\
    \ the order aggregate is notified of an order cancellation, it registers an `OrderUpdatedEvent`\
    \ into the clustered event bus. This `OrderUpdatedEvent` is consumed by the Order\
    \ History Event Handler in the Ecom-history microservice.\n\n15.  The Order History\
    \ Event Handler in the Ecom-history microservice updates the corresponding record\
    \ of Order in the `Order History` table. See Listing [17-17](#477630_1_En_17_Chapter.xhtml#PC22).\n\
    \n```\n    @Component\n    public class OrderHistoryEventHandler {\n    @EventHandler\n\
    \    public void handleOrderUpdatedEvent(OrderUpdatedEvent event,\n    Message\
    \ eventMessage, @Timestamp DateTime moment) {\n    Order order =orderHistoryRepository.findByOrderId(event.getOrderId());\n\
    \    order.setOrderStatus(event.getOrderStatus());\n    if(event.getOrderStatus().equals(\"\
    SHIPPED\")){\n    order.setShippedDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    DELIVERED\")){\n    order.setDeliveredDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    CANCELLED\")){\n    order.setCancelledDate(event.getDate());\n    }else if(event.getOrderStatus().equals(\"\
    DELIVERY_FAILED\")){\n    order.setDeliveryFailReason(event.getDescription());\n\
    \    }\n    orderHistoryRepository.save(order);\n    }\n    }\n    Listing 17-17\n\
    \    OrderHistoryEventHandler handleOrderUpdatedEvent (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-history\\src\\main\\java\\com\\acme\\ecom\\order\\history\\event\\handler\\\
    OrderHistoryEventHandler.java)\n    ```\n\nThis completes the “cancel an order”\
    \ flow, and you will look at the execution of the actual use case in subsequent\
    \ section.\n\n## Ship an Order Received\n\nIn the “Create a New Order” subsection\
    \ you the flow of creating a new order. All new orders created will be available\
    \ for the back office admin to take and trigger the fulfilment processing. The\
    \ first step in order fulfilment is to trigger a shipping command. Figure [17-8](#477630_1_En_17_Chapter.xhtml#Fig8)\
    \ illustrates the state changes of various entities during the shipping step.\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig8_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig8_HTML.jpg)\n\
    \nFigure 17-8\nShip an Order\n\nReferring to Figure [17-8](#477630_1_En_17_Chapter.xhtml#Fig8),\
    \ the end-to-end flow as a result of a REST JSON request using the web app from\
    \ the back office admin to ship an order can be summarized as follows:\n\n1. \
    \ `order_service.js` sends a REST JSON request over HTTP to ship a newly created\
    \ order:\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/shipping/shipping',shippingDTO)\n\
    \    ```\n\nThis request hits the API gateway.\n\n2.  The API gateway interprets\
    \ the URL by looking at the Service Registry and directs the request to the Order\
    \ Shipping REST Controller in the Ecom-shipping microservice.\n\n3.  The Order\
    \ Shipping REST Controller creates a new `OrderShippingCommand` and sends it to\
    \ the command gateway. See Listing [17-18](#477630_1_En_17_Chapter.xhtml#PC24).\n\
    \n```\n    @RestController\n    @RequestMapping(\"/shipping\")\n    public class\
    \ OrderShippingController {\n    @Autowired\n    private CommandGateway commandGateway;\n\
    \    @RequestMapping(method = RequestMethod.POST)\n    @ResponseBody\n    public\
    \ void shipOrder(@RequestBody ShippingDTO shippingDTO) {\n    OrderShippingCommand\
    \ orderCommand =\n    new OrderShippingCommand(shippingDTO.getOrderId());\n  \
    \  commandGateway.send(orderCommand);\n    }\n    }\n    Listing 17-18\n    OrderShippingController\
    \ shipOrder (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\\
    com\\acme\\ecom\\shipping\\web\\OrderShippingController.java)\n    ```\n\n4. \
    \ The command gateway delivers the `OrderShippingCommand` to the command bus.\n\
    \n5.  The `OrderShippingCommandHandler` consumes the `OrderShippingCommand` from\
    \ the command bus. See Listing [17-19](#477630_1_En_17_Chapter.xhtml#PC25).\n\n\
    ```\n    @Component\n    public class OrderShippingCommandHandler {\n    @Autowired\n\
    \    private EventBus eventBus;\n    @CommandHandler\n    public void handleOrderShipping(\n\
    \    OrderShippingCommand orderShippingCommand) {\n    eventBus.publish(asEventMessage(new\
    \ OrderShippedEvent(\n    orderShippingCommand.getOrderId(), new Date())));\n\
    \    }\n    }\n    Listing 17-19\n    OrderShippingCommandHandler handleOrderShipping\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-shipping\\src\\main\\java\\com\\\
    acme\\ecom\\shipping\\command\\handler\\ OrderShippingCommandHandler.java)\n \
    \   ```\n\n6.  The `OrderShippingCommandHandler` creates a new `OrderShippedEvent`\
    \ and sends it to the clustered event bus.\n\n7.  When an `OrderShippedEvent`\
    \ appears in the clustered event bus, the `handleOrderShippedEvent` `SagaEventHandler`\
    \ of `OrderProcessSaga` picks it up.\n\n8.  The `handleOrderShippedEvent` in `OrderProcessSaga`\
    \ is similar to a normal event handler in Axon. It doesn’t start or end the existing\
    \ saga; instead, it needs to do a certain action alone, sending a new `OrderUpdateCommand`\
    \ to the command gateway in your case. See Listing [17-20](#477630_1_En_17_Chapter.xhtml#PC26).\n\
    \n```\n    public class OrderProcessSaga extends AbstractAnnotatedSaga {\n   \
    \ private Long orderId;\n    @SagaEventHandler(associationProperty = \"orderId\"\
    )\n    public void handleOrderShippedEvent(OrderShippedEvent orderShippedEvent)\
    \ {\n    commandGateway.send(new OrderUpdateCommand(\n    orderShippedEvent.getOrderId(),OrderStatus.SHIPPED));\n\
    \    }\n    }\n    Listing 17-20\n    OrderProcessSaga handleOrderShippedEvent\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
    ecom\\core\\order\\saga\\handler\\OrderProcessSaga.java)\n    ```\n\n9.  The command\
    \ gateway delivers the `OrderUpdateCommand` to the command bus.\n\n10.  The `OrderCommandHandler`\
    \ is interested in the `OrderUpdateCommand`. See Listing [17-21](#477630_1_En_17_Chapter.xhtml#PC27).\n\
