    ## Eureka, the Service Registry


    Eureka is a REST-based registry service that is primarily used in public cloud-based
    deployments, especially in the AWS cloud. Using Eureka you can locate microservices
    for the purpose of load balancing and failover. Eureka is Spring Cloud’s service
    registry, which acts as a phone book for your microservices. Each microservice
    self-registers with the service registry, telling the registry where it lives
    (host, node name, port, etc.) and perhaps other service-specific metadata. Eureka
    has two parts, the Eureka Server and a client component, the Eureka Client, which
    makes interactions with the registry service much easier. The client also has
    a built-in load balancer that does basic round-robin load balancing.


    A service registry like Eureka has another feature that provides one or more levels
    of indirection for service consumers. This means service consumers can do a registry
    look-up using a logical service name, and this logical service name may be mapped
    to a different actual deployed service whose physical address entries are mapped
    against the above logical name. This insulates the service consumers from any
    changes happening to actual service details or whatever in the physical deployment
    environment. In the sample explained in the “Ribbon” section, you might have noticed
    hard-coded values for the service URL like:


    ```

    localhost:8080,localhost:8081

    ```'
