  raw: "Instead of publishing all events to all saga instances in the system,\nAxon\
    \ will only publish events containing properties that the saga has\nbeen associated\
    \ with. This is done using association values. An\nassociation value consists\
    \ of a key and a value. The key represents the\ntype of identifier used, for example\
    \ `orderId` in the code\nabove. The value represents the corresponding value of\
    \ the order ID. The\n`@SagaEventHandler`\nannotation has two attributes, of which\
    \ `associationProperty`\nis the most important one. This is the name of the property\
    \ on the\nincoming event that should be used to find associated sagas. The key\
    \ of\nthe association value is the name of the property. The value is the\nvalue\
    \ returned by property’s getter method.\n\nMicroservice 4: 04-Ecom-EventHandleCore\n\
    \nAs the name of the microservice hints, it contains the two main event\nhandlers,\
    \ OrderEventHandler and\nProductEventHandler, and their functionality is to update\
    \ the views of\nOrder and Product respectively, in response to the following events:\n\
    \n*   OrderCreatedEvent\n\n*   OrderConfirmedEvent\n\n*   OrderCancelledEvent\n\
    \n*   StockUpdatedEvent\n\nListing [15-5](#477630_1_En_15_Chapter.xhtml#PC11)\
    \ shows the\norder event handler code, which updates the order view.\n\n```\n\
    @Component\npublic class OrderEventHandler {\n@Autowired\nDataSource dataSource;\n\
    @EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent event) {\n\
    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_view VALUES(?,?,?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ event.getPrice(),\nevent.getNumber(), event.getProductDescription(), NEW});\n\
    }\n@EventHandler\npublic void handleOrderConfirmedEvent(OrderConfirmedEvent event)\
    \ {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CONFIRMED, event.getOrderId()});\n\
    }\n@EventHandler\npublic void handleOrderCancelledEvent(OrderCancelledEvent event)\
    \ {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CANCELLED, event.getOrderId()});\n\
    }\n}\nListing 15-5\nOrder Event Handler (ch15\\ch15-01\\Ax2-Saga\\04-Ecom-EventHandleCore\\\
    src\\main\\java\\com\\acme\\ecom\\order\\eventhandler\\OrderEventHandler.java)\n\
    ```\n\nListing [15-6](#477630_1_En_15_Chapter.xhtml#PC12) shows the\nproduct event\
    \ handler code, which updates the product view.\n\n```\n@Component\npublic class\
    \ ProductEventHandler {\n@Autowired\nDataSource dataSource;\n@EventHandler\npublic\
    \ void handleProductStockUpdatedEvent(StockUpdatedEvent event) {\nJdbcTemplate\
    \ jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"UPDATE ecom_product_view\
    \ SET stock=?\nWHERE ID=?\", new Object[]{event.getStock(), event.getId()});\n\
    }\n}\nListing 15-6\nProduct Event Handler (ch15\\ch15-01\\Ax2-Saga\\04-Ecom-EventHandleCore\\\
    src\\main\\java\\com\\acme\\ecom\\product\\eventhandler\\ProductEventHandler.java)\n\
    ```\n\nMicroservice 5: 05-Ecom-EventHandlerAudit\n\nThis microservice makes audit\
    \ entries to\nall major events happening against the domain entities. Listing\
    \ [15-7](#477630_1_En_15_Chapter.xhtml#PC13) shows the\naudit event handler.\n\
    \n```\n@Component\npublic class AuditEventHandler {\n@Autowired\nDataSource dataSource;\n\
    @EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent event) {\n\
    JdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ event.getOrderStatus(),\nnew Date()});\n}\n@EventHandler\npublic void handleOrderConfirmedEvent(OrderConfirmedEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ CONFIRMED, new Date()});\n}\n@EventHandler\npublic void handleOrderCancelledEvent(OrderCancelledEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ CANCELLED, new Date()});\n}\n}\nListing 15-7\nAudit Event Handler (ch15\\ch15-01\\\
    Ax2-Saga\\05-Ecom-EventHandlerAudit\\src\\main\\java\\com\\acme\\ecom\\order\\\
    eventhandler\\AuditEventHandler.java)\n```\n\nThe audit event\nhandler creates\n\
    \ audit rows and updates them as the status of order changes.\nThat’s all of the\
    \ main classes. There are few other classes like the\n`Command`, `Event`, and\
    \ `Data Transfer`\nclasses, which are simple and straightforward so I won’t explain\
    \ them\nhere.\n\nBuild and Test the Saga Example\n\nAs the first step, you need\
    \ to bring up MongoDB . You may want to\nrefer to Appendix A to get started with\
