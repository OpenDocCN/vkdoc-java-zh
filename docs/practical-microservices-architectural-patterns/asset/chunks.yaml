    The `Controller` method

    will create a new command and send it to the command bus and wait for it

    to execute. The result of the execution is returned when available. This

    `sendAndWait m`ethod will block indefinitely, until a result is available or

    until the current thread is interrupted. If the thread is interrupted,

    this method returns null. If an exception occurs during processing, it

    is wrapped in a CommandExecutionException.


    Listing [12-8](#477630_1_En_12_Chapter.xhtml#PC8) shows the CommandHandler.


    ```

    @Component

    public class OrderCommandHandler {

    @Autowired

    @Qualifier("orderRepository")

    private Repository orderRepository;

    @Autowired

    @Qualifier("productRepository")

    private Repository productRepository;

    @CommandHandler

    public void handle(NewOrderCommand newOrderCommand){

    Product product =

    productRepository.load(newOrderCommand.getProductId());

    product.depreciateStock(newOrderCommand.getNumber());

    Order order = new Order(new Random().nextInt(),

    newOrderCommand.getPrice(),

    newOrderCommand.getNumber(), OrderStatusEnum.NEW, product);

    orderRepository.add(order);

    }

    }

    Listing 12-8

    Axon Order Command Handler (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\ src\main\java\com\acme\ecom\order\commandhandler\OrderCommandHandler.java)

    ```


    The CommandHandler marker annotation will mark the handle method on

    the OrderCommandHandler as being a CommandHandler. The annotated method’s first

    parameter is the command handled by that method. Optionally, the command

    handler may specify a second parameter of type UnitOfWork. The active

    unit of work will be passed if that parameter is supplied. A type of

    command can be handled by only one type of command handler. So an order

    command handler instance will handle a new order command, and when such

    a command arrives, it will retrieve the corresponding domain object,

    `Product`

    (aggregates) in your case, from a repository, and execute methods on it

    to change the state (depreciate the stock and also create a new order in

    your case). These aggregates typically contain the actual business logic

    and are therefore responsible for guarding their own invariants. The

    state changes of aggregates result in the generation of domain events.

    In the above code, the product stock depreciation and the creation of

    the new order generate events. Both the domain events and the aggregates

    form the domain model.


    You will now look at the code for the events generated. Events are

    simple data-encapsulated POJO classes. See Listing [12-9](#477630_1_En_12_Chapter.xhtml#PC9)
    and Listing

    [12-10](#477630_1_En_12_Chapter.xhtml#PC10).


    ```

    public class StockUpdatedEvent {

    private final Integer id;

    private final Integer stock;

    }

