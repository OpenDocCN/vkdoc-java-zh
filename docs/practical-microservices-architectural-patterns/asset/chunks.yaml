- fmt: "产品详情应与库存信息整合，以便用户判断是否可以将该产品的任意数量添加到购物车。图[17-5](#477630_1_En_17_Chapter.xhtml#Fig5)中的架构显示，库存信息仅在“核心”微服务中可用，该微服务位于产品微服务之外。\n\
    \n您可以做出一个架构决策，允许浏览器通过请求产品微服务来获取产品详情，然后请求核心微服务来检索该特定产品的库存信息，从而在客户端层执行数据整合。\n\n\
    但微服务的原则指出，微服务应自给自足且独立。这意味着，如果您考虑产品微服务和核心微服务，每个微服务都应能够独立运行和服务，无论另一个微服务是否正常运行。如果核心微服务宕机，ACME\
    \ 在线商店仍应能以功能降级的方式运行，允许用户访问主页、浏览产品类别、列出某类别下的产品、查看所选产品的详情（或许也包括库存信息！）、选择并添加商品到购物车等。也许创建订单的功能只有在核心微服务重新启动后才能正常工作。因此，您将采用不同的架构方法，允许产品微服务维护一个库存的物化视图，这是一个只读副本。\n\
    \n要从这个只读副本中检索产品的库存详情，您需要使用库存仓库，如代码清单[17-4](#477630_1_En_17_Chapter.xhtml#PC7)所示。\n\
    \n```java\n@RepositoryRestResource(collectionResourceRel = \"inventory\",\npath\
    \ = \"inventory\")\npublic interface InventoryRepository extends\nMongoRepository\
    \  {\npublic Inventory findByInventoryId(\n@Param(\"inventoryId\") Long  inventoryId);\n\
    public Inventory findBySku(@Param(\"sku\") String  sku);\n}\n```\n\n`product_service.js`检索某个产品类别下的所有产品，如下所示：\n\
    \n```javascript\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/inventory/search/findBySku?sku='+productCode)\n\
    ```\n\n**代码清单 17-4** 库存只读仓库 (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\\
    src\\main\\java\\com\\acme\\ecom\\product\\inventory\\repository\\InventoryRepository.java`)\n\
    \n现在，在客户端层整合来自上述两个 API 源的数据就变得很简单了。\n\n## 将产品添加到购物车\n\n这是一个将所选订单项添加到`org.springframework.cache.CacheManager`并从中检索的简单实现，因此此处不展示代码片段。代码位于`ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-cart`文件夹中。\n\n## 创建新订单\n\n从现在开始要探索的用例并非微不足道，因为微服务之间的控制流有多个方向。如前所述，您不会使用任何同步风格的微服务间通信；相反，您将利用\
    \ Axon CQRS 事件驱动基础设施来促进端到端的控制流。您将使用类似于图[17-6](#477630_1_En_17_Chapter.xhtml#Fig6)所示的表示形式，以便于理解用例执行过程中的控制流和状态变化。\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg)\n\
    \n**图 17-6** 创建新订单\n\n参考图[17-6](#477630_1_En_17_Chapter.xhtml#Fig6)，流程已标记并说明如下。\n\
    \n1.  `order_service.js`通过 HTTP 发送 REST JSON 请求以创建新订单：\n\n    ```javascript\n\
    \    $http.post(sessionStorage.getItem('apiUrl')+'/core/order/',orderDTO)\n  \
    \  ```\n\n    此请求将到达 API 网关。\n\n2.  API 网关通过查看服务注册表来解析 URL，并将请求定向到 Ecom-core 微服务中的订单\
    \ REST 控制器。\n\n3.  订单 REST 控制器创建一个新的`OrderCreateCommand`并将其发送到命令网关并等待。参见代码清单[17-5](#477630_1_En_17_Chapter.xhtml#PC9)。\n\
    \n    ```java\n    @RestController\n    @RequestMapping(\"/order\")\n    public\
    \ class OrderController {\n    @Autowired\n    private CommandGateway commandGateway;\n\
    \    @RequestMapping(method = RequestMethod.POST)\n    @Transactional\n    @ResponseBody\n\
    \    public OrderCreationStatus createOrder(@RequestBody OrderDTO orderDTO) {\n\
    \    OrderCreateCommand orderCommand = new OrderCreateCommand(\n    orderDTO.getUserId(),\
    \ orderDTO.getLineItems());\n    commandGateway.sendAndWait(orderCommand);\n \
    \   return OrderCreationStatus.SUCCESS;\n    }\n    }\n    ```\n\n    **代码清单 17-5**\
    \ 用于创建新订单的订单控制器 (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\\
    java\\com\\acme\\ecom\\core\\web\\OrderController.java`)\n\n4.  命令网关将`OrderCreateCommand`传递给命令总线。\n\
    \n5.  `OrderCommandHandler`从命令总线消费`OrderCreateCommand`。参见代码清单[17-6](#477630_1_En_17_Chapter.xhtml#PC10)。\n\
    \n    ```java\n    @Component\n    public class OrderCommandHandler {\n    @Autowired\n\
    \    @Qualifier(value = \"orderRepository\")\n    private Repository orderRepository;\n\
    \    @CommandHandler\n    public void handleNewOrder(OrderCreateCommand orderCreatedCommand)\
    \ {\n    Order order = new Order(Long.valueOf(new Random().nextInt()));\n    order.setOrderDate(new\
    \ Date());\n    order.setOrderStatus(OrderStatus.PAID);\n    order.setUserId(orderCreatedCommand.getUserId());\n\
    \    double total = 0;\n    if (orderCreatedCommand.getLineItems() != null) {\n\
    \    for (LineItemDTO lineItemDto :\n    orderCreatedCommand.getLineItems()) {\n\
    \    if (lineItemDto.getInventoryId() != null) {\n    LineItem lineItem = new\
    \ LineItem(new Random().nextLong(),\n    lineItemDto.getProductId(), lineItemDto.getQuantity(),\n\
    \    lineItemDto.getPrice(), lineItemDto.getInventoryId());\n    total = total\
    \ + lineItemDto.getPrice();\n    order.addLineItem(lineItem);\n    Inventory inventory\
    \ = inventoryRepository.load(lineItemDto.getInventoryId());\n    inventory.updateProductStock(lineItemDto.getQuantity(),\n\
    \    ProductStockOperation.DEPRECIATE);\n    }\n    }\n    }\n    order.setTotal(total);\n\
    \    order.notifyOrderCreation();\n    orderRepository.add(order);\n    }\n  \
    \  }\n    ```\n\n    **代码清单 17-6** `OrderCommandHandler.handleNewOrder` (`ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    order\\command\\handler\\OrderCommandHandler.java`)\n\n命令处理过程是原子的，因此它要么完全处理，要么完全不处理。Axon\
    \ 框架使用工作单元（UoW）来跟踪命令处理器执行的操作。命令处理器完成后，Axon 尝试提交在 UoW 中注册的操作。这包括将修改后的聚合存储到它们各自的仓库中，并在事件总线上发布事件。但是，UoW\
    \ 不能替代事务。UoW 仅确保在命令处理器成功执行后，对聚合所做的更改被存储。如果在存储聚合时发生错误，已存储的任何聚合都不会回滚。您可以将事务绑定到 UoW。像`SimpleCommandBus`和`DisruptorCommandBus`这样的`CommandBus`实现允许您配置一个事务管理器。此事务管理器用于创建事务，以绑定到用于管理命令处理过程的\
    \ UoW。如代码清单[17-7](#477630_1_En_17_Chapter.xhtml#PC11)所示。"
  raw: "The product details should be mashed up with stock information so the\nuser\
    \ can tell if he can add any number of that product to the shopping\ncart. The\
    \ architecture in Figure [17-5](#477630_1_En_17_Chapter.xhtml#Fig5) shows that\
    \ the\ninventory information is available only in the “core” microservice,\nwhich\
    \ is outside the Product microservice.\nYou could make an architectural decision\
    \ by allowing the browser to\nretrieve product details by requesting the Product\
    \ microservice and then\nrequesting the core microservice to retrieve the stock\
    \ information for\nthat particular product, thus performing a data mashup at the\
    \ client\ntier.\nBut the principles of microservices say that microservices are\
    \ to be\nself-sufficient and independent. This means, if you consider the Product\n\
    and core microservices, each one\nshould be able to independently live and serve\
    \ irrespective of whether\nthe other is up and running or not. If the core microservice\
    \ is down,\nthe ACME online shop should still function with a reduced functionality\n\
    by allowing users to reach the home page and browse through the product\ncategories,\
    \ list products under a product category, view details of a\nselected product\
    \ (with stock information too, perhaps!), select and add\nitems to cart, etc.\
    \ Maybe the create order functionality will work only\nafter the core microservice\
    \ is up and running again. So you are going to\nfollow a different architectural\
    \ approach, by allowing the Product\nmicroservice to maintain a materialized view\
    \ of\nthe inventory, which is a read replica.\n\nTo retrieve the inventory details\
    \ of a product from this read replica,\nyou have the inventory repository, shown\
    \ in Listing [17-4](#477630_1_En_17_Chapter.xhtml#PC7).\n\n```\n@RepositoryRestResource(collectionResourceRel\
    \ = \"inventory\",\npath = \"inventory\")\npublic interface InventoryRepository\
    \ extends\nMongoRepository  {\npublic Inventory findByInventoryId(\n@Param(\"\
    inventoryId\") Long  inventoryId);\npublic Inventory findBySku(@Param(\"sku\"\
    ) String  sku);\n}\nproduct_service.js retrieves all Products listed under a Product\
    \ Category as below:\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/inventory/search/findBySku?sku='+productCode)\n\
    Listing 17-4\nInventory Read Repository (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-product\\src\\main\\java\\com\\acme\\ecom\\product\\inventory\\repository\\\
    InventoryRepository.java)\n```\n\nNow it’s trivial to mashup data from above two\
    \ API sources and the\nclient tier.\n\nAdd a Product to the Cart\nThis is a straightforward\
    \ implementation of adding items selected to order\ninto an `org.springframework.cache.CacheManager`\n\
    and retrieving it back, so the code snippets are not shown here. The\ncode is\
    \ placed in folder `ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-cart`.\n\nCreate\
    \ a New Order\n\nThe use cases you are going to explore from now on are non-trivial\
    \ since\nthere are multiple directions for the control flow across the\nmicroservices.\
    \ As explained, you are not using any synchronous style\nintermicroservices communication;\
    \ instead,\nyou leverage the Axon\nCQRS event-driven\ninfrastructure to facilitate\
    \ end-to-end control flow. You will\nuse a representation similar to that shown\
    \ in Figure [17-6](#477630_1_En_17_Chapter.xhtml#Fig6) so that it\nwill be easy\
    \ to understand the control flow and state changes during the\nexecution of the\
    \ use cases.\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg)\n\
    \nFigure 17-6\nCreate a new order\n\nReferring to Figure [17-6](#477630_1_En_17_Chapter.xhtml#Fig6),\
    \ the flow is\nlabelled and is explained here.\n\n1.  `order_service.js`\n   \
    \ sends a REST JSON request over HTTP to create a new order:\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/core/order/',orderDTO)\n\
    \    ```\n\nThis request will hit the API gateway.\n\n2.  The API gateway interprets\
    \ the URL by looking at the service registry\n    and directs the request to Order\
    \ REST Controller in the Ecom-core\n    microservice.\n\n3.  The Order REST Controller\
    \ creates a new OrderCreateCommand and sends\n    it to the command gateway and\
    \ waits. See Listing [17-5](#477630_1_En_17_Chapter.xhtml#PC9).\n\n```\n    @RestController\n\
    \    @RequestMapping(\"/order\")\n    public class OrderController {\n    @Autowired\n\
    \    private CommandGateway commandGateway;\n    @RequestMapping(method = RequestMethod.POST)\n\
    \    @Transactional\n    @ResponseBody\n    public OrderCreationStatus createOrder(@RequestBody\
    \ OrderDTO orderDTO) {\n    OrderCreateCommand orderCommand = new OrderCreateCommand(\n\
    \    orderDTO.getUserId(), orderDTO.getLineItems());\n    commandGateway.sendAndWait(orderCommand);\n\
    \    return OrderCreationStatus.SUCCESS;\n    }\n    }\n    Listing 17-5\n   \
    \ Order Controller to Create New Order (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\web\\OrderController.java)\n\
    \    ```\n\n4.  The command gateway delivers the OrderCreateCommand to the command\n\
    \    bus.\n\n5.  The OrderCommandHandler consumes the OrderCreateCommand from\
    \ the\n    command bus. See Listing [17-6](#477630_1_En_17_Chapter.xhtml#PC10).\n\
    \n```\n    @Component\n    public class OrderCommandHandler {\n    @Autowired\n\
    \    @Qualifier(value = \"orderRepository\")\n    private Repository orderRepository;\n\
    \    @CommandHandler\n    public void handleNewOrder(OrderCreateCommand orderCreatedCommand)\
    \ {\n    Order order = new Order(Long.valueOf(new Random().nextInt()));\n    order.setOrderDate(new\
    \ Date());\n    order.setOrderStatus(OrderStatus.PAID);\n    order.setUserId(orderCreatedCommand.getUserId());\n\
    \    double total = 0;\n    if (orderCreatedCommand.getLineItems() != null) {\n\
    \    for (LineItemDTO lineItemDto :\n    orderCreatedCommand.getLineItems()) {\n\
    \    if (lineItemDto.getInventoryId() != null) {\n    LineItem lineItem = new\
    \ LineItem(new Random().nextLong(),\n    lineItemDto.getProductId(), lineItemDto.getQuantity(),\n\
    \    lineItemDto.getPrice(), lineItemDto.getInventoryId());\n    total = total\
    \ + lineItemDto.getPrice();\n    order.addLineItem(lineItem);\n    Inventory inventory\
    \ = inventoryRepository.load(lineItemDto.getInventoryId());\n    inventory.updateProductStock(lineItemDto.getQuantity(),\n\
    \    ProductStockOperation.DEPRECIATE);\n    }\n    }\n    }\n    order.setTotal(total);\n\
    \    order.notifyOrderCreation();\n    orderRepository.add(order);\n    }\n  \
    \  }\n    Listing 17-6\n    OrderCommandHandler handleNewOrder (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\\
    command\\handler\\OrderCommandHandler.java)\n    ```\n\nCommand handling processes\
    \ are atomic, so it should either be processed\n    entirely or not at all. The\
    \ Axon framework uses the Unit of Work (UoW) to\n    track actions performed by\
    \ the command handlers. After the command\n    handler completes, Axon tries to\
    \ commit the actions registered with the\n    UoW. This involves storing modified\
    \ aggregates in their respective\n    repository and publishing events on the\
    \ event bus. However, the UoW is\n    not a replacement for a transaction. The\
    \ UoW only ensures that changes\n    made to aggregates are stored upon successful\
    \ execution of a command\n    handler. If an error occurs while storing an aggregate,\
    \ any aggregates\n    already stored are not rolled back. You can bind a transaction\
    \ to a UoW.\n    CommandBus implementations like the SimpleCommandBus and\n  \
    \  DisruptorCommandBus\n    allow you to configure a transaction manager. This\
    \ transaction manager\n    is used to create the transactions to bind to the UoW\
    \ that is used to\n    manage the process of a command. This is shown in Listing\
    \ [17-7](#477630_1_En_17_Chapter.xhtml#PC11)."
  trans: "\n产品详情应与库存信息整合，以便用户判断能否将该产品的任意数量添加到购物车。图 17-5 所示的架构表明，库存信息仅存在于“核心”微服务中，而该微服务位于产品微服务之外。\n\
    你可以做出一个架构决策，允许浏览器通过请求产品微服务来获取产品详情，然后请求核心微服务来获取该特定产品的库存信息，从而在客户端层进行数据整合。\n但微服务的原则指出，微服务应自给自足且独立。这意味着，如果你考虑产品微服务和核心微服务，每个微服务都应能独立运行和提供服务，无论另一个微服务是否正常运行。如果核心微服务宕机，ACME\
    \ 在线商店仍应能以功能缩减的方式运行，允许用户访问主页、浏览产品类别、列出某类别下的产品、查看所选产品的详情（或许也包括库存信息！）、选择并添加商品到购物车等。或许只有创建订单功能会在核心微服务重新启动并运行后才能正常工作。因此，你将采用一种不同的架构方法，允许产品微服务维护一个库存的物化视图，这是一个只读副本。\n\
    \n要从这个只读副本中检索产品的库存详情，你需要使用库存仓库，如清单 17-4 所示。\n\n```\n@RepositoryRestResource(collectionResourceRel\
    \ = \"inventory\",\npath = \"inventory\")\npublic interface InventoryRepository\
    \ extends\nMongoRepository  {\npublic Inventory findByInventoryId(\n@Param(\"\
    inventoryId\") Long  inventoryId);\npublic Inventory findBySku(@Param(\"sku\"\
    ) String  sku);\n}\nproduct_service.js 检索某产品类别下列出的所有产品，如下所示：\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/inventory/search/findBySku?sku='+productCode)\n\
    清单 17-4\n库存只读仓库 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-product\\src\\main\\\
    java\\com\\acme\\ecom\\product\\inventory\\repository\\InventoryRepository.java)\n\
    ```\n\n现在，从上述两个 API 源和客户端层整合数据就很简单了。\n\n**将产品添加到购物车**\n这是一个直接的实现，将选定的待订购商品添加到\
    \ `org.springframework.cache.CacheManager` 中，然后再检索出来，因此此处不展示代码片段。代码位于文件夹 `ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-cart` 中。\n\n**创建新订单**\n\n从现在开始要探索的用例并非简单，因为微服务之间的控制流有多个方向。如前所述，你不会使用任何同步风格的微服务间通信；相反，你将利用\
    \ Axon CQRS 事件驱动基础设施来促进端到端的控制流。你将使用类似于图 17-6 所示的表示方式，以便更容易理解用例执行过程中的控制流和状态变化。\n\
    \n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig6_HTML.jpg](img/477630_1_En_17_Fig6_HTML.jpg)\n\
    \n图 17-6\n创建新订单\n\n参考图 17-6，流程已标注并说明如下。\n\n1.  `order_service.js`\n    通过 HTTP\
    \ 发送 REST JSON 请求以创建新订单：\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/core/order/',orderDTO)\n\
    \    ```\n\n此请求将到达 API 网关。\n\n2.  API 网关通过查看服务注册表来解析 URL，并将请求定向到 Ecom-core 微服务中的订单\
    \ REST 控制器。\n\n3.  订单 REST 控制器创建一个新的 `OrderCreateCommand`，并将其发送到命令网关并等待。参见清单 17-5。\n\
    \n```\n    @RestController\n    @RequestMapping(\"/order\")\n    public class\
    \ OrderController {\n    @Autowired\n    private CommandGateway commandGateway;\n\
    \    @RequestMapping(method = RequestMethod.POST)\n    @Transactional\n    @ResponseBody\n\
    \    public OrderCreationStatus createOrder(@RequestBody OrderDTO orderDTO) {\n\
    \    OrderCreateCommand orderCommand = new OrderCreateCommand(\n    orderDTO.getUserId(),\
    \ orderDTO.getLineItems());\n    commandGateway.sendAndWait(orderCommand);\n \
    \   return OrderCreationStatus.SUCCESS;\n    }\n    }\n    清单 17-5\n    用于创建新订单的订单控制器\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
    ecom\\core\\web\\OrderController.java)\n    ```\n\n4.  命令网关将 `OrderCreateCommand`\
    \ 传递到命令总线。\n\n5.  `OrderCommandHandler` 从命令总线消费 `OrderCreateCommand`。参见清单 17-6。\n\
    \n```\n    @Component\n    public class OrderCommandHandler {\n    @Autowired\n\
    \    @Qualifier(value = \"orderRepository\")\n    private Repository orderRepository;\n\
    \    @CommandHandler\n    public void handleNewOrder(OrderCreateCommand orderCreatedCommand)\
    \ {\n    Order order = new Order(Long.valueOf(new Random().nextInt()));\n    order.setOrderDate(new\
    \ Date());\n    order.setOrderStatus(OrderStatus.PAID);\n    order.setUserId(orderCreatedCommand.getUserId());\n\
    \    double total = 0;\n    if (orderCreatedCommand.getLineItems() != null) {\n\
    \    for (LineItemDTO lineItemDto :\n    orderCreatedCommand.getLineItems()) {\n\
    \    if (lineItemDto.getInventoryId() != null) {\n    LineItem lineItem = new\
    \ LineItem(new Random().nextLong(),\n    lineItemDto.getProductId(), lineItemDto.getQuantity(),\n\
    \    lineItemDto.getPrice(), lineItemDto.getInventoryId());\n    total = total\
    \ + lineItemDto.getPrice();\n    order.addLineItem(lineItem);\n    Inventory inventory\
    \ = inventoryRepository.load(lineItemDto.getInventoryId());\n    inventory.updateProductStock(lineItemDto.getQuantity(),\n\
    \    ProductStockOperation.DEPRECIATE);\n    }\n    }\n    }\n    order.setTotal(total);\n\
    \    order.notifyOrderCreation();\n    orderRepository.add(order);\n    }\n  \
    \  }\n    清单 17-6\n    OrderCommandHandler 的 handleNewOrder 方法 (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\\
    command\\handler\\OrderCommandHandler.java)\n    ```\n\n命令处理过程是原子性的，因此它要么完全处理，要么完全不处理。Axon\
    \ 框架使用工作单元（UoW）来跟踪命令处理器执行的操作。命令处理器完成后，Axon 会尝试提交在 UoW 中注册的操作。这包括将修改后的聚合存储到各自的仓库中，并在事件总线上发布事件。然而，UoW\
    \ 并不能替代事务。UoW 仅确保在命令处理器成功执行后，对聚合所做的更改被存储。如果在存储某个聚合时发生错误，已存储的任何聚合都不会回滚。你可以将事务绑定到\
    \ UoW。像 `SimpleCommandBus` 和 `DisruptorCommandBus` 这样的 `CommandBus` 实现允许你配置一个事务管理器。该事务管理器用于创建事务，并绑定到用于管理命令处理过程的\
    \ UoW。如清单 17-7 所示。\n"
- fmt: "```java\n@Configuration\n@RefreshScope\npublic class EcomCoreAppConfiguration\
    \ {\n    @Bean\n    public SimpleCommandBus commandBus() {\n        SimpleCommandBus\
    \ simpleCommandBus = new SimpleCommandBus();\n        simpleCommandBus.setDispatchInterceptors(\n\
    \            Arrays.asList(new BeanValidationInterceptor()));\n        SpringTransactionManager\
    \ transcationMgr =\n            new SpringTransactionManager(txManager);\n   \
    \     simpleCommandBus.setTransactionManager(transcationMgr);\n        return\
    \ simpleCommandBus;\n    }\n}\n```\n*Listing 17-7* Bind Transactions to Unit of\
    \ Work (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\\
    acme\\ecom\\core\\EcomCoreAppConfiguration.java`)\n\nHere, `SpringTransactionManager`\
    \ is a `TransactionManager` implementation that uses a `PlatformTransactionManager`\
    \ as the underlying transaction manager.\n\nNote that you use two aggregate entities\
    \ (inventory and order) in a single transaction, but there are no distributed\
    \ transactions involved since both the aggregate entities are managed by the same\
    \ resource manager in a single node.\n\n6. The `OrderCommandHandler` first depreciates\
    \ the available inventory in the inventory AXON aggregate. See Listing [17-8](#477630_1_En_17_Chapter.xhtml#PC12).\n\
    \n```java\n@Entity\n@Table(name = \"INVENTORY\")\npublic class Inventory extends\
    \ AbstractAggregateRoot {\n    public void updateProductStock(Integer count,\n\
    \        ProductStockOperation stockoperation) {\n        if (stockoperation.equals(ProductStockOperation.DEPRECIATE))\
    \ {\n            if (this.quantity - count >= 0) {\n                this.quantity\
    \ = this.quantity - count;\n            } else {\n                throw new OutOfStockException(this.id);\n\
    \            }\n        } else {\n            this.quantity = this.quantity +\
    \ count;\n        }\n        registerEvent(new InventoryUpdateEvent(id, sku, quantity));\n\
    \    }\n}\n```\n*Listing 17-8* Inventory Aggregate `updateProductStock` (`ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    inventory\\model\\Inventory.java`)\n\nWhen you view the product listing page or\
    \ the product details page, the stock you see there is coming from the cached\
    \ data in the materialized view of inventory in the Ecom-product microservice.\
    \ However, when you create an order, the required inventory is validated with\
    \ the available stock, which happens against the inventory aggregate entity, which\
    \ is the write model of the inventory. Scenarios like this are common in many\
    \ business processes, like selling hotel rooms and flight seats. When you start\
    \ shopping for hotel rooms or flight seats, the initial availability of rooms\
    \ or seats are \"nearly accurate\" approximations, perhaps coming from caches\
    \ or from intermediary demand-supply gateways. When the actual booking is done,\
    \ there is always an instantaneous or eventual validation of the number of seats\
    \ or rooms requested against the actual availability in the single source of truth,\
    \ which is the write model.\n\n7. While depreciating the stock, the inventory\
    \ aggregate registers an `InventoryUpdateEvent` into the clustered event bus.\n\
    \n8. The `OrderCommandHandler`, on consuming the `OrderCreateCommand` in Step\
    \ 5, also creates a new order on successfully depreciating the inventory. See\
    \ Listing [17-9](#477630_1_En_17_Chapter.xhtml#PC13).\n\n```java\n@Entity(name=\"\
    order\")\n@Table(name = \"CUSTOMER_ORDER\")\npublic class Order extends AbstractAggregateRoot\
    \ {\n    @OneToMany(cascade = CascadeType.ALL, mappedBy=\"order\", orphanRemoval=true)\n\
    \    private Set lineItems;\n    public void addLineItem(LineItem lineItem){\n\
    \        if(this.lineItems==null){\n            this.lineItems=new HashSet();\n\
    \        }\n        lineItem.setOrder(this);\n        this.lineItems.add(lineItem);\n\
    \    }\n    public void notifyOrderCreation() {\n        List lineItemDTOs = new\
    \ ArrayList();\n        for (LineItem lineItem : lineItems) {\n            lineItemDTOs.add(new\
    \ LineItemDTO(lineItem.getProduct(),\n                lineItem.getPrice(), lineItem.getQuantity(),\n\
    \                lineItem.getInventoryId()));\n        }\n        registerEvent(new\
    \ OrderCreatedEvent(id, userId, orderStatus.name(),\n            total, orderDate,\
    \ lineItemDTOs));\n    }\n}\n```\n*Listing 17-9* Order `notifyOrderCreation` (`ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    order\\model\\Order.java`)\n\n9. Once the order aggregate is notified of a new\
    \ order creation, it registers a `OrderCreatedEvent` into the clustered event\
    \ bus.\n\n10. For every new `OrderCreatedEvent`, a new order process saga instance\
    \ is instantiated, as shown in Listing [17-10](#477630_1_En_17_Chapter.xhtml#PC14).\n\
    \n```java\npublic class OrderProcessSaga extends AbstractAnnotatedSaga {\n   \
