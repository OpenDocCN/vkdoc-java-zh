- fmt: "You can use a browser (preferably Chrome) and point to `http://localhost:8080/`.\
    \ This will bring up the screen shown in Figure [15-9](#477630_1_En_15_Chapter.xhtml#Fig9).\
    \ You can test the example by clicking the “Order One Now” button against any\
    \ one of the products in Figure [15-9](#477630_1_En_15_Chapter.xhtml#Fig9). When\
    \ you click, a new order is created in the Order Write DB. Eventually, the Order\
    \ Read DB will be updated with this new order. Also, the corresponding product\
    \ stock will be reduced by one in the Product Write DB. This change will also\
    \ be eventually updated in the Product Read DB. The Audit Read DB too is updated\
    \ with records. When you refresh the screen, the change is as shown in Figure\
    \ [15-11](#477630_1_En_15_Chapter.xhtml#Fig11).\n\nThe moment you create the first\
    \ order, a saga will be started. To verify this, you may use a console to check\
    \ the collections in the MongoDB, as shown in Listing [15-11](#477630_1_En_15_Chapter.xhtml#PC37).\n\
    \n```\nD:\\Applns\\MongoDB\\Server\\3.2.6\\bin>D:\\Applns\\MongoDB\\Server\\3.2.6\\\
    bin\\mongo\nMongoDB shell version: 3.2.6\nconnecting to: test\n> show dbs\necom\
    \   0.000GB\nlocal  0.000GB\ntest   0.000GB\n> show dbs\naxonframework  0.000GB\n\
    ecom           0.000GB\nlocal          0.000GB\ntest           0.000GB\n> use\
    \ axonframework\nswitched to db axonframework\n> show collections\nsagas\n> db.sagas.find()\n\
    { \"_id\" : ObjectId(\"5c7f689a75c90e3adeb78318\"), \"sagaType\" : \"com.acme.ecom.saga.OrderProcessSaga\"\
    , \"sagaIdentifier\" : \"3aeffc45-4ddd-419b-ab00-d2e32914c9ce\", \"serializedSaga\"\
    \ : BinData(0,\"\"\
    ), \"associations\" : [ { \"key\": \"sagaIdentifier\", \"value\" : \"3aeffc45-4ddd-419b-ab00-d2e32914c9ce\"\
    \ }, { \"key\": \"orderId\", \"value\" : \"510374185\" } ] }\nListing 15-11\n\
    Saga Persisted in MongoDB Collection\n```\n\n> **Note**  \n> If the microservices\
    \ are not responding as per the intended manner, you may want to flush the RabbitMQ\
    \ queues. This can be done easily by bringing down RabbitMQ, deleting the data\
    \ folders, and then bringing back RabbitMQ. Refer to Appendix B for related details.\
    \  \n> (If the change is not reflected, close the browser session and take a new\
    \ browser instance and try the above URL.)\n\nCreate two more orders so that you\
    \ can execute all test cases. On refreshing the screen, you will see all new orders\
    \ as well as the audit logs for the orders, as shown in Figure [15-14](#477630_1_En_15_Chapter.xhtml#Fig14).\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig14_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig14_HTML.jpg)\n\
    \n**Figure 15-14** Three new orders created\n\nIf you click Cancel button against\
    \ one of the orders, it will cancel that order and end the saga. Not only that,\
    \ since the order is cancelled, the product number is added back to the stock\
    \ of corresponding product. The cancel action will create its own audit log. Refresh\
    \ the screen again and you will see the changes shown in Figure [15-15](#477630_1_En_15_Chapter.xhtml#Fig15).\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig15_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig15_HTML.jpg)\n\
    \n**Figure 15-15** Order cancelled\n\nIf you click the Confirm button against\
    \ one of the order, it will confirm that order and again end the saga. Since the\
    \ order is confirmed, the product stock, which got reduced while you ordered,\
    \ will remain the same. The confirm action will create its own audit log. Refresh\
    \ the screen again and you will see the changes shown in Figure [15-16](#477630_1_En_15_Chapter.xhtml#Fig16).\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig16_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig16_HTML.jpg)\n\
    \n**Figure 15-16** Order confirmed\n\nLastly, take a note of the order, which\
    \ remains in the “New” status. If you do nothing further with this order, it will\
    \ remain in that status, and this is due to the persistent nature of the saga,\
    \ which will also remain in that status. This demonstrates a long-running workflow,\
    \ in your case a saga.\n\n## Summary\n\nWhile Chapters [13](#477630_1_En_13_Chapter.xhtml)\
    \ and [14](#477630_1_En_14_Chapter.xhtml) covered transactions in detail, this\
    \ chapter covered transactions specifically in the context of microservices. You\
    \ learned about saga and how distributed sagas can be utilized by grouping a given\
    \ transaction into a sequence of subtransactions and corresponding compensating\
    \ transactions. All transactions in a saga either complete successfully or, in\
    \ the event of a failure, the compensating transactions are rolled back. You also\
    \ saw the complete working code of how to implement saga using the Axon 2 framework.\
    \ Having looked at transactions, next you will relook at high availability and\
    \ scalability with an emphasis on CQRS design in Chapter [16](#477630_1_En_16_Chapter.xhtml).\n\
    \n## Footnotes\n\n### 16. Advanced High Availability and Scalability\n\nIn Chapter\
    \ [9](#477630_1_En_9_Chapter.xhtml), you looked at various elements contributing\
    \ to high availability (HA) for a software architecture, most of which are relevant\
    \ for both a microservices architecture and a monolith architecture. There you\
    \ looked at the various components of a private cloud or an on-premises deployment\
    \ infrastructure and glanced through the HA aspects. In this chapter, you will\
    \ look into details of selected concerns that have significant impact in designing\
    \ CQRS-based systems. To make things simple and relatable to concepts you already\
    \ know or have been using, I will examine these concerns in the context of a database\
    \ familiar to most of us, Oracle. Once you understand the concepts, then it’s\
    \ straightforward to extend that learning to any other vendor’s solution or to\
    \ other free and open source solutions. Interestingly, you will look at many of\
    \ these concepts in the context of Oracle just to make sure you leverage such\
    \ solutions only when it’s absolutely required, which again leads to the core\
    \ point that in many situations there are alternate and possibly cheaper solutions.\n\
    \nYou will be exploring the following in this chapter:\n\n*   Architecture templates\
    \ to address an increasing amount of scalability\n*   Code samples demonstrating\
    \ HA and scalability design using Axon 2 CQRS\n*   Read scalability vs. write\
    \ scalability\n*   Techniques to allow concurrent modification of entities\n*\
    \   Code samples demonstrating concurrent modification of entities using Axon\
    \ 2 CQRS"
