    ## Hystrix Dashboard


    A Hystrix dashboard can be used to provide a graphical overview of a circuit breaker
    in the system. In a typical microservices architecture, there will be more than
    one microservice processes and in such cases, you will need to monitor more than
    one circuit breaker in the application. For this, you can use Turbine, which is
    not explained here. In this section, you will see how to enable a Hystrix dashboard.


