    \ 上监听，\n你可以使用以下配置让消息生产者和消息消费者都连接到集群：\n```\n\n其余配置与上一节示例中解释的类似。现在执行以下命令：\n\n```\n\
    cd ch06-03\nD:\\binil\\gold\\pack03\\ch06\\ch06-03>mvn test –Psend\n```\n\n这将向\
    \ RabbitMQ 集群发送一条消息。消息发送者窗口将通过以下 DEBUG 消息确认：\n\n```\n2017-06-12 19:50:59 DEBUG\
    \ com.acme.ch06.ex03.Sender.main:32 - Sender send message----->Message from Sender\
