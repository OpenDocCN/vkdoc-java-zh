    ## MySQL


    MySQL is a popular open source SQL database management system that is developed,
    distributed, and supported by Oracle Corporation. MySQL manages a structured collection
    of data. A MySQL database helps you to add, access, and process the data stored
    in the database. MySQL stores data in separate tables. The database structures
    are organized into physical files optimized for speed. The logical model, with
    objects such as databases, tables, views, rows, and columns, offers a flexible
    programming environment. The SQL part of "MySQL" stands for "Structured Query
    Language," which is the most common standardized language used to access databases.
    MySQL software uses the GPL (GNU General Public) License and is open source software.
    You can get more details on MySQL at [`www.mysql.com/`](http://www.mysql.com/).


    I will cover the following on MySQL in this appendix:


    *   How to download and install MySQL

    *   How to initialize a data directory for MySQL

    *   How to start MySQL server and connect to the server

    *   How to test a connection to MySQL server and disconnect from the server

    *   How to create a database and do basic table operations

    *   How to add user accounts to the database


