- fmt: '### The Scalability Dilemma


    Modern application architectures are horizontally scalable. By horizontal scalability,
    we mean more than one instance of the same functionality can be deployed into
    different processes, and traffic from clients to the same functionality can be
    served by any one among the server processes where there is duplicated functionality.
    Such topologies are called server farms. Ideally, requests from the same client
    (browser or mobile app) can also be routed to any instance of this server farm,
    irrespective of which server instance served the previous request from the same
    client.


    Figure [2-1](#477630_1_En_2_Chapter.xhtml#Fig1) depicts different modules of an
    e-commerce application. If you think about how a user typically interacts with
    an e-commerce application, the series of steps may go as follows:


    1. Access the home page of the e-commerce application.

    2. Browse through the product categories.

    3. Select interested items and browse through the selected product details.

    4. If interested, add the selected item to the cart.

    5. Create a user profile or log in if you already have a user profile.

    6. Pay and check out the item and confirm the order.


    Typically you browse through many product categories and product details, and
    only add few to your cart. Even after adding items into the cart, the item can
    be deleted from the cart or the cart can be ignored or orphaned. Eventually, only
    a comparatively smaller percentage of the items added to cart will end up as a
    confirmed order in an e-commerce application.


    In the “Typical Deployment Architecture” section in Chapter [1](#477630_1_En_1_Chapter.xhtml),
    you saw the option of the scale-out mechanism available for a typical monolith
    application. The relevant section of Figure [1-4](#477630_1_En_1_Chapter.xhtml#Fig4)
    is replicated here as Figure [2-4](#477630_1_En_2_Chapter.xhtml#Fig4) for further
    discussion.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg)


    Figure 2-4 Application tier scalability


    Since many logged in and anonymous (not logged in) users will be browsing through
    many product categories and product detail web pages, the application module serving
    those requests, the Product module, will be stressed more compared to the stress
    felt by the Order module. If the deployment architecture has to be flexible to
    address this varying requirement of scalability, we should be able to deploy more
    server instances hosting the Product module, whereas a lesser number of server
    processes will be required to host the Order module. Equally important is the
    need for deploying the Order module to server hardware of a higher grade of reliability
    compared to what is needed to deploy the Product module, since the cost of failure
    for an Order transaction is much higher compared to the cost of failure for a
    Product-related transaction. Due to all or many of the concerns discussed in previous
    sections, you know that separating the modules and deploying them based on the
    required operational qualities is not straightforward, since the application is
    architected as a monolith and permits only homogeneous deployment.


    ### Monolith Technology Constraints


    Monolith applications can be considerably large in size. Depending on the life
    span of the application, it can still evolve in terms of features and functionality,
    hence its size can keep increasing. Over time, technologies and mechanisms available
    in the industry can also change. Unfortunately, monolith application architectures
    have serious limitations in terms of adapting to latest technologies and trends.
    Most of the platform, technology, tool, and framework choices were decided and
    baselined during the initial architecture phase, and those decisions are etched
    in stone. It is not easy to change the solution for a concern from one to another.
    For example, if the platform of choice has been fixed as Java, then it won’t be
    easy to use a .NET solution for part of the solution of the application or for
    building new features. Similarly, if it uses a relational database management
    system (RDBMS) for persistence related purposes, most of the time it should also
    use an ORM (object-relational mapping) framework like Hibernate or a data mapping
    framework like iBatis. For consistency as well as for economies of scale within
    the whole application, it’s not advisable to introduce a new such framework in
    place of them for all future extensions. Last but not the least, loading the codebase
    of a single project into the IDE is memory intensive and will often impede the
    productivity of the developers.


    ## Introducing Microservices


    Microservices are a different approach to architecting software application. They
    attempt to address many modern application architecture challenges. We will look
    at the different architectural challenges we face today and set a base by which
    we can solve our issues and keep moving.


    Before we delve deep, here’s one more important nomenclature: the “service” in
    the context of a microservice.


    In SOA, a service is a first-class business functionality that can be accessed
    by any clients using a standard access protocol over the network. SOA services
    are autonomous and typically idempotent and stateless. By autonomous, we mean
    the service by itself is self-sufficient in providing the functionality. By idempotent,
    we mean invoking the service more than once, knowingly or by error, will not have
    any side effect. To make it simple, a client can make the same request repeatedly
    while producing the same result. In other words, making multiple identical requests
    has the same effect as making a single request. By stateless, we mean we do not
    store any state on behalf of a specific client in the server, when the service
    is invoked (this was discussed in the “Stateless Design” section in Chapter [1](#477630_1_En_1_Chapter.xhtml)).


    You are yet to see what a microservice is, so to keep our current discussion moving,
    a microservice is analogous to an SOA service. Sometimes a collection of many
    such services that are functionally related can also be called by the term microservice.
    We will look at different meanings of this statement later.


    Let’s revisit few of the challenges we discussed with the monolith approach and
    see how to address them.


    ### Independent Modules


    The first and best distinguishable and observable characteristic I want to introduce
    to the monolith is to convert the monolith into a collection of discrete and independent
    modules. By making the modules independent, we want to bring all or most of the
    following flexibilities to the software paradigm:


    - **Parallel development**: Each module can be source controlled as a separate
    repository, hence distributed teams can build these modules independently and
    in parallel.

    - **Separated deployment**: Different from the single process deployment approach
    of the monolith, once the modules are independent, they should also be packaged,
    deployed, tested, and deployed into production into multiple runtime processes
    so that appropriate strategies can be adopted during deployment to address varying
    scalability, both at the software and hardware levels. This is especially important
    in a scenario like an e-commerce application where we want to deploy more server
    instances to host the Product module and less server processes for the Order module;
    similarly, we want to deploy Order modules into hardware and software stacks of
    greater reliability (which will cost more) compared to what is required to deploy
    the Product modules (where costs can be kept reasonably less by using commodity
    hardware).'
  raw: '### The Scalability Dilemma


    Modern application architectures are horizontally scalable. By horizontal scalability,
    we mean more than one instance of the same functionality can be deployed into
    different processes, and traffic from clients to the same functionality can be
    served by any one among the server processes where there is duplicated functionality.
    Such topologies are called server farms. Ideally, requests from the same client
    (browser or mobile app) can also be routed to any instance of this server farm,
    irrespective of which server instance served the previous request from the same
    client.


    Figure [2-1](#477630_1_En_2_Chapter.xhtml#Fig1) depicts different modules of an
    e-commerce application. If you think about how a user typically interacts with
    an e-commerce application, the series of steps may go as follows:


    1.  Access the home page of the e-commerce application.


    2.  Browse through the product categories.


    3.  Select interested items and browse through the selected product details.


    4.  If interested, add the selected item to the cart.


    5.  Create a user profile or log in if you already have a user profile.


    6.  Pay and check out the item and confirm the order.


    Typically you browse through many product categories and product details, and
    only add few to your cart. Even after adding items into the cart, the item can
    be deleted from the cart or the cart can be ignored or orphaned. Eventually, only
    a comparatively smaller percentage of the items added to cart will end up as a
    confirmed order in an e-commerce application.


    In the “Typical Deployment Architecture” section in Chapter [1](#477630_1_En_1_Chapter.xhtml),
    you saw the option of the scale-out mechanism available for a typical monolith
    application. The relevant section of Figure [1-4](#477630_1_En_1_Chapter.xhtml#Fig4)
    is replicated here as Figure [2-4](#477630_1_En_2_Chapter.xhtml#Fig4) for further
    discussion.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Application tier scalability


    Since many logged in and anonymous (not logged in) users will be browsing through
    many product categories and product detail web pages, the application module serving
    those requests, the Product module, will be stressed more compared to the stress
    felt by the Order module. If the deployment architecture has to be flexible to
    address this varying requirement of scalability, we should be able to deploy more
    server instances hosting the Product module, whereas a lesser number of server
    processes will be required to host the Order module. Equally important is the
    need for deploying the Order module to server hardware of a higher grade of reliability
    compared to what is needed to deploy the Product module, since the cost of failure
    for an Order transaction is much higher compared to the cost of failure for a
    Product-related transaction. Due to all or many of the concerns discussed in previous
    sections, you know that separating the modules and deploying them based on the
    required operational qualities is not straightforward, since the application is
    architected as a monolith and permits only homogeneous deployment.


    ### Monolith Technology Constraints


    Monolith applications can be considerably large in size. Depending on the life
    span of the application, it can still evolve in terms of features and functionality,
    hence its size can keep increasing. Over time, technologies and mechanisms available
    in the industry can also change. Unfortunately, monolith application architectures
    have serious limitations in terms of adapting to latest technologies and trends.
    Most of the platform, technology, tool, and framework choices were decided and
    baselined during the initial architecture phase, and those decisions are etched
    in stone. It is not easy to change the solution for a concern from one to another.
    For example, if the platform of choice has been fixed as Java, then it won’t be
    easy to use a .NET solution for part of the solution of the application or for
    building new features. Similarly, if it uses a relational database management
    system (RDBMS) for persistence related purposes, most of the time it should also
    use an ORM (object-relational mapping) framework like Hibernate or a data mapping
    framework like iBatis. For consistency as well as for economies of scale within
    the whole application, it’s not advisable to introduce a new such framework in
    place of them for all future extensions. Last but not the least, loading the codebase
    of a single project into the IDE is memory intensive and will often impede the
    productivity of the developers.


    ## Introducing Microservices


    Microservices are a different approach to architecting software application. They
    attempt to address many modern application architecture challenges. We will look
    at the different architectural challenges we face today and set a base by which
    we can solve our issues and keep moving.


    Before we delve deep, here’s one more important nomenclature: the “service” in
    the context of a microservice.


    In SOA, a service is a first-class business functionality that can be accessed
    by any clients using a standard access protocol over the network. SOA services
    are autonomous and typically idempotent and stateless. By autonomous, we mean
    the service by itself is self-sufficient in providing the functionality. By idempotent,
    we mean invoking the service more than once, knowingly or by error, will not have
    any side effect. To make it simple, a client can make the same request repeatedly
    while producing the same result. In other words, making multiple identical requests
    has the same effect as making a single request. By stateless, we mean we do not
    store any state on behalf of a specific client in the server, when the service
    is invoked (this was discussed in the “Stateless Design” section in Chapter [1](#477630_1_En_1_Chapter.xhtml)).


    You are yet to see what a microservice is, so to keep our current discussion moving,
    a microservice is analogous to an SOA service. Sometimes a collection of many
    such services that are functionally related can also be called by the term microservice.
    We will look at different meanings of this statement later.


    Let’s revisit few of the challenges we discussed with the monolith approach and
    see how to address them.


    ### Independent Modules


    The first and best distinguishable and observable characteristic I want to introduce
    to the monolith is to convert the monolith into a collection of discrete and independent
    modules. By making the modules independent, we want to bring all or most of the
    following flexibilities to the software paradigm:


    *   **Parallel development**: Each module can be source controlled as a separate
    repository, hence distributed teams can build these modules independently and
    in parallel.


    *   **Separated deployment**: Different from the single process deployment approach
    of the monolith, once the modules are independent, they should also be packaged,
    deployed, tested, and deployed into production into multiple runtime processes
    so that appropriate strategies can be adopted during deployment to address varying
    scalability, both at the software and hardware levels. This is especially important
    in a scenario like an e-commerce application where we want to deploy more server
    instances to host the Product module and less server processes for the Order module;
    similarly, we want to deploy Order modules into hardware and software stacks of
    greater reliability (which will cost more) compared to what is required to deploy
    the Product modules (where costs can be kept reasonably less by using commodity
    hardware).'
  trans: '

    ### 可扩展性困境


    现代应用架构具备水平可扩展性。所谓水平可扩展，是指同一功能的多个实例可以部署到不同进程中，而客户端发往该功能的流量可由任意一个包含重复功能的服务器进程处理。这种拓扑结构被称为服务器集群。理想情况下，来自同一客户端（浏览器或移动应用）的请求也可以路由到该集群中的任意实例，无论该客户端的上一个请求是由哪个服务器实例处理的。


    图 2-1 展示了一个电商应用的不同模块。如果思考用户通常如何与电商应用交互，其步骤序列可能如下：


    1.  访问电商应用的主页。

    2.  浏览产品分类。

    3.  选择感兴趣的商品并浏览其详情。

    4.  如果感兴趣，将所选商品加入购物车。

    5.  创建用户档案，或如果已有档案则登录。

    6.  支付并结算商品，确认订单。


    通常，用户会浏览大量产品分类和详情，但只将少数商品加入购物车。即使商品已加入购物车，也可能被删除，或者购物车被忽略或废弃。最终，在电商应用中，只有相对较小比例的购物车商品会转化为已确认的订单。


    在第 1 章的“典型部署架构”部分，你看到了典型单体应用可用的横向扩展机制选项。图 1-4 的相关部分在此复制为图 2-4 以便进一步讨论。


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig4_HTML.jpg](img/477630_1_En_2_Fig4_HTML.jpg)


    图 2-4


    应用层可扩展性


    由于许多已登录和匿名（未登录）用户会浏览大量产品分类和产品详情网页，与订单模块相比，处理这些请求的应用模块（即产品模块）将承受更大的压力。如果部署架构需要灵活应对这种不同的可扩展性需求，我们应该能够部署更多承载产品模块的服务器实例，而承载订单模块所需的服务器进程数量则较少。同样重要的是，与部署产品模块所需的服务器硬件相比，部署订单模块需要更高可靠性的硬件，因为订单交易失败的代价远高于产品相关交易失败的代价。由于前面章节讨论的所有或大部分问题，你知道将模块分离并根据所需的运营质量进行部署并非易事，因为该应用是作为单体架构设计的，只允许同构部署。


    ### 单体技术约束


    单体应用的规模可能相当庞大。根据应用的生命周期，其功能和特性仍会不断演进，因此其规模会持续增长。随着时间的推移，行业中的技术和机制也会发生变化。不幸的是，单体应用架构在适应最新技术和趋势方面存在严重局限性。大多数平台、技术、工具和框架的选择都是在初始架构阶段决定并确立基准的，这些决策如同刻在石头上一般难以更改。将一个问题的解决方案从一种技术更换为另一种并不容易。例如，如果平台已固定选择为
    Java，那么要使用 .NET 解决方案来处理应用的部分功能或构建新特性就不那么容易了。同样，如果它使用关系型数据库管理系统（RDBMS）进行持久化，那么大多数时候它也必须使用像
    Hibernate 这样的 ORM（对象关系映射）框架或像 iBatis 这样的数据映射框架。为了整个应用的一致性和规模经济，不建议在未来的所有扩展中引入新的此类框架来替代它们。最后但同样重要的是，将单个项目的代码库加载到
    IDE 中会消耗大量内存，并且常常会阻碍开发人员的生产力。


    ## 微服务简介


    微服务是一种不同的软件应用架构方法。它们试图解决许多现代应用架构的挑战。我们将审视当今面临的不同架构挑战，并建立一个基础，以便我们能够解决问题并继续前进。


    在深入探讨之前，这里还有一个重要的术语：微服务上下文中的“服务”。


    在 SOA 中，服务是一种一流的业务功能，任何客户端都可以通过网络使用标准访问协议来访问它。SOA 服务是自治的，并且通常是幂等且无状态的。所谓自治，是指服务本身在提供功能方面是自给自足的。所谓幂等，是指无论是有意还是错误地多次调用服务，都不会产生任何副作用。简单来说，客户端可以重复发出相同的请求，同时产生相同的结果。换句话说，发出多个相同的请求与发出单个请求的效果相同。所谓无状态，是指在调用服务时，我们不会在服务器上存储任何代表特定客户端的状态（这一点在第
    1 章的“无状态设计”部分已讨论过）。


    你尚未了解什么是微服务，因此为了继续当前的讨论，可以将微服务类比为 SOA 服务。有时，一组功能相关的此类服务的集合也可以被称为微服务。我们稍后会探讨这个说法的不同含义。


    让我们重新审视一下我们在单体方法中讨论的几个挑战，并看看如何解决它们。


    ### 独立模块


    我想为单体引入的第一个、也是最显著且可观察的特性，是将其转换为一系列离散且独立的模块。通过使模块独立，我们希望为软件范式带来以下全部或大部分灵活性：


    *   **并行开发**：每个模块可以作为独立的代码仓库进行源代码管理，因此分布式团队可以独立且并行地构建这些模块。

    *   **分离部署**：与单体的单一进程部署方法不同，一旦模块独立，它们也应该被打包、部署、测试，并部署到生产环境中的多个运行时进程中，以便在部署期间可以采用适当的策略来应对软件和硬件层面不同的可扩展性需求。这在电商应用等场景中尤为重要，我们希望部署更多服务器实例来承载产品模块，而为订单模块部署较少的服务器进程；同样，我们希望将订单模块部署到可靠性更高的硬件和软件栈上（成本更高），而部署产品模块所需的硬件和软件栈则相对要求较低（通过使用通用硬件可以合理控制成本）。

    '
- fmt: '### Intermodule Communication


    Most of the intermodule communications we have with existing systems are direct
    and synchronous method invocations. Even if we design these communications as
    idempotent and stateless, one of the side effects of such calls is that the called
    module has to be up and live to respond to the caller module, or exceptions and
    errors can occur. Even if we separate the different modules as independent and
    deploy them into multiple processes, this side effect still exists and propagates
    backwards in the call stack. The thread in the caller process making the request
    to the called process will wait until it gets a valid response with or without
    data, or until the called method raises an exception. This blocks the thread making
    the request in the caller process and renders the thread useless until the method
    call returns. So, not only is there a dependency to the called process, but resources
    in the caller process are also blocked, hence they cannot be multiplexed and reused.


    There is, however, one advantage in this synchronous style of intermodule communication.
    The caller can take the next action after inspecting the response data send by
    the called process. Also, in a case where the called process doesn’t return expected
    results, the caller can instantaneously hint that to the user or the client tier
    agent so as to leverage manual intervention for the next step.


    The asynchronous or fire-and-forget style of intermodule communication can relieve
    the caller resources to be reusable instantaneously after making the call to the
    called process. Using a message queue between the caller process and the called
    process is one means of achieving this. But this also introduces extra complexity
    in the overall software architecture. Firstly, we need to deal with messaging
    infrastructure in our IT landscape. More important, the complexity of software
    design increases since we now also want to correlate the responses to a particular
    request, since they are no longer tied together using the compute thread’s “wait
    and respond” primitive.


    Asynchronous communication is a necessary evil.


    With this background, let’s now look into what improvisation you can do to the
    monolith to make it more modern and flexible.


    ### The Microservices


    You have looked at two main aspects in modernizing the monolith application architecture,
    They are


    *   Making the modules independent

    *   Redesigning the intermodule communications


    Figure [2-5](#477630_1_En_2_Chapter.xhtml#Fig5) depicts the two architecture modernizations
    we have discussed. You may want to spend some time observing the diagram in detail,
    since this is going to be the basic construct upon which you are going to build
    a lot more improvisations.


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig5_HTML.jpg](images/477630_1_En_2_Chapter/477630_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Redesigning the monolith boundaries


    In the monolith style, each application is a different monolith, and they talk
    to each other as described in the “Monolith Intermodule Dependency” section earlier.
    Each application has a well-defined boundary that defines the bounded context
    of a functional grouping. In Figure [2-5](#477630_1_En_2_Chapter.xhtml#Fig5),
    this is represented using thick rectangular boxes. If you look inside such an
    application, there are multiple modules. As discussed, these modules are logically
    separated, but due to the dependency in deployment as well as intermodule communication,
    the module boundary is not rigid; rather it’s bloated. This is represented using
    dotted lined square boxes. Within such a module I have denoted a service. This
    can be a single service or a collection of functionally related services. They
    are represented using a circle. Note that a service can get an external request
    and a service can delegate requests to other services in another module or to
    other services in another application; all of this is shown using arrows.


    When I want to introduce the new style of application architecture called the
    microservice, I inverse the boundaries, as shown in the right extreme of Figure
    [2-5](#477630_1_En_2_Chapter.xhtml#Fig5). Here, each module or each distinguishable
    functional grouping is clearly separated from its peer. Each service or collection
    of services that are functionally related are grouped together logically and physically.
    In this diagram, this is represented by the square with thick lines, which is
    called a microservice. We will get into more details of it later, but for our
    discussion for the time being, such a microservice can be developed, source controlled,
    built, tested, distributed, and deployed independent of another microservice.
    If we want to map this to our monolith application, we can visualize a collection
    of such microservices can be called equivalent to our traditional monolith application.
    Just like different pieces or parts of our monolith application need to interact
    each other to realize the functionality built into it, in the microservices world
    too services internal to a microservice can talk to each other or services across
    microservices can talk to each other. When we adopt microservices, we do not want
    to ignore any or all of the principles of SOA. Going by that, we can use any standard
    SOA interface for the microservices to communicate with each other. Later you
    will see that in order to reap the true efficiency of microservices, you must
    adapt true SOA principles for the microservices architecture too.


    The previous section on flexible “intermodule communication” pointed out that
    we can also use the asynchronous style of communication between modules, and the
    same can be done between microservices too. This gives us flexibility by reducing
    dependency and by breaking the request-response cycle so that we can address problems
    like what to do when the called microservice doesn’t exist or is not responding.
    An appropriate message queue between microservices can help to achieve this, and
    such a message infrastructure is denoted by connecting microservices in Figure
    [2-5](#477630_1_En_2_Chapter.xhtml#Fig5). Now comes the next important aspect:
    when microservices are interconnected in this manner, since the underlying message
    infrastructure blends seamlessly with the corporate IT infrastructure, theoretically
    microservices from any vertical or line of business are capable of exchanging
    information across each other, since all of them can be connected to the same
    corporate LAN. When this happens, the application boundary, which earlier used
    to be a well-defined, rigid boundary, now disappears. This is denoted using dotted
    lines between applications in Figure [2-5](#477630_1_En_2_Chapter.xhtml#Fig5).
    In other words, the notion of applications that existed earlier as first-class
    bounded citizens in the enterprise software landscape gives space to microservices,
    and microservices now start to resemble many of the properties of those applications
    in terms of identity as first-class independent software building blocks.


    You may also look at the formal definition of a microservice as provided by Wikipedia
    ( [`https://en.wikipedia.org/wiki/Microservices`](https://en.wikipedia.org/wiki/Microservices)
    ).'
