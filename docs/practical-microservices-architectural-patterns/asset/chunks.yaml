    *   Hystrix，用于优雅降级的断路器


    *   Hystrix 仪表盘，显示系统中断路器的图形概览


    *   Ribbon，客户端负载均衡器


    *   Eureka，基于 REST 的注册服务


    *   Zuul，API 网关，它是你的微服务的前端控制器


    *   配置服务器，用于外部化版本控制和管理微服务的配置参数


    用于微服务架构的 Spring Cloud

    第 4 章中的“微服务架构”部分讨论了当你从传统架构迁移到基于微服务的架构时需要处理的主要新问题。由于微服务架构中的反转效应，许多应用程序内部的问题现在转移到了（微）服务间层面，并且随着微服务数量的不断增长，相关的外部架构复杂性也随之固有增长。


    Spring Cloud 为微服务生态系统中典型的用例和所需的扩展机制提供了良好的开箱即用支持。这里列出其中几个：


    *   分布式/版本化配置


    *   服务注册与发现


    *   路由与负载均衡


    *   服务间调用


    *   断路器


    *   分布式消息传递


    与 Spring Boot 类似，Spring Cloud 采用了一种非常声明式的方法，通常只需在类路径中包含一个依赖项和/或一个注解，就能获得大量功能。现在让我们来了解其中的一些。

    '
- fmt: "# Feign Client Usage in Spring Cloud\n\nThe Feign client is a Java-to-HTTP\
    \ client-side binder inspired by libraries like Retrofit, JAXRS-2.0, and WebSocket.\
    \ Feign’s intent is to reduce the complexity of invoking HTTP APIs by generalizing\
    \ the binding denominator uniformly to HTTP APIs regardless of the maturity of\
    \ the REST APIs (a.k.a. the restfulness of the APIs). Feign makes HTTP API calls\
    \ simple by processing annotations into a templatized request. Just before sending\
    \ the requests, arguments are applied to these templates in a straightforward\
    \ fashion. However, Feign only supports text-based APIs. Nevertheless, Feign dramatically\
    \ simplifies system aspects like replaying requests, unit testing, etc. You will\
    \ look at invoking HTTP APIs in this section.\n\n## Design a Feign Client Scenario\n\
    \nStarting with this section and for all other examples in Spring Cloud in this\
    \ chapter, you will use a simple yet representative real-world use case. You will\
    \ look into the design of the use case first and then learn more. Figure [8-1](#477630_1_En_8_Chapter.xhtml#Fig1)\
    \ illustrates a simple scenario where there are two separate applications or,\
    \ in our terms, two separate microservices: Product Web and Product Server.\n\n\
    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig1_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** A Feign client usage scenario\n\nLet’s explore the components\
    \ one by one:\n\n- **Product Server**: Product Server is a full-fledged microservice\
    \ application implementing a part of the CRUD operations. This microservice uses\
    \ a Mongo DB to write to and read from the data pertaining to product entities.\
    \ So the microservice encapsulates all the components required to do typical CRUD\
    \ operations against a database and also to expose the functionality as REST-based\
    \ services, including:\n  - **ProductRestController**: The REST controller exposing\
    \ the selected CRUD operations\n  - **Product**: The `Entity` class, which is\
    \ what you are persisting to the DB\n  - **ProductRepository**: The Mongo repository\
    \ doing all the plumbing in executing the Mongo DB operations\n  - **EcomProductMicroserviceApplication**:\
    \ The Spring Boot-based `Application` class\n\n- **Product Web**: Product Web\
    \ is designed as another full-fledged microservice application. However, this\
    \ time the microservice application doesn’t do any CRUD; instead, it acts as a\
    \ façade to the external world or clients delegating all calls to the Product\
    \ Server microservice. So Product Web also gets all of the components previously\
    \ seen for Product Server; the only difference is that there is no repository\
    \ component since it doesn’t do any DB interactions. But then, since Product Web\
    \ delegates all REST calls coming to it to the Product Server microservice, you\
    \ must create code for that, and it is for this purpose you will leverage the\
    \ Feign client instead of hand-coding all the plumbing, which I will explain next.\n\
    \n- **ProductService**: `ProductService` is the interface listing all the methods\
    \ selected for exposing, hence both Product Server and Product Web fulfill the\
    \ contract specified in this interface.\n\n- **ProductServiceProxy**: This component\
    \ is another abstract interface that extends `ProductService`, so it gets all\
    \ the methods expected out of both the Product Server and the Product Web interfaces.\
    \ Moreover, `ProductServiceProxy` is the interface for annotating the Feign client’s\
    \ essential configuration. In every practical sense, this can be considered as\
    \ the client-side proxy for the server-side functionality.\n\n- **Spring Cloud\
    \ Feign Client**: The Spring’s Feign client is the actual implementation that\
    \ Spring Cloud realizes on the fly. It is through this proxy implementation the\
    \ calls from Product Web are delegated to Product Server.\n\nThe interactions\
    \ described above are illustrated in Figure [8-2](#477630_1_En_8_Chapter.xhtml#Fig2)."
