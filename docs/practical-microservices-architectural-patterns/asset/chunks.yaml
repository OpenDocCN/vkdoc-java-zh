    `DefaultMessageListenerContainer` is a message listener container variant that
    uses plain JMS client APIs, specifically a loop of `MessageConsumer.receive()`
    calls that also allow for transactional reception of messages when registered
    with an XA transaction manager. This is designed to work in a native JMS environment
    as well as in a Java EE environment. You first set your standard JMS message listener,
    which is the settlement listener, so that messages can be picked up by the `SettlementListener.onMessage()`.


