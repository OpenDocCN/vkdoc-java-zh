  raw: '### RabbitMQ Message Sender


    You need to make a connection to a RabbitMQ Message broker and send a message.
    For this, you can use the client package from RabbitMQ libraries. Listing [6-1](#477630_1_En_6_Chapter.xhtml#PC1)
    shows the steps involved in doing so.


    ```

    import com.rabbitmq.client.Channel;

    import com.rabbitmq.client.Connection;

    import com.rabbitmq.client.ConnectionFactory;

    public class Send {

    private final static String QUEUE_NAME = "hello";

    public static void main(String[] argv) throws Exception{

    ConnectionFactory factory = new ConnectionFactory();

    factory.setHost("localhost");

    Connection connection = factory.newConnection();

    Channel channel = connection.createChannel();

    channel.queueDeclare(QUEUE_NAME, false, false, false, null);

    String message = "Hello World!";

    channel.basicPublish("", QUEUE_NAME, null, message.getBytes("UTF-8"));

    LOGGER.debug(" [!] Sent ''" + message + "''");

    channel.close();

    connection.close();

    }

    }

    Listing 6-1

    RabbitMQ Message Sender (ch06\ch06-01\src\main\java\com\acme\ch06\ex01\Send.java)

    ```


    You create a connection to RabbitMQ message broker. RabbitMQ is an AMQP compliant
    broker and you use `com.rabbitmq.client.ConnectionFactory` to open a connection
    to the AMQP broker. `com.rabbitmq.client.ConnectionFactory` is a RabbitMQ library,
    but later you will see how to connect to a RabbitMQ broker using a non-RabbitMQ,
    AMQP alone client library. For RabbitMQ to accept client connections, it needs
    to bind to one or more interfaces and listen on protocol-specific ports. By default,
    RabbitMQ will listen on port 5672 on all available interfaces, but you can configure
    it using the `rabbit.tcp_listeners` config option if required. Alternatively,
    there are methods like `setHost(String host)` and `setPort(int port)` to configure
    the listening host, port, and so on. Also, you can assume that RabbitMQ is configured
    to allow connections using the default username of “guest” and the default password
    of “guest.”


    Next, you need to create a channel. By using a message channel, one application
    can write information to the channel and the other application can read that information
    from the channel. Now you must declare a queue to send the messages to, and once
    done, you can publish a message to the queue. Note that declaring a queue will
    create a new queue only if it doesn’t exist already, hence the operation is idempotent.
    The `basicPublish` method in the channel expects message content in a byte array,
    so you can encode whatever you like here.


    ### RabbitMQ Message Receiver


    Listing [6-2](#477630_1_En_6_Chapter.xhtml#PC2) shows the code required to listen
    to a RabbitMQ Message broker to consume messages.


    ```

    import com.rabbitmq.client.Channel;

    import com.rabbitmq.client.Connection;

    import com.rabbitmq.client.ConnectionFactory;

    import com.rabbitmq.client.Consumer;

    import com.rabbitmq.client.DefaultConsumer;

    import com.rabbitmq.client.Envelope;

    import com.rabbitmq.client.AMQP;

    public class Receive{

    private final static String QUEUE_NAME = "hello";

    public static void main(String[] argv) throws Exception{

    ConnectionFactory factory = new ConnectionFactory();

    factory.setHost("localhost");

    Connection connection = factory.newConnection();

    Channel channel = connection.createChannel();

    channel.queueDeclare(QUEUE_NAME, false, false, false, null);

    LOGGER.debug(" [!] Waiting for messages. To exit press CTRL+C");

    Consumer consumer = new DefaultConsumer(channel){

    @Override

    public void handleDelivery(String consumerTag,

    Envelope envelope, AMQP.BasicProperties

    properties, byte[] body) throws IOException {

    String message = new String(body, "UTF-8");

    LOGGER.debug(" [x] Received ''" + message + "''");

    }

    };

    channel.basicConsume(QUEUE_NAME, true, consumer);

    }

    }

    Listing 6-2

    RabbitMQ Message Receiver (ch06\ch06-01\src\main\java\com\acme\ch06\ex01\Receive.java)

    ```


    Since a consumer is pushed messages from RabbitMQ when there are more messages
    in the broker for the channel, you need to keep it running to listen for messages
    and consume them as messages arrive at the broker. You use `com.rabbitmq.client.Consumer`
    as an application callback object to receive notifications and messages from a
    queue by subscription. You declare the queue here as well because if you start
    the consumer before the publisher, you want to make sure the queue exists on the
    broker end before you try to consume messages from it. Now you need to tell the
    broker to deliver the messages from the queue. Since the broker is expected to
    push the messages asynchronously, you provide a callback object that will buffer
    the messages until you’re ready to use them. `com.rabbitmq.client.DefaultConsumer`
    comes in handy; it’s a convenience class that provides a default implementation
    of `Consumer`.


