    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    E-commerce microservices architecture


    I have not introduced any new modules in this new architecture representation.
    Instead, retaining the already existing modules in the monolith architecture,
    I have considerably changed the structure of the software modules as well as the
    technology infrastructure. Let’s look into this structural change in detail.


    ### No Tier, Distributed


    I discussed the three-tier and n-tier distributed architectures in the “System
