    ## Summary


    Provisioning for HA and scalability is an art as well as an engineering activity.
    There can be more than one design suitable for a specific scenario, and choosing
    the right one with future requirements in mind is a challenging task. This chapter
    covered a few techniques, starting from the simple to more advanced to complex
    scenarios of HA design. In doing so, you also relooked at the CQRS pattern and
    dissected core aspects of scaling read and write nodes independently. While scaling
    read nodes is rather straightforward, the same is not the case when scaling write
    nodes, since you need to deal with concurrency issues while changing entity states.
    However, nothing is impossible, and you saw code in action on how to scale write
    nodes too, utilizing the basic principles of transaction control you learned in
    Chapter [14](#477630_1_En_14_Chapter.xhtml). With this, you have reached yet another
    milestone in your journey in this book. Accumulating all the knowledge gained
    thus far, it’s time now to look into more serious code, and you will do so in
    the next chapter when you look at complete end-to-end enterprise-grade microservices
    application. Take a break. When you’re ready, start the next chapter.


