  trans: '

    这种做法并不理想。DNS（域名系统）可用于解决类似问题；然而，在企业应用中面对数百个微服务时，DNS 相对笨重。此外，你也不希望将微服务的服务器细节暴露在外围或
    DMZ（非军事区）之外。在基于微服务的企业应用中，服务消费者通常是其他微服务。因此，这些微服务需要询问诸如服务拓扑（“是否有可用的‘产品服务’？如果有，在哪里？”）和服务能力（“你能处理
    A、B 和 C 吗？”）之类的问题。这正是 Eureka 和 Consul 等服务注册中心发挥作用的地方。Eureka 对通信协议或方法没有任何限制，因此你可以使用
    Eureka 来采用 thrift、http(s) 或任何其他 RPC 机制等协议。


    当已有许多软件和硬件负载均衡器（包括 AWS Elastic Load Balancer 和 AWS Route 53）时，你可能仍会怀疑是否需要 Eureka。AWS
    Elastic Load Balancer 用于暴露边缘服务，这些服务通常连接最终用户的网络流量，而 Eureka 则满足中间层负载均衡的需求，或者用我们的术语来说，是微服务注册和负载均衡。Route
    53 类似于 DNS 服务，你可以在其中托管 DNS 记录，甚至适用于非 AWS 数据中心，因此它带有传统基于 DNS 的负载均衡解决方案的相关缺点：你的流量仍可能被路由到不健康甚至不存在的服务器，这在
    AWS 为自动扩展配置的公共云部署中非常典型。由于你应该倾向于让微服务无状态（非粘性），Eureka 提供了更好的可扩展性模型，因为你的微服务能够抵御负载均衡器（Eureka）的故障——关于可用服务器的信息会缓存在客户端。这确实需要少量内存，但这种增强的弹性并不会过多地影响整体资源考量。


    设计一个启用 Eureka 的场景


    你将通过引入几个新组件来修改设计，如图 8-11 所示。这里你用 `RestTemplate` 替换了 `ProductServiceProxy`。这意味着
    Product Web 微服务现在将使用 `RestTemplate` 来消费 Product Server 微服务的任何实例。`RestTemplate`
    简化了与 HTTP 服务器的通信，第 7 章的“开发 RESTful Web 服务”部分已经解释了如何使用 `RestTemplate` 与 `RestController`
    通信。你将在此处进行扩展。使用 `RestTemplate` 的另一个意图是，当 `RestTemplate` 在类路径上并且定义了 `LoadBalancerClient`
    bean 时，你可以通过自动配置的 `RestTemplate` 间接使用 Ribbon，从而在之前的 Ribbon 示例基础上进行构建。


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig11_HTML.jpg](img/477630_1_En_8_Fig11_HTML.jpg)


    图 8-11

    使用 Eureka 的设计


    通过启用 Eureka 注册中心，所有微服务在启动时都会自行注册到注册中心。此外，在之前的示例中，你看到了如何通过多次实例化同一个 Product Server
    微服务来实现冗余。你将遵循相同的模式来处理 Eureka，以便在服务注册中心级别也实现冗余。


    使用 Eureka 的代码


    本节的所有代码示例都放在文件夹 `ch08\ch08-05` 中。访问 `pom.xml` 可以看到显式引用了 Eureka Server 依赖项。参见清单
    8-15。


    ```

    org.springframework.cloud

    spring-cloud-starter-eureka-server


    清单 8-15

    Eureka 依赖项 (ch08\ch08-05\Eureka\pom.xml)

    ```


    接下来，你需要 Spring Cloud 的 `@EnableEurekaServer` 来启动一个注册中心，其他微服务可以与之通信。这是在常规的 Spring
    Boot 应用程序 `main` 类中完成的，只需添加一个注解即可启用服务注册中心。参见清单 8-16。


    ```

    @EnableEurekaServer

    @SpringBootApplication

    public class EurekaRegistryApplication {

    public static void main(String[] args) {

    SpringApplication.run(EurekaRegistryApplication.class, args);

    }

    }

    清单 8-16

    启用 Eureka Server (ch08\ch08-05\Eureka\src\main\java\com\acme\ecom\infra\EurekaRegistryApplication.java)

    ```


    当 Eureka 启动时，它会尝试注册自身，因此你需要禁用它；参见清单 8-17。


    ```

    spring.application.name=eureka-registry

    server.port=8761

    eureka.client.registerWithEureka=false

    eureka.client.fetchRegistry=true

    eureka.client.server.waitTimeInMsWhenSyncEmpty=0

    eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/,http://localhost:8762/eureka/

    eureka.server.enableSelfPreservation=false

    清单 8-17

    Eureka 配置 (ch08\ch08-05\Eureka\src\main\resources\application.properties)

    ```


    如果你想使用这个单一的属性文件启动多个 Eureka 注册中心实例，你需要至少覆盖前两个参数。在以下两个脚本中执行此操作：


    ```

    ch08\ch08-05\Eureka\run1.bat

