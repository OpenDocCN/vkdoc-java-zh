    \nFigure 14-8\nQuotes Transactions table\n\nYou need a way to track which quotes\
    \ received through the messaging\nmiddleware have been settled and which are still\
    \ outstanding. The\ntransactions to the `QuotesTX` table have\nbeen handled by\
