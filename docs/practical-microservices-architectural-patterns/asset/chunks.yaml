    \ Spring Street, 6th Floor, New York, NY 10013. Phone 1-800-SPRINGER, fax (201)\
    \ 348-4505, e-mail orders-ny@springer-sbm.com, or visit www.springeronline.com.\
    \ Apress Media, LLC is a California LLC and the sole member (owner) is Springer\
    \ Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is\
    \ a Delaware corporation.\n\n*To Sowmya, Ann, and Ria*.\n\n# Foreword\n\nThis\
    \ book you currently hold in your hands is clearly the result of many years of\
    \ hands-on experience of a software engineer and architect. Binildas Christudas\
    \ has written a comprehensive volume guiding software engineers and software architects\
    \ through the jungle of conceptual decisions to be made in the realm of distributed\
    \ systems architectures.\n\nThe chapters are structured in a logical manner so\
    \ that the reader is guided through a set of important questions that need to\
    \ be asked in all large-scale distributed systems projects. In particular, it\
    \ deserves to be highlighted that the author spends a good amount of the book\
    \ explaining in detail all questions software architects and software engineers\
    \ need to ask before embarking on projects considering the use of microservices\
    \ and architecting the transition from monolithic architectures towards microservices-based\
    \ architectures. Furthermore, this book also discusses issues related to cloud\
    \ deployments, which constitutes a significant aspect of such systems.\n\nThe\
    \ set of exciting and advanced issues discussed in this book covers a range of\
    \ topics from fundamentals of microservices to questions related to transactions,\
    \ eventual consistency, cloud deployments, and CAP theorem-related issues.\n\n\
    This volume can serve as a guiding book on all matters related to microservices.\
    \ It’s a step-by-step manual on which questions to ask and subsequently which\
    \ steps to take in order to implement microservices-based distributed systems.\n\
    \nThank you.\n\n![](images/477630_1_En_BookFrontmatter_Figd_HTML.jpg)\n\n> Schahram\
    \ Dustdar\n> \n> Fellow, IEEE, & Head, Distributed Systems Group\n> \n> TECHNISCHE\
    \ UNIVERSITAT, WEIN (Vienna University of Technology)\n\nThe domain of software\
    \ engineering is evolving rapidly. Enterprises are continuously challenged by\
    \ newcomers in the market and by changes in legislation and customer expectations.\
    \ Startups evolve quickly and are challenged to handle the increasing demand for\
    \ their services when they become successful. These challenges require a thorough\
    \ review of how we design and build software. The microservices architecture provides\
    \ a good foundation for systems that face these demands.\n\nHowever, microservices\
    \ come with challenges of their own.\n\nBinildas did a good job combining his\
    \ extensive hands-on experience in software development with an open mind towards\
    \ new techniques and architectural styles. Throughout this book, Binildas takes\
    \ a practical approach to introducing different architectural patterns relevant\
    \ for microservices systems, describing both well-established, common patterns\
    \ as well as some emerging patterns, such as CQRS.\n\nIf you wish to embark on\
    \ the microservices journey, this book is your travel guide.\n\n![](images/477630_1_En_BookFrontmatter_Fige_HTML.jpg)\n\
    \n> Allard Buijze\n> \n> CTO & Founder of AxonIQ\n> \n> Creator of Axon Framework\n\
    \nMicroservices are all the news these days, just like SOA was a few years ago.\
    \ Some people say that microservices are just SOA done right. Instead of heavy\
    \ WS-* standards, we now have REST. Instead of the ESB, we have a lightweight\
    \ broker like ActiveMQ. What about transactions? In the following of industry\
    \ giants like Amazon, we don’t necessarily use (nor recommend) global ACID transactions\
    \ that span all our microservices. Instead, it’s all about BASE and Sagas these\
    \ days.\n\nBASE means: not a giant ACID transaction across all microservices (with\
    \ one enormous commit), but instead multiple, smaller ACID transactions that ripple\
    \ through the system - so it becomes consistent, eventually. Messaging is crucial\
    \ for this.\n\nEach of these smaller ACID transactions can be controlled with\
    \ proven technologies like XA, so they are really ACID - even when things go wrong.\n\
    \nUnfortunately, BASE is all too often just a misleading excuse used by modern\
    \ frameworks or technologies / platforms that lack XA support. The way BASE is\
    \ implemented is key, and without XA it is very hard to do it right - unless you\
    \ don’t care about duplicate processing or lost messages.\n\nDuplicates may give\
    \ issues sooner or later and get addressed with ad-hoc fixes. Lost messages may\
    \ never be detected at all except via data inconsistency in the longer term -\
    \ where the root cause will be extremely hard to find. You can have issues with\
    \ both at the consumer side, but also at the sender side.\n\nA simple and safe\
    \ way of doing BASE is shown in Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3)\
    \ of Chapter [13](#477630_1_En_13_Chapter.xhtml). Unless you feel adventurous,\
    \ I recommend that you stick to this kind of style. If you’re in financial services,\
    \ you’ll probably appreciate the strong guarantee offered by XA, with additional\
    \ code simplicity as a free bonus.\n\nAs Chapter [14](#477630_1_En_14_Chapter.xhtml)\
    \ shows, it takes a lot of extra coding and testing to mimic the guarantees that\
    \ come out of the box with XA transactions. Most of the tweaking in Chapter [14](#477630_1_En_14_Chapter.xhtml)\
    \ goes well beyond my own comfort zone, but Binildas has done a great job of pointing\
    \ out how much needs to be taken into account. It’s not a walk in the park; far\
    \ from it.\n\nAdvanced coding as with Sagas (Chapter [15](#477630_1_En_15_Chapter.xhtml))\
    \ can introduce a different level of transactions where you give up isolation\
    \ and have to cope with compensation yourself. At Atomikos, we have a somewhat\
    \ similar model called Try-Confirm/Cancel (TCC for short; see [`www.atomikos.com/Blog/TCCForTransactionManagementAcrossMicroservices`](http://www.atomikos.com/Blog/TCCForTransactionManagementAcrossMicroservices)).\
    \ The concept is great, although many people we talked to don’t like it very much\
    \ because the burden of rollback lies with them (compensation must be programmed).\n\
    \n![](images/477630_1_En_BookFrontmatter_Figf_HTML.jpg)\n\n> Guy Pardon, PhD\n\
    > \n> Founder\n> \n> atomikos.com\n\n# Introduction\n\nWe have been developing\
    \ and deploying distributed applications for about two decades, and microservices\
    \ lays down architectural principles and patterns using many shortfalls in developing,\
    \ deploying, and maintaining distributed applications can be dealt with. Microservices,\
    \ also known as the microservice architecture, is an architectural style that\
    \ structures an application as a collection of loosely coupled, independently\
    \ deployable services that are highly maintainable and testable and are organized\
    \ around business capabilities. *Practical Microservices Architectural Patterns*\
    \ is a practical introduction to writing microservices in Java using lightweight\
    \ and common technologies like Spring Boot, Spring Cloud and Axon. I present the\
    \ material in a way that will enable you to use what you learn right away. To\
    \ that end, I include code samples for all main concepts and show you exactly\
    \ how to build and execute them.\n\nThe book exposes many architectural complexities\
    \ you will deal with when designing microservices, and it uses code samples in\
    \ solving challenging scenarios. `Practical Microservices Architectural Patterns`\
    \ is an architect’s book first, but developers and technical managers can benefit\
    \ from it too. I wrote it keeping in mind Java architects who want to build serious\
    \ distributed server-side applications in general and microservices in particular.\
    \ Focus is on what an architect should be aware of on aspects like event-based\
    \ systems, transactional integrity, data consistency, and so on; developers too\
    \ will find the exhaustive code useful in their everyday work. Working knowledge\
    \ of Java, Spring, and a bit of HTTP is assumed to get the samples up and running\
    \ quickly. If you do not have background in Java and Spring, still the utility\
    \ build scripts and step-by-step instructions should help you. Further, even though\
    \ the samples are in Java, all the architectural aspects and many of the chapters\
    \ are not specific to Java, hence architects with any technology background dealing\
    \ with distributed systems should benefit from this book.\n\nThe book introduces\
    \ a complete microservices sample e-commerce application. The readers can straightaway\
    \ use it as a template to start building their production systems. Of all the\
    \ books available in the Java world, this is the first one exclusively demonstrating\
    \ by simulation all success and failure scenarios of a two-phase commit transaction\
    \ leveraging an XA transaction manager and two different XA transactional resources,\
    \ with complete code. Having shown the XA transaction in detail, the book next\
    \ covers with code, techniques available to attain (eventual) transactional integrity\
    \ by confining ACID-style transactions to within partitions and domains to adopt\
    \ what is called a BASE transaction across partitions and domains. The book has\
    \ working samples for Saga, one of the most well-known patterns for BASE-style\
    \ distributed transactions. The book also covers high availability, security,\
    \ and performance of microservices. Many of the mantras depicted here are only\
    \ available with experienced architects; they’re not available elsewhere in the\
    \ public domain, but they’re now condensed in the form of this book.\n\n# Acknowledgments\n\
    \nA big thanks to Apress Media for having trust in me and giving me the opportunity\
    \ to write this book. Nikhil Karkal and Divya Modi from Apress have been very\
    \ helpful in making the process seamless and quick for me. I want to thank Siddhi\
    \ Chavan for collaborating with me and providing detailed instructions on how\
    \ to make the content even better. I also thank Matthew Moodie for providing the\
    \ shape of this book through the initial chapters.\n\nThe tech-friendly workplace\
    \ at IBS Software has been a boon for me. Many thanks to Mr. V. K. Mathews, Executive\
    \ Chairman, IBS Group, for consistent motivation throughout my literary journey.\
    \ I also need to thank Mr. Arun Hrishikesan, Chief Technology Officer, IBS, for\
    \ his constant reminders and support for completing this book, especially in providing\
    \ his broader views on technology areas, which has influenced the content and\
    \ style of this book to a great extent.\n\nI thank Dr. Schahram for the many hours\
    \ of interactions where he shared his views on CAP theorem and its implications\
    \ in practical software architectures.\n\nSpecial thanks are due to Mr. Allard\
    \ Buijze, CTO & Founder at AxonIQ, who extended all support in completing this\
    \ book.\n\nMy note of thanks to Dr. Guy Pardon, PhD, Global Solutions Architect\
    \ at Atomikos, for providing his insights into my book proposal and contents.\
    \ Guy kept us honest, picking up technical errors and ambiguities. The complete\
    \ weekend dedicated to making the chapters on transactions so detailed was invaluable,\
    \ and I am so thankful.\n\nArun Prasanth made sure all the examples within this\
    \ book were working as expected. I thank him for reviewing the code content and\
    \ also for doing the technical review for the book.\n\nFinally, special thanks\
    \ to my wife, Sowmya Hubert, who knows how strong my passion for technology is\
    \ and who never complains about the time I spend writing. I would like to thank\
    \ my daughters, Ann S. Binil and Ria S. Binil, who were way too understanding\
    \ and supportive over the last many months while I was locked away with my laptop\
    \ instead of spending time with them. A huge thanks is due to my father, Christudas\
    \ Y., and mother, Azhakamma J., for their selfless support, which helped me reach\
    \ where I am today. Also my note of thanks to my in-laws, Hubert Daniel and Pamala\
    \ Percis. Finally, thanks to my sister, Dr. Binitha, her husband, Dr. Segin Chandran,\
    \ and their daughter, Aardra."
