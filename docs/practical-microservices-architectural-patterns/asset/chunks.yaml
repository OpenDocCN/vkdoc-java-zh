    REST 组件通过 `@RestController` 注解进行标识，而 `ProductRestController` 则处理针对 Product 实体的基于
    HTTP 的 CRUD 请求。方法体的实现使用提供的 id 检索产品实体，并返回一个新的 `Product` 对象。此 `Product` 对象的数据将直接以
    JSON 格式写入 HTTP 响应。清单 7-13 还展示了一个批量检索操作，用于检索所有 `Product` 资源。


    传统的 MVC 控制器与上述 RESTful Web 服务控制器之间的一个关键区别在于 HTTP 响应体的创建方式。这个 RESTful Web 服务控制器并非依赖视图技术来执行问候数据到
    HTML 的服务器端渲染，而是简单地填充并返回一个 `Greeting` 对象。该对象数据将直接以 JSON 格式写入 HTTP 响应。


    这段代码使用了 Spring 4 的 `@RestController` 注解，该注解将类完全标记为控制器，其中每个方法都返回一个领域对象，而不是像传统 MVC
    控制器那样返回视图。它是 `@Controller` 和 `@ResponseBody` 组合在一起的简写形式。


    为了将 `Product` 对象转换为 JSON，Spring 使用了 HTTP 消息转换器支持。你无需手动执行此转换，因为类路径上存在 Jackson 2，所以
    Spring 的 `MappingJackson2HttpMessageConverter` 会被自动选中，用于将 `Product` 实例转换为 JSON。


    让我们看看其他操作。清单 7-14 展示了如何创建新资源。


    ```

    @RestController

    public class ProductRestController {

    @RequestMapping(value = "/products", method = RequestMethod.POST)

    public ResponseEntity> postProduct(@RequestBody Product

    product,    UriComponentsBuilder ucBuilder) {

    List products =

    productRepository.findByCode(product.getCode());

    if (products.size() > 0) {

    LOGGER.debug("A Product with code {} already exist",

    product.getCode());

    return new ResponseEntity>(HttpStatus.CONFLICT);

    }

    Product newProduct = productRepository.save(product);

    HttpHeaders headers = new HttpHeaders();

    headers.setLocation(ucBuilder.path("/products/{id}").buildAndExpand(

    product.getId()).toUri());

    Resource productRes =new Resource(newProduct,

    linkTo(methodOn(ProductRestController.class).getProduct(

    newProduct.getId())).withSelfRel());

    return new ResponseEntity>(productRes,

    headers, HttpStatus.OK);

    }

    }

