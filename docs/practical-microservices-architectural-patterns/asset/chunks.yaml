  trans: '

    ### 典型应用架构


    如今企业使用的许多现代应用都是基于多层架构和面向对象编程语言构建的，并且能够利用分布式技术和基础设施进行部署。选择合适的层和层级可以实现灵活的部署，以满足可扩展性需求。现在，让我们来看一个以分布式方式部署的电子商务应用的典型架构。


    图 1-3 展示了一个典型的应用架构。这是一个三层应用，即表示层与业务层分离，并且还有第三个数据库层。表示层被打包成一个 `.war` 文件，包含在 Web
    浏览器中渲染用户界面所需的所有工件。业务层以 `.jar` 格式打包，包含大部分业务功能和业务规则。你也可以将表示层和业务层合并，创建一个 `.ear` 格式的应用工件。


    表示层和业务层可以分别部署到各自专用的服务器硬件上，这些硬件可以配置为简单的服务器场或服务器集群。服务器场是一组托管应用组件的服务器实例，其工作方式使得来自单个浏览器实例的后续流量可以路由到任何一个实例，而不管之前的请求被路由到了哪个服务器实例。通常，位于服务器场前方的负载均衡器会分发流量。此外，部署在服务器场中的应用组件通常是无状态的，这意味着来自单个浏览器实例的流量可以路由到任何一个实例，而不管之前的请求被路由到了哪个服务器实例。这样，请求就是“非粘性的”。而在服务器集群中，服务器实例通常通过心跳和状态复制来相互协调。在这里，请求是粘性的，这意味着只要集群中的某个服务器实例处于活动状态，来自单个浏览器的请求将始终被路由到该实例。不过，根据集群和负载均衡器的配置方式，非粘性请求也可以由集群处理。


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig3_HTML.jpg](img/477630_1_En_1_Fig3_HTML.jpg)


    图 1-3.

    典型应用架构


    数据库层托管数据管理功能。它处理 CRUD（创建、读取、更新和删除）请求，并通过适当协调并发 CRUD 请求来负责数据一致性功能。


    现在，让我们更详细地了解这个应用。具体来说，假设表示层和业务层是分开部署的，在这种情况下，应用层仅托管业务层。图 1-3 标明了应用边界，也就是业务边界本身。我之前提到了层和层级，同样重要的是将应用划分为多个部分，称为模块。因此，模块可以定义为一组紧密相关、因此彼此之间具有高度“内聚性”的功能和组件。多个这样的模块之间具有更高层次的“粘附性”，共同构成完整的应用。尽管图中单独标出了模块边界，但在实践中，物理软件包中可能存在也可能不存在这种区分性的分离。需要明确的是，当我们设计或构建许多这样的模块并将其打包到单个
    `.jar` 或 `.ear` 文件中时，没有什么能阻止我们从一个模块向另一个模块发出请求，并且随着此类依赖项数量的增加，模块之间的粘附性也会增加。因此，所表示的边界只是一个虚拟边界，它仍然允许模块之间进行“闲聊”。通常，这种“闲聊”可以通过进程内方法调用来实现。在这种架构中，主要的实际边界是应用边界本身，正是在这个边界上，我们通常应用
    SOA（面向服务架构）和类似的原则。如果我们想将模块部署到多个进程中，我们可能希望使用合适的远程处理方法进行模块间通信，但这只有在我们为此设计了模块的情况下才有可能，因为事后无法补救。


    ### 典型部署架构


    如前所述，我们可以将表示层和业务层合并，创建一个 `.ear` 格式的应用工件进行部署，或者将它们分别保留为 `.war` 和 `.jar` 文件，这样可以实现更灵活的部署，使表示层和业务层分离。如果这两层部署在一起，则可以通过本地方法调用来优化模块间通信。将它们分离的原因是为了允许在这两层之间进行差异化的横向扩展部署，当我们这样做时，必须采用合适的远程处理方法来促进层间通信。通常，我们使用
    Java RMI、更通用的 IIOP 或更灵活的协议（如 HTTP）来进行这种层间通信。


    如图 1-4 所示，在这些层的前面可以放置一个或多个网络层防火墙，以控制仅来自已知网络的客户端对功能的访问级别。数据库层的情况也是如此。这意味着我们将能够应用配置，以便只允许来自互联网的有效应用相关调用到达表示层，然后在其他层前面设置更严格的规则，只允许来自已知且有效
    IP 的调用到达业务层。


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig4_HTML.jpg](img/477630_1_En_1_Fig4_HTML.jpg)


    图 1-4.

    典型部署架构


    如果应用服务被设计为无状态的，那么通过采用合适的部署架构，我们可以应对任何流量增长。此外，表示层的横向扩展级别独立于业务层的横向扩展级别。数据库层需要特别注意。表示层负责组装内容以有效渲染用户界面，而业务层负责对业务数据进行更改。数据库层的唯一目的是以一致的方式跨用户请求或跨服务器重启保持数据状态的可访问性。因此，数据库层是数据单一真实来源的地方。这给数据库层的扩展带来了限制。数据库层的横向扩展策略与其他层不同，因为并发可修改的数据不能就这样复制，因为那样我们就需要解决数据协调的问题。通常，数据库横向扩展问题以及相关的数据一致性和数据协调问题的解决方案由数据库供应商提供，而不是由应用架构师提供。同样的原因使得数据库层的技术栈比其他层更昂贵。Oracle
    RAC（真正应用集群）是该领域的一项技术。同样重要的是另一个事实：即使采用了这些昂贵的解决方案，数据库层可实现的横向扩展级别也无法与其他层相媲美，因为数据库始终是有状态的，而不是无状态的。

    '
- fmt: '# The Scalability Dilemma


    You have seen the degree of scalability achievable following a well-designed application
    architecture. However, the technology landscape is evolving at a faster pace,
    and newer devices and access channels provide continuous pressure to the application
    architect in terms of increasing the scalability. This new trend is called "web
    scale," where the scalability of the application is limited by nothing but the
    Web itself. By web, we mean the network or the Internet helping unlimited users
    and devices get connected to the application and access the services.


    ## Application State


    How many of you don''t like the `javax.servlet.http.HttpSession` API or the EJB
    (Enterprise Java Bean) deployment descriptor element called `session-type`, which
    can take a value of `stateful`? For readers unfamiliar with these APIs, here is
    a short description:


    *   **HttpSession**: A servlet container uses this interface to create a session
    between an HTTP client and an HTTP server. The session may persist for a specified
    time period, across more than one connection or page request from the user. A
    session instance usually corresponds to one user, who may visit a web site multiple
    times. The server can maintain a session in many ways, such as using cookies,
    URL rewriting, and an `HttpSession` object.


    *   **session-type**: This deployment descriptor element specifies the type of
    session bean as `stateful` or `stateless`. If it''s marked as `stateful`, then
    the EJB instances are kept as dedicated for a particular user. This means the
    EJB instance cannot be pooled by the EJB container, since they are to remain dedicated
    for each user.


    Both methods provide an easy means for the application architect to store user-specific
    data at the server side. Typical data to be stored in such ways are:


    *   **Authentication and authorization flags**: Once a user has been authenticated
    by the server, a flag is kept in the presentation server to allow subsequent requests
    to bypass further authentication.


    *   **Shopping cart**: A shopping cart in an e-commerce application allows users
    to select items for eventual purchase. It allows customers to accumulate a list
    of items for purchase. Upon checkout, it calculates a total for the order, including
    shipping and handling (i.e., postage and packing) charges and the associated discounts
    and taxes as applicable. Until then it just keeps the order state temporarily
    only, and the above API methods are nice places to store such states.


    But the downside of using these APIs is that, since the software component instances
    become user-specific, they cannot be shared for more than one user. In more technical
    terms, the instances become pinned resources and many times the load balancer
    instead of load balancing will send requests from a single user to the same server
    instance. This is not a good practice if we want to web scale.^([²](#fn2))


    ## The Dependency Nightmare


    The single responsibility pattern and principles of abstraction advocate building
    functionality in software using a modular approach. Functionalities that are closely
    related and similar are grouped together to form a software module. Any application
    of considerable size will have more than one module.


    It is also common to have functionality in one module depend directly on functionality
    in another module within the same application. This dependency is often expressed
    in terms of method or service invocation across modules. Figure [1-5](#477630_1_En_1_Chapter.xhtml#Fig5)
    shows a request from a user to create an e-commerce order. Once the request comes
    to the Order module, the module internally does a series of activities:


    *   Creates an Order entity and associated line items in the database

    *   Makes a call to the inventory database to deplete inventory

    *   If required, also invokes a call to the Order History module to make suitable
    entries

    *   Internally invokes the Notification module, which subsequently sends an order
    confirmation notification to the user


    Often such intermodule calls are characterized by:


    *   Synchronous Request Response style

    *   Binary dependency like Java interfaces, stubs, etc.

    *   Dependency on shared entities


    When multiple teams or multiple people develop these modules separately, due to
    the nature of above intermodule calls, dependency exists across modules, people,
    and teams. Common libraries and common entities are to be shared. When something
    changes in a module, the associated libraries need to be updated and redistributed
    across people and teams so that they can still continue with the development of
    their individual modules.


    Further, as discussed, due to these intermodule communications, it is not easy
    to further divide the application and deploy heterogeneously, if there is a need
    to do so.


    ## The Application Monolith


    If you closely observe Figure [1-4](#477630_1_En_1_Chapter.xhtml#Fig4), you can
    understand how to scale the different tiers of an application. Since the application
    tier is designed as a single whole with intermodule communications as required,
    it is not easy to further divide the application and deploy heterogeneously. Then
    the question is, why do we ever want to deploy heterogeneously? Out of the different
    modules like Product, Order, and Shipping, many people might be browsing the product
    catalogue and the product details whereas only a percentage of these users will
    actually check out and buy, thus creating an order in the system. Further, we
    only want to ship orders that are actually paid and confirmed. So, the Product
    module needs to take more traffic and the Order module needs to handle comparatively
    less traffic. It would be good if we could deploy more instances of the Product
    module and fewer instances of the Order module to optimally utilize resources,
    but since the application tier is designed as a single whole, heterogeneous deployment
    is not straightforward.


    Next, if we want to accommodate change requests in the software, whenever there
    is a change to be applied to some piece of code in the application, we want to
    upgrade the application as a whole. Downtime will be considerable, which will
    affect normal business operations.


    Further, if there is a bug in the software or if there is some other defect that
    affects the running application, it is likely that the entire application is affected.


    All of these downsides are in spite of the best architecture principles described
    earlier, and this is the side effect of the monolith architecture, since the application
    is one single, big block. See Figure [1-5](#477630_1_En_1_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig5_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig5_HTML.jpg)


    Figure 1-5. Intermodule dependency


    # The Scalable Architecture


    Now let''s look at few aspects of how to make the application architecture web
    scale.


    ## Stateless Design


    The first principle is to design the application services as stateless. Any state
    that is permanent can be kept at the database tier whereas any temporary state
    can be kept at the client tier itself. The downside of this design is that we
    may have to pass identifiers or tokens along with requests so that at the server
    side the components will have the right context to execute the requests. But the
    advantage of such a design is that since the application is stateless, any request
    from any user can be routed to any instance of the server. This means that even
    if one of the server instances goes down, the subsequent requests can be served
    by any other instance in the server farm. Similarly, when you want to scale up
    the application on the fly, any new server instance added to the farm can also
    be accounted to load balance all subsequent requests from any client.'
