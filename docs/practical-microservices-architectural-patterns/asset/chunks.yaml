- fmt: "So far, so good. Now let’s come to the business orchestration part. The orchestration\
    \ of depreciating inventory and creating a new order will now get moved from `OrderCommandHandler`\
    \ in Listing [19-12](#477630_1_En_19_Chapter.xhtml#PC17) to the `OrderController`\
    \ REST controller in Listing [19-18](#477630_1_En_19_Chapter.xhtml#PC23). The\
    \ essence is that operations on both entities are to be successful together or\
    \ all of the actions must be compensated back!\n\n```java\n@RestController\n@RequestMapping(\"\
    /order\")\npublic class OrderController {\n    @Autowired\n    private CommandGateway\
    \ commandGateway;\n\n    @RequestMapping(method = RequestMethod.POST)\n    @ResponseBody\n\
    \    public OrderCreationStatus createOrder(@RequestBody OrderDTO orderDTO) {\n\
    \        OrderCreationStatus orderCreationStatus = null;\n        //Step1 :  depreciating\
    \  inventory of products.............\n        List inventoryUpdatedList = new\
    \ ArrayList();\n        try {\n            for (LineItemDTO lineItemDTO : orderDTO.getLineItems())\
    \ {\n                commandGateway.sendAndWait(new InventoryUpdateCommand(\n\
    \                        lineItemDTO, ProductStockOperation.DEPRECIATE));\n  \
    \              inventoryUpdatedList.add(lineItemDTO);\n            }\n       \
    \ } catch (Exception ex) {\n            Throwable e = ex.getCause();\n       \
    \     if (e instanceof OutOfStockException) {\n                LOGGER.error(\"\
    Error while creating new order due to Out of Stock\", e);\n                orderCreationStatus\
    \ = OrderCreationStatus.OUT_OF_STOCK;\n            } else {\n                LOGGER.error(\"\
    Unknown Error while updating inventory\", e);\n                orderCreationStatus\
    \ = OrderCreationStatus.FAILED;\n            }\n            //Step2 : Any exception,\
    \ rollback updated inventory\n            for (LineItemDTO lineItemDTO : inventoryUpdatedList)\
    \ {\n                commandGateway.send(new InventoryUpdateCommand(\n       \
    \                 lineItemDTO, ProductStockOperation.ADD));\n            }\n \
    \           return orderCreationStatus;\n        }\n        //Step 3: create new\
    \ order\n        try {\n            OrderCreateCommand orderCommand =\n      \
    \              new OrderCreateCommand(orderDTO.getUserId(),\n                \
    \            orderDTO.getLineItems());\n            commandGateway.sendAndWait(orderCommand);\n\
    \            orderCreationStatus = OrderCreationStatus.SUCCESS;\n        } catch\
    \ (Exception ex) {\n            LOGGER.error(\"Unknown Error while creating new\
    \ order\", ex);\n            orderCreationStatus = OrderCreationStatus.FAILED;\n\
    \            // Step 4: Any exception, rollback all updated inventory\n      \
    \      for (LineItemDTO lineItemDTO : orderDTO.getLineItems()) {\n           \
    \     commandGateway.send(new InventoryUpdateCommand(lineItemDTO,\n          \
    \              ProductStockOperation.ADD));\n            }\n        }\n      \
    \  return orderCreationStatus;\n    }\n\n    @RequestMapping(value = \"{orderId}\"\
    , method = RequestMethod.DELETE)\n    @ResponseBody\n    public void cancelOrder(@PathVariable\
    \ Long orderId) {\n        OrderCancelCommand orderCommand = new OrderCancelCommand(orderId);\n\
    \        commandGateway.send(orderCommand);\n    }\n}\n```\n\nThe first aspect\
    \ you need to note in Listing [19-18](#477630_1_En_19_Chapter.xhtml#PC23) is that\
    \ the HTTP POST method `createOrder` is not within any kind of transaction. This\
    \ is where you do the orchestration of depreciating inventory and creating a new\
    \ order. This means that while the aggregate root entity operations happen within\
    \ local transactions of command handler operations of `OrderCommandHandler` in\
    \ Listing [19-16](#477630_1_En_19_Chapter.xhtml#PC21) and that of the `InventoryCommandHandler`\
    \ in Listing [19-17](#477630_1_En_19_Chapter.xhtml#PC22), their orchestration\
    \ is done without any enclosing transaction context, as shown in Listing [19-18](#477630_1_En_19_Chapter.xhtml#PC23).\
    \ This means exceptions and errors can happen at (or after) any line of code (a.k.a.\
    \ instructions or operations), in which case the actions done so far must be compensated\
    \ back too!\n\nListing [19-18](#477630_1_En_19_Chapter.xhtml#PC23) shows that\
    \ in Step 1 you `sendAndWait` as many `InventoryUpdateCommand`s as you have line\
    \ items in the Order POST request. The `sendAndWait` dispatches an `InventoryUpdateCommand`\
    \ to the command gateway so that the commands will be picked up by the `InventoryCommandHandler`\
    \ in Listing [19-17](#477630_1_En_19_Chapter.xhtml#PC22). Further, since both\
    \ the `OrderController` and the `InventoryCommandHandler` are in the same microservice\
    \ (or partition) and since `sendAndWait` is a synchronous blocking call, if `sendAndWait`\
    \ is successful, you can be sure that the intended operations are executed with\
    \ certainty. For all line items for which the `sendAndWait` is success, you keep\
    \ track of them in an `inventoryUpdatedList` to do compensating actions later,\
    \ if required. If you are able to successfully `sendAndWait` an `InventoryUpdateCommand`\
    \ for all of the line items for an order, then you proceed to Step 3, where you\
    \ start to create an order. In other words, you make sure enough inventory exists\
    \ and you also depreciate all the required inventory before you proceed to create\
    \ an order.\n\nWhile you check for stock or inventory, errors can happen for any\
    \ of the line items either due to non-availability of enough stock or due to some\
    \ other failure. Whatever the reason, the complete Order cannot be honored in\
    \ that case, so you need to compensate for any inventory changes already effected\
    \ for that Order. This is marked as Step 2 in Listing [19-18](#477630_1_En_19_Chapter.xhtml#PC23).\n\
    \nIf Step 1 is fully successful without any errors, it means you have already\
    \ have enough inventory to fulfil the order, so you start executing Step 3. Here\
    \ again you create an `OrderCreateCommand` and `sendAndWait` to the command gateway.\
    \ The `OrderCommandHandler` in Listing [19-16](#477630_1_En_19_Chapter.xhtml#PC21)\
    \ that handles new order creation is again in the same microservice, so a successful\
    \ `sendAndWait` is deterministic enough to assume that order creation is successful.\
    \ An exception at this stage also means you need to compensate for any inventory\
    \ changes already effected for that order. This is marked as Step 4 in Listing\
    \ [19-18](#477630_1_En_19_Chapter.xhtml#PC23).\n\nThis is an example of a BASE\
    \ transaction; however, the overall transaction is not fail safe. What that means\
    \ is if a microservice crash happens while the `createOrder` HTTP REST POST method\
    \ is getting executed, the rest of the instructions within the `createOrder` will\
    \ not be executed; there is every chance for the following state to happen:\n\n\
    - Inventory corresponding to line items of an order gets updated; however, the\
    \ order is not created and inventory is not reinstated.\n- Inventory corresponding\
    \ to all line items of an order gets updated; however, the order is not created\
    \ and inventory is not reinstated.\n- Inventory corresponding to all line items\
    \ of an order gets updated; however, the order is not created and inventory corresponding\
    \ to few line items alone gets reinstated."
