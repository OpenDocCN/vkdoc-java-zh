    Eureka clients are built to handle the failure of one or more Eureka peers in
    the Eureka farm. Since Eureka clients have the registry information cached with
    them, they can operate reasonably well, even when all of the available Eureka
    peers goes down.


    ## Bootstrap Your Bootstrap Server


    You should understand by now that every service instance in a microservice-based
    enterprise application can be registered with the Eureka registry, and this is
    the case with Eureka registry instances. There is one exception to this, which
    is the API gateway, which you will look at the next section; until then, ignore
    this exception. I have said that the Eureka registry is the directory of services
    for any interested service consumer, so if the service consumer can somehow reach
    the registry with the name of the service it wants to consume, the registry will
    provide the information (host, port, etc.) on how to reach that service. Now the
    golden question is, how does any service consumer reach a registry to start with?
    In other words, the Eureka registry will help any microservice to bootstrap and
    advertise itself. But how can a Eureka registry ever advertise itself? How does
    the bootstrap server bootstrap itself?! You need a standard set of well-identifiable
    addresses for Eureka servers. One mechanism is to have an internal DNS or similar
    service. However, such pinned (IP) addresses will only work in a traditional LAN
    environment. The moment we talk about deployment in a public cloud like AWS, the
    scenario changes. In a cloud like AWS, instances come and go. This means you cannot
    pin Eureka servers with a standard hostname or an IP address. Mechanisms like
    AWS EC2 Elastic IP addresses must be used here. An Elastic IP address is a static
    IPv4 address designed for dynamic cloud computing. With an Elastic IP address,
    you can mask the failure of a microservice by rapidly remapping the address to
    another instance in your account. You need one Elastic IP for every Eureka server
    in the cluster. Once you configure your Eureka Server with the list of Elastic
    IP addresses, the Eureka server deals with the hassle of finding the Elastic IP
    that is unused and binds it to itself during the start up.'
