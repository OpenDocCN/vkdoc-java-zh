    \n15. `Event Handle Core`微服务中的产品事件处理器已订阅库存更新事件，因此它会收到库存更新的详细信息。\n\n16. 根据库存更新事件中提到的详细信息，产品事件处理器将对产品的读模型进行更改。\n\
    \n17. `Event Handler Audit`微服务中的审计事件处理器也已订阅订单取消事件，因此它会收到订单取消的详细信息。\n\n18. 根据订单取消事件中提到的详细信息，审计事件处理器将在审计的读模型中创建一条新记录。\n\
    \n19. 浏览器可以自行刷新，以通过查询实体的读模型来保持视图更新。\n\n**编写示例Saga场景的代码**\n\n演示简单Axon示例所需的完整代码位于`ch15\\\
