    \ 是两个反向代理设置，其中 `http://myapp1` 指向 API 网关，而 `http://myapp2` 指向 Web 应用服务器集群，可以从该集群获取应用的默认主页。\n\
    \n你需要在启动 API 网关和 Web 应用服务器之后才启动 Nginx，这样 Nginx 的日志中就不会出现任何错误。\n\n由于你需要启动更多实例，让我们再次审视设计，但这次重点关注已配置的不同端口和微服务名称，这样当我解释相关代码部分时，你会更容易理解。这些细节已在图\
    \ 9-13 中标注。\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig13_HTML.jpg](img/477630_1_En_9_Fig13_HTML.jpg)\n\
    \n图 9-13\n用于高可用性演示的微服务名称和端口\n\nEureka 的配置与第 8 章中解释的相比没有变化。在 Zuul API 网关中，唯一的区别在于应用配置；请参见代码清单\
    \ 9-2。\n\n```\nspring:\napplication:\nname: product-service-api\nzuul:\nroutes:\n\
    product-api:\npath: /myapp1/api/∗∗\nservice-id: product-service\nproduct-webapi:\n\
    path: /myapp1/web/∗∗\nservice-id: product-web\n代码清单 9-2\nZuul API 网关路由配置 (ch09\\\
    ch09-01\\ProductApiZuul\\src\\main\\resources\\application.yml)\n```\n\n该配置不言自明。它表明\
    \ API 网关的应用名称为 product-service-api。此外，任何符合 `/myapp1/api/**` 模式的 URL 都将被路由到 product-service\
    \ 微服务，而任何符合 `/myapp1/web/**` 模式的 URL 都将被路由到 product-web 微服务。\n\nProduct Data Server\
    \ 微服务不言自明，因为它与你第 8 章“使用 Zuul 的代码”部分中遇到的 Product Server 微服务类似。同样，Product Web Server\
    \ 微服务与你第 8 章“编写 Hystrix 新设计代码”部分中遇到的 ProductWeb 微服务类似，因此这里不再赘述。\n\n然而，Web App\
    \ 微服务需要稍作解释，因为这是你第一次使用此类微服务的结构。Web App 微服务是一等微服务；但其目的是仅为客户端设备提供静态内容。在你的示例中，内容是\
    \ HTML 文件和 JavaScript，它们在客户端设备中渲染。因此，作为第一步，你需要将微服务建模为 Spring MVC Web 应用程序，并为此使用\
    \ spring-boot-starter-web 依赖项；请参见代码清单 9-3。\n\n```\norg.springframework.boot\n\
    spring-boot-starter-web\n\n代码清单 9-3\n用于 MVC 的 Spring Boot 依赖项 (ch09\\ch09-01\\\
    WebApp\\pom.xml)\n```\n\nspring-boot-starter-web 是用于构建 Web（包括 RESTful）应用程序的启动器，它使用\
    \ Spring MVC，并将 Tomcat 作为默认嵌入式容器。spring-boot-starter-web 通过 spring-boot-starter-tomcat\
    \ 引入了 Tomcat，但也可以通过更改配置来使用 spring-boot-starter-jetty 和 spring-boot-starter-undertow。\n\
    \n接下来，Web App 微服务只有一个 Java 类，如代码清单 9-4 所示。\n\n```\n@SpringBootApplication\n@EnableEurekaClient\n\
    public class EcomProductHomeMicroserviceApplication {\npublic static void main(String[]\
    \ args) {\nSpringApplication.run(EcomProductHomeMicroserviceApplication.class,\n\
    args);\n}\n}\n代码清单 9-4\nWeb App 微服务应用 (ch09\\ch09-01\\WebApp\\src\\main\\java\\\
    com\\acme\\ecom\\product\\EcomProductHomeMicroserviceApplication.java)\n```\n\n\
    该应用的其他工件放置在文件夹 ch09\\ch09-01\\WebApp\\src\\main\\resources 中。它们是基于 Angular JS\
    \ 的 Web 应用所需的文件。我不会深入探讨或解释这个应用，因为本书的范围不是深入 Angular 或 Web 端编程，而仅关注微服务方面。因此，这里我只提及两个文件。\n\
    \n```\nch09\\ch09-01\\WebApp\\src\\main\\resources\\static\\index.html\n```\n\n\
    这是客户端设备在浏览器中输入引导 URL（`http://tiger:8090`）后将收到的欢迎页面。Nginx 会将其解析到 myapp2，然后 myapp2\
    \ 会将请求负载均衡到代码清单 9-5 中所示的任何一个监听套接字。\n\n```\nupstream myapp2 {\nserver localhost:9001;\n\
    server localhost:9002;\n}\n代码清单 9-5\n反向代理配置\n```\n\n如果你回头参考图 9-13，可以回想起端口 9001\
    \ 和 9002 托管了 Web App 微服务的冗余实例。现在你需要理解，当 HTML 被下载并在客户端设备中渲染时，相关的脚本也会被下载到设备中，因此下一个感兴趣的文件也会被下载到设备中，并在设备上执行；请参见代码清单\
    \ 9-6。\n\n```\nApp.factory('ProductService', ['$http', '$q', function($http, $q){\n\
    return {\ngetApplication: function() {\nreturn $http.get('http://localhost:8090/myapp1/web/productsweb/')\n\
    .then(\nfunction(response){\nreturn response.data._embedded.products;\n},\nfunction(errResponse){\n\
    console.error('Error while fetching application');\nreturn $q.reject(errResponse);\n\
    }\n);\n}\n};\n}]);\n代码清单 9-6\nWeb App 联系 API 网关 (ch09\\ch09-01\\WebApp\\src\\\
    main\\resources\\static\\js\\service\\product_service.js)\n```\n\n这里需要注意的主要方面是\
    \ URL `http://localhost:8090/myapp1/web/productsweb/`，它将被解析为：\n\n*   `http://localhost:8090/myapp1/`：\n\
    \    Nginx 会将其解析为\n\n```\n    upstream myapp1 {\n    server localhost:8082;\n\
    \    server localhost:8083;\n    }\n    ```\n\n端口 8082 和 8083 托管了 API 网关的冗余实例。\n\
    \n*   接下来，`/web/**`\n    将由 API 网关解析到 product-web 微服务：\n\n```\n    zuul:\n   \
    \ routes:\n    product-webapi:\n    path: /myapp1/web/∗∗\n    service-id: product-web\n\
    \    ```\n"
