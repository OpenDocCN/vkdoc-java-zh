  trans: '

    ### 微服务间的同步交互


    微服务之间的同步交互风格，类似于两人握手。你伸出手去握对方的手，这好比一个微服务发起请求。你的手，以及随后的握手动作，只有当对方也清醒着，并且确认他/她愿意与你握手，并进一步尝试伸出自己的手来回应你时，才会被接收到。当这种情况发生时，你的手会被对方握住，你也会感觉到对方通过握住你的手来回应你。类似地，接收方微服务必须处于运行状态且不过于繁忙，以便它能够在合理的时间范围内（这样网络超时就不会阻碍进程）接受发送方微服务发送的请求，处理该请求，并立即发回响应（如果有的话）。


    在组件世界中，特别是当两个组件在单个进程内相互交互时，典型的同步请求-响应周期通常发生在单个执行线程内。消费者组件和接收者组件可以共享该线程的相同栈变量。由于所有请求数据和临时栈数据都在单个线程上下文中可用和共享，当消费者组件从生产者组件接收到响应数据时，消费者可以确信它收到的响应对应于它向生产者发起的请求。如图
    6-4 所示。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig4_HTML.jpg](img/477630_1_En_6_Fig4_HTML.jpg)


    图 6-4


    同步进程内通信


    当交互的组件位于不同的进程空间时，情况会变得稍微复杂一些。如果组件或微服务必须进行进程间通信（这在分布式企业应用中始终是常态），则必须使用管道（网络）来连接这些进程。网络套接字为这些管道提供了良好的抽象。图
    6-5 描述了这种情况。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig5_HTML.jpg](img/477630_1_En_6_Fig5_HTML.jpg)


    图 6-5


    同步进程间通信


    在这种场景下，端到端的请求-响应周期并非直接关联，而是间接关联。在消费者端，消费者进程发起一个套接字连接，该进程内的单个线程将通过此连接发送请求。一旦请求或任何附带数据被发送到套接字，请求线程除了等待和空闲直到收到任何响应外，什么也做不了。套接字连接会将此请求在连接的另一端弹出，以便提供者端的组件或微服务（无论哪个正在通过接受连接进行监听）能够接收到该请求。请注意，在提供者端，必须在提供者进程上下文中有一个不同的线程专门处理接收到的请求，该线程的任务还包括执行任何进一步的计算处理、准备适当的响应，并将响应推回套接字连接。该连接会将此响应传输回来，并在消费者端使其可用，消费者端那个最初发出请求、一直阻塞并等待从管道获取响应的旧线程将拾取该响应；这样就完成了一个请求-响应周期。简而言之，在同步交互风格中，协调线程会被阻塞并且必须等待。


    图 6-6 展示了一个更复杂的场景，其中单个进程中的一个组件或微服务实例必须响应同一类型的并发请求。当同一类型的请求到来，并且它们被并发处理时，生产者面临的困境是如何将哪个响应数据返回给哪个请求者。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig6_HTML.jpg](img/477630_1_En_6_Fig6_HTML.jpg)


    图 6-6


    同步并发进程间通信


    在图 6-6 中，在生产者端，来自多个消费者的请求正在被并发处理：白色信封请求和黑色信封请求。发送黑色信封请求的消费者 2 自然期望收到一个装在类似信封（黑色信封响应）中的回复消息。如果生产者发回的响应本应发送给其他消费者，那就属于错误场景，图中用叉号标记。幸运的是，像线程、上下文和会话这样的语言原语提供了良好的抽象，无需开发者做额外工作就能解决此类难题。换句话说，并发请求由不同的线程处理，因此每个线程都知道每个响应数据必须返回给哪个请求者。


    到目前为止一切顺利，因为我们一直在讨论同步通信。现在让我们来看看异步风格。

    '
- fmt: '### Asynchronous Interactions Between Microservices


    In Figure [6-1](#477630_1_En_6_Chapter.xhtml#Fig1), you saw how a message broker
    can be introduced to make the interactions between components or microservices
    asynchronous. Let’s look into further details of this kind of interaction.


    In the asynchronous style of interaction between microservices, you can visualize
    a single Request path as a combination of at least three distinct steps, as depicted
    in Figure [6-7](#477630_1_En_6_Chapter.xhtml#Fig7). These three steps are independent
    of each other steps, even though they are sequential.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig7_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7** Asynchronous request route


    1.  The message `Producer` microservice creates a request message and publishes
    it into a message broker queue.

    2.  The message broker can either keep the request message in memory or in a persistent
    store or it can attempt to deliver it to a subscriber.

    3.  The message `Consumer` microservice, if interested in the above request message,
    can consume the message.


    By introducing a suitable degree of redundancy to the different actors (`Producer`,
    `Consumer`, and broker), we can configure the application in such a way that even
    if one or more server instances hosting any of these components are down at any
    point in time, the request message is still safe (with at least any one of these
    actors) and will eventually be consumed once and only once by the consumer.


    Another notable feature in Figure [6-7](#477630_1_En_6_Chapter.xhtml#Fig7) is
    the reversal of the roles of `Producer` and `Consumer` as compared to Figure [6-6](#477630_1_En_6_Chapter.xhtml#Fig6).
    This is because in the asynchronous world of messaging, whoever creates the message
    and publishes is termed the message producer and whoever consumes the message
    is termed message consumer (as compared to the synchronous SOA style interaction
    where whoever requests the service is termed the consumer and whoever provides
    the service is termed the provider).


    The request path in Figure [6-7](#477630_1_En_6_Chapter.xhtml#Fig7) must be completed
    by a response path with a response message too. This is shown in Figure [6-8](#477630_1_En_6_Chapter.xhtml#Fig8).
    Here again, you need to visualize a single response path as a combination of at
    least three distinct steps, again consecutive.


    1.  The message consumer, after consuming the request message, performs any computations,
    creates a response, and publishes it to a message broker queue.

    2.  The message broker can either keep the response message in memory or in a
    persistent store or it can attempt to deliver it to a subscriber.

    3.  The previous message `Producer` microservice, if interested in the above response
    message, can consume the message.


    I have purposefully stroked off the roles of `Producer` and `Consumer` in Figure
    [6-8](#477630_1_En_6_Chapter.xhtml#Fig8) because in the truest sense of messaging,
    the component or microservice that creates the response and publishes it is called
    the producer and vice versa. But those terms are of less significance as long
    as you understand the concept discussed here.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig8_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig8_HTML.jpg)


    **Figure 6-8** Asynchronous response route


    Easier said than done! Now you need to closely relook at the above six steps.
    A single synchronous style of interaction between two microservices depicted in
    Figure [6-6](#477630_1_En_6_Chapter.xhtml#Fig6) has been split into six different
    and independent steps. Each step doesn’t have any dependency on its successor
    step or its predecessor step, provided there is a mechanism by which the state
    or data exchanged through these steps can be correlated. To make this clear, starting
    from the thread context or the stack variables in the place of the `Producer`
    code in Figure [6-7](#477630_1_En_6_Chapter.xhtml#Fig7), there should be a way
    to connect back the response message consumed at the end of Step 6 to this. However,
    the reason for preferring the asynchronous style over the synchronous style is
    to release the threads to do other jobs, instead of waiting or idling for the
    responses. This means the original, initiator threads may no longer exist for
    taking the response and continuing the processing from there. Instead, the original
    or initiator piece of code that started the request should be kept paused, its
    original thread be released for reuse by some other context; this piece of code
    should be notified or called back when a response arrives, and the right response
    should be delivered to that piece of the program in the microservice.


    Figure [6-9](#477630_1_En_6_Chapter.xhtml#Fig9) represents a scenario where similar
    or different messages from same or different microservice or component are targeted
    to same or different microservice on the other end. Messages can be delivered
    concurrently, too. Make sure that, when the response arrives back, it is received
    by the right recipient. There are two mechanisms used by messaging architectures
    to deal with this situation:


    *   **Correlation identifier**: Using this method, we tie each reply message with
    a correlation identifier, a unique identifier that indicates which request message
    this reply is for. We can tag the message with this correlation identifier in
    the message header so that this can be controlled declaratively or with minimum
    intervention from the programmer side.

    *   **Return address**: The next method is to include a return address to the
    message that indicates where to send the reply message. By doing so, the replier
    microservice does not need to know where to send the reply; it can just ask the
    request itself. If different messages to the same replier microservice require
    replies to different places, the replier knows where to send the reply for each
    request. This encapsulates the knowledge of what channels to use for requests
    and replies within the `Producer` microservice so those decisions do not need
    to be hard coded within the replier. A return address is also put in the header
    of a message because it’s not part of the payload being transmitted.


    Figure [6-9](#477630_1_En_6_Chapter.xhtml#Fig9) represents a reference set up
    of this.


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig9_HTML.jpg](images/477630_1_En_6_Chapter/477630_1_En_6_Fig9_HTML.jpg)


    **Figure 6-9** Asynchronous, concurrent interprocess interaction


    ## Send and Receive Messages to a Single Node RabbitMQ Broker


    You will now look at some code for sending messages to a RabbitMQ message broker
    and receiving the same using a listener to the broker. Refer to Appendix B to
    follow step-by-step instructions to install and bring up a RabbitMQ broker. The
    complete and running code samples for this exercise are kept in the folder named
    `ch06-01`, which is bundled along with the book.'
