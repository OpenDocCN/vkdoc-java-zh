    \ as well as event handler.\n\nIn Figure [16-6](#477630_1_En_16_Chapter.xhtml#Fig6),\
    \ you are not\nrouting the request to the web app through Nginx since there is\
    \ only one\ninstance of the web app, but nothing will prevent you from instantiating\n\
    more and reverse proxy requests through Nginx. The aim is to validate HA\nof Axon\
    \ components alone, hence you’re purposefully not replicating the\nweb app, again\
    \ to keep the complexity of the demonstration in control.\nHowever, the REST Controller\
    \ microservice responsible for creating\ncommands as a result of intercepting\
    \ HTTP requests is instantiated twice\nand the requests are routed through the\
    \ Nginx reverse proxy. This will\nhelp to route requests from the web browser\
    \ to be alternated across\nthese two instances of the REST Controller microservice.\
    \ In doing so,\nyou make both instances participate in creating commands and spit\
    \ them\nto the distributed command bus, which will be further propagated to the\n\
    application through the JGroups connector. Even though all of the other\nmicroservices\
    \ shown in Figure [16-6](#477630_1_En_16_Chapter.xhtml#Fig6) are also\nlistening\
    \ to HTTP traffic through the embedded HTTP connector, their\ncommunication with\
    \ the other components of the application happens\nthrough either JGroups or through\
