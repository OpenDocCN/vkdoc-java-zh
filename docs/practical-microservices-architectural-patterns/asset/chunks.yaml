  raw: "12.  While reinstating the stock in Step 10, the inventory aggregate\n   \
    \ registers an InventoryUpdateEvent into the clustered event bus. This\n    InventoryUpdateEvent\
    \ is consumed by the InventoryEventHandler in the\n    Ecom-product microservice.\n\
    \n13.  The InventoryEventHandler in the Ecom-product microservice refreshes\n\
