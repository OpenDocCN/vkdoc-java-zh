    Caution

    As a reader, if you follow the execution of tests mentioned in this

    chapter exactly, it is easy for you to visualize the effects and

    understand based on the explanation and screenshots provided here. So

    you are strongly advised to follow exactly as directed. Further, this

    setup automatically makes the first pass fail and the second pass

    succeed for few of the test cases. This mechanism is designed in that

    manner to make intervention from the reader at a minimum during the test

    execution. However, the test fixtures will work only if you execute

    tests cases with a single test client (Postman Browser client). So do

    not (monkey) test the example with concurrent test clients. Later, when

    you are comfortable executing the tests as described and can follow the

    explanations provided, then you may start tweaking the code and test

    fixtures to test further scenarios of your own.


    Simulating Relaxed Base Anomalies

    So far you implemented a BASE system with a reasonable degree of ACID

    transactions so you are sure that eventual consistency is preserved.

    Now, let’s abuse the transaction attributes to artificially “cut down”

    the scope of ACID transactions even more, which brings you into the

    following relaxed BASE situations.


    Test the Lost Message Scenario


    To test the Lost

    Message test case, take Postman again and create another new

    quote:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "GOOG", "sellerId" : 11, "buyerId" : 21, "amount" : 300, "test" :
    3, "delay" : 2 }

    ```


    Figure [13-19](#477630_1_En_13_Chapter.xhtml#Fig19) shows the

    new quote for Test Case 3\. It has a status of “New.” When settled, the

    quote amount, 300, should get added to the respective running balances

    of the buyer and seller shown in the figure.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig19_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig19_HTML.jpg)


    Figure 13-19

    Test Case 3 console at first


    Let’s now look at the transaction semantics. See Figure [13-20](#477630_1_En_13_Chapter.xhtml#Fig20).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig20_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig20_HTML.jpg)


    Figure 13-20

    Test Case 3 transaction semantics


    Here, the Quotes Processor Task picks up the new quote for processing.

    You simulate an error within the stock order service. This is marked by

    an X sign in Figure [13-19](#477630_1_En_13_Chapter.xhtml#Fig19). The peer

    transaction in the auction service has to succeed, so it’s marked with

    the ✓ sign. The parent transaction in the broker service also needs to

    succeed. This means the error in the stock order service shouldn’t

    affect the parent transaction in the broker service or the peer

    transaction in auction service, so you put TX_REQUIRES_NEW semantics for

    the stock order service. The net effect is that the quote will be marked

    as “Confirmed;” however, the new quote message to ActiveMQ will fail.

    Since the quote is already marked as “Confirmed,” the Quotes Processor

    Task will not pick up this quote for processing again in the next

    scheduled trigger. The net effect is this quote will never get settled

    in the downstream Quote Settlement microservice, which is shown in

    Figure [13-21](#477630_1_En_13_Chapter.xhtml#Fig21)! The message

    is lost.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig21_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig21_HTML.jpg)


    Figure 13-21

    Test Case 3 console at completion


    Test the Duplicate Message Sent Scenario


    To validate the Duplicate Message Sent test

    case, take Postman again and create another new quote:


    ```

    http://localhost:8080/api/quotes

    METHOD: POST; BODY: Raw JSON

    { "symbol" : "NFLX", "sellerId" : 11, "buyerId" : 21, "amount" : 400, "test" :
    4, "delay" : 2 }

    ```


    Figure [13-22](#477630_1_En_13_Chapter.xhtml#Fig22) shows the

    new quote for Test Case 4\. It has a status of “New.” When settled, the

    quote amount, 400, should get added to the respective running balances

    of the buyer and seller, as shown in the figure.


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig22_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig22_HTML.jpg)


    Figure 13-22

    Test Case 4 console, initially


    Let’s now look at the transaction semantics in Figure [13-23](#477630_1_En_13_Chapter.xhtml#Fig23).


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig23_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig23_HTML.jpg)


    Figure 13-23

    Test Case 4 transaction semantics


    Here, the Quotes Processor Task picks up the new quote for

    processing. You simulate an error within the auction service. This is

    marked by an X sign in Figure [13-23](#477630_1_En_13_Chapter.xhtml#Fig23). The
    peer

    transaction in the stock order service has to succeed, so it’s marked

    with a ✓ sign. The parent transaction in the broker service also needs

    to succeed. This means the error in the auction service shouldn’t affect

    the parent transaction in the broker service or the peer transaction in

    the stock order service, so you put TX_REQUIRES_NEW semantics for the

    auction service. The net effect is that the status of the quote marked

    as “Confirmed” will be rolled back; however, the new quote message to

    ActiveMQ will succeed.


    Since the new quote message delivery to ActiveMQ is committed, the Quote

    Settlement microservice will receive the quote message for settlement.

    As shown in Figure [13-23](#477630_1_En_13_Chapter.xhtml#Fig23) by the ✓

    sign in the first pass for the settlement listener service and the

    record user transaction service, the complete transactions within the

    Quote Settlement microservice will be committed. This is reflected in

