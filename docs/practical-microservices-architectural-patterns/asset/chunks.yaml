    \ URL to route all requests to the microservices. Don’t make any changes here.\n\
    \n## Set Up the Environment Infrastructure for the E-Commerce Microservice Application\n\
    \nNext, you need to set up few infrastructure settings to run the example. Let’s\
    \ do that too one by one.\n\n### 1. Set up RabbitMQ Server\n\nAs the first step,\
    \ you need to bring up RabbitMQ Server. You may want to refer to Appendix B to\
    \ get started with RabbitMQ server.\n\n```\nD:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\\
    sbin>D:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin\\rabbitmq-server.bat\n\
    ```\n\n### 2. Set up MongoDB Server\n\nNext, make sure MongoDB is up and running.\
    \ You may want to refer to Appendix A to get started with MongoDB.\n\n```\nD:\\\
    Applns\\MongoDB\\Server\\3.2.6\\bin\\mongod.exe --dbpath D:\\Applns\\MongoDB\\\
    Server\\3.2.6\\data\n```\n\nYou can now connect to the above started MongoDB Server\
    \ using another Windows command prompt and executing the program:\n\n```\nD:\\\
    Applns\\MongoDB\\Server\\3.2.6\\bin>D:\\Applns\\MongoDB\\Server\\3.2.6\\bin\\\
    mongo\n> use ecom\nswitched to db ecom\n> db.getName()\necom\n```\n\nHere again,\
    \ one easy way to start with clean collections with data for your example is to\
    \ simply drop the database and create it newly as you create the required collection:\n\
    \n```\n> db.dropDatabase();\n> show collections\n```\n\nYou will create the required\
    \ collections now. For that, in another Windows command prompt, you need to use\
    \ the following `mongoimport` tool:\n\n```\ncd D:\\Applns\\MongoDB\\Server\\3.2.6\\\
    bin\n```\n\nFirst, create the `ecom` database and import the product category\
    \ data into a collection named `productCategory`:\n\n```\nD:\\Applns\\MongoDB\\\
    Server\\3.2.6\\bin>mongoimport --db ecom --jsonArray --collection productCategory\
    \ --file D://binil/gold/shuffle/pack02/ch17/ch17-01/Ax2-Ecom-No-Security/Ecom-xtra-setup/productCategory.json\n\
    2018-05-25T12:11:12.587+0530    connected to: localhost\n2018-05-25T12:11:13.032+0530\
    \    imported 6 documents\n```\n\nNext, do the same for the product and inventory\
    \ collections:\n\n```\nD:\\Applns\\MongoDB\\Server\\3.2.6\\bin>mongoimport --db\
    \ ecom --jsonArray --collection product --file D://binil/gold/shuffle/pack02/ch17/ch17-01/Ax2-Ecom-No-Security/Ecom-xtra-setup/products.json\n\
    2018-05-25T15:58:44.679+0530    connected to: localhost\n2018-05-25T15:58:44.913+0530\
    \    imported 34 documents\n\nD:\\Applns\\MongoDB\\Server\\3.2.6\\bin>mongoimport\
    \ --db ecom --jsonArray --collection inventory --file D://binil/gold/shuffle/pack02/ch17/ch17-01/Ax2-Ecom-No-Security/Ecom-xtra-setup/inventory.json\n\
    2018-05-25T15:59:47.156+0530    connected to: localhost\n2018-05-25T15:59:47.502+0530\
    \    imported 34 documents\n```\n\nYou can list the newly created collections\
    \ like so:\n\n```\n> show collections\ninventory\nproduct\nproductCategory\n>\n\
    ```\n\n### 3. Set up MySQL Server\n\nMake sure MySQL is up and running. You may\
    \ want to refer to Appendix H to get started with MySQL.\n\nFirst, bring up MySQL\
    \ Server:\n\n```\nD:\\Applns\\MySQL\\mysql-5.7.14-winx64\\bin>mysqld --console\n\
    ```\n\nNow open a MySQL prompt:\n\n```\nD:\\Applns\\MySQL\\mysql-5.7.14-winx64\\\
    bin>mysql -u root –p\nmysql> SHOW DATABASES;\nmysql> use ecom;\nDatabase changed\n\
    ```\n\nTo start with clean tables, let’s delete all the tables with the names\
    \ you use for your current example (if they exist) and recreate them automatically\
    \ later during the microservices start up:\n\n```\nmysql> drop table inventory;\n\
    mysql> drop table line_item;\nmysql> drop table customer_order;\nmysql> drop table\
    \ user_info;\nmysql> drop table address;\nmysql> drop table user_role;\nmysql>\
    \ drop table user_credential;\n```\n\n## Build and Run E-Commerce Microservice\
    \ Application\n\nYou have already seen that there are 11 microservices in the\
    \ application, so you are advised to use an IDE, preferably Eclipse to better\
    \ manage the build and run complexity.\n\nYou need to first set up your 11 microservices\
    \ projects as Eclipse Projects. Go to the below root folder first:\n\n```\ncd\
    \ ch17\\ch17-01\\Ax2-Ecom-No-Security\n```\n\nTo generate the Eclipse project\
    \ files from your POM, execute the following command:\n\n```\nmvn eclipse:eclipse\n\
    ```\n\nThe Maven Eclipse Plugin is used to generate Eclipse IDE files (`*.classpath`,\
    \ `*.project`, `*.wtpmodules`, and the `.settings` folder) for use with the project.\
    \ If your Maven project has dependencies, the eclipse classpath will be synchronized\
    \ with the current list of Maven dependencies as well as any transitive Maven\
    \ dependencies. The Maven project for the sample application consists of a number\
    \ of aggregated projects with a common root pom, and some of these aggregated\
    \ projects depend on each other. The `eclipse:eclipse` goal will configure each\
    \ dependent project in Eclipse as an Eclipse project dependency, rather than an\
    \ Eclipse jar dependency. By doing this, changes to code within project A will\
    \ be available immediately to project B, assuming that project B defines a dependency\
    \ on project A.\n\nNext, you have to import the project into your Eclipse workspace\
    \ (from the menu bar, select **File** ➤ **Import** ➤ **Existing Projects into\
    \ Workspace**). Here the project (directory) should not be located in your workspace\
    \ because Eclipse might come into trouble, especially if you want to use Eclipse\
    \ as the SCM client.\n\n1. In Eclipse Project Explorer, import existing projects.\n\
    2. Select **Maven** ➤ **Existing Maven Projects** ➤ **Next**.\n3. In the “Select\
    \ Maven projects” Window, click **Browse**."
