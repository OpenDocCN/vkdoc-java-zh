  trans: "\n### 可扩展的微服务\n\n大多数应用程序都设定了预期的生命周期终点（EoL）。即使这个终点遥不可及，应用程序在功能性和非功能性能力方面也在不断演进。随着业务扩张以及新的收购与合并发生，应用程序必须进行修改和扩展。对单体架构进行扩展或修改，其风险远高于微服务架构。这是因为，正如我们能够对微服务架构实现选择性扩展一样，我们也可以选择性地扩展或修改微服务。这给应用程序开发人员和运维团队带来了极大的便利。\n\
    \n我想借用拉杰什·R·V. 在其著作《Spring 微服务》（Packt 出版社）中使用的“蜂巢类比”。图 3-7 展示了我自己的理解。\n\n![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig7_HTML.jpg](img/477630_1_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7\n\n微服务：蜂巢类比\n\n图 3-7 展示了蜜蜂如何建造蜂巢。它从建造第一个蜂室开始，然后不断向蜂巢中添加越来越多的蜂室。因此，蜂巢会随着时间的推移而生长。建造不同蜂室所使用的材料可能并不相同；它们会根据建造该蜂室时可用的材料而有所差异。然而，每个新蜂室都能与整个蜂巢完美融合，整个蜂巢作为一个整体发挥着功能。\n\
    \n微服务架构遵循类似的类比。由于我们已经将应用程序分解成许多离散的部分，我们可以先逐个构建，或者仅先构建选定的几个部分，并快速将其部署到生产环境中。这大大缩短了上市时间，业务可以以较小的规模开始运作。例如，在我们的电子商务应用中，我们可以先构建产品微服务，这样产品目录和产品详情就可以首先被访问，为企业提供早期的网络存在感。接下来，我们可以将订单、运输和配送微服务添加到应用中，这样，一个最基本的电子商务应用就准备就绪并可以运行，供人们浏览商品分类并进行在线订购。也许作为下一步，我们可以构建更多功能，例如通知微服务，以便在订单状态发生变化时发送基于电子邮件和短信的通知。微服务架构的美妙之处在于，当我们不断向应用添加越来越多的微服务时，我们不会以任何方式触及生产数据中心中已有的微服务。它们保持原样，不受干扰地处理流量。当然，我们需要考虑许多问题才能将其变为现实，但这正是本书的唯一目标。因此，正如前言所述，我不会过多介绍微服务的基础知识或理论，因为其他相关书籍中已有足够多的内容。相反，我将提供一种务实的方法，让您（读者）真正动手，掌握正确的技能，以实现所讨论的特性；其中，选择性扩展和向现有应用热添加微服务只是其中的一小部分。\n\
    \n## 总结\n\n如果您想获得微服务架构相对于传统单体架构的真正优势，那么您刚刚了解了基于微服务的架构所需的一些实用能力。您已经了解了这些关注点，并逐步了解了解决方案的复杂性，以便您的理解是渐进且连续的。生产部署中的选择性扩展和无缝可扩展性是现代应用的关键优势，这些应用无法容忍任何停机时间。在本章中，您已经看到了这在概念上是如何实现的。在后续章节中，您还将看到如何使用实际代码来实现这一点。但在此之前，让我们在下一章关于微服务架构的内容中，从更宏观的角度审视微服务概念的起源以及它为何对当今的企业如此重要。\n\
    \n# 4. 微服务架构\n\n在最初的三个章节之后，您现在已经具备了扎实的知识基础，能够区分微服务风格的软件架构与传统单体架构。您学习了将单体架构分解为多个称为微服务的、逻辑和物理上独立的小型分组的技术，从而以灵活的方式提高了横向扩展能力。在传统的单体架构模式中，您需要管理一个单一的、庞大的应用程序；而当同一个应用程序被重新设计为微服务架构时，它将不再是单一的部署单元，因此会出现更多诸如微服务间通信之类的关注点。在本章中，您将深入探讨这一系列新的架构关注点的细节。您还将探索软件范式中一些促使软件架构师远离传统架构风格的相关趋势。\n\
    \n在本章中，您将详细了解以下内容：\n\n*   数字环境以及网格应用和服务架构（MASA）\n\n*   服务粒度以及微服务的定位\n\n*   基于领域的微服务划分\n\
    \n*   应对网络规模场景的云原生转型\n\n*   云架构和服务模型，为您的部署设置环境\n\n*   虚拟化和容器，以及它们如何影响微服务\n\n*\
    \   微服务的宏观与微观架构视角\n\n## 面向数字业务的架构\n\n我们已经从大型机时代演进到台式机、笔记本电脑、移动设备，并且这种演进仍在继续。智能手机时代带来了无数可能性，让移动设备成为个人亲密的伴侣。我们都曾因为与老板或客户的会议无休止地延长，或者家庭紧急情况而错过午餐。但我们中有多少人能一个小时不看手机上的社交应用或聊天应用呢？设备已经开始变得像食物、水和空气一样亲密和必不可少！这给软件开发人员带来了新的挑战。我将在本节中进一步阐述。\n\
    \n### 数字时代\n\n人类现在正处于数字业务时代。Gartner 对数字业务给出了如下定义：\n\n> *数字业务是通过模糊数字世界与物理世界的界限来创造新的业务设计。*\n\
    > \n> ——Gartner\n\n你可以轻松地将这个定义与一些现实场景联系起来，例如：\n\n*   你使用谷歌地图通过提供地图或驾驶路线来引导你到达目的地。\n\
    \n*   你车上的电子稳定程序（ESP）通过检测并在意外时刻减少牵引力损失（打滑）来提高汽车的稳定性。\n\n*   人们开始为了娱乐、休闲或商业目的前往太空旅行。\n\
    \n*   Skinput 提供了一种始终可用、天然便携且侵入性最小的体表手指输入系统。\n\n*   仿生学使脑机接口成为下一个用户界面（UI）的现实，通过它你可以控制假肢。\n\
    \n*   生物芯片植入物有助于医疗管理。\n\n*   一个智能标签可以告诉你，你不在时，你那瓶价值 200 美元的苏格兰威士忌是否被别人打开过。\n\n\
    这样的例子不胜枚举。列表中的每一项都给软件架构师带来了新的挑战。十年前，桌面浏览器在客户端层占据主导地位，我们使用它们来访问中间层服务。智能手机改变了这一点，它将微型浏览器和原生应用加入了客户端应用程序的行列。今天，我们有了物联网（IoT）和万维网（WoT），并且这种情况在不断演进，改变着软件架构的范式。\n"
- fmt: "### The Digital App\n\nDigital business is taking microbrowsers and native\
    \ apps to the next level by redefining what an app means. In the context of the\
    \ digital era described in the previous section, the concept of the app is extended\
    \ to any client software that can access back-end services, piercing the enterprise\
    \ firewalls or otherwise. This client software can be executed in the embedded\
    \ form or otherwise from any of the digital client devices mentioned earlier.\
    \ Such client programs may not always follow the `WORA` (`Write Once, Run Anywhere`)\
    \ principles; instead they are “fit for purpose” and act as the human’s extension\
    \ in the physical world. They can be activated autonomously, based on a human\
    \ trigger, or based on a trigger from anything on the Internet in the IoT world.\
    \ See Figure [4-1](#477630_1_En_4_Chapter.xhtml#Fig1).\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig1_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. The digital app context\n\nRequests from a digital app can travel\
    \ through any medium of communication (like the Internet, microwaves, Bluetooth,\
    \ e-mail, or even snail mail) and hit the enterprise’s network perimeter. JSON-formatted\
    \ data in a REST style is the popular method of data transport, but new developments\
    \ are evolving in the context of IoT and WoT.\n\n### The Mesh App and Service\
    \ Architecture\n\nGartner^([³](#fn3)) provides the following definition for the\
    \ MASA architecture:\n\n> *The MASA (Mesh App and Service Architecture)* *is a\
    \ multichannel solution architecture that supports multiple users in multiple\
    \ roles using multiple devices and communicating over multiple networks to access\
    \ application functionality. In this architecture, mobile apps, web apps, desktop\
    \ apps, and IoT apps link to a broad mesh of back-end services to create what\
    \ users view as an application. The MASA enables users to have a continuous and\
    \ ambient experience as they shift across these different channels.*\n> \n> —Gartner\n\
    \nAs shown in Figure [4-1](#477630_1_En_4_Chapter.xhtml#Fig1), when monolith services\
    \ get replaced with microservices, traditional firewalls and routers are also\
    \ replaced or enhanced with intelligent routers, which are software aware and\
    \ software defined. They can be broadly called by the name service control gateways\
    \ and it is through this intelligent layer that all APIs are exposed to the external\
    \ world. The external world can include the digital apps as well as other microservices\
    \ external to your application.\n\nFigure [4-2](#477630_1_En_4_Chapter.xhtml#Fig2)\
    \ represents the MASA with the service control gateway included. You can also\
    \ see the microservices grouped and named as Application 1 and Application 2.\
    \ While microservices within an application communicate internally and directly,\
    \ external calls to a microservice are always routed through a gateway. There’s\
    \ also the notion of common microservices. Access to common microservices or access\
    \ to a microservice owned by other applications can also be controlled if routed\
    \ through the gateway.\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig2_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. The digital app context\n\n## The Context for Microservices\n\n\
    Microservices are not a revolutionary new trend; instead, they are an evolution\
    \ in the context of recent trends in the software computing landscape. Even before\
    \ anyone first used the term microservices, many of you may have been following\
    \ similar approaches in your enterprises. Componentization, service orientation,\
    \ and SaaS (Software as a Service) are trends with principles similar to microservices.\
    \ Miniaturization of these trends (components and services) are linked with recent\
    \ trends like the public cloud and auto scale, so let’s briefly look into this\
    \ background to better understand microservices.\n\n### Granularity of Services\n\
    \nYou can classify services into different categories based on the granularity\
    \ at which it is designed and built. Even though the term microservice implies\
    \ small, the degree to which it is small compared to other services is often relative.\
    \ In other words, the size is only an indicative characteristic; the more explicit\
    \ characteristics listed below decide the granularity:\n\n*   Agility\n*   Deployability\n\
    *   Selective scalability\n*   Independence\n\nTo aid in your understanding, you\
    \ can bucket all of the above characteristics under a single umbrella called “cloud\
    \ nativeness.” See Figure [4-3](#477630_1_En_4_Chapter.xhtml#Fig3).\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig3_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3. Granularity of services\n\nAs shown in Figure [4-3](#477630_1_En_4_Chapter.xhtml#Fig3),\
    \ when the granularity decreases, most of the qualities required for cloud nativeness\
    \ increase.\n\nIf you relook at the monoliths, by following the best practices\
    \ of SOA you can expose coarse grained or composite services. Such services expose\
    \ the individual capability of a business domain. By exposing SOA interfaces,\
    \ they support flexible enterprise application integration or what we call service-oriented\
    \ integration. These services are classified under the term “miniservice” and\
    \ they promote service reuse in terms of service composition. Miniservices are\
    \ accessed by other miniservices or by the client tier.\n\nWhen we split the monolith\
    \ into a microservice-based architecture, the scope of the service gets limited\
    \ to a feature. Multiple such features encompass a capability that can be exposed\
    \ to the client tier. A services gateway can be provisioned to expose miniservices,\
    \ which will in turn delegate calls to microservices.\n\nLet’s look into the granular\
    \ differentiation in the granularity of services under a different classification\
    \ with the help of a few indicative samples.\n\nFigure [4-4](#477630_1_En_4_Chapter.xhtml#Fig4)\
    \ shows the indicative samples alone. While macroservices are implemented using\
    \ conventional SOA design patterns and technologies, a miniservice aggregates\
    \ functionality related to a specific domain (that is, an entity or resource).\
    \ When compared to a microservice, a miniservice has a larger scope and relaxed\
    \ architectural constraints, and it may or may not use independent data.\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig4_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig4_HTML.jpg)\n\
    \nFigure 4-4. Indicative samples for service granularity\n\nAgain, the units of\
    \ granularity marked in Figure [4-4](#477630_1_En_4_Chapter.xhtml#Fig4) (Function\
    \ > Feature > Domain > Capability > Application) are not hard-wired or fixed hard\
    \ in the above granularity scale. Where you want to place your application architecture\
    \ largely depends on many factors like type of application and the degree of cloud\
    \ nativeness required. Placing the application architecture slightly towards the\
    \ left or right is not the big aspect; instead, the rationale behind the place\
    \ where you fix your architecture is based on the constraints, and the subsequent\
    \ trade-offs matter. Dogmatic adherence to the microservices architecture can\
    \ be a high-cost, disruptive, and often less predictable exercise if you do not\
    \ have experienced in-house teams, and I have often seen enterprises create applications\
    \ that adhere more towards the miniservices boundary but call them microservices.\
    \ This is not a major problem. Instead, what is required is a clear understanding\
    \ of each of these boundaries and then you can make judicious decisions rather\
    \ than converge on decisions that occur accidentally."
