    The `DistributedCommandBus` forms a bridge between command bus implementations
    across JVMs. In your case, you want to bridge between the `02-Ecom-CreateCommandRestController`
    microservice and the `03-Ecom-HandleCommandAndCreateEvent` microservice, since
    the former microservice generates commands that are to be handled by the later
    microservice. So the `DistributedCommandBus` instances on each JVM are called
    segments and are qualified with the name `localCommandBus` in code, as shown in
    Figure [12-5](#477630_1_En_12_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_12_Chapter/477630_1_En_12_Fig5_HTML.jpg](images/477630_1_En_12_Chapter/477630_1_En_12_Fig5_HTML.jpg)


    **Figure 12-5.** Distributed command and event handling in Axon


    The `DistributedCommandBus` relies on the `CommandBusConnector`, which implements
    the communication protocol between the JVMs. In your case, you use a `JGroupsConnector`,
    which uses JGroups to discover and connect to other `JGroupsConnector`s in the
    network. Depending on the configuration of the channel that was provided, this
    implementation allows for dynamic discovery and addition of new members. When
    members disconnect, their portion of the processing is divided over the remaining
    members. This dynamic addition and retraction of nodes or JVM or microservices
    is very important for the required extensibility of your software, which was discussed
    in the first section in this chapter.


    There are no changes other than this configuration as far as the code for the
    `Ecom-CreateCommandRestController` microservice is concerned, but you may visit
    the corresponding section in the previous example for an explanation of the rest
    of the code in this microservice.


    ### Microservice 3: `03-Ecom-HandleCommandAndCreateEvent`


    This microservice has to handle any commands created by the `02-Ecom-CreateCommandRestController`
    microservice and reaching through the `DistributedCommandBus` from the remote
    JVM. Further, this microservice also creates events that are supposed to be consumed
    by distributed event handlers in remote JVMs or foreign microservices. Hence the
    configuration of this microservice is going to be little complex in order to accommodate
    all those connectors and routings.


    Visit `EcomAppConfiguration.java` to see the main configuration, shown in Listing
    [12-15](#477630_1_En_12_Chapter.xhtml#PC22).


    ```

    @Configuration

    public class EcomAppConfiguration {

    @PersistenceContext

    private EntityManager entityManager;

    @Qualifier("transactionManager")

    @Autowired

    protected PlatformTransactionManager txManager;

    @Bean

    @Qualifier("distributedCommandGateway")

    public CommandGatewayFactoryBean

    commandGatewayFactoryBean() {

    CommandGatewayFactoryBean factory =

    new CommandGatewayFactoryBean();

    factory.setCommandBus(distributedCommandBus());

    return factory;

    }

    @Bean

    @Qualifier("localCommandGateway")

    public CommandGatewayFactoryBean

    localCommandGatewayFactoryBean() {

    CommandGatewayFactoryBean factory =

    new CommandGatewayFactoryBean();

    factory.setCommandBus(localSegment());

    return factory;

    }

    @Bean

    public JGroupsConnector getJGroupConnector() {

    JGroupsConnector connector = new JGroupsConnector(

    new JChannel("udp_config.xml"), "myCluster",

    localSegment(), xstreamSerializer());

    connector.connect(100);

    return connector;

    }

    @Bean

    @Qualifier("distributedCommandBus")

    public DistributedCommandBus distributedCommandBus() {

    DistributedCommandBus distributedCommandBus =

    new DistributedCommandBus(getJGroupConnector());

    return distributedCommandBus;

    }

    @Bean

    @Qualifier("localCommandBus")

    public SimpleCommandBus localSegment() {

    SimpleCommandBus simpleCommandBus = new SimpleCommandBus();

    SpringTransactionManager transcationMgr =

    new SpringTransactionManager(txManager);

    simpleCommandBus.setTransactionManager(transcationMgr);

    simpleCommandBus.setDispatchInterceptors(Arrays.asList

    new BeanValidationInterceptor()));

    return simpleCommandBus;

    }

    @Bean

    public AnnotationCommandHandlerBeanPostProcessor

    annotationCommandHandlerBeanPostProcessor() {

    AnnotationCommandHandlerBeanPostProcessor processor =

    new AnnotationCommandHandlerBeanPostProcessor();

    processor.setCommandBus(distributedCommandBus());

    return processor;

    }

    }

