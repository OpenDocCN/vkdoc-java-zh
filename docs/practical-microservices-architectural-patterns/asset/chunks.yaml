  trans: "\nSaga 详解\nSaga 的概念最早于 1987 年在一篇论文中提出，并在微服务背景下逐渐流行起来。Saga 与嵌套事务类似。在嵌套事务中，原子事务被嵌入到其他事务中。而在\
    \ Saga 中，每个事务都有一个对应的补偿事务。如果 Saga 中的任何一个事务失败，则会调用之前成功运行的每个事务的补偿事务，以抵消之前成功事务的影响。\n\
    \nSaga 通常用于对工作流中涉及的**长时间运行的事务**进行建模。不建议使用两阶段事务来控制长时间运行的事务，因为长时间锁定资源是绝对不可取的。在微服务背景下，即使不涉及长时间运行的事务，Saga\
    \ 也变得相关，原因在于我们希望拒绝两阶段提交事务。当无法使用两阶段提交事务，并且您仍希望对多步骤事务的每个阶段进行控制时，Saga 将为您提供帮助。\n\n\
    即使在微服务演进之前，Saga 的概念就已经非常流行，并且从最真实的意义上讲，许多现实世界的问题都是通过 Saga 来解决的。跨位置和/或信任边界维护一致性很难通过经典的\
    \ ACID 模型来处理，而许多现实场景都涉及这些复杂性。将资金从一个银行的账户转移到另一个银行的账户是一个经典示例，没有理由假设这些银行的软件系统彼此靠近或在一起。当您进行此类资金转账时，可以从日常经验中体会到这一点。即使资金转账近乎实时完成，以至于在各个方面看起来都是瞬间完成的，但所涉及的事务很可能并非通过两阶段提交事务执行，而是通过某种\
    \ Saga 来执行。这意味着，当您进行资金转账时，相关的借记和贷记在大多数情况下会作为两个关联的步骤发生，通过某种非两阶段事务协调器的方式进行协调，以便所有涉及的步骤要么全部发生，要么最终全部回滚。\n\
    \n另一个经典示例是预订航班、酒店和租车。单个企业拥有所有这些资源的库存可能性很小，但最终用户很可能希望在一个事务中预订其中一项或多项资源，因为对他来说，已确认的酒店预订加上未确认的航班预订用处不大。这里的另一个方面是，如果您查看此类情况下的资源管理器或资源所有者，他们可能位于信任边界之外，并且在许多情况下，他们可能是相互竞争的企业。我目前所在的公司致力于为旅游和酒店行业构建软件系统，我可以联想到我们软件设计中的许多实例，在这些实例中，类似的事务可以并且只能被设计为最终一致性。\n\
    \n图 15-1 展示了一个状态图，说明了在 Saga 中，各个事务如何逐步推进。\n\n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig1_HTML.jpg](img/477630_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1\n说明 Saga 的状态图\n\n如图 15-1 所示，在 Saga 中，如果其中一个事务失败，则会执行每个成功运行的事务的补偿事务。这由\
    \ **Saga 事务协调器** 进行协调。\n\n分布式 Saga\n上一节描述的 Saga 概念构建起来相当简单，因为许多工作流和业务流程模型与符号（BPMN）框架都是使用相同的类比构建的，即编排长时间运行的事务。如果要在微服务环境中协调这一点，则涉及协调多个去中心化的节点和进程，这并非易事。\n\
    \n您将首先从概念层面了解分布式 Saga 所需的各种组件。见图 15-2。\n\n*   **事务和补偿事务：**\n\n在微服务上下文中，Saga 事务最好称为请求（HTTP）或事件（命令和事件）；然而，为了讨论的简便，我们将保留“事务”这一术语。\n\
    \n分布式 Saga 是事务的集合：\n\n```\n    T1, T2, ..., Tn\n    ```\n\n每个事务都有一个补偿事务：\n\n```\n\
    \    C1, C2, ..., Cn\n    ```\n\n补偿事务 (Cn) 将在语义上撤销先前完成的对应事务 (Tn)。\n\n分布式 Saga\
    \ 保证要么发生\n\n```\n    T1, T2, ..., Tn\n    ```\n\n要么发生\n\n```\n    T1, T2, ...,\
    \ Ti, Ci, ..., C2, C1\n    ```\n\n因此，如图 15-1 所示，如果其中一个事务失败，则会执行每个成功运行的事务的补偿事务。\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig2_HTML.jpg](img/477630_1_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2\n分布式 Saga 示意图\n\n*   **Saga 日志：**\n\nSaga 日志是一个分布式日志，用于在给定 Saga 执行期间持久化每个事务/操作的状态。Saga\
    \ 日志包含各种状态变更操作，例如开始 Saga、结束 Saga、中止 Saga、开始 Ti、结束 Ti、开始 Ci 和结束 Ci。Saga 日志通常使用分布式日志实现，并且通常使用诸如\
    \ Kafka 之类的系统进行实现。\n\n*   **Saga 执行协调器 (SEC)：**\n\nSEC 编排整个逻辑，并负责 Saga 的执行。给定\
    \ Saga 中的所有步骤都记录在 Saga 日志中，SEC 写入、读取并解释 Saga 日志中的记录。SEC 具有以下子组件：\n\n*   **控制总线：**\
    \ 控制总线有效地管理一个分布在多个节点和进程之间的消息传递系统。\n\n*   **流程管理器：** 流程管理器维护序列的状态，并根据中间结果确定下一个处理步骤。\n\
    \n*   **消息关联：** 发送方将其收到的响应与其最初发送的请求关联起来。消息的 MessageID 和 CorrelationID 属性用于关联请求和响应消息。因此，关联标识符是一个唯一标识符，指示此回复是针对哪个请求消息的。\n\
    \n*   **消息序列：** 这是为了保持按原始意图发送的消息的顺序。\n\n*   **保证交付：** 通过保证交付，系统使用内置的数据存储来持久化消息。安装消息传递系统的每个节点都有自己的数据存储，以便消息可以本地存储。当发送方发送消息时，在消息安全地存储在发送方的数据存储中之前，发送操作不会成功完成。随后，在消息成功转发并存储到下一个数据存储之前，不会将其从一个数据存储中删除。通过这种方式，一旦发送方成功发送消息，该消息将始终存储在至少一台计算机的磁盘上，直到成功交付给接收方并得到接收方的确认。\n"
- fmt: 'SEC is not a special process that has central control of the entire execution.
    It operates as a centralized runtime, but the runtime is dumb and the execution
    logic is kept out of the `SEC` in the distributed saga log. So when an `SEC` crashes,
    another `SEC` instance could be brought live and continue by looking at the saga
    log. It is required to make sure that `SEC` is up and running all the time. In
    the event of an `SEC` failure, a new `SEC` process should be started based on
    the same distributed saga log. The distributed saga log is also distributed and
    replicated so that there is no single point of data loss.


    Having looked at the various components needed for a distributed saga, you will
    now look at how a distributed saga executes. See Figure [15-3](#477630_1_En_15_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig3_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig3_HTML.jpg)


    **Figure 15-3** Distributed saga as a directed acyclic graph


    A distributed saga is a directed acyclic graph (DAG) and the `SEC`’s task is to
    execute that DAG. A directed acyclic graph is a finite directed graph^([^(39)](#fn39))
    with no directed cycles. That is, it consists of finitely many vertices and edges
    (also called arcs), with each edge directed from one vertex to another, such that
    there is no way to start at any vertex (`v`) and follow a consistently-directed
    sequence of edges that eventually loop back to `v` again. Equivalently, a DAG
    is a directed graph that has a topological ordering, a sequence of the vertices
    such that every edge is directed from earlier to later in the sequence.


    Referring to Figure [15-2](#477630_1_En_15_Chapter.xhtml#Fig2), once the trip
    service gets a booking request, `SEC` initiates a saga by writing to the saga
    log with a start saga instruction along with any other metadata required to process
    the saga. Once the record is durably committed into the log, `SEC` can move to
    executing the next instruction. Then, based on the DAG of the saga in Figure [15-3](#477630_1_En_15_Chapter.xhtml#Fig3),
    `SEC` can pick one of the flight, hotel, or cab rental transactions (given that
    all three can work in parallel). Suppose that the flight transaction is executed
    first. In that case, the `SEC` logs a start flight transaction message to the
    saga log. Then, the `SEC` executes the book flight operation. Once the `SEC` receives
    the response from the flight service, it commits the end flight transaction message
    along with the response from the flight service, which you may need during the
    latter part of the saga. The same set of steps continues until you have successfully
    executed all three operations on the flight, hotel, and cab rental services. Finally,
    since you have completed everything successfully, `SEC` commits the end saga message
    into the saga log. This is a successful saga execution and is shown in Figure
    [15-4](#477630_1_En_15_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig4_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig4_HTML.jpg)


    **Figure 15-4** Execution steps of a successful distributed saga


    Figure [15-5](#477630_1_En_15_Chapter.xhtml#Fig5) shows a saga failure case.


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig5_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig5_HTML.jpg)


    **Figure 15-5** Execution steps of a failed distributed saga


    It’s the same set of steps as discussed earlier, but in this case, the cab rental
    process fails (there are no cabs available on the specified dates, for example).
    Since you have detected a failure of a particular subtransaction (i.e., the cab
    booking), you need to roll back all the other subtransaction you made so far.
    So, in the saga log you can find the start cab rental log (`Start T3`) but now
    the cab booking has failed. Now you have to walk through the inverted DAG of saga
    that you executed so far and end the saga as unsuccessful.


    You will now look at some interesting aspects of a distributed saga. We discussed
    earlier that `SEC` can pick one of the flight, hotel, or cab rental transactions
    (given that all three can work in parallel). This means saga transactions may
    be executed in parallel, and saga logs might be interleaved, as shown in Figure
    [15-6](#477630_1_En_15_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig6_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig6_HTML.jpg)


    **Figure 15-6** Distributed saga executing transactions in parallel


    This means the `SEC` shouldn’t depend on the order of individual log entries in
    the saga log. You should relook at the discussion in the “Test the Message Received
    Out of Order Scenario” section in Chapter [14](#477630_1_En_14_Chapter.xhtml)
    where you saw the technique to deal with such scenarios.


    Next, for every transaction in a distributed saga the messaging semantics should
    be as follows:


    *   Transactions: At most once

    *   Compensating transactions: At least once


    You should now revisit the sections titled “Build and Test the Duplicate Message
    Being Sent Scenario” and “Test the Duplicate Message Consumption Scenario” in
    Chapter [14](#477630_1_En_14_Chapter.xhtml). By suitably combining the techniques
    described in those two sections, you can conceptualize how the “at most once”
    and “at least once” semantics can be tailored into the overall solution. Using
    the same techniques, you should also take care of the extra characteristics required
    for the transactions of a distributed saga as listed in Table [15-1](#477630_1_En_15_Chapter.xhtml#Tab1).


    **Table 15-1** Distributed Saga Transaction Characteristics


    | Characteristics | Transaction (T) | Compensating Transaction (C) |

    | --- | --- | --- |

    | Idempotent | a | a |

    | Can Abort | a | `×` |

    | Commutative | NA | a |


    A little discussion needs to take place about the commutative characteristic required
    for compensating transactions described in Table [15-1](#477630_1_En_15_Chapter.xhtml#Tab1).
    Refer to Figure [15-7](#477630_1_En_15_Chapter.xhtml#Fig7).


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig7_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig7_HTML.jpg)


    **Figure 15-7** Message delays in distributed saga


    There are two `Start T1` transactions. This is because the `SEC` can replay `Start
    T1` if it didn’t receive it and `End T1` within a defined timeout. Such a delayed
    `Start T1` might reach the service to be executed after a compensating transaction
    (`Start C1`, `End C1`) was successfully effected, in which case the `Start T1`,
    which reached later, shouldn’t be attempted to be executed. So semantically


    ```

    T1 -> C1

    ```


    or


    ```

    C1 -> T1

    ```


    Both should have the same effect.


    There are more such complexities, but you should have the hang of it by now. Ideally
    a framework should abstract all these complexities for you. Even though as of
    this writing I couldn’t find a complete framework to execute our earlier discussion,
    I hope such frameworks will appear eventually, but I will not discuss it further,
    since such a discussion is not in the scope of this book.


    Before I end this topic, let’s look at one possible design alternative to Figure
    [15-2](#477630_1_En_15_Chapter.xhtml#Fig2) in the context of Axon CQRS and event-based
    microservices, which is shown in Figure [15-8](#477630_1_En_15_Chapter.xhtml#Fig8).


    ![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig8_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig8_HTML.jpg)


    **Figure 15-8** Distributed saga in an event-driven CQRS context, illustrated


    Be informed that the design shown in Figure [15-8](#477630_1_En_15_Chapter.xhtml#Fig8)
    is just for illustrative purposes, and you will see in the next section that Axon
    CQRS has a comparable saga implementation, not necessarily the exact as per the
    design shown.


