    D:\binil\gold\pack03\ch10\ch10-02\ProductWeb>java -Dserver.port=8082 -jar .\target\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar

    ```


    现在，你可以通过指向 URL 来检索基于 HTML 的客户端应用程序来测试应用程序，最好使用 Chrome 浏览器：


    ```

    http://localhost:8082/

    ```


    浏览器客户端在加载时，会向监听在端口 8082 上的 Product Web 发起一个请求，该请求将委托给监听在端口 8081 上的 Apache TCPMon
    代理。这个到达运行 TCPMon 的主机（在你的例子中是 localhost）上端口 8081 的请求，将被代理到 localhost 的端口 8080，也就是
    Product Server 微服务监听的地方。如果一切按计划进行，你应该能够在网页上看到列出的产品。如果你检查 TCPMon 代理控制台，你应该能够验证两个微服务之间的通信在握手基于
    HTTP 的 REST 调用时，使用了 Protocol Buffer 作为线路级协议。


    使用 Protocol Buffer 的影响

