    There is a quick utility provided in the following location to test the application:


    ```

    ch08\ch08-01\ProductWeb\src\main\resources\product.html

    ```


    Open this HTML utility preferably in the Chrome browser. Upon loading itself,
    the browser client will fire a request to the Product Web listening at port 8081,
    which will delegate the calls to the Product Server listening at 8080 by proxying
    through the Feign client.


    If everything goes well, the browser widget will be filled with data from the
    back-end database (Figure [8-3](#477630_1_En_8_Chapter.xhtml#Fig3)). When you
    refresh the screen, the browser will hit the Product Web microservice first. The
    Product Web microservice will then call the Product Server microservice, which
    in turn will query the Mongo DB and return the results. The notable feature here
    is that in this demonstration you have created two different microservices and
    then one microservice made a call to the other microservice using Feign client.
    This is one of the ways by which microservices can communicate with each other
    using HTTP calls in a synchronous manner.


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig3_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig3_HTML.jpg)


    Figure 8-3 Testing the Feign client


    ## Hystrix Fallback


    There are times when a particular microservice is busy—or a particular database,
    or for that matter any resource—so it is not in a position to respond back within
    the expected SLA. In such scenarios, the caller service cannot wait on the dependent
    service endlessly, so there should be alternate strategies. You’ll handle a scenario
    with the Hystrix circuit breaker falling back to an alternate strategy. Circuit
    breakers can gracefully degrade functionality when a method call to a service
    or to a resource fails. Use of the circuit breaker pattern can allow a microservice
    to continue its operations when a dependent service fails. This will prevent the
    failure from cascading, thus giving the failing service enough time to recover.


    ### Design a Hystrix Fallback Scenario


    You are going to expand the sample from the previous section (illustrated in Figure
    [8-1](#477630_1_En_8_Chapter.xhtml#Fig1)). Figure [8-4](#477630_1_En_8_Chapter.xhtml#Fig4)
    illustrates the simple scenario where there are three separate applications or,
    in our terms, three separate microservices: Product Web, Product Server 1, and
    Product Server 2.


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig4_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig4_HTML.jpg)


    Figure 8-4 A Hystrix fallback usage scenario


    The main components for the sample scenario are:


    *   Product Server 1

    *   Product Server 2

    *   Product Web

    *   Product Service

    *   `ProductServiceProxy`

    *   `ProductAlternateServiceComponent`

    *   `ProductAlternateServiceProxy`

    *   Spring Cloud Feign Client


    The explanation for many of the above components is the same as that provided
    in the “Feign Client” section earlier, so I won’t duplicate it here. However,
    I will explain the new components.


    *   **`ProductAlternateServiceComponent`**: Product Web is designed to delegate
    all REST calls coming to it to the Product Server 1 microservice. However, if
    the Product Server 1 microservice is down or not responding for some reason, you
    can design a Hystrix callback to a fallback component named `ProductAlternateServiceComponent`.
    In real life, this can be a local cache from where you can respond to the client
    with alternate data. However, in your sample, you have already seen how a Feign
    client can be used to proxy calls to a remote service. So, you will have a `ProductAlternateServiceProxy`
    component to which calls can be proxied.


    *   **Product Server 2**: Product Server 2 is a full-fledged microservice application
    duplicating the CRUD operations implemented in Product Server 1. This microservice
    again uses a Mongo DB to write to and read from the data pertaining to product
    entities. This microservice acts as an alternate microservice implementation and
    can serve requests if Product Server 1 is not responding.


    *   **`ProductAlternateServiceProxy`**: The `ProductAlternateServiceProxy` component
    is another abstract interface that extends Product Service, so it gets all the
    methods expected out of both the Product Server and the Product Web interfaces.
    This is the interface you annotate with the Feign client essential configurations
    in such a way that all calls can be proxied to the Product Server 2 microservice.


    You will split the component interaction into two, as shown in Figure [8-5](#477630_1_En_8_Chapter.xhtml#Fig5)
    and Figure [8-6](#477630_1_En_8_Chapter.xhtml#Fig6). In Figure [8-5](#477630_1_En_8_Chapter.xhtml#Fig5),
    you can see that the query from the client-side browser hits Product Web, which
    is Microservice 1 in the sample. The Product Web microservice then proxies the
    query to Microservice 2, which is Product Server 1. If Product Server 1 is up
    and running, then the sample execution will end after responding back to the client
    with the response data, and so this sample will behave exactly like the previous
    sample from the “Feign Client” section. Instead, you can either not bring the
    Product Server 1 up or, if it’s already up, you can bring it down. In that case,
    Hystrix will retry to the fallback service configured.


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig5_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig5_HTML.jpg)


    Figure 8-5 Hystrix detects service non-availability


    Assuming the fallback microservice Product Server 2 is up, the query will be retried
    to hit this microservice and the execution will happen through the happy flow
    depicted in Figure [8-6](#477630_1_En_8_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig6_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig6_HTML.jpg)


    Figure 8-6 Hystrix retries the alternate service


    ### Code the Hystrix Fallback Scenario


    You have already seen how the Feign client is declared in your POM. Similarly,
    you can bring the Hystrix dependencies by declaring them again in the POM. All
    the code samples for this section are placed in folder `ch08\ch08-02`. Visit `pom.xml`
    to see the explicit mention of the Hystrix dependency. See Listing [8-4](#477630_1_En_8_Chapter.xhtml#PC9).


    ```

    org.springframework.cloud

    spring-cloud-starter-hystrix

    ```


    Listing 8-4 Spring Cloud Hystrix Dependency (`ch08\ch08-02\ProductWeb\pom.xml`)


    Next, you need to mention the Hystrix fallback. This is mentioned in the `ProductServiceProxy`;
    see Listing [8-5](#477630_1_En_8_Chapter.xhtml#PC10).'
