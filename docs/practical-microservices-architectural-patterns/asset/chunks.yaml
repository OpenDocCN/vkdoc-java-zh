    一个好的实践是让命令通过其名称来表达意图。因此，你可以通过 Java 类名来推断需要执行的操作，而命令对象的字段则应提供基于该命令执行操作所需的信息。


    现在，你将看到上述命令的创建过程。当你在浏览器中点击“立即下单！”按钮时，一个 REST/JSON 请求会到达订单控制器，如清单 12-7 所示。


