    Later you will also see that whenever the status of the order aggregate in the\
    \ `Ecom-core` microservice changes, the same is also updated in this history table.\
    \ If a need arises, BI or analytics can be executed over these records, since\
    \ they are in a microservice separate from the order aggregate in the `Ecom-core`\
    \ microservice, so it will not affect the performance of the order aggregate.\n\
    \nThis completes the \"create new order\" flow. Later you will look at the execution\
    \ of the actual use case in the subsection titled \"Create New Order\" under the\
    \ section titled \"Test E-Commerce Microservice Use Cases.\"\n\n## Cancel an Order\n\
    \nA newly created order, if it's not being processed in the fulfilment cycle,\
    \ can be cancelled by the user. Figure [17-7](#477630_1_En_17_Chapter.xhtml#Fig7)\
    \ depicts the various states different entities undergo once the `Cancel` command\
    \ is initiated.\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig7_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig7_HTML.jpg)\n\
    \nFigure 17-7 Cancel an order\n\nReferring to Figure [17-7](#477630_1_En_17_Chapter.xhtml#Fig7),\
    \ the end-to-end flow as a result of a REST JSON request from the web app to cancel\
    \ an order can be summarized as follows:\n\n1.  `order_service.js` sends a REST\
    \ JSON request over HTTP to create a new order:\n\n    ```javascript\n    $http.delete(sessionStorage.getItem('apiUrl')+'/core/order/'+orderId)\n\
    \    ```\n\n    This request hits the API gateway.\n\n2.  The API gateway interprets\
    \ the URL by looking at the service registry and directs the request to the `Order\
    \ REST Controller` in the `Ecom-core` microservice.\n\n3.  The `Order REST Controller`\
    \ creates a new `OrderCancelCommand` and sends it to the command gateway. See\
    \ Listing [17-13](#477630_1_En_17_Chapter.xhtml#PC18).\n\n    ```java\n    @RestController\n\
    \    @RequestMapping(\"/order\")\n    public class OrderController {\n       \
    \ @RequestMapping(value = \"{orderId}\", method = RequestMethod.DELETE)\n    \
    \    @Transactional\n        @ResponseBody\n        public void cancelOrder(@PathVariable\
    \ Long orderId) {\n            OrderCancelCommand orderCommand = new OrderCancelCommand(orderId);\n\
    \            commandGateway.send(orderCommand);\n        }\n    }\n    ```\n \
    \   Listing 17-13 `Order Controller cancelOrder` (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\web\\OrderController.java`)\n\
    \n4.  The command gateway delivers the `OrderCancelCommand` to the command bus.\n\
    \n5.  The `OrderCommandHandler` consumes the `OrderCreateCommand` from the command\
    \ bus. See Listing [17-14](#477630_1_En_17_Chapter.xhtml#PC19).\n\n    ```java\n\
    \    @Component\n    public class OrderCommandHandler {\n        @CommandHandler\n\
    \        public void handleOrderCancel(OrderCancelCommand orderCancelCommand)\
    \ {\n            Order order = orderRepository.load(orderCancelCommand.getOrderId());\n\
    \            order.cancelOrder();\n            rollbackInventory(order);\n   \
    \     }\n\n        private void rollbackInventory(Order order){\n            for(LineItem\
    \ lineItem:order.getLineItems()){\n                Inventory inventory = inventoryRepository.load(lineItem.getInventoryId());\n\
    \                inventory.updateProductStock(lineItem.getQuantity(), ProductStockOperation.ADD);\n\
    \            }\n        }\n    }\n    ```\n    Listing 17-14 `OrderCommandHandler\
    \ handleOrderCancel` (`ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\\
    java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java`)\n\
    \n6.  The `OrderCommandHandler` retrieves the respective order from the repository\
    \ and invokes `cancelOrder`. The selected order aggregate changes its status to\
    \ `OrderStatus.CANCELLED`. See Listing [17-15](#477630_1_En_17_Chapter.xhtml#PC20).\n\
    \n    ```java\n    @Entity(name=\"order\")\n    @Table(name = \"CUSTOMER_ORDER\"\
    )\n    public class Order extends AbstractAggregateRoot {\n        public void\
    \ cancelOrder(){\n            this.orderStatus = OrderStatus.CANCELLED;\n    \
    \        registerEvent(new OrderUpdatedEvent(this.id, orderStatus.name(), new\
    \ Date(), null));\n            registerEvent(new OrderCancelledEvent(this.id));\n\
    \        }\n    }\n    ```\n    Listing 17-15 `Order Aggregate cancelOrder` (`ch17\\\
    ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
    order\\model\\Order.java`)\n\n7.  The order aggregate sends the `OrderUpdatedEvent`\
    \ to the clustered event bus.\n\n8.  The order aggregate will also send the `OrderCancelledEvent`\
    \ to the clustered event bus.\n\n9.  As a result of Step 5, the `OrderCommandHandler`\
    \ also retrieves the inventory items of all the products associated with the order\
    \ and invokes `updateProductStock`. The objective is to revert the stock to account\
    \ for the effect of cancelling the order so that those inventories can be made\
    \ available for sales again. The `rollbackInventory` in Listing [17-14](#477630_1_En_17_Chapter.xhtml#PC19)\
    \ depicts this.\n\n    See Listing [17-8](#477630_1_En_17_Chapter.xhtml#PC12)\
    \ to go through the `updateProductStock` code in the inventory aggregate entity.\n\
    \n10. While reinstating the stock, each inventory aggregate registers an `InventoryUpdateEvent`\
    \ into the clustered event bus.\n\n11. The `OrderCancelledEvent` registered during\
    \ Step 8 is consumed by the order process saga. See Listing [17-16](#477630_1_En_17_Chapter.xhtml#PC21).\n\
    \n    ```java\n    public class OrderProcessSaga extends AbstractAnnotatedSaga\
    \ {\n        private Long orderId;\n\n        @EndSaga\n        @SagaEventHandler(associationProperty\
    \ = \"orderId\")\n        public void handleOrderCanceledEvent(OrderCancelledEvent\
    \ orderCancelledEvent) {\n            // Do Nothing\n        }\n    }\n    ```\n\
    \    Listing 17-16 `OrderProcessSaga handleOrderCanceledEvent` (`ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\\
    saga\\handler\\OrderProcessSaga.java`)\n\nThe saga's life cycle ends after the\
    \ invocation of the `handleOrderCanceledEvent` handler since you annotated that\
