    Ecom-config\nEcom-registry\nEcom-gateway\n```\n\nI advise you to then start the\
    \ following two microservices:\n\n```\nEcom-security\nEcom-user\n```\n\nFor the\
    \ rest of the microservices, you may start them in any order.\n\n### Test the\
    \ Application\n\nYou can test the application, preferably in the Chrome browser.\
    \ Here again, you may refer to the steps described in Chapter [17](#477630_1_En_17_Chapter.xhtml)\
    \ to test the complete application end to end.\n\n## Summary\n\nYou just explored\
    \ OAuth 2.0 in general and looked into specific aspects of selected grand types\
    \ relevant to the microservices context. You also plugged in authentication and\
    \ authorization into the microservices e-commerce application. This is a major\
    \ step forward since security is a prime concern in any enterprise-grade application.\
    \ What is left from the discussions through the previous chapters is a deep dive\
    \ into the necessity of keeping the order and inventory domains close and together,\
    \ and you will do so in the next chapter.\n\n## 19. Axon Microservices and BASE\
    \ Transactions\n\nYou saw Axon 2 in Chapter [12](#477630_1_En_12_Chapter.xhtml),\
    \ and you also saw working examples. As mentioned in that chapter, you will be\
    \ using multiple versions of Axon in this book. In Chapter [12](#477630_1_En_12_Chapter.xhtml),\
    \ you used Axon 2.4.1. It required explicit wiring of components, either through\
    \ annotations or using XML configurations. Using Axon 2 and demonstrating examples\
    \ based on it in Chapter [12](#477630_1_En_12_Chapter.xhtml) was intentional,\
    \ since I wanted to make the bean wirings explicit so that the concepts were clear\
    \ for you as a first time reader of the concepts of CQRS and as a first time user\
    \ of the Axon framework.\n\nIn this chapter, you will look at examples in the\
    \ later versions of Axon where you will use Spring version 5.0.7.RELEASE, Spring\
    \ Boot 2.0.3.RELEASE, Axon 3.3.2, or later versions. Here in Axon 3, a lot of\
    \ explicit bean wirings can be avoided since Axon uses the Spring Application\
    \ Context to locate specific implementations of building blocks and provide defaults\
    \ for those that are not there. Axon 3 contains a complete overhaul of the inner\
    \ workings of Axon mainly because of a lot of new features in Java 7 and 8. To\
    \ make it clear, if you add a few starter dependencies, that is enough; the Axon\
    \ Spring Boot components will set up a basic infrastructure for you depending\
    \ on the other dependencies you have in the project. As an example, if you have\
    \ JPA, then Axon will automatically configure all the JPA-based components for\
    \ you. If you have marked `@Aggregate` or `@Saga` on a class, Axon will automatically\
    \ configure the components necessary to operate these aggregates and sagas. All\
    \ of this is going to make your life a lot easier, as you will see shortly in\
    \ the examples.\n\nFurther, if you recollect the discussion in the “The ACID Within\
    \ the BASE” section in Chapter [17](#477630_1_En_17_Chapter.xhtml), you kept the\
    \ order and inventory aggregates together. By using a single resource manager\
    \ (the MySQL persistence engine) in that case, you avoided distributed transactions.\
    \ However, you still used ACID-style transactions.\n\nLet’s find out if it’s possible\
    \ to avoid ACID-style transactions if there is a need to do so.\n\n**Note**  \n\
    You may want to refer to the Axon 3 reference documentation^([^(45)](#fn45)) and\
    \ API documentation^([^(46)](#fn46)) while you go through this chapter.\n\nYou\
    \ will be doing the following in this chapter:\n\n- Understanding how Axon 3 differs\
    \ from Axon 2, by looking at code\n- Migrating the Axon 2 command and event handling\
    \ in the single JVM example from Chapter [12](#477630_1_En_12_Chapter.xhtml) to\
    \ Axon 3\n- Migrating the Axon 2 distributed command and event handling example\
    \ from Chapter [12](#477630_1_En_12_Chapter.xhtml) to Axon 3\n- Migrating the\
    \ microservices e-commerce application from Chapters [17](#477630_1_En_17_Chapter.xhtml)\
    \ and [18](#477630_1_En_18_Chapter.xhtml) to Axon 3\n- Removing the ACID-style\
    \ transactions used in Chapters [17](#477630_1_En_17_Chapter.xhtml) and [18](#477630_1_En_18_Chapter.xhtml)\
    \ across multiple aggregates\n- Meeting Axon 4 so that you have a smooth roadmap\
    \ to continue with your own exploration after finishing this last chapter of the\
    \ book\n\nLet’s straightaway get our hands dirty with Axon 3.\n\n## Command and\
    \ Event Handling in the Same JVM Using Axon 3\n\nYou will migrate the example\
    \ in the “Command and Event Handling in the Same JVM” section in Chapter [12](#477630_1_En_12_Chapter.xhtml)\
    \ from Axon 2 to Axon 3. While doing so, I will highlight the main changes.\n\n\
    ### Design the Example Scenario\n\nSince you are building over the same example,\
