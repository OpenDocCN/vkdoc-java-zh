    Spring Boot 微服务之间的 Google Protocol Buffer

    上一节讨论了如何有效利用微服务的服务器资源，如 HTTP 连接和线程。同样重要的是微服务间通信中其他可能的优化。由于微服务跨越进程边界，微服务之间发送的数据量至关重要。这归结为跨微服务的数据结构编组和解组。在本节中，您将通过示例来探讨这一点。


    Protocol Buffer

    Protocol Buffer 是 Google 用于编组和解组结构化数据的平台中立且语言中立的机制。您需要定义希望数据如何结构化以使用 Protocol
    Buffer，然后可以在多个平台和语言中使用生成的源代码，轻松地从各种数据流中写入和读取结构化数据。使用 Protocol Buffer 的一个好处是，您甚至可以更新数据结构，而不会破坏已部署的、针对“旧”格式编译的应用程序代码。这对于构建能够适应或演进以适应未来需求变化的应用程序架构尤为重要。


    现在，您将探讨使用 Protocol Buffer 的动态过程。首先，您需要在 `.proto` 文件中指定希望序列化的信息如何结构化。在此过程中，您将使用
    Protocol Buffer 消息类型。每个 Protocol Buffer 消息都是一个信息的逻辑分组，包含一系列名称-值对。清单 10-13 是一个
    `.proto` 文件的示例，它定义了一个包含 `Product` 信息的消息，您在所有之前的示例中都使用了它。


    ```

    message Product {

    string productId = 1;

    string name = 2;

    string code = 3;

    string title = 4;

    string description = 5;

    string imgUrl = 6;

    double price = 7;

    string productCategoryName = 8;

    }

    清单 10-13

    示例 .proto 文件

    ```


    每个消息类型（在示例中为 `Product` 消息）都有一个或多个唯一编号的字段，每个字段都有一个名称和一个值类型，其中值类型可以是数字（整数或浮点数）、布尔值、字符串或原始字节。您的
    Protocol Buffer 消息也可以是其他 Protocol Buffer 消息类型，如清单 10-14 中定义的容器消息所示，用于保存 `Product`
    实例的集合。


    ```

    message Products {

    repeated Product product = 1;

    }

    清单 10-14

    用于其他 .proto 类型集合的 .proto 文件

    ```


    您可以指定字段为可选、必需和/或重复，如 `Products` 消息所示。


    一旦定义了消息，您就可以针对您选择的应用程序编程语言，在您的 `.proto` 文件上运行 Protocol Buffer 编译器，以生成实体类。这些实体类为每个字段提供简单的访问器（如
    `code()` 和 `set_code()`），以及将整个结构序列化/解析为原始字节的方法。在您的场景中，如果您选择的语言是 Java，对上述示例运行编译器将生成一个名为
    `Product` 的类。您可以在应用程序中使用这个实体类来编组和解组 `Product` Protocol Buffer 消息。您的代码将类似于清单 10-15
    所示。


    ```

    Product product =

    Product.newBuilder().setProductId(id)

    .setName("Kamsung D3")

    .setCode("KAMSUNG-TRIOS")

    .setTitle("Kamsung Trios 12 inch , black , 12 px ....")

    .setDescription("Kamsung Trios 12 inch with Touch")

    .setImgUrl("kamsung.jpg")

    .setPrice(12000.00)

    .setProductCategoryName("Mobile").build();

    // 写入

    FileOutputStream output = new FileOutputStream("D:/Product.ser");

    product.writeTo(output);

    output.close();

    // 读取

    Product productFromFile = Product.parseFrom(new FileInputStream("D:/Product.ser"));

    清单 10-15

    编组和解组 .proto 类型

    ```


    现在，您可以向消息格式添加新字段，而不会破坏向后兼容性；任何旧的程序二进制文件在解析时会忽略任何新字段。因此，通过使用 Protocol Buffer 作为数据格式，您可以扩展消息协议，而无需担心破坏现有代码。


    Google 关于 Protocol Buffer 的文档列出了使用 Protocol Buffer 的优势如下：


    *   更简单

    *   体积小 3 到 10 倍

    *   速度快 20 到 100 倍

    *   歧义更少

    *   生成的数据访问类在编程上更易于使用


    第二点和第三点意义重大，尤其是在您希望设计微服务之间大量“闲聊”式交互时，而在任何严肃的企业级应用中，这些交互的数量又非常庞大。

    现在，让我们看一个完整的示例，以解释 Protocol Buffer 在微服务之间的使用。


    演示微服务之间 Protocol Buffer 的场景

