    ### 分而治之


    接下来，我们来解决与单体架构相关的问题。我们希望遵循抽象原则，以模块化的方式构建软件。一旦我们将单体拆分为多个模块，这些模块之间就产生了通过服务调用相互依赖的需求。因此，必须在整合方式与拆分方式之间进行权衡。当模块整合在一起时，部署也可以发生在单个运行时进程中，这意味着模块间的通信是直接的本地调用。当我们拆分时，同样有两种部署选择：要么所有这些拆分的模块仍然可以部署在单个进程中，要么为了更好的运维优化，它们可以部署到多个进程中。在后一种情况下，模块之间无法再使用本地调用进行通信，而是需要合适的远程调用机制。然而，拆分方法的主要优势在于，可以为开发工件维护多个具有间接依赖关系的仓库，并且开发和发布流程可以在多个并行团队中进行。此外，跨进程部署的模块可以独立伸缩，因此这种选择性伸缩将根据实际业务需求优化资源，而不是受制于考虑不周的架构方法所带来的约束。


    ## 总结


    本章重点讨论了分布式软件架构的几个主要特征，以及它从软件早期到如今的演变过程。我对所讨论的主题进行了鸟瞰式的概述，但目的是为了设定背景并审视现有的不同选择。最后，我谈到了设置软件结构的选项，以及当我们保持模块整合与将它们分离时各自的影响。这两种方法各有利弊，但如果分离带来的收益相当可观，那么我们就需要找到方法来处理围绕可管理性和模块间通信这些不那么直接的问题。我将在下一章简要讨论这些方面。在接下来的章节中，你将看到所有这些理论如何通过具体的代码示例付诸实践，这些示例可以在你自己价格不高的台式机或笔记本电脑上构建和运行。


    脚注 1   2


    # 2. 微服务介绍


    企业软件系统的复杂性随着所支持的功能和特性的增加而增加。正如你在第 1 章中所见，当今每个企业系统都需要与组织内外的许多其他系统无缝地传输信息。传统上，我们一直将软件系统构建为“模块化单体”。所谓模块化，是指它们遵循模块、层和分层的原则，因此软件系统内的元素存在逻辑上的模块性。所谓单体，是指整个系统是围绕特定的部署和运维场景构建的；大多数情况下，它们被部署为单个进程，或者最多按照你在第
    1 章中看到的三层或 n 层架构进行分布式部署。但部署的灵活性到此为止。同样重要的是，在多个团队或分布式团队组织中构建这样一个系统所需遵循的流程。


    在本章中，你将看到企业在构建当今软件应用时所面临的几个特定问题。一旦你理解了这些问题，你将看到一种构建软件应用的新风格，在这种风格中，你在构建、部署或运维阶段拥有更高的灵活性。


    ## 模块化单体


    我选择将当今典型的企业系统称为模块化单体，因为它们具有许多模式特征，同时也包含我们在定义软件架构时一直虔诚遵循的一些不那么明显的反模式。在本节结束时，你将理解我为什么使用这个短语。


    ### 模块化组织


    自结构化编程语言时代以来，我们就已经掌握了将软件程序分解为更小元素（如多个文件、包含库、支持 bean 等）的风格，这样软件开发人员就可以轻松地在集成开发环境（IDE）中管理多个文件，同时仍然可以开发大型应用、复杂算法和逻辑。


    下一级别的模块化是在模块级别或打包级别进行的。一个模块是一组相关功能的集合，以多个程序文件、库等形式组织在一起，并且可以在 IDE 中借助顶层构建脚本进行管理。因此，一个应用可以由多个这样的模块组成。


    当我们进入软件生命周期的下一个阶段（构建和打包应用）时，包的概念就会发挥作用。在这里，我们处理的是构建模块并使其能够方便地分发到其他环境（无论是测试环境、预发布环境还是生产环境）的问题。有时，我们还希望以库的形式将软件分发给第三方消费者。


    在部署的下一个阶段，我们可能希望将软件包部署到一个或多个计算机进程或计算机运行时中。这是为了满足系统的不同运行时质量要求，这些要求通常根据非功能性需求（NFR）和服务级别协议（SLA）来定义。


    第 1 章简要介绍了我们可以用来构建分布式系统并以灵活方式部署和运维它们的不同选项。现在的问题是，它们有多灵活？为了回答这个问题，请看第 1 章中图 1-3
    所示的典型应用架构。它由表示层、业务层和数据库层组成。当今大多数企业系统都遵循这种架构，并且具有这种架构的系统还将继续存在几年，至少直到它们被构建时所设定的生命周期结束（EOL）。这有什么问题呢？它可以灵活地以分布式方式部署到其自身的各层中。但灵活性到此为止。那么，我们还需要哪些额外的灵活性呢？

