- fmt: '```java

    @FeignClient(name="product-proxy", url = "http://localhost:8080",

    fallback = ProductAlternateServerComponent.class)

    public interface ProductServiceProxy extends ProductService{

    }

    ```

    Listing 8-5 Hystrix Fallback Declaration (`ch08\ch08-02\ProductWeb\src\main\java\com\acme\ecom\product\client\ProductServiceProxy.java`)


    Here you have instructed Hystrix to consider `ProductAlternateServerComponent`
    as the component to be retried as a fallback. Let’s now look at the `ProductAlternateServerComponent`
    code mentioned in Listing [8-6](#477630_1_En_8_Chapter.xhtml#PC11).


    ```java

    @EnableFeignClients(basePackageClasses = ProductAlternateServiceProxy.class)

    @ComponentScan(basePackageClasses = ProductAlternateServiceProxy.class)

    @Component

    public class ProductAlternateServerComponent implements ProductServiceProxy{

    private ProductAlternateServiceProxy productAlternateServiceProxy;

    @Autowired

    public ProductAlternateServerComponent(

    ProductAlternateServiceProxy productAlternateServiceProxy){

    this.productAlternateServiceProxy = productAlternateServiceProxy;

    }

    @Override

    public ResponseEntity>> getAllProducts() {

    return productAlternateServiceProxy.getAllProducts();

    }

    @Override

    public ResponseEntity> getProduct(

    @PathVariable("productId") String productId) {

    return productAlternateServiceProxy.getProduct(productId);

    }

    }

    ```

    Listing 8-6 Hystrix Fallback Implementation (`ch08\ch08-02\ProductWeb\src\main/java\com\acme\ecom\product\component\ProductAlternateServerComponent.java`)


    One approach is to have `ProductAlternateServerComponent` respond with some kind
    of locally cached data as a fallback. However, since you have an alternate microservice
    designated as a fallback service, you can leverage it here. You have also leveraged
    the Feign client to delegate the call to the Product Server 2 microservice. For
    this Feign client, you will make use of `ProductAlternateServiceProxy` with the
    code from Listing [8-7](#477630_1_En_8_Chapter.xhtml#PC12).


    ```java

    @FeignClient(name="product-alternate-proxy", url = "http://localhost:8079")

    public interface ProductAlternateServiceProxy extends ProductService{

    }

    ```

    Listing 8-7 Feign Client Proxy to Alternate Microservice (`ch08\ch08-02\ProductWeb\src\main\java\com\acme\ecom\product\client\ProductAlternateServiceProxy.java`)


    Here you expect that the Product Server 2 microservice is available at `http://localhost:8079`,
    which will act as the fallback for the Product Server 1 microservice, which is
    expected to be available at `http://localhost:8080`.


