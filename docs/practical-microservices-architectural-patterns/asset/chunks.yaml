    the `ClientDetailsService` (the service that provides the details about an OAuth2
    client), like declaring individual clients and their properties. Note that password
    grant is not enabled (even if some clients are allowed it) unless an `AuthenticationManager`
    is supplied to the configure method. At least one client or a fully formed custom
    `ClientDetailsService` must be declared or the server will not start. You registered
    another client and authorized the “implicit,” “password,” “authorization_code,”
    and “refresh_token” grant types. In order to use the “password” grant type, you
    need to wire in and use the `AuthenticationManager` bean. The authentication manager
    will represent the web-security users.


    `void configure(AuthorizationServerEndpointsConfigurer endpoints)`: You can configure
    the non-security features of the authorization server endpoints, like token store,
    token customizations, user approvals, and grant types here. You shouldn’t need
    to do anything by default, unless you need password grants, in which case you
    need to provide an authentication manager.


    By default, Spring Security will provide `access_token` and `refresh_token` in
    UUID format which will then get verified by the resource servers. In cases where
    you have a huge amount of requests for your services, this may turn the authorization
    server into a bottleneck. Instead, and as per the earlier discussion on tokens
    and JWT, you make your authorization server issue signed JWTs that contain all
    the information necessary to validate the user in the token itself. To achieve
    this, you need `JwtTokenStore` and `JwtAccessTokenConverter`. You use a custom
    `JwtAccessTokenConverter` that will use a pregenerated certificate for your JWT
    signatures. To do this, you must use your `keyPair` configuration and configure
    a custom `JwtAccessTokenConverter`, as seen in Listing [18-11](#477630_1_En_18_Chapter.xhtml#PC16).
    `JwtAccessTokenConverter` translates between JWT-encoded token values and OAuth
    authentication information (bidirectional). It also acts as a `TokenEnhancer`
    (a Strategy class for enhancing an access token before it is stored by an `AuthorizationServerTokenServices`
    implementation) when tokens are granted. A `TokenStore` represents the storage
    mechanism to store the OAuth access token. Spring supports different kind of token
    store like `InMemoryTokenStore`, `JDBCTokenStore`, `JwtTokenStore`, and so on.
    You use `JwtTokenStore` for your case. The JWT version of the store (`JwtTokenStore`)
    encodes all the data about the grant into the token itself and it doesn’t persist
    any data. Once you have created the `JwtTokenStore` and `JwtAccessTokenConverter`
    beans, you wire them up to the `AuthorizationServerEndpointsConfigurer` in the
    `OAuth2Configuration` class.


    ## Resource Server


    Next, you can enable annotation-based security for your resource servers using
    the `@EnableGlobalMethodSecurity` annotation on any `@Configuration` instance.
    This enables Spring method-level security. See Listing [18-12](#477630_1_En_18_Chapter.xhtml#PC17).


    ```

    @Configuration

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class GlobalMethodSecurityConfiguration   {

    }

    Listing 18-12

    EnableGlobalMethodSecurity (ch18\ch18-01\Ax2-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\security\GlobalMethodSecurityConfiguration.java)

    ```


    `@EnableGlobalMethodSecurity` can take several arguments:


    *   `prePostEnabled`: Determines whether Spring Security’s pre and post annotations
    (`@PreAuthorize`, `@PostAuthorize`,..) should be enabled.

    *   `secureEnabled`: Determines if Spring Security’s secured annotation (`@Secured`)
    should be enabled.

    *   `jsr250Enabled`: Determines if JSR-250 annotations (`@RolesAllowed`, ..) should
    be enabled.


    You should enable only one type of annotation in the same application for any
    interface or class; otherwise, the behavior will not be well-defined. If two annotations
    are found that apply to a particular method, only one of them will be applied.


    You use `prePostEnabled = true` and Spring’s `@PreAuthorize`/`@PostAuthorize`
    annotations are preferred way for applying method-level security. They support
    the Spring Expression Language and provide expression-based access control. Let’s
    look at how they are leveraged here:


    *   `@PreAuthorize`: This is suitable for validating authorization before entry
    into a method. `@PreAuthorize` can take into account the roles/permissions of
    a logged-in user, the argument passed to the method, etc.

    *   `@PostAuthorize`: This can check for authorization after the method has been
    executed. It is suitable for verifying authorization on returned values; however,
    it’s not commonly used. Spring EL provides a `returnObject` that can be accessed
    in the expression language, which reflects the actual object returned from the
    method.


    Next, you need to configure the resource server. `EnableResourceServer` is a convenient
    annotation for OAuth2 resource servers, and it enables a Spring Security filter
    that authenticates requests via an incoming OAuth2 token. This enables a Spring
    Security filter named `OAuth2AuthenticationProcessingFilter` that authenticates
    requests using a passed-in OAuth2 token. You should add this annotation and provide
    a `@Bean` of type `ResourceServerConfigurer` (e.g. via `ResourceServerConfigurerAdapter`)
    that specifies the details of the resource (URL paths and resource ID). You create
    a bean named `CoreResourceServerConfiguration` that extends `ResourceServerConfigurerAdapter`
    and overrides the `configure(HttpSecurity http)` method to enable the security
    of the Ecom-core microservice. See Listing [18-13](#477630_1_En_18_Chapter.xhtml#PC18).


    ```

    @Configuration

    @EnableResourceServer

    public class CoreResourceServerConfiguration extends ResourceServerConfigurerAdapter{

    @Autowired

    TokenStore tokenStore;

    @Autowired

    JwtAccessTokenConverter tokenConverter;

    @Override

    public void configure(HttpSecurity http) throws Exception {

    http

    .csrf().disable()

    .authorizeRequests()

    .anyRequest().authenticated()

    .antMatchers(HttpMethod.POST).hasAuthority("ORDER_WRITE")

    .antMatchers(HttpMethod.DELETE).hasAuthority("ORDER_WRITE");

    }

    @Override

    public void configure(ResourceServerSecurityConfigurer resources)

    throws Exception {

    resources.resourceId("CORE").tokenStore(tokenStore);

    }

    }

    Listing 18-13

    Enabling Resource Server (ch18\ch18-01\Ax2-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\security\CoreResourceServerConfiguration.java)

    ```


    In the configure method you use the passed-in `HttpSecurity` instance to secure
    the POST and DELETE methods and only allow authenticated users with `ORDER_WRITE`
    authority to access the resources. Then you use the `ResourceServerSecurityConfigurer`
    class to create a resource id with the name `CORE`. The name of this resource
    id must match the name used in the authorization server.


    Next, you need to read values from the encrypted JWT. As you have already seen,
    the `JwtAccessTokenConverter` helps to translate between JWT-encoded token values
    and OAuth authentication information in a bidirectional manner. Since you use
    asymmetric encryption and since the token has already been encrypted with the
    private key by the authorization server, you will now use the public key pair
    to decrypt and read. See Listing [18-14](#477630_1_En_18_Chapter.xhtml#PC19).'
