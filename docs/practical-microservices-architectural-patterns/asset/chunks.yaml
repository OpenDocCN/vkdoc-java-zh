    the `ProductRestController` handles HTTP-based CRUD requests for the `Product`
    entity. The implementation of the method body retrieves a product entity using
    the supplied id and returns a new `Product` object. This `Product` object data
    will be written directly to the HTTP response as JSON. Listing [7-13](#477630_1_En_7_Chapter.xhtml#PC25)
    also shows a bulk retrieval operation where you retrieve all `Product` resources.


    A key difference between a traditional MVC controller and the RESTful web service
    controller above is the way that the HTTP response body is created. Rather than
    relying on a view technology to perform server-side rendering of the greeting
    data to HTML, this RESTful web service controller simply populates and returns
    a `Greeting` object. The object data will be written directly to the HTTP response
    as JSON. This code uses Spring 4’s `@RestController` annotation, which marks the
    class completely as a controller where every method returns a domain object instead
    of a view as compared to a traditional MVC controller. It’s shorthand for `@Controller`
    and `@ResponseBody` put together.


    For converting the `Product` object to JSON, Spring uses the HTTP message converter
    support. You don’t need to do this conversion manually since the Jackson 2 is
    on the classpath, so Spring’s `MappingJackson2HttpMessageConverter` is automatically
    chosen to convert the `Product` instance to JSON.


    Let’s look at other operations. Listing [7-14](#477630_1_En_7_Chapter.xhtml#PC26)
    shows how to create new resources.


    ```

    @RestController

    public class ProductRestController {

    @RequestMapping(value = "/products", method = RequestMethod.POST)

    public ResponseEntity> postProduct(@RequestBody Product

    product,    UriComponentsBuilder ucBuilder) {

    List products =

    productRepository.findByCode(product.getCode());

    if (products.size() > 0) {

    LOGGER.debug("A Product with code {} already exist",

    product.getCode());

    return new ResponseEntity>(HttpStatus.CONFLICT);

    }

    Product newProduct = productRepository.save(product);

    HttpHeaders headers = new HttpHeaders();

    headers.setLocation(ucBuilder.path("/products/{id}").buildAndExpand(

    product.getId()).toUri());

    Resource productRes =new Resource(newProduct,

    linkTo(methodOn(ProductRestController.class).getProduct(

    newProduct.getId())).withSelfRel());

    return new ResponseEntity>(productRes,

    headers, HttpStatus.OK);

    }

    }

