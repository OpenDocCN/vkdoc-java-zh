    \ that an optimistic locking conflict occurred and throw a `javax.persistence.OptimisticLockException`.\n\
    This exception may be thrown as part of an API call, a flush, or at\ncommit time.\
    \ When doing so, the current transaction, if one is active,\nwill be marked for\
    \ rollback.\n\nConflict Detection and Resolution in Axon\nOne of the major advantages\
    \ of being explicit about the meaning of\nchanges is that you can detect conflicting\
    \ changes with more precision.\nTypically, these conflicting changes occur when\
    \ two users are acting on\nthe same data more or less concurrently. Referring\
    \ to Figure [16-8](#477630_1_En_16_Chapter.xhtml#Fig8), if Ann and\nRia, both\
    \ looking at a specific version of the data, believe that the\nstatus of the last\
    \ seat they both looked is “Available for Booking,”\nthen they both can decide\
    \ to make a change to that data. They will both\nsend a command like “on version\
    \ X of this aggregate, do that,” where X\nis the expected version of the aggregate\
    \ on which the changes are to be\napplied; at least, this is what both Ann and\
    \ Ria expect. In this case,\none of them will have the changes actually applied\
    \ to the expected\nversion. By the time the system is about to apply the changes\
    \ on behalf\nof the other user, the expected version on which the changes are\
    \ to be\napplied would have changed, hence the changes on behalf of that\nparticular\
    \ user will not be applied.\n `org.axonframework.domain.AggregateRoot<I>`\n is\
    \ the interface defining a contract for entities that represent\nthe aggregate\
    \ root where `I` represents the type\nof the identifier of this aggregate. AggregateRoot\
    \ provides a method\ncalled `Long getVersion()`\n.\n`AggregateRoot.getVersion()`\
    \  returns the current\nversion number of the aggregate or null if the aggregate\
    \ is a newly\ncreated one. This version must reflect the version number of the\n\
    aggregate on which the changes are applied. Each time the aggregate is\nmodified\
    \ and stored in a repository, the version number must be\nincreased by at least\
    \ 1\\. This version number can be used by optimistic\nlocking strategies and detection\
    \ of conflicting concurrent\nmodification.\nTypically the sequence number of the\
    \ last committed event on this\naggregate is used as a version number.\nAs a convenience\
    \ measure, Axon also provides  `org.axonframework.domain.AbstractAggregateRoot<I>`\n\
    , which is a very basic implementation of the AggregateRoot\ninterface. It provides\
    \ the mechanism to keep track of uncommitted events\nand maintains a version number\
    \ based on the number of events generated.\nFor most of the cases, it is enough\
    \ that you extend your Aggregate Root\nentities from this abstract class.\n\n\
