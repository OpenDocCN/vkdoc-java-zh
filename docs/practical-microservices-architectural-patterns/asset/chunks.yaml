    \ It provides\nthe mechanism to keep track of all uncommitted events and also\
    \ maintains\na version number based on the number of events generated, which can\
    \ be\nused for validation during committing. Further, the `Order` entity also\n\
    registers events to be published when the aggregate is saved using the\n`registerEvent`\n\
    method. Next, you will look at the `Product` aggregate in\nListing [12-5](#477630_1_En_12_Chapter.xhtml#PC5).\n\
    \n```\n@Entity\n@Table(name=\"ECOM_PRODUCT\")\n@Data\n@EqualsAndHashCode(exclude\
