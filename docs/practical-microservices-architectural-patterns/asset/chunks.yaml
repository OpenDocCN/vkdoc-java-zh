    \n已发货订单的交付失败\n\n示例应用程序提供了一种模拟已发货订单交付失败的机制。此事件可能由多种原因引起，例如无法找到送货地址、客户拒收货物、货物运输途中遭遇自然灾害等。无论何种情况，一旦货物退回仓库，就无需将该订单中的产品保持打包状态；相反，可以将产品释放回库存（当然，如果检查合格）以便再次销售。当模拟此类场景时，你将在图\
    \ 17-10 中看到流程和状态变化。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig10_HTML.jpg](img/477630_1_En_17_Fig10_HTML.jpg)\n\
