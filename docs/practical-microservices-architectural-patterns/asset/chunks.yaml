- fmt: 'If so, when the `Quotes Processor Task`, which is a scheduled timer, times
    out the next time, it will attempt to process the same quote again since the quote
    status is still `"New"`. This will cause duplicate transactions in the user balance.
    The `"Test the Duplicate Message Being Sent Scenario"` and `"Test the Duplicate
    Message Consumption Scenario"` sections in Chapter [13](#477630_1_En_13_Chapter.xhtml)
    simulated error scenarios like this. In the first case, the quote status change
    from `"New"` to `"Confirmed"` was not successful in the first pass, so duplicate
    messages were sent to the downstream settlement microservice. In the second case,
    the duplicate message consumption scenario was simulated, which caused duplicate
    transactions in the user balance.


    The effect of duplicate transactions can be nullified provided the transaction
    is idempotent. Idempotent operations are those that can be repeatedly applied
    without any side effects. Additions and deductions are not idempotent, as is evident
    from the nature of the actions itself. Update operations that simply set a value
    in a single-threaded environment are idempotent; however, in a multi-threaded
    environment where you have concurrency, even such update operations are not idempotent.
    This is because the context that was assumed to be the precondition for such update
    operations could have been changed by another concurrent thread. Or the application
    of such updates can happen out of order from what is desired. You need to have
    mechanisms to handle these cases, and you will look into them in the enhanced
    example section later in this chapter. In general, idempotent consumer implementations
    can be tricky, as illustrated in the reference.^([^(34)](#fn34))


    ## Global vs. Local Resources


    Chapter [13](#477630_1_En_13_Chapter.xhtml) discussed ACID transactions, and Figure [13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)
    showed a typical scenario of two separate resources, one a database resource and
    another a message middleware resource. Queues of message middleware resources
    are first class citizens for storing the state of entities in motion, temporarily
    in a node, or in a process. When you split the monolith `Quote` application into
    two microservices, the `Quote Processing` microservice and the `Quote Settlement`
    microservice, you need a communication mechanism between them. If you prefer reactive
    or event-based approaches for this communication over synchronous-style REST calls,
    message middleware resources are good choices, and that is what is represented
    in Figure [13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2). However,
    this figure depicts a completely distributed architecture where all the resource
    managers and even the transaction managers are distributed globally in the network,
    hence full global transactions are required if you must apply ACID-style, two-phase
    commit operations.


    If the queues should have fault tolerance, they are to be persistent. A queue
    to be persistent should be backed up with a suitable persistent mechanism, usually
    by a database itself. So if we redraw Figure [13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)
    to represent a persistent queue participating in the global transaction, it will
    look like Figure [14-3](#477630_1_En_14_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig3_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig3_HTML.jpg)


    **Figure 14-3** Distributed ACID transactions with distributed resources


    Figure [14-3](#477630_1_En_14_Chapter.xhtml#Fig3) retains the `Resource Manager
    1` and `Resource Manager 2` from Figure [13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)
    however, it shows a backing store for the JMS resource (`Resource Manager 2`)
    represented by `Resource Manager 3`. You then can represent your microservices
    architecture similar to that shown in Figure [14-4](#477630_1_En_14_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig4_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig4_HTML.jpg)


    **Figure 14-4** Quotes microservices architecture


    It’s again typical that middleware vendors provide database solutions and message
    middleware solutions together. If so, you can do one optimization to the architecture
    shown in Figure [14-3](#477630_1_En_14_Chapter.xhtml#Fig3), and it is shown in
    Figure [14-5](#477630_1_En_14_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig5_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig5_HTML.jpg)


    **Figure 14-5** Distributed ACID transactions with partial optimization


    Many middleware majors including but not limited to Microsoft, IBM, and Oracle
    provide solutions within the same stack. However, there are still some issues.
    The issues discussed in previous subsections can be addressed only if you bring
    the operations in the microservice(s) and the message queue within single transaction.
    If you do so, since the backing persistence database of the queue and the database
    used by the microservices are different resources, global two-phase transactions
    are required.


    You will optimize the architecture in Figure [14-5](#477630_1_En_14_Chapter.xhtml#Fig5)
    further to address the above issue; see Figure [14-6](#477630_1_En_14_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig6_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig6_HTML.jpg)


    **Figure 14-6** Distributed transactions optimized into local transactions


    The technique is to ensure that the backing persistence is on the same resource
    as the database, as shown in Figure [14-6](#477630_1_En_14_Chapter.xhtml#Fig6).
    Note that the label of the transaction in Figure [14-6](#477630_1_En_14_Chapter.xhtml#Fig6)
    has changed from `XA-JTA` to `TX-Local`. Moreover, when partitioning is avoided,
    you can minimize or even avoid communications happening at the network level.
    This too is shown in Figure [14-6](#477630_1_En_14_Chapter.xhtml#Fig6). Compared
    to Figure [14-3](#477630_1_En_14_Chapter.xhtml#Fig3) or Figure [14-5](#477630_1_En_14_Chapter.xhtml#Fig5),
    the transaction managers, resource managers, and backing resources all reside
    in the same partition or node. If they are all from the same vendor, then there
    are options for optimizations using tight integration choices, like bypassing
    published APIs and making optimized calls through published or even non-published
    SPIs (service provider interfaces).


    Let’s now look at the microservices architectures possible with such a resource
    sharing setup. The architecture options shown in Figure [14-7](#477630_1_En_14_Chapter.xhtml#Fig7)
    are surely improvisations over that shown in Figure [14-4](#477630_1_En_14_Chapter.xhtml#Fig4);
    however, careful observation will reveal that you have not avoided the requirement
    to use global two-phase transactions completely. The resource for your queue can
    be shared with the application transaction database resource of either of the
    microservices, not both. Hence with the other microservice and the queue, still
    there is the issue of two-phase commit transactions.


    ![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig7_HTML.jpg](images/477630_1_En_14_Chapter/477630_1_En_14_Fig7_HTML.jpg)


    **Figure 14-7** Microservices architecture options'
