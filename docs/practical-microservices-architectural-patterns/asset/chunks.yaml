- fmt: '# Cloud Architecture Model


    The industry has divided the cloud architecture into four layers:


    - **Hardware layer**: The hardware layer contains the physical resources of the
    cloud, such as CPUs, disks, and networks.

    - **Infrastructure as a Service**: The IaaS layer abstracts physical resources
    using virtualization techniques, thus creating a pool of computing resources to
    be exposed as integrated resources to the layer above and to the end users. Features
    such as on-demand resource allocation happen at this layer.

    - **Platform as a Service**: The PaaS layer provides application development tools
    and deployment environments in addition to the operation environment provided
    by the underlying IaaS, thus aiming to minimize the burden of deploying applications
    directly into virtual machines. Relational and No SQL storage, message queues,
    and mail servers are typical services made available at this layer by wrapping
    suitable frameworks.

    - **Software as a Service**: At the top of everything lies the SaaS model, which
    can host enterprises’ customized end user applications or hired third-party software,
    available as a network service, thus relieving the enterprise from the pains of
    managing and maintaining the various architectural layers of the cloud.


    Figure [4-6](#477630_1_En_4_Chapter.xhtml#Fig6) represents the various layers
    of the cloud architecture. Automatic scaling to achieve better performance and
    availability in an on-demand manner makes the cloud applications superior to applications
    deployed on premises.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig6_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig6_HTML.jpg)


    Figure 4-6. Cloud architecture components


    # Cloud Service Model


    The cloud service model is based on the kind of control users may have over how
    the resources are being utilized. Figure [4-7](#477630_1_En_4_Chapter.xhtml#Fig7)
    shows the different models.


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig7_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig7_HTML.jpg)


    Figure 4-7. Cloud service models


    Typically the cloud architecture itself can be mapped to the cloud service model.
    In the traditional service model, the user or the enterprise itself is responsible
    for managing the whole stack (e.g., hardware, data center facilities, software,
    and data) whereas in the cloud service model it varies as follows:


    - **Infrastructure as a Service**: In the IaaS service model, the users request
    compute power, storage, network, and their associated resources alone and pay
    for what they use.

    - **Platform as a Service**: In PaaS model, the users have zero control over the
    underlying infrastructure, such as CPU, network, and storage, as they are abstracted
    away below the platform. Instead, it allows application development platforms
    that allow the creation of applications with supported programming languages and
    related tools hosted in the cloud and accessed through an interface, mainly a
    browser. Many times the application runtime and middleware are also provided by
    the CSP, and the user develops, installs, manages, and operates the software application
    alone and its data.

    - **Software as a Service**: This is the “forget everything” model where the user
    doesn’t even own, manage, or operate the application. Applications are run on
    the cloud infrastructure and are accessible from various client devices. Limited
    user-configurations are available. Sometimes the same application instance serves
    the end users of more than one enterprise (tenant); such applications are called
    multi-tenant.


    # SaaS Maturity Models


    The SaaS maturity model was coined by Microsoft^([⁴](#fn4)) more than a decade
    ago, and since then this information has been mentioned by me many times during
    my discussions with architects. I will repeat it here, since an understanding
    is indispensable when we map it later to how microservices can be scaled for different
    levels. Figure [4-8](#477630_1_En_4_Chapter.xhtml#Fig8) depicts the different
    levels of SaaS maturity. The term “tenant” is used here to denote an enterprise
    on whose behalf the application is hosted; the end users access services from
    these hosted instances of the applications. So, two different airlines or two
    different e-commerce enterprises are two different tenants. The different levels
    of SaaS maturity are as follows:


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig8_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig8_HTML.jpg)


    Figure 4-8. SaaS maturity models


    - **Level 1 – Ad Hoc/Custom**: At this level of SaaS maturity, each enterprise
    or tenant has its own custom-developed application. The source code of these applications
    is different, and the separate application instance is hosted either on premise
    or in a public cloud for each tenant.

    - **Level 2 – Configurable**: At this level of SaaS maturity, there is only one
    code base. The code base is configurable separately for each tenant, and each
    separate application instance is hosted either on premise or in a public cloud
    for each tenant.

    - **Level 3 – Configurable, Multi-Tenant Efficient**: At this level of SaaS maturity,
    there is only one code base. A single instance of this single code base is hosted
    either on premise or in a public cloud, which serves the end users of all tenants.
    The configuration of the code done while instantiating the application is in such
    a way that the runtime characteristics like features, functionalities, and look-and-feel
    are “adaptable” to a certain extent as per the wish of each tenant. Each customer’s
    data is kept separate from that of other customers by employing suitable architecture-level
    partitions. But the limitation here is, if the number of tenants or the number
    of end users increases beyond a limit, it is difficult to scale beyond that point.
    Scalability can be managed to some extent by partitioning, but after a certain
    extent the application can be scaled only by moving it to more powerful servers
    (scaling up), until diminishing returns make it impossible to add more power cost-effectively.

    - **Level 4 – Configurable, Multi-Tenant Efficient, and Scalable**: In Level 4
    SaaS maturity, the capability to horizontally scale is added to Level 3. Multiple
    instances of app servers and DB servers can be added horizontally and load balancing
    routers can distribute load from users of multiple tenants to a pool of server
    instances in a round robin or equally distributed manner. While it is straightforward
    to scale out at the app server layer using app server farms, scaling at the DB
    layer is not that straightforward since it requires a database cluster, not a
    simple farm. You will learn more about this later when you look into the “write
    scalability” of data.


    # Virtualization


    Virtualization is a process of providing an abstract machine that uses device
    drivers targeting the abstract machine so as to provide virtual replication of
    hardware. Type 1 hypervisors^([⁵](#fn5)) run on bare metal and most mid-end to
    high-end microprocessors can be virtualized. Server processors like Intel’s Xeon
    and application processors like the Arm Cortex-A series are hardware with same
    capability. When virtualized, the VM (virtual machine) will run any software that
    runs on the bare metal hardware while providing isolation from the real hardware.
    See Figure [4-9](#477630_1_En_4_Chapter.xhtml#Fig9).


    ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig9_HTML.jpg](images/477630_1_En_4_Chapter/477630_1_En_4_Fig9_HTML.jpg)


    Figure 4-9. SaaS over abstract hardware


    Instances of multiple applications or multiple instances of the same application
    can be run in a single hardware effectively by virtualization techniques.'
