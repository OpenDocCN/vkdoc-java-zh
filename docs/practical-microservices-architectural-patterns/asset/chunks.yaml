    ![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig14_HTML.jpg](img/477630_1_En_9_Fig14_HTML.jpg)


    图 9-14

    Eureka 控制台中的高可用微服务


    可以看到，您已经注册了对外可用的 μService。换句话说，Web 应用 μService (product-home) 已注册到 Eureka 中，尽管这不是必需的，并且您也没有从注册表中对其进行查找。此外，甚至
    API 网关也出现在 Eureka 的注册列表中。这同样不是强制性的。不过，您可以根据具体需求进行这些变通。


    最后一步，您应该启动 Nginx 反向代理。假设您已完成所需的配置，可以通过以下命令启动它：


    ```

    cd D:\Applns\nginx\nginx-1.13.5

    D:\Applns\nginx\nginx-1.13.5>nginx

    ```


    一切就绪。现在，您可以打开浏览器（最好使用 Chrome），输入以下 URL 来端到端地测试应用流程：


    ```

    http://tiger:8090/

    ```


    如果一切顺利，从标签 1 到标签 6 的端到端流程（如图 9-13 所示）将被执行，获取数据并将数据渲染到网页中。如果页面未能成功渲染数据，您可以使用提供的按钮刷新屏幕，或者尝试使用新的浏览器重试。

    您可以通过关闭其中一个微服务，使用浏览器测试应用，然后重新启动之前关闭的微服务，并再次使用浏览器进行测试，来专门测试每个微服务的高可用性。

    需要注意的是，这个端到端演示涉及多个动态组件。如果您通过“猴子测试”来验证高可用性场景，请务必给微服务足够的时间来恢复，并让它们有足够的时间相互同步，包括与注册中心的同步。

    如果您想重新测试数据加载，GUI 中还提供了一个“刷新”按钮。


    总结

    链条的强度取决于其最薄弱的环节，这句谚语同样适用于高可用性的许多方面。我从一个宏观视角，阐述了高可用性和冗余在端到端部署的每个阶段是如何体现的，从数据产生的客户端浏览器开始，到
    Web 和应用服务器，再到数据管理和数据存储层，最后到归档或灾难恢复部分。在第 16 章中，您还将研究改进高可用性的高级构造和模式，旨在确保用户创建的每一个字节的完整性，都能按照端到端链中预期的数据一致性规则得以保留，无论您是遵循具有严格
    ACID^(¹⁸) 合规性的传统单体架构，还是采用具有宽松 ACID 合规性的新一代微服务架构。虽然配置高可用性及相关方面需要在处理节点和网络路径上实现冗余，但与单体架构相比，基于微服务的架构可能会增加网络跳数或线程及进程级上下文切换的总数。因此，应尽一切努力解决单个微服务以及整个微服务应用的性能问题。您将在下一章中探讨这一点。


    脚注


    10. 微服务性能


    当您从传统的三层或 n 层架构迁移到微服务架构时，一个主要的可观察特征是微服务进程之间互连数量的增加。以前完全在单个进程内完成的计算，现在可能会被拆分成许多跨进程的微计算。这增加了进程间通信的数量、上下文切换的次数、涉及的
    I/O 操作数量等。因此，更详细地审视这些方面是很有意义的。在本章中，您将探讨微服务中需要考虑的几个性能方面，具体包括：


    *   同步 HTTP 与异步 HTTP

    *   用于异步 HTTP 的 Servlet 3.0 规范

    *   演示浏览器与微服务之间异步 HTTP 的代码

    *   演示微服务之间异步 HTTP 的代码

    *   Google Protocol Buffer

    *   演示在微服务之间使用 Google Protocol Buffer 的代码


    外部架构间的通信


    第 4 章的“外部架构视角”部分介绍了微服务的外部架构。在那里，您看到了当您转向基于微服务的架构时，典型单体架构的内部复杂性是如何“浮出水面”的。一个明显的变化是，单个或少数几个计算进程被拆分成更多类似但计算密集度较低的进程。借助图
    10-1 可以更好地解释这一变化。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig1_HTML.jpg](img/477630_1_En_10_Fig1_HTML.jpg)


    图 10-1

    单体架构与微服务架构的边界


    在传统的单体架构中，构成服务实现的多个组件在单个容器进程中执行。这些组件之间的方法调用或消息传递是“本地”或“进程内”的。这将允许进程（无论是容器管理的进程还是简单的
    Java 应用程序进程）做出许多假设和优化，并完成执行。然而，当您将同一个服务从单体架构重新架构为微服务架构时，实现会被拆分并部署到多个进程中。如图 10-1
    所示。与进程内的通信相比，进程间通信是重量级的。它们涉及更多的上下文切换、网络等待和 I/O 操作、数据编组和解组等。这增加了微服务架构外部架构空间的复杂性。

    此外，每个微服务都涉及监听传入流量的套接字监听器。因此，与传统的单体架构相比，微服务架构涉及更多的套接字监听器、用于处理传入流量的相关线程等。深入研究这些精选关注点中的几个细节，并分析解决它们的方案，将使您对整个领域有一个相当清晰的认识。


    异步 HTTP

    您在第 6 章中简要了解了分布式消息传递，同时也认识到了微服务之间同步和异步通信风格的区别。您了解到消息传递是微服务进行异步通信的一流技术，并通过示例看到了如何关联许多异步消息传输，以便将它们编织成单个端到端请求/响应周期的组成部分。然而，第
    8 章中的所有示例都使用 HTTP 协议进行微服务之间的相互通信。在本节中，您将更仔细地审视这些通信的性质。

