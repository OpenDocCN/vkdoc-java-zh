    现在，你最好在 Chrome 浏览器中打开这个 HTML 工具：`ch08\ch08-05\ProductWeb\src\main\resources\product.html`。浏览器客户端在加载时，会向监听在
    8082 端口的 Product Web 发送一个请求，该请求将委托给 Product Server 微服务的任意一个实例。重复刷新浏览器，Product
    Web 微服务对 Product Server 微服务实例的请求将实现负载均衡，你可以通过查看 Product Server 微服务命令窗口中发生的日志来验证这一点。如果你关闭其中一个
    Product Server 微服务并刷新浏览器，你会看到请求将始终发送到另一个正在运行的 Product Server 实例。这是因为你在 RestTemplate
    上使用了 `@LoadBalanced` 注解，该注解用于从 Product Web 微服务向 Product Server 微服务发送请求，如清单 8-18
    所示。如果你重新启动之前关闭的 Product Server 微服务，Ribbon 负载均衡将再次生效，在 Product Web 微服务对 Product
    Server 微服务的两个实例之间交替发送调用。类似地，你也可以通过关闭其中一个 Eureka 微服务来进行测试。Eureka 客户端被设计为能够处理 Eureka
    集群中一个或多个 Eureka 对等节点的故障。由于 Eureka 客户端本地缓存了注册信息，即使所有可用的 Eureka 对等节点都宕机，它们也能相当良好地运行。


    引导你的引导服务器

    现在你应该明白，在基于微服务的企业应用中，每个服务实例都可以向 Eureka 注册中心注册，Eureka 注册中心实例本身也是如此。但有一个例外，那就是 API
    网关，你将在下一节中看到；在此之前，请忽略这个例外。我已经说过，Eureka 注册中心是任何感兴趣的服务消费者的服务目录，因此，如果服务消费者能够通过它想要消费的服务名称找到注册中心，注册中心就会提供如何访问该服务的信息（主机、端口等）。那么关键问题是，任何服务消费者最初是如何访问注册中心的？换句话说，Eureka
    注册中心将帮助任何微服务进行引导并自我宣告。但是，Eureka 注册中心本身如何宣告自己呢？引导服务器如何引导自身？！

    你需要一组标准的、易于识别的 Eureka 服务器地址。一种机制是使用内部 DNS 或类似服务。然而，这种固定的（IP）地址仅在传统的局域网环境中有效。一旦我们谈到在
    AWS 这样的公有云中部署，情况就变了。在像 AWS 这样的云环境中，实例来来去去。这意味着你不能用标准的主机名或 IP 地址来固定 Eureka 服务器。必须使用像
    AWS EC2 弹性 IP 地址这样的机制。弹性 IP 地址是专为动态云计算设计的静态 IPv4 地址。使用弹性 IP 地址，你可以通过快速将地址重新映射到账户中的另一个实例来掩盖微服务的故障。集群中的每个
    Eureka 服务器都需要一个弹性 IP。一旦你用弹性 IP 地址列表配置了 Eureka 服务器，Eureka 服务器就会处理查找未使用的弹性 IP 并在启动时将其绑定到自身的麻烦。

