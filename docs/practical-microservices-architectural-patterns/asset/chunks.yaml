  trans: "\n这里的 `PRODUCT_SERVICE_URL` 指的是独立的微服务。Product Web 微服务需要调用 Product Server\
    \ 微服务。您已经将 Product Server 微服务的方法设为异步。现在，让我们也将 Product Web 微服务的方法设为异步，以便托管这些微服务的所有容器能够通过为运行时模型实现异步特性，更好地利用容器资源。但这还没完；您还需要以异步模式调用\
    \ Product Server 微服务，这样微服务的实现以及微服务间的通信都将采用智能的异步模式！\n\n`org.springframework.web.client.AsyncRestTemplate`\
    \ 是 Spring 用于异步客户端 HTTP 访问的核心类。它公开的方法与 `RestTemplate` 类似；不过，它返回的是 `ListenableFuture`\
    \ 包装器，而不是具体的结果。默认情况下，`AsyncRestTemplate` 依赖标准的 JDK 工具来建立 HTTP 连接。同样，您也可以通过使用接受\
    \ `AsyncClientHttpRequestFactory` 的构造函数，切换到其他 HTTP 库，例如 Apache HttpComponents、Netty\
    \ 或 OkHttp。`AsyncRestTemplate` 为您提供了一个 `ListenableFuture`，因此容器线程不会等待接收响应；相反，由于您使用的是\
    \ `AsyncRestTemplate`，它会继续执行下一步处理。`ListenableFuture` 能够接受完成回调，因此您可以添加失败和成功场景的回调。如果成功，您将结果设置到\
    \ `DeferredResult` 的主体中。由于 Spring MVC 通过空闲的 HTTP 连接保持响应，一旦您将结果设置到 `DeferredResult`，客户端就会收到它。\n\
    \n`product_service.js` 包含了 Angular JS 客户端用于调用 Product Web 微服务的代码；请参见清单 10-10。\n\
    \n```\nApp.factory('ProductService', ['$http', '$q', function($http, $q){\nreturn\
    \ {\ngetApplication: function() {\nreturn $http.get('http://localhost:8081/productsweb/')\n\
    .then(\nfunction(response){\nreturn response.data;\n},\nfunction(errResponse){\n\
    console.error('Error while fetching application');\nreturn $q.reject(errResponse);\n\
    }\n);\n}\n};\n}]);\n清单 10-10\nWeb 客户端调用异步 HTTP (ch10\\ch10-01\\ProductWeb\\src\\\
    main\\resources\\static\\js\\service\\product_service.js)\n```\n\n构建并测试微服务间的异步\
    \ HTTP\n演示微服务间异步 HTTP 所需的完整代码位于文件夹 `ch10\\ch10-01` 中。此示例不需要 MongoDB。您可以按以下顺序构建、打包和运行不同的微服务。\n\
    \n首先启动 Product Server 微服务：\n\n```\ncd ch10\\ch10-01\\ProductServer\nD:\\binil\\\
    gold\\pack03\\ch10\\ch10-01\\ProductServer>make\nD:\\binil\\gold\\pack03\\ch10\\\
    ch10-01\\ProductServer>mvn -Dmaven.test.skip=true clean package\nD:\\binil\\gold\\\
    pack03\\ch10\\ch10-01\\ProductServer>run\nD:\\binil\\gold\\pack03\\ch10\\ch10-01\\\
    ProductServer>java -jar -Dserver.port=8080 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
    ```\n\n请参考附录 D 了解 cURL 和 Postman 的概述。您可以使用这些工具中的任何一种，通过指向 `http://localhost:8080/products/`\
    \ 来测试上述微服务。\n\n接下来，启动 Product Web 微服务：\n\n```\ncd ch10\\ch10-01\\ProductWeb\n\
    D:\\binil\\gold\\pack03\\ch10\\ch10-01\\ProductWeb>make\nD:\\binil\\gold\\pack03\\\
    ch10\\ch10-01\\ProductWeb>mvn -Dmaven.test.skip=true clean package\nD:\\binil\\\
    gold\\pack03\\ch10\\ch10-01\\ProductWeb>run\nD:\\binil\\gold\\pack03\\ch10\\ch10-01\\\
    ProductWeb>java -jar -Dserver.port=8081 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
    ```\n\n您可以再次使用 cURL 或 Postman，通过指向 `http://localhost:8081/productsweb/` 来测试 Product\
