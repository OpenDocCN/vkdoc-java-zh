    cd D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    D:\Applns\apache\Derby\db-derby-10.14.1.0-bin\bin>startNetworkServer

    ```


    This will start the Network Server on port 1527 and echo a few startup messages.
    Further messages will continue to be output to this same window as the Network
    Server processes connection requests. Since the Network Server also starts Derby,
    you''ll find the `derby.log` error log in the directory where you start the Network
    Server.


    To maintain the sanity of the databases, it is always advised to properly shut
    down Network Servers after use. You can do this easily by the following commands:


    ```

    cd D:\Applns\apache\Derby\db-derby-10.14.1.0-bin

    D:\Applns\apache\Derby\db-derby-10.14.1.0-bin\bin>stopNetworkServer

    ```


    ## Create a New Derby Database


    It is always good to create and maintain your actual databases in a directory
    separate from the Derby installation location. In my machine, I created a parent
    directory to hold all my Derby databases:


    ```

    D:\Applns\apache\Derby\derbydb

    ```


    Change your current directory to that folder:


    ```

    cd D:\Applns\apache\Derby\derbydb

    ```


    You may now use the Derby embedded driver to create and connect to the `sampledb`
    database. The Derby `ij` tool can be used to create and then to load a Derby database.
    If you included the `DERBY_HOME/bin` directory in your `PATH` environment variable,
    type:


    ```

    ij

    ```


    If you have not included the `DERBY_HOME/bin` directory in your `PATH` environment
    variable, type:


    ```

    java -jar %DERBY_HOME%\lib\derbyrun.jar ij

    ```


    In my machine, I used the following command:


    ```

    D:\Applns\apache\Derby\derbydb>ij

    ij version 10.14

    ij>

    ```


    You can now create the database named `sampledb` and open a connection to the
    database using the embedded driver using the following command:


    ```

    connect ''jdbc:derby://localhost:1527/D:/Applns/apache/Derby/derbydb/sampledb;create=true'';

    ```


    See Figure [G-2](#477630_1_En_26_Chapter.xhtml#Fig2).


    ![../images/477630_1_En_26_Chapter/477630_1_En_26_Fig2_HTML.jpg](images/477630_1_En_26_Chapter/477630_1_En_26_Fig2_HTML.jpg)


    **Figure G-2** Start Derby Server in Network mode


    The above command prompt will also be connected to the newly created database,
    `sampledb`. You exit from this window using the following command:


    ```

    exit;

    ```


    Once exited, you can then use the Derby embedded driver again to connect back
    to the previously created database via the following code:


    ```

    D:\Applns\apache\Derby\ derbydb>ij

    ij version 10.14

    ij>connect ''jdbc:derby://localhost:1527/D:/Applns/apache/Derby/derbydb/sampledb;create=false'';

    ```


    The following are a handful of helpful commands:


    *   `SHOW CONNECTIONS`: If there are no connections, the `SHOW CONNECTIONS` command
    returns "No connections available." Otherwise, this command displays a list of
    connection names and the URLs used to connect to them. The currently active connection,
    if there is one, will be marked with an ∗ after its name.

    *   `SHOW SCHEMAS` displays all of the schemas in the current connection.

    *   `SHOW TABLES` displays all of the tables in the current schema. If `IN schemaName`
    is specified, the tables in the given schema are displayed.


