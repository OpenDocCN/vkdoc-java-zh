    在了解了整体配置之后，我们再来详细看看基础设施配置，请参考清单 13-9 和清单 13-10。

    你需要将 `LocalContainerEntityManagerFactoryBean` 的 `dataSource` 属性设置为一个 JDBC 数据源，JPA
    持久化提供程序将使用该数据源来访问数据库。此处传入的 DataSource 将作为 `nonJtaDataSource` 用于传递给 PersistenceProvider
    的 PersistenceUnitInfo。请注意，此变体通常也适用于 JTA 事务管理；如果不适用，请考虑改用显式属性 `jtaDataSource`。你可以使用前面解释过的
    `AtomikosDataSourceBean` 来设置此属性。


    接下来，你需要一个服务提供者接口实现，它允许你将特定于供应商的行为插入到 Spring 的 EntityManagerFactory 创建器中。`HibernateJpaVendorAdapter`
    是 Hibernate EntityManager 的一个实现。它支持检测带注解的包以及其他功能。Spring Data 的 JPA 模块包含一个自定义命名空间
    `<jpa:repositories>`，该命名空间允许定义仓库 bean。它还包含某些特定于 JPA 的特性和元素属性。通常，JPA 仓库可以使用 `repositories`
    元素来设置。在此示例中，Spring 被指示扫描 `com.acme.ecom.repository.quote` 及其所有子包，以查找扩展了 `Repository`
    或其子接口的接口。对于找到的每个接口，基础设施会注册特定于持久化技术的 FactoryBean，以创建适当的代理来处理查询方法的调用。每个 bean 都以从接口名称派生的
    bean 名称注册，因此你的 `QuoteRepository` 接口将以 `quoteRepository` 名称注册。`entity-manager-factory-ref`
    属性将有助于显式地将 EntityManagerFactory 与 `repositories` 元素检测到的仓库进行关联。当应用程序中使用多个 EntityManagerFactory
    bean 时，通常会使用此属性。如果未显式配置，Spring 将自动查找在 ApplicationContext 中配置的单个 EntityManagerFactory。


    至此，两个 XA 资源的配置完成。接下来，你必须配置 XA 事务管理器。


    你需要 `org.springframework.transaction.jta.JtaTransactionManager`，它是 `PlatformTransactionManager`
    的一个实现。你需要提供 `javax.transaction.TransactionManager` 和 `javax.transaction.UserTransaction`
    的实现来创建一个 `JtaTransactionManager`。


    `javax.transaction.UserTransaction` 接口为应用程序提供了以编程方式控制事务边界的能力。此接口可由 Java 客户端程序或企业级
    Java Bean 使用。`UserTransaction.begin()` 方法启动一个全局事务，并将该事务与调用线程关联。事务与线程的关联由事务管理器透明地管理。因此，`UserTransaction`
    是面向用户的 API。


    `com.atomikos.icatch.jta.UserTransactionManager` 是 `javax.transaction.TransactionManager`
    的一个简单、零配置的实现。独立的 Java 应用程序可以使用此类的实例来获取事务管理器的句柄，并在首次使用时自动启动或恢复事务服务。`com.atomikos.icatch.jta.UserTransactionImp`
    是 Atomikos 提供的 `javax.transaction.UserTransaction` 实现，你可以将其用于独立的 Java 应用程序。此类同样会在首次使用时自动启动并恢复事务服务。


    `org.springframework.transaction.jta.JtaTransactionManager` 是 JTA 的 PlatformTransactionManager
    实现，它将工作委托给后端 JTA 提供程序。它通常用于委托给 Java EE 服务器的事务协调器，但在你的案例中，你配置的是嵌入在应用程序中的 Atomikos
    JTA 提供程序。

