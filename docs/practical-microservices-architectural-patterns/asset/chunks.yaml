    \ use the script\nnamed `rabbitmq-cluster2.bat`,\nwhich you have already seen.\
    \ To restart rabbit1, use `rabbitmq-cluster1.bat`:\n\n```\nD:\\Applns\\RabbitMQ\\\
    rabbitmq_server-3.6.3\\sbin\\rabbitmq-cluster1.bat\ncall rabbitmqctl -n rabbit1\
    \ stop_app\ncall rabbitmqctl -n rabbit1 join_cluster rabbit2@tiger\ncall rabbitmqctl\
    \ -n rabbit1 start_app\ncall rabbitmqctl -n rabbit2 set_policy ha-all \"^.∗\"\
    \ \"{\"\"ha-mode\"\":\"\"all\"\"}\"\n```\n\nIf you mess up with things while you\
    \ start and restart your clusters, you may want\nto go to the data folder of RabbitMQ\
    \ and delete everything and then\nretry starting and restarting instances and\
    \ clusters in the right\norder.\n\nConnect to a RabbitMQ Cluster from a Client\n\
    \nA client can connect to any single node within a cluster. In the event\nthat\
    \ this node fails and the rest of the cluster survives, then the\nclient should\
    \ notice the closed connection and should explicitly\nreconnect to some surviving\
    \ member of the cluster. I don’t advise baking\nin hostnames or IP addresses into\
    \ client applications, since this is an\ninflexible approach. Instead, the recommended\
    \ approach is to adopt any\nof the below abstractions:\n\n*   Use a dynamic\n\
    \    DNS \n    service which has a very short TTL configuration.\n\n*   Use a\
    \ plain TCP\n    load balancer\n    .\n\n*   Use some sort of mobile IP achieved\
    \ with a pacemaker or similar\n    technology.\n\nRefer to Appendix C where I\
    \ explain how to set up a TCP load balancer\nwith Nginx. If you use such a TCP\
    \ load balancer in between your RabbitMQ\ncluster and the client program, in the\
    \ event that one of the nodes in\nthe cluster fails and the rest of the cluster\
    \ survives, then the client\nneedn't notice the closed connection and will be\
    \ routed to any surviving\nmember of the cluster implicitly.\n\nSummary\nRabbitMQ\
    \ is a reliable and persistent message queue server which can\nbe configured in\
    \ High Availability mode with multiple nodes in a\ncluster. I use RabbitMQ for\
    \ many code demonstrations in this book. In\nsome of the code demonstrations,\
    \ I use RabbitMQ only as a single-node\nserver; however, in all those scenarios\
    \ RabbitMQ can be configured in a\ncluster to test the samples.\n\nInstall, Configure,\
    \ and Run Nginx\nReverse Proxy\n\nNginx is an\nHTTP and reverse proxy server which\
    \ can also play as a mail proxy server\nor as a generic TCP/UDP proxy server.\
    \ Basic HTTP server features include\nserving static and index files. Nginx also\
    \ supports keep-alive and\npipelined connections. TCP/UDP proxy server features\
    \ include generic\nproxying of TCP and UDP as well as load balancing and fault\
    \ tolerance.\nGo to [ `https://nginx.org`\n](https://nginx.org) for more information.\n\
    \nI cover the following in this appendix:\n\n*   How to install and start using\
    \ Nginx\n\n*   How to set up Nginx as an HTTP reverse proxy\n\n*   How to set\
    \ up Nginx as a TCP reverse proxy\n\nInstall Nginx\nIn this section, you will\
    \ download, install, and configure Nginx and\ntest the installation. Nginx is\
    \ available for download at [`https://nginx.org/en/download.html`](https://nginx.org/en/download.html)\
    \ .\n\nSave the installation archive\nfile to a suitable location in your hard\
    \ disk first and then extract the\narchive to a location of your choice. Even\
    \ though you may choose any\nlocation, like\n\n```\nC:\\Program Files\\nginx\\\
    \n```\n\nI explicitly avoid a location with a space in the path, like the space\n\
    in `Program Files`. Hence in my Windows machine, I use the following location:\n\
    \n```\nD:\\Applns\\nginx\\nginx-1.10.1\n```\n\nStart Using Nginx\n\nYou can now\
    \ start Nginx\n Server by using the following command, shown in Figure [C-1](#477630_1_En_22_Chapter.xhtml#Fig1):\n\
    \n![../images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg](images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg)\n\
    \nFigure C-1.\nStart Nginx Server\n\n```\nD:\\Applns\\nginx\\nginx-1.10.1>nginx\n\
    ```\n\nOnce Nginx is started, it can be controlled by invoking the executable\n\
    with the -s parameter, as in\n\n```\nnginx -s flag\n```\n\nwhere `flag` may\n\
    be one of the following:\n\n*   Stop: Forceful shutdown\n\n*   Quit: Graceful\
    \ shutdown\n\n*   Reload: Reload the configuration file\n\n*   Reopen: Reopen\
    \ the log files\n\nStart Using Nginx as Reverse Proxy\nNginx is frequently used\
    \ for setting up as a reverse proxy server.\nWhen set as a reverse proxy server,\
    \ Nginx receives requests, passes them\nto the proxied servers, retrieves responses\
    \ from the proxied servers,\nand sends them back to the clients.\nConfigurations\
    \ in Nginx are effected in the `nginx.conf` file\nlocated in the `conf` path.\n\
    \nConfigure HTTP Reverse Proxy\n\nAn HTTP reverse\nproxy can be set up in Nginx\
    \ to proxy requests with the HTTP\nprotocol. Relevant sections in `nginx.conf`\
    \ for\nsetting up an HTTP proxy are shown in Listing [C-1](#477630_1_En_22_Chapter.xhtml#PC5).\n\
    \n```\nhttp {\nupstream myapp1 {\nserver localhost:8081;\nserver localhost:8082;\n\
    }\nserver {\nlisten       8080;\nserver_name  localhost;\nlocation / {\nproxy_pass\
    \ http://myapp1;\n}\n}\nListing C-1\nNginx HTTP Reverse Proxy Configuration\n\
    ```\n\nNow, an HTTP request similar to URL pattern `http://localhost:8080`\nwill\
    \ be proxied to both of the following URLs in a load-balanced\nfashion:\n\n```\n\
    http://localhost:8081\nhttp://localhost:80802\n```\n\nConfigure TCP Reverse Proxy\n\
    \nA TCP reverse\nproxy can be set up in Nginx to proxy requests with the TCP\n\
    protocol. Relevant sections in `nginx.conf` for\nsetting up a TCP proxy are shown\
    \ in Listing [C-2](#477630_1_En_22_Chapter.xhtml#PC7).\n\n```\nstream {\nupstream\
    \ myapp1 {\nserver localhost:5672;\nserver localhost:5673;\n}\nserver {\nlisten\
    \     5671;\nproxy_pass myapp1;\n}\n}\nListing C-2\nNginx TCP Reverse Proxy Configuration\n\
    ```\n\nSummary\nThe reverse proxy setup of Nginx can be really useful in load\n\
    balancing external requests to microservices. Hence I use Nginx to\ndemonstrate\
    \ many scenarios in this book.\n\ncURL and Postman\n\ncURL  is a\ncommand line\
    \ tool for getting or sending files using the URL syntax.\ncURL supports a range\
    \ of common Internet protocols like HTTP, HTTPS,\nFTP, FTPS, SCP, SFTP, TFTP,\
    \ and LDAP, out of which HTTP is of interest\nfor our discussions in this book.\n\
    Postman is a UI-based app that can be used to carry out all HTTP\nactions in an\
    \ easier manner. I will introduce this app, too.\nThe “Performing Data Operations\
    \ Using Spring Boot and MongoDB”\nsection in Chapter [7](#477630_1_En_7_Chapter.xhtml)\
    \ introduced a sample Spring Boot\napplication. You used Spring Data REST there\
    \ to create implementations\nof the MongoDB repository interface automatically.\
    \ Then Spring Boot\ndirected Spring MVC to create RESTful endpoints at `/products`\
    \ and `/categories`. I will\nassume that this sample is built and is up and running\
    \ so that you can\nperform the basic operations of cURL and Postman using this\
    \ sample.\n\nI will cover the following in this appendix:\n\n*   How to use cURL\
    \ for HTTP operations\n\n*   How to use Postman for HTTP operations\n\ncURL Operations\
    \ for HTTP\n\nBasic cURL operations involve typing `curl` at the command\nline,\
    \ followed by the URL of the output to retrieve. For example, to\nretrieve the\
    \ `microservices.io`\nhomepage, type\n\n```\ncurl www.microservices.io\n```\n\n\
    cURL defaults to displaying the output it retrieves from the URL to\nthe standard\
    \ output specified on the system, normally the terminal\nwindow (in Mac). So running\
    \ the above command will, on most systems,\ndisplay the [ `www.microservices.io`\n\
    ](http://www.microservices.io) source-code web page in the terminal window.\n\n\
    HTTP GET to Retrieve an Entity\n\nYou can use cURL to get a first glimpse of what\
    \ the server's API\nendpoint has to offer by issuing the command shown in Listing\
    \ [D-1](#477630_1_En_23_Chapter.xhtml#PC2) ."
  trans: '

    重启 RabbitMQ 集群

    当整个集群宕机时，最后一个关闭的节点必须成为第一个启动的节点。如果未能如此操作，节点将等待 30 秒，等待最后一个磁盘节点重新上线，之后便会失败。你可以参考
    RabbitMQ 在线文档以获取更多详细信息。


    要重启集群中的某个节点（rabbit2），你可以使用之前见过的名为 `rabbitmq-cluster2.bat` 的脚本。要重启 rabbit1，请使用
    `rabbitmq-cluster1.bat`：


    ```

    D:\Applns\RabbitMQ\rabbitmq_server-3.6.3\sbin\rabbitmq-cluster1.bat

    call rabbitmqctl -n rabbit1 stop_app

    call rabbitmqctl -n rabbit1 join_cluster rabbit2@tiger

    call rabbitmqctl -n rabbit1 start_app

    call rabbitmqctl -n rabbit2 set_policy ha-all "^.∗" "{""ha-mode"":""all""}"

    ```


    如果在启动和重启集群时搞乱了配置，你可能需要前往 RabbitMQ 的数据文件夹，删除所有内容，然后按照正确的顺序重新尝试启动和重启实例及集群。


    从客户端连接到 RabbitMQ 集群


    客户端可以连接到集群内的任意单个节点。如果该节点发生故障而集群其余部分幸免于难，那么客户端应注意到连接已关闭，并应显式地重新连接到集群中某个幸存的成员。我不建议将主机名或
    IP 地址硬编码到客户端应用程序中，因为这是一种不灵活的方法。相反，推荐的方法是采用以下任何一种抽象方式：


    *   使用一个 TTL 配置非常短的动态 DNS 服务。


    *   使用一个普通的 TCP 负载均衡器。


    *   使用某种通过 pacemaker 或类似技术实现的移动 IP。


    请参考附录 C，其中我解释了如何使用 Nginx 设置 TCP 负载均衡器。如果你在 RabbitMQ 集群和客户端程序之间使用了这样的 TCP 负载均衡器，那么当集群中某个节点发生故障而集群其余部分幸免于难时，客户端无需注意到连接已关闭，并且会被隐式地路由到集群中任何幸存的成员。


    总结

    RabbitMQ 是一个可靠且持久的消息队列服务器，可以在集群中配置为具有多个节点的高可用性模式。我在本书的许多代码演示中都使用了 RabbitMQ。在某些代码演示中，我仅将
    RabbitMQ 用作单节点服务器；然而，在所有这些场景中，RabbitMQ 都可以配置在集群中，以测试示例。


    安装、配置和运行 Nginx 反向代理


    Nginx 是一个 HTTP 和反向代理服务器，它也可以充当邮件代理服务器或通用的 TCP/UDP 代理服务器。基本的 HTTP 服务器功能包括提供静态文件和索引文件。Nginx
    还支持 keep-alive 和流水线连接。TCP/UDP 代理服务器功能包括 TCP 和 UDP 的通用代理，以及负载均衡和容错。请访问 [`https://nginx.org`](https://nginx.org)
    获取更多信息。


    我在本附录中涵盖以下内容：


    *   如何安装并开始使用 Nginx


    *   如何将 Nginx 设置为 HTTP 反向代理


    *   如何将 Nginx 设置为 TCP 反向代理


    安装 Nginx

    在本节中，你将下载、安装和配置 Nginx，并测试安装。Nginx 可在 [`https://nginx.org/en/download.html`](https://nginx.org/en/download.html)
    下载。


    先将安装归档文件保存到硬盘上的合适位置，然后将归档文件解压到你选择的位置。尽管你可以选择任何位置，例如


    ```

    C:\Program Files\nginx\

    ```


    但我明确避免使用路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：


    ```

    D:\Applns\nginx\nginx-1.10.1

    ```


    开始使用 Nginx


    你现在可以使用以下命令启动 Nginx 服务器，如图 C-1 所示：


    ![../images/477630_1_En_22_Chapter/477630_1_En_22_Fig1_HTML.jpg](img/477630_1_En_22_Fig1_HTML.jpg)


    图 C-1. 启动 Nginx 服务器


    ```

    D:\Applns\nginx\nginx-1.10.1>nginx

    ```


    一旦 Nginx 启动，可以通过使用 `-s` 参数调用可执行文件来控制它，例如


    ```

    nginx -s flag

    ```


    其中 `flag` 可以是以下之一：


    *   Stop：强制关闭


    *   Quit：优雅关闭


    *   Reload：重新加载配置文件


    *   Reopen：重新打开日志文件


    开始将 Nginx 用作反向代理

    Nginx 经常被用来设置为反向代理服务器。当设置为反向代理服务器时，Nginx 接收请求，将其传递给被代理的服务器，从被代理的服务器检索响应，并将其发送回客户端。

    Nginx 中的配置在位于 `conf` 路径下的 `nginx.conf` 文件中生效。


    配置 HTTP 反向代理


    可以在 Nginx 中设置 HTTP 反向代理，以代理使用 HTTP 协议的请求。用于设置 HTTP 代理的 `nginx.conf` 中的相关部分如清单
    C-1 所示。


    ```

    http {

    upstream myapp1 {

    server localhost:8081;

    server localhost:8082;

    }

    server {

    listen       8080;

    server_name  localhost;

    location / {

    proxy_pass http://myapp1;

    }

    }

    清单 C-1

    Nginx HTTP 反向代理配置

    ```


    现在，类似于 URL 模式 `http://localhost:8080` 的 HTTP 请求将以负载均衡的方式被代理到以下两个 URL：


    ```

    http://localhost:8081

    http://localhost:80802

    ```


    配置 TCP 反向代理


    可以在 Nginx 中设置 TCP 反向代理，以代理使用 TCP 协议的请求。用于设置 TCP 代理的 `nginx.conf` 中的相关部分如清单 C-2
    所示。


    ```

    stream {

    upstream myapp1 {

    server localhost:5672;

    server localhost:5673;

    }

    server {

    listen     5671;

    proxy_pass myapp1;

    }

    }

    清单 C-2

    Nginx TCP 反向代理配置

    ```


    总结

    Nginx 的反向代理设置在将外部请求负载均衡到微服务时非常有用。因此，我在本书中使用 Nginx 来演示许多场景。


    cURL 和 Postman


    cURL 是一个使用 URL 语法获取或发送文件的命令行工具。cURL 支持一系列常见的互联网协议，如 HTTP、HTTPS、FTP、FTPS、SCP、SFTP、TFTP
    和 LDAP，其中 HTTP 是我们在本书中讨论的重点。

    Postman 是一个基于 UI 的应用程序，可以更轻松地执行所有 HTTP 操作。我也会介绍这个应用程序。

    第 7 章中的“使用 Spring Boot 和 MongoDB 执行数据操作”一节介绍了一个示例 Spring Boot 应用程序。你在那里使用了 Spring
    Data REST 来自动创建 MongoDB 仓库接口的实现。然后 Spring Boot 指示 Spring MVC 在 `/products` 和 `/categories`
    处创建 RESTful 端点。我将假设此示例已构建并正在运行，以便你可以使用此示例执行 cURL 和 Postman 的基本操作。


    我将在本附录中涵盖以下内容：


    *   如何将 cURL 用于 HTTP 操作


    *   如何将 Postman 用于 HTTP 操作


    用于 HTTP 的 cURL 操作


    基本的 cURL 操作涉及在命令行输入 `curl`，后跟要检索的输出的 URL。例如，要检索 `microservices.io` 主页，请输入


    ```

    curl www.microservices.io

    ```


    cURL 默认将其从 URL 检索到的输出显示到系统指定的标准输出，通常是终端窗口（在 Mac 上）。因此，在大多数系统上，运行上述命令将在终端窗口中显示
    [`www.microservices.io`](http://www.microservices.io) 的源代码网页。


    HTTP GET 检索实体


    你可以使用 cURL 通过发出清单 D-1 所示的命令来初步了解服务器 API 端点提供的内容。

    '
