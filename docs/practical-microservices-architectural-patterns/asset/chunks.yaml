    \ to checkout order” button.\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig26_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig26_HTML.jpg)\n\
    \n**Figure 17-26** Confirm to create a new order\n\nIf the order creation is successful,\
    \ it will be displayed in the next window, as shown in Figure [17-27](#477630_1_En_17_Chapter.xhtml#Fig27).\n\
