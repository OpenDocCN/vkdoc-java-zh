- fmt: '- 两阶段提交事务与本地事务相比，与资源的往返次数大约多出两倍，因此通信开销较大。

    - 资源锁的持有时间稍长，在某些情况下可能会影响可扩展性。

    - 最后但同样重要的是，两阶段提交事务并不能解决所有问题。当出现问题时（例如，想要从崩溃中恢复数据库），您可能仍然需要手动干预。为了避免这种情况，更倾向于采用一种热故障转移架构。


    您需要根据具体情况，在两阶段事务和本地事务之间做出明智的选择。对于您未来开发的许多微服务架构来说，情况都将如此。为了使场景更具体，假设图[14-7](#477630_1_En_14_Chapter.xhtml#Fig7)中所示的架构选项1比选项2更可接受。如果是这样，那么在需要时，如何进一步避免报价结算微服务与`ActiveMQ`消息代理之间的两阶段事务，同时仍然保证数据的完整性？让我们在下一节中打开这个潘多拉魔盒。


    ## 消息队列、Peek 与客户端确认


    假设您希望采用图[14-7](#477630_1_En_14_Chapter.xhtml#Fig7)中所示的架构选项1，并且仍然希望避免报价结算微服务与`ActiveMQ`消息代理之间的两阶段提交事务。当您避免使用两阶段提交事务时，如果数据库操作和消息队列操作由分区资源支持，则它们无法原子性地执行。如果它们无法原子性地执行，您就不希望自动封装从队列中读取消息和确认读取消息的操作；相反，客户端程序或客户端代码应该控制这些操作。`JMS`规范支持两种消息传递类型：持久性和非持久性。如果您希望消息在传递给代理后始终可供消息消费者使用（即使该消费者在消息发送时未运行），则应使用持久性消息。当消息被消费者消费并确认后，它通常会从代理的消息存储中删除。


    `Javax.jms.Session`可以被指定为事务性的。当事务性时，会话支持单一的事务序列。每个事务将一组消息发送和一组消息接收分组为一个原子工作单元。实际上，事务将会话的输入消息流和输出消息流组织成一系列原子单元。当提交事务时，其原子输入单元被确认，其关联的原子输出单元被发送。如果执行了事务回滚，则事务的已发送消息将被销毁，并且会话的输入将自动恢复。


    > **注意**

    > 与`XA`事务不同，`JMS`事务仅涉及单个连接的`JMS`消息。回滚或提交不会扩展到单个连接之外。


    在当前章节和第[13](#477630_1_En_13_Chapter.xhtml)章的示例中，您使用了以下配置：


    或者，可以将`SESSION_TRANSACTED`值作为参数传递给`Connection`对象上的`createSession(int sessionMode)`方法，以指定会话应使用本地事务。使用时，它会通过`Session.commit()`汇总确认信息。


    ```java

    Session session = connection.createSession(true, Session.SESSION_TRANSACTED);

    ```


    通过指定`false`和`AUTO_ACKNOWLEDGE`，您可以创建一个非事务性会话，并且会话会自动确认消息。当消息从`receive()`方法或`onMessage()`方法成功返回时，消息会被自动确认。如果在执行`receive()`方法或`onMessage()`方法时发生故障，消息会自动重新投递。`JMS`提供者管理消息重新投递，并保证一次性投递语义。但是，如果应用程序在`receive()`返回之后、消息被处理之前崩溃，消息仍然可能丢失。


    ```java

    Session session = connection.createSession(false, Session.AUTO_ACKNOWLEDGE);

    ```


    如果您创建接收者的会话，并将`false`指定为`createSession()`的第一个参数，将`Session.CLIENT_ACKNOWLEDGE`指定为其第二个参数，则您将以客户端确认模式创建会话。这会创建一个非事务性会话，并且需要显式调用`Message`类的`acknowledge()`方法来确认消息。通过在已消费的消息上调用`acknowledge()`，客户端会确认该会话（即投递该消息的会话）所消费的所有消息。客户端可以在消费每条消息时单独确认，也可以选择以应用程序定义的组来确认消息（通过调用组中最后接收到的消息的`acknowledge()`方法，从而确认会话消费的所有消息）。已接收但未确认的消息可能会被重新投递，这就是一把双刃剑：既是福音也是诅咒。说它是福音，是因为如果未确认，您可以确保消息会在稍后的某个时间点被重新投递。同时，它也是诅咒，因为如果您的应用程序设计没有处理重复消息的机制，它将导致重复处理，从而产生不利影响。


    让我们进一步探讨这个方面。参见清单[14-16](#477630_1_En_14_Chapter.xhtml#PC52)。


    ```

    开始 2-Phase 事务

    开始 ActiveMQ 事务-01

    从 ActiveMQ 读取消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    结束 ActiveMQ 事务-01

    结束 2-Phase 事务

    清单 14-16

    ActiveMQ 和 Derby 在 Two-Phase Tx 内

    ```


    您在本章前一个示例的下游处理中看到的从`ActiveMQ`队列消费消息以及在`Derby`数据库中的数据库操作，可以像清单[14-16](#477630_1_En_14_Chapter.xhtml#PC52)那样用伪代码表示。如果您移除两阶段事务，同样的操作可以重写为清单[14-17](#477630_1_En_14_Chapter.xhtml#PC53)。


    ```

    从 ActiveMQ 读取消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    确认从 ActiveMQ 读取的消息

    清单 14-17

    ActiveMQ 和 Derby 无 Two-Phase Tx

    ```


    这等同于清单[14-18](#477630_1_En_14_Chapter.xhtml#PC54)。


    ```

    从 ActiveMQ Peek 消息

    开始 Derby 事务-01

    在 Derby 中记录收到的报价

    结束 Derby 事务-01

    开始 Derby 事务-02

    在 Derby 中协调用户余额

    更改报价状态

    结束 Derby 事务-02

    从 ActiveMQ 移除消息

    清单 14-18

    ActiveMQ 和 Derby 使用 Local Tx

    ```'
  raw: "*   Two-phase commit transactions are chatty in the order of two\n    times\
    \ the number of roundtrips to the resource compared to local\n    transactions.\n\
    \n*   Resource locks last a bit longer, which can impede scalability in\n    some\
    \ cases.\n\n*   Last but not least, two-phase commit transaction can’t solve\n\
    \    every problem. You may still need manual intervention when something\n  \
    \  goes wrong, like when you want to bring back a database from a crash. To\n\
    \    avoid this, a form of hot failover architecture is preferred.\n\nYou need\
    \ to judiciously select between two-phase and local\ntransactions on a case-by-case\
    \ basis, and this will be the case for many\nof the microservice architectures\
    \ you develop in future. To make the\nscenario more specific, assume that\nArchitecture\
    \ Option 1 shown in Figure [14-7](#477630_1_En_14_Chapter.xhtml#Fig7) is more\n\
    acceptable than Option 2\\. If so, if there is a need, how can you further\navoid\
    \ two-phase transactions between the Quote Settlement microservice\nand the ActiveMQ\
    \ message broker and still take care of integrity of\ndata? Let’s open this Pandora’s\
    \ box in the next section.\n\nMessage Queues, Peek, and Client Acknowledge\nSuppose\
    \ that you want to adopt the Architecture Option 1 shown in\nFigure [14-7](#477630_1_En_14_Chapter.xhtml#Fig7)\
    \ and still want\nto avoid two-phase commit transactions between the Quote Settlement\n\
    microservice and the ActiveMQ message broker. When you avoid two-phase\ncommit\
    \ transactions, if the database operations and the message queue\noperations are\
    \ backed up by partitioned resources, they can’t be\neffected atomically. If they\
    \ cannot be effected atomically, you don’t\nwant to encapsulate the read and read-acknowledgement\
    \ of messages from\nthe queue to happen automatically; rather, the client program\
    \ or the\nclient code should control that. The JMS specification supports two\n\
    types of message delivery: persistent and non-persistent. Persistent\nmessages\
    \ should be used if you want messages to always be available to a\nmessage consumer\
    \ after they’ve been delivered to the broker, even if\nthat consumer isn’t running\
    \ when the message was sent. When a message is\nconsumed and acknowledged by a\
    \ message consumer, it’s typically deleted\nfrom the broker’s message store.\n\
    Javax.jms.Session may be specified as transacted. When transacted,\nsession supports\
    \ a single series of transactions. Each\ntransaction groups a set of message sends\
    \ and a set of message receives\ninto an atomic unit of work. In effect, transactions\
    \ organize a\nsession’s input message stream and output message stream into series\
    \ of\natomic units. When a transaction commits, its atomic unit of input is\n\
    acknowledged and its associated atomic unit of output is sent. If a\ntransaction\
    \ rollback is done, the transaction’s sent messages are\ndestroyed and the session’s\
    \ input is automatically recovered.\n\nNote\nUnlike XA transactions, JMS transactions\
    \ concern only on the JMS\nmessages of a single connection. A rollback or commit\
    \ does not extend\nbeyond a single connection.\n\nIn the examples in the current\
    \ chapter and in Chapter [13](#477630_1_En_13_Chapter.xhtml), you use the following\n\
    configuration:\n\nAlternatively, the SESSION_TRANSACTED value may be passed as\n\
    the argument to the method `createSession(int sessionMode)` on the `Connection`\
    \ object to\nspecify that the session should use a local transaction. When used,\
    \ it\nrolls up acknowledgments with `Session.commit()`.\n\n```\nSession session\
    \ = connection.createSession(true, Session.SESSION_TRANSACTED);\n```\n\nBy specifying\
    \ false and\nAUTO_ACKNOWLEDGE, you can create a nontransacted session and the\
    \ session\nautomatically acknowledges messages. A message is\nautomatically acknowledged\
    \ when it successfully returns from the `receive()` method or\nthe `onMessage()`\n\
    method. If a failure occurs while executing the `receive()` method or\nthe `onMessage()`\n\
    method, the message is automatically redelivered. The JMS provider\nmanages message\
    \ redelivery and guarantees once-only delivery semantics.\nHowever, messages can\
    \ still be lost if the application crashes right\nafter `receive()`\nreturns and\
    \ before the message can be processed.\n\n```\nSession session = connection.createSession(false,\
    \ Session.AUTO_ACKNOWLEDGE);\n```\n\nIf you create the receiver’s session and\
    \ specify false as `createSession()`’s\nfirst argument and Session.CLIENT_ACKNOWLEDGE\
    \ as its second argument, you create\nthe Session in the client acknowledgement\
    \ mode. This creates a\nnontransacted session and invoking the `Message` class’s\
    \ `acknowledge()` method\nexplicitly is required to acknowledge the messages.\
    \ By invoking `acknowledge()` on a\nconsumed message, a client acknowledges all\
    \ messages consumed by the\nsession that the message was delivered to. A client\
    \ may individually\nacknowledge each message as it is consumed, or it may choose\
    \ to\nacknowledge messages as an application-defined group (which is done by\n\
    calling `acknowledge()` on the\nlast received message of the group,\nthereby acknowledging\
    \ all messages consumed by the session). And\nmessages that have been received\
    \ but not acknowledged may be\nredelivered, and this is that double-edged sword:\
    \ it’s a blessing as\nwell as a curse. A blessing in the sense that, if not acknowledged,\
    \ you\ncan be sure that messages will be redelivered at some later time. At the\n\
    same time, it’s a curse because if your application design doesn’t have\nthe mechanisms\
    \ to deal with duplicate messages, it will cause duplicate\nprocessing, which\
    \ will have adverse effects.\n\nLet’s look more into this aspect. See Listing\
    \ [14-16](#477630_1_En_14_Chapter.xhtml#PC52).\n\n```\nStart 2-Phase Transaction\n\
    Start ActiveMQ Transaction-01\nRead Message from ActiveMQ\nStart Derby Transaction-01\n\
    Record Quote Received in Derby\nEnd Derby Transaction-01\nStart Derby Transaction-02\n\
    Reconcile User Balances in Derby\nChange Quote Status\nEnd Derby Transaction-02\n\
    End ActiveMQ Transaction-01\nEnd 2-Phase Transaction\nListing 14-16\nActiveMQ\
    \ and Derby Within Two-Phase Tx\n```\n\nThe message consumption from the ActiveMQ\
    \ queue and the database\noperations in the Derby database you saw in the downstream\
    \ processing in\nthe previous example in this chapter can be pseudo coded as shown\
    \ in\nListing [14-16](#477630_1_En_14_Chapter.xhtml#PC52). If you\nremove the\
    \ two-phase transactions, the same can be rewritten as Listing\n[14-17](#477630_1_En_14_Chapter.xhtml#PC53).\n\
    \n```\nRead Message from ActiveMQ\nStart Derby Transaction-01\nRecord Quote Received\
    \ in Derby\nEnd Derby Transaction-01\nStart Derby Transaction-02\nReconcile User\
    \ Balances in Derby\nChange Quote Status\nEnd Derby Transaction-02\nAcknowledge\
    \ Message Read from ActiveMQ\nListing 14-17\nActiveMQ and Derby Without Two-Phase\
    \ Tx\n```\n\nThis is equivalent to Listing [14-18](#477630_1_En_14_Chapter.xhtml#PC54).\n\
    \n```\nPeek Message from ActiveMQ\nStart Derby Transaction-01\nRecord Quote Received\
    \ in Derby\nEnd Derby Transaction-01\nStart Derby Transaction-02\nReconcile User\
    \ Balances in Derby\nChange Quote Status\nEnd Derby Transaction-02\nRemove Message\
    \ from ActiveMQ\nListing 14-18\nActiveMQ and Derby with Local Tx\n```"
