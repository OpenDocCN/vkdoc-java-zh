    \ RabbitMQ 集群。本节假设你已经拥有一个至少包含两个节点的、正在运行的 RabbitMQ 集群。此外，你还需要参考附录 C，按照逐步说明使用 Nginx\
    \ 设置一个 TCP 负载均衡器，以便当多节点集群中的其他节点宕机时，来自消费者和生产者的流量（更确切地说是连接）可以被多路复用到至少一个活跃节点上。\n\n\
    本节之所以如此重要，是因为在基于消息基础设施的微服务环境中，消息基础设施本身的高可用性将决定整个基础设施的可靠性。你已经看到，在企业级生产环境中，微服务实例可以以任意顺序或任意速度启动（实例化、重启等）和停止（优雅关闭、崩溃、重启、强制终止等）。每个微服务实例都通过发送消息，经由消息基础设施或基于事件的基础设施与其他实例通信。因此，当一个微服务实例成功向消息基础设施发送消息时，它假定该消息会“最终”按预期到达接收方。消息基础设施的高可用性必须兑现这一承诺。\n\
    \n假设你拥有一个处于高可用模式的多节点 RabbitMQ 集群，并且还有一个 TCP 负载均衡器（配置为 TCP 反向代理的 Nginx），那么你就可以进行一些小型测试，以验证你的\
