- fmt: "`PRODUCT_SERVICE_URL` here refers to the independent microservice. The Product\
    \ Web microservice has to invoke the Product Server microservice. You have already\
    \ made the Product Server microservice methods asynchronous. Let’s now make the\
    \ Product Web microservice method asynchronous too so that all the containers\
    \ hosting these microservices can better utilize container resources by implementing\
    \ asynchronous characteristics to the runtime model. You are not done; you want\
    \ to invoke the Product Server microservice too in an asynchronous mode so that\
    \ both the microservice implementations as well as the intermicroservices communications\
    \ are in smart, asynchronous mode!\n\n`org.springframework.web.client.AsyncRestTemplate`\
    \ is Spring’s central class for asynchronous client-side HTTP access. It exposes\
    \ methods similar to those of `RestTemplate`; however, it returns `ListenableFuture`\
    \ wrappers as opposed to concrete results. By default, `AsyncRestTemplate` relies\
    \ on standard JDK facilities to establish HTTP connections. Here again you can\
    \ switch to a different HTTP library such as Apache HttpComponents, Netty, or\
    \ OkHttp by using a constructor accepting an `AsyncClientHttpRequestFactory`.\
    \ The `AsyncRestTemplate` gives you a `ListenableFuture`, so the container thread\
    \ will not wait for the response to be received back; instead it will continue\
    \ with the next steps of processing since you are using `AsyncRestTemplate`. `ListenableFuture`\
    \ has the capability to accept completion callbacks, so you add callbacks on failure\
    \ and success scenarios. If success, you set the result to the body of the `DeferredResult`.\
    \ Since the Spring MVC is holding on to the response through the idle HTTP connection,\
    \ as soon as you set the result to the `DeferredResult`, the client will receive\
    \ it.\n\n`product_service.js` has the code that the Angular JS client will use\
    \ to invoke the Product Web microservice; see Listing [10-10](#477630_1_En_10_Chapter.xhtml#PC10).\n\
    \n```\nApp.factory('ProductService', ['$http', '$q', function($http, $q){\nreturn\
    \ {\ngetApplication: function() {\nreturn $http.get('http://localhost:8081/productsweb/')\n\
    .then(\nfunction(response){\nreturn response.data;\n},\nfunction(errResponse){\n\
    console.error('Error while fetching application');\nreturn $q.reject(errResponse);\n\
    }\n);\n}\n};\n}]);\nListing 10-10\nWeb Client Invoking Async HTTP (ch10\\ch10-01\\\
    ProductWeb\\src\\main\\resources\\static\\js\\service\\product_service.js)\n```\n\
    \n## Build and Test Asynchronous HTTP Between Microservices\n\nThe complete code\
