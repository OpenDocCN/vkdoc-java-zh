- fmt: '# 乐观锁与悲观锁


    ## 乐观锁


    **乐观锁**采取一种务实的方法，鼓励客户端保持“乐观”，认为数据在使用过程中不会发生变化，并允许它们同时访问相同的数据。如果任何特定客户端的事务想要更新，当且仅当最初提供给客户端的数据与数据库中当前数据相同时，更新才会被提交。这种方法对于热点数据不太理想，因为比较操作会频繁失败。


    ## 悲观锁


    **悲观锁**可能使用信号量^([(31)](#fn31))或之前讨论过的任何事务机制。对于每次读取，你需要一个读锁；对于每次写入，你需要一个写锁。读锁不是排他性的，而写锁是排他性的。当你执行类似以下查询时，可能会获得一个典型的读锁：


    ```sql

    SELECT ∗ FROM QUOTES_TABLE WHERE QUOTES_ID=5 FOR UPDATE;

    ```


    两种锁都只在数据使用完成后才会释放。只要没有其他事务持有写锁，就可以将读锁授予请求的事务。对于要更新的事务，它需要写锁；在该事务持有写锁期间，当且仅当其他事务不需要读锁时，才允许它们读取数据。此外，如果一个事务持有写锁，它将不允许其他事务读取其正在更改的数据，直到这些更改被提交。


    # 企业事务类别


    事务根据我们使用它们的上下文具有不同的含义。它可能是在单体系统内多个操作的上下文中，也可能是在多个单体或多个微服务的上下文中，或者是在具有共同（或冲突）利益的多个企业的上下文中。你将在此上下文中简要了解不同的事务类别。


    ## ACID 事务


    **ACID 事务**与原子事务相关，其中多个步骤或操作被执行，意图是它们要么全部成功，要么由于一个或多个步骤的失败而全部回滚到之前的状态。本章前面章节的大部分讨论都涉及
    ACID 事务，因此已经做了足够的解释。现在你将了解 ACID 事务处理（TP）系统的架构。图 [13-2](#477630_1_En_13_Chapter.xhtml#Fig2)
    描绘了一个由多个资源管理器组成的典型架构。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg)


    **图 13-2** 具有多个资源的分布式 ACID 事务


    ## BASE = 切片的 ACID


    ACID 是唯一能够保证数据一致性的风格。然而，如果分布式系统使用 ACID 事务，那么所有地方都必须以锁步模式进行。这要求所有组件都可用，并且还会增加数据的锁定时间。BASE
    是一种架构风格，它通过将（整体的、理想的）ACID 事务切割成更小的片段（每个片段本身仍然是 ACID）来放宽这些要求。


    消息传递用于使更改在整个系统中传播，其中每个更改理想情况下由一个 ACID 事务处理。这些消息是异步的而非同步的，这意味着在 BASE 系统中，第一个和最后一个
    ACID 事务之间存在延迟。


    这就是为什么这种风格表现出“最终一致性”：必须等待所有消息在系统中传播并在适当的地方被应用。第 [11](#477630_1_En_11_Chapter.xhtml)
    章的“微服务的最终一致性”部分对此进行了详细讨论。我现在将通过逐步切割 ACID 事务范围来逐步介绍 BASE。


    ### BASE 事务


    图 [13-3](#477630_1_En_13_Chapter.xhtml#Fig3) 展示了一个包含四个不同微服务的 BASE 架构。每个微服务仍然具有
    ACID 属性（独立于系统中的其他微服务）。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg)


    **图 13-3** BASE 架构，其中每个微服务通过 XA 事务仍然具有 ACID 保证


    这是一个以 BASE 风格发送或接收 ACID 风格消息的微服务生态系统架构。你将在后面的章节（“分布式事务示例”部分下的“设计示例场景”小节）中了解每个微服务的功能；不过，目前请关注这里描述的技术组件。之所以称为
    BASE，是因为通过 `ActiveMQ`，你不知道也不关心消息的去向或来源；报价处理和报价结算之间看到的只是队列（而经典的 ACID 架构会为报价结算和报价处理创建一个大的
    ACID 事务）。你使用 `JTA/XA` 来确保消息被精确处理一次，因为你不想丢失消息（或得到重复消息）。从队列接收的消息保证能够到达数据库，即使发生中间崩溃也是如此。发送的消息保证其领域对象状态在数据库中得到更新，即使发生中间崩溃也是如此。


    对于需要强数据一致性保证的系统，这是一个很好的解决方案。在其他系统中，强数据一致性并非那么重要，你可以进一步放宽要求——通过在 BASE 架构中使用更细粒度的
    ACID 事务范围。


    当你过渡到微服务时，你希望避免系统范围的分布式事务。然而，与单体场景相比，你的实际数据分布得更广，因此对分布式事务的需求非常真实。正是在这种背景下，我们讨论的是最终一致性而非即时一致性。第
    [11](#477630_1_En_11_Chapter.xhtml) 章的“微服务的最终一致性”部分对此进行了详细讨论。


    ### 宽松的 BASE 事务


    在某些情况下，你不太关心消息丢失或重复，并且你的 ACID 事务范围可以限制在单个资源管理器内，例如仅限纯本地事务。这提供了更高的性能，但也有代价：到目前为止，BASE
    系统具有最终一致性，但这种架构默认不再保证这一点。


    正如将在下一章中展示的那样，为了获得一定水平的一致性，应用程序开发人员需要做更多的工作；在某些情况下，最终一致性甚至可能无法实现，尤其是在消息丢失的情况下。


    图 [13-4](#477630_1_En_13_Chapter.xhtml#Fig4) 展示了一个在宽松 BASE 事务中由多个资源管理器组成的典型架构。


