- fmt: '# Protocol Buffer, XML, and JSON Encoding in Microservices


    The sample demonstration in the previous section explained how to use `Protocol
    Buffer` for intermicroservices communications. You can observe the `TCPMon Proxy`
    console where you should be able to validate that the communication between the
    two microservices uses `Protocol Buffer`. It will also say that the response content
    length is 265 (which is representative). See Figure [10-5](#477630_1_En_10_Chapter.xhtml#Fig5).


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig5_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5** Inspect the `Protocol Buffer` encoding using `TCPMon`


    ## XML Encoding


    You can use Chrome and hit the `TCPMon Proxy` directly so that the client doesn’t
    explicitly ask for `Protocol Buffer` during content negotiation using the URL
    `http://localhost:8081/products/`. This will show the response in XML format;
    see Figure [10-6](#477630_1_En_10_Chapter.xhtml#Fig6).


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig6_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig6_HTML.jpg)


    **Figure 10-6** Inspect the XML encoding using `TCPMon`


    You can examine the content size using any tool (I use Microsoft Word in Figure
    [10-7](#477630_1_En_10_Chapter.xhtml#Fig7)).


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig7_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig7_HTML.jpg)


    **Figure 10-7** Content length while encoding using XML


    ## JSON Encoding


    One easy method to force JSON encoding between the microservices call is to slightly
    change the application code in the `Product Server` microservice. See Listing
    [10-22](#477630_1_En_10_Chapter.xhtml#PC32).


    ```java

    @RequestMapping(value = "/products", method = RequestMethod.GET,

    produces = {MediaType.APPLICATION_JSON_VALUE})

    //@RequestMapping(value = "/products", method = RequestMethod.GET)

    public  Products getAllProducts() {

    List products = getAllTheProducts();

    Products productsParent =     Products.newBuilder().addAllProduct(products).build();

    return productsParent;

    }

    ```


    **Listing 10-22** Enforce JSON Encoding (`ch10\ch10-02\ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java`)


    You can now rebuild and restart the `Product Server` microservice and rerun the
    client application by going to `http://localhost:8082/`.


    If you inspect the `TCPMon Proxy` console, you should be able to see that JSON
    encoding is opted in this case, as shown in Figure [10-8](#477630_1_En_10_Chapter.xhtml#Fig8).


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig8_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig8_HTML.jpg)


    **Figure 10-8** Inspect JSON encoding using `TCPMon`


    You can again examine the content size using any tool (see Figure [10-9](#477630_1_En_10_Chapter.xhtml#Fig9)).


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig9_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig9_HTML.jpg)


    **Figure 10-9** Content length while encoding using JSON


    You can now compare these three scenarios and get an idea of the variation in
    the size of the response while using `Protocol Buffer` for communication between
    microservices.


    ## Summary


    Microservices are like double-edged swords: they provide extra leverage but should
    be used with care. This is mainly due to the Inversion of Architecture discussed
    in Chapter [4](#477630_1_En_4_Chapter.xhtml). You learned two refactoring processes
    you can bring to your microservices architecture to influence the performance
    to a greater extent. There are more optimizations; however, I will limit them
    to the two discussed in this chapter. A major chunk of the rest of the book will
    talk about event-based microservices where the asynchronous nature of intermicroservices
    communications is leveraged by default using messaging instead of HTTP. You’ll
    start getting into those aspects in the next chapter.


    # 11. Events, Eventuality, and Consistency


    A handshake with one of your colleagues provides you back the same feeling of
    the handshake, instantaneously. Similar is the case of a hug or a kiss with your
    partner—you also receive the same back, instantaneously (assuming your partner’s
    mood doesn’t invite a slap as response!). What if your partner in any of the above
    described contexts is not near you but you still want to pass similar greetings
    to him or her? You can send an email or a message through any kind of digital
    media available today. Your partner will (sooner or later) receive your message
    and will be able to respond to you. The end effect is that, even though your partner
    is not nearby or even listening to you at the exact time you initiate your gesture,
    you will sooner or later get the response gesture back. These scenarios and gestures
    are typical of a microservices application too. Once you have split your application
    into microservices based on domain boundaries, which can be deployed, brought
    up, and operated on their own, independent of other microservices, it also means
    that those microservices should have the capability to continue providing functionality
    irrespective of their counterpart microservices. This is where the importance
    of event-driven architecture (EDA) must be discussed. You will look into EDA in
    general plus a selected few concerns in this chapter. At the end, you will be
    in a position to appreciate events and EDA, and you’ll be better equipped to decide
    whether you want asynchronous events or synchronous request/response-style interactions
    between microservices.


    You will learn the following in this chapter:


    * Introduction to EDA

    * Different styles of EDA

    * Relevance of EDA in the evolution of a microservices architecture

    * The role of EDA in making different microservices eventually consistent

    * The Scale Cube and the need for partitioning computational activity

    * The CAP Theorem and the CAP Pyramid

    * BASE transactions


    ## Event-Driven Architecture


    Event-driven architecture is a software architecture pattern promoting the production,
    detection, consumption, and reaction to events. An event-driven system typically
    consists of event emitters (or agents), event consumers (or sinks), and event
    channels through which the events propagate. Let’s look into these components
    in detail.


    ### Events


    An event is an occurrence or a happening within a particular system or domain;
    it is something that has occurred or is contemplated as having occurred in that
    domain. An event can be defined as a change in state. For example, when an order
    is shipped, the order’s state changes from "pending" to "shipped." An e-commerce
    microservices architecture may treat this state change as an event whose occurrence
    can be made known to other microservices within the architecture or for that matter
    even to other components outside the microservices boundary. From a formal perspective,
    what is produced, published, propagated, detected, or consumed is a (typically
    asynchronous) message called the event notification, and not the event itself.
    If so, the event is the state change that triggered the message emission. Events
    do not travel; they just occur. However, the terms "event" and "event notifications"
    are often used interchangeably to denote the notification message itself.'
