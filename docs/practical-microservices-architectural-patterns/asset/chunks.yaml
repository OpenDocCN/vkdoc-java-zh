    \ like line items and a delivery address. In order to\nkeep the full aggregate\
    \ in a consistent state, changing the address of\nthis order should be done via\
    \ the order aggregate, not by directly\naccessing the address entity.\nThe SimpleCommandBus\
    \ maintains the notion of a unit of work (UoW) for\neach command published. Since\
    \ all command processing is done in the same\nthread, this implementation is limited\
    \ to a single JVM’s boundaries.\nA unit of work\nis a set of modifications to\
    \ be made to aggregates. Execution of a\ncommand typically happens within the\
    \ scope of a unit of work. When a\ncommand handler finishes execution, the UoW\
    \ is committed and all actions\nare finalized. This means that any repositories\
    \ are notified of state\nchanges in their aggregates and events scheduled for\
    \ publication are\nsent to the event\nbus . This\nis a convenient grouping that\
    \ will help to prevent individual events\nfrom being published before a number\
    \ of aggregates have been processed.\nIn the back, it allows repositories to manage\
    \ resources, such as locks,\nover an entire transaction. Locks, for example,\n\
    will only be released when the unit of work is either committed or\nrolled back.\n\
    A unit of work is not a replacement for traditional ACID-style\ntransactions.\
    \ It is merely a buffer where changes are grouped and\nstaged. When a unit of\
    \ work is committed, all staged changes are only\ncommitted; however, this commit\
    \ is not atomic. That means if a commit\nfails, a few changes might have already\
    \ been persisted, while others\nnot. So Axon best practices dictate that a command\
    \ should always\ncontaining one action. If you have more actions in your unit\
    \ of work,\nthen you should consider attaching a transaction to the unit of work’s\n\
    commit, for which you can refer to the Axon documentation.\nThe SimpleEventBus,\
    \ as the\nname suggests, is a very basic implementation of the EventBus interface\n\
    and is a mechanism used to dispatch events to the subscribed event\nlisteners.\
    \ It is good when the event dispatching is done synchronously\nand locally (i.e.\
    \ in a single JVM). It manages subscribed EventListeners\nand forwards all incoming\
    \ events to all subscribed listeners.\nEventListeners must be explicitly registered\
    \ with the event bus in order\nfor them to receive events. The registration process\
    \ is thread safe and\nlisteners may register and unregister for events at any\
    \ time. If an\nEventListener throws an exception, the event dispatching stops\
    \ and the\nexception is propagated to the component publishing the event.\n\n\
    AnnotationCommandHandlerBeanPostProcessor will automatically register\nclasses\
    \ containing command handler methods (i.e. methods annotated with\nthe `@CommandHandler`\n\
    annotation) with a command bus.\n\n*   This bean post processor will scan the\
    \ application context for\n    all beans with an `@CommandHandler`\n    annotated\
    \ method.\n\n*   All such command handlers will be automatically recognized and\n\
    \    subscribed to the command bus.\n\nAnnotationEventListenerBeanPostProcessor\
    \ will automatically register\nclasses containing event handler methods (i.e.\
    \ methods annotated with\nthe `@EventHandler`\nannotation) in your application\
    \ context and automatically connect them\nto the event bus.\n\n*   This bean post\
    \ processor will scan the application context for\n    all the beans with an `@EventHandler`\n\
    \    annotated method.\n\n*   All such event listener will be automatically recognized\
    \ and\n    subscribed to the event bus.\n\nThe command gateway is a convenient\
    \ interface for the command\ndispatching mechanism. Usage of a gateway to dispatch\
    \ commands is\noptional; however, it is generally the easiest option to do so.\
    \ CommandGateway is the\ninterface and DefaultCommandGateway\nis the default implementation\
    \ provided by Axon. The gateway\nprovides a number of methods that allow you to\
    \ send a command and wait\nfor a result either synchronously, with a timeout,\
    \ or\nasynchronously.\n\nThe GenericJpaRepository is a repository implementation\
    \ that can store\naggregates that are JPA compatible. It is configured with an\n\
    EntityManager that manages the actual persistence and classes specifying\nthe\
    \ actual type of aggregate stored in the repository, `Product` and `Order` in\
    \ your case.\nAll the JPA-annotated aggregates must implement the AggregateRoot\
    \ and\nhave the proper JPA annotations. The repository may be configured with\
    \ a\nlocking scheme. The repository will always force optimistic locking in\n\
    the backing persistent store. An optional lock can be configured for the\nrepository,\
    \ in which case it will be in addition to this optimistic\nlock. Locks on one\
    \ repository instance will not be shared with other\nrepository instances. When\
    \ this repository is requested to persist\nchanges to an aggregate, it will also\
    \ flush the EntityManager, during\nwhich it will enforce checking of database\
    \ constraints and optimistic\nlocks. Let’s look at your AggregateRoot entities\
    \ now; see\nListing [12-4](#477630_1_En_12_Chapter.xhtml#PC4).\n\n```\nimport\
    \ org.axonframework.domain.AbstractAggregateRoot;\n@Entity\n@Table(name=\"ECOM_ORDER\"\
    )\n@Data\n@EqualsAndHashCode(exclude = { \"id\" })\npublic class Order extends\
