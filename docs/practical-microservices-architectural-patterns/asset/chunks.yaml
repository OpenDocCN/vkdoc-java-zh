    we can also use the asynchronous style of communication between modules, and the
    same can be done between microservices too. This gives us flexibility by reducing
    dependency and by breaking the request-response cycle so that we can address problems
    like what to do when the called microservice doesn’t exist or is not responding.
    An appropriate message queue between microservices can help to achieve this, and
    such a message infrastructure is denoted by connecting microservices in Figure
    [2-5](#477630_1_En_2_Chapter.xhtml#Fig5). Now comes the next important aspect:
    when microservices are interconnected in this manner, since the underlying message
    infrastructure blends seamlessly with the corporate IT infrastructure, theoretically
    microservices from any vertical or line of business are capable of exchanging
    information across each other, since all of them can be connected to the same
    corporate LAN. When this happens, the application boundary, which earlier used
    to be a well-defined, rigid boundary, now disappears. This is denoted using dotted
    lines between applications in Figure [2-5](#477630_1_En_2_Chapter.xhtml#Fig5).
    In other words, the notion of applications that existed earlier as first-class
    bounded citizens in the enterprise software landscape gives space to microservices,
    and microservices now start to resemble many of the properties of those applications
    in terms of identity as first-class independent software building blocks.


    You may also look at the formal definition of a microservice as provided by Wikipedia
    ( [`https://en.wikipedia.org/wiki/Microservices`](https://en.wikipedia.org/wiki/Microservices)
    ).'
  trans: '

    ### 模块间通信


    我们与现有系统的大多数模块间通信都是直接且同步的方法调用。即使我们将这些通信设计为幂等且无状态，这种调用带来的副作用之一是被调用模块必须保持在线并活跃以响应调用模块，否则可能引发异常或错误。即使我们将不同模块分离为独立个体并部署到多个进程中，这种副作用依然存在，并会在调用栈中向后传播。调用进程中发起请求的线程将一直等待，直到收到有效响应（无论是否包含数据），或直到被调用方法抛出异常。这会阻塞调用进程中发起请求的线程，使其在方法调用返回前无法执行其他任务。因此，这不仅导致了对被调用进程的依赖，还占用了调用进程的资源，使其无法被复用。


    然而，这种同步式模块间通信有一个优点：调用方可以在检查被调用进程返回的响应数据后执行下一步操作。此外，当被调用进程未返回预期结果时，调用方可以立即向用户或客户端代理层发出提示，以便通过人工干预进行下一步操作。


    异步或“即发即忘”式的模块间通信，可以在向被调用进程发出调用后立即释放调用方资源，使其可被复用。在调用进程与被调用进程之间使用消息队列是实现这一目标的一种方式。但这也会给整体软件架构带来额外的复杂性。首先，我们需要在
    IT 环境中处理消息基础设施。更重要的是，软件设计的复杂性会增加，因为我们现在还需要将响应与特定请求关联起来——它们不再通过计算线程的“等待与响应”原语绑定在一起。


    异步通信是一种必要的恶。


    基于此背景，让我们来看看如何对单体应用进行改进，使其更现代化、更灵活。


    ### 微服务


    在单体应用架构现代化过程中，你已经了解了两个主要方面，即：


    *   使模块独立

    *   重新设计模块间通信


    图 2-5 描绘了我们讨论的两种架构现代化方案。你可能需要花些时间仔细观察该图，因为它将是构建更多改进方案的基础结构。


    ![../images/477630_1_En_2_Chapter/477630_1_En_2_Fig5_HTML.jpg](img/477630_1_En_2_Fig5_HTML.jpg)


    图 2-5


    重新设计单体应用的边界


    在单体架构风格中，每个应用都是一个独立的单体，它们按照前文“单体模块间依赖”部分所述的方式相互通信。每个应用都有一个明确定义的边界，该边界界定了功能分组的限界上下文。在图
    2-5 中，这用粗矩形框表示。如果你查看此类应用的内部，会发现有多个模块。如前所述，这些模块在逻辑上是分离的，但由于部署上的依赖关系以及模块间通信，模块边界并不严格，反而显得臃肿。这用虚线方框表示。在这样的模块内部，我标注了一个服务。它可以是一个单一服务，也可以是一组功能相关的服务集合，用圆圈表示。请注意，一个服务可以接收外部请求，也可以将请求委托给另一个模块中的其他服务，或另一个应用中的其他服务；所有这些都用箭头表示。


    当我想要引入名为“微服务”的新型应用架构时，我反转了边界，如图 2-5 最右侧所示。在这里，每个模块或每个可区分的功能分组都与其同类清晰分离。每个服务或功能相关的服务集合在逻辑上和物理上被组合在一起。在此图中，这用粗线方框表示，称为微服务。我们稍后会详细讨论它，但就目前的讨论而言，这样的微服务可以独立于其他微服务进行开发、源代码管理、构建、测试、分发和部署。如果我们想将其映射到我们的单体应用，可以想象，这样一个微服务集合可以等同于我们传统的单体应用。正如单体应用的不同部分需要相互交互以实现其内置功能一样，在微服务世界中，微服务内部的服务可以相互通信，或者跨微服务的服务也可以相互通信。当我们采用微服务时，我们不想忽视
    SOA 的任何或全部原则。据此，我们可以使用任何标准的 SOA 接口让微服务相互通信。稍后你会看到，为了发挥微服务的真正效率，你也必须为微服务架构适配真正的
    SOA 原则。


    前文关于灵活“模块间通信”的部分指出，我们也可以在模块之间使用异步通信风格，微服务之间同样可以如此。这通过减少依赖和打破请求-响应循环为我们提供了灵活性，从而可以解决诸如被调用的微服务不存在或无响应时该怎么办等问题。微服务之间合适的消息队列有助于实现这一点，这种消息基础设施在图
    2-5 中通过连接微服务的线条表示。接下来是另一个重要方面：当微服务以这种方式互联时，由于底层消息基础设施与企业 IT 基础设施无缝融合，理论上，来自任何垂直领域或业务线的微服务都能够跨彼此交换信息，因为它们都可以连接到同一个企业局域网。当这种情况发生时，以前曾经是定义明确、严格边界的应用边界现在消失了。这在图
    2-5 中用应用之间的虚线表示。换句话说，以前作为企业软件领域中一等限界公民存在的应用概念，现在让位给了微服务，而微服务开始在其身份（作为一等独立软件构建块）方面展现出这些应用的许多特性。


    你也可以查阅维基百科（ [`https://en.wikipedia.org/wiki/Microservices`](https://en.wikipedia.org/wiki/Microservices)
    ）提供的微服务正式定义。

    '
- fmt: '### Note


    “Microservices are a software development technique — a variant of the service-oriented
    architecture (SOA) architectural style that structures an application as a collection
    of loosely coupled services. In a microservice architecture, services are fine-grained
    and the protocols are lightweight. The benefit of decomposing an application into
    different smaller services is that it improves modularity. This makes the application
    easier to understand, develop, test, and become more resilient to architecture
    erosion. It parallelizes development by enabling small autonomous teams to develop,
    deploy, and scale their respective services independently. It also allows the
    architecture of an individual service to emerge through continuous refactoring.”


    Many of the aspects mentioned in this definition have been discussed in these
    first two chapters. You will now look into this definition from more perspectives
    and also much more in the next two chapters.


    ## Summary


    In this chapter, you looked at the state of traditional distributed or n-tier
    application architectures and explored a few shortcomings due to the monolithic
    nature of such architectures. There are many other advantages and disadvantages
    of the monolith architecture that have not been discussed yet, but such a discussion
    is not in scope since I just wanted to set the context to discuss the alternative
    way of doing things: using microservices. Now you know that when you switch your
    thoughts from the monolith to the microservice style, you need to inverse lot
    of concepts like the application boundary, intercommunications, etc. In the next
    chapter, you will revisit the microservice architecture in detail, relating the
    concept to real-world enterprise applications.


    # 3. Microservices in Depth


    As you saw in Chapter [2](#477630_1_En_2_Chapter.xhtml), using microservices is
    an approach in architecting today’s distributed software solutions. The software
    industry has gained experience in developing and deploying distributed applications
    over the past two decades, and microservices lay down architectural principles
    and patterns for dealing with many shortfalls in developing, deploying and maintaining
    distributed applications. We discussed the context and necessity for the microservices
    architecture in the previous two chapters and in this chapter we will look at
    it into more detail. I will again attempt to explain concepts in the context of
    a real-world application, the e-commerce application I introduced in Chapter [1](#477630_1_En_1_Chapter.xhtml).
    This will help you to quickly relate aspects to practical scenarios in your real-world
    experience.


    You will explore the following aspects in this chapter:


    *   What the e-commerce architecture will look like in the microservices context

    *   The relationship between the classic tiered and layered approach in a microservices
    context

    *   The autonomous nature of microservices

    *   The relationship between microservices and traditional SOA and MOM

    *   The scalability and extensibility characteristics of the microservices architecture


    ## Look and Feel of a Microservice


    You just learned that, compared to a traditional monolith application, many characteristics
    and distinguishing features are inversed when talking about microservices. To
    better understand what this inversion is all about, let’s look at a practical
    enterprise application scenario and understand the big picture first so that the
    fine-grained and most important details are easier to understand.


    ### The E-Commerce Microservice


    The “Typical Application Architecture” section in Chapter [1](#477630_1_En_1_Chapter.xhtml)
    introduced the e-commerce application. I explained how such applications are built
    following a traditional approach. Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3)
    in Chapter [1](#477630_1_En_1_Chapter.xhtml) depicted different tiers and a modular
    approach to managing software complexity. Even with the principles of tiers, layers,
    and modules, you saw that there’s still the problem of undue dependency between
    modules, which impedes all stages in the software engineering life cycle. I will
    portray that monolith architecture in a slightly different style following the
    first principle of microservices introduced in Chapter [2](#477630_1_En_2_Chapter.xhtml).


    Figure [3-1](#477630_1_En_3_Chapter.xhtml#Fig1) shows what the architecture will
    look like if we redraw the traditional monolith-based architecture shown in Figure
    [1-3](#477630_1_En_1_Chapter.xhtml#Fig3) in Chapter [1](#477630_1_En_1_Chapter.xhtml).
    Compared to the monolith architecture representation in Figure [1-3](#477630_1_En_1_Chapter.xhtml#Fig3),
    I have softened the application boundary represented by the dotted and dashed
    line styles in the diagram. This is to emphasize the point that in the microservices
    architecture, it is not the application boundary that matters, it’s the microservice
    boundary. The microservice boundary is shown with thick rectangles. There are
    many such microservices depicted in the diagram. In short, the single monolith
    application boundary represented in the traditional architecture has vanished
    and in that place, many microservices have popped up, and all of them have clear
    and concrete boundaries.


    ![../images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg](images/477630_1_En_3_Chapter/477630_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** E-commerce microservices architecture


    I have not introduced any new modules in this new architecture representation.
    Instead, retaining the already existing modules in the monolith architecture,
    I have considerably changed the structure of the software modules as well as the
    technology infrastructure. Let’s look into this structural change in detail.


    ### No Tier, Distributed


    I discussed the three-tier and n-tier distributed architectures in the “System
    Architectures” section in Chapter [1](#477630_1_En_1_Chapter.xhtml). Going by
    that, it’s not wrong to call the microservices architecture by the name “no tier,
    distributed.” To make it clear, if you relook at the three-tier or n-Tier distributed
    architectures, within an application there are multiple tiers like the client
    tier, presentation tier, business tier, etc. These tiers are also capable of being
    deployed into different distributed process spaces. This is also inversed in the
    microservices architecture. To make it clear, in the microservices architecture,
    the aim is to keep all of these tiers together. But hold on, this is again not
    a hard-and-fast rule. Nothing prevents us from adapting the layers and tiers and
    other similar principles from the traditional architectures to a microservices
    architecture. All those good practices are still valid. We can even deploy these
    tiers into separate process spaces. But then, we may want to question why we want
    to do this. By keeping closely interacting pieces like the different tiers of
    a microservice together, perhaps within a single process itself, we can bring
    lot of optimizations like improving response time, reliable communications, etc.


    We can think the microservices architecture again in the context of the three-tier
    architecture itself. Microservices can be built by keeping the different tiers
    logically separated, but when it comes to deploying for actual production, these
    tiers may be kept closely together to get the required level of autonomy. Let’s
    look into what this autonomy means.'
