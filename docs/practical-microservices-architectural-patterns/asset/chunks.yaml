- fmt: "```bash\ncd ch08\\ch08-06\\ProductWeb\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\\
    ProductWeb>make\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\ProductWeb>mvn -Dmaven.test.skip=true\
    \ clean package\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\ProductWeb>run\nD:\\\
    binil\\gold\\pack03\\ch08\\ch08-06\\ProductWeb>java -Dserver.port=8084 -Dspring.application.name=product-web\
    \ -Deureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/ -jar .\\\
    target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n```\n\nThe last command\
    \ brings up Product Web in port 8084.\n\nYou may inspect the Eureka console using\
    \ a web browser by pointing to the following URL where you have the registry services\
    \ running: `http://localhost:8761/`. See Figure [8-17](#477630_1_En_8_Chapter.xhtml#Fig17).\n\
    \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig17_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig17_HTML.jpg)\n\
    \n**Figure 8-17** Eureka Console\n\nYou may now open this HTML utility, preferably\
    \ in the Chrome browser: `ch08\\ch08-06\\ProductWeb\\src\\main\\resources\\product.html`.\
    \ Upon loading itself, the browser client will fire a request to Product Web,\
    \ listening in port 8084, which will delegate the call to any instance of the\
    \ Product Server microservice. The Product Web microservice now has to delegate\
    \ the request to Product Server microservice and in order to do so, it will route\
    \ the request through the API gateway. The API gateway will do a registry look\
    \ up and return the server details where the Product Server microservices are\
    \ hosted back to the Ribbon client in Product Web microservice. The Product Web\
    \ microservice takes this info and load balances the request to any one of the\
    \ instances of the Product Server microservices.\n\n## The Config Server\n\nExternalizing\
    \ configuration parameters is a critical characteristic that microservices exhibit.\
    \ This is true for both application parameters and infrastructure parameters.\
    \ When there are many microservices, maintaining the configuration parameters\
    \ externally is a non-trivial task and Spring Cloud’s Config Server comes to your\
    \ rescue here. The Spring Config Server maintains configuration parameters in\
    \ a version-controlled repository like SVN or Git. Again, the repository can be\
    \ local or remote, and in single node or in multinode configurations for high\
    \ availability. Since the configuration parameters can be version controlled and\
    \ then referred directly by the Production servers, scenarios of run time errors\
    \ due to incorrect values and such can be avoided completely.\n\n### Design a\
    \ Configuration Scenario\n\nYou will introduce Config Server into your sample\
    \ without doing many changes to the other microservices. In your design, you will\
    \ utilize Config Server only for the Product Server microservices, even though\
    \ it can be utilized for all other microservices. As shown in Figure [8-18](#477630_1_En_8_Chapter.xhtml#Fig18),\
    \ the Product Server microservice utilizes the Spring Cloud Config Server to manage\
    \ the values for one of its configuration parameters.\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig18_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig18_HTML.jpg)\n\
    \n**Figure 8-18** Design for a Config Server scenario\n\n### Code to Use Config\
    \ Server\n\nAll the code samples for this section are in folder `ch08/ch08-07`.\
    \ Visit `pom.xml` to see the explicit mention of the Config Server dependency.\
    \ See Listing [8-28](#477630_1_En_8_Chapter.xhtml#PC57).\n\n```xml\n<dependency>\n\
    \    <groupId>org.springframework.cloud</groupId>\n    <artifactId>spring-cloud-config-server</artifactId>\n\
    </dependency>\n```\n\n**Listing 8-28** Config Server Dependency (`ch08\\ch08-07\\\
    ConfigServer\\pom.xml`)\n\nNext, you want to add `@EnableConfigServer` to the\
    \ `Application` class, which is shown in Listing [8-29](#477630_1_En_8_Chapter.xhtml#PC58).\n\
    \n```java\n@SpringBootApplication\n@EnableConfigServer\npublic class EcomProductConfigApplication\
    \ {\n    public static void main(String[] args) {\n        SpringApplication.run(EcomProductConfigApplication.class,\
    \ args);\n    }\n}\n```\n\n**Listing 8-29** Enabling Config Server (`ch08\\ch08-07\\\
    ConfigServer\\src\\main\\java\\com\\acme\\ecom\\product\\EcomProductConfigApplication.java`)\n\
    \nNext, configure the Config Server itself to point to the GIT URL. See Listing\
    \ [8-30](#477630_1_En_8_Chapter.xhtml#PC59).\n\n```yaml\nserver:\n  port: 8888\n\
    spring:\n  cloud:\n    config:\n      server:\n        git:\n          uri: file://D:/binil/gold/pack03/ch08/ch08-07/ConfigServer/config-repo\n\
    ```\n\n**Listing 8-30** Spring Cloud Config Server Configurations (`ch08\\ch08-07\\\
    ConfigServer\\src\\main\\resources\\bootstrap.yml`)\n\nHere, since Port 8888 is\
    \ the default port for the Config Server, even without explicit mention of `server.port`,\
    \ the Config Server will bind to 8888. Next, you provide the GIT URL. It’s in\
    \ this repository where you need to place all your configuration files for the\
    \ different microservices.\n\nNext, you need to enable your microservice to access\
    \ the Config Server. Visit the Maven dependency shown in Listing [8-31](#477630_1_En_8_Chapter.xhtml#PC60).\n\
    \n```xml\n<dependency>\n    <groupId>org.springframework.boot</groupId>\n    <artifactId>spring-boot-starter-actuator</artifactId>\n\
    </dependency>\n<dependency>\n    <groupId>org.springframework.cloud</groupId>\n\
    \    <artifactId>spring-cloud-starter-config</artifactId>\n</dependency>\n```\n\
    \n**Listing 8-31** Config Server Client (`ch08\\ch08-07\\ProductServer\\pom.xml`)\n\
    \nThe Product Server microservice will act as the client for the Config Server.\
    \ This is enabled by the `spring-cloud-starter-config`. You need to note the actuator\
    \ dependency too, which is required for refreshing the configuration parameters\
    \ when there is a change to the parameter in the Config Server. Next, inspect\
    \ the microservice configuration file, shown in Listing [8-32](#477630_1_En_8_Chapter.xhtml#PC61).\n\
    \n```yaml\nserver:\n  port: 8081\nspring:\n  application:\n    name: productservice\n\
    \  cloud:\n    config:\n      server:\n        uri: http://localhost:8888\nmanagement:\n\
    \  security:\n    enabled: false\n```\n\n**Listing 8-32** Product Server Microservice\
    \ Configurations (`ch08\\ch08-07\\ProductServer\\src\\main\\resources\\application.yml`)\n\
    \nThe significant configuration parameters are:\n\n```\nspring.application.name=productservice\n\
    spring.cloud.config.uri=http://localhost:8888\n```\n\nHere `productservice` is\
    \ a logical name given to the Product Server microservice, which will also be\
    \ treated as its service ID. The Config Server will look for `productservice.yml`\
    \ in the repository to resolve any application configuration parameters. See Listing\
