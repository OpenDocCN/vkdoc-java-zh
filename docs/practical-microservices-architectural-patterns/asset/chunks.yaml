  raw: 'Note

    In the “Distributed Command and Event Handling” example in Chapter

    [12](#477630_1_En_12_Chapter.xhtml), you configured the transaction

    manager whereas in the Axon 3 migrated version of the same example, you

    haven’t configured or used any explicit transaction manager.


    Axon 3 will complain if you deal with more than one aggregate root in

    a transactional command handler. That means the combination of Listing

    [19-12](#477630_1_En_19_Chapter.xhtml#PC17) and Listing

    [19-13](#477630_1_En_19_Chapter.xhtml#PC18) is not easy

    to get working in Axon 3\. Let’s refactor the design of the e-commerce

    microservice Ecom-core a little.


    Listing [19-14](#477630_1_En_19_Chapter.xhtml#PC19) reveals the

    minimum configurations you need to do to wire in the command bus and the

    event bus in a distributed manner. You attach a transaction manager to

    the command bus as well as a saga event processor to the event queue in

    the code.


    ```

    @Configuration

    public class EcomCoreAppConfiguration {

    @Value("${axon.amqp.exchange}")

    private String rabbitMQExchange;

    @Value("${axon.amqp.queue}")

    private String rabbitMQQueue;

    @Bean

    public FanoutExchange eventBusExchange() {

    return new FanoutExchange(rabbitMQExchange, true, false);

    }

    @Bean

    public Queue eventBusQueue() {

    return new Queue(rabbitMQQueue, true, false, false);

    }

    @Bean

    public Binding binding() {

    return BindingBuilder.bind(eventBusQueue()).to(eventBusExchange());

    }

    @Bean

    public SpringAMQPMessageSource ecomCoreEventQueue(

    AMQPMessageConverter       messageConverter) {

    return new SpringAMQPMessageSource(messageConverter) {

    @RabbitListener(queues = "${axon.amqp.queue}")

    @Override

    @Transactional

    public void onMessage(Message message, Channel channel) {

    super.onMessage(message, channel);

    }

    };

    }

    @Bean

    public CommandBus commandBus(org.axonframework.common.transaction.

    TransactionManager transactionManager) {

    SimpleCommandBus commandBus = new AsynchronousCommandBus();

    commandBus.registerHandlerInterceptor(

    new TransactionManagingInterceptor(transactionManager));

    return commandBus;

    }

    @Bean("orderSagaConfiguration")

    public SagaConfiguration orderSagaConfiguration() {

    return SagaConfiguration.trackingSagaManager(

    OrderProcessSaga.class,"ECOM_CORE_EVENT_PROCESSOR");

    }

    }

    Listing 19-14

    EcomCoreAppConfiguration (ch19\ch19-03\Ax3-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\EcomCoreAppConfiguration.java)

    ```


    Listing [19-15](#477630_1_En_19_Chapter.xhtml#PC20) shows

    configuring the values for the parameters you saw in Listing [19-14](#477630_1_En_19_Chapter.xhtml#PC19).


    ```

