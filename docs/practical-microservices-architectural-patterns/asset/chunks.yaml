    \n```\n@RepositoryRestResource(collectionResourceRel = \"orderHistory\",\npath\
    \ = \"orderHistory\")\npublic interface OrderHistoryRepository extends\nMongoRepository\
    \  {\n@RestResource(exported = false)\npublic Order findByOrderId(@Param(\"orderId\"\
    ) Long orderId);\npublic List findByUserId(@Param(\"userId\") String userId);\n\
    public List findByOrderStatus(\n@Param(\"orderStatus\") String orderStatus);\n\
    @Override\npublic Order findOne(String id);\n@Override\n@RestResource(exported\
    \ = false)\npublic Page findAll(Pageable pageable);\n}\nListing 17-28\nOrderHistoryRepository\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-history\\src\\main\\java\\com\\acme\\\
    ecom\\order\\history\\repository\\OrderHistoryRepository.java)\n```\n\n在运行时，Spring\
    \ Data REST将自动创建上述接口的实现。然后，它将使用`@RepositoryRestResource`注解指示Spring MVC在`/orderHistory`处创建RESTful端点，其细节你已在第[7](#477630_1_En_7_Chapter.xhtml)章的“使用Spring\
    \ Boot和MongoDB执行数据操作”一节中看到。\n\n## 设计和编码电子商务微服务基础设施\n\n除了上一节中的业务微服务之外，示例应用程序中还有一组基础设施微服务。这些微服务的代码库直接且易于理解，其中大部分已在第[8](#477630_1_En_8_Chapter.xhtml)章的“Spring\
    \ Cloud”一节中介绍过，因此此处不再详述。不过，你将看到它们如何在整体架构中协同工作。"
  raw: "Referring to Figure [17-10](#477630_1_En_17_Chapter.xhtml#Fig10), the\nend-to-end\
    \ flow as a result of a REST JSON request using the web app\nfrom the back office\
    \ admin to simulate the delivery failure of a shipped\norder can be summarized\
    \ as follows:\n\n1.  `order_service.js`\n    sends a REST JSON request over HTTP\
    \ to deliver an already shipped order\n    as follows:\n\n```\n    $http.post(sessionStorage.getItem('apiUrl')+'/delivery/delivery',deliveryDTO)\n\
    \    ```\n\nThis request hits the API gateway.\n\n2.  The API gateway interprets\
    \ the URL by looking at the Service Registry\n    and directs the request to the\
    \ Order Deliver REST Controller in the\n    Ecom-delivery microservice.\n\n3.\
    \  The Order Deliver REST Controller creates a new OrderDeliveryCommand\n    and\
    \ sends it to the command gateway.\n\nRefer to Listing [17-21](#477630_1_En_17_Chapter.xhtml#PC27)\
    \ to see the\n    code.\n\n4.  The command gateway delivers the OrderDeliveryCommand\
    \ to the command\n    bus.\n\n5.  The OrderDeliveryCommandHandler consumes the\
    \ OrderDeliveryCommand\n    from the command bus.\n\nRefer to Listing [17-24](#477630_1_En_17_Chapter.xhtml#PC31)\
    \ to see the\n    code.\n\n6.  In the current flow, when the back office admin\
    \ clicks the “Delivery\n    Failed” button, the check `if(orderDeliveryCommand.isDelivered())`\n\
    \    will be false so a new OrderDeliveryFailedEvent is sent to the clustered\n\
    \    event bus.\n\n7.  The OrderDeliveryFailedEvent registered during Step 6 is\
    \ consumed by\n    the order process saga.\n\n8.  The saga’s life cycle ends after\
    \ the invocation of the\n    handleOrderCanceledEvent handler since you annotated\
    \ that event’s\n    handler on the saga with `@EndSaga`, as shown in\n    Listing\
    \ [17-26](#477630_1_En_17_Chapter.xhtml#PC34).\n\n```\n    public class OrderProcessSaga\
    \ extends AbstractAnnotatedSaga {\n    private Long orderId;\n    @EndSaga\n \
    \   @SagaEventHandler(associationProperty = \"orderId\")\n    public void handleOrderDeliveryFailureEvent(\n\
    \    OrderDeliveryFailedEvent orderDeliveryFailedEvent) {\n    commandGateway.send(new\
    \ OrderDeliveryFailureRollbackCommand(\n    orderDeliveryFailedEvent.getOrderId(),\n\
    \    orderDeliveryFailedEvent.getFailureReason()));\n    }\n    }\n    Listing\
    \ 17-26\n    OrderProcessSaga handleOrderDeliveryFailureEvent (ch17\\ch17-01\\\
    Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\\
    saga\\handler\\OrderProcessSaga.java)\n    ```\n\n9.  The Order Process saga sends\
    \ an OrderDeliveryFailureRollbackCommand\n    to the command gateway.\n\n10. \
    \ The command gateway delivers the OrderDeliveryFailureRollbackCommand\n    to\
    \ the command bus.\n\n11.  The Order Command Handler picks up the\n    OrderDeliveryFailureRollbackCommand\
    \ for processing. See Listing [17-27](#477630_1_En_17_Chapter.xhtml#PC35).\n\n\
    ```\n    @Component\n    public class OrderCommandHandler {\n    @Autowired\n\
    \    @Qualifier(value = \"inventoryRepository\")\n    private Repository inventoryRepository;\n\
    \    @Autowired\n    @Qualifier(value = \"orderRepository\")\n    private Repository\
    \ orderRepository;\n    @CommandHandler\n    public void handleOrderDeliveryFailure(OrderDeliveryFailureRollbackCommand\n\
    \    orderDeliveryFailureRollbackCommand) {\n    Order order = orderRepository.load(\n\
    \    orderDeliveryFailureRollbackCommand.getOrderId());\n    order.updateOrderStatus(OrderStatus.DELIVERY_FAILED);\n\
    \    rollbackInventory(order);\n    }\n    private void rollbackInventory(Order\
    \ order){\n    for(LineItem lineItem:order.getLineItems()){\n    Inventory inventory\
    \ =\n    inventoryRepository.load(lineItem.getInventoryId());\n    inventory.updateProductStock(lineItem.getQuantity(),\n\
    \    ProductStockOperation.ADD);\n    }\n    }\n    }\n    Listing 17-27\n   \
    \ OrderCommandHandler handleOrderDeliveryFailure (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n\
    \    ```\n\n12.  The Order Command Handler loads the respective order aggregate\
    \ entity\n    from the repository and invokes the `updateOrderStatus`\n    method\
    \ of the order to change the status to “Delivery Failed.”\n\nSee Listing [17-22](#477630_1_En_17_Chapter.xhtml#PC28)\
    \ for the code\n    walkthrough of invoking the `updateOrderStatus`\n    method\
    \ of order to change the status.\n\n13.  The order aggregate sends an OrderUpdatedEvent\
    \ to the clustered event\n    bus.\n\n14.  In Step 11, the Order Command Handler\
    \ also retrieves the inventory\n    items of all the products associated with\
    \ the order and invokes `updateProductStock`.\n    The objective is to revert\
    \ the stock to account for the effect of failed\n    delivery of the order so\
    \ that those inventories can be made available\n    for sales again. The rollbackInventory\
    \ in Listing [17-14](#477630_1_En_17_Chapter.xhtml#PC19) depicts\n    this.\n\n\
    15.  While readjusting the stock back, each inventory aggregate registers\n  \
    \  an InventoryUpdateEvent into the clustered event bus.\n\n16.  The InventoryUpdateEvent\
    \ generated in Step 15 is consumed by the\n    Inventory Event Handler in the\
    \ Ecom-product microservice.\n\n17.  The InventoryEventHandler in the Ecom-product\
    \ microservice refreshes\n    its own materialized view of the inventory read\
    \ model.\n\nListing [17-11](#477630_1_En_17_Chapter.xhtml#PC15) shows the\n  \
    \  code of handleInventoryUpdates doing this.\n\n18.  The OrderUpdatedEvent is\
    \ consumed by the Order History Event Handler\n    in the Ecom-history microservice.\n\
    \n19.  The Order History Event Handler in the Ecom-history microservice\n    updates\
    \ the corresponding record of the order in the `Order History`\n    table.\n\n\
    Listing [17-17](#477630_1_En_17_Chapter.xhtml#PC22) shows the\ncode of the Order\
    \ History Event Handler handling order updates.\nThis completes the simulation\
    \ of “failure of delivery of a shipped\norder” flow, and you will later look at\
    \ the execution of the actual use\ncase.\n\nRetrieve Order History Views\n\nThe\
    \ order history is required to render all orders of a particular user,\nthat too\
    \ filtered by status. This is effected by the Order History Mongo\nRepository.\
    \ The interesting part is that there is no REST controller in\nthe Order History\
    \ microservice; instead you use the `@` `RepositoryRestResource`\n. See Listing\
    \ [17-28](#477630_1_En_17_Chapter.xhtml#PC36).\n\n```\n@RepositoryRestResource(collectionResourceRel\
    \ = \"orderHistory\",\npath = \"orderHistory\")\npublic interface OrderHistoryRepository\
    \ extends\nMongoRepository  {\n@RestResource(exported = false)\npublic Order findByOrderId(@Param(\"\
    orderId\") Long orderId);\npublic List findByUserId(@Param(\"userId\") String\
    \ userId);\npublic List findByOrderStatus(\n@Param(\"orderStatus\") String orderStatus);\n\
    @Override\npublic Order findOne(String id);\n@Override\n@RestResource(exported\
    \ = false)\npublic Page findAll(Pageable pageable);\n}\nListing 17-28\nOrderHistoryRepository\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-history\\src\\main\\java\\com\\acme\\\
    ecom\\order\\history\\repository\\OrderHistoryRepository.java)\n```\n\nAt runtime,\
    \ Spring\nData REST will create implementations of the above interface\nautomatically.\
    \ Then it will use the `@RepositoryRestResource`\nannotation to direct Spring\
    \ MVC to create RESTful endpoints at `/orderHistory`, the\ndetails of which you\
    \ saw in the “Perform Data Operations Using Spring\nBoot and MongoDB” section\
    \ in Chapter [7](#477630_1_En_7_Chapter.xhtml).\n\nDesign and Code the E-Commerce\
    \ Microservice\nInfrastructure\nApart from the business microservices in the previous\
    \ section, you\nalso have a set of infrastructure microservices in the example\n\
    application. The code base for the microservices is straightforward and\nunderstandable,\
    \ and most of them were covered in the “Spring Cloud”\nsection of Chapter [8](#477630_1_En_8_Chapter.xhtml)\
    \ so I will not cover them in detail\nhere. You will, however, see how they fit\
    \ together in the overall\narchitecture."
  trans: "\n参考图 17-10，通过后台管理员使用 Web 应用发送 REST JSON 请求来模拟已发货订单配送失败的端到端流程可总结如下：\n\n\
    1.  `order_service.js`\n    通过 HTTP 发送一个 REST JSON 请求，以配送一个已发货的订单，具体如下：\n\n```\n\
    \    $http.post(sessionStorage.getItem('apiUrl')+'/delivery/delivery',deliveryDTO)\n\
    \    ```\n\n此请求会命中 API 网关。\n\n2.  API 网关通过查询服务注册表来解析 URL，并将请求路由至 Ecom-delivery\
    \ 微服务中的 Order Deliver REST 控制器。\n\n3.  Order Deliver REST 控制器创建一个新的 OrderDeliveryCommand，并将其发送至命令网关。\n\
    \n请参考清单 17-21 查看相关代码。\n\n4.  命令网关将 OrderDeliveryCommand 投递至命令总线。\n\n5.  OrderDeliveryCommandHandler\
    \ 从命令总线消费 OrderDeliveryCommand。\n\n请参考清单 17-24 查看相关代码。\n\n6.  在当前流程中，当后台管理员点击“配送失败”按钮时，`if(orderDeliveryCommand.isDelivered())`\
    \ 检查结果为 false，因此会向集群事件总线发送一个新的 OrderDeliveryFailedEvent。\n\n7.  步骤 6 中注册的 OrderDeliveryFailedEvent\
    \ 由订单流程 Saga 消费。\n\n8.  在调用 handleOrderCanceledEvent 处理器后，Saga 的生命周期结束，因为你已使用\
    \ `@EndSaga` 对该 Saga 上的事件处理器进行了注解，如清单 17-26 所示。\n\n```\n    public class OrderProcessSaga\
    \ extends AbstractAnnotatedSaga {\n    private Long orderId;\n    @EndSaga\n \
    \   @SagaEventHandler(associationProperty = \"orderId\")\n    public void handleOrderDeliveryFailureEvent(\n\
    \    OrderDeliveryFailedEvent orderDeliveryFailedEvent) {\n    commandGateway.send(new\
    \ OrderDeliveryFailureRollbackCommand(\n    orderDeliveryFailedEvent.getOrderId(),\n\
    \    orderDeliveryFailedEvent.getFailureReason()));\n    }\n    }\n    清单 17-26\n\
    \    OrderProcessSaga 处理 OrderDeliveryFailureEvent (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\order\\saga\\handler\\OrderProcessSaga.java)\n\
    \    ```\n\n9.  订单流程 Saga 向命令网关发送一个 OrderDeliveryFailureRollbackCommand。\n\n10.\
    \ 命令网关将 OrderDeliveryFailureRollbackCommand 投递至命令总线。\n\n11. Order 命令处理器拾取 OrderDeliveryFailureRollbackCommand\
    \ 进行处理。参见清单 17-27。\n\n```\n    @Component\n    public class OrderCommandHandler\
    \ {\n    @Autowired\n    @Qualifier(value = \"inventoryRepository\")\n    private\
    \ Repository inventoryRepository;\n    @Autowired\n    @Qualifier(value = \"orderRepository\"\
    )\n    private Repository orderRepository;\n    @CommandHandler\n    public void\
    \ handleOrderDeliveryFailure(OrderDeliveryFailureRollbackCommand\n    orderDeliveryFailureRollbackCommand)\
    \ {\n    Order order = orderRepository.load(\n    orderDeliveryFailureRollbackCommand.getOrderId());\n\
    \    order.updateOrderStatus(OrderStatus.DELIVERY_FAILED);\n    rollbackInventory(order);\n\
    \    }\n    private void rollbackInventory(Order order){\n    for(LineItem lineItem:order.getLineItems()){\n\
    \    Inventory inventory =\n    inventoryRepository.load(lineItem.getInventoryId());\n\
    \    inventory.updateProductStock(lineItem.getQuantity(),\n    ProductStockOperation.ADD);\n\
    \    }\n    }\n    }\n    清单 17-27\n    OrderCommandHandler 处理 OrderDeliveryFailure\
    \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
    ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n    ```\n\n12.\
    \ Order 命令处理器从仓库加载相应的订单聚合实体，并调用订单的 `updateOrderStatus` 方法，将状态更改为“配送失败”。\n\n请参见清单\
    \ 17-22 中关于调用订单的 `updateOrderStatus` 方法以更改状态的代码讲解。\n\n13. 订单聚合向集群事件总线发送一个 OrderUpdatedEvent。\n\
    \n14. 在步骤 11 中，Order 命令处理器还检索了与该订单关联的所有产品的库存项，并调用了 `updateProductStock`。其目的是回退库存以应对订单配送失败的影响，从而使这些库存可以再次用于销售。清单\
    \ 17-14 中的 rollbackInventory 描述了这一点。\n\n15. 在回退库存的同时，每个库存聚合都会向集群事件总线注册一个 InventoryUpdateEvent。\n\
    \n16. 步骤 15 中生成的 InventoryUpdateEvent 由 Ecom-product 微服务中的 Inventory 事件处理器消费。\n\
    \n17. Ecom-product 微服务中的 InventoryEventHandler 刷新其自身的库存读取模型物化视图。\n\n清单 17-11 展示了执行此操作的\
    \ handleInventoryUpdates 代码。\n\n18. OrderUpdatedEvent 由 Ecom-history 微服务中的 Order\
    \ History 事件处理器消费。\n\n19. Ecom-history 微服务中的 Order History 事件处理器更新 `Order History`\
    \ 表中订单的相应记录。\n\n清单 17-17 展示了 Order History 事件处理器处理订单更新的代码。\n至此，“已发货订单配送失败”流程的模拟完成，稍后你将看到实际用例的执行。\n\
    \n检索订单历史视图\n\n订单历史用于渲染特定用户的所有订单，并且可按状态进行过滤。这是通过 Order History Mongo 仓库实现的。有趣的是，Order\
    \ History 微服务中没有 REST 控制器；而是使用了 `@` `RepositoryRestResource`。参见清单 17-28。\n\n```\n\
    @RepositoryRestResource(collectionResourceRel = \"orderHistory\",\npath = \"orderHistory\"\
    )\npublic interface OrderHistoryRepository extends\nMongoRepository  {\n@RestResource(exported\
    \ = false)\npublic Order findByOrderId(@Param(\"orderId\") Long orderId);\npublic\
    \ List findByUserId(@Param(\"userId\") String userId);\npublic List findByOrderStatus(\n\
    @Param(\"orderStatus\") String orderStatus);\n@Override\npublic Order findOne(String\
    \ id);\n@Override\n@RestResource(exported = false)\npublic Page findAll(Pageable\
    \ pageable);\n}\n清单 17-28\nOrderHistoryRepository (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-history\\src\\main\\java\\com\\acme\\ecom\\order\\history\\repository\\OrderHistoryRepository.java)\n\
    ```\n\n在运行时，Spring Data REST 会自动创建上述接口的实现。然后它会使用 `@RepositoryRestResource` 注解来指示\
    \ Spring MVC 在 `/orderHistory` 路径下创建 RESTful 端点，其详细信息你已在第 7 章的“使用 Spring Boot\
    \ 和 MongoDB 执行数据操作”一节中看到。\n\n设计与编码电子商务微服务基础设施\n除了上一节中的业务微服务之外，示例应用程序中还包含一组基础设施微服务。这些微服务的代码库直接易懂，其中大部分已在第\
    \ 8 章的“Spring Cloud”一节中介绍过，因此此处不再详述。不过，你将看到它们如何在整体架构中协同工作。\n"
- fmt: '# Config Server


    `Config Server`微服务托管所有其他业务微服务和基础设施微服务的配置参数。因此，`Config Server`微服务的健康运行状态是所有其他微服务启动的必要条件。您指向此微服务以从单一位置查找所有其他微服务的配置文件。在生产环境中，此位置将指向一个`GIT`仓库，以便配置文件本身受版本控制。


    图[17-11](#477630_1_En_17_Chapter.xhtml#Fig11)反映了上述依赖关系，标记为1。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig11_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig11_HTML.jpg)


    *图17-11 Config Server和服务注册中心*


    `Config Server`微服务的代码很简单，如清单[17-29](#477630_1_En_17_Chapter.xhtml#PC37)所示。


    ```

    @SpringBootApplication

    @EnableConfigServer

    public class EcomConfigApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomConfigApplication.class, args);

    }

    }

    ```


    *清单17-29 Config Server (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-config\src\main\java\com\acme\ecom\config\EcomConfigApplication.java)*


    # Service Registry


    您使用`Eureka`服务器作为服务注册中心。所有业务微服务在启动期间向服务注册中心注册自身，此注册在图[17-11](#477630_1_En_17_Chapter.xhtml#Fig11)中标记为2。


    `Service Registry`微服务的代码同样很简单，如清单[17-30](#477630_1_En_17_Chapter.xhtml#PC38)所示。


    ```

    @SpringBootApplication

    @EnableEurekaServer

    public class EcomServiceRegisterApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomServiceRegisterApplication.class, args);

    }

    }

    ```


    *清单17-30 Service Registry (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-registry\src\main\java\com\acme\ecom\registry\EcomServiceRegisterApplication.java)*


    # API Gateway


    您启用`Zuul`作为API网关。来自Web应用程序的任何请求都只会命中API网关，由API网关通过联系服务注册中心解析请求目标，并将请求路由到相应的服务。参见清单[17-31](#477630_1_En_17_Chapter.xhtml#PC39)。


    ```

    @SpringBootApplication

    @EnableZuulProxy

    @EnableDiscoveryClient

    @EnableCircuitBreaker

    @EnableHystrix

    @EnableHystrixDashboard

    @EnableFeignClients

    public class EcomApiGatewayApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomApiGatewayApplication.class, args);

    }

    @Bean

    public CorsFilter corsFilter() {

    UrlBasedCorsConfigurationSource source =

    new UrlBasedCorsConfigurationSource();

    CorsConfiguration config = new CorsConfiguration();

    config.setAllowCredentials(true);

    config.addAllowedOrigin("∗");

    config.addAllowedHeader("∗");

    config.addAllowedMethod("OPTIONS");

    config.addAllowedMethod("HEAD");

    config.addAllowedMethod("GET");

    config.addAllowedMethod("PUT");

    config.addAllowedMethod("POST");

    config.addAllowedMethod("DELETE");

    config.addAllowedMethod("PATCH");

    source.registerCorsConfiguration("/∗∗", config);

    return new CorsFilter(source);

    }

    }

    ```


    *清单17-31 Zuul API Gateway (ch17\ch17-01\Ax2-Ecom-No-Security\Ecom-gateway\src\main\java\com\acme\ecom\gateway\EcomApiGatewayApplication.java)*


    图[17-12](#477630_1_En_17_Chapter.xhtml#Fig12)描述了Web应用程序与服务器端微服务的各种交互。


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig12_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig12_HTML.jpg)


    *图17-12 API网关*


    参照图[17-12](#477630_1_En_17_Chapter.xhtml#Fig12)，Web应用程序与服务器端微服务的各种交互如下：


    1.  Web应用程序可直接从外部网络或互联网访问。一旦在浏览器中输入主页URL，Web应用程序将被下载到浏览器中。'
  raw: "Config Server\nThe Config Server\nmicroservice hosts the configuration parameters\
    \ for all the other\nbusiness microservices and infrastructure microservices.\
    \ Due to this\naspect, a healthy running state of the Config Server microservice\
    \ is\nrequired for the startup of all other microservices. You point to this\n\
    microservice to find the configuration files for all other microservices\nfrom\
    \ a single location. In a production environment, this location will\npoint to\
    \ a GIT repository so that the configuration files themselves are\nversion controlled.\n\
    \nFigure [17-11](#477630_1_En_17_Chapter.xhtml#Fig11) reflects the\nabove dependency,\
    \ labelled as 1.\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig11_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig11_HTML.jpg)\n\
    \nFigure 17-11\nConfig Server and Service Registry\n\nThe code for the Config\n\
    Server microservice is trivial, as shown in Listing [17-29](#477630_1_En_17_Chapter.xhtml#PC37).\n\
    \n```\n@SpringBootApplication\n@EnableConfigServer\npublic class EcomConfigApplication\
    \ {\npublic static void main(String[] args) {\nSpringApplication.run(EcomConfigApplication.class,\
    \ args);\n}\n}\nListing 17-29\nConfig Server (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-config\\src\\main\\java\\com\\acme\\ecom\\config\\EcomConfigApplication.java)\n\
    ```\n\nService Registry\nYou use the Eureka server as the service registry. All\n\
    of the business microservices register themselves to the service\nregistry during\
    \ startup, and this registration is labelled with 2 in\nFigure [17-11](#477630_1_En_17_Chapter.xhtml#Fig11).\n\
    \nThe code for the Service Registry microservice is again trivial, as\nshown in\
    \ Listing [17-30](#477630_1_En_17_Chapter.xhtml#PC38).\n\n```\n@SpringBootApplication\n\
    @EnableEurekaServer\npublic class EcomServiceRegisterApplication {\npublic static\
    \ void main(String[] args) {\nSpringApplication.run(EcomServiceRegisterApplication.class,\
    \ args);\n}\n}\nListing 17-30\nService Registry (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
    Ecom-registry\\src\\main\\java\\com\\acme\\ecom\\registry\\ EcomServiceRegisterApplication.java)\n\
    ```\n\nAPI Gateway\n\nYou enable Zuul as the API gateway. Any\nrequests from the\
    \ web app will only hit the API gateway and it’s up to\nthe API gateway to resolve\
    \ the request target by contacting the service\nregistry and routing the request\
    \ to the respective service. See Listing\n[17-31](#477630_1_En_17_Chapter.xhtml#PC39).\n\
    \n```\n@SpringBootApplication\n@EnableZuulProxy\n@EnableDiscoveryClient\n@EnableCircuitBreaker\n\
