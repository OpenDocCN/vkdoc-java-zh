    \ -Deureka.server.enableSelfPreservation=false .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
    ```\n\nYou next bring up the Zuul API gateway:\n\n```\nD:\\binil\\gold\\pack03\\\
    ch08\\ch08-06\\ProductApiZuul>make\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\ProductApiZuul>mvn\
    \ -Dmaven.test.skip=true clean package\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\\
    ProductApiZuul>run\nD:\\binil\\gold\\pack03\\ch08\\ch08-06\\ProductApiZuul>java\
