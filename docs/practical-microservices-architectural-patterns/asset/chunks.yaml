    \ A typical read lock may be\n    obtained when you query similar to\n\n```\n\
    \    SELECT ∗ FROM QUOTES_TABLE WHERE QUOTES_ID=5 FOR UPDATE;\n    ```\n\nBoth\
    \ locks will be released only when the usage of data is completed.\nA read lock\
    \ can be given to a transaction on request, provided no other\ntransaction holds\
    \ the write lock. For a transaction to update, it\nrequires a write lock, and\
    \ during the duration that transaction holds\nthe write lock, other transactions\
    \ are allowed to read the data if and\nonly if they don’t require a read lock.\
    \ Moreover, if a transaction holds\na write, it will not allow another transaction\
    \ to read its changing data\nuntil those changes have been committed.\n\nEnterprise\
    \ Transaction Categories\nTransactions have different connotations depending on\
    \ the context in\nwhich we use them. It can be in the context of multiple operations\n\
    within a monolith system, or in the context of multiple monoliths or\nmultiple\
    \ microservices, or in the context of multiple enterprises with\ncommon (or conflicting)\
    \ interests. You will briefly look at the\ndifferent transaction categories in\
    \ this context.\n\nACID Transactions\n\nACID transactions\nare related to atomic\
    \ transactions\nwhere multiple steps or operations are executed with the intent\
    \ that\neither all of them succeed together or all of them return back to the\n\
    previous state due to the failure of one or more of the steps. A major\nportion\
    \ of the discussion in previous sections of this chapter concerned\nACID transactions,\
    \ so enough explanation has already been done. You will\nnow look at the architecture\
    \ of an ACID transaction processing (TP)\nsystem. Figure [13-2](#477630_1_En_13_Chapter.xhtml#Fig2)\
    \ depicts a\ntypical architecture consisting of multiple resource managers.\n\n\
    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2\nDistributed ACID\ntransactions with multiple resources\n\nBASE\
    \ = ACID in Slices\nACID is the only style that can guarantee data consistency.\
    \ However,\nif a distributed system uses ACID transactions, everything has to\
    \ happen\nin lockstep mode, everywhere. This requires all components to be\navailable\
    \ and it also increases the lock times on the data. BASE is an\narchitectural\
    \ style that relaxes these requirements, simply by cutting\nthe (overall, ideal)\
    \ ACID transaction into smaller pieces, each of them\nstill ACID in themselves.\n\
    Messaging is used to make changes ripple through the system, where\neach change\
    \ is ideally processed by an ACID transaction. The messages\nare asynchronous\
    \ rather than synchronous, meaning that there is a delay\nbetween the first and\
    \ last ACID transaction in a BASE system.\nThis is why this style exhibits “eventual\
    \ consistency:” one has to\nwait for all messages to ripple through the system\
    \ and be applied where\nappropriate. The “Eventual Consistency of Microservices”\
    \ section in\nChapter [11](#477630_1_En_11_Chapter.xhtml) discussed this in detail.\n\
    I’ll now introduce BASE in various incremental steps, by cutting more\nand more\
    \ into the ACID transaction scope.\n\nBASE Transactions\n\nFigure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3)\
    \ shows a BASE\narchitecture with\nfour different microservices. Each microservice\
    \ still has ACID\nproperties (independent of the other microservices of the system).\n\
    \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3\nBASE\narchitecture where each microservice still has ACID guarantees\
    \ by\nmeans of XA transactions\n\nThis is the architecture of a microservice ecosystem\
    \ in BASE style\nthat sends or receives messages in ACID style. You will look\
    \ at the\nfunctionality of each microservice in a later section (the “Design the\n\
    Example Scenario” subsection under the “Distributed Transaction Example”\nsection);\
    \ however, pay attention to the technical components depicted\nhere for the time\
    \ being. It is BASE because via ActiveMQ you don’t know\nor care where the messages\
    \ go to or come from; all that the quote\nprocessing and quote settlement see\
    \ between them is the queues (whereas\na classical ACID architecture would create\
    \ one big ACID transaction for\nquote settlement and quote processing). You use\
    \ JTA/XA to ensure that\nmessages are processed exactly once, since you don’t\
    \ want to lose\nmessages (or get duplicates). Messages that are received from\
    \ the queue\nare guaranteed to make it to the database, even with intermediate\n\
    crashes. Messages that are sent are guaranteed to have their domain\nobject status\
    \ updated in the database, even with intermediate\ncrashes.\nFor systems that\
    \ require strong guarantees on data consistency, this\nis a good solution. In\
    \ other systems, strong data consistency is not\nthat vital and you can relax\
    \ things even more–by using an even finer\nscope of ACID transactions in your\
    \ BASE architecture.\nWhen you transition to microservices, you want to avoid\
    \ system-wide\ndistributed transactions. However, your actual data is distributed\
    \ more\ncompared to the scenario of the monolith, so the need for distributed\n\
    transactions is very real. And it is in this context we are talking\nabout eventual\
    \ consistency in place of instantaneous consistency. The\n“Eventual Consistency\
    \ of Microservices” section in Chapter [11](#477630_1_En_11_Chapter.xhtml) covered\
    \ this in detail.\n\nRelaxed BASE Transactions\nIn some cases, you don’t care\
    \ a lot about message loss or duplicates,\nand the scope of your ACID transactions\
    \ can be limited to single\nresource managers, like purely local transactions\
    \ only. This offers more\nperformance but it has a cost: whereas so far the BASE\
    \ system had\neventual consistency, this architecture no longer guarantees that\
    \ by\ndefault.\nAs will be shown in the next chapter, to get some level of\nconsistency,\
    \ a lot more work has to be done by the application\ndevelopers; in some cases,\
    \ eventual consistency may even be impossible,\nnotably in the case of message\
    \ loss.\n\nFigure [13-4](#477630_1_En_13_Chapter.xhtml#Fig4) shows a\ntypical\
    \ architecture consisting of multiple resource managers in a relaxed BASE\ntransaction.\n\
    \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig4_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4\nDistributed, relaxed BASE transactions with multiple resources"
  trans: "\n*   **乐观锁：** 乐观锁采取一种务实的方法，鼓励客户端保持“乐观”，认为数据在使用期间不会发生变化，并允许它们同时访问相同的数据。如果任何特定客户端的事务想要更新，当且仅当最初提供给客户端的数据与数据库中当前数据相同时，该更新才会被提交。这种方法对于热点数据不太理想，因为比较操作会频繁失败。\n\
    \n*   **悲观锁：** 悲观锁可能使用信号量^(³¹)或之前讨论过的任何事务机制。每次读取都需要一个读锁，每次写入都需要一个写锁。读锁不是排他性的，而写锁是排他性的。当你执行类似以下查询时，可能会获得一个典型的读锁：\n\
    \n```\n    SELECT ∗ FROM QUOTES_TABLE WHERE QUOTES_ID=5 FOR UPDATE;\n    ```\n\
    \n只有当数据使用完成后，这两个锁才会被释放。只要没有其他事务持有写锁，就可以将读锁授予请求的事务。对于要更新的事务，它需要一个写锁，并且在事务持有写锁期间，当且仅当其他事务不需要读锁时，才允许它们读取数据。此外，如果一个事务持有写锁，它将不允许其他事务读取其正在更改的数据，直到这些更改被提交。\n\
    \n企业事务类别\n事务根据其使用上下文的不同而有不同的含义。它可能出现在单体系统内的多个操作上下文中，也可能出现在多个单体或多个微服务的上下文中，或者出现在具有共同（或冲突）利益的多个企业的上下文中。你将在此上下文中简要了解不同的事务类别。\n\
    \nACID 事务\n\nACID 事务与原子事务相关，其中多个步骤或操作被执行，其意图是要么全部成功，要么由于一个或多个步骤的失败而全部回滚到之前的状态。本章前面部分的大部分讨论都涉及\
    \ ACID 事务，因此已经做了足够的解释。现在，你将了解 ACID 事务处理（TP）系统的架构。图 13-2 描绘了一个由多个资源管理器组成的典型架构。\n\
    \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig2_HTML.jpg](img/477630_1_En_13_Fig2_HTML.jpg)\n\
    \n图 13-2\n具有多个资源的分布式 ACID 事务\n\nBASE = 切分后的 ACID\nACID 是唯一能保证数据一致性的风格。然而，如果分布式系统使用\
    \ ACID 事务，那么所有地方都必须以锁步模式进行。这要求所有组件都可用，并且还会增加数据的锁定时间。BASE 是一种架构风格，它通过将（整体的、理想的）ACID\
    \ 事务切分成更小的片段（每个片段本身仍然是 ACID 的）来放宽这些要求。\n消息传递用于使更改在整个系统中传播，每个更改理想情况下由一个 ACID 事务处理。这些消息是异步的而非同步的，这意味着在\
    \ BASE 系统中，第一个和最后一个 ACID 事务之间存在延迟。\n这就是为什么这种风格表现出“最终一致性”：必须等待所有消息在系统中传播并在适当的地方被应用。第\
    \ 11 章的“微服务的最终一致性”部分对此进行了详细讨论。\n现在，我将通过逐步缩小 ACID 事务的范围，分步介绍 BASE。\n\nBASE 事务\n\
    \n图 13-3 展示了一个包含四个不同微服务的 BASE 架构。每个微服务仍然具有 ACID 属性（独立于系统中的其他微服务）。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig3_HTML.jpg](img/477630_1_En_13_Fig3_HTML.jpg)\n\
    \n图 13-3\nBASE 架构，其中每个微服务通过 XA 事务仍然具有 ACID 保证\n\n这是一个以 BASE 风格运行的微服务生态系统架构，它以\
    \ ACID 风格发送或接收消息。你将在后面的章节（“分布式事务示例”部分下的“设计示例场景”小节）中了解每个微服务的功能；不过，目前请先关注这里描绘的技术组件。之所以称为\
    \ BASE，是因为通过 ActiveMQ，你不需要知道也不关心消息的去向或来源；报价处理和报价结算之间看到的只是队列（而经典的 ACID 架构会为报价结算和报价处理创建一个大的\
    \ ACID 事务）。你使用 JTA/XA 来确保消息被精确处理一次，因为你不想丢失消息（或得到重复消息）。即使发生中间崩溃，也能保证从队列接收的消息能够到达数据库。即使发生中间崩溃，也能保证发送的消息的领域对象状态在数据库中得到更新。\n\
    对于需要强数据一致性保证的系统来说，这是一个很好的解决方案。在其他系统中，强数据一致性并非那么重要，你可以进一步放宽要求——通过在 BASE 架构中使用更细粒度的\
    \ ACID 事务范围。\n当你过渡到微服务时，你希望避免系统范围的分布式事务。然而，与单体场景相比，你的实际数据分布得更广，因此对分布式事务的需求非常真实。正是在这种背景下，我们讨论用最终一致性替代即时一致性。第\
    \ 11 章的“微服务的最终一致性”部分对此进行了详细讨论。\n\n宽松的 BASE 事务\n在某些情况下，你不太关心消息丢失或重复，并且你的 ACID 事务范围可以限制在单个资源管理器内，例如仅限纯本地事务。这提供了更高的性能，但也有代价：到目前为止，BASE\
    \ 系统具有最终一致性，但这种架构默认不再保证这一点。\n正如下一章将展示的，为了获得一定程度的 consistency，应用程序开发人员需要做更多的工作；在某些情况下，最终一致性甚至可能无法实现，尤其是在消息丢失的情况下。\n\
    \n图 13-4 展示了一个在宽松 BASE 事务中包含多个资源管理器的典型架构。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig4_HTML.jpg](img/477630_1_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4\n具有多个资源的分布式、宽松 BASE 事务\n"
- fmt: '微服务资源分布在各个节点上。您希望避免分布式事务，因为跨节点锁定资源会阻碍系统的可扩展性。此外，您可以接受最终一致性，但即使无法完美实现也无妨。如果是这样，图[13-4](#477630_1_En_13_Chapter.xhtml#Fig4)展示了如何遵循宽松的`BASE`模型。应用程序可以直接与一个或多个相关的资源管理器交互，或者更典型地，通过某个负载均衡器或网关进行交互，该网关将传入请求分发到一组具有对称职责和能力的资源管理器池中。请求由一个或多个资源管理器处理，随后变更会传播到一个或多个其他资源管理器。所涉及的资源管理器数量取决于分片模型（详见第[11](#477630_1_En_13_Chapter.xhtml)章的“规模立方体”部分）和所选的系统配置，范围从单个节点（单副本）到节点仲裁组，理论上甚至可以达到给定数据记录的所有副本。


    `Axon`提供了许多功能，您可以使用这些功能跨资源管理器展开`BASE`事务，而无需使用分布式事务管理器或事务协调器。换句话说，在`BASE`事务中没有分布式事务管理器或事务协调器；尽管如此，事务仍然可以跨多个资源管理器传播，以实现某种程度的最终一致性。图[13-5](#477630_1_En_13_Chapter.xhtml#Fig5)描绘了这一场景，展示了`Axon`中实现此功能的关键组件。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg)


    图 13-5 支持`BASE`事务的`Axon`组件


    您将参考图[13-5](#477630_1_En_13_Chapter.xhtml#Fig5)了解典型的宽松`BASE`事务处理步骤。来自浏览器的写请求将以`HTTP
    PUT`的形式到达`HTTP`服务器或负载均衡器。


    1.  请求被路由到`API`网关。

    2.  `API`网关将此请求路由到`Axon`应用程序的第一个接触点，即（前端）`REST`控制器。

    3.  `REST`控制器在解包请求后，将其解释为实体变更请求，并遵循`CQRS`模式创建一个命令。此命令被发送到分布式命令总线，启动一个本地事务。

    4.  分布式命令总线将此命令传输到包含相应命令处理程序（资源管理器 3）的节点。

    5.  命令处理程序借助写数据库中的存储库，将写入操作应用到实体上。

    6.  上述存储库的变更还会触发一个事件（第[12](#477630_1_En_12_Chapter.xhtml)章中“在同一个`JVM`中处理命令和事件”部分下的“设计示例场景”一节提供了详细说明），此事件被发送到集群事件总线。

    7.  在图[13-5](#477630_1_En_13_Chapter.xhtml#Fig5)中，您可以看到两个不同的事件处理程序（资源管理器 1 和资源管理器
    2）对先前的事件感兴趣，并且它们也可能执行各自所需的任何状态变更。

    8.  您可以看到资源管理器 2 实际上是在同步自身（读数据库）以获取系统中任何感兴趣的变更。

    9.  任何后续的查询（`HTTP GET`）也会看到这些变更。最终，所有人都能看到这些变更。


    `ACID` vs. `BASE`

    这样的比较就像比较苹果和橙子：它们并非旨在相互替代，并且在服务于各自目的方面同样出色（或糟糕）。这是一个很容易说出口的陈述；然而，任何`CTO`级别的讨论都不能以如此直白的解释结束。话虽如此，理解这一区别是“掌握微服务”的关键。如果您理解了这一区别，那么本书的主要意图就达到了！

    `BASE`事务是微服务架构的基础，我们希望在此架构中远离`ACID`事务。然而，它们服务于不同的目的。争论孰优孰劣意义不大，因为两者解决的是正交的关注点——这正是`CAP`定理之所以重要的原因。但是，您是否想完全抛弃`ACID`事务呢？这就像问您，作为战斗机的机长，您是希望直接控制座椅弹射按钮，还是即使无法直接触及，但（几乎）确信您的副驾驶会在您下令时为您激活它，您也能接受？在前一种情况下，您非常确定当突然需要时，您可以按自己的意愿瞬间弹射逃生。在后一种情况下，您几乎确信自己仍然能够逃生；然而，存在一定程度的怀疑，即逃生是瞬间完成还是会有延迟，这可能是由于您的副驾驶需要时间来执行您的命令，或者不幸的是，您的副驾驶无法移动自己的肌肉来采取行动！重申一下，前者类似于`ACID`事务，它相对更具确定性，而后者类似于`BASE`事务，它（可能）最终会发生。

    我们仍然需要`ACID`，即使不是在所有时候。

    现在让我们来谈谈`BASE`。如果您仍然在适当的级别使用`ACID`（如图[13-3](#477630_1_En_13_Chapter.xhtml#Fig3)所示），那么事情就简单了。另一方面，更宽松的`BASE`方法并不会让您的生活更轻松；事实上，宽松的`BASE`会带来比`ACID`复杂得多的问题。

    话虽如此，理解和欣赏`BASE`事务中涉及的复杂性的一种方法是理解`ACID`事务本身，因此您将在以下部分中进行此操作。


    重新审视分布式事务

    在查看具体示例之前，您需要理解一些概念，这些概念将为接下来要探索的示例设定上下文。


    本地事务

    如果您使用一个典型的资源管理器，通常该单个资源将被限制在单个主机或节点上（即使这并非强制要求）。局限于这样一个单一资源的操作就是本地事务，它们只影响一个事务性资源。在单个节点内，非确定性操作较少（或者出于实际考虑，为零），因此发送到单个节点的命令必须被认为是确定性的，并且在发生任何灾难时，存在本地恢复机制。这些资源拥有自己的事务性`API`，事务的概念通常表现为会话的概念，会话可以封装一个工作单元，并带有界定`API`，以告知资源何时应将缓冲的工作提交到底层资源。因此，从开发人员的角度来看，您在本地事务中并非通过事务进行管理，而只是通过“连接”进行管理。'
  raw: "Microservice resources are distributed across nodes. You want to\navoid distributed\
    \ transactions since locking of resources across nodes\nwill impede system scalability.\
    \ Further, you are OK for eventual\nconsistency but you don’t mind if you can’t\
    \ achieve it perfectly. If so,\nFigure [13-4](#477630_1_En_13_Chapter.xhtml#Fig4)\
    \ illustrates\nhow to follow the relaxed BASE model. Applications interact either\n\
    directly with one or more of the involved resource managers, or, more\ntypically,\
    \ through some load balancer or gateway that distributes\nincoming requests to\
    \ a pool of resource managers with symmetrical\nresponsibilities and capabilities.\
    \ Requests are served by one or more\nresource managers, and changes are propagated\
    \ to one or more other\nresource managers subsequently. The number of resource\
    \ managers involved\ndepends on the sharding model (covered in Chapter [11](#477630_1_En_11_Chapter.xhtml)’s\
    \ “The Scale Cube” section) and\nthe system configuration chosen, ranging from\
    \ a single node (single\nreplica) to a quorum of nodes to, theoretically, all\
    \ replicas of a given\ndata record.\n\nAxon provides\nmany features with which\
    \ you can span BASE transactions across resource\nmanagers without using a distributed\
    \ transaction manager or transaction\ncoordinator. To rephrase, there is no distributed\
    \ transaction manager or\ntransaction coordinator in a BASE transaction; still,\
    \ transactions can\nbe propagated across multiple resource managers to have some\
    \ level of\neventual consistency. Figure [13-5](#477630_1_En_13_Chapter.xhtml#Fig5)\
    \ depicts this\nscenario where you show the key components in Axon that make this\n\
    happen.\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg](images/477630_1_En_13_Chapter/477630_1_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5\nAxon\ncomponents to support BASE transactions\n\nYou will look\
    \ at typical relaxed BASE transactional steps, referring to\nFigure [13-5](#477630_1_En_13_Chapter.xhtml#Fig5).\
    \ A write\nrequest from a browser will come as a HTTP PUT at the HTTP\nserver\
    \ or the load balancer.\n\n1.  The request is routed to the API gateway.\n\n2.\
    \  The API gateway routes this request to the first point of contact of\n    the\
    \ request to the Axon application, which is the (front) REST\n    Controller.\n\
    \n3.  The REST Controller, after unpacking the request, interprets it as a\n \
    \   request for an entity change and creates a command, following the CQRS\n \
    \   pattern. This command is send to the distributed command bus, starting a\n\
    \    local transaction.\n\n4.  The distributed command bus transports this command\
    \ to the node\n    containing the respective command handler (Resource Manager\
    \ 3).\n\n5.  The command handler effects the write to the entity with the help\
    \ of\n    the repository in the Write DB.\n\n6.  The above repository change also\
    \ triggers an event (the “Design the\n    Example Scenario” section under the\
    \ “Command and Event Handling in Same\n    JVM” section in Chapter [12](#477630_1_En_12_Chapter.xhtml)\
    \ provides detailed narration) and\n    this event is sent to the clustered event\
    \ bus.\n\n7.  In Figure [13-5](#477630_1_En_13_Chapter.xhtml#Fig5), you can see\n\
    \    that the two different event handlers (Resource Manager 1 and Resource\n\
    \    Manager 2) are interested in the previous event, and they may also do\n \
    \   whatever state changes they dictate.\n\n8.  You can see that Resource Manager\
    \ 2 is in effect synchronizing itself\n    (the Read DB)  of\n    any interesting\
    \ changes in the system.\n\n9.  Any subsequent query (HTTP GET) also sees these\
    \ changes. Eventually,\n    everyone see the changes.\n\nACID vs. BASE\nSuch a\
    \ comparison is like comparing apples and oranges: they are not\nintended to replace\
    \ each other, and both are\nequally good (or bad) at serving their own purpose.\
    \ This is an easily\nsaid statement; however, no CTO-level discussion can end\
    \ with that\nstraight explanation. Having said that, understanding this distinction\n\
    is key in “mastering microservices.” If you understand this difference,\nthe main\
    \ intention of this book is met!\nBASE transactions are the base for microservices\n\
    architecture where we want to stay away from ACID transactions.\nHowever, they\
    \ serve different purposes. There is not much point in\ndebating one over the\
    \ other, since both solve orthogonal concerns–the\nreason why the CAP theorem\
    \ is significant. But then, do you want to\ncompletely put aside ACID transactions?\
    \ It’s like asking whether you as\nthe captain of your fighter jet should have\
    \ direct control of the seat\nejection button or are you comfortable even if you\
    \ don’t have direct\nreach to it but you are (almost) sure that your co-pilot\
    \ will activate\nit for you at your command? In the former case, you are very\
    \ sure that\nyou can escape instantaneously, at your own will, when a sudden need\n\
    arises. In the latter case, you are almost sure that you will still be\nable to\
    \ escape; however, there is a percentage of skepticism as to\nwhether the escape\
    \ will be instantaneous or delayed either due to your\nco-pilot taking time to\
    \ execute your command or in the unfortunate event\nthat your co-pilot is not\
    \ in a position to move his own muscles to act!\nTo restate, the former is synonymous\
    \ to an ACID transaction, which is\nrelatively more deterministic, whereas the\
    \ latter is synonymous to a\nBASE transaction, which (may) eventually happen.\n\
    We still need ACID, if not all the time.\nLet’s now come to BASE. If you still\
    \ use ACID at the right level (as\nin Figure [13-3](#477630_1_En_13_Chapter.xhtml#Fig3)),\
    \ then things\nare easy. On the other hand, an even more relaxed BASE approach\
    \ is not\ngoing to ease your life; in fact, relaxed BASE is going to give you\
    \ far\nmore complexities than ACID.\nHaving said that, one way to understand and\
    \ appreciate the\ncomplexities involved in BASE transactions is to understand\
    \ ACID transactions\nthemselves, so you will do that in the following sections.\n\
    \nDistributed Transactions Revisited\nBefore you look into concrete examples,\
    \ you need to understand a few\nconcepts that will set the context for the examples\
    \ you will\nexplore.\n\nLocal Transactions\nIf you take a typical resource manager,\
    \ typically that\nsingle resource will be confined to a single host or node (even\
    \ though\nthat may not be the case mandatorily). Operations confined to such a\n\
    single resource are local transactions and they affect only one\ntransactional\
    \ resource. Within a single node, there are less (or for\npractical considerations,\
    \ nil) nondeterministic operations, hence a\ncommand sent to a single node must\
    \ be considered deterministic, and in\ncase of any catastrophes, there are local\
    \ recovery mechanisms. These\nresources have their own transactional APIs, and\
    \ the notion of a\ntransaction is often exhibited as the concept of a session,\
    \ which can\nencapsulate a unit of\nwork with demarcating APIs to tell the resource\
    \ when the buffered\nwork should be committed to the underlying resource. Thus,\
    \ from a\ndeveloper perspective, you do not manage with transactions in a local\n\
    transaction, but with just “connections.”"
