    系统可能无法最终达到一致性，因为将系统带回最终一致状态所需的“引力”随着微服务的崩溃而消失了！更明确地说，将系统恢复到语义一致状态所需的基本状态已经丢失，因为你没有使微服务栈的状态持久化。


    **将订单和库存领域划分为独立的微服务**


    你已看到，清单 19-12 中 `OrderCommandHandler` 的 `handleNewOrder` 处理过程，相当于对订单和库存实体执行了一次
    ACID 风格的操作。然而，在本章的重构中，你将代码转换为了清单 19-18 中 `OrderController` 的 `createOrder` HTTP
    POST 方法。这里的处理过程相当于 BASE 风格，但没有任何固有的故障转移特性。在采用了跨订单和库存聚合根实体的 BASE 风格事务后，订单和库存领域现在已成为彼此领域独立的“一等公民”，因此如果需要，它们也可以被分离到各自的微服务中。


    你不会在此处实现图 19-2 所示的重构。相反，这将是后续的练习。下一小节将提供更多相关提示。


    ![../images/477630_1_En_19_Chapter/477630_1_En_19_Fig2_HTML.jpg](img/477630_1_En_19_Fig2_HTML.jpg)


    **图 19-2.** 为 Axon 3 重构的微服务电商架构


    **用于确定性最终一致性的 Saga**


    在采用了跨订单和库存聚合根实体的 BASE 风格事务后，订单和库存领域现在可以成为独立的微服务。然而，有一个问题！一旦你将订单和库存领域分离到独立的微服务中，以下组件将不再位于同一位置：


    *   清单 19-16 中所示的 `OrderCommandHandler`

    *   清单 19-17 中所示的 `InventoryCommandHandler`

    *   清单 19-18 中所示的 `OrderController`


    如果是这样，向一个或多个命令处理器发送的 `sendAndWait` 将跨网络分区执行，因此其确定性特性将丢失。如果你继续按照清单 19-17 中 `InventoryCommandHandler`
    的方式建模 BASE 事务，那么它失败的可能性将超出我已解释的范围。


    手动建模 BASE 事务的方式在这里不是一个好主意。由于以下特性，你需要在此处使用 Saga 事务：


    *   Saga 是长生命周期的。

    *   Saga 是持久化的。即使微服务崩溃，Saga 也可以被恢复。

    *   Saga 可以建模复杂的补偿场景。

    *   Saga 的事务或补偿可以被重放或重试。


    无论最终一致性在时间线上处于哪个点，尚未结束的 Saga 总是倾向于将系统（带）回到一致状态。

    当订单和库存领域被分离到不同的微服务时，你可以很好地使用 Saga 来建模多行商品订单的创建。Saga 可以跟踪每个库存消耗的状态，一旦满足条件，就继续创建新订单，然后结束
    Saga。在这个例子中，我没有这样做，因为我不想让演示过于复杂，因为它已经包含了一个 Saga。


    **配置电商微服务应用**


    请遵循第 18 章中“配置电商微服务应用”和“设置环境基础设施”部分的说明。


    **构建并运行电商微服务应用**


    同样，你应该遵循第 18 章中“构建并运行安全的电商微服务应用”部分的说明。在了解了 Axon 3 之后，让我们在下一节看看 Axon 4。


    **使用 Axon 4 在同一个 JVM 中进行命令和事件处理**


    在本节中，你将把第 12 章“在同一个 JVM 中进行命令和事件处理”部分讨论的代码迁移到 Axon 4。迁移后的代码库位于文件夹 `ch19\ch19-04`
    中。在阅读代码时，你可能需要参考 Axon 4 参考文档^(⁴⁷) 和 Axon 4 API 文档^(⁴⁸)。

    实际上，这段代码是对本章前面“使用 Axon 3 在同一个 JVM 中进行命令和事件处理”部分中看到的代码的重构。要构建并执行该示例，请遵循那里提到的说明，但有一个额外的步骤需要你作为第一步来完成，那就是设置
    Axon 服务器。


    Axon 服务器通过了解正在交换的不同类型的消息（例如从一个服务发送到一个或多个其他服务的事件、发送到一个服务执行某项操作的命令等）来补充 Axon 框架。你可以从
    [`​download.​axoniq.​io/​axonserver/​AxonServer.​zip`](https://download.axoniq.io/axonserver/AxonServer.zip)
    下载并解压 Axon 服务器库。


    ```

    cd D:\binil\Study\Sites\axon\AxonQuickStart-4.0.3_2019-02-19\AxonServer

    java -jar axonserver-4.0.3.jar

    ```


    这将启动 Axon 服务器。随后，请遵循本章前面“使用 Axon 3 在同一个 JVM 中进行命令和事件处理”部分中提到的说明。


    **使用 Axon 进行分布式命令和事件处理**


    在本节中，你将把第 12 章“分布式命令和事件处理”部分讨论的代码迁移到 Axon 4。迁移后的代码库位于文件夹 `ch19\ch19-05` 中。

    实际上，这段代码是对本章前面“使用 Axon 3 进行分布式命令和事件处理”部分中看到的代码的重构。要构建并执行该示例，请遵循此处提到的说明，但有一个额外的步骤需要你作为第一步来完成，那就是设置
    Axon 服务器。

    请遵循上一节的说明来启动 Axon 服务器。一旦 Axon 服务器启动，请遵循本章前面“使用 Axon 3 进行分布式命令和事件处理”部分中提到的说明。


    **总结**


    每一次结束都是新的开始。你已经读完了这本书；然而，你的微服务之旅才刚刚开始。我们揭开了围绕架构选择的一些困惑，并深入研究了包括数据一致性在内的几个关注点的每一个细节，这些在你日常采用微服务架构时可能会遇到。我希望你喜欢这本书的许多部分，就像我喜欢花时间深入代码细节来解释它们一样。我试图平衡理论量和代码量，让你对几乎所有解释过的概念都有动手实践的感觉。最后但同样重要的是，我还试图通过本章涵盖
    Axon CQRS 框架的最新版本。框架会来来去去，规范会不断演进，因为“唯一不变的就是变化。”然而，本书讨论的架构基础仍然具有相关性和有效性——至少这是我在
    25 年 IT 职业生涯中所经历的。继续前进，保持快速步伐。


    **脚注**


    安装、配置和运行 MongoDB

    '
- fmt: 'MongoDB is an open source document database, the server of which is licensed
    under Free Software Foundation’s GNU AGPL v3.0, which provides high performance,
    high availability, and automatic scaling. MongoDB is available for download from
    [`www.mongodb.com/`](http://www.mongodb.com/).


    You will look at the following in this section:


    - An introduction to MongoDB

    - How to download, install, and configure MongoDB

    - How to start MongoDB Server

    - How to connect to MongoDB Server

    - How to execute basic operations against MongoDB Server

    - How to install and use Robomongo, a UI for MongoDB


    ## Introducing MongoDB


    MongoDB is a kind of document database in the sense that a record in MongoDB is
    a structured document. Since the document is structured, it has a data structure
    composed of field and value pairs. MongoDB documents follow a structure similar
    to JSON (JavaScript Object Notation) objects. As values of fields, a MongoDB document
    may include other documents, arrays, and/or arrays of other documents.


    ### The MongoDB Document


    Here is a sample MongoDB document so you can understand what it looks like:


    ```

    {

    name: "bob",

    class: 2,

    division: "B",

    subjects: ["english", "science", "maths"]

    }

    ```


    Since a MongoDB document may contain other documents and arrays of other documents,
    the data structure is extensible. Further, MongoDB documents are synonymous to
    data types in a programming language.


    ## Install and Configure MongoDB


    In this section, you will download the community edition of MongoDB. You will
    also install and configure it and then test the installation.


    ### Download MongoDB Community Edition


    MongoDB is available for download at [`www.mongodb.com/download-center`](http://www.mongodb.com/download-center).
    Detailed installation instructions are also available at [`https://docs.mongodb.com/manual/tutorial/install-mongodb-on-windows/`](https://docs.mongodb.com/manual/tutorial/install-mongodb-on-windows/).
    A MongoDB installation file can be found at [`www.mongodb.org/downloads`](http://www.mongodb.org/downloads).


    You must have Windows Server 2008 R2, Windows Vista, or later to install MongoDB
    Community Edition. The `.msi` installer includes all the software dependencies
    required for MongoDB and will also automatically upgrade any older version of
    MongoDB if found installed in your machine. See Figure [A-1](#477630_1_En_20_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig1_HTML.jpg](images/477630_1_En_20_Chapter/477630_1_En_20_Fig1_HTML.jpg)


    **Figure A-1** MongoDB Community Server Installable


    ### Install and Configure MongoDB


    After you download the MongoDB installation file, locate the downloaded MongoDB
    `.msi` file in Windows Explorer, which typically is located in the default `Downloads`
    folder. Once you double-click the `.msi` file, a set of screens will appear to
    guide you through the installation process. Even though you may choose any location,
    like


    ```

    C:\Program Files\MongoDB\Server\3.2\

    ```


    I explicitly avoid a location with a space in the path, like the space in `Program
    Files`. Hence in my Windows machine, I use the following location:


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig2_HTML.jpg](images/477630_1_En_20_Chapter/477630_1_En_20_Fig2_HTML.jpg)


    **Figure A-2** MongoDB installation folder


    ```

    D:\Applns\MongoDB\Server\3.2.6

    ```


    MongoDB server requires a data directory to store all data (Figure [A-2](#477630_1_En_20_Chapter.xhtml#Fig2)).
    You may run MongoDB from any folder you choose. MongoDB’s default data directory
    path is the absolute path `\data\db` on the drive from which you start MongoDB.
    You can create this folder by running the following command in a Windows command
    prompt:


    ```

    md D:\Applns\MongoDB\Server\3.2.6\data

    ```


    ## Start Using MongoDB


    In this section, you will connect to the installed MongoDB server and carry out
    basic data operations.


    ### Start and Connect to MongoDB


    You can now start MongoDB by using this command:


    ```

    D:\Applns\MongoDB\Server\3.2.6\bin\mongod.exe --dbpath D:\Applns\MongoDB\Server\3.2.6\data

    ```'
