    14-1。


    ```

    开始本地事务

    更新报价状态

    增加或减少用户余额

    结束本地事务

    清单 14-1

    单体应用中的事务

    ```


    当你按照微服务设计原则将处理过程拆分为多个微服务时，每个微服务将管理自己的数据。这意味着，报价处理微服务将拥有并管理`Quotes`表，而报价结算微服务将拥有并管理`User
    Balance`表。如果使用两阶段提交的全局事务，操作将如清单 14-2 所示。


    ```

    开始全局事务

    更新报价状态

    增加或减少用户余额

    结束全局事务

    清单 14-2

    微服务中的全局事务

    ```


    如果你不对清单 14-2 中描述的操作使用两阶段提交事务，那么这两个操作将必须由两个微服务分别完成，这意味着这两个操作之间的原子性必须放宽。参见清单 14-3。


    ```

    开始本地事务

    更新报价状态

    结束本地事务

    开始本地事务

    增加或减少用户余额

    结束本地事务

    清单 14-3

    微服务中的本地事务

    ```


    存在一种可能性：当报价状态从“新建”更改为“已确认”后，紧接着发生错误，导致`User Balance`表中对买方和卖方的报价价值增减操作未能执行，从而错过了报价结算！参见清单
    14-4。


    ```

    开始本地事务

    更新报价状态

    结束本地事务

    开始本地事务

    增加或减少用户余额

    结束本地事务 !错误

    清单 14-4

    微服务本地事务错误场景

    ```


    这种状态是否可被应用程序接受，取决于上述`User Balance`表中的操作被遗漏所产生的影响。即使`User Balance`表中的数据更新被遗漏，相同的信息已经在`Quotes`表中以不同形式进行了追踪。在这个例子中，`User
    Balance`表中的数据应被视为一种汇总视图，它是对每个用户聚合总额的一种缓存。它的存在是为了更快地查询系统中每个用户的交易余额。如果应用程序认为这些用户余额仅仅是估算值，其正确值始终可以通过`Quotes`表中的数据进行验证，那么前面描述的错误——遗漏了在`User
    Balance`表中对买方和卖方增加报价价值——是可以接受的。在这种情况下，`User Balance`表中的数据并不要求 100%准确。

    第 13 章中的“测试消息丢失场景”部分模拟了类似的错误场景：报价状态从“新建”更改为“已确认”成功，但由于上游微服务发送给下游微服务的消息未能成功送达，导致下游结算被遗漏。该章引入了消息中间件作为两个微服务之间的桥梁，使微服务之间实现松耦合。然而，当你这样解耦微服务时，又引入了另一个难题：管理一个微服务与消息中间件之间的一致性。当你的应用程序中有许多微服务时，这类场景很常见。你将在后面的“全局资源与本地资源”部分探讨消息中间件所涉及的复杂性；不过，我们暂时先搁置队列的问题。


    幂等操作与微服务

    处理清单 14-4 中错误场景的一个简单方法是反转事务的顺序。参见清单 14-5。


    注意

    这种事务顺序的反转在此特定场景下有效；对于你的情况，可能需要采用不同的方法。


    ```

    开始本地事务

    增加或减少用户余额

    结束本地事务

    开始本地事务

    更新报价状态

    结束本地事务

    清单 14-5

    反转后的微服务本地事务场景

    ```


    通过如上所述反转事务的顺序，你可以确保只有在用户余额更新成功时，才尝试更改报价状态。通过这种方式，你可以确信：如果报价处理通过将报价状态从“新建”更改为“已确认”而完成，那么报价肯定已经通过在`User
    Balance`表中进行相应更改而完成了结算。


    这时出现了一个新场景。如果在报价已在`User Balance`表中结算后，报价处理失败怎么办？此时用户余额已更新，但报价仍保持“新建”状态，如清单 14-6
    所示。


    ```

    开始本地事务

    增加或减少用户余额

    结束本地事务

    开始本地事务

    更新报价状态

    结束本地事务 !错误

    清单 14-6

    反转后的微服务本地事务错误场景

    ```

