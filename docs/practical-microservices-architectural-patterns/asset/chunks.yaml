    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig12_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig12_HTML.jpg)\n\
    \nFigure 15-12\nEnd saga after order confirmation\n\nThe command and event flow\
    \ in the\narchitecture for the end-to-end flow when you click to confirm a new\n\
    order as follows:\n\n1.  When you click the Confirm button in the browser to confirm\
    \ an\n    already created order, a REST/JSON request hits the order\n    controller.\n\
    \n2.  The order controller in the Create Command Rest Controller\n    microservice\
    \ interprets the request as a write request and creates an\n    order status update\
    \ command and sends it to the command gateway, which\n    in turn dispatches the\
    \ command to the distributed command bus.\n\n3.  The distributed command bus forms\
    \ a bridge between the command bus\n    implementations across JVMs. The distributed\
    \ command bus on each JVM is\n    called a segment.\n\n4.  The command bus receives\
    \ commands and routes them to the order\n    command handler present in the Handle\
    \ Command and Create Event\n    microservice.\n\n5.  The order command handler\
    \ retrieves the corresponding order and\n    changes the status from “New” to\
    \ “Confirmed.”\n\n6.  Upon changing the status of the order, the change is effected\
    \ in the\n    order repository by sending an update to the order entity, which\
