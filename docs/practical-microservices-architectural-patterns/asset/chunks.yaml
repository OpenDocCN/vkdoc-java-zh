- fmt: "8.  `Event Handle Core`微服务中的订单事件处理器已订阅订单确认事件，因此它会收到状态更新的详细信息。\n\n9.  根据订单确认事件中提到的详细信息，订单事件处理器对订单的读模型进行更改。\n\
    \n10. 如前所述，Saga也对订单确认事件感兴趣。收到订单确认事件后，Saga将转换到“结束Saga”状态。\n\n11. `Event Handler\
    \ Audit`微服务中的审计事件处理器也已订阅订单确认事件，因此它也会收到新订单创建的详细信息。\n\n12. 根据订单确认事件中提到的详细信息，审计事件处理器将在审计的读模型中创建一条新记录。\n\
    \n13. 浏览器可以自行刷新，以通过查询实体的读模型来保持视图更新。\n\n最后，您将看到Saga因取消已创建的订单而从“新建”状态转换到“结束”状态。请参见图[15-13](#477630_1_En_15_Chapter.xhtml#Fig13)。\n\
    \n![../images/477630_1_En_15_Chapter/477630_1_En_15_Fig13_HTML.jpg](images/477630_1_En_15_Chapter/477630_1_En_15_Fig13_HTML.jpg)\n\
    \n图15-13\n订单取消后的结束Saga\n\n当您点击取消已创建的订单时，架构中端到端流程的命令和事件流如下：\n\n1.  当您在浏览器中点击“取消”按钮以取消已创建的订单时，一个`REST/JSON`请求会到达订单控制器。\n\
    \n2.  `Create Command Rest Controller`微服务中的订单控制器将该请求解释为写入请求，创建订单状态更新命令并将其发送到命令网关，命令网关随后将该命令分发到分布式命令总线。\n\
    \n3.  分布式命令总线在`JVM`之间形成命令总线实现的桥梁。每个`JVM`上的分布式命令总线称为一个段。\n\n4.  命令总线接收命令并将其路由到`Handle\
