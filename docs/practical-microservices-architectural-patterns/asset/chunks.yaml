    \ a single, simple database instance for\npersistence services. Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1)\
    \ depicts how\nthis looks when deployed in a public cloud, Amazon Web Services.\n\
    \n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1\nThe simple inception\narchitecture\n\nThere is a single instance\
    \ of the middle tier or the microservices\nand then there is another single instance\
    \ of a database server.\nScalability of this architecture is determined by the\
    \ underlying\nhardware capacity, which in your case will depend on the grade of\
    \ EC2\ninstance selected. Amazon\nElastic Compute Cloud (Amazon EC2) is a web\
    \ service that provides\nsecure, resizable compute capacity in the cloud. It is\
    \ integrated with\nmost AWS services such as Amazon Simple Storage Service (Amazon\
    \ S3),\nAmazon Relational Database Service (Amazon RDS), and Amazon Virtual\n\
    Private Cloud (Amazon VPC) to provide an infrastructure solution for\ncomputing,\
    \ query processing, and cloud storage across a wide range of\napplications.\n\
    As the number of users interfacing with the application grows or when\nthe number\
    \ of concurrent transactions to be served by this architecture\nincreases, the\
    \ capacity to scale out is solely dependent on the capacity\nof the available\
    \ EC2 instance you can choose from. This is limited, and\nthis scalability limitation\
    \ is inherent with the design of such an\narchitecture approach.\n\nWith respect\
    \ to Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1), a few\ncomponents require\
    \ quick introduction, since they will be referred to in\nsubsequent discussions:\n\
    \n*   Virtual private cloud\n    (VPC): A logically isolated virtual network spanning\
    \ an entire\n    AWS region where your EC2 instances are launched. A VPC is primarily\n\
    \    concerned with enabling the following capabilities:\n\n*   Isolating your\
    \ AWS resources from the resources of other\n        accounts\n\n*   Routing network\
    \ traffic to and from your instances\n\n*   Protecting your instances from network\
    \ intrusion and other\n        vulnerabilities\n\n*   AWS regions\n    and availability\n\
    \    zones: The AWS cloud infrastructure is built around regions and\n    availability\
    \ zones (AZs). AWS regions provide multiple, physically\n    separated, and isolated\
    \ availability zones which are connected with low\n    latency, high throughput,\
    \ and highly redundant networking. These\n    availability zones offer a more\
    \ highly available, fault tolerant, and\n    scalable infrastructure than traditional\
    \ single datacenter\n    infrastructures or multi-datacenter infrastructures.\
    \ AWS regions are\n    completely isolated from other AWS regions.The AWS cloud\
    \ currently spans\n    54 availability zones within 18 geographic regions and\
    \ one local region\n    around the world. An AWS region is depicted in Figure\
    \ [16-1](#477630_1_En_16_Chapter.xhtml#Fig1) whereas an\n    availability zone\
    \ will be shown in next section where it’s\n    relevant.\n\nThe Simple, Scaled\
    \ Out Architecture\n\nThe simple inception architecture\ndescribed in the previous\
    \ section is a bare minimum, and is the one with\nless hassles. If circumstances\
    \ permit, you may want to live with that\nminimalist architecture, since it will\
    \ give you peace of mind. However,\nif your business is successful with that architecture,\
    \ that in a sense\nimplies that you are going to need an enhanced architecture\
    \ for\nscalability, since a growing business can in no way be served by the\n\
    above minimalist architecture. The simple, scaled out architecture is\nshown in\
    \ Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2).\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2\nThe simple, scaled\nout architecture"
  trans: "\n以 Oracle 数据库为参考的高可用性与可扩展性模板\n\n如前所述，您将使用 Oracle 数据库作为解决方案来阐释各种高可用性（HA）模板。在此过程中，您还将使用公有云，即您案例中的亚马逊云服务（AWS），作为部署环境。这是因为，您很快就会发现，这些模板存在一些注意事项，我将在涉及公有云时进行说明。您将把应用架构视为一个生命周期，该周期的每个阶段都代表着从初始到架构成熟并实现规模经济与效率运营，再到需要以指数级或无限级进行网络规模扩展的各个成长阶段。\n\
    \n简单初始架构\n\n这是任何分布式或微服务架构的最简单形式，仅适用于为个人使用或小型初创企业提供应用服务。其基本形式由一个提供应用服务的中间层组成，该中间层连接到一个单一的、简单的数据库实例以提供持久化服务。图\
    \ 16-1 展示了其在公有云亚马逊云服务中部署时的样貌。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig1_HTML.jpg](img/477630_1_En_16_Fig1_HTML.jpg)\n\
    \n图 16-1\n简单初始架构\n\n这里有一个中间层或微服务的单一实例，以及一个数据库服务器的单一实例。此架构的可扩展性由底层硬件容量决定，在您的案例中，这取决于所选\
    \ EC2 实例的等级。亚马逊弹性计算云（Amazon EC2）是一项在云中提供安全、可调整计算容量的 Web 服务。它与大多数 AWS 服务（如亚马逊简单存储服务（Amazon\
    \ S3）、亚马逊关系数据库服务（Amazon RDS）和亚马逊虚拟私有云（Amazon VPC））集成，为跨广泛应用程序的计算、查询处理和云存储提供基础设施解决方案。\n\
    \n随着与应用交互的用户数量增长，或者当此架构需要服务的并发事务数量增加时，横向扩展的能力完全取决于您可选择的可用 EC2 实例的容量。这是有限的，并且这种可扩展性限制是此类架构设计方法固有的。\n\
    \n关于图 16-1，有几个组件需要快速介绍，因为它们将在后续讨论中被引用：\n\n*   **虚拟私有云（VPC）**：一个逻辑隔离的虚拟网络，跨越整个\
    \ AWS 区域，您的 EC2 实例在其中启动。VPC 主要涉及实现以下功能：\n\n    *   将您的 AWS 资源与其他账户的资源隔离\n    *\
    \   路由进出您的实例的网络流量\n    *   保护您的实例免受网络入侵和其他漏洞攻击\n\n*   **AWS 区域和可用区**：AWS 云基础设施围绕区域和可用区（AZ）构建。AWS\
    \ 区域提供多个物理上分离且隔离的可用区，这些可用区通过低延迟、高吞吐量和高度冗余的网络连接。这些可用区提供了比传统单数据中心基础设施或多数据中心基础设施更高度可用、容错且可扩展的基础设施。AWS\
    \ 区域与其他 AWS 区域完全隔离。AWS 云目前在全球 18 个地理区域和一个本地区域内拥有 54 个可用区。图 16-1 中描绘了一个 AWS 区域，而可用区将在下一节相关部分中展示。\n\
    \n简单横向扩展架构\n\n上一节描述的简单初始架构是最低限度的，也是麻烦最少的。如果情况允许，您可能希望采用这种极简架构，因为它能让您省心。然而，如果您的业务在此架构下取得成功，这在某种意义上意味着您将需要一个增强型架构来实现可扩展性，因为不断增长的业务绝不可能由上述极简架构来服务。简单横向扩展架构如图\
    \ 16-2 所示。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig2_HTML.jpg](img/477630_1_En_16_Fig2_HTML.jpg)\n\
    \n图 16-2\n简单横向扩展架构\n"
- fmt: '# The Simple, Scaled Out Architecture


    The simple, scaled out architecture is not that simple, but it’s simpler compared
    to the architectures you are going to visit next, hence the name. The simple,
    scaled out architecture leverages regions, availability zones, and auto scale
    groups. Each region is a separate geographic area in the AWS cloud. Each region
    has multiple, isolated locations known as availability zones.


    `Amazon EC2` provides the ability to place resources, such as instances, and data
    in multiple locations. If you host all your instances in a single location, none
    of your instances will be available if that location is badly affected. AWS regions
    and availability zones will help you here. Each region is completely independent.
    Each availability zone is also isolated, but the availability zones within a region
    are connected through low-latency links. When you launch an `EC2` instance, you
    can select an availability zone or let AWS choose one for you. If you distribute
    your `EC2` instances across multiple availability zones and if one of the instances
    fails and if you have designed your application appropriately, an instance in
    another availability zone can still handle requests.


    Auto scaling ensures that you have the right number of `EC2` instances available
    to handle the load for your application. You can create collections of `EC2` instances,
    called auto scaling groups. To the auto scaling groups you specify the minimum
    number of instances, and auto scaling ensures that your group never goes below
    this size. You can also specify the maximum number of instances in each auto scaling
    group, and auto scaling ensures that your group never goes above this size. When
    you specify the desired capacity, auto scaling ensures that your group has this
    many instances at the start. If you specify scaling policies, then auto scaling
    can launch or terminate instances as demanded by your application dynamically.


    The microservice instance in Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1)
    has to be replicated to increase scalability. Referring back to Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2),
    multiple instances of the same microservice can be instantiated in an availability
    zone. To take care of the case when an availability zone goes down, more instances
    of the same microservice can be instantiated in another availability zone. To
    take care dynamic scaling of microservices, you can design an auto scaling group.
    And this auto scaling group may span availability zones so that you have dynamic
    scalability as well as zone redundancy.


    When your compute nodes are distributed like above, you need a mechanism to distribute
    your workload too and an Elastic Load Balancer (`ELB`) can automatically distribute
    incoming application traffic across multiple targets, such as `Amazon EC2` instances,
    containers, and IP addresses. An `ELB` can handle the varying load of your application
    traffic in a single availability zone or across multiple availability zones. `ELB`s
    are of three types:


    - **Application Load Balancer**: An `ALB` is best suited for load balancing of
    HTTP and HTTPS traffic, operating at the individual request level at OSI Layer
    7.

    - **Network Load Balancer**: A `NLB` load balances TCP traffic where extreme performance
    is required, operating at the connection level at OSI Layer 4.

    - **Classic Load Balancer**: A `CLB` is intended for applications that were built
    within the `EC2-Classic` network. It provides basic load balancing across multiple
    `Amazon EC2` instances and operates at both the request level and connection level.


    Another aspect to discuss is the need to distribute data globally. This can be
    due to multiple reasons. One reason can be that the user base is distributed globally
    and hence users should be directed to microservice instances located near to that
    geography for low latency. Another reason might be to comply with data privacy
    requirements like GDPR^([^(40)](#fn40)) (General Data Protection Regulation).
    AWS regions can be leveraged here where you want to leverage microservice instances
    located across regions. This is also depicted in Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2)
    in a non-expanded form. Regional traffic routing or latency-based traffic routing
    can be done using `AWS Route 53`. `Amazon Route 53` is a highly available and
    scalable cloud Domain Name System (DNS) web service. `Route 53` makes it easy
    for you to manage traffic globally through a variety of routing types, including
    latency-based routing, `Geo DNS`, geoproximity, and weighted round robin—all of
    which can be combined with DNS failover too.


    The simple, scaled out architecture in Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2)
    is an improvement over the simple inception architecture in Figure [16-1](#477630_1_En_16_Chapter.xhtml#Fig1);
    however, careful observation of Figure [16-2](#477630_1_En_16_Chapter.xhtml#Fig2)
    reveals other concerns and limitations. The first one is that the data across
    regions is disparate; it’s not in sync automatically. Maybe that is justified
    by the very reason that compelled you to distribute applications across regions,
    like privacy. But then, concentrate within a region. Even though you can design
    microservices to have many instances, your backing data store is still a single
    instance, which is your single source of truth. This single database instance
    will still have the scalability issues discussed. You need to improvise further,
    which you will look at next.


    # Architecture to Address the Database Bottleneck


    The improvement you want to bring to the simple, scaled out architecture is required
    to address the scalability of the database instance too. `Oracle Real Application
    Cluster` (`RAC`) is a cluster database with a shared cache architecture that overcomes
    the limitations of traditional shared-nothing and shared-disk approaches to provide
    high scalability and availability to database. In a `RAC` environment, the database
    itself is shared across a pool of servers, which means that if any server in the
    server pool fails, the database continues to run on surviving servers, thus avoiding
    any single point of failure. Since there are a pool of servers, the combined memory
    capacity and processing power of the clustered database servers provide high scalability
    too. `RAC` is an active-active distributed architecture with shared database storage.
    The shared storage plays a central role in enabling automatic failover, no data
    loss, 100% data consistency, and in preventing application downtime.


    There is a catch when it comes to a public cloud like AWS. As of this writing,
    Amazon Web Services does not currently enable `Oracle RAC` natively on `Amazon
    EC2` or `Amazon RDS`. `Oracle RAC` has the following infrastructure requirements
    that are not directly available in AWS:


    - Shared high-performance storage accessible from all nodes in the cluster

    - Multicast-enabled network between all nodes in the cluster

    - Separate networks for different types of traffic: client, cluster interconnect,
    and storage


    But the happy news is that there are solutions by third-party providers that allow
    you to run `Oracle RAC` on AWS using AWS-native components, such as `Amazon EC2`,
    `Amazon Elastic Block Store` (`Amazon EBS`), and `Amazon VPC`. Figure [16-3](#477630_1_En_16_Chapter.xhtml#Fig3)
    depicts a possible architecture approach leveraging `Oracle RAC` to improve on
    the simple, scaled out architecture.


    ![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig3_HTML.jpg](images/477630_1_En_16_Chapter/477630_1_En_16_Fig3_HTML.jpg)'
