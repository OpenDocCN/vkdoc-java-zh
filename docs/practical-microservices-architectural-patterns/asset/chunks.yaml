- fmt: '# CQRS: Command Query Responsibility Segregation


    The capability to selectively scale out is one of the advantages of microservices
    architecture, provided we design the microservice to have this characteristic.
    In the “Inner Architecture Perspective” section in Chapter [4](#477630_1_En_4_Chapter.xhtml),
    I discussed the various levels of maturity with which you can design your microservices
    architecture. I introduced the `CQRS` (Command Query Responsibility Segregation)
    pattern there, so let’s look into the details of it at an architecture and design
    level. In the later part of this book you will see many samples and even a full-fledged
    application implemented using this pattern.


    ## Traditional vs. CQRS-Based Software Systems


    In traditional and monolith systems, both writes (updates to the entity) and reads
    (requests for viewing entity) are executed against the same set of entities in
    a single data repository. Usually these entities are a subset of the rows in one
    or more tables in a relational database such as `MySQL` or `PostgreSQL`. Figure
    [5-1](#477630_1_En_5_Chapter.xhtml#Fig1) represents this design.


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig1_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Same schema for read and write transactions


    Typically, in these kinds of monolith systems, all `CRUD` (Create, Read, Update,
    and Delete) operations are applied to the same physical representation of the
    entity. In `Java`, a data transfer object (`DTO`) representing an in-memory instance
    is retrieved from the data store by the data access layer (`DAL`) and rendered
    on the browser in the client device. A user can view this representation and then
    update selected fields of the `DTO` (perhaps through data binding following the
    `MVC` or `MVVM` style) and the `DTO` is then transported through software layers
    and saved back in the data store by the `DAL`. Many times the same `DTO` can be
    used for both the read and write operations, as shown.


    Even though the design is straightforward and simple, which you have been happily
    following since many years, there are a few limitations:


    - The representation of the entities required for the write and read operations
    may not be the same as expected by the layers above, so there can be a mismatch.

    - Even though concurrent reads can be allowed to happen, if a write is happening,
    then even further reads (not to mention another concurrent write operation) have
    to be controlled based on the data isolation rules expected by the application.
    This necessitates synchronization and locking, which will limit application scalability.


    In the `CQRS` pattern, the operations that read data are segregated from the operations
    that update data by separate interfaces. This implies that the data models used
    for querying the entities and updating the entities may also be different, although
    this is not an absolute requirement.


    If you decide to separate the data models, you can also think of separating them
    out into their own schemas. Whether you separate the read and write into different
    data models or different schemas, you also need to address how to replicate any
    changes happening in the write model back to the read model.


    If the write models and the read models are separated, typically it is straightforward
    to scale out the read portion into many replicas, since they are only copies or
    views of the single write model. This will help you to address scaling out your
    read models to take care the look-to-book scenarios discussed earlier. In most
    cases, the scalability requirements for the write model are in a controlled manner
    compared to those of the read model. This means you may not want to scale out
    your write models to the same degree as your read models. However, write models
    may also want to scale out to more than one for reasons of backup, redundancy,
    and so on, which will also be discussed later.


    All of this means that you have separate data models as well as data schemas for
    the read and write operations for the entities. Remember again, these two models
    or schemas are two aspects required for the same entity; just like when you look
    at a mirror, the mirror image of your face is analogous to the read model whereas
    your original face is analogous to the write model. You can feel pain if you slap
    yourself, whereas your mirror image can only “look” the pain; it can’t “feel”
    the pain since it’s analogous to the read model. Let’s bring this improvement
    into the design from Figure [5-1](#477630_1_En_5_Chapter.xhtml#Fig1); see Figure
    [5-2](#477630_1_En_5_Chapter.xhtml#Fig2).


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig2_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Separate schemas for read and write transactions


    As stated, the read store can be a read-only replica of the write store, and the
    read and write stores may have a different data structure altogether. Once you
    bring this separation between the read and write store, change synchronization
    has to be done from the write store to the read store.


    Once you separate the write part from your read part of the data store, the synchronization
    must be done irrespective of whether these read and write stores are physically
    in the same node or in two different nodes. Consequently, once the synchronization
    mechanism is in place, the next natural instinct is to separate out the read and
    write computations into their own separate nodes or processes, as shown in Figure
    [5-3](#477630_1_En_5_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig3_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Separate database nodes for read and write transactions


    The moment you separate out the read and write services into different physical
    nodes, you are in effect grabbing the extra lever of “scale out” to address the
    high look-to-book ratio mentioned earlier by instantiating more of the read services
    and keeping a single instance of the write service. See Figure [5-4](#477630_1_En_5_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig4_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Scale out using separate read and write processes


    ## The Nomenclature in CQRS


    `CQRS` is based on the notion of two concepts, commands and events. Commands and
    events are explained as follows:


    - **Commands**: The intent to change the state of an entity is modelled as a command.

    - **Events**: Once there is a change in the state of an entity, events represent
    what has changed.


    Referring to Figure [5-3](#477630_1_En_5_Chapter.xhtml#Fig3), a write transaction
    coming from the client to the presentation tier is represented by commands, which
    will encapsulate all the information required to effect a state change. Any such
    state change will result in a corresponding write to the data persistent store.
    Due to this action or effect of state change, there can be components or services
    elsewhere in the application that are interested in what has changed and there
    should be a mechanism to propagate these changes to those interested services.
    Events come handy in this case. So, if a change has happened to the state of a
    write data entity, it can be propagated to the read data entity counterparts in
    terms of events.'
