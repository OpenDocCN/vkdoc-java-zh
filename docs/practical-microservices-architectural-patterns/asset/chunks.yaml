    这里，在任何上游处理中都没有模拟错误，因此报价状态将从“新建”变为“已确认”，并且由于新报价消息成功投递到 ActiveMQ，报价结算微服务将收到该报价消息进行结算。结算监听服务将接收该消息，随后调用报价对账服务进行结算。结算过程中，买方和卖方的运行余额会被更新。然而，一旦控制权从报价对账服务返回，就会模拟一个错误，如图
    13-27 中结算监听服务第一次处理时的 X 标记所示。


    这里需要注意几点：


    *   报价对账服务执行的结算是在`TX_REQUIRES_NEW`事务上下文中完成的，因此发生在外部或父事务（结算监听服务的事务）中的错误不会影响报价对账服务的事务，所以结算的效果被提交了。


    *   尽管结算监听服务已经从 ActiveMQ 读取了消息，但处于`TX_REQUIRED`事务上下文中的消息监听方法不会提交从 ActiveMQ 读取的消息。因此，对于
    ActiveMQ 来说，消息投递并未成功，所以它会尝试再次投递该消息。


    在消息投递重试期间（即消息监听器第二次处理期间），你不会模拟任何错误，这由图 13-27 中两个服务的标记（✓）表示。因此，结算监听服务和报价对账服务的事务都将成功并提交。然而，存在一个更大的问题：报价将再次被结算，这将导致买方账户和卖方账户分别被重复增加和重复扣除。见图
    13-28。


    ![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig28_HTML.jpg](img/477630_1_En_13_Fig28_HTML.jpg)


    图 13-28

    测试用例 5 的事务语义


