- fmt: '# 使用 Protocol Buffer 修改示例


    您将修改之前演示中使用的同一个示例，以利用 Protocol Buffer。您将使用第 [8](#477630_1_En_8_Chapter.xhtml)
    章中相同组件的精简版本。因此，您的示例将包含三个主要组件：一个基于 HTML 的客户端应用程序和两个微服务，如图 [10-3](#477630_1_En_10_Chapter.xhtml#Fig3)
    所示。这里我再次移除了 HATEOAS 和数据仓库的所有复杂性，以便您可以专注于 Protocol Buffer 的使用。


    ![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig3_HTML.jpg](images/477630_1_En_10_Chapter/477630_1_En_10_Fig3_HTML.jpg)


    **图 10-3** 在微服务之间使用 Protocol Buffer


    在您的示例设计中，您使用一个`.proto`文件来指定要使用的实体。下一步是针对应用程序的编程语言（在您的案例中是 Java）在`.proto`文件上运行
    Protocol Buffer 编译器，以生成类似的类。现在，依赖微服务和独立微服务都可以根据生成的实体类进行编程，从而使使用 protocol buffer
    进行微服务间通信变得简单直接。


    ## 在 Spring Boot 中使用 Protocol Buffer 的代码


    本节的所有代码示例都在`ch08\ch10-02`文件夹中。您将首先查看独立微服务的代码，即 Product Server 微服务。请访问`pom.xml`查看
    Product Server 微服务中显式提及的`protobuf-java`和`protobuf-java-format`依赖项。请参阅清单 [10-16](#477630_1_En_10_Chapter.xhtml#PC21)。


    ```

    3.1.0

    1.4


    com.google.protobuf

    protobuf-java

    ${protobuf-java.version}


    com.googlecode.protobuf-java-format

    protobuf-java-format

    ${protobuf-java-format.version}


    org.springframework.boot

    spring-boot-starter-web


    org.springframework.boot

    spring-boot-maven-plugin


    com.github.os72

    protoc-jar-maven-plugin

    3.1.0


    generate-sources


    run


    3.1.0

    true


    src/main/resources


    src/main/protobuf


    ```


    **清单 10-16** 向 Maven 构建添加 Protocol Buffer 编译器和运行时 (`ch10\ch10-02\ProductServer\pom.xml`)


    `protoc-jar-maven-plugin`使用多平台可执行文件`protoc-jar`执行 protobuf 代码生成。在构建时，此 Maven 插件会检测平台并执行相应的`protoc`二进制文件，以便它可以使用`protoc-jar`嵌入式
    protoc 编译器编译`.proto`文件，从而在主要平台（Linux、Mac/OSX 和 Windows）之间提供一定的可移植性。在上面的`pom.xml`中，编译器在主周期中编译`.proto`文件，并将生成的文件放入`target/generated-sources`，包括`google.protobuf`标准类型以及任何所需的额外导入。


    `protobuf-java` Maven 工件提供了在 Java 中序列化生成的消息对象所需的 Java API。因此，它充当 Protocol Buffer
    的运行时。


    请注意，编译器版本应与 Java API 版本相同。在您的示例中，您使用的是 3.1.0 版本。


    `protobuf-java-format` Maven 工件提供了基于 Google 的 protobuf Message 的不同格式的序列化和反序列化。它允许将默认（字节数组）输出覆盖为基于文本的格式，例如
    XML、JSON 和 HTML。


    现在，查看清单 [10-17](#477630_1_En_10_Chapter.xhtml#PC22) 中显示的 Protocol Buffer 类型声明。


    ```

    syntax = "proto3";

    package binildas;

    option java_package = "com.acme.ecom.product.model";

    option java_outer_classname = "ECom";

    message Products {

    repeated Product product = 1;

    }

    message Product {

    string productId = 1;

    string name = 2;

    string code = 3;

    string title = 4;

    string description = 5;

    string imgUrl = 6;

    double price = 7;

    string productCategoryName = 8;

    }

    ```


    **清单 10-17** `product.proto` 中的类型声明 (`ch10\ch10-02\ProductServer\src\main\resources\product.proto`)


    由于您使用的是 protocol buffer 编译器和 protocol buffer 语言运行时的第 3 版，因此`.proto`文件必须以`syntax
    = "proto3"`声明开头。如果使用编译器版本 2，则此声明将被省略。


    `.proto`文件接下来应该有一个包声明，这有助于防止不同项目之间不同类型声明的命名冲突。在 Java 中，除非您像这里一样显式指定了`java_package`，否则此包名称也用作
    Java 包。


    接下来是两个 Java 特定的选项：`java_package`和`java_outer_classname`。`java_package`选项指定生成的类应位于哪个
    Java 包中。如果您没有显式指定，它将与包声明给出的包名称匹配。`java_outer_classname`选项定义了容器类名称，该名称应包含类型定义文件中生成的所有类。


    接下来，您为要序列化的每个数据结构添加一个消息，然后为消息中的每个字段指定名称和类型。消息是一个包含一组类型化字段的聚合体。许多标准简单数据类型可用作字段类型，包括`bool`、`int32`、`float`、`double`和`string`。您还可以将其他消息类型添加为字段类型；在您的示例中，`Products`消息包含
    Product 消息。`= 1`、`= 2`、`= 3`等是每个元素上的标记，用于标识该字段在二进制编码中使用的唯一“标签”。


    字段可以使用以下修饰符之一进行注释：


    - **required**：表示必须提供该字段的值；否则，该消息将被视为“未初始化”。

    - **optional**：表示该字段可以设置也可以不设置。如果未设置可选字段的值，则使用默认值，例如数值类型为 0，字符串为空字符串，布尔值为 false
    等。

    - **repeated**：表示该字段可以重复任意次数（包括零次）。重复值的顺序将在 protocol buffer 中保留。


    接下来，查看清单 [10-18](#477630_1_En_10_Chapter.xhtml#PC23) 中的 Product Server Controller。


    ```

    package com.acme.ecom.product.controller;

    import com.acme.ecom.product.model.ECom.Product;

    import com.acme.ecom.product.model.ECom.Products;

    @RestController

    public class ProductRestController {

    @RequestMapping(value = "/products", method = RequestMethod.GET)

    public  Products getAllProducts() {

    List products = getAllTheProducts();

    if(products.isEmpty()){

    LOGGER.debug("No products retreived from repository");

    }

    products.forEach(item->LOGGER.debug(item.toString()));

    Products productsParent =

    Products.newBuilder().addAllProduct(products).build();

    return productsParent;

    }

    }

    ```


    **清单 10-18** 用于发出 Protocol Buffer 的 Product Rest Controller (`ch10\ch10-02\ProductServer\src\main\java\com\acme\ecom\product\controller\ProductRestController.java`)


    除了需要导入在外部容器类`ECom`中定义的`Products`和`Product` Java 类型之外，Rest Controller 没有其他明显的区别。


    您现在需要使用所需的库来装备微服务运行时，以序列化和反序列化为 Protocol Buffer 格式。Spring 的`ProtobufHttpMessageConverter`可以方便地在内部利用
    Google 的库。此转换器默认支持`application/x-protobuf`和`text/plain`以及官方的`com.google.protobuf:protobuf-java`库。需要注意的是，如果类路径上有正确的附加库，也可以支持其他格式。您将在配置类中实例化此
    bean；请参阅清单 [10-19](#477630_1_En_10_Chapter.xhtml#PC24)。'
