    \ RuntimeException(\"Out of stock\");\n}\n}\n}\nListing 12-5\nProduct Aggregate\
    \ Entity (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\main\\java\\com\\\
    acme\\ecom\\product\\model\\Product.java)\n```\n\nThe `Product`\naggregate  is\n\
    similar in structure and functionality to that of the `Order` aggregate,\nhence\
    \ the explanation won’t be repeated here."
  trans: '

    现在我将解释 Axon 特有的组件。SimpleCommandBus 会在分派命令的同一线程中直接处理命令。命令处理完成后，修改后的聚合会被保存，并且任何生成的事件都会在同一线程中发布。


    聚合 是一个始终保持一致状态的实体或实体组。聚合根 是聚合树顶层的对象，负责维护这种一致状态。例如，一个订单聚合可能包含订单项和送货地址等实体。为了保持整个聚合的一致状态，更改此订单的地址应通过订单聚合进行，而不是直接访问地址实体。


    SimpleCommandBus 为每个发布的命令维护一个工作单元（UoW）的概念。由于所有命令处理都在同一线程中完成，此实现仅限于单个 JVM 的边界内。


    工作单元 是对聚合进行的一组修改。命令的执行通常发生在工作单元的范围内。当命令处理程序执行完毕时，UoW 会被提交，所有操作都会最终确定。这意味着任何存储库都会收到其聚合状态变更的通知，并且计划发布的事件会被发送到事件总线。这是一种便捷的分组方式，有助于防止在处理完多个聚合之前发布单个事件。在后台，它允许存储库在整个事务中管理资源，例如锁。例如，锁只会在工作单元被提交或回滚时释放。


    工作单元不能替代传统的 ACID 风格事务。它只是一个缓冲区域，用于分组和暂存更改。当工作单元被提交时，所有暂存的更改都会被提交；但是，此提交不是原子性的。这意味着如果提交失败，可能部分更改已被持久化，而其他更改则没有。因此，Axon
    的最佳实践规定，一个命令应始终只包含一个操作。如果你的工作单元中有更多操作，则应考虑为工作单元的提交附加一个事务，关于这一点你可以参考 Axon 文档。


    SimpleEventBus，顾名思义，是 EventBus 接口的一个非常基础的实现，是一种用于将事件分派给已订阅事件监听器的机制。当事件分派是同步且本地（即在单个
    JVM 中）进行时，它表现良好。它管理已订阅的 EventListener，并将所有传入的事件转发给所有已订阅的监听器。EventListener 必须显式地向事件总线注册，才能接收事件。注册过程是线程安全的，监听器可以随时注册和注销事件。如果
    EventListener 抛出异常，事件分派将停止，并且异常会传播给发布事件的组件。


    AnnotationCommandHandlerBeanPostProcessor 会自动将包含命令处理程序方法（即使用 `@CommandHandler`
    注解的方法）的类注册到命令总线。


    *   此 Bean 后处理器会扫描应用程序上下文，查找所有包含带有 `@CommandHandler` 注解方法的 Bean。

    *   所有此类命令处理程序都会被自动识别并订阅到命令总线。


    AnnotationEventListenerBeanPostProcessor 会自动将应用程序上下文中包含事件处理程序方法（即使用 `@EventHandler`
    注解的方法）的类注册，并自动将它们连接到事件总线。


    *   此 Bean 后处理器会扫描应用程序上下文，查找所有包含带有 `@EventHandler` 注解方法的 Bean。

    *   所有此类事件监听器都会被自动识别并订阅到事件总线。


    命令网关是命令分派机制的一个便捷接口。使用网关来分派命令是可选的；然而，这通常是最简单的方式。CommandGateway 是接口，DefaultCommandGateway
    是 Axon 提供的默认实现。网关提供了多种方法，允许你发送命令并等待结果，可以是同步、带超时或异步的。


    GenericJpaRepository 是一个存储库实现，可以存储与 JPA 兼容的聚合。它配置了一个 EntityManager 来管理实际的持久化，以及指定存储在存储库中的聚合实际类型的类，在你的例子中是
    `Product` 和 `Order`。所有带有 JPA 注解的聚合必须实现 AggregateRoot 并具有正确的 JPA 注解。存储库可以配置锁定方案。存储库将始终在底层持久化存储中强制使用乐观锁。可以为存储库配置一个可选的锁，在这种情况下，它将作为此乐观锁的补充。一个存储库实例上的锁不会与其他存储库实例共享。当请求此存储库持久化对聚合的更改时，它还会刷新
    EntityManager，在此期间它将强制检查数据库约束和乐观锁。现在让我们看看你的 AggregateRoot 实体；参见清单 12-4。


    ```

    import org.axonframework.domain.AbstractAggregateRoot;

    @Entity

    @Table(name="ECOM_ORDER")

    @Data

    @EqualsAndHashCode(exclude = { "id" })

    public class Order extends AbstractAggregateRoot {

    @Id

    private Integer id;

    @Column(name="PRICE")

    private Double price;

    @Column(name="NUMBER")

    private Integer number;

    @Column(name="ORDER_STATUS")

    @Enumerated(EnumType.STRING)

    private OrderStatusEnum orderStatus; ;

    @ManyToOne(fetch=FetchType.LAZY)

    @JoinColumn(name="PRODUCT_ID")

    private Product product;

    @Override

    public Integer getIdentifier() {

    return id;

    }

    public Order(Integer id, Double price, Integer number,

    OrderStatusEnum orderStatus, Product product) {

    super();

    this.id = id;

    this.price = price;

    this.number = number;

    this.orderStatus = orderStatus;

    this.product = product;

    registerEvent(new OrderCreatedEvent(id, price, number,

    product.getDescription(), orderStatus.toString()));

    }

    }

    清单 12-4

    订单聚合实体 (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\order\model\Order.java)

    ```


    `Order` 继承了 AbstractAggregateRoot，这是 AggregateRoot 接口的一个非常基础的实现。它提供了跟踪所有未提交事件的机制，并且还根据生成的事件数量维护一个版本号，该版本号可用于提交期间的验证。此外，`Order`
    实体还使用 `registerEvent` 方法注册在保存聚合时要发布的事件。接下来，你将看到清单 12-5 中的 `Product` 聚合。


    ```

    @Entity

    @Table(name="ECOM_PRODUCT")

    @Data

    @EqualsAndHashCode(exclude = { "id" })

    public class Product extends AbstractAggregateRoot {

    @Id

    private Integer id;

    @Column(name="PRICE")

    private Double price;

    @Column(name="STOCK")

    private Integer stock;

    @Column(name="DESCRIPTION")

    private String description;

    @Override

    public Integer getIdentifier() {

    return id;

    }

    public void depreciateStock(int count) {

    if(this.stock >= count){

    this.stock = this.stock - count;

    registerEvent(new StockUpdatedEvent(id, stock));

    }else{

    throw new RuntimeException("Out of stock");

    }

    }

    }

    清单 12-5

    产品聚合实体 (ch12\ch12-01\Ax2-Commands-Events-Same-JVM\src\main\java\com\acme\ecom\product\model\Product.java)

    ```


    `Product` 聚合在结构和功能上与 `Order` 聚合相似，因此此处不再重复说明。

