    \ the servers goes down, the load balancer will redirect all\nsubsequent traffic\
    \ to the remaining online server. This is a simple\nmechanism which, if carefully\
    \ extended, can be utilized to design HA for\ndifferent elements. The Internet,\
    \ internal networks, network devices,\nand software components are all elementary\
    \ links of an end-to-end HA\nchain. You will look at the essential links required\
    \ for our discussion\nso that the concepts and the sample demonstrated towards\
    \ the end of the\nchapter will make sense to you. Also, I will explain aspects\
    \ in the\ncontext of an on-premises or private data center in this chapter. In\n\
    Chapter [16](#477630_1_En_16_Chapter.xhtml), when I describe advanced HA\npatterns,\
    \ I will explain in the context of a public cloud so that you\nwill have a broader\
    \ view of how HA has to be looked at both in the\ncontext of a private and a public\
    \ cloud.\n\nDNS Redundancy\nThe “The Bootstrap URL” section in Chapter [8](#477630_1_En_8_Chapter.xhtml)\
    \ introduced the Domain Name System\n(DNS)  into the\nmicroservices architecture.\
    \ Since the DNS serves as the phone\nbook for the Internet by translating human-friendly\
    \ computer hostnames\ninto IP addresses, it serves as the bootstrap mechanism\
    \ for most of the\nsoftware-related operations through the Internet. It makes\
    \ sense to\nunderstand availability starting from this point onwards. This means\
    \ you\nneed to understand mechanisms for DNS redundancy.\n\nDNS outages may happen\
    \ due to configuration errors, infrastructure\nfailure, or a DDoS attack. DNS\
    \ redundancy is a failsafe solution or a\nbackup mechanism for such scenarios.\
    \ If the DNS name servers are\noverloaded with more requests than they can serve,\
    \ or they are down or\nresponding sluggishly due to any of the above reasons,\
    \ this creates\nlatency in the DNS network, making the resolution process sluggish\
    \ and\neventually the DNS server will be rendered unavailable for most users.\n\
    You can introduce DNS redundancy to the single-server architecture by\nexpanding\
    \ the number or choice of name servers that are available so\nthat there are more\
    \ name servers responding to the DNS queries. Figure\n[9-1](#477630_1_En_9_Chapter.xhtml#Fig1)\
    \ shows a typical\nredundant DNS setup where each DNS server has the capability\
    \ to act as a\nprimary server responding to DNS queries.\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\nDNS\nredundancy\n\nLet’s look into more details of this now; see\
    \ Figure [9-2](#477630_1_En_9_Chapter.xhtml#Fig2). When setting up\nDNS redundancy,\
    \ the servers can be set up as either primary, secondary\nor as primary, primary.^([^(16)](#fn16))\
    \ Maintaining\nmultiple DNS providers and keeping them in sync is a complex process,\n\
    but it ensures higher availability without compromising the advanced DNS\nfunctionalities\
    \ supported by the DNS providers. When evaluating multiple\nDNS providers for\
    \ your multi-DNS network, consider the global point of\npresence (PoP) of the\
    \ providers and make sure these providers on\nseparate networks can be seamlessly\
    \ integrated using APIs.\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\nHow DNS redundancy works\n\nDNS Load Balancing\nOnce DNS redundancy\
    \ is taken care, you need to think about DNS load balancing. A\nDNS load balancer\
    \ reviews a list of servers and sends one connection to\neach server in turn.\
    \ When a DNS change takes place, it has to be\nrecorded on the ISP (Internet Service\
    \ Provider) level. ISPs only refresh\ntheir DNS cache once every TTL (time to\
    \ live) cycle. This implies that\nuntil the cache is updated, the ISPs are unaware\
    \ of any changes that\ntook place and continue to route traffic to the wrong server.\n\
    \nInstead of local load balancing, you can opt for global load balancing.\nGlobal\
    \ DNS load balancing distributes traffic across multiple data\ncenters to improve\
    \ performance and availability; however, it again\ndepends on your strategy for\
    \ hosting across geographies. If your hosting\nis active-active across geographies,\
    \ you can opt for global load\nbalancing. There are solutions that can monitor\
    \ connection quality\nbetween geographically dispersed sites at any given time,\
    \ and also the\nactual requester geographical location and route traffic based\
    \ on it.\nSee Figure [9-3](#477630_1_En_9_Chapter.xhtml#Fig3).\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3\nGlobal server load balancing\n\nISP Redundancy\n\nISPs provide you\n\
    with pipes (or connections) from your enterprise to the Internet (Figure\n[9-4](#477630_1_En_9_Chapter.xhtml#Fig4)).\
    \ If this pipe\nor path is down, it affects your network connectivity, which in\
    \ turn\naffects your enterprise application availability. This is where ISP\n\
    redundancy comes to your rescue.\n\n![../images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg](images/477630_1_En_9_Chapter/477630_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\nEnterprise connectivity to an ISP"
