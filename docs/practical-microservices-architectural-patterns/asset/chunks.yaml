- fmt: "Instead of publishing all events to all saga instances in the system, Axon\
    \ will only publish events containing properties that the saga has been associated\
    \ with. This is done using association values. An association value consists of\
    \ a key and a value. The key represents the type of identifier used, for example\
    \ `orderId` in the code above. The value represents the corresponding value of\
    \ the order ID. The `@SagaEventHandler` annotation has two attributes, of which\
    \ `associationProperty` is the most important one. This is the name of the property\
    \ on the incoming event that should be used to find associated sagas. The key\
    \ of the association value is the name of the property. The value is the value\
    \ returned by property’s getter method.\n\n## Microservice 4: 04-Ecom-EventHandleCore\n\
    \nAs the name of the microservice hints, it contains the two main event handlers,\
    \ `OrderEventHandler` and `ProductEventHandler`, and their functionality is to\
    \ update the views of Order and Product respectively, in response to the following\
    \ events:\n\n- `OrderCreatedEvent`\n- `OrderConfirmedEvent`\n- `OrderCancelledEvent`\n\
    - `StockUpdatedEvent`\n\nListing [15-5](#477630_1_En_15_Chapter.xhtml#PC11) shows\
    \ the order event handler code, which updates the order view.\n\n```java\n@Component\n\
    public class OrderEventHandler {\n@Autowired\nDataSource dataSource;\n@EventHandler\n\
    public void handleOrderCreatedEvent(OrderCreatedEvent event) {\nJdbcTemplate jdbcTemplate\
    \ = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"INSERT INTO ecom_order_view\
    \ VALUES(?,?,?,?,?)\",\nnew Object[]{event.getOrderId(), event.getPrice(),\nevent.getNumber(),\
    \ event.getProductDescription(), NEW});\n}\n@EventHandler\npublic void handleOrderConfirmedEvent(OrderConfirmedEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CONFIRMED, event.getOrderId()});\n\
    }\n@EventHandler\npublic void handleOrderCancelledEvent(OrderCancelledEvent event)\
    \ {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    UPDATE ecom_order_view SET status=?\nWHERE id =?\", new Object[]{CANCELLED, event.getOrderId()});\n\
    }\n}\n```\n\nListing 15-5  \nOrder Event Handler (`ch15\\ch15-01\\Ax2-Saga\\04-Ecom-EventHandleCore\\\
    src\\main\\java\\com\\acme\\ecom\\order\\eventhandler\\OrderEventHandler.java`)\n\
    \nListing [15-6](#477630_1_En_15_Chapter.xhtml#PC12) shows the product event handler\
    \ code, which updates the product view.\n\n```java\n@Component\npublic class ProductEventHandler\
    \ {\n@Autowired\nDataSource dataSource;\n@EventHandler\npublic void handleProductStockUpdatedEvent(StockUpdatedEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    UPDATE ecom_product_view SET stock=?\nWHERE ID=?\", new Object[]{event.getStock(),\
    \ event.getId()});\n}\n}\n```\n\nListing 15-6  \nProduct Event Handler (`ch15\\\
    ch15-01\\Ax2-Saga\\04-Ecom-EventHandleCore\\src\\main\\java\\com\\acme\\ecom\\\
    product\\eventhandler\\ProductEventHandler.java`)\n\n## Microservice 5: 05-Ecom-EventHandlerAudit\n\
    \nThis microservice makes audit entries to all major events happening against\
    \ the domain entities. Listing [15-7](#477630_1_En_15_Chapter.xhtml#PC13) shows\
    \ the audit event handler.\n\n```java\n@Component\npublic class AuditEventHandler\
    \ {\n@Autowired\nDataSource dataSource;\n@EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ event.getOrderStatus(),\nnew Date()});\n}\n@EventHandler\npublic void handleOrderConfirmedEvent(OrderConfirmedEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ CONFIRMED, new Date()});\n}\n@EventHandler\npublic void handleOrderCancelledEvent(OrderCancelledEvent\
    \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
    INSERT INTO ecom_order_audit VALUES(?,?,?)\",\nnew Object[]{event.getOrderId(),\
    \ CANCELLED, new Date()});\n}\n}\n```\n\nListing 15-7  \nAudit Event Handler (`ch15\\\
    ch15-01\\Ax2-Saga\\05-Ecom-EventHandlerAudit\\src\\main\\java\\com\\acme\\ecom\\\
    order\\eventhandler\\AuditEventHandler.java`)\n\nThe audit event handler creates\
    \ audit rows and updates them as the status of order changes. That’s all of the\
    \ main classes. There are few other classes like the `Command`, `Event`, and `Data\
    \ Transfer` classes, which are simple and straightforward so I won’t explain them\
    \ here.\n\n## Build and Test the Saga Example\n\nAs the first step, you need to\
    \ bring up MongoDB. You may want to refer to Appendix A to get started with MongoDB.\n\
    \n```\nD:\\Applns\\MongoDB\\Server\\3.2.6\\bin>mongod.exe --dbpath D:\\Applns\\\
    MongoDB\\Server\\3.2.6\\data\n```\n\nNext, you need to bring up the RabbitMQ server.\
    \ You may want to refer to Appendix B to get started with the RabbitMQ server.\n\
    \n```\nD:\\Applns\\RabbitMQ\\rabbitmq_server-3.6.3\\sbin>D:\\Applns\\RabbitMQ\\\
    rabbitmq_server-3.6.3\\sbin\\rabbitmq-server.bat\n```\n\nMake sure MySQL is up\
    \ and running. You may want to refer to Appendix H to get started with MySQL.\n\
    \n```\nBring Up MySQL Server\ncd D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin\n\
    D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin>mysqld --console\nNow Open MySQL prompt\n\
    D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin>mysql -u root -p\nmysql> use ecom01;\n\
    Database changed\nmysql>\n```\n\nTo start with clean tables, delete any tables\
    \ with the names you want for your examples:\n\n```sql\nmysql> drop table ecom_order;\n\
    mysql> drop table ecom_product;\nmysql> drop table ecom_order_view;\nmysql> drop\
