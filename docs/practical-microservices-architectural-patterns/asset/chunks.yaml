    设计与编码领域实体


    为了本节示例的需要，我们将保持领域实体非常简单。该实体是一个典型的可在电商网站上架的商品。多个商品归属于一个商品类别，因此在网站上，你可以先展示商品类别，在线用户可以通过浏览商品类别来查看所选类别下的所有可用商品。图
    7-2 展示了领域实体的设计。这是一个基础设计，将帮助你管理商品类别与商品之间的关系，以满足在所选商品类别下列出所有可用商品的需求。


    ![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig2_HTML.jpg](img/477630_1_En_7_Fig2_HTML.jpg)


    图 7-2

    商品/商品类别领域模型


    清单 7-4 展示了实现此功能所需的代码。


    ```

    public class Product {

    @Id

    private String id;

    private String name;

    private String code;;

    private String title;

    private String description;

    private String imgUrl;

    private Double price;

    private String productCategoryName;

    }

    public class ProductCategory {

    @Id

    private String id;

    private String name;

    private String title;

    private String description;

    private String imgUrl;

    }

    清单 7-4

    商品/商品类别领域模型 (ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\model\Product.java)

    ```


    清单 7-4 还揭示了一个配置为自动生成的 `id` 对象，因此你无需手动处理它。


    编码仓库


    仓库是一个接口，它允许你执行涉及 `Product` 和 `ProductCategory` 对象的各种操作。它通过扩展 Spring MongoDB 项目
    API 中定义的 MongoRepository 接口来获得这些操作。MongoRepository 提供的基本功能包括：


    *   支持对特定类型的仓库进行通用的 CRUD 操作

    *   使用分页和排序抽象来检索实体的方法


    参见清单 7-5。


    ```

    @RepositoryRestResource(collectionResourceRel = "products", path = "products")

    public interface ProductRepository extends MongoRepository  {

    public List findByProductCategoryName(

    @Param("productCategory") String  productCatagoryName);

    }

    @RepositoryRestResource(collectionResourceRel = "categories",

    path = "categories")

    public interface ProductCategoryRepository extends

    MongoRepository  {

    }

    清单 7-5

    商品和商品类别 Mongo 仓库 (ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\repository\ProductRepository.java)

    ```


    这里你定义了一个自定义查询，用于根据 `Category` 检索 `Product` 对象列表。你可以向上述仓库接口定义更多抽象的实用方法，从而免费获得它们的实现，但为了满足你的目的，我将其限制为清单
    7-5 所示。在运行时，Spring Data REST 会自动创建上述接口的实现。然后，它将使用 `@RepositoryRestResource` 注解来指示
    Spring MVC 在 `/products` 和 `/categories` 路径下创建 RESTful 端点。


    编码启动应用程序可执行文件


    如果需要，你可以修改 `EcomProductMicroserviceApplication.java` 文件。清单 7-6 显示了之前生成的默认代码。这是一个简单的
    Java 类，带有一个 `main()` 方法，因此它可以作为一个独立的 Java 应用程序运行，并使用嵌入式 Tomcat Servlet 容器作为 HTTP
    运行时。


    ```

    @SpringBootApplication

    public class EcomProductMicroserviceApplication {

    public static void main(String[] args) {

    SpringApplication.run(EcomProductMicroserviceApplication.class,

    args);

    }

    }

    清单 7-6

    Spring Boot 应用程序 (ch07\ch07-01\src\main\java\com\acme\ch07\ex01\product\EcomProductMicroserviceApplication.java)

    ```

