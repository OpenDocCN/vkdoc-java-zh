    在清单 19-16 的 OrderCommandHandler 和清单 19-17 的 InventoryCommandHandler 中，你需要注意到一个方面：所有处理器方法都在事务上下文中执行。然而，这里没有分布式事务或两阶段提交操作，也没有涉及多个聚合根的
    ACID 事务。只有局限于单个聚合根实体的本地事务。

