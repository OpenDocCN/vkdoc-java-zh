    \nFigure 11-8.\nMicroservices race\ncondition\n\n*   Last seat in an airline booking\
    \ application\n\n*   Last room in a hospitality booking portal\n\n*   Last item\
    \ of a particular product in an e-commerce\n    application\n\nAssume that Joe\
    \ and Ann, sitting at two different parts of the globe,\nare both interested in\
    \ an older version of Mac Book Pro, which is\noffered at a good discount on the\
    \ e-commerce site. Also assume that\nthere is just one of this item left for sale\
    \ on the e-commerce site.\nBoth Joe and Ann have searched, reviewed, and finally\
