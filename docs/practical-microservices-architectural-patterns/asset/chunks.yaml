    *   `void configure(ClientDetailsServiceConfigurer clients)`: 该方法用于配置 `ClientDetailsService`（提供
    OAuth2 客户端详细信息的服务），例如声明各个客户端及其属性。请注意，除非向 `configure` 方法提供了 `AuthenticationManager`，否则密码授权模式不会被启用（即使某些客户端被允许使用）。必须至少声明一个客户端或一个完整自定义的
    `ClientDetailsService`，否则服务器将无法启动。您已注册了另一个客户端，并授权了“implicit”、“password”、“authorization_code”和“refresh_token”授权类型。为了使用“password”授权类型，您需要注入并使用
    `AuthenticationManager` bean。该认证管理器将代表 Web 安全用户。


    *   `void configure(AuthorizationServerEndpointsConfigurer endpoints)`: 您可以在此处配置授权服务器端点的非安全特性，例如令牌存储、令牌自定义、用户审批和授权类型。默认情况下，您无需执行任何操作，除非您需要密码授权，在这种情况下，您需要提供一个认证管理器。


    默认情况下，Spring Security 会提供 UUID 格式的 `access_token` 和 `refresh_token`，然后由资源服务器进行验证。如果您的服务有大量请求，这可能会使授权服务器成为瓶颈。相反，根据之前关于令牌和
    JWT 的讨论，您可以让授权服务器签发包含验证用户所需全部信息的签名 JWT。为此，您需要 `JwtTokenStore` 和 `JwtAccessTokenConverter`。您可以使用一个自定义的
    `JwtAccessTokenConverter`，它将使用预生成的证书进行 JWT 签名。为此，您必须使用您的 `keyPair` 配置并配置一个自定义的
    `JwtAccessTokenConverter`，如清单 18-11 所示。`JwtAccessTokenConverter` 在 JWT 编码的令牌值与
    OAuth 认证信息之间进行双向转换。当令牌被授予时，它还充当 `TokenEnhancer`（一个在访问令牌被 `AuthorizationServerTokenServices`
    实现存储之前对其进行增强的策略类）。`TokenStore` 代表存储 OAuth 访问令牌的存储机制。Spring 支持不同类型的令牌存储，例如 `InMemoryTokenStore`、`JDBCTokenStore`、`JwtTokenStore`
    等。在您的场景中，您使用 `JwtTokenStore`。JWT 版本的存储（`JwtTokenStore`）将所有关于授权的数据编码到令牌本身中，并且不持久化任何数据。一旦您创建了
    `JwtTokenStore` 和 `JwtAccessTokenConverter` bean，就可以在 `OAuth2Configuration` 类中将它们连接到
    `AuthorizationServerEndpointsConfigurer`。


    资源服务器


    接下来，您可以使用 `@EnableGlobalMethodSecurity` 注解在任何 `@Configuration` 实例上为您的资源服务器启用基于注解的安全性。这将启用
    Spring 方法级安全性。请参见清单 18-12。


    ```

    @Configuration

    @EnableGlobalMethodSecurity(prePostEnabled = true)

    public class GlobalMethodSecurityConfiguration   {

    }

    清单 18-12

    EnableGlobalMethodSecurity (ch18\ch18-01\Ax2-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\security\GlobalMethodSecurityConfiguration.java)

    ```


    `@EnableGlobalMethodSecurity` 可以接受几个参数：


    *   `prePostEnabled`：决定是否启用 Spring Security 的前置和后置注解（`@PreAuthorize`、`@PostAuthorize`
    等）。

    *   `secureEnabled`：决定是否启用 Spring Security 的 `@Secured` 注解。

    *   `jsr250Enabled`：决定是否启用 JSR-250 注解（`@RolesAllowed` 等）。


    对于任何接口或类，您应该在同一个应用程序中只启用一种类型的注解；否则，行为将无法明确定义。如果发现两个注解适用于同一个特定方法，则只会应用其中一个。


    您使用 `prePostEnabled = true`，并且 Spring 的 `@PreAuthorize`/`@PostAuthorize` 注解是应用方法级安全性的首选方式。它们支持
    Spring 表达式语言并提供基于表达式的访问控制。让我们看看它们是如何在这里被利用的：


    *   `@PreAuthorize`：适用于在进入方法之前验证授权。`@PreAuthorize` 可以考虑登录用户的角色/权限、传递给方法的参数等。

    *   `@PostAuthorize`：可以在方法执行后检查授权。它适用于验证返回值的授权；然而，它并不常用。Spring EL 提供了一个 `returnObject`，可以在表达式语言中访问，它反映了从方法返回的实际对象。


    接下来，您需要配置资源服务器。`@EnableResourceServer` 是 OAuth2 资源服务器的一个便捷注解，它启用了一个 Spring Security
    过滤器，该过滤器通过传入的 OAuth2 令牌对请求进行身份验证。这启用了一个名为 `OAuth2AuthenticationProcessingFilter`
    的 Spring Security 过滤器，它使用传入的 OAuth2 令牌对请求进行身份验证。您应该添加此注解，并提供一个类型为 `ResourceServerConfigurer`
    的 `@Bean`（例如通过 `ResourceServerConfigurerAdapter`），用于指定资源的详细信息（URL 路径和资源 ID）。您创建了一个名为
    `CoreResourceServerConfiguration` 的 bean，它扩展了 `ResourceServerConfigurerAdapter`
    并重写了 `configure(HttpSecurity http)` 方法以启用 Ecom-core 微服务的安全性。请参见清单 18-13。


    ```

    @Configuration

    @EnableResourceServer

    public class CoreResourceServerConfiguration extends ResourceServerConfigurerAdapter{

    @Autowired

    TokenStore tokenStore;

    @Autowired

    JwtAccessTokenConverter tokenConverter;

    @Override

    public void configure(HttpSecurity http) throws Exception {

    http

    .csrf().disable()

    .authorizeRequests()

    .anyRequest().authenticated()

    .antMatchers(HttpMethod.POST).hasAuthority("ORDER_WRITE")

    .antMatchers(HttpMethod.DELETE).hasAuthority("ORDER_WRITE");

    }

    @Override

    public void configure(ResourceServerSecurityConfigurer resources)

    throws Exception {

    resources.resourceId("CORE").tokenStore(tokenStore);

    }

    }

    清单 18-13

    启用资源服务器 (ch18\ch18-01\Ax2-Ecom-With-Security\Ecom-core\src\main\java\com\acme\ecom\core\security\CoreResourceServerConfiguration.java)

    ```


    在 `configure` 方法中，您使用传入的 `HttpSecurity` 实例来保护 POST 和 DELETE 方法，并且只允许具有 `ORDER_WRITE`
    权限的已认证用户访问资源。然后，您使用 `ResourceServerSecurityConfigurer` 类创建一个名为 `CORE` 的资源 ID。此资源
    ID 的名称必须与授权服务器中使用的名称匹配。


    接下来，您需要从加密的 JWT 中读取值。正如您已经看到的，`JwtAccessTokenConverter` 有助于在 JWT 编码的令牌值和 OAuth
    认证信息之间进行双向转换。由于您使用非对称加密，并且令牌已经由授权服务器使用私钥加密，因此您现在将使用公钥对进行解密和读取。请参见清单 18-14。

