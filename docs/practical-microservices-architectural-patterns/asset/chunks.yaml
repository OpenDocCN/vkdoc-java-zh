    ### About the Author


    ### About the Technical Reviewer


    # 1. Distributed Computing Architecture Landscape


    The technology landscape within any given enterprise of considerable size is often
    very complex, with aging legacy systems, fragmented by business verticals, internal
    departments, a supply chain, and so on. In some cases, enterprises have more than
    one system per business process, given that many enterprises have grown through
    mergers and acquisitions and thus kept multiple systems and also operate internationally
    and need to maintain links to different partners and service providers. As a result,
    the technology infrastructure is often described as “spaghetti architecture,”
    with many-to-many direct dependencies between business systems, partner and supply
    chain systems, and other service providers.


    Starting from the early computer era, we have been developing software to build
    the above mentioned systems. We evolved from the early punch cards to the next
    generation assembly languages and then to the era of FORTRAN and COBOL, which
    further got replaced with C, Smalltalk, and others, and then to C++, Java, and
    C#. The evolution continues. Architecture has to be adaptable to the programming
    paradigm, including to the programming language and tools of choice. Any software
    system of considerable functionality and size has to be built as an afterthought
    of a suitable software architecture. Sticking to a single or similar software
    architecture, we can build software systems for varied domains and functionality,
    but no one can build all kinds of systems adopting the same architecture. Thus,
    the architectural style of software systems must be adapted based on a plethora
    of considerations, including but not limited to:


    - Business domain

    - Functionality and usage scenarios

    - Non-functional requirements and usage environments

    - Devices and channels used to interact with the systems

    - Programming tools used to build the systems

    - Infrastructure used to operate the systems


    ## System Architectures


    If we trace back, we have been happily and successfully building software systems
    using a variety of system architectures. Notable among them in the last few years
    are the following:


    - Mainframe architecture

    - Client-server architecture

    - Three-tier architecture

    - N-tier architecture


    Let’s look at some of the salient features of these architectures with the help
    of Figure [1-1](#477630_1_En_1_Chapter.xhtml#Fig1).


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig1_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1.** Different forms of system architectures


    ### Mainframe Architecture


    In the mainframe-based architecture, processing power is centralized and multiple
    clients can be connected to this central compute source using low-powered terminals.
    The terminals are more or less dumb in the sense that they are simple screens
    that can only assemble character-oriented commands and these commands can be then
    sent to the central mainframe computer, where the commands get executed. Any response
    from the mainframe computer is also received back by these terminals as character
    streams and rendered so that the user can read through them for human interpretation.


    ### Client-Server Architecture


    The client-server architecture is characterized by one high-powered server to
    which multiple clients can be connected using comparatively low-powered systems
    called clients. The server hosts data validation rules, business logic to modify
    data, and data storage functionality whereas the client hosts data entry mechanisms,
    data validation rules, and some or nil business logic. These kinds of clients
    are also called thick clients since in many cases the client-side code is written
    in languages native to the client operating system, making it easy to fulfil rich
    user interface (UI) requirements.


    ### Three-Tier Architecture


    Similar to two-tier architecture, the three-tier architecture also has a client
    tier. The client hosts data entry mechanisms, data validation rules, and some
    or nil business logic. These clients may be built using languages native to the
    client operating system, thus providing a rich UI; alternatively, the clients
    can also be built using HTTP- and HTML-based web browser-compatible languages.
    In the latter case, the client tier can also be split into another tier called
    the presentation tier, where the client tier only has data input, data validation,
    and UI rendering logic, and most of the business logic is moved to the next tiers
    (the presentation tier or the middle tier). The major difference from two-tier
    architecture is on the server side where the data management and storage logic
    are separated out from the data validation rules and business logic and are kept
    on a separate server of their own, often termed as a database server. Similar
    to that in the two-tier architecture, the data validation rules and business logic
    are retained in the middle-level server, often termed as the middle tier. As of
    the last few years, mobile devices also interface with the middle tier.


    ### N-Tier Architecture


    N-tier architecture can be viewed as an extended kind of three-tier architecture
    where there are multiple middle tier servers with their own database servers,
    and many of these middle tier servers are interconnected to leverage functionality
    reuse. The client tier can either directly connect to the middle tier or it can
    first connect to a presentation tier which in turn talks to the middle tier. Here
    again, clients in the client tier can be native thick clients or browser-based
    thin clients or any other variant of mobile client.


    I will not explore further details of the above mentioned system architectures
    since it is assumed that you are knowledgeable in those aspects; otherwise you
    probably wouldn’t be reading a book like this.


    ## Network Architectures


    While I covered system architectures of relevance in the previous section, equally
    important are the different topologies by which software systems can be interconnected
    so as to enable integration. Here again I will cover the broader classifications
    by which networks can be configured so as to enable systems to talk each other,
    with the help of Figure [1-2](#477630_1_En_1_Chapter.xhtml#Fig2).


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig2_HTML.jpg](images/477630_1_En_1_Chapter/477630_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2.** Network integration topologies


    ### Point to Point


    In point-to-point architecture, we define interconnections for a pair of applications.
    Thus we have two end points to be integrated. We can build protocol and/or format
    adaptors/transformers at one or either end. This is the easiest way to integrate,
    as long as the volume of integration is low. We normally use technology-specific
    APIs like `FTP`, `IIOP`, remoting, or batch interfaces to realize integration.
    Between any two integration points, there is tight coupling, since both ends have
    knowledge about their peers.


    ### Hub and Spoke


    Hub-and-spoke architecture is also called the **message broker** and provides
    a centralized hub (broker) to which all applications are connected. The distinguishing
    feature of the hub-and-spoke architecture is that each application connects with
    the central hub through lightweight connectors. The lightweight connectors facilitate
    application integration with minimum or no changes to the existing applications.
    Message transformation and routing takes place within the hub. Since the applications
    do not connect to other applications directly, they can be removed from the integration
    topology by plugging off from the hub. Since the hub is a central portion of this
    kind of topology, the hub is a single point of failure of the entire topology
    itself.'
