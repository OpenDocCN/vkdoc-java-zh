    代码清单 14-7 结算监听器编排器 (ch14\ch14-01\XA-TX-Resilient\Settlement-ActiveMQ-Derby\src\main\java\com\acme\ecom\messaging\SettlementListener.java)


    如代码清单 14-7 所示，在消费消息后，结算监听器会立即尝试记录由持久化资源支持的传入报价消息。为了使此记录操作不受封闭父事务内同级事务中任何其他处理结果（成功或失败）的影响，此记录操作的事务语义设置为`REQUIRES_NEW`。此记录操作在发现重复条目时不会引发任何错误。接下来，监听器会检查是否已经结算了与收到的报价类似的报价。这种情况发生在重复消息的情况下。请参见代码清单
    14-8。

