    ```\n\nThe ClusteringEventBus\ndispatches \nevents to event handlers across different\
    \ machines. A ClusteringEventBus\nhas to be configured with a ClusterSelector,\
    \ which selects a Cluster\ninstance for each of the registered EventListeners,\
    \ and an EventBusTerminal, which\nis responsible for dispatching events to each\
    \ of the relevant clusters.\nIn the code above, you use DefaultClusterSelector\n\
    as the ClusterSelector, which always selects the same cluster.\nThis implementation\
    \ can serve as a delegate for other cluster selectors\nfor event listeners that\
    \ do not belong to a specific cluster. The\nDefaultClusterSelector in turn uses\
    \ a simple Cluster implementation that\ninvokes each of the members of a cluster\
    \ when an event is published. The\nnext important component is the EventBusTerminal,\
    \ which is a mechanism\nthat connects event bus clusters. The terminal is responsible\
    \ for\ndelivering published events with all of the clusters available in the\n\
    event bus (either locally or remotely). Terminals are typically bound to\na single\
    \ event bus instance, but may be aware that multiple instances\nexist in order\
    \ to form a bridge between these event buses. You use a\nSpringAMQPTerminal,\n\
    which is an implementation of EventBusTerminal that uses an AMQP\n0.9-compatible\
    \ message broker to dispatch event messages. This is\nbecause you are using Rabbit\
    \ MQ, which is\nAMQP-compatible, as the message queue provider that provides the\n\
    backbone for the distributed event channel. All outgoing messages are\nsent to\
    \ a configured exchange. This terminal does not dispatch events\ninternally, as\
    \ it relies on each cluster to listen to its own AMQP\nqueue. Again, as shown\
    \ in the code, the terminal is configured with the\nConnectionFactory providing\
