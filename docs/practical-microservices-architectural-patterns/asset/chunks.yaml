    连接消费者与生产者之间的纽带


    使用消息传递基础设施的最大优势——使消息生产者和消息消费者流程解耦——本身有时会给应用程序开发者带来挑战。


    在典型的客户端同步请求-响应调用中，服务器可以在单个线程中接受客户端的连接，在该线程中处理请求，并在同一线程中向客户端提供响应。然而，连接和线程是稀缺资源，需要有效利用它们。如果服务器端处理需要很长时间，或者服务器线程因等待
    I/O 操作等空闲模式而被阻塞，那么阻塞线程是不可取的。相反，应该这样设计：接受连接的线程被释放以接受更多连接，而处理以及后续对客户端的响应由不同的线程在后台处理，并且这些处理恰好能在处理可以继续时进行，或者恰好能在响应准备好返回给客户端时进行。如果只有一个服务器和一个客户端，实现起来很简单。一旦有大量客户端同时连接到服务器，如果在建立连接之后、服务器向客户端返回响应之前释放了接受套接字连接的线程，那么当响应准备好时，服务器将面临一个挑战：如何将所有这些响应关联回对应的客户端。


    关联 ID


    在上述场景中，可以为每个请求创建一个回调队列。但这效率很低。幸运的是，有一种更好的方法：为每个客户端创建一个单一的回调队列。但这又引发了一个新问题：在该队列中收到响应后，不清楚该响应属于同一客户端的哪个特定请求。这就是使用
    `correlationId` 属性的地方。可以为每个请求将其设置为一个唯一值。之后，当在回调队列中收到消息时，将查看此属性，并基于它能够将响应与请求匹配起来。


    在设计处理来自多个客户端的请求和响应的服务器时，请确保在将 JMS 响应发送到队列之前，将响应的 JMS 关联 ID 值设置为请求的 JMS 关联 ID 值。


    可以在接收消息时获取 JMS 关联 ID，使用


    ```

    String getJMSCorrelationID()

    ```


    此方法返回提供特定消息 ID 或应用程序特定字符串值的关联 ID 值。


    要在发送消息时设置 JMS 关联 ID，请键入


    ```

    void setJMSCorrelationID(String correlationID)

    ```


    让我们看一个示例来理解这个概念。


    编写一个自定义网络服务器以处理并发高流量


    在本节中，将设计并实现一个使用 TCP/IP 服务器套接字进行监听的网络服务器。多个客户端或来自同一客户端的多个线程可以打开到此服务器的连接并提交作业；这些客户端或线程期望收到作业的响应。设计需要能够处理高流量。让我们来看看服务器中的架构和控制流。图
    6-16 显示了整个设置的架构。


    ![../images/477630_1_En_6_Chapter/477630_1_En_6_Fig16_HTML.jpg](img/477630_1_En_6_Fig16_HTML.jpg)


    图 6-16

    使用优化资源处理高流量的架构


    这里显示了两个独立的域，分别名为 TCP IP 网络和 AMQP 网络。为简单起见，假设客户端到服务器的连接在 TCP IP 网络域中以“伪同步”^(⁷)
    方式处理，而实际作业执行则异步提交给 AMQP 网络，并且响应也异步地从 AMQP 网络接收。这种架构确保 TCP IP 网络域不会因实际执行作业而承受压力，因此可以高效地进行连接管理。同时，向
    AMQP 网络域提交作业是通过消息队列进行的，因此，如果 AMQP 网络域内的实际作业处理需要一些时间，提交到队列中的额外作业不会丢失，而是被缓冲，以便 AMQP
    网络域中的消息处理器监听器可以在稍后处理它们。


    应该注意到，虽然客户端与网络服务器之间的握手是同步的，但 TCP IP 网络中的网络服务器与 AMQP 网络域中的消息处理器监听器之间的握手却是异步的。因此，网络服务器与消息处理器之间的请求和响应流是分离的，需要关联哪个响应对应哪个请求，以便网络服务器可以将其路由回正确的客户端实例。


    请注意，用虚线标记的流在某些情况下会经过多个组件，这样显示是有意为之，以表明所有这些组件都参与了该特定流。此练习的完整且可运行的代码示例保存在随书附带的名为
    `ch06-04` 的文件夹中。让我们详细了解每个组件和控制流：


    *   **客户端**：多个客户端或来自单个客户端的多个线程可以连接到服务器并提交作业。在此示例中，将只发送一条消息来代替繁重的作业。


    *   **服务器套接字**：有一个服务器套接字实例在客户端已知的端口上监听，以便客户端可以发起连接。


    *   **客户端套接字**：对于客户端线程打开的每个连接，在 TCP IP 网络端都有一个客户端套接字实例，消息通过由此创建的流在服务器和客户端之间双向传递。


    *   **网络服务器**：此组件的“main”方法的主要工作是接受连接、进行任何处理，并将响应返回给客户端。设计约束是网络服务器必须以高效的方式完成所有这些工作。因此，每当客户端连接到网络服务器时，服务器首先接受连接，然后创建一个唯一
    ID，用于关联请求和响应流。相应的客户端套接字将根据此关联 ID 建立索引，然后服务器从执行器池中获取一个线程，并通过将作业分配给网络读取器任务并提供关联
    ID，要求该线程处理客户端的作业。完成这些工作后，服务器就空闲出来，可以处理更多客户端。


    *   **执行器池**：执行器池是一个 ThreadPoolExecutor，它使用可能多个池化线程中的一个来执行每个提交的任务。


    *   **网络读取器任务**：每当客户端连接到网络服务器时，一个单独的网络读取器任务会在一个池化线程内执行。它将读取客户端发送的消息（或作业），并将其提交到
    networkQueue 以供消息处理器执行。

