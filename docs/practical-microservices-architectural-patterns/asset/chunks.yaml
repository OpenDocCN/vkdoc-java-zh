- fmt: '# Scale Out for CQRS-Based Microservices


    Refer to Figure [3-6](#477630_1_En_3_Chapter.xhtml#Fig6), which shows the scaling
    message-oriented microservices. You can extend the same principles to scale out
    the Command and Query services of your CQRS-based microservices, and this is represented
    in Figure [5-7](#477630_1_En_5_Chapter.xhtml#Fig7). This is just another view
    of the “scale out using separate read and write processes” represented in Figure
    [5-4](#477630_1_En_5_Chapter.xhtml#Fig4); however, this view is more in sync with
    the “scaling message-oriented microservices” in Figure [3-6](#477630_1_En_3_Chapter.xhtml#Fig6)
    with the additional capability of the CQRS pattern. Again, in Figure [5-7](#477630_1_En_5_Chapter.xhtml#Fig7)
    I have not repeated all of the components of the CQRS described in Figure [5-6](#477630_1_En_5_Chapter.xhtml#Fig6),
    so assume that all of them still exist and have been abstracted in the diagram
    to retain clarity.


    ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig7_HTML.jpg](images/477630_1_En_5_Chapter/477630_1_En_5_Fig7_HTML.jpg)


    **Figure 5-7** A meta model for scaling out event-based CQRS architecture


    Careful observation of Figure [5-7](#477630_1_En_5_Chapter.xhtml#Fig7) reveals
    another caveat: there are two instances of the Command service represented. While
    it’s rather straightforward to maintain multiple instances of a read service,
    maintaining more than one instance of the same write service is non-trivial, since
    the entity with the same identity if accessed concurrently for modification across
    more than one instance can cause data consistency issues. You will explore this
    aspect in Chapter [16](#477630_1_En_16_Chapter.xhtml); until then, assume that
    you have one node of write service.


    ## Summary


    Maintaining more than one view for business entities is a technique we have been
    following for many years, and materialized views, caches, read replicas, and so
    on are all mechanisms to that end. CQRS is a more formalized pattern to improve
    the inner architecture of microservices, thus elevating the scalability options
    of a microservice manyfold. While CQRS addresses the scalability for the read
    part of the business entities, the write part is deployed separately to take care
    of data consistency, which will also take the lead in propagating changes to the
    entity state to all read parts. Even though the architecture is complex when compared
    to that of a simple microservice, the extra complexity will pay off by the exponential
    increase in the scalability of the microservice. Having split the read and the
    write part into separate microservices, you should now look at the outer architecture
    concerns between them in the synchronization of changes and the need for other
    kinds of intermicroservice communication in a reliable and flexible manner, so
    move on to Chapter [6](#477630_1_En_6_Chapter.xhtml).


