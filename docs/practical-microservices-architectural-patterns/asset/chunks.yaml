- fmt: '4. In the “Select Root Folder,” select `D:\binil\gold\pack03\ch17\ch17-01\Ax2-Ecom-No-Security`
    and click OK, as shown in Figure [17-13](#477630_1_En_17_Chapter.xhtml#Fig13).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig13_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig13_HTML.jpg)


    **Figure 17-13** Import the e-commerce microservices Maven projects


    5. Once you make sure the import is complete (by watching the Eclipse status bar),
    in Java EE Perspective, select all projects (except `Ecom`).


    6. Right-click and select **Maven** ➤ **Update Projects**.


    7. In the “Update Maven Project” window, click OK.


    If everything goes fine, all the projects should get built without any errors.
    You may ignore any warnings and proceed to bring up the servers one by one. To
    bring up the servers, you need to follow the below sequence for the first three
    microservices:


    ```

    Ecom-config

    Ecom-registry

    Ecom-gateway

    ```


    For the rest of the microservices, you may start them in any order. This flexibility
    also demonstrates two other aspects:


    - **Independence of the microservices**: There is absolutely zero dependency between
    microservices. This is different from the older CORBA, RMI, IIOP, and SOAP service
    paradigms where the dependent microservice required the stubs of the independent
    microservice.

    - **Partial failures of the application**: Even if you don’t bring up all the
    microservices, the web app will function by partially consuming available services.


    To start a microservice, select the project in Eclipse, right-click and select
    **Run As** > **Java Application**. See Figure [17-14](#477630_1_En_17_Chapter.xhtml#Fig14).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig14_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig14_HTML.jpg)


    **Figure 17-14** Run each microservice as a Java application


    In the next window, select the Java class with the `main` method you intend to
    run. You can type `Ecom*` to list the Java classes with the `main` method and
    click OK, as shown in Figure [17-15](#477630_1_En_17_Chapter.xhtml#Fig15).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig15_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig15_HTML.jpg)


    **Figure 17-15** Run the main class of each microservice as an application


    Be patient until the microservice initializes fully. Typically this will be indicated
    by the console logs within Eclipse, as seen in Figure [17-16](#477630_1_En_17_Chapter.xhtml#Fig16).


    ![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig16_HTML.jpg](images/477630_1_En_17_Chapter/477630_1_En_17_Fig16_HTML.jpg)


