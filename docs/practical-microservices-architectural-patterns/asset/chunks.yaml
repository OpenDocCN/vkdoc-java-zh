    \ database is that your application can leverage ACID\ntransactions. Figure [11-7](#477630_1_En_11_Chapter.xhtml#Fig7)\
    \ depicts a\ntypical monolithic application.\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7.\nAn e-commerce monolith application\n\nMultiple entities in your\
    \ domain can be represented by separate\ntables in a schema in your single relational\
    \ database. In the current\nexample, `Order`,\n`Item`, and `Inventory`  are such\
    \ entities. A\ncustomer will add multiple product items to his shopping cart and\n\
    finally check out via a single button click. When that happens, a new\nrow gets\
    \ created in the `Order` table\nrepresenting a new order. With this Order ID as\
    \ a foreign key, as many\nrows are created in the Items table as there are items\
    \ in the shopping\ncart. Further, for each row created in the `Item` table, the\n\
    quantity value in the respective rows must be decremented in the `Inventory` table.\
    \ If\nyou use a single relational database, all of the above actions can be\n\
    either committed or rolled back in an ACID-compliant\nmanner.\n\nFigure [11-8](#477630_1_En_11_Chapter.xhtml#Fig8)\
    \ represents the\nsame business use case implemented with the help of microservices.\n\
    Assume that Order and Inventory are two different microservices. Now,\nlet’s analyze\
    \ a complex scenario where two users try to act on the same\nentity, more or less\
    \ concurrently. Such scenarios are typical of business applications,\nand listed\
