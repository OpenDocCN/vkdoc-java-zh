    ## Google Protocol Buffer Between Spring Boot Microservices


    The previous section talked about effectively utilizing the microservices’ server
    resources like HTTP connections and threads. Equally important are the other possible
    optimizations in intercommunications between microservices. Since microservices
    are spread across process boundaries, the amount of data sent across microservices
    matter. This boils down to the marshalling and unmarshalling of data structures
    across microservices. You will look into this with examples in this section.


    ### Protocol Buffer


    Protocol buffers are Google’s platform-neutral and language-neutral mechanism
    for marshalling and unmarshalling structured data. You need to define how you
    want your data to be structured to use Protocol Buffer, and then you can use generated
    source code in multiple platforms and languages to easily write and read your
    structured data to and from a variety of data streams. One benefit of using Protocol
    Buffer is that you can even update your data structure without breaking already
    deployed application code that is compiled against the “old” format. This is especially
    important in architecting applications capable of adapting or evolving to future
    requirement changes.


    You will now look into the dynamics of using Protocol Buffer. You first need to
    specify how you want the information you’re serializing to be structured in `.proto`
    files. In doing so, you use the Protocol Buffer message types. Each Protocol Buffer
    message is a logical grouping of information, containing a series of name-value
    pairs. Listing [10-13](#477630_1_En_10_Chapter.xhtml#PC18) is a sample of a `.proto`
    file that defines a message containing information about a `Product`, which you
    used in all of your previous samples.


    ```

    message Product {

    string productId = 1;

    string name = 2;

    string code = 3;

    string title = 4;

    string description = 5;

    string imgUrl = 6;

    double price = 7;

    string productCategoryName = 8;

    }

    Listing 10-13

    Sample .proto File

    ```


    Each message (message `Product` in your sample) type has one or more uniquely
    numbered fields, and each field has a name and a value type, where value types
    can be numbers (integer or floating-point), bools, strings, or raw bytes. Your
    Protocol Buffer message can also be other protocol buffer message types, as shown
    in the container message defined in Listing [10-14](#477630_1_En_10_Chapter.xhtml#PC19)
    to hold a collection of `Product` instances.


    ```

    message Products {

    repeated Product product = 1;

    }

    Listing 10-14

    .proto File for a Collection of Other .proto Types

    ```


    You can specify fields as optional, required, and/or repeated, as shown in the
    `Products` message.


    Once you define your messages, you can run the Protocol Buffer compiler for the
    application’s programming language of your choice on your `.proto` file to generate
    entity classes. These entity classes provide you with simple accessors for each
    field (like `code()` and `set_code()`) as well as methods to serialize/parse the
    whole structure to/from raw bytes. In your scenario, if your chosen language is
    Java, running the compiler on the above sample will generate a class called `Product`.
    You can use this entity class in your application to marshal and unmarshal `Product`
    protocol buffer messages. Your code will look like that in Listing [10-15](#477630_1_En_10_Chapter.xhtml#PC20).


    ```

    Product product =

    Product.newBuilder().setProductId(id)

    .setName("Kamsung D3")

    .setCode("KAMSUNG-TRIOS")

    .setTitle("Kamsung Trios 12 inch , black , 12 px ....")

    .setDescription("Kamsung Trios 12 inch with Touch")

    .setImgUrl("kamsung.jpg")

    .setPrice(12000.00)

    .setProductCategoryName("Mobile").build();

    // write

    FileOutputStream output = new FileOutputStream("D:/Product.ser");

    product.writeTo(output);

    output.close();

    // read

    Product productFromFile = Product.parseFrom(new FileInputStream("D:/Product.ser"));

    Listing 10-15

    Marshalling and Unmarshalling .proto Types

    ```


    You can now add new fields to your message formats without breaking backwards-compatibility;
    any old program binaries will ignore any new fields when parsing. So by using
    protocol buffers as the data format, you can extend your message protocol without
    having to worry about breaking existing code.


    Google’s documentation on Protocol Buffer lists the advantages of using Protocol
    Buffer as follows:


    *   Simpler

    *   3 to 10 times smaller

    *   20 to 100 times faster

    *   Less ambiguous

    *   Generate data access classes that are easier to use programmatically


    The second and third bullet points are of great significance especially when you
    want to design numerous chit-chat kinds of interactions between microservices,
    which are again too many in number in any serious enterprise-grade application.


    Let’s now look at a complete example to explain the usage of Protocol Buffer between
    microservices.


