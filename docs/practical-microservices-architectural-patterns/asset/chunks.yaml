    \nThe Java configuration method creates a servlet filter known as the `springSecurityFilterChain`\
    \ (`DelegatingFilterProxy` and `FilterChainProxy`) which is responsible for all\
    \ security (protecting the application URLs, validating username and passwords\
    \ submitted, redirecting to the login form, etc.) within your application. You\
    \ declare the `authenticationManagerBean` as a bean, which will be injected in\
    \ the Spring OAuth security configuration later.\n\n`WebSecurityConfigurerAdapter`\
    \ provides a default configuration in the `configure(HttpSecurity http)` method,\
    \ hence all users require to be authenticated for accessing any URLs of web application.\
    \ But you can override this method as shown in Listing [18-10](#477630_1_En_18_Chapter.xhtml#PC14).\
    \ First, configure `HttpSecurity` to define what resources must be secured, authorized,\
    \ not authorized, not secured, login page, logout page, access denied page, etc.\
    \ One important thing to note here is the order of configuration. Configuration\
    \ that is specific to certain pages or URLs must be placed first, then configurations\
    \ that are in common among most URLs.\n\nIf the authentication fails, you get\
    \ back the expected 401 Unauthorized and subsequently the authentication challenge.\
    \ The browser in a normal web page context will interpret this challenge and prompt\
    \ you for credentials with a simple dialog. From the browser environment, a login\
    \ page is no longer a hard requirement since all browsers support basic authentication\
    \ and can use a standard dialog to prompt the user for credentials. Also, the\
    \ `BasicAuthenticationEntryPoint` provisioned by Spring Security by default returns\
    \ a full page for a 401 Unauthorized response back to the client. This HTML representation\
    \ of the error also renders well in a browser, but it’s not well-suited for scenarios\
    \ like yours, such as a REST API or a Zuul API gateway where a JSON representation\
    \ may be preferred. So you should prevent the authentication dialog by retaining\
    \ the HTTP Basic but changing the 401 challenge to something other than \"Basic.\"\
    \ You can do that with a one-line implementation of `AuthenticationEntryPoint`\
    \ in the `HttpSecurity` configuration callback:\n\n```java\nauthenticationEntryPoint((request,\
    \ response, authException) ->\n    response.sendError(HttpServletResponse.SC_UNAUTHORIZED))\n\
    ```\n\nNext is the configuration for authentication. For authentication, Spring\
    \ Security provides various methods:\n\n- The DAO authentication provider is the\
    \ Spring’s default. Spring here expects an `org.springframework.security.core.userdetails.UserDetailsService`\
    \ implementation to provide credentials and authorities.\n- Built-in: In-memory\
    \ (properties), JDBC (database), LDAP\n- Custom\n- Custom authentication provider\n\
    \nExample: To get preauthenticated user details when using single sign-on\n\n\
    - CAS, TAM, SiteMinder\n\nYou will use JDBC authentication using a Java configuration\
    \ where you can customize the default queries. Listing [18-10](#477630_1_En_18_Chapter.xhtml#PC14)\
    \ shows how to plug in JDBC authentication. You need to configure it by providing\
    \ a `DataSource`. Since you are using custom tables, you are also required to\
    \ provide the select queries to get the user details and its roles. You set up\
    \ two queries for `AuthenticationManagerBuilder`, one for authentication in `usersByUsernameQuery`\
    \ and the other for authorization in `authoritiesByUserNameQuery`.\n\n- `users-by-username-query`:\
    \ This query will select the username, password, and enabled properties of the\
    \ user, and will take username as parameter according to your custom tables. In\
    \ the actual implementation, the search may possibly be case sensitive or case\
    \ insensitive depending on how the implementation instance is configured.\n- `authorities-by-username-query`:\
    \ This query will select username and the role of the user and accept username\
    \ as parameter according to your custom tables.\n\nOnce authentication is taken\
    \ care of, you can start configuring the authorization server responsible for\
    \ managing the access tokens. Spring Security OAuth2 handles the authorization.\
    \ To configure and enable the OAuth 2.0 authorization server you have to use the\
    \ `@EnableAuthorizationServer` annotation in Listing [18-11](#477630_1_En_18_Chapter.xhtml#PC16).\n\
    \n```java\n@Configuration\n@EnableAuthorizationServer\npublic class OAuth2Configuration\
