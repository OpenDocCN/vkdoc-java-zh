    \n图 17-15\n将每个微服务的主类作为应用程序运行\n\n请耐心等待，直到微服务完全初始化。通常，Eclipse 中的控制台日志会指示初始化完成，如图\
    \ 17-16 所示。\n\n![../images/477630_1_En_17_Chapter/477630_1_En_17_Fig16_HTML.jpg](img/477630_1_En_17_Fig16_HTML.jpg)\n\
