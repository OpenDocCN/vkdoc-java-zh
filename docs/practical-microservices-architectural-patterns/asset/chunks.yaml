- fmt: "# 排版后的文本\n\nThis is not a good practice. A DNS (Domain Name System) is used\
    \ to resolve similar problems; however, a DNS is comparatively heavy when you\
    \ consider hundreds of microservices within an enterprise application. Further,\
    \ you do not want to expose the server details of your microservices outside your\
    \ perimeter or DMZ (Demilitarized Zone). Typically the service consumers in a\
    \ microservice-based enterprise application are other microservices. Hence these\
    \ microservices have to ask questions like service topology (\"Are there any `product-services`\
    \ available, and if so, where?\") and service capabilities (\"Can you handle A,\
    \ B, and C?\"). This is where service registries like Eureka and Consul come into\
    \ play. Eureka does not impose any restrictions on the protocol or method of communication,\
    \ so you can use Eureka to use protocols such as thrift, HTTP(S) or any other\
    \ RPC mechanisms.\n\nYou might still doubt the need for Eureka when there are\
    \ already many software and hardware load balancers, including AWS Elastic Load\
    \ Balancer and AWS Route 53. AWS Elastic Load Balancer is used to expose edge\
    \ services, which typically connect to end-user web traffic whereas Eureka fills\
    \ the need for mid-tier load balancing or, in our nomenclature, microservices\
    \ registration and load balancing. Route 53 is analogous to a DNS service where\
    \ you can host your DNS records even for non-AWS data centers, so it comes with\
    \ the associated drawbacks of the traditional DNS-based load-balancing solutions\
    \ where your traffic can still be routed to servers that may not be healthy or\
    \ may not even exist, which is very typical in the case of public cloud-based\
    \ deployments like AWS provisioned for auto scaling. Since you should prefer your\
    \ microservices to be stateless (non-sticky), Eureka facilitates a much better\
    \ scalability model since your microservices can be resilient to the outages of\
    \ the load balancers (Eureka) because the information regarding the available\
    \ servers is cached on the client. This does require a small amount of memory,\
    \ but this increased resiliency doesn't penalize the overall resource concerns\
    \ much.\n\n## Design a Eureka-Enabled Scenario\n\nYou will modify the design by\
    \ introducing few new components, as shown in Figure [8-11](#477630_1_En_8_Chapter.xhtml#Fig11).\
    \ Here you replace `ProductServiceProxy` with `RestTemplate`. This means the Product\
    \ Web microservice will now use `RestTemplate` to consume any of the instances\
    \ of the Product Server microservice. `RestTemplate` simplifies communication\
    \ with HTTP servers, and the \"Develop a RESTful Web Service\" section in Chapter\
    \ [7](#477630_1_En_8_Chapter.xhtml) already explained how to use `RestTemplate`\
    \ to communicate with `RestController`. You will extend that here. Another intention\
    \ of using `RestTemplate` is that you can use Ribbon indirectly via an autoconfigured\
    \ `RestTemplate` when `RestTemplate` is on the classpath and a `LoadBalancerClient`\
    \ bean is defined so that you build over the previous sample of Ribbon itself.\n\
    \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig11_HTML.jpg](images/477630_1_En_8_Chapter/477630_1_En_8_Fig11_HTML.jpg)\n\
    \n**Figure 8-11** Design with Eureka\n\nBy enabling the Eureka registry, all microservices\
    \ will self-register to the registry when brought up. Further, in a previous sample\
    \ you saw how to bring redundancy by instantiating the same Product Server microservice\
    \ more than once. You will follow the same pattern for Eureka so that there is\
    \ redundancy at the service registry level too.\n\n## Code to Use Eureka\n\nAll\
    \ the code samples for this section are placed in folder `ch08\\ch08-05`. Visit\
    \ `pom.xml` to see the explicit mention of the Eureka Server dependency. See Listing\
    \ [8-15](#477630_1_En_8_Chapter.xhtml#PC34).\n\n```\norg.springframework.cloud\n\
    spring-cloud-starter-eureka-server\n```\n\n**Listing 8-15** Eureka Dependency\
    \ (`ch08\\ch08-05\\Eureka\\pom.xml`)\n\nNext, you need Spring Cloud's `@EnableEurekaServer`\
    \ to stand up a registry that other microservices can talk to. This is done in\
    \ your regular Spring Boot application `main` class with one annotation added\
    \ to enable the service registry. See Listing [8-16](#477630_1_En_8_Chapter.xhtml#PC35).\n\
    \n```\n@EnableEurekaServer\n@SpringBootApplication\npublic class EurekaRegistryApplication\
    \ {\n    public static void main(String[] args) {\n        SpringApplication.run(EurekaRegistryApplication.class,\
    \ args);\n    }\n}\n```\n\n**Listing 8-16** Enable Eureka Server (`ch08\\ch08-05\\\
    Eureka\\src\\main\\java\\com\\acme\\ecom\\infra\\EurekaRegistryApplication.java`)\n\
    \nWhen Eureka comes up, it will attempt to register itself, so you need to disable\
    \ that; see Listing [8-17](#477630_1_En_8_Chapter.xhtml#PC36).\n\n```\nspring.application.name=eureka-registry\n\
    server.port=8761\neureka.client.registerWithEureka=false\neureka.client.fetchRegistry=true\n\
    eureka.client.server.waitTimeInMsWhenSyncEmpty=0\neureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/,http://localhost:8762/eureka/\n\
    eureka.server.enableSelfPreservation=false\n```\n\n**Listing 8-17** Eureka Configuration\
    \ (`ch08\\ch08-05\\Eureka\\src\\main\\resources\\application.properties`)\n\n\
    If you want to bring multiple instances of Eureka registry with this single properties\
    \ file, you need to override at least the first two parameters. You do so in the\
    \ following two scripts:\n\n```\nch08\\ch08-05\\Eureka\\run1.bat\njava -jar -Dserver.port=8761\
    \ -Dspring.application.name=eureka-registry1 .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n\
    \nch08\\ch08-05\\Eureka\\run2.bat\njava -jar -Dserver.port=8762 -Dspring.application.name=eureka-registry2\
    \ .\\target\\Ecom-Product-Microservice-0.0.1-SNAPSHOT.jar\n```\n\nSince you are\
    \ dealing with HAL-based JSON data, you want to configure the REST template you\
    \ want to use in the Product Web microservice to invoke calls in the Product Server\
    \ microservice to deal with HAL-formatted data. See Listing [8-18](#477630_1_En_8_Chapter.xhtml#PC38).\n\
    \n```\n@Configuration\npublic class RestTemplateConfiguration {\n    @LoadBalanced\n\
    \    @Bean\n    public RestTemplate restTemplate() {\n        return new RestTemplate(getRequiredMessageConvertors());\n\
    \    }\n\n    private List<HttpMessageConverter> getRequiredMessageConvertors()\
    \ {\n        ObjectMapper mapper = new ObjectMapper();\n        mapper.configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES,\
    \ false);\n        mapper.registerModule(new Jackson2HalModule());\n        MappingJackson2HttpMessageConverter\
    \ converter = new MappingJackson2HttpMessageConverter();\n        converter.setSupportedMediaTypes(MediaType.parseMediaTypes(\"\
    application/hal+json, application/json\"));\n        converter.setObjectMapper(mapper);\n\
    \        return Arrays.asList(converter);\n    }\n}\n```\n\n**Listing 8-18** Rest\
    \ Template Configuration to Handle HAL JSON Format (`ch08\\ch08-05\\ProductWeb\\\
    src\\main\\java\\com\\acme\\ecom\\product\\controller\\RestTemplateConfiguration.java`)\n\
    \nThe Product Server microservice and the Product Web microservice must register\
    \ themselves with the registry and use the Spring Cloud `DiscoveryClient` abstraction\
    \ to interrogate the registry for their own host and port. You can use the `@EnableEurekaClient`\
    \ to activate the Netflix Eureka `DiscoveryClient` implementation. `@EnableEurekaClient`\
    \ is a convenience annotation for clients to enable the Eureka discovery configuration\
    \ (specifically). This annotation turns on discovery and lets the autoconfiguration\
    \ find the Eureka classes if they are available. See Listing [8-19](#477630_1_En_8_Chapter.xhtml#PC39).\n\
    \n```\n@SpringBootApplication\n@EnableEurekaClient\npublic class EcomProductMicroserviceApplication\
    \ {\n    public static void main(String[] args) {\n        SpringApplication.run(EcomProductMicroserviceApplication.class,\
    \ args);\n    }\n}\n```\n\n**Listing 8-19** Enable Eureka Client (`ch08\\ch08-05\\\
    ProductServer\\src\\main\\java\\com\\acme\\ecom\\product\\EcomProductMicroserviceApplication.java`)\n\
    \nVisit `pom.xml` to see the explicit mention of the Eureka dependency. See Listing\
    \ [8-20](#477630_1_En_8_Chapter.xhtml#PC40).\n\n```\norg.springframework.cloud\n\
    spring-cloud-starter-eureka\n```"
