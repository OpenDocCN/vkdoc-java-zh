    \ accepts the\n    connection and then creates a unique ID, which is used to correlate\n\
    \    request and response flows. The corresponding client socket is indexed\n\
    \    against this correlation ID and the server then gets a thread from the\n\
    \    executor pool and asks the thread to handle the job for the client by\n \
    \   assigning the job to a network reader task and providing the correlation\n\
    \    ID. Once this much is done, the server is free and available to handle\n\
    \    more clients.\n\n*   **Executor\n    Pool** : The executor pool is a ThreadPoolExecutor\
    \ that\n    executes each submitted task using one of possibly several pooled\n\
    \    threads.\n\n*   **Network Reader Task**: Whenever a client connects\n   \
    \ to the network server, a separate network reader task gets executed\n    within\
    \ a pooled thread. It will read message (or job) sent by client and\n    submits\
    \ it to the networkQueue for execution to the message\n    processor."
