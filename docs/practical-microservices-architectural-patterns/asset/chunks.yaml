    ### 关于作者与技术审校者


    ### 关于作者


    ### 关于技术审校者


    # 1. 分布式计算架构概览


    任何规模可观的企业，其技术格局往往极为复杂，充斥着老化的遗留系统，并被业务线、内部部门、供应链等割裂。在某些情况下，企业每个业务流程拥有不止一个系统，这是因为许多企业通过并购发展壮大，从而保留了多个系统，同时还需跨国运营，并维持与不同合作伙伴及服务提供商的联系。因此，技术基础设施常被描述为“意大利面条式架构”，业务系统、合作伙伴与供应链系统以及其他服务提供商之间存在多对多的直接依赖关系。


    从计算机时代早期开始，我们便一直在开发软件来构建上述系统。我们从早期的穿孔卡片演进到下一代汇编语言，再到 FORTRAN 和 COBOL 时代，这些语言随后又被
    C、Smalltalk 等语言取代，接着是 C++、Java 和 C#。这种演进仍在继续。架构必须适应编程范式，包括所选的编程语言和工具。任何功能强大、规模可观的软件系统，都必须基于合适的软件架构来构建。坚持单一或相似的软件架构，我们可以为不同领域和功能构建软件系统，但没有人能用同一种架构构建所有类型的系统。因此，软件系统的架构风格必须基于众多考量因素进行调整，包括但不限于：


    *   业务领域

    *   功能与使用场景

    *   非功能性需求与使用环境

    *   与系统交互的设备与渠道

    *   构建系统所用的编程工具

    *   运行系统所用的基础设施


    ## 系统架构


    追溯历史，我们一直愉快且成功地使用各种系统架构来构建软件系统。过去几年中，值得注意的架构包括以下几种：


    *   大型机架构

    *   客户端-服务器架构

    *   三层架构

    *   多层架构


    让我们借助图 1-1 来了解这些架构的一些显著特征。


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig1_HTML.jpg](img/477630_1_En_1_Fig1_HTML.jpg)


    图 1-1. 系统架构的不同形式


    ### 大型机架构


    在基于大型机的架构中，处理能力是集中式的，多个客户端可以通过低性能终端连接到这个中央计算源。这些终端在某种意义上几乎是“哑终端”，它们只是简单的屏幕，只能组装面向字符的命令，然后将这些命令发送到中央大型计算机执行。大型计算机的任何响应也会以字符流的形式被这些终端接收并呈现，以便用户阅读并进行人工解读。


    ### 客户端-服务器架构


    客户端-服务器架构的特点是有一个高性能服务器，多个客户端可以通过性能相对较低的系统（称为客户端）连接到该服务器。服务器托管数据验证规则、修改数据的业务逻辑以及数据存储功能，而客户端则托管数据输入机制、数据验证规则以及部分或全部业务逻辑。这类客户端也称为胖客户端，因为在许多情况下，客户端代码是用客户端操作系统原生语言编写的，便于实现丰富的用户界面（UI）需求。


    ### 三层架构


    与两层架构类似，三层架构也有一个客户端层。客户端托管数据输入机制、数据验证规则以及部分或全部业务逻辑。这些客户端可以使用客户端操作系统原生语言构建，从而提供丰富的
    UI；或者，客户端也可以使用基于 HTTP 和 HTML 的、兼容 Web 浏览器的语言构建。在后一种情况下，客户端层还可以拆分为另一个称为表示层的层，其中客户端层仅包含数据输入、数据验证和
    UI 渲染逻辑，而大部分业务逻辑则移至后续层（表示层或中间层）。与两层架构的主要区别在于服务器端：数据管理和存储逻辑与数据验证规则和业务逻辑分离，并放在它们自己的独立服务器上，通常称为数据库服务器。与两层架构类似，数据验证规则和业务逻辑保留在中间层服务器上，通常称为中间层。在过去几年中，移动设备也开始与中间层交互。


    ### 多层架构


    多层架构可以看作是三层架构的扩展形式，其中有多个中间层服务器及其各自的数据库服务器，并且许多中间层服务器相互连接以实现功能复用。客户端层可以直接连接到中间层，也可以先连接到表示层，再由表示层与中间层通信。同样，客户端层中的客户端可以是原生胖客户端、基于浏览器的瘦客户端或任何其他类型的移动客户端。


    我不会进一步探讨上述系统架构的细节，因为假设您已具备这些方面的知识；否则，您可能不会阅读这样一本书。


    ## 网络架构


    上一节介绍了相关的系统架构，而软件系统为实现集成而相互连接的不同拓扑结构同样重要。在此，我将借助图 1-2 介绍网络配置的几种更广泛的分类，以便系统之间能够相互通信。


    ![../images/477630_1_En_1_Chapter/477630_1_En_1_Fig2_HTML.jpg](img/477630_1_En_1_Fig2_HTML.jpg)


    图 1-2. 网络集成拓扑


    ### 点对点


    在点对点架构中，我们为一对应用程序定义互连。因此，我们有两个需要集成的端点。我们可以在一个或两个端点构建协议和/或格式适配器/转换器。只要集成量不大，这是最简单的集成方式。我们通常使用特定于技术的
    API，如 FTP、IIOP、远程处理或批处理接口来实现集成。任何两个集成点之间都存在紧密耦合，因为两端都了解彼此。


    ### 中心辐射型


    中心辐射型架构也称为**消息代理**，它提供一个中心化的中心（代理），所有应用程序都连接到该中心。中心辐射型架构的显著特征是每个应用程序通过轻量级连接器与中心枢纽连接。轻量级连接器有助于应用程序集成，对现有应用程序的改动最小甚至无需改动。消息转换和路由在中心枢纽内进行。由于应用程序不直接连接其他应用程序，因此可以通过从中心枢纽断开连接来将其从集成拓扑中移除。由于中心枢纽是此类拓扑的核心部分，因此它也是整个拓扑本身的单点故障。

    '
- fmt: '### Enterprise Message Bus


    In an enterprise message bus topology, there is a common communication infrastructure
    which acts as a platform-neutral and programming language-neutral adaptor between
    applications. This communication infrastructure may include a message router and/or
    publish-subscribe channels. So applications interact with each other through the
    message bus with the help of request-response queues. Sometimes the applications
    have to use adapters that handle scenarios like invoking `CICS`¹ (Customer Information
    Control System) transactions. Such adapters may provide connectivity between the
    applications and the message bus using proprietary bus APIs and application APIs.


    ### Enterprise Service Bus (ESB)


    The service bus approach to integration makes use of a technology solution to
    provide a bus for application integration. Different applications will not communicate
    directly with each other for integration; instead they communicate through this
    middleware service-oriented architecture (SOA) backbone. The most distinguishing
    feature of the ESB architecture is the distributed nature of the integration topology.
    Most ESB solutions are based on Web Services Description Language (WSDL) technologies,
    and they use Extensible Markup Language (XML) formats for message translation
    and transformation. Compared to an enterprise message bus, the ESB topology requires
    less adaptors, since interoperability is high due to the SOA nature of the interfaces.


    ## Software Architectures


    Having seen the system architectures and network architectures in general, let’s
    now look at leveraging the notion of tiers and layers to bring modularity and
    manageability to software application architectures.


    ### Application Tiers


    Tiers generally provide distributed deployment capability for application concerns.
    Typical application tiers can be listed as follows:


    - Client tier

    - Presentation tier

    - Business tier

    - Integration tier

    - Resources tier


    The above list is not exhaustive. Again, I do not intend to explain these tiers
    in detail, but generally they enable us to group non-functional and technical
    capabilities and to provide varied operational abilities for these tiers during
    production deployments.


    ### Application Layers


    Layers help to separate concerns based on the single responsibility pattern. For
    example, there can be a controller layer which can provide a central entry point
    to the application tier where we can perform authentication and authorization
    checks, application entry logging, routing to right modules, and so on. Similarly,
    an ORM (object-relational mapping) layer may perform the required persistence
    services to transform application domain objects to storage schemas in a persistence
    disk and vice versa.


    Each application tier can be logically separated out into one or more application
    layers.


    ## The Application Architecture Landscape


    If we look back a decade, we have been leveraging the n-tier or distributed way
    of building application architectures. Multiple applications can talk to each
    other since they are interconnected based on any of the above network topologies.


    You will now concentrate on building a single such application. When I talk about
    a “single application,” I am constraining that application as targeted to perform
    a set of related or grouped functionalities. An example is an e-commerce application
    that helps an enterprise to list products for selling purposes and helps its customers
    to pay and buy these products online with the help of a web browser. Similarly,
    a stock trading application is another application with a group of functionalities
    related to trading stocks. Typically we do not club these two applications together
    since they represent grouping two different sets of functionality. A CRM (customer-relationship
    management) application, a loyalty application, an airline booking application,
    and a taxi hiring application are few examples of different such applications.


    There can be scenarios where two or more applications need to talk to each other
    or when we want to mash up functionality from two or more applications. For example,
    a holiday booking company’s booking application may want to mash up services from
    the airline booking application of the selected airline and the taxi hiring application
    of the selected cab service provider mentioned above. These scenarios are outside
    the scope of a single application architecture but need to be considered at an
    application integration level. I do not intend to cover aspects like inter application
    integration or application mashups in the scope of our discussion. Instead, I
    want to concentrate on the architecture of a “single application,” the size of
    which can vary from small to medium to large based on the volume of functionality
    we want to group together.


    Since I mentioned an e-commerce application as good enough to be called a single
    application, I will use that analogy to discuss concepts and concerns in this
    book. You will look at the details of functionality of an e-commerce application
    in a different section, but for the time being you can assume that the e-commerce
    application is a right-sized application to help you understand almost every concern
    we want to discuss in this book.'
