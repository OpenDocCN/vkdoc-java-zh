- fmt: '在讨论了CAP定理并假设您已经熟悉常见且完全一致的ACID事务之后，让我们来看看BASE这一ACID的替代方案。`BASE`是`Basically
    Available`（基本可用）、`Soft state`（软状态）、`Eventually consistent`（最终一致性）的缩写，它与ACID原则截然相反。ACID基于悲观的假设，并在每次操作结束时强制一致性，而`BASE`基于乐观的假设，并接受数据库一致性将处于一种动态变化的状态，其程度可被所考虑的业务事务接受。`BASE`设计鼓励以如下方式设计系统：


    - 如果应用程序的一部分宕机或运行不正常，应用程序的其他一些功能仍应正常工作，或者

    - 如果客户数据库的少数节点故障仅影响该特定主机上的30%客户，其余客户仍应能够使用系统。

    - 等等。


    如果你为系统或服务的协调定义一组属性，如下所示，那么上述所有或大部分特性都可以现实地实现：


    - 系统在支持部分故障时是基本可用的，这比整个系统故障更可取。

    - 系统的状态是“软”的，这意味着即使在没有进一步更新的情况下，它也可能随时间变化，因为一些过去的更改尚未应用，它们“仍在传输中”，源自其他分区。

    - 如果系统不再有新的更新，系统最终将变得一致。


    ## CAP金字塔


    `CAP金字塔`是一个倒四面体^([^(22)](#fn22))，以其顶点为支点，相对的底面保持与支点平面（地面）平行，如图[11-12](#477630_1_En_11_Chapter.xhtml#Fig12)所示。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg)


    图11-12. 处于不稳定平衡状态的`CAP金字塔`


    如果我们假设`CAP金字塔`顶面每个角（代表一致性、可用性和分区容错性）到支点平面的高度，那么在平衡状态下，这三个特性之间将始终存在平衡，这种状态就是`BASE`状态。在`BASE`状态下，这三个特性既不会太低也不会太高；相反，它们处于一个名义水平，使`CAP金字塔`保持在不稳定平衡状态。^([^(23)](#fn23))
    `CAP定理`指出，你可以从一致性、可用性和分区容错性中选择任意两个，但无法同时实现所有三个。


    在图[11-13](#477630_1_En_11_Chapter.xhtml#Fig13)中，金字塔被倾斜，使靠近倾斜点的角更接近支点平面，从而使倾斜点对面的角远离支点平面。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg)


    图11-13. 被扰动的`CAP金字塔`


    如图[11-13](#477630_1_En_11_Chapter.xhtml#Fig13)所示，在不改变支点的情况下，你最多可以同时增强任意两个特性。这里我尝试以提高原子性和分区容错性（标签“y
    > x”）为代价，降低一致性（标签x）。


    当你扰动`BASE`状态的不稳定平衡时，以下任意两个特性都可以按你的意愿得到改善：


    - 系统可以从基本可用性改变为五个九的可用性。

    - 系统的状态是“非软”的，这意味着它不会随时间变化，因为所有更新都是原子性应用的，并且没有“仍在传输中”的更新。

    - 系统始终是一致的，因为没有预期的新更新。


    你现在应该能够将此与微服务架构的核心设计原则联系起来。例如，即使你的`Order`微服务运行不正常，客户仍应能够搜索和浏览产品列表和产品详情页面。因此，当`BASE`通过利用多个分区的微服务允许（部分）可用性时，必须识别出可以放宽一致性的机会。诚然，这种一致性的放宽无法完全对用户体验隐藏。为了更清楚地说明，当你的`Order`微服务和`Inventory`微服务被分区时，有可能即使在库存中最后一件商品已被`Joe`确认购买后，`Ann`仍可能将该商品添加到她的购物车并确认结账。她最终才会知道该商品已无库存。从微服务设计的角度来看，这些是暂时的不一致性，最终会变得一致，因此`Ann`的暂时不快最终也会转化为满意，因为她要么在付款前被系统告知该商品不再可用，要么在最坏的情况下（已为不可用商品付款），将启动退款。


    在实际进行系统设计和实现时，还有更多复杂性，但让我们先将其搁置，直到第[13](#477630_1_En_13_Chapter.xhtml)章关于事务的内容。


    ## 总结


    架构关乎权衡，而在微服务架构中，明智的权衡尤为重要。你在第[4](#477630_1_En_4_Chapter.xhtml)章中看到了微服务上下文中的架构反转，这已将外部架构的复杂性提升到了指数级。这使得网络不可避免，因此必须通过设计将实现分区容错性的技术内建到架构中，而不是事后才考虑。分区容错性的程度将影响应用程序的可用性和一致性，而在这三个特性之间决定平衡是设计微服务应用程序的关键。在第[5](#477630_1_En_5_Chapter.xhtml)章中，你在`CQRS`模式中分离了应用程序的命令和查询部分，这是在架构中引入分区的绝佳示例。现在是时候通过一些实际代码来解释这些概念了，请转到第[12](#477630_1_En_12_Chapter.xhtml)章。


    ## 脚注


    12. `Axon for CQRS Architecture`'
  raw: "Having touched upon the CAP Theorem and assuming that you are well\nversed\
    \ with the familiar and perfectly consistent ACID transactions,\nlet’s look at\
    \ the BASE alternative to ACID. BASE  is the acronym for\nBasically Available,\
    \ Soft state, Eventually consistent, which is\ndiametrically opposed to the ACID\
    \ principles. While ACID is based on\npessimistic assumptions and forces consistency\
    \ at the end of every\noperation, BASE\nis based on optimistic assumptions and\
    \ accepts that the database\nconsistency will be in a state of flux to a level\
    \ acceptable to the\nbusiness transaction in consideration. BASE design encourages\
    \ designing\nsystems in such a way that\n\n*   If a portion of the application\
    \ is down or not functioning\n    properly, a few other functionalities of the\
    \ application should still\n    work, or\n\n*   If a few nodes’ failure of the\
    \ customer database impacts only the\n    30 percent of the customers on that\
    \ particular host, the rest of the\n    customers should still be able to use\
    \ the system.\n\n*   Etc.\n\nAll or most of the above characteristics can be realistically\
    \ met if you\ndefine a set of properties for coordination of systems or services\
    \ as\nfollows:\n\n*   A system is basically available\n    when supporting partial\
    \ failures, which may be appreciated than total\n    system failure.\n\n*   The\
    \ state of the system is “soft” in that it can change over time\n    even in cases\
    \ where no further updates are made, because some of the\n    past changes are\
    \ yet to be applied since they are “still on the fly”,\n    originated from other\
    \ partitions.\n\n*   The system will eventually become consistent if no more new\n\
    \    updates are made to the system.\n\nCAP Pyramid\n\nThe CAP\nPyramid \nis an\
    \ inverted tetrahedron^([^(22)](#fn22)) pivoted on its\nvertex with the opposite\
    \ face (base) kept parallel to the pivoted plane\n(ground), as shown in Figure\
    \ [11-12](#477630_1_En_11_Chapter.xhtml#Fig12).\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg)\n\
    \nFigure 11-12.\nThe CAP Pyramid in unstable equillibrium\n\nIf we assume the\
    \ height from the pivot plane of each corner of the\ntop face of the CAP Pyramid\
    \ representing consistency, availability, and\npartition tolerance, you will always\
    \ have a balance between these three\ncharacteristics in the equilibrium state,\
    \ which is a BASE state. At the\nBASE state, all of the three characteristics\
    \ are not too low or not too\nhigh; instead, they are at a nominal level to keep\
    \ the CAP Pyramid in an\nunstable equilibrium.^([^(23)](#fn23))\nThe CAP Theorem\
    \ says you can pick any two from the list of\nconsistency, availability, and partition\
    \ tolerance, but you can’t\nachieve all three at the same time.\n\nIn Figure [11-13](#477630_1_En_11_Chapter.xhtml#Fig13),\
    \ the pyramid\nis tilted to bring the corners near the tilted point to come nearer\
    \ to\nthe pivot plane so that the corners opposite the tilted point are raised\n\
    further from the pivot plane.\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg](images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg)\n\
    \nFigure 11-13.\nThe CAP Pyramid being disturbed\n\nAs shown in Figure [11-13](#477630_1_En_11_Chapter.xhtml#Fig13),\
    \ without\nchanging the pivot point, you can tend to increase any two at the max\
    \ at\na time. Here I attempt to increase (Label “y > x”) atomicity and\npartition\
    \ tolerance at the cost of reduced consistency (Label x).\n\nWhen you disturb\
    \ the unstable equilibrium of the BASE state, any two of\nthe below characteristics\
    \ can be improved to your desire:\n\n*   A system can be changed from basically\
    \ available to available at\n    five-nines.\n\n*   The state of the system is\
    \ “not soft” in that it will not change\n    over time since all updates are applied\
    \ atomically, and no more updates\n    are expected that are “still on the fly.”\n\
    \n*   The system is always consistent, since no new updates are\n    expected.\n\
    \nYou should now be able to relate this to the core design principles\nof a microservices\
    \ architecture. For example, even if your Order\nmicroservice is not functioning\
    \ properly, customers should still be able\nto search and browse through product\
    \ listing and product details pages.\nThus when BASE allows for (partial) availability\
    \ by leveraging multiple\npartitioned microservices, opportunities to relax consistency\
    \ have to be\nidentified. It is true that this relaxation of consistency cannot\
    \ be\ncompletely hidden from a user experience point of view. To make it more\n\
    clear, when your Order microservice and your Inventory microservice are\npartitioned,\
    \ it is possible that even after the last item in stock has\nbeen order confirmed\
    \ for Joe for purchase, Ann may still add the same\nitem to her shopping cart\
    \ and confirm check out. She will only\neventually come to know that this particular\
    \ item is no longer in stock.\nFrom a microservices design point of view, these\
    \ are temporal\ninconsistencies, which be eventually be consistent and hence the\n\
    temporal unhappiness of Ann will also eventually be converted to\nhappiness since\
    \ she will either be informed by the system before payment\nthat the item is no\
    \ longer available or, in the worst case where the\npayment has already been made\
    \ for a non-available item , a refund will be\ninitiated.\nThere are more intricacies\
    \ when you do actual system design and\nimplementation, but let’s park them until\
    \ Chapter [13](#477630_1_En_13_Chapter.xhtml) on transactions.\n\nSummary\nArchitecture\
    \ is all about trade-offs, and judicious trade-offs\nare of increased importance\
    \ in microservices architecture. You saw the\nInversion of Architecture in the\
    \ context of microservices in Chapter\n[4](#477630_1_En_4_Chapter.xhtml), which\
    \ has increased the outer\narchitecture complexities to an exponential level.\
    \ This has made\nnetworks inevitable, so techniques to attain partition tolerance\
    \ must be\nbuilt into the architecture by design, not as an afterthought. The\n\
    amount of partition tolerance will influence the application’s\navailability and\
    \ consistency, and deciding the balance between these\nthree characteristics is\
    \ key in architecting microservices applications.\nIn Chapter [5](#477630_1_En_5_Chapter.xhtml),\
    \ you separated out the Command and\nQuery parts of the application in the CQRS\
    \ pattern, and this is a fine\nexample of introducing partitions in the architecture.\
    \ It’s now time to\nlook at some code in action to explain many of these concepts\
    \ so turn to\nChapter [12](#477630_1_En_12_Chapter.xhtml).\n\nFootnotes\n\n12. Axon\
    \ for CQRS Architecture"
  trans: '

    在探讨了 CAP 定理，并假设你已经熟悉常见且完全一致的 ACID 事务之后，让我们来看看 ACID 的替代方案 BASE。BASE 是 **B**asically
    Available（基本可用）、**S**oft state（软状态）、**E**ventually consistent（最终一致性）的缩写，它与 ACID
    原则截然相反。ACID 基于悲观假设，并在每次操作结束时强制保证一致性；而 BASE 则基于乐观假设，并接受数据库一致性会处于一种动态变化的状态，其程度需符合所考虑的业务事务的可接受水平。BASE
    设计鼓励以如下方式设计系统：


    *   如果应用程序的一部分宕机或运行不正常，应用程序的其他一些功能仍应能正常工作，或者

    *   如果客户数据库的少数节点故障仅影响了该特定主机上 30% 的客户，那么其余客户仍应能够使用该系统。

    *   等等。


    如果你为系统或服务的协调定义如下一组属性，那么上述所有或大部分特性都可以现实地实现：


    *   系统在支持部分故障时是**基本可用**的，这比整个系统完全故障更可取。

    *   系统的状态是“软”的，这意味着即使在没有进一步更新的情况下，它也可能随时间变化，因为一些过去的更改尚未应用，它们“仍在传输中”，源自其他分区。

    *   如果系统不再有新的更新，系统最终将变得**一致**。


    CAP 金字塔


    CAP 金字塔是一个倒置的四面体^(²²)，以其顶点为支点，相对的底面保持与支点平面（地面）平行，如图 11-12 所示。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg](img/477630_1_En_11_Fig12_HTML.jpg)


    图 11-12. 处于不稳定平衡状态的 CAP 金字塔


    如果我们假设 CAP 金字塔顶面每个角（分别代表一致性、可用性和分区容错性）到支点平面的高度，那么在平衡状态下，这三个特性之间将始终存在一种平衡，这种状态就是
    BASE 状态。在 BASE 状态下，这三个特性既不会太低，也不会太高；相反，它们处于一个标称水平，以保持 CAP 金字塔处于不稳定平衡状态。^(²³)

    CAP 定理指出，你可以从一致性、可用性和分区容错性中选择任意两个，但无法同时实现所有三个。


    在图 11-13 中，金字塔被倾斜，使得靠近倾斜点的角更接近支点平面，而倾斜点对面的角则远离支点平面。


    ![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg](img/477630_1_En_11_Fig13_HTML.jpg)


    图 11-13. 被扰动的 CAP 金字塔


    如图 11-13 所示，在不改变支点的情况下，你一次最多可以尝试增加任意两个特性。这里我尝试以提高原子性和分区容错性（标签“y > x”）为代价，降低一致性（标签
    x）。


    当你扰动 BASE 状态的不稳定平衡时，以下任意两个特性都可以按你的意愿得到改善：


    *   系统可以从基本可用性改变为五个九的高可用性。

    *   系统的状态是“非软”的，这意味着它不会随时间变化，因为所有更新都是原子性应用的，并且预计不会有“仍在传输中”的更新。

    *   系统始终是一致的，因为预计不会有新的更新。


    现在，你应该能够将此与微服务架构的核心设计原则联系起来。例如，即使你的订单微服务运行不正常，客户仍应能够搜索和浏览产品列表和产品详情页面。因此，当 BASE
    通过利用多个分区的微服务来允许（部分）可用性时，就需要识别出可以放宽一致性的机会。诚然，从用户体验的角度来看，这种一致性的放宽无法完全隐藏。更明确地说，当你的订单微服务和库存微服务被分区时，有可能即使在库存中最后一件商品已被确认
    Joe 的购买订单后，Ann 仍可能将该商品添加到她的购物车并确认结账。她最终才会知道这件特定商品已无库存。从微服务设计的角度来看，这些是暂时的不一致，最终会变得一致，因此
    Ann 暂时的“不悦”最终也会转化为“满意”，因为系统要么会在付款前通知她该商品已不可用，要么在最坏的情况下（即已为不可用商品付款），将会启动退款流程。

    在实际进行系统设计和实现时，还有更多复杂之处，但让我们先将其搁置，直到第 13 章关于事务的内容中再讨论。


    总结

    架构关乎权衡，而在微服务架构中，明智的权衡尤为重要。你在第 4 章中看到了微服务上下文中的架构反转，这已将外部架构的复杂性提升到了指数级。这使得网络变得不可避免，因此，实现分区容错性的技术必须通过设计内置于架构中，而不是事后才考虑。分区容错性的程度会影响应用程序的可用性和一致性，而在这三个特性之间决定平衡是设计微服务应用程序的关键。在第
    5 章中，你在 CQRS 模式中分离了应用程序的命令和查询部分，这是在架构中引入分区的一个很好的例子。现在是时候通过一些实际代码来解释这些概念了，请转到第
    12 章。


    脚注


    12. 用于 CQRS 架构的 Axon

    '
- fmt: '# 排版后的内容


    在[第11章](#477630_1_En_11_Chapter.xhtml)中，你学习了事件和事件驱动架构，并了解了任何基于EDA的应用程序可以运行的理论和约束。微服务架构天生会引入分区，因此实现分区容错的具体机制非常重要。在本章中，你将借助`Axon`来实现这一点。`Axon`是一个轻量级框架，可帮助你遵循`CQRS`模式开发应用程序。`Axon`框架根据Apache
    2许可证授权，因此你可以免费在任何应用程序中使用该框架。但是，如果你需要围绕`Axon`的专业服务，则由位于阿姆斯特丹的`AxonIQ B.V.`提供。


    `Axon`不是构建基于`CQRS`系统的必要条件，`CQRS`模式也不是使用`Axon`构建系统的必要条件。然而，任何新框架都是应用程序栈中的额外一层债务，因此在应用程序中使用`Axon`的主要原因之一是你渴望在构建应用程序时遵循`CQRS`模式。再次强调，`CQRS`不是架构微服务的必要前提；但是，`CQRS`为解决分布式企业软件系统的可扩展性问题提供了杠杆作用，因此`Axon`和微服务是相辅相成的。


    你在[第7章](#477630_1_En_7_Chapter.xhtml)和[第8章](#477630_1_En_8_Chapter.xhtml)中深入学习了`Spring
    Boot`和`Spring Cloud`，在本章使用`Axon`时，你将大量利用这两者。`CQRS`与`Spring Cloud`的结合将使你拥有来自两个世界的最强大工具的组合。


    在本章中，你将执行以下操作：


    *   认识`Axon`，Java `CQRS`框架

    *   理解`Axon`的构建块

    *   构建并运行一个入门级的`CQRS`示例

    *   构建并运行一个完全分布式的`CQRS`微服务示例


    ## 介绍Axon，CQRS框架


    在开源社区和商业世界中，有相当多的框架允许你在Java和.NET平台上架构基于`CQRS`的解决方案。我选择`Axon`是因为其开源许可证的免费性质，以及它与其他主流语言和平台（包括Java和Spring）的集成选项。


    在本章中，你将看到同时使用`Axon`和`Spring Boot`的工作示例。在介绍示例时，我还将涵盖基本概念和API。建议你参考`Axon`文档以详细了解框架的用法，因为我不会尝试在此复制`Axon`文档。相反，我将通过示例带你了解核心概念，以便你快速上手。


    你将使用两个不同版本的`Axon`来运行这些示例。你首先会使用`Axon 2.4.1`。在这里，你需要通过注解或XML配置显式地连接组件。此外，`Axon
    2.4.1`示例将利用`Spring Boot 1.3.5.RELEASE`版本。在本书的后面，你还会看到使用`Spring Boot 1.5.3.RELEASE`版本的`Axon
    3.0.5`示例。在`Axon 3.0.5`中，可以避免许多显式连接，因为`Axon`使用Spring应用上下文来定位构建块的具体实现，并为那些不存在的构建块提供默认实现。尽管这会让开发人员的工作更轻松，但如果你不是经验丰富的`Axon`开发人员，你可能无法理解底层发生了什么。在`Axon
    2.4.1`中，大部分连接是显式的，因此在代码中作为注解或在配置中作为XML可见，这样你可以更好地理解底层发生了什么。出于这个原因，你将首先使用`Axon`的先前版本（`2.4.1`）^([(24)](#fn24))来运行示例。不过，我也会通过提供相同版本的示例，为你提供一条通往后续`Axon`版本^([(25)](#fn25))的简单路线图。


    ## 什么是Axon？


    `Axon`框架帮助开发人员应用`CQRS`架构模式，并构建模块化的、基于SOA的解决方案。传统的SOA架构解决了软件架构中的一些主流问题；然而，`Axon`填补了过去二十年使用SOA过程中发现的空白。`Axon`提供了最重要构建块的实现，例如聚合、仓库和事件总线（事件的调度机制）。聚合负责将实体分组到父子层次结构中，并明确规定聚合根的责任，以在数据一致性和同步方面管理实体树的生命周期。事件总线帮助你省去创建、维护和跟踪应用程序不同部分之间关联ID的所有繁琐细节。`Axon`保证将事件传递给正确的事件监听器，并并行以及按预期顺序处理它们。此外，`Axon`使用Java注解支持，这意味着你可以在不将代码绑定到`Axon`特定逻辑的情况下构建聚合和事件监听器。


    ## 在哪里可以使用Axon？


    `Axon`是免费且开源的，其标语是*The Jargon CQRS*（你的许多同行仍在互联网上搜索以理解其含义），这足以长期保持管理层的注意力，那么为什么不在你构建的每个新应用程序中使用它呢？不幸的是，与传统的点对点和同步架构风格相比，`CQRS`并不简单直接。在架构设计之初就需要在一定程度上预见未来的复杂性；此外，与传统的SOA，甚至与没有`CQRS`的微服务相比，你的设计必须容纳和演化更多的场景、状态和流程组合。然而，如果你理解这一点并尝试去做，那么这种努力将以多种方式得到回报。以下是一些`CQRS`更有意义的场景：


    *   **可扩展架构**：典型的应用程序在构建时会考虑其生命周期，比如10年、20年甚至50年（如果你仍然使用汇编或大型机编程的话）；然而，在这段时间内，许多此类应用程序很可能会通过更多功能进行扩展。今天构建并部署到云和容器的应用程序也是如此。然而，业务连续性至关重要，功能和系统质量（QoS）方面的扩展必须在不对运行系统造成任何中断的情况下实现。你能做到吗？这个期望是现实的还是仍然是一个神话？答案不仅仅取决于可用的技术和框架。你需要将它们与你的架构思想结合起来，并搁置DevOps等其他方面的所有进步。'
  raw: "In Chapter [11](#477630_1_En_11_Chapter.xhtml), you learned about events and\n\
    event-driven architecture, and you also looked into the theorems and\nconstraints\
    \ within which any EDA-based application can operate.\nMicroservices architecture\
    \ inherently bring partitions, hence concrete\nmechanisms to attain partition\
    \ tolerance are of great importance. You\nwill do that in this chapter with the\
    \ help of Axon. Axon is a lightweight\nframework that will help you develop applications\
    \ following the CQRS pattern. The Axon\nframework is licensed under the Apache\
    \ 2 license so you can use the\nframework in any application for free. However,\
    \ if you need professional\nservices around Axon, they are provided by AxonIQ\
    \ B.V., which is based\nin Amsterdam.\nAxon is not mandatory to build CQRS-based\
    \ systems, nor is a CQRS\npattern mandatory to build systems using Axon. However,\
    \ any new\nframework is an additional layer of debt in your application stack,\
    \ so\none of the primary reasons for you to use Axon in your application would\n\
    be your urge to follow the CQRS pattern in building applications. Again,\nCQRS\
    \ is not a mandatory prerequisite for you to architect microservices;\nhowever,\
    \ CQRS provides leverage to address distributed enterprise\nsoftware system concerns\
    \ about scalability, so Axon and microservices go\nhand in hand.\nYou went into\
    \ enough depth on Spring Boot and Spring Cloud in Chapter\n[7](#477630_1_En_7_Chapter.xhtml)\
    \ and Chapter [8](#477630_1_En_8_Chapter.xhtml), and you will be leveraging both\n\
    extensively while using Axon in this chapter. This marriage of CQRS with\nSpring\
    \ Cloud will arm you with the combination of the most powerful\ntools from both\
    \ worlds.\n\nYou will do the following in this chapter:\n\n*   Meet Axon, the\
    \ Java CQRS framework\n\n*   Understand the building blocks of Axon\n\n*   Build\
    \ and run an introductory CQRS example\n\n*   Build and run a fully distributed\
    \ CQRS microservices\n    example\n\nIntroducing Axon, the CQRS Framework\nThere\
    \ are quite a few frameworks that allow you to architect\nCQRS-based solutions\
    \ in the open source community and in the commercial\nworld, both in Java and\
    \ the .NET platforms. I picked Axon due to its\nfree nature of the open source\
    \ license and its integration options with\nother mainstream languages and platforms,\
    \ including Java and Spring.\nIn this chapter, you will look at working examples\
    \ using both Axon\nand Spring Boot. As I introduce the examples, I will also cover\
    \ the\nessential concepts and APIs. You are advised to refer to the Axon\ndocumentation\
    \ for detailed coverage on the usage of the framework since\nI will not attempt\
    \ to duplicate the Axon documentation here. Instead, I\nwill walk you through\
    \ the core concepts with examples so that you are\ngeared up to speed quickly.\n\
    You will be using two different versions of Axon for these examples.\nYou will\
    \ first use Axon 2.4.1\\. Here, you require explicit wiring of\ncomponents, either\
    \ through annotations or using XML configurations.\nMoreover, the Axon 2.4.1 example\
    \ will leverage the 1.3.5.RELEASE version\nof Spring Boot. Later in the book,\
    \ you will also look at examples in\nAxon 3.0.5 where you use the Spring Boot\
    \ 1.5.3.RELEASE version. In Axon\n3.0.5, a lot of explicit wiring can be avoided\
    \ since Axon uses the\nSpring Application Context to locate specific implementations\
    \ of\nbuilding blocks and provides a default for those that are not there.\nEven\
    \ though this will make life easier for the developer, if you are not\nan experienced\
    \ Axon developer, you may not be able to appreciate what is\nhappening under the\
    \ hood. In Axon 2.4.1, much of this wiring is explicit\nand thus visible in code\
    \ as annotations or in configurations as XML, so\nyou can get a better understanding\
    \ what is happening in the underlying\nlayers. For that reason, you will use the\
    \ previous (2.4.1)\nversion^([^(24)](#fn24)) of Axon for the examples to\nstart\
    \ with. However, I will give you an easy roadmap for later Axon\nversions^([^(25)](#fn25))\
    \ by providing the same\nexamples in those versions too.\n\nWhat Is Axon?\nThe\
    \ Axon framework helps developers apply the CQRS architectural\npattern and build\
    \ modular, SOA-based solutions. Traditional SOA\narchitecture addresses some mainstream\
    \ concerns in software\narchitectures; however, Axon fills the gap that has been\
    \ found in the\nexperience while using SOA over the last two decades. Axon provides\n\
    implementations of the most important building blocks, such as aggregates, repositories,\
    \ and event buses (the\ndispatching mechanism for events). Aggregates take care\
    \ of grouping\nentities in a parent-child hierarchy and prescribe clear responsibility\n\
    to aggregate roots to manage the lifecycle of the entity tree in terms\nof data\
    \ consistency and synchronization. Event buses help you to do away\nwith all the\
    \ nitty-gritty details of creating, maintaining, and tracking\ncorrelation ids\
    \ between different parts of your application. Axon\nguarantees the delivery of\
    \ events to the right event listeners and\nprocessing them in parallel as well\
    \ as in the intended sequence. Next,\nAxon uses Java annotation support, which\
    \ means you can build aggregates\nand event listeners without tying your code\
    \ to Axon-specific logic.\n\nWhere Can You Use Axon?\n\nAxon is free and open\
    \ source, and has the tag line of *The Jargon\nCQRS* (which many of your peers\
    \ are still searching the Internet to\nunderstand what it means), which is quite\
    \ enough to maintain the\nattention of executive management for a long time, so\
    \ why not use it in\nevery new application you build? Unfortunately, CQRS is not\
    \ simple and\nstraightforward compared to traditional one-to-one and synchronous\n\
    architecture styles. Conceiving future complexities to an extent at the\nstart\
    \ of architecture design is required; further your design has to\naccommodate\
    \ and evolve more combinations of scenarios, states, and flows\ncompared to traditional\
    \ SOA or for that matter even compared to\nmicroservices without CQRS. However,\
    \ if you understand this and if you\nattempt it, the effort will be paid back\
    \ in more than one way. Here are\nsome scenarios where CQRS makes more sense:\n\
    \n*   **Extensible architectures** : Typical applications\n    are built with\
    \ a span of life in mind, say 10, 20, or even 50 years (if\n    you still program\
    \ in assembly or mainframe); however, during this span\n    many of these applications\
    \ are likely to be extended with more\n    functionality. It’s the same story\
    \ for applications built today, getting\n    deployed to clouds and containers.\
    \ However, business continuity is\n    paramount, and extensions both in terms\
    \ of functionality and quality of\n    system (QoS) have to be effected with zero\
    \ disruption to running\n    systems. Can you do this? Is this expectation realistic\
    \ or still a myth?\n    Well, the answer depends not on the technologies and frameworks\n\
    \    available alone. You need to combine them with your architectural\n    thoughts\
    \ too, put aside all other advancements in DevOps, etc."
  trans: '

    在第 11 章中，你学习了事件和事件驱动架构，并了解了任何基于 EDA 的应用程序可以运行的理论和约束。微服务架构天生就引入了分区，因此实现分区容错的具体机制至关重要。在本章中，你将借助
    Axon 来实现这一点。Axon 是一个轻量级框架，可帮助你遵循 CQRS 模式开发应用程序。Axon 框架采用 Apache 2 许可证授权，因此你可以在任何应用程序中免费使用该框架。不过，如果你需要围绕
    Axon 的专业服务，则由总部位于阿姆斯特丹的 AxonIQ B.V.提供。


    构建基于 CQRS 的系统并非必须使用 Axon，使用 Axon 构建系统也并非必须采用 CQRS 模式。然而，任何新框架都是你应用程序栈中的额外一层债务，因此你在应用程序中使用
    Axon 的主要原因之一，可能是你渴望在构建应用程序时遵循 CQRS 模式。再次强调，CQRS 并非你设计微服务架构的必备前提；但是，CQRS 为解决分布式企业软件系统的可扩展性问题提供了杠杆，因此
    Axon 和微服务是相辅相成的。


    你在第 7 章和第 8 章中已经深入学习了 Spring Boot 和 Spring Cloud，在本章使用 Axon 时，你将大量利用这两者。这种 CQRS
    与 Spring Cloud 的结合，将让你同时拥有来自两个世界的最强大工具。


    在本章中，你将完成以下内容：


    *   认识 Axon，Java CQRS 框架

    *   理解 Axon 的构建模块

    *   构建并运行一个入门级的 CQRS 示例

    *   构建并运行一个完全分布式的 CQRS 微服务示例


    介绍 Axon，CQRS 框架

    在开源社区和商业世界中，有相当多的框架允许你设计基于 CQRS 的解决方案，涵盖 Java 和.NET 平台。我选择 Axon 是因为其开源许可证的免费性质，以及它与其他主流语言和平台（包括
    Java 和 Spring）的集成选项。


    在本章中，你将看到同时使用 Axon 和 Spring Boot 的工作示例。在介绍示例时，我还会涵盖基本概念和 API。建议你参考 Axon 文档以详细了解框架的用法，因为我不会在此尝试复制
    Axon 文档。相反，我将通过示例带你了解核心概念，以便你能够快速上手。


    对于这些示例，你将使用两个不同版本的 Axon。你首先会使用 Axon 2.4.1。在这里，你需要通过注解或使用 XML 配置来显式地连接组件。此外，Axon
    2.4.1 示例将利用 Spring Boot 的 1.3.5.RELEASE 版本。在本书后面，你还会看到使用 Spring Boot 1.5.3.RELEASE
    版本的 Axon 3.0.5 示例。在 Axon 3.0.5 中，可以避免许多显式连接，因为 Axon 使用 Spring 应用上下文来定位构建模块的具体实现，并为那些不存在的模块提供默认实现。尽管这会让开发人员的生活更轻松，但如果你不是经验丰富的
    Axon 开发人员，你可能无法理解底层发生了什么。在 Axon 2.4.1 中，大部分连接是显式的，因此在代码中作为注解或在配置中作为 XML 可见，这样你可以更好地理解底层发生的情况。因此，你将首先使用
    Axon 的旧版本（2.4.1）^(²⁴)来开始示例。不过，我也会通过提供相同版本的示例，为你提供一条通往后续 Axon 版本^(²⁵)的简易路线图。


    什么是 Axon？

    Axon 框架帮助开发人员应用 CQRS 架构模式，并构建模块化的、基于 SOA 的解决方案。传统的 SOA 架构解决了软件架构中的一些主流问题；然而，Axon
    填补了过去二十年使用 SOA 过程中发现的空白。Axon 提供了最重要构建模块的实现，例如聚合、仓库和事件总线（事件的调度机制）。聚合负责将实体分组到父子层次结构中，并明确规定聚合根的责任，以在数据一致性和同步方面管理实体树的生命周期。事件总线帮助你省去创建、维护和跟踪应用程序不同部分之间关联
    ID 的所有繁琐细节。Axon 保证将事件传递给正确的事件监听器，并并行以及按预期顺序处理它们。此外，Axon 使用 Java 注解支持，这意味着你可以在不将代码绑定到
    Axon 特定逻辑的情况下构建聚合和事件监听器。


    在哪里可以使用 Axon？

    Axon 是免费且开源的，其标语是*The Jargon CQRS*（你的许多同行仍在互联网上搜索以理解其含义），这足以长期保持管理层的关注，那么为什么不在你构建的每个新应用程序中使用它呢？不幸的是，与传统的点对点和同步架构风格相比，CQRS
    并不简单直接。在架构设计之初就需要在一定程度上预见未来的复杂性；此外，与传统的 SOA，甚至与没有 CQRS 的微服务相比，你的设计必须容纳和演化更多场景、状态和流程的组合。然而，如果你理解这一点并尝试去做，那么付出的努力将以多种方式得到回报。以下是一些
    CQRS 更有意义的场景：


    *   **可扩展架构**：典型的应用程序在设计时都会考虑其生命周期，比如 10 年、20 年甚至 50 年（如果你还在用汇编或大型机编程的话）；然而，在这段时间内，许多此类应用程序很可能会通过增加更多功能来进行扩展。今天构建的应用程序也是如此，它们被部署到云和容器中。但是，业务连续性至关重要，无论是功能方面的扩展还是系统质量（QoS）方面的扩展，都必须在不对运行系统造成任何中断的情况下实现。你能做到吗？这种期望是现实的还是仍然是一个神话？嗯，答案不仅仅取决于可用的技术和框架。你还需要将它们与你的架构思想结合起来，并搁置
    DevOps 等其他方面的所有进步。

