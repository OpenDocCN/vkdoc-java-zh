    \ to implement different\nscenarios of the CQRS pattern in the previous chapter.\
    \ In this chapter,\nyou will be revisiting Axon for more scenarios in the microservices\n\
    context, including executing long-running computational processing. To\ndo that\
    \ effectively, let’s start the discussion with a few basics,\nincluding transactions.\
    \ A transaction in its simple form is a change or\nexchange of values between\
    \ entities. The parties involved can be a\nsingle entity or more than one entity.\
    \ When the party involved is a\nsingle entity, typically the transaction is a\
    \ local transaction. If more\nthan one party is involved, the transaction can\
    \ be classified as either\na local transaction or a distributed transaction, depending\
    \ on the\nnature and location of the entities involved.\nA transaction may involve\
    \ a single step or multiple steps. Whether a\nsingle step or multiple steps, a\
    \ transaction is a single unit of work\nthat embodies these individual steps.\
    \ For the successful completion of a\ntransaction, each of the involved individual\
    \ steps should succeed. If\nany of the individual steps fail, the transaction\
    \ should undo any of the\neffects of the other steps it has already done within\
    \ that\ntransaction.\nWith this preface, you will look into the details of transactions,\n\
    especially distributed transactions. I will only touch base on the\nessentials\
    \ of transactions; I’ll spend more time on the practical\nimplication aspects,\
    \ especially in the context of microservices.\nDetailing out transactions to any\
    \ more depth would require its own\ncomplete book, so this coverage will be limited\
    \ to discussions around\nmicroservices and few practical tools you can use to\
    \ build reliable\nmicroservices.\n\nIn this chapter you will learn about\n\n*\
    \   The indeterministic characteristics of computer networks\n\n*   Transaction\
    \ aspects in general\n\n*   Distributed transactions vs. local transactions\n\n\
    *   ACID vs. BASE transactions\n\n*   A complete example demonstrating distributed\
    \ transactions using\n    multiple resource managers"
