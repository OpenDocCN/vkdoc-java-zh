    ## Execute Basic Data Manipulations with MongoDB


    In the Windows command prompt where the mongo shell is connected to a running
    `mongod` instance, you can query the currently connected database using this command:


    ```

    db.getName()

    ```


    This command will show all databases:


    ```

    showdbs

    ```


    You can switch to the `test` database using this command:


    ```

    use test

    ```


    You can then list all the collections available in the current database using
    this command:


    ```

    show collections

    ```


    Listing [A-3](#477630_1_En_20_Chapter.xhtml#PC14) shows how to connect to a specific
    database in MongoDB.


    ```

    D:\Applns\MongoDB\Server\3.2.6\bin>D:\Applns\MongoDB\Server\3.2.6\bin\mongo

    MongoDB shell version: 3.2.6

    connecting to: test

    > db.getName()

    test

    > use test

    switched to db test

    > show collections

    product

    productCategory

    >

    Listing A-3

    Select a Database in MongoDB

    ```


    You can insert a new document into the `students` collection using this command:


    ```

    db.students.insert(

    {

    name: "bob",

    class: 2,

    division: "B",

    subjects: ["english", "science", "maths"]

    }

    )

    ```


    You can query the just inserted document from the `students` collection using
    this command (see also Listing [A-4](#477630_1_En_20_Chapter.xhtml#PC17)):


    ```

    > db.students.insert(

    ... {

    ... name: "bob",

    ... class: 2,

    ... division: "B",

    ... subjects: ["english", "science", "maths"]

    ... }

    ... )

    WriteResult({ "nInserted" : 1 })

    > db.students.find()

    { "_id" : ObjectId("5c7a9071f2a95d2c70e35476"), "name" : "bob", "class" : 2, "di

    vision" : "B", "subjects" : [ "english", "science", "maths" ] }

    >

    Listing A-4

    Insert Documents into MongoDB Collections and Query

    ```


    ```

    db.students.find()

    ```


    You may now update the just inserted document with the `name` field having a value
    of `bob` in the `students` collection using this command:


    ```

    db.students.update(

    { "name" : "bob" },

    {

    $set: { "division": "C" }

    }

    )

    ```


    You can query the just updated document using this command:


    ```

    db.students.find()

    ```


    Listing [A-5](#477630_1_En_20_Chapter.xhtml#PC20) shows how to update a document
    in a collection in MongoDB.


    ```

    > db.students.update(

    ... { "name" : "bob" },

    ... {

    ... $set: { "division": "C" }

    ... }

    ... )

    WriteResult({ "nMatched" : 1, "nUpserted" : 0, "nModified" : 1 })

    > db.students.find()

    { "_id" : ObjectId("5c7a9071f2a95d2c70e35476"), "name" : "bob", "class" : 2, "di

    vision" : "C", "subjects" : [ "english", "science", "maths" ] }

    >

    Listing A-5

    Update Documents in MongoDB Collections

    ```


    Note that the value of the `division` field has changed from `B` to `C`.


    You may now delete the document with the `name` field having the value of `bob`
    in the `students` collection using this command (see also Listing [A-6](#477630_1_En_20_Chapter.xhtml#PC22)):


    ```

    > db.students.remove( { "name": "bob" } )

    WriteResult({ "nRemoved" : 1 })

    > db.students.find()

    >

    Listing A-6

    Remove Documents from MongoDB Collections

    ```


    ```

    db.students.remove( { "name": "bob" } )

    ```


    You may remove an entire collection from the database using this command (see
    also Listing [A-7](#477630_1_En_20_Chapter.xhtml#PC24)):


    ```

    > show collections

    product

    productCategory

    students

    > db.students.drop()

    true

    > show collections

    product

    productCategory

    >

    Listing A-7

    Remove Collections from MongoDB

    ```


    ```

    db.collection.drop()

    ```


    `db.dropDatabase()` will drop the database you are connected to.


    ## Robomongo, A GUI for MongoDB


    Robomongo^([^(49)](#fn49)) is a cross-platform MongoDB management tool that is
    mongo shell-centric. It embeds the actual mongo shell in a tabbed interface. It
    provides access to a shell command line as well as a GUI.


    ### Download and Install Robomongo Community Edition


    The Robomongo community edition is available for download at [`https://robomongo.org/download`](https://robomongo.org/download).
    See Figure [A-3](#477630_1_En_20_Chapter.xhtml#Fig3).


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig3_HTML.jpg](images/477630_1_En_20_Chapter/477630_1_En_20_Fig3_HTML.jpg)


    **Figure A-3** Download Robomongo


    You are advised to download the portable version for Windows 64-bit and unzip
    the archive again to a location of your convenience. In my machine, the location
    is


    ```

    D:\Applns\Robomongo\robomongo-0.9.0-rc9

    ```


    ### Start and Connect to MongoDB Using Robomongo


    You can execute this file to bring up the GUI:


    ```

    D:\Applns\Robomongo\robomongo-0.9.0-rc9\Robomongo.exe

    ```


    Once the GUI is up, you can connect to the MongoDB server by selecting the Connect
    button shown in Figure [A-4](#477630_1_En_20_Chapter.xhtml#Fig4).


    ![../images/477630_1_En_20_Chapter/477630_1_En_20_Fig4_HTML.jpg](images/477630_1_En_20_Chapter/477630_1_En_20_Fig4_HTML.jpg)


    **Figure A-4** Connect to MongoDB using Robomongo


    ### Execute Basic Data Manipulation with MongoDB


    The browser pane allows you to select the required collection in the MongoDB and
    a right click provides many options to do basic data operations. See Figure [A-5](#477630_1_En_20_Chapter.xhtml#Fig5).'
