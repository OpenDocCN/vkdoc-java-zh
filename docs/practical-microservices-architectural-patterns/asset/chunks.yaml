    `Controller` 方法将创建一个新命令，并将其发送到命令总线，然后等待其执行。执行结果在可用时返回。此 `sendAndWait` 方法将无限期阻塞，直到有结果可用或当前线程被中断。如果线程被中断，该方法返回
    null。如果在处理过程中发生异常，该异常会被包装在 `CommandExecutionException` 中。


    清单 12-8 展示了命令处理器。


