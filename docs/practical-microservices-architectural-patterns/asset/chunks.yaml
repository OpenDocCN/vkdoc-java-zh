    \ to the RabbitMQ cluster. This will be\nconfirmed on the message sender window\
    \ with the following DEBUG message:\n\n```\n2017-06-12 19:50:59 DEBUG com.acme.ch06.ex03.Sender.main:32\
    \ - Sender send message----->Message from Sender on Mon Jun 12 19:50:59 IST 2017\n\
    ```\n\nYou may now want to inspect the RabbitMQ log files. Assuming rabbit1 and\n\
    rabbit2 are the node names of the RabbitMQ server instances of your\ncluster,\
    \ the logs are written to below files in my machine:\n\n```\nC:\\Users\\binil\\\
    AppData\\Roaming\\RabbitMQ\\log\\rabbit1.log\nC:\\Users\\binil\\AppData\\Roaming\\\
    RabbitMQ\\log\\rabbit2.log\n```\n\nYou should be able to see the following lines\
    \ in the logs of any of the\nRabbitMQ instances of the cluster:\n\n```\n=INFO\
    \ REPORT==== 12-Jun-2017::19:50:59 ===\naccepting AMQP connection  (127.0.0.1:54315\
    \ -> 127.0.0.1:5673)\n=INFO REPORT==== 12-Jun-2017::19:50:59 ===\nMirrored queue\
    \ 'remoting.queue' in vhost '/': Adding mirror on node rabbit1@tiger: \n```\n\n\
    The above logs validate two aspects:\n\n*   The instance corresponding to this\
