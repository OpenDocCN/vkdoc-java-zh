    ## Summary


    In this chapter, you learned about Spring Boot and how its opinionated view of
    the Spring platform and many other third-party Java libraries provides an easy
    and less scripted way of getting things done, leveraging code, and packaging by
    conventions. You then played with MongoDB, putting code to execute CRUD events
    over a custom entity or resource. You used both Postman and Curl to do simple
    testing. Code in later sections also introduced the concepts of HATEOAS and HAL.
    Next, you developed a complete REST controller sample so that you have a place
    on the server side where you can put complex business logic and custom rules and
    validations if required. In succeeding chapters, more code samples will be built
    over the samples present in this chapter. Further, most of the succeeding chapters
    leverage Spring Boot, so this chapter is a foundation for you to get the code
    working in the rest of the chapters. After Spring Boot, the next framework you
    want to look into is Spring Cloud, which provides implementations for common patterns
    in distributed microservices ecosystems. You will do so in the next chapter.


    ## Footnotes


    8. Spring Cloud


    In Chapter [7](#477630_1_En_7_Chapter.xhtml), you were introduced to the Spring
    Boot. You explored several examples built with Spring Boot so now you have the
    building blocks for an enterprise-level application, whether the application is
    medium scale or large scale. In this chapter, you will look into the next indispensable
    piece of Spring called Spring Cloud, which is built over Spring Boot itself. There
    are a bunch of common patterns in distributed, microservices ecosystems that can
    help you integrate the core services as a loosely coupled continuum, and Spring
    Cloud provides many powerful tools that enhance the behavior of Spring Boot applications
    to implement those patterns. You will learn only the major and critical blocks
    required to keep the discussion continuing in subsequent chapters, again with
    the help of concrete code samples. The samples in this chapter are incrementally
    built over the preceding samples, so please don’t skip any section or you may
    not get the succeeding samples to run smoothly.


    You will learn about the following in this chapter:


    *   The Feign client to make HTTP API calls

    *   Hystrix, the circuit breakers to gracefully degrade

    *   The Hystrix dashboard, showing a graphical overview of a circuit breaker in
    the system

    *   Ribbon, the client-side load balancer

    *   Eureka, a REST-based registry service

    *   Zuul, the API gateway, which is the front controller for your microservices

    *   The Config Server to externalize version control and manage configuration
    parameters for microservices


    ## Spring Cloud for Microservices Architecture


    The “The Architecture of Microservices” section in Chapter [4](#477630_1_En_4_Chapter.xhtml)
    talked about the major new concerns you need to deal with when you move from a
    traditional architecture to a microservices-based architecture. Due to the inversion
    effect in microservices architecture, many of the intra-application concerns now
    get moved to the inter (micro) services level, and when the number of microservices
    keeps growing, so does the inherent growth in associated outer architecture complexity.


    Spring Cloud provides good out-of-the-box support for typical use cases and extensibility
    mechanisms required in the microservices ecosystem. A few of them are listed here:


    *   Distributed/versioned configuration

    *   Service registration and discovery

    *   Routing and load balancing

    *   Interservice calls

    *   Circuit breakers

    *   Distributed messaging


    Similar to Spring Boot, Spring Cloud takes a very declarative approach, and often
    you get a lot of features with just an inclusion of a dependency in a classpath
    and/or an annotation. Let’s look into a few of them now.'
