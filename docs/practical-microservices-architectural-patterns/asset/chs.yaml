  \n**图 A-5** 使用 Robomongo 浏览 MongoDB 集合\n\n**总结**\n本附录引导您完成了 MongoDB 的安装和使用。您将在本书的示例中大量使用\
  \ MongoDB。当您需要对 MongoDB 执行操作时，请参考本附录。\n\n**脚注**\n\n**安装、配置和运行 RabbitMQ 集群**\n\n\
  RabbitMQ 是一个开源消息中间件，可以在所有主流操作系统上运行，并支持多种平台的开发工具。作为一个消息代理，它允许您发送和接收消息，并且您的消息可以安全地保存在一个地方，直到被消费者接收。RabbitMQ\
  \ 可从 [`www.rabbitmq.com/`](http://www.rabbitmq.com/) 下载。\n\n您将在本附录中探索以下内容：\n\n*\
  \   如何下载和安装 Erlang（安装 RabbitMQ 的先决条件）\n*   如何安装和启动 RabbitMQ 服务器\n*   如何启用 RabbitMQ\
  \ 管理插件并查看 RabbitMQ 管理控制台\n*   如何设置包含两个节点的 RabbitMQ 集群\n*   如何在 RabbitMQ 集群中关闭和启动单个节点\n\
  \n**RabbitMQ 简介**\n\n消息代理的主要区别特征在于其能够解耦消息生产者和消息消费者。因此，生产者和消费者可以按照自己的节奏和便利性发布和消费消息。RabbitMQ\
  \ 的一些特性包括：\n\n*   **可靠性：** RabbitMQ 在性能与可靠性之间进行权衡。可靠性特性包括但不限于消息持久化、投递确认、发布者确认和高可用性。\n\
  *   **路由：** RabbitMQ 在消息到达队列之前，通过交换机进行路由。有几种内置的交换机类型可用于典型的路由逻辑。您还可以将交换机绑定在一起，甚至编写自己的交换机类型作为插件，以实现更复杂的路由。\n\
  \n**设置 RabbitMQ**\n在本节中，您将下载并安装 Erlang，安装和配置 RabbitMQ，并测试安装。\n\n**下载并安装 Erlang**\n\
  Erlang 是一种编程语言，通常用于构建大规模实时和高可用性系统。Erlang 的运行时内置了对并发、分布式和容错的支持。RabbitMQ 需要在机器上安装\
  \ Erlang，因此您将在本节中安装并设置 Erlang。\nErlang 可从 [`www.erlang.org/downloads`](http://www.erlang.org/downloads)\
  \ 下载。\n\n运行 Erlang 安装文件。尽管您可以选择任何位置，例如：\n\n```\nC:\\Program Files\\erlx.x.x\\\n\
  ```\n\n我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：\n\n```\n\
  D:\\Applns\\Erlang\\erl8.0-otp_win64_19.0\n```\n\n将 `ERLANG_HOME` 设置为您实际放置 Erlang\
  \ 安装的位置。在我的机器上是 `D:\\Applns\\Erlang\\erl8.0-otp_win64_19.0\\erl8.0`。RabbitMQ 启动文件期望执行\
  \ `%ERLANG_HOME%\\bin\\erl.exe`：\n\n```\nset ERLANG_HOME=D:\\Applns\\Erlang\\erl8.0-otp_win64_19.0\\\
  erl8.0\n```\n\n**安装并配置 RabbitMQ**\nRabbitMQ 可从 [`www.rabbitmq.com/download.html`](http://www.rabbitmq.com/download.html)\
  \ 下载。详细的安装说明也可在 [`www.rabbitmq.com/install-windows-manual.html`](http://www.rabbitmq.com/install-windows-manual.html)\
  \ 找到。\n下载名为 `rabbitmq-server-windows-3.6.9.zip` 的 RabbitMQ 安装文件。\n从 zip 文件中，将名为\
  \ `rabbitmq_server-3.6.9` 的文件夹解压到 `C:\\Program Files\\RabbitMQ`（或适合应用程序文件的其他位置）。\n\
  \n我明确避免路径中包含空格的位置，例如 `Program Files` 中的空格。因此，在我的 Windows 机器上，我使用以下位置：\n\n```\nD:\\\
  Applns\\RabbitMQ\\rabbitmq_server-3.6.9\n```\n\n默认情况下，RabbitMQ 日志和 Mnesia 数据库存储在用户的应用程序数据目录中，在我的机器上是\
  \ `C:\\Users\\binil\\AppData\\Roaming\\RabbitMQ`。\n如果您必须将 RabbitMQ 作为手动安装的 Windows\
  \ 服务运行，您还需要同步 Erlang cookie；换句话说，服务帐户和运行 `rabbitmqctl.bat` 的用户所使用的 Erlang 安全 cookie\
  \ 必须同步，`rabbitmqctl.bat` 才能正常工作。这可以通过确保 Erlang cookie 文件包含相同的字符串来实现。为此，请复制 `.erlang.cookie`\
  \ 文件（在我的机器上位于 Windows 目录 `C:\\WINDOWS\\.erlang.cookie`），并替换用户的 `.erlang.cookie`，该文件位于用户的主目录中（在我的机器上是\
  \ `C:\\Users\\binil\\.erlang.cookie`）。\n\n**开始使用 RabbitMQ**\n在本节中，您将启动并连接到已安装的 RabbitMQ\
  \ 服务器，并执行基本的数据操作。\n\n**启用管理插件**\n\nRabbitmq-management 插件公开了一个基于 HTTP 的 API，用于管理和监控\
