  \ Product Server 微服务，这样微服务的实现以及微服务间的通信都将采用智能的异步模式！\n\n`org.springframework.web.client.AsyncRestTemplate`\
  \ 是 Spring 用于异步客户端 HTTP 访问的核心类。它公开的方法与 `RestTemplate` 类似；不过，它返回的是 `ListenableFuture`\
  \ 包装器，而不是具体的结果。默认情况下，`AsyncRestTemplate` 依赖标准的 JDK 工具来建立 HTTP 连接。同样，您也可以通过使用接受 `AsyncClientHttpRequestFactory`\
  \ 的构造函数，切换到其他 HTTP 库，例如 Apache HttpComponents、Netty 或 OkHttp。`AsyncRestTemplate`\
  \ 为您提供了一个 `ListenableFuture`，因此容器线程不会等待接收响应；相反，由于您使用的是 `AsyncRestTemplate`，它会继续执行下一步处理。`ListenableFuture`\
  \ 能够接受完成回调，因此您可以添加失败和成功场景的回调。如果成功，您将结果设置到 `DeferredResult` 的主体中。由于 Spring MVC 通过空闲的\
