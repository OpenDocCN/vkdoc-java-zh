  \n```\ncd ch07-02\nD:\\binil\\gold\\pack03\\ch07\\ch07-02>test\nD:\\binil\\gold\\\
  pack03\\ch07\\ch07-02>mvn test\n```\n\n开发一个 RESTful Web 服务\nREST（表述性状态转移）是一种用于设计分布式系统的架构风格，由\
  \ Roy Fielding 在 2000 年的博士论文中提出。REST 是一组应用于资源的通用约束；然而，它通常与 HTTP 相关联。本节将介绍 REST 概念，你将看到一个完整的\
  \ REST 提供者以及一个使用 Spring Boot 的 REST 消费者的完整实现。\n\nREST 基础\nREST 推荐一组约束，例如无状态、具有客户端/服务器关系、提供统一接口、请求-响应周期是幂等的等等。REST\
  \ 并非严格与 HTTP 相关，但它最常与 HTTP 关联。\n\n以下总结了 REST 的原则：\n\n*   资源暴露 URI，这些 URI 易于理解且具有类似目录的结构，以便它们可以被发现、链接和遍历。\n\
  *   表示层以 JSON 或 XML 作为线缆级格式传输，以表示数据对象和属性。\n*   操作或消息显式地使用 HTTP 方法（例如 GET、POST、PUT\
  \ 和 DELETE）。\n*   操作是无状态的，因此你在请求之间不会在服务器上存储任何客户端上下文。客户端仅持有会话状态，这样当客户端数量增加时，服务器的可扩展性不会因大量状态数据而受到影响。\n\
  \n使用 REST 还有其他优点。一个主要优点是像缓存和代理这样的中间件可以提供缓存命中，从而除非必要，否则不会给实际的资源服务器带来压力。缓存服务器是一种专门的代理服务器，它将帮助你提高\
  \ Web 性能。Web 性能可以在客户端、服务器端甚至其他中间件之间得到改善。遵循 REST HTTP 标准和约定将帮助你利用这些优化，由于 HTTP 是一个标准，并且许多设备都提供了配置这些优化的功能，因此你可以免费获得这些优化。\n\
  \n用于 CRUD 资源的 HTTP 方法\n\n以下是可用于实现 REST 的主要 HTTP 方法：\n\n*   GET：GET 是最简单的 HTTP 操作，其目的是从服务器检索资源。200\
  \ OK 是成功操作的状态码。所有 GET 操作都应该是幂等的，这意味着无论你用相同的参数重复操作多少次，资源的状态都不应发生任何变化。\n*   POST^(¹²)：HTTP\
  \ POST 为客户端提供了一种向服务器发送信息的选项。POST 推荐用于创建新资源（尽管它也可以更新现有资源）。\n*   PUT：HTTP PUT 也为客户端提供了一种向服务器发送信息的选项；然而，根据\
  \ HTTP 规范，PUT 的使用语义与 POST 略有不同。使用 PUT，你可以向服务器发送一个“新对象”，以将其放置或定位在由 URI 表示的服务器位置，因此其意图应该是用新资源替换现有资源。就单个客户端而言，PUT\
  \ 请求是幂等的。如果在 PUT 请求中只提供了数据元素的子集，其余部分将被替换为空或 null。\n*   DELETE：DELETE 为客户端提供了一种从服务器移除资源的选项。URI\
  \ 标识要删除的资源。资源可能不必立即删除；相反，它可以通过后台的异步或长时间运行的操作来完成。\n\n在 Spring Boot 中开发一个 REST 控制器\n\
  \n你将使用前面章节中描述的相同 Product 实体来构建一个功能完整的 REST 服务，以执行 CRUD 操作。Spring 构建 RESTful Web\
  \ 服务的方法是使用控制器来处理 HTTP 请求。清单 7-13 到 7-16 展示了使用 Spring 构建基于 HATEOAS 的 REST 控制器的完整代码。清单\
  \ 7-13 展示了如何检索具有特定 ID 的产品。`@RequestMapping` 注解确保对 `/products/{id}` 的 HTTP 请求被映射到\
  \ `getProduct()` 方法。\n\n```\n@RestController\npublic class ProductRestController\
  \ {\n@Autowired\nprivate ProductRepository productRepository;\n@RequestMapping(value\
  \ = \"/products/{id}\", method = RequestMethod.GET,\nproduces = MediaType.APPLICATION_JSON_VALUE)\n\
  public ResponseEntity> getProduct(\n@PathVariable(\"id\") String id) {\nProduct\
  \ product = productRepository.findOne(id);\nif (product == null) {\nreturn new ResponseEntity>(HttpStatus.NOT_FOUND);\n\
  }\nResource productRes = new Resource(product,\nlinkTo(methodOn(ProductRestController.class).getProduct(\n\
  product.getId())).withSelfRel());\nreturn new ResponseEntity>(productRes,\nHttpStatus.OK);\n\
  }\n@RequestMapping(value = \"/products\", method = RequestMethod.GET,\nproduces\
  \ = {MediaType.APPLICATION_JSON_VALUE})\npublic ResponseEntity>> getAllProducts()\
  \ {\nList products = productRepository.findAll();\nLink links[] = {linkTo(methodOn(ProductRestController.class).\n\
  getAllProducts()).withSelfRel(),linkTo(methodOn(\nProductRestController.class).getAllProducts()).withRel(\n\
  \"getAllProducts\")};\nif(products.isEmpty()){\nreturn new ResponseEntity>>(\nHttpStatus.NOT_FOUND);\n\
  }\nList> list=new ArrayList> ();\nfor(Product product:products){\nlist.add(new Resource(product,\n\
  linkTo(methodOn(ProductRestController.class).getProduct(\nproduct.getId())).withSelfRel()));\n\
  }\nResources> productRes =\nnew Resources>(list, links) ;\nreturn new ResponseEntity>>(\n\
  productRes, HttpStatus.OK);\n}\n}\n清单 7-13\n启用 HATEOAS 的 REST 控制器（含 GET 操作）(ch07\\\
  ch07-03\\src\\main\\java\\com\\acme\\ch07\\ex03\\product\\controller\\ProductRestController.java)\n\
  ```\n\n\n\nREST 组件通过 `@RestController` 注解进行标识，而 `ProductRestController` 则处理针对 Product\
  \ 实体的基于 HTTP 的 CRUD 请求。方法体的实现使用提供的 id 检索产品实体，并返回一个新的 `Product` 对象。此 `Product` 对象的数据将直接以\
  \ JSON 格式写入 HTTP 响应。清单 7-13 还展示了一个批量检索操作，用于检索所有 `Product` 资源。\n\n传统的 MVC 控制器与上述\
  \ RESTful Web 服务控制器之间的一个关键区别在于 HTTP 响应体的创建方式。这个 RESTful Web 服务控制器并非依赖视图技术来执行问候数据到\
  \ HTML 的服务器端渲染，而是简单地填充并返回一个 `Greeting` 对象。该对象数据将直接以 JSON 格式写入 HTTP 响应。\n\n这段代码使用了\
  \ Spring 4 的 `@RestController` 注解，该注解将类完全标记为控制器，其中每个方法都返回一个领域对象，而不是像传统 MVC 控制器那样返回视图。它是\
  \ `@Controller` 和 `@ResponseBody` 组合在一起的简写形式。\n\n为了将 `Product` 对象转换为 JSON，Spring\
  \ 使用了 HTTP 消息转换器支持。你无需手动执行此转换，因为类路径上存在 Jackson 2，所以 Spring 的 `MappingJackson2HttpMessageConverter`\
  \ 会被自动选中，用于将 `Product` 实例转换为 JSON。\n\n让我们看看其他操作。清单 7-14 展示了如何创建新资源。\n\n```\n@RestController\n\
  public class ProductRestController {\n@RequestMapping(value = \"/products\", method\
  \ = RequestMethod.POST)\npublic ResponseEntity> postProduct(@RequestBody Product\n\
  product,    UriComponentsBuilder ucBuilder) {\nList products =\nproductRepository.findByCode(product.getCode());\n\
  if (products.size() > 0) {\nLOGGER.debug(\"A Product with code {} already exist\"\
  ,\nproduct.getCode());\nreturn new ResponseEntity>(HttpStatus.CONFLICT);\n}\nProduct\
  \ newProduct = productRepository.save(product);\nHttpHeaders headers = new HttpHeaders();\n\
  headers.setLocation(ucBuilder.path(\"/products/{id}\").buildAndExpand(\nproduct.getId()).toUri());\n\
  Resource productRes =new Resource(newProduct,\nlinkTo(methodOn(ProductRestController.class).getProduct(\n\
  newProduct.getId())).withSelfRel());\nreturn new ResponseEntity>(productRes,\nheaders,\
  \ HttpStatus.OK);\n}\n}\n清单 7-14\n支持 HATEOAS 的 REST 控制器（包含 POST 操作）\n```\n\n你可以使用清单\
