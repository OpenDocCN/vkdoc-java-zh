  \n总结\n微服务就像一把双刃剑：它们提供了额外的杠杆作用，但应谨慎使用。这主要是由于第 4 章讨论的架构反转。你学习了两种可以引入微服务架构的重构过程，以更大程度地影响性能。还有更多的优化方法；不过，我将它们限制在本章讨论的两种方法之内。本书剩余部分的大部分内容将讨论基于事件的微服务，其中微服务间通信的异步特性默认通过消息传递而非\
  \ HTTP 来利用。你将在下一章开始深入了解这些方面。\n\n11. 事件、最终一致性与\n一致性\n\n与同事握手，你会立即感受到同样的握手反馈。与伴侣拥抱或亲吻也是如此——你也会立即得到同样的回应（假设你伴侣的心情不会招来一记耳光作为回应！）。如果在上述任何场景中，你的伴侣不在你身边，但你仍然想向他或她传递类似的问候，该怎么办？你可以通过当今可用的任何数字媒体发送电子邮件或消息。你的伴侣（迟早）会收到你的消息，并能够回复你。最终的效果是，即使你的伴侣不在附近，甚至在你发起问候的确切时刻没有听到你的声音，你迟早也会得到回应的问候。这些场景和问候也典型地适用于微服务应用程序。一旦你根据领域边界将应用程序拆分为可以独立于其他微服务进行部署、启动和运行的微服务，这也意味着这些微服务应该有能力继续提供功能，而不管其对应的微服务如何。这就是必须讨论事件驱动架构（EDA）重要性的地方。在本章中，你将了解\
  \ EDA 的一般概念以及一些选定的关注点。最后，你将能够理解事件和 EDA，并更好地决定是希望在微服务之间使用异步事件还是同步请求/响应风格的交互。\n\n\
  在本章中，你将学习以下内容：\n\n*   EDA 简介\n\n*   EDA 的不同风格\n\n*   EDA 在微服务架构演进中的相关性\n\n*   EDA\
  \ 在使不同微服务最终一致中的作用\n\n*   规模立方体与分区计算活动的需求\n\n*   CAP 定理与 CAP 金字塔\n\n*   BASE 事务\n\
  \n事件驱动架构\n事件驱动架构是一种软件架构模式，它促进事件的产生、检测、消费和响应。一个事件驱动系统通常由事件发射器（或代理）、事件消费者（或接收器）以及事件传播所通过的事件通道组成。让我们详细了解这些组件。\n\
  \n事件\n事件是特定系统或领域内发生或出现的事情；它是该领域中已经发生或被认为已经发生的事情。\n事件可以定义为状态的变化。例如，当订单发货时，订单的状态从“待处理”变为“已发货”。电子商务微服务架构可以将此状态变化视为一个事件，其发生可以通知给架构内的其他微服务，甚至微服务边界之外的其他组件。从形式上讲，被产生、发布、传播、检测或消费的是（通常是异步的）消息，称为事件通知，而不是事件本身。如果是这样，事件就是触发消息发出的状态变化。事件不会传播；它们只是发生。然而，术语“事件”和“事件通知”通常互换使用，以表示通知消息本身。\n\
  \n\n\nEDA 组件\n基于 EDA 的应用程序通常由事件发射器（源或代理）、事件消费者（接收器）和事件通道组成。事件发射器负责生成、检测、收集和传输事件。当事件发射器执行此操作时，它不知道事件的消费者，甚至不知道是否存在任何消费者，即使存在，也不知道事件如何、何时或在何处被用于进一步处理。\n\
  \n事件接收器负责在感知到感兴趣的事件时立即做出反应。接收器提供的反应可能是完整的，也可能是部分的。如果反应是部分的，那么同一事件可能也会引起其他接收器的兴趣，并且它们可能会补充该反应。\n\
  \n事件通道\n是事件从事件源传输到事件接收器的管道。将事件正确分发到正确接收器所需的信息仅存在于事件通道内部。然而，\n这种具有分发知识的事件通道在寻址方面相当僵化，在物理层面上，它们通常由消息队列表示。换句话说，这种事件通道的物理实现可以基于传统组件，例如使用点对点通信的面向消息的中间件，通常由消息队列表示。\n\
  \n图 11-1 展示了\n通常利用消息队列的点对点事件处理方式。当你使用队列时，\n事件源和接收器是紧密耦合的，如图 11-1 所示。更好的方法是使用主题来表示这些管道。在这里，事件通道几乎不包含关于将事件分发到何处的信息；相反，由事件接收器自行连接到感兴趣的事件通道，并在有感兴趣的事件可用时得到通知。\n\
  \n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig1_HTML.jpg](img/477630_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1.\n点对点\nEDA\n\n后一种方法在微服务应用的可扩展性方面更加灵活，稍后你将看到详细信息。图 11-2 展示了事件源和接收器相对于消息管道（此处为消息主题）的关系相对灵活。\n\
  \n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig2_HTML.jpg](img/477630_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2.\n发布-订阅\nEDA\n\n在图 11-2 中，队列已被主题取代。^(¹⁹) 消息主题提供了一种发布-订阅消息模式，其中消息的发送者（称为发布者）不会将消息直接编程发送给特定的接收者（称为订阅者），而是将发布的消息分类，而不知道可能存在哪些订阅者。同样，订阅者表达对一个或多个类别的兴趣，然后接收感兴趣的消息，而不知道存在哪些发布者。这提供了在运行时动态地从架构中添加和/或移除源（发布者）和接收器（订阅者）的选项，如图\
  \ 11-3 所示。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig3_HTML.jpg](img/477630_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3.\n灵活的\n发布-订阅 EDA\n\n如图 11-3 所示，在遵循发布-订阅模式时，管道本身是开放且持续的，这意味着它可以在未来运行时容纳更多的接收器。\n\
  \n微服务与事件驱动架构\n在讨论了 EDA 的点对点和发布-订阅模式之后，现在让我们来看看在设计采用灵活发布-订阅模式的微服务时，你将面临的一些问题。\n\n\
  微服务的演进\n大多数软件应用程序在构建之初都考虑了一组需求，然后在几年内自然演进。在应用程序最终退役之前，会持续多年地纳入变更请求和新需求。传统或单体应用程序需要在源代码层面进行修改以适应这些变化，然后整个应用程序必须进行回归测试、性能验证并重新部署。这也不可避免地会导致停机。\n\
  \n图 11-4 展示了一个使用发布-订阅微服务模式的电子商务应用。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig4_HTML.jpg](img/477630_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4.\n发布-订阅微服务\n\n参考图 11-4，微服务之间的交互如下：\n\n1.  订单服务创建一个处于待处理状态的订单，并发布一个 OrderCreated\
  \ 事件。\n2.  库存服务接收该事件，并尝试根据该订单更新商品库存。然后，它发布一个 InventoryUpdated 事件或一个 NotEnoughInventory\
  \ 事件。\n3.  如果发生 InventoryUpdated 事件，则订单状态必须从待处理更改为已确认，这将再次触发一个 OrderConfirmed 事件。\n\
  4.  配送服务接收 OrderConfirmed 事件，并安排产品配送。一旦安排完成且商品已发货，它会触发一个 OrderShipped 事件。\n\n到目前为止，一切顺利，但假设该电子商务公司希望提升客户体验，作为其中的一部分，IT\
  \ 部门希望增强应用程序，通过电子邮件和其他渠道向客户发送即时通知。解决方案是引入一个名为通知服务的新微服务。\n由于你基于发布-订阅模式设计了应用程序，你应该能够在不对应用程序造成任何停机的情况下引入新的微服务。换句话说，你应该开发、测试、基准测试性能、建立通知微服务的基线，并将其“热”部署到现有的应用程序基础设施中。一旦部署完成，通知微服务将开始消费\
  \ OrderConfirmed 事件，以即时通知客户其订单已确认。类似地，它也可能开始消费 OrderShipped 事件，以即时通知客户其订单已发货。如图\
  \ 11-5 所示。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig5_HTML.jpg](img/477630_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5.\n微服务应用的\n演进\n\n你所看到的是无缝演进。你无需触碰或干扰任何现有的微服务；然而，你可以挂接或附加越来越多的微服务，以显著改变应用程序的行为或功能！现在你应该能更好地理解第\
  \ 3 章“可扩展微服务”一节中提到的蜂巢类比，该类比在图 11-6 中再次呈现。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig6_HTML.jpg](img/477630_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6.\n微服务蜂巢类比\n\n\n\n图 11-6 展示了蜜蜂如何建造蜂巢。它从建造第一个蜂房开始，然后不断向蜂巢中添加越来越多的蜂房。因此，蜂巢会随着时间的推移而生长。建造蜂房所使用的材料可能并不相同；它们会根据建造该蜂房时可获得的材料而有所差异。然而，每个新蜂房都能与整个蜂巢完美融合，并且整个蜂巢持续发挥其功能而不受干扰。类似地，你可以构建像上述通知微服务这样的新功能，该服务将发送基于电子邮件和短信的订单状态通知，从而无缝地将这一增强功能添加到应用程序中，且不会对现有（微服务）应用程序造成任何停机时间。^(²⁰)\n\
  \n最终一致性与微服务\n\n现在，让我们来探讨微服务中一些有趣的复杂细节。单体应用通常使用单个关系型数据库。使用关系型数据库的一个关键优势在于，你的应用程序可以利用\
  \ ACID 事务。图 11-7 描绘了一个典型的单体应用。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig7_HTML.jpg](img/477630_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7. 一个电商单体应用\n\n你领域中的多个实体可以由单个关系型数据库中一个模式内的不同表来表示。在当前示例中，`Order`、`Item` 和\
  \ `Inventory` 就是这样的实体。客户会将多个商品添加到购物车，最后通过单击一个按钮进行结账。此时，`Order` 表中会创建一行新记录来表示一个新订单。以该订单\
  \ ID 作为外键，会在 Items 表中创建与购物车中商品数量相同的行。此外，对于 `Item` 表中创建的每一行，`Inventory` 表中相应行的数量值必须递减。如果你使用单个关系型数据库，上述所有操作都可以以符合\
  \ ACID 的方式全部提交或全部回滚。\n\n图 11-8 展示了借助微服务实现的相同业务用例。假设订单和库存是两个不同的微服务。现在，让我们分析一个复杂场景：两个用户试图大致同时地对同一个实体进行操作。这类场景在业务应用中很典型，这里列举了其中几个：\n\
  \n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig8_HTML.jpg](img/477630_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8. 微服务竞态条件\n\n*   航空公司订票应用中的最后一个座位\n*   酒店预订门户中的最后一个房间\n*   电商应用中某特定产品的最后一件商品\n\
  \n假设身处地球两端的乔和安都对一款较旧版本的 MacBook Pro 感兴趣，该产品在电商网站上正以大幅折扣出售。同时假设该商品在电商网站上仅剩一件待售。乔和安都进行了搜索、查看，并最终将该商品添加到了各自的购物车。现在假设他们俩大致同时点击了“确认购买”按钮（图\
  \ 11-8 中的标签 1 和 2）。一个基于 EDA 的微服务架构（如图 11-8 所示）将允许订单微服务代表乔和安各自创建订单，并发出 OrderCreated\
  \ 事件。两个订单的状态现在都是“新建”。你可以进一步假设有两个 OrderCreated 事件大致同时被提交（标签 3 和 4）。库存微服务实例将消费这些 OrderCreated\
  \ 事件；同样，假设此事件消费是并发进行的。由于这两个 OrderCreated 事件都指向同一件商品，即使微服务尝试并发处理这些 OrderCreated 事件，在库存数据库管理层，也只会允许代表其中一个\
  \ OrderCreated 事件的库存更新继续进行，因此库存将减少到零，并发出一个 InventoryUpdated 事件（标签 5）。代表另一个 OrderCreated\
  \ 事件进行处理的库存微服务无法成功，因为库存不足，所以它将发出一个 NotEnoughInventory 事件。订单微服务将同时消费 OrderCreated\
  \ 事件和 NotEnoughInventory 事件。订单微服务在消费 OrderCreated 事件时，会将相应订单的状态更改为“已确认”；然而，在消费 NotEnoughInventory\
  \ 事件时，它会将相应订单的状态从“新建”更改为“已取消”或“无法履行”等。这里解释的场景是完全正常且可接受的，那么问题出在哪里呢？仔细审视会发现，在一段时间内，代表乔和安创建的两个订单都处于“新建”或“已创建”状态。此时，两个用户都收到订单正在被处理的反馈；然而，其中一人稍后会感到失望。系统向用户提供了一个“虚假的”快照，而非“事实的”快照。（不过，没有买到商品的人会获得全额退款。）\n\
  \n如果你回头看看图 11-7 中描述的架构，你会意识到，如果乔和安试图购买那最后一件商品，那么对于其中一人，事务会成功，而对于另一人，整个事务会被原子性地回滚，所有步骤（要么全部成功，要么全部回滚）作为一个整体单元，因此在任何时刻系统都是一致的，并且不会出现后来的失望。换句话说，要么是即时的失望，要么是即时的满意；不存在最终失望或最终满意的可能性。现在关键问题来了：当你的架构从图\
  \ 11-7 所示变为图 11-8 所示时，这种最终性对于业务来说是否可以接受？\n\n微服务与 CAP 定理\n\n这个讨论引出了分布式计算中另一个有趣的约束，即\
  \ CAP 定理，本节将在微服务的背景下对其进行探讨。\n\n可伸缩立方体\n\n\n\n高事务性系统必须在单位时间内处理数百万个请求，因此这类系统的每秒事务处理量（TPS）非常高。当我们讨论**Web\
  \ 规模架构**时尤其如此。通过提升处理请求节点的计算能力，我们可以增加吞吐量；这被称为**垂直扩展**。然而，存在一个极限，超过该极限后，在同一节点上增加计算能力将无法带来成比例的性能提升，如图\
  \ 11-9 所示。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig9_HTML.jpg](img/477630_1_En_11_Fig9_HTML.jpg)\n\
  \n**图 11-9. 垂直扩展**\n\n通过**水平扩展**技术可以进一步提升吞吐量。在 Web 规模下运行软件需要分发软件运行时的多个副本。这也意味着数据集的多个副本分布在许多节点上。\n\
  \n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig10_HTML.jpg](img/477630_1_En_11_Fig10_HTML.jpg)\n\
  \n**图 11-10. 扩展立方体**\n\n我们来谈谈**扩展立方体**，它涉及三维扩展。图 11-10 描绘了三维扩展，其中每个轴代表在不同层面扩展你的应用程序：\n\
  \n*   **X 轴（水平扩展）**：在此，你复制同一个微服务的多个实例，并使用负载均衡器来分发流量。\n\n*   **Y 轴（功能分解）**：微服务是 Y\
  \ 轴扩展的一种方法，你根据功能拆分应用程序组件。\n\n*   **Z 轴（数据分区）**：在此，每个微服务或功能可以根据某些标准进一步拆分。一个 Web 规模的应用可以分发流量，例如，所有姓氏以\
  \ A 到 G 开头的请求发送到服务器集群 X，H 到 O 发送到服务器集群 Y，P 到 Z 发送到服务器集群 Z。这种技术称为**名称分片**。\n\n每种扩展方法都必须解决数据一致性问题。在企业应用中，你有**主数据**（或查找数据）和**事务数据**。主数据或多或少是静态的，而事务数据则随着事务不断改变状态。X\
  \ 轴、Y 轴和 Z 轴扩展依赖于网络来让分布式服务共享数据。因此，你可以在每个轴上分发数据和服务的多个副本以增加可扩展性，或者让多个节点托管服务以提高可用性。一旦你拥有多个节点，就需要网络进行互联，因此网络提供了**分区容错性**。此外，如果你拥有数据或代码（服务运行时）的多个副本，就需要解决数据一致性问题。我将在下一节对此进行更详细的描述。\n\
  \n**CAP 定理**\n\nCAP 定理描述了三个相互依赖的架构属性：\n\n*   **一致性**\n\n*   **可用性**\n\n*   **分区容错性**\n\
  \n该定理指出，你最多只能保证这三个属性中的两个。如果你增加或提升其中一个属性，就必须以牺牲另一个（或两个）属性为代价。换句话说，你可以拥有一个高可用、一致的系统，但其分区容错性会很低；或者你可以拥有一个高可用、可分区的系统，但很可能需要放弃一致性。\n\
  \n图 11-11 以图形方式描绘了 CAP 定理。它表明，你可以从 C、A 和 P 中选择任意两个，但无法同时实现所有三个。让我们更好地理解这意味着什么。首先，我们来看\
  \ CAP 定理中 C、A 和 P 的定义。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig11_HTML.jpg](img/477630_1_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11. CAP 定理**\n\n*   **一致性**：所有微服务节点对数据拥有相同的视图。\n\n*   **可用性**：每个微服务在任何时候都可以读取或写入任何其他微服务。\n\
  \n*   **分区容错性**：即使微服务之间存在物理网络分区，整个微服务应用程序也能正常工作。\n\n像 Oracle 这样的关系型数据库在提供一致性方面表现出色，因为它们专注于\
  \ ACID 属性，并通过提供对事务隔离的精细控制来实现一致性。因此，在之前的电子商务示例中，当客户 Joe 确认购买某产品的最后一件库存商品，并同时将库存减少一件时，任何中间状态都对客户\
  \ Ann 隔离，Ann 必须等待几毫秒或几微秒，直到 RDBMS 表或行锁被释放，数据存储达到一致状态。\n可用性意味着就事务而言，服务能够完全正常运行。在企业应用中，如果某个服务实例宕机，会使用集群感知的代理或客户端存根回退到冗余实例。Oracle\
  \ 的**真正应用集群（RAC）** 在此值得关注，因为它坚定地承诺同时提供磁盘上数据的一致性和运行时进程中 DBMS 服务的可用性。一旦你能够使用第 9 章“数据或存储冗余”一节中提到的技术将数据位传输到磁盘级别，你就可以确信你的数据位足够持久。然而，该节中提到的技术会增加形成分区的可能性！\n\
  当你使用 SQL 客户端并在运行 Oracle 数据库的同一节点上发出“Select for Update”^((21)) 或类似命令时，你的节点充当一种**原子处理器**，要么正常工作，要么不工作（即，如果崩溃了，它不可用，但也不会导致数据不一致）。当你开始为了可扩展性或可用性而将处理逻辑与数据分离并分布到不同节点时，就存在形成分区的风险。例如，当网络交换机故障、网线被拔出或电源故障导致你的其他节点不可用时，就会发生分区。\n\
  在设计微服务以应对 CAP 定理带来的限制时，必须进行架构权衡。如果你必须防止网络故障，你可以设计没有分区的系统。为此，你需要将与某个事务相关的所有内容放在一台机器上，或者放在一个原子故障单元（如单个机架）中。啊，这听起来熟悉吗？我们是在谈论“一个微服务”吗？你已经看到，微服务根据定义是一个独立可部署、自包含的单元，它拥有并管理自己的数据！接下来还有一个注意事项：即使是一个机架也可能发生部分故障。此外，微服务本身也需要扩展，这意味着你需要考虑冗余。而且，如果单个微服务的水平层必须最佳部署以满足\
  \ SLA，那么分区的需求就会再次出现。是的，你的设计思路在兜圈子，必须考虑你的应用程序特性、业务上下文以及许多其他技术和文化因素，才能在上述循环连续体中确定你的微服务架构的最佳平衡点。\n\
  \n**BASE（基本可用、软状态、最终一致性）系统**\n\n\n\n在探讨了 CAP 定理，并假设你已经熟悉常见且完全一致的 ACID 事务之后，让我们来看看\
  \ ACID 的替代方案 BASE。BASE 是 **B**asically Available（基本可用）、**S**oft state（软状态）、**E**ventually\
  \ consistent（最终一致性）的缩写，它与 ACID 原则截然相反。ACID 基于悲观假设，并在每次操作结束时强制保证一致性；而 BASE 则基于乐观假设，并接受数据库一致性会处于一种动态变化的状态，其程度需符合所考虑的业务事务的可接受水平。BASE\
  \ 设计鼓励以如下方式设计系统：\n\n*   如果应用程序的一部分宕机或运行不正常，应用程序的其他一些功能仍应能正常工作，或者\n*   如果客户数据库的少数节点故障仅影响了该特定主机上\
  \ 30% 的客户，那么其余客户仍应能够使用该系统。\n*   等等。\n\n如果你为系统或服务的协调定义如下一组属性，那么上述所有或大部分特性都可以现实地实现：\n\
  \n*   系统在支持部分故障时是**基本可用**的，这比整个系统完全故障更可取。\n*   系统的状态是“软”的，这意味着即使在没有进一步更新的情况下，它也可能随时间变化，因为一些过去的更改尚未应用，它们“仍在传输中”，源自其他分区。\n\
  *   如果系统不再有新的更新，系统最终将变得**一致**。\n\nCAP 金字塔\n\nCAP 金字塔是一个倒置的四面体^(²²)，以其顶点为支点，相对的底面保持与支点平面（地面）平行，如图\
  \ 11-12 所示。\n\n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig12_HTML.jpg](img/477630_1_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12. 处于不稳定平衡状态的 CAP 金字塔\n\n如果我们假设 CAP 金字塔顶面每个角（分别代表一致性、可用性和分区容错性）到支点平面的高度，那么在平衡状态下，这三个特性之间将始终存在一种平衡，这种状态就是\
  \ BASE 状态。在 BASE 状态下，这三个特性既不会太低，也不会太高；相反，它们处于一个标称水平，以保持 CAP 金字塔处于不稳定平衡状态。^(²³)\n\
  CAP 定理指出，你可以从一致性、可用性和分区容错性中选择任意两个，但无法同时实现所有三个。\n\n在图 11-13 中，金字塔被倾斜，使得靠近倾斜点的角更接近支点平面，而倾斜点对面的角则远离支点平面。\n\
  \n![../images/477630_1_En_11_Chapter/477630_1_En_11_Fig13_HTML.jpg](img/477630_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13. 被扰动的 CAP 金字塔\n\n如图 11-13 所示，在不改变支点的情况下，你一次最多可以尝试增加任意两个特性。这里我尝试以提高原子性和分区容错性（标签“y\
  \ > x”）为代价，降低一致性（标签 x）。\n\n当你扰动 BASE 状态的不稳定平衡时，以下任意两个特性都可以按你的意愿得到改善：\n\n*   系统可以从基本可用性改变为五个九的高可用性。\n\
  *   系统的状态是“非软”的，这意味着它不会随时间变化，因为所有更新都是原子性应用的，并且预计不会有“仍在传输中”的更新。\n*   系统始终是一致的，因为预计不会有新的更新。\n\
  \n现在，你应该能够将此与微服务架构的核心设计原则联系起来。例如，即使你的订单微服务运行不正常，客户仍应能够搜索和浏览产品列表和产品详情页面。因此，当 BASE\
  \ 通过利用多个分区的微服务来允许（部分）可用性时，就需要识别出可以放宽一致性的机会。诚然，从用户体验的角度来看，这种一致性的放宽无法完全隐藏。更明确地说，当你的订单微服务和库存微服务被分区时，有可能即使在库存中最后一件商品已被确认\
  \ Joe 的购买订单后，Ann 仍可能将该商品添加到她的购物车并确认结账。她最终才会知道这件特定商品已无库存。从微服务设计的角度来看，这些是暂时的不一致，最终会变得一致，因此\
  \ Ann 暂时的“不悦”最终也会转化为“满意”，因为系统要么会在付款前通知她该商品已不可用，要么在最坏的情况下（即已为不可用商品付款），将会启动退款流程。\n\
  在实际进行系统设计和实现时，还有更多复杂之处，但让我们先将其搁置，直到第 13 章关于事务的内容中再讨论。\n\n总结\n架构关乎权衡，而在微服务架构中，明智的权衡尤为重要。你在第\
  \ 4 章中看到了微服务上下文中的架构反转，这已将外部架构的复杂性提升到了指数级。这使得网络变得不可避免，因此，实现分区容错性的技术必须通过设计内置于架构中，而不是事后才考虑。分区容错性的程度会影响应用程序的可用性和一致性，而在这三个特性之间决定平衡是设计微服务应用程序的关键。在第\
  \ 5 章中，你在 CQRS 模式中分离了应用程序的命令和查询部分，这是在架构中引入分区的一个很好的例子。现在是时候通过一些实际代码来解释这些概念了，请转到第\
  \ 12 章。\n\n脚注\n\n12. 用于 CQRS 架构的 Axon\n\n\n\n在第 11 章中，你学习了事件和事件驱动架构，并了解了任何基于 EDA\
  \ 的应用程序可以运行的理论和约束。微服务架构天生就引入了分区，因此实现分区容错的具体机制至关重要。在本章中，你将借助 Axon 来实现这一点。Axon 是一个轻量级框架，可帮助你遵循\
  \ CQRS 模式开发应用程序。Axon 框架采用 Apache 2 许可证授权，因此你可以在任何应用程序中免费使用该框架。不过，如果你需要围绕 Axon 的专业服务，则由总部位于阿姆斯特丹的\
  \ AxonIQ B.V.提供。\n\n构建基于 CQRS 的系统并非必须使用 Axon，使用 Axon 构建系统也并非必须采用 CQRS 模式。然而，任何新框架都是你应用程序栈中的额外一层债务，因此你在应用程序中使用\
  \ Axon 的主要原因之一，可能是你渴望在构建应用程序时遵循 CQRS 模式。再次强调，CQRS 并非你设计微服务架构的必备前提；但是，CQRS 为解决分布式企业软件系统的可扩展性问题提供了杠杆，因此\
  \ Axon 和微服务是相辅相成的。\n\n你在第 7 章和第 8 章中已经深入学习了 Spring Boot 和 Spring Cloud，在本章使用 Axon\
  \ 时，你将大量利用这两者。这种 CQRS 与 Spring Cloud 的结合，将让你同时拥有来自两个世界的最强大工具。\n\n在本章中，你将完成以下内容：\n\
  \n*   认识 Axon，Java CQRS 框架\n*   理解 Axon 的构建模块\n*   构建并运行一个入门级的 CQRS 示例\n*   构建并运行一个完全分布式的\
  \ CQRS 微服务示例\n\n介绍 Axon，CQRS 框架\n在开源社区和商业世界中，有相当多的框架允许你设计基于 CQRS 的解决方案，涵盖 Java 和.NET\
  \ 平台。我选择 Axon 是因为其开源许可证的免费性质，以及它与其他主流语言和平台（包括 Java 和 Spring）的集成选项。\n\n在本章中，你将看到同时使用\
  \ Axon 和 Spring Boot 的工作示例。在介绍示例时，我还会涵盖基本概念和 API。建议你参考 Axon 文档以详细了解框架的用法，因为我不会在此尝试复制\
  \ Axon 文档。相反，我将通过示例带你了解核心概念，以便你能够快速上手。\n\n对于这些示例，你将使用两个不同版本的 Axon。你首先会使用 Axon 2.4.1。在这里，你需要通过注解或使用\
  \ XML 配置来显式地连接组件。此外，Axon 2.4.1 示例将利用 Spring Boot 的 1.3.5.RELEASE 版本。在本书后面，你还会看到使用\
  \ Spring Boot 1.5.3.RELEASE 版本的 Axon 3.0.5 示例。在 Axon 3.0.5 中，可以避免许多显式连接，因为 Axon\
  \ 使用 Spring 应用上下文来定位构建模块的具体实现，并为那些不存在的模块提供默认实现。尽管这会让开发人员的生活更轻松，但如果你不是经验丰富的 Axon\
  \ 开发人员，你可能无法理解底层发生了什么。在 Axon 2.4.1 中，大部分连接是显式的，因此在代码中作为注解或在配置中作为 XML 可见，这样你可以更好地理解底层发生的情况。因此，你将首先使用\
  \ Axon 的旧版本（2.4.1）^(²⁴)来开始示例。不过，我也会通过提供相同版本的示例，为你提供一条通往后续 Axon 版本^(²⁵)的简易路线图。\n\n\
  什么是 Axon？\nAxon 框架帮助开发人员应用 CQRS 架构模式，并构建模块化的、基于 SOA 的解决方案。传统的 SOA 架构解决了软件架构中的一些主流问题；然而，Axon\
  \ 填补了过去二十年使用 SOA 过程中发现的空白。Axon 提供了最重要构建模块的实现，例如聚合、仓库和事件总线（事件的调度机制）。聚合负责将实体分组到父子层次结构中，并明确规定聚合根的责任，以在数据一致性和同步方面管理实体树的生命周期。事件总线帮助你省去创建、维护和跟踪应用程序不同部分之间关联\
  \ ID 的所有繁琐细节。Axon 保证将事件传递给正确的事件监听器，并并行以及按预期顺序处理它们。此外，Axon 使用 Java 注解支持，这意味着你可以在不将代码绑定到\
  \ Axon 特定逻辑的情况下构建聚合和事件监听器。\n\n在哪里可以使用 Axon？\nAxon 是免费且开源的，其标语是*The Jargon CQRS*（你的许多同行仍在互联网上搜索以理解其含义），这足以长期保持管理层的关注，那么为什么不在你构建的每个新应用程序中使用它呢？不幸的是，与传统的点对点和同步架构风格相比，CQRS\
  \ 并不简单直接。在架构设计之初就需要在一定程度上预见未来的复杂性；此外，与传统的 SOA，甚至与没有 CQRS 的微服务相比，你的设计必须容纳和演化更多场景、状态和流程的组合。然而，如果你理解这一点并尝试去做，那么付出的努力将以多种方式得到回报。以下是一些\
  \ CQRS 更有意义的场景：\n\n*   **可扩展架构**：典型的应用程序在设计时都会考虑其生命周期，比如 10 年、20 年甚至 50 年（如果你还在用汇编或大型机编程的话）；然而，在这段时间内，许多此类应用程序很可能会通过增加更多功能来进行扩展。今天构建的应用程序也是如此，它们被部署到云和容器中。但是，业务连续性至关重要，无论是功能方面的扩展还是系统质量（QoS）方面的扩展，都必须在不对运行系统造成任何中断的情况下实现。你能做到吗？这种期望是现实的还是仍然是一个神话？嗯，答案不仅仅取决于可用的技术和框架。你还需要将它们与你的架构思想结合起来，并搁置\
  \ DevOps 等其他方面的所有进步。\n\n\n\n*   **高读写比**：回顾第 5 章关于浏览-预订比率的讨论。一个系统在将一次写入事务转化之前，必须容纳成百上千次读取事务。在当今的企业软件范式中，尤其是在云原生场景下，将操作服务质量（QoS）同时应用于读取和写入事务将是灾难性的，因为每一个\
  \ CPU 周期、每一比特的存储或传输都会增加成本。你的读取事务是**领先**事务，而写入事务是**滞后**事务。前者将“意图”转化为“购买决策”，后者则将“库存”转化为“已实现利润”。两者都很重要，但关键性不同。因功能或系统问题导致的写入事务失败代价高昂，而读取事务失败的影响则较小，因为它可以重试或忽略；与失败的写入事务相比，其价值损失要低得多。用于查询的数据源应与用于命令执行的数据源采用不同的调优方式，并且应针对快速查询进行优化，采用资源上的宽松锁；然而，对于写入事务，你的数据源应确保严格的\
  \ ACID 合规性，这样一旦旅客成功购买了飞机上的最后一个座位，你就有所有手段来尊重这笔购买，从而无需事后向该旅客发送一封遗憾邮件，告知他由于某种原因该座位不可用，因此将为他办理退款！\n\
  \n*   **单一事实源，多种视图**：“资源”最初在万维网上被定义为通过 URL 标识的文档或文件。然而，如今它们有了更通用和抽象的定义，涵盖了在网络上可以以任何方式被识别、命名、寻址或处理的任何事物或任何实体。在\
  \ RESTful Web 服务中，对资源 URI 的请求将产生一个响应，该响应可以是 CSV、XML、HTML、JSON 或其他格式。应用程序中的相同数据可能以多种方式呈现，有些针对快速搜索进行了优化，有些处于缓存状态以实现最大响应速度，还有一些则以预定义报告的形式呈现，如\
  \ Excel 或 PDF 文件。这就是以多种视图存在的单一事实源在应用层面的现实。CQRS 明确地解决了这一需求，并且还帮助你在发生变更时，通过引发事件的形式，使不同的视图与单一事实源保持同步。\n\
  \n*   **具有多样化交互的应用程序**：某些应用程序的用户群与系统的交互程度各不相同。例如，一个电子商务应用程序拥有终端用户或客户进行零售购买，这是用户群的一部分，数量庞大；而且，这些客户期望毫秒级的响应时间。另一部分是管理库存的后台店员，其数量有限，如果软件偶尔运行缓慢或卡顿，他们会感到困扰。第三部分是与供应链连接的\
  \ B2B 接口，其数量更少，表现为少数已知的 IP 地址，如果接口中断几分钟，他们也会受到影响，因为之后他们必须重试。根据交互方的类型以及代表这些方进行的交易的整体价值和关键性，同一应用程序内的软件服务可能必须表现出不同级别的访问权限、安全性、性能等。微服务架构将在这方面为你提供帮助，而采用\
  \ CQRS 将为你提供额外的优势，以应对这些异构类型的交互。\n\n*   **具有自治接口的应用程序**：物联网（IoT）和万维物联网（WoT）是当前的软件范式，它们给软件架构师带来了一系列新的挑战。使用命令和事件对应用程序\
  \ API 进行严格定义，使得与这些物和设备的接口集成变得更加容易。任何接口都可以发送命令或监听主机接口生成的事件。\n\n以上列表仅提供了 CQRS 能够增值的问题特征的一般性列表；它绝非详尽无遗。\n\
  \n运行 Axon 所需的条件\nAxon 框架是基于 Java 6 构建和测试的，因此这基本上是其唯一的要求。你可以使用 Gradle 或 Maven 进行构建，也可以使用任何你喜欢的\
  \ IDE。由于 Axon 本身不创建任何连接或线程，因此在应用服务器上运行是安全的。Axon 通过使用执行器（executors）来抽象所有异步行为，这些执行器将任务提交与每个任务如何运行的机制解耦。因此，你甚至可以轻松地传入一个由容器管理的线程池。如果你不使用应用服务器（例如\
  \ Tomcat、Jetty 或独立应用程序），你可以使用`Executors`类或 Spring 框架来创建和配置线程池。\n现在，你将看到一些具体的示例，并了解\
  \ Axon 代码的实际应用。\n\n在同一个 JVM 中处理命令和事件\n先从简单的事情开始，所以让我们把 Axon 的第一个示例保持简单。然而，我无法让它更简单了。为了介绍\
  \ Axon，你必须首先理解一个 Axon 方式的简单场景，然后了解 Axon 中每个步骤的细节。\n\n示例场景\n\n第一个 Axon 示例来自一个电子商务应用程序的单个微服务。领域中有两个实体：订单和产品。用户可以购买产品，这将创建一个新订单。当新订单创建时，产品库存将减少。仅此而已。图\
  \ 12-1 描绘了带有完整流程标注的架构。\n\n![../images/477630_1_En_12_Chapter/477630_1_En_12_Fig1_HTML.jpg](img/477630_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1. 在同一个 JVM 中处理 Axon 命令和事件\n\n第 5 章中的“基于事件的 CQRS 设计元模型”一节展示了一个基于 CQRS 架构的元模型。图\
  \ 12-1 是第 5 章中图 5-5 所表示的抽象元模型的一个具体实例。\n\n现在让我们探索端到端的流程，该流程在图中标注如下：\n\n1.  当你在浏览器中点击“立即订购一个！”按钮时，一个\
  \ REST/JSON 请求会命中订单控制器。\n\n\n\n2.  订单控制器将请求解释为写入请求，创建新的订单命令并将其发送到命令网关，命令网关随后将该命令分派到命令总线。\n\
  \n3.  命令总线接收命令并将其路由到订单命令处理器。\n\n4.  订单命令处理器检索对应的产品并扣减库存。\n\n5.  扣减产品库存后，通过向产品实体发送更新来在产品仓库中生效更改，该更改将持久化到写入数据库。\n\
  \n6.  此仓库更改会向事件总线触发一个库存更新事件，事件总线随后将事件分派给所有感兴趣的事件监听器。\n\n7.  产品事件处理器已订阅库存更新事件，因此它会收到库存更新的详细信息通知。\n\
  \n8.  基于库存更新事件中提到的详细信息，产品事件处理器对产品的读取模型进行更改。\n\n9.  在第 4 步中，你看到订单命令处理器扣减了产品库存。它还根据收到的订单命令中提到的详细信息创建了一个新订单。\n\
  \n10. 创建新订单时，通过插入新的订单实体在订单仓库中生效，该实体随后将持久化到写入数据库。\n\n11. 此仓库插入操作会向事件总线触发一个订单创建事件，事件总线随后将事件分派给所有感兴趣的事件监听器。\n\
  \n12. 订单事件处理器已订阅订单创建事件，因此它会收到新创建订单的详细信息通知。\n\n13. 基于订单创建事件中提到的详细信息，订单事件处理器对订单的读取模型进行更改。\n\
  \n14. 浏览器\n    可以自行刷新，以通过查询实体的读取模型来保持视图更新。\n\n编写示例场景\n\n本节的所有代码\n示例都在文件夹 `ch12\\\
  ch12-01` 中。访问\n`pom.xml` 可以\n看到 Axon 依赖的显式声明。参见清单 12-1。\n\n```\norg.axonframework\n\
  axon-core\n2.4.1\n\n清单 12-1\nAxon Maven 依赖 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\\
  pom.xml)\n```\n\n第一个 Axon 示例是一个一流的 Spring Boot 应用，因此\n`main` 应用\n类中没有什么特别之处；你仍然可以查看清单\
  \ 12-2 中的代码。\n\n```\n@SpringBootApplication\npublic class EcomApplication {\npublic\
  \ static void main(String[] args) {\nSpringApplication.run(EcomApplication.class,\
  \ args);\n}\n}\n清单 12-2\nSpring Boot 应用类 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\\
  src\\main\\java\\com\\acme\\ecom\\EcomApplication.java)\n```\n\n接下来是这个示例中最重要的类，\n\
  你将在其中设置所有 Axon 组件；参见清单 12-3。\n\n```\n@Configuration\npublic class EcomAppConfiguration\
