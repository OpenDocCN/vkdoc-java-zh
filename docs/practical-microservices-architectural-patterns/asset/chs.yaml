  ch06\\ch06-01>ant send\n```\n\n\n\n## 使用 Spring AMQP 向 RabbitMQ 发送和接收消息\n\nSpring\
  \ AMQP 简化了基于 AMQP 的消息传递解决方案的开发。Spring AMQP 模板为发送和接收消息提供了高级抽象。Spring AMQP 包含两个部分，这也是\
  \ Spring Boot 与 Rabbit MQ 集成的默认方式：\n\n*   `spring-amqp`：基础抽象层\n*   `spring-rabbit`：RabbitMQ\
  \ 特定实现\n\nSpring AMQP 抽象的主要特性包括：\n\n*   `Listener` 容器：用于异步处理入站消息\n*   `RabbitTemplate`：用于发送和接收消息的\
  \ RabbitMQ 特定模板\n*   Rabbit 管理工具：有助于快速自动声明队列、交换器和绑定\n\n现在，让我们看一些代码，了解如何使用 Spring\
  \ AMQP 向 RabbitMQ 消息代理发送消息，并通过监听器从代理接收消息。请参考附录 B，按照逐步说明安装并启动 RabbitMQ 代理。本练习的完整可运行代码示例位于随书附带的\
  \ `ch06-02` 文件夹中。\n\n### Spring AMQP 消息监听器\n\n使用 Spring 的优势在于可以将大部分配置通过 XML 进行装配。清单\
