  \ User 实体的方法。见清单 16-6。\n\n```\n@RestController\npublic class UserController {\n\
  @Autowired\nprivate CommandGateway commandGateway;\n@RequestMapping(method = RequestMethod.POST,path=\"\
  /user/create\")\npublic void createNewUser(@RequestBody UserDTO userDTO){\nUserCreationCommand\
  \ command = new UserCreationCommand(userDTO.getId(),\nuserDTO.getUserName(), userDTO.getAge());\n\
  try{\ncommandGateway.sendAndWait(command);\n}\ncatch(RuntimeException runtimeException){\n\
  LOGGER.error(runtimeException.getMessage());\n}\n}\n@RequestMapping(method = RequestMethod.PUT,path=\"\
  /user/update\")\npublic void updateUser(@RequestBody UserDTO userDTO){\nUserModificationCommand\
  \ command = new UserModificationCommand(\nuserDTO.getId(), userDTO.getUserName(),\
  \ userDTO.getAge());\ntry{\ncommandGateway.sendAndWait(command);\n}\ncatch(RuntimeException\
  \ runtimeException){\nLOGGER.error(runtimeException.getMessage());\n}\n}\n}\n清单\
  \ 16-6\n创建命令的 REST 控制器 (ch16\\ch16-02\\Ax2-Cuncurrency-Test\\src\\main\\java\\com\\\
  axon\\concurrency\\user\\web\\UserController.java)\n```\n\n您创建并发送一个 UserCreationCommand\
  \ 用于创建新用户。您还创建并发送一个 UserModificationCommand 用于用户修改请求。UserCreationCommand 和 UserModificationCommand\
  \ 都由 UserCommandHandler 处理。见清单 16-7。\n\n```\n@Component\npublic class UserCommandHandler\
  \ {\n@Autowired\n@Qualifier(value = \"userRepository\")\nprivate Repository userRepository;\n\
  @CommandHandler\npublic void handleUserCreationCommand(UserCreationCommand\nuserCreationCommand)\
  \ {\nUser user = new User(userCreationCommand.getId(),\nuserCreationCommand.getUserName(),\
  \ userCreationCommand.getAge());\nuserRepository.add(user);\n}\n@CommandHandler\n\
  public void handleUserModifyCommand(UserModificationCommand\nuserModificationCommand)\
  \ {\nUser user = userRepository.load(userModificationCommand.getId());\nuser.setAge(userModificationCommand.getAge());\n\
  user.setUserName(userModificationCommand.getUserName());\nLong seconds = 60L;\n\
  LOGGER.debug(\"Thread Sleeping for {} seconds\", seconds);\ntry{\nThread.sleep(1000\
  \ ∗ seconds);\n}catch(Exception exception){\nLOGGER.error(exception.getMessage());\n\
  }\n}\n}\n清单 16-7\nAxon 命令处理器 (ch16\\ch16-02\\Ax2-Cuncurrency-Test\\src\\main\\java\\\
  com\\axon\\concurrency\\user\\command\\handler\\UserCommandHandler.java)\n```\n\n\
