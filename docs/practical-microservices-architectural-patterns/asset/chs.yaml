  \ Spring 连接配置 (ch13\\ch13-01\\XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\\
  resources\\spring-sender-mysql.xml)\n```\n\n\n\n你在之前的“分布式事务再探讨”部分中提到了本地事务，而 Spring\
  \ 的 `PlatformTransactionManager` 支持 JDBC、JMS、AMQP、Hibernate、JPA、JDO 以及许多其他使用场景中的本地事务。当你想使用\
  \ XA 事务时，可以使用 `org.springframework.transaction.jta.JtaTransactionManager`。`JtaTransactionManager`\
  \ 是 JTA 的 `PlatformTransactionManager` 实现，它将工作委托给后端的 JTA 提供者。这通常用于委托给 Java EE 服务器的事务协调器，例如\
  \ Oracle WebLogicJtaTransactionManager 或 IBM WebSphereUowTransactionManager，但也可以配置为使用嵌入在应用程序中的本地\
  \ JTA 提供者，例如 Atomikos。嵌入式事务管理器让你无需使用完整的应用服务器；在独立的 JVM 应用程序中，你仍然可以获得与应用服务器提供的 XA\
  \ 事务支持类似的大部分功能。\n\n在当前示例中，有两个资源管理器中的操作需要具有事务性：\n\n*   `AuctionService.confirmQuote()`\n\
  \n*   `StockOrderService.sendOrderMessage()`\n\n第一个操作使用 JPA 仓库将实体的变更状态合并到底层仓库，并随后合并到持久化存储中。第二个操作使用\
  \ JMS 将消息发送到 ActiveMQ 队列。你希望使上述两个操作具有原子性，即要么两者都成功，要么两者都回滚。为了简化控制，你将上述两个事务性方法封装在第三个方法中：\n\
  \n*   `BrokerService.processNewQuote()`\n\n你现在利用 `org.springframework.transaction.interceptor.`\
  \ `TransactionProxyFactoryBean`，它旨在覆盖声明式事务划分的典型用例，通过使用事务代理包装单例目标对象，代理目标对象实现的所有接口。这是在\
  \ XML 配置中完成的。然后，你还需要为所有三个方法配置所需的事务类型：\n\n*   `AuctionService.confirmQuote()`\n\n\
  *   `<prop key=\"confirm*\">PROPAGATION_REQUIRED</prop>`\n\n*   `StockOrderService.sendOrderMessage()`\n\
  \n*   `<prop key=\"sendOrderMessage*\">PROPAGATION_REQUIRED</prop>`\n\n*   `BrokerService.processNewQuote()`\n\
  \n*   `<prop key=\"process*\">PROPAGATION_REQUIRED</prop>`\n\n此外，向 Spring 框架的事务基础设施指示事务工作应被回滚的推荐方法是从当前在事务上下文中执行的代码中抛出异常。Spring\
  \ 框架的事务基础设施代码会在未处理的异常沿调用栈向上冒泡时捕获它，并将该事务标记为回滚。这就是连接业务组件所需做的全部工作。现在，如果上述三个方法中的任何一个出现错误，它将回滚所有三个业务方法在参与\
  \ XA 事务的底层资源管理器中所影响的状态变更。\n\n你现在可以专注于基础设施的搭建了。需要配置两个资源：JMS 资源和 JDBC 资源。XA JMS 资源请参见清单\
  \ 13-9。\n\n```\n\n清单 13-9\n分布式事务示例中 XA JMS 资源的 Spring 配置 ActiveMQ Atomikos (ch13\\\
  ch13-01\\XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\resources\\spring-sender-mysql.xml)\n\
  ```\n\n`StockOrderService` 使用的 `JmsTemplate` 使用了 `com.atomikos.jms.AtomikosConnectionFactoryBean`，这是\
  \ Atomikos 的 JMS 1.1 连接工厂，用于支持 JTA 的 JMS 操作。你可以使用此类的实例使 JMS 参与 JTA 事务，而无需自己处理底层的\
  \ XA 调用。你可以通过 `localTransactionMode` 属性设置是否需要本地事务，该属性默认为 false。使用本地事务时，不会进行 XA 登记；相反，应用程序应执行会话级别的\
  \ JMS 提交或回滚。请注意，此功能还需要你的 JMS 提供者（在你的案例中是 ActiveMQ）的支持。`xaConnectionFactory` 属性是封装了连接到\
  \ ActiveMQ 代理所需基础设施的基本连接工厂。在你的案例中，该 bean 是 `ActiveMQXAConnectionFactory` 类型的一个实例，这是一个特殊的连接工厂类，当你希望连接到支持\
  \ XA 事务的 ActiveMQ 代理时必须使用它。\n\nXA JDBC 资源请参见清单 13-10。\n\n```\n\nJDBC-1\n\nxads1\n\
  \njdbc:mysql://localhost:3306/ecom01\n\ntrue\n\nroot\nrootpassword\n\ntrue\n\ncom.acme.ecom.AtomikosJtaPlatform\n\
  \nJTA\n\n清单 13-10\n使用 MySQL 和 Atomikos 的分布式事务示例中 XA JDBC 资源的 Spring 配置 (ch13\\ch13-01\\\
  XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\resources\\spring-sender-mysql.xml)\n\
  ```\n\n如果你想使用支持 Atomikos JTA 的连接池，可以使用 `com.atomikos.jdbc.` `AtomikosDataSourceBean`\
  \ 类的一个实例。你需要构造一个实例并设置所需的属性，生成的 bean 将自动向事务服务注册并参与活动事务。通过从此类获取的连接执行的所有 SQL 都将参与 JTA\
  \ 事务。从 Connector/J 5.0.0 开始，`javax.sql.XADataSource` 接口通过 `com.mysql.jdbc.jdbc2.optional.MysqlXADataSource`\
  \ 类实现，该类在与 MySQL 服务器 5.0 及更高版本结合使用时支持 XA 分布式事务。你将 `MysqlXADataSource` 的一个实例设置为 `AtomikosDataSourceBean`\
  \ 类的 `xaDataSource` 属性。\n接下来，`LocalContainerEntityManagerFactoryBean` 是 Spring 的\
  \ FactoryBean，它创建一个 JPA EntityManagerFactory，然后可以通过依赖注入将其传递给基于 JPA 的 DAO。从 Spring\
  \ 3.1 开始，不再需要 `persistence.xml`，`LocalContainerEntityManagerFactoryBean` 支持一个 `packagesToScan`\
  \ 属性，可以在其中指定要扫描 `@Entity` 类的包。\n\n为了让 Hibernate 知道如何参与 Atomikos 事务，之前你必须设置一个属性，即\
  \ `hibernate.transaction.manager_lookup_class`。但是，Hibernate 4.3 移除了长期弃用的 TransactionManagerLookup。Hibernate4\
  \ 默认不知道如何与 Atomikos 协同工作。JTA 提供者必须实现 `org.hibernate.engine.transaction.jta.platform.spi.JtaPlatform`，以从\
  \ Spring 配置的 `JtaTransactionManager` 实现中解析 JTA UserTransaction 和 TransactionManager。Hibernate\
  \ 中已经提供了一个 JTA Platform 的抽象实现，即 `org.hibernate.engine.transaction.jta.platform.internal.AbstractJtaPlatform`。使用它使得为\
  \ Atomikos 编写 JTA Platform 变得轻而易举。你需要实现这个类，并显式设置 `hibernate.transaction.jta.platform`\
  \ 属性。请参见清单 13-11。\n\n\n\n```\nimport javax.transaction.TransactionManager;\nimport\
  \ javax.transaction.UserTransaction;\nimport org.hibernate.engine.transaction.jta.platform.internal.AbstractJtaPlatform;\n\
  import org.springframework.transaction.jta.JtaTransactionManager;\n@SuppressWarnings(\"\
  serial\")\npublic class AtomikosJtaPlatform extends AbstractJtaPlatform {\nstatic\
  \ TransactionManager transactionManager;\nstatic UserTransaction userTransaction;\n\
  @Override\nprotected TransactionManager locateTransactionManager() {\nAssert.notNull(transactionManager,\n\
  \"TransactionManager has not been setted\");\nreturn transactionManager;\n}\n@Override\n\
  protected UserTransaction locateUserTransaction() {\nAssert.notNull(userTransaction,\
  \ \"UserTransaction has not been setted\");\nreturn userTransaction;\n}\npublic\
  \ void setJtaTransactionManager(JtaTransactionManager\njtaTransactionManager) {\n\
  transactionManager = jtaTransactionManager.getTransactionManager();\nuserTransaction\
  \ = jtaTransactionManager.getUserTransaction();\n}\npublic void setTransactionManager(TransactionManager\
  \ transactionManager) {\nthis.transactionManager = transactionManager;\n}\npublic\
  \ void setUserTransaction(UserTransaction userTransaction) {\nthis.userTransaction\
  \ = userTransaction;\n}\n}\n清单 13-11\n解析 JTA UserTransaction 和 TransactionManager（ch13\\\
  ch13-01\\XA-TX-Distributed\\Broker-MySQL-ActiveMQ\\src\\main\\java\\com\\acme\\\
  ecom\\AtomikosJtaPlatform.java）\n```\n\n在了解了整体配置之后，我们再来详细看看基础设施配置，请参考清单 13-9 和清单\
  \ 13-10。\n你需要将 `LocalContainerEntityManagerFactoryBean` 的 `dataSource` 属性设置为一个 JDBC\
  \ 数据源，JPA 持久化提供程序将使用该数据源来访问数据库。此处传入的 DataSource 将作为 `nonJtaDataSource` 用于传递给 PersistenceProvider\
  \ 的 PersistenceUnitInfo。请注意，此变体通常也适用于 JTA 事务管理；如果不适用，请考虑改用显式属性 `jtaDataSource`。你可以使用前面解释过的\
  \ `AtomikosDataSourceBean` 来设置此属性。\n\n接下来，你需要一个服务提供者接口实现，它允许你将特定于供应商的行为插入到 Spring\
  \ 的 EntityManagerFactory 创建器中。`HibernateJpaVendorAdapter` 是 Hibernate EntityManager\
  \ 的一个实现。它支持检测带注解的包以及其他功能。Spring Data 的 JPA 模块包含一个自定义命名空间 `<jpa:repositories>`，该命名空间允许定义仓库\
  \ bean。它还包含某些特定于 JPA 的特性和元素属性。通常，JPA 仓库可以使用 `repositories` 元素来设置。在此示例中，Spring 被指示扫描\
  \ `com.acme.ecom.repository.quote` 及其所有子包，以查找扩展了 `Repository` 或其子接口的接口。对于找到的每个接口，基础设施会注册特定于持久化技术的\
  \ FactoryBean，以创建适当的代理来处理查询方法的调用。每个 bean 都以从接口名称派生的 bean 名称注册，因此你的 `QuoteRepository`\
  \ 接口将以 `quoteRepository` 名称注册。`entity-manager-factory-ref` 属性将有助于显式地将 EntityManagerFactory\
  \ 与 `repositories` 元素检测到的仓库进行关联。当应用程序中使用多个 EntityManagerFactory bean 时，通常会使用此属性。如果未显式配置，Spring\
  \ 将自动查找在 ApplicationContext 中配置的单个 EntityManagerFactory。\n\n至此，两个 XA 资源的配置完成。接下来，你必须配置\
  \ XA 事务管理器。\n\n你需要 `org.springframework.transaction.jta.JtaTransactionManager`，它是\
  \ `PlatformTransactionManager` 的一个实现。你需要提供 `javax.transaction.TransactionManager`\
  \ 和 `javax.transaction.UserTransaction` 的实现来创建一个 `JtaTransactionManager`。\n\n`javax.transaction.UserTransaction`\
  \ 接口为应用程序提供了以编程方式控制事务边界的能力。此接口可由 Java 客户端程序或企业级 Java Bean 使用。`UserTransaction.begin()`\
  \ 方法启动一个全局事务，并将该事务与调用线程关联。事务与线程的关联由事务管理器透明地管理。因此，`UserTransaction` 是面向用户的 API。\n\
  \n`com.atomikos.icatch.jta.UserTransactionManager` 是 `javax.transaction.TransactionManager`\
  \ 的一个简单、零配置的实现。独立的 Java 应用程序可以使用此类的实例来获取事务管理器的句柄，并在首次使用时自动启动或恢复事务服务。`com.atomikos.icatch.jta.UserTransactionImp`\
  \ 是 Atomikos 提供的 `javax.transaction.UserTransaction` 实现，你可以将其用于独立的 Java 应用程序。此类同样会在首次使用时自动启动并恢复事务服务。\n\
  \n`org.springframework.transaction.jta.JtaTransactionManager` 是 JTA 的 PlatformTransactionManager\
  \ 实现，它将工作委托给后端 JTA 提供程序。它通常用于委托给 Java EE 服务器的事务协调器，但在你的案例中，你配置的是嵌入在应用程序中的 Atomikos\
  \ JTA 提供程序。\n\n\n\n微服务 2：Broker-Web\n\n该微服务结构简单，包含 REST 控制器。您可以通过向此微服务发送 HTTP 请求来调用测试用例。您还可以持续观察仪表盘，它将为您提供\
