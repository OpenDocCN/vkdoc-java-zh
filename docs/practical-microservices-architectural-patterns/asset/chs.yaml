  请参考图 3-6，该图展示了面向消息的微服务的扩展方式。你可以将相同的原则应用于基于 CQRS 的微服务中的命令服务和查询服务的横向扩展，如图 5-7 所示。这仅仅是图
  5-4 中“使用独立的读写进程进行横向扩展”的另一种视图；然而，这种视图与图 3-6 中的“面向消息的微服务扩展”更加一致，并额外具备了 CQRS 模式的能力。同样，在图
  5-7 中，我没有重复图 5-6 中描述的所有 CQRS 组件，因此请假设它们仍然存在，并在图中被抽象化以保持清晰。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig7_HTML.jpg](img/477630_1_En_5_Fig7_HTML.jpg)


  图 5-7


  基于事件的 CQRS 架构横向扩展的元模型


  仔细观察图 5-7 会发现另一个注意事项：图中展示了两个命令服务实例。虽然维护多个读取服务实例相当简单，但维护同一个写入服务的多个实例则并非易事，因为如果跨多个实例并发访问具有相同标识的实体进行修改，可能会导致数据一致性问题。你将在第
  16 章中探讨这一方面；在此之前，请假设你只有一个写入服务节点。


  ## 总结


  为业务实体维护多个视图是我们多年来一直采用的技术，而物化视图、缓存、只读副本等都是实现这一目标的手段。CQRS 是一种更形式化的模式，用于改进微服务的内部架构，从而将微服务的可扩展性提升数倍。虽然
  CQRS 解决了业务实体读取部分的可扩展性问题，但写入部分被单独部署以处理数据一致性，这也将主导将实体状态的变更传播到所有读取部分。尽管与简单的微服务相比，这种架构更为复杂，但额外的复杂性将通过微服务可扩展性的指数级增长而得到回报。在将读取和写入部分拆分为独立的微服务后，你现在应该关注它们之间的外部架构问题，包括变更同步以及以可靠、灵活的方式进行其他类型的微服务间通信的需求。因此，请继续阅读第
  6 章。


