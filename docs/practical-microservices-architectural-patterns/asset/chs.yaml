  ECOM_CORE_EVENT_PROCESSOR\");\n}\n}\n清单 19-14\nEcomCoreAppConfiguration (ch19\\\
  ch19-03\\Ax3-Ecom-With-Security\\Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\\
  EcomCoreAppConfiguration.java)\n```\n\n清单 19-15 展示了你在清单 19-14 中看到的参数值的配置。\n\n```\n\
  axon:\namqp:\nexchange: Ecom-axon3-exchange\nqueue: Ecom-core-queue\neventhandling:\n\
  processors:\nECOM_CORE_EVENT_PROCESSOR:\nsource: ecomCoreEventQueue\n清单 19-15\n\
  ecom-core.yml (ch19\\ch19-03\\Ax3-Ecom-With-Security\\config-repo\\ecom-core.yml)\n\
  ```\n\n接下来，让我们看看需要对清单 19-12 中 OrderCommandHandler 的代码进行的主要重构。你将 OrderCommandHandler\
  \ 重写为清单 19-16 所示。\n\n```\n@Component\npublic class OrderCommandHandler {\n@Autowired\n\
