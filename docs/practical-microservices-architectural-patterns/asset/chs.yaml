  \ SOA 一样。有人说微服务只是 SOA 的正确实现。我们不再使用繁重的 WS-* 标准，而是采用 REST。我们不再使用 ESB，而是使用像 ActiveMQ\
  \ 这样的轻量级代理。事务呢？效仿亚马逊等行业巨头，我们不一定使用（也不推荐）跨越所有微服务的全局 ACID 事务。相反，如今的重点是 BASE 和 Saga。\n\
  \nBASE 意味着：不是跨越所有微服务的一个巨大 ACID 事务（带有一个巨大的提交），而是多个较小的 ACID 事务在系统中传播——因此系统最终变得一致。消息传递对此至关重要。\n\
  \n这些较小的 ACID 事务中的每一个都可以使用像 XA 这样成熟的技术进行控制，因此它们确实是 ACID 的——即使出现问题也是如此。\n\n不幸的是，BASE\
  \ 常常被现代框架或缺乏 XA 支持的技术/平台用作误导性的借口。BASE 的实现方式至关重要，没有 XA 就很难正确实现——除非您不关心重复处理或消息丢失。\n\
