  \ ACID^(¹⁸) 合规性的传统单体架构，还是采用具有宽松 ACID 合规性的新一代微服务架构。虽然配置高可用性及相关方面需要在处理节点和网络路径上实现冗余，但与单体架构相比，基于微服务的架构可能会增加网络跳数或线程及进程级上下文切换的总数。因此，应尽一切努力解决单个微服务以及整个微服务应用的性能问题。您将在下一章中探讨这一点。\n\
  \n脚注\n\n10. 微服务性能\n\n当您从传统的三层或 n 层架构迁移到微服务架构时，一个主要的可观察特征是微服务进程之间互连数量的增加。以前完全在单个进程内完成的计算，现在可能会被拆分成许多跨进程的微计算。这增加了进程间通信的数量、上下文切换的次数、涉及的\
  \ I/O 操作数量等。因此，更详细地审视这些方面是很有意义的。在本章中，您将探讨微服务中需要考虑的几个性能方面，具体包括：\n\n*   同步 HTTP 与异步\
  \ HTTP\n*   用于异步 HTTP 的 Servlet 3.0 规范\n*   演示浏览器与微服务之间异步 HTTP 的代码\n*   演示微服务之间异步\
  \ HTTP 的代码\n*   Google Protocol Buffer\n*   演示在微服务之间使用 Google Protocol Buffer 的代码\n\
  \n外部架构间的通信\n\n第 4 章的“外部架构视角”部分介绍了微服务的外部架构。在那里，您看到了当您转向基于微服务的架构时，典型单体架构的内部复杂性是如何“浮出水面”的。一个明显的变化是，单个或少数几个计算进程被拆分成更多类似但计算密集度较低的进程。借助图\
  \ 10-1 可以更好地解释这一变化。\n\n![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig1_HTML.jpg](img/477630_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1\n单体架构与微服务架构的边界\n\n在传统的单体架构中，构成服务实现的多个组件在单个容器进程中执行。这些组件之间的方法调用或消息传递是“本地”或“进程内”的。这将允许进程（无论是容器管理的进程还是简单的\
  \ Java 应用程序进程）做出许多假设和优化，并完成执行。然而，当您将同一个服务从单体架构重新架构为微服务架构时，实现会被拆分并部署到多个进程中。如图 10-1\
  \ 所示。与进程内的通信相比，进程间通信是重量级的。它们涉及更多的上下文切换、网络等待和 I/O 操作、数据编组和解组等。这增加了微服务架构外部架构空间的复杂性。\n\
  此外，每个微服务都涉及监听传入流量的套接字监听器。因此，与传统的单体架构相比，微服务架构涉及更多的套接字监听器、用于处理传入流量的相关线程等。深入研究这些精选关注点中的几个细节，并分析解决它们的方案，将使您对整个领域有一个相当清晰的认识。\n\
  \n异步 HTTP\n您在第 6 章中简要了解了分布式消息传递，同时也认识到了微服务之间同步和异步通信风格的区别。您了解到消息传递是微服务进行异步通信的一流技术，并通过示例看到了如何关联许多异步消息传输，以便将它们编织成单个端到端请求/响应周期的组成部分。然而，第\
  \ 8 章中的所有示例都使用 HTTP 协议进行微服务之间的相互通信。在本节中，您将更仔细地审视这些通信的性质。\n\n\n\nHTTP 的弊端与丑陋之处\n\
  如前所述，第 8 章中的所有示例均使用 HTTP 协议进行微服务间的相互通信。如果再次审视这些交互，你会发现其中大部分是同步 HTTP 调用。仔细观察这些通信过程会发现，从消费端微服务到提供端微服务服务器的传入请求会占用一个\
  \ Servlet 连接，并在向消费端微服务发送响应之前，对远程服务执行阻塞调用。这种方式虽然可行，但如果同时存在大量此类并发客户端，则无法有效扩展。同步 HTTP\
  \ 最适合用户使用客户端应用程序获取即时反馈或响应的场景；然而，在服务器端处理时，情况并非如此。\n\n异步 HTTP 处理的 API\n像 Apache Tomcat\
  \ 这类应用服务器中的典型容器，通常为每个客户端请求使用一个服务器线程。在负载增加的情况下，这要求容器拥有大量线程来处理所有客户端请求。这限制了可扩展性，可能因内存耗尽或容器线程池耗尽而引发问题。从\
  \ Servlet 3.0 规范开始，Java EE 为 Servlet 和过滤器增加了异步处理支持。当 Servlet 或过滤器在处理请求时遇到潜在的阻塞操作，可以将该操作分配给异步执行上下文，并立即将与请求关联的线程返回给容器，而无需等待生成响应。阻塞操作稍后可以在某个不同线程的异步执行上下文中完成，该线程可以生成响应或将请求分派给另一个\
  \ Servlet。`javax.servlet.AsyncContext` 类就是提供在服务方法内执行异步处理所需功能的 API。服务方法中 `HttpServletRequest`\
  \ 对象的 `startAsync()` 方法会将请求置于异步模式，并确保即使在退出服务方法后也不会提交响应。你必须在阻塞操作完成后的异步上下文中生成响应，或者将请求分派给另一个\
  \ Servlet。\n\n这种编程模型很直接。让我们先看看传统 `Controller` 类编程模型的伪代码，来理解其中的区别。请参见代码清单 10-1。\n\
  \n```\n@RestController\npublic class ProductRestController{\n@RequestMapping(value\
  \ = \"/products\", method = RequestMethod.GET ,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public List getAllProducts() {\n//return \"List of All Products\";\n}\n}\n代码清单 10-1\n\
  同步控制器的伪代码\n```\n\n当你使用 Spring 时，控制器方法可以返回一个 `java.util.concurrent.Callable` 来异步完成处理。然后\
  \ Spring MVC 会借助 TaskExecutor 在单独的线程中调用该 `Callable`。TaskExecutor 是 Spring 对异步执行和任务调度的抽象。重写后的伪代码如代码清单\
  \ 10-2 所示。\n\n```\n@RestController\npublic class ProductRestController{\n@RequestMapping(value\
  \ = \"/products\", method = RequestMethod.GET ,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public Callable> getAllProducts() {\nreturn new Callable>() {\npublic Object call()\
  \ throws Exception {\n// ...\n// return \"List of All Products\";\n}\n};\n}\n}\n\
  代码清单 10-2\n使用 Callable 的异步控制器伪代码\n```\n\nSpring 3.2 引入了 `org.springframework.web.context.request.async.DeferredResult`，它同样可以由\
  \ `Controller` 类返回。`DeferredResult` 为使用 `Callable` 进行异步请求处理提供了一种替代方案。`Callable`\
  \ 是代表应用程序并发执行的，而使用 `DeferredResult`，应用程序可以从其选择的线程中产生结果。在这里，处理可以在 Spring MVC 未知的线程中进行，类似于需要从消息通道等获取响应的情况。因此，当你使用\
  \ `DeferredResult` 时，即使离开了控制器处理方法，请求处理也尚未完成。相反，Spring MVC（利用 Servlet 3.0 的能力）会保持响应，并保持空闲的\
  \ HTTP 连接。即使 HTTP 工作线程不再使用，HTTP 连接仍然保持打开状态。在稍后的某个时间点，其他某个线程会通过为 `DeferredResult`\
  \ 赋值来解析它。Spring MVC 会立即捕获此事件并向客户端发送响应，从而完成请求处理。\n\n使用 `DeferredResult` 的异步场景伪代码如代码清单\
  \ 10-3 所示。\n\n```\n@RestController\npublic class ProductRestController{\n@RequestMapping(value\
  \ = \"/products\", method = RequestMethod.GET ,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public DeferredResult> getAllProducts() {\nDeferredResult> deferredResult =\nnew\
  \ DeferredResult> ();\n// 将 deferredResult 添加到内部内存持有者中\n// 比如一个队列或映射...\nreturn\
  \ deferredResult;\n}\n// 在某个其他线程中...\ndeferredResult.setResult(data);\n// 从内部内存持有者中移除\
  \ deferredResult\n}\n代码清单 10-3\n使用 DeferredResult 的异步控制器伪代码\n```\n\nJava 8 引入了 `java.util.concurrent.CompletableFuture`，它可以与\
  \ Spring 一起使用来创建异步端点，这些端点同样可以释放请求线程以执行其他任务。在这种情况下，`DeferredResult.setResult` 可以简单地替换为\
  \ `CompletableFuture.complete`。`CompletableFuture` 是一个 `java.util.concurrent.Future`。`Future`\
  \ 表示异步计算的结果，而 `CompletableFuture` 是一个可以显式完成（设置其值和状态）的 `Future`，并且可以用作 `CompletionStage`，支持在其完成时触发的依赖函数和操作。`CompletableFuture`\
  \ 使得处理复杂的异步编程更加容易。它甚至允许你组合和级联异步调用，并且还提供了静态实用方法 `runAsync` 和 `supplyAsync` 来抽象掉手动创建线程的过程。请参见代码清单\
  \ 10-4。\n\n```\n@RestController\npublic class ProductRestController{\n@RequestMapping(value\
  \ = \"/products\", method = RequestMethod.GET,\nproduces = {MediaType.APPLICATION_JSON_VALUE})\n\
  public CompletableFuture> getAllProducts() {\nFuture> future =\nnew CompletableFuture>();\n\
  return CompletableFuture.supplyAsync(() -> \"in the background\");\n}\n}\n代码清单 10-4\n\
  使用 CompletableFuture 的异步控制器伪代码\n```\n\n设计一个演示微服务间异步 HTTP 的场景\n你将使用与之前示例相同的组件，但进行精简。因此，这里的示例将包含三个主要组件：一个基于\
  \ HTML 的客户端应用程序和两个微服务，如图 10-2 所示。我已移除了 HATEOAS 和所有数据仓库的复杂性，以便你可以专注于异步 HTTP 本身。一旦你理解了设计及其实现所用到的主要组件，就应该能够将类似的模式应用于其他复杂的业务场景。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n在所示的设计中，客户端应用使用 HTTP\
  \ 协议与 Product Web 微服务通信；但是，您希望客户端使用异步 HTTP 模型来实现。同样，Product Web 微服务也使用 HTTP 协议与\
  \ Product Server 微服务通信，并且这种微服务间的通信是使用异步 HTTP 模型设计的。\n\n![../images/477630_1_En_10_Chapter/477630_1_En_10_Fig2_HTML.jpg](img/477630_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2\n在 Spring Boot 中设计一个异步 HTTP 场景\n\n让我们通过参考代码片段来更详细地了解这个设计，以便概念更加清晰。\n\n\
  在 Spring Boot 中使用异步 HTTP 的代码\n\n本节的所有代码示例都在文件夹 `ch10\\ch10-01` 中。访问 `pom.xml` 可以看到为您的\
  \ Product Server 微服务显式添加了 `spring-boot-starter-web` 依赖。请参阅清单 10-5。\n\n```\norg.springframework.boot\n\
  spring-boot-starter-web\n\n清单 10-5\n将 spring-boot-starter-web 添加到 Spring Boot (ch10\\\
  ch10-01\\ProductServer\\pom.xml)\n```\n\n`spring-boot-starter-web` 将为 Product Server\
  \ 微服务添加 Tomcat 和 Spring MVC。\n\n接下来，查看清单 10-6 中显示的 Boot 主应用程序类。\n\n```\n@SpringBootApplication\n\
  @EnableAsync\npublic class EcomProductMicroserviceApplication {\npublic static void\
  \ main(String[] args) {\nSpringApplication.run(EcomProductMicroserviceApplication.class,\
  \ args);\n}\n}\n清单 10-6\n启用异步的 Spring Boot 应用程序 (ch10\\ch10-01\\ProductServer\\\
  src\\main\\java\\com\\acme\\ecom\\product\\EcomProductMicroserviceApplication.java)\n\
  ```\n\n`@EnableAsync` 注解开启了 Spring 在后台线程池中运行 `@Async` 方法的能力。这个类还自定义了支持线程池的 `Executor`。默认情况下，使用的是\
  \ `SimpleAsyncTaskExecutor`。`SimpleAsyncTaskExecutor` 不会重用线程。尽管它支持通过 `concurrencyLimit`\
  \ bean 属性限制并发线程，但默认情况下并发线程数是不受限制的。在严肃的应用中，您应该考虑使用线程池化的 `TaskExecutor` 实现。\n\n接下来，查看实现异步处理逻辑的\
  \ Service 组件，如清单 10-7 所示。\n\n```\n@Service\npublic class ProductService{\n@Async\n\
  public CompletableFuture> getAllProducts()\nthrows InterruptedException{\nList products\
  \ = getAllTheProducts();\nif (products.size() == 0) {\nLOGGER.debug(\"No Products\
  \ Retreived from the repository\");\n}\nLOGGER.debug(Thread.currentThread().toString());\n\
  Thread.sleep(2000L); // 延迟以模拟一个长时间运行的任务\nreturn CompletableFuture.completedFuture(products);\n\
  }\n}\n清单 10-7\n实现异步处理的 Service 组件 (ch10\\ch10-01\\ProductServer\\src\\main\\java\\\
  com\\acme\\ecom\\product\\service\\ProductService.java)\n```\n\n该类被标记为 `@Service`\
  \ 注解，使其成为 Spring 组件扫描的候选对象，以便检测并将其添加到应用上下文中。接下来，`getAllProducts` 方法被标记为 Spring 的\
  \ `@Async` 注解，表明它将在单独的线程上运行。该方法的返回类型是 `CompletableFuture<List<Product>>` 而不是 `<List<Product>>`，这是任何异步服务的要求。这段代码使用\
  \ `completedFuture` 方法返回一个 `CompletableFuture` 实例，该实例已经使用从仓库查询到的结果集合（一个预计需要花费相当长时间才能完成的处理逻辑）完成了。\n\
  \n现在，查看 Product Server 微服务的 Rest Controller，如清单 10-8 所示。\n\n```\n@RestController\n\
  public class ProductRestController {\nprivate final ProductService productService;\n\
  @Autowired\npublic ProductRestController(ProductService productService) {\nthis.productService\
  \ = productService;\n}\n@RequestMapping(value = \"/products\", method = RequestMethod.GET,\n\
  produces = {MediaType.APPLICATION_JSON_VALUE})\npublic CompletableFuture> getAllProducts()\n\
  throws InterruptedException, ExecutionException{\nLOGGER.debug(Thread.currentThread().toString());\n\
  return productService.getAllProducts()\n.thenApply(products -> {\nproducts.forEach(item->LOGGER.debug(item.toString()));\n\
  LOGGER.debug(Thread.currentThread().toString());\nreturn products;\n});\n}\n}\n\
  清单 10-8\n促进异步的 Product Server Rest Controller (ch10\\ch10-01\\ProductServer\\src\\\
  main\\java\\com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n\
  ```\n\n请注意，`productService.getAllProducts()` 返回的 `CompletableFuture` 响应允许您手动控制 future\
  \ 返回的时刻，并在此过程中转换输出。然后，您借助 `thenApply()` 将这个简单的 `CompletableFuture` 转换为您需要的格式，`thenApply()`\
  \ 允许您记录一些关于当前线程的数据，以确保执行确实是异步发生的，即完成工作的线程不是启动工作的线程。然后，Rest Controller 再次将产品集合作为另一个\
  \ `CompletableFuture<List<Product>>` 返回，以便 Spring MVC 也以异步方式执行 HTTP 方法，从而使其成为一个巧妙实现的微服务！请记住，这是一个独立的微服务；接下来您将看到一个依赖于此独立微服务的微服务（如图所示）。\n\
  \n这个依赖的微服务是 Product Web 微服务。主要代码位于 `Controller` 类中，如清单 10-9 所示。\n\n```\n@RestController\n\
  public class ProductRestController{\nprivate final AsyncRestTemplate asyncRestTemplate\
  \ =\nnew AsyncRestTemplate();\nprivate static String PRODUCT_SERVICE_URL =\n\"http://localhost:8080/products/\"\
  ;\n@RequestMapping(value = \"/productsweb\", method = RequestMethod.GET,\nproduces\
  \ = {MediaType.APPLICATION_JSON_VALUE})\npublic DeferredResult> getAllProducts()\
  \ {\nLOGGER.debug(Thread.currentThread().toString());\nDeferredResult> deferredResult\
  \ = new DeferredResult();\nParameterizedTypeReference> responseTypeRef =\nnew ParameterizedTypeReference>()\
  \ {};\nListenableFuture>> entity =\nasyncRestTemplate.exchange(PRODUCT_SERVICE_URL,\n\
  HttpMethod.GET, (HttpEntity) null, responseTypeRef);\nentity.addCallback(new\nListenableFutureCallback>>()\
  \ {\n@Override\npublic void onFailure(Throwable ex) {\nLOGGER.debug(Thread.currentThread().toString());\n\
  LOGGER.error(ex.getMessage());\n}\n@Override\npublic void onSuccess(ResponseEntity>\
  \ result) {\nList products = result.getBody();\nproducts.forEach(item->LOGGER.debug(item.toString()));\n\
  LOGGER.debug(Thread.currentThread().toString());\ndeferredResult.setResult(products);\n\
  }\n});\nLOGGER.debug(Thread.currentThread().toString());\nreturn deferredResult;\n\
  }\n}\n清单 10-9\n在另一个微服务上调用异步 HTTP 的微服务 (ch10\\ch10-01\\ProductWeb\\src\\main\\java\\\
  com\\acme\\ecom\\product\\controller\\ProductRestController.java)\n```\n\n\n\n这里的\
  \ `PRODUCT_SERVICE_URL` 指的是独立的微服务。Product Web 微服务需要调用 Product Server 微服务。您已经将 Product\
