  \n图 8-12\nEureka 控制台\n\n现在，你最好在 Chrome 浏览器中打开这个 HTML 工具：`ch08\\ch08-05\\ProductWeb\\\
  src\\main\\resources\\product.html`。浏览器客户端在加载时，会向监听在 8082 端口的 Product Web 发送一个请求，该请求将委托给\
  \ Product Server 微服务的任意一个实例。重复刷新浏览器，Product Web 微服务对 Product Server 微服务实例的请求将实现负载均衡，你可以通过查看\
  \ Product Server 微服务命令窗口中发生的日志来验证这一点。如果你关闭其中一个 Product Server 微服务并刷新浏览器，你会看到请求将始终发送到另一个正在运行的\
  \ Product Server 实例。这是因为你在 RestTemplate 上使用了 `@LoadBalanced` 注解，该注解用于从 Product Web\
  \ 微服务向 Product Server 微服务发送请求，如清单 8-18 所示。如果你重新启动之前关闭的 Product Server 微服务，Ribbon\
  \ 负载均衡将再次生效，在 Product Web 微服务对 Product Server 微服务的两个实例之间交替发送调用。类似地，你也可以通过关闭其中一个\
  \ Eureka 微服务来进行测试。Eureka 客户端被设计为能够处理 Eureka 集群中一个或多个 Eureka 对等节点的故障。由于 Eureka 客户端本地缓存了注册信息，即使所有可用的\
  \ Eureka 对等节点都宕机，它们也能相当良好地运行。\n\n引导你的引导服务器\n现在你应该明白，在基于微服务的企业应用中，每个服务实例都可以向 Eureka\
  \ 注册中心注册，Eureka 注册中心实例本身也是如此。但有一个例外，那就是 API 网关，你将在下一节中看到；在此之前，请忽略这个例外。我已经说过，Eureka\
  \ 注册中心是任何感兴趣的服务消费者的服务目录，因此，如果服务消费者能够通过它想要消费的服务名称找到注册中心，注册中心就会提供如何访问该服务的信息（主机、端口等）。那么关键问题是，任何服务消费者最初是如何访问注册中心的？换句话说，Eureka\
  \ 注册中心将帮助任何微服务进行引导并自我宣告。但是，Eureka 注册中心本身如何宣告自己呢？引导服务器如何引导自身？！\n你需要一组标准的、易于识别的 Eureka\
  \ 服务器地址。一种机制是使用内部 DNS 或类似服务。然而，这种固定的（IP）地址仅在传统的局域网环境中有效。一旦我们谈到在 AWS 这样的公有云中部署，情况就变了。在像\
  \ AWS 这样的云环境中，实例来来去去。这意味着你不能用标准的主机名或 IP 地址来固定 Eureka 服务器。必须使用像 AWS EC2 弹性 IP 地址这样的机制。弹性\
  \ IP 地址是专为动态云计算设计的静态 IPv4 地址。使用弹性 IP 地址，你可以通过快速将地址重新映射到账户中的另一个实例来掩盖微服务的故障。集群中的每个\
  \ Eureka 服务器都需要一个弹性 IP。一旦你用弹性 IP 地址列表配置了 Eureka 服务器，Eureka 服务器就会处理查找未使用的弹性 IP 并在启动时将其绑定到自身的麻烦。\n\
  \n\n\nZuul，API 网关\n任何服务都需要通过地址来访问——更准确地说，是通过一个众所周知的地址。像 [`www.google.com`](http://www.google.com)\
  \ 或 [`www.apple.com`](http://www.apple.com) 这样的地址就是例子。同样，当你托管一个企业应用时，它也需要有一个地址，具体来说就是一个主页\
  \ URL。在浏览器中输入这样的 URL，会将你的请求引导至网站中的着陆资源。通常，这些名称或众所周知的 URL 会通过 DNS 解析，并指向一个物理 IP 或一组物理\
  \ IP 的组合。当出于可扩展性原因在集群或服务器场中部署应用时，你还需要一个负载均衡器，它将充当反向代理，请求首先到达这里，然后被负载均衡到服务器场中的任何一个实例。Apache\
  \ HTTP 服务器和 F5 就是类似的设备。AWS ELB（弹性负载均衡器）是一种针对在 AWS 云场景中暴露给最终用户流量的 Web 服务的负载均衡解决方案。在所有这些情况下，一旦你公布了公开暴露的\
  \ IP，从那时起，企业应用的内部细节（包括网络和部署细节）就对外界隐藏了。这是一种推荐模式，在你的微服务应用中也会遵循同样的做法。\n\n引导 URL\n在上一节中，你看到每个微服务在启动时都可以向\
  \ Eureka 注册中心进行自我注册，这样消费者就可以通过注册中心被引导到这些服务。为了发现注册中心的位置，你将使用众所周知且固定的地址来访问注册中心。这些注册中心只包含指向内部微服务的路由映射。外部可访问的资源和地址通常不会在注册中心中建立索引；相反，你需要通过其他方式暴露它们。DNS\
  \ 就是其中一种机制。但你也知道，来自这些可公开访问资源的后续查询或请求（例如来自主页和其他页面的许多 AJAX 调用）需要访问这些微服务。你需要一种机制来实现这一点。这就是\
  \ API 网关发挥作用的地方。一组微服务可以通过 API 网关从外围暴露给客户端，而其余你不想暴露的微服务则可以继续保持不暴露状态。因此，你的 API 网关将成为那些客户端用来访问公开暴露的微服务的\
  \ URL 的引导机制。\n\n图 8-13 描述了如何在本地部署中设置 API 网关。第 4 章的“网格应用和服务架构”部分讨论了网格应用和服务架构，我将扩展\
  \ MASA 的概念以容纳 API 网关。在每个企业应用中，API 网关处需要处理许多问题，安全性就是其中之一。所有这些问题都可以在 API 网关处解决，因为网关将充当企业应用架构的单一前门。\n\
  \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig13_HTML.jpg](img/477630_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13\nZuul，本地部署的 API 网关\n\n使用 API 网关时，需要注意以下几点：\n\n*   只有公共服务才绑定到 API 网关。这意味着所有需要从企业\
  \ DMZ 外部寻址的微服务 API 都将绑定到 API 网关。\n*   对于不一定需要从外部访问的微服务，则无需在 API 网关处暴露它们。\n\n在图 8-13\
  \ 中，你可以看到所有微服务都在 Eureka 中注册。然后，所有需要从外部访问的微服务也都绑定到了 API 网关。然而，不一定需要从外部访问的微服务（例如微服务\
  \ 2）则没有绑定到 API 网关。下一个值得注意的方面是，API 网关本身应该可以从外部寻址。所有应用也是如此，因为应用需要能够被客户端设备直接访问。在图 8-13\
  \ 中，你可以看到应用域，我们通常将 DMZ 外部可寻址和可访问的所有组件放置在此域中。通常，此域由 Web 应用、移动应用、面向物联网设备的代理等组成。将应用和\
  \ API 网关注册到合适的外部命名服务使这成为可能，而 DNS 是实现此目的的一种方式。任何此类可公开访问的资源都将在公共 DNS 中注册，因此它们的地址将通过\
  \ DNS 查找来解析。成功的 DNS 查找将为客户端设备提供资源的实际 URL，以便客户端设备可以请求该资源并获取响应，然后进行渲染。如图 8-14 所示。\n\
  \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig14_HTML.jpg](img/477630_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14\n引导微服务应用的 URL\n\n一旦你收到应用内容（在传统 Web 应用上下文中是主页）并在设备上渲染后，从那时起，客户端设备到服务器的所有其余请求都可以路由到一个或多个上下文根\
  \ URL。这意味着来自客户端设备应用的所有后续请求都将命中 API 网关，如图 8-15 所示。这在图中用标签进行了标记。由于 API 网关也是公开暴露的，因此通过像\
  \ DNS 这样的命名服务来解析其 IP 是合理的，或者客户端应用本身也可以记住 API 网关的 IP 并直接访问（标签 7）。API 网关将首先执行注册中心查找（标签\
  \ 9），然后将请求路由到目标微服务（标签 10）。Zuul 默认使用 Ribbon 通过服务发现（例如在你的场景中是 Eureka）来定位要转发请求的实例。因此，如果你的服务在\
  \ Eureka 中注册，Zuul 也可以处理实例查找并继续转发负载均衡的请求。\n\n让我们将场景再扩展一层。假设微服务 1 必须内部调用微服务 2 以访问某些功能。图\
  \ 8-13 显示微服务 2 没有绑定到 API 网关，因为它是一个始终内部可访问的微服务；然而，它也在 Eureka 中注册了一个名称。然后，微服务 1 可以使用\
  \ Feign 客户端或类似机制执行 Eureka 查找，并执行基于 Ribbon 的负载均衡，以便将调用路由到微服务 2（标签 12）。\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig15_HTML.jpg](img/477630_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15\n从客户端应用到微服务的请求\n\n你需要认识到，这里解释的部署架构是典型的架构，并且可以根据你的企业需求有多种变体。\n\n设计一个启用 Zuul\
  \ 的场景\n你将通过引入 Zuul API 网关来修改图 8-13 中的设计；修改后的设计如图 8-16 所示。流程如上一节所述；但是，这里我不会介绍 DNS\
  \ 等的所有复杂性。让我们来看看这个流程。\n\n\n\n客户端设备（在您的场景中即浏览器）将用于渲染 `product.html`（标签 1）。当 `product.html`\
  \ 加载到浏览器后，它会向 Product Web 微服务发起请求。在本示例中，为简化起见，您不会将 Product Web 微服务绑定到 API 网关，而仅将\
  \ Product Server 微服务绑定到 API 网关。因此，客户端设备到 Product Web 微服务的请求是直接访问，不经过 API 网关（标签 3）。现在，Product\
  \ Web 微服务需要将请求委托给 Product Server 微服务，为此，它将通过 API 网关路由请求（标签 4）。API 网关将执行注册表查找（标签\
  \ 5），并将托管 Product Server 微服务的服务器详细信息返回给 Product Web 微服务中的 Ribbon 客户端。Product Web\
  \ 微服务获取此信息后，将请求负载均衡到 Product Server 微服务的任一实例（标签 6），因为您将托管两个 Product Server 微服务实例。\n\
  \n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig16_HTML.jpg](img/477630_1_En_8_Fig16_HTML.jpg)\n\
  \n**图 8-16**\n使用 Zuul 的设计\n\n**使用 Zuul 的代码**\n\n本节的所有代码示例均位于 `ch08\\ch08-06` 文件夹中。请访问\
  \ `pom.xml` 查看 Zuul 依赖项的显式声明。参见代码清单 8-24。\n\n```\norg.springframework.cloud\nspring-cloud-starter-zuul\n\
  \norg.springframework.cloud\nspring-cloud-starter-eureka\n\n代码清单 8-24\nZuul 依赖项\
  \ (ch08\\ch08-06\\ProductApiZuul\\pom.xml)\n```\n\n请注意，Zuul 本身就是一个微服务，因此它需要像其他普通微服务一样向注册表注册自己。因此，Zuul\
  \ 也需要一个 Eureka 依赖项，如代码清单 8-25 所示。\n\n接下来，您需要 Spring Cloud 的 `@EnableZuulProxy` 来启动一个\
  \ API 网关，其他微服务可以绑定到该网关。这是在常规的 Spring Boot 应用程序主类中完成的，只需添加一个注解即可启用 Zuul 网关。\n\n```\n\
  @EnableZuulProxy\n@EnableDiscoveryClient\n@SpringBootApplication\npublic class ProductServerApiApplication\
  \ {\npublic static void main(String[] args) {\nSpringApplication.run(ProductServerApiApplication.class,\
  \ args);\n}\n}\n代码清单 8-25\n启用 Zuul (ch08\\ch08-06\\ProductApiZuul\\src\\main\\java\\\
  com\\acme\\ecom\\infra\\ProductServerApiApplication.java)\n```\n\n现在，您需要在 API 网关处定义路由，这将在\
  \ `application.yml` 中完成。参见代码清单 8-26。\n\n```\nspring:\napplication:\nname: product-service-api\n\
  server:\nport: 8082\nzuul:\nroutes:\nproduct-api:\npath: /api/**\nservice-id: product-service\n\
  eureka:\nclient:\nserviceUrl:\ndefaultZone: http://localhost:8761/eureka/\nhystrix:\n\
  command:\ndefault:\nexecution:\nisolation:\nthread:\ntimeoutInMilliseconds: 2000\n\
  代码清单 8-26\n在 Zuul 网关中定义路由 (ch08\\ch08-06\\ProductApiZuul\\src\\main\\resources\\\
  application.yml)\n```\n\n现在，Zuul 将以名称 `product-service-api` 注册到 Eureka。此外，任何到达 Zuul\
  \ 的、模式为 `/api/**` 的 URL 都将被路由到 `product-service`。\n\nProduct Server 微服务的代码与您在“使用\
  \ Eureka 的代码”部分中看到的代码类似，不同之处在于您移除了 MongoDB 依赖项，而是使用简单的内存表示来存储产品数据，以使示例更简单。然而，Product\
