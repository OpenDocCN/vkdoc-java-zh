  ```\n\nZuul 后置过滤器仅在身份验证流程中被调用。Zuul 后置过滤器的主要工作是，每当它从授权服务器首次收到用户会话的 JWT 时，会先将其缓存到\
  \ EHCache 中并与一个引用令牌关联，然后将此引用令牌作为响应头返回。\n\n授权服务器\n授权服务器构成了 OAuth 流程的核心，它将负责身份验证和授权两个方面。\n\
  \n对于身份验证，你使用 Spring Security 的 Web 基础设施，这是一组标准的 Servlet 过滤器。以下是 Spring 对术语的简要定义：\n\
  \n*   **主体（Principal）**：执行操作的用户、设备或系统。\n*   **身份验证（Authentication）**：验证主体凭据是否有效的过程。\n\
  *   **授权（Authorization）**：决定是否允许主体执行某项操作。\n*   **安全项（Secured item）**：受保护的资源。\n\n\
  你必须启用清单 18-10 中所示的安全配置类，才能使用你为验证和授权用户而定义的 JDBC 数据源。\n\n\n\n```\n@Configuration\n\
  class WebSecurityConfig extends WebSecurityConfigurerAdapter {\n@Autowired\nprivate\
  \ JdbcTemplate jdbcTemplate;\n@Override\n@Bean\npublic AuthenticationManager   \
  \ authenticationManagerBean()\nthrows Exception {\nreturn super.authenticationManagerBean();\n\
  }\n@Override\nprotected void configure(HttpSecurity http) throws Exception {\nhttp\n\
  .csrf().disable()\n.exceptionHandling()\n.authenticationEntryPoint((request, response,\
  \ authException) ->\nresponse.sendError(HttpServletResponse.SC_UNAUTHORIZED))\n\
  .and()\n.authorizeRequests()\n.antMatchers(\"/∗∗\").authenticated()\n.and()\n.httpBasic();\n\
  }\n@Override\nprotected void configure(AuthenticationManagerBuilder auth)\nthrows\
  \ Exception {\nauth.jdbcAuthentication().dataSource(jdbcTemplate.getDataSource())\n\
  .usersByUsernameQuery(\"select user_id, password, active from\nuser_credential where\
  \ user_id=?\")\n.authoritiesByUsernameQuery(\n\"select user.user_id, role.role from\
  \ user_credential user\njoin  user_role role on user.id = role.user_id and\nuser.user_id\
  \ =?\");\n}\n}\n清单 18-10\nSpring Security 配置 (ch18\\ch18-01\\Ax2-Ecom-With-Security\\\
  Ecom-security\\src\\main\\java\\com\\acme\\ecom\\security\\oauth\\WebSecurityConfig.java)\n\
  ```\n\nJava 配置方法会创建一个名为 `springSecurityFilterChain`（`DelegatingFilterProxy` 和 `FilterChainProxy`）的\
  \ Servlet 过滤器，该过滤器负责应用程序内的所有安全事宜（保护应用程序 URL、验证提交的用户名和密码、重定向到登录表单等）。\n\n您将 `authenticationManagerBean`\
  \ 声明为一个 Bean，稍后它将被注入到 Spring OAuth 安全配置中。\n\n`WebSecurityConfigurerAdapter` 在 `configure(HttpSecurity\
  \ http)` 方法中提供了默认配置，因此所有用户访问 Web 应用程序的任何 URL 都需要进行身份验证。但您可以像清单 18-10 所示那样重写此方法。\n\
  \n首先，配置 `HttpSecurity` 以定义哪些资源必须受保护、已授权、未授权、不受保护、登录页面、注销页面、访问被拒页面等。这里需要注意的一点是配置的顺序。特定于某些页面或\
  \ URL 的配置必须放在前面，然后是大多数 URL 通用的配置。\n\n如果身份验证失败，您将收到预期的 401 Unauthorized 响应，随后是身份验证质询。在普通网页上下文中，浏览器会解释此质询，并通过一个简单的对话框提示您输入凭据。在浏览器环境中，登录页面不再是硬性要求，因为所有浏览器都支持基本身份验证，并且可以使用标准对话框提示用户输入凭据。此外，Spring\
  \ Security 默认提供的 `BasicAuthenticationEntryPoint` 会为 401 Unauthorized 响应向客户端返回一个完整页面。这种错误的\
  \ HTML 表示形式在浏览器中也能很好地呈现，但对于像 REST API 或 Zuul API 网关这样可能更倾向于 JSON 表示形式的场景来说，它并不适用。因此，您应该通过保留\
  \ HTTP Basic 但将 401 质询更改为“Basic”以外的内容来阻止身份验证对话框。您可以在 `HttpSecurity` 配置回调中使用一行代码实现\
  \ `AuthenticationEntryPoint`：\n\n```\nauthenticationEntryPoint((request, response,\
  \ authException) ->\nresponse.sendError(HttpServletResponse.SC_UNAUTHORIZED))\n\
  ```\n\n接下来是身份验证的配置。对于身份验证，Spring Security 提供了多种方法：\n\n*   DAO 身份验证提供者是 Spring 的默认实现\n\
  \nSpring 在此期望提供一个 `org.springframework.security.core.userdetails.UserDetailsService`\
  \ 实现来提供凭据和权限。\n\n*   内置：内存（属性）、JDBC（数据库）、LDAP\n\n*   自定义\n\n*   自定义身份验证提供者\n\n示例：在使用单点登录时获取预认证的用户详细信息\n\
  \n*   CAS、TAM、SiteMinder\n\n您将使用 Java 配置中的 JDBC 身份验证，在其中可以自定义默认查询。清单 18-10 展示了如何接入\
  \ JDBC 身份验证。您需要通过提供一个 `DataSource` 来配置它。由于您使用的是自定义表，因此还需要提供选择查询来获取用户详细信息及其角色。您为\
  \ `AuthenticationManagerBuilder` 设置了两个查询，一个用于 `usersByUsernameQuery` 中的身份验证，另一个用于\
  \ `authoritiesByUserNameQuery` 中的授权。\n\n*   `users-by-username-query`：此查询将选择用户的用户名、密码和启用状态属性，并根据您的自定义表将用户名作为参数。在实际实现中，搜索可能区分大小写或不区分大小写，具体取决于实现实例的配置方式。\n\
  \n*   `authorities-by-username-query`：此查询将选择用户名和用户角色，并根据您的自定义表将用户名作为参数。\n\n身份验证处理完毕后，您就可以开始配置负责管理访问令牌的授权服务器了。Spring\
  \ Security OAuth2 处理授权。要配置和启用 OAuth 2.0 授权服务器，您必须在清单 18-11 中使用 `@EnableAuthorizationServer`\
  \ 注解。\n\n```\n@Configuration\n@EnableAuthorizationServer\npublic class OAuth2Configuration\
  \ extends AuthorizationServerConfigurerAdapter {\n@Autowired\n@Qualifier(\"authenticationManagerBean\"\
  )\nprivate AuthenticationManager authenticationManager;\n@Override\npublic void\
  \ configure(ClientDetailsServiceConfigurer clients)\nthrows Exception {\nclients.inMemory()\n\
  .withClient(\"ecom_app\")\n.secret(\"ecom\")\n.scopes(\"PRODUCT\",\"CUSTOMER\",\"\
  ORDER_HISTO\",\n\"CORE\",\"SHIPPING\",\"DELIVERY\")\n.autoApprove(true)\n.authorities(\"\
  PRODUCT_READ\", \"PRODUCT_WRITE\",\"CUSTOMER_READ\",\n\"ORDER_READ\",\"ORDER_WRITE\"\
  )\n.authorizedGrantTypes(\"implicit\",\"refresh_token\",\n\"password\", \"authorization_code\"\
  );\n}\n@Override\npublic void configure(AuthorizationServerEndpointsConfigurer endpoints)\n\
  throws Exception {\nendpoints.tokenStore(tokenStore()).tokenEnhancer(jwtTokenEnhancer()).\n\
  authenticationManager(authenticationManager);\n}\n@Bean\npublic TokenStore tokenStore()\
  \ {\nreturn new JwtTokenStore(jwtTokenEnhancer());\n}\n@Bean\nprotected JwtAccessTokenConverter\
  \ jwtTokenEnhancer() {\nKeyStoreKeyFactory keyStoreKeyFactory = new KeyStoreKeyFactory(\n\
  new ClassPathResource(\"jwt.jks\"), \"mySecretKey\".toCharArray());\nJwtAccessTokenConverter\
  \ converter = new JwtAccessTokenConverter();\nconverter.setKeyPair(keyStoreKeyFactory.getKeyPair(\"\
  jwt\"));\nreturn converter;\n}\n}\n清单 18-11\nSpring OAuth 安全配置 (ch18\\ch18-01\\\
  Ax2-Ecom-With-Security\\Ecom-security\\src\\main\\java\\com\\acme\\ecom\\security\\\
  oauth\\OAuth2Configuration.java)\n```\n\n您通过添加 `@EnableAuthorizationServer` 注解并使用\
  \ Spring 的 `AuthorizationServerConfigurerAdapter` 实现 `AuthorizationServerConfigurer`\
  \ 来配置 OAuth 2.0 授权服务器。您重写了空的 `configure()` 方法。\n\n`AuthorizationServerConfigurerAdapter`\
  \ 依赖于几个可以重写以设置配置的方法。主要方法有：\n\n*   `void configure(AuthorizationServerSecurityConfigurer\
  \ security)`：您可以配置授权服务器的安全性，这实际上意味着 `/oauth/token` 端点。令牌端点（`/oauth/token`）将自动使用客户端凭据的\
  \ HTTP 基本身份验证进行保护。`/oauth/authorize` 端点也需要安全，但这是一个普通的面向用户的端点，其安全方式应与 UI 的其余部分相同。在您的情况下，您保持其原样。\n\
  \n\n\n*   `void configure(ClientDetailsServiceConfigurer clients)`: 该方法用于配置 `ClientDetailsService`（提供\
  \ OAuth2 客户端详细信息的服务），例如声明各个客户端及其属性。请注意，除非向 `configure` 方法提供了 `AuthenticationManager`，否则密码授权模式不会被启用（即使某些客户端被允许使用）。必须至少声明一个客户端或一个完整自定义的\
  \ `ClientDetailsService`，否则服务器将无法启动。您已注册了另一个客户端，并授权了“implicit”、“password”、“authorization_code”和“refresh_token”授权类型。为了使用“password”授权类型，您需要注入并使用\
  \ `AuthenticationManager` bean。该认证管理器将代表 Web 安全用户。\n\n*   `void configure(AuthorizationServerEndpointsConfigurer\
  \ endpoints)`: 您可以在此处配置授权服务器端点的非安全特性，例如令牌存储、令牌自定义、用户审批和授权类型。默认情况下，您无需执行任何操作，除非您需要密码授权，在这种情况下，您需要提供一个认证管理器。\n\
  \n默认情况下，Spring Security 会提供 UUID 格式的 `access_token` 和 `refresh_token`，然后由资源服务器进行验证。如果您的服务有大量请求，这可能会使授权服务器成为瓶颈。相反，根据之前关于令牌和\
  \ JWT 的讨论，您可以让授权服务器签发包含验证用户所需全部信息的签名 JWT。为此，您需要 `JwtTokenStore` 和 `JwtAccessTokenConverter`。您可以使用一个自定义的\
  \ `JwtAccessTokenConverter`，它将使用预生成的证书进行 JWT 签名。为此，您必须使用您的 `keyPair` 配置并配置一个自定义的\
  \ `JwtAccessTokenConverter`，如清单 18-11 所示。`JwtAccessTokenConverter` 在 JWT 编码的令牌值与\
  \ OAuth 认证信息之间进行双向转换。当令牌被授予时，它还充当 `TokenEnhancer`（一个在访问令牌被 `AuthorizationServerTokenServices`\
  \ 实现存储之前对其进行增强的策略类）。`TokenStore` 代表存储 OAuth 访问令牌的存储机制。Spring 支持不同类型的令牌存储，例如 `InMemoryTokenStore`、`JDBCTokenStore`、`JwtTokenStore`\
  \ 等。在您的场景中，您使用 `JwtTokenStore`。JWT 版本的存储（`JwtTokenStore`）将所有关于授权的数据编码到令牌本身中，并且不持久化任何数据。一旦您创建了\
  \ `JwtTokenStore` 和 `JwtAccessTokenConverter` bean，就可以在 `OAuth2Configuration` 类中将它们连接到\
  \ `AuthorizationServerEndpointsConfigurer`。\n\n资源服务器\n\n接下来，您可以使用 `@EnableGlobalMethodSecurity`\
  \ 注解在任何 `@Configuration` 实例上为您的资源服务器启用基于注解的安全性。这将启用 Spring 方法级安全性。请参见清单 18-12。\n\
  \n```\n@Configuration\n@EnableGlobalMethodSecurity(prePostEnabled = true)\npublic\
  \ class GlobalMethodSecurityConfiguration   {\n}\n清单 18-12\nEnableGlobalMethodSecurity\
  \ (ch18\\ch18-01\\Ax2-Ecom-With-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
  ecom\\core\\security\\GlobalMethodSecurityConfiguration.java)\n```\n\n`@EnableGlobalMethodSecurity`\
  \ 可以接受几个参数：\n\n*   `prePostEnabled`：决定是否启用 Spring Security 的前置和后置注解（`@PreAuthorize`、`@PostAuthorize`\
  \ 等）。\n*   `secureEnabled`：决定是否启用 Spring Security 的 `@Secured` 注解。\n*   `jsr250Enabled`：决定是否启用\
  \ JSR-250 注解（`@RolesAllowed` 等）。\n\n对于任何接口或类，您应该在同一个应用程序中只启用一种类型的注解；否则，行为将无法明确定义。如果发现两个注解适用于同一个特定方法，则只会应用其中一个。\n\
  \n您使用 `prePostEnabled = true`，并且 Spring 的 `@PreAuthorize`/`@PostAuthorize` 注解是应用方法级安全性的首选方式。它们支持\
  \ Spring 表达式语言并提供基于表达式的访问控制。让我们看看它们是如何在这里被利用的：\n\n*   `@PreAuthorize`：适用于在进入方法之前验证授权。`@PreAuthorize`\
  \ 可以考虑登录用户的角色/权限、传递给方法的参数等。\n*   `@PostAuthorize`：可以在方法执行后检查授权。它适用于验证返回值的授权；然而，它并不常用。Spring\
  \ EL 提供了一个 `returnObject`，可以在表达式语言中访问，它反映了从方法返回的实际对象。\n\n接下来，您需要配置资源服务器。`@EnableResourceServer`\
  \ 是 OAuth2 资源服务器的一个便捷注解，它启用了一个 Spring Security 过滤器，该过滤器通过传入的 OAuth2 令牌对请求进行身份验证。这启用了一个名为\
  \ `OAuth2AuthenticationProcessingFilter` 的 Spring Security 过滤器，它使用传入的 OAuth2 令牌对请求进行身份验证。您应该添加此注解，并提供一个类型为\
  \ `ResourceServerConfigurer` 的 `@Bean`（例如通过 `ResourceServerConfigurerAdapter`），用于指定资源的详细信息（URL\
  \ 路径和资源 ID）。您创建了一个名为 `CoreResourceServerConfiguration` 的 bean，它扩展了 `ResourceServerConfigurerAdapter`\
  \ 并重写了 `configure(HttpSecurity http)` 方法以启用 Ecom-core 微服务的安全性。请参见清单 18-13。\n\n```\n\
  @Configuration\n@EnableResourceServer\npublic class CoreResourceServerConfiguration\
  \ extends ResourceServerConfigurerAdapter{\n@Autowired\nTokenStore tokenStore;\n\
  @Autowired\nJwtAccessTokenConverter tokenConverter;\n@Override\npublic void configure(HttpSecurity\
  \ http) throws Exception {\nhttp\n.csrf().disable()\n.authorizeRequests()\n.anyRequest().authenticated()\n\
  .antMatchers(HttpMethod.POST).hasAuthority(\"ORDER_WRITE\")\n.antMatchers(HttpMethod.DELETE).hasAuthority(\"\
  ORDER_WRITE\");\n}\n@Override\npublic void configure(ResourceServerSecurityConfigurer\
  \ resources)\nthrows Exception {\nresources.resourceId(\"CORE\").tokenStore(tokenStore);\n\
  }\n}\n清单 18-13\n启用资源服务器 (ch18\\ch18-01\\Ax2-Ecom-With-Security\\Ecom-core\\src\\\
  main\\java\\com\\acme\\ecom\\core\\security\\CoreResourceServerConfiguration.java)\n\
  ```\n\n在 `configure` 方法中，您使用传入的 `HttpSecurity` 实例来保护 POST 和 DELETE 方法，并且只允许具有 `ORDER_WRITE`\
  \ 权限的已认证用户访问资源。然后，您使用 `ResourceServerSecurityConfigurer` 类创建一个名为 `CORE` 的资源 ID。此资源\
  \ ID 的名称必须与授权服务器中使用的名称匹配。\n\n接下来，您需要从加密的 JWT 中读取值。正如您已经看到的，`JwtAccessTokenConverter`\
  \ 有助于在 JWT 编码的令牌值和 OAuth 认证信息之间进行双向转换。由于您使用非对称加密，并且令牌已经由授权服务器使用私钥加密，因此您现在将使用公钥对进行解密和读取。请参见清单\
  \ 18-14。\n\n\n```markdown\n\n```\n@Configuration\npublic class JwtConfiguration\
  \ {\n@Autowired\nJwtAccessTokenConverter jwtAccessTokenConverter;\n@Bean\n@Qualifier(\"\
  tokenStore\")\npublic TokenStore tokenStore() {\nreturn new JwtTokenStore(jwtAccessTokenConverter);\n\
  }\n@Bean\nprotected JwtAccessTokenConverter jwtTokenEnhancer() {\nJwtAccessTokenConverter\
  \ converter =  new JwtAccessTokenConverter();\nResource resource = new ClassPathResource(\"\
  public.cert\");\nString publicKey = null;\ntry {\npublicKey = new String(FileCopyUtils.copyToByteArray(\n\
  resource.getInputStream()));\n} catch (IOException e) {\nthrow new RuntimeException(e);\n\
  }\nconverter.setVerifierKey(publicKey);\nreturn converter;\n}\n}\n清单 18-14\n令牌解密\
  \ (ch18\\ch18-01\\Ax2-Ecom-With-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
  ecom\\core\\security\\JwtConfiguration.java)\n```\n\n至此，资源服务器的设置就完成了。\n\n**注意**\n\
  证书和密钥库包含在代码示例的下载文件中。此处不涉及它们的创建过程，因为可以按照任何相关标准文献来完成。此外，示例应用中其他资源服务器（微服务）的代码不再赘述，因为它们遵循了与您刚才看到的\
  \ Ecom-core 微服务类似的设置。\n\n**设置电子商务微服务应用**\n在本节中，您将配置、构建并运行电子商务微服务应用，并执行各种测试用例。\n\n\
  **配置应用**\n您需要在微服务中进行必要的配置更改。需要进行的更改与第 17 章中说明的类似。\n\n**设置环境基础设施**\n接下来，您需要设置一些基础设施来运行示例。这同样与第\
  \ 17 章中说明的类似。\n\n**构建并运行应用**\n该应用包含 12 个微服务。构建和运行应用的方法也与第 17 章中说明的类似。\n\n在第 17 章中，您需要按以下顺序启动前三个微服务的服务器：\n\
