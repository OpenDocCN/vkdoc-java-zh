  ```\n\n该仓库是一个接口，允许你执行涉及 ProductCategory 对象的各种操作。它通过扩展 Mongo Repository（一个特定于 Mongo\
  \ 的 Repository 接口，该接口又扩展了 Spring Data Commons 中定义的 PagingAndSortingRepository 接口）来获得这些操作。在运行时，Spring\
  \ Data REST 将自动创建此接口的实现。然后，它将使用`@` `RepositoryRestResource`注解来指示 Spring MVC 在`/categories`创建\
  \ RESTful 端点：\n\n`product_service.js`\n按如下方式检索所有产品类别：\n\n```\nhttp.get(sessionStorage.getItem('apiUrl')+'/product/categories/')\n\
