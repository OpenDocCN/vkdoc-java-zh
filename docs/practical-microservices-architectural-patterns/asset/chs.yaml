  \n```\nEcom-config\nEcom-registry\nEcom-gateway\n```\n\n对于其余微服务，您可以按任意顺序启动它们。这种灵活性也体现了另外两个方面：\n\
  \n*   **微服务的独立性**：微服务之间绝对零依赖。这与旧的 CORBA、RMI、IIOP 和 SOAP 服务范式不同，在那些范式中，依赖的微服务需要独立微服务的存根。\n\
  \n*   **应用程序的部分故障**：即使您没有启动所有微服务，Web 应用程序也能通过部分使用可用服务来正常运行。\n\n要启动一个微服务，请在 Eclipse\
