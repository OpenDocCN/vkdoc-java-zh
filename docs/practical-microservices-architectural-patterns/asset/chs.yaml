  \n配置服务器\n外部化配置参数是微服务展现的一个关键特性。这对于应用程序参数和基础设施参数都是如此。当存在许多微服务时，在外部维护配置参数是一项重要的任务，而\
  \ Spring Cloud 的 Config Server 在此处为你提供了帮助。\nSpring Config Server 在版本控制的仓库（如 SVN\
  \ 或 Git）中维护配置参数。同样，仓库可以是本地的或远程的，并且可以采用单节点或多节点配置以实现高可用性。由于配置参数可以进行版本控制，然后由生产服务器直接引用，因此可以完全避免因错误值等导致的运行时错误场景。\n\
  \n设计一个配置场景\n\n你将在示例中引入 Config Server，而无需对其他微服务进行太多更改。在你的设计中，你将仅对 Product Server\
  \ 微服务使用 Config Server，尽管它可以用于所有其他微服务。如图 8-18 所示，Product Server 微服务利用 Spring Cloud\
  \ Config Server 来管理其一个配置参数的值。\n\n![../images/477630_1_En_8_Chapter/477630_1_En_8_Fig18_HTML.jpg](img/477630_1_En_8_Fig18_HTML.jpg)\n\
  \n图 8-18\nConfig Server 场景的设计\n\n使用 Config Server 的代码\n\n本节的所有代码示例都在文件夹 `ch08/ch08-07`\
  \ 中。访问 `pom.xml` 可以看到对 Config Server 依赖的显式引用。参见清单 8-28。\n\n```\norg.springframework.cloud\n\
  spring-cloud-config-server\n\n清单 8-28\nConfig Server 依赖 (ch08\\ch08-07\\ConfigServer\\\
  pom.xml)\n```\n\n接下来，你需要将 `@EnableConfigServer` 添加到 `Application` 类中，如清单 8-29 所示。\n\
  \n```\n@SpringBootApplication\n@EnableConfigServer\npublic class EcomProductConfigApplication\
  \ {\npublic static void main(String[] args) {\nSpringApplication.run(EcomProductConfigApplication.class,\
  \ args);\n}\n}\n清单 8-29\n启用 Config Server (ch08\\ch08-07\\ConfigServer\\src\\main\\\
  java\\com\\acme\\ecom\\product\\EcomProductConfigApplication.java)\n```\n\n接下来，配置\
  \ Config Server 本身以指向 GIT URL。参见清单 8-30。\n\n```\nserver:\nport: 8888\nspring:\n\
  cloud:\nconfig:\nserver:\ngit:\nuri: file://D:/binil/gold/pack03/ch08/ch08-07/ConfigServer/config-repo\n\
  清单 8-30\nSpring Cloud Config Server 配置 (ch08\\ch08-07\\ConfigServer\\src\\main\\\
  resources\\bootstrap.yml)\n```\n\n这里，由于端口 8888 是 Config Server 的默认端口，即使没有显式指定 server.port，Config\
  \ Server 也会绑定到 8888。接下来，你提供 GIT URL。你需要将所有不同微服务的配置文件放置在此仓库中。\n\n接下来，你需要让你的微服务能够访问\
  \ Config Server。访问清单 8-31 中显示的 Maven 依赖。\n\n```\norg.springframework.boot\nspring-boot-starter-actuator\n\
  \norg.springframework.cloud\nspring-cloud-starter-config\n\n清单 8-31\nConfig Server\
  \ 客户端 (ch08\\ch08-07\\ProductServer\\pom.xml)\n```\n\nProduct Server 微服务将充当 Config\
  \ Server 的客户端。这是通过 spring-cloud-starter-config 启用的。你还需要注意 actuator 依赖，当 Config Server\
  \ 中的参数发生更改时，需要它来刷新配置参数。接下来，检查微服务配置文件，如清单 8-32 所示。\n\n```\nserver:\nport: 8081\n\
  spring:\napplication:\nname: productservice\ncloud:\nconfig:\nserver:\nuri: http://localhost:8888\n\
