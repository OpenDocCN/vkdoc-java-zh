  public ResponseEntity>> getAllProducts() {\nParameterizedTypeReference>\nresponseTypeRef\
  \ =\nnew ParameterizedTypeReference>() {};\nResponseEntity> responseEntity =\nrestTemplate.exchange(PRODUCT_SERVICE_URL,\
  \ HttpMethod.GET,\n(HttpEntity) null, responseTypeRef);\nPagedResources resources\
  \ = responseEntity.getBody();\nCollection products = resources.getContent();\nList\
  \ productList = new ArrayList(products);\nLink links[] =\n{linkTo(methodOn(ProductRestController.class).getAllProducts()).\n\
  withSelfRel(),linkTo(methodOn(ProductRestController.class).\ngetAllProducts()).withRel(\"\
  getAllProducts\")};\nif(products.isEmpty()){\nreturn new ResponseEntity>>(\nHttpStatus.NOT_FOUND);\n\
  }\nList> list = new ArrayList> ();\nfor(Product product:products){\nlist.add(new\
  \ Resource(product,\nlinkTo(methodOn(ProductRestController.class).\ngetProduct(product.getId())).withSelfRel()));\n\
  }\nResources> productResponse =\nnew Resources>(list, links) ;\nreturn new ResponseEntity>>(\n\
  productResponse, HttpStatus.OK);\n}\n}\n**清单 8-21**\n拆解与组装 getAllProducts 的 HAL\
  \ JSON 数据 (ch08\\ch08-05\\ProductWeb\\src\\main\\java\\com\\acme\\ecom\\product\\\
  controller\\ProductRestController.java)\n```\n\n清单 8-21 展示了如何拆解你逐个检索到的 Product 实体，进一步将它们丰富为\
