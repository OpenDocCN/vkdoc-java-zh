  ```\n\n微服务 5：04-Ecom-EventHandleCore\n同样，由于你已经学习了第 12 章中的相应示例，该微服务中没有任何新内容。因此，我将不进行详细的代码讲解。正如微服务名称所示，它包含两个主要事件处理器：OrderEventHandler\
  \ 和 ProductEventHandler，其功能和代码片段与本章前面的示例类似。但是，这里需要提一下一个小更新。\n\n正如你已经看到的，所有包含 `@EventHandler`\
  \ 注解方法的单例 Spring Bean 组件都将订阅事件处理器，以接收发布到事件总线的事件消息。事件处理器也可以在 application.properties\
  \ 中进行配置。\n\n```\naxon.eventhandling.processors.name.mode=tracking\naxon.eventhandling.processors.name.source=eventBus\n\
  ```\n\n这里的 source 属性指的是实现 SubscribableMessageSource 或 StreamableMessageSource 的\
  \ Bean 的名称，该 Bean 将用作所选处理器的事件源，默认为应用上下文中定义的事件总线或事件存储。接下来，你可以标记使用所谓的跟踪处理器来异步处理事件。该处理器将跟踪事件存储（或任何其他支持跟踪的源）中的事件。\n\
  \n要配置处理器切换到跟踪模式，你需要执行以下操作：\n\n1.  首先，覆盖处理组的名称。默认情况下，处理组（以及代表它处理事件的处理器）的名称是分配给它的事件处理器的包名。你可以通过放置\
  \ `@ProcessingGroup` 来覆盖它。\n\n2.  接下来，在 application.properties 中，将消息处理器配置为跟踪模式：\n\
  \n```\n    axon.eventhandling.processors.messages.mode=tracking.\n    ```\n\n这里，messages\
  \ 部分是处理器的名称。检查 application.properties 以查看此内容。请参见代码清单 19-9。\n\n```\naxon.eventhandling.processors[ECOM_EVENT_PROCESSOR].mode=tracking\n\
  axon.eventhandling.processors[ECOM_EVENT_PROCESSOR].source=eventBus\n代码清单 19-9\n\
  Ecom-EventHandleCore 配置 (ch19\\ch19-02\\Ax3-Commands-Multi-Event-Handler-Distributed\\\
