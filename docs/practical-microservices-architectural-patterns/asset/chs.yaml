  \ Postman 并触发一个新的报价：\n\n```\nhttp://localhost:8080/api/quotes\n方法: POST; 请求体: 原始\
  \ JSON\n{ \"symbol\" : \"QCOM\", \"sellerId\" : 11, \"buyerId\" : 21, \"amount\"\
  \ : 800, \"test\" : 8, \"delay\" : 90}\n```\n\n您应该注意，您在测试请求负载中附带了一个 90 秒的延迟，如图 13-36\
  \ 所示。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig36_HTML.jpg](img/477630_1_En_13_Fig36_HTML.jpg)\n\
  \n**图 13-36**\n测试用例 8 控制台，创建第一个报价\n\n持续观察上游微服务控制台（命令屏幕）。当报价处理器任务超时时，它将获取这个新报价，将状态从“新建”更改为“已确认”，但在完成端到端事务之前，它将休眠您提供的\
  \ 90 秒延迟；如图 13-37 所示。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig37_HTML.jpg](img/477630_1_En_13_Fig37_HTML.jpg)\n\
  \n**图 13-37**\n测试用例 8 控制台，显示延迟\n\n这 90 秒很重要，因为报价处理器任务的下一次超时将在接下来的 60 秒内发生，并且在该超时期间，它不应获取此报价，因为它已处于处理状态（报价状态不是“新建”）。\n\
  \n诀窍来了。在报价处理器任务获取报价进行处理并进入您提供的 90 秒延迟休眠后（10 到 20 秒内），您需要触发另一个新报价（理想情况下，您有另一个 Postman\
  \ 会话并已准备好数据），如下所示：\n\n```\nhttp://localhost:8080/api/quotes\n方法: POST; 请求体: 原始 JSON\n\
  { \"symbol\" : \"GILD\", \"sellerId\" : 11, \"buyerId\" : 21, \"amount\" : 900,\
  \ \"test\" : 8, \"delay\" : 2 }\n```\n\n这第二个新报价如图 13-38 所示。仅此而已，您这边的测试执行步骤就结束了。\n\
  \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig38_HTML.jpg](img/477630_1_En_13_Fig38_HTML.jpg)\n\
  \n**图 13-38**\n测试用例 8 控制台，创建第二个报价\n\n当报价处理器任务下次超时时，它将仅获取这第二个新报价。这是因为，即使第一个报价仍在上游系统中处理，该报价的状态已更新为“已确认”，如图\
  \ 13-38 所示。这通过将拍卖服务的事务标记为 TX_REQUIRES_NEW 来体现，如图 13-35 所示（另一个用于演示目的的技巧）。\n\n对于第二个新报价，处理延迟可以忽略不计，它完成上游处理后，通过\
  \ ActiveMQ，到达下游系统进行进一步处理。您期望第一个报价仍在上游系统的处理阶段。这样，消息在下游系统中就乱序了。这将如图 13-39 所示进行结算。\n\
  \n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig39_HTML.jpg](img/477630_1_En_13_Fig39_HTML.jpg)\n\
  \n**图 13-39**\n测试用例 8 控制台，第二个报价先结算\n\n持续观察浏览器控制台。很快，您将看到下游系统中用户的运行余额发生变化。这是第一个报价的效果，其上游处理被延迟，因此它乱序到达下游系统并最终完成结算，如图\
  \ 13-40 所示。\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig40_HTML.jpg](img/477630_1_En_13_Fig40_HTML.jpg)\n\
  \n**图 13-40**\n测试用例 8 控制台，第一个报价第二个结算\n\n\n\n在之前的“构建并测试示例的快乐路径”一节中，你了解到，每当用户账户更新时，上游系统中最新的报价创建时间会作为最后报价时间被更新。按照这个逻辑，图\
  \ 13-40 中的报价 ID 9 是最新创建的报价，因此该报价的创建时间戳应该是该用户的最后报价时间。然而，由于报价 ID 8 和报价 ID 9 是无序到达下游系统的，这条数据属性规则就出错了！\n\
  \n总结\n事务是任何企业级应用动态运行的基石。本地事务是好的；然而，跨分区域的分布式事务则并非善类。当你从基于单体架构转向基于微服务的架构时，你仍然需要事务；但是，对于跨分区的域，你最好使用\
  \ BASE 事务来代替 ACID 事务，并在分区或域内保持 ACID 或 XA 兼容的事务。在本章中，你看到了分布式企业系统中可能出现的许多错误场景，并且你也看到了如果使用\
  \ ACID 事务，这些错误场景本可以如何避免。当你从单体架构转向微服务架构时，上述错误场景并不会减少；相反，由于微服务架构的分布程度成倍增加，此类错误场景的数量会大幅增加。在下一章中，你将看到在架构分布式系统时可以用来防范此类错误场景的技术，所以请继续愉快地阅读吧！\n\
  \n脚注\n\n14. 事务与微服务\n\n第 13 章广泛地涵盖了分布式事务。你现在已经清楚地理解了分布式事务，以便能明智地使用它们。需要明确的是，在微服务世界中，你应尽可能避免跨分区和跨域使用分布式事务。我并不是说在微服务架构中应该完全弃用分布式事务，因为有些领域你需要通过牺牲松耦合来换取可靠性，从而使用它们；然而，其精髓在于，当涉及跨分区和跨域时，你可以在不实际使用分布式事务的情况下完成大部分设计。你将在本章中详细了解如何做到这一点^(³³)。本章中的示例是第\
  \ 13 章示例的延续，因此你可能需要在尝试运行本章示例之前先阅读并理解第 13 章。\n\n你将在本章中探讨以下几个方面：\n\n*   跨微服务分布数据的影响\n\
  *   区分全局事务和本地事务\n*   增强第 13 章的示例，使其具有容错能力\n*   探索可在实际微服务工作中使用的进一步设计重构\n\n分区与微服务\n\
  最大化一致性的最佳方法是避免分区。没有分区意味着你有一个单一的软件进程处理所有处理工作。时间已经证明，软件进程存在局限性，并且垂直扩展在达到一定限度后无法线性增加，更不用说指数级增加了；这一点在第\
  \ 11 章的“扩展立方体”一节中讨论过。正是在这种背景下，人们使用水平扩展方法来提高可扩展性。一旦你将处理逻辑拆分到多个软件进程中，你就引入了分区的可能性，并且分区越多，你能实现的一致性就越低。微服务也不例外。当你将单体应用拆分为基于微服务的架构时，你增加了节点或软件进程的数量，你的处理逻辑被拆分到这些节点或进程上，并且这些处理逻辑的协调必须通过网络来完成。\n\
  \n网络或进程边界带来了所有相关的复杂性和不确定性，你再也无法确定端到端的软件处理将如何以及何时完成。正是在这种背景下，你一直在利用两阶段提交协议来减少不确定性。\n\
  \n作为两阶段提交协议的一部分执行请求的软件进程需要能够相互通信，以便在事务提交时协调它们的操作。在两阶段提交协议的第一阶段，协调器（通常是发起事务的进程）会询问所有参与者是否准备好提交；在第二阶段，协调器指示它们提交（或中止）事务。如果某个参与者资源管理器能够提交其负责的那部分事务，那么一旦它已将所做的更改（对资源）及其状态记录到永久存储中，它就会同意，因此也就准备好提交了。因此，两阶段提交协议包括一个投票阶段和一个完成阶段。所有这些额外的步骤都增加了主要的处理指令，因此两阶段提交协议相对昂贵，因为它们完成所需的时间比本地事务更长。\n\
  \n即使是两阶段提交协议也并非完全没有错误。在某些情况下，在两阶段提交协议即将结束时，在所有参与者都同意提交之后，某些资源可能出现故障，导致提交无法完成。然而，该协议在设计上可以容忍此类故障（服务器崩溃、网络故障或消息丢失），并且保证最终能够完成，无论是否需要人工干预，尽管无法指定完成的时间限制。\n\
  \n微服务与分布式数据\n\n典型的单体应用将所有或大部分数据集中存放在单个数据库中，这为应用在一致性方面提供了简单性和许多控制选项。例如，查看第 13 章中引入的两个数据表，如下面的图\
  \ 14-1 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig1_HTML.jpg](img/477630_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1\n用户余额表\n\n图 14-1 展示了`User Balance`表，它是用户运行余额的聚合视图。图 14-2 展示了`Quotes`表，它维护着交易历史记录。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig2_HTML.jpg](img/477630_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2\n报价表\n\n\n\n你知道，当创建新报价时，其状态为“新建”。当报价被处理并结算后，其状态会更新为“已确认”，同时报价的价值会累加到`User\
  \ Balance`表中买方和卖方的运行余额中。这两个操作必须是原子性的，如果系统是单体架构，你可以在本地事务范围内实现操作的原子性。参见清单 14-1。\n\n\
  ```\n开始本地事务\n更新报价状态\n增加或减少用户余额\n结束本地事务\n清单 14-1\n单体应用中的事务\n```\n\n当你按照微服务设计原则将处理过程拆分为多个微服务时，每个微服务将管理自己的数据。这意味着，报价处理微服务将拥有并管理`Quotes`表，而报价结算微服务将拥有并管理`User\
  \ Balance`表。如果使用两阶段提交的全局事务，操作将如清单 14-2 所示。\n\n```\n开始全局事务\n更新报价状态\n增加或减少用户余额\n结束全局事务\n\
  清单 14-2\n微服务中的全局事务\n```\n\n如果你不对清单 14-2 中描述的操作使用两阶段提交事务，那么这两个操作将必须由两个微服务分别完成，这意味着这两个操作之间的原子性必须放宽。参见清单\
  \ 14-3。\n\n```\n开始本地事务\n更新报价状态\n结束本地事务\n开始本地事务\n增加或减少用户余额\n结束本地事务\n清单 14-3\n微服务中的本地事务\n\
  ```\n\n存在一种可能性：当报价状态从“新建”更改为“已确认”后，紧接着发生错误，导致`User Balance`表中对买方和卖方的报价价值增减操作未能执行，从而错过了报价结算！参见清单\
  \ 14-4。\n\n```\n开始本地事务\n更新报价状态\n结束本地事务\n开始本地事务\n增加或减少用户余额\n结束本地事务 !错误\n清单 14-4\n\
  微服务本地事务错误场景\n```\n\n这种状态是否可被应用程序接受，取决于上述`User Balance`表中的操作被遗漏所产生的影响。即使`User Balance`表中的数据更新被遗漏，相同的信息已经在`Quotes`表中以不同形式进行了追踪。在这个例子中，`User\
  \ Balance`表中的数据应被视为一种汇总视图，它是对每个用户聚合总额的一种缓存。它的存在是为了更快地查询系统中每个用户的交易余额。如果应用程序认为这些用户余额仅仅是估算值，其正确值始终可以通过`Quotes`表中的数据进行验证，那么前面描述的错误——遗漏了在`User\
  \ Balance`表中对买方和卖方增加报价价值——是可以接受的。在这种情况下，`User Balance`表中的数据并不要求 100%准确。\n第 13 章中的“测试消息丢失场景”部分模拟了类似的错误场景：报价状态从“新建”更改为“已确认”成功，但由于上游微服务发送给下游微服务的消息未能成功送达，导致下游结算被遗漏。该章引入了消息中间件作为两个微服务之间的桥梁，使微服务之间实现松耦合。然而，当你这样解耦微服务时，又引入了另一个难题：管理一个微服务与消息中间件之间的一致性。当你的应用程序中有许多微服务时，这类场景很常见。你将在后面的“全局资源与本地资源”部分探讨消息中间件所涉及的复杂性；不过，我们暂时先搁置队列的问题。\n\
  \n幂等操作与微服务\n处理清单 14-4 中错误场景的一个简单方法是反转事务的顺序。参见清单 14-5。\n\n注意\n这种事务顺序的反转在此特定场景下有效；对于你的情况，可能需要采用不同的方法。\n\
  \n```\n开始本地事务\n增加或减少用户余额\n结束本地事务\n开始本地事务\n更新报价状态\n结束本地事务\n清单 14-5\n反转后的微服务本地事务场景\n\
  ```\n\n通过如上所述反转事务的顺序，你可以确保只有在用户余额更新成功时，才尝试更改报价状态。通过这种方式，你可以确信：如果报价处理通过将报价状态从“新建”更改为“已确认”而完成，那么报价肯定已经通过在`User\
  \ Balance`表中进行相应更改而完成了结算。\n\n这时出现了一个新场景。如果在报价已在`User Balance`表中结算后，报价处理失败怎么办？此时用户余额已更新，但报价仍保持“新建”状态，如清单\
  \ 14-6 所示。\n\n```\n开始本地事务\n增加或减少用户余额\n结束本地事务\n开始本地事务\n更新报价状态\n结束本地事务 !错误\n清单 14-6\n\
  反转后的微服务本地事务错误场景\n```\n\n\n\n如果是这样，当报价处理器任务（一个定时调度器）下次超时时，由于报价状态仍为“New”，它将再次尝试处理同一报价。这会导致用户余额中出现重复交易。第\
  \ 13 章中的“测试重复消息发送场景”和“测试重复消息消费场景”小节模拟了此类错误场景。在第一种情况下，报价状态从“New”更改为“Confirmed”在第一次处理时未成功，因此向下游结算微服务发送了重复消息。在第二种情况下，模拟了重复消息消费场景，导致用户余额中出现重复交易。\n\
  \n只要交易是幂等的，重复交易的影响就可以被消除。幂等操作是指可以重复应用而不会产生任何副作用的操作。加法和减法不是幂等的，这从其操作本身的特性即可看出。在单线程环境中，仅设置值的更新操作是幂等的；然而，在存在并发的多线程环境中，即使是此类更新操作也不是幂等的。这是因为作为此类更新操作前提条件的上下文可能已被另一个并发线程更改。或者，此类更新的应用顺序可能与期望的顺序不符。你需要有处理这些情况的机制，本章后面的增强示例部分将对此进行探讨。总的来说，幂等消费者的实现可能很棘手，如参考文献^(³⁴)所示。\n\
  \n全局资源与本地资源\n第 13 章讨论了 ACID 事务，图[13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)展示了一个包含两个独立资源的典型场景：一个数据库资源和一个消息中间件资源。消息中间件资源的队列是存储移动中实体状态（临时存储在节点或进程中）的一等公民。当你将单体报价应用拆分为两个微服务（报价处理微服务和报价结算微服务）时，它们之间需要一种通信机制。如果你倾向于为此通信采用响应式或基于事件的方法，而不是同步风格的\
  \ REST 调用，那么消息中间件资源是不错的选择，这正是图[13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)所展示的。然而，该图描绘了一个完全分布式的架构，其中所有资源管理器甚至事务管理器都全局分布在网络中，因此，如果你必须应用\
  \ ACID 风格的两阶段提交操作，则需要完整的全局事务。\n\n如果队列需要具备容错能力，则它们必须是持久化的。一个队列要实现持久化，需要有合适的持久化机制作为支撑，通常由数据库本身提供。因此，如果我们重新绘制图[13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)来表示参与全局事务的持久化队列，它将如图\
  \ 14-3 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig3_HTML.jpg](img/477630_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3\n使用分布式资源的分布式 ACID 事务\n\n图 14-3 保留了图[13-2](https://doi.org/10.1007/978-1-4842-4501-9_13Fig#2)中的资源管理器\
  \ 1 和资源管理器 2，但它为 JMS 资源（资源管理器 2）展示了一个由资源管理器 3 表示的后备存储。然后，你可以将微服务架构表示为类似于图 14-4 所示。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig4_HTML.jpg](img/477630_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4\n报价微服务架构\n\n同样典型的是，中间件供应商会同时提供数据库解决方案和消息中间件解决方案。如果是这样，你可以对图 14-3 所示的架构进行一项优化，如图\
  \ 14-5 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig5_HTML.jpg](img/477630_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n部分优化的分布式 ACID 事务\n\n许多主要的中间件厂商（包括但不限于微软、IBM 和 Oracle）都在同一技术栈内提供解决方案。然而，仍然存在一些问题。只有将微服务中的操作和消息队列纳入单个事务中，才能解决前面小节讨论的问题。如果这样做，由于队列的后备持久化数据库和微服务使用的数据库是不同的资源，因此需要全局两阶段事务。\n\
  \n你将进一步优化图 14-5 中的架构以解决上述问题；见图 14-6。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig6_HTML.jpg](img/477630_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6\n优化为本地事务的分布式事务\n\n该技术是确保后备持久化与数据库位于同一资源上，如图 14-6 所示。请注意，图 14-6 中事务的标签已从\
  \ XA-JTA 更改为 TX-Local。此外，当避免了分区时，你可以最小化甚至避免在网络层面发生的通信。这一点也在图 14-6 中展示。与图 14-3 或图\
  \ 14-5 相比，事务管理器、资源管理器和后备资源都位于同一分区或节点中。如果它们都来自同一供应商，那么就有通过紧密集成选项进行优化的可能性，例如绕过已发布的\
  \ API，通过已发布甚至未发布的 SPI（服务提供者接口）进行优化调用。\n\n现在，让我们看看在这种资源共享设置下可能实现的微服务架构。图 14-7 中显示的架构选项无疑是对图\
  \ 14-4 的改进；然而，仔细观察会发现，你并没有完全避免使用全局两阶段事务的需求。你的队列资源可以与任一微服务的应用事务数据库资源共享，但不能同时与两者共享。因此，对于另一个微服务和该队列，仍然存在两阶段提交事务的问题。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig7_HTML.jpg](img/477630_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7\n微服务架构选项\n\n\n\n这里需要根据所涉及的业务进行架构权衡。或许选项 1 更优，因为你希望将任意数量的新报价限流后交给报价处理微服务处理。通过在同一个事务中，将报价状态从“新建”改为“已确认”来持久化消息，同时更新新报价，便已安全捕获了更新外部微服务中`User\
  \ Balance`表所需的信息。该事务仅在一个数据库实例上执行，因此通过将事务限制在本地，可以实现最大吞吐量。如果你假设有用户与报价处理微服务交互，一旦事务完成，需要向其设备或浏览器返回响应，那么这种设计也是可取的（尽管第\
  \ 13 章的示例中没有用户等待，而是使用定时任务来处理报价）。\n\n如果你为架构选择了选项 1，那么当你从队列中取出消息交由报价结算微服务进行结算时，仍然会遇到两阶段事务问题。如果你将报价结算视为纯粹的后台流程，那么在此处继续使用两阶段提交事务的一个理由是：你最大化面向客户微服务的吞吐量和可用性，同时以牺牲后台微服务的相对较低响应性为代价。类似的情况也适用于处理“昂贵”或“高后果”事务的场景，例如金融领域，你仍然希望继续使用两阶段提交事务，因为其收益大于成本。\n\
  \n同样，如图 14-7 所示，在选项 2 中，设计被重构了。然而，这仅仅表明你并未完全避免对两阶段提交事务的需求；相反，它将这种需求从下游转移到了上游！\n\n\
  分布式事务示例：向更少 ACID 重构\n\n在“幂等操作与微服务”部分，你看到了企业系统中因部分失败而导致的问题。当你放宽 ACID 约束时，需要有机制来处理以下场景，包括但不限于：\n\
  \n*   部分失败\n*   消息丢失\n*   重复消息\n*   重试尝试\n*   消息重新投递\n*   消息乱序接收\n\n如你所知，上述所有场景在第\
  \ 13 章中都已涵盖。最终目标是根据所涉及用例的性质和上下文，在分布式事务和本地事务之间做出选择。但图 14-7 说明，如果你的应用程序是单体应用，你可以仅使用本地事务。一旦你将单体应用拆分为微服务，就会在架构中引入分区，此时就需要进行权衡。图\
  \ 14-7 中的选项 1 是首选方案，它避免在需要高响应性的微服务（例如与人类用户交互的微服务）中使用分布式事务，而在其他微服务中保留某种形式的分布式事务，这些微服务是你证明需要使用分布式事务的微服务架构部分，因为它们需要相对较低的响应性，即你的后台微服务。\n\
  \n到目前为止，一切顺利。但如果分布式事务或两阶段事务在你的微服务中根本不可接受呢？这个问题能否解决？让我们重新审视第 13 章中的一个示例。\n\n走向宽松的\
  \ BASE：为处理重复和乱序消息而重新设计\n\n这里的目标不是立即弃用分布式事务。相反，你将放宽第 13 章中的设计，模拟故障场景，并看看你是否能够克服第\
  \ 13 章中看到的缺点。一旦你理解了这种增强设计，你将更好地掌握设计更具弹性和容错性的分布式系统的基础知识。一旦你掌握了这些基础知识，设计容错微服务就只是一个架构创意的问题了。\n\
  \n我在此引入的主要设计变更是在下游系统中创建一个名为`QuotesTX`的新表，如图 14-8 所示。\n\n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig8_HTML.jpg](img/477630_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n报价事务表\n\n你需要一种方法来跟踪通过消息中间件接收的哪些报价已结算，哪些仍未处理。对`QuotesTX`表的事务已由系统中一个名为 StockTransaction\
  \ 的新实体处理，并且对该实体的所有操作都由一个新的事务性组件服务 QuotesTransactionService 负责。增强后的架构如图 14-9 所示。\n\
  \n![../images/477630_1_En_14_Chapter/477630_1_En_14_Fig9_HTML.jpg](img/477630_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9\n宽松 XA 事务示例的架构\n\n解释示例中新构建块的宽松设计业务流如下：\n\n1.  股票交易的新报价可以推送到 Broker Web\
  \ 微服务。新报价将被插入到 MySQL 数据库中的`Quotes`表中，状态为“新建”。\n\n2.  Quotes Processor Task 是一个 Quartz\
  \ 定时任务，它会轮询 MySQL 数据库中的`Quotes`表，查找状态为“新建”的报价。\n\n3.  当找到状态为“NEW”的报价时，它会调用 broker\
  \ 服务的`processNewQuote`方法，该方法始终在一个事务中执行，并传递`Quotes`表中新报价的唯一标识符。\n\n4.  broker 服务使用另外两个事务性服务：auction\
  \ 服务和 stock order 服务。这两个服务的执行必须是原子性的。\n\n5.  auction 服务通过在一个事务中将报价状态更改为“已确认”来确认收到的报价。\n\
  \n6.  stock order 服务根据新报价中包含的信息创建一条 JMS 消息，并将其发送到 ActiveMQ 队列以进行报价结算，同样在一个事务中完成。\n\
  \n7.  settlement listener 服务监听 ActiveMQ 队列，查找任何新的已确认报价。所有到达 ActiveMQ 队列的已确认报价都会在事务中被\
  \ settlement listener 服务的 onMessage 方法拾取。\n\n8.  settlement listener 服务调用 quotes\
  \ transaction 服务，以记录系统收到的所有报价。为了确保无论封闭父事务中的对等事务如何处理，该记录操作都能发生，此记录操作的事务语义为 REQUIRES_NEW。此记录操作在发现重复条目时不会引发任何错误。\n\
  \n9.  quotes transaction 服务尝试安全地记录下游微服务通过消息桥接收到的所有报价事务。\n\n10. settlement listener\
  \ 服务使用另外两个事务性服务：quotes reconcile 服务和 quotes transaction 服务（再次使用），这两个服务的执行必须是原子性的。\n\
  \n\n\n11. 报价对账服务需要在一笔交易中，将所交易股票的价值对账到卖方和买方各自的用户账户中。\n\n12. 同时，报价交易服务通过将`QuotesTX`表中报价交易条目的状态从“新建”更改为“已结算”，来将其标记为已结算。\n\
  \n13. Broker Web 微服务和 Settlement Web 微服务只是提供仪表盘视图的工具，用于查看`Quotes`表、`User`表和`QuotesTX`表中的运营数据，以便为您提供实时视图。\n\
  \n关于新设计，还需要进行一些讨论。在新设计中，`StockTransaction`实体仅仅是微服务接收到的消息副本。在消息传递和分布式系统中，最佳实践是记录进出（子）系统的内容，以便日后需要追踪交易过程中发生的事件时，能够将实体状态与时间相关的操作关联起来。这样做的一个缺点是，由于数据重复，会占用更多的存储空间。然而，你需要回顾微服务的另一个基本原则：一个微服务应拥有其提供服务所需的一切，而无需任何外部依赖。这样一来，在某些场景下，就必须在微服务中复制所需数据并进行缓存。这也是第\
  \ 12 章介绍的 CQRS 架构带来的影响之一：当一个微服务拥有某个实体的“写”治理权时，可能还有许多其他微服务对“读”模型感兴趣，此时也需要将读取的数据复制并附加到这些感兴趣的微服务上，以便它们能够独立运行，无需外部依赖。\n\
  \n另一个方面是，`StockTX`表也是下游微服务识别通过消息中间件传入的重复消息的一种机制。这是通过使用事务 ID 模式实现的。在这里，`StockTX`表还会记录发送方微服务随消息负载一起发送的事务\
  \ ID。发送方和接收方微服务必须就一个通用模式达成一致，即这些事务 ID 是唯一的，任何两条不同的消息都不会拥有相同的事务 ID。如果是这样，接收方微服务就可以将此事务\
  \ ID 与消息一起记录。这样一来，每当接收方微服务收到一条消息时，它就可以检查是否为重复消息，如果是，则可以静默忽略。\n\n微服务的边界级操作应与内部处理隔离，并采用更具容错性的设计模式。这是因为微服务边界依赖于系统资源，如网络、I/O\
  \ 等，这些资源更容易出错。因此，当下游微服务从消息网络接收到消息时，你的目标应该是使“记录新消息”的操作独立于后续的内部微服务处理，因为内部微服务处理仅由该微服务自身控制（不涉及前述的外部资源），并且在出错时可以重试。在新设计中，通过将新消息记录操作的事务语义设置为`REQUIRES_NEW`来实现这一点，这样无论同级事务或父事务的结果如何，该操作都会成功。\n\
  \n**编写弹性示例场景**\n\n用于演示具有增强弹性以应对宽松 BASE 异常的分布式事务示例的完整代码位于文件夹`ch14\\ch14-01`中。\n\n\
  上游微服务的代码与你在第 13 章中看到的相比没有重大变化，因此此处不再重复代码。我在下游微服务中引入了新代码并对现有代码进行了更新，因此我将在此处全部进行说明。主要变化在报价结算下游微服务中。\n\
  \n**微服务 3：报价结算 (Settlement-ActiveMQ-Derby)**\n\n当一条新的报价消息到达 ActiveMQ 队列时，结算监听器会立即将其拾取。结算监听器的代码与你在第\
  \ 13 章中看到的有所不同，请查看代码清单 14-7。\n\n```java\npublic class SettlementListener implements\
  \ MessageListener {\n@Autowired\n@Qualifier(\"quotesTransactionServiceRequired_TX\"\
  )\nQuotesTransactionService quotesTransactionServiceRequired_TX;\n@Autowired\n@Qualifier(\"\
  quotesTransactionServiceRequiresNew_TX\")\nQuotesTransactionService quotesTransactionServiceRequiresNew_TX;\n\
  @Autowired\n@Qualifier(\"quotesReconcileServiceRequired_TX\")\nQuotesReconcileService\
  \ quotesReconcileServiceRequired_TX;\n@Autowired\n@Qualifier(\"quotesReconcileServiceRequiresNew_TX\"\
  )\nQuotesReconcileService quotesReconcileServiceRequiresNew_TX;\npublic void onMessage(Message\
  \ message) {\nQuoteDTO quoteDTO = null;\ntry {\nquoteDTO = (QuoteDTO) ((ObjectMessage)\
  \ message). getObject();\n}\ncatch (JMSException e) {\nthrow new RuntimeException(e);\n\
  }\nquotesTransactionServiceRequiresNew_TX.insertUniqueNoErrorOnDuplicate(\nquoteDTO);\n\
  try {\nreconcile(quoteDTO);\n}\ncatch (QuotesBaseException e) {\nthrow new RuntimeException(e);\n\
  }\n}\n}\n```\n代码清单 14-7 结算监听器编排器 (ch14\\ch14-01\\XA-TX-Resilient\\Settlement-ActiveMQ-Derby\\\
  src\\main\\java\\com\\acme\\ecom\\messaging\\SettlementListener.java)\n\n如代码清单 14-7\
  \ 所示，在消费消息后，结算监听器会立即尝试记录由持久化资源支持的传入报价消息。为了使此记录操作不受封闭父事务内同级事务中任何其他处理结果（成功或失败）的影响，此记录操作的事务语义设置为`REQUIRES_NEW`。此记录操作在发现重复条目时不会引发任何错误。接下来，监听器会检查是否已经结算了与收到的报价类似的报价。这种情况发生在重复消息的情况下。请参见代码清单\
  \ 14-8。\n\n\n\n```\npublic class SettlementListener implements MessageListener {\n\
  private void reconcile(QuoteDTO quoteDTO)throws QuotesBaseException{\nUser seller\
  \ = null;\nUser buyer = null;\nStockTransaction stockTransaction = null;\nInteger\
  \ testCase = quoteDTO.getTest();\nif(!quotesTransactionServiceRequired_TX.isNotSettled(\n\
  quoteDTO.getId())){\nLOGGER.debug(\"Quote will not be attempted to be settled again\"\
  );\nreturn;\n}\nif(testCase.equals(1) || testCase.equals(2) ||\ntestCase.equals(4)\
  \ || testCase.equals(8)){\ntry{\nquotesReconcileServiceRequired_TX.reconcile(quoteDTO);\n\
  quotesTransactionServiceRequired_TX.markSettled(\nquoteDTO.getId());\n}\ncatch(QuotesBaseException\
  \ quotesBaseException){\nLOGGER.error(quotesBaseException.getMessage());\n}\n}\n\
  else if(testCase.equals(5)){\ntry{\nquotesReconcileServiceRequiresNew_TX.reconcile(quoteDTO);\n\
  quotesTransactionServiceRequiresNew_TX.markSettled(\nquoteDTO.getId());\n}\ncatch(QuotesBaseException\
  \ quotesBaseException){\nLOGGER.error(quotesBaseException.getMessage());\n}\nflipFlop();\n\
  }\nelse if(testCase.equals(6)){\ntry{\nquotesReconcileServiceRequiresNew_TX.reconcile(quoteDTO);\n\
  quotesTransactionServiceRequired_TX.markSettled(\nquoteDTO.getId());\n}\ncatch(QuotesBaseException\
  \ quotesBaseException){\nLOGGER.error(quotesBaseException.getMessage());\n}\n}\n\
  else if(testCase.equals(7)){\ntry{\nquotesReconcileServiceRequired_TX.reconcile(quoteDTO);\n\
  quotesTransactionServiceRequired_TX.markSettled(\nquoteDTO.getId());\n}\ncatch(QuotesBaseException\
  \ quotesBaseException){\nLOGGER.error(quotesBaseException.getMessage());\n}\nflipFlop();\n\
  }\nelse{\nLOGGER.debug(\"Undefined Test Case\");\n}\n}\n}\n清单 14-8\n结算监听器对账 (ch14\\\
  ch14-01\\XA-TX-Resilient\\Settlement-ActiveMQ-Derby\\src\\main\\java\\com\\acme\\\
  ecom\\messaging\\SettlementListener.java)\n```\n\n如果该报价不是重复的，将尝试进行对账，如清单 14-8 所示。作为最后一步，监听器会将\
  \ `StockTX` 表中的股票交易标记为“已结算”，这样，如果后续有相同报价的重复消息到达，监听器就不会再次结算该报价。清单 14-9 展示了该股票交易。\n\
