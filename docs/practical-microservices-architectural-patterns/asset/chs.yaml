  \n图 13-13\n测试用例 1 控制台\n\n你还应注意图 13-13 中的另一个方面，这将在后面的“测试消息乱序接收场景”部分的测试用例 8 中相关。每当相应用户账户更新时，上游系统中最新的报价创建时间会更新为用户的最后报价时间。\n\
