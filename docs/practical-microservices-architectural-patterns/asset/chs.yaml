  \ CA certificate ca.pem is self signed.\n2019-01-22T13:34:21.605828Z 0 [System]\
  \ [MY-010931] [Server] D:\\Applns\\MySQL\\mysql-8.0.14-winx64\\bin\\mysqld.exe:\
  \ ready for connections. Version: '8.0.14'  socket: “  port: 3306  MySQL Community\
  \ Server - GPL.\n2019-01-22T13:34:21.870413Z 0 [System] [MY-011323] [Server] X Plugin\
  \ ready for connections. Bind-address: '::' port: 33060\n```\n\n服务器会持续将后续生成的诊断输出写入控制台。你可以打开一个新的控制台窗口，在其中运行客户端程序。\n\
