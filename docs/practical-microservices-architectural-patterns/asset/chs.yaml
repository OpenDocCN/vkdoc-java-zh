  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig2_HTML.jpg](img/477630_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2.\n\n数字应用上下文\n\n## 微服务的背景\n\n微服务并非一种革命性的新趋势；相反，它是软件计算领域近期趋势背景下的一种演进。甚至在有人首次使用“微服务”这个术语之前，你们中的许多人可能已经在自己的企业中遵循了类似的方法。组件化、面向服务以及\
  \ SaaS（软件即服务）都是与微服务具有相似原则的趋势。这些趋势（组件和服务）的微型化与公共云和自动扩展等近期趋势相关联，因此让我们简要探讨一下这一背景，以便更好地理解微服务。\n\
  \n### 服务的粒度\n\n你可以根据服务设计和构建的粒度，将其分为不同的类别。尽管“微服务”一词暗示了“小”，但它相对于其他服务而言的“小”程度通常是相对的。换句话说，大小只是一个指示性特征；下面列出的更明确的特征决定了粒度：\n\
  \n*   敏捷性\n*   可部署性\n*   选择性可扩展性\n*   独立性\n\n为了帮助你理解，你可以将上述所有特征归入一个统称之下，即“云原生性”。见图\
  \ 4-3。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig3_HTML.jpg](img/477630_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3.\n\n服务的粒度\n\n如图 4-3 所示，当粒度减小时，云原生性所需的大多数质量特性都会增加。\n\n如果你重新审视单体应用，通过遵循 SOA\
  \ 的最佳实践，你可以暴露粗粒度或组合服务。这类服务暴露了业务领域的单个能力。通过暴露 SOA 接口，它们支持灵活的企业应用集成，或者我们称之为面向服务的集成。这些服务被归类为“迷你服务”，并且它们通过服务组合促进了服务复用。迷你服务可以被其他迷你服务或客户端层访问。\n\
  \n当我们把单体应用拆分为基于微服务的架构时，服务的范围被限制在一个功能特性上。多个这样的功能特性共同构成一个能力，该能力可以暴露给客户端层。可以配置一个服务网关来暴露迷你服务，而迷你服务又会将调用委托给微服务。\n\
  \n让我们借助一些指示性示例，在不同的分类下审视服务粒度的细微差别。\n\n图 4-4 仅展示了指示性示例。宏服务使用传统的 SOA 设计模式和技术实现，而迷你服务则聚合了与特定领域（即实体或资源）相关的功能。与微服务相比，迷你服务的范围更广，架构约束更宽松，并且可能使用也可能不使用独立的数据。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig4_HTML.jpg](img/477630_1_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4.\n\n服务粒度的指示性示例\n\n再次强调，图 4-4 中标注的粒度单位（功能 > 特性 > 领域 > 能力 > 应用）在上述粒度尺度上并非固定不变。你希望将应用架构定位在何处，很大程度上取决于许多因素，例如应用类型和所需的云原生程度。将应用架构稍微向左或向右移动并非关键；相反，你确定架构位置背后的理由是基于约束条件以及随之而来的权衡取舍。如果你没有经验丰富的内部团队，教条式地遵循微服务架构可能是一项高成本、具有破坏性且往往难以预测的工作。我经常看到企业创建的应用更偏向于迷你服务的边界，却称其为微服务。这并非一个重大问题。相反，需要的是清晰理解这些边界中的每一个，然后你才能做出明智的决策，而不是偶然地趋同于某个决策。\n\
  \n\n\n### 网关\n\n让我们重新审视电商微服务应用。假设网页正在显示商品详情页，它不仅仅展示商品名称、描述和价格等基本信息，还会显示其他细节，例如：\n\
  \n*   购物车中的商品数量\n*   订单历史\n*   库存不足警告\n*   配送选项\n*   各种推荐、评论和优惠\n\n所有这些信息都必须从各自不同的微服务中获取。在单体应用架构中，浏览器只需向应用发起一次\
  \ REST 调用（`GET` [`api.acme.com/productdetails/productId`](http://api.acme.com/productdetails/productId)）即可获取这些数据；而在微服务架构下，网页需要分别访问各个微服务。从浏览器直接访问多个微服务存在诸多挑战和限制。即使客户端尝试通过局域网发起如此多的请求，在互联网环境下也可能效率极低，尤其是在移动网络通信时，会面临严重的性能开销。此外，如果所有微服务都没有暴露对\
  \ Web 友好的接口（它们并非强制要求这样做），这将是另一个挑战。更进一步，应用的扩展或演进可能需要对现有微服务进行拆分或合并，而这些内部变更应当对公开的 API\
  \ 进行屏蔽。\n\nAPI 网关可以在此处发挥作用。面向外部的 API 可以是粗粒度的，能够聚合来自多个内部微服务的响应，并一次性向客户端设备提供聚合后的响应。此外，这类外部\
  \ API 还可以根据请求响应的客户端设备类型进行某种形式的转换。这些增值功能可以提供给 API 网关层，从而使其比传统的防火墙或负载均衡器更加智能。\n\n\
  ### 以领域为中心的划分\n\n传统上，我们在满足应用的非功能性需求时，一直遵循“一刀切”的方法。这在应用扩展方面尤为明显。单体应用只能对其所有功能或模块边界进行统一扩展，而微服务原则则倡导基于业务领域来定义边界。\n\
  \n如图 4-5 所示，在以技术为中心的方法中，应用的各层或各层级可以整体进行扩展。而在微服务方法中，由于每个微服务的边界是基于业务或功能领域定义的，并且这种边界定义在应用的物理组织中也显而易见，因此可以选择性地对功能或领域进行扩展。这种应对非功能性需求的选择性方法，还提供了针对每个微服务级别定义服务级别协议（如服务正常运行时间等）的灵活性。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig5_HTML.jpg](img/477630_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 以技术为中心 vs. 以领域为中心\n\n在这个电商应用场景中，虽然商品、库存、订单和购物车微服务必须全年 365 天、全天候高度可用，以确保业务不中断，但像用户、配送、发货和订单历史等辅助微服务，则可以部署为具有较低可用性\
  \ SLA 的服务。这是因为，如果用户微服务宕机，客户仍然可以浏览、添加到购物车，并通过手动输入地址、电子邮件、联系电话以及其他详细信息来确认新订单，而无需检索之前保存的用户资料。稍后，当用户微服务恢复上线时，系统总可以将这个“匿名订单”与系统中已存在的客户资料关联起来。其他模块也存在类似情况，稍后我们重新审视电商应用时，你将详细研究这些情况。\n\
  \n### 云原生转型\n\n长期以来，我们一直依赖专用基础设施来应对不断增长的业务需求，无论是采用横向扩展还是纵向扩展的理念。我们为网络连接添加冗余和更大的管道（InfiniBand），投资于工程系统（Exalogic）以增加计算能力，等等。最近的洞察和事件让企业架构师们睁开了眼睛，他们意识到这些系统存在局限性，并且迟早会受到这些局限性的制约。光纤提供的高吞吐量或内存计算提供的高性能，在图表初始阶段都能提供指数级的性能提升，但随后会达到极限，之后即使添加更多\
  \ CPU 或带宽，也只能获得微小的改进。量子计算和类似技术的进步将改变这一局面，但同样，企业无法等到这些技术变得普及且成本合理。\n\n如今，公有云已经可用，其成本具有可比性且合理，甚至可能更便宜。像亚马逊和\
  \ Azure 这样的云平台提供商在数据中心配置了商用硬件，可以根据您的需求即时配置。当您的业务面临不可预测的超高速增长或超大规模需求时，云是一种相当正确的方法，既能控制总体成本，又能提供所需的敏捷性。我无意在此介绍云计算或云服务提供商（CSP）的特性，但我确实想讨论一下云原生的含义。\n\
  \n在本地部署模型中，可用性策略和 SLA 管理由数据中心管理员掌控。当您迁移到公有云模型时，这些策略会被转换并抽象到应用栈的更高层级。在 CSP 提供的 IaaS（基础设施即服务）或\
  \ PaaS（平台即服务）模型中，您对可用性或存储策略的控制力很弱，因此需要在应用栈层提供更好的控制和工具配置。您的软件层本身应该能够为您提供应对前所未有场景的钩子和控制手段。因此，为了让应用真正受益于\
  \ CSP 的优势，应用本身应足够智能，能够从故障、资源不可用、流量突增等情况中恢复。云原生架构阐述了您在构建软件应用以在公有云环境中高效运行时需要采用的模式和最佳实践。\n\
  \n### 网络规模计算\n\n网络规模 IT 适用于任何规模的基础设施设计、部署和管理。利用网络规模 IT 的能力，企业或组织可以实现大规模扩展。在涉及网络规模\
  \ IT 时，IT 原则和实践是优先考虑的；当然，云、微服务和 DevOps 实践需要特别提及。像谷歌、亚马逊、Facebook 和 Netflix 这样的公司在此值得一提，因为仅凭其业务性质，它们的\
  \ IT 系统和实践就属于这一类别。分布式一切、容错、自愈和 API 驱动的方法只是围绕网络规模计算的几个原则。\n\n## 不可或缺的云\n\n云旨在以相对较低的成本，以自主的方式提供分布式计算、存储和网络基础设施。基于云的架构可以基于多种模型（即\
  \ IaaS、PaaS 和 SaaS），合适的配置可以为客户带来灵活的环境。在云中，客户可以使用云的 API 按需且近乎实时地分配资源。\n\n\n\n###\
  \ 云架构模型\n\n业界将云架构划分为四个层次：\n\n*   **硬件层**：硬件层包含云的物理资源，例如 CPU、磁盘和网络。\n\n*   **基础设施即服务**：IaaS\
  \ 层利用虚拟化技术抽象物理资源，从而创建一个计算资源池，并将其作为集成资源暴露给上层和最终用户。按需资源分配等功能在此层实现。\n\n*   **平台即服务**：PaaS\
  \ 层除了提供底层 IaaS 所提供的运行环境外，还提供应用程序开发工具和部署环境，旨在最大限度地减少将应用程序直接部署到虚拟机中的负担。关系型和非关系型存储、消息队列以及邮件服务器是通过封装合适的框架在此层提供的典型服务。\n\
  \n*   **软件即服务**：位于最顶层的是 SaaS 模型，它可以托管企业定制的最终用户应用程序或租用的第三方软件，以网络服务的形式提供，从而免去企业管理与维护云各架构层的烦恼。\n\
  \n图 4-6 展示了云架构的各层。通过按需自动扩展以实现更好的性能和可用性，这使得云应用程序优于部署在本地环境中的应用程序。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig6_HTML.jpg](img/477630_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6.\n\n云架构组件\n\n### 云服务模型\n\n云服务模型基于用户对资源使用方式可能拥有的控制程度。图 4-7 展示了不同的模型。\n\n\
  ![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig7_HTML.jpg](img/477630_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n\n云服务模型\n\n通常，云架构本身可以映射到云服务模型。在传统服务模型中，用户或企业自身负责管理整个技术栈（例如，硬件、数据中心设施、软件和数据），而在云服务模型中，情况则有所不同，具体如下：\n\
  \n*   **基础设施即服务**：在 IaaS 服务模型中，用户仅请求计算能力、存储、网络及其相关资源，并按使用量付费。\n\n*   **平台即服务**：在\
  \ PaaS 模型中，用户对底层基础设施（如 CPU、网络和存储）完全没有控制权，因为这些资源在平台层之下被抽象化了。相反，它提供了应用程序开发平台，允许使用支持的编程语言和相关工具创建应用程序，这些工具托管在云中，并通过接口（主要是浏览器）进行访问。很多时候，应用程序运行时和中间件也由云服务提供商提供，用户仅负责开发、安装、管理和操作软件应用程序及其数据。\n\
  \n*   **软件即服务**：这是一种“无需操心一切”的模型，用户甚至不拥有、管理或操作应用程序。应用程序在云基础设施上运行，并可从各种客户端设备访问。提供有限的用户配置。有时，同一个应用程序实例服务于多个企业（租户）的最终用户；这类应用程序被称为多租户应用程序。\n\
  \n### SaaS 成熟度模型\n\nSaaS 成熟度模型是微软在十多年前提出的^(⁴)，此后，在我与架构师的讨论中，我曾多次提及这一信息。我将在此重复说明，因为当我们后续将其映射到微服务如何针对不同级别进行扩展时，理解这一点是必不可少的。图\
  \ 4-8 描绘了 SaaS 成熟度的不同级别。此处使用术语“租户”来指代为其托管应用程序的企业；最终用户从这些托管的应用程序实例访问服务。因此，两家不同的航空公司或两家不同的电子商务企业就是两个不同的租户。SaaS\
  \ 成熟度的不同级别如下：\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig8_HTML.jpg](img/477630_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8.\n\nSaaS 成熟度模型\n\n*   **级别 1 – 临时/定制**：在此 SaaS 成熟度级别，每个企业或租户都拥有自己定制开发的应用程序。这些应用程序的源代码各不相同，并且为每个租户在本地或公有云中托管独立的应用程序实例。\n\
  \n*   **级别 2 – 可配置**：在此 SaaS 成熟度级别，只有一个代码库。该代码库可为每个租户单独配置，并且为每个租户在本地或公有云中托管独立的应用程序实例。\n\
  \n*   **级别 3 – 可配置、高效多租户**：在此 SaaS 成熟度级别，只有一个代码库。该单一代码库的单个实例在本地或公有云中托管，服务于所有租户的最终用户。在实例化应用程序时进行的代码配置，使得运行时特性（如功能、特性和外观）能够在一定程度上根据每个租户的意愿进行“适配”。通过采用合适的架构级分区，每个客户的数据与其他客户的数据保持隔离。但这里的限制是，如果租户数量或最终用户数量超过某个限制，则难以扩展。通过分区可以在一定程度上管理可扩展性，但超过一定程度后，应用程序只能通过迁移到更强大的服务器（垂直扩展）来扩展，直到收益递减使得无法以经济高效的方式增加更多性能为止。\n\
  \n*   **级别 4 – 可配置、高效多租户且可扩展**：在 SaaS 成熟度级别 4 中，在级别 3 的基础上增加了水平扩展的能力。可以水平添加多个应用服务器和数据库服务器实例，负载均衡路由器可以以轮询或平均分配的方式，将来自多个租户用户的负载分发到一组服务器实例池中。虽然使用应用服务器集群在应用服务器层进行水平扩展很简单，但在数据库层进行扩展则不那么直接，因为它需要一个数据库集群，而不仅仅是简单的服务器集群。稍后当你研究数据的“写入可扩展性”时，你将了解更多相关内容。\n\
  \n### 虚拟化\n\n虚拟化是一个提供抽象机器的过程，该抽象机器使用针对抽象机器的设备驱动程序，以提供硬件的虚拟副本。类型 1 的虚拟机监控程序^(⁵)运行在裸机上，大多数中端到高端微处理器都可以被虚拟化。像\
  \ Intel 的 Xeon 这样的服务器处理器和 Arm Cortex-A 系列这样的应用处理器都是具有相同能力的硬件。虚拟化后，虚拟机将运行任何可在裸机硬件上运行的软件，同时提供与真实硬件的隔离。见图\
  \ 4-9。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig9_HTML.jpg](img/477630_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9.\n\n基于抽象硬件的 SaaS\n\n通过虚拟化技术，可以在单个硬件上有效地运行多个应用程序的实例或同一应用程序的多个实例。\n\n\n\n\
  ### 虚拟化服务器 vs. 容器\n\n容器提供了一种隔离应用程序的方式，并为应用程序的运行提供了一个虚拟平台。容器系统需要一个底层操作系统，该操作系统利用虚拟内存支持实现隔离，为所有容器化应用程序提供基础服务。这在虚拟化部分的图\
  \ 4-10 中有所展示。虚拟机则拥有自己的操作系统，并利用硬件虚拟机支持。容器的开销相对低于虚拟机，容器系统通常针对运行成百上千个容器的环境。当需要在多台服务器上运行多个应用程序时，虚拟化可能是最佳选择；而如果需要运行单个应用程序的多个副本，容器则具有显著优势。我们来探讨一下这背后的原理。虚拟机为每个新虚拟机打包了虚拟硬件、内核（即操作系统）和用户空间。这提供了跨应用程序所需级别的隔离，如果它们是不同的应用程序，这通常是可取的，以便安全、数据和资源等关注点彼此完全隔离。\n\
  \n在 Linux 操作系统的语境下理解容器相当容易。Linux 内核有一个名为 cgroups 的功能。cgroups 限制、核算、优先处理并隔离操作系统进程的资源使用（计算、内存、磁盘\
  \ I/O、网络等），从而提供了所谓的“操作系统级虚拟化”。基于容器的虚拟化相对轻量（与传统虚拟机相比），几乎不增加开销，共享相同的操作系统内核，并且不需要特殊的硬件支持即可高效运行。所有这些都为容器定义一种新的软件应用封装模型铺平了道路，使它们能够在共享操作系统上隔离运行。不同的\
  \ Linux/Unix 发行版使用不同的机制来实现操作系统级虚拟化。例如，FreeBSD 有“jails”的概念，而 Solaris 有“zones”的概念。由于容器用于隔离内核的技术是\
  \ Linux 特有的，因此容器只能在基于 Linux 的操作系统上运行。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig10_HTML.jpg](img/477630_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10.\n\n虚拟化 vs. 容器\n\n图 4-10 展示了资源在容器系统中是如何共享的。当你在同一台主机上使用相同的镜像启动两个（或更多）容器时，基础镜像的全部内容将被共享。相反，如果你使用不同的镜像启动多个容器，这些镜像可能会也可能不会共享一些公共层（bin、lib\
  \ 等），这取决于镜像的每一层是如何构建的。\n\n因此，对于每个虚拟机，整个组件栈都在运行，从操作系统到应用服务器和虚拟硬件（包括网络组件、CPU 和内存）都被模拟出来。然而，容器作为完全隔离的沙箱运行，每个容器仅包含操作系统所需的最小内核。底层系统的系统资源被容器共享，因此占用空间减小，这意味着在相同的硬件上，可以运行的容器数量远多于虚拟机。以这种方式共享资源将减少总体占用空间，这也有助于缩短启动容器实例所需的时间，相比于在虚拟机系统中实例化相同的应用程序。这就是容器的相关性所在，尤其是在需要即时自动扩展的云原生环境中。见图\
  \ 4-11。\n\n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig11_HTML.jpg](img/477630_1_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11.\n\n容器实例共享资源\n\nDocker，现在基于 Linux libcontainer，是一个用于在 Linux 平台上创建、管理和监控容器的管理系统。Docker\
  \ 帮助在笔记本电脑上打包应用程序，然后该应用程序可以不加修改地在任何公有云、私有云甚至裸机上运行，遵循“一次构建，随处运行”的原则。与基于 VMWare 或\
  \ Hyper-V 等虚拟机监控程序的虚拟化相比，其基础设施占用空间最小。\n\nRed Hat 青睐 Ansible，这是另一个容器管理系统。Kubernetes\
  \ 是另一个用于自动化部署、扩展和管理容器化应用程序的开源系统。\n\nDocker 是最流行的容器提供系统。由于它只能运行在基于 Linux 的操作系统上，如果你必须在\
  \ Windows 或 Mac 机器上设置 Docker，你首先需要使用 VirtualBox 启动一个 Linux 虚拟机，然后在这个虚拟机内部运行 Docker\
  \ 容器。\n\n当你从传统的基于单体架构的 SaaS 迁移到基于微服务的 SaaS 时，另一个特点是，像 Oracle Weblogic 或 IBM Websphere\
  \ 这类所谓的重量级中间件将被相对轻量的运行时（如 Tomcat 或 Jetty）所取代。将这些运行时配置为在 Java 进程内嵌入运行也很常见，以便总体占用空间最小化。\n\
  \n## 微服务架构\n\n微服务架构（MSA）可以定义为一种设计软件应用程序的方式，旨在实现交付的敏捷性、部署的灵活性和扩展的精确性。它有许多相关的好处，也有一系列你必须处理的复杂性。在本节中，让我们看看其中的一些以及与之相关的更宏观的图景。\n\
  \n### 架构反转\n\n在 MSA 中，应用程序由小型、独立可部署的进程组成，这些进程使用与平台和编程语言无关的 API 和协议相互通信。每个进程托管着暴露紧密相关业务能力的应用程序组件。许多这样的进程为企业应用程序暴露了许多这样的能力。因此，在\
  \ MSA 中，单个能力、单个进程或单个微服务本身可能不足以代表任何规模可观的企业应用程序。\n\n在单体架构中，是一个单一的（主）进程托管整个应用程序包。因此，单体应用程序中以下所有或大部分关注点都包含在单个进程空间内：\n\
  \n*   服务依赖管理\n*   服务配置管理\n*   服务检测\n*   服务 SLA\n*   服务管理与监控\n\n在 MSA 中，由于有许多进程相互通信，与单体架构的情况不同，上述所有或大部分关注点并不仅限于单个进程。它们需要为所有这些协调进程处理，这意味着额外的进程复杂性。这是微服务的下一个最显著的特征，即早期单体架构中单个进程的内部关注点现在被外化到许多微服务的外部。这被称为“架构反转”（IoA）。\n\
  \n\n\n### 内部架构视角\n\n由于微服务是独立、自治且自包含的软件包，可部署到各自的进程空间中，因此它们在自身架构上必须是完整的。图 4-5 展示了微服务拥有自己的表示层、业务层和数据组件，同时也拥有自己的消息传递基础设施。因此，在关注点分离、分层和面向接口设计方面，所有或大部分架构关注点仍然存在，并且应在每个微服务的架构中加以处理；这就是微服务的“内部架构”。\n\
  \nGartner 提供了四个示例来解释微服务的内部架构：\n\n*   **简单/可扩展**\n*   **复杂/可扩展**\n*   **外部化持久化**\n\
  *   **命令查询职责分离**\n\n图 4-12 以示意图形式展示了这些示例场景。让我们通过合适的类比来介绍这些示例场景，以便清晰理解概念，并了解可用的选项及其涉及的复杂性。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig12_HTML.jpg](img/477630_1_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12.\n\n微服务内部架构示例\n\n*   **简单/可扩展**：这些微服务是无状态的，不需要持久化服务。它们用于执行计算密集型任务。图 4-12\
  \ 将税务计算、折扣计算或优惠计算作为此类微服务的示例，其计算基于传递给微服务 API 的参数进行。\n\n*   **复杂/可扩展**：在此示例中，持久化服务是微服务的一个组成部分。进行扩展时，可以实例化微服务的多个实例，并且所有这些实例都必须从同一个持久化服务获取数据。这意味着，如果任何实例修改了数据，则变更后的数据也必须传播到其他实例，而实现这一目标的最佳方式是通过发送事件。为了增强可扩展性，服务是无状态的，这样请求可以路由到任何实例，而不管来自同一客户端的上一个请求被路由到了哪个实例。\n\
  \n*   **外部化持久化**：这种中间方法确实使用了持久化服务，但它位于微服务外部。即使是成熟度较高的单体架构也会使用类似的架构。在这里，持久化的数据被限定并隔离在拥有它的微服务范围内，因此它也可以像复杂/可扩展拓扑一样进行部署。\n\
  \n*   **命令查询职责分离 (CQRS)**：该系统用于实现高吞吐量。它是复杂/可扩展或外部化持久化方案的扩展，但主要区别在于数据持久化的写入和读取部分被分离了。可以实例化无限数量的微服务实例来处理读取部分，从而实现最高程度的吞吐量。但在写入部分，状态变更必须传播到读取部分的其他实例，而实现这一目标的最佳方式同样是发送事件。\n\
  \n在后续章节介绍实际运行的电子商务应用时，我将再次回顾内部架构。为简洁起见，我将使用一种简单的表示法来区分内部架构和外部架构，如图 4-13 所示。在后续讨论中，我们将沿用这种表示法。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig13_HTML.jpg](img/477630_1_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13.\n\n微服务架构表示法\n\n### 外部架构视角\n\n我提到过，由于架构反转，许多过去在单体内部架构层面解决的问题，现在已成为外部架构的关注点。图\
  \ 4-14 试图以示意图形式展示我们在微服务外部架构层面需要处理的关注点。微服务之间相互交互，这种进程空间之间的频繁通信增加了整体复杂性。容错、优雅重试和备用代码执行等关注点只是其中的一部分，这要求在微服务的外部架构层面进行强有力的管理、监控和控制。目标是在微服务架构中实现交付的敏捷性、部署的灵活性和扩展的精确性。为此，必须处理一系列新的关注点，这使得微服务的复杂性相比单体架构成倍增加。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig14_HTML.jpg](img/477630_1_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14.\n\n微服务外部架构\n\n在单体架构中，可以通过单个控制器轻松控制安全性；而在微服务架构中，由于分布在网络中的许多服务需要相互通信以提供完整的业务能力，安全性是分散的，必须在每个微服务级别进行控制。端到端的日志记录和追踪是另一个方面，其在微服务架构中的重要性成倍增加，因为一个调用图可能跨越多个微服务。为了支持微服务实例的无缝添加和退役，需要动态服务注册和发现。同样，自动扩展和自动部署是新的\
  \ DevOps 关注点，旨在使微服务实现云原生和网络规模。\n\n### MASA 全景图\n\n在讨论了微服务的内部架构和外部架构关注点之间的区别之后，现在是时候看看全景图了。\n\
  \n图 4-15 结合了微服务的内部架构和外部架构，提供了典型网格应用和服务架构的视图。微服务利用外部架构提供的功能与其环境及其他微服务进行交互，而每个微服务选择性扩展的能力则是通过其内部架构组织来构建和管理的。\n\
  \n![../images/477630_1_En_4_Chapter/477630_1_En_4_Fig15_HTML.jpg](img/477630_1_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15.\n\n微服务外部架构\n\n图 4-15 只展示了少数几个微服务。对于任何规模可观的企业应用而言，情况并非如此。微服务的数量可能从十几个起步，达到数百个之多。与“微服务”这个名称给人的印象不同，微服务并不简单。它们比传统的单体架构复杂得多，实际上包含了单体架构的所有复杂性。因此，采用微服务的决策需要谨慎做出。如果企业的开发团队没有经验丰富的指导者，微服务就不是一个可选方案。当你阅读本书时，情况正在发生变化，因为工具供应商和云服务提供商正在推出新的产品；一旦这些产品成熟，它们应该能为开发者隐藏许多外部架构的复杂性。\n\
  \n\n\n## 摘要\n\n在本章中，你了解了推动微服务演进的各种力量。连接人类与物理事物的数字应用，使得这种演进成为必然。架构反转是这种演进的正常结果，软件领域的整体复杂性已成倍增加，如今在微服务外部可见，并且必须在微服务之间进行显式管理。虽然采用微服务的冲动很诱人，但在任何此类尝试之前，必须进行定量的成本效益分析。一旦做出决定，下一个最重要的方面就是思考微服务的内部架构组织。虽然外部架构的关注点在不同上下文和场景中大致相同，但你的内部架构可以通过不同的权衡来设计。你将在第\
  \ 5 章中更详细地探讨这一点。\n\n脚注 1   2   3\n\n"
- '# 5. 微服务的基本模式


  软件架构相对容易理解，尤其是在有足够相关文档的情况下。当你开始实现它们来解决实际问题时，困难才会显现。这时，架构模式将为你提供帮助。如果你理解当前的问题，并且能够合理地将此问题与你已解决过的类似场景联系起来，那么遵循你之前采用过的类似方法就相当容易。架构和设计模式帮助你选择和采用针对性质相似问题的解决方案。模式是对特定上下文中反复出现的同类问题的可复用解决方案。


  在讨论了将单体应用拆分为多个微服务的必要性之后，现在让我们务实地审视任何应用架构师在设计可扩展应用时都会面临的一个主要问题：独立扩展任何应用的写入和读取集群。你将在本章中详细探讨这一方面。在此过程中，你还会探索一个强大的模式，通过采用其各种变体，该模式将有助于解决微服务架构的许多问题。


  本章中你将深入探讨的概念如下：


  *   独立扩展架构的读写事务能力的必要性


  *   CQRS 模式


  *   CQRS 模式的元模型以及将在本书后续章节中解释的更多示例场景


  ## 服务的正交扩展


  如果我们抛开微服务架构背后的其他理由，一个主要需求是在单个应用中有选择地扩展组件或服务。你知道，在单体应用中，几乎不可能轻松拆分组件或服务，然后以选定的可扩展性程度进行部署；然而，这是我们在采用微服务架构时获得的一个主要优势。在前面的章节中，我讨论了与所需订单微服务实例数量相比，需要实例化更多数量的产品目录和产品详情微服务。类似的需求也适用于异构地处理应用领域状态变更和状态视图的事务扩展，所以让我们尝试详细理解这一点。


  ### 写入事务与读取事务


  任何通过 B2B 或 B2C 渠道，或者通过物联网或可穿戴设备渠道发起的事务，通常都属于以下两类事务之一：


  *   **写入事务**：写入事务通常会改变应用中实体的状态。电子商务结账、信用卡支付和航班座位确认是写入事务的典型例子，因为它们都会改变实体的状态，这些状态通常保存在服务器端内存中，并且在许多情况下，状态变更也会反映在底层持久化存储以及应用与之交互的任何其他
  B2B 接口中。通常，写入事务是非幂等的^(⁶)，除非经过特殊设计使其行为不同。这意味着，一个信用卡支付事务，如果本意是只执行一次，但由于某种原因被执行了两次（执行一次并重放一次），并且这两次事务都成功了，那么支付将被处理两次，这可能不是期望的结果。


  *   **读取事务**：读取事务通常查询实体的现有状态，无论是用于查看目的、缓存目的，还是作为另一个包含性写入事务的一部分以辅助决策步骤。无论哪种情况，典型的读取事务都是幂等的。它不会改变服务器端内存或底层持久化存储中实体的实际状态。重复的读取事务可能会创建或更新某些相关实体的状态，例如相应的审计或日志实体；然而，通常情况下，如果由于某种原因它被执行了两次（执行一次并重放一次或多次），并且所有这些事务都成功了，那么事务中涉及的主要实体的状态不会有任何明显变化。


  ### 浏览-预订挑战


  我假设阅读本书的各位都已经进行过在线交易，尤其是在电子商务应用中。如果是这样，你就能理解，在你实际确认第一个写入事务（即创建订单）之前，需要经历多个步骤，浏览网页、填写表单等等。为了更清楚地说明，如果你在线购买一些零售商品，比如电子产品，你会遵循以下步骤：


  1.  输入首页的 URL。


  2.  浏览产品类别并选择感兴趣的产品。


  3.  检索产品详情，包括评论、内容和媒体。


  4.  决定购买该商品，将其添加到购物车，并填写支付信息。


  5.  点击确认购买。


  如果你检查上面列出的最少步骤，你可以将最后一个事务（即实际的确认购买事务）与其他事务区分开来。确认购买事务可以归入写入事务类别，而上面列出的大多数其他先前事务则属于读取事务类别。


  ### 注意


  每执行一次写入事务，你都会执行更多次的读取事务。


  在经典的航班座位预订场景中，每个已预订的 PNR 的读写比例大约在 500 甚至 1,000 或更多。这被称为“浏览-预订比”。当我们说平均浏览-预订比为 1,000
  时，这意味着每为一个新预订创建的 PNR 执行一次写入（预订）事务，就应该已经有 1,000 次或更多的读取（浏览）事务命中了应用。在旺季或一周内促销活动的高峰时段，这个数字对于单次预订来说可能会上升到数千的量级！正是在这种背景下，微服务的选择性扩展能力才显得重要。




  ## CQRS：命令查询职责分离


  如果我们设计的微服务具备选择性扩展的能力，那么这将是微服务架构的优势之一。在第 4 章的“内部架构视角”部分，我讨论了设计微服务架构时可达到的不同成熟度级别。我在那里介绍了
  CQRS（命令查询职责分离）模式，因此让我们从架构和设计层面深入了解其细节。在本书的后续部分，你将看到许多示例，甚至是一个使用该模式实现的完整应用程序。


  ### 传统软件系统与基于 CQRS 的软件系统


  在传统单体系统中，写入（更新实体）和读取（请求查看实体）操作都是针对单个数据仓库中的同一组实体执行的。通常，这些实体是关系型数据库（如 MySQL 或 PostgreSQL）中一个或多个表的部分行。图
  5-1 展示了这种设计。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig1_HTML.jpg](img/477630_1_En_5_Fig1_HTML.jpg)


  图 5-1


  读写事务使用相同的模式


  通常，在这类单体系统中，所有 CRUD（创建、读取、更新和删除）操作都应用于实体的同一物理表示。在 Java 中，表示内存实例的数据传输对象（DTO）由数据访问层（DAL）从数据存储中检索，并在客户端设备的浏览器上呈现。用户可以查看此表示，然后更新
  DTO 的选定字段（可能通过遵循 MVC 或 MVVM 风格的数据绑定），然后 DTO 通过软件层传输并由 DAL 保存回数据存储。很多时候，同一个 DTO 可以同时用于读取和写入操作，如图所示。


  尽管这种设计简单直接，并且你已经愉快地遵循多年，但它存在一些局限性：


  *   写入和读取操作所需的实体表示可能与上层期望的不一致，因此可能存在不匹配。

  *   即使允许并发读取，但如果正在进行写入，则必须根据应用程序期望的数据隔离规则来控制进一步的读取（更不用说另一个并发写入操作）。这需要同步和锁定，从而限制了应用程序的可扩展性。


  在 CQRS 模式中，读取数据的操作与更新数据的操作通过不同的接口进行分离。这意味着用于查询实体和更新实体的数据模型也可能不同，尽管这不是绝对要求。


  如果你决定分离数据模型，你还可以考虑将它们分离到各自的模式中。无论你是将读取和写入分离到不同的数据模型还是不同的模式，你还需要解决如何将写入模型中发生的任何更改复制回读取模型的问题。


  如果写入模型和读取模型是分离的，那么通常很容易将读取部分扩展到多个副本，因为它们只是单个写入模型的副本或视图。这将帮助你扩展读取模型，以处理前面讨论的高查询预订比场景。在大多数情况下，与读取模型相比，写入模型的可扩展性需求是可控的。这意味着你可能不希望将写入模型扩展到与读取模型相同的程度。然而，出于备份、冗余等原因，写入模型也可能希望扩展到多个，这将在后面讨论。


  所有这些都意味着，对于实体的读取和写入操作，你拥有独立的数据模型以及数据模式。再次记住，这两个模型或模式是同一实体所需的两个方面；就像你照镜子时，镜中你的脸像类似于读取模型，而你真实的脸类似于写入模型。如果你扇自己一巴掌，你会感到疼痛，而你的镜像只能“看到”疼痛，它无法“感受”疼痛，因为它类似于读取模型。让我们将这一改进引入图
  5-1 的设计中；见图 5-2。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig2_HTML.jpg](img/477630_1_En_5_Fig2_HTML.jpg)


  图 5-2


  读写事务使用独立的模式


  如前所述，读取存储可以是写入存储的只读副本，并且读取和写入存储可能具有完全不同的数据结构。一旦你在读取和写入存储之间实现了这种分离，就必须进行从写入存储到读取存储的变更同步。


  一旦你将数据存储的写入部分与读取部分分离，无论这些读取和写入存储物理上位于同一节点还是两个不同节点，都必须进行同步。因此，一旦同步机制到位，下一个自然的想法就是将读取和写入计算分离到它们自己的独立节点或进程中，如图
  5-3 所示。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig3_HTML.jpg](img/477630_1_En_5_Fig3_HTML.jpg)


  图 5-3


  读写事务使用独立的数据库节点


  当你将读取和写入服务分离到不同的物理节点时，实际上你就抓住了“扩展”这一额外杠杆，通过实例化更多的读取服务并保持单个写入服务实例，来解决前面提到的高查询预订比问题。见图
  5-4。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig4_HTML.jpg](img/477630_1_En_5_Fig4_HTML.jpg)


  图 5-4


  使用独立的读取和写入进程进行扩展


  ### CQRS 中的术语


  CQRS 基于两个概念：命令和事件。命令和事件解释如下：


  *   **命令**：改变实体状态的意图被建模为命令。

  *   **事件**：一旦实体状态发生变化，事件表示发生了什么变化。


  参考图 5-3，从客户端到表示层的写入事务由命令表示，这些命令将封装实现状态更改所需的所有信息。任何此类状态更改都会导致对数据持久化存储的相应写入。由于这种状态更改的动作或效果，应用程序中其他地方的组件或服务可能对更改的内容感兴趣，并且应该有一种机制将这些更改传播给那些感兴趣的服务。在这种情况下，事件就派上了用场。因此，如果写入数据实体的状态发生了更改，则可以以事件的形式将其传播给对应的读取数据实体。




  ## 基于事件的 CQRS 架构


  之前我讨论了每当写模型发生变化时，同步读模型的必要性。这是将单一模型拆分为写模型和读模型后产生的副作用。当我们意识到大多数企业应用对于同一实体拥有不止一个视图，或者不止一个读模型时，情况会变得更糟。读存储和写存储可能具有完全不同的结构；多个读存储或读模型也会有不同的数据结构，因此使用读存储的多个只读副本可以显著提高查询性能和应用程序
  UI 的响应速度。这其中还有更多复杂性，接下来让我们深入探讨这些方面。


  ### 基于事件的 CQRS 设计元模型


  本书开始时，你了解了应用架构的单体模型，随后又接触了微服务。你还看到了随之增加的复杂性，尤其是在微服务之间的外部架构中。在本章中，你将进入下一个层次，将最精细的单一实体——微服务——拆分为多个，以满足可扩展性需求以及多视图的需求。先打个预防针，事情不会变得简单，现在让我们来讨论这些细节。


  基于前几章和本章前几节所获得的知识，让我们列出 CQRS 架构的一些复杂性：


  *   如果一个实体被拆分并以多个形式表示，则必须保持同步。

  *   实体及其视图需要具备选择性扩展能力。

  *   实体及其视图未来可能会有更多的交互方和关注方。


  还有其他需求；不过，对于我们的讨论而言，以上列表已经足够。


  让我们构思一个元模型来解决这里列出的问题。图 5-5 展示了这样一个模型。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig5_HTML.jpg](img/477630_1_En_5_Fig5_HTML.jpg)


  图 5-5


  基于 CQRS 架构的元模型


  这个元模型借鉴了名为 Axon 的 CQRS 框架中实现的概念，Axon 是本书示例中将使用的开源 CQRS 框架，其细节将在后面介绍。让我们从概念层面看看模型中抽象出的主要组件；理解本章内容并不需要了解
  Axon 框架的详细工作原理。


  *   **控制器**：控制器通常是一个 UI 控制器，它拦截来自客户端的写事务和读事务。

  *   **命令**：改变实体状态的意图被建模为命令。控制器根据客户端的写请求创建并发出命令。

  *   **命令网关**：命令网关是一个便捷的接口，允许你选择命令分发机制，特别是通过采用同步或异步方式。

  *   **命令处理器**：命令处理器响应特定类型的命令，并根据命令内容执行业务规则和逻辑。它检索领域实体并对其施加状态变更。

  *   **领域实体**：领域实体是聚合实体，被建模以表示感兴趣领域中组件的状态。当聚合的状态发生变化时，会导致领域事件的生成。

  *   **仓库**：当提供聚合实体的唯一标识符时，仓库负责查找聚合实例并提供对聚合的访问。仓库可以存储聚合本身的状态，在这种情况下它可以利用数据库等持久化存储；或者，它可以使用事件存储，通过之前记住的所有中间状态，将实体的状态恢复到历史中的任意时间点。

  *   **事件存储**：事件存储通常存储应用于实体的变更。通过重放这些变更，可以将实体的状态恢复到历史中的任意时间点。事件存储也可以利用数据库来存储状态变更的审计轨迹。

  *   **事件**：一旦实体的状态发生变化，事件就表示发生了什么变化。

  *   **事件总线**：事件总线是生成的事件的通道。它们通常由消息主题支持，以便你在此通道上获得发布-订阅语义。

  *   **事件处理器**：事件处理器接收事件并进行处理。多个事件处理器可以订阅特定的事件类型。一些处理器可能会更新用于查询的数据源或物化视图，而另一些处理器可能会向外部接口发送消息。事件处理器也可能创建新的命令。

  *   **查询**：控制器将读事务路由到查询管理器，查询管理器随后在实体的特定物化视图上执行查询。


  图 5-5 展示了一个基于 CQRS 架构的元模型，该模型利用了前面描述的全部或许多角色。所展示的 CQRS 元模型还解决了架构中的一些偶发情况，列举如下：


  *   **命令-事件-命令循环**：当聚合的状态因命令而改变时，会导致领域事件的生成。这些事件表示发生了什么变化，并被注入到事件总线中。感兴趣的事件处理器消费事件并进行相应处理。在某些情况下，事件处理会创建新的命令，并且该循环可能会重复。

  *   **事件总线** 暴露了发布-订阅语义，因此可以在不侵入现有组件的情况下，将更多的事件处理器附加到现有架构中。这为应用程序未来的可扩展性提供了支持。


  需要注意的是，基于 CQRS 的架构并不强制要求你采用微服务架构。同样，采用微服务架构也并非必须使用基于 CQRS 的架构。话虽如此，将两者结合将为软件架构师提供独特的优势，使其能够以最大的灵活性来扩展应用程序。


  ### 使用事件进行命令查询分离


  CQRS 架构可用于更好地构建基于微服务的系统。通过对 CQRS 元模型进行一些微调，可以轻松地将应用程序实体的读和写部分分离到完全不同的技术-业务领域。所谓“技术”，是指分离到不同的进程空间；所谓“领域”，是指分离到业务中不同的写和读事务需求。


  图 5-6 是对图 5-5 中展示的简单 CQRS 元模型的改进。如你所见，同步实体写和读部分所需的全部就是事件总线。并且你已经看到，事件总线通常是一个消息骨干网，利用消息主题实现。通过适当地利用事件总线的持久性和耐用性特性，你实际上可以使所有读节点与写节点保持同步。


  ![../images/477630_1_En_5_Chapter/477630_1_En_5_Fig6_HTML.jpg](img/477630_1_En_5_Fig6_HTML.jpg)


  图 5-6


  基于事件的 CQRS 架构元模型




