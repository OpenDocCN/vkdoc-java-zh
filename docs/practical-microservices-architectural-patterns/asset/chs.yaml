  \ Resource(\nproduct, linkTo(methodOn(ProductRestController.class).\ngetProduct(product.getId())).withSelfRel());\n\
  return new ResponseEntity>(\nproductResponse, HttpStatus.OK);\n}\n}\n**清单 8-22**\n\
