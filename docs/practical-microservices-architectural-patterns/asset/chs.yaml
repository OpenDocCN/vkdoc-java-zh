  \n## 使用 Spring HAL 浏览器、HATEOAS 进行开发\n\n超媒体驱动的 REST 接口的一个非常方便的方面是，你可以使用 cURL（或你正在使用的任何\
  \ REST 客户端）发现所有 RESTful 端点。如果每个响应还提供了用户下一步可以操作的选项信息，则无需在方法调用（查询）之前与客户交换正式的合同或接口文档。HAL\
  \ 格式提供了一种一致且简单的方法来在你的 API 中的资源之间建立超链接。HAL 将使你的 REST API 可探索，并且其文档易于从 API 本身中发现。这将使你的\
  \ API 在手动和机器可读模式下都更易于使用，因此对客户端开发人员更具吸引力。HATEOAS（将超文本作为应用程序状态的引擎）是一种 REST 模式，其中导航链接作为响应负载的一部分提供。然后，客户端可以确定状态并遵循作为该状态一部分提供的转换\
  \ URL。\n\n大多数主流编程语言都有可用的开源库支持 HAL，因此采用 HAL 的 API 可以轻松地在多个平台和编程语言中提供和使用。它非常简单，你可以像处理任何其他\
  \ JSON 一样处理它。\n\n\n\nHAL 浏览器\nHAL 浏览器是一款基于 HAL 规范处理 HAL+JSON 数据的实用应用程序。它是一个使用 HAL\
  \ 驱动的 JavaScript 的 Web 应用。你可以将其指向任何符合 HAL 规范的 Spring Data REST API，并利用它来浏览应用和遍历链接资源。\n\
  \n要让你的应用启用 HAL 浏览器，你只需在 Spring Initializer 中，除了图 7-1 中提到的依赖之外，再包含“Rest Repositories\
  \ HAL Browser”依赖即可。因此，你的 `pom.xml` 将包含清单 7-9 中所示的额外依赖。\n\n```xml\n<dependency>\n\
  \    <groupId>org.springframework.data</groupId>\n    <artifactId>spring-data-rest-hal-browser</artifactId>\n\
  </dependency>\n```\n\n清单 7-9\nSpring REST HAL 浏览器的 Maven 依赖 (ch07\\ch07-02\\pom.xml)\n\
  \n请注意，`pom.xml` 中还有一些配置细节，但这些额外的行都是用于配置 Java 简单日志门面 (SL4J) 的，它充当常用日志框架（如 Java Util\
  \ Logging、Log4J、Log4J2、Logback 等）的门面。当你针对 SL4J API 编写日志代码时，你可以灵活地在部署时插入你想要的日志框架，这是通过一个中间桥接/适配器层实现的。还有一个“Exclude”配置用于排除内置的\
  \ Logback 依赖，因为如果类路径中存在 Logback，Spring Boot 默认会选择并使用它。\n\n由于存放在 `ch07\\ch07-02`\
  \ 文件夹中的示例应用与你之前在 `ch07\\ch07-01` 中看到的代码类似，我在此不再赘述。请确保 MongoDB 已启动并运行。你可能需要参考附录 A\
  \ 来开始使用 MongoDB。\n\n你可以按如下方式构建并运行应用：\n\n```\ncd ch07\\ch07-02\nD:\\binil\\gold\\\
  pack03\\ch07\\ch07-02>build\nD:\\binil\\gold\\pack03\\ch07\\ch07-02>mvn clean package\
  \ -Dmaven.test.skip=true\ncd ch07\\ch07-02\nD:\\binil\\gold\\pack03\\ch07\\ch07-02>run\n\
  D:\\binil\\gold\\pack03\\ch07\\ch07-02>mvn spring-boot:run\n```\n\n`spring-data-rest-hal-browser`\
  \ 依赖会自动配置，当你访问应用的根 URI 时，HAL 浏览器就会被提供。你可以将浏览器指向\n\n```\nhttp://localhost:8080\n\
  ```\n\n这将会被重定向到图 7-5 中所示的 URL。\n\nREST 端点有 GET 和非 GET 操作，你可以点击 GET 按钮并导航查看某个集合，或者点击非\
  \ GET 选项来对集合进行修改。这是通过启用 HAL 浏览器自动实现的，它可以从响应中读取链接，并将其显示在浏览器左侧的列表中；浏览器右侧则显示来自响应的详细信息，包括头部和主体（一个\
  \ HAL 文档）。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig5_HTML.jpg](img/477630_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\nSpring Data REST HAL 浏览器\n\nHAL 浏览器与 URI 模板进行交互。你可以通过问号图标，点击“Products”或“Categories”旁边的某个\
  \ GET 方法。如果你选择导航到它，将会弹出一个展开对话框，如图 7-6 所示。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig6_HTML.jpg](img/477630_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n展开 HAL URI 模板的 GET 方法\n\n你可以不输入任何内容直接点击“Follow URI”按钮；如果这样，变量将被忽略，你将收到服务器返回的集合中的所有元素。类似地，你也可以点击上面的非\
  \ GET 按钮，这将弹出一个对话框，如图 7-7 所示。默认情况下，它显示的是 POST 方法。这个字段可以调整为 PUT 或 PATCH 资源。头部默认已正确填写，用于提交一个新的\
  \ JSON 文档。你可能会注意到，这些字段是根据资源的元数据自动提供的。这是由 Spring Data REST 自动生成的。\n\n![../images/477630_1_En_7_Chapter/477630_1_En_7_Fig7_HTML.jpg](img/477630_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n展开 HAL URI 模板的非 GET 方法\n\n使用 RestTemplate 测试 HAL REST 端点\n\n你现在可以使用 Maven\
  \ 执行 Junit 测试。测试代码位于 `ch07-02\\src\\test\\java\\com\\acme\\ch07\\ex02\\product`\
  \ 文件夹中。本章上一节的测试直接访问了 Mongo 仓库并执行了数据操作；然而，本节的测试将访问由 Spring Data REST 自动生成的 REST API。清单\
  \ 7-10 到 7-12 检查了使用 RestTemplate 访问 HAL REST 端点执行数据操作所需的代码。清单 7-10 展示了如何通过调用 HTTP\
  \ POST 方法在服务器上创建新资源。它还展示了如何调用 HTTP DELETE 方法，你可以在测试初始化设置中执行此操作。\n\n```java\npublic\
  \ class ProductHalRestTemplateTest {\n    private static String PRODUCT_SERVICE_URL\
  \ =\n        \"http://127.0.0.1:8080/products\";\n    @Before\n    public void setUp(){\n\
  \        deleteAllProducts();\n    }\n    @Test\n    public void testPostProduct(){\n\
  \        try{\n            Product productNew1 = createProduct(\"1\");\n       \
  \     Product productNew2 = createProduct(\"2\");\n            RestTemplate restTemplate\
  \ = restTemplate();\n            Product productRetreived1 = restTemplate.postForObject(\n\
  \                PRODUCT_SERVICE_URL, productNew1, Product.class);\n           \
  \ Product productRetreived2 = restTemplate.postForObject(\n                PRODUCT_SERVICE_URL,\
  \ productNew2, Product.class);\n            assertTrue(\"successfully saved\",true);\n\
  \        }catch(Exception ex){\n            assertTrue(\"successfully failed\",true);\n\
  \        }\n    }\n    public void deleteAllProducts(){\n        RestTemplate restTemplate\
  \ = restTemplate();\n        List productList = getAllProducts();\n        productList.forEach(item->restTemplate.delete(\n\
  \            PRODUCT_SERVICE_URL + \"/\" + item.getId())\n        );\n    }\n  \
  \  private RestTemplate restTemplate() {\n        ObjectMapper mapper = new ObjectMapper();\n\
  \        mapper.configure(DeserializationFeature.FAIL_ON_UNKNOWN_PROPERTIES,\n \
