  \ HATEOAS 的 HTTP 响应并返回。清单 8-21 展示了 `getAllProducts()` 的代码。\n\n```\n@CrossOrigin\n\
  @RestController\npublic class ProductRestController implements ProductService{\n\
  @Autowired\nRestTemplate restTemplate;\nprivate static String PRODUCT_SERVICE_URL\
