  \n你需要首先将 11 个微服务项目设置为 Eclipse 项目。首先进入以下根文件夹：\n\n```\ncd ch17\\ch17-01\\Ax2-Ecom-No-Security\n\
  ```\n\n要从你的 POM 生成 Eclipse 项目文件，请执行以下命令：\n\n```\nmvn eclipse:eclipse\n```\n\nMaven\
  \ Eclipse 插件用于生成 Eclipse IDE 文件（`∗.classpath`、`∗.project`、`∗.wtpmodules` 和 `.settings`\
  \ 文件夹），以供项目使用。如果你的 Maven 项目有依赖项，Eclipse 类路径将与当前的 Maven 依赖项列表以及任何传递性 Maven 依赖项同步。\n\
  示例应用的 Maven 项目由多个聚合项目组成，这些项目共享一个共同的根 POM，其中一些聚合项目相互依赖。`eclipse:eclipse` 目标会将 Eclipse\
  \ 中的每个依赖项目配置为 Eclipse 项目依赖项，而不是 Eclipse jar 依赖项。通过这样做，项目 A 中的代码更改将立即可用于项目 B（假设项目\
  \ B 定义了与项目 A 的依赖关系）。\n\n接下来，你必须将项目导入到你的 Eclipse 工作区中（从菜单栏选择“文件” ➤ “导入” ➤ “将现有项目导入工作区”）。请注意，项目（目录）不应位于你的工作区中，因为\
  \ Eclipse 可能会遇到问题，特别是如果你想将 Eclipse 用作 SCM 客户端时。\n\n1.  在 Eclipse 项目资源管理器中，导入现有项目。\n\
  \n2.  选择 Maven ➤ 现有 Maven 项目 ➤ 下一步。\n\n3.  在“选择 Maven 项目”窗口中，单击“浏览”。\n\n\n\n4. \
