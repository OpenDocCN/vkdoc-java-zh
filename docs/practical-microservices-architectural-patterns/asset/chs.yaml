  \ Order.class);\ngenericJpaRepository.setEventBus(eventBus());\nreturn genericJpaRepository;\n\
  }\n}\n清单 12-3\nSpring Axon 配置 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\\
  main\\java\\com\\acme\\ecom\\EcomAppConfiguration.java)\n```\n\n\n\n现在我将解释 Axon\
  \ 特有的组件。SimpleCommandBus 会在分派命令的同一线程中直接处理命令。命令处理完成后，修改后的聚合会被保存，并且任何生成的事件都会在同一线程中发布。\n\
  \n聚合 是一个始终保持一致状态的实体或实体组。聚合根 是聚合树顶层的对象，负责维护这种一致状态。例如，一个订单聚合可能包含订单项和送货地址等实体。为了保持整个聚合的一致状态，更改此订单的地址应通过订单聚合进行，而不是直接访问地址实体。\n\
  \nSimpleCommandBus 为每个发布的命令维护一个工作单元（UoW）的概念。由于所有命令处理都在同一线程中完成，此实现仅限于单个 JVM 的边界内。\n\
  \n工作单元 是对聚合进行的一组修改。命令的执行通常发生在工作单元的范围内。当命令处理程序执行完毕时，UoW 会被提交，所有操作都会最终确定。这意味着任何存储库都会收到其聚合状态变更的通知，并且计划发布的事件会被发送到事件总线。这是一种便捷的分组方式，有助于防止在处理完多个聚合之前发布单个事件。在后台，它允许存储库在整个事务中管理资源，例如锁。例如，锁只会在工作单元被提交或回滚时释放。\n\
  \n工作单元不能替代传统的 ACID 风格事务。它只是一个缓冲区域，用于分组和暂存更改。当工作单元被提交时，所有暂存的更改都会被提交；但是，此提交不是原子性的。这意味着如果提交失败，可能部分更改已被持久化，而其他更改则没有。因此，Axon\
  \ 的最佳实践规定，一个命令应始终只包含一个操作。如果你的工作单元中有更多操作，则应考虑为工作单元的提交附加一个事务，关于这一点你可以参考 Axon 文档。\n\
  \nSimpleEventBus，顾名思义，是 EventBus 接口的一个非常基础的实现，是一种用于将事件分派给已订阅事件监听器的机制。当事件分派是同步且本地（即在单个\
  \ JVM 中）进行时，它表现良好。它管理已订阅的 EventListener，并将所有传入的事件转发给所有已订阅的监听器。EventListener 必须显式地向事件总线注册，才能接收事件。注册过程是线程安全的，监听器可以随时注册和注销事件。如果\
  \ EventListener 抛出异常，事件分派将停止，并且异常会传播给发布事件的组件。\n\nAnnotationCommandHandlerBeanPostProcessor\
  \ 会自动将包含命令处理程序方法（即使用 `@CommandHandler` 注解的方法）的类注册到命令总线。\n\n*   此 Bean 后处理器会扫描应用程序上下文，查找所有包含带有\
  \ `@CommandHandler` 注解方法的 Bean。\n*   所有此类命令处理程序都会被自动识别并订阅到命令总线。\n\nAnnotationEventListenerBeanPostProcessor\
  \ 会自动将应用程序上下文中包含事件处理程序方法（即使用 `@EventHandler` 注解的方法）的类注册，并自动将它们连接到事件总线。\n\n*   此\
  \ Bean 后处理器会扫描应用程序上下文，查找所有包含带有 `@EventHandler` 注解方法的 Bean。\n*   所有此类事件监听器都会被自动识别并订阅到事件总线。\n\
  \n命令网关是命令分派机制的一个便捷接口。使用网关来分派命令是可选的；然而，这通常是最简单的方式。CommandGateway 是接口，DefaultCommandGateway\
  \ 是 Axon 提供的默认实现。网关提供了多种方法，允许你发送命令并等待结果，可以是同步、带超时或异步的。\n\nGenericJpaRepository 是一个存储库实现，可以存储与\
  \ JPA 兼容的聚合。它配置了一个 EntityManager 来管理实际的持久化，以及指定存储在存储库中的聚合实际类型的类，在你的例子中是 `Product`\
  \ 和 `Order`。所有带有 JPA 注解的聚合必须实现 AggregateRoot 并具有正确的 JPA 注解。存储库可以配置锁定方案。存储库将始终在底层持久化存储中强制使用乐观锁。可以为存储库配置一个可选的锁，在这种情况下，它将作为此乐观锁的补充。一个存储库实例上的锁不会与其他存储库实例共享。当请求此存储库持久化对聚合的更改时，它还会刷新\
  \ EntityManager，在此期间它将强制检查数据库约束和乐观锁。现在让我们看看你的 AggregateRoot 实体；参见清单 12-4。\n\n```\n\
  import org.axonframework.domain.AbstractAggregateRoot;\n@Entity\n@Table(name=\"\
  ECOM_ORDER\")\n@Data\n@EqualsAndHashCode(exclude = { \"id\" })\npublic class Order\
  \ extends AbstractAggregateRoot {\n@Id\nprivate Integer id;\n@Column(name=\"PRICE\"\
  )\nprivate Double price;\n@Column(name=\"NUMBER\")\nprivate Integer number;\n@Column(name=\"\
  ORDER_STATUS\")\n@Enumerated(EnumType.STRING)\nprivate OrderStatusEnum orderStatus;\
  \ ;\n@ManyToOne(fetch=FetchType.LAZY)\n@JoinColumn(name=\"PRODUCT_ID\")\nprivate\
  \ Product product;\n@Override\npublic Integer getIdentifier() {\nreturn id;\n}\n\
  public Order(Integer id, Double price, Integer number,\nOrderStatusEnum orderStatus,\
  \ Product product) {\nsuper();\nthis.id = id;\nthis.price = price;\nthis.number\
  \ = number;\nthis.orderStatus = orderStatus;\nthis.product = product;\nregisterEvent(new\
  \ OrderCreatedEvent(id, price, number,\nproduct.getDescription(), orderStatus.toString()));\n\
  }\n}\n清单 12-4\n订单聚合实体 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\main\\\
  java\\com\\acme\\ecom\\order\\model\\Order.java)\n```\n\n`Order` 继承了 AbstractAggregateRoot，这是\
  \ AggregateRoot 接口的一个非常基础的实现。它提供了跟踪所有未提交事件的机制，并且还根据生成的事件数量维护一个版本号，该版本号可用于提交期间的验证。此外，`Order`\
  \ 实体还使用 `registerEvent` 方法注册在保存聚合时要发布的事件。接下来，你将看到清单 12-5 中的 `Product` 聚合。\n\n```\n\
  @Entity\n@Table(name=\"ECOM_PRODUCT\")\n@Data\n@EqualsAndHashCode(exclude = { \"\
  id\" })\npublic class Product extends AbstractAggregateRoot {\n@Id\nprivate Integer\
  \ id;\n@Column(name=\"PRICE\")\nprivate Double price;\n@Column(name=\"STOCK\")\n\
  private Integer stock;\n@Column(name=\"DESCRIPTION\")\nprivate String description;\n\
  @Override\npublic Integer getIdentifier() {\nreturn id;\n}\npublic void depreciateStock(int\
  \ count) {\nif(this.stock >= count){\nthis.stock = this.stock - count;\nregisterEvent(new\
  \ StockUpdatedEvent(id, stock));\n}else{\nthrow new RuntimeException(\"Out of stock\"\
  );\n}\n}\n}\n清单 12-5\n产品聚合实体 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\\
  main\\java\\com\\acme\\ecom\\product\\model\\Product.java)\n```\n\n`Product` 聚合在结构和功能上与\
  \ `Order` 聚合相似，因此此处不再重复说明。\n\n\n\n接下来，你将了解命令（Commands）。它们是直接的 DTO 类，如清单 12-6 所示。\n\
  \n```\nimport lombok.Data;\n@Data\npublic class NewOrderCommand {\nprivate final\
  \ Double price;\nprivate final Integer number;\nprivate final Integer productId;\n\
  }\n清单 12-6\n新订单命令 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\main\\java\\\
  com\\acme\\ecom\\order\\api\\command\\NewOrderCommand.java)\n```\n\n一个好的实践是让命令通过其名称来表达意图。因此，你可以通过\
  \ Java 类名来推断需要执行的操作，而命令对象的字段则应提供基于该命令执行操作所需的信息。\n\n现在，你将看到上述命令的创建过程。当你在浏览器中点击“立即下单！”按钮时，一个\
  \ REST/JSON 请求会到达订单控制器，如清单 12-7 所示。\n\n```\n@RestController\npublic class OrderController\
  \ {\n@Autowired\nprivate DataSource dataSource;\n@Autowired\nprivate CommandGateway\
  \ commandGateway;\n@RequestMapping(value = \"/orders\", method = RequestMethod.POST)\n\
  @Transactional\npublic ResponseEntity addNewOrder(@RequestBody OrderDTO orderDTO)\
  \ {\ncommandGateway.sendAndWait(new NewOrderCommand(orderDTO.getPrice(),\norderDTO.getNumber(),\
  \ orderDTO.getProductId()));\nreturn new ResponseEntity( HttpStatus.OK);\n}\n}\n\
  清单 12-7\n订单 REST 控制器 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\src\\main\\java\\\
  com\\acme\\ecom\\web\\controller\\OrderController.java)\n```\n\n`Controller` 方法将创建一个新命令，并将其发送到命令总线，然后等待其执行。执行结果在可用时返回。此\
  \ `sendAndWait` 方法将无限期阻塞，直到有结果可用或当前线程被中断。如果线程被中断，该方法返回 null。如果在处理过程中发生异常，该异常会被包装在\
  \ `CommandExecutionException` 中。\n\n清单 12-8 展示了命令处理器。\n\n```\n@Component\npublic\
  \ class OrderCommandHandler {\n@Autowired\n@Qualifier(\"orderRepository\")\nprivate\
  \ Repository orderRepository;\n@Autowired\n@Qualifier(\"productRepository\")\nprivate\
  \ Repository productRepository;\n@CommandHandler\npublic void handle(NewOrderCommand\
  \ newOrderCommand){\nProduct product =\nproductRepository.load(newOrderCommand.getProductId());\n\
  product.depreciateStock(newOrderCommand.getNumber());\nOrder order = new Order(new\
  \ Random().nextInt(),\nnewOrderCommand.getPrice(),\nnewOrderCommand.getNumber(),\
  \ OrderStatusEnum.NEW, product);\norderRepository.add(order);\n}\n}\n清单 12-8\nAxon\
  \ 订单命令处理器 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\ src\\main\\java\\com\\\
  acme\\ecom\\order\\commandhandler\\OrderCommandHandler.java)\n```\n\n`@CommandHandler`\
  \ 注解会将 `OrderCommandHandler` 上的 `handle` 方法标记为命令处理器。被注解方法的第一个参数是该方法要处理的命令。可选地，命令处理器可以指定第二个参数，类型为\
  \ `UnitOfWork`。如果提供了该参数，则会传入当前活跃的工作单元。一种类型的命令只能由一种类型的命令处理器处理。因此，一个订单命令处理器实例将处理新订单命令，当这样的命令到达时，它会从仓库中检索相应的领域对象（在你的场景中是\
  \ `Product` 聚合），并执行其上的方法来改变状态（在你的场景中是减少库存并创建新订单）。这些聚合通常包含实际的业务逻辑，因此负责维护自身的不变性。聚合的状态变化会导致领域事件的生成。在上述代码中，产品库存减少和新订单的创建都会生成事件。领域事件和聚合共同构成了领域模型。\n\
  \n现在，你将查看生成的事件的代码。事件是简单的数据封装 POJO 类。参见清单 12-9 和清单 12-10。\n\n```\npublic class StockUpdatedEvent\
  \ {\nprivate final Integer id;\nprivate final Integer stock;\n}\n清单 12-10\n库存更新事件\
  \ (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\ src\\main\\java\\com\\acme\\ecom\\\
  product\\api\\event\\StockUpdatedEvent.java)\n```\n\n```\npublic class OrderCreatedEvent\
  \ {\nprivate final Integer id;\nprivate final Double price;\nprivate final Integer\
  \ number;\nprivate final String productDescription;\nprivate final String orderStatus;\n\
  }\n清单 12-9\n订单创建事件 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\ src\\main\\java\\\
  com\\acme\\ecom\\order\\api\\event\\OrderCreatedEvent.java)\n```\n\n现在来看能够处理这些事件的事件处理器。如果你还记得，对于命令处理，一种类型的命令只能由一种类型的命令处理器处理。然而，对于事件处理，一种类型的事件可以由零个或多个类型的事件处理器处理。这类似于使用消息主题的发布-订阅模式，其中一条消息可以被多个订阅者消费。稍后会详细介绍；现在让我们看看清单\
  \ 12-11 中事件处理器的代码。\n\n```\n@Component\npublic class OrderEventHandler {\n@Autowired\n\
  DataSource dataSource;\n@EventHandler\npublic void handleOrderCreatedEvent(OrderCreatedEvent\
  \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
  INSERT INTO ecom_order_view VALUES(?,?,?,?,?)\",\nnew Object[]{event.getId(),\n\
  event.getPrice(), event.getNumber(), event.getProductDescription(),\nevent.getOrderStatus()});\n\
  }\n}\n清单 12-11\n订单事件处理器 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\ src\\main\\\
  java\\com\\acme\\ecom\\order\\eventhandler\\OrderEventHandler.java)\n```\n\n订单事件处理器在新订单创建后接收订单创建事件。因此，剩下的唯一任务就是更新订单读取数据库，上述代码完成了这项工作。另一个事件处理器是产品事件处理器，如清单\
  \ 12-12 所示。\n\n```\n@Component\npublic class ProductEventHandler {\n@Autowired\n\
  DataSource dataSource;\n@EventHandler\npublic void handleProductStockUpdatedEvent(StockUpdatedEvent\
  \ event) {\nJdbcTemplate jdbcTemplate = new JdbcTemplate(dataSource);\njdbcTemplate.update(\"\
  UPDATE ecom_product_view SET stock=? WHERE ID=?\",\nnew Object[]{event.getStock(),\
  \ event.getId()});\n}\n}\n清单 12-12\n产品事件处理器 (ch12\\ch12-01\\Ax2-Commands-Events-Same-JVM\\\
  src\\main\\java\\com\\acme\\ecom\\product\\eventhandler\\ProductEventHandler.java)\n\
