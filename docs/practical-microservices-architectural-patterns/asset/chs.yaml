  \n图 13-10\n测试用户控制台\n\n要启动第一个测试用例，请打开 Postman 并创建一个新的报价，如图 13-11 所示：\n\n![../images/477630_1_En_13_Chapter/477630_1_En_13_Fig11_HTML.jpg](img/477630_1_En_13_Fig11_HTML.jpg)\n\
