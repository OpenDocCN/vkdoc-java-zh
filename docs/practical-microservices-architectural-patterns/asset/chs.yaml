  \ 12 章中看到的 EventHandlerAudit 微服务相同。唯一的变化与刚刚描述的微服务中附加处理组的方式类似，因此我将不再重复该信息。\n\n构建并测试示例场景\n\
  按照第 12 章中“分布式命令和事件处理”部分下的“构建并测试示例场景”子部分的说明来构建和测试该示例。此示例的唯一区别是你多了一个微服务，即 Eureka 注册中心。你应该首先构建并运行\
  \ Eureka 注册中心微服务。然后按照第 12 章中描述的步骤进行操作。\n\n\n\nAxon 3 CQRS 微服务电商与 BASE 事务\n在本节中，你的主要目标是将你在第\
  \ 17 章和第 18 章构建的电商示例应用从 Axon 2 迁移到 Axon 3。此外还有一个次要目标，我现在就来定义它。\n\n如果你还记得第 17 章“BASE\
  \ 中的 ACID”一节中的讨论，当时你将订单和库存聚合放在了一起。这在现实场景中可能发生，也可能不会发生。订单或预订实体由销售渠道和最终用户活动驱动，而库存或存货实体则由最终用户和供应链活动驱动。因此，负责管理这些实体的应用程序、系统或微服务可能并非同一个，在许多情况下，它们会是独立的微服务。通过在第\
  \ 17 章和第 18 章的示例中使用单一资源管理器（MySQL 持久化引擎），你避免了分布式事务。然而，你仍然使用了 ACID 风格的事务，因为这两个实体都紧密地保存在单个微服务中，并且你利用了\
  \ ACID 风格的本地事务。但如果你想将它们分开呢？\n\n移除订单与库存领域之间的 ACID 束缚\n\n你首先将回顾第 17 章的代码，其中你在两个聚合根实体（订单和库存）上执行了\
  \ ACID 风格的事务。第 17 章中的清单 [17-6](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC10)\
  \ 在此处作为清单 19-12 重复列出。\n\n```\n@Component\npublic class OrderCommandHandler {\n@Autowired\n\
  @Qualifier(value = \"orderRepository\")\nprivate Repository orderRepository;\n@CommandHandler\n\
  public void handleNewOrder(OrderCreateCommand orderCreatedCommand) {\nOrder order\
  \ = new Order(Long.valueOf(new Random().nextInt()));\norder.setOrderDate(new Date());\n\
  order.setOrderStatus(OrderStatus.PAID);\norder.setUserId(orderCreatedCommand.getUserId());\n\
  double total = 0;\nif (orderCreatedCommand.getLineItems() != null) {\nfor (LineItemDTO\
  \ lineItemDto :\norderCreatedCommand.getLineItems()) {\nif (lineItemDto.getInventoryId()\
  \ != null) {\nLineItem lineItem = new LineItem(new Random().nextLong(),\nlineItemDto.getProductId(),\
  \ lineItemDto.getQuantity(),\nlineItemDto.getPrice(), lineItemDto.getInventoryId());\n\
  total = total + lineItemDto.getPrice();\norder.addLineItem(lineItem);\nInventory\
  \ inventory =\ninventoryRepository.load(lineItemDto.getInventoryId());\ninventory.updateProductStock(lineItemDto.getQuantity(),\n\
  ProductStockOperation.DEPRECIATE);\n}\n}\n}\norder.setTotal(total);\norder.notifyOrderCreation();\n\
  orderRepository.add(order);\n}\n}\n清单 19-12\nOrderCommandHandler handleNewOrder\
  \ (ch17\\ch17-01\\Ax2-Ecom-No-Security\\Ecom-core\\src\\main\\java\\com\\acme\\\
  ecom\\core\\order\\command\\handler\\OrderCommandHandler.java)\n```\n\n你在第 12 章中了解到，工作单元（UoW）是对聚合进行的一组修改。命令的执行通常发生在\
  \ UoW 的范围内。当清单 19-12 中的命令处理方法执行完毕时，UoW 被提交，所有操作最终确定。这意味着任何仓库都会收到其聚合状态变更的通知，并且计划发布的事件会被发送到事件总线。这是一种便捷的分组方式，有助于防止在处理多个聚合之前发布单个事件。在后台，它允许仓库在整个事务中管理资源，例如锁。例如，锁只有在\
  \ UoW 被提交或回滚时才会被释放。\nUoW 并不能替代传统的 ACID 风格事务。它仅仅是一个缓冲区，用于对变更进行分组和暂存。当 UoW 被提交时，所有暂存的变更才会被提交；然而，这种提交并非原子性的。这意味着如果提交失败，可能部分变更已被持久化，而其他变更则没有。Axon\
  \ 最佳实践规定，应遵循一条命令始终只包含一个操作的最佳实践。\nAxon 2 中的 UoW 允许一条命令在多个聚合上执行逻辑。UoW 在管理工作单元（由命令处理器完成）方面扮演着更核心的角色。UoW\
  \ 当前会跟踪由仓库加载的聚合，并在 UoW 提交时持久化它们。\n\n如果你的 UoW 中包含多个操作或多个聚合，那么你应该考虑将事务附加到 UoW 的提交上。在第\
  \ 17 章中，你在清单 [17-7](https://doi.org/10.1007/978-1-4842-4501-9_17_Fig#PC11) 中这样做了，具体代码在此处作为清单\
  \ 19-13 重复列出。\n\n```\n@Configuration\n@RefreshScope\npublic class EcomCoreAppConfiguration\
  \ {\n@Autowired\n@Qualifier(\"transactionManager\")\nprotected PlatformTransactionManager\
  \ txManager;\n@Bean\npublic SimpleCommandBus commandBus() {\nSimpleCommandBus simpleCommandBus\
  \ = new SimpleCommandBus();\nsimpleCommandBus.setDispatchInterceptors(\nArrays.asList(new\
  \ BeanValidationInterceptor()));\nSpringTransactionManager transcationMgr =\nnew\
  \ SpringTransactionManager(txManager);\nsimpleCommandBus.setTransactionManager(transcationMgr);\n\
  return simpleCommandBus;\n}\n}\n清单 19-13\n将事务绑定到工作单元 (ch17\\ch17-01\\Ax2-Ecom-No-Security\\\
  Ecom-core\\src\\main\\java\\com\\acme\\ecom\\core\\EcomCoreAppConfiguration.java)\n\
  ```\n\n这里，`SpringTransactionManager` 是一个 `TransactionManager` 实现，它使用 `PlatformTransactionManager`\
  \ 作为底层事务管理器。\n这里你在单个事务中使用了两个聚合实体（库存和订单），但由于这两个聚合实体由同一个资源管理器管理，并且都在单个节点上，因此不涉及分布式事务。\n\
  可以将事务绑定到 UoW。许多命令总线实现，例如 `SimpleCommandBus` 和 `DisruptorCommandBus`，允许你配置一个事务管理器。然后，该事务管理器将用于创建事务，并将其绑定到用于管理命令处理过程的\
  \ UoW。这样，命令处理过程就可以被视为一个原子过程；它要么被完全处理，要么完全不处理。Axon 框架使用 UoW 来跟踪命令处理器执行的操作。当命令处理器完成时，Axon\
  \ 将尝试提交在 UoW 中注册的操作。当 UoW 绑定到事务时，它将确保绑定的事务在正确的时间点被提交。\n接下来，我们转向 Axon 3，这里有一些不同之处。\n\
  \n\n\n注意\n在第 12 章的“分布式命令与事件处理”示例中，你配置了事务管理器，而在同一示例的 Axon 3 迁移版本中，你并未配置或使用任何显式的事务管理器。\n\
  \n如果你在事务性命令处理器中处理多个聚合根，Axon 3 会报错。这意味着清单 19-12 和清单 19-13 的组合在 Axon 3 中难以正常工作。让我们对电商微服务\
  \ Ecom-core 的设计稍作重构。\n\n清单 19-14 展示了以分布式方式连接命令总线和事件总线所需的最低配置。在代码中，你为命令总线附加了一个事务管理器，并为事件队列附加了一个\
  \ Saga 事件处理器。\n\n```\n@Configuration\npublic class EcomCoreAppConfiguration {\n\
  @Value(\"${axon.amqp.exchange}\")\nprivate String rabbitMQExchange;\n@Value(\"${axon.amqp.queue}\"\
