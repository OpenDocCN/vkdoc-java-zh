  \n图 16-11\n从第一个客户端更新用户\n\n```\nHTTP PUT http://127.0.0.1:8080/user/update\n请求体 Raw\
  \ JSON(application/json)\n{ \"id\" : 1, \"userName\" : \"TestUser-02\", \"age\"\
  \ : 12 }\n```\n\n不要耽误太多时间，再发送一个 HTTP PUT 请求，以 JSON 格式发送 User 数据来更新之前创建的用户，但使用略有不同的数据，以便你能够区分上述两个操作所导致的更新，如图\
  \ 16-12 所示。\n\n![../images/477630_1_En_16_Chapter/477630_1_En_16_Fig12_HTML.jpg](img/477630_1_En_16_Fig12_HTML.jpg)\n\
