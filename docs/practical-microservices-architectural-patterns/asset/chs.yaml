  java\\com\\acme\\ecom\\messaging\\StockOrderServiceImpl.java)\n```\n\n为了代码的完整性，清单\
  \ 13-7 展示了 `Quote` 模型类。\n\n```\n@Entity\n@Table(name = \"quote\")\n@Data\n@EqualsAndHashCode(exclude\
  \ = { \"id\" })\npublic class Quote{\npublic static final String NEW = \"New\";\n\
  public static final String CONFIRMED = \"Confirmed\";\n@Id\n@GeneratedValue(strategy\
  \ = GenerationType.AUTO)\nprivate Long id;\n@NotBlank\n@Column(name = \"symbol\"\
  , nullable = false, updatable = false)\nprivate String symbol;\n@Column(name = \"\
  sellerid\", nullable = false, updatable = false)\nprivate Long sellerId;\n@Column(name\
  \ = \"buyerid\", nullable = false, updatable = false)\nprivate Long buyerId;\n@Column(name\
  \ = \"amount\", nullable = false, updatable = false)\nprivate Float amount;\n@Column(name\
